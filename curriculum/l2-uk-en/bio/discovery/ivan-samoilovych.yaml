topic: Іван Самойлович — гетьман обох боків Дніпра і Великий згін
query_keywords:
  - Іван Самойлович
  - Великий згін 1678 1679
  - Конотопські статті 1672
objectives:
  - Розглянути правобережну політику Самойловича разом із досвідом переселених громад.
  - Пояснити падіння гетьмана у взаємодії старшини, воєнної поразки та московської влади.
outline:
  - Прихід до булави і правобережні претензії.
  - Великий згін та міждержавні договори.
  - Кримський похід, усунення і Тобольськ.
keywords:
