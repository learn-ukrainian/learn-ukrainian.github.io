topic: Іван Скоропадський — післяполтавська Гетьманщина і Решетилівські статті
query_keywords:
  - Іван Скоропадський
  - Решетилівські статті 1709
  - Малоросійська колегія 1722
objectives:
  - Зіставити петицію про права з інструментами імперського нагляду.
  - Описати гетьманство після Полтави без ярликів «слухняний» або «рятівник».
outline:
  - Глухівська елекція під тиском 1708 року.
  - Просительні статті, резидент і військово-фінансовий контроль.
  - Колегія 1722 року та суперечлива спадщина.
keywords:
  - Глухів
  - резидент
  - вольності
  - колегія
vocabulary:
  - осавул
  - універсал
  - резидент
constraints:
  - Не трактувати елекцію як вільний вибір без царського тиску.
  - Не стирати власну агентність Скоропадського або соціальні наслідки старшинської політики.
