warning: 'Чотири прямих джерела збігаються з планом і реєстром; два українські читання мігровано на strict-v2.
  Читання «Емігрант» знято з reading-needed: ЕСУ засвідчує, що Будка заснував цей місячник 1910 року й
  редагував до 1912 року. Стаття Енциклопедії історії України (cgi-bin/eiu/history.exe) вилучена як
  непортативна session-залежна CGI-сторінка; замінника не знайдено, тому три твердження, засвідчені лише
  нею, вилучено без заміни: призначення Пієм X, суд 29 травня — 3 червня 1946 року, строк у п''ять років.
  Розбіжності зафіксовано з атрибуцією: дата народження (7 червня проти 7 вересня), дата смерті (28 вересня
  проти 1 жовтня 1949 — причому обидві дати подає та сама синодальна довідка, суперечачи сама собі). Строк
  (вісім років) тепер узгоджений між рештою джерел. Хіротонія 13 жовтня 1912 року відбулася у Львові, не в
  Канаді. Канадське та ватиканське видання англомовні й лишаються поза набором читань.'
