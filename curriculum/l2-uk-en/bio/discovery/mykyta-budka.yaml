  редагував до 1912 року. Розбіжності зафіксовано з атрибуцією: дата народження (7 червня проти 7 вересня),
  дата смерті (1 проти 6 жовтня 1949), строк (вісім проти п''яти років). Канадське та ватиканське видання
  англомовні й лишаються поза набором читань.'
