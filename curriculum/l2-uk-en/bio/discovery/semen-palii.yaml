topic: Семен Палій — правобережне козацтво, повстання і Тобольське заслання
query_keywords:
  - Семен Палій
  - Правобережне повстання 1702 1704
  - Нарвський договір 1704
objectives:
  - Пояснити відновлення правобережних полків і конфлікт навколо міст та фортець.
  - Відокремити фольклорну пам'ять від джерельної біографії Палія.
outline:
  - Фастівський полковник і реколонізація Правобережжя.
  - Повстання 1702-1704 років, Мазепа й Нарвський договір.
  - Арешт, Тобольськ, повернення і пам'ять.
keywords:
  - Правобережжя
  - повстання
  - фортеця
  - заслання
vocabulary:
  - полковник
  - універсал
  - реколонізація
constraints:
  - Не романтизувати повстання або заслання й не подавати Палія як «зрадника».
  - Не підміняти українську політичну агентність польсько-московською домовленістю.
