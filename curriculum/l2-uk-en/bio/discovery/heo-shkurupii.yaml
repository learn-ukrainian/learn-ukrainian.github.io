  text: |
    Довідка фіксує Ґео Шкурупія як українського письменника, його участь в Асоціації
    панфутуристів, Комункульті та «Новій Ґенерації», а також арешт 1934 року, вирок
    на десять років таборів, повторний вирок трибуналу НКВС і розстріл. Вона не є
    заміною архівної справи та не дає підстав для відтворення неперевірених цитат.
- chunk_id: direct-tyzhden-shkurupii-literary-context
