  url: 'https://uk.wikipedia.org/wiki/Ґео_Шкурупій'
  text: |
    Ґео Шкурупій (справжнє ім'я Георгій (Юрій) Данилович; 20 квітня 1903, Тягиня,
    Бессарабська губернія — 8 грудня 1937, Ленінград) — український письменник,
    кіносценарист та журналіст, представник панфутуризму, за власним визначенням —
    «Король Футуропрерій». Один із представників розстріляного відродження.

    Народився в сім'ї залізничника та вчительки; дитинство провів на Поділлі. По
    закінченні Другої Київської класичної гімназії (1920) навчався на медичному
    факультеті Київського університету (лише рік) та в Київському інституті
    зовнішніх зносин. Працював на залізниці, редактором і сценаристом на кінофабриці,
    в редакції газети «Більшовик». Письменника заарештували в Києві 3 грудня 1934
    року за звинуваченням у приналежності до «київської терористичної організації
    ОУН» (в архівній справі абревіатуру розшифровано як «Об'єднання українських
    націоналістів»).
- chunk_id: uk-wikipedia-shkurupii-sud-zahybel
  source_type: wikipedia
  source_name: 'Українська Вікіпедія — «Ґео Шкурупій», суд, заслання, розстріл, реабілітація'
  url: 'https://uk.wikipedia.org/wiki/Ґео_Шкурупій'
  text: |
    Відбулося два судових засідання військового трибуналу, на яких Шкурупій
    категорично заперечував звинувачення й подав письмову заяву-скаргу на неправомірні
    методи слідства. Після першого суду справу повернули на додаткове розслідування.
    27 квітня 1935 року його засудили на 10 років виправно-трудових таборів із
    подальшою трирічною поразкою в політичних правах та конфіскацією майна; покарання
    відбував у концтаборі на Соловках. Дружина Варвара Базас потрапила в більшовицьку
    категорію ЖИР («жена изменника родины»); разом із сином Георгієм як родину ворога
    народу їх виселили з Києва. 25 листопада 1937 року «особлива трійка» переглянула
    справу й засудила Шкурупія до смертної кари. Розстріляно 8 грудня 1937 року в
    Ленінграді. 1957 року посмертно реабілітований.
- chunk_id: uk-wikipedia-shkurupii-tvorchist
