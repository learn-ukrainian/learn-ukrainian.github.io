  author: 'Колектив (НТШ)'
  text: |
    Український футуризм створює все нові організаційні осередки: угруповання
    «Флямінґо» (1919), київська група Аспанфут, яка перетворюється на АсКК-Комункульт,
    і далі група «Нова Ґенерація» (1927—31). До неї належали М. Семенко, Гео
    Шкурупій, О. Влизько, Е. Стріха (К. Буревій), Леонид Скрипник та інші. Не можна
    заперечувати наявності в «Новій Ґенерації» цікавих формальних шукань у поезії і
    прозі (художній репортаж, експериментальний роман). Після розстрілу О. Влизька в
    грудні 1934 р. майже всі члени «Нової Ґенерації» поступово були «ліквідовані».
