  source_name: 'Українська Вікіпедія — «Ґео Шкурупій», розділ «Творчість»'
  url: 'https://uk.wikipedia.org/wiki/Ґео_Шкурупій'
  text: |
    1920 року Ґео Шкурупій дебютував у альманасі «Гроно». Перші збірки поезій —
    «Психетози. Вітрина третя» (1922) та «Барабан. Вітрина друга» (1923) — написані у
    стилістиці футуристичної поетики. Збірка «Жарини слів» (1925) засвідчила перехід
    від футуристичної бравади до неоромантизму. Того ж року дебютував як прозаїк
    книгою оповідань «Переможець дракона», яку О. Білецький назвав «розмаїтим,
    талановитим» явищем. Автор романів «Двері в день» (1929), «Жанна-батальйонерка»
    (1930), «Міс Адрієна» (1934). Належав до угруповань «Комкосмос», Аспанфут, АсКК
    (Комункульт), ВАПЛІТЕ і «Нова генерація». 1930 року очолив київську філію «Нової
    генерації» та редагував її орган «Авангард — альманах пролетарських митців», де
    вперше було надруковано кіносценарій Олександра Довженка «Земля».
