  source_name: 'Ярина Цимбал, «Шкурупій від А до Я», Український тиждень'
  url: 'https://tyzhden.ua/shkurupij-vid-a-do-ia/'
  text: |
    Авторська стаття розглядає літературне середовище й твори Шкурупія. Для модуля
    вона є контекстом творчої роботи, а не доказом конкретних матеріалів репресивної
    справи; такі матеріали потребують окремої архівної публікації.
