    «Нова генерація» — літературна організація українських футуристів, що
    функціонувала в Харкові в 1924—1931 рр., до якої входили письменники М. Семенко,
    Г. Шкурупій, О. Полторацький та інші. Засновники організації проголошували гасла
    про «нову форму», переносячи на радянський ґрунт різні течії та формалістичні
    прийоми.
