  source_name: 'Письмова заява-скарга Ґ. Шкурупія до військового трибуналу (архівна справа НКВС, 1935; цит. за uk.wikipedia)'
  work: 'Заява-скарга до суду (15.01.1935)'
  author: 'Ґео Шкурупій'
  text: |
    Мої бесіди названі націоналістичними, як і мої настрої. Насправді ж я вказував
    слідчому, що бесіди були на літературні, історичні і побутові теми… Незважаючи на
    неправильний запис показань слідчим, вони підписані мною через те, що протягом
    усього слідства я був підданий жахливому моральному тискові… Тому прошу вважати
    ці мої показання недійсними, оскільки фактично вони не мої, а складені за думкою
    і бажанням слідчого.
