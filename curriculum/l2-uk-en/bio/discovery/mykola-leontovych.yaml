  text: |
    Мико́ла Дми́трович Леонто́вич (13 грудня 1877, село Монастирок, Брацлавський
    повіт, Подільська губернія, Російська імперія — 23 січня 1921, село Марківка,
    Гайсинський повіт, Подільська губернія, Українська СРР) — український композитор,
    хоровий диригент, піаніст, педагог, збирач музичного фольклору, громадський діяч.
    Автор широковідомих хорових обробок українських народних пісень «Щедрик»,
    «Дударик», «Козака несуть», «Ой з-за гори кам'яної» та інших. Його різдвяна
    щедрівка «Щедрик» перекладена багатьма мовами і відома у англомовному світі як
    Carol of the Bells.

    1892 року Леонтович вступив до Подільської духовної семінарії в Кам'янці-
    Подільському, де вивчав теорію музики та хоровий спів. У червні 1899 року він
    закінчив духовну семінарію й вирішив працювати вчителем у сільських школах.
    1901 року він видав перший збірник пісень з Поділля. 1903 року вийшов другий
    збірник подільських пісень із посвятою Миколі Лисенкові.
- chunk_id: uk-wikipedia-leontovych-tvorchi-zdobutky
  source_type: wikipedia
  source_name: 'Українська Вікіпедія — «Леонтович Микола Дмитрович», «Творчі здобутки»'
  url: 'https://uk.wikipedia.org/wiki/Леонтович_Микола_Дмитрович'
  text: |
    Основу музичної спадщини Леонтовича становлять хорові мініатюри — обробки
    українських народних пісень, які й донині є неперевершеними і їх виконують всі
    українські хори в Україні й діаспорі. На основі українських народних мелодій
    Леонтович створював цілком оригінальні самобутні хорові композиції, всебічно
    художньо переосмисливши їх, надавши їм неповторного звучання. Найвищим
    досягненням композитора вважають пісні «Щедрик» і «Дударик», в яких Леонтович
    досягнув максимальної ритмічної організації. Особливо популярним був і
    залишається «Щедрик», в якому органічно поєднані прийоми народного багатоголосся
    з досягненнями класичної поліфонії й кожен голос відіграє цілком самостійну
    виражальну роль.
- chunk_id: uk-wikipedia-leontovych-zahadka-smerti
  source_type: wikipedia
  source_name: 'Українська Вікіпедія — «Леонтович Микола Дмитрович», «Загадка» смерті'
  url: 'https://uk.wikipedia.org/wiki/Леонтович_Микола_Дмитрович'
  text: |
    В ніч на 23 січня 1921 року композитор перебував у свого батька у селі Марківка
    Гайсинського повіту, де був убитий агентом ВЧК Афанасієм Грищенком, який
    напросився в хату переночувати, назвавшись чекістом, що проводить боротьбу з
    бандитизмом. Вранці він пограбував будинок і застрелив Миколу Леонтовича. Текст
    рапорту, що розкриває ім'я вбивці композитора, оприлюднено лише у 1990-х роках.
    Надалі комуністичним режимом факти смерті Миколи Леонтовича спотворювались:
    місцевим органам довелося видумати версію вбивства заїжджим білогвардійцем
    (а пізніше — петлюрівцем).
