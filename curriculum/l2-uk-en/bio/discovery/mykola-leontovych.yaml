  author: 'Колектив'
  text: |
    ЛЕОНТОВИЧ Микола Дмитрович [1(13).XII 1877, присілок Монастирок, тепер село
    Немирівського р-ну Вінн. обл. — 23.I 1921, с. Марківка, тепер Теплицького р-ну
    Вінн. обл.] — укр. композитор, збирач муз. фольклору. Закін. 1899 духовну
    семінарію у Кам'янці-Подільському. Л. — один з видатних майстрів хорових обробок
    укр. нар. пісень («Щедрик», «Пряля», «Козака несуть», «Мак», «Піють півні»,
    «Дударик», «Женчичок-бренчичок», «Ой з-за гори кам'яної», «Зашуміла ліщинонька»,
    «Смерть») та хорових поем на тексти укр. поетів («Легенда» М. Вороного, «Моя
    пісня» К. Білиловського, «Літні тони» та «Льодолом» В. Сосюри). В ост. роки Л.
    працював над фантаст. оперою «На русалчин великдень» за одноймен. казкою
    Б. Грінченка. Ще 1901 уклав і опубл. першу збірку обробок нар. пісень для хору
    без супроводу, 1903 вийшла друком «Друга збірка пісень з Поділля», яку присвятив
    М. Лисенкові.
