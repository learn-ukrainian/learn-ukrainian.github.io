  text: |
    Дмитро Никанорович Фальківський (справжнє прізвище Левчук; 3 листопада 1898,
    село Великі Лепеси, нині у міській смузі міста Кобриня, Берестейщина —
    16 грудня 1934, Київ) — український поет, прозаїк, перекладач і сценарист,
    представник розстріляного відродження; у пізній творчості — неосимволіст. У
    юності — працівник каральних органів. Жертва сталінського терору.

    Вчився у Берестейській гімназії. У 1920—1923 роках служив у Червоній армії (в
    органах ЧК); по демобілізації жив у Києві, де змінив прізвище Левчук на
    Фальківський з огляду на небезпеку помсти за участь у масових убивствах на
    території нинішньої Білорусі. Друкуватися почав 1924 року, містив поезії в
    журналах «Червоний шлях», «Життя й революція», «Всесвіт», «Глобус»; належав до
    літературної групи «Ланка» (пізніше МАРС).
- chunk_id: uk-wikipedia-falkivskyi-terror-zahybel
