  source_name: 'Українська Вікіпедія — «Фальківський Дмитро Никанорович», арешт і реабілітація'
  url: 'https://uk.wikipedia.org/wiki/Фальківський_Дмитро_Никанорович'
  text: |
    Попри його спецслужбістське минуле, більшовицький режим ставився недовірливо до
    творчості Фальківського. Коли у зв'язку з убивством сталінського керівника
    Кірова було влаштовано новий терор, його разом із Григорієм Косинкою, Олексою
    Влизьком, Костем Буревієм та іншими ув'язнили, а незабаром розстріляли у групі
    28 осіб української творчої інтелігенції. Розстріляний у грудні 1934 року (16
    грудня 1934, Київ; вирок виніс виїзна сесія Військової колегії Верховного суду
    СРСР). Посмертно реабілітований у грудні 1957 року.

    3 листопада 2018 року на державному рівні в Україні відзначено пам'ятну дату —
    120 років з дня народження Дмитра Фальківського; зусиллями «Просвіти» у рідному
    селі ще 1998 року встановлено пам'ятний знак.
- chunk_id: uk-wikipedia-falkivskyi-tvorchist
  source_type: wikipedia
  source_name: 'Українська Вікіпедія — «Фальківський Дмитро Никанорович», розділ «Творчість»'
  url: 'https://uk.wikipedia.org/wiki/Фальківський_Дмитро_Никанорович'
  text: |
    Окремі прижиттєві збірки поезій Фальківського: «Чабан» (1925), «Обрії» (1927),
    «На пожарищі» (1928), «Полісся» (1931). У його ліриці поряд із мотивами поліської
    природи багато уваги приділено зображенню воєнного насильства 1917—1920 років в
    Україні. Крім поезій, він писав нариси, оповідання та сценарії; зокрема — сценарій
    фільму «Греблю прорвано» (1928, у співавторстві з Л. Френкелем). Посмертні
    видання: «Ранені дні» (Пряшів, 1969; за редакцією М. Неврлого, з докладною
    бібліографією) та «Поезії» (Київ, 1989; упорядкування і вступна стаття
    Ю. Коваліва).
