  text: |
    ФАЛЬКІВСЬКИЙ Дмитро Никанорович (справжнє прізв. — Левчук; 03.11(22.10).1898,
    с. Великі Липеси, нині село Брестської обл., Білорусь — 16.12.1934, м. Київ) —
    український поет. Народився в робітничій родині. Навчався в сільській школі та
    Берестейській (Брест-Литовській) гімназії, якої не закінчив через Першу світову
    війну. Під час революції працював у більшовицькому підпіллі; 1920—23 перебував у
    Червоній армії та у ВЧК; із 1923 — на журналістській і творчій роботі в Києві.
    У грудні 1934 заарештований за фальшивим звинуваченням у терористичній
    діяльності. 14 грудня 1934 засуджений до смерті. Страчений у м. Київ.
    Реабілітований наприкінці 1950-х рр.
