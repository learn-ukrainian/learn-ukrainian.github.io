  text: "25\nРобота молодого вченого «Думка і мова» дала йому можливість \nочолити\
    \ кафедру порівняльного мовознавства. Учений розрізняв \nмову і мовлення. Мову\
    \ Потебня розглядав як механізм, що породжує \nдумку як сукупність засобів, за\
    \ допомогою яких будують і розуміють \nтексти. Мовлення  — це процес говоріння,\
    \ писання. На  думку \nОлександра Потебні, у мові споконвічно закладено величезний\
    \ твор-\nчий потенціал. Праці Олександра Потебні — дослідження мови і слова в\
    \ історич-\nному розвитку  — несли такий новато"
