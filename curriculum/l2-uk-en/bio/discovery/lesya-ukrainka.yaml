  text: |-
    Леся Українка (Лариса
    Косач, 1871 — 1913) почала свою поетичну діяльність із ліричної поезії:
    збірки: »На крилах пісень« (1892, 1904), »Думи і мрії« (1899), »Відгуки«
    (1902), пізніші цикли »Осінні співи«, »Весна в Єгипті«, »З подорожньої книжки«
    та ін. Уже на перших кроках її творчости, попри наявність впливів епігонів
    шевченківської поезії, Леся Українка звертається до европейських зразків,
    ставши на шлях Куліша і Старицького. Лірика Лесі Українки збагачується новими
    мотивами, /774/ зокр
