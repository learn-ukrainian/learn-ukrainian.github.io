  text: "Леся Українка (Лариса\r\nКосач, 1871 — 1913) почала свою поетичну діяльність\
    \ із ліричної поезії:\r\nзбірки: »На крилах пісень« (1892, 1904), »Думи і мрії«\
    \ (1899), »Відгуки«\r\n(1902), пізніші цикли »Осінні співи«, »Весна в Єгипті«,\
    \ »З подорожньої книжки«\r\nта ін. Уже на перших кроках її творчости, попри наявність\
    \ впливів епігонів\r\nшевченківської поезії, Леся Українка звертається до европейських\
    \ зразків,\r\nставши на шлях Куліша і Старицького. Лірика Лесі Українки збагачується\
    \ новими\r\nмотивами, /774/ зокр"
