  text: 'І


    Нема нічого цікавішого для критика, як слідити крок за кроком розвій автора, прислухуючися,
    як в його слові звільна міцніють, доходять до переваги, а далі до повного, гармонійного
    панування тони, властиві його талантові.


    Бувають автори, у котрих такий дослід неможливий; вони почали писати вже дозрілими
    людьми і відразу виявили вповні свою літературну фізіономію. Бувають інші, також
    талановиті люди, у котрих розвій не йде мов по ступнях угору, а якимись зигзагами:
    раз, два рази такому авторов'
