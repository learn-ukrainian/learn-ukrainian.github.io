    Нову якість мови започаткував у другій половині XIX
    ст. І. Франко. Але його творчість служила зразком і на початку XX ст. Адже в
    цей час була написана поема «Мойсей», повість «Перехресні стежки» та інші
    твори. І. Франко розкрив тут особливості мови українсько-галицької інтелігенції
    кінця XIX — початку XX ст.

    Творчість Лесі Українки також має початок в XIX ст.
    Але розквіт її припадає на початок XX ст. Леся Українка одержала своєрідну —
    домашню й суто українську освіту. А ще все своє життя
