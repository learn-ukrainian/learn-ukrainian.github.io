warning: >-
  Direct-source packet. Adopted external set (order fixed): ЕІУ Кармалюк →
  УІЖ PDF 1997 → IEU Karmaliuk. Ключова напруга: ЕІУ фіксує напади на маєтки,
  корчми й заможних селян і «бл. 20 тис. осіб» у слідстві Галузинецької комісії;
  IEU — redistribution to village poor і «up to 20,000 peasants» у русі 1830–1835.
  Ці формули НЕ зливати. Родинне прізвище за УІЖ — Карманюк; learner-facing
  канон — Устим Кармалюк. IEU 1814: 500 ударів у Кам'янці-Подільському + втеча
  по дорозі до Криму — лише з атрибуцією IEU. Дата народження: ЕІУ 10.03/27.02.1787;
  УІЖ трактує метричний запис як хрещення — ученьовій прозі обережно «1787».
