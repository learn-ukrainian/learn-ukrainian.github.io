constraints:
  - Не подавати ярлик «український Робін Гуд» як нейтральний історичний вердикт.
  - Не змішувати «20 тис. у слідстві» (ЕІУ) з «20 000 учасників руху» (IEU).
  - Не перетворювати згадку про містечкових євреїв і дрібну шляхту на колективну провину.
