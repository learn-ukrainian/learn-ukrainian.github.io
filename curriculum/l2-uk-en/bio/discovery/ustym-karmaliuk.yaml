topic: Устим Кармалюк — подільський кріпак-втікач, імперська кара і народна пам'ять
objectives:
  - Реконструювати шлях Кармалюка через кріпацтво, рекрутчину й сибірську каторгу.
  - Розрізняти документальний запис, слідчі числа й фольклорний «народний месник».
  - Не зводити соціальний склад загонів до етнічної провини.
outline:
  - Кріпацьке походження й рекрутський примус 1812.
  - Цикл покарань і втеч; географія подільських рейдів.
  - Слідство, загибель 1835 і пізніша пісенна пам'ять.
keywords:
  - кріпацтво
  - рекрутчина
  - каторга
  - Поділля
  - народний месник
vocabulary:
  - кріпак
