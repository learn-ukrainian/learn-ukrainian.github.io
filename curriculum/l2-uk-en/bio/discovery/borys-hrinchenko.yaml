  text: |-
    Борис Дмитрович Грінченко народився 9 грудня 1863 року на хуторі
    Вільховий Яр на Харківщині у дворянській сім'ї. Навчався в Харківському
    реальному училищі, з якого був відрахований за читання й поширення
    забороненої політичної літератури. У 1902 році перебрався до Києва, де
    майже два роки працював над підготовкою словника української мови на
    основі матеріалів «Київської старовини».
  section_title: Сторінка 65
