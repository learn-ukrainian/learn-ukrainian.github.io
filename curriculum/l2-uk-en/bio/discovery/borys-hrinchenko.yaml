    У підручниковому огляді Бориса Грінченка названо одним із діячів, які
    особливо вплинули на дальший розвиток української літературної мови:
    його методична праця дала значний словниковий, граматичний і правописний
    матеріал. Цю оцінку слід зіставляти з історією колективного укладання
    словника та його документованими межами.
