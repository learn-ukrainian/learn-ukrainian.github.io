warning: >-
  Direct-source packet; кожну адресу перевірено відкриттям документа
  2026-07-17, а [S2] і [S3] — повним вибором тексту сторінки, не резюме.
  Академічну підставу дає ЕСУ (стаття «Вергун Петро», Бриндак І. С., Т. 4,
  2005). Це найсуперечливіша біографія когорти.
  ВИПРАВЛЕНО ХИБНЕ ПРОЧИТАННЯ ПЕРШОГО ПРОХОДУ (важливо): фразу «Став
  єпископом, намісником Папи Римського в Німеччині з 23 жовтня 1940 року»
  спершу було віднесено до тверджень Синоду. Повне читання [S2] показало, що
  це цитата зі СТОРІНКИ ПРОТОКОЛУ ДОПИТУ — «…розповідав слідчому Петро
  Вергун», — і що те саме джерело далі подає формулювання: «І потім кожне з
  оцих, сказаних ще на першому допиті слів, використають для побудови все
  нових і нових звинувачень. Не лише проти Вергуна, а й проти усіх
  греко-католиків». Жанр джерела змінює все: протокол допиту не є довідкою
  про сан.
  РОЗБІЖНОСТІ ЗАФІКСОВАНО, НЕ УСУНЕНО.
  (а) МІСЦЕ СМЕРТІ: ЕСУ подає «с-ще Ангарське Краснодар. краю, РФ»; [S2]
  подає Ангарське Богучанського району Красноярського краю; [S3] подає
  Ангарське Красноярського краю й поховання на березі річки Ангари.
  Джерела подають різні назви краю; жодної версії НЕ обрано.
  (б) ТРИВАЛІСТЬ УВ'ЯЗНЕННЯ: ЕСУ подає «увʼязнений до 1955»; [S2] подає
  звільнення з каторжних робіт у червні 1952 року й привезення до Ангарського
  «через рік»; [S3] подає «22 червня 1952 року — звільнений з каторжних
  робіт. Від 1953 року відбував заслання у селищі Ангарське Красноярського
  краю» і операцію на шлунку 1954 року. Ряди несумісні; не зведено.
  (в) САН: ЕСУ подає «Від 1940 — священик… згодом — Апостол. візитатор у
  Німеччині» і сан прелата з 1937 року; [S3] подає «згодом став Апостольським
  візитатором»; ватиканський перелік подає «Pastor of the Archeparchy of Lviv
  for the Ukrainians, Apostolic Visitor for the Ukrainian Catholics of
  Germany» — тобто НЕ називає його єпископом. Сан єпископа подає лише
  протокол допиту в [S2]. Курс НЕ стверджує, що Вергун був єпископом:
  приписати вищий сан на підставі допиту означало б повторити операцію
  слідства з доброзичливим знаком.
  (г) ДАТА АРЕШТУ: ЕСУ — 22 червня 1945; [S3] — «21 червні 1945 р.»; [S2] —
  «Протокол затримання складено 22 червня 1945 року», тобто 22 червня може
  бути датою ПРОТОКОЛУ, а не затримання. Не зведено.
  (ґ) РІК ВИРОКУ: [S3] подає «1946 року в Києві»; ЕСУ року вироку не подає.
  ЗБІГ, ЩО ДОЗВОЛЯЄ СТВЕРДЖУВАТИ: строк 8 років подають ЕСУ, [S2] і [S3] —
  тому строк стверджується; поширене в мережі «7 років» жодним адоптованим
  джерелом не підтверджено й не вживається. [S2] і [S3] — дві сторінки на
  сайті Синоду; незалежних доказових ланцюгів між ними не показано (2:1
  «незалежність» не застосовується).
  АТРИБУТОВАНИЙ РОЗКЛАД, НЕ «НЕЗАЛЕЖНА БІЛЬШІСТЬ»: у пунктах (а) і (б) ЕСУ
  розходиться з двома синодальними сторінками [S2] [S3]; документа, який
  фіксував би це як помилку ЕСУ, не отримано; поховання біля Ангари [S3] не
  вирішує місце смерті; більшість не оголошується істиною.
  МОВА: ватиканська сторінка англомовна — референс, не учнівське читання.
