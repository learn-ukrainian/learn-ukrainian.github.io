    \ регіону. Іван Франко — письменник, учений, громадський діяч. у  1875  р. закінчив\
    \ дро-\nгобицьку гімназію, навчався у Львівському, Чернівецькому та Віденському\
    \ універ-\nситетах. Із 1894  р. очолював філологічну секцію, а  з 1898  р. також\
