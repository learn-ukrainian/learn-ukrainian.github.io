- chunk_id: 10-klas-ukrlit-borzenko-2018-prof_s0140
  text: |-
    Іван Якович Франко народився 27 серпня 1856 року в селі Нагуєвичі.
    Навчався у Дрогобичі, Львівському та Чернівецькому університетах;
    після успішного захисту докторської дисертації не дістав посади у
    Львівському університеті.
  section_title: Сторінка 76
  grade: 10
  author: borzenko
  page: 76
  trust_tier: 2
- chunk_id: 10-klas-ukrlit-borzenko-2018-prof_s0141
  text: |-
    Франко брав активну участь у громадському й політичному русі,
    балотувався до Галицького сейму та австрійського парламенту від
    Русько-української радикальної партії. Помер 28 травня 1916 року;
    похований на Личаківському цвинтарі у Львові.
  section_title: Сторінка 76
  grade: 10
  author: borzenko
  page: 76
  trust_tier: 2
