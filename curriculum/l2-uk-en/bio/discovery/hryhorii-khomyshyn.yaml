warning: >-
  П'ять прямих джерел збігаються з планом і реєстром; чотири українські читання мігровано на strict-v2.
  Цитату про пресу («вона фактично має владу над людським мисленням») перевірено прямим зчитуванням
  сторінки Синоду й підтверджено дослівно з атрибуцією до S4; попереднє твердження про її відсутність
  спростовано. Номер кримінальної справи № 35826, том 1 перевірено прямим зчитуванням сторінки Синоду
  й збережено. Назву первинного тексту виправлено на «Українська проблєма». Дату смерті подано розбіжно
  між джерелами (S3 і S4: 28 грудня 1945 року; S2: 17 грудня 1945 року) — розбіжність зафіксовано, не
  згладжено.
  Дослідження В. Мороза (УКУ) вилучено: постійний ідентифікатор hdl.handle.net/20.500.14570/1470
  переадресовує на живий домен er.ucu.edu.ua, який відповідає кодом 403 на автоматичні запити —
  джерело непортативне, замінника не знайдено.
