  text: |
    ПЛУЖНИК Євген Павлович (псевд. — Кантемирянин; 26(14).12.1898, слобода
    Кантемирівка, нині с-ще міськ. типу Воронезької обл., РФ — 02.02.1936) —
    український поет. Народився в багатодітній селянсько-ремісничій родині. Закінчив
    гімназію 1918; по тому родина переїхала в Україну. Навчання у ветеринарному та
    музично-драматичному інститутах покинув. 1923—1928 учителював у с. Багачка
    Миргородського р-ну. Заарештований 4 грудня 1934; страта була замінена 10-ма
    роками ув'язнення. Помер від туберкульозу на Соловках, похований у братській
    могилі. Реабілітований 1956.
