  text: |
    Євген Павлович Плужник (літературний псевдонім Кантемирянин; 14 (26) грудня
    1898, Кантемирівка, Богучарський повіт, Воронізька губернія, Російська імперія —
    2 лютого 1936, Соловецькі острови) — український поет, драматург і перекладач зі
    Східної Слобожанщини, один із представників розстріляного відродження, жертва
    сталінського терору.

    Народився у слободі Кантемирівка (Східна Слобожанщина); батько — виходець із
    Полтави. Учився у гімназіях Воронежа, Боброва, Ростова-на-Дону. 1918 року родина
    переїхала на Полтавщину, де Плужник учителював. З 1920 року навчався у Київському
    зоотехнічному інституті, потім (з 1921) у Музично-драматичному інституті імені
    Миколи Лисенка у професора Володимира Сладкопевцева; навчання покинув через
    туберкульоз. З 1924 року — активний учасник організації «Ланка». 1923 року
    одружився з Галиною Автономівною Коваленко, яка згодом зберегла рукописи поета й
    сприяла його реабілітації.
- chunk_id: uk-wikipedia-pluzhnyk-aresht-smert
