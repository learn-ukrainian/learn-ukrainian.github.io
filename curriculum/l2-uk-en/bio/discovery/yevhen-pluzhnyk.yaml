  url: 'https://uk.wikipedia.org/wiki/Плужник_Євген_Павлович'
  text: |
    4 грудня 1934 року Євгена Плужника заарештував НКВС, звинувативши в належності
    до так званої націоналістичної терористичної організації. У березні 1935 року
    виїзна Військова колегія Верховного суду разом із Г. Епіком, М. Кулішем,
    В. Підмогильним, О. Ковінькою та іншими засудила його до розстрілу; згодом вирок
    змінили на довготривале табірне ув'язнення на Соловках, де поет помер від
    туберкульозу 2 лютого 1936 року. Його останніми словами була фраза «Я вмиюся,
    пригадаю Дніпро і вмру». Похований на табірному кладовищі; могила не збереглася.
    Реабілітований у серпні 1956 року; умовна могила — на Байковому кладовищі в Києві.
- chunk_id: uk-wikipedia-pluzhnyk-literaturna-diialnist
  source_type: wikipedia
  source_name: 'Українська Вікіпедія — «Плужник Євген Павлович», розділ «Літературна діяльність»'
  url: 'https://uk.wikipedia.org/wiki/Плужник_Євген_Павлович'
  text: |
    У літературу Плужник увійшов завдяки Юрієві Меженку, який перший оцінив його
    талант; поезію Плужника високо цінували М. Рильський, М. Зеров, М. Бажан. У
    середині 1920-х видав перші збірки «Дні» (1926) і «Рання осінь» (1927), яким
    притаманні глибокий ліризм і майстерна поетична мова. Входив до об'єднань
    «АСПИС», «Ланка» та «МАРС». Автор збірки «Рівновага» (завершена 1933;
    опублікована в Аугсбурзі 1948, в Україні — 1966), роману «Недуга» («Сяйво»,
    1928), п'єс «Професор Сухораб» і «У дворі на передмісті» (1929), віршованої п'єси
    «Змова в Києві» (мали ставити театр імені І. Франка та «Березіль» Леся Курбаса).
    Спільно з Валер'яном Підмогильним уклав словник «Фразеологія ділової мови»
    (1926, 1927). Перекладав М. Гоголя, А. Чехова, Л. Толстого, М. Шолохова.
