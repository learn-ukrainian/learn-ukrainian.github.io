  text: |
    Не побачила друку за життя поетового збірка «Рівновага» Євгена Плужника
    (1898—1936), тонкого імпресіоніста, автора збірок «Дні» (1926) і «Рання осінь»
    (1927). Розстріляні були автор збірок «Обрії» (1927) і «Полісся» (1931) Дмитро
    Фальківський (1898—1934) і Олекса Влизько (1908—1934), романтичний шукач, співець
    моря і сильних людей.
