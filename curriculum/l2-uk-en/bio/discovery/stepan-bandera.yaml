warning: >-
  Direct-source packet. Вилучено: допис у Facebook (авторська колонка, не
  джерело для високоризикової теми), гола адреса ratinggroup.ua як доказ
  опитування 2022 року (unsourced precision), заглушка reading-needed і
  непідтверджена цитата «Ні на що не здадуться…» (у корпусі підручників не
  знайдена). Бюлетень ICJ англомовний — використовується як reference, не
  як learner reading. Волинське рішення 1943 року подано як рішення
  Крайового проводу ОУН(б) на Волині, тобто органу, а не особистий наказ;
  водночас зафіксовано, що ЕІУ подає збереження контактів і впливу Бандери
  з ув'язнення. Указ 46/2010: сторінка офіційної бази подає і примітку
  «Додатково див. Постанову Донецького окружного адміністративного суду
  N 2а-1219/10/0570 від 02.04.2010», і рядок поточної редакції «Редакція
  від 02.04.2010, підстава - v0570805-10» — представляти обидва, а не
  «лише примітку»; статусу втрати чинності сторінка не показує, тому
  скасування не стверджується. Похідне «бандерівець» жодне з адоптованих
  джерел не розглядає (у статті ЕІУ форма «бандерівц-» відсутня), тому
  твердження про його вжиток не робляться. Спосіб убивства подає бюлетень
  ICJ: пристрій із синильною кислотою, не куля. Портрет не оголошено:
  text-only portrait_fallback.
