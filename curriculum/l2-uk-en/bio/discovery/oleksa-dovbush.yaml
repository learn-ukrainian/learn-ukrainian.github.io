topic: Олекса Довбуш — карпатський опришок, насильство рейдів і гуцульська легенда
objectives:
  - Пояснити опришківство як гірський соціальний/розбійний феномен XVIII ст.
  - Відділити документальний запис рейдів і смерті від магічних переказів.
  - Не етнізувати багатоетнічний список жертв.
outline:
  - Походження з Печеніжина й рання діяльність з братом Іваном.
  - База в Чорногорі, рейди, переслідування коронним військом.
  - Смерть у Космачі й фольклорна/кінематографічна рецепція.
keywords:
  - опришок
  - Гуцульщина
  - Покуття
  - Чорногора
  - Космач
vocabulary:
  - опришок
  - коморник
  - орендар
  - лихвар
  - переказ
constraints:
  - Не перетворювати легенду чи кіно на біографію.
  - Не подавати «карпатський Робін Гуд» як нейтральний історичний вердикт.
  - Не згладжувати фізичне насильство, підпали й багатоетнічних жертв.
