  text: |
    Олекса Слісаренко виступав громадським обвинувачем на сфабрикованому процесі
    «Спілки визволення України» (СВУ) у березні—квітні 1930 року. У квітні 1934 року
    його заарештували органи ГПУ УРСР, а у квітні 1935 року військовий трибунал
    засудив його до 10 років позбавлення волі. Покарання відбував на Соловках, де
    сторожував на складі сільгоспу; 1936 року на 3 місяці потрапив до штрафного
    ізолятора. У жовтні 1937 року окрема трійка Управління НКВД СРСР по Ленінградській
    області переглянула справу Олекси Слісаренка й ухвалила застосувати до нього
    найвищу кару. Розстріляний 3 листопада 1937 року в Карелії, в урочищі Сандармох.
    Реабілітований посмертно Військовою колегією Верховного суду СРСР 19 вересня
    1957 року.
- chunk_id: uk-wikipedia-slisarenko-tvorchist
