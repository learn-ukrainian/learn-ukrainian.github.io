  text: |
    З першими віршами Слісаренко виступив 1910 року. У Києві пристав до угруповань
    українських символістів «Біла Студія» і «Музагет» (1919); перша збірка
    символістських поезій «На березі Кастальському» вийшла 1919 року у видавництві
    «Сяйво». Згодом приєднався до футуристів — «Комкосмос» (1921), Асоціації
    панфутуристів (Аспанфут, 1921) і Асоціації комуністичної культури (Комункульт,
    1924—1925), видав збірку футуристичних віршів «Поеми» (1923; обкладинку виготував
    Микола Бажан) та книжку вибраної лірики «Байда. 1911—1927» (1928). Пізніше
    перейшов до спілки пролетарських письменників «Гарт» (1925), потім до ВАПЛІТЕ
    (1925—1928); після «самоліквідації» ВАПЛІТЕ разом із Майком Йогансеном заснував
    «Техно-мистецьку групу А» (1929).

    З 1924 року почав працювати в жанрі прози й видав понад 20 книг гостросюжетних
    оповідань, повістей і романів кримінально-пригодницького жанру, писаних за зразком
    англійських та американських новел: «Бунт» (1928), «Зламаний гвинт» і «Чорний
    ангел» (1929), «Хлібна ріка» і «Страйк» (1932). Їхні герої — «маленькі», «сірі»
    люди в зустрічі з революційними подіями. Писав також вірші й оповідання для дітей.
    1931 року під псевдонімом Омелько Буц видав містифікаційну «Посмертну збірку
    творів».

    1927 року Слісаренко, тоді редактор «Книгоспілки», вступив у полеміку з Максимом
    Горьким. Попросивши Горького ознайомитися з українським перекладом його повісті
    «Мати», він отримав відмову, в якій письменник називав українську мову «говіркою».
    Про свою відповідь Слісаренко казав: «[Я] написав про те, що не збираюся вступати
    з ним у філологічну полеміку про українську мову. „Язык“ це чи „наречие“ мені
    байдужісінько. Не цікавить мене, як московський міщанин розглядає українську
    націю та її мову, бо знаю, що за моїми плечима стоїть 40-мільйонний український
    народ з його тисячорічною літературою, мистецтвом і наукою. Більше ми з Горьким
    не листувались». Згодом це листування пригадали Слісаренку як один із пунктів
    звинувачень в «українському буржуазному націоналізмі».
