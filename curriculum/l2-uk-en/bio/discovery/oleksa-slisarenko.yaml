  text: |
    Олекса Андрійович Слісаренко (справжнє прізвище — Снісар; 16 (28) березня 1891,
    хутір Канівцевий, Шиповацька волость, Вовчанський повіт, Харківська губернія,
    Російська імперія — 3 листопада 1937, урочище Сандармох, Карелія, СРСР) —
    український поет і прозаїк, представник розстріляного відродження, жертва
    сталінського терору.

    Народився на хуторі Канівцевому (нині село Шипувате Великобурлуцького району
    Харківської області) в родині лимаря Андрія Прокоповича Снісаря. Вчився в
    Кучерівській сільськогосподарській школі та Харківському рільничому училищі;
    після закінчення з 1912 року працював агрономом. Учасник Першої світової війни —
    пройшов шлях від рядового до офіцера артилерії. 1918 року самовільно залишив
    фронт і переїхав до Києва. З 1924 року мешкав у Харкові, був головним редактором
    видавничого відділу «Книгоспілки», у 1928—1929 роках — співредактором
    «Універсального журналу». Був одружений (дружина — Ганна Дмитрівна), мав сина
    Марка; сестри — Оксана, Олена, Наталія.
