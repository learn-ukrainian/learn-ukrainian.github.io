  text: |
    Молоде покоління, що репрезентувало тогочасну літературу на Україні, було
    зв'язане насамперед із символізмом і футуризмом. До групи символістів, що
    виступила в роки революції, належали, крім Тичини, поети Володимир Кобилянський,
    Дмитро Загул, Яків Савченко, Микола Терещенко, Володимир Ярошенко, Олекса
    Слісаренко («На березі кастальському», 1919). Д. Загул, Я. Савченко і
    М. Терещенко незабаром перейшли до революційної «пролетарської» поезії, а
    О. Слісаренко — до футуризму («Байда», вибрана лірика, 1928) і пізніше до шукань
    у сюжетній прозі.
