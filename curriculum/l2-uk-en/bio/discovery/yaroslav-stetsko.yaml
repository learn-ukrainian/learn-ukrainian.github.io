  за записом репозиторію KNAW (звірено 2026-07-17, HTTP 200: «Article ›
  Scientific › peer-review», с. 149–184, 36 с.); адресу внесено до
  direct_sources, плану, досьє й реєстру — усі чотири поверхні синхронні.
  Вона англомовна, тому не є learner reading. Прочитано лише бібліографічний
  запис, не текст статті (ResearchGate віддає 403): запис не має ні анотації,
  ні викладу висновків, тому доводить БІБЛІОГРАФІЧНУ ІДЕНТИЧНІСТЬ праці — і
  не доводить ні її висновків, ні її предмета. Назву як висновок не читати:
  формулу назви «attitude toward Germans and Jews» не перетворювати на
  твердження про «антисемітські мотиви» (слів «antisemitic»/«antisemitism» у
  записі немає жодного разу). Питання ставлення до євреїв не стверджується й
  не заперечується — зафіксовано як обов'язкову роботу окремого проходу.
  Вилучено англомовну довідку IEU: до цього пакета джерел вона не входила і
  дублювала українські статті. Додано «Українська Держава 1941» (ЕІУ), яку
  цитує досьє й реєстр. Текст Акта 30 червня цим проходом НЕ отримано, тому
  завдань на аналіз його формулювань не ставиться. Характеристику ідеології
  руху як «тоталітарної (авторитарної)» вилучено разом із залежними
  завданнями: її єдиною опорою був чанк підручника Гісема поза набором
  джерел пакета (rag_chunks: []), а дореєстрація чанка заднім числом під уже
  написане твердження не робиться.
