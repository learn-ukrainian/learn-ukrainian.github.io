  запис, не текст статті (ResearchGate віддає 403): запис доводить
  ІДЕНТИЧНІСТЬ статті, а не її висновки, тому висновків не переказано і цитат
  із «Життєпису» не наведено. Вилучено англомовну довідку IEU: до цього
  пакета джерел вона не входила і дублювала українські статті. Додано
  «Українська Держава 1941» (ЕІУ), яку цитує досьє й реєстр.
