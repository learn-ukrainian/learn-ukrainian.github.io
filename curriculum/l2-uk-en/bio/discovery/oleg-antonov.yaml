    \ характерним \nбезвідходне виробництво; технологічні процеси, що не потребують\
    \ величезних витрат \nпрісної води; матеріали, що не потребують для свого виготовлення\
    \ знищення мільйонів \nгектарів лісу; ще інтенсивніше сільське господарство, що\
    \ використовує менші земельні \nділянки для отримання значно більшої маси продуктів,\
