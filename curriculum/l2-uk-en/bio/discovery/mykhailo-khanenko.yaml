topic: Михайло Ханенко — правобережний гетьман-претендент доби Руїни
query_keywords:
  - Михайло Ханенко
  - Острозька угода 1670
  - Правобережна Гетьманщина
objectives:
  - Пояснити обмежену автономію Острозької угоди й ціну цієї стратегії.
  - Відокремити джерельні факти від ярлика «польський ставленик».
outline:
  - Уманський полковник і часткова елекція 1669 року.
  - Острозька угода, війна 1671-1672 років і відмова від булави.
  - Арешт 1677 року та межі пізнішої пам'яті.
keywords:
  - Руїна
  - Правобережжя
  - Острозька угода
  - козацькі вольності
vocabulary:
  - гетьман-претендент
  - протекція
  - вольності
constraints:
  - Не називати Ханенка «польською маріонеткою» або національним героєм без джерельної кваліфікації.
  - Не подавати непевні дати народження, смерті або урядів як встановлені.
