warning: >-
  Чотири прямі джерела збігаються з планом і реєстром; два українські читання
  мігровано на strict-v2, два англомовні документи Апостольської столиці
  лишаються підтвердженням конфесійного статусу. Розбіжності про дату
  візитаторства та назву дорученої території (ЕСУ — Волинь і Підляшшя;
  синодальна довідка — Волинь і Полісся; офіційна життєписна нота Апостольської
  столиці — змішана атрибуція 1926/Полісся; перелік беатифікацій Апостольської
  столиці — екзарх Волині й Підляшшя) і довжину строку (ЕСУ та життєписна нота
  — шість років; синодальна довідка — десять) зафіксовано з атрибуцією, без
  розв'язання голосуванням більшості. Портативний ремонт (17 липня 2026 року):
  статтю ВУЕ «Миколай Чарнецький, єпископ» вилучено — стабільний код 403 при
  прямому запиті й через архівний знімок, без портативної заміни; роль основного джерела
  фактичного матеріалу перейшла до синодальної довідки, яка незалежно охоплює
  той самий обсяг фактів.
