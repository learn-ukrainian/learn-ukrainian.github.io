  text: "1. Літературні та взагалі історичні епохи важко\r\nпочинати певною датою.\
    \ Початок нової української літератури все ж звичайно\r\nдатують роком 1798, роком\
    \ виходу в світ „Енеїди“ Котляревського. Цю дату\r\nвстановлено з повним правом:\
    \ вихід „Енеїди“ був початком ужитку народної\r\nукраїнської мови як літературної\
    \ мови. Запровадження живої народної мови\r\nдо літератури зовсім не обов’язкове;\
    \ серед слов’ян з такою послідовністю, як в українців\r\nприйнято народну мову\
    \ за літературну лише у словінців та білору"
