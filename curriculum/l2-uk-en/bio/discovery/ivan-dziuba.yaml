  text: "125 \nзнищенню української національної культури. В тексті «Інтер-\nнаціоналізм\
    \ чи русифікація?» Іван Дзюба вдається до пояснення мотивів \nпраці як «українець,\
    \ відданий справі комуністичного будівництва, має \nвсі підстави бути неспокійним\
    \ за долю своєї національності, а раз так – \nніхто у світі не в силі заборонити\
    \ йому про це говорити». Він доводив, \nщо Компартія ще за часів Йосифа Сталіна\
    \ перейшла на позиції \nросійського великодержавного шовінізму, вважав, що політика\
    \ КПРС \nстосовно України супе"
  section_title: Сторінка 126
  grade: 11
  author: hlibovska
  page: ''
  trust_tier: 1
- score: 0.3333333432674408
  chunk_id: 11-klas-istoriya-ukr-galimov-2024_s0198
  text: "Так, І. Дзюба \nпіддав критиці наявну дискримінацію українського \nнароду\
    \ в  економічній, політичній, культурній, \nмовній та інших сферах, примарну ідею\
    \ майбут-\nнього злиття націй за комунізму, уявлення про \n«цивілізаторську» роль\
    \ російського народу щодо \nнародів у  складі СРСР, твердження про добровіль-\n\
    ність «входження» народів до складу радянської \nімперії в  період її виникнення\
    \ та розширення. У грудні 1965  р. І. Дзюба звернувся до П. Ше-\nлеста та В. Щербицького\
    \ з  листом-протестом проти \nпер"
  section_title: Сторінка 110
  grade: 11
  author: galimov
