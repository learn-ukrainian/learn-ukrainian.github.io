  text: "Помер у 2022 році. Іван Дзюба про працю «Інтернаціоналізм чи русифікація?»:\
    \ \n«Тут лише скажу, що я ніколи не розглядав свою працю як \nконспіративну, не\
    \ крився з нею, від самого початку бачив її як \nпризначену не лише для офіційного\
    \ адресата, а й для ширшої \nгромадськості, – тому не заперечував проти її поширення\
    \ «самвидавом». І гадки не мав, що згодом її оголосять – заднім числом! – \n«антирадянською»:\
    \ адже я керувався тільки бажанням добра своїм \nземлякам і співвітчизникам, усьому\
    \ нашому суспіль"
  section_title: Сторінка 172
  grade: 11
