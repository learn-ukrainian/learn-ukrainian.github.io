  text: "Статтю чи брошуру Івана Дзюби «Інтернаціоналізм чи\r\nрусифікація?», що ходила\
    \ у «самвидаві», читало небагато людей, але вплив її на\r\nкультурну і політичну\
    \ самосвідомість української інтелігенції був колосальний.\r\nВперше перед нею\
    \ було поставлене питання про культуру національних почуттів,\r\nвперше українська\
    \ національна самосвідомість набула гуманістичного змісту,\r\nвтраченого після\
    \ сповнених надії днів української революції 1917 року. Тим, хто\r\nне жив у часи,\
    \ коли влада добивалася обмеження україн"
