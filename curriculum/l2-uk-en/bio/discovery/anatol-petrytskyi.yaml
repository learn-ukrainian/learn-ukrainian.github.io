  text: "Щоб успішно розвивати свої задатки та здібності, треба не тільки \nмати для\
    \ цього певні можливості, а й знати, як це слід робити. \nНеобхідно ще й знати,\
    \ які саме задатки та здібності слід розвивати. \nСеред них є очевидні, наприклад\
    \ музикальні або математичні, які \nпроявляються одразу й наявність яких у людини\
    \ ні в кого не викли­\nкає сумнівів. Але є й такі, що виявляються не відразу.\n\
    Дуже важливо навчитися самому правильно визначати свої задат­\nки й нахили, об’єктивно\
    \ оцінювати їх у тій чи іншій г"
