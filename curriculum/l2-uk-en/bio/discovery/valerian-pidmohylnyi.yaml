  text: "85\nВалер’ян Підмогильний\n Розгляньте  світлини м. Києва й виконайте завдання.\n\
    А.\t Коротко опишіть світлини.\nБ.\t Чи можна сказати, що краєвиди міста відображають\
    \ сутність людей, які його \nбудували?\nВ.\t На якій світлині людина ближче до\
    \ природи? Чи позначається ця особливість \n(близькість до природи) на характері\
    \ людини?\nПрочитавши життєпис В. Підмогильного, складіть перелік творчих здобутків\
