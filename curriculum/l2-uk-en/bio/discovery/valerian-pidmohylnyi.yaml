  text: "91\nВалер’ян Підмогильний\nтян. Він періодично згадує село, доля знову зводить\
    \ його з Надійкою, але на \nмить, щоб хлопець відчув, що справжнє він давно втратив,\
    \ а його здобутки — то \nпримарний успіх: «Що більше Степан свою кімнату встатковував,\
    \ то чужішою \nвона йому була». Так, Степан став одним з найуспішніших письменників\
    \ краї-\nни, він ніби й підкорив місто (у фінальній сцені місто «покірно лежало\
    \ внизу»), \nпроте воно не дало йому найголовнішого — душевного комфорту. \nПерегляньте\
    \ програму  «Вели"
  section_title: Сторінка 91
