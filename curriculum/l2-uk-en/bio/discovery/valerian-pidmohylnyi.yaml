  text: "Прозове розмаїття 1920‑х років . Валер’ян Підмогильний . як бути людиною?\
    \ (Роман «Місто»)   101\nПізніше Степанова мета змінюється: тепер він \nхоче\
    \ стати завойовником міста. Городян — «кра­\nмарів, безглуздих вчителів, безжурних\
    \ з дурощів \nляльок у пишних уборах», — на його думку, тре-\nба «вимести геть»,\
    \ а в місто має влитися «сві­\nжа кров села», тобто такі сільські хлопці, як він.\
    \ Але з часом і ця мета зазнає змін, хоч герой, \nможливо, їх і не усвідомлює.\
    \ Упродовж дії твору \nвін таки завойовував"
  section_title: Сторінка 101
  grade: 11
  author: borzenko
  page: ''
  trust_tier: 2
- score: 0.1666666716337204
  chunk_id: 9-klas-ukrajinska-mova-voron-2017_s0187
  text: "Щоб успішно розвивати свої задатки та здібності, треба не тільки \nмати для\
    \ цього певні можливості, а й знати, як це слід робити. \nНеобхідно ще й знати,\
    \ які саме задатки та здібності слід розвивати. \nСеред них є очевидні, наприклад\
    \ музикальні або математичні, які \nпроявляються одразу й наявність яких у людини\
    \ ні в кого не викли­\nкає сумнівів. Але є й такі, що виявляються не відразу.\n\
    Дуже важливо навчитися самому правильно визначати свої задат­\nки й нахили, об’єктивно\
    \ оцінювати їх у тій чи іншій г"
