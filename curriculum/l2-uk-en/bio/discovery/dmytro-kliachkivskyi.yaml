warning: >-
  Direct-source packet; тема attribution-critical. Вилучено дві нерозв'язані
  цитати з голою назвою замість URL (Motyka, «From the Volhynian Massacre to
  Operation Vistula»; Snyder, «The Causes of Ukrainian-Polish Ethnic
  Cleansing 1943») і заглушку reading-needed. КЛЮЧОВЕ: жодне з перевірених
  джерел не називає Клячківського автором рішення весни 1943 року й не
  подає письмового наказу — ЕІУ та ЕСУ про антипольську акцію не згадують
  узагалі, а стаття Ільюшина атрибутує рішення Крайовому проводу ОУН(б) на
  Волині як органу. Тому «наказ Клима Савура» не цитується й авторство не
  стверджується; водночас насильство не приховане (рішення про вигнання,
  понад 100 поселень 11–13 липня 1943, щонайменше 35 тис. за польськими
  підрахунками). Три розбіжності довідників зафіксовано й НЕ усунено: форма
  імені (Роман-Дмитро проти Дмитро-Роман Семенович), дата й місце смерті
  (12.11.1944 біля Орлівських хуторів проти 12.02.1945 побл. с. Суськ) і
  територія провідництва (Пд.-зх. у ЕІУ проти Пн.-Зх. у ЕСУ та в статті про
  УПА тієї самої енциклопедії — ймовірна друкарська помилка). Портрет не
  оголошено: text-only portrait_fallback.
