warning: >-
  Direct-source packet; тема attribution-critical. Вилучено дві нерозв'язані
  цитати з голою назвою замість URL (Motyka, «From the Volhynian Massacre to
  Operation Vistula»; Snyder, «The Causes of Ukrainian-Polish Ethnic
  Cleansing 1943») і заглушку reading-needed. КЛЮЧОВЕ (авторство): жодне з
  перевірених джерел не називає Клячківського автором рішення весни 1943 року
  й не подає письмового наказу — стаття Ільюшина атрибутує рішення Крайовому
  проводу ОУН(б) на Волині як органу. Тому «наказ Клима Савура» не цитується
  й авторство не стверджується; водночас насильство не приховане (рішення про
  вигнання, понад 100 поселень 11–13 липня 1943, щонайменше 35 тис. за
  польськими підрахунками). ОКРЕМО (особиста причетність): ЕСУ подає пряме
  твердження про особу — «Водночас є причетним до необґрунтованих репресій
  щодо вояків УПА та цивільного (українського і польського) населення» — і це
  свідчення НЕСТИ з атрибуцією ЕСУ, у його формулюванні, без розширення до
  авторства чи наказу й без звуження адресата. Попереднє формулювання, ніби
  «ЕІУ та ЕСУ про антипольську акцію не згадують узагалі», було ХИБНИМ щодо
  ЕСУ — виправлено; про антипольську акцію та наказ не згадує саме стаття ЕІУ.
  Чотири розбіжності довідників зафіксовано й НЕ усунено: форма імені
  (Роман-Дмитро проти Дмитро-Роман Семенович), початок крайового провідництва
  (січ. 1942 за ЕСУ проти січ. 1943 за ЕІУ), дата й місце смерті (12.11.1944
  біля Орлівських хуторів проти 12.02.1945 побл. с. Суськ) і територія
  провідництва (Пд.-зх. у ЕІУ проти Пн.-Зх. у ЕСУ та в статті про УПА тієї
  самої енциклопедії — ймовірна друкарська помилка). Портрет не оголошено:
