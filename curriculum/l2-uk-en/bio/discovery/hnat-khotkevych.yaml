    Народився 31.12.1877 р. в Харкові, де минула більша частина його життя. У 1900 р. закінчив
    місцевий технологічний інститут. Уже в студентські роки зайнявся культурно-освітньою діяльністю
    на селі, опанувавши гру на бандурі. Коли став контактувати з членами Української соціал-
    демократичної партії, це викликало підозри властей, у 1899-му його на рік виключили з інституту.

    У 1905 р. взяв активну участь у революційних подіях, відтак змушений був емігрувати до Галичини.
    Подорожуючи Галичиною і Букови
