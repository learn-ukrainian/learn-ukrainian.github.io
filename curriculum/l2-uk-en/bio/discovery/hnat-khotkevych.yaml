    ГНАТ ХОТКЕВИЧ

    (1877 — 1938)

    Хоткевич Гнат Мартинович народився 31 грудня 1877р. в Харкові, де минула більша частина його
    життя. 1900р. закінчив місцевий технологічний інститут. Ще в студентські роки включився в
    культурно-освітню діяльність на селі, віртуозно опанувавши гру на бандурі. Разом з О.
    Матюшенком, майбутнім організатором повстання на панцернику "Потемкин", влаштовував вистави,
    їздив місцями козацької слави. Зрештою, увійшов у контакти із членами Української соціал-
    демократичної парті
