topic: Дем'ян Многогрішний — Глухівські статті, змова і сибірське заслання
query_keywords:
  - Дем'ян Многогрішний
  - Глухівські статті 1669
  - Батуринська змова 1672
objectives:
  - Пояснити, що змінили й чого не скасували Глухівські статті.
  - Розрізняти політичне звинувачення, слідство і документований примус.
outline:
  - Чернігівський полковник і рада в Глухові.
  - Договірні обмеження та внутрішня політика.
  - Змова, ув'язнення, заслання і служба в Селенгінську.
keywords:
  - Гетьманщина
  - воєвода
  - старшина
  - заслання
vocabulary:
  - полковник
  - воєвода
  - залога
constraints:
  - Не трактувати формулу «зрада» як доведений опис політичної справи.
  - Не описувати Глухівські статті як відновлення повного суверенітету.
