  ДОДАНО АКАДЕМІЧНЕ ДЖЕРЕЛО: статті ЕСУ чи ЕІУ саме про Ромжу цільовий пошук
  не дав, натомість адоптовано статтю ЕСУ «Мукачівська греко-католицька
  єпархія» (Кічера В. В., Т. 22, 2020) — вона подає інституційний контекст і
  світське академічне формулювання про загибель: «1947 його вбили співроб.
  рад. спецслужб». Це окреме опубліковане формулювання; назва видавця сама
  собою не доводить незалежного походження доказів. ВІДХИЛЕНО: vue.gov.ua (Велика
  українська енциклопедія) — сервер віддав HTTP 403, документа не прочитано.
  РОЗБІЖНОСТІ ЗАФІКСОВАНО, НЕ УСУНЕНО.
  (а) ДАТА СМЕРТІ — і джерело, яке саме пояснює розбіжність. [S1] подає
  офіційною датою 31 жовтня 1947 року й прямо розбирає походження іншої:
  «У різних медіа та ЗМІ можна зустріти іншу дату смерті Теодора Ромжі —
  1 листопада. Плутанина пов'язана з тим, що смерть настала о 00:50 год. за
  московським часом, який тоді був офіційний у державних установах, і саме за
  цим часом велися історії хвороб»; далі [S1] пояснює, що за незалежної
  України прийнято дату 31 жовтня. [S3] подає смерть 1 листопада 1947 року,
  а [S5] — отруєння 1 листопада 1947 року, що прямо конфліктує з датою
  отруєння 31 жовтня в [S1]. [S4] подає лише рамку «(1911-1947)». Дат НЕ
  зведено; курс подає кожну з атрибуцією. ОКРЕМО ЗАФІКСОВАНО ВНУТРІШНЮ
  НЕПОСЛІДОВНІСТЬ [S1]: довідкова
  шапка тієї самої сторінки подає «Помер 1 листопада 1947 року», тобто ту
  дату, яку текст нижче називає наслідком плутанини.
  (б) ТИТУЛ — ДЖЕРЕЛО-СПЕЦИФІЧНИЙ КОНФЛІКТ, ОБИДВІ СТОРОНИ ЗАРЕЄСТРОВАНІ:
  [S1] (сторінка про Ромжу особисто) подає «новопоставлений титулярний
  єпископ Аппійскій, єпископ-помічник Мукачівський», тобто помічника.
  [S5] — зведена сторінка Синоду про новомучеників 27 червня
  (https://synod.ugcc.ua/data/27-chervnya-ukraynska-greko-katolytska-tserkva-vshanovue-pamyat-novomuchenykiv-istoriy-svyatosti-9451/,
  та сама сторінка, що в цьому когорті адоптована як [S3] для zynovii-kovalyk)
  — подає «24 вересня 1944 р. хіротонізований на владику-ординарія
  Мукачівської єпархії ГКЦ». [S5] ДОДАНО ДО АДОПТОВАНОГО НАБОРУ ДЛЯ ЦЬОГО
  ТИТУЛУ ТА ЙОГО ТВЕРДЖЕННЯ ПРО ОТРУЄННЯ 1 ЛИСТОПАДА; роль обмежена цими
  двома позиціями, воно НЕ використовується як загальна біографія. Раніше
  титульна розбіжність описувалася як
  «зведена церковна довідка» без адреси й без реєстрації джерела — це
  виправлено. Помічник і ординарій — різні уряди; версії не обрано, курс
  пише «єпископ». ЕСУ подає третю рамку: «у вересні 1944 Рим передав
  адміністрацію єпархії єпископові Т. Ромжі».
  (в) РІВНІ СВІДЧЕННЯ ПРО ЗАМАХ 27 жовтня 1947 року: [S1] кваліфікує його як
  «заздалегідь спланований НКВС замах»; ЕСУ атрибутує вбивство «співроб. рад.
  спецслужб» без назви відомства; [S3] пише «the Soviets attempted to kill».
  Три формулювання подано як три, а не як один доведений ряд; назва
  відомства (НКВС) НЕ стверджується від імені курсу.
  (г) ПОІМЕННА АТРИБУЦІЯ ІСНУЄ — АЛЕ В МЕМУАРІ, НЕ В АРХІВІ. Повне читання
  [S1] виправило висновок першого проходу, ніби виконавців не названо ніде.
  Довідка цитує мемуари офіцера радянської держбезпеки Павла Судоплатова
  «Спецоперации» (джерело вказано в дужках у самому тексті), і в цитованому
  уривку названо: Хрущова як ініціатора «таємницею фізичної розправи»,
  згоду Сталіна знищити «терористичне гніздо» Ватикану, Савченка як
  організатора автомобільної аварії, Майрановського — «начальник
  токсикологічної лабораторії, з наказом ліквідувати Ромжу», ампулу з
  отрутою кураре й медсестру-агента, яка «зробила смертельний укол», а також
  підвищення Савченка по операції. Курс НЕ переписує це як установлений факт
  і НЕ називає виконавців від власного імені: мемуар учасника каральної
  системи — окремий клас свідчення, з власним інтересом подати операцію
  компетентною. ВНУТРІШНЯ СУПЕРЕЧНІСТЬ ЦИТАТИ ЗАФІКСОВАНА: за мемуаром
  пораненого Ромжу «доставлений в одну з лікарень Ужгорода», тоді як решта
  [S1] і свідчення очевидиці подають Мукачівську лікарню. Слідчих документів,
  вироку чи архівної справи жодним із проходів НЕ отримано.
  (ґ) СВІДЧЕННЯ ОЧЕВИДИЦІ: [S1] подає слово с. Теофіли Манайло, ЧСВВ
  («очевидиця та учасниця подій»), яка датує привезення до Мукачівської
  лікарні понеділком 27 жовтня 1947 року о 12 год. 30 хв і називає інших
  потерпілих — о. Даниїла Бачинського (тяжко поранений), о. Андрія Березная,
  теологів Михаїла Бугіря і Михаїла Маслея та скаліченого селянина-кучера.
  Замах покалічив не лише єпископа, і це в статті сказано.
  ЛОКАЛІЗОВАНІ ЦИТАТИ (наводяться, бо мають локатор на [S1]): єпископське
  гасло «Полюблю Тя, Господи, кріпосте моя, Господь, утвердження моє і
  прибіжище моє» (Пс. 17, 2); лист до ректора Русікуму «Пора би, врешті,
  покінчити зі старою, дряхлою традицією…»; число прочан на Успіння —
  83 тисячі, з них три тисячі православних і 80 тисяч католиків.
  МОВА: дві ватиканські сторінки англомовні — референси, НЕ учнівські
  читання; учнівські читання тільки українськомовні (Синод, ЕСУ). Портрет не
  оголошено: text-only portrait_fallback.
