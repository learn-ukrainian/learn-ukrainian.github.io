  synod.ugcc.ua/data/v-ivachevi-gorishnomu-vidbulosya-svyatkuvannya-120-richchya-
  vid-dnya-narodzhennya-blazhennogo-zenona-kovalyka-12858/ — жива, але це
  репортаж про сільське святкування 120-річчя; біографічних даних (дати
  народження, обітів, свячень, арешту, смерті) вона НЕ подає, тобто
  предметно недостатня як підстава життєпису. Замість неї адоптовано ЕСУ
  (стаття «Ковалик Зеновій», Головин Б. П., Т. 13, 2013) і сторінку Чину
  Найсвятішого Ізбавителя. ВІДХИЛЕНО: catholicencyclopedia.in.ua/zinoviy-
  kovalik-bl — сервер відмовив у з'єднанні (ECONNREFUSED на 443), документа
  не прочитано, тому джерело не адоптовано. РОЗБІЖНОСТІ ЗАФІКСОВАНО, НЕ
  УСУНЕНО. (а) Форма імені: ЕСУ подає «Ковалик Зеновій», ватиканський
  перелік — «Zynovij Kovalyk», церковні джерела вживають і «Зенон», і
  «Зиновій»; жодної форми не оголошено єдино правильною, слуг курсу
  (zynovii-kovalyk) не видається за нормативну форму. (б) Дата смерті: ЕСУ
  подає «26.06.1941, Львів», церковні джерела датують загибель лише 1941
  роком на початку німецько-радянської війни; точної дати НЕ зведено —
  подано атрибутовано. (в) Дата арешту: ЕСУ — «20 грудня 1940»; сторінка
  редемптористів — «вночі з 20 на 21 грудня 1940»; зведена довідка Синоду —
  «Арештовано його у ніч з 20 на 21 грудня 1940 р.», тобто два джерела з
  трьох дають межу двох дат. (г) Вступ до чину: ЕСУ —
  «1925 вступив до монастиря», обіти «у серпні 1926»; редемптористи — перші
  обіти «28 серпня 1926». Обидва ряди подано мовою джерел. (ґ) ДАТА СВЯЧЕНЬ —
  РОЗБІЖНІСТЬ, ВИЯВЛЕНА ПОВНИМ ЧИТАННЯМ СТОРІНКИ (перший реферативний прохід
  її не показав): ЕСУ і редемптористи обидва подають 9 серпня 1932 року,
  натомість зведена довідка Синоду подає «4 вересня 1932 р., рукоположений на
  священика». Різниця в місяці й дні; версії НЕ обрано — зафіксовано, що два
  джерела з трьох дають 9 серпня, а третє — 4 вересня. ЗБІГ, ЯКИЙ ВАРТО
  НАЗВАТИ БЕЗ ВИСНОВКУ ПРО ПОХОДЖЕННЯ: ЕСУ і редемптористи обидва подають
  «економ» як посаду у
  львівському монастирі — попередній переказ, ніби Ковалик був настоятелем
  (ректором) львівського монастиря, НЕ підтверджено жодним перевіреним
  джерелом і не вживається. Окремі видавці та різні інституційні назви самі
  собою НЕ доводять незалежних ланцюгів походження фактів. МОВА:
  ватиканська сторінка англомовна — референс, не учнівське читання. Портрет
