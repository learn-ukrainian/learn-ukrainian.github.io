warning: >-
  Direct-source packet. Вилучено дві нерозв'язані цитати, що мали голу назву
  замість URL (Per Anders Rudling, «The OUN, the UPA and the Holocaust»;
  Grzegorz Rossolinski-Liebe, «Stepan Bandera») — цим проходом їх не
  верифіковано. Чотири розбіжності між ЕІУ та ЕСУ зафіксовано й НЕ усунено:
  початок служби начальником штабу Армії УНР (ЕІУ — від січня 1919; ЕСУ —
  у лютому–червні 1919); польський арешт і звільнення (ЕІУ — лютий 1924 та
  п'ятирічний вирок без дати звільнення; ЕСУ — грудень 1923 і звільнення
  1928); німецький арешт (ЕІУ — під арештом з 1941, Заксенгаузен з 1944;
  ЕСУ — арешт на початку 1944); місце смерті (ЕІУ — лікарня в Кельні; ЕСУ —
  Клерво в Люксембурзі; обидва сходяться на похованні в Люксембурзі). Жодну
  версію в цих чотирьох парах не видавати за встановлену. Спільне для обох
  джерел у німецькому сюжеті — лише сам факт ув'язнення в Заксенгаузені.
  Звільнення наприкінці 1944 року подає ТІЛЬКИ ЕСУ («наприкінці того ж року
  звільнений»); ЕІУ звільнення не згадує взагалі (перевірено 2026-07-17),
  тому спільної тези про звільнення НЕ стверджувати.
  Доарештний період НЕ порожній: ЕСУ подає «Від кінця 1941 перебував у Берліні
  під наглядом та без права вільного переїзду» — це свідчення нести, ширшої
  картини стосунків ОУН(м) з німецькою владою не добудовувати. Дату арешту
  «лютий 1944» з корпусу підручників (Гісем) вилучено: чанк до набору джерел
  пакета не входить (rag_chunks: []), у реєстрі його немає. Опис розколу
  походить з бандерівського боку — однобічність проговорено. Портрет не
  оголошено: text-only portrait_fallback.
