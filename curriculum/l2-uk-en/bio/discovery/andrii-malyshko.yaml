  - chunk_id: 7-klas-ukrlit-zabolotnyi-2024_s0134
    text: |-
      Андрій Малишко народився в місті Обухові на Київщині. Після закінчення
      школи вступив до медичного технікуму, але згодом перейшов до Київського
      інституту народної освіти. Працював учителем, журналістом, а в роки
      Другої світової війни був військовим кореспондентом. Пісні на слова
      Малишка «Київський вальс», «Стежина» і «Вчителько моя» стали народними.
    section_title: Окриленість душі в поезії та прозі
    grade: 7
    author: Заболотний
    page: 89
    trust_tier: 2
  - chunk_id: 7-klas-ukrlit-mishhenko-2015_s0413
    text: |-
      Підручник пропонує назвати прочитані поезії, що стали піснями, і їхніх
      композиторів; пояснити образ стежини; визначити цінності в «Пісні про
      рушник»; проаналізувати метафори у «Стежині». Ці завдання дають перевірену
      педагогічну модель переходу від біографічного контексту до аналізу форми.
    section_title: Розділ 4. Андрій Малишко
