      Мирослав Попович розглядає воєнний цикл «Україно моя!» в ширшому
      контексті української культури періоду Другої світової війни. Він
      зіставляє поезію Малишка з творами Володимира Сосюри, Леоніда
      Первомайського, Максима Рильського й Олександра Довженка та наголошує,
      що тодішній український патріотизм існував у мінливих межах сталінської
      політики мобілізації й контролю.
