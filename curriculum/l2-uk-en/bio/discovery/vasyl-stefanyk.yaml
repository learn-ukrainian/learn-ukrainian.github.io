  text: "У другій половині 90‑х років підготував \nдо друку книжку поезій у прозі,\
    \ але не став публікувати через неприхильні \nвідгуки критиків і видавців. Незважаючи\
    \ на розчарування, не відмовився від \nлітературного покликання. У чернівецькій\
    \ газеті «Праця» за 1897 рік вийшли \nйого новели «Виводили з  села», «Лист»,\
    \ «Побожна», «У корчмі», «Стратився» \nта  інші, що одразу принесли авторові успіх\
