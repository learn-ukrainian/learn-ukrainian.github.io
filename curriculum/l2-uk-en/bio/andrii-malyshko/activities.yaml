    explanation: >-
      Дієслова переходу показують рух від освіти й учителювання через першу
      редакційну роботу та армійську службу до повернення в журналістику, а не
      лише перелічують дати.
  - question: Яка подія належить до воєнного періоду біографії Малишка?
    options:
    - text: Робота військовим кореспондентом
      correct: true
    - text: Навчання в Київському інституті народної освіти
      correct: false
    - text: Депутатство у Верховній Раді УРСР
      correct: false
    - text: Отримання Державної премії СРСР
      correct: false
