---
inline:
- id: chronology-malyshko
  type: quiz
  title: Життєва хронологія
  instruction: Оберіть відповідь, яка правильно відтворює послідовність подій.
  items:
  - question: Що відбулося найраніше?
    options:
    - text: Малишко надрукував перші вірші 1930 року
      correct: true
    - text: Малишко став відповідальним редактором «Дніпра»
      correct: false
    - text: Малишко отримав Шевченківську премію
      correct: false
    - text: Малишко почав депутатську діяльність
      correct: false
    explanation: Перші публікації датовано 1930 роком; інші події належать до 1940–1960-х років.
  - question: Яке продовження правильно завершує речення «Після випуску 1932 року…»?
    options:
    - text: Малишко вчителював в Овручі
      correct: true
    - text: Малишко очолив Агентство преси «Новини»
      correct: false
    - text: Малишко отримав Державну премію СРСР
      correct: false
    - text: Малишко почав працювати військовим кореспондентом
      correct: false
    explanation: Після Київського інституту народної освіти він учителював в Овручі.
  - question: Який ланцюжок найточніше передає ранні переходи між ролями Малишка?
    options:
    - text: навчався — закінчив — учителював — працював у редакції — служив — повернувся до журналістики
      correct: true
    - text: служив — навчався — редагував — учителював — друкувався — повернувся до журналістики
      correct: false
    - text: друкувався — став депутатом — навчався — служив — учителював — працював у редакції
      correct: false
