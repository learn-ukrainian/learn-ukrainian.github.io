inline:
- id: quiz-conflict-map
  type: quiz
  title: Малишко без ярликів
  instruction: Перевір, як модуль тримає разом українську пісенну пам'ять і радянський контекст.
  items:
  - question: Яка рамка найточніше описує біографічну проблему Малишка?
    options:
    - text: Український поет пісенної пам'яті всередині радянських інституцій
      correct: true
    - text: Таємний дисидент із доведеною репресивною справою
      correct: false
    - text: Автор без політичного й інституційного контексту
      correct: false
    - text: Російськомовний радянський пісняр
      correct: false
    explanation: Модуль називає радянську рамку, але центр тримає на українській мові й пісенній пам'яті.
  - question: Чому слово «офіційний» не може бути повним поясненням Малишка?
    options:
    - text: Воно не пояснює, чому українські образи пережили первісну систему
      correct: true
    - text: Бо Малишко не мав жодних публічних посад
      correct: false
    - text: Бо всі його тексти були заборонені
      correct: false
    - text: Бо пісні не мають авторів
      correct: false
    explanation: Офіційність є частиною біографії, але не замінює аналізу мови, образу й рецепції.
  - question: Яку межу доказу треба поважати?
    options:
    - text: Не вигадувати арешт, заслання або справу спецслужб без джерел
      correct: true
    - text: Автоматично називати всіх радянських митців дисидентами
      correct: false
    - text: Замовчувати всі офіційні ролі
      correct: false
    - text: Вважати шкільну пам'ять достатньою біографією
      correct: false
    explanation: Деколонізаційне читання не потребує вигаданої мученицької легенди.
  - question: Що означає пісенна пам'ять у цьому модулі?
    options:
    - text: Перехід авторського тексту в мелодію, виконання і спільне повторення
      correct: true
    - text: Відмову від авторства
      correct: false
    - text: Список офіційних нагород
      correct: false
    - text: Автоматичне копіювання фольклору
      correct: false
    explanation: Пісенна пам'ять тримає разом автора, мелодію, виконавця, слухача й повторення.
  - question: Чому «Пісня про рушник» потребує уважного читання?
    options:
    - text: Її впізнаваність може приховати форму, авторство і історичну складність
      correct: true
    - text: Вона не має стосунку до Малишка
      correct: false
    - text: Вона є безіменним фольклорним текстом без композитора
      correct: false
    - text: Її можна пояснити тільки державною нагородою
      correct: false
    explanation: Канонізація допомагає пам'яті, але може зробити аналіз надто гладким.
- id: true-false-shadow
  type: true-false
  title: Межі доказу і тінь біографії
  instruction: Познач, які твердження відповідають джерельно обережному читанню.
  items:
  - statement: Офіційні посади й нагороди Малишка треба називати прямо.
    correct: true
    explanation: Вони є частиною інституційного контексту, який модуль не приховує.
  - statement: Якщо поет писав українською, його радянський контекст можна не згадувати.
    correct: false
    explanation: Українська мова важлива, але історичні умови публікації й сцени також потрібні.
  - statement: Короткі початки пісень допустимі як сигнали, але довгі цитати не потрібні.
    correct: true
    explanation: Тексти Малишка ще не є вільним матеріалом для довгого відтворення.
  - statement: Малишка слід подавати як доведеного підпільного дисидента.
    correct: false
    explanation: Джерела цього плану не дають такої біографічної рамки.
  - statement: Сентиментальність може приховати питання мови, форми і пам'яті.
    correct: true
    explanation: Тепла емоція не має замінювати аналіз образу й історичного контексту.
workbook:
- id: reading-malyshko-song-memory
  type: reading
  title: 'Читання: пісня, автор і пам''ять'
  source: Навчальний синтез за ЕСУ, Інститутом історії України, ЦДАМЛМ/досьє та плановими джерелами.
  text: >-
    Андрій Малишко став частиною української культурної пам'яті не лише як
    автор окремих віршів, а як поет, чиї тексти переходили в голос. Його
    пісенний канон пов'язаний із Платоном Майбородою, фільмом, радіо,
    концертом, школою і родинним повторенням. Водночас Малишко не був
    автором поза системою: він працював у радянських інституціях, мав
    офіційні ролі й нагороди. Сильне читання не приховує цих фактів, але й
    не дозволяє їм поглинути українську мову, образи матері, дороги, Києва
    і стежини. Так постає не гладка легенда, а складна біографія пісенної
    пам'яті.
  tasks:
  - Визнач головну тезу уривка про авторство і пам'ять.
  - Поясни, чому радянська інституційна рамка не може бути єдиним поясненням.
  - Назви два образи, через які тексти Малишка стали пісенними.
- id: critical-official-frame
  type: critical-analysis
  title: 'Критичний аналіз: офіційність без редукції'
  source_reading: reading-malyshko-song-memory
  target_text: Малишко мав офіційні радянські ролі, але його пісенна спадщина живе як українська мовна пам'ять.
  questions:
  - Як можна назвати офіційний контекст Малишка так, щоб він не став єдиним змістом біографії?
  model_answers:
  - >-
    Варто розділити інституційний статус і культурну тривалість. Офіційні
    ролі, редакторська праця, депутатська діяльність і нагороди показують,
    у якій системі автор працював. Але пісенна пам'ять пояснюється також
    українською мовою, образом матері й дороги, співпрацею з Майбородою,
    виконанням і повторенням. Якщо залишити тільки статус, зникне аналіз
    поезії. Якщо залишити тільки ніжний образ, зникне історична складність.
- id: comparative-malyshko-maiboroda-bilash
  type: comparative-study
  title: 'Порівняння: поет, композитор і пісенна мережа'
  source_reading: reading-malyshko-song-memory
  items_to_compare:
  - Андрій Малишко
  - Платон Майборода
  - Олександр Білаш
  criteria:
  - Яку роль має слово?
  - Яку роль має мелодія?
  - Як радянська інституція стає каналом і обмеженням водночас?
  prompt: >-
    Порівняй Малишка з Майбородою або Білашем. Поясни, чому український
    пісенний канон створюється не однією біографією, а мережею авторів,
    виконавців, інституцій і слухачів.
  model_answer: >-
    Малишко дає пісні поетичний рядок, образ і ритм. Майборода дає
    мелодію, яка переносить цей рядок у голос і публічне виконання. Білаш
    показує іншу композиторську лінію української пісенної пам'яті. У всіх
    випадках радянська інфраструктура може поширювати пісню, але не
    пояснює її тривалість. Тривалість народжується з мови, форми, виконання
    і повторення.
- id: authorial-incipit
  type: authorial-intent
  title: 'Авторський намір: що робить короткий початок?'
  source_reading: reading-malyshko-song-memory
  text_excerpt: Рідна мати моя
  prompt: >-
    Поясни, чому одного короткого початку достатньо для аналізу, а довга
    цитата пісні не потрібна.
  model_answer: >-
    Короткий початок відкриває ключовий образ: мати, звертання, домашня
    пам'ять. Він дозволяє говорити про форму й культурне впізнавання без
    відтворення великого фрагмента захищеного тексту. Довга цитата могла
    б підмінити аналіз копіюванням, а завдання модуля - навчити бачити, як
    образ переходить у пісенну пам'ять.
- id: essay-malyshko-complexity
  type: essay-response
  title: 'Есе: складність без редукції'
  source_reading: reading-malyshko-song-memory
  instruction: Напиши зв'язний аргумент із прикладами з біографії, пісень і контексту.
  prompt: >-
    Чому Андрія Малишка треба читати одночасно як поета української
    пісенної пам'яті і як автора радянської інституційної доби?
  min_words: 250
  model_answer: >-
    Андрія Малишка не можна зводити до одного ярлика, бо його біографія
    поєднує кілька рівнів. З одного боку, він був частиною радянського
    літературного поля: мав офіційні ролі, працював у редакціях, отримував
    відзнаки і діяв у контрольованій культурній системі. Ці факти треба
    називати прямо. З іншого боку, його найвідоміші тексти живуть як
    українська пісенна пам'ять. У співпраці з Платоном Майбородою образи
    матері, рушника, дороги, Києва і стежини перейшли в голос, виконання і
    родинне повторення. Якщо говорити тільки про радянську офіційність, ми
    не зрозуміємо, чому ці пісні пережили свою систему. Якщо говорити тільки
    про теплу емоцію, ми втратимо історичну складність. Тому сильне читання
    тримає разом українську мову, пісенну форму, інституційні компроміси і
    межі доказу.
  peer_review_guidelines: >-
    Чи є теза про подвійний фокус? Чи названо офіційний контекст без
    редукції? Чи є конкретний пісенний приклад і межа доказу?
  rubric:
  - criteria: Теза
    description: Пояснює, чому потрібне подвійне читання.
    points: 3
  - criteria: Докази
    description: Спирається на біографію, пісенну співпрацю і образи.
    points: 4
  - criteria: Нюанс
    description: Не вигадує мученицьку легенду і не стирає офіційність.
    points: 3
