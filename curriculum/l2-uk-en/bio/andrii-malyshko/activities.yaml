- id: voice-ukraino-moya
  type: critical-analysis
  title: Голос у назві «Україно моя!»
  target_text: >-
    Назва «Україно моя!» побудована як пряме звертання. Клична форма називає
    адресата, присвійний займенник створює близькість, а знак оклику підсилює
    інтонаційну напругу.
  questions:
  - Яка граматична форма називає адресата і яку роль виконує займенник «моя»?
  - Порівняйте назву з нейтральною фразою «поезія про Україну». Як змінюються стосунки голосу й адресата?
  - Які інтонації може відкривати знак оклику в цій назві?
  - Чому особисте звертання не означає, що поет писав поза радянською редакційною системою?
  model_answers:
  - >-
    «Україно» — клична форма й ліричний адресат. Займенник «моя» пов'язує
    мовця з адресатом і надає звертанню особистого характеру.
  - >-
    Нейтральна фраза називає тему, але не створює безпосередньої розмови.
    Пряме звертання перетворює Україну на присутнього адресата вислову.
  - >-
    Знак оклику може передавати заклик, біль, присягу, скаргу або поєднання
    кількох регістрів; точний тон розгортається в повному циклі.
  - >-
    Особиста інтонація є рисою поетичної форми, а не ознакою виходу з
    інституційного контексту. Малишко працював у фронтовій пресі радянського часу.
  focus_points:
  - пряме звертання
  - клична форма
  - ліричний адресат
  - історичний контекст

- id: text-structure-rushnyk
  type: critical-analysis
  title: Короткий фрагмент — спостереження перед оцінкою
  instruction: >-
    Проаналізуйте короткий початок «Пісні про рушник». Для ширшого читання
    скористайтеся посиланням у ресурсах і зосередьте відповідь на композиції.
  target_text: «Рідна мати моя…»
  questions:
  - Яке слово називає адресата, а яке пов'язує його з мовцем?
  - Чим порядок слів у фрагменті відрізняється від нейтрального «моя рідна мати»?
  - Які два прочитання інтонації відкриває короткий початок і як продовження може змінити перше враження?
  - 'Побудуйте схему для читання повного тексту: звертання — дія — художня деталь — образ дороги — повтор.'
  model_answers:
  - >-
    Іменник «мати» називає адресата й родинний зв'язок. Займенник «моя»
    пов'язує його з мовцем, а означення «рідна» додає оцінну близькість.
  - >-
    Нейтральна проза частіше поставила б присвійне слово перед означенням та
    іменником. Позиція «моя» після іменника підсилює адресованість фрази й
    залишає на її кінці смисловий наголос.
  - >-
    Порядок слів може створювати довірливе звертання або інтонаційне
    підсилення. Трикрапка тут лише позначає скорочення цитати, а не авторську
    пунктуацію; продовження показує, як початкова інтонація входить у композицію.
  - >-
    Схема відділяє будову композиції від її тлумачення. У повному тексті можна
    позначити кожну ланку, зокрема таку, як конкретна художня деталь, а вже потім пояснювати, як
    повернення звертання пов'язує материнський образ із дорогою.
  focus_points:
  - пряме звертання
  - порядок слів
  - композиційна схема
  - спостереження та інтерпретація

workbook:
- id: reading-malyshko-chronology
  type: reading
  title: Від Обухова до публічного слова
  source: Навчальний біографічний синтез.
  text: >-
    Андрій Малишко народився 14 листопада 1912 року в Обухові. Після
    семирічної школи навчався в медичній профшколі, а 1932 року закінчив
    Київський інститут народної освіти. Учителював в Овручі, працював у
    редакції, служив у Червоній армії в 1934–1935 роках, а після
    демобілізації продовжив журналістську працю. Під час Другої світової
    війни був військовим кореспондентом. У 1944–1947 роках відповідав за
    редагування журналу «Дніпро». Близько ста його ліричних віршів покладено
    на музику; понад тридцять пісень створено з Платоном Майбородою. 17
    грудня 1950 року Малишка обрали депутатом Київської обласної ради; від
    1951 року він був депутатом Верховної Ради УРСР, тому сукупний діапазон
    діяльності у двох органах — 1950–1967 роки.
  tasks:
  - Побудуйте хронологію з восьми подій, не додаючи недатованих причин.
  - Позначте речення, де число є приблизним, і збережіть цю приблизність у переказі.
  - "Об'єднайте події в чотири етапи: освіта, журналістика й війна, редакторство, пісенна та публічна діяльність."
  - Поясніть, який перехід між ролями найбільше змінює адресата слова Малишка.

- id: critical-ukraino-moya
  type: critical-analysis
  title: Спостереження, інтерпретація, перебільшення
  target_text: >-
    1. Назва «Україно моя!» має кличну форму та присвійний займенник. 2. В. П.
    Моренець у статті ЕСУ пов'язує цикл із посиленням українського образного
    світу та розмовної інтонації. 3. Твердження «особистий голос означає повну
    свободу від радянської системи» виходить за межі наведених мовних ознак.
  questions:
  - Класифікуйте кожне речення як мовне спостереження, атрибутовану інтерпретацію або перебільшення.
  - Яке твердження можна перевірити за самою назвою, а яке потребує критичної статті або повного тексту?
  - Переформулюйте друге речення так, щоб авторство критичного судження не зникло.
  - Перепишіть третє речення як історично відповідний висновок без бінарної схеми «свобода або несвобода».
  model_answers:
  - >-
    Перше речення є спостереженням за граматичною формою, друге —
    атрибутованою інтерпретацією В. П. Моренця, третє — перебільшенням, яке
    неправомірно перетворює зміну поетичного голосу на політичний висновок.
  - >-
    Кличну форму «Україно» та займенник «моя» видно в назві. Висновок про
    розвиток образів у циклі потребує повного тексту, а характеристика зміни
    поетики — названої критичної статті.
  - >-
    «В. П. Моренець у статті ЕСУ наголошує, що в циклі посилюються український
    образний світ і розмовна інтонація». Таке речення відділяє джерело оцінки
    від нашого власного спостереження.
  - >-
    «Особистіше звертання змінює поетичний тон, але саме по собі не доводить
    виходу автора з радянського інституційного середовища». Висновок зберігає
    різницю між мовною формою та політичним контекстом.

- id: song-authorship-roles
  type: critical-analysis
  title: Слово, музика, виконання, кіно
  instruction: Розрізніть внесок кожного учасника в культурне життя пісні.
  target_text: >-
    Андрій Малишко створив слова «Пісні про рушник», Платон Майборода — музику.
    Виконавець надає твору конкретного темпу, тембру й фразування, а фільм
    «Літа молодії», знятий 1958 року й випущений у прокат 1959-го, став важливим
    шляхом пісні до широкої аудиторії.
  questions:
  - Яку частину твору створив поет, а яку — композитор?
  - Що може змінити виконавець, не змінюючи авторства слів і музики?
  - Яку роль у поширенні пісні відіграв фільм?
  - Чому широка впізнаваність не перетворює авторську пісню на безіменний фольклор?
  focus_points:
  - автор слів
  - композитор
  - виконавець
  - медійний канал
  model_answers:
  - Малишко відповідає за мовну конструкцію й образи, Майборода — за мелодію та музичну форму.
  - Виконавець обирає темп, тембр, дихання й фразування, створюючи окрему інтерпретацію твору.
  - Фільм увів пісню в екранну ситуацію й допоміг їй дістатися ширшої аудиторії.
  - Популярність означає активну рецепцію, але співавторство поета й композитора зберігається.

- id: public-role-malyshko
  type: critical-analysis
  title: Поет і публічний діяч
  target_text: >-
    17 грудня 1950 року Малишка обрали депутатом Київської обласної ради, а від
    1951 року він був депутатом Верховної Ради УРСР. Його робота включала
    звернення громадян про житло, комунальні питання, податки та господарські потреби.
  questions:
  - Чому радянське депутатство не варто автоматично ототожнювати із сучасним професійним парламентом?
  - Які повсякденні проблеми входили до представницької роботи Малишка?
  - Як ця роль ускладнює образ винятково «ліричного поета-пісняра»?
  - Складіть речення зі сполучником «водночас», яке поєднає поетичну й публічну працю без змішування їхніх функцій.
  model_answers:
  - >-
    Радянські ради мали іншу політичну будову й інші можливості представника,
    тому спільне слово «депутат» не означає тотожної практики.
  - >-
    У зверненнях ішлося про житло, комунальні послуги, податки, господарські
    потреби, помилування та інші повсякденні справи.
  - >-
    Поряд із поетичними книжками й піснями з'являється листування з людьми та
    установами, робота в комісіях і виступи на засіданнях.
  - >-
    Малишко створював тексти з виразним ліричним адресатом, водночас як
    публічний діяч працював зі зверненнями громадян.

- id: essay-many-sided-portrait
  type: essay-response
  title: Багатогранний портрет Андрія Малишка
  instruction: Напишіть 250–300 слів, поєднавши біографічний контекст із аналізом художньої форми.
  prompt: >-
    Як співвіднести воєнну поезію, пісенну співпрацю та офіційні ролі,
    не зводячи Малишка до одного ярлика?
  min_words: 250
  model_answer: >-
    Біографія Андрія Малишка не рухається прямою лінією до однієї знаменитої
    пісні. Після навчання в Києві він учителював в Овручі, працював у газетах,
    служив у Червоній армії, став військовим кореспондентом і відповідальним
    редактором «Дніпра». Кожна роль змінювала ситуацію мовлення: учитель
    звертається до класу, журналіст — до читача, поет — до ліричного адресата.
    У воєнному циклі «Україно моя!» назва вже створює безпосередній зв'язок:
    клична форма й займенник «моя» перетворюють країну з теми на співрозмовника.
    Особиста інтонація, однак, існує всередині радянського воєнного контексту,
    а не поза ним. Інший вимір творчості відкриває співпраця з Платоном
    Майбородою. Малишко створював слова, Майборода — музику, а виконавці
    надавали пісням конкретного темпу, тембру й дихання. Початок «Рідна мати
    моя…» поєднує пряме звертання з незвичним порядком слів: присвійний
    займенник після іменника підсилює адресованість фрази. Повтор і образ дороги
    організовують композицію повного твору. Фільм «Літа молодії» допоміг
    «Пісні про рушник» увійти до широкого культурного обігу, але популярність
    не скасовує авторства поета й композитора. Водночас Малишко мав високі
    радянські відзнаки та тривалу депутатську роль. Він працював зі зверненнями
    громадян про житло, податки й господарські потреби. Ця публічна праця не
    пояснює художньої форми, проте ускладнює образ винятково приватного лірика.
    Пізні книжки додають ще одну перспективу: розмовна мова, образи ремісничого
    й землеробського світу, пряме звертання та народнопісенна інтонація діють не
    лише в текстах, покладених на музику. Отже, пісенність є ширшою рисою
    поетичного письма, а не просто результатом роботи композитора. Вона виникає
    з ритму, повтору, синтаксису й способу будувати близькість з адресатом.
    Тому Малишка варто бачити як поета, редактора й публічного діяча, чия
    культурна тривалість виникає на перетині української мови, пісенної форми,
    музики, виконання, кіно та пам'яті слухачів.
  peer_review_guidelines: >-
    Перевірте, чи є зв'язна хронологія, конкретне спостереження за мовою,
    розрізнення авторських ролей, історичний контекст і цілісна підсумкова теза.
  rubric:
  - criteria: Біографічний синтез
    description: Поєднує освіту, журналістику, війну, пісенну співпрацю та публічні ролі.
