- id: source-levels-ukraino
  type: critical-analysis
  title: Що саме доводить джерело?
  target_text: >-
    ЕСУ оцінює «Україно моя!» як важливу зміну воєнного письма Малишка й
    називає просторозмовну інтонацію, фольклорну етику та мелодійність.
  questions:
  - Яка частина твердження є атрибутованою оцінкою, а не нейтральною датою?
  - Які три формальні ознаки можна перевірити за повним текстом циклу?
  - Що дозволяє припустити сама назва «Україно моя!» і чого вона не доводить?
  - Сформулюйте альтернативне пояснення воєнної зміни без твердження про повну творчу свободу.
  model_answers:
  - >-
    Оцінкою є висновок про важливу зміну й художню силу; його треба
    приписувати авторові статті ЕСУ. Дата видання належить до довідкового шару.
  - >-
    За повним текстом можна перевірити просторозмовну інтонацію, фольклорні
    мовні формули й мелодійну організацію фрази.
  - >-
    Назва показує пряме звертання й високу інтонаційну напругу. Вона не
    встановлює точного регістру, політичного наміру чи реакції всіх читачів.
  - >-
    Війна могла змінити допустимі теми й тон публічного письма, а безпосередній
    досвід загрози — посилити особисту інтонацію. Обидва чинники потребують
    документальної та текстової перевірки.
  focus_points:
  - атрибуція оцінки
  - формальна перевірка
  - альтернативна гіпотеза
  - ступінь певності

- id: text-structure-rushnyk
  type: critical-analysis
  title: Короткий фрагмент — спостереження перед оцінкою
  instruction: >-
    Проаналізуйте короткий звірений початок «Пісні про рушник» без відтворення
    наступних рядків захищеного тексту. Для ширшого читання скористайтеся
    посиланням у ресурсах і не копіюйте великого уривка у відповідь.
  target_text: «Рідна мати моя…»
  questions:
  - Яке слово називає адресата, а яке пов'язує його з мовцем?
  - Чим порядок слів у фрагменті відрізняється від нейтрального «моя рідна мати»?
  - Які дві гіпотези про інтонацію відкриває короткий початок і чому без продовження він не доводить жодної остаточно?
  - 'Побудуйте схему для читання повного тексту: звертання — дія — образ дороги — повтор.'
  model_answers:
  - >-
    Іменник «мати» називає адресата й родинний зв'язок. Займенник «моя»
    пов'язує його з мовцем, а означення «рідна» додає оцінну близькість.
  - >-
    Нейтральна проза частіше поставила б присвійне слово перед означенням та
    іменником. Позиція «моя» після іменника підсилює адресованість фрази й
    залишає на її кінці смисловий наголос.
  - >-
    Порядок слів може відкривати гіпотезу про довірливе звертання або
    інтонаційне підсилення. Трикрапка тут лише позначає скорочення цитати, а не
    авторську пунктуацію; обидві гіпотези треба перевіряти за повним текстом.
  - >-
    Схема відділяє перевірні елементи композиції від їхнього тлумачення. У
    повному тексті треба позначити кожну ланку, а вже потім пояснювати, як
    повернення звертання пов'язує материнський образ із дорогою.
  focus_points:
  - пряме звертання
  - порядок слів
  - композиційна схема
  - спостереження та інтерпретація

workbook:
- id: reading-malyshko-chronology
  type: reading
  title: Від Обухова до публічного слова
  source: Навчальний синтез за ЕСУ та спеціальним дослідженням депутатської діяльності.
  text: >-
    Андрій Малишко народився 14 листопада 1912 року в Обухові. Після
    семирічної школи навчався в медичній профшколі, а 1932 року закінчив
    Київський інститут народної освіти. Учителював в Овручі, працював у
    редакції, служив у Червоній армії в 1934–1935 роках, а після
    демобілізації продовжив журналістську працю. Під час Другої світової
    війни був військовим кореспондентом. У 1944–1947 роках відповідав за
    редагування журналу «Дніпро». Близько ста його ліричних віршів покладено
    на музику; понад тридцять пісень створено з Платоном Майбородою. 17
    грудня 1950 року Малишка обрали депутатом Київської обласної ради; від
    1951 року він був депутатом Верховної Ради УРСР, тому сукупний діапазон
    діяльності у двох органах — 1950–1967 роки. Кожне з цих речень має
    конкретну джерельну опору: енциклопедичну або спеціально-дослідницьку.
  tasks:
  - Побудуйте хронологію з восьми подій, не додаючи недатованих причин.
  - Позначте речення, де число є приблизним, і збережіть цю приблизність у переказі.
  - Визначте, яке твердження потребує формули «за спеціальним дослідженням».
  - Додайте до одного факту обережну інтерпретацію та назвіть, якого документа бракує для її підтвердження.

- id: critical-ukraino-moya
  type: critical-analysis
  title: Воєнний цикл і мова критики
  target_text: >-
    У статті ЕСУ воєнний цикл «Україно моя!» протиставлено значній частині
    довоєнної офіційно-патетичної лірики; автор статті підкреслює
    просторозмовну інтонацію, народну етику й мелодійність.
  questions:
  - Перепишіть тезу так, щоб оцінка мала чітку атрибуцію.
  - Назвіть дві ознаки, які можна перевірити в тексті, і один висновок, для якого потрібне історичне джерело.
  - Поясніть різницю між датою написання 1941 і бібліографічним датуванням 1942 року.
  - Запропонуйте заперечення до періодизації ЕСУ, яке можна перевірити, а не лише проголосити.
  model_answers:
  - >-
    Автор статті ЕСУ вважає цикл «Україно моя!» важливим художнім поворотом
    і пов'язує його з активізацією розмовної та народнопісенної стихії.
  - >-
    У тексті можна перевірити синтаксис прямого звертання й повтори; для
    висновку про зміну меж дозволеного потрібні редакційні або цензурні документи.
  - >-
    1941 може позначати створення циклу, а 1942 — видання чи усталений
    бібліографічний запис. Першодрук потрібен для остаточного уточнення.
  - >-
    Можна перевірити, чи справді формальні ознаки, названі для воєнної поезії,
    відсутні в усіх довоєнних текстах. Один ранній контрприклад уже уточнив би тезу.

- id: source-evaluation-malyshko
  type: critical-analysis
  title: Два джерела — різні межі
  instruction: Оцініть, яку роботу виконує кожне джерело і де висновок треба зупинити.
  target_text: >-
    ЕСУ дає хронологію і розгорнуту оцінку поетичної еволюції. Назва
    спеціальної статті подає 1951–1967 роки, а її основний текст документує обрання до
    Київської обласної ради 17 грудня 1950 року й сукупний діапазон
    депутатської роботи у двох органах 1950–1967 років.
  questions:
  - Яке джерело найкраще підходить для перевірки дат освіти й редакторської роботи?
  - Яке джерело треба цитувати для конкретного депутатського звернення?
  - Чому заголовок 1951–1967 років не скасовує дати 17 грудня 1950 року в основному тексті?
  - Яку оцінку ЕСУ слід перевіряти за повним текстом твору?
  focus_points:
  - відповідність джерела твердженню
  - точна атрибуція
  - розрізнення факту й оцінки
  - названа межа доказу
  model_answers:
  - ЕСУ достатня для базових дат, якщо інше авторитетне джерело не фіксує розбіжності.
  - Конкретне депутатське звернення потребує архівної справи або спеціального дослідження з посиланням на неї.
  - Заголовок стисло називає головний діапазон, а основний текст додає іншу представницьку роль; ці рівні треба цитувати окремо.
  - Тезу ЕСУ про художній поворот воєнної і пізньої лірики треба перевіряти за творами різних періодів.

- id: attribution-deputy-range
  type: authorial-intent
  title: Атрибуція замість мовчазної правки джерела
  text_excerpt: Назва статті подає 1951–1967 роки; основний текст фіксує також обрання 17 грудня 1950 року.
  prompt: >-
    Побудуйте три версії речення: точну атрибуцію заголовка, точну атрибуцію
    уточнення з основного тексту та неприпустиме змішування двох дат. Поясніть,
    чому формула «основний текст уточнює» не виправляє назву статті.
  model_answer: >-
    Точно про заголовок: «Стаття має назву “Депутатська діяльність Андрія
    Малишка (1951–1967 рр.)”». Точно про зміст: «основний текст статті фіксує
    обрання до Київської обласної ради 17 грудня 1950 року». Неточно було б
    приписати самій назві діапазон 1950–1967. Формула «основний текст уточнює»
    зберігає обидва рівні джерела й не редагує його бібліографічних даних.

- id: essay-evidence-portrait
  type: essay-response
  title: Доказовий портрет Андрія Малишка
  instruction: Напишіть 250–300 слів і подайте список використаних джерел після тексту.
  prompt: >-
    Як співвіднести воєнну поезію, пісенну співпрацю та офіційні ролі,
    не зводячи Малишка до одного ярлика?
  min_words: 250
  model_answer: >-
    Доказовий портрет Малишка починається з хронології, а не з виправдання чи
    обвинувачення. ЕСУ фіксує його освіту, учителювання, армійську службу,
    журналістику, фронтову кореспонденцію та редакторство. Та сама стаття
    пропонує критичну періодизацію: офіційна патетика частини ранніх текстів,
    воєнний поворот «Україно моя!» й пізніше посилення розмовної,
    народнопісенної мови. Цю оцінку треба перевіряти за творами. Іншу лінію
    становить співпраця з Платоном Майбородою: приблизно сто віршів Малишка
    було покладено на музику, а понад тридцять пісень вони створили разом.
    Короткий початок «Рідна мати моя…» дає змогу перевірити пряме звертання й
    порядок слів, але не замінює читання повного тексту. Хоча поет мав високі
    радянські відзнаки й депутатську роль, ці факти не визначають художньої
    вартості. Спеціальне дослідження також показує, що назва з діапазоном
    1951–1967 років і дата обрання до обласної ради 1950 року описують різні
    рівні депутатської хронології. Отже, найточніше
    бачити Малишка як українського поета й публічного діяча, різні сторони
    якого потребують різних доказів. Архівна довідка ЦДАМЛМ додає ще одну
    межу: вона підтверджує особовий фонд № 22, п'ять описів і 1017 одиниць
    зберігання, але не дозволяє приписувати зміст непрочитаній справі.
    Пісенний вимір також потребує розрізнення ролей: Малишко створив слова,
    Майборода — музику, а фільм «Літа молодії» став одним із каналів широкого
    звучання «Пісні про рушник». Це не робить твір безіменним фольклором і не
    доводить однакової реакції всіх аудиторій. Тому підсумкова теза має
    поєднати хронологію, конкретне спостереження за формою та атрибутовану
    оцінку. Альтернативне пояснення слід назвати прямо: тривалість пісні може
    залежати не лише від її образів, а й від мелодії, виконань, кіно та родинної
    пам'яті. Жодна з цих ліній окремо не вичерпує постаті поета.
  peer_review_guidelines: >-
    Перевірте, чи є атрибуція ЕСУ/спеціального дослідження, конкретне спостереження, маркер
    поступки, альтернативне пояснення та чітко названа межа доказу.
  rubric:
  - criteria: Джерельна точність
    description: Розрізняє енциклопедичний факт, атрибутовану оцінку й інтерпретацію.
    points: 4
  - criteria: Аналіз форми
    description: Спирається на конкретну ознаку короткого фрагмента або композиційну схему повного тексту.
    points: 3
  - criteria: Аргумент і поступка
    description: Формулює тезу, альтернативу та межу без готового ярлика.
    points: 3
