- id: source-levels-ukraino
  type: critical-analysis
  title: Що саме доводить джерело?
  target_text: >-
    ЕСУ оцінює «Україно моя!» як важливу зміну воєнного письма Малишка й
    називає просторозмовну інтонацію, фольклорну етику та мелодійність.
  questions:
  - Яка частина твердження є атрибутованою оцінкою, а не нейтральною датою?
  - Які три формальні ознаки можна перевірити за повним текстом циклу?
  - Що дозволяє припустити сама назва «Україно моя!» і чого вона не доводить?
  - Сформулюйте альтернативне пояснення воєнної зміни без твердження про повну творчу свободу.
  model_answers:
  - >-
    Оцінкою є висновок про важливу зміну й художню силу; його треба
    приписувати авторові статті ЕСУ. Дата видання належить до довідкового шару.
  - >-
    За повним текстом можна перевірити просторозмовну інтонацію, фольклорні
    мовні формули й мелодійну організацію фрази.
  - >-
    Назва показує пряме звертання й високу інтонаційну напругу. Вона не
    встановлює точного регістру, політичного наміру чи реакції всіх читачів.
  - >-
    Війна могла змінити допустимі теми й тон публічного письма, а безпосередній
    досвід загрози — посилити особисту інтонацію. Обидва чинники потребують
    документальної та текстової перевірки.
  focus_points:
  - атрибуція оцінки
  - формальна перевірка
  - альтернативна гіпотеза
  - ступінь певності

- id: listening-rushnyk
  type: critical-analysis
  title: Слухання 0:00–1:05 — спостереження перед оцінкою
  instruction: >-
    Дмитро Гнатюк, «Пісня про рушник», музика Платона Майбороди, слова Андрія
    Малишка: https://www.youtube.com/watch?v=6RAJPVmxbrA. Метадані
    завантажувача називають Майбороду піаністом; це окрема атрибуція каналу.
  target_text: Прослухайте відтинок 0:00–1:05 двічі й запишіть часові позначки.
  questions:
  - Коли завершується інструментальний вступ і входить голос?
  - Де ви чуєте завершення першої великої мелодійно-синтаксичної фрази?
  - Яка конструкція повторюється і що змінюється під час повтору?
  - Запропонуйте дві інтерпретації функції повтору й назвіть сильнішу опору для кожної.
  model_answers:
  - >-
    Відповідь має містити часову позначку й опис почутого, а не здогад про
    композиторський намір. Точна секунда може трохи різнитися через спосіб
    відліку заставки.
  - >-
    Слухач називає момент каденційного або дихального завершення і пояснює,
    чи збігається він зі смисловою межею. Нотний термін не потрібен без партитури.
  - >-
    Треба описати повторювану фразу, зміну гучності, дикції, дихання або
    фортепіанного супроводу. Сам повтор є спостереженням; його значення — інтерпретацією.
  - >-
    Повтор може посилювати особисте звертання або надавати йому ритуальної
    ваги. Обидві версії прийнятні, якщо спираються на названу мить запису.
  focus_points:
  - часова позначка
  - дикція і дихання
  - голос і супровід
  - спостереження та інтерпретація

workbook:
- id: reading-malyshko-chronology
  type: reading
  title: Від Обухова до публічного слова
  source: Навчальний синтез за ЕСУ, прийнятим досьє та спеціальним дослідженням депутатської діяльності.
  text: >-
    Андрій Малишко народився 14 листопада 1912 року в Обухові. Після
    семирічної школи навчався в медичній профшколі, а 1932 року закінчив
    Київський інститут народної освіти. Учителював в Овручі, працював у
    редакції, служив у Червоній армії в 1934–1935 роках, а після
    демобілізації продовжив журналістську працю. Під час Другої світової
    війни був військовим кореспондентом. У 1944–1947 роках відповідав за
    редагування журналу «Дніпро». Близько ста його ліричних віршів покладено
    на музику; понад тридцять пісень створено з Платоном Майбородою. У
    1951–1967 роках Малишко виконував депутатські функції, а ЕІУ повідомляє
    про його виступ проти політичних арештів у травні 1966 року. Кожне з цих
    речень має різну джерельну опору: енциклопедичну, архівно-дослідницьку
    або вузько атрибутовану.
  tasks:
  - Побудуйте хронологію з восьми подій, не додаючи недатованих причин.
  - Позначте речення, де число є приблизним, і збережіть цю приблизність у переказі.
  - Визначте, яке твердження потребує формули «ЕІУ повідомляє».
  - Додайте до одного факту обережну інтерпретацію та назвіть, якого документа бракує для її підтвердження.

- id: critical-ukraino-moya
  type: critical-analysis
  title: Воєнний цикл і мова критики
  target_text: >-
    У статті ЕСУ воєнний цикл «Україно моя!» протиставлено значній частині
    довоєнної офіційно-патетичної лірики; автор статті підкреслює
    просторозмовну інтонацію, народну етику й мелодійність.
  questions:
  - Перепишіть тезу так, щоб оцінка мала чітку атрибуцію.
  - Назвіть дві ознаки, які можна перевірити в тексті, і один висновок, для якого потрібне історичне джерело.
  - Поясніть різницю між датою написання 1941 і бібліографічним датуванням 1942 року.
  - Запропонуйте заперечення до періодизації ЕСУ, яке можна перевірити, а не лише проголосити.
  model_answers:
  - >-
    Автор статті ЕСУ вважає цикл «Україно моя!» важливим художнім поворотом
    і пов'язує його з активізацією розмовної та народнопісенної стихії.
  - >-
    У тексті можна перевірити синтаксис прямого звертання й повтори; для
    висновку про зміну меж дозволеного потрібні редакційні або цензурні документи.
  - >-
    1941 може позначати створення циклу, а 1942 — видання чи усталений
    бібліографічний запис. Першодрук потрібен для остаточного уточнення.
  - >-
    Можна перевірити, чи справді формальні ознаки, названі для воєнної поезії,
    відсутні в усіх довоєнних текстах. Один ранній контрприклад уже уточнив би тезу.

- id: source-evaluation-malyshko
  type: critical-analysis
  title: Три джерела — три межі
  instruction: Оцініть, яку роботу виконує кожне джерело і де висновок треба зупинити.
  target_text: >-
    ЕСУ дає хронологію і розгорнуту оцінку поетичної еволюції. ЕІУ фіксує
    громадський контекст і повідомляє про травень 1966 року. Спеціальна стаття
    досліджує депутатську роботу 1951–1967 років за архівними справами та пресою.
  questions:
  - Яке джерело найкраще підходить для перевірки дат освіти й редакторської роботи?
  - Яке джерело треба цитувати для конкретного депутатського звернення?
  - Чому повідомлення про 1966 рік не встановлює мотиву поета?
  - Яку оцінку ЕСУ слід перевіряти за повним текстом твору?
  focus_points:
  - відповідність джерела твердженню
  - точна атрибуція
  - розрізнення факту й оцінки
  - названа межа доказу
  model_answers:
  - ЕСУ достатня для базових дат, якщо інше авторитетне джерело не фіксує розбіжності.
  - Конкретне депутатське звернення потребує архівної справи або спеціального дослідження з посиланням на неї.
  - Без тексту виступу ЕІУ не дозволяє встановити мотив, масштаб або наслідки епізоду.
  - Тезу ЕСУ про художній поворот воєнної і пізньої лірики треба перевіряти за творами різних періодів.

- id: attribution-may-1966
  type: authorial-intent
  title: Атрибуція замість психологічного сюжету
  text_excerpt: ЕІУ повідомляє про виступ проти політичних арештів у травні 1966 року.
  prompt: >-
    Побудуйте три версії речення: нейтральний факт із атрибуцією, обережну
    інтерпретацію та неприпустиме перебільшення. Поясніть, який мовний маркер
    змінює ступінь певності.
  model_answer: >-
    Нейтрально: «ЕІУ повідомляє, що в травні 1966 року Малишко виступив проти
    політичних арештів». Обережна інтерпретація: «цей епізод можна читати як
    публічний жест солідарності, однак доступний пакет не подає тексту виступу».
    Перебільшенням було б оголосити на цій підставі всю біографію підпільною
    боротьбою. Формули «можна читати» й «однак» позначають гіпотезу та її межу.

- id: essay-evidence-portrait
  type: essay-response
  title: Доказовий портрет Андрія Малишка
  instruction: Напишіть 250–300 слів і подайте список використаних джерел після тексту.
  prompt: >-
    Як співвіднести воєнну поезію, пісенну співпрацю, офіційні ролі та
    повідомлений жест 1966 року, не зводячи Малишка до одного ярлика?
  min_words: 250
  model_answer: >-
    Доказовий портрет Малишка починається з хронології, а не з виправдання чи
    обвинувачення. ЕСУ фіксує його освіту, учителювання, армійську службу,
    журналістику, фронтову кореспонденцію та редакторство. Та сама стаття
    пропонує критичну періодизацію: офіційна патетика частини ранніх текстів,
    воєнний поворот «Україно моя!» й пізніше посилення розмовної,
    народнопісенної мови. Цю оцінку треба перевіряти за творами. Іншу лінію
    становить співпраця з Платоном Майбородою: приблизно сто віршів Малишка
    було покладено на музику, а понад тридцять пісень вони створили разом.
    Конкретний запис Дмитра Гнатюка дозволяє спостерігати фразування, повтор і
    взаємодію голосу із супроводом, але не дає доступу до всього авторського
    наміру. Хоча поет мав високі радянські відзнаки й депутатську роль, ЕІУ
    повідомляє про його виступ проти політичних арештів у травні 1966 року.
    Однак одного епізоду недостатньо для історії підпільного опору, так само
    як премії недостатньо для висновку про художню вартість. Отже, найточніше
    бачити Малишка як українського поета й публічного діяча, різні сторони
    якого потребують різних доказів.
  peer_review_guidelines: >-
    Перевірте, чи є атрибуція ЕСУ/ЕІУ, конкретне спостереження, маркер
    поступки, альтернативне пояснення та чітко названа межа доказу.
  rubric:
  - criteria: Джерельна точність
    description: Розрізняє енциклопедичний факт, атрибутовану оцінку й інтерпретацію.
    points: 4
  - criteria: Аналіз форми або запису
    description: Спирається на конкретну ознаку тексту чи часову позначку виконання.
    points: 3
  - criteria: Аргумент і поступка
    description: Формулює тезу, альтернативу та межу без готового ярлика.
    points: 3
