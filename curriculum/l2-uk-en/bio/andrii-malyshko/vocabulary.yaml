---
- lemma: хронологія
  translation: chronology
  pos: noun
  usage: Хронологія відділяє 1930 рік першої публікації від пізніших посад і премій.
- lemma: фронтовий кореспондент
  translation: war correspondent
  pos: noun phrase
  usage: Під час війни Малишко працював фронтовим кореспондентом у кількох газетах.
- lemma: відповідальний редактор
  translation: responsible editor
  pos: noun phrase
  usage: У 1944–1947 роках Малишко був відповідальним редактором журналу «Дніпро».
- lemma: воєнна лірика
  translation: wartime lyric poetry
  pos: noun phrase
  usage: Воєнна лірика Малишка поєднує публічний заклик з особистим звертанням.
- lemma: ліричний адресат
  translation: lyrical addressee
  pos: noun phrase
  usage: У назві «Україно моя!» Україна постає як ліричний адресат.
- lemma: пісенність
  translation: song-like quality
  pos: noun
  usage: Пісенність треба доводити через синтаксис, повтор, інтонацію та композицію.
- lemma: народнопісенна інтонація
  translation: folk-song intonation
  pos: noun phrase
  usage: Народнопісенна інтонація може бути авторською художньою технікою, а не безіменним фольклором.
- lemma: пряме звертання
  translation: direct address
  pos: noun phrase
  usage: Назва «Україно моя!» побудована як пряме звертання.
- lemma: паралелізм
  translation: parallelism
  pos: noun
  usage: Паралелізм організовує подібні синтаксичні частини й створює очікування повтору.
- lemma: повтор
  translation: repetition
  pos: noun
  usage: У тексті повтор можна спершу описати, а вже потім тлумачити його функцію.
- lemma: синтаксична межа
  translation: syntactic boundary
  pos: noun phrase
  usage: Синтаксична межа може збігатися із завершенням мелодійної фрази.
- lemma: мелодійна фраза
  translation: melodic phrase
  pos: noun phrase
  usage: Мелодійна фраза організовує музичний рух і може відповідати синтаксичній частині.
- lemma: співавторство
  translation: co-authorship
  pos: noun
  usage: Співавторство Малишка й Майбороди поєднало поетичний рядок із музичною формою.
- lemma: рецепція
  translation: reception
  pos: noun
  usage: Рецепція описує, як твір читають, виконують і переосмислюють у різний час.
- lemma: інституційна роль
  translation: institutional role
  pos: noun phrase
  usage: Інституційна роль пояснює службову функцію, але не є естетичною оцінкою.
- lemma: депутатська діяльність
  translation: legislative representative activity
  pos: noun phrase
  usage: Депутатська діяльність Малишка включала роботу зі зверненнями громадян та установ.
- lemma: звернення громадянина
  translation: citizen petition
  pos: noun phrase
  usage: Звернення громадянина могло стосуватися житла, податків або господарської потреби.
- lemma: інтерпретація
  translation: interpretation
  pos: noun
  usage: Інтерпретація пояснює значення повтору, але має спиратися на спостереження.
- lemma: оцінка
  translation: evaluation
  pos: noun
  usage: Оцінка стає переконливою, коли названо критерій і можливе заперечення.
- lemma: спостереження
  translation: observation
  pos: noun
  usage: Точне спостереження називає помітну рису тексту до її інтерпретації.
- lemma: художня деталь
  translation: artistic detail
  pos: noun phrase
  usage: Художня деталь може відкрити тему, але не замінює аналізу всього твору.
- lemma: образ дороги
  translation: road motif
  pos: noun phrase
  usage: Образ дороги пов'язує материнське звертання з рухом, відстанню та пам'яттю.
