- lemma: неофольклоризм
  translation: neofolklorism
  pos: noun
  usage: Неофольклоризм перетворює народний матеріал модерними композиційними засобами.
- lemma: фольклорна опера
  translation: folk opera
  pos: noun phrase
  usage: Фольклорна опера поєднує сценічну дію, хор, оркестр і обрядовий матеріал.
- lemma: камерна симфонія
  translation: chamber symphony
  pos: noun phrase
  usage: Камерна симфонія розгортає симфонічну логіку в невеликому виконавському складі.
- lemma: оркестрування
  translation: orchestration
  pos: noun
  usage: Оркестрування розподіляє музичний матеріал між інструментами й групами.
- lemma: тембр
  translation: timbre
  pos: noun
  usage: Тембр флейти змінюється залежно від регістру, артикуляції та оточення.
- lemma: фактура
  translation: texture
  pos: noun
  usage: Фактура ущільнюється, коли збільшується кількість одночасних голосів.
- lemma: регістр
  translation: register
  pos: noun
  usage: Високий регістр є акустичною ознакою, а не готовою емоційною оцінкою.
- lemma: остинато
  translation: ostinato
  pos: noun
  usage: Остинато може підтримувати ритмічну пульсацію сценічного епізоду.
- lemma: ритмічна пульсація
  translation: rhythmic pulse
  pos: noun phrase
  usage: Ритмічна пульсація стає переривчастою після оркестрового зламу.
- lemma: динамічний контраст
  translation: dynamic contrast
  pos: noun phrase
  usage: Динамічний контраст треба підтвердити двома точними моментами запису.
- lemma: кульмінація
  translation: culmination
  pos: noun
  usage: Кульмінація може виникати через щільність, регістр і повтор, а не лише через гучність.
- lemma: партитура
  translation: score
  pos: noun
  usage: Партитура потрібна для точного визначення складу, гармонії та редакційних змін.
- lemma: вокально-симфонічний твір
  translation: vocal-symphonic work
  pos: noun phrase
  usage: Вокально-симфонічний твір поєднує слово, голоси й оркестрову форму.
- lemma: сценічна версія
  translation: stage version
  pos: noun phrase
  usage: Сценічна версія 2017 року є новим режисерським прочитанням твору.
- lemma: атрибутоване свідчення
  translation: attributed testimony
  pos: noun phrase
  usage: Атрибутоване свідчення не слід подавати як безособовий архівний факт.
- lemma: поминальний жанр
  translation: commemorative genre
  pos: noun phrase
  usage: Поминальний жанр має конкретну історичну й релігійну рамку.
- lemma: хоровий пласт
  translation: choral layer
  pos: noun phrase
  usage: Хоровий пласт може діяти в унісоні або поділятися на окремі групи.
- lemma: сольний інструмент
  translation: solo instrument
  pos: noun phrase
  usage: Флейта є сольним інструментом у Камерній симфонії № 3.
- lemma: виконавський склад
  translation: performing forces
  pos: noun phrase
  usage: Виконавський склад треба називати за метаданими конкретного запису.
- lemma: звукова щільність
  translation: sonic density
  pos: noun phrase
  usage: Звукова щільність може зростати без прямого збільшення гучності.
