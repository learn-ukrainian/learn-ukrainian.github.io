---
inline:
- id: quiz-staging-evidence
  type: quiz
  title: Межа доказу в сценічній історії
  instruction: Оберіть відповідь, яка найточніше узгоджує силу твердження з доступним джерелом.
  items:
  - question: Що надійно встановлено про підготовлену наприкінці 1970-х постановку «Коли цвіте папороть»?
    explanation: Підтверджено результат і джерельно атрибутоване пояснення; персональний механізм не документовано.
    options:
    - text: Вона не дійшла до відкритої прем'єри, а інституційні й фахові джерела пов'язують блокування з ідеологічним неприйняттям.
      correct: true
    - text: Її зупинив особистий телефонний наказ конкретного союзного посадовця.
      correct: false
    - text: Проти композитора відкрили персональну кримінальну справу органів безпеки.
      correct: false
    - text: Твір узагалі не виконувався до 2017 року в жодній формі.
      correct: false
  - question: Яке формулювання найточніше описує львівську постановку 2017 року?
    explanation: Театральне джерело підтверджує цілісну нову версію та її постановчий склад, а не буквальну реконструкцію.
    options:
    - text: Це цілісна сценічна версія нового покоління митців, створена режисером Василем Вовкуном і диригентом Володимиром Сіренком у співпраці з театром.
      correct: true
    - text: Це точна реконструкція кожного елемента нездійсненої постановки 1979 року.
      correct: false
    - text: Це перше звучання будь-якої музики з твору в історії.
      correct: false
    - text: Це доказ того, що радянського блокування не було.
      correct: false
  - question: Чому формула «опера за Гоголем, отже російське джерело» є неточною?
    explanation: Вона редукує багатошаровий український матеріал і колоніально складну спадщину Гоголя до однієї імперської етикетки.
    options:
    - text: Вона ігнорує купальську обрядовість, народні тексти й український матеріал, а перетворені гоголівські мотиви помилково робить єдиною основою.
      correct: true
    - text: Тому що Гоголь не мав жодного стосунку до української культури.
      correct: false
    - text: Тому що у творі немає жодного літературного або міфологічного мотиву.
      correct: false
    - text: Тому що жанрова назва автоматично доводить автентичність кожної мелодії.
      correct: false
  - question: Яка послідовність перетворює враження від запису на перевірний аргумент?
    explanation: Метадані й спостереження мають передувати дискусійній інтерпретації.
    options:
    - text: Назвати запис і час, описати чутну зміну, визначити музичний параметр, а потім запропонувати інтерпретацію.
      correct: true
    - text: Спершу назвати емоцію, а потім підібрати будь-яку деталь на її підтвердження.
      correct: false
    - text: Обмежитися жанровою назвою й не слухати конкретного виконання.
      correct: false
    - text: Приписати режисерові й композиторові однаковий намір без джерела.
      correct: false
- id: comparative-symphonic-scale
  type: comparative-study
  title: Камерний і великий симфонічний масштаб
  instruction: Прослухайте два точні відтинки та порівняйте їх за однаковими параметрами, не ототожнюючи редакцію 2023 року з первісною версією Симфонії № 2.
  items_to_compare:
  - Камерна симфонія № 3 — Андрій Карп'як, «Віртуози Львова», Войцех Чепель, 00:00–02:30, https://www.youtube.com/watch?v=UF2mkue4AfQ
  - Симфонія № 2 «Драматична», друга редакція 2023 року — Kyiv Symphony Orchestra, Christian Blex, 00:00–03:00, https://www.youtube.com/watch?v=hZ0GKn5oo50
  criteria:
  - Початковий звуковий жест і регістровий простір
  - Артикуляція, ритмічна пульсація та роль довгих звуків
  - Зміна фактурної щільності й динамічна траєкторія
  - Роль паузи та перший різкий злам
  - Межа висновку без партитури або іншої редакції
  prompt: >-
    Напишіть 180–220 слів. Для кожного запису наведіть щонайменше дві часові
    позначки, а висновок почніть формулою «В обох записах симфонічне мислення
    виявляється через…, проте…». Окремо поясніть, чому відео другої редакції
    Симфонії № 2 не доводить тотожності з первісною партитурою.
  model_answer: >-
    В обох записах симфонічне мислення виявляється через керування паузою,
    щільністю й поверненням імпульсу, проте камерний склад показує взаємодію
    окремих ліній, а великий оркестр — зміну звукової маси. У Камерній симфонії
    № 3 на **00:10** флейтист грає перед ансамблем, а струнні відповідають
    розділеними жестами; прозорість дає змогу співвіднести сольну лінію з
    окремими групами струнних. Біля **00:35** звучання помітно посилюється:
    одночасний рух струнних стає щільнішим, хоча флейта лишається візуально
    відокремленою й відмінною за тембром. Отже, наростання виникає не лише від
    гучності, а й від більшої кількості активних ліній. Кадр підтверджує
    виконавський склад,
    але без партитури не дає точних нот, авторських динамічних позначень або
    остаточного балансу між флейтою та кожною струнною партією.

    У Симфонії № 2 на **00:20** після початкових жестів настає майже повна
    тиша; пауза різко відділяє наступний етап. Близько **00:40** вступає
    щільніший струнний рух, і камера показує одночасну роботу групи скрипок:
    траєкторія переходить від розрідженого очікування до тривалішого
    наростання. Порівнюваними параметрами є пауза, кількість активних шарів,
    динамічна зміна й співвідношення короткого імпульсу з довшою лінією.

    Висновок обмежений цими виконаннями й доступним відео. Опис Kyiv Symphony
    Orchestra називає саме другу редакцію 2023 року. Без первісної партитури
    або окремо ідентифікованого раннього запису не можна стверджувати, що
    почуті паузи, оркестрування чи баланс груп були тотожними в первісній
    версії.

workbook:
- id: reading-stankovych-chronology
  type: reading
  title: Хронологія, у якій точність має межу
  source: Навчальний синтез за Енциклопедією історії України, НСКУ, українською статтею «Станкович Євген Федорович», Комітетом Шевченківської премії та Указом Президента України № 28/2009.
  text: >-
    Євген Станкович народився 19 вересня 1942 року у Сваляві. Ранні студії
    почалися у класі баяна. В Ужгородському музичному училищі він продовжив
    навчання у класі баяніста й композитора Степана Мартона, а згодом — у
    класі віолончеліста Й. Базела. Далі він навчався у Львові в Адама Сольтиса
    й у Києві в Бориса Лятошинського та Мирослава Скорика. Основні джерела
    погоджуються щодо цієї послідовності, але по-різному проводять межі
    окремих років. 1970 року композитор закінчив Київську консерваторію й
    працював музичним редактором у видавництві «Музична Україна». Від 1988
    року викладав, а інституційні профілі фіксують керівництво кафедрою від
    1990 року. У 1977 році отримав Шевченківську премію за Симфонію № 3 «Я
    стверджуюсь», 1997 року став академіком, а 16 січня 2009 року Указом
    Президента № 28/2009 отримав звання Героя України.
  tasks:
  - Побудуйте часову вісь і позначте, де джерела дають стабільну дату, а де лише стабільну послідовність.
  - Поясніть, чому різна межа львівського й київського періодів не дає підстав вигадувати точніший компромісний рік.
  - Розподіліть твердження на біографічний факт, інституційну інтерпретацію та музичне питання, яке потребує запису або партитури.

- id: intent-paporot-production
  type: authorial-intent
  title: Сценічний задум і пізнє прочитання
  source_reading: reading-stankovych-chronology
  text_excerpt: Коли цвіте папороть
  prompt: >-
    Перегляньте запис Львівської національної опери 03:00–06:00
    (https://www.youtube.com/watch?v=ksnZppeInv0&t=180s). Визначте, що можна
    приписати партитурі й виконанню, що — режисурі Василя Вовкуна, а що лишається
    гіпотезою про намір. Поясніть, чому постановка 2017 року є новим
    прочитанням, а не автоматичною реконструкцією нездійсненої версії 1970-х.
  techniques_to_identify:
  - Хоровий масив і поділ на групи
  - Ритмічна повторність та сценічний рух
  - Оркестрове ущільнення і світлова або хореографічна відповідь
  model_answer: >-
    На **03:00** камера показує закриту завісу, освітлену червоним; виконавців,
    костюмів і хореографії в кадрі немає. На **05:40** завіса все ще закрита,
    хоча у звучанні між цими моментами змінюються щільність і динамічна вага.
    Тому звукові зміни можна приписати лише конкретному виконанню, а червоне
    світло й спосіб показу завіси — видимому рішенню постановки та знімання.
    Без партитури не можна визначити, які почуті деталі точно зафіксував
    композитор, а без іншого видимого відтинку — аналізувати сценічний рух.
    Сторінка Львівської опери атрибутує версію 2017 року режисерові Василю
    Вовкуну й диригентові Володимиру Сіренку. Вона підтверджує нову цілісну
    постановку, але не документує буквальної реконструкції нездійсненого
    задуму 1970-х. Отже, твердження про «відновлений авторський намір» лишається
    гіпотезою, доки його не підкріплено партитурою, постановчими матеріалами
    або висловлюванням Станковича.

- id: critical-panakhyda-listening
  type: critical-analysis
  title: Мовлення, хор і тиша у «Панахиді»
  source_reading: reading-stankovych-chronology
  instruction: >-
    Прослухайте «Панахиду за померлими з голоду» 01:00–04:30 у виконанні Kyiv
    Camerata, оркестру Національної філармонії, хору «Думка» під орудою
    Keri-Lynn Wilson: https://www.youtube.com/watch?v=LoT-V4uhcJ4&t=60s.
  target_text: Панахида за померлими з голоду
  questions:
  - Як змінюється співвідношення оповідача, солістів, хору й оркестру? Назвіть дві часові позначки.
  - Яку функцію може мати одна конкретна пауза і чого вона не доводить про реакцію аудиторії?
  - Як пов'язати музичне спостереження з пам'яттю про Голодомор без формул «від імені всіх»?
  model_answers:
  - >-
    На **01:20** камера й звучання зосереджені на оркестрових струнних під
    орудою диригентки; окремого мовленого або сольного входу цей момент не
    підтверджує. Близько **04:00** широкий кадр поєднує хор і оркестр, а на
    **04:20** до мікрофона виходить оповідач, поки інструментальний шар
    триває. Отже, у вибраному відтинку перехід веде від оркестрового й
    хорового простору до виразно видимого мовленого регістру. Входу баса або
    сопрано тут не підтверджено; це межа відтинку, а не твердження про весь
    твір.
  - >-
    Приблизно на **02:35** звучання різко тоншає перед поновленням руху біля
    **02:40**. Це розрідження можна почути як розрив безперервної
    оповіді або як відкладення наступного вступу. Воно не доводить ані єдиної
    реакції аудиторії, ані наперед установленого значення без партитури й
    ширшого контексту.
  - >-
    Етичний висновок має точно назвати пам’ять про жертв Голодомору, описати
    локальний перехід між оркестром, хором і оповідачем та позначити межу:
    акустична множинність хору не уповноважує говорити «від імені всіх».
    Конкретне виконання організовує публічне вшанування, але не замінює
    свідчень жертв і не встановлює однакової рецепції для всіх слухачів.
  focus_points:
  - Співвідношення слова й музики
  - Тиша як організація часу
  - Межа між акустичною множинністю хору й політичним представництвом

- id: essay-transforming-material
  type: essay-response
  title: Есе — не цитувати, а перетворювати
  source_reading: reading-stankovych-chronology
  prompt: >-
    Напишіть 300–350 слів про три способи перетворення культурного матеріалу у
    Станковича. Оберіть один сценічний твір («Коли цвіте папороть»), один
    симфонічний запис і один вокально-симфонічний або медійний приклад
    («Каддиш-реквієм “Бабин Яр”», «Панахида за померлими з голоду», «Слово о
    полку Ігоревім», балет чи фільм про княгиню Ольгу). Наведіть дві часові
    позначки, одне інституційне джерело й одне альтернативне пояснення.
  min_words: 300
  model_answer: >-
    Євген Станкович перетворює культурний матеріал не в один спосіб, а через
    різні режими часу, складу й публічного представлення. У «Коли цвіте
    папороть» обрядовий матеріал входить у театральну форму, проте вибраний
    запис застерігає від надмірного висновку. На **03:00** видно лише закриту
    червону завісу; на **05:40** вона так само закрита. Отже, в цьому відтинку
    можна аналізувати зміни звукової щільності й освітлення, але не костюми чи
    хореографію. Сторінка Львівської національної опери атрибутує цілісну
    версію 2017 року режисерові Василю Вовкуну та диригентові Володимиру
    Сіренку. Вона підтверджує постановчий контекст, а не тотожність із
    нездійсненою версією 1970-х і не повний авторський намір композитора.

    Другий спосіб — перетворення звукового матеріалу через масштаб і паузу. У
    записі Симфонії № 2 на **00:20** початкові жести переходять у майже повну
    тишу, тоді як близько **00:40** з’являється щільніший рух струнної групи.
    Контраст організує форму без словесного сюжету: очікування стає таким самим
    матеріалом, як активне звучання. Опис Kyiv Symphony Orchestra уточнює, що
    це виконання другої редакції 2023 року. Тому почутий баланс і паузу не
    можна автоматично переносити на первісну партитуру.

    Третій спосіб — введення слова й колективного звучання у поминальну форму.
    У «Панахиді за померлими з голоду» біля **02:35** фактура різко тоншає, а
    на **04:20** до мікрофона виходить оповідач, коли інструментальний шар ще
    триває. Перехід від оркестрового часу до мовленого дає змогу пов’язати
    особистий голос із публічним вшануванням Голодомору, але не дозволяє
    говорити від імені всіх жертв або слухачів.

    Отже, три перетворення не є взаємозамінними. У сценічному прикладі обряд
    переходить у постановчий час; у симфонічному — звуковий імпульс і пауза
    утворюють абстрактну форму; у поминальному — слово входить у спільний
    простір оркестру й хору. Театральна сторінка сильна щодо авторства версії
    2017 року, опис відео — щодо редакції симфонії, а сам запис «Панахиди» —
    щодо послідовності видимих і чутних подій. Жодне з цих джерел окремо не
    пояснює всю історію твору або реакцію аудиторії.

    Альтернативне пояснення стосується всіх трьох прикладів: помічена риса
    може належати не незмінному творові, а конкретному виконанню, редакції,
    режисурі чи монтажу відео. Саме тому теза про перетворення переконлива
    лише тоді, коли спостереження прив’язане до часу, джерело атрибутоване, а
    межу між партитурою та її пізнішим утіленням названо прямо.
  rubric:
  - criteria: Теза й структура
    description: Три приклади об'єднано чіткою тезою про перетворення матеріалу.
    points: 3
  - criteria: Слухацькі докази
    description: Є дві точні часові позначки та музичні параметри замість загальних емоцій.
    points: 3
  - criteria: Джерельна й деколонізаційна точність
    description: Джерело атрибутовано; немає імперського привласнення, вигаданої цензурної справи або універсалізації пам'яті.
    points: 3
  - criteria: Мовна якість C1
    description: Використано маркери поступки, межі певності й альтернативного пояснення.
    points: 1
