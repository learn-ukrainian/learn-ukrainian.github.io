---
inline:
- id: quiz-conflict-map
  type: quiz
  title: Межі доказу в біографії Станковича
  instruction: Перевір, як модуль поєднує офіційний контекст, творчий масштаб і межу доказу.
  items:
  - question: Чому в цій біографії важливо чітко розрізняти культурно-сценічний тиск і персональну справу?
    explanation: Коректна відповідь відокремлює складну сценічну історію від недоведених персональних звинувачень.
    options:
    - text: Бо для Станковича зафіксовано інституційну складність постановки, але не доведено персональної кримінальної справи.
      correct: true
      explanation: Джерела дозволяють говорити про контекст сцени навколо творів, але не дають матеріалу для персональної репресивної справи.
    - text: Бо будь-який радянський композитор обов'язково був у політичній справі.
      correct: false
      explanation: Немає загального правила для всіх постатей без індивідуальних джерел.
    - text: Бо без цього біографія буде коротшою за 5000 слів.
      correct: false
      explanation: Обсяг модуля не є заміною доказової точності.
    - text: Бо «Коли цвіте папороть» зовсім не ставилося на сцені.
      correct: false
      explanation: Навпаки, її сценічна історія складна саме в умовах доступу й обмежень.
  - question: Яке формулювання найкраще зводить конфлікт навколо «Коли цвіте папороть»?
    explanation: Найточніша відповідь називає інституційний тиск без вигадування кримінальної біографії.
    options:
    - text: Розглянути цю історію як культуру тиску на сцену, а не як доказ персонального кримінального переслідування.
      correct: true
      explanation: Джерела вказують на різницю між інституційною рамкою та персональною справою.
    - text: Вважати твір доказом конкретної репресивної справи.
      correct: false
      explanation: Така модель не має бази в наданих джерелах.
    - text: Віднести «папороть» до маловідомих фольклорних пісень без жодного канону.
      correct: false
      explanation: Твір має значний репертуарний і національний резонанс.
    - text: Показати лише один аспект — політичну історію — і не повертатися до інших творів.
      correct: false
      explanation: Такий підхід зводить масштабний доробок митця.
  - question: Який доказовий принцип корисний для вивчення цієї постаті?
    explanation: Для живої постаті треба працювати із завершеними фактами, а не з прогнозами чи припущеннями.
    options:
    - text: Живу постать описувати лише через завершені факти та підтверджені ролі.
      correct: true
      explanation: Це запобігає спекуляціям про приватні рішення та майбутню рецепцію.
    - text: Підміняти відсутні факти красивою інтерпретацією.
      correct: false
      explanation: Інтерпретація без доказу руйнує джерельну дисципліну.
    - text: Виробляти тезу виключно з офіційних відзнак.
      correct: false
      explanation: Офіційні відзнаки є важливим контекстом, але не замінюють аналізу форм.
    - text: Не згадувати жодного інституційного факту, щоб уникнути політики.
      correct: false
      explanation: Інституції важливі, якщо подаються як умови, а не як єдина причина.
    - text: Зводити всю творчість до жанру фольк-опери.
      correct: false
      explanation: Зафіксовано широкий жанровий спектр від симфоній до музики пам'яті.
  - question: Що допомагає розрізнити «Станкович радянський» від «Станкович український»?
    explanation: Лінія української композиторської школи показує тривалість форми, а не один політичний ярлик.
    options:
    - text: Подивитися на учнівсько-майстерну лінію Лятошинський — Скорик — Станкович без редукції до одного ярлика.
      correct: true
      explanation: Лінія школи показує спадкоємність форми й відповідальності.
    - text: Зробити акцент лише на нагородах.
      correct: false
      explanation: Нагороди — важливі факти, але не замінюють аналізу творів.
    - text: Ігнорувати жанрову різноманітність.
      correct: false
      explanation: Різноманітність є ключовою для повноти біографії.
    - text: Ввести лише один авторський твір як доказ усіх аспектів.
      correct: false
      explanation: Це зменшує масштаб і ускладнює наукову точність.
- id: true-false-shadow
  type: true-false
  title: Тіньові помилки біографії
  instruction: Познач, які твердження відповідають обережній, джерельно вивіреній інтерпретації.
  items:
  - statement: "У матеріалах біографії треба зазначати: є культурно-інституційний контекст постановки «Коли цвіте папороть», але це не доказ персональної репресивної справи."
    correct: true
    explanation: Саме ця межа є головною для коректного методичного підходу.
  - statement: Можна повністю пояснити постать через «Коли цвіте папороть», якщо назвати її найвідомішим твором.
    correct: false
    explanation: Потрібна ширша картина симфоній, камерної та пам'ятної музики.
  - statement: Живу постать доцільно подавати з прогнозами щодо подальшої рецепції і майбутніх творів.
    correct: false
    explanation: Коректніше працювати лише з завершеними фактами, ролями й уже зафіксованими творами.
  - statement: Живий контекст і офіційний контекст мають різні ролі в біографії і не є синонімами.
    correct: true
    explanation: Один описує умови, інший — особливість конкретного життєвого внеску.
  - statement: "Стисло: офіційні нагороди повністю пояснюють складність «Станкович як пам'ять»."
    correct: false
    explanation: Нагороди важливі, але не замінюють аналіз форм і рецепції.
workbook:
- id: reading-stankovych-memory
  type: reading
  title: "Читання: симфонічний масштаб і пам'ять в українському контексті"
  source: Синтезований матеріал з Енциклопедії історії України, НСКУ та внутрішнього досьє за межами персональних переказів.
  text: >-
    Євген Станкович формує важливий корпус української музики не завдяки одному
    твору, а через поєднання фольк-опери, симфонічних і камерних форм, вокально-симфонічного мислення та творів пам'яті. Його шлях у музичну професію проходить через Ужгород, Львів і Київ, редакційну роботу, викладацькі ролі та інституційне
    керівництво. Для методичного аналізу важливо бачити два рівні: як система дає
    канал, а складна музична мова формує тривалу рецепцію.
  tasks:
  - Назви три жанрові напрями, у яких видно масштабність доробку Станковича.
  - Поясни, чому офіційний контекст не дорівнює повній оцінці творчого змісту.
  - Яким чином знання про живого автора змінює добір матеріалу в модулі?
- id: critical-scene-memory
  type: critical-analysis
  title: "Критичний аналіз: сцена, культурна пам'ять, доказ"
  source_reading: reading-stankovych-memory
  target_text: Інституційні умови навколо окремого твору важливі, але не тотожні персональній біографічній справі.
  questions:
  - Склади короткий аналіз, де розділиш культурно-інституційний тиск і доведений статус творчої особистості.
  model_answers:
  - >-
    Спочатку треба зафіксувати факт: в різні періоди є дані про складні умови
    сценічного проходження окремих творів. Далі описати, що це стосується
    механізмів публічного доступу, а не автоматично персональної кримінальної
    справи. Нарешті, показати, що масштабна творчість митця формується не лише
    одним твором, а різними формами пам'яті, камерною та симфонічною лінією.
- id: comparative-composition-lineage
  type: comparative-study
  title: 'Порівняння: лінія школи і творча різноманітність'
  source_reading: reading-stankovych-memory
  items_to_compare:
  - Б. Лятошинський
  - М. Скорик
  - Є. Станкович
  criteria:
  - Як через інституційну лінію передається композиторська мова?
  - Чому різні жанри мають різну рецепційну логіку?
  - Як у всій лінії працює пам'ять і інституційний контекст?
  prompt: >-
    Поясни, чому порівняльний підхід у цій моделі потрібен для уникнення
    редукції в один твір або один політичний ярлик.
  model_answer: >-
    Лінія Лятошинський — Скорик — Станкович показує не статичну послідовність, а
    передачу професійної музичної культури. Для Станковича важливо не лише вказати
    учителів, а показати, як на рівні форми ця лінія дає масштаб: від камерного
    мислення до великих жестів пам'яті. Кожний твір у репертуарі має свою
    рецепційну логіку, але жоден не повинен бути єдиним поясненням митця.
- id: essay-stankovych-memory
  type: essay-response
  title: "Есе: Євген Станкович як жива класика української музичної пам'яті"
  source_reading: reading-stankovych-memory
  instruction: Напиши зв'язний аргумент, який уникає зведення до одного твору чи політичної
    схеми.
  prompt: Чому Станкович має бути поданий як приклад розширеної музичної пам'яті, а не лише «Станкович і Коли цвіте папороть»?
  min_words: 300
  model_answer: >-
    Євген Станкович важливий не лише через одну фольк-оперу. Його масштабний
    доробок демонструє роботу з різними формами пам'яті: фольклорно-ритуальними
    сигналами, симфонічними процесами, камерною інтонацією, вокально-симфонічною
    та сакральною тематиками. Модуль має показати, що офіційний контекст
    (посади, інституційна праця, визнання) формує умови, але не замінює змісту.
    Важливо зберегти межу між інституційно-контекстуальним тиском у сфері сценічного
    проходження деяких творів і персональними справами, для яких немає
    підтверджених доказів. Таке розрізнення дозволяє будувати складну й етичну
    картину живої постаті.
  peer_review_guidelines: Чи подано межу доказу? Чи розвинута жанрова різноманітність? Чи уникнуто редукції до одного твору?
  rubric:
  - criteria: Межа доказу
    description: Чітко розділені інституційні рамки та відсутність персональної справи без джерела.
    points: 3
  - criteria: Теза
    description: Пояснено масштабність і пам'ятний вимір постаті.
    points: 3
  - criteria: Аналіз
    description: Використано конкретні віхи, жанри та джерельну обережність без міфологізації.
    points: 4
