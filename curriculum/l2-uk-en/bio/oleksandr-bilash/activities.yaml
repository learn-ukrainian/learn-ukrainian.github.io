---
- id: quiz-formation
  type: quiz
  title: "Формування Білаша"
  instruction: "Перевір факти ранньої біографії і не перетворюй їх на легенду."
  items:
    - question: "Де народився Олександр Білаш?"
      options:
        - text: "У Градизьку на Полтавщині"
          correct: true
        - text: "У Львові"
          correct: false
        - text: "У Харкові"
          correct: false
        - text: "У Чернівцях"
          correct: false
      explanation: "Градизьк і Полтавщина важливі для теми ранньої слухової пам'яті."
    - question: "Чому історію про невступ до училища треба читати обережно?"
      options:
        - text: "Бо вона не замінює фахової освіти і праці"
          correct: true
        - text: "Бо вона доводить, що Білаш не навчався музики"
          correct: false
        - text: "Бо вона є головним доказом репресій"
          correct: false
        - text: "Бо вона замінює всі інші джерела"
          correct: false
      explanation: "Анекдот може бути педагогічним входом, але не центром біографії."
    - question: "Яку роль мала Київська консерваторія?"
      options:
        - text: "Дала професійну композиційну школу"
          correct: true
        - text: "Замінила українську пісенність російською традицією"
          correct: false
        - text: "Пояснює всі пісні як випадкові імпровізації"
          correct: false
        - text: "Доводить, що він відмовився від великої форми"
          correct: false
      explanation: "У модулі консерваторія показана як школа форми, масштабу і ремесла."
    - question: "Що означає пісенність у цьому модулі?"
      options:
        - text: "Здатність авторської музики тримати українську співану інтонацію"
          correct: true
        - text: "Механічне копіювання фольклорних текстів"
          correct: false
        - text: "Відмова від професійної музичної освіти"
          correct: false
        - text: "Переклад українських пісень російською"
          correct: false
      explanation: "Пісенність не дорівнює простому фольклорному запозиченню."
    - question: "Яке самовизначення Білаша допомагає зрозуміти його увагу до слова?"
      options:
        - text: "Він називав себе передусім поетом"
          correct: true
        - text: "Він заперечував значення поезії"
          correct: false
        - text: "Він працював лише як диригент"
          correct: false
        - text: "Він не мав стосунку до української поезії"
          correct: false
      explanation: "Коротка фраза про поета пояснює, чому слово в його піснях таке важливе."
- id: true-false-canon
  type: true-false
  title: "Пісенний канон без спрощень"
  instruction: "Познач твердження як істинні або хибні."
  items:
    - statement: "У модулі пісенний канон означає наказ любити певну пісню."
      correct: false
      explanation: "Канон тут означає тривалу культурну пам'ять і повторне виконання."
    - statement: "«Два кольори» важливі як поєднання тексту Дмитра Павличка і музики Білаша."
      correct: true
      explanation: "Модуль читає пісню як результат співпраці поета і композитора."
    - statement: "«Ясени» показують лише офіційний радянський стиль без ліричної сцени."
      correct: false
      explanation: "У модулі ця пісня пов'язана з ліричною сценою і поетичним образом."
    - statement: "Опера «Гайдамаки» розширює образ Білаша за межі популярної пісні."
      correct: true
      explanation: "Велика форма показує його роботу з Шевченком і історичною темою."
    - statement: "Для Білаша співпраця з поетами була другорядною деталлю."
      correct: false
      explanation: "Поетично-композиторська співпраця є центральним механізмом модуля."
- id: reading-01
  type: reading
  title: "Джерело: Білаш про поезію і композицію"
  source: "Національна бібліотека України для дітей, методична бібліографія про Олександра Білаша"
  text: "«Я перш за все поет, бо поетами народжуються, композиторами стають»."
  tasks:
    - "Поясни, чому Білаш пов'язує композицію з поетичним самовизначенням."
    - "Знайди в модулі місце, де ця думка пояснює увагу до українського слова."
    - "Сформулюй одну тезу про роль поета і композитора в пісні."
- id: critical-soviet-context
  type: critical-analysis
  title: "Радянська доба без ярликів"
  source_reading: reading-01
  target_text: >-
    Він не є прикладом героїчного спротиву в політичному сенсі. Він також
    не є просто знаком радянської лояльності. Він є прикладом того, як
    українська пісенна культура працювала всередині обмеженої системи і
    пережила її.
  questions:
    - "Які дві помилки в оцінці Білаша відкидає цей уривок?"
    - "Чому офіційне визнання не дорівнює повному поясненню культурної пам'яті?"
    - "Як цей уривок допомагає уникнути ідеалізації?"
  model_answers:
    - "Уривок відкидає і героїзацію без джерел, і редукцію до радянського ярлика."
    - "Офіційне визнання могло дати сцену, але тривалість пісень залежить від слухачів."
    - "Він називає складність прямо й не вигадує переслідування там, де джерела його не дають."
- id: comparative-song-memory
  type: comparative-study
  title: "Пісня як націєтворча пам'ять"
  source_reading: reading-01
  items_to_compare:
    - "Олександр Білаш: лірична українська пісня всередині радянської інституційної сцени"
    - "Володимир Івасюк: пізніша українська популярна пісня і поколіннєва пам'ять"
  criteria:
    - "роль української мови"
    - "родинний або особистий образ"
    - "зв'язок із публічним виконанням"
    - "післярадянське переосмислення"
  model_answer: >-
    > [!model-answer]
    > Обидва приклади показують, що українська пісня може виконувати
    націєтворчу роботу без прямого гасла. У Білаша ця робота особливо
    помітна через родинну й ліричну пам'ять, яка пережила радянський
    контекст.
- id: authorial-poet-composer
  type: authorial-intent
  title: "Навіщо композиторові бути поетом?"
  source_reading: reading-01
  text_excerpt: "Я перш за все поет"
  prompt: "Поясни, як ця фраза допомагає зрозуміти увагу Білаша до українського слова."
  model_answer: >-
    > [!model-answer]
    > Фраза не заперечує композиторської професії. Вона показує, що для
    Білаша мелодія і слово працювали разом: музика мала не зламати
    український рядок, а дати йому голос, паузу і пам'ять.
- id: essay-bilash-memory
  type: essay-response
  title: "Есе: Білаш і українська пісенна пам'ять"
  source_reading: reading-01
  prompt: >-
    Напиши 250-400 слів про те, чому Олександра Білаша треба читати як
    композитора української пісенної пам'яті, а не як простий символ
    радянського успіху або безконфліктного національного героя.
  min_words: 250
  model_answer: >-
    > [!model-answer]
    > Сильне есе має показати три рівні: професійне формування Білаша,
    пісенний канон і складний радянський контекст. Воно не повинно
    вигадувати переслідування, але й не повинно робити офіційні звання
    центром біографії. Найпереконливіша теза: його пісні стали частиною
    української пам'яті, бо поєднали поезію, мелодію, родинний образ і
    сучасне виконання.
