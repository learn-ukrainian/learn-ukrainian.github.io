- id: critical-poet-vocation
  type: critical-analysis
  title: "Аналіз покликання: між словом і музикою"
  source_reading: reading-bilash-legacy
  instruction: "Проаналізуйте наведений вислів Олександра Білаша та дайте відповіді на питання про його творчий метод."
  target_text: "Я перш за все поет, бо поетами народжуються, а композиторами стають."
  questions:
    - "Як ви розумієте твердження Білаша про те, що поетами народжуються, а композиторами стають? Яку роль це відводить музичній освіті?"
    - "Чому цей вислів є авторським самопредставленням, а не об'єктивним правилом про походження таланту? Яке додаткове джерело допомогло б перевірити його?"
    - "Зіставте вислів із послідовністю навчання Білаша у вечірній школі, училищі та консерваторії. Що біографія підтверджує, а чого не доводить?"
    - "Сформулюйте одну перевірну гіпотезу про роль поетичного слова в пісні Білаша й назвіть параметр конкретного запису, за яким її можна перевірити."
    - "Напишіть висновок із двох речень і використайте маркер поступки: відокремте те, що прямо випливає з вислову, від власної інтерпретації."
  model_answers:
    - "Вислів протиставляє вроджене поетичне чуття і набуте композиторське ремесло. Водночас це авторське самопредставлення, а не об'єктивний закон про талант. Біографія частково підтримує другу половину формули: після домашнього музикування Білаш послідовно навчався у вечірній школі, училищі та консерваторії."
    - "Митець сам визначає пріоритети своєї праці, але його афористична формула не встановлює загального закону про поетів і композиторів. Перевірку посилили б датоване інтерв'ю про роботу над конкретною піснею, рукопис або свідчення співавтора; сам вислів фіксує позицію Білаша, а не універсальну психологію творчості."
    - "Освітня послідовність підтверджує, що композиторське ремесло Білаш систематично опановував. Вона не доводить, що поетичне чуття є винятково вродженим, і не показує без аналізу твору, як саме навчання змінило кожну мелодію."
    - "Перевірна гіпотеза: у вибраному виконанні мелодійна фраза підтримує синтаксичні межі поетичного тексту. Для перевірки слід назвати запис і часову позначку, зіставити словесний наголос із музичним акцентом та зафіксувати місце вдиху; без цих даних гіпотеза лишається припущенням."
    - "Хоча Білаш називає себе передусім поетом, вислів прямо засвідчує лише його самовизначення й повагу до набутого ремесла. Можна припустити, що слово було для нього композиційним орієнтиром, утім це треба перевіряти на конкретному тексті, записі або партитурі."
  focus_points:
    - "авторське самовизначення"
    - "співвідношення таланту й ремесла"
    - "перевірка гіпотези про роль поетичного слова"

- id: comparative-song-structure
  type: comparative-study
  title: "Порівняльний аналіз: «Два кольори» та «Ясени»"
  source_reading: reading-bilash-legacy
  instruction: "Порівняйте два точно визначені виконання з офіційної YouTube-публікації Суспільне Культура. Спершу фіксуйте почуте й побачене, а вже потім пропонуйте інтерпретацію."
  items_to_compare:
    - "«Ясени» (сл. Михайла Ткача) — соліст Микола Губчук; Оркестр народної та популярної музики Українського радіо, диригент Михайло Пікульський; повний відтинок 28:57–32:47, робочий відтинок 29:01–29:47; https://www.youtube.com/watch?v=P6_-jd0nvRU&t=1737s"
    - "«Два кольори» (сл. Дмитра Павличка) — завершальне ансамблеве виконання солістів концерту з Оркестром народної та популярної музики Українського радіо, диригент Михайло Пікульський; повний відтинок 1:03:15–1:07:29, робочий відтинок 1:03:25–1:04:05; https://www.youtube.com/watch?v=P6_-jd0nvRU&t=3795s"
  criteria:
    - "Центральний поетичний образ та його символічне навантаження"
    - "Мелодичний малюнок та темпоритмічні особливості"
    - "Взаємодія слова й аранжування у створенні настрою"
  prompt: |-
    1. Запишіть паспорт кожного виконання: назву пісні, автора слів, названого соліста або склад виконавців, установу, часовий відтинок і URL.
    2. У робочих відтинках 29:01–29:47 та 1:03:25–1:04:05 опишіть початкову фактуру: хто входить першим, скільки голосів виходить на передній план і яку роль має оркестр.
    3. Наведіть по одній точній часовій позначці з кожної пісні й зіставте дикцію, місце вдиху або спосіб виділення ключового слова. Не називайте лад чи гармонію без нот.
    4. Розділіть відповідь на «Спостереження» та «Інтерпретацію»: поясніть, як сольна й ансамблева рамки можуть спрямовувати увагу до образів пам'яті, дороги, дерева або кольорів.
    5. Напишіть висновок обсягом 180–220 слів із двома часовими позначками та маркерами «у цьому виконанні», «можна припустити» й «утім»; назвіть межу висновку без партитури та інших записів.
  model_answer: |-
    1. Обидва записи походять з офіційної публікації Суспільне Культура концерту до 95-річчя Білаша. «Ясени» у відтинку 28:57–32:47 виконує соліст Микола Губчук з Оркестром народної та популярної музики Українського радіо під орудою Михайла Пікульського; «Два кольори» у відтинку 1:03:15–1:07:29 є завершальним ансамблевим номером тієї самої програми.
    2. Спостереження: близько 29:20 у «Ясенах» на передньому плані один чоловічий голос після оркестрового вступу; близько 1:03:40 у «Двох кольорах» камера й звук виводять на передній план групу вокалістів з оркестром. Це опис складу конкретних кадрів і звучання, а не оцінка творів загалом.
    3. Учнівська відповідь має додати по одній власній точній позначці з обох відтинків і описати перевірну ознаку: вимову ключового слова, паузу, вдих або зміну ролі супроводу. Формула «пісня звучить душевно» без позначки й ознаки не виконує завдання.
    4. Інтерпретація: можна припустити, що сольна рамка «Ясенів» індивідуалізує спогад, тоді як ансамблевий вступ «Двох кольорів» переводить образ дороги й материнської вишивки у публічніший регістр. Таке пояснення спирається на спостереження, але не є незмінною властивістю композицій.
    5. Коректний висновок називає Миколу Губчука, ансамблеве виконання «Двох кольорів», обидві часові позначки та відмінність між сольним і груповим поданням. Утім, без партитури й інших фонограм він стосується лише названої концертної програми й не доводить єдиного темпу, емоції або способу виконання цих пісень.

workbook:
- id: reading-bilash-legacy
  type: reading
  title: "Олександр Білаш: від Градизька до жанрового діапазону"
  source: "Навчальний синтез за джерелами ЕСУ, ВУЕ, архівними матеріалами Суспільного та методичними виданнями НБУ для дітей."
  text: "Олександр Білаш народився 6 березня 1931 року в Градизьку на Полтавщині в музичній родині. Методична бібліографія Національної бібліотеки України для дітей згадує його саморобну гармошку й невдалу першу спробу вступити до Полтавського музичного училища. Далі він навчався у вечірній музичній школі, Житомирському музичному училищі та Київській консерваторії в класі Миколи Вілінського, яку закінчив 1957 року. ЕСУ подає Білаша як композитора й поета, автора пісень, романсів, опер, симфонічної та кіномузики. До відомих творів належать «Ясени» на слова Михайла Ткача, «Два кольори» й «Лелеченьки» на слова Дмитра Павличка, а також опера «Гайдамаки» за Шевченком. Білаш мав офіційні радянські посади й відзнаки; цей факт не робить його ані дисидентом, ані постаттю, яку можна пояснити лише інституційною кар'єрою. Для оцінки спадщини треба зіставляти довідкові факти, конкретні записи й межі кожного джерела."
  tasks:
    - "Проаналізуйте шлях Білаша від Градизька до випускника консерваторії: як поєднувалися народний слух і академічна освіта?"
    - "Які твердження уривка є фактами, а яке потребувало б перевірки через слухання конкретного запису?"
    - "Поясніть, чому офіційна кар'єра не доводить автоматично ані опору системі, ані повної тотожності з нею."

- id: source-eval-pavlychko-interview
  type: authorial-intent
  title: "Оцінка архівованого джерела: ідеологічні підозри навколо «Двох кольорів»"
  source_reading: reading-bilash-legacy
  text_excerpt: "Два кольори"
  prompt: >-
    Прочитайте [архівований знімок оригінальної публікації Суспільного про «Два
    кольори»](https://web.archive.org/web/20231206071916id_/https://suspilne.media/culture/81977-ak-pisna-dva-kolori-stala-narodnou/).
    Визначте, які твердження походять зі спогаду Дмитра Павличка, які подає
    редакція і чого матеріал не доводить про біографію Білаша. Поясніть, як
    ретроспективний спогад можна використати без перетворення його на
    універсальну історію переслідування. Живу адресу не використовуйте: її
    перепризначено іншій публікації.
  techniques_to_identify:
    - "ідеологічний нагляд"
    - "політичне прочитання лірики"
    - "художня двозначність символів"
  model_answer: "Архівована публікація Суспільного переказує ретроспективний спогад Павличка про політичну підозру щодо червоно-чорної символіки та труднощі з допуском пісні. Коректна атрибуція звучить так: «за спогадом Павличка…». Публікація допомагає дослідити рецепцію одного твору, але не є архівною справою, не встановлює мотивів кожного посадовця й не доводить персонального переслідування Білаша. Тому з неї не можна виводити готову біографію дисидента; можна лише показати, як образ пісні міг бути політизований у радянському культурному полі."

- id: debate-academic-vs-popular
  type: essay-response
  title: "Дебати: Олександр Білаш — народний пісняр чи академічний композитор?"
  source_reading: reading-bilash-legacy
  prompt: "Оцініть дві позиції щодо творчої ідентичності Олександра Білаша: «пісняр» і «композитор великої форми». Напишіть аргументоване есе (мінімум 200 слів), де перевірите обидві назви за ЕСУ та конкретними творами. Чи доповнюють вони одна одну, чи одна з них точніша для навчального модуля? Назвіть межу доступних доказів."
  min_words: 200
  model_answer: "Назва «пісняр» точно відбиває публічну впізнаваність «Двох кольорів», «Ясенів» та інших пісень, але стає неточною, якщо заперечує решту доробку. ЕСУ фіксує опери, моноопери, симфонічні й хорові твори, романси та кіномузику; опера «Гайдамаки» дає конкретний приклад великої форми. Водночас сам перелік жанрів не доводить художньої якості кожного твору. Тому найобережніший висновок такий: Білаш був професійним композитором широкого жанрового діапазону, чия сучасна впізнаваність значною мірою спирається на пісні. Щоб доводити спільний музичний метод пісні й опери, потрібні партитури, записи або спеціальне дослідження, яких у цьому завданні немає."
  rubric:
    - criteria: "Формулювання тези"
      description: "Чітко висловлює власну позицію щодо двох назв і допускає обґрунтоване заперечення."
      points: 3
    - criteria: "Аргументація та приклади"
      description: "Наводить приклади як пісенних творів, так і великих форм (опера «Гайдамаки»)."
      points: 4
    - criteria: "Мовна якість"
      description: "Використовує складні синтаксичні конструкції та C1 лексику для аналізу музики."
      points: 3

- id: essay-bilash-memory-rebuilt
  type: essay-response
  title: "Есе: архівний телефільм і сучасна концертна програма"
  source_reading: reading-bilash-legacy
  prompt: >-
    Порівняйте телефільм Суспільного [«Баяніст із
    Градизька»](https://mediateka.suspilne.media/media/9666) (2006, 38 хв) з
    офіційною YouTube-публікацією [концерту до 95-річчя
    Білаша](https://www.youtube.com/watch?v=P6_-jd0nvRU) (2026, 1:07:29).
    Напишіть есе (мінімум 250 слів) про те, як біографічний телефільм і
    концертна програма по-різному добирають та обрамлюють матеріал. Наведіть по
    одній часовій позначці з кожного джерела. Не порівнюйте темп чи
    аранжування як дві версії тієї самої пісні, якщо не встановили збіг твору,
    і не приписуйте всім українцям однакової реакції.
  min_words: 250
  model_answer: "Два матеріали належать до різних жанрів: телефільм 2006 року поєднує біографічну розповідь, спогади, архівні кадри й вибрані виконання, а офіційно оприлюднений 2026 року концерт організовує твори у послідовну виконавську програму з розділами. Коректне порівняння називає по одному точному фрагменту з кожного джерела й досліджує спосіб подання: хто говорить або виконує, які вихідні дані показано, як матеріал переходить від коментаря до музики. Воно не приписує різницю в темпі чи аранжуванні історичній «еволюції» без підтвердженої пари тієї самої пісні. Дата YouTube-публікації документує офіційне оприлюднення ювілейного концерту, але не встановлює дати теле- чи радіоефіру й не доводить однакової реакції слухачів. Так само телевізійна рамка 2006 року не визначає музичної сутності кожного архівного виконання. Межа висновку полягає в тому, що два джерела показують два редакційні способи представлення Білаша, а не повну історію рецепції його музики."
  rubric:
    - criteria: "Аналіз сучасної рецепції"
      description: "Порівнює жанр, рамку подання й один точно описаний епізод у двох матеріалах."
      points: 3
    - criteria: "Музично-поетичний аналіз"
      description: "Описує по одному точно позначеному фрагменту з кожного матеріалу й не вдає неперевіреного порівняння тієї самої пісні."
      points: 4
    - criteria: "Межа певності"
      description: "Не ототожнює архівну рамку з музичною суттю й не узагальнює реакцію всіх слухачів."
      points: 3
