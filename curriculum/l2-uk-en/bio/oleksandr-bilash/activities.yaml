- id: comparative-song-structure
  type: comparative-study
  title: "Порівняння джерельних паспортів: «Два кольори» та «Ясени»"
  source_reading: reading-bilash-legacy
  instruction: "Порівняйте дві короткі картки, відокремлюючи довідковий факт, атрибутований спогад і межу джерела."
  items_to_compare:
    - "Картка А — «Два кольори»: ЕСУ називає 1964 рік, композитора Олександра Білаша й автора слів Дмитра Павличка. В інтерв'ю «Високому Замку» Павличко згадує політичну підозру щодо тексту та відмову художньої ради допустити пісню до запису."
    - "Картка Б — «Ясени»: ЕСУ називає 1963 рік, композитора Олександра Білаша й автора слів Михайла Ткача. Окремого джерела про тогочасну рецепцію «Ясенів» у матеріалах цього модуля немає."
  criteria:
    - "Авторство, дата й тип підтвердження"
    - "Різниця між довідковим фактом і ретроспективним спогадом"
    - "Асиметрія джерельної бази та межа порівняння"
  prompt: |-
    1. Складіть для кожної пісні паспорт: рік, автор музики, автор слів і назване джерело.
    2. Позначте, де картка подає довідковий факт, а де — атрибутований ретроспективний спогад.
    3. Поясніть, чому відсутність у модулі окремої історії рецепції «Ясенів» не доводить, що пісня не мала суспільної рецепції.
    4. Сформулюйте одне обережне порівняння образів назв і прямо позначте його як читацьку гіпотезу, а не музикознавчий факт.
    5. Напишіть висновок обсягом 180–220 слів із маркерами «за даними», «за спогадом», «можна припустити» й «утім»; назвіть асиметрію джерел.
  model_answer: |-
    За даними ЕСУ, обидві пісні створив Олександр Білаш: «Ясени» 1963 року на слова Михайла Ткача, а «Два кольори» 1964 року на слова Дмитра Павличка. Це довідкові факти про паспорт творів. Картка «Двох кольорів» містить ще один шар: за спогадом Павличка, червоно-чорна символіка викликала політичну підозру й ускладнила допуск пісні. Такий спогад є атрибутованим свідченням учасника, але не архівною справою і не повним описом рішення всіх посадовців.

    Для «Ясенів» модуль не подає зіставного матеріалу про тогочасну рецепцію. Ця прогалина характеризує добір джерел уроку, а не суспільну долю пісні: з відсутності відомості в картці не випливає відсутність події. Щоб заповнити прогалину, варто було б шукати програми концертів, архіви ефіру, спогади учасників і дослідження рецепції, а потім оцінювати їх окремо. Можна припустити, що назва «Ясени» спрямовує до образу місця й пам'яті, а «Два кольори» — до символічного контрасту. Утім, це читацька гіпотеза; для аналізу поетики потрібен доступний текст, а для музичного порівняння — ноти, безпосередньо перевірені записи або фахове дослідження. Отже, картки дозволяють зіставити авторство, роки й силу підтвердження, але не дають симетричного знання про рецепцію чи звучання двох творів. Такий висновок не приховує прогалини, а робить її частиною дослідницького аргументу.

workbook:
- id: reading-bilash-legacy
  type: reading
  title: "Олександр Білаш: від Градизька до жанрового діапазону"
  source: "Навчальний синтез за джерелами ЕСУ, ВУЕ, архівними матеріалами Суспільного та методичними виданнями НБУ для дітей."
  text: "Олександр Білаш народився 6 березня 1931 року в Градизьку на Полтавщині в музичній родині. Методична бібліографія Національної бібліотеки України для дітей згадує його саморобну гармошку й невдалу першу спробу вступити до Полтавського музичного училища. Далі він навчався у вечірній музичній школі, Житомирському музичному училищі та Київській консерваторії в класі Миколи Вілінського, яку закінчив 1957 року. ЕСУ визначає Білаша як композитора й громадського діяча, перелічує пісні, романси, опери, симфонічну та кіномузику, а також видані збірки його віршів. У бібліотечному виданні сам Білаш називає себе передусім поетом; це атрибутоване самовизначення, а не рольова формула ЕСУ. До відомих творів належать «Ясени» на слова Михайла Ткача, «Два кольори» й «Лелеченьки» на слова Дмитра Павличка, а також опера «Гайдамаки» за Шевченком. Білаш мав офіційні радянські посади й відзнаки; цей факт не робить його ані дисидентом, ані постаттю, яку можна пояснити лише інституційною кар'єрою. Для оцінки спадщини треба зіставляти довідкові факти й межі кожного джерела."
  tasks:
    - "Проаналізуйте шлях Білаша від Градизька до випускника консерваторії: як поєднувалися народний слух і академічна освіта?"
    - "Які твердження уривка є довідковими фактами, яке є атрибутованим самовизначенням, а які додаткові джерела знадобилися б для аналізу музичного методу?"
    - "Поясніть, чому офіційна кар'єра не доводить автоматично ані опору системі, ані повної тотожності з нею."

