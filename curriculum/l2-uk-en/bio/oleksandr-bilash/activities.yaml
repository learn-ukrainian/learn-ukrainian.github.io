---
inline:
- id: quiz-formation
  type: quiz
  title: Формування Білаша
  instruction: Перевір, як ранній слух, освіта і поетичне слово склалися в його композиторську
    мову.
  items:
  - question: Де народився Олександр Білаш?
    options:
    - text: У Градизьку на Полтавщині
      correct: true
    - text: У Львові
      correct: false
    - text: У Харкові
      correct: false
    - text: У Чернівцях
      correct: false
    explanation: Полтавський край важливий для теми ранньої слухової пам'яті.
  - question: Чому історію про невступ до училища треба читати обережно?
    options:
    - text: Бо вона не замінює освіту, ремесло і тривалу працю
      correct: true
    - text: Бо вона доводить, що Білаш не мав музичної освіти
      correct: false
    - text: Бо вона є доказом політичного переслідування
      correct: false
    - text: Бо вона скасовує значення родинного співу
      correct: false
    explanation: Епізод може бути промовистим, але не має ставати всією історією.
  - question: Яке значення мала Київська консерваторія?
    options:
    - text: Вона дала професійну композиційну школу і відчуття масштабу
      correct: true
    - text: Вона відокремила Білаша від українського слова
      correct: false
    - text: Вона зробила народнопісенну інтонацію неважливою
      correct: false
    - text: Вона замінила для нього поезію офіційним гаслом
      correct: false
    explanation: Фахова школа не скасувала ранню пісенність, а дала їй форму.
  - question: Що означає пісенність у цьому життєписі?
    options:
    - text: Здатність авторської мелодії природно нести український рядок
      correct: true
    - text: Механічне копіювання фольклорних записів
      correct: false
    - text: Відмова від професійної музичної техніки
      correct: false
    - text: Переклад українських пісень іншою мовою
      correct: false
    explanation: Пісенність у Білаша поєднує слухову пам'ять і композиторське ремесло.
  - question: Чому фраза «Я перш за все поет» важлива для розуміння Білаша?
    options:
    - text: Вона показує, що мелодія для нього мала чути слово
      correct: true
    - text: Вона доводить, що він не був композитором
      correct: false
    - text: Вона означає відмову від музичної форми
      correct: false
    - text: Вона не має стосунку до його пісень
      correct: false
    explanation: Самовизначення пояснює увагу Білаша до української поетичної інтонації.
- id: true-false-canon
  type: true-false
  title: Пісенний канон без спрощень
  instruction: Познач, які твердження точно передають культурну роль пісень Білаша.
  items:
  - statement: «Два кольори» важливі як поєднання тексту Дмитра Павличка і музики Олександра
      Білаша.
    correct: true
    explanation: Пісня працює саме через нерозривність поетичного образу і мелодії.
  - statement: Пісенний канон означає наказ любити певний твір.
    correct: false
    explanation: Канон тут означає тривале повернення твору в голосах, виконаннях і пам'яті.
  - statement: Опера «Гайдамаки» показує Білаша за межами популярної пісні.
    correct: true
    explanation: Велика форма відкриває його роботу з Шевченком і історичною темою.
  - statement: Радянські звання повністю пояснюють, чому пісні Білаша звучать в Україні.
    correct: false
    explanation: Стійкість пісень пов'язана з мовою, образом, співаністю і культурною пам'яттю.
  - statement: Сучасне виконання Білаша може бути українським переосмисленням, а не повторенням
      радянської рамки.
    correct: true
    explanation: Незалежна й воєнна Україна слухає ці пісні в іншому історичному контексті.
workbook:
- id: reading-bilash-word-memory
  type: reading
  title: 'Читання: слово, мелодія і пам''ять'
  source: Навчальний синтез за енциклопедичними джерелами та бібліографічним матеріалом НБУ
    для дітей.
  text: Олександр Білаш називав себе передусім поетом, бо для нього мелодія не існувала окремо
    від слова. Його пісні тримаються не лише на красивій темі, а на здатності українського
    рядка природно входити в голос. У «Двох кольорах» родинний образ стає ширшою культурною
    пам'яттю; у «Ясенах» лірична сцена не втрачає гідності; твори, пов'язані з Шевченком,
    потребують окремого жанрового й історичного контексту. Радянський інституційний контекст не зникає з життєпису
    Білаша, але не вичерпує його значення. Найстійкіші твори живуть тому, що українські слухачі
    впізнають у них мову дому, дороги, втрати, повернення і тяглості.
  tasks:
  - Визнач головну тезу уривка про зв'язок слова і мелодії.
  - Поясни, чому радянський інституційний контекст не вичерпує значення Білаша.
  - Назви два образи, через які пісні входять у культурну пам'ять.
- id: critical-soviet-context
  type: critical-analysis
  title: 'Критичний аналіз: контекст без ярликів'
  source_reading: reading-bilash-word-memory
  target_text: Білаш мав офіційні відзнаки й посади, але його найвідоміші пісні живуть у ширшій
    українській пам'яті.
  questions:
  - Як можна говорити про радянський контекст Білаша так, щоб не приховувати фактів і не зводити
    його творчість до інституційного ярлика?
  model_answers:
  - 'Точний аналіз тримає два рівні поруч. Перший рівень - реальні факти: державні відзнаки,
    професійні організації, офіційна сцена, твори в радянській тематичній рамці. Другий рівень
    - культурна тривалість пісень, у яких українське слово, родинний образ і мелодія пережили
    систему. Якщо залишити тільки перший рівень, Білаш стає пласким «радянським композитором».
    Якщо залишити тільки другий, зникає історична складність. Переконливе читання пояснює,
    як українська пісенність могла працювати всередині контрольованої культурної системи.'
- id: comparative-song-memory
  type: comparative-study
  title: 'Порівняння: три пісні і три способи пам''яті'
  source_reading: reading-bilash-word-memory
  items_to_compare:
  - «Два кольори»
  - «Ясени»
  - Пісня з фільму «Сон»
  criteria:
  - Який образ тримає пісню?
  - Як працює родинна, лірична або шевченківська пам'ять?
  - Чому пісня може звучати поза своїм первісним політичним часом?
  prompt: Обери дві пісні й порівняй, як у них працює родинна або лірична пам'ять. Зверни
    увагу на образ, голос, поетичного партнера і сучасне звучання.
  model_answer: '«Два кольори» будують спільну пам''ять через образ дороги, матері й вишитих
    кольорів. «Ясени» діють тихіше: ліричний краєвид і дерево відкривають простір для згадки,
    втрати й голосу. Обидві пісні не потребують прямого політичного гасла. Їхня сила в тому,
    що конкретний образ легко переходить у нове виконання.'
- id: authorial-poet-composer
  type: authorial-intent
  title: 'Авторський намір: навіщо композиторові бути поетом?'
  source_reading: reading-bilash-word-memory
  text_excerpt: Я перш за все поет
  prompt: Поясни, як ця фраза допомагає зрозуміти увагу Білаша до українського слова.
  model_answer: 'Фраза не відмовляє Білашеві в композиторському ремеслі. Вона показує його
    пріоритет: мелодія має чути слово, а не підкоряти його зовнішній схемі. Для пісні це вирішально,
    бо український рядок тримається на наголосі, паузі, диханні й інтонації. Коли композитор
    поводиться зі словом як поет, пісня не втрачає мовної гідності.'
- id: essay-bilash-memory
  type: essay-response
  title: 'Есе: Білаш і українська пісенна пам''ять'
  source_reading: reading-bilash-word-memory
  instruction: Напиши зв'язний аргумент із прикладами з життєпису і творів.
  prompt: Чому Олександр Білаш важливий не лише як автор популярних пісень, а й як композитор
    української пісенної пам'яті?
  min_words: 250
  model_answer: 'Олександр Білаш важливий для теми пісенної пам''яті, бо його найтривкіші
    твори живуть не як музейні згадки, а як пісні, що повертаються в різні історичні моменти.
    Його формування почалося з полтавського слухового світу, але не залишилося на рівні природної
    здібності: Житомирське училище й Київська консерваторія дали йому професійну школу. Саме тому
    його пісні можуть здаватися простими, але ця простота зроблена майстерно. У «Двох кольорах»
    слово Дмитра Павличка й мелодія Білаша створюють образ дороги, матері й долі. У «Ясенах»
    лірична сцена не стає порожньою сентиментальністю. Твори, пов''язані з Шевченком, треба
    пояснювати через конкретний жанр і контекст. Радянський контекст його кар''єри треба називати прямо, але
    він не вичерпує культурного значення цих творів. Сучасна Україна може слухати Білаша як
    частину власної мовної й музичної тяглості.'
  peer_review_guidelines: Чи є теза про пісенну пам'ять, а не лише перелік фактів? Чи названо
    радянський контекст без спрощення? Чи використано принаймні два конкретні твори?
  rubric:
  - criteria: Теза
    description: Пояснює, чому Білаш важливий для української пісенної пам'яті.
    points: 3
  - criteria: Докази
    description: Спирається на факти життя, освіту, поетичну співпрацю і твори.
    points: 4
  - criteria: Нюанс
    description: Не приховує радянський контекст і не зводить до нього всю постать.
    points: 3
