  model_answer: "В інтерв'ю Павличко згадує відмову художньої ради допустити пісню до запису та пізнішу партійно-радянську характеристику твору як націоналістичного. Коректна атрибуція звучить так: «за спогадом Павличка…». Інтерв'ю допомагає дослідити рецепцію одного твору, але не є архівною справою, не встановлює мотивів кожного посадовця й не доводить персонального переслідування Білаша. Тому з нього не можна виводити готову біографію дисидента; можна лише показати, як текст пісні, за свідченням одного зі співавторів, політизували в радянському культурному полі."

- id: debate-academic-vs-popular
  type: essay-response
  title: "Дебати: Олександр Білаш — народний пісняр чи академічний композитор?"
  source_reading: reading-bilash-legacy
  prompt: "Оцініть дві позиції щодо творчої ідентичності Олександра Білаша: «пісняр» і «композитор великої форми». Напишіть аргументоване есе (мінімум 200 слів), де перевірите обидві назви за ЕСУ та конкретними творами. Чи доповнюють вони одна одну, чи одна з них точніша для навчального модуля? Назвіть межу доступних доказів."
  min_words: 200
  model_answer: "Назва «пісняр» точно відбиває публічну впізнаваність «Двох кольорів», «Ясенів» та інших пісень, але стає неточною, якщо заперечує решту доробку. ЕСУ фіксує опери, моноопери, симфонічні й хорові твори, романси та кіномузику; опера «Гайдамаки» дає конкретний приклад великої форми. Водночас сам перелік жанрів не доводить художньої якості кожного твору. Тому найобережніший висновок такий: Білаш був професійним композитором широкого жанрового діапазону, чия сучасна впізнаваність значною мірою спирається на пісні. Щоб доводити спільний музичний метод пісні й опери, потрібні партитури, записи або спеціальне дослідження, яких у цьому завданні немає."
  rubric:
    - criteria: "Формулювання тези"
      description: "Чітко висловлює власну позицію щодо двох назв і допускає обґрунтоване заперечення."
      points: 3
    - criteria: "Аргументація та приклади"
      description: "Наводить приклади як пісенних творів, так і великих форм (опера «Гайдамаки»)."
      points: 4
    - criteria: "Мовна якість"
      description: "Використовує складні синтаксичні конструкції та C1 лексику для аналізу музики."
      points: 3

- id: essay-bilash-memory-rebuilt
  type: essay-response
  title: "Есе: енциклопедія й архівний каталог"
  source_reading: reading-bilash-legacy
  prompt: |-
    Порівняйте дві навчальні картки, що стисло переказують відкриті сторінки установ.

    **Картка ЕСУ.** Енциклопедія визначає Білаша як композитора й громадського діяча; подає дати, освіту, посади, відзнаки, жанри й вибрані твори, а також перелічує видані збірки його віршів.

    **Картка Медіатеки Суспільного.** Каталог називає «Баяніста із Градизька» 38-хвилинним телефільмом Національної телерадіокомпанії України 2006 року. В описі заявлено біографічну розповідь, спогади рідних і колег, архівні кадри та вибрані виконання.

    Напишіть есе (мінімум 250 слів) про те, як жанр джерела визначає добір відомостей. Наведіть щонайменше по два точні спостереження над кожною карткою, відокремте факт від оцінки й поясніть межу каталожного опису: він документує заявлений склад телефільму, але не замінює перегляду й не підтверджує змісту кожного фрагмента.
  min_words: 250
  model_answer: |-
    Картки представляють ту саму постать за різними правилами добору. ЕСУ працює як енциклопедія: називає Олександра Білаша композитором і громадським діячем, вибудовує хронологію освіти та кар'єри, фіксує відзнаки й подає перелік жанрів і творів. Окрема згадка про видані збірки віршів важлива, бо документує поетичну працю, не приписуючи ЕСУ формули «композитор і поет». Отже, картка дає стислий довідковий каркас, але не відтворює щоденної роботи митця, його внутрішніх мотивів або повної історії рецепції.

    Каталог Медіатеки має іншу функцію. Він ідентифікує конкретний медіаоб'єкт: телефільм «Баяніст із Градизька», вироблений Національною телерадіокомпанією України 2006 року, тривалістю 38 хвилин. Опис також перелічує типи матеріалу — біографічну розповідь, родинні й колегіальні спогади, архівні кадри та вибрані виконання. Це спостереження над каталожною карткою, а не над самим відеорядом. Воно дозволяє сказати, як установа анотує склад програми, але не дає права переказувати слова учасників, описувати кадри чи оцінювати виконання без безпосереднього перегляду.

    Можна припустити, що енциклопедія прагне репрезентативності життєпису, а каталог — зацікавити користувача конкретним архівним матеріалом. Утім, це пояснення жанрової різниці, а не судження, що одне джерело «об'єктивне», а друге «емоційне». Обидві установи скорочують матеріал: ЕСУ обирає довідкові віхи, Медіатека — складники медіаоб'єкта. Порівняння також показує різні форми атрибуції. Енциклопедична картка відповідає за біографічні формули та перелік творів; каталог відповідає за назву, виробника, рік, тривалість і заявлений склад програми. Якщо потрібні точні слова співрозмовника або опис конкретної сцени, каталогу вже недостатньо: необхідний доступний уривок, транскрипт або безпосередня перевірка матеріалу. Так само перелік жанрів у ЕСУ не доводить художньої якості кожного твору. Доказовий висновок тому обмежений: картки показують два способи інституційного представлення Білаша, але не повну біографію, не зміст кожного фрагмента телефільму і не реакцію всіх слухачів на його музику.
  rubric:
    - criteria: "Порівняння жанрів джерел"
      description: "Пояснює принцип добору ЕСУ та каталогу Медіатеки на підставі вбудованих карток."
      points: 3
    - criteria: "Точність спостережень"
      description: "Наводить щонайменше по два точні спостереження над кожною карткою й не домислює зміст телефільму."
      points: 4
    - criteria: "Межа певності"
      description: "Відділяє факт від оцінки та пояснює, чого енциклопедична й каталогова картки не доводять."
      points: 3
