---
inline:
  - id: quiz-formation
    type: quiz
    title: "Формування Білаша"
    instruction: "Перевір факти ранньої біографії і не перетворюй їх на легенду."
    items:
      - question: "Де народився Олександр Білаш?"
        options:
          - text: "У Градизьку на Полтавщині"
            correct: true
          - text: "У Львові"
            correct: false
          - text: "У Харкові"
            correct: false
          - text: "У Чернівцях"
            correct: false
        explanation: "Градизьк і Полтавщина важливі для теми ранньої слухової пам'яті."
      - question: "Чому історію про невступ до училища треба читати обережно?"
        options:
          - text: "Бо вона не замінює фахової освіти і праці"
            correct: true
          - text: "Бо вона доводить, що Білаш не навчався музики"
            correct: false
          - text: "Бо вона є головним доказом переслідування"
            correct: false
          - text: "Бо вона замінює всі інші джерела"
            correct: false
        explanation: "Анекдот може бути педагогічним входом, але не центром біографії."
      - question: "Яку роль мала Київська консерваторія?"
        options:
          - text: "Дала професійну композиційну школу і відчуття масштабу"
            correct: true
          - text: "Замінила для Білаша українську пісенність російською моделлю"
            correct: false
          - text: "Відокремила його від поетичного слова"
            correct: false
          - text: "Зробила народнопісенну традицію неважливою"
            correct: false
        explanation: "Освіта дала техніку, але не скасувала української слухової пам'яті."
      - question: "Що означає пісенність у цій біографії?"
        options:
          - text: "Здатність авторської музики тримати українську співану інтонацію"
            correct: true
          - text: "Механічне копіювання фольклорних текстів"
            correct: false
          - text: "Відмову від професійної музичної освіти"
            correct: false
          - text: "Переклад українських пісень російською"
            correct: false
        explanation: "Пісенність не дорівнює простому фольклорному запозиченню."
      - question: "Яке самовизначення Білаша допомагає зрозуміти його увагу до слова?"
        options:
          - text: "Він називав себе передусім поетом"
            correct: true
          - text: "Він заперечував значення поезії"
            correct: false
          - text: "Він працював лише як диригент"
            correct: false
          - text: "Він не мав стосунку до української поезії"
            correct: false
        explanation: "Коротка фраза про поета пояснює, чому слово в його піснях таке важливе."

  - id: true-false-canon
    type: true-false
    title: "Пісенний канон без спрощень"
    instruction: "Познач твердження як істинні або хибні."
    items:
      - statement: "Пісенний канон тут означає наказ любити певну пісню."
        correct: false
        explanation: "Канон означає тривалу культурну пам'ять і повторне виконання."
      - statement: "«Два кольори» важливі як поєднання тексту Дмитра Павличка і музики Білаша."
        correct: true
        explanation: "Пісня показує співпрацю поета і композитора."
      - statement: "«Ясени» показують лише офіційний радянський стиль без ліричної сцени."
        correct: false
        explanation: "Ця пісня пов'язана з ліричною сценою і поетичним образом."
      - statement: "Опера «Гайдамаки» розширює образ Білаша за межі популярної пісні."
        correct: true
        explanation: "Велика форма показує його роботу з Шевченком і історичною темою."
      - statement: "Для Білаша співпраця з поетами була другорядною деталлю."
        correct: false
        explanation: "Поетично-композиторська співпраця є центральним механізмом його пісень."

workbook:
  - id: reading-01
    type: reading
    title: "Джерело: Білаш про поезію і композицію"
    source: "Національна бібліотека України для дітей, методична бібліографія про Олександра Білаша"
    text: "«Я перш за все поет, бо поетами народжуються, композиторами стають»."
    tasks:
      - "Поясни, чому Білаш пов'язує композицію з поетичним самовизначенням."
      - "Знайди в уроці місце, де ця думка пояснює увагу до українського слова."
      - "Сформулюй одну тезу про роль поета і композитора у пісні."

  - id: critical-soviet-context
    type: critical-analysis
    title: "Радянська доба без ярликів"
    source_reading: reading-01
    target_text: >-
      Білаш не є прикладом героїчного спротиву у політичному сенсі. Він також
      не є лише знаком радянської лояльності. Він є прикладом того, як
      українська пісенна культура працювала всередині суперечливого
      інституційного простору.
    questions:
      - "Які факти не можна замовчувати, коли говоримо про офіційне визнання Білаша?"
      - "Чому не можна автоматично називати його дисидентом?"
      - "Як українська пісенність змінює оцінку його радянського контексту?"
    model_answers:
      - >-
        Сильна відповідь тримає дві речі разом: офіційні звання, посади й
        радянсько-тематичні твори є реальними фактами, але вони не вичерпують
        культурного значення Білаша. Його найтривкіша спадщина пов'язана з
        українським словом, поетичною співпрацею і піснями, які люди прийняли
        як власну пам'ять.

  - id: comparative-song-memory
    type: comparative-study
    title: "Порівняння: три пісні і три способи пам'яті"
    source_reading: reading-01
    items_to_compare:
      - "«Два кольори»"
      - "«Ясени»"
      - "Пісня з фільму «Сон»"
    criteria:
      - "Який поетичний образ тримає пісню?"
      - "Як працює українська родинна або лірична пам'ять?"
      - "Чи видно зв'язок із ширшою культурною історією?"
    prompt: >-
      Обери дві пісні й поясни, чому вони можуть жити довше за політичний
      контекст, у якому були створені.
    model_answer: >-
      «Два кольори» працюють через родинний образ і пам'ять дороги, тому
      слухач може чути в них не протокол доби, а мову матері, втрати й
      повернення. Пісня з фільму «Сон» додає шевченківський і кінематографічний
      контекст. Обидві пісні показують, як лірична форма може виконувати
      культурну роботу без прямого гасла.

  - id: authorial-poet-composer
    type: authorial-intent
    title: "Навіщо композиторові бути поетом?"
    source_reading: reading-01
    text_excerpt: "Я перш за все поет"
    prompt: "Поясни, як фраза «Я перш за все поет» допомагає зрозуміти увагу Білаша до українського слова."
    model_answer: >-
      Фраза не заперечує композиторської професії. Вона показує, що для Білаша
      мелодія і слово працювали разом: музика мала не зламати український
      рядок, а дати йому голос, паузу і пам'ять.

  - id: essay-bilash-memory
    type: essay-response
    title: "Есе: Білаш і українська пісенна пам'ять"
    source_reading: reading-01
    prompt: >-
      Напиши 250-400 слів про те, чому Олександра Білаша треба читати як
      композитора української пісенної пам'яті, а не як простий символ
      радянського успіху або безконфліктного національного героя.
    min_words: 250
    model_answer: >-
      Сильне есе має показати три рівні: професійне формування Білаша,
      пісенний канон і складний радянський контекст. Воно не повинно вигадувати
      переслідування, але й не повинно зводити композитора до офіційних звань.
      Найпереконливіша теза пояснює, як українське слово, співаність і сучасне
      виконання дозволяють його пісням залишатися частиною української пам'яті.
