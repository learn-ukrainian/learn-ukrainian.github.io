---
inline:
  - id: quiz-source-conflict
    type: quiz
    title: Дві дати, один відкритий висновок
    instruction: Оберіть відповідь, яка зберігає точність джерел і межу доказу.
    items:
      - question: Як джерела датують арешт Іларіона Майбороди?
        options:
          - text: НСКУ пов'язує арешт із літом 1936 року, а Запорізька бібліотека називає 9 березня 1938 року
            correct: true
          - text: Обидва джерела однозначно називають 1936 рік
            correct: false
          - text: Обидва джерела однозначно називають 1938 рік
            correct: false
          - text: Жодне джерело не повідомляє про арешт
            correct: false
        explanation: Розбіжність треба атрибутувати, а не усувати здогадом.
      - question: Який висновок є найточнішим?
        options:
          - text: Джерела підтверджують сімейну репресію, але суперечать одне одному щодо дати арешту
            correct: true
          - text: Пізніша дата автоматично правдива, бо вона конкретніша
            correct: false
          - text: Інституційна сторінка автоматично правдива, бо представляє композиторів
            correct: false
          - text: Суперечність дозволяє обрати будь-яку дату
            correct: false
        explanation: Конкретність посилює повідомлення, але не скасовує потреби зіставити архівні документи.
      - question: Чого сімейна репресія не доводить?
        options:
          - text: Наявності персональної справи органів безпеки проти Платона Майбороди
            correct: true
          - text: Потреби атрибутувати джерело
            correct: false
          - text: Існування розбіжності між публікаціями
            correct: false
          - text: Важливості родинної історії
            correct: false
        explanation: Для персональної справи потрібен окремий документальний доказ.
      - question: Що робить повідомлення Запорізької бібліотеки конкретнішим?
        options:
          - text: Дата, реквізити вилучених речей і посилання на архівну справу
            correct: true
          - text: Емоційний тон автора
            correct: false
          - text: Відсутність будь-яких подробиць
            correct: false
          - text: Припущення про думки композитора
            correct: false
        explanation: Реквізити можна перевіряти; емоційна мова сама по собі не є доказом.
      - question: Яка фраза правильно позначає атрибуцію?
        options:
          - text: За повідомленням НСКУ, арешт відбувся після від'їзду Платона до Києва
            correct: true
          - text: Усім відомо, що арешт стався саме тоді
            correct: false
          - text: Композитор напевно приховував цю подію
            correct: false
          - text: Дата не має значення, тому її можна пропустити
            correct: false
        explanation: Формула «за повідомленням» показує, кому належить твердження.

  - id: true-false-formation
    type: true-false
    title: Освіта, експедиції та війна
    instruction: Позначте, чи відповідає твердження послідовності, поданій в ЕСУ та НСКУ.
    items:
      - statement: Левко Ревуцький пов'язаний із композиційною освітою Майбороди, а Дмитро Ревуцький — із заняттями з фольклору.
        correct: true
        explanation: Це дві різні, документовані освітні ролі.
      - statement: 1939 року Майборода записував гуцульський фольклор у Східній Галичині.
        correct: false
        explanation: 1939 року він працював на Полтавщині; експедиція до Східної Галичини відбулася 1940 року.
      - statement: За ЕСУ, брати втекли з полону 1942 року, а 1943 року були інтерновані в Катовіце.
        correct: true
        explanation: Саме таку послідовність подає основне енциклопедичне джерело.
      - statement: Наявність фольклорних експедицій доводить походження кожного мелодичного звороту в піснях Майбороди.
        correct: false
        explanation: Для такого висновку треба зіставляти записи, партитури й музикознавчі дослідження.
      - statement: 1945 року Майборода керував військовим ансамблем пісні й танцю у Відні.
        correct: true
        explanation: Цей післявоєнний етап фіксує ЕСУ.

  - id: critical-listening-taranets
    type: critical-analysis
    title: 'Слухова лабораторія: Олександр Таранець (метадані: 1957)'
    instruction: >-
      Відкрийте запис Суспільне Медіатеки й аналізуйте тільки перший трек,
      «Пісню про рушник» у виконанні Олександра Таранця.
    target_text: >-
      https://mediateka.suspilne.media/media/4753 — робочий інтервал
      00:33–04:07; вікна 00:33–01:05, 01:05–02:00, 03:10–04:07.
    questions:
      - >-
          У 00:33–01:05 позначте вступ голосу, два місця подиху й напрям
          мелодичного контуру. Які часові позначки підтверджують відповідь?
      - >-
          У 01:05–02:00 оберіть два виразно почуті слова, перевірте їхній
          нормативний наголос і опишіть співвідношення словесного та
          музичного акцентів.
      - >-
          Які функції супроводу ви чуєте: пульс, довгі опорні звуки,
          дублювання мелодії, відповідь між фразами чи зміну щільності?
      - >-
          Порівняйте ранню фразу з фрагментом 03:10–04:07 за тривалістю,
          динамікою й каденцією. Що можна сказати тільки про цей запис?
    model_answers:
      - >-
          Відповідь має містити щонайменше три часові позначки й схему
          контуру. Назви нот не потрібні, якщо студент їх не може надійно
          визначити; достатньо описати піднесення, спад або утримання.
      - >-
          Спершу студент фіксує почуту форму слова, потім перевіряє наголос
          у словнику. Висновок має розрізняти словесний наголос, музичну
          тривалість і виконавську дикцію.
      - >-
          Супровід треба описати через почуту функцію. Неперевірена назва
          конкретного інструмента не зараховується як доказ.
      - >-
          Коректна відповідь починається формулою «у записі Олександра
          Таранця, позначеному Медіатекою 1957 роком». Вона не перетворює
          виконавську манеру на універсальний намір Майбороди.

workbook:
  - id: reading-maiboroda-evidence
    type: reading
    title: 'Читання: біографія з названими межами'
    source: Навчальний синтез за ЕСУ, НСКУ, ЦДАМЛМ, НБУВ і прийнятим досьє.
    text: >-
      Платон Майборода здобував композиційну освіту в класі Левка
      Ревуцького й окремо вивчав український фольклор у Дмитра Ревуцького.
      Експедиції 1939 року на Полтавщину та 1940 року до Східної Галичини
      документують його польову працю з народною піснею, але не дозволяють
      без партитури виводити походження кожного авторського мотиву. Під час
      Другої світової війни він разом із братом Георгієм вступив до
      народного ополчення, пережив полон, утечу та інтернування, а згодом
      приєднався до 1-го Українського фронту. Від 1948 року Майборода
      співпрацював з Андрієм Малишком; ЕСУ говорить про понад 22 спільні
      твори. Ця формула точніша за округлене число. Слова пісень належали
      поетові, музика — композиторові, а кожен запис додавав виконавське
      рішення. Понад 100 пісень, вокально-симфонічні твори, театр і кіно
      доводять широкий жанровий діапазон, однак сам перелік не визначає
      художньої якості. Нагороди й членство в правліннях спілок описують
      офіційний статус; вони не дають готової відповіді про особисті
      мотиви Майбороди.
    tasks:
      - Випишіть чотири факти, для яких у тексті названо джерельну межу.
      - Поясніть різницю між доказом фольклористичної праці й доказом походження мелодії.
      - Розподіліть ролі Малишка, Майбороди та виконавця.
      - Сформулюйте одне питання, на яке перелік творів не відповідає.

  - id: critical-source-evaluation-arrest
    type: critical-analysis
    title: 'Оцінка джерел: 1936 чи 1938?'
    instruction: >-
      Оцініть два стислих повідомлення як різні джерельні конструкції.
      Не обирайте переможця без прямого архівного зіставлення.
    target_text: >-
      Повідомлення А: НСКУ пов'язує арешт Іларіона Майбороди з від'їздом
      Платона до Києва влітку 1936 року й пише, що це сталося через тиждень.
      Повідомлення Б: стаття Запорізької обласної універсальної наукової
      бібліотеки називає 9 березня 1938 року, описує обшук і посилається на
      архівну справу. Обидва тексти є пізнішими публікаціями, а не самим
      протоколом арешту.
    focus_points:
      - Авторство й інституційна позиція
      - Близькість до первинного документа
      - Конкретність реквізитів
      - Відокремлення факту від емоційної мови
      - Межа можливого висновку
    questions:
      - Які елементи можна перевірити незалежно в кожному повідомленні?
      - Чому точна дата й номер справи посилюють, але не завершують перевірку?
      - Який документ міг би розв'язати суперечність?
      - Чого ці повідомлення не доводять про особисті погляди Платона Майбороди?
    model_answers:
      - >-
        В обох повідомленнях можна окремо перевірити установу-публікатора,
        названу дату, біографічний контекст і наявність посилання на архів.
      - >-
        Точна дата й номер справи дають перевірювані реквізити, але семінар
        не має прямої копії справи, тому конкретність ще не є остаточним
        підтвердженням.
      - >-
        Суперечність могли б розв'язати протокол арешту, облікова картка
        ув'язненого та сама архівна справа, зіставлені з документами родини.
      - >-
        Жодне повідомлення не встановлює особистої реакції композитора,
        його політичних поглядів або наявності окремої справи проти нього.

  - id: comparative-roles
    type: comparative-study
    title: 'Порівняння: текст, музика, виконання, рецепція'
    source_reading: reading-maiboroda-evidence
    items_to_compare:
      - Андрій Малишко
      - Платон Майборода
      - Олександр Таранець
      - Енциклопедичне й архівне джерело
    criteria:
      - Який матеріал або рішення належить цій ролі?
      - Який доказ потрібен для твердження про цю роль?
      - Якого висновку з цього доказу робити не можна?
    prompt: >-
      Побудуйте чотирирівневу модель «Пісні про рушник» і поясніть, чому
      широка рецепція не скасовує авторства, а один запис не дорівнює
      повній історії твору.
    model_answer: >-
      Малишко створив поетичний текст, тому твердження про слова треба
      перевіряти за авторизованим текстовим джерелом. Майборода написав
      музику; висновки про композиційну форму потребують партитури або
      уважного слухання її звукового втілення. Таранець реалізував твір у
      записі, позначеному Медіатекою 1957 роком, тож часові спостереження
      стосуються саме цієї версії. Енциклопедія й архів описують біографію,
      каталог і рецепцію,
      але не замінюють звук. Колективна пам'ять пояснює тривале життя
      пісні, проте не робить її безіменною народною композицією.

  - id: critical-catalogue
    type: critical-analysis
    title: 'Критичний аналіз: що доводить каталог?'
    source_reading: reading-maiboroda-evidence
    target_text: >-
      Понад 100 пісень, вокально-симфонічні твори, музика до 15 вистав і
      13 фільмів доводять жанровий діапазон, але не однакову художню вагу.
    questions:
      - Який висновок про Майбороду підтримують числа й назви жанрів?
      - Якого естетичного висновку вони не підтримують без партитур і записів?
      - Які два твори ви обрали б для перевірки зв'язку між піснею та великою формою і чому?
    model_answers:
      - Перелік доводить, що композитор працював не лише з популярною піснею.
      - Він не доводить однакової якості всіх творів і не описує спільного стилю.
      - >-
          Вибір має бути дослідницьким: одна пісня з доступним записом і
          один вокально-симфонічний твір із партитурою або надійним
          виконанням. Без такого пакета порівняння лишається планом.

  - id: essay-maiboroda-composer
    type: essay-response
    title: 'Есе: який аргумент витримує перевірку?'
    source_reading: reading-maiboroda-evidence
    instruction: >-
      Напишіть доказовий текст, у якому джерельний факт, слухове
      спостереження та інтерпретація позначені різними мовними формулами.
    prompt: >-
      Яке визначення найкраще пояснює доробок Платона Майбороди:
      композитор пісенної фрази, митець широкого жанрового діапазону,
      фольклорист-практик чи діяч музичних інституцій? Оберіть тезу,
      розгляньте сильне заперечення й назвіть межу доказів.
    min_words: 250
    model_answer: >-
      Найпереконливіше визначати Майбороду як композитора, для якого
      пісенна фраза стала центральною, але не єдиною формою праці. Цю тезу
      підтримує не сама популярність «Пісні про рушник», а поєднання
      кількох доказів. ЕСУ фіксує навчання у Левка Ревуцького, заняття з
      фольклору в Дмитра Ревуцького та експедиції 1939–1940 років. Те саме
      джерело говорить про понад 22 спільні твори з Андрієм Малишком, а
      запис Олександра Таранця, позначений Медіатекою 1957 роком, дає змогу
      описати конкретне фразування, дикцію й супровід. Сильне заперечення
      полягає в тому,
      що ярлик «пісенний композитор» зменшує вокально-симфонічні твори,
      театр і 13 фільмів. Тому тезу треба уточнити: пісня є найвідомішою
      частиною ширшого жанрового діапазону. Офіційні премії та членство в
      правліннях спілок доводять статус, але не пояснюють музичної якості
      й не встановлюють особистих мотивів. Межа мого висновку така: один
      запис і довідковий каталог не дають повного стильового аналізу всіх
      творів; для нього потрібні партитури, інші виконання та спеціальне
      музикознавче дослідження.
    peer_review_guidelines: >-
      Чи названа теза? Чи є щонайменше один факт із джерела й одне
      спостереження з часовою позначкою? Чи розглянуто заперечення? Чи
      сформульована межа доказу без загальної редакційної формули?
    rubric:
      - criteria: Доказова теза
        description: Формулює позицію й пов'язує її з перевіреними джерелами.
        points: 3
      - criteria: Слухове спостереження
        description: Наводить точний час і називає музично-мовну ознаку.
        points: 3
      - criteria: Заперечення й межа
        description: Розглядає альтернативу та не виходить за межі пакета.
        points: 3
      - criteria: Мова C1
        description: Розрізняє факт, атрибуцію, інтерпретацію й поступку.
        points: 1
