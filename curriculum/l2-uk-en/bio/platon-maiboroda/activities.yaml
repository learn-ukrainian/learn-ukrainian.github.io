---
inline:
- id: quiz-conflict-map
  type: quiz
  title: Майборода без одного ярлика
  instruction: Перевір, як життєпис розрізняє композиторське авторство, популярність і радянський контекст.
  items:
  - question: Чому Майбороду не можна зводити до одного хіта?
    options:
    - text: Бо його спадщина охоплює пісенний канон, фольклорне слухання, кіно, педагогіку й ширший доробок
      correct: true
    - text: Бо «Пісня про рушник» не має автора музики
      correct: false
    - text: Бо він писав тільки симфонії
      correct: false
    - text: Бо популярність не має стосунку до біографії
      correct: false
    explanation: Відомий символ відкриває тему, але не вичерпує композиторську біографію.
  - question: Яке формулювання найточніше описує авторство «Пісні про рушник»?
    options:
    - text: Слова Андрія Малишка і музика Платона Майбороди
      correct: true
    - text: Безіменна народна пісня без авторів
      correct: false
    - text: Слова і музика Майбороди
      correct: false
    - text: Текст Олександра Білаша і музика Малишка
      correct: false
    explanation: Поетичне і музичне авторство треба розрізняти протягом усього аналізу.
  - question: Чому радянські медіа не пояснюють усю тривалість пісень?
    options:
    - text: Вони могли дати канал, але довга пам'ять потребує мови, форми й повторення
      correct: true
    - text: Бо пісні Майбороди ніколи не звучали публічно
      correct: false
    - text: Бо медіа не існували
      correct: false
    - text: Бо всі популярні пісні автоматично стають каноном
      correct: false
    explanation: Канал поширення не гарантує культурної тривалості.
  - question: Як тут трактовано родинну репресію?
    options:
    - text: Як сімейну трагедію, не як доведену персональну справу Майбороди
      correct: true
    - text: Як доказ арешту самого композитора
      correct: false
    - text: Як тему, яку треба повністю замовчати
      correct: false
    - text: Як літературну вигадку без історичного значення
      correct: false
    explanation: Межа доказу не дозволяє змішувати родинну травму з персональною справою.
  - question: Що тут означає кантилена?
    options:
    - text: Плавна співуча мелодична лінія з професійною формою
      correct: true
    - text: Випадковий набір нот
      correct: false
    - text: Заборона на український текст
      correct: false
    - text: Назва офіційної посади
      correct: false
    explanation: Кантилена допомагає говорити про мелодичну форму, а не лише про емоцію.
- id: true-false-shadow
  type: true-false
  title: Авторство, травма і пам'ять
  instruction: Познач, які твердження точно передають тіньові ризики читання.
  items:
  - statement: Пісні Майбороди могли стати народно впізнаваними, але це не робить їх творами без автора.
    correct: true
    explanation: Народна впізнаваність і авторське походження не суперечать одне одному.
  - statement: Родинна репресія автоматично доводить персональну справу композитора.
    correct: false
    explanation: Це різні рівні доказу, які не можна змішувати.
  - statement: Радянські інституції треба називати як канал і обмеження.
    correct: true
    explanation: Вони давали сцену й медіа, але також задавали правила.
  - statement: Довгі цитати з текстів пісень потрібні для аналізу Майбороди.
    correct: false
    explanation: Достатньо назв, коротких сигналів, переказу образу і аналізу мелодичної ролі.
  - statement: Композиторська легкість часто є результатом точного ремесла.
    correct: true
    explanation: Природне звучання не означає відсутність професійної роботи.
workbook:
- id: reading-maiboroda-melody-memory
  type: reading
  title: 'Читання: мелодія як культурна пам''ять'
  source: Навчальний синтез за ЕСУ, НСКУ, НБУВ, досьє та плановими джерелами.
  text: >-
    Платон Майборода став одним із центральних композиторів української
    пісенної пам'яті тому, що його мелодії не просто прикрашали текст, а
    допомагали українському слову перейти в голос. У співпраці з Андрієм
    Малишком пісні про матір, дорогу, Київ, школу і стежину стали частиною
    публічного й родинного повторення. Радянська інституційна система дала
    цим творам канали поширення, але не пояснює їхньої тривалості повністю.
    Тривалість потребує форми: природного наголосу, дихання, кантилени,
    пам'ятного образу і точного співвідношення слова та мелодії.
  tasks:
  - Визнач головну тезу уривка про мелодію і пам'ять.
  - Поясни, чому медіаканал не гарантує довгої рецепції.
  - Назви два образи, які пов'язують Майбороду з Малишком.
- id: critical-melody-context
  type: critical-analysis
  title: 'Критичний аналіз: мелодія в офіційній системі'
  source_reading: reading-maiboroda-melody-memory
  target_text: Радянська система могла поширювати пісні Майбороди, але не вичерпує їхнього українського значення.
  questions:
  - Як пояснити цю тезу без замовчування офіційного контексту і без редукції до нього?
  model_answers:
  - >-
    Потрібно розрізнити канал і зміст. Радянські інституції, фільми, радіо,
    концерти й нагороди справді допомагали пісням ставати публічними. Але
    довга українська пам'ять залежить також від мови Малишка, мелодії
    Майбороди, фольклорного слухання, образів матері, дороги й Києва,
    виконання і родинного повторення. Якщо залишити тільки систему, зникне
    композиторська праця. Якщо залишити тільки емоцію, зникне історична
    складність.
- id: comparative-poet-composer
  type: comparative-study
  title: 'Порівняння: слово і мелодія'
  source_reading: reading-maiboroda-melody-memory
  items_to_compare:
  - Андрій Малишко
  - Платон Майборода
  - Пісня як спільний твір
  criteria:
  - Хто створює поетичний образ?
  - Хто створює мелодичну форму?
  - Як слухач перетворює твір на пам'ять?
  prompt: >-
    Поясни, чому в «Пісні про рушник» треба розрізняти слова, музику і
    пізнішу пам'ять, але не розривати їх.
  model_answer: >-
    Слова Малишка дають образ матері, дороги і рушника. Музика Майбороди
    робить цей образ придатним для голосу, запам'ятовування і виконання.
    Слухачі, виконавці, фільм і родинне повторення створюють пізнішу
    пам'ять. Якщо розділити ці рівні повністю, пісня розпадеться. Якщо їх
    змішати, зникне точність авторства.
- id: authorial-cantilena
  type: authorial-intent
  title: 'Авторський намір: як мелодія чує слово?'
  source_reading: reading-maiboroda-melody-memory
  text_excerpt: мелодія має нести український рядок
  prompt: >-
    Поясни, що означає ця формула для композитора, який пише музику на
    слова іншого автора.
  model_answer: >-
    Композитор не створює слова, але він визначає, як вони звучатимуть у
    голосі. Мелодія має поважати наголос, паузу, дихання і образну логіку
    рядка. Якщо вона ламає мову, пісня стає зовнішньою прикрасою. Якщо вона
    чує слово, текст може перейти в пам'ять через спів.
- id: essay-maiboroda-memory
  type: essay-response
  title: 'Есе: Майборода і українська публічна пам''ять'
  source_reading: reading-maiboroda-melody-memory
  instruction: Напиши зв'язний аргумент із прикладами з біографії, співпраці й контексту.
  prompt: >-
    Чому Платона Майбороду треба читати як композитора української
    пісенної пам'яті, а не лише як автора популярної мелодії?
  min_words: 250
  model_answer: >-
    Платона Майбороду треба читати ширше, ніж через один популярний твір,
    бо його мелодії стали частиною української культурної інфраструктури.
    Його професійна школа пов'язана з Києвом, Ревуцькими і фольклорним
    слуханням, а біографія містить родинну травму, війну і післявоєнну
    роботу в офіційних музичних інституціях. Найвідоміші пісні з Андрієм
    Малишком поєднали поетичні образи матері, дороги, Києва, школи й
    стежини з мелодіями, які можна було запам'ятати і повторити. Радянська
    система дала канали поширення через фільм, радіо, концерт і нагороди,
    але вона не пояснює всю тривалість цих пісень. Тривалість виникає з
    української мови, кантилени, виконання і слухацької пам'яті. Тому
    Майборода є не фоном до Малишка і не просто автором «Пісні про рушник»,
    а композитором, який допоміг українському слову стати публічним голосом.
  peer_review_guidelines: >-
    Чи є теза про композиторську роль? Чи розрізнено слова Малишка і музику
    Майбороди? Чи названо радянський контекст без редукції?
  rubric:
  - criteria: Теза
    description: Пояснює роль Майбороди в українській пісенній пам'яті.
    points: 3
  - criteria: Докази
    description: Використовує біографію, співпрацю з Малишком і мелодичну форму.
    points: 4
  - criteria: Нюанс
    description: Не стирає офіційний контекст і не вигадує персональної репресивної справи.
    points: 3
