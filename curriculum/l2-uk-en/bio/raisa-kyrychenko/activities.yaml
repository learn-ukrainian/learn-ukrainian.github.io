---
inline:
- id: quiz-conflict-map
  type: quiz
  title: Кириченко між сценою та спадщиною
  instruction: Перевір розуміння кар'єри Кириченко як виконавиці у радянському культурному полі.
  items:
  - question: Що найкраще описує основний конфлікт у підході до постаті Раїси Кириченко?
    explanation: Коректна відповідь поєднує офіційні сцени з пісенною пам'яттю, не зводячи постать до одного рівня.
    options:
    - text: Постать треба бачити лише як «народну» без офіційного контексту.
      correct: false
      explanation: Офіційні інституції й умови поширення є частиною фактичного контексту.
    - text: Пісенна пам'ять має розглядатися всередині державних платформ, але не зводитися лише до них.
      correct: true
      explanation: Саме ця рамка дозволяє зберегти українську мовну пам'ять і водночас назвати інституційні умови.
    - text: Головний акцент має бути на особистій трагедії, бо без неї не можна пояснити її репутацію.
      correct: false
      explanation: Для цієї постаті немає доведеного персонального репресивного провалу, на якому має будуватися наратив.
    - text: Її внесок пояснюється лише отриманими нагородами.
      correct: false
      explanation: Нагороди фіксують статус, але не замінюють аналізу репертуару й пісенної пам'яті.
  - question: Який факт допомагає зрозуміти, чому пісенний зміст Кириченко має довгу рецепцію?
    explanation: Професійні ансамблі й філармонії дали канал поширення, але не замінили змісту пісенної пам'яті.
    options:
    - text: Вона була учасницею кількох професійних ансамблів і філармоній.
      correct: true
      explanation: Інституційний досвід давав платформу для ширшого поширення, але тривалість пояснюється також культурною мовою.
    - text: Вона ніколи не мала офіційного визнання.
      correct: false
      explanation: За матеріалами джерел є державні нагороди й офіційний статус.
    - text: Її мистецтво існує лише в локальних спогадах.
      correct: false
      explanation: Локальна пам'ять важлива, але не єдина точка доступу до рецепції.
    - text: Її репертуар обмежувався лише однією піснею.
      correct: false
      explanation: "Репертуар широкий: твори з різними образами та жанровими функціями."
  - question: Чому тут важливо фіксувати різні варіанти патроніміки?
    explanation: Варіанти по батькові показують, що біографічну точність треба перевіряти за джерелами.
    options:
    - text: Щоб показати, що джерела мають різні записові практики й треба дотримуватися точності.
      correct: true
      explanation: Розбіжності патронімів варто демонструвати як завдання з джерельної грамотності.
    - text: Щоб підкреслити, що одна із версій свідомо «краща» за інші.
      correct: false
      explanation: Завдання полягає в порівнянні джерел, а не в розвинутості ієрархії.
    - text: Щоб звести біографію до політичних сенсацій.
      correct: false
      explanation: Питання точності не означає сенсаційність або доведення непідтверджених фактів.
    - text: Щоб відмовитися від усіх інших деталей, окрім імен.
      correct: false
      explanation: Ім’я — лише частина контексту, важливо бачити ширший шлях кар'єри.
  - question: Яка відмінність між офіційним визнанням і культурною тяглістю в цій біографії?
    explanation: Статус описує інституційну рамку, а культурна тяглість тримається на мові, образах і виконанні.
    options:
    - text: Офіційний статус замінює пісенну практику в довготривалому сприйнятті.
      correct: false
      explanation: Статус фіксує рамку, але культурна тяглість формується через повторення й зміст.
    - text: І ті й інше є нероздільно.
      correct: false
      explanation: Розбір показує різницю між формальним визнанням і живим культурним вжитком.
    - text: Культурна тяглість пов'язана з мовою, образами й репертуарною практикою, статус — з інституційним контекстом.
      correct: true
      explanation: Така різниця дозволяє аналізувати без редукції до однієї лінії.
    - text: Культурна тяглість має джерельні свідчення лише в сучасних медіа.
      correct: false
      explanation: Вона теж важлива, але не єдина; існують довші інституційні й локальні лінії.
  - question: Яке формулювання не відповідає джерельно відповідальному читанню?
    explanation: Відповідальне читання вимагає контексту й доказів, а не лише емоційної реакції.
    options:
    - text: Уникати довгих цитат пісень і працювати з образними назвами та контекстом.
      correct: true
      explanation: Це відповідає вимозі безпечної та аналітичної роботи з пісенним матеріалом.
    - text: Включити авторське й виконавське розрізнення в аналіз.
      correct: false
      explanation: Це коректний аналітичний прийом для виконавського кейсу.
    - text: Залишити лише емоційну реакцію на репертуар без контексту.
      correct: false
      explanation: Емоція потрібна, але без аналізу контексту вона спотворює картину.
    - text: Назвати контекст радянських інституцій як обмеження й канал одночасно.
      correct: false
      explanation: Така подвійність є ключем до правильного розуміння кар'єри.
- id: true-false-shadow
  type: true-false
  title: Тіньові помилки і межі доказу
  instruction: Визнач, які твердження є точними для академічно обережного читання постаті.
  items:
  - statement: Раїса Кириченко пройшла шлях від аматорського чи колективного співу до професійних філармонійних та ансамблевих практик.
    correct: true
    explanation: Кар'єрна траєкторія вказує на поєднання локального досвіду й сценічного ремесла.
  - statement: Можна стверджувати персональну справу репресивного переслідування як достовірний факт без додаткової перевірки.
    correct: false
    explanation: Така теза суперечить вимозі джерельної обережності й наявним матеріалам.
  - statement: Письмові дискусії про пісенний канон мають поєднувати офіційний контекст і локальну мовну пам'ять.
    correct: true
    explanation: Саме подвійне читання дає коректний результат для цієї біографії.
  - statement: Відсутність згадки про патронімічні варіанти звужує навчання до політичного сенсаціоналізму.
    correct: false
    explanation: Навпаки, згадка варіантів дає дисципліну фактології.
  - statement: Довгі цитати текстів пісень потрібні як основна форма доказу в цьому аналізі.
    correct: false
    explanation: Достатньо аналізувати образи, контексти й репертуарні рамки без довгих відтворень.
workbook:
- id: reading-kyrychenko-song-memory
  type: reading
  title: 'Читання: сценічний голос і пісенна пам''ять'
  source: Синтезовані довідки з ЕСУ, Енциклопедії історії України, Комітету Шевченківської премії і біографічного досьє.
  text: >-
    Раїса Кириченко сформувала виконавську модель, у якій локальна пісенна
    інтонація поєднується з професійною сценічною організацією. Її шлях від
    аматорського й фабричного співу до філармонійних ансамблів, від державних
    сцен до викладацької роботи, показує, що пісенна пам'ять живе в інституційному
    контексті, але не зводиться лише до нього. Репертуар із домашніми й
    національними образами став основою пізнішої культурної рецепції, а офіційні
    визнання зафіксували статус без повного поглинання твору.
  tasks:
  - Назви три пісенні образи, через які можна пояснити пізню рецепцію Кириченко.
  - Поясни, чому офіційний статус не може бути єдиним поясненням її тривалого впливу.
  - Яку роль відіграють колективні практики для збереження її пісень?
- id: critical-institutional-frame
  type: critical-analysis
  title: 'Критичний аналіз: інституція і мовна тяглість'
  source_reading: reading-kyrychenko-song-memory
  target_text: Офіційні сцени стали каналом доступу до слухача, але пісенна тяглість трималася на мові та образі.
  questions:
  - Як описати взаємозв'язок між державними каналами поширення і живою мовною пам'яттю без редукції?
  model_answers:
  - >-
    Потрібно розвести рівні. Державні сцени й ансамблі дали доступ до
    професійного публічного формату. Пісенна ж тяглість виникає тоді, коли
    матеріал зберігає українську мовну інтонацію, образи дому, матері, села,
    дерева й шану до виконавської точності. Якщо розглядати лише канали, зникає
    культурний зміст. Якщо зводити все до змісту без інституцій, зникає пояснення
    механізму поширення. Лише разом ці рівні дають стійку біографічну рамку.
- id: comparative-polisong-memory
  type: comparative-study
  title: 'Порівняння: виконавець у мережі української пісенної пам''яті'
  source_reading: reading-kyrychenko-song-memory
  items_to_compare:
  - Раїса Кириченко
  - Ніна Матвієнко
  - Платон Майборода
  criteria:
  - Яка роль виконавського жанру в кожній постаті?
  - Як інституційні шляхи змінюють сприйняття репертуару?
  - Як у пісні поєднуються локальний образ і національний контур?
  prompt: Поясни, у чому подібна рамка і чим різняться траєкторії цих пісенних постатей.
  model_answer: >-
    У всіх випадках працює взаємодія локального досвіду й публічного каналу, але
    в різних пропорціях. У Кириченко ключову роль відіграє виконання як
    сценічне формування фольклорно близького матеріалу. У Ніни Матвієнко сильна
    лінія естрадно-народного каналу й пізнішої популярної рецепції. У Майбороди
    акцент на композиторську будову, що дає пісні професійний мелодичний каркас.
    Різниця в ролі окремого виконавця й автора не скасовує спільний механізм: пісня
    стає пам'яттю лише тоді, коли підтримується колективно й мовно.
- id: essay-kyrychenko-memory
  type: essay-response
  title: 'Есе: Чи була пісенна спадщина Кириченко лише офіційною сценічною формою?'
  source_reading: reading-kyrychenko-song-memory
  instruction: Напиши зв'язну відповідь з конкретними фактами з біографії та діяльності.
  prompt: Аргументуй, чому пісенну спадщину Кириченко слід розглядати через напругу між офіційною сценою і пісенною пам'яттю.
  min_words: 280
  model_answer: >-
    Раїса Кириченко не була лише офіційною сценою, хоч у її біографії неможливо
    відмовитися від інституційних віх: філармонії, ансамблі, нагороди,
    професійні контексти. Саме в цих умовах її репертуар отримав суспільний
    канал. Але в цій рамці головний зміст формує не лише механізм визнання, а
    здатність творів повертати українську мовну пам'ять: образи дому, матері,
    села, дерев, дороги й материнського жесту були перетворені на пісенну практику,
    здатну жити в родинному й суспільному колі. Так виникає подвійність:
    державне може бути платформою, але культурна тяглість формує зміст. Така
    рамка важлива для деколонізаційного читання, бо дає простір для українського
    голосу без романтизованого заперечення складного історичного контексту.
  peer_review_guidelines: >-
    Чи чітко відділено інституційний канал від культурного змісту? Чи наведено
    конкретні образи та фактичні відомості? Чи уникнуто вигаданої репресивної
    біографії?
  rubric:
  - criteria: Теза
    description: Пояснює подвійність між офіційною сценою й пісенною тяглістю.
    points: 3
  - criteria: Докази
    description: Спирається на кар'єрні факти, репертуар і контекст пам'яті.
    points: 4
  - criteria: Нюанс
    description: Показує межі доказовості без редукції до сенсаційного наративу.
    points: 3
