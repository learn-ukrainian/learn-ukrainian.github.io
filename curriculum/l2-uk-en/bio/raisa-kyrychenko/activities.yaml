inline:
- id: source-records-quiz
  type: quiz
  title: Джерельний конфлікт без удаваного розв'язання
  instruction: Обери формулювання, яке точно передає межу наявних джерел.
  items:
  - question: Як найточніше подати дату народження Раїси Кириченко?
    options:
    - text: Назвати 14 жовтня 1943 року єдиною безсумнівною датою.
      correct: false
    - text: Приховати всі дати, бо джерела суперечать одне одному.
      correct: false
    - text: Атрибутувати 1943 рік ЕСУ й Комітету премії та окремо назвати записи ЕІУ.
      correct: true
    - text: Об'єднати 14 жовтня і 14 листопада в одну приблизну дату.
      correct: false
    explanation: Атрибуція зберігає і найпоширеніший запис, і видиму розбіжність.
  - question: Чому в основному тексті доречно вживати форму «Раїса Кириченко»?
    options:
    - text: Бо українські по батькові не відмінюються.
      correct: false
    - text: Бо нейтральне ім'я не маскує вибір між Панасівною й Опанасівною.
      correct: true
    - text: Бо указ 2003 року скасував усі інші форми.
      correct: false
    - text: Бо прізвище Кириченко замінює ім'я в усіх контекстах.
      correct: false
    explanation: Джерела використовують обидва патроніми, а первинного розв'язання немає.
  - question: Що пояснює форму «Раїсі Опанасівні Кириченко» в указі?
    options:
    - text: Давальний відмінок після дієслова «присвоїти».
      correct: true
    - text: Третій варіант по батькові.
      correct: false
    - text: Відмінювання жіночого прізвища на -енко.
      correct: false
    - text: Помилка, яку можна виправити без джерела.
      correct: false
    explanation: Закінчення «-і» є граматичною формою, а не новим патронімом.
  - question: Який факт про завершення життя підтримують кілька довідкових джерел?
    options:
    - text: Смерть 9 лютого 2005 року в Києві й поховання в Корещині.
      correct: true
    - text: Докладна причина кожного професійного рішення.
      correct: false
    - text: Єдина версія місця народження.
      correct: false
    - text: Точне датування всіх альбомів.
      correct: false
    explanation: Саме дата смерті, місто й місце поховання узгоджуються в основних довідках.
  - question: Яке речення правильно використовує локальний репортаж?
    options:
    - text: Спогад мешканки остаточно виправляє обидві енциклопедії.
      correct: false
    - text: Репортаж доводить однакову пам'ять про співачку в усій Україні.
      correct: false
    - text: Репортаж документує локальну пам'ять про Раю Корж і музейний дім.
      correct: true
    - text: Репортаж установлює намір кожної пісні Кириченко.
      correct: false
    explanation: Локальне свідчення сильне в межах конкретного місця й події.

- id: mamyna-vyshnia-comparison
  type: comparative-study
  title: "Дві «Мамині вишні»: доказове слухання"
  items_to_compare:
  - Музичний фільм «Автограф» з ансамблем «Росава», 0:00–1:15 і 4:25–5:35
  - Концерт із гуртом «Краяни» 25 березня 2001 року, 0:00–1:10 і 4:15–5:25
  criteria:
  - Дикція й чутність кінцевих приголосних
  - Словесний наголос і музичний акцент
  - Фразування, паузи та місця дихання
  - Склад і щільність супроводу, ансамблевий баланс
  - Мікрофон, монтаж, простір кадру й сценічний жест
  prompt: >-
    Порівняй дві версії за тими самими параметрами. Подай щонайменше чотири
    спостереження з часовими позначками, дві інтерпретації та альтернативне
    пояснення принаймні до однієї з них.
  model_answer: >-
    Спершу фіксую спостереження. У фільмі на 0:00–0:08 хліб виймають із печі,
    а на 0:09–0:13 кладуть на вишиту тканину; це послідовність монтажу, а не
    готовий початковий образ хліба на рушнику. На 1:03–1:15 співачка вже стоїть
    у постановному краєвиді: у кадрі немає ані мікрофона, ані ансамблю, хоча у
    фонограмі чутно голос із супроводом. На 4:25–5:35 монтаж переходить від
    загального плану співачки на камені до середніх і ближчих планів; видимого
    джерела супроводу знову немає.

    У концертному записі на 0:00–0:20 ручний мікрофон видно спочатку в
    ближчому, а потім у загальному плані, який показує музикантів позаду
    солістки. На 0:30–1:10 між вокальними фразами чутні короткі паузи, а камера
    чергує ближчі плани співачки з кадрами гурту, зокрема на 0:45–0:50. На
    4:15–5:25 ритмічна група помітна у фонограмі й кілька разів з'являється в
    кадрі; близько 4:40 боковий загальний план показує солістку ліворуч і трьох
    виконавців біля мікрофонів праворуч.

    **Інтерпретація 1:** перехід у фільмі від хатньої дії до відкритого
    краєвиду може пов'язувати виконання з образами дому й землі. Альтернативне
    пояснення: цей зв'язок створюють режисура й монтаж, тому він не доводить
    наміру або окремого вокального рішення Кириченко. **Інтерпретація 2:**
    концертні плани й чутна ритмічна група підкреслюють колективну професійну
    працю. Проте виразніші паузи чи інший ансамблевий баланс не можна
    автоматично приписати манері співачки: на враження впливають ручний
    мікрофон, акустика сцени, зведення та якість оцифрування. Отже, візуальну
    постановку, виробничі властивості запису й можливі вокальні рішення треба
    аналізувати окремо.

workbook:
- id: reading-kyrychenko-evidence
  type: reading
  title: "Раїса Кириченко: професійний маршрут і межі джерел"
  source: >-
    Навчальний синтез за ЕСУ, ЕІУ, Комітетом Шевченківської премії, указом
    2003 року та Полтавською обласною філармонією.
  text: >-
    Довідкові джерела погоджуються, що Раїса Кириченко пройшла шлях від
    самодіяльного співу й заводського хору до філармоній, Черкаського народного
    хору, «Росави» та полтавської «Чураївни». Межі окремих періодів у джерелах
    відрізняються, тому послідовність надійніша за безшовний календар. 1989
    року, за ЕСУ, співачка завершила навчання з хорового диригування, а з 1994
    року викладала спів. Її репертуар охоплював народні й авторські пісні;
    доступні телевізійні та концертні записи показують професійне сценічне
    втілення, а не немедійну фольклорну практику. Шевченківська премія 1986
    року стосувалася концертно-виконавської діяльності 1983–1985 років, а указ
    2003 року встановив звання Героя України. Нагороди фіксують інституційне
    визнання, але не замінюють слухацького аналізу.
  tasks:
  - Відділи спільну послідовність професійних етапів від розбіжних дат.
  - Поясни різницю між народним походженням пісні й професійним виконанням.
  - Назви межу доказу, яку має правовий акт або сторінка премії.

- id: source-conflicts-analysis
  type: critical-analysis
  title: Розбіжність як предмет аналізу
  source_reading: reading-kyrychenko-evidence
  target_text: >-
    Межі окремих періодів у джерелах відрізняються, тому послідовність
    надійніша за безшовний календар.
  questions:
  - Як атрибутувати конфліктні записи про народження, не приховуючи жодного з них?
  - Чому різні жанри джерел можуть відповідати на різні запитання про ту саму особу?
  - Які додаткові первинні матеріали могли б уточнити дату народження або дискографію?
  model_answers:
  - >-
    Слід назвати, що саме подають ЕСУ, ЕІУ та Комітет премії, а остаточний
    висновок відкласти до появи актового запису. Нейтральна форма «Раїса
    Кириченко» не стирає конфлікт, якщо таблиця показує обидва патроніми.
  - >-
    Енциклопедія узагальнює біографію, правовий акт установлює юридичний
    статус, інституційна сторінка описує власну нагороду, а локальний репортаж
    фіксує подію й свідчення. Їхні функції не тотожні.
  - >-
    Для народження потрібен актовий запис або перевірена архівна копія; для
    платівки — каталожний запис, матриця чи сам примірник із вихідними даними.

- id: staged-folk-comparison
  type: comparative-study
  title: Народна пісня й постановне виконання
  source_reading: reading-kyrychenko-evidence
  items_to_compare:
  - «Ой гарна я, гарна», телевізійний запис 1986 року, 0:00–0:45 і 1:25–2:25
  - «Мамина вишня», музичний фільм «Автограф», 0:00–1:15 і 4:25–5:35
  criteria:
  - Народне або встановлене індивідуальне авторство
  - Професійний склад виконавців і супровід
  - Сценографія, костюм, реквізит і монтаж
  - Дикція, фразування та ансамблевий баланс
  prompt: >-
    Доведи, чому вісь «народна — авторська» не тотожна осі «непрофесійна —
    професійна». Дозволь дві доказові інтерпретації постановного сільського
    образу.
  model_answer: >-
    ЕСУ подає «Ой гарна я, гарна» як народну пісню, тоді як для «Маминої
    вишні» названо автора слів Дмитра Луценка й композитора Анатолія Пашкевича.
    Ця відмінність стосується авторства пісень, а не професійності відео. В
    записі «Ой гарна я, гарна» на 0:00–0:15 камера показує костюмованих
    учасників біля хати, а на 0:27–0:42 вводить солістку через загальний план
    двору. На 1:25–1:45 співачка й інший учасник взаємодіють із реквізитом у
    середніх і ближчих планах; на 2:05–2:25 кадр знову збирає кількох учасників
    за тином. Це не польова фіксація побутування пісні, а змонтована
    телевізійна постановка з розподіленими ролями.

    У «Маминій вишні» на 0:00–0:08 хліб виймають із печі, а на 0:09–0:13
    кладуть на вишиту тканину. На 1:05–1:15 солістка з'являється в
    постановному краєвиді без видимого мікрофона чи ансамблю. Отже, й авторська
    пісня тут оформлена для професійного медійного показу. Перша доказова
    інтерпретація: хатні предмети, тин і краєвид пов'язують виконання з
    локальним матеріальним світом. Друга: костюми, реквізит і монтаж конструюють
    умовну телевізійну модель села. Ці пояснення стосуються роботи кадру; жодне
    з них не доводить наміру співачки й не перетворює постановку на немедійну
    фольклорну практику.

- id: essay-kyrychenko-practice-memory
  type: essay-response
  title: Голос, професійна практика й локальна пам'ять
  source_reading: reading-kyrychenko-evidence
  instruction: Напиши доказове есе без довгих цитат із пісень і без приписування політичних переконань.
  prompt: >-
    Як професійні колективи, конкретні записи й полтавські форми пам'яті
    допомагають описати спадщину Раїси Кириченко, не перетворюючи її на
    безтілесний «голос народу» або лише на продукт державної сцени?
  min_words: 300
  model_answer: >-
    Спадщину Раїси Кириченко переконливіше описувати як взаємодію
    виконавського ремесла, професійних інституцій і пізнішої локальної пам'яті,
    а не як прояв безтілесного «голосу народу» чи пасивний результат державної
    сцени. Така теза дає змогу одночасно бачити особисту працю співачки,
    колективні умови виконання та межі джерел.

    Біографічний рівень тут достатньо конкретний. ЕСУ простежує маршрут від
    «Веселки» й «Льонка» через Черкаський народний хор і «Росаву» до
    Полтавської філармонії, а також датує завершення навчання з хорового
    диригування 1989 роком і викладання співу 1994–1997 роками. Комітет
    Шевченківської премії підтверджує загальну послідовність, хоча подає інші
    межі деяких етапів, і пов'язує премію 1986 року саме з
    концертно-виконавською діяльністю 1983–1985 років. Це факти про тривалу
    професійну практику, а не доказ того, що інституція повністю визначала
    художній результат.

    Записи дозволяють перевірити, як ця практика ставала медійною подією. У
    фільмовій «Маминій вишні» на 1:03–1:15 голос подано на передньому плані
    фонограми над ансамблевим супроводом, тоді як у кадрі співачка стоїть у
    краєвиді без видимого мікрофона чи музикантів. Це спостереження про
    співвідношення звуку й зображення. Моя інтерпретація полягає в тому, що
    фільм відокремлює голос від видимого виробництва звуку й тим самим робить
    образ солістки центральним. Однак це може бути рішенням режисера, оператора
    або монтажера, а не наміром виконавиці.

    Концертна версія дає іншу опору. На 0:30–1:10 між вокальними фразами чутні
    короткі паузи; ручний мікрофон залишається біля голосу, а на 0:45–0:50
    камера переходить до гурту. На 4:15–5:25 ритмічна група виразно присутня у
    фонограмі й кілька разів потрапляє в кадр. Це дає підставу говорити про
    видиму ансамблеву взаємодію, але не про єдину причину кожної чутної
    відмінності. Якщо концертне фразування здається більш сегментованим, одним
    поясненням може бути пристосування до живої сцени; альтернативою є вплив
    мікрофона, акустики, зведення або оцифрування. Без ізольованих доріжок ці
    чинники не можна надійно розділити.

    Локальна пам'ять додає ще один, не тотожний рівень. Репортаж Суспільного
    Полтава від 14 жовтня 2024 року документує конкретне вшанування біля
    пам'ятника, участь учнів і виконання «Маминої вишні». Матеріал від 14
    жовтня 2025 року описує музей-садибу «Мамина вишня» в Корещині, збережені
    речі та опіку громади. Ці публікації доводять існування датованих
    полтавських практик пам'яті, але не однакове ставлення всієї країни й не
    первісний задум пісень.

    Отже, спадщина Кириченко виникає на перетині фахової освіти, багаторічної
    ансамблевої праці, конкретних медійних форм і локального відбору пам'яті.
    Державні установи створювали сцени та канали поширення; виконавиця працювала
    з голосом, фразою й колективом; пізніші громади вибирають, що зберігати й
    повторювати. Жоден із цих рівнів не слід оголошувати єдиною сутністю її
    спадщини.
  peer_review_guidelines: >-
    Перевір точність атрибуції, наявність часових позначок, розрізнення факту
    та інтерпретації, а також відсутність узагальнення про всіх українців.
  rubric:
  - criteria: Джерельна точність
    description: Біографічні факти й конфлікти атрибутовано, а межі доказу названо.
    points: 3
  - criteria: Слухацький аналіз
    description: Є щонайменше два спостереження з часовими позначками та альтернативне пояснення.
    points: 4
  - criteria: Аргумент і мова
    description: Теза зв'язує професійну практику з локальною пам'яттю засобами мови рівня C1.
    points: 3
