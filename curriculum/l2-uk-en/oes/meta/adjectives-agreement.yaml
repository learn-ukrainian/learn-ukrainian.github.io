slug: adjectives-agreement
title: Adjectives Agreement
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Прикметник як дзеркало іменника: категорія роду, числа та відмінка.'
  - Фундаментальний поділ на іменні (нечленні) та займенникові (членні) форми.
  - Роль узгодження у побудові давньоруського речення.
- section: 'Основний матеріал: I — Генеза та морфологія форм'
  words: 1400
  points:
  - 'Архаїчність коротких форм: спадок індоєвропейського стану (відмінювання як іменників).'
  - 'Революція визначеності: народження повних форм через додавання вказівного займенника
    *jь*.'
  - 'Парадигма відмінювання: як *добръ* + *и* стало *добрыи*.'
  - 'Співіснування систем: чому короткі форми домінували в присудках, а повні — в
    означеннях.'
- section: 'Основний матеріал: II — Синтаксис узгодження та феномен двоїни'
  words: 1400
  points:
  - 'Алгоритм узгодження: рід, число, відмінок.'
  - 'Магія двоїни: специфічні закінчення для парних об''єктів (очі, руки, два брати).'
  - 'Приклади узгодження у двоїні: *двѣ лодии новѣ*.'
  - 'Кличний відмінок прикметників: *княже милий*, *брате дорогий* — жива спадщина
    в українській мові.'
- section: 'Основний матеріал: III — Аналіз джерела: «Куни лодійні»'
  words: 1400
  points:
  - 'Контекст Руської Правди: юридична точність та економічна лексика.'
  - 'Лінгвістичний розбір: *лодійні* як відносний прикметник від *лодія*.'
  - 'Економіка Русі: *куни* (хутро куниці) як універсальна валюта та платіжний засіб.'
  - 'Стратегічне значення флоту: чому податок на човни був критичним для держави.'
- section: Підсумок
  words: 400
  points:
  - 'Від Русі до сьогодення: трансформація системи прикметників.'
  - Втрата двоїни та вирівнювання відмінкових парадигм.
  - 'Живі релікти: короткі форми у фольклорі (*зелен клен*) та поезії.'
  - Українська мова як охоронець давньоруської граматичної традиції.
