slug: verbs-aorist
title: Verbs Aorist
word_target: 5000
content_outline:
- section: 'Вступ: Природа та функції аориста'
  words: 400
  points:
  - 'Визначення аориста: час миттєвої, завершеної дії в минулому'
  - Місце аориста в системі минулих часів давньоруської мови (поруч з імперфектом,
    перфектом та плюсквамперфектом)
  - 'Смислова відмінність: динаміка сюжету (аорист) проти статичного тла (імперфект)'
- section: 'Морфологія I: Простий (асигматичний) аорист'
  words: 500
  points:
  - 'Архаїчність простого аориста: спадок праслов''янської епохи'
  - Утворення від основ на приголосний (ідош-, несош-)
  - 'Рідкість вживання у пам''ятках XI-XII ст.: реліктові форми'
  - Парадигма відмінювання простого аориста
- section: 'Морфологія II: Сигматичний аорист'
  words: 800
  points:
  - Сигматичний аорист як продуктивна форма доби Київської Русі
  - Роль суфікса -с- (-х-, -ш-) у творенні форм
  - 'Два типи: старий сигматичний (від основ на голосний) та новий (від основ на приголосний)'
  - Парадигма особових закінчень (-хъ, -е, -хомъ, -сте, -ша)
  - Чергування приголосних при творенні аориста (ректи -> рѣхъ)
- section: 'Текстологія I: Наративний двигун Літопису'
  words: 800
  points:
  - Аорист як основний засіб просування сюжету в 'Повісті временних літ'
  - 'Аналіз уривка про смерть Олега (серія аористів: приїха, посміяся, наступи, вилізла,
    клюкну)'
  - 'Граматична точність літописців: розмежування планів оповіді'
  - 'Стилістична функція: лаконічність та енергійність викладу'
- section: 'Текстологія II: Високий стиль проповідей'
  words: 600
  points:
  - Використання аориста в 'Слові про закон і благодать' митрополита Іларіона
  - Аорист як засіб урочистості та книжності
  - Вплив церковнослов'янської традиції на збереження аориста в релігійних текстах
- section: 'Еволюція: Конкуренція з перфектом'
  words: 700
  points:
  - Процес занепаду аориста в живій мові (XII-XIII ст.)
  - Перемога аналітичних форм (l-дієприкметник + дієслово 'бути')
  - 'Чому перфект витіснив аорист: прагнення до уніфікації та спрощення'
  - Зникнення аориста з ділових грамот XIV ст.
- section: 'Діалектологія: Карпатські релікти'
  words: 500
  points:
  - Збереження давніх форм у південно-західних говірках (гуцульські, лемківські)
  - Форми типу 'я бих робив', 'ми бихмо пішли'
  - Архаїка як доказ безперервності розвитку мови на цих теренах
- section: 'Сучасність: Частка ''би'' як тінь аориста'
  words: 600
  points:
  - 'Етимологія частки ''би'' (б): походження від аориста дієслова ''бути'' (3 ос.
    одн. *by)'
  - Трансформація часової форми в модальну частку (умовний спосіб)
  - Сліди аориста в усталених зворотах та частках (аби, якби, щоби)
  - Стилістичне використання аориста в класичній літературі (Шевченко, Франко)
- section: 'Підсумок: Від синтетизму до аналітизму'
  words: 400
  points:
  - Загальний висновок про зміну строю української мови
  - Втрата аориста як крок до сучасної системи часів
  - Значення вивчення аориста для розуміння давніх текстів
