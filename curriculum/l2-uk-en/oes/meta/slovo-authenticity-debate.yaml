slug: slovo-authenticity-debate
title: Slovo Authenticity Debate
word_target: 5000
content_outline:
- section: 'Вступ: Детектив століть'
  words: 600
  points:
  - Історія знахідки рукопису Мусіним-Пушкіним у 1790-х роках.
  - Перше видання 1800 року та трагічна втрата оригіналу у пожежі 1812 року.
  - Катерининська копія (знайдена 1864 р.) як ключовий свідок автентичності тексту.
- section: 'Скептична школа: Гіпотези підробки'
  words: 800
  points:
  - Зародження сумнівів у XIX столітті (Каченовський, Сенковський).
  - 'Андре Мазон (1940): гіпотеза про імітацію ''Задонщини'' у XVIII столітті.'
  - 'Олександр Зімін (1964): спроба наукового обґрунтування пізнього походження (авторство
    Йоіла Биковського).'
  - 'Ідеологічний підтекст скептицизму: ''надто добре для дикунів''.'
- section: 'Парадокс ''Задонщини'': Хто у кого списав?'
  words: 600
  points:
  - Відкриття 'Задонщини' (1852) та проблема інтертекстуальності.
  - 'Аналіз паралельних місць: вторинність образів ''Задонщини''.'
  - Приклади спотворення метафор 'Слова' у тексті 'Задонщини' (логіка епігона).
  - Неможливість зворотного запозичення (від примітивного до досконалого).
- section: 'Лінгвістичний захист: Закон клітик'
  words: 600
  points:
  - 'Революція Андрія Залізняка (2004): математичний доказ автентичності.'
  - 'Суть закону Вакернагеля: позиція енклітик (ся, ми, ти) у реченні.'
  - 'Неможливість імітації: закон відкрито через 100 років після ймовірної підробки.'
  - Статистична чистота тексту 'Слова' у порівнянні з текстами XVIII століття.
- section: 'Граматика ХІІ століття: Двоїна і часи'
  words: 600
  points:
  - 'Система минулих часів: правильне вживання аориста та імперфекта.'
  - 'Двоїна (Dualis): збереження архаїчних форм, втрачених у пізній мові.'
  - Відсутність помилок, характерних для пізніх переписувачів.
  - Граматична система 'Слова' як зліпок живого мовлення XII століття.
- section: 'Діалектна основа: Український слід'
  words: 1000
  points:
  - 'Фонетичні маркери: повноголосся, перехід ''g'' в ''h'' (Крилос/Крилошани).'
  - 'Морфологія: закінчення давального відмінка -ові/-еві (Ігореві, Турові).'
  - 'Лексичний шар: специфічні українські слова (яруга, кожух, смага).'
  - Спростування теорії 'єдиної давньоросійської мови' через текст пам'ятки.
- section: 'Текстологія: ''Темні місця'' як доказ'
  words: 500
  points:
  - 'Феномен ''темних місць'' (hapax legomena): слова, що зустрічаються раз.'
  - Чому фальсифікатор не вигадує незрозумілих слів.
  - Розшифровка 'темних місць' завдяки діалектам та новим знахідкам.
  - 'Приклад: ''Дебрі Кисані'' та інші загадки.'
- section: 'Підсумок: Остаточний вердикт'
  words: 300
  points:
  - 'Науковий консенсус XXI століття: автентичність доведено.'
  - Роль 'Слова' у розумінні культурного рівня Русі-України.
  - Значення дискусії для розвитку лінгвістичних методів.
