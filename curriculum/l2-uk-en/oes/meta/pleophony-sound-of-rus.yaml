slug: pleophony-sound-of-rus
title: Pleophony Sound Of Rus
word_target: 5000
content_outline:
- section: 'Вступ: Візитна картка Русі'
  words: 400
  points:
  - Визначення повноголосся (плеофонії) як унікальної фонетичної риси східнослов'янських
    мов.
  - 'Чотири ключові формули: -оро-, -оло-, -ере-, -еле-.'
  - Роль цього явища в ідентифікації давньоруських текстів.
  - 'Чому це важливо: відмінність від західних (польська) та південних (болгарська)
    сусідів.'
- section: 'Генеза: Закон відкритого складу'
  words: 600
  points:
  - 'Праслов''янська спадщина: ситуація наприкінці VIII століття.'
  - 'Закон відкритого складу (Law of Open Syllables): чому склад мусив закінчуватися
    на голосний.'
  - Проблема дифтонгів з плавними *or, *ol, *er, *el у закритому складі.
  - 'Фізіологія мовлення: перебудова артикуляційної бази давніх слов''ян.'
- section: 'Географія метатези: Три шляхи слов''янства'
  words: 700
  points:
  - 'Південний шлях (старослов''янська): метатеза з подовженням (*gordъ > gradъ).'
  - 'Західний шлях (польська, чеська): метатеза без подовження або зі специфічними
    змінами (*gordъ > gród).'
  - 'Східний шлях (Русь): розвиток вторинного голосного (*gordъ > gorodъ).'
  - 'Порівняльна таблиця коренів: мороз/мраз, берег/брег, молоко/млеко.'
  - Спростування міфу про єдність мовного розвитку всіх слов'ян.
- section: 'Свідки епохи: Повноголосся в пам''ятках XI ст.'
  words: 700
  points:
  - Остромирове Євангеліє (1056–1057) як джерело.
  - Помилки переписувача (дяка Григорія) як доказ живого мовлення.
  - 'Написання власних назв: «Володимиръ» vs канонічне «Владимиръ», «Новъгородъ».'
  - 'Ізборник Святослава (1073): фіксація побутової лексики.'
  - 'Графіті Софії Київської: повноголосся в неформальних написах.'
- section: 'Стилістика: Високий і низький штиль'
  words: 700
  points:
  - 'Диглосія в Київській Русі: книжна (церковнослов''янська) vs народна (давньоруська)
    мови.'
  - '«Слово о полку Ігоревім»: майстерність перемикання кодів.'
  - Аналіз пари «шеломя» (шолом) та «шлем».
  - Символізм використання неповноголосся для сакральних понять (храм, глава).
  - Перемога народної стихії в описі природи та емоцій.
- section: 'Лексичні дублети: Рідне і запозичене'
  words: 600
  points:
  - Доля церковнослов'янізмів в українській мові.
  - 'Семантична диференціація: прах (урочисте) vs порох (речовина).'
  - 'Враг vs Ворог: чому українська мова надала перевагу повноголосній формі.'
  - 'Російський контекст: чому в російській мові церковнослов''янізми часто витіснили
    питомі слова (сладкий, время, облако).'
  - 'Деколонізаційний аспект: -град у назвах міст як імперський маркер.'
- section: 'Друге повноголосся: Забутий феномен'
  words: 500
  points:
  - Визначення другого повноголосся (рефлекси *tъrt, *tьrt).
  - 'Приклади з пам''яток: «скъръбь», «мълънии», «верхъ».'
  - Зв'язок з діалектами північної частини Русі.
  - Чому це явище менш відоме, але важливе для діалектології.
- section: 'Український рефлекс: Від Русі до сьогодення'
  words: 500
  points:
  - 'Тяглість традиції: ідеальне збереження повноголосся в сучасній українській мові.'
  - Відсутність редукції (акання) як фактор збереження чіткості -оро-, -оло-.
  - Роль Михайла Максимовича у дослідженні явища (1848).
  - Повноголосся як маркер української ідентичності в мові.
- section: 'Підсумок: Голос віків'
  words: 300
  points:
  - 'Узагальнення: повноголосся як фундамент східнослов''янської фонетики.'
  - Значення для розуміння еволюції мови.
  - Зв'язок між літописцем Нестором і сучасним українцем через мову.
