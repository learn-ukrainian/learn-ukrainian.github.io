slug: slovo-return
title: Slovo Return
word_target: 5000
content_outline:
- section: 'Вступ: Від темряви до світла'
  words: 400
  points:
  - 'Завершення епічної подорожі: структурна роль фіналу ''Слова''.'
  - Контраст між 'Плачем Ярославни' та радісним поверненням князя.
  - Символіка переходу від ночі (втеча) до сонячного дня (прибуття).
- section: 'Основний матеріал: I — Втеча з полону: Божа воля і допомога природи'
  words: 800
  points:
  - 'Аналіз уривку ''Прысну море полунощи...'': динаміка тексту.'
  - Роль християнського Бога ('Бог путь каже') та язичницьких сил (розмова з Дінцем).
  - 'Овлур: історична постать та його функція в сюжеті (половчин-рятівник).'
  - 'Діалог з річкою Донець: антитеза до розмови з річкою Стугною (тема життя і смерті).'
- section: 'Основний матеріал: II — Шлях до Києва: Сакральна топографія'
  words: 800
  points:
  - 'Маршрут повернення: від Сіверщини до серця Руської землі — Києва.'
  - 'Боричів тік: локалізація та символізм підйому до сакрального центру.'
  - 'Церква Богородиці Пирогощої: чому Ігор їде саме туди (купецький Поділ vs княжа
    Гора).'
  - 'Єднання земель: символічний візит сіверського князя до київського столу.'
- section: 'Основний матеріал: III — Апофеоз: Сонце на небі — Ігор на Русі'
  words: 800
  points:
  - 'Метафора ''Солнце свѣтится на небесѣ'': відновлення космічного порядку.'
  - 'Радість природи і людей: ''Дѣвици поютъ на Дунаи''.'
  - Образ Дунаю як символічного кордону і шляху звістки (голос через море).
  - Святкування повернення як національного тріумфу, попри військову поразку.
- section: 'Основний матеріал: IV — Гімн князям і дружині: Формула безсмертя'
  words: 800
  points:
  - 'Фінальна слава: ''Здрави князи и дружина''.'
  - 'Граматичний розбір: двоїна, збірні іменники, звертання.'
  - 'Єдність поколінь: слава ''старим'' (Ігор, Всеволод) і ''молодим'' (Володимир,
    інші).'
  - 'Дружина як співтворці історії: ''побарая за христьяны на поганыя плъки''.'
- section: 'Основний матеріал: V — Історичний контекст: Реальність vs Поезія'
  words: 800
  points:
  - 'Політичні наслідки 1185 року: чи змінилася стратегія князів?'
  - 'Іронія долі: династичні шлюби з половцями (син Ігоря Володимир).'
  - 'Деколонізаційний погляд: ''Руська земля'' як Україна, а не імперський простір.'
  - 'Чому ''Слово'' актуальне сьогодні: ціна розбрату і цінність власної держави.'
- section: 'Практика: Робота з джерелами'
  words: 200
  points:
  - 'Палеографічний коментар: як виглядав текст у рукописі (суцільне письмо).'
  - Порівняння перекладів фінальної частини (Рильський, Махновець, сучасні).
- section: 'Підсумок: Вічне повернення'
  words: 400
  points:
  - 'Циклічність історії: повернення героя як архетип.'
  - 'Слово, що пережило віки: від рукопису Мусіна-Пушкіна до сучасності.'
  - 'Фінальний акорд курсу по ''Слову'': головні уроки пам''ятки.'
