  points:
  - 'Ізяслав Мстиславич — онук Мономаха, син Мстислава Великого: династична спадкоємність.'
  - 'Характеристика доби: роздробленість vs. спроби централізації.'
  - 'Унікальність постаті: князь-воїтель і політик-новатор.'
- section: 'Основний матеріал: I — Політичний портрет: Князь і Віче'
