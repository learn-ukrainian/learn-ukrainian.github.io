  points:
  - 'Собор 1147 року: обрання Клима Смолятича митрополитом.'
  - 'Канонічний прецедент: поставлення ''головою святого Климента''.'
  - 'Політичний вимір: церковна незалежність як складова суверенітету.'
- section: 'Основний матеріал: IV — Літературна спадщина: ''Повість про Ізяслава'''
  words: 1000
  points:
  - 'Київський літопис як джерело: авторство Петра Бориславича (гіпотеза).'
  - 'Стилістичні особливості: динамізм, діалоги, емоційність.'
  - 'Мовний аналіз: давньоруська лексика влади і війни (приклади).'
- section: 'Практика: Робота з джерелами'
  words: 400
  points:
  - Палеографічний аналіз уривка з Іпатського літопису.
  - Лексичний розбір термінів 'сром', 'честь', 'ряд'.
  - 'Історична реконструкція: промова перед вічем.'
- section: 'Підсумок: Спадщина Волинської династії'
  words: 200
  points:
  - 'Смерть Ізяслава 1154 року: реакція сучасників (''плакала вся Руська земля'').'
