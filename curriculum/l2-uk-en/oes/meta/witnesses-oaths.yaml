slug: witnesses-oaths
title: Witnesses Oaths
word_target: 5000
content_outline:
- section: 'Вступ: Правовий простір Київської Русі'
  words: 500
  points:
  - 'Концепція ''Правди'' як закону і справедливості: від усного звичаю до кодексу.'
  - 'Змагальний характер процесу: позивач і відповідач як рівні сторони.'
  - Відсутність смертної кари та домінування грошових стягнень (вира, продаж).
  - 'Джерельна база: Списки Руської Правди та їх значення для палеографії.'
- section: 'Основний матеріал: I — Інститут свідків (Видок і Послух)'
  words: 1300
  points:
  - 'Етимологічна різниця: ''Видок'' (самовидець, ''очі'') проти ''Послух'' (свідок
    репутації, ''вуха'').'
  - 'Текстуальний аналіз ст. 2 Короткої Правди: ''видокъ слово противу слова''.'
  - 'Трансформація термінів: як ''послух'' поступово витіснив ''видока'' у пізніших
    редакціях.'
  - 'Кількісні вимоги: сім послухів для звинувачення у вбивстві vs два свідка для
    менших справ.'
  - Роль громади ('верві') у підтвердженні репутації послуха.
- section: 'Основний матеріал: II — Граматика двоїни у правничій мові'
  words: 1100
  points:
  - 'Архаїчна точність: чому закон вимагав саме двоїни (''два свідка'', ''оба судя'').'
  - 'Морфологія іменників: закінчення -а/-я для чоловічого роду (*брата*, *князя*,
    *свідка*).'
  - Узгодження з числівниками *два*, *оба* та дієслівні форми (*ідета*, *несета*).
  - 'Аналіз уривку: ''а видока два выведеть'' — граматичний розбір.'
  - Збереження двоїни у діалектах як свідчення давності мови.
- section: 'Основний матеріал: III — Ритуал Роти (Присяги) та Божий Суд'
  words: 1200
  points:
  - 'Сакральна природа ''роти'': від язичницької клятви на зброї до християнського
    хрестоцілування.'
  - 'Процедура ''ордалій'' (Божого суду): випробування розпеченим залізом та водою
    як останній доказ.'
  - 'Текстовий аналіз ст. 21: ''Аже не будеть видока, то ити ему на желѣзо''.'
  - 'Соціальна ієрархія у випробуваннях: золото для бояр, вода для простих людей?'
  - Роль церкви у легітимізації судових ритуалів.
- section: 'Основний матеріал: IV — Чужинці та ''Дика вира'''
  words: 900
  points:
  - 'Прагматизм права: чому для ''варяга чи колбяга'' достатньо двох свідків (ст.
    10).'
  - 'Поняття ''повної вири'' та ''дикої вири'': колективна відповідальність громади.'
  - Інтеграція скандинавських та слов'янських правових норм.
  - 'Палеографічна примітка: написання етнонімів у рукописах.'
- section: 'Підсумок: Від Руської Правди до Литовських Статутів'
  words: 600
  points:
  - 'Спадкоємність традиції: як норми Руської Правди перейшли у Литовські Статути.'
  - 'Український вимір: деколонізація погляду на ''давньоросійське'' право.'
  - 'Європейський контекст: спільні риси з Lex Salica та Lex Ripuaria.'
  - 'Завершення: мова права як фундамент державної ідентичності.'
