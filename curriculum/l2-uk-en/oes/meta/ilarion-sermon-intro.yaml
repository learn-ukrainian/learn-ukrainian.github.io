slug: ilarion-sermon-intro
title: Ilarion Sermon Intro
word_target: 5000
content_outline:
- section: 'Вступ: Автор та історичний контекст'
  words: 800
  points:
  - Іларіон Київський — перший митрополит-русин (1051 рік)
  - 'Епоха Ярослава Мудрого: розквіт Києва та будівництво Софії'
  - Церква Спаса на Берестовому як осередок книжності
  - 'Політичне тло: прагнення церковної незалежності від Візантії'
- section: 'Вступ: Жанр, структура та аудиторія'
  words: 600
  points:
  - 'Жанрова природа: урочиста проповідь чи політичний трактат?'
  - 'Структура твору: три частини (теологія, історіософія, молитва)'
  - 'Аудиторія «Слова»: звернення до інтелектуальної еліти («синів Божих»)'
  - 'Стилістичні особливості: ритмічна проза та риторичні фігури'
- section: 'Основний матеріал: Богослов''я Закону і Благодаті'
  words: 1000
  points:
  - Антитеза Закону (Старий Завіт) і Благодаті (Новий Завіт)
  - 'Символіка: тінь і істина, холод і тепло, рабство і свобода'
  - Універсалізм християнства проти іудейської ексклюзивності
  - Богословська легітимація нових християнських народів
- section: 'Основний матеріал: Алегорія Агари та Сарри'
  words: 800
  points:
  - Біблійний сюжет про Агару (рабиню) і Сарру (вільну) в інтерпретації Іларіона
  - Ізмаїл як символ Закону, Ісаак як символ Благодаті
  - Народження раніше Благодаті (Ізмаїл), але перемога вільної (Ісаак)
  - 'Застосування алегорії до Русі: вихід зі стану ідолопоклонства (рабства)'
- section: 'Основний матеріал: Хрещення Русі як прояв Благодаті'
  words: 800
  points:
  - Відсутність апостольської проповіді на Русі як доказ прямої дії Бога
  - Концепція «доброго помислу» Володимира, вкладеного Богом
  - Рівність Русі з іншими християнськими народами (всупереч грецьким претензіям)
  - Символіка «роси на землі» (Гедеон) — перехід благодаті до язичників
- section: 'Основний матеріал: Похвала кагану Володимиру'
  words: 800
  points:
  - Панегірик Володимиру Великому як «рівноапостольному» та «новому Костянтину»
  - Використання титулу «каган» — декларація суверенності Руської держави
  - Звернення до предків (Ігоря і Святослава) та слава «відомої у світі» землі
  - 'Заклик до Володимира: «Встань, о чесна главо!» (риторичне воскресіння)'
- section: 'Практика: Рецепція та історичне значення'
  words: 400
  points:
  - Вплив ідей Іларіона на літописання («Повість минулих літ»)
  - Формування києво-центричної моделі історії
  - Актуальність твору для утвердження автокефалії та державності
  - «Слово» як пам'ятка високого інтелектуального рівня Русі XI ст.
- section: 'Підсумок: Маніфест руської ідентичності'
  words: 400
  points:
  - Синтез теології та політики в «Слові»
  - Іларіон як ідеолог руської державної величі
  - Значення твору для сучасної української ідентичності
