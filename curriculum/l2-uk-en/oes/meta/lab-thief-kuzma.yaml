slug: lab-thief-kuzma
title: Lab Thief Kuzma
word_target: 5000
content_outline:
- section: 'Вступ: Стіни, що говорять'
  words: 600
  points:
  - Софія Київська як кам'яний архів XII століття
  - 'Графіті — ''соціальна мережа'' середньовіччя: від молитов до скарг'
  - Відмінність живої мови графіті від книжної церковнослов'янської
- section: 'Основний матеріал: I — Артефакт і контекст'
  words: 800
  points:
  - 'Аналіз графіті про Кузьму: повний текст і переклад'
  - 'Детективний сюжет: хто такий Кузьма і чому вкрадене м''ясо варте прокляття'
  - 'Сакральне і профанне: використання церковної формули ''Амінь'' у побутовій сварці'
  - Гіпотези дослідників (Корнієнко, Висоцький) щодо значення 'асилонь твої кокошь'
- section: 'Основний матеріал: II — Лінгвістичний детектив: ''Тать'' і ''Злодій'''
  words: 800
  points:
  - Етимологія слова 'тать' (праслов'янське *tatь) та його доля в українській мові
  - 'Семантичний зсув: чому ''злодій'' (той, хто діє зло) витіснив ''татя'''
  - 'Деколонізаційний погляд: відмінність від російського ''вор'' (первісно ''паркан/огорожа'')'
  - Лексичні паралелі з іншими слов'янськими мовами (польська złodziej)
- section: 'Основний матеріал: III — Граматичний практикум: Перфект'
  words: 800
  points:
  - 'Форма ''украл еси'': анатомія давньоруського перфекта'
  - Роль допоміжного дієслова 'єси' та його поступове зникнення
  - 'Діалектні релікти: чому гуцули кажуть ''ходив-єм'', а літературна мова втратила
    зв''язку'
  - Порівняння з англійським Present Perfect (I have stolen)
- section: 'Основний матеріал: IV — Правовий аспект: ''Руська Правда'''
  words: 800
  points:
  - Поняття 'татьба' у законодавстві Ярослава Мудрого
  - 'Ціна м''яса: штрафи за крадіжку худоби згідно з ''Руською Правдою'''
  - 'Гуманність київського права: відсутність смертної кари за крадіжку (на відміну
    від Європи)'
  - Соціальний статус злодія та потерпілого у середньовічному Києві
- section: 'Практика: Палеографічна лабораторія'
  words: 800
  points:
  - 'Інструктаж: як читати написи XII століття (накреслення літер, виносні знаки)'
  - Розбір конкретних літер у графіті про Кузьму (З, М, А)
  - Типові скорочення (титла) та їх розшифровка
  - 'Завдання: транслітерація та переклад фрагментів'
- section: 'Підсумок: Голос із минулого'
  words: 400
  points:
  - Значення графіті для реконструкції живої староукраїнської мови
  - Кузьма-тать як вічний образ побутового конфлікту
  - 'Зв''язок поколінь: спільні мовні та ментальні риси українців XII і XXI століть'
