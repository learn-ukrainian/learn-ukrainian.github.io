slug: pronouns-self-other
title: Pronouns Self Other
word_target: 5000
content_outline:
- section: 'Вступ: Особа в мові'
  words: 400
  points:
  - Значення особових займенників у середньовічній картині світу
  - Опозиція 'Я' (его) та 'Ти' (альтер его) у давніх текстах
  - 'Відмінність давньоруської системи від сучасної: двоїна, енклітики'
- section: 'Займенники: I — Азъ та Я'
  words: 800
  points:
  - 'Форма ''Азъ'': походження, сакральний зміст, вживання у високому стилі'
  - 'Поява форми ''Я'': фонетична еволюція та побутове вживання'
  - 'Займенник ''Ти'': універсальність звертання (до Бога, князя, рівного)'
  - 'Палеографія: написання ''Азъ'' та ''Я'' у кириличних рукописах'
- section: 'Займенники: II — Відмінювання та енклітики'
  words: 1000
  points:
  - 'Суплетивізм основ: чому ''Я'', але ''Мене''?'
  - 'Парадигма відмінювання: Родовий, Знахідний, Орудний, Місцевий'
  - 'Давальний відмінок: форми ''мьнѣ'', ''тобѣ'' як предки українських ''мені'',
    ''тобі'''
  - 'Феномен енклітик (коротких форм): ''ми'', ''ти'', ''мя'', ''тя'''
  - Втрата енклітик у сучасній літературній мові та сліди в діалектах
- section: 'Займенники: III — Двоїна (Ми вдвох)'
  words: 600
  points:
  - Двоїна як унікальна граматична категорія давнини
  - 'Форми першої особи: ''вѣ'' (ми двоє), ''наю'', ''нама'''
  - 'Форми другої особи: ''ва'' (ви двоє), ''ваю'', ''вама'''
  - Причини та процес занепаду двоїни в історії мови
- section: 'Читання: IV — Грамоти кохання та побуту'
  words: 1200
  points:
  - Берестяні грамоти як джерело живої розмовної мови
  - 'Аналіз грамоти № 377 (Микита до Маланії): контекст та зміст'
  - 'Лінгвістичний розбір: вживання ''я'', ''тебе'', ''хоцю'' в тексті'
  - 'Грамота № 752: емоційність та синтаксис особистих листів'
  - Порівняння мови грамот з книжною мовою того часу
- section: 'Практика: Відтворення та аналіз'
  words: 600
  points:
  - 'Вправа на реконструкцію: відновити енклітичні форми в реченні'
  - 'Палеографічна задача: прочитати займенники у фрагменті рукопису'
  - 'Переклад з давньоруської: адаптація уривка грамоти'
- section: 'Підсумок: Від ''Азъ'' до ''Я'''
  words: 400
  points:
  - 'Еволюція займенникової системи: що збереглося, а що зникло'
  - Українські риси ('мені', 'тобі') як доказ тяглості мови
  - Роль займенників у формуванні мовної особистості русича
