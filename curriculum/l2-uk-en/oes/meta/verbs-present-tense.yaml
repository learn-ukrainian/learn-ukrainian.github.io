slug: verbs-present-tense
title: Verbs Present Tense
word_target: 5000
content_outline:
- section: 'Вступ: Граматика «Тут і Зараз»'
  words: 400
  points:
  - 'Філософське сприйняття часу в середньовіччі: літургійне вічне теперішнє.'
  - Роль теперішнього часу як базової форми для опису світу.
  - 'Огляд основних категорій: особа, число (включно з двоїною).'
- section: 'Тематичні дієслова: Архітектура дії'
  words: 800
  points:
  - 'Поділ на I (-е-) та II (-и-) дієвідміни: як розпізнати основу.'
  - 'Парадигма I дієвідміни: *нести* (*несу, несеши, несеть*).'
  - 'Парадигма II дієвідміни: *любити* (*люблю, любиши, любить*).'
  - 'Еволюція закінчення 3-ї особи: від *-ть* до *-є* (тверде vs м''яке).'
- section: 'Атематичні дієслова: Архаїчний фундамент'
  words: 800
  points:
  - 'Чотири кити давньоруської граматики: *быти, дати, вѣдѣти, ясти*.'
  - 'Особливості відмінювання: закінчення *-мь* у 1-й особі однини (*єсмь, дамь*).'
  - Сліди атематичних дієслів у сучасній українській мові (*розповім, дам, їм*).
  - Дієслово *iměti* (мати) як перехідний тип.
- section: 'Двоїна: Світ на двох'
  words: 700
  points:
  - 'Граматична категорія двоїни (dualis): форми на *-вѣ* (ми двоє) та *-та* (ви/вони
    двоє).'
  - 'Приклади з текстів: *очі видята*, *въстаста два*.'
  - Занепад двоїни і її релікти в сучасних іменниках (*очі, плечі*).
- section: 'Фонетична драма: Палаталізація в дії'
  words: 600
  points:
  - Йотована палаталізація в 1-й особі однини (*писати — пишу*).
  - 'Чергування губних: *любити — люблю* (epenthetic l).'
  - Як ці зміни сформували сучасну українську систему чергувань.
- section: 'Джерелознавчий практикум I: Остромирове Євангеліє'
  words: 900
  points:
  - 'Контекст пам''ятки: 1056–1057 рр., диякон Григорій.'
  - 'Лінгвістичний розбір уривку (Ів. 5:36): *имамь, твору*.'
  - Церковнослов'янський вплив vs жива стихія в тексті.
- section: 'Джерелознавчий практикум II: Живе слово Софії'
  words: 600
  points:
  - Графіті Софії Київської як свідок розмовної норми.
  - Порівняння книжних закінчень із графітійними.
  - Формули звертання та прохання в теперішньому часі (*Господи помози*).
- section: 'Підсумок: Еволюція тривалістю в тисячоліття'
  words: 400
  points:
  - Що зберегла і що втратила українська мова за 1000 років.
  - Від *несеть* до *несе*, від *єсмь* до *є*.
  - Безперервність розвитку дієслівної системи.
