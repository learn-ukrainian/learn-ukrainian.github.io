slug: prepositions-space
title: Prepositions Space
word_target: 5000
content_outline:
- section: 'Вступ: Простір у слові'
  words: 400
  points:
  - 'Концепція простору в давньоруській картині світу: свій (освоєний) vs чужий (дикий)
    простір.'
  - Прийменник як граматичний маркер просторових відношень.
  - 'Загальний огляд системи просторових прийменників: статичність vs динаміка.'
- section: 'Основний матеріал: I — Локативність та Напрямок (Въ/На)'
  words: 1200
  points:
  - 'Опозиція «Въ» та «На»: семантика внутрішнього простору проти поверхні.'
  - 'Граматична дихотомія: Знахідний відмінок для руху (Куди? — въ Кїєвъ) vs Місцевий
    для перебування (Де? — въ Кїєвѣ).'
  - 'Приклади з літописів: аналіз контекстів вживання «въ» (входження) та «на» (сходження).'
  - 'Фонетична еволюція: перехід «въ» у «в/у» як початок формування закону милозвучності.'
- section: 'Основний матеріал: II — Рух до мети (Къ/До)'
  words: 1200
  points:
  - 'Прийменник «Къ» (+ Давальний): архаїчна модель наближення (пор. церковнослов''янське
    «къ Богу»).'
  - 'Прийменник «До» (+ Родовий): модель досягнення межі та кінцевої точки.'
  - 'Історична конкуренція: поступове витіснення конструкцій з «къ» на користь «до»
    в живому мовленні.'
  - 'Зв''язок із сучасною українською мовою: чому ми кажемо «до мене», а не «к мені».'
- section: 'Основний матеріал: III — Походження та Віддалення (Отъ/Изъ/Съ)'
  words: 1000
  points:
  - 'Семантика віддалення: «Отъ» як позначення вихідної точки та походження (+ Родовий).'
  - 'Вихід з простору: «Изъ» (зсередини) проти «Съ» (з поверхні).'
  - 'Синонімія та взаємозаміна: як занепад єрів призвів до фонетичного зближення «з»
    (з «съ») та «з» (з «изъ»).'
  - Палеографічні особливості написання цих прийменників у давніх текстах.
- section: 'Практика: Робота з джерелами'
  words: 800
  points:
  - 'Аналіз уривків з «Повісті временних літ»: ідентифікація просторових значень.'
  - 'Граматичний практикум: розрізнення відмінків (місцевий/знахідний/родовий/давальний)
    при прийменниках.'
  - 'Етимологічна реконструкція: простеження шляху від давньоруської форми до сучасної.'
  - Вправа на переклад і адаптацію давніх конструкцій.
- section: 'Підсумок: Від літопису до сьогодення'
  words: 400
  points:
  - Системність просторових відношень у давньоруській мові.
  - 'Тяглість української традиції: збереження основних моделей («в», «на», «до»,
    «з») та їх фонетичне шліфування.'
  - Роль прийменників у формуванні унікального синтаксичного ладу української мови.
