slug: syntax-simple-sentences
title: Syntax Simple Sentences
word_target: 5000
content_outline:
- section: 'Вступ: Архітектура давньої думки'
  words: 600
  points:
  - Синтаксис як відображення мислення середньовічної людини
  - Книжна мова (церковнослов'янська) vs Народна розмовна стихія
  - Основні типи простого речення в Х-ХІІІ ст.
- section: 'Основний матеріал: I — Порядок слів та Закон Ваккернагеля'
  words: 1000
  points:
  - 'Вільность порядку слів: міф чи реальність?'
  - 'Закон Ваккернагеля: диктатура другої позиції для енклітик (*же, ли, бо, ся*)'
  - 'Актуальне членування речення: тема і рема в рукописах'
  - 'Еволюція позиції *ся*: від вільної частки до постфікса'
- section: 'Основний матеріал: II — Таємниця двоїни та узгодження'
  words: 1000
  points:
  - 'Узгодження підмета і присудка: логіка vs граматика'
  - 'Феномен двоїни (Dualis): *очі, вуха, два брата*'
  - Специфічні форми дієслів двоїни (*ідевета, ідоста*)
  - Занепад двоїни і перемога множини в ХІІІ ст.
- section: 'Основний матеріал: III — Безособові конструкції'
  words: 1000
  points:
  - 'Світ без суб''єкта: філософія безособових речень (*світає, морозить*)'
  - 'Предикативні форми на *-но, -то*: *писано, зроблено*'
  - Давньоруські корені сучасної української безособовості
  - Відмінність від пасивних конструкцій у сусідніх мовах
- section: 'Основний матеріал: IV — Давальний самостійний'
  words: 800
  points:
  - 'Dativus Absolutus: синтаксичний маркер високого стилю'
  - 'Структура: Іменник (Дав.) + Дієприкметник (Дав.)'
  - 'Функція: часова або причинова обставина (*сонцю сходящу*)'
  - Трансформація в сучасні дієприслівникові звороти
- section: 'Практика: Читання манускриптів'
  words: 800
  points:
  - Аналіз синтаксису «Руської Правди» (умовні періоди)
  - 'Розбір літописних оповідей: пошук енклітик і двоїни'
  - Вправа на реконструкцію порядку слів
- section: 'Підсумок: Жива спадщина синтаксису'
  words: 600
  points:
  - Що українська мова зберегла від Русі (безособовість, гнучкий порядок)
  - Що ми втратили (складні системи часових узгоджень, двоїну)
  - Значення синтаксису для ідентифікації мови
