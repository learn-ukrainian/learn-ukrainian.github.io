slug: greetings-invocations
title: Greetings Invocations
word_target: 5000
content_outline:
- section: 'Вступ: Культура «Ти»'
  words: 600
  points:
  - 'Відсутність пошанної множини («Ви») в ОЄС: звертання на «Ти» до всіх верств.'
  - Соціальна ієрархія через титули, а не займенники.
  - Кличний відмінок як основний маркер адресата.
- section: 'Сакральне звертання: Графіті Софії'
  words: 1000
  points:
  - Аналіз формули «Господи, помози...» як найчастішого графіті.
  - 'Граматичний розбір: Кличний відмінок (Господи) + Наказовий спосіб (Помози).'
  - 'Давальний відмінок бенефіціара: «рабу своєму».'
  - 'Конкретні приклади: графіті Олісави, Луки, Омели.'
- section: 'Епістолярний етикет: Берестяні грамоти'
  words: 900
  points:
  - Формула «Поклонъ ѿ... къ...» (Уклін від... до...) як стандарт початку листа.
  - 'Звенигородські грамоти (1110–1137): ділова лаконічність.'
  - 'Грамота Говенової: пряма вимога без зайвих реверансів.'
  - Порівняння з пізнішими (козацькими) епістолярними традиціями.
- section: 'Усні вітання: «Здоров» та «Чолом»'
  words: 800
  points:
  - Етимологія вітання «Здоров» (зв'язок з деревом, міцністю).
  - 'Жест і слово: еволюція «биття чолом» від дії до фрази.'
  - 'Епічні звертання: приклад «Буй Тур Всеволод» зі Слова о полку Ігоревім.'
  - Відмінність усного (неформального) та писемного (формального) етикету.
- section: 'Граматика: Кличний та Давальний'
  words: 900
  points:
  - 'Морфологія кличного відмінка: закінчення -е (княже), -у (сину), -о (жено).'
  - 'Давальний відмінок: роль адресата дії.'
  - 'Давньоруський синтаксис: порядок слів у звертаннях.'
  - Вправи на реконструкцію форм звертання.
- section: 'Підсумок: Жива спадщина'
  words: 800
  points:
  - Еволюція ОЄС форм у сучасну українську мову.
  - 'Деколонізаційний аспект: збереження кличного відмінка як риса української ідентичності.'
  - Порівняння з втратою вокатива в російській мові.
  - Значення етикету для розуміння менталітету Київської Русі (гідність, прямота).
