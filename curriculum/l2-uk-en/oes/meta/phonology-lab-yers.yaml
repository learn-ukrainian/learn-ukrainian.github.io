slug: phonology-lab-yers
title: Phonology Lab Yers
word_target: 5000
content_outline:
- section: 'Вступ: Природа редукованих голосних'
  words: 400
  points:
  - Визначення єрів (*ъ, *ь) як ультракоротких (редукованих) фонем.
  - Походження з індоєвропейських коротких *u та *i.
  - 'Артикуляційні особливості: ненапруженість та залежність від темпу мовлення.'
  - Роль єрів у законі відкритого складу (ЗВС) до початку їх занепаду.
- section: 'Теорія: Закон Гавлика та позиції'
  words: 600
  points:
  - 'Формулювання закону Гавлика (1889): правило відрахування з кінця слова.'
  - Визначення сильної та слабкої позиції.
  - 'Алгоритм розрахунку на прикладах: *dь-nь, *sъ-nъ, *o-kъ-no, *sъ-bь-ra-ti.'
  - Винятки та роль наголосу у збереженні редукованих (специфіка майбутньої української
    мови).
- section: 'Процес: Хронологія та етапи занепаду'
  words: 500
  points:
  - 'Початок процесу: друга половина XI ст. (початкові склади).'
  - 'Динаміка поширення: від початкових складів до середини слова.'
  - 'Кінець XI – початок XII ст.: масовий занепад у південних (руських) діалектах.'
  - Затримка процесу в північних (суздальських) землях (до середини-кінця XII ст.).
- section: 'Свідки: Рукописні пам''ятки XI-XII ст.'
  words: 600
  points:
  - Значення «описок» (lapsus calami) для реконструкції живої мови.
  - 'Остромирове Євангеліє (1056-57): змішування *ъ/о, *ь/е («сотьникъ» замість «сътъникъ»).'
  - 'Ізборник Святослава (1073): рання фіксація українських рефлексів.'
  - Приклади гіперкорекції як доказ зникнення звуків у свідомості носіїв.
- section: 'Наслідки І: Системні зрушення (Кінець ЗВС)'
  words: 500
  points:
  - 'Крах закону відкритого складу: поява закритих складів (*domъ > dom).'
  - Виникнення нових скупчень приголосних (*pъ-ta-xъ > птах, *mъ-gla > мгла).
  - Редукція та спрощення груп приголосних (*zъd-e-sь > тут/десь — складні процеси).
  - Поява «нульового» закінчення в іменниках чоловічого роду.
- section: 'Наслідки ІІ: Вокалізація та чергування'
  words: 600
  points:
  - Перехід сильних *ъ > о, *ь > е (сон, день).
  - Зникнення слабких *ъ, *ь (сну, дня).
  - Механізм виникнення чергування О/Е з нулем звука — одна з головних рис української
    морфології.
  - Вторинні (вставні) О та Е для розбивання важких скупчень (вітер/вітру, вогонь/вогню).
- section: 'Наслідки ІІІ: Морфологічні зміни'
  words: 600
  points:
  - 'Зміна дієслівного суфікса минулого часу: *lъ > *l > w (v) після приголосних (ходив,
    знав).'
  - Відмінність від російської (ходил, знал) як наслідок вокалізації *ъ.
  - Поява простетичних (приставних) приголосних (*rъ-ža > іржа/ржа).
  - Вплив на структуру префіксів (з-, с-, зі-).
- section: 'Діалектологія: Північ vs Південь (Деколонізація)'
  words: 600
  points:
  - Спростування міфу про тотожність процесів у всіх східних слов'ян.
  - Український рефлекс у непрямих відмінках (лев/лева) vs російський (лев/льва).
  - Феномен «нового ятя» (подовження о, е в закритому складі) як прямий наслідок занепаду
    єрів.
  - Як занепад редукованих запустив процес диференціації мов (ікавізм).
- section: 'Практикум: Реконструкція та аналіз'
  words: 300
  points:
  - Алгоритм реконструкції праформи слова (від сучасного до давнього).
  - 'Аналіз тексту: пошук слідів єрів у сучасному тексті (чергування).'
  - 'Робота з факсиміле: розпізнавання «описок» у фрагменті рукопису.'
- section: 'Висновки: Народження української фонетики'
  words: 300
  points:
  - Занепад редукованих як вододіл між праслов'янською та давньоруською/давньоукраїнською
    системами.
  - Формування унікального «мелодійного» ладу української мови.
  - 'Підсумок: чому ми говоримо «день», а не «дьнь».'
