slug: rus-panegyric
title: Rus Panegyric
word_target: 5000
content_outline:
- section: 'Вступ: Епоха Ярослава та постать Іларіона'
  words: 400
  points:
  - 'Київ 1030-1040-х років: будівництво ''міста Ярослава'' та ідеологія ''Другого
    Єрусалима''.'
  - 'Іларіон: пресвітер церкви Спаса на Берестові, перший митрополит-русин (1051).'
  - 'Місце і час виголошення ''Слова'': гіпотези (Десятинна церква vs Софія Київська).'
- section: 'Композиція твору: Архітектура думки'
  words: 400
  points:
  - 'Тричастинна структура: богословський трактат, історичний панегірик, молитва.'
  - 'Симетрія та ритміка: вплив візантійської риторики та власна творчість.'
  - 'Жанрова природа: проповідь (гомілія) чи урочиста промова?'
- section: 'Основний матеріал I: Закон і Благодать'
  words: 600
  points:
  - 'Богословська антитеза: Старий Завіт (Закон, тінь, рабство) vs Новий Завіт (Благодать,
    істина, свобода).'
  - 'Біблійні алегорії: Агар та Ізмаїл (юдейство) проти Сарри та Ісаака (християнство).'
  - 'Універсалізм християнства: спасіння відкрите для всіх народів, включно з Руссю.'
- section: 'Основний матеріал II: Хрещення як вибір свободи'
  words: 500
  points:
  - 'Легітимація Русі: хрещення не як підкорення Візантії, а як дія Духа Святого.'
  - Рівноправність 'нових народів' зі старими християнськими націями.
  - 'Полемічний аспект: заперечення винятковості будь-якого народу (антиюдейська та
    прихована антивізантійська риторика).'
- section: 'Основний матеріал III: Похвала кагану Володимиру'
  words: 700
  points:
  - Володимир як 'рівноапостольний' та 'новий Костянтин'.
  - 'Титул ''каган'': значення, походження та політична вага (претензія на імперську
    гідність).'
  - 'Опис могутності Русі: ''Не в худій бо і невідомій землі владарювали...''.'
  - Християнізація як акт мудрості та державної волі.
- section: 'Основний матеріал IV: Звернення до Ярослава'
  words: 400
  points:
  - Ярослав (Георгій) як гідний спадкоємець і продовжувач справи батька.
  - 'Будівнича програма Ярослава в тексті: Софія, Золоті Ворота, церква Благовіщення.'
  - Ідея спадкоємності влади та династичної стабільності.
- section: 'Основний матеріал V: Молитва за Руську землю'
  words: 400
  points:
  - Прохання про захист від 'нашестя іноплемінних' та міжусобиць.
  - Ідеал мирного та процвітаючого християнського царства.
  - 'Патріотичний пафос молитви: фокус на благополуччі Києва та народу.'
- section: 'Мова та стиль: Вершина давньоруської риторики'
  words: 600
  points:
  - Стиль 'плетіння словес' (вишукана ритмізована проза).
  - 'Київський ізвод: живі мовні риси (повноголосся, лексика) на тлі церковнослов''янської
    основи.'
  - Символізм світла і темряви, води і спраги.
- section: 'Деколонізаційний погляд: Іларіон проти імперії'
  words: 500
  points:
  - 'Спростування міфу про ''єдину колиску'': чітка києвоцентричність тексту.'
  - Іларіон як ідеолог руської (української) церковної автокефалії.
  - Відмінність політичної культури Русі та Московії крізь призму тексту.
- section: 'Палеографія: Шлях тексту крізь віки'
  words: 400
  points:
  - 'Відсутність автографа: втрата оригіналів XI-XII ст.'
  - Синодальний список (XV ст.) та інші редакції.
  - Вплив 'Слова' на пізнішу літературу (літописи, 'Слово о полку Ігоревім').
- section: 'Підсумок: Фундамент української ідентичності'
  words: 300
  points:
  - '''Слово про Закон і Благодать'' як маніфест державної та духовної зрілості Русі.'
  - Значення твору для формування історичної пам'яті українців.
