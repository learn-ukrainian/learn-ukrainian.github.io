slug: theft-property
title: Theft Property
word_target: 5000
content_outline:
- section: 'Вступ: Татьба як правова категорія'
  words: 800
  points:
  - Етимологія слова 'тать' та поняття 'татьба' (таємне викрадення).
  - Відмінність крадіжки від розбою та грабунку в давньоруському праві.
  - 'Соціальна природа злочину: посягання на приватну власність феодала та громади.'
- section: 'Основний матеріал: I — Процесуальне право: Свод і Гоніння сліду'
  words: 1000
  points:
  - Інститут 'своду' (процедура очної ставки та пошуку кінцевого продавця).
  - 'Правило ''третього зводу'': обмеження відповідальності добросовісного набувача.'
  - '''Гоніння сліду'': колективна відповідальність верві (громади).'
  - Правовий статус 'нічного злодія' (вбивство на місці злочину).
- section: 'Основний матеріал: II — Ієрархія об''єктів: Коні, зброя, одяг'
  words: 1200
  points:
  - Конокрадство як найтяжчий майновий злочин (вище за просте вбивство).
  - 'Крадіжка з ''кліті'' (зламом): обтяжуючі обставини.'
  - Деталізація штрафів за сільськогосподарський реманент (плуг, борона) та продукти
    (сіно, дрова).
  - 'Крадіжка холопа: специфіка ''живого майна''.'
- section: 'Основний матеріал: III — Система покарань: Продажа та Урок'
  words: 1000
  points:
  - Розрізнення штрафу на користь князя ('продажа') та компенсації потерпілому ('урок').
  - '''Потік і розграбування'': найвища міра покарання (вигнання та конфіскація).'
  - 'Гуманізм київського права: відсутність смертної кари та тілесних покарань (на
    відміну від Візантії та пізньої Московії).'
- section: 'Основний матеріал: IV — Граматика: Знахідний відмінок множини'
  words: 1000
  points:
  - Архаїчні форми З.в. множини чоловічого роду (*кони*, *волы*, *столы*).
  - Відсутність розрізнення істот/неістот для назв тварин (на відміну від сучасної
    мови).
  - Парадигми твердої (-ы) та м'якої (-и/і) груп.
  - Аналіз прикладів з тексту Руської Правди.
- section: 'Підсумок: Правова спадщина Русі'
  words: 700
  points:
  - Руська Правда як фундамент української правової традиції (Литовські Статути).
  - 'Деколонізаційний аспект: заперечення спадкоємності московського права від київського.'
  - 'Еволюція термінології: від ''татьби'' до ''крадіжки''.'
