slug: yat-mystery
title: Yat Mystery
word_target: 5000
content_outline:
- section: 'Вступ: Втрачена літера'
  words: 300
  points:
  - 'Символ ѣ (ять): графічний вигляд та місце в абетці.'
  - 'Загадка звучання: звук, якого більше не існує.'
  - 'Різні шляхи: ліс (укр.) vs лес (рос.) vs las (пол.).'
- section: 'І. Фонетична природа: Таємниця звуку'
  words: 700
  points:
  - 'Гіпотези мовознавців: довгий закритий [ē] чи дифтонг [ie]?'
  - 'Артикуляція: напруженість та висота підняття язика.'
  - Чому цей звук був нестабільним і мусив змінитися.
- section: 'ІІ. Ікавізм: Український шлях (ѣ → і)'
  words: 800
  points:
  - Визначення ікавізму як системного переходу.
  - 'Хронологія змін: від ХІ століття до остаточного ствердження.'
  - 'Порівняльна таблиця рефлексів: хлѣбъ -> хліб, дѣдъ -> дід.'
  - Міф про полонізацію та його спростування фактами.
- section: 'ІІІ. Свідки історії: Ізборник 1073 року'
  words: 900
  points:
  - Ізборник Святослава як пам'ятка київської книжності.
  - 'Аналіз ''помилок'' писаря: ''въ вЂри'', ''нимая''.'
  - 'Гіперкорекція: ''прЂвєдоуть'' замість ''приведоуть''.'
  - 'Доказова база: жива мова проривається крізь церковнослов''янський канон.'
- section: 'IV. Кам’яні скрижалі: Графіті Софії'
  words: 600
  points:
  - Епіграфіка як джерело народної розмовної мови.
  - Аналіз графіті ХІ-ХІІ ст. з плутаниною е/и/ѣ.
  - Приклади імен та побутових написів.
- section: V. «Новий ять» та падіння редукованих
  words: 800
  points:
  - 'Занепад ъ та ь: революція у складі (ХІІ ст.).'
  - Компенсаційне подовження о/е в нових закритих складах.
  - 'Механізм: стіл (із столъ), піч (із печь).'
  - Злиття 'старого' (ѣ) та 'нового' (о/е) ятя в єдиний звук [і].
- section: VI. Діалектна мапа та історичне значення
  words: 600
  points:
  - Північні (поліські) дифтонги як релікти минулого.
  - Південно-західний ареал як двигун ікавізму.
  - Ять як маркер української ідентичності.
  - Відмінність від російського 'єкання' (цвєт, лєс).
- section: 'VII. Практика: Палеографічний детектив'
  words: 300
  points:
  - Як розпізнати ѣ у давніх текстах.
  - Вправа на читання уривка з Ізборника.
  - Реконструкція вимови.
