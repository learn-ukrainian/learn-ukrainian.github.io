slug: pvl-sviatoslav
title: Pvl Sviatoslav
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Святослав Ігорович — 'Запорожець на престолі' (за М. Грушевським).
  - 'Контраст епох: християнська регентша Ольга vs язичницький воїн Святослав.'
  - 'Джерела: ''Повість минулих літ'' та візантійські хроніки (Лев Диякон).'
- section: 'Основний матеріал: I — Образ князя-воїна (Літописний портрет)'
  words: 800
  points:
  - 'Аналіз уривку 964 року: ''ходячи, яко пардус''.'
  - 'Лексичний розбір: ''пардус'' (гепард), ''потник'' (підкладка під сідло).'
  - 'Побут військового табору: відсутність обозу, харчування кониною.'
  - 'Відмова від християнства: соціальний тиск дружини (''дружина сміятися почне'').'
- section: 'Основний матеріал: II — Східні походи і «Іду на ви»'
  words: 800
  points:
  - 'Геополітична стратегія: контроль торгових шляхів (Волга, Дон).'
  - 'Формула ''Хочу на ви іти'': граматика (знахідний відмінок) та психологія.'
  - 'Розгром Хозарського каганату: взяття Саркела (Білої Вежі).'
  - Підкорення в'ятичів та ясів.
- section: 'Основний матеріал: III — Балканська епопея і промова'
  words: 900
  points:
  - 'Концепція ''середини землі'': Переяславець на Дунаї.'
  - Війни з Болгарією та Візантією (Іоанн Цимісхій).
  - Облога Доростола (971 рік).
  - 'Риторика лідера: аналіз фрази ''Мертві бо сорому не мають'' (давньоруська: ''Мертві
    бо срама не імам'').'
- section: 'Основний матеріал: IV — Договір з греками 971 року'
  words: 800
  points:
  - 'Текстологічний аналіз договору: структура та формули.'
  - 'Клятва: Перун (бог зброї) та Волос (бог худоби/багатства).'
  - 'Зобов''язання Русі: ненапад на Корсунь та Болгарію.'
  - Дипломатичний етикет X століття.
- section: 'Основний матеріал: V — Загибель на порогах'
  words: 700
  points:
  - 'Фатальне повернення: порада воєводи Свенельда.'
  - 'Зимування в Білобережжі: голод і ціни на продовольство.'
  - Засідка печенігів (972 рік) і смерть князя.
  - 'Легенда про чашу хана Курі: ''Чужого шукаючи — своє втратив''.'
- section: Практика
  words: 400
  points:
  - 'Робота з текстом ПВЛ: пошук архаїзмів.'
  - Відтворення маршрутів походів на карті.
  - Аналіз військової лексики.
- section: Підсумок
  words: 200
  points:
  - Святослав як останній 'вікінг' на київському престолі.
  - 'Наслідки правління: розширення кордонів і виснаження сил.'
  - Вступ до теми міжусобиць (Ярополк, Олег, Володимир).
