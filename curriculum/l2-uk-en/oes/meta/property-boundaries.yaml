slug: property-boundaries
title: Property Boundaries
word_target: 5000
content_outline:
- section: 'Вступ: Сакральність межі'
  words: 300
  points:
  - Концепція 'межі' в ментальності людини Київської Русі
  - Природні кордони (ріки, ліси) та рукотворні знаки
  - Зв'язок просторового мислення з мовою
- section: 'Джерела права: «Руська Правда»'
  words: 500
  points:
  - Коротка та Розлога редакції як джерело юридичної термінології
  - 'Стаття 34: Захист земельної власності'
  - Роль 'Правди Ярославичів' у зміцненні феодальної власності
- section: 'Термінологія: Перетес та знамення'
  words: 600
  points:
  - Етимологія та значення слова 'перетес'
  - 'Типологія межових знаків: зарубки, камені, дерева'
  - Поняття 'знамення' (особистий знак власника)
  - Археологічні відповідники бортних знаків
- section: 'Граматика: Просторові прийменники (частина I)'
  words: 600
  points:
  - Функціонування прийменників 'отъ', 'до', 'у' в юридичних текстах
  - Позначення вихідної та кінцевої точок меж
  - Еволюція прийменника 'отъ' у сучасний 'від'
  - Порівняння з іншими слов'янськими мовами
- section: 'Граматика: Просторові прийменники (частина II)'
  words: 600
  points:
  - Семантика прийменників 'за', 'по', 'межи', 'около'
  - Вживання 'по' з давальним та місцевим відмінками
  - Прийменник 'межи' як маркер кордону (суч. 'між')
  - 'Контекстуальні приклади: ''по ріці'', ''за перетесом'''
- section: 'Соціальний вимір: Князівська vs. общинна земля'
  words: 600
  points:
  - Спростування міфу про виключно общинне землеволодіння
  - Привілейований захист князівської та боярської вотчини
  - Статус 'верві' як територіальної громади
  - Юридична відповідальність за порушення меж
- section: 'Судова практика: Штрафи та покарання'
  words: 500
  points:
  - 'Система штрафів: 12 гривень за порушення межі'
  - Економічний еквівалент штрафу (вартість худоби/майна)
  - Процедура визначення вини та свідчення (послухи)
  - Роль князівського адміністратора (вирника)
- section: 'Практика: Аналіз текстів'
  words: 400
  points:
  - Читання адаптованих уривків з 'Руської Правди'
  - Пошук та ідентифікація просторових прийменників
  - Реконструкція ситуації порушення межі за текстом
- section: 'Практика: Граматичні вправи'
  words: 400
  points:
  - Вправи на керування прийменників (вибір відмінка)
  - Переклад сучасних юридичних термінів давньоруськими відповідниками
  - Складання опису земельної ділянки за зразком
- section: 'Підсумок: Еволюція поняття власності'
  words: 500
  points:
  - Спадковість української правової традиції від Київської Русі
  - Вплив 'Руської Правди' на Литовські статути
  - Роль мови у формуванні правової свідомості
