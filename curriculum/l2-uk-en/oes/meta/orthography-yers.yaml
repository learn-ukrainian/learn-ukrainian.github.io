slug: orthography-yers
title: Orthography Yers
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Визначення єрів (ъ, ь) як ультракоротких голосних звуків давньоруської мови.
  - 'Контекст: закон відкритого складу та милозвучність давньої мови.'
  - 'Загадка зникнення: чому літери залишилися, а звуки змінилися.'
- section: 'Основний матеріал: I — Природа редукованих голосних'
  words: 800
  points:
  - 'Походження ъ (з *ŭ) та ь (з *ĭ): етимологічний зв''язок з ''у'' та ''і''.'
  - 'Артикуляція: ненапруженість і короткість звучання.'
  - Роль у структурі складу X-XI століть.
  - Відмінність від сучасних літер (м'якого знака та апострофа).
- section: 'Основний матеріал: II — Механізм занепаду (Закон сильних і слабких позицій)'
  words: 1000
  points:
  - 'Алгоритм Гавлика: визначення сильної та слабкої позиції (рахунок складів з кінця).'
  - 'Доля слабких єрів: повне зникнення (нуль звука).'
  - 'Доля сильних єрів: вокалізація в повні голосні ''о'' та ''е''.'
  - Ланцюгова реакція в словах з кількома єрами (*жьньць > жнець).
  - 'Приклади: *сънъ > сон, *дьнь > день, *мъхъ > мох.'
- section: 'Основний матеріал: III — Наслідки: Рухомі голосні та нові кластери'
  words: 1000
  points:
  - Виникнення чергування о/е з нулем звука в сучасній українській мові (день/дня,
    сон/сну).
  - Поява закритих складів — революція в фонетиці.
  - Утворення нових груп приголосних та їх спрощення (*съдесь > здесть > тут/ось).
  - 'Вторинні зміни: перехід ''е'' в ''о'' після шиплячих (*жоні > жінці).'
- section: 'Основний матеріал: IV — Палеографія та орфографічна традиція'
  words: 800
  points:
  - 'Відображення процесу в рукописах XI-XII ст.: ''описки'' як свідчення живої мови.'
  - 'Традиційний правопис vs. реальна вимова: консервація ъ в кінці слів.'
  - 'Паєрок: графічний знак замість ъ.'
  - Остромирове Євангеліє vs. Графіті Софії Київської.
- section: Практика
  words: 600
  points:
  - 'Аналіз тексту: пошук сильних і слабких позицій у реконструйованих словах.'
  - 'Етимологічні задачі: пояснення сучасних чергувань через історію єрів.'
  - 'Палеографічна вправа: читання уривка з урахуванням вокалізації.'
- section: Підсумок
  words: 400
  points:
  - Занепад редукованих як роздоріжжя слов'янських мов.
  - 'Український шлях: специфічні рефлекси та формування милозвучності.'
  - Остаточне прощання з 'твердим знаком' як символом минулого.
