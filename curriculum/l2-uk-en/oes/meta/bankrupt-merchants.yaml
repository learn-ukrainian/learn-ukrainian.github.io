slug: bankrupt-merchants
title: Bankrupt Merchants
word_target: 5000
content_outline:
- section: 'Вступ: Купецький ризик у Давній Русі'
  words: 600
  points:
  - Торгові шляхи (Грецький, Залозний) та небезпеки подорожей (печеніги, половці)
  - 'Роль кредиту в економіці Русі: поняття ''куни'' та ''різ'' (відсоток)'
  - 'Соціальний контекст: Повстання киян 1113 року проти лихварів як передумова реформ
    Мономаха'
- section: 'Основний матеріал: I — Невинуваті банкрути'
  words: 1200
  points:
  - 'Аналіз тексту Статті 54: поняття форс-мажору (''пагуба от Бога'')'
  - 'Легітимні причини втрати товару: ''рать'' (війна), ''огнь'' (пожежа), ''истопиться''
    (вода)'
  - 'Правові наслідки: заборона насильства та продажу в холопство, розстрочка платежу'
  - Порівняння з сучасною концепцією банкрутства (restructuring)
- section: 'Основний матеріал: II — Злісні банкрути'
  words: 1000
  points:
  - 'Аналіз тексту Статті 55 (початок): провина боржника (''пропиеться'', ''пробиеть'')'
  - 'Поняття ''безумья'' в ділових справах: марнотратство та недбалість'
  - 'Право кредиторів на вибір санкції: продаж у холопи як відшкодування збитків'
  - 'Моральний аспект закону: особиста відповідальність за поведінку'
- section: 'Основний матеріал: III — Черга кредиторів (Asset Priority)'
  words: 1000
  points:
  - 'Аналіз Статті 55 (продовження): процедура ліквідації майна при численних боргах'
  - Статус 'гостя' (іноземного купця) та його пріоритет перед 'домашніми'
  - 'Князівський привілей: чому борг князю повертається першим'
  - 'Економічна логіка: захист міжнародного капіталу для розвитку торгівлі'
- section: 'Практика: Мова давньоруського права'
  words: 800
  points:
  - Умовні конструкції з часткою 'аже' (якщо) як основа юридичного синтаксису
  - 'Лексичний аналіз: еволюція термінів ''купець'', ''гость'', ''товар'', ''куни'''
  - 'Палеографія: особливості написання юридичних термінів у статутах ХІІ ст.'
- section: 'Підсумок: Правова культура Києва'
  words: 400
  points:
  - Руська Правда як зразок 'Lex Mercatoria' Східної Європи
  - 'Гуманізм Мономахового законодавства: відхід від сліпої кари до врахування обставин'
  - Вплив київської правової традиції на Литовський Статут та українське право
