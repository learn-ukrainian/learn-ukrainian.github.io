slug: vocative-case
title: Vocative Case
word_target: 5000
content_outline:
- section: 'Вступ: Відмінок прямого контакту'
  words: 400
  points:
  - Кличний відмінок (Vocativus) як спадщина індоєвропейської мовної єдності.
  - Унікальність збереження вокатива в українській мові на тлі інших східнослов'янських
    мов.
  - 'Функція: встановлення комунікативного контакту, а не просто називання.'
- section: 'Морфологія звертання: Давні парадигми'
  words: 900
  points:
  - 'Система закінчень давньоруського вокатива: *-е*, *-о*, *-у*, *-ю*.'
  - Перша палаталізація при утворенні кличного відмінка (*другъ* — *друже*, *Богъ*
    — *Боже*).
  - Відмінності між твердою та м'якою групами іменників.
  - 'Релікти *u*-основ: чому ми кажемо *сину*, *меду*.'
- section: 'Живий голос стін: Свідчення графіті'
  words: 800
  points:
  - Графіті Софії Київської як джерело розмовної мови XI–XII ст.
  - 'Аналіз напису про Андронича: «О горе тобі, Андрониче!».'
  - 'Емоційне забарвлення звертань: від молитви («Господи») до докору («небоже»).'
  - Сакральні формули звертання до святих.
- section: 'Поетика «Слова»: Звертання до Всесвіту'
  words: 900
  points:
  - Риторична функція вокатива у «Слові о полку Ігоревім».
  - 'Персоніфікація природи: звертання Ярославни («О вітре, вітрило!», «Дніпре Словутичу!»).'
  - 'Політичний етикет: звертання до князів («Буй Рюриче», «Осмомисле Ярославе»).'
  - Титулатура та епітети у формі кличного відмінка.
- section: Соціальна прагматика звертань
  words: 700
  points:
  - Звертання у ділових документах (берестяні грамоти, грамоти князів).
  - 'Ієрархія звертань: від *господине* до *рабе*.'
  - 'Родинні звертання: *брате*, *сестро*, *діду*.'
- section: 'Історія репресій: Відмінок, що вижив'
  words: 800
  points:
  - 'Радянська мовна політика 1930-х: курс на злиття мов.'
  - Штучне вилучення кличного відмінка з граматик як «архаїзму».
  - Вплив російської мови (де вокатив зник) на офіційно-діловий стиль УРСР.
  - Відродження статусу сьомого відмінка в 1990 році як акт деколонізації.
- section: 'Підсумок: Жива душа мови'
  words: 500
  points:
  - Кличний відмінок як маркер української ідентичності.
  - Безперервність традиції від *Андрониче* до сучасного *пане*.
  - Значення вокатива для милозвучності та емоційності мови.
