slug: nouns-o-a-stems
title: Nouns O A Stems
word_target: 5000
content_outline:
- section: 'Вступ: Архітектура давньоруського іменника'
  words: 400
  points:
  - 'Поняття ''основа слова'' (stem) у історичній граматиці: чому вона важливіша за
    рід.'
  - 'Шість давніх типів відмінювання: короткий огляд.'
  - 'Домінування O-основ та A-основ: як вони сформували сучасні І та ІІ відміни.'
  - Роль редукованих голосних (ъ, ь) у структурі іменника X-XI ст.
- section: 'Основний матеріал: I — О-основи (Чоловічий та середній рід)'
  words: 800
  points:
  - 'Тверда група (*ŏ): іменники на -ъ (*городъ, столъ*) та -о (*село*).'
  - 'М''яка група (*jŏ): іменники на -ь (*конь, отьць*) та -е (*поле*).'
  - 'Ключові відмінкові закінчення: Орудний відмінок *-омь* як маркер.'
  - 'Еволюція: як *городъ* став *містом* (лексичні зміни) або *городом* (фонетичні
    зміни).'
- section: 'Основний матеріал: II — А-основи (Жіночий та чоловічий рід)'
  words: 800
  points:
  - 'Тверда група (*ā): іменники на -а (*жена, рука*).'
  - 'М''яка група (*jā): іменники на -я (*земля, душа*).'
  - 'Іменники чоловічого роду на -а/-я (*воєвода, юноша*): соціальний статус.'
  - 'Друга палаталізація: чому *рука* стає *руці* (історичний механізм).'
- section: 'Основний матеріал: III — Палеографічний аналіз: Київський літопис'
  words: 700
  points:
  - 'Робота з текстом: уривок про заснування Києва (аналіз іменників).'
  - Розпізнавання O-основ (*Кий, Хоривъ, увозъ*) та A-основ (*гора, Щековиця*).
  - Титла та скорочення іменників у рукописах (nomina sacra).
  - 'Графічні варіанти: *князь* vs *кнѧзь*.'
- section: 'Основний матеріал: IV — Кличний відмінок: Голос предків'
  words: 700
  points:
  - Кличний відмінок як органічна риса O- та A-основ.
  - 'Форми O-основ: тверді (*друже, Боже*) та м''які (*князю, Ігорю*).'
  - 'Форми A-основ: тверді (*жено, Ганно*) та м''які (*душе, земле*).'
  - 'Порівняльний аспект: збереження в українській vs втрата в російській.'
- section: 'Основний матеріал: V — Сліди двоїни (Dualis)'
  words: 600
  points:
  - Що таке двоїна і для чого вона існувала.
  - 'Форми двоїни для O- та A-основ: *дві руці*, *два брата*.'
  - 'Сучасні рефлекси: чому ми кажемо *очі*, *плечі* (це не множина!).'
  - Вживання числівників *два, три, чотири* з називним відмінком множини (вплив двоїни).
- section: 'Основний матеріал: VI — Від давнини до сучасності'
  words: 600
  points:
  - Занепад редукованих і його наслідки для іменників (поява нульових закінчень).
  - 'Уніфікація відмінювання: як O- та A-основи поглинули інші типи (*u*-основи).'
  - Формування сучасних I та II відмін.
  - Які архаїзми ми вживаємо щодня, не підозрюючи про це.
- section: 'Практика: Читання та реконструкція'
  words: 200
  points:
  - Вправи на ідентифікацію основ у тексті.
  - Реконструкція праслов'янських форм.
  - Переклад давньоруських речень сучасною мовою.
- section: 'Підсумок: Жива спадщина'
  words: 300
  points:
  - 'Синтез: O- та A-основи як фундамент української морфології.'
  - Значення історичної граматики для розуміння сучасної норми.
  - 'Анонс наступної теми: I-основи та U-основи.'
