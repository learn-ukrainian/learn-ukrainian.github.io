slug: daily-life-vocabulary
title: Daily Life Vocabulary
word_target: 5000
content_outline:
- section: 'Вступ: Мова повсякдення'
  words: 400
  points:
  - Значення побутової лексики для реконструкції життя предків.
  - 'Джерела: літописи vs берестяні грамоти та графіті.'
  - 'Огляд основних сфер: їжа, дім, дорога.'
- section: 'Хліб насущний: від зерна до столу'
  words: 1100
  points:
  - '«Жито» як синонім життя: хлібна лексика (*хлѣбъ*, *жито*, *пьшениця*).'
  - 'М''ясний раціон: домінування свинини (*свинина*) та полювання (*дичина*).'
  - 'Напої та страви: *квас*, *мед*, *каша*, *юха*.'
  - 'Лексика приготування їжі: *пекти*, *варити*, *смажити*.'
- section: 'Транспорт суходолу: коні та вози'
  words: 1100
  points:
  - 'Культ коня в Русі: *конь*, *комонь*, *жеребець*.'
  - 'Кінське спорядження в «Руській Правді»: *сѣдло*, *уззда*.'
  - 'Гужовий транспорт: *віз* (*возъ*) як універсальний засіб.'
  - Сани (*сани*) як ритуальний та зимовий транспорт.
- section: 'Водний шлях: човни та насади'
  words: 1100
  points:
  - Річка як головна магістраль Русі.
  - 'Типи суден: *лодья*, *насад*, *струг*, *скедія*.'
  - Аналіз Звенигородської берестяної грамоти №2 («куни лодієві»).
  - 'Термінологія судноплавства: *весло*, *корм*, *парус*.'
- section: 'Мовна диглосія: побут проти книги'
  words: 900
  points:
  - Розрив між церковнослов'янською та живою мовою в побуті.
  - Повноголосся як маркер живої мови (*золото* vs *злато*).
  - 'Тяглість української побутової лексики: від *гърньць* до глечика.'
  - Відсутність «спільної» мови в побутовій сфері.
- section: 'Підсумок: Живе слово давнини'
  words: 400
  points:
  - Узагальнення вивчених лексичних груп.
  - Значення збереження побутової лексики для національної ідентичності.
  - Місток до сучасної української мови.
