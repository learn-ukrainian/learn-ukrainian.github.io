slug: building-of-lavra
title: Building Of Lavra
word_target: 5000
content_outline:
- section: 'Вступ: Кам''яне диво на пагорбах'
  words: 400
  points:
  - 'Київ середини XI ст.: перехід від дерев''яного до монументального кам''яного
    будівництва.'
  - Лавра як духовна домінанта та архітектурний орієнтир.
  - 'Значення джерел: «Повість минулих літ» та «Києво-Печерський патерик».'
- section: 'Основний матеріал: I — Легенда про Шимона та Золотий Пояс'
  words: 900
  points:
  - 'Варяг Шимон Африканович: історія прибуття до Києва та служіння Ярославичам.'
  - Видіння небесної церкви та пророцтво про Успенський собор.
  - Золотий пояс (10 ліктів) та вінець як священні реліквії-еталони.
  - 'Містична метрологія: вимірювання фундаменту поясом як акт сакралізації простору.'
- section: 'Основний матеріал: II — Княжий внесок та візантійські майстри'
  words: 1000
  points:
  - 'Роль князя Святослава Ярославича: пожертва 1000 гривень золотом та особиста участь.'
  - Легенда про прикликання майстрів з Константинополя самою Богородицею у Влахерні.
  - Подорож грецьких зодчих до Києва «на Русь».
  - Смерть Феодосія (1074) та завершення будівництва ігуменом Стефаном.
- section: 'Основний матеріал: III — Архітектурна мова: Плінфа, Цем''янка, Хрест'
  words: 1100
  points:
  - 'Типологія храму: шестистовпний, тринефний, хрестовокупольний.'
  - 'Технологія «затопленого ряду» (*opus mixtum*): чергування плінфи та каменю.'
  - 'Будівельні матеріали: київська плінфа, рожевий розчин (цем''янка), голосники.'
  - 'Оздоблення: мозаїки, фрески, майстерня Алімпія Печерського.'
- section: 'Основний матеріал: IV — Лавра як «Новий Єрусалим»'
  words: 800
  points:
  - Символізм Успенського собору як «Великої Церкви».
  - Вплив лаврської архітектури на будівництво в інших князівствах Русі.
  - Лавра як усипальниця князів та духовний центр (літописання, іконопис).
  - 'Континуїтет традиції: від руйнацій (1240, 1941) до відбудови.'
- section: 'Практика: Аналіз джерел'
  words: 400
  points:
  - Робота з уривками Патерика (ОЕС текст).
  - Ідентифікація архітектурних термінів у тексті.
  - Вправа на розрізнення легендарного та історичного.
- section: 'Підсумок: Спадщина у камені'
  words: 400
  points:
  - Успенський собор як символ незнищенності української духовної культури.
  - 'Зв''язок часів: Київська Русь — Бароко — Сучасність.'
  - 'Підсумкова рефлексія: чому ми називаємо це «українським», а не «спільним» спадком.'
