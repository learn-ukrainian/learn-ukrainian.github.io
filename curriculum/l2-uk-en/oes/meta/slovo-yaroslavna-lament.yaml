slug: slovo-yaroslavna-lament
title: Slovo Yaroslavna Lament
word_target: 5000
content_outline:
- section: 'Вступ: Історичне тло 1185 року'
  words: 400
  points:
  - Історичний контекст походу Ігоря Святославича проти половців (квітень-травень
    1185).
  - Жанрова специфіка 'Слова' як героїчного епосу з ліричними відступами.
  - 'Місце ''Плачу Ярославни'' в композиції твору: емоційна кульмінація.'
- section: 'Постать Ярославни: Галицько-Сіверський міст'
  words: 500
  points:
  - 'Біографічна довідка: Єфросинія Ярославна, дочка Ярослава Осмомисла.'
  - Династичні шлюби як засіб єднання земель Русі (Галич і Путивль).
  - 'Символізм локації: Путивльський вал як межа між Руссю і Степом.'
- section: 'Читання: I — Звернення до Вітру'
  words: 700
  points:
  - Оригінальний текст і транскрипція першої частини плачу.
  - 'Аналіз звертання ''О вѣтрѣ, вѣтрило!'': семантика і граматика.'
  - Образ вітру як ворожої сили, що допомагає половцям ('хиновьскыя стрѣлкы').
  - 'Граматичний розбір: кличний відмінок і форми дієслів.'
- section: 'Читання: II — Звернення до Дніпра-Славутича'
  words: 700
  points:
  - Оригінальний текст звернення до Дніпра.
  - Етимологія гідроніма 'Славутич' і міфологічна персоніфікація річки.
  - 'Мотив ''прилеліяння'': ріка як шлях додому і засіб порятунку.'
  - Опозиція 'своє' (Русь, вода) — 'чуже' (Степ, половецька земля).
- section: 'Читання: III — Звернення до Сонця'
  words: 700
  points:
  - Оригінальний текст звернення до Сонця ('Свѣтлое и тресвѣтлое слънце!').
  - 'Амбівалентність образу сонця: дарувальник життя vs. причина спраги воїнів.'
  - 'Поетичні засоби: епітети, риторичні запитання, контраст.'
  - 'Опис страждань війська: ''жаждею имъ лучи съпряже''.'
- section: 'Мовний аналіз: Протоукраїнські риси'
  words: 600
  points:
  - 'Фонетичні докази українського походження: повноголосся (ворота, голова).'
  - 'Морфологічні особливості: збереження кличного відмінка (господине, Дніпре).'
  - 'Лексичний шар: аналіз слів ''яруга'', ''кожух'', ''зегзиця''.'
  - 'Деколонізаційний аспект: спростування міфу про ''спільну колиску'' через мовні
    факти.'
- section: 'Символізм і міфологія: Магія стихій'
  words: 500
  points:
  - Плач як язичницьке заклинання природи (замовляння).
  - 'Образ ''зегзиці'' (зозулі): посередник між світами, символ туги.'
  - 'Триєдність стихій у плачі: Повітря, Вода, Вогонь (Сонце).'
  - Християнський контекст vs. язичницька сутність Ярославни.
- section: 'Практика: Палеографія і реконструкція'
  words: 500
  points:
  - 'Робота з уривком тексту: читання ''уставом''.'
  - Вправа на транскрипцію і переклад сучасною мовою.
  - Пошук спільних коренів у давньоруській і сучасній лексиці.
- section: 'Підсумок: Спадщина і рецепція'
  words: 400
  points:
  - Вплив образу Ярославни на українську культуру (Т. Шевченко, П. Мирний).
  - Образ Ярославни в мистецтві (опера, живопис).
  - Значення 'Слова' для національної ідентичності українців.
