slug: zakup-indentured
title: Zakup Indentured
word_target: 5000
content_outline:
- section: 'Вступ: Соціальна мозаїка Русі'
  words: 600
  points:
  - 'Руське суспільство: не лише князі та раби, а й складний спектр залежностей.'
  - 'Категорії населення: смерди, рядовичі, ізгої, челядь.'
  - 'Місце закупа: на межі свободи та рабства.'
- section: 'Етимологія та поняття: Що таке «купа»?'
  words: 600
  points:
  - Лінгвістичний аналіз терміну «закуп» (*za + *kupa).
  - «Купа» як борг/позика в давньоруській мові.
  - Добровільність вступу в закупництво (ряд) на відміну від полону.
  - 'Сучасні рефлекси: слово «купувати» та його зв''язок з торгом.'
- section: 'Першоджерело: Статут Володимира Мономаха (1113)'
  words: 800
  points:
  - 'Історичний контекст: Київське повстання 1113 року проти лихварів.'
  - Роль Володимира Мономаха як законодавця-реформатора.
  - «Устав» як реакція на соціальний запит і захист боржників.
  - Огляд статей Розширеної Правди, присвячених закупам (ст. 56–64).
- section: 'Текстологічний аналіз: «Аже закупъ бѣжить...»'
  words: 800
  points:
  - Читання та переклад статті 56 (про втечу закупа).
  - Термін «обѣль» (повний раб) — етимологія та значення.
  - 'Право на втечу «до суду»: унікальна риса правосуб''єктності закупа.'
  - Різниця між «втечею» та «пошуком справедливості».
- section: 'Правовий статус: Межі панської влади'
  words: 800
  points:
  - 'Захист особистості: заборона бити «без вини».'
  - 'Майнові права: заборона продавати закупа в холопи (наслідки порушення).'
  - Відповідальність закупа за господарський інвентар та коня.
  - Порівняння з правами вільного смерда.
- section: 'Види закупів: Ролейні та неролейні'
  words: 600
  points:
  - Закуп «ролейний» (орний) — праця в полі.
  - Закуп «неролейний» — праця в домі/дворі.
  - Різниця у відповідальності за майно та худобу.
  - Специфіка побуту та соціальні ліфти (або їх відсутність).
- section: 'Дискусія: Закуп — напіввільний чи напівраб?'
  words: 800
  points:
  - 'Радянський погляд: закуп як прото-кріпак, жертва експлуатації.'
  - 'Сучасний український погляд: закуп як суб''єкт договірного права.'
  - 'Концепція «тимчасового стану»: можливість викупу.'
  - 'Деколонізація: спростування міфу про тотальне безправ''я в Русі.'
- section: 'Підсумок: Еволюція права та гідності'
  words: 500
  points:
  - «Руська Правда» як дзеркало суспільних відносин.
  - Значення реформ Мономаха для стабілізації держави.
  - Відлуння статусу закупа в Литовських статутах.
  - 'Фінальна думка: Закон вище сили (навіть князь підкоряється Правді).'
