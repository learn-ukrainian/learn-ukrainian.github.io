slug: roman-mstyslavych
title: Roman Mstyslavych
word_target: 5000
content_outline:
- section: 'Вступ: Русь на роздоріжжі'
  words: 300
  points:
  - Криза київського центризму в кінці XII століття
  - 'Волинь і Галичина: два шляхи розвитку (князівський vs боярський)'
  - Постать Романа Мстиславича як об'єднувача
- section: 'Основний матеріал: I — 1199: Народження держави'
  words: 600
  points:
  - Смерть останнього Ростиславича і вакуум влади в Галичі
  - Об'єднання Волині й Галичини (1199) — створення нової геополітичної реальності
  - 'Внутрішня політика: приборкання боярської опозиції («Не погнетши пчіл...»)'
  - Формування сильної централізованої влади
- section: 'Основний матеріал: II — «Самодержець всієї Русі»'
  words: 600
  points:
  - Взяття Києва (1202) і контроль над «Руською землею»
  - 'Титулатура Романа в літописах: «самодержець», «цар»'
  - 'Політична реформа: спроба змінити порядок престолонаслідування («добрий порядок»)'
  - 'Деколонізація: Галич як новий Київ, а не провінція'
- section: 'Основний матеріал: III — Лев, Рись і Крокодил (Аналіз джерела)'
  words: 800
  points:
  - Текст «Похвали князю Роману» (Галицько-Волинський літопис)
  - 'Палеографічний аналіз: «коркодилъ», «туръ» — символіка сили'
  - 'Граматичні особливості: вживання минулих часів (аорист, імперфект)'
  - Дружинний епос і його вплив на літописання
- section: 'Основний матеріал: IV — Меч проти Корони (Зовнішня політика)'
  words: 700
  points:
  - 'Походи на половців: «Романів шлях» і захист кордонів'
  - 'Візантійський вектор: союз з Алексієм III Ангелом'
  - 'Відносини з Римом: пропозиція коронації від Інокентія III (1204)'
  - 'Легендарна відмова: пріоритет «меча» над титулом'
- section: 'Основний матеріал: V — Завихостська катастрофа (1205)'
  words: 500
  points:
  - Втручання у польські міжусобиці (Лешко Білий та Конрад)
  - 'Битва під Завихостом: реконструкція подій і загибель князя'
  - 'Історичні наслідки: початок 40-річної війни за спадщину'
  - Доля вдови Анни і малолітніх синів (Данила і Василька)
- section: 'Практика: I — Робота з джерелами'
  words: 400
  points:
  - Читання і переклад уривків з Галицько-Волинського літопису
  - Ідентифікація реалій (хто такі «погані», де знаходиться «Угорська земля»)
  - Порівняння літописного образу Романа з історичними фактами
- section: 'Практика: II — Мовний практикум'
  words: 400
  points:
  - 'Граматичний розбір: форми аориста (устремил ся, бысть)'
  - 'Лексична робота: давньоруські військові терміни'
  - 'Трансформація: переклад речень сучасною українською мовою'
- section: 'Підсумок: Архітектор Європейської Русі'
  words: 400
  points:
  - Роман Мстиславич як творець Галицько-Волинської держави
  - 'Спадщина: перетворення західних земель на оплот української державності'
  - Місток до епохи короля Данила
