slug: hagiography-intro
title: Hagiography Intro
word_target: 5000
content_outline:
- section: 'Вступ: Феномен святості'
  words: 600
  points:
  - 'Визначення агіографії: «писання про святих» як жанр і духовна практика.'
  - 'Візантійський канон: Симеон Метафраст та перекладна література на Русі.'
  - 'Відмінність житія від біографії: ігнорування індивідуального заради ідеального
    (Imitatio Christi).'
  - 'Функція житія: літургійна (читання в церкві) та дидактична (модель поведінки).'
- section: 'Агіографія: I — Канон та структура житія'
  words: 1000
  points:
  - 'Літературний етикет: топос «авторського смирення» у вступі.'
  - 'Тричастинна структура: вступ (exordium), виклад життя (narratio), похвала та
    чудеса (conclusio).'
  - 'Обов''язкові елементи: благочестиві батьки, відмова від ігор у дитинстві, аскетичні
    подвиги.'
  - Символізм чисел та біблійні паралелі в тексті.
- section: 'Агіографія: II — Перші руські святі: Борис і Гліб'
  words: 1200
  points:
  - 'Історичний контекст 1015 року: міжусобиця та злочин Святополка.'
  - 'Феномен страстотерпців: непротивлення злу насильством як специфічно руський тип
    святості.'
  - 'Порівняння джерел: «Літописна повість», «Сказаніє» та «Чтеніє» Нестора.'
  - 'Політична ідеологія культу: святість роду Рюриковичів та засудження братовбивства.'
- section: 'Агіографія: III — Преподобні отці: Феодосій та Патерик'
  words: 1200
  points:
  - 'Нестор Літописець і «Житіє Феодосія Печерського»: образ ідеального ченця-організатора.'
  - 'Конфлікт покликання: боротьба Феодосія з матір''ю за право бути ченцем.'
  - 'Києво-Печерський патерик: історія створення (листування Симона і Полікарпа).'
  - 'Жанрова специфіка Патерика: новелістичність, побутовий реалізм, демонологічні
    сюжети.'
- section: 'Практикум: Аналіз агіографічного тексту'
  words: 500
  points:
  - 'Лексичний аналіз: терміни *преподобний*, *блаженний*, *мощі*, *нетління*.'
  - 'Граматичні особливості: вживання аориста для динаміки сюжету.'
  - 'Палеографія: читання під титлами (сакральні скорочення).'
- section: 'Підсумок: Спадщина київської агіографії'
  words: 500
  points:
  - 'Агіографія як історичне джерело: що ми дізнаємося про побут ХІ ст.'
  - 'Тяглість традиції: вплив на українську літературу бароко (Дмитро Туптало).'
  - 'Деколонізаційний погляд: київська агіографія як фундамент української, а не «загальноросійської»
    ідентичності.'
