slug: walls-speak-intro
title: Walls Speak Intro
word_target: 5000
content_outline:
- section: 'Вступ: Архіви на стінах'
  words: 450
  points:
  - 'Софія Київська як кам''яна книга: понад 7000 написів за тисячоліття.'
  - 'Різниця між сучасним вандалізмом і середньовічним графіті: сакральний простір
    комунікації.'
  - 'Унікальність джерела: голос живої людини, а не офіційного літописця.'
- section: 'Текст: Голоси минулого'
  words: 650
  points:
  - 'Аналіз графіті про смерть Ярослава Мудрого (1054): текст, дата, значення.'
  - 'Графіті княгині Олісави: приклад жіночої грамотності та політичної ваги.'
  - 'Побутові написи: прокльони («Кузьма тать») та життєві драми.'
- section: Що таке епіграфіка?
  words: 400
  points:
  - Визначення епіграфіки як допоміжної історичної дисципліни.
  - 'Технологія письма: писала (стилоси), тиньк, види написів (графіті vs дипінті).'
  - 'Географія знахідок: стіни храмів як основні носії, але також пряслиця та посуд.'
- section: 'Мовний аналіз: Граматика киян'
  words: 850
  points:
  - Давальний відмінок на -ові/-еві (Петрові, Павлові) як маркер протоукраїнської
    мови.
  - 'Живий кличний відмінок: звертання до святих і людей (Пантелеймоне, Софіє).'
  - 'Дієслівні форми: перемога закінчення -в у минулому часі («ходив», «писав»).'
  - 'Фонетичні особливості: повноголосся (Володимир) та сліди переходу ѣ > і.'
- section: 'Історичний контекст: Суспільство, що пише'
  words: 550
  points:
  - 'Соціальний портрет автора графіті: від князя до простолюдина.'
  - 'Міф про неграмотність Середньовіччя: поширення писемності серед мирян.'
  - 'Жіноче письмо: автографи та молитви княгинь і простих жінок.'
- section: 'Диглосія: Церковна vs Народна'
  words: 600
  points:
  - 'Концепція диглосії: співіснування церковнослов''янської (високої) та руської
    (народної) мов.'
  - 'Графіті як простір інтерференції: як розмовна мова «ламає» книжні канони.'
  - 'Приклади гібридних форм: церковна лексика з народною фонетикою.'
- section: Зв'язок із сучасною мовою
  words: 600
  points:
  - 'Тяглість мовної традиції: 1000 років незмінних рис (відмінки, лексика).'
  - Спростування імперських теорій про пізнє формування української мови (XIV ст.).
  - Графіті як доказ автохтонності української мови на теренах Русі.
- section: 'Методологія: Детективи історії'
  words: 500
  points:
  - 'Історія досліджень: від відкриттів XIX ст. до школи С. Висоцького.'
  - 'Сучасні методи В. Корнієнка: перегляд старих читань, нові технології фотофіксації.'
  - 'Як читати невидиме: робота з бічним світлом та прорисами.'
- section: Підсумок
  words: 400
  points:
  - 'Стіни говорять: значення епіграфіки для реконструкції ментальності предків.'
  - 'Мова як ідентичність: графіті як неспростовний аргумент у мовних дискусіях.'
  - Запрошення до подальшого вивчення курсу OES.
