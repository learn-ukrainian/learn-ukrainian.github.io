slug: family-kinship
title: Family Kinship
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Родина як мікрокосм давньоруського суспільства: від ''дому'' до ''держави''.'
  - 'Огляд джерел: чому графіті та ''Руська Правда'' говорять більше, ніж офіційні
    літописи.'
  - 'Специфіка термінології: чому ''стрий'' та ''вуй'' — це не просто ''дядько''.'
- section: 'Основний матеріал: I — Батьки та діти: Лінгвістичний портрет'
  words: 700
  points:
  - 'Етимологія слів *otьcь (батько) та *mati (мати): індоєвропейське коріння.'
  - 'Фонетичні зміни: друга палаталізація в слові *otьcь (*otikъ -> otьcь).'
  - Слово *dъči* (дочка) та його первинна форма в OES.
- section: 'Основний матеріал: II — Граматичний фокус: Архаїчні r-основи'
  words: 800
  points:
  - Іменники *mati* та *dъči* як релікти давньої системи відмінювання (r-stems).
  - 'Парадигма відмінювання: *mati — matere — materi*.'
  - 'Історичний коментар: чому в сучасній мові ми кажемо ''матері'' (Р.в.), але ''мати''
    (Н.в.).'
  - Порівняння з іншими індоєвропейськими мовами (лат. *mater — matris*).
- section: 'Основний матеріал: III — Горизонтальні зв''язки: Брати у ''Руській Правді'''
  words: 800
  points:
  - 'Аналіз ст. 1 ''Руської Правди'': коло кровної помсти.'
  - Терміни *братъ*, *братучадо* (син брата), *братня* (дружина брата).
  - 'Соціальна роль брата: захисник і месник.'
- section: 'Основний матеріал: IV — Стрий і Вуй: Два світи спорідненості'
  words: 700
  points:
  - 'Чітке розмежування ліній: *стрий* (брат батька) та *вуй* (брат матері).'
  - 'Культурний контекст: *вуй* як опікун і наставник (приклад Добрині).'
  - Втрата цього розрізнення в російській мові (*дядя*) та збереження в українській.
- section: 'Основний матеріал: V — Небіж: Еволюція поняття'
  words: 600
  points:
  - 'Етимологія слова *небіж*: від *ne-bogъ* (бідний, нещасний) до ''племінник''.'
  - 'Соціальний підтекст: племінник як той, хто потребує опіки роду.'
  - Вживання слова в літературі та графіті.
- section: 'Основний матеріал: VI — Жіноча агентність: Графіті Олісави'
  words: 700
  points:
  - Аналіз графіті №108 зі стін Софії Київської.
  - 'Олісава — мати Святополка: самоідентифікація жінки в епіграфіці.'
  - Терміни *княгиня*, *мати*, *раба Божа* в одному написі.
  - Грамотність жінок княжого роду як норма, а не виняток.
- section: 'Основний матеріал: VII — Від Роду до Отчини'
  words: 500
  points:
  - 'Любецький з''їзд 1097 року: ''Кождо да держить отчину свою''.'
  - 'Зміна семантики: від колективної власності роду до сімейної спадщини.'
  - Термін *отчина* як юридичне закріплення прав нуклеарної сім'ї.
- section: 'Практика: Аналіз джерел'
  words: 200
  points:
  - Огляд лексики із графіті для вправ на транскрипцію.
  - Підготовка до аналізу уривків з 'Руської Правди'.
- section: Підсумок
  words: 300
  points:
  - 'Синтез: давньоруська родина як складна правова та сакральна структура.'
  - 'Тяглість традиції: як OES термінологія живе в сучасній українській мові.'
  - Анонс наступної теми.
