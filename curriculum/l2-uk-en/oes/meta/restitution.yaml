slug: restitution
title: Restitution
word_target: 5000
content_outline:
- section: 'Вступ: Правова свідомість Русі'
  words: 600
  points:
  - 'Від звичаю до закону: еволюція правової системи X-XI ст.'
  - 'Поняття «Правда» в давньоруській культурі: закон, справедливість, істина.'
  - 'Джерела права: звичаєве право, князівські устави, візантійський вплив.'
- section: 'Читання I: Від помсти до віри'
  words: 800
  points:
  - 'Аналіз тексту «Правди Ярослава» (1016): збереження кровної помсти.'
  - 'Реформа Ярославичів (1072): скасування помсти і запровадження віри.'
  - 'Інститут «дикої віри»: колективна відповідальність громади (верві).'
  - Соціальна диференціація розміру віри (80 гривень vs 40 гривень).
- section: 'Граматика: Дієслова зобов''язання'
  words: 800
  points:
  - 'Семантика обов''язку в давньоруській мові: *імати*, *мусити*, *подобати*.'
  - 'Дієслова фінансово-правової сфери: *платити*, *дати*, *вернути*.'
  - Синтаксичні конструкції умовних речень (*аще... то...*) у законодавчих текстах.
  - Еволюція лексеми *довгъ* та похідних (*долженъ*).
- section: 'Читання II: Система відшкодувань'
  words: 800
  points:
  - 'Розрізнення понять: віра (князю) та головництво (родині).'
  - 'Урок і продажа: компенсація за майнові злочини та тілесні ушкодження.'
  - 'Текст про крадіжку майна (коня, зброї, одягу): аналіз лексики.'
  - Відповідальність за псування майна (борть, межа).
- section: 'Історичний контекст: Статут Володимира Мономаха'
  words: 700
  points:
  - Соціальна криза 1113 року та повстання в Києві.
  - Регулювання відсотків (різ) та обмеження лихварства.
  - 'Правовий статус закупів: захист від перетворення на холопів.'
  - 'Банкрутство купця: нещасний випадок vs. розтрата.'
- section: 'Практика: Судовий писар'
  words: 600
  points:
  - Складання тексту судового рішення (умовної грамоти) давньоруською мовою.
  - 'Робота з палеографією: читання уривку з берестяної грамоти про борги.'
  - Вправа на відновлення втрачених фрагментів тексту.
- section: 'Підсумок: Гуманізм давньоруського права'
  words: 700
  points:
  - Руська Правда як пам'ятка гуманізму (відсутність смертної кари).
  - Порівняння з Салічною правдою (Lex Salica) та візантійською Еклогою.
  - Спадщина Руської Правди в Литовських Статутах.
  - 'Деколонізаційний аспект: київська традиція vs. московська автократія.'
