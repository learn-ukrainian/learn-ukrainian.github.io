slug: body-injury-dual
title: Body Injury Dual
word_target: 5000
content_outline:
- section: 'Вступ: Світ парності'
  words: 300
  points:
  - Визначення двоїни (dualis) як унікальної категорії давньоруського мислення
  - 'Відмінність від однини та множини: сакральність пари'
  - Природні пари (частини тіла) як ядро категорії
- section: 'Основний матеріал: І — Граматика двоїни'
  words: 600
  points:
  - 'Система відмінків у двоїні: три форми замість семи'
  - 'Називний-Знахідний-Кличний: універсальні закінчення -а, -и/-ы, -ѣ'
  - 'Родовий-Місцевий: специфічне закінчення -ю'
  - 'Давальний-Орудний: закінчення -ма, що живе донині'
- section: 'Основний матеріал: ІІ — Тілесна карта: Очи (Очі)'
  words: 600
  points:
  - 'Морфологія слова ''око'' в двоїні: очи (Н.в.), очию (Р.в.), очима (О.в.)'
  - 'Контекстний аналіз: ''зріти очима'' в літописах'
  - Відмінність від множини 'очеса'
- section: 'Основний матеріал: ІІІ — Тілесна карта: Уши (Вуха)'
  words: 600
  points:
  - 'Морфологія слова ''ухо'': уши, ушю/ушию, ушима'
  - 'Проблема палаталізації: чому ''уши'', а не ''усі'' (аналогія з мухи/мусі)'
  - Конкуренція з формою множини 'ушеса'
- section: 'Основний матеріал: IV — Тілесна карта: Руцѣ (Руки)'
  words: 600
  points:
  - 'Друга палаталізація в дії: рука -> руцѣ'
  - Відмінювання іменників на -а в двоїні
  - 'Символізм рук у давньоруській культурі: ''взяти в руцѣ'' як знак влади'
- section: 'Основний матеріал: V — Тілесна карта: Нозѣ (Ноги)'
  words: 600
  points:
  - 'Друга палаталізація: нога -> нозѣ'
  - Відмінність від множини 'ногы'
  - Паралелізм з 'руцѣ' у фольклорних формулах
- section: 'Основний матеріал: VI — Руська Правда: Ціна каліцтва'
  words: 800
  points:
  - 'Юридичний статус тіла: поняття ''ушкодження'' в Руській Правді'
  - Аналіз статей про усічення руки/ноги та пошкодження ока
  - 'Економічний еквівалент тілесності: вира 40 гривень'
  - 'Соціальний вимір травми: втрата працездатності та честі'
- section: 'Практика: Відлуння двоїни'
  words: 600
  points:
  - 'Аналіз сучасних рефлексів: чому ми кажемо ''дві руки'', але ''п''ять рук'''
  - Іменники 'очі', 'вуха', 'плечі' як історична двоїна (vs множина 'очеса')
  - Діалектні форми 'дві руці', 'дві нозі' в говірках
- section: 'Підсумок: Жива спадщина'
  words: 300
  points:
  - 'Еволюція двоїни: від граматичної категорії до лексичних реліктів'
  - Двоїна як маркер української мовної ідентичності
  - Зв'язок поколінь через граматику
