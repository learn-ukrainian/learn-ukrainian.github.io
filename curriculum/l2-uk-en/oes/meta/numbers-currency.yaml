slug: numbers-currency
title: Numbers Currency
word_target: 5000
content_outline:
- section: Вступ
  words: 300
  points:
  - 'Світ без банкнот: довіра, срібло та хутро в економіці Русі'
  - Торгові шляхи як кровоносна система держави
  - 'Огляд основних грошових одиниць: гривня, куна, ногата'
- section: 'Основний матеріал: I — Берестяна грамота: Звенигород №1'
  words: 600
  points:
  - 'Сенсація 1988 року: знахідка Ігоря Свєшнікова у Звенигороді (Львівщина)'
  - 'Палеографія документа: матеріал, спосіб нанесення літер, датування (1110–1137)'
  - 'Текст грамоти: версії прочитання (Залізняк vs Свєшніков) та згадка про фінансові
    справи'
  - 'Значення: руйнування міфу про берестяні грамоти як виключно ''новгородський''
    феномен'
- section: 'Основний матеріал: II — Грошова система Русі: Від хутра до срібла'
  words: 800
  points:
  - 'Етимологія грошей: ''куна'' (куниця), ''векша'' (білка) — сліди хутрового стандарту'
  - 'Ногата та різана: інтеграція арабського срібла (дирхемів) у руський ринок'
  - 'Гривня: еволюція від шийної прикраси до вагової одиниці та платіжного злитка'
  - 'Типологія гривень: київська (шестикутна), новгородська (брусок), чернігівська'
  - 'Співвідношення валют у XI ст.: 1 гривня = 20 ногат = 25 кун = 50 різан'
- section: 'Основний матеріал: III — Економіка «Руської Правди»'
  words: 800
  points:
  - '«Руська Правда» як фінансовий документ: кодифікація штрафів та відшкодувань'
  - 'Віра (штраф за вбивство): соціальна ціна життя (80 гривень за огнищанина vs 5
    за смерда)'
  - 'Побутова економіка: вартість коня, корови, полотна та зброї в перерахунку на
    гривні'
  - 'Кредитні відносини: ''різ'' (відсотки) та правила позичання грошей за Володимира
    Мономаха'
- section: 'Основний матеріал: IV — Кирилична цифір: Числа як літери'
  words: 600
  points:
  - 'Принцип буквеної цифірі: використання літер з титлом для позначення чисел'
  - 'Система відповідностей: Аз = 1, Веді = 2, Глаголь = 3 (відмінності від абеткового
    порядку)'
  - 'Запис великих чисел: тисячі (знак ҂), ''тьма'' (10,000), ''легіон'', ''леодр'''
  - 'Палеографічний практикум: читання дат та сум у літописах та графіті'
- section: 'Основний матеріал: V — Граматика: Двоїна та магія числівників'
  words: 900
  points:
  - 'Категорія двоїни (Dualis): граматична форма для пари (очі, руки, два брата)'
  - Відмінювання числівників 'два', 'оба' в давньоруській мові (чол./сер. vs жін.
    рід)
  - 'Форми двоїни іменників: ''дъва стола'' (а не столи), ''дві гривні'' (а не гривень)'
  - 'Еволюційний зв''язок: як давньоруська двоїна сформувала сучасні українські конструкції
    (2, 3, 4 + Н.в.)'
  - 'Відмінювання вищих числівників: ''пять'', ''десять'' як іменники'
- section: Практика
  words: 500
  points:
  - 'Аналіз автентичних текстів: пошук числівників та грошових одиниць у «Руській
    Правді»'
  - 'Задачі на конвертацію: перерахунок штрафів з гривень у ногати та куни'
  - 'Палеографічна вправа: запис сучасних дат та сум кириличною цифір''ю'
- section: Підсумок
  words: 500
  points:
  - 'Синтез: високий рівень комерційної та математичної культури Русі'
  - 'Тяглість традиції: гривня як символ української державності від Володимира до
    сьогодення'
  - 'Мовний спадок: чому ми лічимо так, як лічимо (сліди двоїни в нашій мові)'
