slug: guardianship
title: Guardianship
word_target: 5000
content_outline:
- section: 'Вступ: Соціальний захист у Київській Русі'
  words: 600
  points:
  - Визначення опіки (печалування) як правового та морального інституту.
  - 'Джерела права: Руська Правда та Церковні статути Володимира і Ярослава.'
  - Гуманістичний вплив християнства на звичаєве право.
- section: 'Правовий статус вдови: Господиня і мати'
  words: 900
  points:
  - 'Аналіз статті 93 Руської Правди: право вдови на майно чоловіка.'
  - 'Термін «госпожа»: жінка як повноправний розпорядник родинного майна.'
  - 'Вдова-мати vs. бездітна вдова: різниця у правах.'
  - Захист вдови від свавілля дорослих дітей.
- section: Права сиріт та спадщина (Задниця)
  words: 1000
  points:
  - Лінгвістичний аналіз терміну «задница» (спадщина).
  - 'Порядок спадкування: перевага синів, забезпечення дочок (посаг).'
  - 'Стаття 94: недоторканність материнської спадщини для дітей від першого шлюбу.'
  - Доля «ізгоїв» (князів-сиріт) та сиріт із простолюду.
- section: 'Інститут опікунства: Механізми та відповідальність'
  words: 900
  points:
  - 'Хто ставав опікуном: роль вітчима та родичів (стриїв).'
  - 'Економіка опіки: право опікуна на прибуток vs. обов''язок збереження капіталу.'
  - Відповідальність за розтрату майна сироти.
  - 'Конфлікт інтересів: вітчим проти дітей від першого шлюбу.'
- section: Церква як гарант соціальної справедливості
  words: 800
  points:
  - 'Статут князя Володимира: «десятина» як податок на соціальне забезпечення.'
  - 'Юрисдикція церкви: чому вдови та сироти стали «церковними людьми».'
  - Монастирі та богадільні як перші інститути соціальної опіки.
  - 'Моральний авторитет: Повчання Володимира Мономаха.'
- section: 'Підсумок: Давньоруська традиція vs. Московське закріпачення'
  words: 800
  points:
  - Порівняння статусу жінки та сироти в Русі та пізній Московії (Терем, Домострой).
  - 'Європейський контекст: Руське право як частина європейської правової сім''ї.'
  - 'Еволюція термінології: від «печалування» до сучасної «опіки».'
