slug: smerd-peasants
title: Smerd Peasants
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Визначення смердів як основної демографічної бази Київської Русі (80-90% населення).
  - 'Місце смердів у соціальній ієрархії: між вільними общинниками («людьми») та невільниками
    («холопами»).'
  - 'Актуальність теми: розуміння генези українського селянства та спростування міфів
    про «вічне рабство».'
- section: 'Основний матеріал: I — Етимологія та соціальна семантика'
  words: 800
  points:
  - 'Лінгвістичний аналіз: праслов''янське *smьrdъ та його зв''язок з дієсловом *smьrděti.'
  - 'Соціальна психологія еліти: чому аристократія асоціювала працю на землі з неприємним
    запахом.'
  - 'Порівняльна лінгвістика: когнати в балтійських та інших індоєвропейських мовах.'
  - 'Еволюція семантики: від нейтрального позначення «людина/чоловік» (гіпотеза) до
    пейоративного «мужик/хам».'
- section: 'Основний матеріал: II — Правовий статус у «Руській Правді»'
  words: 1000
  points:
  - 'Аналіз статей «Руської Правди»: «Правда Ярослава» vs «Правда Ярославичів».'
  - 'Дилема віри (штрафу за вбивство): дискусія навколо 40 гривень (як за вільного)
    та 5 гривень (як за холопа).'
  - 'Князівська юрисдикція: заборона катувати смерда «без княжа слова» як доказ його
    підсудності державі, а не пану.'
  - '«Продажа» та «вирок»: участь смердів у судових процесах як відповідачів, сплата
    штрафів.'
- section: 'Основний матеріал: III — Майнові права та інститут спадщини'
  words: 800
  points:
  - Поняття «задниці» (спадщини) в давньоруському праві.
  - 'Обмеження успадкування: перехід майна князю за відсутності синів (escheat).'
  - 'Соціальний захист жінок: частка для незаміжніх дочок та вдів.'
  - 'Власність смерда: земля (спірна чи власна?), худоба (кінь як маркер статусу),
    знаряддя праці.'
- section: 'Основний матеріал: IV — Смерди vs Холопи: межі свободи'
  words: 800
  points:
  - 'Фундаментальна відмінність: смерд як суб''єкт права vs холоп як об''єкт права.'
  - 'Військова повинність: участь смердів у княжому ополченні (піхота, обоз), на відміну
    від неозброєних холопів.'
  - 'Шляхи поневолення: як смерд міг стати закупом (через борг) або холопом (через
    злочин чи самопродаж).'
  - 'Історіографічна дискусія: радянська концепція «феодальної залежності» проти сучасної
    концепції «державного підданства».'
- section: 'Основний матеріал: V — Господарство та повсякденне життя'
  words: 800
  points:
  - 'Археологія давньоруського села: типи житла (зрубні хати, напівземлянки).'
  - 'Аграрний цикл: системи землеробства (переліг, двопілля), основні культури (жито,
    пшениця, просо).'
  - 'Матеріальна культура: одяг, кераміка, ремесла в межах домогосподарства.'
  - 'Взаємини з містом: торгівля продуктами, участь у вічах (епізодично).'
- section: 'Основний матеріал: VI — Еволюція статусу та історична доля'
  words: 600
  points:
  - 'Трансформація терміну в XII–XIII ст.: витіснення назвою «люди» в центральних
    землях.'
  - 'Регіональні особливості: тривале побутування терміну «смерд» у Галицько-Волинській
    державі.'
  - Вплив монгольської навали на уніфікацію селянського стану.
  - 'Лінгвістичний слід: слово «смерд» у пам''ятках пізнього середньовіччя та у фольклорі.'
- section: Практика
  words: 300
  points:
  - Аналіз уривків з «Руської Правди» (читання та переклад).
  - Порівняльна таблиця прав смерда, закупа та холопа.
  - 'Лінгвістична задача: реконструкція праслов''янських форм.'
- section: Підсумок
  words: 300
  points:
  - Смерди як фундамент економіки та демографії Русі.
  - 'Складність та неоднозначність їхнього статусу: поєднання свободи та залежності.'
  - Значення «Руської Правди» як джерела пізнання соціальної історії.
  - Зв'язок давньоруського смерда з пізнішим українським селянством.
