slug: princely-administration
title: Princely Administration
word_target: 5000
content_outline:
- section: 'Вступ: Архітектори держави'
  words: 400
  points:
  - 'Еволюція влади: від племінних вождів до призначених намісників.'
  - 'Проблема масштабу: як керувати імперією без сучасних комунікацій.'
  - 'Двір та Земля: дві гілки влади (княжа адміністрація vs міське самоврядування).'
- section: 'Вищі урядовці: Посадник'
  words: 800
  points:
  - 'Етимологія: той, кого «посадив» князь.'
  - 'Функції: намісництво, судочинство, збір данини (полюддя).'
  - 'Еволюція: від сина князя до боярина-адміністратора.'
  - 'Роль у регіональній політиці: баланс між центром (Києвом) і місцевою елітою.'
- section: 'Голос громади: Тисяцький'
  words: 800
  points:
  - 'Військова функція: командир «тисячі» (міського ополчення).'
  - 'Адміністративна функція: представництво інтересів «землі» (міста) перед князем.'
  - 'Соціальна природа: часто виборна посада (особливо в Новгороді та пізньому Києві).'
  - 'Історичний приклад: Ян Вишата — тисяцький-дипломат і воєвода.'
- section: 'Господарська вертикаль: Тіуни'
  words: 1000
  points:
  - 'Соціальний парадокс: невільний статус (холоп) при найвищих повноваженнях.'
  - 'Ієрархія: тіун огнищний (керівник двору), конюший, ратайний.'
  - 'Правовий захист: аналіз ст. 19-22 «Руської Правди» (подвійна віра 80 гривень).'
  - Тіун як прообраз професійного бюрократа.
- section: 'Виконавча влада: Вірники та Мечники'
  words: 800
  points:
  - 'Вірник: збирач судових штрафів (віри). Небезпечна професія.'
  - '«Покон вірний»: регламентація утримання чиновника (антикорупційні норми XI ст.).'
  - 'Мечник і Дітський: судові виконавці та силовики.'
  - 'Система «кормління»: пряме утримання адміністрації населенням.'
- section: 'Читання: Адміністративна лексика Правди'
  words: 800
  points:
  - 'Робота з першоджерелом: аналіз тексту «Правди Ярославичів».'
  - 'Палеографія термінів: тивунъ, огнищанинъ, вира, урокъ.'
  - 'Еволюція значень: як слово «тіун» зникло, а функції перейшли до інших урядників.'
- section: 'Підсумок: Правова держава Русь'
  words: 400
  points:
  - 'Відмінність руської адміністрації від східних деспотій: влада закону.'
  - 'Спадщина: адміністративні традиції Русі в Литовсько-Руській державі.'
  - 'Деколонізаційний висновок: Русь як європейська правова система.'
