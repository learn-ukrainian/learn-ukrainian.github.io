slug: pvl-oleg-campaign
title: Pvl Oleg Campaign
word_target: 5000
content_outline:
- section: 'Вступ: Олег і Київ на зламі IX–X століть'
  words: 400
  points:
  - 'Постать Олега (Helgi): від регента до будівничого держави.'
  - 'Київ як ''мати градам руським'': геополітичний центр.'
  - 'Причини походу 907 року: контроль над торговельними шляхами.'
- section: 'Текст ПВЛ: ''Пішов Олег на греків'' (Аналіз уривка)'
  words: 800
  points:
  - 'Оригінал тексту: палеографічний огляд та читання.'
  - 'Каталог племен: етнічна мапа майбутньої України (поляни, деревляни, тиверці та
    ін.).'
  - 'Термін ''Велика Скуфь'': візантійська рецепція русів.'
  - Співвідношення варязького та слов'янського елементів у війську.
- section: 'Військова стратегія: Кораблі на колесах'
  words: 700
  points:
  - 'Опис події в літописі: текст і переклад.'
  - 'Технологічна гіпотеза: волок та інженерні рішення вікінгів.'
  - 'Психологічна війна: ефект несподіванки для греків.'
  - Фольклорні паралелі та літературна гіпербола.
- section: 'Символізм перемоги: Щит на вратах Царгорода'
  words: 500
  points:
  - Текстовий аналіз епізоду зі щитом.
  - 'Сакральний зміст дії: взяття міста під захист чи знак підкорення?'
  - 'Топографія Константинополя: де саме міг висіти щит?'
  - Відображення сюжету в пізнішій літературі та мистецтві.
- section: 'Дипломатія меча: Угода 907 року'
  words: 800
  points:
  - 'Умови миру: сплата данини ''на ключі'' (на весла/кораблі).'
  - 'Привілеї руських купців: безмитна торгівля та утримання в Царгороді.'
  - 'Імена послів (Карли, Фарлоф, Веремуд): скандинавська еліта.'
  - 'Клятва ''по руському закону'': Перун і Волос як гаранти права.'
- section: 'Лінгвістичний коментар: Військова та правнича лексика'
  words: 1000
  points:
  - 'Аналіз термінів: *рота* (клятва), *уклад*, *закон руський*.'
  - 'Еволюція слів: *вої* -> воїни, *дружина* (військо -> сім''я).'
  - Давньоруські форми в тексті vs церковнослов'янізми.
  - 'Порівняння з сучасною українською мовою: що збереглося?'
- section: 'Деколонізаційний погляд: Спадщина Олега'
  words: 400
  points:
  - Олег у російському імперському міфі vs Олег в історії України.
  - 'Тяглість державотворчої традиції: Київ як єдиний центр Русі X ст.'
  - Спростування міфів про 'спільну історію' без української суб'єктності.
- section: 'Підсумок: Значення походу для Русі'
  words: 400
  points:
  - Вихід Русі на міжнародну арену як рівноправного гравця.
  - Початок регулярних дипломатичних відносин з Візантією.
  - 'Культурний обмін: перші кроки до християнізації.'
