slug: verbs-perfect
title: Verbs Perfect
word_target: 5000
content_outline:
  - section: 'Вступ: Архітектор минулого'
    words: 400
    points:
      - 'Визначення Перфекта: стан у теперішньому як результат минулої дії'
      - Аналогія з англійським Present Perfect (I have done)
      - Місце перфекта в системі чотирьох минулих часів (аорист, імперфект, перфект,
        плюсквамперфект)
  - section: 'Основний матеріал: I — Анатомія конструкції'
    words: 900
    points:
      - 'Формула: l-дієприкметник + допоміжне дієслово *byti* у теперішньому часі'
      - Парадигма дієвідмінювання допоміжного дієслова (*єсмь, єси, єсть...*)
      - Узгодження l-дієприкметника за родом і числом (унікальна риса)
      - Таблиця відмінювання типового дієслова (*писати* або *дати*)
  - section: 'Основний матеріал: II — Еволюційна війна часів'
    words: 800
    points:
      - 'Функціональна конкуренція: Аорист (факт) vs Перфект (результат)'
      - Чому Перфект переміг? Зручність для живого діалогу
      - Зв'язок з категорією виду (доконаний/недоконаний)
      - 'Приклади з ''Повісті временних літ'': пряма мова персонажів'
  - section: 'Джерелознавчий аналіз: Тмутороканський камінь'
    words: 600
    points:
      - Історичний контекст знахідки 1068 року
      - 'Лінгвістичний вирок: ''Глѣбъ князь мѣрилъ'' (без *єсть*)'
      - Доказ раннього випадіння зв'язки у 3-й особі
      - Значення пам'ятки для датування мовних процесів
  - section: 'Жива мова: Свідчення софійських графіті'
    words: 600
    points:
      - Графіті як 'мовний Facebook' середньовіччя
      - Аналіз графіті № 44 ('Козьма писав') та № 25
      - Рання вокалізація l > в (українська фонетична риса)
      - Контраст з книжною нормою того часу
  - section: 'Лінгвістична драма: Втрата зв''язки'
    words: 800
    points:
      - Хронологія елізії (випадіння) допоміжного дієслова
      - 'Етап I: Втрата у 3-й особі (найшвидше)'
      - 'Етап II: Втрата у 1-й та 2-й особах (XII-XIII ст.)'
      - 'Наслідок: Перетворення дієприкметника на дієслово'
      - Виникнення безособових форм (було зроблено)
  - section: 'Діалектний вимір: Карпатський ковчег'
    words: 500
    points:
      - Гуцульські та лемківські говірки як охоронці архаїки
      - 'Сучасні форми: *ходив-єм*, *робили-сьмо*'
      - Порівняння з західнослов'янськими мовами (польська, чеська)
      - Доказ органічного розвитку української мови з праслов'янської
  - section: 'Підсумок: Від ''Я єсмь зробив'' до ''Я зробив'''
    words: 400
    points:
      - Уніфікація системи минулого часу в XIV ст.
      - Переваги нової системи (родова диференціація)
      - Що ми втратили (нюанси результативності) і що здобули (простоту)
      - Перфект як фундамент сучасної української граматики
