slug: slovo-mustering
title: Slovo Mustering
word_target: 5000
content_outline:
- section: Вступ
  words: 600
  points:
  - 'Історичний контекст 1185 року: амбіції Ольговичів та половецька загроза'
  - 'Мета походу Ігоря: ''Іспить шоломом Дону'' — пошук слави та відновлення контролю
    над Тмутараканню'
  - 'Жанрова специфіка: ''Слово'' як військова повість та пісня (зв''язок з Бояном)'
- section: 'Основний матеріал: I — Затемнення сонця і виклик долі'
  words: 1000
  points:
  - 'Символізм затемнення 1 травня 1185 року: ''Сонце йому тьмою путь заступало'''
  - 'Реакція Ігоря: вибір між безпекою та честю (''Луце жъ бы потяту быти...'')'
  - 'Аналіз тексту: використання закликів та бажального способу (імператив, частка
    ''да'')'
  - Порівняння з літописним описом цієї ж події (Київський літопис)
- section: 'Основний матеріал: II — Діалог братів: Ігор і Всеволод'
  words: 900
  points:
  - 'Образ Всеволода ''Буй-Тура'': уособлення військової могутності та братерської
    вірності'
  - Промова Всеволода ('Один брат, один світ світлий — ти, Ігорю!')
  - Лексичний розбір звертань та епітетів у діалозі
  - Поняття 'дружина' як військового братства, а не просто загону
- section: 'Основний матеріал: III — Опис війська: ''Куряни — свідомі кметі'''
  words: 900
  points:
  - 'Характеристика ''курян'': елітні професійні воїни (кметі)'
  - 'Поетика опису бойової готовності: ''під трубами сповиті, під шоломами злеліяні'''
  - Метафора 'кінцем списа згодовані' — життя заради війни
  - Порівняння з вовками ('самі скачуть, як ті сірі вовки в полі')
- section: 'Основний матеріал: IV — Військовий побут і спорядження'
  words: 800
  points:
  - 'Військова лексика ''Слова'': стяги, хоругви, бунчук (чолка)'
  - 'Озброєння: латинські шоломи, черлені щити, гартовані стріли'
  - 'Загадка ''шереширів'': гіпотези (грецький вогонь vs. вид снарядів)'
  - Термін 'сідлати коні' як синонім початку військової кампанії
- section: Практика
  words: 500
  points:
  - Читання та транскрипція уривку про затемнення (палеографічний практикум)
  - Етимологічний аналіз військових термінів (шолом, стяг, кметь)
  - Реконструкція діалогу Ігоря та Всеволода сучасною українською мовою
- section: Підсумок
  words: 300
  points:
  - 'Фаталізм та героїзм у ''Зборі війська'': перемога духу над пересторогою'
  - Зв'язок вступу з подальшою трагедією на Каялі
  - Значення збереження автентичної військової лексики для історії української мови
