slug: women-in-law
title: Women In Law
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Міфи про 'темні віки' та реальний статус жінки в Русі
  - Порівняння з західноєвропейськими правовими нормами
  - Відсутність абсолютної влади батька (paterfamilias) у звичаєвому праві
- section: 'Основний матеріал: I — Руська Правда та майнова незалежність'
  words: 1000
  points:
  - Аналіз статей Руської Правди щодо жінок
  - 'Інститут ''віна'' та ''приданого'': економічна подушка безпеки'
  - 'Права вдови: управління майном та опіка над дітьми'
  - Спадкове право дочок (стаття про 'задницю')
  - 'Штрафи за злочини проти жінок: захист життя та честі'
- section: 'Основний матеріал: II — Церковне право та сфера моралі'
  words: 1000
  points:
  - 'Церковний устав Ярослава: втручання церкви у сімейне життя'
  - 'Регулювання шлюбу: боротьба з многоженством та викраденням (''умиканням'')'
  - 'Подвійні стандарти: покарання за перелюб та розлучення'
  - Захист від домашнього насильства та образ ('сором')
  - Роль церкви у зміні статусу жінки (від рівноправності до підкорення)
- section: 'Основний матеріал: III — Голоси жінок: Княгині та міщанки'
  words: 1000
  points:
  - 'Княгиня Ольга: реформи, дипломатія та державна мудрість'
  - 'Анна Ярославна: освіченість та ''київський підпис'' у Парижі'
  - Янка Всеволодівна та жіноча освіта (школа при монастирі)
  - 'Берестяні грамоти (Звенигород): вдова Говенова та ділова активність'
  - 'Соціальна стратифікація: від боярині до челяді'
- section: Практика
  words: 1000
  points:
  - Палеографічний аналіз уривків з Руської Правди (давньоруська мова)
  - Аналіз підпису Анни Ярославни (кирилиця vs латина)
  - 'Кейс-стаді: вирішення майнового спору вдови за законами Русі'
  - 'Порівняльний аналіз: права жінки в Києві та Парижі XI ст.'
- section: Підсумок
  words: 600
  points:
  - Еволюція правового статусу жінки від Русі до ВКЛ
  - Руська традиція vs Московський домострой
  - Вплив християнства на гендерні ролі
  - Значення жіночої грамотності та агентності для української історії
