slug: oes-capstone
title: Oes Capstone
word_target: 5000
content_outline:
- section: 'Вступ: Епілог епохи'
  words: 400
  points:
  - 'Історичний контекст XIII століття: Монгольська навала і крах Київської держави'
  - 'Психологічний шок еліти: втрата ''світла'' і ''краси'''
  - Місце 'Слова' як фінального акорду княжої літератури
- section: 'Текстологія: Відкриття та загадки'
  words: 400
  points:
  - 'Історія відкриття: Хрисанф Лопарев (1892) та К. Євлентьєв'
  - 'Рукописна традиція: Псковський та Ризький списки'
  - 'Проблема контексту: зв''язок із ''Житієм Олександра Невського'' як пізніша компіляція'
- section: 'Читання: «О, світло світлая...»'
  words: 600
  points:
  - 'Аналіз вступу: гімн красі рідної землі'
  - 'Природний каталог: ріки, озера, діброви як сакральний простір'
  - 'Емоційна тональність: контраст між минулою величчю і нинішньою руїною'
- section: 'Читання: «Одсіля до угрів...»'
  words: 500
  points:
  - 'Історична географія: ментальна мапа автора'
  - 'Аналіз кордонів: Угорщина, Чехія, Польща, Литва'
  - 'Політичний горизонт: Русь як центр європейського сходу'
- section: 'Читання: «То все покорено було...»'
  words: 500
  points:
  - Ідеал політичної могутності та суверенітету
  - Образ Володимира Мономаха як золотого віку
  - 'Міжнародний престиж: відносини з Візантією та німцями'
- section: 'Поетика: Відлуння «Слова о полку»'
  words: 600
  points:
  - Стилістичні паралелі з 'Словом о полку Ігоревім'
  - Ритмічна проза та риторичні фігури
  - 'Літературна школа: доказ існування розвиненої дружинної поезії'
- section: 'Ідеологія: Християнська держава'
  words: 500
  points:
  - Концепція 'хрестияцького язика' як ідентичності
  - Протиставлення 'поганьским странам'
  - Релігійний вимір трагедії 1240 року
- section: 'Деколонізація: Південне коріння'
  words: 600
  points:
  - Спростування міфу про 'північне' походження пам'ятки
  - Південноруські (українські) реалії в тексті
  - Чому текст зберігся в Пскові, а не в Києві (культурна катастрофа)
- section: Лінгвістичний аналіз
  words: 500
  points:
  - 'Мовні особливості тексту: архаїзми та жива мова'
  - 'Фонетичні маркери: повноголосся, редуковані'
  - Лексичні паралелі з сучасною українською мовою
- section: 'Підсумок: Заповіт предків'
  words: 400
  points:
  - Значення 'Слова' для української самосвідомості
  - 'Літературна спадкоємність: від Мономаха до Шевченка'
  - 'Фінальний екзамен: синтез знань курсу OES'
