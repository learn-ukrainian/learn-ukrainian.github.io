slug: ihor-campaign-chronicle
title: Ihor Campaign Chronicle
word_target: 5000
content_outline:
- section: 'Вступ: Два погляди на одну подію'
  words: 600
  points:
  - Іпатіївський літопис як головне джерело відомостей про події 1185 року.
  - 'Жанрова відмінність: суха хроніка проти епічної поеми.'
  - 'Історичний контекст: феодальна роздробленість та відносини з Полем.'
- section: 'Хроніка походу: Від Дінця до Каяли'
  words: 1000
  points:
  - Дата виступу та склад коаліції (Ігор, Всеволод, Святослав, Володимир).
  - 'Сонячне затемнення 1 травня: опис у літописі та його символіка.'
  - 'Реакція Ігоря на знамення: аналіз прямої мови князя.'
  - 'Перша сутичка 10 травня: тактична перемога та захоплення здобичі.'
- section: 'Кульмінація: Битва та поразка'
  words: 1000
  points:
  - 'Стратегічна пастка: оточення руських військ головними силами Кончака і Гзака.'
  - 'Хід битви 11-12 травня: спроба прориву до води.'
  - 'Поранення та полон Ігоря: літописні деталі, відсутні у «Слові».'
  - Трагедія «каяття» князя на полі бою.
- section: 'Полон і втеча: Дипломатія степу'
  words: 900
  points:
  - 'Умови утримання князів: «почесний полон» у свата Кончака.'
  - Династичний шлюб Володимира Ігоровича та дочки Кончака.
  - 'Організація втечі: роль половчина Овлура (Лавра).'
  - 'Повернення Ігоря: маршрут та реакція руських міст.'
- section: 'Літературна рецепція: Літопис проти Поеми'
  words: 1000
  points:
  - Порівняння описів ключових сцен (затемнення, плач, втеча).
  - 'Ідеологічний вектор: засудження міжусобиць (Святослав Київський) проти виправдання
    Ігоря.'
  - 'Мовна палітра: церковнослов''янізми літопису проти живої образності «Слова».'
  - Значення події для української середньовічної літератури.
- section: 'Підсумок: Уроки історії'
  words: 500
  points:
  - Чому поразка стала національним міфом?
  - 'Складність степових відносин: більше ніж просто війна.'
  - Місце літописної повісті в каноні української літератури.
