slug: slovo-hapax-legomena
title: Slovo Hapax Legomena
word_target: 5000
content_outline:
- section: 'Вступ: Що таке Hapax Legomena?'
  words: 600
  points:
  - 'Визначення терміну: слова, що зустрічаються в корпусі текстів лише один раз.'
  - Чому 'Слово о полку Ігоревім' є рекордсменом за кількістю унікальної лексики.
  - 'Проблема ''темних місць'' (obscura loca): помилки переписувачів чи втрачені знання?'
  - Значення гапаксів для підтвердження автентичності твору (проти теорії підробки).
- section: 'Шерешири: Загадкова зброя Глібовичів'
  words: 900
  points:
  - 'Контекст згадки: ''живими шерешири'' у описі волинських князів.'
  - 'Етимологічна розвідка: перський слід (*tir-i-čärx*) та тюркські паралелі.'
  - 'Гіпотези значення: ''грецький вогонь'', запалювальні снаряди чи метафора відваги.'
  - Як 'шерешири' спростовують міф про ізольованість військової справи Русі.
  - Чому перекладачі XVIII ст. плутали їх зі штанами чи натовпом.
- section: 'Карна і Жля: Вісники скорботи'
  words: 900
  points:
  - 'Міфологічний дуалізм: сестри-плакальниці на полі битви.'
  - 'Лінгвістичний аналіз: ''Карна'' (карити, карати, корити) та ''Жля'' (жаль, жальник).'
  - 'Образ ''смагу мичучи в пламяні розі'': зв''язок з язичницьким поховальним обрядом
    (кремацією).'
  - Карна і Жля як доказ збереження дохристиянського світогляду в літературі XII ст.
  - Порівняння з валькіріями (які забирають воїнів) та українськими народними голосіннями.
- section: Тєлєги, Стрільці та текстологічні лабіринти
  words: 800
  points:
  - 'Проблема уривку: ''крычатъ тѣлѣгы полунощы, рци, лебеди розпущени''.'
  - 'Гіпотеза 1: Реалістична (скрип половецьких возів як метафора тривоги).'
  - 'Гіпотеза 2: Текстологічна (реконструкція ''кричать стрільці'' або латинське *teliger*).'
  - Чому 'лебеді розпужені' краще пасують до стрільців, ніж до возів.
  - 'Небезпека гіперкорекції: коли дослідники ''виправляють'' те, що може бути авторською
    метафорою.'
- section: 'Харалуг: Меч як свідок євроінтеграції'
  words: 800
  points:
  - 'Епітет ''харалужні мечі'': символ найвищої якості та міцності.'
  - 'Західна етимологія: зв''язок з ім''ям Карла Великого та франкськими (каролінзькими)
    мечами (*Karl -> *karlung -> харалуг).'
  - 'Східна версія: тюркське ''кара-лук'' (чорна криця/сталь).'
  - 'Матеріальна культура Русі: імпорт високотехнологічної зброї з Європи та Сходу.'
  - Харалуг у сучасному поетичному словнику української мови.
- section: Деколонізація 'темних місць'
  words: 600
  points:
  - Як імперська наука використовувала незрозумілі слова для дискредитації 'Слова'.
  - 'Діалектна природа гапаксів: чому ''незрозуміле'' для московитів є рідним для
    українців.'
  - 'Приклади інших унікальних слів: ''смага'', ''яруга'', ''канина''.'
  - 'Виснвок: ''Слово'' написане живою мовою Руси-України, а не штучним церковнослов''янським
    суржиком.'
- section: 'Підсумок: Живий голос епохи'
  words: 400
  points:
  - Hapax legomena як ключі до реконструкції ментальності автора.
  - Військова, міфологічна та побутова лексика в одному флаконі.
  - 'Заклик до вивчення: кожне ''темне місце'' — це можливість нового відкриття.'
