slug: death-of-monomakh
title: Death Of Monomakh
word_target: 5000
content_outline:
- section: 'Вступ: 1125 рік — Кінець «Золотої Осені»'
  words: 400
  points:
  - Характеристика правління Володимира Мономаха (1113–1125) як епохи стабілізації.
  - 'Геополітичний стан Русі на момент 1125 року: приборкання половців, внутрішній
    мир.'
  - 'Постать князя: поєднання державного діяча, воїна та мислителя.'
- section: '«Повчання»: Структура та Зміст'
  words: 600
  points:
  - 'Унікальність жанру: поєднання проповіді, автобіографії та політичного заповіту.'
  - 'Символізм вступу: «Сидячи на санях» як метафора життєвого підсумку.'
  - 'Основні моральні імперативи: страх Божий, захист убогих, контроль над урядовцями.'
- section: '«Повчання»: Мовний Аналіз'
  words: 600
  points:
  - 'Стилістичні особливості: відхід від візантійської риторики до живої мови.'
  - 'Лексичний аналіз: народнорозмовні елементи та термінологія побуту.'
  - Порівняння церковнослов'янських та давньоруських форм у тексті.
- section: 'Автобіографія: «Шляхи і Лови»'
  words: 600
  points:
  - 'Кількісний вимір активності: 83 великі походи та незліченні малі.'
  - 'Опис мисливських небезпек: тури, ведмеді, вепри — князь у гущі подій.'
  - 'Ідеал правителя-труівника: відмова від ледарства та особистий контроль за всім.'
- section: 'Лист до Олега: Дипломатія і Етика'
  words: 500
  points:
  - 'Історичний контекст: міжусобиця з Олегом Святославичем та загибель Ізяслава.'
  - 'Християнський подвиг: прощення вбивці сина заради загального миру.'
  - 'Політичний прагматизм: закладення основ для співіснування династій.'
- section: Смерть на Альті та Поховання
  words: 400
  points:
  - Обставини смерті 19 травня 1125 року на річці Альта.
  - 'Символізм місця: сакральний зв''язок із культом Бориса і Гліба.'
  - 'Поховання у Софії Київській: династичний некрополь.'
- section: Міф про «Шапку Мономаха»
  words: 700
  points:
  - 'Історія регалії: золотоординське походження (XIV ст.) тюбетейки.'
  - Створення московського міфу (XV-XVI ст.) про візантійський дар.
  - 'Деколонізація: як Москва привласнювала київську спадщину через фальшиві артефакти.'
  - 'Наукове спростування: неможливість хронологічного перетину Мономаха і Костянтина
    IX.'
- section: 'Спадщина: Мстислав Великий'
  words: 600
  points:
  - Плавна передача влади Мстиславу (1125–1132).
  - 'Мстислав як «Великий»: утримання єдності земель та контроль над Полоцьком.'
  - Остання фаза централізації перед остаточним розпадом на уділи.
- section: 'Підсумок: Від Єдності до Удільності'
  words: 600
  points:
  - Смерть Мономаха як вододіл в історії Київської держави.
  - 'Невідворотність феодальної розробленості: економічні та династичні причини.'
  - Образ Мономаха в історичній пам'яті українців.
