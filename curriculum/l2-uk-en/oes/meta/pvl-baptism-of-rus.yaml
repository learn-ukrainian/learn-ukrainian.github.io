slug: pvl-baptism-of-rus
title: Pvl Baptism Of Rus
word_target: 5000
content_outline:
- section: 'Вступ: Епоха вибору'
  words: 400
  points:
  - 'Русь кінця X століття: криза язичницького світогляду.'
  - Релігійна реформа 980 року (Пантеон) та її невдача.
  - Геополітична необхідність монотеїзму для міжнародного визнання.
  - 'Постать князя Володимира: від язичника-завойовника до державного будівничого.'
- section: 'Читання: І — Випробування вір (986 рік)'
  words: 800
  points:
  - 'Літописний сюжет про прибуття місіонерів: іслам (волзькі булгари), латинство
    (німці), юдаїзм (хозари).'
  - 'Аргументація Володимира при відмові: «Русі єсть веселіє пити» та «батьки наші
    сього не прийняли».'
  - 'Промова Грека-Філософа: стислий виклад біблійної історії.'
  - Ікона Страшного суду як візуальний аргумент.
  - 'Текст: уривок діалогу з послами (оригінал + аналіз).'
- section: 'Читання: ІІ — «Корсунська легенда» (988 рік)'
  words: 800
  points:
  - 'Історична дискусія: де хрестився Володимир? (Київ, Васильків чи Корсунь).'
  - Похід на Корсунь (Херсонес) як засіб тиску на Візантію.
  - Сюжет про хворобу очей (сліпоту) Володимира та чудесне зцілення через хрещення.
  - Роль Анни Порфірогенети та шлюбна дипломатія.
  - 'Текст: опис взяття Корсуня та хрещення князя.'
- section: 'Граматика: Аорист як час великих звершень'
  words: 600
  points:
  - 'Аорист у ПВЛ: функція позначення динамічної, завершеної дії в минулому.'
  - 'Морфологія: сигматичний та асигматичний аорист (основи, суфікси -с-, -х-, -оша-).'
  - 'Ключові дієслова тексту: «повелє», «іде», «взя», «рече».'
  - Відмінність аориста від перфекта та імперфекта в давньоруській мові.
  - 'Еволюція: як аорист зник, залишивши слід у частці «би» та формі минулого часу
    на -л.'
- section: 'Читання: ІІІ — Хрещення Києва і повалення ідолів'
  words: 800
  points:
  - 'Повернення до Києва: безкомпромісність нової віри.'
  - 'Розправа над ідолами: десакралізація Перуна (биття палицями, скидання в Дніпро).'
  - 'Княжий ультиматум: «Аще не обрящеться хто заутра на ріці...».'
  - 'Масове хрещення у водах Почайни/Дніпра: опис ритуалу.'
  - Молитва Володимира за новоохрещений народ (паралель з біблійними царями).
- section: 'Лексика: Сакральна термінологія Русі'
  words: 600
  points:
  - 'Формування християнського вокабуляру: грецькі запозичення vs слов''янські відповідники.'
  - 'Грецизми: церква, ангел, єрей, диявол, ікона, олтар.'
  - 'Семантичні калька: православіє, благодать, істина, воскресіння.'
  - 'Терміни старої віри в новому контексті: кумир, ідол, требище.'
  - Аналіз слова «язик» (народ vs орган мовлення vs язичництво).
- section: 'Історичний контекст: Геополітика віри'
  words: 600
  points:
  - 'Civilizational Choice: чому Візантія? Культурна та політична гегемонія імперії.'
  - Концепція «translatio imperii» та входження Русі в сім'ю європейських монархій.
  - 'Культурний вибух: запровадження писемності, школи, кам''яне будівництво (Десятинна
    церква).'
  - 'Церковна ієрархія: Київська митрополія як частина Константинопольського патріархату.'
- section: 'Деколонізація: Чия це спадщина?'
  words: 400
  points:
  - 'Спростування міфу про «спільну колиску»: Київ як єдиний центр Русі в X ст.'
  - 'Привласнення історії Московією: пам''ятники Володимиру в Москві як історичний
    нонсенс.'
  - 'Тяглість державності: Русь — Україна, а не Русь — Росія.'
  - Важливість 988 року для української ідентичності та європейського вибору.
- section: 'Підсумок: Русь після 988 року'
  words: 400
  points:
  - 'Підсумок модуля: мовні та історичні уроки ПВЛ.'
  - Значення прийняття християнства для інтеграції в Європу.
  - 'Місток до наступних модулів: розвиток книжності при Ярославі Мудрому.'
