slug: daniel-the-exile
title: Daniel The Exile
word_target: 5000
content_outline:
- section: 'Вступ: I — Історична загадка'
  words: 600
  points:
  - 'Постать Данила Заточника: історична особа чи літературна маска?'
  - 'Гіпотези походження: Переяслав, Галич чи міфічне озеро Лача.'
  - 'Соціальний статус автора: дружинник, холоп чи вільний митець.'
- section: 'Вступ: II — Текстологія: Слово vs Моління'
  words: 500
  points:
  - 'Дві редакції пам''ятки: порівняльна характеристика.'
  - Проблема датування та збереження рукописів (списки XV-XVII ст.).
  - 'Мовна палітра: церковнослов''янська основа з живими руськими вкрапленнями.'
- section: 'Основний матеріал: I — Жанрова природа: Сміх крізь сльози'
  words: 700
  points:
  - 'Синтез жанрів: молитва, послання, сатира, афористична збірка.'
  - 'Скомороша естетика: гра, іронія та самоприниження як риторичний прийом.'
  - 'Стилістичні засоби: каламбури, притчі та «мирські приповідки».'
- section: 'Основний матеріал: II — Соціальний протест: Князь і слуга'
  words: 700
  points:
  - Ідеал князя-захисника («грози») та критика боярського свавілля.
  - 'Взаємини інтелектуала і влади: прохання про милість та гідність слуги.'
  - 'Політичний підтекст: зміцнення великокнязівської влади в умовах роздробленості.'
- section: 'Основний матеріал: III — Образ автора: Інтелектуал-вигнанець'
  words: 600
  points:
  - 'Автобіографічні мотиви: бідність, самотність, вигнання.'
  - 'Концепція «мисленного» служіння: перо гостріше за меч.'
  - 'Психологізм твору: відчай і надія «заточеної» людини.'
- section: 'Основний матеріал: IV — Мудрість проти сили'
  words: 600
  points:
  - 'Апологія розуму: «Краще один мудрий, ніж десять сильних».'
  - Біблійна мудрість (Книги Соломона) та народна філософія.
  - 'Тема «злих жон»: традиційна мізогінія чи сатиричний топос?'
- section: 'Практика: I — Читання та аналіз'
  words: 500
  points:
  - Коментоване читання уривків оригіналу (про багатство, про жінок).
  - Аналіз художніх образів та риторичних фігур.
  - Пошук інтертекстуальних зв'язків (Біблія, «Слово о полку Ігоревім»).
- section: 'Практика: II — Лінгвістичний коментар'
  words: 400
  points:
  - Виявлення давньоукраїнських фонетичних та морфологічних рис.
  - 'Етимологічні екскурси: походження слів «заточник», «тиун».'
  - Лексичні паралелі з сучасною українською мовою.
- section: 'Підсумок: Спадщина та відлуння'
  words: 400
  points:
  - Вплив «Моління» на українську літературу XV-XVIII ст.
  - Типологічна спорідненість з бароковою літературою (І. Вишенський, Г. Сковорода).
  - Місце пам'ятки в каноні української середньовічної культури.
