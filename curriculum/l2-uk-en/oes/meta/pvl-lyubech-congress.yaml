slug: pvl-lyubech-congress
title: Pvl Lyubech Congress
word_target: 5000
content_outline:
- section: 'Вступ: Криза Київської держави'
  words: 400
  points:
  - 'Ситуація на Русі в кінці XI ст.: наслідки Ярославового заповіту.'
  - Зростання князівських міжусобиць та половецька загроза.
  - Ініціатива Володимира Мономаха щодо скликання з'їзду.
- section: 'Читання: I — «Пощо губимо Руську землю?»'
  words: 600
  points:
  - Оригінальний текст промови князів (давньоруською).
  - 'Лексичний аналіз: «губимо», «звада», «розносять».'
  - Мотив спільної відповідальності за долю Русі.
- section: 'Граматика: I — Вираження спонукання (Hortative)'
  words: 500
  points:
  - Відсутність окремої морфологічної форми хортативу в ОЄС.
  - Конструкція «да» + дієслово теперішнього часу (3 особа).
  - 'Еволюція конструкції: від «да держить» до сучасного «хай/нехай держить».'
- section: 'Читання: II — «Кождо да держить отчину свою»'
  words: 700
  points:
  - Текст ухвали про розподіл земель (давньоруською).
  - Закріплення принципу «отчини» (спадкового володіння).
  - 'Географія розподілу: хто отримав Київ, Чернігів, Переяслав.'
- section: 'Історичний контекст: Від єдиновладдя до федерації'
  words: 500
  points:
  - 'Деколонізація погляду: не «розпад», а трансформація у федерацію.'
  - Правові наслідки Любецького з'їзду.
  - Русь як «spilne dobro» (res publica) князівського роду.
- section: 'Читання: III — Трагедія Василька Теребовлянського'
  words: 800
  points:
  - 'Змова Давида Ігоровича та Святополка: порушення клятви.'
  - Оригінальний текст сцени осліплення (натуралізм та деталізація).
  - Роль слуг та виконавців злочину в літописі.
- section: 'Граматика: II — Складні речення та пряма мова'
  words: 500
  points:
  - 'Синтаксис літописної оповіді: паратаксис (сурядність).'
  - 'Введення прямої мови: дієслова «рече», «глаголаша».'
  - Використання аориста та імперфекта в розповіді.
- section: 'Палеографія: Термін «Руська земля» в ПВЛ'
  words: 500
  points:
  - Семантика поняття «Руська земля» в контексті 1097 року.
  - Вузьке (етнічне) та широке (політичне) значення.
  - 'Сакральний вимір: земля як об''єкт захисту і клятви.'
- section: 'Підсумок: Уроки Любеча'
  words: 500
  points:
  - Моральна оцінка подій літописцем.
  - Значення Любецького з'їзду для подальшої історії України.
  - 'Паралелі з сучасністю: єдність перед зовнішньою загрозою.'
