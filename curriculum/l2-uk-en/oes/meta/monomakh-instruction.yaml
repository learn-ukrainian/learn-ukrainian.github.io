slug: monomakh-instruction
title: Monomakh Instruction
word_target: 5000
content_outline:
- section: 'Вступ: Історичний контекст і жанр'
  words: 600
  points:
  - 'Київська Русь початку XII століття: політична фрагментація та загроза зі Степу.'
  - 'Постать Володимира Мономаха: князь-інтелектуал, онук Ярослава Мудрого та візантійського
    імператора.'
  - 'Жанр повчання: візантійські витоки та київська специфіка.'
  - 'Історія тексту: Лаврентіївський літопис 1377 року як єдиний свідок.'
- section: 'Основний матеріал: I — Структура та джерела'
  words: 600
  points:
  - 'Тричастинна композиція: Дидактика, Автобіографія, Лист.'
  - 'Джерела цитувань: Псалтир, твори Василія Великого, богослужбові тексти.'
  - 'Світське та духовне: поєднання християнської етики з прагматизмом правителя.'
  - Символіка числа і структури у середньовічному тексті.
- section: 'Основний матеріал: II — Моральний кодекс князя'
  words: 900
  points:
  - 'Соціальна етика: захист «убогих», «вдовиць» та «смердів» від свавілля сильних.'
  - 'Судова реформа і гуманізм: заперечення смертної кари («не погубляйте ніякої душі
    християнської»).'
  - 'Етика праці: засудження лінощів як головного гріха правителя («ЛЂность бо всему
    мати»).'
  - 'Гостинність та дипломатія: повага до іноземців («гостя»).'
- section: 'Основний матеріал: III — Автобіографія і «Труди»'
  words: 900
  points:
  - '«А сього я походів 83 великих, а інших менших і не згадаю»: масштаби діяльності.'
  - 'Географія походів: від Стародуба до Дону, від Гхорди до Польщі.'
  - 'Сцени полювання (ловів): тури, вепри, ведмеді — князь як воїн і мисливець.'
  - 'Небезпеки і Божий захист: фаталізм та особиста мужність Мономаха.'
- section: 'Основний матеріал: IV — Лист до Олега Святославича'
  words: 600
  points:
  - 'Історичне тло: міжусобиця 1096 року і загибель сина Ізяслава.'
  - 'Дипломатія прощення: пропозиція миру вбивці сина заради «Руської землі».'
  - 'Політична мудрість: засудження братовбивства як шляху до загибелі держави.'
  - 'Хрест і меч: християнські аргументи в політичній риториці.'
- section: 'Лінгвістичний аналіз: Граматика імперативу'
  words: 800
  points:
  - 'Морфологія наказового способу в давньоруській мові: форми на -и, -іте (пиши,
    пишіть).'
  - 'Синтаксис повчання: прямі звертання, риторичні запитання, афористичність.'
  - 'Лексичний шар: термінологія влади та побуту (отрок, тіун, повоз, лов).'
  - 'Давньоруська vs Старослов''янська: живі східнослов''янські риси в тексті.'
- section: 'Практика: Палеографія та Етимологія'
  words: 400
  points:
  - Читання уривків з факсиміле Лаврентіївського літопису.
  - Розпізнавання титл (скорочень) та виносних літер.
  - 'Етимологічні ланцюжки: як слова Мономаха живуть у сучасній українській мові.'
  - Робота з концептами «честь», «слава», «гріх» у контексті епохи.
- section: 'Підсумок: Спадщина та Деколонізація'
  words: 600
  points:
  - 'Мономах у пастці імперських міфів: розвінчання легенди про «Шапку Мономаха».'
  - 'Київська традиція vs Московська ідеологія: договір проти деспотії.'
  - Вплив «Повчання» на українську барокову літературу та державницьку думку.
  - 'Чому цей текст актуальний для сучасної України: етика відповідального лідерства.'
