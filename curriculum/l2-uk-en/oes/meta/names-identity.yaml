slug: names-identity
title: Names Identity
word_target: 5000
content_outline:
- section: 'Вступ: Імена як дзеркало епохи'
  words: 300
  points:
  - Значення антропонімії для реконструкції історії та культури.
  - 'Огляд основних джерел: літописи, графіті Софії Київської, берестяні грамоти.'
- section: 'Світ імен: Язичницька традиція та християнські нововведення'
  words: 1000
  points:
  - 'Структура слов''янських імен: двоосновні (Святослав, Володимир) та імена-обереги.'
  - 'Адаптація християнських імен після 988 року: фонетичні зміни (Георгій -> Юрій).'
  - 'Феномен двовір''я в іменах: співіснування публічного (княжого) та приватного
    (хрестильного) імені.'
- section: 'Імена еліти: Княжа антропонімія Рюриковичів'
  words: 1000
  points:
  - 'Еволюція династичних імен: від скандинавських (Олег, Ігор) до слов''янських.'
  - 'Правила нарікання: заборона називати на честь живих батьків, культ предків.'
  - 'Жіночі імена княжого роду: Предслава, Верхуслава, Євпраксія.'
- section: 'Ідентифікація простолюду: Прізвиська та по батькові'
  words: 900
  points:
  - 'Соціальна диференціація: імена смердів та ремісників у документах.'
  - 'Прізвиська як основа майбутніх українських прізвищ: професійні, описові, патронімічні.'
  - Формування патронімів на -енко, -ович/-евич у давньоруський період.
- section: 'Колективна ідентичність: «Русь», «Русини» та перша згадка «України»'
  words: 1000
  points:
  - 'Еволюція терміну «Русь»: від етносоціального (варяги) до етногеографічного поняття.'
  - '«Русин» як історична самоназва українців: аналіз вживання в джерелах.'
  - '1187 рік: контекст та значення першої літописної згадки назви «Україна».'
  - 'Деколонізація: спростування міфу про «спільну колиску» та «давньоруську народність».'
- section: 'Граматичний фокус: Кличний відмінок та відмінювання імен'
  words: 500
  points:
  - 'Кличний відмінок як жива норма: «княже», «брате», «Володимире».'
  - Особливості відмінювання давніх імен (тип на *-u, *-o).
  - Архаїчні форми в сучасній українській мові.
- section: 'Підсумок: Від Русі до України'
  words: 300
  points:
  - Безперервність києворуської традиції в українській культурі.
  - Імена як носії історичної пам'яті та ідентичності.
