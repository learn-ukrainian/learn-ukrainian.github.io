slug: review-social-pyramid
title: Review Social Pyramid
word_target: 5000
content_outline:
- section: 'Вступ: Соціальна драбина Русі'
  words: 300
  points:
  - 'Русь як станове суспільство: не хаос, а чітка ієрархія'
  - «Руська Правда» як головний інструмент соціального регулювання
  - 'Три категорії населення: вільні, напіввільні, невільні'
- section: 'Еліта: Князь, Бояри та Дружина'
  words: 800
  points:
  - Князь як верховний правитель і власник землі
  - Старша дружина (бояри) та молодша дружина (гриді, отроки)
  - «Огнищанин» та подвійна віра (80 гривень) як привілей еліти
  - Трансформація дружинників у землевласників-вотчинників
- section: 'Духовенство: Люди церковні'
  words: 400
  points:
  - Особливий правовий статус духовенства (церковні статути)
  - 'Ієрархія: від митрополита до парафіяльного священника'
  - Церква як соціальний інститут опіки
- section: 'Вільні люди: Община та Місто'
  words: 800
  points:
  - «Люди» — основна категорія вільного населення (верв)
  - Віра 40 гривень — стандартна ціна життя вільної людини
  - 'Міське населення: купці, ремісники, «градські люди»'
  - Роль віче у захисті прав вільних громадян
- section: 'Залежні стани: Феномен Смерда'
  words: 700
  points:
  - 'Смерд: селянин із власним господарством, але обмеженими правами'
  - 'Право «задниці»: успадкування майна смерда князем'
  - 'Дискусія про статус: між державним підданим і кріпаком'
  - Заборона катувань смерда без княжого слова
- section: 'Тимчасова несвобода: Закупи та Рядовичі'
  words: 600
  points:
  - 'Інститут закупництва: боргова кабала чи соціальний контракт?'
  - «Купа» (позика) як механізм потрапляння в залежність
  - 'Права закупів: неможливість продажу в рабство (за Мономахом)'
  - Рядовичі — залежність через договір («ряд»)
- section: 'Повна несвобода: Холопи та Челядь'
  words: 600
  points:
  - Холоп як об'єкт власності («рече», а не «муж»)
  - 'Джерела холопства: полон, злочин, продаж, шлюб'
  - '«Урок» замість віри: компенсація господарю за псування майна'
  - Патріархальний характер рабства в ранній Русі
- section: 'Маргінали: Соціальні ізгої'
  words: 400
  points:
  - 'Визначення ізгойства: вихід із соціальної ніші'
  - 'Чотири категорії ізгоїв: попів син, купець, холоп, князь'
  - Соціальна трагедія та роль церкви у підтримці ізгоїв
- section: 'Підсумок: Правовий вимір ієрархії'
  words: 400
  points:
  - Система вір (штрафів) як дзеркало цінності життя
  - Гуманізм чи прагматизм? Відсутність смертної кари
  - 'Еволюція структури: від племінної рівності до феодальної драбини'
  - Зв'язок із сучасною українською ментальністю (цінність свободи)
