slug: pvl-intro-geography
title: Pvl Intro Geography
word_target: 5000
content_outline:
- section: 'Вступ: Сакральна географія та Потоп'
  words: 600
  points:
  - 'Літопис як документ епохи: авторство Нестора та редакції (1113, 1116).'
  - 'Біблійний вступ: поділ землі між Симом, Хамом та Яфетом.'
  - 'Русь у ''Яфетовій частині'': європейська ідентичність східних слов''ян.'
  - 'Світ очима середньовічного ченця: етноцентризм та провіденціалізм.'
- section: 'Основний матеріал: I — Шлях із варягів у греки'
  words: 1000
  points:
  - 'Текст джерела: аналіз уривка про шлях ''из Варягъ въ Греки''.'
  - 'Гідроніми ПВЛ: Дніпро, Двіна, Ловать, Волхов.'
  - 'Логістика та економіка: волоки, небезпеки, торгівля.'
  - 'Варязьке море (Балтика) та Руське море (Чорне): геополітична вісь держави.'
- section: 'Основний матеріал: II — Племінна мозаїка Русі'
  words: 1000
  points:
  - 'Слов''янські ''славінії'': перелік племен та їх локалізація.'
  - 'Поляни: ''мужі мудрі'', ядро державності та їхні звичаї.'
  - 'Древляни, сіверяни, радимичі: характеристика ''інших''.'
  - Дихотомія 'свій-чужий' у описі племінних звичаїв (шлюб, поховання).
- section: 'Основний матеріал: III — Граматика минулого (Імперфект)'
  words: 1000
  points:
  - 'Що таке імперфект: минулий незавершений час (durative past).'
  - 'Морфологія: як утворювався імперфект (суфікси -ах-, -ях-).'
  - 'Функція в тексті: опис звичаїв (''живяху'', ''творяху'') та тла подій.'
  - Відмирання імперфекта та його сліди в сучасній мові (реліктові форми).
- section: 'Основний матеріал: IV — Легенда про заснування Києва'
  words: 1000
  points:
  - 'Текст джерела: Кий, Щек, Хорив і Либідь.'
  - 'Етимологія імен: топонімічні маркери Києва.'
  - 'Полеміка з ''перевізником'': Нестор доводить князівське походження Кия.'
  - Київ як 'Другий Єрусалим' та центр тяжіння руських земель.
- section: 'Підсумок: Географія як доля'
  words: 400
  points:
  - 'Синтез: як географія визначила історію Русі.'
  - 'Від племен до держави: роль Києва та торгових шляхів.'
  - Значення ПВЛ для української ідентичності.
