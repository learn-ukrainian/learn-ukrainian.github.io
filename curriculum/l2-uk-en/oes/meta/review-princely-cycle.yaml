slug: review-princely-cycle
title: Review Princely Cycle
word_target: 5000
content_outline:
- section: 'Вступ: Княжий цикл як літературний феномен'
  words: 400
  points:
  - 'Визначення ''Княжого циклу'': сукупність літописних оповідей, житій та повчань
    про київських правителів.'
  - 'Центральна ідея: князь як уособлення державності, відповідальності та християнської
    моралі.'
  - 'Джерельна база: ''Повість минулих літ'', Київський літопис, ''Повчання'' Мономаха.'
  - 'Зв''язок з епохою: література як інструмент політичної легітимації та виховання
    еліти.'
- section: 'Основний матеріал: I — Княгиня Ольга: Предтеча і Дипломат'
  words: 600
  points:
  - 'Образ жінки-правительки в патріархальному суспільстві: мудрість (''мудріша за
    всіх чоловіків'') та рішучість.'
  - 'Аналіз літописної легенди про помсту древлянам: ритуальний характер, утвердження
    княжої влади.'
  - 'Дипломатичний візит до Константинополя: Ольга як рівноправний гравець на міжнародній
    арені.'
  - Порівняння язичницького та християнського етапів її біографії в літературі.
- section: 'Основний матеріал: II — Володимир Великий: Вибір віри та шляху'
  words: 650
  points:
  - 'Трансформація образу: від ''язичника-розпусника'' до ''рівноапостольного святого''.'
  - 'Сюжет ''Вибору віри'': літературна обробка геополітичного рішення. Аргументація
    філософа.'
  - 'Образ Володимира у ''Слові про Закон і Благодать'' митрополита Іларіона: панегірик
    державцю.'
  - 'Вплив хрещення на розвиток писемності: ''послав учити дітей грамоти''.'
- section: 'Основний матеріал: III — Ярослав Мудрий: Книжник і Будівничий'
  words: 650
  points:
  - 'Ідеал ''князя-книжника'': заснування бібліотеки, скрипторію, любов до читання
    (''читав вдень і вночі'').'
  - 'Будівнича діяльність як сакральний акт: Софія Київська, Золоті Ворота — творення
    ''Нового Єрусалиму''.'
  - 'Кодифікація права: ''Руська Правда'' як відображення соціальної структури та
    справедливості.'
  - 'Міжнародні шлюби (''тесть Європи''): відображення в західних хроніках vs київських
    літописах.'
- section: 'Основний матеріал: IV — Володимир Мономах: Етичний кодекс правителя'
  words: 800
  points:
  - '''Повчання'' як унікальний его-документ епохи: поєднання дидактики та автобіографії.'
  - 'Моральні імперативи: захист слабких (''не дайте сильним погубити людину''), страх
    Божий, працьовитість.'
  - 'Князь-воїтель: опис 83 походів, швидкість пересування, особиста участь у небезпеках.'
  - 'Деконструкція московського міфу про ''Шапку Мономаха'': історична правда.'
- section: 'Основний матеріал: V — Міжусобиці та ідея єдності'
  words: 600
  points:
  - 'Любецький з''їзд 1097 року: формула ''Кождо да держить отчину свою'' як спроба
    федералізації.'
  - 'Трагедія Василька Теребовлянського: літературна майстерність опису (психологізм,
    деталізація).'
  - 'Засудження братовбивчих воєн літописцями: моральна оцінка політичного розпаду.'
  - 'Паралелі зі ''Словом о полку Ігоревім'': туга за сильною рукою старого Києва.'
- section: 'Основний матеріал: VI — Княжі некрологи та народження ''України'''
  words: 600
  points:
  - 'Жанр княжого некролога в Київському літописі: структура, риторичні фігури, ідеалізація.'
  - 'Некролог Володимиру Глібовичу (1187): аналіз контексту першої згадки топоніму
    ''Україна''.'
  - 'Лексичне значення ''Оукраина'': прикордоння vs рідна земля. Деколоніальний погляд.'
  - 'Патріотизм переяславців: емоційний зв''язок князя і народу.'
- section: 'Основний матеріал: VII — Мова і стиль княжих життєписів'
  words: 400
  points:
  - Поєднання книжної церковнослов'янської мови з живою народною стихією.
  - Військова термінологія ('сідлати коні', 'зломити спис') та юридичні формули.
  - Протоукраїнські риси в мові літописів XII ст. (повноголосся, закінчення -ові/-еві).
  - Діалектизми як маркер походження літописця.
- section: 'Підсумок: Актуальність княжої спадщини'
  words: 300
  points:
  - Княжий цикл як фундамент української державної традиції та історичної пам'яті.
  - 'Тяглість етичних норм: від ''Повчання'' Мономаха до сучасного лідерства.'
  - 'Значення для сучасної ідентичності: розуміння себе як спадкоємців Русі, а не
    ''молодших братів''.'
  - Заклик до вивчення першоджерел.
- section: 'Практика: Аналіз текстів'
  words: 200
  points:
  - Робота з уривками 'Повчання' (знайти етичні настанови).
  - Порівняльний аналіз літописного та сучасного опису події (наприклад, хрещення).
  - Вправа на виявлення архаїзмів та їх сучасних відповідників.
