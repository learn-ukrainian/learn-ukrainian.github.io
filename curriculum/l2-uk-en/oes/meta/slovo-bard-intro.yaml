slug: slovo-bard-intro
title: Slovo Bard Intro
word_target: 5000
content_outline:
- section: 'Вступ: Поетика початку'
  words: 600
  points:
  - 'Риторичне запитання «Не лѣпо ли ны бяшетъ...»: запрошення до діалогу'
  - Протиставлення «старих слів» і «билин цього часу»
  - Авторська скромність як літературний топос
- section: 'Основний матеріал: I — Постать віщого Бояна'
  words: 800
  points:
  - 'Боян у тексті: «соловій старого часу», його метафоричний світ'
  - 'Гіпотези про особу Бояна: придворний співець Святослава Ярославича'
  - 'Стиль Бояна: гіперболізація та панегірик («струни самі славу рокотали»)'
  - 'Контраст: чому автор «Слова» відмовляється наслідувати Бояна?'
- section: 'Основний матеріал: II — Історичне тло 1185 року'
  words: 800
  points:
  - 'Похід Ігоря Святославича: хронологія та учасники'
  - 'Фатальні знамення: сонячне затемнення 1 травня'
  - 'Географія походу: від Путивля до річки Каяли'
  - Політична роздробленість Русі як головний біль автора
- section: 'Основний матеріал: III — Мовний код: Давньоруська чи Давньоукраїнська?'
  words: 800
  points:
  - Лексичні маркери української мови в тексті («парубок», «кожух», «яруга»)
  - 'Граматичні особливості: кличний відмінок, закінчення -ові/-еві'
  - Спростування міфу про «давньоросійську» мову «Слова»
  - Зв'язок з фольклорною традицією українського народу
- section: 'Основний матеріал: IV — Детектив рукопису'
  words: 700
  points:
  - Знахідка Мусіна-Пушкіна в Ярославлі (1790-ті)
  - Перше видання 1800 року та Катерининська копія
  - 'Трагедія 1812 року: загибель оригіналу у вогні'
  - 'Проблема автентичності: чому це не підробка XVIII століття (аргументи лінгвістики)'
- section: 'Практика: Читаємо «Вступ»'
  words: 400
  points:
  - Палеографічний аналіз першого абзацу
  - Переклад ключових термінів («старими словеси», «трудних повістей»)
  - 'Вправа: ідентифікація метафор Бояна в тексті'
- section: 'Практика: Етимологічні розвідки'
  words: 400
  points:
  - Аналіз слів «полк», «слово», «билина»
  - Реконструкція праслов'янських коренів
  - Порівняння з сучасними українськими відповідниками
- section: 'Підсумок: Голос крізь віки'
  words: 500
  points:
  - «Слово» як маніфест єдності Русі
  - 'Вплив на українську культуру: від переспівів до опер'
  - Значення «Слова» для формування національної ідентичності
