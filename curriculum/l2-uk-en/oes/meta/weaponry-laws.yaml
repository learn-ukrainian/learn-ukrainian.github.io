slug: weaponry-laws
title: Weaponry Laws
word_target: 5000
content_outline:
- section: Вступ
  words: 300
  points:
  - Зброя як атрибут вільної людини в Русі
  - Сакральне значення зброї в дохристиянську та християнську добу
  - 'Огляд джерел: літописи, законодавство, археологія'
- section: 'Основний матеріал: I — Арсенал воїна: Термінологія та типологія'
  words: 1200
  points:
  - 'Клинкова зброя: лінгвістичний аналіз термінів ''меч'' (mьčь) та ''шабля'''
  - 'Масова зброя: спис (sъpisъ), сокира, лук — етимологія та вжиток'
  - 'Захисне спорядження: еволюція термінів ''шолом'' (šelmъ), ''щит'' (ščitъ), ''броня''
    (brъnja)'
  - Вплив скандинавської та візантійської традицій на лексику озброєння
- section: 'Основний матеріал: II — Меч як символ влади та права'
  words: 1000
  points:
  - 'Ритуал клятви на зброї: свідчення договорів 911 та 944 років'
  - 'Меч в ''суді божому'': поєдинок як спосіб вирішення спорів'
  - 'Клинкова епіграфіка: про що розповідають написи на мечах (ULFBERHT, ЛЮДОТА)'
  - 'Соціальна стратифікація через зброю: вартість спорядження'
- section: 'Основний матеріал: III — «Руська Правда» про зброю'
  words: 1000
  points:
  - 'Правовий захист честі: штрафи за удар ''тилієм'' (обухом) або піхвами'
  - Відповідальність за погрозу мечем без нанесення удару (1 гривня кун)
  - Диференціація покарань залежно від типу зброї та соціального статусу
  - Зброя як речовий доказ у давньоруському суді
- section: 'Основний матеріал: IV — Військова організація та тактика'
  words: 1000
  points:
  - 'Військова лексика: етимологія слів ''полк'', ''рать'', ''дружина'''
  - 'Соціальна ієрархія: князь — воєвода — тисяцький — сотник'
  - 'Категорії воїнів: ''гридь'', ''отроки'', ''вої'' (ополчення)'
  - Еволюція тактичних термінів у літописах XI–XIII ст.
- section: Практика
  words: 300
  points:
  - Аналіз уривків з 'Руської Правди' (ідентифікація правових норм)
  - 'Етимологічна вправа: відновлення праслов''янських форм назв зброї'
  - Реконструкція діалогу дружинників (з використанням автентичної лексики)
- section: Підсумок
  words: 200
  points:
  - Спадкоємність української військової термінології від Русі до сьогодення
  - Зброя як дзеркало правової свідомості давньоруського суспільства
