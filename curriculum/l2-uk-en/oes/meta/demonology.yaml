slug: demonology
title: Demonology
word_target: 5000
content_outline:
- section: 'Вступ: Демонологія та духовний світ Русі'
  words: 400
  points:
  - 'Світоглядний дуалізм: накладання християнської демонології на язичницькі вірування'
  - 'Термінологія зла: етимологія слів ''біс'', ''чорт'', ''диявол'''
  - 'Функція демонології в середньовічній літературі: не лякати, а навчати'
- section: 'Основний матеріал: I — Ісакій Затворник: Аскеза і виклик'
  words: 700
  points:
  - 'Соціальне походження Ісаакія: від багатого купця до печерного затворника'
  - 'Опис затвору: фізичні умови та духовна мета ізоляції'
  - 'Хронологія подій: приблизно 1070-ті роки (час ігуменства Антонія та Феодосія)'
- section: 'Основний матеріал: II — Анатомія спокуси: ''Явлення Христа'''
  words: 800
  points:
  - 'Механізм мани: світло та янгольські образи як інструмент обману'
  - 'Ключова помилка: відсутність ''розпізнання духів'' та гординя'
  - 'Аналіз діалогу: ''Ісакіє, мы нѣсмы аг҃гли...'' — момент істини'
  - 'Цитата: ''Поклонися єму'' як акт духовної капітуляції'
- section: 'Основний матеріал: III — ''Наш єси, Ісаакіє!'': Наслідки падіння'
  words: 800
  points:
  - 'Тріумф демонів: крик ''Наш єси!'' як юридичне закріплення влади'
  - 'Пекельні танці: ''сопѣли, гуслі і бубни'' як атрибути язичницьких ігрищ'
  - 'Фізичне виснаження: психосоматичні наслідки духовного ураження'
  - Порівняння з іншими патериковими сюжетами (Матвій Прозорливий)
- section: 'Основний матеріал: IV — Типологія та образи бісів'
  words: 700
  points:
  - 'Візуалізація зла: зооморфні образи (свині, пси, змії)'
  - 'Етнічні маркери: образ ''ляха'' як відображення історичних конфліктів'
  - 'Функціональність: біс як спокусник, мучитель та трикстер'
  - Матеріальність зла в уявленнях людини XI ст.
- section: 'Основний матеріал: V — Зцілення, юродство та спасіння'
  words: 600
  points:
  - 'Роль спільноти: Феодосій Печерський як цілитель і доглядальник'
  - 'Дворічна хвороба: кататонічний стан та повернення до життя'
  - 'Юродство Христа ради: нова стратегія боротьби з гординею'
  - 'Влада над бісами: епізоди з воронами та піччю після одужання'
- section: 'Основний матеріал: VI — Лінгвістика ''нечистої сили'''
  words: 600
  points:
  - Лексичний аналіз ключових термінів у тексті Патерика
  - Еволюція значення слова 'прелесть' (від ОЕС до сучасності)
  - Давньоруські граматичні конструкції для позначення дії надприродних сил
- section: 'Практика: Аналіз тексту та переклад'
  words: 200
  points:
  - Робота з уривком про явлення лже-Христа
  - Виявлення специфічних рис синтаксису XI ст.
  - Завдання на переклад та інтерпретацію
- section: 'Підсумок: Спадщина образу в українській культурі'
  words: 200
  points:
  - Трансформація образу біса в українському бароко та романтизмі
  - Вплив сюжету про Ісаакія на пізнішу агіографію та літературу (Гоголь)
  - 'Деколонізаційний висновок: Патерик як джерело української духовної стійкості'
