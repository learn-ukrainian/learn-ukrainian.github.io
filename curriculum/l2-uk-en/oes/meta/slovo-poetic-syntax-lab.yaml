slug: slovo-poetic-syntax-lab
title: Slovo Poetic Syntax Lab
word_target: 5000
content_outline:
- section: 'Вступ: Лабораторія поетичного слова'
  words: 600
  points:
  - 'Унікальність жанру: ''трудная повість'' чи пісня?'
  - Зв'язок з європейським лицарським епосом (Пісня про Роланда).
  - Ритмічна проза як носій емоційного заряду.
- section: 'Поетичний синтаксис I: Ритм і музика'
  words: 800
  points:
  - 'Синтаксичний ритм: чергування напруги і розрядки.'
  - Алітерація та звукопис ('трубы трубять').
  - Рефрени як структуруючий елемент ('О руська земле...').
  - Порівняння з музичною структурою (лейтмотиви).
- section: 'Поетичний синтаксис II: Інверсія та гіпербатон'
  words: 900
  points:
  - 'Визначення інверсії: порушення звичного порядку слів.'
  - 'Гіпербатон: розрив словосполучень (''Дóну вели́каго'', ''спáла кня́зю ýмь похóти'').'
  - 'Функція інверсії: акцентування уваги на ключовому образі.'
  - Експресивність висловлювання через порядок слів.
- section: 'Поетичний синтаксис III: Паралелізм і симетрія'
  words: 800
  points:
  - 'Синтаксичний паралелізм: дзеркальна будова фраз.'
  - 'Приклад: ''Комони ржуть за Сулою — звенить слава в Кыевѣ''.'
  - Зв'язок паралелізму з фольклорною традицією.
  - Хіазм та складні синтаксичні фігури (симетрія думок).
- section: 'Мовна ДНК: Протоукраїнські риси'
  words: 1000
  points:
  - 'Наукова дискусія: Шевельов проти імперської теорії.'
  - 'Граматичні маркери: закінчення ''-ови''/''-еви'' (Ігореви).'
  - Дієслівні форми на '-ть' (текуть, йдуть).
  - 'Лексичні українізми: ''яруга'', ''кожух'', ''туга'', ''брехати''.'
  - Чому мова 'Слова' — це рання українська.
- section: 'Підсумок: Спадщина та автентичність'
  words: 900
  points:
  - Історія знахідки та втрати рукопису (1812).
  - Скептики та докази автентичності (лінгвістичний аналіз).
  - Вплив 'Слова' на модерну українську літературу.
  - Значення пам'ятки в контексті європейської культури.
