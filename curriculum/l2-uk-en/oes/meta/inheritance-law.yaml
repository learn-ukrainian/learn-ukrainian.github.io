slug: inheritance-law
title: Inheritance Law
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Спадкове право як дзеркало соціальних відносин Давньої Русі
  - Етимологія та семантика терміну «задниця» (те, що залишається позаду)
  - 'Загальні принципи: родинний характер успадкування та відсутність заповіту в сучасному
    розумінні'
- section: 'Основний матеріал: I — Соціальна стратифікація: смерди і бояри'
  words: 1000
  points:
  - 'Аналіз статті 90: «безадниця» смерда та право князя (відумерщина)'
  - 'Аналіз статті 91: імунітет боярської та дружинної власності'
  - 'Причини різного підходу: земля як умова служби vs земля як власність роду'
  - Вплив соціального статусу на долю майна та нащадків
- section: 'Основний матеріал: II — Гендерний аспект: права дочок і вдів'
  words: 1000
  points:
  - Пріоритет синів у спадкуванні (агнатний принцип)
  - Винятки для дочок бояр (ст. 91) та посаг для дочок смердів
  - 'Становище вдови: «частина» на прожиття та право сидіти «по мужі»'
  - Моральний обов'язок дітей піклуватися про матір (ст. 101-103)
- section: 'Основний матеріал: III — Інститут опіки та права незаконнонароджених'
  words: 1000
  points:
  - Організація опіки над малолітніми дітьми (ст. 99)
  - Роль близьких родичів («хто имь ближе будеть») та відповідальність вітчима
  - 'Фінансові аспекти опіки: прибуток («прикуп») опікуна vs збереження капіталу («істини»)'
  - 'Статус дітей від рабинь (ст. 98): свобода без спадку як гуманістичний крок'
- section: 'Основний матеріал: IV — Мова закону: правнича термінологія'
  words: 900
  points:
  - 'Лексичний аналіз ключових термінів: «задниця», «статок», «рукописання»'
  - Синтаксичні конструкції умовного способу в «Руській Правді»
  - Порівняння давньоруської термінології з сучасною українською (тяглість понять)
  - Палеографічні особливості запису юридичних норм
- section: Практика
  words: 400
  points:
  - 'Аналіз кейсів: застосування статей 90-99 до змодельованих ситуацій'
  - Палеографічне читання уривків «Руської Правди»
  - Вправи на реконструкцію архаїчних правових формул
- section: Підсумок
  words: 300
  points:
  - «Руська Правда» як фундамент української правової традиції
  - Гуманізм та впорядкованість спадкового права Русі
  - Еволюція норм у Литовських Статутах
