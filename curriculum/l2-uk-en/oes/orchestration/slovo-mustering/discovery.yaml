    \ де порівнюється воєнне мистецтво зі знанням\r\nправа: «Хто ж може сумніватися\
    \ в тому, що для осягнення посади консула більше\r\nзначення має слава, здобута\
    \ на полі бою, ніж здобута в цивільному праві?» і т.\r\nд. Сюди належить накопичення\
    \ визначень, справ і почуттів.\n\nЦя ампліфікація називається також перерахуванням,\r\
    \nскупченням, поділом, членування"
