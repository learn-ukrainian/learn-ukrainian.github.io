  text: "Коментар включає історію задуму та тексту і створення коментованого\r\nтвору,\
    \ його творчу історію за всіма наявними матеріалами. Основний зміст цієї\r\nчастини\
    \ текстологічного коментаря — аналіз творчої роботи над чорновими й\r\nнаступними\
    \ рукописними текстами та аналіз друкованих текстів, що становлять\r\nпродовження\
    \ творчої праці Шевченка. Саме цей аналіз лежить в основі мотивування\r\nосновного,\
    \ дефінітивного тексту, обґрунтування хронології (дати) твору,\r\nвстановлення\
    \ генеалогічного ланцюга послідовни"
