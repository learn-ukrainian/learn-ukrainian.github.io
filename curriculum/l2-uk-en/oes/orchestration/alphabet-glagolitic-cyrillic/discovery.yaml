  text: "В текстах, писанных кириллицей, буквы ω,\r\nү, ξ, v, і, θ заменены буквами\
    \ о, у, кс, и, ф (буква\r\nω встречается почти исключительно в начале слов), буква\
    \ i\r\nстоит перед гласными и в редких случаях в начале слов при написании имен.\r\
    \nБуквенные обозначения цифр переданы арабскими цифрами, знак \\\\ буквами «и»\
    \ или\r\n«й». Буква ять (Ђ) сохранена везде, так как она часто заменяет букву\
    \ «и»\r\n(«вЂтязь» — «витязь»), титла везде раскрыты."
