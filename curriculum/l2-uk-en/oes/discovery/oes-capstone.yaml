  text: "Трактат про причини завершимо доповненням у формі\r\nкількох дрібних питань,\
    \ які дехто подає на початку цього трактату. Але ми\r\nрозглядаємо їх в кінці,\
    \ бо переконані, що для їх розв’язання потрібне попереднє\r\nдосконале пізнання\
    \ причин. Тут ми досліджуємо дві справи: по-перше, чи можуть\r\nпричини бути взаємно\
    \ для себе причинами і, по-друге, чи внаслідок дії двох\r\nоднакових причин може\
    \ виникнути той самий наслідок."
