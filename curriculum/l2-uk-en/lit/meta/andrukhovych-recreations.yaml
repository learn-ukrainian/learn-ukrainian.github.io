slug: andrukhovych-recreations
title: 'Юрій Андрухович: «Рекреації»'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичне тло початку 1990-х'
    words: 350
    points:
      - Атмосфера розпаду СРСР та здобуття незалежності як тло для роману
      - Культурний вакуум і пошук нових форм вираження
      - «Рекреації» як документ перехідної епохи
  - section: 'Вступ та культурний контекст: II — «Бу-Ба-Бу» і злам традиції'
    words: 450
    points:
      - Заснування та естетична платформа групи «Бу-Ба-Бу»
      - Бурлеск, балаган і буфонада проти соцреалізму та шароварщини
      - Значення роману для формування «станіславського феномену»
  - section: 'Аналіз твору: Сюжет та структура: I — Свято Воскресаючого Духу'
    words: 450
    points:
      - 'Зав''язка: прибуття поетів до Чортополя на вигаданий фестиваль'
      - 'Фантасмагорійність сюжету: розмиття меж між реальністю, алкогольним маренням
        і сном'
      - Динаміка розгортання карнавального хаосу
  - section: 'Аналіз твору: Сюжет та структура: II — Динаміка конфлікту та хронотоп'
    words: 450
    points:
      - 'Стиснений хронотоп роману: концентрація подій у часі та просторі Чортополя'
      - Протистояння між «Оргкомітетом» (офіціозом) та неконтрольованою стихією свята
      - Абсурдні перипетії як рушійна сила оповіді
  - section: 'Герменевтика та ключові образи: I — Система персонажів'
    words: 600
    points:
      - Типологія поетів (Мартофляк, Хомський, Немирич, Грищук) як зріз молодої української
        інтелігенції
      - Їхні мотивації, страхи та амбіції
      - Трансформація героїв під час «рекреації»
  - section: 'Герменевтика та ключові образи: II — Символіка та карнавальні маски'
    words: 450
    points:
      - Чортопіль як метафорична мікромодель тогочасної України
      - 'Семантика назви «Рекреації»: від відпочинку до воскресіння/перетворення'
      - Мотив переодягання, зміни ролей та масок
  - section: 'Мова, стиль та поетика: I — Гротеск і стилістичні інновації'
    words: 500
    points:
      - Використання теорії карнавалу М. Бахтіна як ключа до розуміння поетики твору
      - Змішування високого і низького стилів
      - Пародіювання офіційно-ділового та патетично-патріотичного дискурсів
  - section: 'Мова, стиль та поетика: II — Мовний карнавал та сленг'
    words: 400
    points:
      - Легітимізація розмовної мови, суржику та сленгу в художній літературі
      - Ритміка прози Андруховича та вплив поетичного досвіду автора
      - Сміхова культура як стилістична домінанта
  - section: 'Деколонізаційний вимір: I — Руйнування імперського пафосу'
    words: 450
    points:
      - Деконструкція радянських міфів та монументальної пропаганди через іронію
      - Образи представників влади та спецслужб у карнавальному кривому дзеркалі
      - Звільнення від ідеологічного диктату шляхом його осміяння
  - section: 'Деколонізаційний вимір: II — Культурне самоствердження'
    words: 450
    points:
      - 'Долання постколоніальної травми: сміх як терапія'
      - 'Агентність українського героя: право на помилку, слабкість та свободу вибору'
      - Відвоювання міського простору (урбаністичний контекст роману)
  - section: 'Підсумок та рецепція: Вплив на сучасну літературу'
    words: 450
    points:
      - 'Резонанс після публікації: від літературного фурору до скандалів і критики'
      - Вплив «Рекреацій» на наступні покоління українських письменників
      - Місце твору у світовому контексті та його актуальність сьогодні
