slug: fylypovych-poetry
title: "Павло Филипович: Тихий Голос, Незламна Класика — Поет між Гімназіями і Катівнями"
word_target: 5000
content_outline:
- section: 'Вступ: I — Неокласики і академічна традиція'
  words: 500
  points:
  - Павло Филипович (1891–1937) — учений-літературознавець і ліричний поет в єдиній особі, символ київського неокласицизму.
  - Неокласична школа як свідома культурна програма, а не лише естетичний вибір — відповідь на «масовізм» доби.
  - 'Контекст 1920-х: «червоний ренесанс» або передчуття катастрофи — дві інтерпретації одного десятиліття.'
- section: 'Вступ: II — Науковець і педагог: формування поетичного голосу'
  words: 500
  points:
  - Праця з вивчення Шевченка і його доби — вплив на власну поетику і розуміння функції літератури.
  - Педагогічна діяльність в Інституті народної освіти — де Филипович формував нове покоління читачів і критиків.
  - 'Дружба з Зеровим і Рильським: спільні переклади, рецензії та листування як документ інтелектуального братства.'
- section: 'Аналіз лірики: Краса мовчання і медитативний погляд'
  words: 700
  points:
  - 'Тематичний спектр: природа, кохання, смерть — класична тріада у модерному контексті без академічної сухості.'
  - Мотив самотності і «вибраної тиші» — позиція споглядання і внутрішньої дисципліни в добу надмірного крику.
  - 'Мовна стриманість: мінімум образів, максимум точності — майстерність у простоті як найвища вимога до поета.'
- section: 'Аналіз лірики: Класична традиція і рецепція античності'
  words: 700
  points:
  - Переклади з античної і латинської поезії — спосіб осмислення власної доби через загальнолюдський досвід.
  - 'Горацій і Катулл в українському голосі: що залишається при перекладі і що неминуче трансформується.'
  - Порівняльний аналіз — Филипович серед перекладачів-неокласиків, його особливий підхід до збереження духу оригіналу.
- section: 'Наукові праці: Литература мовою літературознавця'
  words: 600
  points:
  - Дослідження Шевченка — що Филипович побачив у «Кобзарі», чого не помітили чи не хотіли помічати інші.
  - Праці з нової і новітньої польської літератури як приклад компаративного підходу без великодержавних упереджень.
  - "'Убитий архів': наукові рукописи і незавершені дослідження, втрачені разом з автором у 1937 році."
- section: 'Стилістика: Класична форма як вибір, а не обмеження'
  words: 500
  points:
  - 'Сонетна форма у Филиповича: варіації і свідомі відступи від канону — майстер знає правила і порушує їх навмисно.'
  - 'Лексика і фоніка: евфонія як принцип — звук і зміст у нерозривній єдності.'
  - Порівняння з Рільке і П'єром де Ронсаром — неокласицизм як загальноєвропейська традиція з різними національними відгалуженнями.
- section: 'Деколонізаційна перспектива: Академія як поле бою'
  words: 500
  points:
  - 'Справа «Спілки визволення України» (1930): псевдопроцес над інтелігенцією — знищити академію означало знищити пам''ять.'
  - 'Арешт і розстріл 1937 року: знищити поета дорівнює знищити «джерело культурного опору» — логіка тоталітаризму.'
  - Паралель між знищенням київської академічної інтелігенції і «русифікацією» університетів після 1930-х.
- section: 'Підсумок: Тихий голос у гучному каноні'
  words: 500
  points:
  - Місце Филиповича у повному неокласичному контексті — чому він менш відомий за Зерова і Рильського і чи справедливо це?
  - Повернення у незалежній Україні — видання і переосмислення ролі «тихого» поета у час гучних подій.
  - 'Урок Филиповича: поетична гідність без гучних маніфестів — чи можливо таке у час, коли від поетів вимагають голосності?'
