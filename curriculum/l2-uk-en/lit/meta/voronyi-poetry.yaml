slug: voronyi-poetry
title: Voronyi Poetry
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови та контекст епохи'
  words: 350
  points:
  - Злам епох (fin de siècle) та криза традиційного народництва
  - 'Українські землі у складі Російської імперії: цензурні утиски та потреба в оновленні'
  - Вплив європейської філософії на молоде покоління української інтелігенції
- section: 'Вступ та культурний контекст: II — Місце в каноні та актуальність'
  words: 300
  points:
  - Микола Вороний як зачинатель українського модернізму та символізму
  - Альманах «З-над хмар і з долин» (1903) як маніфест нової літератури
  - 'Актуальність: культурний суверенітет та відмова від комплексу меншовартості'
- section: 'Аналіз твору: I — Джерела, впливи та етапи розвитку'
  words: 350
  points:
  - Знайомство Вороного з європейським модерном під час навчання у Відні та Львові
  - Вплив французького символізму (Бодлер, Верлен) та естетизму
  - Еволюція поетичного методу в збірках «Ліричні поезії» та «В сяйві мрій»
- section: 'Аналіз твору: II — Структура та художній конфлікт'
  words: 350
  points:
  - 'Ідейний конфлікт: «мистецтво заради мистецтва» проти «громадянського обов''язку»'
  - Літературна полеміка з Іваном Франком (відповідь на «Лісову ідилію»)
  - 'Синтез у вірші «Іванові Франкові»: заклик «йти за віком» і «бути цілим чоловіком»'
- section: 'Герменевтика та образи: I — Символіка та еволюція ліричного героя'
  words: 350
  points:
  - Образна система вірша «Блакитна Панна»
  - Персоніфікація Весни як символу натхнення, творчого прозріння та оновлення
  - 'Кольористика модернізму: семантика блакитного кольору як вищої духовності'
- section: 'Герменевтика та образи: II — Архетипи та міфологічні підтексти'
  words: 350
  points:
  - 'Поема «Євшан-зілля»: використання літописного сюжету'
  - Забуття як загроза манкуртства в умовах імперії
  - Рослина (полин) як міфологічний тригер національної пам’яті та духовного відродження
- section: 'Мова, стиль та поетика: I — Стилістичні інновації та неологізми'
  words: 350
  points:
  - 'Інтелектуалізація лексики: відхід від виключно сільського словника'
  - Впровадження синестезії (поєднання зорових, звукових та нюхових образів)
  - Урбаністичні мотиви як ознака європеїзації поезії
- section: 'Мова, стиль та поетика: II — Ритміка, синтаксис та музичність'
  words: 350
  points:
  - Віртуозна музичність вірша Вороного (на прикладі «Блакитної Панни»)
  - 'Багатство фоніки: асонанси та алітерації («У серпанках і блаватах»)'
  - Складні ритмічні малюнки та строфіка
- section: 'Деколонізаційний вимір: I — Здолання імперського міфу про провінційність'
  words: 350
  points:
  - Руйнування міфу про те, що українська мова не здатна до високої філософської рефлексії
  - Естетизм Вороного як політичний акт спростування російського наративу про «хуторянство»
  - Утвердження агентності через вибір європейських орієнтирів
- section: 'Деколонізаційний вимір: II — Культурне самоствердження та опір'
  words: 350
  points:
  - Поема «Євшан-зілля» як прямий заклик до опору асиміляції
  - 'Трагічна доля автора: розстріл НКВС у 1938 році'
  - Спроби радянської влади стерти Вороного з канону та затаврувати як «декадента»
- section: 'Підсумок та рецепція: I — Вплив на сучасників і наступні покоління'
  words: 300
  points:
  - Вплив на формування «Молодої музи» та київських неокласиків
  - Підґрунтя для естетики поетів Розстріляного відродження (зокрема П. Тичини)
  - Довготривала цензура і повернення в незалежній Україні
- section: 'Підсумок та рецепція: II — Світовий контекст та дискусійні питання'
  words: 250
  points:
  - Інтеграція українського модернізму в загальноєвропейський рух
  - Співзвучність з поезією Поля Верлена та Шарля Бодлера
  - 'Дискусія: співвідношення краси і національного обов''язку в умовах бездержавності'
