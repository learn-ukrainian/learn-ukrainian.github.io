slug: zhadan-orphanage
title: 'Сергій Жадан: «Інтернат» — література війни'
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 750
    points:
      - Історичні умови появи роману (події на Донбасі 2014-2015 років).
      - Еволюція Сергія Жадана від соціального постмодерніста до фіксатора національної
        травми.
      - 'Місце «Інтернату» в каноні сучасної української літератури війни: фокус на
        цивільному досвіді.'
  - section: 'Аналіз твору: Сюжет та структура'
    words: 900
    points:
      - 'Хронотоп твору: триденна подорож через лінію фронту (зима 2015, алюзії на
        Дебальцеве).'
      - Структура як міфологічний квест та катабасис (сходження в пекло війни).
      - 'Конфлікт як рушійна сила: зіткнення ілюзії нормальності з жорстокою реальністю
        збройного вторгнення.'
  - section: Герменевтика та ключові образи
    words: 1000
    points:
      - 'Символіка «інтернату» як метафори Донбасу: травмованого, покинутого, але
        того, що потребує порятунку.'
      - 'Система персонажів: еволюція Паші від «пасивного спостерігача» до активного
        суб''єкта дії.'
      - Сашко як образ майбутнього; апокаліптичні образи зруйнованого міста (собаки,
        знедолені, військові).
  - section: Мова, стиль та поетика
    words: 900
    points:
      - 'Стилістичні інновації: тілесна, фізіологічна мова болю та страху, кінематографічний
        синтаксис.'
      - 'Робота з мовними регістрами: українська як маркер ідентичності та точка опори
        для головного героя.'
      - Відмова від дидактики та героїчного пафосу на користь жорсткого документального
        реалізму.
  - section: Деколонізаційний вимір
    words: 900
    points:
      - Руйнування імперського міфу про «внутрішній конфлікт» через дегуманізуючий
        образ чужих окупантів.
      - 'Агентність українця Сходу: відмова від концепту «моя хата скраю» як умова
        виживання.'
      - Культурне самоствердження героя через прийняття власної професії (вчителя
        української мови) та відповідальності.
  - section: Підсумок та рецепція
    words: 600
    points:
      - 'Світовий резонанс роману: премії та переклади як інструмент боротьби з російською
        дезінформацією у Європі.'
      - Вплив «Інтернату» на подальший розвиток української літератури про війну.
      - 'Питання для дискусії: відповідальність цивільного населення та подолання
        колективної травми.'
