slug: young-shevchenko
title: 'Тарас Шевченко: Від Кріпака до Пророка'
word_target: 5000
content_outline:
- section: Вступ — Світ кріпацтва
  words: 500
  points:
  - 'Історичний контекст (1814-1840): суть кріпацтва як системи, що фактично дорівнювала
    рабству.'
  - Юридичний статус кріпака як «речі», яку поміщик міг продати, обміняти або програти
    в карти.
  - Мізерні шанси кріпака стати вільним та необхідність щоденно відпрацьовувати важку
    панщину.
- section: 'Дитинство і юність (1814-1831): Родина та школа'
  words: 500
  points:
  - 'Село Моринці: походження з козацьких родів та вплив розповідей діда Івана про
    Коліївщину.'
  - Смерть батьків і початок сирітського життя; травматичне навчання у дяка та знайомство
    з Псалтирем.
  - Перші малюнки як форма психологічного ескапізму та збереження внутрішньої свободи.
- section: 'Дитинство і юність (1814-1831): Козачок Енгельгардта'
  words: 500
  points:
  - Взяття до двору Павла Енгельгардта кімнатним слугою («козачком»), де годинами
    доводилося стояти мовчки.
  - Таємне перемальовування картин під час служби та переїзд до Вільно.
  - Відчуття атмосфери підготовки польського повстання та перші уроки малювання у
    професіоналів (Ян Рустем).
- section: 'Петербург — місто контрастів: Переїзд'
  words: 500
  points:
  - 'Переїзд до столиці імперії у 1831 році: блискуче місто, парадоксально збудоване
    на кістках українських козаків.'
  - Віддача в артіль майстра живописного цеху Василя Ширяєва (1832 рік) для отримання
    фаху.
  - Жорстока школа життя «хлопчика на побігеньках» та важка робота при декоративному
    розписі Великого театру.
- section: 'Петербург — місто контрастів: Доленосна зустріч'
  words: 500
  points:
  - Нічні візити до Літнього саду в період «білих ночей» як єдиний час для вільного
    малювання статуй.
  - 'Липень 1836 року: випадкова і доленосна зустріч із земляком, художником Іваном
    Сошенком.'
  - Входження молодого таланту в коло впливової української діаспори (Євген Гребінка,
    Василь Григорович).
- section: 'Викуп — детективна історія: Змова'
  words: 500
  points:
  - Знайомство з Карлом Брюлловим та Василем Жуковським; їхня беззаперечна оцінка
    геніальності кріпака.
  - Переговори Брюллова з цинічним Енгельгардтом, який заламав колосальну ціну у 2500
    рублів (еквівалент 45 кг срібла).
  - 'Спростування імперського міфу: порятунок був ініціативою українського земляцтва,
    що стратегічно залучило імперську еліту.'
- section: 'Викуп — детективна історія: Ціна свободи'
  words: 500
  points:
  - 'Розробка плану порятунку: Брюллов пише портрет Жуковського для розіграшу у приватну
    лотерею.'
  - Успіх лотереї (квитки придбала імператорська родина) та вручення відпускної 22
    квітня 1838 року.
  - 'Психологічний злам і радість Тараса: цитата «Велике щастя буть вольним чоловіком...».'
- section: 'Академія і «Кобзар»: Навчання у Брюллова'
  words: 500
  points:
  - Офіційне зарахування до Імператорської Академії мистецтв і здобуття статусу улюбленого
    учня Брюллова.
  - Трансформація Шевченка з безправного кріпака у стильного петербурзького денді,
    який відвідував театри.
  - Формування психології вільної людини, жадібне читання європейської літератури
    та швидка інтелектуальна еволюція.
- section: 'Академія і «Кобзар»: Вихід «Кобзаря»'
  words: 500
  points:
  - Перехід від насолоди особистою свободою до гострого осмислення долі бездержавної
    України.
  - 'Весна 1840 року: вихід першої збірки «Кобзар» (8 творів), що зруйнувала міф про
    українську мову як «селянське наріччя».'
  - Народження національного Пророка, який своїм словом утвердив міф про козацьку
    велич та право націй на свободу.
- section: Підсумок — Шанс, Талант, Солідарність
  words: 500
  points:
  - 'Аналіз формули успіху: феноменальний талант, щасливий випадок і безпрецедентна
    солідарність мистецької еліти.'
  - Роль випадку (зустріч у Літньому саду) як каталізатора подій, що кардинально змінили
    історію всієї нації.
  - Оцінка загальної спадщини митця та підготовка до глибшого аналізу його романтичної
    та баладної творчості.
