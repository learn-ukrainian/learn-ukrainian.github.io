slug: young-shevchenko
title: 'Тарас Шевченко: Від Кріпака до Пророка'
word_target: 4000
content_outline:
- section: 'Вступ — Світ кріпацтва: Епоха і система'
  words: 450
  points:
  - Історичний контекст Російської імперії (1814-1840) та суть кріпацтва як інституту
    неволі.
  - 'Юридичний і соціальний статус кріпака: неможливість розпоряджатися власною долею.'
  - Статистика та реальні шанси кріпака отримати вільну (відпускну).
- section: 'Дитинство і юність (1814-1831): Родина та перші таланти'
  words: 450
  points:
  - 'Моринці та Кирилівка: родинне тло та формування характеру малого Тараса.'
  - Вплив дідівських розповідей про Коліївщину на історичну пам'ять майбутнього Пророка.
  - Перші спроби малювання як засіб збереження внутрішньої свободи.
- section: 'Дитинство і юність (1814-1831): Школа та кріпацьке служіння'
  words: 450
  points:
  - Травматичний, але важливий досвід навчання у дяка (знайомство з текстами).
  - Служба «козачком» (кімнатним слугою) у пана Павла Енгельгардта.
  - 'Віленський період: спостереження за Польським повстанням та перші естетичні враження.'
- section: 'Петербург — місто контрастів: Переїзд і нове оточення'
  words: 450
  points:
  - Трансфер до імперської столиці (1831 рік) у статусі дворової челяді.
  - 'Психологічний дисонанс: блискучий Петербург і повне безправ''я кріпака.'
  - Жорстока школа ремесла в артілі майстра декоративного розпису Василя Ширяєва.
- section: 'Петербург — місто контрастів: Зустріч з мистецькою елітою'
  words: 450
  points:
  - Літній сад як простір нелегальної свободи та таємних етюдів білими ночами.
  - 'Ключова подія: зустріч із земляком-художником Іваном Сошенком у 1836 році.'
  - Входження молодого таланту в коло петербурзького земляцтва (Гребінка, Григорович).
- section: 'Викуп — детективна історія: Змова заради генія'
  words: 500
  points:
  - 'Знайомство з Карлом Брюлловим та Василем Жуковським: солідарність мистецької
    еліти.'
  - Переговори з П. Енгельгардтом та його цинічна вимога у 2500 рублів.
  - 'Стратегія викупу: ідея лотереї з портретом Жуковського роботи Брюллова.'
- section: 'Викуп — детективна історія: Ціна свободи'
  words: 450
  points:
  - Реалізація плану лотереї та роль імператорської родини як покупців квитків.
  - '22 квітня 1838 року: вручення відпускної та офіційне звільнення з кріпацтва.'
  - 'Листи до брата Микити: психологічний злам і радість бути «вольним чоловіком».'
- section: 'Академія і «Кобзар»: Академічне визнання'
  words: 400
  points:
  - Зарахування до Імператорської Академії мистецтв, статус вільного слухача.
  - Навчання у Брюллова, відзнаки та срібні медалі; життя петербурзького денді.
  - Доступ до елітарних європейських текстів та інтелектуальне дозрівання.
- section: 'Академія і «Кобзар»: Народження Пророка'
  words: 450
  points:
  - Трансформація особистої свободи в усвідомлення потреби свободи національної.
  - '1840 рік: видання «Кобзаря» як переломний момент в історії української літератури.'
  - 'Підсумок: як європейська академічна освіта допомогла гранітній силі генія стати
    українським національним міфом.'
