slug: lesia-in-the-catacombs
title: Lesia In The Catacombs
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 750
    points:
      - Історичні умови написання твору (1905 рік) та вихід у світ (1906, «Рідний
        край»).
      - Посвята Агатангелу Кримському та європейський вектор українського модернізму.
      - 'Актуальність концепту свободи: чому античний сюжет став відповіддю на виклики
        ХХ століття.'
  - section: 'Аналіз твору: Сюжет та структура'
    words: 750
    points:
      - 'Хронотоп твору: катакомби Риму II століття як простір інтелектуального герцю.'
      - 'Зав''язка: прихід Неофіта-раба в пошуках справжнього братерства та рівності.'
      - 'Кульмінація: ідейний конфлікт між Неофітом і Єпископом та відлучення бунтаря
        від громади.'
  - section: 'Герменевтика та ключові образи: I — Міфологічні підтексти'
    words: 600
    points:
      - Семантика замкненого простору (катакомб) як символу догматичної задухи.
      - Неофіт-раб як втілення архетипу Прометея (богоборця та визволителя).
      - Філософія екзистенційного бунту проти «добровільного духовного рабства».
  - section: 'Герменевтика та ключові образи: II — Система персонажів'
    words: 600
    points:
      - 'Єпископ, Патрицій та Купець: анатомія соціального та релігійного конформізму.'
      - Еволюція Неофіта-раба від наївного шукача до свідомого борця за людську гідність.
      - 'Роль жіночих персонажів: Анціллодея як голос емпатії та прихованого протесту.'
  - section: Мова, стиль та поетика
    words: 750
    points:
      - Особливості жанру драматичної поеми в арсеналі Лесі Українки.
      - 'Неоромантична естетика: пафос індивідуалізму та інтелектуалізація діалогів.'
      - 'Риторичні стратегії: афористичність реплік Неофіта та софістика Єпископа.'
  - section: Деколонізаційний вимір
    words: 950
    points:
      - Спростування радянського міфу про полярний «марксизм» та «атеїзм» поетеси.
      - Поема як нищівна критика будь-якої авторитарної ієрархії (включно з імперською).
      - 'Агентність українського героя: відмова від покори як акт культурного самоствердження.'
  - section: Підсумок та рецепція
    words: 600
    points:
      - Листування з А. Кримським як ключ до правильного прочитання інтенцій авторки.
      - Вплив ідей твору на український дисидентський рух («катакомбна» культура шістдесятників).
      - Місце драматичної поеми у світовому літературному каноні.
