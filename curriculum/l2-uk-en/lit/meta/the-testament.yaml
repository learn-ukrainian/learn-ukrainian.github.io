slug: the-testament
title: Заповіт
word_target: 5000
content_outline:
  - section: 'Вступ: Історія написання у Переяславі'
    words: 400
    points:
      - 'Біографічний контекст грудня 1845 року: важка хвороба та загроза смерті.'
      - Перебування поета в домі лікаря Андрія Козачковського.
      - Екзистенційна криза і підсумковий характер твору для періоду «Трьох літ».
  - section: 'Вступ: Культурний статус і світова рецепція'
    words: 450
    points:
      - Перетворення тексту на неофіційний національний гімн завдяки музиці Гордія
        Гладкого.
      - Переклади на понад 150 мов світу як інструмент української культурної дипломатії.
      - Символічне значення вірша для глобальної впізнаваності України.
  - section: 'Граматичний вимір: Наказовий спосіб'
    words: 450
    points:
      - Аналіз імперативних конструкцій («поховайте», «вставайте», «порвіте», «окропіте»).
      - 'Граматика як маніфест: перехід від пасивного прохання до чіткого алгоритму
        революції.'
      - Залучення читача як активного виконавця політичної волі.
  - section: 'Граматичний вимір: Умовні конструкції'
    words: 400
    points:
      - 'Синтаксис радикальної умови: «Як умру, то...», «А до того — я не знаю Бога».'
      - Майбутній час і формування чіткої візії волі.
      - Богоборчий мотив як свідчення найвищої самопожертви заради нації.
  - section: 'Поетика тексту: Тричастинна композиційна структура'
    words: 450
    points:
      - 'Частина перша: особистий заповіт і розширення простору від могили до масштабів
        усієї України.'
      - 'Частина друга: заклик до космічного бунту і загальнонаціонального збройного
        повстання.'
      - 'Частина третя: катарсис, входження у нове гармонійне суспільство і прощання.'
  - section: 'Поетика тексту: Ритміка, рима та звуковий ландшафт'
    words: 400
    points:
      - Використання коломийкового вірша (8+6 складів) для створення архетипного народного
        звучання.
      - Алітерації та асонанси (наприклад, сонорне «р» у мотиві ревучого Дніпра).
      - Звукопис як головний засіб передачі емоційної напруги та наростання гніву.
  - section: 'Політичний зміст: Радикалізм та концепція праведного гніву'
    words: 450
    points:
      - Прямий заклик до збройної антиколоніальної боротьби («Вставайте, кайдани порвіте»).
      - 'Осмислення рядків «І вражою злою кров''ю...»: право поневоленої нації на
        кривавий спротив.'
      - Деколонізаційний погляд на постать ворога-імперця.
  - section: 'Політичний зміст: Візія «сім''ї великої, вольної, нової»'
    words: 450
    points:
      - Модель ідеального політичного майбутнього суспільства за Шевченком.
      - Спростування радянського ідеологічного міфу про «братні народи» та «соціалістичну
        родину».
      - Концепція рівноправної, суверенної української нації у цивілізованому світі.
  - section: 'Історія рецепції: Від Російської імперії до радянської цензури'
    words: 450
    points:
      - Поширення твору у рукописних списках через жорстку імперську цензуру.
      - 'Радянська апропріація вірша: штучне зведення тексту до примітивної «класової
        боротьби».'
      - Спроби радянських ідеологів вилучити антиколоніальний та національний сенс
        твору.
  - section: 'Історія рецепції: Національно-визвольні змагання та діаспора'
    words: 450
    points:
      - Використання твору як духовної присяги борцями УНР та вояками УПА.
      - Збереження автентичного сенсу «Заповіту» в культурних колах української еміграції.
      - Сучасне актуалізоване прочитання під час російсько-української війни.
  - section: 'Підсумок: Заповіт як наріжний камінь національної ідентичності'
    words: 400
    points:
      - Причини феноменальної стійкості тексту і його перетворення на символічне ядро
        українства.
      - Вплив твору на консолідацію та формування модерної політичної нації.
      - Універсальність антиімперського послання Тараса Шевченка.
  - section: 'Підсумок: Перехід до високого стилю та біблійних мотивів'
    words: 400
    points:
      - Остаточне утвердження Шевченка в ролі національного пророка.
      - Есхатологічна метафорика прощання, очищення і духовного відродження.
      - Підготовка літературного ґрунту для пізніших біблійних поем та псалмів.
