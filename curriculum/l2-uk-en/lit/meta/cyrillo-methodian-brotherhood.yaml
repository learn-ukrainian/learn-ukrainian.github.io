slug: cyrillo-methodian-brotherhood
title: Кирило-Мефодіївське братство
word_target: 5000
content_outline:
  - section: 'Вступ — Перша політична організація: I — Київ 1840-х років'
    words: 300
    points:
      - Київський університет св. Володимира як новий інтелектуальний осередок української
        думки (заснований 1834 року).
      - Атмосфера європейського романтизму та пожвавлення інтересу до національного
        минулого, фольклору і мови.
      - Знайомство молодих інтелектуалів (Микола Костомаров, Микола Гулак, Василь
        Білозерський) та формування неформального гуртка.
  - section: 'Вступ — Перша політична організація: II — Від гуртка до таємного товариства'
    words: 300
    points:
      - 'Грудень 1845 – січень 1846 року: перехід до формату таємного політичного
        товариства.'
      - 'Символіка: персні з іменами слов''янських просвітителів, власна печатка.'
      - Діяльність у контексті «Весни народів» та ідей «Молодої Європи» Джузеппе Мадзіні.
  - section: 'Засновники і члени: I — Ідеолог Микола Костомаров'
    words: 400
    points:
      - Роль професора історії Миколи Костомарова як головного автора маніфестів братства.
      - 'Його наукове новаторство: вивчення історії простого народу, а не царів чи
        держав.'
      - 'Оформлення концепції «двох руських народностей»: демократичної української
        та деспотичної московської.'
  - section: 'Засновники і члени: II — Організатор Пантелеймон Куліш'
    words: 400
    points:
      - Куліш як головний рушій просвітництва, книговидання та етнографічної роботи.
      - Значення його подорожей Україною для накопичення матеріалу та усвідомлення
        культурної спадщини.
      - 'Еволюційний підхід: національне відродження через освіту народу, а не через
        миттєвий бунт.'
  - section: 'Засновники і члени: III — Радикальне крило Тараса Шевченка'
    words: 450
    points:
      - Поява Шевченка у Києві весною 1846 року та його колосальний вплив на настрої
        братчиків.
      - Читання нелегальної поезії зі збірки «Три літа» (поеми «Сон», «Кавказ»).
      - 'Безкомпромісна революційна позиція Шевченка: заклик до збройного повстання
        проти імперії.'
  - section: 'Книги буття українського народу: I — Жанр та біблійна стилістика'
    words: 400
    points:
      - Основоположний програмний документ братства (інша назва — «Закон Божий»).
      - Свідома стилізація під біблійні тексти для сакралізації національно-визвольної
        ідеї.
      - Літературний та філософський перегук із «Книгами народу польського» Адама
        Міцкевича.
  - section: 'Книги буття українського народу: II — Ідея слов''янської федерації'
    words: 400
    points:
      - Утопічна концепція об'єднання всіх вільних слов'ян (українців, поляків, чехів
        тощо) у єдину федерацію.
      - 'Організація за зразком Сполучених Штатів: кожна нація має свою республіку,
        а спільний сейм збирається у Києві.'
      - Відверте заперечення імперського панславізму, який передбачав асиміляцію Росією.
  - section: 'Книги буття українського народу: III — Концепт українського месіанізму'
    words: 400
    points:
      - Україна як найбільш гноблена нація, котра попри все зберегла глибинний дух
        свободи (з часів козацтва).
      - Використання біблійної метафори про «камінь, який відкинули будівничі, що
        ляже в основу».
      - 'Месіанська роль України: розбудити сусідні народи і стати духовним осердям
        нової вільної Слов''янщини.'
  - section: 'Політична програма: I — Скасування кріпацтва та демократія'
    words: 400
    points:
      - 'Положення Статуту Братства: негайне скасування кріпацтва як неприпустимого
        антихристиянського зла.'
      - Повна ліквідація станової нерівності і привілеїв дворянства.
      - Проголошення гарантованих демократичних прав, свобод та рівності для всіх
        громадян.
  - section: 'Політична програма: II — Християнський соціалізм'
    words: 300
    points:
      - Ідеологічний синтез ідей європейського Просвітництва та етики раннього християнства.
      - Вимога забезпечення широкої освіти для простого народу виключно рідною мовою.
      - Побудова майбутнього суспільного та державного ладу на засадах християнської
        любові.
  - section: 'Розгром і наслідки: I — Донос Петрова і масові арешти'
    words: 400
    points:
      - 'Березень 1847 року: студент Олексій Петров підслуховує розмови братчиків
        і пише донос владі.'
      - Блискавична реакція Третього відділу (таємної поліції імперії) під керівництвом
        графа О. Орлова.
      - 'Масові арешти у березні–квітні: затримання Костомарова перед весіллям, арешт
        Шевченка під час в''їзду до Києва.'
  - section: 'Розгром і наслідки: II — Слідство та жорстокі вироки'
    words: 400
    points:
      - Імператор Микола I особисто контролював слідство, вбачаючи в Братстві загрозу
        сепаратизму («мазепинства»).
      - 'Винесення суворих вироків без відкритого суду: заслання Костомарова і Куліша,
        ув''язнення Гулака.'
      - Особливо жорстока кара для Шевченка за поезію — довічне солдатське заслання
        із суворою забороною писати і малювати.
  - section: 'Підсумок — Ідея, що пережила репресії: I — Трансформація української
      ідеї'
    words: 300
    points:
      - Попри коротке існування (14 місяців), Братство кардинально змінило парадигму
        українського руху.
      - Перехід від суто культурницького інтересу до мови й фольклору до чіткої політичної
        програми (нація, свобода, держава).
      - 'Ідейний фундамент для майбутніх генерацій: від громадівців 1860-х до державотворців
        XX століття.'
  - section: 'Підсумок — Ідея, що пережила репресії: II — Завершення фази романтиків'
    words: 300
    points:
      - Діяльність і крах Кирило-Мефодіївського братства як найвища точка і завершення
        епохи дворянського романтизму.
      - Особиста трагедія і жертовність учасників стали моральним еталоном для української
        нації.
      - Україна вперше в модерній історії заявила про свої політичні права на карті
        Європи.
