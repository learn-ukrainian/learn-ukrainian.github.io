slug: kostenko-marusia-churai-2
title: Kostenko Marusia Churai 2
word_target: 4000
content_outline:
- section: 'Вступ: Історичні умови появи роману'
  words: 400
  points:
  - Створення роману в умовах радянської цензури та шість років затримки публікації
    (1973–1979).
  - Роман як акт інтелектуального спротиву доби брежнєвського застою.
  - Відмова Ліни Костенко від компромісів із системою.
- section: 'Культурний контекст: Місце в літературному каноні'
  words: 400
  points:
  - 'Ліна Костенко як голос шістдесятників: етичний максималізм та відповідальність
    митця.'
  - Відродження жанру історичного роману у віршах.
  - 'Чому текст зберігає актуальність сьогодні: проблеми вибору, війни та національної
    пам''яті.'
- section: 'Аналіз твору: Архітектоніка та композиційні вузли'
  words: 450
  points:
  - 'Специфіка 9 розділів: від суду до сповіді, від прощі до фіналу.'
  - 'Ретроспективна будова сюжету: пам''ять як рушій оповіді.'
  - 'Кульмінаційні моменти: вирок, універсал Хмельницького, подорож до Києва.'
- section: 'Аналіз твору: Історичне тло та сюжетна динаміка'
  words: 450
  points:
  - 'Події 1658 року: пожежа Полтави та повстання Мартина Пушкаря.'
  - Достовірність історичних джерел та художній вимисел авторки.
  - Роль мандрівного дяка як носія філософії історії.
- section: 'Герменевтика: Маруся Чурай як голос нації'
  words: 450
  points:
  - Маруся не просто героїня, а міфологема української душі.
  - 'Пісня як історична пам''ять та зброя: «Це — голос наш. Це — пісня. Це — душа.»'
  - Особиста трагедія, що виростає до масштабів національної драми.
- section: 'Герменевтика: Протистояння духовного і матеріального'
  words: 400
  points:
  - Конфлікт Марусі та Гриця як зіткнення абсолюту та пристосуванства.
  - 'Гриць Бобренко: анатомія зради («ходив ногами по землі»).'
  - 'Іван Іскра як альтернатива: уособлення лицарської честі та державницького мислення.'
- section: 'Поетика: Стилістичні інновації та афористичність'
  words: 400
  points:
  - Багатство та гнучкість віршованої форми Ліни Костенко.
  - 'Афористичність мислення: цитати, що стали народними приказками («Нерівня душ
    — це гірше, ніж майна!»).'
  - Синтаксичні та ритмічні фігури як інструмент психологічного портретування.
- section: 'Стиль: Синтез фольклору та високої літературної традиції'
  words: 350
  points:
  - Органічне вплетення мотивів пісень Марусі Чурай у текст роману.
  - Барокова риторика та розмовна мова XVII століття.
  - 'Естетична довершеність: подолання провінційності народницького дискурсу.'
- section: 'Деколонізаційний вимір: Деконструкція імперського наративу'
  words: 400
  points:
  - Зруйнування радянського міфу про «возз'єднання» та класову боротьбу козаків.
  - Показ українського суспільства XVII ст. як цивілізованої нації з власною елітою
    та правовою культурою.
  - 'Агентність українського героя: відмова від ролі жертви на користь активного творця
    історії.'
- section: 'Підсумок: Спадщина та сучасна рецепція'
  words: 300
  points:
  - Вплив роману на формування національної ідентичності в кінці ХХ століття.
  - 'Світовий контекст: «Маруся Чурай» як український інтелектуальний епос.'
  - 'Питання для дискусії: роль митця під час війни (паралелі із сьогоденням).'
