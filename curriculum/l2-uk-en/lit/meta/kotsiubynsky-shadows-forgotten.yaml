slug: kotsiubynsky-shadows-forgotten
title: '«Тіні забутих предків»: Гуцульський міф'
word_target: 4000
content_outline:
- section: 'Вступ: Історичні умови появи твору'
  words: 400
  points:
  - Відкриття Гуцульщини українською інтелігенцією на початку ХХ століття
  - Подорож Михайла Коцюбинського до Криворівні 1910 року
  - Європейський контекст та перехід від реалізму до модернізму
- section: 'Вступ: Місце твору в сучасному каноні'
  words: 400
  points:
  - Вершина українського імпресіонізму та неоромантизму
  - Твір як синтез етнографії та високої філософії
  - Актуальність тексту в контексті повернення національної ідентичності
- section: 'Аналіз: Джерела та міфологічна основа'
  words: 400
  points:
  - Студіювання праць В. Гнатюка та збір фольклору на Гуцульщині
  - Язичницьке, пантеїстичне світосприйняття карпатських українців
  - Двоєсвіття як основний композиційний принцип повісті
- section: 'Аналіз: Розвиток сюжету та конфлікт'
  words: 450
  points:
  - Мотив Ромео і Джульєтти на гуцульському ґрунті (роди Палійчуків і Гутенюків)
  - Соціальні та екзистенційні конфлікти в творі
  - Природа як активний діючий персонаж і рушій сюжету
- section: 'Герменевтика: Архетипи та міфологічні підтексти'
  words: 450
  points:
  - Аналіз системи духів природи (чугайстир, нявка, щезник)
  - Магія, вірування та ритуали як основа щоденного буття героїв
  - Символіка вогню (ватри), лісу та води у світоглядній системі
- section: 'Герменевтика: Еволюція персонажів'
  words: 500
  points:
  - Іван Палійчук як митець, філософ і носій первісної чуттєвості
  - 'Марічка: духовний зв''язок, музика та трагедія втраченого кохання'
  - 'Палагна і Юра: приземленість, побутова магія та протиставлення духовному'
- section: 'Мова та поетика: Імпресіонізм'
  words: 400
  points:
  - 'Малювання словом: кольористика та візуальні образи'
  - Синестезія та музикальність тексту
  - Синтаксичні інновації Коцюбинського для передачі психологічного стану
- section: 'Мова: Робота з гуцульським діалектом'
  words: 400
  points:
  - Органічна стилізація без надмірної перевантаженості діалектизмами
  - Збереження автентичної мелодики та ритміки мови гуцулів
  - Філософські неологізми автора на основі народних виразів
- section: 'Деколонізація: Руйнування імперського міфу'
  words: 350
  points:
  - Спростування міфу про селян як темну, неосвічену масу
  - Демонстрація високої естетичної культури та філософії гірського народу
  - Відмова від жалісливого народництва на користь модерністського епосу
- section: 'Деколонізація: Агентність та опір асиміляції'
  words: 350
  points:
  - Український герой як повноцінний суб'єкт європейської культури
  - Збереження автентичного міфу як форма культурного самоствердження
  - Текст як декларація самодостатності українського світу
- section: 'Рецепція: Відлуння в кінематографі'
  words: 400
  points:
  - Екранізація Сергія Параджанова (1964) як світовий шедевр
  - Вплив фільму на формування українського поетичного кіно
  - Прем'єра 1965 року як каталізатор дисидентського руху (виступи Дзюби, Стуса)
