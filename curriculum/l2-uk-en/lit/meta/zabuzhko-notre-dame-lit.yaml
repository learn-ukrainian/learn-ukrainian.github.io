slug: zabuzhko-notre-dame-lit
title: Zabuzhko Notre Dame Lit
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Поява есею'
    words: 400
    points:
      - Стан українського літературознавства на початку 2000-х років та інерція радянських
        підходів.
      - Вихід монографії Забужко у 2007 році як інтелектуальний струс і виклик усталеним
        канонам.
      - 'Жанрова специфіка твору: поєднання літературознавства, філософії та психоаналізу.'
  - section: 'Вступ та культурний контекст: Леся Українка між епохами'
    words: 400
    points:
      - 'Історичні умови формування Лариси Косач: перехід від народництва ХІХ століття
        до європейського модернізму.'
      - Місце Лесі Українки в українському літературному каноні та її зв'язок із світовою
        культурою.
      - Актуальність дослідження Забужко для розуміння сучасних культурних процесів.
  - section: 'Аналіз твору: Структура монографії та головна теза'
    words: 400
    points:
      - 'Композиційна будова книги: розгляд генеалогії, релігійно-філософських поглядів
        та етики.'
      - Ключова теза Забужко про «ампутацію пам'яті про власну еліту».
      - Деконструкція сприйняття українців як виключно «селянської нації».
  - section: 'Аналіз твору: Конфлікт міфологій як рушійна сила'
    words: 500
    points:
      - 'Тлумачення підзаголовка твору: природа та суть «конфлікту міфологій».'
      - Зіткнення російського імперського наративу (провінційність) та українського
        лицарського автохтонного міфу.
      - Національна література як поле битви за ідентичність.
  - section: 'Герменевтика та ключові образи: Феномен української шляхти'
    words: 500
    points:
      - Аналіз середовища «Старої Громади», родин Косачів та Драгоманових.
      - Українська аристократія (шляхта) як носій високої культури та національного
        обов'язку (noblesse oblige).
      - Доведення європейського, освіченого характеру української еліти ХІХ століття.
  - section: 'Герменевтика та ключові образи: Лицарський етос і «Notre Dame»'
    words: 550
    points:
      - Детальний розбір метафори «Notre Dame» (Богоматір, духовна фортеця) стосовно
        постаті Лесі Українки.
      - 'Концепт «лицарства» у драматургії та поезії Українки: стоїцизм, вірність
        ідеї, жертовність.'
      - Архетипи та міфологічні підтексти, які авторка виявляє у текстах класикині.
  - section: 'Мова, стиль та поетика: Інтелектуальний дискурс Забужко'
    words: 400
    points:
      - 'Стилістичні інновації Оксани Забужко: складний, розлогий синтаксис («барокові
        періоди»).'
      - Багатство лексики, поєднання високої академічності з емоційною публіцистичністю.
      - Введення нових філософських та літературознавчих термінів в український дискурс.
  - section: 'Мова, стиль та поетика: Риторика та емоційна напруга'
    words: 400
    points:
      - 'Риторичні стратегії тексту: сарказм, іронія щодо радянських догм, полемічна
        гострота.'
      - Авторський голос як інструмент залучення читача до інтелектуального розслідування.
      - Експресивність як спосіб подолання «академічної сухості».
  - section: 'Деколонізаційний вимір: Руйнування радянського міфу'
    words: 500
    points:
      - Розвінчання міфу про Лесю Українку як про «співачку досвітніх огнів» та хвору
        дівчинку.
      - Аналіз методів, якими імперська та радянська критика маргіналізувала її творчість.
      - Повернення до прочитання «незручних» текстів (наприклад, «Боярині»).
  - section: 'Деколонізаційний вимір: Агентність та європейський вибір'
    words: 500
    points:
      - Підтвердження агентності та суб'єктності українського культурного героя.
      - Леся Українка як повноцінна учасниця європейського модерністського діалогу
        (Ніцше, Шопенгауер).
      - Опір асиміляції та утвердження національної самодостатності.
  - section: 'Підсумок та рецепція: Значення для сучасної України'
    words: 500
    points:
      - Вплив монографії на нові покоління українських літературознавців та істориків.
      - Зміна підходів до викладання літератури в школах та університетах.
      - Роль книги у процесах остаточної деколонізації української гуманітаристики.
