slug: introduction-to-kotliarevsky
title: Феномен Івана Котляревського
word_target: 5000
content_outline:
  - section: 'Вступ: Історичний момент 1798 року'
    words: 500
    points:
      - '1798 рік: парадокс появи українського слова на тлі імперської заборони'
      - Стан української культури після ліквідації Гетьманщини (1764-1783)
      - Чому 'Енеїда' стала не просто жартом, а маніфестом
      - Роль видавця Максима Парпури в історії публікації
  - section: 'Біографія: Шлях від семінарії до війська'
    words: 600
    points:
      - Полтавське коріння та навчання в духовній семінарії
      - 'Військова служба (1796-1808): від канцеляриста до штабс-капітана'
      - Участь у російсько-турецькій війні та дипломатичні місії
      - Вплив військового побуту на батальні сцени 'Енеїди'
  - section: 'Біографія: Полтавський період і масонство'
    words: 600
    points:
      - 'Повернення до Полтави: наглядач Будинку виховання дітей бідних дворян'
      - 'Театральна діяльність: директор Полтавського вільного театру'
      - 'Участь у масонській ложі ''Любов до істини'': просвітництво чи політика?'
      - Роль Котляревського у викупі Михайла Щепкіна з кріпацтва
  - section: 'Феномен ''Котляревщини'': Природа сміху'
    words: 800
    points:
      - 'Бурлеск і травестія: визначення та естетичні функції'
      - 'Сміх як культурна зброя: ''одомашнення'' античності'
      - Відмінність українського бурлеску від російського (порівняння з Осиповим)
      - 'Етнографізм ''Енеїди'': енциклопедія українського побуту XVIII ст.'
  - section: 'Мовна революція: Живе слово проти книжного'
    words: 750
    points:
      - Криза староукраїнської книжної мови наприкінці XVIII ст.
      - 'Легалізація народного слова: полтавська говірка як літературний стандарт'
      - Синонімічне багатство та фразеологія у творах Котляревського
      - Вплив мовного вибору на формування національної ідентичності
  - section: 'Європейський контекст: Традиція травестії'
    words: 750
    points:
      - Вергілієва 'Енеїда' як об'єкт пародіювання в Європі (Скаррон, Блюмауер)
      - 'Специфіка української травестії: перелицювання, а не просто переклад'
      - 'Троянці як козаки: накладання античного міфу на національну історію'
      - Синтез бароко, класицизму та сентименталізму
  - section: 'Роль особистості: Стратегія культурного опору'
    words: 600
    points:
      - 'Вибір ідентичності: чому Котляревський не став російським письменником'
      - '''Людина вчинку'': формування козацького полку в 1812 році'
      - 'Асиміляція vs опір: модель поведінки української еліти XIX ст.'
      - Вплив на Кирило-Мефодіївське братство та Шевченка
  - section: 'Підсумок: Від літературного жарту до національного міфу'
    words: 400
    points:
      - Значення Котляревського для українського відродження
      - 'Місце в каноні: ''батько'' нової літератури'
      - Перехід до детального аналізу тексту 'Енеїди' в наступних модулях
