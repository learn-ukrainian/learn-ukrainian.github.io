slug: bu-ba-bu-carnival
title: Bu Ba Bu Carnival
word_target: 5000
content_outline:
  - section: 'Вступ: Історичні передумови та поява'
    words: 550
    points:
      - Заснування групи 17 квітня 1985 року у Львові (Ю. Андрухович, В. Неборак,
        О. Ірванець).
      - Реакція на атмосферу пізнього «застою» та кризу соцреалізму.
      - 'Розшифровка абревіатури: Бурлеск, Балаган, Буфонада.'
  - section: 'Місце в каноні: Від маргіналії до мейнстриму'
    words: 550
    points:
      - Бу-Ба-Бу як обличчя українського постмодернізму 1990-х.
      - Синтез елітарного та масового мистецтва.
      - Виведення поезії з кабінетів на площі та стадіони.
  - section: 'Естетика: Перформанс та карнавалізація'
    words: 700
    points:
      - Концепція карнавалізації Михайла Бахтіна в українському контексті.
      - Фестиваль «Вивих» (1992) як апогей карнавалу.
      - Поезоопера «Крайслер Імперіал» — театралізація поетичного слова.
  - section: 'Естетика: Конфлікт із соцреалізмом'
    words: 550
    points:
      - Відмова від дидактизму, страждальництва та сільської патетики.
      - Урбанізм, еротизм та відкрите літературне хуліганство.
      - Скандальні виступи у Києві та реакція консервативної критики.
  - section: 'Поетика: Тріумвірат та гра з образами'
    words: 550
    points:
      - 'Ігрова ієрархія групи: Патріарх, Прокуратор, Підскарбій.'
      - Зв'язок із традицією українського бароко (І. Котляревський, мандрівні дяки).
      - Міська міфологія та містифікація простору (Львів, Київ, Рівне).
  - section: 'Мовна гра: Деконструкція норми'
    words: 550
    points:
      - Руйнування офіційної, «стерильної» літературної мови.
      - Використання міського сленгу, макаронічної мови та суржику.
      - Стилістичні та версифікаційні експерименти (рими, ритміка).
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 500
    points:
      - Пародіювання радянських кліше та міфологем.
      - Знищення імперського пафосу через гротеск та бурлеск.
      - Нова, не-травматична українська суб'єктність.
  - section: 'Деколонізаційний вимір: Сміх як форма опору'
    words: 500
    points:
      - Сміх як засіб подолання страху перед тоталітарною системою.
      - Карнавал як простір абсолютної свободи.
      - Захист національної ідентичності через іронію, а не через плач.
  - section: 'Підсумок: Рецепція та вплив на сучасність'
    words: 550
    points:
      - Вплив Бу-Ба-Бу на формування покоління «дев'яностиків» та «двотисячників».
      - Академія Бу-Ба-Бу та її роль у літературному процесі.
      - Значення спадщини групи для сучасної європейської України.
