slug: new-prose-resistance
title: New Prose Resistance
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 750
    points:
      - 'Історичні умови появи прози спротиву: від Революції Гідності та АТО (2014)
        до повномасштабного вторгнення (2022)'
      - 'Місце в літературному каноні: еволюція від локальної «ветеранської прози»
        до центрального явища сучасної літератури'
      - 'Чому цей масив текстів важливий сьогодні: функція фіксації пам''яті, свідчення
        про злочини та терапевтична роль для суспільства'
  - section: 'Аналіз твору: Сюжет та структура'
    words: 900
    points:
      - 'Ключові етапи розвитку жанру: домінування автофікшну, щоденників та фрагментарної
        есеїстики замість класичного роману'
      - 'Впливи та джерела: поєднання традиції європейського «втраченого покоління»
        із сучасною документалістикою (нон-фікшн)'
      - 'Конфлікт як рушійна сила: екзистенційне зіткнення крихкості людського життя
        та машини знищення без зайвої романтизації'
  - section: Герменевтика та ключові образи
    words: 900
    points:
      - 'Детальний розбір символіки: образ втраченого Дому, руїни, окоп як пограниччя
        між життям і смертю'
      - 'Система персонажів та їхня еволюція: психологічна трансформація цивільної
        людини у комбатанта'
      - 'Архетипи та міфологічні підтексти: сучасний воїн-захисник, дегероїзація образу
        та фокус на людській вразливості'
  - section: Мова, стиль та поетика
    words: 900
    points:
      - 'Стилістичні інновації авторів: «нульовий градус письма», лаконізм, репортажність
        і відмова від патетики'
      - 'Робота з народною мовою: використання фронтового сленгу, мілітарної термінології
        та суржику як маркерів справжності'
      - 'Особливості ритміки та синтаксису: «рваний» синтаксис, короткі речення, що
        відображають травматичний досвід межі'
  - section: Деколонізаційний вимір
    words: 900
    points:
      - 'Який імперський міф руйнує цей текст: остаточне спростування ідей «аполітичної
        культури» та «братніх народів»'
      - 'Агентність українського героя: перехід від віктимності (жертви) до суб''єктності
        воїна, який зі зброєю боронить свою свободу'
      - 'Опір асиміляції та культурне самоствердження: добровільний мовний перехід
        російськомовних авторів як акт деколонізації'
  - section: Підсумок та рецепція
    words: 750
    points:
      - 'Вплив на наступні покоління письменників: формування нової мілітарної культури
        та етики пам''яті'
      - 'Світовий контекст твору: іноземні переклади як інструмент культурної дипломатії
        та донесення правди до Заходу'
      - 'Питання для дискусії: етичні межі письма про актуальну війну та баланс між
        літературою і документалістикою'
