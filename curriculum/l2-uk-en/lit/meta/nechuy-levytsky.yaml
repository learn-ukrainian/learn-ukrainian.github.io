slug: nechuy-levytsky
title: 'Іван Нечуй-Левицький: Літописець Українського Села'
word_target: 4000
content_outline:
- section: Вступ — Від Куліша до Нечуя
  words: 500
  points:
  - Перехід української літератури від романтизму до соціального реалізму
  - Роль Нечуя-Левицького як фундатора української 'великої прози' в умовах цензури
  - Значення письменника для збереження ідентичності (циркуляри 1863 і 1876 років)
- section: Дитинство і середовище (1838-1859)
  words: 500
  points:
  - Мальовничий Стеблів та родина освіченого священника-патріота
  - Традиції козацького духовенства та вплив батька на світогляд письменника
  - Атмосфера духовного училища та Київської семінарії, пізнання українського села
- section: 'Учительські роки: Робота та спостереження'
  words: 600
  points:
  - Відмова від духовного сану після академії та початок кар'єри вчителя (1865)
  - Вчителювання у російських гімназіях та життя під прихованим наглядом поліції
  - Літературний дебют ('Дві московки', 1868), поява псевдоніма та співпраця з Галичиною
- section: 'Золота доба творчості: Епос кріпацтва'
  words: 600
  points:
  - Повість 'Микола Джеря' (1878) як шедевр соціального реалізму та панорама епохи
  - 'Протест і бунтарство українського селянина: відмова від рабства та втеча ''на
    низ'''
  - 'Деколонізаційний аспект твору: селянин не жертва, а носій волелюбного духу'
- section: 'Золота доба творчості: Сімейна сага'
  words: 650
  points:
  - Повість 'Кайдашева сім'я' (1879) як національний архетип та психологічна драма
  - 'Економічне підґрунтя трагедії: пореформене безземелля та розпад патріархального
    укладу'
  - Яскравий індивідуалізм і зіткнення поколінь (Омелько, Маруся, Мотря, Мелашка)
- section: Візуальний стиль Нечуя
  words: 600
  points:
  - '''Всеобіймаюче око України'': майстерність пейзажу та етнографічної деталізації'
  - Кінематографічність описів та увага до автентичного народного побуту
  - 'Мовна позиція письменника: опора на наддніпрянські говірки та полеміка з ''галицькою''
    нормою'
- section: Підсумок — Останні роки і спадщина
  words: 550
  points:
  - 'Київський період (1885-1918): вихід у відставку та суворо впорядковане літературне
    життя'
  - 'Трагічний фінал: смерть генія у злиднях на тлі революції та розрухи 1918 року'
  - 'Спростування міфу про ''побутописця'': велич Нечуя-Левицького як тонкого психолога
    і хроніста епохи'
