slug: rylsky-liryka
title: Rylsky Liryka
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови'
    words: 400
    points:
      - Феномен «Розстріляного відродження» та культурна атмосфера 1920-х років
      - Формування групи «київських неокласиків» («п'ятірне гроно»)
      - Орієнтація на європейську традицію та гасло «До джерел!»
  - section: 'Вступ та культурний контекст: II — Місце в каноні'
    words: 400
    points:
      - Максим Рильський як провідний лірик-неокласик ХХ століття
      - Доведення спроможності української мови до філософського абстрагування
      - Роль Рильського як культурного містка між епохами
  - section: 'Аналіз твору: Сюжет та структура: I — Ключові етапи розвитку'
    words: 550
    points:
      - Рання лірика та утвердження неокласицизму («Синя далечінь», 1922)
      - 'Арешт 1931 року та злам: перехід до соцреалізму («Знак терезів», 1932)'
      - Період «третього цвітіння» у 1950-х роках («Троянди й виноград»)
  - section: 'Аналіз твору: Сюжет та структура: II — Впливи та конфлікти'
    words: 400
    points:
      - Вплив античної спадщини та французького парнасизму
      - 'Внутрішній конфлікт митця: «чисте мистецтво» проти тоталітарної ідеології'
      - 'Стратегії виживання: переклади як форма ескапізму'
  - section: 'Герменевтика та ключові образи: I — Символіка природи та мистецтва'
    words: 500
    points:
      - Природа як гармонійний ідеал і прихисток (мотиви осені, води, світла)
      - 'Вітаїзм та радість буття: аналіз вірша «Солодкий світ!»'
      - Символіка поєднання краси і праці (троянди й виноград)
  - section: 'Герменевтика та ключові образи: II — Архетипи та міфологічні підтексти'
    words: 500
    points:
      - Античні підтексти у ліриці Рильського
      - 'Постать ліричного героя: інтелектуал-споглядач'
      - Універсалізація українського пейзажу через класичні архетипи
  - section: 'Мова, стиль та поетика: I — Стилістичні інновації'
    words: 500
    points:
      - 'Повернення до строгих канонічних форм: сонет, октава, терцина'
      - 'Аполлонівський первень: гармонійність та відмова від авангардного хаосу'
      - Інтелектуалізм та вишуканість поетичного словника
  - section: 'Мова, стиль та поетика: II — Ритміка та синтаксис'
    words: 400
    points:
      - Прозора ясність і музичність класичного вірша
      - 'Робота з ритмікою: рівновага та монументальність рядка'
      - 'Стилістична диференціація: від неокласичної форми до народнопісенних інтонацій'
  - section: 'Деколонізаційний вимір: I — Руйнування імперського міфу'
    words: 500
    points:
      - Спростування міфу про Рильського як виключно «співця партії»
      - Офіціозна лірика як трагічна ціна фізичного самозбереження
      - Руйнування стереотипу про українську літературу як виключно «селянську»
  - section: 'Деколонізаційний вимір: II — Опір асиміляції'
    words: 500
    points:
      - Збереження українського лексичного багатства в епоху русифікації
      - «Внутрішня еміграція» поета та захист мови (аналіз вірша «Рідна мова»)
      - Агентність через переклад європейської класики
  - section: Підсумок та рецепція
    words: 400
    points:
      - Вплив неокласичної традиції на покоління шістдесятників
      - 'Світовий контекст: причетність до загальноєвропейського модернізму'
      - 'Складна спадщина: дискусія про ціну компромісу в тоталітарному суспільстві'
