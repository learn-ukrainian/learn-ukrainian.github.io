slug: zerov-criticism
title: Zerov Criticism
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст — Історичні передумови
    words: 800
    points:
      - 'Літературна ситуація 1920-х років: домінування пролетарських організацій
        («Плуг», «Гарт»)'
      - Загроза примітивізації мистецтва та провінціалізму
      - Поява київських неокласиків як реакція на масову культуру
  - section: Вступ та культурний контекст — Місце в літературному каноні
    words: 600
    points:
      - Микола Зеров як безперечний лідер, критик та ідеолог неокласичного руху
      - Значення праць «До джерел» (1926) та «Від Куліша до Винниченка» (1929)
      - Феномен Зерова-викладача та його вплив на тогочасну інтелігенцію
  - section: 'Аналіз твору: Сюжет та структура — Концепція «До джерел»'
    words: 600
    points:
      - 'Гасло «Ad fontes!»: заклик до вивчення першоджерел європейської культури'
      - Подолання «просвітянства» та етнографічної обмеженості
      - Аналіз тексту збірки «До джерел» як маніфесту високого модернізму
  - section: 'Аналіз твору: Сюжет та структура — Літературна дискусія 1925–1928'
    words: 600
    points:
      - Участь Зерова у славнозвісній дискусії на боці Миколи Хвильового
      - Академічне та історико-літературне обґрунтування гасла «Європа чи Просвіта?»
      - Полеміка з офіційною партійною критикою
  - section: Герменевтика та ключові образи — Античні та європейські архетипи
    words: 600
    points:
      - Інтерпретація Зеровим античних авторів (Овідій, Вергілій, Горацій)
      - Античність як метафора стійкості (стоїцизму) перед лицем тоталітарного хаосу
      - Перекладацька школа як інструмент розширення лексичних меж української мови
  - section: Мова, стиль та поетика — Інтелектуалізм та емоційна рівновага
    words: 600
    points:
      - Академічний, вишуканий та іронічний стиль есеїстики Зерова
      - Концепт «мистецтва рівноваги» (за його сонетом «Самовизначення»)
      - Ерудиція («тугі бібліофаги») як форма духовного спротиву
  - section: Деколонізаційний вимір — Орієнтація на Європу
    words: 600
    points:
      - Антиімперська сутність звернення до Європи без російського посередництва
      - Деконструкція міфу про українську культуру як «молодшу» чи «селянську»
      - Ствердження суб'єктності та агентності українського інтелектуала
  - section: Підсумок та рецепція — Знищення та сучасне переосмислення
    words: 600
    points:
      - 'Трагічний фінал: арешт 1935 року та розстріл у Сандармосі 1937 року'
      - Десятиліття радянського забуття та таврування як «буржуазного націоналіста»
      - 'Сучасна рецепція: повернення Зерова до канону як символу незламного європейського
        духу України'
