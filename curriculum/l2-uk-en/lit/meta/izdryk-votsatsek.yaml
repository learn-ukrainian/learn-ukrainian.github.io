slug: izdryk-votsatsek
title: Izdryk Votsatsek
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Епоха і феномен'
    words: 550
    points:
      - 'Історичні умови появи твору: 1990-ті роки, розпад тоталітарної системи та
        світоглядна криза.'
      - Юрій Іздрик як ключова фігура «станіславського феномену».
      - Роль журналу «Четвер» (засн. 1989) у формуванні нової генерації письменників.
  - section: 'Вступ та культурний контекст: Канон та актуальність'
    words: 500
    points:
      - Значення «Воццека» (1997) як наріжного каменю українського постмодернізму.
      - Присутність роману у списках найважливіших творів (зокрема, топ-100 від ПЕН-клубу).
      - 'Актуальність тексту сьогодні: мова для опису травматичного досвіду та кризи
        ідентичності.'
  - section: 'Аналіз твору: Сюжет та структура лабіринту'
    words: 550
    points:
      - Відмова від лінійного сюжету на користь фрагментарності та мозаїчності.
      - Роман як «текст-сон» (за визначенням М. Павлишина) та «текст-лабіринт».
      - Ключові етапи внутрішнього блукання протагоніста.
  - section: 'Аналіз твору: Джерела та конфлікт'
    words: 550
    points:
      - 'Інтертекстуальність: відсилання до драми Георга Бюхнера та опери Альбана
        Берга.'
      - Вплив європейського модернізму (зокрема, наративної техніки Джеймса Джойса).
      - 'Конфлікт як рушійна сила: зіткнення розколотого «Я» з хаотичним зовнішнім
        світом.'
  - section: 'Герменевтика та ключові образи: Символіка'
    words: 550
    points:
      - Детальний розбір символіки лабіринту як простору самозаглиблення.
      - Мотив божевілля та сну як методів утечі або пізнання.
      - Тілесність і насильство у потоці свідомості героя як метафора екзистенційного
        болю.
  - section: 'Герменевтика та ключові образи: Персонажі та архетипи'
    words: 550
    points:
      - Воццек як архетип розгубленого інтелектуала на зламі епох.
      - Система другорядних персонажів (Карп Любанський, жінка А.) як фантомів або
        проєкцій протагоніста.
      - Відсутність традиційної еволюції характерів, натомість — безперервна трансформація
        сприйняття.
  - section: Мова, стиль та поетика
    words: 700
    points:
      - 'Стилістичні інновації Юрія Іздрика: поєднання високого інтелектуального регістру
        з маргінальною лексикою.'
      - 'Робота з ритмікою прози: використання довгого синтаксичного дихання.'
      - Поліфонія та техніка потоку свідомості як провідні інструменти творення тексту.
  - section: Деколонізаційний вимір
    words: 550
    points:
      - Руйнування імперського міфу про українську літературу як виключно селянську
        та традиційну.
      - 'Агентність героя: він є суб''єктом складної європейської екзистенційної філософії,
        а не об''єктом колоніального дискурсу.'
      - Культурне самоствердження через інтелектуальну свободу та естетичний радикалізм
        90-х.
  - section: Підсумок та рецепція
    words: 500
    points:
      - Вплив прози Іздрика на наступні покоління українських авторів («двотисячники»).
      - 'Світовий контекст: переклади роману та його сприйняття за кордоном (зокрема,
        у Польщі).'
      - 'Питання для дискусії: межі постмодерної іронії та щирості у сучасній українській
        літературі.'
