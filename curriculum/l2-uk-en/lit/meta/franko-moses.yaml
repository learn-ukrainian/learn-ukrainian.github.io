slug: franko-moses
title: '«Мойсей»: Філософська поема про пророка'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні передумови (1905)'
    words: 500
    points:
      - 'Історичні умови 1905 року: перша революція в імперії, криза народництва'
      - Особиста подорож Франка до Італії (статуя Мікеланджело) як візуальний поштовх
      - Задум твору як відповідь на політичну апатію українського суспільства
  - section: 'Вступ та культурний контекст: Пролог як національний маніфест'
    words: 700
    points:
      - Історія написання Прологу (створений після основної частини)
      - 'Аналіз перших терцин: ''Народе мій, замучений, розбитий...'''
      - Пророцтво Франка про вихід нації 'у народи, вільні колом'
  - section: 'Аналіз твору: Сюжетна канва та архітектоніка'
    words: 500
    points:
      - Структура з 20 пісень та зосередження дії навколо фіналу 40-річного блукання
      - Біблійне тло (книги Вихід і Числа) та його авторська трансформація
      - 'Експозиція конфлікту: вигнання пророка з табору'
  - section: 'Аналіз твору: Суспільний конфлікт (пророк і юрба)'
    words: 550
    points:
      - Датан і Авірон як персоніфікація матеріалізму та конформізму
      - 'Психологія юрби: страх перед невідомим, туга за стабільністю рабства'
      - Самотність лідера, що пропонує ідею замість 'хліба'
  - section: 'Герменевтика та ключові образи: Спокуса Азазеля'
    words: 600
    points:
      - Поява демона пустелі як уособлення внутрішніх сумнівів Мойсея
      - 'Філософський діалог: проблема гордині, істинності Божого поклику'
      - Сумнів пророка як найвища точка екзистенційної драми
  - section: 'Герменевтика та ключові образи: Архетип Мойсея та Єгошуа'
    words: 550
    points:
      - 'Покарання Єгови за хвилинний сумнів: смерть перед межею'
      - 'Трагізм пророка: сіяти зерно, плодів якого не побачиш'
      - Єгошуа (князь конюхів) як символ дієвого, радикального покоління ('До бою!')
  - section: 'Мова, стиль та поетика: Особливості віршування'
    words: 500
    points:
      - Використання терцин Данте у Пролозі (ефект монументальності)
      - 'Ритмічна динаміка: від епічного спокою до напруженого драматизму в діалогах'
      - Біблійна стилізація, притчі (зокрема, казка про дерева, що обирали короля)
  - section: 'Деколонізаційний вимір: Подолання комплексу рабства'
    words: 600
    points:
      - Спростування імперських прочитань твору (відмова від 'клясової' інтерпретації)
      - Метафора 40 років пустелі як необхідного процесу зміни поколінь (смерть рабської
        свідомості)
      - Текст як посібник з набуття нацією політичної суб'єктності та агентності
  - section: 'Підсумок та рецепція: Світовий та український контекст'
    words: 500
    points:
      - Місце Франкового «Мойсея» серед європейських неоромантичних текстів
      - Вплив поеми на покоління Розстріляного відродження та шістдесятників
      - Актуальність тексту для сучасної України в умовах екзистенційної війни
