slug: ethnography
title: 'Етнографія як Література: Український Світ Квітки'
word_target: 5000
content_outline:
  - section: 'Вступ: Обряд як структура оповіді'
    words: 400
    points:
      - Обряд як рушійна сила сюжету в класичній українській прозі
      - 'Відмінність українського сентименталізму: емоції через ритуал'
      - Весілля і похорон як два головні полюси-«каркаси» людського життя
  - section: 'Вступ: Феномен Квітки-етнографа'
    words: 400
    points:
      - 'Спростування імперського міфу: «Маруся» як маніфест української мови'
      - Квітка як дослідник і документаліст Слобожанщини
      - Деталізація побуту як спосіб збереження національної ідентичності
  - section: 'Весільний обряд I: Від сватання до заручин'
    words: 500
    points:
      - Сватання як складна соціальна дипломатія
      - Аналіз ритуальних формул ввічливості (метафори про «куницю» та «мисливців»)
      - 'Заручини та дівич-вечір: прощання з дівоцтвом'
  - section: 'Весільний обряд II: Вінчання та бенкет'
    words: 400
    points:
      - Вінчання як сакральна легітимізація шлюбу
      - 'Весільний бенкет: ієрархія та частування'
      - Роль громади у визнанні нової родини
  - section: 'Драматургія весілля: «Сватання на Гончарівці»'
    words: 400
    points:
      - 'Етнографічна комедія: обігравання весільних традицій'
      - Конфлікт почуттів і майнових інтересів у п'єсі
      - Соціальні типи українського села крізь призму сватання
  - section: 'Похоронний обряд I: Естетика смерті'
    words: 400
    points:
      - Функція смерті в сентиментальній естетиці повісті «Маруся»
      - Голосіння та плач як публічний вияв найглибшого горя
      - 'Деколонізаційний аспект: смиренність перед Богом, а не пасивний фаталізм'
  - section: 'Похоронний обряд II: Прощання і пам''ять'
    words: 400
    points:
      - Детальний опис похоронної процесії
      - Поминки як ритуал соціального єднання та пам'яті
      - Християнська філософія Наума Дрота перед обличчям втрати
  - section: 'Економічна етнографія: Феномен чумацтва'
    words: 450
    points:
      - 'Хто такі чумаки: зародження українського підприємництва'
      - 'Географія та логістика: Чумацький шлях (Україна — Крим — Одеса)'
      - Військова організація та небезпеки чумацького промислу
  - section: Чумацтво в сюжеті повісті «Маруся»
    words: 400
    points:
      - Наум Дрот як втілення успішного чумака-господаря
      - 'Майновий ценз: чумацький капітал проти бідності наймита Василя'
      - Вплив чумацтва на формування соціального статусу в селі
  - section: 'Соціальна топографія I: Церква і Шинок'
    words: 400
    points:
      - Церква як абсолютний духовний та моральний центр громади
      - Шинок як профанний простір, місце соціальних угод та комунікації
      - Протиставлення двох просторів у творах Квітки
  - section: 'Соціальна топографія II: Хата як мікрокосм родини'
    words: 400
    points:
      - Хата не як «хижа», а як суворо впорядкований космос
      - 'Сакральні зони в хаті: покуть, поріг, піч'
      - Родинна ієрархія, що відображається у просторі хати
  - section: 'Спадщина: Код нації та народні цінності'
    words: 450
    points:
      - Цінності та страхи українського селянства XIX століття
      - Квітка-Основ'яненко як «архіваріус» та конструювальник нації
      - 'Естафета поколінь: від Квітки до «Тіней забутих предків» Коцюбинського'
