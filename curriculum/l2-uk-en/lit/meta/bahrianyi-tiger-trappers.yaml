- section: 'Образи: Система персонажів'
  words: 350
  points:
  - Григорій Многогрішний як утілення українського козацького духу та волі
  - 'Родина Сірків: збереження морального здоров''я та національної ідентичності на
    Зеленому Клині'
  - 'Майор Медвин: уособлення бездушної каральної системи НКВС та професійного садизму'
- section: 'Образи: Архетипи та міфи'
  words: 350
  points:
  - 'Архетип дороги та ініціації: очищення через випробування тайгою'
  - 'Козацький міф: тайга перетворюється на новітню Запорозьку Січ для українців'
  - 'Міфологема предків: прізвище Многогрішного та спадкоємність боротьби за свободу'
- section: 'Мова: Стилістичні інновації'
  words: 300
  points:
  - Поєднання неоромантичного пафосу, натуралістичних деталей та пригодницького драйву
  - Динамічний синтаксис та рваний ритм для передачі психологічного напруження
  - Майстерність пейзажних замальовок Сіхоте-Аліня як контраст до тюремних сцен
- section: 'Мова: Особливості ритміки та народна стихія'
  words: 300
  points:
  - Збереження українського мовного колориту Зеленого Клину у діалогах
  - Роль фольклоризмів та приказок («Сміливі завжди мають щастя»)
  - Використання мисливського лексикону та регіоналізмів Далекого Сходу
- section: 'Деколонізація: Руйнування імперського міфу'
  words: 350
  points:
  - Відмова від образу українця як вічної жертви чи 'меншого брата'
  - Спростування всемогутності та непереможності радянських каральних органів
  - Зелений Клин як український простір, а не російська колоніальна периферія
- section: 'Деколонізація: Агентність та опір'
  words: 350
  points:
  - Вбивство Медвина як усвідомлений акт повернення гідності і винесення справедливого
    вироку
  - Абсолютна суб'єктність Григорія Многогрішного, який бере долю у власні руки
  - Тема права нації на збройний опір тоталітаризму
- section: 'Підсумок: Світовий контекст та рецепція'
  words: 200
  points:
  - Міжнародний успіх англомовного видання у США та Великій Британії (1955)
  - Перегук роману з філософією європейського екзистенціалізму
  - Значення роману для сучасного осмислення українського опору імперії
