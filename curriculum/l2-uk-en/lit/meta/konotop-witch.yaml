slug: konotop-witch
title: 'Конотопська Відьма: Сатира на Руїну'
word_target: 4000
content_outline:
- section: 'Вступ — Найтемніша і найсмішніша повість: I — Бурлеск і контрасти'
  words: 400
  points:
  - Контраст із сентиментальною 'Марусею' як доказ стильової універсальності Квітки-Основ'яненка.
  - Бурлескний реалізм як метод зображення хиб суспільства.
  - 'Зміна регістру: від сліз і розчулення до нищівного сарказму.'
- section: 'Вступ — Найтемніша і найсмішніша повість: II — Сатира на адміністративний
    ідіотизм'
  words: 400
  points:
  - 'Історичне тло кінця XVIII століття: занепад сотенного устрою та Гетьманщини.'
  - Конотоп як мікромодель колонізованої України, де панує абсурд.
  - Критика некомпетентності влади, що керується забобонами, а не законом.
- section: 'Сюжет — полювання на відьму: I — Сотник і писар'
  words: 400
  points:
  - 'Микита Забрьоха як номінальний керівник: його ''похід'' як пародія на козацьку
    доблесть.'
  - Прокіп Пістряк як сірий кардинал і справжній керманич Конотопа.
  - 'Комедія положень: підміна наказів та маніпуляція сотником.'
- section: 'Сюжет — полювання на відьму: II — Топлення жінок'
  words: 400
  points:
  - Кульмінаційна сцена іспиту водою як вираз найвищої міри самодурства.
  - 'Трагікомізм ситуації: жорстоке поводження з жінками під прикриттям ''боротьби
    за дощ''.'
  - Викриття особистої помсти Пістряка через інституціоналізоване насильство.
- section: 'Антигерої — галерея типів: I — Забрьоха і Пістряк'
  words: 400
  points:
  - 'Психологічний портрет Забрьохи: лінь, інтелектуальна обмеженість, культ їжі.'
  - 'Портрет Пістряка: хитрість, корумпованість, мстивість (''Буде суча дочка знати...'').'
  - Симбіоз тупості та лукавства як основа корумпованої влади.
- section: 'Антигерої — галерея типів: II — Еліта як антипод народу'
  words: 400
  points:
  - Втрата старшиною захисної та державотворчої функції.
  - Паразитування влади на звичайних козаках і міщанах.
  - 'Деколонізаційний аспект: перетворення козака-лицаря на російського чиновника-посіпаку.'
- section: 'Готика та народна демонологія: I — Відьма як літературний образ'
  words: 400
  points:
  - Явдоха Зубиха як активний рушій сюжету та найрозумніший персонаж твору.
  - Двоїста природа відьми (молода вночі, стара вдень) як елемент української демонології.
  - Містична влада відьми як замінник відсутнього закону та справедливості.
- section: 'Готика та народна демонологія: II — Функція фантастичного'
  words: 400
  points:
  - Запозичення елементів готичного роману, але зі зміною їхньої функції.
  - Використання фантастики не для продукування жаху, а для висміювання абсурду.
  - Забобони як інструмент управління неосвіченим натовпом.
- section: 'Мовна стилізація: I — Канцеляризми та макаронічна мова'
  words: 400
  points:
  - Штучна мова Пістряка як свідчення його псевдоосвіченості.
  - 'Канцелярит XVIII століття: суміш церковнослов''янізмів, русизмів та покручів.'
  - Використання вульгаризмів та лайки як маркер моральної деградації еліти.
- section: 'Підсумок — Енциклопедія шахрайства: I — Вплив і спадщина'
  words: 400
  points:
  - Значення повісті як предтечі модерної містичної сатири.
  - 'Вічна актуальність: ''Конотопська відьма'' як діагноз некомпетентності чиновництва.'
  - 'Баланс між сміхом і сльозами: гірка правда про суспільство Руїни.'
