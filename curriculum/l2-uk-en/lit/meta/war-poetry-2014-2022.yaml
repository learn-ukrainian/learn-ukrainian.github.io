slug: war-poetry-2014-2022
title: War Poetry 2014 2022
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови появи жанру'
    words: 550
    points:
      - 'Хронологія розвитку воєнної поезії: від первинного шоку російського вторгнення
        2014 року до повномасштабної війни 2022 року.'
      - Формування феномену 'комбатантської літератури' та поезії свідчення (testimony
        literature).
      - Чому саме поезія стала першим і наймобільнішим жанром, що відреагував на екзистенційну
        кризу.
  - section: 'Вступ та культурний контекст: II — Місце в літературному каноні'
    words: 400
    points:
      - Інтеграція фронтової лірики до сучасного канону української літератури.
      - Паралелі з європейською поезією Першої світової війни ('trench poets') та
        українським поколінням Розстріляного відродження.
      - Значення текстів як історичного та емоційного документа епохи.
  - section: 'Аналіз твору: Сюжет та структура етапів війни'
    words: 550
    points:
      - 'Структурні особливості: фрагментарність, форма ''щоденникових записів'' і
        миттєва фіксація моменту.'
      - 'Базовий конфлікт жанру: зіткнення простору життя і пам''яті з простором смерті
        та руйнування.'
      - 'Сюжетна лінія: від втрати Дому і адаптації до бойових дій до прийняття нової
        ідентичності воїна.'
  - section: 'Герменевтика та ключові образи: I — Еволюція ліричного героя'
    words: 550
    points:
      - 'Трансформація ліричного суб''єкта: цивільна людина, яка стає комбатантом,
        але прагне зберегти власну людяність.'
      - Аналіз образу воїна-захисника на прикладах текстів Максима Кривцова, Павла
        Вишебаби, Артура Дроня.
      - Психологічна дистанція між ліричним героєм в окопі та мирним тилом.
  - section: 'Герменевтика та ключові образи: II — Архетипи та символіка'
    words: 450
    points:
      - Ревізія традиційних українських архетипів Землі (як матері-годувальниці і
        як могили-окопу).
      - 'Символіка Сходу: степ, терикони, вугілля як простір метафізичної екзистенційної
        битви.'
      - Образи тілесності, крові та фізичної травми в поетичному тексті.
  - section: 'Мова, стиль та поетика: I — Стилістичні інновації та неологізми'
    words: 550
    points:
      - Вторгнення окопної, мілітарної лексики у високий ліричний регістр.
      - Використання ненормативної лексики як інструменту відтворення екстремального
        стресу і травми.
      - Конструювання нових мовних засобів для опису досвіду, який неможливо висловити
        звичайною мовою.
  - section: 'Мова, стиль та поетика: II — Ритміка та синтаксис травми'
    words: 450
    points:
      - Тотальний перехід до верлібру як форми, що найбільше відповідає розірваній
        свідомості війни.
      - 'Рваний синтаксис, еліпсиси, анжамбемани: імітація переривчастого дихання
        та ритму бою.'
      - Феномен написання текстів у смартфонах безпосередньо на передовій та його
        вплив на поетичну форму.
  - section: 'Деколонізаційний вимір: I — Руйнування імперського міфу'
    words: 550
    points:
      - Літературне спростування російського пропагандистського міфу про 'громадянську
        війну' на Донбасі.
      - Деконструкція концепту 'братніх народів' та остаточний цивілізаційний розрив
        з імперією.
      - Переосмислення індустріального простору Сходу через призму української ідентичності
        (творчість Л. Якимчук).
  - section: 'Деколонізаційний вимір: II — Агентність та опір'
    words: 450
    points:
      - 'Відмінність української воєнної поезії від західної пацифістської лірики:
        герой виступає свідомим суб''єктом опору.'
      - Відмова українських митців від російської мови як політичний і культурний
        маніфест.
      - Поезія як форма національного самоствердження всупереч політиці стирання.
  - section: Підсумок та рецепція
    words: 550
    points:
      - 'Рецепція української воєнної лірики на Заході: переклади як інструмент культурної
        дипломатії.'
      - Вплив комбатантської поезії на формування новітньої національної пам'яті та
        ідентичності.
      - 'Питання для дискусії: роль митця під час війни та етика репрезентації травми.'
