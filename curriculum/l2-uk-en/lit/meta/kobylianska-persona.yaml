slug: kobylianska-persona
title: Kobylianska Persona
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Буковина і формування ідентичності'
    words: 550
    points:
      - Історичні умови появи феномену Кобилянської на Буковині кінця XIX століття
      - Полікультурне середовище Австро-Угорщини та німецькомовна освіта
      - 'Місце в літературному каноні: подолання провінційності та вихід на європейський
        рівень'
  - section: 'Вступ та культурний контекст: Український вибір'
    words: 550
    points:
      - Свідомий перехід від німецької до української мови як акт культурної суб'єктності
      - 'Вплив жіночого оточення: Софія Окуневська та Наталія Кобринська'
      - Чому фігура Кобилянської важлива для сучасної ідентичності
  - section: 'Аналіз твору: Сюжет та структура ранніх текстів'
    words: 700
    points:
      - Ключові етапи розвитку сюжету на прикладі повісті «Людина» та роману «Царівна»
      - 'Структура модерністського роману: перехід від зовнішньої дії до внутрішнього
        монологу'
      - Вплив західноєвропейської літератури на архітектоніку текстів
  - section: 'Аналіз твору: Конфлікт емансипації та традиції'
    words: 600
    points:
      - Конфлікт патріархального суспільства (міщанства) та емансипованої жінки
      - Право на працю, освіту та відмова від шлюбу за розрахунком як рушійна сила
        сюжету
      - Інтелектуальне протистояння та екзистенційна самотність героїні
  - section: 'Герменевтика та ключові образи: Архетип нової жінки'
    words: 600
    points:
      - Детальний розбір символіки «Царівни» — жінки з «аристократизмом духу»
      - 'Система персонажів: еволюція незалежної жінки та криза традиційної маскулінності'
      - Образ жінки-мисткині та творця своєї долі
  - section: 'Герменевтика та ключові образи: Філософські підтексти'
    words: 600
    points:
      - Трансформація ідей Ф. Ніцше та концепт «надлюдини» у феміністичному вимірі
      - Міфологічні підтексти та архетипна роль природи (фаталізм у «Землі»)
      - Герменевтика індивідуалізму та духовного вдосконалення («різьбити самі себе»)
  - section: Мова, стиль та поетика
    words: 500
    points:
      - 'Стилістичні інновації автора: неоромантизм, символізм, глибокий психологізм'
      - Музичність прози («Valse mélancolique») та відхід від етнографізму
      - Особливості ритміки та складного синтаксису модерністського тексту
  - section: Деколонізаційний вимір
    words: 500
    points:
      - Руйнування радянського імперського міфу про «письменницю-народницю» та «побутописця»
      - 'Агентність українського героя: репрезентація повноцінної інтелектуальної
        нації'
      - Опір культурній провінціалізації та утвердження України в європейському дискурсі
  - section: Підсумок та рецепція
    words: 400
    points:
      - Вплив на наступні покоління українських письменниць (Ірина Вільде, Оксана
        Забужко)
      - 'Світовий контекст творчості: Кобилянська і європейський фемінізм'
      - 'Питання для дискусії: актуальність ідей Кобилянської у XXI столітті'
