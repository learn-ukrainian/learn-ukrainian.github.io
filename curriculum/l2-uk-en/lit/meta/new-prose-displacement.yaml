slug: new-prose-displacement
title: New Prose Displacement
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Феномен літератури переміщених осіб'
  words: 400
  points:
  - Масова поява внутрішньо переміщених осіб (ВПО) після початку агресії РФ у 2014
    році та відображення цього досвіду в літературі.
  - Автори та герої-переселенці як носії унікального голосу, що фіксує втрату дому
    та пошук нової ідентичності.
  - Чому література переміщених осіб стала одним із найважливіших явищ в сучасній
    українській культурі.
- section: 'Вступ та культурний контекст: II — Історичні умови та місце в каноні'
  words: 400
  points:
  - Реакція літературного середовища на окупацію Криму та частини Донбасу.
  - Трансформація статусу російськомовних письменників сходу України та їхній свідомий
    перехід до українського культурного поля.
  - Входження «донецького тексту» з маргінесу в саме ядро загальнонаціонального літературного
    канону.
- section: 'Аналіз твору: I — Сюжетні моделі досвіду ВПО'
  words: 450
  points:
  - Розгляд ключових етапів розвитку сюжету на прикладі знакових творів («Доця» Т.
    Горіха Зерні, «Мондегрін» В. Рафєєнка).
  - 'Дві основні моделі: наратив активного спротиву в окупації та наратив болісної
    адаптації біженця у новому місті.'
  - Впливи реальних документальних подій на формування художнього наративу.
- section: 'Аналіз твору: II — Конфлікт та травма як рушійна сила'
  words: 450
  points:
  - Зовнішній конфлікт (збройна агресія, загроза життю) як каталізатор внутрішнього
    конфлікту персонажів.
  - Художнє осмислення травми біженства, провини вцілілого та розриву соціальних зв'язків.
  - Пошук нової точки опори через прийняття втрати.
- section: 'Герменевтика та ключові образи: I — Архетип втраченого дому'
  words: 450
  points:
  - Детальний розбір символіки втраченого дому (Донецька, Луганська) не як географічної
    точки, а як простору пам'яті.
  - Міфологізація залишених міст, що перетворюються на метафізичні міражі.
  - Символіка невидимості та маргінальності переселенця у новому соціумі.
- section: 'Герменевтика та ключові образи: II — Символіка та еволюція персонажів'
  words: 450
  points:
  - 'Система персонажів та їхня еволюція: від стану шоку і розгубленості до формування
    активної громадянської позиції.'
  - Архетипи Одіссея (вічного блукальця) та екзистенційні підтексти подорожі.
  - Пам'ять як поле битви між офіційною історією та особистим досвідом.
- section: 'Мова, стиль та поетика: I — Мовний зсув та стилістичні інновації'
  words: 500
  points:
  - Свідомий перехід авторів-переселенців (В. Рафєєнко, О. Стяжкіна) на українську
    мову як безпрецедентне стилістичне явище.
  - Використання мови як головного інструменту терапії та як своєрідного «нового дому».
  - Особливості синтаксису, що відображає розірвану, фрагментовану свідомість травмованої
    людини.
- section: 'Мова, стиль та поетика: II — «Мондегрін» як метафора'
  words: 450
  points:
  - Розбір поняття «мондегрін» як розгорнутої метафори лінгвістичного відчуження та
    соціокультурного непорозуміння.
  - Робота авторів з народною мовою, міським сленгом та змішуванням мовних кодів.
  - Специфіка ритміки текстів, що передають занурення у нову мовну стихію.
- section: 'Деколонізаційний вимір: Опір асиміляції та руйнування міфів'
  words: 450
  points:
  - Руйнування імперського міфу про «монолітний проросійський Донбас» через демонстрацію
    потужного українського руху опору.
  - 'Агентність українського героя: перетворення з об''єкта обставин на активного
    суб''єкта історії.'
  - Свідома відмова від російського культурного простору на користь українського самоствердження.
- section: 'Підсумок та рецепція: Вплив та світовий контекст'
  words: 400
  points:
  - Вплив літератури ВПО на наступні покоління письменників та формування загальнонаціональної
    емпатії.
  - 'Світовий контекст: як переклади цих творів допомогли міжнародній спільноті зрозуміти
    людський вимір війни в Україні.'
  - Питання для дискусії щодо ролі літератури в опрацюванні колективної травми.
