slug: klen-poetry
title: "Юрій Клен: Попіл без Батьківщини — Неокласик в Еміграції між Двома Катастрофами"
word_target: 5000
content_outline:
- section: 'Вступ: I — Неокласик, що вийшов за межі'
  words: 500
  points:
  - 'Юрій Клен (Освальд-Бургард, 1891–1947): від київського неокласика до засновника МУР — траєкторія, що перетяла два світи.'
  - "Від'їзд до Німеччини 1931 року — втеча від репресій чи виклик: контекст рішення і його наслідки."
  - Місце Клена у подвійній традиції — київська неокласична школа і повоєнна еміграційна поезія як дві половини одного досвіду.
- section: 'Вступ: II — МУР і культурна місія еміграції'
  words: 500
  points:
  - 'Мистецький Український Рух (МУР, 1945–1948): дискусія між «органічним стилем» і модернізмом — де стоїть Клен?'
  - Клен і Самчук — різні бачення того, що таке «еміграційна», або краще — «незалежна», українська культура.
  - 'Дискусія про «малоросійство»: чи стала еміграція більш чи менш «українською» ніж материкова культура під совєтами?'
- section: 'Аналіз: «Попіл Клена» (1943) — епічна поема і катастрофа'
  words: 700
  points:
  - 'Структура епосу: п''ять книг про долю покоління від революції до Другої світової — поема як пам''ятник цілому поколінню.'
  - Трагедія Розстріляного відродження очима очевидця-вигнанця — як зовнішній погляд бачить те, що не бачить внутрішній.
  - 'Символіка попелу: що залишається від культури після знищення — і чи попіл може стати ґрунтом для нового?'
- section: 'Аналіз: Лірика 1930–40-х — ностальгія і нова ідентичність'
  words: 700
  points:
  - 'Мотив Києва в еміграційній ліриці: образ міста, яке стає легендою і внутрішньою Батьківщиною.'
  - 'Зустріч з Заходом: що змінилося у поетиці після виїзду — нові теми, нові метафори, нова самотність.'
  - Любовна лірика і пейзажна поезія — де особисте перетинається з культурно-політичним.
- section: 'Перекладацька і критична діяльність: Місток між культурами'
  words: 600
  points:
  - Переклади Гете і Шиллера — Клен як культурний медіатор між українською і германською традиціями.
  - 'Літературно-критичні есеї: Клен про Рильського, Тичину, Плужника — оцінки з відстані і без совєтської цензури.'
  - Порівняльне літературознавство як метод усвідомлення власної традиції через відстань і зіставлення.
- section: 'Стилістика: Класичне і романтичне у зрілій поетиці Клена'
  words: 500
  points:
  - 'Баланс між неокласичною стриманістю і романтичною патетикою еміграції — як Клен знаходить власну тональність.'
  - 'Версифікаційні рішення: октава і терцина — чому Клен обирає «важкі» форми у час особистої і культурної катастрофи.'
  - Порівняння мови до і після еміграції — трансформації словника і образного ряду під впливом нового досвіду.
- section: 'Деколонізаційна перспектива: Еміграція як незалежна культурна зона'
  words: 500
  points:
  - Еміграційна культура 1945–1949 рр. — альтернатива до совєтського канону, а не нація-у-вигнанні без майбутнього.
  - 'Чому совєти боялися МУР: вільне слово без цензури як загроза навіть за кордоном — операції проти еміграції.'
  - Значення Клена для розуміння того, що «нація» є більше ніж держава і більше ніж територія.
- section: 'Підсумок: Клен і питання про тяглість'
  words: 500
  points:
  - Вплив Клена на Нью-Йоркську групу — що вона успадкувала і від чого відштовхнулася.
  - Повернення «Попелу Клена» в Україну після 1991 — рецепція серед нового покоління і нова актуальність.
  - Еміграційна поезія як невід'ємна частина українського канону — не «інша» традиція, а його необхідна частина.
