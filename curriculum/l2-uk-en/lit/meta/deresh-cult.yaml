slug: deresh-cult
title: Deresh Cult
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Феномен юного автора'
    words: 350
    points:
      - Історичні умови появи роману «Культ» у 2001 році
      - 'Літературний дебют у 16 років: як Любко Дереш став голосом покоління'
      - Реакція критики та читачів на неформатний текст
  - section: 'Вступ та культурний контекст: II — Місце в літературному каноні'
    words: 350
    points:
      - Роль роману у формуванні сучасної української підліткової та молодіжної літератури
      - Розрив із традицією дидактичної шкільної повісті
      - Чому цей текст залишається знаковим для розуміння 2000-х років
  - section: 'Аналіз твору: Сюжет та структура: I — Містика Мідних Буків'
    words: 600
    points:
      - 'Експозиція: прибуття Юрка Банзая до карпатського містечка Мідні Буки'
      - Конфлікт героя із закритим, химерним середовищем місцевої школи
      - Розвиток сюжету через призму жанру містичного трилера
  - section: 'Аналіз твору: Сюжет та структура: II — Лавкрафтіанські впливи'
    words: 400
    points:
      - Вплив творчості Г.Ф. Лавкрафта та естетики фільмів жахів на структуру роману
      - 'Джерела натхнення: від світового фентезі до психоделіки'
      - Ескалація конфлікту з потойбічним злом як рушійна сила оповіді
  - section: 'Герменевтика та ключові образи: I — Символіка Древніх'
    words: 350
    points:
      - Детальний розбір міфології та символіки Древніх божеств
      - Монстри як метафора суспільного тиску, конформізму або екзистенційного жаху
      - Архетипи зла в українському урбаністичному фентезі
  - section: 'Герменевтика та ключові образи: II — Юрко Банзай та Дарця Борхес'
    words: 350
    points:
      - 'Психологічний портрет головного героя: вчитель-бунтар'
      - 'Образ Дарці Борхес: еволюція, вплив імені (відсилка до Х.Л. Борхеса)'
      - Взаємодія та динаміка стосунків між персонажами
  - section: 'Герменевтика та ключові образи: III — Архетип підліткового бунту'
    words: 350
    points:
      - Пошук власної ідентичності в умовах відчуження
      - Езотеричні та психоделічні підтексти як спроба втечі від дійсності
      - Мотив ініціації та переходу до дорослості
  - section: 'Мова, стиль та поетика: I — Сленг та молодіжний дискурс'
    words: 400
    points:
      - Особливості ритміки, жива розмовна мова та синтаксис Дереша
      - Використання молодіжного сленгу 2000-х як інструменту автентичності
      - 'Стилістичні інновації: руйнування літературних штампів'
  - section: 'Мова, стиль та поетика: II — Іронія та ритміка тексту'
    words: 350
    points:
      - Іронічна та самоіронічна інтонація автора
      - 'Музикальність тексту: вплив рок-культури (Pink Floyd та ін.) на структуру
        речень'
      - Постмодерна гра з читачем та жанровими кліше
  - section: 'Деколонізаційний вимір: I — Руйнування імперського міфу'
    words: 400
    points:
      - Спростування міфу про виключно «страждальницьку» та «сільську» українську
        літературу
      - Пряма інтеграція у західний глобальний культурний простір без російського
        посередництва
      - Створення повноцінного українського жанрового продукту (горор/фентезі)
  - section: 'Деколонізаційний вимір: II — Агентність українського підлітка'
    words: 400
    points:
      - Герої твору як активні творці, а не пасивні об'єкти історії
      - Відкидання радянських ментальних патернів новим поколінням
      - Культурне самоствердження через бунт і альтернативні знання
  - section: 'Підсумок та рецепція: I — Світовий контекст та переклади'
    words: 350
    points:
      - Успіх роману на європейському ринку (переклади німецькою, польською, французькою
        тощо)
      - Сприйняття «Культу» західною критикою (Suhrkamp Verlag)
      - Включення українського твору в загальноєвропейський літературний контекст
  - section: 'Підсумок та рецепція: II — Вплив на наступні покоління'
    words: 350
    points:
      - Як «Культ» відкрив шлях для інших молодих українських письменників
      - Оцінка значення роману з перспективи сьогоднішнього дня
      - 'Питання для дискусії: актуальність проблематики твору для сучасної молоді'
