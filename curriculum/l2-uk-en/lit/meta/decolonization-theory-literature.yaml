slug: decolonization-theory-literature
title: Decolonization Theory Literature
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 750
    points:
      - Історичні умови появи постколоніальної оптики в Україні на початку 1990-х
        років (Марко Павлишин)
      - Адаптація західних теорій (Е. Саїд, Ф. Фанон) до специфіки російської континентальної
        імперії
      - Місце деколоніальних праць (М. Рябчук, В. Агеєва, О. Забужко) у сучасному
        каноні
  - section: 'Аналіз твору: Сюжет та структура — Концептуальна мапа'
    words: 500
    points:
      - 'Ключові етапи розвитку деколоніального наративу: від розпаду імперії до кристалізації
        власного голосу'
      - Впливи світового постмодернізму та постколоніалізму на формування структури
        нових текстів
      - Огляд концептуальних есеїв як своєрідного сюжету визволення свідомості
  - section: 'Аналіз твору: Сюжет та структура — Динаміка конфлікту'
    words: 500
    points:
      - 'Внутрішній конфлікт ідентичності: зіткнення імперського («малоросійського»)
        та автентичного'
      - Подолання комплексу меншовартості як головна рушійна сила інтелектуальної
        прози
      - Конфлікт центру та колишньої колонії на культурному полі
  - section: Герменевтика та ключові образи — Символіка травми
    words: 500
    points:
      - Детальний розбір символіки «ампутованої пам'яті» та посттоталітарної німоти
      - Тілесність і мова як простір травми у текстах Оксани Забужко
      - 'Архетип колонізованої свідомості: від роздвоєння до цілісності'
  - section: Герменевтика та ключові образи — Нові міфологеми
    words: 500
    points:
      - 'Еволюція системи персонажів: перехід від образу жертви-мученика до активного
        інтелектуала'
      - Ревізія народницьких архетипів та творення міського європейського міфу України
      - Міфологічні підтексти національного відродження
  - section: Мова, стиль та поетика
    words: 750
    points:
      - 'Стилістичні інновації: використання карнавальності, іронії та гротеску для
        руйнування радянського пафосу'
      - 'Очищення словника: повернення репресованої лексики та відмова від колоніального
        новоязу'
      - Особливості ритміки та синтаксису в прозі Забужко та есеїстиці Рябчука
  - section: Деколонізаційний вимір — Агентність героя
    words: 500
    points:
      - 'Набуття суб''єктності: герой як творець власної історії'
      - Опір асиміляції та утвердження культурної самодостатності
      - Подолання віктимного дискурсу в українській літературі
  - section: Деколонізаційний вимір — Руйнування імперських міфів
    words: 500
    points:
      - Викриття імперського міфу про провінційність української культури
      - Деконструкція концепту «братніх народів» і російського культурного месіанства
      - Текст як зброя інтелектуального спротиву
  - section: Підсумок та рецепція
    words: 500
    points:
      - Вплив праць Павлишина, Агеєвої, Забужко на нові покоління українських авторів
      - Вихід українського деколоніального дискурсу на світову академічну арену
      - 'Питання для дискусії: незавершеність процесу деколонізації в умовах сучасної
        війни'
