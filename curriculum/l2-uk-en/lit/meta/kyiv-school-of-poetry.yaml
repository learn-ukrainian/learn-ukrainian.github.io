slug: kyiv-school-of-poetry
title: 'Київська школа поезії: Герметизм як форма опору в 1970-х'
word_target: 5000
content_outline:
- section: 'Вступ: Атмосфера 1970-х років в Україні'
  words: 500
  points:
  - Епоха застою після арештів шістдесятників.
  - Домінування соцреалізму та жорстка цензура.
  - Пошук нових форм висловлювання в умовах неможливості відкритого протесту.
- section: 'Феномен Київської школи: Хто ці поети?'
  words: 600
  points:
  - Василь Голобородько, Микола Воробйов, Віктор Кордун, Михайло Григорів.
  - Неформальне об'єднання без маніфестів і статутів.
  - Відмежування від публіцистичності та громадянського пафосу шістдесятників.
- section: Естетика і філософія герметизму
  words: 800
  points:
  - Орієнтація на міф, архетип, прамову.
  - Сюрреалізм, верлібр та метафоричність як основа поетики.
  - Відмова від римування та традиційної строфіки як бунт проти форми.
- section: 'Василь Голобородько: Поезія «Летючого віконця»'
  words: 700
  points:
  - Дитяча, «наївна» оптика сприйняття світу.
  - Фольклорні мотиви без традиційної етнографічності.
  - Трагедія виключення з літературного процесу на 20 років.
- section: 'Микола Воробйов і Віктор Кордун: Пейзаж душі'
  words: 700
  points:
  - Візуальність та живописність поезії Воробйова («Ожина»).
  - Складні метафоричні конструкції Кордуна («Сонцестояння»).
  - Природа як єдиний вільний простір.
- section: 'Пасивний опір: Ігнорування радянської дійсності'
  words: 600
  points:
  - Чому влада забороняла поезію без політичних гасел?
  - Герметизм як збереження внутрішньої свободи.
  - Відмова писати «на замовлення» епохи.
- section: 'Деколонізаційний зріз: Повернення до коренів'
  words: 600
  points:
  - Очищення мови від ідеологічних штампів і русизмів.
  - Звернення до язичницьких, трипільських глибин українського космосу.
  - Формування альтернативного, неімперського наративу.
- section: 'Підсумок: Вплив на наступні покоління'
  words: 500
  points:
  - Визнання і публікації в кінці 1980-х — на початку 1990-х.
  - Вплив на вісімдесятників (І. Римарук, В. Герасим'юк) та дев'яностиків.
  - Київська школа як міст між модернізмом і постмодерном.
