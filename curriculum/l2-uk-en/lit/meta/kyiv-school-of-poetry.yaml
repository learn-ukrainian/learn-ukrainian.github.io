slug: kyiv-school-of-poetry
title: 'Київська школа поезії: Герметизм як форма опору в 1970-х'
word_target: 5000
content_outline:
- section: 'Вступ: Атмосфера 1970-х років в Україні'
  words: 400
  points:
  - 'Епоха застою після арештів шістдесятників: кінець відлиги та початок жорстких
    репресій.'
  - Тотальне домінування соцреалізму та неможливість публікації без ідеологічної складової.
  - Поява «витісненого покоління», яке відмовляється від компромісів із владою.
- section: 'Феномен Київської школи: Формування та учасники'
  words: 400
  points:
  - Студентське середовище філологічного та філософського факультетів Київського університету.
  - 'Ядро групи: Василь Голобородько, Микола Воробйов, Віктор Кордун, Михайло Григорів.'
  - Історія виникнення назви (запропонована Ігорем Калинцем у 1969 році) та статус
    неформального об'єднання.
- section: 'Естетика і філософія: Відмова від соцреалізму та верлібр'
  words: 400
  points:
  - Свідоме відмежування від громадянського пафосу та публіцистичності шістдесятників.
  - Використання верлібру (вільного вірша) як інструменту звільнення від жорстких
    літературних канонів.
  - Зосередження на «чистій поезії», що не обслуговує жодних політичних ідеологій.
- section: 'Естетика і філософія: Міфологізм та натурфілософія'
  words: 400
  points:
  - Звернення до архетипів, міфологічного мислення та фольклорних мотивів у нетрадиційному
    ключі.
  - Сюрреалістична образність та асоціативна (недискурсивна) побудова тексту.
  - Людина як органічна частина Природи та Всесвіту, а не її «підкорювач».
- section: 'Василь Голобородько: Поезія «Летючого віконця»'
  words: 500
  points:
  - '«Наївна» та глибоко міфологічна оптика: сакралізація щоденних речей та побуту.'
  - Аналіз впливу збірки «Летюче віконце», виданої в Парижі 1970 року (видавництво
    «Смолоскип»).
  - 'Репресії: виключення з університету та 20-річна заборона на публікації в Україні.'
- section: 'Микола Воробйов: Живописність та візуальна пластика'
  words: 400
  points:
  - 'Специфіка поетики Воробйова: поезія як словесний живопис.'
  - Екстремальний лаконізм та гіперувага до візуальної та слухової деталі.
  - Створення багатовимірних образів без прямого повчання.
- section: 'Віктор Кордун: Філософська лірика та пошук першооснов'
  words: 400
  points:
  - Роль Кордуна як ключового ідеолога та теоретика угруповання (стаття «Київська
    школа поезії — що це таке?»).
  - Складні метафоричні конструкції та звернення до етико-філософських проблем буття.
  - Пошук праоснови та універсальних смислів існування.
- section: 'Пасивний опір: Герметизм як форма свободи'
  words: 400
  points:
  - Чому радянська влада боялася «аполітичної» та незрозумілої поезії?
  - Герметизм текстів (складність, зашифрованість) як захисний механізм і простір
    внутрішньої свободи.
  - Повне ігнорування радянської дійсності як найвищий ступінь нонконформізму.
- section: 'Деколонізаційний зріз: Повернення до українського космосу'
  words: 400
  points:
  - Очищення мови від партійних штампів, русизмів та ідеологічного сміття.
  - Вибудовування альтернативного, неімперського наративу через звернення до дохристиянських
    (трипільських, язичницьких) шарів української культури.
  - Утвердження української мови як самодостатнього онтологічного всесвіту (як у вірші
    В. Голобородька «Наша мова»).
- section: 'Підсумок: Вплив на наступні покоління'
  words: 300
  points:
  - Легалізація спадщини наприкінці 1980-х та офіційне визнання в часи Незалежності.
  - Безпосередній вплив на покоління вісімдесятників (Ігор Римарук, Василь Герасим'юк).
  - 'Значення Київської школи: збереження тяглості українського модернізму між Розстріляним
    відродженням та сучасністю.'
