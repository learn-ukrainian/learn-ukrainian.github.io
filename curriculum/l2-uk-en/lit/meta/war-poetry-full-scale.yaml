slug: war-poetry-full-scale
title: War Poetry Full Scale
word_target: 4000
content_outline:
- section: 'Вступ: Поезія після 24 лютого 2022 року'
  words: 400
  points:
  - Миттєва реакція літератури на повномасштабну екзистенційну загрозу
  - 'Поезія як найдинамічніший жанр рефлексії: від метафорики до прямого свідчення'
- section: 'Культурний контекст: Поет-воїн як феномен'
  words: 400
  points:
  - 'Трансформація митця: від спостерігача до комбатанта (Максим Кривцов, Павло Вишебаба)'
  - 'Спадкоємність поколінь: паралелі з Розстріляним відродженням, але з власною збройною
    суб''єктністю'
- section: 'Тематика: Екзистенційний вимір та свідчення'
  words: 500
  points:
  - 'Література як суворий документ: фіксація воєнних злочинів та колективної травми'
  - Пошук сенсу, Бога і людяності в умовах постійної близькості смерті
- section: 'Конфлікт: Життя і смерть у фронтовій ліриці'
  words: 400
  points:
  - 'Зіткнення двох реальностей: тил і фронт (на прикладі вірша Вишебаби «Тільки не
    пиши мені про війну»)'
  - Життєствердність всупереч тотальному фізичному знищенню
- section: 'Ключові образи: Тілесність і травма'
  words: 400
  points:
  - Натуралістичність фронтового досвіду у творчості Максима Кривцова
  - Тіло воїна як поле бою, простір пам'яті та елемент пейзажу (злиття із землею)
- section: 'Архетипи: Дім, окоп, пам''ять'
  words: 400
  points:
  - 'Трансформація простору: бліндаж як новий химерний дім і межа між світами'
  - Архетип втраченого дому та збереження пам'яті про мирне минуле як якір
- section: 'Стилістика: Документалізм та руйнація метафори'
  words: 500
  points:
  - Відмова від традиційної декоративної фігуративності на користь жорсткого факту
  - Ритміка, що відтворює рваний подих війни, тривожність та фрагментарність свідомості
- section: 'Мова: Нова лексика війни та синтаксис болю'
  words: 400
  points:
  - Вторгнення мілітарної термінології та армійського сленгу в поетичну мову
  - Злам класичного синтаксису для передачі шокового стану та травматичного досвіду
- section: 'Деколонізація: Руйнація міфу про «братні народи»'
  words: 300
  points:
  - Остаточне емоційне та ментальне прощання з імперськими ілюзіями в поетичних текстах
  - Чітка ідентифікація російського ворога без евфемізмів та компромісів
- section: 'Агентність: Збройний опір та самоствердження'
  words: 300
  points:
  - Поезія не безіменної жертви окупації, а свідомого воїна, який дає відсіч
  - Конструювання сильної, збройної та незламної української ідентичності
- section: 'Рецепція: Суспільний резонанс і світовий контекст'
  words: 400
  points:
  - Феномен популярності поетичних збірок (наклади, вірусність у соцмережах, пісні)
  - Переклади української поезії війни іноземними мовами як голос правдивої української
    боротьби для світу
