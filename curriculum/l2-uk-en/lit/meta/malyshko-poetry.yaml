slug: malyshko-poetry
title: Malyshko Poetry
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови'
    words: 450
    points:
      - Формування Андрія Малишка у період сталінського терору та Другої світової
        війни
      - Трагічний досвід фронтового кореспондента та вплив на світогляд
      - Балансування між вимогами соцреалізму та збереженням ліричного голосу
  - section: 'Вступ та культурний контекст: II — Місце в каноні'
    words: 450
    points:
      - 'Переосмислення постаті: від «офіційного поета» до класика національної пісенної
        лірики'
      - Роль Малишка як мосту між Розстріляним відродженням та шістдесятниками
      - Чому його тексти залишаються актуальними в сучасній Україні
  - section: 'Аналіз твору: Сюжет та структура: I — Пісня-романс'
    words: 550
    points:
      - Розбір «Пісні про рушник» (1959) як вершини малої форми
      - 'Ключові етапи ліричного сюжету: відправлення в дорогу, благословення, прощання'
      - Відсутність зовнішнього конфлікту, зосередженість на внутрішньому емоційному
        стані
  - section: 'Аналіз твору: Сюжет та структура: II — Баладний епос'
    words: 500
    points:
      - Аналіз баладних творів фронтового циклу та поеми «Прометей»
      - 'Конфлікт як рушійна сила: життя проти смерті, свобода проти тиранії'
      - 'Джерела натхнення: фольклорний епос та Шевченкова традиція'
  - section: 'Герменевтика та ключові образи: I — Архетип Матері'
    words: 500
    points:
      - Мати як космогонічний центр поезії Малишка
      - Детальний розбір символіки вишитого рушника (доля, оберіг, пам'ять роду)
      - Кольористика та семантика образів («червоне — то любов...»)
  - section: 'Герменевтика та ключові образи: II — Міфологічні підтексти'
    words: 450
    points:
      - 'Система персонажів: звичайна людина як носій епічної величі'
      - Прометеївський архетип незламності духу
      - Трансформація античного та слов'янського міфу в українських реаліях
  - section: 'Мова, стиль та поетика: I — Фольклорна основа'
    words: 450
    points:
      - 'Стилістичні інновації: неоромантизм на базі народнопісенної традиції'
      - Робота з народною мовою та тропами (сталі епітети, паралелізми)
      - Трактування слова («Поезія — це діло совісне»)
  - section: 'Мова, стиль та поетика: II — Музичність і ритміка'
    words: 450
    points:
      - Особливості ритміки, що роблять тексти ідеальними для співу
      - 'Синтаксичні прийоми: інверсії, рефрени, алітерації'
      - Співпраця з композиторами (зокрема Платоном Майбородою)
  - section: 'Деколонізаційний вимір: I — Опір під маскою лояльності'
    words: 450
    points:
      - Руйнування міфу про Малишка як про беззастережного апологета радянської імперії
      - Захист української мови та виступи проти русифікації у 1960-ті роки
      - Публічний захист репресованих митців (промова на похороні В. Сосюри)
  - section: 'Деколонізаційний вимір: II — Агентність українського героя'
    words: 450
    points:
      - Культурне самоствердження нації через ліричного героя
      - Збереження української ідентичності в умовах тоталітарного тиску
      - Спротив асиміляції через глибоке укорінення в національну традицію
  - section: 'Підсумок та рецепція: Вплив і контекст'
    words: 450
    points:
      - Вплив спадщини Малишка на генерацію шістдесятників (В. Симоненко, І. Драч)
      - 'Світовий контекст твору: переклади та міжнародне звучання «Пісні про рушник»'
      - Питання для дискусії щодо ролі митця в тоталітарній державі
