slug: franko-historical-prose
title: Franko Historical Prose
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови'
    words: 450
    points:
      - Написання повісті «Захар Беркут» у 1882 році в умовах наростання національно-визвольних
        рухів у Галичині.
      - Звернення Франка до подій монгольської навали 1241 року як спосіб говорити
        про сучасну роздробленість та потребу єднання.
      - Історична проза як інструмент формування національної свідомості в умовах
        імперського тиску.
  - section: 'Вступ та культурний контекст: Місце в каноні'
    words: 450
    points:
      - Твір як один із перших великих українських епічних історичних романів, що
        здобув світове визнання (переклади понад 10 мовами).
      - Концепція твору, де головним героєм є не князь чи полководець, а сам народ
        (вільна громада).
      - 'Актуальність тексту сьогодні: утвердження ідей громадського самоврядування
        та відкритої збройної відсічі загарбникам.'
  - section: 'Аналіз твору: Сюжет та структура конфлікту'
    words: 500
    points:
      - 'Багаторівнева структура конфлікту: зовнішнє протистояння (Тухля проти монгольської
        орди Пети і Бурунди).'
      - 'Внутрішній конфлікт: боротьба вільної демократичної громади проти феодальної
        сваволі та індивідуалізму боярина Тугара Вовка.'
      - Динаміка сюжету від романтичної лінії Максима і Мирослави до масштабної епічної
        катастрофи в улоговині.
  - section: 'Аналіз твору: Джерела та літописна основа'
    words: 450
    points:
      - Використання фактажу з Галицько-Волинського літопису (описи битви на Калці
        1224 р., князівських міжусобиць).
      - Спирання на карпатські фольклорні перекази і легенди про затоплення монгольського
        війська та чарівний камінь.
      - Баланс історичної достовірності епохи Русі з художнім вимислом і романтичним
        пафосом Івана Франка.
  - section: 'Герменевтика: Детальний розбір символіки'
    words: 500
    points:
      - Символіка гір та священного каменя-Сторожа як уособлення предків, захисту
        і непорушності громадських традицій.
      - 'Вода як подвійна сила: очисна стихія природи та смертельна зброя, керована
        народним генієм і мудрістю.'
      - 'Символізм Сонця: пантеїстична молитва Захара до світила як прояв віри в істину
        і перемогу світла над темрявою орди.'
  - section: 'Герменевтика: Система персонажів та архетипи'
    words: 550
    points:
      - Захар Беркут як архетип мудрого старця, хранителя законів, для якого благо
        громади вище за життя сина.
      - 'Максим та Мирослава: молоде покоління, що об''єднує відвагу русичів і здатність
        переступати через класові обмеження.'
      - 'Тугар Вовк: трагічний образ відступника, який через гординю і жадобу влади
        стає колаборантом і зрадником.'
  - section: 'Мова, стиль та поетика: Стилістичні інновації'
    words: 450
    points:
      - Унікальний синтез романтичного піднесення (велич природи, героїзм) із реалістичною
        психологічною деталізацією персонажів.
      - 'Кінематографічність панорамних описів: битва в гірській улоговині, рух стихії
        води та масові сцени віча.'
      - Майстерність у передачі внутрішніх монологів і моральних сумнівів (зокрема,
        злам Тугара Вовка та вибір Мирослави).
  - section: 'Мова, стиль та поетика: Народна мова та синтаксис'
    words: 450
    points:
      - Вплетення архаїзмів та бойківських діалектизмів для створення достовірного
        історичного та географічного колориту Карпат XIII століття.
      - 'Особливості синтаксису: епічний, билинний і подекуди біблійний ритм оповіді
        в монологах Захара Беркута.'
      - Асиміляція фольклорних мотивів безпосередньо в мовну тканину (прислів'я, пісенні
        ритми, заклинання).
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 500
    points:
      - Заперечення радянського/імперського міфу, який зводив суть твору виключно
        до «класової боротьби» селян і бояр.
      - 'Деконструкція міфу про рятівну роль централізованої князівської влади: Тухля
        виживає завдяки своїй автономії та відсутності княжого диктату.'
      - Критика боярської зради як жорстка історична паралель з колабораціонізмом
        українських еліт (малоросійством) у пізніші епохи імперського панування.
  - section: 'Деколонізаційний вимір: Агентність та опір'
    words: 450
    points:
      - Репрезентація української громади як повноцінного суб'єкта історії, здатного
        до складної військової самоорганізації.
      - 'Перемога тухольців як доказ можливості успішного спротиву: герої відмовляються
        від пасивної віктимності на користь безкомпромісного знищення ворога.'
      - Пророцтво Захара Беркута про силу згуртованого народу як універсальний деколонізаційний
        заклик до сучасників Франка і майбутніх поколінь.
  - section: 'Підсумок та рецепція: Вплив і контекст'
    words: 350
    points:
      - Довготривалий вплив повісті на розвиток жанру історичної романістики в українській
        літературі ХХ і ХХІ століть.
      - Рецепція твору в кінематографі (від радянських екранізацій до сучасного фільму
        2019 року) та актуалізація в умовах російсько-української війни.
      - 'Світовий контекст: паралелі із західноєвропейськими історичними романами
        епохи романтизму та національними епосами Європи.'
