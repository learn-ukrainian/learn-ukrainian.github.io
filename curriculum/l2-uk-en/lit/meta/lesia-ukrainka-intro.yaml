slug: lesia-ukrainka-intro
title: 'Леся Українка: Донька Прометея'
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 450
    points:
      - 'Історичні умови появи феномену Лесі Українки: епоха модернізму та fin de
        siècle.'
      - Місце авторки в українському та європейському літературних канонах (подолання
        етнографізму).
      - 'Актуальність інтелектуального спадку сьогодні: легітимізація стоїцизму та
        агентності.'
  - section: 'Біографія та творчий шлях I: Становлення та впливи'
    words: 450
    points:
      - Походження з родини інтелектуалів (Косачі, Драгоманови) як фундамент української
        ідентичності.
      - Самоосвіта, феноменальна ерудиція та поліглотія (знання понад 10 мов).
      - Вплив європейської культури, подорожей та ідей Михайла Драгоманова на формування
        світогляду.
  - section: 'Біографія та творчий шлях II: Конфлікт як рушійна сила'
    words: 450
    points:
      - Внутрішній конфлікт і боротьба з хворобою як метафора духовної сили особистості.
      - Перехід від ліричної традиції до створення європейської драми ідей («Одержима»).
      - Конфлікт із консервативним суспільством та еволюція модерністської свідомості
        авторки.
  - section: 'Герменевтика та ключові образи I: Філософська лірика та символіка'
    words: 650
    points:
      - 'Детальний розбір символіки ключових поезій: світло/темрява, камінь/вогонь,
        воля/неволя.'
      - Архетип Прометея та концепція неоромантичного героїзму («Contra spem spero!»).
      - Зброя-слово як інструмент духовного спротиву («Слово, чому ти не твердая криця...»).
  - section: 'Герменевтика та ключові образи II: Міфологічні підтексти драми-феєрії'
    words: 550
    points:
      - Система персонажів та їхня еволюція у «Лісовій пісні» на прикладі Мавки та
        Лукаша.
      - Конфлікт між духовним і матеріальним, вічним та скороминущим (природа проти
        соціуму).
      - 'Міфологічні підтексти: фольклор як філософська база для екзистенціального
        вислову.'
  - section: 'Мова, стиль та поетика I: Стилістичні інновації та неоромантизм'
    words: 450
    points:
      - 'Стилістичні інновації авторки: введення української літератури у контекст
        європейського модернізму.'
      - 'Специфіка жанру драматичної поеми («Кассандра», «Оргія»): пріоритет інтелектуального
        конфлікту.'
      - Використання світових сюжетів (античних, ранньохристиянських) як алегорії
        для української бездержавності.
  - section: 'Мова, стиль та поетика II: Ритміка, синтаксис та неологізми'
    words: 450
    points:
      - 'Особливості ритміки та метрики: подолання традиційних форм віршування, освоєння
        білого вірша.'
      - Синтаксичні конструкції та риторичні фігури, що підсилюють напругу та драматизм.
      - Мовотворчість авторки та збагачення української мови абстрактно-філософською
        термінологією.
  - section: 'Деколонізаційний вимір I: Деконструкція імперського міфу'
    words: 550
    points:
      - Руйнування радянського образу «співачки досвітніх огнів» та «друга пролетарів».
      - 'Відмова від імперського мінстрельства: аналіз драматичної поеми «Оргія» як
        притчі про колоніальну культуру.'
      - Спростування міфу про «хвору дівчину», утвердження образу потужного європейського
        інтелектуала.
  - section: 'Деколонізаційний вимір II: Опір асиміляції та агентність'
    words: 550
    points:
      - 'Агентність українського героя: здатність до екзистенційного вибору («Хто
        визволиться сам...»).'
      - 'Антиімперський дискурс драми «Бояриня»: жорстка критика конформізму та асиміляції
        української еліти.'
      - Опір русифікації та культурне самоствердження на противагу московській політиці
        стирання ідентичності.
  - section: Підсумок та рецепція
    words: 450
    points:
      - Спадщина Лесі Українки та її вплив на шістдесятників і рух опору дисидентів.
      - 'Світовий контекст твору: європейська рецепція текстів та переклади.'
      - 'Питання для дискусії: чому антиімперські тези авторки сьогодні звучать найгостріше.'
