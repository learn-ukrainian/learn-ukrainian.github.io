slug: stefanyk-novellas
title: Stefanyk Novellas
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови появи'
  words: 400
  points:
  - Відхід від народницької традиції до європейського модернізму.
  - Вплив краківського культурного середовища та Станіслава Пшебишевського.
  - Зародження українського літературного експресіонізму на зламі XIX–XX століть.
- section: 'Вступ та культурний контекст: II — Місце в каноні'
  words: 400
  points:
  - Значення збірки «Синя книжечка» (1899) для європейського визнання.
  - Стефаник як ключова фігура українського модернізму.
  - Актуальність експресіоністичного дослідження травми сьогодні.
- section: 'Аналіз твору: Сюжет та структура: I — Сюжетна канва'
  words: 450
  points:
  - 'Огляд сюжетної лінії «Камінного хреста»: прощання Івана Дідуха з селом.'
  - 'Шокова фабула новели «Новина»: межова безвихідь Гриця Летючого.'
  - Початок твору з кульмінації (відсутність розлогої експозиції).
- section: 'Аналіз твору: Сюжет та структура: II — Драматизм і конфлікт'
  words: 450
  points:
  - Реальна масова еміграція галичан як джерело трагічного конфлікту.
  - Катастрофічний внутрішній стан свідомості героїв.
  - Екстремальність умов та фатальна зумовленість обставин.
- section: 'Герменевтика та ключові образи: I — Символіка'
  words: 450
  points:
  - Камінний хрест як символ могили, страждань та вічної пам'яті.
  - 'Амбівалентний образ Землі: годувальниця і кровопивця.'
  - Мотив макабричного танцю (танець Івана Дідуха з дружиною як акт відчаю).
- section: 'Герменевтика та ключові образи: II — Архетипи і психологія'
  words: 450
  points:
  - Іван Дідух як архетип Сізіфа та українського хлібороба-титана.
  - 'Психологічна глибина без багатослів''я: вираження внутрішнього болю через зовнішню
    напругу.'
  - 'Система персонажів: селяни в екзистенційній прикордонній ситуації.'
- section: 'Мова, стиль та поетика: I — Експресіоністичний лаконізм'
  words: 450
  points:
  - Максимальна стислість, «оголеність» форми та обірваний синтаксис.
  - Домінування емоційно-напружених монологів (внутрішній крик) над авторською оповіддю.
  - Стилістичні інновації Стефаника у жанрі короткої прози.
- section: 'Мова, стиль та поетика: II — Покутський діалект'
  words: 400
  points:
  - Органічність покутського говору у розкритті психології героїв.
  - Діалект як засіб автентичності та неможливість повноцінного перекладу емоційного
    надриву.
  - 'Мовний дуалізм: баланс між літературною основою та народним мовленням.'
- section: Деколонізаційний вимір
  words: 400
  points:
  - Руйнування імперського наративу про пасивного й примітивного 'мужика'.
  - 'Агентність українського героя: спорудження хреста як акт гідності та культурного
    самоствердження.'
  - Стефаник виводить українського селянина на рівень загальнолюдської філософської
    трагедії.
- section: Підсумок та рецепція
  words: 350
  points:
  - Величезний вплив на сучасників (І. Франко) та наступні покоління письменників.
  - Стефаник і європейський експресіонізм (паралелі з Кафкою, Мунком).
  - Питання для дискусії щодо сучасної інтерпретації травми втрати Батьківщини.
