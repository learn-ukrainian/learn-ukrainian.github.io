slug: synthesis-4
title: 'Синтез: Горизонти епохи 4'
word_target: 5000
content_outline:
  - section: 'Діахронний аналіз: I — Еволюція ідей та архетипів'
    words: 450
    points:
      - Відновлення розірваної традиції Розстріляного відродження в умовах «відлиги».
      - Еволюція архетипу національного мучеництва та стійкості у творах шістдесятників.
  - section: 'Діахронний аналіз: II — Літературний діалог поколінь'
    words: 450
    points:
      - Свідомий діалог письменників-дисидентів із класиками (Шевченко, Леся Українка,
        Франко) як джерело моральної опори.
      - Текст як міст між поколіннями крізь прірву радянського тоталітаризму.
  - section: 'Деколонізаційна оптика: I — Стратегії інтелектуального опору'
    words: 500
    points:
      - Феномен українського «самвидаву» як формування альтернативного, вільного культурного
        простору.
      - Створення непідконтрольних державі дискурсів через есеїстику та публіцистику.
  - section: 'Деколонізаційна оптика: II — Деконструкція імперського міфу'
    words: 500
    points:
      - Аналіз епохальної праці І. Дзюби «Інтернаціоналізм чи русифікація?» як концептуального
        інструменту деколонізації.
      - Системне викриття імперської брехні про «злиття націй» та прихованого етноциду.
  - section: 'Стилістичний калейдоскоп: I — Авторські техніки та експерименти'
    words: 450
    points:
      - Радикальна відмова від естетики соцреалізму на користь модерних та постмодерних
        пошуків.
      - Звернення до міфопоетики, сюрреалізму та герметичної лірики (як у представників
        Київської школи).
  - section: 'Стилістичний калейдоскоп: II — Еволюція літературної мови'
    words: 450
    points:
      - 'Трансформація поетичної мови: відмова від радянського новоязу та канцеляриту.'
      - Повернення питомої української лексики як форма естетичного і політичного
        спротиву.
  - section: 'Філософія ідентичності: I — Конструювання національного суб''єкта'
    words: 500
    points:
      - Література як простір подолання постколоніального синдрому та конструювання
        вільного українського суб'єкта.
      - Утвердження національної суб'єктності через осмислення власної історії.
  - section: 'Філософія ідентичності: II — Етика як форма спротиву'
    words: 600
    points:
      - Моральний максималізм та концепція «прямостояння» у табірній творчості Василя
        Стуса.
      - Відмова від компромісів із тоталітарним режимом як головна умова справжності
        мистецького слова.
  - section: 'Спадщина та горизонти: I — Вплив на сучасний контекст'
    words: 550
    points:
      - Рецепція здобутків шістдесятників і дисидентів у сучасній українській літературі.
      - Значення перепоховання Стуса, Тихого і Литвина (1989) як межі епох.
  - section: 'Спадщина та горизонти: II — Канон та інтелектуальна безпека'
    words: 550
    points:
      - Засвоєння літературного канону епохи 4 як інструмент формування національної
        стійкості.
      - Тексти періоду опору як імунітет та зброя в умовах сучасної війни за ідентичність.
