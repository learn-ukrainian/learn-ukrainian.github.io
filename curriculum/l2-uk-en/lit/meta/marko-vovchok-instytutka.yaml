slug: marko-vovchok-instytutka
title: 'Марко Вовчок: «Інститутка» та антикріпосницька проза'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови'
    words: 450
    points:
      - Переддень скасування кріпацтва та наелектризована атмосфера в суспільстві
      - Історія написання (Немирів, Петербург, Париж, 1858-1859)
      - Зміна назви з «Панночки» на «Інститутку» як сатиричний випад проти системи
  - section: 'Вступ та культурний контекст: Місце в каноні'
    words: 450
    points:
      - Статус першої української соціально-побутової повісті
      - Перехід від етнографічного романтизму до соціального реалізму
      - Актуальність проблематики свободи та інституційного насильства сьогодні
  - section: 'Аналіз твору: Розвиток сюжету'
    words: 500
    points:
      - Особливості композиції та розгортання сюжетних ліній
      - 'Ключові етапи: приїзд Інститутки, переїзд на хутір, кульмінація з Прокопом'
      - Трагічна розв'язка та перехід Устини до статусу вільної наймички
  - section: 'Аналіз твору: Конфлікт та джерела'
    words: 450
    points:
      - 'Непримиренний антагонізм між двома світоглядами: паразитичним і працьовитим'
      - Біографічне підґрунтя та спостереження Марії Вілінської за життям селян
      - Конфлікт як рушійна сила соціально-психологічного тексту
  - section: 'Герменевтика: Устина та Прокіп'
    words: 500
    points:
      - 'Устина: архетип моральної стійкості, оптимізм як механізм виживання'
      - 'Прокіп: еволюція від терпіння до відкритого чоловічого протесту'
      - Концепт «волі» у світогляді поневолених
  - section: 'Герменевтика: Образ Інститутки та символіка'
    words: 450
    points:
      - Інститутка як уособлення дегуманізуючої влади та хибної імперської освіти
      - Садизм і тиранія як наслідок внутрішньої порожнечі
      - Міфологічні підтексти та архетип злої мачухи-пані
  - section: 'Мова, стиль та поетика: Стилістичні інновації'
    words: 500
    points:
      - 'Революційна наративна техніка: розповідь від першої особи (Устини)'
      - Емоційна достовірність та емпатичне наближення читача до героя
      - Поєднання епічного розмаху з глибоким психологізмом
  - section: 'Мова, стиль та поетика: Ритміка та народна мова'
    words: 450
    points:
      - Трансформація живої народної мови у літературний ідіолект
      - Ритмізована проза, що успадковує інтонації народної пісні
      - Використання прислів'їв та фразеологізмів для характеристики персонажів
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 450
    points:
      - Спростування міфу про «освічену російську еліту» на периферії
      - Викриття патріархальної ідилії кріпацтва
      - Контраст між моральним виродженням панів та чистотою селян
  - section: 'Деколонізаційний вимір: Агентність та опір'
    words: 450
    points:
      - Демонстрація здатності українських селян до активного спротиву
      - Втеча Назара та бунт Прокопа як антиколоніальний протест
      - Відмова від імперського кліше «покірного і безмовного малороса»
  - section: Підсумок та рецепція
    words: 450
    points:
      - Визнання Марка Вовчка Тарасом Шевченком як літературної спадкоємиці
      - Вплив на наступні покоління реалістів (І. Нечуй-Левицький, П. Мирний)
      - Світовий контекст твору (аналогія з аболіціоністською прозою Заходу)
