slug: new-york-group-poets
title: "Нью-Йоркська Група: Авангард в Еміграції — Оновлення Поетичної Мови за Залізною Завісою"
word_target: 5000
content_outline:
- section: 'Вступ: I — Друге повоєнне покоління і нові виклики'
  words: 500
  points:
  - 'Формування групи у 1950-х: Юрій Тарнавський, Богдан Рубчак, Емма Андієвська, Патриція Килина, Богдан Бойчук — різні голоси, спільний проект.'
  - 'Реакція на МУР і «органічний стиль»: замість великого наративу — мова як самодостатній художній світ.'
  - 'Контекст: нью-йоркська авангардна сцена 1950–60-х — контакт з американськими бітниками і абстрактними експресіоністами.'
- section: 'Вступ: II — Журнал «Нові поезії» і маніфест нового письма'
  words: 500
  points:
  - '«Нові поезії» (1959–1971) як платформа — що редактори відкидали і що приймали, і чому це викликало скандал.'
  - 'Полеміка з еміграційним «охоронним» табором: «зрада традиції» чи її необхідний розвиток у нових умовах?'
  - 'Відношення до материкової радянської поезії: знайомство з «шістдесятниками» через залізну завісу — ризикований діалог.'
- section: 'Аналіз: Тарнавський і поетика мінімалізму'
  words: 700
  points:
  - 'Юрій Тарнавський: від раннього сюрреалізму до зрілого мінімалізму — трансформація стилю як духовна зрілість.'
  - '«Без Еспанії» (1969) і «Нараз і назавжди» — синтаксична редукція як метафізична позиція, а не просто формальний прийом.'
  - Тарнавський і Беккет — паралель між двома «мінімалістами» різних традицій, які прийшли до схожих висновків незалежно.
- section: 'Аналіз: Андієвська і тотальна метафора'
  words: 700
  points:
  - 'Емма Андієвська: поетичне «надлишкове уявлення» як метод — не окремий образ, а галактика образів у безперервній трансформації.'
  - 'Роман «Роман про добру людину» і прозова поезія — де точно проходить межа між жанрами і чи потрібна вона взагалі?'
  - 'Андієвська і світове визнання: чому вона залишилася поза офіційним нобелівським визнанням і що це говорить про самі критерії?'
- section: 'Аналіз: Рубчак і Бойчук — між США і Україною'
  words: 600
  points:
  - 'Богдан Рубчак: критик, перекладач, поет — три голоси одного автора, що взаємно збагачують один одного.'
  - 'Богдан Бойчук і «Координати» (1969) — антологія як культурний акт єднання еміграційної і материкової традиції.'
  - 'Нью-Йоркська група і Ліна Костенко: діалог поверх залізної завіси — як дві традиції вплинули одна на одну.'
- section: 'Стилістика: Сюрреалізм, абстракціонізм, мінімалізм'
  words: 500
  points:
  - Свідоме засвоєння французького сюрреалізму і американського абстракціонізму — не «запозичення», а повноправна участь у міжнародному русі.
  - 'Синтаксична деструкція: пропускати дієслово, ламати читацьке очікування — і чому це не хаос, а вища дисципліна.'
  - 'Мова і тіло: чуттєвість у Нью-Йоркській групі проти неокласичного стримання — різні уявлення про ліричне.'
- section: 'Деколонізаційна перспектива: Еміграція як лабораторія свободи'
  words: 500
  points:
  - Відсутність совєтської цензури як умова повної свободи форми і теми — і що Нью-Йоркська група зробила з цією свободою.
  - 'Порівняння з польським і чеським авангардом в еміграції — спільні риси і принципові відмінності національних доль.'
  - 'Повернення в Україну після 1991: рецепція «дивних» — чи вони були прийняті чи відкинуті новим читачем?'
- section: 'Підсумок: Спадщина і сучасна поезія'
  words: 500
  points:
  - Вплив Нью-Йоркської групи на покоління 80-х і «Бу-Ба-Бу» — пряма лінія від авангарду до нового прориву.
  - Тарнавський, Андієвська і сучасна українська поезія 2020-х — живий вплив чи музейна традиція без живого зв'язку?
  - Нью-Йоркська група як доказ того, що «еміграція» є повноцінною частиною національного літературного простору.
