slug: new-york-group-poets
title: 'Нью-Йоркська Група: Авангард в Еміграції — Оновлення Поетичної Мови за Залізною
  Завісою'
word_target: 5000
content_outline:
- section: 'Вступ та культурний контекст: I — Феномен діаспори'
  words: 500
  points:
  - Нью-Йоркська група як авангардний феномен української діаспори 1950-70-х років
    (заснування у 1958 р.).
  - 'Місце в літературному каноні: свідома відмова від політизованої поезії та служіння
    чистому мистецтву.'
- section: 'Вступ та культурний контекст: II — Значення сьогодні'
  words: 400
  points:
  - 'Чому цей текст і творчість групи загалом важливі сьогодні: заповнення лакуни
    українського модернізму.'
  - Альманах «Нові поезії» (1959–1971) як платформа для експериментальної творчості.
- section: 'Аналіз твору: Сюжет та структура: I — Ключові поети'
  words: 700
  points:
  - 'Ключові персоналії: Юрій Тарнавський, Емма Андієвська, Богдан Рубчак, Богдан
    Бойчук, Женя Васильківська.'
  - 'Огляд індивідуальних стилів: від мінімалізму до сюрреалістичної надлишковості.'
- section: 'Аналіз твору: Сюжет та структура: II — Впливи та реакція на МУР'
  words: 600
  points:
  - 'Впливи та джерела: європейський екзистенціалізм, абстрактний експресіонізм, Лорка
    та Паунд.'
  - Авангард як бунт і реакція на традиціоналізм та консерватизм Мистецького українського
    руху (МУР).
- section: 'Герменевтика та ключові образи: I — Розбір символіки'
  words: 600
  points:
  - 'Детальний розбір символіки: заміна традиційних фольклорних мотивів урбаністичними
    пейзажами Нью-Йорка.'
  - 'Система образів і їхня еволюція: від травми вигнання до філософського осмислення
    самотності.'
- section: 'Герменевтика та ключові образи: II — Архетипи і підтексти'
  words: 500
  points:
  - Архетипи та сюрреалістичні підтексти у текстах Андієвської та Тарнавського.
  - Пошук універсальних сенсів і метафізичних глибин замість національного пафосу.
- section: Мова, стиль та поетика
  words: 600
  points:
  - 'Стилістичні інновації авангардної поетики: легалізація верлібру (вільного вірша)
    в українській літературі.'
  - Контакт з американською (бітники) та європейською поезією на рівні форми.
  - 'Особливості ритміки та синтаксису: деструкція класичного речення, експерименти
    зі словом.'
- section: Деколонізаційний вимір
  words: 600
  points:
  - 'Який імперський міф руйнує цей феномен: спростування радянської тези про провінційність
    української мови.'
  - 'Діаспора як місце свободи: можливість творити модернізм без радянської цензури
    та репресій.'
  - 'Опір асиміляції та культурне самоствердження: вибір української мови як інструменту
    світового авангарду.'
- section: Підсумок та рецепція
  words: 500
  points:
  - 'Вплив на сучасну українську поезію: діалог із вісімдесятниками (зокрема з групою
    «Бу-Ба-Бу»).'
  - Світовий контекст групи та повернення спадщини в Україну (журнал «Світо-вид» у
    1990-х).
  - 'Питання для дискусії: роль еміграційної літератури у формуванні повноцінного
    сучасного канону.'
