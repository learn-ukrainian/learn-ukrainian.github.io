slug: pidmohylny-small-prose
title: Pidmohylny Small Prose
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: Історичні умови'
  words: 350
  points:
  - '[!context] Аналіз пореволюційних років: війна, голод 1921–1923, розруха в містах.'
  - Біографічний контекст Підмогильного періоду написання ранньої малої прози (1919-1925).
  - Вплив європейської філософії (Фройд, Ніцше, К'єркегор) на формування світогляду.
- section: 'Вступ та культурний контекст: Місце в каноні'
  words: 350
  points:
  - Зародження потужної української інтелектуальної прози.
  - '[!history-bite] Випередження європейського екзистенціалізму (до появи знакових
    творів Сартра і Камю).'
  - Чому тексти Підмогильного критично важливі для розуміння травм ХХ століття сьогодні.
- section: 'Аналіз твору: Сюжетна динаміка'
  words: 350
  points:
  - 'Ключові події в «Проблемі хліба» та «В епідемічному бараці»: виживання як основа
    дії.'
  - '[!culture] Сюжет «Третьої революції»: марш селянства на місто як зіткнення цивілізацій.'
  - Механізми впливу європейських модерністських джерел на сюжетотворення Підмогильного.
- section: 'Аналіз твору: Конфлікт та структура'
  words: 350
  points:
  - Конфлікт «людина — абсурдний світ» як основний рушій і структурний стрижень текстів.
  - 'Урбаністичне проти патріархального: просторова та психологічна організація новел.'
  - Межові ситуації (голод, смерть) як структурні вузли, де випробовується сутність
    героя.
- section: 'Герменевтика: Символіка екзистенціалізму'
  words: 350
  points:
  - '[!quote] Розбір символу «холодної хризантеми» («Проблема хліба») як абсолютної
    метафори відчуження.'
  - Хліб як базова біологічна потреба проти духовної екзистенції особистості.
  - Міфологічні та підсвідомі підтексти у висвітленні людських страждань та інстинктів.
- section: 'Герменевтика: Система персонажів'
  words: 350
  points:
  - 'Еволюція героя: від романтичного ідеаліста до зневіреної людини на межі біологічного
    виживання.'
  - 'Психоаналітичний зріз вчинків: тваринні інстинкти проти залишків моральних імперативів.'
  - Архетип маргінала або людини в екстремальних обставинах у галереї Підмогильного.
- section: 'Мова, стиль та поетика: Стилістичні інновації'
  words: 350
  points:
  - Створення нової української психологічної та філософської лексики 1920-х років.
  - Перехід від романтичного народницького пафосу до суворого екзистенційного натуралізму
    деталей.
  - Майстерне використання внутрішніх монологів та потоку свідомості.
- section: 'Мова, стиль та поетика: Особливості синтаксису'
  words: 350
  points:
  - Динаміка та специфічна, рвана ритміка короткої прози Підмогильного.
  - Інтеграція живої народної мови у високий інтелектуальний європейський дискурс.
  - Роль художньої деталі та стилістичного лаконізму у формуванні емоційної напруги.
- section: 'Деколонізаційний вимір: Руйнування міфів'
  words: 350
  points:
  - '[!myth-buster] Спростування радянського штампу про Підмогильного як «занепадника»
    і «реакціонера».'
  - Аналіз справжніх причин небезпеки інтелектуалізму автора для тоталітарної ідеології
    СРСР.
  - Деконструкція міфу про російську монополію на урбаністичну та філософську прозу.
- section: 'Деколонізаційний вимір: Агентність героя'
  words: 350
  points:
  - Відмова українського персонажа від ролі безвольної жертви на користь активного
    екзистенційного пошуку.
  - Захист питомої української ідентичності перед загрозою нівелювання у знеособленому
    масовому суспільстві.
  - Опір культурній та духовній асиміляції через глибоку внутрішню рефлексію.
- section: 'Підсумок та рецепція: Вплив на покоління'
  words: 300
  points:
  - Фізичне знищення автора у Сандармосі (Спадщина Розстріляного відродження) та довге
    замовчування його текстів.
  - Вплив прози Підмогильного на українських дисидентів, шістдесятників і постмодерністів
    після відновлення його імені.
  - Новітнє прочитання текстів сучасним літературознавством у часи незалежності.
- section: 'Підсумок та рецепція: Світовий контекст'
  words: 200
  points:
  - '[!decolonization] Розміщення малої прози Валер''яна Підмогильного на одному щаблі
    з творами Кафки, Сартра та Камю.'
  - 'Відкриті питання для дискусії: актуальність екзистенційних тем Підмогильного
    у час сучасної війни Росії проти України.'
