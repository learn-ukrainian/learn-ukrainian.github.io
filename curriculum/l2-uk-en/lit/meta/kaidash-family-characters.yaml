slug: kaidash-family-characters
title: 'Кайдашева сім''я: Галерея Характерів'
word_target: 5000
content_outline:
  - section: 'Вступ — Сім''я як мікрокосм: I — Історичний контекст'
    words: 450
    points:
      - Вплив селянської реформи 1861 року на руйнування патріархального укладу
      - Економічний тиск, малоземелля та перехід до індивідуалістичного господарювання
      - Сім'я як дзеркало суспільних криз та зламів другої половини XIX століття
  - section: 'Вступ — Сім''я як мікрокосм: II — Літературна класика'
    words: 450
    points:
      - Значення повісті (1878) як вершинного твору української соціально-побутової
        прози
      - 'Поєднання комічного та трагічного: принцип «сміх крізь сльози»'
      - 'Реальна основа твору: родина Мазурів із села Семигори як прототипи Кайдашів'
  - section: 'Омелько Кайдаш — патріарх: I — Характеристика голови родини'
    words: 450
    points:
      - Традиційний статус батька в українській сільській родині
      - 'Подвійність натури Омелька: надзвичайна працьовитість (стельмах) та глибока
        побожність'
      - Забобонність як риса традиційного народного світогляду (строгий піст у п'ятницю)
  - section: 'Омелько Кайдаш — патріарх: II — Трагедія та слабкості'
    words: 450
    points:
      - Втрата патріархального авторитету після реформи та емансипації синів
      - Нездатність адаптуватися до нових капіталістичних умов та психологічна криза
        батька
      - Алкоголізм як форма ескапізму та трагічний фінал персонажа
  - section: 'Маруся Кайдашиха — справжня влада: I — Архетип свекрухи'
    words: 500
    points:
      - Вкоріненість образу в українському фольклорі (народні пісні про лиху свекруху)
      - 'Соціальне лицемірство Марусі: панські манери («терлася коло панів») проти
        реального статусу'
      - Комічний контраст між «солодкими» словами та деспотичними діями щодо невісток
  - section: 'Маруся Кайдашиха — справжня влада: II — Мотиви та психологізм'
    words: 500
    points:
      - Глибинний страх втратити контроль над родиною та господарством
      - Експлуатація невісток як спроба психологічної компенсації власного важкого
        минулого
      - Майстерність Нечуя-Левицького в комічному та сатиричному висвітленні марнославства
  - section: 'Сини і невістки: I — Два типи синів'
    words: 500
    points:
      - 'Карпо: прагматизм, жорсткість, похмурість («з нього буде добрий посіпака»)'
      - 'Лаврін: ліричність, мрійливість, лагідна натура на початку повісті'
      - 'Еволюція характерів: як жорстокі побутові умови зрівнюють обох братів у сварках'
  - section: 'Сини і невістки: II — Два типи невісток'
    words: 500
    points:
      - 'Мотря: багачка, гонорова, «з перцем», здатна відкрито протистояти деспотії
        свекрухи'
      - 'Мелашка: бідна, тиха, поетична натура, що зазнає найбільшої психологічної
        трансформації'
      - Вплив токсичного середовища («кайдашівщини») на невідворотну деградацію особистості
        Мелашки
  - section: 'Другорядні персонажі: I — Село як колективний персонаж'
    words: 450
    points:
      - Громадська думка («що скажуть люди») як потужний регулятор моралі та суспільної
        поведінки
      - Взаємодія індивідуального закритого простору родини з публічним простором
        села
      - Простір Семигор як репрезентативна мікромодель всієї України того часу
  - section: 'Другорядні персонажі: II — Сусіди і функція гумору'
    words: 450
    points:
      - Баба Палажка та баба Параска як комічні втілення народної стихії і пліткарства
      - 'Гумористичне зниження: використання засобів героїчного епосу для опису сільських
        баталій'
      - Роль діалогів і народного красномовства у творенні неперевершеного комічного
        ефекту
  - section: Підсумок — Від типу до індивідуальності
    words: 400
    points:
      - 'Подолання схематизму: створення багатовимірних, амбівалентних характерів
        замість плоских типів'
      - Еволюція української прози від ідеалізованих героїв Квітки-Основ'яненка до
        психологічного реалізму Нечуя
      - Універсальність характерів та конфліктів, що забезпечує повісті вічну літературну
        актуальність
