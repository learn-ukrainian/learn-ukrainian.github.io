slug: franko-lviv-period
title: Franko Lviv Period
word_target: 5000
content_outline:
  - section: 'Вступ: Історичні умови та місце в каноні'
    words: 550
    points:
      - 'Галичина 1870-1890-х років в умовах Австро-Угорської імперії: зіткнення польської,
        москвофільської та української ідентичностей.'
      - Прибуття молодого Франка до Львова (1875) та його роль як руйнівника патріархальних
        устоїв.
      - Формування Львова як «П'ємонту» українського національного відродження.
  - section: 'Етапи діяльності: Університет та перші арешти'
    words: 700
    points:
      - Навчання на філософському факультеті Львівського університету.
      - Арешт 1877 року за звинуваченням у соціалістичній пропаганді та його наслідки
        (втрата стипендії, остракізм з боку галицького суспільства).
      - Тюремний досвід у львівській в'язниці як каталізатор творчості (цикл «Тюремні
        сонети»).
  - section: 'Етапи діяльності: Видавнича та політична праця'
    words: 550
    points:
      - Співпраця з Михайлом Павликом та видання радикальних журналів «Громадський
        друг», «Дзвін», «Молот».
      - 'Перехід від культурництва до системної політики: співзаснування Русько-української
        радикальної партії (1890).'
      - Інтелектуальна співпраця з М. Драгомановим та пізніша полеміка з його ідеями.
  - section: 'Ключові образи: Символіка «Каменярів» та радикального покоління'
    words: 550
    points:
      - Детальний розбір вірша «Каменярі» (1878) як маніфесту цілого покоління.
      - 'Аналіз символіки: каменяр як архетип жертовної праці заради національного
        і соціального визволення.'
      - Еволюція образу героя у творчості Франка львівського періоду.
  - section: 'Ключові образи: Наукове середовище та НТШ'
    words: 550
    points:
      - Співпраця з Михайлом Грушевським після його переїзду до Львова (1894).
      - Роль Франка у розбудові Наукового товариства імені Шевченка (НТШ) як неформальної
        української академії наук.
      - Фундаментальні наукові праці та докторська дисертація.
  - section: 'Мова та стиль: Поетична та публіцистична революція'
    words: 550
    points:
      - Стилістичні інновації у збірці «З вершин і низин» (1887, 1893).
      - Створення сучасної української публіцистичної мови.
      - Боротьба за єдину соборну літературну мову проти місцевих діалектизмів та
        русизмів.
  - section: 'Деколонізаційний вимір: Деконструкція провінційності'
    words: 550
    points:
      - Спростування міфу про Франка як про виключно «селянського» письменника.
      - Введення української літератури в урбаністичний простір Львова (наприклад,
        у прозі).
      - Агентність української ідентичності у протистоянні польській культурній гегемонії
        та москвофільству.
  - section: 'Деколонізаційний вимір: Європейські горизонти'
    words: 500
    points:
      - Франко як поліглот і транслятор європейських ідей в Україну (переклади Данте,
        Гете, Шекспіра).
      - Вихід українського дискурсу за межі локальної проблематики («Поза межами можливого»).
      - Руйнування російського імперського посередництва у спілкуванні з Європою.
  - section: 'Підсумок: Рецепція та спадщина Франка'
    words: 500
    points:
      - Останні роки життя письменника у «Домі Франка» у Львові на тлі Першої світової
        війни.
      - Вплив його ідей на наступні покоління (Молода Муза, Розстріляне відродження).
      - Дискусії про спадщину Франка сьогодні та важливість її очищення від радянських
        штампів.
