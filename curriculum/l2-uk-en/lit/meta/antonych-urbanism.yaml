slug: antonych-urbanism
title: Antonych Urbanism
word_target: 4000
content_outline:
- section: 'Вступ: Історичні умови та культурний контекст'
  words: 400
  points:
  - Міжвоєнний Львів як простір зіткнення традицій і модернізації
  - Відхід від народницької традиції до інтелектуального авангарду
  - Місце Антонича в каноні європейського модернізму
- section: 'Вступ: Актуальність урбаністичної теми'
  words: 300
  points:
  - Чому візії міста Антонича суголосні викликам XXI століття
  - Екологічна та екзистенційна криза сучасної людини
- section: 'Аналіз твору: Ключові етапи та джерела'
  words: 450
  points:
  - Еволюція від лемківського міфу до апокаліптичного урбанізму
  - Збірка «Ротації» (1938) як посмертний маніфест поета
  - Вплив європейського сюрреалізму та експресіонізму
- section: 'Аналіз твору: Конфлікт антиприроди'
  words: 400
  points:
  - Зіткнення органічного біосу та техногенного міста
  - Місто як «страховище, створене людським інтелектом»
- section: 'Герменевтика: Символіка міста-пекла'
  words: 450
  points:
  - Образ міста як апокаліптичного марева і лабіринту
  - Детальний розбір віршів «Мурашник» та «Міста»
  - Тлумачення мотиву «смутку, як гіркого насіння»
- section: 'Ключові образи: Міфологічні підтексти'
  words: 400
  points:
  - Трансформація слов'янських архетипів у міському середовищі
  - 'Система образів: відчужена людина, механізми, асфальт'
- section: 'Поетика: Стилістичні інновації Антонича'
  words: 400
  points:
  - Сюрреалістична образність та парадоксальні метафори
  - 'Семантичний зсув: поєднання органічного і неорганічного лексикону'
- section: 'Поетика: Ритміка та синтаксис'
  words: 400
  points:
  - Імітація міського хаосу через рваний ритм
  - Авангардний синтаксис та його експресивна функція
- section: 'Деколонізаційний вимір: Агентність українського модернізму'
  words: 400
  points:
  - Руйнування міфу про виключно рустикальний (сільський) характер української літератури
  - Українська мова як повноцінний інструмент філософського урбанізму
  - Опір асиміляційним процесам через високу естетику
- section: 'Підсумок та рецепція: Світовий контекст'
  words: 400
  points:
  - Відкриття Антонича у 1960-ті роки та вплив на шістдесятників
  - Значення спадщини для Нью-Йоркської групи (Богдан Рубчак та ін.)
  - Питання для дискусії щодо майбутнього цивілізації
