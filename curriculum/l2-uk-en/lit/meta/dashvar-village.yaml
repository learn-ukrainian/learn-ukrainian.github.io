slug: dashvar-village
title: 'Село і люди: Феномен масової прози Люко Дашвар'
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Феномен бестселера в пострадянській Україні'
    words: 500
    points:
      - Ірина Чернова (Люко Дашвар) — пізній дебют у 50 років як символ переродження
        ринку.
      - «Мати все» (2008) та рекордні тиражі (500 тис. примірників) як маркер формування
        повноцінного україномовного книжкового ринку.
      - Дашвар у контексті масової прози 2000-х — сентиментальна мелодрама з
        соціальним зарядом.
  - section: 'Вступ та контекст: II — Соціальний реалізм і мелодрама'
    words: 500
    points:
      - Традиція соціальної прози від Нечуя-Левицького до Дашвар — «село» як метафора
        і реальність.
      - Жіночий погляд на патріархальну структуру сільського простору.
      - Дашвар як автор, що повернув масового читача до україномовної книги після
        домінування перекладів.
  - section: 'Аналіз ключового твору: «Село не люди» — соціальна анатомія'
    words: 700
    points:
      - Система персонажів як зріз сільської мікроспільноти — конфлікт поколінь і
        гендерних ролей.
      - Пострадянська деградація vs. живучість народної моральності.
      - Функція наратора — сентиментальна ідентифікація проти критичної дистанції.
  - section: 'Аналіз ключового твору: «Мати все» — бажання, межі, влада'
    words: 700
    points:
      - Центральний конфлікт — особиста амбіція жінки у середовищі, що заперечує
        її суб'єктність.
      - Фінансовий успіх та моральна ціна: мелодраматична дидактика.
      - Структура сюжету та жанрові маркери масової літератури (кліфхенгер,
        ротація POV).
  - section: 'Стилістика та мова: Розмовна норма як художній вибір'
    words: 600
    points:
      - Свідоме використання регіональних діалектизмів і народної фразеології.
      - Діалог як головний двигун сюжету — усна оповідна традиція в прозі.
      - Відмова від «високого» стилю як декларація — «ця мова для всіх, не для еліти».
  - section: 'Дашвар і ринок: Масова проза як культурна зброя'
    words: 600
    points:
      - Видавнича стратегія — доступна ціна, масовий тираж, агресивна реклама.
      - 'Критика академічного середовища: зневага до «попси» проти реальної читацької бази.'
      - Порівняння з масовою прозою Польщі (Katarzyna Grochola) та Чехії — спільні
        пострадянські патерни.
  - section: 'Деколонізаційна перспектива: Повернення мови масовому читачеві'
    words: 500
    points:
      - Значення україномовного бестселера в умовах, де масова культура досі
        асоціювалася з російською мовою.
      - Дашвар як доказ економічної спроможності україномовного видавничого ринку.
      - Критика «висококультурного» снобізму щодо масової прози — демократизація
        читання як деколонізаційний акт.
  - section: 'Підсумок та спадщина: Масова проза після Дашвар'
    words: 400
    points:
      - Вплив на видавців — відкриття комерційної ніші для соціальної мелодрами.
      - Дашвар у навчальних програмах — чи варто включати масову прозу до канону?
      - Місце сентиментального реалізму в повному спектрі сучасної української
        прози.
