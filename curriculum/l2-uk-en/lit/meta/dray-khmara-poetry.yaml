slug: dray-khmara-poetry
title: "Михайло Драй-Хмара: Лебеді, Ґрати і Класичний Ідеал — Неокласик у Пітьмі ГУЛАГу"
word_target: 5000
content_outline:
- section: 'Вступ: I — Неокласики як відповідь на хаос революції'
  words: 500
  points:
  - "'П''ятірне гроно': Зеров, Рильський, Драй-Хмара, Филипович, Клен — спільний проект культурної гідності в добу більшовицького тиску."
  - Неокласицизм як антитеза «масовізму» і пролетарської примітивізації — вибір форми як моральна позиція.
  - Орієнтація на античність і ренесанс як декларація приналежності до Європи, а не до «слов'янського братства».
- section: 'Вступ: II — Учений-поет: Драй-Хмара між наукою і лірикою'
  words: 500
  points:
  - 'Наукова кар''єра: славістика, фольклористика, давня українська мова — як наукові інтереси формували поетичний словник.'
  - Дружба із Зеровим і Рильським — спільні переклади, рецензії, творчий обмін і взаємна підтримка.
  - '1935 рік: арешт за справою «контрреволюційної організації» — початок кінця для всього «гнізда» неокласиків.'
- section: 'Аналіз: «Лебеді» — образна система і конфлікт'
  words: 700
  points:
  - Сонет «Лебеді» як маніфест неокласичного ідеалу — лебідь як символ краси під загрозою знищення.
  - Символіка темряви і світла у контексті наступу радянського «масовізму» на індивідуальну культурну ідентичність.
  - 'Класична форма сонету: чи є формальна дисципліна сама по собі аргументом свободи на тлі хаосу?'
- section: 'Аналіз: Вибрані вірші 1920-х — ліричний діапазон'
  words: 700
  points:
  - 'Медитативна лірика проти суспільного вірша: де Драй-Хмара дозволяє собі повну суб''єктивність.'
  - 'Любовна лірика: присутність тілесного і чуттєвого у неокласичній естетиці — тіло не відкинуто, але перетворено.'
  - Пейзажна лірика і проблема «малої батьківщини» — рідний пейзаж як особистий Едем і загальнолюдський символ.
- section: 'Наукова спадщина: Мова і фольклор як архів нації'
  words: 600
  points:
  - Студії з давньої фонетики — спроба реконструювати «першу мову» як акт відновлення культурної пам'яті.
  - Фольклористичні праці і питання автентичності народної традиції проти її академічної стилізації.
  - Незавершені наукові проекти — що інтелектуально вбили разом з поетом і що могло б відбутися.
- section: 'Стилістика: Сонет, олександрійський вірш, ритмічна дисципліна'
  words: 500
  points:
  - 'Версифікаційна майстерність: складні строфи і рідкісні форми як «ремісничий» ідеал творчої досконалості.'
  - 'Лексика: архаїзм і неологізм у балансі — мова між традицією і оновленням без штучності.'
  - Порівняння з Рільке і Валері — неокласицизм як загальноєвропейський феномен, а не суто «київська» аномалія.
- section: 'Деколонізаційна перспектива: Неокласики як ціль колонізатора'
  words: 500
  points:
  - 'Чому репресували саме неокласиків: орієнтація на Захід, а не на Москву — «буржуазний націоналізм» як вирок.'
  - Паралель між знищенням київських неокласиків і розгромом польського авангарду в СРСР.
  - Реабілітація 1958–1990-х: повернення імен у шкільні програми як запізніла, але важлива перемога.
- section: 'Підсумок: Від Драй-Хмари до сучасного неокласицизму'
  words: 500
  points:
  - 'Вплив на «шістдесятників»: Ліна Костенко і власне неокласичне натхнення — пряма лінія від 1930-х до 1960-х.'
  - Неокласичний ідеал у сучасній українській поезії після 2022 — форма як цивілізаційна відповідь на варварство.
  - "'Гідність форми' як культурна опірність — чому краса і точність вірша не є втечею від реальності."
