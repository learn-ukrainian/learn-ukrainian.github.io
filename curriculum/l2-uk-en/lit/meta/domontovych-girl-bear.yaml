slug: domontovych-girl-bear
title: Domontovych Girl Bear
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: Історичні умови'
  words: 300
  points:
  - 'Київ 1920-х років: злет українського модернізму та доба Розстріляного відродження.'
  - Поява роману у видавництві «Сяйво» (1928) за підтримки лідера неокласиків Миколи
    Зерова.
  - Постать Віктора Домонтовича (Петрова) як ключового інтелектуала епохи.
- section: 'Вступ та культурний контекст: Місце в каноні'
  words: 300
  points:
  - 'Зародження жанру українського інтелектуального роману: розрив із народницькою
    парадигмою.'
  - Текст як маніфест українського урбанізму та психологізму.
  - 'Актуальність роману сьогодні: пошук ідентичності та свободи в кризові епохи.'
- section: 'Аналіз твору: Сюжетна канва та етапи'
  words: 400
  points:
  - 'Зав''язка (1922-1923): Іполіт Варецький у домі Тихменєвих, зіткнення двох світів.'
  - 'Розвиток подій: кримський епізод, маніпуляції та психологічна гра Зини.'
  - 'Кульмінація: інтимне зближення, відмова від шлюбу, соціальний епатаж (зв''язок
    із двірником).'
  - 'Трагічний фінал: зустріч у Берліні та самогубство героїні.'
- section: 'Аналіз твору: Структура, джерела та конфлікт'
  words: 400
  points:
  - 'Гібридна структура: любовний роман, що переплітається з філософськими есе.'
  - 'Інтертекстуальність: відсилки до Ґете, Макіавеллі, Ніцше.'
  - 'Головний рушійний конфлікт: раціоналізм та міщанська мораль (Варецький) проти
    ірраціонального бунту і абсолютної свободи (Зина).'
- section: 'Герменевтика та ключові образи: Система персонажів'
  words: 450
  points:
  - 'Іполіт Варецький: тип ерудованого українського інтелігента-неокласика, його духовна
    слабкість перед викликами часу.'
  - 'Зина Тихменєва як утілення концепції «нової жінки»: емансипація, відкидання традиційного
    шлюбу.'
  - 'Контрастні постаті: Панас Григорович та Василь Гриб як репрезентанти різних життєвих
    філософій.'
- section: 'Герменевтика та ключові образи: Розбір символіки'
  words: 300
  points:
  - 'Символ ведмедика: дитяча невинність, що приховує первісну, руйнівну, дику природу.'
  - 'Символіка простору: Київ як місце інтелектуальних шукань, Крим як простір еротизму,
    Берлін як метафора екзистенційної самотності.'
- section: 'Герменевтика та ключові образи: Міфологічні підтексти'
  words: 300
  points:
  - Трансформація ніцшеанської ідеї про надлюдину в поведінці Зини.
  - 'Переосмислення античного міфу: алюзії на «Іфігенію в Тавриді».'
  - Пошук «неправдоподібних істин» як архетипний шлях гностичного пізнання.
- section: 'Мова, стиль та поетика: Стилістичні інновації'
  words: 300
  points:
  - 'Творення поетики парадоксу: іронія як засіб захисту та філософського осмислення
    світу.'
  - 'Закодоване письмо для освідченого читача: ерудиція автора замінює лінійний наратив.'
  - Інтелектуальні відступи як повноцінні елементи сюжетної конструкції.
- section: 'Мова, стиль та поетика: Ритміка та синтаксис'
  words: 300
  points:
  - Синтаксичні конструкції європейської філософської прози в українському звучанні.
  - Відсторонений, холодний тон оповіді Варецького.
  - Багатство термінологічної лексики та відмова від провінційних неологізмів.
- section: 'Деколонізаційний вимір: Руйнування імперських міфів'
  words: 350
  points:
  - Спростування міфу про сільський і народницький характер української літератури.
  - Абсолютне ігнорування соцреалістичних тем (класова боротьба, індустріалізація).
  - Твір як доказ синхронізації української культури із західноєвропейським модерністичним
    дискурсом.
- section: 'Деколонізаційний вимір: Агентність українського героя'
  words: 300
  points:
  - Український інтелігент (Варецький) як носій високої європейської культури, що
    не страждає на комплекс меншовартості.
  - Природна присутність героїв у глобальному європейському контексті (зокрема німецькомовному).
  - Культурне самоствердження через інтелектуальну свободу.
- section: 'Підсумок та рецепція: Світовий контекст і вплив'
  words: 300
  points:
  - Повернення роману із забуття зусиллями еміграційних діячів (Юрій Шевельов).
  - Вплив інтелектуалізму Домонтовича на сучасних українських письменників та феміністичну
    критику.
  - 'Питання для дискусії: ціна абсолютної індивідуальної свободи та місце інтелектуала
    в суспільстві епохи катастроф.'
