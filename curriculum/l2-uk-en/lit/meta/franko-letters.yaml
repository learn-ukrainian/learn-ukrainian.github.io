slug: franko-letters
title: Franko Letters
word_target: 5000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови'
  words: 350
  points:
  - Листування в умовах бездержавності виконувало роль замінника національних інституцій
    у ХІХ столітті.
  - В умовах цензури та заборон (Емський указ 1876 р.) епістолярій став альтернативним
    каналом поширення ідей.
- section: 'Вступ та культурний контекст: II — Канон та актуальність'
  words: 350
  points:
  - Понад 6000 збережених листів утворюють єдиний комунікативний простір, що об'єднував
    Галичину і Наддніпрянщину.
  - Еволюція листів від засобу приватного обміну новинами до формату публічного інтелектуального
    дискурсу та «віртуальної академії наук».
- section: 'Аналіз твору: Сюжет та структура: I — Ключові етапи'
  words: 400
  points:
  - 'Ранній етап (1870-1880-ті): вплив М. Драгоманова, перший арешт 1877 року та активне
    листування з однодумцями.'
  - 'Зрілий етап (1890-ті): створення Радикальної партії; Пізній етап (після 1900):
    важка хвороба (параліч рук), диктування листів та стоїцизм.'
- section: 'Аналіз твору: Сюжет та структура: II — Конфлікт та впливи'
  words: 350
  points:
  - 'Драматургія листування: від учнівського пієтету до Драгоманова до жорсткої опозиції
    в питаннях пріоритету національного над соціальним.'
  - 'Конфлікт ідей як каталізатор тексту: найцікавіші тексти народжувались у суперечках
    (з Лесею Українкою про літературу, з Драгомановим про політику).'
- section: 'Герменевтика та ключові образи: I — Символіка праці'
  words: 350
  points:
  - 'Ключовий концепт епістолярію — «праця»: розуміння творчості як виснажливої соціальної
    роботи, а не миттєвого натхнення.'
  - Іронічне ставлення до відпочинку, що відображено у листі 1895 року, де він називає
    його «романтичними скоками».
- section: 'Герменевтика та ключові образи: II — Система адресатів'
  words: 350
  points:
  - 'Ієрархія адресатів: Драгоманов як ментор, Кримський і Грушевський як побратими
    у державотворенні.'
  - Європейські вчені (Ягіч, Бодуен де Куртене) як співрозмовники Франка у великій
    європейській науці, архетип письменника-інтелектуала.
- section: 'Мова, стиль та поетика: I — Стилістичні інновації'
  words: 350
  points:
  - 'Вражаючий діапазон стилістики: від теплої інтимності до суворої європейської
    риторики і безжальної полеміки.'
  - Спілкування європейськими мовами (німецькою, польською, чеською) на рівні провідних
    інтелектуалів Відня, Праги, Берліна.
- section: 'Мова, стиль та поетика: II — Літературна мова'
  words: 350
  points:
  - Листування з А. Кримським як лабораторія творення соборної української літературної
    мови («зрозумілої для кожного Українця»).
  - Органічне поєднання живої народної стихії з логічною послідовністю наукового синтаксису.
- section: 'Деколонізаційний вимір: I — Руйнування імперського міфу'
  words: 400
  points:
  - Деконструкція радянського міфу про «Франка-марксиста», який нібито орієнтувався
    виключно на російський пролетарський рух.
  - 'Радянська цензура 50-томника: свідоме вилучення листів із гострою критикою марксизму
    та російського шовінізму.'
- section: 'Деколонізаційний вимір: II — Агентність та опір'
  words: 400
  points:
  - Франко як суб'єктний мислитель, який самостійно визначав вектор культурного розвитку
    нації без огляду на імперські метрополії.
  - Пряма європейська комунікація, що інтегрувала український дискурс у загальноєвропейський
    простір, оминаючи Москву та Петербург.
- section: Підсумок та рецепція
  words: 400
  points:
  - 'Програмовий маніфест національної самокритики: лист до А. Кримського 1898 року
    («Я не люблю русинів...») як заклик до формування еліти.'
  - Епістолярій Франка як фундамент української есеїстики ХХ століття та зброя спротиву
    для дисидентів-шістдесятників (зокрема, В. Стуса).
