slug: synthesis-3
title: 'Синтез: Горизонти епохи 3'
word_target: 4000
content_outline:
- section: 'Діахронний аналіз: I — Архетипи та традиція'
  words: 800
  points:
  - Тяглість української інтелектуальної традиції крізь розриви XX століття
  - Від неокласичного ідеалу гармонії до екзистенціалізму еміграції та шістдесятників
  - Аналіз еволюції образу Європи (від Хвильового до сучасних есеїстів)
- section: 'Діахронний аналіз: II — Інтертекстуальний діалог'
  words: 700
  points:
  - Приховані алюзії та цитування репресованих авторів як спосіб збереження пам'яті
  - 'Як постмодерністи ведуть полеміку з модерністами: руйнування пафосу заради порятунку
    суті'
  - Літературна пам'ять як механізм самозбереження нації
- section: 'Деколонізаційна оптика: I — Стратегії інтелектуального опору'
  words: 800
  points:
  - Езопівська мова, підтекст та іронія як зброя в умовах тоталітаризму
  - Спільні стратегії спротиву в поезії, прозі та есеїстиці
  - Збереження вільної думки в текстах еміграції (МУР) та самвидаву
- section: 'Деколонізаційна оптика: II — Деконструкція імперського наративу'
  words: 700
  points:
  - Системний демонтаж радянського міфу про 'братні культури'
  - Карнавалізація та сміх як інструменти знищення імперського страху (феномен Бу-Ба-Бу)
  - Урбаністичний простір тексту замість нав'язаної 'селянської' провінційності
- section: 'Стилістичний калейдоскоп: Еволюція мови та форми'
  words: 800
  points:
  - Порівняльний аналіз мовних експериментів від футуризму до постмодернізму
  - 'Трансформація словника: від патетики національно-визвольних змагань до іронічної
    гри'
  - Злам соцреалістичного канону через індивідуалізацію стилю
- section: 'Філософія ідентичності: Конструювання українського суб''єкта'
  words: 800
  points:
  - Література як простір формування нової національної етики та гідності
  - Переосмислення історичної травми та подолання комплексу меншовартості (за Шевельовим)
  - Ствердження повноцінного, психологічно складного героя на противагу одновимірному
    радянському
- section: 'Спадщина та горизонти: Інтелектуальна безпека майбутнього'
  words: 800
  points:
  - Вплив літератури XX століття на формування сучасного культурного фронту
  - Значення засвоєного канону для гуманітарної та інтелектуальної безпеки держави
  - Література як безперервний процес державотворення в умовах сучасних викликів
