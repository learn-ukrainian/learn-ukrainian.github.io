slug: khvylovy-pamphlets
title: Khvylovy Pamphlets
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 750
    points:
      - Літературна дискусія 1925–1928 років як каталізатор публіцистики Хвильового.
      - 'Історичні умови: політика українізації та коротке вікно інтелектуальної свободи
        в УСРР.'
      - 'Суперечка з організацією «Плуг» (Сергій Пилипенко): протистояння «масовізму»
        («червоної просвіти») та вимоги високої естетичної якості.'
      - Роль Хвильового як ідеолога ВАПЛІТЕ та інтелектуального лідера покоління Розстріляного
        відродження.
  - section: 'Аналіз твору: Сюжет та структура'
    words: 900
    points:
      - 'Архітектоніка памфлетів: від циклу «Камо грядеш?» (1925) до «Думки проти
        течії» (1926) та «Апологети писаризмізму» (1926).'
      - 'Еволюція полеміки: перехід від суто літературно-естетичних питань до фундаментальних
        геополітичних проблем.'
      - 'Конфлікт як рушійна сила: опонент (графомани, партійні ідеологи) як об''єкт
        нищівної критики.'
      - 'Історія трактату «Україна чи Малоросія?» (1926): заборона цензурою, конфіскація
        та повернення тексту лише у 1990 році.'
  - section: Герменевтика та ключові образи
    words: 950
    points:
      - 'Концепт «Психологічної Європи»: Європа як стан духу, традиція «грандіозної
        цивілізації», досвід Гете, Дарвіна, Ньютона.'
      - 'Образ «фаустівської людини»: динамізм, неспокій, жага пізнання та воля до
        творення нової реальності.'
      - 'Ідея «Азіатського ренесансу»: месіанська роль України на перетині Заходу
        та Сходу, спроба синтезу європейського інтелекту.'
      - Протиставлення європейського динамізму російському месіанізму та культурній
        гегемонії.
  - section: Мова, стиль та поетика
    words: 800
    points:
      - 'Риторична майстерність Хвильового-полеміста: використання сарказму, нищівної
        іронії та інвектив.'
      - 'Афористичність мислення: перетворення тез на історичні гасла («Дайош Європу!»,
        «Геть від Москви!»).'
      - 'Експресивний синтаксис: ритмічна проза, риторичні запитання, обірвані фрази
        (апосіопеза), що передають нерв епохи.'
      - Залучення складної філософської та культурологічної термінології як засіб
        виходу за межі «провінційного» лексикону.
  - section: Деколонізаційний вимір
    words: 950
    points:
      - 'Теза «Геть від Москви!»: відкидання російської літератури як посередника
        між Україною та світом.'
      - 'Руйнація імперського міфу: критика російського великодержавного шовінізму,
        що маскувався під пролетарський інтернаціоналізм.'
      - 'Аналіз дихотомії «Україна чи Малоросія?»: подолання комплексу меншовартості
        (провінційності).'
      - 'Ствердження абсолютної культурної суверенності: «Росія ж самостійна держава?
        Самостійна! Ну, так і ми самостійна».'
  - section: Підсумок та рецепція
    words: 700
    points:
      - 'Реакція імперії: лист Сталіна до Кагановича (1926) із засудженням «хвильовізму»,
        що стало вироком для покоління.'
      - 'Трагічний фінал: самогубство Хвильового 13 травня 1933 року як останній акт
        протесту проти терору.'
      - 'Замовчування та повернення: вплив ідей Хвильового на дисидентський рух шістдесятників
        (І. Дзюба, Є. Сверстюк).'
      - 'Сучасна рецепція: актуалізація європейського вибору та остаточного цивілізаційного
        розриву з Росією в умовах сучасної війни.'
