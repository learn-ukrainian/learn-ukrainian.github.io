slug: franko-zakhar-berkut
title: '«Захар Беркут»: Історична пам''ять та опір'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні передумови створення'
    words: 500
    points:
      - 'Історичне тло: Галичина 1880-х років та конкурс журналу «Зоря» (1882).'
      - 'Пошук національних ідеалів: звернення до часів монгольської навали (1241
        рік).'
      - Трансформація історичного матеріалу в ідеологічний меседж Франка.
  - section: 'Вступ та культурний контекст: Місце в каноні'
    words: 350
    points:
      - Роль повісті як еталону української історичної прози XIX століття.
      - Відхід від сентименталізму до соціально-філософського осмислення історії.
      - 'Чому текст залишається гостро актуальним: паралелі між 1241 та сучасністю.'
  - section: 'Аналіз твору: Джерела та формування сюжету'
    words: 450
    points:
      - 'Літописна основа: опора на Галицько-Волинський літопис.'
      - 'Фольклорні джерела: карпатські перекази про потоплення монголів.'
      - 'Етнографічна точність Франка: праці Максимовича та місцеві реалії.'
  - section: 'Аналіз твору: Динаміка конфлікту'
    words: 350
    points:
      - 'Багаторівневість конфлікту: людина і природа, світогляди, нації.'
      - 'Внутрішній вимір: тухольці проти узурпації влади Тугаром Вовком.'
      - 'Зовнішній вимір: автохтонний світ проти євразійської навали Бурунди.'
  - section: 'Герменевтика та ключові образи: Символіка тухольської громади'
    words: 450
    points:
      - Громада як колективний герой і протодемократичний інститут.
      - Копне судочинство (віче) як альтернатива феодальному свавіллю.
      - Символіка рівності, спільної праці та відповідальності.
  - section: 'Герменевтика та ключові образи: Еволюція Максима та Мирослави'
    words: 350
    points:
      - Максим Беркут як втілення дієвого патріотизму та військової кмітливості.
      - 'Мирослава: зрада соціального класу (боярства) заради етичної правди.'
      - Кохання як рушійна сила, підпорядкована вищій меті — виживанню спільноти.
  - section: 'Герменевтика та ключові образи: Архетип Захара Беркута та Сторожа'
    words: 450
    points:
      - 'Захар Беркут: старійшина, арбітр моралі, архетип мудреця.'
      - '«Сторож»: дохристиянський міфологічний образ каменю-захисника.'
      - 'Трагізм фіналу: самопожертва батька заради майбутнього громади.'
  - section: 'Мова, стиль та поетика: Стилістичні інновації Франка'
    words: 350
    points:
      - Синтез романтичного пафосу та реалістичної побутової деталізації.
      - Епічні ландшафтні описи як активний учасник сюжету.
      - Драматизм та ретардації, що підвищують напругу тексту.
  - section: 'Мова, стиль та поетика: Ритміка та архаїзація мови'
    words: 350
    points:
      - 'Робота з лексикою: введення бойківських та гуцульських діалектизмів.'
      - Архаїзація для відтворення колориту XIII століття.
      - Стилізація під фольклорний епос у ключових промовах.
  - section: 'Деколонізаційний вимір: Деконструкція імперського міфу'
    words: 450
    points:
      - Спростування радянського прочитання твору суто через «класову боротьбу».
      - Спростування імперської тези про «відсталість» русинів-українців.
      - 'Конфлікт права: княжа грамота Тугара Вовка як нікчемна проти споконвічного
        звичаєвого права тухольців.'
  - section: 'Деколонізаційний вимір: Агентність та самоствердження'
    words: 350
    points:
      - Українці не як пасивні жертви, а як активні творці своєї перемоги.
      - Інтелектуальна перевага карпатської громади над грубою силою орди.
      - Збереження ідентичності перед загрозою абсолютної асиміляції.
  - section: 'Підсумок та рецепція: Світовий контекст твору'
    words: 300
    points:
      - Паралелі з європейською історичною прозою (напр., романами Вальтера Скотта).
      - 'Унікальність франкової моделі: поєднання соціальної утопії та національної
        історії.'
      - Переклади та рецепція за кордоном.
  - section: 'Підсумок та рецепція: Вплив на наступні покоління'
    words: 300
    points:
      - Заповіт Захара Беркута як ідеологічний маркер для руху опору у XX столітті
        (ОУН-УПА).
      - Сучасна екранізація та переосмислення символів твору під час війни з Росією.
      - 'Дискусійне питання: чи можливе існування «тухольської ідеальної громади»
        в модерній державі?'
