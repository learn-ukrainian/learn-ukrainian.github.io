slug: cult-of-shevchenko
title: 'Культ Шевченка: Рецепція і Міфи'
word_target: 4000
content_outline:
- section: 'Вступ — Від Пророка до Ікони: I — Еволюція образу'
  words: 400
  points:
  - 'Початкові етапи формування культу після 1861 року: перепоховання як перша масова
    акція.'
  - Трансформація від геніального поета до сакрального національного символу.
- section: 'Вступ — Від Пророка до Ікони: II — Структура міфу'
  words: 400
  points:
  - Механізми перетворення історичної постаті на національний міф.
  - Чому аналіз рецепції Шевченка є ключем до розуміння української ідентичності та
    постколоніальних травм.
- section: 'Радянський Шевченко: I — Канонізація в СРСР'
  words: 450
  points:
  - 'Присвоєння спадщини: штучне створення образу ''революційного демократа'' та атеїста.'
  - Державна монументальна пропаганда 1930-х років як спосіб контролю над пам'яттю.
- section: 'Радянський Шевченко: II — Цензура та приховані сенси'
  words: 450
  points:
  - 'Що саме радянська влада системно приховувала: антиімперський пафос та релігійні
    мотиви.'
  - 'Візуальний канон: нав''язування образу похмурого дідуся у смушевій шапці замість
    успішного європейського академіка.'
- section: 'Діаспорний Шевченко: I — Збереження ідентичності'
  words: 350
  points:
  - Збереження нецензурованого Шевченка та повної спадщини в умовах політичної еміграції.
  - Культ Кобзаря як головний об'єднавчий і державотворчий фактор для розсіяних діаспорян.
- section: 'Діаспорний Шевченко: II — Ритуалізація і пам''ятники'
  words: 350
  points:
  - Відкриття пам'ятника у Вашингтоні (1964) як потужний геополітичний акт.
  - 'Інституціоналізація пам''яті: масові марші, декламації та обов''язкові ''шевченківські
    дні'' за кордоном.'
- section: 'Сучасні реінтерпретації: I — Шевченко на Майдані'
  words: 400
  points:
  - 'Живе переосмислення символу під час Революції Гідності: образ революціонера у
    касці та графіті.'
  - Як рядок 'Борітеся — поборете' набув нового буквального, екзистенційного звучання.
- section: 'Сучасні реінтерпретації: II — Деканонізація та «Кобзар 2.0»'
  words: 400
  points:
  - 'Провокація та суспільний діалог: виставка Андрія Грехова ''Квантовий стрибок
    Шевченка'' (2019).'
  - 'Поет у сучасних мемах: процес десакралізації ідола чи природне наближення до
    молодої аудиторії?'
- section: 'Концепція ''Національного Батька'': I — Ризики сакралізації'
  words: 400
  points:
  - Небезпека перетворення багатогранного живого класика на недоторканну бронзову
    ікону.
  - 'Проблема ''шкільного тягаря'': як застарілі методики викладання відлякують нові
    покоління читачів.'
- section: 'Концепція ''Національного Батька'': II — Нове прочитання'
  words: 400
  points:
  - Відкидання вузьких народницьких та радянських штампів у сучасному літературознавстві.
  - Праці Г. Грабовича ('Шевченко, якого не знаємо') та О. Забужко як успішні спроби
    деконструкції закостенілого міфу.
- section: Підсумок — Живий чи бронзовий?
  words: 400
  points:
  - 'Шевченко для українців XXI століття: перехід від ритуального поклоніння до інтелектуального
    діалогу.'
  - Підбиття підсумків курсу і перехід до рецепції діяльності його соратника та опонента
    — Пантелеймона Куліша.
