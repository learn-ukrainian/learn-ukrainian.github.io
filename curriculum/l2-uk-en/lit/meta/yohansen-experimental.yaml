slug: yohansen-experimental
title: Yohansen Experimental
word_target: 4000
content_outline:
- section: 'Вступ: I — Історичні умови та контекст епохи'
  words: 400
  points:
  - Атмосфера Харкова 1920-х років як епіцентру українського культурного ренесансу.
  - 'Постать Майка Йогансена: поліглот, лінгвіст, свідомий вибір української ідентичності.'
  - ВАПЛІТЕ та амбіція створення високої міської модерністської культури.
- section: 'Вступ: II — Місце твору в каноні та його актуальність'
  words: 400
  points:
  - «Подорож ученого доктора Леонардо...» як перший зразок українського авангардного
    метароману.
  - 'Зміна парадигми: від народницького реалізму до інтелектуальної гри.'
  - Сучасна постмодерна чутливість твору і його повернення до читача.
- section: 'Аналіз твору: I — Деконструкція сюжету'
  words: 400
  points:
  - 'Сюжет як містифікація: поїздка до Слобожанської Швайцарії як формальна рамка.'
  - Вставні новели, ліричні відступи та розмивання меж основної оповіді.
  - Свідома відмова від класичної розв'язки та лінійності.
- section: 'Аналіз твору: II — Джерела впливу та природа конфлікту'
  words: 400
  points:
  - 'Діалог з європейською традицією: Сервантес, Лоренс Стерн, Джеймс Джойс.'
  - Конфлікт переноситься у площину взаємин 'Автор — Текст — Читач'.
  - Руйнування читацьких очікувань жанру пригодницького роману.
- section: 'Герменевтика: I — Символіка простору'
  words: 400
  points:
  - Конструювання «Слобожанської Швайцарії» як ідеалізованої, майже міфологічної Аркадії.
  - Природа і ландшафт (Зміївщина, річка Донець) як головні дійові особи роману.
  - Стирання межі між реальним та уявним географічним простором.
- section: 'Герменевтика: II — Система персонажів як архетипів'
  words: 400
  points:
  - 'Доктор Леонардо та Дон-Жуан: деконструкція європейських культурних міфів.'
  - Прекрасна Альчеста як функція тексту, а не психологічний портрет.
  - Наратор (Автор) як верховний деміург, що маніпулює 'паперовими' маріонетками.
- section: 'Мова, стиль та поетика: I — Метатекстуальні інновації'
  words: 400
  points:
  - 'Оголення прийому: письменник коментує створення тексту в режимі реального часу.'
  - Звернення до 'шановного читача' як спосіб залучення його до співавторства.
  - Іронія і пародія як базові стилістичні регістри роману.
- section: 'Мова, стиль та поетика: II — Лексика та ритмізована проза'
  words: 400
  points:
  - 'Йогансен-лінгвіст: багатство словника, авторські неологізми та мовна гра.'
  - Специфіка ритміки прозового тексту, музикальність фрази.
  - Органічне вплетення слобожанських колоритних слів у модерністську структуру.
- section: 'Деколонізаційний вимір: Руйнування імперських міфів'
  words: 400
  points:
  - Спростування міфу про провінційність та виключно 'селянський' характер української
    літератури.
  - Повноцінна інтеграція українського тексту в загальноєвропейський авангардний дискурс.
  - Ствердження самодостатньої української ідентичності через високу форму.
- section: 'Підсумок та рецепція: Повернення і спадщина'
  words: 400
  points:
  - Репресії 1937 року та штучне вилучення Йогансена з культурного процесу.
  - Відродження інтересу до твору в незалежній Україні.
  - Вплив експериментальної прози Йогансена на сучасних постмодерністів (Бу-Ба-Бу,
    Жадан).
