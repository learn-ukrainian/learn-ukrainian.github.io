slug: black-council-history
title: 'Чорна рада: Історичний контекст'
word_target: 4000
content_outline:
- section: 'Вступ: Концепт «Руїни» в українській історіографії'
  words: 350
  points:
  - Хронологічні межі періоду (1657–1687) та його сутність
  - Руїна як криза легітимності та втрата національного консенсусу
  - Деколонізаційний погляд на епоху без впливу російських міфів про «возз'єднання»
- section: 'Вступ: Передумови розколу (1657–1663 роки)'
  words: 350
  points:
  - Чуднівська кампанія та Слободищенський трактат 1660 року
  - Фактичний поділ Гетьманщини по Дніпру на Правобережну і Лівобережну
  - Формування вакууму влади та початок боротьби за булаву
- section: 'Чорна рада 1663 року: Інститут загальної козацької ради'
  words: 350
  points:
  - 'Поняття «чорної ради»: участь нереєстрового козацтва, міщан та черні'
  - Відмінності між старшинською та загальною козацькою радою
  - Маніпуляція демократичними процедурами як інструмент тиску
- section: 'Чорна рада 1663 року: Ніжинський собор та кульмінація конфлікту'
  words: 400
  points:
  - Події 17-18 червня 1663 року під Ніжином (Романівський Кут)
  - Свідчення з Літопису Самовидця про насильство та хаос
  - Втручання московських посланців для легітимізації вигідного кандидата
- section: 'Політичні сили епохи: Соціальна поляризація'
  words: 400
  points:
  - Кармазинна старшина як державотворча, але консервативна еліта
  - Радикальні настрої соціальних низів (запорожців та міщанської голоти)
  - Як класова ненависть була використана для знищення державної єдності
- section: 'Політичні сили епохи: Геополітичний вимір'
  words: 400
  points:
  - 'Стратегія Московії: підтримка слабкого кандидата для обмеження автономії Гетьманщини'
  - Дестабілізуюча роль зовнішніх сил у розпалюванні внутрішньої ворожнечі
  - Польський та кримський чинники на тлі розколу України
- section: 'Охлократія як проблема: Влада натовпу в політичній теорії'
  words: 350
  points:
  - Визначення охлократії як руйнівної стадії демократії
  - Заміна правових інститутів правом сили та емоційного диктату
  - Чорна рада як хрестоматійний приклад охлократичного перевороту
- section: 'Охлократія як проблема: Популізм та соціальний вибух'
  words: 350
  points:
  - 'Технології демагогії: обіцянки перерозподілу багатств та рівності'
  - Наслідки соціального вибуху для національного суверенітету
  - Погляди П. Куліша на деструктивну природу некерованого натовпу
- section: 'Історичні постаті: Яким Сомко та Василь Золотаренко'
  words: 400
  points:
  - Яким Сомко як трагічний захисник сильної гетьманської влади і права
  - Василь Золотаренко та проблема розпорошення сил еліти
  - Страта лідерів старшинського табору в Борзні та її історичні наслідки
- section: 'Історичні постаті: Іван Брюховецький як феномен популізму'
  words: 400
  points:
  - Шлях від кошового отамана Січі до гетьмана Лівобережжя
  - Укладення Батуринських та Московських статей, що звузили автономію
  - Спростування радянського міфу про Брюховецького як «захисника бідних»
- section: 'Від історії до роману: Трансформація факту в художню правду'
  words: 350
  points:
  - Робота П. Куліша з літописними джерелами (Самовидець, Граб'янка)
  - Художнє переосмислення історичних подій та створення національних архетипів
  - Уроки «Чорної ради» як пересторога для майбутніх поколінь українців
