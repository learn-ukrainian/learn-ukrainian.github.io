slug: leonid-hlibov
title: 'Леонід Глібов: Майстер української байки'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Формування світогляду'
    words: 400
    points:
      - Народження у 1827 році на Полтавщині, ранні роки та вплив народної культури
      - Навчання у Ніжинському ліцеї вищих наук та перехід від російськомовної до
        україномовної творчості
  - section: 'Вступ та культурний контекст: Видавнича діяльність'
    words: 400
    points:
      - 'Робота вчителем історії та географії: гуманістичні принципи педагогіки'
      - Видання «Черниговского листка» (1861-1863) та тиск імперської цензури напередодні
        Валуєвського циркуляра
  - section: 'Аналіз твору: Сюжет байки Щука'
    words: 500
    points:
      - 'Фабула байки: суд над хижачкою-корупціонеркою'
      - Роль суддів (Осли, Шкапа, Цапи) як уособлення імперської бюрократичної машини
      - Парадоксальний вирок Лисиці («кинули у річку») як апогей абсурду
  - section: 'Аналіз твору: Конфлікт у байці Вовк та Ягня'
    words: 500
    points:
      - Класичний мандрівний сюжет в українській інтерпретації (1853 рік)
      - Конфлікт між грубою силою та безправною невинністю
      - Риторика Вовка як спроба виправдати право на насильство
  - section: 'Герменевтика та ключові образи: Езопівська мова'
    words: 500
    points:
      - Необхідність езопівської мови в умовах жорсткого цензурного гніту Російської
        імперії
      - Прихована політична сатира за побутовими сюжетами
      - Алегоричність оповіді та її розкодування тогочасним читачем
  - section: 'Герменевтика та ключові образи: Система персонажів'
    words: 500
    points:
      - 'Зоологічна метафорика: хижаки (Вовк, Лисиця, Щука) проти жертв і простаків'
      - Українізація архетипів мандрівних сюжетів
      - Соціальне маркування тварин (світ панів і чиновників проти світу селян)
  - section: 'Мова, стиль та поетика: Народність та інновації'
    words: 500
    points:
      - Свідоме використання народної розмовної мови як літературного інструменту
      - Інтеграція прислів'їв та приказок у тканину вірша
      - Демократизація українського літературного канону
  - section: 'Мова, стиль та поетика: Афористичність та гумор'
    words: 400
    points:
      - 'Специфіка моралі («сили») у байках Глібова: від дидактики до афоризму'
      - Трансформація легкої іронії у гострий сарказм залежно від теми
      - Ритмомелодика та природність віршування
  - section: 'Деколонізаційний вимір: Деконструкція міфу'
    words: 500
    points:
      - Спростування імперського та радянського міфу про Глібова як «українського
        Крилова»
      - Самостійність художнього мислення та оригінальність обробки класичних сюжетів
      - Глібов як свідомий учасник українського національного відродження
  - section: 'Деколонізаційний вимір: Агентність українського слова'
    words: 400
    points:
      - Вибір української мови для творчості як політичний та культурний маніфест
      - 'Антиімперський пафос байок: критика кріпосницьких і бюрократичних порядків'
      - Збереження національної ідентичності через літературну діяльність
  - section: 'Підсумок та рецепція: Оцінка сучасників'
    words: 250
    points:
      - 'Аналіз Івана Франка: визнання Глібова «найкращим українським байкописом»'
      - 'Світовий контекст: місце Глібова поруч із Езопом та Лафонтеном'
  - section: 'Підсумок та рецепція: Спадщина Леоніда Глібова'
    words: 250
    points:
      - Вплив байкаря на розвиток української літератури ХХ століття
      - Актуальність сатири Глібова у контексті сучасних соціальних викликів
