slug: kateryna-kalytko-prose
title: Kateryna Kalytko Prose
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: Катерина Калитко як ключовий голос'
  words: 350
  points:
  - 'Життєвий та творчий шлях Катерини Калитко: поетичний бекграунд та перехід до
    малої прози.'
  - Значення збірки «Земля Загублених, або Маленькі страшні казки» (2017) у її літературному
    доробку.
  - Отримання премії «Книга року ВВС – 2017» та Шевченківської премії (2023) як свідчення
    визнання масштабу таланту.
- section: 'Вступ та культурний контекст: Література в тіні війни'
  words: 350
  points:
  - Вплив російсько-української війни (з 2014) на формування екзистенційної проблематики
    творів Калитко.
  - Паралелі з балканським досвідом воєн (через перекладацьку оптику авторки) та універсалізація
    європейської травми.
  - Поняття «іншості» та маргіналізації як визначальні теми сучасної епохи криз та
    вимушених міграцій.
- section: 'Аналіз твору: Архітектура «Землі загублених»'
  words: 400
  points:
  - 'Композиційна структура збірки: об''єднання дев''яти самостійних новел спільною
    географією міфу.'
  - Топос «Землі загублених» як альтернативної, химерної реальності для тих, хто не
    вписався в соціум.
  - 'Розвиток сюжету: від індивідуальної історії відторгнення до створення спільної
    моделі виживання.'
- section: 'Аналіз твору: Механіка конфлікту відчуження та виживання'
  words: 400
  points:
  - Базовий конфлікт між жорстокою «нормою» суспільства та «аномалією» індивіда.
  - Травма втрати (дому, ідентичності, близьких) як головний внутрішній рушій вчинків
    героїв.
  - Виживання через прийняття власної інакшості та вибудовування нових, глибоких зв'язків
    між вигнанцями.
- section: 'Герменевтика та ключові образи: Архетипи та міфологічні підтексти'
  words: 400
  points:
  - Звернення до форми «казки» у її первісному, жорстокому фольклорному варіанті без
    дитячих пом'якшень.
  - Архетип «дому» (назавжди втраченого та віднайденого) як сакрального та захищеного
    простору.
  - 'Символіка води (межа світів), землі (укорінення) та крові у прозі Калитко: зв''язок
    між життям і смертю.'
- section: 'Герменевтика та ключові образи: Система персонажів маргіналів'
  words: 400
  points:
  - 'Галерея героїв: люди з фізичними вадами, соціальні вигнанці, диваки та аутсайдери.'
  - Еволюція персонажів від беззахисної жертви суспільного остракізму до деміургів
    власного простору.
  - 'Психологічна глибина портретів: відсутність ідеалізації та гранична, фізіологічна
    достовірність страждань.'
- section: 'Мова, стиль та поетика: Магічний реалізм та жорстока тілесність'
  words: 350
  points:
  - Поєднання химерного, магічного з граничним натуралізмом, яке створює ефект надреалістичності
    буття.
  - '«Тілесність» тексту: фіксація душевного болю та травм через гострі фізичні відчуття,
    запахи, дотики.'
  - Гротеск як літературний інструмент висвітлення абсурдності навколишнього світу
    та людської жорстокості.
- section: 'Мова, стиль та поетика: Синтаксис травми та ритміка оповіді'
  words: 350
  points:
  - 'Поетичність прози: ритмізований синтаксис, густа метафорика та символізм, притаманні
    авторці-поетесі.'
  - Використання специфічної експресивної лексики та топоніміки для творення неповторної
    міфологічної атмосфери.
  - Мова як засіб терапії та свідомого конструювання власного захищеного світу замість
    втраченого.
- section: 'Деколонізаційний вимір: Руйнування імперських наративів про дім'
  words: 350
  points:
  - 'Орієнтація на європейський контекст: децентралізація і повне ігнорування імперської
    російської оптики в осмисленні травми.'
  - Деконструкція міфу про «велику культуру» агресора через показ приватних трагедій
    розчавлених нею «маленьких людей».
  - Захист українського культурного та фізичного простору від поглинання як екзистенційна
    гуманістична необхідність.
- section: 'Деколонізаційний вимір: Суб''єктність через пам''ять'
  words: 350
  points:
  - 'Герої Калитко не є пасивними жертвами: їхній вибір пам''ятати є активним актом
    екзистенційного опору.'
  - Ствердження власної суб'єктності через непохитне право бути собою, навіть перебуваючи
    у вигнанні.
  - Відновлення розірваних зв'язків та збереження пам'яті як ключова форма національної
    та особистої резильєнтності.
- section: 'Підсумок та рецепція: Вплив на літературний процес'
  words: 350
  points:
  - Висока оцінка «Землі загублених» критикою та суттєве розширення жанрових горизонтів
    української малої прози.
  - Місце текстів Калитко у каноні сучасної української літератури як творів потужного
    європейського масштабу.
  - 'Відкриті питання: виклик суспільству щодо здатності до емпатії та прийняття «інших»
    після травматичного досвіду війни.'
