slug: khvylovy-woodsnipes
title: Khvylovy Woodsnipes
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови та ВАПЛІТЕ'
    words: 500
    points:
      - Літературна дискусія 1925-1928 років як підґрунтя для роману
      - Роль журналу «ВАПЛІТЕ» та гасло «Геть від Москви!»
      - 'Ідеологічний вибух 1927 року: публікація 5-го номера та репресії'
  - section: 'Вступ та культурний контекст: II — Місце в каноні та актуальність'
    words: 350
    points:
      - 'Трагедія 6-го номера: знищений рукопис і втрачена друга частина'
      - «Вальдшнепи» як найбільший літературний міф Розстріляного Відродження
      - Чому діагноз Хвильового залишається болюче актуальним сьогодні
  - section: 'Аналіз твору: I — Експозиція та ключові етапи'
    words: 500
    points:
      - 'Хронотоп твору: літній південь, атмосфера відпочинку та прихованої тривоги'
      - Полювання на вальдшнепів як метафора безцільності та духовного блукання
      - Діалог як головний рушій сюжету
  - section: 'Аналіз твору: II — Джерела, впливи та головний конфлікт'
    words: 500
    points:
      - Полеміка з Ф. Достоєвським та Ніцшеанські мотиви
      - Зіткнення «м'якого» українського ідеалізму та «жорсткого» волюнтаризму
      - Психологічний конфлікт між особистістю та догматами партії
  - section: 'Герменевтика образів: I — Дмитрій Карамазов як український інтелігент'
    words: 500
    points:
      - 'Розчарування Карамазова: від революційного романтика до скептика'
      - 'Анатомія слабкості: відсутність внутрішнього стрижня'
      - Трагедія націонал-комуніста, який усвідомив обман метрополії
  - section: 'Герменевтика образів: II — Аглая як символ нової України'
    words: 500
    points:
      - Аглая як надлюдина, інтелектуалка, що кидає виклик провінційності
      - Зневага до «малоросійського» комплексу та просвітянства
      - Фаустівський дух та воля до влади як порятунок нації
  - section: 'Мова та стиль: I — Стилістичні інновації Хвильового'
    words: 400
    points:
      - Орнаменталізм, імпресіоністична деталізація та ліризм прози
      - Поєднання тонкого психологізму з жорсткою політичною публіцистикою
      - Музичність фрази («запах слова»)
  - section: 'Мова та стиль: II — Ритміка, синтаксис та неохаризматичність'
    words: 400
    points:
      - Рваний, нервовий синтаксис, що відображає злам епох
      - 'Специфічний лексикон доби: політичні неологізми, саркастичні епітети'
      - Внутрішні монологи як інструмент психоаналізу
  - section: 'Деколонізаційний вимір: I — Руйнування малоросійського міфу'
    words: 500
    points:
      - Критика «сопілково-вишиванкової» України, зручної для імперії
      - Деконструкція міфу про «братні народи» через призму партійної бюрократії
      - Відмова від статусу культурної провінції
  - section: 'Деколонізаційний вимір: II — Агентність та опір асиміляції'
    words: 500
    points:
      - Аглая як голос суверенного майбутнього, що вимагає суб'єктності
      - Несумісність українського відродження з російським диктатом
      - Пророцтво Хвильового щодо неминучого краху компромісів
  - section: 'Підсумок та рецепція: Вплив на наступні покоління'
    words: 400
    points:
      - 'Доля Хвильового: від пострілу 1933 року до забуття і повернення'
      - Рецепція твору в діаспорі (Юрій Шевельов) та у сучасній Україні (Оксана Забужко)
      - «Вальдшнепи» як вічний виклик українській інтелігенції
