slug: haidamaky
title: 'Гайдамаки: Кривава Свобода'
word_target: 4000
content_outline:
- section: 'Вступ — Коліївщина 1768 року: I — Історичне підґрунтя'
  words: 350
  points:
  - 'Аналіз соціально-політичних передумов на Правобережжі XVIII століття: утиски
    з боку Барської конфедерації.'
  - 'Релігійний конфлікт як тригер повстання: протистояння православних та уніатів/католиків.'
  - Формування гайдамацького руху як збройної відповіді на системний терор.
- section: 'Вступ — Коліївщина 1768 року: II — Мотивація автора'
  words: 350
  points:
  - Чому Шевченко обирає саме Коліївщину для свого найбільшого епосу.
  - Синтез історичних праць (Бантиш-Каменський) та усної народної пам'яті (розповіді
    діда Івана).
  - 'Деколонізаційний акт: легітимізація українського збройного опору всупереч імперським
    наративам.'
- section: 'Структура поеми: I — Жанрова специфіка'
  words: 350
  points:
  - 'Своєрідність жанру: поєднання масштабного історичного епосу та пронизливої лірики.'
  - Подолання класицистичних канонів та створення української романтичної епопеї.
  - 'Стилістичні прийоми: від фольклорних мотивів до високого патетичного регістру.'
- section: 'Структура поеми: II — Сюжетні лінії та відступи'
  words: 350
  points:
  - 'Архітектоніка твору: переплетення трьох ключових площин.'
  - Історична лінія (Залізняк, Гонта) та інтимно-романтична лінія (Ярема і Оксана).
  - 'Функція авторських ліричних відступів: голос поета як морального камертона історії.'
- section: 'Ярема і Оксана — любовний роман: I — Еволюція Яреми'
  words: 350
  points:
  - 'Початковий етап: Ярема Галайда як забитий наймит, безправний попихач.'
  - 'Психологічний перелом: як особиста образа і кохання трансформують його у грізного
    ''нового козака''.'
  - 'Символізм еволюції: Ярема як уособлення народних мас, що пробуджуються до боротьби.'
- section: 'Ярема і Оксана — любовний роман: II — Романтичний міф'
  words: 350
  points:
  - Роль ідеалізованого кохання посеред жорстокого хаосу повстання.
  - Врятування Оксани як міфологічний мотив звитяжця і діви в біді.
  - Співвідношення художньої вигадки та історичної достовірності в інтимній лінії
    поеми.
- section: 'Гонта і сини — античний фатум: I — Образ трагічного героя'
  words: 350
  points:
  - Іван Гонта як персонаж античної трагедії або шекспірівської драми.
  - 'Тягар відповідальності лідера повстання: конфлікт між обов''язком та особистим
    життям.'
  - 'Історична довідка: розбіжність між реальним життєписом Гонти та літературним
    образом.'
- section: 'Гонта і сини — античний фатум: II — Мотив синовбивства'
  words: 350
  points:
  - 'Кульмінаційна сцена твору: глибокий психологічний аналіз вбивства синів-католиків.'
  - 'Символічне значення акту: вища самопожертва в ім''я клятви та національного обов''язку.'
  - Синтез емоційного шоку та ідеологічного посилу (паралелі з 'Тарасом Бульбою' Гоголя).
- section: 'Етика бунту: I — Філософія помсти'
  words: 350
  points:
  - 'Сакралізація гніву: аналіз сцени освячення ножів (''Святий ніж'').'
  - 'Природа кривавості повстання: насильство як закономірний, хоч і жахливий, наслідок
    пригноблення.'
  - 'Етична дилема: чи може жорстока мета (відплата) виправдати такі самі жорстокі
    засоби?'
- section: 'Етика бунту: II — Катарсис і спокута'
  words: 350
  points:
  - 'Пошук спокути в крові: як герої та автор осмислюють межі людської жорстокості.'
  - Шевченко не ідеалізує різанину, а жахається її руйнівній силі.
  - 'Катартичний ефект поеми: очищення через співпереживання масштабній народній трагедії.'
- section: 'Підсумок — Пам''ять і травма: I — Українсько-польський дискурс'
  words: 350
  points:
  - 'Аналіз епілогу твору: рефлексія поета про слов''янську братовбивчу війну.'
  - Література як інструмент опрацювання глибоких колективних травм.
  - Шевченкове послання про примирення ('сиділи б та й браталися') на тлі кривавої
    історії.
- section: 'Підсумок — Пам''ять і травма: II — Сучасна рецепція'
  words: 350
  points:
  - Як 'Гайдамаки' читаються сьогодні в умовах новітньої боротьби за суверенітет.
  - Роль поеми у формуванні сучасної української національної пам'яті.
  - 'Висновок: епос як попередження історії та легітимізація невіддільного права на
    волю.'
