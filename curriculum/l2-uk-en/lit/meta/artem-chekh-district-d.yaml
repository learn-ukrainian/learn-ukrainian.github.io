slug: artem-chekh-district-d
title: Artem Chekh District D
word_target: 5000
content_outline:
  - section: 'Вступ: Історичні умови та культурний контекст'
    words: 450
    points:
      - Характеристика перехідної епохи 1990-х років в Україні (економічна криза,
        розпад СРСР).
      - Черкаси як типове пострадянське індустріальне місто та специфіка району заводу
        «Хімволокно».
      - 'Травма переходу: як зникнення радянської стабільності породило епоху виживання.'
  - section: 'Вступ: Місце в літературному каноні та актуальність'
    words: 450
    points:
      - «Район Д» як ключовий текст про пострадянський транзит та легітимізація пам'яті
        покоління міленіалів.
      - Відхід від класичної української традиції до жорсткого міського реалізму.
      - Значення тексту для сучасного розуміння витоків українського соціуму.
  - section: 'Аналіз твору: Сюжетні лінії та етапи розвитку'
    words: 500
    points:
      - 'Структура збірки: 16 автономних, але пов''язаних простором і часом історій
        (роман у новелах).'
      - Брак класичного лінійного сюжету на користь мозаїчної панорами мікрорайону.
      - 'Фрагментарність життєвих історій: від дитячих спогадів до дорослого фаталізму.'
  - section: 'Аналіз твору: Впливи, джерела та конфлікт'
    words: 450
    points:
      - Автобіографічність та елементи художнього репортажу (non-fiction впливи).
      - Спорідненість з американським «брудним реалізмом».
      - 'Основний конфлікт: людина, позбавлена орієнтирів, проти агресивного і байдужого
        соціального середовища.'
  - section: 'Герменевтика: Символіка простору Району Д'
    words: 500
    points:
      - 'Топоніміка району: гаражі, пустирі, панельні будинки як метафора суспільного
        занепаду.'
      - Район як закритий космос зі своїми законами, що поглинає і формує ідентичність.
      - Символіка побитих ліхтарів та темряви як відображення безвиході епохи.
  - section: 'Герменевтика: Система персонажів та архетипи'
    words: 500
    points:
      - 'Галерея маргіналів: «човники», пияки, кримінальники, самотні жінки та покинуті
        діти.'
      - 'Дегероїзація: відсутність класичних героїв-переможців; кожен персонаж має
        свою травму.'
      - Архетип «маленької людини» періоду дикого капіталізму.
  - section: 'Мова і стиль: Стилістичні інновації та документалізм'
    words: 500
    points:
      - 'Холодна, відсторонена оптика оповідача: безоцінкова фіксація жорстокої реальності.'
      - Кінематографічність описів та мінімалізм виражальних засобів.
      - Відмова від пафосу та штучного моралізаторства в оцінці персонажів.
  - section: 'Поетика: Маргінальний лексикон та ритміка тексту'
    words: 450
    points:
      - Використання суржику та обсценної лексики як інструментів маркування соціального
        дна.
      - Суржик не як засіб гумору (як у класиці), а як автентичний голос відчаю та
        адаптації.
      - Рваний синтаксис та специфічна ритміка, що передають нервозність 90-х.
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу провінції'
    words: 450
    points:
      - Деконструкція радянського міфу про щасливе та уніфіковане робітниче місто.
      - Відкидання російського імперського дискурсу, де українська провінція була
        або ідилічною, або комічною.
      - Район Д як автономний самодостатній простір з власною трагедією, незалежною
        від імперського центру.
  - section: 'Деколонізаційний вимір: Агентність маргінала та опір асиміляції'
    words: 450
    points:
      - Як навіть на самому соціальному дні герої виявляють інстинкт виживання та
        впертість.
      - 'Звільнення від радянського патерналізму: герої беруть відповідальність за
        виживання на себе (хоч і в спотворених формах).'
      - Процес болісного, але незворотного відриву від радянського минулого.
  - section: 'Підсумок та рецепція: Світовий контекст і вплив твору'
    words: 400
    points:
      - 'Визнання критикою: шорт-ліст премії BBC та здобуття премії імені Джозефа
        Конрада-Коженьовського (2019).'
      - Вписування українського досвіду транзиту в східноєвропейський контекст літератури
        про розпад соцтабору.
      - Вплив тексту на сучасну українську прозу як взірця чесної роботи з колективною
        травмою минулого.
