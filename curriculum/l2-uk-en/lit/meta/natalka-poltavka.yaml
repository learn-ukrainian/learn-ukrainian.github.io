slug: natalka-poltavka
title: 'Наталка Полтавка: Анатомія Почуттів'
word_target: 4000
content_outline:
- section: Вступ — Від реготу до сльози
  words: 400
  points:
  - Злам у творчості Котляревського після створення 'Енеїди'.
  - Прем'єра п'єси у 1819 році за участю Михайла Щепкіна у Полтаві.
  - 'Пошук нового регістру: від бурлеску та сміху до серйозності й катарсису.'
- section: 'Сентименталізм як літературний напрям: І — Європейський контекст'
  words: 400
  points:
  - Філософія сентименталізму та ідеал 'природної людини' (Ж.-Ж. Руссо).
  - Зародження європейського сентименталізму (творчість С. Річардсона).
  - Відхід від сухого раціоналізму класицизму на користь культу почуттів.
- section: 'Сентименталізм як літературний напрям: ІІ — Українська специфіка'
  words: 400
  points:
  - Національно-демократичне забарвлення українського сентименталізму.
  - Ствердження людської гідності та високої моралі простого селянина.
  - 'Відмінність від пасивної та приреченої російської ''Бідної Лізи'': активна життєва
    позиція героїні.'
- section: 'Наталка — архетип української нареченої: І — Характеристика та конфлікт'
  words: 500
  points:
  - Характеристика Наталки як втілення народного етичного ідеалу (розум, гідність,
    відданість).
  - 'Зовнішній соціально-майновий конфлікт: багатство і статус возного проти бідності
    дівчини.'
  - 'Внутрішній конфлікт: обов''язок перед матір''ю (Терпилихою) проти кохання до
    Петра.'
- section: 'Наталка — архетип української нареченої: ІІ — Архетип та порівняння'
  words: 400
  points:
  - Закладення архетипу сильної, раціональної українки у літературі.
  - Порівняльний аналіз із 'Марусею' Григорія Квітки-Основ'яненка.
  - 'Моделі святості та жертовності: земна воля Наталки проти релігійної покірності
    Марусі.'
- section: 'Музика важливіша за слово: І — Народна пісня як двигун'
  words: 500
  points:
  - Аналіз пісні 'Віють вітри' як потужної психологічної експозиції п'єси.
  - 'Функціональність 22 пісень: вони не є орнаментом, а рухають сюжет і слугують
    монологами-сповідями.'
  - Глибока трансформація фольклорного матеріалу під потреби драми.
- section: 'Музика важливіша за слово: ІІ — Опера чи драма?'
  words: 400
  points:
  - Синтетична природа твору (зингшпіль, п'єса з піснями).
  - Генетичний зв'язок із традицією вертепної драми та інтермедіями.
  - Перетворення п'єси на національну оперу завдяки музиці Миколи Лисенка (1889).
- section: 'Другорядні персонажі: І — Возний та Петро'
  words: 500
  points:
  - 'Возний Тетерваковський як комічний антагоніст: висміювання бюрократії Російської
    імперії.'
  - Мовна партія возного (канцелярський суржик) як інструмент гострої сатири.
  - 'Образ Петра: благородний ідеаліст, чия жертовність створює моральний контраст
    у п''єсі.'
- section: 'Другорядні персонажі: ІІ — Образ Терпилихи'
  words: 300
  points:
  - Горпина Терпилиха як психологічно достовірний образ матері.
  - 'Аналіз її мотивації: страх злиднів і прагматизм виживання, а не природна жорстокість.'
  - Конфлікт поколінь в умовах соціальної незахищеності.
- section: Підсумок — Український театр народжується
  words: 400
  points:
  - Значення п'єси як фундаменту професійного українського театру.
  - Остаточний доказ того, що народна мова здатна передавати високий драматизм.
  - Прямий вплив твору на розвиток театру корифеїв та подальшу українську драматургію.
