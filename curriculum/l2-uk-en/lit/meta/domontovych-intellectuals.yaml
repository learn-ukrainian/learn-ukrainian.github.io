slug: domontovych-intellectuals
title: Domontovych Intellectuals
word_target: 4000
content_outline:
- section: 'Вступ: Історичні умови та постать В. Домонтовича'
  words: 350
  points:
  - 'Феномен Віктора Петрова: науковець, розвідник і письменник.'
  - 'Катастрофічний контекст ХХ століття: революція та Розстріляне Відродження.'
  - Перехід від народництва до інтелектуальної прози.
- section: 'Вступ: Місце в каноні та актуальність'
  words: 300
  points:
  - Започаткування європейського інтелектуального роману в українській літературі.
  - 'Актуальність екзистенційної проблематики: криза гуманізму.'
  - 'Чому тексти Домонтовича залишаються сучасними: рефлексія над штучністю буття.'
- section: 'Аналіз твору: Сюжетні етапи та їх значення'
  words: 400
  points:
  - Огляд фабули романів «Дівчина з ведмедиком» та «Без ґрунту».
  - Редукція дії на користь філософської рефлексії.
  - Експозиція внутрішнього світу персонажа замість зовнішніх подій.
- section: 'Аналіз твору: Конфлікт та філософські впливи'
  words: 450
  points:
  - Зіткнення раціоналізму та ірраціональної стихії життя.
  - Вплив європейського екзистенціалізму та ніцшеанства.
  - Трагічна розколотість модерної людини у кризову добу.
- section: 'Герменевтика: Символіка інтелектуальної прози'
  words: 350
  points:
  - 'Семантика ''ведмедика'': штучність, іронія, заперечення традицій.'
  - 'Метафора ''без ґрунту'': втрата коріння та екзистенційна самотність.'
  - Символічний простір міста як антиприродного середовища.
- section: 'Герменевтика: Архетипи та система персонажів'
  words: 400
  points:
  - 'Тип ''Доктора Серафікуса'': відірваний від життя інтелектуал.'
  - 'Жіночі образи: Зина як втілення бунту та руйнування умовностей.'
  - Деконструкція класичних європейських міфологем (Фауст, Дон Жуан).
- section: 'Мова та стиль: Авторські інновації'
  words: 350
  points:
  - 'Есеїзація прози: стирання меж між романом і трактатом.'
  - Парадоксальність мислення як основа авторського стилю.
  - Дистанційованість та іронія в оцінці подій.
- section: 'Мова та стиль: Ритміка і синтаксис'
  words: 350
  points:
  - Поліфонічність та ускладнений синтаксис інтелектуальних дискусій.
  - Органічне вплетення наукової термінології в художній текст.
  - 'Інтертекстуальність: діалог із європейською літературною традицією.'
- section: 'Деколонізаційний вимір: Руйнування імперського міфу'
  words: 400
  points:
  - Спростування міфу про 'селянську' сутність української літератури.
  - Створення повноцінного міського, урбаністичного українського наративу.
  - Відкидання російських культурних моделей на користь прямого діалогу з Європою.
- section: 'Деколонізаційний вимір: Українська агентність та опір'
  words: 350
  points:
  - 'Агентність мислення: здатність рефлексувати українською про глобальні кризи.'
  - Опір асиміляції через розбудову високої інтелектуальної культури.
  - Ствердження власної, суверенної філософської традиції.
- section: 'Підсумок: Світовий контекст і рецепція'
  words: 300
  points:
  - Паралелі з Г. Гессе, Р. Музілем та Ж.-П. Сартром.
  - Повернення творчості В. Домонтовича в сучасний український канон.
  - Вплив на сучасних українських авторів (інтелектуальна проза, есеїстика).
