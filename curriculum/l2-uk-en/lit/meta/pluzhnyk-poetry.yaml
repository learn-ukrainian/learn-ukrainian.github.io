slug: pluzhnyk-poetry
title: Pluzhnyk Poetry
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 750
    points:
      - 'Літературний Київ 1920-х років та альтернатива пролетарській масовості: групи
        «Ланка» та «МАРС».'
      - 'Місце Євгена Плужника в українському літературному каноні: найбільший лірик-екзистенціаліст
        Розстріляного відродження.'
      - Чому «тиха лірика» Плужника є сьогодні актуальним інтелектуальним заповітом.
  - section: 'Аналіз твору: I — Збірка «Дні» та експресіонізм'
    words: 750
    points:
      - 'Аналіз першої збірки (1926): відображення катастрофи братовбивчої війни через
        оптику окремої людини.'
      - Експресіоністична поетика, рвані ритми та болючі образи («Падають зорі — кроз
        кров...»).
      - Конфлікт між абстрактними «великими ідеями» та живою екзистенційною трагедією.
  - section: 'Аналіз твору: II — Збірки «Рання осінь» та «Рівновага»'
    words: 750
    points:
      - 'Еволюція світогляду поета від відчаю до стоїчної гармонії: аналіз книги «Рання
        осінь» (1927).'
      - 'Філософія збірки «Рівновага» (1933) як вершинного досягнення: прийняття долі,
        стоїцизм, діалог з вічністю.'
      - 'Трагічний контекст: підготовка «Рівноваги» перед арештом та її посмертне
        видання (1948, Аугсбург).'
  - section: Герменевтика та ключові образи
    words: 900
    points:
      - 'Детальний розбір концептів «спокою» і «рівноваги»: не пасивність, а вищий
        прояв духовної сили.'
      - Символіка осені, природи і хвороби як метафор екзистенційної межі.
      - 'Система образів: протиставлення внутрішньої тиші індивіда галасливому зовнішньому
        світу.'
  - section: Мова, стиль та поетика
    words: 900
    points:
      - 'Афористичність та лаконізм: відмова від зайвої риторики на користь інтенсивного
        смислу.'
      - 'Синтаксичні та пунктуаційні особливості: роль пауз, тире та крапок (поетика
        «перерваного дихання»).'
      - Синтез імпресіоністичної точності деталі з неокласичною досконалістю форми.
  - section: Деколонізаційний вимір
    words: 600
    points:
      - 'Руйнування міфу про необхідність «пролетарського хору»: абсолютна цінність
        індивідуального («Мій незалежний голос, мій — один»).'
      - «Внутрішня еміграція» як найвища форма спротиву радянській тоталітарній асиміляції.
      - Ствердження української поезії як частини європейського екзистенціалізму.
  - section: Підсумок та рецепція
    words: 400
    points:
      - Вплив Плужника на наступні покоління (шістдесятники, Нью-Йоркська група).
      - Довгий період заборони, понівечена цензурою реабілітація та повноцінне повернення
        в незалежній Україні.
      - Питання для дискусії щодо вибору між участю у суспільному процесі та збереженням
        внутрішньої «рівноваги».
