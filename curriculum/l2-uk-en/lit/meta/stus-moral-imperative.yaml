slug: stus-moral-imperative
title: Stus Moral Imperative
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови'
  words: 400
  points:
  - Феномен шістдесятників та перехід від культурного відродження до дисидентського
    руху
  - Протест у кінотеатрі «Україна» (1965) як точка неповернення
  - Екзистенційний вибір в умовах тоталітарної системи
- section: 'Вступ та культурний контекст: II — Місце в каноні'
  words: 400
  points:
  - Позиціонування Стуса як центральної постаті українського модернізму другої половини
    ХХ століття
  - Актуальність концепту «етичної гігієни» в сучасному світі
  - 'Європейський горизонт творчості: діалог з Рільке та Камю'
- section: 'Аналіз твору: Сюжет та структура: I — Життєвий конфлікт'
  words: 400
  points:
  - 'Життя автора як текст: концепт єдності біографії та поезії'
  - Конфлікт індивіда та тоталітарної машини як головна рушійна сила
  - Вступ до УГГ (1979) як свідомий крок назустріч неминучому арешту
- section: 'Аналіз твору: Сюжет та структура: II — Джерела та етапи'
  words: 400
  points:
  - Еволюція від ранньої лірики («Круговерть») до герметичної зрілості («Палімпсести»)
  - Вплив східної філософії, європейського екзистенціалізму та української барокової
    традиції
  - Табірний досвід як «шліфування» поетичного слова
- section: 'Герменевтика та ключові образи: I — Екзистенційний стоїцизм'
  words: 400
  points:
  - Розбір філософського образу «прямостояння» та гідності
  - 'Смислове наповнення морального імперативу: «брехати не можна»'
  - 'Система образів: хрест, дорога, самотність як простір істинної свободи'
- section: 'Герменевтика та ключові образи: II — Архетипи та міфопоетика'
  words: 400
  points:
  - Звернення до архетипів української культури (мати, земля, слово)
  - Міфологічні підтексти смерті-відродження (палімпсест як символ стирання і проступання
    суті)
  - Еволюція ліричного героя від страждальця до стоїчного переможця
- section: 'Мова, стиль та поетика: I — Інновації та неословник'
  words: 400
  points:
  - 'Мовотворчість Стуса: неологізми, ускладнена лексика як засіб захисту від радянського
    новоязу'
  - Барокова традиція словотворення та ускладненої метафорики
  - 'Робота з фонетикою: звукопис як семантичний інструмент'
- section: 'Мова, стиль та поетика: II — Ритміка та синтаксис'
  words: 400
  points:
  - 'Особливості ритмомелодики: рваний ритм, анжамбемани'
  - Синтаксичні зсуви, що відображають філософську напругу
  - Герметичність тексту як форма естетичного спротиву
- section: Деколонізаційний вимір
  words: 400
  points:
  - Руйнування радянського міфу про «щасливого радянського українця»
  - Ствердження повноцінної, непровінційної національної ідентичності
  - 'Опір русифікації: українська мова як простір абсолютної свободи та зброя'
- section: Підсумок та рецепція
  words: 400
  points:
  - Вплив Стуса на покоління незалежної України та сучасних військових
  - Перепоховання 1989 року як символічний початок краху СРСР в Україні
  - 'Питання для дискусії: ціна компромісу та межі людської стійкості'
