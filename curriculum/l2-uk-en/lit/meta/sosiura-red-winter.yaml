slug: sosiura-red-winter
title: Sosiura Red Winter
word_target: 5000
content_outline:
  - section: 'Вступ: Епоха та літературний контекст'
    words: 450
    points:
      - Літературна ситуація початку 1920-х років в Україні
      - Феноменальний успіх збірки та поеми «Червона зима» (1922)
      - Місце Володимира Сосюри у каноні українського модернізму
  - section: 'Історичний контекст: Від УНР до Червоної Армії'
    words: 500
    points:
      - Юність поета на Донбасі (Третя Рота, Дебальцеве)
      - Служба у 3-му Гайдамацькому полку Армії УНР (1918-1919)
      - Вимушений перехід до лав Червоної Армії у 1920 році як життєва драма
  - section: 'Сюжетний вимір: Автобіографізм та ліричний герой'
    words: 450
    points:
      - Глибока автобіографічність ліричного героя поеми
      - Спогади про Донбас, робітниче середовище та перше кохання
      - Переплетіння інтимних переживань із жорстокою реальністю війни
  - section: 'Структурні особливості: Монтаж пам''яті'
    words: 450
    points:
      - 'Фрагментарність композиції: поема як колаж спогадів'
      - Кінематографічний принцип зміни планів та сцен
      - Роль ліричних відступів у розвитку сюжету
  - section: 'Герменевтика: Образ «червоного вітру» та зими'
    words: 500
    points:
      - 'Колірна символіка тексту: контраст білого снігу та червоної крові'
      - «Червоний вітер» як метафора стихійної руйнівної сили історії
      - 'Амбівалентність образу зими: оновлення суспільства чи крижана смерть'
  - section: 'Система персонажів: Драма братовбивчої війни'
    words: 500
    points:
      - Відтворення трагедії українського народу через призму розділених сімей
      - Мотив втрати рідного брата на фронтах громадянської війни
      - Конфлікт між людяністю та ідеологічною необхідністю
  - section: 'Поетика: Ліризм у революційній епопеї'
    words: 450
    points:
      - 'Специфіка «сосюринського» ліризму: ніжність на тлі жорстокості'
      - Романтизація повсякденних деталей індустріального пейзажу
      - Емоційна щирість як головний рушій впливу тексту на читача
  - section: 'Стилістичні інновації: Ритміка та синтаксис'
    words: 450
    points:
      - Синкопований, рваний ритм, що передає нервовий пульс епохи
      - Використання народнопоетичних інтонацій у новітньому контексті
      - Семантика еліпсів (трикрапок) як фігури замовчування та травми
  - section: 'Деколонізація: Подолання радянського міфу'
    words: 500
    points:
      - Критика радянського трактування поеми як суто більшовицької агітки
      - Прихований патріотичний біль за понівеченою українською землею
      - Агентність українців у подіях 1917-1921 років крізь текст Сосюри
  - section: 'Внутрішній розкол: Концепт «Двох Володьок»'
    words: 450
    points:
      - Аналіз вірша «Два Володьки» (1930) як ключа до справжнього Сосюри
      - Боротьба «комунара» і «націоналіста» в душі ліричного героя
      - Трагедія цілого покоління, змушеного йти на компроміс з імперією
  - section: Підсумок та рецепція
    words: 450
    points:
      - Доля твору в радянській та сучасній українській критиці
      - Подальші репресії поета (виключення з партії 1934 р., цькування 1951 р.)
      - Актуальність «Червоної зими» у контексті сучасної війни за ідентичність
