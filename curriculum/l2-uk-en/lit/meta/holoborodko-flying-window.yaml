slug: holoborodko-flying-window
title: Holoborodko Flying Window
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови та переслідування'
    words: 450
    points:
      - Відрахування Голобородька з Київського університету (1964) та репресії КДБ
      - Знищення накладу збірки у видавництві "Молодь" через відмову від співпраці
        з режимом
      - Публікація збірки в Парижі (1970) та наслідки: 20 років заборони друкуватися
  - section: 'Вступ та культурний контекст: II — Місце в каноні та актуальність'
    words: 450
    points:
      - Роль Голобородька як ключової фігури "Київської школи поезії"
      - Естетичний нонконформізм як форма опору в тоталітарній державі
      - Входження "Летючого віконця" до 100 найкращих творів за версією ПЕН-клубу
  - section: 'Аналіз твору: I — Ліричний сюжет і фольклорні джерела'
    words: 450
    points:
      - Відмова від епічного наративу на користь плинного ліричного сюжету
      - Залучення українських казок, загадок та міфологічних замовлянь
      - Анімістичне світобачення та одухотворення сил природи
  - section: 'Аналіз твору: II — Естетичний конфлікт'
    words: 450
    points:
      - Протиставлення наївної відкритості та агресивної радянської дійсності
      - Внутрішня еволюція ліричного героя від спостерігача до міфотворця
      - Конфлікт між офіційним соцреалізмом і вільною поетичною уявою
  - section: 'Герменевтика та ключові образи: I — Метафорика і символіка'
    words: 450
    points:
      - Наскрізний образ "летючого віконця" як символ свободи візії та індивідуального
        простору
      - Взаємопереливання "живого" й "неживого" в природі
      - Концептуальні образи дерева, птаха, води та їх полісемантичність у ліриці
        поета
  - section: 'Герменевтика та ключові образи: II — Архетипи і міфологічні підтексти'
    words: 450
    points:
      - Звернення до прадавніх слов'янських міфологем як джерела поетичної енергії
      - Архетип дитини та мотив повернення до первісної чистоти сприйняття світу
      - Натурфілософська діалектика життя і смерті на тлі природних циклів
  - section: 'Мова, стиль та поетика: I — Інновації верлібру та ритміка'
    words: 450
    points:
      - Злам традиційної силабо-тоніки та послідовне утвердження українського верлібру
      - Індивідуальний ритм, цілком підпорядкований внутрішньому диханню та емоції
        вірша
      - Алітерації та асонанси як засіб створення унікальної музичності тексту
  - section: 'Мова, стиль та поетика: II — Неологізми та синтаксис'
    words: 450
    points:
      - Використання авторських неологізмів для розширення меж української мови
      - Орудний придієслівний ("сніг розтає хмарою") як основа свіжої метафори
      - Синтаксична свобода, "очудення" реальності та відмова від жорсткої пунктуації
  - section: 'Деколонізаційний вимір: I — Руйнування імперського міфу'
    words: 450
    points:
      - Демонтаж радянської вимоги до "ідейності" та "партійності" в літературі
      - Відмова від російського/імперського впливу через звернення до найглибшого
        автентичного фольклору
      - Естетичний спротив як найвища форма політичного та культурного дисидентства
  - section: 'Деколонізаційний вимір: II — Опір асиміляції та агентність'
    words: 400
    points:
      - Ствердження самобутності та самодостатності українського поетичного голосу
      - Агентність героя як вільного творця-спостерігача, що не підкоряється системі
      - Збереження національної ідентичності через глибинну генетичну пам'ять мови
  - section: 'Підсумок та рецепція: I — Вплив на наступні покоління'
    words: 300
    points:
      - Глибокий вплив на поетів вісімдесятників (І. Малкович, І. Римарук)
      - Фундаментальний внесок у формування сучасної традиції українського верлібру
      - Повернення спадщини Голобородька до читача наприкінці 1980-х років
  - section: 'Підсумок та рецепція: II — Світовий контекст і дискусія'
    words: 300
    points:
      - Синхронізація поезії Голобородька з європейським модернізмом і світовим сюрреалізмом
      - Переклади творів поета різними мовами світу
      - Питання для дискусії: внутрішня еміграція як спосіб збереження мистецької
          чесності в СРСР
