slug: antonenko-davydovych-prose
title: Antonenko Davydovych Prose
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: Історичні умови'
  words: 350
  points:
  - 'Формування світогляду: участь в Армії УНР та походження.'
  - 'Літературне середовище 1920-х: участь у «Ланці» та «МАРС».'
  - Трагедія Розстріляного відродження та перший арешт (1935).
- section: 'Вступ та культурний контекст: Місце в каноні'
  words: 350
  points:
  - Антоненко-Давидович як міст між 1920-ми та шістдесятниками.
  - Сучасна актуальність його безкомпромісної позиції.
  - Повернення спадщини (премія ім. Т. Шевченка 1992 р.).
- section: 'Аналіз твору: Етапи та розвиток сюжету'
  words: 400
  points:
  - 'Огляд повісті «Смерть» (1928): еволюція головного героя Костя Гордієнка.'
  - Документальна основа та репортажність прози («Землею українською»).
  - Сюжетні вісі «Сибірських новел» як літопису виживання.
- section: 'Аналіз твору: Джерела та конфлікт'
  words: 400
  points:
  - Головний конфлікт повісті «Смерть» — вибір між національною сутністю та партійним
    конформізмом.
  - Трагедія національного ренегатства в умовах більшовицької окупації.
  - Екзистенційний конфлікт у табірній прозі.
- section: 'Герменевтика та ключові образи: Символіка та персонажі'
  words: 400
  points:
  - 'Метафора «смерті»: фізична гибель проти духовної деградації.'
  - Символіка партійного квитка як угоди з дияволом.
  - 'Система персонажів табірних новел: збереження людської гідності.'
- section: 'Герменевтика та ключові образи: Архетипи та підтексти'
  words: 400
  points:
  - Міфологічний мотив зради власного коріння.
  - Архетип страдника-мученика в «Сибірських новелах».
  - Підтексти опору в умовах тоталітарного нагляду.
- section: 'Мова, стиль та поетика: Інновації та народна мова'
  words: 400
  points:
  - Книга «Як ми говоримо» як стилістичний та деколонізаційний маніфест.
  - Боротьба проти штучної синтаксичної русифікації (лінгвоциду).
  - Інтеграція живої народної мови у високу інтелектуальну прозу.
- section: 'Мова, стиль та поетика: Ритміка та синтаксис'
  words: 350
  points:
  - 'Особливості авторського стилю: психологічна глибина без пафосу.'
  - Лаконізм та точність фрази, вироблені роками таборів.
  - Аналіз текстуальних прийомів у пізніх творах («За ширмою»).
- section: 'Деколонізаційний вимір: Руйнування імперського міфу'
  words: 350
  points:
  - Спростування міфу про природність русифікації України.
  - Викриття імперської сутності більшовицької системи.
  - Деконструкція наративу про радянського «інтернаціоналіста».
- section: 'Деколонізаційний вимір: Агентність та опір'
  words: 300
  points:
  - Агентність автора як морального авторитета для дисидентів.
  - Культурне самоствердження через збереження мови.
  - Опір асиміляції на рівні кожного слова та життєвого вчинку.
- section: 'Підсумок та рецепція: Вплив та дискусія'
  words: 300
  points:
  - Колосальний вплив на покоління шістдесятників (І. Дзюба, Є. Сверстюк).
  - Світовий контекст свідоцтв про ГУЛАГ (порівняння з Солженіциним з української
    перспективи).
  - Відкриті питання про ціну національного компромісу сьогодні.
