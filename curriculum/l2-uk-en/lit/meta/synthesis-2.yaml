slug: synthesis-2
title: 'Синтез: Горизонти епохи 2'
word_target: 5000
content_outline:
  - section: 'Діахронний аналіз: I — Еволюція ідей та архетипів'
    words: 500
    points:
      - Відхід від позитивізму та народництва ХІХ століття до філософського індивідуалізму.
      - 'Трансформація ключових літературних архетипів: від колективного до індивідуального,
        від етнографічного до екзистенційного.'
      - Модернізм як органічне переосмислення національної традиції на новому світовому
        рівні.
  - section: 'Діахронний аналіз: II — Літературний діалог поколінь'
    words: 500
    points:
      - Полеміка між консерваторами-реалістами («батьками») та молодими модерністами
        («дітьми»).
      - Значення альманаху «З-над хмар і долин» (1901) як етапного маніфесту нового
        покоління.
      - Створення фундаменту, на якому пізніше постало покоління «Розстріляного відродження».
  - section: 'Деколонізаційна оптика: I — Стратегії інтелектуального опору'
    words: 500
    points:
      - Європеїзація як ключовий інструмент подолання імперської провінціалізації
        культури.
      - Прямий діалог з європейськими інтелектуальними центрами, минаючи російське
        посередництво.
      - 'Концепція «сталевої нитки»: збереження глибокої національної відповідальності
        в інноваційних естетичних формах.'
  - section: 'Деколонізаційна оптика: II — Деконструкція імперського міфу'
    words: 500
    points:
      - Системне руйнування стереотипу про українську літературу як виключно селянську
        та побутову.
      - Освоєння міського (урбаністичного) простору та космополітичних мотивів.
      - Розширення меж української мови для передачі найскладніших філософських концептів.
  - section: 'Стилістичний калейдоскоп: I — Новаторство авторських технік'
    words: 550
    points:
      - 'Психологічний імпресіонізм М. Коцюбинського: колористика та майстерність
        фіксації миттєвих станів.'
      - Неоромантизм і символізм у поезії М. Вороного та О. Олеся.
      - Гострота соціального та психологічного парадокса у неореалізмі В. Винниченка.
  - section: 'Стилістичний калейдоскоп: II — Трансформація літературної мови'
    words: 550
    points:
      - Відмова від прямолінійного опису на користь підтексту, ліризації та фрагментарності.
      - Поява нового літературного синтаксису, орієнтованого на передачу потоку свідомості.
      - Музикальність тексту та звукопис як визначальні ознаки української модерністської
        стилістики.
  - section: 'Філософія ідентичності: I — Конструювання нового суб''єкта'
    words: 500
    points:
      - Народження образу активного інтелігента-рефлектика.
      - Дослідження конфлікту між суспільним обов'язком та особистим екзистенційним
        вибором.
      - Звернення до підсвідомого та прихованих психологічних мотивів поведінки.
  - section: 'Філософія ідентичності: II — Формування національної етики'
    words: 500
    points:
      - 'Переосмислення моральних імперативів: від ідеології жертовності до ідеології
        дії та ствердження.'
      - Емансипація героїні та нова роль жінки в літературі і суспільстві.
      - Естетична підготовка ідеологічного ґрунту для визвольних змагань 1917-1921
        років.
  - section: 'Спадщина: I — Вплив на сучасний процес'
    words: 450
    points:
      - Значення модерністського прориву початку ХХ століття для подальшого розвитку
        української літератури.
      - Безперервність інтелектуальної традиції попри тоталітарні репресії.
      - Актуалізація естетичних пошуків тієї епохи в сучасній літературі доби Незалежності.
  - section: 'Спадщина: II — Канон та інтелектуальна безпека'
    words: 450
    points:
      - Важливість закріплення імен ранніх модерністів у світовому культурному каноні.
      - Опір спробам імперського привласнення українських геніїв та розмивання їхньої
        ідентичності.
      - Значення літературного канону для формування міцної інтелектуальної безпеки
        сучасної України.
