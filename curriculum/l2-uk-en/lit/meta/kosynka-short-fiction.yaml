slug: kosynka-short-fiction
title: "Григорій Косинка: Між Сном і Розстрілом — Експресіоністська Новела Розстріляного Відродження"
word_target: 5000
content_outline:
- section: 'Вступ: I — Розстріляне відродження як епоха і трагедія'
  words: 500
  points:
  - Феномен «Розстріляного відродження» 1920-х років — унікальний вибух модернізму в умовах радянської коренізаційної політики.
  - Косинка серед однолітків — Хвильовий, Підмогильний, Йогансен, Куліш — спільна доля і різні голоси одного покоління.
  - 'Контекст репресій: 1933–1937 роки і Великий терор як знищення цілого літературного покоління.'
- section: 'Вступ: II — Косинка-новеліст: формування і метод'
  words: 500
  points:
  - Сільське походження і тема села як центральний нерв прози — автобіографічна основа художнього всесвіту.
  - 'Жанровий вибір: чому новела, а не роман — стислість і концентрованість як поетичний принцип.'
  - Вплив Стефаника і власний голос — відступ від сентиментальної традиції на користь психологічної глибини.
- section: 'Аналіз: «В житах» — потік свідомості і право голосу'
  words: 700
  points:
  - 'Техніка потоку свідомості: Косинка серед перших в українській прозі, хто системно застосував цей метод.'
  - 'Конфлікт між особистим і колективним: герой між власним бажанням і соціальним обов''язком.'
  - Символіка жита — природа як дзеркало людської психіки, а не романтичне тло.
- section: 'Аналіз: «Фавст» — психологія насильства і революційна свідомість'
  words: 700
  points:
  - Революційна насильниця як моральна проблема — без простого осуду і без виправдання.
  - Фаустіанський договір з новою владою і його екзистенційна ціна для персонажів.
  - 'Мова персонажів: народна стихія проти більшовицького жаргону як зіткнення двох цивілізацій.'
- section: 'Аналіз: «Самосуд» — стихія натовпу і межа людяності'
  words: 600
  points:
  - Сцена самосуду як вибух колективного несвідомого — психологія натовпу під час соціального перевороту.
  - Відмова від однозначних оцінок — складна мораль революції без ілюзій і без романтизації.
  - 'Рецепція критики 1920-х: закиди «куркульства» і захисники таланту — Косинка між двома таборами.'
- section: 'Стилістика і мова: Між модернізмом і народною традицією'
  words: 600
  points:
  - 'Синтаксис Косинки: короткі динамічні фрази, незакінчені речення, монтажне мислення.'
  - Використання діалектизмів і народної фразеології як художнього прийому, а не лише локального колориту.
  - Колір і звук як автономні поетичні засоби в прозі — вплив живопису і музики на літературний текст.
- section: 'Деколонізаційна перспектива: Знищення традиції і боротьба за пам''ять'
  words: 500
  points:
  - «Розстріляне відродження» як свідома радянська операція зачистки — знищити покоління означало знищити мовну і культурну пам'ять.
  - Повернення Косинки після 1991 року — неповне і непомічене масовим читачем, тоді як потребує повного перевидання.
  - 'Порівняння з паралельним знищенням білоруського і єврейського відроджень у СРСР: спільний механізм культурного геноциду.'
- section: 'Підсумок: Косинка у повноті українського літературного канону'
  words: 400
  points:
  - Вплив на «химерну прозу» 1960–70-х — Шевчук, Земляк, Загребельний продовжують психологічну традицію Косинки.
  - Косинка і сучасна українська кіноестетика — переосмислення в нових медіях після 2014 і 2022 років.
  - "'Право на трагедію' — чому великі прозові традиції будуються на болі, а не на тріумфі, і що це означає для сучасних читачів."
