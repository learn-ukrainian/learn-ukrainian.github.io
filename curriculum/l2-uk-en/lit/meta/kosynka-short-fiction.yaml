slug: kosynka-short-fiction
title: 'Григорій Косинка: Між Сном і Розстрілом — Експресіоністська Новела Розстріляного
  Відродження'
word_target: 5000
content_outline:
- section: 'Вступ та культурний контекст: I — Майстер короткої прози'
  words: 450
  points:
  - Григорій Косинка — феномен новелістики Розстріляного відродження
  - Участь у повстанському русі та автобіографізм ранніх творів
- section: 'Вступ та культурний контекст: II — Місце в каноні та актуальність'
  words: 450
  points:
  - 'Місце в літературному каноні: від групи «Гроно» до «Ланки» (МАРС)'
  - Чому проза Косинки залишається важливою в контексті сучасної війни
- section: 'Аналіз твору: Сюжет та структура: I — Ключові новели та їхній сюжет'
  words: 450
  points:
  - 'Огляд ключових новел: «В житах», «Фавст», «На золотих богів»'
  - 'Джерела натхнення: відгуки повстанської молодості та вплив Василя Стефаника'
- section: 'Аналіз твору: Сюжет та структура: II — Конфлікт між індивідом і добою'
  words: 450
  points:
  - 'Структура конфлікту: людина перед обличчям безжалісної історії'
  - Зіткнення селянського світогляду з більшовицьким терором
- section: 'Герменевтика та ключові образи: I — Символіка та архетипи'
  words: 450
  points:
  - Детальний розбір символіки природи (жито, земля) у прозі Косинки
  - Народні підтексти та архетип вільного хлібороба
- section: 'Герменевтика та ключові образи: II — Система персонажів'
  words: 450
  points:
  - 'Типологія персонажів: від бунтаря до жертви обставин'
  - Еволюція героїв у новелах 1920-х років
- section: 'Мова, стиль та поетика: I — Експресіоністичні інновації'
  words: 450
  points:
  - 'Стилістичні інновації: монтажність, фрагментарність, потік свідомості'
  - Експресіонізм як інструмент передачі психологічного напруження
- section: 'Мова, стиль та поетика: II — Народна мова і синтаксис'
  words: 450
  points:
  - Органічне вплетення народної мови і діалектизмів
  - Особливості ритміки та рваного синтаксису Косинки
- section: 'Деколонізаційний вимір: I — Руйнування імперських міфів'
  words: 450
  points:
  - Спростування радянського міфу про «куркульського письменника» та «бандитизм»
  - Деконструкція більшовицької пропаганди через справжню історію села
- section: 'Деколонізаційний вимір: II — Агентність українського селянина'
  words: 450
  points:
  - Повернення суб'єктності та агентності українському селянину
  - Опір асиміляції, збройна і духовна боротьба за самоствердження
- section: 'Підсумок та рецепція: Вплив і спадщина Косинки'
  words: 500
  points:
  - Вплив на наступні покоління письменників (шістдесятників, химерну прозу)
  - Розстріл 15 грудня 1934 року як трагічна віха і спроба знищення пам'яті
  - Питання для дискусії та переосмислення спадщини в незалежній Україні
