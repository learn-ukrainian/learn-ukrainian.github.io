slug: eneida-war
title: 'Енеїда: Словник Війни'
word_target: 4000
content_outline:
- section: 'Вступ: І — ''Енеїда'' як воєнний епос'
  words: 400
  points:
  - Трансформація поеми у військовий епос (починаючи з 4-ї частини)
  - Баталістика займає понад третину всього обсягу тексту
  - Маскування козацької мілітарної історії під античний сюжет
- section: 'Вступ: ІІ — Феномен воєнного епосу в бурлеску'
  words: 400
  points:
  - Бурлеск як єдиний легальний спосіб опису знищеного війська
  - Оманлива 'несерйозність' як захист від імперської цензури
  - Війна як фундаментальний стан буття козацької нації
- section: 'Арсенал Енея: І — Холодна зброя та козацькі традиції'
  words: 400
  points:
  - Абсолютна заміна античної зброї на козацьку
  - Використання шабель, келепів, сокир та списів
  - Детальність описів, зумовлена військовим досвідом автора
- section: 'Арсенал Енея: ІІ — Вогнепальна зброя в тексті'
  words: 400
  points:
  - 'Свідомий анахронізм: поява артилерії у стародавньому світі'
  - Описи застосування гармат, мортир та рушниць
  - Технічна точність мілітарної термінології кінця 18 століття
- section: 'Анатомія бою: І — Масові сутички та військова ієрархія'
  words: 400
  points:
  - Аналіз організації троянської ватаги (структура Січі)
  - Кошовий, сотники, рядове козацтво у війську Енея
  - Опис логістики, таборування та бойових шикувань
- section: 'Анатомія бою: ІІ — Поєдинки та лицарська етика'
  words: 400
  points:
  - Героїка індивідуального двобою (Еней проти Турна)
  - Мотив побратимства та самопожертви (Ніз і Евріал)
  - Козацький ідеал військової честі та лицарства
- section: 'Естетика смішної смерті: І — Гумористична гіперболізація'
  words: 400
  points:
  - Специфічний феномен 'смішної смерті' ворога
  - Використання абсурдних евфемізмів та мовної гри
  - Десакралізація ворога через зведення його до кумедного тіла
- section: 'Естетика смішної смерті: ІІ — Гастрономічні метафори'
  words: 400
  points:
  - Унікальний прийом перетворення тіл на об'єкти споживання
  - Аналіз метафор 'на локшину кришив', 'сік на гаман'
  - Карнавальне подолання жаху через 'перетравлення' смерті
- section: 'Психотерапія сміхом: І — Війна та гумор'
  words: 400
  points:
  - Сміхова культура як екзистенційний щит перед лицем війни
  - Традиція сміятися над смертю в українській воєнній ментальності
  - Резонанс із сучасним чорним гумором під час російсько-української війни
- section: 'Підсумок: Від сміху до сентименту — еволюція Котляревського'
  words: 400
  points:
  - Вичерпання можливостей бурлескного жанру для опису нації
  - Усвідомлення неможливості збудувати глибокий наратив лише на сміху
  - Перехід від 'Енеїди' до 'Наталки Полтавки' (від гумору до сентименталізму)
