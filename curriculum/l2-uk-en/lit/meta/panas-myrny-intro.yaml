slug: panas-myrny-intro
title: 'Панас Мирний: Корифей української прози'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Феномен подвійного життя'
    words: 400
    points:
      - 'Панас Рудченко vs Панас Мирний: статський радник і підпільний класик.'
      - Конспірація як спосіб виживання в умовах Емського указу 1876 року.
      - Чому «Корифей»? Значення Мирного для переходу від етнографізму до психологізму.
  - section: 'Вступ та культурний контекст: II — Епоха «голодної волі»'
    words: 400
    points:
      - 'Історичне тло: розчарування реформою 1861 року.'
      - Соціальне розшарування села як ґрунт для конфлікту.
      - Роль журналу «Правда» та женевських видань у поширенні вільного слова.
  - section: 'Біографія та творчий шлях: I — Від Миргорода до Полтави'
    words: 500
    points:
      - 'Дитинство та формування світогляду: вплив родинних переказів та Кобзаря.'
      - Служба в канцелярії як джерело сюжетів (бачив несправедливість зсередини).
      - Участь у таємних гуртках («Унія») та зв'язки з інтелігенцією.
  - section: 'Біографія та творчий шлях: II — Творчий тандем з Іваном Біликом'
    words: 500
    points:
      - 'Роль брата Івана Білика: від критики нарису «Чіпка» до співавторства.'
      - Історія створення роману «Хіба ревуть воли, як ясла повні?» (1872-1875).
      - 'Одіссея публікації: цензурні заборони та вихід у Женеві (1880).'
  - section: 'Герменевтика та ключові образи: I — Анатомія падіння Чіпки'
    words: 600
    points:
      - 'Чіпка Варениченко: від правдошукача до «пропащої сили».'
      - 'Психологічна мотивація злочину: образа, помста чи божевілля?'
      - 'Контраст із Грицьком: конформізм проти бунту.'
      - 'Десакралізація народного месника: чому Чіпка стає катом свого народу.'
  - section: 'Герменевтика та ключові образи: II — Жіночі долі та символіка'
    words: 600
    points:
      - 'Мотря: трагедія материнської любові та суворості.'
      - Галя («польова царівна») як символ втраченої надії та совісті.
      - Баба Оришка як носій народної моралі та пам'яті.
      - Образ «села» (Піски) як колективного персонажа та історичної арени.
  - section: 'Мова, стиль та поетика: I — Соціально-психологічний реалізм'
    words: 400
    points:
      - 'Жанрова інновація: перехід від описовості до психоаналізу.'
      - 'Композиція роману: монтаж часових пластів («будинок з багатьма прибудовами»).'
      - 'Натуралістичні елементи: чесне зображення фізіології життя і смерті.'
  - section: 'Мова, стиль та поетика: II — Естетика «живого слова»'
    words: 400
    points:
      - Полтавський діалект як еталон літературної мови.
      - 'Сказ та оповідна манера: поліфонія голосів у тексті.'
      - 'Ритміка прози Мирного: ліризм у змалюванні пейзажів vs сухість протоколу.'
  - section: 'Деколонізаційний вимір: I — Імперія проти Людини'
    words: 400
    points:
      - Суд і земство як інструменти імперського насилля та корупції.
      - Руйнування міфу про «доброго царя» та справедливий закон.
      - Критика колоніальної адміністрації через призму чиновника-інсайдера.
  - section: 'Деколонізаційний вимір: II — Агентність українського героя'
    words: 400
    points:
      - Селянин як суб'єкт історії, а не етнографічна декорація.
      - Трагедія невикористаного потенціалу («пропаща сила» в умовах бездержавності).
      - 'Національна ідентичність персонажів: усвідомлення «ми» vs «вони» (пани/москалі).'
  - section: 'Підсумок та рецепція: I — Місце в каноні та сучасності'
    words: 500
    points:
      - Вплив Панаса Мирного на розвиток української прози ХХ століття.
      - 'Сприйняття твору сьогодні: Чіпка як попередник сучасних радикалів?'
      - 'Дискусійні питання: чи виправдовує соціальна несправедливість насильство?'
