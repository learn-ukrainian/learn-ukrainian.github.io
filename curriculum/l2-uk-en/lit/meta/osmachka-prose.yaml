slug: osmachka-prose
title: Osmachka Prose
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Біографічний контекст'
    words: 500
    points:
      - 'Формування Осьмачки у 1920-х роках: участь у «Ланці» (МАРС), дружба з Г.
        Косинкою та В. Підмогильним.'
      - Перехід від поезії до епічної прози як реакція на зміну епох.
  - section: 'Вступ та контекст: Досвід репресій та еміграція'
    words: 400
    points:
      - Арешти НКВС у 1930-х та симуляція божевілля як єдиний шлях до порятунку.
      - Еміграція, участь у МУРі та життя з постійним синдромом переслідування.
  - section: 'Аналіз ключових творів: «Старший боярин»'
    words: 750
    points:
      - Аналіз повісті 1946 року як спроби «збудувати батьківщину-державу в слові»
        (за Ю. Шевельовим).
      - 'Міфологізація простору: поєднання гоголівської традиції з модерністським
        світовідчуттям.'
      - Символіка Дантового епіграфа та мотиви втраченого раю.
  - section: 'Аналіз ключових творів: «План до двору»'
    words: 600
    points:
      - Художнє свідоцтво про трагедію примусової колективізації та розкуркулення.
      - Зображення руйнування етичних та онтологічних основ українського села.
      - 'Деконструкція радянського міфу про модернізацію: колективізація як етноцид.'
  - section: 'Аналіз ключових творів: «Ротонда душогубців»'
    words: 600
    points:
      - Літературне дослідження природи тоталітарного терору (НКВС).
      - Сюрреалістична та абсурдистська поетика як інструмент передачі історичного
        жаху.
      - Психологія ката і жертви в умовах абсолютної безправності.
  - section: 'Стилістика та мова автора: Експресіонізм і неврастенічний стиль'
    words: 500
    points:
      - 'Особливості експресіонізму Осьмачки: рваний синтаксис, гіперболізація, апокаліптичні
        образи.'
      - «Неврастенічність» письма як адекватна стилістична реакція на травму.
  - section: 'Стилістика та мова автора: Фольклорні та міфологічні мотиви'
    words: 500
    points:
      - Трансформація української демонології у текстах Осьмачки.
      - Використання міфологічних архетипів для осмислення історичної катастрофи ХХ
        століття.
  - section: 'Деколонізаційна перспектива: Як цей автор руйнує імперські міфи'
    words: 500
    points:
      - Осьмачка як абсолютний антипод соцреалізму.
      - Проза як юридично-історичне звинувачення радянської імперії у злочинах проти
        людяності.
  - section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
    words: 400
    points:
      - Збереження національної ідентичності через опір забуттю.
      - Україна у творах Осьмачки — не об'єкт експериментів, а трагічний, але духовно
        незалежний суб'єкт.
  - section: Підсумок та спадщина
    words: 250
    points:
      - Значення прози Тодося Осьмачки для українського літературного канону.
      - Вплив його текстів на літературу діаспори та повернення спадщини в сучасну
        Україну.
