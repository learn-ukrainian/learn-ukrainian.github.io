slug: rylsky-translations
title: Rylsky Translations
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 800
    points:
      - Історичні умови 1920-1930-х років та розгром неокласиків
      - Переклад як простір «внутрішньої еміграції» в епоху тоталітаризму
      - Місце Максима Рильського у формуванні національного перекладацького канону
      - Чому перекладацька спадщина Рильського залишається актуальною сьогодні
  - section: 'Аналіз твору: Сюжет та структура (Еволюція перекладача)'
    words: 750
    points:
      - 'Етапи розвитку Рильського-перекладача: від ранніх експериментів до монументальних
        полотен'
      - 'Джерела впливу: французькі символісти, античність, польський романтизм'
      - 'Специфіка побудови перекладацького корпусу: понад 250 тисяч рядків із 13
        мов'
      - Внутрішній конфлікт між вимушеними радянськими перекладами та справжніми шедеврами
  - section: Герменевтика та ключові образи (Теорія перекладу)
    words: 750
    points:
      - 'Теоретична концепція Рильського: переклад як «портрет», а не «фотографія»'
      - Роль перекладача як повноцінного співавтора та культурного медіума
      - Детальний розбір підходів до інтерпретації класичних текстів (на прикладі
        «Пана Тадеуша»)
      - Філософське осмислення процесу перекладу як факту рідної літератури
  - section: 'Мова, стиль та поетика: I — Лексичне багатство та форма'
    words: 750
    points:
      - 'Лексичні інновації Рильського-перекладача: поєднання архаїзмів та народної
        мови'
      - Неокласична точність і витонченість форми у відтворенні іншомовної поезії
      - Синтез книжної традиції та живого мовлення для передачі історичного колориту
  - section: 'Мова, стиль та поетика: II — Ритмомелодика та відтворення оригіналу'
    words: 600
    points:
      - Особливості відтворення метрики та ритміки оригінальних творів
      - Адаптація іноземних систем віршування до української силабо-тоніки
      - Майстерність у збереженні синтаксичної гнучкості та інтонації автора
  - section: Деколонізаційний вимір
    words: 750
    points:
      - Спростування імперського міфу про необхідність російської мови як посередника
      - Прямий діалог з європейською культурою як акт культурного суверенітету
      - Агентність українського перекладача у розбудові самодостатнього культурного
        простору
      - Переклад як форма м'якого опору асиміляції та русифікації
  - section: Підсумок та рецепція
    words: 600
    points:
      - Вплив перекладацької школи Рильського на Г. Кочура, М. Лукаша та інших майстрів
      - Місце українських перекладів Рильського у світовому контексті
      - Дискусійні питання щодо меж перекладності та компромісів в умовах цензури
