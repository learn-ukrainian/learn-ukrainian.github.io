slug: prokhasko-magical-carpathians
title: Prokhasko Magical Carpathians
word_target: 5000
content_outline:
  - section: 'Вступ: Станіславський феномен та контекст'
    words: 500
    points:
      - 'Літературна ситуація 1990-х років: виникнення «станіславського феномену».'
      - Постмодерністський вибух в Івано-Франківську та місце Тараса Прохаська в ньому.
      - Роль есеїстики та філософської прози у формуванні стилю письменника.
  - section: 'Вступ: Місце «НепрОстих» у каноні'
    words: 450
    points:
      - Вихід роману у 2002 році як віха українського магічного реалізму.
      - Відмова від традиційної лінійної оповіді на користь калейдоскопічного бачення.
      - 'Значення роману для сучасної європейської літератури: легітимізація карпатського
        міфу.'
  - section: 'Аналіз твору: Альтернативна історія Карпат'
    words: 500
    points:
      - 'Хронологічні межі тексту: від 1913 до 1951 року.'
      - Карпати як арена двох світових воєн і зміни імперій (Австро-Угорська, Польська,
        Радянська).
      - 'Яловець як географічний і метафоричний центр: створення альтернативного простору-часу.'
  - section: 'Аналіз твору: Структура і конфлікт'
    words: 450
    points:
      - 'Фрагментарність композиції: 20 частин як пазли великого міфу.'
      - Конфлікт між історичним (лінійним) часом та міфологічним (циклічним) часом
        гір.
      - 'Відсутність класичного антагоніста: час і ландшафт як головні рушії подій.'
  - section: 'Герменевтика: Символіка «НепрОстих» та демонологія'
    words: 500
    points:
      - 'Етимологія поняття: «непрості» як знахарі, мольфари, «земні боги» у гуцульській
        традиції.'
      - Трансформація фольклорного образу у філософський концепт.
      - Непрості як архітектори реальності, що впливають на історію силою думки і
        знання.
  - section: 'Герменевтика: Система персонажів та циклічність'
    words: 450
    points:
      - 'Родина Франциска: складні генеалогічні зв''язки та порушення суспільних табу.'
      - 'Усі жінки на ім''я Анна: метафора реінкарнації, циклічності життя і єдності
        жіночого начала.'
      - Мотив передачі пам'яті та знань через покоління.
  - section: 'Поетика: Топографічне письмо'
    words: 500
    points:
      - 'Концепція Тамари Гундорової: «топографічне письмо» Прохаська.'
      - 'Принцип «доля — це ландшафт»: географія визначає характер і вчинки героїв.'
      - '«Ботанічна географія»: детальний опис флори, медитативна увага до природи.'
  - section: 'Поетика: Магічний реалізм і ритміка прози'
    words: 450
    points:
      - Органічний синтез магічного та буденного (дива як частина повсякдення).
      - 'Особливості синтаксису Прохаська: медитативність, сповільнення темпу оповіді.'
      - 'Специфіка лексики: природне звучання галицьких і гуцульських реалій.'
  - section: 'Деколонізаційний вимір: Руйнування імперських міфів'
    words: 450
    points:
      - Демонтаж стереотипу про Карпати як «відсталу провінцію».
      - Яловець як європейський простір (з джином і тенісом), що інтегрований у світовий
        контекст.
      - 'Нівелювання імперського погляду ззовні: місцеві самі формують сенси свого
        буття.'
  - section: 'Деколонізаційний вимір: Опір і самоствердження'
    words: 450
    points:
      - 'Стратегія виживання «непростих»: ігнорування або підкорення зовнішньої влади
        власним правилам.'
      - 'Агентність українського (гуцульського) героя: перетворення об''єкта історії
        на її суб''єкта.'
      - Збереження ідентичності через пам'ять і єднання з простором.
  - section: 'Підсумок та рецепція: Світовий контекст'
    words: 400
    points:
      - Значення «НепрОстих» для сучасної літературної парадигми України.
      - Вплив філософії Прохаська на нове покоління письменників.
      - Внесок твору в європейський магічний реалізм і глобальний літературний діалог.
