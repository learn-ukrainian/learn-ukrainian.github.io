slug: prokhasko-unsimple
title: Prokhasko Unsimple
word_target: 4000
content_outline:
- section: 'Вступ: Станіславський феномен та поява твору'
  words: 400
  points:
  - Історичні умови появи роману у 2002 році як етапу розвитку постмодернізму.
  - Належність Тараса Прохаська до «Станіславського феномену».
  - Місце роману «НепрОсті» у формуванні сучасної української ідентичності та літературного
    канону.
- section: 'Контекст: Карпатський міф у сучасній літературі'
  words: 300
  points:
  - Відродження глибокого інтересу до Гуцульщини у незалежній Україні.
  - Специфіка українського магічного реалізму та «химерної прози» на противагу латиноамериканському.
  - Чому текст зберігає актуальність та як він трансформує фольклорний матеріал.
- section: 'Сюжетна канва: Альтернативна історія Ялівця (1913-1951)'
  words: 400
  points:
  - 'Окреслення часових рамок: від 1913 року до зникнення «непрОстих» у 1951 році.'
  - Життя вигаданого містечка Ялівець як альтернативне тло для європейських історичних
    зрушень.
  - Взаємодія великої історії (Перша і Друга світові війни) та приватних людських
    доль.
- section: 'Структура тексту: Фрагментарність і нелінійність'
  words: 350
  points:
  - Поділ на 20 ненумерованих частин як свідома відмова від лінійного наративу.
  - Калейдоскопічність подій, потоків свідомості та асоціацій.
  - 'Оповідь як спосіб створення реальності: життя як наслідок розповідання.'
- section: 'Міфологія «непрОстих»: Хто такі земляні боги'
  words: 400
  points:
  - Етимологія та глибинне значення концепту «непрОсті» у карпатській світобудові.
  - 'Роль «земляних богів» у романі: збереження знань, простору та екології духу.'
  - Символізм зникнення «непрОстих» у 1951 році як кінець автентичної епохи та метафора
    радянської окупації.
- section: 'Система персонажів: Себастян, Анна та еволюція роду'
  words: 350
  points:
  - 'Аналіз ключових фігур: Франц, Себастян та жінки на ім''я Анна.'
  - 'Генеалогічна пам''ять: циклічність роду та повторення архетипів.'
  - Конфлікт і розвиток через зміну поколінь у замкненому просторі.
- section: 'Топос і просторовість: Ялівець як мікрокосм'
  words: 300
  points:
  - 'Важливість місця як першопричини: «знайти місце — започаткувати історію».'
  - 'Просторовий детермінізм Прохаська: ландшафт як форма долі.'
  - Географія Карпат як філософський текст для прочитання.
- section: 'Мова і стиль: Інтонація, синтаксис та філософія слова'
  words: 350
  points:
  - Прохаськівська «філософія інтонації» як осердя ідентичності.
  - 'Стилістичні інновації: медитативність, архаїка та модерний синтаксис.'
  - Значення ритміки у прозі та естетика неспішного споглядання.
- section: 'Деколонізаційний вимір: Руйнування міфу про провінційність'
  words: 400
  points:
  - Карпати не як периферія імперій, а як повноцінний, відкритий центр світу.
  - Деконструкція радянського наративу про відсталу Гуцульщину.
  - Україноцентричний погляд на події першої половини ХХ століття через призму міфології.
- section: 'Агентність та опір: Культурне самоствердження в тексті'
  words: 350
  points:
  - Збереження ідентичності в умовах багаторазової зміни влади та окупацій.
  - 'Відсутність комплексу жертви: герої володіють власним простором.'
  - Опір асиміляції через побутові ритуали, міф та неперервну пам'ять.
- section: 'Підсумок: Рецепція твору та його місце в каноні'
  words: 400
  points:
  - Вплив «НепрОстих» на наступні покоління українських письменників та критиків.
  - Переклади, сприйняття твору у світовому контексті європейського модернізму.
  - Відкриті питання для академічної дискусії та подальших літературознавчих розвідок.
