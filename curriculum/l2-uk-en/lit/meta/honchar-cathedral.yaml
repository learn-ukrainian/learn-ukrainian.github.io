slug: honchar-cathedral
title: Honchar Cathedral
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови'
    words: 450
    points:
      - 'Історичне тло: кінець шістдесятництва та згортання хрущовської ''відлиги''.'
      - Публікація 'Собору' (1968) як безпрецедентний виклик системі від визнаного
        радянського класика.
      - Ідеологічна кампанія 1968 року та негласна заборона твору на два десятиліття.
  - section: 'Вступ та культурний контекст: II — Місце в каноні'
    words: 450
    points:
      - Статус 'Собору' як центрального тексту українського духовного опору другої
        половини XX століття.
      - 'Чому текст залишається гостроактуальним: проблема збереження ідентичності.'
      - Перехід твору від самвидавного символу до класики національної літератури.
  - section: 'Аналіз твору: Сюжет та структура — I: Розвиток сюжету'
    words: 450
    points:
      - 'Експозиція: робітниче селище Зачіплянка та дев''ятикупольний козацький собор.'
      - 'Зав''язка: загроза знесення історичної пам''ятки заради будівництва шашличної.'
      - 'Кульмінаційні моменти: протистояння захисників собору та номенклатури.'
  - section: 'Аналіз твору: Сюжет та структура — II: Джерела та конфлікт'
    words: 450
    points:
      - 'Реальна основа: Троїцький собор у Новомосковську.'
      - 'Основний конфлікт твору: зіткнення духовності та меркантильного безпам''ятства.'
      - Бюрократична машина проти органічного народного життя.
  - section: 'Герменевтика та ключові образи: I — Символіка Собору'
    words: 450
    points:
      - Собор як архітектурний шедевр козацького бароко та втілення національного
        генія.
      - 'Метафора ''соборів душ'': внутрішній моральний стрижень людини.'
      - Собор як уособлення самої України, її історії та незнищенності.
  - section: 'Герменевтика та ключові образи: II — Система персонажів'
    words: 450
    points:
      - 'Микола Баглай: студент-ідеаліст, носій національної свідомості.'
      - 'Ягор Катратий: зв''язковий часів, втілення народної мудрості та пам''яті.'
      - 'Володька Лобода: архетип ''браконьєра'', кар''єриста та манкурта, що зрікається
        батька і минулого.'
  - section: 'Герменевтика та ключові образи: III — Міфологічні підтексти'
    words: 450
    points:
      - Архетип Батька і Сина у контексті зради (Лобода, який здає батька в будинок
        престарілих).
      - Протистояння Хаосу (індустріального нищення) та Космосу (собору як центру
        світобудови).
      - Міт про козацьку вольницю в умовах радянської дійсності.
  - section: 'Мова, стиль та поетика: I — Стилістичні інновації'
    words: 450
    points:
      - 'Лірична проза Олеся Гончара: поєднання епосу та лірики.'
      - Публіцистичні пасажі як органічна частина філософського роману.
      - Створення атмосфери 'антиночі' над індустріальним містом.
  - section: 'Мова, стиль та поетика: II — Мовна палітра'
    words: 350
    points:
      - Опір русифікації через використання багатого питомо українського словника.
      - 'Синтаксичні особливості: ритмізована проза, емоційна насиченість речень.'
      - 'Контраст мови: бюрократичний ''канцелярит'' Лободи проти живої мови зачіплянців.'
  - section: 'Деколонізаційний вимір: I — Руйнування імперського міфу'
    words: 450
    points:
      - Деконструкція радянського міфу про індустріалізацію як виключне благо.
      - Викриття руйнівної суті тоталітарної системи, що продукує 'духовних браконьєрів'.
      - Спростування наративу про меншовартість української історії (собор як європейський
        шедевр).
  - section: 'Деколонізаційний вимір: II — Опір асиміляції'
    words: 350
    points:
      - Захист собору як акт свідомого культурного спротиву та самоствердження.
      - 'Агентність українського героя: перехід від пасивного споглядання до активної
        дії.'
      - Подолання комплексу 'тоталітарного раба'.
  - section: Підсумок та рецепція
    words: 350
    points:
      - Вплив роману на формування дисидентського руху (напр., есе Є. Сверстюка 'Собор
        у риштованні').
      - Значення 'Собору' для подальшого розвитку української літератури опору.
      - 'Питання для дискусії: чи існують ''Лободи'' в сучасному українському суспільстві?'
