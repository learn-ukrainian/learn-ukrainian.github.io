slug: sofia-andrukhovych-amados
title: Sofia Andrukhovych Amados
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови появи'
    words: 400
    points:
      - Реакція літератури на російсько-українську війну та травму
      - Потреба суспільства в осмисленні історичної амнезії
      - Символічний зв'язок між війною на Донбасі та трагедіями ХХ століття
  - section: 'Вступ та культурний контекст: Місце в сучасному каноні'
    words: 400
    points:
      - «Амадока» як інтелектуальний та композиційний магнум-опус 2020 року
      - Масштаб твору (понад 800 сторінок) та його поліфонічність
      - Визнання престижними нагородами (премія Германа Гессе, «Зустріч»)
  - section: 'Аналіз твору: Сюжет та структура роману'
    words: 450
    points:
      - Нелінійна, багатошарова конструкція тексту (колажність)
      - 'Три часові виміри: сучасність, Друга світова війна (Бучач), Розстріляне відродження'
      - 'Зав''язка: Романа і понівечений ветеран Богдан з тотальною амнезією'
  - section: 'Аналіз твору: Конфлікт та інтертекстуальні впливи'
    words: 400
    points:
      - 'Екзистенційний конфлікт: необхідність пригадування проти рятівного забуття'
      - Робота авторки з документальними архівами та історичними розвідками
      - Постать Віктора Петрова (Домонтовича) як історичне тло
  - section: 'Герменевтика та ключові образи: Метафора озера'
    words: 450
    points:
      - Легендарне озеро Амадока з античних та середньовічних карт
      - Вода як символ безслідного зникнення єврейських і українських світів
      - Амнезія індивідуальна (Богдана) як проєкція амнезії національної
  - section: 'Герменевтика та ключові образи: Еволюція Романи і Богдана'
    words: 450
    points:
      - Романа у ролі деміургині та української Шахерезади
      - 'Влада наратора: конструювання ідеального образу минулого'
      - Богдан як «tabula rasa», що уособлює травмовану націю
  - section: 'Герменевтика та ключові образи: Архетипи та підтексти'
    words: 400
    points:
      - Архетип пам'яті як заплутаного лабіринту або безодні
      - Мотив двійництва та множинних ідентичностей в умовах терору
      - Процес «зшивання» розірваного простору історії
  - section: 'Мова, стиль та поетика: Стилістичні інновації'
    words: 400
    points:
      - 'Ознаки метамодернізму: серйозність, занурення замість постмодерної іронії'
      - 'Текстуальний екфрасис: детальний опис та «прочитання» старих фотографій'
      - Взаємопроникнення художньої вигадки та документалістики
  - section: 'Мова, стиль та поетика: Особливості синтаксису'
    words: 400
    points:
      - Щільність, повільність та деталізованість авторського письма
      - Глибокий психологізм, відтворений через розгалужену рефлексію
      - Поліфонічність голосів, що зринають з небуття
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 400
    points:
      - Спростування радянського плоского наративу про «єдиний радянський народ»
      - Детальний розтин сталінських репресій (знищення неокласиків)
      - Виведення теми Голокосту з поля сліпоти у простір загальнонаціональної пам'яті
  - section: 'Деколонізаційний вимір: Агентність та опір асиміляції'
    words: 400
    points:
      - Пам'ять як головна зброя проти колоніального стирання
      - Повернення права на власну складну, часом негероїчну, але правдиву історію
      - Постать жінки, яка бере на себе відповідальність за «літописання»
  - section: 'Підсумок та рецепція: Вплив та дискусія'
    words: 400
    points:
      - Сприйняття роману як болючого, але цілющого досвіду (терапія травми)
      - Дискусії навколо трактування постаті В. Петрова та подій у Бучачі
      - Важливість книги для самоідентифікації сучасного українця
  - section: 'Підсумок та рецепція: Світовий контекст'
    words: 300
    points:
      - Вписування українського досвіду в європейський дискурс історичної пам'яті
      - Міжнародне визнання (Стокгольмська премія, переклади у Німеччині)
      - Актуальність метафори Амадоки для будь-якої культури, що втрачає коріння
