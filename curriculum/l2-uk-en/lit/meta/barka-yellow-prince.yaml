slug: barka-yellow-prince
title: Barka Yellow Prince
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Біографічний вимір (Василь Барка і досвід Голодомору)'
    words: 450
    points:
      - Особистий досвід Василя Барки (Очерета) під час штучного голоду на Кубані
      - Перебування письменника на межі смерті та формування обов'язку свідка
  - section: 'Вступ та контекст: Передумови написання роману в еміграції'
    words: 450
    points:
      - Збір документальних свідчень протягом двадцяти п'яти років
      - Робота над твором у Нью-Йорку (1950-1961) як протидія радянському табу на
        пам'ять
      - Публікація книги у вільному світі та значення цього факту
  - section: 'Аналіз ключових творів: Сюжетна канва та архітектоніка роману'
    words: 550
    points:
      - Огляд сюжетної лінії родини Мирона Катранника
      - Поступове розгортання трагедії в українському селі Кленоточі
      - Хронологія геноциду через призму художнього тексту
  - section: 'Аналіз ключових творів: Родина Катранників як мікрокосм національної
      трагедії'
    words: 550
    points:
      - Родина як уособлення всього українського селянства
      - Моральні дилеми та збереження людяності в нелюдських умовах
      - Образ наймолодшого сина Андрійка як символу надії та виживання нації
  - section: 'Аналіз ключових творів: Образна система та міфологема «жовтого князя»'
    words: 550
    points:
      - Апокаліптичні мотиви твору та біблійна алюзія вершника на блідому (жовтому)
        коні
      - «Жовтий князь» як уособлення сталінського тоталітаризму та сатанинського зла
      - Символіка жовтого кольору в романі (колір смерті, спустошення)
  - section: 'Стилістика та мова автора: Експресіонізм і натуралізм в описах голоду'
    words: 550
    points:
      - Документальна фізіологічність жахливих сцен (аж до випадків канібалізму)
      - Поєднання натуралістичної правдивості з експресіоністичною образністю
      - Психологізм передачі стану згасання людини
  - section: 'Стилістика та мова автора: Неологізми, метафори та ритміка прози'
    words: 450
    points:
      - Унікальна мовотворчість Барки та створення неологізмів для вираження позамежного
        досвіду
      - Використання полтавсько-кубанських діалектизмів та архаїки
      - Ритмічна, поетизована інтонація, що нагадує біблійний плач (ламентацію)
  - section: 'Деколонізаційна перспектива: Деконструкція радянського міфу про «неврожай»'
    words: 550
    points:
      - 'Художнє викриття механізму штучності голоду: комнезами, озброєні бригади,
        тотальна реквізиція'
      - Спростування імперських наративів про 'природні причини' та 'посуху'
      - Демонстрація свідомого геноциду проти соціальної та національної основи України
  - section: 'Деколонізаційна перспектива: Українська суб''єктність та опір системі'
    words: 450
    points:
      - Духовний спротив селянства та спроби зберегти гідність (спротив Мирона Катранника)
      - Мотив збереження церковного потира як символ захисту духовної ідентичності
      - Роман не лише про смерть, але й про незламність українського духу
  - section: 'Підсумок та спадщина: Рецепція твору та фільм «Голод-33»'
    words: 450
    points:
      - Статус «Жовтого князя» як першого і найголовнішого художнього свідчення про
        Голодомор
      - Повернення роману в Україну напередодні проголошення незалежності
      - Вплив екранізації Олеся Янчука («Голод-33») на суспільну свідомість і результати
        референдуму 1991 року
