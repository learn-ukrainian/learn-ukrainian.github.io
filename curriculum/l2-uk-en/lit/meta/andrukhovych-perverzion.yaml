slug: andrukhovych-perverzion
title: Andrukhovych Perverzion
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: Передумови'
  words: 400
  points:
  - 'Історичні умови появи твору: середина 1990-х, епоха українського постмодерну
    та Станіславський феномен.'
  - Постмодернізм як засіб руйнування соцреалістичного канону.
- section: 'Вступ та культурний контекст: Канон'
  words: 400
  points:
  - Місце Юрія Андруховича та роману в сучасному літературному каноні.
  - 'Актуальність тексту: подолання культурної провінційності.'
- section: 'Аналіз твору: Сюжет та структура — І'
  words: 500
  points:
  - 'Ключові етапи сюжету: подорож Станіслава Перфецького до Венеції на симпозіум
    ''Посткарнавальне безглуздя світу''.'
  - Конфлікт абсурдної дійсності Заходу та іронічного спостерігача.
- section: 'Аналіз твору: Сюжет та структура — ІІ'
  words: 500
  points:
  - 'Літературні та культурні впливи: традиція карнавалу (М. Бахтін).'
  - 'Кінематографічна поетика: фрагментація, монтаж та візуальність тексту.'
- section: 'Герменевтика та ключові образи: Персонажі'
  words: 500
  points:
  - 'Еволюція образу Перфецького: митець, трикстер, авантюрист.'
  - 'Ада Цитрина та доктор Різенбокк: міфологічні архетипи провідників і спокусників.'
- section: 'Герменевтика та ключові образи: Символіка'
  words: 500
  points:
  - Венеція як лабіринт, театральна декорація і метафора європейського занепаду.
  - 'Релігійні та містичні мотиви: символ великої риби та тема жертвопринесення.'
- section: Мова, стиль та поетика
  words: 500
  points:
  - 'Стилістичні інновації: пастиш, змішування жанрів і дискурсів.'
  - 'Іронія та мовна гра: використання неолексики, суржику, пародіювання академічного
    стилю.'
- section: Деколонізаційний вимір
  words: 400
  points:
  - 'Руйнування імперського міфу про культурну меншовартість: український герой у
    центрі Європи.'
  - 'Опір асиміляції: Перфецький як активний творець нових смислів, а не пасивна жертва.'
- section: Підсумок та рецепція
  words: 300
  points:
  - Вплив на наступні покоління українських авторів та музичну культуру (альбом 'Гайдамаки').
  - 'Світовий контекст твору: переклади та міжнародне визнання.'
  - Відкриті питання для дискусії про істинність ілюзій.
