slug: women-in-kobzar
title: Жіноча доля в "Кобзарі"
word_target: 5000
content_outline:
  - section: Вступ
    words: 600
    points:
      - Чому жінки — центральні персонажі 'Кобзаря'
      - 'Біографічний контекст: травма сирітства та емпатія'
      - Відхід від байронізму до трагедії звичайної селянки
  - section: Катерина
    words: 1050
    points:
      - 'Сюжет поеми: конфлікт особистого і суспільного'
      - Статус покритки та жорстокість подвійних стандартів села
      - Образ москаля як представника імперського 'чужого' світу
  - section: Наймичка
    words: 1000
    points:
      - 'Сюжет поеми: еволюція від бунту до жертовності'
      - 'Образ матері-страдниці: добровільна кара'
      - Порівняння Ганни та Катерини (психологізм зрілого Шевченка)
  - section: Архетип Трагічної Матері
    words: 1000
    points:
      - 'Галерея образів: покритка, наймичка, удова'
      - Сакралізація материнства та самотність
      - 'Метафоричний вимір: Україна як збезчещена Мати'
  - section: Димінутиви та емоційний пафос
    words: 750
    points:
      - 'Лінгвістичний аналіз: пестлива лексика у жіночих образах'
      - 'Ефект контрасту: ніжне слово на тлі жорстокої долі'
      - Катарсис через мову та стилістика співчуття
  - section: Підсумок
    words: 600
    points:
      - Унікальність Шевченкової емпатії у світовому контексті
      - Спростування радянського класового міфу
      - Сучасне (деколонізаційне та постколоніальне) прочитання
