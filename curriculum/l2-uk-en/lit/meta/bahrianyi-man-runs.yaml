slug: bahrianyi-man-runs
title: Bahrianyi Man Runs
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови'
    words: 500
    points:
      - Створення роману в таборах Ді-Пі (1948-1949)
      - Україна 1943 року як епіцентр зіткнення двох тоталітарних імперій
  - section: 'Вступ та культурний контекст: Місце в каноні'
    words: 500
    points:
      - Значення посмертного видання (1965) для української літератури
      - Український 'оптимістичний екзистенціалізм' у порівнянні із західноєвропейським
  - section: 'Аналіз твору: Сюжетна канва та джерела'
    words: 500
    points:
      - Автобіографічна специфіка досвіду втечі та переслідувань Багряного
      - Одіссея Максима Колота крізь фронти Другої світової війни
  - section: 'Аналіз твору: Конфлікт як рушійна сила'
    words: 500
    points:
      - 'Екзистенційна межова ситуація: протистояння героя абсурду війни'
      - Вибір між фізичним виживанням (гноїнням) і духовною свободою (бігом)
  - section: 'Герменевтика та ключові образи: Символіка'
    words: 500
    points:
      - Багатовимірність метафори 'прірви' як небуття та випробування
      - Образи-архетипи приречених мас як тло для індивідуального бунту
  - section: 'Герменевтика та ключові образи: Еволюція персонажа'
    words: 500
    points:
      - Переродження Колота у вольового суб'єкта історії
      - 'Аналіз життєвого кредо: ''Ліпше вмерти біжучи...'''
  - section: Мова, стиль та поетика
    words: 500
    points:
      - Синтез філософської притчі, пригодницького роману та публіцистики
      - Експресивність та динамічний синтаксис як віддзеркалення ритму бігу
  - section: 'Деколонізаційний вимір: Злам імперського міфу'
    words: 500
    points:
      - Деконструкція радянського міфу про Велику Вітчизняну війну
      - Артикуляція третьої позиції — українця між Гітлером і Сталіним
  - section: 'Деколонізаційний вимір: Агентність українського героя'
    words: 500
    points:
      - Суб'єктність та опір асиміляції ('не зітруть на порох його душі')
      - Культурне та фізичне самоствердження на рідній землі
  - section: Підсумок та рецепція
    words: 500
    points:
      - Відлуння філософії Багряного у творчості наступних поколінь
      - 'Світовий контекст твору: гімн вірі у гідність Людини'
