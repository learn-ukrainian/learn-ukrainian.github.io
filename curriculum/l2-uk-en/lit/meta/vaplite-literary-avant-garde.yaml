slug: vaplite-literary-avant-garde
title: 'ВАПЛІТЕ та її Журнал: Інституційний рушій Розстріляного Відродження'
word_target: 5000
content_outline:
- section: 'Вступ: Літературний ландшафт Харкова 1920-х'
  words: 500
  points:
  - 'Пролеткульт, Плуг, Гарт: боротьба літературних угруповань.'
  - Вимога «масовізму» проти ідеї якості.
  - Передумови створення Вільної академії пролетарської літератури.
- section: Створення та організаційна структура ВАПЛІТЕ
  words: 600
  points:
  - 'Грудень 1925 року: ініціативна група (Хвильовий, Яловий, Досвітній).'
  - Статут, елітаризм та жорсткі критерії відбору.
  - Орієнтація на «європейські стандарти» та психологічну Європу.
- section: Естетична програма та ідеологія
  words: 700
  points:
  - «Романтика вітаїзму» та відмова від етнографічного провінціалізму.
  - Гасло «Геть від Москви! Даєш психологічну Європу!».
  - Синтез національної традиції з європейським модернізмом.
- section: 'Журнал «ВАПЛІТЕ» (1927): Трибуна авангарду'
  words: 700
  points:
  - Значення журналу як майданчика для літературної дискусії.
  - 'Публікація знакових творів: «Вальдшнепи», «Смерть», «Майстер корабля».'
  - Критика офіційної радянської політики на сторінках журналу.
- section: Ключові постаті та їхні ролі
  words: 800
  points:
  - Микола Хвильовий — ідеолог і натхненник.
  - Майк Йогансен — експериментатор та формаліст.
  - Юрій Яновський, Микола Куліш, Аркадій Любченко — розширення жанрів.
- section: Літературна дискусія 1925-1928 років
  words: 600
  points:
  - Полеміка з Сергієм Пилипенком та «масовиками».
  - 'Втручання партії: листи Сталіна до Кагановича.'
  - Політизація суто естетичної дискусії.
- section: 'Деколонізаційний аспект: Опір русифікації'
  words: 600
  points:
  - Твердження самодостатності української літератури.
  - Протистояння концепції України як культурної провінції Росії.
  - Концепція «Азіатського ренесансу».
- section: 'Підсумок: Розпуск і трагічний фінал'
  words: 500
  points:
  - Саморозпуск під тиском партії (січень 1928 року).
  - Репресії 1930-х років та знищення більшості членів.
  - ВАПЛІТЕ як найвищий етап організаційного розвитку українського модернізму.
