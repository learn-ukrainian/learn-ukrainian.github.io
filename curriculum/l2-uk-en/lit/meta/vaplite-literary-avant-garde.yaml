slug: vaplite-literary-avant-garde
title: 'ВАПЛІТЕ та її Журнал: Інституційний рушій Розстріляного Відродження'
word_target: 5000
content_outline:
- section: 'Вступ: Літературний ландшафт Харкова 1920-х'
  words: 500
  points:
  - 'Пролеткульт, Плуг, Гарт: боротьба літературних угруповань у тодішній столиці.'
  - Вимога «масовізму» та графоманія проти ідеї високої художньої якості.
  - Передумови створення Вільної академії пролетарської літератури як відповідь на
    кризу якості.
- section: Створення та організаційна структура ВАПЛІТЕ
  words: 500
  points:
  - 'Грудень 1925 року: ініціативна група (Хвильовий, Яловий, Досвітній) та вихід
    із «Гарту».'
  - 'Статут, елітаризм та жорсткі критерії відбору: фокус на таланті, а не на класовому
    походженні.'
  - Орієнтація на «європейські стандарти» та подолання хуторянства.
- section: Естетична програма та ідеологія
  words: 600
  points:
  - «Романтика вітаїзму» та свідома відмова від етнографічного провінціалізму.
  - Гасло «Геть від Москви! Даєш психологічну Європу!» як вектор розвитку.
  - Синтез національної традиції з європейським модернізмом (від Гете до Дарвіна).
- section: 'Журнал «ВАПЛІТЕ» (1927): Трибуна авангарду'
  words: 500
  points:
  - Значення журналу як головного майданчика для високої літератури та дискусії.
  - 'Публікація знакових творів: «Вальдшнепи», «Смерть», «Майстер корабля».'
  - Критика офіційної радянської політики та конфіскація 6-го номера цензурою.
- section: Ключові постаті та їхні ролі
  words: 600
  points:
  - Микола Хвильовий — головний ідеолог і натхненник об'єднання.
  - Майк Йогансен — лінгвістичний експериментатор та формаліст.
  - Юрій Яновський, Микола Куліш, Аркадій Любченко — розширення меж українського роману
    та драми.
- section: Літературна дискусія 1925-1928 років
  words: 500
  points:
  - Полеміка з Сергієм Пилипенком («Плуг») та «апологетами писаризму».
  - 'Втручання партії: лист Сталіна до Кагановича (квітень 1926 р.) з ярликами «ухильництва».'
  - Політизація суто естетичної дискусії та підготовка підґрунтя для репресій.
- section: 'Деколонізаційний аспект: Опір русифікації'
  words: 400
  points:
  - Твердження самодостатності української літератури (протистояння ідеї «Малоросії»).
  - Протистояння концепції України як культурної провінції або придатку Росії.
  - Концепція «Азіатського ренесансу» як антитеза московському месіанізму.
- section: 'Підсумок: Розпуск і трагічний фінал'
  words: 400
  points:
  - Примусовий саморозпуск під тиском партії (січень 1928 року).
  - Репресії 1930-х років, Сандармох та знищення більшості членів академії.
  - ВАПЛІТЕ як найвищий етап організаційного розвитку українського модернізму 1920-х.
