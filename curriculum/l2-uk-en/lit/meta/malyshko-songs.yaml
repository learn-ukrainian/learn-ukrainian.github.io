slug: malyshko-songs
title: Malyshko Songs
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови'
    words: 500
    points:
      - Біографічний контекст Андрія Малишка (Обухів, фронтовий досвід повоєнні реалії).
      - Атмосфера 1950–60-х років в УРСР та можливості легального прояву національного
        почуття.
  - section: 'Вступ та культурний контекст: II — Місце в каноні'
    words: 500
    points:
      - Феномен органічного переходу авторської поезії Малишка в статус «народної»
        пісні.
      - Фундаментальне значення пісенної спадщини поета для збереження українського
        мелосу.
  - section: 'Аналіз твору: Сюжет та структура: I — «Пісня про рушник»'
    words: 700
    points:
      - 'Сюжетна основа твору: сакральне материнське благословення сина в життєву
        дорогу.'
      - Композиція вірша як глибоко інтимної ліричної сповіді-спогаду (хронотоп тексту).
      - Ритміко-мелодійна досконалість тексту (анапест, перехресне римування, рефрени).
  - section: 'Аналіз твору: Сюжет та структура: II — Музична колаборація з Майбородою'
    words: 600
    points:
      - Унікальність та еталонність творчого тандему Андрій Малишко — Платон Майборода.
      - 'Аналіз інших знакових пісень: «Стежина», «Вчителько моя», «Київський вальс».'
      - Досконала синергія і взаємодоповнення поетичного слова та музичної фрази.
  - section: 'Герменевтика та ключові образи: I — Архетип матері'
    words: 600
    points:
      - Образ матері як фольклорної Берегині роду та символічне уособлення рідної
        землі (Батьківщини).
      - Самопожертва, незрадлива вірність та всепрощення як домінантні риси материнського
        образу.
  - section: 'Герменевтика та ключові образи: II — Символіка дороги та рушника'
    words: 600
    points:
      - Дорога як полісемантична метафора людської долі, ініціації та неминучих життєвих
        випробувань.
      - Вишитий рушник як прадавній сакральний оберіг, національний код та візуальна
        матриця пам'яті.
  - section: Мова, стиль та поетика
    words: 600
    points:
      - Безпосередній зв'язок із фольклорною поетикою (система постійних епітетів,
        рефрени, паралелізми).
      - Стилістичні інновації Малишка та ювелірна майстерність тропіки (метафори,
        влучні порівняння).
      - Глибока інтимізація поетичного мовлення (щире звертання «Рідна мати моя»).
  - section: Деколонізаційний вимір
    words: 500
    points:
      - Показова відсутність радянських ідеологем у ключових ліричних творах поета.
      - Українська лірична пісня як легальний простір культурного спротиву в епоху
        агресивної русифікації.
      - Ствердження агентності українського ліричного героя через звернення до національних
        святинь.
  - section: Підсумок та рецепція
    words: 500
    points:
      - Світове визнання «Пісні про рушник» та її переклади понад 30 мовами світу.
      - Потужний вплив пісенної лірики Малишка на естетику шістдесятників та формування
        української естради.
      - Позачасова актуальність текстів поета як символу духовного повернення до рідного
        коріння.
