slug: son
title: 'Політична Сатира: Сон'
word_target: 4000
content_outline:
- section: 'Вступ: Політична сатира та жанр комедії — Передумови написання'
  words: 300
  points:
  - Світоглядний перелом Т. Шевченка після поїздки в Україну (1843-1844 рр.).
  - Перехід від романтичної ностальгії до гострої політичної оцінки реалій імперії.
  - 'Усвідомлення подвійного гноблення: соціального (кріпацтво) та національного (колоніалізм).'
- section: 'Вступ: Політична сатира та жанр комедії — Дантівська традиція та субверсія
    жанру'
  words: 350
  points:
  - Сон (візія) як традиційний літературний прийом для подолання цензурних, просторових
    та часових меж.
  - Підзаголовок «комедія» як іронічна алюзія на «Божественну комедію» Данте Аліг'єрі.
  - Мандрівка ліричного героя (душі-сови) колами імперського пекла замість потойбіччя.
- section: 'Сюжетна подорож: Візія поневоленої України'
  words: 400
  points:
  - Протиставлення ідеалізованого, райського українського пейзажу і соціального пекла
    («опухла дитина», «мати пшеницю... жне»).
  - Мотив сирітства та покритки як метафора пограбованої та знеславленої нації.
  - Деконструкція імперського наративу про «благоденство» під владою царя.
- section: 'Сюжетна подорож: Сибірська каторга та образ каторжника'
  words: 350
  points:
  - Простір Сибіру як символ імперської репресивної машини та мучеництва.
  - Образ «царя волі», скутого кайданами — данина поваги політичним в'язням (зокрема,
    декабристам).
  - Моральна вищість каторжника-борця над всевладним тираном.
- section: 'Сюжетна подорож: Антиімперський пейзаж Петербурга'
  words: 450
  points:
  - Деколонізаційна полеміка з Алєксандром Пушкіним та його міфом Петербурга (з «Мідного
    вершника»).
  - Візуалізація міста-некрополя, зведеного на кістках і крові поневолених народів.
  - Звернення до душ закатованих українських козаків, що будували імперську столицю.
- section: 'Імперський гротеск: Десакралізація влади та сцена в палаці'
  words: 400
  points:
  - Сатиричне зображення царського двору як осередку абсурду та духовного звиродніння
    («блюдолизи», «пузаті»).
  - Сцена «генерального мордобиття» як точна гротескна модель тоталітарної ієрархії,
    заснованої на тваринному страху.
  - Знищення міфу про сакральність і справедливість самодержавної влади.
- section: 'Імперський гротеск: Пам''ятник Петру I як символ колоніалізму'
  words: 400
  points:
  - Зупинка біля пам'ятника Етьєна Фальконе як ключовий момент усвідомлення історичної
    трагедії.
  - 'Формулювання головного антиколоніального звинувачення: «Первий... розпинав»,
    «Вторая доконала».'
  - Вирок діянням Петра I та Катерини II як нищівникам української державності та
    козацтва.
- section: 'Образи тиранів: Карикатура на Миколу I та царицю'
  words: 400
  points:
  - Натуралістичне, безжальне висміювання фізичних та моральних вад імператорського
    подружжя.
  - Микола I як ревучий ведмідь, Олександра Федорівна як «засушений опеньок» з нервовим
    тиком.
  - Сміх як найефективніший інструмент руйнування фальшивої величі (тиран стає жалюгідним).
- section: 'Фінал: Пробудження та екзистенційний вимір сатири'
  words: 350
  points:
  - 'Колапс імперської системи уві сні: коли зникає страх перед криком царя, він перетворюється
    на безпорадне «кошеня».'
  - Символічне пробудження ліричного героя як акт духовного звільнення.
  - Філософське значення сміху як зброї вільної людини, що долає психологічне рабство.
- section: 'Історичний контекст: Кирило-Мефодіївське братство'
  words: 350
  points:
  - Поема як ідейний маніфест української інтелігенції 1840-х років.
  - Читання «Сну» в колі кирило-мефодіївців та її вплив на формування радикального
    крила товариства.
  - Перехід від культурницького просвітництва до вимоги повної політичної ліквідації
    царату.
- section: 'Рецепція та наслідки: Арешт і значення для нації'
  words: 350
  points:
  - Вилучення поеми під час обшуку (1847 рік) як головного доказу «нечуваної зухвалості».
  - Особиста помста Миколи I за карикатуру на дружину — безпрецедентно жорстокий вирок
    (солдатчина із забороною творити).
  - 'Епохальне значення «Сну» в українській літературі: остаточне щеплення нації проти
    вірусів імперської пропаганди та малоросійства.'
