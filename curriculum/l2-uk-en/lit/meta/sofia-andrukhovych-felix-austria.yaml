slug: sofia-andrukhovych-felix-austria
title: Sofia Andrukhovych Felix Austria
word_target: 4000
content_outline:
- section: Вступ та культурний контекст
  words: 600
  points:
  - 'Історичне тло: Станиславів 1900 року та ''Мармулядова пожежа'' 1868 року як ключові
    хронотопи.'
  - Деконструкція 'галицького міфу' про золотий вік імперії Габсбургів та безтурботну
    мультикультурність.
  - Місце роману в сучасній літературі (Книга року BBC 2014) та значення неомодерністського
    історичного наративу.
- section: 'Аналіз твору: Сюжет та структура'
  words: 800
  points:
  - 'Щоденникова форма оповіді: суб''єктивність та ефект ''ненадійного оповідача''
    (Стефанія Чорненько).'
  - Герметичний простір дому (вулиця Липова) як просторова метафора замкненої свідомості
    та соціальної ізоляції.
  - 'Розвиток конфлікту: поява ілюзіоніста Торна та Фелікса як каталізаторів руйнування
    усталених ілюзій.'
- section: Герменевтика та ключові образи
  words: 700
  points:
  - 'Симбіотичний зв''язок Стефи та Аделі: психологічна залежність, підпорядкування
    та прихована агресія.'
  - 'Образ гутаперчевого Фелікса: втілення вільного, стихійного початку, що протистоїть
    імперському порядку.'
  - Мотив магії та фокусів як наскрізна метафора загальноімперського стану самообману
    (Felix Austria).
- section: Мова, стиль та поетика
  words: 600
  points:
  - 'Стилістична майстерність: мікроісторична деталізація побуту та атмосфери сецесійного
    міста.'
  - 'Мовна стилізація: органічне використання галицизмів та діалектизмів для створення
    автентичного звучання.'
  - 'Сенсорність тексту: гастрономічні описи як форма емоційної комунікації та прихованого
    контролю.'
- section: Деколонізаційний вимір
  words: 700
  points:
  - Стосунки 'пані-служниця' як точна алегорія внутрішнього колоніалізму та культурної
    асиміляції.
  - 'Критика імперського міфу: деконструкція ілюзії рівності народів у межах Габсбурзької
    монархії.'
  - 'Шлях Стефи до емансипації: фінальна пожежа як радикальний акт звільнення та болюче
    здобуття власної ідентичності.'
- section: Підсумок та рецепція
  words: 600
  points:
  - Широкий суспільний резонанс твору, міжнародне визнання та вплив на розвиток вітчизняного
    ретро-роману.
  - 'Кінематографічна рецепція: візуалізація естетики роману у фільмі ''Віддана''
