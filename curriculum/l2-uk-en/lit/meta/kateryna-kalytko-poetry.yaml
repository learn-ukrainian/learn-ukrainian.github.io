slug: kateryna-kalytko-poetry
title: Kateryna Kalytko Poetry
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови покоління міленіалів'
    words: 400
    points:
      - Формування авторки на тлі здобуття Незалежності та Помаранчевої революції
      - Перехід від ранньої метафоричної лірики до гостросоціальної та воєнної поезії
        після 2014 року
      - Особливості покоління письменників, що фіксують наймасштабнішу війну в Європі
  - section: 'Вступ та культурний контекст: Місце в каноні воєнної літератури'
    words: 400
    points:
      - Трансформація української воєнної поезії та роль у ній некомбатантських (цивільних)
        голосів
      - Катерина Калитко як один із найпотужніших голосів свідчення та історичної
        пам'яті
      - Значення її збірок для національного усвідомлення досвіду вторгнення
  - section: 'Аналіз твору: Еволюція поетичних збірок від «Сезону штормів» до «Ордену
      мовчальниць»'
    words: 550
    points:
      - 'Ранній етап творчості: пошуки ідентичності, урбаністика та міфологічні мотиви'
      - 'Злам 2014 року: збірки «Катівня. Виноградник. Дім» та «Бунар» як фіксація
        втрати дому'
      - 'Вершина зрілості: концептуальність збірок «Орден мовчальниць» (2022) та «Люди
        з дієсловами» (2023)'
  - section: 'Аналіз твору: Балканські впливи та конфлікт як рушійна сила'
    words: 450
    points:
      - Перекладацький досвід з балканських мов (Єргович, Селімович) та його вплив
        на світогляд авторки
      - Типологічні паралелі між війнами на Балканах та російською агресією проти
        України
      - Внутрішній та зовнішній екзистенційний конфлікт ліричної героїні
  - section: 'Герменевтика та ключові образи: Символіка тіла, травми та дому'
    words: 450
    points:
      - Тілесність як основний простір, на якому історія та війна залишають свої позначки
        (рани, шкіра)
      - Концепт 'дому' як втраченого раю та простору нестабільності (досвід переселенців
        та біженців)
      - Фізичний біль як метафора і відображення глибокої національної травми
  - section: 'Герменевтика та ключові образи: Архетипи та міфологічні підтексти'
    words: 450
    points:
      - Переосмислення біблійних та античних сюжетів у сучасних воєнних реаліях
      - Архетип 'колодязя' (Бунар) як джерела глибинної пам'яті
      - Жінка-свідок як архетипічна фігура охоронниці історичної правди
  - section: 'Мова, стиль та поетика: Стилістичні інновації та робота зі словом'
    words: 450
    points:
      - Жорстка, безкомпромісна поетика без 'прикрашань' жаху війни
      - Фізіологічність та гранична відвертість лексики (медичні та анатомічні метафори)
      - Концепт 'людей з дієсловами' — дія та виживання замість статики іменників
  - section: 'Мова, стиль та поетика: Особливості ритміки та жорсткий синтаксис'
    words: 400
    points:
      - Перевага верлібру як форми, що найбільше відповідає розірваній дійсності
      - Синтаксичні злами, анжамбемани та відривчастий ритм, що імітує перехоплене
        дихання
      - Стирання меж між суто поетичним та прозово-документальним наративом
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу та жіноча суб''єктність'
    words: 400
    points:
      - Спростування російського міфу про Україну як 'слабку', ідеалізовано-плакучу
        жертву
      - 'Суб''єктність жінки у війні: право на гнів, суд і свідчення замість пасивного
        мовчання'
      - Деконструкція патріархального погляду на війну як на виключно чоловічий досвід
  - section: 'Деколонізаційний вимір: Опір асиміляції та утвердження ідентичності'
    words: 400
    points:
      - Українська мова як зброя, екзистенційний кордон та маркер ідентичності
      - Відстоювання права на власну складну, нецензуровану імперією історію
      - Антиколоніальний пафос спротиву культурній та фізичній анігіляції
  - section: 'Підсумок та рецепція: Світовий контекст та здобуття Шевченківської премії'
    words: 350
    points:
      - 'Визнання на національному рівні: присудження Шевченківської премії з літератури
        (2023)'
      - Активна перекладацька рецепція творів Калитко за кордоном
      - Введення унікального українського досвіду у глобальний дискурс літератури
        про війну
  - section: 'Підсумок та рецепція: Вплив на сучасників та питання для дискусії'
    words: 300
    points:
      - Роль Катерини Калитко у формуванні нової поетичної школи в Україні
      - 'Дискусійне питання: можливість і межі естетизації воєнного досвіду ''в режимі
        реального часу'''
      - Відкриті питання щодо розвитку літератури травми після завершення війни
