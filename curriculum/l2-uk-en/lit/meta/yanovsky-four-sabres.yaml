slug: yanovsky-four-sabres
title: Yanovsky Four Sabres
word_target: 5000
content_outline:
  - section: 'Вступ: Історичний контекст та канон'
    words: 400
    points:
      - 'Українська література 1920-х: епоха неоромантизму та створення нового національного
        епосу.'
      - Місце Юрія Яновського серед творців Розстріляного відродження.
      - Публікація роману у 1930 році та його роль як літературного пам'ятника визвольним
        змаганням.
  - section: 'Вступ: Актуальність твору сьогодні'
    words: 350
    points:
      - Чому текст був заборонений на 50 років і чому він звучить актуально нині.
      - Потреба суспільства у героїчному міфі та осмисленні власної збройної боротьби.
  - section: 'Аналіз твору: Джерела та розвиток сюжету'
    words: 500
    points:
      - 'Вплив фольклору: структура роману як цикл народних дум чи пісень.'
      - Кінематографічний принцип побудови сюжету (вплив роботи Яновського на ВУФКУ).
      - 'Нелінійність оповіді: фрагменти, спалахи, монтаж подій Української революції.'
  - section: 'Аналіз твору: Конфлікт як рушійна сила'
    words: 500
    points:
      - Відмова від радянського класового конфлікту на користь національно-екзистенційного.
      - Зіткнення української стихії з імперським порядком (білим і червоним).
      - Внутрішній конфлікт героїв між гуманізмом і жорстокістю війни.
  - section: 'Герменевтика: Архетипи та міфологічні підтексти'
    words: 550
    points:
      - Степ як центральний архетип свободи, хаосу та відродження.
      - Шабля як символ лицарства, честі та безперервності козацької традиції.
      - Міфологізація простору і часу в тексті (позаісторичність подвигу).
  - section: 'Герменевтика: Система персонажів'
    words: 550
    points:
      - Шахай, Остюк, Галат, Марченко — чотири типи української пасіонарності.
      - 'Від отаманської вольниці до усвідомленої боротьби: еволюція ватажків.'
      - Як Яновський руйнує стереотип «селянина-гречкосія», творячи образ воїна.
  - section: 'Мова та поетика: Стилістичні інновації'
    words: 500
    points:
      - 'Експресивність і патетика: синтез епосу та лірики.'
      - Метафорика тексту, що тяжіє до візуального та слухового сприйняття (кольори,
        звуки).
      - Фрагментований синтаксис як засіб передачі динаміки бою.
  - section: 'Мова та поетика: Ритміка і народна мова'
    words: 400
    points:
      - Використання південноукраїнської лексики та козацького арго.
      - 'Музичність прози: інтонаційні переходи від маршу до колискової.'
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 500
    points:
      - Деконструкція радянського наративу про «громадянську війну» та «бандитизм».
      - Повернення права на власну (непролетарську) історію Визвольних змагань.
      - Ідеологічна реакція Москви (заборона 1933 року) як свідчення антиімперської
        сили роману.
  - section: 'Деколонізаційний вимір: Агентність та опір'
    words: 350
    points:
      - Українці як суб'єкти історії, що зі зброєю в руках відстоюють свою землю.
      - Відмова від віктимності (комплексу жертви) на користь активного збройного
        опору.
  - section: Підсумок та рецепція
    words: 400
    points:
      - Забуття та повернення «Чотирьох шабель» в український літературний канон.
      - Вплив Яновського на естетику українського поетичного кіно та історичної прози.
      - 'Питання для дискусії: ціна свободи та моральні компроміси в умовах війни.'
