slug: antonych-green-gospel
title: 'Богдан-Ігор Антонич: «Зелена Євангелія»'
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови появи'
  words: 400
  points:
  - Галичина 1930-х років та розвиток українського модернізму в умовах польської влади.
  - Антонич як постать на перетині європейського авангарду та національної традиції.
- section: 'Вступ та культурний контекст: II — Місце в каноні та актуальність'
  words: 300
  points:
  - Значення «Зеленої Євангелії» як вершини філософської пейзажної лірики міжвоєнного
    двадцятиліття.
  - Сучасне прочитання екософії поета в епоху глобальних криз.
- section: 'Аналіз твору: Сюжет та структура: I — Етапи та джерела впливу'
  words: 300
  points:
  - Лемківське коріння та спогади про Новицю як базовий міфологічний ландшафт.
  - Синтез християнських понять («Євангелія») та язичницького поклоніння природі.
- section: 'Аналіз твору: Сюжет та структура: II — Конфлікт та динаміка'
  words: 300
  points:
  - 'Структурна компактність: дві катрени, що вміщують космос.'
  - 'Внутрішня динаміка: рух каруселі весни проти стативності та вічності землі.'
- section: 'Герменевтика та ключові образи: I — Детальний розбір символіки'
  words: 450
  points:
  - 'Образ каруселі та білих коней: циклічність часу, свіжість та вітальна сила.'
  - 'Кольористика Антонича: білі коні, червоний місяць-тюльпан та їхнє експресивне
    значення.'
- section: 'Герменевтика та ключові образи: II — Архетипи міфології'
  words: 450
  points:
  - «Слов'янський дзбан» та «сонце» як прадавні символи хатнього космосу і життєвої
    енергії.
  - Ліричний герой у ролі жерця, що закликає поклонятися «землі стобарвній».
- section: 'Мова, стиль та поетика: I — Стилістичні інновації'
  words: 400
  points:
  - Авангардна метафорика та міфопоетичний імажинізм Антонича.
  - Зближення природного і людського світів через унікальні асоціативні ряди.
- section: 'Мова, стиль та поетика: II — Ритміка та синтаксис'
  words: 300
  points:
  - 'Чотиристопний ямб із пірихіями: створення ефекту стрімкого лету.'
  - Перехресне римування як музичний інструмент передачі весняної пульсації.
- section: 'Деколонізаційний вимір: I — Руйнування імперського міфу'
  words: 400
  points:
  - Агресивне вилучення поета з радянського літературного процесу; знищення його книг
    та пам'яті.
  - Чому «аполітична» містика Антонича була ідейною загрозою для доктрини соцреалізму.
- section: 'Деколонізаційний вимір: II — Опір асиміляції'
  words: 300
  points:
  - Свідомий вибір української мови творчості випускником полоністики Львівського
    університету.
  - Конструювання власної модерної ідентичності поза імперськими впливами.
- section: 'Підсумок та рецепція: I — Вплив на наступні покоління'
  words: 300
  points:
  - Повернення Антонича в 1960-ті роки та його потужний вплив на творчість шістдесятників
    (І. Калинець, В. Голобородько).
  - Міфопоетична лінія в сучасній українській літературі.
- section: 'Підсумок та рецепція: II — Світовий контекст твору'
  words: 250
  points:
  - Творчість Антонича як повноцінна частина європейського поетичного авангарду 1930-х
    років.
  - Відкриті питання та дискусії навколо перекладу та інтерпретації його образів у
    світовому просторі.
