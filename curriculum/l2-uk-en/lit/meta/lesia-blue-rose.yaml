slug: lesia-blue-rose
title: Lesia Blue Rose
word_target: 5000
content_outline:
  - section: 'Вступ: Історичний контекст'
    words: 350
    points:
      - 'Створення драми у 1896 році: перехід Лесі Українки до неоромантизму.'
      - Атмосфера fin de siècle та її вплив на український модернізм.
  - section: 'Культурний контекст: Місце в каноні'
    words: 350
    points:
      - Перша українська психологічна драма міської інтелігенції.
      - Вихід за межі побутово-етнографічного театру.
  - section: 'Аналіз: Сюжет та джерела'
    words: 500
    points:
      - Трагедія Любові Гощинської та страх перед спадковим божевіллям.
      - Вплив тогочасних європейських психіатричних теорій (Р. Крафт-Ебінг).
  - section: 'Аналіз: Структура і конфлікт'
    words: 350
    points:
      - Переважання внутрішнього конфлікту над зовнішньою дією.
      - Роль діалогів та психологічних підтекстів як рушійної сили.
  - section: 'Герменевтика: Детальний розбір символіки'
    words: 500
    points:
      - Блакитна троянда як символ недосяжного ідеалу та платонічного кохання.
      - Кольорова символіка та естетизація смерті в драмі.
  - section: 'Герменевтика: Персонажі та архетипи'
    words: 500
    points:
      - 'Любов Гощинська: архетип ''нової жінки'' на межі геніальності й безумства.'
      - Орест Груїч та інтелектуальне оточення головної героїні.
  - section: 'Поетика: Стилістичні інновації'
    words: 400
    points:
      - 'Європейська ''нова драма'': використання ''підводних течій''.'
      - Психологізація та відмова від традиційної театральної афектації.
  - section: 'Мова і стиль: Ритміка та новаторство'
    words: 400
    points:
      - Творення рафінованої мови української міської еліти.
      - Залучення абстрактної лексики та філософського дискурсу в діалоги.
  - section: 'Деколонізація: Руйнування імперських міфів'
    words: 500
    points:
      - Спростування міфу про виключно 'селянський' характер української літератури.
      - Інтеграція українського тексту в загальноєвропейський інтелектуальний простір.
  - section: 'Деколонізація: Агентність та опір'
    words: 500
    points:
      - Агентність жінки-інтелектуалки в патріархальному суспільстві.
      - Свідомий вибір героїні як акт екзистенційної свободи (навіть через трагедію).
  - section: 'Рецепція: Вплив та світовий контекст'
    words: 350
    points:
      - Нерозуміння п'єси сучасниками (постановка 1907 року) через її новаторство.
      - Паралелі з творчістю Г. Ібсена та М. Метерлінка.
  - section: 'Підсумок: Спадщина та дискусія'
    words: 350
    points:
      - Значення драми для формування українського театрального модернізму.
      - Сучасні феміністичні та психоаналітичні прочитання твору.
