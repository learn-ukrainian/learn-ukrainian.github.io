slug: zabuzhko-fieldwork
title: 'Оксана Забужко: «Польові дослідження з українського сексу»'
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови 1990-х'
  words: 350
  points:
  - Історичні умови появи твору в середині 1990-х років та постколоніальний шок
  - Очікування суспільства та культурний вакуум після розпаду СРСР
- section: 'Вступ та культурний контекст: II — Канон і актуальність'
  words: 300
  points:
  - Місце в літературному каноні як першого українського бестселера незалежності
  - 'Чому цей текст важливий сьогодні: актуальність деколонізаційної критики'
- section: 'Аналіз твору: Сюжет та структура: I — Архітектоніка сюжету'
  words: 350
  points:
  - Ключові етапи життя та розвитку сюжету через форму монологу-сповіді
  - Фрагментарність наративу та географічні зміщення (Україна — США)
- section: 'Аналіз твору: Сюжет та структура: II — Впливи та конфлікт'
  words: 400
  points:
  - 'Впливи та джерела: західна феміністична теорія, традиція Лесі Українки'
  - 'Конфлікт як рушійна сила: зіткнення сильної жінки та психологічно травмованого
    чоловіка'
- section: 'Герменевтика та ключові образи: I — Система персонажів'
  words: 350
  points:
  - 'Система персонажів: еволюція оповідачки Оксани'
  - Образ Миколи як уособлення історичних комплексів та травм українського чоловіка
- section: 'Герменевтика та ключові образи: II — Символіка і міфологія'
  words: 350
  points:
  - 'Детальний розбір символіки: секс як метафора політичного та колоніального тиску'
  - Архетипи та міфологічні підтексти (образ жінки-творця, мотиви відьомства)
- section: 'Мова, стиль та поетика: I — Інноваційний синтаксис'
  words: 400
  points:
  - 'Стилістичні інновації автора: фірмове «забужківське» багатоповерхове речення'
  - Особливості синтаксису як відтворення потоку свідомості та емоційної напруги
- section: 'Мова, стиль та поетика: II — Лексичні регістри'
  words: 350
  points:
  - Контрастне поєднання високого академічного дискурсу з низовою лексикою
  - Робота з народною мовою та ритміка емоційної сповіді
- section: 'Деколонізаційний вимір: I — Здобуття агентності'
  words: 400
  points:
  - Агентність українського героя (героїні) в умовах подвійного (національного та
    патріархального) тиску
  - Опір асиміляції та культурне самоствердження української інтелектуалки
- section: 'Деколонізаційний вимір: II — Руйнування імперського міфу'
  words: 400
  points:
  - 'Який імперський міф руйнує цей текст: міф про безпечне радянське минуле'
  - Колоніалізм як джерело внутрішньородинного насильства та «страху» поколінь
- section: Підсумок та рецепція
  words: 350
  points:
  - Вплив на наступні покоління письменників та формування нової жіночої прози
  - Світовий контекст твору та міжнародна рецепція (переклади понад 15 мовами)
  - Ключові питання для дискусії про природу української травми
