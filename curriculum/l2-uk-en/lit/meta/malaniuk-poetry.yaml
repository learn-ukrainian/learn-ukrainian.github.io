slug: malaniuk-poetry
title: Malaniuk Poetry
word_target: 5000
content_outline:
  - section: 'Вступ: Біографічний контекст воїна-поета'
    words: 450
    points:
      - 'Життєвий шлях: від сотника армії УНР до інженера на еміграції.'
      - Досвід поразки визвольних змагань 1917–1921 років як травма і стимул.
      - 'Специфіка постаті: поет з мисленням стратега і військового.'
  - section: 'Контекст: Празька школа та держава в екзилі'
    words: 500
    points:
      - Формування Празької поетичної школи (О. Ольжич, О. Теліга, Ю. Дараган).
      - 'Ідея «поезії чину»: слово перебирає функції втраченої держави.'
      - Співпраця з «Вісником» Д. Донцова та волюнтаризм.
  - section: 'Аналіз ключових творів: Програмна збірка «Стилет і стилос»'
    words: 700
    points:
      - Дилема митця в бездержавній нації (війна чи мистецтво?).
      - Стилет як зброя, стилос як інструмент пам'яті.
      - 'Аналіз заголовного вірша: «Стилет чи стилос? — не збагнув...».'
  - section: 'Аналіз ключових творів: Міф сили та варязький елемент'
    words: 500
    points:
      - Звернення до княжої доби Київської Русі.
      - Пошук мілітарного, організаційного стрижня (норманізм як метафора порядку).
      - Аналіз «Варязької балади».
  - section: 'Аналіз ключових творів: Образ України («Степова Еллада»)'
    words: 500
    points:
      - Любов-ненависть ліричного героя до Батьківщини.
      - Антитеза хаосу (Степ) та порядку (Рим).
      - Гнівна критика національної анархії, млявості та браку дисципліни.
  - section: 'Стилістика та мова автора: «Імператор залізних строф»'
    words: 450
    points:
      - 'Поетичний словник: «залізо», «криця», «бронза», «меч».'
      - Карбованість, міцність та неокласична строгість форми.
      - Відхід від народницького сентименталізму та плачу.
  - section: 'Стилістика та мова автора: Історіософізм текстів'
    words: 450
    points:
      - Осмислення історичних закономірностей через поезію.
      - 'Глобальний синхронічний підхід: Україна в контексті Європи.'
      - Синтез емоційної напруги та холодного інтелектуалізму.
  - section: 'Деколонізаційна перспектива: Концепт «малоросійства»'
    words: 600
    points:
      - Аналіз однойменного есею 1959 року.
      - Малоросійство як ментальна хвороба, «апріорна капітуляція» перед імперією.
      - Постать М. Гоголя як приклад трагічного «малороса».
  - section: 'Деколонізаційна перспектива: Подолання меншовартості'
    words: 450
    points:
      - Руйнування міфу про «миролюбних гречкосіїв».
      - 'Українська суб''єктність: нація повинна усвідомити себе волею.'
      - Антиімперський пафос та формування ідентичності опору.
  - section: Підсумок та спадщина
    words: 400
    points:
      - Вплив ідей Маланюка на шістдесятників та дисидентів.
      - Абсолютна актуальність під час сучасної російсько-української війни.
      - 'Резюме: Маланюк як ідеолог державного будівництва.'
