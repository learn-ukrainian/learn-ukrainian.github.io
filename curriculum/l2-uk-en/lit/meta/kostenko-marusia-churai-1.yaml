slug: kostenko-marusia-churai-1
title: 'Ліна Костенко: «Маруся Чурай» — роман у віршах'
word_target: 5000
content_outline:
  - section: 'Вступ: Історичні умови створення'
    words: 500
    points:
      - Створення роману в умовах ідеологічного тиску 1970-х років та внутрішньої
        еміграції шістдесятників
      - Складний шлях до публікації 1979 року та здобуття Шевченківської премії (1987)
      - 'Чому цей текст залишається гостро актуальним сьогодні: проблема вибору митця'
  - section: 'Вступ: Місце в літературному каноні'
    words: 500
    points:
      - Відродження жанру «роману у віршах» в українській літературі
      - 'Масштаб твору: поєднання історичного епосу та глибокої психологічної драми'
      - Постать Ліни Костенко як морального авторитету нації
  - section: 'Аналіз твору: Розвиток сюжету та конфлікт'
    words: 700
    points:
      - 'Композиційна структура: поєднання теперішнього (суд) та минулого (спогади
        у в''язниці)'
      - 'Конфлікт як рушійна сила: зіткнення духовної висоти та меркантильного пристосуванства
        («Нерівня душ»)'
      - 'Кульмінаційні моменти: суд, очікування страти, прибуття гінця з універсалом'
  - section: 'Аналіз твору: Джерела та історичне тло'
    words: 500
    points:
      - 'Історичне тло Хмельниччини: Полтавський полк, пожежа 1658 року'
      - Архівальна робота авторки та реконструкція правової і соціальної дійсності
        козацької держави
      - Співвідношення фольклорного (легенда) та історичного (документальне) у творі
  - section: 'Герменевтика: Образ Марусі як голос нації'
    words: 600
    points:
      - Маруся Чурай як уособлення творчого генія та національної пам'яті
      - 'Відповідальність митця: пісня як зброя («Це — голос наш. Це — пісня. Це —
        душа»)'
      - Символіка самотності та незрозумілості генія у натовпі
  - section: 'Герменевтика: Система персонажів'
    words: 600
    points:
      - 'Гриць Бобренко: трагедія роздвоєної душі між обов''язком, високим почуттям
        та матеріальною вигодою'
      - 'Іван Іскра: архетип українського лицаря-інтелектуала та державника'
      - 'Полтавська громада як колективний персонаж: від міщанства до козацької еліти'
  - section: 'Мова, стиль та поетика: Роман у віршах'
    words: 600
    points:
      - 'Стилістичні інновації: необарокова естетика та інтелектуальна напруга вірша'
      - 'Мовна майстерність: синтез народнорозмовної стихії, архаїзмів та філософського
        словника'
      - Афористичність мислення Ліни Костенко (цитованість твору в культурі)
  - section: 'Деколонізаційний вимір: Опір асиміляції'
    words: 500
    points:
      - Руйнування імперського міфу про «провінційну» і стихійну козацьку історію
      - 'Агентність українського героя: утвердження повноцінної національної суб''єктності'
      - Опір культурній та історичній амнезії через літературну реконструкцію пам'яті
  - section: 'Підсумок: Рецепція та світовий контекст'
    words: 500
    points:
      - Вплив твору на національну свідомість під час здобуття Незалежності
      - 'Світовий контекст: паралелі з європейськими історичними епосами'
      - 'Питання для дискусії: актуальність проблематики цілісності душі в сучасному
        світі'
