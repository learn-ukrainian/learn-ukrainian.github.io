slug: domontovych-dr-seraphicus
title: Domontovych Dr Seraphicus
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови появи твору'
    words: 450
    points:
      - Створення роману у 1929 році на тлі наближення сталінських репресій.
      - Рішення В. Петрова не публікувати твір в СРСР для уникнення соцреалізму.
      - Видання роману в еміграції у 1947 році (Мюнхен).
  - section: 'Вступ та культурний контекст: II — Місце в каноні та актуальність'
    words: 400
    points:
      - Статус одного з перших українських інтелектуальних романів.
      - Відкриття Домонтовича в 1990-х роках і його вплив на сучасний канон.
      - Актуальність теми екзистенційної відчуженості та гендерної ідентичності.
  - section: 'Аналіз твору: Сюжет та структура: I — Ключові етапи сюжету та конфлікт'
    words: 500
    points:
      - Знайомство Комахи (Серафікуса) з Вер Ельснер та розвиток їхніх стосунків.
      - Стосунки Серафікуса з п'ятирічною Ірцею як прояв прихованого батьківського
        інстинкту.
      - 'Внутрішній конфлікт героя: раціоналізм проти емоційної та біологічної природи.'
  - section: 'Аналіз твору: Сюжет та структура: II — Впливи та літературні джерела'
    words: 450
    points:
      - Перегук із «Серафітою» Оноре де Бальзака (мотив андрогінності).
      - Паралелі з «Фаустом» Гете (кабінетний вчений, відірваний від життя).
      - Типологічна спорідненість з мотивами майбутньої «Лоліти» В. Набокова.
  - section: 'Герменевтика та ключові образи: I — Символіка та архетип Дон Жуана'
    words: 550
    points:
      - 'Аналіз символіки: Комаха як «молюск», «гомункулюс», паперова фікція.'
      - 'Деконструкція міфу: Серафікус як Дон Жуан «навпаки».'
      - Спроба заперечити біологічне існування на користь суто культурного.
  - section: 'Герменевтика та ключові образи: II — Система персонажів'
    words: 500
    points:
      - Образ Вер Ельснер як втілення вітальної, творчої та емоційної енергії.
      - Художник Володимир Корвин та мотив бісексуальності/гомосексуальності.
      - Еволюція взаємин героїв через ретроспективні вставки.
  - section: 'Мова, стиль та поетика: I — Психоаналітичний дискурс та стиль'
    words: 500
    points:
      - Використання Домонтовичем концепцій Зигмунда Фройда.
      - Аналіз сновидінь Серафікуса та Вер як інструмент розкриття підсвідомого.
      - Висвітлення придушених бажань (купання дитини уві сні Комахи).
  - section: 'Мова, стиль та поетика: II — Автобіографічні коди та мовні особливості'
    words: 400
    points:
      - Проєкція рис Віктора Петрова (етнографа) на образ Комахи.
      - Іронічна дистанція автора від свого героя.
      - Холодний, аналітичний синтаксис як засіб підкреслення раціоналізму.
  - section: 'Деколонізаційний вимір: I — Руйнування соцреалістичного міфу'
    words: 450
    points:
      - Відкидання імперської вимоги писати «пролетарську» чи «народницьку» літературу.
      - Свідома орієнтація на західноєвропейський модерністський формат.
      - Захист права митця на індивідуалізм та аполітичність.
  - section: 'Деколонізаційний вимір: II — Український інтелектуальний простір'
    words: 450
    points:
      - Презентація Києва 1920-х як простору європейської богеми.
      - 'Агентність українського героя: він розв''язує загальнолюдські екзистенційні
        проблеми.'
      - Культурне самоствердження через високочолу інтелектуальну дискусію.
  - section: 'Підсумок та рецепція: I — Вплив і контекст'
    words: 450
    points:
      - Оцінка роману Юрієм Шевельовим та еміграційною критикою.
      - Вплив Домонтовича на постмодерне покоління українських письменників.
      - Значення «Доктора Серафікуса» для остаточного ствердження українського європейського
        модернізму.
