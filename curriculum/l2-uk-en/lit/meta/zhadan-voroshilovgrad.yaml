  - section: 'Мова, стиль та поетика: I — Стилістичні інновації'
    words: 400
    points:
      - 'Феномен поетичної прози Жадана: метафоричність у поєднанні з брутальністю.'
      - Специфічний жаданівський «магічний реалізм» індустріальних ландшафтів.
      - Балансування між меланхолією, жорстким реалізмом та іронією.
  - section: 'Мова, стиль та поетика: II — Лексика та ритміка'
    words: 400
    points:
      - Органічне вплетення розмовної мови, сленгу та суржику в літературний текст.
      - Особливості ритмізованого синтаксису, що нагадує джазові імпровізації.
      - Створення автентичного «голосу Сходу» без російського колоніального фільтра.
  - section: 'Деколонізаційний вимір: I — Руйнування міфу про Донбас'
    words: 400
    points:
      - Деконструкція радянського наративу про Донбас як виключно пролетарський та
