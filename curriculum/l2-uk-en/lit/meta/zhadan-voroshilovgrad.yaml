      - Зовнішній конфлікт за майно як проєкція внутрішнього конфлікту за власну ідентичність.
      - Перехід від пасивності до активного спротиву як головна рушійна сила сюжету.
  - section: 'Герменевтика та ключові образи: I — Розбір символіки та міфології'
