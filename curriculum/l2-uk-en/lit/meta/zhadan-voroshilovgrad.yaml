    points:
      - 'Еволюція Германа: від конформіста до суб''єкта, що бере відповідальність.'
      - Образи Кочі та Травмованого як архетипи козаків-побратимів ХХІ століття.
      - Специфіка жіночих персонажів роману (Оля, Катя) та їхня роль у дорослішанні
