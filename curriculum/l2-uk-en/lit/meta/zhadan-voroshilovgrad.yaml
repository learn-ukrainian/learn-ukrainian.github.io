      - 'Повернення людського виміру регіону: історія індивідуумів проти безликої
        маси.'
      - Українізація локального контексту через архетипи Дикого Поля.
  - section: 'Деколонізаційний вимір: II — Агентність та опір'
    words: 400
    points:
      - Теза «Своє не віддають» як маніфест української суб'єктності.
      - 'Відмова від асиміляції та втечі: вибір захищати свою історію та друзів.'
      - Формування новітньої української політичної нації через солідарність низів.
  - section: 'Підсумок та рецепція: I — Рецепція та світовий контекст'
