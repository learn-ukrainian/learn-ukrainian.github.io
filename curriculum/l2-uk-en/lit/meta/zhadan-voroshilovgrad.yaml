    points:
      - Міжнародне визнання твору, переклади та європейська критика.
      - Успіх екранізації «Дике поле» та її вплив на популяризацію роману.
      - Місце роману в контексті східноєвропейської літератури пост-транзитного періоду.
  - section: 'Підсумок та рецепція: II — Вплив та дискусія'
    words: 400
    points:
      - Як «Ворошиловград» вплинув на сучасну українську прозу (зокрема воєнну).
      - Дискусійні питання щодо мачизму персонажів та романтизації 90-х.
      - Роман як інструмент пропрацювання колективних травм українського суспільства.
