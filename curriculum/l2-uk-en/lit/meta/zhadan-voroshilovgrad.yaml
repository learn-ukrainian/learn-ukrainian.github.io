      - 'Пророчий характер тексту: як події 2014 року змінили оптику прочитання роману.'
      - «Ворошиловград» як ключовий текст про українську солідарність та ідентичність.
  - section: 'Аналіз твору: Сюжет та структура: I — Етапи розвитку та джерела'
