slug: zerov-kyiv-parnassus
title: 'Микола Зеров: Київський Парнас'
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови'
  words: 450
  points:
  - Київ 1920-х років як інтелектуальний центр («Латинський квартал» на Паньківщині).
  - 'Формування гуртка неокласиків («гроно п''ятірне»): М. Зеров, М. Рильський, П.
    Филипович, М. Драй-Хмара, Ю. Клен.'
- section: 'Вступ та культурний контекст: II — Місце в каноні'
  words: 400
  points:
  - Роль Миколи Зерова як безперечного лідера та ідеолога «Київського Парнасу».
  - Значення неокласичної спадщини для формування українського високого модернізму.
- section: 'Аналіз твору: Сюжет та структура: I — Етапи та впливи'
  words: 450
  points:
  - 'Концептуальний вектор літературної програми Зерова: від хаосу сучасності до гармонії.'
  - Звернення до античності та європейської традиції (Ad fontes!) як фундаментальне
    джерело.
- section: 'Аналіз твору: Сюжет та структура: II — Конфлікт'
  words: 450
  points:
  - Естетичний конфлікт неокласиків із масовою пролетарською літературою та футуристами.
  - Літературна дискусія 1925-1928 років як боротьба за цивілізаційний вибір України.
- section: 'Герменевтика та ключові образи: I — Символіка'
  words: 500
  points:
  - Образ Києва як вічного міста (на матеріалі сонета «Київ — традиція»).
  - Античні архетипи (Парнас, Камена) як метафора вічного, непідвладного часу мистецтва.
- section: 'Герменевтика та ключові образи: II — Персонажі'
  words: 450
  points:
  - 'Система образів: ліричний герой як стоїк, що протистоїть деструктивній ідеологічній
    епосі.'
  - 'Еволюція позиції митця: від відстороненого спостерігача до культурного героя-мученика.'
- section: Мова, стиль та поетика
  words: 500
  points:
  - 'Відродження суворої поетичної форми: сонет і класичний александрійський вірш.'
  - 'Стилістичні інновації: інтелектуальна лексика, історичні алюзії, відмова від
    провінціалізму.'
  - 'Особливості ритміки та синтаксису: математична вивіреність та логічна ясність.'
- section: Деколонізаційний вимір
  words: 400
  points:
  - Руйнування міфу про українську культуру як суто селянську та етнографічно обмежену.
  - 'Агентність: орієнтація на західноєвропейську спадщину, повністю минаючи російське
    посередництво.'
  - Опір асиміляції через творення елітарної літератури європейського рівня національною
    мовою.
- section: Підсумок та рецепція
  words: 400
  points:
  - Вплив ідей «Київського Парнасу» на шістдесятників та українську діаспору (Нью-Йоркська
    група).
  - 'Світовий контекст: український неокласицизм на загальноєвропейському тлі міжвоєнного
    модернізму.'
  - 'Питання для дискусії: ціна елітарного мистецтва та збереження власного голосу
    в умовах тоталітаризму.'
