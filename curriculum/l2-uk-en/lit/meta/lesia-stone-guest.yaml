slug: lesia-stone-guest
title: Lesia Stone Guest
word_target: 5000
content_outline:
  - section: 'Вступ: Європейський мандрівний сюжет в українській літературі'
    words: 500
    points:
      - Традиція Дон Жуана у світовій літературі (Тірсо де Моліна, Мольєр, Байрон).
      - Леся Українка як перша жінка у світовій літературі, що переосмислила цей міф.
      - 'Модерністичне прочитання: перенесення акценту зі спокуси на філософію свободи.'
  - section: 'Вступ: Історія створення та контекст епохи'
    words: 500
    points:
      - Написання драми в Кутаїсі у травні 1912 року.
      - Листування з Агатангелом Кримським як ключ до розуміння авторського задуму.
      - Український модернізм початку ХХ століття та вихід за межі побутового реалізму.
  - section: 'Аналіз твору: Архітектоніка та конфлікт драми'
    words: 550
    points:
      - 'Структура драматичної поеми: від експозиції до трагічної розв''язки.'
      - 'Протиставлення двох світів: анархічна воля Жуана та скам''янілий закон Командора.'
      - Сюжетна динаміка як боротьба ідей, а не фізичних дій.
  - section: 'Аналіз твору: Еволюція Дон Жуана та Донни Анни'
    words: 550
    points:
      - 'Дон Жуан: від «лицаря волі» до конформіста, який прагне влади.'
      - 'Донна Анна: деконструкція образу жертви; Анна як ідеолог і маніпулятор.'
      - 'Взаємозалежність героїв: як Анна перетворює Жуана на нового Командора.'
  - section: 'Герменевтика: Символіка каменю та концепт влади'
    words: 550
    points:
      - Камінь як центральна метафора мертвої, догматичної влади (імперії, традиції).
      - 'Сцена приміряння камінного плаща: добровільна відмова від ідеалів заради
        статусу.'
      - 'Філософське значення фіналу: «Він не вмер, він тільки скаменів».'
  - section: 'Герменевтика: Інверсія гендерних ролей та образ Долорес'
    words: 550
    points:
      - 'Феміністична оптика: Донна Анна привласнює чоловічий інструментарій влади.'
      - 'Долорес як альтер-его та антипод Анни: справжня християнська жертовність.'
      - Руйнування патріархального стереотипу жіночої пасивності.
  - section: 'Мова, стиль та поетика: Драматична поема як жанр'
    words: 500
    points:
      - 'Неоромантизм Лесі Українки: конфлікт мрії та реальності.'
      - Специфіка «Lesedrama» (драми для читання) та її театральний потенціал.
      - 'Інтелектуалізм тексту: філософські діалоги замість зовнішньої дії.'
  - section: 'Мова, стиль та поетика: Ритміка та лексика'
    words: 500
    points:
      - Майстерність білого вірша та його мелодика.
      - Творення українського лицарського/аристократичного дискурсу.
      - Відмова від діалектизмів на користь високої загальнонаціональної мовної норми.
  - section: 'Деколонізаційний вимір: Україна в діалозі з Європою'
    words: 500
    points:
      - 'Подолання колоніальної провінційності: Україна як рівноправний учасник європейського
        дискурсу.'
      - 'Антиімперський пафос: Командор як уособлення репресивного імперського закону.'
      - Деконструкція пушкінської традиції («Кам'яний гість»).
  - section: 'Підсумок та рецепція: Світовий контекст'
    words: 500
    points:
      - 'Сценічна історія: від Миколи Садовського до сучасних театрів.'
      - Рецепція неокласиків та перепрочитання Оксаною Забужко («Notre Dame d'Ukraine»).
      - Актуальність проблеми свободи і влади в сучасному українському контексті.
