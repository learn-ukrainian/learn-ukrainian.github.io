slug: dziuba-internationalism
title: Dziuba Internationalism
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови появи'
    words: 500
    points:
      - Реакція Івана Дзюби на серпнево-вересневі арешти 1965 року серед української
        інтелігенції
      - Атмосфера шістдесятництва та згортання хрущовської «відлиги»
      - Створення тексту як акту громадянської мужності та надсилання його партійному
        керівництву
  - section: 'Вступ та культурний контекст: Місце в каноні та актуальність'
    words: 400
    points:
      - Статус «Біблії дисидентського руху» та поширення через самвидав
      - Трансформація публіцистичного памфлету у фундаментальний ідейний маніфест
        епохи
      - 'Актуальність сьогодні: розуміння механізмів імперського лінгвоциду'
  - section: 'Аналіз твору: Сюжет та структура — Ідейна еволюція та тези'
    words: 500
    points:
      - Використання марксистсько-ленінської риторики як інструменту деконструкції
        системи зсередини
      - 'Послідовне розвінчування підміни понять: як русифікація маскується під інтернаціоналізм'
      - 'Логіка аргументації: від статистики в освіті до філософських узагальнень
        про долю нації'
  - section: 'Аналіз твору: Сюжет та структура — Джерела та конфлікт'
    words: 400
    points:
      - Конфлікт між задекларованою ідеологією рівності націй та практикою великодержавного
        шовінізму
      - 'Робота з першоджерелами: цитування класиків марксизму проти партійної номенклатури'
      - Викриття лицемірства репресивного апарату
  - section: 'Герменевтика та ключові образи: Символіка та архетипи'
    words: 400
    points:
      - Концептуалізація «маховика русифікації» як руйнівної, інерційної сили імперії
      - Українська мова та культура як втілення душі нації, що перебуває під загрозою
        маргіналізації
      - Архетип Імперії, що ховається за фасадом радянського «братерства»
  - section: 'Герменевтика та ключові образи: Система аргументів як «персонажі»'
    words: 400
    points:
      - 'Діалогічність тексту: полеміка з уявним чи реальним ідеологічним опонентом'
      - Протиставлення справжнього патріотизму та сконструйованого ярлика «буржуазного
        націоналізму»
      - Еволюція ідеї національного обов'язку сучасного українця
  - section: 'Мова, стиль та поетика: Стилістичні інновації'
    words: 400
    points:
      - Поєднання глибокої академічної аналітики з гострою, публіцистичною пристрасністю
      - Іронія та сарказм як зброя проти бюрократичної та ідеологічної демагогії
      - Риторичні фігури, що підсилюють емоційний та інтелектуальний вплив тексту
  - section: 'Мова, стиль та поетика: Лексика та синтаксис'
    words: 400
    points:
      - Точність політологічної та філософської лексики
      - Майстерне переозначення радянських ідеологічних кліше, повернення їм первісного
        змісту
      - Синтаксичні конструкції, що відображають розгортання складної, багаторівневої
        аргументації
  - section: 'Деколонізаційний вимір: Руйнування імперських міфів'
    words: 600
    points:
      - Спростування головного міфу СРСР про «добровільне злиття націй» як виправдання
        асиміляції
      - Викриття концепту «російської мови як міжнаціонального спілкування» як інструменту
        колоніалізму
      - Демонстрація того, як псевдодемократія розв'язує руки українофобським силам
  - section: 'Деколонізаційний вимір: Опір асиміляції та агентність'
    words: 500
    points:
      - Відновлення інтелектуальної та політичної суб'єктності України
      - Заклик до відповідальності керівництва УРСР за збереження національної ідентичності
      - Маніфестація права нації на самозбереження та культурне самоствердження всупереч
        імперському тиску
  - section: 'Підсумок та рецепція: Вплив та світовий контекст'
    words: 400
    points:
      - Переклади іноземними мовами (Лондон, 1968) та розрив інформаційної блокади
        навколо українського питання
      - Вплив ідей Дзюби на формування програми національно-визвольного руху 1970-1980-х
        років
      - Переосмислення праці в часи Незалежності (видання 1998, 2005 років)
  - section: 'Підсумок та рецепція: Питання для дискусії'
    words: 250
    points:
      - Чому Дзюба обрав саме марксистську аргументацію для захисту української нації?
      - Як механізми русифікації, описані у 1965 році, співвідносяться із сучасною
        культурною ситуацією?
      - У чому полягає універсальне антиколоніальне значення цієї праці?
