slug: koval-prose-renaissance
title: Koval Prose Renaissance
word_target: 4000
content_outline:
- section: 'Вступ: Історичні умови появи твору'
  words: 350
  points:
  - Відкриття архівів КДБ після здобуття незалежності у 1991 році як поштовх до появи
    документальної прози.
  - Формування запиту на справжню національну пам'ять на противагу радянським ідеологічним
    фальсифікаціям.
- section: 'Вступ: Місце в каноні та актуальність'
  words: 350
  points:
  - Роль документально-історичної прози (зокрема Р. Коваля) у подоланні віктимності
    українського літературного канону.
  - Прямий зв'язок між літературним ренесансом 1990-х та ідеологічною мотивацією сучасних
    ЗСУ (зокрема 93-ї ОМБр «Холодний Яр»).
- section: 'Аналіз твору: Ключові етапи сюжету'
  words: 400
  points:
  - Побудова наративу навколо реальних життєписів отаманів (від мирного життя до усвідомленої
    збройної боротьби).
  - Трагізм поразки як етап переходу до епічного безсмертя (перетворення історичного
    факту на національний міф).
- section: 'Аналіз твору: Джерела та рушійна сила конфлікту'
  words: 400
  points:
  - Синтез архівних кримінальних справ ЧК/ДПУ та мемуаристики (напр., Юрія Горліса-Горського).
  - Екзистенційний конфлікт між ідеєю української державності та російським більшовицьким
    тоталітаризмом.
- section: 'Герменевтика: Розбір символіки та міфології'
  words: 350
  points:
  - Топос Холодного Яру як сакрального центру опору, архетип лісу-захисника.
  - Спадкоємність міфологеми гайдамаччини та Запорозької Січі у свідомості героїв
    ХХ століття.
- section: 'Герменевтика: Система персонажів та еволюція'
  words: 350
  points:
  - Аналіз історичних постатей (Василь Чучупак, Чорний Ворон) як літературних архетипів
    воїна.
  - 'Еволюція характеру: від звичайного хлібороба-власника до безкомпромісного месника-отамана.'
- section: 'Мова та поетика: Стилістичні інновації та ритміка'
  words: 350
  points:
  - Створення жанру «документально-есеїстичної прози» з високим рівнем емоційної напруги.
  - Динамічний, карбований синтаксис мілітарної літератури, що контрастує з традиційною
    ліричною прозою.
- section: 'Мова та поетика: Робота з народною мовою'
  words: 350
  points:
  - Інкорпорація живої наддніпрянської говірки початку ХХ століття у сучасний літературний
    текст.
  - Використання автентичної військової термінології та повстанського сленгу для створення
    ефекту присутності.
- section: 'Деколонізаційний вимір: Руйнування імперських міфів'
  words: 400
  points:
  - Методичне спростування радянського наративу про повстанців як «куркульських бандитів».
  - Легітимізація Визвольних змагань як повноцінної національно-визвольної війни проти
    окупанта.
- section: 'Деколонізаційний вимір: Агентність та опір'
  words: 400
  points:
  - 'Філософія чину: перенесення акценту з оплакування національних поразок на уславлення
    героїчного опору.'
  - Заперечення асиміляції та утвердження українця як суб'єкта історії, здатного зі
    зброєю в руках захищати власні інтереси.
- section: 'Підсумок та рецепція: Вплив на наступні покоління'
  words: 300
  points:
  - Вплив прози Коваля на сучасних авторів (зокрема на створення роману В. Шкляра
    «Залишенець»).
  - 'Рецепція у суспільстві: від маргіналізованого краєзнавства до мейнстриму національної
    пам''яті.'
