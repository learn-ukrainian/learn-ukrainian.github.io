slug: semenko-futurism-manifesto
title: 'Михайль Семенко: Маніфест футуризму'
word_target: 4000
content_outline:
- section: 'Вступ: I — Історичні умови'
  words: 300
  points:
  - 'Київ початку ХХ століття: перехід від провінційного міста до модерного центру'
  - Панування народницько-селянської парадигми в українській культурі перед Першою
    світовою війною
  - 'Назрівання конфлікту поколінь: потреба в урбаністичному та авангардному мистецтві'
- section: 'Вступ: II — Місце в каноні та сучасність'
  words: 350
  points:
  - Значення збірки «Дерзання» (1914) та маніфесту «Сам» як відправної точки українського
    футуризму
  - Семенко як засновник кверофутуризму («мистецтва шукання»)
  - 'Сучасна актуальність маніфесту: бунт проти культурної стагнації та ідолопоклонства'
- section: 'Аналіз твору: I — Етапи маніфесту'
  words: 350
  points:
  - 'Експозиція: декларація відчуження та самотності митця («Сам»)'
  - 'Кульмінація епатажу: заклик до скидання авторитетів («Я палю свій Кобзар»)'
  - 'Розв''язка: проголошення нової естетики динаміки та вічного пошуку'
- section: 'Аналіз твору: II — Впливи та конфлікт'
  words: 350
  points:
  - Діалог і полеміка з італійським (Марінетті) та російським футуризмом
  - 'Центральний конфлікт тексту: динаміка прогресу проти статики консервативного
    поклоніння'
  - Реакція сучасників (М. Євшан, С. Єфремов) на провокацію Семенка
- section: 'Герменевтика: I — Розбір символіки'
  words: 350
  points:
  - Символіка вогню та руйнування як акту очищення (деструкція заради конструкції)
  - «Кобзар» у маніфесті як метафора не поезії Шевченка, а мертвого, забронзовілого
    культу
  - Антитеза «природа/село» проти «місто/індустрія»
- section: 'Герменевтика: II — Еволюція митця та підтексти'
  words: 300
  points:
  - 'Трансформація ліричного суб''єкта: від меланхоліка до радикала-новатора'
  - Архетип культурного трикстера та руйнівника ідолів у тексті
  - Міфологія нового індустріального бога — швидкості та руху
- section: 'Мова і стиль: I — Стилістичні інновації'
  words: 350
  points:
  - Відмова від традиційної «солов'їної» мелодійності української літератури
  - Введення урбаністичної, машинної та наукової лексики
  - Епатажна, агресивна риторика як стилістичний інструмент (естетика маніфесту)
- section: 'Мова і стиль: II — Ритміка та синтаксис'
  words: 300
  points:
  - Телеграфний, рубаний синтаксис, що імітує ритм сучасного міста
  - Використання гасел, імперативів та прямого звернення до читача
  - Графічні експерименти з текстом (передумови візуальної поезії)
- section: 'Деколонізація: I — Руйнування імперського міфу'
  words: 350
  points:
  - Спростування міфу про виключно «селянський» та вторинний характер української
    культури
  - Маніфест як доказ самодостатності українського авангарду, незалежного від імперського
    центру
  - Кверофутуризм як унікальне українське явище європейського масштабу
- section: 'Деколонізація: II — Опір та культурне самоствердження'
  words: 350
  points:
  - 'Агентність українського митця: Семенко сам формує правила гри, а не слідує чужим
    трендам'
  - Боротьба із комплексом меншовартості («шароварщиною») заради входження у світовий
    дискурс
  - Депровінціалізація української літератури як головна національна мета футуристів
- section: 'Рецепція: I — Вплив на письменників'
  words: 300
  points:
  - Створення «Нової ґенерації» та об'єднання навколо Семенка провідних інтелектуалів
    1920-х
  - Вплив ідей маніфесту на наступні авангардні покоління (від шістдесятників до постмодерністів)
  - Реабілітація постаті Семенка в сучасній українській літературознавчій думці
- section: 'Рецепція: II — Світовий контекст та дискусія'
  words: 350
  points:
  - Маніфест «Сам» у порівнянні з європейськими літературними маніфестами епохи модернізму
  - 'Парадокс авангарду: радикальний розрив із минулим як крок до створення нової
    національної ідентичності'
  - 'Трагічний фінал: розстріл Семенка та жорстоке придушення українського авангарду
    тоталітарною машиною'
