slug: kostenko-poetry
title: Kostenko Poetry
word_target: 5000
content_outline:
  - section: 'Вступ: Шістдесятництво та внутрішня еміграція'
    words: 450
    points:
      - 'Історичні умови: хрущовська відлига та поява шістдесятників як носіїв нового
        мислення.'
      - 'Громадянська позиція Ліни Костенко: підписання листів протесту та опір системі.'
      - Феномен 16-річної 'внутрішньої еміграції' та збереження творчої гідності в
        умовах цензури.
  - section: 'Вступ: Місце Ліни Костенко в літературному каноні'
    words: 400
    points:
      - 'Спадкоємність традицій: зв''язок з неокласиками та Лесею Українкою (інтелектуалізм,
        етос боротьби).'
      - Перехід образу поета від 'оспівувача епохи' до 'совісті нації'.
      - Актуальність її голосу в сучасній українській культурі.
  - section: 'Аналіз: Специфіка історичної поеми («Маруся Чурай»)'
    words: 500
    points:
      - 'Структура роману у віршах: поєднання епосу та лірики, поліфонізм.'
      - Історичне тло Хмельниччини як проєкція екзистенційних проблем нації.
      - 'Конфлікт: зіткнення високого духовного ідеалу (Маруся) та матеріального прагматизму
        (Гриць).'
  - section: 'Аналіз: Інтимна та пейзажна лірика'
    words: 450
    points:
      - Філософське осмислення кохання як простору абсолютної свободи та трагічної
        невідворотності.
      - Пейзаж як психологічне дзеркало ліричного суб'єкта.
      - Аналіз вірша 'Недумано, негадано забігла в глухомань...'.
  - section: 'Герменевтика: Пам''ять та безсмертя слова'
    words: 450
    points:
      - Концепт девальвації мови у тоталітарному суспільстві ('Страшні слова, коли
        вони мовчать...').
      - 'Відповідальність митця: слово як інструмент збереження національної пам''яті.'
      - Безсмертя істинного мистецтва на противагу тимчасовості влади.
  - section: 'Герменевтика: Архетипи та міфологічні підтексти'
    words: 450
    points:
      - Архетип митця-пророка та його фатальна самотність серед юрби.
      - Міфологізація українського простору та історичних подій.
      - Символіка ріки, порогу, шляху у філософській ліриці.
  - section: 'Поетика: Афористичність та інтелектуалізм'
    words: 450
    points:
      - 'Стилістична риса: конденсація думки та крилатість висловів.'
      - Висока інтелектуальна напруга вірша, діалог із європейською культурною спадщиною.
      - 'Відмова від спрощення: вибагливість Костенко до свого читача.'
  - section: 'Поетика: Ритміка, синтаксис та неологізми'
    words: 450
    points:
      - Строгість неокласичної форми у поєднанні з живою народною інтонацією.
      - Специфіка синтаксичних конструкцій для створення емфази.
      - 'Робота з лексикою: повернення забутих слів та авторські неологізми.'
  - section: 'Деколонізаційний вимір: Деконструкція імперського наративу'
    words: 500
    points:
      - Спростування міфу про українську літературу як провінційну чи виключно 'селянську'.
      - 'Переосмислення історичних поразок (поема ''Берестечко''): аналіз внутрішніх
        причин замість комплексу жертви.'
      - Відновлення правдивої історичної перспективи поза імперськими ідеологемами.
  - section: 'Деколонізаційний вимір: Опір асиміляції та гідність'
    words: 500
    points:
      - 'Агентність українського героя: здатність до вчинку та морального вибору.'
      - Опір культурній та мовній асиміляції ('Нації вмирають не від інфаркту...').
      - Утвердження української ідентичності як самодостатньої та європейської.
  - section: 'Підсумок та рецепція: Значення для сучасної України'
    words: 500
    points:
      - 'Трансформація статусу Ліни Костенко у Незалежній Україні: моральний авторитет.'
      - Пророче звучання її творів у контексті сучасної російсько-української війни.
      - 'Світовий контекст твору: переклади та універсальність порушених проблем.'
