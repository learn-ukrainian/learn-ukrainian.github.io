slug: stefanyk-stone-cross
title: 'Василь Стефаник: «Камінний хрест» — біль еміграції'
word_target: 5000
content_outline:
- section: 'Вступ та культурний контекст: Історичні умови'
  words: 500
  points:
  - Перша хвиля масової трудової еміграції з Галичини наприкінці ХІХ ст. до Канади,
    США та Бразилії
  - Аграрне перенаселення, безземелля та зубожіння як головні причини відчаю селян
  - Відрив від рідного середовища сприймався не як звільнення, а як вигнання в небуття
    (рівноцінно смерті)
- section: 'Вступ та культурний контекст: Місце в каноні'
  words: 500
  points:
  - Приналежність Василя Стефаника до «Покутської трійці» та його роль як творця українського
    модернізму
  - Відмова від етнографічної описовості на користь глибокого занурення у психологію
    героя (експресіонізм)
  - 'Актуальність твору сьогодні: архетипна травма втрати дому в контексті вимушеної
    еміграції українців'
- section: 'Аналіз твору: Сюжет та структура — Джерела'
  words: 500
  points:
  - 'Документальна основа новели: прототипом головного героя став односелець Стефаника
    Штефан Дідух'
  - Сюжет фокусується не на самій поїздці за океан, а виключно на акті прощання —
    зборі всього села
  - Нелінійна, фрагментарна композиція з семи розділів-образів, акцент на емоційних
    вибухах і станах
- section: 'Аналіз твору: Сюжет та структура — Конфлікт'
  words: 500
  points:
  - 'Екзистенційний внутрішній конфлікт: органічна вікова прив''язка до землі проти
    майбутнього дітей'
  - Піщаний горб як мовчазний антагоніст і водночас єдиний сенс існування головного
    героя
  - Кульмінація емоційної напруги у божевільному, надривному танці Івана з дружиною
    перед від'їздом
- section: 'Герменевтика та ключові образи: Іван Дідух'
  words: 500
  points:
  - Іван «Переломаний» як архетип українського селянина, злитого зі своєю сакральною
    працею
  - Життя як постійна боротьба з горбом, який скалічив його тіло («мав у поясі хибу»)
  - Еволюція героя від німого болю втрати до прийняття свого фатуму через акт творення
    пам'ятника
- section: 'Герменевтика та ключові образи: Символіка хреста'
  words: 500
  points:
  - Камінний хрест із іменами живих Івана та Катерини — центральна метафора духовного
    потойбіччя
  - Від'їзд до Канади як символічна смерть, а застілля перед від'їздом — як тризна
    за живими
  - Хрест як Голгофа Дідуха, міра його страждань та спроба зафіксувати своє буття
    у вічності
- section: 'Мова, стиль та поетика: Експресіонізм'
  words: 500
  points:
  - Крайня інтенсивність почуттів та лаконічність без зайвих пейзажних чи портретних
    красот
  - Гіперболізовані тілесні деталі, що розростаються до метафори («сині жили, як ланцюги
    із синьої сталі»)
  - Абсолютна оголеність нервів, де письменник не розповідає про горе, а показує його
    через надрив
- section: 'Мова, стиль та поетика: Синтаксис і діалект'
  words: 500
  points:
  - Щедро насичений покутський діалект як спосіб передати автентичне, нутряне мислення
    героя
  - Діалект не як етнографічна прикраса, а як єдина можлива мова внутрішнього зламу
  - Рубаний, уривчастий синтаксис, що передає спазми плачу та важке дихання скаліченої
    людини
- section: Деколонізаційний вимір
  words: 500
  points:
  - Спростування імперського міфу про Стефаника як письменника-побутовика та критика
    класового гніту
  - Іван Дідух як філософ своєї землі, а не примітивна безіменна жертва обставин
  - Встановлення хреста як акт колосальної агентності, супротив асиміляції та утвердження
    права на історію
- section: Підсумок та рецепція
  words: 500
  points:
  - Синхронізація української літератури з європейським модернізмом (Е. Мунк, Ф. Кафка)
  - 'Конгеніальне втілення твору у кінематографі: шедевр українського поетичного кіно
    Л. Осики (1968)'
  - Нове, болюче прочитання твору в контексті сучасної війни та еміграції мільйонів
    українців
