slug: stefanyk-stone-cross
title: 'Василь Стефаник: «Камінний хрест» — біль еміграції'
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: Історичні умови'
  words: 400
  points:
  - Масова еміграція галичан на зламі ХІХ–ХХ століть як соціальний та національний
    феномен
  - 'Історичні умови появи твору: бідність, безземелля та пошук кращої долі за океаном'
  - Статус українців у складі Австро-Угорської імперії на той час
- section: 'Вступ та культурний контекст: Місце в каноні'
  words: 400
  points:
  - Василь Стефаник як один із творців українського модернізму та член «Покутської
    трійці»
  - Місце новели «Камінний хрест» у європейському літературному контексті
  - Чому текст є гостроактуальним у сучасному світі (травма втрати дому, вимушена
    еміграція)
- section: 'Аналіз твору: Сюжет та структура — Джерела та сюжет'
  words: 500
  points:
  - 'Документальна основа твору: історія односельця Штефана Дідуха'
  - 'Ключові етапи розвитку сюжету: від важкої праці до прощального застілля'
  - Фрагментарна, нелінійна структура новели як риса експресіонізму
- section: 'Аналіз твору: Сюжет та структура — Конфлікт'
  words: 400
  points:
  - Екзистенційний конфлікт між любов'ю до землі та батьківським обов'язком
  - Протистояння людини і невблаганних обставин (горб як антагоніст)
  - Кульмінація емоційної напруги у сцені танцю
- section: 'Герменевтика та ключові образи: Іван Дідух'
  words: 500
  points:
  - 'Психологічний портрет Івана Переломаного: фізичне скалічення як наслідок титанічної
    праці'
  - Іван як архетип українського селянина, його сакральне ставлення до землі
  - 'Еволюція героя: від відчаю до прийняття свого фатуму'
- section: 'Герменевтика та ключові образи: Символіка хреста'
  words: 500
  points:
  - Камінний хрест як центральна метафора духовної смерті та пам'яті
  - Горб як Голгофа Івана Дідуха (міфологічні та біблійні підтексти)
  - Символіка застілля як своєрідної тризни за живими
- section: 'Мова, стиль та поетика: Експресіонізм'
  words: 400
  points:
  - Експресіоністична деталь у творчості Стефаника (наприклад, сині жили як сталеві
    ланцюги)
  - Абсолютна оголеність почуттів, надривність та лаконізм як стилістичні інновації
  - Ритміка прози, що нагадує ритм важкої фізичної праці або плачу
- section: 'Мова, стиль та поетика: Синтаксис і діалект'
  words: 400
  points:
  - Покутський діалект як інструмент аутентичності, а не просто етнографічна прикраса
  - 'Специфіка синтаксису: рубані фрази, емоційні паузи та недомовки'
  - Труднощі та особливості перекладу/інтерпретації тексту для сучасного читача
- section: Деколонізаційний вимір
  words: 500
  points:
  - Руйнування імперського міфу про Стефаника як суто 'побутового' чи 'революційного'
    письменника
  - 'Агентність українського героя: Іван залишає хрест як свідомий акт самоствердження'
  - 'Опір асиміляції: збереження пам''яті про своє коріння як стратегія виживання
    нації'
- section: Підсумок та рецепція
  words: 400
  points:
  - Вплив твору на розвиток української літератури ХХ століття
  - 'Кінематографічна рецепція: фільм Леоніда Осики як продовження життя новели'
  - 'Питання для дискусії: що означає ''камінний хрест'' для сучасних українських
