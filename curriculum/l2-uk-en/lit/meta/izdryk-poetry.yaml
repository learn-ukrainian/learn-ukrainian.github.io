slug: izdryk-poetry
title: Izdryk Poetry
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: І — Станіславський феномен'
    words: 400
    points:
      - Історичні умови появи «Станіславського феномену» в кінці 1980-х
      - Заснування концептуального журналу «Четвер» (1989) як майданчика андеграунду
      - Подолання посттоталітарної травми через постмодерну гру
  - section: 'Вступ та культурний контекст: ІІ — Місце в сучасному каноні'
    words: 400
    points:
      - Еволюція Юрія Іздрика від андеграундного автора до лауреата Шевченківської
        премії (2025)
      - Чому тексти Іздрика стали маніфестами для сучасного покоління
  - section: 'Аналіз твору: Сюжет та структура: І — Конфлікт та розвиток ліричного
      героя'
    words: 450
    points:
      - Екзистенційна самотність як головний рушій ліричного сюжету (на прикладі вірша
        «Молитва»)
      - Динаміка від відчуження («світ повертається спиною») до пошуку зв'язку
  - section: 'Аналіз твору: Сюжет та структура: ІІ — Інтертекстуальність та впливи'
    words: 450
    points:
      - Постмодерністський колаж та діалог із попередніми епохами
      - Біблійні алюзії та релігійні мотиви у світському контексті
  - section: 'Герменевтика та ключові образи: І — Філософська символіка та архетипи'
    words: 500
    points:
      - Детальний розбір символіки слова як рятівного інструменту («словом також можна
        любити»)
      - 'Тілесність і кінестетичність: як слово «стається тілом»'
  - section: 'Герменевтика та ключові образи: ІІ — Система персонажів та еволюція'
    words: 450
    points:
      - 'Дихотомія «Я» та «Інший»: як інший визначає межі власного існування'
      - Звернення до умовного співрозмовника як спосіб підтвердження власної реальності
  - section: 'Мова, стиль та поетика: І — Синтез високого і низького'
    words: 500
    points:
      - 'Стилістичні інновації: поєднання сакральної лексики (молитва, Бог) зі сленгом
        та англіцизмами'
      - Деконструкція класичного пафосу через іронію та побутові деталі
  - section: 'Мова, стиль та поетика: ІІ — Ритміка та музикальність тексту'
    words: 450
    points:
      - 'Особливості синтаксису: потік свідомості, відмова від традиційної пунктуації'
      - 'Музикальність: речитативність, блюзові ритми та співзвучність із музичною
        культурою'
  - section: 'Деколонізаційний вимір: І — Руйнування імперських наративів'
    words: 450
    points:
      - Спростування міфу про винятково рустикальну, фольклорну природу української
        мови
      - Демонстрація здатності української поезії до вираження складних урбаністичних
        концептів
  - section: 'Деколонізаційний вимір: ІІ — Агентність і культурне самоствердження'
    words: 400
    points:
      - Вихід з-під впливу російського культурного поля та пряма комунікація з європейським
        контекстом
      - Культурне самоствердження без колоніального комплексу меншовартості
  - section: 'Підсумок та рецепція: І — Світовий контекст твору'
    words: 300
    points:
      - Вписування поезії Іздрика у світові тенденції нонконформізму та екзистенціалізму
      - 'Універсальність тем: війна, тривога, любов у цифрову епоху'
  - section: 'Підсумок та рецепція: ІІ — Вплив на наступні покоління'
    words: 300
    points:
      - Вірусна популярність текстів («говори зі мною»)
      - Вплив на сучасних авторів, музичні гурти та візуальне мистецтво
