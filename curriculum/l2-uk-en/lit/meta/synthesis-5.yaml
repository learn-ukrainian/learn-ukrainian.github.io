slug: synthesis-5
title: 'Синтез: Горизонти епохи 5'
word_target: 4000
content_outline:
- section: 'Діахронний аналіз: I — Еволюція ідей та архетипів'
  words: 450
  points:
  - Тяглість української літературної традиції від бароко і романтизму до сучасного
    постпостмодерну.
  - 'Трансформація ключових національних архетипів: від міфу землі до урбаністичного
    простору.'
  - 'Відновлення розірваних зв''язків: як література долає наслідки радянських репресій.'
- section: 'Діахронний аналіз: II — Літературний діалог поколінь'
  words: 450
  points:
  - Інтертекстуальність як інструмент культурної пам'яті та зв'язку часів.
  - 'Полеміка сучасних авторів із класиками: деконструкція ''бронзових'' пам''ятників
    (Шевченку, Франку, Українці).'
  - Свідоме наслідування європейських модерністів 1920-х років поколінням незалежності.
- section: 'Деколонізаційна оптика: I — Стратегії інтелектуального опору'
  words: 450
  points:
  - Література як основний майданчик антиколоніальної боротьби та збереження національної
    пам'яті.
  - Іронія, сарказм та карнавалізація як зброя проти імперського пафосу та соцреалізму.
  - Формування власного, україноцентричного погляду на історію без огляду на метрополію.
- section: 'Деколонізаційна оптика: II — Системна деконструкція імперського міфу'
  words: 450
  points:
  - Препарування та руйнування міфу про 'братні народи' та 'спільну колиску' у сучасній
    есеїстиці.
  - Виявлення та нейтралізація імперських токсинів у культурному полі (праці О. Забужко,
    М. Рябчука).
  - Повернення вкраденої історії та культурних діячів до українського простору.
- section: 'Стилістичний калейдоскоп: I — Авторські техніки та експерименти'
  words: 400
  points:
  - 'Жанровий синкретизм епохи: поєднання есею, роману, документалістики та поезії.'
  - 'Постмодерна гра з текстом: колажі, містифікації, руйнування лінійної оповіді.'
  - Повернення до 'нової щирості' та свідчення у літературі періоду війни (після 2014
    року).
- section: 'Стилістичний калейдоскоп: II — Трансформація літературної мови'
  words: 400
  points:
  - Очищення літературної мови від радянського канцеляризму та штучного наближення
    до російської.
  - 'Розширення лексичних кордонів: легалізація сленгу, обсценної лексики, діалектизмів
    у високій літературі.'
  - Реанімація репресованих словників 1920-х років та творення модерного урбаністичного
    мовлення.
- section: 'Філософія ідентичності: I — Конструювання українського суб''єкта'
  words: 400
  points:
  - Подолання віктимного наративу (нації-жертви) та формування образу дієвого героя.
  - 'Суб''єктність як головна тема: герой, який приймає відповідальність за свій вибір
    і свою країну.'
  - Літературне осмислення складної, багаторівневої української ідентичності у глобалізованому
    світі.
- section: 'Філософія ідентичності: II — Формування національної етики'
  words: 400
  points:
  - 'Текст як простір етичного вибору: відстоювання гідності перед обличчям тоталітаризму
    та війни.'
  - Осмислення національних травм (Голодомор, Чорнобиль) як досвіду виживання та стійкості.
  - Формування новітнього ціннісного канону, що гуртує суспільство.
- section: 'Спадщина: I — Вплив на сучасний літературний процес'
  words: 300
  points:
  - Як акумульований досвід попередніх поколінь живить сучасну мілітарну і волонтерську
    літературу.
  - 'Трансляція українського досвіду у світовий культурний простір: переклади та міжнародне
    визнання.'
  - 'Тяглість естетичного пошуку: від ''шістдесятників'' до ''покоління війни''.'
- section: 'Горизонти майбутнього: II — Канон та інтелектуальна безпека'
  words: 300
  points:
  - Національний літературний канон як базова структура онтологічної та інформаційної
    безпеки держави.
  - Значення літератури для подолання наслідків війни та повоєнного відновлення суспільства.
  - 'Література як матриця майбутнього: проектування нових смислів для наступних поколінь.'
