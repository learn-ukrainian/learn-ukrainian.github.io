slug: yanovsky-master-of-the-ship
title: Yanovsky Master Of The Ship
word_target: 4000
content_outline:
- section: 'Вступ: Історичні умови та кіноіндустрія ВУФКУ'
  words: 400
  points:
  - Одеса 1920-х років як «український Голлівуд» (ВУФКУ).
  - 'Біографічний контекст: робота Юрія Яновського редактором на кінофабриці.'
  - Атмосфера творчого експерименту епохи Розстріляного відродження.
- section: 'Вступ: Місце в каноні та неоромантизм'
  words: 400
  points:
  - «Майстер корабля» як перший український мариністичний роман.
  - Неоромантизм як ключовий художній метод твору.
  - Відхід від народницького реалізму до урбанізму та модернізму.
- section: 'Сюжет та структура: Нелінійність і жанрова природа'
  words: 400
  points:
  - Фрагментарна, мозаїчна структура оповіді (монтаж).
  - 'Жанровий синкретизм: кінороман, мемуари, пригодницький роман.'
  - 'Утопічний екскурс у майбутнє: розповідь від імені літнього То-Ма-Кі з 1970-х
    років.'
- section: 'Сюжет та структура: Конфлікт і творення'
  words: 400
  points:
  - Процес створення фільму та будівництва дерев'яного вітрильника.
  - Море як метафора стихії, життя та творчого неспокою.
  - 'Внутрішній конфлікт героїв: пошук істини, любові та сенсу мистецтва.'
- section: 'Герменевтика: Прототипи та автобіографізм (Сев і То-Ма-Кі)'
  words: 450
  points:
  - То-Ма-Кі (Товариш Майстер Кіно) як альтер его самого Юрія Яновського.
  - Образ режисера Сева як літературне втілення Олександра Довженка.
  - Творча дружба, дискусії про мистецтво та любовний трикутник.
- section: 'Герменевтика: Тайах, Професор та архетипи'
  words: 450
  points:
  - Тайах (балерина Іта Пензо) як фатальна жінка, символ краси, свободи та авантюризму.
  - Професор (художник Василь Кричевський) як архетип мудрого наставника та носія
    традиції.
  - Дерев'яна фігура «майстра корабля» як душа судна, оберіг та символ міцної духовної
    основи нації.
- section: 'Мова і поетика: Стилістичні інновації та поетична проза'
  words: 400
  points:
  - 'Кінематографічність мислення автора: зміна планів, візуалізація сцени.'
  - Поетична ритмізована проза, багата на морську термінологію та екзотизми.
  - Афористичність мови та глибокі філософські роздуми про час і небуття.
- section: 'Деколонізаційний вимір: Руйнування міфу про провінційність'
  words: 400
  points:
  - Подолання комплексу меншовартості та «хуторянства».
  - Розширення географічних та ментальних меж української літератури (Італія, Румунія,
    екзотичні моря).
  - Космополітизм та європейська орієнтація героїв.
- section: 'Деколонізаційний вимір: Україна як морська, модерна держава'
  words: 400
  points:
  - Концепція України не як суто аграрної, а як розвиненої морської держави.
  - 'Агентність героїв: український інтелігент як творець, моряк, будівничий нового
    світу.'
  - Культурне самоствердження нації через творення високого авангардного мистецтва.
- section: 'Підсумок: Світовий контекст та рецепція'
  words: 300
  points:
  - Синхронність роману з пошуками західноєвропейського модернізму 1920-х років.
  - Вплив роману на розвиток української літератури у ХХ столітті.
  - 'Актуальність твору сьогодні: пошук ідентичності та свободи.'
