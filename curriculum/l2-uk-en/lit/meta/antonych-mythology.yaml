slug: antonych-mythology
title: Antonych Mythology
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 700
    points:
      - 'Історичні умови появи твору/автора: Львів міжвоєнного періоду як центр українського
        модернізму.'
      - 'Місце в літературному каноні: феномен «забутого» поета, якого повернули шістдесятники.'
      - 'Чому цей текст важливий сьогодні: актуальність екологічної свідомості та
        європейського виміру української культури.'
  - section: 'Аналіз твору: Сюжет та еволюція'
    words: 600
    points:
      - 'Ключові етапи розвитку ліричного сюжету: від життєствердного «Привітання
        життя» до космічної «Зеленої Євангелії» та апокаліптичних «Ротацій».'
      - 'Конфлікт як рушійна сила: зіткнення прадавнього біологічного ритму з механізованим
        ритмом сучасного міста.'
  - section: 'Аналіз твору: Впливи та джерела'
    words: 500
    points:
      - 'Впливи та джерела: синтез європейського авангарду (імажинізм, символізм)
        та лемківського фольклору.'
      - 'Біографічний субстрат: дитинство в родині священника як основа для переплетення
        християнства і міфології.'
  - section: 'Герменевтика та ключові образи: Символіка'
    words: 600
    points:
      - 'Детальний розбір символіки: флористичні та астральні образи (сонце, зорі,
        клени, вишні).'
      - 'Система персонажів та їхня еволюція: ліричне «я» як органічна частина природи
        («хрущ», «рослина»).'
  - section: 'Герменевтика та ключові образи: Архетипи'
    words: 600
    points:
      - 'Архетипи та міфологічні підтексти: створення власної міфосистеми на перетині
        слов''янського язичництва та християнства.'
      - Аналіз міфологічної метафорики на прикладі вірша «Різдво» (Бог народжується
        на санях у лемківському містечку).
  - section: 'Мова, стиль та поетика: Стилістика'
    words: 600
    points:
      - 'Стилістичні інновації автора: витончена метафорика, асоціативні ряди, віталістична
        колористика.'
      - 'Особливості ритміки та синтаксису: динамічний, рваний ритм, що передає пульсацію
        космосу.'
  - section: 'Мова, стиль та поетика: Лексика'
    words: 500
    points:
      - 'Робота з народною мовою та неохотизмами: майстерне введення лемківських діалектизмів
        у високий літературний регістр.'
      - Лексичний звукопис як інструмент створення магічної, закличної атмосфери вірша.
  - section: Деколонізаційний вимір
    words: 500
    points:
      - 'Який імперський міф руйнує цей текст: спростування радянського міфу про українську
        поезію як виключно селянську та провінційну.'
      - 'Агентність українського героя: творення самодостатнього українського модерного
        міфу поза впливом імперських наративів.'
      - 'Опір асиміляції: протистояння як польському культурному домінуванню в Галичині,
        так і радянському соцреалізму.'
  - section: Підсумок та рецепція
    words: 400
    points:
      - 'Вплив на наступні покоління письменників: величезний резонанс у творчості
        шістдесятників, Київської школи та Нью-Йоркської групи.'
      - 'Світовий контекст твору: Антонич як представник загальноєвропейського модернізму
        першої половини XX століття.'
      - 'Питання для дискусії: як міфопоетика Антонича резонує із сучасним пошуком
        української ідентичності?'
