slug: kvitka-language
title: 'Мова як Маніфест: Голос Слобожанщини'
word_target: 5000
content_outline:
  - section: 'Вступ: Від імперського чиновника до українського класика'
    words: 600
    points:
      - 'Аналіз мовної ситуації на Слобожанщині на початку XIX століття: русифікація
        місцевого дворянства та збереження української мови в селянському середовищі.'
      - Свідомий, маніфестарний вибір української мови освіченим дворянином Григорієм
        Квіткою.
      - Роль автора як піонера української художньої прози, що заклав основи нової
        літературної норми.
  - section: 'Літературна маска: Феномен Грицька Основ''яненка'
    words: 600
    points:
      - Створення образу простодушного, але мудрого селянина-оповідача (наративна
        стратегія).
      - Імітація живого усного мовлення, сказова манера розповіді, що викликає абсолютну
        довіру українського читача.
      - 'Деколонізаційний аспект: маска як спосіб обійти імперську цензуру та звернутися
        безпосередньо до свого народу.'
  - section: 'Стилістичний дуалізм: Комічна стихія бурлеску'
    words: 800
    points:
      - Аналіз стилю повісті «Конотопська відьма» та інших сатиричних творів.
      - Використання народної фразеології, соковитої лайки, іронії та комічного гротеску.
      - Демонстрація того, як бурлескна традиція (започаткована Котляревським) трансформується
        у прозовий формат.
  - section: 'Стилістичний дуалізм: Емотивна мова сентименталізму'
    words: 750
    points:
      - Аналіз повісті «Маруся» як першого україномовного сентиментального твору.
      - 'Полеміка з російськими критиками: свідоме доведення здатності української
        мови передавати найтонші психологічні нюанси та трагізм.'
      - 'Лексичний аналіз: домінування пестливої лексики (димінутивів), емотивно забарвлених
        слів та піднесеного синтаксису.'
  - section: 'Діалектологічна база: Слобожанський говір як норма'
    words: 750
    points:
      - Характеристика слобожанського діалекту, що ліг в основу творів Квітки-Основ'яненка.
      - Фонетичні та морфологічні особливості слобожанської говірки, зафіксовані в
        текстах.
      - Вплив мови Харківщини на формування загальнонаціональної літературної норми
        (доба до Тараса Шевченка).
  - section: 'Мовні портрети: Бюрократична макаронічна мова'
    words: 600
    points:
      - Сатиричне використання мови для характеристики негативних персонажів.
      - 'Мовний портрет писаря Пістряка: суміш церковнослов''янізмів, покрученої російської
        та української мов («макаронічна» мова).'
      - Використання канцеляризмів як засобу комічного розвінчання неосвіченості та
        корумпованості влади.
  - section: 'Мовні портрети: Соціальна диференціація через мову'
    words: 500
    points:
      - Контраст між природною, багатою мовою простого народу (селян) та штучним жаргоном
        представників влади чи «москалів» (солдатів).
      - 'Мова як соціальний маркер: етичний вимір мовного вибору персонажів.'
      - Зв'язок мовного портрета з моральними якостями героїв у парадигмі просвітницького
        реалізму та сентименталізму.
  - section: 'Підсумок: Мова як інструмент національної гідності'
    words: 400
    points:
      - 'Синтез стилістичних досягнень Квітки-Основ''яненка: легітимізація української
        мови в «серйозних» жанрах.'
      - Подолання комплексу меншовартості та утвердження національної гідності через
        літературне слово.
      - 'Історичне значення: Квітка як міст між Котляревським та Шевченком у процесі
        творення сучасної української літературної мови.'
