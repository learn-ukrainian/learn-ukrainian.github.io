slug: kvitka-language
title: 'Мова як Маніфест: Голос Слобожанщини'
word_target: 5000
content_outline:
- section: Вступ — Як дворянин став «голосом народу»
  words: 450
  points:
  - 'Мовна ситуація на Слобожанщині початку XIX ст.: інтенсивна русифікація інституцій
    та масовий перехід дворянської еліти (до якої належав Квітка) на російську чи
    французьку мови.'
  - 'Свідомий мовний маніфест: рішення успішного російськомовного чиновника здійснити
    мовну конверсію у 1832 році та писати твори українською мовою.'
  - 'Роль у становленні літературної норми: прагнення довести самодостатність та повноцінність
    мови простого люду як інструменту високої літератури.'
- section: «Грицько Основ'яненко» — літературна маска
  words: 450
  points:
  - 'Наративна стратегія (сказ): створення образу простодушного пасічника Грицька
    Основ''яненка для ідеальної імітації живого усного мовлення.'
  - 'Ефект абсолютної довіри: маска «свого» оповідача сприяла глибокому контакту з
    українським читачем.'
  - 'Деколонізаційна хитрість: використання маски дозволило автору обійти імперську
    цензуру, презентуючи серйозні тексти під виглядом безпечної «етнографічної цікавинки».'
- section: 'Два стилі — бурлеск vs сентименталізм: I — Комічна стихія'
  words: 450
  points:
  - Продовження традицій І. Котляревського у прозовому форматі на прикладі сатиричних
    творів, таких як «Конотопська відьма».
  - 'Використання бурлескного стилю: багатство народної фразеології, соковита лайка,
    іронія та комічний гротеск.'
  - Демонстрація того, що українська мова має невичерпні ресурси для гумору, сатири
    та соціальної критики.
- section: 'Два стилі — бурлеск vs сентименталізм: II — Емотивна мова'
  words: 550
  points:
  - Написання повісті «Маруся» (1833) як свідома полеміка з тими, хто твердив, нібито
    мовою не можна написати «нічого ніжного, зворушливого» (з листа до П. Плетньова).
  - 'Лексичний арсенал сентименталізму: майстерне використання колосального обсягу
    пестливої лексики (димінутивів — «Марусенька», «рученьки») та емотивно забарвлених
    епітетів.'
  - 'Спростування імперського міфу: створення ритмізованого, піднесеного синтаксису,
    що довів здатність української мови до глибокого психологізму і високої трагедійності
    європейського зразка.'
- section: 'Слобожанський діалект: I — Фонетика та лексика'
  words: 400
  points:
  - 'Фундамент нової норми: слобожанський говір полтавсько-харківського типу як основа
    літературної мови письменника.'
  - 'Фонетичні риси: ретельна фіксація місцевої специфічної вимови, пом''якшень та
    артикуляційних особливостей.'
  - Введення в літературний обіг широкого масиву регіональних діалектизмів, що збагатило
    національний лексикон.
- section: 'Слобожанський діалект: II — Синтаксичні особливості'
  words: 400
  points:
  - 'Синтаксичні конструкції: використання специфічної побудови речень, притаманної
    живому народному мовленню Слобожанщини.'
  - 'Легітимізація говору: переведення діалектного мовлення у статус визнаної та авторитетної
    літературної форми.'
  - 'Синтез традицій: авторитет мови Квітки (Харківщина) разом із Котляревським (Полтавщина)
    створив діалектологічну базу для майбутньої норми Т. Шевченка.'
- section: 'Мовні портрети персонажів: I — Бюрократична макаронічна мова'
  words: 450
  points:
  - Використання мови як потужного засобу глибокої соціальної сатири та створення
    портрета персонажа.
  - 'Аналіз образу писаря Пістряка з «Конотопської відьми»: його мова як потворна
    суміш церковнослов''янізмів, покрученої російської та української («макаронічна
    мова»).'
  - Канцеляризми та суржик як маркери антинародності, культурного відступництва, корумпованості
    та фальшивої вченості дрібної імперської влади.
- section: 'Мовні портрети персонажів: II — Соціальна диференціація'
  words: 400
  points:
  - Чіткий контраст між природною, багатою мовою селян (Маруся, Наум Дрот) та штучним
    солдатським жаргоном («москалі» у «Салдацькому патреті») чи мовою панства.
  - 'Мова як етичний індикатор: у парадигмі просвітницького реалізму чистота української
    мови корелює з моральною чистотою персонажа.'
  - 'Соціальний вимір: відмова від рідної мови та перехід на імперські жаргони розглядається
    як форма етичної деградації.'
- section: Підсумок — Слово як зброя
  words: 450
  points:
  - 'Мовна революція Квітки-Основ''яненка: остаточна легітимізація української мови
    в серйозних жанрах та подолання стереотипу про її виключно «сміхову» природу.'
  - 'Національна гідність: творчість письменника як інструмент ствердження української
    ідентичності та самосвідомості.'
  - 'Спадщина письменника: він став ключовим мостом між епохами Котляревського та
    Шевченка, про що свідчить визнання останнього: «Ваша "Маруся" так мені вас розказала,
    що я вас навиліт знаю».'
