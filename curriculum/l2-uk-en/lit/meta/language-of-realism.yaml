slug: language-of-realism
title: 'Мова Реалізму: Стиль Нечуя-Левицького'
word_target: 4000
content_outline:
- section: 'Вступ — Від поезії до прози: Еволюція мови'
  words: 350
  points:
  - 'Історичний перехід: від домінування поезії (Шевченко) до становлення великої
    прози'
  - Обмеженість бурлескно-травестійної традиції (Котляревський) для серйозного соціального
    аналізу
  - Потреба у новому синтаксисі та словнику для епічного наративу
- section: 'Вступ — Від поезії до прози: Інструмент достовірності'
  words: 350
  points:
  - 'Реалістична естетика: мова як дзеркало соціальної дійсності'
  - Відмова від авторського моралізаторства на користь об'єктивного показу
  - 'Ілюзія невтручання автора: ''життя, що говорить саме за себе'''
- section: 'Етнографічна точність: Діалекти та регіоналізми'
  words: 350
  points:
  - Орієнтація на живу говірку Наддніпрянщини (Київщина, Черкащина, Полтавщина)
  - 'Цитата Франка: Нечуй-Левицький як ''колосальне, всеосяжне око України'''
  - Свідоме введення регіоналізмів для збереження локального колориту без шкоди для
    розуміння
- section: 'Етнографічна точність: Побутова лексика та описи'
  words: 350
  points:
  - 'Фотографічна точність деталей: лексика на позначення одягу, їжі, архітектури'
  - 'Майстерність пейзажних описів: візуальна багатість та ліризм мови'
  - Фіксація матеріальної культури як форма національного збереження
- section: 'Мова персонажів: Індивідуалізація мовлення'
  words: 350
  points:
  - 'Лінгвопсихологія: як словниковий запас розкриває характер (''Кайдашева сім''я'')'
  - 'Мовні портрети: авторитарність Кайдашихи, лицемірна набожність баби Палажки'
  - Відмова від 'пласких' типів на користь живих, суперечливих голосів
- section: 'Мова персонажів: Соціолект і гумор'
  words: 350
  points:
  - Сільський соціолект як повноцінне середнє для розгортання драми та комедії
  - 'Природа комічного у Нечуя: не через штучне викривлення слів, а через ситуативну
    парадоксальність мислення'
  - Багатство народної фразеології, прислів'їв та приказок у діалогах
- section: 'Дискусія про норму: Контекст мовного питання'
  words: 350
  points:
  - 'Політичний розкол: формування мови в умовах Російської (Емський указ) та Австро-Угорської
    імперій'
  - Роль Галичини як видавничого центру та поява специфічного 'галицького' журнального
    стилю
  - Небезпека розриву між східноукраїнською та західноукраїнською літературними нормами
- section: 'Дискусія про норму: Полеміка Нечуя-Левицького'
  words: 400
  points:
  - Радикальна позиція письменника у статтях 'Сьогочасна часописна мова на Україні'
    та 'Криве дзеркало української мови'
  - Критика 'кування слів', полонізмів та штучної книжності галицьких авторів
  - 'Концепція ''мови баби на базарі'': захист наддніпрянської народної основи як
    єдино правильного еталона'
- section: 'Порівняльний аналіз: Нечуй та ранні прозаїки'
  words: 350
  points:
  - 'Подолання Котляревського: відмова від комічного зниження як єдиного регістру
    для простолюду'
  - 'Відмінність від Квітки-Основ''яненка: подолання сентименталізму та відкритої
    дидактики'
  - Перехід від 'театрального' зображення селянина до глибокого соціально-психологічного
    реалізму
- section: 'Порівняльний аналіз: Проза Нечуя та поезія Шевченка'
  words: 350
  points:
  - 'Спадкоємність демократичних ідеалів: увага до долі простої людини'
  - 'Зміна парадигми: від романтичної міфологізації та символізму до соціологічної
    конкретики'
  - Прозаїзація мови як необхідний крок для створення національної модерної літератури
- section: 'Підсумок — Спадщина для ХХ століття: Літературний вплив'
  words: 250
  points:
  - Перемога наддніпрянської основи у формуванні сучасної української літературної
    норми
  - Вплив мовної практики Нечуя на наступні покоління (М. Коцюбинський, Панас Мирний)
  - 'Спростування міфу про ''винятково селянського'' письменника: визнання Нечуя інтелектуальним
    мовним ідеологом'
- section: 'Підсумок — Спадщина для ХХ століття: Перехід до Миколи Джері'
  words: 200
  points:
  - 'Анонс наступного модуля: застосування мовного стилю до ширшого соціального конфлікту'
  - Як 'Микола Джеря' розширює лексичні кордони від родинно-побутових до суспільно-історичних
    тем
