slug: marusya
title: 'Маруся: Ідеал Української Душі'
word_target: 5000
content_outline:
  - section: 'Вступ — Твір, що емансипував українську мову: Історія'
    words: 400
    points:
      - Написання повісті у 1832 році як свідомий літературний маніфест Квітки-Основ'яненка.
      - 'Спростування імперського міфу: доведення, що українська мова здатна передавати
        високі трагічні почуття, а не лише бурлескний сміх.'
      - Роль твору як першої україномовної сентиментальної повісті.
  - section: 'Вступ — Твір, що емансипував українську мову: Визнання'
    words: 400
    points:
      - Колосальна рецепція твору серед сучасників та розширення аудиторії.
      - 'Шлях до європейського читача: успіх перекладів у Франції (1854 р.) як свідчення
        універсальності.'
      - Статус «Марусі» як культурного «адвоката» бездержавної нації на міжнародній
        арені.
  - section: 'Сюжет і структура повісті: Кохання та фінал'
    words: 500
    points:
      - Розвиток історії кохання Марусі та Василя за канонами сентиментальної трагедії.
      - Соціальні перешкоди (загроза рекрутчини) та тимчасове, ілюзорне вирішення
        конфлікту.
      - Раптова хвороба і смерть героїні як перехід від соціальної драми до екзистенційної
        трагедії.
  - section: 'Сюжет і структура повісті: Роль фатуму'
    words: 400
    points:
      - Концепція невідворотності долі (фатуму) як головного рушія подій.
      - Використання народних віщувань, віщих снів та передчуттів для нагнітання трагічної
        атмосфери.
      - Філософське осмислення смерті як волі Провидіння у селянському світогляді.
  - section: 'Маруся vs Наталка — два полюси: Покора vs боротьба'
    words: 450
    points:
      - Порівняльний аналіз головних героїнь Г. Квітки-Основ'яненка та І. Котляревського.
      - Активна позиція Наталки Полтавки, її готовність боротися за своє щастя і протистояти
        обставинам.
      - Абсолютна пасивність, жертовність та християнська покора Марусі батьківській
        та Божій волі.
  - section: 'Маруся vs Наталка — два полюси: Архетип українки'
    words: 450
    points:
      - Конструювання Квіткою образу ідеальної, морально чистої та набожної української
        дівчини.
      - 'Деколонізаційний аспект: руйнування образу українців як легковажних, комічних
        персонажів.'
      - Вплив архетипу Марусі на подальше формування жіночих образів в українській
        літературі.
  - section: 'Етнографія як мистецтво: Обрядовість'
    words: 500
    points:
      - Документальна точність Квітки у відтворенні українського побуту та традицій.
      - Весільний обряд як демонстрація соціальної гармонії та багатства національної
        культури.
      - Похоронний обряд як глибоко емоційна, катарсична кульмінація повісті.
  - section: 'Етнографія як мистецтво: «Євангеліє від народу»'
    words: 400
    points:
      - 'Сакралізація селянського життя: праця, родина і віра як основи буття (на
        прикладі Наума Дрота).'
      - Синтез народної етики з християнськими догматами.
      - Текст як моральний дороговказ («Євангеліє»), що утверджує святість через страждання.
  - section: 'Мовні засоби катарсису: Емотиви та димінутиви'
    words: 500
    points:
      - 'Лексичний арсенал сентименталізму: використання слів, що викликають співчуття
        та сльози (емотиви).'
      - 'Тотальна присутність пестливих форм (димінутивів: «лебідочко», «рученьки»)
        для створення атмосфери ніжності.'
      - Аналіз впливу цих мовних засобів на психологічне сприйняття тексту читачем.
  - section: 'Мовні засоби катарсису: Риторичні оклики'
    words: 400
    points:
      - 'Експресивний синтаксис: домінування риторичних питань, окликів та звертань.'
      - 'Специфіка фігури оповідача: його емоційне залучення, співчуття та «плач»
        разом із героями.'
      - Стирання емоційної дистанції між автором, персонажем та читацькою аудиторією.
  - section: 'Підсумок — Квітка vs Гоголь: Шлях сльози vs сміху'
    words: 400
    points:
      - 'Світоглядний вибір двох геніїв: україномовний сентименталізм Квітки та російськомовний
        гротеск Гоголя.'
      - 'Гоголівський погляд: містика, комізм і часто зверхній сміх над провінційністю.'
      - 'Квітчин погляд: ствердження високої людської гідності та здатності українського
        селянина до катарсису через трагедію.'
  - section: 'Підсумок — Квітка vs Гоголь: Спадщина'
    words: 350
    points:
      - Значення «Марусі» як наріжного каменю для розвитку української психологічної
        прози.
      - Трансформація сентименталізму і його вплив на реалістичну традицію XIX століття.
      - Остаточне утвердження української мови як інструменту високої класичної літератури.
