slug: teliha-poetry
title: Teliha Poetry
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Формування особистості'
  words: 400
  points:
  - Народження в російськомовному середовищі під Москвою.
  - Переломний момент в еміграції (Чехословаччина) та свідомий вибір української ідентичності
    як виклик імперському шовінізму.
  - Вплив родини та європейського оточення на формування її характеру.
- section: 'Вступ та контекст: Празька школа і вісниківство'
  words: 400
  points:
  - Приналежність до «Празької школи» українських поетів-емігрантів (Є. Маланюк, О.
    Ольжич).
  - Співпраця з журналом «Вісник» та ключовий вплив ідей Дмитра Донцова.
  - Формування ідеології вольового націоналізму як реакції на поразку Визвольних змагань
    1917–1921 років.
- section: 'Аналіз ключових творів: Поезія чину та «Сучасникам»'
  words: 450
  points:
  - Вірш «Сучасникам» як поетичний маніфест дієвого патріотизму.
  - Відкидання пасивного скиглення та засудження духовної слабкості.
  - 'Імператив прямої дії: заклик до суворої праці («Хай буде тільки діло»).'
- section: 'Аналіз ключових творів: Життєствердний мотив («Радість»)'
  words: 450
  points:
  - Аналіз вірша «Радість» як яскравого прояву філософії героїчного віталізму.
  - Здатність авторки знаходити оптимізм та внутрішнє світло навіть у трагічних обставинах
    еміграції.
  - Протиставлення життя і смерті через призму активної боротьби та повноцінного проживання
    миті.
- section: 'Аналіз ключових творів: Публіцистика як продовження поезії'
  words: 300
  points:
  - Стаття «Партизанщина в українській літературі» як програмний літературно-критичний
    виступ.
  - 'Вимоги до митця в умовах бездержавності: митець розглядається як воїн духу.'
  - Безкомпромісне протистояння «провінційності» та «малоросійщині» у творчості сучасників.
- section: 'Стилістика та мова автора: Естетика волюнтаризму'
  words: 400
  points:
  - Імперативні інтонації, використання наказового способу дієслів, карбований та
    енергійний ритм поезій.
  - Емоційна напруженість, безкомпромісність та максималізм ліричного героя.
  - Органічне вплетення мілітарної лексики (мечі, криця, вогонь) в поетичну тканину
    текстів.
- section: 'Стилістика та мова автора: Синтез мужності та жіночності'
  words: 400
  points:
  - Новаторське поєднання «жіночої» ніжності та «чоловічої» непохитності (на прикладі
    вірша «Вечірня пісня»).
  - 'Трансформація гендерної ролі: жінка постає не як пасивна жертва, а як рівноправна
    соратниця.'
  - Місія жінки надихати на подвиг, поєднуючи життєвий затишок із готовністю до бою.
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 400
  points:
  - Цілеспрямоване замовчування та фальсифікація імені Олени Теліги радянською пропагандою.
  - Спростування абсурдного міфу про «нацистський колабораціонізм» фактом її розстрілу
    гестапівцями.
  - Викриття російсько-імперського наративу через безкомпромісну орієнтацію авторки
    на самостійну Українську Державу.
- section: 'Деколонізаційна перспектива: Українська суб''єктність'
  words: 400
  points:
  - Повернення українцям втраченого права бути активними творцями, суб'єктами власної
    історії.
  - Відмова від літератури «оплакування» на користь культивування образу сильної,
    вольової нації.
  - Вагоме значення текстів Теліги для подолання постколоніального синдрому та комплексу
    меншовартості.
- section: 'Підсумок та спадщина: Трагедія Бабиного Яру'
  words: 200
  points:
  - Історичне значення повернення в окупований Київ (1941) та активна розбудова підпілля
    і Спілки письменників.
  - Свідомий, жертовний вибір не тікати з Києва перед загрозою неминучого арешту німцями.
  - Розстріл 21 лютого 1942 року у Бабиному Яру разом із чоловіком та побратимами
    з ОУН.
- section: 'Підсумок та спадщина: Символ незламності'
  words: 200
  points:
  - Феномен Олени Теліги як уособлення абсолютного збігу поетичного слова і жертовного
    життєвого чину.
  - Потужний вплив її постаті на покоління шістдесятників-дисидентів та сучасне українське
    суспільство.
  - Нове, гостре звучання та актуальність поезії волюнтаризму в умовах сучасної збройної
    боротьби.
