slug: khiba-revut-voly-style
title: Стилістика соціально-психологічного роману
word_target: 5000
content_outline:
  - section: 'Вступ: Історичні умови появи твору'
    words: 450
    points:
      - 'Реакція імперії на український рух: Валуєвський циркуляр та Емський указ
        як каталізатори написання твору'
      - 'Женева 1880 року: роль Михайла Драгоманова та вільного друку у збереженні
        роману'
      - 'Від нарису до епопеї: ідейний задум Панаса Мирного розкрити причини соціального
        зла'
  - section: 'Культурний контекст: Місце в каноні'
    words: 400
    points:
      - Перехід української літератури від етнографічно-побутової повісті до монументального
        роману
      - Олесь Гончар про Панаса Мирного як 'першого симфоніста української прози'
      - 'Сучасне звучання твору: актуальність проблеми справедливості та вибору засобів
        боротьби'
  - section: 'Сюжет і структура: Джерела та історія написання'
    words: 400
    points:
      - 'Реальний прототип: зустріч із візником та історія розбійника Василя Гнидки
        (''Подоріжжя від Полтави до Гадячого'')'
      - 'Співавторство з Іваном Біликом: розширення часових та просторових меж тексту
        (додавання історії села Піски)'
      - 'Поліфонічна структура: переплетення чотирьох основних сюжетних ліній та історичних
        ретроспекцій'
  - section: 'Сюжет і структура: Розвиток конфлікту'
    words: 500
    points:
      - 'Соціальний вимір: скасування кріпацтва, несправедливий розподіл землі та
        діяльність земства'
      - 'Психологічний вимір: внутрішня боротьба героя між прагненням правди та жагою
        помсти'
      - 'Філософський конфлікт: проблема мети і засобів (чи можна досягти справедливості
        через злочин)'
  - section: 'Ключові образи: Еволюція Чіпки Варениченка'
    words: 550
    points:
      - Від дитячої допитливості та 'правдошукача' до жорстокого розчарування системою
      - Втрата землі як втрата екзистенційної опори та початок моральної деградації
      - 'Трагедія ''пропащої сили'': як потенціал лідера перетворюється на руйнівну
        стихію сліпого месника'
  - section: 'Ключові образи: Система жіночих персонажів'
    words: 400
    points:
      - 'Мотря: архетип матері-страдниці, яка робить найважчий моральний вибір (здає
        сина владі)'
      - 'Галя (''польова царівна''): голос совісті, любов якої не здатна зупинити
        саморуйнування героя'
      - Контраст жіночих доль (Христя, Явдоха) як віддзеркалення соціальних умов патріархального
        та імперського суспільства
  - section: 'Герменевтика: Символіка та міфологічні підтексти'
    words: 400
    points:
      - 'Семантика назви: біблійний алюзійний підтекст (Книга Йова) як виправдання
        соціального бунту'
      - 'Міфологема землі: земля не лише як економічний ресурс, а як містична основа
        буття'
      - Село Піски як мікрокосм України, що проходить шлях від козацької волі до кріпацької
        неволі
  - section: 'Поетика: Стилістичні інновації співавторів'
    words: 450
    points:
      - 'Майстерність психологічного аналізу: введення внутрішнього монологу та саморефлексії
        персонажів'
      - 'Психологічний паралелізм: пейзаж як засіб розкриття внутрішнього стану героя
        (нічні сцени, буря)'
      - 'Симфонізм композиції: використання монтажу, сповільнення темпу (ретардація)
        для глибокого аналізу'
  - section: 'Мова і стиль: Народне мовлення та ритміка'
    words: 450
    points:
      - Органічний синтез живої полтавської говірки з літературно-інтелектуальною
        мовою свого часу
      - Багатство ідіоматики, прислів'їв та приказок як вираження народної філософії
      - 'Ритмізована проза: ліричні відступи та описи природи, що наближають текст
        до поезії в прозі'
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 450
    points:
      - Спростування міфу про 'сумирного малоросійського гречкосія', нав'язаного російською
        культурою
      - 'Генетика опору: козацький архетип (Максим Ґудзь) та пам''ять про вільне минуле
        в колективній підсвідомості'
      - Показ імперії як системи несправедливості (суди, чиновники, москалі), що провокує
        насильство
  - section: 'Деколонізаційний вимір: Агентність героя'
    words: 400
    points:
      - Чіпка Варениченко як суб'єкт, що відмовляється терпіти приниження і кидає
        системі виклик
      - 'Трагічність агентності в колоніальних умовах: бунт стає деструктивним через
        відсутність правових механізмів'
      - Збереження національної гідності через непокору (навіть у спотвореній формі)
  - section: 'Підсумок: Рецепція та світовий контекст'
    words: 300
    points:
      - Паралелі зі світовим реалізмом та натуралізмом (Оноре де Бальзак, Еміль Золя)
      - Вплив роману на розвиток української модерністської прози (М. Коцюбинський,
        В. Стефаник)
      - 'Актуальність роману сьогодні: дослідження анатомії зла та відповідальності
        особистості'
