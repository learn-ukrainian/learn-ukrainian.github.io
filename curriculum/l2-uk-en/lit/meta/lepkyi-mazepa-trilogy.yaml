slug: lepkyi-mazepa-trilogy
title: Lepkyi Mazepa Trilogy
word_target: 4000
content_outline:
- section: 'Вступ: Історичні умови появи епопеї'
  words: 350
  points:
  - Створення циклу в 1920-х роках на еміграції як рефлексія на втрату державності
  - Потреба українського суспільства в героїчному епосі та осмисленні причин історичних
    поразок
- section: 'Культурний контекст: Місце твору в літературному каноні'
  words: 350
  points:
  - 'Масштабність задуму: найбільша історична епопея про мазепинську добу в українській
    літературі'
  - Значення повернення тексту в сучасний літературний дискурс після радянських заборон
- section: 'Аналіз твору: Еволюція багатотомного сюжету'
  words: 400
  points:
  - 'Структурна будова: «Мотря», «Не вбивай», «Батурин», «Полтава», «З-під Полтави
    до Бендер. Крутіж»'
  - Перехід від особистої трагедії (кохання до Мотрі) до загальнонаціональної катастрофи
- section: 'Аналіз твору: Джерела та рушійний конфлікт'
  words: 350
  points:
  - Опертя Богдана Лепкого на історіографію (М. Костомаров) та народні перекази
  - Цивілізаційний конфлікт між українським європейським бароко та російським деспотизмом
- section: 'Герменевтика: Детальний розбір символіки та архетипів'
  words: 350
  points:
  - Символічний простір Батурина як українського Едему, центру культури і просвітництва
  - Архетип пожежі та руїни як втілення жорстокості імперської машини
- section: 'Герменевтика: Система персонажів та їхня еволюція'
  words: 400
  points:
  - 'Багатовимірність Івана Мазепи: від закоханого чоловіка до далекоглядного європейського
    політика'
  - Трагедія Мотрі та Василь Кочубей як уособлення фатальної внутрішньої розбрату
  - Петро І як полюс абсолютної влади, позбавленої моральних перепон («варвар»)
- section: 'Мова та стиль: Стилістичні інновації автора'
  words: 350
  points:
  - Поєднання неоромантичного пафосу з реалістичною, подекуди натуралістичною деталізацією
  - Психологізація історичних постатей, використання внутрішніх монологів
- section: 'Мова та поетика: Народна мова та синтаксис'
  words: 350
  points:
  - Майстерна стилізація під мову та ритміку козацьких літописів
  - Використання архаїзмів, історизмів та фольклорних елементів для створення колориту
    епохи
- section: 'Деколонізаційний вимір: Руйнування імперського міфу'
  words: 400
  points:
  - Літературна деконструкція імперського наративу про «Мазепу-зрадника»
  - Спростування міфології пушкінської «Полтави» та утвердження українського погляду
    на події 1708-1709 років
- section: 'Деколонізаційний вимір: Агентність українського героя'
  words: 400
  points:
  - Мазепа як суб'єкт історії, чий «найвищий закон – добро вітчини»
  - Усвідомлений вибір союзу зі Швецією як спроба зберегти державну автономію
- section: Підсумок та рецепція
  words: 300
  points:
  - Винятковий вплив епопеї на збереження національної ідентичності в діаспорі
  - Актуальність твору Лепкого сьогодні як інструменту боротьби з історичною амнезією
