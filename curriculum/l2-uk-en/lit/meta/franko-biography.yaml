slug: franko-biography
title: 'Іван Франко: Титан праці'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Історичні умови та канон'
    words: 350
    points:
      - Формування Франка в умовах роздрібненої Галичини та Австро-Угорської імперії
        кінця XIX ст.
      - Статус Франка як 'другого після Шевченка' фундатора національного літературного
        канону.
      - Свідомий вибір української ідентичності.
  - section: 'Вступ та культурний контекст: II — Актуальність тексту сьогодні'
    words: 350
    points:
      - Проблема національної ідентичності без 'офіціальних кордонів' у сучасному
        контексті.
      - Значення спадщини Франка для сучасного державотворення та протистояння імперіалізму.
  - section: 'Біографія та творчий шлях: I — Ключові етапи та джерела'
    words: 500
    points:
      - Шлях від ковальської сім'ї в Нагуєвичах до навчання у Віденському університеті
        (1892–1893).
      - Перші арешти (1877, 1880) та їхній вплив на творчість ('На дні').
      - Вплив європейської філософії на формування світогляду митця.
  - section: 'Біографія та творчий шлях: II — Конфлікт як рушійна сила'
    words: 450
    points:
      - Еволюція від соціалістичних захоплень молодості до ідеолога українського націоналізму.
      - Співзаснування Русько-української радикальної партії (1890).
      - Конфлікт із галицьким провінціалізмом та консервативним середовищем.
  - section: 'Герменевтика та ключові образи: I — Символіка Каменяра'
    words: 500
    points:
      - Аналіз поеми 'Каменярі' (1878) та її глибокої алегорії.
      - Образ добровільної самопожертви заради прокладання шляху до національного
        поступу.
      - Відділення автентичного філософського сенсу твору від радянської інтерпретації.
  - section: 'Герменевтика та ключові образи: II — Архетип Мойсея'
    words: 500
    points:
      - Розбір прологу до поеми 'Мойсей' (1905) як звернення до 'замученого' народу.
      - Еволюція героя від гірких сумнівів до непохитної віри в 'день воскресний твойого
        повстання'.
      - Міфологічні та біблійні підтексти у творенні національного пророка.
  - section: 'Мова, стиль та поетика: I — Синтез традиції та модернізму'
    words: 500
    points:
      - Збагачення української літературної мови інтелектуальною лексикою та неофлогізмами.
      - Перехід від народницької традиції до складних європейських модерністських
        форм.
      - Франко як перекладач і транслятор європейського дискурсу в Україну.
  - section: 'Мова, стиль та поетика: II — Ритміка та синтаксис'
    words: 450
    points:
      - 'Поліфонія стилів: різкий контраст гострої публіцистики та інтимної лірики
        збірки ''Зів''яле листя''.'
      - Динаміка, маршовий ритм та експресія франкового поетичного синтаксису.
      - Новаторство в римуванні та строфіці.
  - section: 'Деколонізаційний вимір: I — Руйнування імперського міфу'
    words: 500
    points:
      - Спростування радянського пропагандистського міфу про Франка як про 'борця
        з капіталізмом'.
      - Викриття маніпуляцій з текстами та замовчування його ключових націоналістичних
        праць у часи СРСР.
      - Повернення справжнього 'Титана праці'.
  - section: 'Деколонізаційний вимір: II — Агентність та опір'
    words: 450
    points:
      - Формулювання ідеї соборної України в 'Одвертому листі до галицької української
        молодежі' (1905).
      - Культурне самоствердження та опір полонізації і русифікації.
      - Відмова бути 'гноєм у сусідів' — концепція проактивної нації.
  - section: 'Підсумок та рецепція: I — Вплив на покоління та світовий контекст'
    words: 300
    points:
      - Роль Франка у формуванні свідомих поколінь, зокрема Українських січових стрільців.
      - Вплив на письменників 'Молодої Музи'.
      - Франко як голос України в німецькомовному та польськомовному науково-культурному
        просторі.
  - section: 'Підсумок та рецепція: II — Питання для дискусії'
    words: 200
    points:
      - Як читати та розуміти Франка сьогодні, знімаючи з нього 'бронзу' монументальності?
      - Які ідеї 'Титана праці' залишаються невиконаним заповітом для сучасної України?
