slug: khvylovy-i-am-romance
title: 'Микола Хвильовий: «Я (Романтика)»'
word_target: 5000
content_outline:
  - section: 'Вступ: Історичні умови появи твору'
    words: 350
    points:
      - 'Історичне тло 1920-х років: перехід від революційного романтизму до усвідомлення
        терору'
      - 'Біографічний контекст Миколи Хвильового: фронтовий досвід та криза ідеалізму'
  - section: 'Вступ: Місце в каноні та актуальність'
    words: 450
    points:
      - Значення «Я (Романтика)» для розвитку українського експресіонізму та психологічної
        прози
      - 'Актуальність проблематики: сліпий фанатизм проти загальнолюдських цінностей
        у сучасному вимірі'
  - section: 'Сюжет та структура: Динаміка конфлікту'
    words: 450
    points:
      - Внутрішній конфлікт «Я» (чекіст-кат проти люблячого сина) як головний рушій
        оповіді
      - Фрагментарність сюжетної лінії, що віддзеркалює стан афекту та розколоту свідомість
        героя
  - section: 'Сюжет та структура: Джерела та літературні впливи'
    words: 350
    points:
      - 'Присвята твору Коцюбинському («Цвіт яблуні»): мотив споглядання власних страждань
        роздвоєним «Я»'
      - Засвоєння європейських модерністських практик у побудові композиції новели
  - section: 'Герменевтика: Розбір символіки'
    words: 450
    points:
      - Утопічний концепт «загірної комуни» як міраж і фатальна самоомана революціонерів
      - 'Символіка кольористики: чорний (трибунал, дегенерат) та м''ятно-перламутровий
        (спогади, мати)'
  - section: 'Герменевтика: Еволюція системи персонажів'
    words: 500
    points:
      - 'Доктор Тагабат: уособлення холодного садизму, цинічного розуму та інстинкту
        знищення'
      - 'Дегенерат: кримінальне, тваринне начало більшовицької системи, позбавлене
        моралі'
      - 'Андрюша: уособлення пасивного гуманізму, безвольної слабкості, що зрештою
        підкоряється злу'
  - section: 'Герменевтика: Архетипи та міфологічні підтексти'
    words: 450
    points:
      - 'Образ Матері як Марії-Богородиці: архетип вічної любові, добра та самої України'
      - 'Біблійні алюзії: мавовбивство як акт найвищого гріхопадіння та остаточного
        зречення людської подоби'
  - section: 'Мова, стиль та поетика: Стилістичні інновації'
    words: 450
    points:
      - 'Стиль орнаменталізму: синтез імпресіоністичних пейзажів та жорсткої експресіоністичної
        психології'
      - Особливості музичності тексту, використання лейтмотивів для посилення емоційної
        напруги
  - section: 'Мова, стиль та поетика: Ритміка та синтаксис'
    words: 350
    points:
      - Використання обірваного синтаксису (недомовки, паузи, тире) для передачі крайнього
        афекту
      - Ліричні відступи та рефрени як спосіб організації тексту на межі поезії та
        прози
  - section: 'Деколонізаційний вимір: Деконструкція імперського міфу'
    words: 450
    points:
      - Розвінчання більшовицького наративу про виправданість терору заради «світлої
        мети»
      - Викриття інституту Чека не як інструменту справедливості, а як машини абсолютного
        садизму
  - section: 'Деколонізаційний вимір: Агентність українського героя'
    words: 450
    points:
      - Трагедія українського інтелектуала, звабленого універсальною ілюзією, яка
        нищить його національну ідентичність
      - Переосмислення новели через призму ідеологічного гасла Хвильового «Геть від
        Москви!»
  - section: 'Підсумок та рецепція: Спадщина та дискусія'
    words: 350
    points:
      - Вплив ідей Хвильового на український дисидентський рух та покоління шістдесятників
      - 'Світовий контекст: паралелі новели з європейським екзистенціалізмом (Камю,
        Сартр) та питання для дискусії'
