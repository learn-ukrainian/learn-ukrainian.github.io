  - Адаптація до цивільного життя та ПТСР у сюжетобудуванні
- section: 'Герменевтика: I — Система персонажів та деромантизація'
  words: 450
  points:
  - 'Дегероїзація: відмова від пафосу на користь гіперреалізму (фізіологія війни)'
  - Еволюція 'маленької людини', що стала на захист країни
  - Роль жінки у війні (військовослужбовиці, волонтерки, медикині)
- section: 'Герменевтика: II — Символіка та міфологічні підтексти'
  words: 350
