- section: 'Деколонізація: I — Руйнування імперського міфу'
  words: 450
  points:
  - Остаточний розрив із російським концептом 'великої вітчизняної' літератури
  - Спростування міфів про 'братні народи' та 'громадянську війну'
  - Чітка артикуляція російської агресії та колоніальної природи конфлікту
