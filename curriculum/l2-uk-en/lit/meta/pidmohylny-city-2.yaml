slug: pidmohylny-city-2
title: Pidmohylny City 2
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови'
    words: 400
    points:
      - Українізація 1920-х років та масова міграція молоді до великих міст.
      - Життєвий та творчий шлях Валер'яна Підмогильного як представника Розстріляного
        відродження.
      - Історичне тло написання роману та атмосфера пореволюційного Києва.
  - section: 'Вступ та культурний контекст: Місце в каноні'
    words: 400
    points:
      - Статус першого українського урбаністичного роману та розрив із народницькою
        традицією.
      - 'Європейський масштаб твору: спорідненість з модерністською психологічною
        прозою.'
      - Актуальність тексту для сучасного читача (проблеми успіху, самотності, адаптації).
  - section: 'Аналіз твору: Сюжет та еволюція героя'
    words: 450
    points:
      - 'Від приїзду на навчання до тріумфу як відомого письменника: основні віхи
        сюжету.'
      - Трансформація Степана Радченка від наївного ідеаліста-селюка до прагматичного
        і часто цинічного городянина.
      - Процес просторового і соціального підкорення столиці.
  - section: 'Аналіз твору: Конфлікт та європейські впливи'
    words: 450
    points:
      - Паралелі з романами кар'єри Оноре де Бальзака та романом «Любий друг» Гі де
        Мопассана.
      - 'Специфіка українського варіанту: подолання комплексу меншовартості через
        завоювання міста.'
      - Внутрішній та зовнішній конфлікти як рушійні сили фабули.
  - section: 'Герменевтика та ключові образи: Символіка міста'
    words: 450
    points:
      - Місто (Київ) як самостійний, небезпечний і магнетичний персонаж-антагоніст.
      - 'Зміна сприйняття міста героєм: від ворожої стихії («ненавидіти») до простору
        самореалізації («здобути»).'
      - Урбаністичний пейзаж як відображення психологічного стану протагоніста.
  - section: 'Герменевтика та ключові образи: Жіночі персонажі'
    words: 450
    points:
      - 'Жінки як маркери духовного та кар''єрного зростання Степана: Надійка, Тамара
        Василівна (Мусінька), Зоська, Рита.'
      - Утилітарне ставлення Степана до людей та його нездатність до глибокої емпатії.
      - Трагічна лінія Зоськи як кульмінація моральної деградації героя.
  - section: 'Герменевтика та ключові образи: Екзистенційні підтексти'
    words: 450
    points:
      - Аналіз двох епіграфів (про тваринне/ангельське та свободу від тіла) як філософського
        ключа.
      - 'Символіка маргінальності: людина на межі двох світів, яка належить обом і
        жодному повною мірою.'
      - Самотність індивіда серед натовпу та проблема екзистенційного вибору.
  - section: 'Мова, стиль та поетика: Філософський вимір'
    words: 450
    points:
      - 'Екзистенціалізм Підмогильного: випередження європейських філософських трендів.'
      - Взаємодія тілесного (біологічного) та раціонального (інтелектуального) у природі
        людини.
      - Психоаналітична глибина розкриття підсвідомих мотивів персонажів.
  - section: 'Мова, стиль та поетика: Інновації тексту'
    words: 400
    points:
      - Відхід від сентименталізму; холодний, об'єктивний, неореалістичний стиль оповіді.
      - Використання внутрішніх монологів для розкриття рефлексій героя.
      - Динаміка синтаксису, що ритмічно відповідає пульсації міського життя.
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 450
    points:
      - Спростування міфу про виключно «рустикальний» (сільський) характер української
        культури.
      - 'Деконструкція образу Києва як російської провінції: повернення місту українського
        обличчя.'
      - Легітимізація української мови в урбаністичному, модерному, інтелектуальному
        просторі.
  - section: 'Деколонізаційний вимір: Агентність і опір'
    words: 450
    points:
      - Степан Радченко як уособлення нової, вольової української нації (проактивність
        замість пасивної віктимності).
      - Завоювання простору як акт деколоніального самоствердження.
      - Народження українського митця в нових умовах, незалежних від імперського диктату.
  - section: Підсумок та рецепція
    words: 400
    points:
      - Жорстоке знищення автора та його твору радянською тоталітарною машиною.
      - Вплив «Міста» на пізнішу урбаністичну українську прозу (від шістдесятників
        до сучасності).
      - 'Відкриті питання фіналу: ціна успіху та моральна відповідальність митця.'
