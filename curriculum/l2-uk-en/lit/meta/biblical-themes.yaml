slug: biblical-themes
title: 'Біблійні теми: Давидові псалми і "Марія"'
word_target: 4000
content_outline:
- section: 'Вступ: Шевченко і Біблія — Релігійність та антиклерикалізм'
  words: 350
  points:
  - Розвінчання радянського міфу про Шевченка як "атеїста"; глибока особиста релігійність
    поета.
  - Жорстке протиставлення істинної євангельської віри та офіційної російської імперської
    церкви.
  - Читання Псалтиря в дитинстві та Євангелія під час заслання як фундамент світогляду.
- section: 'Вступ: Біблія як джерело високого стилю'
  words: 300
  points:
  - Трансформація української літературної мови від бурлеску до монументального, пророчого
    пафосу.
  - Запозичення біблійних сюжетів і метафор для осмислення національної трагедії.
- section: 'Давидові псалми: Вибір текстів та техніка переспіву'
  words: 400
  points:
  - Історія створення (грудень 1845, В'юнище) та свідомий вибір 10 псалмів із 150.
  - Відмінність переспіву від буквального перекладу: адаптація до української ритміки
      (коломийковий вірш) та ментальності.
  - Вибір псалмів-плачів та псалмів-проклять як відповідь на соціальну несправедливість.
- section: 'Давидові псалми: Політичне прочитання і метафора праведного гніву'
  words: 450
  points:
  - Трансформація старозавітних ворогів Ізраїлю на метафору російських царів та кріпосників.
  - Концепт Бога як месника і справедливого судді ("Воскресни, Боже, суди землю").
  - Використання сакрального тексту для антиімперської мобілізації та формування визвольного
    дискурсу.
- section: 'Церковнослов''янізми: Роль лексики та стилістична функція архаїзмів'
  words: 350
  points:
  - Уведення старослов'янської лексики (благодать, супостат, глагол) у живу мову.
  - Створення ефекту урочистості, епічності та піднесення національної теми до універсального
    масштабу.
- section: 'Церковнослов''янізми: Синтез народної та сакральної мови'
  words: 350
  points:
  - Унікальне злиття розмовного українського синтаксису з книжними формами.
  - Руйнування імперського стереотипу про українську як "мужицьку говірку" шляхом
    доведення її здатності до теологічного регістра.
- section: '«Марія»: Сюжет поеми та деміфологізація канону'
  words: 400
  points:
  - Написання поеми у 1859 році; апокрифічний характер тексту.
  - Деконструкція візантійсько-московського іконописного канону покірної Богородиці.
  - Зображення Марії як живої людини, дівчини-наймички, яка свідомо обирає шлях служіння
    правді.
- section: '«Марія»: Образ Марії як української жінки-матері'
  words: 450
  points:
  - Психологічний вимір трагедії матері-страдниці, що резонує з долею українських
    жінок-кріпачок.
  - Марія як рушійна сила апостольської проповіді: вона гуртує розгублених учнів після
      смерті Христа.
  - Звеличення жіночої самопожертви як найвищого акту духовного опору.
- section: '«Марія»: Критика фарисейства та інституційної церкви'
  words: 350
  points:
  - Різкий напад на книжників і фарисеїв, які перетворили живу віру на формальний
    закон.
  - Алюзії на синодальну російську православну церкву, що обслуговує інтереси самодержавства.
  - Відкидання догматики заради етики любові.
- section: 'Концепція «Святої Правди»: Етика та опозиція правда/закон'
  words: 350
  points:
  - Шевченківське розуміння "Правди" як істинної божественної справедливості на землі.
  - Непримиренний конфлікт між Святою Правдою та несправедливим земним "законом" (кріпосним
    правом, імперським судом).
- section: 'Концепція «Святої Правди»: Місія пророка як голосу Бога'
  words: 300
  points:
  - Прийняття поетом місії старозавітного пророка, який говорить гірку правду тиранам
    і власному народові.
  - Поетичне слово як зброя та акт вищого релігійного служіння нації.
- section: 'Підсумок: Від Біблії до народу та національної літератури'
  words: 350
  points:
  - Створення Шевченком сакрального простору української національної ідеї.
  - Успішна легітимізація біблійного дискурсу в українській літературі (від Лесі Українки
    до шістдесятників).
  - Завершення формування українського літературного канону як європейського, здатного
    оперувати універсальними сенсами.
