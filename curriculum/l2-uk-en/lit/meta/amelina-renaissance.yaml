slug: amelina-renaissance
title: 'Вікторія Амеліна: Нове Відродження'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови'
    words: 450
    points:
      - Формування письменниці на тлі Революції Гідності та початку війни у 2014 році
      - 'Паралелі між 1930-ми та 2020-ми: концепт «Нового Розстріляного Відродження»'
      - 'Роль митця під час екзистенційної загрози: від фікшену до фіксації правди'
  - section: 'Вступ та культурний контекст: Місце в каноні'
    words: 450
    points:
      - Вікторія Амеліна як один із ключових голосів покоління міленіалів
      - Поєднання правозахисної діяльності (Truth Hounds) та літературної роботи
      - Значення заснування Нью-Йоркського літературного фестивалю для українського
        простору
  - section: 'Аналіз твору: Сюжет та структура'
    words: 450
    points:
      - Ключові етапи сюжету роману «Дім для Дома» (2017)
      - Оптика собаки Домініка як інструмент відсторонення (очуження)
      - Структура оповіді про радянське минуле Львова та амнезію поколінь
  - section: 'Аналіз твору: Конфлікт та джерела'
    words: 450
    points:
      - Вплив теорій постпам'яті на творчість авторки
      - Внутрішній конфлікт родини полковника та пригнічена історична пам'ять
      - Переосмислення колоніального досвіду через родинні історії
  - section: 'Герменевтика та ключові образи: Символіка'
    words: 450
    points:
      - Детальний розбір метафори «Дому» як втраченої та віднайденої ідентичності
      - Символіка віднайденого щоденника Володимира Вакуленка (Капитолівка, 2022)
      - Розкопана земля як образ травми і збереженої пам'яті
  - section: 'Герменевтика та ключові образи: Архетипи'
    words: 450
    points:
      - Архетип Свідка у пізніх есеях та віршах авторки
      - Еволюція образу митця від спостерігача до активного учасника опору
      - 'Міфологічний підтекст: пам''ять, що долає смерть («поки читають — живий»)'
  - section: 'Мова, стиль та поетика: Інновації'
    words: 450
    points:
      - 'Стилістичні інновації: синтез ліризму та жорсткого документалізму'
      - Робота з перспективою оповіді та зміна фокалізації
      - Мінімалізм та емоційна густота воєнної есеїстики 2022-2023 років
  - section: 'Мова, стиль та поетика: Ритміка'
    words: 400
    points:
      - Особливості поетичного синтаксису у вірші «Тривога»
      - Рваний ритм, що імітує сирени та стан постійної екзистенційної загрози
      - Експресивність коротких фраз як мова травми
  - section: 'Деколонізаційний вимір: Імперський міф'
    words: 450
    points:
      - Деконструкція міфу про «російський Донбас» (кейс українського Нью-Йорка)
      - Спростування ілюзії про аполітичність літератури
      - Викриття радянської ностальгії та імперського стирання пам'яті
  - section: 'Деколонізаційний вимір: Агентність'
    words: 450
    points:
      - Повернення суб'єктності українському культурному голосу на світовій арені
      - Документування злочинів як форма культурного самоствердження та опору
      - Відновлення тяглості української літературної традиції попри спроби її знищення
  - section: 'Підсумок та рецепція: Світовий контекст'
    words: 400
    points:
      - Вплив есеїстики та виступів Амеліної на міжнародну інтелектуальну спільноту
      - Переклади творів та адвокація України за кордоном
      - Розуміння її загибелі як світової культурної втрати (реакція PEN International)
  - section: 'Підсумок та рецепція: Вплив на покоління'
    words: 300
    points:
      - Формування канону «Нового Відродження» як відповідальності живих перед загиблими
      - Вплив на сучасних авторів та документалістів
      - 'Питання для дискусії: як література працює з колективною травмою війни'
