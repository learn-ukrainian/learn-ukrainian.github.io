slug: black-council-plot
title: 'Чорна рада: Роман'
word_target: 4000
content_outline:
- section: 'Вступ: Історичний контекст та значення роману'
  words: 350
  points:
  - Значення 'Чорної ради' як першого україномовного історичного роману-хроніки
  - Вплив європейської традиції (Вальтер Скотт) на П. Куліша
  - 'Історія створення: 14 років праці, конфіскація рукопису у 1847 році та фінальне
    видання у 1857 році'
- section: 'Сюжет і структура: Історичне тло та фабула'
  words: 350
  points:
  - 'Хронологія: розгортання подій у 1663 році, доба Руїни'
  - 'Дві паралельні лінії: масштабна політична боротьба за булаву та любовна історія
    Петра і Лесі'
  - 'Сюжетна зав''язка: подорож Шрама з сином до Сомка'
- section: 'Сюжет і структура: Композиція та фінал'
  words: 300
  points:
  - 'Роман як ''дорожній'' наратив: просторове охоплення України через мандрівку героїв'
  - 'Кульмінація: Ніжинська Чорна рада як торжество охлократії'
  - Трагічний фінал і його екзистенційне значення для української історії
- section: 'Система персонажів: Іван Шрам та Череваний'
  words: 400
  points:
  - 'Полковник Шрам: ідеал ''старого козарлюги'', консерватор, що прагне сильної влади
    (''одно стадо і один пастир'')'
  - Шрам як уособлення непохитної національної честі та державного обов'язку
  - 'Череваний: контрастний образ прагматика-хуторянина, ідеолог приватного спокою
    та ''тихого життя'''
- section: 'Система персонажів: Яким Сомко'
  words: 350
  points:
  - Сомко як трагічний лицар та політик ранньомодерного типу
  - 'Державницька візія Сомка: прагнення об''єднати Україну (''Зложити до купи обидва
    береги Дніпрові'')'
  - Моральна перемога Сомка через прийняття смерті заради честі
- section: 'Система персонажів: Іван Брюховецький'
  words: 350
  points:
  - Брюховецький як класичний антигерой та руйнівник державності
  - Політичний популізм і соціальна демагогія ('Наш гетьман не пан... а козак!')
  - Використання черні як інструменту для досягнення особистої (та промосковської)
    влади
- section: 'Літературні архетипи: Вальтерскоттівська модель'
  words: 350
  points:
  - Специфіка рецепції моделі Вальтера Скотта на українському ґрунті
  - Петро Шраменко як типовий 'середній герой' — спостерігач епохи
  - Поєднання історичної достовірності (Літопис Самовидця) з художнім вимислом
- section: 'Літературні архетипи: Історія та особистість'
  words: 300
  points:
  - Глобальна історія як фатум, що ламає людські долі (доля Лесі та Петра)
  - 'Кирило Тур: лицарський, романтичний архетип запорожця'
  - Конфлікт індивідуального щастя та національного обов'язку
- section: 'Художні особливості: Мова та стилістика'
  words: 350
  points:
  - 'Мовне новаторство Куліша: архаїзація та використання фольклорних мотивів'
  - Вплив думи та козацького літописання на ритміку прози
  - 'Діалектика: зіткнення живих, динамічних діалогів із філософськими авторськими
    відступами'
- section: 'Художні особливості: Роль пейзажу'
  words: 300
  points:
  - Романтичний пейзаж як засіб психологічної характеристики героїв
  - Образ хутора (Хмарище) як символу українського раю, що протиставляється хаосу
    зовнішнього світу
  - Символізм простору в розгортанні конфлікту
- section: 'Підсумок: Філософія історії Пантелеймона Куліша'
  words: 350
  points:
  - Погляд Куліша на руйнівну силу соціальної ворожнечі
  - 'Критика охлократії: небезпека неконтрольованого натовпу для інституцій держави'
  - 'Елітарна концепція історії: надія на освічену, свідому свого обов''язку старшину'
- section: 'Підсумок: Спадщина роману'
  words: 250
  points:
  - Вплив 'Чорної ради' на подальший розвиток української літератури та мови
  - Перехід від історичної романтики до формування національної політичної свідомості
  - Актуальність роману як перестороги проти внутрішнього розбрату
