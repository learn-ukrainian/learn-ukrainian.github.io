slug: samchuk-maria
title: Samchuk Maria
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Історичне тло створення'
  words: 360
  points:
  - Історичні умови 1932-1933 років та інформаційна блокада СРСР.
  - Реакція Уласа Самчука в еміграції на звістки про Голодомор.
  - Створення роману як першого у світі художнього звинувачення комуністичного режиму
    в геноциді.
- section: 'Вступ та контекст: II — Біографічний вимір автора'
  words: 350
  points:
  - Походження Самчука з волинського села Дермань та глибоке знання селянського життя.
  - Статус Самчука як «літописця» українського простору ХХ століття.
  - Роль особистого досвіду у формуванні автентичного голосу твору.
- section: 'Аналіз ключових творів: I — Композиція та «Книга про народження»'
  words: 360
  points:
  - Підзаголовок «Хроніка одного життя» як ключ до розуміння жанру.
  - Тричастинна структура роману, що нагадує біблійний апокриф.
  - 'Аналіз «Книги про народження»: сирітство Марії та формування її стоїчного характеру.'
- section: 'Аналіз ключових творів: II — «Книга днів» та сільський космос'
  words: 400
  points:
  - Змалювання повнокровного життя українського села до приходу більшовиків.
  - Любовний трикутник Марія — Гнат — Корній як конфлікт світоглядів.
  - 'Трансформація Корнія: відмова від імперського (російського матроського) минулого
    і повернення до землі.'
- section: 'Аналіз ключових творів: III — «Книга про хліб» і Голодомор'
  words: 420
  points:
  - Художнє осмислення процесу насильницької колективізації.
  - Змалювання штучного голоду як інструменту знищення нації.
  - Фізична та моральна деградація героїв; загибель родини Марії як символ національної
    трагедії.
- section: 'Стилістика та мова автора: I — Агіографічний стиль та символізм'
  words: 360
  points:
  - Використання елементів житійної літератури (агіографії) у світському тексті.
  - Сакралізація образу Марії як уособлення України-матері.
  - 'Символіка хліба: від дару Божого і символу життя до зброї масового знищення.'
- section: 'Стилістика та мова автора: II — Психологізм та мовний регістр'
  words: 350
  points:
  - 'Екзистенційний реалізм: сухий, майже фактологічний тон оповіді, що посилює жах
    трагедії.'
  - Мовна індивідуалізація персонажів (народна мова Марії проти русизмів молодого
    Корнія).
  - Відмова від патетики на користь глибокого психологізму.
- section: 'Деколонізаційна перспектива: I — Руйнування імперського міфу'
  words: 350
  points:
  - Спростування радянських міфів про «добровільну колективізацію» та «шкідництво
    куркулів».
  - Викриття справжньої мети розкуркулення — знищення незалежного українського господаря.
  - Показ системи як абсолютно ворожої, антигуманної сили.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність та опір'
  words: 350
  points:
  - Утвердження українця як самодостатнього суб'єкта, невіддільного від своєї землі.
  - Внутрішній опір героїв, які зберігають людяність в нелюдських умовах.
  - Корній як уособлення зрілої національної свідомості, що протистоїть імперії.
- section: 'Підсумок та спадщина: I — Рецепція в еміграції та заборона в СРСР'
  words: 350
  points:
  - Публікація роману 1934 року у Львові та його миттєвий резонанс у вільному світі.
  - Повна заборона імені Самчука та його творів у Радянському Союзі.
  - Збереження пам'яті про Голодомор зусиллями української діаспори.
- section: 'Підсумок та спадщина: II — Сучасне значення твору'
  words: 350
  points:
  - Повернення роману в український культурний та освітній простір після 1991 року.
  - Значення «Марії» як першого літературного пам'ятника жертвам Голодомору.
  - Актуальність твору в контексті сучасної боротьби України за виживання.
