slug: the-artist
title: 'Художник: Шевченко-маляр'
word_target: 4000
content_outline:
- section: 'Вступ: Феномен подвійного таланту'
  words: 300
  points:
  - 'Шевченко як універсальний митець: рівноцінність слова і пензля'
  - Чому малярська спадщина (понад 1200 робіт) перебувала в тіні поетичної
  - Образотворче мистецтво як перше справжнє покликання
- section: 'Вступ: Від кріпака до академії'
  words: 300
  points:
  - 'Ранній хист: наука у дяків-малярів та майстерня Ширяєва у Петербурзі'
  - 'Історія викупу 1838 року: роль мистецтва у здобутті свободи'
  - Злам стереотипу про 'маляра-самоучку'
- section: 'Навчання: Школа Карла Брюллова'
  words: 400
  points:
  - Карл Брюллов як наставник та еталон європейського романтизму
  - Входження Шевченка до петербурзької мистецької богеми
  - Вплив учителя на ранні полотна ('Катерина', 'Циганка-ворожка')
- section: 'Навчання: Академічна техніка та стиль'
  words: 400
  points:
  - 'Опанування академічних стандартів: закони композиції та анатомія'
  - Робота зі світлотінню (chiaroscuro) та колористика
  - Здобуття срібних медалей та звання 'вільного некласного художника' (1845)
- section: 'Мистецтво: Майстерність портрета'
  words: 400
  points:
  - Акварельний та олійний портрет як спосіб заробітку та самовираження
  - Глибокий психологізм (портрети родини Закревських, княгині Кейкуатової)
  - Увага до деталей інтер'єру та одягу як відображення епохи
- section: 'Мистецтво: Психологія автопортрета'
  words: 400
  points:
  - 'Еволюція образу себе: понад 30 автопортретів протягом життя'
  - Від романтичного юнака зі свічкою до втомленого мудреця з бородою
  - Автопортрет як щоденник внутрішнього стану митця
- section: 'Мистецтво: Інновації в офорті'
  words: 450
  points:
  - Звернення до техніки офорту (гравюри на металі) в останні роки життя
  - Серія 'Живописна Україна' як мистецький та національний проєкт
  - 'Європейський рівень майстерності: здобуття звання академіка гравірування (1860)'
- section: 'Заслання: Акварелі казахських степів'
  words: 400
  points:
  - Творчість попри заборону 'писати і малювати'
  - Участь в Аральській та Каратауській експедиціях як штатного художника
  - Майстерність пейзажної акварелі та фіксація безмежного простору
- section: 'Заслання: Візуальна документалістика'
  words: 400
  points:
  - 'Етнографічна цінність: Шевченко як перший візуальний літописець побуту казахів'
  - Гуманістичний, деколонізаційний погляд на інші поневолені імперією народи
  - Жанрові сцени з життя солдатів (серія 'Притча про блудного сина')
- section: 'Повість «Художник»: Автобіографічний вимір'
  words: 350
  points:
  - Написання повісті у 1856 році в Новопетровському укріпленні
  - Реконструкція власної історії викупу та навчання в Академії
  - Роздуми про естетику, етику та місію митця у деспотичному світі
- section: 'Підсумок: Синтез слова і образу'
  words: 350
  points:
  - 'Взаємопроникнення талантів: малярська ''візуальність'' шевченкової поезії'
  - Зміна фокусу від міфологізації до реалізму в обох сферах
  - Шевченко-художник як невід'ємна частина українського культурного канону
