slug: tiutiunnyk-novella-mastery
title: Tiutiunnyk Novella Mastery
word_target: 4000
content_outline:
- section: 'Вступ: Епоха шістдесятників та формування письменника'
  words: 400
  points:
  - 'Травматичний досвід дитинства: розкуркулення, арешт батька (1937), війна, Голодомор.'
  - Формування світогляду в умовах хрущовської 'відлиги' та наступного брежнєвського
    застою.
  - Відмова від соцреалізму та свідомий перехід на українську мову після перших публікацій.
- section: 'Вступ: Місце Григора Тютюнника в літературному каноні'
  words: 400
  points:
  - Спадкоємність традицій психологічної новели (В. Стефаник, Г. Косинка).
  - Тютюнник як творець класичної екзистенційної української новели.
  - Виведення малої прози на рівень світових літературних стандартів (паралелі з Е.
    Хемінгуеєм).
- section: 'Аналіз творчості: Сюжетна архітектоніка та принцип ''айсберга'''
  words: 400
  points:
  - Відмова від зовнішньої подієвості на користь глибокого внутрішнього конфлікту.
  - 'Принцип ''айсберга'' в новелістиці Тютюнника: максимум підтексту при мінімумі
    тексту.'
  - Відкриті фінали, що залишають простір для читацької інтерпретації та катарсису
    (на прикладі збірок 'Зав'язь', 'Деревій').
- section: 'Аналіз творчості: Психологізм та еволюція персонажів'
  words: 450
  points:
  - Фокус на 'маленькій людині', маргіналізованих персонажах (вдови, диваки, сироти).
  - Дослідження механізмів психологічної травми та співчуття.
  - Етична безкомпромісність героїв та відсутність авторського дидактизму.
- section: 'Герменевтика: ''Три зозулі з поклоном'' як вершинний текст'
  words: 500
  points:
  - Автобіографічна основа новели (присвята 'Любові Всевишній', образ репресованого
    батька).
  - Деконструкція трагедії репресій через призму християнського всепрощення.
  - Концепт любові, що долає фізичну розлуку та імперські тюрми ('Сибір неісходиму').
- section: 'Герменевтика: Архетипи та міфологічні підтексти'
  words: 400
  points:
  - 'Символіка назви: фольклорний мотив ''зозулі'', що відганяє тугу (народне замовляння).'
  - Образи Софії та Марфи як архетипи вічної жіночності, терпіння та жертовності.
  - 'Філософія кордоцентризму в текстах Тютюнника: пізнання світу через ''розумне
    серце''.'
- section: 'Мова, стиль та поетика: Майстерність художньої деталі'
  words: 400
  points:
  - Деталь як основний носій психологічного та символічного навантаження.
  - 'Відмова від розлогих описів: передача трагедії життя через одиничний предмет
    чи жест (дешевий костюм, батькова сосна).'
  - Стилістична економія слова та багатозначність пауз у тексті.
- section: 'Мова, стиль та поетика: Автентичність живої мови'
  words: 400
  points:
  - Абсолютний слух письменника на полтавську говірку та народну фразеологію.
  - Уникнення літературних штампів та ідеологічних кліше.
  - Синтаксис живої розмови як засіб індивідуалізації персонажа та досягнення максимальної
    реалістичності.
- section: 'Деколонізаційний вимір: Деконструкція радянського міфу про село'
  words: 400
  points:
  - Протистояння офіційному соцреалістичному наративу про 'щасливе заможне колгоспне
    життя'.
  - Реалістичне зображення злиднів, руйнування традиційного укладу та відчуженості
    селян (наслідки радянської індустріалізації та безпашпортного рабства).
  - Фіксація збереження української ідентичності та людяності в нелюдських умовах
    імперії.
- section: 'Підсумок: Рецепція та вплив на сучасну прозу'
  words: 350
  points:
  - Цензурний тиск, цькування системи та трагічне самогубство (1980) як акт спротиву
    задусі застою.
  - Складний шлях текстів Тютюнника до читача, 'посмертне' визнання в незалежній Україні.
  - Вплив безкомпромісного стилю Тютюнника на сучасну українську літературу, питання
    для дискусії.
