slug: khvylovy-intro
title: Khvylovy (Вступ)
word_target: 4000
content_outline:
- section: 'Вступ: Архітектор Розстріляного відродження'
  words: 400
  points:
  - Історичний та культурний контекст Харкова 1920-х років
  - Хвильовий як центральна постать та ідеолог нового покоління
  - Актуальність спадщини Хвильового в сучасному деколонізаційному дискурсі
- section: 'Біографія: Від романтики революції до екзистенційної драми'
  words: 500
  points:
  - Походження (М. Фітільов) та участь у подіях визвольних змагань
  - Вихід збірки «Сині етюди» (1923) як початок нової ери в прозі
  - 'Еволюція світогляду: усвідомлення антиукраїнської сутності більшовизму'
- section: Літературна дискусія (1925–1928) та феномен ВАПЛІТЕ
  words: 600
  points:
  - Перехід від естетичних суперечок («Європа чи Просвіта») до політичних
  - Створення ВАПЛІТЕ як елітарної альтернативи масовізму
  - Жанр памфлету в арсеналі Хвильового («Камо грядеш?», «Думки проти течії»)
- section: 'Герменевтика: «Я (Романтика)» як вирок системі'
  words: 600
  points:
  - 'Роздвоєння головного героя: фанатик-чекіст проти людини'
  - 'Символіка образів: доктор Тагабат, Андрюша, дегенерат'
  - Образ матері-України (Марії) та неминучість морального краху ідеології терору
- section: 'Прозовий космос: «Санаторійна зона» та «Вальдшнепи»'
  words: 500
  points:
  - Діагностика суспільної кризи та втрати ідеалів у «Санаторійній зоні»
  - 'Роман «Вальдшнепи»: проблема національної повноцінності та комплекс меншовартості'
  - Символіка персонажів як репрезентантів різних суспільних сил
- section: Мова, стиль та романтика вітаїзму
  words: 500
  points:
  - Орнаментальна проза та вплив імпресіонізму (колір, звук, ритм)
  - Фрагментарність композиції та ліризація оповіді
  - 'Стилістичні інновації: ритміка, синтаксис, неологізми'
- section: 'Деколонізаційний вимір: «Геть від Москви!»'
  words: 500
  points:
  - Сутність гасла «Геть від Москви! Даєш Європу!» як культурного орієнтира
  - Поняття «фаустівського духу» європейської культури
  - Концепція «Азіатського ренесансу» та опір імперській асиміляції
- section: 'Підсумок: Постріл, що пролунав у вічність'
  words: 400
  points:
  - Самогубство 13 травня 1933 року як політичний протест проти репресій і Голодомору
  - Заборона творчості в СРСР та повернення в канон
  - Світовий контекст твору та вплив на наступні покоління українських письменників
