slug: translation-as-cultural-weapon
title: Translation As Cultural Weapon
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Переклад як акт націєтворення'
    words: 750
    points:
      - 'Історичні умови в УРСР: переклад як єдина легальна форма європейського діалогу.'
      - 'Функція перекладача в бездержавній нації: від лінгвіста до творця національного
        канону.'
      - Чому український переклад ХХ століття є фундаментальним для сучасної ідентичності.
  - section: 'Аналіз твору: Сюжет та структура історичного опору'
    words: 900
    points:
      - 'Етап 1: «Неокласики» 1920-х, гасло Миколи Зерова «Ad fontes» та орієнтація
        на Європу.'
      - 'Етап 2: Знищення традиції (Розстріляне Відродження, Сандармох).'
      - 'Конфлікт як рушійна сила: зіткнення прямого перекладу з імперською вимогою
        російської мови-посередниці.'
  - section: 'Герменевтика та ключові образи: Постаті перекладачів-дисидентів'
    words: 1000
    points:
      - 'Микола Зеров: архетип інтелектуала-європейця, знищеного системою.'
      - 'Григорій Кочур: образ стоїка, Ірпінська школа як неофіційна Академія після
        ГУЛАГу.'
      - 'Василь Стус: екзистенційний переклад («Елегії» Рільке) як форма духовного
        виживання в таборі.'
  - section: 'Мова, стиль та поетика: Лексичний опір русифікації'
    words: 1000
    points:
      - Радянська політика «зближення мов» та вилучення питомої української лексики
        зі словників.
      - 'Стилістичні інновації Миколи Лукаша: використання діалектизмів, неологізмів
        та архаїзмів для перекладу світової класики («Фауст», «Дон Кіхот»).'
      - Демонстрація семантичної та ритмічної повноводності української мови всупереч
        цензурі.
  - section: 'Деколонізаційний вимір: Депровінціалізація культури'
    words: 900
    points:
      - Руйнування імперського міфу про «російське вікно у світ» та неповноцінність
        української мови.
      - 'Агентність українського перекладача: прямий діалог з Данте, Шекспіром, Гете
        без посередників.'
      - 'Опір асиміляції: переклад як стратегія збереження культурного суверенітету.'
  - section: 'Підсумок та рецепція: Спадщина інтелектуальної війни'
    words: 500
    points:
      - Вплив школи Кочура-Лукаша на сучасне покоління українських письменників і
        перекладачів.
      - Повернення перекладених текстів у свідомість нації після 1991 року.
      - 'Питання для дискусії: роль перекладу в умовах сучасної інформаційної війни.'
