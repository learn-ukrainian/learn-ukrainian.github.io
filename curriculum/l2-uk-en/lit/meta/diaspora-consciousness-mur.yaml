slug: diaspora-consciousness-mur
title: Diaspora Consciousness Mur
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Табори Ді-Пі та створення МУРу'
    words: 750
    points:
      - 'Історичні умови появи МУРу: табори для переміщених осіб (Ді-Пі) у Німеччині
        (1945-1948).'
      - 'Заснування у Фюрті (вересень 1945); ключові постаті: Улас Самчук, Юрій Шерех,
        Іван Багряний, Ігор Костецький, Віктор Петров.'
      - 'Місце в літературному каноні: ренесанс вільної української думки поза радянською
        цензурою.'
  - section: 'Аналіз твору: Сюжет та структура текстів МУРу'
    words: 900
    points:
      - 'Ключові тексти періоду: «Тигролови» І. Багряного, «Доктор Серафікус» В. Домонтовича,
        п''єси І. Костецького.'
      - Конфлікт традиціоналізму (епічність У. Самчука) та модернізму/авангарду (І.
        Костецький, Ю. Косач).
      - 'Сюжетна рушійна сила: досвід вигнанця, травма війни, втеча від тоталітаризму.'
  - section: 'Герменевтика та ключові образи: «Великий стиль» та екзистенціалізм'
    words: 900
    points:
      - Детальний розбір концепції «національно-органічного» або «Великого стилю»
        (Шерех, Самчук).
      - Архетип вигнанця, людини без Батьківщини, що конструює Батьківщину в тексті.
      - 'Екзистенційні підтексти: абсурдність світу, свобода вибору (В. Петров-Домонтович,
        Ю. Косач).'
  - section: 'Мова, стиль та поетика: Естетичні дискусії'
    words: 900
    points:
      - 'Стилістичні інновації: поєднання європейського модернізму з національною
        традицією.'
      - 'Робота з мовою: Юрій Шерех як теоретик мови та стилю; збереження питомого
        синтаксису.'
      - 'Особливості поетики: інтелектуальна проза Домонтовича, необароко, експерименти
        Костецького.'
  - section: 'Деколонізаційний вимір: Незалежність від Москви'
    words: 900
    points:
      - 'Імперський міф, що руйнується: концепт «зради» та нібито провінційності емігрантської
        літератури.'
      - 'Агентність українського героя: перехід від образу жертви до образу борця
        та європейського інтелектуала.'
      - 'Опір асиміляції: творення повноцінної культури в умовах бездержавності як
        акт самоствердження.'
  - section: 'Підсумок та рецепція: Спадщина в діаспорі'
    words: 750
    points:
      - Вплив МУРу на наступні покоління письменників (Нью-Йоркська група, об'єднання
        «Слово»).
      - 'Світовий контекст твору: синхронізація української літератури з європейським
        екзистенціалізмом.'
      - 'Питання для дискусії: чи можлива повноцінна література поза межами національної
        території?'
