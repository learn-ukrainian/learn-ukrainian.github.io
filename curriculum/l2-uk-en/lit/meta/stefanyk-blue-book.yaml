slug: stefanyk-blue-book
title: Stefanyk Blue Book
word_target: 5000
content_outline:
  - section: 'Вступ: Епоха європейського модернізму'
    words: 500
    points:
      - Історичні умови в Галичині кінця XIX століття та злам епох.
      - Вплив європейського експресіонізму на молодого Стефаника.
      - Відхід від народницького побутового реалізму до глибинного психологізму.
  - section: 'Вступ: Місце «Синьої книжечки» в каноні'
    words: 350
    points:
      - Вихід збірки у 1899 році в Чернівцях та феномен миттєвого успіху.
      - 'Шок у літературних колах: нова естетика болю.'
      - Чому цей текст став проривом в українській прозі.
  - section: 'Аналіз тексту: Новелістична структура'
    words: 500
    points:
      - Фрагментарність і стислість як основа композиції твору.
      - Відсутність розгорнутих експозицій, дія in media res.
      - Принцип «вершини айсберга» у текстобудуванні.
  - section: 'Аналіз тексту: Ключові сюжети та конфлікт'
    words: 600
    points:
      - Огляд знакових новел збірки (зокрема «Новина», «Синя книжечка»).
      - 'Екзистенційний конфлікт: людина наодинці з фатумом.'
      - Трансформація суто соціальної трагедії у вселенську драму.
  - section: 'Герменевтика: Деталь як символ'
    words: 500
    points:
      - 'Речовий світ Стефаника: предмети як носії концентрованого болю.'
      - Метафорика кольору (сама «синя книжечка» як символ бюрократичної невідворотності).
      - 'Простір межі: хата, поріг як простори життя і смерті.'
  - section: 'Герменевтика: Трагічні архетипи персонажів'
    words: 500
    points:
      - 'Система персонажів: селянин не як клас, а як екзистенційний герой.'
      - Внутрішня еволюція людини перед обличчям катастрофи.
      - Мовчання як найвища форма вираження емоції.
  - section: 'Поетика: Експресіонізм та мінімалізм'
    words: 550
    points:
      - 'Ритміка болю: короткі, рвані речення.'
      - Експресіоністична деформація дійсності задля створення емоційного ефекту.
      - Авторська відстороненість та цілковита відсутність дидактики.
  - section: 'Мова: Синтаксис та фонетика покутського говору'
    words: 550
    points:
      - 'Робота зі специфічним покутським діалектом: автентичність звучання.'
      - Відмова від «літературного згладжування» мови персонажів.
      - Діалог як ключовий інструмент психологічного розкриття.
  - section: 'Деколонізаційний вимір: Деконструкція імперського міфу'
    words: 500
    points:
      - Спростування радянського міфу про суто «співця селянської недолі».
      - 'Агентність героя: навіть у відчаї селянин зберігає власну онтологічну гідність.'
      - Опір імперській асиміляції через глибоке вкорінення в національний космос.
  - section: 'Підсумок: Світовий контекст та рецепція'
    words: 450
    points:
      - Порівняння поетики Стефаника з європейськими авторами (Кафка, Мунк).
      - Рецепція твору Іваном Франком (цитата про «трагедії душі») та Лесею Українкою.
      - Актуальність екзистенційної прози Стефаника в сучасних реаліях.
