slug: artem-chekh-who-are-you
title: Artem Chekh Who Are You
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Епоха 90-х'
  words: 400
  points:
  - 'Історичні умови появи твору: Україна періоду транзиту та гіперінфляції'
  - Атмосфера 90-х як активний дійовий фактор, що формує персонажів
  - Розпад старих соціальних норм та побутова невлаштованість
- section: 'Вступ та культурний контекст: II — Місце в літературному каноні'
  words: 300
  points:
  - Значення твору для покоління міленіалів та сучасної літератури
  - Чому текст Артема Чеха важливий для розуміння сучасної ідентичності
  - Нагорода «Книга року ВВС» (2021) як свідчення успіху
- section: 'Аналіз твору: Сюжет та структура: I — Автобіографічна основа'
  words: 400
  points:
  - Дорослішання Тимофія (альтер его автора) як основа сюжету
  - Ключові етапи розвитку подій від раннього дитинства до юності
  - 'Впливи та джерела: спогади про життя у Черкасах'
- section: 'Аналіз твору: Сюжет та структура: II — Динаміка конфлікту'
  words: 400
  points:
  - 'Конфлікт як рушійна сила тексту: внутрішній пошук та зовнішнє середовище'
  - 'Конфлікт поколінь: нездатність дорослих захистити дітей'
  - Багатовимірність стосунків між Тимофієм та його оточенням
- section: 'Герменевтика та ключові образи: I — Образ Фелікса та травма Афганістану'
  words: 500
  points:
  - Фелікс як ключовий архетип зламаної людини епохи зламів
  - ПТСР та алкоголізм як наслідок участі у війні в Афганістані
  - 'Амбівалентна роль Фелікса: травматичний вплив та чоловіче наставництво'
- section: 'Герменевтика та ключові образи: II — Еволюція головного героя'
  words: 400
  points:
  - Внутрішній розвиток Тимофія під тиском обставин
  - Пошук власної ідентичності та відповіді на питання «Хто ти такий?»
  - Міфологічні підтексти ініціації та переходу у доросле життя
- section: 'Мова, стиль та поетика: I — Репортажність та документалізм'
  words: 400
  points:
  - 'Стилістичні інновації автора: безоціночність та стриманість'
  - Контраст між сухим викладом та глибоким емоційним болем
  - Особливості синтаксису, що відображають фрагментованість пам'яті
- section: 'Мова, стиль та поетика: II — Деталі побуту та мовний колорит'
  words: 300
  points:
  - Використання народної мови, сленгу 90-х та неохотизмів
  - Матеріальна культура епохи як елемент занурення (музика, відео)
  - Звуки та запахи часу, що створюють кінематографічність тексту
- section: 'Деколонізаційний вимір: I — Деконструкція міфу про «афганців»'
  words: 400
  points:
  - Руйнування імперського міфу про героїчний «інтернаціональний обов'язок»
  - Показ руйнівних наслідків радянського мілітаризму для людської психіки
  - Викриття експлуататорської природи імперії щодо своїх громадян
- section: 'Деколонізаційний вимір: II — Звільнення від радянського минулого'
  words: 300
  points:
  - Опір асиміляції та культурне самоствердження покоління
  - Прощання з «совком» на психологічному та побутовому рівнях
  - Агентність українського героя у формуванні незалежної свідомості
- section: 'Підсумок та рецепція: I — Екранізація «Я і Фелікс»'
  words: 250
  points:
  - Фільм Ірини Цілик як візуальне переосмислення роману
  - Роль Юрія Іздрика у втіленні образу Фелікса на екрані
  - Вплив екранізації на розширення аудиторії твору
- section: 'Підсумок та рецепція: II — Значення для сучасної літератури'
  words: 250
  points:
  - Вплив тексту на наступні покоління письменників та читачів
  - 'Світовий контекст твору: універсальність травми дорослішання'
  - Ключові питання для подальшої дискусії та дослідження
