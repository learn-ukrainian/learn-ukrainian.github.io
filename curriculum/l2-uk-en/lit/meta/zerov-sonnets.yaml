slug: zerov-sonnets
title: Zerov Sonnets
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови'
    words: 450
    points:
      - Літературний ландшафт України 1920-х років та місце групи неокласиків.
      - Формування київського осередку навколо фігури Миколи Зерова.
      - Протистояння масовій 'пролетарській' літературі через утвердження високих
        критеріїв мистецтва.
  - section: 'Вступ та культурний контекст: Канонічність'
    words: 450
    points:
      - Сонети Зерова як еталон українського неокласицизму та їх місце у національному
        каноні.
      - Значення програмного гасла 'Ad Fontes' ('До джерел') для розвитку української
        культури.
      - Актуальність інтелектуальної поезії Зерова для сучасного розуміння українського
        модернізму.
  - section: 'Аналіз твору: Структура та джерела'
    words: 500
    points:
      - Сюжет у сонетах Зерова як рух аналітичної, історичної чи філософської думки
        (на прикладах 'Pro domo' та 'Київ — традиція').
      - Вплив античної літератури (римська поезія) та перекладацького досвіду автора.
      - Орієнтація на естетику французьких парнасців (Леконт де Ліля, Жозе Ередіа)
        як ідеал довершеності.
  - section: 'Аналіз твору: Конфлікт як рушійна сила'
    words: 450
    points:
      - 'Внутрішній конфлікт сонета ''Pro domo'': високе мистецтво проти провінційного
        ''хуторянства'' та ''сентиментальної кваші''.'
      - Естетична та ідеологічна полеміка часів Літературної дискусії (1925–1928).
      - Безкомпромісність ліричного героя у відстоюванні 'строгого контуру' поезії.
  - section: 'Герменевтика та ключові образи: Символіка'
    words: 500
    points:
      - Детальний розбір історіософської символіки у сонеті 'Київ — традиція'.
      - Образ Києва як вічного міста, що інтегроване у великий європейський контекст
        (від готів і норманів до Боплана).
      - Символ 'Плуга' та 'сонячних комун' як переосмислення сучасності через призму
        вічності.
  - section: 'Герменевтика та ключові образи: Міфологічні підтексти'
    words: 450
    points:
      - 'Еволюція ліричного героя: від спостерігача до пророка європейського вектору
        розвитку.'
      - Використання античних архетипів (Пегас) як доказ універсальності української
        мови.
      - Свідоме творення неоміфологічного простору, вільного від радянської ідеологеми.
  - section: 'Мова, стиль та поетика: Стилістичні інновації'
    words: 450
    points:
      - Радикальна відмова від фольклорно-народницького стилю (боротьба зі 'старосвітчиною').
      - Введення до поетичного словника наукової, урбаністичної лексики та європейських
        власних назв.
      - Культивування 'книжної' мови як інструменту інтелектуалізації літератури.
  - section: 'Мова, стиль та поетика: Ритміка та синтаксис'
    words: 500
    points:
      - Суворе дотримання класичної 14-рядкової форми сонета (два катрени, два терцети
        або дистих).
      - Використання ямбу для створення ефекту 'логіки залізної течії'.
      - 'Синтаксичні особливості: афористичність, логічна вивіреність та скульптурність
        фраз.'
  - section: 'Деколонізаційний вимір: Руйнування міфу'
    words: 500
    points:
      - Спростування імперського міфу про українську літературу як вторинну, суто
        селянську та 'провінційну'.
      - Відновлення прямого зв'язку з античною та західноєвропейською спадщиною без
        російського культурного посередництва.
      - Сонет як акт культурного суверенітету та інтелектуальної зрілості нації.
  - section: 'Деколонізаційний вимір: Агентність та опір'
    words: 450
    points:
      - Постать Миколи Зерова як втілення української агентності та непокори радянській
        тоталітарній машині.
      - 'Естетичний опір пролетаризації мистецтва: краса та форма як зброя проти асиміляції.'
      - Трагічна ціна інтелектуального спротиву (Сандармох) як частина національної
        пам'яті.
  - section: Підсумок та рецепція
    words: 400
    points:
      - Довготривала заборона творчості Зерова в СРСР та її повернення в український
        простір.
      - Вплив 'неокласиків' на поетичну культуру шістдесятників і сучасних письменників.
      - Значення спадщини Зерова для інтеграції України у світовий культурний контекст.
