slug: mykhailo-starytsky
title: 'Михайло Старицький: Драматург та мовотворець'
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Епоха заборон та Валуєвський циркуляр'
    words: 350
    points:
      - 'Історичні умови появи твору: Валуєвський циркуляр та Емський указ як інструменти
        етноциду.'
      - Труднощі функціонування українського театру в умовах імперської цензури.
  - section: 'Вступ та культурний контекст: Феномен Театру Корифеїв'
    words: 400
    points:
      - Місце Старицького в літературному каноні та заснування професійного українського
        театру.
      - Фінансова самопожертва (продаж маєтку) заради розвитку національного мистецтва.
      - 'Оцінка Івана Франка: «Він виніс на своїх плечах увесь тягар закладин українського
        театру».'
  - section: 'Аналіз твору: Сюжет та структура: Генеза комедії «За двома зайцями»'
    words: 500
    points:
      - Переробка п'єси І. Нечуя-Левицького «На Кожум'яках» як основа комедії.
      - 'Трансформація статичного тексту у динамічний сценічний шедевр: додавання
        пісень, куплетів та нових сцен.'
  - section: 'Аналіз твору: Сюжет та структура: Конфлікт світів та фальшиві цінності'
    words: 500
    points:
      - 'Зіткнення двох реальностей: традиційного українського міщанства та агресивного
        імперського зросійщення.'
      - 'Конфлікт як рушійна сила: гроші проти щирих почуттів, удаване «благородіє»
        проти людяності.'
  - section: 'Герменевтика та ключові образи: Голохвастов як архетип маргінала-пристосуванця'
    words: 550
    points:
      - Детальний розбір символіки образу Свирида Петровича Голохвастова.
      - Архетип авантюриста та «малороса», який зрікається коріння заради статусу.
      - 'Цитата як ключ до образу: «Як підніметься чоловік своїм умом вище лаврської
        дзвіниці...»'
  - section: 'Герменевтика та ключові образи: Проня Прокопівна та трагедія ідентичності'
    words: 500
    points:
      - Аналіз еволюції персонажа Проні Прокопівни.
      - 'Комічне та трагічне в її образі: щире бажання вирватися з «мужицтва» та комплекс
        меншовартості.'
      - Соціальна психологія родини Сірків (Сєркових) як симптом втрати ідентичності.
  - section: 'Мова, стиль та поетика: Феномен суржику як інструмент сатири'
    words: 400
    points:
      - 'Робота з народною мовою та міщанськими говірками: суржик як маркер культурної
        деградації.'
      - Сміховий ефект гібридної мови, яка оголює порожнечу мислення героїв.
  - section: 'Мова, стиль та поетика: Старицький-мовотворець (неологізми)'
    words: 650
    points:
      - 'Стилістичні інновації автора: подолання «етнографічного» ліміту мови.'
      - 'Творення абстрактної та філософської лексики: слова «мрія», «майбутнє», «байдужість»,
        «завзяття», «темрява», «нестяма».'
      - Свідома розбудова мовного апарату для повноцінної літературної творчості та
        перекладів європейської класики (Шекспір, Андерсен).
  - section: 'Мова, стиль та поетика: Поетична спадщина («Ніч яка місячна»)'
    words: 350
    points:
      - Особливості ритміки та синтаксису на прикладі вірша «Виклик».
      - Трансформація авторської інтимної поезії у народну пісню як вищий ступінь
        визнання.
  - section: 'Деколонізаційний вимір: Деконструкція міфу про «провінційність»'
    words: 400
    points:
      - 'Який імперський міф руйнує текст: розвінчання уявлень, що українська література
        придатна лише для села.'
      - 'Агентність українського героя та опір асиміляції: сатиричне висміювання меншовартості
        як форма культурного самоствердження.'
  - section: 'Підсумок та рецепція: Вплив на розвиток міської культури'
    words: 400
    points:
      - 'Вплив на наступні покоління письменників: підготовка ґрунту для драматургії
        ХХ століття (Микола Куліш, Лесь Курбас).'
      - 'Світовий контекст твору: актуальність проблеми лицемірства та соціальної
        мімікрії.'
      - 'Питання для дискусії: феномен приживання неологізмів Старицького в сучасній
        українській мові.'
