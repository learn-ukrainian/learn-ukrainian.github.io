slug: franko-stolen-happiness
title: '«Украдене щастя»: Соціально-психологічна драма'
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови'
  words: 350
  points:
  - 'Історичні умови появи твору: історія написання для конкурсу Галицького крайового
    виділу у 1893 році.'
  - Соціально-політичний фон Галичини 1870-х років та роль австро-угорської жандармерії.
  - Цензурні втручання та зміна початкової назви «Жандарм».
- section: 'Вступ та культурний контекст: II — Канон і сучасність'
  words: 350
  points:
  - 'Місце в літературному каноні: перехід від етнографічно-побутового театру до європейської
    соціально-психологічної драми.'
  - Універсальність теми злочину, кари та невідворотного фатуму.
  - 'Чому цей текст важливий сьогодні: психологічна глибина та актуальність проблематики
    вибору.'
- section: 'Аналіз твору: Сюжет та структура: I — Джерела і розвиток'
  words: 400
  points:
  - 'Впливи та джерела: роль фольклорного мотиву («Пісня про шандаря») як зерна для
    сюжету.'
  - Ключові етапи розвитку сюжету від позірної ідилії до катастрофи.
  - Експозиція, раптова зав'язка (поява Михайла) та невідворотний рух до кульмінації.
- section: 'Аналіз твору: Сюжет та структура: II — Конфлікт'
  words: 400
  points:
  - 'Конфлікт як рушійна сила: переплетення любовного, соціального та глибоко особистісного
    протистояння.'
  - Структура класичного любовного трикутника, обтяженого соціальною нерівністю.
  - 'Екзистенційний характер конфлікту: неможливість гармонії за умов тотальної суспільної
    несвободи.'
- section: 'Герменевтика та ключові образи: I — Символіка та архетипи'
  words: 400
  points:
  - 'Детальний розбір символіки концепту «вкраденого щастя»: як воно було вкрадено
    в кожного з трьох героїв.'
  - Символи порогу, ночі, темряви та бурі як передвісники трагедії.
  - 'Архетипи та міфологічні підтексти: мотив невідворотної долі (фатуму) в дусі античної
    трагедії.'
- section: 'Герменевтика та ключові образи: II — Еволюція персонажів'
  words: 450
  points:
  - 'Система персонажів: Анна як жертва патріархального примусу та її спроба віднайти
    втрачене.'
  - 'Микола Задорожний: психологічна трансформація від сумирного чоловіка до месника
    у стані афекту.'
  - 'Михайло Гурман: від травмованого війною парубка до цинічного ката, що зловживає
    владою.'
- section: 'Мова, стиль та поетика: I — Мовна стилістика'
  words: 400
  points:
  - 'Стилістичні інновації автора: елементи європейської «нової драми» (вплив Ібсена)
    на українському ґрунті.'
  - 'Робота з народною мовою та діалектизмами: автентичне відтворення бойківського
    говору.'
  - 'Мовна індивідуалізація персонажів: використання канцеляризмів та макаронізмів
    у мові Гурмана.'
- section: 'Мова, стиль та поетика: II — Ритміка і синтаксис'
  words: 350
  points:
  - 'Особливості ритміки та синтаксису: рвана фраза, еліпсиси, напружені діалоги.'
  - Роль пауз і підтексту (мовчання) для передачі емоційного стану героїв.
  - Драматична напруга, закодована на рівні реплік.
- section: 'Деколонізаційний вимір: I — Руйнування імперських міфів'
  words: 450
  points:
  - 'Який імперський міф руйнує цей текст: критика радянського редукціонізму, що звужував
    твір до ''класової боротьби''.'
  - Трагедія як наслідок мілітарної машини імперії, що калічить молодь (доля Михайла).
  - Жандарм як інструмент колоніального примусу в українському селі.
- section: 'Деколонізаційний вимір: II — Культурне самоствердження та Підсумок'
  words: 450
  points:
  - 'Агентність українського героя: бунт Миколи як вибух гідності та опір системі.'
  - Вплив на наступні покоління письменників та театр (Курбас, Юра, Бучма).
  - 'Світовий контекст твору: Франко і європейський модернізм.'
  - 'Питання для дискусії: межі відповідальності особистості.'
