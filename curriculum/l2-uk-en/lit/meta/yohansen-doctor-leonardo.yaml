slug: yohansen-doctor-leonardo
title: Yohansen Doctor Leonardo
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Майк Йогансен і авангард'
    words: 500
    points:
      - Постать Майка Йогансена як універсального творця (письменник, сценарист, лінгвіст).
      - 'Харків 1920-х років: феномен Розстріляного відродження та об''єднання ВАПЛІТЕ.'
      - Відхід від народницької традиції до інтелектуального європейського модернізму.
  - section: 'Вступ та культурний контекст: Місце роману в каноні'
    words: 400
    points:
      - Видання 1928 року як вершина української експериментальної прози.
      - Випередження європейського постмодернізму (метафікція, гра з читачем).
      - Чому текст був заборонений на 60 років і його значення сьогодні.
  - section: 'Аналіз твору: Сюжет та деконструкція жанру'
    words: 600
    points:
      - Пародіювання класичного пригодницького сюжету та подорожнього нарису (травелогу).
      - Історія подорожі доктора Леонардо та Альчести до Слобожанської Швайцарії.
      - 'Відсутність традиційного психологічного конфлікту: сюжет як привід для текстової
        гри.'
  - section: 'Аналіз твору: Метафікція та гра з читачем'
    words: 500
    points:
      - '«Оголення прийому»: автор як режисер, що постійно втручається в текст.'
      - Звернення до читача та руйнування ілюзії художньої дійсності.
      - Роман як інструкція про те, «як пишуться книжки».
  - section: 'Герменевтика та ключові образи: Символіка степу'
    words: 600
    points:
      - Ландшафт як головна і єдина справжня дієва особа твору (заява самого автора).
      - 'Символіка Слобожанщини та степу: дика енергія, життєствердна сила, що поглинає
        раціональних іноземців.'
      - Протиставлення природи (органічності) та штучності літературних персонажів.
  - section: 'Герменевтика та ключові образи: Система персонажів як пародія'
    words: 500
    points:
      - 'Донкіхотство Леонардо та Альчести: навмисна картонність, пласкість образів.'
      - 'Пародіювання екзотики: іспанські імена (Дон Хосе Перейра) в реаліях українського
        села.'
      - Персонажі як «стафаж» (декорація) для розгортання пейзажу.
  - section: 'Мова, стиль та поетика: Кінематографічність тексту'
    words: 500
    points:
      - Вплив роботи в кіно (співпраця з Олександром Довженком) на прозу Йогансена.
      - Техніки словесного монтажу, різка зміна ракурсів та планів (від панорами до
        макро).
      - Візуальна динаміка та ритмізація прозового тексту.
  - section: 'Мова, стиль та поетика: Лексичні експерименти'
    words: 400
    points:
      - 'Мовотворчість: використання неологізмів, авторських новотворів та рідкісної
        лексики.'
      - Пародіювання сухого наукового дискурсу та його змішування з високою поетикою.
      - Орнаменталізм стилю, зосередження на звучанні та фактурі слова.
  - section: 'Деколонізаційний вимір: Привласнення українського простору'
    words: 600
    points:
      - 'Руйнування міфу про «провінційну Малоросію»: інтеграція України у світовий,
        європейський простір.'
      - Слобожанська Швайцарія як самодостатній центр, що є об'єктом інтересу іноземців.
      - Агентність українського пейзажу та тексту, який не потребує посередництва
        російського центру.
  - section: 'Підсумок та рецепція: Забуття і повернення'
    words: 400
    points:
      - Трагічна доля Майка Йогансена (Сандармох, 1937) та вилучення роману з культури.
      - Тріумфальне повернення тексту в 1990-х роках.
      - Вплив роману на сучасних українських письменників (Юрій Андрухович, Сергій
        Жадан) та сучасну критику.
