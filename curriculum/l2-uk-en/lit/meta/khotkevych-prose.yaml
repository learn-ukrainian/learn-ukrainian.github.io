slug: khotkevych-prose
title: 'Гнат Хоткевич: Гуцульська Душа в Камені — Проза між Фольклором і Модернізмом'
word_target: 5000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови'
  words: 400
  points:
  - Історичні умови формування Гната Хоткевича як універсального митця (письменника,
    бандуриста, режисера).
  - Вимушена еміграція до Галичини (1906–1912) та зустріч із гуцульською автентикою
    як переломний момент.
  - Роль Гуцульщини у його творчості як простору свободи, незіпсованого імперським
    диктатом.
- section: 'Вступ та культурний контекст: II — Місце в каноні'
  words: 400
  points:
  - 'Місце Хоткевича в українському літературному каноні: від регіонального етнографізму
    до європейського модернізму.'
  - Подолання імперського стереотипу про 'екзотичність' гуцулів; перетворення їх на
    суб'єктів культури.
  - 'Актуальність його текстів сьогодні: пошук національної ідентичності та збереження
    коду в умовах загрози.'
- section: 'Аналіз твору: Сюжет та структура — I: Етапи сюжету'
  words: 450
  points:
  - Ключові етапи сюжету найвідомішої повісті «Камінна душа» (1911).
  - 'Динаміка розгортання опришківської теми: від зародження індивідуального бунту
    до неминучої трагедії.'
  - Нелінійність та фрагментарність наративу як характерні ознаки модерністської структури
    прози.
- section: 'Аналіз твору: Сюжет та структура — II: Конфлікт і джерела'
  words: 450
  points:
  - 'Фольклорні та історичні джерела тексту: народні пісні, легенди про опришків та
    реальні історичні події.'
  - 'Багатошаровість конфлікту: соціальна несправедливість переплетена з глибоким
    екзистенційним вибором (Дмитро Марусяк).'
  - Вплив європейського неоромантизму на формування архітектоніки твору.
- section: 'Герменевтика та ключові образи: I — Символіка і міф'
  words: 450
  points:
  - 'Детальний розбір символіки: гори як втілення абсолютної волі, камінь як символ
    твердості і невблаганності фатуму.'
  - Архетипи бунтаря і зрадника в контексті української міфологічної та європейської
    традицій.
  - Гуцульщина як сакральний простір, де діють прадавні закони честі та помсти.
- section: 'Герменевтика та ключові образи: II — Система персонажів'
  words: 450
  points:
  - 'Психологічна еволюція головного героя Дмитра Марусяка: від сільського хлопця
    до трагічного лідера опришків.'
  - Попаддя Маруся як складний жіночий образ, що кидає виклик патріархальним стереотипам
    своєю пристрастю.
  - Трагічна приреченість героїв-одинаків, що йдуть проти суспільних норм.
- section: 'Мова, стиль та поетика: I — Гуцульський діалект'
  words: 450
  points:
  - 'Використання гуцульського діалекту: не заради колориту чи ''екзотики'', а як
    єдино можливий автентичний спосіб мислення героїв.'
  - Мовний колорит як найпотужніший засіб психологічної індивідуалізації в тексті.
  - Свідомий ризик автора щодо рецепції діалектного тексту читачами Наддніпрянщини
    заради художньої правди.
- section: 'Мова, стиль та поетика: II — Інновації і ритміка'
  words: 450
  points:
  - 'Стилістичні інновації Хоткевича: поєднання елементів орнаменталізму та експресіонізму.'
  - 'Особливості синтаксису: рваний ритм, висока емоційна напруга, лаконізм у ключових
    сценах.'
  - 'Музикальність прози: синтез досвіду гри на бандурі та словесної ритміки.'
- section: 'Деколонізаційний вимір: I — Руйнування міфу'
  words: 400
  points:
  - Абсолютне руйнування імперських (російського та польського) міфів про 'диких'
    і 'нецивілізованих' горян.
  - Утвердження Гуцульщини як повноцінного, високорозвиненого суб'єкта європейського
    культурного простору.
  - Деконструкція колоніального погляду 'зверху вниз' на регіональну ідентичність.
- section: 'Деколонізаційний вимір: II — Агентність героя'
  words: 400
  points:
  - 'Агентність українського героя: опришок як свідомий борець за справедливість,
    а не маргінальний ''розбійник''.'
  - Опір культурній, політичній та ментальній асиміляції через збройний та духовний
    спротив.
  - Самоствердження української нації через демонстрацію незламної сили духу персонажів.
- section: 'Підсумок та рецепція: I — Вплив на покоління'
  words: 400
  points:
  - Вплив прози Хоткевича на наступні покоління письменників (від шістдесятників до
    сучасної 'химерної' та карпатської прози).
  - Трагічна доля автора (жертва Великого терору) та багатолітня заборона його імені
    й творчості в СРСР.
  - Поступове повернення та переосмислення колосальної спадщини Хоткевича в незалежній
    Україні.
- section: 'Підсумок та рецепція: II — Світовий контекст'
  words: 300
  points:
  - 'Світовий контекст твору: проза Хоткевича на рівні європейського неоромантизму.'
  - Універсальність локального гуцульського сюжету, що розкриває загальнолюдські екзистенційні
    проблеми.
  - 'Дискусійні питання: роль митця-полімата в епоху тоталітаризму та ціна збереження
    національного коду.'
