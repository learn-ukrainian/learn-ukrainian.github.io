slug: khotkevych-prose
title: "Гнат Хоткевич: Гуцульська Душа в Камені — Проза між Фольклором і Модернізмом"
word_target: 5000
content_outline:
- section: 'Вступ: I — Гуцульщина як особливий культурний простір'
  words: 500
  points:
  - 'Гнат Хоткевич (1877–1938): письменник, режисер, бандурист, етнограф в єдиній особі — митець без кордонів між жанрами і дисциплінами.'
  - Гуцульщина у літературній уяві XIX–XX ст. — від романтичного екзотизму до автентичного голосу самих горян.
  - 'Хоткевич серед Коцюбинського і Стефаника: різні кути погляду на Карпатський простір — хто пише зсередини, а хто ззовні?'
- section: 'Вступ: II — Театр, музика і проза: єдина творча місія'
  words: 500
  points:
  - 'Перший гуцульський театр (1910): Хоткевич як культурний організатор — театр не як розвага, а як форма самопізнання народу.'
  - 'Бандуристична спадщина: що бандура як інструмент означала у його художньому світосприйнятті і в культурній програмі.'
  - 'Арешт 1938 року: письменник-поліглот і мультидисциплінарний митець знищений на піку творчості — що саме загинуло разом з ним.'
- section: 'Аналіз: «Камінна душа» — Гуцульщина без ідилії'
  words: 700
  points:
  - '«Камінна душа» (1911) як антиідилія: важке гірське існування без романтизації — краса і жорстокість в єдності.'
  - 'Психологія героїв: воля, мовчання, тілесна сила як мова гуцульської культури — що ховається за зовнішньою суворістю.'
  - 'Природа як суб''єкт, а не тло: Карпати як жива сила, що формує людей, а не лише їхню «мальовничу» рамку.'
- section: 'Аналіз: Оповідання і новели — діапазон тем і техніки'
  words: 700
  points:
  - '"Гуцульські образки": короткі прозові замальовки між новелою і нарисом — жанровий гібрид як форма точності.'
  - 'Соціальні теми: бідність, сезонна праця, стосунки з «панами» — Хоткевич як соціальний письменник без класових штампів.'
  - '«Авірон»: біблійна тема в гуцульському антуражі — синтез сакрального і народного без штучності.'
- section: 'Мова і стиль: Діалект як художня програма'
  words: 600
  points:
  - 'Гуцульські діалектизми у тексті: рецептивна проблема і художнє рішення — яку ціну платить читач і яку платить автор.'
  - 'Усна оповідна традиція: від баяна до оповідача — що Хоткевич запозичує і що трансформує у письмову прозу.'
  - '"Мова для всіх" проти "автентичного голосу": стара дилема регіонального письма у новому контексті.'
- section: 'Театральна і музична спадщина: Митець-поліглот'
  words: 500
  points:
  - 'Гуцульські сцени: театр як живий етнографічний документ і одночасно — естетична подія, а не лише «зберігання традиції».'
  - 'Наукові праці про бандуру: музикознавство як частина єдиного культурного проекту повноцінної гуцульської ідентичності.'
  - 'Хоткевич і «Молодий театр» Курбаса: передвісник авангарду, що прийшов після нього.'
- section: 'Деколонізаційна перспектива: Регіональна ідентичність проти єдиного наративу'
  words: 500
  points:
  - '«Гуцульщина» як суверенний культурний простір — не «екзотика» для столичного погляду, а окремий центр з власними законами.'
  - 'Австро-угорська Галичина проти Наддніпрянської України: Хоткевич між двома культурними полюсами і двома державними системами.'
  - 'Репресії 1938 р. і знищення регіональних культур у СРСР: не просто «інтелігент», а носій небезпечно іншої ідентичності.'
- section: 'Підсумок: Хоткевич у сучасному прочитанні'
  words: 500
  points:
  - Вплив на сучасну карпатську прозу — Тарас Прохасько і нове гуцульське письмо як продовження традиції Хоткевича.
  - Хоткевич як предтеча «химерної прози» — поєднання реального і містичного без безпосередньої художньої дидактики.
  - 'Питання до читача: чи регіональна специфіка збагачує або обмежує прозу — і де проходить межа між «регіональним» і «національним»?'
