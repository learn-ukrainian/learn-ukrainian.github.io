slug: zhadan-depeche-mode
title: Zhadan Depeche Mode
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: 90-ті як простір транзиту'
  words: 600
  points:
  - 'Історичні умови 1993 року: гіперінфляція, крах радянської індустрії та поява
    нових субкультур.'
  - 'Місце роману (2004) в літературному каноні: дебют, що закріпив статус Сергія
    Жадана як «голосу покоління».'
  - 'Чому текст важливий: фіксація екзистенційного досвіду втраченого покоління на
    руїнах імперії.'
- section: 'Аналіз твору: Сюжет та хронотоп роману'
  words: 700
  points:
  - 'Формат урбаністичного road movie: триденні блукання маргіналів у пошуках Саші
    Карбюратора.'
  - 'Хронотоп постсовєтського Харкова: вокзали, генделики, гуртожитки як ландшафт
    абсурду.'
  - 'Конфлікт як рушійна сила: зіткнення внутрішньої порожнечі героїв із хаотичною
    зовнішньою реальністю.'
- section: 'Герменевтика та ключові образи: Екзистенційна відчуженість'
  words: 700
  points:
  - Система персонажів (Оповідач, Собака, Вася Комуніст) як галерея трикстерів транзитної
    епохи.
  - Музика гурту «Depeche Mode» як метафора втечі, ілюзія зв'язку з вільним Західним
    світом.
  - 'Архетип подорожі без кінцевої мети: пошук друга як привід для саморефлексії та
    втечі від дійсності.'
- section: 'Мова, стиль та поетика: Урбаністична революція'
  words: 800
  points:
  - 'Стилістичні інновації Жадана: ритмізована проза, потік свідомості, вплив естетики
    бітників.'
  - 'Легітимізація маргінального дискурсу: використання міського сленгу, мату та суржику
    як інструментів автентичності.'
  - 'Особливості синтаксису: довгі, динамічні речення, що передають нервовий пульс
    великого міста.'
- section: 'Деколонізаційний вимір: Деконструкція імперського простору'
  words: 600
  points:
  - Руйнування російського міфу про Харків як суто пролетарське, «радянське» місто.
  - 'Агентність антигероя: пасивний опір системі через тотальне відчуження від нав''язаних
    суспільних норм.'
  - 'Культурне самоствердження без пафосу: формування української урбаністичної ідентичності
    знизу, на вулицях.'
- section: 'Підсумок та рецепція: Вплив на покоління'
  words: 600
  points:
  - Культовий статус тексту та його вплив на наступні покоління українських письменників-урбаністів.
  - 'Світовий контекст: успішні переклади та театральні постановки в Європі (особливо
    в Німеччині).'
  - 'Питання для дискусії: чи залишився досвід героїв «Депеш Мод» у 90-х, чи він резонує
    із сучасністю?'
