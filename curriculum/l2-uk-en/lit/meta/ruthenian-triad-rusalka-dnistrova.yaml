slug: ruthenian-triad-rusalka-dnistrova
title: 'Руська трійця та «Русалка Дністровая»: Пробудження Галичини'
word_target: 5000
content_outline:
- section: 'Вступ: Культурний ландшафт Галичини 1830-х'
  words: 500
  points:
  - Політичний та мовний контекст Австрійської імперії.
  - Домінування польської та німецької мов.
  - Латинізація та язичіє як перешкоди для народної мови.
- section: '«Руська трійця»: Портрет гуртка'
  words: 700
  points:
  - Маркіян Шашкевич, Іван Вагилевич, Яків Головацький.
  - Романтичне захоплення фольклором та слов'янською єдністю.
  - Вплив ідей Гердера та чеського/сербського відродження.
- section: '«Русалка Дністровая» (1837): Маніфест і манускрипт'
  words: 700
  points:
  - 'Структура альманаху: народні пісні, оригінальні твори, переклади.'
  - Фонетичний правопис та використання кирилиці (гражданки).
  - Символізм назви та її сприйняття.
- section: 'Реакція та репресії: Чому заборонили книгу?'
  words: 600
  points:
  - Конфіскація тиражу цензурою.
  - Опір греко-католицької ієрархії та польської інтелігенції.
  - Доля авторів після публікації.
- section: 'Літературний аналіз: Твори Шашкевича'
  words: 800
  points:
  - «Веснівка» та інші ліричні твори.
  - Особливості поетики та ритміки.
  - 'Проза: «Олена» як перша спроба романтичної новели.'
- section: 'Синхронізація з Наддніпрянщиною: Два крила відродження'
  words: 600
  points:
  - Паралелі між Шашкевичем і раннім Шевченком.
  - Значення альманаху для соборності української культури.
  - Встановлення літературних зв'язків між сходом і заходом.
- section: 'Деколонізаційна оптика: Вибір мови як політичний акт'
  words: 600
  points:
  - Відмова від польської ідентичності (gente ruthenus, natione polonus).
  - Суб'єктивізація українців Галичини як окремого народу.
  - Протистояння імперській асиміляції.
- section: 'Підсумок: Спадщина «Русалки Дністрової»'
  words: 500
  points:
  - Вплив на наступне покоління галицьких будителів (І. Франко).
  - Місце в каноні українського романтизму.
  - Актуальність ідей гуртка в сучасній Україні.
