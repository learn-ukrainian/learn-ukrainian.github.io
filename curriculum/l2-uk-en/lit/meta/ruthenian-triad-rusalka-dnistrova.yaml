slug: ruthenian-triad-rusalka-dnistrova
title: 'Руська трійця та «Русалка Дністровая»: Пробудження Галичини'
word_target: 5000
content_outline:
- section: 'Вступ: Культурний ландшафт Галичини 1830-х'
  words: 500
  points:
  - 'Галичина у складі Австрійської імперії: домінування польської та німецької мов.'
  - Феномен подвійної ідентичності (gente ruthenus, natione polonus).
  - Специфіка «язичія» як штучної книжної мови, що віддаляла еліту від народу.
- section: Формування «Руської трійці» та її ідеологія
  words: 600
  points:
  - Об'єднання Маркіяна Шашкевича, Івана Вагилевича та Якова Головацького у Львівській
    семінарії (1832).
  - Вплив ідей європейського романтизму (філософія Й.Г. Гердера) на погляди гуртка.
  - Захоплення ідеями панслов'янізму та досвідом чеського й сербського національного
    відродження.
- section: 'Від «Зорі» до «Русалки Дністрової»: Шлях до видання'
  words: 600
  points:
  - Перша невдала спроба опублікувати збірник «Зоря» (1834) та заборона львівською
    цензурою.
  - Рішення Шашкевича та Головацького обійти цензуру через контакти із сербськими
    діячами.
  - Друкування альманаху в Королівській університетській друкарні у місті Буда (1837).
- section: '«Русалка Дністровая» (1837): Структура та зміст'
  words: 500
  points:
  - 'Чотири складові книги: народні пісні, оригінальні поезії, переклади та історичні
    документи.'
  - Символізм назви та значення передмови Шашкевича як маніфесту відродження.
  - 'Запровадження нових для Галичини літературних жанрів: ліричного вірша, романтичної
    балади.'
- section: 'Мовна революція: Правопис та відмова від язичія'
  words: 500
  points:
  - Використання гражданського шрифту замість традиційної кирилиці.
  - Впровадження фонетичного правопису (принцип «пиши як чуєш»).
  - Розрив із консервативною духовною традицією як свідомий крок до модернізації.
- section: 'Реакція та репресії: Доля авторів і тиражу'
  words: 600
  points:
  - Конфіскація 800 примірників накладу львівським цензором Венедиктом Левицьким.
  - Опір та засудження діяльності гуртка з боку вищого греко-католицького духовенства.
  - Поліцейський нагляд за авторами та трагічна доля Маркіяна Шашкевича.
- section: 'Літературний аналіз: Творчість Маркіяна Шашкевича'
  words: 600
  points:
  - Аналіз поезії «Веснівка» як алегорії національного пробудження.
  - Ліризм, використання фольклорних мотивів та новаторство форми.
  - Романтична проза Шашкевича («Олена») як перша спроба створення нової української
    новели.
- section: 'Синхронізація з Наддніпрянщиною: Соборність культури'
  words: 500
  points:
  - Паралелі між діяльністю гуртка в Галичині та появою «Кобзаря» Тараса Шевченка.
  - 'Твердження ідеї соборності: єдиний народ та єдина культура по обидва боки Збруча.'
  - Значення «Русалки Дністрової» як інтелектуального мосту між роз'єднаними частинами
    України.
- section: 'Деколонізаційна оптика: Вибір мови як політичний акт'
  words: 600
  points:
  - Спростування міфу про українську як «неповноцінний діалект».
  - 'Мова як інструмент суб''єктивізації: відмова від польського та російського асиміляційних
    проєктів.'
  - 'Остаточний підсумок: «Русалка Дністровая» як каталізатор політичного становлення
    української нації.'
