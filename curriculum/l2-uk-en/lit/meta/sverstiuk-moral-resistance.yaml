slug: sverstiuk-moral-resistance
title: Sverstiuk Moral Resistance
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: Історичні умови дисидентського руху'
  words: 400
  points:
  - Епоха 'відлиги' та наступний закрут гайок (кінець 1950-х — 1970-ті роки).
  - Поява шістдесятників як реакція на духовну деградацію суспільства та загрозу втрати
    ідентичності.
- section: 'Вступ та культурний контекст: Формування літературного канону опору'
  words: 350
  points:
  - 'Місце Сверстюка в літературному каноні: філософ, есеїст, незаперечний моральний
    авторитет.'
  - 'Чому тексти Сверстюка (''Собор у риштованні'', ''Блудні сини України'') залишаються
    актуальними сьогодні: безкомпромісна боротьба за внутрішню свободу.'
- section: 'Аналіз твору: Сюжет та структура: Есеїстика як форма опору'
  words: 400
  points:
  - 'Ключові етапи творчості Сверстюка: від забороненого самвидаву до національного
    визнання.'
  - 'Сюжетна еволюція філософської думки: від викриття конкретних злочинів (памфлет
    ''З приводу процесу над Погружальським'') до глибоких онтологічних роздумів.'
- section: 'Аналіз твору: Сюжет та структура: Конфлікт між людиною та тоталітаризмом'
  words: 350
  points:
  - 'Впливи та джерела формування світогляду: християнська етика, європейський екзистенціалізм,
    інтелектуальна спадщина Івана Франка та Тараса Шевченка.'
  - Етичний конфлікт між вільною особистістю та аморальною системою як головний рушій
    його есеїстики.
- section: 'Герменевтика та ключові образи: Символіка «Собору»'
  words: 400
  points:
  - Детальний розбір символіки зруйнованого собору (на базі рецензії Сверстюка на
    роман Олеся Гончара).
  - Собор як глибинний архетип духовності, історичної пам'яті, національної гідності
    та моральної вертикалі.
- section: 'Герменевтика та ключові образи: Еволюція образу мученика та підтексти'
  words: 350
  points:
  - Еволюція образу 'дисидента' як новітнього святого або мученика (система постатей
    в його есеїстиці).
  - 'Міфологічні підтексти ''блудних синів'': розгортання біблійної притчі у контексті
    української бездержавності та асиміляції.'
- section: 'Мова, стиль та поетика: Риторика та стилістичні інновації'
  words: 400
  points:
  - 'Стилістичні інновації Сверстюка: блискуче поєднання публіцистичної гостроти,
    полеміки та глибокого філософського ліризму.'
  - Віртуозне використання іронії, сарказму та парадоксу для викриття духовної порожнечі
    радянської бюрократії.
- section: 'Мова, стиль та поетика: Робота з мовою та синтаксисом'
  words: 350
  points:
  - Свідома опора на природну українську мову, відродження репресованих неологізмів
    та архаїзмів на противагу радянській 'новомові'.
  - 'Особливості ритміки та синтаксису: поєднання коротких, рубаних фраз-афоризмів
    зі складними, розлогими філософськими періодами.'
- section: 'Деколонізаційний вимір: Деконструкція імперських міфів'
  words: 400
  points:
  - 'Який імперський міф руйнує есеїстика Сверстюка: безжальне розвінчання міфу про
    ''добровільну русифікацію'' та неповноцінність української культури.'
  - Критика радянського інтернаціоналізму як цинічного інструменту російської імперської
    політики та етноциду.
- section: 'Деколонізаційний вимір: Культурне самоствердження та агентність'
  words: 350
  points:
  - 'Агентність українського героя: свідомий перехід від стану пасивної жертви обставин
    до стану проактивного борця-інтелектуала.'
  - Опір культурній амнезії та послідовна боротьба за національну самосвідомість і
    збереження ідентичності.
- section: 'Підсумок та рецепція: Світовий контекст і вплив'
  words: 450
  points:
  - Беззаперечний вплив постаті та есеїстики Сверстюка на наступні покоління українських
    письменників, громадських діячів та правозахисників.
  - 'Світовий контекст твору: інтелектуальні та моральні паралелі з найвідомішими
    східноєвропейськими дисидентами (Вацлав Гавел, Адам Міхнік).'
  - 'Питання для дискусії: ціна морального вибору, природа людської гідності та неперехідна
    актуальність етичного опору в сучасних реаліях.'
