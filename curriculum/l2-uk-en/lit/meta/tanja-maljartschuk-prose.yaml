slug: tanja-maljartschuk-prose
title: Tanja Maljartschuk Prose
word_target: 4000
content_outline:
- section: 'Вступ: I — Історичні умови та контекст епохи'
  words: 350
  points:
  - Формування покоління двотисячників після буму постмодернізму
  - Перехід української літератури до пошуку нової ідентичності
  - 'Становлення Тані Малярчук: від Івано-Франківська до Відня'
- section: 'Вступ: II — Місце в літературному каноні'
  words: 300
  points:
  - Еволюція від химерної прози до складних історичних наративів
  - Роль двомовності авторки та її позиція як культурного амбасадора
  - Актуальність її текстів у сучасних умовах європейської інтеграції України
- section: 'Аналіз: I — Ключові етапи сюжету «Забуття»'
  words: 350
  points:
  - 'Дволінійна структура роману: історична і сучасна'
  - Життєпис В'ячеслава Липинського як каркас наративу
  - Паралельна історія сучасної героїні та її внутрішні пошуки
- section: 'Аналіз: II — Впливи, джерела та конфлікт'
  words: 300
  points:
  - Елементи магічного реалізму та сурреалізму (на прикладі «Звірослова»)
  - Конфлікт між пам'яттю та суспільною амнезією
  - Документальна база роману та художній домисел
- section: 'Герменевтика: I — Детальний розбір символіки'
  words: 350
  points:
  - Символ «синього кита» як невблаганного часу
  - Хвороба і тілесність як метафори суспільного стану
  - Архетипи тварин та їхнє значення у ранній прозі
- section: 'Герменевтика: II — Система персонажів та архетипи'
  words: 350
  points:
  - Дзеркальне відображення сучасної героїні та Липинського
  - Психологія «маленької людини» у збірках Малярчук
  - Трансформація героїв через акт пригадування
- section: 'Поетика: I — Стилістичні інновації'
  words: 350
  points:
  - Поєднання документалістики та автофікшену
  - Мінімалістична стилізація епохи без надмірної архаїзації
  - Іронічна, відсторонена оптика наратора
- section: 'Поетика: II — Особливості мови та синтаксису'
  words: 300
  points:
  - Ритміка прози та її «німецькомовний» відголосок у пізніх текстах
  - Синтаксичні конструкції як засіб передачі психологічної напруги
  - Робота з фольклорними елементами у міському середовищі
- section: 'Деколонізація: I — Руйнування імперських міфів'
  words: 350
  points:
  - Повернення постаті Липинського у національний пантеон
  - Спростування радянських наративів про український рух 1917-1920-х
  - Література як інструмент боротьби зі стертою пам'яттю
- section: 'Деколонізація: II — Агентність та опір асиміляції'
  words: 350
  points:
  - Утвердження української елітарної думки (консерватизм Липинського)
  - Подолання комплексу меншовартості через персональні історії
  - Глобальний масштаб української трагедії у європейському контексті
- section: 'Підсумок: I — Світовий контекст та рецепція'
  words: 350
  points:
  - Премія Інгеборг Бахман та вихід на європейський рівень
  - Як переклади впливають на сприйняття творчості Малярчук
  - 'Австрійський період: відсторонення чи глибше занурення?'
- section: 'Підсумок: II — Вплив та дискусія'
  words: 300
  points:
  - Місце роману «Забуття» в історії українського біографічного роману
  - Вплив на молодше покоління українських авторів
  - 'Дискусійне питання: межі між пам''яттю індивідуальною та колективною'
