slug: holodomor-in-literature
title: Holodomor In Literature
word_target: 5000
content_outline:
  - section: 'Вступ: Феномен літературного мовчання'
    words: 400
    points:
      - Тоталітарне табу на тему Голодомору в СРСР.
      - Репресії проти української інтелігенції як передумова вимушеного мовчання.
      - Травма поколінь та знищення національної пам'яті.
  - section: 'Культурний контекст: Література діаспори'
    words: 450
    points:
      - 'Місія письменників-емігрантів: задокументувати правду поза межами досяжності
        цензури.'
      - Опір забуттю на тлі байдужості західного світу.
      - Роль діаспори у збереженні фактологічної основи геноциду.
  - section: 'Сюжетна канва: «Марія» Уласа Самчука'
    words: 450
    points:
      - 'Хронологія створення: перший роман про Голодомор (Львів, 1934).'
      - Доля головної героїні Марії як метафора життєвого шляху української нації.
      - Конфлікт традиційного села та руйнівної більшовицької машини.
  - section: 'Структура трагедії: «Жовтий князь» Василя Барки'
    words: 500
    points:
      - 'Історія родини Мирона Катранника: відносна нормальність до тотального знищення.'
      - 'Ключові етапи сюжету: реквізиції, голод, спроби вижити, смерть.'
      - Автобіографічна та документальна основа твору.
  - section: 'Герменевтика: Символіка «Жовтого князя»'
    words: 450
    points:
      - Символ «жовтий князь» як апокаліптичний демон, персоніфікація тоталітарного
        зла.
      - 'Міфологічні та біблійні підтексти: боротьба Світла і Темряви.'
      - Церковна чаша (потир) як символ збереженої духовності та відродження.
  - section: 'Психологізм: Моральний вибір та еволюція'
    words: 450
    points:
      - Дослідження межових станів людської психіки під час голоду.
      - Деградація катів (партійних активістів) та їхнє знелюднення.
      - Духовна еволюція та стійкість головних героїв.
  - section: 'Поетика свідчення: Апокаліптичні мотиви'
    words: 400
    points:
      - Експресіоністична образність у змалюванні смерті.
      - Пейзаж як віддзеркалення катастрофи (мертве, пустельне село).
      - Відтворення апокаліптичного жаху через натуралістичні деталі.
  - section: 'Мова травми: Стилістичні інновації'
    words: 450
    points:
      - Ускладнений синтаксис та неологізми як інструмент передачі болю.
      - Стилістичні експерименти Василя Барки.
      - 'Ритміка тексту: від спокійного епосу до уривчастої мови передсмертного марення.'
  - section: 'Деколонізаційний вимір: Деконструкція міфу'
    words: 400
    points:
      - Спростування радянського міфу про «неврожай».
      - Літературне викриття механізмів штучної конфіскації продовольства.
      - Демаскування злочинної сутності більшовицької системи.
  - section: 'Українська агентність: Опір системі'
    words: 450
    points:
      - 'Подолання віктимності: українці не лише жертви.'
      - Акт непокори Мирона Катранника та його захист родини.
      - Культурне та духовне самоствердження попри фізичне винищення.
  - section: 'Підсумок та рецепція: Повернення в Україну'
    words: 400
    points:
      - Публікація творів про Голодомор в Україні на початку 1990-х.
      - Екранізація Олеся Янчука «Голод-33» та її суспільний резонанс.
      - Включення текстів В. Барки та У. Самчука до національного літературного канону.
  - section: Вплив на сучасну літературу та пам'ять
    words: 400
    points:
      - Вплив на сучасних авторів (С. Талан та ін.).
      - Осмислення українського геноциду у світовому контексті.
      - Література як механізм пропрацювання національної травми та постпам'яті.
