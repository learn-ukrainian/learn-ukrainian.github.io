slug: marko-vovchok-marusya
title: '«Маруся»: Українська легенда в Європі'
word_target: 4000
content_outline:
- section: 'Вступ: Історичні умови появи твору'
  words: 350
  points:
  - Суспільно-політична ситуація 1870-х років та цензурні обмеження (Валуєвський циркуляр).
  - Звернення до історичного минулого (період Руїни) як спосіб говорити про сучасність.
- section: 'Вступ: Місце в каноні та сучасна актуальність'
  words: 300
  points:
  - Статус «Марусі» як одного з перших українських європейських бестселерів.
  - Актуальність образу дівчини-патріотки в умовах сучасних визвольних змагань.
- section: 'Сюжет і структура: Етапи розвитку та конфлікт'
  words: 400
  points:
  - 'Динаміка розгортання сюжету: від мирного життя до жертовного подвигу.'
  - Національно-визвольний конфлікт як головний рушій оповіді.
- section: 'Сюжет і структура: Літературні впливи та джерела'
  words: 300
  points:
  - 'Фольклорні джерела: історичні пісні, думи, перекази.'
  - Взаємодія з європейською романтичною традицією.
- section: 'Образи: Система персонажів та еволюція героїні'
  words: 450
  points:
  - Маруся як втілення самопожертви та національного обов'язку.
  - Аналіз ключових другорядних персонажів (запорожець, батьки).
- section: 'Образи: Міфологічні підтексти та архетипи'
  words: 350
  points:
  - Архетип дитини-героя (puer aeternus) у контексті національної боротьби.
  - Символіка степу, дороги та козацької зброї.
- section: 'Поетика: Фольклорні мотиви та народна мова'
  words: 350
  points:
  - Органічне вплетення українського пісенного мелосу в прозову тканину.
  - Лексичне багатство та відтворення автентичного колориту.
- section: 'Поетика: Стилістичні інновації Марка Вовчка'
  words: 300
  points:
  - Поєднання сентименталізму з реалістичними деталями жорстокої епохи.
  - Ритмізована проза та її емоційний вплив на читача.
- section: 'Деколонізація: Руйнування імперського міфу'
  words: 400
  points:
  - Спростування російського наративу про «одну історію» та меншовартість України.
  - Демонстрація чіткої антиімперської спрямованості твору.
- section: 'Деколонізація: Українська агентність та опір'
  words: 350
  points:
  - Маруся як активний суб'єкт історії, а не пасивна жертва обставин.
  - Збереження власної ідентичності перед лицем загрози знищення.
- section: 'Рецепція: Феномен П.-Ж. Етцеля та європейський успіх'
  words: 400
  points:
  - Роль П.-Ж. Етцеля (Сталя) в адаптації тексту для французької аудиторії (1875-1878).
  - Здобуття премії Монтіона (1879) та статус класики дитячого читання у Франції.
- section: 'Підсумок: Світовий контекст та вплив на літературу'
  words: 350
  points:
  - «Маруся» як міст між українською та європейською літературами.
  - Вплив на формування образу України за кордоном та відкриті питання для аналізу.
