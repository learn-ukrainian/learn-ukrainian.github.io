slug: dziuba-literature
title: Dziuba Literature
word_target: 5000
content_outline:
  - section: Вступ та культурний контекст
    words: 800
    points:
      - Іван Дзюба як ключова фігура покоління шістдесятників та літературний критик.
      - 'Історичні умови 1965 року: перші масові арешти української інтелігенції та
        суспільна реакція.'
      - Значення постаті Дзюби для сучасного розуміння національного опору та інтелектуальної
        деколонізації.
  - section: 'Аналіз твору: Сюжет та структура (I — Історія створення трактату)'
    words: 600
    points:
      - Причини написання трактату «Інтернаціоналізм чи русифікація?» як відповіді
        на арешти 1965 року.
      - Офіційне звернення до партійного керівництва УРСР (Петра Шелеста та Володимира
        Щербицького).
      - Поширення тексту через самвидав, перша публікація за кордоном (Мюнхен, 1968)
        та світовий резонанс.
  - section: 'Аналіз твору: Сюжет та структура (II — Марксистська аргументація як
      зброя)'
    words: 600
    points:
      - Використання легального марксистсько-ленінського дискурсу для критики радянської
        системи (полемічний прийом).
      - 'Структурна побудова праці: перехід від абстрактної теорії до конкретних фактів
        дискримінації.'
      - Конфлікт між задекларованим «інтернаціоналізмом» і реальною політикою радянського
        керівництва.
  - section: Герменевтика та ключові образи (I — Поняття «русифікація» та «інтернаціоналізм»)
    words: 600
    points:
      - Аналіз концепту «інтернаціоналізм» у радянській інтерпретації (використання
        його як ширми для великодержавництва).
      - Доведення факту русифікації як свідомої, планомірної асиміляційної політики.
      - Символічне та екзистенційне значення української мови як головної форми існування
        нації.
  - section: Герменевтика та ключові образи (II — Національне питання і шовінізм)
    words: 600
    points:
      - Розбір архетипу «старшого брата» та викриття російського шовінізму в УРСР.
      - Нерозривний зв'язок між національною несправедливістю та соціальною несправедливістю.
      - Еволюція ідей національного визволення та правозахисного руху у тексті Дзюби.
  - section: Мова, стиль та поетика (I — Публіцистичний дискурс)
    words: 600
    points:
      - 'Стилістичні інновації Дзюби-критика: виняткова ерудованість, гостра аналітичність
        та полемічність.'
      - Синтез строгих академічних аргументів із пристрасним есеїстичним пафосом.
      - 'Особливості синтаксису та риторики: беззаперечна логічна послідовність та
        потужні риторичні фігури.'
  - section: Деколонізаційний вимір
    words: 600
    points:
      - Повне руйнування імперського міфу про добровільне «злиття націй» у Радянському
        Союзі.
      - 'Агентність українського інтелектуала: безпрецедентний виклик імперському
        центру зсередини системи.'
      - 'Деконструкція спадкоємності СРСР від Російської імперії: радянська система
        як нова форма колоніалізму.'
  - section: Підсумок та рецепція
    words: 600
    points:
      - Величезний вплив трактату на формування українського дисидентського руху в
        наступні десятиліття.
      - Переклади праці іноземними мовами та її сприйняття у вільному світі.
      - Актуальність ідей Івана Дзюби сьогодні, особливо в контексті боротьби проти
        російського імперіалізму.
