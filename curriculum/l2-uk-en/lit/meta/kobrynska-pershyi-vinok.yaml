slug: kobrynska-pershyi-vinok
title: 'Наталія Кобринська та «Перший вінок»: Зародження українського фемінізму'
word_target: 5000
content_outline:
- section: 'Вступ: Становище жінки в XIX столітті'
  words: 500
  points:
  - Соціально-економічні реалії Галичини та Наддніпрянщини.
  - Обмеження в освіті та професійній реалізації.
  - 'Жінка в патріархальній моделі: родина та церква.'
- section: 'Наталія Кобринська: Шлях до емансипації'
  words: 600
  points:
  - Біографія та інтелектуальне формування.
  - Вплив європейського жіночого руху (Дж. Стюарт Мілль).
  - Заснування «Товариства руських жінок» у Станіславові (1884).
- section: 'Альманах «Перший вінок» (1887): Концепція та створення'
  words: 700
  points:
  - Ідея об'єднання авторок з обох частин України (Галичини та Наддніпрянщини).
  - Співпраця з Оленою Пчілкою як співредакторкою.
  - Подолання фінансових та цензурних перепон.
- section: Літературний і публіцистичний контент альманаху
  words: 800
  points:
  - 'Проза: «Задля кусника хліба» Кобринської, твори Лесі Українки.'
  - 'Поезія: Дніпрова Чайка, Уляна Кравченко.'
  - 'Публіцистика: статті про жіночу освіту та економічну незалежність.'
- section: 'Аналіз: «Дух часу» Кобринської'
  words: 600
  points:
  - Повість як художня ілюстрація феміністичних ідей.
  - Проблема фінансової залежності жінки від чоловіка/батька.
  - Критика міщанської моралі та «шлюбу з розрахунку».
- section: 'Сприйняття сучасниками: Критика і підтримка'
  words: 600
  points:
  - Реакція консервативного суспільства та клерикальних кіл.
  - Підтримка з боку Івана Франка та Михайла Павлика.
  - Полеміка щодо радикальності вимог.
- section: Деколонізаційний та гендерний вимір
  words: 700
  points:
  - Зв'язок національного визволення з жіночою емансипацією.
  - 'Подолання подвійної маргіналізації: національної та гендерної.'
  - Формування нової моделі української жінки-інтелектуалки.
- section: 'Підсумок: Спадщина «Першого вінка»'
  words: 500
  points:
  - Вплив на наступне покоління письменниць (О. Кобилянська).
  - Значення альманаху як першої інституції українського фемінізму.
  - Перепрочитання Кобринської в сучасній літературознавчій теорії.
