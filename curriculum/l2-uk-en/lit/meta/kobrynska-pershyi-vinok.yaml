slug: kobrynska-pershyi-vinok
title: 'Наталія Кобринська та «Перший вінок»: Зародження українського фемінізму'
word_target: 5000
content_outline:
- section: 'Вступ: Становище жінки в XIX столітті'
  words: 500
  points:
  - 'Соціально-економічні реалії Галичини та Наддніпрянщини: жінка як власність чоловіка,
    тріада «діти, кухня, церква».'
  - 'Обмеження в освіті та професійній реалізації: закритий доступ до університетської
    науки.'
  - 'Жінка в патріархальній моделі: повна фінансова залежність від родини та суспільний
    примус.'
- section: 'Наталія Кобринська: Шлях до емансипації'
  words: 600
  points:
  - 'Біографія та інтелектуальне формування: переїзд до Відня (1882) як каталізатор
    світоглядних змін.'
  - Засвоєння ідей європейського жіночого руху та вплив праць Джона Стюарта Мілля.
  - Заснування «Товариства руських жінок» у Станіславові (1884) — першої феміністичної
    інституції.
- section: 'Альманах «Перший вінок» (1887): Концепція та створення'
  words: 700
  points:
  - 'Ідея об''єднання авторок Галичини та Наддніпрянщини: гасло «В імені нашої національної
    єдности».'
  - Співпраця з Оленою Пчілкою як співредакторкою, авторкою та меценаткою видання.
  - Подолання фінансових перепон, цензури та організаційна співпраця з Іваном Франком.
- section: Літературний і публіцистичний контент альманаху
  words: 800
  points:
  - 'Проза: революційні твори Кобринської («Задля кусника хліба») та ранні тексти
    Лесі Українки.'
  - 'Поезія: ліричні та соціальні виступи Дніпрової Чайки й Уляни Кравченко.'
  - 'Публіцистика: статті-маніфести про право жінок на працю, середню і вищу освіту.'
- section: 'Аналіз: «Дух часу» Кобринської'
  words: 600
  points:
  - Повість як художня ілюстрація феміністичних ідей авторки.
  - Критика фінансової залежності жінки та наслідків вимушеного «шлюбу з розрахунку».
  - Протистояння героїні задушливій міщанській моралі та відстоювання права на вибір.
- section: 'Сприйняття сучасниками: Критика і підтримка'
  words: 600
  points:
  - Ворожа реакція консервативного галицького суспільства та клерикальних кіл на радикальні
    ідеї.
  - 'Підтримка з боку передової інтелігенції: Івана Франка та Михайла Павлика.'
  - Публічна полеміка в тогочасній пресі щодо межі жіночих свобод і прав.
- section: Деколонізаційний та гендерний вимір
  words: 700
  points:
  - Нерозривний зв'язок національного визволення України з жіночою емансипацією.
  - 'Концепція подолання подвійної маргіналізації: колоніального гніту імперій та
    місцевого патріархату.'
  - Формування нової моделі самодостатньої української жінки-інтелектуалки.
- section: 'Підсумок: Спадщина «Першого вінка»'
  words: 500
  points:
  - Вплив видання на наступне покоління українських модерністок, зокрема Ольгу Кобилянську.
  - Значення альманаху як першої успішної інституції українського феміністичного руху.
  - Сучасне перепрочитання Кобринської в літературознавстві без радянських ідеологічних
    штампів.
