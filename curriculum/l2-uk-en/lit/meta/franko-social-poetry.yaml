slug: franko-social-poetry
title: Franko Social Poetry
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови'
    words: 350
    points:
      - 'Галичина кінця XIX ст.: бідність та утиски імперії'
      - Особистий досвід ув'язнення 1877 року як злам у світогляді
      - Потреба суспільства у поезії прямої дії
  - section: 'Вступ та культурний контекст: Місце в каноні'
    words: 350
    points:
      - Значення збірки «З вершин і низин» як «другого Кобзаря»
      - Відмова від сентиментального романтизму
      - Актуальність Франкового інтелектуалізму для сучасності
  - section: 'Аналіз твору: Сюжет та структура (Архітектоніка збірки)'
    words: 400
    points:
      - 'Новаторство композиції: поділ не за хронологією, а за циклами'
      - Пролог «Гімн» як ідейний ключ до всієї книги
      - Логіка розгортання ліричного сюжету від темряви до світла
  - section: 'Аналіз твору: Сюжет та структура (Джерела та конфлікти)'
    words: 400
    points:
      - Вплив європейської соціальної лірики та філософії
      - 'Головний конфлікт: зіткнення вільного духу з суспільною інерцією'
      - Драматизм внутрішньої боротьби ліричного героя
  - section: 'Герменевтика та ключові образи: Символіка «Вічного революціонера»'
    words: 550
    points:
      - 'Аналіз образу: не руйнівник, а творець'
      - Формула «наука, думка, воля» як альтернатива збройному терору
      - Перемога світла над темрявою як невідворотний закон поступу
  - section: 'Герменевтика та ключові образи: Архетип Каменяра'
    words: 400
    points:
      - 'Символіка каменярів: добровільна пожертва заради майбутніх поколінь'
      - Мотив розбивання скелі як подолання суспільного неуцтва
      - 'Колективний портрет інтелігенції: єдність у праці («ми всі в кайдани скуті»)'
  - section: 'Герменевтика та ключові образи: Від соціального до національного'
    words: 400
    points:
      - Еволюція світогляду Франка на прикладі вірша «Не пора»
      - Синтез соціальної справедливості та національної незалежності
      - Відкидання чужих імперських проєктів
  - section: 'Мова, стиль та поетика: Інновації та лексика'
    words: 350
    points:
      - Збагачення української поезії абстрактно-філософською термінологією
      - Відхід від виключно селянсько-етнографічного словника
      - Поєднання публіцистичності та глибокого ліризму
  - section: 'Мова, стиль та поетика: Ритміка та маршовий синтаксис'
    words: 350
    points:
      - Ораторські інтонації та сугестивний вплив
      - Використання хорея для створення енергійного, маршового ритму
      - Роль анафор та риторичних звертань у мобілізації читача
  - section: 'Деколонізаційний вимір: Деконструкція радянського міфу'
    words: 400
    points:
      - Критика радянського привласнення Франка як «пролетарського поета»
      - Справжня природа його соціалізму (етичний, а не економічно-марксистський)
      - Цензурування національних поезій Франка в СРСР
  - section: 'Деколонізаційний вимір: Агентність українського героя'
    words: 400
    points:
      - Українець у Франка не є пасивною жертвою обставин
      - Ствердження політичної нації через активний опір асиміляції
      - Заклик до самостійного будівництва держави
  - section: 'Підсумок та рецепція: Світовий контекст'
    words: 350
    points:
      - Інтеграція української проблеми у загальноєвропейський контекст
      - Паралелі з іншими європейськими літературними відродженнями
      - Франко як мислитель світового рівня
  - section: 'Підсумок та рецепція: Дискусійні питання та вплив'
    words: 300
    points:
      - Вплив соціальної поезії Франка на поетів XX століття (шістдесятники)
      - Актуальність Франкового етичного імперативу в сучасній Україні
      - 'Питання для обговорення: співвідношення мети і засобів у суспільній боротьбі'
