slug: symonenko-truth
title: Symonenko Truth
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Епоха шістдесятників'
    words: 600
    points:
      - Історичні умови хрущовської відлиги та феномен шістдесятництва як етичного
        бунту.
      - Робота Симоненка в партійній пресі («Черкаська правда») і розрив між офіціозом
        та реальністю.
      - Пошук правди як головний естетичний та життєвий імператив покоління.
  - section: 'Вступ та культурний контекст: Місце в літературному каноні'
    words: 600
    points:
      - Статус Василя Симоненка як «витязя молодої української поезії» та пророка
        національного пробудження.
      - Перехід текстів у самвидав і статус народного поета-борця.
      - Актуальність концепту «Симоненкової правди» у сучасній парадигмі прав людини.
  - section: 'Аналіз твору: Сюжет та структура (Тексти і вчинки)'
    words: 850
    points:
      - 'Аналіз центральних поезій правди: «Де зараз ви, кати мого народу?», байки
        «Що правда, то правда».'
      - Щоденник «Окрайці думок» як документальний сюжет фіксації екзистенційної правди.
      - Громадянський вчинок (Биківня) як розгортання літературного конфлікту в реальному
        житті.
  - section: Герменевтика та ключові образи
    words: 750
    points:
      - 'Розбір антропоцентричної символіки: людина-універсум проти бездушного «гвинтика»
        системи («Ти знаєш, що ти — людина?»).'
      - 'Еволюція ліричного героя: від спостерігача до відкритого антагоніста тоталітарного
        зла.'
      - Архетип Батьківщини як єдиної незмінної істини.
  - section: Мова, стиль та поетика
    words: 600
    points:
      - Афористичність та публіцистична гострота поетичного стилю Симоненка.
      - Використання риторичних фігур, інвектив та іронії (особливо в сатиричних творах).
      - Синтез народнопісенної традиції з модерним екзистенційним дискурсом.
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 500
    points:
      - Безкомпромісне викриття радянської та імперської брехні про «щасливе життя».
      - Тема Голодомору, репресій та національного пригнічення у підтекстах поезії.
      - Спростування міфу про лояльність українського селянства (на прикладі образу
        матері-колгоспниці).
  - section: 'Деколонізаційний вимір: Українська агентність'
    words: 500
    points:
      - Ствердження суверенності нації («Народ мій є!»).
      - Опір асиміляційній машині та повернення історичної пам'яті як акт національного
        самоствердження.
      - Подолання комплексу меншовартості через усвідомлення власної гідності.
  - section: Підсумок та рецепція
    words: 600
    points:
      - Вплив безкомпромісної позиції Симоненка на подальше формування правозахисного
        руху в Україні.
      - 'Світовий контекст: Симоненко як голос поневоленої нації у глобальному дисидентському
        дискурсі.'
      - 'Питання для дискусії: ціна правди в тоталітарному суспільстві.'
