slug: kobylianska-tsarivna
title: Kobylianska Tsarivna
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Історичні умови'
    words: 400
    points:
      - Створення німецькомовного концепту «Лореляй» (1888-1893) та перехід до української
        мови
      - Зародження організованого феміністичного руху на Буковині (1894)
      - Модерністський злам у європейській культурі кінця ХІХ століття як тло твору
  - section: 'Вступ та культурний контекст: Місце в каноні'
    words: 400
    points:
      - Відхід від традиційної народницької тематики до європейської урбаністичної
        прози
      - Утвердження психологічного роману в українській літературі
      - Значення «Царівни» для становлення українського фемінізму
  - section: 'Аналіз твору: Ключові етапи сюжету'
    words: 450
    points:
      - Форма щоденника як спосіб викладу сюжетних подій крізь призму внутрішнього
        світу
      - 'Статус сироти та життя в родині дядька: випробування приниженням'
      - Шлях до економічної та інтелектуальної незалежності через працю і творчість
  - section: 'Аналіз твору: Ніцшеанські впливи'
    words: 450
    points:
      - Трактування філософії Фрідріха Ніцше та концепту «надлюдини»
      - Конфлікт між прагненням «нової жінки» та філістерським (міщанським) оточенням
      - 'Етична трансформація ніцшеанства: духовний аристократизм, що зберігає людяність'
  - section: 'Герменевтика та ключові образи: Розбір символіки'
    words: 400
    points:
      - Значення назви «Царівна» як метафори внутрішньої свободи і винятковості
      - Символічне протиставлення буденного (світ міщанства) і піднесеного (світ ідеалів)
      - Роль природи як дзеркала психологічних переживань героїні
  - section: 'Герменевтика та ключові образи: Еволюція героїні'
    words: 500
    points:
      - 'Наталка Верковичівна: від комплексу неповноцінності до усвідомлення власної
        сили'
      - 'Маніфест індивідуалізму: «Мати таку свободу, щоби бути собі ціллю!»'
      - Аналіз взаємин з іншими персонажами (антагоністами) як шлях випробування переконань
  - section: 'Герменевтика та ключові образи: Архетипи'
    words: 400
    points:
      - Руйнування міфологеми жінки-жертви, традиційної для літератури ХІХ століття
      - Формування архетипу жінки-творця (письменниці), яка самостійно пише сценарій
        життя
      - Взаємодія українського контексту з загальноєвропейським образом митця-одинака
  - section: 'Мова, стиль та поетика: Стилістичні інновації'
    words: 450
    points:
      - 'Новаторство Кобилянської: глибокий психологізм та інтроспекція'
      - 'Експресивність синтаксису: імпресіоністична фіксація емоційних станів і настроїв'
      - 'Багатство лексики: введення абстрактних філософських понять в український
        літературний обіг'
  - section: 'Деколонізаційний вимір: Руйнування імперських міфів'
    words: 500
    points:
      - Спростування радянського стереотипу про Кобилянську виключно як авторку повісті
        «Земля»
      - Відмова від народницького шаблону на користь європейського модернізму
      - Доведення спроможності української літератури опрацьовувати найвищі інтелектуальні
        запити епохи
  - section: 'Деколонізаційний вимір: Агентність героїні'
    words: 500
    points:
      - Свідомий вибір суб'єктності замість пасивної ролі в патріархальній імперській
        системі
      - Спротив асиміляції через збереження інтелектуальної свободи
      - Жіночий емансипаційний рух як частина ευропейського культурного самоствердження
        України
  - section: 'Підсумок та рецепція: Світовий контекст'
    words: 450
    points:
      - Висока оцінка психологічної глибини твору Лесею Українкою та Іваном Франком
      - Типологічні сходження української «Царівни» з текстами Шарлотти Бронте та
        Жорж Санд
      - Інтеграція повісті у канон світової жіночої емансипаційної літератури
  - section: 'Підсумок та рецепція: Питання для дискусії'
    words: 250
    points:
      - Як концепт «нова жінка» корелює із сучасним фемінізмом?
      - Чи можливо досягти абсолютного ідеалу («бути собі ціллю») у реальному суспільстві?
      - Як вплив Ніцше проявляється у сучасній популярній культурі в порівнянні з
        Кобилянською?
