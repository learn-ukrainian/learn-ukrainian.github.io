slug: eneida-feast
title: 'Енеїда: Філософія Бенкету (Частина II)'
word_target: 4000
content_outline:
- section: 'Вступ — "Енеїда" як енциклопедія тілесного: Тіло у бурлеску'
  words: 500
  points:
  - 'Бурлескна традиція: сміхове зниження високого античного стилю через акцент на
    матеріальному'
  - 'Тіло як центральний рушій наративу: невідворотні потреби в їжі, питті, сні та
    задоволеннях'
  - Тілесність Котляревського як культурна противага сухій, штучній класицистичній
    нормі імперії
- section: 'Вступ — "Енеїда" як енциклопедія тілесного: Карнавальна культура'
  words: 400
  points:
  - 'Застосування концептуальної оптики Михайла Бахтіна: філософія ''матеріально-тілесного
    низу'''
  - Карнавальний сміх як потужний терапевтичний інструмент подолання історичної травми
    (руйнування Січі)
  - Родючість, вітальність і безсмертя сміхової стихії українського народу
- section: 'Словник Шлунку — гастрономічна лексика: Страви та напої'
  words: 450
  points:
  - Широкий реєстр автентичної української кухні XVIII століття (лемішка, путря, кваша,
    зубці)
  - Демонстрація пишного полтавського барокового достатку замість стереотипного 'бідного'
    селянського столу
  - Документальна та етнографічна цінність гастрономічної енциклопедії 'Енеїди'
- section: 'Словник Шлунку — гастрономічна лексика: Дієслова споживання'
  words: 450
  points:
  - Аналіз невичерпних синонімічних рядів української мови (їсти, лигати, глитати,
    жерти, тріскати)
  - Специфічна лексика пияцтва та бенкетування як яскравий маркер мовної повнокровності
  - Дієслівна енергія як мовний виразник нестримної жаги до фізичного існування
- section: Бенкет у Дідони — аналіз сцени
  words: 500
  points:
  - Блискуча трансформація античного Карфагена в заможний український козацький маєток
  - Прийоми гіперболізації та скрупульозної деталізації кулінарного розмаїття (свиняча
    голова до хріну)
  - Їжа як маркер не лише фізіологічного насичення, а й витонченої гостинності та
    високого соціального статусу
- section: Пекло і Поминки
  words: 500
  points:
  - Драматургійний перехід до опису підземного світу в третій частині поеми
  - 'Поминальний обряд (тризна) за батьком Анхізом: нерозривне злиття вшанування мертвих
    із життєствердним застіллям'
  - Сміхова деконструкція паралізуючого містичного жаху перед смертю
- section: 'Словник Гріха та Покарання: Категорії грішників'
  words: 500
  points:
  - Специфічний народний моральний кодекс як світоглядна основа українського дантового
    пекла
  - 'Чітка категоризація грішників за суспільною шкодою: жорстокі пани, корумповані
    судді, хабарники, шахраї'
  - Реалізація принципу таліона (адекватної відплати) у геніальному комічному вимірі
- section: 'Словник Гріха та Покарання: Сатира на вади'
  words: 400
  points:
  - 'Гостра сатира на соціальну та моральну несправедливість: безжальне покарання
    панів, ''що людям льготи не давали'''
  - Адаптація лексики страждання через бурлескне зниження (жарили, мордували)
  - Аргументоване спростування радянського міфу про виключно класово-антагоністичний
    характер пекла в Котляревського
- section: Підсумок — Смак життя у прямому сенсі
  words: 300
  points:
  - Карнавальний гастрономічний надмір як глибинна філософія національної незнищенності
  - Органічний зв'язок між їжею, тілесною повнотою та непохитним збереженням ідентичності
  - Світоглядний перехід троянців від гедоністичних бенкетів до військової готовності
    (плавний перехід до наступних частин)
