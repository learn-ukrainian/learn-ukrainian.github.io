slug: diaspora-connections
title: Diaspora Connections
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Хвилі еміграції'
    words: 400
    points:
      - Феномен літератури екзилу як наслідок політичних репресій та бездержавності
      - Хвиля Ді-Пі (переміщених осіб) після Другої світової війни та відмова від
        репатріації
      - Маніфест І. Багряного «Чому я не хочу вертатись до СРСР?» (1946)
  - section: 'Вступ та культурний контекст: II — Інституції діаспори'
    words: 450
    points:
      - Створення МУРу (Мистецького українського руху) у 1945 році в таборах Німеччини
      - Роль Уласа Самчука та Юрія Шевельова в об'єднанні емігрантських письменників
      - Формування Нью-Йоркської групи у 1950-х роках (Б. Бойчук, Ю. Тарнавський)
  - section: 'Аналіз ключових текстів: I — «Тигролови» Івана Багряного'
    words: 450
    points:
      - Пригодницький сюжет як форма для екзистенціального роману
      - Протистояння людини і тоталітарної системи (Григорій Многогрішний проти Медвина)
      - Тріумф людської волі та права на свободу
  - section: 'Аналіз ключових текстів: II — «Жовтий князь» Василя Барки'
    words: 450
    points:
      - Художнє осмислення Голодомору 1932–1933 років у романі Барки (1962)
      - Родина Катранників як уособлення трагедії українського селянства
      - Збереження людяності та християнських цінностей в нелюдських умовах
  - section: 'Герменевтика та ключові образи: I — Архетипи травми'
    words: 450
    points:
      - Образ «поїзда-дракона» в «Тигроловах» як метафора ГУЛАГу та смерті
      - Образ Жовтого князя як інфернальної, руйнівної сили штучного голоду
      - Аналіз символіки, що передає колективну національну травму
  - section: 'Герменевтика та ключові образи: II — Символіка екзилу'
    words: 400
    points:
      - Мотив втраченого раю та ностальгії у творчості письменників еміграції
      - Самотність та пошук ідентичності у чужому культурному просторі
      - Екзистенційні виміри вигнання в поезії Євгена Маланюка та Олега Ольжича
  - section: 'Мова, стиль та поетика: I — Модернізм МУРу'
    words: 450
    points:
      - Дискусії про «великий стиль» та «органічний національний стиль»
      - Поєднання української класичної традиції з європейськими модерністськими пошуками
      - Експериментальна, інтелектуальна проза Віктора Домонтовича
  - section: 'Мова, стиль та поетика: II — Авангард Нью-Йоркської групи'
    words: 450
    points:
      - Відхід від традиційного римування та використання верлібру
      - Вплив іспанського сюрреалізму, американського бітництва та екзистенціалізму
      - Урбаністична образність та еротизм у творах Емми Андієвської та Юрія Тарнавського
  - section: 'Деколонізаційний вимір: I — Збереження національної пам''яті'
    words: 450
    points:
      - Видання за кордоном заборонених в УРСР творів письменників «Розстріляного
        відродження»
      - Створення незалежної академічної науки (Гарвардський український дослідницький
        інститут, ЕУ)
      - Роль діаспори як хранителя розстріляної української ідентичності
  - section: 'Деколонізаційний вимір: II — Протистояння радянському наративу'
    words: 450
    points:
      - Спростування імперських міфів про «добровільне» радянське суспільство
      - Література діаспори як інструмент боротьби за правду на світовій арені
      - Відкидання догм соцреалізму та свобода естетичного вираження
  - section: 'Підсумок та рецепція: I — «Повернення імен» у 1990-х роках'
    words: 400
    points:
      - Масові публікації творів авторів діаспори в незалежній Україні
      - Заповнення «білих плям» історії та зміна шкільних і університетських програм
      - Злиття двох розірваних гілок (материкової та еміграційної) в єдиний літературний
        канон
  - section: 'Підсумок та рецепція: II — Сучасне переосмислення'
    words: 400
    points:
      - Вплив поетики Нью-Йоркської групи на сучасне покоління українських поетів
      - Глобальний контекст української літератури та її інтеграція у світовий культурний
        простір
      - Питання для дискусії щодо ролі еміграції у збереженні культури під час бездержавності
