slug: synthesis-1
title: 'Синтез: Горизонти епохи 1'
word_target: 4000
content_outline:
- section: 'Діахронний аналіз: Еволюція ідей'
  words: 400
  points:
  - Трансформація ключових ідей та архетипів (від романтичного міфу до екзистенційного
    бунту)
  - Спадкоємність поколінь в умовах перерваної традиції
- section: 'Діахронний аналіз: Діалог з попередниками'
  words: 450
  points:
  - 'Явище інтертекстуальності: як пізніші автори переосмислюють класику'
  - Полеміка з традицією як рушій літературного прогресу
- section: 'Деколонізаційна оптика: Стратегії опору'
  words: 500
  points:
  - Езопова мова та підтекст як інструменти виживання в імперії
  - Спільні стратегії інтелектуального опору в поезії, прозі та драматургії
- section: 'Деколонізаційна оптика: Деконструкція імперського наративу'
  words: 500
  points:
  - Руйнування міфу про провінційність української культури
  - Системний процес повернення вкраденої історії через літературу
- section: 'Стилістичний калейдоскоп: Авторські техніки'
  words: 450
  points:
  - Порівняльний аналіз формальних пошуків ключових авторів
  - Адаптація європейських стилів (імпресіонізм, символізм) на українському ґрунті
- section: 'Стилістичний калейдоскоп: Трансформація мови'
  words: 450
  points:
  - Еволюція літературної мови від етнографічної стилізації до інтелектуального дискурсу
  - Мовотворчість письменників як акт державного будівництва
- section: 'Філософія ідентичності: Конструювання суб''єкта'
  words: 500
  points:
  - Перехід від об'єкта етнографії до суб'єкта історії в літературних творах
  - Формування модерної української нації через текст
- section: 'Філософія ідентичності: Формування національної етики'
  words: 450
  points:
  - Література як замінник відсутніх національних інституцій (держави, церкви)
  - 'Етичний імператив українського письменника: відповідальність перед історією'
- section: 'Спадщина: Вплив на сучасний процес'
  words: 400
  points:
  - Актуальність класичного канону в сучасних умовах (особливо під час війни)
  - Переосмислення класики сучасними авторами (постмодерна гра з традицією)
- section: 'Спадщина: Значення канону для безпеки'
  words: 400
  points:
  - Культурний канон як основа національної безпеки та ідентичності
  - Захист інтелектуального простору від неоімперських впливів
