slug: shestydesiatnyky-as-phenomenon
title: Shestydesiatnyky As Phenomenon
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Відлига та Пробудження'
  words: 400
  points:
  - Хрущовська відлига та XX з'їзд КПРС як історичні передумови появи покоління.
  - Послаблення цензури та повернення із забуття імен авторів Розстріляного відродження.
  - Пошук нової щирості в літературі після десятиліть сталінського соцреалізму.
- section: 'Вступ та культурний контекст: II — Клуб творчої молоді'
  words: 350
  points:
  - Заснування КТМ «Сучасник» у Києві під керівництвом Леся Танюка (1959).
  - 'Синтез мистецтв: поети, художники (Алла Горська), кінорежисери, перекладачі.'
  - Експедиція до Биківні та розкриття злочинів тоталітарної системи.
- section: 'Аналіз твору: I — Літературне ядро та етапи розвитку'
  words: 400
  points:
  - 'Періодизація явища: від літературного дебюту до політичного переслідування.'
  - 'Формування ядра: Василь Симоненко, Ліна Костенко, Іван Драч, Микола Вінграновський.'
  - Конфлікт між прагненням творчої свободи та жорсткими межами радянської системи.
- section: 'Аналіз твору: II — Мистецтво та дисидентство'
  words: 350
  points:
  - Трансформація культурного явища у правозахисний рух (Іван Світличний, Євген Сверстюк).
  - Роль самвидаву як непідконтрольного комунікаційного простору.
  - Виступ у кінотеатрі «Україна» 1965 року як поворотний момент сюжету опору.
- section: 'Герменевтика та ключові образи: I — Філософія екзистенціалізму'
  words: 350
  points:
  - Концепт «прямостояння» та морального максималізму в поезії Василя Стуса.
  - Проблема індивідуального вибору людини в умовах абсурдного й жорстокого світу.
  - Подолання страху смерті заради збереження людської гідності.
- section: 'Герменевтика та ключові образи: II — Національна ідентичність'
  words: 350
  points:
  - Архетипічний образ України, що виходить за межі радянського етнографізму.
  - Рефлексія над історичною пам'яттю та трагічним минулим нації.
  - Символіка землі, коріння та духовного спадку в текстах шістдесятників.
- section: 'Мова, стиль та поетика: I — Інновації Костенко та Симоненка'
  words: 400
  points:
  - Громадянська прямота і публіцистичність у ліриці Василя Симоненка.
  - Високий інтелектуалізм, афористичність та філософська глибина Ліни Костенко.
  - Очищення української мови від радянських канцеляризмів та штампів.
- section: 'Мова, стиль та поетика: II — Метафорика Драча та Вінграновського'
  words: 400
  points:
  - 'Поетична революція Івана Драча: використання верлібру, ускладнена сюрреалістична
    метафорика.'
  - Космізм та яскрава візуальність образів Миколи Вінграновського.
  - Зв'язок їхньої поетики з естетикою українського поетичного кіно.
- section: 'Деколонізаційний вимір: I — Опір русифікації'
  words: 350
  points:
  - 'Протистояння політиці лінгвоциду: захист української мови як міської, сучасної,
    інтелектуальної.'
  - Злам імперського міфу про «злиття націй» в єдиний радянський народ.
  - 'Формування агентності: від об''єкта впливу до активного суб''єкта культури.'
- section: 'Деколонізаційний вимір: II — Трактат Івана Дзюби'
  words: 350
  points:
  - Аналіз роботи «Інтернаціоналізм чи русифікація?» (1965) як деколонізаційного маніфесту.
  - Викриття русифікаторської політики влади з позицій самого ж марксизму.
  - Величезний вплив трактату на інтелігенцію як в Україні, так і за її межами.
- section: 'Підсумок та рецепція: I — Перехід у дисидентство'
  words: 350
  points:
  - 'Наслідки січневого погрому 1972 року: заслання, табори, заборона друкуватися.'
  - Вплив шістдесятників на заснування Української Гельсінської групи (УГГ).
  - 'Світовий контекст: солідарність діаспори та міжнародних правозахисних організацій.'
- section: 'Підсумок та рецепція: II — Значення для сучасної України'
  words: 300
  points:
  - Шістдесятники як інтелектуальний фундамент здобуття Незалежності у 1991 році.
  - Актуальність їхніх ідей та текстів у сучасній війні Росії проти України.
  - 'Питання для дискусії: ціна свободи та роль митця в тоталітарному суспільстві.'
