slug: kulish-literary-legacy
title: Kulish Literary Legacy
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Формування світогляду П. Куліша'
  words: 400
  points:
  - Ранні роки на Сумщині, виховання в дусі козацьких переказів, що заклало інтерес
    до минулого
  - Роль Київського університету та вплив Михайла Максимовича на формування історичної
    свідомості
  - Усвідомлення необхідності переведення української культури з етнографічного формату
    у високий інтелектуальний вимір
- section: 'Вступ та контекст: Кирило-Мефодіївське братство та арешт'
  words: 400
  points:
  - Ідеологічна роль Куліша в Братстві (співавторство базових програмових документів)
  - Арешт 1847 року, важкі роки ув'язнення та заслання до Тули
  - Світоглядний перехід від радикальних революційних ідей до системної та наполегливої
    культурної розбудови
- section: 'Аналіз ключових творів: «Чорна рада» — перший історичний роман'
  words: 600
  points:
  - Рецепція традицій європейського романтизму (В. Скотт) та їхня органічна українська
    адаптація
  - 'Аналіз Ніжинської ради 1663 року як складної метафори соціального конфлікту:
    державницька еліта проти стихійних мас'
  - 'Діаметральні образи: Яким Сомко (державність, елітаризм) та Іван Брюховецький
    (руйнівний соціальний популізм)'
- section: 'Аналіз ключових творів: Поетична спадщина («Досвітки», «Дзвін»)'
  words: 400
  points:
  - Збірки поезій як новаторський зразок філософської та інтелектуальної лірики в
    українській літературі
  - Відхід від виключно селянської тематики; фокус на екзистенційних та універсальних
    питаннях
  - Формування образу поета-громадянина і мислителя, що несе відповідальність за пробудження
    нації
- section: 'Аналіз ключових творів: Перекладацька діяльність та Біблія'
  words: 500
  points:
  - Значення перекладів В. Шекспіра, Дж. Байрона, Й. В. Гете для включення української
    літератури в європейський контекст
  - Монументальна багаторічна праця над створенням першого повного україномовного
    перекладу Біблії
  - Роль перекладу Святого Письма у сакралізації та найвищій легітимізації українського
    слова
- section: 'Стилістика та мова автора: Кулішівка як акт мовного суверенітету'
  words: 400
  points:
  - Створення та впровадження першого фонетичного правопису («Граматка», 1857 рік)
  - Радикальний розрив візуального та етимологічного зв'язку українських текстів з
    російською імперською традицією
  - Вплив «кулішівки» на стандартизацію друкованого слова і формування сучасної абетки
- section: 'Стилістика та мова автора: Європеїзація української літературної мови'
  words: 400
  points:
  - Цілеспрямоване збагачення словника абстрактною, науковою та філософською термінологією
  - Послідовна та аргументована боротьба з «котляревщиною» як єдиним (бурлескно-побутовим)
    стилем
  - 'Широкий стилістичний діапазон Куліша: від глибинного фольклорного коріння до
    високого академічного регістру'
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів про «провінційність»'
  words: 300
  points:
  - Культурна діяльність Куліша як прямий і системний доказ самодостатності української
    нації
  - Спротив мовній та культурній асиміляції в умовах Валуєвського циркуляру (1863)
    та Емського указу (1876)
  - Остаточне та безапеляційне відкидання ролі «молодшого брата» в імперському літературному
    процесі
- section: 'Деколонізаційна перспектива: Українська суб''єктність та державницький
    консерватизм'
  words: 300
  points:
  - Концепція «хутора» як осередку національного збереження, моральної чистоти та
    духовного аристократизму
  - Критика гайдамаччини та стихійних повстань; свідомий вибір на користь елітарної
    розбудови інституцій
  - Творення модерної політичної нації через масштабне просвітництво як альтернатива
    руйнівному хаосу
- section: 'Підсумок та спадщина: Вплив Пантелеймона Куліша на націєтворення'
  words: 300
  points:
  - Підсумкова оцінка П. Куліша як головного архітектора національної культурної та
    мовної інфраструктури
  - Деконструкція радянського міфу про діяча як «реакціонера» та його повернення до
    пантеону видатних націєтворців
  - Актуальність інтелектуального, консервативного та європоцентричного підходу Куліша
    для сучасної деколонізації
