slug: tychyna-soviet-period
title: Tychyna Soviet Period
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: I — Кінець «золотого гомону»'
    words: 500
    points:
      - 'Історичне тло: згортання українізації та початок терору (1930-ті роки)'
      - Атмосфера страху після показових процесів та самогубств колег (М. Хвильовий)
      - 'Світоглядний злам поета: перехід від модернізму до самозбереження'
  - section: 'Вступ та культурний контекст: II — Статус офіційного співця'
    words: 500
    points:
      - 'Творення радянського літературного канону: соцреалізм як єдиний метод'
      - Павло Тичина як головний «державний поет» та символ лояльності
      - 'Золота клітка: номенклатурні привілеї та втрата справжнього творчого голосу'
  - section: 'Аналіз твору: Сюжет та структура — Маніфест «Партія веде»'
    words: 700
    points:
      - Контекст появи твору (1933 рік) на тлі катастрофи Голодомору
      - 'Ідеологічний сюжет: агресивна класова риторика та заклик до знищення «ворогів»'
      - Повна відмова від раннього ліризму на користь жорсткої агітаційної структури
  - section: 'Аналіз твору: Сюжет та структура — «Чуття єдиної родини»'
    words: 500
    points:
      - Аналіз однойменної збірки (1938) як еталону радянського патріотизму
      - 'Нівелювання національного: прославляння асиміляційного «братерства народів»'
      - Відсутність справжнього художнього конфлікту у віршах (боротьба хорошого з
        кращим)
  - section: 'Герменевтика та ключові образи: I — Трансформація символів'
    words: 600
    points:
      - Підміна космічних архетипів (Сонце, Вітер) на механістичні та партійні штампи
        (Трактор, Сталін)
      - 'Деградація системи персонажів: від космічного ліричного «Я» до знеособленого
        «Ми» маси'
      - 'Міфотворення: творення фальшивої картини «щасливого радянського сьогодення»'
  - section: 'Мова, стиль та поетика: I — Радянський новояз та ритм'
    words: 600
    points:
      - 'Стилістичний колапс: втрата неперевершеної музикальності «Сонячних кларнетів»'
      - Введення радянських канцеляризмів та гасловості у поетичний текст
      - 'Особливості синтаксису і ритміки: переважання рубленого маршового ритму'
  - section: 'Деколонізаційний вимір: I — Діагноз Стуса («Феномен доби»)'
    words: 500
    points:
      - Розвінчання імперського міфу про геніального співця партії в есе Василя Стуса
        (1970)
      - Концепт генія «з поламаним хребтом», що став жертвою тоталітарної м'ясорубки
      - Розуміння трагедії митця як діагнозу всій поневоленій українській культурі
  - section: 'Деколонізаційний вимір: II — Невидимий опір функціонера'
    words: 500
    points:
      - 'Агентність в умовах несвободи: діяльність П. Тичини на посаді Наркома освіти'
      - Тихий саботаж русифікаторських наказів та захист україномовних шкіл
      - Допомога репресованим колегам як форма спокути за публічний конформізм
  - section: 'Підсумок та рецепція: I — Трагедія генія в тоталітаризмі'
    words: 600
    points:
      - 'Рецепція сучасників: пророцтво Є. Маланюка про «пофарбовану дудку»'
      - 'Світовий та історичний контекст: митець і тоталітаризм (Маяковський, Шостакович)'
      - 'Питання для дискусії: ціна компромісу, фізичне виживання vs творча смерть'
