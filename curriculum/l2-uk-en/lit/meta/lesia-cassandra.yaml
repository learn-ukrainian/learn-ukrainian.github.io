slug: lesia-cassandra
title: Lesia Cassandra
word_target: 4000
content_outline:
- section: 'Вступ: Історичні умови та канон'
  words: 400
  points:
  - 'Створення твору в період 1901–1907 років: географічний та історичний контекст'
  - Місце «Кассандри» у формуванні канону українського європейського модернізму
  - Подолання меж етнографічного реалізму через жанр лезедрами
- section: 'Вступ: Актуальність тексту'
  words: 200
  points:
  - Філософія правди та ілюзії у сучасному контексті (проблема постправди)
  - Резонанс із сьогоднішніми суспільно-політичними викликами України
- section: 'Аналіз: Джерела та сюжет'
  words: 400
  points:
  - Трансформація давньогрецького міфу про Трою та віщунку Кассандру
  - Ключові етапи розгортання сюжету до трагічного фіналу
  - Троя як алюзія на бездержавну та поділену націю
- section: 'Аналіз: Природа конфлікту'
  words: 400
  points:
  - Гносеологічний конфлікт між Кассандрою (істина) та Геленом (прагматизм)
  - 'Психологія нерозуміння: чому суспільство відкидає правду'
  - Самосаботаж і сліпота троянців як рушійна сила трагедії
- section: 'Герменевтика: Символіка та міфологія'
  words: 500
  points:
  - Троянський кінь як уособлення ворожої маніпуляції та довірливості
  - Детальний розбір міфологічних підтекстів та пророцтв
  - Символіка погляду та сліпоти у тексті (метафора зрячої істини)
- section: 'Герменевтика: Система персонажів'
  words: 400
  points:
  - 'Еволюція образу Кассандри: від богині-віщунки до живої, страждаючої жінки'
  - 'Деконструкція образу Гелена: від «мудреця» до опортуніста'
  - Роль Сінона та Клітемнестри як каталізаторів трагедії
- section: 'Поетика: Стилістичні інновації'
  words: 400
  points:
  - Використання драматичної поеми («драми ідей») для глибокого психоаналізу
  - 'Відмова від традиційного побутовизму: інтелектуалізація конфлікту'
  - Неоромантичні та символістські риси поетики Лесі Українки
- section: 'Поетика: Синтаксис та народна мова'
  words: 300
  points:
  - Майстерність білого вірша та особливості ритмомелодики тексту
  - Поєднання високого інтелектуального стилю з автентичним українським синтаксисом
  - Внутрішні монологи як засіб розкриття душевного зламу героїні
- section: 'Деколонізація: Руйнування імперського міфу'
  words: 400
  points:
  - Спростування міфу про селянську, «провінційну» природу української літератури
  - Діалог з античністю без російського імперського посередництва
  - Деконструкція радянського наративу про авторку як виключно соціалістичну революціонерку
- section: 'Деколонізація: Агентність та опір'
  words: 300
  points:
  - Кассандра як голос інтелектуального опору асиміляції та маніпуляціям
  - Відмова від компромісу з ворогом як прояв національної суб'єктності
  - Трагічна, але незламна агентність українського генія
- section: 'Підсумок: Рецепція та дискусія'
  words: 300
  points:
  - Вплив «Кассандри» на українську модерністську традицію (М. Зеров, О. Забужко)
  - Світовий контекст європейської драми кінця XIX — початку XX століть
  - Дискусійні питання щодо відповідальності пророка та вибору нації
