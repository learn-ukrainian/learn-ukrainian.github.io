slug: baroque-poetry-velychkovsky
title: "Іван Величковський: Барокова Гра Смислів — Від Фігурних Віршів до Метафізики"
word_target: 5000
content_outline:
- section: 'Вступ: I — КМА і розквіт барокової культури'
  words: 500
  points:
  - 'Іван Величковський (бл. 1640–1701): поет і священик в епіцентрі українського Бароко — постать, що поєднала духовне служіння і літературну гру.'
  - 'Києво-Могилянська академія як фабрика поетів: навчання через версифікацію — чому КМА виробляла поетів, а не тільки богословів.'
  - 'Бароко як культура надлишку: гра, декорація і серйозність думки в єдиному просторі — не протиріччя, а синтез.'
- section: 'Вступ: II — Місце Величковського між Барановичем і Прокоповичем'
  words: 500
  points:
  - 'Покоління КМА поетів: Величковський серед Симеона Полоцького, Дмитра Туптала, Стефана Яворського — де він виокремлюється?'
  - 'Різниця між «київським» і «московським» бароко: що Величковський привносить і що відкидає з польської і латинської традиції.'
  - 'Два збірники: «Зегар з будзиком» і «Млеко» — різні програми одного автора для різних аудиторій.'
- section: 'Аналіз: Фігурні вірші як поетична архітектура'
  words: 700
  points:
  - 'Carmina figurata у Величковського: хрест, серце, зірка — форма як невід''ємна частина смислу, а не лише орнамент.'
  - 'Традиція від античних Симіаса Родоського до бароко: Рабан Мавр, Величковський — вертикаль, що сягає тисячоліть.'
  - 'Фігурні вірші як молитва тіла: читати означає рухати поглядом по формі Бога — тілесна і духовна практика одночасно.'
- section: 'Аналіз: Макаронічний вірш і радість багатомовності'
  words: 700
  points:
  - 'Поліглотичний вірш: церковнослов''янська, латина, польська, українська в одному тексті — не плутанина, а програмна багатомовність.'
  - '«Зегар з будзиком» і «Млеко» — яку функцію виконував кожен збірник і для якого читача він призначався?'
  - '«Акростих» і «мезостих»: гра зі схованим ім''ям як поетична головоломка і водночас — акт пам''яті й посвяти.'
- section: 'Аналіз: Метафізика і Ерос — духовне і чуттєве'
  words: 600
  points:
  - 'Духовна лірика про Христа і Богородицю: Ерос перетворений на агапе — як барокова чуттєвість стає аскетичним досвідом.'
  - 'Барокова любовна тематика і релігійна алегорія: де вони перетинаються і де розходяться у Величковського.'
  - Порівняння з Джоном Донном і Луїсом де Гонгорою — бароко як загальноєвропейський феномен з національними відгалуженнями.
- section: 'Стилістика: Між грою і молитвою'
  words: 500
  points:
  - 'Барокова вишуканість (concettismo): не «надмір», а ретельна архітектура смислів — кожна деталь на своєму місці.'
  - 'Ритмічні схеми: вплив польської силабіки і власні варіації Величковського — де він іде за правилом і де відступає.'
  - '«Темний стиль» проти «ясного стилю»: коли і чому Величковський обирає ускладнення і що за ним криється.'
- section: 'Деколонізаційна перспектива: Бароко як загальноєвропейська ідентичність'
  words: 500
  points:
  - Величковський не провінційний автор — він грає за тими ж правилами, що Кальдерон і Маріні, і є їхнім повноправним сучасником.
  - 'Відмова від «малоросійського» прочитання бароко: не «наслідувачі Москви», а European poets writing in Kyiv на перетині культур.'
  - Знищення барокової традиції радянськими програмами — чому це поетичне покоління зникло зі шкільних підручників і що ми втратили.
- section: 'Підсумок: Бароко у живій традиції'
  words: 500
  points:
  - Вплив Величковського на пізнішу українську поезію — де барокова ДНК проглядається у несподіваних місцях.
  - 'Нью-Йоркська група і бароко: свідоме звернення до власної традиції гри і ускладнення через три століття.'
  - 'Сучасне прочитання Величковського: де поет-ерудит і де поет-містик — і чи можна їх розділити?'
