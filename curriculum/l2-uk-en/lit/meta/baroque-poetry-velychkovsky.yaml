slug: baroque-poetry-velychkovsky
title: 'Іван Величковський: Барокова Гра Смислів — Від Фігурних Віршів до Метафізики'
word_target: 5000
content_outline:
- section: 'Вступ та культурний контекст: Іван Величковський і Києво-Могилянська академія'
  words: 450
  points:
  - 'Києво-Могилянська колегія у 1660-х роках як середовище формування Величковського:
    європейські програми навчання та поетика як базова дисципліна.'
  - Поєднання духовного шляху (наставництво Варлаама Ясинського) та інтелектуальної
    гри в долі поета.
  - Співпраця з Чернігівським літературним осередком і друкарнею Лазаря Барановича
    як етап становлення.
- section: 'Вступ та культурний контекст: Місце в літературному каноні та сучасне
    значення'
  words: 400
  points:
  - 'Чому творчість Величковського залишалася в рукописах до 1972 року: причини витіснення
    складної барокової поезії на маргінеси.'
  - 'Значення спадщини для сучасності: доказ існування елітарної, урбаністичної і
    суто європейської літератури в Україні XVII століття.'
  - Величковський як новатор, що свідомо розширив межі можливостей книжної староукраїнської
    мови.
- section: 'Аналіз твору: Сюжет та структура — Фігурна поезія та макаронічні вірші'
  words: 550
  points:
  - Збірка «Млеко от овцы пастыру належное» (1691) як теоретичний трактат і антологія
    «курйозної» поезії.
  - 'Carmina figurata (фігурні вірші) у творчості поета: вірші у формі хреста та чаші
    як синтез візуального і вербального мистецтва.'
  - Макаронічна поезія та полілінгвізм (лат., пол., церк.-слов.) як ознака інтелектуальної
    свободи і включеності в західний контекст.
- section: 'Аналіз твору: Сюжет та структура — Впливи, джерела та бароковий синтез'
  words: 450
  points:
  - Засвоєння античної спадщини, середньовічних і ренесансних поетик (від Симіаса
    Родоського до західного бароко).
  - 'Бароковий синтез як рушійна сила: поєднання форми, що вражає (concettismo), з
    глибоким богословським змістом.'
  - Адаптація західноєвропейських поетичних моделей до потреб православної свідомості
    та української дійсності.
- section: 'Герменевтика та ключові образи: Детальний розбір символіки'
  words: 450
  points:
  - 'Центральний образ збірки «Зегар з полузегарком» (1690): годинник як універсальна
    барокова метафора швидкоплинності часу та memento mori.'
  - 'Герменевтика «раків літеральних» (паліндромів): симетрія тексту як символ Божественної
    досконалості та нескінченності.'
  - Аналіз вірша «Анна во дар бо ім'я мі обдарованна» — як форма слугує медитативним
    інструментом.
- section: 'Герменевтика та ключові образи: Система образів, архетипи та релігійні
    підтексти'
  words: 400
  points:
  - Християнські архетипи та релігійна алегорія у творчості Величковського (Христос,
    Богородиця, діалог Авеля і Каїна).
  - «Рак прекословний» як інструмент вираження морального дуалізму (читання тексту
    у зворотному напрямку дає протилежний зміст).
  - Трансформація барокової чуттєвості (Еросу) у духовну християнську любов (Агапе)
    в ліричних медитаціях.
- section: 'Мова, стиль та поетика: Стилістичні інновації та церковнослов''янізми'
  words: 450
  points:
  - 'Декларування мети у передмові до «Млека»: створення віршів «для оздоблення отчизни
    нашое і втіхи малороссійским сином».'
  - 'Усвідомлений вибір книжної мови: церковнослов''янізми української редакції поруч
    із вкрапленнями живої «простої мови».'
  - Стилістичні інновації Величковського як свідомий акт культурного будівництва та
    інтелектуальної гри зі словом.
- section: 'Мова, стиль та поетика: Особливості ритміки та синтаксису'
  words: 450
  points:
  - Використання силабічної системи віршування, притаманної українському бароко з
    її орієнтацією на польські зразки.
  - Експерименти із синтаксисом та звукописом (наприклад, «єдиногласні» вірші на кшталт
    «СлОвО плОтОнОснО»).
  - 'Поетика барокових концептів: «темний стиль», акровірші, ехо-вірші та поетичні
    лабіринти як архітектура тексту.'
- section: 'Деколонізаційний вимір: Який імперський міф руйнує цей текст'
  words: 450
  points:
  - Спростування міфу імперської історіографії про «провінційність», «вторинність»
    та виключно фольклорний характер української культури.
  - Доведення того факту, що складна елітарна поезія в Україні розвивалася самостійно,
    ще до включення її в російський культурний простір.
  - 'Відмова від наративу «малоросійського» бароко: творчість Величковського як повноцінний
    відповідник західному бароко.'
- section: 'Деколонізаційний вимір: КМА як центр незалежної культурної традиції'
  words: 400
  points:
  - Києво-Могилянська академія та Чернігівський осередок як незалежні центри, що формували
    власний естетичний і богословський канон.
  - 'Опір асиміляції через творення високої культури: самоствердження української
    ідентичності через складну поетичну форму.'
  - Роль випускників КМА у подальшому експорті барокової культури (парадокс просвітництва
    сусідніх територій).
- section: 'Підсумок та рецепція: Вплив на розвиток барокової літератури'
  words: 350
  points:
  - Спадщина Івана Величковського як вершина розвитку української курйозної поезії
    та її вплив на сучасників (Л. Баранович, Д. Туптало).
  - Відгомін барокової гри слів у творчості футуристів та необарокових авторів ХХ
    століття (від М. Семенка до Нью-Йоркської групи).
  - Формування довгої традиції українського поетичного експерименту.
- section: 'Підсумок та рецепція: Місце КМА в європейській традиції бароко'
  words: 250
  points:
  - 'Підсумковий погляд: Величковський як європейський поет, що писав в українському
    контексті.'
  - Значення збереження пам'яті про інтелектуальне бароко для розуміння повноти національної
    ідентичності.
  - 'Питання для дискусії: чи можливе повне повернення складної барокової поезії до
    сучасного масового читацького канону?'
