slug: zabuzhko-museum
title: Zabuzhko Museum
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Роман як епос національної пам''яті'
  words: 450
  points:
  - 'Історичні умови появи твору: пост-помаранчева Україна та запит на осмислення
    минулого.'
  - 'Масштаб твору: 60 років історії, три покоління, переосмислення національної травми.'
  - Місце роману в сучасному літературному каноні як головного українського епосу
    початку XXI століття.
- section: 'Вступ та культурний контекст: II — Історико-культурне тло та значення
    сьогодні'
  words: 450
  points:
  - 'Рефлексія над епохами: від Другої світової війни та підпілля УПА до радянського
    застою 1970-х та сучасності (2004 рік).'
  - Роман як інструмент подолання колективної амнезії та повернення викреслених сторінок
    історії.
  - 'Актуальність тексту в умовах сучасної війни: пам''ять як зброя спротиву.'
- section: 'Аналіз твору: Сюжет та структура: I — Архітектоніка трьох часових пластів'
  words: 500
  points:
  - 'Нелінійна, поліфонічна структура: переплетення 1940-х, 1970-х та 2000-х років.'
  - Сюжет як детективне та духовне розслідування журналістки Дарини Гощинської та
    Адріяна Ортинського.
  - 'Концепція часу в романі: минуле, що активно втручається в теперішнє, та кармічні
    зв''язки поколінь.'
- section: 'Аналіз твору: Сюжет та структура: II — Переплетення доль героїв'
  points:
  - 'Історія Олени Довган (Гелі): боротьба в лавах УПА, ідеалізм та жертовність.'
  - 'Трагедія Влади Матусевич: знищений мистецький талант у задушливій атмосфері радянських
    1970-х.'
  - 'Конфлікт як рушійна сила: протистояння особистості тоталітарній системі та забуттю.'
  words: 500
- section: 'Герменевтика та ключові образи: I — Метафора «музею» та механізми пам''яті'
  words: 450
  points:
  - 'Дитяча гра у «секретики» як центральна метафора: прихована, але жива пам''ять,
    яку необхідно відкопати.'
  - 'Розбір символіки «покинутих секретів»: родинні таємниці, зради, героїзм, що формують
    ідентичність сучасників.'
  - 'Діалог мертвих і живих: сновидіння та візії як спосіб передачі досвіду.'
- section: 'Герменевтика та ключові образи: II — Жіночі архетипи та тілесність'
  words: 450
  points:
  - Деконструкція патріархального образу української жінки-страдниці.
  - Жінка як активний суб'єкт історії, воїн (Олена) та шукач істини (Дарина).
  - 'Тілесність і сексуальність у романі: ерос як життєствердна сила та форма свободи
    (лінія Дарини і Адріяна).'
- section: 'Мова, стиль та поетика: I — Інтелектуалізм та «забужківський синтаксис»'
  words: 450
  points:
  - 'Стилістичні інновації Забужко: густий інтелектуалізм, есеїстичність у межах художнього
    тексту.'
  - 'Особливості ритміки та синтаксису: фірмові «довгі речення», що імітують безперервний
    потік свідомості та плин часу.'
  - Аналіз текстуальної щільності як способу фіксації складного історичного досвіду.
- section: 'Мова, стиль та поетика: II — Поліфонія та мовні регістри'
  words: 450
  points:
  - 'Робота з різними мовними пластами: стилізація галицької говірки 1940-х років.'
  - Відтворення задушливої бюрократичної мови радянських 1970-х та динамічного сленгу
    Києва 2000-х.
  - Мова як інструмент ідентифікації персонажів та епох.
- section: 'Деколонізаційний вимір: I — Реставрація правди про УПА'
  words: 450
  points:
  - Деконструкція російсько-імперських та радянських міфів про український повстанський
    рух.
  - Показ бійців УПА як освіченої, свідомої еліти, що вела боротьбу за екзистенційне
    виживання нації.
  - 'Агентність українського героя: відмова від віктимного наративу.'
- section: 'Деколонізаційний вимір: II — Подолання постколоніального синдрому'
  words: 450
  points:
  - Опір асиміляції та культурне самоствердження через відновлення історичної пам'яті.
  - Аналіз радянської системи як механізму знищення не лише фізичного, але й морального
    (виродження нації у 1970-х).
  - Роман як терапевтичний акт проговорення травми для українського суспільства.
- section: 'Підсумок та рецепція: I — Місце роману в сучасній літературі'
  words: 500
  points:
  - Вплив Забужко на розвиток сучасної української історичної прози та наступні покоління
    письменників.
  - 'Світовий контекст твору: переклади, міжнародні премії (Книга року Бі-Бі-Сі, Ангелус)
    та порівняння з великими європейськими епосами.'
  - 'Питання для дискусії: Як історія нашої родини формує наші сучасні вибори? Чи
    можемо ми звільнитися від минулого, не знаючи його?'
