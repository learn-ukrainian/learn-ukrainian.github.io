slug: rozstriliane-vidrodzennia-phenomenon
title: Розстріляне Відродження як культурний феномен
word_target: 4000
content_outline:
- section: 'Вступ та культурний контекст: I — Історичні умови'
  words: 400
  points:
  - 'Феномен українізації (коренізації) 1920-х років: причини та наслідки'
  - Харків як епіцентр культурного вибуху та роль Будинку «Слово»
  - 'Від народництва до модернізму: історичний злам парадигми'
- section: 'Вступ та культурний контекст: II — Місце в каноні'
  words: 350
  points:
  - Історія терміна «Розстріляне відродження» (Єжи Ґедройць та Юрій Лавріненко, Париж,
    1959)
  - Значення цієї генерації для формування європейського обличчя української літератури
  - Повернення текстів із забуття в 1990-х роках
- section: 'Аналіз твору: Сюжет та структура: I — Ключові тексти'
  words: 450
  points:
  - Урбаністичний роман «Місто» (1928) Валер'яна Підмогильного як історія маргінала-завойовника
  - Екзистенційна криза у новелі М. Хвильового «Я (Романтика)»
  - Авангардна поезія М. Семенка та неокласика М. Зерова
- section: 'Аналіз твору: Сюжет та структура: II — Конфлікт із системою'
  words: 350
  points:
  - Літературна дискусія 1925–1928 років (ВАПЛІТЕ проти Плугу та Гарту)
  - Переслідування та самогубство Хвильового у 1933 році як акт останнього спротиву
  - Урочище Сандармох (листопад 1937) як фінал ліквідації еліти
- section: 'Герменевтика та ключові образи: I — Фігури та архетипи'
  words: 400
  points:
  - Архетип роздвоєного чекіста-фанатика, що вбиває власну матір («Я (Романтика)»)
  - Степан Радченко як образ української експансії в урбаністичний простір
  - Деконструкція імперського і патріархального міфів у п'єсах Миколи Куліша («Мина
    Мазайло», «Маклена Ґраса»)
- section: 'Герменевтика та ключові образи: II — Еволюція нової людини'
  words: 350
  points:
  - Філософія «розумного арлекіна» в театрі Леся Курбаса «Березіль»
  - Крах ілюзій націонал-комунізму та перехід до екзистенційного трагізму
  - Неокласичний ідеал гармонійної людини на тлі революційного хаосу
- section: 'Мова, стиль та поетика: I — Модернізм та авангард'
  words: 400
  points:
  - Руйнування традиційної метрики і синтаксису українськими футуристами (М. Семенко)
  - Імпресіоністична метафорика та рваний експресіоністичний ритм М. Хвильового
  - Лексичне розширення української мови, творення урбаністичної термінології
- section: 'Мова, стиль та поетика: II — Неокласичний синтаксис'
  words: 350
  points:
  - Звернення до ідеальних античних форм (сонет, терцина) як супротив хаосу (М. Зеров,
    М. Рильський)
  - «Ad fontes!» (До джерел) — звернення до світової класики оминаючи російське посередництво
  - Підняття української поетичної мови до найвищого академічного регістру
- section: 'Деколонізаційний вимір: I — «Геть від Москви!»'
  words: 450
  points:
  - Памфлети Хвильового («Апологети писаризму», «Камо грядеш?»)
  - Концепція «психологічної Європи» та відмова від провінціалізму
  - Свідома сепарація українського культурного простору від російської гегемонії
- section: 'Деколонізаційний вимір: II — Агентність творців'
  words: 350
  points:
  - Митці 1920-х як активні будівничі повноцінної нації, а не пасивні жертви
  - Розбудова незалежних інституцій (ВАПЛІТЕ, театр «Березіль», ВУАН)
  - 'Причини терору: імперська реакція на успішну культурну емансипацію України'
- section: Підсумок та рецепція
  words: 350
  points:
  - Вплив ідей Розстріляного Відродження на покоління шістдесятників (І. Дзюба, В.
    Стус)
  - 'Сучасна рецепція: відродження інтересу в час російсько-української війни'
  - 'Місце покоління в світовому літературному контексті: перерваний політ, що став
    міцним фундаментом'
