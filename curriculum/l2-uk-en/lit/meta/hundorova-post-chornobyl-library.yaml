slug: hundorova-post-chornobyl-library
title: Hundorova Post Chornobyl Library
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Епоха зламів'
    words: 450
    points:
      - Чорнобильська катастрофа як глобальний маркер переходу України до постмодерної
        епохи
      - Розпад СРСР та екзистенційна криза радянського проєкту
  - section: 'Вступ та культурний контекст: Місце в каноні'
    words: 400
    points:
      - Значення монографії для легітимізації українського постмодернізму
      - Формування академічного словника для аналізу літератури 1990-х років
  - section: 'Аналіз твору: Сюжет та структура — Концептуальна основа'
    words: 500
    points:
      - 'Архітектура монографії: від аналізу травми до простору ігрових трансформацій'
      - Застосування світового методу «нуклеарної критики» до українського матеріалу
  - section: 'Аналіз твору: Сюжет та структура — Рушійна сила конфлікту'
    words: 450
    points:
      - Конфлікт між наслідками тоталітарної колоніальної спадщини та абсолютною ігровою
        свободою
      - Долання травми Чорнобиля через художній текст
  - section: 'Герменевтика та ключові образи: Метафора Бібліотеки'
    words: 500
    points:
      - Смислове навантаження концепту «післячорнобильської бібліотеки» як ковчега
        культури
      - Чорнобиль як фундаментальний метафоричний символ стану присутності 'після
        кінця'
  - section: 'Герменевтика та ключові образи: Постапокаліпсис і персонажі'
    words: 450
    points:
      - Карнавалізація дійсності та постапокаліптичні мотиви в літературі
      - Роль знакових письменників-постмодерністів (Андрухович, Забужко) як культурних
        агентів
  - section: 'Мова, стиль та поетика: Дослідницький інструментарій'
    words: 450
    points:
      - Академічний есей як інноваційна форма літературознавчого дослідження
      - Риторична майстерність та «коментар із кінця постмодерну»
  - section: 'Мова, стиль та поетика: Мовна гра об''єктів дослідження'
    words: 500
    points:
      - Руйнування радянських лінгвістичних табу (обсценна лексика, суржик, неологізми)
      - Іронічний синтаксис та пародіювання офіціозного дискурсу
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 450
    points:
      - Остаточний демонтаж соцреалізму та єдиного радянського культурного простору
      - Спростування імперської тези про вторинність українського літературного процесу
  - section: 'Деколонізаційний вимір: Опір та самоствердження'
    words: 450
    points:
      - Набуття українськими авторами повноцінної інтелектуальної суб'єктності
      - Культурне самоствердження нації через іронію та інтелектуальну свободу
  - section: 'Підсумок та рецепція: Вплив та світовий контекст'
    words: 450
    points:
      - Синхронізація українського дискурсу з глобальними філософськими трендами
      - Вплив праці Т. Гундорової на формування нових поколінь гуманітаріїв та літературознавців
