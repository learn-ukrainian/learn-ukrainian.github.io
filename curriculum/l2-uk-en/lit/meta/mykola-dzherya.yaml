slug: mykola-dzherya
title: 'Микола Джеря: Епос Кріпацької Долі'
word_target: 4000
content_outline:
- section: 'Вступ — Тема кріпацтва в літературі: Історичний контекст'
  words: 400
  points:
  - 'Огляд епохи 1840-1861 років: пік кріпосницького свавілля в Україні.'
  - 'Травма нації: кріпацтво як нав''язана імперська інституція (від Катерини ІІ),
    що зруйнувала козацьку волю.'
  - Життя села Вербівка як мікромодель колоніального визиску.
- section: 'Вступ — Тема кріпацтва в літературі: Від Шевченка до Нечуя'
  words: 400
  points:
  - Шевченкова поетична романтизація бунту та апеляція до емоцій.
  - 'Новаторство Нечуя-Левицького: об''єктивний соціально-психологічний реалізм.'
  - Епічна форма повісті, що дозволяє дослідити анатомію кріпосницької системи зсередини.
- section: 'Образ Миколи: Зовнішність і бунтарський характер'
  words: 400
  points:
  - Зовнішній портрет Джері як відображення його внутрішньої сили та волелюбності.
  - Антагонізм між покірністю більшості (жертви) та бунтарством одинака.
  - Міф про 'класову боротьбу' vs. український екзистенційний вимір непокори.
- section: 'Образ Миколи: Серп як символ соціального спротиву'
  words: 400
  points:
  - 'Аналіз сцени зіткнення з осавулою: вибух накопиченого гніву.'
  - Трансформація серпа — від знаряддя мирної праці до зброї захисту гідності.
  - Символічний розрив із системою та перехід межі закону.
- section: 'Сюжет як одіссея: Втеча з Вербівки та бурлакування'
  words: 500
  points:
  - 'Мотив дороги: втеча на Південь (Степова Україна) у пошуках свободи.'
  - 'Феномен бурлакування в XIX столітті: соціокультурний вимір явища.'
  - 'Робота на цукроварні: зустріч Миколи з новими формами ранньокапіталістичної експлуатації.'
- section: 'Сюжет як одіссея: Повернення до хрестів'
  words: 400
  points:
  - 'Фінал життєвого шляху Миколи: постарілий бурлака повертається у спустошене село.'
  - Символіка сільського цвинтаря та хрестів.
  - Гірке усвідомлення втраченого часу та зруйнованої родини.
- section: 'Жіночі образи: Нимидора як символ вірного кохання'
  words: 400
  points:
  - 'Образ Нимидори: чистота почуттів і тягар багаторічного очікування.'
  - Руйнування сім'ї як типовий наслідок системи, коли чоловіки тікали від панщини.
  - 'Психологізм образу: поєднання зовнішньої покірності з внутрішньою силою любові.'
- section: 'Жіночі образи: Трагедія матері та очікування'
  words: 400
  points:
  - 'Образ матері Джері: втілення вічного горя та жертовності української жінки.'
  - Подвійна віктимізація жінок-кріпачок (від пана та від патріархального укладу).
  - Як Нечуй-Левицький через жіночі долі показує антигуманність епохи.
- section: 'Реформа 1861 року: Ілюзія визволення та ціна свободи'
  words: 400
  points:
  - 'Історична реальність скасування кріпацтва: маніфест 19 лютого 1861 р.'
  - 'Сприйняття ''волі'' селянами: розчарування через втрату землі та викупні платежі.'
  - 'Іронія фіналу твору: воля, що виявилася лише зміною форми залежності.'
- section: 'Підсумок — Від Енея до Джері: Еволюція українського героя'
  words: 300
  points:
  - Порівняння життєрадісного Енея Котляревського та трагічного Миколи Джері.
  - 'Становлення зрілого реалістичного героя: від сміху до суворої соціальної правди.'
  - Перекидання містка до проблематики української літератури ХХ століття.
