  text: "Леся Українка. Драма-феєрія «Лісова пісня»    177\nТема і проблеми,  \n\
    художня організація\nНа думку М. Драй-Хмари, у  «Лісовій пісні» \nзмальовано «трагедію\
    \ високої душі, що заблу-\nдилась серед болота буденного життя». Душев-\nна краса\
    \ і  приземлений практицизм піднесені \nв  драмі до  рівня символічних узагальнень,\
    \ що \nспонукають до  роздумів про справжнє покли-\nкання людини. Основні проблеми\
    \ твору мають переважно \nфілософський характер. Вони стосуються сенсу \nжиття,\
    \ духовної свободи, матеріального"
