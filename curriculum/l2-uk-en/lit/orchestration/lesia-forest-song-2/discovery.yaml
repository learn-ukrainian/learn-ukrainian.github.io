    \ 2. У чому виявилася роздвоєність його натури? 3. На кого Лісовик перетворив\
    \ Лукаша? 4. Хто повернув Лукашеві людську подобу? 5. Як змінюється Лукаш у фіналі\
    \ твору? Прочитайте уривки твору. Виконайте завдання. Лісова пісня\nДрама­-феєрія\
    \ в 3-­х діях\n(Уривки)\nПролог\nСтарезний, густий, предковічний ліс на Волині.\
    \ Посеред лісу простора галява з плаку"
