  text: "175\nВасиль  Стефаник\nти сві­до­мість, аж по­ки лю­ди­на виз­нає свою про­ви­ну\
    \ й доб­ро­віль­но прий­ме за неї \nка­ру як очи­щен­ня. •  Ху­дож­нє дос­лід­жен­ня\
    \ сен­су страж­дан­ня й смер­ті лю­ди­ни. За екс­пре­сі­о­ніст­ською \nло­гі­кою,\
    \ від­чут­тя бо­лю й страж­дан­ня пе­ре­ду­сім спо­ну­кає лю­ди­ну до піз­нан­ня\
    \ при­чин \nсво­єї грі­хов­нос­ті, су­ті сво­го іс­ну­ван­ня. Смерть — не кі­нець\
    \ іс­ну­ван­ня, а ли­ше пе­ре­хід у \nно­вий ви­мір бут­тя. •  За­хоп­лен­ня іде­єю\
    \ еко­ло­гії як за­галь"
  section_title: Сторінка 175
  grade: 10
  author: avramenko
