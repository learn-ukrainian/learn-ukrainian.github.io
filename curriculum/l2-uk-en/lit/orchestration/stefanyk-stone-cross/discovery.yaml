  text: "Василь Стефаник. Новела «Камінний хрест»    149\nНовела «Камінний хрест»\n\
    Тематична основа\nНовела «Камінний хрест» для В. Стефаника \nбула важливим твором —\
    \ не випадково він так \nсамо назвав цілу збірку, що вийшла в 1900 році. Автор\
    \ розкрив тему еміграції, що стала для ба-\nгатьох українців тяжким випробуванням,\
    \ а  для \nдекого навіть і трагедією. В останній чверті ХІХ століття серед галиць-\n\
    кого селянства трудова еміграція була масовим \nявищем. У пошуках кращого життя\
    \ за океаном люди \nполишали рідн"
  section_title: Сторінка 149
  grade: 10
  author: borzenko
  page: ''
  trust_tier: 2
- score: 0.3333333432674408
  chunk_id: 10-klas-ukrlit-borzenko-2018-prof_s0276
  text: "У  психологічному творі, яким \nє  «Камінний хрест», основну увагу перенесе-\n\
    но на  внутрішній сюжет, а  саме на  напружені, \nдраматичні переживання героя,\
    \ який вимуше-\nно полишає рідну землю. А  в шостому розділі \nміститься кульмінація \
    \ — розставання Івана \nі його дружини з домівкою та їхній моторошний \nпрощальний\
    \ танець. Розв’язкою виступає остан-\nній розділ новели. Дорогою із  села Іван\
    \ Дідух \nуказує дружині на камінний хрест, що залишив \nна згадку про життя на батьківщині.\
    \ Надзвичайно важливу"
