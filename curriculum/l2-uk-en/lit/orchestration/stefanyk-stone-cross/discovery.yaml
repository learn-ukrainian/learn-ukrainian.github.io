  text: "Не  біси, є  і  моє, \nі твоє…». В образі українського селянина автор \n\
    не  лише розкрив трагедію втрати, пов’язану \nз  еміграцією, а  й виразив загальне\
    \ тривожне \nсвітовідчуття початку ХХ  століття. Він передав \nтрагізм людини,\
    \ змушеної попрощатися з уста-\nленим життям і  покластися на  волю неперед-\n\
    бачуваних і часто небезпечних обставин. Новела «Камінний хрест» своєю емоцій-\n\
    ною виражальною силою захопила багатьох \nсучасників письменника. І  в  подальшому\
    \ вона \nне  залишала байдужими українськи"
