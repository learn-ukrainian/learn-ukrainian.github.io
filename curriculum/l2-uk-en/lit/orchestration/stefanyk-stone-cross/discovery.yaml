  text: 'Декому, певне, здається, що Василь Стефаник жив дуже давно: так далеко відійшло
    в минувшину те життя, ті соціальні драми, що їх письменник з такою силою і з таким
    болем відтворив у своїх новелах. Давно немає проблеми землі, переорано помежовані
    смужки селянських грунтів, що за них люди судилися, чварились, мордували себе
    у віковій ворожнечі такої лютості, коли за шматок нещасного поля часом вкорочували
    віку сусідові, проливали навіть братню кров. Давно нема таких екзотичних для чужоземних
    портов'
