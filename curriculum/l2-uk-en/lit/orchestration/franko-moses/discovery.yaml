  text: "Іван Франко. Філософська поема «Мойсей»    95\nРоль прологу\nУ пролозі до \
    \ поеми «Мойсей» єднаються \nдуже різні авторські емоції — пекучий біль че-\n\
    рез народне приниження та  палка віра в  нове \nвільне майбуття. За емоційною\
    \ наснагою пролог \nподіляється на дві частини. У першій через го-\nстрі й докірливі\
    \ риторичні запитання розкрива-\nється духовна вбогість національної пасивності\
