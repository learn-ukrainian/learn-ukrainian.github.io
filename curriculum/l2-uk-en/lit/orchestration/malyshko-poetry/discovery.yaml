  text: "Питання канону, оскільки вказує на авторитет — і\r\nтрадицій, і підходів,\
    \ і інтерпретаторів, неминуче пов’язане із боротьбою за цей\r\nавторитет. Бо жодна\
    \ влада (в тому числі й інтелектуальна) не дається і не\r\nздається безконфліктно.\
    \ Якщо розбіжність у цінностях і методах глибинна, як це\r\nбуло між совєтським\
    \ і несовєтським літературознавством, то дискурс звучатиме\r\nмайже тільки в ключі\
