  text: 'Навесні 1829 р. разом з обслугою-кріпаками Т. Шевченко як ко-

    зачок молодого пана Павла Енгельгардта виїздить до м. Вільна

    (нині — Вільнюс), у 1831 р. — до Петербурга. У списку дворових був

    запис навпроти прізвища Т. Шевченка: «Здатний на кімнатного

    живописця», що значною мірою вирішило його подальшу долю.

    Енгельгардт відправив Тараса на 4 роки навчатися малярства до

    художника В. Ширяєва. У 1836 р. Т. Шевченко разом із художника-

    ми розписував театр у Петербурзі. Тоді ж юнак познайомився з учнем'
