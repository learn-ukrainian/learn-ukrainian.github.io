  text: "Іван Нечуй-Левицький. Повість «Кайдашева сім’я»    27\nПерсонажі повісті\n\
    Усі персонажі твору яскраві й  колоритні, \nіз виразними психологічними профілями.\
    \ Вони \nпоказані переважно в  межах патріархальної \n­родини. Старий Омелько\
    \ Кайдаш, голова роди-\nни, поступово втрачає свій авторитет, і так знач­\nно\
    \ зіпсований наслідками споживання горілки. Побиття одним із  синів батька остаточно\
    \ руй-\nнує видимість патріархальної ідилії. Складається \nвраження, що в родині\
    \ по-справжньому всім за-\nправляють жін"
  section_title: Сторінка 27
