  text: "У читачів повісті сварки Кайдашихи з невістками часто викликають сміх. Але\
    \ \nпоміркуйте, чому Кайдашиха так хоче «хоч на  старість одпочить». Яку що-\n\
    денну роботу мала виконувати селянська жінка в  часи, коли відбувається \nдія\
    \ твору? Спробуйте дослідити це за текстом твору. Підготуйте презентацію \nсвоїх\
    \ досліджень. \x03\n\x84 Ілюстрація до повісті І. Нечуя-Левицького . «Кайдашева\
    \ сім’я» (Анатолій Базилевич, 1961)"
