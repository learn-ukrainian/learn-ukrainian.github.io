  text: "Підмогильний так схарактеризував свій \nавторський задум: «Написав «Місто»,\
    \ бо люблю \nмісто і не мислю поза ним ні себе, ні своєї робо­\nти. Написав ще\
    \ й тому, щоб наблизити, в міру \nзмоги, місто до української психіки… Аж занад­\n\
    то вже довго жили ми під стріхами, щоб лиши­\nтися романтиками їх». У романі «Місто»\
    \ зображено міське середо-\nвище й розкрито різні грані міської культури, \nтому\
    \ його можна визначити як урбаністичний \nроман (від лат. urbanus — міський).\
    \ Водночас це історія зростання нової "
