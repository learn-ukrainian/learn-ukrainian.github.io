  text: "Роман «Місто» дав критикам розуміння, що автор «цікавиться не людством, \n\
    а людиною». З позицій сьогодення ця  характеристика роману цілком позитивна, \n\
    але наприкінці 1920-х років вона звучала негативно, адже в радянській літературі\
    \ \nпрославляли колективізм, психологізм вважався дрібнобуржуазним, а отже, во-\n\
    рожим панівній ідеології. Тому роман «Місто» критики оцінили як опозиційний \n\
    до пролетарського мистецтва. Хоча молодь захоплювалася твором, жваво його \nобговорювала.\
    \ Літературознавці визначаю"
