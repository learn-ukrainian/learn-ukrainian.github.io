  text: 'Перші два рядки вступу звучать іронічно (пригадайте, що таке

    іронія, цей сатиричний засіб ви вивчали у 8 класі): «У всякого своя

    доля /  І свій шлях широкий...», але те, що це іронія, стає зрозуміло чи-

    тачеві з таких рядків:

    Той мурує, той руйнує,

    Той неситим оком

    За край світа зазирає,

    Чи нема країни,

    Щоб загарбать і з собою

    Взять у домовину.

    Не лише початок, а й майже вся вступна частина пронизана тонкою

    іронією, вона звучить чи не в кожному художньому засобі (епітет,

    метафора, анафора):

    А то'
