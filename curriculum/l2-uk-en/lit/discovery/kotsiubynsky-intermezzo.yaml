  text: 'Час забобонної пошани до сонця пройшов і змінився на тепле співчуття до веселої
    планети (порівн. "Товариш Сонце" М. Семенка), і це не зухвальство "зверх-людини"
    другого, дешевого видання Ніцше — це почуття єдности зі всею працюючою людністю
    і свідомість громадської сили її, що використає сонячну енергію без усякої згоди
    й милости з боку самого сонця. Яка ріжниця між цим і релігійним жахом перед природою,
