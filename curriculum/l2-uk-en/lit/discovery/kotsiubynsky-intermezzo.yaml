  text: "Михайло Коцюбинський. Новела «Intermezzo»    133\nНазва та її роль\nНазва\
    \ новели М. Коцюбинського відсилає \nчитачів до музичної термінології. Італійське\
    \ сло-\nво іntermezzo позначає невелику інструменталь-\nну п’єсу, що виконується\
    \ між частинами опери. Під час іntermezzo слухачі мають можливість \nперепочити\
    \ й  підготуватися до  сприйняття на-\nступної частини складного твору. Обрана\
    \ авто-\nром назва допомагає провести паралель між \nявищами музики й  людським\
    \ життям. Перебу-\nвання на лоні природи є ва"
  section_title: Сторінка 133
  grade: 10
  author: borzenko
  page: ''
  trust_tier: 2
- score: 0.3333333432674408
  chunk_id: 10-klas-ukrlit-borzenko-2018-prof_s0250
  text: "Михайло Коцюбинський. Новела «Intermezzo»    135\nВиявляємо літературну\
    \ компетентність \t\n1. На які настроєві частини поділяється новела? 2. Що переживає\
    \ герой у фіналі твору? 3. З якою художньою метою автор використав прийом контрасту?\
    \ 4. Яку роль у творі відіграють внутрішні монологи? 5. З яким музичним образом\
    \ порівнюється душа людини? 6. В електронному додатку до  підручника знайдіть\
    \ і  перегляньте відео-лекцію \nпро новелу «Intermezzo». Занотуйте основні тези,\
    \ які доводить авторка лекції. З я"
  section_title: Сторінка 135
  grade: 10
  author: borzenko
  page: ''
  trust_tier: 2
- score: 0.25
  chunk_id: 10-klas-ukrlit-borzenko-2018-prof_s0247
  text: "Є також «ниви в червні», «сонце», «три білих \nвівчарки», «зозуля», «жайворонки»,\
    \ «залізна рука \nгорода» та «людське горе». Відсутність розвиненого сюжету компенсу-\n\
    ється внутрішнім драматизмом та  емоційною \nспонтанністю. Пливучи за  течією\
    \ своєї вто-\nми, герой новели мимоволі втягується у  вир \nсуб’єктивних образів\
    \ та асоціацій, що залучають \nйого до вищої «драматургії буття». Виявляємо літературну\
    \ компетентність \t\n1. Що означає слово іntermezzo в музиці? 2. Чому автор дав\
    \ таку назву своєму тво"
  section_title: Сторінка 133
  grade: 10
  author: borzenko
  page: ''
  trust_tier: 2
