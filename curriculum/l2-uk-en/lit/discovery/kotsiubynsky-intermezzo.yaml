  text: "Найсильніша художньо річ Коцюбинського — новела\r\n«Intermezzo». Потреба\
    \ в самотності дає можливість людині не просто відпочити —\r\nсприйняти саму суть\
    \ життя, пережити сенс його, відчути одвічну полярність\r\nсвітла й темряви. Герой\
    \ звертається до сонця: «З тьми «невідомого» з’явився я\r\nна світ, і перший віддих,\
    \ і перший рух мій — в темряві матнього лона. І досі\r\nтой морок наді мною панує\
    \ — всі ночі, половину мого життя стоїть він між мною\r\nй тобою. Його слуги —\
    \ хмари, гори, темниці — закривають тебе"
