  text: '"Соняшні кларнети" засвідчили психологічний стан людини, повної сподіваної
    радості, більше чутої, аніж осмисленої, радості перед звершенням. Це стан розкошування
    людської особистості на розгородженій території існування, особистості, вивільненої
    від старих канонів, особистості в час первотворення і особистості передовсім.
    Так дитина відкриває для себе світ — уперше. Це стан існування, як спалаху, існування,
    невимірного ні в часі, ні в просторі — адже це існування поза звичкою, каноном,
    необхідні'
