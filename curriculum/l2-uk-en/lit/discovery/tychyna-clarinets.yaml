  text: 'Павло Тичина повстає перед нами своєю поетичною постаттю, як поет кількох
    періодів. І коли вся справа в "Сонячних кларнетах", то ми кажемо: Тичина першого
    періоду — це поет пантеїстичного світовідчування, поет, який пізнав глибину природи
    й ототожнює її з початками сущого.


    Звичайно, "котелковим" модникам, "петроградським писарям" од формалізму ця збірка
    здасться відсталою, бо вони в ній бачать тільки "звукальність". А ми от кажемо:
    це — зразок мистецтва. "Дзеньки-бреньки" чупринівські також від'
