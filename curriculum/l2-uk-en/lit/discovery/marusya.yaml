  text: 'Через два роки до Насті й Наума прийшов чоловік із міста, який роз-

    повів, що бачив там Василя, який постригся в ченці. Тяжко переживаючи

    втрату, він згодом помер. 5. Опрацюйте літературно-критичний матеріал до повісті.
    За жанром «Маруся» — соціально-побутова й сентиментально-

    реалістична повість. У ній зображено життя українського селянства,

    працю, побут, звичаї українського народу (тема твору). За основу сюжету повісті
    взято історію ідеального кохання

    сільської дівчини Марусі та міського хлопц'
