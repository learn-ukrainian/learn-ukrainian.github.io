  text: "У всіх названих баладах сплітається дійсний світ із\r\nказковим світом; у\
    \ всіх звертається Шевченко до народної фантастики, до\r\nнародних вірувань. У\
    \ баладі «Причинна» дівчина серед бурхливої ночі блукає\r\nберегами Дніпра, що\
    \ «реве та стогне» далеко й широко, «горами хвилі підійма».\r\nВорожка при помочі\
    \ чарів зробила її «причинною», щоб менше тужила за милим,\r\nякий пішов на чужину.\
    \ Аж ось із дніпрового дна виринають при сяйві місячного\r\nсвітла русалки й її\
    \ залоскочують. Тим часом на вороному коні над"
