content_outline:
- points:
  - 'Провокація: Чи є «Захар Беркут» романом про ХІІІ століття, чи це замаскована програма для Галичини ХІХ століття?'
  - 'Фрагмент з твору: "Доки будете жити в громадськім порядку, дружно держатися купи, ніяка ворожа сила не побідить вас".
    — Наскільки це гасло актуальне сьогодні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Твір як історична реконструкція. Франко використовує літописні джерела та етнографічний матеріал для відтворення
    минулого. Позиція: це спроба науково обґрунтувати тяглість української державності.'
  - 'Дебат 2: Твір як політична алегорія. Тухольська громада — модель ідеального суспільства для сучасної Франкові Галичини.
    Монголи — метафора будь-якої імперської сили (Австро-Угорської, Російської).'
  - '[!epistemic-humility] Літературна критика розглядає твір і як зразок романтичного історизму, і як ранній приклад політичної
    інженерії засобами літератури.'
  section: 'Конфліктна карта: Історичний роман чи політична алегорія?'
  words: 900
- points:
  - 'Розбір ключової сцени: рада тухольської громади. Аналіз механізмів прийняття рішень, ролі Захара Беркута.'
  - 'Система персонажів: Захар Беркут (колективне начало) vs. Тугар Вовк (індивідуалізм, зрада). Максим та Мирослава як синтез
    двох світів.'
  - 'Конфлікт як рушійна сила: зовнішній (боротьба з монголами) та внутрішній (конфлікт цінностей усередині руського суспільства).'
  - '[!decolonization] Твір руйнує імперський міф про "дикі" та "недержавні" народи. Франко показує складну соціальну організацію
    та здатність до самоврядування, спростовуючи колоніальні наративи Відня та Петербурга.'
  section: 'Читання: Громада проти зради'
  words: 1700
- points:
  - 'Стилістичні інновації: Франко поєднує мову, стилізовану під старовину (архаїзми, синтаксичні конструкції), з модерною
    психологічною прозою.'
  - 'Робота з народною мовою: використання діалектизмів, фольклорних образів та символів (Сторож, священний камінь).'
  - '[!myth-buster] Це не просто "дитяча" пригодницька повість. Синтаксис та лексика твору відображають складні філософські
    ідеї Франка про суспільний договір та еволюцію громад.'
  - 'Архетипи та міфологічні підтексти: Захар як "мудрий старець", Тугар Вовк як "тінь", битва в долині як космогонічний акт
    творення нового порядку.'
  section: 'Мова і поетика: Поєднання історизму та модерного стилю'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, «Захар Беркут» — це втеча в минуле чи інструкція для майбутнього?'
  - 'Рецепція твору: як змінювалося сприйняття повісті від моменту написання до радянської екранізації та сучасних інтерпретацій?'
  - '[!anti-hagiography] Чи не є ідеалізована громада Тухлі такою ж утопією, як і комуністичні проекти? Критичний погляд на
    модель суспільства, запропоновану Франком.'
  - 'Питання для роздумів: Які уроки «Захара Беркута» є актуальними для України в умовах сучасної війни за незалежність?'
  section: Дискусія та підсумок
  words: 700
focus: '«Захар Беркут» Івана Франка: аналіз історичної повісті як політичної алегорії, deconstruction of the community vs.
  individual conflict, and its decolonial significance in the context of the Austro-Hungarian Empire.'
