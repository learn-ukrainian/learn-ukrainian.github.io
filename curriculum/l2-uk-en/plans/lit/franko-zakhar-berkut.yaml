objectives:
- Аналізувати повість «Захар Беркут» як історичний документ та як політичну алегорію.
- Визначати та інтерпретувати ключові конфлікти, символи та персонажів твору.
- Досліджувати стилістичні особливості тексту, що поєднують історизм та модернізм.
- Формулювати аргументовану позицію щодо деколонізаційного значення твору в контексті української історії та сьогодення.
