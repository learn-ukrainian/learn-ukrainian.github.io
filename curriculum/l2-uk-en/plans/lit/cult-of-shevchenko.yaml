content_outline:
- points:
  - 'Провокація: Чи може поет стати настільки великим, що його перестають читати? Розглянемо Тараса Шевченка.'
  - 'Цитата-загадка: "Він був сином мужика і став володарем у царстві духа". Хто це сказав і про кого? Відповідь може вас
    здивувати.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська канонізація vs. Діаспорна. Радянська влада ліпила з нього "революціонера-демократа", борця з царизмом,
    замовчуючи антиімперську, антиросійську суть його поезії. Діаспора ж бачила в ньому "батька нації", пророка незалежної
    України.'
  - 'Дебат 2: Деканонізація vs. Ревіталізація. Чи є сучасні меми, проєкт "Квантовий стрибок Шевченка" та татуювання з поетом
    "десакралізацією" і неповагою? Або це єдиний спосіб зробити його знову живим і релевантним для покоління Z?'
  - '[!epistemic-humility] Не існує "одного правильного" Шевченка. Кожна епоха і кожна ідеологія створює свого, використовуючи
    його як дзеркало для власних прагнень і страхів.'
  section: 'Конфліктна карта: Шевченко — Революціонер чи Націоналіст?'
  words: 900
- points:
  - 'Текст 1: Радянський підручник. Аналіз того, як вірш "Заповіт" інтерпретувався як заклик до класової боротьби, а не національного
    визволення.'
  - '[!decolonization] Вилучення "незручних" цитат про "москалів" та "імперію" як ключовий інструмент колоніальної апропріації
    українського національного поета.'
  - 'Текст 2: Пам''ятник Шевченку у Вашингтоні. Аналіз монумента як політичного маніфесту української діаспори в часи Холодної
    війни. Символізм "Прометея, що несе вогонь свободи".'
  - 'Текст 3: Мем "Ахмат, постріляй їх". Розбір сучасного інтернет-фольклору, де Шевченко постає як жорсткий, безкомпромісний
    коментатор сучасних подій, що кардинально відрізняється від образу "дідуся в кожусі".'
  section: 'Читання: Культурні Тексти Шевченківського Міфу'
  words: 1700
- points:
  - 'Аналіз мови сакралізації: епітети ("пророк", "кобзар", "батько"), метафори ("духовний володар", "голос нації"), ритуальна
    лексика ("вшанування", "паломництво").'
  - 'Стилістика пам''ятників: від реалістичних зображень у XIX ст. до модерністських та абстрактних у XX-XXI ст. Як змінюється
    візуальна мова культу?'
  - '[!myth-buster] Руйнування міфу про "народного поета-самоука". Шевченко був освіченою людиною, академіком гравюри, що
    добре знав світову літературу. Його "простота" — це витончений стилістичний вибір, а не відсутність освіти.'
  - 'Інтертекстуальність міфу: як образ Шевченка використовується у творах інших поетів (Стус, Костенко) для створення діалогу
    через покоління.'
  section: 'Мова і поетика: Риторика Національного Батька'
  words: 1500
- points:
  - 'Повернення до розминки: то як уникнути "бронзовіння" класика? Як читати Шевченка, а не просто "вшановувати" його?'
  - '[!anti-hagiography] Критичний погляд на концепт "Національного Батька". Ризики сакралізації: перетворення живої людини
    на недоторканну ікону, що вбиває критичне мислення і створює "шкільний тягар".'
  - 'Сучасна релевантність: Чому Шевченко досі є таким потужним символом у сучасній російсько-українській війні? Які його
    ідеї та образи є найбільш затребуваними сьогодні?'
  - 'Рефлексія: Який ваш особистий Шевченко? Після цього аналізу, чи змінилося ваше ставлення до нього?'
  section: Дискусія та підсумок
  words: 700
focus: The evolution of Taras Shevchenko's image from poet to national icon, myth, and symbol. Analysis of Soviet, diasporic,
  and modern pop-culture reinterpretations and the risks of cultural canonization.
level: LIT
module: lit-020
objectives:
- Аналізувати еволюцію образу Шевченка від поета до національного міфу.
- Порівнювати радянську, діаспорну та сучасну інтерпретації постаті Шевченка.
- Критично оцінювати ризики та переваги культурної канонізації та сакралізації.
- Формулювати власну аргументовану позицію щодо способів "оживлення" класичної спадщини.
pedagogy: CBI
