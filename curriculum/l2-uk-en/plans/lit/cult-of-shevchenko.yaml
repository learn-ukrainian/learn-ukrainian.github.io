vocabulary_hints:
- definition: сприйняття та інтерпретація творчості автора суспільством, критикою, різними епохами.
  pos: ж.
  word: рецепція
- definition: процес перетворення автора чи твору на непорушний взірець, класику, частину національного канону.
  pos: ж.
  word: канонізація
- definition: свідоме руйнування статусу класика, перегляд його ролі та значення, "скидання з п'єдесталу".
  pos: ж.
  word: деканонізація
- definition: надання чомусь або комусь священного, недоторканного статусу, перетворення на об'єкт культу.
  pos: ж.
  word: сакралізація
- definition: у культурному сенсі — спрощена, символічна історія, що пояснює світ і формує ідентичність спільноти.
  pos: ч.
  word: міф
- definition: символічне зображення, що є об'єктом поклоніння та наслідування, втрачаючи людські риси.
  pos: ж.
  word: ікона
- definition: нове прочитання, нове тлумачення класичного твору чи образу з позицій сучасності.
  pos: ж.
  word: реінтерпретація
- definition: частина народу, що проживає за межами країни свого походження.
  pos: ж.
  word: діаспора
- definition: одиниця культурної інформації, що швидко поширюється в інтернеті, часто в гумористичній формі.
  pos: ч.
  word: мем
- definition: почуття належності до певної групи чи спільноти, усвідомлення себе її частиною.
  pos: ж.
  word: ідентичність
