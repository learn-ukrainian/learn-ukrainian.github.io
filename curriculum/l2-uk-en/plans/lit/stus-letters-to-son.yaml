objectives:
- Аналізувати епістолярний твір як унікальний синкретичний жанр на межі документа, філософського трактату та ліричної прози
- Досліджувати мову та поетику Стуса, зокрема його синтаксичні стратегії та роботу з лексикою в умовах ізоляції
- Оцінювати творчість Стуса в деколонізаційній перспективі як акт культурного опору радянській системі
- Формулювати власну аргументовану позицію щодо етичних та естетичних дилем, що виникають при аналізі "межових" текстів
