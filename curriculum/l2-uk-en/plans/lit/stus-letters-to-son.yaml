content_outline:
- points:
  - 'Провокація: "Чи можна вважати приватне листування батька до сина повноцінним літературним твором? А політичним маніфестом?"'
  - 'Уривок з листа: "Найголовніше — виробити в собі самому такий внутрішній світ, щоб він був опертям і для тебе самого,
    і для твоїх близьких."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Приватне vs Публічне. Чи були ці листи суто особистим виявом батьківської любові, чи Стус усвідомлював, що пише
    для історії, створюючи документ епохи?'
  - 'Дебат 2: Етика vs Естетика. Чи маємо ми право аналізувати ці тексти з холодним філологічним інструментарієм, чи їхня
    трагічна передісторія вимагає іншого, більш емпатичного підходу?'
  - '[!epistemic-humility] Інтерпретації розходяться: одні бачать у листах філософський трактат стоїків, інші — інтимну сповідь,
    треті — програму національного спротиву.'
  section: 'Конфліктна карта: Лист як маніфест'
  words: 900
- points:
  - 'Аналіз ключових уривків: Стус про роль поета, про Україну, про гідність.'
  - 'Образ Сина (Дмитра): реальний адресат і водночас узагальнений образ майбутнього покоління, до якого звертається поет.'
  - '[!decolonization] Листи як акт культурного опору. В умовах тотальної русифікації та нищення української культури, Стус
    створює корпус текстів, що стверджує незнищенність українського духу та мови.'
  - 'Конфлікт батьківського та громадського: трагедія людини, змушеної обирати між сім''єю та боротьбою за вищі ідеали.'
  section: 'Читання: Листи з неволі'
  words: 1700
- points:
  - 'Синтаксис як віддзеркалення світогляду: короткі, уривчасті речення, афористичність, імперативні конструкції. Мова, що
    карбує, а не розтікається.'
  - 'Лексичний аналіз: високий стиль, філософська термінологія, архаїзми, протиставлення "духовного" та "матеріального".'
  - 'Робота зі словом в умовах ізоляції: Стус "перечитує" світову культуру по пам''яті, створюючи унікальний інтертекстуальний
    простір.'
  - '[!myth-buster] Це не просто "тюремна проза". Це філігранно вибудувана філософсько-лірична система, де кожне слово має
    вагу, а кожна синтаксична пауза — сенс.'
  section: 'Мова і поетика: Стоїцизм синтаксису'
  words: 1500
- points:
  - 'Повернення до розминки: чи є листи літературою? Формулювання власної позиції студентом.'
  - '[!anti-hagiography] Як уникнути "бронзовіння" Стуса? Обговорення його як живої людини з сумнівами та болем, а не лише
    як ікони національного спротиву.'
  - 'Рецепція творчості: як сприймали листи у 90-ті і як їх читають сьогодні, в контексті нової війни за незалежність?'
  - 'Сучасне значення: що "Листи до сина" можуть сказати сучасному українцю про вибір, гідність та ціну свободи?'
  section: Дискусія та підсумок
  words: 700
focus: 'Листи до сина Василя Стуса: стоїцизм, мова як опір, конфлікт між батьківським та громадським обов''язком'
