content_outline:
- points:
  - 'Провокація: Чи є українська література другої половини XX століття серією розрізнених бунтів, чи єдиним, послідовним
    проєктом інтелектуального опору?'
  - 'Архетип для роздумів: чим є «сталева нитка», що пов''язує шістдесятників, київську школу, та Бу-Ба-Бу крізь десятиліття
    репресій та цензури?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи вели пізніші автори свідомий діалог із попередниками (шістдесятниками), чи кожен новий рух був спробою радикального
    розриву з минулим? [!epistemic-humility]'
  - 'Дебат 2: Що було первинним — естетичний експеримент чи політичний жест? Чи можна відокремити деконструкцію імперського
    наративу від трансформації літературної мови?'
  - 'Позиція А (Теорія тяглості): Література як системний процес, де кожне покоління переосмислює ідеї та форми попередників.'
  - 'Позиція Б (Теорія розривів): Література як відповідь на історичні травми, де кожен новий етап — це спроба почати з чистого
    аркуша.'
  section: 'Конфліктна карта: Діалог чи Розрив?'
  words: 900
- points:
  - 'Аналіз спільних стратегій інтелектуального опору в різних жанрах: від «табірної» поезії до карнавальної прози.'
  - 'Деконструкція імперського наративу: порівняння методів, якими автори розвінчували міфи про «братні народи» та «спільну
    історію». [!decolonization]'
  - 'Приклад 1: Як поезія Стуса і Калинця створює простір внутрішньої свободи в умовах несвободи.'
  - 'Приклад 2: Як проза Андруховича та Іздрика використовує іронію та гротеск для демонтажу радянської ментальності.'
  - 'Зв''язок поколінь: простежуємо, як ідея «внутрішньої еміграції» шістдесятників трансформується в «карнавальну республіку»
    Бу-Ба-Бу.'
  section: 'Читання: Деколонізаційна оптика як сталева нитка'
  words: 1700
- points:
  - 'Порівняльний аналіз авторських технік та мовних експериментів: герметичний образ Стуса, асонансна інструментовка київської
    школи, лексична гра Бу-Ба-Бу.'
  - 'Трансформація літературної мови: від нормативної чистоти до свідомого введення суржику, діалектизмів та арго як художнього
    прийому.'
  - 'Інтертекстуальність як інструмент: як автори використовували посилання на світову та українську класику для створення
    нових смислів.'
  - '[!myth-buster] Міф про «однорідність» стилю епохи. Демонстрація того, як різні автори, вирішуючи схожі завдання, використовували
    діаметрально протилежні поетики.'
  section: 'Мова і поетика: Стилістичний калейдоскоп'
  words: 1500
- points:
  - 'Повернення до розминки: тож це бунти чи єдиний проєкт? Студент формулює власну відповідь, спираючись на матеріал модуля.'
  - 'Конструювання образу українського суб''єкта: як література цього періоду формувала нову філософію ідентичності — вільної,
    критичної, європейської.'
  - '[!anti-hagiography] Критичний погляд на канон: чи всі тексти, що вважаються «канонічними», витримують перевірку часом?
    Які твори ми незаслужено забули?'
  - 'Спадщина та горизонти майбутнього: Як вплив цього періоду відчувається в сучасному літературному процесі? Яке значення
    має цей канон для інтелектуальної безпеки нації сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: 'Діахронний синтез українського літературного процесу пізнього XX століття: деколонізація, міжтекстовий діалог та філософія
  ідентичності'
level: LIT
module: lit-170
objectives:
- Синтезувати знання про літературний процес вивченого періоду, виявляючи ключові тенденції та конфлікти.
- Застосовувати деколонізаційну оптику для аналізу взаємозв'язків між авторами та поколіннями.
- Оцінювати тяглість та розриви в українській інтелектуальній традиції, формулюючи власну аргументовану позицію.
- Порівнювати стилістичні стратегії та мовні експерименти авторів епохи як форми мистецького та громадянського висловлювання.
