vocabulary_hints:
- definition: Історичний розвиток мовних, культурних або літературних явищ у часі, на відміну від синхронії (стану в певний
    момент).
  pos: ж.
  word: діахронія
- definition: Процес або результат поєднання різних, часто протилежних, елементів, ідей чи стилів у нову, органічну цілісність.
  pos: ч.
  word: синтез
- definition: Первісний, універсальний образ, мотив або модель, що лежить в основі колективного несвідомого і проявляється
    в міфах, мистецтві та снах.
  pos: ч.
  word: архетип
- definition: Властивість тексту містити посилання, алюзії або цитати з інших текстів, створюючи між ними діалог.
  pos: ж.
  word: інтертекстуальність
- definition: Сукупність висловлювань, текстів та практик, об'єднаних спільною темою, ідеологією та правилами; усталений спосіб
    говорити про щось.
  pos: ч.
  word: дискурс
- definition: Процес позбавлення від колоніальної спадщини, що охоплює не лише політичну незалежність, а й культурне та інтелектуальне
    звільнення.
  pos: ж.
  word: деколонізація
- definition: Здатність індивіда чи спільноти бути активним, свідомим і вільним діячем власної історії, а не пасивним об'єктом
    зовнішніх сил.
  pos: ж.
  word: суб'єктність
