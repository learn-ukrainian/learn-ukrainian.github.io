activity_hints:
- description: Визначити, яка позиція ("тяглість" чи "розриви") відповідає наведеним тезам про український літературний процес.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставити в речення з модуля правильний термін: діахронія, синтез, архетип, інтертекстуальність, дискурс, суб''єктність.'
  focus: Ключові терміни синтезу
  items: 6
  type: fill-in
- description: 'На основі матеріалів модуля, порівняйте деколонізаційні стратегії двох умовних авторів: "поета-герметика"
    та "прозаїка-карнаваліста". Вкажіть на спільні цілі та відмінні методи (300-400 слів).'
  focus: 'Компаративний аналіз: Стратегії опору'
  type: note
- description: 'Аргументуйте або спростуйте тезу: "Канон української літератури XX століття є ключовим елементом національної
    інтелектуальної безпеки". Використовуйте приклади з модуля (400-600 слів).'
  focus: 'Есе: Значення канону для інтелектуальної безпеки'
  type: note
cefr_min: C1
connects_to:
