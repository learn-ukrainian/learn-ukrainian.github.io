objectives:
- Аналізувати прозу Гната Хоткевича в контексті українського модернізму
- Пояснювати, як Хоткевич використовує гуцульський діалект як складний художній інструмент, а не лише для етнографічного колориту
- Формулювати аргументовану позицію в літературній дискусії (етнографізм vs модернізм)
- Оцінювати деколонізаційне значення твору як спосіб повернути українську суб'єктність регіону Карпат
