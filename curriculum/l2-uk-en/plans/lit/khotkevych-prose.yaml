content_outline:
- points:
  - 'Провокація: Гнат Хоткевич — етнограф, що скрупульозно задокументував життя гуцулів, чи модерніст, що використав екзотичний
    матеріал для створення універсального міфу?'
  - Цитата з твору, що показує жорстокість і первісність світу Карпат, кидаючи виклик романтичному образу "шляхетного дикуна"
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Камінна душа" — це реалістичний опис гуцульського життя чи символістський роман? Позиція "народників" (текст
    як дзеркало) vs позиція модерністів (текст як конструкція)'
  - 'Дебат 2: Хоткевич — регіональний письменник чи центральна постать українського модерну? Його місце в каноні в дорадянський,
    радянський та сучасний періоди'
  - '[!epistemic-humility] Критика досі не дійшла згоди, що в тексті є автентичним гуцульським матеріалом, а що — авторською
    стилізацією та міфотворчістю'
  section: 'Конфліктна карта: Етнографізм vs Модернізм'
  words: 900
- points:
  - 'Аналіз сюжету: не як хроніка опришківського руху, а як історія становлення та занепаду міфологічного героя'
  - 'Система персонажів: Маруся як втілення "кам''яної душі" народу, її стосунки з чоловіками як різні фази національного
    буття (рабство, боротьба, зрада)'
  - 'Конфлікт: боротьба не лише соціальна (опришки vs пани), а й екзистенційна — людина vs фатум, християнство vs язичництво'
  - '[!decolonization] Текст відвойовує Карпати для українського наративу, заперечуючи польські та австрійські імперські міфи
    про "дикий, неісторичний простір"'
  section: 'Читання: Камінна душа'
  words: 1700
- points:
  - 'Стилістичні інновації: Хоткевич не просто "записує" діалект, а конструює з нього вишукану літературну мову, здатну передавати
    найскладніші філософські ідеї'
  - 'Аналіз синтаксису: ритмічна проза, інверсії, паралелізми, що створюють ефект епічної оповіді, "думи в прозі"'
  - 'Функція діалектизмів: не лише для "колориту", а для створення особливого, "магічного" світу, що живе за своїми законами'
  - '[!myth-buster] Хоткевич — не примітивіст. Його використання діалекту — це свідома модерністська техніка, споріднена з
    експериментами Джеймса Джойса з ірландською мовою'
  section: 'Мова і поетика: Гуцульський діалект як художній інструмент'
  words: 1500
- points:
  - 'Повернення до розминки: тож етнограф чи модерніст? Студент формулює власну позицію на основі аналізу'
  - 'Рецепція твору: як "Камінну душу" читали сучасники, як її інтерпретувала радянська критика (замовчуючи модернізм), і
    як ми читаємо її сьогодні'
  - '[!anti-hagiography] Чи не ідеалізує Хоткевич архаїчне, патріархальне суспільство? Критичний погляд на зображення насильства
    та ролі жінки в тексті'
  - 'Сучасна релевантність: що "Камінна душа" говорить про стосунки між "центром" та "регіоном", про силу та небезпеку міфу
    в національній свідомості?'
  section: Дискусія та підсумок
  words: 700
focus: Гнат Хоткевич, "Камінна душа", гуцульська проза, український модернізм, стилізація та діалектизм, деколонізація образу
  Карпат
