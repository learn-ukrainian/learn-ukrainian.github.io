content_outline:
- points:
  - 'Провокація: Чи можна збудувати щастя на чужому нещасті? Історія Стефанії та Аделі як лакмусовий папірець для "щасливої
    Австрії".'
  - 'Цитата без контексту: "Дивною, незбагненною була наша любов. Як і наша ненависть". Про кого ці слова і що вони приховують?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Фелікс Австрія" — це ностальгія за Габсбурзькою імперією чи її тонка постколоніальна критика? Чи є ідилічний
    Станіславів пасткою для пам''яті?'
  - 'Дебат 2: Феміністична драма vs Психологічний трилер. Стосунки Стефи та Аделі — це історія жіночої співзалежності чи розповідь
    про травму, пам''ять та зрештою звільнення?'
  - '[!epistemic-humility] Критики досі сперечаються, чи є роман апологетикою "втраченого раю" чи його деконструкцією через
    особисту драму.'
  section: 'Конфліктна карта: Ностальгія чи критика імперії?'
  words: 900
- points:
  - 'Аналіз ключових сцен: Вечері, ритуали, приготування їжі — як гастрономічний код розкриває приховані емоції та соціальну
    ієрархію.'
  - 'Структура оповіді: Щоденник Стефанії як ненадійне джерело. Як те, про що вона мовчить, стає важливішим за те, що вона
    говорить?'
  - 'Система персонажів: Тріумвірат Стефа-Аделя-Петро. Хто насправді є "третім зайвим" у цих стосунках?'
  - '[!decolonization] Роман показує багатокультурний міф австро-угорського міста, але водночас виявляє українську основу,
    яка залишається навіть після зникнення імперії.'
  section: 'Читання: "Фелікс Австрія"'
  words: 1700
- points:
  - 'Стилістичні інновації: Мова роману як вишукана стилізація під щоденникову прозу початку ХХ століття. Роль чуттєвих описів
    — запахів, смаків, текстур.'
  - 'Символіка їжі: Кожна страва — це метафора. Солодощі як компенсація гіркоти життя, екзотичні фрукти як мрія про інший
    світ.'
  - 'Лексика: Поєднання архаїзмів, діалектизмів та поетичної мови для створення унікальної атмосфери "Belle Époque" на галицькому
    ґрунті.'
  - '[!myth-buster] Це не просто "жіночий роман" чи історична мелодрама. Це складний текст про природу пам''яті, влади та
    любові, замаскований під легкий жанр.'
  section: 'Мова і поетика: Гастрономічний символізм'
  words: 1500
- points:
  - 'Повернення до розминки: Як прочитання роману змінило ваше розуміння "любові" та "ненависті" у стосунках головних героїнь?'
  - 'Рецепція твору: Чому "Фелікс Австрія" став бестселером і отримав численні нагороди? Який запит у суспільстві він задовольнив?'
  - '[!anti-hagiography] Аналіз "темних сторін" персонажів. Чи є Стефанія жертвою, чи маніпулятором? Чи є Аделя невинною аристократкою?'
  - 'Питання для роздумів: Чи можливий "Фелікс Україна"? Які умови потрібні для того, щоб країна відчула себе щасливою?'
  section: Дискусія та підсумок
  words: 700
focus: 'Роман "Фелікс Австрія" Софії Андрухович: аналіз міфу про галицький "золотий вік", дослідження токсичних співзалежних
  стосунків та гастрономічний вимір як ключ до розуміння епохи та психології персонажів.'
