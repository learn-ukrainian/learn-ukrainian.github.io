content_outline:
- points:
  - 'Провокативне питання: Чи є «Тіні забутих предків» просто красивою казкою про кохання, чи це маніфест українського модернізму,
    що ховається за етнографічною маскою?'
  - 'Цитата-загадка: «Він був як бог, знаючий і сильний, той давній гуцул, що спілкувався з сонцем, і з зорями, з землею і
    водою». Про кого це і чому це важливо?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Тіні» — це детальний етнографічний запис зникаючого світу гуцулів, чи це універсальна психологічна драма, де
    фольклор є лише тлом для дослідження людської душі?'
  - 'Дебат 2: Місце Коцюбинського в каноні. Радянське літературознавство бачило в ньому «сонцепоклонника», співця народу.
    Сучасні критики — трагічного модерніста, що досліджував межові стани свідомості.'
  - '[!epistemic-humility] Не існує єдиної «правильної» інтерпретації. Текст є полем для боротьби різних критичних шкіл: від
    культурно-історичної до психоаналітичної та постколоніальної.'
  section: 'Конфліктна карта: Етнографія проти психологізму'
  words: 900
- points:
  - 'Основний сюжет: аналіз ключових епізодів — знайомство, втрата, зрада, смерть та возз''єднання у потойбіччі. Як структура
    сюжету віддзеркалює циклічність природи?'
  - 'Система персонажів: Іван (людина природи), Марічка (душа, пісня), Палагна (тіло, побут), Юра (ворожа, руйнівна сила).
    Конфлікт між духовним та матеріальним світом.'
  - 'Природа як дійова особа: Карпати, Черемош, гори — це не просто фон, а активні учасники драми, що визначають долю героїв.'
  - '[!decolonization] Коцюбинський пише про Гуцульщину не як екзотичну колонію (польський чи російський погляд), а як про
    самодостатній, автентичний український мікрокосмос зі своєю унікальною філософією.'
  section: 'Читання: Історія Івана та Марічки'
  words: 1700
- points:
  - 'Імпресіонізм у прозі: аналіз «кольорових» епітетів, звукопису, синестезії. Як Коцюбинський «малює» словами, передаючи
    миттєві враження та настрої.'
  - 'Символізм: детальний розбір ключових символів — ватра (життя/пристрасть), вода (плинність/смерть), тіні (пам''ять/потойбіччя).
    Як предмети стають знаками.'
  - 'Ритм і синтаксис: аналіз ритмічної прози, інверсій, повторів. Як структура речення створює «магічний», заклинальний ефект.'
  - '[!myth-buster] Мова твору — це не просто «народна говірка». Це витончена стилізація, де діалектизми є художнім засобом,
    а не метою, створюючи унікальну мовну партітуру.'
  section: 'Мова і поетика: Музика, колір та символ'
  words: 1500
- points:
  - 'Повернення до розминки: тож казка чи маніфест? Формулювання студентом власної аргументованої позиції.'
  - 'Рецепція твору: як «Тіні» сприймалися сучасниками? Чому екранізація Параджанова стала світовим шедевром і водночас «антирадянським»
    викликом?'
  - 'Сучасне значення: що історія Івана та Марічки може сказати українцям у XXI столітті — про вірність собі, про зв''язок
    з корінням, про ціну життя?'
  - '[!anti-hagiography] Чи не ідеалізує Коцюбинський патріархальний світ гуцулів? Наскільки «автентичним» є цей міф, створений
    інтелектуалом-модерністом?'
  section: Дискусія та підсумок
  words: 700
