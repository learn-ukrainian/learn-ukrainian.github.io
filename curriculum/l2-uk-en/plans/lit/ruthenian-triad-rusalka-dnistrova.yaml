content_outline:
- points:
  - 'Провокація: Як книга віршів та народних пісень могла стати настільки небезпечною, що її заборонила ціла імперія?'
  - 'Фрагмент з передмови Шашкевича: «...час уже, аби Русь очутилася... і своєю мовою... правду і науку розширяла». Без контексту
    — про яку «правду» і «науку» йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Русалка Дністровая» — фінальний акорд Просвітництва чи перший маніфест Романтизму? Позиція Віденської цензури
    (освічений абсолютизм) vs програма «Руської Трійці» (народний дух).'
  - 'Дебат 2: Це був суто культурний проєкт чи прихований політичний? Аргументи за «культурництво» (фольклористика, лінгвістика)
    vs аргументи за «політику» (ствердження окремої ідентичності, що загрожувало імперії).'
  - '[!epistemic-humility] Інтерпретації спадщини Трійці досі є полем для дискусій: були вони лояльними просвітителями, яких
    неправильно зрозуміли, чи свідомими революціонерами духу?'
  section: 'Конфліктна карта: Просвітництво чи Романтизм?'
  words: 900
- points:
  - 'Аналіз ключової тези: «Мати Русь є одним з найперших і найсильніших народів слов''янських». Як цей рядок руйнує імперський
    наратив про «неісторичність» українців?'
  - 'Розбір аргументів за використання народної мови: відкидання «мертвої» церковнослов''янської та «чужої» польської. Це
    не просто вибір стилю, а вибір цивілізаційної орієнтації.'
  - '[!decolonization] «Русалка Дністровая» як акт культурного суверенітету. Демонстрація того, що українська мова є самодостатньою
    для філософії, науки та високої поезії, а не лише для «побутових» пісень.'
  - 'Аналіз структури альманаху: як добір текстів (пісні, авторська поезія, історичні статті, переклади) створює образ повноцінної
    національної культури.'
  section: 'Читання: Передмова Маркіяна Шашкевича'
  words: 1700
- points:
  - 'Лінгвістична революція: введення фонетичного правопису («руський правопис») замість етимологічного. Аналіз конкретних
    прикладів і чому це було так радикально.'
  - 'Стилістичний аналіз поезії Шашкевича та Вагилевича: як вони адаптували метрику та образи європейського романтизму до
    української мови та фольклорної традиції.'
  - 'Діалектизми та неологізми: свідоме використання галицьких говірок як джерела для збагачення літературної мови. Це була
    «провінційність» чи «автентичність»?'
  - '[!myth-buster] Це не було просто «записуванням того, як говорять селяни». Це був складний процес селекції, кодифікації
    та естетизації народної мови, щоб перетворити її на інструмент високої культури.'
  section: 'Мова і поетика: Створення нового літературного стандарту'
  words: 1500
- points:
  - 'Повернення до розминки: Чому книга була небезпечною? Відповідь студента з опорою на аналіз: бо вона стверджувала існування
    окремого народу з власною мовою, історією та правом на майбутнє.'
  - 'Спадщина «Русалки»: програш у цензурній битві, але перемога в історичній перспективі. Як альманах вплинув на наступні
    покоління, зокрема на Шевченка та Франка?'
  - '[!anti-hagiography] Трагедія «Руської Трійці»: короткий спалах співпраці, а потім розходження шляхів, звинувачення та
    зламані долі. Чи міг їхній проєкт бути більш успішним?'
  - 'Сучасна релевантність: як боротьба за мову в XIX столітті перегукується з сучасними дискусіями про роль української мови
    в глобалізованому світі?'
  section: Дискусія та підсумок
  words: 700
focus: «Русалка Дністровая» як культурний маніфест, боротьба за народну мову, конфлікт з імперською цензурою, зародження модерної
  української ідентичності в Галичині.
level: LIT
module: lit-229
objectives:
- Аналізувати роль «Русалки Дністрової» як маніфесту українського романтизму в Галичині.
- Порівнювати мовну та культурну програму «Руської Трійці» з попередніми та наступними літературними епохами.
- Пояснювати зв'язок між використанням народної мови та формуванням модерної національної ідентичності.
- Критично оцінювати причини та наслідки цензурної заборони альманаху.
