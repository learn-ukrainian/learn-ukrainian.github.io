content_outline:
- points:
  - 'Провокація: цитата з «Геростратів» про реальність, що вивертається навиворіт. Чи може світ бути саме таким, як його описує
    Андієвська?'
  - 'Візуальний гачок: картина самої Андієвської без підпису. Що спільного між цим живописом та її літературою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Андієвська — це український сюрреалізм за французьким зразком чи унікальна версія магічного реалізму, ближча
    до латиноамериканців?'
  - 'Дебат 2: Нью-Йоркська група — «чисте мистецтво» чи прихований політичний проєкт? Естетична еміграція як форма опору радянській
    культурній політиці.'
  - '[!epistemic-humility] Критики досі сперечаються, чий вплив був сильнішим — Бретона чи Борхеса. Однозначної відповіді
    немає.'
  section: 'Конфліктна карта: Сюрреалізм чи Магічний реалізм?'
  words: 900
- points:
  - 'Аналіз ключових сцен: світ, де персонажі можуть ходити по стінах, а архітектура жива. Як це працює як метафора?'
  - 'Система персонажів: відсутність центрального героя. Чому авторка уникає традиційної структури?'
  - 'Наративна техніка: потік свідомості та фрагментарність як спосіб зобразити розпад звичної реальності.'
  - '[!decolonization] «Герострати» як спроба створити не-імперський український міф, що виходить за межі народництва та соцреалізму.'
  section: 'Читання: Роман «Герострати»'
  words: 1700
- points:
  - 'Аналіз унікального синтаксису Андієвської: довгі, багатошарові речення як спосіб моделювання свідомості, що не підкоряється
    лінійній логіці.'
  - 'Словотвір: неологізми та індивідуалізми («безмежжя», «позачасся») як інструмент творення альтернативної онтології.'
  - 'Звукопис: алітерації та асонанси, що створюють гіпнотичний ефект і перетворюють прозу на поезію.'
  - '[!myth-buster] Міф про «нечитабельність» Андієвської. Її мова — не помилка, а свідома художня стратегія, що вимагає від
    читача співтворчості.'
  section: 'Мова і поетика: Синтаксис та словотворення'
  words: 1500
- points:
  - 'Повернення до розминки: як цитата і картина розкривають суть художнього методу Андієвської?'
  - 'Спадщина: Вплив на сучасних авторів (Іздрик, Прохасько). Як Андієвська змінила уявлення про те, якою може бути українська
    проза?'
  - '[!anti-hagiography] Чи не стала герметичність стилю Андієвської перешкодою для її ширшого визнання в Україні? Дискусія
    про елітарне та масове мистецтво.'
  - 'Рефлексія: яке ваше особисте враження від занурення у світ Андієвської — захоплення, роздратування, здивування?'
  section: Дискусія та підсумок
  words: 700
focus: Роман Емми Андієвської «Герострати», магічний реалізм vs сюрреалізм, Нью-Йоркська група, стилістичні інновації, деколонізація
  через міфотворчість
level: LIT
module: lit-190
objectives:
- Аналізувати роман «Герострати» в контексті європейського модернізму, розрізняючи риси сюрреалізму та магічного реалізму
- Характеризувати унікальні риси ідіостилю письменниці, зокрема її синтаксис та словотворення
- Оцінювати творчість Андієвської як акт культурної деколонізації через створення альтернативної міфопоетики та мови
- Формулювати власну інтерпретацію тексту, спираючись на аналіз його форми та змісту
