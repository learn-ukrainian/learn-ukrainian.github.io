content_outline:
- points:
  - 'Провокація: Чому роман про легендарну співачку XVII століття, написаний у 1979 році, став «енциклопедією» духовного життя
    української інтелігенції пізнього СРСР?'
  - 'Фрагмент з роману (суд над Марусею): "Вона піснями виспівала душу. / Вона піснями виспівала все. / Що ж коїлося з ним,
    Іваном? / Чи в нім душа бодай на гран була?" — що це: звинувачення чи виправдання?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Маруся Чурай» — це історичний роман чи художня вигадка? Дискусія між прихильниками документальної основи (існувала
    реальна Маруся) та тими, хто бачить у ній лише архетипний образ митця.'
  - 'Дебат 2: Чи є роман канонічним текстом українського фемінізму? Позиція 1: Маруся — сильна, незалежна жінка, що кидає
    виклик патріархату. Позиція 2: Її доля повністю залежить від чоловіків (Івана, Гриця), а її творчість — сублімація нещасливого
    кохання.'
  - '[!epistemic-humility] Ми ніколи не знатимемо напевне, чи існувала Маруся Чурай. Костенко свідомо працює в просторі легенди,
    де важливіша не історична істина, а художня й філософська.'
  section: 'Конфліктна карта: Історична правда vs. Авторський міф'
  words: 900
- points:
  - 'Подорож Марусі як метафора шляху України: від особистої трагедії до усвідомлення себе частиною нації. Аналіз ключових
    епізодів: суд, проща з матір''ю, мандрівка з дяком.'
  - 'Система персонажів-дзеркал: Гриць (розколота душа), Іван Іскра (лицарський ідеал), полковник Пушкар (державна мудрість),
    мандрівний дяк (народна філософія). Як вони розкривають різні грані самої Марусі?'
  - 'Символіка простору: Полтава як мікрокосм України, дорога як символ випробування та очищення.'
  - '[!decolonization] Роман повертає українцям власну історію. Козаччина показана не як "селянська війна" (радянський погляд),
    а як епоха державотворення, де особисті драми розгортаються на тлі великих історичних подій. Агентність Марусі — це агентність
    української культури, що творить і зберігає себе попри все.'
  section: 'Читання: Сюжет як шлях душі'
  words: 1700
- points:
  - 'Стилістичний синкретизм: поєднання високого, "книжного" стилю (неокласицизм, барокові алюзії) з глибокою стилізацією
    під народну пісню. Аналіз прикладів.'
  - 'Робота з мовою: архаїзми для створення історичного колориту, діалектизми для характеристики персонажів, авторські неологізми.'
  - 'Поетика роману у віршах: як Костенко використовує ритм, метр (ямб, хорей) та синтаксис для створення психологічної напруги
    та передачі емоційного стану героїв.'
  - '[!myth-buster] Міф: Костенко — "народна поетеса", що пише простою мовою. Реальність: за уявною простотою ховається складна
    інтелектуальна робота, філігранна техніка та сотні інтертекстуальних посилань. Це не фольклор, а "фольклор про фольклор".'
  section: 'Мова і поетика: Інтелектуальна фольклоризація'
  words: 1500
- points:
  - 'Повернення до розминки: Як прочитання роману змінило ваше розуміння фрази "піснями виспівала душу"? Чи є творчість виправданням
    злочину?'
  - 'Рецепція твору: Чому роман, написаний у 1979 році, був опублікований лише в 1982-му, і чому він одразу став культовим?
    "Маруся Чурай" як "шифрований текст" про опір імперії.'
  - '[!anti-hagiography] Критичний погляд: чи не ідеалізує Костенко козацьку добу? Чи не стає міф про Марусю Чурай настільки
    потужним, що заступає собою складну історичну реальність XVII століття?'
  - 'Сучасна релевантність: Як роман резонує із сьогоднішнім досвідом війни? Образ митця, що творить під час національної
    катастрофи.'
  section: Дискусія та підсумок
  words: 700
