objectives:
- Аналізувати науково-публіцистичний текст як літературний, розкриваючи його символічні та риторичні шари.
- Критично оцінювати різні інтерпретації ролі діаспори в українській культурі, використовуючи теорію Пахльовської як одну
  з моделей.
- Застосовувати поняття постколоніальної теорії для аналізу українського культурного простору та його взаємин з Європою та
  Росією.
- Формулювати власну аргументовану позицію щодо дискусійних тез, висунутих у модулі.
