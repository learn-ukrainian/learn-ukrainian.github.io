content_outline:
- points:
  - 'Провокація: Українська діаспора — це живий архів минулого чи діюча лабораторія майбутнього?'
  - Ключова цитата з Оксани Пахльовської про культурну амнезію та її подолання як центральне завдання нації.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Література діаспори — це частина національної літератури чи самостійний транснаціональний феномен? Позиція Пахльовської
    vs. західні теорії діаспори.'
  - 'Дебат 2: «Італійський досвід» Пахльовської — це перевага (погляд ззовні) чи недолік (відрив від українського контексту)?'
  - '[!epistemic-humility] Теорія Пахльовської — одна з багатьох спроб осмислити постколоніальну травму. Порівняння з підходами
    Едварда Саїда та Гілаля Шерхана.'
  section: 'Конфліктна карта: Теорія як поле бою'
  words: 900
- points:
  - 'Аналіз ключових тез: розбір поняття "homo post-soveticus" та механізмів його формування.'
  - 'Система образів: "Рим" як метафора європейської цивілізаційної матриці vs. "Візантія/Москва" як символ деспотії та культурної
    стагнації.'
  - '[!decolonization] Як Пахльовська руйнує міф про «братні народи» та доводить тисячолітню історію культурного опору України
    асиміляції.'
  - Архетип "втраченого раю" (Україна) та його трансформація у "віднайдений рай" (Європа) в її есеїстиці.
  section: 'Читання: Деконструкція імперського дискурсу в "Ave, Europa!"'
  words: 1800
- points:
  - 'Стиль Пахльовської: унікальне поєднання наукової точності, есеїстичної пристрасті та публіцистичного пафосу.'
  - 'Робота з термінологією: введення в український гуманітарний дискурс західних концептів (постколоніалізм, культурна травма,
    мнемонічні війни).'
  - '[!myth-buster] Пахльовська — не просто критик, а культурний стратег. Її тексти — це не опис, а програма дій для української
    культури.'
  - 'Синтаксис та риторика: використання риторичних питань, антитез та градацій для посилення емоційного впливу та переконливості
    аргументації.'
  section: 'Мова і поетика: Інтелектуальна провокація'
  words: 1500
- points:
  - 'Повернення до розминки: чи дає теорія Пахльовської вичерпну відповідь на питання про роль діаспори?'
  - 'Рецепція творчості: від захоплення до гострої критики. Чому її ідеї викликають такі бурхливі дебати в інтелектуальних
    колах України та діаспори?'
  - '[!anti-hagiography] Критичний погляд на теорію: де її слабкі місця? Які аспекти українського досвіду вона, можливо, ігнорує
    або гіперболізує?'
  - 'Сучасна релевантність: наскільки актуальні ідеї Пахльовської в умовах повномасштабного вторгнення та нової хвилі еміграції?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз постколоніальної теорії Оксани Пахльовської як літературного та культурного феномену
