objectives:
- Аналізувати 'Точку Нуль' як приклад літератури non-fiction про війну на Донбасі, розрізняючи її від традиційного воєнного
  роману
- Досліджувати мову та поетику твору — фрагментарність, документалізм, редукцію метафори — як інструменти зображення травматичного
  досвіду
- Критично оцінювати деконструкцію радянського та імперського героїчного міфу у творі
- 'Формулювати аргументовану позицію щодо дебату про жанрову природу тексту: це щоденник, роман чи документальне свідчення?'
