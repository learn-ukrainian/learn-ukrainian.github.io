objectives:
- Аналізувати «Перший вінок» як комплексне явище на перетині літератури, політики та соціальної історії
- Критично оцінювати напругу між феміністичними та національними ідеологіями в українській інтелектуальній історії
- Розрізняти та аналізувати різні стилістичні течії в рамках одного видання (натуралізм, неоромантизм)
- Формулювати власну аргументовану позицію щодо спадщини та сучасної актуальності раннього українського фемінізму
