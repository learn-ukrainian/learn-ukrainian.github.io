content_outline:
- points:
  - 'Провокація: «Перший вінок» — це збірка жіночої літератури чи політичний маніфест, замаскований під альманах? Чому його
    вихід так налякав галицьких чоловіків-літераторів?'
  - 'Цитата-загадка: «Неподвижність і апатія наших жінок [...] так сильно вразили мою душу, що я під той час постановила собі
    за всяку ціну розворушити жіноцтво» (Н. Кобринська). Проти кого спрямована ця енергія — проти патріархату чи імперії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чиєю справою є фемінізм? Кобринська наполягала на універсальному «жіночому питанні», Олена Пчілка — на пріоритеті
    національного визволення («Не на часі»). Як цей конфлікт визначив долю українського фемінізму?'
  - 'Дебат 2: Естетика чи ідеологія? Чи був «Перший вінок» якісною літературою? Критики-чоловіки звинувачували альманах у
    «тенденційності» та «слабкості». Чи була це об''єктивна критика, чи несприйняття жіночого голосу як такого?'
  - '[!epistemic-humility] Не існує єдиного «правильного» фемінізму. «Перший вінок» демонструє напругу між ліберальним (Кобринська)
    та національно-консервативним (Пчілка) підходами, яка актуальна і сьогодні.'
  section: 'Конфліктна карта: Фемінізм чи націоналізм?'
  words: 900
- points:
  - 'Структура альманаху: Три частини — «Поезія», «Оповідання», «Наукові статті та листи». Чому Кобринська поєднала художні
    твори з публіцистикою? Яку мету вона переслідувала?'
  - 'Close reading: Аналіз оповідання самої Кобринської «Задля кусника хліба». Як авторка використовує натуралістичні деталі
    для критики економічної залежності жінки?'
  - 'Порівняльний аналіз: Поезія Уляни Кравченко vs поезія Олени Пчілки в альманасі. Як різні авторки трактують тему жіночої
    долі?'
  - '[!decolonization] «Перший вінок» як акт культурного суверенітету. На відміну від російського жіночого руху, сфокусованого
    на класовій боротьбі, та польського, інтегрованого в шляхетську культуру, український фемінізм від початку був антиімперським.'
  section: 'Читання: Анатомія «Першого вінка»'
  words: 1700
- points:
  - 'Стилістичний поліфонізм: «Перший вінок» не мав єдиного стилю. Це був калейдоскоп — від реалізму та натуралізму (Кобринська,
    Пашковська) до неоромантизму (Уляна Кравченко).'
  - 'Лексичні інновації: Як авторки описували досвід, для якого ще не існувало слів в українській мові? Аналіз термінів «емансипація»,
    «жіноче питання», «інтелігентка».'
  - '[!myth-buster] Міф про «жіночу прозу» як щось сентиментальне й побутове. «Перший вінок» руйнує цей стереотип, піднімаючи
    теми економіки, політики, освіти та філософії.'
  - 'Синтаксис емоцій: Аналіз того, як довжина речень, ритм прози та використання риторичних фігур передають внутрішній стан
    героїнь — від задухи патріархального світу до прозріння власної сили.'
  section: 'Мова і поетика: Створення мови для жіночого досвіду'
  words: 1500
- points:
  - 'Повернення до розминки: Тож, «Перший вінок» — це література чи політика? Відповідь після аналізу: це політика, реалізована
    засобами літератури.'
  - 'Історична рецепція: Чому альманах, що став бомбою у 1887 році, був майже забутий у радянський час? Як і чому його «перевідкрили»
    в 1990-х?'
  - '[!anti-hagiography] Кобринська не була святою. Її радикалізм і безкомпромісність часто призводили до конфліктів навіть
    із соратницями. Чи міг «Перший вінок» бути успішнішим, якби його лідерка була більш гнучкою?'
  - 'Сучасна релевантність: Які ідеї «Першого вінка» звучать найгостріше в Україні XXI століття, що воює? Чи змінилися відповіді
    на «жіноче питання»?'
  section: Дискусія та підсумок
  words: 700
focus: «Перший вінок» як літературний і суспільний феномен, конфлікт фемінізму й націоналізму, стилістичне новаторство, de-colonizing
  women's history
