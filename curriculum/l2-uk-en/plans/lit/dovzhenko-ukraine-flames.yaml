content_outline:
- points:
  - 'Провокація: Чому Сталін особисто заборонив твір, назвавши його «антирадянським» і «націоналістичним»? Що такого небезпечного
    побачив вождь у тексті про боротьбу з нацизмом?'
  - Цитата з тексту, що ілюструє трагедію народу, а не героїзм радянської армії.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Україна в огні» — це об''єктивне історичне свідчення трагедії чи інструмент соціалістичного реалізму, що вийшов
    з-під контролю?'
  - 'Дебат 2: Канонізація через заборону. Як шлях від «націоналістичної» на думку Сталіна кіноповісті до обов''язкового твору
    в шкільній програмі впливає на наше прочитання?'
  - '[!epistemic-humility] Позиція Довженка: спроба сказати правду про народну війну. Позиція радянської критики: «спотворення
    історії», «відхід від партійної лінії».'
  section: 'Конфліктна карта: Свідчення чи пропаганда?'
  words: 900
- points:
  - 'Аналіз ключових сцен: відступ, окупація, трагедія родини Запорожців як уособлення долі всього народу.'
  - 'Система персонажів: Лаврін Запорожець як патріарх, що уособлює землю; Олеся як символ зґвалтованої, але нескореної України.'
  - 'Архетипи та міфологічні підтексти: біблійні мотиви, український фольклор у структурі оповіді.'
  - '[!decolonization] Текст як руйнування імперського міфу про «братні народи» і «Велику Вітчизняну війну». Довженко показує
    війну як українську національну трагедію, а не лише як епізод радянської історії.'
  section: 'Читання: Україна в огні'
  words: 1700
- points:
  - 'Аналіз жанру «кіноповісті»: як Довженко поєднує літературні та кінематографічні засоби. Монтажний синтаксис, візуальні
    метафори, робота з великими планами.'
  - 'Стилістичні інновації: ліричний пафос, ритмізована проза, використання народнопоетичних прийомів та символіки.'
  - 'Робота з мовою: діалектизми, мова персонажів як засіб характеристики, контраст між високим авторським стилем і простою
    мовою народу.'
  - '[!myth-buster] «Україна в огні» — це не просто сценарій. Це самодостатній літературний твір, поетика якого виходить за
    межі суто кінематографічних завдань.'
  section: 'Мова і поетика: Кінематографічне письмо'
  words: 1500
- points:
  - 'Повернення до розминки: студент формулює відповідь, чому текст був небезпечним для радянської ідеології.'
  - '[!anti-hagiography] Рецепція твору: від розгрому на засіданні Політбюро до статусу національної класики. Комплексне ставлення
    до самого Довженка — генія, що творив в умовах тоталітарної системи.'
  - 'Сучасна релевантність: Як «Україна в огні» читається сьогодні в контексті нової війни за незалежність?'
  - 'Питання для рефлексії: Чи змінилося ваше розуміння Другої світової війни після прочитання цього тексту?'
  section: Дискусія та підсумок
  words: 700
