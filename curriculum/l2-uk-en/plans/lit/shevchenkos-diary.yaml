content_outline:
- points:
  - 'Провокація: Чому національний пророк, автор "Кобзаря", вів свій найпотаємніший щоденник... російською мовою?'
  - Фрагмент із "Журналу" без контексту — запис про побутову дрібницю чи технічну новинку (фотографію), що різко контрастує
    з образом пророка.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чому російська? Аргументи "за": вимушена практика заслання, мова спілкування в імперському оточенні, спроба
    звернутись до ширшої, зокрема російської, аудиторії.'
  - 'Дебат 1 (проти): Аргументи "проти": знак асиміляції, внутрішня трагедія, "зрада" української справи. Розгляд сучасних
    інтерпретацій (Забужко, Грабович).'
  - 'Дебат 2: "Журнал" — це документ для демістифікації чи ключ до розуміння генія? Як приватні записи змінюють наше сприйняття
    публічної постаті Шевченка?'
  - '[!epistemic-humility] Немає єдиної відповіді на питання про мову. Це складна проблема, що відображає колоніальний стан
    України в XIX столітті.'
  section: 'Конфліктна карта: Мова, ідентичність і самоцензура'
  words: 900
- points:
  - 'Контекст: кінець заслання, шлях із Новопетровського укріплення до Петербурга. Радість свободи і гіркота втрачених років.'
  - 'Шевченко-мистецтвознавець: рефлексії про Рембрандта і Мурільйо, гострі оцінки сучасного російського мистецтва.'
  - 'Шевченко-інтелектуал: інтерес до нових технологій (фотографія, пароплави), читання європейської літератури (Діккенс).'
  - '[!decolonization] Щоденник розбиває імперський міф про Шевченка як "малоосвіченого мужлана". Він постає як високоосвічений
    європейський інтелектуал, що мислить в глобальному контексті.'
  - 'Психологічний портрет: самотність, хвороби, фінансові труднощі, стосунки з друзями (Лазаревський, Куліш) і ворогами,
    пошуки кохання і мрії про родину.'
  section: 'Читання: Сторінки "Журналу" (1857-1858)'
  words: 1700
- points:
  - 'Лексичний аналіз: численні українізми (лексичні, фонетичні, синтаксичні) як маркери ідентичності.'
  - 'Стилістичний контраст: порівняння сухої, фактографічної манери "Журналу" з метафоричною, емоційно насиченою мовою поезії
    періоду заслання ("Неофіти", "Марія").'
  - 'Інтроспективна лексика: як Шевченко описує свої почуття, хвороби, творчі плани? Аналіз ключових слів (тоска, уединение,
    работа).'
  - '[!myth-buster] Міф про те, що Шевченко "забув" українську на засланні, повністю спростовується його поетичною творчістю
    того ж періоду. Російська мова щоденника — це свідомий вибір жанру та аудиторії, а не ознака втрати ідентичності.'
  section: 'Мова і поетика: Російська мова з українською душею'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чому Шевченко писав щоденник російською? Студент формулює власну аргументовану позицію
    на основі матеріалів модуля.'
  - '[!anti-hagiography] "Журнал" як інструмент демістифікації. Як записи про пияцтво, сварки та фінансові проблеми роблять
    Шевченка не меншим, а більш зрозумілим і людяним?'
  - 'Рецепція: як публікація "Журналу" змінила сприйняття Шевченка в XX столітті?'
  - 'Сучасна релевантність: проблема мови та ідентичності для українських митців, що творять в умовах імперського тиску, —
    паралелі з сьогоденням.'
  section: Дискусія та підсумок
  words: 700
focus: Контраст між публічним образом "Кобзаря" та приватною особою, що постає зі сторінок російськомовного "Журналу", написаного
  наприкінці заслання.
level: LIT
module: lit-019
objectives:
- Критично аналізувати причини та наслідки використання російської мови у "Журналі" Шевченка, уникаючи спрощених оцінок.
- Порівнювати публічний образ поета ("Кобзар") з його приватним образом, що постає зі сторінок щоденника.
- Досліджувати широту інтелектуальних інтересів Шевченка (мистецтво, технології, література) на основі його записів.
- Виявляти та аналізувати українізми в російськомовному тексті щоденника як маркери національної ідентичності.
- Формулювати власну позицію щодо ролі "Журналу" в демістифікації та "олюдненні" образу національного пророка.
pedagogy: CBI
