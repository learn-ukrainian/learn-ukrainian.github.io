content_outline:
- points:
  - 'Провокативне питання: Чи може словник бути небезпечнішим за рушницю? Розглядаємо феномен Бориса Антоненка-Давидовича,
    для якого боротьба за слово була боротьбою за життя.'
  - Цитата з твору (без контексту), що демонструє філігранну роботу з мовою і ставить читача в глухий кут.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є мовний пуризм, який сповідував автор, необхідним інструментом деколонізації, чи це штучне обмеження, що
    збіднює живу мову?'
  - 'Дебат 2: Ким був Антоненко-Давидович у першу чергу — письменником, що використовував філологію, чи філологом, що писав
    художні твори? Полеміка про місце його творчості в каноні.'
  - '[!epistemic-humility] Позиції Юрія Шереха (критика надмірного пуризму) та самого автора — дві сторони однієї медалі українського
    виживання в умовах лінгвоциду.'
  section: 'Конфліктна карта: Пуризм чи природність?'
  words: 900
- points:
  - Детальний аналіз ключових уривків роману, де вибір слова чи граматичної конструкції визначає долю персонажа.
  - 'Структура твору: як композиція віддзеркалює руйнування особистості в тоталітарній системі.'
  - 'Система персонажів: інтелігент vs влада, носій мови vs носій ідеології.'
  - '[!decolonization] Текст як руйнування імперського міфу про "братні народи": аналіз того, як мова стає останнім бастіоном
    національної ідентичності.'
  section: 'Читання: Аналіз роману "Смерть"'
  words: 1700
- points:
  - 'Аналіз есе "Як ми говоримо": стилістичні інновації, боротьба з канцеляритом та суржиком як художній метод.'
  - 'Робота з лексикою: використання архаїзмів та неологізмів для розширення виражальних можливостей мови.'
  - 'Синтаксис як інструмент: як структура речення у прозі Антоненка-Давидовича слугує для передачі психологічного стану героя.'
  - '[!myth-buster] Спростування міфу про Антоненка-Давидовича як про "сухого граматиста". Доказ того, що його робота з мовою
    — це висока поетика, а не просто кодифікація норм.'
  section: 'Мова і поетика: Стилістична точність як опір'
  words: 1500
- points:
  - 'Повернення до початкового питання: як саме мова стає зброєю у творчості письменника? Формулювання студентами власної
    позиції.'
  - 'Рецепція творчості: як сприймали тексти автора в 1920-х, у таборах, у 1960-х, і як вони звучать сьогодні.'
  - 'Вплив на сучасну українську культуру: від мовних блогерів до законів про мову.'
  - '[!anti-hagiography] Чи не призводить безкомпромісна позиція автора до лінгвістичного снобізму та елітаризму? Критичний
    погляд на спадщину.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз прози та есеїстики Бориса Антоненка-Давидовича, мовний пуризм як інструмент деколонізації, стилістичні особливості
  прози "Розстріляного відродження"
