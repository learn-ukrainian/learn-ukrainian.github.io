  role: Куратор виставки "Світло і тінь українського модернізму", що показує Олеся не як забронзовілого класика, а як живого,
    суперечливого митця, що боровся за мову та смисли.
  voice: Modernist-Enthusiast
phase: LIT.2 European Modernism 1890s-1917
