content_outline:
- points:
  - 'Провокація: "Сміються, плачуть солов''ї / І б''ють піснями в груди". Чи може вірш, написаний понад століття тому, звучати
    як саундтрек до наших сьогоднішніх ночей? Чому ця поезія стала культурним кодом?'
  - 'Загадковий уривок: Подано 4 рядки з менш відомого твору Олеся. Завдання: відчути настрій, вгадати тему, не знаючи контексту.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Олесь як "чистий" символіст vs. Олесь як неоромантик. Критики-сучасники (Єфремов) бачили в ньому епігона європейської
    моди. Пізніші дослідники (Чижевський) — творця унікального українського синтезу.'
  - 'Дебат 2: Поет для "обраних" чи голос нації? Дискусія про елітарність та народність його лірики. Чи була його "салонність"
    формою культурного опору в умовах імперії?'
  - '[!epistemic-humility] Немає єдиної "правильної" класифікації. Розглядаємо аргументи різних шкіл, щоб зрозуміти складність
    його творчої еволюції.'
  section: 'Конфліктна карта: Символіст чи неоромантик?'
  words: 900
- points:
  - 'Текст 1: "Чари ночі". Повний текст поезії з коментарями. Аналіз композиції: від меланхолії до екстазу і трагічного фіналу.
    Система образів: ніч, солов''ї, зорі, любов, смерть.'
  - 'Текст 2: "Айстри". Аналіз як зразка філософської лірики. Символіка квітів, мотив неминучості, фаталізму.'
  - 'Наративна структура ліричного героя: від індивідуального переживання до узагальнення космічного масштабу.'
  - '[!decolonization] Олесь як творець модерної української ліричної мови. Його творчість — це свідомий акт культурного самоствердження
    і доказ спроможності української мови виражати найскладніші філософські та психологічні стани, всупереч імперському дискурсу
    про її "селянський" характер.'
  section: 'Читання: "Чари ночі" та "Айстри"'
  words: 1700
- points:
  - 'Стилістичні інновації: Музичність як головний принцип поетики. Алітерації, асонанси, звукопис, що створюють "мелодію"
    вірша.'
  - 'Робота з мовою: Використання народнопісенної лексики та синтаксису в поєднанні з європейськими філософськими поняттями.'
  - 'Особливості синтаксису: Риторичні питання, інверсії, паралелізми як засіб створення емоційної напруги.'
  - '[!myth-buster] Олесь — це не лише "сумно співають солов''ї". Аналізуємо його як сміливого мовного експериментатора, що
    розширив можливості української поезії та кинув виклик консервативним смакам.'
  section: 'Мова і поетика: Симфонія слова'
  words: 1500
- points:
  - 'Повернення до розминки: Чому Олесь досі актуальний? Формулюємо відповідь, використовуючи аргументи з аналізу поетики
    та конфліктної карти.'
  - 'Рецепція творчості: Як сприймали Олеся сучасники, радянська критика, діаспора та сучасна Україна? Чому його постать викликала
    такі запеклі суперечки?'
  - '[!anti-hagiography] Комплексність постаті: розглядаємо не лише вершини творчості, а й складні моменти біографії, особливо
    в еміграційний період. Уникаємо створення ідеалізованого образу.'
  - 'Питання для рефлексії: Який образ Олександра Олеся склався у вас після цього модуля? Чи змінилося ваше сприйняття його
    поезії?'
  section: Дискусія та підсумок
  words: 700
focus: Literary analysis of Oleksandr Oles's symbolist poetry, focusing on musicality, neoromantic elements, and its decolonizing
  role in establishing a modern Ukrainian literary language.
level: LIT
module: lit-073
objectives:
- Аналізувати творчість Олександра Олеся в культурному та історичному контексті українського модернізму.
- Визначати ключові риси поетики символізму та неоромантизму в його ліриці.
- Інтерпретувати символіку та філософський зміст ключових творів.
- Критично оцінювати місце Олеся в українському літературному каноні, розрізняючи різні критичні позиції.
- Формулювати власну аргументовану позицію щодо деколонізаційного значення його творчості.
pedagogy: CBI
