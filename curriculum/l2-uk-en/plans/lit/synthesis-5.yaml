objectives:
- Синтезувати знання про літературний процес вивченого періоду, виявляючи ключові тенденції та зв'язки.
- Застосовувати деколонізаційну оптику для критичного аналізу взаємовпливів між авторами та епохами.
- Оцінювати аргументи на користь тяглості та розривів в українській інтелектуальній традиції, формулюючи власну позицію.
- Аналізувати еволюцію стилістичних прийомів та літературної мови в діахронії на конкретних прикладах.
