content_outline:
- points:
  - 'Провокативне питання: Чи є українська література єдиною рікою, що тече крізь століття, чи це архіпелаг островів, кожен
    з яких пережив власну катастрофу та відродження?'
  - 'Цитата-загадка (без автора): "Ми є мукою, бо ми є народом-мучеником. Ми є правдою, бо ми є народом-правдоборцем." З якої
    епохи цей голос?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Модель "сталевої нитки" (М. Зеров) — чи дійсно існує неперервна традиція, що пов''язує Сковороду, Шевченка та
    Стуса, чи це ретроспективна конструкція?'
  - 'Дебат 2: Що є рушієм змін — внутрішня логіка розвитку (діалог з попередниками) чи зовнішні чинники (цензура, колоніальний
    тиск, війни)?'
  - '[!epistemic-humility] Школи інтерпретації: культурно-історична школа бачить у літературі дзеркало суспільства, тоді як
    формалісти наполягають на самодостатності художнього твору.'
  - 'Деконструкція vs Синтез: Чи наше завдання — розібрати канон на колоніальні та автентичні елементи, чи знайти те, що їх
    об''єднує в єдиний національний наратив?'
  section: 'Конфліктна карта: Тяглість чи розрив?'
  words: 900
- points:
  - 'Архетип "втраченого раю": від "Слова о полку Ігоревім" до емігрантської поезії "Празької школи". Як трансформується образ
    ідеалізованої минувшини?'
  - 'Образ "пророка": порівняльний аналіз ролі поета у Шевченка ("Кавказ"), Франка ("Мойсей") та Стуса ("Палімпсести"). Від
    народного трибуна до екзистенційного свідка.'
  - '[!decolonization] Філософія ідентичності: простеження еволюції українського суб''єкта — від етнографічної "малоросійської"
    душі до політичної нації з глобальними амбіціями.'
  - 'Література як простір формування національної етики: як тексти вчать розрізняти добро і зло в умовах, коли імперія називає
    чорне білим.'
  section: 'Читання: Діалог через століття'
  words: 1700
- points:
  - 'Трансформація літературної мови: від барокових метафор до класицистичної ясності, від романтичної експресії до модерністського
    експерименту.'
  - 'Порівняльний аналіз технік: як одну й ту саму тему (напр., кохання) розкривають автори різних епох через вибір лексики,
    синтаксису, метафорики.'
  - 'Інтертекстуальність як рушій: як пізніші автори "переписують" попередників, ведучи з ними прихований діалог (напр., Забужко
    з Шевченком, Жадан з футуристами).'
  - '[!myth-buster] Міф про "солов''їну мову". Українська літературна мова — це не лише ліричний інструмент, але й потужна
    зброя, здатна до філософської абстракції, наукової точності та брутальної прямоти.'
  section: 'Мова і поетика: Стилістичний калейдоскоп'
  words: 1500
- points:
  - 'Повернення до розминки: тож "ріка" чи "архіпелаг"? Формулювання власної моделі українського літпроцесу з опорою на вивчений
    матеріал.'
  - 'Спадщина та горизонти: як досвід і стратегії виживання, закодовані в літературі, допомагають зрозуміти сучасні виклики?'
  - '[!anti-hagiography] Критичний погляд на канон: чи всі твори, що вважаються класикою, витримали перевірку часом? Які тексти
    ми маємо "перечитати" по-новому?'
  - Значення канону для інтелектуальної безпеки нації в умовах інформаційної війни.
  section: Дискусія та підсумок
  words: 700
focus: 'Diachronic analysis of Ukrainian literature: tracing the evolution of archetypes, decolonial resistance strategies,
  and stylistic transformations across a major literary period.'
