content_outline:
- points:
  - 'Провокація: "Я палю свій Кобзар". Що це — акт вандалізму проти національної святині чи необхідний крок для народження
    нового мистецтва?'
  - 'Фрагмент з поеми: "Поет не є недоторканий. І поет не є бог. І коли є бог, то з не маленької букви".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Спалення" Шевченка — це щирий мистецький жест розриву з минулим чи лише порожній епатаж для привернення уваги?'
  - 'Дебат 2: Місце Семенка в каноні. Його викреслювали з історії як "буржуазного націоналіста", а потім як "космополіта".
    Ким він є для української літератури насправді — маргіналом чи пророком?'
  - '[!epistemic-humility] Позиція 1 (традиціоналісти): Семенко — нігіліст, що руйнує основи. Позиція 2 (модерністи): Семенко
    — революціонер, що виводить українську літературу з провінційності на світовий рівень.'
  section: 'Конфліктна карта: Епатаж чи мистецька революція?'
  words: 900
- points:
  - 'Close reading: Аналіз уривків, де Семенко прямо звертається до Шевченка, сперечається з ним, і водночас визнає його велич.'
  - 'Структура твору як перформанс: Текст не просто описує дію, він сам є дією — маніфестом, викликом, публічним жестом.'
  - '[!decolonization] Семенко кидає виклик не Шевченку-поету, а образу "батька нації", канонізованому в Російській імперії.
    Він бореться проти перетворення літератури на етнографічний резерват і вимагає для неї права бути сучасною та універсальною.'
  section: 'Читання: Текст-подія, поема "Кобзар" (1924)'
  words: 1700
- points:
  - 'Стилістичні інновації: "поезомалярство", урбаністичні мотиви, телеграфний стиль — як Семенко створює мову міста.'
  - 'Словотвір: аналіз авторських неологізмів ("кверофутуризм"). Як поет розширює межі української мови.'
  - 'Синтаксис і ритм: рвані, динамічні конструкції як віддзеркалення ритму індустріальної епохи.'
  - '[!myth-buster] Футуризм — це не просто заперечення минулого. Це спроба створити "мистецтво майбутнього", знайти універсальну
    мову, що відповідає новій технологічній та соціальній реальності.'
  section: 'Мова і поетика: Футуристична деконструкція мови'
  words: 1500
- points:
  - 'Повернення до розминки: після аналізу, чи змінилося ваше ставлення до фрази "Я палю свій Кобзар"?'
  - 'Рецепція: як сприймали Семенка сучасники (Хвильовий, Зеров) і як його перевідкрили в 90-ті?'
  - '[!anti-hagiography] Чи не став сам Семенко бронзовим пам''ятником "бунтарю"? Де межа між конструктивною критикою канону
    і руйнуванням заради руйнування?'
  - 'Сучасна релевантність: які "кобзарі" сучасна українська культура має "спалити", щоб рухатися вперед?'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Mykhailo Semenko's provocative work "Kobzar" (1924) as a futurist manifesto, exploring its break with the
  national canon, stylistic innovations, and decolonial significance.
level: LIT
module: lit-079
objectives:
- Аналізувати поему "Кобзар" Семенка як літературний маніфест у контексті українського авангарду 1920-х років.
- Розрізняти позиції в літературній дискусії навколо футуризму та ролі канону.
- Інтерпретувати стилістичні інновації Семенка (неологізми, синтаксис, ритм) як частину його художнього методу.
- Формулювати аргументовану позицію щодо деколонізаційної ролі Семенка у звільненні української літератури від імперських
  стереотипів.
pedagogy: CBI
