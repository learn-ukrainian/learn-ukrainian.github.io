vocabulary_hints:
- definition: Ідейний і художній напрям у європейській культурі кінця XVIII — першої половини XIX ст., що характеризується
    утвердженням самоцінності духовно-творчого життя особистості, зображенням сильних пристрастей і характерів, натхненної
    та цілющої природи.
  pos: ч.
  word: романтизм
- definition: Процес переходу авторського літературного твору в усну народну традицію, внаслідок чого він зазнає змін, адаптується
    до законів фольклору і починає сприйматися як анонімний "народний".
  pos: ж.
  word: фольклоризація
- definition: Умовний образ, який говорить про себе в ліричному творі. Це не тотожність автора, а створена ним художня фігура,
    що виражає певні почуття, думки та переживання.
  pos: ч.
  word: ліричний герой
- definition: Жанр ліричної поезії, вірш, пройнятий сумним, тужливим настроєм, роздумом про життя і смерть, кохання та швидкоплинність
    людського буття.
  pos: ж.
  word: елегія
- definition: Світоглядна концепція, що розглядає людину та людство як частину космосу, пов'язує земне буття з космічними
    явищами. У романтизмі проявляється через мотиви неба, зірок, всесвіту.
  pos: ч.
  word: космізм
- definition: Вчення про віршові розміри, ритм і будову вірша; система віршування.
  pos: ж.
  word: метрика
