content_outline:
- points:
  - 'Провокація: Як пісня, написана у 1841 році, стала першою українською піснею, що пролунала в космосі? І чому її автора
    майже ніхто не знає?'
  - 'Фрагмент: "Чом я не сокіл, чом не літаю, / Чом мені, Боже, Ти крилець не дав?" — безвідносне питання, яке ставить вірш
    у центр людського досвіду.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Петренко — "автор одного хіта" чи жертва цензури? Позиція 1: Його інша творчість просто слабша, тому й не запам''яталася.
    Позиція 2: Його зникнення з літпроцесу після 1847 року було наслідком політичного тиску, який не дав розкритися таланту.'
  - 'Дебат 2: "Дивлюсь я на небо" — українська народна пісня чи авторський твір? Дискусія про культурну апропріацію, коли
    авторство "розчиняється" в народі, та спроби привласнення тексту російською культурою.'
  - '[!epistemic-humility] Ярлик "поет одного вірша" є спрощенням. Аналіз показує цілісний цикл "Небо" та зв''язок з Харківською
    школою романтиків.'
  section: 'Конфліктна карта: Поет одного вірша чи забутий геній?'
  words: 900
- points:
  - Повний текст вірша та його варіації — аналіз текстологічних розбіжностей.
  - 'Ліричний герой та його екзистенційна самотність: мрія про політ як втеча від земної "недолі".'
  - 'Структура вірша: два світи — земний (тюрма) і небесний (свобода). Небо як романтичний символ ідеального, недосяжного
    світу.'
  - '[!decolonization] Історія привласнення: як пісня "обрусівалась", змінюючи текст та контекст, щоб вписатись в імперський
    наратив. Аналіз радянських та російських перекладів, що нівелюють українську специфіку.'
  section: 'Читання: "Дивлюсь я на небо та й думку гадаю..."'
  words: 1700
- points:
  - 'Лексичний аналіз: синтез книжної (елегія, космізм) та народнопісенної лексики.'
  - 'Метрика та звукопис: пісенний розмір (ямб з хореєм), алітерації та асонанси, що створюють виняткову мелодійність і сприяли
    фольклоризації.'
  - 'Символіка: небо, зорі, сокіл, крила — аналіз ключових образів у коді українського романтизму.'
  - '[!myth-buster] Це не просто "сумна пісня". Це філософська елегія, що відображає ідеї європейського романтизму та німецької
    ідеалістичної філософії, адаптовані на українському ґрунті Харківською школою.'
  section: 'Мова і поетика: Алхімія народної пісні'
  words: 1500
- points:
  - 'Повернення до розминки: тож чому саме ця пісня "злетіла" до космосу, а її автор залишився "на землі"?'
  - 'Рецепція твору: від рукописних збірок харківських романтиків, через кобзарське виконання, радянську естраду до вибору
    Леоніда Каденюка.'
  - '[!anti-hagiography] За романтичним образом поета стоїть реальна людина — чиновник, який з невідомих причин залишив писати.
    Що це говорить про умови для української культури в Російській імперії?'
  - 'Питання для студента: Чи є фольклоризація найвищим визнанням для поета, чи це трагедія втрати авторства?'
  section: Дискусія та підсумок
  words: 700
focus: Mykhailo Petrenko's poetry as a case study in Ukrainian Romanticism, the folklorization of literary texts, and the
  decolonial struggle over cultural heritage, centered on the poem "Дивлюсь я на небо".
level: LIT
module: lit-222
objectives:
- Аналізувати поетику Михайла Петренка в контексті українського та європейського романтизму
- Дослідити феномен фольклоризації на прикладі перетворення вірша «Дивлюсь я на небо» на народну пісню
- Критично оцінювати процеси канонізації та культурної апропріації в умовах імперського тиску
- Застосовувати інструменти філологічного аналізу (текстологія, стилістика, метрика) до ліричного твору
pedagogy: CBI
persona:
