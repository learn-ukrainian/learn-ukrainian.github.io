content_outline:
- points:
  - 'Провокативне питання: Чи може література, написана за тисячі кілометрів від України, бути більш українською, ніж створена
    в підрадянському Києві? Занурення у парадокс МУРу.'
  - Цитата-загадка одного з ідеологів МУРу про "велику літературу", без пояснення, що це означає, та хто автор.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Національна орлиність" vs "органічна стихійність". Дискусія між Юрієм Шерехом (Шевельовим) та Володимиром Державиним
    про роль митця — бути виразником національної ідеї чи слідувати за власним творчим імпульсом?'
  - 'Дебат 2: Канон в екзилі. Чи є МУР "справжнім" модернізмом, чи це лише спроба наздогнати західні течії? Як критики в діаспорі
    та в сучасній Україні оцінюють місце МУРу в історії української літератури?'
  - '[!epistemic-humility] Позиції в дебатах не були статичними; самі учасники МУРу змінювали свої погляди з часом, реагуючи
    на нові політичні та культурні виклики.'
  section: 'Конфліктна карта: Національна місія чи естетична свобода?'
  words: 900
- points:
  - Close reading уривків з програмних статей Юрія Шереха, що визначали обличчя МУРу.
  - 'Аналіз прози Івана Багряного ("Тигролови") та поезії Василя Барки як прикладів реалізації ідей МУРу: поєднання екзистенційних
    тем з українським контекстом.'
  - '[!decolonization] МУР як свідома спроба протиставити "велику українську літературу" імперському російському наративу
    та радянському соцреалізму. Це була боротьба за право визначати себе.'
  - 'Система персонажів: як герої творів МУРу втілюють ідею "сильної, вольової людини", здатної протистояти тоталітарному
    злу.'
  section: 'Читання: Маніфести та ключові тексти МУРу'
  words: 1700
- points:
  - 'Стилістичний аналіз: поєднання модерністських технік (потік свідомості, монтаж) з елементами українського бароко та експресіонізму.'
  - 'Робота з мовою: творення неолексики для передачі філософських та психологічних понять, відмова від провінціалізмів та
    русизмів.'
  - 'Синтаксис як ідеологія: використання складних, багатошарових речень як спосіб передати складність інтелектуального пошуку.'
  - '[!myth-buster] Руйнування міфу про "шароварництво" діаспорної літератури. МУР — це високий інтелектуальний, урбаністичний
    та космополітичний проект.'
  section: 'Мова і поетика: Стиль "великої літератури"'
  words: 1500
- points:
  - 'Повернення до початкового питання: як МУР відповів на виклик створення національної літератури поза національним контекстом?'
  - 'Рецепція та спадщина: як вплинув МУР на шістдесятників, нью-йоркську групу та сучасних українських письменників?'
  - '[!anti-hagiography] Критичний погляд на МУР: чи не призводив ідеологічний тиск до певної уніфікації та обмеження творчої
    свободи?'
  - 'Рефлексія для студента: Які ідеї МУРу залишаються актуальними для України, що знову бореться за свою ідентичність у XXI
    столітті?'
  section: Дискусія та підсумок
  words: 700
focus: The literary and philosophical platform of MUR, its key figures, and the tension between national duty and artistic
  freedom in diaspora literature.
level: LIT
module: lit-216
objectives:
- Аналізувати твори "Мистецького Українського Руху" (МУР) у культурно-історичному контексті повоєнної діаспори.
- Реконструювати та критично оцінювати ключові літературні дебати всередині МУРу, зокрема між Ю. Шерехом та В. Державиним.
- Ідентифікувати стилістичні інновації та поетику авторів МУРу як прояв модерністського мислення.
- Формулювати аргументовану позицію щодо деколонізаційного значення літератури діаспори та її ролі у сучасному українському
  каноні.
pedagogy: CBI
