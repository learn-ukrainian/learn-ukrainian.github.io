content_outline:
- points:
  - 'Провокація: Дитячий письменник чи гострий політичний сатирик? Що ховається за алегоріями «дідуся Кенира» в умовах Валуєвського
    циркуляру?'
  - 'Цитата без контексту: «…У нас так ведеться, | І годі інакше все піде, | Що хто дужчий, той і прав!» — про яку суспільну
    реальність говорить Глібов?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Педагогічний інструмент vs Шифр для дорослих. Чи були байки Глібова в першу чергу для виховання дітей, чи як
    єдина можлива форма критики самодержавства?'
  - 'Дебат 2: Місце в каноні. Чи не призвела «дитяча» репутація Глібова до його маргіналізації як серйозного політичного мислителя
    та поета?'
  - '[!epistemic-humility] Радянське літературознавство бачило в Глібові лише «викривача соціальних виразок». Постколоніальна
    критика розглядає його як майстра культурного опору.'
  section: 'Конфліктна карта: Байка — «дитячий» жанр чи політична зброя?'
  words: 900
- points:
  - 'Повний текст байки «Щука» з коментарем: розбір алегоричної системи (Щука, Лисиця, Судді) як моделі корумпованого суду
    Російської імперії.'
  - 'Наративна структура «кругової поруки»: аналіз того, як Глібов показує безвихідь і цинізм системи, де злочинці самі себе
    судять.'
  - 'Повний текст байки «Вовк і Ягня»: дослідження архетипів сили (Вовк) та беззахисності (Ягня). Конфлікт як відображення
    відносин між імперією та колонізованим народом.'
  - '[!decolonization] Порівняльний аналіз з байкою Івана Крилова «Волк и Ягнёнок». Глібов загострює соціальну критику і прибирає
    моралізаторський фінал, роблячи висновок про несправедливість світу більш радикальним.'
  section: 'Читання: Аналіз байок «Щука» та «Вовк і Ягня»'
  words: 1700
- points:
  - 'Стилістичні інновації: введення живої розмовної мови та народних фразеологізмів у високу літературу, створення «легкого»
    стилю, що маскує глибину думки.'
  - 'Робота з лексикою: поєднання народних слів (оказіоналізмів) з юридичною та адміністративною лексикою для створення сатиричного
    ефекту.'
  - 'Ритміка та синтаксис: аналіз глібівського вірша — вільний ямб, що імітує природність розповіді та діалогу, але має чітку
    музичну структуру.'
  - '[!myth-buster] Міф про «простоту» байки. Насправді, поетика Глібова — це філігранна робота з ритмом, звукописом та синтаксисом,
    де кожне слово служить для характеристики персонажа.'
  section: 'Мова і поетика: Народна мова як високе мистецтво'
  words: 1500
- points:
  - 'Повернення до розминки: тож як відповідати на питання про роль Глібова? Формулювання студентом власної позиції на основі
    аналізу.'
  - 'Рецепція творчості: як сприймали Глібова сучасники (шевченківське покоління) і як його канонізували пізніше? Вплив на
    українську сатиру ХХ-ХХІ ст.'
  - 'Сучасна релевантність: чи працює мова алегорії в епоху інформаційної відкритості? Де сьогодні можна побачити «щук» та
    «вовків» Глібова?'
  - '[!anti-hagiography] Попри патріотизм, Глібов був змушений до постійних компромісів із цензурою. Чи є його алегорична
    мова виключно сміливим актом опору, чи також і трагедією митця, позбавленого права говорити прямо?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз байок Леоніда Глібова як політичної алегорії, його стилістичні інновації, роль у літературному каноні та деколонізаційний
  вимір творчості в умовах імперської цензури.
level: LIT
module: lit-038
objectives:
- Аналізувати байки Глібова як складну політичну алегорію в умовах імперської цензури.
- Визначати стилістичні особливості та поетичне новаторство Глібова у використанні народної мови.
- Критично оцінювати місце творчості Глібова в українському літературному каноні, враховуючи різні інтерпретації.
- Формулювати аргументовану позицію щодо деколонізаційного значення творчості Глібова та її актуальності сьогодні.
