content_outline:
- points:
  - 'Провокація: Чи може один вірш бути сильнішим за державну цензуру? Історія Симоненка — це історія про те, як слово стає
    зброєю.'
  - «Можна все на світі вибирати, сину, / Вибрати не можна тільки Батьківщину». Чому ці рядки стали і національним гаслом,
    і особистим вироком для поета?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Симоненко — «радянський патріот» чи прихований націоналіст? Аналіз його лояльних та відверто бунтарських текстів.'
  - 'Дебат 2: Місце в каноні. Чи був Симоненко лише «поетом відлиги», чи його творчість виходить за межі свого часу і стає
    універсальною?'
  - '[!epistemic-humility] Інтерпретації творчості Симоненка коливаються від офіційної радянської критики, що бачила в ньому
    «справжнього комуніста», до дисидентської, що вважала його пророком незалежності.'
  section: 'Конфліктна карта: Поет для системи чи проти системи?'
  words: 900
- points:
  - 'Ключовий текст: «Тиша і грім». Детальний аналіз алегорій та символів. Як поет говорить про злочини сталінського режиму,
    не називаючи їх прямо?'
  - 'Система персонажів у ліриці: образи матері, України, ворога. Як вони створюють цілісний міфологічний світ поета?'
  - 'Структура збірок «Земне тяжіння» та «Лебеді материнства»: як окремі вірші складаються у єдиний наратив про долю людини
    та нації.'
  - '[!decolonization] «Народ мій є! Народ мій завжди буде!». Поезія Симоненка як акт культурного самоствердження та прямого
    опору асиміляції та русифікації.'
  section: 'Читання: Поезія як вчинок'
  words: 1700
- points:
  - 'Стилістичний фокус: «афористична простота». Як Симоненко досягає максимальної емоційної сили за допомогою простої лексики
    та класичних форм.'
  - 'Неокласицизм як вибір: чому поет-новатор звертається до традиційних сонетів та елегій? Робота з класичною формою як спосіб
    організації хаосу.'
  - 'Особливості ритміки та синтаксису: енергійний, публіцистичний ритм віршів як відображення конфлікту епохи.'
  - '[!myth-buster] Поширена думка, що Симоненко — поет «простий і зрозумілий». Насправді за цією простотою стоїть віртуозна
    техніка та глибока філософська думка.'
  section: 'Мова і поетика: Простота, що ранить'
  words: 1500
- points:
  - 'Повернення до розминки: Чи вдалося Симоненку своєю поезією перемогти цензуру? Оцінка впливу його творчості на наступні
    покоління.'
  - 'Рецепція: як змінювалося сприйняття Симоненка від 60-х років до сьогодення? Від забороненого поета до ікони національного
    пантеону.'
  - '[!anti-hagiography] Симоненко — не бронзовий пам''ятник, а жива людина з сумнівами та суперечностями. Аналіз його щоденників
    та листів.'
  - 'Сучасне значення: Чому вірші Симоненка про вибір, гідність та любов до Батьківщини звучать сьогодні, під час війни, так
    гостро та актуально?'
  section: Дискусія та підсумок
  words: 700
focus: 'Поезія Василя Симоненка як феномен шістдесятництва: аналіз громадянської лірики, філософської алегорії та деколонізаційного
  пафосу.'
level: LIT
module: lit-133
objectives:
- Аналізувати поезію Василя Симоненка в культурно-історичному контексті хрущовської «відлиги» та руху шістдесятників.
- Досліджувати стилістичні особливості, мовні інновації та поетику Симоненка, зокрема його афористичну простоту.
- Оцінювати деколонізаційне значення творчості Симоненка як форми опору русифікації та радянській ідеології.
- Формулювати власну аргументовану позицію в літературних дебатах щодо постаті та спадщини поета.
