activity_hints:
- description: Визначити, яка з двох позицій (Симоненко — лояліст чи націоналіст) підтверджується наведеною цитатою з його
    творів або щоденників.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити пропущені ключові слова (алегорія, метафора, афористичність) у речення з аналізом його поезії.
  focus: Мова та поетика Симоненка
  items: 5
  type: fill-in
- description: Порівняйте фрагмент вірша Симоненка та запис з його щоденника на ту саму тему. Що поет міг сказати відверто,
    а що мусив зашифровувати в алегоріях? Чому?
  focus: 'Джерельний аналіз: Поезія vs Щоденник'
  type: note
- description: Оберіть один вірш Василя Симоненка та напишіть коротке есе (400-600 слів) про те, чому цей текст залишається
    актуальним у контексті сучасної російсько-української війни.
  focus: 'Есе: Симоненко і сьогодення'
  type: note
