content_outline:
- points:
  - 'Провокація: Чи може готичний роман, сповнений містики та химер, бути формою антирадянського спротиву?'
  - Цитата з «Трьох листків за вікном», що занурює в атмосферу таємниці та екзистенційної тривоги без жодного контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Химерна проза» — це втеча в езотерику від радянської дійсності чи зашифрований філософський коментар про неї?'
  - 'Дебат 2: Шевчук — це український модерніст, який продовжує традицію Розстріляного відродження, чи постмодерніст, що грається
    з історичними формами та наративами?'
  - '[!epistemic-humility] Позиції критиків (від Дончика до Гундорової) розходяться, пропонуючи різні лінзи для розуміння
    феномену Шевчука.'
  section: 'Конфліктна карта: Спротив чи втеча?'
  words: 900
- points:
  - 'Ключовий уривок з твору: аналіз структури, химерних образів та фольклорних мотивів.'
  - 'Розбір філософської прози в «Оці Прірви»: як Шевчук ставить екзистенційні питання в історичних декораціях давньої України.'
  - 'Інтертекстуальність: зв''язки з літописами, хроніками та європейською готичною традицією (Гофман, По).'
  - '[!decolonization] Проза Шевчука — це свідомий акт культурної реставрації, спроба відновити перервану традицію української
    філософської та містичної літератури, ігноруючи канон соцреалізму.'
  section: 'Читання: «Три листки за вікном»'
  words: 1700
- points:
  - 'Аналіз унікального стилю: свідоме використання архаїзмів, неологізмів та ритмічної, майже медитативної прози.'
  - 'Вплив давньоукраїнської мови та бароко: як синтаксис і структура речення стають інструментом для передачі складних філософських
    ідей.'
  - 'Мова як головний герой: Шевчук доводить, що українська мова здатна на будь-яку інтелектуальну глибину, спростовуючи імперський
    наратив про її «селянську» природу.'
  - '[!myth-buster] Поширений міф, що складна, інтелектуальна проза є чужою для української літератури. Шевчук доводить протилежне,
    спираючись на потужну барокову традицію.'
  section: 'Мова і поетика: Бароковий синтаксис і філософська лексика'
  words: 1500
- points:
  - 'Повернення до провокації: як саме містицизм у творах Шевчука працює як форма спротиву?'
  - 'Спадщина «химерної прози»: вплив Шевчука на сучасну українську фантастику та інтелектуальну прозу (Юрій Винничук, Юрко
    Іздрик).'
  - '[!anti-hagiography] Критичний погляд: чи не є надмірна стилістична складність та архаїзація перешкодою для сучасного
    читача? Дискусія про елітарність та доступність.'
  - 'Підсумкове питання для рефлексії: чи змінилося ваше розуміння ролі літератури в тоталітарному суспільстві після знайомства
    з прозою Шевчука?'
  section: Дискусія та підсумок
  words: 700
focus: Валерій Шевчук, "химерна проза", готичний містицизм, інтелектуальний спротив, Три листки за вікном, Око Прірви, бароковий
  стиль
