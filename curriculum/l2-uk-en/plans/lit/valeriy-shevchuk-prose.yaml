objectives:
- Аналізувати ключові твори Валерія Шевчука («Три листки за вікном», «Око Прірви») в контексті його «химерної прози»
- Інтерпретувати використання готичних та містичних елементів як форму інтелектуального спротиву радянській ідеології
- Аналізувати мову та стилістику прози Шевчука, зокрема використання архаїзмів та барокових синтаксичних конструкцій
- Визначати вплив стилю Шевчука на сучасну українську літературу
