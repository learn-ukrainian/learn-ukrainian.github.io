content_outline:
- points:
  - 'Провокація: Як повість про українську сільську дівчинку, написана жінкою під псевдонімом, стала міжнародним бестселером
    і символом України в 19 столітті?'
  - 'Загадка: Текст був нагороджений премією Французької академії, але авторка так і не отримала грошей. Чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Маруся» для європейців vs «Маруся» для українців. Чи був європейський успіх твору наслідком «пом''якшення»
    та спрощення українського контексту її російським перекладачем Іваном Тургенєвим?'
  - 'Дебат 2: Авторство і патронаж. Марко Вовчок — самостійна літературна одиниця чи «проект» чоловіків-письменників (Пантелеймон
    Куліш, Іван Тургенєв), які «просували» її?'
  - '[!epistemic-humility] Критики досі сперечаються, чия роль була вирішальною в успіху «Марусі» — геній авторки чи вдалий
    маркетинг її покровителів.'
  section: 'Конфліктна карта: Дитяча казка чи політична алегорія?'
  words: 900
- points:
  - 'Аналіз ключових уривків: Сцена прощання Марусі, її героїчний вчинок, трагічний фінал. Як авторка створює образ ідеальної
    героїні?'
  - 'Система персонажів: Маруся як втілення України — її краса, жертовність та непокора. Чоловічі персонажі на її фоні.'
  - 'Історичний фон: Як реалії козацької історії та фольклору вплетені в сюжет дитячої повісті?'
  - '[!decolonization] Текст як спротив асиміляції. «Маруся» пропонує український національний наратив у час, коли українська
    ідентичність заперечувалася імперією. Героїня — активна діячка, а не пасивна жертва.'
  section: 'Читання: Повість «Маруся»'
  words: 1700
- points:
  - 'Стилістичні інновації: Синтез фольклорної оповіді та європейського сентименталізму.'
  - 'Робота з народною мовою: використання діалектизмів, приказок, пісенних елементів для створення автентичного українського
    світу.'
  - 'Особливості синтаксису: Короткі, динамічні речення, що створюють емоційну напругу та імітують усну розповідь.'
  - '[!myth-buster] Позірна «простота» мови Марка Вовчка — це не наївність, а результат складної стилістичної роботи. Вона
    перетворила народну мову на потужний інструмент літератури.'
  section: 'Мова і поетика: Народна мова як високе мистецтво'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, як і чому «Маруся» стала «українською легендою в Європі»? Студент формулює відповідь на
    основі аналізу.'
  - 'Рецепція твору: Як змінювалося сприйняття «Марусі» від 19 століття до сьогодні? Чому в СРСР її трактували як «антикріпосницьку»,
    а сьогодні — як «національно-визвольну»?'
  - '[!anti-hagiography] За блискучим успіхом «Марусі» стоїть складна доля її авторки, Марії Вілінської, сповнена особистих
    драм, фінансових труднощів та звинувачень у плагіаті. Література — не завжди красива історія.'
  - 'Питання до роздумів: Чи можливий сьогодні твір, який би мав такий самий ефект культурної дипломатії для України, як «Маруся»
    у свій час?'
  section: Дискусія та підсумок
  words: 700
