- Критично аналізувати повість «Маруся» як літературний та культурний феномен
- Розрізняти різні історичні та ідеологічні інтерпретації твору (романтичну, народницьку, радянську, постколоніальну)
- Визначати стилістичні особливості прози Марка Вовчка, що поєднує фольклорну та літературну традиції
- Формулювати аргументовану позицію щодо ролі літератури в процесах національного самоствердження та культурної дипломатії
