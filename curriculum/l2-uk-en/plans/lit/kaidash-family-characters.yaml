content_outline:
- points:
  - 'Провокація: Чи може повість про сварку за грушу бути великою літературою? Чому "Кайдашева сім''я", а не "Хіба ревуть
    воли", стала найпопулярнішим текстом українського реалізму?'
  - 'Цитата без контексту: «Діло, бачте, не в груші. Навіщо, справді, було лаятися за таку нікчемну грушу? А діло в тому,
    що ні Карпо, ні Мотря не хотіли ні в чому уступати.»'
  section: 'Розминка: Груша розбрату'
  words: 400
- points:
  - 'Дебат 1: Автор — жорстокий сатирик чи чуйний психолог? Позиція 1 (сатира): Нечуй-Левицький висміює темноту, жадібність
    і духовну обмеженість пореформеного селянства. Позиція 2 (співчуття): Автор змальовує трагедію людей, які є жертвами соціальних
    умов, патріархального устрою і власної недосконалості.'
  - 'Дебат 2: Відкритий фінал — художня слабкість чи геніальний хід? Позиція 1 (слабкість): Автор не зміг знайти вирішення
    конфлікту, фінал виглядає штучним. Позиція 2 (геніальність): Фінал символізує вічність і нерозв''язність подібних конфліктів,
    їхню циркулярну природу в українському суспільстві.'
  - '[!epistemic-humility] Літературна критика XX ст. довго наполягала на винятково сатиричному прочитанні, ігноруючи трагічні
    елементи повісті.'
  section: 'Конфліктна карта: Сатира чи співчуття?'
  words: 900
- points:
  - 'Омелько та Маруся: розпад патріархального світу. Омелько як носій старих цінностей і його безсилля. Маруся як «справжня
    влада», що використовує традиційні механізми для маніпуляцій. Архетип української свекрухи.'
  - 'Карпо і Лаврін: два покоління в одному. Карпо — «темний», впертий, матеріалістичний. Лаврін — ліричний, чутливий, але
    згодом також втягнутий у конфлікт. Як автор показує деградацію другого сина?'
  - 'Мотря і Мелашка: два типи невісток. Мотря — втілення бунту, активного спротиву. Мелашка — пасивна жертва, що намагається
    втекти. Чому обидві стратегії програшні?'
  - '[!decolonization] На відміну від російського реалізму, що фокусувався на «зайвих людях» дворянства, український реалізм
    Нечуя-Левицького зробив своїм головним героєм народ і його внутрішні, соціально-побутові драми.'
  section: 'Читання: Галерея живих характерів'
  words: 1700
- points:
  - 'Створення характерів через мову: індивідуальні мовні партії. Лірична, пісенна мова Мелашки; гостра, лайлива мова Мотрі;
    повчально-демагогічна мова Кайдашихи.'
  - 'Функція гумору: від легкої іронії до нищівного сарказму. Гумор не як розвага, а як інструмент аналізу і, водночас, як
    захисний механізм самих персонажів.'
  - 'Поетика лайки: українська лайка як частина народної культури і як художній прийом. Аналіз найвідоміших сварок — це хаос
    чи структурований ритуал?'
  - '[!myth-buster] Міф про «просту народну мову» повісті. Насправді, це складна художня конструкція, де діалектизми, прислів''я,
    церковнослов''янізми та авторські неологізми створюють унікальний стилістичний сплав.'
  section: 'Мова і поетика: Естетика трагікомедії'
  words: 1500
- points:
  - 'Повернення до розминки: тож чому ця повість стала класикою? Студент формулює відповідь, використовуючи аргументи з усього
    модуля.'
  - 'Рецепція твору: як змінювалося сприйняття повісті від її появи до наших днів. Чому радянська критика наголошувала на
    «класовій боротьбі» в сім''ї?'
  - '[!anti-hagiography] Персонажі повісті не є ані позитивними, ані негативними героями. Вони — живі, суперечливі люди. Деконструкція
    образу «святого українського селянина».'
  - 'Сучасна релевантність: феномен серіалу «Спіймати Кайдаша» (2020). Які аспекти повісті виявились найактуальнішими для
    України XXI століття? Що було змінено, додано, і чому?'
  section: 'Дискусія та підсумок: Чому Кайдаші досі з нами?'
  words: 700
focus: Character archetypes, family conflict, and psychological realism in Nechuy-Levytsky's "Kaidash Family", exploring satire
  vs. sympathy and the poetics of tragicomedy.
level: LIT
module: lit-027
objectives:
- Аналізувати систему персонажів як художнє ціле, а не як набір окремих портретів
- Розрізняти поняття «типаж» та «архетип» на прикладі образів Кайдашихи та Омелька
- Формулювати аргументовану позицію в літературній дискусії (сатира vs. співчуття), спираючись на текст
- Аналізувати мовні засоби творення комічного та трагічного у творі
- Пояснювати феномен довготривалої популярності твору, пов’язуючи його з сучасними адаптаціями
pedagogy: CBI
