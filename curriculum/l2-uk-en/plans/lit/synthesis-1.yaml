content_outline:
- points:
  - 'Провокативне питання: Чи була українська література кінця XIX ст. лише відповіддю на імперський тиск, чи самодостатнім
    модерністським проєктом?'
  - 'Вступний епіграф без авторства (напр., цитата Франка чи Лесі Українки про "нову людину") з питанням: Хто і в якому контексті
    міг це написати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Еволюція чи революція? Чи є творчість модерністів (Коцюбинський, Кобилянська) продовженням традицій реалізму
    (Нечуй-Левицький), чи радикальним розривом?'
  - 'Дебат 2: Народництво vs Європеїзм. Чи мала література служити "народові", просвічуючи його, чи мала інтегрувати українську
    культуру в загальноєвропейський модерністський дискурс?'
  - '[!epistemic-humility] Обидві позиції мають сильних апологетів. Завдання — не обрати "правильну", а зрозуміти логіку та
    аргументи кожної сторони.'
  section: 'Конфліктна карта: Діалог чи розрив?'
  words: 900
- points:
  - 'Порівняльний аналіз уривків: "Fata Morgana" Коцюбинського, "Земля" Кобилянської, "Перехресні стежки" Франка.'
  - Як автори зображують селянина, інтелігента, жінку? Чи це ще об'єкти опису, чи вже суб'єкти власної долі?
  - '[!decolonization] На противагу імперському наративу про "малоросів" як пасивний етнос, українська література створює
    образ активного, рефлексуючого суб''єкта, що бореться за свою ідентичність і землю.'
  - 'Аналіз трансформації архетипів: як "пропаща сила" стає "камінним господарем" або свідомим пролетарем.'
  section: 'Читання: Конструювання українського суб''єкта'
  words: 1700
- points:
  - 'Аналіз мовних експериментів: імпресіонізм Коцюбинського, символізм Олеся, неоромантизм Лесі Українки.'
  - 'Трансформація літературної мови: від етнографічно-діалектної стилізації до створення універсальної філософської та психологічної
    лексики.'
  - '[!myth-buster] Міф про "солов''їну" мову. Автори епохи не просто використовували "красиві" слова, а свідомо "ламали"
    синтаксис, вводили неологізми, шукали нові виражальні засоби для нових ідей.'
  - 'Інтертекстуальність як інструмент: діалог з європейськими філософами (Ніцше) та письменниками (Ібсен, Метерлінк) у творах
    українських авторів.'
  section: 'Мова і поетика: Стилістичний калейдоскоп'
  words: 1500
- points:
  - 'Повернення до розминки: Чи був це самодостатній проєкт? Аргументована відповідь на основі аналізу.'
  - 'Спадщина епохи: Як теми та конфлікти "Горизонтів епохи 1" (боротьба за суб''єктність, деколонізація, вибір між Сходом
    і Заходом) резонують у сучасній Україні?'
  - '[!anti-hagiography] Уникнення ідеалізації: чи не призвели інтелектуальні пошуки епохи до відриву еліти від широких мас,
    що стало однією з причин поразки УНР?'
  - 'Рефлексія: Які з прочитаних текстів та ідей є, на вашу думку, найбільш актуальними для інтелектуальної безпеки сучасної
    України?'
  section: Дискусія та підсумок
  words: 700
focus: Синтез українського інтелектуального процесу кінця XIX - початку XX ст., фокусуючись на діахронії, деколонізації, стилістичній
  еволюції та філософії ідентичності.
level: LIT
module: lit-041
objectives:
- Синтезувати знання про літературний процес кінця XIX - початку XX століття, виявляючи ключові тенденції та конфлікти.
- Застосовувати деколонізаційну та компаративну оптики для аналізу взаємозв'язків між авторами та їхніми творами.
- Аналізувати авторські стилі та мовні експерименти як інструменти формування нової філософії та ідентичності.
- Формулювати аргументовану позицію щодо тяглості української інтелектуальної традиції та її значення для сучасності.
