content_outline:
- points:
  - 'Провокація: Куліш — творець чи руйнівник української ідентичності?'
  - 'Цитата без контексту: «Замість великої ідеї... зосталась у нас одна дрібна, жалісна думка — аби про нас не забули» —
    як це відображає драму самого автора?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Народник" проти "європейця". Куліш у полеміці з Шевченком та костомарівською ідеалізацією козацтва.'
  - 'Дебат 2: "Хуторянство" проти "державництва". Ідея культурного самовдосконалення на противагу політичній боротьбі — це
    мудрість чи зрада?'
  - '[!epistemic-humility] Не існує "правильного" Куліша. Його погляди еволюціонували від романтизму до жорсткого раціоналізму
    та скепсису.'
  section: 'Конфліктна карта: Геній протиріч'
  words: 900
- points:
  - 'Текст: Аналіз ключових сцен — рада в Ніжині, конфлікт Сомка та Брюховецького.'
  - 'Структура: Чому це "роман-хроніка"? Як Куліш поєднує історичний документ з художнім вимислом?'
  - 'Система персонажів: Сомко (ідеалізований державник) vs Брюховецький (демагог) vs Шрам (старий козацький ідеал) vs Петро
    (новий тип українця).'
  - '[!decolonization] "Чорна рада" як перший український історичний роман. Створення національного наративу на власних історичних
    подіях, а не як відгалуження від російської літератури.'
  section: 'Читання: "Чорна рада, хроніка 1663 року"'
  words: 1700
- points:
  - 'Стилістичний фокус: Створення "кулішівки" — фонетичного правопису, що ліг в основу сучасної української абетки. Принципи
    "пиши як чуєш".'
  - 'Мовні інновації: Куліш як перекладач Біблії, Шекспіра. Введення нових слів, синтаксичних конструкцій.'
  - 'Стиль "Чорної ради": поєднання книжної мови з народною, архаїзми для створення історичного колориту.'
  - '[!myth-buster] Куліш не просто "письменник". Він — мовний інженер, що свідомо конструював сучасну українську літературну
    мову.'
  section: 'Мова і поетика: "Кулішівка" та мовна реформа'
  words: 1500
- points:
  - 'Повернення до розминки: Чи можна бути одночасно творцем абетки і критиком ідеї державності?'
  - 'Історична рецепція: Як сприймали Куліша сучасники, і як його оцінка змінилася після здобуття незалежності?'
  - '[!anti-hagiography] Куліш — не пам''ятник, а жива людина з трагічними помилками: його антисемітські випади, звинувачення
    Шевченка в "п''яному" патріотизмі.'
  - 'Сучасна релевантність: Суперечки навколо Куліша — це суперечки про шляхи розвитку України, які тривають і досі.'
  section: Дискусія та підсумок
  words: 700
focus: Panteleimon Kulish's major works (esp. 'Black Council'), stylistic innovations ('Kulishivka' orthography), and complex
  role in shaping Ukrainian identity through a decolonial lens
level: LIT
module: lit-021
objectives:
- Аналізувати роман «Чорна рада» як перший український історичний роман, розрізняючи в ньому історичну правду та художній
  вимисел.
- Формулювати аргументовану позицію щодо суперечливої ролі Куліша в українському культурному процесі XIX століття (дебати
  "Куліш vs Шевченко", "державництво vs хуторянство").
- Оцінити внесок Куліша в розвиток української літературної мови та правопису ("кулішівка").
- Застосовувати деколоніальну оптику для аналізу творчості Куліша, виявляючи спротив імперським наративам.
