objectives:
- Аналізувати прозу Марії Матіос у контексті історичної травми Буковини та пост-радянської ідентичності
- Досліджувати роль діалекту та мовних особливостей як художнього інструменту в літературі травми
- Оцінювати деколонізаційне значення творчості, що руйнує імперські наративи та повертає історичну пам'ять
- Формулювати власну аргументовану позицію в літературних дебатах щодо співвідношення документального та художнього в історичній
  прозі
