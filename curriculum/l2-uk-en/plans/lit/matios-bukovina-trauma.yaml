content_outline:
- points:
  - 'Провокативне питання: Чи може література "вилікувати" історичну травму, чи вона лише знову роз''ятрює рани, приречена
    свідчити про біль безкінечно?'
  - 'Цитата з роману без контексту, що відображає психологічний стан, спричинений травмою, наприклад: "Страх не може тривати
    вічно. Але пам''ять триває вічно".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Проза Матіос — це документалістика, що використовує художні засоби, чи це передусім мистецтво, яке лише черпає
    натхнення з історії? Позиція "література як свідчення" vs "література як естетичний об''єкт".'
  - 'Дебат 2: Місце "травматичної прози" в каноні. Одні критики вважають її необхідним елементом національного самоусвідомлення.
    Інші — звинувачують у "спекуляції на болі" та надмірній експлуатації теми страждань.'
  - '[!epistemic-humility] Немає єдиної відповіді на те, де пролягає межа між фактом і вигадкою в історичному романі. Кожна
    інтерпретація є лише наближенням.'
  section: 'Конфліктна карта: Свідчення чи мистецтво?'
  words: 900
- points:
  - 'Аналіз структури роману: нелінійний час, фрагментарність як відображення розщепленої свідомості травмованої особистості
    та спільноти.'
  - 'Система персонажів: Даруся як алегорія зґвалтованої пам''яті. Інші персонажі як носії різних стратегій виживання: мовчання,
    колаборація, спротив.'
  - 'Конфлікт: боротьба не між "добром" і "злом", а між пам''яттю та забуттям. Внутрішній конфлікт героїв, що змушені жити
    з нестерпним минулим.'
  - '[!decolonization] Текст руйнує радянський міф про "добровільне возз''єднання" Західної України, показуючи його як акт
    брутального насильства та окупації, що залишив глибокі шрами.'
  section: 'Читання: "Солодка Даруся" як текст-травма'
  words: 1700
- points:
  - 'Стилістичний аналіз: використання діалектизмів, архаїзмів та унікального синтаксису для створення автентичної атмосфери
    та психологічного портрету регіону.'
  - Мова не як фон, а як активний учасник подій. Вона зберігає пам'ять, яку люди намагаються стерти. Кожне діалектне слово
    — це "артефакт" минулого.
  - '[!myth-buster] Руйнування міфу, що діалектна література є "провінційною" або "менш вартісною". Матіос доводить, що регіональна
    мова може бути потужним інструментом для розкриття універсальних людських трагедій.'
  - Символізм на рівні звукопису та ритміки тексту. Повтори, алітерації, що створюють відчуття нав'язливих спогадів, від яких
    неможливо звільнитися.
  section: 'Мова і поетика: Буковинський діалект як персонаж'
  words: 1500
- points:
  - 'Повернення до початкового питання: отже, що робить проза Матіос — лікує чи травмує? Студенти формулюють власну позицію
    на основі аналізу.'
  - 'Рецепція твору: від захоплення до гострої критики. Чому цей текст викликав такий резонанс в українському суспільстві?'
  - '[!anti-hagiography] Уникаємо простого звеличення авторки. Розглядаємо також критичні зауваження: чи не є такий рівень
    деталізації жорстокості контрпродуктивним?'
  - 'Сучасна релевантність: як досвід, описаний Матіос, допомагає зрозуміти реакцію українців на сучасну війну та окупацію?'
  section: Дискусія та підсумок
  words: 700
focus: 'Література як свідчення: аналіз прози Марії Матіос ("Солодка Даруся") через призму історичної травми, колективної
  пам''яті та деконструкції радянських міфів про "возз''єднання".'
