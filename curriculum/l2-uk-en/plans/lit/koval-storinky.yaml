content_outline:
- points:
  - 'Провокація: "Koval Storinky" — це щоденник, роман чи філософський трактат? Як жанрова невизначеність стає ключем до розуміння
    тексту?'
  - Цитата-загадка з твору, що ілюструє стилістичну гру автора та її виклик для читача.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автобіографічна сповідь vs. фікційна проза. Де пролягає межа між автором і ліричним героєм? Аргументи "за" і
    "проти" кожної версії.'
  - 'Дебат 2: Місце в каноні. Це елітарна література "для посвячених" чи текст, що має говорити до широкої аудиторії? Дискусія
    про герметичність та доступність.'
  - '[!epistemic-humility] Критики розходяться в оцінках: від звинувачень у надмірній складності до проголошення твору новим
    словом в українській літературі.'
  section: 'Конфліктна карта: Текст як поле бою інтерпретацій'
  words: 900
- points:
  - 'Розширений аналіз ключових уривків з твору: детальний розбір символіки, метафор, алегорій.'
  - 'Система персонажів та їхня еволюція: архетипи та міфологічні підтексти, що стоять за героями.'
  - 'Конфлікт як рушійна сила сюжету: внутрішні та зовнішні конфлікти, їхня роль у структурі твору.'
  - '[!decolonization] Агентність українського героя: як текст утверджує суб''єктність і чинить опір асиміляції та культурній
    вторинності. Твір як акт культурного самоствердження.'
  section: 'Читання: Герменевтика ключових образів та мотивів'
  words: 1700
- points:
  - 'Стилістичні інновації автора: аналіз неологізмів, оказіоналізмів та унікальних авторських тропів.'
  - 'Робота з мовою: використання діалектизмів, архаїзмів та розмовних елементів як художнього прийому.'
  - 'Синтаксис як значення: як структура речення, ритміка та пунктуація створюють додаткові смисли.'
  - '[!myth-buster] Це не просто "складна мова". Це свідома мовна стратегія, яка кидає виклик усталеним літературним нормам
    та читацьким очікуванням.'
  section: 'Мова і поетика: Стилістичні інновації та авторський синтаксис'
  words: 1500
- points:
  - 'Повернення до розминки: тож як визначити жанр "Koval Storinky"? Студент формулює власну аргументовану позицію.'
  - 'Рецепція твору: як текст був сприйнятий критикою та читачами під час публікації і як його читають сьогодні?'
  - Вплив на наступні покоління письменників та місце у світовому контексті.
  - '[!anti-hagiography] Чи завжди критика була позитивною? Аналіз негативних рецензій та їхньої аргументації — уникаємо творення
    ікони з автора.'
  section: Дискусія та підсумок
  words: 700
focus: 'Творчість Koval Storinky: стилістичний аналіз, герменевтика ключових образів, та деколонізаційне значення в сучасному
  українському каноні'
