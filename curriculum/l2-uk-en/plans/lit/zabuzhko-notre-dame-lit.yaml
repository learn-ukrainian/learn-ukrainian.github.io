content_outline:
- points:
  - 'Провокація: Чому найрадикальніший феміністичний текст сучасної української літератури написано про поетесу, яку всі знають
    зі шкільної програми?'
  - 'Цитата Забужко: "Леся Українка — єдиний мужчина в українській літературі". Що ця фраза говорить про саму Забужко, а що
    — про українську культуру?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Забужко проти "шкільного" лесезнавства. Чи є її інтерпретація науковою, чи це лише провокативна есеїстика?'
  - 'Дебат 2: "Notre Dame d''Ukraine" як атака на національний канон. Чи має право один автор так радикально перепрочитувати
    іншого, змінюючи його місце в пантеоні?'
  - '[!epistemic-humility] Позиція опонентів: Забужко ігнорує історичний контекст, модернізує Лесю, приписує їй власні ідеї.
    Позиція апологетів: Забужко звільняє Лесю від пут "народницького" канону, повертаючи її європейській культурі.'
  section: 'Конфліктна карта: Феміністична ревізія чи національна зрада?'
  words: 900
- points:
  - 'Розбір ключового фрагменту: аналіз стосунків Лесі Українки та Ольги Кобилянської через феміністичну оптику Забужко.'
  - '[!decolonization] Забужко виводить Лесю з тіні "російської культури", показуючи її як абсолютно європейську авторку,
    що веде діалог із Ніцше, а не з Пушкіним.'
  - 'Аналіз структури есею: як Забужко використовує біографію, листування та власні рефлексії для створення нового, "живого"
    образу Лесі.'
  - 'Сюжет "інтелектуального детективу": як Забужко шукає "ключ" до розуміння Лесі, відкидаючи радянські та націоналістичні
    кліше.'
  section: 'Читання: Notre Dame d''Ukraine — Код Лесі'
  words: 1700
- points:
  - '[!myth-buster] Мова Забужко — не просто "складна", а є інструментом. Аналіз довгих, багатошарових речень як спроби відтворити
    складність думки.'
  - 'Стилістичний аналіз: поєднання високого академічного стилю, філософської термінології, розмовної лексики та відвертого
    епатажу.'
  - 'Інтертекстуальність: як Забужко вплітає у свою розповідь десятки імен, теорій та цитат, створюючи щільне інтелектуальне
    поле.'
  - 'Ритм і синтаксис: як пунктуація (тире, дужки) стає інструментом для керування увагою читача та розстановки акцентів.'
  section: 'Мова і поетика: Есеїстичний синтаксис та інтелектуальний жаргон'
  words: 1500
- points:
  - 'Повернення до розминки: тож хто така Леся Українка після Забужко? Ікона фемінізму, європейська інтелектуалка чи все ж
    "дочка Прометея"?'
  - 'Рецепція твору: чому "Notre Dame d''Ukraine" викликав такий скандал? Аналіз критики 90-х і 2000-х.'
  - '[!anti-hagiography] Як Забужко, борючись з одним каноном, ризикує створити інший — канон самої себе як головної інтерпретаторки
    української літератури?'
  - 'Сучасне значення: чи актуальна сьогодні оптика Забужко для прочитання класики? Запропонуйте власну "ревізію" одного зі
    шкільних творів.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз есею Оксани Забужко "Notre Dame d'Ukraine", феміністична критика, деконструкція канону, мова як інструмент культурної
  влади.
