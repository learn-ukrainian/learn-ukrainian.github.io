activity_hints:
- description: Визначити, кому належить теза про інтерпретацію Лесі Українки — апологету чи опоненту Забужко.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити в речення з критичних статей ключові терміни: дискурс, канон, рецепція, ревізія, інтерпретація.'
  focus: Термінологічний апарат Забужко
  items: 5
  type: fill-in
- description: Наведено одне довге речення з "Notre Dame d'Ukraine". Розбийте його на смислові блоки, поясніть роль розділових
    знаків і перекажіть основну думку своїми словами.
  focus: 'Аналіз стилю: "дешифрування" речення Забужко'
  type: note
- description: Оберіть будь-який твір зі шкільної програми, який, на вашу думку, потребує "перепрочитання". Застосовуючи підхід
    Забужко, запропонуйте новий погляд на цей твір. (400-600 слів).
  focus: 'Есе: Ваша ревізія канону'
  type: note
