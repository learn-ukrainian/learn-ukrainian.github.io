objectives:
- Критично аналізувати есе "Notre Dame d'Ukraine" як приклад феміністичної ревізії національного канону
- Досліджувати стилістичні особливості письма Оксани Забужко як інструмент впливу та переконання
- Формулювати власну аргументовану позицію в літературній дискусії щодо інтерпретації класичних текстів
- Розрізняти поняття "науковий аналіз", "есеїстика" та "публіцистика" на матеріалі сучасної української критики
