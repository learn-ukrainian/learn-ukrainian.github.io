objectives:
- Аналізувати есеїстику Євгена Сверстюка крізь призму поняття «морального опору»
- Розрізняти позиції в літературно-критичних дебатах щодо творчості шістдесятників-дисидентів
- Проводити стилістичний аналіз тексту, визначаючи, як синтаксис та риторичні фігури створюють філософський зміст
- Оцінювати актуальність ідей Сверстюка для розуміння сучасної боротьби України за свободу та гідність
