content_outline:
- points:
  - 'Провокація: Чи може одна людина без зброї перемогти тоталітарну імперію? Есе «Собор у риштованні» як інструкція до дії.'
  - 'Цитата-загадка: «Головна заповідь — не збреши. І не тільки у слові, а й у мовчанні, і в дії, і в бездіяльності».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сверстюк — це література чи публіцистика? Позиція 1: його тексти — це насамперед мистецтво слова, філософська
    есеїстика. Позиція 2: його головна мета — політична, а форма — лише інструмент.'
  - 'Дебат 2: Природа «морального опору» — активний протест чи внутрішня еміграція? Позиція 1: Сверстюк закликав до тихого,
    але непохитного збереження гідності. Позиція 2: його тексти були закликом до дії, до створення паралельного суспільства.'
  - '[!epistemic-humility] Для радянської системи будь-який прояв незалежної думки вже був політичним актом, що стирало межу
    між мистецтвом і політикою.'
  section: 'Конфліктна карта: Художник чи громадянин?'
  words: 900
- points:
  - 'Уривок з тексту: аналіз ключової метафори — собор (культура, духовність), що вічно перебуває в риштованні (тимчасовість,
    незавершеність, але й процес творення).'
  - 'Наративна структура: рух від конкретного образу зруйнованої церкви до глобального філософського узагальнення про долю
    культури в тоталітарній державі.'
  - 'Система образів: «будівничі» vs «руйнівники», «майстри» vs «глядачі». Алегорія української інтелігенції та суспільства.'
  - '[!decolonization] Текст руйнує радянський міф про «розквіт національних культур», показуючи, як імперія систематично
    нищила духовні основи поневолених народів.'
  section: 'Читання: Есе «Собор у риштованні»'
  words: 1700
- points:
  - 'Стилістичні особливості: поєднання філософської глибини з афористичною легкістю. Використання біблійних алюзій та притчевої
    форми.'
  - 'Риторика Сверстюка: спокійний, упевнений тон, що контрастує з істеричною мовою радянської пропаганди. Мова як інструмент
    збереження здорового глузду.'
  - 'Синтаксис як значення: короткі, карбовані фрази, що виражають етичні максими. Переважання складних речень для вираження
    комплексних філософських ідей.'
  - '[!myth-buster] Сверстюк — не просто «антирадянський письменник». Він — християнський мислитель і філософ-екзистенціаліст,
    для якого опір імперії був лише одним із проявів боротьби за людську душу.'
  section: 'Мова і поетика: Синтаксис гідності'
  words: 1500
- points:
  - 'Повернення до розминки: Як саме Сверстюк відповідає на питання про перемогу над імперією? (Через збереження внутрішньої
    свободи та культури).'
  - 'Рецепція: від «самвидаву» та табірних рукописів до канонічного тексту в сучасній Україні. Як змінювалося сприйняття його
    ідей?'
  - '[!anti-hagiography] Обговорення особистої ціни такого опору: роки таборів, вигнання. Це не був легкий шлях, а щоденний
    вибір, що вимагав надлюдської мужності.'
  - 'Сучасне значення: Чому тексти Сверстюка стали надзвичайно актуальними після 2014 та 2022 років? Дискусія про «моральний
    опір» в умовах окупації та війни.'
  section: Дискусія та підсумок
  words: 700
