activity_hints:
- description: 'Перевірка розуміння двох ключових дебатів: психологічного та канонічного. Чия це теза — Єфремова чи Голобородька?'
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставити пропущені слова (чорний, білий, пантера, медвідь) у речення з тексту, що описують ключові символи
    твору.
  focus: Символіка кольорів і образів
  items: 5
  type: fill-in
- description: Напишіть короткий аналіз мотивації Корнія та Рити. Чому їхній конфлікт неминучий? Чи є хтось із них «правим»?
    (250-300 слів).
  focus: 'Аналіз персонажів: Мотиви та трагедія'
  type: note
- description: Напишіть есе-роздум на тему «Мистецтво вимагає жертв», використовуючи новелу Винниченка як головний аргумент.
    Чи згодні ви з цією тезою? (400-600 слів).
  focus: 'Есе: «Мистецтво вимагає жертв»'
  type: note
cefr_min: C1
connects_to:
- lit-67
- lit-70
content_outline:
- points:
  - 'Провокація: Чи може художник принести в жертву родину заради шедевру? Де проходить межа між творчою одержимістю та моральною
    відповідальністю?'
  - 'Цитата без контексту: «Ти… ти… убив її… Ти хотів її смерті… щоб малювати свою Чорну Пантеру…» — Хто і до кого звертається?
    Що це за Пантера?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Психологічний конфлікт. Корній (митець) бачить у трагедії дружини лише матеріал для своєї картини. Рита (дружина)
    втілює вітальну, природну силу, що руйнується мистецтвом. Чий бік займає автор?'
  - 'Дебат 2: Канонічний конфлікт. Винниченко — один із найпопулярніших письменників свого часу, заборонений у СРСР, і досі
    контроверсійна фігура. Чи є він «зрадником» національної ідеї, чи великим європейським модерністом?'
  - '[!epistemic-humility] Критики сперечаються: це твір про аморальність ніцшеанського митця (Я. Голобородько), чи трагедія
    несумісності двох світів — мистецтва і природи (С. Єфремов)?'
  section: 'Конфліктна карта: Мистецтво проти життя'
  words: 900
- points:
  - 'Аналіз сюжету: не лінійна розповідь, а потік свідомості, спогади та галюцинації, що відтворюють внутрішній стан героїв.'
  - 'Система персонажів: Корній «Білий Медвідь» (холодний інтелект, мистецтво), Рита «Чорна Пантера» (пристрасть, природа),
    і дитина (точка їхнього перетину і трагедії).'
  - 'Символіка оселі: майстерня як святилище мистецтва, що протиставлене дому як простору життя і любові. Поступове захоплення
    простору картиною.'
  - '[!decolonization] Винниченко пише українською мовою на суто європейські модерністські теми (психоаналіз, конфлікт митця
    і суспільства), руйнуючи імперський стереотип про «селянську» українську літературу.'
  section: 'Читання: Психологічний трикутник: Пантера, Медвідь, і дитина'
  words: 1700
- points:
  - 'Стилістичний аналіз: імпресіоністична проза, що фіксує миттєві враження, емоції, «кольорові» слухові образи.'
  - 'Кольористика: домінація чорного, білого, червоного. Кожен колір має символічне навантаження, що змінюється протягом твору.'
  - 'Синтаксис та ритм: короткі, уривчасті фрази, повтори, риторичні питання створюють відчуття напруги, тривоги, психологічного
    зриву.'
  - '[!myth-buster] Винниченко — не просто «співець революції». Він — майстер психологічної новели, що експериментував із
    формою та мовою на рівні з найкращими європейськими модерністами (Гауптман, Стріндберг).'
  section: 'Мова і поетика: Колір, ритм і символ у прозі Винниченка'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, хто правий у конфлікті — «Пантера» чи «Медвідь»? Чи дає твір однозначну відповідь?'
  - 'Історія рецепції: як сприймали твір сучасники, чому його заборонили, і як ми читаємо його сьогодні, після досвіду ХХ
    століття?'
  - '[!anti-hagiography] Постать Винниченка: видатний письменник і невдалий політик, соціаліст і власник маєтків. Як ці суперечності
    його біографії відображені в його творчості?'
  - 'Рефлексія: Чи змінилося ваше ставлення до ролі митця в суспільстві після прочитання цього твору?'
  section: Дискусія та підсумок
  words: 700
focus: Close reading of Vynnychenko's modernist novella "Black Panther and White Bear," analyzing the central conflict between
  art and life, the psychology of the characters, and the work's controversial place in the Ukrainian literary canon.
