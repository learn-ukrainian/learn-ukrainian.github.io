objectives:
- Аналізувати драму «Украдене щастя» як соціально-психологічний твір у контексті європейського модернізму
- Досліджувати стилістичні особливості, символізм та психологізм у тексті Франка
- Оцінювати деколонізаційне значення твору, що кидає виклик імперським наративам про «пасивність» українського селянства
- Формулювати власну позицію в літературній дискусії (соціальна vs психологічна драма), спираючись на текстові докази
