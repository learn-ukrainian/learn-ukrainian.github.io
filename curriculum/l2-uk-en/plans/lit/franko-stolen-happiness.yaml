content_outline:
- points:
  - 'Провокація: Чиє щастя вкрав Михайло Гурман — своє, Аннине, чи Миколине? А що, як нічиє, бо його ніколи й не було?'
  - 'Фрагмент діалогу без контексту: «То значить... що ми... що ми собі щастя вкрали... Обоє!» — хто це говорить і кому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Драма соціальна чи психологічна? Це трагедія, спричинена суспільним утиском (громада, жандармерія, патріархат),
    чи універсальна історія про неможливе кохання та руйнівну пристрасть?'
  - 'Дебат 2: Місце в каноні. Як початкова заборона австрійською цензурою та подальші радянські «редагування» вплинули на
    сприйняття та статус твору?'
  - '[!epistemic-humility] Критики-народники (Сергій Єфремов) бачили в п''єсі критику соціальної несправедливості. Модерністи
    (і сам Франко) наголошували на психологічній глибині та «трагедії душі» в дусі Ібсена.'
  section: 'Конфліктна карта: Трагедія особистості чи суспільства?'
  words: 900
- points:
  - 'Аналіз ключових сцен: повернення Михайла, зізнання Анни, фінальна сцена з сокирою. Як через діалоги розкривається внутрішній
    світ героїв?'
  - 'Система персонажів: Анна — пасивна жертва обставин чи активна учасниця власної долі? Михайло — романтичний герой чи егоїстичний
    руйнівник? Микола — слабак чи втілення християнського смирення?'
  - '[!decolonization] Франко трансформує фольклорний мотив про «нещасливе кохання», позбавляючи його сентиментальності і
    показуючи жорстоку реальність життя під імперією, де щастя — це не право, а привілей, який можна вкрасти.'
  - 'Архетипи: аналіз персонажів через призму архетипів (напр. Тінь, Аніма/Анімус) — як це поглиблює розуміння їхніх вчинків.'
  section: 'Читання: Любовний трикутник як екзистенційна пастка'
  words: 1700
- points:
  - 'Символізм речей: сокира, гроші, «стара пісня» — як побутові предмети набувають трагічного, фатального значення.'
  - 'Мова як інструмент характеристики: порівняння мови Миколи (проста, народна), Михайла (впевнена, міська, часом жорстока)
    та Анни (від стриманості до емоційного вибуху).'
  - '[!myth-buster] П''єса — не просто реалістична замальовка з селянського життя. Франко використовує техніки європейського
    модернізму та символізму (вплив Ібсена), поєднуючи їх з глибоким знанням української ментальності.'
  - 'Синтаксис напруги: аналіз уривчастих реплік, пауз, повторів у найнапруженіших сценах як засіб передачі психологічного
    стану героїв.'
  section: 'Мова і поетика: Символізм і психологічний реалізм'
  words: 1500
- points:
  - 'Повернення до розминки: то хто ж злодій, а хто жертва? Аргументація власної позиції на основі аналізу тексту.'
  - 'Рецепція твору: від скандалу та цензурної заборони до статусу беззаперечної класики. Як змінювалося сприйняття п''єси
    в різні епохи?'
  - 'Сучасні інтерпретації: театральні постановки та екранізації XXI століття. Що нового вони відкривають у класичному тексті?'
  - '[!anti-hagiography] Попри трагізм, чи не ідеалізує Франко «сильну особистість» Михайла, чия свобода досягається ціною
    руйнування чужого життя? Чи є його «агентність» конструктивною?'
  section: Дискусія та підсумок
  words: 700
focus: 'Соціально-психологічна драма Івана Франка «Украдене щастя»: аналіз трикутника «Анна-Михайло-Микола», конфлікт обов''язку
  і почуттів, модерністська поетика'
level: LIT
