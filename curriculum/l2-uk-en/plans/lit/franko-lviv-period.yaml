content_outline:
- points:
  - 'Провокація: Франко — «Каменяр» чи декадент? Пророк нації чи співець «зів''ялого» кохання? Чому канон намагається приховати
    його внутрішні суперечності?'
  - Фрагмент з «Мойсея» без контексту, що звучить як політичний маніфест XXI століття.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був Франко модерністом? Позиція 1: Так, його психологізм, символізм та екзистенційні мотиви — ядро українського
    модернізму. Позиція 2: Ні, це був «реалізм з елементами модернізму», оскільки соціальна проблематика завжди залишалася
    домінантною.'
  - 'Дебат 2: Політична еволюція Франка від соціалізму до націоналізму. Як це відбилося на його текстах? Чи є «Мойсей» апологією
    авторитаризму чи маніфестом національного визволення?'
  - '[!epistemic-humility] Літературознавці досі сперечаються, чи є «Зів’яле листя» автобіографічною сповіддю, чи майстерною
    літературною містифікацією.'
  section: 'Конфліктна карта: Реалізм vs. Модернізм у творчості Франка'
  words: 900
- points:
  - 'Close reading: Аналіз ключових поезій з «Зів’ялого листя». Як Франко трансформує фольклорні мотиви (тричі мені являлася
    любов) у модерністський психологічний наратив?'
  - 'Close reading: Розбір прологу до «Мойсея» як квінтесенції філософії української історії та політичного заповіту.'
  - 'Система персонажів: Мойсей як алегорія українського інтелігента-провідника, що веде «невдячний» народ. Датан і Авірон
    як уособлення національного нігілізму.'
  - '[!decolonization] Франко свідомо протиставляє єврейську історію виходу з рабства українській, створюючи універсальний
    міф про визволення, що кидає виклик імперському наративу про «неісторичність» українців.'
  section: 'Читання: ''Зів''яле листя'' та ''Мойсей'''
  words: 1700
- points:
  - 'Інновації в поетичній мові: поєднання філософської лексики з народнопісенною простотою.'
  - 'Робота з жанрами: від сонета та газелі в «Зів’ялому листі» до біблійної поеми в «Мойсеї». Франко як «університет в одній
    особі».'
  - 'Ритміка та синтаксис: аналіз того, як зміна віршового розміру в «Мойсеї» відбиває зміну настрою народу та пророка.'
  - '[!myth-buster] Руйнування міфу про Франка-«раціоналіста». Аналіз ірраціонального, інтуїтивного та містичного в його пізній
    творчості.'
  section: 'Мова і поетика: Стилістичний синкретизм Франка'
  words: 1500
- points:
  - 'Повернення до розминки: тож «Каменяр» чи декадент? Студент формулює власну позицію, спираючись на аналіз текстів.'
  - 'Рецепція творчості: як радянське літературознавство «каструвало» Франка, залишаючи лише «борця за права трудящих» і приховуючи
    його модерністські та націоналістичні погляди?'
  - '[!anti-hagiography] Обговорення складних аспектів біографії Франка: його конфлікти з сучасниками, звинувачення в плагіаті,
    складні стосунки з жінками. Як це впливає на наше читання його текстів?'
  - 'Сучасна релевантність: чому «Мойсей» став одним із центральних текстів для українців під час Помаранчевої революції та
    Революції Гідності?'
  section: Дискусія та підсумок
  words: 700
focus: Ivan Franko’s Lviv period, focusing on the shift from realism to modernism, with close readings of "Withered Leaves"
  and "Moses". Literary-critical debates on his political and aesthetic evolution.
level: LIT
module: lit-046
objectives:
- Аналізувати творчість Івана Франка львівського періоду як перехідний етап від реалізму до модернізму
- Інтерпретувати поему «Мойсей» та лірику «Зів’ялого листя» в культурному та історичному контексті
- Формулювати аргументовану позицію в літературознавчих дебатах щодо стилю та ідеології Франка
- Критично оцінювати процес формування літературного канону та деконструювати радянські та імперські міфи про письменника
