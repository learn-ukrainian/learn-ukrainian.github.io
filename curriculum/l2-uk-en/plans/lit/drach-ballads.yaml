content_outline:
- points:
  - 'Провокація: Як написати антирадянську баладу, щоб її надрукували в радянському журналі? Запитайте в Івана Драча.'
  - 'Уривок без контексту: «І впало сонце, огненне око, / В твою долоню, в твою неволю…» — що це означає? Пророцтво, метафора
    чи виклик?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Іван Драч — щирий новатор-експериментатор чи «системний модерніст», якому влада дозволяла трохи більше, ніж
    іншим?'
  - 'Дебат 2: Чи є «Балади» поверненням до фольклорної традиції, чи це її рішучий розрив і створення нового, авторського міфу?'
  - '[!epistemic-humility] Критики досі сперечаються, чи був Драч лише «сонячним поетом» оптимізму, чи під маскою асоціативності
    ховав глибоку екзистенційну тривогу.'
  section: 'Конфліктна карта: Новаторство чи конформізм?'
  words: 900
- points:
  - 'Повний текст балади з коментарем: аналіз сюжету про соняшник, що «вирішив жити, як заманеться».'
  - 'Система образів: соняшник як поет, сонце як мистецтво, велосипед як техніка. Що цей тріумвірат говорить про епоху шістдесятників?'
  - 'Конфлікт як рушійна сила: бунт проти буденності, прагнення до «високого» мистецтва, трагедія неможливості його осягнути.'
  - '[!decolonization] «Балада про соняшник» — це не просто алегорія. Це маніфест українського митця, який відмовляється бути
    лише етнографічним додатком до «великої російської культури» і прагне говорити з сонцем (світовим мистецтвом) напряму.'
  section: 'Читання: Балада про соняшник'
  words: 1700
- points:
  - 'Стилістичні інновації: як Драч поєднує космічні метафори («сонце — атомний гриб») з побутовою лексикою («велосипед»,
    «дівчисько»).'
  - 'Особливості ритміки та синтаксису: вільний вірш (верлібр) замість класичного баладного розміру — як це змінює сприйняття
    жанру?'
  - 'Робота з мовою: авторські неологізми та оказіоналізми, що створюють унікальний поетичний світ.'
  - '[!myth-buster] Поширений міф: Драч — складний, «елітарний» поет. Насправді його мовні експерименти мають на меті не заплутати,
    а розширити межі української поетичної мови.'
  section: 'Мова і поетика: Нео-баладність Драча'
  words: 1500
- points:
  - 'Повернення до розминки: то як же Драчу вдавалося публікувати свої твори? Аналіз «езопової мови» та гри з цензурою.'
  - 'Рецепція та вплив: як «Балади» вплинули на наступні покоління українських поетів, зокрема на вісімдесятників та сучасних
    авторів?'
  - '[!anti-hagiography] Політична діяльність Драча в незалежній Україні: чи змінює його роль як одного із засновників Народного
    Руху наше прочитання його ранніх, нібито «аполітичних» балад?'
  - 'Питання для роздумів: чи можливий сьогодні такий «сонячний» бунт, як у Драча, в умовах повномасштабної війни?'
  section: Дискусія та підсумок
  words: 700
focus: Іван Драч та баладний ренесанс шістдесятників. Аналіз стилістичних інновацій, міфологічного підтексту та деколонізаційної
  ролі "Балад" у контексті радянської цензури.
