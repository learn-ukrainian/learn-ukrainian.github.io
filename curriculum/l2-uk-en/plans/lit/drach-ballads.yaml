objectives:
- Критично аналізувати поетичний текст у його історичному та культурному контексті
- Розрізняти та застосовувати ключові літературознавчі поняття (балада, метафора, верлібр, канон)
- Формулювати аргументовану позицію щодо деколонізаційного значення творчості Івана Драча
- Досліджувати стилістичні інновації автора та їхній вплив на розвиток української поезії
