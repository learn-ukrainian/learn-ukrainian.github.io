content_outline:
- points:
  - 'Провокація: Чи було «Розстріляне відродження» єдиним рухом, чи це лише зручна етикетка, яку ми постфактум наклеїли на
    трагічні долі десятків митців, що часто ворогували між собою?'
  - 'Цитата без автора: "Геть від Москви! Дайош Європу!" — Хто кинув цей заклик і чому він коштував йому життя?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "ВАПЛІТЕ" як організований рух vs "неокласики" як коло однодумців. Чи можна говорити про спільну програму, чи
    це була сукупність індивідуальних проєктів?'
  - 'Дебат 2: Канонізація через мучеництво vs канонізація через естетичну вартість. Чи не затьмарює трагедія їхньої загибелі
    об''єктивну оцінку їхніх творів, іноді суперечливих?'
  - '[!epistemic-humility] Немає єдиної відповіді. Літературознавці (Шерех, Лавріненко) пропонували різні моделі для опису
    цього складного явища.'
  section: 'Конфліктна карта: Рух чи покоління?'
  words: 900
- points:
  - 'Хвильовий, "Я (Романтика)": уривок про роздвоєність між "загірною комуною" та синівською любов''ю. Аналіз психологізму
    та імпресіоністичної техніки.'
  - 'Зеров, "Київ-трамвай": вірш як приклад неокласичної досконалості. Поєднання античних мотивів із урбаністичною реальністю
    Києва.'
  - 'Куліш, "Мина Мазайло": фрагмент діалогу про мову. Як комедія стає трагедією, коли йдеться про мовну ідентичність.'
  - '[!decolonization] Кожен із цих текстів є актом культурного опору. Хвильовий бореться з "московською просвітою", Зеров
    утверджує європейську тяглість Києва, Куліш викриває комплекс меншовартості.'
  section: 'Читання: Голоси розстріляних'
  words: 1700
- points:
  - 'Стилістичний плюралізм: вітаїзм (Хвильовий), неокласицизм (Зеров, Рильський), конструктивізм (Семенко), символізм (Плужник).'
  - 'Лексичні інновації: активне творення оказіоналізмів, експерименти з синтаксисом, введення урбаністичної та наукової лексики.'
  - 'Робота з жанрами: відродження сонету (неокласики), психологічна новела (Хвильовий), інтелектуальна драма (Куліш).'
  - '[!myth-buster] Це не була "пролетарська" чи "радянська" література. Більшість авторів свідомо орієнтувались на найновіші
    європейські зразки, намагаючись "наздогнати" і "перегнати" їх.'
  section: 'Мова і поетика: Стильовий вибух 1920-х'
  words: 1500
- points:
  - 'Повернення до розминки: то рух чи покоління? Студент має сформулювати власну аргументовану позицію.'
  - 'Рецепція: як змінювалось сприйняття РВ від замовчування в СРСР до гіперболізованої ідеалізації в 1990-х і до критичного
    переосмислення сьогодні.'
  - '[!anti-hagiography] Внутрішні конфлікти: гостра полеміка між Хвильовим та неокласиками. Чи можемо ми сьогодні дивитись
    на них не як на ікони, а як на живих людей з їхніми амбіціями та помилками?'
  - 'Сучасна релевантність: чому гасла 100-річної давнини знову звучать так актуально в контексті сучасної російсько-української
    війни?'
  section: Дискусія та підсумок
  words: 700
focus: The cultural and literary phenomenon of the Executed Renaissance, its key figures (Khvylovy, Zerov, Kulish), stylistic
  diversity, and its systematic destruction by the Soviet regime.
level: LIT
module: lit-119
objectives:
- Аналізувати феномен "Розстріляного відродження" як складний культурний та історичний вузол
- Порівнювати стилістичні інновації ключових авторів (неокласиків, вітаїстів, конструктивістів)
- Деконструювати імперські та радянські наративи про українську літературу 1920-30-х років
- Формулювати власну позицію в літературознавчих дебатах щодо цього періоду, спираючись на першоджерела
