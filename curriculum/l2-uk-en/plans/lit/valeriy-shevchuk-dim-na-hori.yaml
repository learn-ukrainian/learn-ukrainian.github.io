content_outline:
- points:
  - 'Провокація: Як можна було за часів Брежнєва написати глибоко антирадянський роман, опублікувати його й уникнути таборів?'
  - Загадковий фрагмент з роману про сни, дзеркала чи лабіринти, що ставить питання про природу реальності.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Шевчук — необароковий письменник чи український модерніст? Одні критики бачать у ньому спадкоємця Сковороди,
    інші — українського Джойса чи Фолкнера.'
  - 'Дебат 2: «Дім на горі» — це акт культурного опору чи втеча від реальності? Чи є створення паралельного світу формою боротьби,
    чи естетичним ескапізмом?'
  - '[!epistemic-humility] Немає єдиної відповіді. Шевчук свідомо балансує на межі, поєднуючи філософську притчу з психологічним
    романом.'
  section: 'Конфліктна карта: Спадкоємець чи новатор?'
  words: 900
- points:
  - Розширений уривок з роману, що описує Дім як живу істоту або метафору людської свідомості.
  - 'Аналіз двопланової структури: реалістична розповідь, що обрамлює фантастичні, притчові новели. Як ці два світи взаємодіють?'
  - 'Ключові образи та символи: розбір готичних елементів (таємниця, надприродне), архетипів (дім, гора, сад) та символіки
    дзеркал, снів і лабіринтів.'
  - 'Містичний Київ: як Шевчук створює унікальний літературний топос, що протистоїть радянському знеособленому міському простору.'
  - '[!decolonization] Твір як інтелектуальний спротив: Шевчук доводить, що українська мова здатна на найскладнішу філософську
    та психологічну прозу, тим самим руйнуючи імперський наратив про її «вторинність».'
  section: 'Читання: ''Дім на горі'' та його прихований світ'
  words: 1700
- points:
  - Аналіз ускладненого, «мерехтливого» синтаксису Шевчука як прямого наслідування стилю барокової прози.
  - 'Інтертекстуальність: виявлення алюзій та прихованих цитат з давньої української літератури (Григорій Сковорода, Феофан
    Прокопович).'
  - 'Стилістичні інновації: як Шевчук адаптує техніку «потоку свідомості» до української мови, створюючи унікальний синтез
    західного модернізму та національної традиції.'
  - '[!myth-buster] Міф: «Шевчук — це просто складний, архаїчний письменник». Розвінчання: його стиль — не самоціль, а інструмент
    для передачі складних психологічних станів та філософських ідей, недоступних для соцреалізму.'
  section: 'Мова і поетика: Бароковий синтаксис і потік свідомості'
  words: 1500
- points:
  - 'Повернення до розминки: то як Шевчуку вдалося уникнути репресій? Відповідь — через «внутрішню еміграцію» та створення
    езопової мови, зрозумілої для «своїх».'
  - 'Рецепція твору: від замовчування в СРСР до статусу культового після 1991 року. Вплив на сучасних авторів (Юрій Винничук,
    Тарас Прохасько, Іздрик).'
  - 'Сучасне значення: що «Дім на горі» говорить нам сьогодні про опір, ідентичність та здатність культури виживати в умовах
    тоталітарного тиску?'
  - 'Пропозиція для роздумів: чи можна вважати «Дім на горі» українським магічним реалізмом до того, як це стало мейнстрімом?'
  section: Дискусія та підсумок
  words: 700
focus: 'Valeriy Shevchuk''s "House on the Hill": close reading, baroque poetics, Gothic elements, literary debates on modernism
  vs. tradition, and the novel''s decolonial resistance to socialist realism.'
