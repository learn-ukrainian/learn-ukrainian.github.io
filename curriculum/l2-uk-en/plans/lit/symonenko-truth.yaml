content_outline:
- points:
  - 'Провокація: «Народ мій є! Народ мій завжди буде! Ніхто не перекреслить мій народ!» — це слова полум''яного націоналіста
    чи радянського патріота, що вірить у «дружбу народів»?'
  - 'Поезія Симоненка як балансування на межі дозволеного: як один з найпопулярніших поетів епохи став її найгострішим критиком?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Симоненко — ідейний комуніст, що викривав «окремі недоліки» системи, чи прихований антирадянщик, що майстерно
    володів езоповою мовою?'
  - 'Дебат 2: «Правда» в його поезії — це універсальна філософська категорія чи конкретне звинувачення тоталітарної системи
    у злочинах проти українського народу?'
  - '[!epistemic-humility] Критики досі сперечаються. Одні (Іван Дзюба) бачать у ньому «шістдесятника, який не встиг стати
    дисидентом». Інші — «розгніваного комуніста», що щиро вірив в ідеали, але був шокований реальністю.'
  section: 'Конфліктна карта: Спадщина Симоненка: Національний пророк чи радянський дисидент?'
  words: 900
- points:
  - '«Задивляюсь у твої зіниці»: Close reading вірша, що став маніфестом національної гідності. Аналіз системи образів «Україна-мати»,
    «лиций недруги», «вбогодухі».'
  - '«Де зараз ви, кати мого народу?»: Пряме звернення до теми сталінських репресій та Голодомору, що було абсолютною крамолою
    для свого часу.'
  - '«Лебеді материнства»: Як інтимна лірика про любов до матері та сина перетворюється на гімн вірності Батьківщині.'
  - '[!decolonization] Симоненко рішуче відкидає комплекс меншовартості, утверджуючи самодостатність української нації («Mаю
    я святе синівське право / З матір''ю побуть на самоті»).'
  section: 'Читання: Аналіз ключових поезій'
  words: 1700
- points:
  - 'Стилістична простота як зброя: Симоненко свідомо відмовляється від формальних експериментів, щоб його слово било точно
    в ціль. Його мова — ясна, карбована, афористична.'
  - 'Синтаксис як вирок: аналіз риторичних запитань, звертань, вигуків, що перетворюють вірш на промову прокурора чи проповідь.'
  - 'Робота з народною мовою: використання фольклорних образів (лебеді, калина, тополя), але надання їм нового, громадянського
    звучання.'
  - '[!myth-buster] Спростування міфу про Симоненка як «простого, народного поета». Аналіз його глибокого зв''язку з українською
    класичною традицією (Шевченко, Франко) та неокласиками (Рильський).'
  section: 'Мова і поетика: Неокласична форма і публіцистичний нерв'
  words: 1500
- points:
  - 'Повернення до розминки: то ким був Симоненко? Студент формулює власну відповідь, спираючись на аналіз текстів.'
  - 'Рецепція та спадщина: як цензура намагалася «приручити» Симоненка, публікуючи його твори з купюрами? Чому він став символом
    руху за незалежність у 1980-90-х?'
  - '[!anti-hagiography] Чи не спрощуємо ми Симоненка, зводячи його лише до ролі «борця з режимом»? Обговорення його інтимної,
    філософської лірики.'
  - 'Сучасне значення: чому поезія Симоненка знову звучить так актуально під час сучасної російсько-української війни?'
  section: Дискусія та підсумок
  words: 700
focus: The poetry of Vasyl Symonenko as a voice of the "shestydesiatnyky" (Sixtiers movement), exploring themes of truth,
  national dignity, and resistance to Soviet hypocrisy. Analysis of his neo-classical style and the debate over his legacy.
level: LIT
module: lit-134
objectives:
- Аналізувати поезію Василя Симоненка як феномен культури «відлиги» та руху шістдесятників
- Інтерпретувати ключові образи та мотиви його творчості в деколонізаційному контексті
- Дослідити особливості поетики Симоненка: поєднання неокласичної форми та гострої публіцистичності
- Формулювати власну аргументовану позицію в дискусії щодо ідейної спадщини поета
