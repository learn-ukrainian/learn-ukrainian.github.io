content_outline:
- points:
  - 'Провокація: Любов — це хвороба? А що, як найвища форма любові доступна лише тим, кого суспільство вважає «хворими»?'
  - 'Цитата без контексту з твору: «Рівновага — се річ дуже делікатна, а в артистичній натурі — просто неможлива».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Невроза» Любові — це клінічний діагноз чи символістський бунт проти матеріалістичного світу? Позитивістська
    (медична) vs модерністська (філософська) інтерпретація.'
  - 'Дебат 2: «Блакитна троянда» — це камерна психологічна драма чи маніфест українського модернізму? Дискусія про місце твору
    в каноні: відхід від етнографічного реалізму.'
  - '[!epistemic-humility] Критики-сучасники (С. Єфремов) бачили у драмі лише «хворобливу» і «декадентську» п''єсу. Лише пізніше
    (Д. Донцов, Д. Чижевський) її почали читати як новаторський текст.'
  section: 'Конфліктна карта: Хвороба чи бунт?'
  words: 900
- points:
  - 'Ключові сцени: Розмова Любові та Ореста про «спадкову хворобу». Сцена, де Любов грає на фортепіано як вияв її внутрішнього
    стану.'
  - 'Система персонажів: Любов як носій «артистичної натури» vs її оточення (Орест, мати, т.д.) як втілення обивательської
    «нормальності».'
  - 'Конфлікт: не соціальний, а внутрішній, психологічний. Боротьба між прагненням до ідеального кохання і страхом перед «прокляттям
    роду».'
  - '[!decolonization] Твір пориває з традицією «народництва», де герой мав служити селянству. Леся Українка створює європейського
    за духом героя-інтелігента, чиї проблеми є універсальними, а не суто українськими.'
  section: 'Читання: Драма «Блакитна троянда»'
  words: 1700
- points:
  - 'Символ блакитної троянди: пошук недосяжного ідеалу, краса, що народжується з «хвороби», унікальність.'
  - 'Психологізм: Мова персонажів як інструмент психоаналізу. Недомовки, паузи, музичні ремарки стають важливішими за прямі
    висловлювання.'
  - 'Стилістичні інновації: введення в українську драматургію технік європейського символізму (М. Метерлінк). Роль кольору,
    звуку, світла.'
  - '[!myth-buster] Це не просто «драма про божевілля». Це текст про трагедію душі, що задихається в матеріалістичному світі.
    Леся Українка використовує медичний дискурс для постановки філософських питань.'
  section: 'Мова і поетика: Символізм і психологізм мови'
  words: 1500
- points:
  - 'Повернення до розминки: то чи є кохання Ореста та Любові «хворим»? Відповідь з опорою на текст та критичні позиції.'
  - 'Рецепція твору: Чому п''єсу, написану в 1896, фактично «заново відкрили» лише в ХХ столітті? Як радянська критика намагалася
    «приборкати» цей текст?'
  - 'Сучасна актуальність: Чи змінилося наше ставлення до «ненормативності» в коханні та творчості?'
  - '[!anti-hagiography] Леся Українка — не лише «дочка Прометея», а й авторка, що не боялася досліджувати найтемніші куточки
    людської психіки.'
  section: Дискусія та підсумок
  words: 700
