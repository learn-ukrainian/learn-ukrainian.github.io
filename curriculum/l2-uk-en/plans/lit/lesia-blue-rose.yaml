objectives:
- Аналізувати драму «Блакитна троянда» як один із перших зразків українського модернізму
- Інтерпретувати ключові символи твору (блакитна троянда, хвороба) в контексті європейського символізму
- Розрізняти позитивістську та модерністську критичні перспективи на твір
- Формулювати аргументовану позицію щодо деколонізаційного значення п'єси як розриву з народницькою традицією
