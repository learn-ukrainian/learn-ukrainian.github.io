content_outline:
- points:
  - 'Провокація: Чи може текст, сповнений езотерики, окультизму та поп-культурних алюзій, бути серйозною відповіддю на пост-радянську
    травму?'
  - 'Цитата-загадка: "Коли маєш намір, усе перетворюється на знаки". Як ви це розумієте до читання роману?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Дереш — це український "контркультурний" автор для обраних, чи його твори вже стали частиною нового літературного
    канону 2000-х?'
  - 'Дебат 2: "Намір!" — це втеча від реальності у світ містики, чи навпаки — спроба знайти глибинний сенс у хаосі 90-х через
    нетрадиційну духовність?'
  - '[!epistemic-humility] Критики сперечаються: чи є стиль Дереша оригінальним "магічним реалізмом" по-українськи, чи це
    лише вдала компіляція західних трендів (від Кастанеди до Паланіка).'
  section: 'Конфліктна карта: Постмодернізм чи нова щирість?'
  words: 900
- points:
  - 'Детальний розбір сюжету: шлях Петра, його ініціація та пошуки сенсу як структура твору.'
  - 'Символіка та образи: аналіз ключових символів — від "світу тіней" до "наміру" як рушійної сили.'
  - 'Система персонажів: Петро, Дор, Аліса — хто вони? Архетипи, функції в сюжеті, еволюція.'
  - '[!decolonization] Текст як відповідь на ідеологічну порожнечу після розпаду СРСР. Пошук власної, не-імперської духовності
    та ідентичності, вільної від радянських чи російських наративів.'
  section: 'Читання: Подорож крізь "Намір!"'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання академічного, філософського дискурсу з молодіжним сленгом, суржиком та окультною термінологією.'
  - 'Ритм і синтаксис: як "рваний" ритм прози та несподівані синтаксичні конструкції створюють відчуття тривоги та динаміки.'
  - 'Інтертекстуальність: аналіз прихованих та явних цитат — від світової філософії до текстів російського року. Як Дереш
    їх переосмислює?'
  - '[!myth-buster] Руйнуємо міф, що Дереш — це "просто молодіжна проза". Аналізуємо філософську глибину та складність його
    стилю, що ховається за легкою формою.'
  section: 'Мова і поетика: Синтез езотерики та суржику'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, "Намір!" — це ескапізм чи інструмент для опрацювання реальності?'
  - 'Рецепція твору: як сприймали роман у 2000-х і як він читається сьогодні, в контексті повномасштабної війни?'
  - '[!anti-hagiography] Критичний погляд: чи не заграє Дереш із небезпечними ідеями, популяризуючи окультизм? Чи не є його
    "герой" надто пасивним?'
  - 'Світовий контекст: "Намір!" як частина глобального тренду на нову духовність у літературі кінця XX - початку XXI століття.'
  section: Дискусія та підсумок
  words: 700
focus: Close reading of Любомир Дереш's "Намір!", focusing on its blend of postmodern irony, existential quest, and decolonial
  subtext in post-Soviet Ukrainian literature.
level: LIT
module: lit-203
objectives:
- Критично аналізувати роман "Намір!" Любомира Дереша в культурному та історичному контексті України 2000-х років
- Досліджувати стилістичні особливості тексту, зокрема синтез різних дискурсів та інтертекстуальність
- Формулювати аргументовану позицію щодо філософського та деколонізаційного значення твору
- Розрізняти різні критичні підходи до інтерпретації сучасної української літератури
