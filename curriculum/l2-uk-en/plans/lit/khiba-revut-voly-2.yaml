objectives:
- Аналізувати образ Чіпки в контексті літературних дискусій та історичної епохи
- Розрізняти та застосовувати поняття реалізму, натуралізму та психологізму при аналізі тексту
- Формулювати аргументовану позицію щодо моральної дилеми «мета виправдовує засоби» на прикладі головного героя
- Оцінити стилістичні особливості роману, зокрема роль народної мови та психологічних прийомів
