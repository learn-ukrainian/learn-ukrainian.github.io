content_outline:
- points:
  - 'Провокація: Чіпка Варениченко — жорстокий вбивця чи герой, доведений до відчаю несправедливістю? Чи може злочин бути
    виправданий добрими намірами?'
  - 'Цитата без контексту: "Так оце та правда! Оце вона на світі є!.. Говорять, є, а її нема."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Соціальний детермінізм vs особиста відповідальність. Чи є Чіпка лише продуктом жорстокого суспільства (кріпацтва,
    несправедливого суду), чи він робить свідомий моральний вибір, стаючи розбійником?'
  - 'Дебат 2: Авторська позиція. Співавторство Панаса Мирного та Івана Білика — чия ідея домінує в образі Чіпки? Мирний —
    захисник селянства; Білик — більш консервативний погляд. Як це протиріччя відобразилось у тексті?'
  - '[!epistemic-humility] Народницька критика бачила в Чіпці бунтаря. Модерністи (М. Коцюбинський) — «пропащу силу» без ідеалів.
    Радянське літературознавство — класового борця. Єдиної відповіді не існує.'
  section: 'Конфліктна карта: «Пропаща сила» чи народний месник?'
  words: 900
- points:
  - 'Аналіз ключових епізодів: дитинство (відчуження), боротьба за землю (зіткнення з несправедливістю), втрата землі (точка
    зламу), створення ватаги, фінальна різанина.'
  - 'Система персонажів як дзеркало для Чіпки: Грицько (альтернативний шлях адаптації), Мотря (трагедія матері), Галя («польова
    царівна» як спроба порятунку).'
  - Архетип «шляхетного розбійника» в українській та світовій літературі. Порівняння Чіпки з Робіном Гудом чи Устимом Кармелюком
    — що спільного, а в чому радикальна відмінність?
  - '[!decolonization] Роман як вирок системі. Це не просто історія одного селянина, а аналіз колоніального апарату пригнічення:
    суд, армія, адміністрація — все працює проти українця.'
  section: 'Читання: Еволюція Чіпки від правдошукача до розбійника'
  words: 1700
- points:
  - 'Стилістичні особливості: поєднання реалізму, натуралізму та імпресіоністичних засобів для зображення внутрішнього світу
    героя.'
  - 'Робота з мовою: використання діалектизмів, народної фразеології, приказок для створення автентичного образу українського
    села.'
  - 'Синтаксис як засіб психологізму: невласне-пряма мова, риторичні питання, внутрішні монологи для передачі сумнівів та
    страждань Чіпки.'
  - '[!myth-buster] Це не просто «реалістичний роман». Мирний використовує складні символи (земля, воля, кров) та біблійні
    алюзії (гріхопадіння, Каїн), що виводить твір за межі простого опису соціальних проблем.'
  section: 'Мова і поетика: Психологізм та народна мова'
  words: 1500
- points:
  - 'Повернення до розминки: то хто ж такий Чіпка? Студент формулює власну позицію, спираючись на аналіз.'
  - 'Рецепція твору: як роман був сприйнятий сучасниками (заборона цензурою) і як його читають сьогодні в контексті війни
    та боротьби за справедливість.'
  - 'Modern relevance: Чи актуальна сьогодні дилема «мета виправдовує засоби»? Де проходить межа між боротьбою за свободу
    і тероризмом?'
  - '[!anti-hagiography] Роман не створює ідеального героя. Він показує трагедію людини, яка, борючись зі злом, сама стає
    його частиною. Це застереження проти ідеалізації помсти.'
  section: Дискусія та підсумок
  words: 700
focus: 'Роман Панаса Мирного "Хіба ревуть воли...": аналіз образу Чіпки, конфлікт "пропащої сили" та народного месника, соціальний
  реалізм та психологізм.'
