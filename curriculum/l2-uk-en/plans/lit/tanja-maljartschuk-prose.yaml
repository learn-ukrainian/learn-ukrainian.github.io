content_outline:
- points:
  - 'Провокація: Чи може роман про минуле змінити сьогодення? Як текст про забутого історика В''ячеслава Липинського говорить
    до України 2020-х?'
  - 'Фрагмент з роману без контексту: «Історія, думала я, це хвороба. Нею хворіють, від неї помирають. На неї не можна заразитися,
    бо вона у кожного своя, і кожен носить її в собі з народження» — як ви розумієте цю тезу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Забуття» — це історичний роман чи магічний реалізм? Де межа між фактом і художньою вигадкою в роботі з травматичною
    історією?'
  - 'Дебат 2: Що важливіше в прозі Малярчук — політичний меседж (деколонізація) чи естетична вартість (стиль)? Чи можна їх
    розділити?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у романі документ епохи, інші — універсальну притчу про пошук
    себе. Немає єдиної правильної інтерпретації.'
  section: 'Конфліктна карта: Пам''ять і вигадка'
  words: 900
- points:
  - 'Наративна структура: дві сюжетні лінії — сучасна жінка і Липинський. Як вони переплітаються і що це створює?'
  - 'Система персонажів: оповідачка як втілення пост-радянської амнезії; Липинський як символ забутої інтелектуальної традиції.'
  - 'Символіка: хвороба як метафора історичної травми, пошуки могили як спроба віднайти коріння.'
  - '[!decolonization] Текст кидає виклик імперському наративу, повертаючи в український дискурс постать європейського мислителя
    Липинського, «привласненого» іншими історіографіями.'
  section: 'Читання: ''Забуття'' — аналіз ключових сцен'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання есеїстики, щоденника, біографії в одному тексті.'
  - 'Особливості синтаксису: довгі, медитативні речення, що імітують плин свідомості та процес пригадування.'
  - 'Робота з лексикою: використання архаїзмів та діалектизмів для створення історичної атмосфери, оказіоналізми.'
  - '[!myth-buster] Міф: сучасна українська література — це лише про війну та травму. Насправді Малярчук показує, як робота
    з історією може бути інструментом для побудови майбутнього.'
  section: 'Мова і поетика: Мова як інструмент пам''яті'
  words: 1500
- points:
  - 'Повернення до розминки: Як роман про минуле змінює сьогодення? Студент формулює відповідь на основі аналізу.'
  - 'Рецепція: міжнародне визнання роману (BBC Book of the Year). Як твір сприйняли в Україні та за кордоном?'
  - 'Зв''язок із сьогоденням: «Забуття» як дорожня карта для роботи з колективною пам''яттю в умовах війни.'
  - '[!anti-hagiography] Критика: Чи не є головна героїня занадто пасивним спостерігачем? Обговорення можливих слабких сторін
    тексту.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз прози Тані Малярчук, зокрема роману "Забуття", з фокусом на темах пам'яті, мови як інструменту опору, та деколонізації
  історичної свідомості.
