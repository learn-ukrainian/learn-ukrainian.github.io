content_outline:
- points:
  - 'Провокація: Чому автор "Енеїди", найдотепнішої поеми-бурлеску, раптом пише п''єсу, що змушує плакати? Що змусило Івана
    Котляревського змінити регістр від "реготу до сльози"?'
  - 'Цитата без контексту: "Лучче померти, чим з немилим жити, доки не вмреш, не будеш мати і вільної минути". Чия це репліка
    і що за нею стоїть: підлітковий максималізм чи життєва філософія?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Конфлікт "багатство vs гідність". Чи є вибір Наталки між заможним Возним і бідним Петром суто моральним, чи
    це прагматичний розрахунок на майбутнє?'
  - 'Дебат 2: "Наталка Полтавка" — народження українського театру чи лише успішна стилізація? Одні критики бачать у п''єсі
    початок національної сцени, інші — вдалу, але сентиментальну мелодраму за європейськими зразками.'
  - '[!epistemic-humility] Сентименталізм Котляревського — це точне наслідування Руссо та Річардсона, чи унікальний український
    варіант, де народна етика переважає над сльозами?'
  section: 'Конфліктна карта: Серце чи гаманець?'
  words: 900
- points:
  - 'Аналіз ключової сцени: Розмова Наталки з Возним. Як через мову героїв розкривається їхній соціальний статус та моральні
    принципи.'
  - 'Система персонажів: Наталка як моральний ідеал і "архетип української нареченої". Возний Тетерваковський як комічний
    антагоніст, що говорить "книжною" мовою. Петро як втілення ідеального, вірного коханого.'
  - 'Порівняльний аналіз: Наталка vs Маруся Квітки-Основ''яненка. Обидві — ідеали, але в чому їхня принципова різниця?'
  - '[!decolonization] П''єса, написана українською "народною" мовою, стала викликом імперській політиці мовної асиміляції,
    доводячи спроможність мови обслуговувати серйозні, "високі" жанри.'
  section: 'Читання: "Золото — не дівка!"'
  words: 1700
- points:
  - 'Стилістичний фокус: аналіз пісні "Віють вітри, віють буйні". Як народна пісня, введена в структуру драми, перестає бути
    просто "музичним номером" і стає ключовим елементом характеристики героїні та рушієм сюжету.'
  - 'Опера vs Драма: "Наталка Полтавка" визначають як "оперету". Наскільки справедливий цей термін? Розглядаємо співвідношення
    музики та слова, та як Котляревський створює новий синтетичний жанр.'
  - 'Мова персонажів як соціальний маркер: Канцеляризми Возного, народна мова Наталки та Петра, прагматичні репліки Терпилихи.
    Як мова створює і комічний ефект, і соціальну драму.'
  - '[!myth-buster] Поширений міф, що "Наталка Полтавка" — це проста п''єса. Насправді це складний експеримент, де Котляревський
    поєднав італійську оперу, український вертеп та європейський сентименталізм.'
  section: 'Мова і поетика: Пісня як рушій драми'
  words: 1500
- points:
  - 'Повернення до розминки: то чому ж Котляревський "змінив регістр"? Формулюємо відповідь на основі аналізу п''єси.'
  - 'Рецепція та спадщина: Як п''єса вплинула на подальший розвиток українського театру (Карпенко-Карий, Старицький). Чому
    "Наталка Полтавка" досі в репертуарі театрів?'
  - '[!anti-hagiography] Чи не є образ Наталки занадто ідеалізованим? Наскільки її жертовність і покірність є актуальними
    чеснотами в XXI столітті?'
  - 'Провокація для роздумів: У сучасному світі, чи вийшла б Наталка заміж за Петра? Аргументуйте свою позицію.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз п'єси "Наталка Полтавка" як першої ластівки українського сентименталізму, роль пісні в драматургії, та конфлікт
  між соціальним статусом і особистою гідністю.
level: LIT
module: lit-005
objectives:
- Аналізувати п'єсу "Наталка Полтавка" як зразок українського сентименталізму.
- Характеризувати образ Наталки як моральний ідеал та національний архетип.
- Інтерпретувати соціальний конфлікт "гідність проти багатства" в контексті українського суспільства XIX століття.
- Оцінювати роль пісні та музики як невід'ємних компонентів драматургічної структури твору.
- Розрізняти мовні партії персонажів як засіб соціальної та психологічної характеристики.
pedagogy: CBI
