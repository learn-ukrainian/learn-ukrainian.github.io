vocabulary_hints:
- definition: Літературний напрям, що робить акцент на почуттях, чутливості та внутрішньому світі людини, часто ідеалізуючи
    просте сільське життя.
  pos: ч.
  word: сентименталізм
- definition: Первісний, стійкий образ чи мотив, що повторюється в культурі та мистецтві; втілення універсальної моделі поведінки
    (напр., Наталка як архетип вірної нареченої).
  pos: ч.
  word: архетип
- definition: Внутрішнє усвідомлення власної цінності, моральних принципів; самоповага, що не залежить від соціального статусу
    чи багатства.
  pos: ж.
  word: гідність
- definition: Готовність відмовитися від власних інтересів чи навіть життя заради іншої людини, ідеї або вищої мети.
  pos: ж.
  word: жертовність
- definition: Літературний жанр, призначений для сценічного втілення, в основі якого лежить гострий конфлікт між персонажами.
  pos: ж.
  word: драма
- definition: Історична посада в українському судочинстві; дрібний судовий чиновник, у п'єсі — представник бюрократії.
  pos: ч.
  word: возний
- definition: Емоційне очищення та піднесення, яке глядач переживає внаслідок співпереживання героям трагедії чи драми.
  pos: ч.
  word: катарсис
- definition: Авторське пояснення в тексті п'єси, що стосується поведінки персонажів, обстановки на сцені, жестів та інтонацій.
  pos: ж.
  word: ремарка
- definition: Персонаж, який протистоїть головному герою (протагоністу) і створює основний конфлікт у творі.
  pos: ч.
  word: антагоніст
- definition: Жанр драми з гострою інтригою, перебільшеними емоціями, різким протиставленням добра і зла.
  pos: ж.
  word: мелодрама
