content_outline:
- points:
  - 'Провокація: Чому в епоху тотального контролю саме літературне есе, а не роман чи вірш, стало одним із найнебезпечніших
    текстів для радянської системи?'
  - 'Цитата-загадка: «Найбільша розкіш — це розкіш людського спілкування». Як ця фраза з іншого твору Сверстюка розкриває
    центральну ідею «Блудних синів»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Блудні сини» — це відсторонений літературознавчий аналіз чи прихований політичний маніфест? Позиція формалістів
    проти позиції істориків-дисидентів.'
  - 'Дебат 2: Чи намагався Сверстюк створити альтернативний канон української літератури, очищений від радянських інтерпретацій,
    чи лише «повернути» класикам їх справжнє обличчя?'
  - '[!epistemic-humility] Немає єдиної відповіді. Текст існував на перетині естетики, етики та політики, і кожна інтерпретація
    висвітлює лише одну з його граней.'
  section: 'Конфліктна карта: Критика як вчинок'
  words: 900
- points:
  - 'Ключовий уривок: Детальний розбір центральної метафори «блудного сина» в радянському контексті — повернення до «Батька»
    як повернення до національної культури та правди.'
  - 'Система персонажів есе: як Сверстюк аналізує постаті Шевченка, Гоголя, Франка, вириваючи їх із мертвої радянської канонізації.'
  - 'Конфлікт поколінь: аналіз стосунків «батьків» (шістдесятників) та «дідів» (розстріляне відродження) як центральна вісь
    есе.'
  - '[!decolonization] Інтелектуальна суверенність: Сверстюк доводить, що українська думка є самодостатньою і не потребує
    Москви як арбітра. Це був прямий удар по імперській доктрині «старшого брата».'
  section: 'Читання: Аналіз есе «Блудні сини України»'
  words: 1700
- points:
  - 'Афористичність та парадокс: аналіз синтаксису Сверстюка, його схильності до коротких, ємних формулювань, що врізаються
    в пам''ять.'
  - 'Інтертекстуальність: як автор вплітає в текст цитати з Біблії, світової філософії та української класики, створюючи багатошаровий
    діалог культур.'
  - 'Стилістична точність: Сверстюк використовує мову як скальпель, препаруючи радянські ідеологеми та виявляючи їхню внутрішню
    порожнечу.'
  - '[!myth-buster] Це не просто «публіцистика». Сверстюк довів, що есеїстика може бути високим мистецтвом, де естетична форма
    невіддільна від етичного змісту. Він руйнує міф про те, що дисидентська література — це лише політика без естетики.'
  section: 'Мова і поетика: Есеїстичний стиль як зброя'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чому есе стало зброєю? Студент формулює відповідь, спираючись на аналіз модуля.'
  - 'Історія рецепції: шлях тексту від «самвидаву» та переслідувань КДБ до обов''язкової програми в українських школах. Що
    змінилося в його сприйнятті?'
  - '[!anti-hagiography] Чи не було в позиції «внутрішньої еміграції» Сверстюка та його кола певного ескапізму? Дискусія про
    ефективність інтелектуального опору порівняно з іншими формами боротьби.'
  - 'Сучасне значення: Що означає бути «блудним сином» чи «вірним сином» України сьогодні, в умовах війни та глобалізації?'
  section: Дискусія та підсумок
  words: 700
focus: Есеїстика Євгена Сверстюка, зокрема твір «Блудні сини України», літературна критика як форма опору, феномен «внутрішньої
