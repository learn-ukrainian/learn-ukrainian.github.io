activity_hints:
- description: Перевірка дебату між естетизмом та народництвом. Чия це теза — Вороного чи Франка? Визначити позицію за цитатою.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставити в речення ключові терміни з модуля: символізм, естетизм, музикальність, модернізм, сугестивність.'
  focus: Лексика символізму
  items: 5
  type: fill-in
- description: Проаналізуйте, як у поезії "Блакитна Панна" втілено основні принципи символізму (музикальність, сугестивність,
    символіка кольору). Наведіть приклади з тексту (250-300 слів).
  focus: 'Аналіз поезії: "Блакитна Панна"'
  type: note
- description: У своєму маніфесті Вороний закликав до "європейського рівня" мистецтва. Наскільки актуальною є ця дискусія
    для сучасної української культури? Аргументуйте свою позицію (400-600 слів).
  focus: 'Есе: Вороний і сучасність'
  type: note
cefr_min: C1
connects_to:
