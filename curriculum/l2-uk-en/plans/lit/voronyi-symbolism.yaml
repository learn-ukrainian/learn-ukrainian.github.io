content_outline:
- points:
  - 'Провокація: Фрагмент маніфесту Вороного, де він закликає до "європейського рівня" мистецтва. Чи був український модернізм
    лише наслідуванням, чи самобутнім явищем?'
  - 'Загадка: Поетичний рядок з "Блакитної Панни" без контексту. Що це описує — пейзаж, жінку, мрію?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Естетизм Вороного (чиста краса) проти народницької традиції (служіння громаді). Полеміка з Іваном Франком.'
  - 'Дебат 2: Вороний — новатор чи епігон? Дискусія про оригінальність українського символізму на тлі французьких та російських
    зразків.'
  - '[!epistemic-humility] Немає "правильної" відповіді. Позиція критика залежить від його ідеологічних та естетичних переконань.'
  section: 'Конфліктна карта: Мистецтво для мистецтва vs. мистецтво для народу'
  words: 900
- points:
  - Повний текст поезії "Блакитна Панна" з коментарями.
  - 'Аналіз структури: динаміка образів, розвиток від хаосу до гармонії.'
  - Символіка кольору (блакитний, срібний, золотий) та звукопис (асонанси, алітерації) як основні інструменти поета.
  - '[!decolonization] Вороний свідомо орієнтувався на Париж, а не на Петербург, виборюючи для української літератури право
    бути частиною європейського, а не "загальноросійського" культурного простору.'
  section: 'Читання: "Блакитна Панна" — маніфест українського символізму'
  words: 1700
- points:
  - 'Стилістичні інновації: введення в поезію екзотичної лексики, неологізмів, архаїзмів для створення піднесеного, "елітарного"
    стилю.'
  - 'Музикальність вірша: аналіз ритміки та синтаксису, що створюють гіпнотичний, сугестивний ефект.'
  - 'Інтертекстуальність: алюзії на світову міфологію, античність та європейське мистецтво.'
  - '[!myth-buster] Руйнування міфу про українську літературу як виключно селянську та реалістичну. Вороний довів, що українська
    мова здатна передавати найтонші відтінки модерністської чуттєвості.'
  section: 'Мова і поетика: Створення нової поетичної мови'
  words: 1500
- points:
  - 'Повернення до розминки: тож новатор чи імітатор? Студент формулює власну аргументовану позицію.'
  - 'Рецепція творчості: від звинувачень у "декадентстві" сучасниками до канонізації як "батька" українського модернізму.'
  - '[!anti-hagiography] Трагічна доля поета: короткочасна співпраця з радянською владою, розчарування і загибель під час
    сталінських репресій. Складність вибору митця в тоталітарну епоху.'
  - 'Сучасне значення: наскільки актуальною є дискусія про "мистецтво для мистецтва" в Україні, що веде війну за існування?'
  section: Дискусія та підсумок
  words: 700
focus: Микола Вороний як засновник українського символізму. Аналіз поетики, стилістичних інновацій та деколонізаційного виміру
  його творчості.
level: LIT
module: lit-074
objectives:
- Аналізувати поезію Миколи Вороного в контексті європейського модернізму та української літературної традиції
- Визначати ключові риси символізму (сугестивність, музикальність, синестезія) в текстах Вороного
- Аргументувати деколонізаційну роль естетичної програми Вороного як спроби вирвати українську літературу з провінційного
  статусу
- Формулювати власну позицію в рамках літературно-критичних дебатів про "чисте" та "заангажоване" мистецтво
