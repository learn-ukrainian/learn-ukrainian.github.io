content_outline:
- points:
  - 'Провокація: Чи була революція 1905 року лише фата морганою для українського селянства, чи реальним шансом на землю і
    волю?'
  - Цитата-загадка з тексту про "голодну землю", що чекає на пана, — без пояснень.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Повість — це соціальний реалізм (аналіз аграрного питання) чи психологічний імпресіонізм (суб''єктивні враження
    героїв)? Позиції радянського та сучасного літературознавства.'
  - 'Дебат 2: Коцюбинський — "співець революції" чи естет, що використовував соціальні заворушення як тло для дослідження
    людської душі?'
  - '[!epistemic-humility] Немає єдиної "правильної" інтерпретації; твір існує на перетині цих підходів, і в цьому його сила.'
  section: 'Конфліктна карта: Реалізм чи Імпресіонізм?'
  words: 900
- points:
  - 'Детальний розбір ключових уривків: опис спраглої землі, сцени збору врожаю, колективний портрет селянської маси, що перетворюється
    з пасивної на дієву силу.'
  - 'Аналіз структури: нелінійний сюжет, побудований на хвилях настроїв та вражень, а не на чіткій послідовності подій.'
  - 'Система персонажів: Андрій, Маланка, Хома — як три різні реакції на соціальні зміни та надію.'
  - '[!decolonization] Модернізм Коцюбинського — не наслідування російських зразків, а органічна частина європейського мистецького
    руху, що має глибоке українське коріння.'
  section: 'Читання: Голодна земля і людська маса'
  words: 1700
- points:
  - 'Стилістичний аналіз: як Коцюбинський використовує світло, колір, звук та запах для передачі психологічних станів героїв.'
  - 'Синтаксис як інструмент: уривчасті, номінативні речення для передачі хаосу; ліричні повтори для медитативних станів.'
  - 'Лексика: поєднання народної мови, діалектизмів із витонченою авторською лексикою та неологізмами для створення "музики
    прози".'
  - '[!myth-buster] "Fata Morgana" руйнує міф про те, що література про селян має бути простою та "народною". Коцюбинський
    доводить, що селянська тема може бути полем для найскладніших стилістичних експериментів.'
  section: 'Мова і поетика: Імпресіоністична палітра'
  words: 1500
- points:
  - 'Повернення до розминки: чи є "фата моргана" в назві вироком, чи просто констатацією трагедії?'
  - 'Рецепція твору: як радянська критика "спрощувала" Коцюбинського, і як його перечитують сьогодні в контексті боротьби
    за землю та державність.'
  - 'Агентність українського селянина: чи є герої повісті пасивними жертвами, чи активними творцями своєї (трагічної) долі?'
  - 'Питання для рефлексії: що робить цей текст актуальним у XXI столітті?'
  - '[!anti-hagiography] Показ не лише героїчного пориву селян, але й їхньої жорстокості, розгубленості та фатальних помилок.'
  section: Дискусія та підсумок
  words: 700
focus: 'Літературний аналіз повісті "Fata Morgana": імпресіоністична поетика, психологізм, соціальна драма українського села
  напередодні революції, мова як мистецький інструмент.'
