objectives:
- Аналізувати повість "Fata Morgana" як зразок українського психологічного імпресіонізму.
- Розрізняти соціально-реалістичні та імпресіоністичні елементи в тексті.
- Інтерпретувати мовні засоби (синтаксис, тропи, звукопис) як інструмент створення психологічних станів.
- Формулювати аргументовану позицію щодо місця твору в каноні українського модернізму.
