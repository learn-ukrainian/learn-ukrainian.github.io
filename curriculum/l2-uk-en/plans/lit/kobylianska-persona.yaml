content_outline:
- points:
  - 'Провокація: Чому героїні Ольги Кобилянської наприкінці XIX століття читали Ніцше в оригіналі, коли це вважалося «нежіночою»
    справою, і що це говорить нам про український модернізм?'
  - Цитата з тексту, що відображає внутрішній конфлікт героїні-інтелектуалки.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Проза Кобилянської — це передусім феміністичний маніфест чи філософський діалог з Ніцше? Позиція Соломії Павличко
    vs позиція Тамари Гундорової.'
  - 'Дебат 2: Чи була Кобилянська «європейською» письменницею? Дискусія про «провінційність» українського модернізму порівняно
    з австрійським чи німецьким.'
  - '[!epistemic-humility] Критики досі сперечаються, чи була її «нова жінка» реальною моделлю для наслідування, чи трагічною
    фігурою, приреченою на самотність.'
  section: 'Конфліктна карта: Фемінізм чи ніцшеанство?'
  words: 900
- points:
  - Ключові уривки з новели, що фокусуються на трьох жіночих персонажах як трьох аспектах творчої душі.
  - 'Аналіз сюжету через призму музичної структури: як форма вальсу віддзеркалює долі героїнь.'
  - 'Система персонажів: Марта (художниця-реалістка), Ганна (піаністка-романтик), Софія (втілення чистого мистецтва) — єдність
    і боротьба протилежностей.'
  - '[!decolonization] Кобилянська пише про українських інтелектуалок у Чернівцях, що були частиною Австро-Угорської імперії,
    демонструючи їхню повну інтегрованість у європейський культурний простір, а не як провінційну периферію "русского мира".'
  section: 'Читання: Аналіз новели "Valse mélancolique"'
  words: 1700
- points:
  - 'Стилістичні інновації: імпресіоністична проза, потік свідомості, психологічні пейзажі, що віддзеркалюють стан душі.'
  - Символізм кольорів, звуків (особливо музики) та предметів як ключ до підтексту.
  - 'Синтаксис як інструмент психологізму: довгі, складні речення для передачі рефлексій та короткі, уривчасті — для емоційних
    сплесків.'
  - '[!myth-buster] Кобилянська — це не просто «співачка жіночої долі». Це авторка складної, філософської прози, яка експериментувала
    з формою на рівні найкращих європейських модерністів.'
  section: 'Мова і поетика: Символізм і психологізм'
  words: 1500
- points:
  - 'Повернення до розминки: тож, ким була «аристократка духу» Кобилянської — переможницею чи жертвою своїх ідей?'
  - 'Рецепція творчості: як радянське літературознавство «приручало» Кобилянську, ігноруючи її ніцшеанство та модернізм.'
  - '[!anti-hagiography] Аналіз ідеалізації образу "нової жінки", яка часто ігнорує її трагічну ізоляцію від суспільства та
    особисті драми.'
  - 'Сучасна актуальність: дискусія про роль жінки-інтелектуалки в сучасному українському суспільстві.'
  section: Дискусія та підсумок
  words: 700
