content_outline:
- points:
  - 'Провокація: Проза Прохаська — це гербарій галицьких дивацтв чи універсальна філософія, що проростає з карпатського ґрунту?'
  - Цитата з «НепрОстих» без контексту про ріст і пам'ять, що змушує замислитися над природою часу.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Автобіографічна проза» vs «магічний реалізм». Критики сперечаються, чи є твори Прохаська документальним свідченням,
    чи радше українською версією Маркеса.'
  - 'Дебат 2: «Станіславський феномен» — Прохасько як частина групи чи самодостатній автор? Його місце серед Юрія Андруховича
    та Юрія Іздрика.'
  - '[!epistemic-humility] Немає єдиної «правильної» класифікації жанру Прохаська; кожна інтерпретація відкриває нові шари
    тексту.'
  section: 'Конфліктна карта: Документ чи магія?'
  words: 900
- points:
  - 'Розбір ключових уривків: аналіз ризоматичної, нелінійної структури оповіді, що імітує ріст рослин.'
  - 'Система персонажів: наратор як філософ-ботанік, його взаємодія з іншими «непрОстими» людьми, що вкорінені у свій ландшафт.'
  - 'Символізм Карпат: гори, ліси та рослини як повноцінні дійові особи, носії пам''яті та альтернативної історії.'
  - '[!decolonization] Твердження української ідентичності через глибинний зв''язок з місцем, а не через гучні гасла. Створення
    неімперського, локального наративу, вільного від радянських чи польських культурних кодів.'
  section: 'Читання: Фрагменти з «НепрОстих»'
  words: 1700
- points:
  - 'Синтаксис Прохаська: аналіз довгих, медитативних речень, що розгалужуються, як коренева система.'
  - 'Лексика: робота з гуцульськими діалектизмами, архаїзмами та створення авторських неологізмів для опису невловних відчуттів.'
  - 'Ритм і мелодика прози: як звукопис та алітерації створюють ефект занурення, «вслуховування» в текст.'
  - '[!myth-buster] Проза Прохаська — це не «проста» і не «повільна» література. Це складна інтелектуальна конструкція, що
    вимагає від читача співтворчості, а не пасивного споживання.'
  section: 'Мова і поетика: Ботанічна філософія мови'
  words: 1500
- points:
  - 'Повернення до розминки: тож як ми можемо визначити жанр Прохаська після детального аналізу? Студент формулює власну аргументовану
    позицію.'
  - 'Рецепція творчості: як сприймали Прохаська в 90-х і як його читають сьогодні? Вплив на молодше покоління письменників
    (Софія Андрухович, та ін.).'
  - 'Сучасна релевантність: що філософія «вкорінення» Прохаська говорить нам в епоху глобалізації, війни та вимушеного переселення?'
  - '[!anti-hagiography] Попри статус "живого класика", чи не обмежує "карпатський" імідж сприйняття Прохаська як філософа
    універсальних тем?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз стилю, мови та філософії прози Тараса Прохаська на прикладі знакових творів, зокрема «НепрОсті»
