objectives:
- Аналізувати прозу Тараса Прохаська в контексті «станіславського феномену» та постмодерної української літератури
- Визначати ключові риси ідіостилю Прохаська: ризоматичний синтаксис, філософську глибину, роботу з діалектизмами
- Здійснювати герменевтичний аналіз уривків, виявляючи символічні та міфологічні підтексти
- Інтерпретувати твори Прохаська як форму культурного опору та деколонізації через утвердження локальної ідентичності та пам’яті
