content_outline:
- points:
  - 'Провокація: Вінграновський писав вірші чи знімав фільми словами? Уривок з поезії, що читається як сценарій.'
  - 'Загадка: «І в срібне царство пушистого снігу // Впали, як лебеді, перші сліди». Про що це — про кохання чи про самотність?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Вінграновський — «шістдесятник» чи «самодостатній острів»? Наскільки його творчість визначається належністю
    до покоління, а наскільки є унікальним явищем?'
  - 'Дебат 2: Поет чи кінорежисер? Чи його кінематографічний досвід збагатив поезію, чи, навпаки, обмежив її суто літературний
    потенціал?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у ньому лірика-пантеїста, інші — філософа-екзистенціаліста. Немає
    єдиної «правильної» інтерпретації.'
  section: 'Конфліктна карта: Поет і система'
  words: 900
- points:
  - Повний текст вірша з докладним аналізом. Як розгортається ліричний сюжет?
  - 'Система образів: акація як жінка, ніч як простір любові, світло як свідчення почуття.'
  - 'Аналіз наративної структури: від звернення-знайомства до космічного єднання ліричного героя зі світом.'
  - '[!decolonization] Вінграновський створює модерну українську любовну лірику, вільну від фольклорних кліше та радянського
    соцреалізму. Це утвердження суб’єктності та індивідуального почуття.'
  section: 'Читання: «Сеньйорито акаціє, добрий вечір»'
  words: 1700
- points:
  - 'Стилістичні інновації: робота з метафорою, перетворення абстрактних понять на живі образи.'
  - 'Синтаксис як інструмент: довгі, плинні речення, що імітують рух кінокамери (наїзд, панорама, зміна планів).'
  - 'Звукопис та ритміка: аналіз алітерацій, асонансів та несподіваних ритмічних збоїв, що створюють емоційну напругу.'
  - '[!myth-buster] Вінграновський — не просто «співець природи». Його пейзажі — це складні філософські метафори, а не замальовки.
    Він руйнує міф про «простоту» і «народність» української поезії.'
  section: 'Мова і поетика: Кінематографічний синтаксис'
  words: 1500
- points:
  - 'Повернення до розминки: тож вірші Вінграновського — це поезія чи кіно? Аргументація на основі аналізу.'
  - 'Рецепція та канон: як змінювалося сприйняття Вінграновського — від офіційної критики до культового статусу сьогодні?'
  - '[!anti-hagiography] Попри свій нонконформізм, Вінграновський був лауреатом Шевченківської премії. Як йому вдавалося балансувати
    між мистецькою свободою та існуванням в радянській системі?'
  - 'Сучасне значення: Чому поезія Вінграновського залишається актуальною для покоління, що виросло в незалежній Україні?'
  section: Дискусія та підсумок
  words: 700
focus: 'The poetry of Mykola Vinhranovskyi: cinematic poetics, stylistic innovations, metaphorism, and resistance to the Soviet
  canon.'
level: LIT
module: lit-152
objectives:
- Аналізувати поезію Миколи Вінграновського в історичному та літературному контексті епохи «шістдесятництва»
- Визначати ключові риси поетики Вінграновського: кінематографічність, метафоризм, синтаксичну експресію
- Оцінювати творчість Вінграновського як акт культурного опору та деколонізації української літератури
- Формулювати аргументовану позицію в літературних дебатах щодо місця Вінграновського в каноні
