activity_hints:
- description: Визначити, яка з тез належить радянській інтерпретації, а яка — діаспорній. Розрізнити позиції щодо "праведного
    гніву".
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставити у речення з аналізу тексту ключові терміни: наказовий спосіб, ямб, архаїзм, семантичне поле, метафора.'
  focus: Мова і поетика
  items: 5
  type: fill-in
- description: Проаналізуйте тричастинну структуру "Заповіту". Як кожна частина розвиває центральну ідею і готує до фінального
    заклику? Наведіть цитати для кожної частини.
  focus: Структурний аналіз
  type: note
- description: '"Заповіт" на Майдані та на фронті. Порівняйте, як текст функціонує в мирному протесті та під час повномасштабної
    війни. Чи змінюється його значення? Аргументуйте свою думку (400-600 слів).'
  focus: 'Есе: "Заповіт" сьогодні'
  type: note
