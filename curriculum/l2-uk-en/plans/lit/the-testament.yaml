content_outline:
- points:
  - 'Провокація: Як вірш, написаний у 1845 році, досі функціонує як політична інструкція для сучасної України?'
  - 'Ключова цитата: "Поховайте та вставайте, / Кайдани порвіте / І вражою злою кров’ю / Волю окропіте." — пророцтво, заклик
    чи виправдання насильства?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Праведний гнів чи апологія жорстокості? Дискусія навколо рядків "і вражою злою кров''ю волю окропіте". Це метафора
    чи прямий заклик?'
  - 'Дебат 2: Чий "Заповіт"? Радянська спроба "привласнити" Шевченка як революціонера-демократа vs. націоналістична інтерпретація
    його як пророка незалежної держави.'
  - '[!epistemic-humility] Не існує єдиної "правильної" інтерпретації. Значення тексту змінюється залежно від історичного
    контексту та ідеології читача.'
  - '[!decolonization] Розгляд "Заповіту" як прямого антиколоніального маніфесту, спрямованого проти Російської імперії, а
    не абстрактного "гноблення".'
  section: 'Конфліктна карта: Святиня чи інструмент?'
  words: 900
- points:
  - 'Повний текст вірша з коментарями: аналіз тричастинної структури (особисте прохання → опис майбутньої ідеальної України
    → прямий заклик до повстання).'
  - 'Наративна динаміка: перехід від стану спокою ("Як умру, то поховайте") до вибухового заклику ("Вставайте, кайдани порвіте!").'
  - 'Створення національного міфу: образ "сім''ї великої, вольної, нової" як утопічна візія майбутньої нації.'
  - '[!decolonization] Полеміка з імперським наративом: "Заповіт" як акт символічного розриву з "братнім" народом і проголошення
    власного шляху.'
  section: 'Читання: Текст "Заповіту"'
  words: 1700
- points:
  - 'Наказовий спосіб дієслова як ключовий стилістичний прийом: аналіз дієслів "поховайте", "вставайте", "порвіте", "окропіте",
    "пом''яніте".'
  - 'Ритм і метрика: чотирирядкова строфа, ямб з пірихіями, що створює одночасно урочистий і динамічний ритм, подібний до
    гімну.'
  - 'Лексичний аналіз: семантичні поля "смерть/похорон", "боротьба/насилля", "свобода/майбутнє". Використання архаїзмів та
    біблійної лексики для створення пророчого тону.'
  - '[!myth-buster] "Заповіт" — не просто емоційний вірш, а ретельно сконструйована поетична машина, де кожна граматична форма
    та лексична одиниця виконує чітку ідеологічну функцію.'
  section: 'Мова і поетика: Наказ, пророцтво, гімн'
  words: 1500
- points:
  - 'Повернення до розминки: чому "Заповіт" залишається актуальним? Відповідь з опорою на аналіз тексту.'
  - 'Історія рецепції: як текст функціонував у різні епохи — від таємного поширення до радянської канонізації та використання
    на Майдані і у війні 2022-2026 рр.'
  - '[!anti-hagiography] Позбавлення від хрестоматійного глянцю: "Заповіт" як текст, що ставить незручні питання про ціну
    свободи та роль насильства в історії.'
  - 'Пропозиція до рефлексії: як змінилося ваше розуміння фрази "і вражою злою кров’ю волю окропіте" після детального аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз "Заповіту" Т. Шевченка як політичної інструкції, поетичного шедевру та національного символу через призму його
  структури, мови та історії рецепції.
level: LIT
module: lit-015
objectives:
- Аналізувати, як граматичні форми (наказовий спосіб) та поетична структура створюють політичний та ідеологічний зміст тексту.
- Критично оцінювати "Заповіт" у його історичному контексті (1845) та в контексті його пізніших інтерпретацій (радянської,
  діаспорної, сучасної).
- Формулювати аргументовану позицію щодо концепції «праведного насилля» у вірші та її місця в національно-визвольній боротьбі.
- Розрізняти та пояснювати різні критичні підходи до аналізу тексту, включаючи постколоніальний та історичний.
pedagogy: CBI
