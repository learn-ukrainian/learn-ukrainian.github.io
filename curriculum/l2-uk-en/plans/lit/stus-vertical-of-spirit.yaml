content_outline:
- points:
  - 'Провокація: «Народе мій, до тебе я ще верну...» — пророцтво, молитва чи поетична фікція? Як поет звертається до нації
    з межі небуття, із табірного бараку?'
  - Уривок (4-6 рядків) з вірша «Як добре те, що смерті не боюсь я» без жодного коментаря — студент має відчути стоїчний спокій
    автора.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Стус — дисидент чи філософ? Чи є його поезія передусім політичним актом опору, чи радше екзистенційним пошуком
    свободи духу в умовах несвободи?'
  - 'Дебат 2: «Важкий» поет для «обраних»? Дискусія навколо герметичності мови Стуса. Чи є його складна поетика елітарною
    втечею від реальності, чи єдино можливим способом сказати правду, яку неможливо висловити прямо?'
  - '[!epistemic-humility] Позиції критиків: від звинувачень у «відриві від народу» (радянська критика) до проголошення «поетом
    для поетів» (сучасні дебати).'
  section: 'Конфліктна карта: Екзистенційний виклик чи політичний спротив?'
  words: 900
- points:
  - '«Господи, гніву пречистого...»: аналіз тексту. Мотив очищення через страждання, діалог з Богом як із рівним, стоїцизм
    як духовна практика.'
  - '«Крізь сотні сумнівів я йду до тебе...»: структура та символіка. Дорога як метафора життя-пошуку. Образ «вертикалі духу»
    — опір гравітації зла і несвободи.'
  - 'Система персонажів: діалоги з Гете, Сковородою, Рільке. Стус вписує український спротив у світовий культурний контекст.'
  - '[!decolonization] Поезія Стуса як остаточна відмова від радянської парадигми. Він не просить, не скаржиться, а стверджує
    гідність і право на існування української культури самим фактом свого існування і мовлення.'
  section: 'Читання: Аналіз ключових поезій зі збірки «Палімпсести»'
  words: 1700
- points:
  - 'Стилістичні інновації: неологізми («самособоюнаповнення»), складні епітети, утворення нових слів для вираження граничних
    станів свідомості.'
  - 'Робота з мовою: використання архаїзмів та філософських термінів для створення «високого» стилю, що контрастує з примітивізмом
    табірного побуту.'
  - 'Синтаксис як віддзеркалення стану: «уривчасті», напружені конструкції, що передають постійне внутрішнє зусилля, боротьбу.'
  - '[!myth-buster] Стус — не просто мученик, а насамперед — блискучий філолог і майстер слова. Його «складність» — це не
    слабкість, а свідомий вибір митця, який створює власну мовну фортецю, неприступну для тюремників.'
  section: 'Мова і поетика: Герметизм і стоїчна мова'
  words: 1500
- points:
  - 'Повернення до розминки: то чим є слова «до тебе я ще верну»? Як змінилося ваше розуміння після аналізу поезії?'
  - 'Рецепція творчості: від самвидаву та таємного переписування до включення у шкільну програму. Як змінювався образ Стуса
    в суспільній свідомості?'
  - '[!anti-hagiography] Як уникнути перетворення Стуса на бронзовий пам''ятник? Обговорення його гострих, безкомпромісних
    оцінок колег-письменників.'
  - 'Сучасне значення: чому поезія Стуса, написана в радянських таборах, стала знову актуальною для українців, що борються
    за свободу в ХХІ столітті?'
  section: Дискусія та підсумок
  words: 700
focus: The poetic philosophy of Vasyl Stus in his later work, focusing on hermetic language, existential resistance, and the
  poetics of stoicism under totalitarian pressure.
level: LIT
module: lit-138
objectives:
- Аналізувати поезію Василя Стуса в контексті екзистенційного спротиву тоталітарному режиму
- Інтерпретувати ключові риси поетики Стуса: герметизм, палімпсестність, стоїчні мотиви
- Визначати деколонізаційне значення творчості Стуса як акту культурного самозбереження та опору асиміляції
- Формулювати власну позицію в літературно-критичних дебатах щодо спадщини поета
pedagogy: CBI
persona:
  role: Ментор, що пройшов через архіви КДБ. Показує не бронзового ідола, а живу, складну людину, чия мова — це зброя і єдина
    форма свободи.
  voice: Stus-Scholar-Archivist
