module: lit-076
objectives:
- Аналізувати трилогію «Мазепа» як ключовий текст українського модернізму, що формує національний наратив
- Розрізняти історичний факт, імперський міф та художню інтерпретацію в образі Івана Мазепи
- Критично оцінювати стилістичні особливості твору (неоромантизм, психологізм) як інструменти автора
- Аргументувати деколонізаційне значення трилогії Лепкого в контексті протистояння російським імперським наративам
