content_outline:
- points:
  - 'Провокація: Чому твір про гетьмана XVIII століття, написаний у 1920-х, був заборонений в СРСР, а в 1990-х став національним
    бестселером? Що такого небезпечного побачила імперія в романі Лепкого?'
  - 'Цитата без контексту: «Дві любові, одна до жінки, друга до України. Яка сильніша? Яка переможе?»'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історичний): Анафема РПЦ vs панегірики українських авторів. Як трилогія Лепкого стала літературною відповіддю
    на імперський міф про «зрадника Мазепу»?'
  - 'Дебат 2 (Літературознавчий): Історичний роман чи політичний маніфест? Наскільки Лепкий «художник», а наскільки «ідеолог»
    у своїй трилогії?'
  - '[!epistemic-humility] Позиція радянської критики: «націоналістична ідеалізація». Позиція діаспори: «відновлення історичної
    справедливості». Де істина?'
  - 'Текст як поле битви: порівняння образу Мазепи у Пушкіна («Полтава») та Лепкого — свідоме переписування імперського наративу.'
  section: 'Конфліктна карта: Мазепа: зрадник чи герой-державник?'
  words: 900
- points:
  - 'Частина 1 «Мотря»: Аналіз сцени першої зустрічі Мазепи й Мотрі Кочубеївни. Психологізм і трагедія забороненого кохання.'
  - 'Частина 2 «Не вбивай»: Внутрішні монологи Мазепи перед Полтавською битвою. Вибір між особистим щастям і державним обов''язком.'
  - 'Частина 3 «Батурин»: Образ палаючого Батурина як символ знищення української державності та особистої трагедії гетьмана.'
  - '[!decolonization] Лепкий повертає українському герою суб''єктність. Мазепа — не об''єкт дій Петра І, а самостійний європейський
    політик, що робить свій цивілізаційний вибір.'
  section: 'Читання: Трилогія про Мазепу: ключові сцени'
  words: 1700
- points:
  - 'Стилістичний аналіз: поєднання неоромантичної піднесеності (патетичні монологи, символізм) з імпресіоністичною психологізацією
    (потоки свідомості, увага до деталей).'
  - 'Мова трилогії: Лепкий використовує барокову лексику, козацькі архаїзми та народнопісенні елементи для створення історичного
    колориту.'
  - 'Ритм прози: використання ритмізованих уривків, що нагадують думи або ліричні пісні, для емоційного посилення ключових
    моментів.'
  - '[!myth-buster] Лепкий не просто «ілюструє» історію. Він створює психологічно складний, рефлексуючий образ Мазепи, руйнуючи
    плаский міф про «старого ловеласа» або «безпринципного кар''єриста».'
  section: 'Мова і поетика: Неоромантизм і модерністська поетика'
  words: 1500
- points:
  - 'Повернення до розминки: Як трилогія Лепкого функціонує як «літературна зброя» в культурній війні?'
  - 'Рецепція: Чому твір, популярний на початку ХХ ст., пережив друге народження в 1990-х? Зв''язок із відновленням незалежності
    України.'
  - '[!anti-hagiography] Чи не ідеалізує Лепкий Мазепу? Обговорення суперечливих аспектів образу, які автор міг пом''якшити
    чи оминути.'
  - 'Рефлексія: Чи змінилося ваше сприйняття постаті Івана Мазепи після прочитання аналізу трилогії? Яку роль відіграє художня
    література у формуванні національної пам''яті?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз трилогії Богдана Лепкого «Мазепа» як ключового тексту українського модернізму та інструменту деколонізації історичної
  пам'яті.
