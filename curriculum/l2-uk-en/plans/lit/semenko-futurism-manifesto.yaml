objectives:
- Аналізувати маніфести українського футуризму в контексті європейського авангарду
- Досліджувати мовні та стилістичні інновації Михайля Семенка як інструмент деструкції канону
- Формулювати аргументовану позицію щодо деколонізаційного значення футуризму для української культури
- Розрізняти поняття епатажу, мистецької програми та нігілізму в творчості футуристів
