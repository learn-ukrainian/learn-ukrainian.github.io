content_outline:
- points:
  - '"Я палю свій Кобзар" — провокація, мистецький жест чи філософська програма? Розбираємо найскандальнішу цитату українського
    футуризму.'
  - Що, якби мистецтво прагнуло не краси, а "пошуку і динаміту"? Початкова інтрига Семенка.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Футуризм — це тотальний розрив із традицією чи її приховане продовження? Полеміка з символістами (Вороний) та
    неокласиками (Зеров).'
  - 'Дебат 2: Семенко — український Марінетті? Питання про політичну ангажованість футуризму (пролетарське мистецтво vs. чистий
    естетизм).'
  - '[!epistemic-humility] Для одних критиків, футуризм — руйнівна анти-культура. Для інших (Ніковський) — необхідне "переорювання"
    української літератури, що застоялася.'
  section: 'Конфліктна карта: Епатаж чи нова естетика?'
  words: 900
- points:
  - 'Розбір ключових тез маніфесту "Сам": деструкція, динамізм, анти-психологізм.'
  - 'Аналіз образу ліричного героя-футуриста: урбаніст, технjкрат, експериментатор.'
  - 'Система опозицій: "ми" (футуристи) vs "вони" (академіки, символісти, "культуртрегери"). Як Семенко конструює ворога?'
  - '[!decolonization] Футуризм як спроба вирвати українську літературу з провінційної ролі "етнографічної" та синхронізувати
    її зі світовим авангардом.'
  section: 'Читання: Маніфести кверофутуризму'
  words: 1700
- points:
  - 'Стилістичні інновації: "поезомалярство", неологізми ("кверо-"), експерименти з графікою та шрифтом.'
  - 'Аналіз синтаксису маніфестів: телеграфний стиль, уривчасті фрази, відмова від сполучників як відображення динамізму.'
  - 'Робота з "низькою" лексикою: урбанізми, техніцизми, вульгаризми як свідомий епатаж проти "солов''їної мови".'
  - '[!myth-buster] Семенко не просто "руйнує мову". Він шукає нову виражальність, здатну описати індустріальну епоху, яку
    стара мова символістів описати не могла.'
  section: 'Мова і поетика: Деструкція синтаксису'
  words: 1500
- points:
  - 'Повернення до розминки: тож навіщо Семенко "палив" Кобзар? Відповідь студента на основі аналізу.'
  - 'Рецепція футуризму: від звинувачень у "ворожій ідеології" до визнання ключовим етапом українського модернізму.'
  - 'Сучасна релевантність: чи потрібен українській культурі новий футуризм сьогодні для розриву з пост-радянськими ментальними
    шаблонами?'
  - '[!anti-hagiography] Розстріляне Відродження: трагічна доля Семенка як нагадування про ціну мистецького експерименту в
    тоталітарній державі.'
  section: Дискусія та підсумок
  words: 700
focus: Кверофутуризм Семенка як деструкція імперського канону, аналіз мови маніфестів, епатаж і розрив із символістами
