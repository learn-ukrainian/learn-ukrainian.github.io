content_outline:
- points:
  - 'Провокація: Як російськомовний дворянин, директор театру та очільник палати карного суду став «батьком української прози»?
    Чи був його вибір мови щирим народництвом чи холоднокровною літературною стратегією?'
  - 'Цитата-загадка: "Та й що нам до того, що говорять або пишуть по-московськи, коли ми вміємо краще їх і чистіше?" — хто
    кидає цей виклик і в якому контексті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Народний просвітитель vs. Хитрий маркетолог. Чи був вибір української мови Квіткою щирим бажанням дати голос
    народу, чи прагматичним розрахунком на вільну літературну нішу, яку зневажала імперська критика?'
  - 'Дебат 2: «Мужицька мова» vs. Нова літературна норма. Російський критик Бєлінський називав мову Квітки «жалюгідною». Українські
    романтики бачили в ній живу душу нації. Чия позиція виявилася історично вірною?'
  - '[!epistemic-humility] Ми не можемо знати остаточних мотивів Квітки. Його листування показує і глибокий патріотизм, і
    роздратування через цензуру, і амбіції.'
  section: 'Конфліктна карта: Мовний вибір як поле бою'
  words: 900
- points:
  - 'Уривок з «Марусі»: аналіз сентиментального стилю. Пестлива лексика, емотивні вигуки, інверсії, довгі синтаксичні періоди,
    що імітують сльозливе зітхання.'
  - 'Уривок з «Конотопської відьми»: аналіз бурлескного стилю. Гротеск, лайлива лексика, канцеляризми, «макаронічна мова»,
    уривчасті, динамічні речення.'
  - 'Контраст як прийом: як один автор міг володіти обома стилями? Квітка доводить, що українська мова здатна обслуговувати
    будь-які жанри — від високої трагедії до низького фарсу.'
  - '[!decolonization] Квітка свідомо доводив самодостатність української мови, її незалежність від російської. Він не просто
    писав «регіональним діалектом», а закладав основи окремої літературної традиції.'
  section: 'Читання: «Маруся» vs «Конотопська відьма»'
  words: 1700
- points:
  - 'Літературна маска «Грицька Основ''яненка»: аналіз образу оповідача-простака, що створює ефект достовірності та імітує
    усну розповідь.'
  - 'Слобожанський діалект як основа стилю: фонетичні (укання), лексичні (діалектизми) та синтаксичні особливості в текстах.
    Чому саме цей діалект став базою?'
  - 'Мовні портрети персонажів: як мова характеризує соціальний статус? Аналіз «макаронічної» мови суддівського писаря Пістряка,
    солдатського жаргону, мови панства і народу.'
  - '[!myth-buster] Мова Квітки — не просто "записаний фольклор". Це складна літературна конструкція, де діалектні риси є
    не вадою, а свідомим художнім засобом.'
  section: 'Мова і поетика: Народна мова як художній інструмент'
  words: 1500
- points:
  - 'Повернення до розминки: тож чому дворянин Квітка обрав «мужицьку» мову? Студент формулює власну аргументовану позицію
    на основі аналізу модуля.'
  - 'Слово як зброя: як Квітка використовував мову для утвердження національної гідності в умовах імперського тиску?'
  - 'Спадок: який вплив стилістичні та мовні знахідки Квітки мали на подальший розвиток української літературної мови, зокрема
    на творчість Шевченка?'
  - '[!anti-hagiography] Незважаючи на свій внесок, Квітка мав і консервативні погляди, ідеалізував патріархальне село. Його
    мова — це інструмент, а не ікона.'
  section: Дискусія та підсумок
  words: 700
focus: 'Лінгвістичний аналіз прози Квітки-Основ''яненка: свідомий вибір української мови, стилістичний дуалізм (бурлеск vs
  сентименталізм), використання слобожанського діалекту, створення образу народного оповідача, мова як інструмент національної
  ідентичності.'
level: LIT
module: lit-010
objectives:
- Аналізувати мовні стратегії Квітки-Основ'яненка як свідомий політичний та естетичний вибір
- Порівнювати та ідентифікувати стилістичні регістри (бурлеск і сентименталізм) у його творах
- Оцінювати роль письменника у становленні нової української літературної мови на базі слобожанського діалекту
- Розпізнавати та інтерпретувати використання мовних масок та мовних портретів персонажів
