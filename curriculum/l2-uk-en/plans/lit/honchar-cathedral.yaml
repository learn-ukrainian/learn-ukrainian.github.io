content_outline:
- points:
  - 'Провокація: Як роман, написаний лауреатом Ленінської премії та депутатом Верховної Ради, міг бути забороненим в СРСР
    на 20 років?'
  - 'Цитата без контексту: «Собори душ своїх бережіть, друзі... Собори душ!..» — Що змусило автора вкласти ці слова в уста
    персонажа саме в 1968 році?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Виробничий роман» з помилками vs антирадянський філософський памфлет. Погляд офіційної радянської критики («ідеологічні
    збочення») проти аналізу самвидаву (Дзюба, Сверстюк).'
  - 'Дебат 2: Місце «Собору» в каноні. Заборонений текст, що поширювався в рукописах → реабілітований символ Перебудови →
    обов''язкова шкільна програма. Як змінювалась інтерпретація від 60-х до сьогодні?'
  - '[!epistemic-humility] Чи був Гончар дисидентом? Аналіз його складної позиції як частини радянського істеблішменту, що
    водночас створював тексти, які підривали основи системи.'
  section: 'Конфліктна карта: Собор як поле битви ідеологій'
  words: 900
- points:
  - 'Центральний символ: Собор як жива істота, як серце краю, як уособлення історичної пам''яті та зв''язку поколінь. Аналіз
    ключових описів собору в різні пори року та в різний час доби.'
  - 'Покоління руйнівників і будівничих: конфлікт між Миколою Баглаєм (захисник) та його братом-кар''єристом Володькою Лободою
    (представник бездушної системи).'
  - 'Жіночі образи: Єлька як уособлення моральної чистоти та природної сили, що протистоїть цинізму «володь лобод».'
  - '[!decolonization] «Собор» як маніфест проти радянського безпам''ятства та політики русифікації. Боротьба за собор — це
    боротьба за українську ідентичність і культуру проти імперського нівелювання.'
  section: 'Читання: Образ Собору та система персонажів'
  words: 1700
- points:
  - 'Стилістичні особливості: поєднання ліричної, поетичної прози з гострою публіцистичністю. Аналіз ритміки та синтаксису,
    що створюють ефект «орнаментальної прози».'
  - 'Символіка другого плану: образ «браконьєра» як алегорія хижацького ставлення до природи і культури. Непрядівська Січ
    як символ козацької вольниці.'
  - 'Робота з мовою: використання народної лексики, діалектизмів та історизмів для створення автентичного мовного тла.'
  - '[!myth-buster] «Собор» — це не просто «екологічна проза». Це глибокий філософський твір про екзистенційний вибір людини
    між духовністю та споживацтвом, пам''яттю та забуттям.'
  section: 'Мова і поетика: Ліризм, символізм і публіцистичність'
  words: 1500
- points:
  - 'Повернення до розминки: Чому «Собор» був таким небезпечним для радянської влади? Формулювання відповіді на основі аналізу.'
  - 'Історія рецепції: від розгромних статей у «Правді» до листів підтримки Гончару від робітників і студентів. Роман як каталізатор
    суспільної думки.'
  - '[!anti-hagiography] Обговорення складної долі автора після публікації роману: публічне цькування, вимушене мовчання та
    подальші спроби вписатись у радянський літературний процес.'
  - 'Сучасна актуальність: Чи є сьогодні в Україні свої «собори», що потребують захисту? Що таке «собори душ» для сучасного
    українця?'
  section: Дискусія та підсумок
  words: 700
focus: 'Роман "Собор" Олеся Гончара: від офіційної анафеми до канонізації як маніфесту шістдесятництва, екологічного руху
  та захисту національної спадщини.'
