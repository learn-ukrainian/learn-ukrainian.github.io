objectives:
- Аналізувати ідеологічні конфлікти навколо роману, використовуючи методологію «конфліктної карти»
- Інтерпретувати ключові символи та алегорії твору в контексті епохи та деколонізаційного дискурсу
- Розрізняти стилістичні особливості прози Олеся Гончара, поєднуючи ліричні, філософські та публіцистичні елементи
- Формулювати власну аргументовану позицію щодо актуальності роману та його місця в українському літературному каноні
