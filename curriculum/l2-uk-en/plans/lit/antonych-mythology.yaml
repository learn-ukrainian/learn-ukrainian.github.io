content_outline:
- points:
  - 'Провокація: Антонич писав: «Я — поет весняного похмілля». Як поєднати цей образ богемного митця з його «язичницькою»
    міфологією та глибокою релігійністю?'
  - 'Уривок з «Книги Лева» без контексту: «Антонич був Антонич, і був Антонич лев». Що це — гра, окультна формула чи поетична
    декларація?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Пантеїзм vs. Християнство. Чи є міфологія Антонича синкретичною, де язичницькі образи є формою християнського
    світовідчуття (погляд більшості), чи це свідоме повернення до дохристиянських архаїчних вірувань?'
  - 'Дебат 2: Місце в каноні. Чи був Антонич «радянським поетом»? Як радянська критика намагалася апропріювати його, ігноруючи
    містичний та національний виміри його творчості?'
  - '[!epistemic-humility] Не існує єдиного «правильного» прочитання Антонича. Його поезія — відкрита структура, що провокує
    різні, часто суперечливі, інтерпретації.'
  section: 'Конфліктна карта: Поет-язичник чи християнський містик?'
  words: 900
- points:
  - 'Close reading: Детальний аналіз ключових віршів з «Книги Лева» та «Зеленої Євангелії». Розбір центрального міфу про сонце,
    місяць, лева та Христа.'
  - 'Система персонажів: Бог-Олень, Сонце-Ярило, Тіла-Дерева. Як Антонич створює власний пантеон, де природа, людина і божество
    нероздільні.'
  - 'Структура міфу: від хаосу до космосу. Аналіз того, як поет структурує свої збірки як єдиний міфологічний цикл.'
  - '[!decolonization] Антонич як відповідь на імперський дискурс. Його міфологія, закорінена в лемківській культурі, створює
    унікальний український космос, незалежний від російських культурних кодів.'
  section: 'Читання: Книга Лева та Зелена Євангелія'
  words: 1700
- points:
  - 'Стилістичні інновації: «метафоричний реалізм», де найсміливіші метафори («дощ — струнне радіо») сприймаються як об''єктивна
    реальність.'
  - 'Робота з мовою: використання лемківської говірки, архаїзмів та створення неологізмів (оказіоналізмів) для розширення
    поетичного словника.'
  - 'Звукопис та синтаксис: аналіз алітерацій, асонансів та ритмічної організації вірша. Як специфічний синтаксис Антонича
    створює ефект «заклинання».'
  - '[!myth-buster] Антонич — не просто «співець природи». Це інтелектуальний поет-конструктор, який використовує природу
    як матеріал для створення складної філософської та естетичної системи.'
  section: 'Мова і поетика: Магія слова'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, хто такий Антонич — «поет весняного похмілля», язичник, містик, чи контруктор міфів? Формулювання
    власної відповіді на основі аналізу.'
  - 'Рецепція та вплив: як Антонича «перевідкрили» у 1960-х роках, і як він вплинув на сучасну українську поезію та музику
    (напр., проекти гурту «Плач Єремії»).'
  - '[!anti-hagiography] Критичний погляд на міф про «безгрішного» Антонича. Розгляд його ранніх, ідеологічно заангажованих
    віршів та їх місце у творчій еволюції.'
  - 'Питання для рефлексії: Чи може сучасна людина мислити міфологічними категоріями, як це робив Антонич? Чи актуальний його
    пантеїзм у добу екологічних криз?'
  section: Дискусія та підсумок
  words: 700
focus: Close reading of Antonych's mythological poetry, his stylistic innovations, pantheistic worldview, and decolonization
  of the Ukrainian literary landscape.
level: LIT
module: lit-108
objectives:
- Критично аналізувати поетичний текст Антонича, застосовуючи інструменти close reading та герменевтичного аналізу
- Ідентифікувати та пояснювати стилістичні інновації Антонича, його роботу з міфологією, архаїкою та лемківською говіркою
- Формулювати аргументовану позицію щодо місця Антонича в українському літературному каноні та його деколонізаційного значення
- Розрізняти різні критичні підходи (біографічний, формалістичний, постколоніальний) до інтерпретації творчості поета
