content_outline:
- points:
  - 'Провокативне питання: що гірше — зробити неправильний вибір чи не робити жодного? Подорож Паші, вчителя української мови,
    крізь туман війни.'
  - 'Цитата з роману: "Мова, Паша, з''являється там, де є спротив. Де є спротив, там з''являється мова". Як цей епіграф визначає
    головний конфлікт твору?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Інтернат» — це документальне свідчення про війну на Донбасі чи універсальна притча про людину в екзистенційній
    кризі? Позиції критиків.'
  - 'Дебат 2: Чи є роман політичним маніфестом? Дискусія про "аполітичність" головного героя як найточніший портрет настроїв
    у "сірій зоні" напередодні повномасштабного вторгнення.'
  - '[!epistemic-humility] Критики досі сперечаються, чи є Паша героєм, що "прокинувся", чи просто людиною, яку обставини
    змусили діяти. Немає єдиної правильної відповіді.'
  section: 'Конфліктна карта: Література факту чи література вимислу?'
  words: 900
- points:
  - 'Розбір ключового епізоду: перетин блокпоста. Як мова та мовчання стають інструментами виживання?'
  - 'Аналіз наративної структури: триденна подорож як міфологічний мотив ініціації. Зміна Паші від спостерігача до учасника.'
  - 'Символіка туману та снігу: не лише погодні умови, а й метафора моральної дезорієнтації, втрати орієнтирів, "сірої зони"
    у свідомості.'
  - '[!decolonization] Роман руйнує російський наратив про "громадянську війну". Він показує війну як зовнішню агресію, що
    вторгається у життя звичайних людей, які намагалися бути "поза політикою".'
  section: 'Читання: Подорож крізь туман і "сіру зону"'
  words: 1700
- points:
  - 'Стилістичний аналіз: як Жадан поєднує високий поетичний стиль із суржиком та розмовною лексикою для створення ефекту
    документальності.'
  - 'Синтаксис тривоги: використання коротких, уривчастих речень для передачі напруги та розгубленості героя.'
  - 'Роль української мови у творі: для Паші це професія, для інших — маркер ідентичності, для третіх — небезпека. Мова як
    персонаж, що проходить власну еволюцію.'
  - '[!myth-buster] Жадан — не просто "співець Донбасу". Його робота з мовою — це глибокий філологічний аналіз того, як мова
    формує і відображає реальність, особливо в кризових умовах.'
  section: 'Мова і поетика: Мова як головний герой'
  words: 1500
- points:
  - 'Повернення до розминки: чи можна залишатися "нейтральним", коли війна стукає у твої двері? Відповідь на основі аналізу
    еволюції Паші.'
  - 'Рецепція роману: як «Інтернат» читали у 2017 році і як його читають після 24 лютого 2022 року? Зміна оптики.'
  - '[!anti-hagiography] Чи є фінальний вчинок Паші — порятунок племінника — справжнім героїзмом чи лише виконанням родинного
    обов''язку, що не змінює його суті?'
  - 'Зв''язок із сучасністю: "Інтернат" як пророчий текст, що передбачив неминучість вибору для мільйонів українців.'
  section: Дискусія та підсумок
  words: 700
focus: Serhiy Zhadan's novel "Internat", the experience of war in the "grey zone", the role of language and choice in conflict,
  decolonial close reading, and contemporary Ukrainian literature.
level: LIT
module: lit-183
objectives:
- Аналізувати роман «Інтернат» через призму літературних дебатів про політичне та екзистенційне
- Інтерпретувати ключові символи твору (туман, мова, подорож) у контексті війни на Донбасі
- Дослідити стилістичні особливості прози Сергія Жадана, зокрема його роботу з мовою
- Формулювати аргументовану позицію щодо еволюції головного героя та його ролі у творі
- Оцінювати деколонізаційне значення роману в контексті сучасної української літератури
