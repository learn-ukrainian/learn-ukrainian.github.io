activity_hints:
- description: 'Розрізнення позицій критиків: чия це теза — що роман є документальним свідченням, а чия — що це універсальна
    притча?'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити в речення з роману характерні для стилю Жадана слова та вирази (суржик, діалектизми, розмовна лексика).
  focus: Мова роману
  items: 5
  type: fill-in
- description: Прочитайте уривок, де Паша їде в тумані. Які художні засоби використовує автор для створення атмосфери? Як
    цей епізод відображає внутрішній стан героя?
  focus: 'Аналіз символіки: уривок про туман'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: "Чому «Інтернат», написаний у 2017 році, вважають одним із найважливіших
    текстів для розуміння подій після 24 лютого 2022 року?"'
  focus: 'Есе: "Інтернат" як пророцтво'
  type: note
