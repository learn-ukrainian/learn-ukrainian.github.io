content_outline:
- points:
  - 'Провокація: Чи може літературна критика бути важливішою за саму літературу? Праця Гундорової змушує поставити це питання.'
  - 'Цитата-загадка: "Карнавал і траур стають провідними модусами нової української літератури". Про які твори йдеться і що
    це означає?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Постчорнобильська бібліотека" — це літературознавчий аналіз чи самостійний філософський твір, що лише використовує
    літературу як матеріал?'
  - 'Дебат 2: Чи є Чорнобильська травма центральним організуючим принципом сучасної української ідентичності, як пропонує
    Гундорова, чи це лише одна з важливих тем?'
  - '[!epistemic-humility] Позиція Гундорової — не єдина можлива. Інші критики (напр., Грабович) пропонують інші моделі для
    розуміння канону.'
  section: 'Конфліктна карта: Критика як література'
  words: 900
- points:
  - 'Аналіз ключових концептів: травма, кітч, симулякр, карнавал — як Гундорова використовує їх для аналізу текстів Забужко,
    Андруховича, Покальчука.'
  - 'Розбір кейсу: як "польові дослідження" Забужко вписуються в концепцію постколоніальної травми та феміністичного письма.'
  - '[!decolonization] Гундорова показує, як українська література 90-х руйнує імперський міф про "молодшого брата", створюючи
    власну мову для опису власного досвіду.'
  - 'Сюжет та структура аргументації Гундорової: від аналізу окремих творів до побудови цілісної теорії пост-радянської культурної
    свідомості.'
  section: 'Читання: Деконструкція колоніального дискурсу'
  words: 1700
- points:
  - 'Аналіз стилю самої Гундорової: використання метафор, іронії, філософської термінології як художнього прийому.'
  - 'Неологізми та запозичення: як слова "дискурс", "трансгресія", "палімпсест" перестають бути просто термінами і стають
    частиною нової української академічної мови.'
  - '[!myth-buster] Гундорова руйнує міф про те, що українська література — це виключно село, шаровари та народні пісні. Вона
    відкриває міську, інтелектуальну, іронічну традицію.'
  - 'Синтаксис як значення: аналіз довгих, складних речень Гундорової як спроби вхопити складність постмодерної реальності.'
  section: 'Мова і поетика: Словник українського постмодерну'
  words: 1500
- points:
  - 'Повернення до розминки: чи є критика Гундорової актом творення нової літератури? Аргументована відповідь студента.'
  - 'Рецепція та вплив: як "Постчорнобильська бібліотека" змінила викладання сучасної української літератури в університетах.'
  - '[!anti-hagiography] Чи не стала сама модель Гундорової новим, недоторканним каноном? Які є обмеження її підходу?'
  - 'Сучасна релевантність: як ідеї Гундорової допомагають зрозуміти культурні процеси в Україні під час повномасштабного
    вторгнення?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз "Постчорнобильської бібліотеки" як маніфесту української постмодерної критики, травма Чорнобиля, деконструкція
  колоніального дискурсу
