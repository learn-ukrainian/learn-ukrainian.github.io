objectives:
- Аналізувати працю Тамари Гундорової "Постчорнобильська бібліотека" як ключовий текст українського постмодернізму
- Визначати та інтерпретувати ключові поняття її критичного методу (травма, кітч, деконструкція)
- Критично оцінювати деколонізаційний вимір її праці — руйнування імперських міфів про українську літературу
- Застосовувати інструментарій Гундорової для аналізу інших літературних текстів
