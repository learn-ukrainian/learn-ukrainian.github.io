activity_hints:
- description: Визначити, яка з тез належить до позиції «мистецтво», а яка до позиції «документ». Перевірка розуміння ключових
    аргументів дебату.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити у речення слова з військового сленгу (арта, двохсотий, евакуація), пояснюючи їхнє значення у контексті.
  focus: Лексика війни
  items: 5
  type: fill-in
- description: Порівняйте уривок з художнього твору про бій та статтю з новин про ту саму подію. Що може передати література,
    чого не може журналістський репортаж? Запишіть 3-4 ключові відмінності.
  focus: 'Аналіз: Література vs Журналістика'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: «Чи стане сучасна українська воєнна література основою національної пам''яті
    про цю війну, і які ризики існують на цьому шляху?»'
  focus: 'Есе: Роль літератури у формуванні пам''яті про війну'
  type: note
cefr_min: C1
