content_outline:
- points:
  - 'Провокація: Чи може текст, написаний в окопі на смартфоні, бути високою літературою? І чи повинен він нею бути?'
  - 'Фрагмент щоденника сучасного військового письменника (без імені) — raw, uncensored. Завдання студенту: визначити — це
    документ чи художній твір?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мистецтво vs Документ. Чи має література про війну бути «добре зробленою» (естетично довершеною), чи її головна
    цінність — у сирому, невідредагованому свідченні?'
  - 'Дебат 2: Канонізація в реальному часі. Чи можемо ми сьогодні говорити про «канон» воєнної літератури, чи для цього потрібна
    історична дистанція? Хто вирішує, що потрапить у канон?'
  - '[!epistemic-humility] Не існує єдиної «правильної» відповіді. Позиції критиків (О. Забужко, Т. Гундорова, В. Єрмоленко)
    щодо цього питання різняться.'
  section: 'Конфліктна карта: Естетика проти Свідчення'
  words: 900
- points:
  - 'Текст 1 (проза): Уривок з роману про досвід комбатанта. Аналіз того, як автор передає психологічний стан героя через
    фрагментарність оповіді, внутрішні монологи.'
  - 'Текст 2 (поезія): Розбір вірша, написаного на фронті. Як традиційні поетичні засоби (метафора, порівняння) трансформуються
    під тиском екстремального досвіду.'
  - '[!decolonization] Ця література — не просто відповідь на агресію, а й акт деколонізації свідомості, відвоювання права
    говорити про себе своїм голосом, руйнуючи імперські наративи про «братські народи».'
  - 'Система персонажів: відмова від чорно-білого зображення. Герої — не плакатні патріоти, а живі люди зі своїми сумнівами,
    страхами та моральними дилемами.'
  section: 'Читання: Аналіз ключових текстів руху'
  words: 1700
- points:
  - 'Лексика війни: аналіз неологізмів, військового сленгу, англіцизмів, що проникають у мову текстів (напр. «двохсотий»,
    «трьохсотий», «арта»).'
  - 'Синтаксис травми: як «рвані» речення, уривчасті фрази, відсутність розділових знаків передають стан шоку та дезорієнтації.'
  - 'Інтертекстуальність: свідомі та несвідомі алюзії на класичну українську літературу (Шевченко, Франко, Стус) у текстах
    сучасних авторів.'
  - '[!myth-buster] Уявлення про те, що воєнна проза — це проста, «солдатська» мова, є хибним. Кращі зразки демонструють високий
    рівень стилістичної майстерності та мовної інновації.'
  section: 'Мова і поетика: Мова на межі досвіду'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є межа між документом і художнім твором у літературі про війну? Аргументована відповідь студента
    на основі проаналізованих текстів.'
  - 'Рецепція та вплив: як ці твори сприймаються в Україні та за кордоном? Роль перекладів у донесенні української перспективи
    світові.'
  - '[!anti-hagiography] Небезпека сакралізації: як уникнути перетворення письменників-ветеранів на безкритичних ідолів і
    зберегти можливість для об''єктивної критики їхніх текстів?'
  - 'Рефлексія: Яку функцію виконує ця література сьогодні — терапевтичну, меморіальну, мобілізаційну, чи щось інше?'
  section: Дискусія та підсумок
  words: 700
focus: The phenomenon of "War Literature" as a distinct literary movement in contemporary Ukraine, its aesthetics, key figures,
  and decolonial role.
level: LIT
module: lit-210
objectives:
- Формулювати аргументовану позицію в дебатах про естетичну та документальну цінність воєнної літератури.
- Аналізувати художні тексти про війну, виявляючи стилістичні особливості, що передають екстремальний досвід.
- Розпізнавати деколонізаційний вимір сучасної літератури як форму опору імперським наративам.
- Критично оцінювати процес формування нового літературного канону та роль критики й суспільства в ньому.
