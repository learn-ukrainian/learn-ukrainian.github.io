content_outline:
- points:
  - 'Провокація: Чи може один письменник уособлювати ціле «відродження»? Запитання, що його поставила сама Вікторія Амеліна:
    «Чому ми, українці, так любимо слово ''розстріляний'' перед словом ''ренесанс''?»'
  - 'Цитата без контексту: «В українській літературі порожніх стільців більше, ніж письменників». Що мала на увазі Амеліна?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Амеліна — «письменниця війни» чи універсальний автор? Полеміка між тими, хто бачить її творчість крізь призму
    війни, та тими, хто наголошує на її філософській та екзистенційній глибині.'
  - 'Дебат 2: Як говорити про Амеліну після її загибелі? Ризик сакралізації та перетворення на «ікону» vs потреба в об''єктивному
    літературознавчому аналізі.'
  - '[!epistemic-humility] Немає єдиної відповіді на те, як її загибель впливає на оцінку її текстів. Критики сперечаються,
    чи варто відокремлювати біографію від творчості в такому випадку.'
  - 'Контекст: Поняття «Розстріляного відродження» як травма, яку Амеліна намагалася переосмислити у «Нове відродження».'
  section: 'Конфліктна карта: Канон мучеництва чи голос покоління?'
  words: 900
- points:
  - 'Ключовий уривок: Розмова героя з привидом історії у львівській квартирі — аналіз діалогу.'
  - 'Наративна структура: Нелінійний сюжет, переплетення сьогодення з історією родини та країни.'
  - '[!decolonization] Руйнування імперського міфу про «спільну історію». Амеліна показує, як радянська влада стирала пам''ять
    та привласнювала простір, і як українці повертають його собі.'
  - 'Система персонажів: Домінік, його родина, та сам Дім як повноцінний персонаж, що зберігає пам''ять поколінь.'
  section: 'Читання: Роман "Дім для Дома"'
  words: 1700
- points:
  - 'Стилістичний аналіз: Мова Амеліної — на перший погляд проста, але насичена глибокими метафорами та символами (стілець,
    ключ, дім).'
  - 'Інтертекстуальність: Приховані та явні посилання на Бруно Шульца, Станіслава Лема та інших авторів як спосіб вписати
    українську літературу у світовий контекст.'
  - '[!myth-buster] Амеліна не просто «документує реальність». Вона конструює її за допомогою мови, перетворюючи побутові
    речі на символи національної долі.'
  - 'Особливості синтаксису: Довгі, медитативні речення, що передають плин свідомості та пам''яті.'
  section: 'Мова і поетика: Метафора як інструмент пам''яті'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є «Нове відродження» реальністю, чи лише мрією, перерваною трагедією? Студент формулює відповідь,
    спираючись на аналіз текстів Амеліної.'
  - 'Рецепція: Як змінилося сприйняття творчості Амеліної після її загибелі в Україні та світі.'
  - '[!anti-hagiography] Критичний погляд: Які аспекти творчості Амеліної могли б залишитися в тіні, якби не її трагічна біографія?
    Важливо уникати створення образу «святої» і бачити в ній складного, живого автора.'
  - 'Спадщина: У чому полягає внесок Амеліної? Вона не лише написала важливі тексти, але й сформулювала нову оптику для розуміння
    української культури.'
  section: Дискусія та підсумок
  words: 700
focus: The work of Victoria Amelina as a key voice of the post-Maidan generation, the concept of a "new renaissance" in Ukrainian
  literature, and the writer's role as witness and creator amidst war.
level: LIT
module: lit-224
objectives:
- Аналізувати творчість Вікторії Амеліної в контексті української літератури після 1991 року та російсько-української війни
- Критично осмислювати концепт «Нового відродження» як спробу подолання історичної травми «Розстріляного відродження»
- Розрізняти біографічний, історичний та суто літературний виміри в аналізі творів Амеліної
- Формулювати власну аргументовану позицію щодо місця письменника в суспільстві під час екзистенційної загрози
