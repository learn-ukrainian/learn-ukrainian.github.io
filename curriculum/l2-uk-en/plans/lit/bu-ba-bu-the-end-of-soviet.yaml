content_outline:
- points:
  - 'Провокація: Фрагмент вірша-маніфесту, де змішуються високий стиль і відверте "хуліганство". Питання до студента: це висока
    поезія чи провокативний жарт?'
  - 'Загадка: Чому троє молодих поетів назвали своє об''єднання "Бурлеск-Балаган-Буфонада"? Що ця назва говорить про їхнє
    ставлення до літератури і радянської реальності?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Літературні хулігани чи культурні революціонери? Одні критики бачили в «Бу-Ба-Бу» лише епатаж та руйнування,
    інші — єдиноможливу форму відродження літератури після радянського застою.'
  - 'Дебат 2: «Бу-Ба-Бу» — це український постмодернізм чи його пародія? Дискусія про те, чи було їхнє звернення до гри, цитатності
    та іронії автентичним філософським жестом, чи лише інтуїтивною реакцією на розпад імперії.'
  - '[!epistemic-humility] Не існує єдиної оцінки «Бу-Ба-Бу». Для одних вони — "могильники" соцреалізму, для інших — творці
    нової естетичної свободи. Істина, як завжди, десь посередині.'
  section: 'Конфліктна карта: Кінець радянської літератури'
  words: 900
- points:
  - 'Аналіз ключових текстів: Розбір знакових віршів Юрія Андруховича, Олександра Ірванця, Віктора Неборака з "бу-ба-бістського"
    періоду.'
  - 'Реконструкція перформансу: Як вірші звучали на сцені? Аналіз аудіо- та відеозаписів виступів, роль музики, костюмів,
    імпровізації.'
  - 'Система персонажів: Патріарх, Підскарбій, Прокуратор — як ці "посади" розподіляли ролі всередині групи і створювали спільний
    міф.'
  - '[!decolonization] «Бу-Ба-Бу» здійснили деколонізацію сміхом. Вони не сперечалися з імперськими наративами, а висміювали
    їх, позбавляючи їхньої сакральності та влади. Карнавал як форма культурного екзорцизму.'
  section: 'Читання: Поетичний перформанс як текст'
  words: 1700
- points:
  - 'Стилістичний еклектизм: поєднання в одному тексті архаїзмів, діалектизмів, неологізмів, суржику та наукової термінології.'
  - 'Інтертекстуальність: "Бу-Ба-Бу" як "діалог" з усією світовою культурою — від Гомера до українського бароко та американського
    року.'
  - 'Синтаксис та ритміка: Розхитування класичної віршованої структури, гра з ритмом та інтонацією для створення ефекту "живої"
    мови.'
  - '[!myth-buster] Позірна легкість і "несерйозність" поезії «Бу-Ба-Бу» приховує глибоку філологічну ерудицію. Це не помилки,
    а свідома гра з мовними нормами.'
  section: 'Мова і поетика: Карнавальна гра з мовою'
  words: 1500
- points:
  - 'Повернення до розминки: Тож «Бу-Ба-Бу» — це поезія чи перформанс? Аргументація на основі аналізу модуля: це поезія, що
    не може існувати без перформансу.'
  - 'Рецепція та спадок: Як творчість групи вплинула на наступні покоління українських письменників? Чому їх досі читають
    і люблять?'
  - 'Сучасна актуальність: Чи можливе сьогодні об''єднання, подібне до «Бу-Ба-Бу»? Які сучасні культурні явища продовжують
    їхню традицію карнавального спротиву?'
  - '[!anti-hagiography] Чи не перетворився бунт «Бу-Ба-Бу» на новий канон? Критична дискусія про те, як колишні "аутсайдери"
    стали "класиками".'
  section: Дискусія та підсумок
  words: 700
focus: Bu-Ba-Bu literary group (Andrukhovych, Irvanets, Neborak), Ukrainian postmodernism, carnival poetics, deconstruction
  of Soviet discourse, literary performance
level: LIT
module: lit-172
objectives:
- Аналізувати творчість угруповання «Бу-Ба-Бу» як карнавальну відповідь на кризу пізньорадянської культури
- Визначати ключові риси поетики постмодернізму: іронію, гротеск, еклектизм, гру з мовними регістрами
- Пояснювати деколоніальне значення творчості «Бу-Ба-Бу» як форми культурного опору та відвоювання мови через сміх
- Формулювати власну аргументовану позицію в літературній дискусії про місце і значення «Бу-Ба-Бу» в українському каноні
