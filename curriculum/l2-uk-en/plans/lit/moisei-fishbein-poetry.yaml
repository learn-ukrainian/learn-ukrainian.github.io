content_outline:
- points:
  - 'Провокація: Чому Мойсей Фішбейн, єврейський інтелектуал, що народився в Чернівцях, обрав своєю творчою мовою українську,
    а не російську чи ідиш?'
  - Фрагмент поезії Фішбейна (4-5 рядків) без контексту, що містить біблійні алюзії, як тизер до його унікального стилю.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є Фішбейн українським поетом єврейського походження, чи єврейським поетом, що писав українською? Де проходить
    межа канону?'
  - 'Дебат 2: Фішбейн як символ гармонійної українсько-єврейської співпраці vs Фішбейн як виняток, що підтверджує правило
    про складність історичних відносин.'
  - '[!epistemic-humility] Критики досі сперечаються, чи його вибір мови був чисто естетичним актом, чи політичною декларацією.'
  section: 'Конфліктна карта: Свій серед чужих чи чужий серед своїх?'
  words: 900
- points:
  - 'Розбір ключових віршів зі збірки «Апокриф»: аналіз діалогу між юдейською духовною традицією та українським культурним
    кодом.'
  - 'Close reading поезії зі збірки «Ранній рай»: тема пам''яті, втрати та філософського осмислення буття.'
  - 'Стилістичний розвиток: перехід від ранньої лірики до зрілої філософської поезії.'
  - '[!decolonization] Фішбейн своєю творчістю активно спростовував імперський наратив про «антисемітський» характер української
    культури, показуючи її відкритість до діалогу.'
  section: 'Читання: Поезія «Апокрифу» та «Раннього раю»'
  words: 1700
- points:
  - 'Аналіз мови Фішбейна: витонченість, лексичне багатство, використання бібліїзмів, архаїзмів та неологізмів.'
  - 'Інтертекстуальність як ключовий прийом: відкриті та приховані алюзії на Танах, Талмуд, український фольклор та світову
    літературу (Рільке, Целан).'
  - 'Поліфонія: як у його текстах поєднуються та сперечаються голоси різних культур, епох та філософських систем.'
  - '[!myth-buster] Поширений міф, що Фішбейн — «складний» поет. Насправді, його поезія є глибоко структурованою і логічною,
    її «складність» — це багатство сенсів.'
  section: 'Мова і поетика: Інтертекстуальна поліфонія'
  words: 1500
- points:
  - 'Повернення до провокації: Після аналізу, як студент відповідає на питання про вибір мови Фішбейном? Які аргументи він
    може навести?'
  - 'Рецепція творчості: як сприймали Фішбейна в 1990-х і як його місце в каноні змінилося сьогодні, в контексті нової війни
    за незалежність?'
  - '[!anti-hagiography] Чи не ідеалізуємо ми Фішбейна як символ? Які аспекти його творчості чи біографії залишаються поза
    увагою через цю фокус на «діалозі культур»?'
  - 'Значення для сучасності: Чому читання Фішбейна є важливим для розуміння сучасної, мультикультурної української політичної
    нації?'
  section: Дискусія та підсумок
  words: 700
focus: Поезія Мойсея Фішбейна як феномен єврейсько-української культурної взаємодії, свідомий вибір мови та деконструкція
  імперських міфів.
level: LIT
module: lit-218
objectives:
- Аналізувати поезію Мойсея Фішбейна через призму діалогу єврейської та української культурних традицій.
- Формулювати обґрунтовану позицію щодо вибору української мови Фішбейном як мистецького та світоглядного акту.
- Критично осмислювати роль Фішбейна у деконструкції імперських міфів про українську культуру як «антисемітську» чи «моноетнічну».
- Визначати ключові риси поетики Фішбейна: інтертекстуальність, поліфонію, філософську глибину.
