objectives:
- Аналізувати модерністський твір у контексті травми вигнання та політики пам'яті
- Розрізняти та критично оцінювати різні літературні угруповання в діаспорі
- Досліджувати стилістичні особливості тексту як форму опору культурній асиміляції
- Формулювати власну позицію щодо деколонізаційного значення діаспорної літератури для сучасного канону
