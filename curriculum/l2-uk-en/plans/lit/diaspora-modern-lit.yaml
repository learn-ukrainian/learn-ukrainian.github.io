content_outline:
- points:
  - 'Провокація: Чи може література, написана далеко від України, бути більш українською, ніж створена в УРСР? Розглядаємо
    уривок без автора.'
  - 'Ключове питання: Як мова стає останнім бастіоном ідентичності, коли все інше втрачено?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є література діаспори в першу чергу «мистецтвом для мистецтва» — втечею в естетику від травми, чи це політичний
    акт опору та збереження нації?'
  - 'Дебат 2: Місце в каноні. Чи варто розглядати діаспорну літературу як окремий «канон у каноні», чи її слід інтегрувати
    в загальний потік, ризикуючи втратити унікальність контексту?'
  - '[!epistemic-humility] Не існує єдиної «діаспорної» літератури. Празька школа, МУР, Нью-Йоркська група — це різні світи
    з різними цілями.'
  section: 'Конфліктна карта: Естетика вигнання vs. Політика пам''яті'
  words: 900
- points:
  - Розбір ключових пасажів з тексту, що демонструють сюжетні та структурні інновації.
  - 'Аналіз наративної техніки: як фрагментарність, потік свідомості, ненадійний оповідач відтворюють досвід вигнанця.'
  - 'Система персонажів: герой-вигнанець, конфлікт асиміляції та опору, архетип «втраченого раю».'
  - '[!decolonization] Тексти діаспори як активна протидія імперському міфу про «єдиний народ». Вони створювали альтернативний
    культурний простір, вільний від радянської цензури.'
  section: 'Читання: Аналіз ключових уривків'
  words: 1700
- points:
  - 'Стилістичні інновації: аналіз синтаксису, ритміки, використання неологізмів та архаїзмів для створення унікального художнього
    світу.'
  - 'Робота з мовою: як автори працювали з українською мовою, перебуваючи в іншомовному середовищі? Вплив мов-сусідів та свідома
    пурифікація.'
  - 'Інтертекстуальність: приховані та явні цитати, діалог із світовою та українською літературою як спосіб самоствердження.'
  - '[!myth-buster] Це не просто «тужлива література». Це лабораторія модернізму, де вироблялись нові форми і сенси, недоступні
    в умовах соцреалізму.'
  section: 'Мова і поетика: Модерністська фрагментарність та мова травми'
  words: 1500
- points:
  - 'Повернення до розминки: Як прочитаний текст відповідає на питання про мову як останній бастіон?'
  - 'Рецепція: Як ці твори сприймались в еміграційному середовищі, і як їх читають в сучасній Україні після повернення в канон?'
  - '[!anti-hagiography] Розгляд внутрішніх конфліктів та полеміки всередині самої діаспори, уникнення образу монолітної спільноти.'
  - 'Рефлексія: Що ці тексти говорять нам сьогодні про досвід війни, переміщення та культурну стійкість?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз модерністських текстів, створених в еміграції, та їхній деколонізаційний вимір
