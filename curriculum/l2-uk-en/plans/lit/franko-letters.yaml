objectives:
- Аналізувати епістолярну спадщину Франка як літературний, політичний та особистий феномен.
- Розрізняти та критично оцінювати приватний та публічний дискурси в листуванні.
- Застосовувати методику close reading для стилістичного та риторичного аналізу текстів листів.
- Критично оцінювати процес канонізації автора та його творів, уникаючи агіографічних підходів.
