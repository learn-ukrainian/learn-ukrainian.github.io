content_outline:
- points:
  - 'Провокація: Чи може лист бути зброєю? Гостра цитата з полемічного листа Франка без зазначення адресата.'
  - 'Загадка: «Публічний самотній чоловік». Як людина, що вела найжвавіше листування в Галичині, могла почуватися глибоко
    ізольованою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Приватне vs Публічне. Чи були листи Франка особистою кореспонденцією, чи він одразу писав їх як публічні маніфести
    для нащадків?'
  - 'Дебат 2: Канонізація епістолярію. Чому листи, а не лише вірші та проза, стали невід''ємною частиною канону Франка? Хто
    і коли вирішив, що це «література»?'
  - '[!epistemic-humility] Немає єдиної відповіді. Біографічний підхід бачить у листах ключ до психології автора, а структуралістський
    — самодостатній текст, що працює за своїми законами.'
  section: 'Конфліктна карта: Лист як маніфест і сповідь'
  words: 900
- points:
  - 'Текст 1 (уривки): Листування з Драгомановим. Ідейний розрив "сина" з "батьком". Close reading полеміки про соціалізм,
    національне питання та "нову" Україну.'
  - 'Текст 2 (уривки): Листи до дружини, Ольги Хоружинської. Поєднання інтелектуального партнерства, щоденних турбот та особистої
    трагедії.'
  - '[!decolonization] Через листи Франко формулює ідею модерної, політичної нації, що пориває з москвофільством та провінційним
    народництвом, інтегруючи Україну в європейський контекст.'
  - 'Аналіз наративної стратегії: як Франко конструює образ себе, свого адресата та епохи в кожному листі.'
  section: 'Читання: Листи до Михайла Драгоманова та Ольги Хоружинської'
  words: 1700
- points:
  - 'Стилістичні інновації: Франко як творець української наукової та публіцистичної мови. Боротьба з "язичієм" та архаїзмами.'
  - 'Риторика полеміки: аналіз використання іронії, сарказму, апеляції до логіки та емоційного тиску в листах до опонентів.'
  - 'Лексичне багатство: використання європеїзмів, наукових термінів, діалектизмів та неологізмів для розширення виражальних
    можливостей мови.'
  - '[!myth-buster] Франко не лише "Каменяр". Його епістолярний стиль — це взірець інтелектуальної прози європейського модернізму,
    де синтаксис віддзеркалює складність думки.'
  section: 'Мова і поетика: Полемічний стиль та інтелектуальна проза'
  words: 1500
- points:
  - 'Повернення до розминки: Тож чи може лист змінити історію? Відповідь на основі проаналізованих текстів Франка.'
  - 'Рецепція та вплив: Як приватне листування Франка стало публічним надбанням і вплинуло на наступні покоління українських
    інтелектуалів.'
  - '[!anti-hagiography] "Неприємний" Франко. Як листи розкривають його складний характер, конфліктність та часом несправедливість
    до опонентів? Де межа між генієм і людиною?'
  - 'Сучасна релевантність: Чи є публічні дебати в соцмережах сучасним аналогом епістолярної полеміки Франка? Що змінилося,
    а що лишилося незмінним?'
  section: Дискусія та підсумок
  words: 700
