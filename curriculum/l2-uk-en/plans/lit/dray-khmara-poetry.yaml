content_outline:
- points:
  - 'Провокація: Як сонет про лебедів міг стати смертним вироком для поета? Розглядаємо останні рядки "Лебедів" Драй-Хмари
    як пророцтво і виклик.'
  - 'Без контексту: "О, гроно п''ятірне нездоланих співців, / Крізь бурю й сніг до вас я прагнув, / Та в далині холодній і
    німій / Я, самітний, на крилах не помав". — Хто ці "співці"? Чому герой "самітний"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Неокласики — "вежа зі слонової кістки" чи форма культурного опору? Позиція 1 (офіційна радянська критика): їхня
    "аполітичність" — це буржуазний ескапізм. Позиція 2 (сучасна): їхня орієнтація на західноєвропейську класику була свідомим
    актом деколонізації від російського культурного поля.'
  - 'Дебат 2: "Лебеді" — це алегорія на групу неокласиків чи ширше? Інтерпретація 1 (біографічна): п''ять лебедів — це "гроно
    п''ятірне" (Рильський, Зеров, Филипович, Бургардт і сам Драй-Хмара). Інтерпретація 2 (символістська): це універсальний
    образ поета-вигнанця, що втрачає зв''язок зі своєю традицією.'
  - '[!epistemic-humility] Не існує "правильної" інтерпретації сонета. Кожна епоха, від сталінських репресій до сучасної війни,
    знаходить у ньому свої сенси та коди.'
  section: 'Конфліктна карта: "Чиста поезія" чи політичний маніфест?'
  words: 900
- points:
  - Повний текст сонета "Лебеді" з коментарями до кожного катрена і терцета.
  - 'Структура: Класична сонетна форма як виклик "пролетарському" спрощенню. Чому саме сонет, а не вільний вірш?'
  - 'Образна система: Лебеді, сніг, буря, холод, самотність. Детальний розбір символіки та архетипів.'
  - 'Мотив прощання і загибелі: Як тема смерті та невідворотності долі розвивається від першого до останнього рядка.'
  - '[!decolonization] Драй-Хмара як представник "розстріляного відродження". Його творчість — це доказ існування в Україні
    1920-х років високої модерністської культури європейського рівня, яку Москва цілеспрямовано знищила.'
  section: 'Читання: Сонет "Лебеді"'
  words: 1700
- points:
  - 'Стилістичні інновації: Як Драй-Хмара поєднує "високий" словниковий запас (архаїзми, еллінізми) з точною, майже науковою
    образністю.'
  - 'Робота з античною традицією: Не просто цитати, а переосмислення класичних мотивів у сучасному контексті ("Проростеш,
    травою, любий друже...").'
  - 'Ритм і синтаксис: Аналіз п''ятистопного ямба в "Лебедях". Як довжина речень та інверсії створюють відчуття напруги та
    фатальності.'
  - '[!myth-buster] Міф про те, що неокласики були відірвані від української традиції. Драй-Хмара глибоко знав і використовував
    фольклорні мотиви, але "огранював" їх у довершену класичну форму.'
  section: 'Мова і поетика: Неокласична довершеність'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, як сонет про лебедів став смертельним вироком? Формулювання відповіді з опорою на аналіз
    модуля.'
  - 'Рецепція: Як твір, що майже не друкувався в СРСР, став одним із символів українського спротиву в ХХ столітті?'
  - 'Трагедія покоління: Що втратила українська культура зі смертю Драй-Хмари та його побратимів? Вплив на наступні покоління.'
  - '[!anti-hagiography] Драй-Хмара не був політичним дисидентом. Він був ученим і поетом, який прагнув досконалості. Його
    трагедія — в тому, що тоталітарний режим бачить злочин навіть у "чистому мистецтві".'
  section: Дискусія та підсумок
  words: 700
focus: Поезія Михайла Драй-Хмари, сонет "Лебеді", український неокласицизм, "гроно п'ятірне", Розстріляне відродження, стилістична
  довершеність vs політичний тиск.
level: LIT
module: lit-091
objectives:
- Аналізувати поетику Михайла Драй-Хмари в контексті українського неокласицизму та його європейських відповідників.
- Інтерпретувати сонет "Лебеді" через аналіз його символічної структури, образності та метрики.
- Визначати деколонізаційне значення творчості неокласиків як форми культурного опору радянській асиміляції.
- Формулювати аргументовану позицію в літературній дискусії про "чисте мистецтво" та політичну ангажованість в умовах тоталітаризму.
