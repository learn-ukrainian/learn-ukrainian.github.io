objectives:
- Аналізувати філософські та стилістичні особливості поезії Богдана-Ігоря Антонича на прикладі збірки «Зелена Євангелія»
- Розрізняти та аргументувати різні підходи до інтерпретації творчості поета (пантеїстичний, синкретичний)
- Визначати деколонізаційне значення творчості Антонича як спроби створення автономного українського міфу
- Застосовувати інструменти філологічного аналізу для роботи з поетичним текстом, багатим на неологізми та складну метафорику
