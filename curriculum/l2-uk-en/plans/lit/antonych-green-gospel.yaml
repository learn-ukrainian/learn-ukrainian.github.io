content_outline:
- points:
  - 'Провокація: Чому «Євангелія», якщо замість Христа — сонце, а замість апостолів — трави? Провокаційний заголовок Антонича
    як ключ до його пантеїстичного світогляду.'
  - 'Уривок без контексту: «Антонич був хрущем і жив колись на вишнях, на вишнях дон Жуана» — як розуміти це зізнання?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Зелена Євангелія» — це єресь чи нова теологія? Одні критики бачать тут язичницький культ природи, інші — спробу
    синкретизму, поєднання християнської символіки з архаїчними віруваннями лемків.'
  - 'Дебат 2: Антонич — львівський самітник чи частина великого модерністського руху? Його ізольованість від київських неокласиків
    та «розстріляного відродження» — це свідомий вибір чи трагедія розділеної нації?'
  - '[!epistemic-humility] Немає «правильної» інтерпретації Антонича. Його поезія — це відкрита система, що провокує на діалог,
    а не диктує догму.'
  section: 'Конфліктна карта: Поганин чи християнський містик?'
  words: 900
- points:
  - 'Аналіз структури збірки: три частини як три етапи духовного шляху ліричного героя — від первісного хаосу до космічної
    гармонії.'
  - 'Ключовий образ: «дім» як метафора тіла, природи та Всесвіту. Постійне перетікання мікрокосму в макрокосм.'
  - 'Система персонажів-символів: сонце, місяць, вітер, дощ як активні дійові особи міфологічної драми.'
  - '[!decolonization] Антонич творить автономний український міф, незалежний від імперських культурних кодів. Його «лемківський
    космос» — це свідоме повернення до автохтонних, доколоніальних джерел ідентичності.'
  section: 'Читання: Текст «Зеленої Євангелії»'
  words: 1700
- points:
  - 'Стилістичний аналіз: поєднання авангардної метафори з фольклорною образністю. Як «наймолодший прапрадід» поєднує несумісне?'
  - 'Неологізми та діалектизми: «словотрава», «дзбанять», «крисаня». Антонич не просто використовує народну мову — він її
    творить.'
  - 'Особливості ритміки та синтаксису: довгі, розлогі речення, що імітують плин ріки або ріст рослини. Синтаксис як продовження
    природного циклу.'
  - '[!myth-buster] Антонич — не просто «співець природи». Він її архітектор і теолог. Його поезія — це не пасивне споглядання,
    а активний процес творення світу через слово.'
  section: 'Мова і поетика: Лемківський космос і мова-стихія'
  words: 1500
- points:
  - 'Повернення до розминки: тож чому «Євангелія»? Формулювання відповіді на основі аналізу тексту та його філософських підвалин.'
  - 'Рецепція творчості: як сприймали Антонича в 30-ті, як його «перевідкрили» в 60-ті, і чому він став культовим поетом у
    2000-х?'
  - '[!anti-hagiography] Трагічна доля: рання смерть і десятиліття забуття в радянський час. Як політичний контекст впливає
    на літературну репутацію?'
  - 'Питання для рефлексії: Чи може поезія бути формою релігії? Яке місце Антонича у вашому особистому каноні української
    літератури?'
  section: Дискусія та підсумок
  words: 700
focus: Pantheistic philosophy, mythopoetics, and stylistic innovation in the poetry of Bohdan-Ihor Antonych, focusing on the
  "Green Gospel" collection.
level: LIT
