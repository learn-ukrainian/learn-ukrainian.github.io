content_outline:
- points:
  - 'Провокаційне питання: Де закінчується географія і починається література? Чи може карта бути написана словами, а не лініями?'
  - 'Цитата з есе Андруховича: "Центральна Європа — це не простір, а властивість". Що це означає для української ідентичності?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Постмодерна гра vs. Національна відповідальність. Чи доречна "карнавальна" іронія в літературі нації, що бореться
    за існування? Позиція критиків, що звинувачували Андруховича в "національному нігілізмі".'
  - 'Дебат 2: Елітарність vs. Народність. Чи є есеїстика Андруховича герметичним текстом для вузького кола інтелектуалів,
    чи вона пропонує нову модель української культури, відкритої до світу?'
  - '[!epistemic-humility] Не існує єдиної "правильної" відповіді. Андрухович — одночасно і "космополіт", і творець глибоко
    українських сенсів. Сприйняття залежить від оптики читача.'
  section: 'Конфліктна карта: Гра з каноном чи зрада нації?'
  words: 900
- points:
  - 'Ключовий текст: Розбір уривків з есе "Моя Європа" та "Центрально-Східна ревізія".'
  - 'Аналіз структури: Як автор конструює простір через текст, поєднуючи автобіографію, історію, міфи та анекдоти.'
  - '[!decolonization] Андрухович "повертає" Україну на ментальну мапу Європи не через політичні декларації, а через вписування
    її в єдиний культурний простір, руйнуючи імперський наратив про "окраїну".'
  - 'Система образів: "остання територія", "корабель дурнів", "Галичина" як метафоричний простір.'
  section: 'Читання: Есе як мандрівка'
  words: 1700
- points:
  - 'Стилістичні інновації: довгі, синтаксично складні речення, що імітують потік свідомості; суміш високого та низького стилів;
    гра з мовними кліше.'
  - 'Інтертекстуальність: Як Андрухович веде діалог зі світовою літературою (Бруно Шульц, Данило Кіш, європейські модерністи),
    створюючи "палімпсестний" текст.'
  - '[!myth-buster] Міф про "несерйозність" постмодернізму. Іронія та гра в Андруховича — це не втеча від реальності, а інструмент
    для її глибшого, стереоскопічного осмислення та деконструкції тоталітарних міфів.'
  - 'Оказіоналізми та мовна гра: авторські неологізми як спосіб розширити межі мови.'
  section: 'Мова і поетика: "Карнавальна" проза та іронічна гра'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є Центральна Європа Андруховича реальною географією чи утопічним проектом? Аргументація на
    основі проаналізованих текстів.'
  - 'Рецепція творчості: Як змінювалося сприйняття Андруховича в Україні та за кордоном від 1990-х до сьогодні? Його роль
    як "культурного амбасадора".'
  - '[!anti-hagiography] Критичний погляд: чи не призводить естетизація "старої доброї Австро-Угорщини" до романтизації імперського
    минулого? Де межа між ностальгією та критичною рефлексією?'
  - 'Питання для рефлексії: Яке місце займає ваша власна "ментальна карта" України та Європи? Як тексти Андруховича вплинули
    на неї?'
  section: Дискусія та підсумок
  words: 700
focus: Есеїстика Андруховича як постмодерна картографія Центральної Європи, що досліджує теми ідентичності, пам'яті та "останньої
  території" свободи. Аналіз його іронічної, асоціативної прози.
level: LIT
module: lit-176
objectives:
- Аналізувати есеїстику Андруховича як відповідь на постколоніальні та посттоталітарні виклики кінця ХХ століття
- Ідентифікувати та пояснювати ключові риси постмодерної поетики в текстах: іронію, гру, карнавалізацію, інтертекстуальність
- Критично оцінювати концепт «Центральної Європи» як форму культурного опору та деколонізації ментального простору
- Формулювати власну аргументовану позицію в рамках літературних дебатів навколо творчості автора
