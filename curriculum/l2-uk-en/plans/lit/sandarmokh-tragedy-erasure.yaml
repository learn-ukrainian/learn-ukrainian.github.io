content_outline:
- points:
  - 'Провокація: Чи може список імен бути літературним твором? Як каталог жертв стає маніфестом цілого покоління?'
  - Цитата без контексту з твору одного з розстріляних авторів, що показує європейський, модерний характер його письма.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сандармох — це насамперед історичний мартиролог (список жертв) чи повноцінний літературний феномен, що вимагає
    естетичного аналізу?'
  - 'Дебат 2: Канонізація травми. Як твори, що є свідченням геноциду, входять до канону? Чи затьмарює трагедія їхню художню
    цінність, чи навпаки, підсилює її?'
  - '[!epistemic-humility] Позиція 1: Без історичного контексту трагедії ці тексти втрачають свою силу. Позиція 2: Тексти
    Куліша чи Підмогильного є шедеврами світового модернізму, які самоцінні поза їхньою трагічною біографією.'
  section: 'Конфліктна карта: Документ чи Література?'
  words: 900
- points:
  - Детальний розбір уривків з ключових творів Миколи Куліша, Валер'яна Підмогильного, та інших.
  - Аналіз структури "розстріляного канону" як мозаїки, а не цілісного наративу. Кожен автор як окремий світ, знищений в один
    момент.
  - 'Система персонажів: колективний герой — "знищене покоління". Еволюція від оптимізму 1920-х до передчуття катастрофи.'
  - '[!decolonization] Протиставлення радянському наративу про "буржуазних націоналістів". Показ Розстріляного відродження
    як органічної частини європейського модернізму, насильно відірваної від нього Росією.'
  section: 'Читання: Голоси із Сандармоху'
  words: 1700
- points:
  - 'Стилістичний синкретизм: аналіз поєднання імпресіонізму, експресіонізму, необароко в текстах покоління.'
  - 'Мовні інновації: робота з міською мовою (Підмогильний), створення неологізмів, очищення мови від русизмів.'
  - 'Синтаксис як світогляд: як складна, нервова фраза модерністів відбивала динаміку та трагізм епохи.'
  - '[!myth-buster] Руйнування міфу про "селянську" природу української літератури. Сандармох показує, наскільки урбаністичною,
    інтелектуальною та філософською вона була.'
  section: 'Мова і поетика: Стилістичний вибух 1920-х'
  words: 1500
- points:
  - 'Повернення до розминки: тож як список імен стає літературою? Відповідь студента з аргументами з модуля.'
  - 'Рецепція: як пам''ять про Сандармох змінювалася від тотального замовчування в СРСР до ключового елемента національної
    ідентичності сьогодні.'
  - 'Сучасний контекст: чому читання про Розстріляне відродження є важливим актом опору під час сучасної російсько-української
    війни?'
  - '[!anti-hagiography] Важливо бачити в цих постатях не лише безликих мучеників, а живих людей з їхніми творчими суперечками,
    амбіціями та естетичними розбіжностями.'
  section: Дискусія та підсумок
  words: 700
focus: The Executed Renaissance as a literary phenomenon, the Sandarmokh tragedy as an act of cultural genocide, and the decolonial
  struggle to reclaim the modernist canon.
level: LIT
module: lit-118
objectives:
- Критично аналізувати трагедію Сандармоху як акт культурного геноциду та ключовий епізод у перериванні українського модернізму
- Дослідити стилістичний синкретизм та інновації письменників Розстріляного відродження на прикладі конкретних текстів
- Формулювати аргументовану позицію щодо місця травматичного досвіду в національному літературному каноні
- Розрізняти імперські/радянські наративи про цей період та деколоніальну українську інтерпретацію
pedagogy: CBI
