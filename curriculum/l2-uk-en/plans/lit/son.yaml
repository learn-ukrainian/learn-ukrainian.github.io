content_outline:
- points:
  - 'Провокаційне питання: Як можна було у 1844 році, в умовах абсолютної монархії, написати текст, що призвів до 10-річного
    заслання? Що саме в поемі "Сон" виявилося настільки небезпечним для Російської імперії?'
  - 'Цитата-загадка: "У нас / На свiтi все не так, як треба..." — початок подорожі оповідача. Куди вона його заведе і що він
    побачить?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Шевченко vs Пушкін. Чи є "Сон" прямою полемікою з пушкінським міфом про "доброго царя" та велич імперії, оспіваною
    в "Мідному вершнику"?'
  - 'Дебат 2: Жанрова природа "Сну". Це політичний памфлет, замаскований під літературу, чи це філософська поема-містерія
    в традиціях європейського романтизму?'
  - '[!epistemic-humility] Критики-сучасники бачили у "Сні" лише "пасквіль". Радянське літературознавство — "революційний
    маніфест". Постколоніальна критика — акт культурної деколонізації. Яка з цих оптик найповніше розкриває твір?'
  section: 'Конфліктна карта: Поет проти Імперії'
  words: 900
- points:
  - 'Аналіз тричастинної структури: Україна (реальність) → Сибір (пекло заслання) → Петербург (фальшивий рай / центр імперії).'
  - 'Частина 1: Україна. Образ "раю", сплюндрованого соціальною несправедливістю. Контраст між красою природи та потворністю
    кріпацтва.'
  - 'Частина 2: Сибір. Образ "голого, голого та й голого" засланця з "царською таврою". Колективний образ політичних в''язнів,
    "царя волі".'
  - 'Частина 3: Петербург. Детальний розбір сцени у палаці. "Мордобитіє" як універсальний закон імперського життя. Десакралізація
    постатей царя та цариці.'
  - '[!decolonization] Поема як карта колоніальних травм: викачування ресурсів, примусова асиміляція ("землячок" у Петербурзі),
    фізичне знищення еліт (Сибір).'
  section: 'Читання: Подорож крізь пекло імперії'
  words: 1700
- points:
  - 'Стилістичний фокус: Гротеск та карикатура як головні інструменти сатири. Аналіз сцени перетворення ведмедів-чиновників.
    Образ "пузатого" царя.'
  - 'Прийом "очуднення": погляд на звичні імперські ритуали (бал, парад) очима простої, тверезої людини, що бачить їх абсурдність.'
  - 'Лексичний аналіз: вживання просторіччя, лайливої лексики ("сучий сину") для десакралізації високого імперського стилю.'
  - '[!myth-buster] "Сон" — це не просто критика "поганого царя" Миколи I. Це вирок самій системі самодержавства, де людина
    зводиться до функції, а влада тримається на страху та насильстві.'
  section: 'Мова і поетика: Сміх, що руйнує'
  words: 1500
- points:
  - 'Повернення до розминки: що саме було настільки небезпечним? Не лише образа царя, а й викриття механізмів функціонування
    імперії, її тотальної брехні.'
  - 'Рецепція та наслідки: поема стала одним з головних пунктів звинувачення на суді над Кирило-Мефодіївським братством. Шевченка
    покарали не як поета, а як політичного злочинця.'
  - '[!anti-hagiography] Арешт перетворив Шевченка з талановитого поета на національного мученика та пророка, але водночас
    позбавив його можливості творити на 10 років. Чи варта була ця жертва?'
  - 'Сучасна релевантність: Як мова сатири та гротеску використовується сьогодні для боротьби з сучасними імперськими та авторитарними
    режимами?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз поеми "Сон" як політичної сатири, деконструкція імперських міфів через гротеск та карикатуру, роль твору в арешті
  Шевченка.
level: LIT
module: lit-014
objectives:
- Аналізувати поему "Сон" як складний твір, що поєднує політичну сатиру, філософську притчу та акт культурного спротиву
- Деконструювати імперський міф про "доброго царя" та "велич імперії" засобами гротеску, іронії та карикатури
- Пояснювати, як літературний твір може стати причиною реальних політичних репресій на прикладі арешту Шевченка
- Формулювати власну позицію щодо ролі митця та мистецтва в тоталітарному суспільстві
