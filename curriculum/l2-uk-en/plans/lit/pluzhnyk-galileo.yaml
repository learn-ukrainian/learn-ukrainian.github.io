content_outline:
- points:
  - 'Провокація: Плужник ставить у центр поеми не вирок Галілею, а його внутрішній вибір. Що страшніше: зректися себе чи бути
    знищеним системою, яка не прощає істини?'
  - 'Цитата-загадка: "Ні, істин тимчасових не буває!" — як цей рядок визначає головний конфлікт поеми ще до його початку?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Галілей" Плужника історичною поемою про вченого XVII століття, чи це передусім алегорія долі українського
    інтелектуала в умовах радянського терору 1920-30-х років?'
  - 'Дебат 2: Місце Плужника в каноні. Чи був він "чистим" неокласиком, що сповідував мистецтво для мистецтва, чи його творчість
    — приклад "езопової мови" для вираження політичного протесту?'
  - '[!epistemic-humility] Літературна критика не має остаточних відповідей. Одні бачать у стриманості Плужника аристократизм
    духу, інші — вимушену обережність митця, що працює під наглядом цензури.'
  section: 'Конфліктна карта: Алегорія чи історична драма?'
  words: 900
- points:
  - 'Аналіз ключових сцен: допит Галілея, діалоги з монахами, фінальний монолог. Як через деталі створюється атмосфера тотального
    тиску?'
  - 'Система персонажів: Галілей як уособлення вільної думки, монахи як репрезентанти догматичної системи, кардинал як втілення
    цинічної влади.'
  - 'Наративна структура: відсутність динамічного сюжету, фокус на внутрішньому конфлікті героя. Чому Плужник обирає саме
    таку статичну композицію?'
  - '[!decolonization] Поема — це не просто про боротьбу науки і релігії. Це про опір українського інтелектуала імперському
    тиску з Москви, який вимагав єдиної "правильної" ідеології та знищував будь-який прояв незалежної думки.'
  section: 'Читання: Поема "Галілей"'
  words: 1700
- points:
  - 'Стилістична стриманість: аналіз "скупої" поетики Плужника. Відсутність метафор, епітетів, прикрас. Як досягається максимальна
    виразність мінімальними засобами?'
  - 'Синтаксис як сенс: короткі, уривчасті фрази, роль пауз та замовчувань. Як структура речення відтворює психологічний стан
    героя?'
  - 'Ритм і метр: аналіз віршового розміру поеми. Як класична форма (п''ятистопний ямб) контрастує з трагічним змістом, створюючи
    напругу?'
  - '[!myth-buster] Неокласицизм — це не "холодне" мистецтво. На прикладі Плужника доводимо, що за суворою формою може ховатися
    глибока емоційна та філософська драма.'
  section: 'Мова і поетика: Філософія у формі'
  words: 1500
- points:
  - 'Повернення до розминки: чи дає поема відповідь на питання про ціну істини? Що обирає Галілей Плужника — життя чи безсмертя
    ідеї?'
  - 'Рецепція твору: як поему читали сучасники в УСРР? Як її сприймали в еміграції? Як ми читаємо її сьогодні, після досвіду
    XX століття та в умовах нової війни?'
  - 'Сучасна релевантність: постать вченого чи митця, який говорить правду владі, ризикуючи всім. Наведіть приклади з сучасної
    історії України та світу.'
  section: Дискусія та підсумок
  words: 700
focus: 'Поема Євгена Плужника "Галілей": конфлікт науковця і догми, алегорія тиску на інтелігенцію в УСРР, філософська поезія,
  стриманість і лаконізм неокласицизму, Розстріляне Відродження.'
level: LIT
module: lit-112
objectives:
- Аналізувати поему "Галілей" Євгена Плужника як філософський твір та алегорію долі української інтелігенції.
- Розрізняти історичний та алегоричний плани твору, аргументуючи власну позицію.
- Характеризувати стильові особливості неокласицизму на прикладі поетики Плужника (лаконізм, синтаксична точність, відсутність
  орнаментальності).
- Формулювати критичну оцінку твору в контексті доби Розстріляного Відродження та його актуальності сьогодні.
