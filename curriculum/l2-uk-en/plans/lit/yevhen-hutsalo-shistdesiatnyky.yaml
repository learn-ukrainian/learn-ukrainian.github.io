content_outline:
- points:
  - 'Провокація: Як майстер інтимної, ліричної прози про сільське життя став автором найгострішої діагностики російського
    імперіалізму — концепції «ментальності орди»?'
  - 'Цитата без контексту: «Ординець — це людина, позбавлена національної пам''яті, національної історії, національного сьогодення».
    Хто це: політолог 2022 року чи письменник-лірик 1990-х?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Місце Гуцала в каноні шістдесятників. Він «тихий» прозаїк на тлі гучних поетів (Симоненко, Костенко) чи центральна
    постать, що зберегла «велику» прозу?'
  - 'Дебат 2: Еволюція чи злам? Його перехід від психологічних новел до гострої політичної публіцистики — це природний розвиток
    чи повна зміна творчого методу?'
  - '[!epistemic-humility] Чи не є протиставлення «лірики» та «аналітики» хибним? Можливо, його аналіз «орди» був би неможливий
    без глибокого розуміння людської душі, вихованого на малій прозі.'
  section: 'Конфліктна карта: Тихий лірик чи лютий аналітик?'
  words: 900
- points:
  - 'Уривки з новел зі збірки «Люди серед людей»: аналіз психологізму деталі, «замальовка» як жанр.'
  - 'Читання фрагментів з повісті «Шкільний хліб»: автобіографічний вимір, образ дитинства у війні.'
  - 'Аналіз наративу в повісті «Позичений чоловік»: як селянський простір стає носієм етнічної пам''яті та культурного коду.'
  - '[!decolonization] Традиція Стефаника і Коцюбинського: Гуцало продовжує лінію українського модернізму, зосереджуючись
    на внутрішньому світі українця, на противагу соцреалістичним епопеям про «радянський народ».'
  section: 'Читання: Лірична проза Поділля'
  words: 1700
- points:
  - 'Лексичне багатство: діалектизми Поділля та Вінниччини як засіб характеристики персонажів і створення автентичного світу.'
  - 'Сенсорна проза: аналіз уривків, де запахи, звуки та кольори сільського світу стають ключовими елементами оповіді.'
  - 'Ритміка прози: як синтаксична структура та повтори наближають його тексти до поетичного мовлення.'
  - '[!myth-buster] Гуцало — не просто «співець села». Його публіцистика 1990-х («Ментальність орди») є гострим інтелектуальним
    аналізом імперської свідомості, що випереджає сучасні деколонізаційні теорії.'
  - 'Стилістичний аналіз концепту «ордицтва»: мова як інструмент політичної діагностики.'
  section: 'Мова і поетика: Від сенсорної деталі до ''ментальності орди'''
  words: 1500
- points:
  - 'Повернення до розминки: тож як пов''язані лірична проза та аналіз імперіалізму в творчості Гуцала? Формулювання відповіді
    на основі прочитаного.'
  - 'Рецепція: чому Гуцало залишається «недооціненим класиком»? Чи не затьмарила його гостра публіцистика його ж художню прозу
    в очах критиків?'
  - '[!anti-hagiography] Чи не ідеалізує Гуцало українське село, протиставляючи його «орді»? Аналіз можливих суперечностей.'
  - 'Сучасне значення: наскільки актуальним є поняття «ордицтва» після 24 лютого 2022 року? Вплив ідей Гуцала на сучасний
    український дискурс.'
  section: Дискусія та підсумок
  words: 700
