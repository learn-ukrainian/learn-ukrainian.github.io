activity_hints:
- description: Перевірка розуміння двох ключових дебатів навколо творчості Гуцала. Чия це теза — що він «тихий» шістдесятник
    чи центральна постать?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити пропущені терміни (діалектизм, сенсорна проза, ордицтво, камерний) в уривки з аналітичних текстів
    модуля.
  focus: Мова і поетика Гуцала
  items: 5
  type: fill-in
- description: Прочитайте два короткі уривки — один Гуцала, інший Григора Тютюнника. Порівняйте їхні підходи до зображення
    села та людських стосунків. Що спільного, а що відрізняється в їхньому ліризмі?
  focus: 'Порівняльний аналіз: Гуцало vs. Тютюнник'
  type: note
- description: Напишіть есе на 400-600 слів, де ви проаналізуєте, як концепція «ордицтва» Євгена Гуцала допомагає зрозуміти
    сучасну російсько-українську війну. Наведіть конкретні приклади з новин або соціальних мереж, що ілюструють тези письменника.
  focus: 'Есе: Актуальність «Ментальності орди»'
  type: note
