content_outline:
- points:
  - 'Провокація: Чому проза Косинки, написана 100 років тому про українське село, звучить гостріше за сучасні новини?'
  - 'Цитата-загадка: "Революція — добре, але хліб — лучче". Кому належать ці слова і що вони кажуть про справжні пріоритети
    людини в епоху великих потрясінь?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Косинка — це "співець" селянського опору радянщині чи лише об''єктивний хронікер трагедії, що розгортається?'
  - 'Дебат 2: Експресіонізм чи "жорстокий" реалізм? Критики сперечалися, чи є його стиль художнім прийомом, чи просто точним
    відображенням кривавої реальності.'
  - '[!epistemic-humility] Радянське літературознавство таврувало його як "куркульського письменника". Сучасні критики бачать
    у ньому модерніста європейського рівня. Де істина?'
  section: 'Конфліктна карта: Індивід vs. Епоха'
  words: 900
- points:
  - 'Аналіз новели "В житах": напруга між революційним обов''язком та екзистенційною втомою. Чи можна втекти від історії?'
  - 'Аналіз новели "На золотих богів": конфлікт між батьком-власником і сином-комуністом. Це зіткнення ідеологій чи вічна
    драма поколінь?'
  - '[!decolonization] Косинка показує українського селянина не як темну безсловесну масу (імперський стереотип), а як складного
    індивіда з власною гідністю, мовою та правом на землю і опір.'
  - 'Система персонажів: відсутність "позитивних" героїв. Кожен персонаж — носій власної, часто жорстокої, правди.'
  section: 'Читання: Новели "В житах", "На золотих богів", "Фавст"'
  words: 1700
- points:
  - 'Стилістичні інновації: "фрагментарний" синтаксис, телеграфний стиль, уривчасті діалоги, що передають хаос і напругу епохи.'
  - 'Звукопис і ритміка: аналіз алітерацій та асонансів, що створюють відчуття тривоги, "нервовий" пульс прози.'
  - Використання діалектизмів та живої народної мови не як етнографічний елемент, а як інструмент характеристики персонажа
    та його світогляду.
  - '[!myth-buster] Проза Косинки — не "проста" чи "народна". Це складна, витончена стилістична конструкція, що лише використовує
    народну мову як матеріал для створення модерністського тексту.'
  section: 'Мова і поетика: Експресіонізм і народна мова'
  words: 1500
- points:
  - 'Повернення до розминки: Як проза Косинки, спираючись на події сторічної давнини, допомагає зрозуміти сучасну боротьбу
    України?'
  - 'Рецепція творчості: як змінювалося ставлення до Косинки від 1920-х, через заборону в СРСР, до повернення в канон у 1990-х?'
  - '[!anti-hagiography] Трагічна доля (розстріл у 1934) часто затьмарює аналіз текстів. Наше завдання — побачити Косинку
    не лише як жертву режиму, а і як великого художника слова.'
  - 'Питання для рефлексії: Чи може мистецтво бути "поза політикою" в часи екзистенційної загрози для нації?'
  section: Дискусія та підсумок
  words: 700
focus: 'Експресіоністична новелістика Григорія Косинки: конфлікт індивіда й доби, стилістичні інновації, деколонізаційний
  вимір.'
level: LIT
module: lit-120
objectives:
- Аналізувати новели Григорія Косинки як зразок українського експресіонізму.
- Визначати та інтерпретувати ключові стилістичні риси прози автора (синтаксис, ритміка, мова).
- Формулювати аргументовану позицію щодо деколонізаційного значення творчості Косинки, зокрема його зображення українського
  селянства.
- Критично осмислювати місце Косинки в літературному каноні, враховуючи історію рецепції його творчості.
pedagogy: CBI
