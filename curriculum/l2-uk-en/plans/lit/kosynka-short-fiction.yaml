    а не об'єктивне відображення дійсності
  pos: ч.
  word: експресіонізм
- definition: невеликий за обсягом прозовий епічний твір про незвичайну життєву подію з несподіваним фіналом
  pos: ж.
  word: новела
- definition: розділ граматики, що вивчає способи поєднання слів у словосполучення і речення; у стилістиці — характерна для
    автора побудова речень
  pos: ч.
  word: синтаксис
- definition: слово або вираз, властиві мовленню мешканців певної місцевості, що використовуються в літературі для створення
    колориту
  pos: ч.
  word: діалектизм
- definition: у літературознавстві — процес сприйняття, інтерпретації та оцінки літературного твору читачами та критиками
    в різні епохи
  pos: ж.
  word: рецепція
- definition: сукупність творів, визнаних взірцевими та найважливішими для певної національної літератури чи культури
  pos: ч.
  word: канон
- definition: прадавній, універсальний образ, мотив або символ, що підсвідомо передається з покоління в покоління і лежить
    в основі багатьох міфів, казок та літературних творів
  pos: ч.
  word: архетип
- definition: сукупність текстів та висловлювань на певну тему, що відображає специфічний спосіб мислення та ідеологію певної
    соціальної групи чи епохи
  pos: ч.
  word: дискурс
- definition: тлумачення, роз'яснення, розкриття змісту літературного твору, спроба зрозуміти авторський задум та можливі
