  role: Літературний критик, що розбирає текст «по кісточках», показуючи, ЯК він зроблений, і чому форма тут не менш важлива
    за зміст.
  voice: Expressionist-Sympathizer
phase: LIT.3 Executed Renaissance 1917-1933
