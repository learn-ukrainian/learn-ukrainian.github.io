content_outline:
- points:
  - 'Провокація: "Вся Кайдашева сім''я, до якої пристав і він, почала густи, як вулик, і не було одного, хто б не встряв у
    ту сварку". Чому одна груша здатна підпалити цілу родину?'
  - Чи може побутова дрібниця стати каталізатором справжньої трагедії?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що є першопричиною конфлікту — несправедливий соціально-економічний устрій (проблема землі та власності) чи
    індивідуальна психологія персонажів (невміння жити разом, егоїзм)?'
  - 'Дебат 2: Твір — це сатира на українське пореформене село чи універсальна трагікомедія про одвічні сімейні конфлікти,
    актуальна і сьогодні?'
  - '[!epistemic-humility] Радянське літературознавство наполягало на класовій, соціальній інтерпретації. Сучасні критики
    бачать у повісті позачасову драму людських стосунків.'
  section: 'Конфліктна карта: Соціальне чи психологічне?'
  words: 900
- points:
  - Повний текст епізоду сварки за грушу — аналіз діалогів та авторських ремарок.
  - 'Наративна структура ескалації: від словесної перепалки Мотрі й Мелашки до загальної бійки. Як Нечуй-Левицький майстерно
    нарощує напругу?'
  - 'Персонажі в дії: як ця сцена розкриває характери Карпа, Лавріна, Кайдашихи та інших?'
  - '[!decolonization] "Кайдашева сім''я" як зразок українського реалізму, що розвивався паралельно, а не в тіні російської
    літератури, з унікальним фокусом на мові та побуті.'
  section: 'Читання: Сцена біля груші'
  words: 1700
- points:
  - 'Сміх крізь сльози: як автор використовує мовні засоби для створення подвійного ефекту — гумору та прихованої трагедії?'
  - 'Аналіз мови персонажів: лайка як мистецтво, народна фразеологія, індивідуальні мовні портрети.'
  - 'Стиль Нечуя-Левицького: поєднання етнографічної точності, ліризму в описах природи та їдкої іронії в описі людських стосунків.'
  - '[!myth-buster] Повість — не просто "енциклопедія селянського побуту". Це глибокий аналіз руйнівної сили "звичаєвого права"
    та егоїзму, що знищує родинні зв''язки зсередини.'
  section: 'Мова і поетика: Трагікомічний голос оповідача'
  words: 1500
- points:
  - 'Повернення до розминки: чи є "Кайдашева сім''я" актуальною сьогодні? Чи змінилися сімейні конфлікти за 150 років?'
  - 'Рецепція твору: від популярної комедії до символу "національної несумісності". Чому повість так резонує з українцями?'
  - '[!anti-hagiography] Жоден персонаж не є ідеальним. Автор не стає на чийсь бік, а показує, як усі по черзі бувають і жертвами,
    і катами. У цьому полягає реалізм та психологічна правда твору.'
  - 'Студентська рефлексія: чи змінилося ваше сприйняття твору після детального аналізу його конфліктної структури?'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз структури конфліктів у повісті "Кайдашева сім''я": від побутової дрібниці до трагікомедії'
