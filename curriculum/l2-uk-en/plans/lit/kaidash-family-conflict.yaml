- Проаналізувати центральні конфлікти повісті, розрізняючи їх соціальні та психологічні причини
- Зрозуміти, як Нечуй-Левицький використовує побутові деталі та мову для розвитку сюжету та характеристики персонажів
- Дослідити стилістичні засоби створення трагікомічного ефекту
- Сформулювати власну позицію щодо актуальності твору для сучасності
