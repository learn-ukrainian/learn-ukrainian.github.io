content_outline:
- points:
  - 'Провокаційне питання: Чому в епоху гучних революційних маніфестів найсильнішим голосом міг стати найнай тихіший?'
  - 'Цитата-загадка з поезії Плужника: "Вчись у природи творчого спокою...". Як цей заклик до спокою міг бути радикальним
    актом в 1920-ті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Плужник — «аполітичний» естет чи прихований дисидент? Одні критики (радянські) звинувачували його в буржуазному
    індивідуалізмі. Інші (сучасні) бачать у його мовчанні та філософській заглибленості форму культурного опору.'
  - 'Дебат 2: Місце в каноні Розстріляного Відродження. Плужник — «супутник» Хвильового і Тичини, чи самодостатня величина,
    чия філософська лірика виходить за межі доктрин ВАПЛІТЕ чи «Плугу»?'
  - '[!epistemic-humility] Немає однозначної відповіді, чи була його «тиша» свідомою політичною стратегією, чи органічною
    властивістю таланту. Розглядаємо аргументи обох сторін.'
  section: 'Конфліктна карта: Мистецтво для мистецтва чи тихий опір?'
  words: 900
- points:
  - 'Розширений аналіз ключових поезій: "Для неї — для неї! — так мало горіти...", "Галілей", "Ніч... а човен — як срібний
    птах!.."'
  - 'Наративна структура відсутності: як Плужник створює сенс через недомовки, паузи та лаконізм.'
  - 'Система образів: човен, камінь, дорога, вітер — архетипи, переосмислені в екзистенційному ключі.'
  - '[!decolonization] Плужник творить глибоко європейський модернізм українською мовою, доводячи її здатність до найтонших
    філософських рефлексій, всупереч імперському наративу про «селянську» мову.'
  section: 'Читання: Поезія збірки "Рівновага"'
  words: 1700
- points:
  - 'Стилістичний аналіз: Плужник як майстер «ощадливої» поетики. Відмова від пишних метафор на користь точного, «оголеного»
    слова.'
  - 'Робота з мовою: використання простих, буденних слів у несподіваних філософських контекстах.'
  - 'Ритм і синтаксис: короткі, уривчасті фрази, що передають стан тривоги та екзистенційної втоми. Як синтаксична структура
    стає частиною змісту.'
  - '[!myth-buster] Простота Плужника — не спрощеність. Це результат величезної внутрішньої роботи, відкидання всього зайвого
    задля досягнення максимальної смислової концентрації.'
  section: 'Мова і поетика: Філософський мінімалізм'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, в чому полягав "творчий спокій" Плужника і чому він був такий небезпечний для тоталітарної
    системи?'
  - 'Рецепція творчості: як сприймали Плужника сучасники, і як його читають сьогодні, в епоху нової війни за існування?'
  - 'Сучасна релевантність: чи може поетика Плужника навчити нас гідно проходити через випробування, зберігаючи внутрішню
    стійкість?'
  - '[!anti-hagiography] Важливо не ідеалізувати Плужника як безстрашного борця. Він був живою людиною, що відчувала страх
    і відчай, і його поезія — чесний щоденник цієї внутрішньої боротьби.'
  section: Дискусія та підсумок
  words: 700
focus: The philosophical minimalism of Yevhen Pluzhnyk, his place in the Executed Renaissance, the debate over his 'apolitical'
  stance, and the stylistic innovations of his laconic verse.
level: LIT
module: lit-113
objectives:
- Аналізувати філософську лірику Євгена Плужника в контексті доби Розстріляного відродження
- Розрізняти й аргументувати позиції в літературознавчій дискусії щодо "аполітичності" митця
- Досліджувати стилістичні особливості поетики мінімалізму: лаконізм, точність образу, синтаксис
- Формулювати власну інтерпретацію зв'язку між етикою та естетикою у творчості Плужника
