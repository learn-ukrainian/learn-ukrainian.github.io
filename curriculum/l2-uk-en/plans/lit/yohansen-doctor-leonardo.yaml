content_outline:
- points:
  - 'Провокація: Чи може пригодницький роман бути філософським трактатом? Розглядаємо «Подорож доктора Леонардо» як інтелектуальну
    гру.'
  - 'Цитата-загадка: «Мета моєї подорожі — знайти країну, де я ще не був. Зветься вона — ”Я”.» Як цей епіграф змінює наше
    очікування від тексту?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це авантюрний роман чи його пародійна деконструкція? Аргументи за «серйозне» пригодницьке читання vs. аргументи
    за тотальну іронію.'
  - 'Дебат 2: Місце твору в каноні. Чому радянська критика намагалася «приручити» Йогансена, трактуючи роман як просто «цікаву
    розповідь для молоді»? Як повернення до експериментальної суті твору змінює його місце в історії літератури?'
  - '[!epistemic-humility] Немає єдиної «правильної» інтерпретації. Текст Йогансена — це відкрита структура, що провокує читача
    на співтворчість.'
  section: 'Конфліктна карта: Жанровий експеримент чи пародія?'
  words: 900
- points:
  - 'Детальний розбір ключових епізодів: полювання на тигрів, зустріч з доном Хозе, фінальна дуель — як вони працюють і на
    сюжетному, і на символічному рівні.'
  - 'Система персонажів: Доктор Леонардо як втілення українського інтелектуала-раціоналіста, Джим як уособлення «природної
    людини», Дон Хозе як пародія на колоніального авантюриста.'
  - 'Структура як гра: авторські відступи, псевдо-наукові коментарі, руйнування «четвертої стіни» — як ці прийоми залучають
    читача в інтелектуальну гру?'
  - '[!decolonization] Текст як агентність: український герой не є об''єктом екзотичних пригод, а їхнім суб''єктом і режисером.
    Він переграє і деконструює західні імперські наративи про «дикі землі».'
  section: 'Читання: Подорож у глиб себе'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання наукового, філософського та розмовного стилів. Використання іноземних слів не як прикраси,
    а як елементів гри.'
  - 'Словотворення Йогансена: аналіз авторських неологізмів та оказіоналізмів. Як мова стає інструментом для створення нового,
    унікального світу?'
  - 'Ритм і синтаксис: як уривчасті, динамічні фрази створюють відчуття руху та постійного пошуку, віддзеркалюючи внутрішній
    стан героя.'
  - '[!myth-buster] Це не просто «складна» мова заради складності. Це свідома стратегія, яка доводить, що українська мова
    здатна обслуговувати найвищі рівні інтелектуальної та філософської рефлексії, кидаючи виклик міфу про її «селянський»
    характер.'
  section: 'Мова і поетика: Інтелектуальна гра та мовний експеримент'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, «Подорож доктора Леонардо» — це втеча від реальності чи її глибокий аналіз іншими засобами?'
  - 'Рецепція твору: як його сприймали сучасники в 1920-х і як його читають сьогодні? Що змінилося в нашій оптиці?'
  - 'Вплив на українську літературу: чи можна знайти сліди експериментів Йогансена у сучасних авторів (напр. у Юрія Андруховича)?'
  - '[!anti-hagiography] Уникаючи простого образу «жертви репресій», аналізуємо Йогансена як складну фігуру, що намагалася
    грати у власну гру в умовах тоталітарного тиску, що посилювався.'
  section: Дискусія та підсумок
  words: 700
