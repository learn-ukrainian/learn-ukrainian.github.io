  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити в речення з тексту унікальні слова та вирази, створені Йогансеном (оказіоналізми).
  focus: Стилістичні особливості
  items: 5
  type: fill-in
- description: Проаналізуйте короткий уривок з роману. Які стилістичні, синтаксичні та лексичні прийоми використовує автор
    для створення іронічного ефекту? Наведіть конкретні приклади.
  focus: 'Аналіз уривка: Мова як мистецтво'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: «Як роман Майка Йогансена руйнує імперські стереотипи про українську
    культуру та її героїв?»'
  focus: 'Есе: Деколоніальний вимір «Доктора Леонардо»'
  type: note
