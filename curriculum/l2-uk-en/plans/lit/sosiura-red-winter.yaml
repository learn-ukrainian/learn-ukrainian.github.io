content_outline:
- points:
  - 'Провокація: Чи може червоний прапор і синьо-жовтий стяг існувати в душі одного поета? Уривок з поеми Сосюри, що ставить
    це питання руба.'
  - 'Без контексту: "І синій прапор, мов обрус, згорнувсь над ним і впав до ніг..." — про кого це і що це означає?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Революційний романтизм vs національна туга. Чи є поема щирим гімном "червоній зимі", чи це спроба замаскувати
    трагедію України під маскою дозволеної ідеології?'
  - 'Дебат 2: Канонізація і анафема. Як Сосюра одночасно був офіційним радянським поетом-лауреатом і переслідуваним "буржуазним
    націоналістом"?'
  - '[!epistemic-humility] Позиції критиків: офіційна радянська (пафос революції), діаспорна (трагедія нації), сучасна постколоніальна
    (подвійна свідомість, мімікрія).'
  section: 'Конфліктна карта: Революція чи Нація?'
  words: 900
- points:
  - 'Структура і сюжет: подорож ліричного героя через хаос громадянської війни — від революційної ейфорії до глибокої рефлексії.'
  - 'Система персонажів: ліричний герой, його кохана (уособлення України), колективний образ "мас", вороги.'
  - 'Ключові уривки: аналіз епізодів, що показують зіткнення ідеологій, особисту драму та історичну катастрофу.'
  - '[!decolonization] Текст як свідчення українського виміру революції. Події розгортаються на українській землі, і її доля
    є центральною, на відміну від російсько-центричного наративу.'
  section: 'Читання: Поема "Червона зима"'
  words: 1700
- points:
  - 'Стилістичний синкретизм: поєднання епічної розповіді про масштабні історичні події з інтимною, сповідальною лірикою.'
  - 'Мелодика вірша: використання народнопісенних ритмів, алітерацій та асонансів для створення унікального "сосюринського"
    звучання.'
  - 'Лексика: суміш високого, патетичного стилю, військової термінології та ніжної, пестливої мови.'
  - '[!myth-buster] Сосюра — не лише "соловейко". Це складний поет, який свідомо конструює свою мову для передачі найтонших
    психологічних станів та ідеологічних суперечностей.'
  section: 'Мова і поетика: Ліричний епос Сосюри'
  words: 1500
- points:
  - 'Повернення до розминки: після аналізу, як би ви відповіли на питання про "два прапори" в душі поета?'
  - 'Історія рецепції: як сприймали "Червону зиму" в 1920-х, як її "редагували" в 1950-х, і як ми читаємо її сьогодні?'
  - 'Сучасне значення: що говорить нам поема про вибір, компроміс та ціну виживання митця в умовах війни та ідеологічного
    тиску?'
  - '[!anti-hagiography] Уникаємо ідеалізації: Сосюра як трагічна фігура, що відображає всю складність та суперечливість своєї
    епохи, а не як бронзовий пам''ятник.'
  section: Дискусія та підсумок
  words: 700
focus: The poem "Red Winter" by Volodymyr Sosiura, the conflict between revolutionary romanticism and national identity, and
  the poetics of lyrical epic.
