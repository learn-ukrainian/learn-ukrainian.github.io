objectives:
- Критично аналізувати поему "Червона зима" в історичному та літературному контексті Розстріляного Відродження
- Досліджувати поетику Сосюри, зокрема унікальне поєднання ліричного та епічного начал
- 'Формулювати аргументовану позицію щодо центрального конфлікту твору: революційне проти національного'
- Оцінювати деколонізаційне значення твору як альтернативи російсько-центричному погляду на революційні події в Україні
