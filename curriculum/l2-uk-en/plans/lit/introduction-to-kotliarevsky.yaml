content_outline:
- points:
  - 'Провокація: Як один жарт, написаний для розваги друзів офіцером російської армії, став точкою відліку сучасної української
    літератури і, зрештою, нації?'
  - 'Уривок з листа сучасника Котляревського: "Вся Малороссия сошла с ума по его ''Энеиде''". Чому цей текст викликав такий
    вибуховий ефект?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Енеїда" — це свідомий культурний спротив асиміляції чи просто талановита розвага, позбавлена політичного виміру?'
  - 'Дебат 2: Котляревський — "батько" нової літератури чи "вбивця" високого стилю української барокової традиції? Чи була
    народна мова єдиним шляхом для виживання культури?'
  - '[!epistemic-humility] Позиції критиків: від "випадкового генія" (для когось) до "продуманого стратега" (для інших). Історики
    літератури досі сперечаються про справжні мотиви автора.'
  section: 'Конфліктна карта: Жарт чи маніфест?'
  words: 900
- points:
  - 'Текст: уривки з перших трьох частин "Енеїди". Аналіз перетворення троянців на козаків.'
  - 'Структура: Як сюжет Вергілія наповнюється українським побутом, звичаями, їжею та гумором.'
  - 'Характери: Еней, Дідона, Турн як українські типажі. Що ця трансформація говорить про національний характер?'
  - '[!decolonization] Текст як акт культурної самоідентифікації. В умовах імперії, що заперечувала існування окремого народу,
    зобразити "богів і героїв" українцями — це політичний жест, навіть якщо неусвідомлений.'
  section: 'Читання: "Енеїда" як дзеркало і виклик'
  words: 1700
- points:
  - 'Що таке бурлеск і травестія: аналіз прийомів на конкретних прикладах з "Енеїди".'
  - 'Жива народна мова vs "висока" книжна мова: Котляревський як мовний революціонер, що легітимізував полтавський діалект
    як літературну норму.'
  - 'Роль сміху: Сміх як десакралізація імперських наративів і як спосіб утвердження власної гідності.'
  - '[!myth-buster] "Котляревщина" — це не просто "грубий гумор". Це складна художня система, де поєднуються сатира, лірика,
    іронія та глибокий патріотизм.'
  section: 'Мова і поетика: Феномен "котляревщини"'
  words: 1500
- points:
  - 'Повернення до розминки: тож, жарт чи щось більше? Формулювання власної відповіді на основі аналізу.'
  - 'Особистість в історії: Котляревський — військовий, масон, театральний діяч, просвітник. Як його біографія пояснює його
    творчість?'
  - '[!anti-hagiography] Котляревський був лояльним підданим Російської імперії. Як поєднати цей факт із його роллю "зачинателя"
    національного відродження?'
  - 'Спадщина: Вплив Котляревського на Шевченка та всю подальшу українську літературу.'
  section: Дискусія та підсумок
  words: 700
focus: Іван Котляревський, "Енеїда" як початок нової української літератури, бурлеск і травестія, народна мова, роль особистості
  в культурі
level: LIT
module: lit-001
objectives:
- Аналізувати "Енеїду" як літературний і культурний феномен, що поклав початок новій українській літературі.
- Розрізняти поняття "бурлеск" і "травестія" та ідентифікувати їхні риси в тексті.
- Формулювати аргументовану позицію в дебаті про роль і наміри Котляревського (культурний спротив vs розвага).
- Оцінювати роль живої народної мови як інструменту культурної самоідентифікації та опору асиміляції.
