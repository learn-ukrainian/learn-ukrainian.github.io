objectives:
- Аналізувати екзистенціалістську прозу та поезію Тарнавського, виявляючи риси урбанізму, мінімалізму та абсурдизму
- Пояснювати роль Нью-Йоркської групи як явища, що модернізувало українську літературу та інтегрувало її у світовий контекст
- Аргументувати власну позицію в літературних дебатах щодо мовних експериментів та діалогу з західним модернізмом
- Критично оцінювати деколонізаційний внесок творчості Тарнавського через естетичний розрив із соцреалістичним каноном
