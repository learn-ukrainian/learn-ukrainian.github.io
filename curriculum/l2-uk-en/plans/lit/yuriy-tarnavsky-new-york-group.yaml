activity_hints:
- description: Перевірка розуміння дебатів навколо творчості НЙГ. Чия це теза — прихильників «космополітизму» чи «національного
    коріння»?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Заповніть пропуски термінами з модуля: екзистенціалізм, урбанізм, мінімалізм, конкретна поезія, абсурдизм.'
  focus: Термінологія Тарнавського
  items: 5
  type: fill-in
- description: Порівняйте уривок з «конкретної поезії» Тарнавського та вірш класичної силабо-тонічної системи (напр., Сосюри).
    Проаналізуйте, як по-різному вони використовують мову, ритм та візуальний простір сторінки.
  focus: 'Порівняльний аналіз: Тарнавський vs Традиція'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: «Як естетичний бунт Нью-Йоркської групи проти провінційності та соцреалізму
    став формою культурної деколонізації?»'
  focus: 'Есе: Деколонізація через естетику'
  type: note
