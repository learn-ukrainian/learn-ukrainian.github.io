content_outline:
- points:
  - 'Провокація: Чи може Нью-Йорк бути українським містом? Не в демографічному, а в літературному сенсі. Що станеться з українською
    поезією, якщо її позбавити села, вишиванки і калини?'
  - Уривок з поезії Тарнавського, що показує радикальний розрив з традицією.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Діаспорна література — це «законсервована» мова чи лабораторія для мовних експериментів? Позиція Тарнавського
    та Нью-Йоркської групи.'
  - 'Дебат 2: Вплив англійського синтаксису та мінімалізму — це збагачення української мови чи її «засмічення» та втрата автентичності?'
  - '[!epistemic-humility] Критики розділилися: одні бачать у цьому космополітизм та вихід на світовий рівень, інші — розрив
    з національним корінням.'
  - 'Контрапункт: порівняння мовної стратегії Тарнавського з бароковою пишністю Валерія Шевчука, що творив в Україні в той
    самий час.'
  section: 'Конфліктна карта: Лабораторія чи Заповідник?'
  words: 900
- points:
  - 'Уривки з «Життя в місті»: аналіз урбаністичних мотивів, Нью-Йорк як екзистенційний простір, відчуження та самотність.'
  - 'Фрагменти з «Три бльондинки і смерть»: розбір абсурдистської прози, техніка потоку свідомості, діалог з Кафкою, Сартром
    та Бекетом.'
  - 'Аналіз кінематографічності прози Тарнавського: короткі плани, монтажний стиль, візуальна точність.'
  - '[!decolonization] Розрив із «хуторянством» та соцреалізмом. Тарнавський доводить, що українською мовою можна писати про
    глобальні, універсальні теми, а не лише про село та визвольну боротьбу.'
  section: 'Читання: «Життя в місті» та абсурд «Трьох бльондинок»'
  words: 1700
- points:
  - 'Аналіз «конкретної поезії» та мінімалізму: як менше слів створює більше сенсу. Роль візуальної форми.'
  - '«Англійський» синтаксис: як структура речення з іншої мови стає художнім засобом, створюючи новий ритм та динаміку.'
  - 'Вибір української: чому Тарнавський, який вільно писав англійською, свідомо обирав українську для своїх найважливіших
    творів?'
  - '[!myth-buster] Міф про «чисту» мову діаспори. Тарнавський не консервував мову, а радикально її оновлював, іноді навіть
    «лабораторно заражаючи» іншими структурами, щоб перевірити її на міцність.'
  section: 'Мова і поетика: Мінімалізм, синтаксис, мовчання'
  words: 1500
- points:
  - 'Повернення до розминки: Чи вдалося Тарнавському зробити Нью-Йорк українським містом? Аргументована відповідь студента.'
  - 'Рецепція та спадщина: як творчість Нью-Йоркської групи вплинула на сучасну українську урбаністичну прозу (Жадан, Карпа).'
  - '[!anti-hagiography] Чи не призвів радикальний експерименталізм Тарнавського до елітарності та відриву від ширшого читацького
    загалу? Чи не є естетична позиція групи формою втечі від гострих політичних проблем того часу?'
  - 'Проєктне питання: у чому полягає «деколонізаційний вимір» творчості Тарнавського, якщо він майже не торкався прямої політичної
    критики СРСР?'
  section: Дискусія та підсумок
  words: 700
focus: Екзистенціалізм Юрія Тарнавського, поетика Нью-Йоркської групи, літературний урбанізм, мінімалізм та деколонізація
  української літератури від провінційності.
level: LIT
