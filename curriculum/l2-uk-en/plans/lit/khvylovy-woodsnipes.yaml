objectives:
- Аналізувати ідейно-філософський зміст роману "Вальдшнепи" в контексті літературної дискусії 1925-1928 рр.
- Розрізняти поняття "орнаменталізм" та "вітаїзм" як ключові елементи стилю Миколи Хвильового
- Формулювати власну позицію щодо трагічного вибору героя (і автора) між служінням ідеї та вірністю нації
- Пояснювати деколонізаційне значення гасла "Геть від Москви!" на прикладі аналізу тексту роману
