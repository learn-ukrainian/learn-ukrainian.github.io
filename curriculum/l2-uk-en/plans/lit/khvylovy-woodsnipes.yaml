content_outline:
- points:
  - 'Провокація: Головний герой Дмитро Карамазов — alter ego самого Хвильового, що переживає крах ідеалів комунізму. Чи є
    його самогубство (і самогубство автора) неминучим фіналом?'
  - 'Цитата без контексту: "Революція — це здатність і сила вмерти в огні світової пожежі задля майбутнього... Але не тоді,
    коли ця пожежа — ілюзія".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ідейний конфлікт. ''Вальдшнепи'' — це прощання з комунізмом (позиція критиків) чи спроба знайти ''третій шлях''
    для України між Москвою та Європою (концепція Хвильового)?'
  - 'Дебат 2: Місце в каноні. Чи є цей незавершений роман ''антирадянським''? Як він відображає гасло ''Геть від Москви!''
    і чому його забороняли?'
  - '[!epistemic-humility] Текст не дає остаточних відповідей. Його обірваність натякає на неможливість розв''язання конфлікту
    в тих історичних умовах.'
  section: 'Конфліктна карта: ''Азіятський ренесанс'' чи ''пролетарська культура''?'
  words: 900
- points:
  - 'Система персонажів як система ідей: Дмитро Карамазов (розчарований комуніст), Аглая (Європа, чистота), безіменний чекіст
    (жорстока догма).'
  - 'Аналіз ключових сцен: сповідь Карамазова, його діалоги з Аглаєю, символічна сцена полювання на вальдшнепів.'
  - Сюжет як рух від ілюзії до трагедії. Конфлікт між 'обов'язком' перед партією та 'честю' перед нацією.
  - '[!decolonization] Роман прямо артикулює опір культурній асиміляції. Карамазов, агент Москви, стає ''націоналістом'' —
    це свідомий виклик імперському центру.'
  section: 'Читання: ''Вальдшнепи'' як роман ідей'
  words: 1700
- points:
  - 'Стилістичні інновації: лірична проза, асоціативні потоки, ритмізовані фрагменти, що межують з поезією.'
  - 'Синтаксис як інструмент: уривчасті, нервові речення для передачі внутрішнього сум''яття героя.'
  - 'Лексика: поєднання високого, поетичного стилю з політичною фразеологією епохи, створення унікальної мовної атмосфери.'
  - '[!myth-buster] Хвильовий — не просто ''політик у літературі''. Його орнаментальна проза — це свідома естетична програма,
    спроба створити новий український модерністський стиль, рівний європейському.'
  section: 'Мова і поетика: Орнаменталізм та ''романтичний вітаїзм'''
  words: 1500
- points:
  - 'Повернення до розминки: чому самогубство стає єдиним виходом для героя і автора? Аналіз через призму тексту та біографії.'
  - 'Рецепція твору: знищення другої частини, десятиліття заборони, повернення в канон як символ опору.'
  - '[!anti-hagiography] Хвильовий не був дисидентом із самого початку. Він був палким комуністом, і ''Вальдшнепи'' — це документ
    його болісної особистої та ідеологічної еволюції та краху.'
  - 'Питання для студента: Які паралелі між вибором Хвильового у 1920-х та вибором українських інтелектуалів сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз роману "Вальдшнепи": криза комуністичних ідеалів, націонал-комунізм, стилістичний орнаменталізм, деколоніальний
  вибір'
level: LIT
