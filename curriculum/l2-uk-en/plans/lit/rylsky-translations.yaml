content_outline:
- points:
  - 'Провокація: Чи може переклад бути кращим за оригінал? Питання, що визначало творчий шлях Максима Рильського.'
  - 'Цитата-загадка Рильського: "Добрий перекладач не раб, а суперник". Що означає "змагатися" з Шекспіром?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Точний" vs "Вільний" переклад. Радянська доктрина вимагала "буквальної точності" (часто як інструмент цензури),
    тоді як Рильський обстоював право на творчу адаптацію та відтворення "духу" твору.'
  - 'Дебат 2: Переклад як національне будівництво vs космополітизм. Чи збагачує переклад світової класики національну літературу,
    чи робить її вторинною? Позиція Рильського — це спосіб зробити українську мову мовою світової культури.'
  - '[!epistemic-humility] Немає єдиної "правильної" стратегії перекладу. Вибір між буквалізмом та вільним переказом залежить
    від мети, аудиторії та культурного контексту.'
  section: 'Конфліктна карта: Творчість чи ремесло?'
  words: 900
- points:
  - 'Кейс-стаді 1: Сонети Шекспіра. Порівняльний аналіз оригіналу, перекладу Рильського та більш сучасного, буквального перекладу.
    Аналіз вибору лексики, ритму, синтаксису.'
  - 'Кейс-стаді 2: "Пан Тадеуш" Міцкевича. Як Рильський передає польські історичні реалії та культурний колорит українською
    мовою, створюючи "конгеніальний" текст.'
  - '[!decolonization] Перекладаючи класику напряму, а не через російські посередницькі переклади, Рильський стверджував суб''єктність
    української культури та її прямий зв''язок із європейською традицією, оминаючи імперський центр.'
  section: 'Читання: Переклади Шекспіра та Міцкевича'
  words: 1700
- points:
  - 'Лексична майстерність: Як Рильський балансував між архаїзмами (для історичної атмосфери) та неологізмами (для передачі
    унікальних концептів).'
  - 'Синтаксис як інструмент: Використання інверсій, складних періодів для відтворення синтаксичної структури оригіналу (напр.
    латинських авторів).'
  - 'Фонетична партитура: Відтворення звукопису, алітерацій, асонансів та ритміки оригіналу. Рильський як "композитор" перекладу.'
  - '[!myth-buster] Міф про "неперекладність". Рильський доводив, що будь-який твір світової літератури може і повинен звучати
    українською, і що мовні лакуни — це виклик для творчості, а не перешкода.'
  section: 'Мова і поетика: Ідіостиль перекладача'
  words: 1500
- points:
  - 'Повернення до розминки: Тож Рильський — "суперник" чи "співавтор" Шекспіра? Аргументація на основі аналізу модуля.'
  - 'Рецепція та спадщина: Як перекладацька школа Рильського вплинула на наступні покоління (Лукаш, Кочур). Чи актуальні його
    підходи сьогодні?'
  - '[!anti-hagiography] Тиск системи: Чи завжди Рильському вдавалось зберегти творчу свободу? Аналіз можливих компромісів
    у перекладах радянського періоду.'
  - 'Сучасний контекст: Роль перекладу в умовах війни та культурного спротиву. Чи змінилась функція перекладача з часів Рильського?'
  section: Дискусія та підсумок
  words: 700
focus: The art and philosophy of literary translation in Maksym Rylsky's work, exploring translation as a decolonizing act,
  a form of cultural creation, and a dialogue between eras.
level: LIT
module: lit-087
objectives:
- Критично аналізувати різні стратегії художнього перекладу ("точний" vs "вільний") на прикладі творчості Максима Рильського
- Порівнювати оригінальний текст із його перекладом, оцінюючи лексичні, синтаксичні та фонетичні рішення перекладача
- Розуміти деколонізаційне значення перекладацької діяльності як акту культурного самоствердження
- Формулювати власну позицію щодо ролі перекладача як творця, співавтора та культурного посередника
