content_outline:
- points:
  - 'Провокація: Чому головний герой української літератури 1920-х — це не селянин із плугом, а невротичний інтелігент у місті?
    Що сталося з «народом»?'
  - 'Цитата без контексту: «Але однаково: краще бути зґвалтованою, ніж забутою». Як цей рядок Підмогильного визначає долю
    українського модернізму?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Підмогильний — «європейський» екзистенціаліст на українському ґрунті чи продовжувач традиції української психологічної
    прози (Коцюбинський, Винниченко)?'
  - 'Дебат 2: Чи є його «аполітичність» та фокус на внутрішньому світі особистості формою пасивного спротиву радянському колективізму,
    чи втечею від соціальної відповідальності?'
  - '[!epistemic-humility] Критики з ВАПЛІТЕ звинувачували його в «дрібнобуржуазному індивідуалізмі», тоді як сучасні дослідники
    бачать у цьому гуманістичний універсалізм.'
  section: 'Конфліктна карта: Індивід проти колективу'
  words: 900
- points:
  - Повний текст оповідання з коментарями, фокус на динаміці стосунків між персонажами в умовах межової ситуації.
  - 'Аналіз структури: як замкнений простір бараку стає моделлю суспільства та людської душі.'
  - 'Система персонажів: професор, спекулянтка, студент — зіткнення різних світоглядів та стратегій виживання.'
  - '[!decolonization] Підмогильний показує, що українська людина — це не лише носій національної ідеї, а складна особистість
    із універсальними проблемами буття, смерті та любові. Він виводить українську літературу з етнографічних рамок.'
  section: 'Читання: Оповідання «В епідемічному бараці»'
  words: 1700
- points:
  - 'Стилістичний аналіз: використання неповних речень, «нервового» синтаксису для передачі внутрішнього стану героя.'
  - 'Лексика маргінальності: аналіз слів, що позначають стани відчуження, тривоги, самотності (нудьга, байдужість, абсурд).'
  - 'Роль деталі: як предмети та запахи (йод, бруд) стають психологічними маркерами та символами.'
  - '[!myth-buster] Підмогильний — не просто «співець міста». Він деміфологізує урбаністичний простір, показуючи його не як
    місце прогресу, а як арену екзистенційної драми.'
  section: 'Мова і поетика: Імпресіоністичний синтаксис та екзистенційна лексика'
  words: 1500
- points:
  - 'Повернення до розминки: чим є місто для героя Підмогильного — свободою чи в''язницею?'
  - 'Рецепція: як змінювалось ставлення до Підмогильного — від заборони в СРСР до канонізації в незалежній Україні?'
  - '[!anti-hagiography] Не ідеалізуючи «Розстріляне відродження», як ми можемо оцінити внутрішні конфлікти та ідеологічні
    суперечки всередині покоління 1920-х?'
  - 'Питання для рефлексії: чи актуальні сьогодні екзистенційні проблеми, які Підмогильний підняв століття тому?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз малої прози Валер'яна Підмогильного, зокрема психологічного реалізму, екзистенційних мотивів та зображення міського
  простору в українському модернізмі 1920-х.
level: LIT
