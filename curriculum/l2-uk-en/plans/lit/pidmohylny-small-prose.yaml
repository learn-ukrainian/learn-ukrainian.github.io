objectives:
- Аналізувати малу прозу Підмогильного в контексті урбаністичних та психологічних пошуків українського модернізму
- Визначати ключові риси імпресіоністичної та екзистенційної поетики в текстах, аналізуючи синтаксис та лексику
- Формулювати аргументовану позицію щодо ключових літературних дебатів навколо творчості Підмогильного
- Критично оцінювати опір Підмогильного радянській культурній політиці та його роль у становленні модерної української ідентичності
