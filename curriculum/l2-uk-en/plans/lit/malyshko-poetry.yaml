content_outline:
- points:
  - 'Провокація: "Рідна мати моя, ти ночей не доспала..." — Чому ці рядки знає вся країна, часто навіть не згадуючи автора?
    Як вірш переростає свого творця і стає частиною національного коду?'
  - 'Загадка: Як поезія, що отримала Сталінську премію, могла стати символом тихого опору радянській деперсоналізації?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Щирий лірик чи радянський функціонер? З одного боку — прониклива, особиста лірика. З іншого — депутат, полковник,
    багаторазовий лауреат державних премій СРСР. Чи це дві різні людини, чи одна складна особистість?'
  - 'Дебат 2: Народність — автентичність чи стилізація? Його фольклорні мотиви — це органічне продовження традиції, вкорінене
    в дитинстві, чи майстерно розрахований прийом, що гарантував популярність?'
  - '[!anti-hagiography] Розгляд не лише "Пісні про рушник", а й офіціозних радянських віршів Малишка для створення повного,
    нелакованого портрету.'
  - '[!epistemic-humility] Не існує єдиної відповіді на питання про компроміси митця. Завдання — зрозуміти логіку обох сторін
    дискусії.'
  section: 'Конфліктна карта: Поет і влада'
  words: 900
- points:
  - Повний текст вірша з коментарями. Детальний аналіз кожної строфи.
  - 'Символічна система: рушник, мати, дорога, зелені луги, сорочка. Як ці архетипи української культури сплітаються в єдине
    полотно.'
  - 'Наративна структура: це не просто спогад, а ритуал прощання і благословення. Рушник як оберіг і як карта життєвого шляху.'
  - '[!decolonization] На противагу радянському культу безособової "батьківщини" (Родина-мать), Малишко повертає в центр Всесвіту
    конкретну, рідну матір. Це акт тихої культурної ре-централізації.'
  section: 'Читання: "Пісня про рушник"'
  words: 1700
- points:
  - 'Секрет музичності: аналіз звукопису, алітерацій, асонансів та внутрішніх рим. Чому вірші Малишка — це готові пісні?'
  - 'Лексика "простоти": використання загальновживаних слів, народної лексики, пестливих форм (оченята, стежина). Як поет
    досягає глибини через навмисне спрощення.'
  - 'Синтаксис емоцій: короткі речення, інверсії, повтори як спосіб передати щире, безпосереднє почуття.'
  - '[!myth-buster] Позірна простота Малишка — це не примітивізм, а вища форма майстерності. Це свідомий вибір на користь
    ясності та емоційної щирості, що контрастував із мертвонародженою мовою радянського офіціозу.'
  section: 'Мова і поетика: Мелодика слова'
  words: 1500
- points:
  - 'Повернення до розминки: тож як вірш стає "народним"? Формулювання гіпотези на основі аналізу "Пісні про рушник".'
  - 'Рецепція твору: як змінювалося сприйняття Малишка від 50-х років до сьогодення? Чому одні вірші живуть, а інші (написані
    на догоду владі) забуті?'
  - 'Спадщина: у чому актуальність Малишка сьогодні? Чи можливий такий тип "тихої лірики" в епоху гучних інформаційних воєн?'
  - 'Пропозиція для роздумів: чи можна вважати творчість Малишка формою ескапізму? Чи, навпаки, це була єдино можлива форма
    збереження національної ідентичності в умовах несвободи?'
  section: Дискусія та підсумок
  words: 700
focus: Close reading of Malyshko's iconic poems like "Пісня про рушник", analysis of their unique musicality and folkloric
  symbolism, and a critical examination of the poet's complex role as both a beloved lyricist and a Soviet-era laureate.
level: LIT
module: lit-147
objectives:
- Аналізувати поезію Андрія Малишка в історичному та культурному контексті радянської України
- Визначати ключові риси поетики Малишка: мелодику, фольклоризм, символізм
- Здійснювати детальний філологічний аналіз ключових текстів, зокрема «Пісні про рушник»
- Критично оцінювати складну роль митця в тоталітарній системі, розрізняючи конформізм і форми культурного опору
