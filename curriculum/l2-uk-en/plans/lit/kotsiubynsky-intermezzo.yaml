content_outline:
- points:
  - 'Провокація: Що спільного між творчим вигоранням і культом сонця? «Intermezzo» як сповідь втомленого митця.'
  - 'Фрагмент без контексту: «Я утомився. Мене втомили люди» — як цей настрій перетворюється на гімн природі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Intermezzo» — це втеча від суспільства чи форма служіння йому? Ескапізм vs відповідальність митця.'
  - 'Дебат 2: Це твір про кризу одного інтелігента чи алегорія кризи цілого покоління української інтелігенції після революції
    1905 року?'
  - '[!epistemic-humility] Радянське літературознавство наполягало на соціальному аспекті. Модерністська критика бачить у
    новелі універсальну драму митця.'
  section: 'Конфліктна карта: Психологізм чи політика?'
  words: 900
- points:
  - 'Розбір ключових уривків: Сповідь ліричного героя, опис Кононівських полів, діалог із «дійовими особами» природи.'
  - 'Система алегоричних образів: «Залізна рука города» (імперський центр, репресії), «Ниви у червні» (життєва сила нації),
    «Сонце» (джерело енергії і натхнення).'
  - 'Наративна структура як потік свідомості: відмова від традиційного сюжету на користь фіксації вражень, думок, звуків і
    кольорів.'
  - '[!decolonization] «Intermezzo» як відповідь на імперський дискурс, що відмовляв українській культурі у власному голосі
    та європейськості. Коцюбинський доводить, що українська література може говорити мовою найновіших мистецьких течій.'
  section: 'Читання: Поезія в прозі «Intermezzo»'
  words: 1700
- points:
  - 'Стилістичні інновації: Коцюбинський як батько українського імпресіонізму в прозі. Аналіз синестезії (кольоровий слух,
    звуковий запах).'
  - 'Лексичне багатство: використання народної лексики, неологізмів, складних епітетів для створення унікальної атмосфери.'
  - 'Музичність і ритміка: Алітерації, асонанси, ритмізовані синтаксичні конструкції, що перетворюють прозу на поезію.'
  - '[!myth-buster] Це не просто «пейзажна проза». Кожний опис природи є частиною психологічної драми, де пейзаж стає дзеркалом
    душі героя.'
  section: 'Мова і поетика: Синестезія та музичність прози'
  words: 1500
- points:
  - 'Повернення до розминки: Тож, «Intermezzo» — це гімн сонцю чи реквієм по втомленій душі? Формулювання власної позиції.'
  - 'Рецепція твору: як «Intermezzo» читали сучасники і як читаємо ми? Вплив на «Розстріляне відродження» (Хвильовий, Семенко).'
  - 'Сучасне прочитання: чи актуальна сьогодні тема творчого вигорання та пошуку «свого» місця в суспільстві, що воює?'
  - '[!anti-hagiography] Поза образом «сонцепоклонника»: Коцюбинський як громадський діяч, політик, батько родини — складність
    реальної постаті за текстом.'
  section: Дискусія та підсумок
  words: 700
focus: Impressionistic prose of Mykhailo Kotsiubynsky's 'Intermezzo', analyzing its psychological depth, stylistic innovation
  (synesthesia, musicality), and its role as a political allegory of the artist's engagement with society.
level: LIT
module: lit-065
objectives:
- Аналізувати новелу «Intermezzo» як зразок українського імпресіонізму, розрізняючи психологічний та політичний плани твору.
- Розпізнавати та інтерпретувати ключові стилістичні прийоми Коцюбинського (синестезія, алегорія, потік свідомості).
- Формулювати аргументовану позицію щодо місця твору в літературному каноні та його актуальності сьогодні.
- Критично оцінювати різні інтерпретації твору (радянську, модерністську, постколоніальну).
