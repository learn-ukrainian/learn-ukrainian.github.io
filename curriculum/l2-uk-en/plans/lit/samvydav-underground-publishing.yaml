content_outline:
- points:
  - 'Провокація: Чи міг український самвидав існувати без КДБ? Парадоксальна роль репресій у формуванні канону та героїчного
    образу автора.'
  - 'Цитата без контексту з вірша Василя Стуса: «Народе мій, до тебе я ще верну, і в смерті обернуся до життя». Про що це
    насправді: пророцтво, виклик, молитва?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Самвидав — це політичний акт чи високе мистецтво? Дискусія між тими, хто бачить у ньому перш за все "літературу
    факту" та опору, і тими, хто аналізує його естетичні інновації.'
  - 'Дебат 2: Самвидав був "тіньовим каноном" чи маргінальним явищем? Як твори самвидаву увійшли (або не увійшли) до офіційного
    канону після 1991 року.'
  - '[!epistemic-humility] Немає єдиної відповіді; самвидав був і тим, і іншим. Його оцінка залежить від оптики дослідника
    (історик, літературознавець, політолог).'
  section: 'Конфліктна карта: Мистецтво чи політика?'
  words: 900
- points:
  - 'Close reading уривків з ключових текстів: "Інтернаціоналізм чи русифікація?" Дзюби, поезія Стуса, "Український вісник"
    Чорновола.'
  - 'Аналіз "езопової мови": як символіка, алегорії, історичні паралелі та підтексти дозволяли говорити правду в умовах тотального
    контролю.'
  - 'Система персонажів у текстах опору: автор як пророк, читач як спільник, "внутрішній цензор" як антагоніст, інакодумець
    як трагічний герой.'
  - '[!decolonization] Самвидав як акт повернення суб''єктності. Це не просто "антирадянська література", а свідоме продовження
    забороненої української літературної традиції (Розстріляне відродження, неокласики).'
  section: 'Читання: Анатомія підпільного тексту'
  words: 1700
- points:
  - 'Стилістичні інновації, народжені з обмежень: лаконізм, фрагментарність, колажність, "шифрування" сенсів.'
  - 'Мова як територія свободи: повернення заборонених слів (літера "ґ"), очищення від канцеляризмів та русизмів, творення
    нео-архаїзмів (Стус).'
  - 'Ритм і синтаксис як семантичне навантаження: уривчасті, задихані фрази в табірній поезії; складний, бароковий синтаксис
    філософських есе.'
  - '[!myth-buster] Руйнування міфу, що самвидав — це лише "антирадянська агітка". Показ його складної філософської глибини,
    екзистенційних тем та високої поетичної якості.'
  section: 'Мова і поетика: Мова опору'
  words: 1500
- points:
  - 'Повернення до провокації: яку роль зіграли репресії та КДБ у канонізації авторів самвидаву? Чи не затьмарив "героїчний"
    біографічний наратив власне літературну оцінку?'
  - 'Рецепція: як змінилося сприйняття цих текстів? Від забороненого плоду (до 1991), до обов''язкової шкільної програми (90-ті),
    до нового переосмислення в умовах сучасної війни.'
  - 'Сучасна релевантність: чи існує "самвидав" у цифрову епоху? Блоги, телеграм-канали, воєнна поезія в соцмережах як нові
    форми непідцензурної думки.'
  - '[!anti-hagiography] Критичний погляд на ідеалізацію "шістдесятників" та авторів самвидаву. Внутрішні конфлікти, компроміси,
    трагедія "зламаних" талантів.'
  section: Дискусія та підсумок
  words: 700
focus: The phenomenon of samvydav in late Soviet Ukraine, its role in resisting assimilation, stylistic innovations born from
  necessity, and its decolonizing impact on the literary canon
level: LIT
module: lit-162
objectives:
- Аналізувати феномен самвидаву як форму культурного опору в контексті пізнього СРСР
- Визначати стилістичні та поетичні особливості текстів самвидаву, зумовлені політичним тиском
- Оцінювати деколонізаційний внесок самвидаву в утвердження української літературної та національної ідентичності
- Дискутувати про роль самвидаву у формуванні сучасного українського літературного канону
