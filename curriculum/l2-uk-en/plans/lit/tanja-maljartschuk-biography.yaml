content_outline:
- points:
  - 'Провокативне питання: Чи можна "виправити" історію, розказавши її заново? І що, якщо для цього доведеться вигадати нову
    мову?'
  - 'Цитата з тексту Малярчук (без розкриття джерела): "Слова, як і люди, мають біографії, і деякі з них — трагічні."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Документ vs. Фікція. Творчість Малярчук — це історичне дослідження, оброблене в художню прозу, чи це fundamentally
    художній світ, що лише використовує історичні елементи?'
  - 'Дебат 2: Канон і сучасність. Чи є премії (BBC, Шевченківська) ознакою автоматичного входження в канон, чи це лише тимчасове
    визнання? Як сучасний автор бореться за місце в історії літератури?'
  - '[!epistemic-humility] Критики досі сперечаються, чи є "Забуття" романом про історію, чи романом про неможливість написати
    роман про історію.'
  section: 'Конфліктна карта: Пам''ять як поле битви'
  words: 900
- points:
  - 'Аналіз ключових уривків: знайомство з головною героїнею, її бунт проти "нормального" життя та мови.'
  - 'Система персонажів: звичайні люди як носії екзистенційних проблем. Відсутність чітких антагоністів.'
  - 'Сюжетна структура: фрагментарність, нелінійність як віддзеркалення роздробленої пам''яті та ідентичності.'
  - '[!decolonization] Текст як відмова від "великих наративів" (імперських, радянських) та пошук власної, особистої історії.
    Агентність героїні — в її здатності відкинути нав''язані ролі.'
  section: 'Читання: "Біографія випадкового чуда"'
  words: 1700
- points:
  - 'Стилістичні особливості: поєднання високого інтелектуального стилю з розмовною, "низькою" лексикою.'
  - 'Авторські неологізми та оказіоналізми: спроба створити мову, що може описати невимовний досвід.'
  - 'Синтаксис: довгі, складні речення як спроба втримати плин свідомості, короткі — як фіксація травматичного моменту.'
  - '[!myth-buster] Поширений міф, що Малярчук пише "просту" і "зрозумілу" прозу. Насправді її тексти вимагають активної інтелектуальної
    співпраці читача, деконструюючи саму ідею "простого" оповідання.'
  section: 'Мова і поетика: Мова як діагноз і терапія'
  words: 1500
- points:
  - 'Повернення до розминки: Як прочитані тексти відповідають на питання про виправлення історії через мову?'
  - 'Рецепція творчості: як критика та читачі в Україні та за кордоном (Австрія, Німеччина) інтерпретують її тексти?'
  - '[!anti-hagiography] Уникаючи ідеалізації: аналіз критичних відгуків, що закидають авторці надмірний песимізм або інтелектуальну
    відстороненість.'
  - 'Сучасне значення: чому тексти Малярчук про забуття та пошук ідентичності стали особливо актуальними після 2014 та 2022
    років?'
  - 'Рефлексія для студента: Який епізод з вашої родинної чи національної історії ви б хотіли "переписати", і якою мовою ви
    б це зробили?'
  section: Дискусія та підсумок
  words: 700
focus: Літературний аналіз прози Тані Малярчук, зокрема роману "Біографія випадкового чуда", через призму студій пам'яті,
  постколоніальної критики та мовної саморефлексії.
