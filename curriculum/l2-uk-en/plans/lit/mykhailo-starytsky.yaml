content_outline:
- points:
  - 'Провокація: Чи був Старицький просто вправним перекладачем європейських сюжетів для української сцени, чи він створив
    нову мову для українського театру з нуля?'
  - Цитата з його п'єси, що ілюструє яскравий народний гумор або гострий соціальний коментар.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Драматург vs. Мовотворець. Що є головним внеском Старицького — його п''єси чи та мовна основа, яку він створив
    для українського театру, адаптуючи, перекладаючи та винаходячи?'
  - 'Дебат 2: Популярне мистецтво vs. Літературний канон. Чи були його п''єси (напр. "За двома зайцями") лише розвагою для
    широких мас, чи вони є повноцінними зразками високого мистецтва?'
  - '[!epistemic-humility] Критики-сучасники часто дорікали Старицькому за "етнографізм", тоді як пізніші покоління побачили
    в цьому свідому культурну стратегію.'
  section: 'Конфліктна карта: Театр для народу чи високе мистецтво?'
  words: 900
- points:
  - 'Аналіз ключових сцен: монолог Голохвастова як приклад мовного суржику та фальшивої "освіченості".'
  - 'Система персонажів: Проня Прокопівна та Свирид Голохвастов як продукти колоніального суспільства, що прагнуть асиміляції.'
  - 'Структура конфлікту: не просто любовний трикутник, а зіткнення соціальних амбіцій, міщанства та культурної мімікрії.'
  - '[!decolonization] П''єса не лише висміює міщанські звичаї, а й ставить діагноз суспільству, що втрачає своє коріння в
    гонитві за імперською модою. Це акт культурного опору через сатиру.'
  section: 'Читання: "За двома зайцями" — комедія характерів чи соціальна сатира?'
  words: 1700
- points:
  - 'Стилістичні інновації: введення в літературну мову лексики з різних діалектів, створення театральних неологізмів.'
  - 'Робота з мовним суржиком: Старицький не просто фіксує суржик, а використовує його як художній засіб для характеристики
    персонажів.'
  - 'Синтаксис та ритміка: як структура реплік та діалогів створює динаміку вистави та відображає соціальний статус персонажів.'
  - '[!myth-buster] Міф про те, що Старицький "просто перекладав" російські п''єси. Насправді він здійснював глибоку культурну
    адаптацію, створюючи самостійні українські твори.'
  section: 'Мова і поетика: Мовотворення для сцени'
  words: 1500
- points:
  - 'Повернення до розминки: то ким був Старицький — перекладачем чи творцем? Формулювання відповіді на основі аналізу.'
  - '[!anti-hagiography] Як популярність "За двома зайцями" затьмарила інші, можливо, глибші та трагічніші твори автора? Чи
    справедлива така рецепція?'
  - 'Рецепція творчості: як сприймали театр Старицького в XIX ст. і як його читають сьогодні? Чи змінилися акценти?'
  - 'Питання для студента: Які паралелі між культурною мімікрією героїв Старицького та сучасними суспільними явищами в Україні
    ви можете провести?'
  section: Дискусія та підсумок
  words: 700
focus: The theatrical work of Mykhailo Starytsky, his role in creating the Ukrainian theatrical language, the debate between
  his popular and high-art works, and the decolonial dimension of his theater.
level: LIT
module: lit-039
objectives:
- Критично аналізувати драматургію Михайла Старицького в контексті культурних та політичних умов XIX століття
- Досліджувати внесок Старицького у формування української театральної мови та його стилістичні інновації
- Оцінювати деколонізаційну роль його театру як інструменту опору культурній асиміляції та утвердження національної ідентичності
- Розрізняти поняття "популярна культура" та "високе мистецтво" на прикладі рецепції творів Старицького
