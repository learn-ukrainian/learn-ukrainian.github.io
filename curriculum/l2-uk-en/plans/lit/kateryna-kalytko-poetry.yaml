content_outline:
- points:
  - 'Провокація: «Просто не вистачає слів». Чи може поезія адекватно говорити про війну, коли звичайна мова безсила?'
  - 'Уривок без контексту: кілька рядків Калитко про тіло, пам''ять або біль, що провокують на інтерпретацію.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Поезія-свідчення vs. поезія-мистецтво. Чи маємо ми право оцінювати вірші про війну за естетичними критеріями,
    чи їхня основна цінність — документальна?'
  - 'Дебат 2: Калитко — «воєнна поетка» чи універсальна авторка? Дискусія про ризики канонізації через одну, хоч і ключову,
    тему.'
  - '[!epistemic-humility] Немає єдиної «правильної» оптики. Критики-документалісти шукають точність, критики-формалісти —
    мовну досконалість. Обидва підходи валідні.'
  section: 'Конфліктна карта: Свідчення чи мистецтво?'
  words: 900
- points:
  - 'Ключові тексти зі збірки: аналіз віршів, що розкривають теми жіночого досвіду війни, травми, мовчання та говоріння.'
  - 'Система образів: тіло як карта пам''яті, земля як свідок, вода як стихія забуття і очищення.'
  - 'Наративна арка збірки: від особистого болю до колективного спротиву.'
  - '[!decolonization] Тіло жінки як остання колонія. Калитко повертає українській жінці суб''єктність, відбираючи її в імперського
    наративу, що бачить її лише жертвою.'
  section: 'Читання: Орден мовчальниць'
  words: 1700
- points:
  - 'Стилістичний аналіз: поєднання високого стилю з брутальною, «фізіологічною» лексикою. Як це працює?'
  - 'Неологізми та оказіоналізми: створення нової мови для опису безпрецедентного досвіду.'
  - 'Синтаксис травми: рвані речення, переноси, паузи як відтворення стану свідомості в екстремальних умовах.'
  - '[!myth-buster] Це не «журналістика у віршах». Поезія Калитко — це складна мовна конструкція, де кожен звук і перенос
    мають значення, а не просто римований репортаж.'
  section: 'Мова і поетика: Анатомія болю'
  words: 1500
- points:
  - 'Повернення до розминки: Чи знайшла Калитко «слова», яких бракує? Аргументована відповідь на основі аналізу.'
  - 'Рецепція творчості: як сприймають поезію Калитко в Україні та за кордоном? Чи є різниця в інтерпретаціях?'
  - 'Етика та естетика: чи є межа, за якою естетизація страждання стає проблематичною? Дискусія на основі текстів.'
  - '[!anti-hagiography] Постановка питання: чи не створюємо ми новий канон «святих страждальців», і які ризики це несе для
    живого літературного процесу?'
  section: Дискусія та підсумок
  words: 700
focus: 'Kateryna Kalytko''s poetry: war, trauma, and memory; the decolonization of the body; language as an act of resistance;
  stylistic innovation in contemporary Ukrainian verse.'
level: LIT
module: lit-204
objectives:
- Аналізувати поетичні тексти Катерини Калитко на рівні стилістики, образності та синтаксису
- Критично оцінювати роль поезії як форми свідчення та акту спротиву
- Брати участь у дискусії про місце «воєнної» літератури в національному каноні
- Формулювати власну позицію щодо етичних аспектів естетизації травматичного досвіду
