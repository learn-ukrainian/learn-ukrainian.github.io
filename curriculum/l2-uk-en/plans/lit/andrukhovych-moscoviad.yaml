content_outline:
- points:
  - 'Провокація: "Імперії не розвалюються — вони згнивають зсередини". Промовистий фрагмент з роману про тілесний, фізіологічний
    розпад Москви як центру імперії.'
  - 'Запитання без відповіді: Чи можна вбити імперію, просто описавши її агонію?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: ''Московіада'' — це карнавальна гра з імперськими символами чи серйозна антиколоніальна сатира? Позиція ''мистецтво
    заради мистецтва'' vs позиція ''література як зброя''.'
  - 'Дебат 2: Місце ''Московіади'' в каноні. Чи це твір лише для свого часу (поч. 90-х), чи він набуває нового значення після
    кожної фази російської агресії?'
  - '[!epistemic-humility] Критики досі сперечаються: головний герой Отто фон Ф. — це автобіографічний персонаж чи літературна
    маска, доведена до абсурду?'
  section: 'Конфліктна карта: Постмодерна гра чи політичний маніфест?'
  words: 900
- points:
  - 'Розбір ключових уривків: бенкет в КДБ, блукання підземною Москвою, фінальна втеча. Аналіз сюжету як подорожі Данте через
    пекло імперії.'
  - 'Система персонажів: Отто фон Ф. як український Гамлет на руїнах імперії. Сатана, Галя, цар-велетень — хто вони: реальні
    люди чи архетипічні маски?'
  - '[!decolonization] Текст як акт культурного опору: український поет перетворює столицю метрополії на grotesque spectacle,
    позбавляючи її величі та сакральності.'
  - 'Символіка простору: Москва наземна (фасад) vs Москва підземна (справжня суть). Алкоголь як засіб ''побачити'' істину.'
  section: 'Читання: Москва як царство мертвих'
  words: 1700
- points:
  - 'Стилістичний аналіз: поєднання високого (цитати з класики) і низького (фізіологізми, суржик, лайка). Як Андрухович створює
    ефект ''вибуху'' мови.'
  - 'Неологізми та оказіоналізми: авторська робота зі словом як спосіб передати хаос і розпад реальності.'
  - '[!myth-buster] Це не просто ''чорнуха''. Це свідоме використання барокової естетики (світ як театр, життя як сон) та
    ''химерної прози'' для опису кінця епохи.'
  - 'Інтертекстуальність: діалог з Гоголем, Булгаковим, Венедиктом Єрофєєвим. Андрухович ''переписує'' імперський текст, даючи
    власну відповідь.'
  section: 'Мова і поетика: Естетика потворного'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є опис гниття імперії ефективним способом боротьби з нею? Відповідь студента з опорою на текст.'
  - 'Рецепція роману: як сприймали ''Московіаду'' в 90-х і як її читають зараз, в умовах повномасштабної війни. Чи змінився
    фокус інтерпретації?'
  - '[!anti-hagiography] Чи не романтизує роман образ ''поета-пияка''? Критичний погляд на богемний спосіб життя як форму
    ескапізму.'
  - 'Сучасна актуальність: чому ''Московіада'' залишається одним із ключових текстів для розуміння природи російського імперіалізму.'
  section: Дискусія та підсумок
  words: 700
focus: Постмодерністський роман 'Московіада' Юрія Андруховича. Розпад СРСР очима українського поета в москві. Жанровий синкретизм
  (сповідь, трилер, 'роман жахів'). Деконструкція імперського міфу.
