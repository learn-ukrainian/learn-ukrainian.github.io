objectives:
- Аналізувати роман "Московіада" як постмодерністський текст, що деконструює імперський міф
- Визначати ключові риси поетики Юрія Андруховича (гротеск, іронія, інтертекстуальність)
- Формулювати власну позицію в літературних дебатах навколо твору
- Пояснювати незмінну актуальність роману в контексті триваючої російської агресії
