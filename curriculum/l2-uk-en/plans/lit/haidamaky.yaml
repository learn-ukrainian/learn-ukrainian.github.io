objectives:
- Аналізувати історичний контекст та причини Коліївщини
- Оцінювати етичний конфлікт Івана Гонти та трагічність його вибору
- Дискутувати концепцію «свяченого ножа» та межі виправданості насильства в боротьбі за свободу
- Аналізувати поетичні засоби, якими Шевченко творить епічне полотно (образи, символи, риторика)
