content_outline:
- points:
  - 'Провокація: "Освятили ножі". Що змушує людей перейти межу, за якою закінчується людське і починається стихія помсти?'
  - Уявіть, що ви маєте зробити вибір між вірністю присязі та життям власних дітей. Чи існує правильна відповідь?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Поема — це історична хроніка чи романтичний міф? Наскільки Шевченко точний у відображенні подій Коліївщини?'
  - 'Дебат 2: "Гайдамаки" — це апологія насильства чи пересторога? Чи виправдовує поет криваву помсту, чи лише фіксує її як
    трагічний факт історії?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у поемі гімн національно-визвольній боротьбі, інші — жахливу
    картину братовбивчої війни та анархії.'
  section: 'Конфліктна карта: Історія чи міф?'
  words: 900
- points:
  - 'Центральний епізод: вбивство синів. Аналіз тексту сцени в Умані — як Шевченко показує внутрішній стан Гонти.'
  - 'Гонта як трагічний герой античного масштабу: його конфлікт — це не вибір між добром і злом, а між двома видами обов''язку
    (батьківським і національним).'
  - 'Ярема Галайда як антитеза Гонті: "сирота" та месник, чия жорстокість є більш особистою, але не менш руйнівною.'
  - '[!decolonization] Шевченко створює український національний епос, відвойовуючи історію у імперії. Гайдамака в його трактуванні
    — не розбійник, як у російській історіографії, а месник і трагічна фігура.'
  section: 'Читання: Трагедія Івана Гонти'
  words: 1700
- points:
  - 'Стилістичний синкретизм: поема поєднує риси епосу, лірики, барокової драми та романтичної балади.'
  - 'Джерела мови: використання фольклорних мотивів, народної лексики, пісенної ритміки для створення відчуття автентичності.'
  - 'Риторика та її функція: риторичні запитання, звертання, оклики створюють ефект присутності автора-очевидця та емоційного
    коментатора.'
  - '[!myth-buster] Поема руйнує міф про "тиху, лагідну" українську душу. Шевченко показує, що століття приниження можуть
    породити страшну, неконтрольовану силу помсти.'
  section: 'Мова і поетика: Епос народного гніву'
  words: 1500
- points:
  - 'Повернення до розминки: чи дає поема відповідь на прокляте питання Гонти? Чи її мета — змусити читача відчути весь жах
    такого вибору?'
  - 'Пам''ять і травма: як поема вплинула на українсько-польські відносини? Як сьогодні говорити про такі складні сторінки
    минулого?'
  - 'Сучасне прочитання: чи актуальна поема в контексті сучасної війни за незалежність? Які уроки "Гайдамаків" важливі для
    України у XXI столітті?'
  - '[!anti-hagiography] Шевченко не створює ікону з Гонти. Він показує, що насильство руйнує всіх — і катів, і жертв. Поема
    — це дослідження природи зла, а не його оспівування.'
  section: Дискусія та підсумок
  words: 700
focus: Поема Тараса Шевченка "Гайдамаки", повстання Коліївщини, трагедія Івана Гонти, етика насильства та історична пам'ять
