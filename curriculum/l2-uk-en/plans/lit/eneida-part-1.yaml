content_outline:
- points:
  - 'Провокація: "Еней був парубок моторний / І хлопець хоть куди козак". Чому перший рядок української літератури — це жарт?
    І як цей жарт визначив долю нації?'
  - 'Без контексту: Що спільного між троянським біженцем, запорозьким козаком та чиновником Російської імперії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Енеїда" — це лише дотепна травестія Вергілія, вправа в "низькому" жанрі, чи це свідомий акт творення національного
    епосу з підручних матеріалів?'
  - 'Дебат 2: "Низький" жанр vs "висока" література. Чи була "Енеїда" відразу прийнята як канон, чи її довгий час сприймали
    як розважальну, але несерйозну літературу? Боротьба за легітимізацію народної мови.'
  - '[!epistemic-humility] Позиція 1 (радянське літературознавство): Котляревський — "прогресивний реаліст", що викривав "феодально-кріпосницький
    лад". Позиція 2 (постколоніальна): Котляревський — "культурний диверсант", що використовував дозволений імперією жанр
    для кодування української ідентичності.'
  section: 'Конфліктна карта: Пародія чи Національний Епос?'
  words: 900
- points:
  - 'Трансформація героя: аналіз уривків, що показують перетворення античного "pius Aeneas" на "парубка моторного". Еней як
    архетип українського "шукача долі".'
  - 'Олімп як імперська канцелярія: розгляд епізодів з Юноною, Венерою та Зевсом як сатири на бюрократичну машину Російської
    імперії. Гумор як засіб десакралізації влади.'
  - 'Наративна структура: аналіз ключових епізодів першої частини (буря на морі, гостина в Дідони, бенкет) як основи для подальшого
    розвитку сюжету і характерів.'
  - '[!decolonization] Текст написаний офіцером російської армії. Як це знання змінює наше прочитання сатири на "олімпійців"?
    Це критика імперії зсередини чи просто розвага?'
  section: 'Читання: "Енеїда" Частина I'
  words: 1700
- points:
  - 'Аналіз синонімічних рядів: розгляд уривків з переліками страв, напоїв, лайки. Як Котляревський створює ефект надмірності
    та вітальності?'
  - 'Змішування регістрів: поєднання "високої" оповідної мови з "низькою" просторічною лексикою, церковнослов''янізмів з вульгаризмами.
    Створення унікального бурлескного стилю.'
  - '[!myth-buster] "Макаронічна мова" — це не ознака бідності мови, а свідомий художній прийом. Котляревський не просто "записував,
    як говорять", а конструював нову літературну мову, здатну описати все — від бенкету до битви.'
  - 'Авторські відступи: роль оповідача в поемі. Як голос автора коментує, іронізує та веде діалог з читачем?'
  section: 'Мова і поетика: "Макаронічна мова" та лексичне багатство'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чому сміх став фундаментом нової української літератури? Гумор як захисний механізм нації,
    що опинилася на межі зникнення.'
  - 'Рецепція твору: як "Енеїду" читали сучасники Котляревського, і як її читаємо ми? Що змінилося у сприйнятті?'
  - 'Сучасна релевантність: чи можна знайти сучасні аналоги "Енеїді" — текстам, що використовують гумор та сатиру для коментування
    травматичних подій?'
  - '[!anti-hagiography] Котляревський як представник "малоросійського дворянства" — лояльний до імперії, але закоханий в
    українську культуру. Як ця подвійність відображена в поемі?'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз першої частини "Енеїди": трансформація героя, сатира на імперську бюрократію, бурлескний стиль та макаронічна
  мова'
level: LIT
module: lit-002
objectives:
- Аналізувати структуру, сюжети та образи першої частини "Енеїди"
- Розрізняти поняття "бурлеск", "травестія", "пародія" на прикладі тексту
- Інтерпретувати сатиру на олімпійців як критику імперської бюрократії
- Пояснювати роль "макаронічної мови" та синонімічних рядів у створенні художнього ефекту
- Формулювати власну позицію в дебаті про "Енеїду" як пародію та/або національний епос
