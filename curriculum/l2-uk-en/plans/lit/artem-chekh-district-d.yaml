content_outline:
- points:
  - 'Провокація: Чи можна написати про 90-ті без ностальгії або засудження? Артем Чех намагається це зробити, відмовляючись
    від сюжету та оцінок. Що залишається, коли з оповіді прибрати історію?'
  - 'Фрагмент тексту: «Тут ніколи нічого не відбувається». Як цей лейтмотив створює напругу в тексті, де постійно щось відбувається?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Район Д» — це документ епохи чи особистий міф? Позиція 1: це точний зріз життя провінційного міста 90-х. Позиція
    2: це суб''єктивна конструкція, де пам''ять автора — єдиний фільтр.'
  - 'Дебат 2: Мінімалістичний, «телеграфний» стиль Чеха — це художня сила чи слабкість? Позиція 1: стиль ідеально передає
    відчуження та емоційну порожнечу епохи. Позиція 2: стиль не дає змоги глибоко зануритися в психологію персонажів.'
  - '[!epistemic-humility] Літературна критика не має фінальної відповіді, чи є автофікшн надійним історичним джерелом. Це
    завжди баланс між фактом і вигадкою.'
  section: 'Конфліктна карта: Автофікшн чи документ?'
  words: 900
- points:
  - 'Ключові уривки: аналіз сцен, що показують розпад старих структур (завод, школа) і появу нових (ринкова економіка, кримінал).'
  - 'Система персонажів: відсутність головного героя. Чому автор робить оповідача майже невидимим спостерігачем?'
  - 'Наративна структура: фрагментарність як головний принцип. Як уривчасті спогади складаються в єдину, хоча й нелінійну,
    картину світу?'
  - '[!decolonization] Текст повертає українському місту його власну історію, очищену від радянських наративів. Це не «пострадянський»
    простір, а саме український, що переживає наслідки радянської окупації.'
  section: 'Читання: Фрагменти міського пейзажу'
  words: 1700
- points:
  - 'Стилістичні інновації: відмова від метафор та прикметників. Чех описує, а не оцінює. Як це впливає на читача?'
  - 'Робота з мовою: використання суржику та буденної лексики не для «народності», а для документальної точності.'
  - 'Синтаксис як значення: короткі, уривчасті речення створюють ритм, що імітує потік свідомості або кадри з документального
    фільму.'
  - '[!myth-buster] Простий стиль не означає просту літературу. За лаконічністю Чеха стоїть складний процес відбору та відсікання
    зайвого, що є ознакою високої літературної майстерності.'
  section: 'Мова і поетика: Мінімалізм та «чесність речей»'
  words: 1500
- points:
  - 'Повернення до розминки: що ж залишається, коли з оповіді прибрати «історію»? Залишається атмосфера, настрій, мова — те,
    що є суттю літератури.'
  - 'Рецепція твору: як «Район Д» був сприйнятий критиками та читачами? Чому він став одним із ключових текстів про 90-ті?'
  - '[!anti-hagiography] Чи може текст, настільки глибоко занурений в особистий досвід, претендувати на голос цілого покоління?
    Обговорення меж та можливостей автофікшну.'
  - 'Сучасна релевантність: як війна змінила сприйняття цього тексту про мирне, хоч і травматичне, минуле?'
  section: Дискусія та підсумок
  words: 700
