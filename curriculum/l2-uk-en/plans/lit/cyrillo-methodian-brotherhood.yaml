content_outline:
- points:
  - 'Провокація: "І встане Україна зі своєї могили... і покличе до себе всіх братів слов''янських". Що це — політичний маніфест,
    релігійна утопія чи поетична метафора? Як ця фраза з таємного документу 1840-х років відлунює сьогодні?'
  - 'Фрагмент без контексту: "Україна лежить у могилі, та не вмерла".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Політична організація чи філософський гурток? Позиція царського слідства ("найнебезпечніші злочинці") vs. саморепрезентація
    братчиків ("коло друзів для бесід").'
  - 'Дебат 2: Націоналізм vs. Панславізм. Чи прагнули братчики негайного відокремлення України, чи реформування імперії у
    слов''янську федерацію? Аналіз ідейних розбіжностей між "поміркованим" Костомаровим і "радикальним" Шевченком.'
  - '[!epistemic-humility] Радянська історіографія таврувала їх як "буржуазних націоналістів". Сучасна — бачить у них перших
    політичних модернізаторів. Істина, ймовірно, у складності їхніх ідей.'
  section: 'Конфліктна карта: Революціонери чи мрійники?'
  words: 900
- points:
  - 'Аналіз ключових уривків: Україна як альтернатива імперії ("бо вона не любила ні царя, ні пана"), месіанська роль ("потерпить
    за всіх"), ідея республіканської федерації.'
  - 'Наративна структура: від створення світу до апокаліптичного суду над імперіями. Жанр — політичний маніфест у формі біблійного
    пророцтва.'
  - '[!decolonization] Текст прямо протиставляє "панську" Росію з її кріпацтвом і "демократичну" Україну з козацькими вольностями,
    руйнуючи імперський міф про "єдиний народ".'
  - 'Роль Шевченка: як його поезія ("Сон", "Кавказ", "І мертвим, і живим...") радикалізувала ідеї, закладені в "Книгах" Костомаровим.'
  section: 'Читання: "Книги буття українського народу"'
  words: 1700
- points:
  - 'Стилістичний аналіз: використання біблеїзмів (пророки, апостоли, воскресіння), архаїзмів, пророчого тону для легітимізації
    політичних ідей.'
  - 'Синтаксис як ідеологія: короткі, афористичні фрази, що імітують заповіді ("Немає іншого імені, крім Ісуса Христа...").'
  - 'Інтертекстуальність: прямі й опосередковані посилання на Новий Заповіт, а також на "Історію Русів" — ключовий текст українського
    романтизму.'
  - '[!myth-buster] "Книги буття" — це не просто політичний трактат. Це оригінальний твір української літератури, де історіософія
    невіддільна від поетики.'
  section: 'Мова і поетика: Політичний маніфест як релігійний текст'
  words: 1500
- points:
  - 'Повернення до розминки: то що ж таке український месіанізм у "Книгах буття" — візія, утопія чи інструмент політичної
    боротьби? Студент формулює власну аргументовану позицію.'
  - 'Історична рецепція: як ідеї братства вплинули на Драгоманова, Франка, і зрештою на українську державність у ХХ столітті.'
  - '[!anti-hagiography] Аналіз провалу: чи не була ідея "слов''янського братерства" з поляками та росіянами наївною утопією,
    що і призвела до доносу (Олексія Петрова) і розгрому?'
  - 'Сучасна релевантність: наскільки актуальними є ідеї "Книг буття" в контексті сучасної російсько-української війни? Обговорення.'
  section: Дискусія та підсумок
  words: 700
focus: Програмний документ Кирило-Мефодіївського братства "Книги буття українського народу", його ключові фігури (Костомаров,
  Куліш, Шевченко), ідеологічний конфлікт (утопія vs. політика) та літературна спадщина.
level: LIT
module: lit-025
objectives:
- Аналізувати "Книги буття українського народу" як літературний та політичний текст, розрізняючи його ідейні та стилістичні
  шари.
- Критично оцінювати історичні інтерпретації діяльності Кирило-Мефодіївського братства, формулюючи власну позицію в дебаті
  "революціонери чи мрійники".
- Пояснювати відмінності в ідеологічних поглядах ключових членів братства, зокрема Костомарова та Шевченка.
- Визначати вплив ідей братства на подальший розвиток української політичної думки та національно-визвольного руху.
