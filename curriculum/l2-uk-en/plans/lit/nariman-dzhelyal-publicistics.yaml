content_outline:
- points:
  - 'Провокація: "Знову, як і сотні років тому, наш народ змушений доводити своє право на існування". Чиї це слова — Василя
    Стуса з радянського табору чи Нарімана Джеляля з російської в''язниці?'
  - Історична паралель: традиція листів з ув''язнення в українській літературі — Стус, Світличний, Шумук. Чому для імперії
      письменник у неволі небезпечніший за озброєного солдата?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є публіцистика Джеляля та його листи "літературою"? Позиція 1 (Формальна): це перш за все документ, свідчення,
    журналістика. Позиція 2 (Контекстуальна): в умовах репресій будь-яке правдиве слово стає актом художнього спротиву.'
  - 'Дебат 2: Джеляль як "новий Стус" — це точне порівняння чи спрощення? Дискусія про спадкоємність і унікальність досвіду
    політв''язнів радянської та сучасної російської імперій.'
  - '[!epistemic-humility] Межа між літературою факту, публіцистикою та художньою прозою є предметом постійних дебатів, а
    не встановленим кордоном.'
  section: 'Конфліктна карта: Література чи журналістика?'
  words: 900
- points:
  - Аналіз ключових листів Джеляля з ув''язнення. Теми: моральний імператив, гідність, солідарність, абсурдність звинувачень.
  - Жанр листа як форма опору. Як обмеження (цензура, ізоляція) впливають на мову та структуру тексту?
  - '[!decolonization] Тексти Джеляля повертають Крим в український літературний та інтелектуальний простір, спростовуючи
    імперський наратив про "ісконно русскую землю".'
  - Порівняльний аналіз: фрагменти з листів Стуса та Джеляля. Спільні мотиви, образи, риторичні стратегії.
  section: 'Читання: Листи з неволі'
  words: 1700
- points:
  - Стиль Джеляля: точність формулювань, стриманість, відсутність патетики. Аналіз того, як ця "прозора" мова працює як найсильніший
      контраст до брехливого та маніпулятивного новоязу російської пропаганди.
  - Юридична точність: як журналістський та правозахисний досвід вплинув на вибір лексики та синтаксису. Мова як інструмент
      фіксації злочину.
  - '[!myth-buster] Спростування міфу про те, що література опору має бути емоційною та експресивною. Сила Джеляля — у спокійній
    фіксації правди в епіцентрі брехні.'
  - Українська мова в листах: свідомий вибір мови як маркера ідентичності та інструменту спротиву русифікації в Криму.
  section: 'Мова і поетика: Ясність як спротив'
  words: 1500
- points:
  - Повернення до розминки: то чим голос Джеляля подібний до голосу Стуса, а в чому їхня унікальність?
  - Рецепція: як листи Джеляля сприймаються в Україні та світі? Роль цих текстів у формуванні міжнародного дискурсу про окупацію
      Криму та політичних в''язнів.
  - '[!anti-hagiography] Обговорення небезпеки перетворення живої людини на "ікону спротиву". Як уникнути бронзовіння та зберегти
    складність реальної особистості за символом?'
  - 'Проєкт майбутнього: яку роль відіграють тексти Джеляля та інших кримських політв''язнів у формуванні образу майбутнього
    деокупованого Криму?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз листів з неволі кримськотатарського лідера Нарімана Джеляля як продовження української традиції тюремної літератури
  (Стус, Світличний) та як інструменту спротиву в умовах окупації Криму.
