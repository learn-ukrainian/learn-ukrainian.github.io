objectives:
- Аналізувати публіцистику та листи Нарімана Джеляля як зразок сучасної літератури опору.
- Критично осмислювати спадкоємність традиції тюремної літератури в Україні, порівнюючи тексти Джеляля і Стуса.
- Розрізняти поняття "література факту" та "художня література" на прикладі текстів про окупацію Криму.
- Формулювати аргументовану позицію щодо ролі письменника та публічного інтелектуала в умовах екзистенційної загрози.
