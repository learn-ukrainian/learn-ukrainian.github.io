content_outline:
- points:
  - 'Провокація: "Світ одкривається через материнську любов і ласку...". Чи є "Зачарована Десна" ідилічною сповіддю, чи втечею
    від реальності сталінського терору?'
  - 'Фрагмент тексту без контексту: опис грози або повені — як стихія стає повноцінним персонажем.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Зачарована Десна" — це точна автобіографія чи художня містифікація? Суперечка між біографічним та міфопоетичним
    підходами.'
  - 'Дебат 2: Текст як ідеологічний компроміс vs текст як тихий спротив. Чи є твір конформістським, чи він приховано утверджує
    український космос всупереч радянській доктрині?'
  - '[!epistemic-humility] Критики досі сперечаються, де в тексті закінчується Довженко-дитина і починається Довженко-режисер,
    що конструює ідеалізоване минуле.'
  section: 'Конфліктна карта: Автобіографія чи національний міф?'
  words: 900
- points:
  - 'Фрагмент "Повінь": аналіз образу води як першоелемента буття, що водночас руйнує і очищує.'
  - 'Система персонажів: Сашко як фокус сприйняття; батько як уособлення трагічної краси; дід як носій язичницьких знань;
    мати як центр морального всесвіту.'
  - 'Структура твору: нелінійний потік спогадів, що організований за логікою сновидіння, а не хронології.'
  - '[!decolonization] Твір утверджує український пантеїстичний світогляд, де природа і людина єдині, на противагу радянському
    антропоцентризму та підкоренню природи.'
  section: 'Читання: Картини втраченого раю'
  words: 1700
- points:
  - 'Стилістичні інновації: створення жанру "кіноповісті" — тексту, призначеного для візуального, а не лише вербального сприйняття.'
  - 'Ритм і синтаксис: довгі, плавні періоди речень, що імітують рух кінокамери (панорама, наїзд, великий план).'
  - 'Мова як живопис: використання народної лексики, діалектизмів та поетичних епітетів для створення густих, фактурних образів.'
  - '[!myth-buster] Довженко — не просто "співець природи". Він використовує природу як філософську категорію для розмови
    про життя, смерть, час і вічність.'
  section: 'Мова і поетика: Кінематографічний імпресіонізм'
  words: 1500
- points:
  - 'Повернення до розминки: як після аналізу ми можемо відповісти на питання про втечу та ідилію?'
  - 'Рецепція твору: як "Зачаровану Десну" читали в СРСР і як її читають у незалежній Україні?'
  - 'Вплив на наступні покоління: українське поетичне кіно (Іллєнко, Параджанов) як прямий спадкоємець поетики Довженка.'
  - 'Сучасна актуальність: екологічна свідомість та пошук гармонії з природою в тексті Довженка.'
  section: Дискусія та підсумок
  words: 700
