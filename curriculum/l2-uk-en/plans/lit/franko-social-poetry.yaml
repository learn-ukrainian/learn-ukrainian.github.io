content_outline:
- points:
  - 'Провокація: "Лупайте сю скалу!" — це заклик до революції, інтелектуальної праці чи духовного самовдосконалення? Що саме
    «ламають» Франкові каменярі?'
  - 'Фрагмент "Гімну" без контексту: "Не ридать, а добувати, хоч синам, як не собі, кращу долю в боротьбі". Про яку боротьбу
    йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Поет чи публіцист? Радянське літературознавство бачило у Франкові "революціонера-демократа". Модерністи (і сам
    Франко у пізній період) наголошували на естетичній самоцінності поезії. Чи є його соціальна лірика мистецтвом, чи лише
    агітацією?'
  - 'Дебат 2: "Національний пророк" vs "Європейський інтелектуал". Чи був Франко унікальним явищем, народним трибуном ("Мойсей"),
    чи він був органічною частиною загальноєвропейського модернізму, поряд із Золя, Ібсеном, Ніцше?'
  - '[!epistemic-humility] Немає єдиної відповіді. Інтерпретація Франка залежить від оптики: чи ми шукаємо підтвердження національного
    міфу, чи вписуємо його у світовий контекст.'
  section: 'Конфліктна карта: Мистецтво для кого? Франко між естетикою та обов''язком'
  words: 900
- points:
  - Повний текст "Гімну" ("Вічний революціонер"). Аналіз образу "духа, що тіло рве до бою". Це алегорія наукового прогресу,
    соціальної еволюції чи божественного одкровення?
  - 'Повний текст "Каменярів". Детальний розбір системи персонажів: "ми" (колективний герой), "вони" (майбутні покоління),
    "ті" (що проклинали). Чому каменярі працюють мовчки, безіменно і без подяки?'
  - 'Структура і сюжет: від зневіри та проклять до апофеозу "ясного сонця". Як Франко вибудовує наратив незламності?'
  - '[!decolonization] Франко створює український політичний міф, альтернативний імперським (російському та австро-угорському).
    Він пропонує не минуле (козацтво), а майбутнє — ідею модерної нації, збудованої працею інтелектуальної еліти.'
  section: 'Читання: Аналіз "Гімну" та "Каменярів"'
  words: 1700
- points:
  - 'Стилістичні інновації: введення наукової та філософської лексики ("атоми", "молекули", "еволюція") в поетичний текст.
    Франко як поет-позитивіст.'
  - 'Робота з ритмом: маршовий, енергійний дактиль у "Каменярах" створює ефект важких ударів молота. Синтаксис, що імітує
    виснажливу, циклічну працю.'
  - 'Звукопис: алітерації "р", "к", "т" у "Каменярах" — звукова імітація розколювання скелі. Асонанси в "Гімні", що підкреслюють
    невпинний рух.'
  - '[!myth-buster] Франко — не просто "співець народного горя". Це інтелектуал найвищого європейського рівня, який свідомо
    конструює нову поетичну мову для опису складних соціальних і філософських ідей.'
  section: 'Мова і поетика: Синтез науки і поезії'
  words: 1500
- points:
  - 'Повернення до розминки: тож для кого лупають скалу каменярі? Студент формулює власну інтерпретацію на основі аналізу.'
  - 'Рецепція: як змінювалось сприйняття цих творів? Від заборони в Російській імперії до канонізації та примітивізації в
    СРСР і нового прочитання в незалежній Україні.'
  - '[!anti-hagiography] Як радянська пропаганда перетворила Франка-інтелектуала на "борця з капіталізмом", ігноруючи його
    критику соціалізму та імперіалізму (в т.ч. російського)?'
  - 'Питання для рефлексії: Чи потрібні сучасній Україні свої "каменярі"? Якщо так, то хто вони і яку "скалу" вони мають лупати?'
  section: Дискусія та підсумок
  words: 700
focus: Franko's social poetry as a tool for national mobilization, the tension between art and duty, the myth of the "Kamenyar"
level: LIT
module: lit-047
objectives:
- Критично аналізувати соціальну поезію Івана Франка, розрізняючи естетичний, ідеологічний та національний плани
- Застосовувати інструменти філологічного аналізу (стилістика, ритміка, поетика) до текстів "Гімн" та "Каменярі"
- Формулювати аргументовану позицію в літературній дискусії (мистецтво vs обов'язок, національне vs універсальне)
- Деконструювати радянські та пострадянські міфи про Івана Франка, вписуючи його творчість у європейський модерністський контекст
