objectives:
- Аналізувати "Музей покинутих секретів" як епічний роман, що поєднує родинну сагу, історичне розслідування та філософський
  трактат
- 'Досліджувати характерні риси поетики Забужко: "мускульне письмо", інтелектуальну насиченість, переплетіння наративних планів'
- Оцінювати деколонізаційний вимір роману, зокрема його критику радянської та пострадянської амнезії
- Формулювати власну позицію в літературних дебатах навколо творчості Забужко та її місця в сучасному каноні
