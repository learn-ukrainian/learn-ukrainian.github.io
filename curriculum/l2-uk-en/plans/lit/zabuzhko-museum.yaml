content_outline:
- points:
  - 'Провокація: "Чи можна вбити пам''ять?" — головне питання роману Забужко. Що станеться, якщо три покоління жінок однієї
    родини виявляться пов''язаними з однією таємницею УПА?'
  - 'Фрагмент з роману: цитата про "мертвих, що не мають мертвих" або про "музей покинутих секретів" як метафору України —
    без контексту.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Забужко — феміністка чи націоналістка? Одні критики бачать у ній провідну авторку феміністичного дискурсу, інші
    — речницю національної ідеї. Чи суперечать ці ролі одна одній?'
  - 'Дебат 2: Жанровий палімпсест. Це "жіночий роман", історичний епос, політичний детектив чи філософський трактат? Як взаємодія
    жанрів створює сенс?'
  - '[!epistemic-humility] Критика зліва (звинувачення в есенціалізмі) vs критика справа (звинувачення в космополітизмі).
    Творчість Забужко — поле бою ідеологій.'
  section: 'Конфліктна карта: Забужко: Фемінізм vs. Націоналізм'
  words: 900
- points:
  - 'Центральний уривок: сцена, де Дар''я знаходить фотографії та документи, що запускають розслідування минулого. Аналіз,
    як матеріальні "секрети" запускають наратив.'
  - 'Наративна структура "матрьошки": як історія Олени (УПА) вкладена в історію Влади (шістдесятниця) і розкривається через
    історію Дар''ї (сучасна журналістка).'
  - 'Система персонажів: Дар''я як детектив, що розслідує власну історію. Адріан — зв''язок із європейським контекстом.'
  - '[!decolonization] Роман як акт історичної реституції — повернення історії УПА в український наратив як трагедії та героїчного
    опору, а не "колабораціонізму".'
  section: 'Читання: Переплетення часів: УПА і сьогодення'
  words: 1700
- points:
  - 'Феномен "довгого речення" Забужко: синтаксис як спосіб мислення. Аналіз речень, що займають цілу сторінку — як вони передають
    потік свідомості та складність зв''язків.'
  - '"Мускульне письмо": інтелектуальна насиченість, філософська термінологія, англіцизми як маркер сучасності.'
  - 'Інтертекстуальність: відсилки до світової літератури (Данте, Шекспір) та української (Шевченко, Леся Українка) — створення
    власного канону.'
  - '[!myth-buster] Забужко — це не "жіноча проза" в стереотипному сенсі. Це складна інтелектуальна література, що вимагає
    від читача зусиль і кидає виклик.'
  section: 'Мова і поетика: "Мускульне письмо" Оксани Забужко'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чи можна вбити пам''ять? Як роман відповідає на це питання через долі трьох поколінь жінок?'
  - 'Історія рецепції: від звинувачень у "затягнутості" до визнання "великим українським романом". Як змінювалося сприйняття
    твору з 2009 року?'
  - 'Пророчий вимір: наскільки роман виявився актуальним після 2014 та 2022 років? Чи є він "підручником" для розуміння сучасної
    України?'
  - '[!anti-hagiography] Критика стилю Забужко: чи не затьмарює публіцистична пристрасть художню якість? Обговорення межі
    між літературою та політичним висловлюванням.'
  section: Дискусія та підсумок
  words: 700
focus: 'Роман Оксани Забужко "Музей покинутих секретів": переплетення історії УПА та сучасності, "мускульне письмо", деколонізація
  історичної пам''яті, феміністичний та національний дискурси.'
