content_outline:
- points:
  - 'Провокація: Чи може література існувати без сюжету? Як текст, що описує розпад, сам стає інструментом цього розпаду?'
  - Фрагмент з "Рекреацій" Андруховича без контексту — карнавальна сцена, що втілює хаос і водночас звільнення епохи.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Нова проза" — це радикальний розрив з українською літературною традицією чи її приховане продовження в нових
    умовах? Позиція "за" (еволюція модернізму) і "проти" (постмодерна революція).'
  - 'Дебат 2: Чи був цей рух лише "львівським феноменом" чи загальнонаціональним явищем? Дискусія про географію та центральність
    у новому літературному каноні.'
  - '[!epistemic-humility] Критики того часу (І. Дзюба, М. Рябчук) сперечались: це "кінець літератури" чи її "справжній початок"?
    Обидві оцінки мали свої аргументи.'
  - 'Глобальний контекст: український постмодернізм у порівнянні з польським (С. Лем) та американським (Т. Пінчон) — спільне
    та відмінне.'
  section: 'Конфліктна карта: Канон vs Контркультура'
  words: 900
- points:
  - 'Ключовий уривок: "Свято Воскресаючого Духу" — аналіз як метафори стану суспільства на зламі епох.'
  - 'Наративна структура: відсутність класичного сюжету, фрагментарність, колажність як відображення "децентрованого" світу.'
  - 'Система персонажів: поети як трикстери та деміурги нового світу. Відсутність позитивного героя.'
  - '[!decolonization] Текст як руйнування імперського міфу про "єдиний радянський народ". Повернення до власної, часто гротескної,
    карнавальної культури — це акт культурного опору.'
  - 'Символіка: простір (місто-цвинтар), час (зупинений, циклічний), тілесність (гротеск, еротика).'
  section: 'Читання: "Рекреації" Юрія Андруховича'
  words: 1700
- points:
  - 'Стилістичні інновації: змішування високого (філософські алюзії) і низького (суржик, вульгаризми) стилів.'
  - 'Робота з мовою: оказіоналізми, архаїзми, діалектизми, цитати з інших творів як будівельний матеріал.'
  - 'Синтаксис як значення: довгі, "барокові" речення, що імітують потік свідомості та хаотичність реальності.'
  - 'Інтертекстуальність: діалог з Гоголем, Кафкою, світовою літературою.'
  - '[!myth-buster] Це не просто "стьоб заради стьобу". Це свідомий пошук нової мови, здатної описати реальність, для якої
    стара мова (соцреалізм) більше не пасувала.'
  section: 'Мова і поетика: Стилістичні інновації та мовна гра'
  words: 1500
- points:
  - 'Повернення до розминки: тож як текст без сюжету створює сенс? Відповідь студента на основі аналізу.'
  - 'Рецепція: як сприймали ці тексти в 90-х (шок, несприйняття) і як ми читаємо їх сьогодні (класика, документ епохи)?'
  - '[!anti-hagiography] Покоління "Бу-Ба-Бу" — не безгрішні пророки, а живі люди зі своїми суперечностями. Як їхній богемний
    спосіб життя вплинув на їхню творчість?'
  - 'Сучасна релевантність: чи актуальний сьогодні досвід "переміщення" та пошуку себе в хаотичному світі?'
  section: Дискусія та підсумок
  words: 700
focus: Творчість "переміщеного покоління" (Андрухович, Ірванець, Позаяк), руйнування соцреалістичного канону, стилістичні
  інновації та деколоніальний вимір української прози 1990-х.
