objectives:
- Аналізувати твори "нової прози" в культурному та історичному контексті 1990-х років
- Пояснювати ключові риси українського літературного постмодернізму (фрагментарність, іронія, інтертекстуальність)
- Інтерпретувати стилістичні інновації як інструмент деколонізації та пошуку нової ідентичності
- Формулювати власну позицію в рамках літературознавчих дебатів про канон та контркультуру
