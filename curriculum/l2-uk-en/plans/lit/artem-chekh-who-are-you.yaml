content_outline:
- points:
  - 'Провокація: Пам''ять — це точна копія минулого чи розповідь, яку ми створюємо, щоб вижити? Якби ваша пам''ять була зруйнована,
    хто б розказав вам, хто ви є?'
  - 'Цитата з тексту: «Я не знаю, хто я. Я — сума моїх учинків, кажеш ти. Але що, як я не пам''ятаю своїх учинків?»'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є «Хто ти такий?» документом, що фіксує реальність війни, чи це художній твір (автофікшн), де факти підпорядковані
    авторському задуму?'
  - 'Дебат 2: Це універсальна історія про людину на війні, чи це текст, нерозривно пов''язаний з унікальним українським контекстом
    війни на Донбасі, який неможливо зрозуміти поза ним?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у простоті стилю Чеха вищу форму достовірності, інші — маніпулятивну
    техніку, що створює ілюзію щирості.'
  section: 'Конфліктна карта: Свідчення чи фікція?'
  words: 900
- points:
  - 'Ключовий уривок: аналіз сцени, де головний герой намагається реконструювати своє минуле через розмови з іншими, але кожен
    спогад суперечливий.'
  - 'Структура як сенс: як уривчаста, нелінійна оповідь віддзеркалює стан людини з посттравматичним стресовим розладом (ПТСР).'
  - 'Система персонажів: кожен персонаж — це дзеркало, в якому герой шукає власне відображення, але бачить лише уламки.'
  - '[!decolonization] Текст Чеха — це акт культурного самоствердження. Герой, що втратив особисту пам''ять, бореться за збереження
    колективної, української ідентичності проти ворога, який прагне її стерти.'
  section: 'Читання: Фрагментована пам''ять у ''Хто ти такий?'''
  words: 1700
- points:
  - 'Стилістичний аналіз: короткі, "рубані" речення; відсутність метафор та прикрас; фокус на дії та об''єкті, а не на емоції.'
  - 'Мова як камуфляж: як навмисна простота мови ховає глибинну емоційну та психологічну напругу.'
  - '[!myth-buster] Міф про те, що проста мова = проста література. Чех доводить, що лаконізм може бути потужнішим за барокові
    конструкції, змушуючи читача до співтворення сенсів.'
  - 'Синтаксис та ритм: аналіз того, як ритм прози Чеха створює відчуття тривоги та екзистенційної невпевненості.'
  section: 'Мова і поетика: Лаконізм як художній прийом'
  words: 1500
- points:
  - 'Повернення до розминки: тож хто такий головний герой? Студент формулює відповідь, спираючись на аналіз тексту.'
  - 'Рецепція твору: як роман сприйняли в Україні та за кордоном? Чи змінилося його прочитання після повномасштабного вторгнення?'
  - '[!anti-hagiography] Роман деконструює героїчний міф про солдата. Герой Чеха — не титан, а звичайна людина, розгублена,
    травмована, що ставить під сумнів саму ідею війни.'
  - 'Питання для роздумів: чи може література про війну бути терапевтичною, чи вона лише ретравматизує читача?'
  section: Дискусія та підсумок
  words: 700
focus: 'Artem Chekh''s novel ''Who Are You?'': autofiction, trauma narrative, laconic style, Donbas war experience, search
  for identity.'
