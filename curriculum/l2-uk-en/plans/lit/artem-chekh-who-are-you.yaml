objectives:
- Аналізувати роман «Хто ти такий?» як приклад автофікшну про досвід війни на Донбасі
- Визначати стилістичні особливості прози Артема Чеха, зокрема лаконізм та фрагментарність
- Формулювати аргументовану позицію щодо дебатів про документальність та універсальність у сучасній воєнній літературі
- Застосовувати літературознавчу термінологію для аналізу структури, стилю та проблематики твору
pedagogy: CBI
