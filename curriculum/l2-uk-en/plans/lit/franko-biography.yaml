content_outline:
- points:
  - 'Провокація: Ми звикли бачити Франка-титана, «вічного революціонера». А що, як головний конфлікт його життя — не зовнішній,
    а внутрішній? Чи може «каменяр» бути водночас автором найтоншої любовної лірики?'
  - Цитата з «Зів'ялого листя» без коментаря — меланхолійний уривок, що різко контрастує з образом борця.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Франко — позитивіст і раціоналіст? Чи автор, що у поемі «Мойсей» веде діалог з трансцендентним? Аналіз наукових
    праць vs містичних мотивів у художніх текстах.'
  - 'Дебат 2: Франко — «західник», що інтегрував європейські ідеї, чи «народник», що служив українському селянству? Його роль
    у дискусії між народовцями та радикалами.'
  - '[!epistemic-humility] Біографічний метод (Франко-людина) vs формалізм (Франко-текст). Як особисті трагедії (нерозділене
    кохання, політичні поразки) вплинули на його поетику, і чи коректно шукати ці зв''язки?'
  section: 'Конфліктна карта: Франко-раціоналіст vs Франко-містик'
  words: 900
- points:
  - 'Ключовий уривок: Пролог до поеми — аналіз метафори «народу-паралітика» та ролі пророка.'
  - 'Наративна структура: перехід від зневіри до віри, від історичного сюжету до філософського узагальнення.'
  - 'Система персонажів: Мойсей, Датан, Авірон, Єгошуа як алегорії різних шляхів для нації.'
  - '[!decolonization] «Мойсей» як відповідь на бездержавність. Франко пише не про євреїв, а про українців, створюючи національний
    міф про лідерство та майбутнє, кидаючи виклик імперському наративу про «неісторичність» української нації.'
  section: 'Читання: Поема «Мойсей»'
  words: 1700
- points:
  - 'Лексичне багатство: використання архаїзмів, діалектизмів (бойківський говір), іноземних запозичень та створення неологізмів.'
  - 'Синтаксис як інструмент: складні періоди у наукових працях та рубані, динамічні фрази у «Каменярах».'
  - 'Жанрова поліфонія: як Франко поєднував риси реалізму, натуралізму, символізму та імпресіонізму в межах одного твору.'
  - '[!myth-buster] Руйнування міфу про Франка як «сухого» реаліста. Аналіз звукопису та ритміки в «Зів''ялому листі» для
    демонстрації його як майстра модерністської лірики.'
  section: 'Мова і поетика: Стилістичний поліглот'
  words: 1500
- points:
  - 'Повернення до розминки: чи вдалося поєднати образи «титана» і «лірика»? Як тепер ми розуміємо внутрішній світ Франка?'
  - 'Рецепція творчості: як радянська критика «канонізувала» Франка-революціонера, ігноруючи його філософську та національну
    глибину.'
  - '[!anti-hagiography] Постать Франка — це не лише титанічна праця, а й трагедії, сумніви, конфлікти з сучасниками. Як це
    «олюднює» його образ?'
  - 'Сучасна релевантність: Чому «Мойсей» знову став актуальним у XXI столітті? Які уроки Франка важливі для сучасної України?'
  section: Дискусія та підсумок
  words: 700
focus: Close reading of Ivan Franko's work, exploring the tension between his public persona as a “Titan of Labor” and the
  private psychological depths of his lyrical poetry and prose. Analyzes his stylistic innovations, philosophical debates,
  and decolonial impact.
level: LIT
module: lit-042
objectives:
- Аналізувати ключові ідеї та образи поеми «Мойсей» у філософському та національному контекстах.
- Розрізняти різні ідейні та стильові пласти творчості Франка (раціоналізм, містицизм, модернізм).
- Деконструювати радянський міф про Франка, виявляючи його деколонізаційне та модерне значення.
- Формулювати власну аргументовану позицію щодо місця Франка в українському літературному каноні.
