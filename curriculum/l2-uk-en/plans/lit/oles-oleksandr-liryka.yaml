content_outline:
- points:
  - 'Провокація: «З журбою радість обнялась... / В сльозах, що щастя принесли». Як можуть сльози приносити щастя? І чому головні
    емоції української модерної поезії — це не просто радість чи журба, а їх нерозривний сплав?'
  - 'Завдання: Прослухайте сучасну пісню на цей вірш (напр. у виконанні Арсена Мірзояна). Що додає музика до тексту? Чи відчувається
    цей текст як столітній?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Олесь — «чистий» символіст-естет чи поет національного відродження? Позиція 1 (М. Зеров): його сила в музичності
    й утечі від реальності. Позиція 2 (С. Єфремов): його поезія — це голос поневоленої нації, туга за свободою.'
  - 'Дебат 2: Місце в каноні. В УНР — поет №1. В СРСР — «буржуазний націоналіст», напівзаборонений емігрант. Сьогодні — знову
    в шкільній програмі. Як ідеологія визначає, кого читати?'
  - '[!epistemic-humility] Немає «правильного» Олеся. Його тексти дозволяють і естетичне, і громадянське прочитання. Суперечка
    критиків більше говорить про їхні власні погляди, ніж про поета.'
  section: 'Конфліктна карта: Митець чи громадянин?'
  words: 900
- points:
  - 'Ключовий текст: повний аналіз вірша «З журбою радість обнялась...» — алегорія, система образів (журба-ніч, радість-день),
    динаміка їх взаємин.'
  - 'Наративна структура збірки: подорож ліричного героя від розпачу й зневіри («Айстри») до трагічної надії та жертовності
    («Лебідь», «О слово рідне! Орле скутий!»).'
  - 'Характер і конфлікт: ліричний герой Олеся — це інтелігент на зламі століть, розірваний між особистим почуттям і громадянським
    обов''язком. Його трагедія — неможливість щастя, поки нещаслива Батьківщина.'
  - '[!decolonization] Радянське літературознавство намагалося «приручити» Олеся, представляючи його лише як співця «соціального
    гніту». Це ігнорувало головне: його туга — це туга за втраченою державністю, а не лише за долею селян.'
  section: 'Читання: Збірка «З журбою радість обнялась» (1907)'
  words: 1700
- points:
  - 'Стилістичні інновації: Олесь довів до досконалості «поезію натяків». Замість чітких описів — емоційні стани, передані
    через пейзаж, колір, звук. Створення настрою (Stimmung) важливіше за сюжет.'
  - 'Звукопис і ритміка: аналіз алітерацій, асонансів та анафор. Вірші Олеся призначені для співу або мелодекламації. Розгляд
    дольника — віршового розміру, що імітує живу, схвильовану мову.'
  - 'Лексика: поєднання «високої» книжної лексики з елементами народної пісні. Це створювало модерну, гнучку, вишукану українську
    мову, здатну передавати найтонші відтінки почуттів.'
  - '[!myth-buster] Міф про «простоту» й «пісенність» Олеся. За удаваною легкістю — складна філософська концепція єдності
    протилежностей та глибоке знання європейської поезії (Верлен, Бодлер).'
  section: 'Мова і поетика: Музичність символістського вірша'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, як сльози можуть приносити щастя? Формулювання відповіді на основі аналізу символістського
    світогляду.'
  - 'Рецепція: Чому поезія Олеся, написана в Російській імперії, стала гімном для воїнів УНР? І чому вона знову стала актуальною
    після 2014 року?'
  - '[!anti-hagiography] Пізній період творчості Олеся (в еміграції) позначений розчаруванням і песимізмом. Це не зменшує
    його внесок, але показує трагедію митця, відірваного від рідної землі.'
  - 'Питання для рефлексії: Чи може сучасний український митець дозволити собі бути «чистим естетом», ігноруючи війну та суспільні
    проблеми? Аргументуйте свою позицію, спираючись на приклад Олеся.'
  section: Дискусія та підсумок
  words: 700
focus: Symbolist poetry of Oleksandr Oles, musicality of verse, themes of national sorrow and hope ('журба і радість'), analysis
  of his collection 'З журбою радість обнялась'
level: LIT
module: lit-072
objectives:
- Аналізувати ключові поезії Олександра Олеся зі збірки «З журбою радість обнялась» у культурному та історичному контексті.
- Визначати основні риси поетики українського символізму: музичність, алегоричність, психологізм.
- Критично оцінювати рецепцію творчості Олеся в різні періоди (УНР, СРСР, сучасність), розрізняючи ідеологічні та естетичні
  оцінки.
- Формулювати власну позицію в літературознавчій дискусії щодо ролі митця в суспільстві.
