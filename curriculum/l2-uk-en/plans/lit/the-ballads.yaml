activity_hints:
- description: Визначити, яка літературно-критична позиція (народницька чи модерністська) відповідає наведеним тезам про балади
    Шевченка.
  focus: 'Конфліктна карта: Фольклор vs Література'
  items: 5
  type: quiz
- description: 'Заповнити пропуски в реченнях, використовуючи ключові терміни з модуля: причинна, русалка, метаморфоза, готика,
    фатум.'
  focus: Лексика романтичної балади
  items: 5
  type: fill-in
- description: Порівняйте образи головних героїнь у двох баладах. Що спільного в їхніх долях, а що принципово відрізняється?
    Як зображено втручання надприродних сил у кожному творі?
  focus: 'Компаративний аналіз: "Причинна" vs "Тополя"'
  type: note
- description: Чи актуальні сьогодні теми жіночої долі, божевілля та зіткнення з потойбіччям, підняті у ранніх баладах Шевченка?
    Напишіть есе-роздум (400-600 слів), де висловите свою позицію.
  focus: 'Есе: Сучасне прочитання балад Шевченка'
  type: note
cefr_min: C1
connects_to:
