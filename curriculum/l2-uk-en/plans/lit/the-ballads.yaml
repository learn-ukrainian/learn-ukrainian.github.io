objectives:
- Аналізувати жанрові особливості романтичної балади на прикладі творчості Шевченка, порівнюючи її з європейськими та українськими
  фольклорними зразками
- Інтерпретувати ключові образи та мотиви (метаморфоза, божевілля, потойбіччя) в баладах "Причинна", "Тополя", "Утоплена"
- Розрізняти та аргументувати різні критичні підходи до аналізу ранньої творчості Шевченка (народницький vs модерністський)
- Аналізувати мову та поетику балад, визначаючи роль фольклорної лексики, звукопису та синтаксису у створенні художнього ефекту
