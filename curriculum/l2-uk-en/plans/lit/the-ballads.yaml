content_outline:
- points:
  - 'Провокація: Чому молода дівчина в баладах Шевченка стає русалкою, тополею, але майже ніколи — щасливою дружиною? Це трагічна
    доля чи свідомий вибір?'
  - 'Фрагмент з ''Причинної'' про зустріч з русалками. Запитання до студента: це сон, галюцинація чи реальність потойбіччя?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Джерело натхнення — етнографічний запис чи авторська трансформація народних мотивів?'
  - 'Дебат 2: Жанрова природа — це українська народна балада чи європейська "literary ballad" в стилі Ґете і Бюргера?'
  - '[!epistemic-humility] Позиція 1 (народницька): Шевченко — ідеальний виразник народної душі, що лише фіксує фольклор.
    Позиція 2 (модерністська): Шевченко використовує фольклор як "матеріал" для вирішення складних філософських та естетичних
    завдань.'
  section: 'Конфліктна карта: Шевченківська балада: фольклор чи література?'
  words: 900
- points:
  - 'Близьке читання уривків з ''Причинної'': символіка божевілля, образ русалок як месниць і водночас жертв.'
  - 'Аналіз ''Утопленої'': готичні елементи, мотив матері-вбивці, критика патріархального світу через фантастичне.'
  - 'Порівняльний аналіз жіночих доль: чим відрізняється фатальне кохання ''причинної'' від соціальної трагедії ''утопленої''?'
  - '[!decolonization] Балади Шевченка — не просто "український Вальтер Скотт". Це унікальний синтез, де народна демонологія
    стає інструментом для критики соціальної несправедливості, а не лише романтичною декорацією.'
  section: 'Читання: Образи потойбіччя в "Причинній" та "Утопленій"'
  words: 1700
- points:
  - 'Аналіз балади ''Тополя'': перетворення дівчини на дерево як центральна метафора самотності, вірності та трагічного очікування.'
  - 'Стилістичний аналіз: використання народнопісенної лексики (пестливі форми, постійні епітети) та її літературна обробка.'
  - 'Звукопис і ритм: як алітерації та асонанси створюють атмосферу тривоги і таємниці.'
  - '[!myth-buster] Спростування міфу про "простого народного поета". Шевченко — майстер складних синтаксичних конструкцій
    та психологізму, що випереджав свій час.'
  section: 'Мова і поетика: Метаморфоза як художній прийом'
  words: 1500
- points:
  - 'Повернення до розминки: тож чому героїні не знаходять щастя? Відповідь через аналіз понять ''доля'' і ''фатум'' у баладах.'
  - 'Рецепція: як балади сприймали сучасники (критика за ''темноту'' і ''мужицьку мову'') і як їх читаємо ми сьогодні?'
  - 'Від балади до епосу: як містичні експерименти ранніх творів підготували ґрунт для великих історичних поем, напр. "Гайдамаки"?'
  - '[!anti-hagiography] Замість ікони — живий поет. Ранні балади показують Шевченка, який експериментує, шукає свій голос,
    не боїться "страшних" тем і неоднозначних героїв.'
  section: Дискусія та підсумок
  words: 700
focus: Ранні балади Шевченка ('Причинна', 'Тополя', 'Утоплена'), романтичний синкретизм, жанрова трансформація, готичні мотиви
  та народна демонологія
level: LIT
