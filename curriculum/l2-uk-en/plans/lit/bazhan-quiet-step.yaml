content_outline:
- points:
  - 'Провокація: Микола Бажан — єдиний із ключових письменників Розстріляного відродження, хто пережив 1930-ті, став радянським
    академіком і лауреатом Сталінських премій. Як це змінило його мову? І що нам говорить його мовчання?'
  - 'Фрагмент з твору: «І в''яже, і сплітає, і зводить слово в слово, як камінь в камінь муляр...». Про яку творчість іде
    мова?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Інтерпретація творчості. Це герметична, «чиста» поезія, що існує поза політикою (формалістичний підхід)? Чи
    це зашифрований опір і трагедія (постколоніальний підхід)?'
  - 'Дебат 2: Місце в каноні. Бажан — трагічний голос Розстріляного відродження, що змушений був замовкнути? Чи радянський
    класик, що зрадив ідеали авангарду заради виживання?'
  - '[!epistemic-humility] Немає єдиної відповіді. Критики досі сперечаються, чи його пізніші твори є поступкою режиму, чи
    спробою знайти нову, дозволену мову для складних тем.'
  section: 'Конфліктна карта: Геній чи конформіст?'
  words: 900
- points:
  - '«Сліпці»: аналіз фрагментів. Образ кобзарів, що самі себе осліплюють, як метафора долі української інтелігенції.'
  - '«Тихий крок»: повний текст вірша. Читання крізь призму біографії: тихий крок — це крок смерті (НКВС) чи крок власної
    обережності, що дозволила вижити?'
  - '[!decolonization] Бажан, як і Хвильовий, орієнтувався на «психологічну Європу». Його неокласицизм — це спроба вписати
    українську літературу в західний канон, оминаючи Москву.'
  - 'Структура і сюжет: перехід від барокової динаміки ранніх поем до статичної, медитативної лірики — наслідок зовнішнього
    тиску чи внутрішня еволюція?'
  section: 'Читання: Поема «Сліпці» та вірш «Тихий крок»'
  words: 1700
- points:
  - 'Стиль Бажана: «залізна кладка» — монументальність, лексичне багатство, складний синтаксис. Зв''язок із українським бароко.'
  - 'Робота з лексикою: використання архаїзмів, наукової термінології, створення неологізмів (оказіоналізмів).'
  - 'Синтаксис як художній засіб: довгі, багатоярусні речення, що передають складність думки та емоційного стану.'
  - '[!myth-buster] Бажан — не просто «радянський класик». Його мова — це складний сплав авангардних експериментів 1920-х,
    барокової традиції та неокласицизму. Це не мова соцреалізму.'
  - 'Звукопис: аналіз алітерацій та асонансів, що створюють музику вірша, часто всупереч трагічному змісту.'
  section: 'Мова і поетика: «Залізна кладка» слова'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, Бажан — геній, що вижив, чи митець, що зламався? Студенти формулюють власну позицію на
    основі аналізу.'
  - '[!anti-hagiography] Важливо бачити не ікону, а живу людину. Аналіз щоденникових записів та спогадів сучасників, що розкривають
    ціну компромісу.'
  - 'Рецепція: як змінювалося ставлення до Бажана від 1930-х до часів незалежності? Чому його досі «важко» читати в школі?'
  - 'Питання для роздумів: чи може митець бути аполітичним у тоталітарній державі? Чи є мовчання формою опору?'
  section: Дискусія та підсумок
  words: 700
focus: Mykola Bazhan's neoclassicism, the poem "Тихий крок" (Quiet Step), the dilemma of the artist under totalitarianism,
  and the stylistic innovations of the "Executed Renaissance"
level: LIT
module: lit-115
objectives:
- Аналізувати твір Бажана в подвійному контексті: українського авангарду 1920-х та сталінського терору 1930-х
- Досліджувати стилістичні особливості «залізної кладки» Бажана: неокласицизм, складний синтаксис, лексичне багатство
- Формулювати аргументовану позицію в дебатах щодо постаті Бажана: геніальний митець, конформіст, чи трагічна фігура українського
    модернізму?
- Розрізняти формальний, біографічний та постколоніальний підходи до інтерпретації літературного твору
pedagogy: CBI
