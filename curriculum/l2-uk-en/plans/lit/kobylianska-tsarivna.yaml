content_outline:
- points:
  - 'Провокація: Що якби щоденник став романом? Повість Кобилянської — це сповідь, філософський трактат чи історія кохання?'
  - «Я хочу сього — я так хочу!.. І се буде колись моїм, бо я не сиджу, склавши руки, і не опускаю їх безвладно...» — уривок
    зі щоденника героїні, що задає тон усьому твору.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Царівна» — це маніфест українського фемінізму чи ілюстрація до філософії Ніцше? Аналіз аргументів літературознавчих
    шкіл.'
  - 'Дебат 2: Місце твору в каноні. Це «жіноча проза» для вузького кола чи центральний текст українського модернізму, що випередив
    свій час?'
  - '[!epistemic-humility] Інтерпретації творчості Кобилянської (від Франка до Забужко) часто відображають ідеологічні погляди
    самих критиків. Де закінчується текст і починається критик?'
  section: 'Конфліктна карта: Ніцшеанство vs Фемінізм'
  words: 900
- points:
  - 'Аналіз ключових уривків: еволюція героїні від романтичної мрійниці до самодостатньої особистості.'
  - 'Система персонажів як система філософських позицій: Наталка (ідеал), італієць (мистецтво), професор (наука), Орядин (декаданс).'
  - 'Конфлікт як рушійна сила: боротьба за право на інтелектуальне та духовне життя в патріархальному суспільстві.'
  - '[!decolonization] Кобилянська створює українську героїню, яка мислить категоріями європейської культури, спростовуючи
    імперський міф про «провінційність» української літератури.'
  section: 'Читання: Щоденник Наталки Веркович'
  words: 1700
- points:
  - 'Стилістичні інновації: «музичність» прози, використання лейтмотивів, симфонічна структура тексту.'
  - 'Психологізм: потік свідомості, внутрішні монологи та детальний аналіз емоційних станів як основний інструмент.'
  - 'Робота з мовою: введення в літературну мову європейських філософських термінів, психологічної лексики.'
  - '[!myth-buster] Кобилянська — не «співачка буковинської природи», а архітекторка модерної української прози, що свідомо
    працювала з європейськими філософськими течіями.'
  section: 'Мова і поетика: Симфонія душі'
  words: 1500
- points:
  - 'Повернення до розминки: тож що таке «Царівна»? Формулювання студентом власної аргументованої відповіді.'
  - 'Рецепція твору: як сприймали повість сучасники (Франко, Леся Українка) і як її читаємо ми сьогодні?'
  - '[!anti-hagiography] Критичний погляд на елітизм героїні: наскільки її інтелектуальні пошуки були відірвані від реалій
    життя більшості українських жінок того часу?'
  - 'Сучасна актуальність: чи змінився образ «сильної, незалежної жінки» за останні 130 років?'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз повісті «Царівна» Ольги Кобилянської: ніцшеанські мотиви, феміністичний дискурс, стилістичні інновації та образ
  «нової жінки» в контексті європейського модернізму.'
level: LIT
module: lit-059
objectives:
- Аналізувати повість «Царівна» як ключовий текст українського модернізму, співвідносячи його з європейськими філософськими
  та літературними течіями
- Визначати та інтерпретувати стилістичні особливості прози Кобилянської: психологізм, музичність, символізм
- Формулювати аргументовану позицію щодо дебатів навколо творчості Кобилянської (ніцшеанство vs фемінізм, канонічність, модернізм)
- Критично оцінювати образ «нової жінки» в українській літературі, уникаючи агіографічних трактувань
