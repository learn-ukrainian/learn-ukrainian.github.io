objectives:
- Аналізувати роман «Рекреації» як ключовий текст українського постмодернізму та маніфест покоління 90-х
- Визначати та інтерпретувати риси карнавальної культури, іронії та інтертекстуальності у творі
- Пояснювати, як через сміх та гру Андрухович деконструює радянські ідеологічні міфи та стверджує нову українську ідентичність
- Формулювати власну позицію щодо ролі епатажу та провокації в літературі на зламі епох
