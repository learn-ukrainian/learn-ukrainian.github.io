content_outline:
- points:
  - 'Провокація: Чому фестиваль поезії, описаний у 1990 році, став кінцем радянської літератури в Україні?'
  - 'Фрагмент-загадка: «Ніколи, ніколи, ніколи знову з нами цього не буде». Що «це», і чому воно більше не повториться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Рекреації» — це лише карнавальна гра та епатаж, чи це серйозний маніфест покоління, що руйнує старий канон?
    [!epistemic-humility]'
  - 'Дебат 2: Український постмодернізм — це органічний розвиток чи запозичена з Заходу мода? Місце Андруховича у цій дискусії.'
  - 'Критика: Позиція «традиціоналістів», які звинувачували Бу-Ба-Бу в «нарузі над святинями» та «цинізмі».'
  - 'Аргумент «за»: Теза про те, що карнавал і сміх були єдиним способом говорити про свободу в умовах розпаду імперії.'
  section: 'Конфліктна карта: Гра чи маніфест?'
  words: 900
- points:
  - 'Аналіз ключового уривку: Прибуття поетів до Чортополя — алегорія входження нового покоління в українську культуру.'
  - 'Структура роману: Квест-подорож як метафора пошуку ідентичності. Чотири частини як чотири стихії карнавалу.'
  - 'Система персонажів: Поет-Немирич (інтелектуал), Поет-Мацапура (авантюрист), Поет-Хомський (містик) — три іпостасі українського
    митця на зламі епох.'
  - '[!decolonization] Деконструкція радянського міфу: Чортопіль (вигадане місто) як анти-Москва, як простір абсолютної свободи,
    де радянські закони більше не діють.'
  section: 'Читання: Подорож до Свята Воскресаючого Духу'
  words: 1700
- points:
  - 'Стилістичний аналіз: Роль цитат, алюзій, пародій. Як Андрухович «грається» з текстами світової та української літератури.'
  - 'Мова твору: Поєднання високого (філософські пасажі) та низького (суржик, лайка, жаргонізми). Створення ефекту «живої
    мови».'
  - 'Синтаксис: Довгі, барокові речення як спосіб передати потік свідомості та хаотичність карнавалу.'
  - '[!myth-buster] Міф про те, що постмодернізм — це «всеїдність» без правил. Насправді, у «Рекреаціях» кожен елемент — від
    суржику до цитати з Біблії — працює на єдиний художній задум.'
  section: 'Мова і поетика: Естетика цитати та іронії'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, як саме фестиваль поезії в Чортополі «вбив» радянську літературу? Формулюємо відповідь
    на основі аналізу.'
  - 'Рецепція та вплив: Як «Рекреації» змінили український літературний ландшафт? Вплив на творчість Жадана, Ірванця, Подерв’янського.'
  - '[!anti-hagiography] Критичний погляд: Чи не є карнавальна свобода «Рекреацій» втечею від реальності? Чи не заклала вона
    основу для інфантилізації частини сучасної культури?'
  - 'Сучасне значення: Чи актуальна сьогодні ідея «втечі в карнавал»? Як текст читається в умовах повномасштабної війни?'
  section: Дискусія та підсумок
  words: 700
focus: Юрій Андрухович, «Рекреації», український постмодернізм, бу-ба-бу, карнавальна культура, деконструкція радянського
  міфу
