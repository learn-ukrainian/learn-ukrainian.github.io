content_outline:
- points:
  - 'Провокація: Чому ми не віримо пророкам, навіть коли вони кажуть правду? Питання, яке Леся Українка поставила у 1907 році,
    але воно звучить так, ніби написане сьогодні.'
  - 'Уривок для роздумів: "Мій друже, я не знаю, що говорю, я тільки знаю те, що бачу". Що означає бачити правду, яку ніхто
    інший не визнає?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Кассандра — носій трагічної долі, приречена бачити майбутнє, чи раціональний аналітик, що бачить логічні наслідки,
    які інші ігнорують?'
  - 'Дебат 2: Феміністична vs. Національна інтерпретація. Кассандра як символ жінки-інтелектуала у патріархальному світі,
    чий голос нівелюють, vs. Кассандра як алегорія України, чиї попередження про небезпеку ігнорує світ.'
  - '[!epistemic-humility] Критики сперечаються: це драма про неминучість фатуму чи про свободу вибору і відповідальність
    за нього?'
  section: 'Конфліктна карта: Дар чи прокляття знання?'
  words: 900
- points:
  - 'Ключова сцена: розмова Кассандри з Геленом. Протиставлення двох світоглядів: інтуїтивного, трагічного прозріння ("правда")
    проти раціонального, прагматичного оптимізму ("щастя").'
  - 'Аналіз структури: Твір складається не з подій, а з напружених інтелектуальних діалогів. Конфлікт перенесено ззовні всередину
    — у сферу ідей.'
  - '[!decolonization] Леся Українка "деколонізує" античний міф. Вона бере універсальний сюжет і наповнює його українським
    інтелектуальним та етичним змістом, створюючи зброю проти імперського наративу, що привласнює історію.'
  - 'Система персонажів: Кожен персонаж — втілення певної філософської позиції (Гелен — гедоніст-раціоналіст, Деїфоб — мілітарист,
    Поліксена — обивателька).'
  section: 'Читання: Діалоги пророчиці'
  words: 1700
- points:
  - 'Стилістична інновація: "Кассандра" — це драма ідей, а не дій. Леся Українка створює новий жанр для української літератури,
    де головний конфлікт розгортається у свідомості героїв.'
  - '[!myth-buster] Всупереч міфу про "важкість" творів Лесі, її мова в "Кассандрі" — це зразок точності та афористичності.
    Кожна фраза — це концентрована думка.'
  - 'Синтаксис як інструмент: Короткі, уривчасті фрази Кассандри передають її внутрішню напругу, на відміну від довгих, спокійних
    періодів її опонентів.'
  - 'Інтертекстуальність: Леся веде діалог не лише з Гомером, а й з європейською філософією від Платона до Ніцше.'
  section: 'Мова і поетика: Інтелектуальна драма'
  words: 1500
- points:
  - 'Повернення до провокації: Хто такі сучасні Кассандри? Як суспільство реагує на тих, хто говорить незручну правду про
    майбутні загрози?'
  - 'Рецепція твору: Чому "Кассандра" була недооцінена за життя авторки, але стала надзвичайно актуальною у ХХІ столітті?'
  - '[!anti-hagiography] "Кассандра" показує Лесю Українку не як ікону чи "дочку Прометея", а як мислителя європейського масштабу,
    що працює зі складними, болючими питаннями без простих відповідей.'
  - 'Студентська рефлексія: Чи змінилося ваше розуміння поняття "правда" після аналізу цієї драми?'
  section: Дискусія та підсумок
  words: 700
