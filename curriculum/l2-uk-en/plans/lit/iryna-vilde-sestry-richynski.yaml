content_outline:
- points:
  - 'Провокація: Три сестри, три долі. Яку ціну платить жінка за свободу в Галичині 1930-х? Чи можливий вибір поза тріадою
    "монастир-шлюб-самотність"?'
  - Фрагмент внутрішнього монологу однієї з сестер — без імені та контексту, щоб студент спробував вгадати її дилему.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Сестри Річинські» — це насамперед феміністичний твір про жіночу самореалізацію, чи соціально-побутова епопея
    про життя галицької інтелігенції між війнами?'
  - 'Дебат 2: Місце роману в каноні. Чому твір, удостоєний Шевченківської премії, був фактично маргіналізований в УРСР? Як
    змінилося його прочитання після 1991 року?'
  - '[!epistemic-humility] Позиції критиків розходяться: одні бачать у романі апологію традиційних цінностей, інші — прихований
    бунт проти патріархату.'
  section: 'Конфліктна карта: Феміністичний роман чи національна епопея?'
  words: 900
- points:
  - 'Близьке читання ключових уривків: аналіз вибору Катерини (традиція), Ольги (емансипація) та Нелі (бунт).'
  - 'Наративна структура: як Вільде використовує паралелізм та контраст у долях сестер для створення панорамної картини суспільства.'
  - 'Історичний фон: Галичина між двома світовими війнами як повноцінний персонаж роману, що впливає на долі героїнь.'
  - '[!decolonization] Вільде доводить, що українська література створила монументальний європейський роман, спростовуючи
    радянський міф про її "вторинність" та "провінційність".'
  section: 'Читання: Три сестри як три моделі долі'
  words: 1700
- points:
  - 'Психологізм як домінантний прийом: аналіз внутрішніх монологів, непрямої мови та потоку свідомості для розкриття характерів.'
  - 'Роль галицького діалекту: не просто орнамент, а інструмент соціальної та психологічної характеристики персонажів.'
  - 'Іронія та сатира: як Вільде використовує "метелики на шпильках" для критики міщанства та фальшивих ідеалів.'
  - '[!myth-buster] Це не просто "жіноча проза". Вільде використовує складні модерністські техніки, поєднуючи соціальний аналіз
    Бальзака з психологізмом Пруста.'
  section: 'Мова і поетика: Галицький психологізм'
  words: 1500
- points:
  - 'Повернення до розминки: чи дає роман відповідь на питання про ціну жіночої свободи?'
  - 'Рецепція твору: як читачі та критики сприймали роман у 1960-х і як його читають сьогодні?'
  - '[!anti-hagiography] Романтизація "старої доброї Галичини" vs. зображення її як задушливого, патріархального світу. Вільде
    не ідеалізує, а аналізує.'
  - 'Спадщина Вільде: її вплив на сучасне українське жіноче письмо (Оксана Забужко, Марія Матіос).'
  section: Дискусія та підсумок
  words: 700
focus: Епічна сага Ірини Вільде «Сестри Річинські» як вершина галицького психологічного реалізму, аналіз жіночих образів у
  контексті європейського фемінізму, та мовна майстерність письменниці.
