objectives:
- Аналізувати епічну сагу «Сестри Річинські» як зразок галицького психологічного реалізму
- Досліджувати жіночі образи та проблематику жіночої автономії в романі в контексті європейського фемінізму першої половини
  ХХ ст.
- Аналізувати мову та стилістику роману, зокрема використання галицького діалекту та прийомів психологізму.
- Формулювати аргументовану позицію в рамках літературних дебатів щодо твору (феміністичне vs. національне прочитання).
