objectives:
- Аналізувати сюжет, структуру та образи повісті «Маруся»
- Протиставляти архетипи «Марусі» та «Наталки Полтавки» як два полюси української жіночності
- Визначати ключові риси українського сентименталізму на прикладі мови та стилю Квітки
- Критично оцінювати роль твору в процесі емансипації української мови та літератури
