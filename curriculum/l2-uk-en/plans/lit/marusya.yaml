content_outline:
- points:
  - 'Провокація: Чи може сентиментальна повість про смерть закоханих бути актом політичної емансипації? Як «Маруся», твір
    про сльози й покору, стала «адвокатом» української культури в Європі?'
  - 'Цитата без контексту: «Схаменіться, панове, схаменіться! Подивіться на народну нашу мову, — підіть до джерел, себто до
    народу...» — Як ці слова Квітки-Основ''яненка пов''язані з трагічним фіналом його повісті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ідеальна українка — покірна чи активна? «Маруся» Квітки (покора, святість, фатум) vs «Наталка Полтавка» Котляревського
    (боротьба, рішучість, вибір).'
  - 'Дебат 2: Шлях сльози vs шлях сміху. Сентиментальне, ідеалізоване село Квітки vs сатиричне, гротескне село Гоголя. Два
    погляди на українську душу — який виявився більш впливовим?'
  - '[!epistemic-humility] Критики досі сперечаються: чи є Маруся уособленням національного характеру, чи лише вдалим наслідуванням
    європейських сентиментальних зразків?'
  section: 'Конфліктна карта: Сльози чи боротьба? Два полюси української жіночності'
  words: 900
- points:
  - 'Ключовий епізод 1: Сцена сватання. Аналіз весільного обряду, його символізму та ролі в сюжеті.'
  - 'Ключовий епізод 2: Сцена похорону. Похоронний обряд як кульмінація, де народна обрядовість зливається з християнською
    духовністю. Квітка як «євангеліст від народу».'
  - 'Структурний аналіз: Роль долі (фатуму) у сюжеті. Чому автор «вбиває» своїх ідеальних героїв? Трагедія як єдиний можливий
    шлях до катарсису в сентименталізмі.'
  - '[!decolonization] «Маруся» як доказ спроможності української мови обслуговувати «високі» жанри. Твір став інструментом
    легітимації української культури, доводячи її самобутність та глибину всупереч імперській політиці асиміляції.'
  section: 'Читання: Повість «Маруся» — Етнографія як мистецтво'
  words: 1700
- points:
  - 'Сентиментальна лексика: аналіз «емотивів» — слів, що прямо позначають почуття (журба, сльози, серденько, горе).'
  - 'Майстерність димінутивів: Пестливі форми (Марусенько, Василечку, голівонька) не як прикраса, а як головний засіб створення
    інтимного, емоційного світу.'
  - 'Синтаксис катарсису: Риторичні оклики та звертання як спосіб залучення читача до емоційного стану героїв.'
  - '[!myth-buster] Мова Квітки — це не просто «народна мова». Це високо стилізована літературна мова, що імітує народну,
    але підпорядкована чітким законам сентиментальної поетики.'
  section: 'Мова і поетика: Сентименталізм як мовний інструмент'
  words: 1500
- points:
  - 'Повернення до розминки: Як саме «Маруся» стала «адвокатом»? Аналіз історії публікації та рецепції, шлях до європейського
    визнання через французький переклад «Сердешна Оксана» (Париж, 1854).'
  - '[!anti-hagiography] Критичний погляд на архетип: чи не стала «Маруся» (і її покірність) гальмом для розвитку більш активних,
    суб''єктних жіночих образів в українській літературі?'
  - 'Спадщина сентименталізму: Як «шлях сльози» вплинув на подальший розвиток української прози? Які елементи поетики Квітки
    ми бачимо у творчості пізніших письменників?'
  section: 'Дискусія та підсумок: Репутаційний фундамент нової літератури'
  words: 700
focus: Квітка-Основ'яненко's "Marusya" as a foundational text of Ukrainian sentimentalism, the archetype of the "ideal Ukrainian
  woman", and a work that "emancipated" the Ukrainian language for European audiences.
