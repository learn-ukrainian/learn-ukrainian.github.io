content_outline:
- points:
  - 'Провокація: Чи може машина зробити всіх щасливими? Утопія Винниченка — це обіцянка чи попередження?'
  - 'Фрагмент з роману: "Весь необмежений простір всесвіту, всі таємниці його, вся краса, все страхіття його стало близьким,
    рідним, зрозумілим..." — Як текст створює відчуття космічної єдності?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Сонячна машина» — це мрія про ідеальне суспільство рівних і щасливих, чи сатира на тоталітарну ідею «примусового
    щастя»?'
  - 'Дебат 2: Це модерністський філософський роман чи політичний памфлет? Дискусія про художню вартість твору, який сучасники
    часто сприймали як ідеологічний маніфест.'
  - '[!epistemic-humility] Критики досі сперечаються, чи є хаотичність і фрагментарність роману художньою слабкістю чи свідомим
    модерністським прийомом, що віддзеркалює розпад старого світу.'
  section: 'Конфліктна карта: Утопія чи антиутопія?'
  words: 900
- points:
  - 'Аналіз ключових сцен: винайдення машини, поширення «сонячного хліба», бунт мас та створення нової комуни.'
  - 'Система персонажів: Рудольф Штор як ніцшеанський надлюдина, принцеса Еліза як символ старої аристократії, що шукає порятунку.'
  - 'Символіка роману: сонце (джерело енергії і руйнації), машина (технологія і контроль), кров (жертва і оновлення).'
  - '[!decolonization] Винниченко створює український варіант європейського модернізму, полемізуючи з російським футуризмом
    та європейським експресіонізмом, стверджуючи самобутність української літературної думки.'
  section: 'Читання: "Сонячна машина" як експеримент над суспільством'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання наукової термінології з ліричною прозою та газетними штампами.'
  - 'Особливості синтаксису: "телеграфний стиль", уривчасті речення, довгі монологи-потоки свідомості для передачі динаміки
    та хаосу нової епохи.'
  - 'Неологізми та оказіоналізми: як Винниченко розширює мовні межі для опису небачених раніше соціальних та технологічних
    явищ.'
  - '[!myth-buster] Поширений міф: Винниченко-політик переважає Винниченка-письменника. Аналіз мови "Сонячної машини" доводить,
    що його стилістичні експерименти були не менш радикальними, ніж політичні.'
  section: 'Мова і поетика: Стилістичний синкретизм Винниченка'
  words: 1500
- points:
  - 'Повернення до розминки: тож "Сонячна машина" — це обіцянка чи попередження? Формулювання власної позиції на основі аналізу.'
  - 'Рецепція роману: чому "Сонячну машину" було заборонено в СРСР і чому вона викликала такі бурхливі дебати в еміграції?'
  - '[!anti-hagiography] Попри статус "першої утопії", роман критикували за ідеологічну суперечливість та художню нерівність.
    Як ці "вади" впливають на наше сьогоднішнє прочитання?'
  - 'Сучасне значення: наскільки актуальними є питання про технологічний контроль, масову свідомість та ціну щастя, які Винниченко
    поставив понад 100 років тому?'
  section: Дискусія та підсумок
  words: 700
focus: Роман "Сонячна машина" як утопічний експеримент, модерністська проза та предмет літературних дебатів про жанр, ідеологію
  та місце в каноні.
level: LIT
module: lit-070
objectives:
- Аналізувати роман "Сонячна машина" як складне явище українського модернізму, розрізняючи його утопічні та антиутопічні риси
- Інтерпретувати стилістичні експерименти Винниченка (синтаксис, лексика) як свідомий художній метод
- Формулювати аргументовану позицію в літературних дебатах про жанрову природу та ідеологічне спрямування твору
- Критично оцінювати місце роману в українському літературному каноні, враховуючи історію його рецепції та сучасні інтерпретації
