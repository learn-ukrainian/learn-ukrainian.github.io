objectives:
- Аналізувати ключові твори Ліни Костенко в історичному та культурному контексті.
- 'Дослідити стилістичні особливості її поезії: інтелектуальну метафору, афористичність, неокласицистичну форму.'
- Формулювати власну позицію в літературних дебатах щодо творчості шістдесятників.
- Зрозуміти деколонізаційне значення її творчості як форми опору культурній асиміляції та утвердження національної гідності.
