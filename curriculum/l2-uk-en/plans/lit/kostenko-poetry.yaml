content_outline:
- points:
  - 'Провокація: "І все на світі треба пережити, / І кожен фініш – це, по суті, старт". Як ця цитата відображає не лише долю
    поетеси, а й долю України?'
  - 'Питання до роздумів: Чи може поет бути "сумлінням нації"? І якою ціною?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Інтелектуальна поезія Костенко — це втеча від реальності чи найвища форма опору? Позиція 1: ескапізм у "чисте
    мистецтво". Позиція 2: створення альтернативного, нерадянського культурного простору.'
  - 'Дебат 2: Місце в каноні. Чи була Костенко "дозволеним" дисидентом? Дискусія про межі компромісу та роль "внутрішньої
    еміграції".'
  - '[!epistemic-humility] Як оцінювати творчість періоду мовчання? Літературна критика того часу vs сучасні інтерпретації
    — чия оптика є більш адекватною?'
  section: 'Конфліктна карта: Неокласицизм vs Радянський канон'
  words: 900
- points:
  - Близький аналіз ключових уривків з "Марусі Чурай" та "Берестечка". Як Костенко переосмислює історію через індивідуальну
    долю?
  - 'Система персонажів: не герої, а люди в розломі епох. Конфлікт як рушійна сила особистості та історії.'
  - Символізм та архетипи. Образ дороги, саду, пам'яті як спроба віднайти втрачену гармонію.
  - '[!decolonization] Агентність українського героя. Текст як спосіб повернути собі історію, вкрадену імперією. Відмова від
    ролі жертви на користь відповідальності.'
  section: 'Читання: Історичні поеми та філософська лірика'
  words: 1700
- points:
  - 'Стилістичні інновації: інтелектуальна метафора, афористичність, філософська глибина як риси "високого" модернізму.'
  - 'Робота з мовою: поєднання високого стилю (неокласицизм) з розмовною лексикою та синтаксисом.'
  - 'Особливості ритміки: класична форма (ямб, хорей), наповнена новим, трагічним змістом ХХ століття.'
  - '[!myth-buster] "Залізна леді" української поезії? Руйнуємо міф про суворість, аналізуючи інтимну лірику Костенко. Складність
    та багатогранність її поетичного "я".'
  section: 'Мова і поетика: Мова як інструмент гідності'
  words: 1500
- points:
  - 'Повернення до розминки: то якою ціною поет стає "сумлінням нації"? Відповідь на основі проаналізованих текстів.'
  - 'Рецепція творчості: від радянського "мовчання" до національного символу. Вплив на наступні покоління.'
  - '[!anti-hagiography] Світовий контекст: Костенко як частина східноєвропейського дисидентського руху (Гавел, Мілош, Шимборська).
    Уникаємо агіографії та провінційної ізоляції.'
  - 'Питання для рефлексії: Чи змінилось ваше сприйняття ролі поета в суспільстві після цього модуля?'
  section: Дискусія та підсумок
  words: 700
focus: 'Поетична система Ліни Костенко: історіософія, інтелектуалізм, опір конформізму, мова як інструмент гідності.'
