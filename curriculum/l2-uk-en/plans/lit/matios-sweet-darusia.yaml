content_outline:
- points:
  - 'Провокація: Чому найстрашніші речі в історії України часто розказані через мовчання? Чи може мовчання бути гучнішим за
    слова?'
  - 'Цитата з роману без контексту: «Але є такий біль, котрий не годен виплакати ані один чоловік, ані цілий нарід. Такий
    біль можна тільки мовчати».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Психологічний трилер vs. Історична драма. Даруся — жертва сімейної трагедії чи алегорія покаліченої радянською
    владою України?'
  - 'Дебат 2: Література факту чи художня фікція? Наскільки роман є «документом» епохи, а наскільки — авторською міфотворчістю?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у творі точне відтворення історичних реалій, інші — універсальну
    притчу про добро і зло, зраду і спокуту.'
  section: 'Конфліктна карта: Травма індивідуальна чи національна?'
  words: 900
- points:
  - Аналіз нелінійної, мозаїчної структури роману. Як «стрибки» у часі відтворюють механізм роботи травмованої пам'яті.
  - 'Ключовий епізод: розбір сцени, де Даруся «дарує» радянським солдатам інформацію, що веде до загибелі її батька. Аналіз
    мотивів дитини.'
  - 'Система персонажів: Даруся, Іван Цвичок, Михайло. Хто є носієм пам''яті, а хто — забуття? Роль спільноти у збереженні
    та стиранні минулого.'
  - '[!decolonization] Текст як руйнування радянського міфу про «визволителів». Матіос показує НКВС не як армію, а як окупаційну
    силу, що нищить соціальні зв''язки.'
  section: 'Читання: Фрагментована пам''ять "Солодкої Дарусі"'
  words: 1700
- points:
  - 'Мова як персонаж: аналіз гуцульського діалекту, архаїзмів та народної етимології, які створюють унікальну атмосферу твору.'
  - 'Поетика мовчання: Даруся втрачає дар мови не через фізіологічну, а через екзистенційну причину. Як авторка «пише» тишу?'
  - 'Сенсорика тексту: детальний розбір образів, пов''язаних із запахами, смаками, звуками. Як тілесне відчуття замінює слова.'
  - '[!myth-buster] Це не просто «сільська проза». Матіос використовує фольклорні мотиви та діалект не для етнографічної замальовки,
    а для створення модерного неоміфологічного тексту.'
  section: 'Мова і поетика: Стилістика мовчання та гуцульська говірка'
  words: 1500
- points:
  - 'Повернення до розминки: Як роман відповідає на питання про природу болю та мовчання? Формулювання власної позиції з опорою
    на текст.'
  - 'Рецепція твору: Чому «Солодка Даруся» стала бестселером і викликала такі бурхливі суспільні дискусії? Вплив на сучасний
    літературний процес.'
  - '[!anti-hagiography] Чи є Даруся лише невинною жертвою? Аналіз її несвідомої співучасті у трагедії та проблема дитячої
    відповідальності.'
  - 'Сучасна релевантність: Як досвід, описаний у романі, резонує з подіями російсько-української війни після 2014 року?'
  section: Дискусія та підсумок
  words: 700
focus: Літературний аналіз роману, історична травма, колективна пам'ять, мова як зброя і сховок, гуцульський діалект, деконструкція
  радянських міфів.
