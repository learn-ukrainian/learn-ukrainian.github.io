objectives:
- Аналізувати нелінійну структуру роману як художній прийом для зображення травмованої пам'яті
- Інтерпретувати образ головної героїні в психологічному та національно-алегоричному ключах
- Розрізняти та аналізувати стилістичні особливості прози Марії Матіос, зокрема використання діалекту та поетику мовчання
- Формулювати аргументовану позицію щодо деколонізаційного потенціалу твору та його ролі в сучасних дискусіях про історію
