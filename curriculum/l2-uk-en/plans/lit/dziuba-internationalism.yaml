content_outline:
- points:
  - 'Провокація: Чи може інтернаціоналізм бути інструментом національного гноблення? Іван Дзюба стверджував, що так.'
  - 'Цитата без контексту: «Справа не в тому, щоб «поставити на місце» «зухвалий» український націоналізм, а в тому, щоб повернути
    на ленінський шлях партійну і державну політику в національному питанні». Як ви розумієте цю тезу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була праця Дзюби щирою спробою «виправити» радянську систему зсередини, апелюючи до Леніна, чи це була лише
    тактична маска для фундаментальної критики імперії?'
  - 'Дебат 2: Жанрова невизначеність. Це науковий трактат, політичний памфлет чи лист-благання до влади? Як вибір жанру впливає
    на інтерпретацію тексту?'
  - '[!epistemic-humility] Одні дослідники (здебільшого західні) бачили в Дзюбі «націонал-комуніста», тоді як українські дисиденти
    сприймали його як речника національного визволення.'
  section: 'Конфліктна карта: Лояльний ленінець чи прихований дисидент?'
  words: 900
- points:
  - 'Аналіз центральної тези: підміна ленінської національної політики великодержавним російським шовінізмом під гаслами «злиття
    націй».'
  - Розбір фрагменту про «формальність» суверенітету УРСР та інструменталізацію української мови як «декоративного» елемента.
  - 'Система доказів: Дзюба використовує виключно цитати з класиків марксизму-ленінізму та офіційні радянські джерела, щоб
    продемонструвати розрив між теорією та практикою.'
  - '[!decolonization] Праця Дзюби — один із перших прикладів системної деколоніальної критики зсередини СРСР, що відрізняє
    український дисидентський рух від російського, який часто залишався на імперських позиціях.'
  section: 'Читання: Ключові тези «Інтернаціоналізму чи русифікації?»'
  words: 1800
- points:
  - 'Аналіз стилю: холодний, академічний, майже юридичний тон, що контрастує з вибуховим змістом. Використання логіки та фактів
    проти ідеологічних догм.'
  - 'Риторичні стратегії: Дзюба не спростовує опонентів, а доводить їхні тези до абсурду, показуючи їхню внутрішню суперечливість.'
  - 'Термінологічна війна: використання марксистської лексики («буржуазний націоналізм», «пролетарський інтернаціоналізм»)
    для атаки на саму систему.'
  - '[!myth-buster] Міф про те, що Дзюба був «антирадянщиком». На момент написання праці він позиціонував себе як вірний ленінець,
    що бореться з «викривленнями» лінії партії. Саме ця позиція робила його критику такою небезпечною для системи.'
  section: 'Мова і поетика: Публіцистичний стиль як зброя'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви відповісте на питання про інтернаціоналізм як знаряддя гноблення?'
  - 'Рецепція та наслідки: арешт автора, шалене поширення в «самвидаві», переклади за кордоном, використання КДБ у своїх провокаціях.'
  - 'Актуальність сьогодні: Як аргументи Дзюби про русифікацію та «братню дружбу» звучать у контексті сучасної російської
    агресії та пропаганди?'
  - '[!anti-hagiography] Подальша доля Дзюби: публічне покаяння та роки мовчання. Чи применшує це значення його праці? Дискусія
    про ціну компромісу з тоталітарною владою.'
  section: Дискусія та підсумок
  words: 700
focus: 'Трактат Івана Дзюби «Інтернаціоналізм чи русифікація?»: критика радянської національної політики, роль інтелектуала
  в тоталітарній державі, літературна публіцистика як форма опору.'
level: LIT
module: lit-158
objectives:
- Аналізувати працю «Інтернаціоналізм чи русифікація?» як ключовий текст українського шістдесятництва та деколоніальної думки.
- Розрізняти та аргументувати позиції в дебатах щодо жанру та ідеологічної спрямованості твору.
- Застосовувати методику close reading для аналізу публіцистичного стилю та риторичних стратегій Івана Дзюби.
- Формулювати власну позицію щодо актуальності ідей Дзюби в контексті сучасної російсько-української війни.
