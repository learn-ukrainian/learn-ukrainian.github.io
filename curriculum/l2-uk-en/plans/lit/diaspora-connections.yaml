content_outline:
- points:
  - 'Провокація: Чи може письменник, що творить за тисячі кілометрів від України, бути центральною фігурою української літератури,
    а не маргінальною?'
  - 'Цитата з твору (без контексту), що відображає розрив між двома світами: "Тут я чужий, і там мене не ждуть".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи існує єдиний український літературний канон, чи це два паралельні світи — "материковий" і "діаспорний"? Аргументи
    за і проти інтеграції.'
  - 'Дебат 2: Чи є література діаспори "законсервованою" версією України, чи це унікальний синтез, що збагачує національну
    культуру?'
  - '[!epistemic-humility] Позиції критиків: одні бачать у діаспорній літературі "справжню" Україну, вільну від радянського
    тиску; інші — відірвану від реалій, ідеалізовану конструкцію.'
  section: 'Конфліктна карта: Канон діаспори vs. канон метрополії'
  words: 900
- points:
  - 'Аналіз структури: фрагментарність наративу як відображення розірваної ідентичності героя.'
  - 'Система персонажів: конфлікт між поколіннями — тими, хто пам''ятає "старий край", і тими, хто народився в еміграції.'
  - 'Розбір символіки: образ "втраченого дому" та спроби його відтворити в новому світі.'
  - '[!decolonization] Текст як форма опору асиміляції. Боротьба за збереження мови та культурної пам''яті в чужомовному середовищі.'
  - 'Архетипи та міфологічні підтексти: герой як вічний мандрівець, сучасний Одіссей.'
  section: 'Читання: Ключові уривки з Diaspora Connections'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання архаїзмів, діалектизмів (збережених у громаді) та англіцизмів (з нового оточення).'
  - 'Синтаксис туги: довгі, розлогі речення, що імітують потік спогадів, протиставлені коротким, уривчастим фразам про сьогодення.'
  - '[!myth-buster] Це не просто "сумна проза про емігрантів". Це складна робота з мовою як єдиною територією, яку неможливо
    відібрати.'
  - 'Інтертекстуальність: приховані та явні цитати з Шевченка, Франка, Лесі Українки як спосіб вписати себе в тяглість традиції.'
  section: 'Мова і поетика: Мова як батьківщина'
  words: 1500
- points:
  - 'Повернення до розминки: як текст відповідає на питання про центральність/маргінальність автора з діаспори?'
  - 'Рецепція твору: як його сприймали в Україні та в діаспорі на момент публікації, і як це сприйняття змінилося сьогодні?'
  - '[!anti-hagiography] Критичний погляд на ідеалізацію "втраченої України" в діаспорній свідомості, показану в тексті.'
  - 'Сучасна релевантність: як досвід героя резонує з досвідом мільйонів нових українських біженців після 2022 року?'
  section: Дискусія та підсумок
  words: 700
