content_outline:
- points:
  - 'Провокація: Чому перший великий український роман — це історія поразки, а не перемоги? І чому він називається «хроніка»,
    а не «роман»?'
  - 'Цитата без контексту: «Зложити докупи обидва береги Дніпрові, щоб обидва... приклонились під одну булаву!» — Хто це каже
    і чи вдалося йому це?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Два шляхи для України. Полковник Шрам (ідеал козацької честі, державне служіння) проти хуторянина Череваня (приватне
    життя, «своя сорочка ближче до тіла»). Чий погляд переміг?'
  - 'Дебат 2: Роман елітарний чи народний? Погляд Куліша на «чернь» — він засуджує охлократію чи співчуває обдуреному народові?'
  - '[!epistemic-humility] Критики (від Драгоманова до сучасних) звинувачували Куліша в антидемократизмі. Інші (від Зерова)
    бачили в цьому трагедію роз''єднаного суспільства.'
  section: 'Конфліктна карта: Ідеал vs. Прагматизм'
  words: 900
- points:
  - 'Ключовий епізод: вибори гетьмана в Ніжині. Аналіз поведінки головних акторів: трагічного ідеаліста Сомка та демагога-популіста
    Брюховецького.'
  - 'Роль «середнього героя»: Кирило Тур як спостерігач і каталізатор подій, його очима читач бачить хаос ради.'
  - 'Історичний фон vs особиста драма: як переплітаються сюжетні лінії (боротьба за булаву і боротьба за серце Лесі).'
  - '[!decolonization] Роман показує, як внутрішня боротьба за владу та розбрат між козацькими старшинами роблять Україну
    вразливою до зовнішнього втручання (Московії).'
  section: 'Читання: Сцена Чорної ради 1663 року'
  words: 1700
- points:
  - 'Стилістичний фокус: мовна архаїзація. Куліш не відтворює мову XVII ст., а майстерно стилізує її, використовуючи церковнослов''янізми,
    козацькі лексикони та етнографічні деталі.'
  - 'Композиція роману: вплив Вальтера Скотта. Поєднання історичної хроніки, пригодницького роману та любовної історії.'
  - 'Функція пейзажу: природа в романі — не просто фон, а повноцінний персонаж, що відображає душевний стан героїв та долю
    України.'
  - '[!myth-buster] Поширена думка, що Куліш просто скопіював Скотта. Насправді, він творчо адаптував модель історичного роману
    до українського матеріалу, створивши самобутній твір.'
  section: 'Мова і поетика: Вальтерскоттівська модель'
  words: 1500
- points:
  - 'Повернення до розминки: «Чорна рада» — це вирок українцям чи роман-попередження, актуальний досі?'
  - 'Історична філософія Куліша: роман як критика «народоправства» та пошук ідеальної моделі української держави.'
  - '[!anti-hagiography] Постать самого Куліша. Як його пізніші ідеологічні коливання та «москвофільство» впливають на наше
    прочитання його головного твору?'
  - 'Рефлексія: чи змінилося ваше ставлення до понять «народ», «еліта» та «держава» після прочитання роману?'
  section: Дискусія та підсумок
  words: 700
focus: Panteleimon Kulish's "Chorna Rada" as the first Ukrainian historical novel, its Walter Scott influences, debates on
  historical accuracy vs. artistic merit, and its unique linguistic texture.
level: LIT
module: lit-023
objectives:
- Аналізувати ідейно-тематичний зміст та проблематику першого українського історичного роману
- Розрізняти позиції ключових персонажів як уособлення різних шляхів розвитку України
- Оцінювати художні особливості твору, зокрема роль архаїзації мови та вальтерскоттівську модель
- Формулювати аргументовану позицію щодо актуальності роману в контексті сучасної української історії
