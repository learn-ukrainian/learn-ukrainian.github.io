- Аналізувати урбаністичну поезію Богдана-Ігоря Антонича в контексті європейського модернізму
- Пояснювати стилістичні інновації поета, зокрема його метафорику та синтаксис
- Аргументувати деколонізаційне значення творчості Антонича як розриву з народницькою традицією
- Формулювати власну позицію в літературознавчих дебатах щодо місця Антонича в українському каноні
