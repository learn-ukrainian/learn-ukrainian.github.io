content_outline:
- points:
  - 'Провокація: Антонич написав: «Я, закоханий в житті, поганин». Як поет, що оспівував місто, асфальт і техніку, може бути
    «поганином»? Що це — оксиморон чи ключ до його філософії?'
  - 'Короткий уривок з «Червоних ліній» без контексту: «Росте залізо, спів і танець. Росте, як день, новий расанець» — про
    що це? Про завод? Про нову расу? Про мистецтво?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Антонич проти села». Чи є його урбанізм зрадою народницької традиції (Шевченко, Франко), що бачила в селі душу
    нації? Позиція 1: Так, це космополітизм. Позиція 2: Ні, це розширення українського світу, доказ його модерності.'
  - 'Дебат 2: Канонізація «з другого разу». Чому радянська критика спочатку замовчувала, а потім намагалася «приручити» Антонича,
    зробивши його поетом «радості праці»?'
  - '[!epistemic-humility] Літературознавці досі сперечаються: чи був Антонич частиною авангарду, чи його урбанізм — це унікальний,
    окремий шлях модернізму?'
  section: 'Конфліктна карта: Антонич — український поет чи ні?'
  words: 900
- points:
  - 'Close reading поезії «Місто»: аналіз образної системи — «дім обернувся в залізний край», «кучеряві стріхи», «місяць —
    золотий горіх».'
  - 'Наративна структура збірки «Три перстені»: як поет веде читача від примітивного, язичницького сприйняття природи до складного,
    технологічного пейзажу міста.'
  - 'Система персонажів: ліричний герой — не селянин чи козак, а міський інтелектуал, спостерігач, «поет-богач», що збирає
    враження.'
  - '[!decolonization] Антонич руйнує імперський міф про українців як виключно аграрну, відсталу націю. Його поезія — це маніфест
    урбаністичної, модерної української ідентичності.'
  section: 'Читання: Поезія асфальту і заліза'
  words: 1700
- points:
  - 'Стилістичні інновації: введення наукової та технічної лексики в поезію («спіралі», «еліпси», «атоми»).'
  - 'Робота з мовою: використання лемківських діалектизмів не як екзотики, а як органічної частини поетичної мови, що створює
    відчуття «магічного» коріння.'
  - 'Особливості синтаксису: довгі, називні речення, що створюють ефект «кінокадру», статичного, але насиченого деталями образу.'
  - '[!myth-buster] Антонич — не просто «співець природи». Його природа — це метафізична конструкція, де рослини, тварини
    і люди є рівними елементами єдиного буття. Це пантеїзм, а не народництво.'
  section: 'Мова і поетика: Лемківський синтаксис та сюрреалістична метафора'
  words: 1500
- points:
  - 'Повернення до розминки: тож як «поганин» Антонич поєднує любов до життя і любов до «заліза»? Студент формулює відповідь
    на основі аналізу.'
  - 'Рецепція: як сприймали Антонича його сучасники (Донцов, Маланюк) і як його перевідкрили в 60-х роках?'
  - 'Сучасна релевантність: чи є поезія Антонича відповіддю на виклики глобалізації та екологічних криз сьогодні?'
  - '[!anti-hagiography] Попри містичний ореол, Антонич був людиною своєї епохи, не позбавленою суперечностей. Його рання
    творчість несла сліди наслідування, і лише в зрілості він знайшов свій унікальний голос.'
  section: Дискусія та підсумок
  words: 700
