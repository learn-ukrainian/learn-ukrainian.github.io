content_outline:
- points:
  - 'Провокація: "Чому вірші про місто стають зброєю?" — питання про роль поезії у фронтовому Харкові.'
  - 'Фрагмент з вірша Жадана без контексту: "Той, хто довіряв цьому місту, тепер довіряє лише сліпоті..."'
  - Що може означати ця довіра сліпоті в місті, яке щодня бачить руйнування?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Жадан — поет чи репортер? Його тексти — це висока поезія, що працює з вічними темами, чи точна хроніка подій,
    що має журналістську цінність?'
  - 'Дебат 2: "Локальний" чи "національний" канон? Чи є Жадан передусім поетом сходу України (Харків, Донбас), чи його теми
    та мова є універсальними для всієї країни і світу?'
  - '[!epistemic-humility] Літературні критики сперечаються: одні (прихильники "нової критики") аналізують його тексти як
    закриті системи, ігноруючи контекст. Інші (представники cultural studies) бачать у них перш за все соціальний та політичний
    документ.'
  section: 'Конфліктна карта: Поет чи репортер?'
  words: 900
- points:
  - Уважне читання (close reading) ключових віршів циклу "Харківський пейзаж" (оригінальні тексти).
  - 'Аналіз наративної структури: як місто Харків перетворюється з тла на головного героя, що діє, страждає та чинить опір.'
  - 'Система образів: зруйновані будівлі, блокпости, волонтери, сліди від ракет — герменевтика міського простору в стані війни.'
  - '[!decolonization] Тексти Жадана як акт мовної деколонізації. Він стверджує щільну, живу українську ідентичність Харкова,
    руйнуючи імперський міф про "російськомовне місто".'
  section: 'Читання: Цикл "Харківський пейзаж"'
  words: 1700
- points:
  - 'Стилістичні інновації: верлібр (вільний вірш) як єдиний можливий спосіб передати хаотичну, розірвану реальність війни.'
  - 'Лексичний аналіз: поєднання "високої" біблійної лексики з міським сленгом, військовим жаргоном та ненормативною лексикою.
    Аналіз авторських неологізмів (оказіоналізмів).'
  - 'Синтаксис як художній засіб: довгі, "задихані" речення, що імітують потік свідомості та створюють ефект присутності.'
  - '[!myth-buster] Спростування міфу про Жадана як "простого хлопця з народу". Його робота з мовою є продовженням складної
    модерністської та авангардної традиції української літератури ХХ століття.'
  section: 'Мова і поетика: Верлібр і міський сленг'
  words: 1500
- points:
  - 'Повернення до розминки: Як саме поезія Жадана стала інструментом опору, самоідентифікації та психологічної стійкості
    для Харкова?'
  - 'Рецепція творчості: як тексти, написані для "внутрішнього" українського читача, стали частиною світового літературного
    канону про війну.'
  - '[!anti-hagiography] Критичний погляд на "жаданоманію". Чи не затьмарює культ особистості автора його тексти? Де межа
    між поетом та громадським діячем?'
  - 'Питання для рефлексії: Чи змінилось ваше сприйняття Харкова після прочитання цих текстів?'
  section: Дискусія та підсумок
  words: 700
focus: Zhadan's Kharkiv Landscape cycle, poetry as urban cartography, resistance in a frontline city, intertextuality, decolonial
  poetics
level: LIT
module: lit-185
objectives:
- Аналізувати поезію Сергія Жадана через призму літературно-критичних дебатів про роль сучасного мистецтва у суспільстві.
- Виконувати уважне читання (close reading) верлібру, ідентифікуючи його стилістичні, лексичні та синтаксичні особливості.
- Формулювати власну аргументовану позицію щодо деколонізаційного потенціалу сучасної української літератури.
- Критично оцінювати феномен "культу автора" та його вплив на рецепцію художніх творів.
