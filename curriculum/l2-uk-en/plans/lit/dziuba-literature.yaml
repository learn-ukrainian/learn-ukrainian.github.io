objectives:
- Аналізувати працю "Інтернаціоналізм чи русифікація?" в історичному та ідеологічному контексті шістдесятництва.
- Розрізняти та аргументувати різні інтерпретації мотивів та мети автора (лояльна критика vs національний спротив).
- Досліджувати публіцистичний стиль Дзюби як форму інтелектуального опору.
- Формулювати обґрунтовану позицію щодо актуальності деколонізаційних аргументів Дзюби в сучасній Україні.
