content_outline:
- points:
  - 'Провокація: Як книга, написана відданим ленінцем, стала одним із найпотужніших інструментів боротьби з радянською імперією
    і лягла в основу української незалежності?'
  - 'Коротка цитата з тексту Дзюби, що демонструє парадокс: використання ленінських цитат для критики радянської національної
    політики.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був "Інтернаціоналізм чи русифікація?" спробою "виправити" радянський проєкт зсередини (позиція Дзюби на
    суді), чи це був свідомий акт національного спротиву?'
  - 'Дебат 2: Місце твору в каноні. Це насамперед політичний документ, продукт самвидаву, чи повноцінний літературно-публіцистичний
    твір зі власною поетикою?'
  - '[!epistemic-humility] Позиції дослідників розходяться: одні бачать у Дзюбі "наївного комуніста", інші — стратегічного
    мислителя, що використав мову ворога проти нього самого.'
  section: 'Конфліктна карта: Ленініст чи націоналіст?'
  words: 900
- points:
  - Детальний аналіз розділу про "злиття націй" — розбір аргументації Дзюби, що показувала, як СРСР підмінив інтернаціоналізм
    русифікацією.
  - Читання фрагментів, присвячених аналізу спадщини Шевченка, як прикладу маніпуляції національною культурою з боку імперського
    центру.
  - 'Структура доказовості: як Дзюба використовує офіційні радянські дані, статистику та цитати класиків марксизму для побудови
    своєї нищівної критики.'
  - '[!decolonization] Текст Дзюби — це маніфест культурного самоствердження, що доводив право української нації на власну
    мову, історію та шлях розвитку, руйнуючи імперський міф про "старшого брата".'
  section: 'Читання: ''Інтернаціоналізм чи русифікація?'': ключові розділи'
  words: 1700
- points:
  - 'Стилістичний аналіз: Дзюба свідомо використовує суху, академічну, майже юридичну мову, щоб надати своїм тезам максимальної
    об''єктивності та переконливості.'
  - 'Риторика та синтаксис: довгі, складнопідрядні речення, що створюють логічні ланцюги, та точне використання марксистсько-ленінської
    термінології, оберненої проти самої системи.'
  - 'Робота з джерелами: Дзюба не створює неологізмів, а майстерно компілює та інтерпретує існуючі тексти, перетворюючи їх
    на зброю в ідеологічній боротьбі.'
  - '[!myth-buster] Руйнування міфу, що дисидентська література — це лише емоційний протест. Праця Дзюби — приклад інтелектуального,
    холодного та розрахованого опору.'
  section: 'Мова і поетика: Публіцистичний стиль як зброя'
  words: 1500
- points:
  - 'Повернення до провокації: відповідь на питання, як і чому "лоялістський" текст став антирадянським.'
  - 'Рецепція твору: шлях від рукопису для ЦК до самвидаву, публікації на Заході, судового процесу і, нарешті, до канонічного
    статусу в незалежній Україні.'
  - 'Сучасне значення: чому аргументи Дзюби проти русифікації 1965 року звучать напрочуд актуально сьогодні в контексті війни
    та деколонізаційних процесів?'
  - '[!anti-hagiography] Розгляд еволюції поглядів самого Дзюби після ув''язнення та його подальшої ролі в українському культурному
    житті.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз праці Івана Дзюби "Інтернаціоналізм чи русифікація?" як ключового тексту українського дисидентського руху, його
  ролі в деколонізаційній думці та унікального публіцистичного стилю.
