content_outline:
- points:
  - 'Провокація: Чи може поезія бути «національною», не говорячи про націю? Провокативний вірш одного з поетів НЙГ, що ламає
    стереотипи про українську лірику.'
  - 'Загадка: Як група поетів-емігрантів у Нью-Йорку змогла вплинути на літературу в СРСР, перебуваючи за «залізною завісою»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: НЙГ vs. МУР (Мистецький український рух). Чи є митець в першу чергу «відповідальним перед нацією» (позиція МУРу),
    чи його єдина відповідальність — перед мистецтвом (позиція НЙГ)?'
  - 'Дебат 2: Місце в каноні. Це була маргінальна, відірвана від батьківщини емігрантська течія, чи це була справжня, жива
    гілка українського модернізму, що дивом вижила в умовах свободи?'
  - '[!epistemic-humility] Немає єдиної відповіді. Дехто бачить у НЙГ зраду національних ідеалів, інші — єдиний можливий шлях
    для розвитку української літератури у ХХ столітті.'
  section: 'Конфліктна карта: Естетика проти Етики'
  words: 900
- points:
  - 'Аналіз ключових віршів Бойчука: структура, «розбита» логіка, урбаністичні мотиви, відчуження ліричного героя.'
  - 'Герменевтика поезії Емми Андієвської: сюрреалістичні образи, філософські підтексти, міфологізм, спроба створити власну
    реальність через слово.'
  - '[!decolonization] На відміну від соцреалізму, що зводив поезію до агітки, НЙГ стверджувала право української літератури
    бути складною, елітарною, і говорити про універсальні, а не лише вузько-національні, проблеми.'
  - 'Розбір системи образів: місто, тіло, камінь, світло — як ці елементи створюють унікальний поетичний світ.'
  section: 'Читання: Поезія Богдана Бойчука та Емми Андієвської'
  words: 1800
- points:
  - 'Стилістичні інновації: верлібр, розмовна інтонація, «анти-поетичність», навмисна руйнація класичної мелодики українського
    вірша.'
  - 'Контакт зі світовим авангардом: як поезія американських бітників та європейський сюрреалізм вплинули на мову групи.'
  - 'Синтаксис як значення: використання незвичних реченнєвих конструкцій, переносів, пауз для створення нового сенсу.'
  - '[!myth-buster] Поширений міф: НЙГ — це «незрозуміла поезія для обраних». Насправді, це була свідома спроба знайти нову
    мову для опису травматичного досвіду ХХ століття, коли стара мова класиків вже не працювала.'
  section: 'Мова і поетика: Сюрреалізм та мовна інновація'
  words: 1400
- points:
  - 'Повернення до розминки: тож як емігрантська поезія, що свідомо відмовлялася від «служіння нації», врешті-решт послужила
    їй більше, ніж офіційна радянська література?'
  - 'Рецепція та вплив: як НЙГ вплинула на покоління українських поетів 80-90-х (Бу-Ба-Бу) і як її сприймають сьогодні.'
  - '[!anti-hagiography] Попри свою новаторську роль, чи не стала група замкненою, елітарною системою, відірваною від ширшого
    читацького загалу? Критичний погляд на їхню спадщину.'
  - 'Питання для роздумів: Чи потрібна сучасній українській літературі, що бореться за існування, своя «Нью-Йоркська група»
    — автори, що ставлять експеримент вище за «національне замовлення»?'
  section: Дискусія та підсумок
  words: 700
focus: The New York Group of poets as an avant-garde phenomenon in the diaspora (1950-70s), the conflict between modernism
  and tradition, the poetics of exile, and decolonizing Ukrainian literature from abroad.
level: LIT
module: lit-217
objectives:
- Критично оцінювати місце Нью-Йоркської групи в українському літературному каноні у порівнянні з іншими течіями (МУР, соцреалізм).
- Аналізувати поетичну мову, сюрреалістичні образи та стилістичні інновації ключових представників групи.
- Формулювати аргументовану позицію щодо ролі мистецького експерименту та свободи творчості в умовах національно-визвольної
  боротьби.
- Пояснювати, як творчість діаспори сприяла деколонізації української культури.
