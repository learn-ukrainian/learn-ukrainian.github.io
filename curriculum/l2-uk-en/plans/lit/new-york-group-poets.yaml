content_outline:
- section: Вступ та культурний контекст
  points:
  - Нью-Йоркська група як авангардний феномен діаспори 1950-70-х рр.
  - Місце в літературному каноні
  - Чому цей текст важливий сьогодні
  words: 850
- section: 'Аналіз твору: Сюжет та структура'
  points:
  - Ключові поети — Тарнавський, Андієвська, Рубчак, Бойчук
  - Впливи та джерела
  - Авангард як реакція на МУРівський традиціоналізм
  words: 850
- section: Герменевтика та ключові образи
  points:
  - Детальний розбір символіки
  - Система образів і їхня еволюція
  - Архетипи та сюрреалістичні підтексти
  words: 850
- section: Мова, стиль та поетика
  points:
  - Стилістичні інновації авангардної поетики
  - Контакт з американською та европейською поезією
  - Особливості ритміки та синтаксису
  words: 850
- section: Деколонізаційний вимір
  points:
  - Який імперський міф руйнує цей текст?
  - Діаспора як місце свободи і творчості
  - Опір асиміляції та культурне самоствердження
  words: 850
- section: Підсумок та рецепція
  points:
  - Вплив на сучасну українську поезію
  - Світовий контекст групи
  - Питання для дискусії
  words: 750
