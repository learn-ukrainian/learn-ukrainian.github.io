content_outline:
- points:
  - 'Провокація: "Мистецтво чисте і мистецтво для життя — одвічна суперечка двох братів". Як поет, що оспівував "солодкий
    світ", рибальство та класичну гармонію, став офіційним радянським академіком? Чи це зрада ідеалів, чи єдина можлива стратегія
    виживання?'
  - 'Цитата-загадка: "У теплі дні збирання винограду / Її він стрів. На мулах нешвидких / Вона верталась із ясного саду..."
    — що в цих рядках видає поета-неокласика?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Чисте мистецтво" vs "Пролетарська література". Дискусія 1920-х. Позиція неокласиків (Зеров, Рильський) — орієнтація
    на світову класику. Позиція Хвильового — "Геть від Москви!". Позиція пролетарських письменників — мистецтво як інструмент
    класової боротьби.'
  - 'Дебат 2: Рильський — пристосуванець чи рятівник культури? Одна позиція: його пізні твори ("Пісня про Сталіна") — це зрада,
    плата за життя. Інша позиція: ставши офіційною фігурою, він зберіг мову, перекладацьку школу, врятував багатьох колег.'
  - '[!epistemic-humility] Немає простої відповіді на питання про компроміс митця з тоталітарною владою. Ми можемо аналізувати
    вибір, але не судити з позиції нашого часу.'
  section: 'Конфліктна карта: Поет і влада'
  words: 900
- points:
  - 'Текст: Аналіз віршів зі збірок "Синя далечінь", "Крізь бурю й сніг".'
  - 'Філософська лірика: мотиви природи, кохання, життя і смерті як вічні теми, відсторонені від політичної злободенності.'
  - 'Образна система: "солодкий світ", "третя весна" (символ відродження після зими революції), античні мотиви (музи, фавни,
    ясні сади).'
  - 'Структура: Класичні форми (сонет, терцина, олександрійський вірш) як спосіб впорядкувати хаос сучасності.'
  - '[!decolonization] Неокласики доводили, що українська література є повноцінною частиною європейської, а не провінційним
    додатком до російської. Вони апелювали до Гомера і Данте, а не до Пушкіна.'
  section: 'Читання: Поезія "Третьої весни"'
  words: 1700
- points:
  - 'Стилістичні інновації: Синтез класичної форми, барокової образності та модерністської чуттєвості.'
  - 'Лексика: Гармонійне поєднання високого, "книжного" стилю (архаїзми, міфологічні імена) та простої, "земної" лексики (назви
    рослин, побутові деталі).'
  - 'Синтаксис і ритміка: Досконала, виважена структура речень. Класичні розміри (ямб, хорей) створюють відчуття гармонії
    та спокою.'
  - '[!myth-buster] Рильський — це не лише "поет природи". За пейзажами ховається глибока філософська рефлексія про сенс буття,
    роль митця та плинність часу.'
  - 'Інтертекстуальність: Діалог із французькими "парнасцями" (Леконт де Ліль, Ередіа) та символістами (Верлен).'
  section: 'Мова і поетика: Неокласична довершеність'
  words: 1500
- points:
  - 'Повернення до розминки: Тож як "чисте мистецтво" перетворилося на "мистецтво для життя"? Студент формулює свою позицію,
    спираючись на аналіз біографії та текстів.'
  - 'Рецепція: Як змінювалося сприйняття Рильського? "Співучий класик" в УРСР -> "Зрадник" в очах діаспори -> "Складна трагічна
    фігура" в сучасній Україні.'
  - 'Актуальність: Чи може існувати "мистецтво поза політикою" в часи війни? Дискусія на основі вибору, що стояв перед Рильським.'
  - '[!anti-hagiography] Потрібно бачити не лише "великого поета", а й людину, що пережила арешт, допити, страх за родину
    і зробила важкий моральний вибір.'
  section: Дискусія та підсумок
  words: 700
focus: Лірика Максима Рильського періоду неокласицизму, суперечка про "мистецтво для мистецтва" vs. ідеологічне служіння,
  стилістична довершеність, філософська поезія, канон та компроміс.
level: LIT
module: lit-086
objectives:
- Аналізувати лірику Максима Рильського в контексті літературної дискусії 1920-х років та становлення радянського тоталітаризму
- Розрізняти стилістичні особливості поетики неокласицизму (єдність форми і змісту, класичні розміри, інтертекстуальність)
- Формулювати аргументовану позицію щодо проблеми компромісу митця з владою
- Критично оцінювати роль і місце Рильського в українському літературному каноні, враховуючи різні погляди на його творчість
  та біографію
