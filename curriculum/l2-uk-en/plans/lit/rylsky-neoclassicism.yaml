content_outline:
- points:
  - 'Провокація: Як можна писати сонети про античних героїв, коли навколо — революція, війна та терор? Чи є "мистецтво для
    мистецтва" формою опору чи втечею від реальності?'
  - 'Цитата з Рильського (збірка "Під осінніми зорями"): "І тільки те мистецтво буде жити, / Що вгору підіймає чоловіка..."
    — як це гасло суперечить ідеології "пролетарського мистецтва"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Рильський — "співучий класик" радянської доби чи глибоко трагічна фігура, що змушена була йти на компроміс,
    щоб вижити? Порівняння ранньої та пізньої творчості.'
  - 'Дебат 2: Київські неокласики — це європейська модерністська течія чи "внутрішня еміграція" української інтелігенції,
    що не прийняла революцію?'
  - '[!epistemic-humility] Критика розглядає неокласицизм і як вершину українського модернізму (Сергій Єфремов), і як прояв
    "буржуазного націоналізму" (радянська критика 1930-х).'
  section: 'Конфліктна карта: Неокласик чи радянський поет?'
  words: 900
- points:
  - 'Аналіз ключових віршів: close reading сонетів, гекзаметрів, олександрійського вірша. Як форма стає змістом?'
  - 'Система образів: античні міфи, Ренесанс, французькі "парнасці" — як Рильський створює "позачасовий" художній світ.'
  - 'Конфлікт ліричного героя: між жагою досконалості ("clara voce" — ясний голос) та трагічною реальністю "розстріляного
    відродження".'
  - '[!decolonization] Неокласики свідомо орієнтувались на західноєвропейську традицію, щоб вирвати українську літературу
    з "малоросійського" провінціалізму та довести її рівність з іншими європейськими літературами.'
  section: 'Читання: Поезія збірок "Синя далечінь" та "Крізь бурю й сніг"'
  words: 1700
- points:
  - 'Стилістичні інновації: Рильський відкидає авангардну "революційну" недбалість заради філігранної точності слова та образу.'
  - 'Лексика: поєднання високої "книжної" мови (архаїзми, латинізми) з народною лексикою — створення гармонійного синтезу.'
  - 'Синтаксис і ритміка: складні, але прозорі синтаксичні конструкції, що наслідують класичну латинську поезію. Робота з
    канонічними розмірами.'
  - '[!myth-buster] Поширений міф, що неокласики були "аполітичними". Їхня аполітичність була свідомим політичним вибором
    — відмовою служити тоталітарній ідеології.'
  section: 'Мова і поетика: "Класична ясність" як стилістичний ідеал'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є "чисте мистецтво" формою опору? Відповідь студента на основі аналізу долі Рильського та
    неокласиків.'
  - 'Рецепція: як змінювалось ставлення до Рильського від 1920-х до сьогодні? Від "ворога народу" до "класика радянської літератури"
    і до "модерніста".'
  - 'Сучасна релевантність: що може сказати досвід Рильського сучасному українському митцю, який працює в умовах війни?'
  - '[!anti-hagiography] Не ідеалізувати вибір Рильського: аналіз його "радянських" творів (напр., "Пісня про Сталіна") як
    трагічного свідчення ціни виживання в тоталітарній системі.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз поетики київського неокласицизму через творчість Максима Рильського, опір соцреалізму через культ форми та гармонії.
level: LIT
module: lit-085
objectives:
- Аналізувати поетичний твір Максима Рильського в контексті естетичних принципів київського неокласицизму.
- 'Розрізняти стилістичні особливості неокласичної поетики: ясність, гармонійність, орієнтація на класичні форми.'
- Формулювати аргументовану позицію щодо трагічної долі митця в умовах тоталітарного режиму.
- Критично оцінювати деколонізаційне значення орієнтації на європейську культурну традицію як противаги імперському дискурсу.
