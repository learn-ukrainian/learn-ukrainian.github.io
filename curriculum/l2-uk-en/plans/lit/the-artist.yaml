- Аналізувати подвійний талант Шевченка як поета і художника
- Розуміти вплив академічної школи Карла Брюллова на стиль Шевченка
- Обговорювати автобіографічні елементи в повісті "Художник"
- Розпізнавати та пояснювати ключову мистецьку термінологію українською мовою (офорт, світлотінь, композиція)
- Формулювати власну позицію щодо взаємозв'язку живописної та поетичної спадщини Шевченка
