activity_hints:
- description: Визначити, яка з тез належить до аргументів "за" академічну школу, а яка "проти", на основі цитат з модуля.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити правильні терміни (офорт, світлотінь, акварель, композиція) у речення, що описують твори Шевченка.
  focus: Художня термінологія
  items: 4
  type: fill-in
- description: Порівняйте уривок з повісті "Художник", де описується створення картини, та репродукцію однієї з робіт Шевченка
    (напр. "Катерина"). Знайдіть спільні мотиви, настрої та ідеї.
  focus: 'Аналіз: Слово і образ'
  type: note
- description: 'Напишіть коротке есе (400-600 слів) на тему: "Чи можна вважати живопис і поезію Шевченка двома частинами єдиного
    творчого задуму?" Аргументуйте свою позицію прикладами з модуля.'
  focus: 'Есе: Синтез мистецтв у творчості Шевченка'
  type: note
