content_outline:
- points:
  - 'Провокація: Чому найвідоміший український поет міг стати найвідомішим українським художником, але не став? Питання про
    "подвійний талант" Шевченка.'
  - Цитата з повісті "Художник" без контексту, що натякає на внутрішній конфлікт митця.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Вплив Карла Брюллова та академічної школи — це формування таланту чи обрізання крил? Чи "європеїзував" Брюллов
    Шевченка, віддаляючи від народного коріння?'
  - 'Дебат 2: Чому живопис Шевченка залишається в тіні його поезії? Дискусія про місце живопису в національному каноні та
    причини його меншої "промоції".'
  - '[!epistemic-humility] Аргументи "за": академізм дав техніку та вивів у світ. Аргументи "проти": академізм нав''язував
    чужі сюжети та стримував романтичний порив.'
  section: 'Конфліктна карта: Академія vs Самосвідомість'
  words: 900
- points:
  - 'Розширений уривок з повісті: аналіз автобіографічних елементів та образу митця в суспільстві.'
  - 'Close reading: як Шевченко описує процес творчості, навчання в Академії, стосунки з Брюлловим.'
  - '[!decolonization] Проблема мови: чому повість написана російською? Аналіз причин та наслідків цього вибору в контексті
    імперської культурної політики.'
  - Структура повісті як ключ до розуміння внутрішнього світу молодого Шевченка.
  section: 'Читання: Повість «Художник»'
  words: 1700
- points:
  - 'Аналіз технік: портретний живопис (психологізм), офорт та гравюра (драматизм світлотіні), акварелі періоду заслання (документальність
    і ліризм).'
  - 'Стилістична еволюція: від академічного романтизму ранніх робіт до реалізму та критичної документалістики "казахського"
    періоду.'
  - '[!myth-buster] Пейзажі заслання — це не просто "заборонена творчість". Це унікальний антропологічний та мистецький проєкт,
    що фіксував світ, невидимий для імперії.'
  - 'Взаємодія слова та образу: як поетичні мотиви "Кобзаря" з''являються у його графіці та живописі (напр. образ Катерини).'
  section: 'Мова і поетика: Візуальний стиль Шевченка'
  words: 1500
- points:
  - 'Повернення до розминки: то поет чи художник? Аргументована відповідь на основі аналізу модуля — Шевченко-візіонер, що
    мислить образами (візуальними і словесними).'
  - 'Рецепція: як сприймали Шевченка-художника сучасники, і як змінилося це сприйняття сьогодні?'
  - '[!anti-hagiography] Відхід від образу "мученика пензля". Заслання не знищило його як художника, а трансформувало, змусивши
    знайти нову, унікальну візуальну мову.'
  - 'Проєкт для студента: що змінилося у вашому розумінні Шевченка після знайомства з ним як із художником?'
  section: Дискусія та підсумок
  words: 700
