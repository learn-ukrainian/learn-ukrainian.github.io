objectives:
- Аналізувати жанрову неоднозначність твору Тараса Прохаська «Непрості», формулюючи аргументи за та проти визначення його
  як роману
- Інтерпретувати ключові образи та мотиви тексту в контексті створення галицького міфу та філософії місця
- Досліджувати стилістичні особливості прози Прохаська, зокрема роль синтаксису та специфічної лексики у створенні унікальної
  атмосфери
- Критично оцінювати деколонізаційний вимір твору як спробу віднайти автохтонну українську ідентичність
