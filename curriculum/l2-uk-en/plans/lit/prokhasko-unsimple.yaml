content_outline:
- points:
  - 'Провокація: Чи може текст без сюжету, без конфлікту, без чітко окреслених персонажів бути романом? Прохасько називає
    «Непростих» романом. Він помиляється чи ми неправильно розуміємо жанр?'
  - Фрагмент тексту про Карпати, що межує з філософською медитацією — як мова створює ландшафт?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Непрості» — це роман чи збірка есе? Аргументи за (цілісність світу, єдиний наратор) та проти (фрагментарність,
    відсутність фабули).'
  - 'Дебат 2: Творчість Прохаська — це герметична «література для своїх» (галицький локальний текст) чи універсальна філософська
    проза про стосунки людини і місця?'
  - '[!epistemic-humility] Критики досі не дійшли згоди щодо жанрової природи «Непростих», і саме в цій невизначеності полягає
    унікальність тексту.'
  section: 'Конфліктна карта: Жанровий експеримент чи філософська проза?'
  words: 900
- points:
  - 'Розбір ключових уривків: «пошуки себе вдома», опис карпатської природи, міфологія «непростих» людей.'
  - 'Аналіз структури: як фрагменти-«оповідки» складаються в єдиний космос тексту, де час і простір нелінійні.'
  - '[!decolonization] Прохасько створює альтернативний галицький міф, що не є ані «австрійською ностальгією», ані радянською
    пропагандою. Це спроба віднайти глибинну, автохтонну ідентичність через мову і ландшафт.'
  - 'Система персонажів: чи є «непрості» реальними людьми, чи радше архетипами, функціями, станами буття?'
  section: 'Читання: «Непрості» як карта і ландшафт'
  words: 1700
- points:
  - 'Стилістичний аналіз: довгі, медитативні речення, що імітують плин думки, ходу в горах, природний ритм.'
  - 'Лексика: поєднання філософських термінів, діалектизмів, біологічної термінології. Мова як екосистема.'
  - 'Синтаксис як значення: відсутність розділових знаків, потік свідомості — як це впливає на читацьке сприйняття?'
  - '[!myth-buster] Позірна «простота» мови Прохаська — це міф. Насправді це складно організована, багатошарова проза, що
    вимагає повільного, вдумливого читання.'
  section: 'Мова і поетика: Синтаксис як дихання'
  words: 1500
- points:
  - 'Повернення до розминки: тож, «Непрості» — це роман? Формулювання власної позиції на основі аналізу.'
  - 'Рецепція твору: чому «Непрості» стали культовим текстом для покоління 2000-х? Що цей текст говорить про ідентичність
    сучасної України?'
  - 'Сучасне значення: в епоху глобалізації та швидких комунікацій, яка цінність повільної, вкоріненої у місце прози Прохаська?'
  - '[!anti-hagiography] Чи не є «втеча в Карпати» та створення герметичного світу «непростих» формою ескапізму, відмовою
    від взаємодії зі складною соціально-політичною реальністю?'
  section: Дискусія та підсумок
  words: 700
focus: Тарас Прохасько, 'Непрості', есеїстика vs роман, галицький міф, мова як ландшафт, філософія місця
