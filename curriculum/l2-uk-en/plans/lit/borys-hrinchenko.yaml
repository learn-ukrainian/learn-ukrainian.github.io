content_outline:
- points:
  - 'Провокація: Чи може словник бути зброєю? У 1907-1909 роках виходить друком чотиритомний "Словарь української мови" Бориса
    Грінченка. Це — результат десятиліть праці, але водночас — політичний маніфест, що стверджував саме існування окремої
    мови та культури всупереч Емському указу.'
  - 'Запитання до роздумів: Якою ціною створюються такі "культурні фортеці"? І хто такий Борис Грінченко — письменник, вчитель,
    чи перш за все "вартовий рідного слова"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Пріоритет спадщини. Одні дослідники вважають Грінченка передусім видатним лексикографом та етнографом, чия літературна
    творчість (поезія, проза, драматургія) є вторинною, хоч і важливою. Інші наполягають, що його письменницький талант є
    самоцінним, а словникарська робота — лише одна з граней його діяльності.'
  - 'Дебат 2: Мовний пуризм vs народна стихія. Чи був Грінченко "чистильником" мови, який відкидав діалектизми та "неправильні"
    форми? Чи, навпаки, він намагався зафіксувати мову у всій її повноті, спираючись на живе народне мовлення? [!epistemic-humility]
    — його підхід до кодифікації досі викликає дискусії.'
  - '[!anti-hagiography] Поза образом "титана праці" стояв складний, безкомпромісний характер, що часто призводило до гострих
    конфліктів з іншими діячами українського руху (напр., з Франком).'
  section: 'Конфліктна карта: Письменник чи Лексикограф?'
  words: 900
- points:
  - 'Аналіз передмови до "Словаря": як Грінченко формулює мету своєї праці та окреслює кордони української мови. [!decolonization]
    — це пряма відповідь на імперський наратив про "малоросійське наріччя".'
  - 'Close reading вибраних словникових статей: як структура статті (значення, приклади з літератури та фольклору, етимологія)
    створює цілісний образ слова і світу.'
  - 'Уривки з прози ("Серед темної ночі", "Під тихими вербами"): тема просвітництва, соціальної несправедливості та пошуку
    істини. Як мова персонажів відображає їхній соціальний статус та світогляд?'
  - 'Аналіз поезії ("Я люблю, як у хмарах...", "До праці"): мотиви самопожертви, невпинної праці заради народу, роль слова
    як інструменту змін.'
  section: 'Читання: "Словарь" як літературний текст'
  words: 1700
- points:
  - 'Лексикографічні методи Грінченка: опора на величезний корпус текстів (від Котляревського до сучасників), залучення етнографічних
    матеріалів, принцип "народності".'
  - 'Робота з синонімією та діалектизмами: як "Словарь" стандартизував мову, водночас фіксуючи її багатство.'
  - '[!myth-buster] Грінченко не "вигадав" українську літературну мову, а здійснив її монументальну кодифікацію. Він систематизував
    те, що вже існувало в текстах і народному вжитку, надавши мові статусу "повноправної".'
  - 'Стилістичні особливості літературних творів Грінченка: реалізм, увага до деталей побуту, дидактизм, використання народнопоетичних
    образів та синтаксису.'
  section: 'Мова і поетика: Принципи кодифікації'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, словник — це зброя? Аргументована відповідь на основі матеріалу модуля.'
  - 'Рецепція та спадщина: Як "Словарь" Грінченка вплинув на подальший розвиток української мови та літератури у ХХ-ХХІ століттях?
    Чому він залишається актуальним?'
  - 'Сучасний контекст: Як досвід Грінченка — праця в умовах заборон, протистояння асиміляції — резонує з сучасними викликами,
    що стоять перед українською культурою?'
  - 'Рефлексія: чи змінилося ваше уявлення про роль словника та працю лексикографа після цього модуля?'
  section: Дискусія та підсумок
  words: 700
focus: Борис Грінченко як кодифікатор української мови, творець фундаментального "Словаря", та його літературна творчість
  як акт культурного спротиву в умовах імперських утисків.
level: LIT
module: lit-040
objectives:
- Аналізувати внесок Бориса Грінченка у кодифікацію української літературної мови на основі його "Словаря"
- Інтерпретувати його літературні твори як форму культурного спротиву імперській політиці асиміляції
- Критично оцінювати різні наукові позиції щодо ролі Грінченка в українській культурі (письменник vs лексикограф)
- Застосовувати методику close reading до аналізу уривків з прози, поезії та словника
