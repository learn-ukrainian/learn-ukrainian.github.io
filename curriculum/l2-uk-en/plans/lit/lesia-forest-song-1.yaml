content_outline:
- points:
  - 'Провокація: Чи можлива гармонія між людиною і природою, чи трагедія неминуча? «Лісова пісня» дає безкомпромісну відповідь.'
  - Фрагмент діалогу Мавки і Лукаша про "сором хижої волі" — як цей рядок визначає центральний конфлікт твору?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Лісова пісня» — це неоромантична драма чи символістська феєрія? Аналіз аргументів ключових літературних шкіл.'
  - 'Дебат 2: Твір — це універсальна притча про дух і матерію, чи це глибоко національна алегорія про долю України та її митця?'
  - '[!epistemic-humility] Немає єдиного "правильного" прочитання. Кожна епоха, кожна критична школа веде діалог з текстом,
    знаходячи нові сенси, що свідчить про його канонічність.'
  section: 'Конфліктна карта: Драма ідей'
  words: 900
- points:
  - 'Аналіз структури: три дії як три пори року, три етапи стосунків — від весняної ідилії до зимового застигання у вічності.'
  - 'Система персонажів: Мавка як втілення духовності та природи vs Лукаш як представник людського світу, його вагання і зрада.
    Дядько Лев як медіатор.'
  - 'Герменевтика образів: вода (життя і забуття), верба (самотність і смерть), вогонь (пристрасть і очищення), сопілка (голос
    душі).'
  - '[!decolonization] Твір як маніфест культурної самобутності. Леся Українка стверджує цінність української міфології та
    фольклору на противагу імперському наративу про "малоросійську" екзотику.'
  section: 'Читання: Трагедія Мавки і Лукаша'
  words: 1700
- points:
  - 'Жанровий синкретизм: як поєднуються елементи драми, лірики та епосу в унікальному жанрі "драми-феєрії".'
  - 'Музичність тексту: аналіз алітерацій, асонансів, внутрішніх рим та ритмічної організації, що створюють "мелодію" твору.'
  - 'Стилістичне багатство: використання фольклоризмів, діалектизмів Волині, та створення індивідуально-авторських неологізмів,
    що збагачують мову.'
  - '[!myth-buster] Це не просто красива казка для дітей. Це філософський твір, де кожне слово, кожен звук має символічне
    навантаження, а поетика служить розкриттю складних екзистенційних ідей.'
  section: 'Мова і поетика: Симфонія слова'
  words: 1500
- points:
  - 'Повернення до розминки: тож у чому полягає "трагедія неминучості"? Студент формулює аргументовану відповідь.'
  - 'Рецепція твору: як змінювалося сприйняття «Лісової пісні» від прем''єри до радянських інтерпретацій і сучасних екранізацій?'
  - '[!anti-hagiography] Поза хрестоматійним глянцем: як особиста трагедія Лесі Українки (хвороба, неможливість повноцінного
    життя) віддзеркалюється у творі?'
  - 'Питання для рефлексії: чи міг би Лукаш "врятуватися", якби залишився з Мавкою? Чи його трагедія — це трагедія вибору
    людського, а не відмови від духовного?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз драми-феєрії Лесі Українки «Лісова пісня» через призму модерністських дебатів, символізму, та деколоніального
  прочитання.
level: LIT
module: lit-051
objectives:
- Аналізувати ідейно-філософський зміст драми-феєрії «Лісова пісня», визначаючи конфлікт між світом природи і світом людини.
- Характеризувати мовно-стилістичні особливості твору як явища українського модернізму, пояснюючи роль музичності та фольклоризму.
- Формулювати власну позицію в рамках літературознавчих дебатів щодо твору (неоромантизм vs символізм, універсалізм vs національна
  специфіка).
- Інтерпретувати твір у деколонізаційному ключі як акт культурного самоствердження та утвердження цінності національної міфології.
