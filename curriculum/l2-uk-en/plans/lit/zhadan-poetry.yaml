content_outline:
- points:
  - 'Провокація: Жадан — поет війни чи поет любові під час війни? Чи може ніжність бути формою спротиву?'
  - 'Цитата-загадка: "Звідки ти, чорна валко, пташина зграє?" — без контексту. Що ці рядки говорять про епоху та ліричного
    героя?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Жадан — живий класик і частина канону, чи все ще контркультурний бунтар? Дискусія навколо його «мейнстрімізації».'
  - 'Дебат 2: «Поет Сходу» чи «загальнонаціональний поет»? Як регіональна ідентичність Донбасу формує його творчість і як
    її читають в інших регіонах?'
  - '[!epistemic-humility] Критики сперечаються: чи його популярність є результатом літературної якості, чи точного попадання
    в суспільний запит на «голос покоління»?'
  section: 'Конфліктна карта: Канон і контркультура'
  words: 900
- points:
  - 'Close reading: Аналіз кількох ключових віршів (напр., з циклів "Життя Марії", "Тамплієри").'
  - 'Структура збірок: Не просто набір віршів, а концептуальні висловлювання. Наративні зв''язки між текстами.'
  - 'Еволюція ліричного героя: від маргінала 90-х до солдата-добровольця 2020-х.'
  - '[!decolonization] Агентність героя: персонажі Жадана — не жертви обставин, а активні суб''єкти, що чинять опір імперському
    тиску та асиміляції через мову, віру, любов.'
  section: 'Читання: Поезія опору і ніжності'
  words: 1700
- points:
  - 'Стилістичні інновації: робота з верлібром (вільним віршем), специфічна ритміка та інтонація.'
  - 'Лексика: поєднання високого, біблійного стилю з суржиком, арго, неологізмами. Мова як живий, динамічний організм.'
  - 'Синтаксис: довгі, «пророчі» речення, що створюють ефект потоку свідомості та епічного розмаху.'
  - '[!myth-buster] Міф про «простоту» Жадана. За уявною вуличністю мови ховається складна інтертекстуальність, алюзії на
    світову класику та українське бароко.'
  section: 'Мова і поетика: Верлібр, суржик і необароко'
  words: 1500
- points:
  - 'Повернення до розминки: тож як поезія Жадана поєднує любов і війну? Студент формулює відповідь на основі аналізу.'
  - 'Рецепція: як змінювалося сприйняття Жадана від 90-х до сьогодні? Вплив на молодше покоління поетів.'
  - '[!anti-hagiography] Критичний погляд: обговорення не лише сильних сторін, але й типових закидів на адресу поета (самоповтори,
    надмірна патетика).'
  - 'Сучасне значення: Чому саме Жадан став одним із голосів сучасної України у світі?'
  section: Дискусія та підсумок
  words: 700
