objectives:
- Аналізувати поезію Сергія Жадана в культурному та історичному контексті 90-х — 2020-х років
- 'Визначати ключові риси поетики Жадана: верлібр, синтаксис, робота з просторіччям та суржиком'
- Критично оцінювати дебати навколо постаті Жадана (канон vs контркультура, регіональне vs національне)
- Формулювати аргументовану позицію щодо ролі Жадана в деколонізаційних процесах та його місця в сучасному літературному каноні
