content_outline:
- points:
  - 'Провокація: "Як в нації вождя нема, тоді вожді її — поети". Чи може поет бути політичним лідером? Чи повинен?'
  - Фрагмент вірша "Під чужим небом" — виклик долі та відмова від капітуляції
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Маланюк як пророк національної держави (Д. Донцов, Ю. Шерех) vs Маланюк як творець авторитарного, маскулінного,
    антидемократичного національного міфу (сучасна феміністична та постколоніальна критика).'
  - 'Дебат 2: Канонізація Маланюка. Чи був він центральною фігурою, чи лише одним із "Празької школи"? Як його рецепція змінилася
    після 1991 року?'
  - '[!epistemic-humility] Позиція самого Маланюка була складною: він бачив себе "співцем імперії", але імперії духу, а не
    політичного утворення.'
  section: 'Конфліктна карта: ''Імператор строф'' чи творець токсичного міфу?'
  words: 900
- points:
  - 'Повний текст вірша з коментарями: вибір між дією (стилет) і мистецтвом (стилос) як центральна проблема української історії.'
  - 'Маланюк знімає дилему: стилос стає стилетом, слово — зброєю.'
  - 'Аналіз образної системи: Еллада, степ, варяги — творення "великого наративу" української історії, що протистоїть імперському.'
  - '[!decolonization] Маланюк свідомо вириває Україну з російського культурного поля, вписуючи її в античний, європейський
    контекст. Це не "братній народ", а інша цивілізація.'
  section: 'Читання: Аналіз ''Стилет чи стилос?'''
  words: 1700
- points:
  - 'Стилістика Маланюка: "скульптурна" мова, тяжіння до карбованих, лаконічних формулювань. Необароко.'
  - 'Аналіз ключових метафор: "залізо", "камінь", "криця" — поетизація волі, сили, державної міці.'
  - 'Неологізми та архаїзми: використання слів "державність", "чорнозем", "варяг" для створення високого, епічного стилю.'
  - '[!myth-buster] Маланюк — не лише "поет-трибун". Аналіз його інтимної, пейзажної лірики ("Вже вечір. Степ. І ти — одна..."),
    трагізм вигнанця.'
  section: 'Мова і поетика: Скульптурна мова і ''залізна'' метафора'
  words: 1500
- points:
  - 'Повернення до розминки: Як Маланюк відповів на питання про роль поета? Аргументована відповідь на основі проаналізованих
    текстів.'
  - 'Рецепція творчості: заборонений в СРСР, канонізований в діаспорі, переосмислений в незалежній Україні. Як змінювалося
    наше розуміння Маланюка?'
  - '[!anti-hagiography] Критичний погляд: чи не є його елітарна, "аристократична" візія України небезпечною в XXI столітті?
    Обговорення сильних і слабких сторін його ідеології.'
  - 'Сучасна релевантність: чому Маланюка так багато цитують під час російсько-української війни?'
  section: Дискусія та підсумок
  words: 700
focus: Поезія Євгена Маланюка, історіософська лірика, концепт «Малоросії», вольовий націоналізм, необароковий стиль
level: LIT
module: lit-149
objectives:
- Аналізувати історіософську лірику Євгена Маланюка в контексті "Празької школи" та європейського модернізму
- Формулювати власну позицію в дебаті щодо ролі Маланюка в українському каноні
- Розрізняти поетичний стиль Маланюка (необароко) та його політичну ідеологію (вольовий націоналізм)
- Застосовувати деколонізаційний підхід до аналізу текстів, що борються з імперськими наративами
pedagogy: CBI
persona:
  role: Старший філолог, який бачив десятки "пророків". Поважає масштаб Маланюка, але постійно ставить під сумнів його ідеологеми,
    змушуючи відділяти поетичну велич від політичної програми.
  voice: Senior-Philologist-Skeptic
phase: LIT.4
