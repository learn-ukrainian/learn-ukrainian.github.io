activity_hints:
- description: Кому належить теза? Розподіліть аргументи щодо Сосюри між позиціями "щирий комуніст" та "прихований націоналіст".
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставте в уривки з віршів пропущені слова, характерні для стилю поета (епітети, метафори, ідеологеми).
  focus: Мова Сосюри
  items: 5
  type: fill-in
- description: Прочитайте діалог двох Володьок. Визначте, які цінності відстоює кожен з них. Чия аргументація здається вам
    більш переконливою і чому?
  focus: Аналіз уривка з поеми "Два Володьки"
  type: note
- description: На основі аналізу творчості Сосюри напишіть есе (400-600 слів) на тему "Трагедія митця в тоталітарній державі".
    Використовуйте поняття "конформізм", "компроміс", "внутрішня еміграція".
  focus: 'Есе: Трагедія митця в тоталітарній державі'
  type: note
