objectives:
- Аналізувати поезію Володимира Сосюри в контексті розстріляного відродження та сталінського терору
- Визначати стилістичні особливості лірики Сосюри, зокрема її пісенність та використання ідеологічних кліше
- Критично оцінювати трагедію "розщепленого суб'єкта" як наслідок колоніальної політики СРСР в культурній сфері
- Формулювати власну аргументовану позицію в літературній дискусії щодо постаті Сосюри
