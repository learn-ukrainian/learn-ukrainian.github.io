content_outline:
- points:
  - 'Провокація: "Так ніхто не кохав. Через тисячі літ лиш приходить подібне кохання". Чи міг автор цих рядків написати поему,
    де один його ліричний герой вбиває іншого?'
  - Фрагмент з поеми «Два Володьки» без контексту, де комунар вбиває націоналіста — хто ці люди і чому один з них має померти?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сосюра — щирий комуніст чи прихований націоналіст? Аргументи "за": служба в Червоній армії, численні партійні
    вірші. Аргументи "проти": служба в армії УНР, поема "Мазепа", розгромна критика за вірш "Любіть Україну".'
  - 'Дебат 2: Місце Сосюри в каноні. Радянський канон: зразковий пролетарський поет. Пострадянський канон: символ трагедії
    митця в тоталітарній системі. Де правда?'
  - '[!epistemic-humility] Неможливо дати однозначну відповідь. Сосюра — це живий нерв епохи, його суперечності — це суперечності
    самого українського XX століття.'
  section: 'Конфліктна карта: Поет-комуніст чи національний класик?'
  words: 900
- points:
  - 'Повний текст або ключові фрагменти поеми: діалог двох Володьок — комунара і націоналіста.'
  - 'Аналіз системи персонажів: чи є ці фігури алегоріями, чи це реальні частини розщепленої свідомості автора?'
  - Сюжет братовбивства як метафора громадянської війни та внутрішнього конфлікту поета, змушеного обирати між "двома Українами".
  - '[!decolonization] Трагедія Сосюри — це не унікальний психологічний казус, а типовий приклад "колоніального розщеплення
    свідомості", нав''язаного українській інтелігенції радянською імперією.'
  section: 'Читання: Поема «Два Володьки» — розщеплення суб''єкта'
  words: 1700
- points:
  - 'Аналіз стилю: як у творчості Сосюри поєднується ніжна, пісенна, майже фольклорна лірика з грубою, плакатною мовою радянських
    ідеологем?'
  - 'Розбір синтаксису: прості, виразні конструкції в інтимній ліриці vs. ускладнені, риторичні фігури в офіційних одах.'
  - 'Лексичний аналіз: використання народної мови, зменшувально-пестливих суфіксів поряд із радянськими новомовами (оказіоналізмами)
    та канцеляризмами.'
  - '[!myth-buster] Сосюра — не просто "співець кохання". Його мова — це поле битви, де естетика бореться з ідеологією, іноді
    перемагаючи, а іноді — трагічно програючи.'
  section: 'Мова і поетика: Пісенна лірика та ідеологічна мова'
  words: 1500
- points:
  - 'Повернення до розминки: то як же "поет кохання" став "поетом братовбивства"? Формулювання відповіді на основі аналізу
    поеми та біографії.'
  - 'Рецепція творчості: як сприймали Сосюру сучасники (від любові до ненависті)? Як його оцінюють сьогодні?'
  - '[!anti-hagiography] Чи є виправданням для співпраці з тоталітарним режимом "складні часи"? Дискусія про межі компромісу
    для митця.'
  - 'Сучасна релевантність: чи актуальний сьогодні конфлікт між національною ідентичністю та універсальними ідеологіями?'
  section: Дискусія та підсумок
  words: 700
focus: Володимир Сосюра, поема "Два Володьки", конфлікт комуністичної ідеології та національної ідентичності, поетика "розщепленого
  суб'єкта"
