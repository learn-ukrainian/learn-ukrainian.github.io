objectives:
- Аналізувати соціальні, культурні та особистісні фактори, що уможливили викуп Тараса Шевченка з кріпацтва
- Проводити детальний філологічний аналіз ключових поезій з першого видання "Кобзаря" (1840)
- Розрізняти та аргументувати різні літературно-критичні позиції щодо феномену Шевченка
- Деконструювати агіографічні міфи навколо постаті молодого Шевченка, розглядаючи його в історичному та культурному контексті
