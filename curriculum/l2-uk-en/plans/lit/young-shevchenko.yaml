activity_hints:
- description: Розрізнити аргументи, що представляють свободу Шевченка як юридичну транзакцію vs як національно-романтичне
    пробудження. Визначте, яка позиція кому належить.
  focus: 'Конфліктна карта: Дебати про свободу'
  items: 6
  type: quiz
- description: Заповнити пропуски в уривках з поезій словами та виразами, проаналізованими в розділі "Мова і поетика".
  focus: Лексика "Кобзаря"
  items: 8
  type: fill-in
- description: Напишіть есе (400-600 слів), аналізуючи, як у поезії "Думи мої, думи мої" відображено психологічний стан автора
    на порозі свободи та народження нової української літературної свідомості.
  focus: 'Есе: Аналіз "Думи мої, думи мої..."'
  type: note
- description: Порівняйте автопортрет Шевченка 1840 року з портретом Жуковського роботи Брюллова. Що ці твори говорять про
    статус, амбіції та самосприйняття обох митців?
  focus: 'Порівняльний аналіз: Шевченко vs Брюллов'
  type: note
cefr_min: C1
connects_to:
- lit-12
- lit-17
content_outline:
- points:
  - 'Провокація: Лотерейний квиток ціною 2500 рублів. Для Карла Брюллова — ціна одного портрета. Для Тараса Шевченка — ціна
    свободи. Як ця транзакція перетворила кріпака на національного пророка?'
  - 'Цитата з листа без контексту: "Живу, учусь, нікому не кланяюсь і нікого не боюсь, окроме Бога — велике щастя бути вольним
    чоловіком". Що стоїть за цими словами?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Викуп — це акт милосердя чи інструмент імперської асиміляції? Позиція 1: Російські художники та аристократи
    (Жуковський, Брюллов) врятували унікальний талант. Позиція 2: "М''яка сила" імперії, що намагалася інтегрувати українського
    генія у свій культурний простір, відірвавши від народного коріння.'
  - 'Дебат 2: "Кобзар" 1840 року — це естетичний вибух чи соціологічний феномен? Позиція 1: Поезії були настільки новаторськими
    та досконалими, що успіх був неминучим. Позиція 2: Успіх "Кобзаря" зумовлений запитом на "народність" у тогочасній імперії
    та зростанням української національної свідомості.'
  - '[!epistemic-humility] Ми ніколи не дізнаємося "справжніх" мотивів Брюллова і Жуковського, але можемо аналізувати наслідки
    їхнього вчинку для української культури.'
  section: 'Конфліктна карта: Анатомія свободи'
  words: 900
- points:
  - Повний текст вірша, що відкривав перший "Кобзар" — маніфест молодого поета.
  - 'Аналіз наративної структури: звернення до "дум", метафора "дітей", мотив самотності та туги за Україною. Чому поет, здобувши
    свободу в столиці, пише про "чужину"?'
  - 'Символізм образу "вітру з України": не просто ностальгія, а єдиний канал зв''язку з джерелом натхнення і легітимності.'
  - '[!decolonization] На відміну від російських поетів, що оспівували імперію, Шевченко з перших рядків позиціонує себе як
    голос бездержавної, але не безкультурної нації. Його "столиця" — в Україні.'
  section: 'Читання: "Думи мої, думи мої..." (1840)'
  words: 1700
- points:
  - 'Стилістичний аналіз: як Шевченко поєднує "високий" романтичний стиль (думи, слава, доля) з "низькими" народними елементами
    (пісенна ритміка, фольклорні епітети).'
  - 'Неологізми та індивідуальний стиль: аналіз унікальних Шевченкових слів та виразів, що не мали аналогів у попередній літературній
    традиції.'
  - 'Синтаксис як художній засіб: використання інверсій, риторичних питань та звертань для створення емоційної напруги та
    динаміки.'
  - '[!myth-buster] Шевченко — не "простонародний поет". Він свідомо конструював нову літературну мову, синтезуючи розмовну
    стихію, церковнослов''янізми та власні інновації. Це була високоінтелектуальна робота.'
  section: 'Мова і поетика: Народна мова як висока поезія'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, що зробило Шевченка — геній, випадок, солідарність, чи все разом? Студент має сформулювати
    власну відповідь, спираючись на аналіз модуля.'
  - 'Історія рецепції: як сприйняли "Кобзар" сучасники (від захоплення до зневаги "мужицькою мовою"). Як змінилося сприйняття
    Шевченка за 200 років?'
  - '[!anti-hagiography] Деконструкція міфу про "Кобзаря" як пророка. У 1840 році Шевченко — молодий, амбітний художник, що
    шукає слави та визнання. Образ "пророка" буде сконструйований пізніше — і ним самим, і його послідовниками.'
  - 'Сучасне значення: Чому історія викупу Шевченка залишається актуальною для сучасної України, де культура знову бореться
    за існування?'
  section: Дискусія та підсумок
  words: 700
focus: 'The making of a poet: from serfdom to "Kobzar", the role of patronage, and the birth of a national literary voice'
