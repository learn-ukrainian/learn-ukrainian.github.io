content_outline:
- points:
  - 'Провокація: Як може текст, що складається з болю, мовчання і смерті, бути одним з найвищих досягнень української модерної
    прози? Чи може краса бути абсолютно трагічною?'
  - Фрагмент новели "Новина" без контексту — студент має вгадати, про яку подію йдеться і що відчуває персонаж.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Стефаник — останній великий народник-реаліст чи перший послідовний український модерніст-експресіоніст?'
  - 'Дебат 2: Його новели — це соціологічний документ про злиденне галицьке селянство чи універсальна драма людського існування,
    що виходить за межі часу і місця?'
  - '[!epistemic-humility] Критична рецепція: Іван Франко бачив у ньому реаліста, Леся Українка — модерніста. Сучасні дослідники
    сперечаються про екзистенційні та постколоніальні виміри його творчості.'
  section: 'Конфліктна карта: Модернізм чи Етнографія?'
  words: 900
- points:
  - 'Детальне читання новели "Камінний хрест": аналіз сюжету як ритуалу прощання з батьківщиною, символіка хреста.'
  - 'Аналіз структури: редукція зовнішньої дії до мінімуму, фокус на внутрішньому стані персонажів.'
  - 'Система персонажів: трагічні батьки, зайві діти, самотні вдівці — галерея екзистенційної самотності.'
  - '[!decolonization] Стефаник проти російського "народничества": його селянин — не об''єкт для жалю чи ідеалізації, а трагічний
    суб''єкт з глибоким внутрішнім світом, що кидає виклик імперському погляду.'
  section: 'Читання: Новели з "Синьої книжечки"'
  words: 1700
- points:
  - 'Стилістичні інновації: сказ, потік свідомості, драматизація епосу. Як Стефаник створює ефект присутності?'
  - 'Діалектизми: не етнографічний запис, а інструмент для створення автентичного, "щільного" мовлення, що передає не лише
    сенс, а й саму матерію життя.'
  - 'Синтаксис мовчання: роль пауз, незакінчених речень, повторів у передачі станів, які неможливо висловити.'
  - '[!myth-buster] Лаконізм Стефаника — це не простота, а складна, витончена техніка редукції, що вимагає від читача активного
    співтворення сенсу.'
  section: 'Мова і поетика: Лаконізм як мистецтво невимовного'
  words: 1500
- points:
  - 'Повернення до розминки: Як трагедія стає високим мистецтвом? Відповідь на основі аналізу поетики Стефаника.'
  - 'Рецепція та вплив: як "Синя книжечка" вплинула на подальший розвиток української прози ХХ століття (від Хвильового до
    сучасних авторів).'
  - 'Сучасне значення: чому Стефаник, письменник межі ХІХ-ХХ століть, виявився настільки актуальним для України в ХХІ столітті,
    що переживає власні екзистенційні трагедії?'
  - '[!anti-hagiography] Уникаючи романтизації страждання, ми аналізуємо його як клінічний, безжальний спостерігач — так само,
    як це робив сам Стефаник, створюючи свою "анатомію трагедії".'
  section: Дискусія та підсумок
  words: 700
focus: Vasyly Stefanyk's "Blue Book", literary modernism, psychological novella, laconic style, peasant tragedy, decolonization
  through aesthetics
level: LIT
module: lit-062
objectives:
- Аналізувати новели Стефаника як модерністський текст, розрізняючи його від народницької прози
- Визначати ключові риси поетики Стефаника: лаконізм, психологізм, драматизм, роль діалекту
- Формулювати аргументовану позицію щодо літературно-критичних дебатів навколо творчості письменника
- Аргументувати деколоніальне значення творчості Стефаника як утвердження суб'єктності українського селянина та української
  літературної традиції
