objectives:
- Аналізувати карнавальну культуру та роль тілесного низу в "Енеїді", використовуючи концепцію Бахтіна
- Класифікувати гастрономічну та есхатологічну лексику поеми як ключовий елемент бурлескної поетики
- Інтерпретувати сатиру на соціальні вади через аналіз сцен у пеклі та системи покарань
- Визначати місце "Енеїди" у європейській традиції травестії та її роль у становленні нової української літератури
