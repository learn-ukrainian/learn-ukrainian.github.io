content_outline:
- points:
  - 'Провокація: Чому в українському пеклі так багато говорять про їжу? Котляревський як перший український фуд-блогер чи
    філософ тілесності?'
  - Фрагмент з опису пекла, де грішники караються через їжу — без контексту, як загадка.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Енеїда — це травестія (пародіювання високого) чи бурлеск (використання низького стилю для серйозних тем)?'
  - 'Дебат 2: Тілесний низ — це просто грубий гумор чи філософська концепція за Бахтіним (карнавальна культура, що стверджує
    життя через смерть та оновлення)?'
  - '[!epistemic-humility] Позиція формалістів (Зеров) проти позиції культурно-історичної школи (Єфремов) щодо ролі "низьких"
    тем у поемі.'
  section: 'Конфліктна карта: Сміх над святим чи народний реалізм?'
  words: 900
- points:
  - 'Аналіз сцени бенкету в Дідони (Частина II): гіперболізація, деталізація, їжа як показник достатку та культурний код.'
  - 'Аналіз сцени спуску до пекла (Частина III): поминальний обряд як продовження бенкету, сміх над смертю.'
  - 'Система персонажів: як через їжу та покарання розкриваються характери богів, героїв та грішників.'
  - '[!decolonization] "Енеїда" як маніфест культурної самодостатності: використання народної мови та побуту для створення
    національного епосу всупереч імперському канону класицизму.'
  section: 'Читання: Бенкет у Дідони та суд у Пеклі'
  words: 1700
- points:
  - 'Словник Шлунку: аналіз лексики на позначення страв (борщ, галушки, ковбаса), напоїв та процесу їх споживання (їсти, пити,
    жерти).'
  - 'Словник Гріха та Покарання: лексика пекла, страждання, категорії грішників як сатира на соціальні вади тогочасної імперії.'
  - 'Стилістичні прийоми: використання синонімічних рядів, накопичення деталей (принцип "і того, і другого, і ще") для створення
    ефекту надмірності.'
  - '[!myth-buster] Котляревський — не просто "зачинатель" літератури, а свідомий експериментатор, що перетворює народну мову
    на потужний мистецький інструмент.'
  section: 'Мова і поетика: Гастрономічний та есхатологічний лексикон'
  words: 1500
- points:
  - 'Повернення до розминки: тож чому їжа є центральною метафорою і в раю (бенкет), і в пеклі "Енеїди"?'
  - 'Філософія тілесного низу: як через їжу, секс і смерть поема утверджує ідею вітальності, безсмертя народу.'
  - 'Рецепція твору: як "Енеїду" читали сучасники і як її інтерпретують сьогодні?'
  - 'Зв''язок із сьогоденням: чи можна вважати сучасні меми про війну та побут продовженням карнавальної сміхової культури
    Котляревського?'
  - '[!anti-hagiography] Деконструкція образу "веселого" Енея — аналіз його вчинків, що виходять за межі простого "парубка
    моторного".'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз бенкету та пекла в "Енеїді": гастрономічна лексика, тілесний низ, бурлескна сатира, карнавальна культура'
