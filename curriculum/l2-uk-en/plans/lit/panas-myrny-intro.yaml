content_outline:
- points:
  - 'Провокація: Чи може чиновник Російської імперії написати головний анти-імперський роман? Панас Мирний — подвійне життя
    як літературна стратегія.'
  - 'Запитання: Чому роман, написаний у XIX столітті про селянське життя, досі викликає запеклі суперечки і є обов''язковим
    для вивчення?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Панас Мирний — "народний" письменник-реаліст, що лише фіксував соціальні проблеми (позиція радянського літературознавства)
    vs. модерний психолог, що досліджував екзистенційні глибини "пропащої сили".'
  - 'Дебат 2: "Хіба ревуть воли..." — це твір про класову боротьбу чи про національний спротив? Дискусія між соціальною та
    національно-визвольною інтерпретаціями.'
  - '[!epistemic-humility] Як один і той самий текст міг одночасно бути дозволеним у СРСР і надихати дисидентів? Розглядаємо
    різні лінзи інтерпретації.'
  section: 'Конфліктна карта: Реаліст чи Революціонер?'
  words: 900
- points:
  - 'Ключовий уривок: еволюція Чіпки Варениченка від "шукача правди" до розбійника. Аналіз внутрішніх монологів та авторських
    коментарів.'
  - 'Система персонажів: Чіпка, Грицько, Галя "Повія", Мотря — як вони представляють різні моделі виживання (і загибелі) в
    умовах колоніального гніту.'
  - 'Структура роману: чотири частини як чотири етапи трагедії. Чи є сюжетна лінія Максима Ґудзя відхиленням чи ключем до
    розуміння цілого?'
  - '[!decolonization] Текст як руйнування імперського міфу про "мирного, пасивного малороса". Мирний показує, що воли ревуть,
    коли ясла порожні, — це пряма загроза імперії.'
  section: 'Читання: Роман «Хіба ревуть воли, як ясла повні?»'
  words: 1700
- points:
  - 'Стилістичні інновації: введення живої народної мови та діалектизмів не як екзотики, а як основного інструменту для характеристики
    персонажів.'
  - 'Психологізм: як Мирний використовує невласне-пряму мову для занурення читача у свідомість героїв.'
  - 'Синтаксис як характеристика: порівняння мови Чіпки (емоційна, уривчаста) та мови чиновників (канцелярська, бездушна).'
  - '[!myth-buster] Панас Мирний — не просто "співець селянської долі". Це майстер складної психологічної прози, що стоїть
    в одному ряду з європейськими реалістами.'
  section: 'Мова і поетика: Народна мова та психологічний реалізм'
  words: 1500
- points:
  - 'Повернення до розминки: чи є "подвійне життя" Панаса Мирного зрадою чи необхідною умовою для створення великої літератури
    в умовах бездержавності?'
  - 'Рецепція твору: як змінювалося сприйняття Чіпки — від "пропащої сили" до "класового героя" і "жертви системи".'
  - '[!anti-hagiography] Чи можна виправдати злочини Чіпки його важкою долею? Дискусія про межі моральної відповідальності
    та соціальний детермінізм.'
  - 'Сучасна релевантність: що історія Чіпки говорить нам про справедливість, помсту та боротьбу із системою в сучасній Україні?'
  section: Дискусія та підсумок
  words: 700
focus: Панас Мирний, соціально-психологічний роман, "Хіба ревуть воли, як ясла повні?", реалізм, деколоніальне прочитання
