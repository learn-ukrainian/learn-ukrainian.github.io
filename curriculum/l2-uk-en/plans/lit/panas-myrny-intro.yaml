objectives:
- Критично аналізувати соціально-психологічний роман "Хіба ревуть воли, як ясла повні?" у його історичному та культурному
  контексті
- Розрізняти та аргументувати різні підходи до інтерпретації твору (соціальний, національний, психологічний)
- Досліджувати стилістичні особливості прози Панаса Мирного, зокрема використання народної мови та прийоми психологізму
- Формулювати власну позицію щодо моральної неоднозначності головного героя та актуальності твору сьогодні
