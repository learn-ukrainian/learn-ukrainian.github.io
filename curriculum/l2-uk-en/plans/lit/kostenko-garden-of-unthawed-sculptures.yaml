objectives:
- Аналізувати збірку «Сад нетанучих скульптур» у культурно-історичному контексті епохи «застою»
- Досліджувати стилістичні та мовні інновації Ліни Костенко, зокрема її оказіоналізми та синтаксичну майстерність
- Застосовувати методи герменевтичного та структуралістського аналізу до поетичного тексту
- Формулювати аргументовану позицію щодо ролі поезії як форми тихого опору та культурного самозбереження
