content_outline:
- points:
  - 'Провокація: Чому збірка, написана в 1970-х і опублікована аж у 1987, вважається одним з найважливіших текстів для розуміння
    сучасної України?'
  - Фрагмент вірша зі збірки, що говорить про пам'ять та мовчання, без пояснення контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Текст як естетичний феномен vs. текст як політичний акт. Чи можна читати Костенко «поза політикою», чи це зрада
    її позиції?'
  - 'Дебат 2: Мовчання як форма опору. Чи була 16-річна публічна мовчанка Костенко ефективнішою за дисидентський самвидав?
    Дискусія про стратегії інтелектуального опору.'
  - '[!epistemic-humility] Критики досі сперечаються, чи було мовчання Костенко її власним вибором, чи вимушеною обставинами
    ізоляцією.'
  section: 'Конфліктна карта: Естетика чи політика?'
  words: 900
- points:
  - Ключові уривки з поетичної збірки з коментарем, що розкриває ліричний сюжет.
  - 'Детальний розбір наскрізних символів: сад, камінь, скульптура, пам''ять, ріка, поїзд.'
  - 'Система ліричних героїв та їхня еволюція: від мовчазного спостерігача до пророка.'
  - '[!decolonization] Розгляд збірки як відповіді на брежнєвський «застій» та русифікацію, створення власного, незалежного
    культурного простору всупереч імперському тиску.'
  section: 'Читання: Сад нетанучих скульптур'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання «високого» інтелектуального стилю з розмовною лексикою та фольклорними мотивами.'
  - Оказіоналізми Ліни Костенко як інструмент філософської рефлексії та створення нових сенсів.
  - 'Особливості ритміки та синтаксису: як форма вірша (довжина рядка, строфічна будова) створює смислове напруження.'
  - '[!myth-buster] Костенко — не «бронзова» класикиня. Аналіз її мовної гри, іронії та саморефлексії, що руйнує хрестоматійний
    образ.'
  section: 'Мова і поетика: Скульптура слова'
  words: 1500
- points:
  - 'Повернення до провокації: відповідь на питання про актуальність мовчання як форми опору, спираючись на аналіз тексту.'
  - 'Рецепція твору: від заборони до канонізації. Як змінювалося прочитання збірки в 1980-х, 2000-х та після 2022 року?'
  - '[!anti-hagiography] Як канонізація Ліни Костенко та перетворення її на «живого класика» заважає критичному прочитанню
    її текстів?'
  - 'Сучасна релевантність: «Сад» у контексті війни та боротьби за культурну пам''ять.'
  section: Дискусія та підсумок
  words: 700
focus: Close reading of Lina Kostenko's seminal work 'The Garden of Unthawed Sculptures,' analyzing its philosophical depth,
  stylistic innovation, and role as an act of cultural resistance during the Brezhnev stagnation.
level: LIT
