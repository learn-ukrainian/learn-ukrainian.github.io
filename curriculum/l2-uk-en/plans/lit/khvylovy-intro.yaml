objectives:
- Аналізувати новелу "Я (Романтика)" як ключовий текст українського модернізму та Розстріляного відродження
- Визначати та інтерпретувати риси орнаментального стилю та психологізму в прозі Миколи Хвильового
- Формулювати аргументовану позицію в рамках літературних дебатів щодо постаті Хвильового (націонал-комунізм, європейська
  орієнтація)
- Критично осмислювати деколонізаційне значення гасла "Геть від Москви!" у культурному та політичному контексті 1920-х років
