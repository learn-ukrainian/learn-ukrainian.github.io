content_outline:
- points:
  - 'Провокація: "Я — чекіст, але я і людина". Як одна людина може бути одночасно катом і жертвою? Цитата, що втілює трагедію
    цілого покоління.'
  - 'Сучасний паралель: Чи може людина, що виконує злочинні накази, посилатись на "внутрішній гуманізм"? Де межа компромісу
    з совістю?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хвильовий — щирий комуніст чи прихований націоналіст? Одні бачать його віру в "азіатський ренесанс" і світову
    революцію. Інші — у гаслі "Геть від Москви!" — стратегію відродження української державності.'
  - 'Дебат 2: "Україна чи Малоросія?" — центральна дискусія 1920-х. Хвильовий вимагав орієнтації на "психологічну Європу",
    його опоненти (сталіністи) — на Москву як центр "пролетарської культури".'
  - '[!epistemic-humility] Немає простої відповіді. Хвильовий був "м''ятежним комуністом", що намагався поєднати непоєднуване:
    національне визволення та інтернаціональну ідеологію, що виявилось трагічною утопією.'
  section: 'Конфліктна карта: Європа чи Москва?'
  words: 900
- points:
  - 'Повний текст (фрагменти) новели з коментарями: аналіз ліричного вступу, роздвоєння "Я".'
  - 'Система персонажів як алегорія: Доктор Тагабат (розум, садизм), Дегенерат (патологічна жорстокість), Андрюша (слабкість,
    неспроможність до дії) — і "Я", що намагається їх врівноважити.'
  - 'Образ Матері: втілення абсолютної любові, моральний імператив, який "Я" мусить вбити, щоб стати функцією, а не людиною.
    Кульмінаційна сцена розстрілу.'
  - '[!decolonization] Текст — не просто "радянська проза", а глибоко українська рефлексія на тему імпортованого терору. Це
    діагноз хвороби, нав''язаної ззовні, а не апологія революції.'
  section: 'Читання: Новела "Я (Романтика)"'
  words: 1700
- points:
  - 'Стилістичний аналіз: "орнаментальна проза" — насиченість метафорами, асонансами, алітераціями, ритмізовані уривки. Мова
    як самоцінність.'
  - 'Синтаксис як засіб психологізації: уривчасті, нервові речення, потоки свідомості, риторичні питання для передачі внутрішнього
    сум''яття героя.'
  - Неологізми та оказіоналізми Хвильового як спроба створити нову, модерну українську мову, вільну від провінціалізму та
    русифікації.
  - '[!myth-buster] Орнаменталізм — не просто "красивість" чи декорація. Це інструмент для зображення ірраціонального, підсвідомого,
    того, що неможливо висловити прямою мовою. Стиль і є змістом.'
  section: 'Мова і поетика: Орнаменталізм та психологізм'
  words: 1500
- points:
  - 'Повернення до розминки: Чи може "чекіст" бути "людиною"? Як текст новели відповідає на це питання?'
  - '[!anti-hagiography] Трагедія Хвильового: самогубство як остання спроба зберегти честь і протест проти знищення української
    інтелігенції. Він не був безгрішним пророком, а трагічною фігурою, що зробила фатальний вибір.'
  - 'Рецепція: від заборони та замовчування в СРСР до статусу культової фігури в незалежній Україні. Чому Хвильовий досі актуальний?'
  - 'Сучасне значення: Текст як застереження проти будь-якої ідеології, що виправдовує вбивство в ім''я "світлого майбутнього".'
  section: Дискусія та підсумок
  words: 700
focus: Микола Хвильовий, новела "Я (Романтика)", Розстріляне відродження, орнаменталізм, психологічний аналіз, конфлікт "обов'язок
  vs. людяність"
