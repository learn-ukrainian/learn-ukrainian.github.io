content_outline:
- points:
  - 'Провокація: Чому режисер, що зняв лише кілька фільмів, вважається одним із найвпливовіших українських кінематографістів?
    І як це пов’язано з його прозою?'
  - 'Загадковий уривок з прози Вінграновського, що читається як сценарій до фільму — завдання для студента: описати кадр,
    який він бачить.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Проза Вінграновського — це органічне продовження його поезії чи самостійне явище? Дискусія між тими, хто бачить
    її як "поезію в прозі", і тими, хто наполягає на унікальних прозових рисах.'
  - 'Дебат 2: Місце Вінграновського в каноні шістдесятників. Чи був він центральною фігурою, чи "самотнім бігуном", чия проза
    виходить за рамки руху?'
  - '[!epistemic-humility] Критики досі сперечаються, чи варто аналізувати його тексти через призму біографії (вплив Довженка),
    чи виключно формалістично.'
  section: 'Конфліктна карта: Поет чи прозаїк?'
  words: 900
- points:
  - 'Розширений аналіз ключових уривків: фокус на візуальній насиченості, монтажному ритмі, роботі з деталями.'
  - 'Система персонажів: часто не герої в класичному розумінні, а носії певного стану, емоції, метафори. Аналіз їхньої функції.'
  - Сюжет як потік свідомості, де логіка подій поступається логіці образів та асоціацій.
  - '[!decolonization] Проза Вінграновського як акт культурного самоствердження. Створення українського мікрокосму, вільного
    від імперських наративів. Його герой — не "малорос", а екзистенційна людина на своїй землі.'
  section: 'Читання: Проза Миколи Вінграновського'
  words: 1700
- points:
  - 'Стилістичний аналіз: як Вінграновський "пише кадром". Розбір синтаксичних конструкцій, що імітують рух камери, великий
    план, панораму.'
  - 'Ритм і звук: алітерації, асонанси, внутрішні рими в прозі. Текст, що вимагає бути прочитаним вголос.'
  - 'Неологізми та робота з народною мовою: автор створює власну мовну реальність, збагачуючи літературну мову.'
  - '[!myth-buster] Поширене кліше — "поетична проза". Руйнуємо його, показуючи, що це не просто "красивість", а складна,
    продумана техніка, яка працює на конкретне художнє завдання.'
  section: 'Мова і поетика: Кінематографічність стилю'
  words: 1500
- points:
  - 'Повернення до розминки: Як пов’язані кіно та проза Вінграновського? Студент формулює відповідь на основі аналізу.'
  - 'Рецепція творчості: як сприймали прозу сучасники і як її читають зараз? Вплив на наступні покоління (Забужко, Андрухович).'
  - '[!anti-hagiography] Вінграновський не лише "співець природи", а й автор жорстких, часом експериментальних текстів, що
    були незрозумілі масовому читачу.'
  - 'Сучасне значення: чому сьогодні, в епоху візуальної культури, проза Вінграновського може бути більш актуальною, ніж за
    його життя?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз прози Миколи Вінграновського як явища на перетині літератури та кіно, дослідження її стилістичних інновацій
  та ролі в деколонізації української культури епохи шістдесятництва.
