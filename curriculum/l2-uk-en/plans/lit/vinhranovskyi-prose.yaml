objectives:
- Аналізувати прозу Миколи Вінграновського в культурно-історичному контексті шістдесятництва
- Досліджувати стилістичні особливості та поетику прози Вінграновського, зокрема її кінематографічність
- Інтерпретувати тексти як акт культурного опору та деколонізації української літератури
- Формулювати власну позицію щодо місця творчості Вінграновського в каноні української літератури
