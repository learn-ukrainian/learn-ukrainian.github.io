activity_hints:
- description: Розрізнення позицій у дебатах про творчість Вінграновського. Чия це теза? Чому це важливо?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Заповнення пропусків у реченнях термінами з модуля: кінематографічність, монтажний ритм, синтаксис, неологізм.'
  focus: Терміни з мови та поетики
  items: 5
  type: fill-in
- description: Проаналізуйте поданий уривок прози Вінграновського. Знайдіть у ньому приклади кінематографічних прийомів, про
    які йшлося в модулі. Опишіть, який ефект вони створюють.
  focus: Аналіз уривка
  type: note
- description: Поясніть, у чому саме полягає деколонізаційне значення прози Вінграновського. Чому створення "свого" художнього
    світу було актом опору? (300-500 слів).
  focus: 'Есе: Деколонізаційний жест'
  type: note
cefr_min: C1
connects_to:
