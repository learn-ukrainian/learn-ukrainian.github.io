content_outline:
- points:
  - 'Провокація: "Оддавали Катрю до армії... А на проводах їй постригли коси. Я плакала, а вона сміялася..." Що це за ритуал
    і як він пояснює любов без надії?'
  - 'Запитання: Чи може лист із Сибіру, який так і не був відправлений, змінити долі трьох людей?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Сільська проза" vs психологічний модернізм. Це твір про колгоспне життя чи універсальна драма людських почуттів,
    що лише випадково відбувається в селі?'
  - 'Дебат 2: Тютюнник — "дозволений" радянський письменник чи прихований дисидент? Його мовчання про прямі репресії — це
    компроміс чи найвища форма художнього опору?'
  - '[!epistemic-humility] Критики-сучасники бачили в ньому лише майстра "сільської теми". Пост-радянське прочитання відкриває
    екзистенційні глибини та анти-тоталітарний підтекст.'
  section: 'Конфліктна карта: Село чи екзистенція?'
  words: 900
- points:
  - 'Аналіз тричастинної структури: новела в новелі, зміщення фокусу з сина на батька та Марфу.'
  - 'Символізм "трьох зозуль": давній народний символ розлуки, переосмислений автором як знак прощення і вічного кохання.'
  - 'Образ Софії: втілення мудрості та "софійності", її мовчазна згода з долею як акт вищої любові.'
  - '[!decolonization] Текст не просто описує, а долає радянську травму. Замість державної історії репресій — особиста історія
    незнищенних почуттів. Любов стає актом опору системі, що прагне знищити особистість.'
  section: 'Читання: "Три зозулі з поклоном": структура та символізм'
  words: 1700
- points:
  - 'Синтаксис як ключ до психології: короткі, уривчасті речення для передачі емоційного напруження.'
  - 'Роль недомовленості та пауз: те, що персонажі НЕ говорять, важливіше за сказане.'
  - Використання народної мови та фольклорних елементів (пісні, ритуали) не як етнографічний декор, а як носії глибинних смислів.
  - '[!myth-buster] Це не "проста народна мова". Це витончена стилізація, де кожне слово має подвійне дно і працює на створення
    унікальної емоційної атмосфери.'
  section: 'Мова і поетика: "Мова серця": Стиль Тютюнника'
  words: 1500
- points:
  - 'Повернення до розминки: Як ритуал "проводів до армії" розкриває характер Марфи та її здатність до жертовної любові?'
  - 'Рецепція твору: як змінювалось сприйняття новели від її публікації в 1970-х до сьогодні?'
  - 'Сучасне значення: чому "Три зозулі з поклоном" стали одним із найважливіших текстів української літератури ХХ століття
    для покоління незалежності?'
  - '[!anti-hagiography] Розгляд складної долі автора: чи можна відокремити текст від трагічної біографії Тютюнника, його
    компромісів та самогубства?'
  section: Дискусія та підсумок
  words: 700
focus: 'Новела Григора Тютюнника "Три зозулі з поклоном": психологізм, символізм, мова як інструмент опору, деколонізаційний
  аналіз радянської травми.'
