activity_hints:
- description: Визначити, яка з позицій ("сільська проза" vs модернізм, "дозволений" vs дисидент) відповідає наведеній цитаті
    критика.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставити у речення з аналізом твору пропущені терміни: синтаксис, недомовленість, стилізація, підтекст.'
  focus: Мова і поетика Тютюнника
  items: 4
  type: fill-in
- description: Проаналізуйте уривок із листом батька. Які стилістичні засоби використовує Тютюнник для передачі його внутрішнього
    стану? (200-300 слів)
  focus: Аналіз уривка
  type: note
- description: Чи згодні ви з тезою, що в новелі "Три зозулі з поклоном" любов є формою тихого опору тоталітарній системі?
    Аргументуйте свою думку на прикладах з тексту. (400-600 слів)
  focus: Есе-роздум
  type: note
