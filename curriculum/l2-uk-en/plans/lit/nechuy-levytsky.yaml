content_outline:
- points:
  - 'Провокація: Нечуй-Левицький — це письменник чи фотограф із пером? Де проходить межа між етнографічним описом та високою
    літературою?'
  - Цитата з "Кайдашевої сім'ї" про сварку — чи може побутова лайка бути предметом мистецтва?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Нечуй — "дзеркало" народного життя чи його конструктор? Він просто фіксував реальність, чи створював ідеалізований
    образ українського села для міського читача?'
  - 'Дебат 2: Конфлікт Нечуя з галицькою мовною нормою. Чи був він консерватором, що гальмував розвиток соборної мови, чи
    захисником живої народної мови від штучних конструкцій?'
  - '[!epistemic-humility] Позиція критиків: одні (Єфремов) бачили в ньому вершину реалізму, інші (Франко) — талановитого,
    але ідеологічно обмеженого "обсерватора" побуту.'
  section: 'Конфліктна карта: Реалізм проти етнографії'
  words: 900
- points:
  - 'Фрагмент тексту (сцена з грушею): аналіз того, як дріб''язковий побутовий конфлікт виростає до масштабів античної трагедії.'
  - 'Система персонажів: чи є герої "типовими" представниками селянства, чи це глибоко індивідуалізовані психологічні портрети?'
  - 'Наративна структура: роль автора-оповідача. Він об''єктивний хронікер чи іронічний коментатор?'
  - '[!decolonization] Творчість Нечуя як відповідь на російський імперський наратив про "малоросійський" народ як екзотичний,
    але нездатний до високої культури. Нечуй доводить протилежне через саму тканину мови.'
  section: 'Читання: "Кайдашева сім''я" — аналіз ключових сцен'
  words: 1700
- points:
  - 'Лексичне багатство: використання діалектизмів, професійної лексики, етнографізмів для створення ефекту "повної присутності".'
  - 'Синтаксис Нечуя: довгі, "епічні" речення в описах природи vs короткі, уривчасті фрази в діалогах-сварках. Як структура
    речення передає динаміку?'
  - '"Зорові" та "слухові" образи: аналіз того, як Нечуй створює "видиму" і "чутну" прозу, що апелює до всіх органів чуття
    читача.'
  - '[!myth-buster] Поширений міф: Нечуй — "простий" і "народний" письменник. Насправді його стиль — результат свідомого естетичного
    вибору та величезної філологічної роботи.'
  section: 'Мова і поетика: Мова як «фотографічний» інструмент'
  words: 1500
- points:
  - 'Повернення до розминки: тож Нечуй — письменник чи фотограф? Аргументація на основі аналізу "мови і поетики".'
  - 'Історія рецепції: Чому "Кайдашеву сім''ю" радянська критика подавала як комедію, ігноруючи трагічний вимір твору?'
  - '[!anti-hagiography] Трагедія пізнього періоду: злиденна смерть письменника, його нерозуміння нових літературних тенденцій.
    Нечуй як "останній із могікан" класичного реалізму.'
  - 'Рефлексія: що змінилося у вашому сприйнятті "Кайдашевої сім''ї" після цього аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Nechuy-Levytsky's role in Ukrainian realism, his ethnographic precision, and unique descriptive prose style, analyzed
  through "Kaidash's Family".
