objectives:
- Критично аналізувати стилістичні особливості "візуальної" прози Нечуя-Левицького
- Формулювати аргументовану позицію щодо дебатів навколо його творчості (реалізм vs етнографія, мовна норма)
- Проводити філологічний аналіз ключових уривків з повісті "Кайдашева сім'я"
- Оцінювати внесок письменника в становлення української національної ідентичності через літературу
