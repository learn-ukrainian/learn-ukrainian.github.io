content_outline:
- points:
  - 'Провокація: Що, якби людина без минулого була єдиним ключем до забутого минулого цілої нації?'
  - 'Загадковий артефакт: уривок з роману про вигадану енциклопедію "Орфа" — що це за текст і як він пов''язаний з реальністю?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Амадока" — це історичний роман, постмодерний пастиш чи родинна сага? Дискусія про жанрову природу тексту.'
  - 'Дебат 2: Чи є особиста пам''ять надійним джерелом для реконструкції великої історії? Роман як поле битви між індивідуальним
    спогадом і офіційним наративом.'
  - '[!epistemic-humility] Критики сперечаються: одні бачать в романі терапевтичну роботу з минулим, інші — небезпечну міфологізацію
    та релятивізацію історичної травми.'
  - 'Глобальний контекст: "Амадока" в діалозі зі світовою "літературою пам''яті" (В. Г. Зебальд, Орхан Памук).'
  section: 'Конфліктна карта: Памʼять vs. Історія'
  words: 900
- points:
  - 'Структура роману: аналіз трьох частин та їх взаємозв''язку. Як історія УПА, Голокосту та сучасна війна переплітаються
    в одному текстовому просторі?'
  - 'Система персонажів: Богдан/Володимир — людина без обличчя як метафора нації; Катерина — архітекторка пам''яті; Роман
    — носій родинної травми.'
  - 'Центральний символ: озеро Амадока як уособлення забутої, затопленої історії. Чому саме те, чого немає на карті, виявляється
    найважливішим?'
  - '[!decolonization] Текст як акт культурного опору: роман переписує та ускладнює спрощені імперські та радянські наративи
    про українську історію, повертаючи замовчувані голоси.'
  section: 'Читання: "Амадока" як роман-палімпсест'
  words: 1700
- points:
  - 'Стилістичний синкретизм: поєднання високого модерністського стилю, документальних вставок (листи, щоденники, архівні
    записи) та розмовних елементів.'
  - 'Мова як інструмент ідентичності: аналіз мовних партій персонажів, що належать до різних епох та соціальних середовищ.'
  - 'Інтертекстуальність: діалог "Амадоки" з творами Бруно Шульца, Станіслава Лема, а також із українським бароко та модернізмом.'
  - '[!myth-buster] "Амадока" — це не просто "роман про війну". Це дослідження того, як мова і текст формують наше уявлення
    про минуле, війну та самих себе.'
  section: 'Мова і поетика: Гібридність та інтертекстуальність'
  words: 1500
- points:
  - 'Повернення до розминки: Як роман відповідає на питання про стосунки особистої та національної пам''яті? Студент формулює
    власну відповідь.'
  - 'Рецепція та критика: чому "Амадока" викликала такий резонанс? Аналіз ключових позитивних та критичних відгуків.'
  - '[!anti-hagiography] Чи є об''єм та складність роману його силою, чи це створює бар''єр для широкого кола читачів, перетворюючи
    його на "елітарний" текст?'
  - 'Рефлексія: Як ваше розуміння української історії та ідентичності змінилося (або ускладнилося) після прочитання та аналізу
    роману?'
  section: Дискусія та підсумок
  words: 700
focus: 'Роман "Амадока": аналіз структури палімпсесту, опозиція пам''яті та історії, деконструкція національних міфів, стилістична
  гібридність та інтертекстуальність.'
level: LIT
module: lit-206
objectives:
- Аналізувати роман "Амадока" як складний текст-палімпсест, що поєднує різні історичні епохи та наративи.
- Визначати ключові стилістичні особливості твору: гібридність жанру, інтертекстуальність, поліфонізм.
- Формулювати аргументовану позицію щодо ролі роману в процесі деколонізації української історичної пам'яті.
- Критично оцінювати літературні дебати навколо роману, зокрема опозицію "особиста пам'ять vs. офіційна історія".
