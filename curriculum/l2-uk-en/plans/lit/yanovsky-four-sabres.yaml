activity_hints:
- description: Визначити, яка з тез належить до радянської критики, а яка — до сучасного постколоніального прочитання роману.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити в речення з роману характерні для Яновського епітети та метафори (напр., "сонце, як...", "степ, наче...").
  focus: Мова орнаменталізму
  items: 5
  type: fill-in
- description: Наведіть 3-4 приклади з тексту, де стиль Яновського (ритм, синтаксис, метафора) не просто описує дію, а є самою
    дією. Поясніть, як це працює.
  focus: 'Аналіз: Мова як зброя'
  type: note
- description: Багато сучасних текстів про війну (репортажів, поезій) відмовляються від "красивого" стилю. Чи доречна "естетизація"
    війни Яновського сьогодні? Аргументуйте свою позицію (400-600 слів).
  focus: 'Есе: "Чотири шаблі" і сучасна війна'
  type: note
cefr_min: C1
