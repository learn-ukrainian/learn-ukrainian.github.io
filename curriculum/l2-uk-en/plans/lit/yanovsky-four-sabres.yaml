content_outline:
- points:
  - 'Провокація: Чи може вбивство бути красивим? Роман Яновського змушує читача засумніватися у власних моральних орієнтирах,
    описуючи насильство як величний танець.'
  - 'Цитата-загадка: "Шахай відповів спокійно, як годиться розмовляти командирові з бійцем, коли їх розділяє цілий світ дисципліни
    й крові". Про яку кров і дисципліну йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Чотири шаблі" — це радянський агітпроп чи прихований національний маніфест? Аргументи "за" (оспівування революції)
    та "проти" (фокус на українській стихії).'
  - 'Дебат 2: Орнаменталізм — це вершина мистецтва чи втеча від реальності? Позиція критиків, що звинувачували Яновського
    в "буржуазному" формалізмі, проти позиції, що бачить у стилі єдину можливу правду.'
  - '[!epistemic-humility] Немає єдиної відповіді на те, чи був Яновський "щирим" комуністом. Його тексти — поле битви різних
    ідеологій.'
  section: 'Конфліктна карта: Естетизація чи зрада?'
  words: 900
- points:
  - 'Розбір ключової сцени: Атака кінноти як балет смерті. Аналіз ритму, кольору та звуку в описі бою.'
  - 'Система персонажів: Шахай, Остюк, Галат і Марцель. Чотири шаблі як чотири грані українського національного характеру
    — воїн, філософ, артист, селянин.'
  - 'Символіка степу: Степ як головний герой роману — втілення вічної, стихійної, непідвладної ідеології України.'
  - '[!decolonization] Твір вириває українську революцію з контексту "громадянської війни в Росії", показуючи її як унікальну
    національну трагедію і вибух екзистенційної енергії.'
  section: 'Читання: "Чотири шаблі" — Анатомія революційного міфу'
  words: 1700
- points:
  - 'Стилістичний аналіз: Метафори, порівняння, епітети як основний будівельний матеріал тексту. "Сонце, як відрубана голова".'
  - 'Ритм і синтаксис: Коротка, рубана фраза, що імітує ритм бою або пісні. Вплив поезії на прозу.'
  - 'Лексика: Поєднання архаїзмів, козацької лексики з революційними неологізмами. Мова як поле битви старого і нового світів.'
  - '[!myth-buster] Це не просто "гарний стиль". Яновський використовує орнаменталізм, щоб показати, що реальність настільки
    жахлива, що її можна осягнути лише через міф і поезію.'
  section: 'Мова і поетика: Орнаменталізм і балада'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чи може вбивство бути красивим? Як роман змінив ваше уявлення про це питання?'
  - 'Рецепція твору: Як "Чотири шаблі" сприймали в 1920-х, і чому твір був фактично заборонений пізніше? Як його читають сьогодні
    після Бучі та Ірпеня?'
  - '[!anti-hagiography] Яновський був змушений "переписувати" свої твори, щоб вижити. Його пізніші тексти — трагічний пам''ятник
    компромісу митця з тоталітарною владою.'
  - 'Зв''язок із сьогоденням: Чи можна вважати сучасних українських воїнів нащадками героїв Яновського?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману Юрія Яновського "Чотири шаблі" як зразка орнаментальної прози, дослідження неоромантичного героя, та
  деконструкція міфу про революцію в добу Розстріляного Відродження.
