content_outline:
- points:
  - 'Провокація: Як поезія, написана в карцері, може бути найвищим проявом свободи? Що таке «палімпсести» душі?'
  - 'Цитата: «На стінах камери, на дні / самого себе, на корі / небес, на лицях і на склі, / на всіх вітрах…» — про що пише
    автор?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Поезія Стуса — це документ страждання (біографічне читання) чи складний метафізичний текст про буття (екзистенційне
    читання)?'
  - 'Дебат 2: Канонізація Стуса. Як поет, викреслений радянською системою, став центральною фігурою українського канону? Чи
    не затіняє ікона мученика самого поета?'
  - '[!epistemic-humility] Немає єдиного «правильного» Стуса. Кожна інтерпретація висвітлює різні грані його спадщини.'
  section: 'Конфліктна карта: Поет відчаю чи стоїцизму?'
  words: 900
- points:
  - 'Текст: Аналіз ключових віршів зі збірки, зокрема циклу «Круговерть».'
  - 'Образ палімпсеста: Стус «написує» свою поезію поверх стертих культурних шарів, повертаючи вкрадену історію.'
  - 'Ліричний герой: Його еволюція від індивідуального страждання до прийняття долі як частини національної трагедії.'
  - '[!decolonization] «Палімпсести» — це акт культурного опору. Стус свідомо вписує себе у європейський модерністський контекст
    (Рільке, Цвєтаєва), відмовляючись бути провінційним додатком до «великої російської літератури».'
  section: 'Читання: Уривки з «Палімпсестів»'
  words: 1700
- points:
  - 'Стилістичні інновації: Створення неологізмів («самособоюнаповнення»), використання архаїзмів та діалектизмів для створення
    багаторівневої мови.'
  - 'Інтертекстуальність: Постійні діалоги зі світовою культурою — від античності до європейського модернізму.'
  - 'Звукопис і синтаксис: Робота з алітераціями, асонансами. Синтаксична ускладненість як відображення складності буття.'
  - '[!myth-buster] Стус — це не лише «поет-патріот» і «борець». Це насамперед великий поет-модерніст, що експериментував
    з мовою на рівні найкращих європейських взірців.'
  section: 'Мова і поетика: Стоїчна мова опору'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви відповісте на питання про поезію як свободу?'
  - 'Рецепція творчості: Як сприймали Стуса сучасники (дисиденти), і як його читають сьогодні? Чи не перетворився він на недоторканну
    ікону?'
  - '[!anti-hagiography] Важливо бачити не лише мученика, а й складну людину з її сумнівами, гнівом та екзистенційним болем,
    щоб по-справжньому зрозуміти глибину його поезії.'
  - 'Сучасне значення: Чому поезія Стуса звучить так актуально в контексті сучасної війни Росії проти України?'
  section: Дискусія та підсумок
  words: 700
focus: Василь Стус «Палімпсести», поетика виживання, інтертекстуальність, стоїцизм, мова як форма опору
