objectives:
- Аналізувати збірку «Палімпсести» як цілісний філософський та естетичний феномен
- Досліджувати стилістичні особливості поезії Стуса, зокрема його неологізми та інтертекстуальність
- Розрізняти біографічний, екзистенційний та постколоніальний підходи до інтерпретації творчості Стуса
- Оцінювати деколоніальне значення творчості Стуса як акт опору духовній та культурній асиміляції
- Формулювати власну аргументовану позицію щодо актуальності поезії Стуса для сучасної України
