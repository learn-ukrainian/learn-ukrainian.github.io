  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: Вставити пропущені ключові слова (неологізми, архаїзми, філософські терміни) в уривки з віршів «Палімпсестів».
  focus: Мова і поетика Стуса
  items: 8
  type: fill-in
- description: Проаналізуйте тезу, що образ Стуса-мученика заважає сприйняттю Стуса-поета. Наведіть аргументи за і проти,
    спираючись на матеріали модуля (300-500 слів).
  focus: 'Критичний аналіз: Мученик vs Поет'
  type: note
- description: 'Напишіть есе на тему: «Чому поезія Стуса є зброєю в сучасній інформаційній та культурній війні?». Використовуйте
    конкретні приклади з текстів (400-600 слів).'
  focus: 'Есе: «Палімпсести» і сучасність'
  type: note
