content_outline:
- points:
  - 'Провокація: Феміністичний маніфест, національна сповідь чи літературний скандал? Чому ця книга розділила українське суспільство?'
  - 'Цитата без контексту: «Країна, в якій не було сексу, прокинулася від летаргії і виявила, що він у ній є, та ще й український!»'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є героїня просто alter ego авторки? Позиція «це все правда» (читацьке сприйняття) vs позиція «це літературний
    конструкт» (авторська та критична).'
  - 'Дебат 2: Феміністичний маніфест чи антинаціональний пасквіль? Як роман водночас став іконою фемінізму і об’єктом цькування
    за «винесення сміття з хати».'
  - '[!epistemic-humility] Рецепція роману — приклад того, як особистий досвід, вилитий у текст, перестає належати автору
    і стає полем битви суспільних дискурсів.'
  section: 'Конфліктна карта: Маніфест чи Пасквіль?'
  words: 900
- points:
  - 'Ключовий уривок: аналіз стосунків героїні з її коханцем-художником як алегорія стосунків України з її «культурною метрополією».'
  - 'Структура «потоку свідомості»: як нелінійний наратив відтворює механізм роботи травматичної пам''яті.'
  - 'Система персонажів: чоловічі образи як уособлення різних аспектів патріархального світу (поет, художник, професор).'
  - '[!decolonization] Роман як акт мовного самоствердження. Відмова говорити «загальнозрозумілою» мовою і перехід на відверту,
    тілесну, «непристойну» українську мову — це і є деколонізація свідомості.'
  section: 'Читання: Анатомія пост-радянської травми'
  words: 1700
- points:
  - 'Стилістичний аналіз: довгі, синтаксично розгалужені речення, що імітують усне мовлення, сповідь, психоаналітичний сеанс.'
  - 'Робота з мовними регістрами: поєднання високого академічного стилю, філософської термінології з побутовою лексикою, суржиком
    та лайкою.'
  - 'Ритм і синтаксис: як «задихана» інтонація створює ефект емоційної напруги та невідкладності висловлювання.'
  - '[!myth-buster] Це не просто «жіноча проза про стосунки». Це інтелектуальний роман, де секс є лише оптикою для аналізу
    національної історії, культури та мови.'
  section: 'Мова і поетика: «Потік свідомості» як метод'
  words: 1500
- points:
  - 'Повернення до розминки: тож чим є «Польові дослідження» через 30 років після публікації?'
  - 'Історія рецепції: від абсолютного скандалу та неприйняття до статусу «живої класики» та обов’язкової лектури. Чому змінилось
    ставлення?'
  - '[!anti-hagiography] Критичний погляд на роман: звинувачення в елітаризмі, надмірному психологізмі, автобіографічній спекуляції.
    Чи витримує текст цю критику?'
  - 'Сучасне значення: як роман Забужко читається в контексті війни, феміністичних рухів #MeToo та нової хвилі деколонізації?'
  section: Дискусія та підсумок
  words: 700
