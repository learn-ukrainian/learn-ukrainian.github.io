objectives:
- Аналізувати роман «Польові дослідження з українського сексу» як феномен автофікшну та феміністичного дискурсу
- Досліджувати стилістичні особливості тексту, зокрема техніку «потоку свідомості» та роботу з різними мовними регістрами
- Оцінювати роль твору в деколонізації української літератури та формуванні нової жіночої суб’єктності
- Формулювати власну аргументовану позицію в літературно-критичних дебатах навколо роману
