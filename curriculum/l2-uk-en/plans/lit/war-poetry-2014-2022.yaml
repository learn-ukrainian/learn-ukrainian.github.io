content_outline:
- points:
  - 'Провокативне питання: Чи може поезія бути зброєю? Чи є вірш, написаний в окопі, сильнішим за постріл?'
  - 'Уривок з вірша (наприклад, Артема Полежаки) без імені автора та контексту: «Кожен, в кого стріляв я, / Кожен, хто в мене
    стріляв, / Право на постріл мав.»'
  - 'Сучасна паралель: вірші з фронту, що стають вірусними в TikTok та Instagram — чим це відрізняється від друкованих збірок
    минулого?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Поет як документаліст vs поет як творець. Чи є воєнна лірика просто римованою хронікою подій, чи вона має право
    на художнє переосмислення, метафору, узагальнення?'
  - 'Дебат 2: Ефемерність vs канонічність. Чи є ця поезія «одноденкою», що втратить актуальність після перемоги, чи ми є свідками
    народження нового національного епосу та фундаменту майбутнього канону?'
  - '[!epistemic-humility] Немає єдиної «правильної» відповіді. Деякі критики вимагають фактологічної точності, інші — естетичної
    довершеності. Обидві позиції мають право на існування.'
  section: 'Конфліктна карта: Свідок чи митець?'
  words: 900
- points:
  - Детальний аналіз ключових віршів Сергія Жадана, Любові Якимчук, Артема Полежаки та інших.
  - 'Наративна структура: як поети конструюють досвід війни — від особистого до національного, від побутового до метафізичного.'
  - 'Система персонажів: ліричний герой як воїн, волонтер, біженець, дитина. Як змінюється оптика залежно від ролі?'
  - '[!decolonization] Ця поезія — не просто реакція на агресію. Це акт культурного самоствердження та остаточного розриву
    з російським імперським дискурсом. Поети творять український світ, де ворогу немає місця.'
  section: 'Читання: Анатомія болю в текстах Жадана, Якимчук, Полежаки'
  words: 1700
- points:
  - 'Стилістичні інновації: використання ненормативної лексики, суржику, мілітарного сленгу як художнього прийому.'
  - 'Спрощення синтаксису та руйнування форми: як екстремальний досвід впливає на поетичну мову, роблячи її уривчастою, «телеграфною».'
  - 'Звукопис війни: алітерації, що імітують звуки вибухів, пострілів, сирен. Тіло тексту як тіло в небезпеці.'
  - '[!myth-buster] Спростування міфу про «солов''їну мову» як виключно ніжну та милозвучну. Сучасна поезія доводить, що українська
    мова може бути гострою, жорсткою, брутальною і вбивати.'
  section: 'Мова і поетика: Мова на межі існування'
  words: 1500
- points:
  - 'Повернення до розминки: то чи є поезія зброєю? Студент формулює власну відповідь, спираючись на проаналізовані тексти.'
  - 'Рецепція та поширення: роль соціальних мереж у популяризації воєнної лірики. Як «лайки» та «шери» впливають на статус
    поета та тексту?'
  - '[!anti-hagiography] Уникаймо творення ікони з поета-воїна. Це живі люди, що переживають неймовірну травму. Їхні тексти
    — не лише героїзм, а й біль, страх, втома.'
  - 'Сучасне значення: як ця поезія формує образ України у світі та допомагає самим українцям осмислити свою історію, що твориться
    просто зараз?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз української воєнної поезії від початку гібридної війни до повномасштабного вторгнення, еволюція тем, мови та
  ролі поета.
