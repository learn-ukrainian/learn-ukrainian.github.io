content_outline:
- points:
  - 'Провокація: Чому в одних авторів є фанати, а в інших — культ? У чому різниця?'
  - Цитата з роману «Культ» без контексту, що натякає на таємні знання та обраність.
  - 'Запитання до студента: Чи може література бути небезпечною? Якщо так, то для кого?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Культовий» — це комплімент чи тавро? Позиція 1: Культ — це визнання читачів, жива альтернатива застиглому шкільному
    канону. Позиція 2: Культ — це маркетингова технологія, що створює ілюзію елітарності навколо поп-літератури.'
  - 'Дебат 2: Чи місце Дерешу в офіційному каноні? Позиція 1: Ні, його цінність саме в контркультурності та нішевості. Включення
    в канон вб''є його «культовість». Позиція 2: Так, його ранні твори — важливий зріз настроїв покоління 2000-х, без якого
    картина епохи неповна.'
  - '[!epistemic-humility] Критики досі сперечаються, чи Дереш — український Лавкрафт, чи епігон масової культури. Єдиної
    думки не існує.'
  section: 'Конфліктна карта: Канон vs. Культ'
  words: 900
- points:
  - 'Аналіз наративної структури: як Дереш будує «герметичний» світ роману, в який читач має бути «посвячений».'
  - 'Система персонажів як арканум: Юрко Банзай, Вовчик, таємничий професор — не стільки люди, скільки функції в містичній
    грі.'
  - 'Close reading: уривок, де описується ритуал або лекція з окультних наук. Як мова створює атмосферу таємниці?'
  - '[!decolonization] Дереш створює український Гогвортс у карпатському містечку, переносячи глобальні молодіжні субкультури
    (готика, езотерика) на український ґрунт і доводячи, що українська провінція може бути центром магічного світу.'
  section: 'Читання: «Культ». Текст і підтекст'
  words: 1700
- points:
  - 'Аналіз мови персонажів: суміш молодіжного сленгу 2000-х, наукової термінології та окультної лексики. Як це характеризує
    героїв?'
  - 'Стилістичні інновації: довгі, «готичні» речення, навмисне ускладнений синтаксис як спосіб передати стан свідомості персонажів.'
  - 'Інтертекстуальність: приховані та явні цитати з Лавкрафта, Ніцше, Кастанеди. Як Дереш вписує свій текст у світову «контркультурну»
    традицію?'
  - '[!myth-buster] Поширений міф: «Дереш — це легке чтиво для підлітків». Аналіз показує складну, багатошарову роботу з мовою
    та культурними кодами, розраховану на підготовленого читача.'
  section: 'Мова і поетика: Сленг, синтаксис та голос покоління'
  words: 1500
- points:
  - 'Повернення до розминки: тож у чому феномен «культу» Дереша? Відповідь з опорою на аналіз тексту, мови та контексту.'
  - 'Рецепція тоді і зараз: як змінилося сприйняття роману «Культ» з 2000-х до сьогодні? Чи залишився він «культовим»?'
  - '[!anti-hagiography] Критичний погляд: наскільки «культ» автора є здоровим явищем? Де межа між захопленням і некритичним
    поклонінням?'
  - 'Сучасна релевантність: які сучасні українські автори претендують на «культовість» і за якими ознаками ми можемо це визначити?'
  section: Дискусія та підсумок
  words: 700
focus: Close reading of "Культ", analysis of cult literature as a post-Soviet phenomenon, deconstruction of authorial myth-making
level: LIT
module: lit-202
objectives:
- Аналізувати феномен «культової» літератури на прикладі творчості Любка Дереша.
- Виконувати close reading уривків з роману «Культ», ідентифікуючи стилістичні та наративні прийоми.
- Розрізняти та аргументувати різні позиції в літературній критиці щодо місця контркультурних творів у каноні.
- Деконструювати авторський міф та аналізувати його як частину літературного процесу.
