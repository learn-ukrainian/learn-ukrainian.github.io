content_outline:
- points:
  - 'Провокація: Що змушує людину повернутися туди, звідки вона колись втекла? І що робити, коли твоє минуле намагаються в
    тебе відібрати?'
  - 'Цитата: "Історії треба доводити до кінця. Інакше вони ніколи не закінчаться". Як ця фраза визначає головний конфлікт
    роману?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Ворошиловград" — це соціальний роман про "лихі 90-ті" чи міфологічний вестерн про захист своєї території? Позиція
    1: Текст як точний зріз епохи, з рейдерством, безробіттям і розпадом. Позиція 2: Текст як сучасний епос про героя, що
    повертається на "дикий схід" захищати свій "форт" (бензоколонку).'
  - 'Дебат 2: Це роман про східну Україну чи про всю Україну? Позиція 1: Текст глибоко регіональний, закорінений у специфіці
    Донбасу та Слобожанщини. Позиція 2: Це універсальна українська історія про пошук ідентичності та повернення до коренів,
    що резонує по всій країні.'
  - '[!epistemic-humility] Критики досі сперечаються, чи є "Ворошиловград" останнім великим романом про 20-те століття, чи
    першим — про 21-ше.'
  section: 'Конфліктна карта: Соцреалізм чи вестерн?'
  words: 900
- points:
  - 'Текст: Аналіз ключових уривків — приїзд Германа до міста, знайомство з "апостолами" на бензоколонці, перша спроба рейдерського
    захоплення.'
  - 'Сюжет як квест: Повернення Германа — це не просто подорож, а ініціація. Він має відновити зв''язки, знайти союзників
    і "перезібрати" своє минуле, щоб захистити майбутнє.'
  - 'Система персонажів: Коча й Інженер як архетипи вірних побратимів. Ольга як уособлення втраченого кохання і недосяжної
    мети. Марлен — символ старого, радянського світу, що відходить.'
  - '[!decolonization] Роман конструює нову українську ідентичність Сходу. Це не "російськомовний регіон", а простір зі своєю
    унікальною історією, мовою (суржиком) і міфологією, який чинить опір зовнішній експансії (із заходу та сходу).'
  section: 'Читання: Повернення Германа та оборона бензоколонки'
  words: 1700
- points:
  - 'Стилістичні інновації: Жадан легітимізує розмовну мову і суржик, перетворюючи їх з ознаки "неграмотності" на потужний
    художній інструмент, що передає автентичність середовища.'
  - 'Метафорика степу: Степ у Жадана — це не просто пейзаж, а живий організм, хронотоп свободи, небезпеки і безмежних можливостей.
    Аналіз ключових метафор: залізниця, кукурудзяні поля, небо.'
  - 'Синтаксис і ритм: Довгі, медитативні речення, що передають плинність часу і простору, чергуються з короткими, "рубаними"
    фразами в сценах дії. Роль повторів та рефренів.'
  - '[!myth-buster] Поширений міф: мова Жадана — це просто "вуличний сленг". Насправді це складно сконструйована літературна
    мова, що поєднує елементи високої поезії, біблійних алюзій, народної говірки та чорного гумору.'
  section: 'Мова і поетика: Суржик, метафора, іронія'
  words: 1500
- points:
  - 'Повернення до розминки: Чому Герман залишається? Відповідь лежить у площині відповідальності за "своїх" і віднайдення
    власного місця у світі.'
  - 'Рецепція та значення: Як роман, написаний у 2010 році, став пророчим для подій 2014-го? Обговорення фільму "Дике поле"
    та міжнародного визнання твору.'
  - '[!anti-hagiography] Герої Жадана — не ідеалізовані патріоти. Вони цинічні, жорстокі, керуються власними інтересами. Але
    саме в цьому їхня сила — вони живі люди, що захищають свій світ, а не абстрактну ідею.'
  - 'Питання для роздумів: Чи є "Ворошиловград" романом про кінець історії чи про її новий початок?'
  section: Дискусія та підсумок
  words: 700
focus: 'Літературний аналіз роману "Ворошиловград": пострадянська ідентичність, степовий хронотоп, мовна стилізація та міфологія
  повернення.'
