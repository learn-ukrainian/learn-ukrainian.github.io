content_outline:
- points:
  - 'Провокація: Чи може блазнювання бути серйозною літературою? Як Бу-Ба-Бу, граючись, зруйнували радянський літературний
    пантеон.'
  - Цитата з маніфесту Бу-Ба-Бу, що проголошує "смерть нудної літератури"
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Бу-Ба-Бу — це висока література чи лише епатажний перформанс? Позиція 1: Це легітимна необарокова естетика,
    що оновлює мову. Позиція 2: Це інтелектуальний гедонізм, що уникає великих національних тем.'
  - 'Дебат 2: Чи є Бу-Ба-Бу деконструкцією імперії, чи просто втечею від реальності? Позиція 1: Їхній сміх і пародія — це
    форма політичного опору. Позиція 2: Це аполітичне мистецтво для мистецтва.'
  - '[!epistemic-humility] Критики досі сперечаються, чи було Бу-Ба-Бу початком нової епохи, чи лише її яскравим, але швидкоплинним
    симптомом.'
  section: 'Конфліктна карта: Карнавал проти канону'
  words: 900
- points:
  - 'Тексти-приклади: Розбір кількох знакових поезій Андруховича, Ірванця та Неборака.'
  - 'Аналіз сюжету-гри: Як будується карнавальний світ, де немає нічого святого, а ієрархії перевернуті.'
  - 'Система персонажів: ліричний герой як маска, постійна зміна ролей (поет, пророк, блазень, коханець).'
  - '[!decolonization] Бу-Ба-Бу свідомо руйнували образ "поета-страдника" (шевченківський канон), нав''язаний імперією, замінюючи
    його образом вільного митця-гравця.'
  section: 'Читання: Поетичний світ Бу-Ба-Бу'
  words: 1700
- points:
  - 'Стилістичні інновації: введення суржику, арго, ненормативної лексики як художній прийом.'
  - 'Робота з мовою: оказіоналізми, словотворення, пародіювання стилів (високого, наукового, радянського).'
  - 'Інтертекстуальність: постійні цитати та алюзії на світову літературу, від Біблії до рок-поезії.'
  - '[!myth-buster] Позірна легкість текстів Бу-Ба-Бу приховує глибоку філологічну ерудицію та свідому роботу з усіма пластами
    мови та культури.'
  - Синтаксис та ритміка як елементи гри, що руйнують автоматизм сприйняття.
  section: 'Мова і поетика: Необарокова гра та іронія'
  words: 1500
- points:
  - 'Повернення до розминки: Чи може сміх бути зброєю? Як естетика Бу-Ба-Бу вплинула на подальший розвиток української літератури.'
  - 'Історична рецепція: Як сприймали Бу-Ба-Бу в 90-ті (свобода, хаос) і як ми читаємо їх сьогодні (класика андеграунду)?'
  - 'Вплив на наступні покоління: від Сергія Жадана до сучасної стендап-комедії.'
  - '[!anti-hagiography] Попри всю революційність, чи не створили бубабісти власний, закритий "клуб", недоступний для непосвячених?'
  section: Дискусія та підсумок
  words: 700
focus: Bu-Ba-Bu (Burlesque-Farce-Buffoonery) as a phenomenon of Ukrainian postmodernism, irony and game as deconstruction
  of the Soviet canon, neo-baroque poetics
level: LIT
module: lit-171
objectives:
- Аналізувати феномен Бу-Ба-Бу як ключове явище українського літературного постмодернізму
- Розрізняти та застосовувати поняття "карнавал", "необароко", "деконструкція" та "інтертекстуальність"
- Виявляти в текстах елементи мовної гри, іронії та пародії як інструменти руйнування радянського канону
- Формулювати аргументовану позицію в літературній дискусії щодо місця Бу-Ба-Бу в українському каноні
