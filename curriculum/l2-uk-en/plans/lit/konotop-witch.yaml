content_outline:
- points:
  - 'Провокація: Чому автор сентиментальної "Марусі" написав найбрутальнішу і найсмішнішу повість української літератури?'
  - 'Цитата без контексту: "Ач, як капотить! мабуть буде дощ". Про що насправді йдеться і чому це — ключ до розуміння всієї
    адміністративної системи?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Конотопська відьма" — це розважальний бурлеск (спадщина "Енеїди") чи гостра політична сатира на занепад Гетьманщини?'
  - 'Дебат 2: Образ відьми — це елемент фольклору та готичного роману, чи це метафора для викриття суспільних забобонів і
    невігластва влади?'
  - '[!epistemic-humility] Радянське літературознавство бачило тут "класову боротьбу". Постколоніальні критики — картину деградації
    еліт, що втратили державність.'
  - 'Квітка-Основ''яненко: сентименталіст ("Маруся") vs сатирик ("Конотопська відьма"). Чи це два різні автори, чи дві сторони
    однієї стратегії просвітництва?'
  section: 'Конфліктна карта: Сміх чи Політика?'
  words: 900
- points:
  - 'Ключова сцена: "утоплення" відьом. Аналіз епізоду як фарсу, що викриває абсурдність "правосуддя" Забрьохи та Пістряка.'
  - 'Система персонажів: Сотник Забрьоха (тупість і влада), Писар Пістряк (хитрість і корупція), Відьма Явдоха (маніпуляція
    і знання).'
  - 'Аналіз діалогів: як через розмови розкривається справжня ієрархія влади в Конотопі, де писар керує сотником.'
  - '[!decolonization] Твір показує механізми внутрішнього розкладу козацької автономії, що уможливило її ліквідацію імперією.
    Вороги не зовнішні, а внутрішні.'
  section: 'Читання: Полювання на відьом та галерея антигероїв'
  words: 1700
- points:
  - 'Макаронічна мова Пістряка: аналіз суміші церковнослов’янізмів, російських канцеляризмів та української лексики як інструменту
    соціальної імітації та обману.'
  - '[!myth-buster] Це не просто "неправильна" мова. Це точна стилізація мови тогочасної корумпованої бюрократії, "канцеляриту".'
  - 'Елементи готичного роману: нічні польоти, демонологія, перевертництво. Як Квітка "приручає" готику, перетворюючи її на
    комедію абсурду, а не на жахи.'
  - 'Бурлеск і вульгаризми: аналіз "низької" лексики та фізіологічних жартів як способу десакралізації влади та "високого"
    стилю.'
  section: 'Мова і поетика: Канцелярит, готика та суржик'
  words: 1500
- points:
  - 'Повернення до розминки: Як одна людина могла написати "Марусю" і "Конотопську відьму"? Аргументована відповідь студента.'
  - 'Рецепція твору: Чому твір був настільки популярним і водночас викликав обурення? Як його читають сьогодні?'
  - 'Історичний урок: "Конотопська відьма" як енциклопедія шахрайства та адміністративного ідіотизму. Які уроки актуальні
    для сучасної України?'
  - '[!anti-hagiography] Квітка не просто "висміює". Він ставить діагноз суспільству, де невігластво і корупція стали нормою,
    що веде до втрати державності.'
  section: Дискусія та підсумок
  words: 700
focus: Сатирична критика занепаду Гетьманщини, бурлескний реалізм, готичні елементи, макаронічна мова як інструмент соціального
  коментаря.
