content_outline:
- points:
  - 'Провокація: Чи може текст, написаний за кілька тижнів у лютому-березні 2022, вважатися великою літературою? Чи це радше
    історичне свідчення?'
  - 'Цитата з тексту: «Ім’я «Буча» світ уже вивчив. А імен тих, хто загинув у Бучі, не знатиме ніхто...» — як література працює
    з безіменною трагедією?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Жанрова природа тексту. Це філософська есеїстика (як попередні праці Забужко) чи це новий жанр — література
    негайного свідчення?'
  - 'Дебат 2: Місце в каноні. Чи увійде цей текст до канону української літератури, чи залишиться важливим, але все ж документом
    своєї епохи? Де межа між літературою та публіцистикою?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у тексті потужний голос пророка, інші — квапливу реакцію інтелектуалки,
    що не мала часу на рефлексію. Немає єдиної «правильної» оцінки.'
  section: 'Конфліктна карта: Свідчення, есеїстика чи хроніка?'
  words: 900
- points:
  - 'Текст: Розбір ключових уривків з есе, що увійшли до збірки, зокрема про промову Забужко в Європарламенті.'
  - 'Аналіз структури: Як авторка поєднує особистий досвід (застрягти за кордоном без речей) із глобальним аналізом багатовікової
    війни Росії проти України.'
  - 'Наративна позиція: Забужко пише від першої особи, але це «ми» — колективне тіло нації, що переживає екзистенційну загрозу.'
  - '[!decolonization] Текст як акт культурної дипломатії: Забужко пояснює західному читачеві, що ця війна — не «путінська»,
    а колоніальна війна російського імперіалізму, що триває століттями.'
  section: 'Читання: Голос із безодні'
  words: 1700
- points:
  - 'Стилістичний фокус: Як Забужко використовує мову для передачі травматичного досвіду, який, за визначенням, є «невимовним».'
  - 'Лексика: Поєднання високого, філософського стилю з брутальною лексикою війни (орки, розстріл, геноцид). Аналіз ефекту
    від такого зіткнення.'
  - 'Синтаксис: Довгі, складні речення як спроба інтелектом осягнути хаос. Риторичні питання як основний інструмент діалогу
    з читачем.'
  - '[!myth-buster] Цей текст руйнує міф про «братні народи» та «велику російську культуру» не емоціями, а через холодний
    аналіз імперського дискурсу, що прихований у мові.'
  section: 'Мова і поетика: Мова не-мовчання'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, це література чи документ? Студент має сформулювати власну позицію, спираючись на аналіз.'
  - 'Рецепція: Як текст був сприйнятий в Україні та на Заході? Чи однакові акценти робили закордонні та українські критики?'
  - '[!anti-hagiography] Попри важливість тексту, чи є в ньому слабкі місця? Можливо, надмірна категоричність або повторюваність
    тез? Критичний погляд на текст як на артефакт, а не ікону.'
  - 'Сучасне значення: Яку роль відіграють інтелектуали та письменники під час повномасштабної війни? Чи змінилася ця роль
    з часів Шевченка?'
  section: Дискусія та підсумок
  words: 700
focus: Literary analysis of Oksana Zabuzhko's 'The Longest Journey', exploring its genre (essay vs. chronicle vs. testimony),
  its decolonial function, and the poetics of witnessing.
level: LIT
module: lit-180
objectives:
- Аналізувати текст "Найдовша подорож" як багатожанровий феномен на межі есеїстики, свідчення та філософського трактату
- Визначати та пояснювати деколоніальну функцію тексту, його роль у спротиві російському імперському дискурсу
- Досліджувати стилістичні особливості мови Забужко як інструменту для вербалізації травматичного досвіду
- Формулювати власну аргументовану позицію щодо місця твору в сучасному літературному процесі та майбутньому каноні
