objectives:
- Аналізувати жанр співомовки як унікальне явище в українській літературі.
- Пояснювати, як гумор та сатира можуть слугувати інструментом культурного опору та деколонізації.
- Розрізняти різні критичні погляди на місце Руданського в літературному каноні.
- Визначати стилістичні та мовні засоби, що створюють комічний ефект у творах Руданського.
