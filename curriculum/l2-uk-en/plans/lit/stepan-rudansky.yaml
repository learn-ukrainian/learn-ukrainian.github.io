activity_hints:
- description: Визначити, кому належить теза про творчість Руданського — Івану Франку чи сучасним критикам.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити пропущені діалектизми або ключові слова-дотепи в уривках із творів Руданського.
  focus: Мова співомовок
  items: 5
  type: fill-in
- description: Проаналізуйте співомовку, не розглянуту в модулі. Визначте її структуру, дійових осіб, джерело комічного та
    головну ідею.
  focus: Аналіз співомовки
  type: note
- description: Напишіть есе (400-600 слів) на тему "Як Степан Руданський використовував сміх для критики імперських порядків
    та утвердження української ідентичності?".
  focus: 'Есе: Гумор як інструмент деколонізації'
  type: note
cefr_min: C1
connects_to:
- lit-38
content_outline:
- points:
  - 'Провокація: Чому лікар за фахом (Степан Руданський) став одним із найдотепніших гумористів в українській літературі?
    Як медицина вплинула на його вміння «діагностувати» суспільні вади?'
  - Фрагмент співомовки "Добре торгувалось" без контексту — студент має вгадати, чим закінчиться діалог.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Місце Руданського в каноні. Це «простонародний» гуморист для широких мас чи недооцінений майстер слова, що випередив
    свій час?'
  - 'Дебат 2: Природа сміху Руданського. Це легка розвага чи гостра соціальна критика, замаскована під анекдот? [!decolonization]'
  - '[!epistemic-humility] Позиція Івана Франка (вважав гумор Руданського занадто «дрібним») vs сучасні переоцінки, що вбачають
    у ньому модерніста та предтечу екзистенційного гумору.'
  section: 'Конфліктна карта: Народний поет чи витончений майстер?'
  words: 900
- points:
  - 'Детальний розбір кількох ключових співомовок: аналіз сюжету-анекдоту, діалогічної структури та несподіваної кінцівки
    (пуанту).'
  - 'Система персонажів: хитрий мужик, жадібний пан, зарозумілий москаль, кмітливий козак. Як типажі розкривають соціальні
    конфлікти епохи.'
  - '[!decolonization] Агентність українського героя: селянин Руданського — не пасивна жертва, а активний, розумний суб''єкт,
    що перемагає пана не силою, а інтелектом.'
  - 'Символізм та алегорії: розбір, як прості побутові сцени перетворюються на узагальнення про людську природу та суспільні
    відносини.'
  section: 'Читання: "Пан та Іван в дорозі" та інші співомовки'
  words: 1700
- points:
  - 'Стилістична інновація: створення унікального жанру співомовки, що поєднує фольклорну традицію анекдоту з віршованою формою.'
  - 'Робота з народною мовою: використання діалектизмів, приказок, живої розмовної інтонації як основа комічного ефекту.'
  - 'Ритм і синтаксис як інструменти гумору: як коротка строфа, точний ритм та лаконізм створюють напругу, що розряджається
    у фінальному пуанті.'
  - '[!myth-buster] Руйнування міфу про те, що «народна» поезія є простою чи примітивною. Аналіз показує високу майстерність
    та філігранну роботу зі словом.'
  section: 'Мова і поетика: Мистецтво дотепності'
  words: 1500
- points:
  - 'Повернення до розминки: Як професія лікаря допомогла Руданському стати майстром сатири?'
  - 'Рецепція творчості: чому Руданський був майже забутий після смерті і як його заново "відкрили" у XX столітті?'
  - 'Сучасне значення: чи актуальні сьогодні жарти Руданського про панів, чиновників та "простих людей"? Проти кого спрямований
    був би його гумор у XXI столітті?'
  - 'Питання для рефлексії: Чи може сміх бути зброєю? Аргументуйте на прикладі творчості Руданського.'
  section: Дискусія та підсумок
  words: 700
focus: Співомовки Руданського, гумор як літературний прийом, робота з народною мовою, деколонізація через сміх
