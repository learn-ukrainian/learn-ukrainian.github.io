content_outline:
- points:
  - 'Провокація: «Ніж у сонці» — це опис реальної бійки, космічна алегорія чи психоделічний тріп? Як читати поезію, що пручається
    однозначному тлумаченню?'
  - 'Цитата без контексту: «І помер у мені поет. / І воскрес філолог. / І сказав: / — Це гіпербола, сину...» — що це означає
    для автора?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Драч — новатор-модерніст чи продовжувач традиції «теплого» соцреалізму? Суперечка про його місце серед шістдесятників.'
  - 'Дебат 2: Трагедія таланту в СРСР. Як поєднувалися його авангардна поезія та подальша кар''єра партійного функціонера?
    Чи можна відокремити митця від людини?'
  - '[!epistemic-humility] Критики досі сперечаються, чи був його перехід до офіціозу зрадою ідеалів, чи спробою вижити і
    зберегти українську культуру зсередини системи.'
  section: 'Конфліктна карта: Модерніст чи конформіст?'
  words: 900
- points:
  - Повний текст балади для close reading.
  - 'Аналіз сюжету: від побутової сцени до вселенської драми. Етапи трансформації образу: ніж, сонце, серце.'
  - 'Система персонажів: ліричний герой, сонце, хулігани. Хто є справжнім антагоністом?'
  - '[!decolonization] Відхід від народницької традиції. Драч доводить, що українська поезія може бути урбаністичною, інтелектуальною
    та глобальною, а не лише сільською та фольклорною.'
  - 'Конфлікт як рушійна сила: зіткнення профанного (бійка) і сакрального (сонце).'
  section: 'Читання: Балада «Ніж у сонці»'
  words: 1700
- points:
  - 'Стилістична інновація: «асоціативне мислення». Як Драч поєднує непоєднувані образи (сонце, базар, атом, серце)?'
  - 'Робота з мовою: неологізми, розмовна лексика в поетичному тексті.'
  - '[!myth-buster] Драч — це не тільки «Ніж у сонці». Аналіз інших балад («Балада про соняшник») для виявлення наскрізних
    мотивів і прийомів.'
  - 'Особливості синтаксису: «рваний» ритм, вільний вірш (верлібр) як засіб передачі динаміки та емоційної напруги.'
  - 'Інтертекстуальність: приховані діалоги з Тичиною, Маяковським, Лоркою.'
  section: 'Мова і поетика: Асоціативність і синтаксис'
  words: 1500
- points:
  - 'Повернення до розминки: то як же читати «Ніж у сонці»? Студент формулює власну інтерпретацію на основі аналізу.'
  - 'Рецепція творчості: як сприймали Драча сучасники (шістдесятники) і як його оцінюють сьогодні?'
  - '[!anti-hagiography] Обговорення складних аспектів біографії Драча та їх впливу на сприйняття його творчості. Чи може
    «поганий» вчинок перекреслити «хороший» текст?'
  - 'Вплив на наступні покоління: відголоски поетики Драча в сучасній українській літературі.'
  section: Дискусія та підсумок
  words: 700
focus: Поезія Івана Драча, балада «Ніж у сонці», асоціативна поетика, шістдесятництво, деколонізаційний вимір модернізму
