content_outline:
- points:
  - 'Провокація: Чи може одна літера (ї) бути загрозою для цілої імперії? Чому указ про заборону мови починався з заборони
    правопису?'
  - 'Цитата без контексту: «Немає, не було і бути не може». Що саме заперечується, і як це пов''язано з абеткою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Кулішівка (фонетичний принцип «пиши, як чуєш») vs. Максимовичівка (етимологічний, що зберігав історичні написання).
    Це суперечка про науку чи про ідентичність?'
  - 'Дебат 2: «Ярижка» (транслітерація російськими літерами) як інструмент асиміляції vs. «Драгоманівка» (радикальна фонетика)
    як анти-імперський жест.'
  - '[!epistemic-humility] Не було єдиного «правильного» рішення. Кожен правопис був політичним маніфестом і компромісом між
    традицією, зручністю та ідеологією.'
  section: 'Конфліктна карта: Фонетика проти історії'
  words: 900
- points:
  - 'Аналіз «тексту» Кулішівки: введення літери "ї", апостроф, відмова від "ъ" та "ы". Як ці графічні зміни утверджували окремішність
    української фонетики?'
  - 'Close reading Валуєвського циркуляру (1863): аналіз мови документа, евфемізмів («наречие»), і логіки заборони друку «релігійних
    та навчальних» книг.'
  - 'Close reading Емського указу (1876): розширення заборони на всі сфери, від театру до нот. Чому імперія вважала українську
    мову «небезпечною» навіть у приватній сфері?'
  - '[!decolonization] Розгляд цих указів не як «трагічної долі», а як актів лінгвоциду — свідомого нищення мови як основи
    ідентичності. Кулішівка як акт опору.'
  section: 'Читання: Кулішівка та імперські укази'
  words: 1700
- points:
  - Як вибір орфографії впливає на візуальну та ритмічну структуру тексту? Порівняння уривка з Шевченка в «ярижці» та в Кулішівці.
  - Літера «ї» як поетичний і політичний символ у творчості поетів-шістдесятників (Іван Драч, Ліна Костенко). Як графічний
    елемент стає носієм ідеї?
  - Стилістичний аналіз самого тексту Куліша «Записки о Южной Руси». Як його наукова проза поєднується з його ж правописними
    принципами?
  - '[!myth-buster] Куліш — не «творець мови», а її кодифікатор. Мова існувала, він запропонував системний спосіб її запису,
    що стало революцією.'
  section: 'Мова і поетика: Поетика правопису'
  words: 1500
- points:
  - 'Повернення до розминки: тож чи може літера бути зброєю? Аргументована відповідь на основі матеріалу модуля.'
  - 'Рецепція: як Кулішівка була сприйнята в Галичині та в Наддніпрянській Україні? Чому виникли «Азбучні війни»?'
  - 'Сучасна релевантність: дискусії навколо правопису 2019 року (проєкт, проєкт; Атени, Афіни). Чи є вони відлунням «воєн
    XIX століття»?'
  - 'Студентська рефлексія: що змінилося у вашому сприйнятті української абетки після цього модуля?'
  - '[!anti-hagiography] Постать Куліша: геніальний мовознавець, але складна та суперечлива особистість. Його політичні погляди
    змінювалися, але внесок у мову — вічний.'
  section: Дискусія та підсумок
  words: 700
