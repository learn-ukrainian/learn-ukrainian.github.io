content_outline:
- points:
  - 'Провокація: Інтелектуал у тоталітарному суспільстві — зрадник чи жертва? Розглядаємо дилему через Доктора Серафікуса.'
  - 'Цитата без контексту: "Я хочу бути архітектором, а не руїнником..." — хто це каже і в яких обставинах?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Доктор Серафікус" — це зразок неокласичного "роману ідей" з його культом форми та раціо? Чи це ранній український
    екзистенціалізм з мотивами абсурду та "смерті Бога"?'
  - 'Дебат 2: Авторська позиція. Домонтович — "внутрішній емігрант", що втік у історіософію від радянської дійсності, чи прихований
    критик режиму?'
  - '[!epistemic-humility] Літературознавці (Шерех, Костюк, Агеєва) пропонують кардинально різні інтерпретації творчості письменника.'
  section: 'Конфліктна карта: Неокласик чи екзистенціаліст?'
  words: 900
- points:
  - 'Розбір ключових уривків: філософські діалоги Серафікуса та Комахи як центр роману.'
  - 'Аналіз сюжету: криза ідеології та відчуження в радянському Києві 1920-х.'
  - 'Система персонажів: Серафікус як український варіант "зайвої людини", його стосунки з Вер-гоф та іншими персонажами.'
  - '[!decolonization] Роман Домонтовича як самобутній твір УКРАЇНСЬКОЇ інтелектуальної прози, а не просто наслідування європейських
    зразків.'
  section: 'Читання: Аналіз ключових сцен'
  words: 1700
- points:
  - 'Стилістичні інновації: створення "роману ідей" в українській літературі.'
  - 'Мова: поєднання наукового, філософського та іронічно-побутового лексикону.'
  - 'Синтаксис: лаконічність, афористичність та точність формулювань як риса неокласичного стилю.'
  - '[!myth-buster] Домонтович не є "сухим" істориком. Його проза — це майстерно замаскована психологічна драма, де емоції
    приховані за інтелектуальною маскою.'
  section: 'Мова і поетика: Інтелектуальна точність і стилізація'
  words: 1500
- points:
  - 'Повернення до розминки: ким є інтелектуал у кризовому суспільстві? Формулюємо відповідь на основі аналізу.'
  - 'Рецепція твору: чому "Доктор Серафікус" був фактично заборонений і як змінилося його сприйняття після повернення в канон?'
  - '[!anti-hagiography] Деконструкція образу "шляхетного інтелектуала". Чи є Серафікус позитивним героєм? Аналіз його вчинків
    та бездіяльності.'
  - 'Сучасна актуальність: паралелі між досвідом інтелігенції 1920-х та викликами для українських інтелектуалів сьогодні.'
  section: Дискусія та підсумок
  words: 700
focus: Viktor Domontovych's "Dr. Seraphicus", intellectual prose, the crisis of the intellectual in the Soviet 1920s, neo-classicism
  vs. modernism, decolonizing the 'Executed Renaissance'
level: LIT
module: lit-104
objectives:
- Аналізувати "Доктора Серафікуса" як філософський "роман ідей" та психологічний портрет інтелектуала на зламі епох
- Розрізняти неокласичні та модерністські елементи в поетиці Домонтовича
- Формулювати власну позицію в літературознавчій дискусії щодо творчості письменника
- Критично оцінювати стратегії виживання української інтелігенції в умовах тоталітарного режиму
