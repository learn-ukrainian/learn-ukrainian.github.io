content_outline:
- points:
  - 'Провокація: Як відпочити, коли втомився від людей, новин і самого себе? Коцюбинський у 1908 році пропонує радикальний
    рецепт — втечу в поле.'
  - 'Цитата без контексту: «Моїм житлом тепер стала біла кімната... Я тут не бачу людей і, як наслідок, до мене вертається
    спокій».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це політична алегорія чи психологічний етюд? Позиція 1 (історична): герой — втомлений революціонер після поразки
    1905 року. Позиція 2 (психологічна): це універсальна історія про вигорання та зцілення природою.'
  - 'Дебат 2: «Intermezzo» — це естетичний експеримент чи маніфест українського модернізму? Чи не є така «безсюжетна» проза
    відривом від народних потреб?'
  - '[!epistemic-humility] Критики-сучасники звинувачували Коцюбинського в «декадансі» та «аполітичності», тоді як пізніші
    покоління побачили в цьому прорив до європейської літератури.'
  section: 'Конфліктна карта: Втеча чи зцілення?'
  words: 900
- points:
  - 'Аналіз «дійових осіб»: Моя утома, Ниви у червні, Сонце, Три білих вівчарки, Залізна рука города. Чому автор персоніфікує
    абстракції та явища природи?'
  - 'Динаміка психологічного стану героя: від повної мізантропії та відрази до «людського м''яса» до поступового розчинення
    в природі й тихого прийняття світу.'
  - 'Ключовий епізод: зустріч із селянином. Як цей короткий діалог руйнує ідилію і повертає героя до соціальної реальності?'
  - '[!decolonization] Це не російська «дачна література» про спокій на лоні природи. Це досвід українського інтелігента,
    що шукає притулку від тиску імперського «города» та соціальних проблем у питомо українському ландшафті.'
  section: 'Читання: Симфонія сонця і тиші'
  words: 1700
- points:
  - 'Імпресіоністична техніка: фокус на миттєвих враженнях, кольорових плямах, звуках (дзвінок жайворонка), запахах (полин).
    Роль синестезії.'
  - 'Ритм і синтаксис: Короткі, уривчасті фрази передають нервовий стан героя. Довгі, плавні періоди — гармонію з природою.
    «Intermezzo» як музичний твір.'
  - 'Стилістичні інновації: відмова від традиційного сюжету, потік свідомості, увага до найменших порухів душі.'
  - '[!myth-buster] Твердження, що імпресіонізм — це «аполітичне мистецтво», спростовується самим текстом. Стилістичний вибір
    Коцюбинського є політичним жестом, що утверджує право митця на суб''єктивність та складність всупереч вимогам реалізму.'
  section: 'Мова і поетика: Музика прози'
  words: 1500
- points:
  - 'Повернення до розминки: чи є втеча від людей дієвим способом відновити себе? Яку відповідь дає Коцюбинський?'
  - 'Рецепція твору: як «Intermezzo» вплинуло на подальший розвиток української прози (наприклад, на «Хвильового»)?'
  - 'Сучасна релевантність: наскільки досвід героя «Intermezzo» резонує із сучасним поняттям "burnout" (вигорання)?'
  - '[!anti-hagiography] Чи не є позиція героя, що насолоджується природою, поки десь поруч страждають люди («повісили…»),
    формою ескапізму та інтелігентського егоїзму? Питання для дискусії.'
  section: Дискусія та підсумок
  words: 700
