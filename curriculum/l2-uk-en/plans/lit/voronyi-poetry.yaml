content_outline:
- points:
  - 'Провокація: Чи повинен поет бути корисним суспільству? Гостре питання, яке Микола Вороний поставив Іванові Франку і яке
    розділило українську літературу.'
  - 'Фрагмент вірша без контексту: "Йде весна запашна, / Квітами-перлами закосичена..." — Про що насправді цей текст? Про
    природу чи про щось значно більше?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Полеміка Вороного з Франком. Позиція Франка ("Націоналізм і міжнародництво"): література — це праця і боротьба.
    Позиція Вороного ("Іванові Франкові"): поет має служити красі, а не "утилітарним" цілям.'
  - 'Дебат 2: Місце Вороного в каноні. Він "справжній" європейський символіст чи лише епігон? Радянська критика таврувала
    його як "декадента". Сучасна критика вважає "батьком модернізму".'
  - '[!epistemic-humility] Немає "правильної" відповіді. Це фундаментальна дискусія про роль мистецтва, яка не має остаточного
    вирішення, лише різні аргументовані позиції.'
  section: 'Конфліктна карта: Мистецтво для мистецтва чи служба народу?'
  words: 900
- points:
  - 'Повний текст поеми "Блакитна Панна" з коментарями: аналіз образів, структури, символічного значення.'
  - 'Блакитна Панна як центральний символ: Весна, Краса, Україна, сама Поезія. Полісемія образу.'
  - 'Наративна структура: від очікування до тріумфального приходу весни-краси. Динаміка розгортання образу.'
  - '[!decolonization] Вороний свідомо орієнтувався на європейські зразки (французьких символістів), щоб довести, що українська
    література є частиною світового процесу, а не провінційним додатком до російської.'
  section: 'Читання: Поема "Блакитна Панна"'
  words: 1700
- points:
  - 'Стилістичні інновації: введення в українську поезію тем і образів, раніше вважаних "непоетичними" (місто, екзотика).'
  - 'Музичність вірша: використання алітерацій, асонансів, внутрішніх рим для створення звукового образу. Поезія як музика.'
  - 'Синтаксис як мистецтво: складні, вишукані синтаксичні конструкції, що передають нюанси почуттів ліричного героя.'
  - '[!myth-buster] Міф про те, що український модернізм — це просто "копіювання Заходу". Вороний не копіював, а творчо засвоював
    європейські ідеї на національному ґрунті, створюючи унікальний український символізм.'
  section: 'Мова і поетика: Символізм і музичність'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чия позиція вам ближча — Франка чи Вороного? Аргументуйте свою відповідь, використовуючи
    аналіз поезії.'
  - 'Рецепція та спадщина: Як сприймали Вороного сучасники? Чому його розстріляли в 1938 році? Як його творчість вплинула
    на поетів "Розстріляного відродження"?'
  - '[!anti-hagiography] Попри свій "естетизм", Вороний був активним учасником УНР, змушений був емігрувати. Його "чисте мистецтво"
    не врятувало його від трагічної долі українського інтелігента XX століття.'
  - 'Сучасне значення: Наскільки актуальною є полеміка Франка і Вороного сьогодні, в умовах повномасштабної війни?'
  section: Дискусія та підсумок
  words: 700
focus: Микола Вороний, український модернізм, символізм, полеміка з Іваном Франком, "мистецтво для мистецтва", поетика "Блакитної
  Панни"
level: LIT
module: lit-075
objectives:
- Критично аналізувати поезію Миколи Вороного в контексті полеміки між народництвом та модернізмом.
- Визначати ключові риси українського символізму на прикладі детального аналізу поеми "Блакитна Панна".
- Досліджувати мовні, стилістичні та синтаксичні інновації Вороного як засновника українського модернізму.
- Формулювати та аргументувати власну позицію щодо ролі митця в суспільстві, спираючись на ідеї Вороного та Франка.
