content_outline:
- points:
  - 'Провокація: Чи можна «завоювати» місто, не втративши себе? Роман Підмогильного — це історія успіху чи трагедія саморуйнації?'
  - 'Цитата без контексту: "Він тримав у руці своє майбутнє, повне надій і сподівань. Або повне розпачу. Він ще не знав".'
  - 'Сучасна паралель: тисячі молодих українців сьогодні їдуть до Києва "завойовувати" столицю. Що б їм порадив Степан Радченко?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Місто» — це український екзистенціалізм до Сартра і Камю? (Аргументи: фокус на відчуженні, абсурдності існування,
    індивідуальному виборі). Чи це реалістичний роман про соціальні ліфти в часи українізації? (Аргументи: точне зображення
    побуту, соціальних типів, кар''єрних стратегій).'
  - 'Дебат 2: Місце в каноні. Для радянської критики «Місто» — твір «буржуазного індивідуаліста». Для сучасників — перший
    справжній європейський роман в українській літературі. Хто правий?'
  - '[!epistemic-humility] Немає єдиної відповіді. Текст дозволяє обидва прочитання, і саме в цій подвійності його сила.'
  section: 'Конфліктна карта: Екзистенціалізм чи соціальний реалізм?'
  words: 900
- points:
  - 'Аналіз ключових епізодів: переїзд до міста, стосунки з жінками як етапи підкорення (Надійка, "мусінька", Зоська, Рита),
    перші літературні успіхи та розчарування.'
  - 'Структура роману: рух від фізичного «дна» (життя в сараї) до соціального «верху» (визнаний письменник). Чи є цей рух
    духовним прогресом?'
  - 'Система персонажів: жінки як метафори різних аспектів міського життя (культура, побут, богема, тілесність).'
  - '[!decolonization] Підмогильний створює українського міського героя, який не є селянином, що страждає в місті, а активним
    завойовником. Він доводить, що українська культура — це не лише село, а й інтелектуальне, складне міське життя.'
  section: 'Читання: Завоювання Києва Степаном Радченком'
  words: 1700
- points:
  - 'Стилістичний аналіз: Підмогильний використовує не "орнаментальну" прозу, а точну, аналітичну, "оголену" мову, що передає
    психологічний стан героя.'
  - 'Синтаксис як інструмент психологізму: довгі, складні речення для рефлексій Радченка vs короткі, уривчасті фрази в моменти
    кризи.'
  - 'Лексика: поєднання сільських діалектизмів (на початку) з міською, науковою, філософською термінологією (в кінці) — мовна
    еволюція героя.'
  - '[!myth-buster] Це не просто "реалізм". Підмогильний використовує техніку невласне прямої мови, внутрішні монологи та
    елементи потоку свідомості, випереджаючи багатьох європейських модерністів.'
  section: 'Мова і поетика: Психологічний синтаксис'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, Степан Радченко завоював місто чи місто завоювало його? Аргументуйте свою позицію на основі
    тексту.'
  - '[!anti-hagiography] Радченко — не герой, а часто анти-герой. Він егоїстичний, маніпулятивний, жорстокий до жінок. Чи
    можна симпатизувати такому персонажу? Чи обов''язково симпатизувати головному герою?'
  - 'Рецепція: як роман був сприйнятий у 1928 році? Чому його заборонили? Як змінилось його прочитання після повернення в
    канон у 1990-х?'
  - 'Сучасна актуальність: проблема компромісу між совістю та кар''єрою, ціна успіху, самотність у великому місті — наскільки
    ці теми резонують сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Роман Валер'яна Підмогильного «Місто» як перший український урбаністичний роман, психологічний аналіз, екзистенціалізм,
  проблема завоювання міста.
