objectives:
- Аналізувати роман «Місто» як перший український урбаністичний та психологічний роман
- Розрізняти та аргументувати різні інтерпретації твору (екзистенціалістську, соціально-історичну)
- Досліджувати стилістичні особливості прози Підмогильного, зокрема прийоми психологізму
- Формулювати критичну позицію щодо неоднозначних дій та моральних виборів головного героя
- Оцінювати деколонізаційне значення роману в контексті утвердження української міської культури
