activity_hints:
- description: Перевірка розуміння дебату про "феномен Тичини". Чия це теза — Стуса, Сверстюка чи радянської критики?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити пропущені "радянські" епітети та кліше в уривок з партійної поезії Тичини, щоб відчути механіку стилю.
  focus: Лексика соцреалізму
  items: 5
  type: fill-in
- description: Порівняйте два вірші Тичини — один раннього періоду ("Арфами, арфами..."), інший радянського ("Партія веде").
    Визначте 5 ключових відмінностей у поетиці, лексиці та інтонації.
  focus: 'Порівняльний аналіз: "кларнетизм" vs соцреалізм'
  type: note
- description: Напишіть есе (400-600 слів), де ви сформулюєте власну позицію щодо спадщини Тичини. Чи був він генієм, що зламався,
    чи талановитим кон'юнктурником? Аргументуйте свою думку на основі текстів з модуля.
  focus: 'Есе: "Феномен чи трагедія Павла Тичини?"'
  type: note
cefr_min: C1
connects_to:
