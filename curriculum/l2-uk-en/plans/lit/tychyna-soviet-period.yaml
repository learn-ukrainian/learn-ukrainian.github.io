content_outline:
- points:
  - 'Провокація: Як поет, що написав "Арфами, арфами...", міг написати "Партія веде"? Це питання — ключ до розуміння не тільки
    Тичини, але й цілої радянської епохи.'
  - 'Уривок з вірша "Партія веде" подається як анонімна цитата. Завдання студента: вгадати автора, епоху та мету цього тексту.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Тичина-конформіст" vs "Тичина-в''язень". Чи був його перехід на радянські позиції свідомим вибором цинічного
    кар''єриста, чи трагічною спробою вижити в умовах терору, зберігши хоч частину української культури?'
  - 'Дебат 2: "Ампутувати" чи "анатомувати"? Чи варто вивчати радянську творчість Тичини, чи краще її "забути", залишивши
    в каноні лише геніального "кларнетиста"?'
  - '[!epistemic-humility] Позиції критиків: Василь Стус ("феномен догідництва"), Євген Сверстюк ("геній, що зламався"), та
    офіційна радянська критика ("голос народу"). Немає єдиної відповіді.'
  section: 'Конфліктна карта: Феномен чи трагедія?'
  words: 900
- points:
  - Повний текст поеми з коментарями. Аналіз структури як псевдо-літургії, де місце Бога займає Партія.
  - 'Наративна структура: від "темряви" минулого до "світла" комуністичного майбутнього. Як текст створює міф про партію-деміурга.'
  - 'Система образів: Ленін/Сталін як пророки, партія як непогрішима сила, народ як єдина маса без індивідуальності.'
  - '[!decolonization] Поезія як інструмент колонізації: як українська мова, одна з найбагатших, була зведена до інструменту
    для оспівування імперського центру та його ідеології.'
  section: 'Читання: поема "Партія веде"'
  words: 1700
- points:
  - 'Аналіз деградації стилю: як "сонячні кларнети", неологізми та складна метафорика раннього Тичини перетворилися на "трактори
    в полі" та ритуальні панегірики.'
  - 'Словник "партійної поезії": аналіз лексики (панегірики, ритуальні епітети, новояз), що стала обов''язковою для радянського
    письменника.'
  - 'Синтаксис та ритміка як інструмент маніпуляції: маршовий ритм, прості речення, риторичні оклики, що створюють ефект гіпнотичного
    навіювання.'
  - '[!myth-buster] Міф: Тичина повністю втратив свій талант. Факт: навіть у найслабших партійних віршах простежується унікальна
    музичність і ритміка, що робить трагедію його падіння ще гострішою.'
  section: 'Мова і поетика: Від кларнетизму до соцреалізму'
  words: 1500
- points:
  - 'Повернення до розминки: то як геній перетворюється на функціонера? Формулювання відповіді на основі аналізу модуля.'
  - 'Рецепція творчості: як сприймали радянського Тичину в діаспорі (зрада), в УРСР (офіціоз), і як ми читаємо його сьогодні?'
  - '[!anti-hagiography] Уникаємо двох крайнощів: Тичина — не безневинна жертва і не одновимірний лиходій. Його постать —
    це дзеркало для складних питань про совість, компроміс і ціну виживання в тоталітарній системі.'
  - 'Сучасна релевантність: чи існують "тичини" сьогодні? Дискусія про роль митця у сучасній інформаційній війні.'
  section: Дискусія та підсумок
  words: 700
focus: The tragic transformation of Pavlo Tychyna from a leading modernist poet ("clarinettism") to a state-sanctioned bard
  of the Soviet regime, analyzing the stylistic degradation and the moral compromises reflected in poems like "Партія веде".
level: LIT
module: lit-084
objectives:
- Критично оцінювати поезію Павла Тичини радянського періоду як складний феномен, що поєднує мистецьку майстерність та ідеологічний
  примус.
- Аналізувати еволюцію (або деградацію) поетики Тичини під тиском соцреалізму, виявляючи залишки "кларнетизму".
- Формулювати аргументовану позицію щодо місця "партійного" Тичини в українському літературному каноні.
- Дискутувати про трагедію митця в тоталітарній державі, використовуючи творчість Тичини як центральний кейс.
pedagogy: CBI
