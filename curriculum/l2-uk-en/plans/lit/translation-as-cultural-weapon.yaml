activity_hints:
- description: Визначити, яка з позицій ("вірність" vs "адаптація", "асиміляція" vs "опір") відповідає наведеним тезам про
    переклад.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити в речення терміни (асиміляція, субверсія, канон, дискурс) з модуля, пояснюючи їхнє значення в контексті
    культурної боротьби.
  focus: Лексикон опору
  items: 5
  type: fill-in
- description: Порівняти два гіпотетичні переклади одного уривка (один "нейтральний", інший "деколонізований"). Визначити
    та пояснити 3-4 ключові відмінності, аргументуючи, як вони змінюють ідеологічне звучання тексту.
  focus: Аналіз перекладацьких стратегій
  type: note
- description: На основі матеріалів модуля напишіть есе (400-600 слів) на тему "Чи може переклад бути актом політичного спротиву?".
    Використайте щонайменше 3 аргументи з тексту модуля.
  focus: 'Есе: Перекладач як культурний агент'
  type: note
cefr_min: C1
connects_to:
- lit-126
- concepts-postcolonialism
content_outline:
- points:
  - 'Провокація: Чи може переклад бути потужнішим за оригінал? Чи може перекладач бути солдатом на культурному фронті?'
  - 'Цитата-загадка: "Кожен переклад — це або колонізація, або повстання". Як ви розумієте цю тезу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Вірність букві vs вірність духові. Стратегія "одомашнення" (зробити текст близьким і зрозумілим) проти "очуження"
    (зберегти культурну дистанцію).'
  - 'Дебат 2: Переклад як асиміляція vs переклад як самоствердження. Чи збагачує переклад цільову культуру, чи розмиває її
    унікальність, імпортуючи чужі концепти?'
  - '[!epistemic-humility] Не існує "ідеального" перекладу. Будь-який вибір перекладача — це ідеологічний акт, свідомий чи
    ні.'
  section: 'Конфліктна карта: Перекладач: вірний раб чи таємний диверсант?'
  words: 900
- points:
  - 'Close reading: Аналіз уривків з перекладів Миколи Лукаша або Григорія Кочура, де вони свідомо "українізують" світову
    класику.'
  - 'Порівняльний аналіз: той самий уривок у радянському "нейтральному" перекладі та в перекладі українських шістдесятників.
    Які лексичні та синтаксичні зміни створюють ефект опору?'
  - '[!decolonization] Як переклад стає інструментом повернення вкраденої історії та утвердження суб''єктності української
    літератури, відмовляючись від Москви як посередника.'
  - Аналіз того, як вибір лексики (архаїзми, козацькі терміни, діалектизми) створює паралельний історичний наратив.
  section: 'Читання: Анатомія культурної зброї'
  words: 1700
- points:
  - 'Стилістична субверсія: як перекладачі використовують мову для підриву офіційного дискурсу. Створення неканонічних образів,
    гра з ідіомами.'
  - Неологізми та оказіоналізми в перекладі як спосіб розширення виражальних можливостей мови та маркування її самобутності.
  - 'Ритм і синтаксис як політичний вибір: аналіз речень, структура яких свідомо уникає калькування з російської мови.'
  - '[!myth-buster] Руйнування міфу про "неперекладність". Українська школа художнього перекладу доводить, що будь-який твір
    світової літератури може і повинен звучати українською без втрати художньої вартості.'
  section: 'Мова і поетика: Лексикон опору'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є перекладач солдатом? Формулювання відповіді на основі аналізу перекладацьких стратегій.'
  - 'Рецепція: як радянська критика реагувала на "націоналістичні" переклади? Чому ці тексти ставали культовими в дисидентських
    колах?'
  - 'Сучасний вимір: дискусія про сучасні перекладацькі війни в Україні (дубляж фільмів, назви, термінологія). Чи продовжують
    вони традиції "культурної зброї"?'
  - '[!anti-hagiography] Критичний погляд: чи не призводило таке "озброєння" перекладу до спотворення оригіналу? Де межа між
    деколонізацією та маніпуляцією?'
  section: Дискусія та підсумок
  words: 700
focus: Роль перекладу як інструменту культурного спротиву та деколонізації; аналіз перекладацьких стратегій, що або підсилюють,
  або підривають імперські наративи.
