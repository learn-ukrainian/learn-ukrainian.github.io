content_outline:
- points:
  - 'Провокація: «Ліпше вмерти біжучи, ніж жити гниючи». Цитата з іншого роману Багряного, що ідеально пасує до головного
    героя Андрія Чумака. Що змушує людину йти на смерть заради свободи?'
  - 'Загадка: Чому назва роману про радянські катівні — біблійна? Який зв''язок між муками Христа і долею українського в''язня?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це автобіографія чи художній вимисел? Позиція 1: Роман — це детальний, документальний звіт про методи НКВС,
    заснований на власному досвіді автора. Позиція 2: Роман використовує автобіографічний матеріал для створення універсальної
    притчі про боротьбу Добра і Зла, Людини і Системи.'
  - 'Дебат 2: Місце в каноні. Позиція 1: Текст — ключовий для канону української літератури ХХ століття, бо він говорить про
    головну травму — тоталітаризм. Позиція 2: Текст надто публіцистичний та «авантюрний», він програє в художній якості іншим
    творам модернізму.'
  - '[!epistemic-humility] Немає єдиної «правильної» інтерпретації. Цінність роману в тому, що він дозволяє обидві прочитання
    одночасно.'
  section: 'Конфліктна карта: Свідчення чи філософія?'
  words: 900
- points:
  - 'Розбір ключових сцен: допити Андрія Чумака. Аналіз психологічного поєдинку між в''язнем і слідчими (Сергєєв, Донець).'
  - 'Система персонажів: Чумак як уособлення незламності духу. Слідчі як різні обличчя системи (цинік, садист, «ідейний»).
    Інші в''язні як спектр реакцій на терор.'
  - 'Наративна структура: циклічність допитів, що створює відчуття пекла. Втеча не як географічне переміщення, а як духовний
    прорив.'
  - '[!decolonization] Роман руйнує радянський міф про «щасливе життя в СРСР» і показує імперію як машину знищення, а українця
    — як суб''єкта опору, а не покірну жертву.'
  section: 'Читання: Опір у камері №38'
  words: 1700
- points:
  - 'Стилістичний аналіз: поєднання натуралістичних описів тортур з ліричними відступами та філософськими роздумами. Багряний
    як майстер «експресивного реалізму».'
  - 'Мова як характеристика: «Табірна лексика» (жаргон в''язнів) як ознака автентичності. Канцеляризми та новояз слідчих як
    мова дегуманізації.'
  - 'Інтертекстуальність: детальний аналіз назви «Сад Гетсиманський». Паралелі між стражданнями Христа і вибором Андрія Чумака.
    Інші біблійні образи у творі.'
  - '[!myth-buster] Це не просто «табірний роман». Це — філософський роман, що використовує матеріал ГУЛАГу для дослідження
    меж людської витривалості та природи зла.'
  section: 'Мова і поетика: Експресивний реалізм та біблійні алюзії'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви розумієте біблійну назву роману? Студент формулює відповідь, спираючись на аналіз
    тексту.'
  - 'Історія рецепції: як роман сприймали в еміграції та як його «повернення» в Україну в 1990-х змінило розуміння радянського
    періоду.'
  - 'Сучасна релевантність: що «Сад Гетсиманський» говорить українцям сьогодні, в умовах нової війни за існування? Чи змінилися
    методи імперії?'
  - '[!anti-hagiography] Чи можемо ми критикувати Чумака? Чи є його поведінка єдиноможливою моделлю опору? Провокативне питання
    для фінальної дискусії.'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз роману «Сад Гетсиманський»: опір тоталітаризму, людська гідність в умовах ГУЛАГу, автобіографічні та екзистенційні
  виміри, поетика експресивного реалізму.'
level: LIT
module: lit-125
objectives:
- Аналізувати роман «Сад Гетсиманський» як свідчення про злочини тоталітаризму та як філософський текст про людську гідність.
- Розрізняти автобіографічний та екзистенційний рівні інтерпретації твору.
- Визначати ключові риси поетики Івана Багряного (експресивний реалізм, біблійні алюзії, табірна лексика).
- Формулювати аргументовану позицію щодо місця роману в українському літературному каноні.
