content_outline:
- points:
  - 'Провокація: Як вірші про сіль, хліб та вікна принесли поетові номінацію на Нобелівську премію? Чи може «тиха» поезія
    бути потужнішим спротивом, ніж прямі політичні гасла?'
  - 'Фрагмент вірша без пунктуації: "я йду по рейці / але не впевнений / що це рейка / трамваю чи поїзда"'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Голобородько — це «наївний» поет-самоук, що пише як дитина, чи витончений інтелектуал, що маскується під простоту?
    (Полеміка навколо «київської школи»)'
  - 'Дебат 2: Чи був Голобородько дисидентом? Його не друкували 17 років, але він не писав антирадянських віршів. Дебат про
    «внутрішню еміграцію» як форму опору.'
  - '[!epistemic-humility] Критики досі сперечаються, чи була поетика «київської школи» свідомим ескапізмом, чи єдиноможливою
    формою збереження української культури в умовах цензури.'
  section: 'Конфліктна карта: Мовчання чи герметизм?'
  words: 900
- points:
  - 'Розбір ключових віршів ("Наша розмова", "Із хати", "Теплі вірші"): аналіз структури, відсутність розділових знаків, роль
    пауз.'
  - 'Система образів-архетипів: дім, вікно, птах, річка, хліб. Як буденні речі стають елементами космогонічного міфу.'
  - 'Конфлікт як відсутність: де ворог? Поезія Голобородька ігнорує радянську реальність, створюючи паралельний, автентичний
    світ.'
  - '[!decolonization] Голобородько як анти-соцреалізм. Повернення до фольклорних, дорадянських джерел образності (загадка,
    колядка) як акт культурного спротиву та втечі з імперського дискурсу.'
  section: 'Читання: Поезія збірки "Летюче віконце"'
  words: 1700
- points:
  - 'Верлібр (вільний вірш): відмова від рими і метра як свідома відмова від зовнішнього примусу та навʼязаних структур.'
  - 'Синтаксичний паралелізм: "яблука їдять..." — розбір вірша як прикладу, де синтаксис стає сюжетом.'
  - 'Фольклоризм: не цитування народних пісень, а мислення за зразком народної загадки, прислівʼя. Принцип "оживлення" метафори.'
  - '[!myth-buster] Міф про «незрозумілість» київської школи. Розвінчання: їхня «складність» — це точність. Це не герметизм
    заради гри, а спроба очистити мову від ідеологічних кліше.'
  section: 'Мова і поетика: Верлібр як філософія'
  words: 1500
- points:
  - 'Повернення до розминки: то як «тиха» поезія стає спротивом? Студент формулює відповідь на основі аналізу.'
  - 'Рецепція: 17 років заборони, тріумф після 1991-го, Нобелівська номінація. Як змінювалося сприйняття поета.'
  - '[!anti-hagiography] Попри статус «класика», Голобородько залишався маргіналізованою фігурою навіть у незалежній Україні.
    Уникаємо створення ікони «генія з народу», бачимо складну долю митця, що не вписувався в жодні рамки.'
  - 'Зв''язок із сьогоденням: актуальність поезії Голобородька в умовах війни — пошук опори в базових, вічних речах (дім,
    родина, хліб).'
  section: Дискусія та підсумок
  words: 700
focus: Василь Голобородько, верлібр, метафоризм, "київська школа", тихий спротив, поетика буденного
