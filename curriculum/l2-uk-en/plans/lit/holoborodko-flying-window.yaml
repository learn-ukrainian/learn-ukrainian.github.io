objectives:
- Аналізувати поезію Василя Голобородька в історичному та культурному контексті «застою» та «київської школи» поетів
- Визначати та інтерпретувати ключові риси поетики Голобородька: верлібр, синтаксичний паралелізм, метафоризм, фольклоризм
- Розрізняти різні критичні підходи до інтерпретації творчості поета
- Формулювати аргументовану позицію щодо ролі поезії Голобородька як форми тихого спротиву радянській ідеології
