content_outline:
- points:
  - 'Провокація: чому Франко написав «Мойсей» саме в 1905 році, напередодні революції? Це пророцтво, політична програма чи
    мистецький маніфест?'
  - Фрагмент прологу «Народе мій, замучений, розбитий…» без контексту — як цей тон задає рамки для розуміння всієї поеми?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Поема «Мойсей» — це біблійна алегорія, осучаснений апокриф чи модерна політична програма для бездержавної нації?'
  - 'Дебат 2: Місце Франка в каноні — чи був він «природним» наступником Шевченка, чи модерністом, що зламав народницьку традицію?'
  - '[!epistemic-humility] Радянське літературознавство бачило в поемі лише «боротьбу з темрявою». Постколоніальні студії
    читають її як маніфест національного визволення.'
  section: 'Конфліктна карта: Модерніст чи народник?'
  words: 900
- points:
  - 'Аналіз Прологу: детальний розбір звернення до «замученого, розбитого» народу як ключа до філософії Франка.'
  - 'Система персонажів: Мойсей (пророк, лідер), Датан (демагог-скептик), Авірон (консерватор), Єгошуа (майбутнє).'
  - 'Конфлікт як рушійна сила: зіткнення між вірою Мойсея в ідеал та прагматизмом і зневірою натовпу.'
  - 'Архетипи та міфологічні підтексти: пустеля як місце випробування, пошук «землі обітованої» як метафора державності.'
  - '[!decolonization] «Мойсей» як контр-наратив російській імперській тезі про «нездатність» українців до державотворення.
    Франко показує не слабкість, а трагедію народу на перехідному етапі.'
  section: 'Читання: Пролог та конфлікт у пустелі'
  words: 1700
- points:
  - 'Стилістичний синкретизм: поєднання біблійної патетики, філософської лексики та народнопісенної образності.'
  - 'Лексичні інновації: Франко вводить у поезію терміни з філософії та політики, створюючи нову мову для національної ідеї.'
  - 'Особливості ритміки та синтаксису: як зміна віршового розміру віддзеркалює психологічний стан героя та натовпу.'
  - '[!myth-buster] Франко — не лише «Каменяр». Поема «Мойсей» демонструє його як витонченого поета-символіста та глибокого
    філософа-екзистенціаліста, що руйнує спрощений образ «поета-революціонера».'
  section: 'Мова і поетика: Синтез і новаторство'
  words: 1500
- points:
  - 'Повернення до розминки: тож чим є «Мойсей» для сучасного читача — історичним артефактом чи актуальним текстом про лідерство,
    відповідальність та ціну свободи?'
  - 'Рецепція твору: як сприймали поему сучасники Франка, як її «редагувала» радянська цензура, і як вона звучить у XXI столітті?'
  - '[!anti-hagiography] Поема показує не лише велич пророка, а й темні сторони народу: його інертність, жорстокість, схильність
    до зради. Франко не ідеалізує, а ставить діагноз.'
  - 'Питання для рефлексії: чи може існувати нація без «пророка»? Яку роль відіграє інтелектуальна еліта в моменти історичних
    зламів?'
  section: Дискусія та підсумок
  words: 700
