content_outline:
- points:
  - 'Провокація: Чи може література, народжена в хаосі 90-х, бути чимось більшим, ніж просто документацією розпаду?'
  - Цитата з тексту Коваля, що відображає стилістичний надлишок та мовну гру, подана без коментаря.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була проза 90-х справжнім «ренесансом», чи лише постмодерністською грою та естетизацією розпаду? Позиція
    "за" (нова свобода, розрив з ідеологією) vs позиція "проти" (втрата наративної цілісності, елітарність).'
  - 'Дебат 2: Формування нового канону. Хто вирішував, що Коваль — це важливо? Дискусія про роль літературних журналів («Сучасність»),
    нової критики та читацьких спільнот у канонізації.'
  - '[!epistemic-humility] Не існує єдиної оцінки літератури 90-х; це поле битви між різними критичними школами.'
  section: 'Конфліктна карта: Ренесанс чи Декаданс?'
  words: 900
- points:
  - 'Ключовий уривок: детальний розбір сцени, де сюжетна логіка поступається місцем бароковій метафорі.'
  - 'Система персонажів як алегорія суспільства: герой-інтелектуал, трикстер, жіночі образи як символи втраченої гармонії.'
  - 'Структура роману: колаж, фрагментарність, нелінійний час як відображення травмованої історичної свідомості.'
  - '[!decolonization] Розрив із соцреалізмом: Коваль руйнує імперський міф про "зрозумілу" та "просту" українську літературу,
    пропонуючи натомість інтелектуально складний та естетично вишуканий текст.'
  section: 'Читання: Аналіз роману "Інтермеццо-91"'
  words: 1700
- points:
  - 'Стилістичні інновації: аналіз синтаксису Коваля — довгі, розгалужені речення, що імітують потік свідомості.'
  - 'Лексика: поєднання архаїзмів, неологізмів та розмовної мови для створення унікального стилістичного ефекту.'
  - 'Ритм прози: як Коваль використовує звукопис (алітерації, асонанси) для створення музичності тексту.'
  - '[!myth-buster] Руйнування міфу про "аполітичність" постмодерну: мовна гра у Коваля — це не втеча від реальності, а форма
    опору імперському дискурсу, що нав''язував одну "правильну" мову.'
  section: 'Мова і поетика: Необароко та мовна гра'
  words: 1500
- points:
  - 'Повернення до розминки: тож чим є література 90-х — свідченням розпаду чи фундаментом нової ідентичності? Аргументація
    на основі аналізу Коваля.'
  - 'Рецепція творчості: як сприймали Коваля в 90-ті і як його читають сьогодні? Зміна інтерпретацій.'
  - 'Вплив на наступні покоління: чиї риси стилю Коваля можна знайти у сучасних українських авторів?'
  - '[!anti-hagiography] Уникаючи ідеалізації: які ризики несе надмірне захоплення стилістикою на шкоду соціальній критиці?
    Обговорення "темних сторін" естетизму 90-х.'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Yuriy Koval's prose as a key phenomenon of the 90s prose renaissance, focusing on neo-baroque stylistics,
  decolonizing rupture with social realism, and the formation of a new literary canon.
