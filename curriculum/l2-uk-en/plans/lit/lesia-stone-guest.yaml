content_outline:
- points:
  - 'Провокація: Дон Жуан — спокусник чи в''язень власного міфу? Що, якби головною героїнею була не жертва, а жінка, що робить
    свідомий вибір?'
  - 'Цитата з фіналу драми, де Донна Анна каже: "Я гину, та не каюсь!" — без контексту, як загадка про справжню ціну свободи.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Феміністична критика): Донна Анна — пасивна жертва патріархального світу чи активна героїня, що свідомо обирає
    небезпечну свободу замість лицемірної моралі?'
  - 'Дебат 2 (Канонічна війна): "Камінний господар" — це просто українська варіація на тему Мольєра і Пушкіна, чи це принципово
    новий, полемічний текст, що руйнує імперський погляд на цей образ?'
  - '[!epistemic-humility] Не існує "правильної" інтерпретації. Позиція критика (феміністична, постколоніальна, формалістична)
    визначає, які аспекти твору він вважає ключовими.'
  section: 'Конфліктна карта: Дебати про Дон Жуана'
  words: 900
- points:
  - 'Аналіз першої розмови Дон Жуана та Донни Анни: як мова флірту перетворюється на філософський діалог про свободу та честь.'
  - 'Сцена з Командором: не як покарання за гріхи, а як зіткнення двох правд — "кам''яної" правди обов''язку і "живої" правди
    вільної особистості.'
  - 'Структура персонажів: Дон Жуан (воля), Донна Анна (вибір), Командор (закон), Долорес (жертва) — як ця система створює
    драматичний конфлікт.'
  - '[!decolonization] Леся Українка свідомо "українізує" іспанський міф, вкладаючи в уста героїв ідеї, актуальні для української
    інтелігенції початку ХХ ст. — боротьбу за гідність та опір імперському тиску.'
  section: 'Читання: "Камінний господар": Ключові сцени'
  words: 1700
- points:
  - 'Стилістичні інновації: "Камінний господар" як приклад українського неоромантизму — увага до сильної особистості, психологізму,
    символізму.'
  - 'Мова як характеристика: афористична, гостра мова Дон Жуана vs стримана, але емоційно напружена мова Донни Анни.'
  - 'Синтаксис як дія: короткі, уривчасті фрази в моменти напруги, розлогі філософські монологи в ключових сценах.'
  - '[!myth-buster] Це не просто ще одна п''єса про Дон Жуана. Леся Українка радикально переосмислює міф, зміщуючи фокус з
    чоловіка-спокусника на жінку, що здобуває суб''єктність.'
  section: 'Мова і поетика: Неоромантизм і психологізм драми'
  words: 1500
- points:
  - 'Повернення до розминки: то хто ж головний герой "Камінного господаря" — Дон Жуан чи Донна Анна? Аргументація позиції
    на основі аналізу.'
  - 'Рецепція твору: як сприймали драму сучасники Лесі Українки і як її читають зараз? Чи змінились акценти?'
  - '[!anti-hagiography] Попри свою геніальність, чи не ідеалізує Леся Українка "сильну особистість"? Чи може воля до свободи
    виправдати руйнівні наслідки для інших?'
  - 'Рефлексія: Який з образів драми (Дон Жуан, Донна Анна, Командор) є найбільш актуальним для сучасної України і чому?'
  section: Дискусія та підсумок
  words: 700
