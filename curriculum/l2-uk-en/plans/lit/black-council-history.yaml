module: lit-022
objectives:
- Розуміти історичний контекст періоду "Руїни" та подій Чорної ради 1663 року
- Аналізувати конфлікт між різними політичними моделями (Сомко vs. Брюховецький) як боротьбу елітарного та популістського
  підходів
- Розрізняти поняття "демократія" та "охлократія" на історичному прикладі
- Оцінювати наслідки внутрішнього розбрату та зовнішнього втручання для української державності
pedagogy: CBI
