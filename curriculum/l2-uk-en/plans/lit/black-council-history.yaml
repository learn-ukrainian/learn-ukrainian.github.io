content_outline:
- points:
  - 'Провокація: Чому найтрагічніший період української історії, "Руїну", один із сучасників назвав "часом, коли кожен міг
    стати гетьманом"?'
  - 'Запитання до роздумів: Чи може воля народу бути руйнівною для держави?'
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  points:
  - 'Дебат 1: Козацька старшина (Сомко) vs. голота (Брюховецький). Боротьба за владу як конфлікт двох моделей держави: олігархічної
    республіки та популістської тиранії.'
  - 'Дебат 2: Чорна рада 1663 року — це прояв козацької демократії чи тріумф охлократії (влади натовпу)?'
  - '[!epistemic-humility] Історики досі сперечаються: чи був Брюховецький лише демагогом, чи він представляв реальні інтереси
    незаможних козаків, яких ігнорувала старшина?'
  - 'Зовнішні гравці: роль Московського царства у розпалюванні конфлікту та підтримці Брюховецького. Польський фактор як тінь
    на Правобережжі.'
  section: 'Конфліктна карта: Демократія чи охлократія?'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Подія за подією: збір ради в Ніжині, виступи кандидатів, маніпуляції, погрози, голосування.'
  - 'Портрети головних акторів: Яким Сомко — освічений, але гордий і непоступливий. Іван Брюховецький — хитрий, безпринципний,
    майстер популізму.'
  - 'Роль "черні" (голоти): як організований натовп став вирішальною силою, що змістив еліту.'
  - '[!decolonization] Чорна рада як приклад успішної московської спецоперації з усунення незалежного гетьмана (Сомка) і приведення
    до влади повністю контрольованого (Брюховецького).'
  section: 'Читання: Хроніка Чорної ради 1663 року'
  words: 1700
- annotations:
  - '[!myth-buster]'
  points:
  - 'Аналіз мови кандидатів: гасла Брюховецького ("бити дуків", "зменшити податки") vs. державницька риторика Сомка.'
  - 'Термінологія розколу: "старшина", "голота", "чернь", "дуки", "кармазин". Як слова відображали та формували соціальний
    конфлікт.'
  - 'Стилістика доносів: аналіз листів Брюховецького до Москви як зразка політичної інтриги та маніпуляції.'
  - '[!myth-buster] Міф про "простий народ". Мова "голоти" на раді — це не наївний голос правди, а результат цілеспрямованої
    агітації та розпалювання ненависті.'
  section: 'Мова і поетика: Політична риторика Руїни'
  words: 1500
- annotations:
  - '[!anti-hagiography]'
  points:
  - 'Повернення до розминки: Руїна як час можливостей... для демагогів і загарбників. Наслідки вибору, зробленого на Чорній
    раді.'
  - 'Рецепція події: як Чорна рада стала для наступних поколінь українців страшним застереженням про небезпеку внутрішнього
    розбрату.'
  - 'Від історії до роману: як Пантелеймон Куліш перетворив цю історичну подію на перший український історичний роман і потужне
    національне висловлювання.'
  - '[!anti-hagiography] Деромантизація козацтва. Куліш, на відміну від сучасників, показав не лише героїзм, а й темний бік
    козацтва — схильність до анархії та міжусобиць.'
  section: Дискусія та підсумок
  words: 700
