content_outline:
- section: Вступ та культурний контекст
  points:
  - Юрій Клен / Освальд Бурґгардт — неокласик в еміграції
  - Місце в літературному каноні
  - Чому цей текст важливий сьогодні
  words: 850
- section: 'Аналіз твору: Сюжет та структура'
  points:
  - Ключові твори — «Попіл Клена» та лірика
  - Впливи та джерела
  - Конфлікт між батьківщиною і вигнанням
  words: 850
- section: Герменевтика та ключові образи
  points:
  - Детальний розбір символіки
  - Образ спаленого клена як метафора культурного знищення
  - Архетипи та класичні підтексти
  words: 850
- section: Мова, стиль та поетика
  points:
  - Стилістичні інновації автора
  - Синтез класичної і сучасної поетики
  - Особливості ритміки та синтаксису
  words: 850
- section: Деколонізаційний вимір
  points:
  - Який імперський міф руйнує цей текст?
  - Еміграція як культурний опір
  - Опір асиміляції та культурне самоствердження
  words: 850
- section: Підсумок та рецепція
  points:
  - Вплив на МУРівську та Нью-Йоркську групи
  - Світовий контекст діаспорної поезії
  - Питання для дискусії
  words: 750
