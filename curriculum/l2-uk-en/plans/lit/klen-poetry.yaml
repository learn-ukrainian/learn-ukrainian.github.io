content_outline:
- points:
  - 'Провокація: Що залишається від дерева, коли воно згоріло? Попіл. Що залишається від культури, коли її нищать? Поезія.
    Юрій Клен, німець за походженням, що обрав українську мову, дав на це одну з найпотужніших відповідей в українській літературі.'
  - Фрагмент з поезії Клена без контексту, що втілює ідею руїни та відродження.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Клен — неокласик чи модерніст? Чи є його досконала класична форма лише оболонкою для модерністського жаху перед
    історією та екзистенційної трагедії?'
  - 'Дебат 2: Освальд Бурґгардт vs Юрій Клен. Свідомий вибір української ідентичності німцем за походженням — це політичний
    жест, культурна мімікрія чи органічне злиття двох культур?'
  - '[!epistemic-humility] Діаспорна критика бачила в Клені рятівника європейської традиції в українській літературі. Радянська
    критика таврувала його як «фашистського посіпаку» та «зрадника». Сучасне прочитання намагається зрозуміти складність його
    виборів.'
  section: 'Конфліктна карта: Ідентичність і форма'
  words: 900
- points:
  - Близьке читання ключових фрагментів поеми, де розгортається образ спаленої Європи та України.
  - 'Аналіз наративної структури: подорож ліричного героя крізь руїни цивілізації та власної душі.'
  - Символ спаленого клена як метафора знищеного покоління «Розстріляного відродження», спаленої батьківщини та особистої
    втрати.
  - '[!decolonization] Клен вписує українську трагедію Голодомору та репресій у загальноєвропейський контекст катастрофи ХХ
    століття, відмовляючись бачити її як локальну чи другорядну подію, як того хотіла імперія.'
  section: 'Читання: Поема «Попіл імперій»'
  words: 1700
- points:
  - 'Стилістичний аналіз: як Клен поєднує неокласичну ясність форми з бароковою динамікою, метафоричністю та драматизмом.'
  - 'Лексичний рівень: насиченість тексту філософськими термінами, історичними алюзіями, архаїзмами, що створюють «високий
    стиль».'
  - 'Ритм і синтаксис: використання античних віршованих розмірів (гекзаметр) для опису сучасної, апокаліптичної реальності.'
  - '[!myth-buster] Клен — не «холодний» і «відсторонений» поет. Його інтелектуалізм та формальна досконалість є способом
    приборкати та осмислити нестерпний біль і хаос, а не втекти від них.'
  section: 'Мова і поетика: Синтез класики й бароко'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, що залишається після попелу? Відповідь Клена: культура, пам''ять, міф, втілені в поетичному
    слові, що є тривкішим за імперії.'
  - 'Рецепція та вплив: роль Клена у формуванні канону української літератури в еміграції (МУР, Нью-Йоркська група).'
  - '[!anti-hagiography] Дискусія про етичний вибір митця в умовах тоталітаризму: перебування Клена в окупованому нацистами
    Львові та Празі — вимушений крок чи компроміс?'
  - 'Сучасна актуальність: як поезія Клена про руїни та культурний опір резонує з досвідом українців у ХХІ столітті?'
  section: Дискусія та підсумок
  words: 700
focus: Поезія Юрія Клена (Освальда Бурґгардта), неокласицизм в еміграції, поема «Попіл імперій», символ спаленого клена, культурний
