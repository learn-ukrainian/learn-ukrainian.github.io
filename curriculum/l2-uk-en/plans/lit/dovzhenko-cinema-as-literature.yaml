content_outline:
- points:
  - 'Провокація: Чому ми читаємо тексти всесвітньо відомого кінорежисера? Чи може "фільм на папері" бути вищим за мистецтвом,
    ніж сам фільм?'
  - Цитата з "Щоденника" Довженка про задум "України в огні" — без коментаря, як емоційний вступ.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Кіноповість — це самостійний літературний жанр чи лише підготовчий етап до зйомок? Позиція "за": унікальний
    синтез епосу та драматургії. Позиція "проти": текст повністю підпорядкований візуальним завданням.'
  - 'Дебат 2: Довженко — придворний сталінський митець чи прихований дисидент? Аргументи "за": Сталінські премії, офіційні
    посади. Аргументи "проти": розгром "України в огні", таємний "Щоденник", глибокий внутрішній конфлікт.'
  - '[!epistemic-humility] Оцінки постаті Довженка коливаються від "колаборанта" до "жертви". Правда, ймовірно, у трагічному
    поєднанні обох іпостасей.'
  section: 'Конфліктна карта: Трагедія митця в тоталітарній державі'
  words: 900
- points:
  - Розширений аналіз ключових сцен кіноповісті, що не ввійшли у фільм через цензуру.
  - 'Система персонажів: Лаврін Запорожець як уособлення українського народу. Христя — трагічний образ згвалтованої, але незламної
    України.'
  - Конфлікт батьків і дітей як метафора розколу нації в умовах війни та окупації.
  - '[!decolonization] Твір руйнує радянський міф про "єдиний радянський народ" у війні, показуючи її як українську національну
    трагедію. Сталін особисто заборонив твір саме за "націоналізм".'
  section: 'Читання: "Україна в огні"'
  words: 1700
- points:
  - 'Аналіз "поетичного синтаксису": довгі, ритмізовані речення, що імітують рух камери (панорама, наближення).'
  - 'Метафоризм і символізм: земля, яблука, річка Десна як ключові, наскрізні образи-символи.'
  - 'Робота з мовою: поєднання високого, патетичного стилю з народною говіркою, фольклорними елементами.'
  - '[!myth-buster] Довженко — не просто "співець природи". Його пейзажі — це завжди філософські метафори, тло для екзистенційної
    драми людини і нації.'
  section: 'Мова і поетика: Кінематографічний стиль у прозі'
  words: 1500
- points:
  - 'Повернення до розминки: то чим є кіноповість Довженка — літературою чи кіно? Аргументація власної позиції.'
  - 'Рецепція творчості: як змінювалось сприйняття Довженка від офіційного радянського класика до символу українського опору.'
  - '[!anti-hagiography] Обговорення складних моментів біографії: чи виправдовує геній компроміси з владою? Де межа між виживанням
    і колаборацією?'
  - 'Сучасна актуальність: чому "Україна в огні" звучить сьогодні гостріше, ніж у 1943 році?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз кіноповістей Олександра Довженка ("Україна в огні", "Зачарована Десна") як самостійних літературних творів,
  а не лише сценаріїв.
