objectives:
- Аналізувати кіноповість як самостійний літературний жанр, відмінний від сценарію.
- Інтерпретувати ключові образи та символи у прозі Довженка в деколоніальному контексті.
- Аргументовано дискутувати про трагічну постать українського митця в умовах тоталітарного режиму.
- Розпізнавати та аналізувати стилістичні особливості "поетичного синтаксису" Довженка.
