content_outline:
- points:
  - 'Провокація: Чому герой Стефаника ставить хрест не в Канаді, а на рідному полі? Це пам''ятник собі чи прокляття землі,
    що його вигнала?'
  - 'Уривок з тексту: «Танець такий важкий, що гріх і подивитися, а він його затято танцює, аж доки не впаде з ніг». Про що
    цей танець?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Стефаник — реаліст чи експресіоніст? Твір як точний етнографічний документ (Франко) vs. твір як крик душі, деформація
    реальності для передачі внутрішнього стану (Чижевський).'
  - 'Дебат 2: «Камінний хрест» — текст про еміграцію чи універсальна притча про екзистенційну трагедію людини, відірваної
    від коріння?'
  - '[!epistemic-humility] Інтерпретації Стефаника змінювалися: від народного письменника-реаліста до ключової фігури українського
    модернізму європейського рівня.'
  section: 'Конфліктна карта: Реалізм чи експресіонізм?'
  words: 900
- points:
  - 'Уривок з тексту: сцена прощання Івана Дідуха з селом, ритуальний танець як кульмінація твору.'
  - 'Наративна структура: Розрив із землею як центральна трагедія. Аналіз епізодів від рішення про від''їзд до символічного
    поховання себе.'
  - 'Система персонажів: Іван Дідух як трагічний герой-носій універсального болю. Односельці як античний хор.'
  - '[!decolonization] Стефаник як модерніст європейського рівня, а не просто «співець селянської недолі». Його техніка письма
    співзвучна Гамсуну та Стріндбергу, а не російським реалістам.'
  section: 'Читання: Танець на пагорбі: Аналіз новели «Камінний хрест»'
  words: 1700
- points:
  - 'Стилістичні інновації: лаконізм, уривчастість фраз, драматичний діалог. Синтаксис, що відтворює психологічний надрив
    героя.'
  - 'Робота з мовою: використання покутського діалекту не як етнографічної прикраси, а як інструменту психологічної характеристики.'
  - 'Звукопис і ритміка: аналіз того, як звучання тексту створює відчуття тривоги та невідворотності трагедії.'
  - '[!myth-buster] Міф: Стефаник — простий, «народний» письменник. Реальність: його мова — це складна, витончена конструкція,
    де кожне слово має вагу медичного діагнозу.'
  section: 'Мова і поетика: Слово як діагноз'
  words: 1500
- points:
  - 'Повернення до розминки: Чому хрест на полі? Студент формулює відповідь, спираючись на аналіз символіки та психологічного
    стану героя.'
  - 'Рецепція та сучасність: як «Камінний хрест» сприймався на початку XX ст. і як його читають сьогодні в контексті нової
    хвилі еміграції через війну?'
  - '[!anti-hagiography] Чи не романтизуємо ми «біль еміграції», забуваючи про прагматичні, економічні причини, що змушували
    людей їхати? Стефаник не ідеалізує бідність.'
  - 'Питання для рефлексії: Чи є еміграція завжди трагедією, чи може бути початком нового? Як текст Стефаника відповідає на
    це питання?'
  section: Дискусія та підсумок
  words: 700
focus: Василь Стефаник, «Камінний хрест», модернізм, експресіонізм, психологічна новела, трагедія еміграції, розрив із землею,
  мова як діагноз
level: LIT
module: lit-061
objectives:
- Аналізувати новелу «Камінний хрест» у контексті європейського модернізму, відрізняючи реалістичні та експресіоністичні риси.
- Інтерпретувати ключові символи твору (камінний хрест, танець, земля) та їхню роль у розкритті трагедії героя.
- Визначати особливості ідіостилю Василя Стефаника (лаконізм, діалектизми, психологізм) та пояснювати їхню художню функцію.
- Формулювати власну позицію в літературно-критичних дебатах щодо твору, спираючись на текстовий аналіз.
