version: '2.0'
word_target: 5000
content_outline:
- section: Вступ
  words: 1000
  points:
  - Introduction to Hryhorii Skovoroda and the Ukrainian Baroque.
  - Cordocentrism (Philosophy of the Heart).
- section: Аналіз твору
  words: 1500
  points:
  - Analysis of his fables and philosophical treatises.
  - Wandering philosopher lifestyle as a form of cultural resistance.
- section: Поетика та стиль
  words: 1500
  points:
  - Stylistic elements of his poetry (Garden of Divine Songs).
  - Use of metaphor, allegory, and archaic language.
- section: Деколонізаційний вимір
  words: 1000
  points:
  - Debunking the Russian myth of Skovoroda as a "Russian philosopher".
  - The uniquely Ukrainian cordocentric approach to spirituality.
