- Відрізняти український бароковий світогляд від російських імперських інтерпретацій спадщини Сковороди
- Інтерпретувати ключові символи та алегорії в поезії та байках Сковороди
- Формулювати аргументовану позицію щодо актуальності філософії Сковороди в сучасному світі
