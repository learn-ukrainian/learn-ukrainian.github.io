content_outline:
- points:
  - 'Провокація: «Світ ловив мене, та не спіймав». Чому найвідоміший український філософ обрав долю мандрівного мудреця замість
    слави і багатства?'
  - 'Загадка: Як пов''язані фонтан, серце і Біблія в системі Сковороди? Вступ до символічного світу українського бароко.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сковорода — «російський» чи український філософ? Аналіз імперського міфу, мовного питання та культурної ідентичності.'
  - 'Дебат 2: Сковорода — містик-богослов чи раціоналіст-просвітитель? Його філософія серця (кордоцентризм) — це релігійна
    доктрина чи етична система самопізнання?'
  - '[!epistemic-humility] Інтерпретації спадщини Сковороди різняться від гностика до пантеїста, від «народного філософа»
    до елітарного інтелектуала.'
  section: 'Конфліктна карта: Чий Сковорода?'
  words: 900
- points:
  - 'Близьке читання вірша «De Libertate»: аналіз поняття істинної свободи як незалежності від зовнішнього світу.'
  - 'Аналіз байки «Бджола та Шершень»: розкриття концепції «сродної праці» як основи щасливого життя.'
  - 'Розгляд філософських трактатів: як ідеї з «Розмови п''яти подорожніх про істинне щастя в житті» пояснюють поезію та байки.'
  - '[!decolonization] Спадщина Сковороди як наріжний камінь саме УКРАЇНСЬКОЇ філософської традиції, що розвивалася паралельно,
    а не в рамках російської.'
  section: 'Читання: "Сад божественних пісень" та "Байки Харківські"'
  words: 1700
- points:
  - 'Аналіз ключових символів-метафор Сковороди: фонтан (Бог, нерівна всім рівність), серце (безодня, вмістилище істини),
    сад (пізнаний світ).'
  - 'Синтез стилів: поєднання церковнослов''янізмів, латинізмів, народної мови та архаїзмів для створення унікальної філософської
    мови.'
  - Використання алегорії та притчі як головних інструментів для пояснення складних філософських ідей.
  - '[!myth-buster] Сковорода — не «простий народний філософ». Його мова і думка глибоко елітарні, закорінені в античній філософії
    та патристиці, але виражені доступними образами.'
  section: 'Мова і поетика: Символічний світ українського бароко'
  words: 1500
- points:
  - 'Повернення до розминки: «Світ ловив мене...» — це втеча чи найвища форма свободи? Відповідь через призму «сродної праці»
    та самопізнання.'
  - 'Рецепція Сковороди: як змінювався його образ від «дивака» для сучасників до «національного пророка» в XIX ст. та ікони
    в XXI ст.'
  - '[!anti-hagiography] Чи був мандрівний спосіб життя лише філософським вибором, чи також наслідком конфліктів з церковною
    та світською владою?'
  - 'Актуальність філософії Сковороди сьогодні: що його ідеї про внутрішню свободу, самопізнання та щастя можуть дати українцям
    в умовах війни?'
  section: Дискусія та підсумок
  words: 700
focus: Hryhorii Skovoroda, українське бароко, кордоцентризм, "Сад божественних пісень", "сродна праця", деколонізація образу
  філософа
