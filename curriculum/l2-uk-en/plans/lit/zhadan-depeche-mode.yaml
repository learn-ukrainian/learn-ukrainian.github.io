content_outline:
- points:
  - 'Провокація: Як роман про трьох друзів, що шукають четвертого, аби поїхати на його похорон, став маніфестом цілого покоління?'
  - 'Фрагмент з роману: "Історія, зрештою, робиться не в кабінетах, не на телебаченні й не в інтернеті. Історія робиться на
    вулицях. І пишуть її ногами". Як це стосується героїв твору?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Депеш Мод" — це "чорнуха", що романтизує деградацію 90-х, чи чесна трагікомедія про стійкість та пошук себе
    в хаосі?'
  - 'Дебат 2: Мова Жадана — це "суржик" і "нецензурщина", що засмічує літературу, чи свідома мистецька стратегія, що фіксує
    живу мову епохи і надає їй легітимності?'
  - '[!epistemic-humility] Критики досі сперечаються: одні бачать у романі документ епохи, інші — естетизацію маргінального.
    Немає єдиної "правильної" відповіді.'
  section: 'Конфліктна карта: Трагікомедія чи "чорнуха"?'
  words: 900
- points:
  - 'Аналіз наративу: подорож-квест як метафора блукання пост-радянської людини. Герої не стільки шукають друга, скільки намагаються
    знайти сенс свого існування.'
  - 'Система персонажів: Сорокарічний, Собака Павлов, Вася Комуніст — не просто персонажі, а соціальні типи і водночас архетипи,
    що втілюють різні стратегії виживання.'
  - 'Харків як простір: ринок, вокзал, цвинтар. Детальний аналіз топографії роману як картини світу 90-х, де сакральне і профанне
    міняються місцями.'
  - '[!decolonization] Роман демонструє тотальну відсутність "російського світу" як культурного орієнтиру для молоді Харкова.
    Їхня контркультура — це Depeche Mode, західний рок, а не російська попса, що є актом несвідомого культурного опору.'
  section: 'Читання: "Депеша для Depeche Mode"'
  words: 1700
- points:
  - 'Стилістичний аналіз: Жадан змішує високий (філософські роздуми, біблійні алюзії) та низький (лайка, жаргонізми, суржик)
    стилі, створюючи унікальний трагікомічний ефект.'
  - 'Ритм прози: Довгі, "барокові" речення, що імітують потік свідомості та хаотичність буття, чергуються з короткими, уривчастими
    діалогами.'
  - 'Лексичні інновації: Жадан не просто фіксує суржик, він "одомашнює" його, перетворюючи на повноцінний інструмент літератури,
    збагачуючи його новими конотаціями.'
  - '[!myth-buster] "Літературна мова має бути чистою". Жадан доводить, що суржик і лайка можуть бути інструментом високої
    поезії, а не лише ознакою деградації, фіксуючи мовну реальність без прикрас.'
  section: 'Мова і поетика: Харківський суржик як висока література'
  words: 1500
- points:
  - 'Повернення до розминки: то чому ж цей текст став культовим? Студент формулює відповідь, спираючись на аналіз.'
  - 'Рецепція твору: шлях від андеграундного "шокового" тексту до обов''язкової програми в університетах. Що змінилося у сприйнятті
    роману за 20 років?'
  - 'Сучасне значення: Як сьогодні, в умовах повномасштабної війни, читається роман про травму, розгубленість і водночас неймовірну
    вітальність 90-х? Чи допомагає він зрозуміти стійкість сучасних українців?'
  - '[!anti-hagiography] Погляд без рожевих окулярів на 90-ті — не ностальгія за "свободою", а аналіз травми, що уможливила
    сьогоднішню вразливість до російської агресії, але й загартувала суспільство.'
  section: Дискусія та підсумок
  words: 700
