objectives:
- Критично аналізувати роман 'Депеш Мод' як трагікомедію про травму та стійкість у пост-радянському Харкові.
- Досліджувати мовні інновації Сергія Жадана, зокрема використання суржику та ненормативної лексики як художнього засобу.
- Формулювати аргументовану позицію щодо місця твору в сучасному українському каноні та його деколонізаційного значення.
