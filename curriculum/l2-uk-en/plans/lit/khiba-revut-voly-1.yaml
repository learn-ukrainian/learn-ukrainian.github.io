content_outline:
- points:
  - 'Провокація: Чіпка Варениченко — борець за правду чи «пропаща сила»? Як роман Панаса Мирного змушує нас переглянути, хто
    такий герой і хто такий злочинець.'
  - 'Цитата без контексту: «Так оце та правда?!» — у який момент життя героя це питання стає риторичним?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Інтерпретації образу Чіпки. Соціологічна школа (І. Франко) бачила в ньому жертву соціальних умов. Народницька
    критика — узагальнений образ «бунтаря». Модерністи (М. Хвильовий) — символ «пропащої сили» української людини.'
  - 'Дебат 2: Місце в каноні. За радянських часів роман канонізували як зразок «класової боротьби», замовчуючи його екзистенційну
    глибину. Сьогодні його перечитують як трагедію особистості, що втратила моральні орієнтири.'
  - '[!epistemic-humility] Не існує єдиної «правильної» інтерпретації Чіпки. Кожна епоха знаходить у ньому відповіді на власні
    питання.'
  section: 'Конфліктна карта: «Пропаща сила» чи соціальний бунтар?'
  words: 900
- points:
  - 'Ключовий уривок: детальний аналіз сцени, де в Чіпки відбирають землю — точка неповернення для героя.'
  - 'Еволюція образу: чотири частини роману як чотири етапи падіння. Як соціальна несправедливість стає тригером для особистої
    помсти, що переростає в розбій.'
  - 'Система персонажів: Грицько як антипод (конформізм vs бунт), Мотря як уособлення народного горя, Галя як спроба порятунку
    через кохання.'
  - '[!decolonization] Роман руйнує російський імперський міф про «тихого, пасивного малороса». Чіпка — це активний, хоч і
    трагічний, протест проти колоніального визиску та соціального пригнічення.'
  section: 'Читання: Трагедія Чіпки від правдошукацтва до розбою'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання жорсткого реалізму з ліричними відступами, широке використання внутрішніх монологів
    для розкриття психології героїв.'
  - 'Симфонічна структура: роман побудовано не як лінійну оповідь, а як складний твір з лейтмотивами, повторами та варіаціями.'
  - 'Робота з народною мовою: використання діалектизмів, фразеології та фольклорних елементів не як прикраси, а як основного
    інструменту характеристики персонажів та епохи.'
  - '[!myth-buster] Це не просто «побутово-соціальний роман». Це перший в українській літературі глибокий соціально-психологічний
    роман, що аналізує складні рухи людської душі на тлі епохи.'
  section: 'Мова і поетика: Симфонія народного життя'
  words: 1500
- points:
  - 'Повернення до розминки: тож герой чи злочинець? Студент формулює власну аргументовану відповідь, спираючись на проведений
    аналіз.'
  - 'Рецепція твору: як роман сприймали сучасники (заборона цензурою, поширення в списках), і як його читають сьогодні. Вплив
    на творчість В. Винниченка, М. Хвильового.'
  - '[!anti-hagiography] Роман уникає ідеалізації народного месника. Він показує, що шлях боротьби за «справедливість» без
    моральних орієнтирів веде до злочину та саморуйнації. Це застереження проти романтизації бунту.'
  - 'Сучасна релевантність: що історія Чіпки говорить нам про природу справедливості, межі компромісу та небезпеку неконтрольованої
    агресії?'
  section: Дискусія та підсумок
  words: 700
focus: 'Роман Панаса Мирного «Хіба ревуть воли...»: трагедія «пропащої сили», конфлікт між індивідуальним протестом та соціальними
  нормами, деконструкція народницького погляду на героя.'
level: LIT
module: lit-032
objectives:
- Аналізувати роман «Хіба ревуть воли...» як соціально-психологічний твір, розрізняючи історичний контекст та художній вимисел.
- Визначати ключові риси поетики роману: симфонізм, ліричні відступи, внутрішні монологи.
- Критично оцінювати деколонізаційний потенціал твору як спростування імперських міфів про український національний характер.
- Формулювати власну аргументовану позицію в літературознавчій дискусії щодо образу Чіпки Варениченка.
pedagogy: CBI
persona:
  role: Дослідник «пропащої сили». Аналізує не сюжет, а психологічну траєкторію героя — від ідеалізму до злочину. Ставить
    не «що?», а «чому?».
  voice: Literary-Forensic-Psychologist
phase: LIT.1 Foundations 1798-1890s
