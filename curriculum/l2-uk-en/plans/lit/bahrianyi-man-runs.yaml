content_outline:
- points:
  - 'Провокація: "Сміливі завжди мають щастя". Як один рядок із роману став національним гаслом опору? Чи це наївний оптимізм,
    чи філософія виживання?'
  - 'Загадка: Потяг, що везе тисячі засуджених у небуття. Один виривається. Це початок вестерну, бойовика чи... української
    класичної літератури?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Тигролови" — це авантюрний роман про виживання в екзотичних умовах чи це замаскований політичний трактат про
    боротьбу з тоталітаризмом?'
  - 'Дебат 2: Канонізація тексту. Як твір, що був заборонений в СРСР, став обов''язковим для вивчення у шкільній програмі
    незалежної України? Хто і чому його "повернув"?'
  - '[!epistemic-humility] Критики-емігранти бачили у творі гімн свободі. Радянське літературознавство таврувало його як "наклепницький
    пасквіль". Сучасні дослідники аналізують його як приклад травма-літератури.'
  section: 'Конфліктна карта: Пригодницький роман чи політичний маніфест?'
  words: 900
- points:
  - 'Close reading: Аналіз уривку про втечу Григорія Многогрішного з потяга, що прямує до ГУЛАГу.'
  - 'Структура: Чому автор починає роман з кульмінаційного моменту — втечі, а не з передісторії героя?'
  - 'Персонажі: Майор НКВС Медвин як втілення безособового, системного зла vs Многогрішний як символ індивідуального опору.'
  - '[!decolonization] Роман руйнує імперський міф про "єдиний радянський народ". Він показує Сибір не як "освоєну" територію,
    а як місце ув''язнення для "ворогів народу", серед яких українці — окрема, нескорена нація.'
  section: 'Читання: Екстрений епізод: Втеча з ешелону смерті'
  words: 1700
- points:
  - 'Стиль: Поєднання динамічного, "кінематографічного" стилю (погоні, бійки) з ліричними описами природи (пейзажі тайги).'
  - 'Лексика: Введення в літературну мову специфічної лексики далекосхідних українців, мисливських термінів, таборового жаргону.'
  - 'Синтаксис: Рвані, уривчасті речення під час екшн-сцен vs розлогі, епічні конструкції в описах природи. Як синтаксис створює
    ритм?'
  - '[!myth-buster] Це не просто пригодницький роман. Багряний використовує засоби експресіонізму та натуралізму для створення
    глибокого філософського тексту про межі людяності.'
  section: 'Мова і поетика: Симфонія тайги і мова протесту'
  words: 1500
- points:
  - 'Повернення до розминки: Чи дійсно сміливі "завжди" мають щастя? Як фінал роману (і доля самого автора) відповідають на
    це питання?'
  - 'Рецепція: Як сприймали "Тигроловів" у таборах для переміщених осіб у Німеччині після війни? Чому ця книга давала їм надію?'
  - '[!anti-hagiography] Чи не романтизує Багряний "природну людину" і патріархальний устрій родини Сірків? Чи можлива така
    ідилія в реальному світі, навіть в ізоляції від цивілізації?'
  - 'Сучасне значення: Чому "Тигролови" знову стали актуальними після 2014 та 2022 років? Які паралелі проводять сучасні читачі?'
  section: Дискусія та підсумок
  words: 700
focus: Close reading of Ivan Bahrianyi's "Tyhrolovy" ("The Tiger Trappers"), analyzing its dual nature as an adventure novel
  and political manifesto, its stylistic innovations, and its role as a decolonial text challenging the Soviet carceral system.
level: LIT
module: lit-126
objectives:
- Аналізувати роман "Тигролови" як багатошаровий текст, що поєднує риси пригодницького, політичного та філософського твору
- Трактувати текст у деколоніальному ключі, виявляючи механізми опору імперському дискурсу
- Дослідити стилістичні особливості прози Івана Багряного, зокрема поєднання експресіонізму та ліризму
- Формулювати аргументовану позицію щодо місця роману в українському літературному каноні та його актуальності сьогодні
