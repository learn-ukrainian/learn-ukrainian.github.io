content_outline:
- points:
  - 'Провокація: Чому Мавка, втілення природи та любові, приречена на трагедію в світі людей? Чи можливий союз між двома світами?'
  - 'Цитата: «Ні, я жива! Я буду вічно жити! Я в серці маю те, що не вмирає» — безсмертя духу проти смерті тіла.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Лісова пісня» — це фольклорна казка чи філософська драма? Дискусія між етнографічним та екзистенційним прочитанням.'
  - 'Дебат 2: Місце в каноні. Чи є «Лісова пісня» вершиною українського модернізму, чи її фольклорність робить її архаїчною
    для ХХ століття?'
  - '[!epistemic-humility] Інтерпретації конфлікту: природа vs культура, вічне мистецтво vs буденність, жіноче vs чоловіче,
    язичництво vs християнство. Жодна не є вичерпною.'
  section: 'Конфліктна карта: Жанр, філософія, канон'
  words: 900
- points:
  - 'Аналіз трьох актів: пробудження кохання, зрада і побут, смерть і воскресіння в мистецтві.'
  - 'Система персонажів: Мавка (дух), Лукаш (мистецтво/людина), Килина (матеріальний світ), Перелесник (спокуса), Той, що
    в скелі сидить (вічний закон).'
  - 'Розбір ключових сцен: перша зустріч Мавки і Лукаша, танок з Перелесником, перетворення Мавки на вербу.'
  - '[!decolonization] Мавка як втілення автентичної, доколоніальної української душі, що опирається асиміляції та «прирученню»
    імперським/утилітарним світом.'
  section: 'Читання: Ключові сцени та символи'
  words: 1700
- points:
  - 'Жанрова інновація: синтез драми, лірики та епосу. Створення жанру «драми-феєрії» в українській літературі.'
  - 'Символізм: аналіз значень образів води, вогню, лісу, верби, сопілки. Як предмет стає символом.'
  - 'Мова персонажів: поетична, пісенна мова Мавки vs приземлена мова Килини та матері Лукаша. Роль діалектизмів Волині.'
  - '[!myth-buster] «Лісова пісня» — не просто трагедія про нещасливе кохання. Це драма про неможливість гармонії ідеалу та
    реальності та перемогу духу через мистецтво.'
  section: 'Мова і поетика: Неоромантична драма-феєрія'
  words: 1500
- points:
  - 'Повернення до розминки: чи могла історія закінчитися інакше? Аргументація на основі тексту.'
  - 'Рецепція твору: від критики сучасників до статусу національного міфу. Радянські спроби «приземлити» інтерпретацію.'
  - '[!anti-hagiography] Аналіз слабкості Лукаша. Він не лиходій, а звичайна людина, нездатна жити на рівні високого ідеалу.
    Трагедія його "нормальності".'
  - 'Сучасне значення: екологічні, феміністичні та постколоніальні прочитання «Лісової пісні» у ХХІ столітті.'
  section: Дискусія та підсумок
  words: 700
focus: Драма-феєрія, конфлікт між світом природи і людини, неоромантизм Лесі Українки, символізм образів, фольклорна основа
level: LIT
module: lit-052
objectives:
- Аналізувати драму-феєрію «Лісова пісня» як філософський текст про конфлікт між ідеалом та реальністю, духовним та матеріальним
- Визначати ключові риси неоромантизму та символізму в поетиці твору, аналізуючи мову персонажів та роль фольклорних елементів
- Інтерпретувати «Лісову пісню» в деколонізаційному ключі, розглядаючи образи твору як символи боротьби за культурну автентичність
- Формулювати власну позицію в літературних дебатах щодо жанрової природи та інтерпретацій твору
