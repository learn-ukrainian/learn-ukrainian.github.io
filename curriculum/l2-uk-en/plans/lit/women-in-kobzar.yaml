content_outline:
- points:
  - 'Провокація: Чому саме жінка-страдниця, а не козак-герой, є центральним образом Шевченкового «Кобзаря»?'
  - Фрагмент з «Катерини» про вигнання з дому — без контексту, що призвело до цієї трагедії?
  - 'Біографічний ключ: чи є емпатія поета до сиріт та покриток наслідком його власного сирітства?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Катерина» — це сентиментальна романтична поема про нещасне кохання чи реалістичний вирок патріархальному суспільству
    з його подвійними стандартами?'
  - 'Дебат 2: Образ покритки — це соціальна критика чи національна алегорія? Трагедія жінки vs трагедія поневоленої України.'
  - '[!epistemic-humility] Радянське літературознавство бачило лише «соціальний протест». Постколоніальна критика — національну
    алегорію. Феміністична — гендерну трагедію. Жодна інтерпретація не є вичерпною.'
  section: 'Конфліктна карта: Сентимент чи вирок суспільству?'
  words: 900
- points:
  - 'Уривок з поеми «Катерина»: аналіз сцени вигнання та монологів героїні.'
  - 'Образ Катерини: романтичний бунт проти суспільних норм та його трагічні наслідки.'
  - 'Уривок з поеми «Наймичка»: аналіз сцени, де Ганна підкидає сина, та її мовчазної служби.'
  - 'Образ Ганни: еволюція жіночого образу. Відмова від бунту на користь материнської жертовності.'
  - 'Порівняння фіналів: самогубство Катерини як поразка vs смерть Ганни як тиха перемога любові.'
  - '[!decolonization] Образ української жінки як жертви імперського солдата («москаля») — політичний вимір особистої трагедії,
    а не просто побутовий конфлікт.'
  section: 'Читання: Від бунту до жертовності — «Катерина» vs «Наймичка»'
  words: 1700
- points:
  - 'Аналіз функції димінутивів: «дитя», «голівонька», «личенько». Не просто зменшення, а вираз ніжності, співчуття та трагізму.'
  - Пестлива лексика як головний інструмент для створення емпатії та емоційного пафосу.
  - 'Синтаксис скорботи: риторичні питання, оклики, повтори у монологах героїнь як вираження емоційного напруження.'
  - '[!myth-buster] Шевченко не «простий народний поет». Його використання димінутивів — це свідома й складна поетична стратегія
    для досягнення катарсису через мову.'
  section: 'Мова і поетика: Емпатія через димінутиви'
  words: 1500
- points:
  - 'Повернення до розминки: Чому жінка є центральним образом? Формулювання відповіді на основі аналізу поем.'
  - Архетип Трагічної Матері (покритка, наймичка, удова) як уособлення долі України.
  - 'Рецепція образу: як змінювалося ставлення до «покритки» від Шевченкових часів до сьогодні?'
  - '[!anti-hagiography] Критичний погляд: чи не ідеалізує Шевченко жіночу жертовність, пропонуючи її як єдиний шлях до святості?'
  - 'Сучасне прочитання: чи актуальні Шевченкові жіночі образи в Україні XXI століття?'
  section: Дискусія та підсумок
  words: 700
focus: Архетип Трагічної Матері в поемах Шевченка «Катерина» та «Наймичка»; аналіз образів покритки та наймички; функція димінутивів
  у створенні емоційного пафосу.
