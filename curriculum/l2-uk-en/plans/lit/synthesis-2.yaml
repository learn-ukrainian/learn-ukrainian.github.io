content_outline:
- points:
  - 'Провокативне питання: Українська література — це безперервна традиція чи серія розривів та відроджень? Що, як «діалог»
    між поколіннями насправді є плідною помилкою або свідомим спротивом?'
  - 'Архетипний образ: Як персонаж з твору Х трансформується у персонажа з твору Y через 50 років? Пошук спільних та відмінних
    рис.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є головна функція української літератури — опір імперії, чи досягнення універсальної естетичної цінності?
    Чи може вона робити обидві речі одночасно, і якою ціною?'
  - 'Дебат 2: Канон — це інструмент національного виживання чи естетична в''язниця? Хто вирішує, що є «великою літературою»,
    і як ці рішення впливають на наше сьогодення?'
  - '[!epistemic-humility] Розгляд позицій: від "мистецтва для мистецтва" до "літератури як зброї". Немає "правильної" відповіді,
    є лише краще аргументовані позиції.'
  section: 'Конфліктна карта: Деколонізація vs. Естетизм'
  words: 900
- points:
  - 'Порівняльний аналіз уривків: як пізніші автори (напр., з Розстріляного відродження) ведуть діалог, сперечаються або розвивають
    ідеї попередників (напр., класиків XIX ст.).'
  - 'Еволюція образу "українського суб''єкта": від етнографічного об''єкта до екзистенційного героя. Конструювання ідентичності
    через літературу.'
  - 'Філософія ідентичності: як література стає простором для формування національної етики та світогляду.'
  - '[!decolonization] Деконструкція імперського наративу як системний процес: виявлення та аналіз спільних стратегій інтелектуального
    опору в різних жанрах та епохах.'
  section: 'Читання: Діахронний аналіз ключових текстів'
  words: 1700
- points:
  - 'Аналіз авторських технік та мовних експериментів: від барокових метафор до футуристичних неологізмів.'
  - 'Трансформація літературної мови: як мова відображає і формує світогляд епохи? Боротьба з архаїзмами, впровадження діалектизмів,
    пуризм vs. відкритість.'
  - '[!myth-buster] Міф: Український модернізм просто копіював європейські зразки. Реальність: це був свідомий проєкт виковування
    нової мови для нової ідентичності, часто всупереч, а не завдяки зовнішнім впливам.'
  section: 'Мова і поетика: Стилістичний калейдоскоп епохи'
  words: 1500
- points:
  - 'Повернення до розминки: тож традиція безперервна чи розірвана? Формулювання студентом власної аргументованої позиції.'
  - 'Спадщина та горизонти майбутнього: який вплив цей період має на сучасний літературний процес та інтелектуальну безпеку
    України?'
  - '[!anti-hagiography] Уникнення створення нового, негнучкого канону для заміни старого. Критична оцінка "героїв" та "антигероїв"
    епохи.'
  - 'Рефлексія: яке значення має канон для нації, що перебуває у стані війни? Чи змінюється наше прочитання класики сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: A syncretic analysis of the literary period, focusing on diachronic connections, decolonial optics, and the evolution
  of stylistic and philosophical paradigms.
level: LIT
module: lit-077
objectives:
- Синтезувати знання про літературний процес вивченого періоду, виявляючи ключові тенденції та зв'язки.
- Застосовувати деколонізаційну оптику для критичного аналізу взаємозв'язків між авторами та епохами.
- Оцінювати тяглість та розриви в українській інтелектуальній традиції, формулюючи власну позицію.
- Аналізувати трансформацію літературної мови як відображення культурних та філософських змін.
pedagogy: CBI
