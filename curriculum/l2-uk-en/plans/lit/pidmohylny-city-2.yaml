content_outline:
- points:
  - 'Провокація: Чи є Степан Радченко, головний герой "Міста", завойовником, що підкорив бетонні джунглі, чи лише черговою
    жертвою, яку місто перетравило і виплюнуло?'
  - 'Цитата без контексту: "На пароплаві було весело. Співали й сміялися, виблискуючи в темряві білими зубами. А він один
    сидів на кормі, дивлячись на воду, темну й таємничу". Про кого це і куди він прямує?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це роман про людину чи про суспільство? "Місто" — це глибокий психологічний аналіз індивідуального сходження
    (і падіння), чи це соціологічний зріз українського суспільства епохи НЕПу?'
  - 'Дебат 2: Тріумф чи поразка? Фінал роману — це успішне завершення "завоювання" міста, де герой стає письменником, чи це
    історія моральної деградації та зради самого себе?'
  - '[!epistemic-humility] Критики-сучасники (марксисти) бачили в романі лише "біологізм" та "аполітичність". Еміграційна
    критика (Шерех) — екзистенційну драму. Постколоніальні студії — історію культурного завоювання.'
  section: 'Конфліктна карта: Індивід vs Соціум, Успіх vs Мораль'
  words: 900
- points:
  - 'Аналіз сюжету як серії "завоювань": завоювання простору (з села в місто, зміна квартир), соціального статусу (від студента
    до письменника), жінок (кожна жінка — сходинка вгору).'
  - 'Система персонажів: жінки як дзеркала еволюції Радченка — Надійка (село, минуле), Мусінька (міщанство), Зоська (трагічне
    кохання), Рита (богема, майбутнє).'
  - 'Символіка міста: Київ у романі — не просто тло, а живий організм, що спокушає, випробовує і трансформує героя. Це і Вавилон,
    і обітована земля водночас.'
  - '[!decolonization] Підмогильний "відвойовує" місто для української літератури. Він доводить, що українська мова і культура
    здатні описати складне модерне життя, а не лише сільську ідилію. Це акт культурної емансипації.'
  section: 'Читання: Завоювання міста: від Степана до Стефана'
  words: 1700
- points:
  - 'Стилістичні інновації: Підмогильний вводить в українську прозу техніку "потоку свідомості", фіксуючи найтонші порухи
    душі героя.'
  - 'Лексика: Мова роману насичена урбанізмами, неологізмами, технічною термінологією, що відтворює атмосферу міста 1920-х.
    Аналіз синтаксису, що передає психологічний стан героя (нервові, уривчасті фрази vs довгі, рефлексивні періоди).'
  - 'Інтертекстуальність: Діалог із європейською літературою (Фройд, Мопассан, Анатоль Франс) як спосіб вписати український
    роман у світовий контекст.'
  - '[!myth-buster] Руйнування міфу про "селянську" українську літературу. Підмогильний доводить, що український письменник
    може бути інтелектуалом-європейцем, а не лише "співцем народного горя".'
  section: 'Мова і поетика: Мова міста: психологічний імпресіонізм'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, Радченко — переможець чи переможений? Студент формулює власну аргументовану відповідь.'
  - 'Рецепція твору: Чому роман, написаний у 1928 році, був заборонений у СРСР і залишається настільки актуальним сьогодні?'
  - 'Агентність і опір: Як роман чинить опір асиміляції та стверджує право української культури на власне міське, інтелектуальне
    життя?'
  - 'Питання для рефлексії: Які аспекти "завоювання міста" Степаном Радченком резонують із досвідом сучасних молодих людей,
    що приїжджають у великі міста сьогодні?'
  section: Дискусія та підсумок
  words: 700
