content_outline:
- points:
  - 'Провокація: Чи були шістдесятники лише «дітьми відлиги» — короткочасним ліберальним спалахом, приреченим на поразку,
    чи вони заклали основи сучасної української ідентичності?'
  - Цитата без контексту з твору одного з шістдесятників, що демонструє екзистенційну глибину, а не лише політичний протест.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Шістдесятництво — це політичний чи естетичний феномен? Що було первинним: антирадянський протест чи оновлення
    мистецької мови?'
  - 'Дебат 2: Канонізація шістдесятників. Чи не перетворило офіційне визнання після 1991 року живий рух на бронзовий пантеон,
    приховуючи внутрішні конфлікти та суперечності?'
  - '[!epistemic-humility] Радянська критика таврувала їх як «буржуазних націоналістів». Сучасна агіографія бачить лише мучеників.
    Де правда?'
  section: 'Конфліктна карта: Шістдесятники — дисиденти чи новатори?'
  words: 900
- points:
  - Аналіз ключових текстів (поезія Ліни Костенко, Василя Симоненка; проза Григора Тютюнника) як єдиного мета-тексту руху.
  - 'Система персонажів: не «гвинтики системи», а екзистенційні герої, що роблять моральний вибір в умовах несвободи.'
  - 'Сюжет опору: як теми особистої гідності, історичної пам''яті та культурної спадкоємності стають актом політичного спротиву.'
  - '[!decolonization] Шістдесятники повернули українській літературі її європейський контекст, свідомо розриваючи з парадигмою
    «молодшого брата» та соцреалізмом.'
  section: 'Читання: Література як спротив'
  words: 1700
- points:
  - 'Стилістичні інновації: відмова від пафосу та декларативності, повернення до «тихої лірики», інтимної мови, філософської
    метафори.'
  - 'Робота з мовою: реабілітація репресованих слів, уведення в літературу розмовної мови, діалектизмів, створення неологізмів.'
  - 'Синтаксис свободи: ускладнена асоціативна поетика, що вимагала від читача інтелектуальної співпраці, на противагу прямолінійності
    соцреалізму.'
  - '[!myth-buster] Шістдесятники — це не лише патріотична лірика. Це і складний метафоричний кінематограф (Параджанов), і
    авангардна музика (Сильвестров), і психологічна проза.'
  section: 'Мова і поетика: Розрив із соцреалізмом'
  words: 1500
- points:
  - 'Повернення до розминки: тож, ким були шістдесятники для української культури — епізодом чи фундаментом?'
  - 'Рецепція феномену: як сприйняття шістдесятників змінювалося від підпільного самвидаву до шкільної програми.'
  - 'Сучасна релевантність: чому ідеї та тексти шістдесятників знову стали гостро актуальними під час Помаранчевої революції,
    Революції Гідності та повномасштабного вторгнення?'
  - '[!anti-hagiography] Чи всі шістдесятники витримали тиск системи? Аналіз трагічних доль та складних компромісів (Іван
    Драч, Дмитро Павличко).'
  section: Дискусія та підсумок
  words: 700
