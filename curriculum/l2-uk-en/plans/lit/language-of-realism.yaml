content_outline:
- points:
  - 'Провокаційне питання: Як українська література навчилася говорити «по-людськи»? Чому сучасники вважали мову Нечуя «мужицькою»
    і водночас революційною?'
  - 'Цитата-загадка: «Апокаліптична пляма на сонці» — що Нечуй мав на увазі, атакуючи «галицьку» мову, і чому цей образ став
    символом мовної війни?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Народна» чи «книжна»? Полеміка між Нечуєм, який обстоював наддніпрянську народну мову, та галицькими мовознавцями,
    що орієнтувалися на більш архаїчні та «очищені» форми.'
  - 'Дебат 2: Мова як дзеркало vs мова як інструмент. Чи має література просто фіксувати реальне мовлення (позиція Нечуя),
    чи повинна формувати «правильний» стандарт, навіть якщо ним ніхто не говорить?'
  - '[!epistemic-humility] Немає «переможців»: сучасна українська мова — це синтез обох традицій. Позиція Нечуя була радикальною,
    але змусила всіх замислитись про роль живого мовлення.'
  section: 'Конфліктна карта: Битва за норму'
  words: 900
- points:
  - 'Close reading: Аналіз діалогів Кайдашів. Як через синтаксис, лайку та побутову лексику розкриваються характери Марусі,
    Мотрі та Мелашки.'
  - 'Етнографічна точність: Розбір описів побуту, одягу, звичаїв. Як Нечуй використовує лексику для створення ефекту «документальності»
    та повного занурення.'
  - 'Індивідуалізація мовлення: Порівняння мови Омелька Кайдаша та його синів. Чому мова старшого покоління відрізняється
    від мови молодшого? Соціальні та вікові маркери в мовленні.'
  - '[!decolonization] Створення національного простору: Демонструючи багатство української народної мови, Нечуй утверджував
    її самодостатність і спростовував російський імперський наратив про «малоросійське наріччя».'
  section: 'Читання: Голоси «Кайдашевої сім''ї»'
  words: 1700
- points:
  - 'Стилістичний злам: Порівняння мови Нечуя з «Енеїдою» Котляревського. Перехід від бурлескної умовності до реалістичної
    достовірності.'
  - 'Синтаксис як психологія: Аналіз довгих, «плутаних» речень Нечуя. Як структура речення відтворює потік думок і внутрішні
    монологи персонажів, на відміну від чіткої поетичної строфи Шевченка.'
  - 'Нечуй vs Квітка-Основ''яненко: Від сентиментальної ідеалізації народного мовлення до його реалістичного, часто брутального
    зображення.'
  - '[!myth-buster] Міф про «простого оповідача»: Нечуй не просто «записував» народну мову. Він був майстерним стилістом,
    який конструював ефект реалізму за допомогою складних літературних технік.'
  section: 'Мова і поетика: Від бурлеску до психологізму'
  words: 1500
- points:
  - 'Повернення до розминки: Тож, у чому полягав внесок Нечуя? Студент формулює відповідь, спираючись на аналіз мовних прийомів
    та ідеологічних дебатів.'
  - 'Спадщина: Як полеміка Нечуя вплинула на подальший розвиток української літературної мови у XX столітті (Коцюбинський,
    Винниченко).'
  - '[!anti-hagiography] Нечуй був геніальним письменником, але його пуристичні погляди на мову були часом надто радикальними
    і непродуктивними. Спроба «заборонити» слова іншомовного походження.'
  - 'Рефлексія: Чи актуальні мовні дебати Нечуя сьогодні? Як сучасна Україна вирішує питання діалектів, суржику та мовних
    стандартів у медіа та літературі?'
  section: Дискусія та підсумок
  words: 700
focus: 'Лінгвістичний реалізм Нечуя-Левицького: його використання діалектів та народної мови, а також полеміка щодо стандартизації
  української літературної мови.'
level: LIT
module: lit-029
objectives:
- Аналізувати, як мовні засоби (діалектизми, синтаксис, побутова лексика) створюють ефект реалізму в прозі Нечуя-Левицького
- Критично оцінювати історичну полеміку про «галицьку» та «наддніпрянську» норми української мови
- Порівнювати мовний стиль Нечуя зі стилями його попередників (Котляревський, Квітка, Шевченко) для розуміння еволюції літератури
- Формулювати аргументовану позицію щодо внеску Нечуя у формування сучасної української літературної мови
pedagogy: CBI
