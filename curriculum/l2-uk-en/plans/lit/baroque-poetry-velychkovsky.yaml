- definition: поетичний твір, в якому графічне розташування літер та слів утворює певний малюнок (хрест, зірку, лабіринт);
    carmen figuratum
  pos: ч.
  word: фігурний вірш
- definition: вірш, в якому комічного чи пародійного ефекту досягають змішуванням слів з різних мов (напр. української, польської,
    латини)
  pos: ч.
  word: макаронічний вірш
- definition: слово, фраза або вірш, що читається однаково зліва направо і справа наліво ("рак літеральний")
  pos: ч.
  word: паліндром
- definition: у літературі бароко — поезія, що зосереджена на формальних експериментах та незвичайних прийомах (акровірші,
    паліндроми, фігурні вірші)
  pos: ж.
  word: курйозна поезія
- definition: слово або вираз, запозичений з церковнослов'янської мови, що використовувався для створення "високого стилю"'
  pos: ч.
  word: церковнослов’янізм
- definition: поєднання, органічне сполучення різнорідних елементів (напр. візуального та вербального) в єдине ціле
  pos: ч.
  word: синтез
- definition: інакомовлення; втілення абстрактного поняття (час, смерть, любов) у конкретному художньому образі
  pos: ж.
  word: алегорія
- definition: сукупність творів, визнаних класичними, взірцевими для певної літературної традиції
  pos: ч.
  word: канон
