content_outline:
- points:
  - 'Провокація: Чи може вірш бути лабіринтом? Прочитайте цей акровірш Величковського — що ви бачите, крім літер?'
  - 'Загадка: "Єден єст образ, два суть естества". Як ця філософська теза втілюється у візуальній поезії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є фігурна поезія Величковського лише імітацією західноєвропейських зразків (польських, німецьких), чи це
    оригінальне явище?'
  - 'Дебат 2: Величковський — забутий епігон чи новатор, що випередив свій час і заклав основи для майбутнього авангарду?'
  - '[!epistemic-humility] Одні дослідники (Чижевський) бачать у ньому геніального експериментатора, інші — автора "курйозів"
    на периферії серйозної літератури.'
  section: 'Конфліктна карта: Українське бароко — наслідування чи синтез?'
  words: 900
- points:
  - 'Повний текст та зображення віршів-фігур: аналіз взаємодії візуальної форми та вербального змісту.'
  - 'Структура "Млѣка": від теоретичного вступу до практичних прикладів. Як Величковський навчає читача "правильно" читати
    його поезію?'
  - 'Символіка в "Зегарі": годинник як алегорія людського життя, часу та вічності. Релігійні та філософські підтексти.'
  - '[!decolonization] КМА як інтелектуальний центр, що творив незалежну українську ідентичність, рівну іншим європейським.
    Це не провінційна філія, а самодостатня школа думки.'
  section: 'Читання: Фігурні вірші "Зегар з полузегарком" та "раки літеральні"'
  words: 1800
- points:
  - 'Макаронічна мова: змішування церковнослов''янської, польської, латинської та руської (простої) мов як свідомий художній
    прийом.'
  - 'Стилістичні інновації: створення неологізмів, гра слів, каламбури, паліндроми ("раки літеральні").'
  - 'Синтаксис як інструмент: складні, багатошарові конструкції, що віддзеркалюють складність барокового світосприйняття.'
  - '[!myth-buster] Це не просто "гра заради гри". За кожним "курйозом" стоїть складна богословська або філософська концепція,
    втілена у словесній формі.'
  section: 'Мова і поетика: Синтез "простої мови" та церковнослов’янізмів'
  words: 1500
- points:
  - 'Повернення до розминки: тож як вірш може бути лабіринтом? Аргументована відповідь на основі аналізу.'
  - 'Рецепція творчості Величковського: чому він був майже забутий у XIX столітті і "перевідкритий" у XX?'
  - 'Сучасна релевантність: чи можна вважати Величковського предтечею сучасної цифрової поезії та медіа-арту?'
  - '[!anti-hagiography] Поезія Величковського — продукт елітарної культури, доступний вузькому колу освічених інтелектуалів
    КМА. Чи може вона вважатися частиною "народної" спадщини?'
  section: Дискусія та підсумок
  words: 600
focus: Іван Величковський, фігурна поезія (carmina figurata), макаронічні вірші, бароковий синтез, Києво-Могилянська академія
  (КМА), поетика експерименту
