objectives:
- Аналізувати поезію Івана Величковського як феномен українського бароко, враховуючи візуальний та вербальний аспекти
- Розрізняти та ідентифікувати ключові прийоми курйозної поезії (фігурні вірші, паліндроми, макаронічна мова)
- Формулювати аргументовану позицію щодо місця українського бароко в європейському культурному контексті
- Критично оцінювати роль Києво-Могилянської академії як центру культурного опору та інтелектуальної незалежності
