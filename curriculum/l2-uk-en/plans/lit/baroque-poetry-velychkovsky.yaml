  - Ключові твори — фігурна поезія (carmina figurata), макаронічні вірші
  - Впливи та джерела
  - Бароковий синтез як рушійна сила
  words: 850
- section: Герменевтика та ключові образи
  points:
  - Детальний розбір символіки
  - Система образів і їхня еволюція
  - Архетипи та релігійні підтексти
  words: 850
- section: Мова, стиль та поетика
  points:
  - Стилістичні інновації барокового автора
  - Церковнослов'янізми і проста мова в ліриці
  - Особливості ритміки та синтаксису
  words: 850
- section: Деколонізаційний вимір
  points:
  - Який імперський міф руйнує цей текст?
  - КМА як центр незалежної культурної традиції
