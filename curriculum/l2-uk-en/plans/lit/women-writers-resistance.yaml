content_outline:
- points:
  - 'Провокація: Чи може слово бути зброєю? Сучасні українські письменниці доводять, що так. Розглянемо цитату, що кидає виклик
    імперії без жодного пострілу.'
  - Фрагмент тексту, що ілюструє тонку психологічну гру з колоніальними травмами.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є «жіноча література» знецінюючим ярликом, що маргіналізує авторок, чи це корисний інструмент для аналізу
    спільних тем та досвідів?'
  - 'Дебат 2: Що важливіше в літературі опору — естетична цінність чи політична ефективність? Чи може текст бути погано написаним,
    але важливим як акт спротиву?'
  - '[!epistemic-humility] Критики-формалісти наполягають на автономії тексту, тоді як постколоніальні та феміністичні теоретики
    стверджують, що жоден текст не є аполітичним.'
  section: 'Конфліктна карта: Мистецтво чи активізм?'
  words: 900
- points:
  - Детальний розбір ключових уривків з творів, де мова йде про опір асиміляції та культурне самоствердження.
  - 'Аналіз системи персонажів: як героїні долають внутрішні та зовнішні конфлікти, нав''язані патріархальним та колоніальним
    дискурсом.'
  - 'Символіка та архетипи: як традиційні образи (напр., дім, земля) переосмислюються в контексті опору.'
  - '[!decolonization] Як ці тексти руйнують імперський міф про «братські народи» та показують агентність української жінки,
    що відмовляється бути жертвою.'
  section: 'Читання: Тексти опору'
  words: 1700
- points:
  - 'Стилістичні інновації: як авторки використовують фрагментарність, поліфонію та нелінійну оповідь для передачі травматичного
    досвіду.'
  - 'Робота з мовою: свідоме вживання діалектизмів, архаїзмів або створення неологізмів як спосіб відмежування від стандартизованої
    імперської мови.'
  - 'Особливості синтаксису: як довгі, плутані речення або, навпаки, короткі, уривчасті фрази створюють ефект тривоги та екзистенційної
    напруги.'
  - '[!myth-buster] Це не просто «емоційна проза». Це складна, інтелектуально насичена література, що вимагає повільного,
    вдумливого читання та деконструкції.'
  section: 'Мова і поетика: Мова як форма спротиву'
  words: 1500
- points:
  - 'Повернення до розминки: Як саме текст, який ми проаналізували, функціонує як зброя?'
  - 'Рецепція та критика: як ці твори сприймалися в Україні та за кордоном? Чиї інтереси зачіпає така література?'
  - '[!anti-hagiography] Чи не призводить фокус на «опорі» до ідеалізації авторок та ігнорування можливих художніх недоліків
    їхніх текстів?'
  - 'Сучасне значення: яку роль відіграє жіноче письмо в документуванні та осмисленні сучасної війни?'
  section: Дискусія та підсумок
  words: 700
focus: Сучасні українські письменниці, що використовують літературу як форму культурного та політичного опору; аналіз текстів
  через призму деколонізації, фемінізму та стилістичних інновацій.
level: LIT
module: lit-163
objectives:
- Аналізувати твори сучасних українських письменниць у контексті опору імперським наративам.
- Досліджувати, як мова та стиль стають інструментами культурного спротиву та самоствердження.
- Критично оцінювати місце цих авторок у сучасному літературному каноні та їхній внесок у деколонізаційні процеси.
- Формулювати аргументовану позицію щодо співвідношення естетичної вартості та політичної ангажованості в літературі опору.
pedagogy: CBI
