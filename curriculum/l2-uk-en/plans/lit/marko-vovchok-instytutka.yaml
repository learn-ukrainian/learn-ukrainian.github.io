objectives:
- Аналізувати повість «Інститутка» як багатовимірний твір, розрізняючи його соціально-політичний та психологічний плани
- Інтерпретувати систему персонажів та роль оповідача у розкритті ідейного задуму авторки
- Визначати стилістичні особливості прози Марка Вовчка, зокрема синтез фольклорної поетики та реалізму
- Формулювати аргументовану позицію в літературних дебатах щодо місця твору в українському каноні та його деколонізаційного
  значення
