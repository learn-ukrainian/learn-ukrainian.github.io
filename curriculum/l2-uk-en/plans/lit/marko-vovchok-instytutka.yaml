content_outline:
- points:
  - 'Провокація: Інститутка — витончений монстр чи трагічна жертва власної системи? Чи може освіта без людяності породити
    щось, крім тиранії?'
  - 'Цитата: «Люди дивуються, що я весела: на моїм місці, кажуть, усяка зсушилась би сльозами... А я не хочу плакати» — голос
    Устини як виклик системі.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Інститутка» — це політична агітка проти кріпацтва чи глибоке психологічне дослідження деформації людської душі
    владою?'
  - 'Дебат 2: Канонізація Марка Вовчка. Чи була її популярність наслідком лише «народної» теми, чи це визнання унікального
    стилю та жіночого голосу в патріархальній літературі?'
  - '[!epistemic-humility] Радянське літературознавство бачило лише класову боротьбу. Постколоніальні та феміністичні студії
    відкривають нові виміри тексту, зосереджуючись на травмі та агентності.'
  section: 'Конфліктна карта: Соціальний памфлет чи психологічний роман?'
  words: 900
- points:
  - 'Крупним планом: сцена приїзду інститутки в маєток. Аналіз її поведінки, мови та перших реакцій кріпаків. Як створюється
    атмосфера страху?'
  - 'Система персонажів: Устина (оповідачка, жертва, що зберігає гідність), Катря (трагічна доля), Прокіп (бунтар), сама інститутка
    (тиран). Це типи чи живі характери?'
  - 'Наративна структура: розповідь від першої особи (Устини) як інструмент створення емпатії та достовірності. Чому ми бачимо
    світ її очима?'
  - '[!decolonization] Текст як руйнування імперського міфу про «просвіченну аристократію». Вовчок показує, що європейська
    освіта без морального компасу — це лише інструмент для більш ефективного гноблення.'
  section: 'Читання: Повість «Інститутка»'
  words: 1700
- points:
  - 'Стилістична інновація: синтез фольклорної поетики (пісенність, ліризм, зменшувально-пестливі форми) з реалістичним психологізмом.'
  - 'Мовний портрет: як мова персонажів розкриває їхню сутність? Порівняння мови Устини (мелодійна, образна) та інститутки
    (суха, наказова).'
  - 'Особливості синтаксису: роль коротких речень, інверсій та риторичних питань у створенні емоційної напруги.'
  - '[!myth-buster] Міф про те, що Марко Вовчок — «проста народна письменниця». Розбір показує її як свідомого майстра, що
    філігранно працює з мовним матеріалом для досягнення психологічної глибини.'
  section: 'Мова і поетика: Народна мова як художній світ'
  words: 1500
- points:
  - 'Повернення до розминки: тож як ми тепер відповімо на питання про природу зла інститутки? Аргументуйте свою позицію на
    основі тексту.'
  - 'Рецепція та вплив: як «Інститутка» вплинула на подальший розвиток української прози? Чому Шевченко назвав Вовчок своєю
    «донею»?'
  - '[!anti-hagiography] Постать самої Марії Вілінської (Марка Вовчка) є складною та повною суперечностей. Як її біографія
    співвідноситься з моральним посилом її творів?'
  - 'Актуальність сьогодні: чи є тема зловживання владою, людської гідності та пасивного опору актуальною для сучасного українського
    суспільства?'
  section: Дискусія та підсумок
  words: 700
focus: 'Марко Вовчок «Інститутка»: психологічний реалізм, жіночий погляд на кріпацтво, деконструкція образу «освіченої» панів'
