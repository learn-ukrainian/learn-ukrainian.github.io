content_outline:
- points:
  - 'Провокація: "Чи може тотальна чесність із собою бути найвищою формою егоїзму?" — виклик, що ставить перед читачем Винниченко.'
  - 'Фрагмент з твору: "І коли всі люди стануть самі собою, не буде боротьби, не буде помсти..." — утопія чи небезпечна ілюзія?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Індивідуальна психологічна правда проти національного та суспільного обов''язку. Чи має митець право на "чесність
    з собою", якщо вона шкодить спільній справі?'
  - 'Дебат 2: Місце Винниченка в каноні. Чому автора "Відродження нації" і першого прем''єра УНР часто оцінюють крізь призму
    його політичних невдач, ігноруючи літературні досягнення?'
  - '[!epistemic-humility] Немає єдиної відповіді на питання про зв''язок між етикою автора та цінністю його творів. Винниченка
    одночасно канонізують і засуджують.'
  section: 'Конфліктна карта: Мистецтво vs. Обов''язок'
  words: 900
- points:
  - 'Розбір ключової сцени: аналіз внутрішнього монологу головного героя, його вагань між особистим щастям та революційним
    боргом.'
  - 'Система персонажів як втілення різних філософських позицій: кожен персонаж є носієм певної ідеї у драмі ідей.'
  - 'Структура твору: як фрагментарність, розірваність оповіді віддзеркалює психологічний стан героїв та епохи.'
  - '[!decolonization] Розгляд Винниченка не як провінційного письменника, а як повноцінного учасника європейського модерністського
    руху, що працював із тими ж ідеями, що й Ніцше, Гамсун, Стріндберг.'
  section: 'Читання: "Чесність з собою"'
  words: 1700
- points:
  - 'Стилістичний аналіз: як Винниченко використовує потік свідомості, незакінчені речення та еліптичні конструкції для передачі
    миттєвих вражень та психологічних станів.'
  - 'Ритм і синтаксис: розбір того, як коротка, "нервова" фраза створює відчуття тривоги та напруги.'
  - 'Неологізми та авторська лексика: Винниченко як мовний експериментатор.'
  - '[!myth-buster] Винниченко — не просто "письменник-політик". Він — стиліст, який свідомо реформував українську прозу,
    збагативши її психологізмом та інтелектуальною глибиною.'
  section: 'Мова і поетика: Психологічний імпресіонізм'
  words: 1500
- points:
  - 'Повернення до розминки: Як після детального аналізу ви відповідаєте на питання про "чесність з собою"?'
  - 'Історія рецепції: як сприймали твір у 1910-х, у радянський час (коли був заборонений) і як він читається сьогодні, в
    умовах повномасштабної війни?'
  - '[!anti-hagiography] Обговорення суперечливих аспектів біографії Винниченка та їх впливу на інтерпретацію його творів.
    Чи можна відокремити митця від політика?'
  - 'Сучасна релевантність: наскільки дилеми героїв Винниченка актуальні для сучасного українця, що переживає екзистенційну
    кризу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз модерністської прози Винниченка, дилема між психологічною вірністю та суспільним обов'язком, імпресіонізм у
  стилі.
