content_outline:
- points:
  - 'Провокація: Чи може роман бути правдивішим за підручник історії? Улас Самчук написав «Марію» у 1933 році, не маючи доступу
    до архівів. Як він розповів світові про Голодомор?'
  - 'Фрагмент з роману: «Коли вмирають люди — співають похоронні пісні. Коли ж умирає народ — німіють пророки». Що означає
    ця тиша?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Марія» — це історичний роман чи література свідчення? Полеміка між літературознавчим (аналіз структури, символізму)
    та історіографічним (перевірка фактів, прототипів) підходами.'
  - 'Дебат 2: «Народна трагедія» vs. «Національний геноцид». Як Самчукова інтерпретація Голодомору як свідомого нищення українського
    селянства кидає виклик радянським та сучасним російським наративам про «спільну біду».'
  - '[!epistemic-humility] Самчук — не безсторонній літописець. Він — учасник ідеологічної боротьби, і його текст — це зброя.
    Як це впливає на наше читання?'
  section: 'Конфліктна карта: Свідчення чи вигадка?'
  words: 900
- points:
  - 'Книга про народження: детальний розбір першої частини роману. Як Самчук створює ідилічний образ українського села, щоб
    потім показати його повну деструкцію.'
  - 'Книга про життя: ключові епізоди — розкуркулення, створення колгоспу, поява «людей з рушницями». Аналіз того, як руйнуються
    родинні та сусідські зв''язки.'
  - 'Книга про хліб: close reading уривків, що описують голод. Як Самчук зображує фізичний і моральний розпад людини.'
  - '[!decolonization] «Марія» як анти-«Піднята цілина». Самчук свідомо полемізує з радянським каноном, показуючи колективізацію
    не як прогрес, а як апокаліпсис.'
  section: 'Читання: Роман-хроніка «Марія»'
  words: 1700
- points:
  - 'Стилістика свідчення: аналіз синтаксису. Короткі, уривчасті речення, повтори, відсутність прикметників. Як мова «зламується»
    під тиском травматичного досвіду.'
  - 'Біблійна інтертекстуальність: Марія як Богородиця, її сини як Каїн і Авель, голод як Божа кара/Апокаліпсис. Як Самчук
    вписує українську трагедію у світовий універсальний контекст.'
  - 'Символізм хліба: від святині до прокляття. Аналіз лексичного поля «хліб», «зерно», «земля» і його трансформації протягом
    роману.'
  - '[!myth-buster] Самчук — не просто «співець села». Він — модерніст, який експериментує з формою роману-хроніки та використовує
    складні символічні структури для осмислення національної катастрофи.'
  section: 'Мова і поетика: Мова травми і біблійний символізм'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, «Марія» — це роман чи документ? Студент формулює аргументовану відповідь, використовуючи
    матеріал модуля.'
  - 'Рецепція твору: Чому роман, написаний у 1933, був заборонений в СРСР і маловідомий на Заході? Історія публікації та замовчування.'
  - 'Сучасна релевантність: Як «Марія» допомагає зрозуміти сучасну російсько-українську війну та геноцидну риторику Кремля?'
  - '[!anti-hagiography] Постать Самчука: обговорення його складних стосунків з ОУН та публікацій в окупаційній пресі. Чи
    можна відокремити автора від його тексту?'
  section: Дискусія та підсумок
  words: 700
