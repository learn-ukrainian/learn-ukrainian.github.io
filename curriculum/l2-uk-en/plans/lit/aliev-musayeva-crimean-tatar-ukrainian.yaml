content_outline:
- points:
  - 'Провокація: Кримські татари — «національна меншина» чи корінний народ України? Чому це розрізнення є принциповим для
    розуміння сучасної української літератури?'
  - Цитата-загадка з книги «Незламний» про повернення додому, що ставить під сумнів саме поняття «дім».
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Незламний» — це журналістика чи література? Аргументи за визнання тексту як високоякісної публіцистики vs аргументи
    за його приналежність до документальної прози (non-fiction novel).'
  - 'Дебат 2: Автор як свідок чи як активіст? Дискусія про об''єктивність та заангажованість у біографічному письмі, коли
    автор є частиною спільноти, про яку пише.'
  - '[!epistemic-humility] Жанрові межі є розмитими; текст існує на перетині кількох дискурсів, і його класифікація залежить
    від оптики критика.'
  section: 'Конфліктна карта: Біографія як спротив'
  words: 900
- points:
  - Розширений аналіз ключових уривків, що ілюструють події депортації 1944 року та боротьбу за повернення.
  - 'Структурний аналіз: як книга поєднує пряму мову Джемілєва, історичні документи, свідчення очевидців та авторський наратив.'
  - 'Образ Джемілєва: не як ікони, а як людини, що приймає складні рішення в умовах тотального тиску.'
  - '[!decolonization] Читання книги як акт повернення кримськотатарської історії в український наратив, витіснення імперської
    та радянської інтерпретації подій.'
  section: 'Читання: «Незламний» — документ і наратив'
  words: 1700
- points:
  - 'Аналіз стилю: лаконічність, фактографічність, уникнення надмірної емоційності — як ці риси публіцистики стають художнім
    прийомом.'
  - 'Вживання кримськотатарської лексики в українському тексті: не як екзотизм, а як маркер ідентичності та політичної суб''єктності.'
  - 'Риторичні стратегії: як автори переконують читача, використовуючи поєднання логічних аргументів та емоційних свідчень.'
  - '[!myth-buster] Руйнування міфу про те, що публіцистичний чи документальний текст не може мати високої художньої вартості.
    «Незламний» як приклад синергії факту та форми.'
  section: 'Мова і поетика: Публіцистичний стиль як зброя'
  words: 1500
- points:
  - 'Повернення до розминки: як прочитання книги змінює відповідь на питання про статус кримських татар?'
  - 'Історична рецепція: як події після 2014 року змінили сприйняття книги та самої постаті Джемілєва.'
  - Солідарність проти спільного ворога як центральна тема, що поєднує кримськотатарський та український досвіди опору імперії.
  - '[!anti-hagiography] Аналіз книги показує Джемілєва не як безгрішного святого, а як складну політичну фігуру, що дозволяє
    уникнути агіографії та побачити живу людину за символом.'
  section: Дискусія та підсумок
  words: 700
focus: 'The role of Crimean Tatar authors in modern Ukrainian literature, focusing on the documentary prose of Alim Aliev
  and Sevgil Musayeva, the book "Mustafa Dzhemilev: Unbreakable", and the intersection of journalism, activism, and literature
  in a decolonial context.'
level: LIT
module: lit-219
objectives:
- Аналізувати особливості сучасної українськомовної літератури, створеної кримськотатарськими авторами.
- Проводити поглиблений аналіз документально-біографічної прози на прикладі книги «Мустафа Джемілєв. Незламний».
- Розрізняти поняття «журналістика» та «документальна література», аналізуючи їх взаємопроникнення.
- Оцінювати роль літератури у формуванні суспільної солідарності та деколоніального дискурсу.
