content_outline:
- points:
  - 'Провокація: Як автор "Сонячних кларнетів", найяскравіший модерніст свого покоління, став автором вірша "Партія веде"?
    Це був цинічний вибір, психологічний злам чи неминуча доля митця в тоталітарній державі?'
  - Фрагмент з пізнього вірша без контексту, де вихваляється Сталін або партія, — як це співвідноситься з образом "ніжного,
    ясного" Тичини?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Психологічна інтерпретація (Василь Стус) vs Соціально-історична (Юрій Лавріненко). Тичина — жертва терору, що
    зламався психологічно, чи прагматик, що обрав життя ціною таланту?'
  - 'Дебат 2: Проблема канону. Чи маємо ми "ділити" Тичину на "раннього" (справжнього) і "пізнього" (радянського)? Чи це цілісна,
    хоч і трагічна, творча біографія?'
  - '[!epistemic-humility] Не існує єдиної відповіді на "трагедію Тичини". Кожна епоха, від діаспорної критики до сучасних
    досліджень, пропонує свою інтерпретацію, що більше говорить про саму епоху.'
  section: 'Конфліктна карта: Злам генія чи свідомий вибір?'
  words: 900
- points:
  - 'Текст 1 (ранній період): Аналіз вірша "Арфами, арфами..." — музичність, світлоносність, синестезія, неологізми. Як створюється
    "космічний" вимір поезії.'
  - 'Текст 2 (пізній період): Аналіз уривку з "Партія веде" або "Пісня про Сталіна" — спрощена лексика, декларативність, ораторські
    інтонації, зникнення "я".'
  - 'Порівняльний аналіз: Як змінився образ ліричного героя, роль метафори, звукопис та ритміка. Деконструкція поетичної мови
    як симптом самоцензури.'
  - '[!decolonization] Трагедія Тичини — це не унікальний випадок, а модельний приклад того, як імперія (радянська) "переформатовує"
    національного генія, змушуючи його служити своїм інтересам.'
  section: 'Читання: Від "Сонячних кларнетів" до "Партія веде"'
  words: 1700
- points:
  - 'Ранній Тичина: "кларнетизм" як унікальний український стиль. Вплив символізму, імажизму та музики. Аналіз неологізмів
    ("яблуневоцвітно"), синтаксичної інверсії.'
  - 'Пізній Тичина: Перехід до "соцреалістичного класицизму". Мова стає інструментом, а не метою. Аналіз кліше, формул, ідеологічних
    маркерів. Збіднення палітри.'
  - 'Стилістичний аналіз "на зламі": вірші початку 1930-х як поле боротьби між старою поетикою та новими вимогами. Де ще проривається
    "справжній" Тичина?'
  - '[!myth-buster] Міф про "миттєве переродження". Злам Тичини був поступовим процесом, а не одномоментним актом, і його
    сліди можна простежити в текстах.'
  section: 'Мова і поетика: Стилістичний злам'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, як ми можемо відповісти на питання про причини трагедії Тичини, маючи повний аналіз?'
  - 'Рецепція: Як сприймали Тичину сучасники (Хвильовий, Зеров)? Як його оцінювала діаспора? Як його образ трансформувався
    в незалежній Україні?'
  - '[!anti-hagiography] Замість того, щоб засуджувати чи виправдовувати Тичину, варто розглянути його як "симптом" епохи.
    Що його трагедія говорить про стосунки митця та влади?'
  - 'Сучасне значення: Чи актуальна проблема "конформізму митця" сьогодні? Які форми тиску на митців існують у демократичному
    суспільстві?'
  section: Дискусія та підсумок
  words: 700
focus: The literary, ethical, and psychological tragedy of Pavlo Tychyna's transformation from a leading modernist innovator
  ("clarinettism") to a state-approved poet of socialist realism.
level: LIT
module: lit-083
objectives:
- Критично аналізувати трагедію Павла Тичини як складну літературну, етичну та психологічну проблему.
- Порівнювати поетику "кларнетизму" та соцреалізму на рівні мови, ритму й образності, ідентифікуючи маркери стилістичного
  зламу.
- Застосовувати інструменти деколонізаційного аналізу для розуміння тиску імперської системи на національного митця.
- Формулювати власну аргументовану позицію в дебаті про місце "радянського" періоду творчості в національному каноні.
