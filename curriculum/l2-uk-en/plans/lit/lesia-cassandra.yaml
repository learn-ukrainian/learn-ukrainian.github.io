content_outline:
- points:
  - 'Провокація: "Своїм я дивна, ворогам смішна". Чому дар бачити майбутнє стає прокляттям, а не зброєю? Роздуми над трагічною
    долею пророчиці.'
  - 'Запитання до студента: Якби ви мали дар Кассандри сьогодні, в епоху фейкових новин та інформаційної війни, чи повірили
    б вам?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Психологічна vs Символічна інтерпретація. "Кассандра" — це драма про особисту трагедію жінки, чий дар ніхто
    не цінує, чи це алегорія "правди", яку суспільство відкидає?'
  - 'Дебат 2: Місце в каноні. Чому інтелектуальна драма Лесі Українки була розривом із народницькою традицією? Чи можна вважати
    "Кассандру" початком українського модернізму в драматургії?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у Кассандрі саму Лесю Українку (автобіографізм), інші — універсальний
    образ інтелектуала у ворожому оточенні.'
  section: 'Конфліктна карта: Трагедія особиста чи національна?'
  words: 900
- points:
  - 'Читання та аналіз сцени Кассандри з Геленом: конфлікт прагматизму і пророцтва, "патріотичної брехні" та гіркої правди.'
  - 'Система персонажів: Кассандра як "одна проти всіх". Контрастні пари: Кассандра/Гелен (правда/користь), Кассандра/Поліксена
    (розум/почуття), Кассандра/Деїфоб (пророцтво/дія).'
  - 'Структура твору: як Леся Українка використовує античний сюжет для постановки гострих питань своєї сучасності.'
  - '[!decolonization] Кассандра як алегорія української інтелігенції, яка намагається попередити про загрозу імперії (російської),
    але її голос ігнорують або висміюють власні ж "троянці".'
  section: 'Читання: Аналіз ключових сцен "Кассандри"'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання драматичної дії з глибоким філософським дискурсом. Драма ідей, а не тільки драма подій.'
  - 'Робота з мовою: використання афоризмів, парадоксів, гострих діалогів для розкриття характерів та ідей ("Мфй спогад —
    се моя надія", "Зраджений коханням — зраджує усьому").'
  - 'Особливості ритміки та синтаксису: як вільний вірш (blank verse) створює відчуття інтелектуальної напруги та філософської
    рефлексії.'
  - '[!myth-buster] Твір руйнує міф про те, що українська література — це лише село, страждання та етнографія. Леся Українка
    доводить її здатність говорити про універсальні проблеми мовою високої європейської культури.'
  section: 'Мова і поетика: Інтелектуальний неоромантизм'
  words: 1500
- points:
  - 'Повернення до розминки: тож чому дар Кассандри — це прокляття? Формулювання відповіді на основі аналізу твору.'
  - 'Рецепція твору: як "Кассандру" читали в радянські часи (ігноруючи національний підтекст) і як її читають сьогодні, після
    2014 та 2022 років?'
  - '[!anti-hagiography] Погляд на Лесю Українку не як на "хвору дівчинку-генія", а як на потужного інтелектуала та мислителя,
    що свідомо обрав зброєю слово.'
  - 'Питання для рефлексії: Чи змінилося ваше розуміння ролі інтелектуала в суспільстві після прочитання "Кассандри"?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз драматичної поеми Лесі Українки "Кассандра" як взірця європейського модернізму, інтелектуальної драми та алегорії
  долі української інтелігенції.
level: LIT
module: lit-053
objectives:
- Аналізувати драматичну поему «Кассандра» в контексті європейського модернізму та українського «довгого XIX століття»
- Досліджувати стилістичні особливості неоромантизму Лесі Українки, зокрема символізм та інтелектуальний психологізм
- Оцінювати деколоніальний вимір твору як алегорію долі української інтелігенції в імперському контексті
- Формулювати власну позицію в літературних дебатах щодо інтерпретації та канонізації твору
