content_outline:
- points:
  - 'Провокація: "Воццек" — це роман, щоденник божевільного чи філософський трактат, замаскований під прозу? Чому текст, що
    відверто грається з читачем, став культовим?'
  - Цитата-загадка з тексту, що ілюструє фрагментарність та ігровий характер письма Іздрика.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Жанровий анархізм. "Воццек" — це анти-роман, що свідомо руйнує наративні конвенції, чи новий тип філософської
    прози?'
  - 'Дебат 2: Авторська маска. Наскільки наратор "Воццека" є автобіографічним? Дискусія про межі між автором, оповідачем та
    персонажем у постмодерній літературі.'
  - '[!epistemic-humility] Літературознавці (напр., Тамара Гундорова, Віра Агеєва) пропонують різні, часом суперечливі, інтерпретації
    твору, що лише підкреслює його відкритість.'
  section: 'Конфліктна карта: Текст без меж'
  words: 900
- points:
  - 'Аналіз ключових фрагментів: розбір символіки, міфологічних та культурних алюзій (напр., до Бюхнера, до східних філософій).'
  - 'Система персонажів як система дзеркал: еволюція чи деконструкція "я" головного героя.'
  - 'Конфлікт як внутрішня боротьба: екзистенційний пошук сенсу в хаотичному світі.'
  - '[!decolonization] "Воццек" як радикальний розрив із соцреалістичною традицією та колоніальним наративом. Створення абсолютно
    нової, не-імперської мови для опису українського досвіду.'
  section: 'Читання: Лабіринти "Воццека"'
  words: 1700
- points:
  - 'Стилістичні інновації: аналіз унікального синтаксису Іздрика, ритмічної прози, потоку свідомості.'
  - 'Лексична гра: використання оказіоналізмів, архаїзмів, жаргонізмів як інструмент створення художнього світу.'
  - 'Інтертекстуальність: як "Воццек" веде діалог зі світовою літературою та філософією, залишаючись глибоко українським текстом.'
  - '[!myth-buster] Іздрик — не просто "складний" автор для естетів. Його мовні експерименти — це спроба знайти адекватний
    інструментарій для опису травматичного досвіду кінця ХХ століття.'
  section: 'Мова і поетика: Алхімія слова'
  words: 1500
- points:
  - 'Повернення до розминки: тож чим є "Воццек"? Студент формулює власну аргументовану відповідь.'
  - 'Рецепція твору: як змінювалося сприйняття роману від 90-х до сьогодні? Чому він залишається актуальним?'
  - '[!anti-hagiography] Критичний погляд на "культовий" статус твору. Чи не заважає аура елітарності його адекватному прочитанню
    новими поколіннями?'
  - 'Провокативне питання для роздумів: чи можливий був би "Воццек" без розпаду Радянського Союзу?'
  section: Дискусія та підсумок
  words: 700
focus: Роман "Воццек" Юрія Іздрика як ключовий текст українського постмодернізму, аналіз філософських шарів, стилістичних
  інновацій та місця в каноні.
level: LIT
module: lit-188
objectives:
- Аналізувати ключові уривки роману «Воццек», виявляючи філософські та екзистенційні пласти тексту.
- Досліджувати поетику та стилістичні інновації Іздрика, зокрема його роботу з мовою, синтаксисом та інтертекстуальністю.
- Оцінювати місце «Воццека» в українському літературному каноні 90-х та його деколонізаційний потенціал у розриві з соцреалізмом.
- Формулювати власну аргументовану позицію в рамках ключових літературознавчих дебатів щодо жанрової природи твору та проблеми
  автора.
