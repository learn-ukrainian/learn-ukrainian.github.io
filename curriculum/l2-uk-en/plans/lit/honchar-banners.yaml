content_outline:
- points:
  - 'Провокація: Як один роман, що існував лише в "самвидаві", міг стати прапором цілого покоління і спричинити гнів усієї
    радянської системи?'
  - 'Запитання без контексту: "Що вища інстанція — собор душі чи циркуляр?" — як би ви відповіли на це питання, і що воно
    говорить про конфлікт твору?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Собор" — це політичний памфлет проти радянської бюрократії чи універсальна притча про боротьбу духовності та
    бездуховності?'
  - 'Дебат 2: Місце в каноні. Чому твір, офіційно засуджений і вилучений, став центральним для шістдесятників і залишився
    актуальним після 1991 року?'
  - '[!epistemic-humility] Критики звинувачували Гончара в "абстрактному гуманізмі", тоді як дисиденти бачили в романі заклик
    до прямої дії.'
  section: 'Конфліктна карта: "Собор" як поле битви інтерпретацій'
  words: 900
- points:
  - 'Ключовий уривок: Опис собору, що "виринає з імли століть" — аналіз символіки архітектури як живої історії України.'
  - 'Структура: Відсутність традиційного сюжету. Роман-мозаїка, де переплітаються долі персонажів навколо центрального символу
    — Собору.'
  - 'Система персонажів: Ізот Лобода (хранитель), Володька Лобода ("яструб"), Єлька (майбутнє) — як вони втілюють різні шляхи
    розвитку нації.'
  - '[!decolonization] "Собор" — це маніфест проти "малоросійства". Твердження про спадкоємність козацької та сучасної української
    культури всупереч імперській політиці "злиття націй".'
  section: 'Читання: "Собор" як національна алегорія'
  words: 1700
- points:
  - 'Стилістичні інновації: Поєднання високого, "орнаментального" стилю з народною мовою та роздумами оповідача. Гончар як
    майстер "симфонічної прози".'
  - 'Неологізми та архаїзми: Використання козацької лексики та створення нових слів для підкреслення історичної тяглості та
    багатства мови.'
  - '[!myth-buster] Гончар — не "соцреаліст із людським обличчям". "Собор" — це свідомий відхід від канонів соцреалізму в
    бік модерністської, необарокової поетики, де символ важливіший за сюжет.'
  - 'Синтаксис: Довгі, розлогі речення, що імітують плин думки або створюють панорамний ефект, чергуються з короткими, афористичними
    висновками.'
  section: 'Мова і поетика: Симфонічна проза та необароко'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чому "циркуляр" боїться "собору душі"?'
  - 'Рецепція: Як змінювалося сприйняття роману — від забороненого плоду до обов''язкової шкільної програми. Чи не втратив
    він свою бунтарську енергію?'
  - '[!anti-hagiography] Критичний погляд: чи не є персонажі роману надто схематичними носіями ідей, а не живими людьми? Обговорення
    можливих слабких сторін твору.'
  - 'Сучасна актуальність: Боротьба за збереження історичних пам''яток, протистояння "людей совісті" та цинічних "кар''єристів"
    — які паралелі з сьогоднішнім днем ви бачите?'
  section: Дискусія та підсумок
  words: 700
focus: Роман "Собор" Олеся Гончара як акт культурного опору, його алегорична структура, боротьба за збереження національної
  спадщини та необароковий стиль.
level: LIT
module: lit-146
objectives:
- Аналізувати роман "Собор" як складне алегоричне висловлювання про долю України.
- Розрізняти та аргументувати різні критичні інтерпретації твору (політичну, філософську, естетичну).
- Визначати риси необароко та "симфонічної прози" в стилі Олеся Гончара.
- Формулювати власну позицію щодо актуальності та місця роману в сучасному українському каноні.
