content_outline:
- points:
  - 'Провокація: Чи може кохання бути суто інтелектуальним експериментом? Історія однієї фатальної гри, розказана в романі
    «без сюжету».'
  - 'Цитата-загадка: «Я хочу, щоб мене знуджено, щоб я не знала, що мені робити, я хочу закохатися, я хочу страждати!» — хто
    це говорить і чому страждання є метою, а не перешкодою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Психоаналітичний роман vs екзистенціалізм. Герої — жертви фройдистських комплексів чи вільні індивіди, що роблять
    свій трагічний вибір?'
  - 'Дебат 2: Місце в каноні. Забутий текст «неокласиків» чи перший український постмодерний роман, що випередив свій час?'
  - '[!epistemic-humility] Критики досі сперечаються, чи є фінал роману логічним наслідком дій героїв, чи штучною авторською
    конструкцією.'
  section: 'Конфліктна карта: Інтелектуальний експеримент чи трагедія епохи?'
  words: 900
- points:
  - 'Аналіз структури: «роман без сюжету» як свідома авторська стратегія. Порушення хронології та потік свідомості.'
  - 'Система персонажів: Зіна Тихменєва (бунтарка), Іполит Варецький (інтелектуал-маніпулятор), Леся (втілення «нормальності»).
    Як вони деконструюють класичні романні амплуа?'
  - 'Ключова сцена: розмова Варецького з батьком Зіни. Зіткнення двох світоглядів, двох епох.'
  - '[!decolonization] Роман, написаний 1928 року, свідомо ігнорує вимоги соцреалізму. Це акт естетичного опору радянській
    асиміляції української літератури.'
  section: 'Читання: Розтин любовного трикутника'
  words: 1700
- points:
  - 'Стилістичний аналіз: довгі, складнопідрядні речення як спроба раціоналізувати ірраціональні почуття.'
  - 'Лексика: поєднання філософської термінології, психоаналітичних алюзій та міської розмовної мови 20-х років.'
  - 'Інтертекстуальність: приховані цитати з Ніцше, Фройда, Шопенгауера. Роман як діалог із європейською філософією.'
  - '[!myth-buster] Домонтович — не просто «неокласик», що писав про античність. Він використовує класичні сюжети для аналізу
    травм і парадоксів сучасної йому людини.'
  section: 'Мова і поетика: Стилістика інтелектуальної провокації'
  words: 1500
- points:
  - 'Повернення до розминки: чи є страждання Зіни справжнім, якщо вона сама його прагнула? Відповідь з опорою на текст.'
  - 'Рецепція твору: чому роман, написаний у 1920-х, став по-справжньому популярним лише в 2000-х? Що він говорить про сучасну
    Україну?'
  - '[!anti-hagiography] Постать автора: Віктор Петров (Домонтович) — радянський розвідник чи подвійний агент? Як його біографія
    впливає на прочитання його творів?'
  - 'Рефлексія: чи змінилося ваше ставлення до поняття «кохання» після прочитання цього роману?'
  section: Дискусія та підсумок
  words: 700
focus: V. Domontovych's "Girl with a Teddy Bear" as an intellectual, psychological novel; debates on modernism vs. postmodernism,
  psychoanalysis vs. existentialism; decolonial reading against the Soviet canon.
level: LIT
module: lit-103
objectives:
- Аналізувати роман 'Дівчинка з ведмедиком' як інтелектуальну прозу, що поєднує філософський дискурс та психологічний аналіз.
- Розрізняти психоаналітичну та екзистенціалістську інтерпретації твору, формулюючи власну позицію.
- Визначати стилістичні особливості тексту (потік свідомості, інтертекстуальність) та їхню функцію.
- Аргументувати деколонізаційне значення роману як акту естетичного опору радянському культурному канону.
pedagogy: CBI
