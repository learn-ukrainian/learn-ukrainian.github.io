content_outline:
- points:
  - 'Провокація: Чи є українська проза 90-х лише «терапією травми» та «прощанням з імперією»? А що, як її головний опір —
    не зовнішньому ворогу, а внутрішньому постколоніальному комплексу меншовартості?'
  - Цитата-загадка з твору одного з «дев'ятдесятників» про абсурдність пострадянської реальності.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це література для нації чи гра в бісер? Позиція 1: Це інструмент конструювання нової української ідентичності.
    Позиція 2: Це естетична гра, частина глобального постмодерного проекту.'
  - 'Дебат 2: Хто визначає канон? Чому Забужко стала «моральним авторитетом», Андрухович — «патріархом», а Ірванець — «хуліганом»?
    Чи справедливі ці ролі?'
  - '[!epistemic-humility] Літературна критика 90-х сама була полем битви: від звинувачень у «порнографії» та «нарузі над
    святинями» до проголошення «нової ери» в літературі.'
  section: 'Конфліктна карта: Постмодернізм чи нова щирість?'
  words: 900
- points:
  - 'Аналіз ключових уривків: як тексти Забужко, Андруховича, Ірванця руйнують радянський міф про «маленьку людину» та соцреалістичний
    канон.'
  - 'Нова агентність: герой (і особливо героїня) перестає бути об''єктом історії, а стає її суб''єктом. Він/вона діє, помиляється,
    рефлексує.'
  - '[!decolonization] Тексти 90-х — це акт культурного суверенітету. Вони відмовляються говорити з Москвою, натомість вступають
    у прямий діалог зі світовою культурою (Джойс, Селін, Міллер).'
  - 'Сюжет як опір: відмова від лінійної оповіді, фрагментарність, колаж — як спосіб передати хаос і свободу нової епохи.'
  section: 'Читання: Деконструкція українського героя'
  words: 1700
- points:
  - '[!myth-buster] Це не «засмічення мови», а свідомий художній прийом. Аналіз, як автори використовують суржик та ненормативну
    лексику для характеристики персонажів і середовища.'
  - 'Стилістичний колаж: поєднання в одному тексті філософських есе, газетних вирізок, рецептів, особистих щоденників, наукових
    трактатів.'
  - 'Неологізми та синтаксичні експерименти: як мова стає інструментом не лише опису, але й творення нової реальності.'
  - 'Ритм і мелодика прози: аналіз, як синтаксис та звукопис створюють унікальну «музику» тексту.'
  section: 'Мова і поетика: Суржик, лайка та високий стиль'
  words: 1500
- points:
  - 'Повернення до розминки: тож це «терапія» чи «світотворення»? Формулювання власної позиції на основі аналізу.'
  - 'Рецепція та вплив: як «проза опору» 90-х вплинула на літературу 2000-х та сьогодення? Хто з авторів залишився актуальним,
    а хто став «класиком»?'
  - 'Сучасна релевантність: чи допомагають нам тексти 90-х зрозуміти сучасну Україну та її боротьбу?'
  - 'Рефлексія: що у вашому сприйнятті української літератури змінилося після цього аналізу?'
  - '[!anti-hagiography] Критичний погляд на канон 90-х: чи не затьмарили кілька гучних імен інших, не менш вартісних авторів?'
  section: Дискусія та підсумок
  words: 700
focus: Ukrainian literature of the 1990s-2000s, postmodernism vs. national identity, deconstruction of Soviet myths, stylistic
  experimentation (Zabuzhko, Andrukhovych, Irvanets)
level: LIT
module: lit-212
objectives:
- Аналізувати твори «нової прози» в контексті постколоніального та постмодерного поворотів в українській культурі.
- Визначати стилістичні інновації «прози опору», зокрема використання суржику, ненормативної лексики та синтаксичних експериментів
  як художнього прийому.
- Критично оцінювати деколонізаційний потенціал текстів, розрізняючи пасивний опір та активне творення нової культурної ідентичності.
- Формулювати аргументовану позицію в літературних дебатах про канон, цінності та майбутнє української літератури.
pedagogy: CBI
persona:
  role: Провокатор, що ставить під сумнів «високу» місію літератури, але насправді глибоко переймається її долею
  voice: Postmodern-Ironist
phase: LIT.5 Independence Era 1991-Present
