content_outline:
- points:
  - 'Провокація: Як офіційний радянський письменник-депутат, лауреат Ленінської та Сталінської премій, зміг написати одну
    з найпоетичніших та найавтентичніших розповідей про український Святвечір?'
  - 'Цитата без контексту: фрагмент про запах сіна та дідуховий дух — чиста сенсорика, що налаштовує на тему пам''яті.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Стельмах — колаборант чи хранитель? Чи був його офіційний статус ціною за можливість зберегти мовне та етнографічне
    багатство українського села в літературі?'
  - 'Дебат 2: Стельмах vs Довженко. Чия поетика пам''яті сильніша? «Щедрий вечір» як тиха, земна, родинна історія проти «Зачарованої
    Десни» як космічного міфу нації.'
  - '[!epistemic-humility] Критики досі сперечаються: чи був соцреалістичний канон для Стельмаха лише рамкою, яку він творчо
    наповнював українським змістом, чи ідеологією, яка деформувала його талант?'
  section: 'Конфліктна карта: Компроміс чи тихий спротив?'
  words: 900
- points:
  - 'Сюжет і композиція: дитинство як втрачений, але навічно збережений у пам''яті рай. Ритуал Святвечора як структурний стрижень,
    що організує спогади.'
  - 'Образ діда Данила: не просто родич, а носій народної мудрості, усної традиції та мови, зв''язок поколінь.'
  - 'Етнографічний вимір: обряди, звичаї, пісні, народні прикмети подільського села, що оживають у прозі. Стельмах як фольклорист-практик.'
  - '[!decolonization] Під покровом офіційно дозволеної «селянської теми» Стельмах проводить акт культурної консервації —
    фіксує та зберігає український космос, якому загрожувало знищення радянською уніфікацією.'
  section: 'Читання: Щедрий вечір'
  words: 1700
- points:
  - 'Феномен «стельмахівського речення»: складні, багатоярусні синтаксичні конструкції, що поєднують книжну витонченість із
    народною пісенною інтонацією.'
  - 'Синестезія та сенсорне письмо: текст, що промовляє до всіх органів чуття — запахи (сіно, кутя), смаки (узвар), кольори
    (сніг, вечірня зоря), звуки (колядки).'
  - 'Лексичне багатство: активне використання подільської діалектної лексики, фразеології, прислів''їв, що створює ефект мовної
    автентичності.'
  - '[!myth-buster] Стельмах руйнує міф про те, що соцреалізм — це обов''язково мовна бідність. Він доводить, що навіть у
    жорстких ідеологічних рамках можна творити мовно досконалу прозу.'
  section: 'Мова і поетика: Стельмахівське речення та поетика чуттів'
  words: 1500
- points:
  - 'Повернення до провокації: чи дає аналіз тексту відповідь на парадокс Стельмаха? Студент формулює власну позицію.'
  - 'Рецепція та критика: як змінювалося ставлення до Стельмаха — від офіційного класика до «компромісного» письменника і
    до нової переоцінки після 2014 року.'
  - '[!anti-hagiography] Чи справедливо звинувачувати Стельмаха в конформізмі, чи варто цінувати те, що він зумів зберегти
    для української культури в умовах тоталітарного тиску?'
  - 'Сучасний контекст: чи актуальна сьогодні стратегія «тихого спротиву» та збереження культури через «дозволені» форми?'
  section: Дискусія та підсумок
  words: 700
level: LIT
module: lit-223
objectives:
- Аналізувати автобіографічну прозу Стельмаха як складний випадок культурного збереження в умовах соцреалізму.
- Розбирати стилістичну майстерність «Щедрого вечора», зокрема синтаксис, сенсорне письмо та етнографічну деталь.
- Формулювати аргументовану позицію в літературній дискусії про компроміс та спротив митця в тоталітарній державі.
- Критично оцінювати роль та місце «дозволеної» радянською владою української літератури в національному каноні.
