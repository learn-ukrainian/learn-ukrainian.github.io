content_outline:
- points:
  - 'Провокація: Чи може вірш, написаний у телеграм-каналі, стати класикою? Де межа між документальним свідченням і високим
    мистецтвом у поезії війни?'
  - 'Фрагмент вірша без автора і назви: «Маріуполь. Сталь. Біль.» — що стоїть за цими словами?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Естетична якість vs. Етика свідчення. Чи маємо ми право оцінювати воєнну поезію за суто художніми критеріями?
    Позиція «будь-який текст війни — цінний як документ» vs «погана поезія про важливе — все одно погана поезія».'
  - 'Дебат 2: Миттєва канонізація vs. Перевірка часом. Чому вірші з соцмереж одразу потрапляють до антологій? Ризики та переваги
    такого «гарячого» канону.'
  - '[!epistemic-humility] Немає "правильної" відповіді на питання про цінність воєнної лірики; є лише різні оптики — історична,
    естетична, етична.'
  section: 'Конфліктна карта: Естетика vs. Свідчення'
  words: 900
- points:
  - 'Читання та аналіз ключових текстів: вірші Валерії «Нави» Суботіної, Галини Крук, Максима Кривцова.'
  - 'Наративна структура: від прямого репортажу до ліричної рефлексії. Як змінюється оптика поета?'
  - 'Система образів: «сталь», «кістка», «зерно», «темрява». Аналіз наскрізних метафор.'
  - '[!decolonization] Ця поезія — не «реакція на кризу», а акт мовного спротиву. Відмова говорити мовою ворога, пошук власної
    мови для опису екстремального досвіду.'
  section: 'Читання: Голоси з Азовсталі та Бучі'
  words: 1700
- points:
  - 'Стилістичні інновації: «документальний верлібр», використання побутової мови, жаргонізмів та військової лексики як художнього
    прийому.'
  - 'Звукопис болю: Алітерації та асонанси, що імітують звуки війни (вибухи, сирени). Робота з ритмом як передача стану тривоги.'
  - 'Синтаксис уламків: короткі, «обірвані» речення, відсутність розділових знаків як відображення травмованої свідомості.'
  - '[!myth-buster] Міф про те, що «воєнна поезія — проста і плакатна». Розвінчання через аналіз складних інтертекстуальних
    зв''язків та філософської глибини текстів.'
  section: 'Мова і поетика: Мова на межі'
  words: 1500
- points:
  - 'Повернення до розминки: тож чи може вірш з телеграму стати класикою? Студент формулює власну відповідь, спираючись на
    аналіз модуля.'
  - 'Рецепція: від лайків у Facebook до міжнародних премій. Як змінюється статус тексту, проходячи ці етапи?'
  - 'Сучасне значення: воєнна поезія як терапія для нації та як інструмент культурної дипломатії.'
  - '[!anti-hagiography] Чи кожен текст, написаний на війні, є автоматично геніальним і недоторканним? Проблема графоманії
    та спекуляції на темі.'
  section: Дискусія та підсумок
  words: 700
focus: Contemporary Ukrainian war poetry, analysis of new canon formation, language of trauma, decolonization through art
