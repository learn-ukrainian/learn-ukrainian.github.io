objectives:
- Аналізувати поезію повномасштабного вторгнення як історичне та культурне явище
- Визначати ключові стилістичні та поетичні прийоми сучасної воєнної лірики
- Критично оцінювати роль воєнної поезії у процесах деколонізації української культури та формуванні нового канону
- Формулювати власну аргументовану позицію щодо естетичної вартості та етичних викликів у воєнній поезії
