activity_hints:
- description: Чия це теза? Розрізнити позиції критиків, що сперечаються про естетичну якість та швидку канонізацію воєнної
    лірики.
  focus: 'Розуміння конфліктної карти: канонізація воєнної поезії'
  items: 4
  type: quiz
- description: Заповнити пропуски неологізмами та військовою лексикою, що стали характерними для поезії 2022+ років.
  focus: 'Мова травми: Стилістичні неологізми'
  items: 5
  type: fill-in
- description: Порівняйте два вірші з модуля (про оборону Маріуполя та про деокупацію Київщини). Які спільні мотиви, а які
    стилістичні відмінності? Як географія досвіду впливає на поетику?
  focus: 'Порівняльний аналіз: Поезія Маріуполя vs. Поезія Київщини'
  type: note
- description: Спираючись на матеріал модуля, напишіть есе-роздум (400-600 слів) на тему етичних викликів для поета під час
    війни. Чи існує відповідальність митця перед суспільством, і в чому вона полягає?
  focus: 'Есе: Чи може поезія бути "не на часі"?'
  type: note
cefr_min: C1
connects_to:
