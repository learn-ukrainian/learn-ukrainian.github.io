content_outline:
- points:
  - 'Провокація: Чи була Леся Українка справді «хворобливою і слабкою», чи цей образ — радянська спроба нейтралізувати її
    інтелектуальну міць?'
  - 'Фрагмент з "Contra spem spero!": "Я на вбогім сумнім перелозі / Буду сіять барвисті квітки" — без вказівки на автора.
    Про що цей текст: про садівництво чи про щось інше?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Леся Українка — європейська модерністка чи речниця національної ідеї? Чи можна поєднати естетизм "чистого мистецтва"
    з політичною заангажованістю?'
  - 'Дебат 2: Фемінізм Лесі Українки — визволення жінки як індивіда чи як алегорії поневоленої нації? Конфлікт інтерпретацій
    її жіночих образів.'
  - '[!epistemic-humility] Радянське літературознавство бачило в ній лише "співачку досвітніх огнів" революції. Постколоніальна
    критика бачить інтелектуалку, що боролася з імперським дискурсом.'
  section: 'Конфліктна карта: Модернізм vs Націєтворення'
  words: 900
- points:
  - 'Фрагмент тексту: Монолог Кассандри про правду, якій ніхто не вірить. Аналіз трагедії знання без влади.'
  - '[!decolonization] Кассандра як алегорія України: її попередження про загибель ігноруються Троєю (Російською імперією),
    бо правда колонізованого є непочутою в метрополії.'
  - 'Система персонажів: Кассандра (знання), Гелен (краса/пристрасть), Поліксена (наївність) — як різні грані жіночої долі
    в патріархальному світі.'
  - Конфлікт між особистим і суспільним обов'язком — головна рушійна сила її драматичних поем.
  section: 'Читання: Драма "Кассандра" як алегорія'
  words: 1700
- points:
  - 'Стилістична інновація: використання античних та середньовічних сюжетів для розмови про сучасні філософські проблеми (інтелектуальна
    драма).'
  - 'Особливості синтаксису: довгі, складнопідрядні речення, що відтворюють плин думки; риторичні питання та антитези як основа
    її поетики.'
  - '[!myth-buster] Мова Лесі Українки — це не просто "поетична мова". Це інструмент філософського аналізу, що вимагає від
    читача не емоційного співпереживання, а інтелектуальної праці.'
  - Неологізми та архаїзми як спосіб розширення виражальних можливостей української мови на початку XX століття.
  section: 'Мова і поетика: Інтелектуальний синтаксис'
  words: 1500
- points:
  - 'Повернення до розминки: як образ "слабкої жінки" суперечить аналізу її текстів, сповнених волі та інтелектуальної сили?'
  - 'Рецепція творчості: як змінювалося розуміння Лесі Українки від прижиттєвої критики до сьогодення?'
  - '[!anti-hagiography] Чи існують аспекти творчості Лесі Українки, які сьогодні можуть вважатися проблематичними або застарілими?'
  - 'Студентська рефлексія: що у вашому уявленні про Лесю Українку змінилося після цього аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз модерністської філософії Лесі Українки через призму прометеїзму, фемінізму та деколоніальної оптики.
level: LIT
module: lit-050
objectives:
- Аналізувати драматичні поеми Лесі Українки як філософські тексти в європейському модерністському контексті.
- Розрізняти та аргументувати різні підходи до інтерпретації її творчості (національний, феміністичний, постколоніальний).
- Визначати стилістичні особливості мови та синтаксису Лесі Українки як інструментів інтелектуального аналізу.
- Критично оцінювати радянські та пострадянські міфи навколо постаті письменниці.
