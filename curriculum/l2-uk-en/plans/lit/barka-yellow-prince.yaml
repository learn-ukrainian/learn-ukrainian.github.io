objectives:
- Аналізувати роман «Жовтий князь» як складний модерністський твір, а не лише як історичне свідчення
- Розрізняти та інтерпретувати ключові стилістичні засоби поетики Василя Барки (символізм, біблійний синтаксис, неологізми)
- Критично оцінювати дебати навколо естетичної та документальної цінності роману та його місце в каноні літератури про Голодомор
- Формулювати аргументовану позицію щодо здатності мови та літератури зображати екстремальний травматичний досвід
