content_outline:
- points:
  - 'Провокація: уривок з роману, де Андрійко бачить хліб уві сні. Питання до студента: Це історичний роман про голод чи теологічний
    трактат про пекло на землі?'
  - Чи може література говорити про невимовне? І якщо так, то якою мовою?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Жовтий князь» як історичне джерело vs «Жовтий князь» як високий модернізм. Чи применшує естетизація унікальність
    свідчення про геноцид?'
  - 'Дебат 2: Канонізація травми. Чому саме цей роман став головним текстом про Голодомор, затьмаривши інші? Процес формування
    канону в діаспорі та в незалежній Україні.'
  - '[!epistemic-humility] Позиції критиків: від Юрія Шереха (висока оцінка стилю) до сучасних істориків (використання роману
    як прямого свідчення).'
  section: 'Конфліктна карта: Свідчення чи мистецтво?'
  words: 900
- points:
  - 'Розбір ключових сцен: остання трапеза, смерть Андрійка, спротив Дарії. Аналіз сюжету не як хроніки, а як містерії.'
  - 'Система персонажів: Мирон Данилович (праведник), Дарія (Богородиця), Андрійко (янгол-жертва), Микола (зрадник/Іуда).'
  - 'Образ Жовтого князя: не алегорія радянської влади, а онтологічне зло, що руйнує світопорядок.'
  - '[!decolonization] Протиставлення соцреалістичному канону «боротьби з труднощами». Барка показує не соціальний конфлікт,
    а метафізичну катастрофу, повністю ігноруючи радянський дискурс.'
  section: 'Читання: Апокаліпсис родини Катранників'
  words: 1700
- points:
  - 'Аналіз унікальної мови Барки: біблійний синтаксис, поєднання архаїзмів (церковнослов''янізмів) із брутальними неологізмами
    («мертволюддя», «братоубивство»).'
  - Символізм кольорів (жовтий, чорний, сірий) та чисел (три, сім).
  - 'Ритм прози: повтори, інверсії, літанійні конструкції, що створюють ефект молитви або заклинання.'
  - '[!myth-buster] Це не «недосконалий» реалізм, а свідома експресіоністична/сюрреалістична поетика. Мова деформується так
    само, як деформується людське тіло і душа під час голоду.'
  section: 'Мова і поетика: Стиль як теологія'
  words: 1500
- points:
  - 'Повернення до розминки: тож як ми читаємо цей текст — як історію чи як притчу? Аргументація студента на основі аналізу.'
  - 'Рецепція твору: як його читали в діаспорі, коли пам''ять про Голодомор була заборонена в Україні, і як його читають зараз?'
  - '[!anti-hagiography] Критика роману: чи не є його високий стиль та метафізика перешкодою для розуміння історичної реальності
    Голодомору? Чи не створює він образ «святих мучеників», що затіняє реальних людей?'
  - 'Спадщина: вплив «Жовтого князя» на сучасну українську культуру пам''яті та літературу про травму.'
  section: Дискусія та підсумок
  words: 700
focus: Vasyl Barka's The Yellow Prince, Holodomor literature, literary testimony, apocalyptic modernism, decolonizing memory
level: LIT
