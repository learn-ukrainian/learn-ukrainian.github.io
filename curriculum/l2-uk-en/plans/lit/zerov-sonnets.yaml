content_outline:
- points:
  - 'Провокація: "Класична пластика, і контур строгий, / І логіки залізна течія..." — це формула поезії чи маніфест культурного
    опору?'
  - 'Запитання до студента: Чи може сонет, форма XIV століття, бути зброєю у ХХ столітті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Зеров — аполітичний естет («чисте мистецтво») чи прихований ідеолог? Позиція неокласиків vs звинувачення з боку
    пролетарських критиків.'
  - 'Дебат 2: Канонізація Зерова. Чому радянська влада так боялася його сонетів? Як поет, що оспівував Рим, став символом
    української ідентичності?'
  - '[!epistemic-humility] Немає єдиної відповіді. Для одних він — зразок європейськості, для інших — приклад відриву від
    народних проблем. Обидві позиції мають аргументи.'
  section: 'Конфліктна карта: Поет в вежі зі слонової кістки?'
  words: 900
- points:
  - 'Повний текст сонетів "Саломея" та "На полі тютюну". Аналіз структури: канонічний сонет як виклик хаосу революції.'
  - 'Образна система: античні та біблійні мотиви (Олександр, Одіссей, Саломея) як спосіб говорити про сучасність.'
  - '[!decolonization] Орієнтація на античність та європейське Відродження — це свідомий акт деколонізації, відмова від російської
    культурної парадигми та повернення України в європейський дім.'
  - Сюжет та наративна напруга в межах 14 рядків. Як Зеров створює драму?
  section: 'Читання: Sonnets'
  words: 1700
- points:
  - 'Стилістичний аналіз: високий стиль, лексичні архаїзми, синтаксична складність як риси неокласицизму.'
  - 'Звукопис та ритміка: аналіз алітерацій та асонансів. Ямбічний пентаметр як основа гармонії.'
  - 'Неологізми та робота з мовою: як Зеров, перекладач Вергілія, збагачував українську літературну мову.'
  - '[!myth-buster] Неокласицизм — не наслідування старих зразків, а їх переосмислення та модернізація. Це не втеча від сучасності,
    а пошук вічного в сучасному.'
  section: 'Мова і поетика: Архітектура слова'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чи може сонет бути зброєю? Відповідь студента на основі аналізу.'
  - 'Рецепція творчості: як сприймали Зерова сучасники, діаспора, і як його читають в Україні сьогодні?'
  - '[!anti-hagiography] Чи був у позиції неокласиків елемент елітаризму та зверхності до "простої" народної культури? Критичний
    погляд на їхню естетичну програму.'
  - 'Сучасне значення: чому поезія Зерова знову стала актуальною під час повномасштабного вторгнення?'
  section: Дискусія та підсумок
  words: 700
focus: Close reading of Mykola Zerov's sonnets, Neoclassical poetics, Zerov's role in the Executed Renaissance, language as
  art.
level: LIT
module: lit-089
objectives:
- Аналізувати сонети Миколи Зерова в контексті українського неокласицизму та доби Розстріляного відродження
- Розрізняти та аргументувати різні критичні позиції щодо творчості Зерова
- Застосовувати інструменти філологічного аналізу для інтерпретації поетичного тексту
- Формулювати власну позицію щодо ролі митця та мистецтва в умовах політичних репресій та культурного опору
