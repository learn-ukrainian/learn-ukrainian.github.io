activity_hints:
- description: Визначте, яка з тез належить до "народницької", а яка до "модерністської" інтерпретації творчості Тютюнника.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставте в речення терміни з розділу "Мова і поетика": лаконізм, психологізм, діалектизм, синтаксис.'
  focus: Аналіз мови та стилю
  items: 4
  type: fill-in
- description: Проаналізуйте поданий уривок з новели. Якими засобами (окрім слів) автор передає емоційний стан персонажів?
    Напишіть короткий аналіз (200-300 слів).
  focus: 'Аналіз уривка: "Мова мовчання"'
  type: note
- description: 'Напишіть есе на тему: "Чи є у героїв Тютюнника свобода вибору?". Аргументуйте свою позицію, посилаючись на
    проаналізований текст новели (400-600 слів).'
  focus: 'Есе: Екзистенційний вибір у світі Тютюнника'
  type: note
