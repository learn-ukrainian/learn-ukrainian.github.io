content_outline:
- points:
  - 'Провокація: Як текст, написаний в умовах жорсткої радянської цензури, може говорити про людську гідність та свободу вибору
    голосніше за сучасні маніфести?'
  - 'Загадка: «...ота Марфина зозуля та й мені колись кувала...» — що означає ця фраза і чому вона є ключем до розуміння цілого
    твору?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Тютюнник — останній класик «народницького» реалізму чи прихований модерніст, що маскував екзистенційні глибини
    під просту форму?'
  - 'Дебат 2: Герої Тютюнника — пасивні жертви тоталітарної системи чи вони втілюють активний, хоч і приречений, екзистенційний
    опір через збереження людяності?'
  - '[!epistemic-humility] Радянська критика бачила в ньому "співця села". Сучасні дослідники (О. Сливинський) говорять про
    "мову мовчання" та опір через не-дію.'
  section: 'Конфліктна карта: Сільський реалізм vs. Екзистенційний опір'
  words: 900
- points:
  - 'Текст: Ключові уривки новели з коментарем — лист Марфи, розмова сина з батьком, фінальна сцена.'
  - 'Структура: Чому новела складається з трьох частин? Аналіз нелінійної оповіді та переплетення часових планів.'
  - 'Система персонажів: Софія, Михайло, Марфа — не любовний трикутник, а трикутник страждання і всепрощення. Карпо як символ
    "маленької людини" з великим серцем.'
  - '[!decolonization] Текст як форма тихого опору радянській системі, що нищила особистість. Тютюнник показує не "радянську
    людину", а українську душу, що зберегла здатність до любові й емпатії в нелюдських умовах.'
  section: 'Читання: Новела «Три зозулі з поклоном»'
  words: 1700
- points:
  - 'Стилістичні інновації: "Мова мовчання" та психологізм. Як паузи, недомовки та жести говорять більше за слова.'
  - 'Робота з народною мовою: Використання діалектизмів та просторіччя не для етнографізму, а для створення автентичного психологічного
    портрета.'
  - 'Синтаксис як сенс: Аналіз коротких, "уривчастих" речень, що передають емоційну напругу та стан персонажів.'
  - '[!myth-buster] Проза Тютюнника — не "проста" чи "наївна". Це результат найвищої мовної майстерності, де кожне слово виважене
    і стоїть на єдино можливому місці, створюючи максимальну емоційну щільність.'
  section: 'Мова і поетика: Лаконізм як художній засіб'
  words: 1500
- points:
  - 'Повернення до розминки: Як твір про кохання і страждання стає актом спротиву? Формулювання відповіді на основі аналізу.'
  - 'Рецепція твору: Як новелу читали в 70-х і як її читаємо ми сьогодні? Зміна акцентів: від соціально-побутової драми до
    екзистенційної притчі.'
  - '[!anti-hagiography] Трагічна доля автора: чи є його проза автобіографічною? Розгляд зв''язку між особистою травмою письменника
    та його творчістю, уникаючи прямого ототожнення.'
  - 'Сучасне значення: Чому проза Тютюнника є надзвичайно актуальною в контексті сучасної війни в Україні?'
  section: Дискусія та підсумок
  words: 700
focus: Стилістична майстерність та екзистенційний опір у новелах Григора Тютюнника, з фокусом на глибокому аналізі новели
