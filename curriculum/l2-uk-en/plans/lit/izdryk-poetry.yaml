content_outline:
- points:
  - 'Провокація: Чи може мовчання бути виразнішим за слово? Подано уривок з вірша Іздрика, де ключову роль відіграють паузи
    та розриви.'
  - 'Питання до студента: Що автор "недоговорює" і чому це може бути важливіше за сказане?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Іздрик — це філософ, що пише вірші, чи поет, що використовує філософію? Позиція А: його герметизм — це філософська
    позиція (втеча від профанного). Позиція Б: це суто естетичний прийом, мовна гра.'
  - 'Дебат 2: "Станіславський феномен" — це географічна випадковість чи свідома програма втечі від києвоцентричного канону
    та створення автономного культурного простору?'
  - '[!epistemic-humility] Критики досі сперечаються, чи є поезія Іздрика елітарним мистецтвом "для обраних", чи, навпаки,
    найчеснішою формою комунікації про складність людського досвіду.'
  section: 'Конфліктна карта: Герметизм vs. Комунікація'
  words: 900
- points:
  - 'Ключові тексти з різних періодів творчості: детальний розбір кількох знакових віршів.'
  - 'Аналіз символіки: вода, камінь, тінь, порожнеча — як базові символи створюють унікальний світ Іздрика.'
  - 'Система персонажів: розгляд ліричного "я" як сукупності різних масок та станів, а не цілісної особистості.'
  - '[!decolonization] Творчість Іздрика як приклад НЕ-імперського, НЕ-провінційного мислення. Створення власного культурного
    мікрокосмосу, що не потребує валідації ззовні (ні з Москви, ні з Заходу).'
  section: 'Читання: Вибрані поезії'
  words: 1700
- points:
  - 'Синтаксис як основний інструмент: аналіз розривів речень, еліпсів, ролі пунктуації (або її відсутності) у творенні смислу.'
  - 'Лексичний мінімалізм: як обмежений, навмисно збіднений словник створює максимальну семантичну напругу.'
  - 'Візуальний компонент: як Іздрик працює з простором сторінки, перетворюючи вірш на візуальний об''єкт.'
  - '[!myth-buster] Спростування міфу про "незрозумілість" Іздрика. Його поезія — не ребус для дешифрування, а запрошення
    до співтворення смислу, де пауза читача є частиною твору.'
  section: 'Мова і поетика: Синтаксис і мовчання'
  words: 1500
- points:
  - 'Повернення до розминки: після детального аналізу, що означає "мовчання" в поетиці Іздрика?'
  - 'Рецепція та вплив: як змінювалося сприйняття Іздрика від андеграундного поета 90-х до одного з ключових авторів сучасності?
    Його вплив на молодше покоління.'
  - '[!anti-hagiography] Уникання творення образу "пророка" чи "гуру". Іздрик як людина своєї епохи з її сумнівами, кризами
    та суперечностями, віддзеркаленими в текстах.'
  - 'Питання для рефлексії: Чи змінився ваш спосіб читання поезії після знайомства з герметичним письмом Іздрика?'
  section: Дискусія та підсумок
  words: 700
