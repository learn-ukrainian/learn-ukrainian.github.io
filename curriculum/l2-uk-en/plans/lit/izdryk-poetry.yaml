objectives:
- Аналізувати поезію Іздрика в контексті "станіславського феномену" та літературних угруповань 90-х
- 'Досліджувати мову та поетику Іздрика: герметизм, синтаксичні експерименти, взаємодію тексту та візуальності'
- Формулювати власну інтерпретацію складних поетичних текстів, спираючись на аналіз їхньої структури та символіки
- Оцінювати творчість Іздрика як форму культурного самоствердження, альтернативну до національно-патріотичного дискурсу
