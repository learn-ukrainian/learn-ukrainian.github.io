objectives:
- Аналізувати зображення війни та військової культури в "Енеїді" Котляревського.
- Ідентифікувати та пояснювати військову лексику, тактики та види зброї, описані в поемі.
- Інтерпретувати феномен "смішної смерті", аналізуючи його мовні засоби, естетичну та психологічну функції.
- Формулювати аргументовану позицію щодо зв'язку між гумористичним зображенням війни та національною травмою.
