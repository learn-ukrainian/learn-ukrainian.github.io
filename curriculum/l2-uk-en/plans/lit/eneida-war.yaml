content_outline:
- points:
  - 'Провокація: Як Котляревський змушує нас сміятися над смертю, і що це говорить про українську культуру війни?'
  - 'Фрагмент з поеми: "Тут з досади кашляв, чхав, / І від лютіі сам не знав, / Що робити, що почати, / Чи то битись, чи втікати..."
    — без контексту, хто це і чому вагається?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Гумор в «Енеїді» — це лише засіб бурлеску, низького жанру для розваги? Чи це "психотерапія сміхом", спосіб нації
    впоратися з травмою перманентної війни?'
  - 'Дебат 2: Наскільки "реалістичними" є батальні сцени? Це точне відтворення козацької тактики та озброєння, чи це літературна
    гра, що поєднує античні тропи з українськими реаліями?'
  - '[!epistemic-humility] Літературна критика не має єдиної відповіді. Одні бачать у Котляревському етнографа (шевченківський
    напрям), інші — майстра іронії та пародії (формалісти).'
  section: 'Конфліктна карта: Сміх як зброя чи втеча?'
  words: 900
- points:
  - 'Аналіз ключових батальних сцен: масові сутички, поєдинки (Еней vs. Турн), військова ієрархія троянської ватаги.'
  - 'Коментар до уривків: як описи зброї (шаблі, списи, гармати) та тактичних прийомів створюють образ козацького війська.'
  - 'Наративна структура битв: від гумористичного хаосу до трагічного пафосу в поєдинку.'
  - '[!decolonization] Котляревський не просто копіює Вергілія. Він створює національний міф про війну, де козацька звитяга
    стає основою, а античний сюжет — лише рамкою.'
  section: 'Читання: Битва за фортецю (Частини IV-VI)'
  words: 1700
- points:
  - 'Аналіз мовних засобів: як Котляревський створює комічний ефект, описуючи насильство?'
  - 'Гастрономічні метафори смерті: "на локшину кришив", "зробив з них затірку". Їжа як символ життя і смерті.'
  - 'Евфемізми та гіперболи: "душу витрясти", "в ад купром перевернув". Мова як спосіб десакралізувати смерть.'
  - '[!myth-buster] Це не просто "грубий гумор". Це складна барокова гра з контрастами (високе/низьке, смішне/страшне), що
    має глибоке коріння в українській сміховій культурі.'
  section: 'Мова і поетика: Естетика "смішної смерті"'
  words: 1500
- points:
  - 'Повернення до розминки: тож чому ми сміємося? Студент формулює власну відповідь, використовуючи аргументи з модуля.'
  - 'Війна як "повсякденне ремесло": обговорення ідеї, що для українців війна історично була не надзвичайною подією, а частиною
    життя.'
  - 'Зв''язок із сьогоденням: чи можна знайти елементи "смішної смерті" та психотерапевтичного гумору в сучасній українській
    воєнній сатирі (меми, пісні, анекдоти)?'
  - '[!anti-hagiography] Важливо не романтизувати цей сміх. Це не ознака безтурботності, а захисний механізм культури, що
    століттями існувала під загрозою знищення.'
  section: Дискусія та підсумок
  words: 700
focus: 'The depiction of war in Kotliarevsky''s "Eneida": Cossack military tactics, weaponry, and the socio-psychological
  function of "humorous death" in burlesque poetry.'
level: LIT
