content_outline:
- points:
  - 'Провокація: Чому автор, що пережив Голодомор і сталінські репресії, писав не стільки про історичні події, скільки про
    «вічний жах» людського існування? Як текст стає зброєю проти системи, що прагне тебе знищити?'
  - Цитата без контексту з повісті «План до двору» про відчуття тотального переслідування.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Осьмачка — «співець жаху» і документаліст, що фіксує злочини режиму, чи насамперед модерніст-експресіоніст,
    для якого форма та психологізм важливіші за історичну точність?'
  - 'Дебат 2: Місце в каноні. «Незручний» письменник для радянської критики, класик для діаспори. Як його творчість (не)вписувалася
    в офіційні наративи і як повертається в український канон сьогодні?'
  - '[!epistemic-humility] Позиції критиків: від звинувачень у «біологізмі» та «патології» до визнання одним із найпотужніших
    голосів «літератури свідчення» ХХ століття.'
  section: 'Конфліктна карта: Свідок чи митець?'
  words: 900
- points:
  - 'Розгорнутий аналіз ключових епізодів: сцена зборів у сільраді, втеча головного героя, його перебування в божевільні —
    як розгортається механізм тоталітарного насильства.'
  - 'Система персонажів: людина в лещатах тоталітарної машини. Відсутність «позитивного героя». Аналіз образу головного героя
    як уособлення зацькованої, але не скореної людини.'
  - 'Наративна структура: розірвана, фрагментарна оповідь, що відтворює стан травмованої свідомості.'
  - '[!decolonization] «План до двору» як антитеза до радянського міфу про «щасливу колективізацію». Текст як акт повернення
    суб''єктності жертвам і викриття імперського злочину.'
  section: 'Читання: Повість «План до двору»'
  words: 1700
- points:
  - 'Стилістичний аналіз: синтез неоромантизму (бунтівний індивід) та жорсткого експресіонізму (деформація світу, гротеск,
    натуралістичні деталі).'
  - 'Мова як відображення психічного стану: «рваний» синтаксис, потік свідомості, повтори, неологізми, що передають відчуття
    тривоги та божевілля.'
  - 'Звукопис і ритм прози: алітерації, асонанси, що створюють гнітючу, тривожну атмосферу.'
  - '[!myth-buster] Осьмачка — не просто «антирадянський письменник». Це складний європейський модерніст, який працював зі
    словом, звуком і ритмом, щоб передати екзистенційний досвід людини на межі.'
  section: 'Мова і поетика: Експресіонізм і несамовитість'
  words: 1500
- points:
  - 'Повернення до розминки: як проза Осьмачки відповідає на питання про роль мистецтва в часи терору? Чи може література
    бути формою спротиву?'
  - 'Рецепція творчості: від замовчування та паплюження в СРСР до статусу культового автора й одного з найважливіших «хронікерів
    терору» сьогодні.'
  - 'Актуальність для сучасної України: як досвід читання Осьмачки допомагає зрозуміти природу російського імперіалізму та
    його геноцидальні практики?'
  - '[!anti-hagiography] Критичний погляд на біографічний міф: чи варто відділяти складну, конфліктну особистість автора від
    його текстів для кращого їх розуміння?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз прози Тодося Осьмачки («План до двору») як хроніки радянського терору, дослідження його експресіоністської стилістики
  та ролі в деколонізації української літератури.
