objectives:
- Аналізувати прозу Тодося Осьмачки через призму експресіонізму та літератури свідчення
- Пояснювати, як автор використовує мовні та стилістичні засоби для створення атмосфери тоталітарного терору
- Формулювати аргументовану позицію в літературній дискусії щодо місця Осьмачки в каноні української літератури
- Критично оцінювати текст як деколоніальну відповідь на імперські наративи та злочини
