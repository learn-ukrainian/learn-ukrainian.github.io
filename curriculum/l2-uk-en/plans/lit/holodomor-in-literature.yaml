content_outline:
- points:
  - 'Провокація: Чи можна писати роман про геноцид? Де проходить межа між мистецтвом і спекуляцією на трагедії?'
  - Цитата з "Жовтого князя" Василя Барки без контексту, що зображує абсурдність і жах голоду.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Документальність vs. Художність. Чи має література про Голодомор бути перш за все точною (як свідчення), чи
    вона може використовувати алегорії, символи, вигадку (як мистецтво)?'
  - 'Дебат 2: Канонізація травми. Чому саме "Жовтий князь" і "Марія" стали канонічними текстами? Які інші твори залишились
    на маргінесі і чому?'
  - '[!epistemic-humility] Не існує єдиного "правильного" способу писати про Голодомор. Кожен текст — це лише одна спроба
    наблизитись до невимовного.'
  section: 'Конфліктна карта: Література — свідок чи митець?'
  words: 900
- points:
  - 'Розбір ключових уривків: сцена з "рятівним" житом, образ жовтого князя, внутрішні монологи Катранників.'
  - 'Наративна структура: як модерністська поетика (потік свідомості, фрагментарність) передає розпад світу та людської психіки.'
  - 'Система персонажів як алегорія України: Мирон Катранник (народна мудрість), Дарія (збереження роду), Андрій (інтелігенція).'
  - '[!decolonization] Твір як акт опору радянській політиці замовчування та брехні. Барка повертає українцям відібрану пам''ять
    і голос.'
  section: 'Читання: "Жовтий князь" Василя Барки'
  words: 1700
- points:
  - 'Стилістичний фокус: Як автори знаходять мову для "невимовного"? Аналіз евфемізмів, метафор голоду, біблійних алюзій.'
  - 'Символізм і міфопоетика: "Жовтий князь" як апокаліптичний образ зла, "Марія" Самчука як архетип матері-землі.'
  - Контраст між офіційною радянською мовою ("розкуркулення", "хлібозаготівлі") та мовою жертв, що фіксує екзистенційну правду.
  - '[!myth-buster] Це не просто "реалізм". Література про Голодомор використовує складні модерністські та символістські техніки,
    щоб передати глибину трагедії.'
  section: 'Мова і поетика: Мова на межі зникнення'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є "Жовтий князь" мистецтвом чи спекуляцією? Аргументація на основі аналізу.'
  - 'Рецепція: як ці твори сприймалися в діаспорі, як вони повернулися в Україну, і як їх читають сьогодні у світі.'
  - 'Сучасна релевантність: Як література про Голодомор допомагає зрозуміти сучасну російську агресію та геноцидальну риторику?'
  - '[!anti-hagiography] Аналіз ідеологічної рецепції: як радянська критика намагалася дискредитувати ці твори, і як вони
    використовуються в сучасних політичних дискусіях.'
  section: Дискусія та підсумок
  words: 700
focus: Література про Голодомор як свідчення та мистецтво, мова травми, деколонізація пам'яті, ключові тексти (Барка, Самчук),
  етичні дебати навколо репрезентації геноциду
level: LIT
module: lit-161
objectives:
- Критично оцінювати роль літератури у формуванні та збереженні пам'яті про Голодомор як акт культурного опору та деколонізації
- Аналізувати, як автори використовують мову та стилістичні прийоми (символізм, алегорію, міфопоетику) для зображення травматичного
  досвіду
- Формулювати аргументовану позицію в дебаті про співвідношення документального свідчення та художньої вигадки в літературі
  про геноцид
- Розпізнавати та інтерпретувати ключові тексти про Голодомор ("Жовтий князь", "Марія") у їхньому історичному та літературному
  контексті
