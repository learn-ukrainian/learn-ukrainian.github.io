content_outline:
- points:
  - 'Провокація: Чи може літературний критик бути важливішим за письменника? Питання, на яке Микола Зеров відповів власним
    життям.'
  - 'Цитата: "Ми хочемо такої європейської платформи, з якої було б видно і Азію". Як ця теза Зерова підривала ідеологію "трьох
    братніх народів"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Неокласики (Зеров) vs. ВАПЛІТЕ (Хвильовий). Чи має мистецтво служити ідеології та ''соціальному замовленню'',
    чи його цінність — у формальній досконалості та вічних темах?'
  - 'Дебат 2: Формування канону. Зеров пропонував орієнтуватися на античну та західноєвропейську класику. Опоненти звинувачували
    його в елітаризмі та відриві від народу.'
  - '[!epistemic-humility] Це не була суто академічна суперечка. В умовах 1920-х вибір між Вергілієм та "трактором в полі"
    був вибором політичним, який коштував життя.'
  section: 'Конфліктна карта: ''Чисте мистецтво'' чи ''червона графоманія''?'
  words: 900
- points:
  - Уривок з есе Зерова, де він аналізує сонети Рильського. Close reading критичного тексту як першоджерела.
  - Як Зеров використовує аналіз форми (строфіка, рима, ритм) для доказу своїх ідей про "добру" і "погану" літературу.
  - 'Система аргументації Зерова: точність формулювань, опора на ерудицію, створення інтелектуальної ієрархії.'
  - '[!decolonization] Наполягаючи на зв''язку з європейською традицією (Парнас, сонет), Зеров виривав українську літературу
    з-під російського культурного протекторату і стверджував її самодостатність та європейськість.'
  section: 'Читання: Аналіз сонетів Максима Рильського'
  words: 1700
- points:
  - 'Стиль Зерова-критика: наукова точність, кришталева ясність синтаксису, висока, "аристократична" лексика.'
  - 'Мова як зброя: як Зеров протиставляв свою ерудовану, вишукану мову ідеологічним штампам та "пролетарській" простоті своїх
    опонентів.'
  - 'Інтертекстуальність як основа методу: постійні посилання на Гомера, Данте, Шекспіра, що створювали щільне культурне поле
    і вимагали від читача відповідного рівня.'
  - '[!myth-buster] Міф про "нудну" академічну мову. У Зерова точність і ясність мови були формою етичного та естетичного
    спротиву хаосу та ідеологічній брехні.'
  section: 'Мова і поетика: Аристократизм мови як спротив'
  words: 1500
- points:
  - 'Повернення до провокації: чи потрібне Україні "чисте мистецтво" під час війни? Аргументи Зерова та їх актуальність сьогодні.'
  - 'Рецепція та спадщина: заборона, замовчування, розстріл. Як і чому радянська влада так боялася літературного критика?'
  - '[!anti-hagiography] Елітаризм неокласиків. Чи не була їхня позиція відірваною від реалій українського суспільства 1920-х?
    Критичний погляд на їхню програму.'
  - 'Вплив на наступні покоління: Юрій Шерех (Шевельов) та сучасна українська гуманітаристика як продовжувачі справи Зерова.'
  section: Дискусія та підсумок
  words: 700
focus: Микола Зеров, київські неокласики, літературна дискусія 1925-28, 'чисте мистецтво', деколонізація канону, Розстріляне
  відродження
level: LIT
module: lit-090
objectives:
- Формулювати та захищати позицію в рамках літературної дискусії 1925–1928 років (неокласики vs. ВАПЛІТЕ)
- Аналізувати критичний текст як літературний артефакт, звертаючи увагу на мову, стиль та точність аргументації автора
- Застосовувати методологію Зерова для "близького читання" (close reading) поетичного твору, виявляючи єдність форми та змісту
- Критично оцінювати роль критики у формуванні національного літературного канону та її деколонізаційний потенціал
