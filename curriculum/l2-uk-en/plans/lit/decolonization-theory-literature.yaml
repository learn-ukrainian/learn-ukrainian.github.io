content_outline:
- points:
  - 'Провокація: Чи може текст, написаний століття тому, бути зброєю в сучасній інформаційній війні? Розглядаємо твір як поле
    бою за ідентичність.'
  - 'Цитата без атрибуції: Фрагмент, що ілюструє опір асиміляції, поданий без контексту — чия це мова, проти кого вона спрямована?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є цей твір "вічною класикою", чи його актуальність — результат сучасної деколоніальної переоцінки? Боротьба
    за місце в каноні.'
  - 'Дебат 2: Інтерпретація — універсалістська (архетипи, міфи) vs політична (агентність, опір). Чи збіднюємо ми текст, читаючи
    його лише через призму політики?'
  - '[!epistemic-humility] Літературна критика не має "правильних" відповідей, лише краще аргументовані позиції. Розглядаємо
    формалістичну, постколоніальну та феміністичну оптики.'
  section: 'Конфліктна карта: Канон vs Контр-канон'
  words: 900
- points:
  - 'Розширений уривок: Аналіз ключового фрагменту, де конфлікт героя з імперською системою досягає апогею.'
  - 'Наративна структура: Як сюжет (чи його відсутність) підриває імперські наративи про "братні народи" та "спільну історію".'
  - 'Система персонажів: Український герой як суб''єкт, а не об''єкт історії. Аналіз еволюції персонажа від пасивної жертви
    до активного борця.'
  - '[!decolonization] Твір розглядається в контексті української літературної традиції опору, а не як периферійний додаток
    до "великої російської літератури".'
  section: 'Читання: Текст як поле бою'
  words: 1700
- points:
  - 'Стилістичні інновації: Як автор використовує мову — неологізми, синтаксичні зсуви, складні метафори — для створення унікального
    українського світу, несхожого на імперський.'
  - 'Робота з мовою: Свідоме використання діалектизмів, архаїзмів та народної лексики як акт культурного самоствердження.'
  - 'Ритм і звук: Аналіз звукопису та ритміки тексту як інструментів, що створюють емоційний вплив і передають сенс поза прямим
    значенням слів.'
  - '[!myth-buster] Руйнуємо міф про "вторинність" української літератури, доводячи, що її стилістичні експерименти були на
    рівні світових модерністських практик.'
  section: 'Мова і поетика: Мова як опір'
  words: 1500
- points:
  - 'Повернення до провокації: Як саме цей текст функціонує як "зброя" сьогодні? Студенти формулюють відповідь на основі аналізу.'
  - 'Рецепція та вплив: Як твір сприймався в момент написання і як його читають зараз? Вплив на наступні покоління письменників.'
  - '[!anti-hagiography] Критичний погляд: Чи не створює сам текст нові міфи, борючись зі старими? Де межі деколоніальної
    інтерпретації?'
  - 'Питання для рефлексії: Які інструменти для критичного читання новин та пропаганди дає аналіз цього твору?'
  section: Дискусія та підсумок
  words: 700
focus: Decolonization theory in Ukrainian literature, postcolonial interpretation, literary canon critique, stylistic innovation
  as resistance
level: LIT
module: lit-186
objectives:
- Аналізувати літературний твір у його історичному та культурному контексті, застосовуючи деколоніальну оптику.
- Визначати та інтерпретувати ключові стилістичні прийоми автора як форму культурного опору.
- Формулювати аргументовану позицію щодо місця твору в українському літературному каноні та його ролі в руйнуванні імперських
  міфів.
- Застосовувати навички close reading (уважного читання) для аналізу складних поетичних та прозових текстів.
