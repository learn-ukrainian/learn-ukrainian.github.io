content_outline:
- points:
  - 'Провокація: Чи може ціла літературна епоха бути єдиним текстом? Який "сюжет" вона розповідає?'
  - 'Ключове питання: Як пізніші автори ведуть діалог з попередниками, і чи завжди це діалог-згода?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що було первинним для авторів цієї епохи — деконструкція імперського наративу чи конструювання образу нового
    українського суб''єкта?'
  - 'Дебат 2: Чи є "сталева нитка" опору системним процесом, чи це радше сукупність індивідуальних стратегій, які ми ретроспективно
    об''єднуємо?'
  - '[!epistemic-humility] Погляд на літературу як на простір формування національної етики: чи це функція, яку їй приписують
    критики, чи свідомий авторський задум?'
  section: 'Конфліктна карта: Опір чи становлення?'
  words: 900
- points:
  - Аналіз еволюції ключових ідей та архетипів (свобода, дім, зрада, герой) у текстах авторів, що належать до різних "хвиль"
    епохи.
  - 'Приклад 1: Як автор А (ранній період) використовує архетип "землі", і як його переосмислює автор Б (пізній період) у
    контексті нових історичних викликів.'
  - 'Приклад 2: Простеження діалогу між двома творами-антиподами епохи, що дають кардинально різні відповіді на те саме філософське
    питання.'
  - '[!decolonization] Виявлення та аналіз "замовчуваних" зв''язків — як автори обходили цензуру, щоб посилатися на заборонених
    попередників, створюючи тяглість традиції всупереч заборонам.'
  section: 'Читання: Діалог через покоління'
  words: 1700
- points:
  - 'Порівняльний аналіз авторських технік: як різні письменники епохи використовували мовні експерименти для вираження схожих
    ідей (напр., через неологізми, діалектизми, синтаксичні злами).'
  - 'Кейс-стаді: Трансформація літературної мови від початку до кінця періоду. Аналіз уривків, що демонструють цю еволюцію
    — від "академічної" норми до "живої", експериментальної мови.'
  - 'Інтертекстуальність як домінуюча техніка: як автори використовували приховані цитати, алюзії та пародію для створення
    "другого дна" у своїх текстах.'
  - '[!myth-buster] Спростування міфу про "монолітність" стилю епохи. Демонстрація ідейного та естетичного антагонізму між
    ключовими постатями.'
  section: 'Мова і поетика: Стилістичний калейдоскоп'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, який "сюжет" розповідає ця епоха? Формулювання студентами власної версії "мета-наративу"
    на основі аналізу.'
  - 'Вплив періоду на сучасний літературний процес: які ідеї, техніки та конфлікти, народжені в цю епоху, залишаються актуальними
    сьогодні?'
  - '[!anti-hagiography] Критичний погляд на канон: чи всі автори, що складають "горизонт епохи", витримали перевірку часом?
    Чи є постаті, чий внесок був переоцінений або недооцінений?'
  - 'Значення канону для інтелектуальної безпеки нації: підсумкова дискусія про те, як цілісне розуміння літературної традиції
    посилює культурний суверенітет.'
  section: Дискусія та підсумок
  words: 700
focus: Синтез літературного процесу епохи 3, зосереджуючись на діахронному аналізі, деколонізаційній оптиці та стилістичній
  еволюції як формі інтелектуального опору.
