objectives:
- Синтезувати знання про літературний процес вивченого періоду, виявляючи ключові тенденції та конфлікти.
- Застосовувати деколонізаційну оптику для аналізу діахронних зв'язків між авторами та текстами.
- Аналізувати еволюцію літературної мови та стилістичних технік як форму інтелектуального опору.
- Оцінювати тяглість та трансформацію української інтелектуальної традиції та її значення для сьогодення.
