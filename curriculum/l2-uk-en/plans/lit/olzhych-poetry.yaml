content_outline:
- points:
  - 'Провокація: "Держава не твориться в будучині, держава будується нині". Як археолог, що вивчає минуле, став поетом, одержимим
    майбутнім? Чи може поезія бути зброєю?'
  - 'Фрагмент вірша без контексту: "Захочеш — і будеш. В людині, затям, / Лежить невідгадана сила."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є поезія Ольжича лише інструментом ідеологічної боротьби ОУН? Позиція "літературознавців у цивільному" vs
    позиція "чистого мистецтва".'
  - 'Дебат 2: Канонізація Ольжича. Його місце в пантеоні "Празької школи" — він затьмарює чи доповнює Телігу, Маланюка, Лятуринську?'
  - '[!epistemic-humility] Немає єдиної відповіді. Одні критики бачать у ньому лише "преторіанця", інші — тонкого лірика,
    що змушений був одягти залізну маску.'
  section: 'Конфліктна карта: Поет чи воїн?'
  words: 900
- points:
  - 'Розширений аналіз ключових віршів: "Господь багатий нас створив", "Археологія", "Галли".'
  - 'Наративна структура: рух від археологічної статики до динаміки національної боротьби.'
  - 'Характер ліричного героя: стоїк, воїн, будівничий імперії духу. Його еволюція від збірки до збірки.'
  - '[!decolonization] Поезія Ольжича як акт культурного суверенітету. Він не реагує на російський дискурс, а створює самодостатній
    український світ, закорінений у європейську античність та власну історію.'
  section: 'Читання: Збірки "Рінь" та "Вежі"'
  words: 1700
- points:
  - 'Стилістичні інновації: "різьблена" строфа, лаконізм, відмова від орнаментальності.'
  - 'Лексика: поєднання архаїзмів та наукової термінології (археологія, біологія).'
  - 'Синтаксис: імперативні конструкції як основа вольової поетики. Короткі, енергійні речення.'
  - '[!myth-buster] Ольжич — не "простий" і "зрозумілий" поет. Його простота — це результат титанічної роботи зі згущення
    смислу, подібно до стискання карбону в діамант.'
  section: 'Мова і поетика: Скульптурний стиль'
  words: 1500
- points:
  - 'Повернення до розминки: Чи може поезія бути зброєю? Відповідь студента на основі аналізу.'
  - 'Історична рецепція: як сприймали Ольжича в діаспорі та в підрадянській Україні? Чому він був небезпечний для режиму?'
  - 'Сучасна релевантність: актуальність поезії вольового чину в контексті сучасної російсько-української війни.'
  - '[!anti-hagiography] Чи не є "преторіанська" модель поезії небезпечною, оскільки підпорядковує мистецтво ідеології? Обговорення
    можливих ризиків.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз неокласичної поезії Олега Ольжича в контексті українського націоналізму 1930-40-х років, його естетика "преторіанця"
  та роль у формуванні культурного опору.
level: LIT
module: lit-151
objectives:
- Аналізувати поезію Олега Ольжича як єдність естетичної форми та ідеологічного змісту.
- Розрізняти поняття "поет на службі ідеології" та "поет як носій національної ідеї".
- Застосовувати інструменти філологічного аналізу для "скульптурного" стилю неокласицизму.
- Формулювати власну аргументовану позицію щодо ролі митця в умовах національно-визвольної боротьби.
