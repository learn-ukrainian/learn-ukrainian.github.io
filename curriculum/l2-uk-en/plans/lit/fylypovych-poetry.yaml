level: LIT
module: lit-092
objectives:
- Аналізувати поетичний доробок Павла Филиповича в контексті київського неокласицизму та доби "Розстріляного відродження"
- Досліджувати стилістичні особливості, мову та поетику тексту, виявляти зв'язки з античною та європейською традицією
- Розуміти деколонізаційне значення творчості неокласиків як утвердження європейської ідентичності української культури
- Формулювати власну позицію в дискусії про роль митця та мистецтва у тоталітарному суспільстві
