content_outline:
- points:
  - 'Провокація: Чи може «мистецтво для мистецтва» бути формою політичного опору? Питання, яке ставить перед нами творчість
    і доля київських неокласиків.'
  - Фрагмент поезії Филиповича (без коментаря), що втілює ідеал класичної гармонії.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Неокласики — «внутрішні емігранти», що втекли від реальності у вежу зі слонової кістки, чи митці, що чинили
    спротив тоталітаризму через збереження культури?'
  - 'Дебат 2: Місце Филиповича в каноні — чи був він лише «одним із п''ятірного грона», чи його голос унікальний і незамінний?'
  - '[!epistemic-humility] Радянське літературознавство таврувало неокласиків як «буржуазних естетів». Сучасні дослідники
    (Шерех, Костюк) бачать в їхній позиції етичний вибір і форму культурного опору.'
  section: 'Конфліктна карта: Неокласик у добу терору'
  words: 900
- points:
  - Аналіз ключових поезій зі збірок «Земля і вітер» (1922) та «Простір» (1925).
  - 'Система образів і символів: земля, камінь, вітер, простір як елементи філософської лірики.'
  - '[!decolonization] Неокласики доводили, що українська література — повноцінна європейська література, що органічно засвоїла
    античну спадщину, а не провінційний придаток до «великої російської культури».'
  - 'Еволюція ліричного героя: від споглядання вічної краси світу до трагічного передчуття власної загибелі та катастрофи
    цілого покоління.'
  section: 'Читання: Поезія Павла Филиповича'
  words: 1700
- points:
  - 'Стилістичні інновації: як Филипович поєднує класичний сонет, терцини, октави з модерною, часто експресіоністською образністю.'
  - 'Робота з класичним спадком: інтертекстуальність, алюзії на античні та європейські міфи (Скорпіон, Прометей) як спосіб
    говорити про сучасність.'
  - '[!myth-buster] Филипович — не «сухий» академіст і не епігон. Його поезії притаманна глибока емоційність і філософська
    напруга, прихована за досконалою формою.'
  - 'Аналіз ритміки та синтаксису: як структура вірша (строфа, довжина рядка, інверсії) відтворює і посилює його зміст.'
  section: 'Мова і поетика: Класична форма і модерний зміст'
  words: 1500
- points:
  - 'Повернення до розминки: відповідь на питання про мистецтво як опір на прикладі творчості й долі Павла Филиповича.'
  - 'Рецепція творчості: як сприймали Филиповича сучасники (М. Зеров, Ю. Шерех) і як його читають сьогодні.'
  - '[!anti-hagiography] Загибель у Сандармосі 27 жовтня 1937 року — не просто трагічна дата. Це був свідомий акт геноциду,
    коли Росія цілеспрямовано знищила цвіт української інтелектуальної еліти.'
  - 'Вплив на наступні покоління: від поетів-дисидентів (Василь Стус) до сучасних авторів, що працюють з класичною формою.'
  section: Дискусія та підсумок
  words: 700
focus: Poetry of Pavlo Fylypovych, Kyiv Neoclassicists, "Executed Renaissance", conflict between art and totalitarianism,
