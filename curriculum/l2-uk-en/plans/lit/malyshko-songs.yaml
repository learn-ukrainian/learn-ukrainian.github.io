content_outline:
- points:
  - 'Провокаційне питання: Як автор «Пісні про рушник», неофіційного гімну синівської любові до України, міг одночасно бути
    лауреатом сталінських премій і писати вірші, що вихваляли комунізм?'
  - 'Уривок з пісні без автора: "Рідна мати моя, ти ночей не доспала..." — що робить ці рядки миттєво впізнаваними для кожного
    українця?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Малишко — щирий радянський патріот чи "внутрішній емігрант", що ховав справжні почуття за фольклорною стилізацією?
    Аналіз його офіційних та "приватних" текстів.'
  - 'Дебат 2: Місце в каноні. Чи є Малишко "радянським поетом", якого слід переосмислити, чи його пісенна спадщина (покладена
    на музику Майбородою) виправдовує і вивищує його над ідеологією?'
  - '[!epistemic-humility] Критики діаспори (Шерех) бачили в ньому опортуніста. Сучасні дослідники в Україні наголошують на
    стратегії "культурного партизанства" — збереження національного коду під ідеологічним тиском.'
  section: 'Конфліктна карта: Народний поет vs радянський класик'
  words: 900
- points:
  - Повний текст "Пісні про рушник" з детальним close-reading.
  - 'Символіка: рушник як дорога життя, символ долі та зв''язку з родом. Материнський образ як уособлення Батьківщини.'
  - 'Аналіз сюжету: ліричний герой у "далекій дорозі" — універсальна метафора української долі, сповненної випробувань та
    розлук.'
  - '[!decolonization] Як ця пісня, написана в розпал "інтернаціоналізму", стала потужним маркером національної ідентичності,
    фактично руйнуючи імперський міф про "злиття націй"?'
  section: 'Читання: "Пісня про рушник" як національний код'
  words: 1700
- points:
  - 'Стилістичний аналіз: як Малишко досягає абсолютної "пісенності" тексту ще до втручання композитора? Роль асонансів, алітерацій,
    внутрішніх рим.'
  - 'Робота з народною мовою: використання фольклорних епітетів ("зелен-садочок"), синтаксичних паралелізмів та образів (калина,
    ясен), що сягають глибин народної пісні.'
  - '[!myth-buster] Малишко — не просто "стилізатор". Він модернізував фольклорний інструментарій, надаючи йому філософської
    глибини та індивідуального ліричного звучання, що відрізняє його від простого наслідування.'
  - 'Синтаксис як мелодія: аналіз речень, що будуються за принципом музичної фрази, з повторами та варіаціями.'
  section: 'Мова і поетика: Мелодика і фольклоризм'
  words: 1500
- points:
  - 'Повернення до розминки: тож ким був Малишко? Студент має сформулювати власну позицію, використовуючи аргументи з модуля.'
  - 'Рецепція: як змінювалося сприйняття Малишка від офіційного радянського класика до символу "повернення до джерел" у 60-ті,
    і до сьогоднішнього, більш складного погляду.'
  - '[!anti-hagiography] Обговорення його компромісів та творів, написаних на замовлення режиму. Чи можна відокремити "хорошого"
    Малишка-лірика від "поганого" Малишка-пропагандиста?'
  - 'Сучасна релевантність: чому "Пісня про рушник" звучить на весіллях і проводах на фронт у 2020-х? Що цей текст говорить
    про незмінність української ментальної матриці?'
  section: Дискусія та підсумок
  words: 700
focus: 'The duality of Andriy Malyshko: analyzing his iconic songs (e.g., "Пісня про рушник") as acts of cultural resistance
  versus his conformist works within the Soviet canon.'
level: LIT
module: lit-148
objectives:
- Аналізувати пісенну творчість Андрія Малишка в контексті радянської доби та українського культурного опору
- Визначати ключові риси поетики Малишка, зокрема фольклоризм, мелодику та символізм
- Критично оцінювати подвійність статусу Малишка як офіційного радянського поета та носія національної ліричної традиції
- Формулювати аргументовану позицію щодо компромісів митця в умовах тоталітарного режиму
pedagogy: CBI
persona:
  role: Літературний критик, що намагається зрозуміти трагедію і велич українського митця в умовах тоталітаризму, не вдаючись
    ні до звинувачень, ні до агіографії.
  voice: Critical-Empathetic
phase: LIT.4 Resistance 1933-1991
