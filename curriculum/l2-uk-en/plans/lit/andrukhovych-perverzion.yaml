content_outline:
- points:
  - 'Провокація: «Вмерти у Венеції» — це мета чи діагноз для українського інтелектуала 90-х? Цитата з роману про фатальну
    приреченість митця.'
  - 'Загадка: що спільного між Орфеєм, венеційським карнавалом і таємним семінаром про кінець світу? Вступ до центральної
    метафори роману.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Перверзія» — це інтелектуальна гра і «чисте мистецтво» (формалістичний підхід) чи це крик про допомогу покоління,
    що втратило орієнтири після розпаду СРСР (біографічно-соціологічний підхід)?'
  - 'Дебат 2: Чи є «Перверзія» канонічним текстом сучасної літератури, чи це «нішовий» артефакт для філологів? Питання про
    місце постмодернізму в українському каноні.'
  - '[!epistemic-humility] Літературна критика 90-х була розколота: одні бачили в романі прорив до європейського контексту,
    інші — зраду національних ідеалів і «безвідповідальну» гру.'
  section: 'Конфліктна карта: Постмодернізм як втеча чи пошук?'
  words: 900
- points:
  - 'Розбір ключових уривків: Сповідь Стаха Перфецького — потік свідомості, що поєднує високе і низьке, сакральне і профанне.'
  - 'Система персонажів: Стах як сучасний Орфей. Ада, Джина, Марічка — три іпостасі жіночності чи три пастки для митця?'
  - 'Конфлікт: не зовнішній, а внутрішній. Боротьба Перфецького з власними демонами, травмами та неможливістю знайти себе
    у новому світі.'
  - '[!decolonization] Деконструкція образу «єдиної та неподільної» імперії через карнавал. Венеція як простір свободи, де
    український митець може нарешті говорити від свого імені, а не від імені колонії.'
  section: 'Читання: Орфей у лабіринтах Венеції'
  words: 1700
- points:
  - 'Стилістичні інновації: колаж, центон, потік свідомості. Як Андрухович поєднує есеїстику, поезію, драму та філософський
    трактат в одному тексті.'
  - 'Мовна гра: використання арго, діалектизмів, макаронічної мови (суміші мов) для створення ефекту «вавилонського стовпотворіння»
    пост-радянської доби.'
  - 'Синтаксис як засіб: довгі, розгалужені речення, що імітують блукання свідомості героя лабіринтами Венеції та власної
    пам''яті.'
  - '[!myth-buster] Це не просто «складна проза». Кожен стилістичний прийом має свою функцію: показати розпад старих ієрархій,
    хаос і водночас творчу енергію нової епохи.'
  section: 'Мова і поетика: Лексична гра та синтаксична свобода'
  words: 1500
- points:
  - 'Повернення до розминки: тож, чим є смерть Стаха Перфецького у Венеції? Трагедією, логічним завершенням, чи актом вищої
    свободи — розчиненням у мистецтві?'
  - 'Рецепція твору: як «Перверзію» читали в 90-х і як читають зараз? Чи змінився фокус з «гри» на «травму»?'
  - 'Вплив на українську літературу: «Перверзія» як точка відліку для багатьох авторів, що працюють у жанрі еротичної, інтелектуальної,
    та експериментальної прози.'
  - '[!anti-hagiography] Проблематизація постаті автора. Чи не є сам Андрухович, подібно до свого героя, «вічним перформером»,
    що ховається за масками?'
  section: Дискусія та підсумок
  words: 700
focus: 'Роман Юрія Андруховича «Перверзія» як маніфест українського постмодернізму: карнавальна стихія, інтертекстуальність,
  криза ідентичності та деконструкція імперських міфів.'
level: LIT
module: lit-175
objectives:
- Аналізувати роман «Перверзія» як ключовий текст українського постмодернізму.
- Розрізняти та інтерпретувати стилістичні прийоми постмодерної прози (колаж, інтертекст, мовна гра).
- Формулювати аргументовану позицію в рамках літературних дебатів щодо місця твору в каноні.
- Пояснювати, як експериментальна література може бути інструментом деколонізації культурного простору.
