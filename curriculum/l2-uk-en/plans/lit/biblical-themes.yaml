content_outline:
- points:
  - 'Провокація: "Антиклерикал" чи "національний пророк"? Чому Тарас Шевченко, найбільший критик церковного фарисейства, так
    часто звертається до Біблії?'
  - Цитата з "Марії" без контексту — образ жінки, що "мов кусок од серця одриває" свою дитину. Чия це історія — біблійна чи
    українська?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Релігійність vs Політика. Чи є переспіви псалмів актом віри, чи закамуфльованим політичним протестом проти імперії,
    що використовує ту саму релігію для свого узаконення?'
  - 'Дебат 2: Канон vs Авторська воля. Наскільки вільно Шевченко поводиться з біблійним текстом? Де межа між переспівом, перекладом
    та створенням принципово нового, національного наративу?'
  - '[!epistemic-humility] Радянське шевченкознавство бачило в ньому лише атеїста та революціонера. ДІаспорне — лише ікону
    націоналізму. Правда, як завжди, складніша.'
  section: 'Конфліктна карта: Святе Письмо як зброя'
  words: 900
- points:
  - 'Аналіз ключових фрагментів поеми "Марія": гуманізація Богородиці, паралелі з долею української жінки-кріпачки.'
  - 'Розбір обраних переспівів "Давидових псалмів": як цар Давид стає алегорією гнобленого українського народу, а вавилонський
    полон — російської окупації.'
  - 'Порівняння з синодальним (російським) перекладом Біблії: які акценти змінює Шевченко, щоб надати текстам українського
    звучання та політичної гостроти.'
  - '[!decolonization] Шевченко "націоналізує" Біблію, вириваючи її з рук імперської церкви і перетворюючи на фундамент української
    духовної ідентичності, незалежної від Москви.'
  section: 'Читання: "Марія" та "Давидові псалми"'
  words: 1700
- points:
  - 'Роль церковнослов''янізмів ("благодать", "єси", "ректи"): як високий, "священний" стиль використовується для підкреслення
    важливості теми.'
  - 'Поєднання архаїчної лексики з живою народною мовою: створення унікального поетичного словника, зрозумілого і селянину,
    і інтелектуалу.'
  - 'Синтаксис високого стилю: інверсії, риторичні питання та звертання як інструмент створення пророчого, повчального тону.'
  - '[!myth-buster] Шевченко — не просто "поет з народу". Це високоосвічений митець, що свідомо синтезує різні стилістичні
    пласти — від фольклору до барокової книжності — для досягнення максимального художнього ефекту.'
  section: 'Мова і поетика: Синтез книжної та народної мови'
  words: 1500
- points:
  - 'Повернення до розминки: тож ким є Шевченко у своїх біблійних творах — віруючим, критиком, чи політиком?'
  - 'Концепція "Святої Правди" в етиці Шевченка: що це за правда, яка вища за церковний і державний закон?'
  - '[!anti-hagiography] Побачити в Шевченкові не бронзового ідола, а живого митця, що використовує всі доступні йому засоби
    — включно з релігією — для боротьби за свій народ.'
  - 'Рефлексія: Як читання біблійних текстів Шевченка змінює наше розуміння і самої Біблії, і ролі поета в українській культурі?'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз біблійних мотивів у творчості Шевченка: переспіви псалмів як політичний маніфест, гуманізація божественного
  в поемі "Марія", синтез церковнослов''янської та народної мови.'
