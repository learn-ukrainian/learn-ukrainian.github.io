objectives:
- Розуміти роль біблійних тем і образів у пізній творчості Шевченка
- Аналізувати процес гуманізації та націоналізації сакральних фігур у поемі "Марія"
- Визначати політичний підтекст і критику імперії в "Давидових псалмах"
- Розпізнавати та інтерпретувати стилістичну функцію церковнослов'янізмів у поетичному тексті
