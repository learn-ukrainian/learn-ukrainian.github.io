title: 'Біблійні теми: Давидові псалми і "Марія"'
subtitle: 'Biblical Themes: Psalms of David and "Maria"'
focus: literature
pedagogy: Seminar
phase: LIT.3 The Prophet (Taras Shevchenko)
word_target: 5000
objectives:
- Understand the role of Biblical themes in Shevchenko's later poetry
- Analyze the 'humanization' of divine figures in 'Maria'
- Identify political subtext in 'Psalms of David'
- Recognize and interpret Church Slavonicisms in modern Ukrainian text
