content_outline:
- points:
  - 'Провокація: Василь Стус — останній великий поет-неокласик чи перший екзистенціаліст в українській літературі? Чи це хибна
    дихотомія?'
  - 'Цитата-загадка: "Народе мій, до тебе я ще верну, і в смерті обернуся до життя". Пророцтво, політична декларація чи лірична
    формула?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Стус — поет «чистого мистецтва», для якого естетика була формою опору, чи поет-трибун, що свідомо підпорядкував
    творчість політичній боротьбі?'
  - 'Дебат 2: Канонізація Стуса як національного героя. Чи не затінює постать мученика-дисидента власне поета, зводячи складну
    поетику до гасел?'
  - '[!epistemic-humility] Розгляд позицій літературознавців: Дзюба (Стус як моральний абсолют) vs Коцюбинська (аналіз поетики)
    vs сучасні ревізії (Стус у світовому контексті).'
  section: 'Конфліктна карта: Поет vs Мученик'
  words: 900
- points:
  - Аналіз ключових віршів зі збірки "Палімпсести". Чому саме цей образ — рукопис, написаний поверх стертого тексту — став
    визначальним?
  - 'Система образів: "свіча", "камінь", "дорога", "Бог". Як Стус переосмислює традиційні архетипи в умовах ув''язнення?'
  - 'Наративна стратегія: відмова від прямого висловлювання на користь метафори, алегорії. "Езопова мова" як єдиний спосіб
    говорити правду.'
  - '[!decolonization] "Повернути нації імена": Стус як реставратор української культури. Його діалог із поетами Розстріляного
    відродження (Семенко, Плужник) та світовою класикою (Рільке, Гете).'
  section: 'Читання: "Палімпсести" як ключ до поетики'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання неокласичної форми з екзистенціальним наповненням. Стус як модернізатор українського
    вірша.'
  - 'Робота з мовою: архаїзми, неологізми ("світоспоглядання"), діалектизми. Мова як єдина "неконфіскована" батьківщина поета.'
  - 'Синтаксис як екзистенційний вибір: ускладнені, розірвані конструкції, що віддзеркалюють стан "межової ситуації" ліричного
    героя.'
  - '[!myth-buster] Спростування міфу про Стуса як виключно "похмурого" поета. Аналіз іронії, сарказму та світлих, віталістичних
    мотивів у його творчості.'
  section: 'Мова і поетика: "Сто років, як сконала мова"'
  words: 1500
- points:
  - 'Повернення до розминки: тож як співіснують поет і громадянин у творчості Стуса? Формулювання студентом власної позиції.'
  - 'Рецепція творчості: як змінювалося сприйняття Стуса від радянського "особливо небезпечного рецидивіста" до національного
    символу.'
  - '[!anti-hagiography] Чи можлива критика Стуса? Обговорення "незручних" аспектів його біографії та поглядів. Як уникнути
    перетворення живої людини на бронзовий монумент?'
  - 'Стус і сьогодення: чому його поезія знову стала актуальною після 2014 та 2022 років? Які сенси ми знаходимо в ній сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Василь Стус, поетика опору, палімпсести, екзистенційний вибір, деколонізація через мову
