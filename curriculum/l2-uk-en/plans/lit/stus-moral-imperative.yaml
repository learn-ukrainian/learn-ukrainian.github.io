objectives:
- Критично аналізувати поезію Василя Стуса в контексті радянського тоталітаризму та руху опору
- Ідентифікувати та інтерпретувати ключові елементи поетики Стуса: палімпсести, екзистенційні мотиви, мова як "сродна праця"
- Розрізняти біографічний, агіографічний та літературно-критичний підходи до аналізу творчості Стуса
- Формулювати аргументовану позицію щодо місця Стуса в українському та світовому літературному каноні
