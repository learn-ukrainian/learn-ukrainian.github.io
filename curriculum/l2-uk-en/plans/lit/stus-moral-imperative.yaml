activity_hints:
- description: Визначити, якій критичній позиції (Дзюба, Коцюбинська, сучасна ревізія) належить теза про творчість Стуса.
  focus: 'Конфліктна карта: Поет vs Мученик'
  items: 4
  type: quiz
- description: 'Вставити в речення з аналізом поезії ключові терміни: палімпсест, архаїзм, неологізм, екзистенційний.'
  focus: Мова і поетика Стуса
  items: 4
  type: fill-in
- description: Проаналізуйте вірш, визначивши його ключові образи, стилістичні особливості та зв'язок з біографією поета.
    Який вибір робить ліричний герой?
  focus: 'Аналіз поезії: "Крізь сотні сумнівів я йду до тебе"'
  type: note
- description: Уявіть, що вам треба пояснити 16-річному підлітку, чому Стус — це "круто" і актуально. Напишіть коротке есе
    (400-600 слів), уникаючи шароварщини та банальних фраз про "борця за Україну".
  focus: 'Есе: "Стус для зумерів"'
  type: note
cefr_min: C1
