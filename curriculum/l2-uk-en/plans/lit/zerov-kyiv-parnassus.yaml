objectives:
- Аналізувати поезію Миколи Зерова в контексті літературних дискусій 1920-х років
- Розрізняти позиції неокласиків та пролетарських письменників щодо ролі мистецтва та формування канону
- Виконувати детальний філологічний аналіз сонета, звертаючи увагу на мову, стиль та метрику
- Формулювати власну позицію щодо актуальності інтелектуальної спадщини Зерова для сучасної України
