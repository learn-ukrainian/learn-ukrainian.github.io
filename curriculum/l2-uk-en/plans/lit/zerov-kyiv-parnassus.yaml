content_outline:
- points:
  - 'Провокація: Чи може сонет бути зброєю? Питання до Миколи Зерова, який в розпал революційних зламів обрав "суху" та "академічну"
    форму як поле битви за українську культуру.'
  - 'Цитата: "І парнаських вершин похмурі стіни / Уперше звуки наших лір почули" — без контексту, як маніфест.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Естетика проти ідеології. Позиція неокласиків (Зеров, Рильський) про "чисте мистецтво" та орієнтацію на європейські
    зразки vs позиція пролетарських письменників (Хвильовий, Сосюра) про мистецтво як інструмент класової боротьби.'
  - 'Дебат 2: "Афіни чи Москва?" Дискусія про канон. Зеров прагнув створити український канон, вписаний у тисячолітню європейську
    традицію (від Гомера до Ронсара). Опоненти бачили в цьому відрив від "життя народу" та "здорових" пролетарських впливів.'
  - '[!epistemic-humility] Неокласицизм не був монолітним рухом. Внутрішні суперечки та еволюція поглядів самого Зерова.'
  section: 'Конфліктна карта: Класики проти пролетарів'
  words: 900
- points:
  - 'Close reading: Аналіз сонета "Класична пластика, і контур строгий..." як маніфесту неокласицизму. Розбір образів, алюзій,
    архітектоніки.'
  - 'Система персонажів: як у циклі представлені інші постаті української літератури (Куліш, Шевченко) — створення пантеону.'
  - '[!decolonization] Проект Зерова — це акт культурного суверенітету. Ствердження, що українська література є достатньо
    зрілою, щоб мати свою "класику", рівну європейським, і не потребує легітимації через російську культуру.'
  - 'Нарративна структура циклу: від античних образів до болючих питань сучасності. Шлях від "веж із слонової кістки" до трагічного
    передчуття.'
  section: 'Читання: Сонети з циклу «Київський Парнас»'
  words: 1700
- points:
  - 'Стилістичні інновації: робота Зерова з "високим" стилем, архаїзмами, міфологічними алюзіями. Створення академічної, інтелектуальної
    мови поезії.'
  - 'Метрика та синтаксис: аналіз ритміки, канонічної сонетної форми. Як синтаксична структура речення (інверсії, переноси)
    створює відчуття напруги та гармонії.'
  - 'Інтертекстуальність: "Київський Парнас" як діалог зі світовою літературою. Як Зеров "перекладає" античні та ренесансні
    образи українською мовою.'
  - '[!myth-buster] Неокласицизм — це не "холодне" копіювання старих форм. Це спроба знайти в хаосі революції вічні, універсальні
    опори для культури.'
  section: 'Мова і поетика: Неокласична довершеність сонету'
  words: 1500
- points:
  - 'Повернення до розминки: тож чи був сонет Зерова зброєю? Аргументація на основі аналізу.'
  - '[!anti-hagiography] Рецепція: як сучасники сприймали неокласиків? Звинувачення в елітаризмі, відірваності від реальності,
    "буржуазності".'
  - 'Трагічна доля "Парнасу": як радянська влада фізично знищила носіїв "високої культури", довівши, що їхня "елітарна" поезія
    була насправді небезпечною для тоталітарного режиму.'
  - 'Сучасне значення: Чому сьогодні, в епоху війни та популізму, ідеї Зерова про канон, якість та інтелектуальну чесність
    знову актуальні?'
  section: Дискусія та підсумок
  words: 700
