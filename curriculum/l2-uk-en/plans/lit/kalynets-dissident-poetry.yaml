content_outline:
- section: Вступ
  words: 1000
  points:
  - Introduction to Ihor Kalynets and the Shistdesiatnyky generation.
  - The role of dissident poetry in preserving national identity.
- section: Аналіз твору
  words: 1500
  points:
  - Analysis of his metaphorical resistance and key collections.
  - Themes of exile, nature, and deep historical memory.
- section: Поетика та стиль
  words: 1500
  points:
  - Sophisticated use of metaphor and allegory to bypass Soviet censorship.
  - Modernist structures and neo-baroque elements.
- section: Деколонізаційний вимір
  words: 1000
  points:
  - Confronting the Soviet silencing of the Ukrainian intelligentsia.
  - Kalynets as a voice of uncompromising decolonial truth.
