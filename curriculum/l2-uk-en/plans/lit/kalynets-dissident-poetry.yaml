objectives:
- Аналізувати поезію Ігоря Калинця в контексті дисидентського руху та радянських репресій.
- Інтерпретувати складну метафорику та необарокові елементи у творах Калинця.
- Розрізняти естетичний та політичний виміри поезії спротиву.
- Формулювати власну позицію щодо ролі митця в тоталітарному суспільстві.
