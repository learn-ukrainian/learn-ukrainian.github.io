content_outline:
- points:
  - 'Провокація: Як може вірш, у якому немає жодного слова про політику, бути небезпечнішим для режиму, ніж відкритий протест?'
  - 'Цитата з Калинця: «Я — це тільки струмок з ледь видимим дном, а в глибинах — народ».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Поезія Калинця — це передусім естетичний феномен (складне необароко, герметична метафора) чи політичний акт
    (дисидентство, спротив)?'
  - 'Дебат 2: Чи була герметичність стилю Калинця вимушеною стратегією обходу цензури, чи це його свідомий естетичний вибір,
    незалежний від політичного контексту?'
  - '[!epistemic-humility] Позиції критиків розходяться: одні бачать у складності лише «езопову мову», інші — самодостатню
    художню вартість.'
  section: 'Конфліктна карта: Естетика чи політика?'
  words: 900
- points:
  - 'Розбір ключових віршів: аналіз наскрізних образів (вертеп, камінь, вода, вогонь).'
  - Теми вигнання, втраченої історії та культурної пам'яті, втілені у природних та історичних метафорах.
  - 'Структура збірки як єдиного цілого: відтворення циклу народного вертепу як алегорія національної історії.'
  - '[!decolonization] Калинець повертає українській культурі її глибинні, архаїчні символи, очищуючи їх від радянської ідеологічної
    інтерпретації та російського імперського наративу.'
  section: 'Читання: Аналіз збірки «Відчинення вертепу»'
  words: 1700
- points:
  - 'Аналіз стилю: як Калинець використовує складні, багаторівневі метафори та алегорії для передачі заборонених тем.'
  - 'Необарокові елементи: поєднання високого і низького, християнської та язичницької символіки, гра з формою.'
  - 'Синтаксис як художній засіб: довгі, розгалужені речення, інверсії, що змушують читача до співтворення сенсу.'
  - '[!myth-buster] Спростування міфу, що «складна поезія» — це відірваність від народу. Калинець доводить, що естетична складність
    може бути потужною зброєю у збереженні національної ідентичності.'
  section: 'Мова і поетика: Герметична метафора'
  words: 1500
- points:
  - 'Повернення до розминки: як саме вірші Калинця стали «зброєю»? Аналіз конкретних прикладів з тексту.'
  - 'Рецепція творчості: як сприймали Калинця в самвидаві, в таборах, і як його поезія читається сьогодні, в незалежній Україні?'
  - '[!anti-hagiography] Постать Калинця не як ікони дисидентства, а як живої людини: його сумніви, його взаємини з іншими
    шістдесятниками, його життя після повернення з таборів.'
  - 'Рефлексія: чи змінилося ваше розуміння ролі поезії в суспільстві після аналізу творчості Калинця?'
  section: Дискусія та підсумок
  words: 700
focus: Поезія Ігоря Калинця як акт культурного спротиву, аналіз метафоричної мови для обходу цензури, необарокові елементи
  та роль покоління шістдесятників.
