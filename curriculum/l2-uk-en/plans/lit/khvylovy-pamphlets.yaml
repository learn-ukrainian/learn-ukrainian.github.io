content_outline:
- points:
  - 'Провокація: «Геть від Москви! Дайош Європу!» — що насправді означало це гасло для його автора, комуніста Миколи Хвильового?'
  - Чи був це лише політичний заклик, чи нова естетична програма для всієї української літератури?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Естетичний): ВАПЛІТЕ Хвильового проти «масових» організацій. Орієнтація на «психологічну Європу» і високе мистецтво
    проти ідеї «просвіти» і спрощення для мас.'
  - 'Дебат 2 (Політичний): Хвильовий — «націонал-ухильник», як його таврувала партія, чи вірний комуніст, що намагався врятувати
    революцію від російського великодержавного шовінізму?'
  - '[!epistemic-humility] Позиції в дискусії були не лише естетичними, а й глибоко політизованими. Сьогоднішнє прочитання
    Хвильового неможливе без розуміння тиску, під яким він перебував.'
  section: 'Конфліктна карта: Азіятський ренесанс чи європейський вектор?'
  words: 900
- points:
  - 'Детальний розбір центрального тексту: аналіз аргументації, структури та ключових тез.'
  - Що таке «азіятський ренесанс»? Ідея про те, що Україна має стати лідером відродження східних народів, оминаючи російський
    культурний центр.
  - 'Система образів: Москва як «монастир», що душить творчість; Європа як «фаустівська» цивілізація активності; Україна як
    «молода» нація, що має обрати свій шлях.'
  - '[!decolonization] Хвильовий першим сформулював комплексну програму культурної деколонізації України, наголошуючи на необхідності
    розриву з імперським центром не лише політично, але й ментально.'
  section: 'Читання: Памфлет «Україна чи Малоросія?»'
  words: 1700
- points:
  - 'Аналіз «вітаїстичного» стилю: динамічний, фрагментарний синтаксис, риторичні вигуки, неологізми, використання публіцистичної
    лексики як художнього засобу.'
  - 'Памфлет як високе мистецтво: як Хвильовий перетворює політичний жанр на зразок експресивної, орнаментальної прози.'
  - 'Робота з мовою: поєднання високого, філософського стилю з розмовною, часом лайливою лексикою для створення ефекту «живого»
    голосу.'
  - '[!myth-buster] Поширений міф, що Хвильовий — це лише публіцист. Насправді його стилістичний вплив на українську прозу
    20-х років був не меншим, ніж ідеологічний.'
  section: 'Мова і поетика: Вітаїзм і полемічний стиль'
  words: 1500
- points:
  - 'Повернення до розминки: після аналізу, як ми можемо відповісти на питання про сенс гасла «Геть від Москви!»? Аргументуйте
    з посиланням на текст.'
  - 'Рецепція: від офіційного ідеолога ВАПЛІТЕ до тавра «фашиста», анафеми в радянські часи і до ікони для поколінь дисидентів
    та сучасної України.'
  - 'Актуальність сьогодні: наскільки аргументи Хвильового 100-річної давнини є релевантними для сучасної боротьби України
    за свою ідентичність?'
  - '[!anti-hagiography] Трагедія Хвильового: самогубство як остаточний політичний та естетичний жест. Розгляд його фігури
    без романтизації, як людини, розчавленої системою, якій він спершу служив.'
  section: Дискусія та підсумок
  words: 700
focus: The pamphlets of Mykola Khvylovy; the literary discussion of 1925-1928; the slogan "Away from Moscow!"; the concepts
  of "psychological Europe" and "Asiatic Renaissance"; decolonization of Ukrainian culture.
level: LIT
module: lit-097
objectives:
- Аналізувати памфлети Хвильового в контексті літературної дискусії 1920-х років та політики українізації
- Визначати ключові риси вітаїстичного стилю та полемічної риторики Хвильового
- Формулювати власну позицію щодо актуальності гасла «Геть від Москви!» у XXI столітті
- Критично оцінювати складну роль Хвильового як комуніста та українського патріота
