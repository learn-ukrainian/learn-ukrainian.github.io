objectives:
- Аналізувати поетичні тексти Миколи Бажана 1920-х років, визначаючи риси необароко та конструктивізму
- Інтерпретувати складні метафоричні образи та символічну структуру поем "Сліпці" та "Будівлі"
- Критично оцінювати різні підходи до творчості Бажана (радянський, національний, модерністський)
- Формулювати аргументовану позицію щодо проблеми «митець і влада» на прикладі біографії Бажана
