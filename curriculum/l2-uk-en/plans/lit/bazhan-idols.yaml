content_outline:
- points:
  - 'Провокація: Бажан — архітектор вірша чи літописець катастроф? Як його поезія, що оспівує бетон і сталь, стає найточнішим
    образом людської трагедії ХХ століття?'
  - 'Ключовий образ: «Сліпець, що зрячим став у зрячих стінах» — без контексту, як початкова загадка.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Бажан 1920-х — це ортодоксальний футурист, що виконує соціальне замовлення на «індустріальну поему», чи це модерніст,
    що використовує авангардну форму для розмови про вічні теми: віра, зрада, влада, смерть?'
  - 'Дебат 2: Як оцінювати його «барокову» надмірність? Це стилістична гра, спроба створити «високий стиль» для нової епохи,
    чи це ознака «зараженості» минулим, яку він так і не зміг подолати?'
  - '[!epistemic-humility] Радянська критика бачила в ньому лише «співця індустріалізації». Еміграційна (Шерех) — складного
    інтелектуала, що зашифровував у текстах трагедію України. Сучасні дослідники (Павличко) — шукають психологічні та феміністичні
    підтексти.'
  section: 'Конфліктна карта: Вірний конструктивіст чи прихований екзистенціаліст?'
  words: 900
- points:
  - 'Читання ключових фрагментів: розповідь про мандрівних лірників-сліпців, що стають свідками та жертвами історії.'
  - 'Аналіз наративу: як поема будується за принципом кінематографічного монтажу? Чому історія розказана не хронологічно,
    а через спалахи-образи?'
  - 'Система персонажів: Пророк, Голіаф, юрба. Це алегорії чи реальні люди? Як вони представляють різні моделі поведінки в
    умовах терору?'
  - '[!decolonization] Текст Бажана — це відповідь імперському міфу про «сліпий» та «несвідомий» народ. Його сліпці — носії
    пам''яті та культури, яких імперія намагається знищити, але їхній спів залишається.'
  section: 'Читання: "Сліпці" та "Будівлі"'
  words: 1700
- points:
  - 'Стилістичний фокус: необароко. Накопичення деталей, складні метафори, драматизм, патетика, поєднання високого (біблійні
    алюзії) і низького (побутова лексика).'
  - 'Словник Бажана: архаїзми, неологізми («далекобій», «огненно»), наукова та технічна лексика («перпендикуляр», «радіус»),
    що створює унікальний «урбаністичний» стиль.'
  - 'Ритм і синтаксис: довгі, напружені речення, що імітують складність думки. Переноси (enjambements) як засіб створення
    драматичної паузи.'
  - '[!myth-buster] Бажан — не просто «урбаніст». Він використовує образи міста і будівництва, щоб показати крихкість людської
    цивілізації та неминучість руїни. Його «будівлі» — це часто майбутні руїни.'
  section: 'Мова і поетика: Архітектура слова'
  words: 1500
- points:
  - 'Повернення до розминки: тож як поєднуються архітектура і трагедія? Як форма вірша стає його змістом?'
  - 'Рецепція: як сприймали ці твори в 1920-х? Чому сам Бажан пізніше намагався їх «виправити»? І чому вони знову стали актуальними
    після Чорнобиля та в сучасній Україні?'
  - '[!anti-hagiography] Подальша доля Бажана: від авангардиста до сталінського лауреата і творця радянської енциклопедії.
    Чи можна відокремити ранні шедеври від пізніх компромісів? Дискусія про ціну виживання.'
  - 'Питання для студента: Який образ із поезії Бажана видається вам найпотужнішим символом української історії ХХ століття
    і чому?'
  section: Дискусія та підсумок
  words: 700
focus: 'Поезія Миколи Бажана 1920-х років ("Будівлі", "Сліпці"): необароковий конструктивізм, архітектурна поетика, трагічний
  образ історії'
