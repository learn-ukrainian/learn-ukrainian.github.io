content_outline:
- points:
  - 'Провокація: Чи може пригодницький роман бути політичним маніфестом? Іван Багряний доводить, що так.'
  - 'Цитата-загадка: «Ліпше вмирати біжучи, ніж жити гниючи!» — хто і за яких обставин кидає цей виклик долі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Тигролови» — це масова література (авантюрний роман) чи висока література (філософський твір)? Позиції критиків.'
  - 'Дебат 2: Чи є роман «радянським вестерном» чи унікальним українським жанром «пригодницького роману-протесту»?'
  - '[!epistemic-humility] Радянська критика таврувала твір як «наклеп», тоді як діаспорна критика (Ю. Шерех) вбачала в ньому
    екзистенційний маніфест.'
  - 'Глобальний контекст: порівняння з творами Джека Лондона та Джеймса Фенімора Купера — спільне та відмінне в осмисленні
    фронтиру.'
  section: 'Конфліктна карта: Авантюра чи екзистенційний протест?'
  words: 900
- points:
  - Аналіз сцени втечі Григорія Многогрішного з «ешелону смерті» — динаміка, символізм, воля до життя.
  - 'Зустріч з родиною Сірків: перехід з простору пекла (ГУЛАГ) у простір раю (український світ у тайзі).'
  - 'Система персонажів: Григорій як втілення «сильної людини», родина Сірків як ідеал вільного українства, майор Медвин як
    уособлення тоталітарного зла.'
  - '[!decolonization] Роман повертає Зелений Клин (Далекий Схід) в український культурний простір, руйнуючи імперський міф
    про «освоєння Сибіру» виключно росіянами.'
  section: 'Читання: Втеча з ешелону смерті та життя в Зеленому Клині'
  words: 1700
- points:
  - 'Стилістичний аналіз: роман поєднує риси публіцистичного, пригодницького та ліричного стилів.'
  - 'Робота з лексикою: використання мисливської та таборової лексики, діалектизмів Зеленого Клину, створення автентичної
    мовної атмосфери.'
  - 'Синтаксис як інструмент: короткі, «рубані» фрази в екшн-сценах, що створюють ефект кінематографічності та напруги.'
  - '[!myth-buster] Це не просто пригодницький роман, а твір зі складною звуковою організацією та ритмікою, особливо в описах
    природи, що межують з поезією в прозі.'
  section: 'Мова і поетика: Динамічний синтаксис та мова тайги'
  words: 1500
- points:
  - 'Повернення до розминки: Як «Тигролови», будучи авантюрним романом, виконують функцію політичного маніфесту?'
  - 'Рецепція твору: від заборони в СРСР до статусу культового в незалежній Україні. Чому роман залишається актуальним?'
  - '[!anti-hagiography] Критичний погляд на ідеалізацію родини Сірків. Чи є їхній світ життєздатною моделлю чи утопічною
    мрією?'
  - 'Сучасне значення: тема спротиву тоталітаризму та боротьби за людську гідність у контексті сучасної російсько-української
    війни.'
  section: Дискусія та підсумок
  words: 700
focus: 'Роман «Тигролови»: жанр пригодницького протесту, образ «сильної людини» проти тоталітарної системи, деколонізація
  українського наративу Далекого Сходу'
