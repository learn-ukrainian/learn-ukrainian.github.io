objectives:
- Аналізувати роман «Тигролови» як художній документ епохи сталінського терору та українського опору
- Досліджувати мовно-стилістичні особливості твору, зокрема його кінематографічність та динаміку синтаксису
- Оцінювати деколонізаційне значення роману в контексті повернення українського наративу на Далекий Схід
- Формулювати власну позицію в літературознавчій дискусії щодо жанрової природи та ідейного наповнення твору
