content_outline:
- points:
  - 'Провокація: Кобилянська — «співачка ніжної жіночої душі» чи жорсткий філософ-модерніст, що діагностує хвороби епохи?
    Чому її досі читають крізь призму сентименталізму?'
  - 'Уривок з Valse Mélancolique про трьох жінок — без коментаря. Питання: що об''єднує цих жінок, окрім однієї кімнати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Кобилянська — передусім феміністка, що боролася за емансипацію жінки, чи українська інтерпретаторка Ніцше, для
    якої ідея "Übermensch" важливіша за гендер?'
  - 'Дебат 2: Її місце в каноні. Чи була вона прийнята як "серйозний" європейський модерніст, чи маргіналізована як "провінційна"
    або "жіноча" письменниця?'
  - '[!epistemic-humility] Критика (Соломія Павличко) пропонує не протиставляти, а поєднувати ці дискурси, розглядаючи "ніцшеанський
    фемінізм" Кобилянської як унікальний синтез.'
  section: 'Конфліктна карта: Фемінізм чи Ніцшеанство?'
  words: 900
- points:
  - 'Close reading "Valse Mélancolique": три жіночі постаті (художниця, піаністка, вчителька) як три шляхи самореалізації
    та три типи чуттєвості. Аналіз символізму їхніх доль.'
  - 'Аналіз уривків із "Землі": природа не як тло, а як активна, аморальна, демонічна сила ("влада землі"), що керує вчинками
    людей поза їхньою волею.'
  - 'Система персонажів у "Землі": Сава як уособлення хтонічної, руйнівної сили землі vs Михайло як спроба гармонії.'
  - '[!decolonization] Кобилянська — частина європейського модерністського дискурсу (німецькомовного), а не периферія російської
    літератури. Її фемінізм та ніцшеанство — прямий діалог із Віднем та Берліном.'
  section: 'Читання: Valse Mélancolique та фрагменти "Землі"'
  words: 1700
- points:
  - 'Музика як структурний принцип: "Valse Mélancolique" побудований за законами музичної композиції (тема, варіації, крещендо,
    трагічний фінал).'
  - 'Психологізм через пейзаж: стан душі героїнь передається через опис природи, яка стає дзеркалом їхніх внутрішніх станів
    (імпресіоністична техніка).'
  - 'Синтаксис як засіб ритмізації: довгі, плавні періоди для опису роздумів vs короткі, уривчасті фрази для передачі емоційного
    напруження.'
  - '[!myth-buster] "Поетичність" стилю Кобилянської — це не просто красиві описи, а складна, філософськи обґрунтована система
    символів, де кожен образ (квітка, камінь, птах) має своє значення.'
  section: 'Мова і поетика: Символізм і музичність прози'
  words: 1500
- points:
  - 'Повернення до розминки: тож хто така Кобилянська — сентиментальна "співачка природи" чи філософ? Студент формулює відповідь,
    спираючись на аналіз.'
  - 'Рецепція: як сприймали Кобилянську сучасники (Франко, Леся Українка) і як її образ трансформувався в радянському літературознавстві
    (замовчування ніцшеанства та фемінізму).'
  - '[!anti-hagiography] Героїні Кобилянської — не ідеальні рольові моделі, а складні, часто суперечливі натури на межі нервового
    зриву. Чи робить це їх менш "феміністичними"?'
  - 'Сучасна актуальність: наскільки ідеї Кобилянської про жіночу незалежність, творчу самореалізацію та пошук надлюдського
    в собі резонують із сучасним українським суспільством?'
  section: Дискусія та підсумок
  words: 700
focus: Ніцшеанство в прозі Кобилянської, природа як дійова особа, ранній український фемінізм, стилістичні інновації "нової
  школи", close reading "Valse Mélancolique" та уривків із "Землі"
level: LIT
module: lit-057
objectives:
- Аналізувати ключові твори Ольги Кобилянської в контексті європейського модернізму та ніцшеанської філософії.
- Визначати та аналізувати стилістичні особливості її прози (символізм, імпресіонізм, музичність, психологізм).
- Формулювати аргументовану позицію щодо феміністичного та ніцшеанського дискурсів у творчості письменниці.
- Аналізувати, як мова та синтаксис створюють психологічну глибину та художню атмосферу в її текстах.
pedagogy: CBI
