activity_hints:
- description: 'Розрізнення позицій: що стверджувала радянська критика, а що — сучасні дослідники? Чий це аргумент?'
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: 'Вставити в речення терміни з модуля: вітаїзм, синкретизм, кінопоетика, неоромантизм.'
  focus: Терміни з мови та поетики
  items: 4
  type: fill-in
- description: Проаналізуйте образ То-Ма-Кі. Чи є він alter ego автора? Які ідеї Яновського про мистецтво він втілює? Наведіть
    цитати з тексту.
  focus: 'Аналіз персонажа: То-Ма-Кі'
  type: note
- description: 'На основі роману "Майстер корабля" напишіть есе (400-600 слів) на тему: "Чи може мистецтво бути вільним у
    тоталітарній державі?".'
  focus: 'Есе: Мистецтво і влада'
  type: essay
cefr_min: C1
connects_to:
- lit-khvylovy
- lit-pidmohylny-misto
- lit-78
content_outline:
- points:
  - 'Провокація: Чи може твір про любов, море і зйомки фільму бути потужною антиколоніальною зброєю?'
  - 'Фрагмент-загадка з роману: "Я напишу... про залізні кораблі, про людей, що їх будують, про радість і горе їхнього життя..."
    Хто цей оповідач і про яке мистецтво йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Майстер корабля" — це ескапістський неоромантизм чи зашифрована критика радянської дійсності?'
  - 'Дебат 2: Канонізація твору. Чому роман, розкритикований у 1930-х як "буржуазний", став хрестоматійним у незалежній Україні?'
  - '[!epistemic-humility] Радянська критика бачила "відрив від життя", сучасні дослідники — "філософію вільної творчості".
    Єдиної відповіді немає, але є краще аргументовані позиції.'
  section: 'Конфліктна карта: Неоромантизм проти ідеології'
  words: 900
- points:
  - 'Розбір ключових уривків: знайомство з То-Ма-Кі, будівництво корабля, розповіді Сева, символічна зустріч з балериною Таях.'
  - 'Система персонажів як алегорія: То-Ма-Кі (творчість), Сев (режисура), Богдан (акторство) — три іпостасі митця.'
  - 'Структура: нелінійний сюжет, мемуарна форма, ліричні відступи. Як структура твору віддзеркалює його ідеї?'
  - '[!decolonization] Створення "національної кінофабули": Яновський утверджує здатність української культури творити універсальні,
    а не лише провінційні чи етнографічні наративи.'
  section: 'Читання: "Майстер корабля"'
  words: 1700
- points:
  - 'Стилістичний синкретизм: поєднання елементів романтизму, експресіонізму, імпресіонізму.'
  - 'Кінематографічність прози: "монтаж" епізодів, зміна ракурсів, ліричні відступи як "кадри поза сюжетом".'
  - 'Лексика: екзотизми (назви портів, морські терміни), неологізми, поетичні епітети ("голуба далина").'
  - '[!myth-buster] Яновський — не просто "співець моря". Його мова — це інструмент для конструювання нової, модерної української
    чуттєвості, вільної від народницьких кліше.'
  section: 'Мова і поетика: Синкретизм і кінопоетика'
  words: 1500
- points:
  - 'Повернення до розминки: тож як саме "Майстер корабля" є антиколоніальним твором? Аргументація на основі тексту.'
  - 'Рецепція роману: від звинувачень в "аполітичності" до визнання шедевром "Розстріляного відродження".'
  - 'Сучасне значення: чи актуальна сьогодні ідея Яновського про "творчість як найвищу форму людської свободи"?'
  - '[!anti-hagiography] Чи не є ідеалізований світ митців у романі формою втечі від трагічних реалій Голодомору та репресій,
    що насувалися?'
  section: Дискусія та підсумок
  words: 700
focus: Роман Юрія Яновського "Майстер корабля" як маніфест українського романтичного вітаїзму, стилістичний експеримент та
  рефлексія про мистецтво в добу Розстріляного відродження.
level: LIT
