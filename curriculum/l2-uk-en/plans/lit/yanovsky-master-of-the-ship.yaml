objectives:
- Аналізувати роман "Майстер корабля" в культурному та історичному контексті українського модернізму 1920-х років
- Досліджувати стилістичні інновації Юрія Яновського, зокрема поєднання неоромантизму, експресіонізму та кінематографічних
  прийомів
- Оцінювати деколонізаційний потенціал роману, аналізуючи, як він утверджує українську культурну ідентичність всупереч імперському
  тиску
- Формулювати власну аргументовану позицію в рамках літературно-критичних дебатів навколо твору
