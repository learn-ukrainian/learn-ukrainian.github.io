content_outline:
- points:
  - 'Провокація: «Арфами, арфами... золотими, голосними...» — це поезія чи партитура? Якби ви були композитором, яку б музику
    написали на цей текст?'
  - 'Загадка: Чому наймузичніший поет українського модернізму згодом почав писати вірші, що звучали як партійні директиви?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Літературно-біографічний): Чи було два Тичини? Один — автор «Сонячних кларнетів», другий — «Партія веде». Чи
    це була неминуча еволюція в умовах тоталітарного тиску?'
  - 'Дебат 2 (Літературно-критичний): «Кларнетизм» — це український символізм, вітаїзм, космізм чи унікальний синтез? Юрій
    Лавріненко vs Олександр Білецький.'
  - '[!epistemic-humility] Не існує єдиної відповіді на «трагедію Тичини». Критики досі сперечаються, де закінчився поет і
    почався чиновник.'
  section: 'Конфліктна карта: Тичина: геній чи пристосуванець?'
  words: 900
- points:
  - 'Текст: Уривки з «Сонячних кларнетів» (напр., «О, панно Інно», «Арфами, арфами», «Гаї шумлять»).'
  - 'Аналіз синестезії: як колір перетворюється на звук, а пейзаж — на мелодію. «Сонячні кларнети» — розбір ключового образу.'
  - 'Наративна структура збірки: від світлого пантеїзму до передчуття трагедії революції.'
  - '[!decolonization] «Кларнетизм» як спроба створення універсальної, але глибоко української модерністської мови, що стоїть
    в одному ряду з європейськими течіями, а не є наслідуванням російського символізму.'
  section: 'Читання: Поезія як світло і звук'
  words: 1700
- points:
  - 'Стилістичний фокус: синтаксис як музична фраза. Роль повторів, анафор, алітерацій у створенні «звукопису».'
  - 'Лексичні інновації: неологізми та оказіоналізми Тичини (яблуневоцвітно, дніпро-Дунай, дзвінкостеблий).'
  - 'Метрика та ритміка: від класичних розмірів до верлібру — як форма відображає зміну емоційного стану ліричного героя.'
  - '[!myth-buster] Руйнуємо міф про «наївного співця природи». Тичина був високоосвіченим інтелектуалом, знавцем світової
    філософії та музики, що відображено у складній структурі його текстів.'
  section: 'Мова і поетика: Анатомія «кларнетизму»'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер, після аналізу, ви розумієте музичність поезії Тичини? Це лише метафора чи конкретний
    набір прийомів?'
  - 'Історія рецепції: як Тичину читали в 1920-х, як його «канонізувала» радянська система, і як ми перевідкриваємо його сьогодні.'
  - '[!anti-hagiography] Обговорення вірша «Партія веде» — не для засудження, а для розуміння глибини трагедії митця, що змушений
    був обирати між фізичним та творчим виживанням.'
  - 'Сучасна актуальність: Чи може митець бути «поза політикою» у часи великих історичних зламів? Урок Тичини.'
  section: Дискусія та підсумок
  words: 700
focus: 'Павло Тичина і феномен «кларнетизму»: синестезія, музичність поезії, космізм та трагічна еволюція поета від модернізму
  до соцреалізму.'
