  pos: ч.
  word: кларнетизм
- definition: Художній прийом, що полягає в поєднанні образів, що належать до різних органів чуття (напр., «сонячні кларнети»
    — зоровий і слуховий образ).
  pos: ж.
  word: синестезія
- definition: Філософсько-релігійне вчення, що ототожнює Бога з природою, розглядаючи світ як єдине ціле. Характерне для збірки
    «Сонячні кларнети».
  pos: ч.
  word: пантеїзм
- definition: Літературна течія українського модернізму 1920-х, що проголошувала культ життя, енергії, волі до дії.
  pos: ч.
  word: вітаїзм
- definition: Використання звукових повторів (алітерація, асонанс) для створення музичного ефекту та посилення виразності
