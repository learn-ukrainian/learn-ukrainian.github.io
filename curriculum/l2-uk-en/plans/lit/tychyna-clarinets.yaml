  pos: ч.
  word: звукопис
- definition: Стилістичний прийом, повторення однакових або подібних приголосних звуків для створення музичного ефекту.
  pos: ж.
  word: алітерація
- definition: Стилістичний прийом, повторення однакових або подібних голосних звуків у рядку або строфі.
  pos: ч.
  word: асонанс
- definition: Новостворене слово або вираз, якого раніше не було в мові. Тичина був майстром авторських неологізмів.
  pos: ч.
  word: неологізм
- definition: Вільний вірш; поетична система, що не дотримується суворої метричної схеми та римування, але має власну ритміку.
  pos: ч.
