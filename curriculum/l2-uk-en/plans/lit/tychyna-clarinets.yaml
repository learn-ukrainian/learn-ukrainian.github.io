objectives:
- Аналізувати поетичні тексти збірки «Сонячні кларнети», ідентифікуючи ключові стилістичні прийоми «кларнетизму» (синестезія,
  звукопис).
- Формулювати аргументовану позицію в дебатах щодо творчої та ідеологічної еволюції Павла Тичини.
- Критично оцінювати місце Тичини в українському літературному каноні, враховуючи радянську та сучасну рецепцію.
- Пояснювати деколонізаційне значення ранньої творчості Тичини як створення унікальної української модерністської мови.
