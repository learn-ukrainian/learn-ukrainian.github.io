content_outline:
- points:
  - 'Провокаційне питання: Чи може переклад бути сильнішим за оригінал? Чи є перекладач лише ремісником, чи повноцінним співавтором?'
  - 'Цитата без контексту: «А хто ж там знає, як воно у нього в оргiналi? Раз так переклав, значить, так i є». Як цей погляд
    визначає роль перекладача в культурі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Лукаш — геніальний співавтор чи недбалий перекладач? Позиція 1 (захисники): Лукаш збагатив українську мову,
    довівши її спроможність передавати найскладніші світові твори. Позиція 2 (пуристи): Він створював «лукашизми», що віддаляло
    читача від задуму автора.'
  - 'Дебат 2: Переклад як політичний акт. Чи була робота Лукаша свідомим актом деколонізації, чи це була «лише» блискуча філологічна
    праця, яку пізніше політизували?'
  - '[!epistemic-humility] Немає «правильного» перекладу. Кожна епоха і кожна перекладацька школа пропонує свою інтерпретацію,
    що відображає її власні цінності.'
  section: 'Конфліктна карта: Вірність чи творчість?'
  words: 900
- points:
  - Аналіз ключових уривків з перекладу «Фауста» Гете — як Лукаш передає гру слів, філософські концепції та ритміку німецького
    оригіналу.
  - 'Порівняльний аналіз: як «український Мефістофель» Лукаша відрізняється від німецького — через мову, фразеологізми, культурні
    коди.'
  - 'Народні джерела в академічному тексті: використання прислів''їв, приказок та діалектизмів для «вкорінення» Фауста в український
    мовний ландшафт.'
  - '[!decolonization] Створюючи повноцінний український переклад «Фауста», Лукаш кидав виклик імперському наративу, який
    відводив українській мові роль «селянської» чи «вторинної». Це була декларація її універсальності.'
  section: 'Читання: Лукашівський "Фауст"'
  words: 1700
- points:
  - '"Лукашизми" як стилістична інновація: аналіз унікальних неологізмів, оказіоналізмів та синтаксичних конструкцій, створених
    перекладачем.'
  - 'Робота з усіма регістрами мови: від високого, "книжного" стилю до народної лайки та фразеології. Як Лукаш поєднує непоєднуване?'
  - 'Звукопис та ритміка: як перекладач відтворює музикальність оригіналу (напр. віршів Аполлінера чи Лорки), використовуючи
    багатство української фонетики.'
  - '[!myth-buster] Міф про те, що переклад має бути «прозорим» і «непомітним». Лукаш довів, що яскрава індивідуальність перекладача
    може стати самоцінним художнім явищем.'
  section: 'Мова і поетика: Словник Лукаша'
  words: 1500
- points:
  - 'Повернення до розминки: тож чи є переклад формою спротиву? Відповідь на основі аналізу долі та творчості Лукаша.'
  - 'Рецепція та спадщина: як творчість Лукаша вплинула на наступні покоління українських перекладачів (покоління «Лозинок»)?'
  - '[!anti-hagiography] Лукаш не лише як літературний геній, але і як дисидент: його вчинок на захист Івана Дзюби, що призвів
    до остракізму з боку радянської системи. Ціна творчої свободи.'
  - 'Сучасна актуальність: роль перекладу в культурній дипломатії та інформаційних війнах сьогодні.'
  section: Дискусія та підсумок
  words: 700
focus: The role of literary translation as cultural resistance in the USSR, exemplified by Mykola Lukash's unique linguistic
  style in translating world classics.
level: LIT
module: lit-122
objectives:
- Критично аналізувати роль художнього перекладу як інструменту культурного спротиву.
- Розрізняти різні стратегії перекладу (буквалізм, творча адаптація) на прикладі творчості Миколи Лукаша.
- Оцінювати вплив мовної політики СРСР на розвиток української літератури та перекладу.
- Формулювати аргументовану позицію щодо дилеми «вірність оригіналу vs творча свобода перекладача».
