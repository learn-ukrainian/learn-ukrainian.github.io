objectives:
- Аналізувати роман у віршах "Маруся Чурай" як поліфонічний твір, що поєднує історичний, психологічний та філософський виміри.
- Критично оцінювати дебати навколо історичності Марусі Чурай та жанрової природи твору.
- Інтерпретувати текст у деколонізаційному контексті, розшифровуючи його анти-імперські та анти-радянські підтексти.
- Досліджувати мовно-стилістичні особливості роману, зокрема поєднання народної мови та високого стилю.
