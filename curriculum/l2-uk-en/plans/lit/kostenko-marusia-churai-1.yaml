content_outline:
- points:
  - 'Провокація: Якби суд над Марусею Чурай відбувався сьогодні, чим би він відрізнявся? Які "злочини" їй інкримінували б
    у сучасному медійному просторі?'
  - Фрагмент з роману (монолог Марусі про творчість) без коментаря — як цей уривок змінює наше уявлення про неї як про "народну
    співачку"?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Маруся Чурай — історична постать чи літературна містифікація? Аргументи "за" (згадки в історичних документах)
    та "проти" (брак прямих доказів).'
  - 'Дебат 2: Жанровий конфлікт. Це історичний роман, що реконструює епоху, чи психологічна драма про митця і натовп, де історія
    є лише тлом?'
  - '[!epistemic-humility] Радянське літературознавство бачило в творі лише "народність". Постколоніальна критика — акт культурного
    опору. Феміністична — трагедію жінки в патріархальному світі. Яка оптика найпродуктивніша?'
  section: 'Конфліктна карта: Історія vs. Легенда'
  words: 900
- points:
  - 'Аналіз ключових сцен: суд, спогади про кохання з Грицем, подорож до Києва. Як Костенко конструює сюжет навколо внутрішнього
    світу героїні?'
  - 'Система персонажів: Маруся (митець), Гриць (компроміс), Іван Іскра (лицарство), Галя Вишняківна (прагматизм). Це люди
    чи архетипи?'
  - '[!decolonization] Роман написаний у 1979, але опублікований лише в 1980-х. Це не просто твір про XVII ст., а зашифроване
    послання про долю української інтелігенції в СРСР. Як Костенко "контрабандою" проносить теми національної гідності та
    історичної пам''яті?'
  section: 'Читання: "Я — лиш інструмент, в якому плачуть і співають долі"'
  words: 1700
- points:
  - 'Мовна майстерність: поєднання високого стилю (суд, філософські роздуми) та народної мови (діалоги, пісні). Як це створює
    ефект "живої історії"?'
  - 'Ритм і синтаксис: аналіз уривків з різною ритмічною організацією. Як віршована форма передає психологічний стан героїв
    — від напруги в суді до ліричних спогадів?'
  - '[!myth-buster] "Маруся Чурай" — це не просто збірка пісень. Костенко створює складну поліфонічну структуру, де кожна
    "пісня" є частиною великого епічного наративу. Це руйнує міф про "просту народну поетесу".'
  - 'Інтертекстуальність: відсилання до українських дум, історичних пісень, барокової поезії. Костенко вписує свою героїню
    в тисячолітню культурну традицію.'
  section: 'Мова і поетика: Історична стилізація та психологізм'
  words: 1500
- points:
  - 'Повернення до розминки: тож, хто така Маруся Чурай для сучасної України — символ, жертва, митець, чи щось інше? Формулювання
    власної позиції.'
  - 'Рецепція твору: Чому "Маруся Чурай" стала культовим текстом для покоління шістдесятників і залишається актуальною сьогодні?'
  - '[!anti-hagiography] Чи не ідеалізує Костенко свою героїню? Критичний погляд на образ Марусі. Чи є в її діях суперечності,
    слабкості, помилки?'
  - 'Сучасна релевантність: тема митця і влади, особистої відповідальності під час війни, жіночого голосу в національній історії.
    Які уроки "Марусі Чурай" є найважливішими для України XXI століття?'
  section: Дискусія та підсумок
  words: 700
focus: Ліна Костенко, "Маруся Чурай", історичний роман у віршах, постколоніальний аналіз, жіночий голос в історії
