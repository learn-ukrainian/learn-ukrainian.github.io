content_outline:
- points:
  - 'Провокація: Чи може існувати українська література без України? Чи є творчість діаспори «справжньою» українською літературою,
    чи лише її тінню?'
  - Фрагмент сонету Емми Андієвської без контексту — світ, де "кожен риб'ячий кістяк — автопортрет води". Що це означає?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сюрреалізм Нью-Йоркської групи — це елітарний герметизм, «мистецтво для мистецтва», чи політичний акт опору
    соцреалізму через створення альтернативної реальності?'
  - 'Дебат 2: Нью-Йоркська група — це органічне продовження розстріляного українського авангарду 1920-х, чи цілком нове явище,
    інспіроване західним модернізмом (Еліот, Паунд)?'
  - '[!epistemic-humility] Критики досі сперечаються: одні бачать у групі наслідувачів Заходу, інші — творців унікального
    українського модернізму.'
  section: 'Конфліктна карта: Герметизм чи втеча?'
  words: 900
- points:
  - 'Текст: Фрагменти «Казки про яян». Аналіз алегорії — суспільство індивідуалістів, що не здатні до комунікації. Паралелі
    з досвідом еміграції.'
  - 'Текст: Повний текст кількох сонетів. Аналіз образної системи: як поєднуються філософські концепції та химерні візуальні
    образи (риби, вежі, дзеркала).'
  - 'Наративна структура: Як Андієвська будує свої тексти на асоціаціях та метаморфозах, а не на традиційному сюжеті.'
  - '[!decolonization] Нью-Йоркська група розірвала з народницькою, «селянською» традицією, довівши, що українська мова здатна
    бути мовою європейського авангарду та високої філософії.'
  section: 'Читання: «Казка про яян» та сюрреалістичні сонети'
  words: 1700
- points:
  - 'Аналіз мови: Неологізми Андієвської як інструмент створення нової реальності. Як вона «розширює» межі української мови.'
  - 'Синтаксис як сенс: Довгі, лабіринтоподібні речення, що імітують логіку сну та вільний потік свідомості.'
  - 'Звукопис: Алітерації та асонанси як основний засіб створення музики вірша, часто важливіший за прямий сенс.'
  - '[!myth-buster] Поширений міф, що авангардна поезія беззмістовна. Насправді, це надзвичайно структурований хаос, де кожен
    звук і кома мають значення.'
  section: 'Мова і поетика: Сюрреалістичний синтаксис та неологізми'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є література діаспори «справжньою»? Як аналіз творчості Андієвської дає відповідь на це питання?'
  - 'Рецепція: Як творчість Нью-Йоркської групи сприйняли в Україні після 1991 року? Чи були вони «зрозумілі»?'
  - 'Вплив: Роль Нью-Йоркської групи для українського постмодернізму, зокрема для угруповання Бу-Ба-Бу.'
  - '[!anti-hagiography] Не ідеалізувати діаспору: Нью-Йоркська група — це також історія внутрішніх конфліктів, творчих криз
    та розбіжностей у поглядах.'
  - 'Рефлексія: Що змінилося у вашому розумінні української літератури ХХ століття після знайомства з цим «паралельним» каноном?'
  section: Дискусія та підсумок
  words: 700
