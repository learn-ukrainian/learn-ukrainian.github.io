objectives:
- Критично аналізувати інтелектуальну прозу В. Домонтовича на прикладі ключових творів.
- Визначати стилістичні інновації та особливості поетики Домонтовича як представника модернізму.
- Оцінювати творчість Домонтовича в контексті деколоніальної критики та українського літературного канону.
- Формулювати власну позицію в літературознавчих дебатах щодо спадщини письменника.
