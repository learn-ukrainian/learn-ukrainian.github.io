content_outline:
- points:
  - 'Провокація: Чому романи про цинічних, розчарованих інтелектуалів 1920-х років стали обов''язковою лектурою для України,
    що бореться у XXI столітті?'
  - Загадковий уривок з "Дівчини з ведмедиком" про неможливість "здорових" стосунків — як він відображає всю епоху?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Жанрова природа прози. Це філософські "романи ідей" (західноєвропейська традиція) чи зашифровані "романи-ключі"
    (romans à clef) про реальних людей київської богеми?'
  - 'Дебат 2: Постать автора. Віктор Петров — радянський агент, цинічний містифікатор, що грав з усіма, чи трагічний модерніст,
    який фіксував розпад гуманістичних цінностей?'
  - '[!epistemic-humility] Біографічний метод бачить у кожному персонажі реальну людину, формальний — аналізує текст як самодостатню
    структуру. Істина, ймовірно, посередині.'
  section: 'Конфліктна карта: Містифікатор чи літописець епохи?'
  words: 900
- points:
  - 'Аналіз структури "Доктора Серафікуса": фрагментарність, колажність, потік свідомості як відображення хаосу думки головного
    героя.'
  - 'Система персонажів у "Дівчині з ведмедиком": Іполит Варецький та його оточення як зріз типів інтелектуалів (естет, інженер,
    художник).'
  - 'Конфлікт як рушійна сила: не зовнішні події, а внутрішня боротьба ідей, рефлексій та фрустрацій персонажів.'
  - '[!decolonization] Домонтович пише про українських міських інтелектуалів, повністю ігноруючи імперський/радянський наратив
    про "селянську націю". Він утверджує урбаністичну, європейську традицію української культури.'
  section: 'Читання: "Доктор Серафікус" та "Дівчина з ведмедиком"'
  words: 1700
- points:
  - 'Стилістичні інновації: синтаксис, що імітує філософську рефлексію — довгі періоди, підрядні речення, риторичні питання.'
  - 'Лексика: поєднання наукової термінології, філософського жаргону, архаїзмів та міської розмовної мови.'
  - 'Інтертекстуальність: численні приховані та явні цитати зі світової літератури та філософії як спосіб характеристики персонажів.'
  - '[!myth-buster] Міф про те, що проза Домонтовича "суха" та "беземоційна". Насправді емоції передаються не прямо, а через
    інтелектуальні конструкції та іронію.'
  section: 'Мова і поетика: Інтелектуальна проза як стиль'
  words: 1500
- points:
  - 'Повернення до розминки: тож як тексти про поразку допомагають перемагати? Обговорення ролі критичної рефлексії у формуванні
    зрілої нації.'
  - 'Рецепція творчості: чому Домонтовича "забули" в радянський час і "перевідкрили" в незалежній Україні?'
  - '[!anti-hagiography] Постать Петрова-Домонтовича далека від ідеалу "письменника-патріота". Обговорення етичної дилеми:
    чи можна відокремити геніальний текст від суперечливої біографії автора?'
  - 'Питання для рефлексії: Які ідеї Домонтовича про кризу цінностей, кохання та інтелектуальну працю залишаються актуальними
    сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: В. Домонтович (Віктор Петров), інтелектуальна проза, "Доктор Серафікус", "Дівчина з ведмедиком", модернізм, роман-ключ,
  криза інтелектуала 1920-х
