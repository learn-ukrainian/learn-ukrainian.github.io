content_outline:
- points:
  - 'Провокація: знаменитий пролог до поеми — це маніфест віри в націю чи вирок її «незрячості»? Чому поет починає з такого
    жорсткого самоаналізу?'
  - 'Фрагмент (Пролог, 1-4): "Народе мій, замучений, розбитий, / Мов паралітик той на роздорожжу, / Людським презирством,
    ніби струпом, вкритий! / Твоїм будущим душу я тривожу," — без коментаря. Питання: це слова любові чи зневаги?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Мойсей» як автобіографічна алегорія (Франко = Мойсей, українці Галичини = євреї в пустелі) vs. універсальна
    поема про долю будь-якого народу на шляху до державності.'
  - 'Дебат 2: Твір як релігійна поема (переспів біблійного сюжету) vs. твір як екзистенційна драма, що використовує біблійний
    міф для постановки «вічних питань» про віру, сумнів, волю та жертву.'
  - '[!epistemic-humility] Критики-народники бачили в поемі лише алегорію боротьби Франка з власною партією. Модерністи (Д.
    Донцов) — маніфест вольового націоналізму. Постколоніальні критики — аналіз психології поневоленої нації.'
  section: 'Конфліктна карта: Поема — це біографія чи філософія?'
  words: 900
- points:
  - 'Аналіз Прологу: структура, риторика, перехід від докору до пророцтва. Роль поета як духовного лідера.'
  - 'Основний конфлікт: Мойсей vs Датан і Авірон. Це конфлікт поколінь, ідеологій (дух vs матерія) чи просто боротьба за владу?'
  - 'Розбір ключової сцени: розмова Мойсея з демоном пустелі Азазелем. Аргументи Азазеля проти ідеї «народу-вибранця».'
  - 'Фінал: смерть Мойсея та пробудження народу під проводом Єгошуа. Трагедія одного лідера як запорука успіху нації?'
  - '[!decolonization] Поема як відповідь на імперський наратив про «неісторичність» українців. Франко доводить, що нація
    — це проєкт волі, а не спадок крові. Боротьба з внутрішнім рабством.'
  section: 'Читання: Пролог, бунт і видіння Азазеля'
  words: 1700
- points:
  - 'Стилістичні інновації: поєднання високого, пророчого стилю з народною лексикою та експресивною, «нервовою» інтонацією.'
  - 'Синтаксис та ритміка: використання анафори, риторичних питань та окликів для створення ефекту живого ораторського мовлення.
    Ямбічний пентаметр, що імітує піднесену мову.'
  - 'Неологізми та архаїзми: як Франко створює мову, що звучить одночасно і стародавньою (біблійною), і новаторською.'
  - '[!myth-buster] Руйнування міфу про Франка як виключно «поета-реаліста». «Мойсей» — це вершина українського символізму
    та модернізму, а не просто політична агітка.'
  section: 'Мова і поетика: Біблійний стиль та модерна експресія'
  words: 1500
- points:
  - 'Повернення до розминки: тож пролог — це вирок чи заповіт? Студент формулює відповідь, спираючись на аналіз.'
  - 'Рецепція твору: чому сучасники не одразу зрозуміли поему? Як змінювалося її прочитання у XX-XXI століттях?'
  - 'Актуальність сьогодні: «Мойсей» у контексті сучасної російсько-української війни. Проблема лідерства, національної єдності
    та історичної місії.'
  - '[!anti-hagiography] Поема показує не лише велич, але й трагедію пророка: його самотність, сумніви, відчай. Франко не
    створює ікону, а досліджує людську драму лідерства.'
  section: Дискусія та підсумок
  words: 700
focus: 'Поема І. Франка «Мойсей»: пролог як маніфест, конфлікт пророка і натовпу, біблійний міф та модерна нація, алегорія
  української історії'
level: LIT
module: lit-045
objectives:
- Аналізувати поему «Мойсей» як філософський твір про лідера і націю, віру і сумнів.
- Розрізняти різні критичні інтерпретації твору (автобіографічну, націоналістичну, екзистенційну).
- Визначати ключові стилістичні риси поетики Франка-модерніста: симбіоз біблійного стилю та експресіонізму.
- Аргументувати деколонізаційне значення поеми як маніфесту української суб'єктності та волі до життя.
