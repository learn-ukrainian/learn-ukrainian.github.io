content_outline:
- points:
  - 'Провокація: Як чесний хлібороб стає розбійником? Роман Панаса Мирного, що не дає простих відповідей на питання про природу
    зла.'
  - 'Цитата без контексту: «Так оце та правда? Оце її так люди ховають, так за неї ходяться?..» — роздуми Чіпки Варениченка.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Жанрова приналежність. Це твір чистого реалізму, що аналізує суспільні умови, чи натуралізму, що фокусується
    на детермінізмі спадковості та середовища?'
  - 'Дебат 2: Місце в каноні. Цензурований, написаний у співавторстві, трактований радянською критикою як суто класовий твір.
    Як ми читаємо його сьогодні?'
  - '[!epistemic-humility] Немає єдиної відповіді; критики (О. Білецький, М. Зеров) по-різному оцінювали співвідношення соціального
    та біологічного в романі.'
  section: 'Конфліктна карта: Реалізм чи натуралізм?'
  words: 900
- points:
  - 'Аналіз нелінійної структури: чотири частини роману як чотири етапи життя людини, що відбивають логіку не так хронології,
    як психологічного становлення.'
  - 'Система персонажів: Чіпка як бунтар, Галя як символ чистоти, Грицько як втілення конформізму, пани як соціальне тло.'
  - '[!decolonization] Спростування радянської інтерпретації Чіпки як "свідомого борця проти експлуатації". Це український
    тип правдошукача, чия боротьба за справедливість є особистою, а не ідеологічною.'
  - 'Герменевтика образу "пропащої сили": це трагедія особистості чи закономірний результат суспільної несправедливості?'
  section: 'Читання: "Пропаща сила": шлях Чіпки від правдошукача до розбійника'
  words: 1700
- points:
  - 'Стилістичний аналіз: поєднання епічної розповіді з глибоким ліризмом у пейзажах та внутрішніх монологах.'
  - 'Мова твору: багатство народної фразеології, прислів''їв, використання діалектизмів для характеристики персонажів.'
  - 'Особливості нарації: голос автора, який коливається між відстороненим літописцем та співчутливим спостерігачем.'
  - '[!myth-buster] Руйнування міфу про "просту" селянську прозу. Роман є складною стилістичною конструкцією, що поєднує різні
    наративні регістри.'
  section: 'Мова і поетика: Синтез епічного та ліричного'
  words: 1500
- points:
  - 'Повернення до розминки: що робить людину злочинцем? Відповідь на основі аналізу твору — це суспільство, спадковість чи
    особистий вибір?'
  - 'Історія рецепції: від царської цензури до радянської канонізації та постколоніального переосмислення.'
  - '[!anti-hagiography] Роман як деромантизація образу "народного месника". Чіпка — не Робін Гуд, а трагічна фігура, чий
    бунт призводить до саморуйнації.'
  - 'Сучасна актуальність: що історія Чіпки говорить про справедливість, моральний вибір та реакцію на беззаконня в сучасному
    українському суспільстві?'
  section: Дискусія та підсумок
  words: 700
focus: Панас Мирний, "Хіба ревуть воли, як ясла повні?". Аналіз соціально-психологічного реалізму, наративної структури та
  стилістичних інновацій. Дебати про жанр (реалізм vs натуралізм) та місце в каноні.
