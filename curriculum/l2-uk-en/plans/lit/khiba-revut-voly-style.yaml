objectives:
- Аналізувати роман "Хіба ревуть воли..." як соціально-психологічний твір у його історичному та літературному контексті.
- 'Визначати ключові елементи поетики роману: синтез ліричного й епічного, особливості наративу, мовні інновації.'
- Критично оцінювати радянські та імперські інтерпретації твору, формулюючи власне деколонізоване прочитання.
