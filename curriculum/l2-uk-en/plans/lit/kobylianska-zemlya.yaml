content_outline:
- points:
  - 'Провокація: Чи є земля, за яку брат вбиває брата, цінністю чи прокляттям? «Земля» Кобилянської як трагедія невідворотного
    фатуму.'
  - 'Цитата без контексту: «Сама вона, тая чорна землиця, голодна, все голодна... і мусить пити кров. Людську кров!»'
  - 'Сучасна паралель: Чи можуть сьогоднішні суперечки за спадок або бізнес досягти такої ж ірраціональної, майже містичної
    інтенсивності?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є вбивство наслідком надприродного «фатуму землі», чи це результат соціально-економічних умов та індивідуальної
    психології героїв (жадібності Сави)?'
  - 'Дебат 2: «Земля» — це вершина українського реалізму чи один із перших маніфестів модернізму? Позиція в каноні між Нечуєм-Левицьким
    та Хвильовим.'
  - '[!epistemic-humility] Критики-народники бачили в повісті лише соціальний конфлікт. Модерністи (Соломія Павличко) наголошували
    на символістській та феміністичній глибині, ігнорованій раніше.'
  section: 'Конфліктна карта: Фатум чи соціальна драма?'
  words: 900
- points:
  - 'Текстуальний аналіз: сцена вбивства Михайла Савою. Як Кобилянська використовує пейзаж для передачі психологічного напруження?'
  - 'Система персонажів: Михайло як уособлення гармонії з землею та традицією vs Сава як руйнівна, діонісійська сила. Роль
    жіночих персонажів (Анна, Рахіра) у розгортанні трагедії.'
  - 'Архетипи та міфологія: біблійний мотив Каїна та Авеля як центральна вісь сюжету. Земля як язичницьке божество, що вимагає
    жертви.'
  - '[!decolonization] Кобилянська описує внутрішній світ українського селянина з екзистенційною глибиною, рівною європейським
    модерністам (Гауптман, Гамсун), руйнуючи імперський стереотип про «простонародну» ідилію.'
  section: 'Читання: Конфлікт Сави та Михайла — братовбивство'
  words: 1700
- points:
  - 'Стилістичні інновації: використання невласне-прямої мови, внутрішніх монологів для розкриття психології персонажів.'
  - 'Пейзаж як персонаж: аналіз описів природи, що відображають душевний стан героїв (імпресіоністична техніка).'
  - 'Символізм: земля, ліс, кінь — розбір ключових символів та їх неоднозначності. Земля — і мати-годувальниця, і вампір.'
  - '[!myth-buster] Повість — не етнографічний нарис. Кобилянська свідомо використовує буковинські діалектизми не для екзотики,
    а для створення автентичного, але водночас універсального художнього світу.'
  section: 'Мова і поетика: Психологізм пейзажу та символізм'
  words: 1500
- points:
  - 'Повернення до розминки: тож земля — цінність чи прокляття? Студент формулює відповідь, спираючись на аналіз тексту.'
  - 'Рецепція: як сприймали повість при публікації (звинувачення в «декадансі») і як її значення змінилося після Голодомору
    та в епоху приватної власності на землю?'
  - '[!anti-hagiography] Кобилянська, аристократка духу, не ідеалізує селянство. Вона з безжальною чесністю показує його темні,
    ірраціональні інстинкти, жорстокість та владу забобонів.'
  - Вплив на пізнішу українську літературу, зокрема на прозу «розстріляного відродження».
  section: Дискусія та підсумок
  words: 700
