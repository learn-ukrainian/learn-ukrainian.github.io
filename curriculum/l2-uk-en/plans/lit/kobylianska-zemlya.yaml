objectives:
- Аналізувати повість «Земля» як модерністський психологічний твір у європейському контексті
- Визначати ключові стилістичні риси прози Кобилянської: символізм, психологізм пейзажу, ліризм
- Оцінювати деколоніальний вимір твору як спротив екзотизації української культури
- Формулювати власну позицію в рамках літературної дискусії (фаталізм vs. соціальний детермінізм)
