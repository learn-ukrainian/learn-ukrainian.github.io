content_outline:
- points:
  - 'Провокація: Чи може роман існувати без сюжету, а література — без сенсу? Розмова про Йогансена — це розмова про межі
    мистецтва.'
  - 'Цитата-загадка з твору: "Я вигадав цю подорож, щоб розважити себе й кількох приятелів..." — хто і навіщо це говорить?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Йогансен — руйнівник роману чи його реформатор? Позиція формалістів (текст як самоцінний артефакт) vs. позиція
    соціологічної критики (текст як відображення епохи).'
  - 'Дебат 2: Місце Йогансена в каноні. Чи є його експериментальна проза "справжньою" літературою, чи лише маргінальним курйозом
    на тлі магістральних течій 1920-х?'
  - '[!epistemic-humility] Критика 1920-х звинувачувала Йогансена в "ідеологічній порожнечі", тоді як сучасні дослідники бачать
    у цьому свідому філософську позицію.'
  section: 'Конфліктна карта: Експеримент vs. Канон'
  words: 900
- points:
  - 'Аналіз структури: фрагментарність, колажність, гра з жанрами (подорожні нотатки, науковий трактат, пародія).'
  - 'Система персонажів як система масок: доктор Леонардо, його студент, сам автор — хто з них веде гру?'
  - 'Сюжет як привід: подорож Італією — це не мета, а тло для інтелектуальних вправ та філософських роздумів.'
  - '[!decolonization] Творчість Йогансена як опір радянському примітивізму та спробі звести літературу до пропаганди. Це
    європеїзація української культури зсередини.'
  section: 'Читання: Подорож ученого доктора Леонардо'
  words: 1700
- points:
  - 'Стилістичні інновації: пародіювання наукового, публіцистичного, ораторського стилів.'
  - 'Оказіоналізми та неологізми: Йогансен як творець нових слів та смислів, мова як матеріал для конструктора.'
  - 'Синтаксис як інструмент: довгі, ускладнені періоди, що імітують плин думки, поряд із короткими, уривчастими фразами.'
  - '[!myth-buster] Це не "невміння писати зрозуміло". Це свідома програма деконструкції автоматизованого мовлення, спроба
    змусити читача думати над кожним словом.'
  section: 'Мова і поетика: Руйнування синтаксису та мовна гра'
  words: 1500
- points:
  - 'Повернення до провокації: то чи потрібен літературі сенс? Відповідь Йогансена: сам пошук сенсу і є сенсом.'
  - 'Рецепція твору: як текст, що був "незрозумілим" для сучасників, став ключовим для розуміння авангарду Розстріляного відродження.'
  - '[!anti-hagiography] Попри експериментаторство, Йогансен був змушений іти на компроміси з радянською владою. Як це відобразилось
    у його пізніших творах?'
  - 'Завдання для роздумів: чи можливий сьогодні в українській літературі такий радикальний експеримент, як у Йогансена? Чому
    так чи ні?'
  section: Дискусія та підсумок
  words: 700
focus: Mike Johansen's experimental prose, futurism, "Executed Renaissance", deconstruction of narrative, language as a tool
  for intellectual games
