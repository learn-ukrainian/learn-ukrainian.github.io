objectives:
- Аналізувати експериментальні твори Йогансена в контексті авангардних рухів Розстріляного відродження
- Досліджувати стилістичні інновації та мовну гру як ключові риси поетики Йогансена
- Оцінювати творчість Йогансена як форму культурного опору та європеїзації української літератури
- Формулювати аргументовану позицію щодо місця експериментальної прози в каноні української літератури
