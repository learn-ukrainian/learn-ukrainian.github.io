  focus: 'Конфліктна карта: Експеримент vs. Канон'
  items: 4
  type: quiz
- description: Вставити пропущені терміни (оказіоналізм, пародія, синтаксис, деконструкція) у речення, що описують стиль Йогансена.
  focus: 'Мова і поетика: Стилістичні терміни'
  items: 4
  type: fill-in
- description: Порівняйте уривок з експериментальної прози Йогансена та уривок з реалістичної прози іншого автора 1920-х.
    Визначте 3-4 ключові відмінності в їхній мові та структурі речень.
  focus: Порівняльний аналіз стилів
  type: note
- description: 'Напишіть есе на тему: "Чи потрібен українській літературі XXI століття свій Йогансен?". Аргументуйте свою
    позицію, спираючись на аналіз його творчості та сучасний культурний контекст (400-600 слів).'
  focus: 'Есе: Актуальність експерименту'
  type: note
