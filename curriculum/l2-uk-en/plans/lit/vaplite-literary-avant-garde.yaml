vocabulary_hints:
- definition: Вільна академія пролетарської літератури; елітарне об'єднання українських письменників (1925-1928), що прагнуло
    створити нову українську літературу високої якості.
  pos: ж.
  word: ВАПЛІТЕ
- definition: Стилістична течія в літературі, для якої характерна надзвичайна метафоричність, ритмічність та декоративність
    мови.
  pos: ч.
  word: орнаменталізм
- definition: Філософія пасивного, споглядального ставлення до життя; Хвильовий звинувачував у квієтизмі стару, етнографічну
    українську літературу.
  pos: ч.
  word: квієтизм
- definition: Людина, що має хворобливу пристрасть до письма; у контексті дискусії — зневажлива назва для письменників-початківців
    з робітничих та селянських об'єднань.
  pos: ч.
  word: графоман
- definition: Комплекс культурної та національної меншовартості, рабська психологія, орієнтація на російську культуру як на
    вищу; головний ворог, за Хвильовим.
  pos: с.
  word: малоросійство
- definition: Ідеологія, що намагалася створити суто пролетарську культуру, заперечуючи всю попередню «буржуазну» спадщину.
  pos: ч.
  word: пролеткульт
- definition: Умовна назва для покоління українських митців 1920-х—1930-х років, які були фізично знищені або репресовані
    сталінським режимом.
  pos: с.
  word: розстріляне відродження
- definition: Співробітник ЧК (Всеросійської надзвичайної комісії з боротьби з контрреволюцією і саботажем), органу радянської
    таємної поліції.
  pos: ч.
  word: чекіст
- definition: 'Первинна клітина, осередок (партійний, літературний); Хвильовий іронічно називав так своє «Я». Російською:
    ячейка.'
  pos: ж.
  word: ячейка
- definition: 'Концепція Хвильового: Україна має стати лідером відродження східних народів, які звільняються від європейського
    імперіалізму.'
  pos: ч.
  word: азійський ренесанс
