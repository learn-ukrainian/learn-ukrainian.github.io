content_outline:
- points:
  - 'Провокація: Гасло «Геть від Москви!» — що це означало для українського радянського письменника у 1925 році?'
  - Чому заклик до «азійського ренесансу» та орієнтації на «психологічну Європу» був вибухом у культурному житті УСРР?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Шляхи розвитку української літератури. Позиція ВАПЛІТЕ (Хвильовий): орієнтація на європейські зразки, створення
    «справжнього» мистецтва. Позиція «Плугу» та «Гарту» (опоненти): масове пролетарське мистецтво, вірність партійній лінії.'
  - 'Дебат 2: Мистецтво для кого? ВАПЛІТЕ — за «кваліфікованого митця» та високу культуру. Опоненти — за «зрозумілість» і
    «доступність» для робітників та селян.'
  - '[!epistemic-humility] Це була не просто суперечка про стиль, а фундаментальна дискусія про майбутнє української нації
    та культури в межах СРСР.'
  section: 'Конфліктна карта: Європа чи Малоросія?'
  words: 900
- points:
  - 'Аналіз ключового уривку: головний герой, «я — чекіст, але і людина», виносить смертний вирок власній матері в ім''я революції.'
  - Розщеплена свідомість як метафора долі українського інтелігента 1920-х, розрив між комуністичною ідеологією та національною
    ідентичністю.
  - 'Система персонажів: доктор Тагабат, дегенерат, Андрюша — різні аспекти розпаду особистості.'
  - '[!decolonization] Твір розкриває універсальну трагедію ідеологічного фанатизму, але вона глибоко вкорінена в український
    контекст колоніального роздоріжжя.'
  section: 'Читання: Новела «Я (Романтика)» Миколи Хвильового'
  words: 1700
- points:
  - 'Аналіз стилю Хвильового: лірична перенасиченість, метафоричність, ритмізована проза, що межує з поезією.'
  - 'Неологізми та мовні експерименти: створення нової, модерної, урбаністичної української мови, вільної від етнографізму
    та провінційності.'
  - 'Синтаксис як інструмент: короткі, рубані фрази, що передають напругу, та довгі, медитативні періоди.'
  - '[!myth-buster] Українська література 1920-х — це не сірий «соцреалізм». Це був вибух авангардних форм і стилів, жорстоко
    обірваний сталінським терором.'
  section: 'Мова і поетика: Орнаменталізм як стиль епохи'
  words: 1500
- points:
  - 'Повернення до гасла «Геть від Москви!»: Чи була ця битва програна? Трагедія Розстріляного відродження vs довгостроковий
    вплив на українську ідентичність.'
  - 'Рецепція творчості Хвильового: від офіційного «фашиста» в СРСР до символу національного відродження в незалежній Україні.'
  - '[!anti-hagiography] Хвильовий не був антикомуністом. Він був «націонал-комуністом», що вірив у можливість українського
    шляху в межах революції — і заплатив за цю ілюзію життям.'
  - 'Рефлексія: Як спадщина ВАПЛІТЕ та Літературної дискусії резонує із сучасними культурними війнами та процесом деколонізації
    України?'
  section: Дискусія та підсумок
  words: 700
focus: The VAPLITE organization, Mykola Khvylyovy's "Away from Moscow!" slogan, the Literary Discussion of 1925-1928, ornamentalist
  prose, and the tragic fate of the Executed Renaissance.
level: LIT
module: lit-231
objectives:
- Аналізувати ідеологічні та естетичні засади ВАПЛІТЕ в контексті Літературної дискусії 1925-1928 рр.
- Інтерпретувати ключові твори Миколи Хвильового, зокрема «Я (Романтика)», з використанням літературознавчого інструментарію.
- Розрізняти стилістичні особливості українського авангарду (орнаменталізм, неоромантизм) та їхню роль у формуванні модерної
  літературної мови.
- Формулювати власну позицію щодо трагічної долі Розстріляного відродження та його значення для сучасної української культури.
