objectives:
- Аналізувати феномен Київської школи поезії в контексті українського та світового літературного процесу
- Розрізняти індивідуальні стилі ключових представників школи (Голобородько, Воробйов, Кордун)
- Застосовувати літературознавчу термінологію (герметизм, метареалізм, верлібр) для аналізу поетичного тексту
- Формулювати власну аргументовану позицію щодо місця Київської школи в історії української літератури
