content_outline:
- points:
  - 'Провокаційне питання: Київська школа — це останні українські модерністи чи перші постмодерністи?'
  - 'Цитата-загадка: «Я бачу, як миші перегризають вузли на мішку, у якому лежить минулорічний сніг». Про що цей образ? Що
    він говорить про час і пам''ять?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Офіційне vs неофіційне мистецтво. Чи була Київська школа справжнім андеграундом, чи просто «тихою» нішею, яку
    режим толерував?'
  - 'Дебат 2: Школа чи сузір''я? Чи існував єдиний маніфест і програма, чи це було просто коло талановитих індивідуалістів,
    об''єднаних часом і місцем?'
  - '[!epistemic-humility] Літературознавці досі сперечаються: одні вбачають у школі цілісну естетичну систему (Т. Дев''яткіна),
    інші — лише «дружнє коло» (Ю. Ковалів).'
  section: 'Конфліктна карта: Школа чи коло однодумців?'
  words: 900
- points:
  - 'Аналіз ключових текстів: «Зелен-день», «Летюче віконце». Розбір фольклорних мотивів, трансформованих у модерністські
    образи.'
  - 'Структура вірша як міфу: відсутність ліричного «я», наратив, що розгортається за законами ритуалу, а не логіки.'
  - 'Характер і функція поетичної образності: не прикраса, а інструмент пізнання світу.'
  - '[!decolonization] Відмова від російськомовної радянської традиції «дисидентської» поезії. Київська школа — це не «протест»,
    а спроба створити альтернативну реальність засобами мови, корінням в українську архаїку.'
  section: 'Читання: Поезії Василя Голобородька'
  words: 1700
- points:
  - 'Стилістичний аналіз: верлібр як принципова відмова від традиційної силабо-тоніки. Синтаксис, що наслідує народні замовляння
    та думи.'
  - 'Герметизм: створення замкненого, самодостатнього поетичного світу. Чому їхні вірші так важко «перекласти» на мову буденності?'
  - 'Метафізичний реалізм (метареалізм): зображення не самої речі, а її зв''язків з усім сущим, її «аури» та «пам''яті».'
  - '[!myth-buster] Поширений міф, що поети Київської школи були «аполітичними ескапістами». Насправді їхня «тиха лірика»
    була радикальним актом мовного опору, збереженням української мови від радянської бюрократичної новомови.'
  section: 'Мова і поетика: Герметизм та метареалізм'
  words: 1500
- points:
  - 'Повернення до розминки: тож модерністи чи постмодерністи? Формулювання відповіді на основі аналізу поетики.'
  - 'Рецепція та спадщина: чому Київську школу «відкрили» лише у 1990-х? Як їхня творчість вплинула на сучасну українську
    поезію (наприклад, на покоління «дев''яностників»)?'
  - '[!anti-hagiography] Внутрішні конфлікти та розбіжності всередині школи. Чи всі учасники були однаково «герметичними»?
    Роль Миколи Воробйова як «радикального» крила.'
  - 'Рефлексія: яке значення має «важка», некомунікативна поезія в сучасному світі, що вимагає простоти та ясності?'
  section: Дискусія та підсумок
  words: 700
focus: Київська школа поетів (Голобородько, Воробйов, Кордун), метафізична та герметична поезія, мовний опір, пізній модернізм
  vs ранній постмодернізм в українській літературі.
