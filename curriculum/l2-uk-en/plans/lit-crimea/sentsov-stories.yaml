content_outline:
- points:
  - 'Провокація: Чи може текст, написаний у карцері, бути високою літературою? Уривок з оповідання Сенцова без згадки автора
    — що ви відчуваєте?'
  - 'Питання: Як відрізнити голос свідка від голосу письменника? І чи потрібно їх розрізняти?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Оповідання" Сенцова — це література факту (свідчення, документалістика) чи повноцінна художня проза? Аргументи
    за і проти.'
  - 'Дебат 2: Роль біографії автора. Чи можемо (і чи повинні) ми читати ці тексти, абстрагуючись від того, що Сенцов — політв''язень
    Кремля?'
  - '[!epistemic-humility] Критики розділилися: одні аналізують "Оповідання" через призму табірної прози (Шаламов, Солженіцин),
    інші наполягають на унікальності стилю та відсутності прямих аналогій.'
  section: 'Конфліктна карта: Свідок чи письменник?'
  words: 900
- points:
  - 'Детальний розбір 1-2 ключових оповідань: аналіз сюжету, мінімалістичної поетики, роботи з деталлю.'
  - 'Система персонажів: відсутність героїв, "маленька людина" в екстремальних умовах. Як Сенцов уникає пафосу?'
  - 'Наративна стратегія: відсторонений, майже документальний тон як художній прийом для посилення ефекту.'
  - '[!decolonization] Вписування творчості Сенцова в українську традицію "тюремної літератури" (від Шевченка до Стуса), а
    не лише в радянський/російський контекст ГУЛАГу.'
  section: 'Читання: Анатомія опору в "Оповіданнях"'
  words: 1700
- points:
  - 'Крим у текстах Сенцова: не туристична листівка, а простір пам''яті, дім, який відібрали. Аналіз пейзажу як персонажа.'
  - 'Паралелі з літературою кримських татар: досвід депортації та окупації як центральна травма, що формує ідентичність і
    голос.'
  - 'Сенцов як символ українського Криму: як його постать та тексти стали частиною боротьби за деокупацію півострова.'
  - '[!decolonization] Тексти Сенцова як акт спротиву російському колоніальному міфу про "ісконно русскій Крим".'
  - '[!epistemic-humility] Розгляд позиції, що фокус на політичному аспекті заважає суто літературній оцінці творів.'
  section: 'Вигнання та повернення: Крим як втрачений дім і поле боротьби'
  words: 1200
- points:
  - 'Повернення до розминки: тож, голос Сенцова — це голос свідка чи письменника? Формулювання власної позиції з опорою на
    текст.'
  - 'Рецепція творчості: як "Оповідання" сприйняли в Україні та світі? Роль міжнародних премій та правозахисного руху.'
  - '[!anti-hagiography] Критичний погляд: чи не затьмарює героїчна біографія автора потребу в суворій літературній критиці?
    Чи всі оповідання однаково вдалі?'
  - 'Сучасне значення: що тексти Сенцова говорять нам про природу опору, гідність та людяність в умовах тоталітарного тиску
    сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Творчість Олега Сенцова як література факту та свідчення. В'язнична проза, контекст кримськотатарського опору, теми
  вигнання та повернення, деколонізація наративів про Крим.
