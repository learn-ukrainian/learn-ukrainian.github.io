objectives:
- Аналізувати прозу Олега Сенцова як зразок сучасної української "в'язничної літератури"
- Критично оцінювати взаємозв'язок між біографією автора та художньою цінністю тексту
- Розглядати літературний твір у контексті боротьби за деокупацію та деколонізацію Криму
- Формулювати власну позицію в літературно-критичних дебатах, спираючись на текстовий аналіз
