content_outline:
- points:
  - 'Провокація: Як існує література без книг? Чи є усна традиція «справжньою» літературою, чи лише етнографічним матеріалом?'
  - 'Фрагмент «мане» (чотиривірша) про депортацію без контексту: «Нас вигнали о четвертій, не дали й зібратись. / Тільки сльози
    в хустку впали, та й годі прощатись».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автентичність vs. Кодифікація. Чи є записаний фольклористами текст автентичним, чи це вже «вбита» версія живого
    процесу?'
  - 'Дебат 2: Канон vs. Поле. Чи має усна традиція увійти до національного літературного канону на рівних правах із писемною,
    чи її місце — в антропології?'
  - '[!epistemic-humility] Усна традиція не є монолітною. Існують різні версії, школи виконавців, регіональні варіанти. Немає
    єдиного «правильного» тексту.'
  section: 'Конфліктна карта: Усна традиція: жива пам’ять чи музейний експонат?'
  words: 900
- points:
  - 'Аналіз ключових жанрів: дестан (епос), мане (ліричний чотиривірш), тюркю (народна пісня). Структура, сюжети, функції.'
  - 'Стилістичні особливості: паралелізм, формульність, імпровізаційність як основа поетики.'
  - 'Ритміка та синтаксис: як метрична структура та інверсії створюють унікальну мелодику усного мовлення.'
  - '[!decolonization] Усна традиція — це не «дописемна» стадія, а повноцінна, складна літературна система, що спростовує
    імперський міф про «неісторичні» народи.'
  section: 'Читання: Поетика усної традиції: дестани, мане, тюркю'
  words: 1700
- points:
  - 'Усна традиція як фортеця ідентичності: як фольклор допоміг зберегти мову та культуру в умовах вигнання.'
  - 'Жіноча пам''ять: «Мане» депортації як унікальне свідчення жіночого досвіду травми, втрати та надії.'
  - 'Ландшафт як персонаж: Крим як втрачений рай, міфологізований простір і кінцева мета повернення в усних творах.'
  - '[!decolonization] Традиція після 2014: «вигнання 2.0» та реактивація фольклорних механізмів опору в сучасній культурі.'
  - '[!epistemic-humility] Ми аналізуємо свідчення про травму. Наша мета — зрозуміти, а не давати оцінки. Важливо слухати,
    а не лише «досліджувати».'
  section: 'Вигнання та повернення: Пам''ять у валізі: Література депортації'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чи є усна традиція «справжньою» літературою? Формулювання аргументованої відповіді на основі
    матеріалу модуля.'
  - Рецепція та вплив на сучасну кримськотатарську літературу та музику (Jamala, «Qaradeniz»).
  - '[!anti-hagiography] Критика ідеалізації: Чи вся усна традиція є прогресивною? Обговорення можливих консервативних, патріархальних
    аспектів фольклору.'
  - 'Проєкт для роздумів: Як би ви сьогодні збирали усну історію вашої родини чи громади? Які інструменти б використали?'
  section: Дискусія та підсумок
  words: 700
focus: 'Кримськотатарська усна традиція: дестани, мане, тюркю, література вигнання, опір асиміляції та культурне самоствердження.'
level: LIT-CRIMEA
module: lit-198
objectives:
- Аналізувати жанрові та стилістичні особливості кримськотатарської усної традиції (дестан, мане, тюркю).
- Критично оцінювати дебати навколо автентичності, кодифікації та канонізації фольклору.
- Розуміти функцію усної традиції як механізму збереження ідентичності та пам'яті в умовах вигнання.
- Інтерпретувати твори усної словесності як історичне свідчення та деколоніальний акт.
