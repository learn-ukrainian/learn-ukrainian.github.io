activity_hints:
- description: 'Розрізнення позицій: це погляд на поезію як на чисте мистецтво чи як на політичний інструмент? Визначити за
    цитатою.'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставити в речення терміни: газель, касида, диван, мадх, ташбіб.'
  focus: Ключові терміни придворної поезії
  items: 5
  type: fill-in
- description: 'Подано два уривки: один — відверте вихваляння хана, інший — з можливим подвійним дном. Знайдіть ознаки прихованої
    критики або іронії.'
  focus: 'Аналіз: Панегірик vs Прихована критика'
  type: note
- description: Чому вивчення цієї, здавалося б, далекої та елітарної поезії є важливим для розуміння сучасного Криму та українсько-кримськотатарських
    відносин? (400-600 слів).
  focus: 'Есе: Спадщина придворної поезії'
  type: note
