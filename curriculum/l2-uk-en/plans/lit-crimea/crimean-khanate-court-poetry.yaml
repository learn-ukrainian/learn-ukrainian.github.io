content_outline:
- points:
  - 'Провокація: Чи могла поезія бути зброєю в руках хана? Уривок з придворної оди, де вихваляння природи насправді є політичним
    маніфестом.'
  - 'Загадка: Поет пише про солов''я і троянду. Про що він пише насправді?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Придворна поезія — це щире мистецтво чи просто панегірик на замовлення влади? Розгляд дилеми "патрон-клієнт"
    в літературі.'
  - 'Дебат 2: Чи можна вважати придворну поезію Кримського ханства частиною української літературної спадщини? Дебати про
    культурну апропріацію та спільний спадок.'
  - '[!epistemic-humility] Погляди на цю поезію змінювались: від імперського орієнталізму, що бачив у ній "екзотику", до радянського
    замовчування, і сучасних постколоніальних прочитань.'
  section: 'Конфліктна карта: Панегірик чи політика?'
  words: 900
- points:
  - 'Аналіз газелі Ашика Умера: мотиви кохання, вина та суфійської містики.'
  - 'Структура касиди на честь хана: як формальний канон (ташбіб, гурізга, мадх, ду''а) служить політичним цілям.'
  - 'Стилістичний аналіз: метафори, порівняння, алегорії. Як "соловей і троянда" можуть означати "поет і хан".'
  - '[!decolonization] Ця література існувала паралельно, а не підпорядковано, російській імперській. Розгляд її в контексті
    Османської та Перської поетичних традицій, а не як "провінційний" варіант.'
  section: 'Читання: Газелі та касиди ханського двору'
  words: 1800
- points:
  - Чи є в придворній поезії передчуття вигнання? Мотив "втраченого раю" (Бахчисарай як Едем) ще до депортації.
  - Порівняння з українською бароковою поезією про "сплюндровану батьківщину". Спільні образи та відмінності.
  - 'Після 1783: як поезія змінюється після анексії? Поява мотивів ностальгії, скорботи, прихованого опору.'
  - '[!decolonization] Крим не був "диким полем", а мав високу культуру. Російський міф про "просвітництво", принесене імперією,
    спростовується існуванням цієї традиції.'
  section: 'Вигнання та повернення: Відлуння втраченого саду'
  words: 1200
- points:
  - 'Повернення до розминки: тож чим була ця поезія — зброєю, окрасою чи плачем? Студент формулює відповідь.'
  - 'Рецепція: як цю поезію читали в XIX ст. (орієнталізм), XX ст. (замовчування), і зараз (постколоніальний ренесанс)?'
  - '[!anti-hagiography] Ідеалізація "золотого віку" ханства є небезпечною. Ця поезія була елітарною, створеною для двору,
    і не відображала життя більшості населення.'
  - 'Сучасна релевантність: як розуміння цієї традиції допомагає деконструювати сучасні російські імперські наративи про Крим?'
  section: Дискусія та підсумок
  words: 700
focus: Court poetry of the Crimean Khanate (ghazals, qasidas), its poetics, themes of power, love, and exile, and its place
  in Ukrainian and Crimean Tatar literary history.
level: LIT-CRIMEA
module: lit-crimea-01
objectives:
- Аналізувати жанри кримськотатарської придворної поезії (газель, касида) у їхньому культурному та політичному контексті.
- Критично оцінювати взаємозв'язок між мистецтвом та владою на прикладі патрон-клієнтських відносин у Кримському ханстві.
- Застосовувати деколонізаційну оптику для спростування імперських наративів про культурну історію Криму.
- Формулювати аргументовану позицію щодо місця придворної поезії у спільній спадщині України та Криму.
pedagogy: CBI
persona:
  role: Скептик, що розглядає придворну поезію не як чисте мистецтво, а як інструмент влади, саморепрезентації та витонченої
    дипломатії. Показує, як за віршами про троянди ховаються політичні інтриги.
  voice: Comparative-Court-Poet-Analyst
phase: LIT-CRIMEA.1
