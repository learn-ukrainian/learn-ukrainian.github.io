content_outline:
- points:
  - 'Провокація: Як мовознавець, що вивчав мертві мови, став смертельною загрозою для імперії? Питання, яке розкриває долю
    Чобан-заде.'
  - Фрагмент лірики Чобан-заде без контексту, що відображає тугу за Кримом, — студент має вгадати автора та епоху.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що важливіше у спадщині Чобан-заде — його наукові праці з тюркології чи його лірична поезія? Позиція "академістів"
    vs "літературознавців".'
  - 'Дебат 2: Чи був Чобан-заде "буржуазним націоналістом"? Радянська критика проти сучасної деколоніальної оцінки його ролі
    у формуванні кримськотатарської ідентичності.'
  - '[!epistemic-humility] Немає єдиної відповіді на те, як оцінювати "науковість" митця. Його поезія та наука — це дві сторони
    одного інтелектуального опору.'
  section: 'Конфліктна карта: Науковець чи Поет?'
  words: 900
- points:
  - 'Ключові поезії: аналіз образів, символізму та мотивів (напр. "Анага-ана" - "Рідна мова").'
  - 'Лінгвістична поетика: як наукові знання про мову впливали на його вірші; використання архаїзмів, діалектизмів.'
  - '[!decolonization] Чобан-заде доводив самобутність та давність тюркських мов, руйнуючи імперський міф про їхню "вторинність".
    Його наука була політичним актом.'
  - 'Система образів: образ "втраченого саду" (Крим), мотив дороги, символіка кольорів у його ліриці.'
  section: 'Читання: Аналіз лірики та лінгвістичної спадщини'
  words: 1800
- points:
  - 'Література депортації: Чобан-заде як предтеча теми вигнання, яку продовжили наступні покоління кримськотатарських письменників.'
  - '[!decolonization] Справа Чобан-заде як приклад систематичного знищення національних інтелігенцій в СРСР. Розстріл у 1937
    році — це не випадковість, а цілеспрямована політика культурного геноциду.'
  - 'Крим як текстовий простір: аналіз того, як ландшафт Криму (гори, море, степ) стає центральним персонажем у його творах.'
  - '[!epistemic-humility] Його звинувачення у "пантюркізмі" — типовий приклад того, як імперія криміналізує будь-який прояв
    національної солідарності.'
  section: 'Вигнання та повернення: Розстріляний голос кримської інтелігенції'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чому лінгвіст став ворогом імперії? Студент формулює відповідь, використовуючи докази з
    модуля.'
  - 'Рецепція: як змінювалося ставлення до Чобан-заде від його реабілітації до сьогодні? Чому його ім''я стало символом?'
  - '[!anti-hagiography] Чи ідеалізуємо ми Чобан-заде? Розгляд його можливих компромісів з радянською владою на ранніх етапах
    кар''єри.'
  - 'Сучасне значення: Чому читання Чобан-заде сьогодні, в умовах нової окупації Криму, є актом культурного опору?'
  section: Дискусія та підсумок
  words: 700
focus: 'Бекір Чобан-заде: конфлікт між лінгвістикою та поезією, деколонізаційна роль кримськотатарської науки, література
  як опір асиміляції, розстріл 1937 року як знакова трагедія.'
