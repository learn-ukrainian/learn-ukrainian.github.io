objectives:
- Критично аналізувати спадщину Бекіра Чобан-заде в єдності його наукової та поетичної діяльності.
- Дослідити стилістичні та мовні особливості його творів як прояв кримськотатарської модерної ідентичності.
- Формулювати аргументовану позицію щодо деколонізаційного значення автора та його ролі як символу культурного опору.
- Розуміти історичний контекст репресій проти національних інтелігенцій в СРСР на прикладі долі Чобан-заде.
