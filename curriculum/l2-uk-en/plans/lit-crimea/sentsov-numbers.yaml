activity_hints:
- description: 'Перевірка розуміння дебатів. Чия це теза: "Номери" — універсальна притча чи політичний памфлет? Визначити
    позицію за цитатою.'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити пропущені терміни (Нуль, Великий наглядач, Сьомий) у речення, що описують структуру світу п'єси.
  focus: Символіка "Номерів"
  items: 5
  type: fill-in
- description: Подано уривок з п'єси "Номери" та фрагмент звіту "Amnesty International" про справу Сенцова. Порівняйте мову,
    фокус та мету обох текстів.
  focus: 'Джерельний аналіз: художній текст vs правозахисний звіт'
  type: note
- description: На прикладі п'єси "Номери" та біографії Олега Сенцова напишіть есе (400-600 слів) на тему "Чи може мистецтво
    бути ефективним інструментом політичної боротьби?".
  focus: 'Есе: Творчість як опір'
  type: note
cefr_min: C1
connects_to:
- lit-195
- lit-193
content_outline:
- points:
  - 'Провокація: Чи може текст, написаний у російській в''язниці, бути чимось більшим, ніж просто свідченням? Чи можлива "чиста"
    універсальна антиутопія, коли біографія автора — це вже політичний маніфест?'
  - 'Цитата: "Ми всі номери. Десять номерів. Кожен знає свій номер. Нам не потрібні імена. Імена — це минуле. А минулого в
    нас немає."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Номери" — це універсальна філософська антиутопія в традиції Замятіна та Орвелла, чи це перш за все алегорія
    на сучасну Росію та її тоталітарний режим?'
  - 'Дебат 2: Чи маємо ми право аналізувати цей текст, ігноруючи біографію автора? Наскільки "герметичне" читання можливе
    і доцільне, коли йдеться про політв''язня?'
  - '[!epistemic-humility] Критики розходяться: одні бачать у п''єсі позачасову притчу, інші — конкретну політичну сатиру.
    Немає єдиної "правильної" інтерпретації.'
  section: 'Конфліктна карта: Мистецтво vs. Документ'
  words: 900
- points:
  - 'Структура світу: аналіз закритого, ієрархічного суспільства "номерів" та його правил. Символізм "Нуля", "Великого наглядача"
    та ритуалів.'
  - 'Система персонажів: не імена, а функції. Сьомий як бунтар, що кидає виклик системі. Еволюція (чи деградація) інших номерів.'
  - 'Мова та стиль: лаконічність, абсурдизм діалогів, повтори. Як Сенцов створює атмосферу задушливої несвободи через мовні
    засоби.'
  - '[!decolonization] П''єса, написана українцем у російській тюрмі, є актом культурного самоствердження та опору асиміляції,
    навіть якщо в тексті немає прямого національного маркування.'
  section: 'Читання: п''єси "Номери"'
  words: 1700
- points:
  - 'Література вигнання: текст як єдина територія свободи для ув''язненого автора. Процес письма як спосіб зберегти ідентичність.'
  - 'Кримський вимір: хоча дія відбувається в абстрактній країні, досвід Сенцова — кримчанина, що чинив опір окупації — є
    ключем до розуміння тексту. П''єса як алегорія окупованої території.'
  - 'Паралелі: порівняння "Номерів" з іншими творами, написаними в ув''язненні (Антоніо Ґрамші, Вацлав Гавел, Василь Стус).
    Що спільного в "тюремній літературі"?'
  - '[!decolonization] Творчість Сенцова — це деколонізаційний акт, що руйнує імперський міф про "один народ" та демонструє
    непохитність української ідентичності перед лицем репресій.'
  section: 'Вигнання та повернення: Тюремний досвід як метафора окупації'
  words: 1300
- points:
  - 'Повернення до розминки: чи є "Номери" універсальним текстом? Аргументована відповідь студента на основі аналізу.'
  - 'Рецепція: як п''єсу та знятий за нею фільм сприйняли в Україні та світі? Роль міжнародних культурних проєктів у боротьбі
    за звільнення політв''язнів.'
  - '[!anti-hagiography] Як уникнути перетворення Сенцова на ікону і продовжувати бачити в ньому живого автора зі складним
    творчим шляхом? Розмова про межі між митцем, героєм та символом.'
  - 'Сучасне значення: що "Номери" говорять нам про природу влади, конформізм та ціну свободи в сьогоднішній Україні, що воює?'
  section: Дискусія та підсумок
  words: 700
focus: П'єса "Номери" Олега Сенцова як приклад літератури опору, аналіз жанру антиутопії, теми дегуманізації в тоталітарному
  суспільстві та зв'язок між творчістю та долею автора.
