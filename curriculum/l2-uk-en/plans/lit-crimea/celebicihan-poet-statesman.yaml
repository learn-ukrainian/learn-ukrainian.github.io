content_outline:
- points:
  - 'Провокація: Його стратили у 29 років, а тіло викинули в Чорне море. Чому вірш, написаний ним у в''язниці, став національним
    гімном кримських татар?'
  - 'Фрагмент "Ant etkenmen" ("Я поклявся") без контексту — що це: молитва, маніфест, прокляття?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ким був Челебіджіхан насамперед — поетом, що мріяв про ідеальну державу, чи політиком, чиї мрії розбилися об
    реальність? (Романтична vs. прагматична інтерпретація)'
  - 'Дебат 2: Місце в каноні — національний герой-мученик чи трагічна фігура, чиї політичні рішення призвели до поразки Курултаю?
    Оцінка його дій з погляду сучасності.'
  - '[!epistemic-humility] Більшість його політичних праць та протоколів Курултаю знищено. Ми реконструюємо його погляди переважно
    через поезію та спогади соратників.'
  - '[!anti-hagiography] Аналіз його конституційних проєктів — наскільки вони були реалістичними в умовах 1917 року? Чи не
    ідеалізуємо ми його політичну програму?'
  section: 'Конфліктна карта: Поет vs. Державник'
  words: 900
- points:
  - 'Текст гімну "Ant etkenmen" — детальний розбір ключових образів: "мої сльози", "рани народу", "темна земля".'
  - Аналіз вірша "Savash taqmaq" ("Воєнний марш") — як поетична мова створює образ нової, модерної кримськотатарської ідентичності,
    готової до боротьби.
  - 'Стилістичні інновації: поєднання кримськотатарської поетичної традиції з європейським модернізмом.'
  - '[!decolonization] Тексти Челебіджіхана як пряме спростування імперського наративу про "дикий" та "недержавний" народ.
    Поезія як акт творення суверенітету.'
  section: 'Читання: Поезія як конституція'
  words: 1800
- points:
  - Тема Криму як втраченого й омріяного раю в його поезії. Як ландшафт стає символом національної ідеї?
  - Челебіджіхан як перший голос покоління, що пережило наслідки анексії Криму Російською імперією та спрогнозувало майбутні
    трагедії — депортацію та окупацію.
  - Аналіз його бачення багатоетнічного Криму — чи була його модель "Швейцарії Сходу" утопією чи реальним планом?
  - '[!decolonization] Його страта більшовиками в 1918 році — не випадковість, а цілеспрямоване знищення політичного лідера
    та символу кримськотатарської державності, перший крок до майбутнього геноциду.'
  section: 'Вигнання та повернення: Голос народу, що зникає'
  words: 1200
- points:
  - 'Повернення до розминки: Чому саме вірш, а не політичний маніфест, став гімном? Аргументована відповідь студента.'
  - 'Рецепція: як змінювалося ставлення до Челебіджіхана в радянський час (замовчування), в часи депортації (символ опору)
    та після повернення до Криму?'
  - '[!anti-hagiography] Питання для дискусії: чи не затьмарює його мученицька смерть об''єктивну оцінку його політичних успіхів
    та невдач?'
  - 'Сучасне значення: Чому ідеї Челебіджіхана про єдність та самопожертву заради Батьківщини звучать особливо гостро сьогодні,
    в умовах нової окупації Криму?'
  section: Дискусія та підсумок
  words: 700
