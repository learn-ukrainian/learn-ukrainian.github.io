- Аналізувати поезію та державницьку діяльність Номана Челебіджіхана в історичному контексті початку ХХ століття.
- Критично оцінювати конфлікт між поетичним ідеалом та політичною реальністю в його житті та творчості.
- Інтерпретувати його твори як акт деколонізаційного опору та інструмент творення національної ідентичності.
- Формулювати аргументовану позицію щодо місця Челебіджіхана в українському та кримськотатарському літературних канонах.
