content_outline:
- points:
  - 'Провокація: Гаспринський — єретик, що руйнує традицію, чи пророк, що рятує націю від зникнення? Як модернізація може
    бути інструментом збереження ідентичності?'
  - 'Цитата з «Терджімана»: "Єдність у мові, думках, ділах!" — що означає цей девіз у контексті Російської імперії кінця XIX
    ст.?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Просвітництво проти традиції. Гаспринський та джадиди (реформатори) проти кадимістів (консерваторів). Чи є освіта
    загрозою вірі?'
  - 'Дебат 2: Гаспринський — письменник чи політик? Дискусія про місце його текстів у літературному каноні. Чи є публіцистика
    «справжньою» літературою?'
  - '[!epistemic-humility] Немає простої відповіді. Для одних він — батько нації, для інших — руйнівник вікових підвалин.
    Обидві сторони мали свої аргументи.'
  section: 'Конфліктна карта: Джадидизм vs. Кадимізм'
  words: 900
- points:
  - Детальний розбір структури та стилю «Терджімана» (Перекладача) — першої кримськотатарської газети.
  - 'Аналіз ключових ідей: освіта для жінок, реформа мови, пантюркізм.'
  - 'Нарративна стратегія: як Гаспринський використовував прості алегорії та історії для пояснення складних ідей модернізації.'
  - '[!decolonization] «Терджіман» як інструмент створення спільної інформаційної та культурної спільноти всупереч імперському
    тиску та цензурі. Це не просто газета, а акт культурного самоствердження.'
  section: 'Читання: Аналіз газети «Терджіман»'
  words: 1700
- points:
  - Джадидизм як унікальна відповідь на екзистенційну загрозу асиміляції. Модернізація не як копіювання Заходу чи Росії, а
    як власний шлях.
  - Газета «Терджіман» як «уявна батьківщина» для розпорошеного народу. Створення єдиного комунікаційного простору від Криму
    до Центральної Азії.
  - '[!myth-buster] Гаспринський не був «проросійським». Його пантюркізм був спробою збудувати горизонтальну солідарність
    тюркських народів імперії як противагу русифікації.'
  - '[!decolonization] Аналіз того, як Російська імперія, а потім СРСР, намагалися стерти пам''ять про джадидизм, представляючи
    його як «буржуазний націоналізм».'
  section: 'Вигнання та повернення: Джадидизм як відповідь на колоніальний тиск'
  words: 1200
- points:
  - 'Повернення до розминки: тож Гаспринський — руйнівник чи рятівник? Студент має сформулювати власну позицію на основі аналізу.'
  - 'Рецепція: як сприймали «Терджіман» сучасники, і як його оцінюють історики сьогодні?'
  - 'Сучасне значення: чому ідеї Гаспринського знову стали актуальними в Криму після 2014 року? Як його спадок використовується
    в сучасному кримськотатарському русі?'
  - '[!anti-hagiography] Чи не була ідея єдиної тюркської мови Гаспринського такою ж імперською, як і ідея русифікації, тільки
    в меншому масштабі?'
  section: Дискусія та підсумок
  words: 700
focus: Ісмаїл Гаспринський, джадидизм, газета «Терджіман», конфлікт між традицією та модернізацією, кримськотатарська література
  як форма опору колоніалізму.
level: LIT
module: lit-195
objectives:
- Критично аналізувати реформаторський проект Ісмаїла Гаспринського (джадидизм) у колоніальному контексті Російської імперії.
- Дослідити стилістичні та жанрові особливості газети «Терджіман» як інструменту культурного самоствердження.
- Формулювати аргументовану позицію щодо деколонізаційного значення діяльності Гаспринського та його актуальності для сучасної
  України.
- Розрізняти позиції джадидів та кадимістів, розуміючи складність внутрішніх дебатів у кримськотатарському суспільстві.
pedagogy: CBI
