activity_hints:
- description: Визначити, яка теза належить до критики орієнталізму, а яка — до його виправдання. Розрізнити поняття "апропріація"
    та "культурний діалог".
  focus: Конфліктна карта орієнталізму
  items: 6
  type: quiz
- description: Вставити в речення з поезій слова, що створюють атмосферу "орієнтальної казки" (кипариси, мінарети, ятагани,
    фонтани тощо).
  focus: Лексика "екзотичного"
  items: 8
  type: fill-in
- description: Порівняйте уривок з "Бахчисарайського фонтану" Пушкіна та вірш українського модерніста про те саме місто. Знайдіть
    спільні тропи та принципові відмінності у погляді.
  focus: 'Порівняльний аналіз: два погляди на Бахчисарай'
  type: note
- description: Проаналізуйте, як змінилося зображення Криму в українській культурі від модернізму до сьогодення (після 2014
    року). Які теми зникли, а які стали центральними? Аргументуйте свою думку (400-600 слів).
  focus: 'Есе: Еволюція "кримського тексту"'
  type: note
