  pos: ч.
  word: орієнталізм
- definition: процес зображення культури або місця як дивного, чужого та привабливого через його "інакшість", часто ігноруючи
    реальність.
  pos: ж.
  word: екзотизація
- definition: метафора для культурного ландшафту, де новіші шари накладаються на старі, але не стирають їх повністю, створюючи
    багатошарову структуру.
  pos: ч.
  word: палімпсест
- definition: загальна назва напрямів мистецтва та літератури кінця XIX — початку XX ст., що характеризуються розривом з традиційними
    формами та пошуком нових.
  pos: ч.
  word: модернізм
- definition: процес, коли представники неколоніальної культури починають дивитися на себе та зображувати себе через призму
    імперських, орієнталістських стереотипів.
  pos: ж.
  word: само-орієнталізація
- definition: спосіб бачення та зображення колонізованих територій та народів з позиції колонізатора, що нормалізує владу
    та культурне домінування.
  pos: ч.
