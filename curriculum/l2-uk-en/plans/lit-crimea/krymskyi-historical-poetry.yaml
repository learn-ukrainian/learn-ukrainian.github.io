content_outline:
- points:
  - 'Провокація: Крим у поетів-модерністів — це реальний півострів чи екзотична мрія, сконструйована для київської аудиторії?'
  - Фрагмент поезії про "античні руїни" або "татарську екзотику" без зазначення автора — що він говорить про погляд на Крим?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був "кримський текст" українських модерністів формою культурної апропріації та само-орієнталізації, засвоєнням
    імперського погляду? Чи це був легітимний мистецький пошук "Іншого" всередині власного культурного простору?'
  - 'Дебат 2: Український vs. російський орієнталізм. Порівняння українських віршів з творами Пушкіна, Лермонтова, символістів.
    Це наслідування, полеміка чи принципово інша перспектива?'
  - '[!epistemic-humility] Літературна критика не дає остаточних відповідей, але ставить гостріші питання. Розглядаємо обидві
    позиції як аргументовані інтерпретації.'
  section: 'Конфліктна карта: Орієнталізм чи повернення до джерел?'
  words: 900
- points:
  - Глибоке читання ключових поезій (напр., Миколи Вороного, Павла Тичини, Агатангела Кримського) з філологічним коментарем.
  - 'Аналіз стилістичних прийомів: екзотична лексика, символізм (море, гори, руїни), використання кольору та звукопису для
    створення "південної" атмосфери.'
  - 'Аналіз наративного голосу: хто говорить? Турист, завойовник, мрійник? Як це впливає на зображення простору?'
  - '[!decolonization] Позиціонування цих текстів не як відлуння російської літератури, а як частину унікального українського
    пошуку національної ідентичності, навіть коли він використовує проблематичні тропи.'
  section: 'Читання: Кримський текст українського модернізму'
  words: 1700
- points:
  - Як тексти, написані до депортації 1944 року, несвідомо беруть участь у стиранні сучасної їм кримськотатарської присутності?
  - 'Пейзаж як персонаж: часто знелюднений, наповнений привидами античних греків чи генуезців, але не живими татарами. Чому
    минуле витісняє сучасне?'
  - 'Література як палімпсест: одна культура пише поверх іншої, створюючи "палімпсестний пейзаж".'
  - '[!decolonization] Крим як приклад російського колоніального стирання, де література (навіть українська) може мимоволі
    відтворювати імперські наративи про "дикий" або "занедбаний" простір, що потребує "освоєння".'
  - '[!epistemic-humility] Визнання, що поети були продуктами своєї імперської епохи і могли не мати зловмисного наміру, але
    їхні твори все одно потребують постколоніальної критики.'
  section: 'Вигнання та повернення: Крим як порожній рай'
  words: 1200
- points:
  - 'Повернення до розминки: реальне місце чи екзотична мрія? Студент формулює відповідь, спираючись на докази з модуля.'
  - 'Історія рецепції: як ці вірші читалися тоді, і як ми їх читаємо зараз, після 1944 та 2014 років?'
  - '[!anti-hagiography] Критична оцінка спадщини. Чи можемо ми захоплюватися красою віршів, визнаючи їхні політичні сліпі
    плями?'
  - 'Сучасна релевантність: як сучасні українські митці працюють з темою Криму? Чи є це продовженням модерністської традиції,
    чи її запереченням?'
  section: Дискусія та підсумок
  words: 800
focus: Ukrainian modernist poetry on Crimean themes, the concept of Orientalism, and the construction of identity through
  landscape, focusing on early 20th-century literature.
level: LIT-CRIMEA
module: lit-crimea-012
objectives:
- Застосовувати поняття "орієнталізм" та "постколоніальна критика" до аналізу української літератури
- Аналізувати поетичний текст на рівні стилістики, символізму та наративного голосу
- Розрізняти українську та російську мистецькі традиції у зображенні Криму
- Формулювати аргументовану позицію щодо політичної та етичної відповідальності митця
- Критично оцінювати складну спадщину українського модернізму, бачачи як мистецькі здобутки, так і ідеологічні проблеми
