activity_hints:
- description: 'Розрізнення позицій у дебатах: це аргумент на користь літературної чи публіцистичної природи тексту? Це порівняння
    зі Стусом чи з сучасними заручниками?'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Використання в контексті слів: спротив, неволя, ідентичність, окупація, гідність.'
  focus: Ключова термінологія спротиву
  items: 5
  type: fill-in
- description: Прочитайте уривок з листа Нарімана Джеляла та уривок з таборової прози Василя Стуса. Визначте 3 спільні риси
    та 2 ключові відмінності у їхніх стратегіях інтелектуального спротиву.
  focus: 'Порівняльний аналіз: Джелял та Стус'
  type: note
- description: На прикладі листів Нарімана Джеляла та інших відомих вам творів, напишіть есе (400-600 слів) про те, як тексти,
    написані в неволі, впливають на суспільство та його боротьбу за свободу.
  focus: 'Есе: Роль "тюремної прози" у формуванні національної свідомості'
  type: note
