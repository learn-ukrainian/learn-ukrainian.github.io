content_outline:
- points:
  - 'Провокація: Що сильніше за тюремні мури? Лист, який їх долає. Уривок з листа Нарімана Джеляла, де він пише не про страждання,
    а про плани на майбутнє.'
  - 'Запитання без відповіді: чи може текст, написаний в ув''язненні, бути вільним?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Література чи публіцистика? Чи є листи Джеляла художнім твором, чи це перш за все політичний документ та акт
    спротиву?'
  - 'Дебат 2: Спадкоємність традиції. Джелял як продовжувач справи українських дисидентів (Стус, Марченко) чи представник
    нового типу ув''язненого — заручника гібридної війни?'
  - '[!epistemic-humility] Не існує єдиної "правильної" класифікації. Важлива аргументація: які риси тексту дозволяють віднести
    його до того чи іншого жанру/традиції.'
  section: 'Конфліктна карта: Текст як зброя'
  words: 900
- points:
  - 'Аналіз ключових уривків: теми гідності, збереження ідентичності, віра в деокупацію Криму.'
  - 'Стилістика та голос автора: спокійний, аналітичний тон як форма спротиву емоційному виснаженню.'
  - 'Наративна стратегія: як Джелял перетворює особистий досвід на універсальне висловлювання про свободу та несвободу.'
  - '[!decolonization] Текст Джеляла як пряма відповідь на спробу колоніальної адміністрації змусити замовкнути голос корінного
    народу Криму.'
  section: 'Читання: Листи з камери'
  words: 1800
- points:
  - 'Історичні паралелі: ув''язнення Джеляла як метафора ув''язненого Криму та відлуння депортації 1944 року (Sürgünlik).'
  - 'Мова як дім: роль кримськотатарської та української мов у листах як спосіб ментального повернення на батьківщину.'
  - 'Пам''ять і майбутнє: як автор конструює бачення майбутнього Криму, перебуваючи в ізоляції.'
  - '[!decolonization] Розгляд справи Джеляла як прикладу використання колоніальною владою "закону" для придушення опору корінних
    народів.'
  - '[!epistemic-humility] Аналіз того, як особистий досвід автора переплітається з колективною травмою та надією цілого народу.'
  section: 'Вигнання та повернення: Ідентичність за ґратами'
  words: 1200
- points:
  - 'Повернення до розминки: Чи може текст, написаний в ув''язненні, бути вільним? Аргументована відповідь на основі аналізу.'
  - 'Рецепція та вплив: як листи Джеляла функціонують в українському та міжнародному просторі? Як вони впливають на сприйняття
    окупації Криму?'
  - '[!anti-hagiography] Критичне питання: наскільки наше сприйняття цих текстів зумовлене постаттю автора як політичного
    в''язня? Чи можлива "чиста" літературна оцінка?'
  section: Дискусія та підсумок
  words: 700
focus: Prison prose, intellectual resistance, Qırımtatar identity, and the role of the writer under occupation, based on the
  letters of Nariman Dzhelyal.
level: LIT-CRIMEA
module: lit-crimea-010
objectives:
- Аналізувати сучасну українську тюремну прозу як форму політичного та інтелектуального спротиву.
- Розрізняти літературні та публіцистичні аспекти в текстах, написаних в ув'язненні.
- Вписувати творчість Нарімана Джеляла в контекст історії репресій проти кримськотатарського народу та українського дисидентського
  руху.
- Формулювати власну позицію щодо ролі митця та громадянина в умовах окупації та гібридної війни.
pedagogy: CBI
persona:
