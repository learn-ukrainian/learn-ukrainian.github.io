content_outline:
- points:
  - 'Провокація: Чи може біографія бути зброєю? Розглядаємо тексти, що стали символами боротьби за повернення Криму.'
  - 'Цитата без контексту з твору Севгіль Мусаєвої: "Крим — це дім, який у тебе намагаються відібрати, але ключ від нього
    ти носиш біля серця". Про що це?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є ці тексти літературою, чи це журналістика/активізм? Аналіз на прикладі документальної прози Османа Алієва.'
  - 'Дебат 2: Автор як свідок vs автор як учасник. Як позиція автора (лідер руху Джемілєв, журналістка Мусаєва) впливає на
    довіру до тексту та його інтерпретацію?'
  - '[!epistemic-humility] Не існує "об''єктивної" біографії. Кожен текст — це вибір фактів, ракурсу та голосу. Наше завдання
    — зрозуміти цей вибір.'
  section: 'Конфліктна карта: Документ vs. Мистецтво'
  words: 900
- points:
  - 'Севгіль Мусаєва: аналіз есеїв про сучасний Крим. Як журналістський стиль поєднується з особистими рефлексіями та створює
    наратив для міжнародної аудиторії.'
  - 'Осман Алієв: читання уривків з документальної прози. Як літературні прийоми (діалоги, портрети, пейзажі) використовуються
    для розповіді реальних історій депортації та опору.'
  - 'Мустафа Джемілєв: аналіз уривків з мемуарів та промов. Голос політичного лідера, риторика боротьби, наратив голодування
    та ув''язнення як інструменти спротиву.'
  - '[!decolonization] Ці тексти повертають кримським татарам суб''єктність, оскаржуючи російський імперський наратив про
    "споконвічно російський" Крим.'
  section: 'Читання: Тексти спротиву'
  words: 1700
- points:
  - Депортація 1944 року як центральна травма, що постійно присутня в текстах, навіть коли вони про сьогодення. Аналіз передачі
    пам'яті між поколіннями.
  - Концепція повернення ("авдет") як рушійна сила. Це завершена подія 1990-х чи нескінченний процес, що триває й досі, особливо
    після 2014 року?
  - 'Крим як простір: фізичний ландшафт, втрачений дім, уявна батьківщина, окупована територія. Як по-різному автори конструюють
    образ Криму.'
  - '[!decolonization] Розгляд кримськотатарської літератури як літератури корінного народу, що чинить опір колоніальному
    стиранню ідентичності.'
  section: 'Вигнання та повернення: Пам''ять і депортація'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи може біографія бути зброєю? Студент формулює аргументовану відповідь на основі прочитаних
    текстів.'
  - 'Рецепція: як ці тексти читають у Криму, в материковій Україні та за кордоном? Чи змінюється їхнє значення залежно від
    аудиторії?'
  - 'Сучасна релевантність: як повномасштабне вторгнення 2022 року змінило чи посилило меседжі цих текстів про опір та ідентичність?'
  - '[!anti-hagiography] Важливо бачити в авторах не лише ікони спротиву, а й живих людей зі своїми сумнівами та складним
    вибором, що відображено в їхніх текстах.'
  section: Дискусія та підсумок
  words: 700
focus: The role of biographical narrative (Aliev, Musayeva) and political memoir (Dzhemilev) in shaping modern Crimean Tatar
  identity and the resistance movement.
level: LIT
module: aliev-musayeva-dzhemilev
objectives:
- Аналізувати роль літератури та журналістики в національно-визвольних рухах.
- Розрізняти жанри біографії, політичних мемуарів та документальної прози.
- Пояснювати центральне значення тем депортації та повернення (авдет) для кримськотатарської ідентичності.
- Критично оцінювати тексти, що поєднують мистецьку та політичну функції.
pedagogy: CBI
persona:
  role: 'Учасник національного руху, що наголошує: ці тексти — не просто "література", а живі документи боротьби, які треба
    читати серцем.'
  voice: Activist-Archivist
phase: LIT.CRIMEA
