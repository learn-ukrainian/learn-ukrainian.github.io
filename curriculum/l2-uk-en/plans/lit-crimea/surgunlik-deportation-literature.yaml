content_outline:
- points:
  - 'Провокація: Чи може література бути доказом у суді? Розглядаємо текст як свідчення злочину депортації.'
  - 'Цитата без контексту з твору про депортацію: "Товарний вагон став нашим домом, а стукіт коліс — єдиною колисковою". Хто,
    де, коли?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Естетика чи етика? Чи маємо ми право оцінювати літературу про травму за суто мистецькими критеріями (стиль,
    композиція)? Чи її головна цінність — акт свідчення?'
  - 'Дебат 2: Хто має право говорити? Дискусії навколо "привласнення" травми та репрезентації досвіду депортованих авторами,
    які не пережили цього особисто.'
  - '[!epistemic-humility] Немає єдиної "правильної" відповіді на ці питання. Завдання — зрозуміти аргументи обох сторін і
    сформулювати власну позицію.'
  section: 'Конфліктна карта: Мистецтво vs Свідчення'
  words: 900
- points:
  - Аналіз ключових уривків з творів кримськотатарських авторів (напр., Шаміль Алядін, Ешреф Шем'ї-заде) про депортацію 1944
    року.
  - 'Стилістика та мова: як автори передають травму через мовні засоби — розрив синтаксису, збіднення лексики, мовчання.'
  - Порівняльний аналіз з українською літературою про депортації та ГУЛАГ (напр., Іван Багряний).
  - '[!decolonization] Розгляд цих літератур як єдиного антиколоніального фронту проти російського імперіалізму, а не як окремих
    "національних" історій.'
  section: 'Читання: Голоси з вигнання'
  words: 1700
- points:
  - 'Аналіз образу Криму в літературі депортації: втрачений рай, міфологізований простір, земля предків.'
  - 'Повернення: як змінюється образ Криму в текстах, написаних після повернення? Ідеалізація vs реальність.'
  - 'Мовний ландшафт: взаємодія кримськотатарської, української та російської мов у сучасній літературі Криму.'
  - '[!decolonization] Викриття російського колоніального міфу про "споконвічно російський Крим" через літературні тексти,
    що зберігають пам''ять про корінний народ.'
  - '[!epistemic-humility] Погляд на окупацію Криму 2014 року як на продовження політики стирання пам''яті, розпочатої у 1944
    році.'
  section: 'Вигнання та повернення: Крим як втрачений і віднайдений простір'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чи може література бути доказом? Аргументація на основі проаналізованих текстів.'
  - 'Рецепція: як ці твори сприймались у радянський час (якщо публікувались) і як їх читають сьогодні?'
  - '[!anti-hagiography] Чи завжди автори, що пишуть про травму, є моральними авторитетами? Розгляд складних біографій і можливих
    компромісів із радянською владою.'
  - 'Сучасне значення: Чому читання літератури про депортацію є важливим для розуміння сучасної війни Росії проти України?'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Crimean Tatar and Ukrainian literature of deportation (sürgünlik), focusing on themes of exile, return,
  memory, and literary resistance against Russian colonial erasure.
level: LIT-CRIMEA
module: lit-crimea-001
objectives:
- Аналізувати твори кримськотатарської та української літератури, що тематизують депортацію та вигнання.
- Критично осмислювати роль літератури як інструменту збереження пам'яті та деколонізації.
- Розрізняти та аргументувати позиції в літературно-критичних дебатах щодо етики та естетики літератури травми.
- Застосовувати постколоніальну оптику для аналізу образу Криму в літературі.
pedagogy: CBI
