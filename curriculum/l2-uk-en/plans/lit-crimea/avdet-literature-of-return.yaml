activity_hints:
- description: Визначте, яка позиція (література як документ vs. література як мистецтво) підтримується наведеними цитатами
    критиків.
  focus: 'Розуміння конфліктної карти: Свідок чи Митець?'
  items: 4
  type: quiz
- description: 'Вставте в речення слова: авдет, депортація, вигнання, туга, самобутність — у правильній формі.'
  focus: Ключова лексика теми повернення
  items: 5
  type: fill-in
- description: Порівняйте уривок з оповідання Ервіна Умерова та фрагмент історичного свідчення про депортацію. Що література
    "бачить" такого, чого не фіксує документ?
  focus: 'Джерельний аналіз: Література vs Історія'
  type: note
- description: Як змінилося значення "повернення" для Криму та кримських татар після російської анексії 2014 року? Напишіть
    есе (400-600 слів), спираючись на ідеї з модуля.
  focus: 'Есе: Тема повернення після 2014 року'
  type: note
