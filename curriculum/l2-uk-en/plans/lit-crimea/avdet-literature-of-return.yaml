content_outline:
- points:
  - 'Провокація: Чи можна повернутися додому, якщо дому більше не існує? І що, якщо повернення — це не кінець, а початок нового
    вигнання?'
  - Цитата з твору про повернення в порожнечу, де знайомі пейзажі стали чужими, а рідна мова звучить як іноземна.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Авдет»-література — це перш за все історичне свідчення, документ епохи, чи автономний художній твір? [!epistemic-humility]'
  - 'Дебат 2: Канон літератури повернення. Чиї голоси ми чуємо, а чиї були змушені мовчати через радянську цензуру? Як сьогодні
    формується цей канон?'
  - '[!epistemic-humility] Позиція: одні критики наполягають на документальній цінності (література як доказ злочину), інші
    — на естетичній самостійності (де травма — лише матеріал).'
  section: 'Конфліктна карта: Література як свідок чи митець?'
  words: 900
- points:
  - 'Близьке читання ключових уривків: аналіз мотивів, символів та психологічного стану героїв, що повернулися.'
  - 'Наративна структура: як автор передає відчуття розірваності часу та простору через композицію твору.'
  - 'Стилістика та мова Умерова: лаконічність, психологізм, відсутність прямих оцінок як спосіб передачі травми.'
  - '[!decolonization] Розгляд творчості Умерова в контексті кримськотатарської та української літератур, а не як частини
    «радянської багатонаціональної» літератури.'
  section: 'Читання: Оповідання Ервіна Умерова "Самотність"'
  words: 1700
- points:
  - 'Література депортації: як вигнання трансформує мову, пам''ять та ідентичність.'
  - Крим як метафора втраченої батьківщини, міфологізований простір, об'єкт ностальгії та поле боротьби.
  - 'Мовна ситуація: взаємодія та конфлікт кримськотатарської, української та російської мов у текстах.'
  - '[!decolonization] Викриття російського колоніального наративу про «споконвічно російський Крим» через літературні тексти,
    що зберігають історичну пам''ять.'
  - '[!epistemic-humility] Паралельний досвід української та кримськотатарської літератур вигнання — спільне та відмінне.'
  section: 'Вигнання та повернення: Крим як текст і територія'
  words: 1200
- points:
  - 'Повернення до початкового питання: як література відповідає на питання про можливість повернення.'
  - 'Рецепція творів про «Авдет»: як їх читали в 1990-ті і як читають після анексії 2014 року?'
  - '[!anti-hagiography] Критичний погляд на романтизацію повернення. Чи завжди повернення є щасливим кінцем?'
  - 'Рефлексія: як ваше розуміння Криму та кримськотатарської історії змінилося після аналізу цих текстів?'
  section: Дискусія та підсумок
  words: 700
focus: Crimean Tatar literature of return (Avdet), themes of exile and memory, analysis of key authors (e.g., Ervin Umerov),
  decolonial perspective on Crimean culture
level: LIT-CRIMEA
module: lit-crimea-001
objectives:
- Аналізувати ключові теми та стилістичні особливості кримськотатарської літератури повернення ("Авдет").
- Критично оцінювати літературний твір як історичне свідчення та як естетичний об'єкт.
- Застосовувати деколоніальну оптику для аналізу літератури, створеної в умовах імперського тиску.
- Формулювати власну позицію щодо ролі літератури у збереженні та переосмисленні історичної пам'яті.
