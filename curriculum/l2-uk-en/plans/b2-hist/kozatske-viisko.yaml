module: b2-hist-048
level: B2-HIST
sequence: 48
slug: kozatske-viisko
version: '2.0'
title: Козацьке військо та озброєння
subtitle: Cossack Army and Weaponry
content_outline:
- section: 'Вступ: Феномен козацького війська'
  points:
  - Universal military service and democracy — concept of 'Лицарський люд' (Knightly
    people) and distinct social status
  - International reputation of Cossack mercenaries — valued from France (Dunkirk)
    to Persia; [!history-bite] about Thirty Years' War participation
- section: 'Структура та Ієрархія: Від коша до полку'
  points:
  - The role of the Hetman and General Staff — Oboznyi (logistics), Suddia (justice),
    Pysar (intelligence/records), Osavuly (aides), Khorunzhyi (flag-bearer)
  - Territorial and functional divisions — [!context] Administrative division of Hetmanate
    (regiments/hundreds) duplicated military structure; state as 'military camp'
  - Discipline and military code — strict alcohol ban during campaigns; death penalty
    for disobedience
- section: 'Озброєння: Шабля, самопал та гармата'
  points:
  - 'Individual weaponry: fire and steel — priority of firearms (muskets/samopaly);
    3-rank volley fire tactic (fire-pass-load)'
  - The cult of the sabre (shablya) — [!myth-buster] Sabre as 'weapon of last resort'
    or cavalry, while infantry relied on fire; curved eastern type
  - 'Artillery: mobility and psychological impact — light field falconets transported
    on wagons; high status of artillery masters'
- section: 'Тактика бою: Козацький табір та розвідка'
  points:
  - The 'tabor' as a defensive fort — [!decolonization] Wagenburg (moving fortress
    of chained wagons) as prototype of modern armored units
  - 'Cossack ''plastuny'' (scouts) — special operations skills: underwater breathing
    (reeds), camouflage in steppe'
  - Siege warfare and river raids — use of 'chaika' boats for sea raids (e.g., Kafa);
    engineering skills (mining, earthworks)
- section: 'Символіка та Клейноди: Знаки влади'
  points:
  - Bulava, bunchuk, and seals — Bulava (Hetman), Bunchuk (horse tail command symbol),
    Seal ('Knight with Musket')
  - The sacred meaning of the banner (khoruhva) — [!culture] Loss of khoruhva equated
    to defeat/shame; Crimson banner with Archangel Michael
- section: 'Читання: Опис козацького вишколу'
  points:
  - Account of a foreign observer on Cossack training — Guillaume Le Vasseur de Beauplan
    on endurance, orientation, and gunpowder making
- section: 'Первинні джерела: Голоси епохи'
  points:
  - Analysis of official documents and letters — Khmelnytskyi's diplomatic correspondence
    vs Cossack chronicles (Hrabianka/Velychko)
- section: Деколонізаційний погляд
  points:
  - Cossacks as a modern professional army, not a 'rabble' — debunking 'anarchy/bandit'
    myths; 'Christian Republic' concept
  - Influence on European military science — adoption of Cossack infantry tactics
    and light cavalry models by Europe
  - Ukraine's military subjectivity — [!perspective] 'Antemurale Christianitatis'
    (Bulwark of Christianity); recognized by European monarchs and Pope
vocabulary_hints:
  required:
  - булава (mace/baton) — символ влади гетьмана; вручалася на раді
  - пернач (mace with flanges) — символ влади полковника
  - самопал (musket/firearm) — основна зброя козацької піхоти; 'козак з самопалом'
  - шабля (sabre) — символічна зброя; 'козацька шабля', 'гостра шабля'
  - гармата (cannon) — 'козацька артилерія', 'влучити з гармати'
  - полк (regiment) — адміністративно-військова одиниця; 'Київський полк'
  - сотня (company/hundred) — підрозділ полку; 'козацька сотня'
  - кіш (encampment/command) — 'Запорозький Кіш', центр управління
  - обоз (baggage train) — 'військовий обоз', логістика
  - хоругва (banner) — 'військова хоругва', символ честі
  recommended:
  - клейноди (regalia) — символи влади (булава, бунчук, печатка)
  - реєстровець (registered Cossack) — професійний військовий на службі
  - пластун (scout) — козацький розвідник
  - чайка (boat) — бойовий човен для морських походів
  - табір (camp/wagon fort) — 'рухома фортеця', тактичний прийом
  - курінь (battalion/barracks) — військова одиниця на Січі
  - довбиш (drummer) — відповідальний за литаври і скликання ради
