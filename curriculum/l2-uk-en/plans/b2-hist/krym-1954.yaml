title: 'Крим 1954: Передача УРСР'
subtitle: 'Crimea 1954: Transfer to Ukraine'
content_outline:
- section: 'Вступ: «Подарунок» чи рішення?'
  points:
  - '19 лютого 1954: дата передачі — Указ Президії Верховної Ради СРСР № 129/2; date:
    19.02.1954'
  - 'Російський міф про «подарунок Хрущова» — спростування: рішення було колегіальним
    (Маленков, Ворошилов) та економічно вимушеним; hook: [!myth-buster]'
  - Чому це питання актуальне сьогодні — Путін використовує міф про «незаконність»
    для виправдання анексії 2014 року
- section: 'Контекст: Крим до 1954 року'
  points:
  - 'Депортація кримських татар 1944 року — 18-20 травня, виселення ~200 тис. корінного
    населення; hook: [!context]'
  - Крим як «спустошена земля» — економічна руїна, врожайність садів на рівні 1913
    року, зернових — мізерні 3,9 ц/га, критичний брак води
  - 'Економічні зв''язки з Україною — територіальна близькість та залежність від материкових
    ресурсів; note: провал переселенців з РРФСР, які не вміли господарювати в горах'
  - Північно-Кримський канал — початок масштабного проєкту зрошення степу, реалізованого
    силами УРСР (запуск 1961, але планування пов'язане з передачею)
- section: 'Передача: як це відбулося'
  points:
  - 'Ініціатива та прийняття рішення — візит Хрущова у вересні 1953, скарги російських
    переселенців, терміновий виліт до Києва вмовляти українське керівництво (Кириченка);
    hook: [!history-bite]'
  - Указ Президії Верховної Ради СРСР — підписано 19.02.1954, затверджено законом
    26.04.1954
  - 'Офіційне обґрунтування: економічна доцільність — цитата: «Враховуючи спільність
    економіки, територіальну близькість і тісні господарські й культурні зв''язки...»'
  - Процедура за радянським законодавством — повна відповідність Конституції СРСР
    1936 року (згода РРФСР 5 лютого і УРСР 13 лютого)
  - Реакція в УРСР та РРФСР — для України це був «хомут» і обов'язок відбудови, а
    не нагорода
- section: Первинні джерела
  points:
  - Текст указу 1954 року — аналіз офіційного формулювання без згадки про «300-річчя»
    Переяславської ради (згадувалося лише ритуально в інших документах)
  - 'Протоколи засідань — документи Президій РРФСР (5 лютого) та УРСР (13 лютого);
    hook: [!source]'
  - Радянська преса того часу — газета «Кримська правда» про «радість возз'єднання»
    та плани на «води Дніпра»
- section: Деколонізаційний погляд
  points:
  - 'Російська міфологія «подарунка» — деконструкція наративу про «волюнтаризм» та
    «п''яного Хрущова»; myth: «Крим — ісконно русская зємля»'
  - Юридична легітимність передачі — протидія сучасному російському правовому нігілізму
    та спробам скасувати акти заднім числом
  - 'Крим і кримські татари: забутий народ — передача відбулася без урахування думки
    киримли (спецпоселенців), але це не змінило їхній статус; hook: [!decolonization]'
- section: 'Підсумок: Від 1954 до 2014'
  points:
  - Крим у незалежній Україні — інфраструктурний розквіт, курорти, «Артек», побудовані
    за українські кошти
  - Автономна Республіка Крим — референдум 1 грудня 1991 (54% підтримки незалежності
    в Криму)
  - 'Російська анексія 2014: псевдоісторичні аргументи — ігнорування 60 років української
    праці та інвестицій; hook: [!culture]'
vocabulary_hints:
  required:
  - передача (transfer) — передача області, акт передачі, законність передачі
  - указ (decree) — підписати указ, згідно з указом, текст указу
  - президія (presidium) — Президія Верховної Ради, засідання президії
  - автономія (autonomy) — кримська автономія, статус автономії, відновити автономію
  - депортація (deportation) — наслідки депортації, сталінська депортація, жертви
    депортації
  - анексія (annexation) — незаконна анексія, спроба анексії, виправдання анексії
  - юридичний (legal) — юридична підстава, юридичний аспект, юридична сила
  - законодавство (legislation) — чинне законодавство, порушення законодавства, згідно
    із законодавством
  recommended:
  - доцільність (expediency) — економічна доцільність, політична доцільність
  - легітимність (legitimacy) — сумнівна легітимність, визнавати легітимність
  - референдум (referendum) — всеукраїнський референдум, результати референдуму, провести
    референдум
  - суверенітет (sovereignty) — державний суверенітет, повага до суверенітету
  - територія (territory) — територіальна цілісність, на території, прилегла територія
  - пропаганда (propaganda) — ворожа пропаганда, міфи пропаганди, жертва пропаганди
