module: b2-hist-110
level: B2-HIST
sequence: 110
slug: deportatsii-ukraintsiv
version: '2.0'
title: Депортації українців 1944-1951
subtitle: Deportations of Ukrainians 1944-1951
content_outline:
- section: 'Вступ: Післявоєнні переселення'
  points:
  - 'Контекст: нові кордони та «обмін населенням» — Угода 9 вересня 1944 року та встановлення
    кордону по «Лінії Керзона»; engagement hook: [!context] Мапа «Закерзоння» як втрачених
    етнічних земель'
  - Радянська та польська політика щодо українців — прагнення Сталіна та польських
    комуністів створити моноетнічні держави
  - 'Масштаб трагедії: сотні тисяч переміщених — сумарно понад 700 тисяч осіб (1944–1951);
    етапи: 1944–46, 1947 («Вісла»), 1951 (обмін територіями)'
- section: Депортації до СРСР (1944-1946)
  points:
  - 'Примусове переселення з Закерзоння — від «добровільного» етапу до масового терору
    з 1945 року; engagement hook: [!myth-buster] Радянський термін «евакуація» як
    прикриття для етнічної чистки'
  - Умови транспортування та прибуття — товарні вагони, мінімальний час на збори,
    втрата майна та худоби
  - 'Розселення в Україні: нове життя на чужій землі — переважно західні області (Тернопільська,
    Львівська), заселення в покинуті польські хати'
  - Втрата культурної спадщини — розрив родинних зв'язків, втрата локальних традицій
    та діалектів
- section: Операція «Вісла» (1947)
  points:
  - 'Політичні причини: боротьба з УПА як привід — вбивство генерала Свєрчевського
    як формальний привід для каральної акції проти цивільних'
  - Примусове виселення з Лемківщини, Надсяння, Холмщини — квітень-липень 1947 року,
    повна депопуляція цілих регіонів
  - 'Розпорошення на «Відновлених землях» Польщі — стратегія асиміляції: заборона
    селитись більше 3-4 родин на село (не більше 10% населення)'
  - 'Знищення лемківської та холмської культури — ліквідація греко-католицької церкви,
    ув''язнення інтелігенції; engagement hook: [!history-bite] Концтабір Явожно як
    місце репресій українців'
- section: Первинні джерела
  points:
  - 'Спогади депортованих — фіксація травми втрати «свого світу» (гір, церков); include
    quote: «Нас викинули в чисте поле, як худобу»'
  - Польські та радянські документи — докази координації дій НКВС та польської безпеки
    (UB) для знищення українського підпілля
  - 'Листи переселенців — скарги бойків (депортація 1951 року) на нестерпні умови
    в степах Півдня України; engagement hook: [!quote] Уривок про контраст між горами
    та степом'
- section: Деколонізаційний погляд
  points:
  - 'Етнічна чистка як інструмент імперій — спростування тези про «гуманізм», принцип
    колективної відповідальності; engagement hook: [!decolonization] Порівняння аргументації
    польських комуністів з сучасною російською пропагандою'
  - 'Паралелі: депортації кримських татар — спільний почерк тоталітарного режиму (1944
    рік, товарні вагони, спецпоселення)'
  - Сучасне визнання та пам'ять — засудження операції «Вісла» Сенатом Польщі (1990),
    дискусії навколо терміну «геноцид»
- section: 'Підсумок: Спадщина травми'
  points:
  - Лемки та холмщаки сьогодні — асиміляція в Польщі vs збереження пам'яті в діаспорі
  - Польсько-українське примирення — складний діалог істориків, спільні молитви, відновлення
    цвинтарів
  - 'Уроки для сучасності — важливість культурної пам''яті; engagement hook: [!culture]
    Фестиваль «Ватра» як символ єднання розсіяної спільноти'
vocabulary_hints:
  required:
  - депортація (deportation) — масова депортація, примусова депортація
  - переселення (resettlement) — «добровільне» переселення (іронічно), угода про переселення
  - етнічна чистка (ethnic cleansing) — класична етнічна чистка, ознаки етнічної чистки
  - виселення (eviction) — насильницьке виселення, раптове виселення
  - репатріація (repatriation) — міф про репатріацію, так звана репатріація
  - розпорошення (dispersal) — розпорошення населення, мета розпорошення
  - операція (operation) — каральна операція, військова операція
  - примус (coercion) — під примусом, елементи примусу
  recommended:
  - ешелон (echelon/train) — товарні ешелони, довгі ешелони
  - табір (camp) — концтабір Явожно, збірний пункт
  - біженець (refugee) — статус біженця, доля біженців
  - репресії (repressions) — політичні репресії, масові репресії
  - колективізація (collectivization) — примусова колективізація на нових місцях
  - асиміляція (assimilation) — мовна асиміляція, повна асиміляція
