title: 'Михайло Чернігівський: Опір Орді'
content_outline:
- section: Вступ
  points:
  - 'Постать Михайла Всеволодовича у контексті ХІІІ століття — [!context] релігія
    і політика були нероздільні: відмова від обряду була політичним бунтом; Чернігівське
    князівство як один з найпотужніших центрів Русі'
  - Символізм мученицької смерті для української ідентичності — відмова визнати повну
    духовну владу загарбника (зміна світогляду через ритуали очищення)
- section: 'Читання: Життя та опір Михайла Чернігівського'
  points:
  - 'Княжіння в Чернігові та боротьба за Київ — хронологія: 1238–1239 (перше княжіння),
    1241–1243 (друге княжіння); конфлікти і союзи з Данилом Галицьким'
  - Подорож до Орди та відмова від язичницьких обрядів — 1246 рік; вимога Батия пройти
    між вогнями («очищення від злих намірів») і вклонитися зображенню Чінгісхана
  - 'Смерть Михайла та боярина Федора як акт політичного протесту — [!history-bite]
    Михайло був одним з небагатьох (на відміну від Невського), хто обрав смерть замість
    приниження; дата страти: 20 вересня 1246 року'
  - Канонізація та вшанування пам'яті в Україні — офіційна канонізація 1547 року;
    святий Чернігівської землі, а не загальноросійський (деколонізація)
- section: Первинні джерела
  points:
  - 'Аналіз літописних розповідей про загибель князя — Галицько-Волинський літопис
    (Іпатський список); цитата: «Тобі, царю, поклонюся, бо Бог доручив тобі царство...
    а тому, чому ці кланяються, не поклонюся»'
  - 'Житійні тексти як історичне джерело — «Сказання про вбивство в Орді...» як літературний
    твір, що акцентує на духовному подвигу; [!quote] слова Федора: «Не погуби душі,
    а тіла не бійся»'
- section: Деколонізаційний погляд
  points:
  - Міф про 'покірну Русь' та реальність князівського спротиву — [!myth-buster] розвінчання
    радянського наративу про суцільну покору в період 'іга'; українські князі (Михайло,
    Данило) чинили опір
  - Порівняння стратегій Михайла Чернігівського та московських князів — [!decolonization]
    контраст з Олександром Невським (колаборація/виживання) проти Михайла (гідність/смерть);
    дві різні політичні культури
- section: Потрібно більше практики?
  points:
  - Додаткові матеріали про опір українських князів ординському пануванню — [!culture]
    ікони та церква Михайла і Федора у Чернігові як елементи сакральної спадщини
  - 'Порівняння різних стратегій виживання під монгольською владою — тема есе: «Ціна
    компромісу: Михайло Чернігівський проти Олександра Невського»'
focus: history
pedagogy: CBI
