module: b2-hist-001
level: B2-HIST
sequence: 1
slug: trypillian-civilization
version: '2.0'
title: Трипільська цивілізація
subtitle: Trypillian Civilization — Origins of Ukrainian Land
content_outline:
- section: Вступ
  points:
  - Що таке Трипільська цивілізація (Кукутені-Трипілля) — феномен «Старої Європи»
    на теренах України, Молдови та Румунії
  - Хронологія та географія (5500-2750 рр. до н.е.) — від Трипілля А (Карпати) до
    С2 (розпорошення населення); аграрна основа демографічного вибуху
- section: Читання
  points:
  - 'Читання первинного джерела: Звіт В. Хвойки (1893-1896) про розкопки на Кирилівській
    вул. та захоплення «мальованою керамікою»'
- section: Історія відкриття
  points:
  - 'Вікентій Хвойка (1850-1914) та перші розкопки (1896) — [!biography]: чех, що
    став батьком української археології; тріумф на XI з''їзді (1899)'
  - Розвиток досліджень у XX-XXI ст. — від «первісного комунізму» до розуміння як
    протоцивілізації
  - Магнітна зйомка та сучасні методи — британсько-українські експедиції 2010-х; плани
    мегапоселень без розкопок
- section: Первинні джерела
  points:
  - Документи та археологічні звіти — щоденники Хвойки як зразок пристрасті та методичності;
    артефакти як «мовчазний текст»
- section: Протоміста
  points:
  - Масштаби поселень (до 15,000 мешканців) — порівняння з тогочасним Шумером; поселення-гіганти
    на Черкащині (450 га)
  - Планування та архітектура — радіально-концентрична забудова; двоповерхові глинобитні
    житла з розписаними інтер'єрами
  - 'Феномен «горизонту спалених хат» — [!history-bite]: ритуал завершення життєвого
    циклу дому кожні 60-80 років (гіпотеза М. Відейка)'
  - Майданецьке, Тальянки та Небелівка — мегапоселення як ознака складної соціальної
    структури
- section: Господарство та економіка
  points:
  - Землеробство (пшениця-однозернянка, ячмінь, горох) — перелогова система та садівництво
    (алича)
  - Скотарство (бик як тяглова сила та об'єкт культу, свині, вівці)
  - Торгівля та обмін — обмінна економіка; спеціалізація гончарів та металургів як
    ознака поділу праці
- section: Ремесла та технології
  points:
  - 'Трипільська кераміка — [!culture]: триколірний розпис (чорний, червоний, білий)
    без гончарного кола; унікальні «біноклі» без дна'
  - Металургія міді — виготовлення знарядь праці та прикрас; енеоліт як перехідна
    доба
  - Ткацтво та обробка шкіри — відбитки тканин на кераміці як доказ технологічного
    поступу
- section: Духовний світ та суспільний устрій
  points:
  - Релігійні вірування (культ Великої Богині-Матері та Бика) — змія як охоронець;
    солярна символіка (сварга)
  - 'Статуетки богині-матері — [!myth-buster]: матріархат чи культ жіночності? Хата
    як храм з хрестоподібним вівтарем'
  - Соціальна структура — егалітарне суспільство; відсутність «царських» поховань
    та палаців; рада старійшин
- section: Деколонізаційний погляд
  points:
  - 'Развінчання радянського міфу про «примітивних дикунів» — [!decolonization]: перехід
    від «археологічної культури» до «цивілізації»'
  - Протидія імперському привласненню — акцент на гігантизмі поселень саме на українських
    теренах; зв'язок з локальним ландшафтом
  - 'Автохтонна спадщина — «трипільський ген»: естетика біленої хати, сакралізація
    землі та аграрна ментальність українців'
- section: Потрібно більше практики?
  points:
  - 'Музеї: Трипілля, Київ (НМІУ), Легедзине; заповідник «Трипільська культура»'
  - 'Практика: участь у реконструкції (толока в Легедзиному); аналіз орнаментів як
    «тексту»'
vocabulary_hints:
  required:
  - трипільська культура (Trypillia culture) — відкрити трипільську культуру (Хвойка)
  - археологія (archaeology) — провідний археолог, археологічний з'їзд
  - енеоліт (Eneolithic, Chalcolithic period) — доба енеоліту, мідно-кам'яний вік
  - поселення (settlement) — гігантські поселення, радіально-концентричне планування
  - кераміка (ceramics, pottery) — мальована кераміка, триколірний розпис
  - розпис (painting, ornamentation) — геометричний розпис, спіралеподібний орнамент
  - статуетка (figurine) — теракотова статуетка, антропоморфна пластика
  - землеробство (agriculture) — аграрна цивілізація, мотичне землеробство
  - скотарство (animal husbandry) — приручення тварин, тяглова сила
  - артефакт (artifact) — унікальний артефакт, знахідка
  - розкопки (excavations) — масштабні розкопки, звіт про розкопки
  - культ (cult) — культ родючості, солярний культ
  - протомісто (proto-city) — трипільські протоміста, мегапоселення
  - орнамент (ornament) — символіка орнаменту, засіяне поле
  - спіраль (spiral) — плин часу, вічність
  - родючість (fertility) — Велика Богиня-Матір, сакралізація землі
  - автохтонний (autochthonous, indigenous) — автохтонний розвиток, місцеве коріння
  - спадщина (heritage, legacy) — культурна спадщина, трипільський ген
  recommended:
  - матріархат (matriarchy) — гіпотеза про матріархат, культ жінки-матері
  - егалітарний (egalitarian) — егалітарне суспільство, соціальна рівність
  - первісний (primitive, primordial) — первісний лад, спростування міфу
  - металургія (metallurgy) — обробка міді, мідні знаряддя
  - горно (kiln) — гончарне горно, випал кераміки
  - перелогове землеробство (slash-and-burn agriculture) — виснаження земель при перелоговій
    системі
  - сакральний (sacred) — сакральний простір хати, ритуальне спалення
  - вівтар (altar) — хрестоподібний вівтар, пожертва
  - богиня-матір (mother goddess) — символ родючості, жіноче начало
  - хронологія (chronology) — періодизація, етап Трипілля С1
activity_hints:
- type: reading
  focus: 'Аналіз первинного джерела: звіт Вікентія Хвойки про розкопки 1896 року'
  source: Excerpt provided in lesson
- type: critical-analysis
  focus: 'Верифікація фактів: Перевірка розуміння фактів про хронологію, географію
    та культуру Трипілля'
  items: 5
- type: essay-response
  focus: Чи можна вважати трипільців прямими предками сучасних українців? Аргументуйте.
  min_words: 200
- type: critical-analysis
  focus: Інтерпретація орнаментів трипільської кераміки та статуеток богині-матері
  items: 3
- type: comparative-study
  focus: Порівняння Трипільської культури з цивілізаціями Месопотамії
  items: 1
focus: history
pedagogy: seminar
prerequisites:
- Завершення B2 Core (граматика минулого часу, пасивні конструкції)
- Базова історична лексика (держава, народ, культура)
- Розуміння концепції археологічних епох
connects_to:
- scythians-sarmatians (M02) — наступна велика культура на українських землях
- sloviany-origins (M04) — слов'янські племена та їхнє походження
- syntez-vytoky-1 (M08) — синтез фази HIST.1
objectives:
- Учень може описати Трипільську цивілізацію як одну з найдавніших та найрозвиненіших
  культур Європи доби енеоліту
- Учень може проаналізувати первинні джерела про археологічні відкриття Вікентія Хвойки
  та сучасних дослідників
- Учень може порівняти трипільські протоміста з іншими стародавніми цивілізаціями
  (Шумер, Єгипет)
- Учень може пояснити феномен «горизонту спалених хат» та його можливі причини
- Учень може аргументувати значення Трипільської спадщини для розуміння глибини української
  історії
grammar:
- 'Історичний наратив: побудова розповіді про минулі події'
- Минулий час у науковому тексті (описували, будували, створювали)
- Пасивні конструкції (були виявлені, вважається, називають)
- Порівняльні структури (більший за, нагадує, на відміну від)
