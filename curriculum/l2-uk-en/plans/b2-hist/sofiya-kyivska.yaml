module: b2-hist-014
level: B2-HIST
sequence: 14
slug: sofiya-kyivska
version: '2.0'
title: Софія Київська та культурний розквіт
content_outline:
- section: Вступ
  points:
  - Символ мудрості та могутності — «Діамант у короні» Ярослава; місце коронацій,
    судів та поховань еліти
  - 'Державний статус — не просто церква, а «головний офіс» Русі-України; engagement
    hook: [!history-bite]'
- section: 'Архітектура собору: Візантійський канон та київська сміливість'
  points:
  - 'Історичне тло: Майстри та замисел — грецькі архітектори з Константинополя та
    місцеві учні; дискусія про дату заснування (1011 vs 1037)'
  - 'Конструктивні особливості — 13 куполів (Христос і 12 апостолів) та пірамідальна
    композиція; деколонізаційний аспект: унікальний київський стиль, відсутній у тогочасній
    Росії (Заліссі)'
  - 'Техніка мурування: Opus Mixtum — «смугаста» кладка з каменю та плінфи на рожевому
    розчині (цем''янці); engagement hook: [!context]'
- section: 'Мозаїки та фрески: Біблія у кольорі'
  points:
  - Світлоносна Мозаїка — смальта (177 відтінків), мерехтіння світла; Оранта «Нерушима
    стіна» — легенда про стійкість Києва
  - 'Живописні Фрески — унікальні світські сюжети на стінах храму: полювання на вепра,
    скоморохи, іподром Константинополя (сходи на хори)'
- section: 'Графіті Софії: Голоси киян XI-XIII століть'
  points:
  - 'Про що писали кияни? — «Середньовічний Facebook»: скарги, молитви, прокляття,
    любовні зізнання та політичні новини; engagement hook: [!culture]'
  - 'Мовний аспект — жива староукраїнська мова (риси: «Володимир», «Олекса», «помагай»),
    відмінна від церковнослов''янської книжної'
- section: 'Культурний розквіт: "Афіни Сходу"'
  points:
  - Скрипторій та Бібліотека
  - Літературна школа
- section: Читання
  points:
  - Інтелектуальний центр Русі — Іларіон Київський та його «Слово про Закон і Благодать»
    як маніфест політичної суверенності від Візантії
- section: Первинні джерела
  points:
  - 'Документ 1: «Повість минулих літ» про заснування Софії (1037 р.) — цитата про
    «писців многих» та переклади книг'
  - 'Документ 2: Графіті про смерть Ярослава Мудрого (1054 р.) — титулування князя
    «царем» (рівним імператору); engagement hook: [!source]'
- section: Таємниця саркофага Ярослава Мудрого
  points:
  - Історія відкриттів — 6-тонний саркофаг, зникнення кісток Ярослава (версія про
    вивезення до США)
  - 'Сучасні дослідження (2009) — виявлення лише жіночого скелета (Інгегерда?) та
    радянської газети; engagement hook: [!mystery]'
- section: 'Дзвіниця: Голос Києва'
  points:
  - 'Історична доля: Від занепаду до відродження — роль гетьмана Івана Мазепи у відбудові;
    стиль козацького бароко (бірюзово-білий); engagement hook: [!myth-buster]'
- section: Деколонізаційний погляд
  points:
  - Міфи та реальність — спростування імперського міфу про «спільну колиску»; Софія
    як доказ європейської суб'єктності Києва
  - 'Сучасна Україна — повернення справжніх титулів (каган, цар) замість нав''язаних
    пізніше «князів»; engagement hook: [!decolonization]'
- section: Потрібно більше практики?
  points:
  - 🔄 Інтеграція знань — порівняння мозаїк Софії та Равенни
  - Реальне застосування — віртуальний тур заповідником
  - 🌐 Онлайн-ресурси — сайт «Софія Київська» та база графіті
vocabulary_hints:
  required:
  - собор (cathedral) — головний храм міста, символ віри
  - мозаїка (mosaic) — мистецтво зі смальти, вічна техніка
  - фреска (fresco) — розпис по вологій штукатурці
  - Оранта (Oranta) — «Нерушима стіна», захисниця Києва
  - купол (dome) — баня, символ неба (13 куполів Софії)
  - неф (nave) — частина внутрішнього простору храму
  - візантійський (Byzantine) — стиль Константинополя, канон
  - бароко (Baroque) — козацьке бароко, стиль Мазепи
  - графіті (graffiti) — видряпані написи, жива історія
  - митрополит (metropolitan) — голова церкви, Петро Могила
  - літописання (chronicle writing) — фіксація історії, скрипторій
  - іконопис (icon painting) — канонічне зображення святих
  recommended:
  - хрестово-купольний (cross-domed) — тип храму, архітектурна схема
  - Нерушима стіна (Unbreakable Wall) — епітет Оранти, символ стійкості
  - смальта (smalto) — кольорове скло для мозаїк
  - заповідник (reserve/sanctuary) — охоронна зона, музейний комплекс
  - юрисдикція (jurisdiction) — церковна влада, підпорядкування
