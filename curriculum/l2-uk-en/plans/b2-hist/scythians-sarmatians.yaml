title: Скіфи та сармати — Володарі степу
subtitle: Scythians and Sarmatians
content_outline:
- section: Розминка
  points:
  - Географія Степу — Україна як західний край Великого Євразійського степу («автобан
    давнини») та унікальність лісостепу
  - Хто такі кочівники? — мобільні скотарі з сезонними маршрутами, багатство у худобі
    (коні, вівці), життя в кибитках
- section: 'Читання: Скіфи: Імперія золота'
  points:
  - Історичне тло — VII ст. до н.е., витіснення кімерійців, початок скіфського панування
  - Війна з Дарієм — 513 р. до н.е., тактика «випаленої землі», символічні дари царя
    Іданфірса (птах, миша, жаба, стріли)
  - Повсякденне життя — одяг (анаксириди, каптани, башлики), любов до золота, звичай
    пити нерозбавлене вино
- section: 'Сармати: Жінки-воїни та Катафракти'
  points:
  - Важка кіннота — винахід катафрактаріїв (лускатий обладунок для вершника і коня),
    довгий спис для таранного удару
  - Матріархат і амазонки — археологічні підтвердження (20% жіночих поховань зі зброєю),
    грецький стереотип «керовані жінками»
  - Сарматський побут — агресивніша культура, вплив на ідеологію польського «сарматизму»
- section: Культура та Мистецтво
  points:
  - Звіриний стиль — сцени боротьби хижаків, магічна функція (передача сили та швидкості
    власникові)
  - Металургія та ремесла — співпраця з грецькими ювелірами Ольвії та Пантікапея,
    високий рівень лиття
  - 'Ритуал поховання (Товста Могила) — знахідка Бориса Мозолевського (1971), Пектораль
    як модель Всесвіту (три яруси: підземний, древо життя, людський)'
- section: Первинні джерела
  points:
  - Геродот про скіфів — «Історія» (книга «Мельпомена»), опис відмови від генеральної
    битви та ритуалів побратимства
  - Страбон про сарматів — опис племен (роксолани, язиги) та їхній контроль над торгівлею
    зі Степом
- section: Деколонізаційний погляд
  points:
  - Міф про 'диких кочівників' — спростування радянського нарративу, концепція «Степової
    цивілізації» та зони контактів
  - Скіфська спадщина України — «скіфи-орачі» як праслов'яни, паралелі в одязі (вишивка,
    шаровари) та зачісках («оселедець»)
- section: Підсумок
  points:
  - Вплив на українську культуру — синтез осілої (трипільської) та кочової (скіфської)
    традицій
  - Генетичний та культурний код — образ «Козака Мамая» як пряма іконографічна спадкоємність
    від скіфа з бандурою
vocabulary_hints:
  required:
  - скіфи (Scythians) — Велика Скіфія, скіфське золото
  - сармати (Sarmatians) — сарматська кіннота, сарматський побут
  - кочівники (nomads) — кочовий спосіб життя, світ кочівників
  - степ (steppe) — Дике Поле, степовий простір
  - курган (burial mound) — скіфський курган, розкопки кургану
  - пектораль (pectoral) — Золота пектораль, пектораль з Товстої Могили
  - кіннота (cavalry) — важка кіннота, катафрактарії
  - лучник (archer) — кінний лучник, скіфський постріл
  - звіриний стиль (animal style) — скіфський звіриний стиль, динаміка хижаків
  - плем'я (tribe) — об'єднання племен, вождь племені
  - цар (king/tsar) — скіфський цар, цар Атей
  - золото (gold) — символ сонця, влада золота
  recommended:
  - царство (kingdom) — Скіфське царство
  - завоювання (conquest) — перське завоювання
  - торгівля (trade) — грецька торгівля
  - амазонка (Amazon warrior) — жінки-воїни, міф про амазонок
  - топонім (toponym) — скіфські назви річок (Дніпро, Дністер)
  - сарматизм (Sarmatism) — шляхетська ідеологія
  - алани (Alans) — пізні сармати
