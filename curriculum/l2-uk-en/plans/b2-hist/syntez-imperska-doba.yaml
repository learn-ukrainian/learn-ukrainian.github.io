slug: syntez-imperska-doba
version: '2.0'
title: 'Синтез: Імперська доба'
subtitle: 'Synthesis: The Imperial Era'
content_outline:
- section: 'Вступ: Два імперії'
  points:
  - Російська та Австро-Угорська імперії — контраст між централізованою самодержавною
    Росією та конституційною «клаптиковою» Австрією (з 1867) — початок політичного
    осмислення з 1840-х (Кирило-Мефодіївське братство)
  - 'Поділ українських земель — 90% території під Романовими (Наддніпрянщина), 10%
    під Габсбургами (Галичина, Буковина, Закарпаття); engagement hook: [!context]
    — Карта поділу: контраст політичного життя'
  - Чому імперська доба важлива — період формування модерної нації та «Австрійського
    П'ємонту», що врятував ідентичність від повного знищення — вплив «Весни народів»
    1848 року
- section: Механізми панування
  points:
  - 'Мовні заборони — Валуєвський циркуляр (1863) та Емський указ (1876) як інструменти
    державного лінгвоциду; engagement hook: [!history-bite] — «Заборона на ноти»:
    страх перед музичним «сепаратизмом»'
  - Економічна експлуатація — перетворення України на сировинний придаток (76% цукру,
    71% вугілля імперії) без розвитку інфраструктури для людей — видобуток вугілля
    на Донбасі зріс у 100 разів (1861–1900)
  - Кріпацтво та його наслідки — скасування 1848 (Австрія) та 1861 (Росія), але збереження
    економічної залежності та бідності села
  - «Малоросійська» ідентичність — насадження комплексу меншовартості та асиміляція
    еліт (приклад Гоголя vs приклад Шевченка) — імперський міф про «триєдиний руський
    народ»
- section: Форми спротиву
  points:
  - Шевченко та пробудження — «Кобзар» як політичний маніфест («І мертвим, і живим...»)
    проти малоросійства
  - Громади та Драгоманова — діяльність у Києві, Харкові, Одесі; журнал «Основа»;
    європеїзація українського руху
  - 'Галичина як П''ємонт — створення «Просвіти» (1868) та НТШ, роль греко-католицької
    церкви; engagement hook: [!myth-buster] — Міф про «відстале селянство» vs реальність
    масового руху читалень'
  - Від культурного до політичного — Кирило-Мефодіївське братство (1840-ві) -> Братство
    тарасівців (1891) -> РУРП (1890) -> «Самостійна Україна» Міхновського (1900) —
    поява перших політичних партій
- section: Первинні джерела в синтезі
  points:
  - Порівняння імперських політик — цинізм Валуєва («не было, нет и быть не может»)
    vs прагматизм австрійських дозволів
  - Голоси опору — критика федералізму Франком («над нами як нацією була б висипана
    могила») та листи Драгоманова
  - 'Документи епохи — тексти Емського указу про заборону нот і театру; engagement
    hook: [!quote] — Орест Новицький (цензор): «Освічені малороси... вважають свою
    говірку зіпсованою російською»'
- section: Деколонізаційний погляд
  points:
  - 'Імперський наратив: «один народ» — міф про «возз''єднання» та «триєдиний руський
    народ» як виправдання окупації'
  - 'Реальність: колоніалізм — експлуатація ресурсів (Донбас, Південь) на користь
    метрополії, а не «модернізація» — лінгвоцид як державна політика'
  - 'Імперська спадщина сьогодні — термін «Новоросія» як спроба стерти пам''ять про
    козацький Степ; engagement hook: [!decolonization] — Термін «Південь Росії» (Новоросія)
    як стирання історичної пам''яті'
- section: 'Підсумок: До революції'
  points:
  - Підготовка до 1917 — формування політичної еліти (Грушевський, Винниченко) та
    мережі організацій («Просвіти»)
  - Роль Першої світової — крах імперій як вікно можливостей для державної незалежності
  - 'Від імперії до нації — метафора «алмазу під тиском»: репресії загартували рух
    опору; engagement hook: [!legacy] — Чому 1917 рік не виник на порожньому місці'
vocabulary_hints:
  required:
  - синтез (synthesis) — історичний синтез, синтез культур, синтез ідей
  - імперія (empire) — Російська імперія, Австро-Угорська імперія, крах імперій, «клаптикова
    імперія»
  - колоніалізм (colonialism) — внутрішній колоніалізм, колоніальна політика, сировинний
    придаток
  - спротив (resistance) — культурний спротив, збройний спротив, рух опору, форми
    спротиву
  - пробудження (awakening) — національне пробудження, весна народів, політичне осмислення
  - заборона (ban) — Емський указ, Валуєвський циркуляр, заборона друку, заборона
    сцени
  - експлуатація (exploitation) — економічна експлуатація, експлуатація ресурсів,
    соціальна експлуатація
  - ідентичність (identity) — національна ідентичність, малоросійська ідентичність,
    збереження ідентичності
  recommended:
  - кріпацтво (serfdom) — скасування кріпацтва (1861), кріпосне право, залишки кріпацтва
  - русифікація (Russification) — політика русифікації, тотальна русифікація, зросійщення
  - автономія (autonomy) — культурна автономія, вимога автономії, політична автономія
  - інтелігенція (intelligentsia) — українська інтелігенція, свідома інтелігенція,
    еліта
  - нація (nation) — політична нація, формування нації, модерна нація
  - революція (revolution) — назрівання революції, революційні події, переддень революції
