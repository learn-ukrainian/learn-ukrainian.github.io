module: b2-hist-121
level: B2-HIST
sequence: 121
slug: nezalezhnist-1991
version: '2.0'
title: 'Україна 1991-2004: Становлення'
subtitle: 'Ukraine 1991-2004: Formation of a State'
content_outline:
- section: 'Вступ: Народження держави'
  points:
  - '24 серпня 1991: Акт проголошення незалежності — include quote ''Виходячи із смертельної
    небезпеки...''; author Levko Lukyanenko; text written by Levko Lukyanenko; atmosphere
    of euphoria and anxiety'
  - '1 грудня 1991: референдум — 90.32% support shock to Moscow; voted YES even in
    Crimea and Donbas; legal dissolution of USSR; Ukraine as subject of international
    law'
  - 'Що означала незалежність для українців — Legal dissolution of USSR; Ukraine as
    subject of international law; cultural hook: atmosphere of euphoria and anxiety;
    [!quote] — Цитата з Акту проголошення незалежності про «смертельну небезпеку»'
- section: Перші роки (1991-1994)
  points:
  - 'Леонід Кравчук: перший президент — Ideologue turned statesman; policy of ''between
    raindrops'' (між крапельками); avoided civil conflict but stalled reforms; former
    CPU ideologue; «Маємо те, що маємо» — phrase symbolizing the era of uncertainty'
  - Будапештський меморандум — 5 Dec 1994; Assurances (запевнення) vs Guarantees;
    pressure from US/Russia; Ukraine had 3rd largest nuclear arsenal
  - 'Ядерне роззброєння — Ukraine had 3rd largest arsenal; traded for paper promises;
    analyze text: «respect sovereignty» vs «defend»'
  - Економічна криза та гіперінфляція — 10,000% inflation in 1993; 'Kravchuchka' (cart)
    as symbol of survival; Coupons/Karbonavtsi era; prices changed daily; salaries
    in millions of coupons; [!history-bite] — Про «кравчучку» як символ епохи виживання
- section: Ера Кучми (1994-2004)
  points:
  - Конституція 1996 року — 28 June 1996 'Constitutional Night'; result of fierce
    political struggle vs 'gifted' myth; adopted in one night (27-28 June) under threat
    of parliament dissolution; [!myth-buster] — Constitution was not «gifted», result
    of struggle
  - 'Грошова реформа: гривня — Sept 1996; Viktor Yushchenko (NBU); exchange 100,000:1;
    stabilization of economy; 1 USD = 1.76 UAH at launch'
  - Формування олігархічної системи — Red directors privatizing assets using Soviet
    connections; rise of Donetsk and Dnipro clans; [!decolonization] — «Red directors»
    became first oligarchs using Soviet ties; direct legacy of Soviet nomenklatura
  - Авторитарні тенденції — 'Multi-vector' foreign policy (maneuvering between West/Russia);
    strong presidential power; [!context] — «Multi-vector» policy as sitting on two
    chairs
  - «Касетний скандал» та «Україна без Кучми» — Nov 2000; Gongadze case; Melnychenko
    tapes; first mass protests; crackdown 9 March 2001; rehearsal for Orange Revolution
- section: Первинні джерела
  points:
  - Акт проголошення незалежності — focus on right to self-determination and 'mortal
    danger' justification; key document
  - 'Будапештський меморандум — analyze text: ''respect sovereignty'' vs ''defend'''
  - 'Промови політиків — Kravchuk inaugural (building state); Chornovil (alternative
    democratic path); Chornovil: alternative democratic path not chosen'
- section: Деколонізаційний погляд
  points:
  - 'Радянська спадщина в економіці — Lack of closed production cycles; vulnerability
    to Moscow blackmail (gas wars); imperial myth: economy unviable without Russia;
    reality: collapse caused by dependency on Soviet model'
  - Пострадянські еліти — Nomenklatura remained in power; no lustration (unlike Baltics);
    'Sovok' management style; lack of lustration conserved «sovok» management
  - Незавершеність — Formal vs Mental independence; cultural space dominated by Russia
    until 2014; formal independence did not mean mental independence
- section: 'Підсумок: До Помаранчевої революції'
  points:
  - 'Досягнення та невдачі — State institutions/Currency/Army established vs Corruption/Poverty;
    success: state institutions, currency, army established; failure: corruption,
    oligarchy, poverty'
  - 'Суспільство готове до змін — Cultural hook: Song ''Razom nas bahato''; civil
    society awakening; [!culture] — Song «Razom nas bahato» as anthem of awakening;
    civil society outgrew the state'
  - '2004: точка перелому — Falsified elections as trigger; society outgrew the authoritarian
    state; falsified elections as trigger for explosion of accumulated discontent'
vocabulary_hints:
  required:
  - незалежність (independence) — проголошення незалежності, здобуття незалежності,
    відновлення незалежності
  - референдум (referendum) — всеукраїнський референдум, провести референдум
  - конституція (constitution) — прийняти конституцію, гарант конституції, конституційна
    ніч
  - президент (president) — інавгурація президента, повноваження президента
  - олігарх (oligarch) — олігархічний клан, вплив олігархів, червоні директори
  - приватизація (privatization) — ваучерна приватизація, незаконна приватизація
  - гіперінфляція (hyperinflation) — галопуюча інфляція, знецінення грошей
  - реформа (reform) — грошова реформа, земельна реформа
  recommended:
  - меморандум (memorandum) — підписати меморандум, порушити меморандум
  - роззброєння (disarmament) — ядерне роззброєння, відмова від зброї
  - корупція (corruption) — боротьба з корупцією, корупційні схеми
  - авторитаризм (authoritarianism) — посилення авторитаризму, авторитарний режим
  - опозиція (opposition) — політична опозиція, об'єднана опозиція
  - громадянське суспільство (civil society) — розвиток громадянського суспільства,
    зрілість суспільства
  - багатовекторність (multi-vector policy) — політика багатовекторності, сидіти на
    двох стільцях
  - кравчучка (kravchuchka) — символ епохи виживання, епоха кравчучок
