module: b2-hist-007
level: B2-HIST
sequence: 7
slug: khozary-i-sloviany
version: '2.0'
title: Хозарський каганат і слов'яни
subtitle: The Khazar Khaganate and the Slavs
content_outline:
- section: 'Вступ: Велетень на Сході'
  points:
  - 'Роль Хозарії як щита Європи — зупинка арабської армії Мервана у 737 році, що
    врятувало Східну Європу від ісламізації; cultural hook: [!context] про торговельну
    імперію, а не просто кочівників'
- section: 'Читання: Оповідь про каганат'
  points:
  - Двовладдя, іудаїзм та Салтівська культура — розрізнення сакрального Кагана та
    реального Бека (Шада); [!history-bite] про аналогію з конституційною монархією;
    білокам'яне будівництво Салтівської культури
- section: Первинні джерела
  points:
  - Аналіз Кембриджського документа, листа царя Йосипа та Ібн Фадлана — легенда з
    ПВЛ про «данину мечами» як пророцтво перемоги Русі ([!quote]); згадка Х-л-гу (Олега)
    у Кембриджському документі
- section: Деколонізаційний погляд
  points:
  - Спростування міфів про паразитарний характер каганату — концепція Pax Khazarica
    (безпека торгівлі) проти радянського міфу про «ярмо» ([!myth-buster]); запозичення
    київськими князями титулу «каган» ([!decolonization])
- section: Підсумкове есе
  points:
  - 'Аналітичне завдання про роль Хозарії в державотворенні Русі — тема «Хозарія як
    каталізатор Русі»: зовнішня загроза, торгові інтереси та запозичення державної
    атрибутики'
- section: Підсумок
  points:
  - Узагальнення історичного значення Хозарського каганату — знищення каганату Святославом
    у 965 році та «відкриття воріт» печенігам; [!culture] про вплив на ремесла Русі
- section: Потрібно більше практики?
  points:
  - Ресурси для самостійного поглиблення знань
vocabulary_hints:
  required:
  - каганат (khaganate) — титул, який згодом використовували київські князі (Аскольд,
    Володимир)
  - двовладдя (diarchy) — унікальна система поділу влади на сакральну (каган) і реальну
    (бек)
  - сюзерен (suzerain) — у контексті васальної залежності слов'янських племен
  - васал (vassal) — статус полян щодо хозар до піднесення Києва
  - данина (tribute) — легенда про сплату данини мечами (символ майбутньої перемоги)
  - протекторат (protectorate) — Pax Khazarica як захист торгових шляхів
  - толерантність (tolerance) — релігійна терпимість у каганаті (іудаїзм еліти, християнство,
    іслам, язичництво підданих)
  - іудаїзм (Judaism) — прийняття віри елітою для політичної незалежності від Візантії
    та Халіфату
  - кочівники (nomads) — перехід до напівосілого способу життя (Салтівська культура)
  - осілість (sedentarism) — розвиток міст і фортець (Саркел, Самкерц)
  - дирхем (dirham) — срібна монета, основний засіб міжнародної торгівлі через Хозарію
  - транзитна торгівля (transit trade) — контроль над Волзьким шляхом та Шовковим
    шляхом
  - форпост (outpost) — Київ (Самбатас) як хозарський прикордонний пункт
  - асиміляція (assimilation) — взаємовплив культур (алани, булгари, слов'яни)
  - державотворення (state-building) — вплив хозарської моделі на ранню Русь
  recommended:
  - Салтівська культура (Saltiv culture) — археологічний еквівалент Хозарії
  - Саркел (Sarkel) — біла вежа, фортеця на Дону
  - Самбатас (Sambatas) — альтернативна назва Києва у візантійських джерелах
