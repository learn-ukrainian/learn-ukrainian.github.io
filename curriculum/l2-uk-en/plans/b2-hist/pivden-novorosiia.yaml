slug: pivden-novorosiia
version: '2.0'
title: 'Південь України: Міфи «Новоросії»'
subtitle: 'Southern Ukraine: Myths of ''Novorossiya'''
content_outline:
- section: 'Вступ: Фейкова історія'
  points:
  - '«Новоросія»: російська пропагандистська назва — термін запроваджено 1764 року
    для стирання пам''яті про козацькі вольності; engagement hook: [!myth-buster]'
  - Чому Росія воскресила цей термін у 2014 році — спроба легітимізувати окупацію
    8 областей України від Харкова до Одеси
  - Що насправді існувало до «Новоросії» — густа мережа запорозьких зимівників та
    паланок, а не «порожнє місце»
- section: Південь до колонізації
  points:
  - 'Дике Поле: хто там жив — простір взаємодії козацької та кримськотатарської цивілізацій,
    а не «порожнеча»; engagement hook: [!context] карта паланок'
  - 'Козацькі землі та Запорозька Січ — контроль територій через систему паланок (Бугогардівська,
    Кодацька); engagement hook: [!history-bite] Коцюбіїв-Одеса XV ст.'
  - Кримське ханство — впливова держава з розвиненою торгівлею, а не просто «розбійницьке
    гніздо»
  - Українське населення регіону — козацькі зимівники як основа економічного освоєння
    степу
- section: Колонізація XVIII століття
  points:
  - Російська експансія на Південь — руйнування Січі 1775 року як початок форсованої
    русифікації
  - 'Засновані міста: Одеса, Херсон, Миколаїв — перейменування та розбудова існуючих
    поселень (Хаджибей -> Одеса, Микитин Ріг); engagement hook: [!decolonization]'
  - Багатоетнічна колонізація — серби, греки, німці як локальні анклави, що не змінили
    загального українського характеру краю
  - Роль українців у заселенні — перепис 1897 року фіксує понад 70% українців у губерніях
    Півдня; include quote from Перепис 1897
  - 'Творення міфу «Новоросія» — стратегія «Tabula rasa» (чиста дошка) для ігнорування
    попередньої історії; engagement hook: [!culture] Чумацький шлях'
- section: Первинні джерела
  points:
  - Карти XVIII століття — мапи Боплана фіксують козацькі назви урочищ, пізніше перейменовані
    імперією
  - Укази про заселення — документи про ліквідацію Січі як доказ насильницького характеру
    влади
  - Описи мандрівників — спогади Йоганна Гюльденштедта про український побут та мову
    у степу
- section: Деколонізаційний погляд
  points:
  - 'Імперський міф: «русская земля» — спростування тези про «заснування на порожньому
    місці»'
  - 'Реальність: колонізація української території — концепт «Степова Україна» проти
    «Новоросії»'
  - Чому «Новоросія» — пропаганда — штучне протиставлення русифікованих міст україномовному
    селу
- section: 'Підсумок: Сучасне значення'
  points:
  - '2014: воскресіння міфу — крах проєкту в Одесі, Дніпрі та Миколаєві; engagement
    hook: [!quote] слова Путіна про «исконно русские земли»'
  - Війна за Південь України — оборона Маріуполя та Херсона як доказ української політичної
    нації
  - Українська ідентичність Півдня — регіон як органічна частина України, відвойована
    у імперського наративу
vocabulary_hints:
  required:
  - Новоросія (Novorossiya) — штучний термін, адміністративно-політична назва, імперський
    міф
  - колонізація (colonization) — землеробська, військова, імперська
  - Дике Поле (Wild Field) — простір взаємодії, Степова Україна
  - імперія (empire) — Російська імперія, колоніальна політика
  - пропаганда (propaganda) — імперська, сучасна російська, міф
  - експансія (expansion) — територіальна, російська, військова
  - міф (myth) — історичний, про «Новоросію», про «пусті землі»
  - ідентичність (identity) — українська, політична нація
  recommended:
  - топонім (toponym) — перейменування, історична назва
  - заснування (founding) — міф про заснування, перейменування
  - мультиетнічний (multi-ethnic) — характер регіону, колоністи
  - анексія (annexation) — Кримського ханства 1783, Криму 2014
  - окупація (occupation) — російська, тимчасова
  - деколонізація (decolonization) — пам'яті, топоніміки, історії
  - зимі́вник (winter quarter) — козацький, запорозький, хутір
  - пала́нка (palanka) — адміністративна одиниця, козацька
  - Хаджибе́й (Hadzhibey) — майбутня Одеса, Коцюбіїв
  - Чума́цький шлях (Chumak Way) — економічна артерія, торгівля
