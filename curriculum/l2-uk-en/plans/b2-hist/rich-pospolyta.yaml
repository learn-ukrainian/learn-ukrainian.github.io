vocabulary_hints:
  required:
  - 'Люблінська унія (Union of Lublin) — 1569 рік, ключова подія; context: утворення
    Речі Посполитої'
  - Річ Посполита (Polish-Lithuanian Commonwealth) — literally «Common Thing» (Res
    Publica)
  - 'полонізація (Polonization) — collocations: мовна/культурна полонізація, політика
    полонізації'
  - ополячення (becoming Polish) — процес зміни ідентичності (часто добровільний для
    еліт)
  - 'кріпацтво (serfdom) — learner error: не плутати з рабством (slavery), хоча умови
    були схожі'
  - шляхта (szlachta/nobility) — політичний народ Речі Посполитої
  - воєводство (voivodeship) — адміністративна одиниця, очолювана воєводою
  - Брестська унія (Union of Brest) — 1596 рік, церковний розкол
  recommended:
  - латинізація (Latinization) — вплив католицького обряду на православний
  - 'братство (brotherhood/confraternity) — Київське братство, Львівське братство;
    context: культурний спротив'
  - привілей (privilege) — шляхетські привілеї, королівський привілей
  - селянство (peasantry) — основна маса населення, об'єкт кріпацтва
  - 'фільварок (folwark) — панське господарство, орієнтоване на ринок; context: економічна
    основа шляхти'
  - схизматик (schismatic) — зневажлива назва православних в РП
  - сейм (Sejm) — парламент Речі Посполитої
