version: '2.0'
title: Річ Посполита — полонізація та кріпацтво
content_outline:
- section: Вступ
  points:
  - Люблінська унія 1569 року та її наслідки для українських земель — перехід Волині,
    Київщини, Брацлавщини та Підляшшя до складу Корони Польської
  - Перехід від литовського до польського панування — [!history-bite] Люблінська унія
    не була «братнім об'єднанням», а політичною угодою еліт перед загрозою Москви
  - Зростання соціального та релігійного тиску на українців — початок цивілізаційного
    розлому
- section: Формування Речі Посполитої та інкорпорація земель
  points:
  - Унія Корони Польської та Великого князівства Литовського — федерація «Двох Народів»
    (поляків і литвинів), де українці не були політичним суб'єктом
  - Передача українських земель під пряме польське управління — юридична інкорпорація
    та зміна правового поля
  - Втрата автономії українських територій — ліквідація залишків давньоруської державності
  - Нова адміністративна система та воєводства — призначення воєвод (часто поляків)
    королем, конфлікт з місцевою елітою
- section: Процеси асиміляції та культурного спротиву
  points:
  - Мовна та культурна полонізація української шляхти — принцип «Cuius regio, eius
    religio» (чия влада, того й віра) в реаліях РП
  - Релігійний тиск та спроби латинізації — [!quote] «Де тепер дім Острозьких... де
    славні роди?» (Мелетій Смотрицький, «Тренос»)
  - Брестська унія 1596 року та її наслідки — розкол на уніатів та православних («схизматиків»)
  - Спротив православної церкви та братств — Львівське та Київське братства як прообраз
    громадянського суспільства (школи, друкарні)
- section: Полонізація та ополячення
  points:
  - 'Поширення польської мови серед еліт — [!myth-buster] Міф: «Польська культура
    була просто вищою». Реальність: Це була колоніальна стратегія домінування'
  - Прийняття польських звичаїв та способу життя — трагедія «Русь тікає від Русі»
    (роди Вишневецьких, Сангушків)
  - Втрата української ідентичності вищими верствами — кар'єра та права залежали від
    мови та віри (католицизму)
  - Збереження української культури серед селянства — маргіналізація української культури
    як «мужицької»
- section: 'Шляхетська демократія: Свобода чи анархія?'
  points:
  - Golden Freedoms vs Absolute Monarchy — [!context] Поки Європа будувала абсолютизм,
    РП будувала «шляхетську республіку» («Złota Wolność»)
  - The paralysis of Liberum Veto — принцип «Nie pozwalam!» (1652) як інструмент олігархії
    та паралічу держави
  - Lessons on responsible democracy — як безвідповідальність еліт веде до руйнування
    державності
- section: Читання
  points:
  - Літературні свідчення про життя в Речі Посполитій — [!culture] Барокова література
    як поле битви (полемісти писали «на вістрі меча»)
  - Хроніки та мемуари про українські землі — твори Івана Вишенського як політичні
    памфлети
  - Документи про соціальні відносини — «Тренос» (Плач) 1610 року як свідчення кризи
    еліт
- section: Первинні джерела
  points:
  - Люблінська унія — текст та аналіз умов інкорпорації українських земель
  - Привілеї шляхти та документи про кріпацтво — Третій Литовський статут 1588 року
    (закріпачення селян)
  - Листування про процеси полонізації — свідчення сучасників про зміну віри заради
    посад
- section: Деколонізаційний погляд
  points:
  - Спростування міфу про «золоті часи» Речі Посполитої — погляд на період як на час
    колонізації та втрати власної «політичної голови»
  - Аналіз колоніального характеру польського панування — фільваркова система як економіка
    експорту сировини за рахунок кріпаків
  - Наслідки полонізації для сучасної української ідентичності — trauma of «missing
    elite» and cultural marginalization
- section: Наслідки для козацтва
  points:
  - Посилення кріпацтва як причина втеч у степи — «вторинне кріпацтво» (панщина) як
    двигун колонізації Дикого Поля
  - Формування козацької спільноти як альтернативи — [!decolonization] Козацтво виникло
    як відповідь на вакуум еліти, а не просто як військовий орден
  - Козацтво як захисник української ідентичності — еволюція від «розбійників» до
    «лицарів православ'я»
  - Підготовка до козацьких повстань XVII століття — соціальне та релігійне напруження
    як передвісник Хмельниччини
- section: Потрібно більше практики?
  points:
  - Додаткові вправи для закріплення історичної лексики
  - Практика аналізу документів Речі Посполитої
  - Завдання на порівняння соціальних процесів
