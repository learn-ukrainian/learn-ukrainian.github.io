module: b2-hist-101
level: B2-HIST
sequence: 101
slug: holodomor-mekhanizm
version: '2.0'
title: 'Голодомор I: Механізм'
subtitle: 'Holodomor I: Mechanism'
content_outline:
- section: Вступ
  points:
  - Context of 1930s — Stalin's modernization of the empire at the expense of the
    village; Ukraine seen as both breadbasket and existential threat (national movement)
  - 'Social engineering — Transforming independent owners into dependent state workers
    (kolkhozniks); Stalin''s letter (11.08.1932) on ''losing Ukraine'' — quote: «Якщо
    не візьмемося нині за виправлення становища в Україні, Україну можемо втратити»'
- section: Читання
  points:
  - CBI approach — Analysis of how dehumanizing language prepared the ground for mass
    murder; if the enemy is a 'class element', destruction is justified
  - 'Language of violence — Official terms: ''elements'', ''saboteurs'', ''petliurites''
    («петлюрівські недобитки»), ''idlers'' («лежні»); cultural hook: ''kurkul'' as
    a political label, not economic status [!context]'
- section: Колективізація та опір селянства
  points:
  - Traditional village storm — The village as the center of Ukrainian identity, incompatible
    with Soviet unification and totalitarian control
  - Peasant resistance — 'Babski bunty' (women's revolts) and over 4000 mass uprisings
    in 1930 involving 1.2 million peasants [!myth-buster] — forced regime into tactical
    retreat ('Dizziness from Success', March 1930)
  - Dekulakization — Systematic destruction of the village elite (best farmers) to
    break resistance; 'rozcurkulennia' as economic and physical liquidation
- section: Закон про п'ять колосків та Чорні дошки
  points:
  - 'Law of Five Ears — Decree of 07.08.1932: death penalty for ''theft'' of collective
    property (even a handful of grain); ''socialist property'' declared «священна
    і недоторканна» (sacred and inviolable) [!history-bite]'
  - Black Boards mechanism — Specific repression against resistant villages (e.g.,
    Liutenka, Kamiani Potoky, Pisky); total blockade, removal of ALL food and goods,
    ban on trade — introduced Nov-Dec 1932
- section: Терор голодом як інструмент упокорення
  points:
  - Red broom — 'Buksyrni bryhady' (towing brigades) using probes to search houses
    for hidden food; confiscation of meat, potatoes, and beans as 'natural fines'
    (натуральні штрафи)
  - Blockade of borders — Directive of Jan 22, 1933 banning exit from UkrSSR and Kuban;
    troops guarding borders to create a ghetto [!decolonization]
- section: Первинні джерела
  points:
  - Survivor testimonies — Diaries of Nestor Bilous ('«Люди мруть з голоду…»') and
    Oleksandra Radchenko ('...horror of swollen children') [!quote]
  - Secret circulars — Stalin's correspondence revealing intent; proof that famine
    was not a harvest failure but a punitive operation
- section: Деколонізаційний погляд
  points:
  - Imperial crime — Moscow used Ukrainian resources for industrialization while destroying
    the carriers of Ukrainian identity; comparison to other colonial resource extractions
    [!analysis]
  - Russification — Organized resettlement of Russians (echelons in 1933) into emptied
    Ukrainian villages in Donbas and South; changing ethnic composition
- section: Спадщина
  points:
  - Transgenerational trauma — Fear of hunger, habit of hoarding food, deep distrust
    of authority, 'do not stick out' («не висовуйся») mentality
  - Memory as force — Recognition of Holodomor as genocide restores Ukrainian agency;
    'Candle in the Window' tradition as a symbol of resilience
vocabulary_hints:
  required:
  - 'окупація (occupation) — collocations: радянська окупація, режим окупації'
  - 'геноцид (genocide) — usage: визнання Голодомору геноцидом; crime against humanity'
  - 'розкуркулення (dekulakization) — context: знищення господара, репресивний захід'
  - 'колективізація (collectivization) — collocations: примусова колективізація, суцільна
    колективізація; ''Dizziness from Success'' article'
  - 'чорна дошка (black board) — context: режим чорних дощок, занесення на чорну дошку
    (death sentence for a village)'
  recommended:
  - саботаж (sabotage) — Soviet propaganda term for resistance
  - 'тоталітаризм (totalitarianism) — context: сталінський тоталітаризм, контроль
    над особою'
  - хлібозаготівля (grain procurement) — official term covering the confiscation of
    grain; unrealistic plans
  - продрозкладка (prodrazverstka/food apportionment) — historical antecedent to 1930s
    policies
  - 'куркуль (kulak/fist) — political label for independent farmers; learner error:
    confused with ''rich person'''
  - Закон про п'ять колосків (Law of Five Ears) — decree of 7.08.1932, death penalty
    for food
  - натуральні штрафи (fines in kind) — confiscation of meat/potatoes when grain was
    missing
  - червона мітла (red broom) — search brigades using probes to find food
