module: b2-hist-129
level: B2-HIST
sequence: 129
slug: tomos
version: '2.0'
title: 'Томос: Духовна незалежність'
subtitle: 'Tomos: Spiritual Independence'
content_outline:
- section: 'Вступ: Церква та держава'
  points:
  - 'Чому церковна незалежність важлива — концепція «Незалежна держава — незалежна
    церква»; релігія як стовп національної ідентичності; engage hook: [!context] про
    автокефалію — повна адміністративна незалежність, аналог державного суверенітету'
  - '1686: підпорядкування Москві — корінь проблеми; початок русифікації літургії
    та освіти (Києво-Могилянська академія) — незаконна анексія Київської митрополії,
    що належала Константинополю'
  - Шлях до Томосу — спроби 1917-1921 (Липківський, УАПЦ), 1942, 1990-ті та їх жорстоке
    придушення Москвою — історична тяглість боротьби за автокефалію
- section: Історія українського православ'я
  points:
  - 'Київська митрополія — заснована 988 р., є Матір''ю для московського православ''я;
    engage hook: [!myth-buster] про «добровільне приєднання» 1686 року — Москва отримала
    автокефалію лише у 1448 році (самопроголошення), а визнання — у 1589'
  - Підпорядкування Московському патріархату — хабар патріарху Діонісію IV (соболі
    та золото); порушення умови поминання Вселенського патріарха як першого
  - Розкол після 1991 — звернення Філарета (Денисенка) про автокефалію, відмова Москви
    та накладення анафеми — використання церковних канонів як політичної зброї
  - УПЦ КП, УАПЦ, УПЦ МП — УПЦ КП як невизнана але патріотична vs УПЦ МП як інструмент
    «русского міра» — просування ідеї «триєдиного народу»
- section: Здобуття Томосу (2018-2019)
  points:
  - Звернення Порошенка до Варфоломія — квітень 2018, єдність влади та церкви; протидія
    Росії (дипломатія, кібератаки групи Fancy Bear, тиск на ієрархів)
  - 'Об''єднавчий собор 15 грудня 2018 — Софія Київська; розпуск УПЦ КП та УАПЦ; участь
    двох ієрархів УПЦ МП (Симеон, Олександр); engage hook: [!history-bite] про напругу
    очікування — закриті двері Софії'
  - Митрополит Епіфаній — обрання молодого предстоятеля без радянського минулого (КДБ);
    знання грецької мови, що полегшує комунікацію з Фанаром
  - Вручення Томосу 6 січня 2019 — Фанарі, церква Св. Георгія; перша офіційна молитва
    українською мовою на цьому рівні — співслужіння Варфоломія та Епіфанія
  - Реакція Москви — заперечення, невизнання, ярлик «Стамбульська парафія» — розрив
    євхаристійного спілкування Москви з Константинополем (самоізоляція РПЦ)
- section: Первинні джерела
  points:
  - 'Текст Томосу — визнання автокефальної церкви «духовною донькою»; обмеження діаспори;
    engage hook: [!quote] з Томосу про самоврядність — «визнаємо та проголошуємо встановлену...
    Автокефальну Церкву»'
  - Виступи патріарха Варфоломія — метафора про «зиму схизми» та відновлення справедливості
    — «дощ ізоляції припинився, і квіт надії з'явився»
  - Документи Собору — Статут ПЦУ за грецькою демократичною традицією — відмінність
    від авторитарної моделі РПЦ
- section: Деколонізаційний погляд
  points:
  - 'Російський наратив: «розкол» — маніпуляція страхом «безблагодатності»; engage
    hook: [!decolonization] про термін «розкол» (raskol) як інструмент контролю —
    тавро для тих, хто прагне незалежності'
  - 'Реальність: духовна деколонізація — Москва сама була в розколі 141 рік (1448-1589);
    Томос як відновлення історичної справедливості, а не створення нового'
  - Церква як інструмент імперії — міф про «триєдиний народ», заперечення української
    мови в літургії — концепція «канонічної території» як виправдання агресії
- section: 'Підсумок: Після Томосу'
  points:
  - Перехід парафій — хвилі 2019 (~500 громад) та 2022 років (>1000 громад); зміна
    юрисдикції як свідомий вибір громад (голосування)
  - Війна та церква — втрата легітимності УПЦ МП через колабораціонізм та благословення
    війни патріархом Кирилом; Собор у Феофанії (2022) як спроба мімікрії «незалежності»
  - 'Значення для ідентичності — капеланство, волонтерство; перехід на новоюліанський
    календар (Різдво 25 грудня) як цивілізаційний вибір «Геть від Москви»; engage
    hook: [!culture] про календар — синхронізація з Європою'
vocabulary_hints:
  required:
  - 'Томос (Tomos) — патріарша грамота про автокефалію; collocations: надання Томосу,
    отримання Томосу, підписання Томосу'
  - 'автокефалія (autocephaly) — повна адміністративна незалежність церкви; collocations:
    надати автокефалію, визнати автокефалію'
  - 'церква (church) — як інституція та спільнота вірян; collocations: помісна церква,
    єдина церква'
  - патріарх (patriarch) — титул глави помісної церкви (Варфоломій, Філарет, Кирило);
    Вселенський патріарх
  - митрополит (metropolitan) — титул глави ПЦУ (Епіфаній); Митрополит Київський і
    всієї України
  - 'собор (council) — зібрання єпископів (Об''єднавчий собор); collocations: скликати
    собор, провести собор'
  - православ'я (Orthodoxy) — східна гілка християнства; українське православ'я
  - незалежність (independence) — у контексті духовної свободи від Москви; духовна
    незалежність
  recommended:
  - парафія (parish) — церковна громада; перехід парафій, релігійна громада
  - єпископ (bishop) — вищий священнослужитель; участь єпископів
  - канонічний (canonical) — такий, що відповідає церковним законам; канонічна територія,
    канонічна церква
  - духовенство (clergy) — сукупність священнослужителів; українське духовенство
  - розкол (schism) — церковне розділення; імперський штамп, подолання розколу
  - деколонізація (decolonization) — звільнення від імперського впливу в церкві; духовна
    деколонізація
  - схизма (schism) — церковний розкол (термін Варфоломія); зима схизми
  - предстоятель (primate) — глава помісної церкви; обрання предстоятеля
