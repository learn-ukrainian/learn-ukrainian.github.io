title: 'Братства та освіта: Острозька академія'
content_outline:
- section: Вступ
  points:
  - Роль освіти в збереженні культурної ідентичності — освіта як поле битви XVI ст.,
    де школа визначає майбутнє покоління
  - Виклики Реформації та Контрреформації для православної церкви — криза ідентичності
    православної еліти перед привабливістю західної єзуїтської освіти
  - Братства як відповідь на культурну кризу — створення власних інституцій, конкурентних
    католицьким
- section: Реформація та Контрреформація
  points:
  - Вплив Реформації та Контрреформації на українські землі — ідея національних мов
    у богослужінні та прибуття єзуїтів у 1570-х
  - Єзуїтські колегії проти православних шкіл — блискуча латина і риторика єзуїтів
    як виклик примітивним дяківським школам
  - 'Культурний синтез європейських ідей — стратегія «наука проти науки»: запозичення
    єзуїтських методів для захисту православ''я'
  - '— engagement hook: [!context] Пояснити парадокс: українці запозичили зброю своїх
    супротивників (єзуїтську систему освіти), щоб захистити свою ідентичність'
- section: Феномен братств
  points:
  - Виникнення та організація православних братств — аналог середньовічних цехів з
    релігійно-культурною метою (шпиталь, каса, друкарня)
  - Львівське Успенське братство як зразок — отримання права ставропігії (1586) та
    конфлікт демократичних низів з єпископами
  - Братства як центри національної свідомості — контроль мирян за кліром та моральністю
    громади
  - Роль братств у захисті православ'я від полонізації — збереження віри через активну
    громадську дію, а не ізоляцію
  - '— engagement hook: [!myth-buster] Спростувати міф про те, що громадянське суспільство
    в Україні — це сучасний винахід; братства були класичними NGO XVI ст.'
- section: Освітня діяльність братств
  points:
  - Братські школи та їх педагогічна система — перша школа нового типу у Львові (1586),
    принцип рівності учнів незалежно від статків
  - Друкарні братств та видавнича діяльність — граматика «Адельфотес» (1591) як інструмент
    мовної стандартизації
  - Викладання мовами та підручники — «сім вільних мистецтв» та тримовність (грецька,
    слов'янська, латина)
  - Вплив на розвиток української мови та літератури — формування освіченого прошарку,
    здатного до полеміки
  - '— engagement hook: [!quote] Цитата зі статуту про рівність багатих і бідних учнів
    як революційний педагогічний принцип'
- section: Острозька академія
  points:
  - Заснування академії князем Василем-Костянтином Острозьким — 1576 рік, мета створення
    «Слов'янських Афін»
  - Навчальна програма та європейські стандарти освіти — викладання п'яти мов і «семи
    вільних мистецтв», ректор Герасим Смотрицький
  - Видання Острозької Біблії 1581 року — титанічна праця зі звірки текстів, канонічне
    видання для всього православного світу
  - Значення академії для українського культурного відродження — випускники (Сагайдачний,
    М. Смотрицький) як еліта нації
  - '— engagement hook: [!history-bite] Про «Острозьку Біблію»: величезний тираж (~1500)
    і подарунок Івану Грозному, коли Московія ще не мала повного перекладу'
- section: Читання
  points:
  - Тексти про братства та освітню діяльність — атмосфера суворої дисципліни та поваги
    до знань у братській школі
  - Фрагменти з братських статутів — обов'язки «дидаскалів» (вчителів) бути моральним
    прикладом
- section: Первинні джерела
  points:
  - 'Статути братств — «Порядок шкільний» (1586): демократичні принципи управління
    школою'
  - Документи Острозької академії — передмови до Острозької Біблії (Герасим Смотрицький)
  - '— engagement hook: [!analysis] Порівняти структуру братського статуту з цеховими
    статутами Магдебурзького права'
  - '— include quote: «Сідити має кожний на своїм місці... якщо ж котрий у навчанні
    більше вмітиме, хоча б і убогий був, вище сидіти має, ніж багатий»'
- section: Деколонізаційний погляд
  points:
  - Братства як форма культурного опору — українці як суб'єкти історії, що створили
    інституції самоврядування
  - Освіта як інструмент деколонізації свідомості — орієнтація на європейські зразки
    (латина, диспути) для захисту власної ідентичності
  - Сучасні паралелі у збереженні мовної ідентичності — братства як прообраз волонтерського
    руху
  - '— engagement hook: [!decolonization] Острозька академія (1576) виникла майже
    на 200 років раніше за Московський університет (1755); вектор просвіти йшов з
    Києва до Москви'
- section: Потрібно більше практики?
  points:
  - Додаткові вправи для закріплення матеріалу
focus: history
pedagogy: CBI
objectives:
- Учень може пояснити роль братств у збереженні національної ідентичності
- Учень аналізує значення Острозької академії як першого вищого навчального закладу
- Учень володіє термінологією історії освіти та культури
grammar:
- Історичний наратив
- Складні синтаксичні конструкції
register: публіцистичний
phase: B2.3a [Українська історія]
vocabulary_hints:
  required:
  - братство (brotherhood/fraternity) — церковне братство, вступати в братство, статут
    братства
  - освіта (education) — єзуїтська освіта, православна освіта, рівень освіти
  - академія (academy) — Острозька академія, слов'яно-греко-латинська академія
  - друкарня (printing house/press) — братська друкарня, заснувати друкарню
  - підручник (textbook) — граматика, буквар, шкільний підручник
  - духовенство (clergy) — православне духовенство, контроль за духовенством
  - статут (statute/charter) — шкільний статут, цеховий статут, порушувати статут
  - відродження (revival/renaissance) — культурне відродження, національне відродження
  recommended:
  - Реформація (Reformation) — вплив Реформації, протестантські ідеї
  - Контрреформація (Counter-Reformation) — католицька Контрреформація, єзуїти
  - єзуїти (Jesuits) — орден єзуїтів, єзуїтські колегіуми
  - полонізація (Polonization) — загроза полонізації, ополячення еліти
  - ставропігія (stavropegion) — право ставропігії, незалежність від єпископа
  - спудей (student/scholar - archaic) — братські спудеї, мандрівні дяки
  - вільні мистецтва (liberal arts) — сім вільних мистецтв, тривіум і квадрівіум
