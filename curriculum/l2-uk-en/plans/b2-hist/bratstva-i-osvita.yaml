module: b2-hist-036
level: B2-HIST
sequence: 36
slug: bratstva-i-osvita
version: '2.0'
title: 'Братства та освіта: Острозька академія'
content_outline:
- section: Вступ
  points:
  - Роль освіти в збереженні культурної ідентичності
  - Виклики Реформації та Контрреформації для православної церкви
  - Братства як відповідь на культурну кризу
- section: Реформація та Контрреформація
  points:
  - Вплив Реформації та Контрреформації на українські землі
  - Єзуїтські колегії проти православних шкіл
  - Культурний синтез європейських ідей
- section: Феномен братств
  points:
  - Виникнення та організація православних братств
  - Львівське Успенське братство як зразок
  - Братства як центри національної свідомості
  - Роль братств у захисті православ'я від полонізації
- section: Освітня діяльність братств
  points:
  - Братські школи та їх педагогічна система
  - Друкарні братств та видавнича діяльність
  - Викладання мовами та підручники
  - Вплив на розвиток української мови та літератури
- section: Острозька академія
  points:
  - Заснування академії князем Василем-Костянтином Острозьким
  - Навчальна програма та європейські стандарти освіти
  - Видання Острозької Біблії 1581 року
  - Значення академії для українського культурного відродження
- section: Читання
  points:
  - Тексти про братства та освітню діяльність
  - Фрагменти з братських статутів
- section: Первинні джерела
  points:
  - Статути братств
  - Документи Острозької академії
- section: Деколонізаційний погляд
  points:
  - Братства як форма культурного опору
  - Освіта як інструмент деколонізації свідомості
  - Сучасні паралелі у збереженні мовної ідентичності
- section: Потрібно більше практики?
  points:
  - Додаткові вправи для закріплення матеріалу
focus: history
pedagogy: CBI
objectives:
- Учень може пояснити роль братств у збереженні національної ідентичності
- Учень аналізує значення Острозької академії як першого вищого навчального закладу
- Учень володіє термінологією історії освіти та культури
grammar:
