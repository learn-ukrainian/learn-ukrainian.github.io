title: 'Шістдесятники: Бунт проти сірості'
content_outline:
- section: Вступ — Хрущовська відлига
  points:
  - The death of Stalin and the partial liberalization of the regime — context of
    the 20th Congress of the CPSU (1956) and the 'thaw' as a brief respite between
    terror and stagnation
  - 'The emergence of a new generation of intellectuals who demanded truth — young
    intelligentsia who believed in ''socialism with a human face''; engagement hook:
    [!context] ''Відлига'' не була справжньою свободою'
  - 'The Club of Creative Youth ''Suchasnyk'' in Kyiv — founded in 1959 at Zhovtnevyi
    Palace; organizers: Les Tanyuk, Alla Horska, Viktor Zaretsky; activities: literary
    evenings, searching for NKVD victims in Bykivnia'
- section: Культурний вибух
  points:
  - 'Literature: Vasyl Symonenko, Lina Kostenko, Ivan Drach — works like ''Tysha i
    hrim'', ''Prominnia zemli'', ''Nizh u sontsi''; focus on metaphorical, intellectual,
    and sincere new quality of word'
  - 'Cinema: Serhiy Parajanov and ''Shadows of Forgotten Ancestors'' — 1964 masterpiece;
    poetic cinema vs. socrealism; world recognition (Argentina, Italy) vs. suspicion
    at home'
  - 'Art: Alla Horska and the destroyed stained glass window at Kyiv University —
    ''Shevchenko. Mother'' (1964); destroyed by hammer on rector''s orders; engagement
    hook: [!culture] authorities feared art more than weapons'
  - 'The premiere of ''Shadows'' (1965) as the first public political protest — Sept
    4, 1965 at cinema ''Ukraina''; Dzyuba''s call ''Who is against tyranny — stand
    up!''; engagement hook: [!history-bite] only ~50-60 people stood up, but it changed
    history'
- section: Первинні джерела
  points:
  - 'Excerpts from Vasyl Symonenko''s diary (''Bereh chekan'') — specifically the
    diary ''Okraitsi dumok'' (1962-1963); quote: «Немає нічого страшнішого за необмежену
    владу...»; engagement hook: [!quote] Symonenko''s disappointment'
  - 'Fragments from Ivan Dzyuba''s treatise ''Internationalism or Russification?''
    — 1965 samvydav text sent to leadership; engagement hook: [!decolonization] Dzyuba
    used Marxism to prove Russification contradicted communism'
  - KGB memos reporting on 'bourgeois nationalism' among youth — documenting 'crimes'
    like caroling, wearing vyshyvankas, and speaking Ukrainian in public
- section: Деколонізаційний погляд
  points:
  - The fight for the Ukrainian language as a political act — speaking Ukrainian in
    Russified Kyiv as a conscious choice and resistance
  - 'Debunking the myth of ''Soviet People'' (homo sovieticus) — the myth as a tool
    of assimilation; engagement hook: [!myth-buster] Sixtiers proved Ukrainian identity
    was modern and urban, not ''archaic'''
  - 'The regime''s response: The arrests of 1965 and the ''Great Pogrom'' of 1972
    — first wave (1965) as intimidation; Operation ''Block'' (Jan 1972) targeting
    Stus, Chornovil, Sverstiuk'
  - The transformation of cultural figures into political dissidents — the shift from
    culturalism to political opposition after the 1965 protest
  - 'The continuity of resistance: From UPA to Sixtiers to the Helsinki Group — bridging
    armed resistance and human rights movement; preserving the national ''genetic
    code'''
  - The lasting impact on modern Ukrainian culture — creating a high, elite, urban
    culture that integrated Ukraine into the world context
