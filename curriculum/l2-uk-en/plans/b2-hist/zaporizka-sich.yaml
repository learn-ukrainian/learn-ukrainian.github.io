module: b2-hist-042
level: B2-HIST
sequence: 42
slug: zaporizka-sich
version: '2.0'
title: Запорозька Січ — козацька республіка
content_outline:
- section: Контекст
  points:
  - Виникнення Січі в XVI ст. — друга половина XVI ст. як відповідь на татарську загрозу
    та посилення феодального гніту
  - 'Географічне положення — Запоріжжя за порогами Дніпра та Великий Луг (унікальна
    екосистема плавнів, нині затоплена); engagement hook: [!context] Дике Поле як
    фронтир цивілізацій'
- section: Острів Хортиця — серце козацтва
  points:
  - Становлення фортеці (Дмитро Вишневецький) — замок 1550-х років як форпост для
    наступу на Крим, а не лише оборони
  - Життя на Січі (курені, Кіш) — курінь як житло і військова одиниця, Кіш як ставка
    кошового отамана
  - 'Військова могутність та флот (чайки) — маневрені човни з очеретом для плавучості;
    engagement hook: [!history-bite] Чайка без кіля і з двома кермами'
- section: Читання
  points:
  - Аналіз літописів та історичних статей — Літопис Самійла Величка або Грабянки,
    контраст між суворою дисципліною в поході та гульбою на Січі
- section: Демократичний устрій Січі
  points:
  - 'Принципи прямої демократії та виборності — Козацька рада як вищий орган, виборність
    усіх посад від отамана до кухаря; engagement hook: [!myth-buster] Козаки як елітарна
    лицарська культура, а не збіговисько селян'
  - Козацьке судочинство — суворі покарання за злочини проти побратимства (смерть
    за крадіжку, закопування живцем за вбивство)
- section: Вплив на європейську політику
  points:
  - 'Тридцятилітня війна та Віденська відсіч — участь козаків як елітної піхоти у
    європейських конфліктах (1618–1648, 1683); engagement hook: [!context] Козаки
    як бажані найманці в Європі'
- section: Первинні джерела
  points:
  - 'Свідчення Гійома де Боплана — «Опис України» (1651) як об''єктивний погляд іноземця;
    engagement hook: [!quote] Боплан про силу сотні козаків'
  - 'Козацькі клейноди — символи влади: булава, бунчук, корогва, печатка, литаври'
  - Лист турецькому султану — апокриф, що передає дух козацького гумору та зневаги
    до ворога
- section: Деколонізаційний погляд
  points:
  - 'Спростування міфу про козаків як слуг царя — Січ як суверенна християнська республіка,
    а не «возз''єднання»; engagement hook: [!decolonization] Російська пропаганда
    vs реальні союзи з татарами'
  - Козацька спадщина в сучасній Україні — спадкоємність традицій у сучасних ЗСУ (структура,
    назви бригад, гімн)
activity_hints:
- type: reading
  focus: Свідчення Боплана про козацьку рівність
- type: essay-response
  focus: Козацька республіка як прототип української державності
- type: comparative-study
  focus: Січ vs Сусідні імперії
- type: critical-analysis
  focus: Аналіз козацьких клейнодів
