title: Культура Київської Русі
content_outline:
- section: Читання
  points:
  - Огляд основних тем культурного розвитку Київської Русі — входження до «Візантійської
    співдружності націй» зі збереженням самобутності
- section: Вступ — Культурний світ Русі
  points:
  - Культурне багатство Київської Русі як синтез візантійських та місцевих традицій
    — візантійська форма (камінь, християнство) та місцевий зміст (дерево, фольклор)
  - Роль християнства у формуванні культурної ідентичності — культурний вибух після
    988 року
  - Культура як вираз державності та національного духу — відсутність повного цезаропапізму,
    вплив князя
- section: Писемність та освіта
  points:
  - Запровадження кирилиці та розвиток писемної культури — витіснення глаголиці
  - Створення скрипторіїв при монастирях — Остромирове Євангеліє (1056–1057) як найдавніша
    датована книга
  - Берестяні грамоти як свідчення поширення грамотності — знахідки у Звенигороді
    (Львівщина) спростовують міф про «новгородський феномен»; [!myth-buster]
  - Освітня діяльність монастирів та соборів — графіті Софії Київської фіксують живу
    розмовну мову (м'яке «ц», закінчення -ові/-єві)
- section: Література
  points:
  - Літописання як головний жанр історичної прози — «Повість минулих літ» (1113) як
    політична публіцистика
  - «Слово о полку Ігоревім» як шедевр давньоруської літератури — 1187 рік, заклик
    до єднання, язичницькі метафори
  - Житійна література та її роль у духовному житті — житія Феодосія Печерського
  - Перекладна література та культурний обмін з Візантією — «Ізборники» Святослава
    (1073, 1076) як енциклопедії знань
- section: Архітектура
  points:
  - Хрестово-купольний стиль храмового будівництва — Десятинна церква (988) як перша
    кам'яна споруда
  - Софійський собор як архітектурний символ держави — синтез візантійської системи
    та місцевої 13-купольної традиції
  - Синтез візантійської техніки та місцевих художніх традицій — використання «голосників»
    (керамічних глечиків) для акустики; [!history-bite]
  - Розвиток оборонного зодчества та палацового будівництва — Золоті ворота (сакральна
    і оборонна функція), Спасо-Преображенський собор у Чернігові
- section: Образотворче мистецтво
  points:
  - Мозаїка та фрески у храмах Києва — Оранта («Непорушна Стіна»), світські сюжети
    (полювання, музиканти)
  - Іконопис та формування місцевих художніх шкіл — Аліпій Печерський
  - Ювелірне мистецтво - скань, зернь, емаль — київська школа перегородчастої емалі,
    відома в Європі
  - Книжкова мініатюра та оздоблення рукописів — ілюстрації Остромирового Євангелія
- section: Музика та усна творчість
  points:
  - Церковний спів та його роль у богослужінні — знаменний розспів
  - Билини та епічна традиція про князів і богатирів — Ілля Муромець з Морівська (Чернігівщина);
    [!culture]
  - Боян як образ давньоруського співця — згадка у «Слові о полку Ігоревім»
  - Народна музика та її відображення в літературі — скоморохи на фресках Софії (гуслі,
    сопілки)
- section: Деколонізаційний погляд
  points:
  - Спростування міфів про культурну залежність Русі від Москви — спростування концепції
    «спільної колиски» і «єдиної давньоруської мови»; [!decolonization]
  - Київська Русь як незалежний центр культурного розвитку — українська культура не
    була провінційною щодо Візантії
  - Українська культурна спадщина як фундамент національної ідентичності — діалектні
    риси (повноголосся, кличний відмінок) у мові Русі
- section: Первинні джерела
  points:
  - Тексти літописів як історичні свідчення — цитата про книги («ріки, що наповнюють
    всесвіт»); [!quote]
  - Рукописи «Слова о полку Ігоревім» — уривок (плач Ярославни або вступ)
  - Археологічні знахідки - берестяні грамоти, ювелірні вироби — фото грамоти зі Звенигорода
- section: Потрібно більше практики?
  points:
  - Додаткові матеріали для поглибленого вивчення культури Київської Русі
vocabulary_hints:
  required:
  - писемність (literacy) — берестяні грамоти як доказ масової писемності
  - кирилиця (Cyrillic) — витіснила глаголицю
  - літопис (chronicle) — «Повість минулих літ», політична публіцистика
  - житіє (hagiography) — житія святих, Феодосій Печерський
  - мозаїка (mosaic) — смальта, Оранта, вічність
  - фреска (fresco) — малювання по вологій штукатурці, світські сюжети
  - іконопис (icon painting) — канон, Аліпій Печерський
  - скань (filigree) — ювелірна техніка, тонкий дріт
  - емаль (enamel) — перегородчаста емаль, експорт до Європи
  - монастир (monastery) — центр освіти, скрипторій
  - скрипторій (scriptorium) — майстерня переписування книг
  - билина (bylina - epic poem) — київський цикл, богатирі
  recommended:
  - берестяна грамота (birch bark letter) — Звенигород, побутове листування
  - мініатюра (miniature) — книжкова ілюстрація, Остромирове Євангеліє
  - глаголиця (Glagolitic) — рання слов'янська абетка
  - Боян (Boyan) — віщий співець
  - церковний спів (church chant) — знаменний розспів
  - зернь (granulation) — дрібні кульки металу
  - чернь (niello) — чорний сплав для декору срібла
  - голосники (acoustic jars) — кераміка в стінах для акустики
