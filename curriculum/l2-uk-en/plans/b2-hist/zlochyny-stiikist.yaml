module: b2-hist-139
level: B2-HIST
sequence: 139
slug: zlochyny-stiikist
version: '2.0'
title: Злочини і стійкість
subtitle: Crimes and Resilience
content_outline:
- section: 'Вступ: Злочин та відплата'
  points:
  - Воєнні злочини як стратегія — не ексцеси виконавців, а державна політика терору
    та залякування
  - Буча, Маріуполь, Ірпінь — символи трагедії, що змінили світове сприйняття війни
    та пришвидшили постачання зброї
  - 'Україна вистояла — феномен опору «другій армії світу»; cultural hook: [!history-bite]
    «Київ за три дні» vs реальність Гааги'
- section: Воєнні злочини
  points:
  - 'Буча: розстріли цивільних — систематичні вбивства за списками та катівні (наприклад,
    табір «Променистий»); [!myth-buster] супутникові знімки Maxar спростовують фейк
    про «постановку»'
  - 'Маріуполь: облога та руйнування — авіаудар по Драмтеатру 16 березня, гуманітарна
    катастрофа, знищення 90% житлового фонду'
  - Удари по інфраструктурі — тактика «випаленої землі» та спроба заморозити українців
    взимку
  - Депортація дітей — примусове вивезення та зміна ідентичності; [!context] роль
    «фільтраційних таборів»
  - Ордер на арешт Путіна — історичне рішення МКС 17 березня 2023 року щодо відповідальності
    за депортацію дітей
- section: Стійкість (Stiikist)
  points:
  - Що таке стійкість — здатність суспільства функціонувати та відновлюватися під
    час екзистенційної загрози
  - Блекаути та виживання — генератори бізнесу та феномен «Пунктів незламності» ([!culture]);
    [!quote] гасло «Світло переможе темряву»
  - Волонтерський рух — горизонтальні зв'язки, збори на «Байрактари» та супутники
    (фонд Притули)
  - Культура опору — гумор як зброя (меми про «бавовну», «тракторні війська») та пісні
    («Ой у лузі червона калина»)
- section: Первинні джерела
  points:
  - Свідчення з Бучі — історії вижилих про окупацію (матеріали «Слідство.Інфо» та
    Радіо Свобода)
  - Фото- та відеодокази — роботи Євгена Малолетки з обложеного Маріуполя (World Press
    Photo)
  - Документи МКС — заява прокурора Каріма Хана про обґрунтовані підозри щодо Путіна
    та Львової-Бєлової
- section: Деколонізаційний погляд
  points:
  - 'Російський наратив: «фейки» — заперечення злочинів як типова імперська стратегія
    дегуманізації жертви'
  - 'Реальність: задокументовані злочини — геноцидний характер війни (стаття Тімоті
    Снайдера), знищення еліти та культури'
  - Правосуддя як деколонізація — [!decolonization] Гаага як визнання української
    суб'єктності та злочинності російських імперських практик
- section: 'Підсумок: Звільнення'
  points:
  - 'Харківщина: вересень 2022 — блискавичний прорив (Балаклійсько-Куп''янська операція)
    та захоплення техніки («російський ленд-ліз»)'
  - 'Херсон: листопад 2022 — звільнення єдиного окупованого обласного центру; [!history-bite]
    «кавун звільнення» як символ надії'
  - Шлях до перемоги — злочини не зламали волю, а зміцнили вимогу справедливості
vocabulary_hints:
  required:
  - злочин (crime) — воєнний злочин, злочин проти людяності, фіксація злочинів
  - стійкість (resilience) — національна стійкість, проявляти стійкість, феномен стійкості
  - звільнення (liberation) — звільнення територій, деокупація міст, радість звільнення
  - жертви (victims) — цивільні жертви, вшанування пам'яті жертв, ексгумація тіл
  - докази (evidence) — збирати докази, неспростовні докази, передавати докази в суд
  - правосуддя (justice) — міжнародне правосуддя, відновити справедливість, невідворотність
    покарання
  - депортація (deportation) — примусова депортація дітей, незаконне переміщення,
    повернення депортованих
  - окупація (occupation) — тимчасова окупація, життя в окупації, звільнення з-під
    окупації
  recommended:
  - МКС (ICC) — Міжнародний кримінальний суд, Гаазький трибунал, Римський статут
  - трибунал (tribunal) — спеціальний трибунал, трибунал для агресора, створити трибунал
  - блекаут (blackout) — аварійні відключення, пережити блекаут, енергетичний терор
  - волонтер (volunteer) — волонтерський рух, допомога волонтерів, донатити на ЗСУ
  - свідчення (testimony) — свідчення очевидців, фіксувати свідчення, давати свідчення
  - відновлення (recovery) — відновлення інфраструктури, план відновлення, відбудова
    України
