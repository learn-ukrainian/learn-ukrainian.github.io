module: b2-hist-083
level: B2-HIST
sequence: 83
slug: hromady
version: '2.0'
title: Громадівський рух
subtitle: The Hromada Movement
content_outline:
- section: 'Вступ: Нелегальна культура'
  points:
  - 'Контекст: заборона українського слова — «відлига» кінця 1850-х і повернення кирило-мефодіївців
    (Куліш, Костомаров, Білозерський)'
  - 'Що таке громада? — неформальні об''єднання інтелігенції (студенти, викладачі)
    для просвіти народу; cultural hook: [!context] про переосмислення традиційного
    терміну як політичного інструменту'
  - Чому підпільна діяльність була необхідна — гасло «Освіта для народу рідною мовою»
    проти імперської асиміляції; легальна праця в недільних школах vs нелегальна політика
- section: Перші громади (1860-ті)
  points:
  - 'Київська громада: початок руху — «Стара громада» на чолі з Володимиром Антоновичем
    (1861); найавторитетніша організація'
  - Чорноморська громада в Одесі — частина мережі напівлегальних клубів без єдиного
    центру (Чернігівська, Полтавська, Харківська)
  - 'Зв''язки з польським визвольним рухом — феномен хлопоманства (Антонович, Рильський)
    як перехід шляхти до українства; маніфест «Моя сповідь»; cultural hook: [!myth-buster]
    про роль еліти, а не лише селян'
  - Поява національних символів — написання Павлом Чубинським вірша «Ще не вмерла
    Україна» (осінь 1862) в колі громадівців
- section: Діяльність громад
  points:
  - Культурно-просвітницька робота — Південно-Західний відділ Російського географічного
    товариства (1873–1876) як легальна «міні-академія наук»
  - 'Наукові здобутки: проведення перепису населення Києва (1874) та III Археологічного
    з''їзду — тріумф української науки'
  - 'Видавнича діяльність: «Основа» — перший всеукраїнський журнал (1861–1862), фінансований
    меценатами (Тарновські, Ґалаґани); публікація творів Шевченка, Вовчка'
  - 'Збирання фольклору та етнографія — експедиція Павла Чубинського (7 томів праць);
    cultural hook: [!history-bite] про золоту медаль від імперії за українську етнографію,
    яка довела окремішність народу'
  - Недільні школи та освіта — безкоштовне навчання для дорослих, букварі Шевченка;
    заборона 1863 року (Валуєвський циркуляр)
- section: Первинні джерела
  points:
  - 'Статті з журналу «Основа» — публікації Шевченка, Вовчка, Костомарова як «трибуна»
    українства; cultural hook: [!quote] про право на освіту та необхідність рідної
    мови'
  - Листування громадівців — контакти між Києвом, Львовом (Галичина як «П'ємонт»)
    і Петербургом; мережева структура руху
  - Поліцейські звіти про громади — доноси Юзефовича про перетворення «наріччя» на
    інструмент розвалу імперії; підготовка ґрунту для Емського указу
- section: Деколонізаційний погляд
  points:
  - Громади як відповідь на колоніальний тиск — доказ того, що українська культура
    є високою наукою (історія, лінгвістика), а не лише сільським побутом
  - 'Культурний спротив без зброї — культура як єдина можлива форма політики в умовах
    абсолютизму; «культурна самооборона»; cultural hook: [!decolonization] про страх
    імперії перед «Кобзарем» і букварем'
  - Формування національної еліти — перехід від «малоросійства» (лояльності імперії)
    до свідомого українства (nation-building); суб'єктність нації
- section: 'Підсумок: Від громад до партій'
  points:
  - Розгром та еміграція — Емський указ 1876 року, закриття Відділу; виїзд Драгоманова
    до Женеви та створення вільної преси («Громада»)
  - Трансформація у політичні організації — радикалізація молоді (Братство тарасівців,
    РУРП); вимога політичної самостійності
  - 'Спадщина громадівства — збереження «матриці» нації та інтелектуалної еліти для
    майбутньої незалежності; cultural hook: [!analysis] про парадоксальний ефект заборон,
    що штовхнули рух у політику'
vocabulary_hints:
  required:
  - громада (hromada/community) — Стара громада, громадівський рух, київська громада
  - просвітництво (enlightenment) — народне просвітництво, поширення знань, недільні
    школи
  - культурна робота (cultural work) — легальна культурна праця, культурна самооборона
  - підпілля (underground) — піти в підпілля, нелегальна діяльність, діяти підпільно
  - заборона (prohibition) — Емський указ, Валуєвський циркуляр, заборона друку
  - видавництво (publishing) — журнал «Основа», видання книжок, видавнича справа
  - етнографія (ethnography) — етнографічна експедиція Чубинського, збирання фольклору
  - фольклор (folklore) — український фольклор, народні пісні, 7 томів праць
  recommended:
  - інтелігенція (intelligentsia) — українська інтелігенція, свідома еліта, громадівці
  - національна свідомість (national consciousness) — пробудження свідомості, формування
    нації, nation-building
  - недільна школа (Sunday school) — відкриття недільних шкіл, навчання грамоти дорослих
  - цензура (censorship) — царська цензура, обхід цензури, утиски
  - еміграція (emigration) — політична еміграція, Драгоманов у Женеві, закордонна
    преса
  - нелегальний (illegal) — нелегальна література, таємні гуртки, заборонені видання
