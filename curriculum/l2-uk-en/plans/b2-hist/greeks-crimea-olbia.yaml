version: '2.0'
title: 'Грецькі міста-держави: Ольвія, Херсонес'
subtitle: Antiquity on Ukrainian Lands
content_outline:
- section: 'Вступ: Греки на Понті'
  points:
  - Велика грецька колонізація (VIII–VI ст. до н. е.) — ойкумена як простір культурного
    діалогу
  - 'Причини міграції (земля, торгівля) — «стенохорія» (земельний голод) та демографічний
    вибух; [!history-bite]: Понт Аксейн vs Понт Евксейн'
  - Ойкіст та священний вогонь — роль ойкіста як засновника та сакральний зв'язок
    з метрополією (Мілетом)
- section: 'Читання: Ольвія — демократія в степу'
  points:
  - Заснування та розташування — 647/646 рр. до н. е. на Бузькому лимані («щаслива»
    Ольвія)
  - 'Політичний устрій (народні збори) — народні збори (еклесія) та Рада (буле); [!context]:
    шпигунство як реальна загроза безпеці полісу'
  - Торгівля зі скіфами — експорт зерна, хутра та рабів в обмін на вино та олію; скіфський
    цар Скіл в Ольвії
  - Облога Зопіріона (331 р. до н. е.) — 30-тисячне військо Македонського; звільнення
    рабів та союз зі скіфами для порятунку міста
- section: 'Херсонес Таврійський: Держава присяги'
  points:
  - Дорійський поліс — 422–421 рр. до н. е. (вихідці з Гераклеї); суворий дорійський
    характер та демократія
  - 'Громадянська присяга — [!quote]: «я буду однодумцем у справі порятунку і свободи
    міста і громадян...» (III ст. до н. е.)'
  - Виноробство та хора — унікальна система землеволодіння (клери) та спеціалізація
    на експорті вина
- section: Боспорське царство та Тіра
  points:
  - Монархія на сході (Пантікапей) — столиця у Керчі; династії Археанактидів та Спартокідів
  - Експорт зерна до Афін — Пантікапей як головний постачальник хліба (згадки Демосфена);
    половина хліба в Афінах — з Боспору
  - Війни Мітрідата — Понтійські війни; Мітрідат VI Євпатор як захисник греків від
    «варварів»
- section: Економіка та Культура
  points:
  - Сільське господарство (виноград, оливки) — вирощування зернових та виноградарство;
    рибний соус гарум
  - Архітектура та побут (каналізація, театри) — регулярне планування (Гіпподамова
    система); терми та гімнасії
  - Релігія (Ахілл Понтарх) — культ Владики Понту на острові Левке (Зміїний)
  - Медицина та освіта — хірургічні інструменти та написи про освічених громадян
- section: Занепад античного світу
  points:
  - Готська навала (III ст. н. е.) — руйнування хори та економічний занепад Ольвії
    й Тіри
  - Гунська катастрофа (370-ті рр. н. е.) — кінець класичної античної доби; падіння
    Боспору
  - Виживання Херсонеса — форпост Візантійської імперії на тисячоліття завдяки стінам
    та гарнізону
- section: 'Первинні джерела: Голоси епохи'
  points:
  - Присяга громадян Херсонеса — аналіз патріотизму та демократичних цінностей; заборона
    вивозити хліб повз місто
  - 'Декрет на честь Протогена — філантропія під час кризи: викуп боргів та відновлення
    стін за власний кошт'
- section: Деколонізаційний погляд
  points:
  - 'Крим — не ''російська колиска'' — [!decolonization]: спростування міфу про «исконно
    русскую землю»; 2500 років грецької та кримськотатарської історії'
  - Європейське коріння України — Україна як невід'ємна частина античної ойкумени
    та середземноморської цивілізації
  - 'Взаємовплив культур — [!myth-buster]: греки переймали скіфський одяг (штани)
    для виживання в степу; еллінсько-скіфський симбіоз'
- section: Підсумок
  points:
  - Значення античної спадщини — коріння українського містобудування, виноробства
    та демократичних традицій
  - Україна як частина середземноморського світу — довга історія зв'язків з Європою
    через море
vocabulary_hints:
  required:
  - колонія (colony) — засновувати колонію, ойкіст-засновник
  - місто-держава (city-state) — незалежний поліс, устрій міста-держави
  - поліс (polis) — межі полісу, громадянська громада
  - агора (agora) — збиратися на агорі, центр торгівлі
  - демократія (democracy) — пряма демократія, присягати демократії
  - торгівля (trade) — морська торгівля, експорт зерна
  - храм (temple) — храм Аполлона, вівтар у храмі
  - гирло (river mouth) — у гирлі річки, Бузький лиман
  - Причорномор'я (Black Sea region) — античні міста Причорномор'я
  - античний (ancient/classical) — антична доба, антична спадщина
  - громадянин (citizen) — права громадянина, присяга громадянина
  - республіка (republic) — рабовласницька республіка
  recommended:
  - милетяни (Miletians) — заснування Ольвії милетянами
  - дорійці (Dorians) — дорійський діалект, заснування Херсонеса дорійцями
  - виноробство (winemaking) — розвиток виноробства, хора Херсонеса
  - амфора (amphora) — клеймо на амфорі, вино в амфорах
  - некрополь (necropolis) — дослідження некрополя
  - акрополь (acropolis) — верхнє місто, акрополь Ольвії
