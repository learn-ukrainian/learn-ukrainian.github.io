slug: pomarancheva-revoliutsiia
version: '2.0'
title: Помаранчева революція
subtitle: 'Orange Revolution: Ukraine''s Democratic Awakening'
focus: history
pedagogy: CBI
objectives:
- Учень може пояснити причини та хронологію Помаранчевої революції
- Учень може охарактеризувати роль Ющенка та Тимошенко
- Учень може проаналізувати роль громадянського суспільства
- Учень може оцінити значення рішення Верховного Суду 2004 року
content_outline:
- section: 'Вступ: Передумови революції'
  points:
  - 'Вибори 2004 року та кандидати — протистояння В. Ющенка («Наша Україна») та В.
    Януковича (влада); дати турів: 31 жовтня та 21 листопада'
  - Фальсифікації першого та другого туру — технології «каруселі», відкріпні талони,
    явка >100% на Донбасі
  - Отруєння Ющенка — міжнародний скандал — події 5 вересня на дачі Сацюка, діоксинова
    інтоксикація, клініка «Рудольфінерхаус»
  - 'cultural hook: [!history-bite] — «Таємнича вечеря»: Деталі отруєння Ющенка (суші,
    кумис, Володимир Сацюк) як елемент політичного трилеру'
- section: 'Медіа та суспільство: Інформаційний прорив'
  points:
  - 5 канал як голос протесту проти державної цензури — «Канал чесних новин» (П. Порошенко),
    ведучі А. Шевченко та Р. Скрипін
  - Незалежні журналісти та прямі трансляції з Майдану — прорив інформаційної блокади
    «темників» (інструкцій з АП Медведчука)
  - Українська Правда як перша незалежна інтернет-газета — спадщина Георгія Гонгадзе,
    роль Олени Притули
  - Координація протестів через SMS та мобільні мережі — самоорганізація «розумного
    натовпу»
  - 'cultural hook: [!context] — «SMS-революція»: Як мобільні телефони (тоді ще кнопкові)
    вперше стали інструментом координації протестів'
- section: 'Майдан: Народний спротив'
  points:
  - Оранжевий колір як символ руху — контраст до біло-блакитних кольорів влади, символ
    надії
  - Наметове містечко на Майдані Незалежності — самоорганізація, польові кухні, безпека,
    допомога киян
  - Мирний характер протестів — стратегія ненасильницького спротиву (Джин Шарп), квіти
    у щитах міліції
  - Роль студентства та громадянського суспільства — страйк Могилянки, «похід барабанщиків»
  - 'cultural hook: [!culture] — «Наколоті апельсини»: Розвінчання міфу російської
    пропаганди про «наркотики у валянках» та «американські гроші»'
- section: 'Судова перемога: Рішення Верховного Суду'
  points:
  - Оскарження результатів виборів — подання тисяч томів доказів командою Ющенка
  - Рішення Верховного Суду 3 грудня 2004 — пряма трансляція засідання, головуючий
    суддя Анатолій Ярема
  - 'Повторний третій тур виборів — юридично: повторне голосування другого туру (26
    грудня 2004)'
  - Перемога Ющенка 26 грудня 2004 — результат 51,99%, інавгурація нового Президента
  - 'cultural hook: [!myth-buster] — «Третій тур»: Пояснення, що юридично це був не
    «третій тур», а «повторне голосування другого туру» (re-run)'
- section: 'Деколонізаційний погляд: Українці обирають Європу'
  points:
  - Геополітичний вибір України — відмова від «керованої демократії» російського зразка
  - Російський вплив проти європейської інтеграції — візити Путіна до Києва, передчасні
    привітання Януковича
  - Помаранчева революція як крок до незалежності — перетворення «населення» на «громадян»,
    єднання Сходу і Заходу
  - 'cultural hook: [!decolonization] — «Фальстарт Путіна»: Як Володимир Путін двічі
    привітав Януковича з перемогою ще до офіційних результатів'
- section: Первинні джерела
  points:
  - Відеозаписи з Майдану 2004 — «Яєчний замах» в Івано-Франківську, виступи лідерів
  - Статті з Української Правди — аналітика та хроніки подій
  - Рішення Верховного Суду — текст постанови від 3 грудня
  - 'include quote from Віктор Ющенко: «Ці вибори — це не боротьба двох кандидатів.
    Це боротьба двох світів...»'
  - 'include quote from Ліна Костенко: «Це була революція гідності...»'
  - 'Аудіо: Гімн революції «Разом нас багато» (Гринджоли)'
- section: Підсумок
  points:
  - Значення революції для демократизації — доказ можливості мирної зміни влади та
    правового шляху
  - Уроки для Революції Гідності 2014 — компромісна конституційна реформа, розчарування
    та реванш 2010 року
  - 'cultural hook: [!legacy] — «Мирний протест»: Унікальність Помаранчевої революції
    в її ненасильницькому характері'
vocabulary_hints:
  required:
  - Майдан (Maidan square) — вийти на Майдан, дух Майдану; symbol of resistance
  - фальсифікація (falsification) — масові фальсифікації, протест проти фальсифікацій
  - Верховний Суд (Supreme Court) — рішення Верховного Суду, оскарження результатів
  - цензура (censorship) — темники, державна цензура, свобода слова
  - протест (protest) — мирний протест, акція протесту, право на протест
  - мобілізація (mobilization) — електоральна мобілізація, мобілізація прихильників
  - помаранчевий (orange) — помаранчева стрічка, помаранчева революція, помаранчеве
    небо
  - демократія (democracy) — захист демократії, демократичні цінності, вибір
  recommended:
  - трансляція (broadcast) — пряма трансляція, телевізійна трансляція
  - координація (coordination) — координація дій, штаб національного порятунку
  - спостерігач (observer) — міжнародні спостерігачі, незалежні спостерігачі
  - оскарження (appeal) — оскарження в суді, процедура оскарження
