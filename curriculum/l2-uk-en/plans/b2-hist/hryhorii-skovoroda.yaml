learning_outcomes:
- Учень розуміє концепцію 'сродної праці' та її значення
- Учень може описати життєвий шлях Сковороди та його вибір свободи
- Учень знає основні байки та філософські твори Сковороди
phase: HIST.7 [Mazepa & End of Hetmanate]
objectives:
- 'Analyze the causes and consequences of григорій сковорода: мандрівний філософ'
- Evaluate the historical significance of український сократ
- 'Trace the development of деколонізаційний погляд: не «русский философ»'
vocabulary_hints:
  required:
  - 'сродна праця (congenial labor/affinity work) — key philosophical concept; collocations:
    знайти сродну працю, займатися сродною працею; quote: «Сродна праця — це найсолодша
    в світі річ»'
  - 'мандрівний (wandering) — collocations: мандрівний філософ, мандрівне життя, мандрівний
    спосіб життя'
  - 'байка (fable) — genre; collocations: повчальна байка, сила байки, «Байки Харківські»'
  - сила (moral/power) — specific term for the moral of a fable in Skovoroda's works
    (сюжет і сила)
  - 'пізнання (cognition/knowledge) — collocations: самопізнання, пізнай себе (know
    yourself), шлях пізнання'
  - 'серце (heart) — philosophical concept of inner self/spirit; collocations: філософія
    серця, веселість серця'
  - 'спокуса (temptation) — context: світ спокус, уникати спокус, боротьба зі спокусами'
  - 'марнота (vanity) — context: світська марнота, марнота світу, «вся світська марнота»'
  recommended:
  - 'бароко (Baroque) — cultural style; collocations: українське бароко, барокова
    естетика, барокова література'
  - 'академія (academy) — context: Києво-Могилянська академія (КМА), спудей академії'
  - 'епітафія (epitaph) — inscription on tombstone: «Світ ловив мене, та не впіймав»'
  - 'свобода (freedom) — key value; collocations: духовна свобода, особиста свобода,
    внутрішня свобода'
