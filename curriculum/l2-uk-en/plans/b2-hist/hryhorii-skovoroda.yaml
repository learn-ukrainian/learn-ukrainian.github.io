slug: hryhorii-skovoroda
version: '2.0'
title: 'Григорій Сковорода: Мандрівний філософ'
subtitle: 'Hryhorii Skovoroda: The Wandering Philosopher'
content_outline:
- section: 'Вступ: Український Сократ'
  points:
  - Skovoroda as a symbol of intellectual freedom — called 'Ukrainian Socrates' for
    his dialogic method and ethical focus; epitaph 'The world caught me, but did not
    catch me' (Світ ловив мене, та не впіймав) — маніфест духовної незалежності
  - His refusal of worldly goods and titles — chose personal freedom over church career
    or secular positions; refused Catherine II's offers
  - 'The legend of his life — apocryphal reply to Catherine II: ''My flute and sheep
    are more precious to me than a royal crown'' (Мені моя сопілка і вівця дорожчі
    царського вінця)'
  - 'Engagement Hook: [!quote] — «Світ ловив мене, та не впіймав» як символ свободи
    від мирських спокус'
- section: 'Життєвий шлях: Від академії до дороги'
  points:
  - Studies at Kyiv-Mohyla Academy — 1734–1753; intellectual center of Eastern Europe;
    studied Latin, Greek, Hebrew, poetics
  - Court choir service in St. Petersburg (1741–1744) — exposure to imperial court
    life
  - Travels in Europe (Vienna, Bratislava, Tokaj) — 1745–1750; used time to visit
    libraries and scholars in Hungary, Austria, Slovakia
  - The 'Tokaj Commission' and wine — officially buying wine for the Tsar's court,
    but likely had diplomatic functions
  - Teaching at Pereiaslav and Kharkiv Collegiums — 1759–1769; conflict due to innovative
    methods ('did not teach as is customary')
  - '1769: Final break with official service — beginning of wandering life'
  - 'Engagement Hook: [!history-bite] — «Токайська комісія» офіційно займалася закупівлею
    вина, але ймовірно виконувала й дипломатичні/розвідувальні функції'
- section: 'Філософія серця: Сродна праця'
  points:
  - 'Concept of ''affinity labor'' (srodna pratsia) — happiness through natural inclination;
    include quote: «Сродна праця — це найсолодша в світі річ»'
  - 'The theory of two natures (visible and invisible) — material/perishable vs. spiritual/eternal
    (God); include quote: «Без ядра горіх ніщо, так само, як і людина без серця»'
  - The three worlds (macrocosm, microcosm, symbolic) — Universe, Human, Bible
  - Happiness through self-knowledge — 'Nosce te ipsum' (Пізнай себе); finding the
    'true human' within
  - 'Engagement Hook: [!context] — Концепція «сродної праці» як предтеча профорієнтації
    та психології самореалізації'
- section: 'Літературна спадщина: Сад божественних пісень'
  points:
  - 'Basni Kharkovskie (Kharkiv Fables) — 30 fables; structure: fable (plot) + power
    (moral/sila)'
  - Garden of Divine Songs — 30 poems; religious lyrics and personal experiences;
    'Every city has its customs and laws' (Song 10) — satire on social vices, later
    used by I. Kotliarevsky in 'Natalka Poltavka'
  - Style and language (Baroque influence) — metaphors, antitheses, symbolism, bookish
    Ukrainian language (Sloveno-Ruthenian) with folk elements
  - 'Engagement Hook: [!culture] — Вплив барокової естетики: алегорії, символи, емблеми'
- section: 'Читання: Байки та афоризми'
  points:
  - 'Analysis of ''The Bee and the Hornet'' — Bee = srodna pratsia (joy in work),
    Hornet = consumerism; include quote: «Нам незрівнянно більша радість збирати мед,
    аніж його споживати»'
  - Interpretation of key aphorisms — 'Take the top and you will have the middle',
    'Loss of time is the heaviest loss', «Любов виникає з любові; коли хочу, щоб мене
    любили, я сам перший люблю»
  - 'Engagement Hook: [!source] — Оригінальний текст байки «Бджола та Шершень»'
- section: 'Первинні джерела: Листи до Михайла Ковалинського'
  points:
  - Friendship as a philosophical category — Kovalynsky as favorite student and first
    biographer; spiritual unity
  - Pedagogy views of Skovoroda — moderation, health, reading with taste ('не їж без
    смаку'), 'cheerfulness of heart' (веселість серця)
- section: 'Деколонізаційний погляд: Не «русский философ»'
  points:
  - Skovoroda's Ukrainian roots and identity — product of KMA and Ukrainian Baroque,
    not Russian Orthodoxy; language is Sloveno-Ruthenian (Old Ukrainian)
  - Distinction from Russian philosophical tradition — refuting V. Ern's 'First Russian
    Philosopher' myth (1912) and Soviet 'peasant democrat-atheist' tropes
  - Geographic reality — lived in Hetmanate and Slobozhanshchyna, never in Moscow;
    European orientation
  - Impact on Ukrainian national revival — Shevchenko's admiration; 2022 destruction
    of Skovorodynivka museum as symbol of empire's fear
  - 'Engagement Hook: [!myth-buster] — Спростування радянського міфу про Сковороду
    як «селянського просвітителя» чи «першого російського філософа»'
