title: 'Люди Русі: Суспільство та побут'
content_outline:
- section: Розминка
  points:
  - Demographics of Kyiv vs London — Kyiv had 50,000–100,000 inhabitants while London/Paris
    had 15,000–20,000; include [!history-bite]
  - The concept of Estate (Stan) — rights and duties defined by birth and function,
    not modern class structure
  - 'Vocabulary: Vira, Izgoy, Votchyna — Vira (fine replacing blood feud), Izgoy (social
    dropout like illiterate priest''s son), Votchyna (hereditary land)'
- section: 'Читання: Суспільство та повсякдення Київської Русі'
  points:
  - 'The Prince and Druzhina: The top of the pyramid — Prince as ''first among equals'',
    not absolute monarch; Senior vs Junior Druzhina'
  - Boyars as landed aristocracy (Votchyna system) — influenced politics via council;
    Votchyna vs Pomistya distinction
  - 'Clergy: Black (Monks) vs White (Priests) — Monks as intellectual elite/chroniclers;
    White clergy lived in world, had families'
  - 'Burghers: Merchants, Craftsmen, and Guilds — ''Guests'' (merchants), guild organizations
    (streets, hundreds)'
  - 'Economy: Trade Routes (Greeks, Salt, Zalozny) and Currency — evidence of developed
    commercial relations (Zvenyhorod birch bark letter)'
  - 'Peasantry: Smerds (free), Zakups (debtors), Ryadovychi — Smerds (personal freedom,
    tribute), Zakups (working off debt, protected by Monomakh Statute), Ryadovychi
    (contract workers)'
  - 'Kholops: Slavery in Rus context — sources: captivity, debt, marriage; not classical
    slavery (could become Tiun/manager)'
  - 'Women in Rus: Property rights and education — high status vs Europe (Anna Yaroslavna
    signature), property rights (dowry, inheritance)'
  - 'Daily Life: Housing, Clothing, and Diet — Housing (log cabins in cities vs clay
    ''mazanka'' in forest-steppe); Diet (rye bread, porridge, turnips, meat); Clothing
    (linen shirts, boots as status symbol)'
  - 'Entertainment: Skomorokhy, Chess, and Festivals — include [!culture] hook: chess
    found even in craftsmen''s dwellings, not just nobility'
  - 'Literacy and Education: Birch Bark Letters and Graffiti — include [!myth-buster]:
    literacy not limited to monks; women and children wrote (Onfim, Zvenyhorod finds)'
- section: 'Первинні джерела: Голоси епохи'
  points:
  - 'Ruska Pravda: The price of life and honor — include [!quote] showing fine stratification
    (80 hryvnias for boyar vs 5 for smerd)'
  - Collective responsibility (Verv) — rural community responsible for crimes on its
    territory
  - 'Birch Bark Letters: Ordinary voices — specific mention of Zvenyhorod finds and
    everyday topics (debt, love)'
- section: 'Деколонізаційний погляд: Руйнування імперських міфів'
  points:
  - 'Regional differences in housing (Mazanka vs Izba) — include [!context]: autochthonous
    whitewashed clay huts (mazanka) vs northern log cabins (izba)'
  - Differences in clothing and traditions — distinct material culture confirming
    lack of 'single ancient Rus people'
  - 'Political culture: Contractual vs Despotic — include [!decolonization]: Rus had
    strong horizontal structures (Viche) and contractual prince-elite relations, unlike
    later Muscovite despotism'
vocabulary_hints:
  required:
  - суспільство (society) — станове суспільство (estate-based society)
  - побут (daily life/everyday existence) — побутова грамотність (everyday literacy)
  - смерд (smerd) — вільний селянин (free peasant)
  - закуп (zakup) — напіввільний, працює за борг (debtor worker)
  - холоп (kholop) — невільний, раб (unfree person/slave)
  - боярин (boyar) — земельна аристократія (landed aristocracy)
  - дружина (druzhina) — княжа дружина (prince's retinue)
  - купець (merchant) — гість (guest/trader)
  - ремісник (craftsman) — цехові організації (guild organizations)
  - віче (viche) — народні збори (popular assembly)
  - громада (community) — сільська громада/верв (rural community)
  - рало (plough) — символ землеробства (symbol of agriculture)
  recommended:
  - рядович (ryadovych) — працює за рядом/договором (contract worker)
  - челядь (cheliad) — синонім холопів (servants/slaves)
  - терем (terem) — житло знаті (noble housing)
  - городище (hillfort/settlement) — укріплене поселення (fortified settlement)
  - соха (wooden plough) — знаряддя праці (farming tool)
  - ізгой (izgoy) — випав із соціального стану (social outcast)
  - верв (verv) — сільська община (rural community)
  - тіун (tiun) — княжий управитель (prince's manager)
