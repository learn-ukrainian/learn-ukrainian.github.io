title: 'Кримське ханство: Золотоординська спадщина'
subtitle: Виникнення та державність Гіреїв
content_outline:
- section: Вступ
  points:
  - Кримське ханство як ключовий гравець регіону
  - Складні відносини з українськими землями
- section: Читання
  points:
  - Народження ханства (1441-1478)
  - Державний устрій Гіреїв
  - Ясир — трагедія степового кордону
- section: Первинні джерела
  points:
  - Європейські свідчення про Крим
  - Опис Кафи та невільничого ринку
- section: Деколонізаційний погляд
  points:
  - Кримсько-козацькі союзи проти Польщі
  - Культурні зв'язки та запозичення
  - Крим як частина української історії
- section: 'Економіка: Сади, сіль та каравани'
  points:
  - Економічна основа ханства
- section: Підсумок — Спадщина для сучасності
  points:
  - Анексія 1783 року та депортація 1944-го
  - Кримські татари як корінний народ
- section: Потрібно більше практики?
  points:
  - Додаткові ресурси
focus: history
