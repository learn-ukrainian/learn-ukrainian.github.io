slug: krymske-khanstvo
version: '2.0'
title: 'Кримське ханство: Золотоординська спадщина'
subtitle: Виникнення та державність Гіреїв
content_outline:
- section: Вступ
  points:
  - Кримське ханство як ключовий гравець регіону — спадкоємець Улусу Джучі (Золотої
    Орди) у геополітичному трикутнику Крим-Стамбул-Москва
  - 'Складні відносини з українськими землями — [!myth-buster] спростування міфу про
    «одвічну ворожнечу»: історія динамічних змін від набігів до військових союзів'
- section: Читання
  points:
  - Народження ханства (1441-1478) — проголошення незалежності Хаджі I Ґераєм (1441)
    та перехід під османський протекторат за Менґлі I Ґерая (1478)
  - 'Державний устрій Гіреїв — баланс влади: хан як верховний правитель, обмежений
    Курултаєм та чотирма родами карачі-беїв (Ширін, Барин, Аргин, Кипчак)'
  - Ясир — трагедія степового кордону — роль Кафи (Кефе) як невільничого ринку та
    економічний вимір работоргівлі (5-15% бюджету)
- section: Первинні джерела
  points:
  - Європейські свідчення про Крим — [!quote] Гійом Левассер де Боплан про витривалість
    татар та їхню військову організацію (1650)
  - Опис Кафи та невільничого ринку — [!quote] контрастний опис розкоші Бахчисарайського
    палацу Евлією Челебі (1666) як свідчення високої культури
- section: Деколонізаційний погляд
  points:
  - 'Кримсько-козацькі союзи проти Польщі — [!decolonization] замовчувані радянською
    історіографією угоди: Михайло Дорошенко (1624) та Богдан Хмельницький (1648)'
  - Культурні зв'язки та запозичення — взаємовплив у побуті (шаровари, жупани), мові
    (майдан, кіш, тютюн) та зброї
  - Крим як частина української історії — Qırımlı як корінний народ, що сформувався
    на півострові, а не «прийшлі варвари»
- section: 'Економіка: Сади, сіль та каравани'
  points:
  - Економічна основа ханства — експорт солі (Сиваш) та шкір, розвинене садівництво
    та ремісництво (ювелірна справа, сап'ян)
- section: Підсумок — Спадщина для сучасності
  points:
  - Анексія 1783 року та депортація 1944-го — [!legacy] руйнування державності Російською
    імперією та сталінський геноцид (Сюрґюн)
  - Кримські татари як корінний народ — сучасний статус Qırımlı, закон України 2021
    року та опір окупації з 2014 року
- section: Потрібно більше практики?
  points:
  - Додаткові ресурси
focus: history
pedagogy: CBI
objectives:
- Учень може описати процес виникнення Кримського ханства
- Учень розуміє державний устрій та роль роду Гіреїв
- Учень може аналізувати відносини між ханством та українськими землями
grammar:
- Historical narrative style
- Descriptive constructions
phase: B2.3c [Українська історія]
vocabulary_hints:
  required:
  - хан (khan) — титул монарха, походить від тюрко-монгольської традиції
  - ясир (captives/slaves) — бранці, захоплені під час набігів; економічна складова
  - курултай (assembly) — загальні збори знаті для вирішення державних питань
  - спадщина (legacy/heritage) — Золотоординська спадщина; культурний спадок
  - союз (alliance) — військово-політичний союз; укласти угоду
  - анексія (annexation) — насильницьке приєднання (1783)
  - депортація (deportation) — примусове виселення народу (1944)
  - беї (beys) — титул знаті, голови родів (карачі-беї)
  recommended:
  - протекторат (protectorate) — форма залежності від Османської імперії (з 1478)
  - династія (dynasty) — династія Ґераїв (Чингізидів)
  - корінний (indigenous) — корінний народ Криму
  - набіг (raid) — військова операція з метою захоплення здобичі
  - степ (steppe) — Половецький степ (Дешт-і-Кипчак)
