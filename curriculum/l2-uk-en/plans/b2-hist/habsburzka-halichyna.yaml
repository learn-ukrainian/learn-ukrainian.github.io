  - греко-католицький (Greek-Catholic)
  - москвофіл (Russophile)
  - народовець (populist/ukrainophile)
  recommended:
  - реформа (reform)
  - сейм (sejm/parliament)
  - намісник (viceroy)
  - консерватор (conservative)
  - товариство (society)
  - конституція (constitution)
