phase: HIST.4
vocabulary_hints:
  required:
  - шляхта (nobility) — шляхетська демократія, польська/руська шляхта
  - магнат (magnate) — магнатські роди, впливовий магнат
  - міщанин (burgher) — права міщан, заможні міщани
  - кріпак (serf) — закріпачення селян, доля кріпака
  - панщина (corvée/serfdom labor) — відробляти панщину, дні панщини
  - фільварок (folwark/manor farm) — розвиток фільварків, прибуток з фільварку
  - магдебурзьке право (Magdeburg rights) — надання магдебурзького права, самоврядування
  - сейм (Sejm/parliament) — вальний сейм, рішення сейму
  recommended:
  - унія (union) — Люблінська унія, Берестейська унія
  - полонізація (Polonization) — полонізація еліти, культурна полонізація
  - привілей (privilege) — шляхетські привілеї, королівський привілей
  - статут (statute) — Литовський статут, правові норми
