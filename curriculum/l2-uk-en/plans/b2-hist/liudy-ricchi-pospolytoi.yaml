module: b2-hist-039
level: B2-HIST
sequence: 39
slug: liudy-ricchi-pospolytoi
version: '2.0'
title: 'Люди Речі Посполитої: Суспільство'
subtitle: Соціальна структура польсько-литовської держави
content_outline:
- section: Вступ
  points:
  - Річ Посполита як багатонаціональна держава — концепція «Res Publica» (спільна
    справа), яка де-факто стосувалася лише шляхти
  - Соціальні категорії та їхнє значення для українців — формула Станіслава Оріховського
    «Gente Ruthenus, natione Polonus» (роду руського, нації польської)
  - Зв'язок суспільної структури з національним пробудженням — [!culture] ідеологія
    Сарматизму, що об'єднувала еліту, але виключала русинів-некатоликів
- section: Шляхта і магнати
  points:
  - Шляхетські привілеї — «złota wolność» та сеймова демократія — право «liberum veto»
    та недоторканність особи «neminem captivabimus»
  - Руська (українська) шляхта — асиміляція чи збереження ідентичності — [!myth-buster]
    спростування міфу про виключно польську шляхту; існування потужної верстви руської
    еліти
  - Великі магнатські роди — Вишневецькі, Острозькі, Заславські — «некороновані королі
    Русі» та захисники православ'я до певної межі
  - Полонізація руської еліти — причини та наслідки — [!quote] плач Мелетія Смотрицького
    у «Треносі» (1610) за втраченими родами («Де тепер дім Острозьких?..»)
- section: Міщани і ремісники
  points:
  - Магдебурзьке право — міське самоврядування — надання права Львову (1356) та Києву
    (1494/99); адміністративна структура (війт, бурмістр, райці)
  - 'Цехи та гільдії — економічне життя міст — соціальна піраміда: патриціат, поспольство,
    плебс'
  - Православні та євреї — обмеження прав у містах — [!context] дискримінаційні норми
    «Sartagines», проживання на окремих «Руських вулицях», обмеження на вступ до цехів
  - Львів, Київ, Луцьк — регіональні центри — роль церковних братств (напр. Львівське
    Успенське) як механізму самозахисту міщан
- section: Селяни і кріпацтво
  points:
  - Посполиті та їхні обов'язки перед панами — [!history-bite] зростання панщини з
    1-2 до 4-6 днів на тиждень; термін «бидло» (худоба) щодо селян
  - Фільварок як економічна система — «друге видання кріпацтва», орієнтація на експорт
    зерна до Західної Європи
  - Шлях до закріпачення — погіршення становища XVI-XVII ст. — Третій Литовський статут
    (1588) як юридичне оформлення остаточного закріпачення
  - Селянські повстання як форма спротиву — реакція на необмежену владу пана (ius
    vitae ac necis — право життя і смерті)
- section: Первинні джерела
  points:
  - Литовський статут 1588 — норми про кріпацтво — статті про розшук «збіглих селян»
    та покарання за їх переховування
  - Привілей Магдебурзького права для українського міста — аналіз тексту надання права
    Києву або Львову
  - Лінгвістичний аналіз правових документів — контраст між сухою мовою статутів та
    емоційною бароковою риторикою «Треносу»
- section: Деколонізаційний погляд
  points:
  - Міф про «золотий вік» Речі Посполитої для українців — [!decolonization] рай для
    10% (шляхти) і пекло безправ'я для 90% населення
  - Реальність — соціальне та релігійне пригноблення — нашарування етнічного гніту
    на соціальний статус
  - Козацтво як відповідь на станову нерівність — виникнення нової військової еліти
    з людей, яким не знайшлося місця в становій системі
  - Сучасна україно-польська дискусія про спадщину Речі Посполитої — термін «Kresy
    Wschodnie» (Східні околиці) vs українські етнічні землі
  - Соціальна структура як передумова Хмельниччини — неможливість соціального ліфта
    для православних як каталізатор вибуху
  - Спадщина станового суспільства в українській свідомості — глибока недовіра до
    державної влади та інституцій
