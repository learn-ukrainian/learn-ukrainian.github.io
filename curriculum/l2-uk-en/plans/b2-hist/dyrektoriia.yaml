module: b2-hist-093
level: B2-HIST
sequence: 93
slug: dyrektoriia
version: '2.0'
title: Директорія УНР
subtitle: The Directory of the Ukrainian People's Republic 1918-1920
content_outline:
- section: 'Вступ: Падіння Гетьманату'
  points:
  - 'Контекст: кінець німецької окупації — листопад 1918, втрата зовнішньої підтримки
    Скоропадського після поразки Німеччини'
  - Повстання проти Скоропадського — центр у Білій Церкві, Січові Стрільці як рушійна
    сила; [!context] об'єднання полярних сил (соціалістів і націоналістів) проти Гетьмана
  - Створення Директорії (листопад 1918) — таємне засідання 13-14 листопада, перемога
    під Мотовилівкою відкриває шлях на Київ
- section: Структура та лідери
  points:
  - П'ятеро членів Директорії — Винниченко, Петлюра, Швець, Андрієвський, Макаренко
    (колективне керівництво)
  - 'Володимир Винниченко: соціаліст — доктринер, прагнення «радянської платформи
    без більшовиків»; [!history-bite] «Винниченко пише, Петлюра воює»'
  - 'Симон Петлюра: військовий лідер — прагматик-державник, розуміння неминучості
    війни з Москвою'
  - Внутрішні конфлікти та відставка Винниченка — лютий 1919, провал спроб домовитися
    з більшовиками, перехід влади до Петлюри
- section: Боротьба на кілька фронтів
  points:
  - Війна з більшовиками — оголошення війни 16 січня 1919, втрата Києва в лютому,
    наступ Червоної армії з півночі та сходу
  - Конфлікт із Західноукраїнською Народною Республікою — Акт Злуки (22.01.1919) як
    символічний тріумф, але складність військової співпраці (Петрушевич vs Петлюра)
  - Денікін та білогвардійці — наступ з півдня за «Єдину неділиму Росію», «Київська
    катастрофа» (серпень 1919)
  - Польські інтервенти — Варшавський договір як вимушений крок відчаю для порятунку
    державності
  - Зимовий похід армії УНР — 6 грудня 1919 – 6 травня 1920, перехід до партизанської
    тактики; [!history-bite] «Трикутник смерті» (більшовики, білі, поляки + тиф)
- section: Первинні джерела
  points:
  - Універсали Директорії — Декларація 26 грудня 1918; [!quote] про права лише для
    «трудових класів» (лівий популізм)
  - Спогади Винниченка — «Відродження нації», спроба виправдання та звинувачення опонентів
  - Військові документи — Накази Петлюри про покарання за погроми (напр. Наказ № 131)
- section: Деколонізаційний погляд
  points:
  - 'Міф: «Петлюрівщина» як радянський термін — синонім бандитизму та анархії в імперському
    наративі'
  - 'Реальність: Боротьба за незалежність — легітимний уряд, визнаний де-факто; [!decolonization]
    термін «Громадянська війна» є фальшивим, це була російсько-українська війна'
  - Погроми та їх контекст — [!myth-buster] вбивство Петлюри Шварцбардом як спецоперація
    ОДПУ, реальні винуватці погромів (денікінці, будьоннівці, отамани)
- section: 'Підсумок: Спадщина Директорії'
  points:
  - Причини поразки — внутрішні чвари, відсутність сильної армії, байдужість Антанти,
    переважаючі сили ворогів
  - Еміграція та уряд в екзилі — збереження юридичної спадкоємності влади до 1992
    року (передача клейнодів Кравчуку)
  - 'Директорія в національній пам''яті — урок: демократія без сильної армії неможлива'
vocabulary_hints:
  required:
  - директорія (directorate) — тимчасовий революційний орган, згодом верховна влада
  - універсал (universal/decree) — законодавчий акт, декларація
  - 'отаман (otaman/chieftain) — військовий ватажок; learner error: плутати з козацькими
    гетьманами (тут інший контекст)'
  - повстання (uprising) — протигетьманське повстання
  - інтервенція (intervention) — більшовицька/польська військова інтервенція
  - еміграція (emigration) — політична еміграція уряду УНР
  - уряд (government) — уряд в екзилі (government in exile)
  - армія (army) — Дієва армія УНР
  recommended:
  - соціалізм (socialism) — домінування лівих партій у Директорії
  - республіка (republic) — відновлення УНР
  - коаліція (coalition) — вимушені та тимчасові союзи
  - фронт (front) — боротьба на кілька фронтів
  - відступ (retreat) — стратегічний відступ, Зимовий похід
  - перемир'я (armistice) — спроби перемир'я з більшовиками
  - зимовий похід (winter campaign) — Перший Зимовий похід (героїчна сторінка)
  - трикутник смерті (triangle of death) — стратегічна пастка 1919 року
  - акт злуки (act of unification) — об'єднання УНР і ЗУНР
