title: 'Синтез: Трагедії XX століття'
subtitle: 'Synthesis: 20th Century Tragedies'
content_outline:
- section: 'Вступ: Століття травми'
  points:
  - 'XX століття: найтрагічніше в історії України — за оцінками демографів, потенційне
    населення могло б складати 80-100 млн без воєн і геноцидів'
  - 'Голодомор, війна, терор — Україна як епіцентр «Кривавих земель» (концепція Тімоті
    Снайдера), де режими Гітлера і Сталіна знищили ~14 млн людей — cultural hook:
    [!history-bite] про 14 млн жертв'
  - 'Як нація вижила — концепція трансгенераційної травми: глибокий психологічний
    слід, що передається поколінням'
- section: Зв'язки між трагедіями
  points:
  - 'Голодомор як геноцид — удар по «хребту» нації (селянству) та створення «постгеноцидного
    суспільства» (термін Джеймса Мейса) — cultural hook: [!context] репресії еліти
    передували Голодомору'
  - 'Розстріляне відродження — фізична ліквідація інтелектуальної еліти в Сандармоху
    (1937) для «обезголовлення» нації — note: процес Спілки визволення України (СВУ)
    1930 як прелюдія'
  - 'Друга світова війна — зіткнення двох тоталітарних режимів на території України;
    міф про «Велику Вітчизняну» vs реальність — decolonization: Друга світова (1939-1945)
    vs ВВВ (1941-1945)'
  - Післявоєнні репресії — операція «Вісла» (1947), голод 1946-47 років та боротьба
    з «буржуазним націоналізмом»
- section: Механізми виживання
  points:
  - 'Культура в підпіллі — збереження традицій «пошепки» в родинах та релігійне підпілля
    — cultural hook: [!myth-buster] про «пасивність українців» (понад 4000 повстань)'
  - Діаспора та пам'ять — збереження державних атрибутів (УНР в екзилі) та історії
    без радянської цензури
  - Дисиденти — рух шістдесятників (Стус, Костенко) та використання «езопової мови»
    для спротиву
  - 'Збереження ідентичності — феномен «подвійної свідомості»: зовнішня радянська
    лояльність при внутрішньому збереженні національного я'
- section: Первинні джерела в синтезі
  points:
  - 'Порівняння свідчень — офіційні газети («Правда»: «жити стало краще») проти статистики
    смертності'
  - 'Аналіз документів — щоденники Олександра Радченка як доказ злочину, за який автора
    репресували — include source: [!source] уривки зі щоденників Радченко'
  - Усна історія — проєкт Джеймса Мейса та Комісія Конгресу США (Oral History) як
    інструмент повернення правди
- section: Деколонізаційний погляд
  points:
  - 'Радянський наратив: замовчування — міфи про «три братні народи» та «спільну історію»
    для стирання пам''яті — cultural hook: [!decolonization] пакт Молотова-Ріббентропа'
  - Сучасне відновлення пам'яті — декомунізація не як політика, а як терапія національної
    пам'яті
  - 'Травма як частина ідентичності — перехід від статусу «жертви історії» до активного
    суб''єкта — quote: «Я єсть народ, якого Правди сила ніким звойована ще не була»
    (Тичина)'
- section: 'Підсумок: Уроки для сьогодення'
  points:
  - 'Чому пам''ять важлива — «Щоб знищити націю, треба спочатку знищити її пам''ять»
    (контекст Мілана Кундери) — include quote: Мілан Кундера'
  - 'Від травми до стійкості — розуміння історії як фундамент сучасної боротьби —
    quote: «Ми є народ, у якого вкрали ім''я» (Ліна Костенко)'
  - 'XX століття та війна 2022 — рецидив непокараного імперського зла; ідентичні методи
    (депортації, фільтрація) — cultural hook: [!reflection] війна як продовження боротьби'
vocabulary_hints:
  required:
  - синтез (synthesis) — аналіз історичного синтезу подій
  - трагедія (tragedy) — масштаб національної трагедії; століття трагедій
  - травма (trauma) — трансгенераційна травма, колективна травма, подолання травми
  - геноцид (genocide) — визнання Голодомору геноцидом; цілеспрямований геноцид
  - репресії (repressions) — масові сталінські репресії; політичні репресії
  - виживання (survival) — стратегії виживання нації; механізми виживання
  - пам'ять (memory) — політика пам'яті, історична пам'ять, стирання пам'яті
  - ідентичність (identity) — збереження національної ідентичності; українська ідентичність
  recommended:
  - замовчування (silencing) — політика замовчування злочинів; механізми забуття
  - відновлення (restoration) — відновлення історичної справедливості; відновлення
    пам'яті
  - спадщина (legacy) — тоталітарна спадщина; імперська спадщина
  - покоління (generation) — втрачене покоління, зв'язок поколінь
  - свідчення (testimony) — усні свідчення очевидців; документальні свідчення
  - деколонізація (decolonization) — деколонізаційний погляд на історію; процес деколонізації
  - постгеноцидний (post-genocidal) — постгеноцидне суспільство (Мейс); постгеноцидний
    синдром
  - Криваві землі (Bloodlands) — концепція Тімоті Снайдера; епіцентр Кривавих земель
  - розстріляне відродження (executed renaissance) — культурна еліта 1920-30-х; Сандармох
  - шістдесятники (sixtiers) — рух опору 1960-х; культурний спротив
  - подвійна свідомість (double consciousness) — психологічний наслідок тоталітаризму;
    травматичний механізм
