title: 'Синтез: Козацька революція'
content_outline:
- section: 'Вступ: Вибух, що змінив усе'
  points:
  - The definition of the Khmelnytsky Uprising as a revolution — change of social
    order, not just a rebellion; [!context] — Хмельниччина відбувалася одночасно з
    Англійською революцією Кромвеля (1640-1660)
  - 'The scale of changes: social, political, geopolitical — emergence of a new player
    on the European map; parallels with Westphalian Peace (1648)'
- section: 'Причини революції: Чому вибухнуло?'
  points:
  - 'Social oppression (serfdom) — [!quote] — Гійом ле Вассер де Боплан про гноблення
    селян: «Вони живуть у гіршому рабстві, ніж галерники»'
  - Religious discrimination (Uniate Church) — friction from Union of Brest; Ordinance
    of 1638 liquidating Cossack rights
  - Political lack of rights for Cossacks — attempt to turn Cossacks into peasants;
    «Золотий спокій» was an illusion
  - Personal tragedy of Khmelnytsky — raid on Subotiv as the spark
- section: 'Етапи боротьби: Від тріумфу до компромісу'
  points:
  - Initial victories (Yellow Waters, Korsun) — spring-autumn 1648; Battle of Pyliavtsi
  - The Treaty of Zboriv (1649) and statehood — recognition of autonomy; Register
    set at 40,000
  - Defeats (Berestechko) and the Treaty of Bila Tserkva — June 1651; betrayal by
    Tatars; Register reduced to 20,000; [!history-bite] — Битва під Берестечком була
    однією з найбільших битв Європи XVII ст. (до 300 тис. учасників)
  - The Pereiaslav Council (1654) and the alliance with Moscow — military alliance
    against three fronts; choice of «lesser evil»
  - The death of Khmelnytsky and the start of the Ruin — 1657; struggle for power
    begins
- section: 'Соціальні трансформації: Народження нації'
  points:
  - 'Liquidation of serfdom — de facto freedom on controlled territories; [!culture]
    — «Покозачення»: масовий перехід селян у козацький стан як спосіб здобути свободу'
  - Formation of the Cossack starshyna as a new elite — merger of former nobility
    and meritorious Cossacks
  - The role of the Orthodox Church — increased influence and consolidation
- section: 'Читання: Аналіз історичних документів'
  points:
  - Analysis of the Zboriv Treaty — defined three voivodeships (Kyiv, Chernihiv, Bratslav);
    amnesty and expulsion of Jesuits/Jews
  - Analysis of the March Articles — 11 (or 23) points; rights to foreign policy (except
    Poland/Turkey); confederative model or protectorate
- section: Первинні джерела
  points:
  - 'Eyewitness accounts (Paul of Aleppo, etc.) — [!quote] — Павло Алеппський: «Ми
    помітили в цьому благословенному народі набожність, богобоязливість і благочестя»;
    notes on high literacy rate'
  - Khmelnytsky's universals — instrument of executive power; calls to uprising and
    protection decrees
- section: Деколонізаційний погляд
  points:
  - 'Debunking the myth of ''reunification'' — [!myth-buster] — Міф про «возз''єднання»:
    Переяславська рада була військовим союзом, а не злиттям держав; Soviet concept
    of «вікове прагнення»'
  - Ukraine as a subject of international law — independent diplomatic relations (Turkey,
    Sweden)
  - The European context of the revolution — betrayal by Moscow in Vilna Truce (1656);
    pragmatism over «brotherhood»
  - 'Legacy: The birth of the modern Ukrainian state tradition — idea of Cossack statehood
    persisted until late 18th century'
