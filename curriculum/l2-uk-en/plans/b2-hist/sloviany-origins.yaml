module: b2-hist-004
level: B2-HIST
sequence: 4
slug: sloviany-origins
version: '2.0'
title: 'Слов''яни на українських землях: Витоки державності'
subtitle: Slavic Origins and Statehood
content_outline:
- section: Вступ
  words: 600
  points:
  - 'Етимологія слов''ян: слово vs слава — етимологічний зв''язок із поняттям «слово»
    (ті, що володіють зрозумілою мовою); [!history-bite]: протиставлення «свої» (зрозумілі)
    — «чужі» (німці/німі)'
  - Концепт німців як німих — первинне значення терміну як ідентифікатора інакшості
    та незрозумілості мови чужинців
- section: Читання
  words: 2400
  points:
  - 'Контекст: Пошук Прабатьківщини та археологія — теорії автохтонності на українських
    землях; [!context]: Пеньківська культура як археологічний відповідник літописних
    антів'
  - 'Основні події: Велике розселення та Антський Союз — міграційні процеси V–VII
    ст.; територіальне ядро у лісостепу між Дністром і Дніпром як протодержавне утворення'
  - 'Основні події: Князь Бож та боротьба з аварами — трагедія 375 року (загибель
    70 старійшин); [!myth-buster]: спростування міфу про пасивність слов''ян перед
    зовнішніми загрозами'
  - 'Наслідки: Побут, Економіка, Військове мистецтво — напівземлянки з піччю-кам''янкою;
    партизанська тактика (засідки, дихання через очеретинки в річках); відсутність
    важких обладунків'
  - 'Наслідки: Жінка в антському світі та виховання дітей — високий статус жінки в
    родині як хранительки вогнища; [!culture]: ритуал тризни та духовний світ предків'
  - 'Наслідки: Слов''янська дипломатія та кулінарія — вміння домовлятися з Візантією;
    служба у візантійському війську як найманців; використання льону для одягу з обереговою
    вишивкою'
- section: Первинні джерела
  words: 800
  points:
  - 'Прокопій Кесарійський про демократію — [!quote]: «Ці племена живуть у демократії...
    про все корисне чи шкідливе міркують спільно» (доказ давньої політичної традиції)'
  - Маврикій Стратег про тактику — опис волелюбності та неможливості схилити антів
    до рабства чи покори; використання природного ландшафту для оборони
- section: Деколонізаційний погляд
  words: 800
  points:
  - 'Спростування норманізму — [!myth-buster]: спростування радянського конструкту
    «давньоруської колиски»; акцент на самодостатності антської державності до приходу
    варягів'
  - Україна як епіцентр слов'янства — етногенетична спадкоємність українців від антів
    (згідно з М. Грушевським та М. Брайчевським)
  - 'Початки Києва: Кий як антський князь — гіпотеза про Кия як реального політичного
    лідера VI ст., який здійснював посольства до Царгорода (Константинополя)'
- section: Підсумок
  words: 400
  points:
  - 'Тяглість демократичної традиції — [!decolonization]: генетичний зв''язок антського
    віча з козацькими радами та сучасною політичною культурою України'
vocabulary_hints:
  required:
  - слов'яни (Slavs) — від «слово» (ті, що володіють зрозумілою мовою)
  - праслов'яни (Proto-Slavs) — спільні предки слов'янських народів
  - прабатьківщина (ancestral homeland) — територія первісного формування етносу
  - розселення (settlement/expansion) — Велике розселення слов'ян V-VII ст.
  - плем'я (tribe) — соціальна організація антів
  - язичництво (paganism) — дохристиянські вірування, Бог-громовержець
  - міграція (migration) — рух племен під час Великого переселення народів
  - народоправство (democracy/folk rule) — ключова характеристика антського суспільства
    за Прокопієм
  - віче (viche/popular assembly) — збори громади для вирішення важливих питань
  - громада (community) — основа соціального устрою
  - верв (verv/community organization) — територіальна громада
  - капище (pagan shrine) — місце для релігійних обрядів
  - волхв (magi/pagan priest) — охоронець давніх знань і ритуалів
  - Перун (Perun) — бог грому та блискавки
  - Велес (Veles) — бог достатку та худоби
  - тризна (tryzna/funeral feast) — поминальний обряд із військовими іграми
  - землянка (dugout/semi-subterranean dwelling) — напівземлянка з піччю-кам'янкою
    (16-20 м²)
  - соха (wooden plow) — знаряддя для обробітку ґрунту
  - рало (plow) — вдосконалене знаряддя праці
  - старійшина (elder) — досвідчений член роду, що входив до ради
  - дружина (retinue/warband) — озброєний загін при князі
  - вождь (leader/chieftain) — лідер племені або союзу
  - данина (tribute) — податок на користь князя або іншої держави
  - автохтон (autochthon/indigenous) — корінний житель певної території
  - топонім (toponym) — назва місцевості як історичне джерело
  recommended:
  - індоєвропейці (Indo-Europeans) — мовна сім'я, до якої належать слов'яни
  - Повість минулих літ (Primary Chronicle) — основне писемне джерело про початки
    Русі
  - каганат (khaganate) — Аварський каганат як головний супротивник антів
  - побут (daily life/lifestyle) — невибагливість та простота життя антів
  - господарство (economy/farming) — підсічно-вогневе землеробство
