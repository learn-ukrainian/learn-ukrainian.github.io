module: b2-hist-037
level: B2-HIST
sequence: 37
slug: bukovyna-zakarpattia
version: '2.0'
title: Буковина та Закарпаття під сусідами
content_outline:
- section: Вступ
  points:
  - Географічне та стратегічне положення Буковини та Закарпаття
  - Історична доля українських земель під іноземним пануванням
  - Особливості розвитку двох регіонів
- section: Буковина
  points:
  - Буковина під владою Молдавського князівства
  - Перехід до складу Османської імперії
  - Австрійське панування та модернізація краю
  - Роль Чернівців як культурного центру
- section: 'Повсякденне життя: Мульткультурний Вавилон'
  points:
  - Чернівці як мультикультурний центр
  - Сільське життя на Закарпатті
  - Етнічна різноманітність та толерантність
- section: Закарпаття
  points:
  - Закарпаття у складі Угорського королівства
  - Унгурська колонізація та мадяризація населення
  - Економічне становище та соціальна структура
  - Роль греко-католицької церкви в збереженні ідентичності
- section: Культурний опір та збереження ідентичності
  points:
  - Форми культурного опору під іноземним пануванням
  - Роль церкви та освіти в збереженні мови
  - Народні традиції як засіб консервації ідентичності
  - Культурні діячі Буковини та Закарпаття
- section: Читання
  points:
  - Тексти про історію регіонів
  - Свідчення про повсякденне життя
- section: Первинні джерела
  points:
  - Документи про адміністративний устрій
  - Етнографічні описи регіонів
- section: Деколонізаційний погляд
  points:
  - Критика колонізаційної політики сусідніх імперій
  - Стратегії збереження культурної автономії
  - Сучасне значення регіональної історії для національної пам'яті
- section: Потрібно більше практики?
  points:
  - Додаткові вправи для закріплення матеріалу
focus: history
pedagogy: CBI
