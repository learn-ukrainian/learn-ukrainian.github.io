slug: krymski-tatary-pislia-2014
version: '2.0'
title: Кримські татари після 2014
subtitle: Crimean Tatars After Russian Annexation
content_outline:
- section: 'Вступ: Подвійні жертви'
  points:
  - 'Кримські татари: корінний народ Криму — загроза знищення ідентичності на рідній
    землі; культурна травма повторної втрати дому'
  - Депортація 1944 та повернення — історична травма, що повторюється у гібридних
    формах (викрадення, залякування, культурний тиск)
  - 'Нова окупація 2014: історія повторюється — [!history-bite] вбивство Решата Аметова
    (березень 2014) як перший акт терору проти одиночного пікету'
- section: Російська окупація та репресії
  points:
  - Заборона Меджлісу — [!context] визнання органу «екстремістським» (26 квітня 2016,
    затв. Верховним судом РФ 29 вересня) та криміналізація самоврядування
  - Арешти активістів та журналістів — [!myth-buster] сфабриковані справи «Хізб ут-Тахрір»
    як інструмент боротьби з інакомисленням (понад 100 переслідуваних)
  - Обшуки та переслідування — тактика залякування (обшуки о 4-й ранку), викрадення
    людей (справа Ервіна Ібрагімова) та психологічний терор родин
  - Примусова мобілізація — використання призову до армії РФ (з 2022) як інструменту
    етнічної чистки та «утилізації» нелояльного населення
- section: Спротив та еміграція
  points:
  - 'Меджліс в еміграції — діяльність у Києві та координація спротиву (лідери: Мустафа
    Джемілєв, Рефат Чубаров)'
  - Мустафа Джемілєв та Рефат Чубаров — лідери нації у вигнанні; цитата Чубарова про
    «вердикт на знищення» кримськотатарського народу
  - Кримськотатарський батальйон — створення добровольчого формування ім. Номана Челебіджіхана
    (2016) для захисту адмінкордону
  - Кримські татари на материковій Україні — збереження зв'язків та адвокація; феномен
    «вимушеного переміщення» замість «добровільного виїзду»
  - Міжнародна адвокація — [!culture] феномен «Кримської солідарності» та акція «Кримський
    марафон» (збір монет по 10 рублів на штрафи)
- section: Первинні джерела
  points:
  - Свідчення репресованих — [!quote] листи Нарімана Джеляла (перший заст. голови
    Меджлісу, арешт 2021) з в'язниці («Ми не зломлені...»)
  - Звіти правозахисних організацій — документація злочинів (ООН, Human Rights Watch,
    ZMINA, Кримськотатарський Ресурсний Центр)
  - Рішення міжнародних судів — ігнорування Росією вимог про скасування заборони Меджлісу
    як доказ правового нігілізму окупанта
- section: Деколонізаційний погляд
  points:
  - Геноцид корінного народу — концепція «гібридного геноциду» та політика заміщення
    населення (витіснення корінних, завезення колонізаторів)
  - 'Російський колоніалізм: паралелі з 1944 — [!decolonization] мета імперії одна:
    Крим без кримських татар; методи: від товарних вагонів до тюремних камер'
  - Українсько-кримськотатарська солідарність — спільний ворог та формування єдиної
    політичної нації; спільна трагедія як фактор єднання
- section: 'Підсумок: Боротьба триває'
  points:
  - Міжнародне визнання депортації як геноциду — дипломатичні перемоги України на
    світовій арені
  - Деокупація та повернення — Крим як невід'ємна частина України; відкидання будь-яких
    компромісів щодо статусу півострова
  - Майбутнє кримськотатарського народу — статус національно-територіальної автономії
    у вільному Криму як гарантія збереження нації
vocabulary_hints:
  required:
  - 'Меджліс (Mejlis) — єдиний легітимний представницький орган, заборонений окупантами
    у 2016; collocations: заборона Меджлісу, члени Меджлісу'
  - 'депортація (deportation) — у контексті 2014 року: «гібридна депортація» (вимушене
    витіснення); context: прихована депортація'
  - 'репресії (repressions) — системний тиск: обшуки, арешти, викрадення; collocations:
    масові репресії, політичні репресії'
  - 'окупація (occupation) — тимчасовий контроль РФ над півостровом; context: режим
    окупації, в умовах окупації'
  - 'корінний народ (indigenous people) — статус, закріплений законодавством України
    (на відміну від нацменшини); context: права корінного народу'
  - 'правозахисник (human rights defender) — активісти «Кримської солідарності», адвокати
    політв''язнів; collocations: переслідування правозахисників'
  - 'анексія (annexation) — спроба незаконного приєднання території; context: спроба
    анексії, невизнана анексія'
  - 'геноцид (genocide) — політика знищення ідентичності (етноцид/гібридний геноцид);
    context: визнання геноциду'
  recommended:
  - 'адвокація (advocacy) — міжнародна робота з захисту прав; collocations: міжнародна
    адвокація, адвокаційна кампанія'
  - 'мобілізація (mobilization) — примусовий призов до армії ворога (воєнний злочин);
    context: прихована мобілізація'
  - 'переслідування (persecution) — за релігійною та політичною ознаками («Хізб ут-Тахрір»);
    context: кримінальне переслідування'
  - 'солідарність (solidarity) — громадський рух підтримки («Кримська солідарність»);
    context: громадянська солідарність'
  - 'деокупація (de-occupation) — процес звільнення території; collocations: стратегія
    деокупації'
  - 'трибунал (tribunal) — вимога покарання організаторів репресій; context: міжнародний
    трибунал'
  - 'політв''язень (political prisoner) — особа, ув''язнена з політичних мотивів;
    collocations: список політв''язнів, допомога політв''язням'
