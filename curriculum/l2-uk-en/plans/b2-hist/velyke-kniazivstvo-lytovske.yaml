module: b2-hist-029
level: B2-HIST
sequence: 29
slug: velyke-kniazivstvo-lytovske
version: '2.0'
title: Велике князівство Литовське — Руська держава
subtitle: Спадщина Gediminids та руська мова
content_outline:
- section: Вступ
  points:
  - 'Парадокс держави з руською мовою — 90% земель та населення були слов''янськими
    (руськими); cultural hook: феномен «оксамитового проникнення»'
  - ВКЛ як спадкоємець Київської Русі — Гедиміновичі титулувалися «королями Литви
    і Русі», приймали православ'я та принцип «старини не рушимо»
- section: Читання
  points:
  - 'Литовська експансія (1316-1392) — від Гедиміна до Вітовта; key date: 1362 — Битва
    на Синіх Водах (звільнення від татар за 18 років до Куликовської битви)'
  - 'Руська мова — державна мова ВКЛ — мова судочинства, княжої канцелярії та літописання;
    include hook: [!culture] про руську мову як lingua franca Східної Європи'
  - Релігійна толерантність — рівні права католиків і православних до Городельської
    унії 1413 року; приклад родів Острозьких та Вишневецьких
- section: Первинні джерела
  points:
  - 'Литовський статут 1529 — перший загальнодержавний кодекс, де руська мова затверджена
    як офіційна; include quote: «А писар земський має по-руськи...»'
  - 'Найпрогресивніший кодекс Європи — впровадження презумпції невинуватості та скасування
    колективної відповідальності роду; include hook: [!history-bite] порівняння з
    московським звичаєвим правом'
- section: Деколонізаційний погляд
  points:
  - ВКЛ vs Московське князівство — європейська договірна монархія з правами станів
    проти азійської деспотії без прав підданих
  - 'Два шляхи розвитку Русі — збереження вічевих традицій (шляхетська демократія)
    vs знищення віче (приклад Новгорода); include hook: [!decolonization] про справжнього
    спадкоємця політичної культури Русі'
- section: Критерії оцінювання
  points:
  - Інструкція для оцінювання
- section: Зразок відповіді
  points:
  - Приклад виконання завдання
- section: Підсумок — Спільна спадщина
  points:
  - 'Литва, Білорусь, Україна — три народи однієї держави — концепція «Іншої Русі»
    та спільний герб «Погоня»; include hook: [!reflection] про альтернативну історію
    Східної Європи'
- section: Потрібно більше практики?
  points:
  - Додаткові ресурси
focus: history
pedagogy: CBI
objectives:
- Учень може описувати роль українських земель у ВКЛ
- Учень може аналізувати значення руської мови як державної
- Учень може пояснювати принципи релігійної толерантності
grammar:
- Passive voice in historical texts
- Analytical structures
phase: B2.3a [Українська історія]
