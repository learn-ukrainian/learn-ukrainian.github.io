slug: ivan-mazepa-kultura
version: '2.0'
title: 'Іван Мазепа II: освіта і культура'
content_outline:
- section: 'Вступ: Золота доба українського духу'
  points:
  - 'Епоха Мазепи як культурний ренесанс українського народу — термін «Мазепинська
    доба» як синонім розквіту (1687–1709); [!context]: синонім найвищого розквіту
    українського бароко'
  - Поєднання європейських традицій та української ідентичності — освіта гетьмана
    в Девентері та знання 8 мов; навчання в Києво-Могилянському та єзуїтському колегіумах
  - Меценатство гетьмана як основа культурного відродження — інвестиції понад 1 мільйон
    дукатів у культуру та церкву; дані Бендерської комісії 1709 р.
- section: 'Києво-Могилянська академія: Афіни на Дніпрі'
  points:
  - Розширення та збагачення академії за підтримки Мазепи — будівництво нового кам'яного
    корпусу (Бурси) та Братського собору
  - Підготовка українських інтелектуальних еліт для держави та церкви — випускники
    формували еліту Східної Європи
  - 'Впровадження західноєвропейських освітніх програм та методів — [!history-bite]:
    неофіційна назва «Могило-Мазепинська академія»; титул ставив гетьмана в один ряд
    із засновником Петром Могилою'
  - Роль академії у формуванні національної свідомості — отримання офіційного статусу
    академії у 1701 році; підтверджено царською грамотою
- section: 'Мазепинське бароко: Архітектура національної величі'
  points:
  - 'Характерні риси мазепинського стилю в архітектурі — [!culture]: «гра світла»
    на білих стінах, грушоподібні бані, пишний декор; відсутність зовнішніх розписів'
  - Побудова та відновлення храмів за гетьманський кошт — Чернігівський колегіум,
    Троїцький собор, Мгарський монастир; Вознесенський собор (Переяслав)
  - Успенський собор Києво-Печерської лаври як вершина епохи — відновлення давньоруських
    святинь
  - 'Синтез візантійських, західноєвропейських та українських традицій — втрачені
    шедеври: Військовий Микільський та Богоявленський собори (знищені більшовиками)'
- section: 'Література і друк: Мазепинське слово як національна зброя'
  points:
  - Розвиток друкарської справи та видавництва книг — розкішні видання з гравюрами
    («Антимінс», «Євангеліє»)
  - Створення літературних творів, панегіриків та хронік — трагікомедія Феофана Прокоповича
    «Володимир» (1705); алегоричне прославлення Мазепи в образі князя Володимира
  - 'Використання літератури для утвердження державної ідеології — include quote:
    «Всіх славеноруських стран князь і повелитель...»; посвята від Феофана Прокоповича'
  - Роль українських письменників у формуванні політичного дискурсу — Пилип Орлик,
    Стефан Яворський
- section: Мистецтво гравюри та символіка влади
  points:
  - Розквіт української гравюри як мистецької форми — київська школа (І. Щирський,
    Л. Тарасевич)
  - Використання символів влади та національних емблем — герб «Курч» в архітектурному
    декорі
  - 'Поширення портретів гетьмана та ілюстрацій церковних книг — [!analysis]: гравюра
    І. Мигури «Мазепа серед своїх добрих справ» (1706); гетьман в оточенні збудованих
    церков та алегоричних фігур (Мудрість, Слава, Віра)'
- section: Українська барокова музика та хоровий спів
  points:
  - Розвиток партесного багатоголосся в церковній музиці — вплив «Граматики мусикійської»
    Миколи Дилецького
  - Підтримка хорових капел та музичних шкіл — емоційність і динамічність барокової
    естетики
  - Формування української барокової музичної традиції — Глухів як майбутній музичний
    центр
- section: Театральне мистецтво та шкільна драма
  points:
  - Розвиток театру при Києво-Могилянській академії — дидактична та пропагандистська
    функція театру
  - Шкільна драма як засіб виховання та національної освіти — постановки на історичні
    та релігійні теми
  - Поєднання релігійних та світських тем у виставах — використання інтермедій живою
    народною мовою; гумористичні сценки між актами серйозних драм
- section: 'Первинні джерела: Свідчення величі та щедрості'
  points:
  - Документи про вклади та дарування Мазепи церквам і монастирям — універсали та
    вкладні грамоти; приклад Густинського та Мгарського монастирів
  - Літописні згадки про культурні досягнення епохи — панегіричні вірші та посвяти
  - 'Архітектурні пам''ятки як матеріальні свідчення меценатства — include quote:
    «Же през шаблю маєм права» (з думи Мазепи); повна цитата: «А за волю, хоч умріте...»'
- section: 'Деколонізаційний погляд: Відновлення правди про мецената'
  points:
  - 'Спростування російських міфів про Мазепу як «зрадника» — [!myth-buster]: Мазепа-будівничий
    vs Мазепа-Юда; замовчування будівництва понад 40 храмів'
  - 'Відновлення історичної правди про культурні досягнення гетьмана — парадокс: анафема
    лунала в церквах, збудованих гетьманом'
  - Мазепа як символ української незалежності та європейського вибору — культура як
    державна політика
  - Сучасне переосмислення мазепинської спадщини — повернення імені в назви вулиць
    та установ
- section: Підсумок
  points:
  - Культурна спадщина Мазепи як основа української національної ідентичності — «кам'яний
    літопис», що пережив руїну
  - Мазепинське бароко як символ української європейської орієнтації — доказ приналежності
    до європейського культурного простору
- section: Читання
  points:
  - Додаткові матеріали про культурні досягнення епохи Мазепи — уривок про диспут
    в Академії або опис собору
focus: history
pedagogy: CBI
objectives:
- Учень може описати культурну спадщину Івана Мазепи
- Учень може пояснити особливості мазепинського бароко
- Учень може охарактеризувати роль Києво-Могилянської академії в культурному відродженні
- Учень може аналізувати Мазепу як мецената та покровителя мистецтв
