slug: galytsko-volynska-derzhava
version: '2.0'
title: 'Галицько-Волинська держава: Розквіт'
subtitle: Західний оплот Русі
content_outline:
- section: Вступ — Друга Русь на заході
  points:
  - Галичина і Волинь як спадкоємці Києва — [!context] переміщення центру державності
    після 1240 року; концепція «Королівства Русь» (Regnum Russiae)
  - Географічні переваги регіону — захист Карпатами та лісами Волині, віддаленість
    від степу («щит Європи»)
- section: Основні події
  points:
  - Хронологія та ключові дати — 1199 (об'єднання), 1205 (смерть Романа), 1238 (утвердження
    Данила), 1245 (битва під Ярославом), 1253 (коронація), 1264 (смерть Данила)
  - Періодизація історії князівства — 1. Утворення, 2. Смута (боярське свавілля),
    3. Розквіт (Романовичі), 4. Стабілізація/Занепад
- section: Роман Мстиславич — об'єднувач земель
  points:
  - Кар'єра волинського князя — син Мстислава Ізяславича, об'єднав Галичину і Волинь
    1199 року
  - Захоплення Галичини 1199 року — придушення боярської опозиції; фраза «Не погнітивши
    бджіл, меду не їстимеш»
  - «Самодержець всієї Русі» — амбіції і реальність — [!history-bite] титул «самодержець»
    як ознака жорсткої централізації; володіння землями «від Карпат до Дніпра» (включно
    з Києвом з 1202)
  - Загибель 1205 року та її наслідки — битва під Завихостом з поляками; початок 30-річної
    «Великої смути»
- section: Золота доба Романовичів
  points:
  - 'Данило і Василько — брати-співправителі — унікальний «дуумвірат»: Данило (зовнішня
    політика, війна), Василько (Волинь, внутрішні справи)'
  - Будівництво міст (Холм, Львів) — Холм як нова столиця; Львів засновано 1256 року
    на честь сина Лева
  - Економічний розквіт на торгових шляхах — солевидобування (Коломия, Дрогобич),
    торгівля; вирішальна перемога під Ярославом (1245) над боярами та угорцями
- section: Культура і мистецтво
  points:
  - Галицько-Волинський літопис як шедевр — світський характер, поетичний стиль, зосередженість
    на особах князів
  - Архітектура та іконопис — поєднання візантійських традицій з романським стилем
    (білокам'яне різьблення); Холмі, Галич (Успенський собор); Холмська ікона Богородиці
  - Зв'язки з Європою — [!culture] орієнтація на західні культурні зразки (готика,
    романський стиль)
- section: Первинні джерела — Слово о полку Ігоревім
  points:
  - Згадки про галицького Ярослава Осмомисла — [!quote] «Галицький Осмомисле Ярославе!
    Високо сидиш ти на своїм золотокованім престолі...»
  - «Галицький Осмомисл» як ідеал князя — контроль над Дунаєм («зачинив ворота Дунаєві»)
    та Карпатами; могутність Галичини до об'єднання з Волинню
- section: Деколонізаційний погляд — Забута держава
  points:
  - Чому радянська історіографія применшувала Галичину — [!decolonization] міф про
    «феодальну роздробленість» vs реальність монархії; намагання звести статус до
    регіонального «князівства»
  - Галицько-Волинська держава vs Московське князівство — європейська модель (магдебурзьке
    право, відкритість) vs деспотична модель Залісся
  - Альтернативний шлях розвитку Русі — збереження назви «Русь» і державної традиції;
    легітимна спадкоємність Києва (Regnum Russiae)
- section: Підсумок — Спадщина для нащадків
  points:
  - Значення для формування української ідентичності — збереження етноніму «русини»/«Русь»
    для українців до 19-20 ст.
  - Галичина як «П'ємонт» українства — продовження державності на 150 років після
    падіння Києва
- section: Потрібно більше практики?
  points:
  - Додаткові ресурси — Енциклопедія Сучасної України, Ізборник (Літопис Руський)
vocabulary_hints:
  required:
  - розквіт (flourish/heyday) — епоха розквіту, досягти розквіту
  - оплот (stronghold/bulwark) — західний оплот, оплот державності
  - єдність (unity) — відновлення єдності, територіальна єдність
  - коаліція (coalition) — антимонгольська коаліція, шукати союзників
  - самодержець (autocrat) — титул Романа Мстиславича, необмежена влада
  - спадкоємність (continuity/succession) — спадкоємність влади, київська спадщина
  recommended:
  - коронація (coronation) — коронація Данила (1253), королівський титул
  - дуумвірат (duumvirate) — правління двох (Данило і Василько)
  - смута (turmoil/troubles) — період смути, боярська смута
  - інтервенція (intervention) — іноземна інтервенція (угорська, польська)
focus: history
