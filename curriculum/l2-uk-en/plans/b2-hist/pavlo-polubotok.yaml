slug: pavlo-polubotok
version: '2.0'
title: 'Павло Полуботок: Останній наказний'
content_outline:
- section: 'Вступ: Тінь великого Петра'
  points:
  - Руїна як період перманентного конфлікту гетьманів та російської влади — курс Петра
    I на ліквідацію автономії після Полтави (1709) та атмосфера страху й доносів
  - Скасування гетьманства Петром I та створення Малоросійської колегії — смерть Івана
    Скоропадського (1722) як зручний момент для заборони виборів
  - Павло Полуботок як наказний гетьман у час тотального контролю — [!context] термін
    «наказний» означав тимчасовість, що стала пасткою безвладдя
- section: 'Читання: Конфлікт із Вельяміновим'
  points:
  - Вельямінов як голова Малоросійської колегії та інструмент русифікації — бригадир
    Степан Вельямінов поводився як губернатор завойованої території
  - Систематичне обмеження козацьких вольностей та автономії Гетьманщини — [!decolonization]
    побудова паралельної структури влади для заміщення інституцій
  - Конфлікт між традиційним козацьким правом і російськими указами — суперечка за
    підпорядкування судів і канцелярії та податковий тиск
  - Опір Полуботка колоніальній політиці Петербурга — саботаж наказів колегії та заборона
    сотникам виконувати розпорядження росіян
- section: 'Первинні джерела: Промова перед Петром'
  points:
  - Текст прохання про відновлення гетьманства та козацьких прав — [!myth-buster]
    промова ймовірно є літературним твором з «Історії Русів» та праці Жана-Бенуа Шерера
  - Аргументація на основі Переяславської угоди 1654 року — теза про добровільний
    протекторат, а не рабство
  - Захист економічних привілеїв старшини та козацької еліти — риторика про тиранію
    чиновників, що руйнує край, та апеляція до Божого суду
- section: 'В''язниця і смерть: Мучеництво за право'
  points:
  - Арешт Полуботка та його сподвижників у 1723 році — реакція на Коломацькі чолобитні;
    ув'язнення в казематах Трубецького бастіону
  - Ув'язнення в Петропавлівській фортеці без суду — [!history-bite] жахливі умови
    (сирість, холод) для літньої людини як смертний вирок
  - Смерть у в'язниці 1724 року як символ боротьби за автономію — помер 29 грудня,
    за 40 днів до смерті самого Петра I
  - Канонізація образу страдника за українські права — містичний зв'язок смертей царя
    і гетьмана у народній пам'яті
- section: 'Господарник-олігарх: Економічна база незалежності'
  points:
  - Полуботок як великий землевласник та підприємець — [!culture] меценатство (ікони,
    книги) та підтримка церков як інструмент культурного впливу
  - Маєтки, млини, винокурні як фінансова база опору — експорт зерна та тютюну до
    Європи (Гданськ, Бреслау)
  - Старшинська економіка як основа політичної незалежності — модель «багата старшина
    = сильна держава» проти російської бюрократії
- section: 'Легенда про скарби: Міф і реальність'
  points:
  - Походження легенди про золото Полуботка в англійських банках — чутки про 2 бочки
    золота (200 000 червінців), відправлені через Архангельськ
  - Версії про депозит та боргові претензії України до Британії — розслідування О.
    Рубця (1907) та ажіотаж 1990-х
  - Розвінчання міфу істориками у ХХ столітті — [!history-bite] чутки 1990 року про
    38 кг золота кожному українцю під час візиту Тетчер
  - Легенда як символ втраченої незалежності та компенсації — метафора «відкладеного
    майбутнього» та надії на справедливість
- section: 'Деколонізаційний погляд: Руйнування імперських міфів'
  points:
  - Радянська історіографія про Полуботка як сепаратиста — імперський міф про «класового
    ворога» та «зрадника», що опирався реформам
  - Реабілітація образу в незалежній Україні як захисника автономії — спростування
    тези про «добровільне злиття» та хроніка адміністративного насилля
  - Полуботок у контексті антиколоніальної боротьби — захист конституційних прав (Березневих
    статей) Гетьманщини
  - Паралелі з іншими жертвами російської експансії — прагматичний політик, що програв
    силі, але виграв морально
- section: Підсумок
  points:
  - Полуботок як символ опору централізації та русифікації — останній представник
    епохи «козацького бароко»
  - Трагедія ліквідації козацької автономії XVIII століття — урок про те, що економічна
    незалежність є головним ворогом автократії
focus: history
pedagogy: CBI
objectives:
- Учень може описати конфлікт між Полуботком і Малоросійською колегією
- Учень може пояснити суть легенди про золото Полуботка
- Учень може проаналізувати промову Полуботка перед Петром I
- Учень може охарактеризувати економічну діяльність гетьмана
grammar:
- Історичний наратив
- Пасивний стан в історичному тексті
register: публіцистичний
phase: B2.3b [Українська історія]
vocabulary_hints:
  required:
  - наказний гетьман (acting hetman) — виконуючий обов'язки; contested term vs імперське
    «тимчасовий адміністратор»
  - Малоросійська колегія (Little Russian Collegium) — інструмент колоніального управління;
    очолював Вельямінов
  - Петропавлівська фортеця (Peter and Paul Fortress) — місце ув'язнення і смерті
    Полуботка; символ імперського терору
  - автономія (autonomy) — політична самостійність; ключова вимога Полуботка
  - централізація (centralization) — політика Петра I щодо ліквідації місцевих прав
  - старшина (Cossack officers/elite) — козацька еліта, економічна база гетьманату
  - вольності (liberties/freedoms) — конституційні права, гарантовані угодами
  - русифікація (russification) — примусове насадження російських норм
  recommended:
  - Гетьманщина (Hetmanate) — козацька держава
  - Руїна (The Ruin) — період хаосу і громадянських воєн
  - депозит (deposit) — в контексті легенди про золото в банку Англії
  - маєтки (estates) — земельні володіння Полуботка на Чернігівщині
  - чолобитна (petition) — офіційне прохання до царя (Коломацькі чолобитні)
  - універсал (universal/decree) — гетьманський наказ, який Вельямінов вимагав дублювати
