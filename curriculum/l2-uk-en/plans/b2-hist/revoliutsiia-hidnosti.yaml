title: 'Революція Гідності: Євромайдан'
subtitle: 'The Revolution of Dignity: Euromaidan'
content_outline:
- section: 'Вступ: Чому «Гідність»?'
  points:
  - '21 листопада 2013: відмова від асоціації з ЄС — уряд Азарова призупиняє підготовку;
    перший пост Мустафи Найєма як каталізатор'
  - 'Перший Майдан: студенти та європейські прапори — романтичний етап: лекції на
    відкритому повітрі, пісні, відсутність партійної символіки'
  - Чому революція отримала назву «Гідність» — захист права на вибір і честі проти
    грубої сили; [!context] про символізм дати 21 листопада (співпадіння з Помаранчевою
    революцією)
- section: Хронологія подій
  points:
  - Побиття студентів 30 листопада — «Звіряче побиття» «Беркутом» як точка неповернення;
    include quote зі щоденника або посту тієї ночі («Київ, вставай!»)
  - Мільйонний марш 1 грудня — реакція суспільства на насилля; захоплення КМДА та
    Будинку профспілок; [!history-bite] про «Набат» Михайлівського монастиря
  - 'Закони 16 січня: «диктаторські закони» — ручне голосування у ВР, обмеження прав
    (заборона касок/масок), що призвело до ескалації'
  - 'Грушевського та перші жертви — «Вогнехреща» (19-22 січня); перші загиблі: Нігоян,
    Жизневський, Вербицький'
  - '18-20 лютого: розстріли на Інститутській — «Кривавий четвер», масові вбивства
    неозброєних протестувальників; [!myth-buster] про «печиво Нуланд» та «американські
    гроші» проти волонтерської самоорганізації'
  - Втеча Януковича — постанова ВР про самоусунення президента; втеча до Росії як
    акт зради
- section: Небесна Сотня
  points:
  - 'Хто вони: герої революції — люди різного віку (17–83) та професій; свідома пожертва
    життям (дерев''яні щити проти куль)'
  - Сергій Нігоян — перший загиблий — [!biography] вірменин з Дніпропетровщини, який
    читав Шевченка (символ політичної нації)
  - Вшанування пам'яті — пісня «Пливе кача по Тисині» як реквієм революції
  - Небесна Сотня як символ — сакралізація жертви заради майбутнього
- section: Первинні джерела
  points:
  - Відеозаписи подій на Майдані — стріми Spilno.tv та Громадського, які дивилися
    мільйони
  - 'Свідчення учасників — include quote: «Ми вийшли не за Європу, ми вийшли за гідність...»'
  - Журналістські розслідування — документування злочинів режиму проти людяності
- section: Деколонізаційний погляд
  points:
  - 'Російський наратив: «державний переворот» — міф про «путч» та «радикалів» для
    виправдання агресії'
  - 'Реальність: народне повстання за гідність — [!decolonization] відмова від терміну
    «пострадянський простір» на користь європейської ідентичності'
  - Євромайдан як антиколоніальна революція — завершення радянського періоду («Ленінопад»
    8 грудня); суб'єктність народу як джерела влади
- section: 'Підсумок: Наслідки революції'
  points:
  - Перемога і початок війни — Росія скористалася тимчасовим ослабленням влади для
    окупації Криму
  - Україна на шляху до Європи — народження потужного волонтерського руху та громадянського
    суспільства
  - Спадщина Майдану — перехід російськомовних на українську як акт політичного самовизначення
vocabulary_hints:
  required:
  - гідність (dignity) — Революція Гідності, захищати гідність
  - Майдан (Maidan) — вийти на Майдан, Євромайдан
  - революція (revolution) — мирний протест, Революція Гідності vs державний переворот
  - протест (protest) — мирний протест, учасники протесту
  - Небесна Сотня (Heavenly Hundred) — герої Небесної Сотні, вшанування пам'яті
  - свобода (freedom) — ціна свободи, боротьба за свободу
  - демократія (democracy) — демократичні цінності, захист демократії
  - євроінтеграція (European integration) — курс на євроінтеграцію, Угода про асоціацію
  recommended:
  - беркут (Berkut) — жорстокість «Беркуту», розгін студентів
  - барикади (barricades) — будувати барикади, стояти на барикадах
  - автомайдан (Automaidan) — колона Автомайдану
  - тітушки (titushky) — найманці влади, провокатори
  - самооборона (self-defense) — загони самооборони Майдану
  - люстрація (lustration) — вимога люстрації влади
