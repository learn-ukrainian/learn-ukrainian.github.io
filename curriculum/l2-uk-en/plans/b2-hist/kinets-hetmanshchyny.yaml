title: Кінець Гетьманщини
subtitle: The End of the Hetmanate
content_outline:
- section: Вступ
  points:
  - Контекст занепаду автономії Гетьманщини у XVIII столітті — «Золота осінь» Кирила
    Розумовського та спроби реформ (судова, військова, Батуринський університет)
  - Російська імперська політика централізації влади — епоха «освіченого абсолютизму»,
    де Гетьманщина була аномалією
  - Значення ліквідації гетьманства для української історії — інсценізована «Глухівська
    рада» 1764 року та примусова відставка Розумовського
- section: Читання
  points:
  - 'Скасування гетьманства Катериною II у 1764 році — створення Другої Малоросійської
    колегії на чолі з П. Румянцевим; cultural hook: інструкція про стирання пам''яті
    про гетьманів'
  - Знищення Запорізької Січі у 1775 році — напад військ генерала Текелія після війни
    з Туреччиною; арешт Петра Калнишевського (Соловецький монастир)
  - Запровадження кріпацтва на українських землях — указ 1783 року, що завершив 300
    років козацької свободи
  - Ліквідація козацьких привілеїв та автономії — перетворення полків на гусарські
    (1765), скасування полкового устрою на Гетьманщині (1781)
  - Російська колонізація та русифікація українських земель — бренд «Новоросія» на
    козацьких землях, роздача земель російським дворянам та іноземцям
  - Політика асиміляції української еліти — надання прав російського дворянства в
    обмін на лояльність («Малоросійське дворянство»)
  - Економічні наслідки інкорпорації до Російської імперії — Румянцевський опис (1765–1769)
    як підготовка до тотального оподаткування
  - Культурний занепад та втрата національних інституцій — заміна козацького судочинства
    та адміністрації намісництвами
- section: Деколонізаційний погляд
  points:
  - Ліквідація Гетьманщини як акт колонізації — використання термінів «анексія» та
    «інкорпорація» замість «об'єднання»
  - Спростування російських наративів про «об'єднання братніх народів» — [!myth-buster]
    міф про «Дике Поле» та «цивілізаційну місію» імперії
  - Наслідки втрати державності для української нації — перетворення політичної нації
    на етнографічну масу («земляцтво»)
- section: Первинні джерела
  points:
  - 'Укази Катерини II про скасування гетьманства — Маніфест 1775 року: «Самое названіе
    Запорожскихъ Козаковъ... на вѣчныя времена истребить»'
  - Свідчення сучасників про руйнування Січі — [!quote] спогади Микити Коржа про сльози
    козаків, що брали рідну землю в чоботи
  - Документи про впровадження кріпацтва — юридичне закріпачення селян Лівобережжя
    та Слобожанщини (1783)
  - 'Листи та спогади українських козаків про трагедію — [!quote] «Історія Русів»:
    «Рум''янцівська колегія увійшла... як паморозь на руно»'
- section: Підсумок
  points:
  - Ліквідація Гетьманщини як кінець української державності — цивілізаційна катастрофа,
    втрата політичного класу та війська
  - Початок нового періоду колонізації та русифікації — [!history-bite] початок «довгого
    XIX століття» бездержавності, що тривало до 1917 року
- section: Потрібно більше практики?
  points:
  - Додаткові матеріали для поглибленого вивчення теми
