slug: povnomasshtabne-vtorhnessnia
version: '2.0'
title: Повномасштабне вторгнення
subtitle: The Full-Scale Invasion
content_outline:
- section: 'Вступ: День, що змінив світ'
  points:
  - '24 лютого 2022: о 5 ранку — масовані ракетні удари та початок наземного вторгнення
    з півночі, сходу та півдня'
  - Масштаб вторгнення — точкою неповернення для глобальної системи безпеки; [!context]
    24 лютого змінило світ
  - «Три дні до Києва» — російський план — західні розвідки прогнозували падіння столиці
    за 72-96 годин
- section: Перші дні
  points:
  - Удари по всій Україні — атака на військову інфраструктуру, аеродроми та склади
  - Напрямки наступу — з Білорусі (на Київ), з Росії (на Харків, Суми), з Криму (на
    Херсон)
  - 'Гостомель: десант на аеропорт — спроба створити повітряний міст; знищення «Мрії»
    (27.02); [!history-bite] оборона аеропорту зірвала бліцкриг'
  - 'Звернення Зеленського: «Я тут» — 25 лютого, вулиця Банкова; переломний момент
    в інформаційній війні'
- section: Битва за Київ
  points:
  - Оборона столиці — підрив мостів через річку Ірпінь; роль артилерії та мобільних
    груп з NLAW/Javelin
  - Бучанська трагедія — масові воєнні злочини проти цивільного населення (розстріли,
    катування)
  - Ірпінь, Буча, Гостомель — місяць окупації та героїчного опору; «Місто-герой»
  - Відступ російських військ — повне звільнення Київщини 2 квітня 2022 року
  - Чому «блискавична війна» провалилась — [!myth-buster] міф про «другу армію світу»
    проти реальності українського спротиву
- section: Первинні джерела
  points:
  - Звернення президента Зеленського — [!quote] «Всі ми тут. Захищаємо нашу незалежність»
  - Свідчення очевидців — жителі передмість Києва про життя в окупації
  - 'Супутникові знімки — [!source] Maxar Technologies: 64-кілометрова колона техніки,
    що так і не дійшла до Києва'
- section: Деколонізаційний погляд
  points:
  - 'Російська пропаганда: «спецоперація» — міфи про «демілітаризацію» та «денацифікацію»'
  - 'Реальність: неоімперська агресія — [!decolonization] війна на знищення української
    нації (етноцид)'
  - Україна як суб'єкт, не об'єкт історії — остаточний розрив наративу про «братні
    народи»; Україна не «Russia's backyard»
- section: 'Підсумок: Перші перемоги'
  points:
  - Оборона Києва як символ — [!culture] «Київ за три дні» як мем про крах імперських
    амбіцій
  - Світова підтримка — санкції, зброя та об'єднання Заходу
  - 'Від оборони до контрнаступу — моральний поштовх: Україна вистояла як держава'
