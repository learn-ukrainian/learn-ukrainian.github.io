content_outline:
- points:
  - 'Провокація: Право на повстання чи тероризм? Коліївщина — це священна війна за волю чи кривава різанина, що вийшла з-під
    контролю? Де межа, і хто її визначає?'
  - 'Місце сили: Холодний Яр — сакральний центр опору, від скіфських городищ до повстанців УНР. Чому саме він став колискою
    повстання 1768 року?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Національно-визвольна війна (українська історіографія) vs. бунт черні та різанина (російсько-польська
    імперська версія).'
  - 'Дебат 2: Іван Гонта — зрадник польського короля чи мученик за український народ? Аналіз вибору в умовах колоніального
    тиску.'
  - '[!epistemic-humility] Як відрізнити факт від пропаганди? Джерела про Коліївщину написані або жертвами, або катами, або
    сторонніми силами зі своїми інтересами. Об''єктивність майже неможлива.'
  - 'Глобальна синхронність: Повстання відбувається на тлі Барської конфедерації в Польщі та стає приводом для Російсько-турецької
    війни (1768–1774), вписуючи локальний конфлікт у велику геополітику.'
  section: 'Конфліктна карта: Свята війна чи кривавий бунт?'
  words: 900
- points:
  - '[!decolonization] Критичний аналіз польських мемуарів та російських офіційних рапортів (напр. генерала Кречетнікова).
    Читання «проти шерсті» для виявлення української суб''єктності.'
  - Українські літописи (напр. "Уманський літопис") та їхня перспектива. Як вони описують події зсередини?
  - 'Народна пам''ять: Дума «Максим козак Залізняк» та гайдамацькі пісні. Як фольклор створює ідеалізований образ героя та
    виправдовує насильство?'
  - 'Тарас Шевченко як «свідок»: поема «Гайдамаки» — не історичний документ, а ключове джерело для розуміння місця Коліївщини
    в національній пам''яті XIX ст.'
  - '[!biography] Максим Залізняк та Іван Гонта — аналіз постатей через призму джерел. Від реальних людей до символів.'
  section: 'Джерела: Хроніки, епос та свідчення'
  words: 1600
- points:
  - 'Причини повстання: соціальний гніт (панщина), релігійні утиски православних (Барська конфедерація), економічна експлуатація.'
  - 'Короткострокові наслідки: жорстоке придушення повстання, «Коднянська книга» як символ державного терору, арешт та страта
    лідерів, тисячі жертв.'
  - 'Довгострокові наслідки: Коліївщина як потужний національний міф, що надихав наступні покоління борців (від УНР до сучасності).
    Остаточна руйнація українсько-польського діалогу на століття.'
  - '[!myth-buster] "Золота грамота" Катерини II — ймовірно, фейк, створений для легітимізації повстання. Освячення ножів
    у Мотронинському монастирі — сакралізація насильства, потужний міф, але чи був він насправді?'
  - 'Оцінки істориків: порівняння поглядів Грушевського (народний рух), Субтельного (соціальний бандитизм), Плохія (антиколоніальна
    війна) на природу та значення повстання.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює власну аргументовану відповідь на питання про право на повстання, використовуючи
    докази з модуля.'
  - '[!anti-hagiography] Етичні дилеми насильства. Чи виправдовує мета засоби? Критичне осмислення жорстокості повстанців,
    зокрема під час Уманської різні, без романтизації.'
  - 'Зв''язок із сьогоденням: Уроки Коліївщини для сучасної України. Небезпека надії на зовнішніх «союзників» (зрада Росії),
    тяглість визвольної боротьби, пам''ять про жертв як частина національної ідентичності.'
  section: Дискусія та підсумок
  words: 700
focus: Коліївщина як кульмінація гайдамацького руху 1768 року. Аналіз причин, перебігу, та наслідків, включаючи Уманську трагедію.
  Деколонізаційний погляд на постаті Залізняка, Гонти та саме повстання.
level: HIST
module: hist-071
objectives:
- Пояснювати комплексні соціальні, релігійні та економічні причини Коліївщини
- Аналізувати суперечливі образи Максима Залізняка та Івана Гонти, розрізняючи історичні факти та міфологізацію
- Критично оцінювати упередженість першоджерел (польських, російських, українських), що описують повстання
- Формулювати аргументовану позицію щодо етичних дилем повстання та його довгострокового впливу на українську національну
  ідентичність
