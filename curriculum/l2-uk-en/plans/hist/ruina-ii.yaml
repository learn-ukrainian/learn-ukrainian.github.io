content_outline:
- points:
  - 'Провокація: «Сонце Руїни» — це трагічний герой, що боровся за єдність, чи авантюрист, що поставив усе на турецьку карту
    і програв? Чи могла одна людина врятувати державу, коли всі воювали проти всіх?'
  - '[!history-bite] Літературне походження прізвиська: як драма Василя Пачовського (1911) створила романтичний образ, що
    затьмарив реальну історичну постать.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Союз із Османською імперією — це зрада православ''я та національних інтересів чи єдиний можливий прагматичний
    хід у відповідь на Андрусівську змову Москви та Польщі? [!decolonization] Розвінчання радянського та імперського міфу
    про «турецького васала».'
  - 'Дебат 2: Дорошенко проти Сірка — конфлікт двох ідеологій. Централізована держава (Дорошенко) проти анархічної вольниці
    та «чистого православ''я» (Сірко). Хто з них був більшим патріотом України?'
  - '[!epistemic-humility] Ми не знаємо точних мотивів Дорошенка. Хроніки описують його дії, але його особисті листи та щоденники
    не збереглися. Історики змушені реконструювати його логіку.'
  - 'Глобальна синхронність: У той час як Дорошенко шукав союзу з Портою, Людовік XIV вів Голландську війну, а Річ Посполита
    слабшала, що й відкрило туркам шлях на Поділля.'
  section: 'Конфліктна карта: ''Зрада'' чи ''Realpolitik''?'
  words: 900
- points:
  - 'Аналіз Корсунської ради 1669: Текст угоди з Османською імперією. Що означав статус «протекторату»? Порівняння з умовами
    для Молдавії чи Трансільванії. Чому козацька старшина підтримала цей союз?'
  - 'Бучацький мирний договір 1672: Вперше в міжнародному документі згадується «Українська держава» (Panstwo Ukrainskie).
    Аналіз тексту договору — що здобув і що втратив Дорошенко? [!decolonization] Факт визнання суб''єктності України, навіть
    під протекторатом.'
  - 'Щоденник Патріка Гордона: Шотландський офіцер на московській службі описує облогу Чигирина як «пекло на землі». Його
    свідчення як джерело про інтенсивність бойових дій та героїзм оборонців.'
  - 'Донесення французького дипломата: Опис Дорошенка як людини «великого розуму та сміливості», що маневрує між трьома імперіями.
    Погляд на гетьмана очима європейської дипломатії.'
  section: 'Джерела: Свідчення іноземців та міжнародні договори'
  words: 1600
- points:
  - 'Державотворчі зусилля: Створення 20-тисячного найманого війська (сердюки) як спроба побудувати регулярну армію, незалежну
    від старшинських чвар. Чи був це крок до абсолютизму?'
  - 'Фатальний удар по державі: Падіння Кам''янця-Подільського та спустошення Поділля османськими військами. Як військовий
    тріумф перетворився на політичну катастрофу, підірвавши авторитет гетьмана серед населення.'
  - 'Крах столиці: Знищення Чигирина як символічний кінець епохи Хмельниччини. Аналіз коротко- та довгострокових наслідків
    втрати гетьманської столиці.'
  - '[!myth-buster] Доля після капітуляції: Дорошенко не був закатований. Він жив у почесному засланні у Вятці, був воєводою.
    Його правнучка — Наталія Гончарова, дружина Пушкіна. Чому імперія ставилася до нього з повагою?'
  - 'Оцінки істориків: Порівняння поглядів (Грушевський, Липинський, Субтельний) на Дорошенка. Чи був він останнім справжнім
    державником козацької епохи?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: То хто ж такий Дорошенко? Студент формулює власну оцінку, спираючись на проаналізовані джерела
    та аргументи.'
  - 'Історична дилема: Чи міг Дорошенко перемогти? Які були альтернативи турецькому союзу? Чи була взагалі можлива незалежна
    Україна в геополітичних реаліях XVII століття?'
  - '[!anti-hagiography] Руїна як урок: Дорошенко — не святий. Його політика призвела до жахливих руйнувань. Важливо уникнути
    романтизації «сильної руки» і проаналізувати ціну його рішень.'
  - 'Зв''язок із сьогоденням: Уроки Дорошенка для сучасної України — необхідність національної єдності перед зовнішньою загрозою,
    небезпека покладання на ненадійних союзників, важливість збереження внутрішньої легітимності влади.'
  section: Дискусія та підсумок
  words: 700
focus: Petro Doroshenko's attempt to unite Ukraine, his alliance with the Ottoman Empire, the conflict with Ivan Sirko, the
  defense of Chyhyryn, and his legacy as the 'Sun of the Ruin'.
level: HIST
module: hist-059
objectives:
- Пояснювати політичну програму Петра Дорошенка, спрямовану на досягнення соборності українських земель
- Критично аналізувати причини та наслідки союзу Гетьманщини з Османською імперією, розрізняючи поняття «протекторат» та «васалітет»
- Оцінювати роль Івана Сірка та запорізької опозиції як дестабілізуючого фактора для гетьманської влади
- Формулювати аргументовану позицію щодо спадщини Дорошенка як трагічної фігури епохи Руїни
