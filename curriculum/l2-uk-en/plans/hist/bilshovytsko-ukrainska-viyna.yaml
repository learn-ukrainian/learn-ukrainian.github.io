content_outline:
- points:
  - 'Провокація: Радянська Росія визнає незалежність України, і того ж дня висуває ультиматум, що веде до війни. Як один документ
    може містити і визнання, і погрозу? І чим це відрізняється від ультиматумів, які висувають сьогодні?'
  - '[!quote] «Ми, Рада Народних Комісарів, визнаємо Народну Українську Республіку... але вимагаємо...» — уривок з ультиматуму
    Раднаркому. Про що насправді цей текст?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була це «громадянська війна»? Радянська/російська історіографія наполягає на внутрішньому конфлікті. [!decolonization]
    Український погляд — це була перша війна Росії проти незалежної України, зовнішня агресія з використанням маріонеткових
    урядів (Харків).'
  - 'Дебат 2: Що стало головною причиною поразки УНР? Внутрішні чинники (брак єдності еліт, повільна аграрна реформа) чи зовнішні
    (переважна військова сила агресора, відсутність союзників, байдужість Антанти)?'
  - '[!epistemic-humility] Історики сперечаються про ступінь підтримки УНР населенням. Наскільки глибоко ідеї незалежності
    проникли в селянські маси, виснажені Першою світовою війною?'
  - 'Глобальна синхронність: Розпад імперій (Російської, Австро-Угорської, Османської) та боротьба за незалежність нових націй
    (Польща, Фінляндія, Литва, Україна). Війна УНР — частина глобального процесу.'
  section: 'Конфліктна карта: Громадянська війна чи війна за незалежність?'
  words: 900
- points:
  - 'Аналіз тексту «Ультиматуму Раднаркому» (грудень 1917): риторика vs реальні вимоги. Як більшовики використовують мову
    права на самовизначення для виправдання вторгнення.'
  - '[!decolonization] Читаємо ультиматум «проти шерсті»: які пункти були завідомо невиконуваними для суверенної держави?
    Як це створювало casus belli?'
  - 'Спогади учасників бою під Крутами (Аверкій Гончаренко): образ студентського куреня як «найкращих дітей України». Аналіз
    мови спогадів: героїзація, самопожертва, створення національного міфу.'
  - 'Наказ №1 М. Муравйова під час штурму Києва (лютий 1918): аналіз мови ворожнечі, дегуманізація супротивника («петлюрівці»),
    санкціонування «червоного терору».'
  - 'Текст Варшавської угоди (квітень 1920): болісний компроміс Петлюри. Які територіальні поступки були зроблені? Чому цей
    союз був необхідний і водночас трагічний для України?'
  section: 'Джерела: Ультиматуми, щоденники, накази'
  words: 1600
- points:
  - 'Короткострокові наслідки: «червоний терор» у Києві (до 5000 жертв), фізичне знищення української інтелігенції та офіцерства.
    Затримка ворога під Крутами, що дозволила укласти Брестський мир.'
  - 'Довгострокові наслідки: Поділ України між Польщею та Радянською Росією (Ризький мир 1921). Втрата державності, що відкрила
    шлях до Голодомору 1932-33 рр.'
  - '[!myth-buster] Міф про те, що «білі» (денікінці) були кращими за «червоних» (більшовиків). Реальність: обидві сили були
    імперськими та антиукраїнськими, що підтверджує народне гасло «Бий білих, поки не почервоніють, і червоних, поки не побіліють».'
  - 'Порівняння оцінок: Сергій Плохий наголошує на «фатальній несумісності» українського національного проєкту з російським
    імперським. Орест Субтельний акцентує на внутрішній слабкості УНР. Як ці погляди доповнюють один одного?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, війна 1917-1921 — це громадянська війна чи війна за незалежність? Сформулюйте відповідь,
    використовуючи докази з джерел та аналізу.'
  - '[!anti-hagiography] Попри героїзм воїнів (Крути, Зимовий похід), політичне керівництво УНР припустилося багатьох помилок.
    Чи можна було уникнути поразки? Який урок з цього винесла Україна?'
  - 'Паралелі із сучасністю: тактика гібридної війни (створення маріонеткових «республік» у Харкові 1917 р. та в Донецьку/Луганську
    2014 р.), інформаційна війна, енергетичний шантаж. Які методи російської агресії залишилися незмінними за 100 років?'
  - 'Спадщина: попри військову поразку, сам факт існування УНР та її збройної боротьби став фундаментом для наступних поколінь
    борців за незалежність (УПА) і для сучасної Української держави.'
  section: Дискусія та підсумок
  words: 700
focus: The 1917-1921 war as a decolonization struggle, not a civil war. Analysis of hybrid warfare tactics, key battles (Kruty),
  and the political causes of UNR's defeat.
level: HIST
module: hist-095
objectives:
- Описувати основні події та етапи більшовицько-української війни 1917-1921 років
- Пояснювати причини поразки УНР, розрізняючи внутрішні та зовнішні фактори
- Аналізувати військове протистояння з деколонізаційної перспективи, розрізняючи поняття «війна за незалежність» та «громадянська
  війна»
- Критично аналізувати первинні джерела періоду (ультиматуми, спогади, накази), визначаючи їхню мету та упередженість
pedagogy: CBI
