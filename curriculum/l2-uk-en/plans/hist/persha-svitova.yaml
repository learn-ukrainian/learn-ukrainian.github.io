content_outline:
- points:
  - 'Провокативне питання: 1914 рік, ви — молодий українець. До якої армії підете: кайзерівської чи царської? Чи є третій
    шлях, коли імперії вимагають вашої крові?'
  - 'Фрагмент листа без контексту: «…і побачив я в їхніх очах ту саму тугу, що й у наших. Стоїмо по різних боках Збруча, а
    земля ж одна…»'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Український vs. Імперський погляд): Чи були українці «вірними підданими» імперій, чи «гарматним м''ясом»? Російська
    пропаганда про «звільнення братів-галичан» vs. реальність репресій (Генерал-губернаторство Бобринського, висилка Грушевського).'
  - 'Дебат 2 (Внутрішньоукраїнський вибір): «Австрофіли» (УСС, віра в здобуття автономії від Відня) vs. «Русофіли» (надія
    на об''єднання всіх українських земель під Росією). Чому ці два шляхи виявилися трагічними?'
  - '[!epistemic-humility] Мотивація 4.5 мільйонів українських солдатів невідома. Більшість була мобілізована примусово. Наскільки
    ідеї національних рухів були поширені в окопах?'
  - 'Глобальна синхронність: Поляки, чехи, ірландці — як інші «бездержавні нації» використовували світову війну для здобуття
    незалежності?'
  section: 'Конфліктна карта: Лояльність імперії чи обов''язок нації?'
  words: 900
- points:
  - 'Первинний документ 1: Спогади січових стрільців (С. Ріпецький) про битву на горі Маківка. Аналіз мови, описів бою, ставлення
    до ворога.'
  - 'Джерельний критицизм: Хто, коли і навіщо писав ці спогади? Чи є вони об''єктивним свідченням, чи частиною творення героїчного
    міфу УСС?'
  - '[!decolonization] Первинний документ 2: Фронтові листи солдат-наддніпрянців. Читання «між рядками» — як прості селяни
    усвідомлювали трагедію «братовбивчої» війни, попри цензуру?'
  - 'Первинний документ 3: Стрілецькі пісні («Ой у лузі червона калина»). Аналіз пісні як історичного джерела — які ідеї,
    символи та настрої вона транслює? Чому саме вона стала символом опору через 100 років?'
  section: 'Джерела: Окопна правда та стрілецька пісня'
  words: 1600
- points:
  - 'Короткострокові наслідки: ~1.5 мільйона загиблих, зруйновані міста, епідемії, біженці. Україна як «failed state» ще до
    появи власної держави.'
  - 'Довгострокові наслідки: Війна як каталізатор. Досвід окопної війни, володіння зброєю та крах імперій створили унікальне
    «вікно можливостей» для Української революції 1917 року.'
  - '[!myth-buster] Міф про УСС як «австрійських найманців». Спростування: УСС були добровольчим легіоном, ядром майбутньої
    національної армії, а не просто частиною австро-угорських збройних сил.'
  - 'Оцінки істориків: Як українські (Плохій, Субтельний) та західні історіографії оцінюють роль українського питання у Першій
    світовій війні? Відмінності від радянської та російської інтерпретацій.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, який шлях був «правильним» для українця в 1914? Чи взагалі був вибір? Студент формулює
    відповідь на основі джерел та аргументів з модуля.'
  - 'Зв''язок із сьогоденням: «Брат проти брата» — як Росія використовує цей наратив у сучасній війні? Чому знання історії
    Першої світової важливе для розуміння подій XXI століття?'
  - '[!anti-hagiography] Героїзація УСС часто затьмарює реалії війни: величезні втрати (битва на горі Лисоня), конфлікти з
    австрійським командуванням, хвороби та побутові проблеми в окопах.'
  - 'Завершальна теза: Перша світова війна для українців — це не лише трагедія, а й народження сучасної політичної нації,
    загартованої в боях.'
  section: Дискусія та підсумок
  words: 700
focus: The tragedy of Ukrainians in WWI, fighting in both Russian and Austro-Hungarian armies; formation and role of the Sich
  Riflemen (USS); the war as a catalyst for the national liberation movement.
level: HIST
module: hist-088
objectives:
- Описувати участь українців у Першій світовій війні, аналізуючи трагедію народу, розділеного між двома імперіями.
- Пояснювати причини та наслідки створення Легіону Українських Січових Стрільців (УСС) та його роль у національному русі.
- Критично аналізувати первинні джерела (листи, спогади, пісні), розрізняючи факти, інтерпретації та пропаганду.
- Оцінювати вплив Першої світової війни як ключового каталізатора для краху імперій та початку Української революції 1917-1921
  років.
