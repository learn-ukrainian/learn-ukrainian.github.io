content_outline:
- points:
  - 'Провокація: Як одна людина може бути водночас національним героєм, символом державності, і «проклятим зрадником», якому
    понад 200 років співали анафему в церквах? Де проходить межа між фактом та політичним міфом?'
  - 'Уривок з листа Петра І (1708): «...чтобы тот вор и изменник Мазепа был проклят...». Без контексту: за що можна було так
    ненавидіти найдовготривалішого гетьмана України?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська vs російська історіографія. Мазепа — державник, що в умовах тиранії шукав спосіб врятувати автономію,
    чи «іуда», що порушив клятву та зрадив «братній народ» і православного царя?'
  - 'Дебат 2: Внутрішня політика. Мазепа — мудрий правитель, що стабілізував Гетьманщину, розвивав економіку та культуру («мазепинське
    бароко»), чи авторитарний олігарх, що зміцнював особисту владу та формував вірну собі еліту?'
  - '[!epistemic-humility] Оцінки Мазепи сучасниками були полярними: від панегіриків про «другого Володимира» до звинувачень
    у змові та тиранії. Джерела часто відображають позицію автора, а не об''єктивну реальність.'
  - 'Глобальна синхронність: Правління Мазепи (1687-1709) — це епоха Людовіка XIV у Франції, «Славної революції» в Англії
    та Великої Турецької війни. Велика Північна війна була частиною загальноєвропейської боротьби за владу, а не лише конфліктом
    Росії та Швеції.'
  section: 'Конфліктна карта: Прагматик чи зрадник?'
  words: 900
- points:
  - 'Аналіз Коломацьких статей (1687): компроміс чи капітуляція? Розбір пунктів про розміщення московських військ, заборону
    самостійної зовнішньої політики та контроль над обранням гетьмана.'
  - '[!decolonization] Статті — не «братній договір», а інструмент імперського контролю. Аналізуємо, як Москва крок за кроком
    обмежувала суверенітет Гетьманщини, представляючи це як «захист».'
  - 'Гетьманські універсали: як Мазепа регулював економічне життя. Приклад універсалу про підтримку селітряних промислів чи
    книгодрукування — доказ його ролі як будівничого.'
  - '[!biography] Листи до Мотрі Кочубеївни: погляд на Мазепу як на людину. Аналіз стилю, лексики — як у листах розкривається
    особистість гетьмана, його освіченість та емоційна глибина за межами політики.'
  section: 'Джерела: Статті, універсали та листи'
  words: 1600
- points:
  - 'Короткострокові наслідки: 22 роки стабільності після Руїни. Зміцнення гетьманської влади, припинення внутрішніх чвар,
    возз''єднання Правобережжя (1704).'
  - 'Довгострокові наслідки: Створення культурного та освітнього фундаменту. «Мазепинське бароко» як унікальний архітектурний
    стиль, Києво-Могилянська академія, розвиток друкарень — все це сформувало модерну українську ідентичність.'
  - '[!myth-buster] Деконструкція міфу про «зрадника». Анафема — це не церковний, а політичний акт, інструмент інформаційної
    війни Петра І. Факт: анафему було знято Вселенським Патріархатом, але РПЦ продовжувала її до 2018 року.'
  - 'Оцінки істориків: порівняння поглядів. Субтельний: Мазепа — трагічна фігура, прагматик, що зробив ризиковану, але логічну
    ставку. Плохій: Мазепа — творець «проєкту Україна» як європейської держави.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож хто такий Мазепа? Студент формулює аргументовану відповідь, спираючись на джерела та аналіз
    з модуля.'
  - 'Дилема лояльності: чи мав гетьман моральне право порушити присягу царю, якщо сам цар порушив умови договору (Жовквівська
    нарада 1706) і вів політику на знищення автономії Гетьманщини?'
  - '[!anti-hagiography] Мазепа не був ідеалістом. Він був жорстким, хитрим політиком своєї епохи, що використовував інтриги
    для досягнення влади. Чи виправдовує мета (збереження держави) такі методи?'
  - 'Зв''язок із сьогоденням: постать Мазепи досі використовується в інформаційних війнах. Чому імперії так важливо таврувати
    лідерів, що обирають незалежність? Як образ Мазепи функціонує в сучасній українській культурі?'
  section: Дискусія та підсумок
  words: 700
