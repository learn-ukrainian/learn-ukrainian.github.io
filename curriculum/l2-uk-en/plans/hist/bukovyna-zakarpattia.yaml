content_outline:
- points:
  - 'Провокація: Обидва регіони під іноземним пануванням, але один стає «Малим Віднем», а інший — краєм жорсткого кріпацтва
    та опору. Чому долі Буковини та Закарпаття розійшлися так кардинально?'
  - 'Фрагмент без контексту: «Я Русин був, єсмь і буду». Хто це сказав і що змусило його це проголосити?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Австрійське правління на Буковині — це «золота доба» модернізації (університет, архітектура, право) чи типовий
    колоніальний проєкт, що використовував міф про «цивілізаційну місію» для експлуатації ресурсів?'
  - 'Дебат 2: Ужгородська унія (1646) — це щит, що врятував ідентичність закарпатських русинів від мадяризації, чи інструмент,
    що відколов їх від східного православного світу, поглибивши регіональну ізоляцію?'
  - '[!epistemic-humility] Оцінки австрійського періоду варіюються від ностальгії за «старою доброю Австрією» до критики імперського
    гноблення. Правда, як завжди, десь посередині.'
  - 'Глобальна синхронність: Поки Чернівці ставали «Малим Віднем», в Османській імперії починалася епоха Танзимату (модернізації),
    а в Російській імперії придушували польське повстання (1863-1864) — імперії по-різному реагували на виклики націоналізму.'
  section: 'Конфліктна карта: Модернізація чи колонізація?'
  words: 900
- points:
  - 'Джерело 1: Уривки з австрійських адміністративних звітів генерала Гаддіка про анексію Буковини (1774). Як Відень бачив
    цей край — як «дике поле» чи цінний актив?'
  - 'Джерело 2: Статут Чернівецького університету (1875). Аналіз мов викладання та структури факультетів як інструменту імперської
    політики.'
  - '[!decolonization] Читаємо угорські закони про мадяризацію XIX ст. (наприклад, «Закон Аппоні» 1907 р.) не як абстрактні
    документи, а як інструмент насильницької асиміляції, що безпосередньо впливав на життя русинів.'
  - 'Джерело 3: «Я Русин був, єсмь і буду» — аналіз творів «будителів» Закарпаття (Олександр Духнович). Чийдеї вони просували
    — про окремий русинський народ чи про частину великого українського народу?'
  - 'Джерело 4: Етнографічні описи опришківського руху. Хто такі опришки в очах народу (захисники) і в очах влади (злочинці)?'
  section: 'Джерела: Свідчення з-під імперій'
  words: 1600
- points:
  - 'Порівняльний аналіз: Чому на Буковині розвинулося толерантне мультикультурне міське середовище, а на Закарпатті домінувала
    аграрна культура та жорсткий національний тиск?'
  - 'Наслідки Ужгородської унії: з одного боку, збереження східного обряду та розвиток освіти, з іншого — створення окремої
    греко-католицької ідентичності, що ускладнило інтеграцію в загальноукраїнський рух.'
  - '[!myth-buster] Міф про «пасивність» українців під імперіями. Аналіз активних форм опору: збройний (опришки Олекси Довбуша),
    політичний (діяльність Лук’яна Кобилиці в австрійському парламенті), культурний («будителі»).'
  - 'Стратегії виживання: як українці використовували імперські інструменти (освіта, парламент, суди) для захисту власних
    інтересів та національного відродження.'
  - 'Оцінка істориків: Порівняння поглядів на цей період у працях Грушевського (розглядає як частину загальної історії України)
    та сучасних регіональних істориків (підкреслюють унікальність).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Спираючись на джерела та аналіз, студент формулює власну відповідь на питання, чому долі Буковини
    та Закарпаття склалися по-різному.'
  - 'Ширше питання: Чи є імперська модернізація («будівництво доріг та університетів») виправданням для колоніального панування?
    Де проходить межа між цивілізацією та експлуатацією?'
  - '[!anti-hagiography] Уникаємо ідеалізації. «Мультикультурні Чернівці» не були вільні від міжетнічних напруг, а опришки
    — не лише герої, а й розбійники. Важливо бачити складність минулого.'
  - 'Зв’язок із сьогоденням: Як унікальний історичний досвід Буковини та Закарпаття збагачує сучасну українську ідентичність
    і допомагає інтегруватися в європейський простір?'
  section: Дискусія та підсумок
  words: 700
focus: Історія Буковини та Закарпаття під австрійським та угорським пануванням, мультикультуралізм Чернівців, мадяризація
  Закарпаття, форми культурного опору (опришки, «будителі»), роль греко-католицької церкви.
level: HIST
module: hist-037
objectives:
- Аналізувати та порівнювати різні моделі імперського панування (австрійську та угорську) та їхній вплив на українські землі.
- Критично оцінювати історичні джерела, розрізняючи офіційну імперську точку зору та свідчення підкорених народів.
- Пояснювати причини та наслідки ключових подій у регіонах, таких як Ужгородська унія та заснування Чернівецького університету.
- Формулювати аргументовану позицію щодо ролі культурного та збройного опору в збереженні національної ідентичності.
pedagogy: CBI
persona:
  role: Історик-регіоналіст, що показує, як імперські «подарунки» (університети, залізниця) насправді були інструментами контролю,
    а не благодійності.
  voice: Ironic-Historian
