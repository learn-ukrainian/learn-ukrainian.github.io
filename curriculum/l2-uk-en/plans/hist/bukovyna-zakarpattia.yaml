module: hist-037
level: HIST
sequence: 37
slug: bukovyna-zakarpattia
version: '2.0'
title: Буковина та Закарпаття під сусідами
focus: history
pedagogy: CBI
phase: B2.3a [Українська історія]
word_target: 5000
objectives:
- Учень може пояснити історичну долю Буковини та Закарпаття в XIV-XVII ст.
- Учень аналізує вплив іноземного панування на культуру регіонів
- Учень володіє термінологією регіональної історії
content_outline:
- section: Вступ
  points:
  - Географічне та стратегічне положення Буковини та Закарпаття — Закарпаття «за горами», Буковина як транзитна зона між Галичиною
    та Балканами
  - Історична доля українських земель під іноземним пануванням — тривале бездержав'я при збереженні етнічного ядра
  - Особливості розвитку двох регіонів — спільна доля у складі різних імперій (Австрійської, Угорської, Османської)
  words: 550
- section: Буковина
  points:
  - Буковина під владою Молдавського князівства — входження у 1359 році, слов'янська мова як офіційна; [!myth-buster] про
    «одвічну румунську землю»
  - Перехід до складу Османської імперії — васальна залежність з 1514 року
  - Австрійське панування та модернізація краю — анексія 1774 року (генерал Гаддік), «золота доба» німецької культури
  - Роль Чернівців як культурного центру — заснування університету (1875)
  words: 550
- section: 'Повсякденне життя: Мульткультурний Вавилон'
  points:
  - Чернівці як мультикультурний центр — «Малий Відень», «корабель у морі букових лісів»; [!history-bite] про толерантність
  - Сільське життя на Закарпатті — консервативний уклад, контраст з урбаністичною Буковиною
  - Етнічна різноманітність та толерантність — співіснування українців, румунів, євреїв, німців, угорців
  words: 550
- section: Закарпаття
  points:
  - Закарпаття у складі Угорського королівства — жорстке кріпацтво, домінування угорської знаті
  - Унгурська колонізація та мадяризація населення — тиск на мову та культуру в XIX ст.; терміни «Верхня Угорщина» vs «Підкарпатська
    Русь»
  - Економічне становище та соціальна структура — Федір Коріятович (1396) та розбудова Мукачівського замку «Паланок»; [!legacy]
  - Роль греко-католицької церкви в збереженні ідентичності — Ужгородська унія (1646) як щит проти асиміляції; [!context]
  words: 550
- section: Культурний опір та збереження ідентичності
  points:
  - Форми культурного опору під іноземним пануванням — опришківський рух (Олекса Довбуш), повстання Лук'яна Кобилиці (1843-1844)
  - 'Роль церкви та освіти в збереженні мови — духовенство як національна еліта (Олександр Духнович: «Я Русин був, єсмь і
    буду»)'
  - Народні традиції як засіб консервації ідентичності — збереження обрядів та мови в селах
  - Культурні діячі Буковини та Закарпаття — «Будитилі» Закарпаття, політична діяльність Кобилиці в австрійському парламенті;
    [!quote]
  words: 550
- section: Читання
  points:
  - Тексти про історію регіонів — уривки про заснування Чернівецького університету або Мукачівський замок
  - Свідчення про повсякденне життя — описи багатомовного середовища Чернівців
  words: 550
- section: Первинні джерела
  points:
  - Документи про адміністративний устрій — акти про Ужгородську унію або австрійські переписи
  - Етнографічні описи регіонів — спогади мандрівників про гуцулів та опришків
  words: 550
- section: Деколонізаційний погляд
  points:
  - Критика колонізаційної політики сусідніх імперій — міф про «цивілізаційну місію» імперій vs реальність експлуатації; [!decolonization]
  - Стратегії збереження культурної автономії — використання імперських інструментів (парламент, університети) для національного
    відродження
  - Сучасне значення регіональної історії для національної пам'яті — інтеграція історії «окраїн» у загальноукраїнський наратив
  words: 550
- section: Потрібно більше практики?
  points:
  - Додаткові вправи для закріплення матеріалу
  words: 600
vocabulary_hints:
  required:
  - регіон (region) — історичний регіон, гірський регіон
  - панування (rule/domination) — іноземне панування, австрійське панування
  - колонізація (colonization) — політика колонізації
  - мадяризація (Magyarization) — примусова мадяризація, опір мадяризації
  - ідентичність (identity) — національна ідентичність, збереження ідентичності
  - толерантність (tolerance) — релігійна толерантність, міжнаціональна толерантність
  - модернізація (modernization) — модернізація краю, імперська модернізація
  - автономія (autonomy) — культурна автономія, вимагати автономії
  - опришки (opryshky) — рух опришків, ватажок опришків (Олекса Довбуш)
  - унія (union) — церковна унія, Ужгородська унія (1646)
  - кріпацтво (serfdom) — скасування кріпацтва, тягар кріпацтва
  - цісар (emperor) — австрійський цісар, вірність цісарю
  recommended:
  - мультикультурний (multicultural) — мультикультурне місто (Чернівці)
  - етнічний (ethnic) — етнічний склад, етнічні землі
  - асиміляція (assimilation) — загроза асиміляції, політика асиміляції
  - традиція (tradition) — народна традиція, плекання традицій
  - воєводство (voivodeship) — Руське воєводство (контекст)
