content_outline:
- points:
  - 'Провокаційне питання: Вибух громадянської активності 24 лютого 2022 року — це диво спонтанної самоорганізації чи логічний
    результат, до якого нація готувалася 30 років?'
  - Що ви бачите тут? Черги до військкоматів і центрів крові, а не панічна втеча. Як суспільство, яке ворог вважав "анархічним",
    за ніч перетворилося на зразок ефективності?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Імперський міф про «анархічну» українську націю vs історична реальність. Чи є самоорганізація
    2022 року продовженням традицій козацьких рад, братств та Майданів?'
  - 'Дебат 2: Волонтерський рух — це партнер держави, тимчасовий замінник її неспроможних інституцій чи майбутній запобіжник
    від авторитаризму?'
  - '[!epistemic-humility] Як виміряти точний внесок? Неможливо провести чітку межу між ефективністю ЗСУ та підтримкою громадянського
    суспільства. Це симбіотична система, де успіх одного неможливий без іншого.'
  - 'Глобальна синхронність: Український «бджолиний рій» vs «Арабська весна» (соцмережі для мобілізації) vs рух «Free Russia
    Legion» (спроба самоорганізації росіян). У чому унікальність української моделі?'
  section: 'Конфліктна карта: Держава vs Мережа'
  words: 900
- points:
  - 'Джерело 1: Фінансові звіти фондів «Повернись живим» та «Фонду Притули». Аналіз риторики та візуалізацій. Як прозорість
    стає зброєю і будує довіру, що конвертується в дрони та супутники?'
  - 'Джерело 2: Свідчення волонтерів. Історії людей, що перетворили свої кав''ярні на штаби, а офіси — на логістичні центри.
    Читання уривків з інтерв''ю.'
  - 'Джерело 3: Соціологія. Дані групи «Рейтинг»: 81% довіри до волонтерів (2023) — вище, ніж до будь-якої іншої інституції.
    Що це говорить про суспільний договір?'
  - '[!decolonization] Джерело 4: Українська «IT-армія» vs російські «ферми тролів». Аналіз телеграм-каналів. Децентралізований
    цифровий спротив як форма війни, недоступна для авторитарної системи.'
  section: 'Джерела: Голоси, звіти та меми'
  words: 1600
- points:
  - 'Еволюція волонтерства: від бронежилетів і шкарпеток (2014) до закупівлі супутників (ICEYE) і розробки морських дронів
    (MAGURA). Як громадянське суспільство стало R&D центром для армії?'
  - '[!myth-buster] Міф про волонтерство як про «благодійність» або «допомогу». Розвінчання міфу через аналіз термінології:
    «забезпечення армії», «інвестиція в перемогу». Це не допомога, а функція національної безпеки.'
  - 'Трансформація суспільства: Волонтерство як новий «суспільний стан» сучасної України. Як активізм став масовою соціальною
    роллю і найшвидшим соціальним ліфтом.'
  - '[!biography] Порівняння оцінок: погляди лідерів фондів (Тарас Чмут, Сергій Притула), військових (Валерій Залужний) та
    правозахисників (Олександра Матвійчук) на роль і місце громадянського суспільства у війні.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, стихія чи закономірність? Студент формулює аргументовану відповідь, використовуючи дані
    з модуля.'
  - 'Українська модель стійкості: метафора «Бджолиний рій» (децентралізована координація) як ключ до розуміння, чому плани
    ворога провалилися.'
  - '[!anti-hagiography] Проблеми та виклики: емоційне вигорання, конфлікти з бюрократією, спроби держави «очолити» рух. Чи
    може «рій» існувати довго?'
  - 'Зв''язок із майбутнім: Чи стане це громадянське суспільство фундаментом для післявоєнної відбудови та запобіжником проти
    корупції й авторитаризму? Уроки для світу.'
  section: Дискусія та підсумок
  words: 700
focus: 'Українське громадянське суспільство під час повномасштабного вторгнення: феномен самоорганізації, ключові волонтерські
  рухи, взаємодія з державою та модель суспільної стійкості ("бджолиний рій").'
