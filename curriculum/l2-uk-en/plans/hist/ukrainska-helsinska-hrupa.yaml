content_outline:
- points:
  - 'Провокація: СРСР підписав Гельсінські угоди, вважаючи їх «порожнім папірцем». Як купка дисидентів перетворила цю формальність
    на зброю, що розхитала імперію?'
  - 'Цитата без контексту: «Ми розглядаємо гуманітарні статті Угод як поступку Заходу, яка ні до чого нас не зобов''язує».
    Як ви гадаєте, хто це сказав і чим усе закінчилось?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Радянська пропаганда таврувала членів УГГ як «агентів ЦРУ» та «антирадянщиків». Сама група
    наполягала, що діє виключно в рамках радянських законів та підписаних СРСР міжнародних угод. Чия позиція була юридично
    сильнішою?'
  - 'Дебат 2: Навіть в незалежній Україні існують дискусії про реальний вплив УГГ. Одні вважають їх моральними авторитетами,
    що заклали підвалини незалежності. Інші — невеликою групою ідеалістів, чий вплив був обмеженим порівняно з економічним
    колапсом СРСР. [!epistemic-humility] Де проходить межа між символічним значенням та реальним політичним впливом?'
  - 'Глобальна синхронність: УГГ була найактивнішою та найчисленнішою в СРСР, але діяла паралельно з Московською Гельсінською
    групою, групами в Литві, Грузії, Вірменії, а також із рухом «Хартія 77» у Чехословаччині.'
  section: 'Конфліктна карта: Правозахисники чи ''шпигуни''?'
  words: 900
- points:
  - 'Читання: Меморандум №1 (9 листопада 1976). Аналіз тексту: вимоги щодо вільного обміну інформацією, акредитації журналістів.
    Чому саме ці вимоги були першими?'
  - 'Джерело: документи групи про русифікацію та етноцид. [!decolonization] Як УГГ використовувала радянську конституцію та
    міжнародне право, щоб довести, що русифікація — це порушення прав людини, а не просто «культурна політика»?'
  - 'Джерело: вироки радянських судів проти членів УГГ (Руденко, Тихий, Лук''яненко). Аналіз мови обвинувачення. Як держава
    криміналізувала легальну діяльність? Читання імперських джерел «проти шерсті».'
  - 'Джерело: листи з таборів (Василь Стус, Юрій Литвин, Валерій Марченко). Як вони описували умови ув''язнення? Аналіз методів
    передачі інформації: вивчення напам''ять, записки у швах одягу. Критика джерела: що могло бути втрачено чи спотворено
    під час передачі?'
  - '[!biography] Роль засновників: Микола Руденко (фронтовик-філософ), Левко Лук''яненко (юрист, засуджений до страти), Оксана
    Мешко («козацька матір»), Петро Григоренко (генерал-дисидент).'
  section: 'Джерела: Меморандуми, листи та вироки'
  words: 1600
- points:
  - 'Короткострокові наслідки: хвиля арештів (1977), фізичне знищення членів групи в таборах (Стус, Литвин, Марченко, Тихий).
    Загальний термін ув''язнення — понад 550 років. УГГ було розгромлено фізично.'
  - 'Довгострокові наслідки: УГГ повністю делегітимізувала радянський режим на Заході. Інформація про репресії стала топ-темою
    в західних медіа. Група зберегла спадкоємність опору і стала кадровим резервом для Народного Руху та першого уряду незалежної
    України.'
  - '[!myth-buster] Міф про «купку дисидентів». Хоча група була нечисленною, її вплив був мультиплікативним. Кожен меморандум,
    переданий на Захід, ставав дипломатичним скандалом і підривав репутацію СРСР.'
  - '[!myth-buster] Міф про «боротьбу за незалежність». На початковому етапі УГГ вимагала не незалежності, а дотримання законів.
    Ідея незалежності стала домінантною пізніше, як єдиний можливий спосіб гарантувати права людини.'
  - 'Оцінки істориків: Орест Субтельний та Сергій Плохій погоджуються, що УГГ змінила філософію українського опору, перейшовши
    від збройної до етико-правової боротьби.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, як «паперовий тигр» Гельсінських угод отримав справжні зуби? Сформулюйте відповідь, спираючись
    на поняття «легалізму» та «морального спротиву».'
  - '[!anti-hagiography] УГГ не була монолітною. Всередині були ідеологічні суперечки (націоналісти vs універсалісти), особисті
    конфлікти. Це були живі люди, а не бронзові пам''ятники, і це робить їхній вибір ще більш значущим.'
  - 'Зв''язок із сьогоденням: Правозахисні організації України сьогодні використовують ті самі методи, що й УГГ, для документування
    воєнних злочинів Росії. У чому спадкоємність, а в чому відмінність між діяльністю УГГ та сучасних правозахисників?'
  section: Дискусія та підсумок
  words: 700
focus: The Ukrainian Helsinki Group (UHG) as a pivotal force that shifted Ukrainian resistance from armed struggle to a legal,
  rights-based movement, the brutal Soviet response, and the group's direct legacy in the restoration of Ukrainian independence.
level: HIST
module: hist-115
objectives:
- Описувати причини створення, цілі та методи діяльності Української Гельсінської групи
- Аналізувати, як УГГ використовувала міжнародне право та радянську конституцію для легітимізації своєї діяльності
- Порівнювати радянський наратив про дисидентів із саморепрезентацією групи на основі першоджерел (меморандумів, листів)
- Оцінювати історичну спадщину УГГ та її зв'язок із сучасним правозахисним рухом в Україні
pedagogy: CBI
