content_outline:
- points:
  - 'Провокація: Люблінська унія — це був порятунок від московської загрози чи початок кінця «руської» автономії? Що, якби
    литовська делегація не повернулася на сейм?'
  - 'Фрагмент без контексту: «Ми є народ вільний і ні в чому не поступаємося полякам... Рівні з рівними, вільні з вільними».
    Вгадайте, хто це сказав і за яких обставин?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Федерація vs Інкорпорація. Литовська сторона (магнати) прагнула зберегти окремішність ВКЛ. Польська сторона
    (шляхта) — повного злиття та уніфікації.'
  - 'Дебат 2: Інтереси еліт vs інтереси земель. Українська шляхта тиснула на литовських магнатів, прагнучи отримати «золоті
    вольності» польської шляхти, навіть ціною переходу під владу Корони.'
  - '[!epistemic-humility] Історики сперечаються, чи був демарш литовської делегації реальною спробою зірвати унію, чи лише
    тактичним ходом для отримання кращих умов.'
  - 'Глобальна синхронність: поки в Любліні створювали федерацію, в Західній Європі йшли релігійні війни (Франція), а Іспанія
    придушувала повстання в Нідерландах. Річ Посполита виглядала острівцем відносної стабільності.'
  section: 'Конфліктна карта: Союз рівних чи поглинання?'
  words: 900
- points:
  - 'Аналіз тексту Акту Люблінської унії: формула про «одне неподільне тіло», спільний монарх і сейм, але окремі адміністрація,
    скарбниця та військо. Чому це федерація, а не унітарна держава?'
  - 'Королівські універсали (березень-червень 1569): як Сигізмунд II Август, скориставшись від''їздом литовців, «відрізав»
    українські землі від ВКЛ і приєднав до Польщі. Чи було це юридично легітимно?'
  - '[!decolonization] Читаємо промови українських князів (Вишневецького, Острозького) на сеймі «проти шерсті»: вони присягали
    не Польщі, а конкретно королю, намагаючись зберегти хоч тінь суб''єктності.'
  - 'Джерельна критика: порівняння польських та литовських хронік, що описують сейм. Де вони суперечать одна одній і чому?
    Чиї інтереси відображає кожна з версій?'
  section: 'Джерела: Акти сейму та свідчення сучасників'
  words: 1600
- points:
  - 'Короткострокові наслідки: для Литви — порятунок від поразки у Лівонській війні; для українських земель — перехід під
    владу Корони, зміна адміністративного устрою.'
  - 'Довгострокові наслідки: початок «польської доби» в історії України, культурна вестернізація (Ренесанс, Бароко), але й
    посилення кріпацтва та релігійного тиску, що призвело до Хмельниччини.'
  - '[!myth-buster] Полонізація не була миттєвою та насильницькою. Це був повільний процес культурної асиміляції еліт через
    привабливість «золотих вольностей» та вищої культури. Формула «gente Ruthenus, natione Polonus» (роду руського, нації
    польської).'
  - 'Оцінки істориків: порівняння поглядів (Грушевський — «трагедія», Липинський — «необхідність», сучасні історики — «складний
    компроміс»).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: чи була унія неминучою? Студент формулює відповідь на основі аналізу джерел та аргументів з модуля.'
  - '[!anti-hagiography] Унія відкрила українській шляхті доступ до небачених прав і свобод. Але якою ціною? Обговорення дилеми
    «свобода в обмін на ідентичність».'
  - 'Зв''язок із сьогоденням: ідея «Річ Посполита трьох народів» (поляків, литовців, українців) не була реалізована тоді,
    але знову стала актуальною як модель «Люблінського трикутника». Які уроки унії важливі для сучасної співпраці України,
    Польщі та Литви?'
  section: Дискусія та підсумок
  words: 700
