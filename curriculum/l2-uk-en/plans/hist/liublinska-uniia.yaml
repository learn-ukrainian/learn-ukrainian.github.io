module: hist-031
level: HIST
sequence: 31
slug: liublinska-uniia
version: '2.0'
title: 'Люблінська унія 1569: Народження Речі Посполитої'
focus: history
pedagogy: CBI
phase: B2.3b [Українська історія]
word_target: 5000
objectives:
- Учень може пояснити причини та наслідки Люблінської унії для українських земель
- Учень може порівняти статус українських земель у складі Литви та Польщі
- Учень може аналізувати політичний устрій Речі Посполитої
content_outline:
- section: Вступ
  points:
  - Контекст європейської політики XVI століття — релігійні війни, формування централізованих держав, загроза з боку Московського
    царства
  - 'Взаємовідносини Польщі та Великого князівства Литовського — династичні зв''язків (Кревська, Городельська унії) та спільний
    монарх; hook: [!context]'
  - Зовнішні загрози та необхідність об'єднання держав — Лівонська війна (1558–1583) проти Івана Грозного, виснаження ресурсів
    Литви
  words: 550
- section: 'Шлях до унії: Криза та необхідність'
  points:
  - Лівонська війна та військова криза Литви — втрата Полоцька (1563), загроза столиці Вільно
  - Економічні та політичні причини об'єднання — бажання середньої шляхти отримати «Золоту вольність» (права польської шляхти)
  - 'Позиція польської та литовської шляхти — опір магнатів (Радзивілли, Ходкевичі) проти уніфікації; hook: [!history-bite]
    про втечу литовців 1 березня'
  - Роль українських та білоруських земель у переговорах — тиск знизу на магнатів заради зрівняння прав
  words: 550
- section: 'Люблінський сейм 1569 року: Драма та компроміс'
  points:
  - Перебіг переговорів між польською та литовською делегаціями — тривалий процес (10 січня – 1 липня 1569), гострі дебати
  - Конфлікт інтересів та пошук компромісних рішень — демарш литовської делегації та жорстка реакція короля Сигізмунда II
    Августа
  - 'Ухвалення умов унії та створення спільної держави — принцип «рівні з рівними, вільні з вільними» (слова Вишневецького);
    hook: [!quote]'
  - Нова політична система Речі Посполитої — єдиний король і сейм, але окремі уряди, скарбниці та війська (федерація)
  words: 550
- section: 'Нова карта Європи: Українські землі у складі Польщі'
  points:
  - Відокремлення українських земель від Литви та приєднання до Корони — королівські універсали (березень-червень 1569) про
    інкорпорацію Підляшшя, Волині, Київщини, Брацлавщини
  - Зміна адміністративного підпорядкування Волині, Київщини, Поділля та Брацлавщини — утворення нових воєводств у складі
    Польської Корони
  - Політичні наслідки для українського населення — поширення прав польської шляхти, звільнення від податків, участь у виборах
    короля
  - 'Початок полонізації української еліти — культурна асиміляція через привілеї; hook: [!myth-buster] про «добровільність»'
  words: 550
- section: 'Читання: Культурний шок та адаптація'
  points:
  - 'Зміна правової системи з литовських статутів на польське право — збереження Литовських статутів та руської мови в судочинстві
    як ключова поступка; hook: [!culture]'
  - Культурні та релігійні відмінності між поляками та українцями — зіткнення православної традиції з католицьким Ренесансом
  - Протистояння православ'я та католицизму — поява єзуїтів, підготовка ґрунту для Берестейської унії (1596)
  - Соціальні зміни у житті українського селянства та міщанства — прихід польських магнатів (Потоцькі, Замойські), формування
    латифундій, посилення кріпацтва
  words: 550
- section: Первинні джерела
  points:
  - Текст акту Люблінської унії — цитата Сигізмунда II про «одне неподільне і нерозрізнене тіло»
  - Документи Люблінського сейму — універсали про приєднання українських земель
  - Свідчення сучасників про переговори — промови князів (Вишневецький, Острозький)
  - Карти територіальних змін після унії — візуалізація переходу земель від ВКЛ до Корони
  words: 550
- section: Деколонізаційний погляд
  points:
  - 'Люблінська унія як початок польської колонізації українських земель — концепція «Drang nach Osten», відкриття шлюзів
    для польської експансії; hook: [!decolonization]'
  - Втрата автономії та політичних прав українського населення — зміна вектора розвитку з «руського» на західний, але ціною
    суб'єктності
  - Наслідки інкорпорації для національної ідентичності — формула «gente Ruthenus, natione Polonus» (роду руського, нації
    польської)
  - Сучасне переосмислення унії у контексті українсько-польських відносин — відмова від радянських міфів про «загарбання»
    та польських про «цивілізаційну місію»
  words: 550
- section: Підсумок
  points:
  - Люблінська унія як переломний момент в історії українських земель — геополітичний компроміс, що врятував Литву, але змінив
    долю України
  - 'Довгострокові наслідки інкорпорації до Речі Посполитої — початок «польської доби»: вестернізація, бароко, але й шлях
    до Хмельниччини'
  words: 550
- section: Потрібно більше практики?
  points:
  - Додаткові матеріали про українсько-польські відносини після унії — теми для есе про неминучість унії та роль еліт
  words: 600
vocabulary_hints:
  required:
  - унія (union) — Люблінська унія, укласти унію
  - сейм (sejm, parliament) — вальний сейм, рішення сейму
  - шляхта (nobility) — українська шляхта, права шляхти, «Золота вольність»
  - Корона (Crown - Poland) — Корона Польська, землі Корони
  - інкорпорація (incorporation) — акт інкорпорації, приєднання земель
  - полонізація (Polonization) — культурна асиміляція, процес полонізації
  - статут (statute) — Литовський статут, збереження статутів
  - православ'я (Orthodoxy) — захист православ'я, права православної церкви
  recommended:
  - Річ Посполита (Commonwealth) — Річ Посполита Обох Народів, федеративна держава
  - делегація (delegation) — литовська делегація, переговори делегацій
  - компроміс (compromise) — політичний компроміс, пошук компромісу
  - автономія (autonomy) — правова автономія, збереження автономії
