objectives:
- Аналізувати причини, перебіг та наслідки Помаранчевої революції 2004 року.
- Розрізняти факти та пропагандистські міфи, пов'язані з подіями революції.
- Критично оцінювати роль медіа, громадянського суспільства та судової системи в демократичних процесах.
- Формулювати аргументовану позицію щодо історичного значення Помаранчевої революції для становлення сучасної України.
pedagogy: CBI
