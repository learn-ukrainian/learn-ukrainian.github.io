content_outline:
- points:
  - 'Провокація: Чи була Помаранчева революція спонтанним народним повстанням, чи блискуче зрежисованою кампанією? І яку роль
    у зміні історії України зіграла тарілка суші?'
  - 'Вибори 2004 року та кандидати: протистояння В. Ющенка та В. Януковича. Дати турів: 31 жовтня та 21 листопада.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Народне повстання проти фальсифікацій (українська інтерпретація) vs «кольорова революція», профінансована Заходом
    (російська/про-януковичська пропаганда).'
  - 'Дебат 2: Що було вирішальним — політичне лідерство штабу Ющенка чи низова самоорганізація громадянського суспільства
    (студенти, журналісти, активісти)?'
  - '[!epistemic-humility] Оцінки рушійних сил революції досі є предметом дискусій істориків: одні наголошують на ролі політичних
    еліт, інші — на пробудженні нації.'
  - 'Глобальна синхронність: Помаранчева революція в контексті «кольорових революцій» початку 2000-х (Грузія 2003, Киргизстан
    2005) та теорій ненасильницького спротиву Джина Шарпа.'
  section: 'Конфліктна карта: Спонтанність чи технологія?'
  words: 900
- points:
  - «5 канал» як «канал чесних новин» — прорив інформаційної блокади, прямі трансляції з Майдану, ведучі Андрій Шевченко та
    Роман Скрипін.
  - Інтернет-видання «Українська правда» як альтернативне джерело інформації та спадщина Георгія Гонгадзе.
  - '[!decolonization] Аналіз «темників»: як адміністрація президента Медведчука намагалася встановити тотальний контроль
    над інформаційним простором за російським зразком, і як цей контроль зазнав краху.'
  - 'Первинне джерело: Приклади «темників» для різних телеканалів — порівняння, як мала подаватися інформація про кандидатів.'
  - '«SMS-революція»: Координація протестів через SMS та мобільні мережі — самоорганізація «розумного натовпу» в до-фейсбучну
    епоху.'
  section: 'Джерела: Медіа, темники та SMS'
  words: 1600
- points:
  - 'Майдан як серце протесту: наметове містечко, польові кухні, помаранчевий колір як символ надії, мирний характер спротиву.'
  - 'Оскарження результатів виборів: тисячі томів доказів фальсифікацій («каруселі», відкріпні талони, явка >100%), поданих
    до Верховного Суду.'
  - Рішення Верховного Суду 3 грудня 2004 року — безпрецедентна пряма трансляція, що прикувала до екранів усю країну. Роль
    головуючого судді Анатолія Яреми.
  - '[!myth-buster] Юридичний лікбез: це був не «третій тур», а «повторне голосування другого туру» 26 грудня 2004 року. Пояснення
    юридичної казуїстики та її значення.'
  - '[!myth-buster] Розвінчання міфу російської пропаганди про «наколоті апельсини», «наркотики у валянках» та «американські
    гроші».'
  - 'Отруєння Ющенка: події 5 вересня 2004 року, діоксин, клініка «Рудольфінерхаус» — як спроба фізичного усунення кандидата
    стала частиною політичної драми.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Спираючись на матеріали модуля, сформулюйте аргументовану відповідь — Помаранчева революція була
    спонтанною чи спланованою?'
  - 'Геополітичний вибір: як перемога Майдану стала кроком від «керованої демократії» російського зразка до європейської інтеграції.'
  - '[!anti-hagiography] Уроки та розчарування: Чому мирна революція не призвела до глибинних змін? Конфлікт Ющенка і Тимошенко,
    «любі друзі», газова криза та реванш Януковича у 2010 році.'
  - 'Зв''язок із сьогоденням: Як досвід та уроки Помаранчевої революції вплинули на Революцію Гідності 2014 року?'
  section: Дискусія та підсумок
  words: 700
focus: The 2004 presidential election crisis, mass peaceful protests against electoral fraud, the role of media and civil
  society, and the Supreme Court's landmark decision.
