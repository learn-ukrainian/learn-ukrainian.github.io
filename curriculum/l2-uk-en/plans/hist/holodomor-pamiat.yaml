module: hist-102
level: HIST
sequence: 102
slug: holodomor-pamiat
version: '2.0'
title: 'Голодомор: Пам''ять та визнання'
subtitle: 'Holodomor: Memory and Recognition'
content_outline:
- section: 'Вступ: Злочин без кари'
  points:
  - 'Радянське замовчування Голодомору — фальсифікація метричних книг (причина смерті:
    «старість», «виснаження»), табу на слово «голод» як антирадянська агітація'
  - Чому світ не знав? — політика realpolitik Заходу (Франція, США) та визнання СРСР
    США у 1933 році попри звіти дипломатів
  - 'Роль пам''яті у відновленні справедливості — hook: [!history-bite] Рафаель Лемкін
    розробляв концепцію геноциду саме на українському досвіді, виділяючи 4 складові
    (розум/інтелігенція, душа/церква, тіло/селянство, розпорошення)'
- section: Свідки та журналісти
  points:
  - 'Гарет Джонс: валлієць, який сказав правду — подорож пішки селами Харківщини у
    березні 1933-го, прес-конференція у Берліні; щоденникові записи «Всі опухлі від
    голоду»'
  - 'Волтер Дюранті: пропаганда замість правди — hook: [!myth-buster] Пулітцерівська
    премія 1932 року за брехливі репортажі в NYT («Russians are hungry but not starving»,
    31.03.1933) досі не відкликана; цинічне «You can''t make an omelet without breaking
    eggs»'
  - Маргарет Барбер, Малкольм Маггерідж (Manchester Guardian) — репортажі дипломатичною
    поштою, визначення голоду як «війни режиму проти селянства»
  - Радянська дезінформація — організація показових турів («потьомкінські села») для
    іноземців, заперечення фактів на офіційному рівні
- section: Боротьба за визнання
  points:
  - 'Діаспора та збереження пам''яті — hook: [!context] роль UCCA та діаспори у збереженні
    свідчень, доки в Україні тема була заборонена'
  - Комісія Конгресу США (1980-ті) — Комісія Джеймса Мейса (1985–1988) та збір тисяч
    свідчень (Oral History Project) як юридична база
  - Проголошення незалежності та відкриття архівів — оприлюднення документів про «чорні
    дошки» та директиви Сталіна/Молотова, що доводять умисел
  - Закон України про Голодомор (28 листопада 2006) — офіційна кваліфікація як геноцид
    та криміналізація публічного заперечення
  - Міжнародне визнання — хвиля рішень парламентів ЄС (Німеччина, Франція, Італія,
    2022–2024) на тлі сучасної війни
- section: Первинні джерела
  points:
  - 'Статті Гарета Джонса — hook: [!quote] «Я пройшов через села... Скрізь я чув стогін:
    У нас немає хліба, ми помираємо!» (з статті «Famine Rules Russia» / «Good-bye
    Russia»)'
  - Свідчення вцілілих — щоденники селян (напр. вчителя Олексія Наливайка) та листи
    іноземних інженерів (Джеррі Берман)
  - Резолюції про визнання геноциду — Естонія (1993, перша у світі), Канада (2003),
    США (2018)
- section: Деколонізаційний погляд
  points:
  - 'Голодомор як геноцид: юридичні аргументи — відповідність Конвенції ООН 1948 року
    (умисне створення умов для фізичного знищення групи)'
  - Російське заперечення сьогодні — знищення пам'ятників Голодомору на окупованих
    територіях (Маріуполь, Луганщина) як доказ спадковості злочину
  - 'Пам''ять vs. пропаганда — hook: [!decolonization] концепція Джеймса Мейса про
    «постгеноцидне суспільство» та травму національної душі; русифікація вимерлих
    сіл переселенцями з Росії'
- section: 'Підсумок: Чому це важливо'
  points:
  - 'День пам''яті жертв Голодомору — hook: [!culture] традиція «Запали свічку» (4-та
    субота листопада), ініційована Джеймсом Мейсом як акт національного єднання живих
    і мертвих'
  - Музеї та меморіали — Національний музей Голодомору-геноциду в Києві як місце пам'яті
    та освіти
  - 'Уроки для майбутнього — непокаране зло повертається: зв''язок між відсутністю
    «Нюрнберга» над комунізмом та сучасною агресією РФ'
vocabulary_hints:
  required:
  - Голодомор (Holodomor) — Голодомор-геноцид, жертви Голодомору, штучний голод
  - геноцид (genocide) — Конвенція ООН, визнання геноцидом, Рафаель Лемкін, ознаки
    геноциду
  - визнання (recognition) — міжнародне визнання, боротьба за визнання, дипломатичне
    визнання
  - замовчування (silencing) — радянське замовчування, стіна мовчання, змова мовчання
  - свідок (witness) — живі свідки, свідчення очевидців, збирати свідчення
  - пам'ять (memory) — національна пам'ять, збереження пам'яті, День пам'яті жертв
    Голодомору, місця пам'яті
  - меморіал (memorial) — відкриття меморіалу, місце пам'яті, Національний музей
  - заперечення (denial) — кримінальна відповідальність за заперечення, російська
    пропаганда, політика заперечення
  recommended:
  - комісія (commission) — Комісія Конгресу США, Комісія Джеймса Мейса, висновки комісії
  - резолюція (resolution) — ухвалити резолюцію, парламентська резолюція, проект резолюції
  - архів (archive) — розсекречення архівів, архівні документи (чорні дошки), доступ
    до архівів
  - дезінформація (disinformation) — кампанія дезінформації, Волтер Дюранті, радянська
    пропаганда
  - жертва (victim) — вшанування жертв, мільйони жертв, невинні жертви
  - справедливість (justice) — відновлення історичної справедливості, злочин без кари
