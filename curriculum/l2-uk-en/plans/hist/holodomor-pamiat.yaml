content_outline:
- points:
  - 'Провокація: Як злочин такого масштабу, як Голодомор, міг бути практично «стертим» зі світової історії на 50 років? І
    що потрібно, аби відновити справедливість?'
  - '[!decolonization] Вихідна теза Рафаеля Лемкіна, автора концепції геноциду: він розробляв її, аналізуючи два випадки —
    Голокост та Голодомор, який він назвав «класичним прикладом радянського геноциду».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Журналістська правда vs. брехня): Репортажі Гарета Джонса («Я пройшов через безліч сіл... скрізь я чув стогін:
    ''У нас немає хліба, ми помираємо''») проти статей Волтера Дюранті в The New York Times, який отримав Пулітцерівську премію
    за заперечення голоду («Росіяни голодні, але не помирають з голоду»).'
  - 'Дебат 2 (Дипломатична правда vs. Realpolitik): Звіти іноземних дипломатів (напр. італійського консула у Харкові) про
    мільйони жертв проти офіційної політики західних урядів, які в цей час налагоджували дипломатичні та економічні стосунки
    з СРСР.'
  - '[!epistemic-humility] Чому світ обрав брехню? Страх перед комунізмом, економічні інтереси під час Великої депресії, небажання
    бачити докази, що руйнували образ «прогресивного» СРСР.'
  - 'Глобальна синхронність: США визнають СРСР (1933), Гітлер приходить до влади в Німеччині (1933), Велика депресія на Заході.
    Світ був зайнятий своїми проблемами.'
  section: 'Конфліктна карта: Правда проти пропаганди'
  words: 900
- points:
  - 'Джерело 1 (Правдива журналістика): Аналіз статей Гарета Джонса та Малкольма Маггеріджа. Як їм вдалося обійти радянську
    цензуру? Які риторичні прийоми вони використовували, щоб донести правду?'
  - 'Джерело 2 (Пропаганда): Розбір статті Волтера Дюранті. Як він конструює брехню, використовуючи напівправду та евфемізми?
    Його цинічне «не можна приготувати яєчню, не розбивши яєць» як квінтесенція виправдання злочину.'
  - '[!decolonization] Джерело 3 (Голоси жертв): Уривки з щоденників тих, хто вижив (Олексій Наливайко), та листів іноземних
    інженерів, які працювали в Україні. Контраст між особистою трагедією та офіційною мовчанкою.'
  - 'Джерело 4 (Документи вбивць): Розсекречені архівні документи СРСР — постанови про «чорні дошки», закон «про п''ять колосків»,
    директиви Сталіна і Молотова про вилучення всього продовольства. Аналіз мови цих документів — бюрократична мова як інструмент
    геноциду.'
  section: 'Джерела: Свідчення очевидців та документи'
  words: 1600
- points:
  - 'Короткострокові наслідки: Мільйони смертей, знищення українського селянства як класу, русифікація спустілих сіл шляхом
    переселення туди людей з Росії.'
  - 'Довгострокові наслідки: Концепція «постгеноцидного суспільства» Джеймса Мейса — колективна травма, страх, пасивність,
    що передавалися поколіннями і впливають на українське суспільство донині.'
  - '[!myth-buster] Спростування радянського/російського міфу про «спільну трагедію» чи «перегини колективізації». Аналіз
    доказів умислу: закриті кордони України, відсутність голоду в Росії, цілеспрямоване вилучення не лише зерна, а й усіх
    продуктів.'
  - 'Боротьба за визнання: Роль української діаспори (UCCA) у збереженні пам''яті. Комісія Конгресу США під керівництвом Джеймса
    Мейса (1985-1988) та її висновки. Закон України про Голодомор (2006). Нова хвиля міжнародного визнання (2022-2024) як
    відповідь на сучасну російську агресію.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює аргументовану відповідь — чому злочин замовчували і що стало рушієм для відновлення
    пам''яті?'
  - '[!anti-hagiography] Важливо не лише пам''ятати жертв, а й аналізувати причини, що призвели до трагедії, включаючи пасивність
    міжнародної спільноти. Пам''ять — це не лише скорбота, а й відповідальність.'
  - 'Зв''язок із сьогоденням: «Непокаране зло повертається». Сучасна російська агресія, знищення пам''ятників Голодомору на
    окупованих територіях, фільтраційні табори — прямі паралелі з політикою Сталіна. Чому міжнародне визнання Голодомору геноцидом
    є питанням національної безпеки для сучасної України?'
  - Традиція «Запали свічку пам'яті» — як особистий акт пам'яті стає частиною колективного спротиву історичній амнезії.
  section: Дискусія та підсумок
  words: 700
focus: The international and national struggle for the recognition of the Holodomor as genocide, contrasting journalistic
  truth with Soviet propaganda and analyzing the long-term impact of the crime.
level: HIST
module: hist-102
objectives:
- Аналізувати історію та етапи боротьби за міжнародне визнання Голодомору геноцидом
- Порівнювати та критично оцінювати першоджерела: репортажі журналістів, свідчення очевидців та офіційні документи
- Пояснювати механізми радянського заперечення та сучасної російської дезінформації щодо Голодомору
- Аргументувати, чому визнання Голодомору геноцидом є важливим елементом деколонізації та національної безпеки України
pedagogy: CBI
