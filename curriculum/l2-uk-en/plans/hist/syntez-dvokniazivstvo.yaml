module: hist-028
level: HIST
sequence: 28
slug: syntez-dvokniazivstvo
version: '2.0'
title: 'Синтез: Від монгольської навали до кримської державності'
focus: synthesis
pedagogy: CBI
phase: B2.3 [Ukrainian History] Synthesis
word_target: 5000
objectives:
- Синтезувати знання про виживання української державності після 1240 року
- Аналізувати трансформацію Русі у Королівство та Кримське ханство
- Формулювати аргументовані висновки про західний вектор розвитку
content_outline:
- section: Огляд періоду
  points:
  - Монгольська навала як цивілізаційний злам — 1240 рік як точка біфуркації; include [!context] про «Дике Поле» як зону контакту,
    а не порожнечу
  - 'Трансформація центрів: від Києва до Галича та Бахчисарая — Київ залишається сакральним символом, але політична вага зміщується
    на Захід (Королівство Русь) та Південь (Крим); include [!history-bite]: Засновник Кримського ханства Хаджи Гірей народився
    у литовському замку Тракай'
  words: 850
- section: Ключові теми
  points:
  - Легітимність як зброя (Данило, Хаджи Гірей) — протиставлення «Корона» (Данило, 1253, визнання Папою) vs «Ярлик» (васалітет
    Північного Сходу); легітимність Хаджи Гірея через рід Чингісхана та підтримку Литви
  - Магдебурзьке право та інституційна тяглість — Сянок (1339), Львів (1356); містяни стають суб'єктами права, поява Ратуші
    як символу самоврядування
  - 'Соціальна еволюція та лицарський стан — include [!culture]: еволюція дружини у шляхту з правами («Neminem captivabimus»)
    на відміну від безправних підданих Москви'
  words: 850
- section: Аналіз
  points:
  - 'Деколонізація та спростування міфу про ''одну колиску'' — include [!myth-buster]: розбіжність шляхів Русі (Європа) та
    Московії (Орда) після 1240 року; include [!decolonization]: термін «Монголо-татарське іго» як імперський конструкт, натомість
    вживаємо «навала»'
  - 'Сучасні паралелі: від 1240 до 2022 — цивілізаційний вибір на користь Європи, який захищається зі зброєю'
  - Порівняння первинних джерел — літописи Русі (біль, пошук союзників) vs московські літописи (смирення, «Божа кара»)
  words: 850
- section: Хронологія
  points:
  - Ключові дати монгольської навали (1237-1241) — оборона та падіння Києва (1240)
  - Формування Галицько-Волинського королівства — коронація Данила в Дорогичині (1253)
  - Становлення Кримського ханства (1441) — Битва на Синіх Водах (1362), народження Хаджи Гірея (1397), проголошення незалежності
    ханства (1441)
  words: 850
- section: Завдання для есе
  points:
  - Порівняння стратегій виживання українських князівств — Данило Галицький (опір/союз із Заходом) vs Олександр Невський (колаборація/васалітет)
  - Аналіз впливу Магдебурзького права на міста — архітектура та ментальність вільного громадянина
  - 'Роль релігії у збереженні ідентичності — include [!quote]: «О, лихіша лиха честь татарська!» (Літопис Руський)'
  words: 850
- section: Потрібно більше практики?
  points:
  - Додаткові вправи для синтезу знань
  - Практика порівняльного аналізу періодів
  - Завдання на формулювання історичних аргументів
  words: 750
vocabulary_hints:
  required:
  - 'монгольська навала (Mongol invasion) — уникати терміну «іго»; collocations: пережити навалу, наслідки навали'
  - 'цивілізаційний злам (civilizational rupture/break) — collocations: точка біфуркації, історичний вибір'
  - 'легітимність (legitimacy) — collocations: джерело легітимності, визнання легітимності, королівська легітимність'
  - 'Магдебурзьке право (Magdeburg rights) — collocations: надання права, міське самоврядування'
  - 'лицарський стан (knightly estate/class) — collocations: кодекс честі, права та свободи, шляхетська демократія'
  - 'інституційна тяглість (institutional continuity) — collocations: збереження традицій, правова спадкоємність'
  - 'державність (statehood) — collocations: відновлення державності, боротьба за державність'
  - 'західний вектор (Western vector) — collocations: європейський вибір, політична орієнтація'
  recommended:
  - королівська корона (royal crown) — символ суверенітету Данила (1253)
  - деколонізація (decolonization) — переосмислення історії без імперських наративів
  - 'автономія (autonomy) — collocations: широка автономія, збереження прав'
  - 'культурна спадщина (cultural heritage) — collocations: спільна спадщина, збереження пам''яток'
