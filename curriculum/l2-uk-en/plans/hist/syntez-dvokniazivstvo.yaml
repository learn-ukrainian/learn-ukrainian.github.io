content_outline:
- points:
  - 'Провокація: 1240 рік. Київ зруйновано. Якби ви були князем, який шлях обрали б для виживання свого народу: опір та союз
    із Заходом, як Данило Галицький, чи колаборація з Ордою, як Олександр Невський? Чи існував третій шлях?'
  - 'Фрагмент з Літопису Руського без контексту: "О, лихіша лиха честь татарська!" — що змусило літописця написати ці слова?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Український vs імперський наратив. Чи була навала "цивілізаційним зламом", що назавжди розділив шляхи Русі (європейський
    вектор) та Московії (ординський вектор), чи це ретроспективний міф, що спростовує концепцію "однієї колиски"?'
  - 'Дебат 2: Стратегії виживання. Що було ефективнішим для збереження державності та ідентичності: дипломатична гра та військовий
    опір Данила Галицького чи підпорядкування та отримання ярлика на княжіння Олександра Невського?'
  - '[!epistemic-humility] Ми оцінюємо рішення князів XIII ст., не знаючи всіх обставин. Історики досі сперечаються, чи був
    у Данила реальний шанс створити антиординську коаліцію.'
  - 'Глобальна синхронність: поки Русь боролася з монголами, в Англії барони змусили короля підписати "Оксфордські провізії"
    (прообраз парламенту), імперія хрестоносців у Константинополі доживала останні дні, а в Єгипті до влади приходили мамлюки.'
  section: 'Конфліктна карта: Два шляхи, дві долі'
  words: 900
- points:
  - 'Аналіз літописів: порівняння Галицько-Волинського літопису, що описує навалу як трагедію та заклик до боротьби, з московськими
    літописами, де навала трактується як "Божа кара" за гріхи, що вимагає смирення.'
  - 'Символи легітимності: Папська корона Данила (1253) як символ визнання Русі частиною європейського світу vs ординський
    ярлик як дозвіл на правління, залежне від хана. Які переваги та недоліки давав кожен з них?'
  - 'Інституційна тяглість: аналіз грамот на Магдебурзьке право для українських міст (Сянок 1339, Львів 1356). Що означало
    для міста мати власне самоврядування, суд та ратушу в епоху зовнішньої загрози?'
  - '[!decolonization] Термін "монголо-татарське іго" є імперським конструктом, що зображує народи як пасивних жертв. Ми використовуємо
    "навала" та аналізуємо різні форми відносин з Ордою: від прямого опору до васалітету та союзництва (як у випадку Литви
    та Криму).'
  section: 'Джерела: Корона, Ярлик, Магдебурзьке право'
  words: 1600
- points:
  - 'Трансформація центрів: Київ залишається сакральним символом, але політична вага зміщується на Захід (Галич, Львів) та
    Південь (Бахчисарай). Як це змінило політичну карту Східної Європи?'
  - 'Соціальна еволюція: еволюція дружини в шляхту з гарантованими правами та свободами в Королівстві Русі та ВКЛ vs становлення
    деспотичної влади та безправних підданих у Московії. У чому фундаментальна різниця цих моделей?'
  - '[!myth-buster] Спростування міфу про "Дике Поле" як порожнечу. Це була зона інтенсивних контактів, конфліктів та взаємовпливів
    між кочовим степом та осілими слов''янами, що зрештою призвело до народження козацтва.'
  - 'Оцінки істориків: як Грушевський, Субтельний та Плохій оцінюють довгостроковий вплив монгольської навали на формування
    української ідентичності? Де їхні погляди збігаються, а де розходяться?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: з огляду на проаналізовані джерела та наслідки, чий шлях — Данила чи Невського — виявився більш
    виграшним у довгостроковій перспективі для їхніх народів? Сформулюйте аргументовану відповідь.'
  - 'Зв''язок із сьогоденням: наскільки паралелі між цивілізаційним вибором XIII ст. та сучасним вибором України на користь
    Європи є коректними? Які уроки можна винести з історії опору імперіям?'
  - '[!anti-hagiography] Уникаючи ідеалізації: Королівство Руське врешті-решт було поглинуте сусідами, а Кримське ханство
    стало загрозою для українських земель. Чи можна говорити про "успішну" стратегію в принципі, чи лише про різні способи
    виживання?'
  section: Дискусія та підсумок
  words: 700
focus: The bifurcation of Rus' after 1240, contrasting the European vector of the Kingdom of Galicia-Volhynia with the Horde-oriented
  path of Muscovy, and the emergence of the Crimean Khanate as a distinct power center.
