content_outline:
- points:
  - 'Провокація: Скіфи — це предки українців чи просто один із багатьох народів, що пройшов через степ? Де межа між культурним
    спадком і національним міфом?'
  - Україна як західний край Великого Євразійського степу — «автобан давнини», де постійно змінювались народи та імперії.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Дикі кочівники» (імперський/радянський наратив) vs «Степова цивілізація» (сучасний український погляд). Скіфи
    як творці складної держави.'
  - 'Дебат 2: «Скіфи-орачі» — це праслов''яни? Дискусія про етнічний зв''язок між скіфами та предками українців.'
  - '[!epistemic-humility] Наші головні джерела — греки (Геродот), які дивились на скіфів як на екзотичних «варварів». Ми
    бачимо їх через чужі очі.'
  - 'Глобальна синхронність: Скіфи воюють з перським царем Дарієм (V ст. до н.е.), в той час як у Греції зароджується демократія,
    а в Китаї триває період «Воюючих царств».'
  section: 'Конфліктна карта: Спадщина чи Примари Степу?'
  words: 900
- points:
  - 'Читання Геродота («Мельпомена»): війна з Дарієм, тактика «випаленої землі», символічні дари царя Іданфірса (птах, миша,
    жаба, стріли).'
  - 'Критика джерела: Геродот сам не подорожував у глиб Скіфії. Що з його розповіді — факт, а що — екзотичний міф для грецької
    аудиторії?'
  - 'Археологія як головне джерело: скіфські кургани — «піраміди степів».'
  - 'Аналіз Золотої Пекторалі з Товстої Могили (знахідка Б. Мозолевського, 1971): три яруси як модель Всесвіту (підземний
    світ, земний, небесний).'
  - '[!decolonization] Скіфський «звіриний стиль» — не просто прикраси, а складна семіотична система, мова символів, що передавала
    силу, статус та магічний захист.'
  section: 'Джерела: Слово Геродота та Мовчання Золота'
  words: 1600
- points:
  - 'Перехід до сарматів: занепад скіфів та прихід нової хвилі кочівників. Сарматська важка кіннота (катафрактарії) як військова
    революція.'
  - '[!myth-buster] Міф про амазонок vs реальність: аналіз жіночих поховань зі зброєю у сарматів (~20%). Роль жінки у кочовому
    суспільстві.'
  - 'Скіфська спадщина в українській культурі: відлуння в одязі (шаровари), зачісках («оселедець»), іконографії (Козак Мамай).'
  - Сарматизм як ідеологія польської шляхти — приклад того, як далеке минуле стає інструментом політичної легітимації.
  - 'Оцінка істориків: порівняння поглядів Грушевського, Субтельного, Плохія на роль кочових цивілізацій у формуванні українських
    земель.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, ким є скіфи для сучасної України? Студент формулює аргументовану відповідь, використовуючи
    дані з джерел та аналізу.'
  - 'Зв''язок із сьогоденням: Україна як «щит Європи» — чи є паралелі з тим, як скіфи зупинили перську навалу?'
  - '[!anti-hagiography] Скіфське суспільство було жорстоким та ієрархічним, побудованим на війні. Уникнення романтизації
    «шляхетних дикунів».'
  - 'Спадщина степу в українському менталітеті: ідея волі, особистої свободи та горизонтальних зв''язків.'
  section: Дискусія та підсумок
  words: 700
