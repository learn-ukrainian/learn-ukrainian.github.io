objectives:
- Критично аналізувати первинні джерела (Геродот) та археологічні дані (пектораль), враховуючи їхні упередження та контекст
- Деконструювати імперський міф про «диких кочівників», протиставляючи йому концепцію «степової цивілізації»
- Формулювати аргументовану позицію щодо ролі скіфської та сарматської спадщини в українському культурному коді
