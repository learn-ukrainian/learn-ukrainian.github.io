content_outline:
- points:
  - 'Провокаційне питання: 4 вересня 1965 року в кінотеатрі «Україна» під час прем''єри «Тіней забутих предків» Іван Дзюба
    закликав «Хто проти тиранії — встаньте!». Встали лише кілька десятків людей. Чому вони ризикнули всім, і чому сотні інших
    залишилися сидіти? Чи була «відлига» справжнім подихом свободи, чи лише пасткою для інакодумців?'
  - 'Фрагмент з щоденника Василя Симоненка: «Найстрашніше покарання для будь-якого народу — це коли його історію йому пишуть
    інші». Як цей рядок пояснює феномен шістдесятництва?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Шістдесятники — «ленінці, що прозріли» чи антирадянські націоналісти? Одні (Дзюба) намагалися апелювати до «справжнього»
    ленінізму проти русифікації, інші (Лук''яненко) від самого початку прагнули незалежності.'
  - 'Дебат 2: Це був культурний феномен чи політичний рух? Суперечка про те, чи була політика початковою метою, чи митці були
    змушені стати дисидентами через тиск режиму.'
  - '[!epistemic-humility] Ми не можемо точно знати мотиви кожної людини. Багато хто еволюціонував у поглядах. Важливо аналізувати
    не лише публічні заяви, а й приватні щоденники та свідчення.'
  - 'Глобальна синхронність: Шістдесятництво в контексті світових рухів 1960-х — Празька весна, протести у Парижі, рух за
    громадянські права в США. Спільне прагнення до свободи та самовираження проти застиглих систем.'
  section: 'Конфліктна карта: Реформатори чи бунтарі?'
  words: 900
- points:
  - Аналіз трактату Івана Дзюби «Інтернаціоналізм чи русифікація?». [!decolonization] Дзюба використовує марксистську риторику,
    щоб довести антиленінську суть русифікації. Це спроба говорити з владою її ж мовою.
  - Вивчення щоденників Василя Симоненка («Окрайці думок») та Алли Горської. Приватні думки, розчарування в системі, особиста
    ціна спротиву. Порівняння з їхньою публічною творчістю.
  - 'Кіно як спротив: «Тіні забутих предків» Параджанова. Як «поетичне кіно» стало викликом соцреалізму і чому влада боялася
    естетики більше, ніж прямих політичних гасел.'
  - '[!biography] Алла Горська як символ руху: від створення клубу «Сучасник» до знищеного вітражу «Шевченко. Мати» та загадкової
    смерті. Її життя як дзеркало епохи.'
  - 'Джерело з іншого боку: аналіз звітів та меморандумів КДБ. Як спецслужби інтерпретували культурну діяльність (колядування,
    носіння вишиванок) як «буржуазний націоналізм» та «антирадянську агітацію».'
  section: 'Джерела: Щоденники, самвидав та доноси КДБ'
  words: 1600
- points:
  - 'Причина-наслідок: Перетворення митців на політичних дисидентів. Арешти 1965 року як поворотний момент, що змусив багатьох
    зробити остаточний вибір.'
  - 'Короткострокові наслідки: хвилі арештів (1965, 1972 — «великий погром»), знищення творів мистецтва, звільнення з роботи,
    ув''язнення. Операція «Блок».'
  - 'Довгострокові наслідки: створення сучасної міської української культури, альтернативної радянській. Забезпечення спадкоємності
    опору: [!decolonization] шістдесятники стали мостом між збройним опором УПА та правозахисним рухом Гельсінської групи.'
  - '[!myth-buster] Спростування міфу про «братній радянський народ» (homo sovieticus). Шістдесятники довели, що українська
    ідентичність — це не архаїчне сільське явище, а модерна міська культура.'
  - 'Оцінка істориків: Порівняння поглядів на значення шістдесятників у працях Касьянова, Грицака, Плохія. Чи був це лише
    «бунт проти сірості», чи щось більше?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чому вони встали? Студент формулює власну аргументовану відповідь, використовуючи докази з модуля
    — від особистих мотивів до розуміння історичного моменту.'
  - 'Зв''язок із сьогоденням: Як боротьба шістдесятників за мову, культуру та правду резонує з сучасною російсько-українською
    війною? Чому сучасна Росія так само бореться з українською культурою?'
  - '[!anti-hagiography] Уникнення ідеалізації. Шістдесятництво не було монолітним рухом. Були внутрішні конфлікти, різні
    погляди, люди, що зламалися під тиском. Важливо бачити їх не іконами, а живими людьми у складних обставинах.'
  section: Дискусія та підсумок
  words: 700
focus: The Sixtiers movement as a cultural and political phenomenon during the Khrushchev Thaw, analyzing its evolution from
  cultural resistance to political dissidence and its lasting decolonizing impact.
level: HIST
module: hist-114
objectives:
- Аналізувати причини, прояви та наслідки руху шістдесятників у культурному та політичному контексті СРСР
- Оцінювати історичне значення «хрущовської відлиги» та її суперечливий вплив на зародження дисидентського руху
- Простежувати еволюцію шістдесятників від культурного опору до політичного дисидентства
- Критично аналізувати першоджерела епохи (самвидав, щоденники, документи КДБ), розрізняючи авторські інтенції та упередження
