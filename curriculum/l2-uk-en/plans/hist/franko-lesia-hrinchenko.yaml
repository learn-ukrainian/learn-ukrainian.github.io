content_outline:
- points:
  - 'Провокаційне питання: Чи може література замінити державу? Наприкінці XIX ст. в українців не було власної держави, але
    були Франко, Леся та Грінченко. Як їхня творчість виконувала функції уряду, армії та міністерства закордонних справ?'
  - 'Цитата без контексту: «Народе мій, замучений, розбитий, мов паралітик той на роздорожжу, людським презирством, ніби струпом,
    вкритий!» Хто автор, і що змусило його написати такі гіркі слова про власний народ?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський міф vs. реальність. СРСР зображував Франка як «революціонера-демократа» і «друга робітників», а Лесю
    — як борчиню з царизмом. Насправді ж вони були творцями елітарної високої культури, що мала утвердити окремішність України
    від Росії.'
  - 'Дебат 2: Федералізм vs. самостійність. Конфлікт Франка зі своїм вчителем Драгомановим. Чому Франко відкинув ідею Драгоманова
    про «федерацію з Росією» і прийшов до висновку про необхідність повної політичної незалежності («Не пора...»)?'
  - '[!epistemic-humility] Оцінка внеску Грінченка: чи був він лише «технічним» працівником (лексикографом, просвітителем)
    порівняно з «геніями» Франка та Лесі? Дискусії про роль «чорнової» культурної праці.'
  - 'Глобальна синхронність: Український модернізм не був ізольованим. Це частина загальноєвропейського руху Fin de siècle
    («кінець століття»): символізм у Франції, психоаналіз у Відні, ніцшеанство в Німеччині — ідеї, які Леся та Франко читали
    в оригіналі та адаптували для України.'
  section: 'Конфліктна карта: Революціонери чи націєтворці?'
  words: 900
- points:
  - 'Іван Франко: аналіз прологу до поеми «Мойсей». Образ пророка, що веде народ, але не може увійти до обіцяної землі — алегорія
    долі самого Франка та української інтелігенції.'
  - 'Леся Українка: аналіз діалогу Мавки і Лукаша з «Лісової пісні». Конфлікт між світом вільної духовності (Мавка) та прагматичним,
    утилітарним світом людей (Лукаш) — метафора боротьби за високу культуру проти «побутовщини» та хуторянства.'
  - 'Борис Грінченко: аналіз передмови до «Словаря української мови». Чому словник був не просто збіркою слів, а політичним
    маніфестом? Аргументація Грінченка про те, що мова є «паспортом» нації та доказом її права на існування.'
  - '[!decolonization] Всі троє свідомо працювали на розрив з імперською культурною традицією. Леся переосмислювала європейські,
    а не російські сюжети. Франко доводив, що українська література здатна на філософську глибину. Грінченко кодифікував мову,
    відмінну від російської. Це була свідома культурна війна.'
  section: 'Джерела: Тексти, що творили націю'
  words: 1600
- points:
  - 'Створення «Соборної України» в культурі: Франко (Галичина), Леся (Волинь/Київ), Грінченко (Слобожанщина) представляли
    різні регіони, але творили єдиний літературний канон і єдину мову, «зшиваючи» країну, розділену імперіями.'
  - 'Підготовка ґрунту для Визвольних змагань (1917-1921): покоління, яке боролося за УНР, виросло на творах цих трьох авторів.
    Література сформувала ідентичність і дала мету — державність.'
  - '[!myth-buster] Леся Українка і фемінізм. Вона не була феміністкою в сучасному розумінні, але її галерея сильних, інтелектуальних
    жіночих образів (Кассандра, Мавка, Бояриня Оксана) була викликом патріархальному суспільству і стверджувала жіночу суб''єктність.'
  - '[!biography] Грінченко як приклад тотального спротиву: принципова відмова говорити російською з чиновниками, виховання
    доньки Насті виключно українкою, щоденна подвижницька праця над словником в умовах тотальних заборон.'
  - 'Вплив на XX століття: саме вони визначили вектор розвитку української культури як європейської, оминаючи російське посередництво.
    Це заклало основи для Розстріляного відродження та шістдесятників.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож як саме література може замінити державу? Студент має сформулювати відповідь, використовуючи
    приклади з модуля (створення канону, кодифікація мови, формування національного міфу).'
  - 'Ширше питання: чи актуальний сьогодні досвід Франка, Лесі, Грінченка? В чому полягає культурний спротив сучасних українських
    митців під час повномасштабного вторгнення?'
  - '[!anti-hagiography] Уникнення «іконостасу». Франко мав важкий характер і складні стосунки з колегами. Леся страждала
    від важкої хвороби, що накладало відбиток на її творчість. Грінченко був надзвичайно різким і безкомпромісним. Вони були
    живими людьми, а не бронзовими пам''ятниками.'
  section: Дискусія та підсумок
  words: 700
focus: Франко, Леся Українка, Грінченко як архітектори модерної української ідентичності та єдиного культурного простору на
  межі XIX-XX століть
