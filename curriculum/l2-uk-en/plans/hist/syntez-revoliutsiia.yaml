content_outline:
- points:
  - 'Провокація: Чому революція, що породила стільки героїв та урядів, зазнала поразки? Чи була це неминуча трагедія, чи результат
    фатальних помилок?'
  - 'Первинний документ без контексту: «Читати з бромом і окропом на очах треба…» — з чиїх спогадів цей рядок про внутрішні
    чвари і що він каже про атмосферу епохи?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українсько-російська війна vs. «Громадянська війна». [!decolonization] Радянська історіографія нав''язувала
    міф про внутрішній класовий конфлікт, щоб приховати факт зовнішньої агресії та окупації.'
  - 'Дебат 2: Шлях для України — соціалістична республіка (УЦР, Директорія) чи консервативна держава (Гетьманат)? Конфлікт
    між лівими ідеологами та правими прагматиками як одна з причин поразки.'
  - '[!epistemic-humility] Неможливо виділити одну причину поразки. Це був «дім під час землетрусу»: одночасна боротьба з
    зовнішніми ворогами, глибокі соціальні трансформації та відсутність єдності серед еліт.'
  - 'Глобальна синхронність: Розпад імперій (Австро-Угорської, Російської) та хвиля національних революцій у Фінляндії, Польщі,
    країнах Балтії. Боротьба України була частиною загальноєвропейського процесу.'
  section: 'Конфліктна карта: Соціалізм чи Держава?'
  words: 900
- points:
  - 'Аналіз документів державотворення: порівняння IV Універсалу УЦР (22 січня 1918) та Акту Злуки (22 січня 1919). «Однині
    Українська Народна Республіка стає самостійною...» — декларація vs реальність.'
  - 'Погляди зсередини: мемуари ключових постатей. «Відродження нації» Винниченка (самокритика і самовиправдання лівого діяча)
    vs «Спогади» Скоропадського (погляд консервативного аристократа на «соціалістичний хаос»).'
  - 'Критика джерел: як читати накази проти погромів Симона Петлюри на тлі радянської пропаганди, що звинувачувала його в
    антисемітизмі?'
  - '[!decolonization] Термінологія як зброя: аналіз джерел на предмет маніпуляцій. Чому важливо говорити «Армія УНР», а не
    «петлюрівці», «повстанські загони», а не «банди»?'
  section: 'Джерела: Універсали, Грамоти та Спогади'
  words: 1600
- points:
  - 'Причини поразки: синтез факторів. Внутрішні (брак єдності, ідеологічні конфлікти, отаманщина) та зовнішні («чотирикутник
    смерті»: червона Росія, біла Росія, Польща, Антанта).'
  - 'Соціальний вимір: чому популістські гасла більшовиків про «землю — селянам» виявилися ефективнішими за виважені аграрні
    реформи українських урядів?'
  - '[!myth-buster] Міф про те, що революція нічого не дала. Наслідком спротиву стало створення УРСР — формально окремої республіки,
    що змусило радянську владу зберігати атрибути державності, які стали фундаментом для незалежності 1991 року.'
  - 'Оцінки істориків: В''ячеслав Липинський про «брак власної держави» як головну трагедію та критика ним українських еліт.
    Порівняння з оцінками сучасних істориків (Плохій, Грицак).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож чому революція програла? Студент формулює власну аргументовану відповідь, балансуючи внутрішні
    та зовнішні фактори.'
  - '[!anti-hagiography] Уникнення ідеалізації: героїзм борців не скасовує катастрофічних прорахунків лідерів, їхньої нездатності
    домовитись перед лицем смертельної загрози. Отаманщина як прояв анархії, а не «народної волі».'
  - 'Історична тяглість: як уряд УНР в екзилі зберіг легітимність, передавши повноваження першому президенту сучасної України
    у 1992 році? Чому це важливо?'
  - 'Зв''язок із сьогоденням: які уроки революції 1917-1921 є найактуальнішими для України, що знову веде війну за незалежність?
    Дискусія про єдність, армію та міжнародну підтримку.'
  section: Дискусія та підсумок
  words: 700
focus: Причини, етапи та наслідки Української революції (1917-1921). Аналіз ключових урядів (Центральна Рада, Гетьманат, Директорія),
  причин поразки та тривалої спадщини революції в контексті деколонізації.
