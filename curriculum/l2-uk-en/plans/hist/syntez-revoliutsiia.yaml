objectives:
- Аналізувати причини, ключові етапи та наслідки Української революції 1917–1921 років.
- Розрізняти внутрішні та зовнішні фактори, що призвели до поразки визвольних змагань.
- Критично оцінювати ідеологію та практичні кроки ключових урядів періоду: УЦР, Гетьманату та Директорії.
- Простежувати тяглість української державності та пояснювати вплив революції на сучасну Україну.
