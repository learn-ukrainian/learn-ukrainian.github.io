content_outline:
- points:
  - 'Провокація: Російська пропаганда називала це «спеціальною військовою операцією» без жертв серед цивільних. Світ побачив
    Бучу. Як за 33 дні окупації звичайне київське передмістя стало всесвітнім символом геноциду?'
  - Що ви відчули, коли вперше побачили фотографії зі звільненої Бучі у квітні 2022 року? Яке питання ви б поставили свідку
    тих подій?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Злочин чи «постановка»? Аналіз доказової бази (супутникові знімки Maxar, дані розвідки, свідчення) проти фейків
    російської пропаганди про «інсценування» та «трупи-актори».'
  - 'Дебат 2: Воєнні злочини чи геноцид? Юридична та історична кваліфікація подій. Розгляд аргументів за та проти визнання
    подій у Бучі геноцидом відповідно до Конвенції ООН.'
  - '[!epistemic-humility] Визнання складності доведення геноцидального наміру в міжнародних судах. Роль непрямих доказів
    та системного характеру злочинів.'
  - 'Глобальна синхронність: Як світ реагував у реальному часі? Миттєве поширення доказів через соцмережі та ЗМІ (AFP, Reuters)
    vs. повільна реакція міжнародних організацій.'
  section: 'Конфліктна карта: Злочин і заперечення'
  words: 900
- points:
  - 'Свідчення очевидців: аналіз історій проєкту «The Ukrainians». Феномен «тиші як загрози». Історія Наташі Александрової
    про погляд окупанта, що «дивиться крізь тебе».'
  - 'Матеріальні докази: братська могила біля церкви Андрія Первозванного, «вулиця смерті» (Яблунська), зв’язані за спиною
    руки, сліди тортур. Що ці докази говорять про наміри злочинців?'
  - 'Дані розвідки: супутникові знімки Maxar, що доводять присутність тіл на вулицях за тижні до відступу російських військ.
    Перехоплені розмови російських солдатів.'
  - '[!decolonization] Інформаційна війна: Буча як приклад миттєвого онлайн-документування злочинів, що унеможливило тактику
    замовчування, використану СРСР під час Голодомору. Онлайн-свідчення проти інформаційної ізоляції.'
  - 'Звіти міжнародних організацій: висновки місій ООН, ОБСЄ та Human Rights Watch, що підтвердили системний та організований
    характер терору.'
  section: 'Джерела: Свідчення, супутники та звіти'
  words: 1600
- points:
  - 'Правовий вимір: Буча як ключовий епізод у розслідуванні Міжнародного кримінального суду. Візит прокурора Каріма Хана
    та його роль у видачі ордеру на арешт Путіна.'
  - 'Політичний вимір: як Бучанська різанина змінила сприйняття війни на Заході, прискорила постачання важкого озброєння та
    посилила санкційний тиск.'
  - '[!myth-buster] Спростування міфу про «другу армію світу». Знищення колони Росгвардії на Вокзальній вулиці та героїзм
    місцевої ТрО показали неготовність РФ до реального спротиву.'
  - 'Культурний вимір: меморіалізація (Стіна пам’яті) та мистецьке осмислення. Мурали Бенксі на руїнах як символ стійкості
    та відродження. Ірпінь як «Місто-Герой», що зупинив ворога.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: студент формулює відповідь, як мирне передмістя перетворилося на місце злочину, використовуючи
    поняття «дегуманізація», «пропаганда» та «системний терор».'
  - 'Ширше питання: яка роль пам’яті про такі трагедії? Як уникнути перетворення пам’яті на чисту віктимізацію та зберегти
    розповідь про спротив?'
  - '[!anti-hagiography] Уникнення наративу пасивної жертви. Ірпінь та Буча — це не лише місця страждань, а й місця запеклого
    спротиву, що врятував столицю. Обговорення ролі цивільного та військового опору.'
  - 'Зв''язок із сьогоденням: Буча як щеплення від «втоми від війни». Чому неможливе примирення без правосуддя та репарацій?'
  section: Дискусія та підсумок
  words: 700
