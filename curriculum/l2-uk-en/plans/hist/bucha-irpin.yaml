objectives:
- Аналізувати первинні джерела (свідчення, супутникові знімки, звіти), розрізняючи доведені факти та пропагандистські наративи
- Пояснювати юридичну кваліфікацію подій у Бучі, використовуючи терміни «воєнні злочини» та «геноцид»
- Описувати хронологію окупації київських передмість та ключові епізоди спротиву й терору
- Обговорювати довгострокові наслідки Бучанської різанини для міжнародної політики, права та історичної пам’яті України
