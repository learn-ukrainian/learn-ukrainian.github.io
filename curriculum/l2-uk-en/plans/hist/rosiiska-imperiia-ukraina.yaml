objectives:
- Спростовувати ключові тези імперського міфу про "Новоросію" та "Дике поле", спираючись на історичні факти
- Описувати процеси та відмінності між козацькою (народною) та російською (імперською) колонізацією Півдня України
- Аналізувати первинні джерела (карти, укази, хроніки), щоб реконструювати доімперську історію регіону
- Пояснювати, як історичні міфи використовуються в сучасних інформаційних війнах
