content_outline:
- points:
  - 'Провокація: Чому Російська імперія називала багаті землі Великого Лугу "Диким полем"? Чи була ця земля порожньою, чи
    це був міф, що виправдовував завоювання?'
  - Імперська термінологія як знаряддя колонізації — термін "Дике поле" (Loca Deserta) як міф про "нічийну землю".
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Україна vs Імперія): "Новоросія" як імперський проект стирання пам''яті (1764) vs. Великий Луг як простір козацької
    волі з густою мережею поселень.'
  - 'Дебат 2 (Внутрішній/Академічний): Південь — це "плавильний казан" чи культурна "мозаїка"? Дискусія про роль українського
    села та космополітичних міст в формуванні ідентичності регіону.'
  - '[!epistemic-humility] Оцінка точної кількості населення до імперської колонізації є складною через брак переписів, але
    козацькі реєстри та археологія свідчать про значне заселення, а не "пустку".'
  - 'Глобальна синхронність: У той час як Росія створює міф про "Новоросію" (1760-ті), Британія веде колоніальну політику
    в Північній Америці, що призводить до Американської революції (1775-1783) — обидві імперії використовують наративи про
    "освоєння" земель.'
  section: 'Конфліктна карта: "Новоросія" — міф та реальність'
  words: 900
- points:
  - 'Козацькі джерела: Аналіз реєстрів Війська Запорозького та праць Д. Яворницького. Запорозькі зимівники як капітальні "фільварки",
    а не тимчасові схованки. Система паланок (Бугогардівська, Кодацька) як доказ адміністративної структури.'
  - 'Картографічні джерела: Карти Гійома де Боплана (XVII ст.) як доказ існування густої мережі шляхів та поселень на "Дикому
    полі" задовго до приходу імперії.'
  - '[!decolonization] Імперські джерела проти себе: Читаємо Маніфест 1775 року про зруйнування Січі. Як документ, що мав
    легітимізувати знищення, насправді розкриває страх імперії перед козацькою автономією та її економічною потужністю.'
  - 'Народні джерела: Українські народні пісні та думи про степові землі та козацькі вольності як свідчення глибокої присутності
    українців у регіоні.'
  section: 'Джерела: Козацькі зимівники та імперські укази'
  words: 1600
- points:
  - 'Економічні наслідки: Перетворення Півдня на "житницю Європи". Експорт зерна через новозасновані порти (Одеса, Херсон)
    та одночасне закріпачення вільних українських поселенців для експлуатації чорноземів на користь імперії.'
  - 'Архітектурні наслідки: Класицизм у містах (Одеса, Миколаїв) як імперська репрезентація та фасад, що приховував українську
    народну архітектуру околиць (напр. козацький Хаджибей до 1794 р.). Роль європейських адміністраторів (Рішельє, де Рібас).'
  - '[!myth-buster] Міф про "заснування" міст. На прикладі Одеси показати, як імперський наратив про "заснування" Катериною
    ІІ ігнорує століття попередньої історії українського, татарського та литовського поселення Хаджибей.'
  - 'Культурні наслідки: Заснування університетів (Харків, Одеса) як центрів імперської культури, що супроводжувалося політикою
    русифікації (Емський указ, Валуєвський циркуляр) та конструюванням образу "малороса" для знищення української самосвідомості.'
  section: 'Аналіз: Наслідки та значення імперської колонізації'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, "Дике поле" чи Великий Луг? Студент формулює аргументовану відповідь, спростовуючи імперський
    міф.'
  - Історична належність південних земель до України — "Новоросія" як короткий колоніальний епізод, а не тисячолітній цивілізаційний
    фундамент.
  - 'Зв''язок із сьогоденням: Відновлення українських топонімів (Дніпро, Кропивницький) та демонтаж пам''ятників "засновникам"
    після 2014-2022 років як процес ментальної деокупації та повернення історичної справедливості.'
  - '[!anti-hagiography] Важливо не лише спростувати імперський міф, але й уникнути ідеалізації козацького періоду, аналізуючи
    його власні соціальні конфлікти та складність.'
  section: Дискусія та підсумок
