content_outline:
- points:
  - 'Провокативне питання: чому Росія раптом згадала термін «Новоросія» у 2014 році, намагаючись легітимізувати окупацію?
    Що насправді було на цих землях до приходу імперії?'
  - Фрагмент указу Катерини II про ліквідацію Січі без контексту — студент має припустити, про що цей документ і які наслідки
    він мав.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Міф про «Дике Поле» як порожнечу (російська імперська теза) vs. реальність Степової України як простору взаємодії
    козацької та кримськотатарської цивілізацій.'
  - 'Дебат 2: Міф про «заснування міст на порожньому місці» vs. історичні докази перейменування та розбудови існуючих поселень
    (Коцюбіїв/Хаджибей → Одеса).'
  - '[!epistemic-humility] Визнання, що точні демографічні дані до імперських переписів є фрагментарними, але археологічні
    та картографічні свідчення незаперечно доводять щільне заселення регіону.'
  - 'Глобальна синхронність: російська колонізація Півдня України та концепція «tabula rasa» порівняно з британською колонізацією
    Австралії (terra nullius) та американською доктриною «явного призначення» (Manifest Destiny) у той самий період.'
  section: 'Конфліктна карта: Пустеля vs. Цивілізація на перехресті'
  words: 900
- points:
  - 'Картографічний аналіз: порівняння карт Гійома де Боплана (XVII ст.) з російськими картами кінця XVIII ст. для відстеження
    насильницького перейменування козацьких топонімів.'
  - 'Текстовий аналіз: Указ Катерини II про ліквідацію Запорозької Січі (1775) як першоджерело, що розкриває справжні мотиви
    імперії — страх перед волелюбним козацтвом.'
  - '[!decolonization] Читання імперських джерел «проти шерсті»: аналіз звітів Потьомкіна, де він применшує роль українців
    і перебільшує «хаос» для виправдання завоювання.'
  - 'Демографічний аналіз: дані першого загальноімперського перепису 1897 року, що фіксують абсолютну перевагу українськомовного
    населення на землях «Новоросії», спростовуючи міф про «російський край».'
  - 'Спогади мандрівників: нотатки німецького дослідника Йоганна Гюльденштедта про його подорож Півднем (1770-ті), які описують
    розвинений український побут і господарство.'
  section: 'Джерела: Карти, укази та переписи'
  words: 1600
- points:
  - 'Короткострокові наслідки: руйнування унікального козацького республіканського устрою, форсована інтеграція регіону в
    імперську адміністративну та економічну систему.'
  - 'Довгострокові наслідки: створення стійкого пропагандистського міфу про «Новоросію», який став ідеологічним інструментом
    для агресії у XXI столітті.'
  - '[!myth-buster] Спростування міфу про те, що Одесу, Херсон, Миколаїв заснували росіяни. Детальний розбір попередньої історії
    цих міст та ролі українських козаків і європейських архітекторів у їх розбудові.'
  - 'Оцінка істориків: порівняння поглядів на колонізацію Півдня у працях Сергія Плохія («Брама Європи»), який акцентує на
    руйнуванні козацького світу, та імперських істориків, що оспівували «цивілізаторську місію» Росії.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чому проєкт «Новоросія» 2014 року провалився у більшості регіонів від Харкова до Одеси? Формулювання
    відповіді на основі історичних даних про українську ідентичність регіону.'
  - 'Зв''язок із сьогоденням: як оборона Миколаєва та Херсона у 2022 році є продовженням багатовікової боротьби за український
    Південь?'
  - '[!anti-hagiography] Уникаючи створення контр-міфу, важливо визнати складну, мультиетнічну історію регіону, яка, однак,
    була успішно інтегрована в модерну українську політичну націю, що й продемонстрував спротив агресії.'
  - 'Підсумкова теза: Міф про «Новоросію» є класичним прикладом інструменталізації історії з колоніальною метою — стерти пам''ять
    корінного населення та легітимізувати завоювання.'
  section: Дискусія та підсумок
  words: 700
