objectives:
- Описувати ключові етапи життя та наукової і політичної діяльності Михайла Грушевського
- Пояснювати суть та значення наукової концепції "Історії України-Руси", що кинула виклик імперській схемі
- Аналізувати роль Грушевського як голови Центральної Ради та його еволюцію від автономіста до державника
- Оцінювати довготривалий вплив спадщини Грушевського на українську історіографію та національну ідентичність
