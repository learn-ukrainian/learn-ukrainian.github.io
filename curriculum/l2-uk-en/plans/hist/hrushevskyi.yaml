content_outline:
- points:
  - 'Провокація: Науковець, який став президентом, і президент, який загинув як репресований науковець. Чому творець української
    державності свідомо повернувся в СРСР назустріч загибелі?'
  - '[!history-bite] Географія життя: Холм → Тифліс → Київ → Львів → Київ → Відень → Прага → Київ → Москва → Кисловодськ.
    Як карта його переміщень відображає драму України ХХ століття?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Схема Грушевського («Україна-Русь») vs схема Карамзіна («єдина колиска»). Боротьба за спадщину
    Київської Русі як центральний конфлікт східноєвропейської історіографії.'
  - 'Дебат 2: Грушевський-політик — «романтик, що не вмів керувати» чи прагматик, який діяв у неможливих умовах? Оцінка його
    лідерства в Центральній Раді.'
  - '[!epistemic-humility] Сучасники критикували Грушевського і за надмірний «соціалізм», і за «буржуазний націоналізм». Як
    зрозуміти його реальні погляди?'
  - 'Глобальна синхронність: поки Грушевський будує УНР, розпадаються Османська та Австро-Угорська імперії, а Томаш Масарик,
    такий самий професор-історик, стає президентом Чехословаччини.'
  section: 'Конфліктна карта: Історик vs. Політик'
  words: 900
- points:
  - 'Аналіз фрагментів з «Історії України-Руси»: монументальний стиль, опертя на джерела, народницька перспектива. Як він
    пише про Козаччину чи Галицько-Волинське князівство?'
  - 'Аналіз промов у Центральній Раді: як змінюється риторика від ідей автономії (І Універсал) до проголошення повної незалежності
    (IV Універсал)?'
  - 'Листи та щоденники: особисті записи, листи до доньки Катерини. Яким він постає поза академічним та політичним образом?'
  - 'Джерельна критика: Хто був аудиторією цих текстів? З якою метою вони створювалися? Які упередження автора можна помітити?'
  section: 'Джерела: Спадщина в текстах'
  words: 1600
- points:
  - 'Коперніканський переворот Грушевського: обґрунтування безперервності української історії від Київської Русі до ХХ ст.
    (Київська Русь → Галицько-Волинська держава → Велике князівство Литовське → Козаччина → УНР).'
  - '[!myth-buster] Грушевський не «вигадав» Україну. Він науково систематизував ідеї, що існували в українській думці щонайменше
    з XIX століття, надавши їм академічної ваги.'
  - 'Спадщина для державності: Центральна Рада як перший сучасний український парламент встановила стандарти (герб, гроші,
    закони), на які орієнтувалися наступні покоління.'
  - Чому сучасна Росія досі атакує Грушевського? Його концепція є головною інтелектуальною перешкодою для імперського наративу
    про «один народ».
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чи було повернення Грушевського в СРСР фатальною помилкою, чи свідомою жертвою заради збереження
    наукових інституцій в УРСР?'
  - 'Ширше питання: Якою має бути роль інтелектуала у часи екзистенційної загрози для нації — бути над процесом чи очолити
    його?'
  - '[!anti-hagiography] Грушевський на 50-гривневій купюрі — ікона. Але його політичні рішення були складними і часто критикованими.
    Як примирити символ з реальною історичною постаттю?'
  - 'Зв''язок із сьогоденням: «Біда України в тому, що нею керують ті, кому вона не потрібна». Як це приписуване Грушевському
    висловлювання резонує із сучасною політичною ситуацією?'
  section: Дискусія та підсумок
  words: 700
focus: 'Михайло Грушевський: біографія, наукова концепція "Історії України-Руси", деконструкція імперських міфів, роль голови
  Центральної Ради, трагічна доля в СРСР.'
