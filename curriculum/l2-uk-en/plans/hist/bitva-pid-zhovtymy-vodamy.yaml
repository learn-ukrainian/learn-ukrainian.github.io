content_outline:
- points:
  - 'Провокація: Перемога під Жовтими Водами — це результат геніальної стратегії Хмельницького чи фатальної самовпевненості
    польського командування? Що б змінилося, якби Микола Потоцький не недооцінив «бунтівного» гетьмана?'
  - 'Фрагмент з листа: «...син мій Стефан пішов наперед із частиною війська, щоб придушити бунт у зародку. Чекаю на швидкі
    та добрі вісті...» — без контексту, студент має вгадати автора та результат.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Радянська/імперська історіографія зображувала повстання як стихійний бунт селян. Українська
    — як війну за незалежність, керовану досвідченим стратегом. Чиї аргументи переконливіші?'
  - 'Дебат 2: Хто переміг під Жовтими Водами — козаки чи татари? Роль Тугай-бея як вирішального фактора проти ролі козацької
    піхоти та бунту реєстрових.'
  - '[!epistemic-humility] Точна кількість військ з обох боків досі є предметом дискусій. Літописи подають різні цифри. Ми
    аналізуємо співвідношення сил, а не абсолютні числа.'
  - 'Глобальна синхронність: 1648 рік — кінець Тридцятилітньої війни в Європі (Вестфальський мир), Фронда у Франції, революція
    в Англії. Козацьке повстання як частина «кризи XVII століття».'
  section: 'Конфліктна карта: Війна професіоналів чи бунт черні?'
  words: 900
- points:
  - 'Первинне джерело 1: Реконструкція останніх листів Стефана Потоцького до батька. Аналіз зміни тону: від пихатої зверхності
    до відчаю. Хто є цільовою аудиторією цього листа?'
  - 'Первинне джерело 2: Фрагмент «Літопису Самовидця» про повстання реєстрових козаків на Кам''яному Затоні. «...полковники
    наші, Барабаш та Караїмович, вірності королю не зрадили...». Аналіз мови та ідеології автора.'
  - '[!decolonization] Читання імперських джерел «проти шерсті»: польські звіти про «зраду реєстрових» vs козацький погляд
    на це як на акт національного возз''єднання. Чому знищення клейнодів було таким важливим символічним актом?'
  - 'Джерельна критика: порівняння опису однієї події (наприклад, першого штурму) у козацькому літописі та польському звіті.
    Де розходяться факти, а де — лише інтерпретації?'
  section: 'Джерела: Листи з табору та літописні оповіді'
  words: 1600
- points:
  - 'Причини та наслідки: Як рішення Потоцького розділити сили призвело до поразки? Аналіз тактичних помилок польського командування.'
  - 'Наслідок 1: Народження козацько-татарського тактичного союзу. Мобільна кіннота Тугай-бея + козацька піхота та артилерія
    — формула перемоги.'
  - 'Наслідок 2: Козацьке військове мистецтво в дії. Використання «шанців» (польових укріплень), тактика «гуляй-города», влаштування
    засідки в урочищі Княжі Байраки.'
  - '[!myth-buster] Спростування міфу про «селянську війну». Протистояння двох професійних армій. Перевага козаків не в чисельності,
    а в тактиці, мотивації та знанні місцевості.'
  - 'Значення: Психологічний удар по Речі Посполитій. Вперше елітне шляхетське військо було розгромлене «бунтівниками». Це
    відкрило шлях на Корсунь.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Жовті Води — це геніальність Хмельницького, помилка Потоцького чи просто вдалий збіг обставин?
    Студент формулює власну аргументовану відповідь.'
  - 'Ширше питання: Яку роль відіграє «національна гордість» та «пиха» у військових поразках? Порівняйте ситуацію 1648 року
    з іншими історичними прикладами.'
  - '[!anti-hagiography] Хмельницький — не безгрішний герой. Союз із татарами означав дозвіл на взяття ясиру з українських
    земель. Як ми маємо оцінювати такі складні моральні компроміси?'
  - 'Зв''язок із сьогоденням: Недооцінка супротивника та віра у власну безкарність — як уроки Жовтих Вод актуальні сьогодні?'
  section: Дискусія та підсумок
  words: 700
