objectives:
- Аналізувати стратегічні та тактичні рішення обох сторін у битві під Жовтими Водами
- Пояснювати вирішальну роль переходу реєстрових козаків на бік повсталих та союзу з татарами
- Критично оцінювати історичні джерела (літописи, листи), розрізняючи факти та інтерпретації
- Спростовувати імперські міфи про «стихійний бунт», аргументуючи тезу про битву як зіткнення професійних армій
pedagogy: CBI
persona:
  role: Стратегічний аналітик, що розбирає битву як шахову партію, фокусуючись на рішеннях, помилках та їхніх наслідках. Говорить
    мовою тактики, а не пафосу.
  voice: Military-Historian
phase: HIST.6 [Khmelnytsky & Cossack State]
