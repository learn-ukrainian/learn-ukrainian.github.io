content_outline:
- points:
  - 'Провокативне питання: «Русская весна» 2014 року на Донбасі — це було стихійне повстання місцевих чи блискуча спецоперація
    Кремля? Чи можлива була б війна без Ігоря Гіркіна?'
  - 'Фрагмент інтерв''ю Гіркіна: "Спусковий гачок війни все-таки я натиснув. Якби наш загін не перейшов кордон, все скінчилося
    б, як у Харкові, як в Одесі...". Як це змінює ваше уявлення про початок війни?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська позиція vs Російський наратив. РФ наполягає на «внутрішньому конфлікті» та «громадянській війні».
    Україна та світ надають докази прямої військової агресії РФ (зброя, фінанси, командування, регулярні війська).'
  - 'Дебат 2: Чи були Мінські угоди зрадою чи єдиним можливим рішенням? Позиція 1: «Мінськ» дав Україні час на розбудову армії.
    Позиція 2: «Мінськ» легітимізував бойовиків і заморозив конфлікт на умовах РФ.'
  - '[!epistemic-humility] Точна кількість кадрових російських військових, що брали участь у боях 2014-2015 рр., досі є предметом
    дискусій. Оцінки варіюються від тисяч до десятків тисяч.'
  - 'Глобальна синхронність: Поки світ спостерігав за захопленням Криму та початком війни на Донбасі, в Сирії тривала громадянська
    війна, а ІДІЛ проголосила «халіфат» на території Іраку та Сирії, відволікаючи увагу світової спільноти.'
  section: 'Конфліктна карта: «Громадянська війна» чи гібридна агресія?'
  words: 900
- points:
  - 'Голоси з Донецького аеропорту: "Кіборги вистояли, не витримав бетон". Спогади захисників ДАП про оборону, бої за термінали
    та колядування на вежі при -24°C (цитата Павла Новіцького).'
  - 'Трагедія MH17: Аналіз розслідування Bellingcat та Joint Investigation Team (JIT). Як журналісти-розслідувачі за відкритими
    даними встановили маршрут російського «Бука» з 53-ї зенітно-ракетної бригади ЗС РФ (Курськ).'
  - 'Іловайський котел: Свідчення солдата батальйону «Донбас» про розстріл російськими військами «зеленого коридору», загибель
    побратимів у КамАЗі з червоним хрестом. Пряме вторгнення регулярних військ РФ як ключовий фактор трагедії.'
  - '[!decolonization] «Нас там нет»: Аналіз доказів присутності ЗС РФ. Фото та свідчення полонених десантників 331-го полку
    ВДВ з Костроми, які «заблукали на навчаннях» у серпні 2014. Танки Т-72Б3, які були лише на озброєнні армії РФ.'
  section: 'Джерела: Свідчення очевидців та докази'
  words: 1600
- points:
  - 'Від АТО до позиційної війни: Як силова відповідь на дії диверсійних груп (АТО) переросла у повномасштабні бойові дії,
    а згодом — у «заморожений конфлікт» низької інтенсивності з постійними обстрілами та снайперським вогнем (2015-2022).'
  - 'Людський вимір: Понад 14 тисяч загиблих, десятки тисяч поранених до 2022 року. Півтора мільйона внутрішньо переміщених
    осіб (ВПО) — трагедія людей, що втратили дім.'
  - '[!myth-buster] Міф про «шахтарів та трактористів». Аналіз ролі громадян РФ на чолі окупаційних адміністрацій (Бородай,
    Гіркін) та серед бойовиків (Моторола), що доводить маріонетковий характер «ДНР/ЛНР» та зовнішнє управління з Кремля.'
  - 'Невдача «Мінська»: Чому угоди не принесли миру? Росія як «гарант», а не сторона конфлікту, відсутність контролю над кордоном,
    постійні порушення «режиму тиші» — все це готувало підґрунтя для повномасштабного вторгнення.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Спираючись на матеріал модуля, дайте розгорнуту відповідь: чому теза про «громадянську війну»
    в Україні є елементом російської пропаганди?'
  - 'Шлях до 24 лютого: Як 8 років війни на Донбасі підготували Україну і світ до повномасштабного вторгнення? Аналіз роздачі
    російських паспортів в ОРДЛО та визнання «незалежності» псевдореспублік як casus belli.'
  - '[!anti-hagiography] Чи не було в українського суспільства ілюзії, що війна «десь там, далеко» і не торкнеться кожного?
    Обговорення феномену адаптації до війни в 2015-2021 роках.'
  - 'Зв''язок із сьогоденням: Які уроки війни 2014-2022 років є найважливішими для розуміння подій після 24 лютого 2022 року?'
