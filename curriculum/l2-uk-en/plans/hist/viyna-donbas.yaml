objectives:
- Аналізувати причини, ключові події та етапи війни на Донбасі 2014-2022 років
- Розвінчувати російські пропагандистські наративи про «громадянську війну», використовуючи докази гібридної агресії РФ
- Оцінювати роль та наслідки ключових битв (Іловайськ, ДАП, Дебальцеве) для перебігу війни
- Пояснювати причини провалу Мінських угод та їхній зв'язок із повномасштабним вторгненням 2022 року
