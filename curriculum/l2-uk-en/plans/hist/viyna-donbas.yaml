module: hist-131
level: HIST
sequence: 131
slug: viyna-donbas
version: '2.0'
title: Війна на Донбасі 2014-2022
subtitle: The War in Donbas 2014-2022
content_outline:
- section: 'Вступ: «Русская весна»'
  points:
  - 'Квітень 2014: захоплення Донецька та Луганська — 12 квітня група Гіркіна захоплює
    Слов''янськ; початок силового сценарію; вторгнення диверсійних груп ГРУ РФ'
  - Російські «зелені чоловічки» — тактика захоплення адмінбудівель спецназом РФ без
    розпізнавальних знаків; координація ГРУ; застосування кримського сценарію
  - Проголошення «ДНР» та «ЛНР» — штучні утворення; референдуми «під дулами автоматів»
    без списків виборців і спостерігачів
  - 'cultural hook: [!myth-buster] — «Русская весна» не була стихійним повстанням
    шахтарів, а спланованою операцією спецслужб РФ (кейс Гіркіна)'
- section: Війна 2014-2015
  points:
  - 'Слов''янськ: Стрілков/Гіркін — звільнення міста 5 липня 2014 року; переломний
    момент; відхід бойовиків у Донецьк'
  - Збиття MH17 — 17 липня 2014, 298 загиблих; [!context] момент істини для світу,
    докази російського «Бука» з Курської бригади (розслідування JIT)
  - 'Іловайськ: трагедія — серпень 2014, пряме вторгнення регулярної армії РФ; розстріл
    «зеленого коридору»; найбільші одномоментні втрати ЗСУ'
  - 'Донецький аеропорт: «кіборги» — оборона 242 (244) дні; [!history-bite] фраза
    «Кіборги вистояли, не витримав бетон»; вежа впала 13 січня 2015'
  - Дебальцеве — січень-лютий 2015, масштабний танковий наступ РФ (буряти) перед Мінськом-2
- section: Мінські угоди (2014-2022)
  points:
  - Мінськ-1 та Мінськ-2 — вересень 2014 та 12 лютого 2015; спроби зупинити наступ
    РФ; пункти про припинення вогню та контроль над кордоном
  - Чому угоди не працювали — [!analysis] Росія заперечувала участь («нас там немає»)
    і використовувала час для підготовки до великої війни
  - «Заморожений конфлікт» — позиційна війна 2015-2022; постійні порушення тиші, снайперський
    вогонь
  - Обстріли та жертви — понад 14 тисяч загиблих (військові та цивільні) до 2022 року
- section: Первинні джерела
  points:
  - Свідчення учасників — спогади про Іловайськ (солдат батальйону «Донбас» про розстріл
    КамАЗу з пораненими)
  - Журналістські розслідування MH17 — Bellingcat та JIT доводять провину РФ
  - Відеодокази російської присутності — полонені десантники з Костроми («заблукали»)
    у серпні 2014
  - include quote from [Pavlo Novitsky] — [!quote] захисник ДАП про колядування на
    вежі у -24°C
- section: Деколонізаційний погляд
  points:
  - 'Російський наратив: «громадянська війна» — [!decolonization] спростування міфу
    Civil War; термінологія Russo-Ukrainian War; конфлікт інспірований РФ'
  - 'Реальність: російська агресія — ініціатори громадяни РФ (Гіркін, Бородай, Моторола),
    зброя (Т-72Б3) та фінансування з бюджету РФ'
  - «ДНР»/«ЛНР» як маріонетки — окупаційні адміністрації; ватажки (Захарченко, Плотницький)
    призначалися та ліквідовувалися Кремлем
- section: 'Підсумок: До повномасштабного вторгнення'
  points:
  - 8 років війни — адаптація суспільства до війни «десь там»; стримування агресора
  - Втрати та біженці — мільйони ВПО (внутрішньо переміщених осіб); втрата домівок
  - Шлях до 24 лютого 2022 — роздача паспортів РФ в ОРДЛО; визнання «незалежності»
    псевдореспублік 21 лютого як привід для вторгнення
vocabulary_hints:
  required:
  - 'війна (war) — російсько-українська війна (Russo-Ukrainian War); learner error:
    civil war'
  - окупація (occupation) — тимчасова окупація (temporary occupation); окупаційна
    адміністрація
  - агресія (aggression) — збройна агресія РФ (armed aggression of RF); акт агресії
  - 'сепаратисти (separatists) — usage note: better use «колаборанти» or «бойовики»
    (militants); російські найманці'
  - добровольці (volunteers) — добровольчі батальйони (volunteer battalions); піти
    добровольцем
  - кіборги (cyborgs) — захисники ДАП (defenders of DAP); символ стійкості
  - Мінські угоди (Minsk agreements) — порушення угод (violation of agreements); підписання
    угод
  - АТО (ATO) — Антитерористична операція (Anti-Terrorist Operation); зона АТО
  - зелений коридор (green corridor) — розстріл зеленого коридору (shooting of the
    green corridor); пастка
  recommended:
  - обстріл (shelling) — артилерійський обстріл (artillery shelling); мінометний обстріл
  - фронт (front) — лінія фронту (front line); лінія розмежування
  - біженці (refugees) — внутрішньо переміщені особи (IDPs); вимушені переселенці
  - перемир'я (ceasefire) — режим тиші (silence regime); порушення перемир'я
  - санкції (sanctions) — міжнародні санкції (international sanctions); запровадження
    санкцій
  - гібридна війна (hybrid warfare) — інформаційна війна (information war); пропаганда
  - диверсанти (saboteurs) — російські диверсійні групи (Russian sabotage groups);
    ДРГ
