objectives:
- Аналізувати російсько-українську війну в деколонізаційній рамці, розрізняючи імперські наративи та історичну реальність
- Пояснювати глибинні причини та справжні цілі російської агресії, спираючись на аналіз першоджерел
- Критично оцінювати чинники, що дозволили Україні чинити ефективний спротив одній з найбільших армій світу
- Формулювати аргументовану позицію щодо глобального значення українського спротиву та його впливу на світовий порядок
