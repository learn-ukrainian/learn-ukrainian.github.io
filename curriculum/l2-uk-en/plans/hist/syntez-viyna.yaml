content_outline:
- points:
  - 'Провокація: Чи є війна, що почалася у 2014 році, новим конфліктом, чи це лише остання, найгарячіша фаза столітньої війни
    України за незалежність?'
  - 'Фрагмент без контексту: «Ми не маємо права перекласти цю війну на наших дітей». Хто, коли і в якому контексті це сказав?
    Що означає цей вислів для розуміння українського спротиву?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Спеціальна військова операція» vs. Колоніальна війна. Аналіз російських наративів («денацифікація», «захист
    російськомовних») як ідеологічного прикриття для спроби знищення української державності та ідентичності.'
  - 'Дебат 2: «Громадянська війна» vs. Міждержавний конфлікт. Розбір тези про «внутрішній конфлікт» на Донбасі (2014-2022)
    та докази прямої військової участі Росії з першого дня агресії.'
  - '[!epistemic-humility] Визнання складності термінології: гібридна війна, АТО/ООС, повномасштабне вторгнення. Як мова опису
    впливає на наше розуміння подій?'
  - 'Глобальна синхронність: Український спротив у контексті глобального протистояння демократій та автократій. Порівняння
    з іншими конфліктами XXI століття та аналіз унікальності українського кейсу.'
  section: 'Конфліктна карта: Війна за що?'
  words: 900
- points:
  - 'Ідеологічне обґрунтування агресії: аналіз статті Путіна «Про історичну єдність росіян та українців» та промов від 24
    лютого 2022. [!decolonization] Розбір ключових імперських міфів та спотворень.'
  - 'Документування спротиву: вивчення наказів українського військового командування, заяв лідерів (наприклад, промова Зеленського
    «Нам потрібна амуніція, а не евакуація»), та свідчень волонтерів. Як ці джерела демонструють українську суб''єктність?'
  - 'Свідчення про воєнні злочини: аналіз звітів Human Rights Watch, Amnesty International та висновків слідчих комісій ООН
    щодо подій у Бучі, Ізюмі, Маріуполі. Критика джерел: як верифікувати інформацію в умовах інформаційної війни?'
  - '«Зелені чоловічки» та імітація референдумів: розгляд доказів російської операції з окупації Криму. Аналіз «референдуму»
    як інструменту легітимізації агресії.'
  section: 'Джерела: Голоси війни'
  words: 1600
- points:
  - 'Трансформація української нації: прискорення процесів самоідентифікації, консолідація суспільства, роль громадянського
    суспільства та волонтерського руху.'
  - '[!myth-buster] Крах військових міфів: розвінчання міфу про «другу армію світу». Аналіз ключових битв (оборона Києва,
    Харківський контрнаступ, звільнення Херсона) як прикладів асиметричної війни та сучасного військового мистецтва.'
  - 'Геополітичний зсув: зміна архітектури європейської безпеки, розширення НАТО, криза міжнародних організацій (ООН, ОБСЄ),
    та посилення ролі коаліцій (формат «Рамштайн»).'
  - 'Економічні та соціальні наслідки: гуманітарна катастрофа, проблема біженців, руйнування інфраструктури, а також глобальна
    продовольча та енергетична кризи, спровоковані Росією.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: студент формулює аргументовану відповідь, чи є ця війна кульмінацією історичного процесу, спираючись
    на матеріали модуля.'
  - 'Від жертви до суб''єкта: як Україна змінила своє місце на геополітичній карті світу? Обговорення трансформації міжнародного
    іміджу країни.'
  - '[!anti-hagiography] Уникаючи надмірної ідеалізації: які внутрішні виклики (корупція, політичні суперечки) постали перед
    Україною під час війни і як вони впливають на стійкість держави?'
  - 'Шлях до перемоги: що означає «перемога» для України, для Росії та для світу? Дискусія про можливі сценарії завершення
    війни та повоєнної відбудови.'
  section: Дискусія та підсумок
  words: 700
focus: The 2014-2024 Russo-Ukrainian War as a decolonization conflict, analyzing historiographical debates, primary sources,
  and global consequences.
