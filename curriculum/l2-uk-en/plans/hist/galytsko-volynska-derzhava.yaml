content_outline:
- points:
  - 'Провокація: «Не погнітивши бджіл, меду не їстимеш». Це слова князя Романа Мстиславича про галицьких бояр. Що це говорить
    про його методи правління? Чи може жорстокість бути необхідним інструментом для побудови держави?'
  - Уявіть себе радником князя. Яку б пораду ви дали правителю, що стикається з могутньою олігархією, яка загрожує єдності
    країни?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська історіографія vs сучасний погляд. Чи була Галицько-Волинська держава лише одним з «удільних князівств»
    у період «феодальної роздробленості», чи повноцінним європейським королівством (Regnum Russiae), що стало спадкоємцем
    Києва?'
  - 'Дебат 2: Автократія vs олігархія. Внутрішня боротьба за модель влади. «Самодержавство» Романа Мстиславича як спроба централізації
    проти боярської опозиції, що прагнула аристократичної республіки.'
  - '[!epistemic-humility] Наші знання базуються на літописах, написаних на замовлення князів. Наскільки об''єктивно вони
    відображають настрої бояр чи простих людей? Ми бачимо боротьбу переважно очима переможців.'
  - 'Глобальна синхронність: У той час як Данило отримує корону від Папи (1253), в Англії барони змушують короля підписати
    "Велику хартію вольностей" (1215), обмежуючи монаршу владу. Дві різні моделі взаємовідносин влади та еліт.'
  section: 'Конфліктна карта: Королівство чи князівство?'
  words: 900
- points:
  - 'Аналіз Галицько-Волинського літопису: світський характер, фокус на особистості князя, поетична мова. Це не просто хроніка,
    а політичний твір, що легітимізував владу Романовичів.'
  - 'Персональний стиль: порівняння описів битв та дипломатичних місій. Як літописець створює образ ідеального правителя?'
  - 'Цитата зі «Слова о полку Ігоревім»: «Галицький Осмомисле Ярославе! Високо сидиш ти на своїм золотокованім престолі...».
    Аналіз цього фрагменту як свідчення могутності та авторитету Галича ще до об''єднання з Волинню.'
  - '[!decolonization] Літопис як інструмент державотворення. Він послідовно доводить, що саме Галич і Волинь, а не північно-східні
    князівства, є прямою спадщиною Київської Русі, зберігаючи навіть назву «Русь».'
  section: 'Джерела: Літопис Руський та «Слово о полку»'
  words: 1600
- points:
  - 'Причина і наслідок: Об''єднання 1199 року Романом та його раптова загибель 1205 року. Як ця подія спровокувала 30-річну
    «Велику смуту» та іноземну інтервенцію.'
  - Унікальний «дуумвірат» Данила і Василька як формула успіху. Розподіл обов'язків (Данило — зовнішня політика, Василько
    — внутрішні справи) дозволив стабілізувати державу і перейти до розвитку.
  - 'Економічний розквіт: заснування міст (Холм, Львів), розвиток торгівлі (соляний шлях), перемога під Ярославом (1245) як
    кінець боярського сепаратизму та економічна перемога.'
  - '[!myth-buster] Коронація Данила 1253 року — це не «зрада православ''я» і не «підкорення Папі», як писала російська історіографія.
    Це був прагматичний військово-політичний союз, спроба створити європейську коаліцію проти Золотої Орди. Акт європейського
    вибору.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чи була виправдана жорстокість Романа Мстиславича? Чи міг би Данило досягти успіху без залізного
    фундаменту, закладеного його батьком? Студент формулює відповідь на основі матеріалу модуля.'
  - 'Альтернативний шлях Русі: Галицько-Волинська держава — це модель європейської інтеграції (міське право, готична архітектура,
    королівський титул) на противагу деспотичній моделі, що формувалася в Заліссі. Що втратила східна Європа з її занепадом?'
  - '[!anti-hagiography] Уникаємо ідеалізації. Попри весь розквіт, держава була роздираєма внутрішніми конфліктами, змушена
    до важких компромісів із Ордою і, врешті-решт, була поглинена сусідами. Це історія успіху, але з трагічним фіналом.'
  - 'Зв''язок із сьогоденням: Галичина як «П''ємонт» українського національного руху в XIX-XX ст. Наскільки ця роль зумовлена
    спадщиною Королівства Русь?'
  section: Дискусія та підсумок
  words: 700
focus: Розквіт Галицько-Волинської держави як спадкоємиці Києва. Роль Романа Мстиславича та Данила Галицького. Боротьба з
  боярством, європейська орієнтація та деколонізаційний погляд на її значення.
level: HIST
module: hist-024
objectives:
- Аналізувати причини та наслідки розквіту Галицько-Волинської держави як головного центру руської державності у XIII ст.
- Критично порівнювати різні історіографічні погляди (радянський, український, європейський) на статус та роль Королівства
  Русь.
- Оцінювати роль ключових постатей (Роман Мстиславич, Данило Галицький) у контексті внутрішніх та зовнішніх викликів.
- Формулювати аргументовану позицію щодо геополітичного вибору Данила Романовича та його значення для сучасної України.
