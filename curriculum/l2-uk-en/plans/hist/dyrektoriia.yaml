content_outline:
- points:
  - 'Провокація: Соціаліст-письменник і прагматик-генерал об''єднуються, щоб повалити монарха. Звучить як рецепт успішної
    революції, але це стало початком кінця. Чому єдність проти спільного ворога не гарантувала перемоги?'
  - 'Цитата без контексту: «Вся відповідальність за кров, пролиту в братовбивчій війні... лягає на голови тих, хто свідомо
    чи несвідомо викликав це нещастя» — хто, кому і за яких обставин міг це сказати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] «Громадянська війна» чи російсько-українська війна? Радянська/імперська теза про внутрішній
    конфлікт vs українська теза про зовнішню агресію та військову інтервенцію більшовиків.'
  - 'Дебат 2: Винниченко vs Петлюра. Конфлікт між соціалістичним доктринерством («радянська платформа без більшовиків») та
    державницьким прагматизмом (необхідність сильної армії для війни з Москвою).'
  - '[!epistemic-humility] Чи був можливий компроміс? Оцінки істориків розходяться: одні вважають конфлікт неминучим зіткненням
    ідеологій, інші — наслідком особистих амбіцій та взаємної недовіри.'
  - 'Глобальна синхронність: Розпад імперій після Першої світової війни (Австро-Угорської, Османської, Російської), хвиля
    революцій в Європі (Німеччина, Угорщина) та байдужість Антанти до українського питання.'
  section: 'Конфліктна карта: Ідеологія проти держави'
  words: 900
- points:
  - 'Декларація Директорії (26.12.1918): Аналіз тексту. На кого орієнтувалися лідери? Чому права гарантувалися лише «трудовим
    класам»? Які соціальні та економічні зміни проголошувались?'
  - 'Акт Злуки (22.01.1919): Урочистий текст vs політична реальність. Аналіз тексту Універсалу про об''єднання УНР та ЗУНР
    як символічного жесту та юридичного документа.'
  - 'Накази Симона Петлюри: Розгляд наказів про боротьбу з погромами (напр. Наказ №131). Як головнокомандувач намагався встановити
    дисципліну в армії? Наскільки це було ефективно?'
  - 'Спогади Володимира Винниченка («Відродження нації»): Критичне читання. Як автор пояснює свої дії та поразку Директорії?
    Де межа між самовиправданням та об''єктивним аналізом?'
  - 'Варшавський договір (1920): Текст угоди з Польщею. Чим УНР пожертвувала заради військового союзу? Чи був це вимушений
    крок, чи зрада національних інтересів (зокрема, Галичини)?'
  - '[!decolonization] Читання імперських джерел «проти шерсті»: Як більшовицькі та денікінські документи зображували Директорію?
    Виявлення пропагандистських кліше та мови ворожнечі.'
  section: 'Джерела: Універсали, накази та спогади'
  words: 1600
- points:
  - 'Причинно-наслідковий аналіз: «Трикутник смерті» 1919 року. Як одночасна боротьба з більшовиками, білогвардійцями та поляками,
    ускладнена епідемією тифу, призвела до військової катастрофи.'
  - '[!myth-buster] Деконструкція міфу про «петлюрівщину». Як радянська пропаганда створила з Петлюри образ «бандита» і «погромника»,
    і як це пов''язано з вбивством Шварцбардом у Парижі, що було спецоперацією ОДПУ.'
  - 'Проблема погромів: Визнання трагедії та аналіз її причин. Роль отаманщини, деморалізації, зовнішньої провокації. Спроби
    уряду УНР протидіяти насильству.'
  - 'Оцінки істориків: Чому Директорія зазнала поразки? Порівняння аргументів: внутрішні чвари (Субтельний), відсутність соціальної
    підтримки (П. Христюк), несприятливі міжнародні умови (Плохій).'
  - 'Київська катастрофа (серпень 1919): Аналіз однієї з ключових подій, коли українські війська увійшли в Київ одночасно
    з денікінцями, що призвело до втрати столиці.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, чому союз Винниченка та Петлюри був приречений? Студент формулює відповідь на основі аналізу
    ідеологічних розбіжностей та військово-політичної ситуації.'
  - 'Урок для сьогодення: «Демократія без сильної армії неможлива». Як досвід Директорії актуалізувався після 1991 та 2014
    років? У чому схожість і відмінність викликів?'
  - 'Збереження спадкоємності: Уряд УНР в екзилі як інститут, що зберіг юридичну тяглість української державності до 1992
    року. Передача клейнодів першому президенту незалежної України.'
  - '[!anti-hagiography] Уникнення романтизації поразки. Директорія — це не лише героїчна боротьба, але й історія фатальних
    помилок, внутрішніх чвар та втрачених можливостей. Які головні уроки?'
  section: Дискусія та підсумок
  words: 700
focus: The rise and fall of the Directory, the internal conflict between Vynnychenko and Petliura, the war on multiple fronts
  (the "triangle of death"), and the decolonization of the "civil war" narrative.
level: HIST
module: hist-093
objectives:
- Аналізувати створення, діяльність та історичний контекст Директорії УНР
- Пояснювати суть та наслідки політичного конфлікту між Володимиром Винниченком та Симоном Петлюрою
- Критично оцінювати причини військової та політичної поразки Директорії, розрізняючи внутрішні та зовнішні фактори
- Деконструювати імперські та радянські міфи про цей період, зокрема термін «петлюрівщина»
pedagogy: CBI
