content_outline:
- points:
  - 'Провокаційне питання: Хозарський каганат був «щитом Європи» від арабських завоювань чи «ярмом» для слов''янських племен?
    Чи можлива третя відповідь?'
  - 'Фрагмент з листа царя Йосипа: «Ми воюємо з русами... якби ми їх залишили в спокої, вони б знищили всю землю ісмаїльтян
    до Багдада». Про що говорить цей уривок без контексту?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Українська vs. радянська історіографія): Концепція «Pax Khazarica» (безпека торгівлі, культурний обмін) проти
    радянського міфу про «хозарське ярмо» як виключно гнітючу силу.'
  - 'Дебат 2 (Внутрішньо-наукова дискусія): Яким був реальний вплив на Русь? Каталізатор державотворення через запозичення
    інститутів (титул кагана) чи лише тимчасовий торговий партнер?'
  - '[!epistemic-humility] Більшість джерел про Хозарію — зовнішні (арабські, візантійські, єврейські). Внутрішніх хозарських
    наративів майже не збереглося, що залишає простір для інтерпретацій.'
  - 'Глобальна синхронність: Хозарський каганат як східний аналог імперії Каролінгів — контроль над торговими шляхами, мультикультурність,
    спроба створити стабільну імперську структуру у VIII-IX ст.'
  section: 'Конфліктна карта: Імперія торгівлі чи паразитарне утворення?'
  words: 900
- points:
  - 'Аналіз «Київського листа» та «Листа царя Йосипа»: погляд зсередини хозарської еліти. Як вони бачили свою роль та відносини
    з сусідами, зокрема з Руссю (згадка про князя Х-л-гу/Олега).'
  - 'Свідчення арабських географів (Ібн Фадлан, Аль-Масуді): опис системи двовладдя (сакральний каган та військовий бек),
    релігійної толерантності та багатства столиці Ітиль.'
  - '[!decolonization] Перечитування «Повісті минулих літ»: Легенда про «данину мечами» — не просто опис підкорення, а ретроспективне
    пророцтво майбутньої перемоги Русі, вписане київським літописцем.'
  - 'Археологічні дані: Салтівсько-Маяцька культура як матеріальне втілення каганату. Аналіз фортець (Саркел), поселень та
    поховань, що свідчать про осілий спосіб життя та культурний синкретизм.'
  section: 'Джерела: Листи царів та свідчення мандрівників'
  words: 1600
- points:
  - 'Короткострокові наслідки: Хозарія як «щит», що зупинив арабську експансію у Східну Європу (битва 737 р.). Створення безпечних
    умов для торгівлі шляхом «із варяг у греки».'
  - 'Довгострокові наслідки для Русі: Запозичення титулу «каган» першими київськими князями як претензія на рівність з імперіями.
    Знищення каганату Святославом у 965 р. «відкрило ворота» на Русь для печенігів.'
  - '[!myth-buster] Спростування міфу про «паразитарний» характер каганату. Хозари не лише збирали данину, але й забезпечували
    військовий захист (протекторат) та сприяли розвитку ремесел і торгівлі.'
  - 'Оцінка істориків: Порівняння поглядів М. Грушевського (Хозарія як важливий етап у консолідації слов''ян) та сучасних
    дослідників (О. Пріцак, С. Плохій) на роль каганату в генезі Київської Русі.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, ким були хозари для Русі — торговими партнерами, сюзеренами, ворогами чи каталізаторами
    державності? Студент формулює відповідь на основі джерел та аналізу.'
  - 'Питання про спадок: Чому київські князі так прагнули запозичити титул «каган»? Що він символізував у тогочасній політичній
    системі?'
  - '[!anti-hagiography] Уникнення ідеалізації. Розгром Святославом Хозарії був не лише перемогою, але й стратегічною помилкою,
    що призвела до століть боротьби з кочівниками Степу.'
  - 'Зв''язок із сьогоденням: Як імперські наративи (зокрема, міф про «ярмо») використовуються в сучасній пропаганді для заперечення
    давньої історії української державності?'
  section: Дискусія та підсумок
  words: 700
focus: Pax Khazarica, Khazar role in Rus' state-building, deconstruction of the "Khazar Yoke" myth, analysis of primary sources
