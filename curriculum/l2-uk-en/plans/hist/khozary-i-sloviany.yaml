objectives:
- Пояснювати унікальну систему двовладдя в Хозарському каганаті (каган і бек)
- Аналізувати причини та наслідки прийняття іудаїзму хозарською елітою як політичний крок
- Оцінювати вплив «Pax Khazarica» на економічний та політичний розвиток східнослов''янських племен
- Спростовувати радянський міф про «хозарське ярмо», використовуючи концепцію торговельного протекторату та дані з першоджерел
