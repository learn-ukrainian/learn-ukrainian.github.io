content_outline:
- points:
  - 'Провокаційне питання: Іван Мазепа — «жадібний зрадник», як 300 років стверджувала російська пропаганда, чи найщедріший
    меценат в історії України, що будував державу через культуру? Чому імперії було так важливо знищити його репутацію?'
  - 'Фрагмент опису собору, збудованого Мазепою: «...всередині все сяє від золота, а стіни прикрашені таким розмаїттям, що
    очі розбігаються». Як такий опис спростовує міф про «селянську» культуру Гетьманщини?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська культура XVII-XVIII ст. — це провінційне наслідування Заходу (імперський погляд) чи унікальний синтез,
    що сам став донором культури для Москви (деколоніальний погляд)? [!decolonization] Розгляд феномену «Наришкінського бароко»
    як доказу культурного впливу України на Московію.'
  - 'Дебат 2: Що було рушієм «золотої доби» культури? Політична воля та державна стратегія гетьманів (Мазепа) чи духовні реформи
    та освітній прорив (Могила)?'
  - '[!epistemic-humility] Історики сперечаються, чи можна вважати меценатство Мазепи суто альтруїстичним актом, чи це був
    прагматичний розрахунок для легітимізації влади в очах козацької старшини та духовенства.'
  - 'Глобальна синхронність: Козацьке бароко як вияв національної ідентичності vs класицизм Людовіка XIV у Франції як інструмент
    абсолютної монархії vs стриманий протестантський бароко в Англії. Різні відповіді на однакові виклики епохи.'
  section: 'Конфліктна карта: Європейський вибір чи культурна ізоляція?'
  words: 900
- points:
  - 'Джерело 1 (Народний епос): Аналіз тексту «Думи про Марусю Богуславку». Розгляд речитативної форми як інструменту імпровізації.
    [!decolonization] Чому думи як жанр не мають аналогів у російському фольклорі і є маркером окремої української ідентичності?'
  - 'Джерело 2 (Освіта): Фрагменти статуту Києво-Могилянської академії. Вивчення «семи вільних мистецтв», латина як мова науки.
    Як навчальний план формував еліту, здатну керувати державою та конкурувати з європейськими інтелектуалами?'
  - 'Джерело 3 (Архітектура): Аналіз архітектурних особливостей Покровського собору в Харкові та Троїцької надбрамної церкви
    в Лаврі. Грушоподібні бані, «розірвані» фронтони, рослинний орнамент — як ці елементи створювали унікальний національний
    стиль?'
  - 'Джерело 4 (Мистецтво): Порівняння ікони та парсуни (на прикладі портрета Богдана Хмельницького). Як перехід від сакрального
    до світського портрета свідчить про зміну світогляду та народження модерної ідеї особистості?'
  section: 'Джерела: Думи, статути та літописи'
  words: 1600
- points:
  - 'Причинно-наслідковий зв''язок: Як випускники («спудеї») Києво-Могилянської академії стали архітекторами не лише Гетьманщини,
    але й Російської імперії (Феофан Прокопович, Стефан Яворський)?'
  - 'Довгострокові наслідки: Меценатство гетьманів як стратегія легітимації влади — будівництво церков не лише утверджувало
    гетьмана як «захисника віри», але й візуально маркувало територію української держави.'
  - '[!myth-buster] Розвінчання міфу про «зрадника Мазепу». Аналіз конкретних цифр: понад 40 збудованих та відреставрованих
    церков, мільйонні пожертви на освіту та друк (напр., арабське Євангеліє 1708 р.). Мазепа витрачав на культуру більше,
    ніж на військо.'
  - '[!myth-buster] Розвінчання міфу про «відсталу селянську культуру». Висока грамотність серед козаків, розвинена система
    гільдій (цехів), унікальна таємна мова кобзарів («лебійська мова») — докази існування складної соціальної та професійної
    структури.'
  - 'Оцінки істориків: Порівняння поглядів Сергія Плохія та Ореста Субтельного на феномен козацького бароко — чи було воно
    піком української самобутності, чи початком її асиміляції в загальноімперському просторі?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Мазепа — зрадник чи державотворець? Студент має сформулювати відповідь, спираючись на докази
    з модуля (меценатство, мета пропаганди, культурний вплив).'
  - 'Зв''язок із сьогоденням: Чому сучасна Росія продовжує нищити українські культурні пам''ятки? Як руйнування церков, театрів
    та музеїв є продовженням імперської політики, що почалася 300 років тому?'
  - 'Ширше питання: Яку роль відіграє культура (архітектура, література, освіта) у виживанні нації під час екзистенційної
    загрози?'
  - '[!anti-hagiography] «Золота доба» Гетьманщини не була ідилією. Вона фінансувалася за рахунок визиску селянства та супроводжувалася
    кривавими війнами. Важливо бачити не лише культурний злет, а й соціальну ціну, яку за нього було сплачено.'
  section: Дискусія та підсумок
  words: 700
focus: Синтез європейських впливів та української традиції в архітектурі козацького бароко, роль кобзарства та дум у формуванні
  національного етосу, значення Києво-Могилянської академії та меценатства Мазепи як інструменту державотворення.
level: HIST
module: hist-047
objectives:
- Пояснювати роль кобзарства у збереженні національної пам'яті та історичної свідомості.
- Аналізувати думи як унікальний жанр українського епосу, відрізняючи їх від пісень та інших фольклорних форм.
- Характеризувати козацьке бароко як мистецький напрям та як інструмент державної легітимації Гетьманщини.
- Критично оцінювати імперські та радянські наративи про українську культуру XVII-XVIII ст., спираючись на першоджерела.
