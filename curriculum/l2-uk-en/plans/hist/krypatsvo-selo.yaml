content_outline:
- points:
  - 'Провокація: Як країна вільних козаків за життя одного покоління перетворилася на край рабів? Що б ви відчули, дізнавшись,
    що указ, написаний за тисячі кілометрів, назавжди прикріпив вас до землі?'
  - 'Фрагмент народної пісні: «Ой, горе нам на Гетьманщині, ой, горе нам, панове...» — як ви гадаєте, про яке горе йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Цивілізаційна місія» vs «Економічна експлуатація». Імперський наратив стверджував, що Росія принесла «порядок»
    і «закон» на «дикі» землі. Деколоніальна оптика показує, що це було створення ресурсної колонії для викачування зерна.'
  - 'Дебат 2: Українське кріпацтво — унікальний феномен чи варіація російського? Обговорення відмінностей: раптовість та жорсткість
    запровадження в Україні порівняно з довгою еволюцією в Росії.'
  - '[!epistemic-humility] Ми знаємо про повсякденне життя кріпаків переважно з документів поміщиків, звітів чиновників та
    фольклору. Кожен із цих типів джерел має свої упередження. Як почути справжній голос кріпака?'
  - 'Глобальна синхронність: У той час, як Катерина II запроваджує кріпацтво (1783), у США проголошують, що «всі люди створені
    рівними» (1776), а у Франції назріває революція під гаслами «Свобода, рівність, братерство» (1789).'
  section: 'Конфліктна карта: Імперський «порядок» чи колоніальне рабство?'
  words: 900
- points:
  - 'Аналіз тексту указу 1783 року: «...каждому из поселян остаться в своем месте и звании...». Розбір сухої бюрократичної
    мови, що приховує насильство та знищення доль мільйонів.'
  - 'Свідчення мандрівників: контраст між описами неймовірної родючості українського чорнозему та жахливої бідності людей,
    що на ньому працюють.'
  - 'Народна пам''ять: аналіз фольклору як джерела. Пісні про панщину, про втечу «у Таврію за волею», про свавілля панів.
    Що ці пісні говорять про цінності та світогляд людей?'
  - '[!decolonization] Указ 1783 року був не просто соціальним, а й глибоко колоніальним актом, який юридично знищував залишки
    автономії Гетьманщини та перетворював її населення на безправний ресурс імперії.'
  section: 'Джерела: Папір та реальність'
  words: 1600
- points:
  - 'Економіка рабства: формування плантаційних латифундій, орієнтованих на експорт зерна. Південь України як ресурсна база,
    що годує імперію, але не себе.'
  - 'Соціальна катастрофа: руйнування традиційної громади, втручання поміщиків у приватне життя (дозволи на шлюб, продаж людей
    окремо від сімей), «подвійний тягар» жінки-кріпачки.'
  - 'Знищення ідентичності: перетворення вільних нащадків козаків на «малоросів», позбавлених власності, прав і пам''яті про
    своє минуле. Кріпацтво як інструмент упокорення та асиміляції.'
  - '[!myth-buster] Міф про «доброго пана» та «пасивних рабів». Опір кріпаків не припинявся ніколи: від щоденного саботажу
    до втеч, локальних бунтів та «походів за волею».'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож як вільні люди стали рабами? Сформулюйте відповідь, спираючись на аналіз джерел та історичного
    контексту.'
  - 'Спадщина кріпацтва: як інституціоналізоване рабство вплинуло на українську ментальність, стосунки власності, ставлення
    до держави та приватної ініціативи? Чи відчутні ці наслідки сьогодні?'
  - '[!anti-hagiography] Уникаючи романтизації, слід визнати, що козацька старшина кінця XVIII ст. часто сама прагнула отримати
    дворянські права та володіти кріпаками, ставши частиною імперської системи.'
  - 'Зв''язок із сьогоденням: чи можна провести паралелі між кріпацтвом і методами, які Росія використовує на окупованих територіях
    України у XXI столітті (примусова паспортизація, обмеження пересування, експлуатація ресурсів)?'
  section: Дискусія та підсумок
  words: 700
focus: The 1783 decree on serfdom, economic exploitation of Southern Ukraine, destruction of Cossack liberties, daily life
  of serfs, and the long-term consequences of institutionalized slavery.
level: HIST
module: hist-079
objectives:
- Описувати процес запровадження та юридичного оформлення кріпацтва на українських землях
- Аналізувати указ 1783 року як ключовий документ епохи, читаючи його "між рядків"
- Порівнювати імперський наратив про "цивілізування" з деколоніальною перспективою економічної експлуатації
- Оцінювати довгострокові соціальні, економічні та ментальні наслідки кріпацтва для українського суспільства
