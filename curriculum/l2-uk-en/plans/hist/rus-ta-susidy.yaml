objectives:
- Аналізувати зовнішню політику Київської Русі як складну систему відносин з різними цивілізаційними центрами
- Розрізняти імперські та деколоніальні інтерпретації історії Київської Русі
- Критично читати уривки з першоджерел (літописи, договори), визначаючи упередження автора
- Формулювати аргументовану позицію щодо місця Русі в середньовічному світі та її зв'язку з сучасною Україною
