content_outline:
- points:
  - 'Провокація: Чи була Київська Русь європейською державою? Розгляньте дві карти: одна показує династичні зв''язки Ярослава
    Мудрого, інша — карту нападів кочовиків. Яка з них краще визначає долю Русі?'
  - 'Фрагмент договору 944 року з Візантією: «А посли і гості, що ходять в Греки до Русі, нехай не чинять беззаконня». Про
    що свідчить ця фраза?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Чия спадщина? Російська імперська концепція «спільної колиски» vs українська історіографія
    про Русь як вихідну державу саме українського народу. Деконструкція міфу про «братні народи».'
  - 'Дебат 2: Норманісти vs антинорманісти. Варяги — запрошені менеджери, завойовники чи лише одна з елітних груп? Роль скандинавського
    фактору у формуванні державності.'
  - '[!epistemic-humility] Більшість джерел про ранню Русь написані пізніше і з політичною метою (Повість минулих літ) або
    іноземцями (візантійцями, арабами). Наскільки ми можемо їм довіряти?'
  - 'Глобальна синхронність: У той час, як Русь торгує і воює з Візантією, на заході формується Священна Римська імперія,
    в Англії точаться війни з вікінгами, а арабський світ переживає розквіт Аббасидського халіфату.'
  section: 'Конфліктна карта: Ідентичність Русі — походження та впливи'
  words: 900
- points:
  - '[!decolonization] Аналіз русько-візантійських договорів (911, 944, 971): Русь як рівноправний суб''єкт, що диктує умови,
    а не як варварська периферія. Як змінюється статус руських купців та воїнів?'
  - 'Первинне джерело: «Повість минулих літ» про посольства Ольги в Константинополь. Читання між рядками: що літописець хотів
    підкреслити, а про що, ймовірно, змовчав?'
  - 'Кейс-стаді: Династичні шлюби як інструмент. Анна Ярославна — королева Франції, Єлисавета — королева Норвегії, Анастасія
    — королева Угорщини. Це експорт «м''якої сили» чи продаж доньок задля вигоди?'
  - 'Погляд з іншого боку: Записки арабського мандрівника Ібн Фадлана про русів. Якими їх бачили чужинці? (Жорстокі, неохайні,
    але вправні торговці).'
  section: 'Джерела: Договори та династії'
  words: 1600
- points:
  - 'Візантійський вектор: Християнство, право, мистецтво. Як прийняття православ''я визначило культурну дистанцію від католицької
    Європи і чому це важливо досі?'
  - 'Західний вектор: Боротьба з Польщею за Червенські гради, династичні союзи з Угорщиною. Русь як частина східноєвропейської
    політичної системи, а не ізольована територія.'
  - '[!myth-buster] Міф про «слов''янську єдність». Відносини з Польщею — це історія не «братерства», а жорсткого суперництва
    двох держав, що формуються.'
  - 'Південний вектор (Степ): Печеніги, половці. Степовий кордон — це не просто загроза, а постійний фактор, що формував військову
    організацію, політичну систему («полюддя») та ментальність Русі. Ефект «перманентної мобілізації».'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Тож, Русь — це Європа, Візантія чи щось третє? Студент формулює відповідь, використовуючи поняття
    «фронтир», «цивілізаційний вибір», «багаторівнева ідентичність».'
  - '[!anti-hagiography] Русь — не монолітна імперія, а складна мережа інтересів князів, купців, воїнів та іноземних гравців.
    Зовнішня політика часто була продовженням внутрішньої боротьби за владу.'
  - 'Зв''язок із сьогоденням: Як тисячолітня історія відносин із сусідами (Польщею, Угорщиною, Росією як спадкоємицею Золотої
    Орди) впливає на сучасну зовнішню політику України?'
  section: Дискусія та підсумок
  words: 700
focus: 'Foreign policy of Kyivan Rus: relations with Byzantium, Poland, Hungary, Scandinavia, and the Steppe nomads. Dynastic
  marriages, treaties, and conflicts as tools of statecraft.'
