objectives:
- Описувати передумови виникнення, створення та діяльність Народного руху України
- Пояснювати еволюцію ідеології Руху від федералізму до повної незалежності
- Аналізувати роль Руху та його лідерів (Чорновола, Драча, Гориня) у здобутті Україною незалежності
- Критично оцінювати радянські міфи про Рух та його місце в історії як антиколоніальної сили
