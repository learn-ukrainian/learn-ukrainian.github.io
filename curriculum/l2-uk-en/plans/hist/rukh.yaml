content_outline:
- points:
  - 'Провокація: Як рух, що починався з екології та захисту мови, за два роки привів до розвалу імперії? Це був заздалегідь
    продуманий план чи історична неминучість, що вийшла з-під контролю?'
  - 'Фрагмент без контексту: «Допустити дві державні мови... значить, зруйнувати державу». Хто, коли і за яких обставин міг
    сказати ці слова наприкінці 1980-х?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська пропаганда vs. реальність. КДБ таврував рухівців як «екстремістів» та «бандерівців». Чи був Рух радикально-націоналістичною
    силою, чи широким демократичним антиколоніальним фронтом, що об''єднав різні етноси?'
  - 'Дебат 2: Федералізм vs. незалежність. Перша програма Руху (1989) вимагала лише «перебудови» та нового союзного договору.
    Як і чому за один рік вимога повної незалежності стала консенсусною?'
  - '[!epistemic-humility] Важко точно оцінити, наскільки ідея повної незалежності була популярною серед населення у 1989-1990
    рр. Чи віддзеркалювали лідери Руху думку більшості, чи формували її?'
  - 'Глобальна синхронність: Рух був частиною «Осені народів» 1989 року. Порівняння з литовським «Саюдісом», польською «Солідарністю»
    та оксамитовою революцією в Чехословаччині — спільне та відмінне.'
  section: 'Конфліктна карта: Націоналісти чи демократи?'
  words: 900
- points:
  - 'Тексти: Аналіз еволюції програмних документів Руху (1989 vs 1990). Як змінилася риторика від «підтримки перебудови» до
    вимоги державного суверенітету?'
  - 'Промови лідерів: Лінгвістичний аналіз виступів В''ячеслава Чорновола, Івана Драча, Дмитра Павличка. Які метафори та аргументи
    вони використовували для мобілізації мас?'
  - 'Візуальні джерела: Фотографії та відеохроніка з Установчого з''їзду та «Живого ланцюга». Як синьо-жовтий прапор став
    символом опору? Що розповідають обличчя людей?'
  - '[!decolonization] Програмні документи Руху та публічні акції — це не просто політична діяльність, а акти повернення суб''єктності
    та деконструкція образу «радянського українця».'
  section: 'Джерела: Програми, промови, живий ланцюг'
  words: 1600
- points:
  - 'Ланцюг причинно-наслідкових зв''язків: Як екологічні протести («Зелений світ») переросли в політичні, як вибори 1990
    року дали Руху парламентську трибуну («Народна Рада»), і як це призвело до ухвалення Декларації про суверенітет.'
  - 'Організаційний тріумф: «Живий ланцюг» (21.01.1990) як демонстрація здатності мобілізувати мільйони без інтернету та мобільного
    зв''язку. Символічне значення акції (Акт Злуки УНР і ЗУНР).'
  - 'Роль особистостей: Внесок радикального Чорновола, поміркованого Драча та організатора Гориня. Чи був цей баланс запорукою
    успіху?'
  - '[!myth-buster] Міф про «галицьких націоналістів». Рух мав потужну підтримку в Києві та центральній Україні, а його першим
    головою був поет з Київщини Іван Драч, що розбиває стереотип про суто регіональне явище.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Тож, незалежність — це результат спланованої стратегії Руху чи стихійний процес, який він лише
    очолив? Студент формулює аргументовану відповідь.'
  - 'Внесок у незалежність: Чи переміг би референдум 1 грудня 1991 року без дворічної агітаційної та організаційної роботи
    Руху? Оцінка ролі руху у підготовці суспільної думки.'
  - '[!anti-hagiography] «Де два українці, там три гетьмани». Розколи в Русі після 1991 року через особисті амбіції лідерів.
    Чи була ця фрагментація неминучою? Які уроки можна винести для сучасної політики?'
  - 'Зв''язок із сьогоденням: Загадкова загибель В''ячеслава Чорновола (1999) досі є предметом дискусій. Його вислів «Україна
    починається з тебе» залишається актуальним гаслом громадянського суспільства.'
  section: Дискусія та підсумок
  words: 700
focus: 'Народний рух України: від екологічних протестів до здобуття незалежності, роль лідерів (Чорновіл, Драч), Живий ланцюг,
  та ідеологічна боротьба з радянською системою.'
