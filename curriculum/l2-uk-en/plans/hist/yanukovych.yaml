content_outline:
- points:
  - 'Провокація: Як лідер, усунутий від влади народною революцією, зміг повернутися на найвищу посаду лише за 5 років? Чи
    була Помаранчева революція насправді поразкою для його системи?'
  - 'Цитата без контексту: «Проффесор», «Йолка», «Астановітєсь!» — що ці меми говорять про епоху та її лідера?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Янукович — маріонетка Путіна чи прагматичний автократ, що використовував Росію у власних інтересах? Аналіз Харківських
    угод та відмови від Асоціації з ЄС.'
  - 'Дебат 2: Внутрішня політика — це була спроба збудувати стабільну «керовану демократію» за російським зразком чи просто
    механізм для масштабного особистого збагачення («Сім''я»)?'
  - '[!epistemic-humility] Точний ступінь прямого управління з Москви залишається предметом дискусій. Ми аналізуємо дії та
    їх наслідки, а не читаємо думки в Кремлі.'
  - 'Глобальна синхронність: Початок 2010-х — це «Арабська весна». Порівняння режиму Януковича з режимами Мубарака (Єгипет)
    та Бен Алі (Туніс) за рівнем корупції та авторитаризму.'
  section: 'Конфліктна карта: Агент Кремля чи "завгосп" країни?'
  words: 900
- points:
  - 'Текст Харківських угод (2010): аналіз формулювань. Що Україна отримала (знижка на газ) і що віддала (перебування ЧФ РФ).
    Хто виграв стратегічно?'
  - 'Закон «Про засади державної мовної політики» Ківалова-Колесніченка (2012): читання ключових статей. Як він де-факто послаблював
    статус української мови?'
  - '[!decolonization] Обидва документи розглядаються як інструменти російського неоімперіалізму, що просувалися через українських
    політиків. Аналіз, як працювала «м''яка сила» Кремля до 2014 року.'
  - '«Чорна бухгалтерія» з Межигір''я: аналіз реальних документів, що показують масштаби корупції, від розкоші до підкупу
    посадовців. Розгляд журналістських розслідувань як первинних джерел.'
  section: 'Джерела: Харківські угоди, мовний закон та документи з Межигір''я'
  words: 1600
- points:
  - 'Короткострокові наслідки: консолідація авторитарної влади, ув''язнення Юлії Тимошенко, тиск на бізнес та медіа, створення
    корупційної вертикалі «Сім''ї».'
  - 'Довгострокові наслідки: підрив основ державності, створення передумов для російської агресії, формування потужного громадянського
    суспільства в опозиції до режиму.'
  - '[!myth-buster] Руйнування міфу про «стабільність» та «міцного господарника». Аналіз економічних показників, які свідчать
    про стагнацію та виведення капіталу з країни, а не про розвиток.'
  - 'Оцінки істориків: як українські (Плохій, Грицак) та західні (Снайдер, Епплбом) історики оцінюють роль Януковича в новітній
    історії України. Він — причина чи наслідок системних проблем?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: студент формулює відповідь, чому реванш став можливим, спираючись на аналіз розчарування в «помаранчевих»
    лідерах та ефективність політтехнологій Партії регіонів.'
  - 'Ширше питання: чи була Революція Гідності неминучим результатом правління Януковича? Яка подія стала останньою краплею
    і чому?'
  - '[!anti-hagiography] Режим Януковича — не аномалія, а потворне втілення олігархічної системи, що склалася в 1990-х. Його
    усунення не означало автоматичного знищення самої системи.'
  - 'Зв''язок із сьогоденням: справа про державну зраду Януковича. Як сучасна українська держава юридично оцінює діяльність
    свого четвертого президента?'
  section: Дискусія та підсумок
  words: 700
focus: 'Політика реваншу Віктора Януковича: авторитаризм, системна корупція («Сім''я», Межигір''я), проросійський курс та
  суспільний опір, що призвів до Євромайдану.'
