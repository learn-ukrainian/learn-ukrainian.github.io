objectives:
- Аналізувати причини та наслідки реваншу проросійських сил після Помаранчевої революції
- Критично оцінювати ключові документи епохи (Харківські угоди, мовний закон) як інструменти зовнішнього впливу
- Пояснювати механізми системної корупції на прикладі «Сім''ї» та Межигір''я
- Аргументувати зв'язок між внутрішньою політикою режиму Януковича та початком Революції Гідності
