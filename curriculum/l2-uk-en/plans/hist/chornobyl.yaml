content_outline:
- points:
  - 'Провокація: Чому П''янка, зразкове радянське «місто майбутнього» з населенням 26 років, стала епіцентром найбільшої техногенної
    катастрофи XX століття? Чи був «мирний атом» справді мирним?'
  - 'Фрагмент без контексту: «— Алло! Це ВПЧ-2? ... 3-й, 4-й блок, горить дах!» — Хто говорить? Про що вони ще не знають?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Офіційна радянська версія (порушення інструкцій персоналом) vs реальність (конструктивні недоліки реактора РБМК,
    про які персонал не знав). Фатальна кнопка АЗ-5.'
  - 'Дебат 2: Чи була катастрофа неминучою? Дискусія про колоніальний підхід Москви до розміщення небезпечних виробництв в
    Україні та системну брехню про безпеку атомної енергетики.'
  - '[!epistemic-humility] Визнання, що повна картина подій приховувалася роками. Багато документів досі засекречені, а свідчення
    суперечливі через травму та офіційний тиск.'
  - 'Глобальна синхронність: Поки СРСР мовчав, 28 квітня на АЕС Форсмарк у Швеції фіксують радіоактивні частинки. Скандинавські
    країни першими змусили Москву визнати факт аварії.'
  section: 'Конфліктна карта: Помилка персоналу чи злочин системи?'
  words: 900
- points:
  - 'Транскрипти дзвінків до пожежної частини: хаос, нерозуміння масштабів. Аналіз лексики: «дах», «машинний зал» — повсякденні
    слова для апокаліптичної події.'
  - 'Офіційне оголошення про «тимчасову евакуацію»: порівняння сухої бюрократичної мови («неблагоприятная радиационная обстановка»)
    з реальним смертельним ризиком. Наказ брати документи і їжу на 3 дні.'
  - 'Спогади мешканців Прип''яті: металевий присмак у роті, дивне сяйво над станцією, діти, що граються на вулиці, весілля.
    Відчуття сюрреалізму та тотальної дезінформації.'
  - '[!decolonization] Розбір мови радянських повідомлень як інструменту приховування та применшення. «Аварія», а не «катастрофа».
    «Заходи», а не «ліквідація».'
  section: 'Джерела: Перші 36 годин'
  words: 1600
- points:
  - '[!myth-buster] Деконструкція міфу про «безпечний радянський атом». Таємні військові витоки реакторів РБМК (виробництво
    плутонію) та свідоме ігнорування попереджень науковців.'
  - '«Ліквідатори»: аналіз поняття. 600,000 людей — солдати, пожежники, шахтарі, лікарі. Героїзм як наслідок злочинної недбалості
    держави. «Біороботи», що чистили дах реактора.'
  - 'Київський першотравневий парад: розгляд як свідомого злочину режиму проти українського народу. Загроза Горбачова Щербицькому
    («покладеш партквиток»).'
  - 'Еко-націоналізм: Чорнобиль як каталізатор руху за незалежність. Рух «Зелений Світ» стає першою легальною формою антирадянського
    протесту в Україні.'
  - 'Зона відчуження сьогодні: унікальний заповідник, об''єкт темного туризму, місце пам''яті. Як культура (гра STALKER, серіал
    HBO) формує глобальне уявлення про трагедію.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чи був «мирний атом» в СРСР мирним? Сформулюйте відповідь, використовуючи докази з модуля.'
  - 'Чорнобиль як духовна травма: втрата довіри до держави, до науки, до самого «прогресу». Як ця тотальна недовіра вплинула
    на формування української ідентичності 1990-х?'
  - '[!anti-hagiography] Уникаючи простого осуду чи героїзації: як система, побудована на брехні, робить і героїв, і злочинців
    зі звичайних людей?'
  - 'Зв''язок із сьогоденням: Захоплення ЧАЕС російськими військами у 2022 році. Чорнобиль як інструмент ядерного шантажу
    в руках імперії — історична спадкоємність загроз.'
  section: Дискусія та підсумок
  words: 700
focus: The Chornobyl disaster as a point of rupture for the Soviet system, analyzing its causes within the context of imperial
  hubris and colonial exploitation, the delayed and deceptive response, the human cost of liquidation, and its role as a catalyst
  for Ukrainian eco-nationalism and independence.
level: HIST
module: hist-117
objectives:
- Аналізувати причини Чорнобильської катастрофи в контексті системних недоліків радянського режиму та колоніальної політики
- Критично оцінювати радянські та пострадянські наративи про аварію, відрізняючи факти від пропаганди
- Пояснювати роль Чорнобиля як каталізатора екологічного руху та боротьби за незалежність України
- Інтерпретувати первинні джерела (спогади, офіційні документи) для розуміння людського виміру трагедії
pedagogy: CBI
