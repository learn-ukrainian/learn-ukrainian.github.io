content_outline:
- points:
  - 'Провокативне питання: Українська Руїна XVII століття — це громадянська війна, породжена амбіціями козацької старшини,
    чи перша гібридна війна, розв''язана Москвою проти української державності? Де проходить межа між внутрішнім конфліктом
    і зовнішньою агресією?'
  - 'Цитата для роздумів (Самійло Величко): "Відтоді, за незгодою старшини, Україна розділилася надвоє... і обидві сторони,
    порізнившись, почали винищувати одна одну..."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Іван Виговський — зрадник і «пропольський» олігарх чи державник, що намагався врятувати суверенітет через союз
    із європейськими монархіями? Погляд московської пропаганди vs оцінка сучасної історіографії.'
  - 'Дебат 2: Причини Руїни — фатальна помилка еліт, нездатних домовитися (внутрішній фактор), чи цілеспрямована політика
    Москви з дестабілізації, фінансування опозиції та розколу козацтва (зовнішній фактор)? [!epistemic-humility] Історики
    сперечаються про первинність цих чинників.'
  - 'Глобальна синхронність: Поки Гетьманщина шукала місце на карті, Англія переживала Реставрацію Стюартів (1660), Франція
    Людовіка XIV будувала абсолютизм, а Османська імперія готувалася до нової експансії в Європу. Українська криза була частиною
    великої геополітичної гри.'
  section: 'Конфліктна карта: Вибір шляху для Гетьманщини'
  words: 900
- points:
  - 'Аналіз тексту Гадяцького договору (1658): що саме пропонував Виговський? Створення Великого Князівства Руського як третього
    рівноправного члена Речі Посполитої. Чому цей проєкт провалився?'
  - 'Читання фрагментів з Літопису Самовидця: опис Чорної ради 1663 року в Ніжині. Хто такий «Самовидець» (ймовірно, Роман
    Ракушка-Романовський)? Які його симпатії та антипатії? [!decolonization] Це погляд зсередини, який показує, як українці
    бачили власний хаос, на відміну від московських донесень.'
  - 'Критика джерел: порівняння опису битви під Конотопом у козацьких літописах та у звітах московського воєводи Трубецького.
    Де факти, а де пропаганда?'
  - 'Персоналії: Юрій Немирич — «архітектор» Гадяцької унії, український аристократ європейської освіти. Його трагічна доля
    як символ нереалізованого потенціалу.'
  section: 'Джерела: Літопис Самовидця та Гадяцька унія'
  words: 1600
- points:
  - 'Конотопська битва (1659): блискуча тактична перемога (розгром «цвіту московської кінноти»), яка перетворилася на стратегічну
    поразку. Чому Виговський не зміг скористатися її плодами?'
  - 'Феномен охлократії: тріумф демагога Івана Брюховецького на Чорній раді. Як обіцянки «знизити податки» та «покарати панів»
    призвели до страти еліти (Сомко, Золотаренко) і приходу московських воєвод. [!myth-buster] Це не була «народна демократія»,
    а маніпульований натовп.'
  - 'Розкол Гетьманщини: остаточне закріплення поділу на Лівобережжя (під московським впливом) та Правобережжя (під польським).
    Цей поділ визначив українську політику на століття вперед.'
  - 'Оцінки істориків: Сергій Плохій називає Руїну «колапсом ранньомодерної нації». Орест Субтельний акцентує на соціальному
    конфлікті між старшиною та «черню». Яка оцінка більш переконлива?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Руїна — це «громадянська війна» чи «гібридна агресія»? Сформулюйте власну аргументовану
    відповідь, спираючись на матеріал модуля.'
  - 'Зв''язок із сьогоденням: Які тактики, застосовані Москвою в XVII столітті (підтримка опозиції, інформаційна війна, звинувачення
    легітимної влади у «зраді», використання «народного гніву»), можна побачити в сучасних гібридних війнах Росії проти України
    та інших держав?'
  - '[!anti-hagiography] Руїна — це не лише історія про зовнішню агресію, але й трагічний урок про наслідки внутрішньої незгоди,
    корупції та нездатності еліт поставити державні інтереси вище за особисті. Які висновки з цього може зробити сучасна Україна?'
  section: Дискусія та підсумок
  words: 700
focus: The first phase of The Ruin (1657-1663), analyzing Ivan Vyhovsky's pro-European course, the lost victory of Konotop,
  the rise of populism, and the catastrophic Black Council of 1663 as a result of internal strife and Muscovite hybrid warfare.
