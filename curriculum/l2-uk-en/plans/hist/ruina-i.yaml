objectives:
- Пояснювати ключові причини Руїни, розрізняючи внутрішні конфлікти та зовнішню агресію
- Аналізувати Гадяцьку унію як спробу європейської інтеграції та причини її провалу
- Оцінювати Конотопську битву як приклад військового успіху, що не призвів до політичної перемоги
- Характеризувати Чорну раду 1663 року як прояв охлократії та інструмент розколу української держави
