content_outline:
- points:
  - 'Провокаційне питання: Чому король Речі Посполитої Зигмунт III був готовий тікати зі столиці ще до початку битви? Що він
    знав про османську армію та власні сили?'
  - 'Фрагмент без контексту: «...справжніми переможцями та нашою обороною були козаки, про що я незабаром розповім, аби не
    применшити їхньої слави...». Хто і з яким почуттям міг написати ці слова у 1621 році?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чия це перемога? [!decolonization] Польська історіографія традиційно приписує перемогу коронному війську та
    гусарії. Українська — наголошує на вирішальній ролі козацької піхоти, яка витримала основний удар.'
  - 'Дебат 2: За що воювали козаки? За гроші та привілеї як найманці, чи за віру та права українського народу як свідомі політичні
    актори? Аналіз вимог, висунутих Сагайдачним у Сухій Діброві.'
  - '[!epistemic-humility] Точна кількість військ з обох боків є предметом дискусій. Цифри коливаються від 150 до 200 тисяч
    для османів та від 70 до 80 тисяч для союзників. Оцінки втрат також значно різняться у джерелах.'
  - 'Глобальна синхронність: поки під Хотином тримали оборону проти Османів, у Центральній Європі палала Тридцятирічна війна
    (1618–1648). Битва під Хотином фактично убезпечила східний фланг Європи.'
  section: 'Конфліктна карта: Рятівники чи найманці?'
  words: 900
- points:
  - 'Погляд союзника: Щоденник Якуба Собеського. Аналіз описів «дощу зі свинцю» та неприступного козацького табору. Чому польський
    шляхтич визнав, що «справжніми переможцями були козаки»?'
  - 'Погляд переможених: Османські хроніки (Наїма). Як описували козаків вороги? «Принесені шайтаном невірні», що сіяли паніку
    нічними вилазками.'
  - 'Погляд козацький: Літопис Григорія Граб''янки та «Вірші на жалісний погреб...» Касіяна Саковича. Героїзація Сагайдачного
    та козацтва. Створення національного міфу.'
  - '[!decolonization] Політичний документ: Лист Сагайдачного до короля. Вимога легітимізації православної ієрархії та розширення
    козацьких прав. Це не прохання, а ультиматум рівного партнера.'
  section: 'Джерела: Щоденники, листи, літописи'
  words: 1600
- points:
  - 'Військова тактика: Чому козацький табір виявився неприступним для яничар? Аналіз тактики «шеренг», нічних «вилазок» та
    ефективності козацької артилерії.'
  - 'Лідерство та жертва: Роль Петра Сагайдачного, який командував військом, будучи смертельно пораненим. Його смерть після
    битви як символ ціни перемоги.'
  - '[!myth-buster] Парадокс перемоги: Хотинська битва не зміцнила, а прискорила розпад Речі Посполитої. Невиконання обіцянок,
    даних козакам, призвело до серії повстань, що завершились Хмельниччиною.'
  - 'Геополітичний зсув: Поразка під Хотином стала початком кінця для Османської імперії, спричинивши бунт яничар та вбивство
    султана Османа II. Україна вперше заявила про себе як про суб''єкт, здатний впливати на долю Європи.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чому перемога під Хотином стала «початком кінця» для Речі Посполитої, а не початком «золотого
    віку»?'
  - 'Спадщина: Концепція «Україна — щит Європи». Наскільки це уявлення, що народилося під Хотином, актуальне сьогодні? Провести
    паралелі з сучасною російсько-українською війною.'
  - '[!anti-hagiography] "Зрада" після перемоги. Аналіз причин, чому польська шляхта відмовилася виконувати обіцянки, дані
    козакам, і до яких трагічних наслідків це призвело для обох народів.'
  section: Дискусія та підсумок
  words: 700
focus: The Battle of Khotyn (1621), the decisive role of Cossack infantry under Petro Sahaidachnyi, and the decolonization
  of the "Polish victory" myth.
level: HIST
module: hist-046
objectives:
- Описувати причини, масштаби та ключові етапи Хотинської війни 1621 року
- Аналізувати тактичну роль козацької піхоти та її вирішальне значення у перемозі
- Оцінювати геополітичні наслідки битви для Османської імперії, Речі Посполитої та майбутнього України
- Критично аналізувати першоджерела (хроніки, щоденники, листи) для деколонізації міфу про «польську перемогу»
