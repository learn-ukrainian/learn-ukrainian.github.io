content_outline:
- points:
  - 'Провокативне питання: Указ 1954 року — це щедрий «подарунок» від «братнього народу» чи вимушене рішення, яке врятувало
    півострів від економічної катастрофи, але проігнорувало долю корінного народу?'
  - 'Фрагмент документу без контексту: «Враховуючи спільність економіки, територіальну близькість і тісні господарські й культурні
    зв''язки...». Що це за документ і яке доленосне рішення він обґрунтовує?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський/російський наратив про «подарунок Хрущова» vs український погляд на передачу як на економічно вимушений
    акт, що переклав тягар відбудови на УРСР.'
  - 'Дебат 2: Була передача лише економічною чи також політичною? Дискусія про мотиви Хрущова: спроба заручитися підтримкою
    української номенклатури у боротьбі за владу після смерті Сталіна.'
  - '[!epistemic-humility] Справжні мотиви вищого радянського керівництва (Маленков, Ворошилов, Хрущов) залишаються предметом
    дискусій, оскільки офіційні документи відображають лише фасадну частину рішення.'
  - 'Глобальна синхронність: 1954 рік — це розпал Холодної війни, Женевська конференція щодо Індокитаю, початок війни за незалежність
    Алжиру. Світ перебудовується, а СРСР вирішує внутрішні проблеми після смерті диктатора.'
  section: 'Конфліктна карта: Подарунок чи прагматизм?'
  words: 900
- points:
  - 'Текст Указу Президії Верховної Ради СРСР від 19.02.1954: аналіз юридичного формулювання. Чому в ньому немає жодного слова
    про «подарунок» чи «дружбу народів», а лише про «спільність економіки»?'
  - 'Протоколи засідань Президій РРФСР (5 лютого) та УРСР (13 лютого): як відбувалася формальна процедура? Чи були дебати?
    Аналіз показує повну відповідність радянському законодавству (Конституції 1936 р.).'
  - 'Радянська преса («Кримська правда», «Правда»): як висвітлювали подію для народу? Аналіз пропагандистських кліше про «радість
    возз''єднання» та плани на «води Дніпра» з Північно-Кримського каналу.'
  - '[!decolonization] Читаємо між рядків: передача відбулася через 10 років після геноциду кримських татар. В жодному документі
    про їхню долю не згадується. Корінний народ повністю викреслений з процесу, що є ознакою колоніального мислення.'
  section: 'Джерела: Укази, протоколи та преса'
  words: 1600
- points:
  - 'Короткострокові наслідки: для УРСР це був «хомут на шию» — величезні інвестиції в зруйновану інфраструктуру, сільське
    господарство та будівництво Північно-Кримського каналу, куди переселяли фахівців з усієї України.'
  - 'Довгострокові наслідки: Крим інтегрувався в економіку УРСР, ставши всесоюзною здравницею. Референдум 1991 року, де 54%
    кримчан проголосували за незалежність України.'
  - '[!myth-buster] Спростування ключових міфів російської пропаганди: 1) «подарунок» (це був вимушений акт), 2) «Хрущов-волюнтарист»
    (рішення було колегіальним), 3) «незаконність» (процедура відповідала законам СРСР), 4) «Крим — ісконно русская зємля»
    (деконструкція імперського наративу).'
  - 'Порівняння оцінок: радянська історіографія подавала це як акт «братської дружби», сучасна російська — як «незаконний
    волюнтаризм», сучасна українська — як прагматичне, хоч і колоніальне за суттю, адміністративне рішення.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: студент формулює відповідь, чому передача Криму не була «подарунком», спираючись на аналіз джерел
    та економічного контексту.'
  - 'Зв''язок із сьогоденням: як міф про «подарунок» та «незаконну передачу» став ідеологічним обґрунтуванням для анексії
    Криму Росією у 2014 році? Чому знання історії 1954 року є зброєю проти сучасної дезінформації?'
  - '[!anti-hagiography] Подія не була актом добра. Це було раціональне рішення в рамках тоталітарної системи, яка щойно вчинила
    геноцид. Передача вирішила економічні проблеми імперії, але проігнорувала права та історичну пам''ять кримських татар.'
  section: Дискусія та підсумок
  words: 700
focus: 'Передача Криму 1954 року: спростування міфу про «подарунок», аналіз економічних причин, юридичної процедури та наслідків
  аж до анексії 2014 року.'
