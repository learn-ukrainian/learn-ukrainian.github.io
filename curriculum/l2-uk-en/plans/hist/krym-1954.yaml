objectives:
- Описувати історичні обставини та економічні передумови передачі Криму до складу УРСР у 1954 році
- Аналізувати юридичну процедуру передачі та її відповідність радянському законодавству
- Спростовувати ключові міфи російської пропаганди щодо цієї події, спираючись на факти
- Пояснювати, як міфологізація історії 1954 року використовується для виправдання анексії 2014 року
