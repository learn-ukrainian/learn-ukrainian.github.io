content_outline:
- points:
  - 'Провокативне питання: чому мова в Україні — це не просто засіб спілкування, а поле битви, маркер ідентичності та інструмент
    національної безпеки?'
  - 'Історичний контекст: політика лінгвоциду (Валуєвський циркуляр, Емський указ) як відправна точка для розуміння сучасної
    ситуації.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Україна vs Імперія): Чи є захист української мови «дискримінацією російськомовних» (теза російської пропаганди),
    чи це акт деколонізації та відновлення історичної справедливості?'
  - 'Дебат 2 (Внутрішньоукраїнський): «Активна двомовність» (прагматичний підхід) vs «мовна шизофренія» (концепція Ю. Шевельова).
    Яка стратегія була доцільнішою для України в різні періоди її незалежності?'
  - '[!epistemic-humility] Політика «багатовекторності» 1990-х розглядалася як компроміс, але також і як консервація радянської
    мовної ієрархії. Оцінки її наслідків різняться.'
  - 'Глобальна синхронність: мовні політики в постколоніальних країнах. Порівняння з Ірландією (відродження ірландської),
    країнами Балтії (дерусифікація) та Квебеком (захист французької).'
  section: 'Конфліктна карта: Захист чи дискримінація?'
  words: 900
- points:
  - 'Аналіз джерел: Стаття 10 Конституції України (1996) — текст та його «компромісна» природа.'
  - 'Закон «Колесніченка-Ківалова» (2012): як через маніпуляцію поняттям «регіональна мова» та Європейською хартією було зроблено
    спробу ре-русифікації.'
  - 'Рішення Конституційного Суду України (2018): юридичний аналіз тексту, який визнав закон 2012 року неконституційним, та
    його аргументація про загрозу національній безпеці.'
  - 'Закон «Про забезпечення функціонування української мови як державної» (2019): ключові статті, сфери застосування, створення
    інституту мовного омбудсмена.'
  - '[!decolonization] Соціологічні дані (Центр Разумкова, КМІС): динаміка переходу на українську мову як відображення зміни
    національної ідентичності, особливо після 2014 та 2022 років.'
  section: 'Джерела: Закони, рішення КСУ та соціологія'
  words: 1600
- points:
  - 'Короткострокові наслідки: «Мовний Майдан» 2012 року як реакція громадянського суспільства на спробу реваншу.'
  - 'Довгострокові наслідки: інституціоналізація мовної політики (мовний омбудсмен, квоти на радіо та ТБ), що стимулювала
    розвиток українського культурного продукту.'
  - 'Вплив на ідентичність: подолання комплексу меншовартості («травмованої нації» за О. Забужко) та утвердження української
    мови як мови престижу.'
  - '[!myth-buster] Спростування міфу про «насильницьку українізацію». Аналіз реальних положень закону 2019 року, які регулюють
    публічну сферу, а не приватне спілкування.'
  - 'Зв''язок із війною: як мовна консолідація після 2022 року стала елементом національного спротиву, а російська мова —
    маркером ворога для багатьох українців.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до головного питання: студент формулює власну відповідь, чому мова є питанням національної безпеки для України,
    спираючись на проаналізовані джерела та аргументи.'
  - 'Феномен «мовної стійкості»: добровільний перехід на українську в російськомовних містах (Харків, Одеса, Дніпро) — це
    тимчасовий патріотичний порив чи незворотна зміна ідентичності?'
  - 'Зв''язок із сьогоденням: феномен українського дубляжу («Альф», «Тачки») як приклад успішної культурної стратегії, що
    випередила державну політику.'
  - '[!anti-hagiography] Чи є ризики в надмірній політизації мовного питання? Де межа між захистом ідентичності та створенням
    нових ліній розколу в суспільстві?'
  section: Дискусія та підсумок
  words: 700
focus: 'Еволюція мовної політики України: від пострадянської двомовності до закону 2019 року, роль мови в деколонізації, спростування
  пропагандистських міфів та мовна консолідація після 2022 року.'
