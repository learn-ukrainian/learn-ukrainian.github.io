objectives:
- Аналізувати еволюцію мовної політики України від 1991 року до сьогодення
- Пояснювати роль мови у формуванні національної ідентичності та як інструменту деколонізації
- Розрізняти аргументи української сторони та міфи російської пропаганди щодо мовного питання
- Критично оцінювати вплив мовних законів на суспільні процеси в Україні
