title: 'Ярослав Мудрий: Золота доба'
content_outline:
- section: Розминка
  points:
  - '[] — Фокус: Введення в епоху через поняття «Золота доба»; факт: Київ часів Ярослава
    був більшим за Лондон і Париж (у 7 разів більший за «місто Володимира»)'
  - Графіті на стінах Софії — «соціальні мережі» середньовіччя [!quote]
- section: 'Читання: Руська Правда — Перший правовий кодекс'
  points:
  - Історичне тло — «Правда Ярослава» (найдавніша частина, 18 статей); перехід від
    племінного ладу до держави [!context]
  - Основні положення — Відмова від кровної помсти (обмеження колом родичів), введення
    «віри» (штрафу князю) та «головництва» (виплати родичам)
  - 'Наслідки — Соціальна стратифікація: життя «княжого мужа» (80 гривень) цінувалося
    вдвічі дорожче за простого вільного (40 гривень)'
- section: Софія Київська — Символ могутності
  points:
  - Будівництво собору — Датування (1011/1018 vs 1037); 13 куполів як символ Христа
    і апостолів
  - Мистецька спадщина — Оранта «Нерушима стіна» (духовний оберіг), світські фрески
    з родиною Ярослава [!culture]
- section: '"Тесть Європи" — Династична дипломатія'
  points:
  - 'Стратегія шлюбів — Мета: гарантії миру та престижу, інтеграція в європейський
    простір, а не лише військові союзи'
  - Анна Ярославна — королева Франції — Єдина грамотна при дворі (підпис кирилицею
    vs хрестик короля); міф про «культуру в дику Європу» [!myth-buster]
  - Інші династичні зв'язки — Єлизавета (Норвегія), Анастасія (Угорщина), Всеволод
    (Візантія) — Київ як рівноправний гравець
- section: Культурна революція
  points:
  - Бібліотека Софійського собору — Перша державна бібліотека (950 томів); легенда
    про Реймське Євангеліє [!history-bite]
  - Школи та освіта — Навчання дітей знаті; Іларіон — перший митрополит-русич (1051)
    як ознака церковної самостійності
  - '"Руська Правда" та правові реформи — Кодифікація права як культурний акт (писемна
    фіксація норм)'
- section: Первинні джерела
  points:
  - 'Документ 1: Руська Правда (XI ст.) — Стаття 1 («Уб''є муж мужа...»); аналіз заміни
    помсти штрафом'
  - 'Документ 2: Похвала книгам («Повість минулих літ», 1037 р.) — Метафора книг як
    «річок, що наповнюють всесвіт» та «джерела мудрості»'
- section: Деколонізаційний погляд
  points:
  - 'Міфи та реальність — Імперський міф: Ярослав — «російський цар»; Реальність:
    Київський каган (графіті), Московії ще не існувало [!decolonization]'
  - Українська тяглість — Вплив «Руської Правди» на Литовський Статут і козацьке право
    vs московський Судебник (ординська деспотія)
  - Сучасна Україна — Ярослав на банкнотах та у державній символіці
  - Глибший аналіз правління Ярослава — «Золота доба» як пік могутності перед роздробленістю
  - Київ — "Другий Константинополь" — Амбіція стати новим сакральним центром (Софія,
    Золоті ворота)
  - Освіта та інтелектуальне життя — Скрипторії та переклади з грецької
  - Церковна політика — Спроба унезалежнення від Константинополя (Іларіон)
  - Правова спадщина — Європейська правова традиція (компенсація) vs азійська (покарання)
  - Міжнародний престиж — Київ як центр європейської політики XI ст.
  - Уроки для сучасності — Важливість «м'якої сили» (дипломатія, культура)
  - Запо­віт та кри­за наслідування — Система сеньйорату (лествичне право) як причина
    майбутніх міжусобиць
  - Порівняння з сучасниками — Ярослав vs Канут Великий або Карл Великий
  - Історіографія Ярослава — Як Росія привласнює постать (пам'ятник у Ярославлі)
  - 'Деколонізаційний аналіз — Термінологічне мапування: Русь ≠ Росія'
  - Археологічна спадщина — Саркофаг у Софії
  - Ярослав у народній пам'яті — «Мудрий» (епітет з XIX ст., не сучасний)
  - Таємниця останків Ярослава — Версія про вивезення в США під час Другої світової
    війни
  - Значення для сучасної України — Тяглість державності від Києва, а не Москви
  - Заключне слово — Ярослав як символ європейського вибору України
- section: Потрібно більше практики?
  points:
  - 🔄 Інтеграція знань — Есе про роль дипломатії vs війни
  - Реальне застосування — Пошук паралелей у сучасній політиці
  - 🌐 Онлайн-ресурси — Віртуальний тур Софією Київською
vocabulary_hints:
  required:
  - мудрий (wise) — епітет, що закріпився пізніше; асоціація з книжністю
  - золота доба (golden age) — метафора розквіту культури і держави
  - законодавство (legislation) — кодифікація звичаєвого права
  - Руська Правда (Rus' Justice) — збірник законів, не «російська правда» [contested
    term]
  - віра (wergild/fine) — грошовий штраф князю за вбивство вільної людини
  - Софія Київська (St. Sophia Cathedral) — головний храм, «митрополія руська»
  - Золоті ворота (Golden Gate) — парадний в'їзд, копія константинопольських
  - дипломатія (diplomacy) — шлюбна дипломатія як інструмент миру
  - династичний шлюб (dynastic marriage) — засіб міжнародної інтеграції
  - митрополит (metropolitan) — голова церкви; Іларіон (перший русич)
  - книжність (book learning) — «велика бо користь від навчання книжного»
  - спадщина (legacy) — культурна та правова традиція
  recommended:
  - міжусобиця (internecine war) — боротьба за владу між братами
  - продаж (sale-fine) — штраф за дрібні злочини
  - тесть (father-in-law) — «тесть Європи» (метафора впливовості)
  - фортифікація (fortification) — «місто Ярослава»
  - заповіт (testament) — спроба врегулювати спадкування престолу
