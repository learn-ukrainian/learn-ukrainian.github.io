objectives:
- Аналізувати поняття «Золотої доби» Київської Русі, виявляючи його сильні сторони та внутрішні суперечності
- Оцінювати ефективність династичної дипломатії Ярослава як інструменту міжнародної політики
- Інтерпретувати ключові статті «Руської Правди» як джерело для розуміння соціальної структури та правової думки Русі
- Деконструювати імперські та радянські міфи про добу Ярослава Мудрого та його спадщину
