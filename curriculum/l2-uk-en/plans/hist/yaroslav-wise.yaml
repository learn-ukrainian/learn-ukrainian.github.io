content_outline:
- points:
  - 'Провокація: «Золота доба» — це реальність чи вдалий бренд? Уявіть, що Київ XI століття більший за Лондон і Париж разом
    узяті. Що це змінює у вашому сприйнятті історії України?'
  - 'Первинне джерело без контексту: графіті на стіні Софійського собору — «Спаси, Господи, кагана нашого...». Хто такий цей
    «каган» і чому його так називають у головному храмі держави?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Київська Русь — це Україна чи Росія? [!decolonization] Російська імперська версія: Ярослав — «російський цар»,
    а Русь — колиска трьох народів. Українська державницька концепція: Русь — це середньовічна українська держава, а Московія
    — інше політичне утворення, що виникло пізніше і привласнило назву та історію.'
  - 'Дебат 2: «Золота доба» — це пік розвитку чи блискучий фасад перед занепадом? [!epistemic-humility] Одні історики (класична
    школа XIX ст.) бачать епоху Ярослава як апогей могутності. Інші (критична школа XX-XXI ст.) вказують, що його ж власні
    реформи, зокрема заповіт про престолонаслідування, заклали основи для століття князівських усобиць.'
  - 'Глобальна синхронність: Чим був Київ Ярослава у світі? Порівняння з сучасниками: Канут Великий у Північній імперії, імператор
    Священної Римської імперії Конрад II, розквіт династії Сун у Китаї.'
  section: 'Конфліктна карта: Спадкоємець Риму чи ресурс для Москви?'
  words: 900
- points:
  - 'Текст 1: «Руська Правда». Читаємо статтю 1: «Уб''є муж мужа, то мстити брату за брата, або сину за батька...». Аналіз:
    це ще кровна помста, але вже обмежена. А далі — «А якщо не буде кому мстити, то 80 гривень за голову...». Це — революція.
    Заміна помсти грошовою компенсацією («вірою») — ключовий крок до європейської правової держави.'
  - 'Джерело 2: Софія Київська. [!decolonization] Це не просто храм, це політична декларація. 13 куполів (Христос і 12 апостолів),
    назва на честь головного собору Константинополя, фрески родини князя у повний зріст. Це заявка на статус «другого Константинополя»,
    нового центру східного християнства. Ми — не провінція Візантії, ми — рівні.'
  - 'Джерело 3: Графіті на стінах собору. «Соціальні мережі» XI століття. Молитви, ділові нотатки, політичні гасла («каган
    наш»). Це доказ масової писемності серед містян, не лише еліти.'
  section: 'Джерела: Що нам розповідають камінь, пергамент і золото'
  words: 1600
- points:
  - 'Правова спадщина: «Руська Правда» заклала принцип верховенства права і недоторканності особи, який зберігся в Литовському
    Статуті та козацькому праві. Ця традиція фундаментально відрізняється від московського «Судебника» Івана Грозного, що
    базувався на державному терорі та деспотії.'
  - 'Культурна революція: Перша бібліотека (950+ книг), скрипторії, переклади, школи. Призначення Іларіона — русича — митрополитом
    було спробою здобути церковну незалежність від Константинополя. Це створення власного інтелектуального простору.'
  - '[!myth-buster] Анна Ярославна, королева Франції. Міф: «привезла культуру в дику Європу». Реальність: вона була високоосвіченою
    жінкою при дворі, де багато хто був неписьменним (включно з королем). Це свідчить не про «дикість» Франції, а про високий
    статус освіти в Києві та роль жінки в дипломатії Русі.'
  - '«Тесть Європи»: Шлюби доньок (Франція, Норвегія, Угорщина) та синів (Візантія, Польща, Німеччина) — це не просто родинні
    справи. Це мережа військових і політичних союзів, система колективної безпеки, яка зробила Київ центром європейської політики.'
  - '[!anti-hagiography] Ціна «золотої доби»: Заповіт Ярослава, який розділив державу між синами (лествичне право), мав на
    меті уникнути братовбивчої війни, яку він сам пройшов. Але в довгостроковій перспективі це створило систему, що гарантувала
    постійні міжусобиці, і зрештою призвела до роздробленості Русі.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: То що таке «Золота доба»? Аргументована відповідь студента: це період найвищого культурного та
    політичного піднесення, який, однак, містив у собі причини майбутнього занепаду.'
  - 'Історична тяглість: Чому сучасна Росія так запекло бореться за спадщину Ярослава, зводячи йому пам''ятники? Тому що визнання
    Києва єдиним центром Русі руйнує імперський міф про «тисячолітню історію Росії».'
  - 'Зв''язок із сьогоденням: Образ Ярослава на гривнях, його ім''я в назвах військових бригад, Орден Ярослава Мудрого як
    найвища державна нагорода. Ярослав Мудрий залишається символом європейського вибору України, її державної тяглості та
    інтелектуальної потужності.'
  section: Дискусія та підсумок
  words: 700
focus: Yaroslav the Wise's reign as a peak of Kyivan Rus' power, focusing on legal reform (Ruska Pravda), cultural flourishing
  (St. Sophia), and diplomatic integration ("Father-in-law of Europe"), while deconstructing imperial myths and analyzing
  the seeds of future fragmentation.
