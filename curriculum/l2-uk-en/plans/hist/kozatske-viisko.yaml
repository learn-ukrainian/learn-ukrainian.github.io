content_outline:
- points:
  - 'Провокація: Чи було козацьке військо анархічною юрбою степових розбійників, як писали в імперських підручниках, чи першою
    професійною армією України європейського зразка?'
  - 'Цитата без контексту: "Дисципліна в них така, що за вживання алкоголю під час походу — смерть". Про яку армію це — шведську,
    османську чи українську козацьку?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Козацтво — військовий орден чи демократична республіка? Порівняння концепції "лицарського люду" з жорсткою ієрархією
    (гетьман, старшина, суворий кодекс).'
  - 'Дебат 2: Військове мистецтво — східне чи західне? Аналіз тактики табору (вагенбург), шаблі (східний тип) проти тактики
    тришеренгового вогню та участі в європейських війнах (Тридцятилітня війна).'
  - '[!epistemic-humility] Більшість джерел про козаків написані іноземцями (Боплан, Лясота), що мали власні упередження.
    Українські літописи (Самовидця, Граб''янки) створені пізніше і часто ідеалізують минуле.'
  - 'Глобальна синхронність: Поки козаки штурмували Дюнкерк (1646), в Англії точилася громадянська війна, а в Китаї маньчжури
    завойовували імперію Мін.'
  section: 'Конфліктна карта: Демократія чи диктатура?'
  words: 900
- points:
  - 'Первинне джерело: Аналіз уривків з «Опису України» Гійома Левассера де Боплана (французького інженера на польській службі).'
  - 'Свідчення про вишкіл: Боплан про витривалість, навички орієнтування, стійкість до голоду та спеки, вміння робити порох.'
  - 'Свідчення про тактику: Опис морських походів на "чайках", підводне дихання через очеретини (пластуни), тактика "вогнем
    і сталлю" (мушкет і шабля).'
  - '[!decolonization] Читання Боплана "проти шерсті": він служив Речі Посполитій, тому описує козаків водночас із захопленням
    (як воїнів) і зневагою (як "бунтівників"). Його свідчення треба критично аналізувати, а не приймати на віру.'
  section: 'Джерела: Козаки очима інженера Боплана'
  words: 1600
- points:
  - 'Структура як держава: Дублювання адміністративного поділу (полки, сотні) у військовій структурі. Гетьманщина як "військовий
    табір".'
  - 'Озброєння та логістика: Пріоритет вогнепальної зброї ("самопал"), роль артилерії ("гармата") та її психологічний вплив.
    Значення військового обозу та старшини (обозний, писар, суддя).'
  - '[!myth-buster] "Шабля — душа козака": насправді, шабля була зброєю кавалерії або останнього шансу. Основа успіху піхоти
    — мушкет. Міф про "анархію" спростовується жорсткою дисципліною та кодексом.'
  - 'Символіка влади: Клейноди (булава, бунчук, печатка) як інституційні, а не особисті атрибути влади. Сакральне значення
    прапора (хоругви).'
  section: 'Аналіз: Наслідки та значення козацької військової машини'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює аргументовану відповідь — чим козацьке військо було схоже на європейські армії,
    а в чому його унікальність?'
  - 'Вплив на європейську військову науку: Запозичення тактики легкої кавалерії та піхотних прийомів європейськими арміями.'
  - '[!anti-hagiography] "Золотий вік" козацтва також мав свої темні сторони: жорстокість до полонених, внутрішні конфлікти
    ("чорні ради"), політичні інтриги старшини.'
  - 'Зв''язок із сьогоденням: Як концепція "народу-війська" та військової демократії часів Гетьманщини резонує із сучасною
    обороною України?'
  section: Дискусія та підсумок
  words: 700
focus: Cossack military structure, weaponry, tactics, and their decolonization from imperial myths (anarchy, banditry) to
  a professional European army
level: HIST
module: hist-048
objectives:
- Критично аналізувати імперські та романтичні міфи про козацьке військо, спираючись на першоджерела
- Описувати структуру, ієрархію та ключові тактичні прийоми козацької армії
- Порівнювати козацьке військове мистецтво з тогочасними європейськими та східними аналогами
- Розрізняти функції різних видів озброєння (самопал, шабля, гармата) та символіку клейнодів
pedagogy: CBI
persona:
  role: Модератор семінару, що ставить під сумнів усталені міфи ("шабля-душа", "анархія") і вимагає доказів з першоджерел,
    порівнюючи козацьке військо з іншими арміями того часу.
  voice: Military-Historian-Skeptic
phase: HIST.5
