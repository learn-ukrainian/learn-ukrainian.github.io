content_outline:
- points:
  - 'Провокація: 29 квітня 1918 року. Поки соціалісти в Києві сперечаються, бойовий генерал Павло Скоропадський за підтримки
    німців та українських хліборобів-власників проголошує себе Гетьманом. Це зрада ідеaлів революції чи єдиний шанс врятувати
    державу від хаосу? Якби ви були на його місці, що б ви обрали — демократичний безлад чи авторитарний порядок?'
  - 'Фрагмент без контексту: «Права приватної власності... відновлюються». Що означає ця фраза для країни, де 90% населення
    — селяни, які щойно отримали землю від революції?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська vs Імперська/Радянська історіографія. Радянська версія: Скоропадський — «німецька маріонетка» і «поміщик»,
    що придушив селянську революцію. Сучасний український погляд: прагматичний державник, що використав німецьку «парасольку»
    для розбудови незалежних інституцій.'
  - 'Дебат 2: Внутрішньоукраїнський конфлікт — «ефективність проти ідеології». Скоропадський залучав до управління досвідчених
    (часто російськомовних) чиновників старої імперії, що викликало звинувачення в русифікації від націонал-демократів (напр.,
    Дмитро Донцов: «На Україні будують Росію»). Гетьман вважав, що держава важливіша за мову апарату. Хто мав рацію?'
  - '[!epistemic-humility] Неможливо однозначно сказати, чи був Гетьманат життєздатним у довгостроковій перспективі. Його
    доля була нерозривно пов''язана з поразкою Німеччини у Першій світовій війні, що позбавило його головного союзника.'
  - 'Глобальна синхронність: Осінь 1918 року — крах імперій (Німецької, Австро-Угорської, Османської) по всій Європі. На їхніх
    руїнах постають нові національні держави (Польща, Чехословаччина, Угорщина), часто через авторитарні режими (як у Пілсудського
    в Польщі), що робить випадок України частиною загальноєвропейського тренду.'
  section: 'Конфліктна карта: Маріонетка чи державник?'
  words: 900
- points:
  - 'Аналіз «Грамоти до всього українського народу» (29 квітня 1918): мова документа (чому вона більш консервативна, ніж у
    документів УНР), ключові тези (приватна власність, «Гетьман всієї України»), що вони говорять про цілі перевороту.'
  - 'Законодавча лихоманка: близько 400 законів за 7,5 місяців. Аналіз кількох ключових законів (про громадянство, про заснування
    Академії Наук, про земельну реформу). Критика джерел: чи були ці закони виконані на практиці?'
  - 'Фатальний документ: «Грамота про федерацію» (14 листопада 1918). Аналіз тексту: це капітуляція чи вимушений дипломатичний
    хід під тиском Антанти, яка не визнавала незалежну Україну? [!decolonization] Розгляд цього документу як трагедії, а не
    «зради» — спроба зберегти державність за будь-яку ціну.'
  - 'Особисте свідчення: «Спогади» Павла Скоропадського. Аналіз фрагментів, написаних в еміграції. Критика джерела: як статус
    емігранта та поразка вплинули на його ретроспективну оцінку подій? Цитата для аналізу: «Я хотів Україну, не ворожу Великоросії,
    а братню...»'
  section: 'Джерела: Закони, грамоти та спогади'
  words: 1600
- points:
  - 'Причини та наслідки: Гетьманат як консервативна реакція на «соціалістичний експеримент» Центральної Ради. Наслідки: стабілізація
    фінансів, створення армії, розбудова інституцій, але й загострення соціального конфлікту (аграрне питання) та відчуження
    національно-демократичних сил.'
  - '[!myth-buster] Міф про «маріонетковий режим». Аргументи проти: самостійна зовнішня політика (Крим, Кубань), створення
    власної армії, фінансова система, розбудова українських культурних інституцій всупереч інтересам як німців, так і російських
    «білих».'
  - 'Довгострокова спадщина: «інституційна пам''ять». Засновані Скоропадським Українська Академія Наук, Національна бібліотека,
    архіви, університети та театри стали фундаментом сучасної української науки та культури. Вони пережили радянську владу
    і функціонують досі.'
  - 'Оцінки істориків: порівняння поглядів В''ячеслава Липинського (ідеолог українського монархізму, що підтримував Гетьманат),
    Дмитра Дорошенка (міністра закордонних справ гетьманського уряду) та критиків з табору УНР на роль і значення Гетьманату.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, державник чи зрадник? Студент має сформулювати власну аргументовану відповідь, використовуючи
    докази з модуля, щодо ролі Скоропадського в історії України.'
  - '[!anti-hagiography] Уникаючи крайнощів: Гетьманат не був ані «золотим віком», ані абсолютною «зрадою». Це була авторитарна,
    елітарна спроба побудувати державу, яка не змогла знайти спільної мови з більшістю населення (селянством) і програла.'
  - 'Трагічна доля: еміграція, діяльність гетьманського руху (консервативна альтернатива в діаспорі) і загибель під час бомбардування
    союзників у Німеччині у квітні 1945 року — символічний кінець епохи.'
  - 'Зв''язок із сьогоденням: Дискусії про «сильну руку», баланс між демократією та порядком, роль еліт у розбудові держави,
    важливість державних інституцій — уроки Гетьманату залишаються актуальними для України у XXI столітті.'
  section: Дискусія та підсумок
  words: 700
focus: The Hetmanate of Pavlo Skoropadskyi (1918), its conservative policies, state-building efforts, cultural achievements,
  and controversial legacy amidst the Ukrainian Revolution.
level: HIST
