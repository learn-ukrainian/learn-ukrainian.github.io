title: 'Павло Скоропадський: Гетьманат'
subtitle: 'Pavlo Skoropadskyi: The Hetmanate'
content_outline:
- section: 'Вступ: Консервативна альтернатива'
  points:
  - '''29 квітня 1918: державний переворот'' — [!history-bite] «Гетьман із цирку»
    (З''їзд хліборобів у цирку Крутікова); 29 квітня як унікальний день проголошення
    монархічного устрою у ХХ столітті'
  - Хто такий Павло Скоропадський — бойовий генерал, аристократ, нащадок брата гетьмана
    Івана Скоропадського; легітимність через історичну традицію, а не революційний
    популізм
  - Чому «Гетьманат» — «консервативна революція» проти соціалістичного хаосу Центральної
    Ради; зміна форми правління як відповідь на кризу
- section: Прихід до влади
  points:
  - Німецька окупація та криза УНР — [!context] «Втома від анархії» (селяни-власники
    підтримали генерала через неспроможність Ради забезпечити порядок); німці підтримали
    переворот post factum
  - З'їзд хліборобів — відбувся 29 квітня 1918 року в Києві у цирку Крутікова; безкровна
    зміна влади
  - Проголошення Української Держави — відновлення права приватної власності як фундаменту
    цивілізації (антитеза більшовизму)
  - Відносини з німцями — [!myth-buster] «Маріонетка німців?» (використання німецької
    сили як парасольки для розбудови інституцій; часто діяв всупереч німецьким інтересам,
    наприклад, у кримському питанні)
- section: Політика Гетьманату
  points:
  - Консервативний курс — опора на заможне селянство та відновлення приватної власності;
    ухвалено близько 400 законів за 7,5 місяців
  - Земельне питання — скасування соціалізації землі; конфлікт між селянами та великими
    землевласниками
  - 'Українізація чи русифікація? — залучення старих фахівців (часто російськомовних)
    для ефективності апарату; цитата Дмитра Донцова: «На Україні будують Росію»; конфлікт
    з національно свідомими українцями'
  - '«Культурні досягнення: академія, університети» — [!culture] «Українізація зверху»
    (заснування УАН, Національної бібліотеки, Державного українського архіву, Українського
    театру драми і опери, 150 гімназій за 7,5 місяців)'
  - Падіння Гетьманату (грудень 1918) — Грамота про федерацію з Росією (14 листопада)
    як фатальний крок під тиском Антанти; антигетьманське повстання Директорії
- section: Первинні джерела
  points:
  - Грамота про Українську Державу — [!quote] «Цією грамотою я оголошую себе Гетьманом
    всієї України... Права приватної власності... відновлюються»
  - Документи Гетьманату — ухвалено близько 400 законів за 7,5 місяців (шалений темп
    законодавчої роботи)
  - 'Спогади Скоропадського — писані в еміграції; розчарування «вузьким українством»
    соціалістів; цитата: «Я хотів Україну, не ворожу Великоросії, а братню...» (ілюстрація
    складної ідентичності)'
- section: Деколонізаційний погляд
  points:
  - '«Суперечливі оцінки: «зрадник» чи «державник»?» — [!decolonization] переосмислення:
    від радянського таврування «білогвардієць» до визнання ефективності державного
    менеджменту'
  - Гетьманат у контексті революції — доказ, що український рух не був монолітно лівим/соціалістичним;
    спроба побудови модерної держави з традиційним укладом
  - Спадщина та уроки — інституційна пам'ять (Академія наук існує досі); ідея сильної
    правої держави
- section: 'Підсумок: Доля Скоропадського'
  points:
  - Еміграція та життя в Німеччині — Ванзеє, створення Гетьманського руху; спроби
    об'єднати українську діаспору
  - Загибель у 1945 році — смертельне поранення під час бомбардування союзників на
    станції Меттен (квітень 1945)
  - Оцінка сьогодні — символічний кінець епохи та постать, що об'єднує історію з сучасністю
vocabulary_hints:
  required:
  - гетьман (hetman) — оголошую себе Гетьманом всієї України; нащадок гетьманського
    роду; Гетьман Скоропадський
  - гетьманат (hetmanate) — Українська Держава (Гетьманат); період Гетьманату; політика
    Гетьманату
  - переворот (coup) — державний переворот 29 квітня; безкровний переворот; здійснити
    переворот
  - держава (state) — Українська Держава; розбудова держави; будувати державу
  - консерватизм (conservatism) — здоровий консерватизм; консервативна революція;
    консервативний уряд
  - реформа (reform) — земельна реформа; адміністративна реформа; проводити реформи
  - окупація (occupation) — німецька окупація; австро-німецькі війська; за підтримки
    окупаційної влади
  - еміграція (emigration) — політична еміграція; життя в еміграції; померти в еміграції
  recommended:
  - хлібороб (farmer) — З'їзд хліборобів; вільне козацтво; заможні хлібороби
  - грамота (decree) — Грамота до всього українського народу; видання грамоти; текст
    грамоти
  - академія (academy) — Українська академія наук (УАН); заснування академії; перший
    президент академії
  - університет (university) — відкриття нових університетів (Кам'янець-Подільський,
    Київ); державні університети
  - автономія (autonomy) — культурна автономія; широка автономія; межі автономії
  - реставрація (restoration) — реставрація порядку; реставрація приватної власності;
    реставрація монархії
