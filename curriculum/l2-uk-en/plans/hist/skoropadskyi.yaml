objectives:
- Описувати обставини приходу до влади Павла Скоропадського та встановлення Гетьманату
- Аналізувати ключові реформи та напрямки внутрішньої і зовнішньої політики Української Держави
- Критично оцінювати суперечливі аспекти політики Гетьманату, зокрема аграрне та національне питання, на основі джерел
- Характеризувати та оцінювати культурні й наукові досягнення періоду Гетьманату та їхню спадщину
- Формулювати аргументовану позицію в дискусії про історичну роль Гетьманату
