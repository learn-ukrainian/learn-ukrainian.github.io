content_outline:
- points:
  - 'Провокація: «Світ ловив мене, та не впіймав». Як людина, що відмовилася від кар''єри, посад і майна, змогла стати одним
    із найвпливовіших українських мислителів?'
  - Що означає ця епітафія? Запрошення до роздумів про справжню свободу та ціну, яку за неї платять.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сковорода в боротьбі імперій. Українська vs російська/радянська інтерпретація. [!decolonization] Спростування
    міфу про «першого російського філософа» (В. Ерн, 1912) та радянського образу «селянського демократа-атеїста».'
  - 'Дебат 2: Традиціоналіст чи інноватор? Чи був Сковорода останнім представником українського бароко, чи першим просвітителем?
    Конфлікти через «нестандартні» методи викладання в колегіумах.'
  - '[!epistemic-humility] Визнання, що Сковорода — перехідна фігура, яка поєднувала барокову символіку з просвітницькими
    ідеями про самопізнання.'
  - 'Глобальна синхронність: Сковорода і європейське Просвітництво. Його ідеї «сродної праці» та самопізнання в контексті
    думок Руссо, Канта та Лейбніца.'
  section: 'Конфліктна карта: Український Сократ чи «русский философ»?'
  words: 900
- points:
  - '«Сад божественних пісень»: аналіз Пісні 10 («Всякому городу нрав і права»). Сатира на соціальні вади, яку пізніше використав
    І. Котляревський. Мова — книжна українська з елементами народної.'
  - '«Байки Харківські»: структура «фабула + сила (мораль)». Аналіз байки «Бджола та Шершень» як апології «сродної праці».
    Бджола — радість у праці, Шершень — гедонізм і паразитизм.'
  - 'Листи до Михайла Ковалинського: погляд на приватне життя філософа. Педагогічні погляди: «веселість серця», помірність,
    «не їсти без смаку» (читати з розумінням).'
  - '[!decolonization] Підкреслення, що Сковорода — продукт Києво-Могилянської академії та українського бароко, а не російського
    православ''я. Його мова — словено-рутенська, а не російська.'
  section: 'Джерела: Байки, пісні та листи'
  words: 1600
- points:
  - 'Філософія серця: детальний розбір ключових концептів. «Сродна праця» як шлях до щастя. Вчення про дві натури (видима/невидима)
    та три світи (макрокосм, мікрокосм, світ символів/Біблія).'
  - «Пізнай себе» (Nosce te ipsum) як центральний принцип. Щастя через самопізнання та знаходження «істинної людини» всередині
    себе.
  - '[!myth-buster] Сковорода не був атеїстом чи пантеїстом. Його «невидима натура» — це Бог, але не в догматичному, а в духовно-символічному
    сенсі.'
  - 'Вплив на українську культуру: від Котляревського та Шевченка до сучасних мислителів. Сковорода як вічний символ нонконформізму
    та духовної незалежності України.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Сформулюйте власну відповідь: що насправді означає «Світ ловив мене, та не впіймав», спираючись
    на філософію «сродної праці» та відмову від світської марноти?'
  - '[!anti-hagiography] Чи не є образ «мандрівного філософа» романтизацією втечі від соціальної відповідальності? Критична
    дискусія.'
  - 'Зв''язок із сьогоденням: Знищення музею Сковороди в Сковородинівці російською ракетою у 2022 році. Чому імперія через
    300 років все ще боїться ідей Сковороди про свободу?'
  section: Дискусія та підсумок
  words: 700
focus: Філософія свободи та "сродної праці", спростування імперських міфів, аналіз ключових творів, вплив на українську культуру
level: HIST
module: hist-068
objectives:
- Аналізувати ключові концепції філософії Сковороди («сродна праця», «нерівна рівність», «філософія серця»)
- Критично оцінювати місце Сковороди в українській та європейській культурі, розрізняючи барокові та просвітницькі елементи
  його творчості
- Спростовувати імперські та радянські міфи про Сковороду, аргументуючи його приналежність до українського культурного простору
- Інтерпретувати первинні джерела (байки, вірші, листи) для розуміння світогляду мислителя
