objectives:
- Аналізувати причини та наслідки перетворення Галичини на «Український П''ємонт»
- Порівнювати політику Австрійської та Російської імперій щодо українського питання
- Розрізняти ідеологічні позиції москвофілів та народовців
- Критично оцінювати історичні міфи, пов''язані з періодом правління Габсбургів
- Формулювати аргументовану позицію щодо спадщини австрійського періоду в українській історії
