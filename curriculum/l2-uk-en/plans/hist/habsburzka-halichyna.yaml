vocabulary_hints:
- definition: Метафорична назва регіону, що стає центром об'єднання нації, за аналогією з роллю Сардинського королівства (П'ємонту)
    в об'єднанні Італії.
  pos: ч.
  word: П'ємонт
- definition: Представник суспільно-політичної течії в Галичині, що орієнтувався на Російську імперію і не визнавав існування
    окремого українського народу.
  pos: ч.
  word: москвофіл
- definition: Представники суспільно-політичної течії в Галичині, що відстоювали самобутність українського народу та його
    єдність з наддніпрянцями.
  pos: ч.
  word: народовці
- definition: Серія революцій в європейських країнах у 1848–1849 роках, що ставили на меті національне самовизначення та демократичні
    перетворення.
  pos: ж.
  word: Весна народів
- definition: Голова коронного краю в Австро-Угорщині, представник центральної влади (цісаря).
  pos: ч.
  word: намісник
- definition: Назва представницького органу, парламенту. В Галичині — Галицький крайовий сейм.
  pos: ч.
  word: сейм
- definition: Право на самоврядування; в Галичині — боротьба за культурну, а згодом і територіальну політичну автономію.
  pos: ж.
  word: автономія
- definition: Що належить до Української греко-католицької церкви, яка зберегла східний обряд, але визнала зверхність Папи
    Римського.
  pos: прикм.
  word: греко-католицький
- definition: Штучна книжна мова, яку використовували москвофіли; суміш церковнослов'янської, російської та місцевих діалектів.
  pos: с.
  word: язичіє
- definition: Культурно-освітнє товариство, засноване народовцями в 1868 році для поширення освіти та національної свідомості
    серед народу.
  pos: ж.
  word: Просвіта
