content_outline:
- points:
  - 'Провокація: Чому найбідніша провінція Австрійської імперії, «Королівство Галичини та Голодомерії», стала центром українського
    національного відродження, а не багата Наддніпрянщина під Росією?'
  - Що спільного між «добрим цісарем» і «добрим царем»? Розбір міфу про «м'яку» окупацію Галичини.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Москвофіли vs. Народовці. Чи були москвофіли зрадниками, чи просто консерваторами, що боялися полонізації? Як
    штучна мова («язичіє») стала маркером політичної орієнтації?'
  - 'Дебат 2: Українці vs. Поляки. Боротьба за домінування в Галичині — від вимог поділу провінції до боротьби за університет
    та вбивства намісника Потоцького (1908). Чи можливий був компроміс?'
  - '[!epistemic-humility] Прагматична лояльність до Габсбургів: чи була це єдина можлива стратегія виживання, чи свідомий
    політичний вибір «меншого зла» порівняно з Російською імперією?'
  - 'Глобальна синхронність: «Весна народів» 1848 року — українські вимоги у Львові на тлі революцій в Угорщині, Італії, Франції
    та Німеччині.'
  section: 'Конфліктна карта: Лояльність чи ідентичність?'
  words: 900
- points:
  - '«Русалка Дністрова» (1837): аналіз передмови Маркіяна Шашкевича про «чисту руську мову». Чому використання живої народної
    мови було революційним актом?'
  - 'Маніфест Головної Руської Ради (1848): читання та аналіз ключової цитати «Ми Русини Галицькі, належимо до великого руского
    народу, котрий одним говорить язиком і 15 мільйонів виносить». [!decolonization] Перша чітка політична декларація єдності
    з наддніпрянцями.'
  - 'Статути товариств «Просвіта» (1868) та НТШ (1873): як через читальні, кооперативи та наукові видання українці будували
    «державу в державі».'
  - 'Політична преса: порівняльний аналіз статей з москвофільської та народовецької преси («Зоря Галицька», «Діло»). Як вони
    висвітлювали ті самі події?'
  section: 'Джерела: Від «Русалки Дністрової» до маніфестів'
  words: 1600
- points:
  - 'Причини піднесення Галичини: не «доброта» Відня, а прагматичне використання українців як противаги польській шляхті та
    угорському сепаратизму. Концепція «Tiroler des Ostens».'
  - 'Роль греко-католицької церкви: як інституція, що зберегла ідентичність, та інкубатор для нової світської еліти («попівська
    нація»).'
  - 'Порівняння імперських політик: Валуєвський циркуляр та Емський указ в Росії vs. українські кафедри, депутати у Віденському
    парламенті та легальні товариства в Австрії.'
  - '[!myth-buster] «Золотий вік» Габсбургів? Економічна реальність: аграрне перенаселення, масова еміграція до Америки, Галичина
    як «Golomeria und Hungerland» (край голоду та злиднів).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож чому саме Галичина стала «Українським П''ємонтом»? Студент формулює відповідь на основі проаналізованих
    джерел та аргументів.'
  - '[!anti-hagiography] Спадщина Габсбургів: дисципліна, правова культура, досвід парламентаризму з одного боку, та трагедія
    Талергофу і братовбивча війна на боці імперії з іншого. Як зважити ці два боки?'
  - 'Зв''язок із сьогоденням: чи можна побачити риси галицької політичної культури (самоорганізація, недовіра до центральної
    влади) в сучасній Україні?'
  section: Дискусія та підсумок
  words: 700
