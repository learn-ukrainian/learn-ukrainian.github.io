content_outline:
- points:
  - 'Провокативне питання: Якби ви були на місці козацької старшини у 1750-х, яку стратегію порятунку Гетьманщини ви б обрали:
    жорсткий юридичний опір імперії за прикладом 73-річного ветерана Данила Апостола чи м''яку силу та культурну модернізацію
    за прикладом 22-річного європейського аристократа Кирила Розумовського? Чия стратегія мала більше шансів на успіх?'
  - 'Фрагмент без контексту: «…щоб самий час і назва гетьманів зникли, а не те, щоб якась людина була обрана на цю посаду».
    Як ви гадаєте, хто і коли міг дати такий наказ?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була Гетьманщина на шляху до перетворення на звичайну провінцію Російської імперії (російська історіографія),
    чи вона мала потенціал для розвитку в модерну європейську державу, який був силоміць перерваний (українська історіографія)?
    [!decolonization]'
  - 'Дебат 2: Чи була стратегія Розумовського (культурний розвиток, інтеграція еліт) зрадою і колабораціонізмом, чи єдиноможливою
    тактикою «м''якої сили» для збереження української ідентичності в умовах абсолютизму? [!epistemic-humility]'
  - 'Глобальна синхронність: Епоха «освіченого абсолютизму». Поки Розумовський будував у Глухові оперу, Фрідріх Великий у
    Пруссії та Марія Терезія в Австрії проводили реформи, що зміцнювали, а не послаблювали їхні держави. Чому український
    випадок виявився іншим?'
  section: 'Конфліктна карта: Опір чи інтеграція?'
  words: 900
- points:
  - 'Аналіз «Рішительних пунктів» (1728): чому це не договір, а односторонній імперський указ? Розбір статей, що обмежували
    фінансову, військову та дипломатичну автономію Гетьманщини.'
  - '«Генеральне слідство про маєтності» (1729–1731) як джерело: спроба Апостола провести ревізію земель та зупинити їх незаконне
    захоплення старшиною та російськими вельможами. Які висновки про стан держави можна зробити з цього документа?'
  - 'Таємний наказ Катерини II князю Вяземському (1764): «Мала Росія, Ліфляндія та Фінляндія – суть провінції... Ці провінції,
    як і Смоленщину, треба найлегшим чином привести до того, щоб вони обрусіли і перестали дивитись, як вовки до лісу». [!decolonization]
    — аналіз імперської риторики та намірів.'
  - 'Листування Розумовського з імператорським двором: аналіз мови та риторики. Як останній гетьман намагався поєднати придворне
    підлабузництво з відстоюванням «прав і вольностей»?'
  section: 'Джерела: Рішительні пункти та таємні інструкції'
  words: 1600
- points:
  - 'Короткострокові наслідки: За Апостола — економічна стабілізація та кодифікація права. За Розумовського — «золота осінь»
    Гетьманщини, культурний розквіт Глухова, але й поглиблення інтеграції еліти в імперську систему.'
  - 'Довгострокові наслідки: Ліквідація Гетьманщини у 1764 році, створення Другої Малоросійської колегії, закріпачення селян
    (1783) та перетворення козацької старшини на російське дворянство. Політична нація перетворюється на етнографічну масу.'
  - '[!myth-buster] Міф про «старого і пасивного» Апостола. Аналіз його реформ доводить, що він був енергійним державником,
    який до останнього боровся за збереження інституцій.'
  - '[!myth-buster] Міф про те, що Розумовський «здав» Гетьманщину. Аналіз його спроб зробити гетьманство спадковим (1763)
    та провести судову і військову реформи показує, що він прагнув модернізувати державу, але недооцінив силу імперського
    центру.'
  - 'Оцінки істориків: Як Субтельний та Плохий оцінюють шанси обох стратегій? Чи згодні вони щодо неминучості краху Гетьманщини?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чия стратегія — Апостола чи Розумовського — виявилася більш далекоглядною, навіть попри поразку?
    Студент має сформулювати відповідь, спираючись на вивчений матеріал.'
  - 'Уроки історії: Чому культурний розквіт без політичної та військової сили виявився крихким? Який урок можна винести з
    перетворення козацької еліти на імперських дворян?'
  - '[!anti-hagiography] Чи не була «золота осінь» Гетьманщини розквітом лише для вузького кола еліти, в той час як основна
    маса козацтва та селянства втрачала права?'
  - 'Зв''язок із сьогоденням: Дискусія про роль «м''якої сили» та культурної дипломатії у протистоянні сучасним імперським
    загрозам. Чи може культура існувати без сильної держави та армії?'
  section: Дискусія та підсумок
  words: 700
focus: Порівняння двох стратегій збереження Гетьманщини — юридичний опір Данила Апостола та культурна інтеграція Кирила Розумовського
  — та аналіз причин остаточної ліквідації української автономії
level: HIST
module: hist-070
objectives:
- Порівнювати та критично оцінювати дві різні стратегії збереження державної автономії (юридичний опір vs. культурна інтеграція)
  на прикладі правління Данила Апостола та Кирила Розумовського.
- Аналізувати первинні історичні документи («Рішительні пункти», імперські укази), розрізняючи їхній формальний зміст та реальні
  політичні наміри.
- Пояснювати причини та довгострокові наслідки ліквідації Гетьманщини, використовуючи поняття «деколонізація» та «імперська
  уніфікація».
- Формулювати аргументовану позицію щодо історичних уроків цього періоду для сучасної української державності.
