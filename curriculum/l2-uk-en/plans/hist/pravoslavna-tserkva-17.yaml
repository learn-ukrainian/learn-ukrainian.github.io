content_outline:
- points:
  - 'Провокація: Як могла церква, що юридично припинила існування у 1596 році, не тільки вижити у підпіллі, але й через 36
    років змусити одну з наймогутніших держав Європи знову визнати себе? Що це було — диво, політичний розрахунок чи збройний
    шантаж?'
  - 'Цитата без контексту (Іван Вишенський): "Босих і голих, останніх рабів православних... від них жемчуг пресвітлий — віру
    — вилупити хочуть."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Український vs Імперський): Чи була унія добровільним «возз''єднанням» та культурним вибором (польська теза),
    чи актом релігійного та національного утиску, що спровокував опір (українська теза)?'
  - 'Дебат 2 (Внутрішній український): Яким мав бути шлях опору? Радикальна ізоляція від «латинського світу» (Іван Вишенський)
    vs поміркована позиція, що передбачала діалог та використання західної освіти для захисту православ''я (Петро Могила).'
  - '[!epistemic-humility] Більшість джерел — це полемічна література, написана учасниками конфлікту. Їхня мета — не інформувати,
    а переконувати. Історики досі сперечаються, де закінчується факт і починається пропаганда.'
  - 'Глобальна синхронність: Поки в Речі Посполитій тривав православно-католицький конфлікт, у Центральній Європі палала Тридцятилітня
    війна (1618–1648) — найкривавіший релігійний конфлікт в історії континенту між католиками та протестантами.'
  section: 'Конфліктна карта: Унія чи опір?'
  words: 900
- points:
  - 'Аналіз текстів православних полемістів: "Послання до єпископів" Івана Вишенського — гостра критика церковної верхівки,
    що зрадила віру.'
  - 'Source criticism: Вишенський писав з Афону, його позиція була безкомпромісною. Чи відображала вона настрої всього православного
    населення України?'
  - '"Протестація" Йова Борецького (1621) — документ, що обґрунтовував канонічність відновленої ієрархії та звинувачував уніатів
    у розколі. Це вже не просто критика, а політична декларація.'
  - '[!decolonization] Таємне висвячення нових єпископів у Києві 1620 року за військової підтримки козацтва на чолі з Сагайдачним
    — це прямий виклик польській владі та акт відновлення суб''єктності. Це не прохання, а констатація факту: ми є, і з нами
    треба рахуватися.'
  - '"Пункти для заспокоєння руського народу" (1632) — текст компромісу. Аналіз мови документа: які права гарантовано, а які
    — ні? Чому легалізація стала можливою лише після смерті Сагайдачного та короля Сигізмунда III?'
  section: 'Джерела: Голоси епохи'
  words: 1600
- points:
  - 'Причини та наслідки: Берестейська унія → криза та підпілля → консолідація мирян (братства) → втручання козацтва як військового
    гаранта → відновлення ієрархії → легалізація.'
  - 'Роль Петра Конашевича-Сагайдачного: він не просто "захищав" віру. Він перетворив козацьке військо на ключового політичного
    гравця, який міг диктувати умови королю. Його вступ з усім військом до Київського братства — це геніальний політичний
    хід.'
  - '[!myth-buster] Міф про "темне" та "неосвічене" православ''я. Навпаки, боротьба з унією стимулювала інтелектуальний вибух:
    розвиток шкільництва, друкарства, полемічної літератури. Щоб захистити свою віру, її треба було добре знати і вміти аргументувати.'
  - 'Порівняння оцінок: Грушевський бачив у цій боротьбі насамперед національно-визвольний рух. Сучасні історики (Плохій)
    наголошують на складності ідентичностей того часу, де "русская віра" була важливішою за етнічність.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, як православна церква вижила і відродилася? Студент формулює відповідь, використовуючи
    поняття: братства, козацтво, полеміка, дипломатія, політичний момент.'
  - 'Зв''язок із сьогоденням: Боротьба за визнання відновленої ієрархії у XVII столітті та боротьба за автокефалію і отримання
    Томосу у XXI столітті. Які паралелі та відмінності можна провести у методах, аргументах та ролі зовнішніх сил?'
  - '[!anti-hagiography] Не варто ідеалізувати "єдність" православних. Внутрішні конфлікти були жорстокими. Мелетій Смотрицький,
    видатний полеміст, сам згодом перейшов в уніати. Це була епоха глибоких особистих драм та складних виборів.'
  section: Дискусія та підсумок
  words: 700
focus: Криза православ'я після Берестейської унії 1596, підпільне існування, роль братств і козацтва, таємне відновлення ієрархії
  1620 року під проводом Сагайдачного, та легалізація 1632 року.
