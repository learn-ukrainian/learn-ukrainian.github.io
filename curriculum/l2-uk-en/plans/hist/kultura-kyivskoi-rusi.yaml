objectives:
- Аналізувати розвиток писемності та освіти в Русі, спростовуючи міфи про її обмеженість.
- Інтерпретувати ключові літературні та архітектурні пам''ятки як виразники державної ідеології та культурної ідентичності.
- Розрізняти візантійські впливи та місцеві традиції в мистецтві Київської Русі, розуміючи концепцію творчого синтезу.
- Формулювати аргументовану критику імперської концепції «спільної культурної колиски».
