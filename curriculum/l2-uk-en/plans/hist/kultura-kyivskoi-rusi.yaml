content_outline:
- points:
  - 'Провокативне питання: Культура Київської Русі — це блискуча копія Візантії чи унікальний самобутній світ? Де проходить
    межа між наслідуванням та власною ідентичністю?'
  - 'Фрагмент з літопису: «Велика бо користь буває людині від учення книжного. Книги ж — мов ріки, що наповнюють собою увесь
    світ...» Як цей погляд на знання визначив долю Русі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Візантійська співдружність» чи культурна незалежність? Київська культура як провінційний варіант візантійської
    (імперський погляд) vs. творчий синтез (сучасний український погляд).'
  - 'Дебат 2: Чи була писемність долею еліти? Берестяні грамоти зі Звенигорода та графіті Софії Київської як доказ поширення
    грамотності серед різних верств населення, що спростовує міф про «виключно новгородський феномен». [!epistemic-humility]'
  - 'Глобальна синхронність: Поки в Києві будують Софію (XI ст.), в Європі розквітає романський стиль (собори в Шпаєрі, Пізі),
    а в ісламському світі Авіценна пише «Канон лікарської науки».'
  section: 'Конфліктна карта: Візантія vs. Самобутність'
  words: 900
- points:
  - 'Писемні джерела: «Повість минулих літ» як політичний маніфест, «Слово о полку Ігоревім» як шедевр світської літератури,
    «Ізборники Святослава» як енциклопедії знань. [!decolonization]'
  - 'Архітектура як текст: Софійський собор — синтез візантійського хрестово-купольного плану та місцевої багатобанної традиції.
    Золоті ворота — поєднання оборонної, сакральної та тріумфальної функцій.'
  - 'Мова каменю та стін: Графіті Софії Київської фіксують живу розмовну мову з українськими діалектними рисами (м’яке «ц»,
    кличний відмінок). Голосники (керамічні глечики в стінах) як унікальна місцева технологія для покращення акустики.'
  - 'Мистецтво як свідчення: Мозаїка «Оранта» — візантійська техніка, але символ непорушності саме київської землі. Світські
    фрески (полювання, музиканти, скоморохи) — свідчення інтересу до земного життя. Київська перегородчаста емаль — унікальна
    техніка, відома в усій Європі.'
  section: 'Джерела: Літописи, камінь і золото'
  words: 1600
- points:
  - 'Формування ідентичності: Культурний вибух після 988 року не просто «європеїзував» Русь, а створив унікальну східнохристиянську
    ідентичність, відмінну і від Візантії, і від Латинської Європи.'
  - 'Короткострокові наслідки: Створення єдиного культурного простору від Києва до Новгорода, легітимізація князівської влади
    через сакральне мистецтво та літописання.'
  - 'Довгострокові наслідки: Створення культурного фундаменту, на який спиратиметься українська ідентичність протягом століть
    бездержавності. Ця спадщина стала об’єктом привласнення в імперських наративах.'
  - '[!myth-buster] Спростування міфу про «спільну колиску»: Культура Русі не є «спільною» спадщиною, а є першим етапом формування
    саме української культури. Аргументи: мовні риси, унікальний архітектурний стиль, київські художні школи.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, копія чи оригінал? Студент формулює відповідь, використовуючи концепцію творчого синтезу
    та наводячи приклади з архітектури, літератури та мови.'
  - 'Зв''язок із сьогоденням: Боротьба за спадщину Київської Русі є центральним елементом сучасної інформаційної війни. Чому
    контроль над минулим є таким важливим для сучасної політики?'
  - '[!anti-hagiography] Уникаючи ідеалізації «золотої доби», варто пам''ятати, що ця висока культура існувала в жорстокому
    феодальному суспільстві, повному війн, змов та соціальної нерівності.'
  section: Дискусія та підсумок
  words: 700
