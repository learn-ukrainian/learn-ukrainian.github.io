content_outline:
- points:
  - 'Провокаційне питання: Мученицька смерть Михайла Чернігівського — це свідомий політичний суїцид, акт релігійного фанатизму
    чи єдиний гідний вибір для суверенного правителя?'
  - 'Фрагмент з літопису без контексту: «Тобі, царю, поклонюся, бо Бог доручив тобі царство... а тому, чому ці кланяються,
    не поклонюся». Хто і в якій ситуації міг це сказати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська vs Імперська історіографія. Стратегія Михайла (смерть за гідність) проти стратегії Олександра Невського
    (колаборація заради виживання) — дві різні політичні культури, що лягли в основу двох народів.'
  - 'Дебат 2: Релігійний подвиг vs Політичний протест. Чи була відмова від обрядів захистом віри, чи демонстративним невизнанням
    сюзеренітету хана, що робило смерть неминучою?'
  - '[!epistemic-humility] Наші головні джерела — літописи та житія. Історики сперечаються, наскільки житійна література прикрасила
    реальні події, щоб створити ідеальний образ святого воїна.'
  - 'Глобальна синхронність: У 1245-47 роках папський посол Плано Карпіні подорожує в Каракорум, описуючи монгольські звичаї,
    тоді як у Європі закінчується Шостий хрестовий похід, а імператор Фрідріх II веде боротьбу з Папою.'
  section: 'Конфліктна карта: Мученик чи політик?'
  words: 900
- points:
  - 'Аналіз розповіді з Галицько-Волинського літопису (Іпатський список): лаконічний, фактологічний виклад подій. Акцент на
    політичному діалозі Михайла з Батиєм.'
  - 'Аналіз «Сказання про вбивство в Орді князя Михайла Чернігівського і його боярина Федора»: це житійна література. Порівняння
    мотивів, додавання деталей (диявол, що спокушає; промова боярина Федора «Не погуби душі, а тіла не бійся»).'
  - 'Критика джерел: Житіє було написане пізніше і мало на меті створити образ святого. Як відрізнити факт від агіографічного
    домислу? Чому для автора житія важливі саме духовні, а не політичні мотиви?'
  - '[!decolonization] Канонізація Михайла (1547) відбулась у Москві, але він завжди був «своїм» святим саме для Чернігівської
    землі та українського православ''я, на противагу загальноімперському культу Невського.'
  section: 'Джерела: Літописи та житія'
  words: 1600
- points:
  - 'Причини та наслідки: вчинок Михайла не зупинив монгольське панування, але став потужним символом. Чому цей символ був
    важливим для Русі, що опинилася під владою Орди?'
  - '[!myth-buster] Розвінчання радянського та імперського міфу про «покірну Русь» та «єдину колиску». Вчинок Михайла демонструє,
    що модель поведінки князів не була однорідною. Існували різні стратегії — від опору до колаборації.'
  - 'Порівняльний аналіз: Михайло Чернігівський, Данило Галицький, Олександр Невський. Три князі, три різні стратегії взаємодії
    з Ордою. Як кожна з них вплинула на долю їхніх земель?'
  - 'Оцінки істориків: як оцінювали вчинок Михайла Грушевський, Субтельний, Плохій? Чи змінювалася інтерпретація його смерті
    з часом?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, мученик чи політик? Студент формулює власну аргументовану відповідь, спираючись на проаналізовані
    джерела та історіографічні дебати.'
  - 'Ширше питання: яка ціна компромісу? Коли співпраця із загарбником є виправданою стратегією виживання, а коли стає зрадою?'
  - '[!anti-hagiography] Попри свій мученицький кінець, за життя Михайло був типовим середньовічним правителем: жорстоким,
    амбітним, вів боротьбу за Київ. Чи робить це його фінальний вибір менш чи більш значущим?'
  - 'Зв''язок із сьогоденням: як історія Михайла Чернігівського резонує із сучасним опором України російській агресії? Які
    паралелі можна провести в темі вибору між підкоренням та боротьбою?'
  section: Дискусія та підсумок
  words: 700
focus: Martyrdom of Mykhailo of Chernihiv (1246) as a political act of resistance vs. religious steadfastness, analysis of
  primary sources (chronicles vs. hagiography), and deconstruction of the imperial myth of "submissive Rus"
level: HIST
module: hist-022
objectives:
- Аналізувати причини та наслідки відмови Михайла Чернігівського підкоритися Орді, розрізняючи політичні та релігійні мотиви
- Критично порівнювати різні типи історичних джерел (літопис vs житіє) для реконструкції подій
- Деконструювати імперський міф про "покірну Русь", порівнюючи стратегії опору та колаборації руських князів
- Формулювати аргументовану позицію в історіографічній дискусії щодо ролі Михайла Чернігівського в українській історії
