module: hist-107
level: HIST
sequence: 107
slug: upa
version: '2.0'
title: 'УПА: Збройний опір'
subtitle: 'UPA: The Armed Resistance'
content_outline:
- section: 'Вступ: Війна на два фронти'
  points:
  - '1942: створення УПА — 14 жовтня (символічна дата), наказ ч. 1/47, Поліська Січ
    як предтеча'
  - Проти нацистів і більшовиків — концепція «Між двома вогнями», єдина армія проти
    двох тоталітарних імперій без зовнішньої допомоги
  - 'Чому збройний опір — стратегічна мета: не стати розмінною монетою після війни;
    hook: [!context] про унікальність ситуації (воювали проти двох імперій одночасно)'
- section: Створення та організація
  points:
  - ОУН та шлях до УПА — роль ОУН(б) у формуванні єдиної структури восени 1942; інтеграція
    загонів; Поліська Січ (Бульба-Боровець) як попередниця
  - 'Командири: Шухевич, Клячківський — Дмитро Клячківський (Клим Савур) на Волині,
    Роман Шухевич (Тарас Чупринка) як творець регулярної структури з січня 1944'
  - 'Структура та організація — УПА-Північ, УПА-Захід, УПА-Південь; «лісові брати»
    мали власну валюту (бофони) та шпиталі (Червоний Хрест УПА); hook: [!history-bite]
    про підпільну державу'
  - 'Ідеологія та цілі — Присяга воїна УПА: «боротись за повне визволення» (червень
    1943); листівки до народів Кавказу та Азії («Чому ти стріляєш в брата?»)'
- section: Бойовий шлях
  points:
  - 'Боротьба з німцями — Весна 1943, Колківська республіка (держава без німців),
    порятунок «остарбайтерів»; статистика: >12 тис. вбитих окупантів; hook: [!myth-buster]
    про співпрацю з нацистами'
  - Боротьба з радянською владою — Бій під Гурбами (квітень 1944) — найбільша відкрита
    битва (5 тис. проти 30 тис. НКВС); перехід до тактики малих груп (криївки)
  - 'Волинська трагедія — липень 1943 (апогей), складний етнічний конфлікт, жертви
    серед цивільних з обох сторін; контекст: пацифікація 1930-х та німецькі провокації'
  - Операція «Вісла» — 28 квітня 1947, депортація 140 тис. українців з Закерзоння,
    спроба УПА захистити населення (2 тис. проти 20 тис. польських військ)
  - Опір до 1950-х років — останній бій групи «Петра» (1960) на Тернопільщині, арешт
    Василя Кука (1954)
- section: Первинні джерела
  points:
  - Документи УПА — Накази ГВШ, звіти про бої, дереворити Ніла Хасевича як візуальна
    пропаганда, що обійшла світ
  - 'Спогади учасників — багатотомний «Літопис УПА», щоденники командирів; hook: [!quote]
    з Декалогу («Здобудеш Українську Державу, або згинеш у боротьбі за неї»)'
  - Радянські документи — звіти спецгруп НКВС про боротьбу з «бандитизмом»; використання
    провокаторів, перевдягнених в упівців
- section: Деколонізаційний погляд
  points:
  - 'Радянський наратив: «бандерівці» — міф про «німецьких посіпак» vs. реальність
    пакту Молотова-Ріббентропа (СРСР як союзник Гітлера); hook: [!decolonization]
    про термінологію'
  - Контроверсії та складна правда — Нюрнберзький процес не визнав УПА злочинною;
    порівняння з ірландським (IRA) чи польським (AK) підпіллям
  - УПА в сучасній пам'яті — визнання борцями за незалежність на рівні держави; спростування
    імперських міфів про «банди»
- section: 'Підсумок: Спадщина'
  points:
  - Загибель Шухевича (1950) — бій у Білогорщі 5 березня, символ незламності («Мертві
    сорому не мають»); не здався живим
  - Визнання УПА — реабілітація учасників, спростування радянських міфів; кінець організованого
    опору в 1954
  - 'УПА та сучасна війна — спадкоємність традицій: «Слава Україні! Героям Слава!»,
    червоно-чорний прапор у ЗСУ як символ боротьби до перемоги; hook: [!reflection]
    про спадок'
vocabulary_hints:
  required:
  - 'УПА (UPA) — Ukrainian Insurgent Army, key term; date: 14.10.1942'
  - повстанці (insurgents) — often referred to as «лісові брати» (forest brothers);
    not «бандити»
  - опір (resistance) — збройний опір (armed resistance) against occupiers; рух опору
    (resistance movement)
  - 'партизани (partisans) — note: in Soviet context «партизани» were enemies (Red
    partisans), UPA were «повстанці»'
  - 'окупація (occupation) — подвійна окупація (double occupation: Nazi and Soviet);
    німецька/радянська окупація'
  - незалежність (independence) — здобути незалежність (to gain independence); боротьба
    за незалежність
  - командир (commander) — Головнокомандувач (Commander-in-Chief) Роман Шухевич
  - підпілля (underground) — піти в підпілля (to go underground); українське підпілля
  recommended:
  - бункер (bunker) — also криївка (hideout), essential for survival in 1944-1950s
  - криївка (hideout) — secret underground shelter masked in forests or houses; жити
    в криївці
  - диверсія (sabotage) — акти саботажу (acts of sabotage) against German administration
  - пропаганда (propaganda) — ворожа пропаганда (enemy propaganda) vs. повстанські
    листівки
  - репресії (repressions) — масові репресії НКВС (mass NKVD repressions); каральні
    акції
  - депортація (deportation) — примусове виселення (forced eviction), e.g., Operation
    Vistula (1947)
  - бофони (bofons) — повстанські гроші (insurgent currency); бойовий фонд
  - присяга (oath) — скласти присягу (to take an oath); текст присяги
  - етнічний конфлікт (ethnic conflict) — vs. «різанина» (massacre); Волинська трагедія
