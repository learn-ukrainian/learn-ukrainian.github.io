content_outline:
- points:
  - 'Провокація: Як армія без держави, авіації, танків та зовнішньої допомоги могла одночасно воювати проти двох найпотужніших
    тоталітарних імперій світу — Третього Рейху та СРСР?'
  - 'Що важливіше для перемоги: зброя чи дух? Роздуми над присягою воїна УПА: «Здобудеш Українську Державу, або згинеш у боротьбі
    за неї».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: УПА — «німецькі посіпаки» чи третя сила? Радянський міф про співпрацю з нацистами vs. реальність боїв проти
    Вермахту та СС (напр. Колківська республіка).'
  - 'Дебат 2: Волинська трагедія 1943 р. — геноцид, етнічна чистка чи двосторонній конфлікт? Аналіз української та польської
    історіографії.'
  - '[!epistemic-humility] Визнання складності: історія УПА не є чорно-білою. Нюрнберзький процес не визнав УПА злочинною
    організацією, але дискусії щодо методів боротьби тривають.'
  - 'Глобальна синхронність: українське підпілля vs. Армія Крайова в Польщі, рух Опору у Франції, партизани Тіто в Югославії.
    У чому унікальність УПА?'
  section: 'Конфліктна карта: Герої, колаборанти чи жертви обставин?'
  words: 900
- points:
  - 'Офіційні документи: накази Головного військового штабу, звіти про бої, текст присяги. Аналіз військової структури та
    дисципліни.'
  - 'Пропаганда та мистецтво: дереворити Ніла Хасевича («мистецтво з бункера») та листівки до народів Кавказу та Азії. Як
    підпілля вело інформаційну війну?'
  - 'Щоденники та спогади: «Літопис УПА» як монументальне джерело. Читання уривків зі спогадів рядових повстанців про життя
    в криївках.'
  - '[!decolonization] Радянські архіви проти УПА: читаємо звіти НКВС «проти зерна». Як радянські спецслужби використовували
    провокаторів, перевдягнених в упівців, для дискредитації руху?'
  section: 'Джерела: Архів підпільної держави'
  words: 1600
- points:
  - 'Причини та наслідки створення УПА: від інтеграції загонів ОУН(б) та Поліської Січі до формування єдиної армії під командуванням
    Романа Шухевича.'
  - 'Бойовий шлях: від перших боїв з нацистами (весна 1943) до найбільшої битви під Гурбами з НКВС (квітень 1944). Як змінювалась
    тактика УПА?'
  - 'Підпільна держава: УПА як армія держави, що існувала в підпіллі. Розгляд інституцій: власна валюта (бофони), шпиталі
    (Червоний Хрест УПА), служба безпеки.'
  - '[!myth-buster] Спростування міфу про «бандитів»: УПА мала чітку ідеологію, мету (незалежна Україна) та широку підтримку
    місцевого населення, що дозволило чинити опір до кінця 1950-х.'
  - 'Трагічні сторінки: Операція «Вісла» (1947) як спроба радянської та польської комуністичної влади позбавити УПА соціальної
    бази через депортацію українців.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, як УПА вдалося так довго протистояти імперіям? Формулювання відповіді на основі проаналізованих
    матеріалів.'
  - 'Спадок УПА в сучасній Україні: гасло «Слава Україні! Героям Слава!», червоно-чорний прапор, ідея безкомпромісної боротьби
    за державність. Як спадщина УПА впливає на сучасні ЗСУ?'
  - '[!anti-hagiography] Уникнення ідеалізації: визнання не лише героїзму, а й жорстокості війни, контроверсійних рішень та
    трагедії цивільного населення в зоні бойових дій.'
  - Загибель Романа Шухевича 5 березня 1950 року як символ незламності та кінець організованого спротиву. Чому він не здався
    живим?
  section: Дискусія та підсумок
  words: 700
focus: УПА як унікальне явище війни на два фронти, структура підпільної держави, ключові операції, Волинська трагедія, радянські
  та сучасні міфи, та спадщина опору в сьогоднішній Україні.
level: HIST
module: hist-107
objectives:
- Аналізувати унікальну концепцію УПА як армії, що вела війну на два фронти проти тоталітарних імперій
- Розрізняти радянські міфи та сучасні історіографічні дебати щодо діяльності УПА, включно з контроверсійними аспектами
- Інтерпретувати первинні джерела з архівів підпілля (накази, пропаганду, спогади), читаючи їх критично
- Оцінювати спадщину УПА та її вплив на формування сучасної української ідентичності та військових традицій
