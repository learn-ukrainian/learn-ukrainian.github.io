objectives:
- Критично аналізувати причини та наслідки переходу гетьмана Івана Мазепи на бік шведського короля Карла XII
- Пояснювати історичне значення Полтавської битви та Батуринської трагедії в контексті українсько-російських відносин
- Оцінювати «Пакти і Конституції» Пилипа Орлика як пам''ятку української та європейської політико-правової думки
- Розрізняти український державницький погляд на постать Мазепи та імперський російський наратив про «зраду»
