slug: ivan-mazepa-poltava
version: '2.0'
title: 'Іван Мазепа III: Полтава і вигнання'
subtitle: 'Ivan Mazepa III: Poltava and Exile'
content_outline:
- section: Вступ
  points:
  - Рішення, що змінило історію — не спонтанний крок, а реакція на наміри Петра І
    перетворити козаків на драгунів та скасувати автономію
  - Геополітичний контекст — Швеція як гарант протекторату (аналогія з угодою Хмельницького);
    [!myth-buster] Мазепа не «зрадник», а державник, що рятував країну від поглинання
- section: Читання
  points:
  - Таємні перемовини та дипломатичні маневри — 1706–1708 рр., роль княгині Дольської,
    мотивація «врятувати Україну між двома каменями»; [!context] Велика Північна війна
    як глобальний конфлікт
  - Гнів царя та ідеологічна війна — Петро І до останнього вважав доноси Кочубея та
    Іскри наклепом, анафема як політичний інструмент
- section: 'Батуринська трагедія: Ціна спротиву'
  points:
  - Оплот Мазепи — оборона під командуванням полковника Дмитра Чечеля
  - Ніч зради та ранок геноциду — зрада Івана Носа, знищення 11–15 тис. мешканців
    (включно з жінками та дітьми); [!history-bite] археологічні докази геноциду (розтрощені
    черепи, обгорілі ікони)
- section: 'Полтавська битва: Злам епох'
  points:
  - Зима відчаю та весна надій — люта зима 1708–1709, приєднання запорожців під проводом
    Костя Гордієнка (березень 1709)
  - '27 червня 1709 року: Ранок імперії — фатальна помилка (поранення Карла XII),
    перевага російської артилерії; [!military] відсутність єдиного командування у
    шведів'
  - 'Переволочна: Кінець міфу — капітуляція Левенгаупта, втеча Мазепи і Карла через
    Дніпро в османські володіння'
- section: Вигнання, Смерть і Початок нової боротьби
  points:
  - 'Бендери: Життя після поразки — табір у Варниці, смерть гетьмана 21 вересня 1709
    року, поховання в Галаці; [!legacy] зародження першої політичної еміграції'
  - Пилип Орлик та Перша Конституція Європи — квітень 1710, «Пакти і Конституції»
    як правова основа нової держави, ідея поділу влади
- section: 'Мазепа в культурі: Між прокляттям і романтизмом'
  points:
  - Образ Мазепи в Європі vs Росії — романтичний герой свободи (Байрон, Гюго, Ліст)
    проти «Юду» в російській пропаганді (Пушкін); [!culture] європейський міф про
    Мазепу
- section: Первинні джерела
  points:
  - Дипломатичне листування — листи до Карла XII та Станіслава Лещинського
  - Військові рапорти — Універсали до українського народу з поясненням причин переходу
  - Державотворчі акти — «Маніфест до європейських народів» Пилипа Орлика (1712)
- section: 'Деколонізаційний погляд: Руйнування імперських міфів'
  points:
  - 'Мазепа: Герой чи антигерой? — васал, що розриває угоду через порушення сюзереном
    обов''язку захисту («бороніться самі»); [!decolonization] термін «мазепинці» як
    тавро для борців за незалежність'
  - Спадщина в сучасній Україні — відродження пам'яті (пам'ятники, 10 гривень), спростування
    радянських міфів
- section: Підсумок
  points:
  - Спадщина та пам'ять — поразка затримала незалежність, але вчинок Мазепи заклав
    фундамент збройного опору імперії
vocabulary_hints:
  required:
  - зрада (betrayal/treason) — російський міф про «зраду Мазепи» vs українська «зрада
    царя»
  - анафема (anathema) — накласти анафему (політичний акт), зняти анафему
  - вигнання (exile) — політичне вигнання, мазепинська еміграція
  - конституція (constitution) — Конституція Пилипа Орлика, правові основи
  - трагедія (tragedy) — Батуринська трагедія, національна трагедія
  - альянс (alliance) — шведсько-український альянс, військовий союз
  - битва (battle) — генеральна битва, поле битви
  - терор (terror) — московський терор, тактика випаленої землі
  recommended:
  - маніфест (manifesto) — Маніфест до європейських народів
  - гарнізон (garrison) — знищення гарнізону, оборона фортеці
  - облога (siege) — тримати в облозі, прорвати облогу
  - капітуляція (capitulation) — ганебна капітуляція, умови капітуляції
  - еміграція (emigration) — перша хвиля еміграції, політичні біженці
  - прокляття (curse) — церковне прокляття, історичне прокляття
