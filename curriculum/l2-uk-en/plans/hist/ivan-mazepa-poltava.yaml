content_outline:
- points:
  - 'Провокація: Перехід Мазепи на бік шведів — це зрада чи останній шанс на порятунок української автономії? Який вибір зробили
    б ви на його місці?'
  - 'Фрагмент Універсалу Мазепи: "Ми стояли між двома проваллями...". Про які провалля йдеться і що це говорить про становище
    Гетьманщини?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Російська імперська vs українська державницька перспектива. Анафема РПЦ і тавро «Іуди» (Пушкін) проти образу
    борця за незалежність (Байрон, Гюго).'
  - 'Дебат 2: Внутрішня українська опозиція. Чому частина старшини (Кочубей, Іскра) не підтримала гетьмана? Це була особиста
    образа чи інше бачення майбутнього?'
  - '[!epistemic-humility] Ми не знаємо точних деталей таємних перемовин Мазепи. Історики досі сперечаються, коли саме він
    ухвалив остаточне рішення.'
  - 'Глобальна синхронність: Велика Північна війна (1700-1721) як загальноєвропейський конфлікт. Полтавська битва — ключова
    точка, що змінила баланс сил у всій Східній Європі.'
  section: 'Конфліктна карта: Зрадник імперії чи герой нації?'
  words: 900
- points:
  - 'Аналіз дипломатичного листування Мазепи: листи до Карла XII, Станіслава Лещинського. Як він аргументував необхідність
    альянсу?'
  - '[!decolonization] Читаємо Універсали Мазепи до українського народу. Він пояснює свій вчинок як вимушений крок для захисту
    "прав і вольностей військових".'
  - 'Батуринська трагедія як джерело: свідчення про геноцид. Аналіз археологічних знахідок у Батурині — докази масового знищення
    цивільного населення військами Меншикова.'
  - 'Первинне джерело: «Пакти і Конституції» Пилипа Орлика (1710). Як цей документ, написаний у вигнанні, формулює ідею суверенної,
    правової української держави?'
  section: 'Джерела: Дипломатія, терор і право'
  words: 1600
- points:
  - 'Короткострокові наслідки Полтавської поразки: знищення Батурина, ліквідація Запорізької Січі, початок масового терору
    і русифікації, втеча до Бендер.'
  - 'Довгострокові наслідки: Полтава як початок кінця Гетьманщини та народження Російської імперії. Українські еліти втрачають
    політичну ініціативу на 150 років.'
  - '[!myth-buster] Міф про "спонтанну зраду". Рішення Мазепи було результатом багаторічної політики Петра I, спрямованої
    на ліквідацію української автономії.'
  - Постать Пилипа Орлика та перша політична еміграція. Як поразка на полі бою перетворилася на десятиліття дипломатичної
    боротьби за Україну в Європі?
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Мазепа — герой, трагічна фігура чи антигерой? Сформулюйте власну аргументовану відповідь.'
  - '[!anti-hagiography] Чи не була ставка Мазепи на одного абсолютного монарха (Карла XII) проти іншого (Петра I) приречена
    на поразку з точки зору народних інтересів?'
  - 'Зв''язок із сьогоденням: Чому термін "мазепинці" використовувався російською/радянською пропагандою як лайливе слово
    протягом 300 років? Що це говорить про роль Мазепи в історичній пам''яті?'
  - 'Спадок Мазепи сьогодні: від портрета на 10-гривневій купюрі до стандарту НАТО "Мазепа-кеп". Як змінилося ставлення до
    гетьмана в незалежній Україні?'
  section: Дискусія та підсумок
  words: 700
