module: hist-109
level: HIST
sequence: 109
slug: povoienne-vidbudova
version: '2.0'
title: Повоєнна відбудова
subtitle: Post-War Reconstruction
focus: history
pedagogy: CBI
phase: HIST.11 [Post-War Soviet Ukraine]
word_target: 5000
objectives:
- Учень може описати відбудову України після Другої світової війни
- Учень може пояснити масштаб руйнувань та жертв
- Учень може проаналізувати радянську політику відбудови
- Учень може оцінити соціальні зміни повоєнного періоду
content_outline:
- section: 'Вступ: Ціна перемоги'
  points:
  - Україна — найбільш зруйнована територія СРСР — 40-44% загальних втрат Радянського Союзу припало на Україну
  - 'Людські втрати: мільйони загиблих — населення зменшилося з 41 млн (1941) до 27.4 млн (1945); близько 14 млн загальних
    втрат'
  - 'Що означала «перемога» для України — гіркий присмак: повернення терору, фільтраційні табори, депортації; cultural hook:
    Україна як «випалена земля» (тактика обох сторін)'
  words: 850
- section: Масштаб руйнувань
  points:
  - 'Знищені міста та села — зруйновано 714 міст і 28 тис. сіл; engagement hook: [!history-bite] про Хрещатик та шахти Донбасу'
  - 'Промисловість: від нуля — знищено понад 16 тис. підприємств'
  - Сільське господарство в руїнах — втрата техніки і худоби; жінки як тяглова сила
  - Демографічна катастрофа — диспропорція статей, величезна кількість інвалідів війни та сиріт
  words: 850
- section: Відбудова (1945-1950)
  points:
  - П'ятирічки відбудови — четверта п'ятирічка (1946–1950); акцент на кількість, а не якість
  - 'Примусова праця — engagement hook: [!myth-buster] про роль в''язнів ГУЛАГу та полонених'
  - Пріоритет важкої промисловості — 85% інвестицій у металургію, енергетику та ВПК; легка промисловість за залишковим принципом
  - 'Село: голод 1946-1947 років — третій масовий голод; engagement hook: [!decolonization] про експорт 1.7 млн тонн зерна
    під час голоду'
  - Жінки та діти в відбудові — основна робоча сила через нестачу чоловіків
  words: 850
- section: Первинні джерела
  points:
  - Фотографії зруйнованих міст — жінки розбирають завали Хрещатика; землянки
  - 'Спогади учасників відбудови — include quote: Марія Гринь про «пухлих людей» та лист ветерана про байдужість влади'
  - Радянська пропаганда того часу — плакати «Відбудуємо Донбас!» vs реальність землянок
  words: 850
- section: Деколонізаційний погляд
  points:
  - 'Радянський наратив: «героїчна відбудова» — міф про «ентузіазм» та «братню допомогу»'
  - 'Реальність: експлуатація та голод — фінансування індустрії ціною життя селян'
  - Україна як донор для імперії — використання ресурсів для зміцнення центру та Холодної війни
  words: 850
- section: 'Підсумок: Повоєнне суспільство'
  points:
  - 'Нова хвиля русифікації — engagement hook: [!culture] про ліквідацію УГКЦ (1946) та «Ждановщину»'
  - Репресії продовжуються — указ 1947 року про кримінальну відповідальність; боротьба з «буржуазним націоналізмом»
  - Травма поколінь — страх голоду, звичка виживати, тотальна недовіра до держави
  words: 750
vocabulary_hints:
  required:
  - 'відбудова (reconstruction) — contested term: «героїчна відбудова» vs експлуатація'
  - руйнування (destruction) — масштабні руйнування, випалена земля
  - п'ятирічка (five-year plan) — четверта п'ятирічка, виконання плану
  - промисловість (industry) — важка промисловість, відновлення заводів
  - голод (famine) — голод 1946-1947 років, штучний голод
  - втрати (losses) — людські втрати, демографічні втрати
  - демографія (demography) — демографічна яма, диспропорція
  - експлуатація (exploitation) — нещадна експлуатація села
  recommended:
  - примусова праця (forced labor) — використання в'язнів, полонених
  - репатріація (repatriation) — примусове повернення, фільтраційні табори
  - пропаганда (propaganda) — радянська агітація, плакати
  - русифікація (Russification) — наступ на культуру, витіснення мови
  - травма (trauma) — психологічна травма, страх
  - донор (donor) — Україна як ресурсний донор
