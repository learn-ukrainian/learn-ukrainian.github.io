content_outline:
- points:
  - 'Провокація: Чому для України «перемога» у Другій світовій війні мала такий гіркий присмак? І чому радянський наратив
    про «героїчну відбудову» є одним з найбільш цинічних міфів?'
  - 'Фрагмент спогадів: "Люди пухлі з голоду, а владі байдуже..." — як це поєднується з офіційними плакатами "Відбудуємо Донбас!"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська історіографія ("героїчна відбудова", "народний ентузіазм", "братня допомога") vs деколоніальний погляд
    (експлуатація ресурсів України, фінансування індустрії ціною життя селян, відбудова як інструмент остаточного підкорення).'
  - 'Дебат 2: Економічний вибір — пріоритет важкої промисловості та ВПК (85% інвестицій) vs потреби населення. Чи була альтернатива
    такій моделі?'
  - '[!epistemic-humility] Оцінити реальний рівень добровільної праці майже неможливо через тотальну пропаганду та відсутність
    незалежних джерел. Статистика спотворена, а спогади часто забарвлені страхом.'
  - 'Глобальна синхронність: поки в Західній Європі реалізовували План Маршалла для відновлення економіки та добробуту, в
    Україні відбувалося викачування ресурсів, що призвело до масового голоду.'
  section: 'Конфліктна карта: "Героїчний подвиг" чи колоніальна експлуатація?'
  words: 900
- points:
  - Аналіз радянських пропагандистських плакатів («Відбудуємо рідний завод!») — ідеалізована картина vs реальність примусової
    праці.
  - 'Фотографії та кінохроніка: жінки та підлітки розбирають завали Хрещатика вручну; люди живуть в землянках поруч з відбудованими
    гігантами промисловості. Що ці візуальні джерела говорять про пріоритети режиму?'
  - 'Усна історія: спогади Марії Гринь про «пухлих людей» під час голоду 1946-47; листи ветеранів про байдужість влади; свідчення
    про використання праці в''язнів ГУЛАГу та німецьких військовополонених.'
  - '[!decolonization] Читання радянських звітів "проти шерсті": коли в документі йдеться про "трудовий ентузіазм", ми шукаємо
    докази примусу. Експорт 1.7 млн тонн зерна під час голоду — це не "помилка", а акт колоніальної політики.'
  section: 'Джерела: Пропаганда vs реальність'
  words: 1600
- points:
  - 'Демографічна катастрофа: Україна втратила до 44% населення (з 41 млн у 1941 до 27.4 млн у 1945). Диспропорція статей,
    мільйони сиріт та інвалідів, що назавжди змінило соціальну структуру.'
  - 'Економічна деформація: закріплення статусу України як "промислового цеху" імперії з гіпертрофованою важкою промисловістю
    та занедбаною соціальною сферою.'
  - 'Голод 1946-1947: третій штучний голодомор, спричинений надмірними хлібозаготівлями та експортом зерна. Інструмент упокорення
    селянства та остаточного знищення приватного господарства.'
  - '[!myth-buster] Міф про "повоєнне послаблення режиму" спростовується новою хвилею русифікації ("ждановщина"), ліквідацією
    УГКЦ (1946) та продовженням масових репресій проти "буржуазного націоналізму".'
  - 'Соціально-психологічна травма: закріплення в колективній пам''яті страху голоду, тотальної недовіри до держави, патерналізму
    та стратегій виживання, які впливають на українське суспільство й досі.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, чому «перемога» не принесла визволення? Студент формулює відповідь, використовуючи поняття
    колоніальної експлуатації, терору та ідеологічного контролю.'
  - 'Ширше питання: Як імперії використовують відбудову зруйнованих територій для посилення контролю? Порівняння з іншими
    історичними прикладами.'
  - '[!anti-hagiography] Повоєнне покоління часто ідеалізують як "будівничих". Важливо пам''ятати, що багато хто з них були
    не лише жертвами, але й вимушеними учасниками системи, що забезпечувало її функціонування.'
  - 'Зв''язок із сьогоденням: Як досвід повоєнної відбудови та пам''ять про неї впливають на сучасні дискусії про відновлення
    України після російської агресії? Які уроки можна засвоїти?'
  section: Дискусія та підсумок
  words: 700
focus: Post-WWII reconstruction of Ukraine, Soviet exploitation policies, Famine of 1946–1947, decolonization of the "heroic
  reconstruction" myth.
level: HIST
module: hist-109
objectives:
- Аналізувати повоєнну відбудову України, розрізняючи радянські міфи та історичну реальність колоніальної експлуатації
- Пояснювати причини та наслідки демографічної катастрофи та голоду 1946–1947 років
- Критично оцінювати радянську економічну політику та її довгостроковий вплив на Україну
- Формулювати аргументовану позицію щодо зв'язку між історичною травмою повоєнного періоду та викликами сучасності
pedagogy: CBI
persona:
  role: Професор історії, що спеціалізується на економіці та деконструкції імперських міфів. Ставить незручні питання про
    ціну "великих звершень".
  voice: Economic-Historian-Skeptic
