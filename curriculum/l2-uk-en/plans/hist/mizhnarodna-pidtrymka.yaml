content_outline:
- points:
  - 'Провокація: Чому у 2014 році світ відповів на агресію РФ «глибоким занепокоєнням», а у 2022 — безпрецедентною консолідацією?
    Що змінилося за 8 років в Україні та у світі, що зробило таку реакцію можливою?'
  - 'Фрагмент без контексту: «Ми будемо стояти з вами стільки, скільки буде потрібно». Хто, кому і за яких обставин міг сказати
    ці слова на початку 2022 року?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Допомога Україні — це захист демократії чи геополітичний розрахунок? Позиція «ідеалістів» (підтримка як інвестиція
    в глобальну безпеку та демократичні цінності) vs позиція «реалістів» (підтримка як спосіб ослабити геополітичного супротивника
    — Росію — без прямого втручання).'
  - 'Дебат 2: «Достатньо, щоб не програти» чи «Все для перемоги»? Дискусія про темпи та обсяги постачання зброї. Чи не було
    свідоме дозування допомоги стратегією уникнення ескалації та «керованого конфлікту»?'
  - '[!epistemic-humility] Мотивація світових лідерів є складною та часто непублічною. Історики досі сперечаються, які фактори
    були вирішальними: тиск громадянського суспільства, внутрішньополітична боротьба чи реальна оцінка загроз.'
  - 'Глобальна синхронність: Позиція «глобального півдня» (Індія, ПАР, Бразилія) — чому їхній погляд на війну відрізняється
    від євроатлантичного? Конкуренція наративів: «антиколоніальна боротьба України» vs «проксі-війна Заходу проти Росії».'
  section: 'Конфліктна карта: Прагматизм проти цінностей'
  words: 900
- points:
  - 'Аналіз Резолюції Генасамблеї ООН A/RES/ES-11/1 (2.03.2022): 141 голос «за» — що означає ця цифра? Хто утримався або проголосував
    проти і чому? Юридична сила vs символічне значення документа.'
  - 'Промова Володимира Зеленського в Конгресі США (21.12.2022): аналіз риторики. Чому фраза «Ваші гроші — це не благодійність.
    Це інвестиція у глобальну безпеку та демократію» стала ключовою? Як він апелював до американської історії?'
  - 'Закон про ленд-ліз для захисту демократії в Україні (9.05.2022): що це за механізм? Порівняння з ленд-лізом часів Другої
    світової війни. Чому він не став основним інструментом, але мав величезне політичне значення?'
  - '[!decolonization] Голос України став суб''єктним. Замість того, щоб просити допомоги, Україна почала формулювати спільні
    інтереси та пояснювати світу загрози. Це докорінно змінило динаміку відносин, поклавши край політиці «Westsplaining».'
  section: 'Джерела: Резолюції, промови та закони'
  words: 1600
- points:
  - 'Еволюція військової допомоги: від касок та «Стінгерів» до «Леопардів» та F-16. Етапи: «партизанський» (Javelin/NLAW)
    → «артилерійський» (HIMARS-ефект) → «бронетанковий» (танкова коаліція). Як кожен етап змінював ситуацію на фронті?'
  - 'Ефективність економічного тиску: замороження $300 млрд резервів ЦБ РФ, відключення від SWIFT, нафтове ембарго. Накопичувальний
    ефект санкцій як «довга гра», що руйнує російську економіку зсередини.'
  - '[!myth-buster] Руйнування міфу про «другу армію світу» та «недієвість санкцій». Україна довела, що технологічна та мотиваційна
    перевага може здолати кількісну. Санкції не діють миттєво, але роблять сучасну війну неможливою для агресора в довгій
    перспективі.'
  - 'Трансформація НАТО: вступ Фінляндії та Швеції, усвідомлення східним флангом своєї провідної ролі. Україна, не будучи
    членом Альянсу, стала його найефективнішим реформатором.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: то чому світ об''єднався у 2022-му? Студент формулює відповідь, поєднуючи фактори: доведена стійкість
    України, суб''єктність її лідерства, тиск громадянського суспільства у західних країнах та усвідомлення екзистенційної
    загрози.'
  - 'Формат «Рамштайн» як нова модель глобальної безпеки: чи може ця коаліція з 50+ країн стати прообразом нового, більш гнучкого
    та дієвого альянсу демократій?'
  - '[!anti-hagiography] Міжнародна підтримка не була монолітною чи бездоганною. Вона супроводжувалася ваганнями, затримками
    та страхом ескалації. Це був складний процес, а не одностайний порив.'
  - 'Зв''язок із сьогоденням: боротьба за Україну як боротьба за майбутнє світового порядку. Від результату цієї війни залежить,
    чи буде XXI століття епохою «права сили» чи «сили права».'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз безпрецедентної міжнародної коаліції на підтримку України після 24.02.2022: еволюція військової допомоги (Рамштайн,
  ленд-ліз), механізми економічного тиску (санкції, ізоляція) та утвердження геополітичної суб''єктності України.'
