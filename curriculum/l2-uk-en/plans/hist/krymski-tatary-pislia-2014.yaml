content_outline:
- points:
  - 'Провокаційне питання: Чи є окупація Криму 2014 року новою війною, чи лише фінальним актом багатовікової драми знищення
    ідентичності? 3 березня 2014 року Решат Аметов вийшов на одиночний пікет проти окупації. Його тіло знайшли за 12 днів
    зі слідами тортур. Чому історія, що мала б залишитись у підручниках про 1944 рік, повторилася в XXI столітті?'
  - 'Фрагмент без контексту: «Ми не зломлені і не маємо наміру здаватися. Ми лише ствердилися у своїй правоті і в тому, що
    обрали правильний шлях». Хто і звідки міг написати ці слова у 2021 році?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Російська пропаганда vs реальність репресій. РФ стверджує про «законне» включення Криму та боротьбу з «екстремізмом».
    Факти: заборона Меджлісу (2016) як «екстремістської організації», що криміналізувала представницький орган корінного народу.'
  - 'Дебат 2: Стратегії спротиву. Міжнародна дипломатія та правозахист (позиція Меджлісу в екзилі) vs громадянська непокора
    та самоорганізація на місцях (рух «Кримська солідарність»). Чи можуть ці стратегії існувати одна без одної?'
  - '[!epistemic-humility] Точну кількість політичних в''язнів та викрадених людей встановити неможливо через окупаційний
    режим. Правозахисники оперують верифікованими списками, але реальні цифри можуть бути значно вищими.'
  - 'Глобальна синхронність: Поки РФ фабрикувала справи «Хізб ут-Тахрір», у Китаї розгорталися масові репресії проти уйгурів
    у Сіньцзяні (табори «перевиховання»), що також кваліфікуються як геноцид. Паралелі у методах «боротьби з тероризмом» для
    придушення корінних народів.'
  section: 'Конфліктна карта: ''Законність'' проти правди'
  words: 900
- points:
  - 'Аналіз листів політв''язнів: читання уривків з листів Нарімана Джеляла. Аналіз риторики: мова не жертви, а борця. Як
    текст, написаний в ув''язненні, стає інструментом спротиву?'
  - 'Судові документи та звіти: розбір звіту Human Rights Watch про справу «Хізб ут-Тахрір». Джерело критики: як правозахисники
    доводять фабрикацію справ? Які докази використовує звинувачення (таємні свідки, релігійна література) і чому вони не є
    легітимними?'
  - 'Публічні заяви лідерів: аналіз промов Мустафи Джемілєва та Рефата Чубарова на міжнародних майданчиках (ООН, ПАРЄ). Які
    ключові меседжі вони доносять? На яких юридичних та історичних аргументах будують свою позицію?'
  - '[!decolonization] Читання свідчень активістів «Кримської солідарності». Це не просто «допомога жертвам», а низова мережа
    самоорганізації, що виконує функції паралізованої держави та знищених інституцій. Окупанти бачать у ній більшу загрозу,
    ніж у збройному підпіллі.'
  section: 'Джерела: Голоси спротиву'
  words: 1600
- points:
  - 'Короткострокові наслідки: руйнування політичного та громадського життя, хвиля вимушених переселенців, атмосфера страху,
    економічний занепад півострова.'
  - 'Довгострокові наслідки: політика заміщення населення (витіснення татар, завезення росіян) як інструмент гібридного геноциду.
    Формування спільної українсько-кримськотатарської ідентичності на основі спільної боротьби проти спільного ворога.'
  - 'Юридичний вимір: міжнародні судові процеси та їх обмежена ефективність. Ігнорування Росією рішення Міжнародного суду
    ООН про скасування заборони Меджлісу як демонстрація зневаги до міжнародного права.'
  - '[!myth-buster] Розвінчання міфу про «безкровну анексію». Детальний аналіз перших репресивних дій: викрадення та вбивства
    активістів (Решат Аметов), обшуки, створення атмосфери терору, що передували формальній анексії та спростовують її «мирний»
    характер.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Спираючись на матеріал модуля, студент формулює аргументовану відповідь: чому події після 2014
    року є не просто «порушенням прав», а продовженням геноцидної політики імперії щодо корінного народу Криму.'
  - 'Зв''язок із сьогоденням: примусова мобілізація кримських татар до армії РФ для участі у війні проти України (з 2022)
    як нова, цинічна форма етнічної чистки.'
  - '[!anti-hagiography] Спротив не є монолітним. Існують різні погляди всередині кримськотатарського суспільства щодо тактики
    боротьби, ролі лідерів та майбутнього статусу Криму. Важливо розуміти ці нюанси, не ідеалізуючи боротьбу.'
  - 'Шлях до справедливості: яке майбутнє чекає на Крим? Обговорення концепції національно-територіальної автономії кримських
    татар у складі України як єдиного можливого шляху для збереження нації та відновлення історичної справедливості.'
  section: Дискусія та підсумок
  words: 700
focus: 'Repressions against Crimean Tatars after 2014 annexation: ban of the Mejlis, fabricated cases (Hizb ut-Tahrir), forced
  mobilization, population replacement. Forms of resistance: international advocacy, Crimean Solidarity, and the role of exiled
  leaders.'
level: HIST
module: hist-128
objectives:
- Аналізувати та описувати форми та методи репресій окупаційної влади РФ проти кримських татар після 2014 року
- Пояснювати роль Меджлісу як представницького органу та наслідки його заборони
- Розрізняти російську пропаганду та фактичний стан справ, спираючись на звіти міжнародних правозахисних організацій
- Аргументувати, чому політика РФ щодо кримських татар може кваліфікуватися як гібридний геноцид
