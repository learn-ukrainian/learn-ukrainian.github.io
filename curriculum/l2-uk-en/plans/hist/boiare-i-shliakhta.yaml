content_outline:
- points:
  - 'Провокаційне питання: «Золота вольність» шляхти — це коріння української демократії чи формула олігархічної анархії?'
  - Що означає бути "вільною людиною у вільній державі"? Коротка цитата з Єдлінського привілею (1430) про особисту недоторканність
    шляхтича без суду.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Gente Ruthenus, natione Polonus. Це формула асиміляції та зради чи прагматична модель подвійної ідентичності
    для інтеграції в політичну націю Речі Посполитої?'
  - 'Дебат 2: Шляхетська "демократія" vs. Магнатська олігархія. Чи була "золота вольність" реальною для всієї шляхти, чи лише
    фасадом для всевладдя «королев''ят» на кшталт Острозьких та Вишневецьких?'
  - '[!epistemic-humility] Історики сперечаються, чи можна вважати шляхетську політичну культуру прото-демократичною, чи це
    була лише кастова система, що виключала 90% населення.'
  - 'Глобальна синхронність: У той час як у Речі Посполитій король був обмежений сеймом і шляхтою, у Франції та Іспанії зміцнювався
    абсолютизм, а в Московії Іван Грозний запроваджував опричнину, знищуючи боярство як клас.'
  section: 'Конфліктна карта: Еліта на службі чи у власності?'
  words: 900
- points:
  - 'Аналіз тексту Литовського статуту (1588): "Ніякими листами нашими господарськими в маєтках не будемо нікому шкодити,
    ані вольностей уживати перешкоджати". Як цей пункт обмежував владу монарха?'
  - 'Грамота Сигізмунда ІІ Августа (1569) як гарантія прав "руського народу": аналіз обіцянок зберегти мову, віру та місцеві
    уряди при інкорпорації до Корони Польської.'
  - 'Погляд з іншого боку: уривок з Галицько-Волинського літопису про свавілля галицьких бояр. "Не почавивши бджіл, меду не
    їсти" — що означала ця боярська приказка?'
  - '[!decolonization] Читання Литовських статутів як доказу високої правової культури, що існувала на українських землях.
    Це не "дике поле", а простір європейського права, на відміну від московського самодержавства, де воля царя була єдиним
    законом.'
  section: 'Джерела: Статут, Привілей, Літопис'
  words: 1600
- points:
  - 'Короткострокові наслідки: економічний розквіт через фільваркові господарства та експорт зерна, але одночасно посилення
    кріпацтва.'
  - 'Довгострокові наслідки: формування політичної культури, заснованої на договорі, законі та праві на опір (rokosz). Ця
    традиція буде успадкована козацькою старшиною, а згодом — українським визвольним рухом.'
  - '[!myth-buster] Спростування імперського міфу про "відсутність власної еліти". Українська шляхта була не просто інтегрована
    в європейську аристократію — вона була її співтворцем. Герби, замки, меценатство (Острозька академія) — докази тяглості
    елітарної культури.'
  - 'Порівняння оцінок: Грушевський бачив у шляхті переважно егоїстичну, полонізовану верству. Сучасні історики (Наталя Яковенко)
    наголошують на її ролі як носія руської ідентичності та політичної суб''єктності.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож "золота вольність" — це все-таки більше про демократію чи про анархію? Студент формулює відповідь
    на основі джерел та аргументів з модуля.'
  - 'Зв''язок із сьогоденням: Чи можна побачити спадщину шляхетської культури опору центральній владі в сучасних українських
    Майданах? Де межа між громадянським спротивом і руйнуванням держави?'
  - '[!anti-hagiography] "Золота вольність" існувала за рахунок поневолення селян. Не можна ідеалізувати шляхетську добу як
    "золотий вік", ігноруючи глибокий соціальний розкол тогочасного суспільства.'
  section: Дискусія та підсумок
  words: 700
focus: Еволюція української еліти від бояр до шляхти, політична культура Речі Посполитої, Литовські Статути, феномен "золотої
  вольності", та деколонізаційна переоцінка ролі шляхти в історії України
level: HIST
module: hist-025
objectives:
- Пояснювати різницю між боярством, зем'янами та шляхтою як етапами еволюції української еліти
- Аналізувати Литовські статути та королівські привілеї як першоджерела для розуміння прав та обов'язків шляхти
- Критично оцінювати імперський міф про "націю попів та хлопів", протиставляючи йому дані про інтеграцію української шляхти
  в європейську політичну систему
- Формулювати аргументовану позицію щодо спадкоємності політичних традицій шляхти в сучасній Україні
pedagogy: CBI
persona:
  role: Професор історії права, що розглядає шляхту не як соціальний клас, а як носія унікальної політичної та правової культури,
    альтернативної московському самодержавству.
  voice: Constitutional-Historian
