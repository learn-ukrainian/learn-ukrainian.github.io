content_outline:
- points:
  - 'Провокація: Чому мільйони українців вийшли на вулицю взимку 2013-2014? Чи справді все почалося лише через відмову від
    Угоди про асоціацію з ЄС?'
  - '21 листопада 2013: пост Мустафи Найєма як каталізатор. Чому один допис у Facebook зміг запустити революцію?'
  - 'Перший Майдан: студенти та європейські прапори — романтичний етап. Лекції на відкритому повітрі, пісні, відсутність партійної
    символіки. Чи могла революція залишитись мирною?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Українська інтерпретація (народне повстання за гідність) vs російський наратив («державний
    переворот», «путч», «радикали»). Аналіз термінології як зброї в інформаційній війні.'
  - 'Дебат 2: Чи був Майдан спонтанним, чи організованим? Роль громадянського суспільства та волонтерських рухів проти міфів
    про «зовнішнє управління».'
  - '[!epistemic-humility] Як історики працюють із такими нещодавніми подіями? Проблема браку дистанції, емоційної залученості
    та суперечливих свідчень.'
  - 'Глобальна синхронність: Євромайдан у контексті світових протестних рухів 2010-х (Occupy Wall Street, Арабська весна).
    Що спільного та що унікально українського?'
  section: 'Конфліктна карта: Народне повстання чи «державний переворот»?'
  words: 900
- points:
  - '«Звіряче побиття» студентів 30 листопада: аналіз відеозаписів та свідчень очевидців. Як цей акт насильства змінив характер
    протесту?'
  - 'Закони 16 січня («диктаторські закони»): розбір тексту законів. Які саме права обмежувалися і чому це викликало радикалізацію
    протесту?'
  - 'Перші жертви на Грушевського (Нігоян, Жизневський): аналіз кадрів «Вогнехрещі». Дерев''яні щити проти бойової зброї.'
  - '[!myth-buster] Розстріли на Інститутській 18-20 лютого. Аналіз балістичних експертиз та журналістських розслідувань.
    Спростування міфу про «снайперів Майдану» та «печиво Нуланд» через дані про волонтерську самоорганізацію.'
  - 'Втеча Януковича: постанова ВР про самоусунення президента. Юридичний та політичний аналіз цього рішення.'
  - 'Джерело: Уривки з усної історії Майдану, щоденникові записи, пости в соцмережах. «Ми вийшли не за Європу, ми вийшли за
    гідність...»'
  section: 'Джерела: Свідчення очевидців та хроніка подій'
  words: 1600
- points:
  - 'Небесна Сотня як новий пантеон героїв: аналіз соціального та вікового складу загиблих. Чому люди різного віку (17–83)
    та професій свідомо йшли на смерть?'
  - '[!biography] Сергій Нігоян — вірменин, що читав Шевченка. Його постать як символ формування модерної політичної нації.'
  - «Пливе кача по Тисині» як реквієм революції. Як народна пісня набула нового, сакрального значення.
  - 'Євромайдан як антиколоніальна революція: «Ленінопад» як символічне прощання з радянським минулим. Відмова від терміну
    «пострадянський простір».'
  - 'Народження громадянського суспільства: виникнення потужного волонтерського руху, який став опорою армії після початку
    російської агресії.'
  - Перехід російськомовних на українську як акт політичного самовизначення — мовна ідентичність після Майдану.
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож чому революція отримала назву «Революція Гідності»? Студент формулює відповідь, спираючись
    на хронологію, свідчення та аналіз.'
  - 'Перемога і початок війни: чи була анексія Криму та війна на Донбасі неминучою ціною за перемогу Майдану?'
  - '[!anti-hagiography] Критичний погляд на наслідки: чи відбулася реальна люстрація? Чи були покарані винні у злочинах проти
    протестувальників?'
  - 'Зв''язок із сьогоденням: як спадщина Майдану впливає на стійкість України у повномасштабній війні з Росією?'
  section: Дискусія та підсумок
  words: 700
focus: Causes, chronology, and significance of the Revolution of Dignity (2013-2014), from student protests to the overthrow
  of Yanukovych, analyzing its nature as an anti-colonial act and its consequences, including the start of the Russo-Ukrainian
  War.
