- Аналізувати причини, перебіг та безпосередні наслідки Революції Гідності
- Розрізняти українську інтерпретацію подій та ключові наративи російської дезінформації
- Пояснювати роль громадянського суспільства, самоорганізації та волонтерського руху в успіху протестів
- Оцінювати символічне значення Небесної Сотні та місце Майдану в процесі української деколонізації
