content_outline:
- points:
  - 'Провокація: Після руйнування греблі природа почала повертати собі Великий Луг, козацьку «Атлантиду». Чи варто відновлювати
    ГЕС, чи залишити дику природу, що народилася з трагедії?'
  - 'Свідчення без контексту: «Вода прибувала так швидко, що ми встигли схопити лише документи. Наш дім зник за годину». Що
    стоїть за цими словами?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський проєкт «Великого плану перетворення природи» vs українська історична пам''ять. Чи була Каховська
    ГЕС від самого початку злочином проти історії та екології (затоплення Великого Лугу)?'
  - 'Дебат 2: Відновлювати ГЕС для енергетики та зрошення vs зберегти відроджений Великий Луг для історії та екосистеми. Яким
    є правильний шлях для повоєнної України?'
  - '[!epistemic-humility] Аргументи «за» відновлення (енергетична безпека, вода для Криму, сільське господарство) є прагматичними,
    але чи можна виміряти прагматикою втрату історичної спадщини та унікального біоценозу?'
  - 'Глобальна синхронність: руйнування інфраструктури як зброя (Сирія, Ємен) vs масштабні техногенні катастрофи (Чорнобиль,
    Фукусіма). Де місце Каховки в цьому ряду?'
  section: 'Конфліктна карта: Справедливість vs Ефективність'
  words: 900
- points:
  - 'Сейсмічні дані та розвідка: аналіз даних NORSAR (Норвегія) та ГУР про внутрішній підрив у машинній залі 6 червня 2023
    о 02:50.'
  - 'Супутникові знімки: Planet Labs, Maxar. Відстеження руйнування греблі, поширення зони затоплення (80 населених пунктів),
    та поступового «зникнення» водосховища.'
  - 'Свідчення очевидців: збір спогадів жителів Херсонщини про «велику воду», евакуацію під обстрілами, долю покинутих на
    лівому березі.'
  - 'Екологічні звіти: аналіз проб води (150 тонн мастила), звіти про масовий мор риби, знищення ендемічних видів, забруднення
    Чорного моря.'
  - '[!decolonization] Читання радянських звітів про будівництво ГЕС (1950-ті) крізь призму екоциду. «Перемога над природою»
    як імперський наратив, що ігнорує довготривалі наслідки та людські долі.'
  section: 'Джерела: Хроніка одного злочину'
  words: 1600
- points:
  - 'Гуманітарна катастрофа: ~40 тис. людей у зоні ризику, виклики евакуації, проблема питної води, розмиті кладовища та скотомогильники.'
  - 'Економічний колапс регіону: знищення системи зрошення для півдня України, загроза пустелізації, ризики для Запорізької
    АЕС, втрата водопостачання для Криму.'
  - 'Екологічний злам: короткострокові (загибель біоценозу водосховища) та довгострокові наслідки (відродження екосистеми
    Великого Лугу, зміна мікроклімату).'
  - 'Правова кваліфікація: чому це воєнний злочин та екоцид за міжнародним правом. Докази відповідальності РФ (контроль над
    станцією, дані про мінування).'
  - '[!myth-buster] Російський наратив про «самопідрив» або «обстріл ЗСУ» спростовується технічними даними про характер руйнувань
    (внутрішній вибух) та повним контролем РФ над об''єктом з лютого 2022 року.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, відновлювати чи залишити? Студент формулює зважену відповідь, використовуючи екологічні,
    економічні, історичні та гуманітарні аргументи з модуля.'
  - 'Каховка як символ: що ця трагедія говорить про методи ведення війни Росією та про крихкість сучасної цивілізації?'
  - 'Унікальний експеримент: світ спостерігає за відродженням природи на місці водосховища. Які уроки людство може винести
    з цієї трагедії?'
  - '[!anti-hagiography] Уникаючи ностальгії: чи не романтизуємо ми «дику природу» Великого Лугу, забуваючи про економічні
    потреби та добробут мільйонів людей, що залежали від водосховища?'
  section: Дискусія та підсумок
  words: 700
focus: Підрив Каховської ГЕС 6 червня 2023 року, екологічні та гуманітарні наслідки, кваліфікація як воєнний злочин та екоцид,
  дебати про майбутнє Великого Лугу.
level: HIST
module: hist-135
objectives:
- Описувати хронологію, причини та масштаб руйнування Каховської ГЕС, спираючись на різні типи джерел
- Аналізувати гуманітарні, економічні та екологічні наслідки катастрофи в коротко- та довгостроковій перспективі
- Пояснювати, чому підрив ГЕС кваліфікується як воєнний злочин та екоцид за міжнародним правом
- Формулювати та аргументувати власну позицію в дебатах щодо майбутнього регіону (відбудова ГЕС vs. збереження Великого Лугу)
