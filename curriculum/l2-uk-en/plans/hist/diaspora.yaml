content_outline:
- points:
  - 'Провокація: Радянська пропаганда називала їх «зрадниками», а вони себе — «хранителями». Ким насправді були українські
    емігранти ХХ століття? Чи можна зберегти націю, покинувши батьківщину?'
  - 'Фрагмент без контексту: "Ми виїхали, щоб Україна жила". Що означає ця фраза — виправдання втечі чи політична місія?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хранителі vs. Зрадники. [!decolonization] Розглядаємо наратив радянської пропаганди ("буржуазні націоналісти")
    проти самосприйняття діаспори (Уряд УНР в екзилі як легітимний спадкоємець).'
  - 'Дебат 2: Порятунок vs. Побудова. Чи була еміграція переважно актом економічного виживання (перша хвиля), чи свідомим
    політичним проєктом збереження державності (друга хвиля)?'
  - '[!epistemic-humility] Оцінити мотивацію мільйонів людей складно. Джерела фіксують і прагнення до кращого життя, і глибоку
    політичну місію, часто в однієї і тієї ж людини.'
  - 'Глобальна синхронність: Українська політична еміграція після УНР порівняно з іншими «урядами в екзилі» ХХ століття (польський,
    балтійські, іспанський).'
  section: 'Конфліктна карта: Місія чи втеча?'
  words: 900
- points:
  - 'Листи першої хвилі: Аналіз листів Івана Пилипіва та Павлини Геникової. Що вони пишуть про Канаду? Як описують створення
    перших громад та церков? "Люди ангельські, всі дуже інтелігентні".'
  - 'Документи УНР в екзилі: Аналіз актів та указів уряду в екзилі. Як вони підтримували ідею неперервності української державності?
    Роль Української Господарської Академії в Подєбрадах.'
  - 'Таборова література (ДіПі): Уривки з "Планети Ді-Пі" Уласа Самчука та "Тигроловів" Івана Багряного. Як література фіксувала
    унікальний досвід життя в таборах для переміщених осіб? Який образ України вони створювали?'
  - '[!decolonization] Читання цих джерел — це акт деколонізації. Вони показують українців як активних суб''єктів історії,
    що будували інституції, розвивали науку та культуру поза метрополією і всупереч її тиску.'
  section: 'Джерела: Голоси з-поза меж'
  words: 1600
- points:
  - 'Короткострокові наслідки: Створення "альтернативної України" в екзилі з науковими інституціями, видавництвами, політичними
    центрами, що були вільні від радянської цензури.'
  - 'Довгострокові наслідки: Лобіювання українських інтересів на Заході (Тиждень поневолених народів, Комісія Мейса по Голодомору),
    фінансова та політична підтримка дисидентського руху в УРСР.'
  - '[!myth-buster] "Табори ДіПі були місцем розпачу". Насправді, це були "держави в мініатюрі" з власними школами, театрами,
    видавництвами та потужним інтелектуальним життям (Мистецький український рух).'
  - 'Спадкоємність: Символічний акт передачі клейнодів УНР президенту Кравчуку 22 серпня 1992 року. Чому це було важливо?
    Це утверджувало спадкоємність сучасної України від УНР, а не від УРСР.'
  - 'Оцінка істориків: Порівняння поглядів Ореста Субтельного та Сергія Плохія на роль діаспори. Чи була вона ключовим фактором
    у здобутті незалежності?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, "хранителі" чи "зрадники"? Студент формулює відповідь, використовуючи докази з модуля,
    щоб оцінити внесок діаспори.'
  - 'Зв''язок із сьогоденням: Як досвід попередніх хвиль еміграції допомагає зрозуміти "четверту хвилю" після 2022 року? Що
    змінилося з появою інтернету та миттєвого зв''язку? Концепція "Global Ukraine".'
  - '[!anti-hagiography] Романтизація життя в еміграції vs реальність: ностальгія, асиміляція, втрата зв''язків. Чи завжди
    діаспора була єдиною і монолітною у своїх поглядах?'
  - 'Майбутнє діаспори: Чи перетвориться українська діаспора на глобальну мережу професіоналів, подібну до єврейської чи ірландської?'
  section: Дискусія та підсумок
  words: 700
focus: Three waves of Ukrainian emigration (economic, political, post-WWII), the creation of political and cultural institutions
  in exile, and the diaspora's role in preserving Ukrainian statehood and identity.
level: HIST
module: hist-118
objectives:
- Аналізувати причини та характер трьох великих хвиль української еміграції ХХ століття
- Критично оцінювати роль діаспори у збереженні української державності та ідентичності, протиставляючи радянські та українські
  наративи
- Інтерпретувати первинні джерела (спогади, листи, документи) для розуміння досвіду життя в еміграції
- Пояснювати зв'язок між історичною місією діаспори та її роллю в підтримці України сьогодні
