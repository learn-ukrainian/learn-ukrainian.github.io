module: hist-118
level: HIST
sequence: 118
slug: diaspora
version: '2.0'
title: 'Діаспора: Ковчег держави'
subtitle: 'The Diaspora: Ark of the Nation'
content_outline:
- section: 'Вступ: Чому українці покидали батьківщину'
  points:
  - 'Три великі хвилі еміграції — економічна (земля), політична (поразка), біженська
    (війна) — відмінність української діаспори: сильна політична складова («альтернативна
    Україна»)'
  - Політичні та економічні причини — «ми виїхали, щоб Україна жила» (політична місія)
    — місія збереження легітимності влади та культури
  - Збереження нації поза Україною — [!decolonization] Радянська пропаганда називала
    емігрантів «зрадниками», тоді як вони були «хранителями» державності (Ковчег)
- section: Перша хвиля (1880-1914)
  points:
  - Економічна еміграція до Америки та Канади — [!history-bite] Іван Пилипів та Василь
    Єлиняк (1891); везли зерно, змінюючи аграрну карту Канади
  - Формування українських громад — «люди ангельські, всі дуже інтелігентні» (Павлина
    Геникова, 1898) — роль греко-католицьких священиків як лідерів
  - Церква як центр громадського життя — будівництво церков та читалень «Просвіти»
    — «ми будували Україну на чужині»
- section: Друга хвиля (1920-1939)
  points:
  - Політична еміграція після поразки УНР — «інтелектуальна еміграція» військових
    та еліти — центри у Варшаві, Празі, Парижі
  - Уряд УНР в екзилі — Тарнів (Польща), Париж; легітимний спадкоємець державності
    (1917-1992) — збереження державних атрибутів
  - Наукові та культурні інституції — [!context] Українська Господарська Академія
    (Подєбради), «український Оксфорд» у Празі — розвиток науки без радянської цензури
- section: Третя хвиля (ДіПі, 1945-1950)
  points:
  - Переміщені особи після Другої світової — близько 200 тисяч українців; відмова
    від «радянської родіни» (страх репресій)
  - Табори ДіПі в Німеччині та Австрії — [!myth-buster] «держави в мініатюрі» з театрами,
    школами та газетами (МУР — Мистецький український рух)
  - 'Розселення у світі: США, Канада, Австралія — масовий переїзд після закриття таборів
    у 1950-х — формування потужних громад'
  - Створення нових інституцій — Світовий Конгрес Вільних Українців (СКВУ, 1967) —
    консолідація політичних сил
- section: Первинні джерела
  points:
  - Спогади емігрантів — Іван Багряний («Тигролови»), Улас Самчук («Планета Ді-Пі»)
    — фіксація досвіду таборового життя
  - Документи українських організацій — акт передачі клейнодів УНР президенту Кравчуку
    (22 серпня 1992) — символ спадкоємності
  - Діаспорна преса — газети «Свобода», «Українська думка» — хроніка життя громади
- section: Внесок діаспори
  points:
  - Збереження мови та культури — Енциклопедія українознавства (ЕУ), пам'ятники Шевченку
    (Вашингтон) — фінансова підтримка культури
  - Лобіювання визнання Голодомору — Комісія Мейса; Тиждень поневолених народів (Captive
    Nations Week) у США
  - Підтримка незалежності 1991 року — [!quote] Микола Плав'юк про спадкоємність УНР,
    а не УРСР — тиск на західні уряди
  - Допомога у війні 2022 року — глобальна мережа підтримки, лобізм зброї та санкцій
    — діаспора як «голос України» у світі
- section: 'Підсумок: Діаспора сьогодні'
  points:
  - Четверта хвиля (після 2022) — статус «тимчасового захисту» vs класична еміграція
    — надія на повернення
  - Зв'язок з Україною в цифрову епоху — [!reflection] зміна поняття ностальгії та
    асиміляції через інтернет — миттєвий зв'язок
  - Майбутнє діаспори — глобальне українство як мережа, а не географічне розпорошення
    — концепція «Global Ukraine»
vocabulary_hints:
  required:
  - 'діаспора (diaspora) — «Ковчег держави», західна діаспора; collocation: українська
    діаспора'
  - 'еміграція (emigration) — хвилі еміграції (waves of emigration), трудова/політична
    еміграція; context: вимушена еміграція'
  - 'імміграція (immigration) — країна поселення (host country); context: імміграційні
    квоти'
  - 'громада (community) — церковна громада, українська громада; collocation: згуртування
    громади'
  - 'біженець (refugee) — статус біженця (refugee status), політичний біженець; context:
    воєнні біженці'
  - 'переміщена особа (displaced person) — табори ДіПі (DP camps), «скитальці»; context:
    таборове життя'
  - 'екзиль (exile) — уряд в екзилі (government in exile), література в екзилі; context:
    жити в екзилі'
  - 'асиміляція (assimilation) — збереження ідентичності (preserving identity), загроза
    асиміляції; context: мовна асиміляція'
  recommended:
  - 'репатріація (repatriation) — примусова репатріація (forced repatriation) до СРСР;
    context: уникнути репатріації'
  - 'лобіювання (lobbying) — політичний лобізм, українське лобі; context: лобіювання
    інтересів'
  - 'культурна спадщина (cultural heritage) — збереження спадщини; context: передача
    спадщини'
  - 'ідентичність (identity) — національна ідентичність; context: втрата ідентичності'
  - 'інтеграція (integration) — інтеграція в суспільство; context: успішна інтеграція'
  - 'двомовність (bilingualism) — українські суботні школи; context: збереження мови'
