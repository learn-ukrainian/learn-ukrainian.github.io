content_outline:
- points:
  - 'Провокація: Як 80-річний "дід" міг бути найефективнішим менеджером і найзагрозливішим ворогом Російської імперії, що
    його боялися більше, ніж турецького султана?'
  - Фрагмент спогадів сучасника про енергію та ділову хватку Калнишевського — без вказання автора.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Кінець Січі — неминучий фінал "непотрібної" автономії чи акт колоніального геноциду з боку імперії, що боялася
    альтернативної моделі суспільства?'
  - 'Дебат 2: Наказ Калнишевського не чинити опір — мудре рішення для збереження народу чи акт капітуляції, що прискорив кінець
    козацької вольниці?'
  - '[!epistemic-humility] Історики досі сперечаються, чи був шанс на збройний спротив, чи 100-тисячна армія Текелія не залишала
    жодних шансів.'
  - 'Глобальна синхронність: Світ у 1775 році — поки козаки втрачали свою республіку, американські колоністи починали війну
    за незалежність від Британської імперії. Паралелі та відмінності боротьби за свободу.'
  section: 'Конфліктна карта: Зрада чи прагматизм?'
  words: 900
- points:
  - Аналіз указу Катерини ІІ про ліквідацію Січі. Розбір офіційних причин та прихованих мотивів.
  - '[!decolonization] Читання імперського документа "проти шерсті": як риторика про "цивілізацію" та "порядок" маскує колоніальне
    завоювання.'
  - 'Аналіз листів Калнишевського до Потьомкіна та його останньої промови (за переказами): спроба дипломатії, відчай чи стратегічний
    розрахунок?'
  - 'Джерельна критика: наскільки надійними є спогади про останній день Січі? Чиїм інтересам вони слугували?'
  section: 'Джерела: Указ про ліквідацію та голос останнього отамана'
  words: 1600
- points:
  - '[!myth-buster] Калнишевський — не бідний мученик, а один з найбагатших людей свого часу. Його "олігархічна" республіка
    була економічно успішнішою за кріпосницькі маєтки Росії, і саме це стало вироком для Січі.'
  - 'Короткострокові наслідки: інкорпорація земель до імперії, перетворення козаків на селян, знищення унікального військового
    та соціального устрою.'
  - 'Довгострокові наслідки: створення міфу про "втрачений рай", формування образу "останнього козака", закріплення в національній
    пам''яті ідеї про підступність імперії.'
  - 'Порівняння оцінок: романтичний погляд Яворницького vs прагматичний аналіз Субтельного vs деколоніальна оптика Плохія.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Так чому імперія боялася 80-річного отамана? Тому що він був не просто воїном, а ефективним державним
    менеджером, що будував альтернативну, успішнішу модель суспільства.'
  - 'Зв''язок із сьогоденням: Сьогоднішня боротьба України — це також боротьба двох моделей: демократичної та авторитарної.
    Історія Калнишевського показує, що імперія завжди боїться успішного сусіда більше, ніж сильного ворога.'
  - '[!anti-hagiography] Уникаючи ідеалізації: чи була "золота осінь" Калнишевського дійсно золотою для простих козаків та
    селян, чи це був розквіт олігархічної верхівки?'
  section: Дискусія та підсумок
  words: 700
focus: The economic and political reasons for the destruction of the Zaporozhian Sich, the figure of Petro Kalnyshevskyi as
  a manager and statesman, and the decolonial interpretation of the end of Cossack autonomy.
level: HIST
module: hist-073
objectives:
- Аналізувати економічні та геополітичні причини ліквідації Запорозької Січі Російською імперією.
- Критично оцінювати постать Петра Калнишевського як державного менеджера, а не лише як військового лідера.
- Інтерпретувати першоджерела (укази, листи, спогади) з деколоніальної перспективи, розрізняючи офіційну риторику та справжні
  мотиви.
- Формулювати обґрунтовану позицію щодо історичної ролі Калнишевського та значення його спадщини для сучасної України.
pedagogy: CBI
