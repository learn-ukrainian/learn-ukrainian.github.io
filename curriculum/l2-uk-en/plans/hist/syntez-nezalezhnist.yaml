objectives:
- Синтезувати знання про ключові події та процеси в історії незалежної України (1991-2014)
- Пояснювати головні виклики, що стояли перед молодою українською державою
- Аналізувати Помаранчеву революцію та Революцію Гідності як ключові етапи деколонізації та розриву з імперією
- Формулювати аргументовану позицію щодо незворотності європейського вибору України
