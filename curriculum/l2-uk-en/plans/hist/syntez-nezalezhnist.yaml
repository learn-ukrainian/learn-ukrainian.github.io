slug: syntez-nezalezhnist
version: '2.0'
title: 'Синтез: Незалежна Україна'
subtitle: 'Synthesis: Independent Ukraine'
content_outline:
- section: 'Вступ: Від імперії до нації'
  points:
  - '1991: народження держави — відновлення державності, а не просто вихід з СРСР;
    тяглість від УНР та УПА'
  - Виклики незалежності — ментальний зсув від УРСР до політичної нації; Декларація
    про суверенітет (16 липня 1990) як предтеча
  - 'Три десятиліття розвитку — від референдуму 1 грудня 1991 (90,32% «за») до Революції
    Гідності; cultural hook: підтримка незалежності навіть комуністами через страх
    перед ГКЧП [!history-bite]'
- section: Періодизація
  points:
  - '1991-2004: формування держави — епоха Кравчука (символи, інфляція) та Кучми (стабілізація,
    Конституція 1996, «багатовекторність»)'
  - '2004-2010: Помаранчева революція — демократичний прорив проти фальсифікацій;
    зламаний сценарій спадкоємності влади; [!context] порівняння з іншими пострадянськими
    країнами'
  - '2010-2014: реванш та криза — епоха Януковича; Харківські угоди, авторитарний
    поворот, підготовка до здачі суверенітету'
  - Революція Гідності — листопад 2013-лютий 2014; Небесна Сотня (107 героїв); остаточний
    цивілізаційний розрив з імперією
- section: Ключові теми
  points:
  - Олігархія та демократія — формування кланово-олігархічної системи за часів Кучми
    як гальмо розвитку
  - Європейський вибір — коливання між ЄС та РФ; відмова від багатовекторності на
    користь євроінтеграції
  - Російський вплив — використання енергетики (газ) та культури (soft power) як зброї;
    міф про «розкол» Схід-Захід [!myth-buster]
  - Громадянське суспільство — феномен самоорганізації (Майдани, волонтерство) як
    головна відмінність від Росії
- section: Первинні джерела в синтезі
  points:
  - Документи незалежності — Акт проголошення незалежності (автор Левко Лук'яненко);
    Конституція 1996 року
  - Голоси революцій — виступи на Майданах; живе слово, що мобілізувало мільйони;
    [!quote] цитата з «Заповіту» Чорновола або промови Лук'яненка
  - Журналістські розслідування — справа Ґонґадзе та акція «Україна без Кучми»; роль
    ЗМІ у викритті корупції
- section: Деколонізаційний погляд
  points:
  - Постколоніальні виклики — стан «гібридної незалежності» до 2014 (політично окремо,
    економічно/культурно залежно)
  - Незавершена деколонізація — русифікація vs українізація; мова як питання безпеки
    [!decolonization]
  - 2014 як точка повороту — кінець епохи невизначеності; початок справжньої Війни
    за незалежність
- section: 'Підсумок: До війни'
  points:
  - Уроки 1991-2014 — демократія вразлива без сильних інституцій; нейтралітет (Будапештський
    меморандум) не захищає
  - Чому Росія напала — успішний вихід України з орбіти імперії як екзистенційна загроза
    для режиму РФ
  - 'Від незалежності до спротиву — трансформація суспільства: від пасивного населення
    до активних громадян; [!culture] вплив революцій на мистецтво'
vocabulary_hints:
  required:
  - синтез (synthesis) — історичний синтез, синтез культур
  - незалежність (independence) — відновлення незалежності (restoration of independence),
    проголошення незалежності
  - демократія (democracy) — розбудова демократії, загроза демократії
  - олігархія (oligarchy) — кланово-олігархічна система, боротьба з олігархією
  - революція (revolution) — Помаранчева революція, Революція Гідності, кольорові
    революції (colored revolutions - contested term)
  - євроінтеграція (European integration) — курс на євроінтеграцію, європейський вибір
  - громадянське суспільство (civil society) — розвинене громадянське суспільство,
    активність громадянського суспільства
  - деколонізація (decolonization) — процеси деколонізації, ментальна деколонізація
  recommended:
  - референдум (referendum) — Всеукраїнський референдум 1 грудня 1991
  - конституція (constitution) — прийняття Конституції, Конституційна ніч
  - корупція (corruption) — боротьба з корупцією, політична корупція
  - реформи (reforms) — економічні реформи, політичні реформи
  - вибори (elections) — фальсифікація виборів (election fraud), чесні вибори
  - криза (crisis) — політична криза, економічна криза
  - багатовекторність (multi-vectorism) — політика багатовекторності (Kuchma era policy)
  - суверенітет (sovereignty) — державний суверенітет, Декларація про державний суверенітет
