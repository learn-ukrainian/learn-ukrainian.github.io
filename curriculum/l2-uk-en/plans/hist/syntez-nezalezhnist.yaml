content_outline:
- points:
  - 'Провокація: Чи був Акт проголошення незалежності 24 серпня 1991 року справжнім розривом з імперією, чи лише початком
    30-річної втечі, що завершилася війною?'
  - 'Фрагмент без контексту: «Виходячи із смертельної небезпеки, яка нависла була над Україною в зв''язку з державним переворотом
    в СРСР...» — З якого документа цей рядок і про яку небезпеку йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Штучний «розкол» Схід-Захід. Російська імперська теза про «дві України» vs. соціологічна реальність єдиної політичної
    нації, що підтверджується на виборах та Майданах.'
  - 'Дебат 2: Демократія чи Олігархія? Чи була кланово-олігархічна система Кучми «необхідним злом» для стабілізації, чи головним
    гальмом на шляху до європейських інституцій?'
  - '[!epistemic-humility] Оцінки ролі олігархів різняться: від «грабіжників нації» до «ситуативних союзників у боротьбі з
    російським імперіалізмом» (особливо після 2014).'
  - 'Глобальна синхронність: «Кольорові революції» пострадянського простору. Порівняння Помаранчевої революції в Україні з
    Революцією троянд у Грузії та провалом протестів у Білорусі та Росії.'
  section: 'Конфліктна карта: Боротьба за українську душу'
  words: 900
- points:
  - 'Акт проголошення незалежності України (24 серпня 1991): аналіз тексту. Хто автор (Левко Лук''яненко)? Чому наголошується
    на «тисячолітній традиції державотворення»?'
  - 'Конституція України (28 червня 1996): «Конституційна ніч» як політичний трилер. Які компроміси були закладені в Основний
    Закон щодо мови, Криму та повноважень президента?'
  - '[!decolonization] Голоси Майданів: порівняння риторики Помаранчевої революції (2004) та Революції Гідності (2014). Зміна
    від «Ми — за чесні вибори» до «Ми — за європейський вибір і проти рабства».'
  - 'Справа Ґонґадзе та «Україна без Кучми» (2000-2001): аналіз журналістських розслідувань як інструменту громадянського
    суспільства та реакції влади на них. Як цей випадок змінив українські медіа?'
  section: 'Джерела: Документи державності та голоси революцій'
  words: 1600
- points:
  - 'Періодизація боротьби: Кравчук (побудова символів), Кучма (стабілізація та «багатовекторність»), Ющенко (демократичний
    прорив), Янукович (авторитарний реванш).'
  - 'Причинно-наслідковий ланцюг: як відмова Януковича підписати Угоду про асоціацію з ЄС у листопаді 2013 року стала тригером,
    що запустив незворотні процеси деколонізації.'
  - '[!myth-buster] Міф про «провал» Помаранчевої революції. Спростування: вона зламала сценарій керованої передачі влади
    та створила прецедент мирного народного повстання, що уможливило Революцію Гідності.'
  - 'Оцінки істориків: порівняння поглядів Сергія Плохія, Ярослава Грицака та Ореста Субтельного на феномен «гібридної незалежності»
    України в період 1991-2014 рр.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож 1991 рік — це кінець чи початок? Студент формулює аргументовану відповідь, спираючись на
    матеріал модуля.'
  - 'Уроки 1991-2014: чому демократія вразлива без сильних інституцій, а нейтралітет (Будапештський меморандум) не є гарантією
    безпеки?'
  - Чому Росія напала у 2014? Аналіз виходу України з імперської орбіти як екзистенційної загрози для путінського режиму.
  - '[!anti-hagiography] Не ідеалізуючи 90-ті: визнання проблем корупції, бідності та криміналу як спадщини СРСР, з якою боролися
    паралельно з розбудовою державності.'
  section: Дискусія та підсумок
  words: 700
focus: The challenges of post-Soviet state-building, the Orange Revolution and the Revolution of Dignity as key stages in
  the final break with the Russian empire.
level: HIST
