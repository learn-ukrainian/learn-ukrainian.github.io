content_outline:
- points:
  - 'Провокація: Термін «Розстріляне відродження», що описує ключову трагедію української культури XX століття, народився
    не в Києві і не в Харкові, а в Парижі. Чому пам''ять про покоління мусила ховатися в еміграції?'
  - 'Фрагмент без контексту: «Клоака, збудована на гноєві, на випарі від трупів, де повзає і шамотить хробаччя, де скаче жаба
    і процвітає цинізм вищої проби...» — чиї це слова і про що вони?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська версія (вороги народу, «буржуазні націоналісти», шпигуни) vs. Деколоніальна оптика (цілеспрямоване
    знищення модерної української ідентичності, що могла конкурувати з російською).'
  - 'Дебат 2: Чи був шанс вижити? Дискусія про стратегії: «азіатський ренесанс» та «геть від Москви» Хвильового; «ad fontes»
    та аполітичний елітаризм неокласиків Зерова; пролетарська змичка з Європою футуристів Семенка. Чому всі шляхи вели до
    Сандармоху?'
  - '[!epistemic-humility] Ми не знаємо, як склалася б доля України, якби це покоління не знищили. Але ми можемо проаналізувати
    документи, які свідчать, що вирок їм усім був винесений заздалегідь.'
  - 'Глобальна синхронність: Український модернізм 1920-х (бойчукізм, конструктивізм Курбаса) як частина європейського авангарду
    vs. його подальше знищення на тлі згортання культурних свобод у СРСР та встановлення тоталітарних режимів в Європі (Німеччина,
    Італія).'
  section: 'Конфліктна карта: Націонал-ухильники чи нація-конкурент?'
  words: 900
- points:
  - 'Джерело 1: Будинок «Слово» в Харкові. Архітектурний проєкт (форма літери С) як символ нового побуту для митців. Зміни
    в статусі: від кооперативу для творчої еліти до «Будинку Попереднього Ув''язнення». Аналіз списку мешканців та їхньої
    подальшої долі.'
  - 'Джерело 2: Літературні маніфести та памфлети. Уривки з «Камо грядеши?» Хвильового — аналіз концепції «психологічної Європи».
    Порівняння з гаслами Зерова («до джерел!») — що об''єднувало і роз''єднувало ці групи?'
  - 'Джерело 3: Документи НКВД. Протоколи допитів, ретушовані фотографії (зникнення облич з групових фото ВАПЛІТЕ), розстрільні
    списки з урочища Сандармох за підписами вищого керівництва СРСР. Аналіз мови цих документів.'
  - '[!decolonization] Читання радянських звинувачень «проти течії»: кожен пункт про «націоналізм» насправді є свідченням
    про спробу творити самобутню українську культуру.'
  section: 'Джерела: Стіни, листи і розстрільні списки'
  words: 1600
- points:
  - 'Культурний геноцид як прелюдія до фізичного: чому знищення інтелектуальної еліти (Розстріляне відродження) та знищення
    селянства (Голодомор) є двома сторонами однієї медалі — стратегії упокорення України.'
  - 'Короткострокові наслідки: обрив культурної тяглості, форсоване впровадження соцреалізму, ізоляція від світових мистецьких
    процесів.'
  - 'Довгострокові наслідки: «вибите покоління», деформація українського культурного канону, травма, що впливає на сучасні
    культурні дебати.'
  - '[!myth-buster] Руйнування міфу про «братні народи» та «спільний культурний простір». Розстріляне відродження доводить,
    що російська імперія (в її радянській формі) завжди розглядала українську культуру як екзистенційну загрозу.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чому пам''ять про Розстріляне відродження стала можливою лише в еміграції, а в Україні була стерта?
    Формулювання відповіді на основі аналізу радянської політики пам''яті.'
  - 'Зв''язок із сьогоденням: Як сучасна війна Росії проти України продовжує лінію на знищення української культурної ідентичності,
    розпочату в 1930-х? Наведіть приклади (руйнування музеїв, вбивства митців, викрадення колекцій).'
  - '[!anti-hagiography] Покоління 1920-х не було монолітом — вони сперечалися, ворогували, конкурували. Чи не стала ця внутрішня
    роз''єднаність однією з причин їхньої поразки перед обличчям тоталітарної машини?'
  section: Дискусія та підсумок
  words: 700
focus: The systematic destruction of the 1920s Ukrainian cultural elite as a deliberate act of cultural genocide by the Soviet
  regime. Key figures (Khvylovy, Kurbas, Boychuk), the "Slovo" House as a trap, and the Sandarmokh executions as the culmination
  of the tragedy.
level: HIST
