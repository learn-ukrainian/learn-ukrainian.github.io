objectives:
- Аналізувати ідеологічне протистояння між радянським проєктом та українським націонал-комунізмом 1920-х
- Критично оцінювати первинні джерела, включаючи пропагандистські матеріали та документи репресивних органів
- Пояснювати зв'язок між культурним геноцидом (Розстріляне відродження) та фізичним геноцидом (Голодомор)
- Формулювати аргументовану позицію щодо тяглості імперської політики Росії щодо України від 1930-х до сьогодення
