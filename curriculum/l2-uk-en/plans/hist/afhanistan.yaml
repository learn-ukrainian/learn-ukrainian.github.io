content_outline:
- points:
  - 'Провокація: «Воїни-інтернаціоналісти» — герої, жертви чи окупанти? Як одна війна може мати три настільки різні оцінки
    в пам''яті народу?'
  - 'Фрагмент листа солдата: «Мамо. Вибач, я не зумів... Я не хотів цієї війни. Тут не наші гори, не наші люди. Ми принесли
    їм горе, а вони нам — смерть.» Як цей особистий запис змінює офіційну картину?'
  section: Розминка
  words: 400
- annotations:
  - '[!epistemic-humility]'
  points:
  - 'Дебат 1: Радянська версія vs Деколоніальний погляд. «Інтернаціональний обов''язок» і «захист південних рубежів» проти
    звинувачення в імперській агресії з використанням поневолених народів як гарматного м''яса.'
  - 'Дебат 2: Внутрішньоукраїнська дискусія про пам''ять. «Афганці» — герої, що чесно виконали наказ, чи жертви режиму, чий
    досвід не має цінуватися в незалежній Україні? Дискусія про легітимність пільг та пам''ятників.'
  - '[!epistemic-humility] Оцінка дій окремого солдата є складною. Ми не можемо знати мотиви кожного: хтось вірив у пропаганду,
    хтось не мав вибору через призов, хтось чинив воєнні злочини.'
  - 'Глобальна синхронність: Пік Холодної війни. Вторгнення СРСР відбувається на тлі Іранської революції, приходу до влади
    Маргарет Тетчер у Британії та обрання Рональда Рейгана в США. Світ балансує на межі ядерної війни.'
  section: 'Конфліктна карта: Обов''язок чи окупація?'
  words: 900
- annotations:
  - '[!decolonization]'
  points:
  - 'Аналіз солдатських листів: порівняння цензурованих текстів для родин із реальністю, описаною у щоденниках. Заборона згадувати
    місце служби, втрати, бойові дії.'
  - 'Спогади ветеранів: абсурдність війни, щоденне виживання, спрага, інфекційні хвороби (гепатит, тиф) як головні вороги.
    Історія українця Геннадія, що перейшов на бік моджахедів через дідівщину.'
  - '[!decolonization] «Дідівщина» як інструмент імперського контролю: приниження за національною ознакою, деструкція солідарності
    між поневоленими народами в радянській армії.'
  - 'Народна пам''ять: фольклорний символ «Чорного тюльпана» (АН-12) та походження терміну «Вантаж 200» (рос. «Груз 200»)
    з наказу №200 Міноборони СРСР 1984 року.'
  section: 'Джерела: Листи з-під Кандагару'
  words: 1600
- annotations:
  - '[!myth-buster]'
  points:
  - '«Афганський синдром»: психологічна травма ветеранів, які повернулися в суспільство, що стрімко змінювалося і не цінувало
    їхню «жертву». Соціальна дезадаптація, алкоголізм, організована злочинність у 1990-х.'
  - 'Делегітимізація радянської влади: цинкові труни, що поверталися в українські міста і села, підривали довіру до влади
    сильніше за будь-яку пропаганду. Війна прискорила розпад СРСР.'
  - '[!myth-buster] Міф про «будівництво шкіл та лікарень». Радянська армія вела жорстоку війну проти повстанців, яка включала
    килимові бомбардування та знищення сіл. Гуманітарна місія була лише прикриттям.'
  - 'Історична паралель: війна в Афганістані як репетиція сучасних воєн Росії. Використання непропорційної мобілізації національних
    меншин та поневолених народів (бурятів, дагестанців, чеченців) у війні проти України.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- annotations:
  - '[!anti-hagiography]'
  points:
  - 'Повернення до розминки: студент формулює власну аргументовану відповідь на питання, ким були українці в Афганістані,
    використовуючи докази з модуля.'
  - 'Зв''язок із сьогоденням: як досвід Афганської війни вплинув на формування української армії після 1991 року? Чому багато
    ветеранів-«афганців» стали на захист України у 2014 році?'
  - '[!anti-hagiography] Важливо уникати як звеличення, так і тотального засудження. Це була трагедія українського народу,
    змушеного брати участь у чужій колоніальній війні.'
  section: Дискусія та підсумок
  words: 700
focus: The Soviet-Afghan War (1979-1989) as a decolonial trauma for Ukraine, analyzing the myth of 'international duty', the
  experience of Ukrainian soldiers, and the war's role in delegitimizing the USSR.
level: HIST
module: hist-116
objectives:
- Аналізувати причини, перебіг та наслідки участі українців у радянській війні в Афганістані
- Критично оцінювати радянські пропагандистські міфи та сучасні деколоніальні інтерпретації війни
- Розрізняти офіційні джерела та особисті свідчення (листи, спогади) для реконструкції досвіду солдата
- Проводити паралелі між імперськими практиками СРСР в Афганістані та сучасної Росії у війні проти України
