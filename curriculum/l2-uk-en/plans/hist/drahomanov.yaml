objectives:
- Критично аналізувати політичні ідеї Михайла Драгоманова, зокрема концепції федералізму та громадівства
- Пояснювати вплив Драгоманова на український національний рух та його роль як ментора молодого покоління
- Розрізняти погляди Драгоманова та інших політичних течій його часу (марксизм, народництво)
- Обговорювати актуальність та суперечливість спадщини Драгоманова для сучасної України
