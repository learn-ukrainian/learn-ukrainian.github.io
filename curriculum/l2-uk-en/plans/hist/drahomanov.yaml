content_outline:
- points:
  - 'Провокативне питання: Що важливіше для нації — сильна централізована держава чи непорушні права та свободи кожної людини?
    Драгоманов дав відповідь, яка й досі викликає суперечки.'
  - 'Фрагмент без контексту: «Чисто діло мови ніколи не вигорить, поки не буде злучене з інтересами політичними...» Як ви
    розумієте цю тезу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Федералізм Драгоманова — «зрада» чи прагматизм? [!decolonization] Українські радикали звинувачували його в «угодовстві»
    з імперією, тоді як він бачив у швейцарській моделі єдиний спосіб уникнути асиміляції та зберегти демократію.'
  - 'Дебат 2: «Етичний соціалізм» проти марксизму. Драгоманов пропонував еволюційний шлях через кооперацію та освіту, що суперечило
    ідеям класової боротьби та диктатури пролетаріату, які набирали популярності в Європі.'
  - '[!epistemic-humility] Його ідеї часто виривають з контексту. Важливо розуміти, що він писав у ХІХ столітті, намагаючись
    знайти «третій шлях» між деспотизмом Росії, шовінізмом Польщі та вузьким провінціалізмом.'
  - 'Глобальна синхронність: Поки в Лондоні Маркс писав «Капітал», у Женеві Драгоманов видавав «Громаду», пропонуючи альтернативну
    модель суспільних змін, засновану на ліберальних цінностях та правах людини.'
  section: 'Конфліктна карта: Федераліст, соціаліст чи націоналіст?'
  words: 900
- points:
  - 'Аналіз «Листів на Наддніпрянську Україну»: гостра критика «хуторянства» та пасивності інтелігенції, заклик до створення
    дієвої політичної організації («чиста справа»).'
  - '[!decolonization] Журнал «Громада» та вільна друкарня в Женеві як інструмент боротьби з цензурою. Розбір методів конспірації
    та контрабанди забороненої літератури (в подвійному дні валіз, у банках з-під варення).'
  - 'Листування з Іваном Франком: як Драгоманов із європейської «висоти» долав провінційність галицької інтелігенції, змушуючи
    її мислити в масштабах усієї Європи.'
  - 'Первинний текст: читання та аналіз уривків, що показують Драгоманова як гострого полеміста та майстра політичного памфлету.'
  section: 'Джерела: Памфлети в банках з варенням'
  words: 1600
- points:
  - 'Вплив на молоде покоління: Леся Українка («духовний батько»), Іван Франко, Михайло Павлик. Драгоманов сформував Радикальну
    партію в Галичині та заклав основи для переходу від культурництва до політики.'
  - 'Ідеї для майбутньої держави: концепції федералізму та автономії, розроблені Драгомановим, були частково реалізовані в
    УНР доби Центральної Ради під керівництвом Грушевського.'
  - '[!myth-buster] Спростування радянського міфу про «прото-більшовика» та імперського тавра «сепаратиста». Драгоманов був
    послідовним демократом і анти-авторитаристом, ворогом будь-якого централізму.'
  - '[!anti-hagiography] Критика співпраці з російськими демократами. Його віра в можливість перетворення імперії на федерацію
    виявилася утопічною, що стало предметом критики з боку наступних поколінь націоналістів.'
  - Введення поняття «носії малоросійщини» для опису комплексу меншовартості та провінційності — важливий внесок у деколонізаційну
    думку.
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, держава чи людина? Студент формулює аргументовану відповідь, спираючись на ідеї Драгоманова
    про пріоритет «поступу» та прав людини.'
  - 'Спадщина сьогодні: Наскільки ідеї Драгоманова про децентралізацію, самоврядування громад та євроінтеграцію реалізовані
    в сучасній Україні?'
  - 'Ширше питання: Чи можлива демократична імперія? Чому спроби Драгоманова та інших «федералістів» знайти спільну мову з
    російською опозицією провалилися, і які уроки з цього можна винести сьогодні?'
  - '[!history-bite] Драгоманов — один із засновників Софійського університету в Болгарії, де його шанують як європейського
    інтелектуала.'
  section: Дискусія та підсумок
  words: 700
