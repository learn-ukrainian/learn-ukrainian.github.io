content_outline:
- points:
  - 'Провокація: Чому українські селяни XVIII ст. масово записувалися у «серби»? Розбір імперського міфу про «братню допомогу»
    балканським народам.'
  - 'Фрагмент скарги запорожців: «...а серби, забравши худобу нашу, кажуть, що ця земля тепер не ваша, а їхня...» — що відбувається?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Освоєння Дикого Поля» (імперська версія) vs «Анексія козацьких земель» (українська перспектива). Чи були ці
    землі справді порожніми?'
  - 'Дебат 2: Сербські колоністи — жертви чи інструменти імперії? Аналіз їх мотивації: втеча від утисків в Австрії, отримання
    землі та привілеїв, але ціною служби іншій імперії.'
  - '[!epistemic-humility] Оцінка реальної чисельності та боєздатності колоністів є складною через корупцію та приписки «мертвих
    душ» лідером колонії Іваном Хорватом.'
  - 'Глобальна синхронність: реформи Марії-Терезії в Австрійській імперії, що ліквідували Військову границю, та Семирічна
    війна в Європі, що змінила баланс сил.'
  section: 'Конфліктна карта: Заселення чи заміщення?'
  words: 900
- points:
  - 'Аналіз указу від 24 грудня 1751 року: риторика «захисту кордонів» та «надання притулку». Які реальні цілі приховані за
    цими формулюваннями?'
  - 'Читання скарг запорожців: мова, аргументація, посилання на «віковічні ґрунти». Як козаки обґрунтовували свої права на
    землю, і чому імперія їх ігнорувала?'
  - '[!decolonization] Картографічна колонізація: аналіз карт, де на автохтонні українські топоніми (річки, балки) накладаються
    нові, «сербські» назви шанців (Панчеве, Суботиці). Як карта стає інструментом анексії.'
  - 'Критика джерел: порівняння офіційних звітів Івана Хорвата до Петербурга з реальним станом справ у колоніях, описаним
    в аудиторських ревізіях.'
  section: 'Джерела: Укази, скарги та карти'
  words: 1600
- points:
  - 'Тактика «розділяй і володарюй»: створення лояльного «етнічного бар''єру» для військової та політичної ізоляції Запорозької
    Січі від Гетьманщини.'
  - 'Нова Сербія як прецедент: відпрацювання моделі військово-землеробської колонізації, яку згодом буде розширено на весь
    Південь під брендом «Новоросія».'
  - '[!myth-buster] Руйнування міфу про «Дике Поле». Нова Сербія та Слов''яносербія були засновані не в пустелі, а на освоєних
    землях Буго-Гардівської та Кальміуської паланок Війська Запорозького.'
  - 'Швидка асиміляція: чому, попри початкові конфлікти, більшість рядових колоністів швидко розчинилися в українському оточенні
    (спільна віра, шлюби, спільний ворог у вигляді кочовиків).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, чому українці записувались у «серби»? Відповідь у соціальній структурі імперії, де зміна
    «етнічності» була способом уникнути кріпацтва.'
  - 'Історичний урок: як імперії використовують один поневолений народ проти іншого для досягнення власних геополітичних цілей.'
  - 'Зв''язок із сьогоденням: від Нової Сербії до «Новоросії». Простеження генеалогії імперського міфу про «споконвічно російські»
    землі українського Півдня.'
  - Мультиетнічність Півдня України — це результат органічного розвитку чи цілеспрямованої імперської політики колонізації?
    Формулювання власної позиції.
  section: Дискусія та підсумок
  words: 700
focus: Імперська політика військової колонізації українського Півдня в середині XVIII ст. через створення Нової Сербії та
  Слов'яносербії. Аналіз тактики «розділяй і володарюй» та руйнування міфу про «Дике Поле».
level: HIST
module: hist-078
objectives:
- Аналізувати причини, перебіг та наслідки створення Нової Сербії та Слов'яносербії на українських землях
- Критично оцінювати роль військової колонізації як інструменту імперської політики «розділяй і володарюй»
- Порівнювати різні перспективи на ці події, аналізуючи імперські укази, скарги запорожців та картографічні матеріали
- Деконструювати імперський міф про «Дике Поле» та простежувати зв'язок між проектами XVIII ст. та сучасним міфом про «Новоросію»
