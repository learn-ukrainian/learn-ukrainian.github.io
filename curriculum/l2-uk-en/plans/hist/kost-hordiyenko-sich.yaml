content_outline:
- points:
  - 'Провокація: Кошовий отаман — це «неосвічений степовий воїн»? Кость Гордієнко, випускник Києво-Могилянської академії,
    руйнує цей стереотип. Чому імперії було вигідно зображати козаків дикунами?'
  - 'Фрагмент листа 1702 року без контексту: «...запорожці будуть збройно з ними битися». Хто і кому погрожує? Проти кого
    готові битися запорожці?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Січ — це «гніздо бандитів і п''яниць» (імперська версія) чи християнська козацька республіка з власним законом
    (українська історіографія)?'
  - 'Дебат 2: Союз із Мазепою — це «зрада» (російська версія) чи єдиний можливий шлях зберегти «козацькі вольності» та Вітчизну
    від московської централізації?'
  - '[!epistemic-humility] Особиста ворожнеча між Гордієнком та Мазепою справді існувала. Історики досі сперечаються, що змусило
    їх об''єднатися — відчай, спільна загроза чи раптове прозріння?'
  - 'Глобальна синхронність: Початок XVIII ст. — це війна за іспанську спадщину та Велика Північна війна. Боротьба козаків
    за свої права проти централізаторської монархії Петра I є паралеллю до повстання Ракоці в Угорщині проти Габсбургів.'
  section: 'Конфліктна карта: Республіка проти Імперії'
  words: 900
- points:
  - 'Аналіз риторики: Лист Гордієнка до Мазепи (1708), де він пише про «злість московську» на «Вітчизну, нашу матір». Розбір
    метафор та політичної мови.'
  - 'Конституція Пилипа Орлика (1710): Гордієнко підписав її як представник Січі. Які статті гарантували права Запорожжя?
    Чому це був безпрецедентний документ для свого часу?'
  - '[!decolonization] Погляд ззовні: Шведські мемуаристи (Адлерфельт, Нордберг) чітко відрізняли козаків від московських
    військ, визнаючи їх окремим народом з окремими цілями. Це руйнує імперський міф про «один народ».'
  - 'Народна пам''ять: Аналіз «Думи про зруйнування Січі» («Ой, встань, Петре...»). Як фольклор зображує трагедію, і чим ця
    версія відрізняється від сухих військових звітів?'
  section: 'Джерела: Листи, закони та шведські щоденники'
  words: 1600
- points:
  - 'Причина та наслідок: Союз 8000 запорожців з Мазепою та Карлом XII став останньою краплею для Москви, що призвело до каральної
    експедиції.'
  - 'Трагедія Чортомлицької Січі (травень 1709): Детальний аналіз кампанії Меншикова та Яковлєва, героїчної оборони під проводом
    Якима Богуша та ролі зради Гната Галагана.'
  - '[!myth-buster] Руйнування Січі — це не просто військова операція, а акт геноциду та терору. Страта 156 полонених та пущені
    за течією Дніпра плоти з тілами мали на меті залякати все українство.'
  - 'Довгострокові наслідки: Знищення Січі стало символом московської жорстокості та кінцем «козацької республіки». Спадщина
    Гордієнка — це опір в екзилі (Олешківська, Кам''янська Січ) до самої смерті у 1733 році.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Використовуючи знання з модуля, дайте відповідь: як особистість Костя Гордієнка (освіченого лідера)
    суперечила імперському міфу про «дикого козака»?'
  - 'Ширше питання: Яку роль відіграє зрада у знищенні держав та спільнот? Чи могла Січ вижити без зради Галагана?'
  - '[!anti-hagiography] Союз із Мазепою, хоч і вимушений, був відчайдушним кроком, який призвів до катастрофи для Січі. Чи
    був у Гордієнка інший, кращий вибір у тій геополітичній ситуації?'
  - 'Зв''язок із сьогоденням: Історія зруйнування Січі як приклад реакції імперії на прагнення до свободи. Які паралелі можна
    провести з сучасною історією України?'
  section: Дискусія та підсумок
  words: 700
