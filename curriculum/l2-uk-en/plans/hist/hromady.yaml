content_outline:
- points:
  - 'Провокація: Чому Російська імперія боялася недільних шкіл та етнографічних експедицій більше, ніж збройних повстань?
    Чи може звичайний буквар бути небезпечнішим за рушницю?'
  - 'Фрагмент доносу (без контексту): «Допустить создание особой украинской литературы — значит положить прочное основание
    для отторжения Малороссии от России». Хто і чому так писав?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи були громади аполітичними культурними гуртками, чи з самого початку мали на меті політичне відокремлення?
    Позиція громадівців («ми лише за освіту») vs позиція імперії («вони — сепаратисти»).'
  - 'Дебат 2: "Хлопоманство" — зрада шляхетства чи народження нової еліти? Дискусія навколо постаті Володимира Антоновича
    та його маніфесту «Моя сповідь».'
  - '[!epistemic-humility] Громади не мали єдиного центру чи програми. Це була мережа з різними поглядами — від лояльних «культурників»
    до майбутніх радикалів. Наші знання базуються на уривчастих спогадах та поліцейських звітах.'
  - 'Глобальна синхронність: «Весна народів» у Європі (1848) та її відлуння. Громади як український варіант національного
    пробудження, паралельний італійському Рісорджименто та чеському національному відродженню.'
  section: 'Конфліктна карта: Просвітництво чи сепаратизм?'
  words: 900
- points:
  - 'Джерело 1: Журнал «Основа» (1861-1862). Аналіз програмних статей Куліша та Костомарова. Вимога освіти рідною мовою, публікація
    творів Шевченка. Як легальний журнал просував нелегальні ідеї?'
  - 'Джерело 2: Етнографічні праці Павла Чубинського. Як 7 томів фольклорних записів стали доказом існування окремого українського
    народу і науковим аргументом проти ідеї «єдиного русского народу»?'
  - 'Джерело 3: Поліцейські доноси та звіт сенатора Юзефовича. Читання «між рядками»: які саме дії громадівців (видання букварів,
    організація концертів) викликали паніку в імперської влади?'
  - '[!decolonization] Імперія бачила загрозу не в самому факті існування «малоросійського наріччя», а в його кодифікації
    та перетворенні на літературну мову — інструмент творення модерної нації.'
  section: 'Джерела: Журнал «Основа» та звіти жандармів'
  words: 1600
- points:
  - 'Короткострокові наслідки: Валуєвський циркуляр (1863) та Емський указ (1876) як пряма реакція на діяльність громад. Розгром
    легальних осередків, закриття «Південно-Західного відділу», еміграція Драгоманова.'
  - 'Довгострокові наслідки: Заборони парадоксально посилили рух, виштовхнувши його з культурного поля в політичне підпілля.
    Поява перших політичних партій (РУРП, Братство тарасівців).'
  - '[!myth-buster] Міф про «селянський» характер руху. Громади — це рух міської інтелігенції та частини шляхти, які «йшли
    в народ», а не виходили з нього. Вони створювали високу культуру, а не лише зберігали фольклор.'
  - 'Оцінки істориків: Порівняння поглядів Лисяка-Рудницького («інтелектуальний фермент нації») та Міллера (реакція на імперську
    модернізацію) на роль громадівства.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Сформулюйте аргументовану відповідь — чому імперія бачила в букварі та етнографії смертельну
    загрозу?'
  - Громади як модель «культурної самооборони». Наскільки ця модель актуальна сьогодні для збереження ідентичності в умовах
    глобалізації та інформаційних воєн?
  - '[!anti-hagiography] Громадівський рух не був ідеальним. Внутрішні конфлікти (старі vs молоді, помірковані vs радикали),
    суперечки між Кулішем та Костомаровим, роль особистих амбіцій.'
  - 'Спадщина: Громади заклали інтелектуальний фундамент і виховали еліту, яка через 50 років проголосить незалежність УНР.
    Без культурної праці 1860-х не було б політичної боротьби 1917-го.'
  section: Дискусія та підсумок
  words: 700
focus: Hromadas as centers of cultural and political resistance, journal "Osnova", Valuevsky Circular, Ems Ukaz, role of intelligentsia
  (Antonovych, Drahomanov), transition from cultural work to political struggle.
level: HIST
module: hist-083
objectives:
- Аналізувати причини виникнення, форми діяльності та наслідки громадівського руху в контексті політики Російської імперії
- Критично порівнювати різні історичні джерела (публіцистику, етнографію, поліцейські доноси) для реконструкції поглядів обох
  сторін конфлікту
- Пояснювати різницю між культурною діяльністю та політичним сепаратизмом з точки зору імперської влади та української інтелігенції
- Формулювати аргументовану позицію щодо ролі «м''якої сили» та культурної ідентичності у протистоянні імперській асиміляції
