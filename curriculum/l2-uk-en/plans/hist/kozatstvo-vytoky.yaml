content_outline:
- points:
  - 'Провокація: Ким були перші козаки — втікачами-кріпаками, що шукали волі, чи озброєними підприємцями, що шукали прибутку
    на Великому Кордоні?'
  - '[!quote] «Вони надзвичайно міцні до голоду, спраги, спеки та холоду... вправні та спритні, хитрі та підступні, і не знають,
    що таке втома» — Гійом де Боплан. Про кого він говорить і наскільки цей образ є об''єктивним?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Козаки — бандити чи державотворці? Імперська російська та польська історіографія зображувала козаків як розбійників.
    Українська національна школа (від Грушевського) бачить у них прото-державний суб''єкт.'
  - 'Дебат 2: Що було первинним — уходництво чи втеча? Дискусія між істориками про те, чи економічна вигода від промислів
    (риба, мед, сіль) була головним рушієм, чи соціальний протест проти кріпацтва.'
  - '[!epistemic-humility] Ранні джерела про козаків рідкісні та упереджені. Це або скарги їхніх ворогів (кримських ханів),
    або офіційні документи влади (польських королів), що намагалася їх контролювати. Самі козаки почали писати свою історію
    значно пізніше.'
  - 'Глобальна синхронність: Дике Поле як український «фронтир». Порівняння з американським Диким Заходом, іспанською Реконкістою,
    або сибірськими «землепроходцями» — зони зіткнення цивілізацій та народження нових соціальних груп.'
  section: 'Конфліктна карта: Економіка проти ідеології'
  words: 900
- points:
  - 'Погляд чужинця: «Опис України» Гійома де Боплана (1651). Аналіз фрагментів про козацький побут, військову тактику (табір,
    чайки) та характер. Критичне читання: наскільки інженер-фортифікатор міг зрозуміти соціальну структуру?'
  - '[!decolonization] Погляд ворога: скарга хана Менглі-Гірея (1492). Читаємо «проти шерсті»: що скарга на пограбування корабля
    говорить про військові та морські спроможності козаків вже наприкінці XV ст.?'
  - 'Погляд влади: Універсал Сигізмунда II Августа (1572) про створення реєстру. Що цей документ говорить про спроби Речі
    Посполитої «приручити» та інкорпорувати козацтво у свою військову систему?'
  - 'Погляд ізсередини: мова «Літопису Самовидця». Хоч і написаний пізніше, він демонструє козацьку систему цінностей: слава,
    воля, побратимство. Аналіз ключових термінів.'
  section: 'Джерела: Свідки народження'
  words: 1600
- points:
  - 'Короткострокові наслідки: формування нового соціального стану, що не вписувався у феодальну структуру; поява військової
    сили, здатної кинути виклик Речі Посполитій та Кримському ханству.'
  - 'Довгострокові наслідки: закладення основ української політичної культури (виборність, рада, орієнтація на контракт);
    створення центрального міфу української ідентичності — козак як символ свободи та опору.'
  - '[!myth-buster] Міф про вічну війну з татарами. Відносини з Кримським ханством були складними: періоди жорстоких воєн
    чергувалися із ситуативними союзами (напр., похід Сагайдачного на Москву) та активною торгівлею.'
  - '[!myth-buster] Міф про суто селянське походження. Козацтво було полісоціальним явищем. До нього долучалися не лише селяни,
    а й збідніла шляхта, міщани та навіть духовенство, що шукали «козацького хліба».'
  - 'Оцінки істориків: порівняння поглядів М. Грушевського (козацтво як продовження державності Київської Русі), Я. Грицака
    (козацтво як модернізаційний проєкт на «великому кордоні») та С. Плохія (козацтво як ключовий фактор, що відрізняв український
    шлях від російського).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, підприємці чи борці за свободу? Студент формулює власну аргументовану відповідь, спираючись
    на джерела та історіографічні дебати.'
  - 'Зв''язок із сьогоденням: Як архетип козака-захисника впливає на сучасне українське суспільство та Збройні Сили України?
    Чи можна провести паралелі між самоорганізацією козацьких ватаг та добровольчим рухом 2014/2022 років?'
  - '[!anti-hagiography] Деромантизація образу: Рання козацька історія — це не лише героїзм, а й жорстокість, піратство («морські
    походи») та участь у работоргівлі (продаж ясиру). Наскільки «ідеальний» образ козака відповідає історичній реальності?'
  section: Дискусія та підсумок
  words: 700
focus: Соціально-економічні та геополітичні причини виникнення козацтва, феномен уходництва, Дике поле, перші джерела, деколонізаційний
  погляд на ранню козацьку історію.
level: HIST
module: hist-041
objectives:
- Пояснювати етимологію терміна «козак» та різні теорії походження козацтва
- Критично аналізувати соціально-економічні (уходництво, кріпацтво) та геополітичні (Дике поле) причини виникнення козацтва
- Порівнювати та інтерпретувати інформацію з першоджерел, написаних з різних позицій (Боплан, кримський хан, польський король)
- Застосовувати деколонізаційну оптику для спростування імперських міфів про козацтво як про «бандитське» явище
- Формулювати аргументовану позицію в рамках ключових історіографічних дебатів про ранню історію козацтва
