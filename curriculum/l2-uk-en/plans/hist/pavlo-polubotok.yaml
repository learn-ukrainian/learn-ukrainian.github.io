content_outline:
- points:
  - 'Провокація: Чи міг один гетьман кинути виклик імператору? Уявіть собі 1723 рік. Ви — наказний гетьман Павло Полуботок.
    Вашу країну systematically позбавляють прав. Що ви зробите: змиритесь, щоб урятувати себе, чи ризикнете усім заради примарної
    автономії?'
  - 'Фрагмент промови: «Не погрожуй, царю, смертю, бо це доля всіх людей... а віддай нас у наругу рабську... тим, що ненавидять
    нас і топчуть ногами». Хто, кому і за яких обставин міг сказати ці слова?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська автономія vs. Російська централізація. Позиція Полуботка: Гетьманщина — добровільний союзник під
    протекторатом царя з гарантованими правами (Березневі статті). Позиція Петра I: Гетьманщина — завойована територія, «Малоросія»,
    чиї інститути мають бути замінені російською адміністрацією (Малоросійська колегія).'
  - 'Дебат 2: Легенда про золото Полуботка. Версія 1 (народна/романтична): гетьман таємно вивіз козацькі скарби, щоб урятувати
    їх від Москви, і це «золото нації» чекає свого часу. Версія 2 (скептична/історична): це міф, що компенсує травму поразки,
    символ «відкладеної справедливості» без жодних документальних підтверджень.'
  - '[!epistemic-humility] Ми не маємо стенограми розмов Полуботка з Петром. Його знаменита промова — це, найімовірніше, літературна
    реконструкція з «Історії Русів». Але вона відображає дух опору старшини.'
  - 'Глобальна синхронність: Поки Петро I ліквідовував українську автономію (1722), у Великій Британії Роберт Волпол ставав
    першим в історії прем''єр-міністром, закладаючи основи парламентської демократії — два протилежні вектори політичного
    розвитку.'
  section: 'Конфліктна карта: Автономія чи сепаратизм?'
  words: 900
- points:
  - 'Первинний документ: Коломацькі чолобитні (1723). Аналіз тексту: це не просто прохання, а юридична претензія про порушення
    імперією двосторонньої угоди. Вимога — дозволити вибори нового гетьмана, як було гарантовано.'
  - '[!decolonization] Дії Малоросійської колегії на чолі з Вельяміновим аналізуються не як «управлінські рішення», а як інструменти
    колоніального контролю: створення паралельної адміністрації, податковий тиск, підпорядкування місцевих судів.'
  - 'Джерельний аналіз: саботаж наказів колегії з боку Полуботка. Заборона сотникам виконувати розпорядження росіян. Це була
    свідома стратегія ненасильницького опору, спрямована на захист правової системи Гетьманщини.'
  - 'Джерело-пастка: «промова перед Петром». Критичний аналіз: чому цей текст є радше пам''яткою літератури, ніж історичним
    документом? Хто і з якою метою міг його створити в «Історії Русів»?'
  section: 'Джерела: Коломацькі чолобитні та протоколи допитів'
  words: 1600
- points:
  - 'Короткострокові наслідки: арешт Полуботка та старшини, ув''язнення в Петропавлівській фортеці, смерть гетьмана без суду
    (1724). Це стало чітким сигналом, що будь-який опір централізації буде жорстоко придушено. Ліквідація гетьманства прискорилася.'
  - 'Довгострокові наслідки: канонізація образу Полуботка як мученика за українські права. Його смерть, що сталася за 40 днів
    до смерті самого Петра I, у народній пам''яті перетворилася на містичний акт відплати.'
  - '[!myth-buster] Міф про золото Полуботка. Розвінчання: немає жодного документального підтвердження депозиту в Банку Англії.
    Легенда виникає значно пізніше і стає особливо популярною в ХХ столітті як символ втрачених багатств та надії на компенсацію.'
  - 'Порівняння оцінок: Радянська історіографія таврувала Полуботка як «класового ворога» і «сепаратиста». Сучасні українські
    історики (Оглоблин, Плохій) розглядають його як прагматичного політика, захисника конституційних прав, чий опір був приречений
    перед обличчям абсолютної влади.'
  - 'Економічний вимір: Полуботок був одним із найбагатших людей свого часу (землевласник, підприємець). Ліквідація автономії
    була спрямована і на знищення економічної незалежності старшини як класу.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, ким був Полуботок — героєм, що наважився кинути виклик імперії, чи прагматиком, що захищав
    інтереси свого класу і програв? Сформулюйте відповідь, спираючись на аналіз джерел.'
  - 'Ширше питання: Трагедія Полуботка — це урок про те, що договори з імперією не варті паперу, на якому вони написані? Чи
    про те, що економічна незалежність є головною загрозою для автократії?'
  - '[!anti-hagiography] Полуботок не був демократом у сучасному розумінні. Він боровся за права та привілеї козацької еліти,
    а не всього народу. Чи применшує це його значення в історії українського опору?'
  - 'Зв''язок із сьогоденням: Як історія Полуботка допомагає зрозуміти сучасні методи Росії щодо України — від створення паралельних
    адміністрацій до енергетичного тиску та юридичного нігілізму?'
  section: Дискусія та підсумок
  words: 700
focus: The conflict between acting hetman Pavlo Polubotok and Peter I, the abolition of Cossack autonomy, the legend of Polubotok's
  gold, and the decolonization of his image.
level: HIST
module: hist-069
objectives:
- Критично аналізувати конфлікт між наказним гетьманом Павлом Полуботком та імперською владою Петра І.
- Пояснювати різницю між історичними фактами та міфологізацією на прикладі «промови перед царем» та легенди про золото Полуботка.
- Розрізняти методи колоніального контролю, які застосовувала Російська імперія для ліквідації української автономії.
- Формулювати аргументовану позицію щодо ролі Полуботка в історії українського опору імперській експансії.
