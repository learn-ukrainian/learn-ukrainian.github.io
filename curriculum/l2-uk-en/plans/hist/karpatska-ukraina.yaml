content_outline:
- points:
  - 'Провокаційне питання: Як могла держава, що офіційно проіснувала менше доби, стати одним із найпотужніших символів боротьби
    за незалежність України у XX столітті?'
  - 'Історичний парадокс: 15 березня 1939 року в Хусті проголошено незалежність і прийнято досконалу законодавчу базу (прапор,
    гімн, мова), поки Гітлер того ж дня входив у Прагу.'
  - 'Що важливіше для історії: тривалість існування держави чи сам факт її проголошення?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Угорська інтервенція — це «відновлення історичної справедливості» на «своїх землях» чи акт
    агресії проти волевиявлення українського народу?'
  - 'Дебат 2: Карпатська Україна — це «маріонеткова держава», створена за німецькою вказівкою, чи автентичний національний
    рух, що діяв всупереч планам Берліна?'
  - '[!epistemic-humility] Оцінка ролі ОУН: чи були галицькі добровольці та еміграційні лідери (Ольжич, Колодзінський) рушійною
    силою, чи лише доповненням до місцевого закарпатського руху на чолі з Волошином?'
  - 'Глобальна синхронність: Мюнхенська угода, Віденський арбітраж, анексія Чехословаччини — Карпатська Україна як епізод
    у ланцюгу подій, що вели до Другої світової війни.'
  section: 'Конфліктна карта: Між імперськими апетитами та національною волею'
  words: 900
- points:
  - 'Текст #1: Конституційний Закон Ч. 1 (15 березня 1939) — аналіз ключових статей про мову, прапор, гімн та державний устрій.
    Чому ці формальні атрибути були настільки важливі?'
  - 'Текст #2: Спогади учасників. Фрагменти зі щоденника Василя Ґренджі-Донського «Щастя і горе Карпатської України». Як очевидець
    описує ентузіазм населення та жорстокість окупантів?'
  - 'Текст #3: Дипломатичні документи. Телеграми уряду Волошина до Берліна з проханням про протекторат, які були проігноровані.
    Що це говорить про реальну позицію Німеччини?'
  - '[!decolonization] Критика джерел: як угорські військові звіти описують бійців «Карпатської Січі»? Порівняння з українськими
    джерелами для виявлення пропагандистських кліше.'
  section: 'Джерела: Щоденники, закони та телеграми'
  words: 1600
- points:
  - 'Причини поразки: військова перевага Угорщини, міжнародна ізоляція, відсутність зовнішньої підтримки.'
  - 'Бій на Красному полі як «Українські Термопіли»: аналіз військової тактики та символічного значення нерівної битви 2000
    січовиків проти регулярної армії.'
  - '[!myth-buster] Спростування міфу про «опереткову державу». Вибори до Сойму 12 лютого 1939 року (92.4% голосів за Українське
    Національне Об''єднання) як доказ легітимності та масової підтримки руху.'
  - 'Довгострокові наслідки: Карпатська Україна як демонстрація тяглості державницької традиції від УНР/ЗУНР та прообраз майбутньої
    незалежної України. Вплив на український рух опору під час та після Другої світової війни.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до головного питання: так чому ж «одноденна держава» стала наріжним каменем національної пам''яті? Студент
    формулює власну аргументовану відповідь.'
  - '[!anti-hagiography] Чи була Карпатська Україна ідеальною? Внутрішні конфлікти, обмежені ресурси та складні політичні
    компроміси.'
  - 'Зв''язок із сьогоденням: прапор і гімн, проголошені в Хусті 1939 року, стали державними символами України 1991 року.
    Що це означає для сучасної української ідентичності?'
  - 'Феномен «Срібної Землі» в українській культурі: як ця історична подія відображена в літературі (Улас Самчук, Олександр
    Олесь) та сучасній публіцистиці?'
  section: Дискусія та підсумок
  words: 700
focus: The rise and fall of Carpatho-Ukraine, geopolitical context of 1938-39, the defense of the Carpathian Sich, and its
  symbolic legacy for Ukrainian statehood
level: HIST
module: hist-104
objectives:
- Описувати передумови, перебіг та наслідки проголошення незалежності Карпатської України в геополітичному контексті 1938-1939
  років
- Аналізувати ключові першоджерела (закони, спогади, дипломатичні документи), застосовуючи елементи критики джерел
- Спростовувати імперські та пропагандистські міфи щодо Карпатської України, використовуючи історичні факти та докази
- Оцінювати символічне значення досвіду Карпатської України для тяглості української державницької традиції та відновлення
  незалежності в 1991 році
