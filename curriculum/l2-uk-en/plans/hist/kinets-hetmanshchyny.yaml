objectives:
- Аналізувати процес ліквідації Гетьманщини та Запорізької Січі як свідому політику Російської імперії
- Розрізняти імперські наративи про "возз'єднання" та український погляд на втрату державності
- Пояснювати економічні, соціальні та культурні наслідки інкорпорації українських земель до складу імперії, включно із запровадженням
  кріпацтва
- Критично оцінювати роль української еліти у процесах асиміляції та втрати автономії
