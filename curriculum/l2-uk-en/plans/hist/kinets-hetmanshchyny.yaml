content_outline:
- points:
  - 'Провокація: Чи могла Гетьманщина вижити? Уявіть, що ви — останній гетьман, Кирило Розумовський. Які три рішення ви б
    ухвалили у 1763 році, щоб спробувати врятувати автономію від поглинання імперією?'
  - 'Короткий уривок з "інструкції" Катерини ІІ князю Вяземському: "...старатися, щоб і ім’я гетьманів зникло". Що означає,
    коли імперія ставить за мету не просто завоювання, а стирання пам’яті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ліквідація Гетьманщини — це була "інкорпорація" в імперію чи брутальна колоніальна анексія? Порівняння російської
    імперської риторики про "возз''єднання" з українським поглядом на втрату державності.'
  - 'Дебат 2: Внутрішні причини занепаду. Чи була козацька старшина готова "продати" автономію за ціну російського дворянства?
    Дискусія про роль асиміляції еліт у втраті суверенітету.'
  - '[!epistemic-humility] Оцінка масштабів опору. Наскільки сильним був спротив ліквідації? Історики сперечаються, чи була
    відсутність великих повстань ознакою згоди, чи наслідком тотального імперського контролю.'
  - 'Глобальна синхронність: "Освічений абсолютизм" Катерини ІІ як загальноєвропейський тренд на централізацію та уніфікацію.
    Подібні процеси в імперії Габсбургів, Пруссії. Гетьманщина як аномалія, приречена на зникнення.'
  section: 'Конфліктна карта: Неминучий фінал чи зрада еліт?'
  words: 900
- points:
  - 'Текст 1: Маніфест Катерини II про скасування Запорізької Січі (1775). Аналіз мови документа: як імперія виправдовує знищення
    Січі? Які звинувачення висуває козакам?'
  - 'Текст 2: Спогади Микити Коржа про руйнування Січі військами генерала Текелія. Погляд зсередини: емоції, розпач, символічний
    жест козаків, що брали рідну землю в чоботи.'
  - '[!decolonization] Читаємо "Історію Русів" як політичний памфлет, а не як точну хроніку. Як автор використовує історію,
    щоб сформулювати ідею неперервності української державності всупереч імперським наративам?'
  - 'Текст 3: Указ про запровадження кріпацтва (1783). Юридичний аналіз: як один документ поклав край століттям козацької
    волі та перетворив вільних селян на власність дворян.'
  section: 'Джерела: Маніфести, спогади та укази'
  words: 1600
- points:
  - 'Короткострокові наслідки: перетворення козацьких полків на регулярні російські, ліквідація українського судочинства,
    запровадження російського адміністративного устрою (намісництва).'
  - 'Довгострокові наслідки: перетворення української політичної нації на етнографічну масу. Втрата власної еліти, армії та
    інституцій.'
  - '[!myth-buster] Спростування міфу про "Дике Поле" та "цивілізаційну місію" Росії. Румянцевський опис (1765-1769) як доказ
    розвиненої економіки та адміністрації Гетьманщини, яку імперія прийшла не розвивати, а грабувати.'
  - 'Бренд "Новоросія": як імперія намагалася стерти українську історію Півдня, роздаючи козацькі землі іноземним колоністам
    та російським дворянам.'
  - 'Оцінки істориків: порівняння поглядів Ореста Субтельного, Сергія Плохія та Павла-Роберта Маґочія на ліквідацію Гетьманщини
    як цивілізаційну катастрофу.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чи була альтернатива? Студент формулює аргументовану відповідь, спираючись на матеріали модуля
    — чи були шанси врятувати Гетьманщину?'
  - Кінець державності як початок "довгого XIX століття" бездержавності. Як ця подія визначила траєкторію українського національного
    руху на наступні 150 років?
  - '[!anti-hagiography] Деромантизація "золотої осені" гетьмана Розумовського. Чи не були його реформи занадто запізнілими
    та косметичними в умовах неминучого імперського тиску?'
  - 'Зв''язок із сьогоденням: Які паралелі можна провести між методами ліквідації Гетьманщини у XVIII столітті та сучасною
    політикою Росії щодо України?'
  section: Дискусія та підсумок
  words: 700
focus: The abolition of the Hetmanate by Catherine II in 1764, the destruction of the Zaporizhian Sich in 1775, the introduction
  of serfdom in 1783, and the final incorporation of Ukrainian lands into the Russian Empire.
level: HIST
