content_outline:
- points:
  - 'Провокація: Повстання кінця XVI ст. — це бунт свавільних розбійників чи перша війна за незалежність? Чи могла історія
    України піти іншим шляхом?'
  - 'Що важливіше для держави: закон і порядок чи права і свободи? Розглядаємо дилему на прикладі дій коронного гетьмана Жолкевського.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 [!decolonization]: Річпосполитська версія (swawola, bunt chłopstwa — «свавілля, селянський бунт») vs українська
    історіографія (війна за вольності, протодержавний рух).'
  - 'Дебат 2: Причини повстань — приватний конфлікт (маєток Косинського) що переріс у соціальний вибух, чи системний конфлікт
    між козацтвом як новим соціальним станом і шляхетською державою?'
  - '[!epistemic-humility] Більшість джерел написані переможцями (польською шляхтою). Як читати їхні звіти «проти шерсті»,
    щоб побачити позицію повстанців?'
  - 'Глобальна синхронність: Нідерландська революція проти Іспанії, релігійні війни у Франції — європейський контекст боротьби
    за віру та права станів.'
  section: 'Конфліктна карта: Бунт рабів чи війна за права?'
  words: 900
- points:
  - 'Аналіз щоденника Станіслава Жолкевського: виправдання жорстокості «державною необхідністю» та опис козаків як «hostes
    patriae» (ворогів вітчизни).'
  - 'Лист Северина Наливайка до короля Сигізмунда III: між дипломатичною риторикою та прихованими вимогами політичної автономії.'
  - 'Нотатки Еріха Лясоти фон Стеблау: погляд європейського дипломата на козацьку військову організацію та політичні амбіції
    під час його візиту на Січ.'
  - '[!decolonization] Порівняння описів битви під П''яткою у польських хроніках (Бєльський, Гайденштайн) та в козацькому
    фольклорі. Де закінчується факт і починається пропаганда?'
  section: 'Джерела: Свідчення переможців та переможених'
  words: 1600
- points:
  - 'Короткострокові наслідки: жорстоке придушення, сеймові конституції 1593/1596 рр., що оголосили козаків поза законом,
    та трагедія під Солоницею як урок про неможливість домовленостей.'
  - 'Довгострокові наслідки: Берестейська унія (1596) перетворила козаків на «меч православ''я», головних захисників гнобленої
    руської віри та народу.'
  - 'Народження політичної програми: вимоги «шляхетських вольностей» (суд, земля, податки) стали основою майбутніх козацьких
    договорів, включно з Переяславською угодою.'
  - '[!myth-buster] Це не були хаотичні селянські бунти. Аналіз доводить наявність організованої артилерії, розвідки, дипломатії
    та ідеї створення «Удільного князівства» — прообразу козацької держави.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож Косинський і Наливайко — бандити чи національні герої? Студент формулює власну аргументовану
    відповідь.'
  - Чому перші повстання зазнали поразки, а повстання Хмельницького через 50 років перемогло? Аналіз ключових відмінностей.
  - '[!anti-hagiography] Зрада у козацькому таборі під Солоницею — аналіз причин розколу між реєстровими та нереєстровими
    козаками. Чи була єдність можливою?'
  - 'Зв''язок із сьогоденням: як досвід перших козацьких повстань вплинув на формування українського національного характеру
    та ставлення до держави і свободи?'
  section: Дискусія та підсумок
  words: 700
focus: Повстання Косинського та Наливайка, перехід від соціальних до політичних вимог, Берестейська унія як каталізатор, формування
  козацтва як політичної сили
