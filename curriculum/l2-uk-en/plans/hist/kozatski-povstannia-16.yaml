objectives:
- Аналізувати причини та наслідки повстань Криштофа Косинського та Северина Наливайка, розрізняючи приватні, соціальні та
  релігійні мотиви.
- Критично порівнювати первинні джерела, що представляють різні сторони конфлікту (польську та козацьку).
- Пояснювати довгостроковий вплив цих повстань на формування козацтва як окремого політичного стану та захисника православ'я.
- Аргументовано розрізняти польську інтерпретацію подій як «бунту» та українську як «війни за права».
