content_outline:
- points:
  - 'Провокація: Чи було Велике князівство Литовське «золотою добою» для руських земель, чи лише довгою прелюдією до поглинання
    Польщею та втрати самобутності?'
  - 'Фрагмент з Литовського статуту (без контексту): "Писар земський маєть по-руску литерами и словы рускими вси листы, выписы
    и позовы писати, а не иншим езыком и словы..." — Що цей закон говорить про реальний статус руської мови?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: ВКЛ — це спільна литовсько-руська держава, де русини мали значний вплив (теза Грушевського), чи це литовська
    експансія, що лише використала руську еліту (радянська та частково польська історіографія)? [!decolonization]'
  - 'Дебат 2: Чи були магнати, як Острозькі, захисниками "руської ідеї" та творцями прото-держави, чи просто феодалами, що
    дбали про власні інтереси, фрагментуючи владу?'
  - '[!epistemic-humility] Більшість джерел (літописи, статути) написані елітою і для еліти. Ми мало знаємо, як звичайний
    селянин на Волині ідентифікував себе і свою "державу".'
  - 'Глобальна синхронність: Децентралізована влада магнатів у ВКЛ (кінець XV-XVI ст.) vs централізація монархій у Західній
    Європі (Франція, Англія) та становлення "нових монархій".'
  section: 'Конфліктна карта: Спільна держава чи окупація?'
  words: 900
- points:
  - 'Аналіз уривків з Третього Литовського статуту (1588): правові норми щодо статусу шляхти, власності на землю, судочинства.
    Які права гарантувалися руській шляхті?'
  - 'Острозька Біблія (1581) як першоджерело: не просто релігійний текст, а політична і культурна декларація. Аналіз передмови,
    мови та символізму видання.'
  - '[!decolonization] Чому Острозька Біблія надрукована церковнослов''янською, а не "простою мовою"? Це доказ "російського
    впливу" (імперський міф) чи свідома стратегія створення спільного культурного простору для всіх православних слов''ян,
    альтернативного до Москви?'
  - 'Джерельна критика: Хто замовив Статут, а хто — Біблію? Якою була мета кожного з цих проєктів? Чиї інтереси вони відстоювали?'
  section: 'Джерела: Литовські статути та Острозька Біблія'
  words: 1600
- points:
  - 'Причини та наслідки: Як ослаблення центральної влади в Києві призвело до посилення магнатських "держав у державі" (Острозькі,
    Вишневецькі, Заславські)?'
  - 'Короткострокові наслідки: культурний розквіт (Острозька академія), збереження православної ідентичності, ефективна оборона
    від татарських набігів силами магнатських армій.'
  - 'Довгострокові наслідки: політична фрагментація, нездатність руської еліти виступити єдиним фронтом, що полегшило перехід
    українських земель під владу Польської Корони в 1569 році.'
  - '[!myth-buster] Міф про те, що ВКЛ було "більш толерантним" за Польщу. Аналіз правового статусу русинів-не-шляхтичів.
    Чи справді всім жилося краще?'
  section: 'Аналіз: Наслідки та значення магнатської автономії'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, ВКЛ — "золота доба" чи втрачена можливість? Студент формулює власну аргументовану відповідь,
    спираючись на матеріал модуля.'
  - 'Зв''язок із сьогоденням: Дискусії про "європейський вибір" України мають глибоке коріння. Як досвід ВКЛ (інтеграція в
    західну цивілізацію зі збереженням ідентичності) актуальний сьогодні?'
  - '[!anti-hagiography] Ідеалізація Острозького як "некоронованого короля Русі" заважає побачити реальні політичні прорахунки
    еліти того часу. Яких помилок вони припустилися напередодні Люблінської унії?'
  section: Дискусія та підсумок
  words: 700
focus: The special status of Ukrainian lands in the Grand Duchy of Lithuania (VKL), the balance between integration and identity,
  and the rise of the magnate families like the Ostrozkyis as a de facto government before the Union of Lublin.
level: HIST
module: hist-030
objectives:
- Пояснювати специфіку правової та культурної автономії Волині та Київщини у складі ВКЛ.
- Аналізувати роль магнатських родів (зокрема Острозьких) як носіїв прото-державності.
- Критично оцінювати різні історіографічні підходи до періоду ВКЛ (як "спільної спадщини" vs "литовської експансії").
- Аналізувати уривки з Литовських статутів як першоджерела для розуміння соціального та правового устрою.
pedagogy: CBI
persona:
  role: Професор, що ставить під сумнів романтичні уявлення про «братні народи» і змушує читати юридичні документи (Литовські
    статути) як першоджерела політичної реальності.
  voice: Critical-Legal-Historian
phase: HIST.3
