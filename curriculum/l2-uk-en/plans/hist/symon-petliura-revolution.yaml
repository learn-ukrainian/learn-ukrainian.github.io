objectives:
- Описувати ключові етапи життя та політичної діяльності Симона Петлюри
- Пояснювати роль Петлюри в розбудові армії та державних інституцій УНР
- Критично аналізувати контроверсійні аспекти його спадщини, зокрема питання погромів та союзу з Польщею, розрізняючи історичні
  факти та пропаганду
- Оцінювати місце Петлюри в пантеоні української державності та його символічне значення сьогодні
