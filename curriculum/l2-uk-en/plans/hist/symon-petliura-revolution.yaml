content_outline:
- points:
  - 'Провокація: "Бандит" чи "державник"? Чому одна й та сама людина — Симон Петлюра — для одних є символом боротьби за незалежність,
    а для інших — тавром "петлюрівщини"?'
  - Що б ви зробили на його місці в "трикутнику смерті" 1919 року, затиснуті між трьома ворогами та епідемією тифу?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] "Петлюрівщина" як радянський дегуманізуючий термін vs Петлюра як творець армії та лідер держави
    в умовах тотальної війни.'
  - 'Дебат 2: Варшавський договір — це вимушений компроміс для порятунку держави чи національна зрада через відмову від Галичини?
    Позиція Петлюри vs позиція галицьких еліт.'
  - '[!epistemic-humility] Конфлікт з Винниченком: реаліст-мілітарист проти соціаліста-пацифіста. Чия стратегія була більш
    адекватною моменту? Джерела не дають однозначної відповіді.'
  - 'Глобальна синхронність: Боротьба УНР за виживання (1919-1921) відбувається одночасно з війною за незалежність Ірландії,
    польсько-радянською війною та розпадом імперій по всій Європі.'
  section: 'Конфліктна карта: Борець чи зрадник?'
  words: 900
- points:
  - 'Наказ № 131 (26 серпня 1919): "Кара на смерть погромникам". Аналіз тексту наказу як доказу державної політики УНР щодо
    боротьби з погромами.'
  - '[!decolonization] Читаємо наказ проти радянської пропаганди: як наказ, що вимагав розстрілу провокаторів, був проігнорований
    у вироку вбивці Петлюри?'
  - 'Листи до дружини: "Ми не можемо перестати боротися, бо це значить зрадити націю". Особистість Петлюри через приватне
    листування — аскетизм, глибока віра, відсутність прагнення до влади.'
  - 'Спогади соратників: "Він жив у вагоні потяга, постійно на фронті". Образ лідера, який ділить з армією всі труднощі війни.'
  section: 'Джерела: Накази, листи та свідчення'
  words: 1600
- points:
  - 'Причини поразки визвольних змагань: аналіз "трикутника смерті", відсутність єдності серед українських сил, брак міжнародної
    підтримки.'
  - '[!myth-buster] Контроверсія про погроми: роль "чорних сотень", червоних і білих провокаторів. Факт створення Міністерства
    єврейських справ УНР як унікальної для тогочасного світу інституції.'
  - 'Вбивство в Парижі як спецоперація ДПУ: суд над Шварцбардом як перший приклад перетворення суду над вбивцею на суд над
    жертвою за гроші Москви.'
  - 'Довгострокові наслідки: Петлюра як символ нескореності та продовження боротьби в еміграції, що заклало основи для майбутніх
    поколінь борців.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож "бандит" чи "державник"? Студент формулює власну аргументовану позицію на основі джерел та
    аналізу з модуля.'
  - '[!anti-hagiography] Петлюра не був святим. Він був лідером нації без держави, змушений обирати між поганим і найгіршим.
    Чи виправдовує мета засоби в його випадку?'
  - 'Зв''язок із сьогоденням: Як досвід УНР та постать Петлюри допомагають зрозуміти сучасну війну України за незалежність?'
  - Похорон Петлюри в Парижі як маніфестація нескореності української еміграції. Чому Москва так боялася його навіть після
    смерті?
  section: Дискусія та підсумок
  words: 700
