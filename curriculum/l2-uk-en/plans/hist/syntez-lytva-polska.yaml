content_outline:
- points:
  - 'Провокація: Литовсько-польська доба для України — це «золота осінь Середньовіччя» чи повільна втрата суверенітету, що
    призвела до національної катастрофи?'
  - 'Що важливіше для державності: мати власні закони (Литовські статути) чи власну незалежну армію та зовнішню політику?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Люблінська унія 1569 року — це «братерське об''єднання» чи інкорпорація українських земель
    Польщею? Порівняння польської та української історіографії.'
  - 'Дебат 2: Берестейська унія 1596 року — це спроба порятунку київського християнства чи розкол, що ослабив націю перед
    зовнішніми загрозами? Позиції прихильників та противників унії в XVII ст. та сьогодні.'
  - '[!epistemic-humility] Історики досі сперечаються, чи був у Великого князівства Литовського шанс стати повноцінною українсько-білоруською
    державою, чи воно було приречене на поглинання Польщею або Московією.'
  - 'Глобальна синхронність: Поки в Речі Посполитій тривали релігійні дебати, в Західній Європі йшла Тридцятилітня війна (1618–1648)
    — перший загальноєвропейський конфлікт, що також мав релігійне підґрунтя.'
  section: 'Конфліктна карта: "Золотий вік" чи "темна доба"?'
  words: 900
- points:
  - Аналіз фрагментів Литовського статуту 1588 р. — «руська мова» як офіційна, правові норми, що обмежували владу монарха.
    Чому цей кодекс називають пам'яткою українського права?
  - Аналіз тексту Берестейської унії. Які умови об'єднання з Римом? Які гарантії давалися православній ієрархії? Де були закладені
    майбутні конфлікти?
  - '[!decolonization] Читання «проти шерсті» польських джерел про козацькі повстання (Наливайка, Трясила). Де видно страх
    перед «руською сваволею»? Як шляхта пояснювала собі причини бунтів?'
  - 'Полемічна література: порівняння уривків з творів Івана Вишенського (проти унії) та Іпатія Потія (за унію). Аналіз риторики,
    аргументів та образів ворога.'
  section: 'Джерела: Статути, унії та полеміка'
  words: 1600
- points:
  - 'Причинно-наслідковий ланцюг: як зростання фільваркового господарства та закріпачення селянства (соціально-економічний
    фактор) поєдналося з релігійним тиском на православну шляхту та міщан (культурно-релігійний фактор), створивши вибухову
    суміш для Хмельниччини.'
  - '[!myth-buster] Деконструкція міфу про «віковічну ненависть» українців та поляків. Аналіз періодів плідної співпраці шляхти,
    спільних військових перемог (Хотин 1621) та культурного взаємозбагачення.'
  - '[!biography] Роль українських магнатських родів (Острозькі, Вишневецькі): меценати культури, захисники православ''я,
    а водночас і найбільші землевласники, що впроваджували кріпацтво. Як одна родина могла поєднувати такі суперечливі ролі?'
  - 'Порівняльний аналіз оцінок періоду: Михайло Грушевський (акцент на втраті державності), Орест Субтельний (акцент на вестернізації),
    Наталя Яковенко (акцент на моделі «шляхетської нації»).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює власну аргументовану відповідь на питання про «золоту осінь» чи «втрату суверенітету»,
    використовуючи дані з джерел та аналізу.'
  - '[!anti-hagiography] Уникнення ідеалізації. Чи була «шляхетська демократія» справді демократією, чи владою олігархії?
    Наскільки «європейський вибір» шляхти враховував інтереси селянської більшості?'
  - 'Спадщина для сучасної України: досвід парламентаризму, місцевого самоврядування (Магдебурзьке право), верховенства права
    (Литовські статути) — як ці ідеї Речі Посполитої актуальні сьогодні?'
  - 'Зв''язок із сьогоденням: сучасні українсько-польські відносини часто апелюють до «спільної спадщини Речі Посполитої».
    Наскільки це історично коректно і які ризики несе така риторика?'
  section: Дискусія та підсумок
  words: 700
focus: 'Синтез литовсько-польської доби: державність (ВКЛ, Річ Посполита), суспільні зміни (шляхта, кріпацтво), релігійні
  конфлікти (Берестейська унія) та культурна ідентичність як передумови Хмельниччини.'
level: HIST
module: hist-040
objectives:
- Критично аналізувати суперечливий характер литовсько-польської доби, розрізняючи позитивні та негативні аспекти для української
  державності та суспільства
- Порівнювати різні історіографічні підходи (український, польський, сучасний) до ключових подій, таких як Люблінська та Берестейська
  унії
- Аналізувати первинні джерела (Литовські статути, полемічна література) для реконструкції правової та культурної атмосфери
  епохи
- Формулювати складні причинно-наслідкові зв'язки, що призвели до Хмельниччини, поєднуючи соціально-економічні, політичні
  та релігійні фактори
