content_outline:
- points:
  - 'Провокація: Що таке «Дике поле»? Порожня земля, що чекає на господаря, чи небезпечна межа цивілізацій? Чому в XVII столітті
    десятки тисяч українців вирішили покинути обжиті землі та рушити у невідомість на схід?'
  - 'Фрагмент документа: «А поселились они, беглые черкасы, самовольно, без нашего государева указа...» Звідки цей документ
    і про кого він говорить?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Міф про «споконвічно російську землю». Українська народна колонізація «знизу» (втеча від Руїни, освоєння простору)
    vs. московська державна політика «згори» (створення буферної зони).'
  - 'Дебат 2: Характер міграції. Це була стихійна втеча від польського гніту та війни чи прагматичне переселення, заохочене
    московськими пільгами та обіцянками?'
  - '[!epistemic-humility] Брак переписів та упередженість джерел (московські грамоти vs козацькі літописи) ускладнюють точну
    оцінку першопричин та масштабів міграції.'
  - 'Глобальна синхронність: Заселення Слобожанщини (1630-1680-ті) відбувається одночасно із заселенням Нової Англії в Північній
    Америці та закінченням Тридцятилітньої війни в Європі.'
  section: 'Конфліктна карта: Український фронтир чи московський форпост?'
  words: 900
- points:
  - 'Аналіз царської грамоти Олексія Михайловича про заснування Харкова (1654): які «вольності» надано переселенцям і які
    обов''язки («государева служба») накладено?'
  - 'Читання універсалу гетьмана Івана Самойловича про слобідські землі: як козацька старшина бачила ці території — як частину
    Гетьманщини чи окрему одиницю?'
  - '[!decolonization] Читаємо «чолобитні» (прохання) слобідських осадчих до царя «проти шерсті»: що мова документа говорить
    про реальний рівень автономії, а що є лише формальним етикетом підданства?'
  - 'Порівняльний лінгвістичний аналіз джерел: семантика слова «воля» в козацьких документах vs «милость» і «служба» у московських.
    Як мова віддзеркалює різні політичні культури.'
  section: 'Джерела: Грамоти, універсали, чолобитні'
  words: 1600
- points:
  - 'Наслідок 1: Створення пʼяти полків як основи нового суспільства — Харківський, Сумський, Охтирський, Ізюмський, Острогозький.
    Їхня військова, адміністративна та економічна роль.'
  - 'Наслідок 2: Унікальна соціальна структура. Суспільство без кріпацтва до XVIII ст., де основу становили козаки, посполиті
    та міщани, що мали особисту свободу.'
  - 'Наслідок 3: Демографічний та культурний зсув. Перетворення «Дикого поля» на густозаселений український край із власними
    містами (Харків, Суми), традиціями та діалектом.'
  - '[!myth-buster] Міф про «вічні вольності». Ліквідація слобідських полків та козацького самоврядування Катериною II у 1765
    році як закономірний етап імперської політики асиміляції, а не випадковість.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Слобожанщина — це українська земля, завойована потом і кров''ю, чи буферна зона, тимчасово віддана
    Москвою в оренду? Формулювання власної аргументованої позиції.'
  - '[!anti-hagiography] Слобідські козаки — не лише герої-захисники, а й прагматичні колонізатори, що іноді вступали в конфлікти
    з місцевим населенням (татарами) та між собою за ресурси.'
  - 'Зв''язок із сьогоденням: як історія заселення Слобожанщини, її автономії та подальшої русифікації пояснює стійкість Харкова
    та опір російській агресії у XXI столітті?'
  section: Дискусія та підсумок
  words: 700
focus: Історія української колонізації Слобожанщини, організація пʼяти козацьких полків, соціальний устрій та деконструкція
  імперських міфів про регіон.
level: HIST
module: hist-038
objectives:
- Пояснювати історичні причини, етапи та характер української колонізації Слобожанщини в XVII столітті
- Характеризувати п'ять слобідських козацьких полків та описувати особливості їхнього військово-адміністративного та соціального
  устрою
- Критично аналізувати імперські міфи про Слобожанщину, спираючись на первинні джерела та сучасну історіографію
- Застосовувати спеціалізовану лексику, що стосується колонізації, соціальної структури та військово-адміністративної системи
  Слобожанщини
