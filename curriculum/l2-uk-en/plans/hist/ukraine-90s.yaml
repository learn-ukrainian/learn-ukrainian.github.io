content_outline:
- points:
  - 'Провокативне питання: 1990-ті для України — це «втрачене десятиліття» хаосу чи необхідний, хоч і болісний, етап становлення
    держави? Що важливіше: свобода чи добробут?'
  - «Маємо те, що маємо». Як ви розумієте цю знамениту фразу першого президента Кравчука, що стала символом епохи?
  - Перший шок: ейфорія від незалежності 1991 року швидко змінилася розпачем від економічного колапсу та гіперінфляції.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хто винен в економічній кризі — спадок СРСР та тиск Росії, чи некомпетентність нової української еліти? [!decolonization]'
  - 'Дебат 2: Олігархи — це «червоні директори», що врятували промисловість від остаточного розвалу, чи мародери, що «прихватизували»
    народне багатство? [!myth-buster]'
  - '[!epistemic-humility] Оцінки ролі Кучми різняться: від «батька української олігархії» до «авторитарного модернізатора»,
    що стабілізував економіку та прийняв Конституцію.'
  - 'Глобальна синхронність: Чому «шокова терапія» в Польщі дала результат, а українська ваучерна приватизація призвела до
    появи кланів? Порівняння з постсоціалістичними трансформаціями в країнах Балтії.'
  section: 'Конфліктна карта: Архітектори чи мародери?'
  words: 900
- points:
  - 'Джерело 1: Плівки Мельниченка. Аналіз фрагментів розмов з кабінету президента Кучми. Стиль спілкування, обговорення тиску
    на опозицію та журналістів. Що ці записи говорять про реальну природу влади?'
  - 'Джерело 2: Статті Георгія Гонгадзе в «Українській правді». Аналіз тем, які він піднімав: корупційні схеми, зловживання
    владою. Чому ця журналістика була небезпечною?'
  - 'Джерело 3: Текст Будапештського меморандуму (1994). Критичний аналіз гарантій безпеки, наданих Україні в обмін на ядерну
    зброю. Які формулювання виявилися пасткою?'
  - 'Джерело 4: Конституція України (1996). Аналіз положень про повноваження президента. Як «конституційна ніч» закріпила
    сильну президентську владу і вплинула на подальший розвиток?'
  - 'Джерело 5: Маніфести акції «Україна без Кучми» (2000-2001). Вимоги протестувальників як показник суспільних настроїв
    та перша спроба масштабної мобілізації громадянського суспільства.'
  section: 'Джерела: Голоси епохи'
  words: 1600
- points:
  - 'Наслідок 1: Формування кланово-олігархічної системи. Як «червоні директори» стали капіталістами, а ваучерна схема перетворилася
    на «прихватизацію». Роль донецького та дніпропетровського кланів.'
  - 'Наслідок 2: Встановлення президентської «вертикалі» та політика «багатовекторності». Як технологія «червоної загрози»
    на виборах 1999 року та контроль над медіа дозволили Кучмі утримати владу.'
  - 'Наслідок 3: Втрата легітимності влади. «Касетний скандал» та вбивство Георгія Гонгадзе як точка неповернення, що призвела
    до політичної кризи та ізоляції Кучми на Заході.'
  - '[!myth-buster] Міф про «стабільність» за часів Кучми. Ця стабільність базувалася на придушенні опозиції, контролі над
    судами та зрощенні криміналу з владою, що заклало міни під майбутнє держави.'
  - '[!decolonization] Роль Росії: не лише «старший брат», а активний гравець, що використовував енергетичний шантаж («газові
    війни»), підтримував сепаратизм у Криму (мєшковщина) та нав''язував свій культурний продукт.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, 1990-ті — це «втрачене десятиліття» чи «важке дитинство»? Студент формулює власну аргументовану
    відповідь.'
  - 'Шлях до Помаранчевої революції: Як події 1990-х (протести на граніті, «Україна без Кучми») сформували суспільство, здатне
    до масового протесту 2004 року.'
  - '[!anti-hagiography] Відмова від ностальгії за «сильною рукою». Аналіз показує, що авторитарні тенденції Кучми не вирішили
    проблем, а лише заморозили їх, призвівши до подальших революцій.'
  - 'Спадщина 90-х: Як кланово-олігархічна система, що народилася тоді, продовжує впливати на українську політику та економіку
    сьогодні?'
  section: Дискусія та підсумок
  words: 700
