- Описувати ключові економічні та політичні процеси в Україні 1990-х років, включно з гіперінфляцією та приватизацією
- Пояснювати механізми формування олігархічної системи та її довгостроковий вплив на державу
- Аналізувати основні етапи та суперечності президентства Леоніда Кучми, зокрема «касетний скандал» та справу Гонгадзе
- Оцінювати внутрішні та зовнішні виклики, що постали перед Україною після здобуття незалежності, та критично аналізувати
  роль Росії
