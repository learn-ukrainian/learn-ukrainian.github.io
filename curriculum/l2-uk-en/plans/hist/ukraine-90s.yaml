module: hist-122
level: HIST
sequence: 122
slug: ukraine-90s
version: '2.0'
title: 'Україна 1990-х: Кучма та олігархи'
subtitle: 'Ukraine in the 1990s: Kuchma and the Oligarchs'
content_outline:
- section: 'Вступ: Народження держави'
  points:
  - '1991: Україна незалежна — період ейфорії, що змінився шоком від економічного
    розвалу'
  - Виклики нової держави — втрата ядерної зброї (Будапештський меморандум 1994) та
    відсутність економічної стратегії
  - Від Кравчука до Кучми — вибори 1994 року як перша мирна передача влади; перемога
    Кучми на проросійських гаслах
- section: Економічна криза
  points:
  - 'Гіперінфляція — світовий рекорд 1993 року (понад 10000%) та повне знецінення
    заощаджень; cultural hook: «кравчучка» як символ виживання [!history-bite]'
  - Приватизація та «прихватизація» — ваучерна схема, де директори скуповували активи
    за безцінь [!myth-buster]
  - 'Народження олігархів — парадокс «червоних директорів»: як номенклатура стала
    капіталістами [!context]'
  - Донецький та дніпропетровський клани — формування груп впливу (Лазаренко, Тимошенко,
    Ахметов) навколо енергетики та металургії
- section: Президентство Кучми
  points:
  - Вибори 1994 та 1999 років — технологія «червоної загрози» (Кучма проти Симоненка)
    та використання адмінресурсу
  - Авторитарні тенденції — Конституція 1996 року як компроміс, що посилив президентську
    владу; багатовекторність як пастка [!decolonization]
  - Касетний скандал — оприлюднення записів Мельниченка Олександром Морозом (листопад
    2000)
  - Справа Гонгадзе — вбивство журналіста (вересень 2000) як точка неповернення для
    легітимності влади
  - «Україна без Кучми» — перші масові протести (грудень 2000 – березень 2001), розгін
    9 березня
- section: Первинні джерела
  points:
  - Касети Мельниченка — аналіз змісту погроз та стилю спілкування влади [!quote]
  - Журналістські розслідування — Георгій Гонгадзе та «Українська правда» як нові
    медіа
  - Свідчення політиків — реакція влади на звинувачення (заперечення, тиск на слідство)
- section: Деколонізаційний погляд
  points:
  - Олігархія vs. демократія — порівняння з люстрацією в країнах Балтії та Польщі;
    чому Україна тупцювала на місці
  - Роль Росії в 1990-х — енергетичний шантаж («газові війни»), Чорноморський флот
    та кримський сепаратизм (Мєшков)
  - Втрачені можливості — домінування російського культурного продукту vs феномен
    «Території А» [!culture]
- section: 'Підсумок: До Помаранчевої революції'
  points:
  - Підсумки 1990-х — ізоляція Кучми на Заході та дрейф у бік Росії
  - Формування опозиції — відставка Ющенка (2001) та створення блоку «Наша Україна»
  - Шлях до 2004 року — суспільство навчилося протестувати, а влада — фальсифікувати
    вибори
vocabulary_hints:
  required:
  - 'олігарх (oligarch) — кланово-олігархічна система; learner error: плутати з просто
    «багата людина» (бізнесмен)'
  - приватизація (privatization) — ваучерна приватизація, незаконна приватизація («прихватизація»)
  - інфляція (inflation) — гіперінфляція, галопуюча інфляція, індекс інфляції
  - корупція (corruption) — боротьба з корупцією, політична корупція, рівень корупції
  - демократія (democracy) — розбудова демократії, загроза демократії
  - клан (clan) — олігархічний клан, донецький клан, дніпропетровський клан
  - скандал (scandal) — касетний скандал, політичний скандал, корупційний скандал
  - журналіст (journalist) — опозиційний журналіст, свобода слова, переслідування
    журналістів
  recommended:
  - авторитаризм (authoritarianism) — посилення авторитаризму, авторитарний режим
  - бізнес (business) — тіньовий бізнес, малий та середній бізнес
  - опозиція (opposition) — демократична опозиція, об'єднана опозиція
  - вибори (elections) — фальсифікація виборів, президентські перегони
  - референдум (referendum) — всеукраїнський референдум
  - медіа (media) — незалежні медіа, контроль над медіа, цензура
