content_outline:
- points:
  - 'Провокація: Як держава, очолювана литовською династією, стала «золотим віком» для руської культури та права? В чому парадокс
    «оксамитового проникнення»?'
  - 'Теза для роздумів: Гедиміновичі, королі Литви, титулували себе і «королями Русі», приймаючи принцип «старини не рушимо».
    Що це означало на практиці?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 [!decolonization]: ВКЛ vs Московське князівство — хто є справжнім спадкоємцем політичної культури Київської Русі?
    Європейська договірна монархія з правами станів проти азійської деспотії без прав підданих.'
  - 'Дебат 2: Чия спадщина ВКЛ? Дискусія між литовською, білоруською та українською історіографіями про «свою» державу. Концепція
    «спільної спадщини».'
  - '[!epistemic-humility] Оцінка «толерантності» ВКЛ. Рівні права католиків і православних до Городельської унії 1413 року
    — це релігійна терпимість чи політичний прагматизм?'
  - 'Глобальна синхронність: Поки у ВКЛ кодифікували право і обмежували владу монарха, в Московії знищували вічеві традиції
    (приклад Новгорода), а в Західній Європі завершувалася Столітня війна.'
  section: 'Конфліктна карта: Два шляхи Русі'
  words: 900
- points:
  - 'Первинне джерело: Аналіз статей Першого Литовського статуту. Чому цей кодекс вважається найпрогресивнішим у тогочасній
    Європі?'
  - 'Мова закону: Руська мова як офіційна мова судочинства та діловодства. Цитата: «А писар земський має по-руськи слова,
    листи і протоколи писати, а не іншим яким язиком».'
  - '[!decolonization] Статут закріплював європейську правову ідентичність руської шляхти на противагу московському звичаєвому
    праву (відсутність індивідуальних прав, колективна відповідальність).'
  - 'Правова революція: Впровадження презумпції невинуватості, особистої відповідальності замість родової, формалізація судового
    процесу.'
  - 'Критика джерела: Статут писався шляхтою для шляхти. Чи поширювались ці «золоті вольності» на селян та міщан? Аналіз соціальних
    обмежень.'
  section: 'Джерела: Литовський статут 1529 року'
  words: 1600
- points:
  - 'Політичні наслідки: Битва на Синіх Водах (1362) — звільнення українських земель від ординського іга силами литовсько-руського
    війська, за 18 років до Куликовської битви.'
  - 'Культурні наслідки: Руська мова як lingua franca Східної Європи, розвиток літописання, полемічної літератури та юриспруденції.'
  - '[!myth-buster] Міф про «литовське завоювання». Більшість українських земель увійшли до складу ВКЛ шляхом династичних
    шлюбів, угод та визнання місцевою шляхтою влади Гедиміновичів як меншого зла порівняно з Ордою.'
  - 'Ідентичність: Формування «політичного народу» шляхти незалежно від етнічного походження та віри. Концепція «Іншої Русі»
    — альтернативного шляху розвитку східнослов''янського світу.'
  - 'Довготривалий вплив: Правова традиція ВКЛ, закріплена в Статутах, продовжувала діяти на українських землях навіть після
    їх анексії Російською імперією, формуючи опозицію до самодержавства.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, ВКЛ — це литовська держава з руським населенням чи руська держава з литовською династією?
    Студент формулює аргументовану відповідь.'
  - 'Ширше питання: Що важливіше для ідентичності держави — етнічне походження правителя чи мова законів, суду та культури?'
  - '[!anti-hagiography] Уникнення ідеалізації. ВКЛ не була раєм для всіх. Обмеження прав православних після Городельської
    унії, посилення кріпацтва у пізніх статутах.'
  - 'Зв''язок із сьогоденням: Спільний герб «Погоня» як символ боротьби за свободу в Білорусі та історичний герб Литви. Як
    спільна спадщина ВКЛ впливає на сучасні відносини трьох країн — України, Литви та Білорусі?'
  section: Дискусія та підсумок
  words: 700
focus: The role of Ruthenian lands in the GDL, Ruthenian as the state language, the Lithuanian Statutes, and the GDL as a
  European alternative to Muscovite despotism.
level: HIST
module: hist-029
objectives:
- Аналізувати роль і статус руських земель та руської мови у Великому князівстві Литовському
- Пояснювати ключові принципи та історичне значення Литовських статутів на тлі європейського права
- Критично порівнювати моделі державотворення у ВКЛ та Московському князівстві як два альтернативні шляхи розвитку Русі
- Деконструювати імперські та національні міфи, пов'язані з литовсько-руською добою
pedagogy: CBI
