content_outline:
- points:
  - 'Провокація: «Якщо не візьмемося нині за виправлення становища в Україні, Україну можемо втратити». Що змусило Сталіна
    написати ці слова у серпні 1932 року, і як цей страх перетворився на зброю масового знищення?'
  - Аналіз цитати без контексту: чиї це слова, про яку загрозу йдеться, і які «виправлення» могли б бути запропоновані?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська пропаганда vs. українська реальність. Чи був опір селян «саботажем класових ворогів», як стверджувала
    влада, чи це була відчайдушна боротьба за виживання та збереження ідентичності?'
  - 'Дебат 2: Чи був український селянин пасивною жертвою? Понад 4000 масових повстань, «бабські бунти» та тактичний відступ
    режиму (стаття «Запаморочення від успіхів») свідчать про активний опір.'
  - '[!epistemic-humility] Точну кількість повстань та жертв встановити неможливо через знищення радянською владою документів.
    Історики працюють із фрагментарними даними та свідченнями.'
  - 'Глобальна синхронність: Поки в СРСР проводили примусову колективізацію, світ переживав Велику депресію, а в Німеччині
    набирав сили нацистський рух, що також використовував мову ворожнечі для виправдання майбутніх злочинів.'
  section: 'Конфліктна карта: Спротив селян чи «саботаж куркулів»?'
  words: 900
- points:
  - 'Закон «Про п''ять колосків» (Постанова від 07.08.1932): аналіз тексту. Як оголошення власності «священною і недоторканною»
    виправдовувало розстріл за жменю зерна. [!decolonization]'
  - 'Режим «чорних дощок»: вивчення механізму повної блокади сіл (на прикладі сіл Лютенька, Кам''яні Потоки). Це була кара
    за невиконання хлібозаготівель чи цілеспрямоване вбивство?'
  - '«Червона мітла» та «натуральні штрафи»: аналіз інструкцій для «буксирних бригад». Конфіскація не лише зерна, а й будь-яких
    продуктів як інструмент терору.'
  - 'Директива про блокаду кордонів УСРР (22.01.1933): аналіз наказу, що перетворив Україну на гетто. Це доводить намір не
    допустити порятунку людей.'
  - 'Свідчення очевидців: уривки зі щоденників Нестора Білоуса («Люди мруть з голоду…») та Олександри Радченко. Як особисті
    історії контрастують із сухою мовою офіційних документів.'
  section: 'Джерела: Бюрократія геноциду'
  words: 1600
- points:
  - 'Соціальна інженерія: як Голодомор зламав традиційний сільський устрій і перетворив незалежних господарів на залежних
    від держави колгоспників.'
  - '[!myth-buster] Голодомор — це не наслідок посухи чи неврожаю. Це був штучно організований голод, що доводять обсяги хлібного
    експорту СРСР у 1932-33 роках та блокада кордонів.'
  - 'Русифікація як наслідок: організоване переселення росіян в опустілі українські села на Донбасі та Півдні. Аналіз директив
    про ешелони 1933 року як доказ свідомої зміни етнічного складу.'
  - 'Трансгенераційна травма: страх голоду, недовіра до влади, ментальність «не висовуйся» як довготривалі психологічні наслідки
    геноциду.'
  - 'Порівняльний аналіз: Голодомор в контексті інших колоніальних злочинів, де метрополія використовувала ресурси колонії,
    одночасно знищуючи носіїв її ідентичності.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, чому Сталін боявся «втратити Україну»? Студент формулює відповідь, поєднуючи докази про
    національний рух, селянський опір та економічну важливість України.'
  - 'Пам''ять як зброя: чому визнання Голодомору геноцидом є питанням національної безпеки України сьогодні? Обговорення традиції
    «Свічка у вікні».'
  - '[!anti-hagiography] Уникаючи віктимізації: як пам''ятати про жертв Голодомору, водночас наголошуючи на силі опору та
    стійкості українського народу, а не лише на стражданнях?'
  - 'Мова ворожнечі: як терміни «куркуль», «петлюрівські недобитки», «саботажники» зробили можливим масове вбивство? Які паралелі
    можна провести із сучасною російською пропагандою?'
  section: Дискусія та підсумок
  words: 700
focus: Legal and economic mechanisms of the Holodomor genocide, peasant resistance, and the decolonial perspective on the
  crime.
level: HIST
module: hist-101
objectives:
- Розуміти юридичні, економічні та ідеологічні механізми Голодомору-геноциду
- Аналізувати мову офіційного радянського дискурсу та порівнювати її зі свідченнями очевидців
- Застосовувати деколоніальну оптику для аналізу радянської історії, зокрема, політики русифікації
- Аргументовано доводити, що Голодомор був актом геноциду, на основі аналізу першоджерел та історичних досліджень
