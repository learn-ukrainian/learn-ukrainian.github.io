vocabulary_hints:
- definition: офіційний термін для примусового вилучення зерна у селян, що часто призводило до повної конфіскації
  pos: ж.
  word: хлібозаготівля
- definition: репресивна політика ліквідації заможних селян як класу, що включала конфіскацію майна, депортацію та фізичне
    знищення
  pos: с.
  word: розкуркулення
- definition: статус, що надавався селу чи району за «саботаж» хлібозаготівель, і означав повну економічну та військову блокаду,
    що призводила до голодної смерті
  pos: ж.
  word: чорна дошка
- definition: народна назва драконівського закону (постанови від 7.08.1932), що передбачав розстріл за привласнення навіть
    незначної кількості колгоспного майна
  pos: ч.
  word: п'ять колосків
- definition: форма репресії, коли за невиконання плану по зерну у селян конфісковували інші продукти харчування (м''ясо,
    картоплю), прирікаючи їх на смерть
  pos: ч.
  word: натуральний штраф
- definition: групи активістів, що проводили обшуки та конфіскації продуктів у селянських господарствах, часто вчиняючи насильство
  pos: ж.
  word: буксирна бригада
- definition: цілеспрямовані дії з метою знищення, повністю або частково, будь-якої національної, етнічної, расової чи релігійної
    групи
  pos: ч.
  word: геноцид
- definition: термін радянської пропаганди, що використовувався для таврування будь-якого опору чи невиконання планів як свідомого
    шкідництва
  pos: ч.
  word: саботаж
