objectives:
- Описувати ключові воєнні злочини, скоєні російськими військами, та їхні характеристики
- Пояснювати феномен української стійкості на прикладах громадського опору, волонтерства та культурної боротьби
- Аналізувати зв'язок між воєнними злочинами, стійкістю суспільства та успішними операціями зі звільнення територій
- Оцінювати роль міжнародного права та інституцій (МКС) у процесі притягнення до відповідальності за воєнні злочини
