content_outline:
- points:
  - 'Провокація: План «Київ за три дні» провалився. Чи були воєнні злочини та терор проти цивільних імпровізацією, чи це і
    був "план Б" від самого початку?'
  - 'Фрагмент без контексту: супутникові знімки Maxar, що показують тіла на вулицях Яблунській в Бучі. Питання до студента:
    "Що ми бачимо, і чому цей знімок став доказом, а не просто фото?"'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Російський наратив vs реальність. Позиція РФ про «постановку» та «фейки» проти задокументованих доказів (супутникові
    знімки, свідчення, міжнародні розслідування).'
  - 'Дебат 2: Злочини проти людяності чи геноцид? Юридична та історична дискусія. Аргументи "за" геноцид (стаття Тімоті Снайдера,
    риторика російських державних ЗМІ) vs суворі юридичні критерії доведення наміру в суді.'
  - '[!epistemic-humility] Визнання, що повна картина злочинів буде відома лише після деокупації всіх територій та завершення
    розслідувань.'
  - 'Глобальна синхронність: порівняння реакції світу на злочини в Україні з реакцією на злочини в Сирії, Чечні, Югославії.
    Чи змінилися підходи до міжнародного правосуддя?'
  section: 'Конфліктна карта: Як кваліфікувати зло'
  words: 900
- points:
  - 'Свідчення з Бучі: уривки з інтерв''ю вижилих про окупацію, розстріли за списками, катівні в таборі «Променистий» (джерела:
    «Слідство.Інфо», Радіо Свобода, The Reckoning Project).'
  - 'Облога Маріуполя: аналіз фото- та відеодоказів Євгена Малолетки (World Press Photo), зокрема наслідки авіаудару по Драмтеатру
    16 березня. Хроніка гуманітарної катастрофи.'
  - 'Депортація дітей: розбір офіційних документів МКС, зокрема ордеру на арешт Путіна та Львової-Бєлової від 17 березня 2023.
    Аналіз термінології: "незаконне переміщення".'
  - 'Удари по інфраструктурі: звіт розвідки про типи ракет та цілі осінньо-зимової кампанії 2022-2023 рр. Карта "Пунктів незламності"
    як відповідь.'
  - '[!decolonization] Читання імперських джерел "проти шерсті": аналіз російських пропагандистських статей (РІА «Новости»,
    2022) як доказів геноцидних намірів.'
  section: 'Джерела: Свідчення з пекла'
  words: 1600
- points:
  - 'Стійкість як відповідь на терор: аналіз феномену українського опору. Блекаути не зламали, а об''єднали (генератори, спільні
    вечері при свічках).'
  - 'Волонтерський рух як паралельна держава: збори на «Байрактари» (фонд Притули), тактична медицина, евакуація. Горизонтальні
    зв''язки як основа виживання нації.'
  - 'Культура як зброя: як гумор (меми про «бавовну», «тракторні війська») та пісні («Ой у лузі червона калина») стали інструментами
    психологічної стійкості та мобілізації.'
  - '[!myth-buster] Стійкість — це не вроджена риса, а результат історичного досвіду та свідомих зусиль громадянського суспільства.
    Це не про "терпіння", а про активну дію.'
  - 'Вплив на хід війни: як звірства в Бучі та Ірпені змінили світове сприйняття війни та пришвидшили постачання важкої зброї
    (зустріч у Рамштайні).'
  - 'Військові успіхи як результат стійкості: блискавичний контрнаступ на Харківщині (вересень 2022) та звільнення Херсона
    (листопад 2022). Символізм "кавуна звільнення".'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: чи був терор "планом Б"? Студент формулює відповідь, спираючись на докази системності злочинів
    та ідеологічне підґрунтя.'
  - '[!anti-hagiography] Стійкість має свою ціну. Обговорення проблеми вигорання, ПТСР та довгострокових психологічних наслідків
    для суспільства.'
  - 'Ширше питання: чи можливе правосуддя без перемоги? Роль спеціального трибуналу для злочину агресії. Невідворотність покарання
    як запобіжник майбутніх воєн.'
  - 'Зв''язок із сьогоденням: Гаага — це не лише про минуле. Це про визнання української суб''єктності та демонтаж російської
    імперської безкарності тут і зараз.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз воєнних злочинів РФ у 2022-2023 рр. (Буча, Маріуполь), феномену української стійкості та міжнародної правової
  відповіді.
