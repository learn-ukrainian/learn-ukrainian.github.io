content_outline:
- points:
  - 'Провокація: Чи були трипільці прямими предками українців? Розглядаємо «генетичний код нації» як наукову проблему, а не
    політичний слоган.'
  - 'Уявіть: ви знаходите поселення, де кожні 60-80 років мешканці спалювали свої ідеально збудовані двоповерхові будинки
    і йшли геть. Які три гіпотези ви б висунули для пояснення цього дивного ритуалу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Трипілля — автохтонна українська цивілізація vs. маргінальна «археологічна культура» на задвірках
    імперії. Розвінчання радянського міфу про «первісних дикунів» та імперського наративу про «спільну колиску».'
  - 'Дебат 2: Чи були трипільці «нашими»? Гіпотеза 1 (безперервність): трипільський субстрат як основа українського етносу
    (естетика хати, аграрна ментальність). Гіпотеза 2 (розрив): кліматичні зміни та індоєвропейські міграції призвели до занепаду
    і асиміляції, прямого зв''язку немає.'
  - '[!epistemic-humility] Наука не має остаточної відповіді. Генетичні дослідження показують складні міграційні хвилі, а
    не просту лінію спадкоємності.'
  - 'Глобальна синхронність: Мегапоселення Трипілля (450 га, ~15,000 мешканців) були найбільшими у світі в V тис. до н.е.,
    перевершуючи тогочасні міста Шумеру (Урук) та Єгипту.'
  section: 'Конфліктна карта: Спадкоємці чи сусіди?'
  words: 900
- points:
  - '[!biography] Вікентій Хвойка: чех, що закохався в українську землю і відкрив світу Трипілля. Читаємо фрагменти його звіту
    з розкопок 1896 р. — емоції першовідкривача та скрупульозність вченого.'
  - 'Артефакти як текст: аналіз «мовчазних джерел». Знаменита трипільська кераміка (біноклі, розпис) — що орнаменти (спіраль,
    сварга, засіяне поле) говорять про світогляд? Статуетки «богині-матері» — культ родючості чи матріархат?'
  - '[!decolonization] Імперська археологія шукала «царів» та зброю. Хвойка, навпаки, був вражений мирним, мистецьким характером
    цивілізації. Це суперечило іміджу «дикого степу».'
  - 'Сучасна археологія: як магнітометрична зйомка дозволила побачити плани гігантських поселень (Майданецьке, Тальянки) без
    єдиного заступу і зрозуміти їхню складну, радіально-концентричну структуру.'
  section: 'Джерела: Глина, кістки та магнітні поля'
  words: 1600
- points:
  - 'Протоміста, а не села: складна соціальна організація, що дозволяла існування поселень-гігантів. Спеціалізація ремесел
    (гончарство, металургія міді), торгівля, відсутність централізованої влади.'
  - 'Економіка достатку: високопродуктивне перелогове землеробство (пшениця, ячмінь) та розвинене скотарство (бик як культова
    тварина і тяглова сила) створювали надлишок, що дозволяв розвивати ремесла і духовну культуру.'
  - '[!myth-buster] Це не був «первісний комунізм». Суспільство було егалітарним (без царів і палаців), але не примітивним.
    Існувала рада старійшин, а будинки мали різний розмір, що вказує на певний ступінь майнового розшарування.'
  - 'Загадка занепаду: гіпотеза «ритуального спалення» (М. Відейко) як свідомий акт завершення життєвого циклу дому та спільноти.
    Чи це було екологічне виснаження? Чи тиск войовничих степових племен? Аналізуємо різні версії.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, трипільці — предки чи ні? Студент формулює власну аргументовану відповідь, спираючись на
    докази з модуля, розрізняючи культурну спадщину та пряму генетичну лінію.'
  - Чому Трипілля важливе сьогодні? Обговорення ролі «глибокої історії» у формуванні національної ідентичності та як протидія
    імперським наративам про «молоду націю».
  - '[!anti-hagiography] Уникаємо ідеалізації. Трипільська цивілізація, попри всі досягнення, зникла. Які уроки можна винести
    з її історії про сталий розвиток, відносини з довкіллям та крихкість складних суспільств?'
  - 'Зв''язок з сьогоденням: відлуння трипільської естетики в українському народному мистецтві (кераміка, вишивка, розпис
    хат).'
  section: Дискусія та підсумок
  words: 700
focus: 'Трипільська культура як цивілізація Старої Європи: протоміста, кераміка, суспільний устрій, дебати про спадщину та
  деконструкція імперських міфів.'
level: HIST
module: hist-001
objectives:
- Описувати Трипільську цивілізацію як одну з найдавніших та найрозвиненіших культур Європи доби енеоліту
- Аналізувати первинні та вторинні джерела про Трипілля, розрізняючи факти та інтерпретації
- Аргументовано брати участь у дискусії про культурну та історичну спадщину Трипілля для України
- Критично оцінювати роль археології у формуванні національних міфів та в деколонізаційних процесах
- Порівнювати трипільські протоміста з іншими стародавніми цивілізаціями, використовуючи коректну термінологію
