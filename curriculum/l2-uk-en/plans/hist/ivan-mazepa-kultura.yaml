objectives:
- Критично аналізувати образ Івана Мазепи, розрізняючи історичну постать, імперський міф та національний символ
- Описувати ключові риси та досягнення «мазепинського бароко» в архітектурі, літературі та мистецтві
- Пояснювати роль Києво-Могилянської академії як центру інтелектуального та духовного життя Гетьманщини
- Оцінювати культурну політику Мазепи як інструмент державотворення та утвердження європейської ідентичності України
