content_outline:
- points:
  - 'Провокативне питання: Як людина, піддана анафемі імперською церквою як «зрадник», могла стати найбільшим будівничим храмів
    в історії України? Парадокс Івана Мазепи.'
  - 'Первинне джерело без контексту: «А за волю, хоч умріте... і вічності доскочіте». Фрагмент думи, авторство якої приписують
    гетьману. Що ця фраза говорить про його справжні пріоритети?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська історіографія (Мазепа — «превеликий ктитор», будівничий нації) vs. Російська імперська версія (Мазепа
    — Юда, зрадник, чиї культурні досягнення є нікчемними або мають бути забутими).'
  - 'Дебат 2: Мазепинське бароко — це унікальний національний стиль чи лише регіональний варіант загальноєвропейського бароко
    з польськими впливами? Дискусія мистецтвознавців.'
  - '[!epistemic-humility] Оцінки інвестицій Мазепи (понад 1 млн дукатів) базуються на даних Бендерської комісії, складених
    вже після поразки. Чи є ці дані точними, чи це частина політичної легітимізації гетьмана в екзилі?'
  - 'Глобальна синхронність: Час Мазепи — це епоха Людовіка XIV у Франції та Петра I в Росії. Порівняйте: Версаль як центр
    абсолютистської влади, Петербург як нове імперське «вікно в Європу», і Київ як духовний та освітній центр, що відроджується
    на власному історичному фундаменті.'
  section: 'Конфліктна карта: Меценат чи зрадник?'
  words: 900
- points:
  - 'Джерело 1 (Гравюра): Гравюра І. Мигури «Мазепа серед своїх добрих справ» (1706). Аналіз: гетьман в оточенні алегоричних
    фігур та збудованих ним церков. Це не портрет, а політичний маніфест, візуальна програма його правління.'
  - 'Джерело 2 (Література): Трагікомедія Феофана Прокоповича «Володимир» (1705). Розбір посвяти Мазепі, де він порівнюється
    з князем-хрестителем. Як література створювала ідеологію гетьманської влади?'
  - '[!decolonization] Джерело 3 (Архітектура): Успенський собор Лаври. Як імперія намагалася привласнити цю спадщину, замовчуючи
    роль Мазепи у її відновленні? Чому більшовики знищили ключові храми мазепинської доби (Військовий Микільський, Богоявленський
    собори)?'
  - 'Джерело 4 (Документи): Універсали та вкладні грамоти на монастирі. Аналіз мови документів: гетьман як покровитель і захисник
    православної церкви, що утверджує свою владу через щедрість.'
  section: 'Джерела: Архітектура, гравюри та панегірики'
  words: 1600
- points:
  - 'Освіта: Києво-Могилянська академія (статус з 1701 р.) стала «Афінами на Дніпрі», готуючи еліту не лише для України, а
    й для всієї Східної Європи. Це створило інтелектуальний суверенітет.'
  - 'Ідентичність: Мазепинське бароко стало візуальним маркером української ідентичності — пишне, динамічне, життєствердне,
    відмінне від суворого московського стилю. Це «кам''яний літопис» нації.'
  - '[!myth-buster] Міф про «зраду» спростовується фактом будівництва понад 40 храмів та відновлення десятків інших. Справжньою
    «зрадою» для імперії був сам факт існування самодостатнього культурного проєкту, що доводив європейськість України.'
  - 'Мистецтво: Розвиток партесного співу (Микола Дилецький), гравюри (І. Щирський, Л. Тарасевич) та шкільного театру створив
    повноцінний культурний простір, який не потребував російського «центру».'
  - 'Оцінки істориків: Порівняння поглядів (Грушевський, Субтельний, Плохій) на Мазепу як фінальний акорд козацької державності
    та фігуру, що визначила європейський вектор України.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює відповідь: анафема була інструментом імперської політики пам''яті, спрямованої
    на стирання доказів української державності. Храми Мазепи були матеріальним спростуванням цієї політики, тому їх творця
    треба було демонізувати.'
  - '[!anti-hagiography] Мазепа не був демократом. Його меценатство було також інструментом утвердження особистої влади та
    створення образу «богообраного правителя» за зразками європейського абсолютизму.'
  - 'Зв''язок із сьогоденням: Сучасна деколонізація топонімів (вул. Мазепи замість вул. Січневого повстання) — це продовження
    боротьби за спадщину гетьмана. Чому його ім''я досі викликає такі гострі дискусії?'
  section: Дискусія та підсумок
  words: 700
focus: 'Епоха гетьмана Івана Мазепи (1687-1709) як культурний ренесанс: мазепинське бароко, роль Києво-Могилянської академії,
  меценатство, література, гравюра та музика. Деколонізація образу Мазепи-будівничого.'
