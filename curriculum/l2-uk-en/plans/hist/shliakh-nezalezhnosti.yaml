content_outline:
- points:
  - 'Провокаційне питання: Незалежність Україні «впала з неба» чи була виборена у столітній боротьбі? Чи був розпад СРСР неминучим,
    і яку роль у цьому відіграли українці?'
  - 'Цитата без контексту: «Україна починається з тебе». Хто, коли і в якому контексті міг сказати ці слова?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Розпад СРСР — «найбільша геополітична катастрофа» через економічний занепад (російський наратив)
    vs. «розвалення тюрми народів» активними діями республік, зокрема України (деколоніальний погляд).'
  - 'Дебат 2: Шляхи до незалежності — помірковане крило (Леонід Кравчук та частина компартії), що прагнуло поступового суверенітету,
    vs. радикали (Рух, В''ячеслав Чорновіл, студентство), що вимагали негайного розриву з імперією.'
  - '[!epistemic-humility] Чи можна було уникнути розпаду СРСР? Історики сперечаються, чи був проєкт Горбачова (оновлений
    союзний договір) життєздатним, чи імперія була приречена від самого початку.'
  - 'Глобальна синхронність: «Парад суверенітетів» у Балтії та падіння Берлінської стіни як зовнішні каталізатори, що довели:
    зміни можливі.'
  section: 'Конфліктна карта: Двигуни незалежності'
  words: 900
- points:
  - 'Джерело 1: Декларація про державний суверенітет (16 липня 1990). Аналіз тексту — ще не незалежність, але заявка на власну
    армію, фінанси та громадянство. Чому цей крок був революційним?'
  - 'Джерело 2: Вимоги студентів на граніті (жовтень 1990). Аналіз ультиматуму: відставка уряду, націоналізація майна, служба
    в армії лише в межах УРСР. Це політичний протест чи соціальний?'
  - 'Джерело 3: [!decolonization] Акт проголошення незалежності України (24 серпня 1991). Аналіз ключових фраз: «виходячи
    із смертельної небезпеки», «продовжуючи тисячолітню традицію державотворення». Юридичне та символічне значення.'
  - 'Джерело 4: Результати референдуму 1 грудня 1991. Цифри як неспростовний доказ: 90.32% «за». Особливий аналіз результатів
    у Криму (54%), Донецькій (83%) та Луганській (83%) областях.'
  section: 'Джерела: Акти, декларації та голоси 1991 року'
  words: 1600
- points:
  - 'Причина-наслідок: Живий ланцюг (1990) → Декларація про суверенітет (1990) → Революція на граніті (1990) → Путч ГКЧП (серпень
    1991) → Акт проголошення незалежності (серпень 1991). Як кожна подія робила наступну можливою.'
  - '[!myth-buster] Незалежність не «впала з неба». Це був результат консолідації суспільства: від культурних діячів та дисидентів
    (Рух) до студентів і, врешті-решт, прагматичної частини комуністичної еліти.'
  - 'Короткострокові наслідки: обрання першого президента (Кравчук), міжнародне визнання (Польща та Канада першими), юридичне
    оформлення «смерті» СРСР у Біловезькій пущі (грудень 1991).'
  - 'Довгострокові наслідки: виклики розбудови держави з нуля — формування інституцій, армії, економіки, кордонів в умовах
    глибокої кризи.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, незалежність «впала з неба»? Студент формулює аргументовану відповідь, використовуючи докази
    з модуля (роль Руху, студентів, результати референдуму).'
  - Чому референдум 1 грудня був вирішальним? Аналіз того, як всенародна підтримка легітимізувала Акт, зробила процес незворотнім
    і нейтралізувала будь-які спроби Москви оскаржити його.
  - 'Зв''язок із сьогоденням: Як результати референдуму 1991 року, особливо в східних та південних областях, слугують контраргументом
    сучасній російській пропаганді про «штучність» української держави?'
  section: Дискусія та підсумок
  words: 700
focus: The path to Ukrainian independence (1989-1991), focusing on the key events (Live Chain, Revolution on Granite), the
  August Coup as a catalyst, the Act of Independence, and the decisive 1991 Referendum.
level: HIST
module: hist-119
objectives:
- Аналізувати хронологію ключових подій 1989-1991 років, пояснюючи їх причинно-наслідкові зв'язки.
- Пояснювати історичне значення Акту проголошення незалежності та Всеукраїнського референдуму 1 грудня 1991 року.
- Розрізняти український деколоніальний погляд на здобуття незалежності та російський імперський наратив про «розпад СРСР».
- Формулювати аргументовану позицію щодо ролі різних суспільних груп (студентів, дисидентів, прагматиків) у процесі здобуття
  незалежності.
pedagogy: CBI
persona:
  role: Професор історії, який був безпосереднім свідком подій, пояснює не лише 'що' відбувалося, а й 'чому' це було важливо,
    поєднуючи особисті спогади з академічним аналізом.
  voice: Rukh-Intellectual-Turned-Historian
phase: HIST.12 [Independence & Modern Era]
