content_outline:
- points:
  - 'Провокація: Вересень 1939 року. Українці воюють один проти одного у лавах польської та радянської армій. Чия справа була
    правою? Чи міг бути правильний вибір за відсутності власної держави?'
  - 'Фрагмент тексту без контексту: «...розмежування сфер їхніх обопільних інтересів у Східній Європі... по лінії річок Нарев,
    Вісла і Сян». Про що цей документ і долю скількох мільйонів людей він вирішив?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський міф про «золотий вересень» (визволення братніх народів) vs. історична реальність (цинічна змова з
    Гітлером, окупація, анексія).'
  - 'Дебат 2: Реакція місцевого населення. Ейфорія деяких груп, що вітали повалення польської влади, vs. жах і відраза від
    радянських порядків. Як змінювалися настрої від вересня 1939-го до червня 1941-го?'
  - '[!epistemic-humility] Оцінити реальну підтримку чи опір в умовах тоталітарної окупації вкрай складно. Джерела (НКВС,
    пропаганда, щоденники) дають суперечливу картину.'
  - 'Глобальна синхронність: Пакт Молотова-Ріббентропа як детонатор Другої світової війни. Гітлер і Сталін як тимчасові союзники
    у руйнуванні Версальської системи.'
  section: 'Конфліктна карта: Поділ Європи чи «визволення»?'
  words: 900
- points:
  - Аналіз тексту таємного протоколу до пакту Молотова-Ріббентропа. Як саме ділили сфери впливу? Чому СРСР десятиліттями заперечував
    його існування?
  - '[!decolonization] Читаємо радянську пропаганду (газети про «радісне возз''єднання») паралельно зі звітами НКВС про арешти
    та депортації. Як працювала тоталітарна подвійна мова?'
  - 'Щоденники очевидців: спогади Кароліни Ланцкоронської, Гавриїла Костельника про прихід Червоної армії до Львова. Культурний
    шок, бідність «визволителів», перші ознаки терору.'
  - 'Трагедія відступу: документи про масові розстріли в''язнів НКВС у тюрмах Західної України влітку 1941 року (Львів, Луцьк,
    Станіславів). Свідчення ката, що вижив.'
  section: 'Джерела: Свідчення окупації'
  words: 1600
- points:
  - 'Коротка та довга перспектива: зміна однієї окупації (польської) на іншу (радянську), а потім і на третю (нацистську).
    Україна як епіцентр «Кривавих земель» (концепція Тімоті Снайдера).'
  - '[!myth-buster] Деконструкція міфу про «возз''єднання». Псевдо-вибори до Народних зборів під дулами автоматів. Насильницька
    радянізація: 4 хвилі депортацій, колективізація, націоналізація, знищення інтелігенції та церкви.'
  - 'Злочини двох режимів: порівняльний аналіз. Катинь (злочин НКВС) та Аушвіц (злочин нацистів) як прояви людиноненависницьких
    ідеологій. Чому нацистів у 1941-му попервах могли сприймати як визволителів від сталінського терору?'
  - 'Бездержавність як трагедія: українці змушені воювати у ворожих арміях. Відсутність власного суб''єкта міжнародної політики.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож чий вибір був «правильним» у 1939? Аргументація студента на основі матеріалів модуля.'
  - 'Головний урок 1939-1941: будь-який союз з імперією проти іншої імперії є пасткою для бездержавної нації. Незалежність
    — єдина гарантія від перетворення на «криваві землі».'
  - '[!anti-hagiography] Початкова надія частини українців на німців у 1941 році — не ознака симпатії до нацизму, а свідчення
    глибини відчаю та жаху перед радянським режимом.'
  - 'Зв''язок із сьогоденням: сучасна російська агресія, псевдо-референдуми, фільтраційні табори, депортації, воєнні злочини
    — як історія 1939-1941 років повторюється і що допомагає Україні чинити опір сьогодні.'
  section: Дискусія та підсумок
  words: 700
