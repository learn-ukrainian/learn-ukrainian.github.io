module: hist-105
objectives:
- Аналізувати зміст та наслідки пакту Молотова-Ріббентропа та його таємного протоколу для України та Європи
- Критично оцінювати радянський міф про «золотий вересень», протиставляючи пропаганду історичним фактам з первинних джерел
- Порівнювати характер та наслідки перших етапів радянської (1939-1941) та нацистської (з 1941) окупацій українських земель
- Пояснювати місце України в концепції «Кривавих земель» Тімоті Снайдера як епіцентру зіткнення двох тоталітарних режимів
