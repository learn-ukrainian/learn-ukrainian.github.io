content_outline:
- points:
  - 'Провокація: Як українцям вдалося випередити поляків на одну ніч і безкровно захопити владу у Львові 1 листопада 1918
    року? Це була відчайдушна імпровізація чи результат десятиліть підпільної підготовки?'
  - 'Цитата без контексту: «Вимогами хвилі є: взяти дотеперішню австрійську державну власть до українських рук». Хто, де і
    за яких обставин міг дати такий наказ?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська державність vs польський ірредентизм. [!decolonization] ЗУНР як реалізація права на самовизначення
    (принцип Вільсона) проти польської концепції «Східної Малопольщі» (Małopolska Wschodnia) та асиміляційної доктрини «gente
    Ruthenus, natione Polonus».'
  - 'Дебат 2: Єдність всупереч розбіжностям? Ідеологічний конфлікт між консервативно-ліберальним, орієнтованим на правову
    державу урядом ЗУНР (Євген Петрушевич) та соціалістичною, революційною Директорією УНР (Симон Петлюра), що підривав реальне
    об''єднання.'
  - '[!epistemic-humility] Чи була злука приречена від початку? Оцінки істориків розходяться: від звинувачень у взаємному
    саботажі до визнання об''єктивної неможливості воювати на два фронти (проти Польщі та більшовиків).'
  - 'Глобальна синхронність: Розпад Австро-Угорської, Російської та Османської імперій; Паризька мирна конференція та лицемірство
    Антанти, що озброювала Польщу (армія Галлера) для боротьби нібито з більшовиками, а фактично — проти українців.'
  section: 'Конфліктна карта: Боротьба за легітимність'
  words: 900
- points:
  - Аналіз тексту Універсалу Директорії про Злуку УНР і ЗУНР від 22 січня 1919 року. [!quote] «Однині воєдино зливаються століттями
    одірвані одна від одної частини єдиної України...» — розбір юридичної та символічної мови документа.
  - 'Source Criticism: Хто писав текст? Для кого він був призначений — для внутрішньої аудиторії чи для Паризької мирної конференції?
    Які «віковічні мрії» мались на увазі?'
  - 'Державотворення в документах: Аналіз законів ЗУНР про мову, громадянство, 8-годинний робочий день та земельну реформу.
    Що ці документи говорять про характер держави, яку будувала ЗУНР? Порівняння з правовим полем УНР.'
  - '[!decolonization] Читаємо проти тексту: Як документи Антанти та звіти польської сторони зображували події у Галичині?
    Виявлення імперської оптики та термінології («бунт», «заколот», «українські банди»).'
  section: 'Джерела: Текст Акту Злуки та закони ЗУНР'
  words: 1600
- points:
  - 'Причини і наслідки поразки: чому ЗУНР, маючи ефективну армію (УГА) та адміністрацію, програла війну? Аналіз військових,
    політичних та міжнародних факторів.'
  - 'Короткострокові наслідки: Відступ УГА за Збруч, «трикутник смерті», польська окупація Галичини, політика «пацифікації»
    та осадництва.'
  - 'Довгострокові наслідки: Формування потужної української діаспори, збереження ідеї державності в екзилі, перетворення
    Галичини на центр українського націоналізму в міжвоєнній Польщі.'
  - '[!myth-buster] «Акт Злуки був суто символічним». Спростування міфу через аналіз його юридичної ваги та ментального впливу
    на об''єднання політичних еліт та народних мас по обидва боки Збруча.'
  - 'Оцінки істориків: Чому Орест Субтельний називає ЗУНР «найбільш життєздатним з усіх українських урядів того часу», а Ярослав
    Грицак говорить про «незавершену революцію»?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, ЗУНР — це вдалий експромт чи закономірний результат? Студент формулює відповідь, спираючись
    на докази з модуля.'
  - Чому ідея соборності стала центральною для українського визвольного руху ХХ століття і залишається такою донині?
  - '[!anti-hagiography] Уникнення ідеалізації: які помилки лідерів ЗУНР та УНР призвели до поразки? Чи можна було їх уникнути?'
  - 'Зв''язок із сьогоденням: «Живий ланцюг» 1990 року як відродження ідеї Акту Злуки. День Соборності як державне свято —
    що воно символізує у ХХІ столітті в умовах сучасної війни за незалежність?'
  section: Дискусія та підсумок
  words: 700
