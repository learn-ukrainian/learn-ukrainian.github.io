module: hist-092
level: HIST
sequence: 92
slug: zunr
version: '2.0'
title: ЗУНР та Акт Злуки
subtitle: ZUNR and the Act of Unification
focus: history
pedagogy: CBI
phase: HIST.9 [WWI & Revolution]
word_target: 5000
objectives:
- Учень може описати проголошення та історію ЗУНР
- Учень може пояснити значення Акту Злуки
- Учень може проаналізувати українсько-польську війну
- Учень може оцінити спадщину ЗУНР для української державності
content_outline:
- section: 'Вступ: Листопадовий зрив'
  points:
  - '1 листопада 1918: проголошення ЗУНР — безкровне перебрання влади у Львові під командуванням Дмитра Вітовського; синьо-жовтий
    прапор на Ратуші'
  - Крах Австро-Угорщини — розпад «клаптикової імперії» у жовтні 1918 як каталізатор подій
  - Українці Галичини — випередження польського виступу на одну ніч (планувався на 2 листопада) — [!history-bite]
  words: 850
- section: 'ЗУНР: Держава'
  points:
  - Українська Національна Рада — законодавчий орган на чолі з Євгеном Петрушевичем
  - Проголошення у Львові — легітимізація влади через передачу від австрійського намісника українцю Децикевичу
  - Територія та населення — претензія на 70 тис. км² (етнічні межі), фактичний контроль ~40 тис. км²; 4 млн населення
  - Уряд та армія — Державний Секретаріат (Кость Левицький); створення Української Галицької Армії (УГА) (до 100 тис. бійців)
    — [!context] ефективність бюрократії vs хаос УНР
  words: 850
- section: Акт Злуки (22 січня 1919)
  points:
  - 'Соборність: ідея та реалізація — Фастівський договір (1 грудня 1918) як предтеча; ЗУНР стає ЗОУНР (Західна Область УНР)'
  - Церемонія на Софійській площі — урочисте зачитування Універсалу, присутність духовенства та війська
  - Значення об'єднання — [!myth-buster] не формальність, а юридична та ментальна революція; сигнал для Паризької мирної конференції
  - Чому злука не відбулась — війна на два фронти (більшовики/поляки) та ідеологічні розбіжності лідерів (консерватор Петрушевич
    vs соціаліст Петлюра)
  - Українсько-польська війна — роль армії Галлера (озброєна Францією проти німців, використана проти українців)
  words: 850
- section: Первинні джерела
  points:
  - Текст Акту Злуки — [!quote] «Однині воєдино зливаються...» як ключовий документ епохи
  - Документи ЗУНР — закони про мову, землю, 8-годинний робочий день як доказ державності
  - Фотографії та спогади — ентузіазм населення у Львові та Києві
  words: 850
- section: Деколонізаційний погляд
  points:
  - 'Польський наратив: «український націоналізм» — міф про «Східну Малопольщу» (Małopolska Wschodnia) та «Gente Ruthenus,
    natione Polonus» — [!decolonization]'
  - 'Реальність: боротьба за державність — ЗУНР як легітимне втілення права на самовизначення (принцип Вільсона)'
  - ЗУНР у пам'яті — висока правова культура та європейськість на противагу радянському хаосу
  words: 850
- section: 'Підсумок: Поразка та спадщина'
  points:
  - Поразка в війні з Польщею — Чортківська офензива (червень 1919) та відступ УГА за Збруч (липень 1919)
  - Еміграція та діаспора — наслідки окупації (пацифікація, осадництво) та збереження ідеї за кордоном
  - 22 січня — День Соборності — [!reflection] символ «живого ланцюга» 1990 року
  words: 750
vocabulary_hints:
  required:
  - ЗУНР (ZUNR) — Західно-Українська Народна Республіка
  - злука (unification) — Акт Злуки, віковічні мрії
  - соборність (unity) — свято Соборності, ідея соборної України
  - Галичина (Galicia) — Східна Галичина, українські етнічні землі
  - проголошення (proclamation) — проголошення незалежності, Універсал
  - армія (army) — Українська Галицька Армія (УГА), дисципліна
  - війна (war) — українсько-польська війна, фронт
  - незалежність (independence) — боротьба за незалежність
  recommended:
  - Листопадовий зрив (November Uprising) — Листопадовий чин, взяття влади
  - Національна Рада (National Council) — Українська Національна Рада (УНРада)
  - УГА (UHA) — стрільці, старшини, Чортківська офензива
  - фронт (front) — польський фронт, більшовицький фронт
  - еміграція (emigration) — політична еміграція, уряд в екзилі
  - діаспора (diaspora) — збереження традицій
  - Антанта (Entente) — Рада послів Антанти, підтримка Польщі
  - пацифікація (pacification) — політика Польщі, окупаційний режим
