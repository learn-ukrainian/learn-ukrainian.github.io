content_outline:
- points:
  - 'Провокаційне питання: Київ у XII столітті — це європейська метрополія чи глуха провінція? Чому в Києві мешкало до 100
    тис. людей, а в Лондоні — лише 20 тис.?'
  - 'Ключові поняття без контексту: Віра, Ізгой, Вотчина. Що об''єднує штраф за вбивство, сина священника, що не знає грамоти,
    та спадкове землеволодіння?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Політична культура Русі — договірна чи деспотична? Порівняння ролі князя та віча в Києві з
    абсолютною владою в пізнішій Московії.'
  - 'Дебат 2: Яким був реальний статус жінки? Анна Ярославна, що підписує державні документи, vs. правові обмеження в Руській
    Правді.'
  - '[!epistemic-humility] Статус смердів: вільні селяни, але з обмеженою правоздатністю. Історики досі сперечаються про точний
    обсяг їхніх прав та обов''язків.'
  - 'Глобальна синхронність: Концепція "станів" (estates) у Русі та феодальна система в Західній Європі. Спільне та відмінне.'
  section: 'Конфліктна карта: Суспільство рівних чи жорстка ієрархія?'
  words: 900
- points:
  - 'Руська Правда як джерело: аналіз соціальної стратифікації через систему штрафів ("віра"). Чому життя боярина коштувало
    80 гривень, а смерда — лише 5?'
  - 'Колективна відповідальність: інститут "верви" як приклад горизонтальних зв''язків у громаді.'
  - 'Берестяні грамоти: щоденні записи про борги, торгівлю, побутові справи та навіть любовні листи (Звенигородські знахідки).'
  - '[!decolonization] Матеріальна культура як доказ: автохтонні білені хати-мазанки на території України vs. північні зруби-ізби.
    Різні народи, різні традиції.'
  - 'Критика джерел: хто, коли і для кого писав Руську Правду? Чи відображають берестяні грамоти життя всієї Русі чи лише
    її торговельних центрів?'
  section: 'Джерела: Голоси епохи'
  words: 1600
- points:
  - 'Верхівка суспільства: Князь та дружина (старша і молодша). Бояри та система вотчинного землеволодіння як основа їхнього
    впливу.'
  - 'Духовенство: Чорне (монахи як інтелектуальна еліта, літописці) та біле (світські священники).'
  - 'Міське життя: Купці ("гості"), ремісники, цехові організації. Торговельні шляхи ("з варяг у греки", соляний, залізний).'
  - 'Сільське населення: Смерди (вільні), закупи (працюють за борг), рядовичі (працюють за договором). Економічна основа держави.'
  - '[!myth-buster] Холопи — не класичні раби. Джерела рабства (полон, борг, шлюб), але можливість стати управителем ("тіуном").'
  - '[!myth-buster] Грамотність для всіх? Графіті у храмах, берестяні грамоти від жінок та дітей (хлопчик Онфім) спростовують
    міф про тотальну неписьменність народу.'
  - 'Повсякдення: Житло, одяг, їжа, розваги (скоморохи, шахи). Шахи, знайдені в помешканнях ремісників, як маркер високої
    міської культури.'
  - 'Оцінки істориків: Як погляди Грушевського на роль громади (віче) контрастують із сучасними уявленнями про владу князя.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Київ XII століття — це "Європа"? Студент формулює відповідь, спираючись на докази з модуля.'
  - 'Причинно-наслідкові зв''язки: Як система вотчин та усобиці між князями призвели до феодальної роздробленості?'
  - '[!anti-hagiography] Уникаємо ідеалізації: Руська Правда легалізувала кровну помсту (пізніше замінену штрафом) і жорстку
    соціальну нерівність.'
  - 'Зв''язок із сьогоденням: Як поняття "громади", "віча" та договірних відносин з владою резонують в історії України аж
    до сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: The social hierarchy of Kyivan Rus' (prince, boyars, clergy, smerds, zakups, kholops), legal system (Ruska Pravda),
  and daily life (trade, crafts, literacy) through the lens of decolonization, challenging the myth of a single ancient people.
level: HIST
module: hist-018
objectives:
- Ідентифікувати основні соціальні стани Київської Русі та їхні характеристики
- Розуміти правовий статус смердів, закупів та холопів на основі Руської Правди
- Описувати повсякденне життя в містах та селах, спираючись на археологічні та письмові джерела
- Аналізувати суспільні відносини через первинні джерела, як-от Руська Правда та берестяні грамоти
- Критично оцінювати імперські міфи про "єдиний давньоруський народ"
