content_outline:
- points:
  - 'Провокація: Сагайдачний — європейський лицар-інтелектуал чи жорстокий козацький ватажок? Чи міг він одночасно бути рятівником
    православ''я і тим, хто стояв біля воріт Москви з вогнем і мечем?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Сагайдачний — автономний геополітичний гравець, що будував підвалини Гетьманату, чи лояльний
    підданий Речі Посполитої, що рятував королевича Владислава під Москвою?'
  - 'Дебат 2: Еволюція козацького лідерства. Сагайдачний як «гетьман-державник» vs попередники (Наливайко, Вишневецький) як
    «ватажки-повстанці». У чому принципова різниця їхніх стратегій?'
  - '[!epistemic-humility] Оцінки московського походу 1618 року — це був блискучий рейд на порятунок союзника чи найманство,
    що підривало ідею «православного братерства»?'
  - 'Глобальна синхронність: Поки Сагайдачний реформував козацтво, в Європі тривала Тридцятилітня війна. Його можна порівняти
    з Альбрехтом фон Валленштейном чи Олівером Кромвелем як творця армії нового типу.'
  section: 'Конфліктна карта: Створення держави чи служіння короні?'
  words: 900
- points:
  - 'Першоджерело 1: Аналіз «Віршів на жалосний погреб зацного рицаря Петра Конашевича-Сагайдачного» Касіяна Саковича. Як
    барокова поезія створює образ ідеального правителя, спадкоємця київських князів?'
  - 'Лінгвістичний аналіз: поняття «лицар», «слава», «свобода, куплена кров''ю» в панегіриках. Легітимізація козацтва через
    віру та історію.'
  - 'Першоджерело 2: Свідчення Якуба Собеського (батька короля Яна III) про Хотинську битву. Чому він, учасник битви, писав,
    що «справжніми переможцями були козаки»?'
  - '[!decolonization] Читання між рядками: іноземні джерела підтверджують домінування козацького флоту на Чорному морі задовго
    до Російської імперії, руйнуючи імперський міф про «освоєння» півдня.'
  section: 'Джерела: Панегірики та іноземні хроніки'
  words: 1600
- points:
  - 'Військова революція: Перетворення козацьких ватаг на професійну армію (полки, сотні, дисципліна, вогнева підготовка,
    заборона алкоголю). Тактика нічних атак та «вагенбург» під Хотином.'
  - 'Культурна революція: Вступ усього Війська Запорозького до Київського братства. Союз «меча і книги» — військовий захист
    освіти, друкарень та православної віри.'
  - 'Духовна революція: Відновлення православної ієрархії в 1620 році за допомогою патріарха Феофана III. Відновлення духовної
    державності України, що було неможливим без військової сили Сагайдачного.'
  - '[!myth-buster] Сагайдачний — не просто меценат, а архітектор нової моделі суспільства, де козацтво стає колективним патроном
    нації, її «лицарським орденом», що захищає не лише територію, але й ідентичність.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, ким був Сагайдачний — лицарем, стратегом чи державником? Сформулюйте відповідь, спираючись
    на докази з модуля.'
  - '[!anti-hagiography] Чи не була його жорстокість під час московського походу та безкомпромісна дисципліна («п''яних —
    за борт») необхідною ціною за створення боєздатної армії та збереження суб''єктності?'
  - 'Зв''язок із сьогоденням: Як досвід Сагайдачного у створенні армії європейського зразка та його дипломатія «силою» актуальні
    для сучасної України?'
  section: Дискусія та підсумок
  words: 700
focus: The transformation of Cossackdom under Hetman Petro Sahaidachnyi from a loose military force into a disciplined political
  power, his role as a patron of Orthodox culture, and his military genius in naval campaigns and the Battle of Khotyn.
level: HIST
module: hist-045
objectives:
- Аналізувати військові, політичні та культурні реформи Петра Сагайдачного
- Пояснювати значення Хотинської битви (1621) для України та Європи
- Розуміти роль Київського братства як центру союзу військової та інтелектуальної еліт
- Критично оцінювати постать Сагайдачного, розрізняючи історичні факти та панегіричні міфи
