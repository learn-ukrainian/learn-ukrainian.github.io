content_outline:
- points:
  - 'Провокація: Вам дають 2 години, щоб назавжди покинути дім ваших предків. Що ви візьмете? Це не гіпотетичне питання. Це
    була реальність для 700 000 українців Закерзоння.'
  - Подивіться на мапу етнічних українських земель до 1944 року. Тепер — на сучасну мапу. Що зникло? І хто вирішив, що цілі
    народи можна пересувати, як фігури на шахівниці?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Офіційна версія (радянська/польська комуністична) vs. українська історіографія. Це був «добровільний обмін населенням»
    для стабілізації кордонів чи спланована етнічна чистка для створення моноетнічних держав?'
  - 'Дебат 2: Роль УПА. Чи була операція «Вісла» прямою відповіддю на діяльність УПА (вбивство Свєрчевського), чи УПА була
    лише зручним приводом для остаточного вирішення «українського питання» в Польщі?'
  - '[!epistemic-humility] Точну кількість жертв та повний масштаб координації між НКВС та польською bezpieka на ранніх етапах
    важко встановити через суперечливість та знищення архівів.'
  - 'Глобальна синхронність: депортації українців у контексті повоєнних «трансферів» населення (німців із Чехословаччини та
    Польщі) та сталінських етнічних чисток (кримські татари, народи Кавказу).'
  section: 'Конфліктна карта: «Обмін населенням» чи етнічна чистка?'
  words: 900
- points:
  - 'Усна історія: аналіз спогадів депортованих лемків та бойків. Травма втрати «свого світу», опис транспортування в товарних
    вагонах. «Нас викинули в чисте поле, як худобу».'
  - 'Офіційні документи: читаємо «проти шерсті» накази про «евакуацію», звіти про кількість «переселених» та вилучене майно.
    Аналіз мови ворожнечі, що дегуманізує українців.'
  - 'Особисті листи: уривки з листів переселенців до родичів. Контраст між рідними Карпатами та чужими степами південної України.
    Бюрократичні скарги як єдина форма протесту.'
  - '[!decolonization] Голоси жертв стають центральним джерелом, що спростовує знеособлену статистику та офіційну брехню тоталітарних
    режимів.'
  - 'Матеріальні джерела: фотографії покинутих церков, мапи розселення, аналіз табору в Явожно як інструменту репресій проти
    інтелігенції.'
  section: 'Джерела: Свідчення очевидців та документи режиму'
  words: 1600
- points:
  - 'Короткострокові наслідки: гуманітарна катастрофа, руйнування традиційного укладу життя, психологічна травма поколінь.'
  - 'Довгострокові наслідки: знищення субетнічних груп (лемки, бойки), асиміляція, розпорошення українців у Польщі, ліквідація
    Греко-Католицької Церкви на цих територіях.'
  - '[!myth-buster] Міф про «добровільність». Аналіз документів, що свідчать про застосування терору, залякування та військових
    операцій проти цивільного населення з самого початку.'
  - 'Порівняльний аналіз: операція «Вісла» та депортація кримських татар (Sürgünlik). Спільні методи (колективна відповідальність,
    товарні вагони, спецпоселення) та цілі (денаціоналізація, знищення опору).'
  - 'Оцінки істориків: дискусія про термін «геноцид» у контексті операції «Вісла». Позиції українських, польських та західних
    дослідників (Тімоті Снайдер, Ґжеґож Мотика).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Як тепер виглядає відповідь на питання про «обмін населенням»? Студент формулює власну аргументовану
    позицію на основі джерел.'
  - 'Спадщина травми: як депортації вплинули на формування сучасної української та польської ідентичності? Фестиваль «Лемківська
    ватра» як приклад боротьби за збереження пам''яті.'
  - '[!anti-hagiography] Складне питання польсько-українського примирення. Визнання злочинів комуністичного режиму не скасовує
    складних сторінок в історії УПА та її дій проти польського цивільного населення.'
  - 'Зв''язок із сьогоденням: Як досвід депортацій допомагає зрозуміти трагедію сучасних українських біженців та тактику Росії
    на окупованих територіях?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз примусових переселень українців (1944-46), операції «Вісла» (1947) та депортації 1951 року як інструментів етнічної
  чистки та радянської політики денаціоналізації. Вивчення долі Закерзоння, лемків та бойків через призму першоджерел, усної
  історії та деколоніального аналізу.
level: HIST
module: hist-110
objectives:
- Аналізувати причини, перебіг та наслідки депортацій українців у 1944-1951 роках
- Розрізняти офіційну пропаганду тоталітарних режимів та реальні свідчення очевидців
- Пояснювати, чому операція «Вісла» та попередні переселення кваліфікуються як етнічна чистка
- Порівнювати сталінські депортації різних народів (українців, кримських татар) для виявлення спільних імперських практик
- Формулювати аргументовану позицію щодо складних питань польсько-українського минулого
pedagogy: CBI
