content_outline:
- points:
  - 'Провокація: Чи міг Маріуполь впасти за 3 дні, як планував ворог? Чому 86-денна оборона стала одночасно і трагедією, і
    дивом, що врятувало південь України?'
  - 'Фрагмент звернення Дениса Прокопенка (без контексту): «Вище військове командування дало наказ про збереження життя та
    здоров''я гарнізону та припинення оборони міста» — що передувало цим словам?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Російська пропаганда vs реальність. Наратив про «визволення від нацистів» проти доказів тотального знищення
    міста (урбіциду), зафіксованих міжнародними спостерігачами.'
  - 'Дебат 2: Наказ про вихід з Азовсталі — порятунок життів чи трагічна необхідність? Аналіз альтернатив та наслідків рішення
    вищого командування України.'
  - '[!epistemic-humility] Точна кількість загиблих досі невідома. Оцінки варіюються від десятків тисяч до понад 100,000,
    і правда може бути ніколи не встановлена через дії окупантів.'
  - 'Глобальна синхронність: Поки Маріуполь був у блокаді, світ вводив санкції, світові лідери робили заяви, а перші партії
    важкого озброєння лише починали надходити до України.'
  section: 'Конфліктна карта: ''Визволення'' чи геноцид?'
  words: 900
- points:
  - 'Відеозвернення захисників: аналіз риторики звернень «Волини», «Калини», «Пташки» до світових лідерів та Папи Римського.
    Як змінювався тон від надії до відчаю?'
  - 'Щоденники та фото: свідчення Дмитра Козацького («Ореста») — фотографії поранених як візуальний документ умов у бункерах.
    Розбір композиції та символізму.'
  - 'Свідчення евакуйованих: аналіз історій цивільних, які вийшли з Азовсталі. Що вони розповідали про життя під землею, брак
    їжі, води та медикаментів?'
  - '[!decolonization] Супутникові знімки Maxar: використання OSINT для фіксації масових поховань у Мангуші та Старому Криму
    як інструмент протидії російській дезінформації та документування злочинів.'
  section: 'Джерела: Голоси з підземелля'
  words: 1600
- points:
  - 'Гуманітарна катастрофа: свідоме створення нелюдських умов — блокада, бомбардування пологового будинку (9 березня) та
    Драмтеатру (16 березня) попри напис «ДІТИ».'
  - '[!myth-buster] Тактика «випаленої землі». Російський міф про «високоточні удари» спростовується фактом знищення 90% житлового
    фонду та інфраструктури міста. Це не побічна шкода, а цілеспрямована стратегія.'
  - '«Маріупольський ефект»: як 86-денна оборона скувала значні сили ворога, давши Україні час на мобілізацію та організацію
    оборони на інших напрямках (Запоріжжя, Дніпро).'
  - 'Урбіцид та культурний геноцид: знищення музею Куїнджі, мозаїк Алли Горської, та історичного центру як спроба стерти українську
    ідентичність міста.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: студент формулює аргументовану відповідь, чому Маріуполь не впав за 3 дні, використовуючи докази
    з модуля.'
  - 'Пам''ять про полонених: трагедія в Оленівці, повільне повернення захисників з полону та боротьба їхніх родин. Роль міжнародних
    організацій.'
  - '[!anti-hagiography] Героїзація оборони не повинна затьмарювати її ціну. Обговорення посттравматичного синдрому у вцілілих
    та викликів, з якими стикаються повернуті з полону.'
  - 'Майбутнє міста: від символу скорботи до символу відродження. Проєкт «Mariupol Reborn» як візія майбутньої відбудови після
    деокупації.'
  section: Дискусія та підсумок
  words: 700
