objectives:
- Аналізувати перебіг та ключові події облоги Маріуполя та оборони Азовсталі
- Розрізняти та спростовувати російські пропагандистські наративи щодо подій у Маріуполі
- Критично оцінювати першоджерела (відео, фото, свідчення) для реконструкції подій
- Пояснювати стратегічне та символічне значення оборони Маріуполя для України та світу
