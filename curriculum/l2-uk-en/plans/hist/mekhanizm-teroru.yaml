content_outline:
- points:
  - 'Провокація: У 1937-38 роках в УРСР було репресовано і страчено більше людей, ніж мешкало в тогочасному обласному центрі.
    Як така кількість людей могла зникнути? Як працювала ця машина терору, і хто стояв за її створенням?'
  - 'Фрагмент з анкети арештованого без контексту: «Перша категорія». Що означала ця позначка?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський міф про «ворогів народу» і «перегини» виконавців. [!decolonization] Цей наратив виправдовував терор
    як необхідний захист держави, знімаючи відповідальність з центрального керівництва в Москві.'
  - 'Дебат 2: Українська історіографія — цілеспрямоване знищення української еліти як акт культурного геноциду (концепція
    Рафала Лемкіна). Мета — обезголовити націю, перетворивши її на покірну «етнографічну масу».'
  - '[!epistemic-humility] Точну кількість жертв встановити важко через фальсифікацію документів НКВС та приховування місць
    масових поховань (як у Биківні).'
  - 'Глобальна синхронність: «Великий терор» в СРСР відбувався паралельно з іншими кампаніями державних репресій у світі (напр.,
    чистки в нацистській Німеччині), але вирізнявся масштабами та спрямованістю проти власного населення.'
  section: 'Конфліктна карта: «Перегини на місцях» чи спланований геноцид?'
  words: 900
- points:
  - 'Аналіз архівних документів НКВС: анкети арештованих, сфабриковані справи про міфічні «терористичні центри», протоколи
    допитів (іноді зі слідами крові).'
  - 'Методи слідства: офіційний дозвіл Сталіна на катування (1937). «Конвеєр» (безперервний допит) та «Стійка» як інструменти
    зламу психіки, що призводили до самообмов.'
  - '[!decolonization] Читання протоколів «крізь пальці»: ми бачимо не реальні зізнання, а свідчення про нелюдські тортури
    та силу духу тих, хто їм протистояв.'
  - 'Позасудові органи: «Трійки» як конвеєр смерті, що виносив сотні вироків за день без суду і слідства.'
  - 'Епістолярна спадщина: рідкісні останні листи засуджених, що прорвалися крізь цензуру, як-от лист Миколи Куліша про те,
    як він «глянув на себе й не впізнав» від жаху.'
  - 'Спогади тих, хто вижив: свідчення Бориса Антоненка-Давидовича як голоси свідків злочину.'
  section: 'Джерела: Протоколи допитів та останні листи'
  words: 1600
- points:
  - 'Географія смерті: Соловецькі табори (СЛОН) як місце ув''язнення української еліти (Курбас, Куліш, Зеров).'
  - 'Сандармох: розстрільний полігон у Карелії, де за кілька днів було страчено 1111 в''язнів «Соловецького етапу».'
  - 'Биківня: «Київський Сандармох», таємна спецділянка для поховання розстріляних у київських в''язницях НКВС.'
  - '[!myth-buster] Радянський міф про Биківню: десятиліттями влада стверджувала, що це місце поховання жертв нацистів, щоб
    приховати власний злочин.'
  - 'Наслідки для нації: терор обезголовив українську культуру, науку та політику, знищивши ціле покоління, відоме як «Розстріляне
    відродження».'
  - 'Паралелі з Катинню: системність масових розстрілів як інструмент радянської імперської політики проти підкорених народів.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: як ціле місто зникло? Студент формулює відповідь, пояснюючи механізми (накази, ліміти, трійки,
    конвеєр) та мету (геноцид) терору.'
  - 'Пам''ять і справедливість: роль Юрія Дмитрієва у віднайденні Сандармоху та його сучасне переслідування в РФ як приклад
    боротьби за історичну правду.'
  - '[!anti-hagiography] Важливо пам''ятати не лише про видатних діячів, а й про тисячі безіменних селян, робітників та вчителів,
    які стали жертвами терору, уникаючи створення пантеону лише для «еліти».'
  - 'Зв''язок із сьогоденням: як сучасна Росія використовує методи переписування історії (спроби «скасувати» Биківню, знищення
    меморіалів) для виправдання нової агресії?'
  section: Дискусія та підсумок
  words: 700
focus: 'The Great Terror in Ukraine (1937-38): NKVD methods, fabrication of cases, geography of death (Solovki, Sandarmokh,
  Bykivnia), and the decolonization of memory.'
level: HIST
module: hist-103
objectives:
- Критично аналізувати радянські та сучасні російські наративи про Великий терор, відрізняючи їх від історичних фактів
- Описувати систематичний характер терору, його механізми (НКВС, «трійки», катування) та географію (Соловки, Сандармох, Биківня)
- Пояснювати, чому цілеспрямоване знищення інтелігенції кваліфікується як акт культурного геноциду
- Формулювати аргументовану позицію щодо важливості збереження пам''яті про злочини тоталітарних режимів
pedagogy: CBI
persona:
