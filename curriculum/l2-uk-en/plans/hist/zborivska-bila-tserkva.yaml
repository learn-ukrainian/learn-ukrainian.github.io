content_outline:
- points:
  - 'Провокативне питання: чому переможна війна 1648-1649 років завершилася компромісним Зборівським миром, а не повною капітуляцією
    Речі Посполитої? Які невидимі сили змусили Хмельницького зупинитися?'
  - 'Глобальна синхронність: поки в Україні триває визвольна війна, в Англії страчують короля Карла І, а у Франції триває
    Фронда. Світ увійшов у добу революцій.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Радянська історіографія представляла договори як частину «класової боротьби» та «возз''єднання».
    Українська школа (Грушевський, Липинський) розглядає їх як акти державного будівництва та кроки до повного суверенітету.'
  - 'Дебат 2: Чи була поведінка кримського хана Іслам-Гірея під Берестечком «зрадою»? Аналіз мотивації хана з точки зору геополітики
    — небажання надмірного посилення козацької держави.'
  - '[!epistemic-humility] Більшість джерел про переговори є польськими або написані згодом. Пряма мова Хмельницького та його
    справжні наміри часто реконструюються опосередковано.'
  section: 'Конфліктна карта: Зрада чи прагматизм?'
  words: 900
- points:
  - 'Аналіз ключових статей Зборівського договору (18 серпня 1649): 40-тисячний реєстр, визнання трьох воєводств (Київське,
    Брацлавське, Чернігівське), заборона на перебування коронного війська та єзуїтів, місце в Сенаті для київського митрополита.'
  - 'Аналіз ключових статей Білоцерківського договору (28 вересня 1651): скорочення реєстру до 20 тисяч, обмеження території
    одним Київським воєводством, повернення польської адміністрації на інші землі.'
  - 'Source criticism: Порівняння преамбул — «Декларація милості короля» (Зборів) vs «Покірне підданство» (Біла Церква). Як
    мова документів відображає зміну балансу сил?'
  - 'Пряма мова. Єжи Оссолінський: «Єдиний спосіб порятунку — це відокремити татар від козаків». Богдан Хмельницький про божественне
    провидіння та перемогу як свідчення права на власну державу.'
  section: 'Джерела: Тексти угод та цитати сучасників'
  words: 1600
- points:
  - Зборівський договір як перше фактичне визнання козацької держави. Легітимізація влади гетьмана на міжнародній арені.
  - Битва під Берестечком (1651) як найбільша битва Європи XVII століття. Тактичний шедевр Івана Богуна, що врятував армію
    від повного розгрому.
  - '[!myth-buster] Спростування міфу про «зраду» татар. Поведінка Іслам-Гірея — це прагматична політика Кримського ханства,
    яке не було зацікавлене у виникненні потужної козацької держави на своїх кордонах.'
  - Білоцерківський мир як «гіркий компроміс». Це була не капітуляція, а тактична пауза, що дозволила Хмельницькому зберегти
    ядро армії та державності для майбутньої боротьби.
  - 'Порівняння оцінок істориків: Грушевський бачив в угодах етапи еволюції ідеї державності, від автономії до незалежності.
    Субтельний наголошує на дипломатичній гнучкості Хмельницького.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож чому Хмельницький не дійшов до Варшави? Студент формулює відповідь, враховуючи тиск татарського
    союзника, виснаження армії та необхідність легітимізації держави.'
  - 'Дискусія: чи є дипломатичний компроміс з ворогом зрадою чи необхідністю? Провести паралелі з сучасними подіями (Мінські
    угоди тощо).'
  - '[!anti-hagiography] Угоди були вимушеним кроком, що викликав сильне невдоволення серед козацтва та селянства, які втрачали
    здобуті права та землі. Це не був тріумф, а мистецтво можливого.'
  - 'Спадщина: Зборівський договір став прототипом для майбутніх міжнародних актів Гетьманщини (Гадяцька унія), а урок Берестечка
    (дипломатія має спиратися на сильну армію) залишається актуальним для України.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз Зборівського (1649) та Білоцерківського (1651) договорів як етапів становлення козацької державності, дипломатична
  боротьба Богдана Хмельницького в контексті битви під Берестечком
