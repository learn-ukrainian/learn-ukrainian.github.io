content_outline:
- points:
  - 'Провокація: Володимир Мономах — мудрий об''єднувач земель чи талановитий кризовий менеджер, що лише відтермінував неминучий
    розпад Русі? Де проходить межа між державним діячем і символом?'
  - 'Уривок з «Повчання дітям»: «А понад усе — убогих не забувайте, але, наскільки є змога, по силі годуйте і подавайте сироті...
    Не вбивайте ні правого, ні винного...» — що цей наказ говорить про його епоху?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Кому належить спадщина Мономаха? Українська історіографія бачить його як київського правителя,
    що заклав основи європейської правової держави. Російська — як предтечу московської автократії, привласнюючи його через
    міф про «шапку Мономаха».'
  - 'Дебат 2: Що легітимізувало владу — княжий з''їзд чи воля народу? Любецький з''їзд 1097 р. закріпив спадковий принцип
    («Кождо да держить отчину свою»), але на престол у 1113 р. Мономаха покликало київське віче під час народного повстання.'
  - '[!epistemic-humility] Літописи подають покликання Мономаха як одностайне рішення киян, але чи не було це радше компромісом
    еліт, щоб зупинити погроми та соціальний вибух?'
  - 'Глобальна синхронність: Дружина Мономаха, Гіта, була донькою англійського короля Гарольда, вбитого в битві при Гастінгсі
    (1066). Поки Русь боролася з половцями, нормани завойовували Англію та Сицилію, а в Європі починалася епоха Хрестових
    походів.'
  section: 'Конфліктна карта: Князь за правом чи за вибором?'
  words: 900
- points:
  - 'Аналіз «Повчання дітям»: перший зразок світської автобіографії в східнослов’янській літературі. Поєднання морального
    кодексу правителя, практичних порад та спогадів про 83 великі походи.'
  - 'Source criticism: «Повість минулих літ» редагувалася за часів Мономаха. Як це вплинуло на зображення його ворогів та
    союзників? Аналіз образу Святополка Ізяславича як контрасту до Мономаха.'
  - '[!decolonization] Читаємо літопис критично: опис перемоги над половцями у 1111 р. як «допомога ангелів» — приклад сакралізації
    влади для зміцнення легітимності.'
  - Трагедія на Стугні та осліплення Василька Теребовлянського — як Мономах використовує ці події в «Повчанні», щоб продемонструвати
    наслідки княжих усобиць та порушення клятви.
  section: 'Джерела: «Повчання дітям» та Літописи'
  words: 1600
- points:
  - '«Устав» 1113 року як відповідь на соціальну кризу: обмеження лихварства (різу), захист прав боржників («закупів»). Чи
    була це перша анти-олігархічна реформа в історії України?'
  - 'Військова доктрина Мономаха: перехід від оборони до превентивних ударів углиб Половецького степу. Аналіз ефективності
    цієї стратегії для забезпечення миру на кордонах.'
  - '[!myth-buster] «Шапка Мономаха», головний символ російського самодержавства, не має жодного стосунку до київського князя.
    Це золота тюбетейка XIV ст., подарована московському князю ханом Золотої Орди Узбеком. Міф було створено для обґрунтування
    претензій Москви на спадщину Русі.'
  - 'Оцінка спадщини: чи вдалося Мономаху зупинити роздробленість? Короткочасна стабілізація vs неминучість феодальної фрагментації.
    Порівняння оцінок Грушевського, Субтельного та Плохія.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож ким був Мономах — ідеалістом, що вірив у єдність, чи прагматиком, що використовував усі засоби
    для утримання влади? Студент формулює власну відповідь на основі джерел та аналізу.'
  - 'Зв''язок із сьогоденням: дискусія про роль сильної особистості в історії України. Наскільки актуальні сьогодні дилеми
    Мономаха — централізація влади, боротьба з зовнішнім ворогом, суспільний договір?'
  - '[!anti-hagiography] Попри образ «золотого віку», правління Мономаха було часом жорстоких воєн, династичних інтриг та
    соціальної напруги. Його успіх — це успіх виживання в екстремальних умовах, а не ідилічна картина.'
  section: Дискусія та підсумок
  words: 700
focus: 'Володимир Мономах: аналіз правління, «Повчання дітям», Любецький з''їзд, боротьба з усобицями та половцями, деконструкція
  імперського міфу про «Шапку Мономаха»'
