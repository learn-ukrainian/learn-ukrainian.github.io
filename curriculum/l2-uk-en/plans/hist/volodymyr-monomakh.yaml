objectives:
- Аналізувати правління Володимира Мономаха, розрізняючи короткочасну стабілізацію та довгострокові тенденції до роздробленості
- Критично оцінювати «Повчання дітям» та літописи як історичні джерела, враховуючи їхню мету та можливу упередженість
- Деконструювати імперський міф про «Шапку Мономаха», пояснюючи його пропагандистську мету
- Аргументувати власну позицію щодо ролі Мономаха в історії України, використовуючи докази з першоджерел та історіографії
