content_outline:
- points:
  - 'Провокація: Чому саме Софія, а не інша споруда, стала «серцем» Русі? Це був лише храм, чи щось більше — політичний маніфест,
    виражений у камені?'
  - Фрагмент графіті XI століття без перекладу — що може розповісти проста подряпина на стіні тисячолітнього собору?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Коли насправді заснували Софію? Суперечка про 1011 та 1037 роки — що кажуть джерела, а що — політика?'
  - 'Дебат 2: Київський стиль чи сліпий візантійський канон? Наскільки архітектура Софії є унікальною, а наскільки — копією
    константинопольських зразків?'
  - '[!epistemic-humility] Археологічні дані vs. літописні згадки — чому історики досі не можуть дійти згоди та як кожна дата
    змінює історичний наратив.'
  - 'Глобальна синхронність: поки в Києві будували Софію, в Європі зводили романські собори (Шпаєр, Клюні), а в ісламському
    світі — Велику мечеть Кордови. Порівняння масштабів та ідеологій.'
  section: 'Конфліктна карта: Дати, канони та міфи'
  words: 900
- points:
  - 'Джерело 1: Графіті на стінах. Аналіз «середньовічного Facebook» — скарги, молитви, політичні новини та навіть любовні
    зізнання. Жива староукраїнська мова XI-XIII століть, відмінна від книжної.'
  - 'Джерело 2: Мозаїки та фрески. Оранта «Нерушима стіна» як політична декларація. Унікальні світські сюжети (полювання,
    скоморохи) як джерело знань про життя княжого двору.'
  - '[!decolonization] Джерело 3: «Слово про Закон і Благодать» Іларіона. Читання фрагменту як маніфесту духовної суверенності
    Русі від Візантії, написаного в стінах Софії або для неї.'
  - 'Джерело 4: «Повість минулих літ». Цитата про заснування собору (1037) та «писців многих» — як літопис ретроспективно
    конструює образ Ярослава-просвітителя.'
  section: 'Джерела: Голоси крізь камінь'
  words: 1600
- points:
  - 'Короткострокові наслідки: Софія як центр писемності та освіти. Скрипторій, перша відома бібліотека, перекладацька діяльність
    — формування київської інтелектуальної еліти.'
  - 'Довгострокові наслідки: Собор крізь віки. Від занепаду після монгольської навали до барокової перебудови Івана Мазепи.
    Як змінювався символ та його значення.'
  - '[!myth-buster] Спростування імперського міфу про «спільну колиску». Софія як доказ європейської, а не євразійської ідентичності
    Києва. Архітектурні відмінності від пізніших соборів Володимиро-Суздальського князівства (Залісся).'
  - 'Історія-детектив: Таємниця саркофага Ярослава Мудрого. Історія зникнення останків та сучасні ДНК-дослідження, що виявили
    лише жіночий скелет.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Софія — це храм, політичний маніфест чи культурний центр? Студент формулює відповідь, використовуючи
    докази з модуля.'
  - 'Зв''язок із сьогоденням: Софія Київська як об''єкт Світової спадщини ЮНЕСКО під загрозою. Чому збереження собору є питанням
    національної безпеки та ідентичності в умовах сучасної війни?'
  - '[!anti-hagiography] Уникнення ідеалізації «золотої доби» Ярослава. Софія збудована на величезні кошти, що свідчить про
    потужну, але й жорстку централізовану владу, здатну мобілізувати ресурси цілої держави.'
  section: Дискусія та підсумок
  words: 700
focus: St. Sophia of Kyiv as a political, cultural, and spiritual center of Kyivan Rus'. Architecture, mosaics, frescoes,
  graffiti, and its decolonized significance.
level: HIST
module: hist-014
objectives:
- Розуміти значення Софії Київської як політичного, культурного та духовного центру Русі
- Аналізувати іконографічну програму мозаїк та фресок, включаючи унікальні світські сюжети
- Пояснювати роль собору у культурному розквіті Русі (літописання, освіта, «Слово про Закон і Благодать»)
- Відрізняти та спростовувати імперські та радянські міфи, пов'язані з історією собору
