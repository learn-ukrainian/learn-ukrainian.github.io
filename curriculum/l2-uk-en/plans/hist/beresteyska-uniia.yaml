content_outline:
- points:
  - 'Провокація: Уявіть, що ваша церква в кризі, а держава пропонує їй покровительство в обмін на союз із Римом. Це порятунок
    чи зрада? У 1596 році українські єпископи зробили свій вибір.'
  - 'Фрагмент з полемічного твору: «...бо ліпше нам в своїй убогості без унії бути, аніж в великих багатствах і розкошах світських
    в унії з вами жити...» Хто і кому міг це написати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Унія як «зрада» (радянська/імперська історіографія, що бачила в цьому підступи Ватикану) vs Унія як «порятунок»
    (державницька школа, що вбачала в унії спробу модернізації та збереження ідентичності).'
  - 'Дебат 2: Внутрішній конфлікт: князь Острозький (захисник православ''я) vs єпископат (ініціатори унії) — боротьба за владу,
    ідею чи особисті амбіції?'
  - '[!epistemic-humility] Мотивація єпископів досі є предметом дискусії: вони щиро прагнули реформи чи хотіли отримати місця
    в Сенаті та позбутися влади патріарха і братств?'
  - 'Глобальна синхронність: Унія — це український епізод Контрреформації, що охопила всю Європу як відповідь на протестантську
    Реформацію.'
  section: 'Конфліктна карта: Зрада чи Порятунок?'
  words: 900
- points:
  - 'Текст 1: «33 артикули» — умови об''єднання (1595). Аналіз: що гарантувалося православним (східний обряд, одружене священство,
    юліанський календар) і якою була ціна — визнання верховенства Папи Римського.'
  - 'Текст 2: «Апологія» Іпатія Потія. Аналіз аргументів «за»: унія як шлях до рівності з католиками, підвищення освітнього
    рівня духовенства, вихід із кризи. Риторика: спокійна, раціональна.'
  - 'Текст 3: «Послання до єпископів» Івана Вишенського. Аналіз аргументів «проти»: унія як відступництво від віри батьків,
    зрада, спокуса багатством. Риторика: емоційна, пророча, сповнена інвектив.'
  - '[!decolonization] Як суто внутрішні релігійні тексти (полемічна література) пізніше були використані Російською імперією
    та СРСР для конструювання образу «віковічної боротьби проти католицької експансії».'
  section: 'Джерела: Голоси Унії та Антиунії'
  words: 1600
- points:
  - 'Короткострокові наслідки: глибокий розкол суспільства («Русь нищить Русь»), боротьба за храми та майно, розквіт полемічної
    літератури, вбивство Йосафата Кунцевича (1623).'
  - 'Довгострокові наслідки: створення УГКЦ, яка стала ключовим інститутом збереження української ідентичності в Галичині;
    козацтво на чолі з Сагайдачним стає головним захисником православ''я.'
  - '[!myth-buster] Унія не була «насадженням католицизму». Це була спроба створити гібридну модель, зберігши східну обрядовість,
    але визнавши західну зверхність. Це не була повна латинізація.'
  - 'Оцінки істориків: порівняння поглядів Грушевського (трагедія, що розколола народ), Липинського (конструктивний крок),
    Плохія (спроба уникнути периферійності між Сходом і Заходом).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, унія — це зрада чи порятунок? Сформулюйте власну відповідь, спираючись на аргументи та
    джерела з модуля.'
  - '[!anti-hagiography] Жодна зі сторін не була «святою». Прихильники унії використовували державний примус, а противники
    — вдавалися до насильства. Це була жорстока боротьба за душі та владу.'
  - 'Зв''язок із сьогоденням: Ліквідація УГКЦ радянською владою у 1946 році як злочин тоталітарного режиму. Відродження церкви
    в незалежній Україні та її роль сьогодні. Значення міжконфесійного діалогу.'
  section: Дискусія та підсумок
  words: 700
focus: Causes, events, and consequences of the 1596 Union of Brest; the creation of the UGCC; the role of Prince Ostrozky,
  Ipatii Potii, and Ivan Vyshensky; religious polemics and societal schism.
