objectives:
- Пояснювати причини, перебіг та наслідки Берестейської унії 1596 року
- Аналізувати аргументи ключових учасників релігійної полеміки (Потій, Вишенський, Острозький)
- Критично оцінювати радянські та імперські наративи про унію як «зраду», протиставляючи їм українські інтерпретації
- Використовувати термінологію церковної історії для опису релігійних процесів у ранньомодерній Україні
