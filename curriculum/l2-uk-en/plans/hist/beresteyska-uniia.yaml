slug: beresteyska-uniia
version: '3.0'
title: 'Берестейська унія: Церковний розкол'
focus: history
pedagogy: CBI
phase: B2.3a [Українська історія]
word_target: 5000
objectives:
- Учень може пояснити причини та передумови Берестейської унії 1596 року
- Учень аналізує наслідки створення греко-католицької церкви для українського суспільства
- Учень володіє термінологією релігійної полеміки та церковного устрою
content_outline:
- section: Вступ
  points:
  - Історичний контекст пізньосередньовічної України — Річ Посполита після Люблінської унії 1569 року
  - Роль церкви в політичному житті Речі Посполитої — православна церква як «релігія другого сорту», відсутність 
    єпископів у Сенаті
  - 'Релігійне протистояння між православ''ям та католицизмом — вплив ідей Реформації та Контрреформації; engagement hook:
    [!culture] про «козацьке бароко» як культурний синтез'
  words: 700
- section: Передумови унії та криза православ'я
  points:
  - 'Занепад православної церкви в Речі Посполитій — криза через «право патронату» (світські феодали призначали єпископів)
    та симонію; engagement hook: [!context] про право патронату'
  - Вплив Контрреформації та діяльності єзуїтів — високий рівень освіти католицьких орденів як приклад для наслідування
  - Соціальний статус православного духовенства — низький рівень освіти та авторитету порівняно з єзуїтами
  - Ідея церковного об'єднання як засобу збереження ідентичності — мотивація єпископів (Гедеон Балабан) позбутися 
    контролю патріарха та львівських братчиків
  words: 700
- section: Берестейський собор 1596 року та створення УГКЦ
  points:
  - Підготовка до унії та роль митрополита Михайла Рагози — таємні переговори 1590–1594 рр., поїздка Іпатія Потія та 
    Кирила Терлецького до Риму (1595)
  - Перебіг Берестейського собору та прийняття унії — розкол на два собори (уніатський у церкві св. Миколая та 
    православний у будинку Райського) 6–9 жовтня 1596 р.
  - 'Богословські та обрядові умови об''єднання — «33 артикули» (збереження літургії, одружене священство, юліанський календар);
    engagement hook: [!myth-buster] про збереження східного обряду'
  - Створення греко-католицької церкви як нової інституції — Універсал короля Сигізмунда III про офіційне визнання
  words: 700
- section: Соціально-політичні наслідки та релігійна боротьба
  points:
  - Розкол українського суспільства на уніатів та православних — період «Русь нищить Русь», боротьба за майно 1596–1620 
    рр.
  - 'Роль магнатів та шляхти у релігійних конфліктах — парадокс князя Острозького (від прихильника до ворога); engagement
    hook: [!history-bite] про князя Острозького'
  - 'Повстання та релігійна полеміка XVII століття — вбивство Йосафата Кунцевича (1623), розквіт полемічної літератури; engagement
    hook: [!quote] Івана Вишенського'
  - Вплив унії на формування національної самосвідомості — козацтво як новий захисник православ'я (вступ Сагайдачного до
    Київського братства 1620 р.)
  words: 700
- section: Читання
  points:
  - Автентичні тексти про Берестейську унію — уривок з «Апології» Іпатія Потія («Не хочемо ми бути під владою папи, 
    але...»)
  - Сучасні історичні інтерпретації події — аналіз причин розколу та довготривалих наслідків
  words: 700
- section: Первинні джерела
  points:
  - Документи Берестейського собору — «Артикули, що належать до з'єднання...» (1595)
  - Полемічні твори прихильників та противників унії — «Послання до єпископів» Івана Вишенського vs твори Іпатія Потія
  words: 700
- section: Деколонізаційний погляд
  points:
  - Унія як спроба збереження культурної автономії — УГКЦ як «найбільш українська» церква в XIX-XX ст., захист від 
    русифікації
  - 'Критика імперського наративу про унію — спростування радянських міфів про «зрадників» та «агентів Ватикану»; engagement
    hook: [!decolonization]'
  - Сучасне значення міжконфесійного діалогу — ліквідація унії 1946 року як злочин тоталітарного режиму
  words: 800
vocabulary_hints:
  required:
  - унія (union) — Берестейська унія, укласти унію
  - православ'я (Orthodoxy) — криза православ'я, захисники православ'я
  - католицизм (Catholicism) — вплив католицизму, перехід у католицизм
  - митрополит (metropolitan) — Київський митрополит, виборність митрополита
  - собор (council/cathedral) — церковний собор, Берестейський собор
  - духовенство (clergy) — православне духовенство, освіта духовенства
  - обряд (rite) — східний обряд, збереження обряду
  - полеміка (polemics) — релігійна полеміка, полемічна література
  recommended:
  - Контрреформація (Counter-Reformation) — доба Контрреформації
  - єзуїти (Jesuits) — колегіуми єзуїтів, освіта єзуїтів
  - 'уніати (Uniates) — термін, що часто мав негативне забарвлення; сучасне: греко-католики'
  - розкол (schism/split) — церковний розкол, розкол суспільства
  - симонія (simony) — продаж церковних посад як причина кризи
  - патронат (patronage) — право патронату, світський патронат
