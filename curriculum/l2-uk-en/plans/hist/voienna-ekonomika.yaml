content_outline:
- points:
  - 'Провокаційне питання: У 2022 році економіка України зазнала найбільшого падіння в історії (-29.1% ВВП). Проте міжнародні
    прогнози були ще гіршими — до -50%. Чому апокаліпсис не стався? Це було диво, удача чи результат, за який було заплачено
    високу ціну?'
  - 'Фрагмент без контексту: «Банківська система, на відміну від 2014 року, вистояла». Що змінилося за 8 років, що дозволило
    уникнути фінансового колапсу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Україна vs Імперія): Російський наратив про «failed state» та «країну 404», нездатну вижити без економічних
    зв''язків з РФ, проти української реальності — повного економічного розриву та переорієнтації на Захід.'
  - 'Дебат 2 (Внутрішня дискусія): Стратегія «Build Back Better» — відбудувати зруйноване «як було», але краще, чи використати
    війну як шанс для повної структурної модернізації та відмови від радянської промислової спадщини?'
  - '[!epistemic-humility] Оцінки збитків та ефективності допомоги різняться. KSE Institute, Світовий банк, НБУ та уряд дають
    різні цифри, що відображає складність збору даних в умовах війни.'
  - 'Глобальна синхронність: Українська гібридна воєнна економіка (ринок + регуляція) у порівнянні з «тотальною мобілізацією»
    Британії в Другій світовій війні та ізраїльською моделлю «оборонної економіки».'
  section: 'Конфліктна карта: Вижити за будь-яку ціну чи збудувати нове?'
  words: 900
- points:
  - 'Статистичні звіти: аналіз даних від Центру економічної стратегії (ЦЕС) та НБУ. Як інфляція впала з 26.6% до 5.1%? Читаємо
    звіти, шукаючи пояснення.'
  - 'Бізнес-свідчення: кейси малих та середніх підприємств. Інтерв''ю з власниками кав''ярень, що стали «пунктами незламності»,
    та релокованих виробництв. Як бізнес адаптувався до блекаутів та втрати ринків?'
  - 'Волонтерська звітність: фінансові звіти фондів «Повернись живим» та фонду Притули. Аналіз структури витрат. Як громадянське
    суспільство стало ефективним менеджером мільярдних ресурсів?'
  - '[!decolonization] На противагу імперським наративам про «зовнішнє управління», саме ці внутрішні джерела — бізнес, волонтери,
    громадяни — демонструють справжню агентність та причини стійкості української нації.'
  - 'Дані про збитки: звіти KSE Institute про прямі збитки інфраструктурі (понад $150 млрд). Карта руйнувань як свідчення
    російської стратегії на знищення економічного потенціалу.'
  section: 'Джерела: Свідчення стійкості'
  words: 1600
- points:
  - 'Прямі наслідки російської агресії: втрата ~20% території та ключових підприємств («Азовсталь», ММК ім. Ілліча), блокада
    портів, енергетичний терор як спроба створити економічний колапс.'
  - 'Наслідки української адаптації: масова релокація 800+ підприємств, бум оборонної промисловості, створення самостійного
    морського коридору та децентралізованої енергосистеми на генераторах.'
  - '[!myth-buster] Міф про те, що Україна не може існувати без російського ринку. Факт: переорієнтація логістики на західні
    кордони («Шляхи солідарності» ЄС) та інтеграція в європейський ринок стали фактором виживання та остаточного розриву з
    імперією.'
  - 'Роль міжнародної допомоги: макрофінансова стабілізація від партнерів не як «подарунок», а як інструмент, що дозволив
    НБУ утримувати курс та наростити резерви, фінансуючи при цьому лише невійськові потреби бюджету.'
  - Феномен «донату» та волонтерського руху як унікальний суспільний договір, що закриває найнагальніші потреби армії та демонструє
    безпрецедентний рівень довіри у суспільстві.
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, чому економіка не впала на 50%? Студент формулює відповідь, спираючись на дані про стійкість
    банківської системи, швидку адаптацію бізнесу, ефективність волонтерського руху та міжнародну допомогу.'
  - 'Зв''язок із сьогоденням: План відбудови на $486 млрд — це виклик чи можливість? Як статус кандидата в ЄС впливає на економічне
    майбутнє України?'
  - '[!anti-hagiography] За показниками стійкості стоїть величезна ціна: виснаження людей, демографічна криза, ризики корупції
    при відбудові. Економіка вистояла, але якою вона буде після перемоги?'
  - 'Ширше питання: чи є «воєнна економіка» тимчасовим станом, чи це нова довгострокова реальність для України, що змушена
    існувати поруч з агресивним сусідом?'
  section: Дискусія та підсумок
  words: 700
