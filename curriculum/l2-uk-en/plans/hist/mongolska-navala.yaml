content_outline:
- points:
  - 'Провокація: Чи було падіння Києва у 1240 році неминучим апокаліпсисом, чи трагічною помилкою, якої можна було уникнути?
    Чому кияни вбили монгольських послів, знаючи, що це гарантує знищення міста?'
  - 'Фрагмент літопису: «І не було чути нічого від звуків скрипіння возів його, від ревіння безлічі верблюдів його, і від
    іржання табунів коней його». Про що говорить ця тиша, перекрита шумом ворога?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була Русь «щитом Європи»? [!myth-buster] Радянська і російська історіографія стверджувала, що Русь врятувала
    Європу, прийнявши на себе удар. Сучасний погляд: Русь виснажила монголів, але її власна політична роздробленість зробила
    її легкою здобиччю.'
  - 'Дебат 2: «Ярмо» як руйнування vs «Улус» як система. Чи була Орда лише дикою силою руйнування, чи ефективною тоталітарною
    імперією, що запропонувала альтернативну (деспотичну) модель управління, яку згодом перейняла Московія?'
  - '[!epistemic-humility] Ми не знаємо точної кількості жертв та руйнувань. Оцінки базуються на джерелах, написаних переможеними
    (літописи) або зовнішніми спостерігачами (Карпіні), кожен з яких мав свою мету.'
  - 'Глобальна синхронність: У 1240-х роках Монгольська імперія сягала від Кореї до Угорщини. Падіння Києва — лише один епізод
    у глобальному завоюванні, яке зупинилося не через опір, а через внутрішні проблеми в самій імперії (смерть хана).'
  section: 'Конфліктна карта: Щит Європи чи жертва розбрату?'
  words: 900
- points:
  - 'Первинний текст: Іпатіївський літопис. Аналіз опису облоги та падіння Десятинної церкви. Мова літописця: релігійні метафори
    (гріх і кара), емоційні епітети, героїзація воєводи Дмитра.'
  - 'Первинний текст: «Історія Монгалів» Джованні да Плано Карпіні. Погляд європейського «шпигуна», який відвідав Київ у 1246
    році. [!decolonization] Карпіні фіксує «незліченні голови і кістки», а не «велич» чи «спільну історію».'
  - 'Source Criticism: Порівняння літопису та звіту Карпіні. Літописець пише для нащадків про духовну трагедію. Карпіні пише
    для Папи Римського звіт про військовий потенціал ворога. Де правда?'
  - 'Археологічні докази: Розкопки братських могил, шари попелу, тисячі наконечників монгольських стріл. Як дані археології
    підтверджують або спростовують письмові джерела?'
  section: 'Джерела: Літописи, звіти шпигунів та археологія'
  words: 1600
- annotations:
  - '[!myth-buster]'
  - '[!decolonization]'
  points:
  - 'Короткострокові наслідки: Демографічна катастрофа, занепад міської культури, знищення ремісничих секретів (емаль, скло),
    переміщення політичного центру на Захід до Галицько-Волинського князівства.'
  - 'Довгострокові наслідки: [!myth-buster] Руйнування міфу про «спільну колиску». 1240 рік запустив два цивілізаційні вектори:
    Русь-Україна зберегла зв’язки з Європою через Литву та Польщу, а Залісся-Московія інтегрувалося в політичну та адміністративну
    систему Орди.'
  - 'Політична спадщина: Україна у складі Великого князівства Литовського зберегла руську мову та право («старовини не рушимо»).
    Московія перейняла ординські принципи: централізована деспотична влада, система податків, військова організація.'
  - 'Мовна стійкість: На відміну від російської мови, де багато тюркізмів увійшли в лексику державного управління, українська
    мова зберегла набагато менший вплив, що свідчить про інший тип взаємодії з Ордою.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, падіння Києва — це результат лише зовнішньої агресії чи також внутрішньої слабкості та
    фатального рішення захисників міста?'
  - 'Зв''язок із сьогоденням: Як досвід монгольської навали та подальшого цивілізаційного вибору впливає на сучасну боротьбу
    України за свою незалежність та європейську ідентичність?'
  - '[!anti-hagiography] Уникаючи романтизації, слід визнати, що домонгольська Русь не була ідилічною єдиною державою. Князівські
    усобиці та відсутність єдності стали ключовими факторами, що уможливили катастрофу 1240 року.'
  section: Дискусія та підсумок
  words: 700
focus: 'Падіння Києва 1240 року, кінець єдиного руського простору, монгольська тактика, свідчення джерел (літописи, Карпіні),
  та цивілізаційні наслідки: європейський вектор України vs азійський Московії.'
level: HIST
module: hist-021
objectives:
- Аналізувати причини, перебіг та наслідки монгольської навали на руські землі, критично оцінюючи різні історичні інтерпретації.
- Порівнювати та аналізувати первинні джерела (літописи, звіти мандрівників, археологічні дані) для реконструкції подій 1240
  року.
- Формулювати аргументовану позицію щодо довгострокового впливу навали на цивілізаційний вибір України та Московії.
- Розрізняти історичні факти та пропагандистські міфи (зокрема, міф про «спільну колиску» та «Русь як щит Європи»).
