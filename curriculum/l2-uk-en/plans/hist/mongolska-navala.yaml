slug: mongolska-navala
version: '3.0'
title: Монгольська навала 1240
subtitle: Падіння Києва та кінець Київської Русі
focus: history
pedagogy: CBI
phase: HIST.2 [Fragmentation]
word_target: 5000
objectives:
- Учень може проаналізувати причини та наслідки монгольської навали
- Учень може оцінити героїзм оборони Києва та роль Десятинної церкви
- Учень може порівняти спадщину Русі та Золотої Орди в контексті деколонізації
content_outline:
- section: Вступ
  points:
  - 1240 рік як геополітична катастрофа — кінець епохи «Київської Русі» як єдиного простору; руйнування династичних 
    зв'язків
  - Київ як сакральний центр — місто не просто адміністративний центр, а «Другий Єрусалим»; падіння як апокаліпсис
  words: 1250
- section: 'Читання: Трагедія та злам епох'
  points:
  - Політична роздробленість та Битва на Калці — (1223); трагедія відсутності єдності; старий феодальний світ vs 
    тоталітарна машина
  - Наступ Батия та облога Києва — Батий підійшов восени 1240; пропозиція здачі та вбивство послів киянами (порушення 
    законів Яси — неминуча смерть міста)
  - 'Доля інших міст: Чернігів та Переяслав — падіння Переяслава (весна 1239), героїчна оборона Чернігова (жовтень 1239) під
    проводом Мстислава Глібовича'
  - 'Останній оплот: Десятинна церква — падіння 6 грудня; люди на склепіннях; [!culture] Десятинна церква як «Ковчег», віра
    в божественний захист'
  - 'Військова тактика: Зіткнення цивілізацій — використання 32 пороків (каменеметальних машин) біля Лядських воріт; [!context]
    Монголи як дисциплінована машина з інженерами'
  - 'Культурні втрати: Загибель майстрів — втрата секретів (емаль, чернь, скло); знищення бібліотек; вбивство еліти'
  - 'Героїчні постаті: Захисники Києва — тисяцький Дмитро (поранений, життя збережено Батиєм за мужність)'
  - 'Міжнародний резонанс: Європа у вогні — [!myth-buster] Європа не «врятувала» себе сама; Русь стала щитом, що виснажив
    монголів'
  - 'Життя в Золотій Орді: Побут та управління — система баскаків; примусова мобілізація русичів; ярлики на княжіння'
  - 'Релігійний аспект: Віра в час апокаліпсису — гріхи як причина поразки в літописній традиції'
  - 'Наслідки: Переміщення центру на Захід — Галицько-Волинська держава як спадкоємець; битва під Ярославом (1245)'
  - Соціально-економічний вплив — місто-привид (200 будинків у 1246 році за свідченням Карпіні)
  - Археологія навали — розкопки В. Хвойки; братські могили всередині валів; тисячі наконечників монгольських стріл
  words: 1250
- section: Первинні джерела
  points:
  - Свідчення Плано Карпіні (1246) — [!quote] «...незліченні голови і кістки мертвих людей»; звіт шпигуна про руїну, а 
    не «велич»
  - Опис облоги в Іпатіївському літописі — [!history-bite] Скрип возів як психологічна зброя («не було чути од звуків 
    скрипіння возів...»)
  - Галицько-Волинський літопис про візит Данила до Батия — Данило змушений пити кумис («чорне молоко») — приниження 
    заради порятунку держави
  - Проблема достовірності джерел — літописи (релігійний підтекст, героїзація) vs звіт шпигуна Карпіні (фактичний, 
    емоційний)
  words: 1250
- section: Деколонізаційний погляд
  points:
  - 'Вплив на мову: Мовна стійкість — збереження руської мови в документах; відсутність масових монгольських запозичень (на
    відміну від російської)'
  - 'Міф про ''спільну колиску'' — [!decolonization] 1240 рік запустив два діаметрально протилежні вектори: європейський (Русь-Україна)
    та азійський (Московія)'
  - Монгольський спадок Московії vs Європейськість України — Московія перейняла деспотичну модель Орди; Україна зберегла
    вічеві традиції
  - Спадщина Русі у Великому князівстві Литовському — Литва як «Русь Литовська» («Ми старовини не рушимо...»); захист 
    від асиміляції
  words: 1250
vocabulary_hints:
  required:
  - навала (invasion) — монгольська навала; пережити навалу
  - облога (siege) — тривала облога; взяти в облогу
  - ярмо (yoke) — ординське ярмо; скинути ярмо (метафора)
  - орда (horde) — Золота Орда; дика орда (негативна конотація)
  - хан (khan) — хан Батий; ярлик хана
  - баскак (tax collector) — збирання данини; свавілля баскаків
  - ярлик (yarlyk/decree) — отримати ярлик на княжіння; їхати за ярликом
  - спустошення (devastation) — тотальне спустошення; після спустошення
  - оборона (defense) — героїчна оборона Києва; керувати обороною
  - воєвода (voivode) — княжий воєвода; Дмитро-воєвода
  recommended:
  - катапульта (catapult) — або «порок» (давньоруська назва)
  - таран (battering ram) — розбивати стіни таранами
  - данина (tribute) — платити данину; тягар данини
  - васал (vassal) — стати васалом хана
  - улус (ulus) — улус Джучі (офіційна назва Золотої Орди)
