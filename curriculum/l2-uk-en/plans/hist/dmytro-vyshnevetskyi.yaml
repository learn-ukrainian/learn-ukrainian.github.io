content_outline:
- points:
  - 'Провокація: Дмитро Вишневецький — останній лицар княжої доби чи перший отаман козацької? Де межа між аристократом і степовим
    ватажком?'
  - 'Фрагмент балади: "Ой п’є Байда, не допиває, на свого джуру споглядає..." — хто цей герой і що чекає на нього попереду?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Московський епізод (1558-1561) — прагматичний військовий союз проти Криму чи «віковічне тяжіння»
    до Росії, як стверджує радянська історіографія?'
  - 'Дебат 2: Соціальне походження козацтва. Вишневецький, магнат і нащадок Гедиміновичів, спростовує міф про те, що раннє
    козацтво складалося виключно з селян-втікачів.'
  - '[!epistemic-humility] Джерела про Вишневецького упереджені: польські хроніки бачать його як нелояльного підданого, народні
    думи — як ідеального героя, московські листи — як тимчасового слугу. Де правда?'
  - 'Глобальна синхронність: У той час як Вишневецький будує Січ (1556), в Європі тривають релігійні війни, а в Османській
    імперії править Сулейман Пишний.'
  section: 'Конфліктна карта: Князь чи Козак?'
  words: 900
- points:
  - 'Первинне джерело 1 (фольклор): Аналіз тексту "Пісні про Байду". Символізм відмови від "султанової дочки" та ісламу як
    утвердження християнської та лицарської ідентичності.'
  - 'Первинне джерело 2 (хроніка): Розбір розповіді Марціна Бєльського про страту Вишневецького в Стамбулі (1563) — повішення
    на гаку за ребро. Порівняння деталей з баладою.'
  - 'Критика джерел: Хто, коли і навіщо створив ці тексти? Наскільки народна пісня може бути достовірним історичним джерелом?
    Які мотиви були у Бєльського?'
  - '[!decolonization] Вишневецький в джерелах постає як незалежний гравець, що відправляє послів і будує фортеці, а не як
    васал Польщі чи Московії. Він — суб''єкт, а не об''єкт історії.'
  section: 'Джерела: Балада про Байду та хроніка Бєльського'
  words: 1600
- points:
  - 'Заснування Січі: Стратегічне значення фортеці на Малій Хортиці (1556) як першого постійного козацького гарнізону за порогами.
    Це змінило тактику з пасивної оборони на активні операції в Степу.'
  - 'Геополітична стратегія: Спроби Вишневецького створити антитатарську коаліцію з Польщі, Литви та Московії як прецедент
    для майбутньої зовнішньої політики козаків.'
  - '[!myth-buster] Міф про "московський протекторат". Союз із Москвою був тимчасовим і ситуативним. Вишневецький розірвав
    його, коли їхні пріоритети розійшлися, демонструючи свою незалежність.'
  - 'Оцінки істориків: Як Грушевський, Субтельний та Плохій оцінюють роль Вишневецького у кристалізації козацтва як військово-політичної
    сили.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, князь чи козак? Студент формулює аргументовану відповідь, спираючись на докази з джерел
    та аналізу.'
  - '[!anti-hagiography] Переоцінка "героя": чи не був "московський епізод" зрадою інтересів Литви? Вишневецький був прагматиком,
    а не бездоганним ідеалістом, і діяв у власних інтересах.'
  - 'Зв''язок із сьогоденням: Образ Байди — воїна, що обирає мученицьку смерть замість підкорення — як архетип українського
    опору. Від оборони Січі до оборони Азовсталі.'
  section: Дискусія та підсумок
  words: 700
focus: 'Dmytro Vyshnevetskyi as a transitional figure: from Rus'' prince to Cossack hetman, founder of the first Sich on Khortytsia,
  and the prototype for the legendary Baida.'
level: HIST
module: hist-043
objectives:
- Описувати роль Дмитра Вишневецького у заснуванні першої Січі на Хортиці та його значення для становлення козацтва.
- Аналізувати геополітичне становище українських земель у XVI ст. та дипломатичні маневри Вишневецького.
- Порівнювати історичні факти з фольклорним образом на прикладі постаті Байди-Вишневецького.
- Критично оцінювати різні історичні джерела (хроніки, листи, фольклор), виявляючи їхні упередження та мотиви.
pedagogy: CBI
