objectives:
- Аналізувати складні відносини між Кримським ханством та українськими землями, спростовуючи імперський міф про «одвічну ворожнечу»
- Критично оцінювати первинні джерела (європейські, османські), виявляючи їхні упередження та мету
- Пояснювати державний устрій, економіку та соціальну структуру ханства, використовуючи спеціалізовану термінологію (курултай,
  беї, ясир)
- Простежувати історичну тяглість від анексії 1783 року через геноцид 1944-го до сучасної російської окупації Криму
