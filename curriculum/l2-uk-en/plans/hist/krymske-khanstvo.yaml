content_outline:
- points:
  - 'Провокація: Ворог, союзник чи сусід? Міф про «одвічну ворожнечу» між українцями та кримськими татарами — звідки він походить
    і наскільки він правдивий?'
  - 'Фрагмент листа Богдана Хмельницького до Ісляма III Ґерая (1648): «Просимо, щоб Ваша Ханська Милість... з нами, Військом
    Запорозьким, був у союзі та братстві». Що змусило гетьмана шукати союзу з ханом?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Кримське ханство в російській/радянській історіографії — «паразитична держава», що жила з
    набігів, vs сучасний український погляд — повноцінна держава, спадкоємиця Золотої Орди.'
  - 'Дебат 2: Наскільки суверенним було ханство після 1478 року? Васал Османської імперії чи незалежний гравець, що вів власну
    гру в трикутнику Стамбул-Москва-Варшава?'
  - '[!epistemic-humility] Оцінка ступеня суверенітету ускладнена тим, що більшість джерел походять від сусідів (Польщі, Московії,
    Османів), які мали власні інтереси.'
  - 'Глобальна синхронність: Заснування ханства (1441) та його перехід під протекторат Османів (1478) збігається в часі із
    закінченням Столітньої війни в Європі, падінням Константинополя (1453) та початком Доби великих географічних відкриттів.'
  section: 'Конфліктна карта: Орда чи Держава?'
  words: 900
- points:
  - 'Погляд з Заходу: [!quote] Гійом Левассер де Боплан («Опис України», 1650) про військову тактику, витривалість та організацію
    татарських набігів. Аналіз його погляду як французького інженера на польській службі.'
  - 'Погляд зі Сходу: [!quote] Евлія Челебі («Книга подорожей», 1666) про розкіш Бахчисарайського палацу, розвинені ремесла
    та високу культуру ханства. Контраст із образом «дикого степу».'
  - 'Трагедія кордону: Ясир та ринок рабів у Кафі (суч. Феодосія). Аналіз економічного виміру работоргівлі та її демографічних
    наслідків для українських земель.'
  - '[!decolonization] Читання імперських джерел «проти шерсті». Виявлення у джерелах не лише описів набігів, а й доказів
    складної державної організації, дипломатії та торгівлі, які спростовують образ «варварів».'
  section: 'Джерела: Свідчення мандрівників та хроністів'
  words: 1600
- points:
  - 'Причини та наслідки союзів: Військовий союз з Богданом Хмельницьким (1648) як ключовий фактор успіхів на першому етапі
    повстання. Аналіз короткострокових вигод та довгострокових ризиків.'
  - '[!myth-buster] Спростування міфу про «виключно ворожі» стосунки. Приклади військово-політичних угод (союз Дорошенка 1624
    р., Хмельницького 1648 р.) та мирного співіснування.'
  - 'Взаємовпливи та запозичення: Вплив на мову (тютюн, кіш, майдан), одяг (шаровари, жупан), військову справу та побут як
    свідчення тісних контактів, а не лише конфліктів.'
  - 'Економічна модель: Не лише ясир. Роль ханства у транзитній торгівлі, експорт солі з Сивашу, розвинене садівництво, виноградарство
    та ремісництво (ювелірна справа, сап''ян).'
  - 'Історичні оцінки: Порівняння поглядів М. Грушевського, С. Плохія, В. Брехуненка на українсько-кримськотатарські відносини.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює аргументовану відповідь на питання «Ворог чи союзник?», використовуючи докази
    з модуля.'
  - '[!anti-hagiography] Уникаючи романтизації, необхідно визнати, що работоргівля (ясир) була реальною трагедією для українських
    земель і важливою частиною економіки ханства.'
  - 'Зв''язок із сьогоденням: [!legacy] Анексія 1783 року Російською імперією та геноцид 1944 року (Сюрґюн) як етапи руйнування
    державності кримських татар. Сучасний статус Qırımlı як корінного народу України та спільний опір російській окупації
    з 2014 року.'
  section: Дискусія та підсумок
  words: 700
focus: 'Кримське ханство як спадкоємець Золотої Орди: державний устрій Гіреїв, складні відносини з українськими землями (союзи
  та набіги), культурна спадщина та спростування імперського міфу про «одвічну ворожнечу».'
level: HIST
