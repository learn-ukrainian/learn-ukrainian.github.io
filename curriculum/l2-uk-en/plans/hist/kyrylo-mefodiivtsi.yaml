content_outline:
- points:
  - 'Провокація: Як 12 мирних київських інтелектуалів налякали третю найпотужнішу імперію світу так, що їхнім арештом керував
    особисто цар Микола I?'
  - 'Вступний епізод: таємна зустріч на квартирі у Гулака. Що змушувало молодих вчених, поетів та істориків діяти як змовники?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Український vs. Імперський): Братство — це невинний «клуб за інтересами» українофілів (імперська версія для
    применшення) чи перша модерна політична програма, що ставила під сумнів існування імперії (українська інтерпретація)?
    [!decolonization]'
  - 'Дебат 2 (Внутрішній): Братство — це єдина організація чи конгломерат ідей? Дискусія між «поміркованим» федералізмом Куліша
    та «радикальним» республіканізмом Гулака і Шевченка.'
  - '[!epistemic-humility] Через таємний характер та знищення багатьох документів ми не знаємо точного балансу сил між радикальним
    та поміркованим крилом. Історики досі сперечаються, чи існував єдиний статут.'
  - 'Глобальна синхронність: Ідеї братства виникли напередодні «Весни народів» 1848 року — загальноєвропейської хвилі революцій,
    що вимагали національних прав та республіканського устрою.'
  section: 'Конфліктна карта: Мрійники чи Революціонери?'
  words: 900
- points:
  - 'Аналіз «Книг буття українського народу» Костомарова: біблійний стиль, ідея месіанства України, яка своєю демократичною
    традицією воскресить деспотичні слов''янські народи.'
  - 'Поезія Шевченка як політична програма: аналіз уривків з поем «Сон», «Кавказ», «І мертвим, і живим...». Як поетичні метафори
    стали політичними вимогами.'
  - 'Читання «проти шерсті»: донос студента Олексія Петрова та протоколи допитів ІІІ відділення. Що саме в ідеях братчиків
    жандарми вважали найбільшою загрозою? [!decolonization]'
  - 'Ключова цитата: «І встане Україна із своєї могили, і знову озветься до всіх братів своїх слов’ян...» — розбір риторики
    та політичного змісту.'
  section: 'Джерела: Програма визволення та поліцейські звіти'
  words: 1600
- points:
  - Чому імперія так боялася ідей? Братство запропонувало альтернативну історію та майбутнє, де для імперії не було місця.
    Це був удар по ідеологічній доктрині «Православіє, Самодержавіє, Народність».
  - '[!myth-buster] Спростування міфу про «безневинних мрійників». Братство чітко формулювало антиімперські, республіканські
    та демократичні цілі, які були прямою загрозою існуванню Російської імперії.'
  - 'Особисті долі: Костомаров, Куліш, Гулак, Білозерський. Аналіз їхніх ролей та того, як розгром братства вплинув на їхню
    подальшу діяльність. [!biography]'
  - 'Найтяжчий удар по Шевченку: особиста помста Миколи І за поему «Сон». Заслання в солдати із забороною писати й малювати
    як спроба «вбити» національного пророка.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює відповідь на питання, чому 12 інтелектуалів становили смертельну загрозу для
    імперії.'
  - '[!anti-hagiography] Братство не було могутньою підпільною організацією. Це була невелика, недовготривала група, розгром
    якої мав трагічні особисті наслідки. Важливість братства — в ідеях, а не в практичній силі.'
  - 'Спадщина: Ідеї братства — про демократичну республіку, соціальну справедливість, українську державність — стали основою
    для наступних поколінь українських борців, зокрема для «Громад» 1860-х.'
  - 'Зв''язок із сьогоденням: Як сучасна Росія продовжує боротися з українською культурною та інтелектуальною спадщиною, вбачаючи
    в ній загрозу своєму існуванню?'
  section: Дискусія та підсумок
  words: 700
