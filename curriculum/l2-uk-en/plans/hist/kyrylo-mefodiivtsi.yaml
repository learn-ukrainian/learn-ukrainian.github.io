- Описувати цілі, програму та ідеологію Кирило-Мефодіївського братства
- Пояснювати роль ключових учасників: Костомарова, Куліша та Шевченка
- Аналізувати програмний документ «Книги буття українського народу» в контексті європейського романтизму
- Оцінювати історичне значення та спадщину братства для українського національного руху
