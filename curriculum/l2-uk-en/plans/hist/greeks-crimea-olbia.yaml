- Учень може пояснити причини грецької колонізації Північного Причорномор’я
- Учень може описати політичний та соціальний устрій Ольвії та Херсонеса
- Учень може проаналізувати взаємодію між еллінами та кочовими народами степу
- Учень може аргументувати значення античної спадщини для історії України
