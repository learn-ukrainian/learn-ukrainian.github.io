content_outline:
- points:
  - 'Провокація: Громадянин Херсонеса присягав «не зраджувати ні Херсонеса, ні Керкінітиди... і не передавати нічого варварам».
    Хто були ці «варвари» і чи справді греки лише захищались, а не нападали самі?'
  - '[!quote] Фрагмент присяги: «...я буду однодумцем у справі порятунку і свободи міста і громадян...» — що означала ця свобода
    і від кого її треба було рятувати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Природа присутності греків — чи була це мирна торговельна експансія, чи збройна колонізація
    з витісненням місцевого населення? Порівняння заснування Ольвії (договір?) та Херсонеса (захоплення?).'
  - 'Дебат 2: Еллінсько-скіфський симбіоз vs культурна апропріація. Греки запозичили скіфські штани, скіфи пили грецьке вино.
    Це був рівний обмін чи греки бачили в скіфах лише екзотичних «інших», як скіфський цар Скіл в Ольвії?'
  - '[!epistemic-humility] Більшість джерел — грецькі. Ми бачимо світ їхніми очима. Як би скіфський чи таврський історик описав
    ті самі події?'
  - 'Глобальна синхронність: Поки греки засновували Ольвію (VII ст. до н.е.), в Афінах назрівали реформи Солона, Рим був невеликим
    царством, а в Юдеї писали книгу пророка Єремії.'
  section: 'Конфліктна карта: Симбіоз чи експлуатація?'
  words: 900
- points:
  - 'Первинне джерело 1: Присяга громадян Херсонеса (III ст. до н. е.). Аналіз тексту: клятва демократії, вороги (скіфи, таври),
    економічні інтереси (заборона вивозити хліб повз місто).'
  - 'Первинне джерело 2: Декрет на честь Протогена (Ольвія). Аналіз: опис кризи (напад варварів, неврожай), роль олігарха-філантропа,
    який рятує місто за власний кошт. Що це говорить про ольвійську демократію?'
  - 'Первинне джерело 3: Згадки Демосфена про Боспорське царство. Аналіз: Афіни залежать від хліба з Пантікапея. Боспорські
    царі Спартокіди як ключові гравці геополітики.'
  - 'Археологічні джерела: Монети («дельфіни» Ольвії), клейма на амфорах (свідчення торгівлі), руїни Гіпподамового планування,
    хірургічні інструменти, залишки хори (системи земельних наділів).'
  section: 'Джерела: Голоси на камені та папірусі'
  words: 1600
- points:
  - 'Короткострокові наслідки: Поява міст, грошей, писемності та виноробства у Північному Причорномор''ї. Формування унікальної
    еллінсько-скіфської культури.'
  - 'Довгострокові наслідки: Античні міста як предтечі середньовічних портів. Демократичні традиції (віче) та правова культура.
    Україна як частина європейського, середземноморського світу з античних часів.'
  - '[!myth-buster] Міф: «Греки принесли цивілізацію в дикий степ». Факт: греки самі багато чого запозичили у скіфів, від
    елементів одягу до військової тактики, для виживання в нових умовах.'
  - 'Історичні оцінки: Занепад античного світу через Готську та Гунську навали (III-IV ст. н.е.). Виживає лише Херсонес як
    візантійський форпост. Перетворення античних руїн на фундамент для нових культур.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, греки в Причорномор''ї — колонізатори, торговці чи біженці? Студент формулює відповідь,
    використовуючи докази з джерел (присяга, декрети, археологія).'
  - '[!decolonization] Чому для сучасної України важливо наголошувати на своїй античній спадщині? Спростування імперського
    міфу про Крим як «колиску російського православ''я» і доведення тисячолітньої європейської історії півострова.'
  - '[!anti-hagiography] Античні поліси не були ідеальним суспільством: це були рабовласницькі республіки, що постійно воювали
    між собою та з сусідами. Їхня спадщина — це не лише демократія і філософія, а й імперіалізм та ксенофобія.'
  section: Дискусія та підсумок
  words: 700
focus: Greek colonization of the Northern Black Sea, polis structure (Olbia, Chersonesus), Bosporan Kingdom, Greco-Scythian
  interaction, and the ancient heritage on Ukrainian lands.
level: HIST
module: hist-003
objectives:
- Пояснювати причини та особливості грецької колонізації Північного Причорномор’я
- Порівнювати політичний, соціальний та економічний устрій Ольвії, Херсонеса та Боспорського царства
- Аналізувати первинні джерела (епіграфіку, археологію) для реконструкції минулого
- Критично оцінювати взаємодію між еллінами та «варварськими» народами степу (скіфами, таврами)
- Аргументувати значення античної спадщини для історії України та спростовувати імперські міфи
