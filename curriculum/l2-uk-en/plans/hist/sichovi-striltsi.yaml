objectives:
- Критично аналізувати причини створення та роль Легіону УСС в контексті Першої світової війни.
- Порівнювати імперські та національні наративи про УСС, ідентифікуючи пропаганду.
- Інтерпретувати первинні джерела (мемуари, пісні, фотографії) як інструмент культурного спротиву.
- Пояснювати довгостроковий вплив УСС на безперервність української визвольної боротьби та формування національної ідентичності.
