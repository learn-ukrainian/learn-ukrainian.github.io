content_outline:
- points:
  - 'Провокація: Чому 28 тисяч українців-добровольців прагнули вступити до легіону, з якого австрійська влада дозволила сформувати
    лише 2.5 тисячі? Чи є логіка в тому, щоб воювати за імперію, яка тобі не довіряє?'
  - 'Фрагмент маніфесту Головної Української Ради (6 серпня 1914): "Побіда австро-угорської монархії буде нашою побідою. І
    чим більше буде пораженнє Росії, тим швидше виб’є година визволення України". Як ви розумієте цю позицію?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський/імперський наратив ("австрійські найманці", "зрадники слов''янства") vs український ("армія поетів",
    "перше національне військо").'
  - 'Дебат 2: Внутрішня дискусія — УСС як інструмент Відня для контролю українців vs УСС як унікальний шанс для інтернаціоналізації
    українського питання та створення ядра майбутньої армії.'
  - '[!epistemic-humility] Недовіра австрійського командування була реальною — обмеження чисельності, відправка на найважчі
    ділянки фронту. Водночас, стрільці мали таємну присягу на вірність Україні, що створювало подвійну лояльність.'
  - 'Глобальна синхронність: Польські легіони Пілсудського в австрійській армії, Чехословацький корпус в російській армії
    — інші бездержавні народи так само намагалися використати світову війну для здобуття незалежності.'
  section: 'Конфліктна карта: Найманці чи патріоти?'
  words: 900
- points:
  - 'Первинне джерело (документ): Текст таємної присяги УСС (Стрий, 3 вересня 1914) — аналіз лексики: "боротьба за волю",
    "визволення з-під московського ярма", "слугувати вірно Україні". Порівняння з офіційною австрійською присягою.'
  - 'Первинне джерело (мемуари): Фрагменти зі спогадів Михайла Галущинського "Мої спомини" про формування легіону та щоденників
    рядових бійців про "війну в снігу" в Карпатах.'
  - 'Первинне джерело (мистецтво): Стрілецькі пісні як історичне джерело. Текст "Ой у лузі червона калина" (1914) — розбір
    символіки (калина, ненька-Україна). Творчість "Пресової кватири" — фотографії та листівки як "мистецтво в окопах".'
  - '[!decolonization] Феномен "Пресової кватири" та стрілецьких пісень — це акт культурного спротиву. В умовах, коли імперії
    заперечували існування українців як окремої нації, УСС створювали власну модерну мілітарну культуру й естетику (шапки-"мазепинки",
    пісні, фото).'
  section: 'Джерела: Спогади, пісні та присяга'
  words: 1600
- points:
  - 'Військове значення: Битва на горі Маківка (1915) — зупинка Брусиловського наступу, що мало величезне психологічне значення
    (українці перемогли регулярну російську армію). Битва на горі Лисоня (1916) — трагічні втрати (до 70%), але виконане завдання
    блокування наступу.'
  - 'Політичні наслідки: УСС стали ядром Української Галицької Армії (УГА) та кістяком уряду ЗУНР. Це доводить безперервність
    визвольної боротьби: УСС -> УГА -> УВО -> ОУН -> УПА.'
  - 'Культурні наслідки: Просвітницька місія на Волині та Наддніпрянщині. Стрільці, потрапляючи на підросійські землі, засновували
    школи (~100), поширювали українську мову та історію, "зшиваючи" розділену націю.'
  - '[!myth-buster] Міф про "погано навчених добровольців". Насправді, кістяк УСС складали члени парамілітарних організацій
    "Сокіл", "Січ", "Пласт", що мали добрий вишкіл. Високий освітній ценз перетворив армію на "армію поетів і професорів".'
  section: 'Аналіз: Від боїв до державотворення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, чому українці воювали за Австрію? Студент формулює відповідь, використовуючи концепції
    "меншого зла", "українського П''ємонту" та ідеї інтернаціоналізації українського питання.'
  - 'Зв''язок із сьогоденням: "Ой у лузі червона калина" пройшла шлях від гімну УСС до світового символу спротиву 2022 року
    (у виконанні Андрія Хливнюка та Pink Floyd). Чому саме ця пісня, а не інша, стала актуальною через 100 років?'
  - '[!anti-hagiography] Романтизація УСС є важливою частиною національної пам''яті. Але чи не затуляє вона трагедію братовбивчої
    війни, де 3.5 млн українців в армії РФ воювали проти 250 тис. українців в армії Австро-Угорщини?'
  section: Дискусія та підсумок
  words: 700
