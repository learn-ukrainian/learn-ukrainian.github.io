objectives:
- Аналізувати причини, перебіг та наслідки Козацької революції в європейському контексті
- Критично оцінювати Переяславську раду, розрізняючи поняття військового союзу та «возз'єднання»
- Деконструювати радянські та імперські міфи про Хмельниччину, спираючись на первинні джерела та сучасну історіографію
- Формулювати аргументовану позицію щодо ролі особистості в історії на прикладі Богдана Хмельницького
