content_outline:
- points:
  - 'Провокація: Чи була Хмельниччина лише повстанням, чи повноцінною революцією, що змінила соціальний лад? Що спільного
    у неї з Англійською революцією Кромвеля, що відбувалася в той же час?'
  - 'Фрагмент свідчення очевидця без контексту: «Ми помітили в цьому благословенному народі набожність, богобоязливість і
    благочестя...». Хто і за яких обставин міг так описати Україну в розпалі війни?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Переяславська рада — це військовий союз рівних чи акт підданства? Аналіз імперського міфу про «возз''єднання»
    та «вікове прагнення» vs української концепції вимушеного союзу.'
  - 'Дебат 2: Роль кримських татар — надійні союзники чи зрадники? Розгляд битви під Берестечком та двосторонніх інтересів
    обох сторін.'
  - '[!epistemic-humility] Вибір Хмельницьким московського протекторату: чи були реальні альтернативи (Османська імперія,
    Швеція)? Оцінка ризиків та переваг кожного сценарію, виходячи з обмежених даних того часу.'
  - 'Глобальна синхронність: Хмельниччина (1648) вибухнула одночасно із завершенням Тридцятилітньої війни в Європі (Вестфальський
    мир). Як поява нової козацької держави виглядала на тлі перекроювання карти Європи?'
  section: 'Конфліктна карта: Союз чи "возз''єднання"?'
  words: 900
- points:
  - 'Аналіз універсалів Богдана Хмельницького: мова, аргументація, мета. Як гетьман звертався до народу, старшини та іноземних
    правителів?'
  - 'Порівняльний аналіз Зборівського (1649) та Білоцерківського (1651) договорів: як змінювались вимоги та статус козацької
    держави після перемог та поразок?'
  - 'Читання «Березневих статей» (1654): що насправді було підписано в Переяславі? Аналіз пунктів про суверенітет, зовнішню
    політику, податки. [!decolonization] Розвінчання пізніших московських фальсифікацій та дописок.'
  - 'Свідчення очевидців: Гійом де Боплан («Опис України»), Павло Алеппський («Подорож антіохійського патріарха Макарія»).
    Якою бачили Україну та козаків іноземці? Критичний аналіз їхніх упереджень та спостережень.'
  section: 'Джерела: Універсали, договори та свідчення очевидців'
  words: 1600
- points:
  - 'Короткострокові наслідки: створення Гетьманщини, де-факто ліквідація кріпацтва на підконтрольних територіях («покозачення»),
    початок Руїни після смерті Хмельницького.'
  - 'Довгострокові наслідки: народження модерної української державної традиції, перетворення козацької старшини на нову політичну
    еліту, остаточний розрив з Річчю Посполитою та поступове поглинання Московським царством.'
  - '[!myth-buster] Деконструкція міфу про «возз''єднання». Переяславська рада — це не кінець історії, а початок нового етапу
    боротьби за суверенітет, цього разу проти нового, сильнішого союзника, що зрадив у Віленському перемир''ї (1656).'
  - 'Оцінка Хмельницького як історичної постаті: порівняння оцінок Грушевського (державник-революціонер), Липинського (монархіст),
    та сучасних істориків (Плохій, Яковенко).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, революція чи повстання? Студент формулює аргументовану відповідь, спираючись на вивчений
    матеріал (зміна соціального ладу, створення держави, ідеологія).'
  - 'Ширше питання: чи є «вибір меншого зла» дієвою стратегією в геополітиці? Уроки Переяслава для сучасної України.'
  - '[!anti-hagiography] Хмельниччина — це не лише героїчні перемоги, але й величезна трагедія: єврейські погроми, громадянська
    війна, початок Руїни. Як збалансувати пам''ять про тріумф державотворення та його темні сторони?'
  - 'Зв''язок із сьогоденням: як досвід Козацької революції та її наслідків впливає на сучасне українське ставлення до договорів,
    союзників та ідеї державності?'
  section: Дискусія та підсумок
  words: 700
focus: 'Khmelnytsky Uprising as a revolution: causes (social, religious, political), key stages (Zboriv, Pereiaslav), social
  transformation, and the decolonization of the "reunification" myth.'
level: HIST
