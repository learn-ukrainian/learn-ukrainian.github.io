module: hist-006
level: HIST
sequence: 6
slug: zasnuvannia-kyieva
version: '2.0'
title: Заснування Києва
subtitle: Legend and Archaeology of the Capital
content_outline:
- section: Вступ
  points:
  - 'Значення Києва як сакрального серця держави — концепція «Єрусалима землі руської»
    та символізм «міста на семи пагорбах» (паралель з Римом); engagement hook: [!context]'
- section: Читання
  points:
  - 'Аналіз «Повісті минулих літ» як джерела — легенда про Кия, Щека, Хорива і Либідь;
    engagement hook: [!source]'
  - 'Нестор про Кия: спростування версії «Кия-перевізника» на користь «Кия-князя»,
    що ходив до Царгорода'
- section: Варяги та хозари
  points:
  - Шлях «з варягів у греки» та Кенугард — Київ як транзитний хаб Північ-Південь
  - Хозарський вплив — легенда про данину мечами (двосічна зброя полян як символ майбутньої
    перемоги над хозарами)
  - 'Загадка назви «Самбатас» у Костянтина Багрянородного — можливі єврейські (субота)
    або скандинавські (укріплення човнів) корені; engagement hook: [!history-bite]'
- section: Первинні джерела
  points:
  - Літописні свідчення та візантійські описи — «Повість минулих літ» (патріотичний
    погляд) vs «Про управління імперією» (зовнішній, комерційний погляд)
  - 'Цитата: «Зробили вони городок і на честь брата їх найстаршого назвали його Києвом»;
    engagement hook: [!quote]'
- section: Деколонізаційний погляд
  points:
  - 'Спростування міфу про «спільну колиску» — Кий як полянський (праукраїнський)
    князь, а не спільний предок «трьох братніх народів»; engagement hook: [!myth-buster]'
  - Критика дати 482 рік — штучний ювілей 1982 року для «збалансування» радянської
    історіографії
- section: Археологічні свідчення
  points:
  - Язичницьке капище на Старокиївській горі — фундамент і жертовник як доказ сакрального
    центру
  - 'Римські монети II ст. як свідчення давніх торгових зв''язків, але не дати заснування
    міста; engagement hook: [!history-bite]'
- section: 'Хронологія: Легенди та археологія'
  points:
  - Legend of Kyi, Shchek, Khoryv — етимологія топонімів (Щекавиця, Хоривиця, Либідь)
  - Archaeological evidence (Starokyivska Hora) — рови і вали V-VI ст., культура празького
    типу
  - Strategic location — контроль переправи через Дніпро і оборона на пагорбах
- section: Підсумок
  points:
  - Узагальнення значення заснування Києва — синтез легенди (ідентичність) та археології
    (фактаж)
- section: Потрібно більше практики?
  points:
  - Ресурси для самостійного поглиблення знань — віртуальні тури Національним музеєм
    історії України
vocabulary_hints:
  required:
  - засновник (founder) — засновник міста/династії
  - легенда (legend) — літописна легенда, за легендою
  - літопис (chronicle) — Повість минулих літ, Нестор Літописець
  - пагорб (hill) — на семи пагорбах, Старокиївська гора
  - данина (tribute) — платити данину, збирати данину
  - каганат (khaganate) — Хозарський каганат
  - варяги (Varangians) — шлях із варягів у греки
  - торговельний шлях (trade route) — контроль над шляхом
  - капіще (pagan sanctuary) — язичницьке капище
  - дитинець (citadel) — укріплений центр міста
  - переправа (ferry/crossing) — дніпровська переправа
  - транзитна торгівля (transit trade) — міжнародна торгівля
  - деколонізація (decolonization) — історична пам'ять
  - ідентичність (identity) — національна ідентичність
  - артефакт (artifact) — археологічний артефакт
