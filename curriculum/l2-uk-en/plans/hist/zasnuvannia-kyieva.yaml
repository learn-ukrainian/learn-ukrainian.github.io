content_outline:
- points:
  - 'Провокація: Нестор Літописець стверджував, що Кий був князем, а не простим перевізником. Але чи можна довіряти хроністу,
    що писав через 600 років після подій? Які мотиви могли бути у Нестора, щоб «облагородити» походження столиці?'
  - 'Фрагмент без контексту: «Зробили вони городок і на честь брата їх найстаршого назвали його Києвом». Що стоїть за цими
    простими словами — історичний факт, політичний маніфест чи спроба створити національний міф?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Кий — полянський князь чи перевізник на Дніпрі? Аналіз версії Нестора (князь, що ходив на Царгород) проти «приниженої»
    версії, яку він спростовує. Чому для літописця було так важливо довести аристократичне походження засновника?'
  - 'Дебат 2: Коли насправді заснували Київ? Археологічні дані V-VI ст. vs. штучно призначена дата 482 рік, вигадана в СРСР
    до «1500-річчя». Як політика впливає на хронологію.'
  - '[!epistemic-humility] Ми не маємо жодних прямих письмових свідчень від V-VI століття про заснування міста. Уся наша реконструкція
    — це інтерпретація пізніших легенд та мовчазних археологічних знахідок.'
  - 'Глобальна синхронність: Поки на київських пагорбах з''являються перші укріплення (V-VI ст.), Західна Римська імперія
    остаточно занепадає (476 р.), а у Візантії починається «золота доба» Юстиніана (527-565 рр.).'
  section: 'Конфліктна карта: Князь чи перевізник?'
  words: 900
- points:
  - '«Повість минулих літ»: детальний аналіз легенди про Кия, Щека, Хорива та Либідь. Топонімічна прив''язка (гори Щекавиця,
    Хоривиця, річка Либідь) як спосіб легітимізації.'
  - '«Про управління імперією» Костянтина Багрянородного: погляд з Візантії. Загадкова назва «Самбатас» — що вона означає?
    Розгляд скандинавської (sam-båt) та хозарсько-єврейської (субота) версій.'
  - 'Археологічні докази: язичницьке капище та оборонні рови на Старокиївській горі (культура празького типу). Що вони говорять
    про суспільство, яке їх створило?'
  - '[!decolonization] Читаємо «Повість минулих літ» проти імперського наративу. Нестор пише про полянського, праукраїнського
    князя, а не про міфічного «спільного предка» для трьох «братніх народів». Це історія окремої землі та її династії.'
  section: 'Джерела: Легенди, хроніки та монети'
  words: 1600
- points:
  - 'Геополітичний вибух: як контроль над дніпровською переправою перетворив локальне поселення на ядро майбутньої держави.
    Київ як ключова ланка на шляху «із варягів у греки».'
  - 'Хозарський фактор: легенда про данину мечами як алегорія майбутньої перемоги. Київ як конкурент і спадкоємець Хозарського
    каганату в регіоні.'
  - 'Символічний капітал: концепція Києва як «другого Єрусалима» та «третього Рима» (місто на семи пагорбах). Як місто стало
    сакральним центром східного християнства.'
  - '[!myth-buster] Міф про 482 рік. Детальний розбір того, як і навіщо радянська влада у 1982 році «призначила» офіційну
    дату заснування Києва, ігноруючи наукову дискусію. Це був політичний компроміс, а не історичний факт.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож ким був Кий — князем чи перевізником? Студент формулює відповідь, спираючись на аналіз джерел,
    історіографії та археології.'
  - 'Ширше питання: що важливіше для національної ідентичності — красива легенда чи сухий археологічний факт? Чому нації створюють
    міфи про своє походження?'
  - '[!anti-hagiography] Заснування Києва не було мирним актом. Це була боротьба за контроль над ресурсами (торгівля, данина)
    і витіснення конкурентів (хозари).'
  - 'Зв''язок із сьогоденням: сучасна війна — це також боротьба за інтерпретацію історії. Як міф про заснування Києва використовується
    сьогодні для обґрунтування української державності та спростування імперських зазіхань?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз легенди про заснування Києва (Кий, Щек, Хорив), її співставлення з археологічними даними (V-VI ст.), критика
  радянських та імперських міфів, та визначення ролі міста на шляху «із варягів у греки».
