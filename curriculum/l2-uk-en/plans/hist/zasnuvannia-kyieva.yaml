objectives:
- Аналізувати легенду про заснування Києва як історичне джерело, відрізняючи факти від ідеологічних нашарувань
- Пояснювати геополітичне та сакральне значення Києва в контексті шляху «із варягів у греки» та конкуренції з Хозарським каганатом
- Порівнювати літописні, іноземні та археологічні свідчення про виникнення міста
- Формулювати аргументовану критику імперських та радянських міфів про походження Києва
