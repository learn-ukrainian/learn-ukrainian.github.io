module: hist-056
level: HIST
sequence: 56
slug: pereyaslavska-uhoda
version: '2.0'
title: 'Переяславська угода 1654: Міфи та реальність'
subtitle: 'The Treaty of Pereiaslav 1654: Myths and Reality'
focus: history
pedagogy: CBI
phase: HIST.6 [Khmelnytsky & Cossack State]
word_target: 5000
objectives:
- Учень може пояснити реальний зміст Переяславської угоди як військового союзу
- Учень може проаналізувати причини звернення Хмельницького до Москви
- Учень може спростувати імперський міф про «возз'єднання»
sources:
- name: Treaty of Pereyaslav - Encyclopedia of Ukraine
  url: https://www.encyclopediaofukraine.com/display.asp?linkpath=pages%5CP%5CE%5CPereyaslavTreatyof1654.htm
  type: reference
  notes: Academic overview
- name: Breznevi statti
  url: http://litopys.org.ua/volosh/volosh60.htm
  type: primary
  notes: Text of the March Articles
content_outline:
- section: Вступ
  points:
  - The exhaustion of the Khmelnytsky Uprising by 1653 — наслідки Жванецької облоги та зрада кримського хана Іслам-Гірея III
  - The search for a reliable ally against Poland — війна на два фронти та необхідність військового протекторату
  words: 550
- section: 'Дипломатична гра: Спроби знайти союзника'
  points:
  - Relations with Turkey, Crimea, and Sweden — неприйнятність турецького васалітету та пасивність шведської королеви Христини
  - The religious factor (Orthodoxy) in negotiations — спільна віра як аргумент для Земського собору 1653 року
  - Previous diplomatic missions — тривалі переговори та вагання Москви через страх війни з Польщею
  words: 550
- section: 'Переяславська рада: Зіткнення політичних світів'
  points:
  - The arrival of Buturlin's mission — публічна церемонія 8 (18) січня 1654 року
  - The refusal of the envoy to swear an oath for the Tsar — «Цар підданим не присягає» (зіткнення європейської та азійської
    політичних культур)
  - The reaction of the Cossack officers (starshyna) — присяга «з сльозами на очах» та розуміння вимушеності кроку; include
    [!history-bite] about the oath refusal
  words: 550
- section: 'Березневі статті: Суверенітет під прицілом'
  points:
  - The rights and liberties of the Zaporozhian Host — підтвердження прав шляхти, міщан та духовенства
  - The 60,000 register and independent foreign policy — право на дипломатію (окрім Польщі та Туреччини); include [!context]
    about missing originals
  - The Tsar's title vs. reality of the protectorate — Україна як де-факто незалежна держава (фінанси, військо, уряд)
  words: 550
- section: 'Глас вопіющого: Опозиція та незгодні'
  points:
  - Those who refused to swear allegiance — полковники Іван Богун, Іван Сірко та Запорізька Січ; include [!myth-buster] about
    'universal support'
  - The position of the Kyiv Metropolitan — відмова Сильвестра Косова присягати через загрозу підпорядкування Москві
  - The fear of losing autonomy — розуміння загрози козацьким свободам
  words: 550
- section: Віленська зрада та пошук нової стратегії
  points:
  - The violation of the treaty by Moscow (Vilna Truce 1656) — виключення України з переговорів («Віленська зрада»); include
    [!decolonization]
  - Khmelnytsky's search for new allies (Sweden) — Раднотський договір 1656 та орієнтація на Карла X Густава
  words: 550
- section: 'Читання: Аналіз історичних документів'
  points:
  - 'Reading excerpts from the March Articles — аналіз юридичної мови 23 пунктів (джерело: Літопис Самовидця/Величка)'
  words: 550
- section: Первинні джерела
  points:
  - Accounts of foreign diplomats on the event — зміна балансу сил у Європі (шведські звіти)
  words: 550
- section: Деколонізаційний погляд
  points:
  - Debunking the 'Reunification' myth (1954 propaganda) — термін, вигаданий до 300-річчя події для легітимізації СРСР; include
    [!culture]
  - Pereiaslav as a military alliance, not annexation — прагматичний, але тимчасовий союз, який Москва перетворила на інкорпорацію
  words: 600
vocabulary_hints:
  required:
  - протекторат (protectorate) — військовий протекторат, прийняти протекторат
  - 'присяга (oath) — скласти присягу, відмовитися від присяги; collocations: одностороння присяга'
  - статті (articles) — Березневі статті, затвердити статті
  - автономія (autonomy) — збереження автономії, широка автономія
  - легітимність (legitimacy) — легітимність влади, сумнівна легітимність
  - суб'єктність (political agency) — політична суб'єктність, втрата суб'єктності
  - возз'єднання (reunification) — міф про возз'єднання, «воссоєдінєніє» (ironic)
  - деколонізація (decolonization) — деколонізаційний погляд, історична пам'ять
  - зрада (betrayal/treason) — Віленська зрада, звинувачення у зраді
  - союзник (ally) — надійний союзник, пошук союзника, ситуативний союзник
  recommended:
  - васалітет (vassalage) — турецький васалітет
  - самодержець (autocrat) — цар-самодержець
  - клятвопорушення (perjury/oath-breaking) — звинувачення у клятвопорушенні
