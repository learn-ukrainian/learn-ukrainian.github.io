content_outline:
- points:
  - 'Провокаційне питання: Переяславська угода — це вимушений крок виснаженого народу чи стратегічна помилка, що визначила
    долю України на століття? Що б ви зробили на місці Хмельницького у 1653 році?'
  - 'Цитата без контексту (від одного з козацьких полковників, що відмовився присягати): "Це не союз, а ярмо, і ми проллємо
    ще більше крові, намагаючись його скинути, ніж у війні з ляхами".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Українська vs Імперська історіографія): Військово-політичний союз двох суверенних держав vs «возз''єднання»
    братніх народів. Як термінологія формує наратив.'
  - 'Дебат 2 (Правова природа угоди): Що це було — персональна унія (спільний монарх, різні держави), реальна унія, васалітет
    чи тимчасовий протекторат? Аналіз відмови московського посла присягати від імені царя як зіткнення двох різних політичних
    культур.'
  - '[!epistemic-humility] Визнання факту: оригінали Березневих статей втрачено. Історики працюють з копіями та списками,
    що ускладнює остаточну інтерпретацію.'
  - 'Глобальна синхронність: У Європі щойно закінчилась Тридцятирічна війна (1648), утверджується Вестфальська система суверенітетів.
    В Англії — республіка Кромвеля. Як ситуація в Гетьманщині виглядала на цьому тлі?'
  section: 'Конфліктна карта: Союз чи поглинання?'
  words: 900
- points:
  - 'Аналіз тексту Березневих статей (за копіями): збереження 60-тисячного реєстру, власного суду та адміністрації, фінансової
    системи, права на зовнішню політику (окрім Польщі та Туреччини).'
  - '[!decolonization] Як сам текст статей спростовує ідею інкорпорації? Акцент на правах та вольностях Війська Запорозького
    як суб''єкта договору.'
  - 'Голоси опозиції: чому відмовилися присягати полковник Іван Богун, кошовий отаман Іван Сірко та вся Запорізька Січ? Які
    загрози вони бачили?'
  - 'Позиція духовенства: відмова київського митрополита Сильвестра Косова присягати через страх підпорядкування української
    церкви московському патріархату.'
  section: 'Джерела: Березневі статті та голоси незгодних'
  words: 1600
- points:
  - 'Короткострокові наслідки: отримання сильного союзника у війні проти Речі Посполитої, перелом у бойових діях 1654-1655
    рр.'
  - 'Довгострокові наслідки: поступова ерозія суверенітету Гетьманщини, що почалася з першого ж великого порушення — Віленської
    зради 1656 року.'
  - '[!myth-buster] Деконструкція радянського та російського міфу про «возз''єднання». Походження терміну (тези ЦК КПРС 1954
    р.) та його пропагандистська функція.'
  - 'Порівняння оцінок істориків: як трактували Переяслав Хрушевський (втрата орієнтирів), Субтельний (трагічна помилка) та
    Плохій (кінець "козацької революції").'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: студент формулює власну аргументовану відповідь — була угода помилкою, необхідністю чи єдиним
    можливим варіантом?'
  - 'Зв''язок із сьогоденням: як російська пропаганда сьогодні використовує міфи про Переяслав для виправдання агресії проти
    України? Чому спростування цих міфів є питанням національної безпеки?'
  - '[!anti-hagiography] Оцінка ролі Хмельницького: уникнення таврування "зрадник" чи "геній". Розгляд гетьмана як політичного
    гравця, що діяв у екстремальних умовах з обмеженою інформацією та ресурсами.'
  section: Дискусія та підсумок
  words: 700
focus: The 1654 Treaty of Pereiaslav as a military-political alliance, its legal nature, the Cossack-Muscovite clash of political
  cultures, and the deconstruction of the imperial "reunification" myth.
level: HIST
module: hist-056
objectives:
- Пояснювати реальний зміст та правову природу Переяславської угоди як військово-політичного союзу, а не акту інкорпорації
- Аналізувати комплекс причин, що змусили Богдана Хмельницького шукати союзу з Москвою, та розглядати альтернативні дипломатичні
  вектори
- Критично розвінчувати імперський міф про «возз'єднання», простежуючи його пропагандистське походження та мету
- Ідентифікувати ключові точки напруги та опозиції угоді всередині Гетьманщини (Іван Богун, Запорізька Січ, православне духовенство)
pedagogy: CBI
