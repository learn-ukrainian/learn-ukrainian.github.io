slug: destalinizatsiia
version: '2.0'
title: Десталінізація в Україні
subtitle: De-Stalinization in Ukraine
content_outline:
- section: 'Вступ: Смерть Сталіна'
  points:
  - '5 березня 1953: кінець епохи — шок, розгубленість, але й прихована надія суспільства
    після смерті диктатора'
  - 'Україна після терору: масштаб втрат — інерція страху, що продовжувала діяти в
    перші місяці'
  - 'Надії на зміни — тиск знизу: повстання в ГУЛАГу (Кінгір, Норильськ, 1953-1954),
    де активну роль відігравали українські політв''язні (ОУН-УПА); [!history-bite]'
- section: XX з'їзд та його наслідки (1956)
  points:
  - «Таємна доповідь» Хрущова (лютий 1956) — не публікувалася в пресі до 1989 року,
    зачитувалася лише на партійних зборах; [!context]
  - Реабілітація жертв репресій — створення комісій, постанова ЦК від 30 червня 1956,
    повернення тисяч людей, але процес був вибірковим
  - Повернення з ГУЛАГу та заслання — радість змішана з гіркотою втраченого здоров'я
    та років, проблеми з пропискою та працевлаштуванням
  - 'Межі реабілітації: хто залишився «ворогом» — повна реабілітація лише для «своїх»
    (комуністів); діячі ОУН-УПА залишалися «бандитами», бо Хрущов не хотів викривати
    власні злочини в Україні; [!myth-buster]'
- section: Відлига в культурі
  points:
  - Нові можливості для української літератури — послаблення цензури, поява нових
    імен у журналах, метафора «відлиги»
  - Перші публікації про репресії — початок розмови про травму, хоча й у дозволених
    межах (критика культу, але не системи)
  - Олександр Довженко та його щоденники — туга за Україною, «Щоденник» як документ
    епохи та звинувачення системі у нищенні пам'яті
  - Виникнення шістдесятництва (1960) — Клуб творчої молоді «Сучасник» (Лесь Танюк,
    Алла Горська, Ліна Костенко); пошук «гуманного соціалізму» і національних джерел;
    [!culture]
- section: Первинні джерела
  points:
  - Фрагменти доповіді Хрущова — акцент на порушенні «ленінських норм» щодо партії,
    а не на правах людини чи злочинах проти націй
  - Листи реабілітованих — документи, що свідчать про зламані долі та надію на відновлення
    справедливості
  - 'Щоденники Довженка — та Василя Симоненка («Окрайці думок»): контраст між офіційним
    оптимізмом і внутрішнім болем, цитата про «необмежену владу обмеженої людини»;
    [!quote]'
- section: Деколонізаційний погляд
  points:
  - Десталінізація без деколонізації — зміна декорацій (портретів), але не сценарію
    (імперського контролю); [!decolonization]
  - Збереження російського домінування — русифікація під гаслами «інтернаціоналізму»,
    закон 1958 року про освіту (право «вибору» мови)
  - Чому «відлига» не стала «весною» — відновлення репресій (арешти 1965 року) як
    тільки культура вийшла за межі дозволеного етнографізму
  - Порівняння з іншими республіками — статус України як «молодшого партнера», приклад
    передачі Криму (1954) як господарського розрахунку (вода, логістика), а не «царського
    подарунка»
- section: 'Підсумок: Незавершена справа'
  points:
  - Кінець відлиги та наступ на шістдесятників — жовтень 1964, усунення Хрущова, прихід
    Брежнєва та початок ери «застою»
  - Спадщина десталінізації — імпульс для формування дисидентського руху та громадянського
    суспільства, що призвів до незалежності; [!legacy]
  - Декомунізація після 2014 року — повне подолання спадщини (символів, пам'ятників)
    лише після Ленінопаду, що свідчить про глибину травми
vocabulary_hints:
  required:
  - 'десталінізація (de-Stalinization) — political/social process; collocations: політика
    десталінізації, наслідки десталінізації, непослідовна десталінізація'
  - 'реабілітація (rehabilitation) — restoration of rights/reputation; learner error:
    confusing political rehabilitation with medical; collocations: комісія з реабілітації,
    повна реабілітація'
  - 'репресії (repressions) — punitive measures; collocations: масові репресії, жертви
    репресій, сталінські репресії, хвиля репресій'
  - 'відлига (thaw) — metaphor for liberalization; collocations: хрущовська відлига,
    політична відлига, період відлиги'
  - 'культ особи (cult of personality) — excessive public admiration; collocations:
    розвінчання культу особи, засудження культу особи, наслідки культу особи'
  - 'з''їзд (congress) — formal meeting; collocations: XX з''їзд КПРС (ключова подія),
    рішення з''їзду'
  - 'ГУЛАГ (Gulag) — acronym (Головне управління таборів); collocations: система ГУЛАГу,
    повстання в ГУЛАГу, в''язні ГУЛАГу'
  - 'заслання (exile) — forced removal; collocations: повернутися із заслання, відправити
    у заслання, довічне заслання'
  recommended:
  - 'амністія (amnesty) — pardon for group; distinct from individual rehabilitation;
    collocations: оголосити амністію, часткова амністія'
  - 'перегляд справи (case review) — legal re-examination; collocations: вимагати
    перегляду справи, домогтися перегляду'
  - 'політв''язень (political prisoner) — prisoner of conscience; collocations: українські
    політв''язні, колишній політв''язень'
  - 'цензура (censorship) — suppression of speech; collocations: послаблення цензури,
    жорстка цензура, цензурні обмеження'
  - 'самвидав (samizdat) — underground publishing; collocations: поширювати самвидав,
    читати самвидав'
  - 'номенклатура (nomenklatura) — ruling elite; collocations: партійна номенклатура,
    привілеї номенклатури'
