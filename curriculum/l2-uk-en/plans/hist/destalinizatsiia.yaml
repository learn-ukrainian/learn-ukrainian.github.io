content_outline:
- points:
  - 'Провокація: 5 березня 1953 року помер тиран. Чи зітхнуло суспільство з полегшенням, чи завмерло в очікуванні нового терору?
    Чи була «відлига» дарунком згори, чи виборена кров''ю знизу?'
  - '[!history-bite] Ще до «таємної доповіді» Хрущова, система ГУЛАГу дала тріщину: в Норильську та Кінгірі (1953-54) спалахнули
    повстання, де українські політв''язні відігравали ключову роль. Що змусило систему піти на поступки?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Таємна доповідь» — акт каяття чи прагматичний хід? Позиція 1: Хрущов щиро засуджував злочини Сталіна. Позиція
    2: Хрущов лише хотів убезпечити владу номенклатури від подальших чисток, зберігши саму систему.'
  - 'Дебат 2: Чи була «відлига» справжньою лібералізацією для України? [!decolonization] Офіційно: засудження культу особи.
    Реально: русифікація через освітній закон 1958 року, збереження імперського контролю під гаслами «інтернаціоналізму».'
  - '[!epistemic-humility] Межі реабілітації: чому тисячі комуністів повернулися з таборів, а бійці ОУН-УПА так і залишилися
    «бандитами»? Аналіз вибірковості правосуддя як інструменту політики.'
  - 'Глобальна синхронність: 1956 рік — не лише XX з''їзд, а й повстання в Угорщині. Як криваве придушення бунту в Будапешті
    показало реальні межі «відлиги» в соціалістичному таборі.'
  section: 'Конфліктна карта: Десталінізація без деколонізації'
  words: 900
- points:
  - 'Читання крізь рядки: аналіз фрагментів «таємної доповіді» Хрущова. Проти кого спрямовані звинувачення (порушення «ленінських
    норм»), а про які злочини (Голодомор, депортації) свідомо замовчується?'
  - 'Щоденники як свідчення: порівняння записів Олександра Довженка та Василя Симоненка. Що вони писали «в стіл», боячись
    цензури? Контраст між офіційним оптимізмом і внутрішнім болем. [!quote] «Необмежена влада обмеженої людини».'
  - 'Листи реабілітованих: радість повернення, змішана з гіркотою втрачених років. Проблеми з пропискою, працевлаштуванням,
    недовіра влади — як система приймала назад своїх вчорашніх «ворогів».'
  - 'Перші паростки самвидаву: як поява шістдесятників (Клуб творчої молоді «Сучасник») змінила культурний ландшафт. Аналіз
    ранньої поезії Ліни Костенко та Василя Симоненка — пошук нової мови для розмови про травму.'
  section: 'Джерела: Голоси епохи'
  words: 1600
- points:
  - 'Короткострокові наслідки: культурна «відлига». Послаблення цензури, поява нових імен, виникнення шістдесятництва як феномену.
    Початок розмови про репресії, хоча й у дозволених межах.'
  - 'Довгострокові наслідки: «відлига» дала імпульс для формування дисидентського руху. Покоління, що «ковтнуло ковток свободи»,
    вже не могло мовчки повернутися в сталінську епоху. [!legacy]'
  - '[!myth-buster] Міф про «подарунок»: передача Криму Україні в 1954 році. Це не «царський дар» Хрущова, а прагматичний
    господарський розрахунок, продиктований логістикою та економічною інтеграцією півострова з материковою Україною.'
  - '[!myth-buster] Міф про «повну реабілітацію»: насправді процес був вибірковим і не торкнувся тих, хто боровся за незалежність
    України. Система засудила «культ особи», але не злочини імперії.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож чим була «відлига» — справжнім світанком чи лише короткочасним послабленням морозу перед
    новою епохою «застою»? Студент формулює аргументовану відповідь.'
  - '[!anti-hagiography] Чому «відлига» не стала «весною»? Аналіз причин згортання реформ та арештів 1965 року. Чи не було
    наївним сподіватися на «соціалізм з людським обличчям» в рамках тоталітарної імперії?'
  - 'Зв''язок із сьогоденням: Декомунізація після 2014 року як завершення незавершеної справи десталінізації. Чому символи,
    пам''ятники та назви виявилися такими живучими, і знадобилося понад 60 років, щоб їх позбутися?'
  section: Дискусія та підсумок
  words: 700
focus: 'The paradox of Khrushchev''s Thaw in Ukraine: analyzing the limits of de-Stalinization, the gap between official policy
  and cultural reality, and the birth of the Shistdesiatnyky movement.'
