module: hist-113
objectives:
- Описувати ключові етапи та суперечності процесу десталінізації в УРСР.
- Критично оцінювати межі хрущовської «відлиги», розрізняючи реальні зміни та імітацію.
- Аналізувати первинні джерела епохи (доповіді, щоденники, листи), виявляючи приховані смисли.
- Пояснювати, чому десталінізація не призвела до деколонізації, та пов'язувати цей процес із сучасними викликами.
