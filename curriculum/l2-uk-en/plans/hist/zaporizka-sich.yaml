content_outline:
- points:
  - 'Провокативне питання: Чи була Запорозька Січ справжньою республікою свободи, чи жорстокою військовою диктатурою на кордоні
    цивілізацій?'
  - 'Фрагмент-загадка: "Що до вбивства, то вбивцю, вкинувши у яму, ховали у землю разом з тим, кого він убив". Як ви гадаєте,
    що це за суспільство, де діють такі закони?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Січ як суверенна держава vs імперський міф про "слуг царя" та "возз''єднання". Аналіз союзів
    козаків з кримськими татарами проти Московії.'
  - 'Дебат 2: "Лицарська демократія" vs "розбійницька вольниця". Дискусія про те, чи була Січ елітарним лицарським орденом,
    чи притулком для втікачів та авантюристів.'
  - '[!epistemic-humility] Більшість наших знань про ранню Січ походить з іноземних джерел (польських, османських), які часто
    були упередженими. Власні козацькі літописи з''являються пізніше.'
  - 'Глобальна синхронність: Козаки як найманці у Тридцятилітній війні в Європі (1618-1648). Січ як гравець на ринку військових
    послуг, паралельно з швейцарськими найманцями та італійськими кондотьєрами.'
  section: 'Конфліктна карта: Республіка чи фронтир?'
  words: 900
- points:
  - 'Погляд іноземця: "Опис України" Гійома де Боплана (1651). Аналіз його свідчень про військову тактику, побут та звичаї
    козаків. Чому його опис вважається відносно об''єктивним?'
  - 'Погляд зсередини: Козацькі літописи (Самійла Величка, Григорія Грабянки). Контраст між суворою дисципліною в поході та
    гульбою на Січі. Як літописці конструювали образ "ідеального козака".'
  - 'Матеріальні джерела: Козацькі клейноди (булава, бунчук, печатка) як символи державності. Що розповідають ці артефакти
    про політичний устрій Січі?'
  - '[!decolonization] Апокрифічний "Лист турецькому султану" як джерело для розуміння козацького духу та зневаги до імперій,
    а не як історичний документ.'
  section: 'Джерела: Як описували Січ'
  words: 1600
- points:
  - 'Причини виникнення: Січ як відповідь на "загрозу з поля" (татарські набіги) та посилення кріпацтва в Речі Посполитій.
    Великий Луг як унікальна екосистема і природна фортеця.'
  - 'Роль Дмитра Вишневецького: Заснування фортеці на Хортиці як форпосту для наступу на Крим, а не лише для оборони. Перехід
    від оборонної до наступальної стратегії.'
  - '[!myth-buster] Міф про абсолютну рівність. Пряма демократія на Козацькій раді, але жорстка ієрархія та дисципліна під
    час походу. Суворі покарання за злочини проти побратимства (вбивство, крадіжка).'
  - 'Оцінки істориків: Січ як "протодержава" (Грушевський), "християнська республіка" (Субтельний) чи "військово-промислова
    корпорація" (Плохій)? Аналіз різних підходів.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, республіка чи диктатура? Студент формулює власну аргументовану відповідь на основі матеріалів
    модуля.'
  - 'Ширше питання: Яку роль відігравали такі "фронтирні демократії" в історії? Порівняння з американським Диким Заходом чи
    піратськими республіками Карибського моря.'
  - 'Зв''язок із сьогоденням: Козацька спадщина в сучасних ЗСУ. Назви бригад ("Чорні Запорожці"), організаційні принципи,
    образ воїна. Де закінчується історична спадкоємність і починається націєтворчий міф?'
  - '[!anti-hagiography] Уникаючи ідеалізації: Січ була чоловічим військовим союзом, що базувався на насиллі, грабунку та
    виключенні жінок з суспільного життя.'
  section: Дискусія та підсумок
  words: 700
focus: 'The Zaporizhian Sich as a military-political entity: its democratic structure, legal system, international role, and
  decolonization of its history.'
level: HIST
module: hist-042
objectives:
- Аналізувати устрій Запорозької Січі, розрізняючи міфи та історичну реальність.
- Пояснювати принципи козацької демократії та судочинства, оцінюючи їхню ефективність та обмеження.
- Оцінювати роль Січі як суверенного політичного актора на міжнародній арені XVI-XVII ст.
- Критично аналізувати первинні джерела (літописи, свідчення іноземців), враховуючи упередження авторів.
- Спростовувати ключові імперські наративи про історію козацтва.
pedagogy: CBI
