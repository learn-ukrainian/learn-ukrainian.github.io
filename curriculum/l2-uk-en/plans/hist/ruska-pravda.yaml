objectives:
- Аналізувати структуру та еволюцію Руської Правди, відрізняючи її редакції.
- Пояснювати соціальну ієрархію Київської Русі через систему штрафів (віри).
- Дискутувати про поняття справедливості в Київській Русі, порівнюючи його з сучасними та іншими середньовічними системами.
- Спростовувати імперські міфи про Руську Правду та доводити її зв'язок з українською правовою традицією.
