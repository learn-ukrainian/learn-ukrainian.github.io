content_outline:
- points:
  - 'Провокація: Чому в Київській Русі вирвати бороду було вчетверо дорожче, ніж відрубати палець? Що це говорить про пріоритети
    суспільства, де честь важила більше за фізичну цілісність?'
  - 'Фрагмент-загадка: «Якщо уб''є муж мужа, то мстити братові за брата, або синові за батька...» — звідки починався шлях
    до державного права і чим він мав закінчитися?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Чия спадщина? Імперський міф про «Русскую Правду» (з двома «с») як початок російського права
    vs докази її протоукраїнського характеру (повноголосся, кличний відмінок, лексика).'
  - 'Дебат 2: Звичаєве право (помста) проти княжого закону (штраф). Це був суспільний договір для припинення усобиць чи інструмент
    примусу еліти для збереження контролю?'
  - '[!epistemic-humility] Історики сперечаються: чи був кодекс «гуманним» (без смертної кари), чи просто прагматичним (еліта
    не хотіла втрачати робочі руки через криваву помсту)?'
  - 'Глобальна синхронність: Руська Правда (XI ст.) vs Салічна правда франків (V-VI ст.) vs Велика хартія вольностей в Англії
    (1215 р.) — спільна логіка кодифікації права в середньовічній Європі.'
  section: 'Конфліктна карта: Право сили чи сила права?'
  words: 900
- points:
  - 'Аналіз «Правди Ярослава» (Коротка редакція): договір з варязькими найманцями як реакція на конфлікти в 1016 р., спроба
    обмежити коло месників.'
  - 'Текст-джерело 1: Стаття про кровну помсту. Аналіз: «Якщо не буде кому мстити, то [платити] 40 гривень...» — запровадження
    економічної альтернативи вбивству.'
  - 'Аналіз «Правди Ярославичів» (Розширена редакція): повне скасування кровної помсти (1072 р.) та введення диференційованих
    штрафів (віри) як інструменту державної монополії на насильство.'
  - 'Текст-джерело 2: Соціальна ієрархія через штрафи. Життя «огнищанина» (80 грн) vs «смерда» (5 грн) vs «холопа» (0 грн,
    бо він власність). Аналіз: що таке 5 гривень? (ціна 16 коней).'
  - '[!decolonization] Текст як доказ мови: аналіз лексики («вервь», «видок», «голова», «боророда») як маркерів живої протоукраїнської
    мови, а не абстрактної «давньоруської». '
  - 'Статус залежних: закупи (боргова кабала з правом викупу) vs холопи (повна несвобода). Як вільна людина могла стати рабом?'
  section: 'Джерела: Текст і контекст Руської Правди'
  words: 1600
- points:
  - 'Короткострокові наслідки: припинення міжусобиць, посилення князівської влади, створення єдиного правового поля від Києва
    до Новгорода, що зміцнило державу.'
  - 'Довгострокові наслідки: закладення основ європейської правової традиції в Україні, яка була прямо успадкована Литовським
    Статутом і козацьким правом.'
  - '[!myth-buster] Міф про «дикість» Русі. Насправді Руська Правда, на відміну від візантійського чи пізнішого московського
    права (Судебник 1497), не знала смертної кари та жорстоких тортур, віддаючи перевагу фінансовій компенсації.'
  - 'Економічний вимір: захист приватної власності (межі, борті), регуляція боргових відносин (різи), захист торгівлі та статусу
    купця («гостя»).'
  - 'Соціальний вимір: правосуб''єктність жінки (високі штрафи за образу, майнові права вдів), роль громади («вервь») у судочинстві
    та колективній відповідальності.'
  - 'Оцінки істориків: Як Грушевський, Субтельний та Плохій оцінюють роль Руської Правди у формуванні української державності
    та її відмінності від московської традиції?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, чому борода дорожча за палець? Формулювання відповіді на основі аналізу соціальної ієрархії
    та поняття «честі» в Русі.'
  - 'Зв''язок із сьогоденням: Як розуміння Руської Правди допомагає утвердити місце України в європейській правовій цивілізації,
    на противагу євразійській деспотії, де право — інструмент репресій, а не справедливості?'
  - '[!anti-hagiography] Чи була Руська Правда «справедливою»? Критична оцінка. Уникнення ідеалізації — це був закон, що цементував
    глибоко нерівне суспільство, де життя холопа не коштувало нічого, а закуп був у кроці від рабства.'
  - 'Підсумкове питання для роздумів: Які принципи Руської Правди (наприклад, пріоритет компенсації над покаранням) могли
    б бути актуальними сьогодні, а які є абсолютно неприйнятними?'
  section: Дискусія та підсумок
  words: 700
focus: Руська Правда як перший кодекс, соціальна ієрархія Русі, перехід від звичаєвого права до державного, європейський контекст
  та деколонізація спадщини
