content_outline:
- section: Вступ
  points:
  - 'Контраст двох правителів: Ольга-дипломат («м''яка сила») та Святослав-воїн («жорстка сила»)'
  - 'Тандем, що сформував Русь: адміністратор та експансіоніст'
  - '[!history-bite] Святослав носив «оселедець» (чуб) і виглядав як козак за 500 років до появи козацтва'
  words: 1000
- section: Читання
  points:
  - 'Ольга: Помста як Політика — кровна помста як юридичний обов''язок та легітимізація влади'
  - '[!context] Деталі трьох помст (посли в ямі, лазня, різанина на тризні) та спалення Іскоростеня'
  - 'Реформи: Від хаосу до порядку — перехід від полюддя (грабіж) до організованої системи'
  - '[!decolonization] Ольга — архітектор держави, творець адміністративного апарату'
  - Інфраструктура реформ — введення «уроків» (фіксований податок) та «погостів» (центри збору)
  - 'Дипломатія: Візит до Царгорода (957) — мета: рівноправність з Візантією, хрещення як інструмент'
  - 'Святослав: Лицар Степу (964–972) — гасло «Іду на ви!» та війна з Хозарією'
  - Геополітична катастрофа чи перемога? — контроль над Волгою і Доном vs відкриття шляху печенігам
  - '[!myth-buster] Знищення Хозарії — це ствердження суб''єктності Києва як імперії'
  - 'Загибель: Чаша з черепа — засідка печенігів на порогах, хан Куря'
  - 'Цитата Святослава: «Мертві сорому не мають» (перед битвою під Доростолом)'
  words: 1000
- section: Первинні джерела
  points:
  - Повість минулих літ про реформи Ольги — фіксація переходу до регламентованого управління
  - Лев Диякон про Святослава (Опис зовнішності) — біла сорочка, сережка, чуб, голена голова
  - '[!quote] Опис зовнішності Святослава Левом Дияконом — прямий доказ української естетики еліти'
  words: 1000
- section: Деколонізаційний погляд
  points:
  - 'Святослав: Вікінг чи Козак? — візуальний та ментальний зв''язок з пізнішим козацтвом'
  - 'Ольга: "Мудра", а не "Хитра" — літописні хитрощі як ознака політичної мудрості жінки-правителя'
  - Глибший аналіз реформ Ольги — створення інституційної держави замість військового союзу
  - 'Святослав: Портрет лицаря Степу — аскетизм, зневага до комфорту, життя в походах'
  - 'Хозарія: Знищення буфера — війна двох регіональних наддержав'
  - 'Балканська епопея: Амбіція і катастрофа — спроба перенести столицю на Дунай'
  - 'Загибель: Уроки для нащадків — ціна геополітичних амбіцій без тилу'
  - 'Жінки у політиці Русі: Феномен Ольги — високий статус жінки в Русі порівняно з Європою'
  - '[!culture] Унікальний статус жінки в Русі vs пізніша московська традиція'
  - 'Ольга і Святослав: Два шляхи розвитку України — європейський (дипломатія) та степовий (війна)'
  - Спадщина для нащадків — адміністративна система (Ольга) та військова слава (Святослав)
  - Уроки для сучасної України — важливість поєднання сильної армії та ефективних інституцій
  words: 1000
- section: Потрібно більше практики?
  points:
  - Економіка епохи Ольги та Святослава — роль хутра і воску, шлях «із варяг у греки»
  - Християнство і язичництво — Ольга-християнка vs Святослав-язичник, релігійний дуалізм
  - Життя звичайних людей — смерди, дружинники, ремісники
  - Жінки в суспільстві — майнові права, участь у господарському житті
  - Військова культура — озброєння дружини, тактика «стіна щитів», кіннота
  - Спадщина для нащадків — як реформи Ольги вплинули на правління Володимира
  - Завершення епохи — кінець періоду експансії, початок консолідації
  - Археологічні свідчення епохи — скарби, зброя, поховання (Шестовиця, Гньоздово)
  words: 1000
vocabulary_hints:
  required:
  - княгиня (princess) — княгиня Ольга, правління княгині
  - помста (revenge) — кровна помста, жорстока помста
  - реформа (reform) — податкова реформа, адміністративна реформа, проводити реформи
  - хрещення (baptism) — прийняти хрещення, хрещення Русі
  - 'погост (pogost - tax station) — заснувати погости, місце збору данини; contested term: not a cemetery'
  - урок (urok - fixed tribute) — встановити уроки, розмір данини
  - данина (tribute) — збирати данину, платити данину, полюддя
  - каганат (khaganate) — Хозарський каганат, розгром каганату
  - завоювання (conquest) — військові завоювання, епоха завоювань
  - воїн (warrior) — Святослав-воїн, хоробрий воїн
  - похід (campaign) — Балканський похід, похід на в'ятичів, військовий похід
  - печеніги (Pechenegs) — напад печенігів, облога Києва, хан печенігів
  recommended:
  - рівноапостольна (equal-to-apostles) — свята рівноапостольна Ольга
  - Доростол (Dorostolon) — оборона Доростола, облога міста
  - Балкани (Balkans) — війни на Балканах, Дунайська Болгарія
  - чаша (cup/chalice) — чаша з черепа, пити з чаші
  - дипломатія (diplomacy) — тонка дипломатія, візантійська дипломатія
