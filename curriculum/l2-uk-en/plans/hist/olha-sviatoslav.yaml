content_outline:
- points:
  - 'Провокація: Уявіть, що ви — радник при київському дворі в середині X століття. Кого б ви підтримали: княгиню Ольгу з
    її планами реформ і дипломатії, чи її сина Святослава з його жагою до завоювань? Чий шлях обіцяє державі більше — стабільність
    чи славу?'
  - 'Фрагмент без контексту: «Мертві сорому не мають». Що це — девіз відчайдушного завойовника, останнє слово засудженого
    чи філософська максима?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Реформи Ольги — акт державотворення чи раціоналізація грабунку? Українська історіографія бачить в її «уроках»
    і «погостах» зародки сучасної держави. Імперська традиція (і деякі західні історики) — лише більш ефективний спосіб збору
    данини.'
  - 'Дебат 2: Знищення Хозарського каганату Святославом — геополітична перемога чи стратегічна помилка? Одні вважають це утвердженням
    суб''єктності Русі як регіональної наддержави. Інші — катастрофою, що відкрила степовий коридор для нових, ще небезпечніших
    кочовиків (печенігів).'
  - '[!epistemic-humility] Наші знання про цю епоху базуються майже виключно на Повісті минулих літ, написаній через 150 років
    після подій. Наскільки можна довіряти літописцю, що виконував політичне замовлення нащадків?'
  - 'Глобальна синхронність: Поки Святослав воює на Сході, на Заході Оттон I створює Священну Римську імперію (962), а в Кордовському
    халіфаті триває «золотий вік» ісламської культури.'
  section: 'Конфліктна карта: Держава vs Імперія'
  words: 900
- points:
  - 'Аналіз трьох помст Ольги деревлянам: посли в човні, посли в лазні, тризна з різаниною. Це не просто кривава казка, а
    ритуальне утвердження влади і перехід від кровної помсти до державного права.'
  - 'Спалення Іскоростеня: демонстрація абсолютної влади і символічне завершення епохи племінних союзів.'
  - 'Первинне джерело 1: Фрагмент з «Повісті минулих літ» про запровадження Ольгою «уроків» і «погостів». Аналіз термінів:
    перехід від нерегулярного «полюддя» до фіксованого податку.'
  - '[!decolonization] Ольга — не просто «хитра» жінка, а архітекторка інституційної держави. Її реформи створили адміністративний
    кістяк, на якому трималася Русь.'
  - 'Первинне джерело 2: Опис зовнішності Святослава візантійським істориком Левом Дияконом (довгий вус, оселедець, сережка
    у вусі). Це не «дикий варвар», а представник окремої військової естетики, що стане архетипом для українського козацтва.'
  - 'Аналіз мови Святослава: «Іду на ви!» — не просто попередження, а кодекс честі степового лицаря, що зневажає підступність.'
  section: 'Джерела: Помста, закон і меч у Повісті минулих літ'
  words: 1600
- points:
  - 'Короткострокові наслідки: Реформи Ольги стабілізували державу, наповнили скарбницю. Війни Святослава розширили кордони,
    але виснажили ресурси і створили нові загрози (печеніги).'
  - 'Довгострокові наслідки: Ольга заклала адміністративну основу, що дозволила Володимиру та Ярославу розбудовувати державу.
    Святослав створив військовий міф, ідеал воїна, що надихав наступні покоління, але також залишив у спадок проблему незахищеного
    степового кордону.'
  - '[!myth-buster] Святослав не був «першим козаком». Він був продуктом дружинної культури X століття, але його образ, спосіб
    життя та військова тактика стали культурним кодом, який пізніше активувався в козацьку добу.'
  - 'Порівняння оцінок: Грушевський бачив в Ользі мудру державницю, а Святослава критикував за авантюризм. Сучасні історики
    (Плохій, Ричка) наголошують на тому, що вони не антагоністи, а дві сторони однієї медалі — тандем, що будував імперію.'
  - 'Два шляхи: Ольга уособлювала європейський вектор розвитку (дипломатія з Візантією, християнство). Святослав — євразійський,
    степовий (війна як спосіб життя). Ця дихотомія стане однією з ключових в українській історії.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Ольга чи Святослав? Сформулюйте аргументовану відповідь, доводячи, чому синергія їхніх
    підходів (сильна адміністрація + потужна армія) виявилася ключем до успіху Русі.'
  - 'Зв''язок із сьогоденням: Наскільки актуальним для сучасної України є урок Ольги та Святослава про необхідність поєднання
    ефективних внутрішніх інституцій та сильної армії для протистояння зовнішнім загрозам?'
  - '[!anti-hagiography] Важливо уникнути ідеалізації. Ольга була жорстокою правителькою, яка утверджувала владу вогнем і
    мечем. Святослав був амбітним воєначальником, чиї авантюри коштували тисяч життів і врешті-решт його власного.'
  section: Дискусія та підсумок
  words: 700
focus: Контраст між Ольгою-дипломаткою, архітекторкою держави, та її сином Святославом-завойовником. Аналіз їхніх реформ та
  військових кампаній як двох альтернативних векторів розвитку Русі.
