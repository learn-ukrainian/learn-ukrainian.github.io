title: Королювання Данила Романовича
subtitle: Король України та європейський вибір
content_outline:
- section: Вступ — Єдиний коронований король Русі
  points:
  - Чому коронація 1253 року унікальна в історії України — відбулася в Дорогочині,
    а не в столиці, легітимізувала державу в очах Європи [!history-bite]
  - Данило як символ європейського вибору — перший легітимний «Король Русі» (Rex Russiae),
    визнаний Папою Римським
- section: Боротьба за Галичину (1205-1238)
  points:
  - Дитинство вигнанця після смерті батька Романа — початок «сорокарічної війни» за
    повернення батьківської спадщини
  - Боротьба з угорцями та боярською опозицією — унікальний випадок, коли боярин Владислав
    Кормильчич проголосив себе князем [!context]
  - 'Об''єднання Галичини і Волині — перемога під Дорогочином (1238) над хрестоносцями:
    «Не личить держати нашу батьківщину крижевникам»'
- section: Монгольська навала та дипломатія виживання
  points:
  - Поразка 1240 року та візит до Батия — після блискучої перемоги під Ярославом (1245)
    Данило змушений їхати в Орду за ярликом
  - «Зле є почесті татарської» — принизливий прийом, необхідність пити чорний кумис,
    але збереження гідності через відмову від язичницьких ритуалів [!quote]
  - Стратегія лавірування між Сходом і Заходом — отримання ярлика як спосіб виграти
    час для будівництва фортець
- section: Коронація 1253 року — Європейський вибір
  points:
  - Союз з Папою Інокентієм IV — переговори про надання корони в обмін на церковну
    унію та військову допомогу
  - Обіцянка хрестового походу, що не відбувся — Папа закликав християн Богемії та
    Польщі, але реальної допомоги не надійшло
  - Значення королівського титулу — це був політичний союз, а не зміна віри; православні
    обряди збереглися [!myth-buster]
- section: Первинні джерела — Галицько-Волинський літопис
  points:
  - Унікальність літопису як джерела — світський, емоційний стиль, на відміну від
    церковних київських літописів
  - 'Поетична мова та героїчний стиль — характеристика короля: «Книжником бо він був
    великим і філософом»'
- section: Деколонізаційний погляд — Русь ≠ Росія
  points:
  - Чому Росія ігнорує Данила Галицького — його європейський вибір руйнує міф про
    «спільноруську» єдність з Ордою
  - Галицько-Волинська держава як альтернативний центр Русі — титул Rex Russiae доводить,
    що Русь — це Україна, а Московія була улусом Орди [!decolonization]
  - Європейська орієнтація vs московський ізоляціонізм — контраст з Олександром Невським,
    який став названим сином Батия
- section: Підсумок — Спадщина короля
  points:
  - Смерть 1264 року та занепад династії — похований у Холмі, держава проіснувала
    до середини XIV ст.
  - Данило як символ незалежності — заснування Львова (1256) та Холма як нових центрів
    цивілізації [!culture]
