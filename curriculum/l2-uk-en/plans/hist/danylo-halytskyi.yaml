content_outline:
- points:
  - 'Провокаційне питання: Чому Данило Романович, наймогутніший правитель Східної Європи XIII століття, прийняв корону від
    Папи Римського, але відмовився від церковної унії? Чи був це блискучий дипломатичний хід, чи трагічна помилка, що не принесла
    реальної допомоги проти Орди?'
  - 'Фрагмент літопису без контексту: "О, зліша від зла честь татарська!" — хто, кому і за яких обставин міг сказати ці слова?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Данило — далекоглядний європейський інтегратор чи прагматичний васал Орди? Порівняння його політики з політикою
    Олександра Невського, що обрав повну капітуляцію.'
  - 'Дебат 2: Коронація 1253 року — це реальний успіх чи символічний жест? Дискусія між істориками про те, наскільки титул
    "Rex Russiae" змінив становище Галицько-Волинської держави.'
  - '[!epistemic-humility] Наші знання про мотивацію Данила обмежені єдиним джерелом — Галицько-Волинським літописом, написаним
    при його дворі. Наскільки ми можемо довіряти цьому панегірику?'
  - 'Глобальна синхронність: У той час як Данило лавірує між Ордою і Римом, у Священній Римській імперії триває боротьба за
    владу, закінчуються останні Хрестові походи, а по всій Євразії розширюється Pax Mongolica.'
  section: 'Конфліктна карта: Вибір Данила: між Ордою та Римом'
  words: 900
- points:
  - 'Аналіз фрагментів: Поїздка до Батия. Літописець передає приниження ("пиття чорного кумису"), але підкреслює збереження
    гідності (відмова від язичницьких ритуалів).'
  - 'Аналіз фрагментів: Битва під Дорогочином (1238) та знаменита фраза: "Не личить держати нашу батьківщину крижевникам (хрестоносцям)".'
  - 'Критика джерела: Літопис — це не об''єктивна хроніка, а політичний твір. Його мета — легітимізувати владу Данила та його
    нащадків, представити його як ідеального правителя-воїна і "великого книжника".'
  - '[!decolonization] Літопис створює образ Русі з центром у Галичі та Холмі, що є прямою альтернативою "спільноруській"
    єдності, яку просуває російська історіографія. Він доводить, що Русь — це Україна.'
  section: 'Джерела: Галицько-Волинський літопис'
  words: 1600
- points:
  - 'Короткострокові наслідки: Коронація не принесла обіцяного хрестового походу. Данило залишився сам на сам з ординською
    загрозою і був змушений знищити власні фортеці.'
  - 'Довгострокові наслідки: Титул короля закріпив за Галицько-Волинською державою статус спадкоємиці Київської Русі в очах
    Європи. Цей європейський вектор зберігся на століття.'
  - '[!myth-buster] Міф про "унію": Данило не змінював віри. Коронація була політичним, а не релігійним актом. Православні
    обряди в його державі повністю збереглися.'
  - 'Оцінки істориків: Грушевський бачив у Данилі творця нової концепції української державності. Плохій підкреслює його роль
    у формуванні "цивілізаційного кордону" Європи.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, коронація — це успіх чи провал? Студент формулює аргументовану відповідь, зважуючи символічні
    здобутки та практичні втрати.'
  - 'Зв''язок із сьогоденням: "Цивілізаційний вибір" — одна з ключових тем сучасної української ідентичності. Наскільки досвід
    Данила актуальний для України, яка сьогодні знову воює за свою європейську приналежність?'
  - '[!anti-hagiography] Попри героїчний образ у літописі, Данило був жорстоким середньовічним правителем, який сорок років
    вів війну за владу, зокрема і проти внутрішньої боярської опозиції. Його держава не стала вічною.'
  section: Дискусія та підсумок
  words: 700
focus: Коронація Данила Галицького, дипломатична гра між Золотою Ордою та Папським престолом, унікальність Галицько-Волинського
  літопису та деколонізація поняття "Русь"
