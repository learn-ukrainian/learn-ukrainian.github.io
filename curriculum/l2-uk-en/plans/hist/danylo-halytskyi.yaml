objectives:
- Критично аналізувати стратегію Данила Романовича, зважуючи його дипломатичні відносини з Золотою Ордою та Папським престолом
- Інтерпретувати уривки з Галицько-Волинського літопису, розрізняючи історичний факт та літописну інтерпретацію
- Пояснювати довгострокове значення коронації Данила для формування європейського вектора розвитку української державності
- Деконструювати імперські міфи про "спільноруську єдність", використовуючи приклад Галицько-Волинської держави як самостійного
  центру Русі
