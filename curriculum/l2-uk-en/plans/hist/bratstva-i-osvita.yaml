objectives:
- Аналізувати роль та структуру православних братств як унікального явища українського громадянського суспільства XVI ст.
- Пояснювати історичний контекст Реформації та Контрреформації на українських землях та їхній вплив на освітні процеси
- Оцінювати значення Острозької академії та Острозької Біблії в контексті боротьби за збереження культурної ідентичності
- Критично порівнювати різні стратегії культурного опору на основі аналізу першоджерел
