content_outline:
- points:
  - 'Провокація: Якби вам довелося захищати свою культуру від потужного зовнішнього тиску, ви б обрали ізоляцію чи запозичили
    б зброю у супротивника, щоб стати сильнішими? Саме такий вибір стояв перед українською елітою XVI століття.'
  - 'Фрагмент цитати зі статуту Львівської братської школи (1586): «...якщо ж котрий у навчанні більше вмітиме, хоча б і убогий
    був, вище сидіти має, ніж багатий». Як цей принцип підривав станову систему Речі Посполитої?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Єзуїтська освіта vs. Братські школи. Чи була єзуїтська система «золотим стандартом», який православні могли
    лише невдало копіювати? Чи братства створили унікальну модель, що поєднувала європейську форму з українським православним
    змістом?'
  - 'Дебат 2: Демократія vs. Ієрархія всередині православного табору. Конфлікт між Львівським братством, що отримало право
    ставропігії (прямого підпорядкування патріарху), та місцевими єпископами. Хто мав контролювати церкву — миряни чи духовенство?'
  - '[!epistemic-humility] Оцінки ролі братств різняться: від ідеалізації їх як перших паростків громадянського суспільства
    до критики за надмірний консерватизм та конфліктність, що послаблювала церковну ієрархію.'
  - 'Глобальна синхронність: Поки в Україні засновували Острозьку академію (1576), в Іспанії будували Ескоріал, а в Англії
    Френсіс Дрейк готувався до навколосвітньої подорожі. Європа переживала добу релігійних воєн та наукових відкриттів.'
  section: 'Конфліктна карта: Боротьба за душі та уми'
  words: 900
- points:
  - 'Аналіз статутів Львівського та Луцького братств: структура, мета, соціальні функції (шпиталь, друкарня, школа, каса).
    Це статути громадської організації (NGO) чи парафіяльної громади?'
  - 'Читання уривків з «Порядку шкільного» (1586): аналіз педагогічних принципів. Що означав принцип рівності учнів для суспільства,
    поділеного на стани?'
  - 'Передмова Герасима Смотрицького до Острозької Біблії (1581): як у ній формулюється мета видання? Чому стандартизація
    сакрального тексту була питанням культурного виживання?'
  - 'Порівняльний аналіз: фрагмент з полемічного твору Івана Вишенського проти католицизму та фрагмент з листа князя Костянтина
    Острозького, де він закликає до діалогу. Дві різні стратегії опору.'
  - '[!decolonization] Острозька Біблія — перший повний друкований переклад Біблії церковнослов’янською мовою. Надрукована
    майже за століття до того, як у Московському царстві з''явилася подібна праця, і стала канонічною для всього православного
    Сходу Європи.'
  section: 'Джерела: Статути, передмови та полемічні трактати'
  words: 1600
- points:
  - 'Короткострокові наслідки: створення мережі шкіл, що уповільнили полонізацію та окатоличення еліти; поява освіченого прошарку
    (духовенство, міщани), здатного вести полеміку; виникнення книгодрукування як ідеологічної зброї.'
  - 'Довгострокові наслідки: братства та Острозька академія заклали фундамент для «Могилянського ренесансу» XVII ст. Випускники
    стали новою політичною та культурною елітою (гетьман Сагайдачний, вчений Мелетій Смотрицький).'
  - 'Вплив на українську мову: діяльність друкарень стандартизувала мову, а полемічна література відточувала її виражальні
    засоби.'
  - '[!myth-buster] Спростування міфу, ніби «громадянське суспільство» в Україні — це сучасний феномен. Братства XVI ст. були
    повноцінними інститутами громадянського суспільства, що контролювали владу (церковну) та реалізовували масштабні соціальні
    проєкти.'
  - 'Оцінки істориків: як Грушевський, Субтельний та Плохій оцінюють баланс між «західним» впливом та «національною» традицією
    в освітній реформі того часу?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: чи було запозичення єзуїтських освітніх моделей «зрадою» чи єдиним можливим шляхом для порятунку
    ідентичності? Формулювання студентом власної аргументованої позиції.'
  - 'Ширше питання: яку роль відіграє освіта в процесах деколонізації та збереження нації? Чи можна виграти «війну за незалежність»,
    програвши «війну за школи»?'
  - '[!anti-hagiography] Незважаючи на героїчну боротьбу, братський рух не зміг зупинити перехід значної частини еліти в католицизм,
    що призвело до укладення Берестейської унії. Це була успішна оборона чи славетна поразка?'
  - 'Зв''язок із сьогоденням: сучасні волонтерські рухи та громадські організації в Україні як спадкоємці братської традиції
    самоорганізації суспільства.'
  section: Дискусія та підсумок
  words: 700
