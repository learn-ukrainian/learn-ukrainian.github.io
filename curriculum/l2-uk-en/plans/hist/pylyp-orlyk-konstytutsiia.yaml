content_outline:
- points:
  - 'Провокація: Чи була Конституція Орлика лише символічним жестом гетьмана у вигнанні, чи реальним планом для держави? Де
    межа між політичною декларацією та дієвим законом?'
  - 'Історичний контекст: поразка під Полтавою, смерть Мазепи, обрання Пилипа Орлика гетьманом в еміграції у Бендерах 5 квітня
    1710 року.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Конституція — українська правова традиція чи фікція? Російська історіографія традиційно називає документ «нереалістичним»
    і «таким, що не мав сили». Українська — наголошує на тяглості правової думки від Русі до козацтва.'
  - 'Дебат 2: Оригінальна ідея чи європейський тренд? Дискусія про те, чи Орлик «випередив» Монтеск''є з ідеєю поділу влади,
    чи був частиною загальноєвропейського правового дискурсу, адаптуючи ідеї Локка та європейських ''pacta conventa''.'
  - '[!epistemic-humility] Документ ніколи не був повноцінно імплементований, тому оцінка його практичного впливу залишається
    полем для наукових суперечок, а не доконаних фактів.'
  - 'Глобальна синхронність: Конституція Орлика (1710) з''явилася в епоху Просвітництва, але до публікації «Духу законів»
    Монтеск''є (1748) та Конституцій США (1787) і Франції (1791).'
  section: 'Конфліктна карта: Український закон vs. Московське право'
  words: 900
- points:
  - 'Аналіз структури: «Пакти й Конституції прав і вольностей Війська Запорозького» складаються з преамбули, 16 статей та
    присяги гетьмана.'
  - 'Поділ влади: Законодавча (Генеральна Рада збирається тричі на рік), виконавча (обмежена влада гетьмана), судова (незалежний
    Генеральний Суд).'
  - 'Антикорупційні та соціальні норми: заборона гетьману привласнювати землі, захист козацьких вдів та сиріт, контроль над
    військовою скарбницею.'
  - '[!decolonization] Стаття 1: православна віра підпорядковується Константинопольському патріархату, не Московському. Стаття
    2: кордони України визначаються по річці Случ, як за часів Хмельницького — пряме заперечення московських претензій.'
  - 'Критика джерела: аналіз уривків з «Діаріуша» (щоденника) Орлика. Погляд на ті ж події з особистої, емоційної перспективи.
    Хто аудиторія щоденника, а хто — конституції?'
  section: 'Джерела: Текст Конституції та діаріуш Гетьмана'
  words: 1600
- points:
  - 'Спроба реалізації: військовий похід 1711 року на Правобережну Україну в союзі зі Швецією, Туреччиною та Кримським ханством.
    Початковий успіх і зрада татар, що призвела до поразки.'
  - 'Дипломатична боротьба: роки Орлика у вигнанні в Європі (Швеція, Франція, Османська імперія), де він намагався створити
    антимосковську коаліцію, апелюючи до європейських монархів.'
  - 'Правова спадщина: Конституція стала символом неперервності української державної традиції та аргументом у боротьбі з
    російським автократизмом.'
  - '[!myth-buster] Твердження, що українці — анархічна маса («мазепинство»), спростовується самим фактом створення настільки
    детального правового документа, що прагнув до порядку і справедливості, а не до хаосу.'
  - 'Оцінки істориків: порівняння поглядів Грушевського, Субтельного та Плохія на довгострокове значення Конституції Орлика
    як фундаменту українського конституціоналізму.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Конституція — це мрія чи документ? Студент формулює аргументовану відповідь, спираючись
    на матеріали модуля.'
  - 'Зв''язок із сьогоденням: Як ідеї Конституції 1710 року (суверенітет, європейський вибір, обмеження влади) резонують у
    сучасній Україні, що знову бореться за свою незалежність від Москви?'
  - '[!anti-hagiography] Поразка походу 1711 року демонструє небезпеку покладання на ненадійних союзників. Дипломатичні успіхи
    Орлика були обмежені, а його життя у вигнанні — трагічним. Це історія не тільки про тріумф ідей, але й про реальність
    політичних поразок.'
  section: Дискусія та підсумок
  words: 700
