content_outline:
- points:
  - 'Провокація: Холодний Яр — це стихійний селянський бунт проти грабунку чи остання армія УНР, що продовжувала воювати в
    підпіллі? Де проходить межа?'
  - 'Фрагмент без контексту: «Нам потрібний не мрійний пав''ячий хвіст, а вовчі зуби». Як ви гадаєте, що змусило автора написати
    ці слова?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська історіографія vs радянська пропаганда. Рух опору проти «куркульського бандитизму». Аналіз термінів:
    чому більшовики уникали слова «повстанці»?'
  - 'Дебат 2: Національний рух чи локальний спротив? Дискусія про те, чи була Холодноярська республіка повноцінною державною
    інституцією, чи лише високоорганізованою самообороною.'
  - '[!epistemic-humility] Більшість документів про повстання знищено ЧК. Історики змушені реконструювати події за спогадами
    та ворожими архівами, що створює «сліпі плями».'
  - 'Глобальна синхронність: Ірландська війна за незалежність (1919-1921). Порівняння тактик партизанської боротьби, ролі
    харизматичних лідерів та методів імперського придушення.'
  section: 'Конфліктна карта: Бандити чи герої?'
  words: 900
- points:
  - Аналіз книги «Холодний Яр» Юрія Горліса-Горського як первинного джерела. Хто такий автор — хроніст чи романіст? Розбір
    мови, описів побуту та психології повстанців.
  - 'Читання проти шерсті: більшовицькі доповідні про «бандитизм в Чигиринському повіті». [!decolonization] Що доповіді ЧК
    говорять про реальний масштаб руху, коли визнають, що «бандитизм неліквідований»?'
  - Текст повстанської відозви «До братів селян і козаків» (1919). Які цілі декларували повстанці? Проти кого і за що вони
    воювали згідно з власними документами?
  - 'Сліди на ландшафті: Мотронинський монастир, система ярів, реліктовий ліс. Як географія Холодного Яру стала військовою
    перевагою?'
  section: 'Джерела: «Холодний Яр» Горліса-Горського та документи ЧК'
  words: 1600
- points:
  - 'Причини повстання: крах УНР, політика «воєнного комунізму» та червоного терору як окупаційний інструмент, а не ідеологія.'
  - '[!myth-buster] Міф про «стихійний бунт». Розбір структури Холодноярської республіки: ієрархія (полки, сотні), адміністрація,
    суд, розвідка, зв''язок з УНР.'
  - 'Тактика та стратегія: рейди, засідки, тактика «бий і тікай». Чому 15-тисячне військо не могло перемогти, але не могло
    і бути переможеним протягом трьох років?'
  - 'Короткострокові наслідки: спецоперація ЧК «Заповіт» та трагедія в Лук''янівській в''язниці. Причини поразки руху.'
  - 'Довгострокові наслідки: тяглість традиції опору. Діти холодноярців в лавах УПА. Заборонена пам''ять як доказ її значущості.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює аргументовану відповідь — Холодний Яр був організованим рухом опору з державницькими
    цілями, а не хаотичним бунтом.'
  - '[!anti-hagiography] Попри весь героїзм, рух було жорстоко придушено. Які уроки можна винести з поразки Холодного Яру
    щодо партизанської боротьби без зовнішньої підтримки?'
  - 'Зв''язок із сьогоденням: відродження пам''яті після 1991 року, феномен роману Василя Шкляра «Чорний Ворон», почесна назва
    93-ї ОМБр ЗСУ «Холодний Яр». Чому гасла столітньої давнини стали актуальними сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Холодноярська республіка (1919-1922) як організований опір більшовицькій окупації, деконструкція радянських міфів про
  «бандитизм», спадщина руху в сучасній Україні.
level: HIST
module: hist-096
objectives:
- Описувати повстанський рух у Холодному Яру як організовану військову силу, а не стихійний бунт.
- Пояснювати причини, характер та соціальну базу повстання на тлі політики «воєнного комунізму».
- Критично аналізувати книгу «Холодний Яр» Юрія Горліса-Горського як первинне джерело, розрізняючи факти та літературну інтерпретацію.
- Деконструювати радянську пропаганду про «бандитизм», використовуючи документи обох сторін.
- Оцінювати значення Холодноярської республіки для національної пам'яті та її роль як символу в сучасній російсько-українській
  війні.
pedagogy: CBI
