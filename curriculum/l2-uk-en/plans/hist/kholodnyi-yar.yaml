module: hist-096
level: HIST
sequence: 96
slug: kholodnyi-yar
version: '2.0'
title: 'Холодний Яр: Останній опір'
subtitle: 'Kholodny Yar: The Last Resistance'
content_outline:
- section: 'Вступ: Республіка в лісах'
  points:
  - 'Холодний Яр: географія та символіка — ландшафт як природна фортеця (яри довжиною
    250 км, реліктовий ліс, підземні ходи); Мотронинський монастир як духовний і організаційний
    центр'
  - 'Селянське повстання чи національний рух? — відмінність від стихійного бунту:
    організована структура та підпорядкування УНР; держава в державі з адміністрацією
    та судом'
  - Чому Холодний Яр став легендою — гасло «Воля України або смерть!» на чорному прапорі;
    спадкоємність від гайдамаччини (Коліївщини 1768 року, освячення ножів)
- section: Витоки повстання
  points:
  - 'Контекст: поразка УНР — 1919-1920 роки, втрата централізованого контролю, перехід
    до партизанської боротьби; learner error: громадянська війна vs російсько-українська
    війна'
  - 'Більшовицька окупація та терор — політика «воєнного комунізму», продрозкладка
    (грабунок селян), звірства ЧК, наруга над церквою; learner error: комунізм = лише
    ідеологія (тут це окупаційний режим)'
  - 'Селяни беруть зброю — соціальна база: заможні селяни-власники, колишні солдати
    Першої світової, інтелігенція (вчителі) — рух середнього класу проти люмпенізації'
  - 'Формування повстанських загонів — роль братів Чучупаків (Василь — Головний отаман);
    перший загін охорони монастиря (1918, 22 особи на прохання ігумені); engagement
    hook: [!history-bite] про Мотронинський монастир як центр гайдамаччини'
- section: Повстанська республіка (1919-1922)
  points:
  - 'Організація та командири — Василь Чучупак (загинув 18 березня 1920), Чорний Ворон
    (Іван Чорновус/Микола Скляр); чітка ієрархія: полки, сотні, штаб інформаційного
    бюро; engagement hook: [!myth-buster] про організованість vs хаос'
  - Юрій Горліс-Горський та Юрій Тютюнник — Горліс-Горський як осавул і хроніст; роль
    Тютюнника у координації (Зимовий похід)
  - Бойові операції та тактика — рейди, засідки, тактика «бий і тікай», розвідка та
    підтримка місцевого населення (15 тисяч повстанців у пік розквіту)
  - «Зелена армія» та зв'язок з УНР — ідентифікація себе як частини регулярної армії
    УНР, а не анархістів чи «бандитів»; відозва «Брати селяни і козаки» (4 червня
    1919)
  - Придушення повстання — спецоперація ЧК «Заповіт» (29 вересня 1922, арешт отаманів
    у Звенигородці через фальшивий з'їзд); останній бій у Лук'янівській в'язниці (9
    лютого 1923)
- section: Первинні джерела
  points:
  - '«Холодний Яр» Юрія Горліса-Горського — «холодноярська біблія», жива мова діалогів,
    опис психології повстанців; include quote: «Нам потрібний не мрійний пав''ячий
    хвіст, а вовчі зуби»'
  - Спогади учасників — свідчення вцілілих (наприклад, Михайла Дорошенка); важливість
    усної історії та збереження пам'яті про «лісову державу»
  - 'Більшовицькі документи про «бандитизм» — доповідні ЧК про неможливість ліквідації
    руху («бандитизм неліквідований»); include quote: «Коли я впаду... мою кров вип''є
    рідна земля»'
- section: Деколонізаційний погляд
  points:
  - 'Радянський міф про «куркулів та бандитів» — конструювання образу ворога; підміна
    понять (національно-визвольний рух -> бандитизм); engagement hook: [!decolonization]
    про термінологію (бандити vs повстанці)'
  - 'Реальність: національно-визвольний рух — масова підтримка, державницька ідеологія,
    не класова боротьба (села повставали цілком проти окупації)'
  - 'Холодний Яр та УПА: паралелі — тяглість традиції опору; ті самі методи, ворог
    та ідея; діти холодноярців в УПА'
- section: 'Підсумок: Пам''ять та відродження'
  points:
  - Заборонена пам'ять за радянських часів — знищення могил, закриття монастиря, табу
    на тему; самвидав книги Горліса-Горського
  - Відродження після 1991 року — роман Василя Шкляра «Чорний Ворон» як культурний
    феномен; відновлення вшанувань та реабілітація отаманів
  - 'Холодний Яр як символ спротиву — 93-тя ОМБр «Холодний Яр» ЗСУ; сучасна війна
    як продовження боротьби 1920-х; engagement hook: [!culture] про 93-тю бригаду'
vocabulary_hints:
  required:
  - повстання (uprising) — збройне повстання, селянське повстання, вибухнуло повстання
  - повстанці (insurgents) — холодноярські повстанці, загони повстанців, армія повстанців
  - опір (resistance) — чинити опір, збройний опір, рух опору, останній опір
  - партизани (partisans) — партизанська війна, лісові партизани, партизанська тактика
  - командир (commander) — командир полку, талановитий командир, наказ командира
  - загін (detachment) — повстанський загін, озброєний загін, сформувати загін
  - окупація (occupation) — більшовицька окупація, режим окупації, боротьба з окупацією
  - придушення (suppression) — жорстоке придушення, придушення повстання, операція
    з придушення
  recommended:
  - засідка (ambush) — влаштувати засідку, потрапити в засідку, несподівана засідка
  - рейд (raid) — кінний рейд, бойовий рейд по тилах ворога, Зимовий похід
  - підпілля (underground) — піти в підпілля, діяти в підпіллі, українське підпілля
  - отаман (otaman/leader) — Головний отаман, виборний отаман, славетний отаман
  - терор (terror) — червоний терор, політика терору, жертви терору
  - легенда (legend) — жива легенда, легендарний отаман, народна легенда
  - гайдамаки (haidamaky) — нащадки гайдамаків, нові гайдамаки, полк гайдамаків
  - монастир (monastery) — Мотронинський монастир, оборона монастиря, стіни монастиря
  - яр (ravine) — система ярів, сховатися в яру, лісовий яр
  - чекісти (chekists) — агенти ЧК, бій з чекістами, підступність чекістів
