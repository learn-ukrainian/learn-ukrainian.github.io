objectives:
- Розуміти історичне значення 988 року як цивілізаційного вибору Київської Русі
- Аналізувати політичні, культурні та соціальні причини й наслідки запровадження християнства
- Критично оцінювати первинні джерела («Повість минулих літ», «Слово про Закон і Благодать»)
- Спростовувати російські імперські міфи про «спільну колиску» та «сакральний Корсунь»
