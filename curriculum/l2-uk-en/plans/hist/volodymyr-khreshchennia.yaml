content_outline:
- section: Розминка
  points:
  - 'Вступ до теми через контраст: Володимир-язичник (жорстокий воїн) vs Володимир-християнин (будівничий держави)'
  - 'Ключові слова: вибір (choice), віра (faith), цивілізація (civilization)'
  words: 700
- section: 'Читання: Князь Володимир: від язичника до святого'
  points:
  - Історичне тло — 980 рік, спроба язичницької реформи (Пантеон богів), криза старої ідеології
  - Хронологія вибору віри — легенда про «вибір віри» (посли до булгар, німців, греків); прагматизм відмови від ісламу та
    юдаїзму
  - Наслідки — вибір візантійського обряду як шлях до імперської величі («не знали, на небі ми чи на землі»)
  - 'Engagement hook: [!history-bite] — Про «гарем» Володимира (800 наложниць) і його радикальну трансформацію після хрещення'
  words: 700
- section: Корсунська кампанія і шлюб із Анною
  points:
  - Військова акція як дипломатія — допомога Василію II проти Варди Фоки (6000 варягів); облога Корсуня (Херсонеса) як тиск
  - Шлюб із Анною — принцеса-багрянородна (porphyrogenita); шлюб рівних, а не васалітет
  - Хрещення Володимира та його військо — легенда про зцілення від сліпоти в Корсуні; [!myth-buster] Хрещення не було «подарунком»
    Візантії, а вибороне силою
  words: 700
- section: Первинні джерела
  points:
  - 'Документ 1: «Повість минулих літ» про хрещення киян — 990 рік, річка Почайна, повалення ідолів (Перуна волочили конем)'
  - 'Документ 2: Митрополит Іларіон про Володимира — «Слово про Закон і Благодать»; [!quote] Іларіон називає Володимира «каганом»,
    підкреслюючи суверенність Русі'
  words: 700
- section: Деколонізаційний погляд
  points:
  - Міфи та реальність — [!decolonization] Спростування російського міфу про «спільну колиску»; Корсунь як частина історії
    України (Криму), а не «сакральне місце Росії»
  - Сучасна Україна — Тризуб Володимира на монетах (златники/срібники) як прообраз сучасного Герба України
  words: 700
- section: Значення хрещення для культури
  points:
  - Глибший аналіз рішення Володимира — входження до сім'ї європейських народів (Oecumene)
  - 'Процес християнізації — тривалий процес, опір волхвів, складна внутрішня політика; [!context] Сінхронізація: християнізація
    Скандинавії, Польщі, Угорщини в цей же час'
  - Церковна організація — створення Київської митрополії; Десятина як перший церковний податок
  - Вплив на суспільство — [!culture] Нова етика, зміна шлюбних традицій (моногамія), благодійність
  - Мистецтво і архітектура — Десятинна церква (996) — перший кам'яний храм; візантійські майстри
  - Писемність і література — кирилиця, школи для дітей знаті, початок книжкової культури
  - Міжнародне значення — Русь як суб'єкт міжнародного права; династичні шлюби нащадків
  words: 700
- section: Потрібно більше практики?
  points:
  - 🔄 Інтеграція знань
  - 🎯 Реальне застосування
  - 🌐 Онлайн-ресурси — віртуальні тури (Софія Київська, фундаменти Десятинної церкви)
  words: 800
vocabulary_hints:
  required:
  - хрещення (baptism) — хрещення Русі, прийняти хрещення
  - християнство (Christianity) — запровадження християнства, східний обряд
  - язичництво (paganism) — язичницькі боги, ідоли, кумири
  - Перун (Perun) — скинути Перуна, золоті вуса
  - ідол (idol) — повалення ідолів, дерев'яні ідоли
  - митрополія (metropolitanate) — Київська митрополія
  - церква (church) — Десятинна церква, будувати церкву
  - святий (saint) — Володимир Святий, канонізація
  - рівноапостольний (equal-to-apostles) — князь Володимир як рівноапостольний
  - Херсонес (Chersonesus) — облога Херсонеса (Корсуня)
  - Візантія (Byzantium) — союз з Візантією, візантійський вплив
  - віра (faith) — вибір віри, нова віра
  recommended:
  - Десятинна церква (Church of the Tithes) — 996 рік, перший кам'яний храм
  - Почайна (Pochayna river) — хрещення в Почайні
  - Корсунь (Korsun/Chersonesus) — взяття Корсуня
  - імператор (emperor) — візантійський імператор Василій II
  - цивілізаційний вибір (civilizational choice) — європейський вибір
  - каган (kagan) — титул володаря (згадка у Іларіона)
  - літопис (chronicle) — «Повість минулих літ»
