content_outline:
- points:
  - 'Провокація: Володимир — жорстокий язичник із 800 наложницями чи святий рівноапостольний князь? Чи може одна людина бути
    обома?'
  - 'Що важливіше для держави: військова сила чи єдина ідеологія?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Легенда про «вибір віри» з «Повісті минулих літ» (посли до булгар, німців, греків) як художній виклад vs прагматичний
    політичний розрахунок Володимира.'
  - 'Дебат 2: [!decolonization] Хрещення Русі — початок УКРАЇНСЬКОЇ державності та європейської ідентичності vs імперський
    міф про «спільну колиску» трьох народів.'
  - '[!epistemic-humility] Точна дата та обставини хрещення самого Володимира (Київ чи Корсунь) залишаються предметом наукових
    дискусій, джерела суперечливі.'
  - 'Глобальна синхронність: Християнізація Русі відбувалася одночасно з подібними процесами в Скандинавії, Польщі та Угорщині,
    що свідчить про загальноєвропейську тенденцію.'
  section: 'Конфліктна карта: Вибір віри — легенда vs прагматизм'
  words: 900
- points:
  - 'Аналіз «Повісті минулих літ»: повалення ідолів, хрещення киян у Почайні. Хто є автором? Якою була його мета? Чому Перуна
    «волочили конем»?'
  - 'Аналіз «Слова про Закон і Благодать» Іларіона: чому митрополит називає Володимира «каганом», підкреслюючи суверенність
    Русі, а не васалітет від Візантії?'
  - 'Військова акція як дипломатія: облога Корсуня (Херсонеса) як засіб тиску на Візантію для отримання шлюбу з принцесою
    Анною Порфірогенетою.'
  - '[!decolonization] Корсунський похід — це історія військового та дипломатичного успіху Русі, а не «духовного прозріння»
    під стінами візантійського міста. Корсунь — частина історії Криму та України.'
  section: 'Джерела: Корсунська кампанія та літописи'
  words: 1600
- points:
  - 'Культурні наслідки: поширення писемності (кирилиця), заснування шкіл, початок кам''яної архітектури (Десятинна церква),
    розвиток іконопису та літератури.'
  - 'Політичні наслідки: зміцнення князівської влади, централізація держави, входження до «сім''ї» європейських монархів через
    династичні шлюби.'
  - 'Соціальні наслідки: нова етика, утвердження моногамії, поява церковної благодійності та системи церковних податків (десятина).'
  - '[!myth-buster] Хрещення не було «подарунком» Візантії, а було виборене силою та дипломатією. Русь увійшла до християнського
    світу як рівноправний партнер, а не підлеглий васал.'
  - 'Оцінки істориків: порівняння поглядів Грушевського, Полонської-Василенко та Плохія на роль хрещення у формуванні української
    ідентичності.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Як одна людина — Володимир — змогла втілити такий радикальний перехід від язичництва до християнства?
    Це була особиста трансформація чи холодний політичний розрахунок?'
  - Чи був вибір візантійського православ'я безальтернативним для Русі? Які могли бути наслідки вибору католицтва чи ісламу?
  - '[!anti-hagiography] Попри канонізацію, християнізація Русі була тривалим і часто насильницьким процесом, що супроводжувався
    опором (повстання волхвів).'
  - 'Зв''язок із сьогоденням: Тризуб Володимира на його монетах (златниках і срібниках) є прообразом сучасного герба України,
    що символізує тисячолітню традицію державності.'
  section: Дискусія та підсумок
  words: 700
focus: The political and cultural reasons for the Christianization of Rus' in 988, analysis of primary sources (Povist' mynulykh
  lit, Slovo pro Zakon i Blahodat'), and decolonization of the event from Russian imperial narratives.
