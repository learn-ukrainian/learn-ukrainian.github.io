content_outline:
- points:
  - 'Провокація: Іван Сірко — безжальний воїн, геніальний тактик чи козак-чаклун? Як одна людина могла 15 разів стати лідером
    найбільш анархічної спільноти Європи?'
  - 'Фрагмент джерела без контексту: "Страшний він був орді, бо був досвідчений у військових справах і відважний кавалер,
    а до того ще й великий характерник..." (Літопис Самійла Величка). Що означає бути "характерником"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Сірко — "розбійник і зрадник" (імперська версія) vs прагматичний захисник автономії Січі (українська
    версія). Чи була його "мінливість" у підтримці гетьманів зрадою чи єдиним способом виживання?'
  - 'Дебат 2: [!myth-buster] "Характерництво" — реальна магія чи психологічна війна? Легенди про невразливість vs свідчення
    про геніальну розвідку та тактичну хитрість.'
  - '[!epistemic-humility] Джерела про участь Сірка в битві за Дюнкерк на боці Франції (1646) — популярний, але не доведений
    факт. Як такі легенди формують образ героя?'
  - 'Глобальна синхронність: Козацька Січ як "республіка піратів" у степу (1670-ті) vs Карибське "Берегове братство" — паралельні
    моделі військових демократій поза імперським контролем.'
  section: 'Конфліктна карта: Святий, грішник чи державний діяч?'
  words: 900
- points:
  - 'Літопис Самійла Величка: аналіз уривків, що героїзують Сірка. Як Величко конструює ідеальний образ козацького лідера,
    порівнюючи його з античними героями.'
  - '[!decolonization] "Лист запорожців турецькому султанові": розбір тексту як пам''ятки барокового гумору, а не реального
    дипломатичного документа. Спростування міфу про Сірка як єдиного автора.'
  - 'Архівні документи: відмова Сірка та Січі присягати московському царю 1654 року. Що цей акт говорить про політичну позицію
    Запорожжя?'
  - 'Археологічні дані: історія перепоховань Сірка та його черепа. Як пам''ять про героя стає об''єктом політичної боротьби
    в XX-XXI століттях.'
  section: 'Джерела: Листи, літописи та кістки'
  words: 1600
- points:
  - 'Тактика "активної оборони": аналіз походів на Крим та Османів. Це були грабіжницькі рейди чи превентивні удари для визволення
    бранців та ослаблення ворога?'
  - 'Політика балансування в добу Руїни: Сірко як "третя сила". Чому він підтримував то одного, то іншого гетьмана, і як це
    вплинуло на долю Гетьманщини?'
  - '[!myth-buster] Моральна дилема 1675 року: Сірко звільнив тисячі бранців, але жорстоко стратив тих, хто захотів повернутися
    до Криму. Аналіз цього вчинку як приклад логіки "меншого зла" в умовах війни.'
  - 'Створення "острова стабільності": як під керівництвом Сірка Січ стала тимчасовим прихистком і військовим центром на тлі
    тотального хаосу "війни всіх проти всіх".'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: то ким був Сірко — чаклуном, святим чи політиком? Студент формулює відповідь, спираючись на джерела
    та аргументи з модуля.'
  - '[!anti-hagiography] Чому національна пам''ять "відредагувала" образ Сірка, забувши про його жорстокість і політичні прорахунки,
    і залишивши лише героїчний міф?'
  - 'Зв''язок із сьогоденням: постать Сірка як архетип українського воїна — захисника, що покладається на хитрість та волю,
    а не на силу імперії. Які риси Сірка актуальні для сучасних українців?'
  section: Дискусія та підсумок
  words: 700
focus: 'Іван Сірко: міф про характерника, військова тактика, політика балансування в добу Руїни, деколонізація образу'
level: HIST
module: hist-061
objectives:
- Аналізувати роль Івана Сірка в контексті Руїни, відрізняючи історичні факти від міфологізації
- Оцінювати військову тактику Сірка в походах проти Османської імперії та Кримського ханства
- Деконструювати імперські наративи про Сірка та аналізувати його політику балансування як спробу збереження автономії
- Критично читати первинні джерела, такі як козацькі літописи та "Лист запорожців", розуміючи їхній контекст і мету
pedagogy: CBI
