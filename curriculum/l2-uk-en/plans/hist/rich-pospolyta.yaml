content_outline:
- points:
  - 'Провокація: Люблінська унія 1569 року — це «братнє об''єднання» проти Москви чи елегантне поглинання Русі Польщею? Чи
    могла бути інша альтернатива?'
  - '[!quote] «Де тепер дім Острозьких... де славні роди?» (Мелетій Смотрицький, «Тренос») — Як ви розумієте цей «плач»? Що
    втратила Русь?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Річ Посполита — «рай для шляхти, пекло для селян»? Польська історіографія акцентує на «золотих вольностях» та
    унікальній демократії. Українська — на колоніальній експлуатації та кріпацтві.'
  - 'Дебат 2: Полонізація еліт — це зрада чи вимушений прагматизм? Дискусія про відповідальність родів Вишневецьких та Острозьких,
    які прийняли католицизм заради кар''єри.'
  - '[!epistemic-humility] Ми не знаємо точних мотивів кожного шляхтича, що міняв віру. Чи це був тиск, чи щире переконання,
    чи кар''єризм? Джерела дають суперечливі свідчення.'
  - 'Глобальна синхронність: Поки в РП панувала «шляхетська демократія», в Західній Європі зміцнювався абсолютизм (Франція,
    Іспанія), а в Московії — самодержавство.'
  section: 'Конфліктна карта: Свобода шляхти vs. поневолення народу'
  words: 900
- points:
  - 'Правовий аналіз: Третій Литовський статут (1588) vs. польські коронні закони. Як юридично закріплювалося кріпацтво та
    обмежувалися права русинів?'
  - 'Полемічна література: Читання уривків з «Треносу» Мелетія Смотрицького та «Послання до єпископів» Івана Вишенського.
    Як вони аргументували проти унії та латинізації?'
  - 'Економічні документи: Інвентарі та описи фільварків. Аналіз панщини та повинностей селян. Як працювала економіка, заснована
    на експорті зерна та праці кріпаків?'
  - '[!decolonization] Читаємо привілеї польським шляхтичам на українські землі «крізь пальці». Це не просто надання власності,
    а інструмент колонізації та витіснення місцевої еліти.'
  section: 'Джерела: Свідчення епохи'
  words: 1600
- points:
  - 'Політичні наслідки: Втрата українською елітою своєї «політичної голови» та суб''єктності. Русь стала об''єктом, а не
    суб''єктом політики.'
  - 'Соціальні наслідки: Поглиблення прірви між полонізованою шляхтою та українським селянством. Українська культура маргіналізується
    як «мужицька».'
  - 'Релігійні наслідки: Берестейська унія (1596) як спроба компромісу, що призвела до ще глибшого розколу суспільства на
    православних та уніатів.'
  - '[!myth-buster] Міф про те, що польська культура була «просто вищою і привабливішою». Це була свідома державна політика
    культурного домінування, де мова та віра були інструментами лояльності.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Тож Люблінська унія — це прогрес чи трагедія для України? Сформулюйте відповідь, використовуючи
    аргументи з модуля.'
  - 'Причинно-наслідковий зв''язок: Як посилення кріпацтва та релігійний тиск напряму призвели до вибуху козацьких повстань?
    Чому козацтво стало «захисником православ''я»?'
  - '[!anti-hagiography] Уникаємо ідеалізації «старої України». Литовський період не був раєм, а польський — не був абсолютним
    пеклом. Це був складний час вибору еліт та виживання народу.'
  - 'Зв''язок із сьогоденням: «Травма втраченої еліти» — як вона впливає на сучасну українську політику та культуру? Дискусія
    про пошук національної ідентичності.'
  section: Дискусія та підсумок
  words: 700
focus: Consequences of the Union of Lublin, Polonization of the elite, serfdom, religious pressure, the role of the Commonwealth
  in shaping Ukrainian identity and the subsequent Cossack uprisings.
level: HIST
module: hist-032
objectives:
- Пояснювати довгострокові наслідки Люблінської унії для політичного, соціального та релігійного життя на українських землях
- Аналізувати процеси полонізації та кріпацтва як взаємопов'язані явища колоніальної політики Речі Посполитої
- Критично оцінювати різні історіографічні погляди на Річ Посполиту, розрізняючи наративи еліт та поневолених верств
- Формулювати аргументовану позицію щодо причинно-наслідкового зв'язку між політикою РП та майбутніми козацькими повстаннями
