content_outline:
- points:
  - 'Провокаційне питання: Коли насправді почалася окупація Криму? 27 лютого, коли «зелені чоловічки» захопили парламент?
    Чи значно раніше? Розгляньте російську медаль «За повернення Криму». Дати на ній: 20.02.2014 — 18.03.2014. 20 лютого Віктор
    Янукович все ще був у Києві. Що це говорить про «спонтанне волевиявлення народу»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Російський наратив про «відновлення історичної справедливості» та «захист російськомовних» vs. Українська та
    міжнародна позиція про заздалегідь сплановану військову операцію з порушенням усіх норм міжнародного права.'
  - 'Дебат 2: Ефективність міжнародної реакції. Чи були санкції 2014 року та Резолюція ГА ООН достатньою відповіддю? Чи, навпаки,
    слабка реакція Заходу заохотила Путіна до подальшої ескалації, що призвела до повномасштабного вторгнення 2022 року?'
  - '[!epistemic-humility] Оцінка рівня підтримки анексії серед місцевого населення є вкрай складною через відсутність вільних
    опитувань та потужний тиск пропаганди й окупаційних військ.'
  - 'Глобальна синхронність: Початок 2014 року. США та ЄС зосереджені на наслідках світової фінансової кризи та Арабської
    весни. У Сирії триває громадянська війна. Світ не був готовий до акту класичної імперської агресії в Європі.'
  section: 'Конфліктна карта: «Возз''єднання» чи збройна агресія?'
  words: 900
- points:
  - 'Документ 1: Будапештський меморандум (1994). Аналіз тексту та зобов''язань РФ поважати суверенітет та територіальну цілісність
    України в обмін на ядерне роззброєння. [!decolonization] Це доказ не «братерства», а договірних відносин, які Росія брутально
    порушила.'
  - 'Документ 2: Резолюція ГА ООН 68/262. Аналіз ключових положень, що підтверджують територіальну цілісність України та оголошують
    «референдум» недійсним.'
  - 'Свідчення 1: Історія Решата Аметова, першої жертви окупації, закатованого за одиночний пікет. Його викрадення та вбивство
    як символ долі тих, хто чинив опір.'
  - 'Свідчення 2: Хроніка ненасильницького спротиву. Мітинг кримських татар та українців 26 лютого. Блокування українських
    військових частин. Історія тральщика «Черкаси» — символ вірності присязі.'
  - 'Пропагандистське джерело: Аналіз промови Путіна 18 березня 2014 року. Розбір імперських та маніпулятивних тез про «сакральний
    Корсунь», «розділений народ» та «історичну справедливість».'
  section: 'Джерела: Хроніка злочину та голоси спротиву'
  words: 1600
- points:
  - '[!myth-buster] Міф 1: «Хрущов подарував Крим Україні». Спростування: передача була економічною та адміністративною необхідністю
    через руйнування після депортації та тісні господарські зв''язки з УРСР (вода, енергія, логістика).'
  - '[!myth-buster] Міф 2: «Крим — споконвічно російська земля». Спростування: російська присутність у Криму починається лише
    з 1783 року. До цього — тисячолітня історія інших народів, зокрема багатовікова історія корінного народу Криму, кримських
    татар та їхньої держави — Кримського ханства.'
  - 'Наслідки для Криму: мілітаризація півострова («непотопний авіаносець»), репресії проти незгодних, знищення української
    та кримськотатарської ідентичності, екологічні проблеми.'
  - 'Наслідки для України та світу: руйнування системи міжнародної безпеки, початок гібридної війни на Донбасі, окупація як
    прелюдія до повномасштабного вторгнення 2022 року.'
  section: 'Аналіз: Наслідки та розвінчання міфів'
  words: 1600
- points:
  - 'Повернення до розминки: Як докази, розглянуті в модулі (дата на медалі, текст резолюції ООН, свідчення очевидців), остаточно
    спростовують російську версію про «народне волевиявлення»?'
  - 'Питання для роздумів: Чому значна частина світу не сприйняла анексію Криму як початок великої війни у 2014 році? Які
    уроки Україна та світ мали винести з подій 2014 року?'
  - '[!anti-hagiography] Критична оцінка дій української влади та армії навесні 2014 року. Аналіз причин, чому не вдалося
    запобігти окупації: фактор несподіванки, вакуум влади, відсутність досвіду протидії гібридним загрозам.'
  - 'Зв''язок із сьогоденням: Анексія Криму — не ізольований акт, а ключовий епізод у довготривалій боротьбі України за незалежність.
    Чому деокупація Криму є необхідною умовою для сталого миру?'
  section: Дискусія та підсумок
  words: 700
