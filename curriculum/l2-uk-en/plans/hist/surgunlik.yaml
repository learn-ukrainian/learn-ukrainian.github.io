content_outline:
- points:
  - 'Провокація: Чому Сталін вирішив депортувати цілі народи? Чи була це кара за реальну «зраду», превентивний захід, чи інструмент
    для створення етнічно однорідних, лояльних територій?'
  - 'Фрагмент спогадів без контексту: «О третій годині ранку в наші двері постукали. Нам дали 15 хвилин на збори і сказали,
    що ми їдемо назавжди». Хто це говорить? Де і коли це відбувалося?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 [!decolonization]: Радянська пропаганда vs історичні факти. Міф про «народ-зрадник» і масовий колабораціонізм
    проти реальності: 17 тисяч кримських татар воювали у Червоній армії, включно з героями СРСР.'
  - 'Дебат 2: Геноцид чи «переселення»? Юридична та історична дискусія. Аналіз постанови Верховної Ради України (2015) та
    міжнародних резолюцій, що визнають Sürgünlik геноцидом, в порівнянні з російською позицією «відновлення історичної справедливості».'
  - '[!epistemic-humility] Чому точні цифри жертв (особливо в перші роки заслання) досі є предметом суперечок? Проблема радянської
    статистики, яка приховувала масштаби трагедії, і методики підрахунку (прямі та непрямі втрати).'
  - 'Глобальна синхронність: Депортація кримських татар як частина ширшої хвилі етнічних чисток в СРСР (чеченці, інгуші, калмики,
    німці Поволжя). Що спільного та відмінного в цих операціях?'
  section: 'Конфліктна карта: Злочин і виправдання'
  words: 900
- points:
  - 'Первинне джерело (документ): Постанова ДКО № 5859сс від 11 травня 1944 року. Аналіз формулювань: «зрадницькі дії», «запобігання
    подальшій зраді». Як бюрократична мова маскує акт геноциду.'
  - 'Первинне джерело (усна історія): Спогади очевидців (Усніє Чолпан, та ін.). «15 хвилин на збори», «телячі вагони», смерть
    у дорозі, викидання тіл померлих. Цитата: «Нам заборонялося все, окрім смерті».'
  - '[!decolonization] Механізм депортації як терор: раптовість, залучення 32 тис. співробітників НКВС, тотальний контроль.
    Читання сухих звітів НКВС про кількість ешелонів та «спецконтингенту» на тлі емоційних спогадів жертв.'
  - 'Первинне джерело (статистика): Дані Національного руху кримських татар про смертність — 46% народу загинуло в перші роки
    заслання. Демографічна катастрофа, прихована офіційною радянською статистикою.'
  section: 'Джерела: Наказ, свідчення, статистика'
  words: 1600
- points:
  - 'Короткострокові наслідки: Демографічна катастрофа, голод, хвороби. Режим спецпоселень: комендантська година, каторжна
    праця, кримінальна відповідальність за втечу.'
  - 'Довгострокові наслідки: Втрата землі, мови, культури. Цілеспрямована політика стирання ідентичності: зміна топоніміки
    Криму, русифікація, заселення півострова вихідцями з Росії.'
  - '[!myth-buster] Депортація стосувалася не лише татар. Аналіз депортацій греків (червень 1944), болгар, вірмен, та німців
    (серпень 1941) як доказ системної політики етнічних чисток, а не покарання за «колабораціонізм».'
  - 'Порівняльний аналіз: Як досвід депортації кримських татар співвідноситься з досвідом Голодомору? Спільне — намір знищити
    групу, використання голоду як зброї. Відмінне — метод (фізичне знищення на місці vs вигнання на повільну смерть).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює відповідь: Sürgünlik не був покаранням, а стратегічною метою радянського режиму
    зі зміни етнічної карти та знищення потенційного опору.'
  - 'Боротьба за повернення: Рух опору в засланні (петиції, демонстрації), роль Мустафи Джемілєва. Повернення на батьківщину
    після 1989 року як тріумф національної солідарності.'
  - 'Історія повторюється? «Гібридна депортація» після окупації Криму 2014 року: заборона Меджлісу, арешти активістів, тиск
    на кримськотатарську громаду, витіснення нелояльних.'
  - 'Ширше питання: Як пам''ять про геноцид формує сучасну ідентичність народу та його боротьбу за права?'
  section: Дискусія та підсумок
  words: 700
focus: Systemic analysis of Soviet ethnic cleansing policies 1941-1949, focusing on the 1944 deportation of Crimean Tatars
  (Sürgünlik) as an act of genocide, with comparisons to the deportations of Greeks, Germans, and others.
level: HIST
module: hist-111
objectives:
- Аналізувати Sürgünlik як системний акт геноциду, а не ізольовану подію, порівнюючи його з іншими радянськими етнічними чистками.
- Критично оцінювати первинні джерела, зіставляючи офіційні документи тоталітарного режиму (накази) зі свідченнями жертв (усна
  історія).
- Розвінчувати радянські та сучасні російські міфи про «народ-зрадник», використовуючи конкретні історичні факти та статистику.
- Формулювати аргументовану позицію щодо зв'язку між історичною трагедією Sürgünlik та сучасною боротьбою кримськотатарського
  народу за свої права в умовах окупації.
pedagogy: CBI
