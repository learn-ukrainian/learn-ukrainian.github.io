vocabulary_hints:
- definition: примусове, насильницьке виселення особи, групи осіб чи цілого народу з місця постійного проживання за наказом
    держави.
  pos: ж.
  word: депортація
- definition: дії, що вчиняються з наміром знищити, повністю або частково, будь-яку національну, етнічну, расову чи релігійну
    групу.
  pos: ч.
  word: геноцид
- definition: примусове перебування за межами батьківщини або постійного місця проживання як міра покарання чи політичного
    переслідування.
  pos: с.
  word: заслання
- definition: кримськотатарська назва депортації 1944 року, що перекладається як «вигнання»; ключовий термін для позначення
    цієї національної трагедії.
  pos: ч.
  word: Sürgünlik
- definition: місце примусового проживання депортованих осіб в СРСР під наглядом комендатури, що обмежувало свободу пересування
    та вибору праці.
  pos: с.
  word: спецпоселення
- definition: принцип, за яким відповідальність за дії окремих осіб неправомірно покладається на цілу соціальну, етнічну чи
    національну групу.
  pos: ж.
  word: колективна провина
- definition: офіційне відновлення в правах та репутації особи чи народу, що зазнав несправедливого звинувачення чи репресій.
  pos: ж.
  word: реабілітація
- definition: цілеспрямована політика, спрямована на насильницьке вигнання або знищення певної етнічної групи з даної території
    для досягнення етнічної однорідності.
  pos: ж.
  word: етнічна чистка
- definition: представницький орган кримськотатарського народу, що виражає його інтереси; заборонений окупаційною владою в
    Криму.
  pos: ч.
  word: Меджліс
- definition: народ, який історично сформувався на певній території, має глибокий культурний і соціальний зв'язок з нею і
    є її автохтонним населенням.
  pos: ч.
  word: корінний народ
