content_outline:
- points:
  - 'Провокація: Дві імперії, одна нація. Як українцям вдалося не лише вижити, а й сформувати модерну ідентичність під тиском
    Відня та Петербурга? Чи справді Австрія була «тюрмою народів», а Росія — «старшим братом»?'
  - Що спільного між забороною друкувати ноти до українських пісень та перетворенням України на «цукрову імперію»? Пошук зв’язку
    між культурним та економічним гнітом.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Російський імперський наратив («возз''єднання», «триєдиний народ», «цивілізаційна місія») vs українська реальність
    (внутрішній колоніалізм, лінгвоцид, експлуатація ресурсів).'
  - 'Дебат 2: Австрійський «П''ємонт» — «золота клітка» чи реальне вікно можливостей? Дискусія між Франком (критика федералізму)
    та прихильниками «органічної праці».'
  - '[!epistemic-humility] Оцінка Галичини як «П''ємонту» є ретроспективною. Сучасники (напр. Драгоманов) часто критикували
    галицьку законсервованість та провінційність.'
  - 'Глобальна синхронність: «Весна народів» 1848 року в Європі як каталізатор національного пробудження в Галичині, тоді
    як в Російській імперії — посилення реакції.'
  section: 'Конфліктна карта: Модернізація чи колонізація?'
  words: 900
- points:
  - 'Аналіз Валуєвського циркуляру (1863) та Емського указу (1876): не просто заборона, а спроба стерти саму ідею існування
    окремої мови та народу. Читання уривків, аналіз формулювань («не было, нет и быть не может»).'
  - 'Бюрократична мова імперії: читання звітів цензорів та доносів. Як страх перед «сепаратизмом» доходив до абсурду (заборона
    нот, театральних вистав).'
  - '[!decolonization] Читання імперських джерел «проти шерсті»: що доповідні записки жандармів говорять про реальний масштаб
    та ефективність українського руху?'
  - 'Контр-джерело: Політична поезія Шевченка («І мертвим, і живим...») як пряма відповідь на імперську ідеологію «малоросійства».'
  section: 'Джерела: Тексти заборон і мова опору'
  words: 1600
- points:
  - 'Економічні наслідки: перетворення України на сировинний придаток (вугілля Донбасу, цукор, зерно). Як це гальмувало розвиток
    та консервувало бідність.'
  - 'Соціальні наслідки: формування «малоросійської» ідентичності в частини еліт, асиміляція. Приклад Гоголя vs приклад Шевченка
    як дві моделі поведінки.'
  - '[!myth-buster] Міф про «відстале селянство» та «неполітичну інтелігенцію». Реальність: масовий рух «Просвіт», діяльність
    «Громад», створення перших політичних партій (РУРП, РУП) — свідчення глибокого політичного осмислення.'
  - '«Алмаз під тиском»: як репресії парадоксально прискорили консолідацію національного руху, змусивши його перейти від культурництва
    до політичної боротьби.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож як українцям вдалося вистояти? Студент формулює відповідь, спираючись на ідеї «П''ємонту»,
    культурного спротиву та зовнішніх факторів.'
  - '[!anti-hagiography] Уникаючи «золотої легенди» про Галичину, варто визнати, що саме вона зберегла тяглість політичної
    та культурної традиції, коли в Наддніпрянщині її було майже знищено.'
  - 'Зв''язок із сьогоденням: як сучасна російська пропаганда використовує та перебріхує наративи імперської доби (терміни
    «Новоросія», міф про «один народ»)?'
  - 'Чому 1917 рік не виник на порожньому місці: імперська доба, попри все, створила передумови для революції — сформувала
    політичну еліту, мережу організацій та чітке усвідомлення національних інтересів.'
  section: Дискусія та підсумок
  words: 700
focus: Порівняння російської та австро-угорської імперських політик в Україні; механізми колоніального панування (русифікація,
  економічна експлуатація) та форми національного спротиву (Шевченко, Громади, Галичина як «П'ємонт»), що заклали підвалини
  для революції 1917 року.
