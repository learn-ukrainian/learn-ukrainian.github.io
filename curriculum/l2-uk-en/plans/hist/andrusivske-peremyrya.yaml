slug: andrusivske-peremyrya
version: '2.0'
title: 'Андрусівське перемир''я: Поділ України'
subtitle: 'The Truce of Andrusovo: The Partition of Ukraine'
content_outline:
- section: 'Вступ: Ніч дипломатії в Андрусові'
  points:
  - The exhaustion of Poland and Muscovy by 1667 — Poland's 'Rokosz Lubomirskiego'
    and Muscovy's Copper Riot created mutual desperation
  - The secret negotiations without Ukrainian representatives — [!context] Cossack
    envoys were physically barred from the meeting hall, highlighting the 'separate
    peace' nature
- section: 'Архітектор поділу: Афанасій Ордин-Нащокін'
  points:
  - The figure of the Muscovite diplomat — [!history-bite] Known as 'father of Russian
    diplomacy' but for Ukraine he was the 'architect of the split'
  - 'Strategy: divide and rule — Convinced Poles that ''unruly Cossacks'' were a mutual
    threat to be tamed jointly'
  - Use of gifts and bribes — Corruption of Polish commissioners to secure favorable
    terms
- section: 'Умови договору: Геополітична ампутація'
  points:
  - The border along the Dnipro river — Left Bank + Sivershchyna + Smolensk to Moscow;
    Right Bank + Belarus to Poland
  - The fate of Kyiv ('rule of two years') — Formally leased until 1669, but became
    a permanent occupation (broken promise)
  - The status of Zaporizhzhia (condominium) — Joint Polish-Muscovite control to use
    Cossacks against Tatars; [!decolonization] 'Little Russian Ukraine' treated as
    object, not subject
- section: 'Реакція України: Шок і гнів'
  points:
  - Reaction of Doroshenko and Briukhovetsky — Jan 1668 councils in Chyhyryn and Hadiach
    rejected both monarchs; Doroshenko wrote 'we cannot trust...'
  - 'The murder of Briukhovetsky by the mob — June 1668 at Opishnya: torn apart by
    Cossacks for his ''Moscow policy'''
  - The feeling of betrayal by both 'protectors' — [!quote] Samovydets chronicle describes
    Cossacks 'beating their hats on the ground' in despair
- section: 'Соціальні наслідки: Життя на розломі'
  points:
  - Economic collapse and disruption of trade — Dnipro transformed from a trade artery
    into a 'border of enmity'
  - Forced migrations ('The Great Drive') — Start of Right Bank depopulation; appearance
    of the term «тогобочні» (people from the other side)
  - Religious intolerance on both banks — Catholic expansion on Right Bank vs. Muscovite
    absorption of Kyiv Metropoly on Left Bank
- section: Чому світ промовчав?
  points:
  - The international context (wars in Europe) — [!context] Louis XIV's War of Devolution
    (1667-68) and Anglo-Dutch wars distracted the West
  - Why a weak Ukraine was beneficial to neighbors — A divided buffer state was easier
    to manipulate than a strong Cossack Hetmanate
- section: 'Первинні джерела: Текст договору'
  points:
  - Analysis of the articles of the truce — Article 3 specifically excludes Cossacks
    from protection; use of term «свавільні» (unruly) to delegitimize them
- section: Деколонізаційний погляд
  points:
  - Debunking the myth of 'stabilization' — [!myth-buster] 1654 'reunification' myth
    exploded by 1667 betrayal; Moscow willingly returned 'reunited' lands to Poland
  - Andrusovo as a crime against statehood — An international conspiracy of two empires
    to dismember a third nation; triggered the 'Ruin'
vocabulary_hints:
  required:
  - перемир'я (truce) — often framed by Ukrainians as «Андрусівська змова» (Andrusovo
    Conspiracy)
  - демаркація (demarcation) — establishing the Dnipro border
  - кондомініум (condominium) — joint control over Zaporizhzhia
  - розкол (split/schism) — political and social division of the Hetmanate
  - сепаратний (separate) — сепаратний мир (separate peace) concluded behind ally's
    back
  - статус-кво (status quo) — attempt to freeze the conflict
  - депортація (deportation) — forced movement of populations
  - біженці (refugees) — fleeing the 'Ruin'
  - змова (conspiracy) — secret agreement against Ukraine
  - руйнація (ruin/destruction) — the period triggered by this treaty
  recommended:
  - тогобочні (those from the other side) — [!culture] term for Ukrainians across
    the river
  - свавільні (unruly/arbitrary) — imperial label for Cossacks in the treaty
  - ампутація (amputation) — metaphor for the territorial loss
