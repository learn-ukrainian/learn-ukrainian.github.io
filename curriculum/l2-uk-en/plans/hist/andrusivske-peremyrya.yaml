objectives:
- Аналізувати умови Андрусівського перемир''я та його руйнівні наслідки для української державності
- Пояснювати позиції та мотиви ключових сторін — Московії, Речі Посполитої та Гетьманщини
- Критично оцінювати імперські наративи про «стабілізацію» та протиставляти їм український деколонізаційний погляд
- Розпізнавати та застосовувати дипломатичну та історичну лексику для обговорення складних міжнародних угод
