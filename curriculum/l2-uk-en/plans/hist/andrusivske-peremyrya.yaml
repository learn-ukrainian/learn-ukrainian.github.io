content_outline:
- points:
  - 'Провокація: Чому українських послів не пустили до зали, де два «захисники» ділили їхню країну? Чи міг один дипломат «розрубати»
    Гетьманщину навпіл?'
  - '[!context] 1667 рік: Річ Посполита виснажена «рокошем Любомирського», Московія — «Мідним бунтом». Обом імперіям потрібен
    був перепочинок за будь-яку ціну.'
  - 'Фрагмент з літопису Самовидця: «...а козаків у той покій не пускали, кажучи, що государі ваші без вас про вас домовились».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Московська vs. українська історіографія. Андрусово — це «необхідне перемир''я для стабілізації кордонів» чи
    «цинічна змова двох імперій з метою ліквідації української державності»?'
  - 'Дебат 2: Роль Афанасія Ордіна-Нащокіна. Геніальний дипломат, що врятував Московію, чи архітектор поділу, який свідомо
    грав на розкол, переконуючи поляків, що «свавільні козаки» — спільна загроза?'
  - '[!epistemic-humility] Точні мотиви Ордіна-Нащокіна — предмет дискусій. Чи вірив він у можливість асимілювати Лівобережжя,
    чи лише прагнув тимчасової переваги над Польщею?'
  - 'Глобальна синхронність: Війна за деволюцію Людовіка XIV (1667-68) та англо-голландські війни відволікали увагу Західної
    Європи, дозволяючи Московії та Польщі діяти безкарно.'
  section: 'Конфліктна карта: «Стабілізація» чи «державний злочин»?'
  words: 900
- points:
  - 'Первинний документ: Стаття 3 договору прямо виключає козаків із-під захисту та легалізує спільні каральні акції проти
    них, використовуючи термін «свавільні» для їх делегітимізації.'
  - 'Географічний вирок: Кордон по Дніпру. Лівобережжя, Сіверщина, Смоленськ — до Москви. Правобережжя, Білорусь — до Польщі.
    Гетьманщина розрізана навпіл.'
  - 'Доля Києва: «Оренда на два роки». Формально до 1669 року, але ця тимчасова норма перетворилася на постійну окупацію —
    класичний приклад порушеної обіцянки.'
  - '[!decolonization] Статус Запоріжжя як «кондомініуму». Спільний польсько-московський контроль над Січчю для використання
    козаків проти татар. «Малоросійська Україна» — об''єкт, а не суб''єкт міжнародного права.'
  section: 'Джерела: Аналіз статей Андрусівської змови'
  words: 1600
- points:
  - 'Політичний шок: Реакція Дорошенка та Брюховецького. Ради в Чигирині та Гадячі відкинули договір. Дорошенко: «Ми не можемо
    довіряти жодному монарху».'
  - 'Народний гнів: Убивство Брюховецького натовпом у червні 1668 року за його промосковську політику. Літопис Самовидця описує
    відчай козаків, що «били шапками об землю».'
  - 'Соціальна катастрофа: «Великий згін» — початок масових міграцій з спустошеного Правобережжя. Дніпро перетворюється з
    торговельної артерії на «кордон ворожнечі». З''являється термін «тогобочні».'
  - '[!myth-buster] Руйнація міфу про «стабілізацію» та «возз''єднання». У 1654 році Москва обіцяла захист, а в 1667 — охоче
    повернула половину «возз''єднаних» земель полякам, довівши, що її цікавить територія, а не люди.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чому Україну розділили без її участі? Студент формулює відповідь, використовуючи поняття «сепаратний
    мир», «сфери впливу» та «вичерпання сторін».'
  - 'Ширше питання: Чи може слабка держава довіряти «гарантіям безпеки» від сильніших сусідів? Андрусів як історичний прецедент.'
  - '[!anti-hagiography] Договір став наслідком не лише зовнішньої змови, а й внутрішньої боротьби за владу в Гетьманщині,
    яка ослабила козацьку державу зсередини.'
  - 'Зв''язок із сьогоденням: Як уроки Андрусова застосовні до сучасних дискусій про нейтралітет, позаблоковий статус та міжнародні
    переговори, де долю України вирішують без України?'
  section: Дискусія та підсумок
  words: 700
