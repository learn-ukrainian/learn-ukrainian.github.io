content_outline:
- points:
  - 'Провокація: Чому провідні світові розвідки давали Києву 72 години, а він не тільки вистояв, а й переміг у битві за столицю?
    Що вони не врахували?'
  - 'Фрагмент звернення: «...слухайте мене уважно. Ми всі на місці. І ми всі працюємо». Хто і за яких обставин сказав ці слова,
    що змінили хід інформаційної війни?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Спецоперація» vs. війна на існування. Російський наратив про «денацифікацію» та «демілітаризацію» проти українського
    розуміння війни як геноцидальної, неоколоніальної агресії.'
  - 'Дебат 2: Чому провалився наступ на Київ? Дискусія військових аналітиків: фатальна недооцінка українського спротиву та
    боєздатності ЗСУ vs. системні вади російської армії (логістика, корупція, відсутність мотивації).'
  - '[!epistemic-humility] Визнання, що повна картина причин російської поразки під Києвом все ще формується на основі аналізу
    трофейних документів, свідчень полонених та розвідданих.'
  - 'Глобальна синхронність: поки під Києвом горіли російські танки, у Версалі та Брюсселі відбувались екстрені саміти ЄС
    та НАТО, що заклали основу для безпрецедентних санкцій та військової допомоги.'
  section: 'Конфліктна карта: Провал бліцкригу'
  words: 900
- points:
  - 'Офіційні документи: аналіз звернення президента Зеленського «Я тут» (25.02) як ключового акту лідерства та спротиву.
    Перші зведення Генштабу ЗСУ.'
  - 'Свідчення очевидців: хроніки життя в окупації мешканців Бучі, Ірпеня, Гостомеля. Роль волонтерів та територіальної оборони.'
  - 'Технічні дані: аналіз супутникових знімків Maxar, що показували 64-кілометрову колону російської техніки, та даних OSINT-спільнот,
    що відстежували її пересування та знищення.'
  - '[!decolonization] Читання «проти шерсті»: аналіз статті «Наступление России и нового мира», яку РИА Новости помилково
    опублікували 26 лютого, як джерела для розуміння справжніх імперських цілей Кремля.'
  section: 'Джерела: Свідчення перших днів'
  words: 1600
- points:
  - 'Причини та наслідки: як тактичні рішення (підрив мостів, оборона аеропортів) та ефективне використання західних ПТРК
    (NLAW, Javelin) призвели до стратегічної поразки РФ на північному напрямку.'
  - 'Воєнні злочини як система: Бучанська трагедія — не випадковість, а свідома політика терору проти цивільного населення,
    задокументована міжнародними спостерігачами.'
  - '[!myth-buster] Руйнування міфу про «другу армію світу». Провал бліцкригу продемонстрував нездатність РФ вести сучасну
    війну проти мотивованого супротивника.'
  - 'Наслідки для України: утвердження національної єдності, зміцнення державної суб''єктності, безпрецедентна консолідація
    суспільства навколо армії та політичного керівництва.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: студент формулює комплексну відповідь на питання, чому Київ вистояв, використовуючи дані з усіх
    секцій.'
  - 'Зв''язок із сьогоденням: як перемога в битві за Київ вплинула на подальший хід війни? Чи стала вона запорукою майбутніх
    контрнаступів та міжнародної підтримки?'
  - '[!anti-hagiography] Ціна перемоги: визнання не лише героїзму, але й трагедії, руйнувань та жертв серед цивільного населення
    як наслідку оборонних дій (напр., підрив мостів, затоплення сіл).'
  section: Дискусія та підсумок
  words: 700
focus: Початок повномасштабного вторгнення 24 лютого 2022, провал російського бліцкригу "Київ за три дні", оборона столиці,
  та звільнення Київщини.
level: HIST
