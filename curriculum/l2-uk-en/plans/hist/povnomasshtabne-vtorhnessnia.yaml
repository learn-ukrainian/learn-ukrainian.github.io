objectives:
- Аналізувати причини та перебіг початкової фази повномасштабного вторгнення Росії.
- Оцінювати ключові фактори, що призвели до провалу російського бліцкригу та перемоги в Битві за Київ.
- Критично розрізняти українські та російські наративи про війну, ідентифікуючи елементи пропаганди та дезінформації.
- Пояснювати значення Битви за Київ для утвердження української суб'єктності на міжнародній арені та подальшого перебігу війни.
