content_outline:
- points:
  - 'Провокація: За два дні, 29-30 вересня 1941 року, у Києві було вбито 33 771 єврея. Як таке стало можливим у європейській
    столиці? І чому світ про це мовчав десятиліттями?'
  - 'Фрагмент первинного джерела без контексту: "Усі жиди міста Києва і його околиць повинні з''явитися в понеділок 29 вересня
    1941 року до 8 години ранку на ріг Мельникової і Дегтярівської вулиць..." Що ви відчуваєте, читаючи цей наказ?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була трагедія Бабиного Яру виключно єврейською? Радянська версія ("знищення мирних радянських громадян")
    vs сучасна українська історіографія (центральність Голокосту).'
  - 'Дебат 2: Роль місцевого населення. Міф про "тотальну колаборацію" vs реальність Праведників народів світу, які ризикували
    життям. Де проходить межа між вимушеною співпрацею, байдужістю та активним порятунком?'
  - '[!epistemic-humility] Точну кількість колаборантів та рятівників встановити неможливо. Історики оперують задокументованими
    випадками, але тисячі історій залишаються невідомими.'
  - 'Глобальна синхронність: "Голокост від куль" в Україні (публічні розстріли) vs промислове знищення у газових камерах у
    Польщі та Німеччині (Аушвіц, Треблінка). Чому методи вбивства відрізнялися?'
  section: 'Конфліктна карта: Злочинці, жертви, свідки?'
  words: 900
- points:
  - '[!decolonization] Аналіз нацистського звіту: "Sonderkommando 4a... стратило 33 771 єврея 29 та 30 вересня". Читаємо бюрократичну
    мову геноциду "проти шерсті" — дегуманізація як інструмент злочину.'
  - 'Технологія вбивства: хронологія подій від наказу до розстрілу. "Коридори" з поліцаїв, роздягання, побиття, групи по 10
    осіб над яром.'
  - 'Свідчення вцілілої: уривок зі спогадів Діни Проничевої. Момент падіння в яр до пострілу — психологічний стан жертви,
    фізичні відчуття.'
  - 'Роль пособників: хто оточував яр? Зондеркоманда 4а (Пауль Блобель) як виконавці, українська допоміжна поліція як оточення
    та конвой. Розмежування відповідальності.'
  section: 'Джерела: Дорога смерті'
  words: 1600
- points:
  - 'Специфіка Голокосту в Україні: це не лише Бабин Яр. Інші місця масових розстрілів: Дробицький Яр (Харків), Богданівка
    (Миколаївщина), Кам''янець-Подільський.'
  - 'Праведники народів світу: понад 2600 українців, які рятували євреїв. [!myth-buster] Це руйнує радянський та російський
    міф про "суцільних націоналістів-антисемітів".'
  - 'Приклад порятунку: діяльність митрополита Андрея Шептицького та греко-католицької церкви, які переховували сотні єврейських
    дітей, зокрема Курта Левіна.'
  - 'Політика пам''яті: радянське замовчування (пам''ятники "радянським громадянам"), Куренівська трагедія 1961 як "помста"
    яру, та складні дебати про меморіалізацію в незалежній Україні.'
  - '[!context] Концепція "Кривавих земель" Тімоті Снайдера: Україна як епіцентр подвійного терору — нацистського та сталінського,
    що створило унікально трагічні умови.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, як таке стало можливим? Сформулюйте відповідь, використовуючи поняття ідеології, бюрократії,
    колаборації та терору.'
  - 'Зв''язок із сьогоденням: Чому Росія у 2022 році завдала ракетного удару поблизу меморіалу в Бабиному Яру? Як сучасна
    війна впливає на пам''ять про Другу світову?'
  - '[!anti-hagiography] Уникнення чорно-білих оцінок. Історія Бабиного Яру — це не лише про нацистських злочинців, а й про
    складний вибір звичайних людей, про героїзм небагатьох і мовчання багатьох.'
  - 'Ширше питання: Які уроки Україна та світ мають винести з Бабиного Яру, щоб запобігти геноцидам у майбутньому?'
  section: Дискусія та підсумок
  words: 700
focus: Бабин Яр, Голокост від куль в Україні, роль місцевого населення (колаборація та порятунок), та радянська політика замовчування
  трагедії
level: HIST
module: hist-106
objectives:
- Описувати хронологію та ключові події "Голокосту від куль" в Україні, зокрема трагедію Бабиного Яру.
- Аналізувати різні типи історичних джерел (нацистські звіти, свідчення вцілілих, радянські документи), розрізняючи їхню мету
  та упередженість.
- Оцінювати складну роль місцевого населення під час Голокосту, розрізняючи явища колабораціонізму, байдужості та порятунку
  (Праведники народів світу).
- Пояснювати радянську політику замовчування та деформації пам'яті про Голокост та аналізувати сучасні виклики меморіалізації.
pedagogy: CBI
