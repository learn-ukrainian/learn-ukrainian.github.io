objectives:
- Пояснювати зміст та еволюцію чотирьох Універсалів, розуміючи причини переходу від автономії до незалежності
- Аналізувати ключові політичні рішення та виклики, що стояли перед Центральною Радою (війна, соціальні реформи, Брест-Литовський
  мир)
- Критично оцінювати радянські міфи про УНР та формулювати аргументи на основі історичних джерел
- Оцінювати роль ключових діячів (Грушевський, Винниченко) та визначати спадщину УНР для сучасної України
