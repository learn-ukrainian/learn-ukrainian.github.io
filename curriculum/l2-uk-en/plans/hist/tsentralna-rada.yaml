content_outline:
- points:
  - 'Провокація: Березень 1917. Імперія впала. У вас є шанс збудувати державу. Що ви оберете: негайну, ризиковану незалежність
    чи обережну автономію в надії на демократичну федерацію? Це не теорія — це реальний вибір, що стояв перед Центральною
    Радою.'
  - 'Фрагмент документу: «Однині самі будемо творити наше життя». Звідки ця цитата і що вона означала насправді?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Українська революція vs «події в південно-західному краї імперії». Радянський наратив зображував
    УЦР як «буржуазних націоналістів», відірваних від народу. Історичні факти свідчать про легітимний, обраний на Всеукраїнському
    національному конгресі орган, що представляв широкі верстви населення.'
  - 'Дебат 2: Автономісти vs Самостійники. Чому УЦР так довго трималася за ідею федерації з Росією, викликаючи гнів самостійників
    (як-от Міхновський)? Стратегічний розрахунок, брак військової сили чи ідеологічна віра в можливість демократичної Росії?'
  - '[!epistemic-humility] Легко судити через 100 років. Ми проаналізуємо аргументи обох сторін, щоб зрозуміти їхню логіку
    в умовах тотальної невизначеності.'
  - 'Глобальна синхронність: Крах імперій (Російської, Австро-Угорської, Османської) та парад суверенітетів (Польща, Фінляндія,
    країни Балтії). Українська революція — частина глобального тренду, не локальний феномен.'
  section: 'Конфліктна карта: Мрійники проти прагматиків'
  words: 900
- points:
  - '[!decolonization] Тексти Універсалів (авторства переважно Винниченка) — не сухі закони, а емоційні, публіцистичні звернення
    до нації. Аналізуємо їхню мову, щоб зрозуміти, як творилася нова політична реальність.'
  - 'І Універсал: «Хай буде Україна вільною». Аналіз риторики — декларація права, а не прохання. Створення Генерального Секретаріату.'
  - 'ІІ Універсал: Мова компромісу. «Не одділяючись від всієї Росії...». Чому цей крок назад був необхідний і як він розколов
    український рух?'
  - 'ІІІ Універсал: Реакція на більшовицький переворот. Проголошення УНР, але ще «у федеративному зв''язку». Аналіз соціальних
    реформ: 8-годинний робочий день, «соціалізація землі».'
  - 'IV Універсал: «Однині УНР стає самостійною...» Вимушений крок під тиском прямої військової агресії Раднаркому. Аналіз
    тону — від надії до рішучості.'
  - '[!biography] Грушевський як голова і символ нації. Його промови як джерело для розуміння ідеології УЦР.'
  section: 'Джерела: Чотири Універсали як політичні маніфести'
  words: 1600
- points:
  - 'Причина-наслідок: Лютнева революція → створення УЦР. Більшовицький переворот → ІІІ Універсал. Агресія Муравйова → IV
    Універсал та Брест-Литовський мир.'
  - 'Брест-Литовський мирний договір: зрада чи порятунок? Аналіз угоди з Центральними державами як єдиного способу отримати
    міжнародне визнання та військову допомогу проти більшовиків.'
  - '[!myth-buster] Міф про «німецьких маріонеток». УЦР звернулася по допомогу, щоб захистити проголошену незалежність від
    російського вторгнення, а не була створена німцями.'
  - '[!myth-buster] Міф про «слабкість» та «недієздатність». За 13 місяців в умовах війни та хаосу УЦР створила атрибути державності:
    закони, гроші (гривня), армію, міжнародні відносини, затвердила символи (Тризуб, синьо-жовтий прапор).'
  - 'Падіння УЦР: внутрішні конфлікти (зокрема, із землевласниками через соціалізацію землі) та зовнішній тиск (німецьке командування,
    незадоволене неспроможністю УЦР забезпечити поставки продовольства) призвели до перевороту Скоропадського 29 квітня 1918
    р.'
  - 'Оцінки істориків: порівняння поглядів Грушевського (учасник), Субтельного (акцент на відсутності сильної армії) та Плохія
    (акцент на успішному націєтворенні).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож автономія чи незалежність? Сформулюйте власну аргументовану відповідь: чи була поступова
    еволюція УЦР єдиним можливим шляхом, чи це була стратегічна помилка?'
  - '[!anti-hagiography] Уроки Центральної Ради: чому демократична, легітимна влада програла? Аналіз помилок: ідеалізм, недооцінка
    військового фактору, внутрішні суперечки, занадто радикальні соціальні реформи.'
  - 'Спадщина: УЦР — це перший у ХХ ст. успішний досвід української парламентської демократії. Вона стала фундаментом та точкою
    відліку для всіх наступних етапів боротьби за незалежність, включно з 1991 роком.'
  - 'Зв''язок із сьогоденням: боротьба за міжнародне визнання, війна з Росією за існування, творення національних інституцій
    — наскільки сьогоднішні виклики повторюють ті, що стояли перед УНР 100 років тому?'
  section: Дискусія та підсумок
  words: 700
focus: 'The Ukrainian Central Rada (1917-1918): its four Universals, the evolution from autonomy to independence, key figures
  (Hrushevsky, Vynnychenko), the war with Bolsheviks, and its democratic legacy.'
level: HIST
