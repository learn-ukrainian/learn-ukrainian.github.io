content_outline:
- section: 'Вступ: Варяги та Київ'
  points:
  - Варязьке питання — [!myth-buster] Варяги не «створили» державу, а виступили каталізатором об’єднання вже існуючих центрів
    (Славії та Куявії)
  - Інфраструктура ранньої держави — використання розвиненої логістики полян
  - Загадка походження Олега — Хельгі як регент або узурпатор
  words: 500
- section: 'Читання: Князь Олег: Об''єднання земель'
  points:
  - Захоплення Києва (882) — вбивство Аскольда і Діра, встановлення контролю Півночі над Півднем
  - Матір міст руських — цитата «Се буде мати городам руським» (калька з грецької «метрополія»)
  - Підкорення племен — встановлення регулярної данини (полюддя) як інструмент державотворення
  words: 500
- section: Походи на Царгород і Договори
  points:
  - Похід 907 року (легенда і реальність) — 2000 кораблів на колесах; [!history-bite] «Щит на воротах» як метафора тріумфу
  - 'Договір 911 року: Умови — безмитна торгівля, право на лазні, юридичний паритет (смерть за смерть)'
  - Міжнародне визнання Русі — дипломатичний прорив і легітимізація на світовій арені
  words: 500
- section: 'Князь Ігор: Криза експансії'
  points:
  - Похід 941 (Грецький вогонь) — [!history-bite] «Ніби блискавку небесну мають...», технологічний шок русинів
  - Похід 944 (Компроміс) — втрата безмитної торгівлі, введення грамот для купців
  - Повстання древлян (945) — цитата «Якщо внадиться вовк до овець...», смерть Ігоря через повторний збір данини
  words: 500
- section: Геоекономіка та Торгівля
  points:
  - Шлях із варягів у греки — [!context] не просто дорога, а складна логістична система (волоки, пороги)
  - Експорт (хутро, віск, раби) — хутро як середньовічна валюта, віск для церков Європи
  - Імпорт (шовк, вино, золото) — престижні товари для забезпечення лояльності еліти
  words: 500
- section: Суспільство та Культура
  points:
  - Повсякденне життя киян — мілітаризоване суспільство, місто як торговельний хаб
  - Релігійний світ (Перун vs Християнство) — [!culture] клятва зброєю, Перуном і Велесом у договорах
  - Статус жінки в ранній Русі — (перехід до наступної теми про Ольгу)
  words: 500
- section: 'Первинні джерела: Голоси епохи'
  points:
  - Уривки з договорів — аналіз імен послів (Карли, Інегелд, Фарлаф) як доказ скандинавського походження еліти
  - Літописна легенда про смерть Олега — фаталізм і роль волхвів
  - Лінгвістичний аналіз — «Ми від роду руського...»
  words: 500
- section: Деколонізаційний погляд
  points:
  - 'Норманська теорія: Український погляд — інтеграція в європейський контекст епохи вікінгів, а не «меншовартість»'
  - Руський vs Російський — [!decolonization] Русь як суверенна європейська монархія, привласнення назви Росією у XVIII ст.
  - Тяглість державності — Київська Русь —> Галицько-Волинська держава —> Україна
  words: 500
- section: Спадщина
  points:
  - Від військової демократії до держави — перетворення торговельної факторії на імперію
  - Значення перших князів — заснування династії Рюриковичів (правили 400 років)
  words: 500
- section: Підсумок
  points:
  - Заключне слово — епоха «Бурі і натиску» (Sturm und Drang) ранньої Русі
  words: 500
vocabulary_hints:
  required:
  - князь (prince) — київський князь, великий князь
  - варяги (Varangians) — шлях із варягів у греки, варязька дружина
  - дружина (druzhina/retinue) — князівська дружина, вірна дружина
  - данина (tribute) — збирати данину, платити данину, полюддя
  - похід (campaign) — військовий похід, похід на Царгород
  - договір (treaty) — мирний договір, укласти договір, порушити договір
  - Візантія (Byzantium) — відносини з Візантією, вплив Візантії
  - літопис (chronicle) — «Повість минулих літ», літописна легенда
  - об'єднання (unification) — об'єднання земель, політичне об'єднання
  - підкорення (subjugation) — підкорення племен, насильницьке підкорення
  - правитель (ruler) — мудрий правитель, жорстокий правитель
  - династія (dynasty) — династія Рюриковичів, засновник династії
  recommended:
  - регент (regent) — Олег як регент Ігоря
  - волхв (sorcerer/pagan priest) — пророцтво волхва
  - торговельні привілеї (trade privileges) — безмитна торгівля
  - легітимність (legitimacy) — династична легітимність
  - Щекавиця (Shchekavytsia) — гора в Києві, могила Олега
