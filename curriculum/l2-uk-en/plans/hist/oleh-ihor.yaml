objectives:
- Аналізувати роль варягів у процесах державотворення на Русі, розрізняючи імперський та деколонізований підходи
- Порівнювати моделі правління Олега та Ігоря на основі літописних джерел та текстів договорів
- Оцінювати значення русько-візантійських договорів як інструменту міжнародної легітимізації та джерела з історії Русі
- Формулювати аргументовану позицію щодо причин піднесення та кризи ранньої Київської держави
