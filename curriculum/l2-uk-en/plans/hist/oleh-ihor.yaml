content_outline:
- points:
  - 'Провокація: Якби вам довелося обирати — хто легітимніший правитель Києва: місцеві князі Аскольд і Дір чи прибулець Олег,
    що вбиває їх і проголошує: «Се буде мати городам руським»? Чиє право сильніше?'
  - 'Загадка походження Олега: Хто він — Хельгі, регент при малолітньому Ігорі, чи узурпатор, що захопив владу? Літопис не
    дає прямої відповіді.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Українська vs. Імперська історіографія): Чи були варяги «творцями держави» для «диких» слов''ян (імперський
    наратив), чи лише каталізатором, що прискорив об''єднання вже існуючих центрів, як Куявія та Славія (український погляд)?'
  - 'Дебат 2 (Внутрішня дискусія): Олег — мудрий об''єднувач земель, що створив «імперію», чи жорстокий завойовник, що силою
    підкорив племена та встановив систему експлуатації (полюддя)?'
  - '[!epistemic-humility] Археологія підтверджує скандинавську присутність, але її масштаби та роль є предметом гострих суперечок.
    Літопис писався через 200 років після подій і відбиває радше погляд нащадків.'
  - 'Глобальна синхронність: «Шлях із варягів у греки» — це східний фланг загальноєвропейської «епохи вікінгів» (IX-XI ст.),
    коли скандинавські воїни та торгівці активно діяли від Північної Америки до Волги.'
  section: 'Конфліктна карта: Засновники чи завойовники?'
  words: 900
- points:
  - 'Джерело 1 (Літопис): Вбивство Аскольда і Діра (882) — аналіз риторики легітимізації влади. Чому літописець виправдовує
    Олега?'
  - 'Джерело 2 (Договір 911 р.): Аналіз тексту. «Ми від роду руського...» — імена послів (Карли, Інегелд, Фарлаф) як доказ
    скандинавського походження еліти. Умови договору: безмитна торгівля, юридичний паритет — що це говорить про статус Русі?'
  - '[!decolonization] Читаємо договори проти імперського наративу. Русь виступає як рівноправний партнер, а не васал Візантії.
    Це суверенна європейська монархія.'
  - 'Джерело 3 (Літопис про Ігоря): Похід 941 р. та «грецький вогонь» — технологічна перевага Візантії. Повстання древлян
    (945) — аналіз цитати «Якщо внадиться вовк до овець...» як народного уявлення про справедливість правителя.'
  section: 'Джерела: «Повість минулих літ» та договори з Візантією'
  words: 1600
- points:
  - 'Від військової демократії до ранньої держави: Олег та Ігор перетворили торговельну факторію на «імперію», засновану на
    контролі над торговельними шляхами та зборі данини.'
  - 'Геоекономіка Русі: «Шлях із варягів у греки» як хребет держави. Експорт (хутро, віск, раби) та імпорт (шовк, вино, зброя)
    — основа багатства та лояльності еліти.'
  - '[!myth-buster] Варяги не «принесли» державу, а інтегрувалися в існуючі структури, очоливши їх. Вони були військово-торговельною
    корпорацією, що діяла в інтересах власного збагачення, а державотворення стало побічним продуктом.'
  - 'Порівняння правителів: Олег «Завойовник» — успішні походи, вигідні договори, розширення влади. Ігор «Невдаха» — програні
    війни, погіршення умов торгівлі, ганебна смерть через жадібність. Криза експансії.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: То хто ж мав право на Київ? Чи є взагалі поняття «права» доречним для епохи «бурі і натиску»
    (Sturm und Drang)? Студент формулює відповідь, спираючись на джерела.'
  - '[!anti-hagiography] Уникаємо романтизації. Перші князі — це не «батьки нації», а жорстокі та прагматичні лідери, що діяли
    за логікою свого часу. Їхня спадщина — це не лише держава, а й традиція автократичної влади.'
  - 'Зв''язок із сьогоденням: Як Росія у XVIII ст. «привласнила» назву «Русь», щоб обґрунтувати свої імперські претензії на
    українські землі? Чому розрізнення «Руський» vs «Російський» є ключовим для деколонізації історії України?'
  section: Дискусія та підсумок
  words: 700
focus: 'State-building in early Kyivan Rus: Oleh''s unification and Byzantine treaties vs. Ihor''s crisis of expansion and
  death.'
