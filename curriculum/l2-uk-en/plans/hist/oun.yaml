content_outline:
- points:
  - 'Провокація: Чому після поразки визвольних змагань 1917-21 років частина української молоді вирішила, що терор — єдиний
    шлях до незалежності? Чи був інший вихід?'
  - '[!context] Травма втрати державності, поділ українських земель між чотирма державами та розчарування в демократичних
    методах і Лізі Націй, яка легітимізувала окупацію.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Радянський та польський наративи ("фашисти", "німецькі маріонетки") vs український погляд
    (національно-визвольна боротьба проти окупантів).'
  - 'Дебат 2: [!epistemic-humility] Дискусія всередині української історіографії: ОУН як вимушено радикальна відповідь на
    репресії чи як організація з тоталітарними рисами? Оцінка ідеології інтегрального націоналізму.'
  - 'Ідеологія: Вплив Дмитра Донцова та його праці «Націоналізм». Волюнтаризм, аморалізм, "творче насильство" як реакція на
    "провінціалізм" і "малоросійство" попередників.'
  - 'Глобальна синхронність: Підйом правих радикальних рухів по всій Європі (Італія, Німеччина, Польща, Угорщина) як контекст,
    але не копія.'
  section: 'Конфліктна карта: Терористи, фашисти чи борці за волю?'
  words: 900
- points:
  - '[!decolonization] Аналіз "Декалогу українського націоналіста" (1929) як морального кодексу підпільника. "Здобудеш Українську
    Державу, або згинеш у боротьбі за неї" — не гасло, а пряма настанова.'
  - 'Читання листів та спогадів учасників: листування Євгена Коновальця, спогади про суворі правила конспірації та життя в
    підпіллі.'
  - 'Критичний аналіз польських та радянських звітів: як окупаційна влада зображувала ОУН? Читаємо донесення НКВС та звіти
    польської поліції "проти течії", щоб зрозуміти масштаби та характер діяльності ОУН.'
  - 'Первинне джерело: цитата Євгена Коновальця: "У вогні перетоплюється залізо у сталь, у боротьбі перетворюється народ у
    націю".'
  section: 'Джерела: Декалог, листи та звіти окупантів'
  words: 1600
- points:
  - 'Причина-наслідок: Польська політика "пацифікації" (1930) як каталізатор радикалізації та відповіді ОУН у формі саботажних
    акцій та атентатів.'
  - '[!myth-buster] Атентати ОУН не були сліпим терором. Це були акти відплати, спрямовані на конкретних представників окупаційної
    влади: вбивство Олексія Майлова (1933) як помста за Голодомор, вбивство Броніслава Пєрацького (1934) як помста за Пацифікацію.'
  - 'Вбивство Коновальця (1938) агентом НКВС Судоплатовим: аналіз наслідків для організації, початок боротьби за лідерство.'
  - 'Розкол 1940 року на ОУН-М (Мельник) та ОУН-Б (Бандера): конфлікт поколінь ("старі" емігранти vs "молоді" крайові революціонери)
    та тактик (еволюційна vs революційна боротьба).'
  - 'Історики про ОУН: порівняння оцінок Я. Грицака, Т. Снайдера, С. Плохія.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює аргументовану відповідь: чи був радикалізм ОУН неминучим? Які альтернативи існували?'
  - '[!anti-hagiography] Трагічні наслідки розколу, який ослабив рух напередодні Другої світової війни. Чи можна було його
    уникнути?'
  - 'Зв''язок із сьогоденням: Як сучасна Росія використовує старі радянські міфи про ОУН у своїй пропаганді проти України?
    Чому постать Степана Бандери досі викликає такі гострі дискусії?'
  section: Дискусія та підсумок
  words: 700
focus: Створення, ідеологія та діяльність Організації Українських Націоналістів у міжвоєнний період (1929-1939)
level: HIST
module: hist-100
objectives:
- Описувати передумови створення, ідеологічні засади та структуру ОУН
- Пояснювати історичний контекст, що призвів до радикалізації українського національного руху в міжвоєнний період
- Аналізувати ключові події та методи діяльності ОУН у 1930-х роках, включно з їхніми причинами та наслідками
- Критично оцінювати різні інтерпретації спадщини ОУН, розрізняючи історичні факти від пропагандистських наративів
pedagogy: CBI
persona:
  role: Професор історії, що вимагає точності фактів та відділення їх від ідеологічних оцінок. Скептично ставиться до будь-яких
    спрощень — як героїзації, так і демонізації.
  voice: Uncompromising-Historian
