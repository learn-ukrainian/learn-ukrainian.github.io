content_outline:
- points:
  - 'Провокація: Чи були давні мешканці України більш демократичними, ніж античні греки? Візантійський історик Прокопій Кесарійський
    писав: «Ці племена... живуть у демократії... і тому в них про все корисне чи шкідливе міркують спільно». Чи це правда,
    чи екзотична фантазія про «шляхетних дикунів»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Антський союз як самодостатня держава vs. радянський/імперський міф про «спільну колиску»
    та нездатність слов''ян до державотворення без варягів.'
  - 'Дебат 2: Де прабатьківщина слов''ян? Теорія автохтонності на українських землях (археологічні культури) vs. міграційні
    теорії (з Прип''яті, Дунаю, Вісли).'
  - '[!epistemic-humility] Археологічні культури (Пеньківська, Празько-Корчацька) не завжди точно відповідають літописним
    племенам. Зв''язок між ними — предмет наукових дискусій.'
  - 'Глобальна синхронність: Велике розселення слов''ян (V-VII ст.) відбувається на тлі падіння Західної Римської імперії,
    утворення варварських королівств у Європі та під тиском кочових імперій зі сходу (гуни, авари).'
  section: 'Конфліктна карта: Прабатьківщина чи Колиска Трьох Народів?'
  words: 900
- points:
  - 'Прокопій Кесарійський («Історія війн»): аналіз опису «демократії», побуту, релігії (віра в єдиного бога-громовержця).
    Упередження: Прокопій пише як представник імперії про «варварів».'
  - 'Маврикій Стратег («Стратегікон»): аналіз опису військової тактики слов''ян — партизанська війна, використання ландшафту,
    засідки, дихання через очерет. Висновок автора: їх неможливо схилити до рабства.'
  - 'Йордан («Гетика»): розповідь про трагічну загибель антського князя Божа та 70 старійшин у боротьбі з готами (375 р.).
    [!decolonization] Це доказ існування політичної еліти та організованого спротиву, а не пасивності.'
  - 'Археологічні джерела: Пеньківська культура як матеріальний відповідник антів. Напівземлянки з печами-кам''янками, проста
    кераміка, знаряддя праці (соха, рало) — що вони говорять про суспільство?'
  section: 'Джерела: Візантійські хроніки та готські історики про предків українців'
  words: 1600
- points:
  - 'Спадкоємність: [!myth-buster] Гіпотеза М. Грушевського та М. Брайчевського про етногенетичну спадкоємність українців
    напряму від антів, минаючи спільну «давньоруську» стадію.'
  - 'Державотворення: Антський союз як протодержава — мав свою територію, еліту (князі, старійшини), військо та вступав у
    міжнародні відносини (союзи та війни з Візантією, готами, аварами).'
  - 'Соціальна структура: відсутність жорсткої ієрархії, високий статус жінки (як хранительки вогнища), колективне прийняття
    рішень на віче — як це впливало на економіку та військо?'
  - '[!myth-buster] Спростування міфу про пасивність слов''ян. Вони не лише захищалися, а й активно служили найманцями у візантійській
    армії та здійснювали походи на Балкани.'
  - Київські поляни як нащадки антів. Гіпотеза про Кия як реального антського князя VI ст., що заснував місто і мав дипломатичні
    контакти з Константинополем.
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чи були анти «демократами»? Студент формулює відповідь, використовуючи докази з першоджерел,
    і пояснює відмінність антського «народоправства» від афінської демократії.'
  - '[!decolonization] Чому для української історіографії так важливо довести тяглість державності від антів, а для російської
    — заперечити її?'
  - 'Зв''язок із сьогоденням: «Генетичний код волі». Чи можна вважати антське віче, козацькі ради та сучасний громадянський
    активізм проявами однієї й тієї ж політичної культури, схильної до самоорганізації?'
  - '[!anti-hagiography] Уникаючи ідеалізації: чи було це «народоправство» ефективним перед обличчям централізованих імперій?
    Які були слабкі сторони такої системи?'
  section: Дискусія та підсумок
  words: 700
focus: The Antes as a proto-state, their society, conflicts with Goths and Avars, Byzantine sources, and the decolonized view
  on the origins of Ukrainian statehood before the Rus'
level: HIST
module: hist-004
objectives:
- Описувати суспільний устрій, побут та військову тактику антів на основі аналізу візантійських першоджерел
- Критично аналізувати основні історіографічні дебати про походження слов''ян та антську державу, розрізняючи національні
  та імперські наративи
- Аргументувати тяглість демократичних традицій від антського віча до пізніших етапів української історії
- Використовувати поняття «тяглість», «автохтонність», «народоправство» в контексті дискусії про витоки української державності
