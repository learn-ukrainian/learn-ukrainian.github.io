objectives:
- Синтезувати знання про ключові трагедії України XX століття (Голодомор, Друга світова війна, репресії).
- Пояснювати причинно-наслідкові зв'язки між Голодомором, репресіями проти інтелігенції та війною як єдиним процесом деструкції.
- Аналізувати механізми культурного виживання та опору в умовах тоталітарного тиску.
- Оцінювати спадщину травми XX століття та її вплив на сучасну українську ідентичність і державність.
