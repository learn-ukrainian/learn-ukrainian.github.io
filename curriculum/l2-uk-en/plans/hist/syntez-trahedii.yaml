content_outline:
- points:
  - 'Провокативне питання: За оцінками демографів, без воєн та геноцидів XX століття населення України могло б сягати 80-100
    мільйонів. Як історія однієї з найродючіших земель Європи перетворилася на історію «Кривавих земель»?'
  - '[!decolonization] Концепція Тімоті Снайдера: між 1933 і 1945 роками на території України було вбито більше людей, ніж
    будь-де у світі. Чому саме ця територія стала епіцентром зіткнення двох тоталітарних режимів?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянський наратив про «братні народи» та «спільну історію» vs деколонізаційний погляд, що розглядає радянський
    період як окупацію, а декомунізацію — як терапію національної пам''яті.'
  - 'Дебат 2: Образ українців як «пасивних жертв» тоталітаризму vs реальність активного опору. [!myth-buster] Понад 4000 повстань
    проти радянської влади, діяльність дисидентів, підпільна культура — чи можна говорити про пасивність?'
  - '[!epistemic-humility] Концепція «подвійної свідомості»: як одночасно аналізувати зовнішню радянську лояльність і внутрішнє
    збереження національної ідентичності? Де проходить межа між виживанням і колаборацією?'
  - 'Глобальна синхронність: порівняння українського досвіду трансгенераційної травми з іншими постгеноцидними суспільствами
    (Вірменія, Камбоджа, Руанда).'
  section: 'Конфліктна карта: Жертва чи борець?'
  words: 900
- points:
  - 'Аналіз радянської преси: газета «Правда» пише, що «жити стало краще, жити стало веселіше», в той час як статистика смертності
    фіксує мільйони жертв Голодомору. Як працювала машина пропаганди?'
  - '[!decolonization] Читання проти течії: щоденники Олександра Радченка — свідчення очевидця Голодомору, за яке автора репресували.
    Аналіз «езопової мови» та прихованих смислів.'
  - 'Усна історія як інструмент відновлення правди: робота Комісії Конгресу США під керівництвом Джеймса Мейса. Як свідчення
    тих, хто вижив, руйнують імперські міфи?'
  - 'Джерела з архівів КДБ: накази про депортації, розстрільні списки «Розстріляного відродження», плани операції «Вісла».
    Аналіз бюрократичної мови зла.'
  section: 'Джерела: Офіційна брехня та приватна правда'
  words: 1600
- points:
  - 'Причинно-наслідковий ланцюг: як репресії проти інтелектуальної еліти (СВУ, Розстріляне відродження) «обезголовили» націю,
    зробивши її вразливішою до геноциду (Голодомор).'
  - Голодомор як удар по «хребту нації» (селянству) та створення «постгеноцидного суспільства» (термін Джеймса Мейса), що
    характеризується страхом, пасивністю та недовірою.
  - '[!myth-buster] Друга світова війна на території України: не «Велика Вітчизняна», а зіткнення двох тоталітарних імперій,
    де українці воювали по обидва боки фронту (УПА та Червона Армія), часто з метою відновлення власної державності.'
  - 'Довготривалі наслідки: феномен «трансгенераційної травми» — як страх і стратегії виживання батьків (мовчання, конформізм)
    несвідомо передаються дітям і впливають на сучасне суспільство.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Як нація вижила, перебуваючи в епіцентрі «Кривавих земель»? Формулювання відповіді на основі
    аналізу механізмів опору та виживання (культура в підпіллі, діаспора, дисиденти).'
  - 'Переосмислення ідентичності: як відбувається перехід від статусу «жертви історії» до активного суб''єкта, що бореться
    за своє майбутнє? Цитата: «Я єсть народ, якого Правди сила ніким звойована ще не була» (Тичина).'
  - '[!anti-hagiography] Чи не зациклюється сучасна Україна на травмі? Дискусія про ризики віктимізації та важливість фокусування
    на історіях успіху та опору.'
  - 'Зв''язок із сьогоденням: війна, що почалася в 2014/2022 — це рецидив непокараного імперського зла. Як знання історії
    XX століття допомагає розуміти методи ворога (депортації, фільтраційні табори) і знаходити сили для боротьби?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз зв'язків між Голодомором, війною та репресіями як єдиним процесом; механізми виживання нації; вплив трансгенераційної
  травми на сучасність.
