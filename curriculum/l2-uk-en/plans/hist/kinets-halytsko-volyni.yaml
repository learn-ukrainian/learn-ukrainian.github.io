objectives:
- Аналізувати комплексні причини занепаду Галицько-Волинської держави, розрізняючи внутрішні та зовнішні чинники
- Критично оцінювати інформацію з первинних джерел, враховуючи упередженість та мету автора (на прикладі польських хронік)
- Спростовувати імперські міфи (про «мирне успадкування») та формулювати деколонізований погляд на події
- Проводити паралелі між історичними подіями та сучасністю, формулюючи уроки державності для України
