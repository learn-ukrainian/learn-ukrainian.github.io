content_outline:
- points:
  - 'Провокація: Що вбиває державу — зовнішній ворог чи внутрішня зрада? Трагедія Галицько-Волинської держави 1340 року —
    це історія про вбивство одного князя чи самогубство цілої еліти?'
  - 'Сценарій "що якби": Якби бояри не отруїли Юрія ІІ, чи змогла б держава Романовичів вижити в геополітичній пастці між
    Польщею, Литвою та Ордою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] «Мирна спадщина» vs «збройна агресія». Польська історіографія представляє похід Казимира ІІІ
    як реалізацію «законних прав». Українська — як акт загарбання та пограбування, що розпочав 50-річну війну.'
  - 'Дебат 2: Боярство — зрадники чи державники? Чи були бояри, отруївши прозахідного Юрія ІІ, зрадниками, що поставили власні
    інтереси вище державних? Чи вони захищали «батьківські традиції» та православ''я від католицького впливу?'
  - '[!epistemic-humility] Брак власних джерел (літопис обривається 1292 р.) змушує нас реконструювати події через чужі, часто
    ворожі хроніки. Правда залишається предметом наукових дискусій.'
  - 'Глобальна синхронність: Поки на Русі тривала боротьба за спадщину, в Європі починалася Столітня війна (1337), а Візантія
    вела громадянську війну, слабнучи перед османською загрозою.'
  section: 'Конфліктна карта: Смерть держави: вбивство чи самогубство?'
  words: 900
- points:
  - 'Польська хроніка Яна Длугоша: Аналіз цитат про «величезні скарби», захоплені Казимиром у Львові. Як хроніст виправдовує
    агресію та зображує руських князів і бояр?'
  - 'Печатка Юрія ІІ: Латинський титул "Dux Russiae" та герб. Що це говорить про його зовнішньополітичний курс, самосприйняття
    та спробу стати європейським монархом?'
  - '[!decolonization] Читання імперських джерел «проти шерсті»: Як польські та угорські документи, що описують «хаос» на
    Русі, насправді свідчать про запеклий опір місцевого населення та боярства під проводом Дмитра Дедька.'
  - 'Литовський погляд: Угоди між Любартом-Дмитром та місцевими громадами. На відміну від польського завоювання, Литва часто
    пропонувала модель федерації та збереження місцевих звичаїв.'
  section: 'Джерела: Очима ворогів та союзників'
  words: 1600
- points:
  - 'Причинно-наслідковий аналіз: Як внутрішній конфлікт (князь vs олігархія) та криза династії стали вікном можливостей для
    зовнішніх гравців.'
  - 'Короткострокові наслідки: 50-річна війна за спадщину, поділ території між Польщею та Литвою, фізичне винищення частини
    еліти.'
  - 'Довгострокові наслідки: Трансформація суверенного «Regnum Russiae» в провінційну «Terra Russiae» (Ruś Czerwona) у складі
    Польщі. Переміщення центру руської державності на північ, до Вільна. Втрата власної держави на століття.'
  - '[!myth-buster] Спростування міфу про «кінець історії». Занепад держави не означав зникнення народу. Руська еліта, право
    та культура продовжили існувати, інтегрувавшись у Велике князівство Литовське, Руське і Жемайтійське.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Тож хто винен у загибелі держави? Студент формулює аргументовану відповідь, що це була фатальна
    комбінація внутрішньої слабкості та зовнішньої агресії.'
  - '[!anti-hagiography] Кінець "золотого віку"? Слід уникати ідеалізації держави Романовичів. Це була типова середньовічна
    монархія, роздерта внутрішніми чварами, що й зробило її вразливою.'
  - 'Уроки державності: Як історія занепаду Галицько-Волинського князівства актуальна для розуміння сучасних загроз для України?
    Обговорення ролі національної єдності та сильної державної влади в умовах екзистенційної загрози.'
  section: Дискусія та підсумок
  words: 700
focus: Причини та наслідки занепаду держави Романовичів, боротьба за спадщину, роль боярства, польська та литовська експансія
