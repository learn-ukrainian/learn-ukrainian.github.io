content_outline:
- points:
  - 'Провокаційне питання: Незалежність 1991 — це була ейфорія перемоги чи тривожний крок у невідомість? Що переважило?'
  - 'Фрагмент з Акту проголошення незалежності: "Виходячи із смертельної небезпеки, яка нависла була над Україною в зв''язку
    з державним переворотом в СРСР..." — без контексту, студент має поміркувати, про яку саме небезпеку йдеться.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ядерне роззброєння — прагматичне рішення для молодої держави чи стратегічна помилка, що уможливила майбутню
    агресію? (Будапештський меморандум: "запевнення" vs. "гарантії").'
  - 'Дебат 2: "Багатовекторність" Кучми — мистецтво політичного маневрування між Заходом та Росією чи консервація залежності
    та відкладання цивілізаційного вибору?'
  - '[!epistemic-humility] Історики досі сперечаються, чи існувала реальна альтернатива люстрації та швидких ринкових реформ
    (як у Балтії та Польщі) в українських умовах.'
  - 'Глобальна синхронність: У той час як Україна боролася з гіперінфляцією, Польща проводила "шокову терапію", а країни Балтії
    інтегрувалися в західні структури. Чому їхні шляхи так відрізнялися?'
  section: 'Конфліктна карта: Втрачені шанси чи неминучий шлях?'
  words: 900
- points:
  - 'Текст Акту проголошення незалежності (24 серпня 1991): аналіз риторики "смертельної небезпеки" та права на самовизначення.
    Хто був автором? В якій атмосфері приймався?'
  - 'Текст Будапештського меморандуму (5 грудня 1994): [!decolonization] Уважне читання формулювань "respect sovereignty"
    vs "provide assistance". Як мова дипломатії приховала відсутність реальних гарантій безпеки для України?'
  - 'Спогади про "Конституційну ніч" (28 червня 1996): читання фрагментів спогадів депутатів про політичну боротьбу, що передувала
    ухваленню Конституції.'
  - 'Перші шпальти газет 1992-1994 рр.: аналіз заголовків про гіперінфляцію, купони-карбованці та економічний хаос. Як медіа
    відображали настрої суспільства?'
  section: 'Джерела: Документи, що творили державу'
  words: 1600
- points:
  - 'Короткострокові наслідки: гіперінфляція 10,000% у 1993 році, "кравчучка" як символ виживання, бартеризація економіки,
    втрата заощаджень населення.'
  - 'Довгострокові наслідки: формування олігархічної системи. [!decolonization] Як радянські "червоні директори", використовуючи
    старі зв''язки, приватизували державні активи і стали першими олігархами.'
  - '[!myth-buster] Конституція 1996 року не була "подарунком" президента. Це результат гострої боротьби між президентом та
    парламентом, що завершилася ультиматумом і нічним голосуванням.'
  - 'Оцінка істориків: порівняння поглядів Сергія Плохія, Ореста Субтельного та Ярослава Грицака на ключові рішення 1990-х.
    Чи була олігархія неминучою ціною за збереження незалежності?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, 1991 рік — ейфорія чи тривога? Студент формулює аргументовану відповідь, спираючись на
    факти з модуля.'
  - '[!anti-hagiography] Чому здобуття незалежності не принесло швидкого добробуту? Аналіз радянської спадщини, відсутності
    люстрації та збереження номенклатурних еліт при владі.'
  - 'Зв''язок із сьогоденням: Як невирішені проблеми 1990-х (корупція, олігархія, слабкі інституції, вплив Росії) стали причинами
    Помаранчевої революції 2004 року та Революції Гідності 2014 року?'
  - 'Ключовий висновок: становлення держави — це не одномоментний акт, а складний і болісний процес подолання імперської спадщини.'
  section: Дискусія та підсумок
  words: 700
focus: Proclamation of independence, Budapest Memorandum, Kuchma era, economic crisis of the 90s, formation of the oligarchic
  system, path to the Orange Revolution.
level: HIST
module: hist-121
objectives:
- Аналізувати ключові документи, що лягли в основу сучасної української державності (Акт проголошення незалежності, Будапештський
  меморандум, Конституція 1996)
- Пояснювати причини та наслідки економічної кризи 1990-х років, включаючи гіперінфляцію
- Критично оцінювати суперечливі політичні рішення періоду, такі як ядерне роззброєння та політика "багатовекторності"
- Визначати причини формування олігархічної системи як прямого спадку радянської номенклатури
- Аргументувати, як невирішені проблеми 1990-х стали передумовою для революцій 2004 та 2014 років
pedagogy: CBI
persona:
  role: Учасник подій 90-х, що бачив і здобутки, і провали зсередини, і тепер аналізує їх без зайвого романтизму.
  voice: Skeptical-Reformer
phase: HIST.12
