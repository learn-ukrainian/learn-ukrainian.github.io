slug: yurii-nemyrych
version: '2.0'
title: 'Юрій Немирич: Гадяцька угода'
subtitle: 'Yurii Nemyrych: The Treaty of Hadiach'
content_outline:
- section: Вступ
  points:
  - 'Nemyrych as a unique figure: intellectual and politician — the ''brain'' behind
    the break with Moscow and turn to Europe'
  - 'The crisis after Khmelnytsky''s death — seeking new allies amidst the collapse
    of the 1654 protectorate; cultural hook: [!context] The concept of the ''Commonwealth
    of Three Nations'' (Rzeczpospolita Trojga Narodów)'
- section: 'Юрій Немирич: Портрет інтелектуала'
  points:
  - Education in Europe (Leiden, Oxford, Paris) — 1630–1634; studying at Sorbonne
    and Cambridge, arguably the most educated man in Ukraine
  - 'Protestant faith (Arianism) and tolerance — conversion to Orthodoxy in 1657 for
    political legitimacy; cultural hook: [!biography] ''The Ukrainian Machiavelli''
    or ''Protestant Humanist'' — how European education shaped his statecraft'
  - Political career in the Commonwealth — author of 'Discursus de bello Moscovitico'
    (1632)
- section: 'Гадяцька угода 1658: Проект трьох народів'
  points:
  - The concept of the Grand Duchy of Rus' — signed Sept 16, 1658; defining the state
    as a third equal partner alongside Poland and Lithuania
  - 'Equality of rights: religion, language, administration — Nemyrych becomes Chancellor;
    own treasury, mint, and tribunal'
  - 'The vision of a federal state — army of 30k registered Cossacks + 10k mercenaries;
    cultural hook: [!myth-buster] The ''Polish Intrigue'' myth vs. Reality: A sovereign
    Ukrainian project for a federal Europe'
- section: Освіта і культура в проекті Немирича
  points:
  - Plans for two academies (universities) — elevating Kyiv-Mohyla to university status
    (equal to Krakow) + a second new academy
  - Freedom of the press and schools — establishing printing presses and gymnasiums
    'as many as needed'
  - 'Intellectual foundation for the state — cultural hook: [!culture] Education as
    a prerequisite for statehood in Nemyrych''s vision'
- section: 'Конотопська битва: Тріумф зброї'
  points:
  - The war with Muscovy (1658-1659) — Moscow's reaction to Hadiach as 'treason'
  - 'Victory at Konotop as a defense of the Treaty — June 28-29, 1659; defeat of Trubetskoy''s
    army; cultural hook: [!history-bite] ''The flower of Muscovite cavalry perished
    in one day'' — Tsar Alexei Mikhailovich preparing to flee Moscow'
  - Vyhovsky's military leadership — coalition warfare (Cossacks + Tatars)
- section: 'Крах великої ідеї: Чому не вийшло?'
  points:
  - Internal opposition (Pushkar, Barabash) — social divide between the 'aristocratic'
    project and the egalitarian masses
  - Muscovite propaganda and incitement of the masses — early 'hybrid war' tactics
    using populism and money
  - The tragic death of Nemyrych — murdered in September 1659 near Svydivets; likely
    by pro-Moscow instigation
- section: Читання
  points:
  - Analysis of the Hadiach Treaty text — focusing on the articles establishing the
    Grand Duchy of Rus'
- section: Первинні джерела
  points:
  - Analysis of Nemyrych's speech to the Sejm — 'Manifestation' (April 23, 1659);
    justifying the break with Moscow
  - 'include quote: «Ми, як вільні до вільних і рівні до рівних, повертаємось» — the
    motto of the union'
- section: Деколонізаційний погляд
  points:
  - Hadiach as an alternative to Pereiaslav — European legal tradition vs. Asian despotism
  - 'The myth of ''inevitable unity'' with Russia — cultural hook: [!decolonization]
    Dismantling the Soviet label of Nemyrych as a ''traitor'' and ''Polish lord'''
- section: Підсумок
  points:
  - Final evaluation of the project — 'The Grand Illusion' but a precursor to Pylyp
    Orlyk's Constitution
vocabulary_hints:
  required:
  - федерація (federation) — as opposed to unitary empire or protectorate
  - канцлер (chancellor) — Nemyrych's title in the Grand Duchy of Rus'
  - шляхта (nobility) — the political nation of the Commonwealth
  - сенат (senate) — the upper house of the parliament where Rus' was to be represented
  - академія (academy) — status of a university (Kyiv-Mohyla)
  - триєдина держава (triune state) — Res Publica of Three Nations
  - аріанин (Arian) — Nemyrych's original Protestant confession
  - унія (union) — specifically the Union of Hadiach (1658)
  - розкол (schism/split) — social division exploited by Moscow
  - Руїна (The Ruin) — the period of chaos following the failure of Hadiach
  recommended:
  - протекторат (protectorate) — the failed status under Moscow (1654)
  - маніфестація (manifestation) — public declaration/speech
  - ратифікація (ratification) — approval of the treaty by the Sejm
  - деспотія (despotism) — Nemyrych's characterization of Muscovite rule
