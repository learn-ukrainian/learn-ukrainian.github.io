content_outline:
- points:
  - 'Провокація: Гадяцька унія — це блискучий проект суверенної європейської України чи зрада і «панська» інтрига, як стверджувала
    Москва? Що, якби все вдалося?'
  - '[!biography] Юрій Немирич, «український Макіавеллі», найосвіченіший українець свого часу — протестант, випускник Сорбонни
    та Оксфорду, що став канцлером козацької держави.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Гадяч vs. Переяслав. Європейська федерація рівних (Гадяч) проти азійської деспотії та «протекторату» (Переяслав).
    Чи був у України третій шлях?'
  - 'Дебат 2: Внутрішній розкол. «Аристократичний» проект Немирича та Виговського проти «чорної ради» — соціальний конфлікт
    між козацькою старшиною та народними масами, розпалений Москвою.'
  - '[!epistemic-humility] Історики сперечаються, чи була Угода життєздатною. Чи могла шляхта справді відмовитись від своїх
    привілеїв, а козацтво — прийняти обмеження реєстру?'
  - 'Глобальна синхронність: У той час як Україна намагається створити федерацію, Англія переживає реставрацію монархії після
    республіки Кромвеля, а Франція Людовіка XIV утверджує абсолютизм.'
  section: 'Конфліктна карта: Проект трьох народів чи розкол нації?'
  words: 900
- points:
  - 'Аналіз тексту угоди (16 вересня 1658): Статті про створення Великого Князівства Руського як третього рівноправного члена
    Речі Посполитої (поряд з Польщею та Литвою).'
  - 'Ключові положення: Власний канцлер (Немирич), скарбниця, монетний двір, трибунал, 30-тисячне козацьке військо та скасування
    Берестейської унії.'
  - '[!decolonization] Читаємо промову Немирича на сеймі (квітень 1659): «Ми, як вільні до вільних і рівні до рівних, повертаємось».
    Це маніфест розриву з Москвою, а не капітуляція перед Польщею.'
  - 'Джерельна критика: Промова збереглася в латинському перекладі. Наскільки вона відображає точні слова Немирича, а наскільки
    є риторичною конструкцією для польського сейму?'
  section: 'Джерела: Текст Гадяцької угоди та промова Немирича'
  words: 1600
- points:
  - 'Короткостроковий тріумф: Перемога під Конотопом (червень 1659) — військовий успіх, що мав гарантувати виконання Угоди.
    Армія Виговського (козаки і татари) вщент розбиває московське військо.'
  - 'Причини провалу: внутрішня опозиція (Пушкар, Барабаш), московська пропаганда та гроші (рання гібридна війна), небажання
    польського сейму ратифікувати договір у повному обсязі.'
  - 'Трагічний фінал: Вбивство Юрія Немирича у вересні 1659 року — символічна смерть «мозку» Гадяцької унії, початок періоду
    Руїни.'
  - '[!myth-buster] Радянська історіографія таврувала Немирича як «зрадника» і «польського пана». Насправді, його проект був
    спробою зберегти суверенітет і уникнути поглинання Московським царством.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Гадяч — це «панська інтрига» чи втрачений шанс на європейську інтеграцію? Сформулюйте відповідь,
    спираючись на джерела та аналіз причин провалу.'
  - 'Історична паралель: Чи можна вважати Гадяцьку угоду прообразом сучасної європейської інтеграції України? Порівняйте аргументи
    «за» і «проти» союзу з Європою тоді і зараз.'
  - '[!anti-hagiography] Гадяцький проект не був ідеальним. Він закріплював владу старшинської еліти. Чи могла така «аристократична
    республіка» бути стабільною в довгостроковій перспективі?'
  section: Дискусія та підсумок
  words: 700
