- Пояснювати суть та історичне значення проекту 'Великого Князівства Руського'
- Аналізувати комплекс причин (внутрішніх та зовнішніх) провалу Гадяцької угоди
- Критично оцінювати роль Юрія Немирича як інтелектуала та політика в українській історії
- Деконструювати радянські та імперські міфи про Гадяцьку унію як 'зраду'
