objectives:
- Узагальнювати ключові етапи політичного, культурного та соціального розвитку Київської Русі
- Критично аналізувати суперечливі претензії на спадщину Русі в українській та російській історіографії
- Оцінювати значення спадщини Київської Русі для формування сучасної української ідентичності та державності
- Розрізняти історичний факт, наукову інтерпретацію та політичний міф на прикладі історії Русі
