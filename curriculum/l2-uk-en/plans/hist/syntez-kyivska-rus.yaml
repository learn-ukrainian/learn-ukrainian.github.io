content_outline:
- points:
  - 'Провокація: Митрополит Іларіон у «Слові про закон і благодать» (XI ст.) писав, що русини «не в плохій бо й невідомій
    землі володарювали, а в Руській, що знана й чутна в усіх чотирьох кінцях землі». Якщо це так, чому сьогодні спадщину цієї
    землі оскаржують, а її історію переписують?'
  - Який образ постає у вас при словах «Київська Русь»? Золоті ворота, князі на конях, чи щось інше? Наскільки цей образ відповідає
    історичній реальності?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська vs Імперська історіографія. Схема Михайла Грушевського (Київська Русь → Галицько-Волинське князівство
    → Литовсько-Руська держава → Козацька держава → Україна) як безперервна традиція державності на одній території. Російська
    імперська схема (Київ → Володимир-на-Клязьмі → Москва) як штучне перенесення центру для легітимізації імперії.'
  - 'Дебат 2: «Феодальна роздробленість» — занепад чи нормальний розвиток? Радянська теза про «трагедію роздробленості», що
    ослабила Русь. Сучасний погляд: роздробленість як європейська норма децентралізації, що стимулювала розвиток регіональних
    центрів (Галич, Чернігів) та не скасовувала ідеї єдності Русі.'
  - '[!epistemic-humility] Літописи писалися князями і для князів. Чи можемо ми довіряти їхній оцінці подій? Як відрізнити
    факт від пропаганди, наприклад, у описі князівських міжусобиць?'
  - 'Глобальна синхронність: Політична роздробленість Русі XII ст. відбувалася паралельно з боротьбою імператора та пап у
    Священній Римській імперії та зміцненням королівської влади у Франції Капетингів.'
  section: 'Конфліктна карта: Хто спадкоємець Русі?'
  words: 900
- points:
  - 'Літописання: «Повість минулих літ» Нестора Літописця як фундаментальне джерело про походження Русі. Аналіз уривків: легенда
    про заснування Києва, покликання варягів. Хто автор, для кого він писав?'
  - 'Правова традиція: «Руська Правда» Ярослава Мудрого. Аналіз статей про захист приватної власності, систему штрафів (вир)
    замість кровної помсти. Відсутність смертної кари — що це говорить про суспільство?'
  - 'Архітектура як джерело: Софійський собор у Києві — не просто храм, а політичний маніфест, «мудрість» нової християнської
    імперії. Десятинна церква як перша кам''яна споруда.'
  - '[!decolonization] Графіті на стінах Софії Київської — тисячі написів, зроблених звичайними киянами XI-XIII ст. Це прямий
    доказ масової грамотності, що руйнує імперський міф про «темний, неосвічений народ», який потребував «цивілізаторської»
    місії з півночі.'
  - 'Мистецтво та література: «Слово о полку Ігоревім» як пам''ятка світського письменства. «Повчання дітям» Володимира Мономаха
    як моральний кодекс правителя.'
  section: 'Джерела: Літописи, право та каміння'
  words: 1600
- points:
  - 'Політична система: баланс між монархією (князь), аристократією (боярська рада) та демократією (віче). Чому в українській
    традиції збереглася роль громади (віче, козацька рада), а в московській утвердилася деспотія?'
  - 'Соціальна структура: відносно високий статус вільних селян-общинників («смердів»). Існування напіввільних (закупи) та
    невільних (холопи), але без класичного кріпацтва західного зразка.'
  - 'Економіка: Шлях «із варяг у греки» як основа процвітання. Експорт (хутро, віск, мед) та імпорт (предмети розкоші, зброя).
    Русь як «Гардаріки» — «країна міст» в очах скандинавів.'
  - '[!myth-buster] Русь не була ізольованою. Це була глибоко інтегрована в європейський простір держава. Династичні шлюби
    Ярослава Мудрого («тесть Європи») з королівськими домами Франції, Норвегії, Угорщини, Польщі. Анна Ярославна — королева
    Франції.'
  - 'Русь очима сучасників: німецький хроніст Тітмар Мерзебурзький (XI ст.) пише про Київ як про величезне місто з 400 церквами,
    що конкурує з Константинополем.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, хто є «справжнім» спадкоємцем Русі? Сформулюйте відповідь, спираючись на аргументи про
    безперервність політичної традиції, території та культурного коду.'
  - Чому боротьба за спадщину Київської Русі є настільки важливою у сучасній російсько-українській війні? Що означає для України
    відстояти своє право на цю історію?
  - '[!anti-hagiography] Чи не ідеалізуємо ми Київську Русь? Постійні князівські міжусобиці, братовбивчі війни, жорстокі розправи
    з повстаннями (наприклад, древлян). Чи була Русь «золотим віком», чи просто типовою середньовічною державою зі своїми
    світлими та темними сторонами?'
  - 'Підсумок: Київська Русь — це не просто етап історії, а фундамент української державності, європейської ідентичності та
    культурної матриці. Її спадщина — це не реліквія, а активний чинник сьогодення.'
  section: Дискусія та підсумок
  words: 700
focus: 'Kyivan Rus (882-1240) synthesis: political development, cultural achievements, societal structure, and a critical
  analysis of its legacy, focusing on the Ukrainian vs. Russian historiographical debate.'
