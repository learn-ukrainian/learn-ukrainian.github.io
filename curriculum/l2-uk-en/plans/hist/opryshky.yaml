content_outline:
- points:
  - 'Провокація: Олекса Довбуш — жорстокий бандит чи шляхетний месник? Чи може людина, що грабує та вбиває, бути національним
    героєм?'
  - 'Карпати як «природна фортеця»: як географія гір сформувала не лише економіку, а й характер спротиву, зробивши його недосяжним
    для імперій?'
  - 'Етимологія слова «опришок»: від латинського «oppressor» (гнобитель) чи українського «опріч» (осторонь)? Що ця дилема
    каже нам про суть руху?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська vs імперська інтерпретація. Опришки як «latrones» (розбійники) в польських судових документах проти
    образу борців за волю в українському фольклорі.'
  - 'Дебат 2: Радянська vs сучасна українська історіографія. Міф про «класову боротьбу» проти концепції національно-визвольного
    руху та асиметричної війни з окупаційною владою.'
  - '[!epistemic-humility] Теорія «соціального розбійництва» Еріка Гобсбаума: чи є опришки українським аналогом Робін Гуда,
    чи це спрощення, що ігнорує унікальний національний контекст?'
  - 'Глобальна синхронність: Довбуш (1700-1745) як сучасник словацького Яношика (1688-1713). Паралелі та відмінності з балканськими
    гайдуками та грецькими клефтами XVIII ст.'
  section: 'Конфліктна карта: Соціальний бандитизм чи асиметрична війна?'
  words: 900
- points:
  - 'Первинні джерела 1 (Фольклор): Аналіз народної пісні «Ой попід гай зелененький». Яким постає Довбуш? Які риси ідеалізуються?
    Які історичні деталі опускаються?'
  - 'Первинні джерела 2 (Документи): Цитати з австрійських судових протоколів про допит та вирок Василю Баюраку (1754). Як
    мова бюрократії контрастує з епічним стилем пісень? [!decolonization]'
  - 'Первинні джерела 3 (Артефакти): Опришківська бартка як зброя, символ статусу та сакральний предмет. Інкрустація та ритуальне
    значення присяги на бартці.'
  - 'Невидимі джерела: роль жінок. [!decolonization] Жінки не лише кохані (легенда про Дзвінку), а й інформаторки, утримувачки
    конспіративних хат та берегині тилу. Їхня роль у документах та фольклорі.'
  - 'Народна медицина як джерело: Використання лікарських рослин Карпат (живиця, сфагнум) та роль знахарів у ватазі як свідчення
    автономії та виживання загонів у екстремальних умовах.'
  section: 'Джерела: Пісні, протоколи та бартки'
  words: 1600
- points:
  - 'Причини та наслідки: Посилення панщини до 4-5 днів, втрата гідності та економічний гніт як каталізатори руху. Короткостроковий
    наслідок — дестабілізація влади, довгостроковий — формування символу нескореності.'
  - 'Культ Довбуша: Як відбулась трансформація реальної людини (кульгавого стратега, пораненого в 1739 р.) на міфічного героя?
    Роль зради (Стефан Дзвінчук) та жорстокої страти (четвертування тіла) у цементуванні легенди.'
  - '[!myth-buster] Скарби Довбуша. Реальний скарб опришків — це не золото, а мобільність, підтримка населення та зброя (кріси,
    пістолі). Легенди про золото як спосіб демонізації руху.'
  - 'Опришківський етос: Кодекс честі, присяга, розподіл здобичі (на церкву, бідних, зброю). Це не хаотичний грабунок, а система
    з власними правилами, що імітувала державні функції.'
  - 'Оцінки істориків: Як постать Довбуша оцінювали історики різних шкіл? Від «бандита» до «раннього революціонера» і «символу
    нації».'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Довбуш — бандит чи герой? Студент формулює аргументовану відповідь, використовуючи докази
    з джерел та історіографічних дебатів.'
  - 'Зв''язок із сьогоденням: Фільм «Довбуш» (2023), туристичні маршрути «Стежками Довбуша». Чому цей образ став настільки
    актуальним для України XXI століття, що воює за свою незалежність?'
  - '[!anti-hagiography] Чи можлива деромантизація образу? Обговорення жорстоких методів опришків. Чи виправдовує мета засоби
    в умовах окупації?'
  - 'Фінальна думка: «Довбуш живий, поки живі Карпати». Що означає цей вислів? Про безсмертя ідеї спротиву, вкоріненої в ландшафт
    та народну пам''ять.'
  section: Дискусія та підсумок
  words: 700
focus: Феномен опришківства, постать Олекси Довбуша, соціальне розбійництво vs національно-визвольна боротьба, карпатський
  етос, деколонізація образу
