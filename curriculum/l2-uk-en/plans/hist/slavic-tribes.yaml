content_outline:
- points:
  - 'Провокація: Літописець називає древлян «звіриним звичаєм живущими», а полян — «тихими і покірними». Це об''єктивна історія
    чи політична пропаганда переможців?'
  - 'Артефакт без контексту: зображення скроневого кільця. Чиє воно? Що воно може розповісти про свою власницю та її плем''я?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Концепт «спільної колиски трьох братніх народів» — радянський ідеологічний конструкт. Які
    археологічні та лінгвістичні дані свідчать про глибокі відмінності між племінними союзами на території сучасної України,
    Білорусі та Росії?'
  - 'Дебат 2: Поляни vs Древляни — культурна прірва чи політичне суперництво? Аналіз «Повісті минулих літ» як політичного
    документа, що легітимізує владу київської династії над іншими племенами.'
  - '[!epistemic-humility] Загадка Білих Хорватів та Дулібського союзу. Стільське городище як мегаполіс, що зник. Чому ми
    знаємо так мало? Нестача письмових джерел та роль археології у реконструкції минулого.'
  - 'Глобальна синхронність: Слов''янські міграції VI-VII століть у контексті Великого переселення народів. Як заснування
    слов''янських поселень на Балканах пов''язане із занепадом Дулібського союзу під ударами Аварського каганату?'
  section: 'Конфліктна карта: ''Спільна колиска'' чи племінна мозаїка?'
  words: 900
- points:
  - 'Джерело 1: «Повість минулих літ». Аналіз уривків про розселення, звичаї та «норови» племен. Як літописець використовує
    мову для створення позитивного образу полян і негативного — їхніх сусідів?'
  - 'Джерело 2: Візантійські автори (Прокопій Кесарійський, Маврикій Стратег). Слов''яни як «демократичний» народ, що не визнає
    єдиновладдя. Військова тактика («партизанська війна», маскування під водою). Чи можна довіряти цим описам?'
  - 'Джерело 3: Арабські мандрівники (Ібн Фадлан, Аль-Масуді). Опис зовнішності, одягу, торгових звичаїв та поховальних ритуалів
    русів. Погляд на слов''ян як на екзотичний народ з боку ісламської цивілізації.'
  - '[!decolonization] Джерело 4: Археологія як текст. Що розповідають про ідентичність скроневі кільця, кераміка (Лука-Райковецька
    та Роменська культури), житла-напівземлянки та городища (Іскоростень, Стільсько)? Як матеріальна культура доповнює або
    спростовує письмові джерела.'
  - 'Кейс-стаді: Змієві вали. Грандіозна оборонна система для захисту від кочовиків. Легенда про Кирила Кожум''яку vs наукові
    теорії про будівництво. Свідчення неймовірної організаційної спроможності суспільства.'
  section: 'Джерела: Слов''яни очима літописців, візантійців та арабів'
  words: 1600
- points:
  - 'Від племені до держави: Як відбувався процес консолідації? Роль торгових шляхів («із варягів у греки»), тиску з боку
    сусідів (Хозари, Печеніги) та внутрішньої конкуренції.'
  - 'Кейс-стаді: Повстання древлян 945 року. Вбивство Ігоря як точка опору централізації. Помста Ольги та її реформи (уроки,
    погости) як початок справжнього державотворення — перехід від простого збору данини до впорядкованої системи.'
  - '[!myth-buster] Пантеон Володимира — не «споконвічні» боги, а політичний проєкт. Спроба об''єднати племінні культи в єдину
    державну релігію. Чому Велес опинився «на Подолі», а не на горі з іншими богами?'
  - '[!myth-buster] Жінка в дохристиянському суспільстві. Спростування міфу про тотальне безправ''я. Образи княгині Ольги,
    міфічних Лади та Дани, високий статус матері-господині, роль жінок у ритуалах (веснянки, гаївки).'
  - 'Спадщина племінних союзів: Як стародавні кордони між полянами, древлянами та сіверянами частково збігаються з етнографічними
    регіонами та діалектними зонами України?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, ким були древляни — дикунами чи борцями за незалежність? Сформулюйте свою відповідь, спираючись
    на аналіз джерел та археологічні дані.'
  - 'Ширше питання: Чи можна говорити про «українців» у IX-X століттях? Наскільки правомірно вживати сучасні національні терміни
    щодо середньовічних племінних утворень?'
  - '[!anti-hagiography] Уникнення романтизації «золотого віку» язичництва. Жорстокість, міжплемінні війни, людські жертвопринесення
    (за деякими джерелами) як реалії того часу.'
  - 'Зв''язок із сьогоденням: Концепт «віче» та традиції народного самоуправління як важлива риса української політичної культури,
    що сягає корінням у племінні збори.'
  section: Дискусія та підсумок
  words: 700
focus: The pre-Kyivan Slavic tribal unions (Polyany, Drevlyany, Siveriany, etc.), their social structure, spiritual world,
  and the historiographical debates surrounding their origins and interactions.
level: HIST
module: hist-005
objectives:
- Аналізувати походження та розселення східнослов'янських племінних союзів на території України, використовуючи карти та історичні
  джерела
- Критично оцінювати письмові джерела («Повість минулих літ», візантійські хроніки), розпізнаючи упередженість автора
- Пояснювати роль археологічних культур (Лука-Райковецька, Роменська) як джерела інформації про життя та ідентичність племен
- Формулювати аргументовану позицію в історіографічних дебатах (концепт «спільної колиски», відносини «центр-периферія»)
- Пов'язувати давні племінні поділи з сучасним етнографічним та діалектним розмаїттям України
