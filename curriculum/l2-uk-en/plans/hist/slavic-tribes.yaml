content_outline:
- section: Вступ
  points:
  - 'Мова: Єдність у різноманітті — праслов''янська мовна спільність; лінгвістична археологія як доказ нашої автохтонності'
  - Лінгвістична археологія — топоніми (назви річок Прут, Дністер, Псел) як застигла історія прабатьківщини
  words: 1000
- section: Читання
  points:
  - 'Племінна мозаїка: Хто ми і звідки? — локалізація 7 союзів (Поляни, Древляни, Сіверяни, Волиняни, Уличі, Тиверці, Хорвати);
    поняття автохтонності населення'
  - 'Трагедія Дулібів: Пам''ять про Аварів — [!history-bite]: вираз «погибоша аки обри»; жорстокість кочовиків та стійкість
    дулібок; занепад союзу в VII ст.'
  - 'Загадка Білих Хорватів — [!context]: Стільське городище як мегаполіс раннього середньовіччя; міграція частини племені
    на Балкани в VII ст.'
  - 'Втрачений Південь: Уличі та Тиверці — тиск степу (печеніги); місто Пересічень; як наші предки відходили на північ під
    натиском кочовиків'
  - 'Суспільна ієрархія: Від роду до станів — еволюція від патріархального роду до племінних княжінь; роль віча (народних
    зборів)'
  - 'Роль жінки та сім''ї в слов''янському суспільстві — [!myth-buster]: спростування міфу про безправ''я; високий статус
    матері-господині; образи Лади та Дани'
  - 'Духовний світ: Пантеон та обрядовість — Перун, Велес, Дажбог; Збруцький ідол як візуалізація світобудови; сакральний
    простір капищ'
  - 'Обрядовий календар: Колесо року — аграрна магія Коляди, Великодня та Купала; зв''язок ритму життя із землеробським циклом'
  - Священні дерева та тварини — культ дуба (дерево Перуна) та вшанування цілющих джерел; тотемізм (тур, вовк, ведмідь)
  - 'Музика лісів і степів — архаїчні інструменти: гуслі, сопілки, бубни; веснянки та гаївки як найдавніший шар пісенності'
  - Одяг як код — вишивка як апотропеїчна магія (оберіг); скроневі кільця як етнічний маркер різних племен
  - 'Економіка та харчування: Що їли наші предки? — [!history-bite]: раціон без картоплі (ріпа, каші, дичина, риба); підсічно-вогневе
    землеробство'
  - 'Торгові шляхи: Кровоносна система — Шлях із варягів у греки (Дніпро) та Залозний шлях; експорт меду, воску та хутра'
  - Залізо з боліт — видобуток болотної руди; сакралізація ковальського ремесла; як ми виготовляли зброю та реманент
  - 'Археологічні культури: Матеріальний слід — культури Лука-Райковецька та Роменська; тип житла (напівземлянки з піччю-кам''янкою)'
  - 'Кейс-стаді: Облога Іскоростеня — 945 рік: повстання древлян проти Ігоря; реформи княгині Ольги; легенда про птахів та
    спалення міста'
  - 'Змієві вали: Велика слов''янська стіна — [!culture]: легенда про Кожум''яку; грандіозна система фортифікацій для захисту
    від степу'
  - Зброя слов'ян — спорядження воїна (спис, сокира, щит); мечі як символ елітарності та зв'язку з варягами
  - 'Тактика: Невидимки в лісі — партизанські методи війни; вміння ховатися під водою (дихання через очеретину)'
  words: 1000
- section: Деколонізаційний погляд
  points:
  - 'Міфи та реальність — [!decolonization]: розвінчання концепту «спільної колиски»; відмінність вічевих традицій від авторитаризму
    Півночі'
  words: 1000
- section: Первинні джерела
  points:
  - 'Документ 1: "Повість минулих літ" про племена — аналіз уривків про звичаї полян і древлян; «політичне» забарвлення літописних
    характеристик'
  - 'Документ 2: Візантійський погляд на слов''ян — Прокопій Кесарійський та Маврикій Стратег про спосіб життя та військову
    майстерність'
  - 'Документ 3: Арабський мандрівник про русів — Ібн Фадлан про обряди та торгівлю; опис зовнішності та побуту'
  - Короткий огляд ключових думок — слов'яни як активні суб'єкти власної історії
  words: 1000
- section: Потрібно більше практики?
  points:
  - 🔄 Інтеграція знань — створення ментальної карти племінного розселення та зв'язків
  - Реальне застосування — ідентифікація слов'янських мотивів у сучасному дизайні та фольклорі
  - 🌐 Онлайн-ресурси — інтерактивні карти археологічних пам'яток (Енциклопедія історії України)
  words: 1000
vocabulary_hints:
  required:
  - поляни (Polyany) — inhabitants of the fields, Kyiv region; «тихі і покірні» customs in PVL
  - древляни (Derevlyany) — forest dwellers, Polissya region; known for the 945 rebellion against Igor
  - сіверяни (Siveryany) — inhabitants of the Left Bank, Desna and Seym rivers
  - уличі (Ulychi) — southern tribe near the Dnipro and Bug rivers; resisted assimilation longest
  - тиверці (Tyvertsi) — southern tribe near the Dniester and Prut rivers; known as wall-builders («толковини»)
  - волиняни (Volhynians) — inhabitants of Volhynia; successors of the Dulebe union
  - племінний союз (tribal union) — a complex socio-political organization preceding the state
  - данина (tribute) — tax paid in goods (fur, honey, wax) or money (shlyahy)
  - святилище (sanctuary) — a sacred place for pagan rituals and idols (kapyshche)
  - обряд (ritual) — a ceremonial act with religious or symbolic meaning
  - городище (fortified settlement) — the remains of a fortified town (e.g., Iskorosten or Stilsko)
  - літопис (chronicle) — historical record (e.g., The Primary Chronicle / Povist Mynulykh Lit)
  recommended:
  - дуліби (Duleby) — the oldest tribal union in Volhynia; victims of the Avars
  - білі хорвати (White Croats) — inhabitants of the Carpathians; capital in Stilsko megacity
  - Іскоростень (Iskorosten) — capital of the Drevlyans; site of Igor's death and Olga's revenge
  - варяги (Varangians) — Norsemen/Vikings who travelled through Slavic lands
  - ковальство (blacksmithing) — essential craft using marsh ore; mythologized in folklore
  - поховання (burial) — funeral rites, often involving mounds (kurhans) or cremation
  - болотна руда (marsh ore) — primary source of iron for early Slavic tribes in Polissya
  - скроневі кільця (temporal rings) — characteristic female jewellery, primary tribal identifiers
  - підсічно-вогневе землеробство (slash-and-burn agriculture) — primary method of clearing forest for fields
