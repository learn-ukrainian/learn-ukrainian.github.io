content_outline:
- points:
  - 'Провокація: «Gente Ruthenus, natione Polonus» (роду руського, нації польської). Чи могла ця формула об''єднати суспільство,
    чи була вона вироком для руської ідентичності?'
  - Уявіть себе в 1600 році. Ви — православний міщанин, руський шляхтич або селянин-кріпак. Яке ваше майбутнє в Речі Посполитій?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Золота вольність» vs Соціальне гноблення. Польська історіографія акцентує на унікальній шляхетській демократії.
    Українська — на тому, що ця демократія для 10% населення стала причиною повстання решти 90%.'
  - 'Дебат 2: Руська шляхта — зрадники чи заручники ситуації? Дискусія про те, чи була полонізація неминучою платою за збереження
    статусу, чи свідомим вибором.'
  - '[!epistemic-humility] Ми не знаємо точної мотивації кожного князя, що перейшов у католицизм. Джерела (листи, щоденники)
    часто раціоналізують вибір, а не показують справжні причини.'
  - 'Глобальна синхронність: Поки в Речі Посполитій панувала виборна монархія, в Західній Європі зміцнювався абсолютизм (Франція
    Людовіка XIV), а в Англії розгорталася боротьба між королем і парламентом.'
  section: 'Конфліктна карта: Рай для шляхти чи пекло для народу?'
  words: 900
- points:
  - 'Аналіз Третього Литовського статуту (1588): Як юридично оформлювалося кріпацтво? Читаємо статті про розшук «збіглих людей»
    та владу пана над життям селянина.'
  - 'Аналіз привілею на Магдебурзьке право (для Львова чи Києва): Які права отримувало місто? Хто мав доступ до самоврядування
    (патриціат, цехи), а хто був виключений (православні, євреї)?'
  - '[!decolonization] Читаємо «Тренос» Мелетія Смотрицького (1610) не як релігійний текст, а як політичний маніфест проти
    полонізації та деколоніальний плач за втраченою елітою («Де тепер дім Острозьких?..»).'
  - 'Порівняльний аналіз: Як мова закону (суха, безособова) контрастує з емоційною бароковою риторикою Смотрицького, хоча
    вони описують той самий процес?'
  section: 'Джерела: Статут, привілей і плач'
  words: 1600
- points:
  - 'Причинно-наслідковий зв''язок: Як економіка фільварків та експорт зерна до Європи призвели до «другого видання кріпацтва»
    та посилення панщини?'
  - 'Соціальна структура як каталізатор Хмельниччини: Чому неможливість соціального ліфту для талановитих русинів-некатоликів
    та міщан створила вибухонебезпечну ситуацію?'
  - '[!myth-buster] Спростування міфу про «золотий вік» Речі Посполитої для всіх її мешканців. Це був «рай для шляхти, чистилище
    для міщан і пекло для селян».'
  - Виникнення козацтва як альтернативної соціальної структури. Це була військова еліта, що сформувалася поза становою системою
    і кинула їй виклик.
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чи була Річ Посполита «спільною справою»? Студент формулює відповідь, спираючись на аналіз статусу
    шляхти, міщан та селян.'
  - 'Зв''язок із сьогоденням: Як спадщина Речі Посполитої впливає на сучасні українсько-польські відносини? (дискусії про
    «Kresy Wschodnie»).'
  - '[!anti-hagiography] Глибока недовіра до державної влади та інституцій в українській ментальності — чи не є це спадщиною
    часів, коли «держава» була синонімом чужої влади та соціального гніту?'
  section: Дискусія та підсумок
  words: 700
focus: 'Соціальна стратифікація Речі Посполитої: шляхта, міщани, селяни. Полонізація еліт, закріпачення, міське самоврядування
  та їхній вплив на передумови Хмельниччини.'
level: HIST
module: hist-039
objectives:
- Аналізувати соціальну стратифікацію Речі Посполитої, розрізняючи статус шляхти, міщанства та селянства
- Критично оцінювати історіографічні дебати щодо «золотої вольності» та полонізації руської еліти
- Працювати з уривками первинних джерел (Литовський статут, «Тренос»), розрізняючи юридичну та риторичну мову епохи
- Пояснювати, як соціальна структура Речі Посполитої стала однією з ключових передумов Хмельниччини
pedagogy: CBI
