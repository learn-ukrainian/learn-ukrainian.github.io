content_outline:
- points:
  - 'Провокація: Чи може держава бути по-справжньому незалежною, якщо її головна релігійна інституція підпорядкована іншій
    країні, до того ж — агресору? Чому отримання Томосу про автокефалію називають другою — духовною — декларацією незалежності
    України?'
  - 'Фрагмент без контексту: «...ми визнаємо та проголошуємо встановлену, в межах території України, Автокефальну Церкву нашою
    духовною донькою...» — звідки ця цитата і яке її історичне значення?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Українська позиція (та Константинополя): Томос — це відновлення історичної справедливості,
    скасування незаконної анексії Київської митрополії 1686 року. Російська позиція: це неканонічне вторгнення на «канонічну
    територію» РПЦ, що спричинило глобальний «розкол» (раскол).'
  - 'Дебат 2: Внутрішня боротьба в Україні. УПЦ КП та УАПЦ як патріотичні, але невизнані церкви vs УПЦ МП як «канонічний»,
    але де-факто інструмент «русского міра» та просування ідеології «триєдиного народу».'
  - '[!epistemic-humility] Як Москва отримала контроль у 1686? Історики вказують на хабар (соболі та золото) патріарху Діонісію
    IV, але точна природа угоди та ступінь тиску є предметом дискусій. Обидві сторони (Київ і Москва) вибірково цитують канонічне
    право для підтвердження своєї позиції.'
  - 'Глобальна синхронність: Розрив євхаристійного спілкування Москви з Константинополем після Томосу — це акт глобальної
    церковної політики, що ізолював РПЦ від більшості православного світу та посилив її залежність від Кремля.'
  section: 'Конфліктна карта: Відновлення справедливості чи політичний розкол?'
  words: 900
- points:
  - 'Джерело 1 (1686): Грамота патріарха Діонісія IV про передачу Київської митрополії Московському патріархату. Аналіз умов:
    право обирати митрополита в Москві, але він мав згадувати Вселенського патріарха першим. [!decolonization] Як Москва систематично
    порушувала навіть ці умови, перетворюючи митрополію на звичайну єпархію та знищуючи її автономію.'
  - 'Джерело 2 (1991-2018): Звернення українських ієрархів, зокрема Філарета (Денисенка), до Москви та Константинополя з проханням
    про автокефалію. Аналіз реакції: накладення анафеми Москвою як інструмент політичного тиску vs поступове вивчення українського
    питання Константинополем.'
  - 'Джерело 3 (2018): Звернення Президента, Верховної Ради та єпископату до патріарха Варфоломія. Аналіз риторики: наголос
    на «церкві-матері» (Константинополь) та праві на самовизначення.'
  - 'Джерело 4 (2019): Текст Томосу про автокефалію. Аналіз ключових положень: визнання ПЦУ «духовною донькою», визначення
    її юрисдикції в межах України, право на отримання святого мира від Константинополя.'
  section: 'Джерела: Від підпорядкування до незалежності'
  words: 1600
- points:
  - 'Духовна деколонізація: Томос як руйнування одного з ключових стовпів ідеології «русского міра» — міфу про «єдиний духовний
    простір» та «триєдиний народ». Церква перестає бути інструментом імперського впливу.'
  - '[!myth-buster] Міф про «розкол». Російська пропаганда таврує ПЦУ як «розкольників», але сама РПЦ перебувала в самопроголошеній
    автокефалії (фактично, розколі з Константинополем) 141 рік (1448-1589). Томос — це акт подолання розколу, створеного Москвою
    в Україні, а не його причина.'
  - 'Короткострокові наслідки: хвилі переходів парафій від УПЦ МП до ПЦУ (2019 та після 24.02.2022); шалений опір Росії (дипломатичний
    тиск, кібератаки, дезінформація); спроба УПЦ МП мімікрувати під «незалежну» на соборі у Феофанії.'
  - 'Довгострокові наслідки для ідентичності: розвиток капеланства, волонтерства; перехід на Новоюліанський календар як цивілізаційний
    вибір та розрив з «російським світом»; відродження української богословської думки та літургійної мови.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Використовуючи матеріал модуля, сформулюйте аргументовану відповідь: чи був Томос політичним
    проєктом Порошенка, чи закономірним етапом 300-річної боротьби за незалежність?'
  - 'Зв''язок із сьогоденням: Як повномасштабне вторгнення 2022 року вплинуло на релігійну ситуацію в Україні? Чому частина
    громад досі залишається в УПЦ МП, незважаючи на благословення війни патріархом Кирилом?'
  - '[!anti-hagiography] Томос не вирішив усіх проблем. Після його отримання виник конфлікт між митрополитом Епіфанієм та
    патріархом Філаретом. Процес переходу громад подекуди супроводжується конфліктами. Це не «золотий вік», а початок складного
    шляху.'
  section: Дискусія та підсумок
  words: 700
focus: The 2019 Tomos of Autocephaly for the Orthodox Church of Ukraine, the history of Ukrainian Orthodoxy from the 1686
  annexation of the Kyiv Metropolis, the role of the Ecumenical Patriarchate, and the process of spiritual decolonization
  from Moscow.
