objectives:
- Аналізувати історію українського православ’я від підпорядкування Москві до здобуття автокефалії
- Пояснювати ключові аргументи в богословсько-політичній дискусії навколо Томосу
- Критично оцінювати первинні джерела, такі як текст Томосу та історичні грамоти
- Формулювати обґрунтовану позицію щодо ролі церкви у процесах національного самовизначення та деколонізації
