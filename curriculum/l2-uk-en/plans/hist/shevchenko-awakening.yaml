objectives:
- Критично аналізувати різні інтерпретації постаті Шевченка (імперську, радянську, національну)
- Пояснювати роль Шевченка у формуванні модерної української нації та літературної мови
- Інтерпретувати ключові антиколоніальні твори («Сон», «Кавказ», «Заповіт»), розпізнаючи їх політичний підтекст
- Деконструювати поширені міфи та стереотипи щодо біографії та творчості поета
- Аргументовано дискутувати про актуальність спадщини Шевченка в сучасній Україні
