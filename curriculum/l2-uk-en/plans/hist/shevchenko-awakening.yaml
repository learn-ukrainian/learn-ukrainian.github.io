content_outline:
- points:
  - 'Провокація: Кого ви уявляєте, коли чуєте «Тарас Шевченко»? Старого діда у смушевій шапці чи успішного денді, душу петербурзьких
    салонів? Чому імперія століттями насаджувала перший образ?'
  - 'Фрагмент без контексту: «…і на оновленій землі врага не буде, супостата, а буде син, і буде мати, і будуть люде на землі».
    Про що це — пророцтво, політична програма чи поетична мрія?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Національний пророк vs «малоросійський поет». [!decolonization] Українська позиція — Шевченко як творець модерної
    нації та політичної ідеї незалежності. Імперська позиція — регіональний етнографічний співець, що писав «наріччям».'
  - 'Дебат 2: Революціонер-атеїст vs Християнський мислитель. Радянська інтерпретація — «революціонер-демократ», борець із
    царатом та «релігійним опіумом». Пострадянська — глибоко релігійна людина, що мислить біблійними категоріями («пророк»,
    «правда», «воскресіння»).'
  - '[!epistemic-humility] Ми не знаємо, як би еволюціонували погляди Шевченка, якби він не помер у 47. Чи залишився б він
    радикалом, чи став би консерватором?'
  - 'Глобальна синхронність: «Весна народів» 1848 року. Поки Шевченко пише «Заповіт», у Європі вирують національні революції
    — в Угорщині, Італії, Німеччині. Його ідеї — частина загальноєвропейського романтичного націоналізму.'
  section: 'Конфліктна карта: Чий Шевченко?'
  words: 900
- points:
  - 'Першоджерело: Поема «Сон» (1844) — гостра політична сатира на імперію. Аналіз гротескних образів Петра І («ведмідь»)
    та Катерини ІІ («чапля»). Чому саме така візія?'
  - 'Першоджерело: Поема «Кавказ» (1845) — антиколоніальний маніфест. [!decolonization] Аналіз образу Прометея як символу
    незламності та солідарності всіх поневолених народів («Борітеся — поборете!»). Чому присвята Якову де Бальмену, який загинув
    у колоніальній війні?'
  - 'Першоджерело: «Заповіт» (1845) — не просто вірш, а політична програма. Аналіз наказового способу дієслів: «поховайте»,
    «вставайте», «кайдани порвіте».'
  - 'Джерелознавчий аналіз: Щоденник Шевченка. Написаний російською, але сповнений антиімперського духу та огиди до «солдофонства».
    Чому він обрав російську для щоденника?'
  section: 'Джерела: «Кобзар» як зброя'
  words: 1600
- points:
  - 'Наслідок 1: Створення літературної мови. Шевченко синтезував народну мову, церковнослов''янізми та власні неологізми,
    створивши мову, здатну виражати найскладніші філософські та політичні ідеї.'
  - 'Наслідок 2: Формування ідеї модерної нації. До Шевченка — «малороси» як етнічна група. Після — українці як політична
    нація з претензією на власну державу («В своїй хаті своя й правда, і сила, і воля»).'
  - '[!myth-buster] Міф про «селянського поета». Шевченко був академіком гравюри, успішним портретистом, інтелектуалом європейського
    рівня. Зведення його до образу кріпака — це спосіб маргіналізації, винайдений імперією.'
  - 'Оцінки істориків: Микола Костомаров бачив у ньому передусім виразника народного духу. Сучасні історики (Плохій, Снайдер)
    наголошують на його ролі як політичного мислителя та творця антиколоніального дискурсу.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: тож чому «дід у шапці» став домінуючим образом, витіснивши денді-художника? Яким силам це було
    вигідно і навіщо?'
  - '[!anti-hagiography] Культ Шевченка: як жива людина перетворилася на ікону? Обговорення радянської «канонізації» (революціонер,
    атеїст) та пострадянської (батько нації, пророк). Чи не заважає ікона побачити людину?'
  - 'Зв''язок із сьогоденням: Шевченко на барикадах Майдану, у шоломі та бронежилеті на муралах 2022 року. Чому його тексти,
    написані майже 200 років тому, досі звучать як актуальний коментар до новин?'
  section: Дискусія та підсумок
  words: 700
