content_outline:
- points:
  - 'Провокація: Що було складніше для Богдана Хмельницького після 1648 року — перемогти армію Речі Посполитої чи збудувати
    з повстанців, селян та козаків повноцінну державу на визволених землях?'
  - 'Який вибір стояв перед ним: відновити старі руські князівські традиції, скопіювати польську модель чи винайти щось абсолютно
    нове?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська історіографія vs імперська. Чи була Гетьманщина унікальним державним утворенням (теза державницької
    школи), чи лише «бунтівною провінцією» та «селянською анархією» (теза російсько-імперської історіографії)?'
  - 'Дебат 2: Демократія чи автократія? Дискусія щодо природи влади гетьмана. Це була виборна «козацька демократія» чи de
    facto необмежена монархія, що прагнула стати спадковою?'
  - '[!epistemic-humility] Визнання того, що сучасні терміни («демократія», «республіка») не повністю відображають реалії
    XVII століття. Гетьманщина була гібридною моделлю, що еволюціонувала.'
  - 'Глобальна синхронність: Як виникнення Гетьманщини виглядає на тлі тогочасних європейських подій? (Вестфальський мир 1648
    р., Англійська революція, Фронда у Франції).'
  section: 'Конфліктна карта: Держава чи анархія?'
  words: 900
- points:
  - 'Аналіз мови Універсалу Богдана Хмельницького (1650) про захист прав міщан: які інституції згадуються? Як документ конструює
    ідею «народу руського»?'
  - '«Реляція про походження і звичаї козаків» венеційця Альберто Віміни: погляд європейського дипломата на державний устрій,
    суд, освіченість та любов до свободи в козаків.'
  - 'Критика джерела: Хто такий Віміна? З якою місією він прибув до Чигирина? Чи міг він ідеалізувати козаків, щоб протиставити
    їх «зіпсованій» Європі?'
  - '[!decolonization] Читання цих джерел напряму спростовує імперський міф про «безграмотних бунтарів». Вони демонструють
    наявність розвиненої канцелярії, юридичної думки та активної міжнародної дипломатії.'
  section: 'Джерела: Універсали, листи та свідчення іноземців'
  words: 1600
- points:
  - 'Державний апарат: поєднання військової, адміністративної та судової влади в руках гетьмана. Генеральна старшина (писар,
    суддя, підскарбій, обозний) як прототип сучасного уряду.'
  - 'Територіальний устрій: ліквідація польських воєводств та запровадження полково-сотенної системи. Полковник як військовий
    та цивільний голова території.'
  - 'Столиця: Чигирин як політичний, військовий та дипломатичний центр. Резиденція гетьмана, Генеральна військова канцелярія,
    державний архів та скарбниця.'
  - 'Фінанси та право: створення Військового скарбу, до якого йшли податки. Поєднання кодифікованого права (Литовський статут)
    та звичаєвого («як здавна бувало»).'
  - '[!myth-buster] Спростування міфу про «беззаконня» та «право сили». Судова система Гетьманщини була чітко структурована
    (сотенні, полкові, генеральний суди) і базувалася на одній з найпрогресивніших правових систем тогочасної Європи.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює аргументовану відповідь: чи була Гетьманщина хаотичним військовим табором, чи
    складним ранньомодерним державним організмом?'
  - 'Спадщина: Які елементи козацької держави (адміністративні, правові, військові) виявилися найживучішими і вплинули на
    подальшу історію України?'
  - 'Зв''язок із сьогоденням: Як досвід державного будівництва в умовах війни XVII століття резонує із сучасними викликами,
    що стоять перед Україною?'
  - '[!anti-hagiography] Уникаючи ідеалізації: Гетьманщина була суспільством, народженим з війни, з гострими соціальними конфліктами,
    боротьбою за владу та залежністю від зовнішніх союзників.'
  section: Дискусія та підсумок
  words: 700
focus: The administrative, legal, and diplomatic structure of the Hetmanate as an early modern state, challenging the imperial
  myth of Cossack chaos.
level: HIST
module: hist-055
objectives:
- Аналізувати структуру влади та адміністративний устрій Гетьманщини, використовуючи спеціалізовану термінологію
- Розрізняти український державницький та російсько-імперський погляди на природу козацької держави
- Критично оцінювати первинні джерела (універсали, нотатки іноземців), виявляючи упередження автора
- Формулювати аргументовану позицію в дискусії про характер гетьманської влади (демократія vs автократія)
