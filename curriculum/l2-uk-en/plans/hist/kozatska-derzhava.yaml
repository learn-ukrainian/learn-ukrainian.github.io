title: 'Хмельниччина: Козацька держава'
subtitle: 'The Cossack State: Structure and Administration of the Hetmanate'
content_outline:
- section: 'Вступ: Народилася Гетьманщина'
  points:
  - The challenge of state-building after victories — після перемог 1648 року постало
    питання організації влади на визволених землях
  - 'Cossack democracy vs. European legal standards — еволюція від «козацьких вольностей»
    до ідеї суверенної «держави руського народу»; cultural hook: [!context] — Швидкість
    трансформації повстання у повноцінну державу'
- section: 'Структура влади: Гетьман та Генеральна старшина'
  points:
  - The role of the Hetman as head of state — поєднання військової, адміністративної
    та судової влади, фактично монархічні повноваження
  - 'Functions of the General Staff (Scribe, Quartermaster, Judge, Treasurer) — Генеральний
    писар (Іван Виговський) як голова МЗС; cultural hook: [!history-bite] — Генеральна
    старшина як прообраз сучасного Кабінету Міністрів'
- section: 'Адміністративний устрій: Полково-сотенна система'
  points:
  - Merging military and territorial structures — ліквідація воєводств, запровадження
    полків як адміністративних одиниць
  - 'Role of colonels and centurions in local governance — ієрархія: Гетьман -> Полковник
    -> Сотник -> Отаман; cultural hook: [!decolonization] — Порівняння устрою з римськими
    муніципалітетами, а не «анархією»'
- section: 'Чигирин: Серце козацької держави'
  points:
  - Chyhyryn as a European capital — резиденція, архів та скарбниця, попри дерев'яну
    забудову
  - 'Diplomatic etiquette and foreign embassies — прийом послів з Венеції, Москви,
    Туреччини, Швеції; cultural hook: [!quote] — Альберто Віміна про дипломатичний
    рух у Чигирині'
- section: 'Економіка та право: Скарбниця та суди'
  points:
  - Creation of a national financial system — податки (мито, оренда шинків) йдуть
    до Військового скарбу, а не королю
  - 'Cossack justice and the Lithuanian Statute — поєднання звичаєвого права («як
    здавна бувало») та писаного права; cultural hook: [!myth-buster] — Спростування
    міфу про «беззаконня»'
- section: Читання
  points:
  - Analysis of state documents — аналіз мови та змісту Універсалу Богдана Хмельницького
    (1650) про захист прав міщан
- section: Первинні джерела
  points:
  - 'Alberto Vimina''s notes on Chyhyryn — «Реляція про походження і звичаї козаків»:
    погляд іноземця на освіченість та любов до свободи'
- section: 'Деколонізаційний погляд: Державність проти анархії'
  points:
  - Debunking imperial myths of 'Cossack chaos' — протиставлення імперського міфу
    про «селян-втікачів» реальності модерної держави
  - 'The Hetmanate as a mature political project — наявність території, влади, війська,
    податків та дипломатії; cultural hook: [!analysis] — Чому імперії вигідно зображати
    козаків як «розбійників»'
vocabulary_hints:
  required:
  - 'гетьманат (Hetmanate) — держава; collocations: Козацький гетьманат, устрій гетьманату'
  - 'булава (mace) — символ влади; collocations: гетьманська булава, отримати булаву'
  - 'канцелярська (chancellery) — official language; collocations: мова документів,
    генеральна канцелярія'
  - 'полковник (colonel) — head of regiment/territory; collocations: чернігівський
    полковник, влада полковника'
  - 'сотник (centurion) — head of hundred/district; collocations: сотенний устрій,
    наказ сотника'
  - 'скарбниця (treasury) — finances; collocations: Військова скарбниця, поповнення
    скарбниці'
  - 'універсал (universal) — decree; collocations: видати універсал, універсали Хмельницького'
  - 'клейноди (regalia) — state symbols; collocations: військові клейноди, втрата
    клейнодів'
  - 'підскарбій (treasurer) — finance minister; collocations: генеральний підскарбій,
    звіт підскарбія'
  - 'обозний (quartermaster) — logistics/artillery; collocations: генеральний обозний,
    відати артилерією'
  recommended:
  - 'автономія (autonomy) — самоврядування; collocations: політична автономія, широка
    автономія'
  - 'дипломатія (diplomacy) — international relations; collocations: козацька дипломатія,
    гнучка дипломатія'
  - 'суверенітет (sovereignty) — незалежність; collocations: державний суверенітет,
    боротьба за суверенітет'
