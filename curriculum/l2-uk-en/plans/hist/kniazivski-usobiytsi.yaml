content_outline:
- points:
  - 'Провокаційне питання: Чи було роздроблення Київської Русі неминучим «розпадом імперії», чи логічним етапом еволюції до
    європейської моделі «конфедерації королівств»?'
  - 'Візуальний доказ: Порівняння політичних карт Східної Європи 1054 та 1132 років. Що змінилося настільки кардинально?'
  - 'Цитата з літопису без контексту: «Пощо ми губимо Руськую землю, самі проти себе зваду маючи?» — хто, кому і за яких обставин
    міг це сказати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Радянська/імперська історіографія зображувала роздробленість як катастрофу, що «послабила
    Русь» і підготувала ґрунт для домінування Москви. Українська школа (від Грушевського) розглядає це як закономірний процес
    росту регіональних центрів, аналогічний до процесів у Європі.'
  - 'Дебат 2: Лествичне право («рота») vs. отчинне право. Конфлікт між правом старшого в роді (яке мало зберігати єдність)
    та прагненням кожного князя передати землю у спадок синові (що вело до сепаратизму).'
  - '[!epistemic-humility] Літописи писалися на замовлення князів. «Повість временних літ» у редакції 1113 року просуває ідеологію
    єдності під егідою Мономаха. Чи можемо ми довіряти їй як об''єктивному джерелу?'
  - 'Глобальна синхронність: Політична роздробленість Русі ХІІ ст. порівняно з феодальними процесами у Священній Римській
    імперії та Франції Капетингів. Чи була Русь унікальною?'
  section: 'Конфліктна карта: Єдність проти суверенітету'
  words: 900
- points:
  - 'Першоджерело 1: «Повість временних літ» про Любецький з''їзд 1097 року. Аналіз ключової постанови: «Кожен хай держить
    отчину свою». Де-юре легалізація поділу.'
  - '[!decolonization] Літописний епізод про засліплення Васика Теребовлянського одразу після з''їзду. Читання джерела «проти
    шерсті»: з''їзд був не актом єднання, а спробою зафіксувати статус-кво, яка одразу провалилася через брутальну реальну
    політику.'
  - 'Першоджерело 2: «Повчання» Володимира Мономаха. Аналіз образу ідеального християнського правителя: «Не проминіть ніколи
    людину, не привітавши її...». Як цей моральний кодекс співіснував із політичною жорстокістю?'
  - 'Економічні джерела: зростання регіональних столиць (Чернігів, Галич, Полоцьк) як економічна основа сепаратизму. Вони
    більше не потребували Києва як єдиного центру торгівлі та влади.'
  section: 'Джерела: Слово літописця і воля князя'
  words: 1600
- points:
  - 'Короткострокові наслідки: Тимчасова консолідація під час правління Мономаха, успішні спільні походи проти половців (1103,
    1111). Але після його смерті (1125) розпад прискорився.'
  - 'Довгострокові наслідки: Формування самостійних політичних, економічних та культурних центрів, що стали основою сучасної
    України (Київ, Чернігів, Галич). Послаблення центральної влади, що зробило Русь вразливою до монгольської навали у ХІІІ
    ст.'
  - '[!myth-buster] Міф про «феодальну анархію». Роздробленість не означала культурний занепад. Навпаки, це був час розквіту
    архітектури (Михайлівський Золотоверхий собор), літописання та зростання міст.'
  - 'Порівняння оцінок: Грушевський бачив у цьому процесі «федералізацію», радянські історики — «феодальну роздробленість»,
    а сучасні історики (Плохій) — «кінець єдності» та народження кількох східнослов''янських націй.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, роздробленість — це трагедія чи еволюція? Студент має сформулювати власну аргументовану
    відповідь, спираючись на джерела та історіографічні дебати з модуля.'
  - 'Зв''язок із сьогоденням: Як ідея «федералізації» використовується в сучасній політичній риториці щодо України? Чому досвід
    Русі ХІІ століття є важливим для розуміння ризиків та переваг сильної центральної влади vs. регіональної автономії?'
  - '[!anti-hagiography] Деконструкція образу «золотого віку» єдності. Чи не була «єдність» за Ярослава Мудрого просто ефективним
    правлінням одного сюзерена, а не глибокою внутрішньою єдністю земель?'
  section: Дискусія та підсумок
  words: 700
focus: Causes and consequences of Kyivan Rus fragmentation, the Liubech Congress (1097), conflict between the rota system
  and patrimony, Volodymyr Monomakh's reign, and decolonizing the "collapse" narrative.
level: HIST
module: hist-017
objectives:
- Аналізувати ключові причини політичної роздробленості Київської Русі, розрізняючи внутрішні та зовнішні фактори
- Критично оцінювати рішення Любецького з'їзду 1097 року та їхні реальні наслідки, використовуючи літописні джерела
- Порівнювати різні історіографічні підходи (український, радянський/імперський) до оцінки періоду роздробленості
- Деконструювати міф про «феодальну анархію», аргументуючи наявність культурного та економічного розвитку в регіональних центрах
