slug: syntez-vytoky-1
version: '2.0'
title: 'Синтез: Від Трипілля до Києва'
subtitle: 'Synthesis: From Trypillia to Kyiv'
content_outline:
- section: Огляд періоду
  points:
  - Глобальне перехрестя та економічний двигун — Україна як міст між Сходом/Заходом
    та Лісом/Степом; чорнозем як трипільський спадок
  - 'Хронологія синтезу — Від Трипілля (5400 до н.е.) до Антів (IV ст. н.е.) і Русі
    (882); [!context] Глобальна синхронізація: заснування Києва (482) vs падіння Риму
    (476)'
- section: Ключові теми
  points:
  - Мовна археологія та концепція плавильного котла — іранізми в мові (Бог, рай, собака);
    [!myth-buster] Спростування міфу про 'Спільну колиску' та 'єдиний народ'
  - Етногенез — автохтонний розвиток на слов'янській основі з асиміляцією скіфських/сарматських
    елементів
- section: Первинні джерела
  points:
  - Зіставлення свідчень Геродота та Прокопія — Скіфія (IV ст. до н.е.) vs Анти (VI
    ст. н.е.); [!quote] Прокопій про 'народоправство' та відсутність єдиного правителя
- section: 'Текст: Тяглість у сьогодення'
  points:
  - Як давня історія впливає на сучасну ідентичність — [!decolonization] Ми не 'молода
    нація'; спадок вільної людини (скіфи) та громади (анти)
  - Ментальність — індивідуалізм ('хуторянство') плюс здатність до самоорганізації
    (Майдан/Віче)
- section: Підсумкове есе
  points:
  - Аналіз демократичних традицій — лінія Віче -> Козацька рада -> Сучасне волонтерство;
    [!history-bite] Тактика 'випаленої землі' від скіфів до сьогодення
- section: 'Словник епохи: Витоки'
  points:
  - Цивілізаційна та політична лексика — [!culture] 'Віче' як коріння антських зборів
- section: Підсумок
  points:
  - Загальні висновки етапу 'Витоки' — Україна як центр цивілізаційного синтезу, а
    не 'окраїна'
- section: Потрібно більше практики?
  points:
  - Ресурси для самостійного поглиблення знань — лекції Тімоті Снайдера, віртуальні
    тури музеями трипільської культури
vocabulary_hints:
  required:
  - автохтонність (autochthony) — корінне походження, протиставлення міграційним теоріям
  - тяглість (continuity) — безперервність історичного процесу від Трипілля до сьогодення
  - суб'єктність (subjectivity/agency) — здатність творити власну історію, не бути
    об'єктом імперій
  - синтез (synthesis) — поєднання різних культурних елементів (осілих і кочових)
    у нову якість
  - народоправство (democracy/folk-rule) — давня назва демократії, вживана Прокопієм
    щодо антів
  - цивілізація (civilization) — у контексті трипільської протоміської культури
  - деколонізація (decolonization) — процес позбавлення від імперських наративів
  - ідентичність (identity) — усвідомлення себе як частини окремої історичної спільноти
  recommended:
  - віче (assembly/veche) — народні збори, орган прямої демократії
  - етногенез (ethnogenesis) — процес походження та формування народу
  - плавильний котел (melting pot) — метафора змішування культур
  - кочівники (nomads) — скіфи, сармати та інші степові народи
