content_outline:
- points:
  - 'Провокація: Історія України — це 30 років, 300 чи 3000? Що як заснування Києва було не початком, а наслідком тисячолітніх
    процесів?'
  - '[!quote] Фрагмент без контексту: "Ці племена... не підкоряються одній людині, але з давніх-давен живуть у народоправстві".
    Про кого це і про яку епоху?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Теорія ''спільної колиски'' vs концепція автохтонного розвитку. Чи є українці ''молодшим братом'', чи народом,
    що безперервно розвивався на своїй землі?'
  - 'Дебат 2: Характер синтезу. Це був мирний ''плавильний котел'' культур чи насильницька асиміляція кочових елементів (скіфів,
    сарматів) осілою слов''янською основою?'
  - '[!epistemic-humility] Археологічні дані дають змогу стверджувати про тяглість матеріальної культури, але мовна та етнічна
    ідентичність — це інтерпретації, що спираються на непрямі докази.'
  - 'Глобальна синхронність: Падіння Західної Римської імперії (476 р.) та початок формування антського союзу племен; заснування
    Києва (кінець V ст.) як частина загальноєвропейського процесу виникнення нових політичних центрів на руїнах старих імперій.'
  section: 'Конфліктна карта: ''Спільна колиска'' чи автохтонний розвиток?'
  words: 900
- points:
  - 'Джерело 1: "Історії" Геродота (V ст. до н.е.). Аналіз опису Скіфії: побут, вірування, військова тактика ("випалена земля"),
    торгівля з грецькими полісами.'
  - 'Джерело 2: "Війни" Прокопія Кесарійського (VI ст. н.е.). Читання уривків про антів та склавинів: їхній демократичний
    устрій ("народоправство"), індивідуалізм, військові навички.'
  - 'Критичний аналіз джерел: Хто такі Геродот і Прокопій? Як їхнє греко-римське походження та імперський погляд вплинули
    на опис "варварських" народів?'
  - '[!decolonization] Читаємо імперські джерела "проти шерсті". Як за зневажливим тоном римського чиновника побачити риси
    українського національного характеру: волелюбність, здатність до самоорганізації, індивідуалізм.'
  section: 'Джерела: Свідчення Геродота та Прокопія'
  words: 1600
- points:
  - 'Короткострокові наслідки: Постійний синтез осілих та кочових культур створював унікальну, але нестабільну соціально-політичну
    структуру.'
  - 'Довгострокові наслідки: Формування "архетипу" вільної людини-власника, що покладається на себе ("хуторянство"), але здатен
    до самоорганізації перед зовнішньою загрозою (Віче, Козацька рада, Майдан).'
  - '[!myth-buster] Спростування міфу про "молоду націю". Історична тяглість від античності доводить, що українська державницька
    традиція та ідентичність мають глибоке коріння, що сягає тисячоліть.'
  - 'Оцінки істориків: Як Грушевський, Субтельний та Плохій по-різному трактують значення докнязівського періоду для формування
    української нації?'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Спираючись на джерела та аргументи, студент формулює відповідь на питання, коли починається історія
    України.'
  - 'Зв''язок із сьогоденням: Як глибокі історичні традиції народоправства та самоорганізації проявляються в сучасному українському
    суспільстві, зокрема у волонтерському русі та спротиві агресії?'
  - '[!anti-hagiography] Чи не ідеалізуємо ми "демократичність" антів та скіфів? Аналіз соціального розшарування, ролі рабства
    та постійних міжусобних конфліктів у цих суспільствах.'
  section: Дискусія та підсумок
  words: 700
focus: 'Історична тяглість на українських землях: від Трипілля та Антів до Русі. Аналіз концепції "плавильного котла" та спростування
  імперського міфу про "спільну колиску".'
level: HIST
module: hist-008
objectives:
- Аналізувати тяглість цивілізаційного розвитку на українських землях від античності до середньовіччя
- Пояснювати концепцію України як "плавильного котла" культур на основі першоджерел
- Аргументовано спростовувати імперські міфи про "молоду націю" та "спільну колиску"
- Критично оцінювати значення давніх демократичних традицій для сучасної української ідентичності
