objectives:
- Аналізувати комплекс соціальних, економічних, релігійних та політичних причин, що призвели до Хмельниччини
- Розрізняти довгострокові причини повстання та безпосередній привід (casus belli), оцінюючи роль особистого фактора
- Критично порівнювати різні історіографічні інтерпретації Хмельниччини (національно-визвольна війна, громадянська війна,
  революція)
- Працювати з першоджерелами, аналізуючи мову скарг та маніфестів XVII століття для реконструкції світогляду епохи
