content_outline:
- points:
  - 'Провокативне питання: Чи могла особиста образа однієї людини — Богдана Хмельницького — справді спричинити національну
    революцію, що змінила карту Європи?'
  - 'Цитата-загадка: "Шабля є у вас при боці..." — кому належать ці слова і як вони могли бути витлумачені козацькою старшиною
    як дозвіл на повстання?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хмельниччина — це національно-визвольна війна українського народу чи громадянська війна всередині Речі Посполитої?
    Аналіз аргументів обох сторін.'
  - 'Дебат 2: "Золотий спокій" (1638-1648) — період стабільності в польській історіографії vs "десятиліття найтяжчого гніту"
    в українській. Чиї оцінки ближчі до істини?'
  - '[!epistemic-humility] Визнання, що терміни "нація" та "держава" мали інше значення в XVII ст., що ускладнює однозначну
    класифікацію конфлікту.'
  - 'Глобальна синхронність: Початок Хмельниччини (1648) збігається із закінченням Тридцятилітньої війни в Європі (Вестфальський
    мир) та Англійською революцією. Це частина загальноєвропейської "кризи XVII століття".'
  section: 'Конфліктна карта: Війна чи повстання?'
  words: 900
- points:
  - 'Аналіз фрагментів з Літопису Самовидця: опис "нестерпних кривд", що чинилися козакам, яких трактували "гірше за турецьких
    невільників".'
  - 'Читання уривків з ранніх універсалів Богдана Хмельницького: як особиста трагедія (напад Чаплинського на Суботів) подається
    як символ загального беззаконня та гніту.'
  - 'Критика джерел: Хто був автором літописів? З якою метою писалися універсали — для мобілізації народу чи для виправдання
    перед іноземними монархами?'
  - '[!decolonization] Розгляд скарг не як бунту "черні", а як вимог політичного народу (козацтва) відновити свої давні права
    та вольності, що є актом державотворчого мислення.'
  section: 'Джерела: Скарги та універсали'
  words: 1600
- points:
  - 'Соціально-економічний вибух: Поширення кріпацтва та панщини на нові території, обмеження козацького реєстру "Ординацією"
    1638 року, що перетворювало вільних воїнів на кріпаків.'
  - 'Релігійний та національний гніт: Наслідки Берестейської унії, дискримінація православної церкви, полонізація еліт, що
    залишила народ "обезголовленим".'
  - 'Політична криза Речі Посполитої: Слабкість королівської влади проти "шляхетської анархії". Король не міг захистити своїх
    підданих від свавілля магнатів.'
  - '[!myth-buster] Розвінчання міфу про "сильну Польщу" того періоду. В реальності це була держава, паралізована "правом
    вето" та магнатськими усобицями.'
  - '[!myth-buster] Деконструкція імперського наративу про "віковічне прагнення до возз''єднання з Росією". У 1648 році Хмельницький
    шукав союзу з Кримським ханством та Туреччиною, а не з Москвою.'
  section: 'Аналіз: Причини та передумови'
  words: 1600
- points:
  - 'Повернення до розминки: Студент формулює аргументовану відповідь — наскільки повстання було зумовлене об''єктивними причинами,
    а наскільки особистим фактором Хмельницького?'
  - 'Ширше питання: Чи може справедлива війна за свободу спиратися на союз із агресивним сусідом (Кримським ханством)? Етичні
    дилеми лідера повстання.'
  - '[!anti-hagiography] Уникнення ідеалізації. Хмельниччина супроводжувалася величезним насильством з усіх боків, включно
    з єврейськими погромами та жорстокими розправами над шляхтою.'
  - 'Зв''язок із сьогоденням: Як досвід Хмельниччини впливає на сучасне розуміння української державності, боротьби за незалежність
    та вибору геополітичних союзників?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз причин Хмельниччини через призму історіографічних дебатів (національно-визвольна війна vs. громадянська), критики
  першоджерел (універсали, хроніки) та деколонізаційної оптики, що розвінчує імперські міфи.
