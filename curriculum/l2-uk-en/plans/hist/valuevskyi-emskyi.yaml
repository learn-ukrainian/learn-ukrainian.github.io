content_outline:
- points:
  - 'Провокація: Російська імперія XIX ст. — одна з найпотужніших у світі. Чому вона так панічно боялася українського перекладу
    Євангелія та кількох освітніх гуртків? Яку екзистенційну загрозу несла українська мова для «єдиної та неділимої» імперії?'
  - Уявіть себе цензором. Вам на стіл лягає рукопис. Як визначити, чи це «малоросійське наріччя» (дозволено з обмеженнями)
    чи вже «сепаратистська» українська мова (заборонено)?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Заборони — це ситуативна реакція на Січневе повстання 1863 року, щоб не допустити «польської інтриги» серед
    селян (офіційна версія імперії) чи це довготривала, продумана стратегія лінгвоциду, що лише використала повстання як привід
    (погляд української історіографії)?'
  - 'Дебат 2: Чи були заборони ефективними? Позиція 1: Так, вони загальмували розвиток нації на десятиліття, відкинувши її
    в «етнографічну масу». Позиція 2: Ні, вони лише радикалізували рух, перетворивши культурників на політиків і прискоривши
    створення «Галицького П''ємонту».'
  - '[!epistemic-humility] Ми не маємо стенограм розмов у кабінеті міністра Валуєва. Історики реконструюють логіку імперії
    на основі її дій та офіційних документів, але справжні мотиви (страх, ксенофобія, раціональний розрахунок) залишаються
    предметом інтерпретації.'
  - 'Глобальна синхронність: Політика Російської імперії щодо українців у порівнянні з політикою Великої Британії щодо ірландської
    мови, Німеччини щодо польської, та Османської імперії щодо слов''янських мов на Балканах.'
  section: 'Конфліктна карта: «Польська інтрига» чи свідома асиміляція?'
  words: 900
- points:
  - 'Першоджерело 1: Таємний циркуляр міністра внутрішніх справ Петра Валуєва (1863). Аналіз ключової фрази: «...никакого
    особеннаго малороссійскаго языка не было, нѣтъ и быть не можетъ». Що означає «не може бути» в логіці імперської бюрократії?'
  - 'Ключові пункти циркуляра: заборона друку релігійної, освітньої та наукової літератури. Формальний дозвіл на «красне письменство».
    Чому така вибірковість? [!decolonization] Це спроба загнати мову в «гетто» побутового, селянського вжитку, позбавивши
    її високих стилів.'
  - 'Першоджерело 2: Емський указ Олександра ІІ (1876). Підписаний на курорті в Німеччині — аналіз тотальності заборон: заборона
    імпорту книг, театральних вистав, концертів, текстів до нот. Навіть пісні на сцені.'
  - 'Інтрига та донос: роль «сірого кардинала» Михайла Юзефовича та його меморандуму «О так называемом украинофильском движении».
    Як представник місцевої еліти став інструментом репресій?'
  section: 'Джерела: Читаємо мовою оригіналу — мовою указів'
  words: 1600
- points:
  - 'Короткострокові наслідки: руйнування громадівського руху, еміграція діячів (Драгоманов), перенесення центру видавничої
    діяльності до Галичини («Галицький П''ємонт»).'
  - 'Довгострокові наслідки: формування «комплексу меншовартості», розрив між усною мовою народу та високою культурою, гальмування
    процесу націєтворення на Наддніпрянщині.'
  - '[!myth-buster] Міф: заборони були тотальними і ніхто нічого не друкував. Реальність: існували шпарини (художня література,
    публікації в Галичині, підпільний друк), але вони не могли замінити повноцінного культурного ринку. Заборони — це створення
    максимально несприятливих умов.'
  - '[!decolonization] Термінологічна війна: імперія нав''язує термін «малоруське наріччя», український рух утверджує поняття
    «українська мова». Це не філологічна дискусія, а політична боротьба за право на існування.'
  - Оцінка істориків: порівняння поглядів Ореста Субтельного («заборони паралізували український рух») та Івана Лисяка-Рудницького
      («заборони стимулювали перехід від романтизму до політичного реалізму»).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, чому імперія боялася мови? Студент формулює відповідь, використовуючи докази з модуля (страх
    сепаратизму, руйнування міфу про «триєдиний народ», втрата контролю над свідомістю мас).'
  - 'Питання для дискусії: Чи можна вважати політику лінгвоциду формою геноциду? Аргументи «за» і «проти» з посиланням на
    міжнародне право та історичний контекст.'
  - '[!anti-hagiography] Уникнення ідеалізації спротиву. Поряд із героями (Драгоманов) були і колаборанти (Юзефович), і ті,
    хто мовчки пристосувався. Спротив не був монолітним.'
  - 'Зв''язок із сьогоденням: Як сучасна політика РФ щодо української мови на окупованих територіях продовжує, наслідує або
    відрізняється від логіки Валуєвського циркуляра та Емського указу?'
  section: Дискусія та підсумок
  words: 700
