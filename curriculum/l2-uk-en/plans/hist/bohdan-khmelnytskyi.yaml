objectives:
- Аналізувати ключові події та наслідки Хмельниччини, розрізняючи історичні факти та ідеологічні міфи
- Критично оцінювати історичні джерела (листи, промови, універсали), визначаючи їхню мету та упередженість
- Порівнювати різні історіографічні інтерпретації постаті Богдана Хмельницького (від радянської до сучасної української)
- Формулювати аргументовану позицію щодо ролі Хмельницького в українській історії та його впливу на сьогодення
