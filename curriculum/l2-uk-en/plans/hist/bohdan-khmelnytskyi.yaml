content_outline:
- points:
  - 'Провокаційне питання: Богдан Хмельницький — український Джордж Вашингтон, що заснував державу, чи Олівер Кромвель, що
    розв''язав криваву революцію? Чи можливе однозначне визначення?'
  - 'Вступний епіграф: «Виб''ю з лядської неволі руський народ увесь!» — хто, кому і за яких обставин міг сказати ці слова
    у XVII столітті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!decolonization] Переяславська рада 1654 року — «возз''єднання» братніх народів (радянська/російська версія)
    чи тимчасовий військовий союз для здобуття суверенітету (сучасна українська інтерпретація)?'
  - 'Дебат 2: Хмельницький в українській пам''яті — «батько нації» та «Мойсей» у козацьких літописах vs «проклятий Богом і
    людьми» і «зрадник» у раннього Шевченка. Чому такі полярні оцінки?'
  - '[!epistemic-humility] Ми не маємо повного тексту Переяславської угоди, лише її московські копії-переклади. Історики досі
    сперечаються про справжній зміст домовленостей.'
  - 'Глобальна синхронність: Хмельницький як «український Кромвель». Обидва очолили революції, стратили своїх монархів (Карла
    І та, опосередковано, польського короля), встановили республіканські диктатури і померли, залишивши свої країни у стані
    хаосу.'
  section: 'Конфліктна карта: Між ''возз''єднанням'' та зрадою'
  words: 900
- points:
  - 'Аналіз промови до Адама Киселя (Київ, лютий 1649): «Я маленький і незначний чоловік, але це Бог дав мені, що я є єдиновладцем
    і самодержцем руським». Як ця заява змінює уявлення про початкові цілі повстання?'
  - 'Лист до шведського короля Карла X Густава (1656): обговорення «чесних альянсів» та спільного фронту проти Польщі. Демонстрація
    незалежної зовнішньої політики всупереч волі Москви.'
  - 'Первинне джерело конфлікту: відповідь короля Владислава IV на скаргу Хмельницького щодо рейду Чаплинського: «Маєш шаблю
    при боці — тож скористайся нею». Як ця фраза легітимізувала збройне повстання в очах шляхтича?'
  - '[!decolonization] Читання універсалів Хмельницького. Аналіз риторики — він звертається до «народу руського», створюючи
    модерну політичну націю на основі козацтва та православної віри, а не лише як лідер військового стану.'
  section: 'Джерела: Слово і шабля гетьмана'
  words: 1600
- points:
  - 'Наслідок 1: Створення Гетьманщини. Детальний розгляд адміністративної системи (полки та сотні), незалежної фінансової
    системи, «козакизації» селян та фактичного скасування кріпацтва на підконтрольних територіях.'
  - 'Наслідок 2: Зміна геополітичного балансу в Східній Європі. Перетворення козацтва на суб''єкт міжнародних відносин, що
    змусило Австрію, Туреччину, Швецію та Москву рахуватися з новою силою. Чигирин як дипломатична столиця.'
  - 'Причини успіху: військовий геній Хмельницького (стратегія засідок, психологічний тиск, використання татарської кінноти)
    та його освіта (знання латини, риторичні навички з єзуїтського колегіуму, досвід турецького полону).'
  - '[!myth-buster] Спростування міфу про те, що повстання було ретельно спланованою національно-визвольною війною з самого
    початку. Аналіз показує, що воно виросло зі спонтанного вибуху через особисту кривду (конфлікт із Чаплинським) і лише
    згодом набуло державницького масштабу.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, Хмельницький — Вашингтон чи Кромвель? Студент має сформулювати власну аргументовану відповідь,
    спираючись на матеріали модуля.'
  - '[!anti-hagiography] Уникаючи «золотої легенди»: які негативні наслідки мало повстання? Обговорення початку громадянської
    війни (Руїни), величезних людських втрат, єврейських погромів та остаточної втрати єдності з Річчю Посполитою.'
  - 'Зв''язок із сьогоденням: Як досвід Гетьманщини та Переяславської угоди впливає на сучасні українські дебати про суверенітет,
    зовнішню політику та відносини з Росією?'
  - 'Ширше питання: Чи може одна людина змінити хід історії? Оцінка ролі особистості Богдана Хмельницького в українській історії.'
  section: Дискусія та підсумок
  words: 700
focus: Bohdan Khmelnytsky as a historical figure, state-builder, diplomat, and controversial leader. Analysis of the Khmelnytsky
  Uprising, the creation of the Hetmanate, and the Pereyaslav Agreement.
