slug: pacyfikatsiia
version: '2.0'
title: 'Пацифікація: Поляки в Галичині'
subtitle: 'Pacification: Polish Repressions in Galicia'
focus: history
pedagogy: CBI
phase: HIST.10 [Soviet Terror]
word_target: 5000
objectives:
- Учень може описати пацифікацію 1930 року
- Учень може пояснити причини та методи репресій
- Учень може проаналізувати українсько-польські відносини в міжвоєнний період
- Учень може оцінити наслідки пацифікації
content_outline:
- section: 'Вступ: «Мирне» насильство'
  points:
  - Що таке «пацифікація»? Парадокс назви — походить від лат. *pacificatio* (умиротворення); цинічний евфемізм для каральної
    експедиції; [!myth-buster]
  - 'Вересень-листопад 1930 року — активна фаза 16 вересня — 30 листопада; ініційована особистим наказом Пілсудського, виконання:
    Феліціян Славой-Складковський'
  - 'Галичина під польською владою — охоплення трьох воєводств: Львівського, Станіславівського, Тернопільського'
  words: 850
- section: Причини та контекст
  points:
  - Українці в Другій Речі Посполитій — найбільша меншина (5 млн); порушення зобов'язань 1923 року щодо автономії; [!context]
  - Дискримінація та невдоволення — політика колонізації (осадники) та полонізації шкіл (Lex Grabski 1924)
  - 'Саботажні акції ОУН — літо-осінь 1930: тактика «перманентної революції», підпали маєтків, пошкодження ліній зв''язку
    як відповідь на окупацію'
  - Реакція польської влади — використання саботажу як приводу для колективного покарання всього українського населення перед
    виборами («вибори Берестейські»)
  words: 850
- section: Хід пацифікації
  points:
  - Військові операції проти сіл — введення підрозділів поліції та кавалерії; оточення сіл
  - Масові побиття та арешти — публічні екзекуції (25-50 ударів); примус співати польський гімн або кричати «Haj żyje marszałek
    Piłsudski!»; [!history-bite]
  - Знищення майна — зривання дахів/підлог під приводом «ревізії»; заливання продуктів (борошна, цукру) гасом або змішування
    з піском
  - Закриття українських інституцій — атака на «Просвіту», кооперативи (гасло «Свій до свого по своє» як загроза), спортклуби
    «Луг»/«Сокіл»; нищення портретів Шевченка; [!culture]
  - 'Масштаб репресій: статистика — охоплено 450+ сіл (16 повітів); 1739 арештів (30 екс-послів); до 35 вбитих; тисячі побитих'
  words: 850
- section: Первинні джерела
  points:
  - 'Свідчення постраждалих — спогади Зофії Микитів (поліціянт: «Czemu... nie mówisz po polsku?») та Ольги Мадзьопи; [!quote]'
  - Доповіді польської влади — офіційне виправдання «вилученням зброї» та боротьбою з «бандитизмом»
  - Протести Ліги Націй — створення «Комітету трьох»; публікація «Чорної книги» (1931); резонанс у Manchester Guardian завдяки
    Мілені Рудницькій
  words: 850
- section: Деколонізаційний погляд
  points:
  - 'Польський наратив: «наведення порядку» — імперський міф про законну поліційну операцію; [!decolonization]'
  - 'Український погляд: колоніальне насильство — державний терор; принцип колективної відповідальності; культурний вандалізм
    (паралелі з британськими/французькими колоніальними практиками)'
  - Радикалізація українського руху — крах легальних методів боротьби (УНДО); зростання популярності ОУН серед молоді
  words: 850
- section: 'Підсумок: Наслідки'
  points:
  - Ескалація конфлікту — поглиблення прірви між народами; неможливість діалогу («тільки бидло, а не нація»)
  - 'Шлях до трагедії Волині — історичний урок: насильство 1930-х породило криваву відповідь 1940-х'
  - Уроки для українсько-польських відносин — визнання травми як шлях до примирення
  words: 750
vocabulary_hints:
  required:
  - пацифікація (pacification) — часто вживається в іронічному контексті («так звана пацифікація»), «умиротворення» як евфемізм
  - репресії (repressions) — масові репресії, політичні репресії, каральна акція
  - дискримінація (discrimination) — національна дискримінація, систематична дискримінація, права меншин
  - саботаж (sabotage) — акти саботажу, саботажна акція ОУН, «перманентна революція»
  - арешт (arrest) — масові арешти, безпідставний арешт, «ревізія»
  - побиття (beating) — жорстоке побиття, публічне побиття, екзекуція
  - інституція (institution) — українські інституції, культурні інституції, кооперативи, читальні «Просвіти»
  - радикалізація (radicalization) — радикалізація молоді, політична радикалізація, відповідь на терор
  recommended:
  - Річ Посполита (Polish Republic) — Друга Річ Посполита (міжвоєнна Польща), санаційний режим
  - меншина (minority) — національна меншина, права меншин, українська громада
  - Ліга Націй (League of Nations) — скарга до Ліги Націй, комісія Ліги Націй, «Комітет трьох»
  - протест (protest) — міжнародний протест, хвиля протестів, Manchester Guardian
  - ескалація (escalation) — ескалація насильства, ескалація конфлікту, спіраль насильства
  - конфлікт (conflict) — міжнаціональний конфлікт, польсько-український конфлікт, етнічна чистка
