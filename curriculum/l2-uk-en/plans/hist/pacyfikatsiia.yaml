content_outline:
- points:
  - 'Провокація: Слово «пацифікація» походить від латинського *pacificatio* — умиротворення. Чому ж тоді для українців Галичини
    воно стало синонімом державного терору? Чи може «мир» бути знаряддям насильства?'
  - 'Фрагмент свідчення без контексту: «Поліціянт спитав, чому не розмовляю польською. Я не встигла відповісти, як він ударив
    мене батогом...» — Що це: побутовий конфлікт чи частина більшої трагедії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Офіційна позиція Польщі vs українська інтерпретація. Чи була пацифікація легітимною поліційною операцією у відповідь
    на саботаж ОУН, чи це був заздалегідь спланований акт колоніального терору з використанням принципу колективної відповідальності?'
  - 'Дебат 2: Стратегічна (не)доцільність дій ОУН. Чи справді «перманентна революція» та підпали маєтків були ефективним методом
    боротьби, чи вони лише дали Варшаві ідеальний привід для розгрому всього українського громадського життя перед виборами?'
  - '[!epistemic-humility] Точна кількість жертв та масштаби знищень досі є предметом дискусій. Офіційні польські звіти применшували
    масштаби, тоді як українські джерела могли їх перебільшувати для міжнародного резонансу. Істина лежить у критичному порівнянні
    обох.'
  - 'Глобальна синхронність: Як польська політика щодо українців у 1930-х роках виглядала на тлі поводження з національними
    меншинами в інших авторитарних режимах Європи того часу (напр., Італія, Угорщина, Румунія)?'
  section: 'Конфліктна карта: Саботаж чи привід для терору?'
  words: 900
- points:
  - 'Аналіз спогадів жертв: читання уривків зі свідчень Зофії Микитів та Ольги Мадзьопи. Як деталі (зривання підлог, заливання
    борошна гасом, примус співати гімн) розкривають мету — не «знайти зброю», а принизити та знищити основи життя?'
  - 'Критика офіційних звітів: читання доповіді Феліціяна Славоя-Складковського. Які евфемізми він використовує? Як виправдовує
    насильство? [!decolonization] Читаємо імперський документ «проти шерсті», шукаючи те, про що він мовчить.'
  - 'Міжнародний резонанс: вивчення фрагментів зі статті у Manchester Guardian, ініційованої Міленою Рудницькою, та звітів
    для Ліги Націй («Чорна книга»). Як зовнішній погляд змінює оптику?'
  - 'Археологія терору: Фотографії зруйнованих читалень «Просвіти», понівечених портретів Шевченка. Що говорить про цілі акції
    знищення саме культурних символів?'
  section: 'Джерела: Свідчення очевидців та документи епохи'
  words: 1600
- points:
  - 'Короткострокові наслідки: розгром легальних українських партій (УНДО), посилення позицій інтегральних націоналістів (ОУН).
    Чому терор призвів не до підкорення, а до радикалізації?'
  - 'Довгострокові наслідки: Пацифікація як етап у спіралі насильства, що призвела до трагедії Волині 1943 року. Аналіз причинно-наслідкового
    зв''язку: чи була б можливою Волинь без досвіду пацифікації?'
  - '[!myth-buster] Спростування міфу про те, що пацифікація була спрямована виключно проти «терористів» ОУН. Статистика (450
    сіл, тисячі побитих, атаки на кооперативи та школи) доводить, що це був удар по всьому українському суспільству.'
  - 'Оцінки істориків: порівняння поглядів Яна Томаша Гросса, Тімоті Снайдера та Ярослава Грицака на місце пацифікації в історії
    польсько-українських відносин.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Спираючись на джерела та аналіз, дайте власну розгорнуту відповідь: чому «умиротворення» стало
    синонімом терору і як використання евфемізмів стає інструментом імперської політики?'
  - 'Ширше питання: Як колективна травма, подібна до пацифікації, впливає на історичну пам''ять нації? Чи може така травма
    бути «вилікувана»?'
  - '[!anti-hagiography] Критична оцінка відповіді українського підпілля. Чи всі дії ОУН були виправданими? Де межа між боротьбою
    за свободу та провокацією, що наражає на небезпеку цивільне населення?'
  - 'Зв''язок із сьогоденням: Уроки пацифікації для сучасних українсько-польських відносин. Чому визнання складних сторінок
    історії є необхідною умовою для справжнього стратегічного партнерства?'
  section: Дискусія та підсумок
  words: 700
focus: 'Пацифікація 1930 року в Галичині: аналіз причин (саботажні акції ОУН, польська колонізаційна політика), методів (колективні
  покарання, знищення майна, культурний вандалізм), та наслідків (радикалізація українського руху, довгостроковий вплив на
  польсько-українські відносини).'
level: HIST
module: hist-099
objectives:
- Аналізувати причини, перебіг та наслідки пацифікації 1930 року в Галичині, розрізняючи привід та справжні мотиви
- Критично порівнювати різні типи історичних джерел (офіційні звіти, свідчення жертв, міжнародна преса), виявляючи упередженість
  та пропаганду
- Аргументовано пояснювати, як державний терор призводить до радикалізації суспільства на прикладі зростання впливу ОУН
- Формулювати обґрунтовану оцінку довгострокового впливу пацифікації на українсько-польські відносини, включно з її роллю
  у передумовах Волинської трагедії
