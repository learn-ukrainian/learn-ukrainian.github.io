content_outline:
- points:
  - 'Провокація: Православ''я в Речі Посполитій на межі XVII століття — це пацієнт, що помирає. Церковна ієрархія невизнана,
    храми захоплені. Чи можна врятувати свою віру, перейнявши зброю і тактику ворога (єзуїтську освіту), і не стати при цьому
    схожим на нього?'
  - 'Коротка цитата без контексту: «Гарно й почесно бути свічкою... але свічка має світити». Як ви розумієте цю метафору активного
    служіння?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Латинізація» чи модернізація? Консервативні козацькі та церковні кола вбачали в латинській мові та риториці
    «троянського коня» католицизму. Могила ж доводив, що це лише інструмент для перемоги над опонентами в інтелектуальному
    полі.'
  - 'Дебат 2: [!decolonization] Інтелектуальний суверенітет vs імперська версія «зіпсованого» православ''я. Російська історіографія
    зображувала до-московське київське православ''я як «нечисте», «ополячене». Насправді ж, це був пік інтелектуальної незалежності:
    Київ експортував вчених до Москви, а не навпаки.'
  - '[!epistemic-humility] Ми не знаємо достеменно, чи навчався Могила в Сорбонні, але його доступ до західної думки беззаперечний,
    що й визначило його стратегію.'
  - 'Глобальна синхронність: Реформи Могили — це українська відповідь на європейську Контрреформацію, що теж робила ставку
    на освіту, дисципліну та уніфікацію догми.'
  section: 'Конфліктна карта: Західна зброя для східної віри'
  words: 900
- points:
  - 'Первинне джерело 1: Передмова до «Требника» (1646). Аналіз метафори «свічки, що має світити» — ідеологія активного, освіченого
    пастиря, що служить громаді, а не просто проводить ритуали.'
  - 'Первинне джерело 2: «Заповіт» Петра Могили. Що він залишив у спадок? Не тільки гроші на колегіум, а й моральні та освітні
    настанови для нової еліти.'
  - 'Археологічне джерело: Розкопки Десятинної церкви (1635). Навіщо Могилі потрібно було докопуватися до фундаментів часів
    Русі? Пошук легітимності, прямого зв''язку з Володимировим хрещенням, утвердження Києва як «другого Єрусалима».'
  - '[!decolonization] Критичне читання джерел: Могила використовував історію як інструмент. Пошук «мощей» і «давніх фундаментів»
    був політичним актом, спрямованим на зміцнення статусу його церкви всупереч претензіям Москви і Риму.'
  section: 'Джерела: Требник, Заповіт та каміння Десятинної церкви'
  words: 1600
- points:
  - 'Короткострокові наслідки: Легалізація православної ієрархії «Статтями для заспокоєння руського народу» (1632), повернення
    храмів, створення потужної інтелектуальної альтернативи єзуїтським школам.'
  - 'Довгострокові наслідки: Створення нової національної еліти — «спудеїв» Києво-Могилянського колегіуму, які визначили обличчя
    української культури наступних 150 років. Формування «козацького» або «могилянського» бароко.'
  - '[!myth-buster] Міф: Могила «окатоличив» православну освіту. Реальність: Він використав латинську мову як lingua franca
    європейської науки та єзуїтську педагогічну модель як найефективнішу на той час, але наповнив їх православним догматичним
    змістом.'
  - 'Оцінка істориків: Порівняння поглядів Грушевського (бачив у Могилі радше аристократа, ніж національного діяча) та сучасних
    істориків (наголошують на його ролі у збереженні української ідентичності).'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Чи вдалося Могилі та його наступникам використати західну зброю, не втративши східної душі? Студент
    формулює відповідь, спираючись на матеріали модуля.'
  - 'Зв''язок із сьогоденням: Наскільки актуальна стратегія Могили («наздогнати й перегнати», використовуючи чужі інструменти
    для захисту свого) для сучасної України в її культурному та інформаційному протистоянні?'
  - '[!anti-hagiography] Могила не був демократом. Він був аристократом, що будував жорстку ієрархічну структуру. Його метою
    була сильна Церква і держава, а не загальна рівність. Важливо бачити в ньому ефективного менеджера, а не безгрішного святого.'
  section: Дискусія та підсумок
  words: 700
