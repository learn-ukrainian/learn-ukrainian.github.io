content_outline:
- points:
  - 'Провокація: Козаки — це «селяни-втікачі» з вилами чи професійна військова корпорація, що заповнила елітний вакуум після
    занепаду Русі? Де правда?'
  - Короткий уривок з універсалу Стефана Баторія 1578 року без контексту — студент має припустити, про що йдеться і до кого
    звертається король.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська історіографія vs сучасний погляд. Козацтво як «класова боротьба селян проти феодалів» чи як складний
    багатостановий організм, що включав шляхту?'
  - 'Дебат 2: Еволюція чи задум? Козацтво виникло «стихійно» з уходників, чи від самого початку мало елементи політичної організації
    та державницьких амбіцій (Дмитро Вишневецький)?'
  - '[!epistemic-humility] Визнання браку ранніх джерел. Наші знання про початковий етап (до 1550-х) є фрагментарними, що
    породжує суперечливі інтерпретації.'
  - 'Глобальна синхронність: Козацтво як східноєвропейський фронтир порівняно з американським фронтиром. Козаки як найманці
    у Тридцятилітній війні — паралелі з швейцарцями та ландскнехтами.'
  section: 'Конфліктна карта: Соціальний ліфт чи військова корпорація?'
  words: 900
- points:
  - Аналіз реформи Стефана Баторія 1578 р. — текст універсалу. Що таке «реєстр»? Які права та обов'язки отримували козаки?
    Кого це перетворювало на «лицарський стан»?
  - 'Лист козаків до європейського монарха або універсал гетьмана (напр., Сагайдачного). Аналіз стилю: це лист прохачів чи
    мова рівного партнера? [!decolonization] Демонстрація високого рівня дипломатичної культури та політичної свідомості.'
  - Акт вступу гетьмана Сагайдачного з усім Військом Запорозьким до Київського братства (1620). Що цей символічний крок говорить
    про союз світської та духовної влади, ідентичність козацтва як «захисників православ'я»?
  - Хроніки та мемуари про взяття Кафи (1616). Як описується військова тактика та стратегія козаків (асиметрична війна «чайок»
    проти імперського флоту)?
  section: 'Джерела: Голоси фундаторів та закони короля'
  words: 1600
- points:
  - 'Довготривалі наслідки: Козацтво як інститут, що заповнив «елітний вакуум» після занепаду Русі та забезпечив спадкоємність
    української державної традиції.'
  - 'Формування ідентичності: Аналіз тріади «Війна, Віра, Воля». Як військова організація, захист православ''я та культура
    особистої і виборної свободи сформували унікальну козацьку матрицю.'
  - 'Культурний та геополітичний вплив: Козацьке бароко та Києво-Могилянська академія як стовпи національної культури. Військо
    Запорозьке як ключовий гравець у балансі сил між Річчю Посполитою, Османською імперією та Московією.'
  - '[!myth-buster] Спростування міфу про «селянське» походження козацтва. Акцент на ролі шляхти та боярства (К. Косинський,
    С. Наливайко, П. Сагайдачний) у формуванні козацької еліти та її державницьких прагнень.'
  section: 'Аналіз: Наслідки та значення'
  words: 1600
- points:
  - 'Повернення до розминки: Отже, козаки — це селяни чи лицарі? Студент формулює nuanced відповідь, пояснюючи еволюцію та
    складну соціальну структуру.'
  - 'Зв''язок із сьогоденням: Як козацький міф (волелюбність, спротив імперіям, демократичні традиції) використовується в
    сучасній українській національній ідеї та у мотивації Збройних Сил України?'
  - '[!anti-hagiography] Уникнення ідеалізації. Обговорення внутрішніх конфліктів, жорстокості війн того часу та ролі козацтва
    як дестабілізуючого фактора для сусідніх держав, щоб створити повну, а не однобоку картину.'
  section: Дискусія та підсумок
  words: 700
focus: Синтез становлення козацтва як військового, соціального та політичного феномену. Еволюція від уходників до субʼєкта
  геополітики. Деконструкція радянських та імперських міфів.
level: HIST
module: hist-050
objectives:
- Аналізувати ключові історіографічні дебати щодо походження та соціальної структури козацтва.
- Інтерпретувати первинні джерела (універсали, листи), розрізняючи їхню мету та упередження.
- Деконструювати імперські та радянські міфи про козацтво, формулюючи аргументовану контрпозицію.
- Пояснювати роль козацтва як чинника європейської геополітики та його значення для сучасної української ідентичності.
