module: b2-pro-025
level: B2-PRO
sequence: 25
slug: hr-vocabulary
version: '2.0'
title: HR-лексика
subtitle: HR Vocabulary
focus: professional
pedagogy: ESP
phase: B2-PRO.2
word_target: 4000
objectives:
- Учень знає термінологію процесу найму українською
- Учень може читати та розуміти описи вакансій
- Учень може скласти резюме та супровідний лист
- Учень знає терміни оцінки персоналу та звільнення
content_outline:
- section: Розминка — Кадрова справа по-українськи
  points:
  - HR vs кадри — сучасна та радянська термінологія
  - Особливості українського ринку праці
  - Чому HR-лексика важлива для кожного працівника
  words: 650
- section: Процес найму
  points:
  - 'Пошук роботи: вакансія, оголошення, подати заявку, надіслати резюме'
  - 'Відбір: співбесіда, тестове завдання, перевірка рекомендацій'
  - 'Оформлення: трудовий договір, випробувальний термін, посадова інструкція'
  - 'Документи: резюме/CV, супровідний лист, портфоліо, рекомендаційний лист'
  words: 650
- section: Оцінка та розвиток
  points:
  - 'Оцінка роботи: атестація, KPI, зворотній зв''язок, ефективність'
  - 'Розвиток: підвищення кваліфікації, тренінг, наставництво, кар''єрний ріст'
  - 'Мотивація: премія, бонус, підвищення, визнання'
  words: 650
- section: Звільнення та зміни
  points:
  - 'Типи звільнення: за власним бажанням, за угодою сторін, скорочення'
  - 'Документи: заява на звільнення, наказ, трудова книжка'
  - 'Процес: відпрацювання, передача справ, розрахунок'
  words: 650
- section: Зразок опису вакансії
  points:
  - Типовий опис вакансії з аналізом
  - Вимоги до кандидата та умови праці
  - Як читати між рядками
  words: 650
- section: Практика — HR-документи
  points:
  - 'Завдання: Скласти резюме або проаналізувати вакансію'
  - Підготовка до співбесіди
  - Типові помилки в резюме
  words: 750
vocabulary_hints:
  required:
  - подати заявку (to apply)
  - пройти співбесіду (to have an interview)
  - трудовий договір (employment contract)
  - випробувальний термін (probation period)
  - посадові обов'язки (job responsibilities)
  - підвищення кваліфікації (professional development)
  - звільнитися за власним бажанням (to resign)
  - трудова книжка (employment record book)
  recommended:
  - вимоги до кандидата (candidate requirements)
  - заробітна плата (salary)
  - соціальний пакет (benefits package)
  - наставник (mentor)
  - кар'єрний ріст (career growth)
  - скорочення штату (staff reduction)
activity_hints:
- type: document-analysis
  focus: Проаналізувати опис вакансії — визначити вимоги та обов'язки
  items: 1
- type: writing-task
  focus: Скласти резюме на задану вакансію
  items: 1
- type: vocabulary-domain
  focus: Підібрати визначення до HR-термінів
  items: 15
- type: fill-in
  focus: Вставити правильні терміни в трудовий договір
  items: 10
- type: matching
  focus: З'єднати етап найму з відповідним документом
  items: 8
- type: role-play
  focus: Провести міні-співбесіду
  items: 1
connects_to:
- b2-pro-26 (Працевлаштування)
prerequisites:
- b2-pro-24 (Медичні консультації)
persona:
  voice: Senior Specialist
  role: HR Business Partner
grammar:
- Дієслова HR-сфери (найняти, звільнити, підвищити, оцінити)
- Іменники на -ння (звільнення, підвищення, призначення)
- Прийменники у трудовому контексті (на посаду, з посади, за контрактом)
register: офіційно-діловий
