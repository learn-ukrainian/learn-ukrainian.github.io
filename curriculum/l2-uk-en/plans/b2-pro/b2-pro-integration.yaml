module: b2-pro-039
level: B2-PRO
sequence: 39
slug: b2-pro-integration
version: '2.0'
title: 'Інтеграція: Професійна практика'
subtitle: B2-PRO Integration
focus: professional
pedagogy: ESP
phase: B2-PRO.3
word_target: 4000
objectives:
- Учень може інтегрувати навички ділової комунікації, фахової мови та медіа
- Учень може адаптувати комунікацію для різних аудиторій та каналів
- Учень може працювати над комплексними проєктами українською мовою
- Учень має стратегії для подальшого професійного розвитку українською
content_outline:
- section: Розминка — Від навчання до практики
  points:
  - Як об'єднати всі навички B2-PRO в реальній роботі
  - Типові професійні ситуації, що вимагають комплексних навичок
  - Від ізольованих вправ до реальних проєктів
  words: 650
- section: Комплексний сценарій 1 — Запуск продукту
  points:
  - 'Контекст: Компанія готує запуск нового продукту на українському ринку'
  - 'Завдання: Внутрішня документація (звіт, протокол) + зовнішня комунікація (прес-реліз, виступ)'
  - Інтеграція ділової та медіакомунікації
  - Адаптація регістру для різних аудиторій
  words: 650
- section: Комплексний сценарій 2 — Кризовий менеджмент
  points:
  - 'Контекст: Компанія зіткнулася з негативною публікацією в медіа'
  - 'Завдання: Аналіз ситуації (критичне читання) + внутрішня комунікація (записка) + зовнішня відповідь (заява, інтерв''ю)'
  - Робота з репутаційними ризиками
  - Координація різних каналів комунікації
  words: 650
- section: Комплексний сценарій 3 — Міжнародний проєкт
  points:
  - 'Контекст: Участь у міжнародному тендері з українськими партнерами'
  - 'Завдання: Технічна документація + фінансова пропозиція + юридичний супровід + презентація'
  - Інтеграція фахової термінології різних галузей
  - Робота в умовах дедлайну
  words: 650
- section: Рефлексія та самооцінка
  points:
  - Що вдалося найкраще?
  - Які навички потребують розвитку?
  - План подальшого професійного розвитку українською
  - Ресурси для самонавчання (медіа, курси, спільноти)
  words: 650
- section: Підготовка до підсумкового модуля
  points:
  - Формат підсумкового оцінювання B2-PRO
  - Критерії успішного завершення рівня
  - Що далі — C1-PRO або інші напрямки
  words: 750
vocabulary_hints:
