  - репутаційні ризики (reputational risks)
  - міжнародний тендер (international tender)
  - координація комунікації (communication coordination)
  - професійний розвиток (professional development)
  - самооцінка (self-assessment)
  recommended:
  - багатоканальна комунікація (multi-channel communication)
  - стейкхолдери (stakeholders)
  - дедлайн (deadline)
  - робота в команді (teamwork)
  - адаптація регістру (register adaptation)
  - ресурси для самонавчання (self-study resources)
