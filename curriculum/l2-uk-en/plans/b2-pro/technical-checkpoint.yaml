persona:
  voice: Senior Specialist
  role: Головний інженер
grammar:
- Інфінітивні конструкції в інструкціях (Натиснути, Вибрати, Зберегти)
- Числівникові конструкції у фінансових документах (збільшення на 15%)
- Дієприслівникові звороти в юридичних текстах (укладаючи договір, порушуючи умови)
register: офіційно-діловий
