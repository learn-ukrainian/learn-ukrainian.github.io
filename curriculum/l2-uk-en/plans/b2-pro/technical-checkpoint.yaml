module: b2-pro-028
level: B2-PRO
sequence: 28
slug: technical-checkpoint
version: '2.0'
title: 'Контрольна точка: Фахова мова'
subtitle: Technical Domains Checkpoint
focus: checkpoint
pedagogy: TTT
phase: B2-PRO.2
word_target: 4000
objectives:
- Учень демонструє володіння технічною термінологією ІТ-сфери
- Учень може аналізувати фінансові документи та використовувати відповідну лексику
- Учень розуміє структуру та термінологію юридичних документів
- Учень може інтегрувати термінологію різних галузей в одному документі
content_outline:
- section: Огляд фази B2-PRO.2
  points:
  - Ключові навички фази (ІТ, фінанси, право, медицина, HR, наукове письмо)
  - Особливості професійної термінології кожної галузі
  - Критерії оцінювання фахової компетентності
  words: 650
- section: Завдання 1 — Технічна документація
  points:
  - 'Сценарій: Написати інструкцію для користувача програми'
  - 'Критерії: послідовність кроків, технічна точність, зрозумілість'
  - Оцінювання ІТ-термінології
  words: 650
- section: Завдання 2 — Фінансовий документ
  points:
  - 'Сценарій: Проаналізувати фрагмент квартального звіту'
  - 'Критерії: розуміння показників, коментарі, порівняння'
  - Оцінювання фінансової термінології
  words: 650
- section: Завдання 3 — Юридичний аналіз
  points:
  - 'Сценарій: Знайти ключові пункти в договорі оренди'
  - 'Критерії: права, обов''язки, відповідальність сторін'
  - Оцінювання юридичної термінології
  words: 650
- section: Завдання 4 — Комплексний сценарій
  points:
  - 'Ситуація: Впровадження нової системи — технічний опис, бюджет, договір'
  - 'Завдання: Написати коротку довідку, що поєднує три аспекти'
  - Інтеграція термінології різних галузей
  words: 650
- section: Підсумок та рекомендації
  points:
  - Чек-лист фахової компетентності B2-PRO.2
  - Визначення сильних сторін та зон для покращення
  - Підготовка до фази B2-PRO.3 (медіа та публічна комунікація)
  words: 750
vocabulary_hints:
  required:
  - технічна документація (technical documentation)
  - квартальний звіт (quarterly report)
  - договір оренди (lease agreement)
  - показники ефективності (performance indicators)
  - права та обов'язки сторін (rights and obligations of the parties)
  - впровадження системи (system implementation)
  - бюджет проєкту (project budget)
  - технічне завдання (technical specification)
  recommended:
  - інструкція користувача (user manual)
  - рентабельність (profitability)
  - санкції за порушення (penalties for violation)
  - комплексне рішення (comprehensive solution)
activity_hints:
- type: writing-task
  focus: Написати інструкцію для користувача (5-7 кроків)
  items: 1
- type: document-analysis
  focus: Проаналізувати фрагмент фінансового звіту
  items: 1
- type: document-analysis
  focus: Знайти ключові пункти в договорі
  items: 1
- type: case-study
  focus: Виконати комплексне завдання — впровадження системи
  items: 1
- type: self-assessment
  focus: Заповнити чек-лист фахової компетентності
  items: 1
connects_to:
- b2-pro-29 (Cross Domain Practice)
prerequisites:
