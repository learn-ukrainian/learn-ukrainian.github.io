content_outline:
- points:
  - 'Провокація: Чи може нація, що не має власної держави, вважатися повноцінною? Франко дає несподівану й жорстку відповідь.'
  - 'Цитата: "Нам пора навчитися почувати себе українцями – не галицькими, не буковинськими українцями, а українцями без офіціальних
    кордонів."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Франко проти "народовців" (популістів). Критика ідеалізації народу та вимога "органічної праці" замість пустих
    гасел.'
  - 'Дебат 2: Франко проти Драгоманова та москвофілів. Аргумент за повну політичну самостійність України проти ідеї федералізму
    в оновленій Російській імперії.'
  - '[!epistemic-humility] Позиція Франка не була "єдино правильною" на той час. Це була одна з кількох конкуруючих візій
    майбутнього України, яка перемогла лише згодом.'
  section: 'Конфліктна карта: Реалізм проти ідеологій'
  words: 950
- points:
  - 'Аналіз центральної тези: нація — це не лише мова та етнос, а передусім "спільна воля" до політичного життя.'
  - 'Розбір ключового поняття "суб''єктність": як Франко доводить, що українці — це суб''єкт, а не об''єкт історії.'
  - '[!decolonization] Текст як зброя: Франко прямо атакує імперський наратив про "неісторичність" українського народу, використовуючи
    інструменти європейського позитивізму.'
  - 'Close reading: Як Франко використовує сарказм та іронію для деконструкції аргументів опонентів.'
  section: 'Читання: "Щось про ''малоруську'' ''самостійність"'
  words: 1750
- points:
  - 'Структура аргументу: від критики існуючих ідеологій до викладення власної позитивної програми.'
  - 'Риторичні прийоми: аналіз використання логічних доказів, економічної статистики та історичних прецедентів замість емоційних
    закликів.'
  - '[!epistemic-humility] Франко не намагається "сподобатися". Його мета — переконати інтелектуалів, а не запалити маси.
    Порівняння його "холодного" стилю з палкою риторикою Міхновського.'
  - Аналіз поняття "органічна праця" як центральної риторичної та політичної метафори.
  section: 'Риторика та аргументація: Франкова логіка проти емоцій'
  words: 1200
- points:
  - 'Повернення до розминки: тож якою є відповідь Франка на питання про повноцінність нації?'
  - '[!anti-hagiography] Рецепція твору: чому багато сучасників вважали цей текст "зрадою" ідеалів і не зрозуміли його? Франко
    як "незручний" пророк.'
  - 'Спадщина: як ідеї Франка про політичну націю та суб''єктність вплинули на Українську революцію 1917-1921 рр. та на сучасну
    державу.'
  - 'Студентська рефлексія: чи змінилося ваше розуміння українського націоналізму після прочитання цього есе?'
  section: Дискусія та підсумок
  words: 700
focus: Ivan Franko's essay "Some Words about 'Little Russian' (Ukrainian) 'Separateness'", its rhetorical strategies, its
  role in the debate against Moscophilism and populism, and its legacy in shaping the modern Ukrainian political nation.
level: LIT-ESSAY
