objectives:
- Аналізувати есе Івана Франка "Щось про 'малоруську' 'самостійність'" як ключовий текст української політичної думки
- Простежити вплив ідей Франка на формування модерної української національної ідентичності та його полеміку з народовцями
  та москвофілами
- Визначати риторичні стратегії та логічну структуру, які Франко використовує для обґрунтування ідеї політичної самостійності
