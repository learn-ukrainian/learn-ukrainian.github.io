content_outline:
- points:
  - 'Провокація: Чи можна прочитати всю українську есеїстику XX століття як один супер-текст, що веде безперервну суперечку
    з імперією? Де шукати докази, а де — спростування?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Сталева нитка» опору vs «Стилістичний калейдоскоп». Чи є деколонізаційна оптика єдиним критерієм канонічності,
    чи такий підхід збіднює наше розуміння стилістичних та філософських експериментів, не пов''язаних з опором прямо?'
  - 'Дебат 2: Авторський задум vs Рецепція. Чи важливіше те, як автор конструював образ українського суб''єкта, чи те, як
    ці ідеї були трансформовані, а іноді й спотворені, у діалозі з наступними поколіннями?'
  - '[!epistemic-humility] Не існує єдиного «правильного» канону. Будь-який синтез — це інтерпретація, що висвітлює одні зв''язки,
    залишаючи в тіні інші.'
  section: 'Конфліктна карта: Єдність чи розмаїття канону?'
  words: 900
- points:
  - Аналіз уривків з ключових творів періоду, що вивчається. Як пізніші автори (напр., Шерех) вступають у полеміку з ідеями
    попередників (напр., Донцов), використовуючи їхню ж риторику, але з іншою метою.
  - 'Інтертекстуальність як зброя: виявлення прихованих цитат, алюзій та пародій, що створюють другий, «підривний» шар смислів.'
  - '[!decolonization] Простеження, як спільні стратегії інтелектуального опору та деконструкції імперського наративу еволюціонують,
    переходячи від оборонної позиції до наступальної культурної політики.'
  - 'Трансформація мови: порівняльний аналіз стилістичних технік та мовних експериментів, що показує, як змінювалася сама
    матерія літератури.'
  section: 'Читання: Діалог через покоління'
  words: 1700
- points:
  - Аналіз риторичних стратегій, за допомогою яких українські есеїсти конструювали образ українського суб'єкта — не як жертви,
    а як активного творця історії.
  - '«Етика опору»: виокремлення спільних філософських засад, що обґрунтовують право на існування та розвиток національної
    ідентичності.'
  - 'Література як простір формування національної етики: як через аналіз текстів вибудовувалась система цінностей, що лягла
    в основу сучасного українського суспільства.'
  - '[!epistemic-humility] Розгляд контраргументів: як опоненти української суб''єктності (від імперських ідеологів до внутрішніх
    скептиків) атакували ці риторичні конструкції, та як есеїсти на це відповідали.'
  section: 'Риторика та аргументація: Філософія української суб''єктності'
  words: 1200
- points:
  - 'Повернення до розминки: після аналізу, чи виглядає ідея «супер-тексту» більш чи менш переконливою? Які аргументи «за»
    і «проти» навів би студент?'
  - 'Спадщина та горизонти майбутнього: як ідеї та архетипи, вироблені в есеїстиці XX століття, впливають на сучасний український
    літературний та політичний процес.'
  - 'Значення канону для «інтелектуальної броні»: обговорення, як розуміння тяглості власної інтелектуальної традиції стає
    інструментом інформаційної безпеки та опору дезінформації.'
  - '[!anti-hagiography] Чи не створює такий синтез ідеалізовану картину «неперервної боротьби», ігноруючи внутрішні конфлікти,
    колабораціонізм та ідеологічні поразки? Критична рефлексія над тим, що залишається поза межами «інтелектуальної броні».'
  section: Дискусія та підсумок
  words: 800
focus: 'Діахронний аналіз української есеїстики: синтез ідей, деконструкція імперських наративів та тяглість інтелектуальної
  традиції опору.'
level: LIT-ESSAY
module: lit-essay-056
objectives:
- Синтезувати знання про літературний процес вивченого періоду, простежуючи еволюцію ключових ідей та архетипів.
- Застосовувати деколонізаційну оптику для системного аналізу взаємозв'язків між авторами та деконструкції імперських наративів.
- Оцінювати тяглість української інтелектуальної традиції як простору формування національної етики та суб'єктності.
- Аргументовано дискутувати про критерії формування літературного канону та його роль у забезпеченні інтелектуальної безпеки
  нації.
