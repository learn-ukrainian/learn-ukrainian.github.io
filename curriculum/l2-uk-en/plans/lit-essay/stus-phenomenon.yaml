content_outline:
- points:
  - 'Провокація: Василь Стус — поет чи філософ спротиву? Чому його есеїстика, а не лише поезія, стала культурним феноменом?'
  - Цитата з есе «Феномен доби» без коментарів — студент має вгадати, про яку «деформацію» говорить автор і як це стосується
    мистецтва.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Поезія як чисте мистецтво vs поезія як політичний акт. Чи можна читати Стуса, ігноруючи його біографію та боротьбу?'
  - 'Дебат 2: Стус у каноні — «останній модерніст» чи засновник нової, «табірної» літератури? Його місце відносно Шістдесятників
    та українського авангарду.'
  - '[!epistemic-humility] Літературознавство не дає остаточних відповідей. Розглядаємо аргументи обох сторін: позиція Юрія
    Шевельова vs позиція сучасних критиків.'
  section: 'Конфліктна карта: Поет чи Публіцист?'
  words: 900
- points:
  - 'Уривок з тексту: аналіз трагедії Павла Тичини як символу долі українського митця в тоталітарній системі.'
  - 'Структура аргументу: як Стус-критик діагностує «розщеплення» особистості таланту, що змушений служити системі.'
  - 'Позиція самого Стуса: есе як форма самовизначення через протиставлення. «Вибираю бій».'
  - '[!decolonization] Це не просто літературна критика, а акт культурної деколонізації: Стус відмовляється приймати нав''язану
    імперією логіку «компромісу» і руйнує міф про «щасливе радянське мистецтво».'
  section: 'Читання: Есе «Феномен доби»'
  words: 1700
- points:
  - 'Аналіз риторичних стратегій Стуса: гостра антитеза (воля/тюрма, правда/фальш), етичний пафос, використання філософської
    лексики.'
  - 'Логічна структура есе: як Стус будує доказ, використовуючи не лише літературні, а й історичні та філософські аргументи.'
  - 'Порівняння стилів: Стусова есеїстика vs офіціозна радянська критика. У чому полягає «деформація» мови, про яку пише автор?'
  - '[!epistemic-humility] Стус не завжди «об''єктивний» — його критика є пристрасною та суб''єктивною. Як це впливає на силу
    його аргументів?'
  section: 'Риторика та аргументація: Мова як моральний вибір'
  words: 1200
- points:
  - 'Повернення до розминки: тож хто такий Стус — поет, що став публіцистом, чи філософ, що писав вірші? Студент формулює
    власну позицію.'
  - 'Рецепція творчості: як Стуса читали в самвидаві vs як його сприймають сьогодні? Перетворення на національний символ.'
  - '[!anti-hagiography] Уникаємо створення ікони. Стус — не пасивна жертва, а активний борець. У чому принципова різниця
    для розуміння його спадщини?'
  - 'Сучасне значення: що «феномен Стуса» говорить про сучасну українську боротьбу за суб''єктність?'
  section: Дискусія та підсумок
  words: 800
focus: Есеїстика Василя Стуса, аналіз «Феномену доби», риторика спротиву, дебат «поет vs публіцист», Стус як критик імперської
  культури
