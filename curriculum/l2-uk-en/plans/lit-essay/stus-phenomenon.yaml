activity_hints:
- description: Визначити, яка позиція (чиста поезія vs політичний акт) відповідає наведеній цитаті критика. Перевірка розуміння
    обох сторін дебату.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити в речення з аналізу ключові терміни: антитеза, етичний пафос, риторичне питання, суб''єктність.'
  focus: Риторичні стратегії Стуса
  items: 6
  type: fill-in
- description: 'Порівняйте два короткі уривки: один з есе Стуса, інший — зі статті радянського критика про Тичину. Визначте
    3-4 ключові відмінності в мові, тональності та меті висловлювання.'
  focus: 'Джерельний аналіз: Стус vs Радянська критика'
  type: note
- description: Як ви вважаєте, чи не заважає сьогоднішньому прочитанню Стуса його статус «національного мученика»? Чи можлива
    критика Стуса в сучасній Україні? Аргументуйте свою позицію (400-600 слів).
  focus: 'Есе: Сучасна рецепція феномену Стуса'
  type: note
