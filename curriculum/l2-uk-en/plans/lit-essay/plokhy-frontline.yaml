content_outline:
- points:
  - 'Провокація: Чи може книга змінити хід історії? Цитата Сергія Плохія про роль наративів у сучасній війні.'
  - 'Загадка: Чому міжнародний бестселер про історію України з''явився саме в 2015 році, а не на 20 років раніше чи пізніше?
    Що це говорить про зв''язок історії та політики?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Об''єктивістська історіографія vs. заангажований історик. Чи є Плохій "адвокатом" України, і якщо так, чи це
    зменшує цінність його праць? [!epistemic-humility]'
  - 'Дебат 2: "Брама Європи" vs "Міст між Сходом і Заходом". Аналіз двох метафор, що описують місце України. Плохій наполягає
    на ролі України як цивілізаційного кордону, а не просто транзитної зони.'
  - 'Позиціонування: Плохій проти російської імперської школи та західної "реалістичної" школи, яка часто ігнорувала українську
    суб''єктність.'
  section: 'Конфліктна карта: Історик як арбітр чи учасник?'
  words: 900
- points:
  - 'Аналіз структури: як Плохій будує тисячолітній наратив, підтримуючи напругу та логіку викладу.'
  - 'Ключовий уривок: Розбір глави про Козацьку добу або про ХХ століття. Як автор поєднує аналіз джерел, розповідь про події
    та ширші висновки.'
  - 'Створення української суб''єктності: Як текст повертає українцям роль активних творців власної історії, а не жертв чи
    об''єктів політики великих держав. [!decolonization]'
  section: 'Читання: Уривки з "Брами Європи"'
  words: 1800
- points:
  - 'Стиль: Доступна мова, відсутність академічного жаргону. Аналіз того, як стиль Плохія працює на переконання широкої, неспеціалізованої
    аудиторії.'
  - 'Структура аргументу: Як кожна глава є цеглиною у великій споруді деколонізованої історії України. Теза -> докази з джерел
    -> контр-аргументи (часто імпліцитні) -> висновок.'
  - 'Метафора як інструмент: детальний аналіз метафори "брами" або "фронтиру" — як вона працює і які смисли створює. [!epistemic-humility]'
  section: 'Риторика та аргументація: Наратив як зброя'
  words: 1200
- points:
  - 'Повернення до розминки: Як праці Плохія допомагають зрозуміти сучасну війну не як конфлікт за територію, а як війну наративів
    та історичних інтерпретацій?'
  - 'Рецепція: Чому праці Плохія стали настільки впливовими на Заході? Яку "інтелектуальну порожнечу" вони заповнили?'
  - 'Спадщина: Чи можна вважати Плохія продовжувачем традиції українських істориків-державників (Грушевський, Липинський)?
    У чому його новаторство? [!anti-hagiography]'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз праць Сергія Плохія, зокрема "Брама Європи", як зразка сучасної історичної есеїстики. Деконструкція імперських
  наративів, роль історика у формуванні національної ідентичності, риторичні стратегії в науково-популярному тексті.
