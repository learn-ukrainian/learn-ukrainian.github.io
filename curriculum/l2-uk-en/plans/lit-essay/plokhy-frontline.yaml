activity_hints:
- description: Визначити, яка позиція належить об'єктивістській школі, а яка — школі, до якої належить Плохій. Аналіз цитат
    та тез.
  focus: 'Конфліктна карта: Роль історика'
  items: 4
  type: quiz
- description: Вставити пропущені терміни (наратив, суб'єктність, деколонізація, фронтир) у речення, що аналізують стиль автора.
  focus: Риторичні стратегії Плохія
  items: 5
  type: fill-in
- description: 'Наведено два короткі уривки про Переяславську раду 1654 року: один з "Брами Європи" Плохія, інший — з російського
    підручника історії. Порівняйте, як автори розставляють акценти, кого роблять головними дійовими особами, і до яких висновків
    підводять читача.'
  focus: 'Порівняльний аналіз: Плохій vs. імперський наратив'
  type: note
- description: Використовуючи ідеї з модуля, напишіть есе на тему "Чому для сучасної України важливо мати власний, деколонізований
    наратив історії?". Аргументуйте свою позицію, посилаючись на праці Сергія Плохія (400-600 слів).
  focus: 'Есе: Історія як інструмент'
  type: note
