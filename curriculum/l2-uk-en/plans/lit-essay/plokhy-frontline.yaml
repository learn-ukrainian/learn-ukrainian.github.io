objectives:
- Аналізувати праці Сергія Плохія як зразки сучасної аргументативної прози та їхнє місце в українській інтелектуальній традиції.
- Оцінювати риторичні стратегії та структуру аргументації, які Плохій використовує для побудови деколонізованого наративу
  української історії.
- Критично аналізувати роль історика та історіографії у формуванні національної ідентичності та сучасних геополітичних дискурсів.
