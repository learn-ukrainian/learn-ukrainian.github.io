objectives:
- Аналізувати есеїстику Оксани Забужко як приклад "літератури реального часу" та свідчення про війну
- Розрізняти риторичні стратегії (етос, патос, логос) у публіцистичному тексті
- Застосовувати інструментарій постколоніальної критики для аналізу українських літературних творів
- Формулювати власну позицію в літературно-критичних дебатах щодо ролі письменника під час війни
