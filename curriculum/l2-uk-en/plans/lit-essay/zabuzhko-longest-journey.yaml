content_outline:
- points:
  - 'Провокація: цитата Оксани Забужко про те, як Захід століттями неправильно читав російську літературу, ігноруючи її імперський
    код.'
  - 'Питання до роздумів: Чи може письменник бути одночасно біженцем, свідком і аналітиком? Де проходить межа між особистою
    травмою та інтелектуальним аналізом?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Роль інтелектуала у війні. Чи є "Найдовша подорож" об''єктивним свідченням очевидця, чи це радше прокурорський
    обвинувальний акт проти імперіалізму?'
  - 'Дебат 2: Жанрова невизначеність. Це філософський есей, політична публіцистика, історичний нарис чи новий гібридний жанр
    "літератури реального часу"?'
  - '[!epistemic-humility] Критики зліва звинувачують Забужко в "есенціалізації" ворога; прихильники бачать у цьому необхідну
    яскравість позиції під час геноциду. Істина не посередині, а в обґрунтуванні позиції.'
  section: 'Конфліктна карта: Свідок чи Прокурор?'
  words: 900
- points:
  - Аналіз ключового уривку, де Забужко пояснює західній аудиторії витоки російської агресії, пов'язуючи їх з історією та
    культурою.
  - '[!decolonization] Як Забужко руйнує міф про "велику російську культуру", показуючи її як інструмент імперського панування.
    Розбір аналізу Булгакова та Достоєвського.'
  - 'Наративна оптика: перехід від особистого досвіду ("я застрягла в Польщі без речей") до голосу цілого покоління, що переживає
    війну.'
  - 'Концепт української суб''єктності: аналіз того, як текст утверджує Україну не як об''єкт геополітики, а як активного
    історичного гравця.'
  section: 'Читання: Найдовша подорож'
  words: 1700
- points:
  - 'Структура аргументу: як авторка поєднує історичні факти, літературний аналіз, особисті спогади та філософські узагальнення
    для створення переконливого наративу.'
  - 'Риторичні стратегії: потужне поєднання емоційного pathos (біль, гнів, страх) та раціонального logos (чіткий аналіз, логічні
    зв''язки).'
  - 'Стилістика: використання складної синтаксичної структури, інтелектуальної лексики, іронії та сарказму для передачі глибини
    та складності ситуації.'
  - '[!myth-buster] Забужко спростовує тезу про "братні народи", показуючи цивілізаційну прірву між Україною та Росією.'
  section: 'Риторика та аргументація: Мова як зброя'
  words: 1200
- points:
  - 'Повернення до початкового питання: тож ким є авторка — свідком, прокурором, аналітиком? Студенти формулюють власну аргументовану
    відповідь.'
  - 'Рецепція твору: як "Найдовшу подорож" читали в Україні, Польщі, Німеччині та США? Які аспекти були зрозумілі, а які потребували
    додаткових пояснень?'
  - '[!anti-hagiography] Критичний погляд: чи не заважає подекуди пристрасність авторки холоднокровному аналізу? Чи є в тексті
    моменти, де емоції переважають над аргументами?'
  - 'Сучасне значення: як цей текст вплинув на міжнародну дискусію про Україну? Які аргументи Забужко стали частиною стандартного
    пояснення української позиції у світі?'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз есеїстики Оксани Забужко про повномасштабне вторгнення: риторика, деколоніальний погляд, свідчення та аргументація.'
