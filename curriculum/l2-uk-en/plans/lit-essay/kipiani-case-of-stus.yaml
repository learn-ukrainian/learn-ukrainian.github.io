objectives:
- Аналізувати книгу Вахтанга Кіпіані «Справа Василя Стуса» як зразок історичної публіцистики та аргументативного нон-фікшену.
- Реконструювати аргументаційну структуру книги, визначаючи ключову тезу, докази та риторичні прийоми.
- Критично оцінювати роль архівних документів у побудові історичного наративу та спростуванні пропагандистських міфів.
- Формулювати власну позицію щодо дебатів навколо книги та її значення для сучасної України.
