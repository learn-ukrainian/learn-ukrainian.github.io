content_outline:
- points:
  - 'Провокація: Чому книга про суд 1980 року спричинила одну з найгучніших юридичних битв в Україні у 2020-му? Які таємниці
    досі приховує «справа Стуса», що їх так боїться один з її учасників — Віктор Медведчук?'
  - 'Фрагмент звинувачення без контексту: «...зводив наклепи на радянський державний і суспільний лад...»'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Офіційна радянська версія суду (законна боротьба з «антирадянським елементом») vs історична реконструкція Кіпіані
    (розправа над інакодумцем).'
  - 'Дебат 2: Суд над книгою у 2020-му. Позов Медведчука проти Кіпіані — це захист «честі та гідності» чи спроба цензури та
    відбілювання власної ролі в репресіях?'
  - '[!epistemic-humility] Книга Кіпіані — це не просто переказ фактів, а побудова контр-наративу. Вона показує, як історична
    правда, що спирається на документи, може суперечити юридичній формальності, особливо в тоталітарній системі.'
  section: 'Конфліктна карта: Історична правда vs юридична маніпуляція'
  words: 900
- points:
  - 'Структура книги: Кіпіані як упорядник, що монтує архівні документи (протоколи допитів, звіти КДБ) та коментарі свідків.
    Який ефект це створює на читача?'
  - '[!decolonization] Розвінчання ролі адвоката: аналіз уривків, що висвітлюють дії Віктора Медведчука під час процесу. Чому
    цей «захист» був, по суті, формою обвинувачення і співпраці з репресивною машиною?'
  - 'Голос Стуса з архіву: аналіз цитат з його промов у суді, клопотань та останнього слова. Як поет сам перетворює свій захист
    на звинувачення системі?'
  - '[!myth-buster] Книга руйнує радянський міф про «об''єктивність» суду, показуючи, що вирок був визначений наперед, а сам
    процес — лише ритуалізованим фарсом.'
  section: 'Читання: Книга «Справа Василя Стуса» як монтаж доказів'
  words: 1700
- points:
  - 'Аргументаційна стратегія Кіпіані: довести тезу про те, що суд над Стусом був не судом, а розправою, а роль адвоката —
    співучастю у злочині.'
  - 'Риторичний прийом «документ говорить сам за себе»: як Кіпіані використовує метод «show, don''t tell», надаючи читачу
    доступ до першоджерел, щоб той сам дійшов висновків.'
  - 'Контраргументація: як книга превентивно спростовує не лише радянську пропаганду, але й майбутні спроби Медведчука виправдати
    свої дії.'
  - '[!epistemic-humility] Чи може документ брехати? Аналіз того, як радянські бюрократичні документи є водночас і джерелом
    правди (про методи системи), і джерелом брехні (про «провину» Стуса).'
  section: 'Риторика та аргументація: Документ як неспростовний доказ'
  words: 1200
- points:
  - 'Повернення до розминки: Чому книга стала настільки небезпечною для Медведчука у 2020 році? Студент формулює відповідь,
    спираючись на аналіз модуля.'
  - 'Рецепція книги та судовий процес: як суспільний резонанс та заборона книги судом перетворили її на символ боротьби за
    історичну справедливість і бестселер.'
  - 'Сучасне значення: «Справа Стуса» як ключ до розуміння постаті Віктора Медведчука та його ролі в сучасній українській
    політиці, аж до повномасштабного вторгнення.'
  - '[!anti-hagiography] Модуль фокусується не на агіографії Стуса, а на аналізі злочину держави проти митця, де всі учасники,
    включно з адвокатом, є частиною репресивної системи.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз книги Вахтанга Кіпіані «Справа Василя Стуса» як зразка історичної публіцистики, що використовує архівні документи
  для побудови аргументації та спростування радянських і сучасних проросійських наративів.
level: LIT-ESSAY
