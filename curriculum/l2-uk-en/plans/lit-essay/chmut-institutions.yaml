objectives:
- Аналізувати публічну есеїстику як форму сучасної української аргументативної прози
- Розрізняти риторичні стратегії (етос, патос, логос) у текстах, присвячених деколонізації
- Формулювати власну позицію в дебатах про межі літератури та роль публічного інтелектуала у воєнний час
- Критично оцінювати, як інституційна мова може ставати інструментом утвердження національної суб'єктності
