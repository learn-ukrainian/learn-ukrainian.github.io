content_outline:
- points:
  - 'Провокаційне питання: Чи може звіт про закупівлю снарядів бути літературою? Як мова логістики та бюрократії стає інструментом
    національного самоствердження в умовах війни?'
  - Цитата Тараса Чмута про важливість "нудної, системної роботи" без контексту — як вона стосується не лише фонду, а й побудови
    культури.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є публіцистика Чмута та його колег літературою, чи це активізм/журналістика? Де проходить межа, і чи вона
    потрібна?'
  - 'Дебат 2: Що є більш дієвим для деколонізації свідомості — академічна історіографія, що викриває міфи, чи практична інституційна
    робота, що мовчки утверджує суб''єктність?'
  - '[!epistemic-humility] Позиції критиків: одні вважають це новим жанром (прагматична есеїстика), інші — ефективним фандрайзингом,
    що не має стосунку до мистецтва слова.'
  section: 'Конфліктна карта: Текст чи Дія?'
  words: 900
- points:
  - 'Розбір ключового тексту (умовного): теза про прямий зв''язок між спроможністю закуповувати зброю та культурною суб''єктністю.'
  - 'Структура аргументу: від конкретних прикладів (логістичні проблеми) до узагальнень філософського рівня (воля до життя
    як нації).'
  - '[!decolonization] Як текст протистоїть імперському наративу про "неспроможність" та "братню допомогу", утверджуючи українців
    як самостійних, раціональних акторів.'
  - 'Аналіз аудиторії: текст звертається одночасно до українського суспільства (мобілізація) та західних партнерів (демонстрація
    надійності).'
  section: 'Читання: Аналіз есе "Про суб''єктність і снаряди"'
  words: 1700
- points:
  - 'Етос: Як Чмут вибудовує довіру через образ компетентного фахівця, що оперує фактами, а не емоціями. Роль репутації та
    попередніх дій.'
  - 'Логос: Використання даних, цифр, технічних деталей як основи для переконання. "Магія великих чисел" у публічній комунікації.'
  - 'Патос: Стриманий, але потужний емоційний вплив через апеляцію до почуття обов''язку, відповідальності та спільної мети.
    Відсутність істерики як риторична стратегія.'
  - '[!epistemic-humility] Порівняння з іншими стилями комунікації воєнного часу: експресивним, поетичним, пропагандистським.
    У чому сила і слабкість "технократичної" риторики?'
  section: 'Риторика та аргументація: Етос, Патос, Логістика'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чи може звіт про снаряди бути літературою? Формулювання студентом власної аргументованої
    відповіді.'
  - 'Рецепція: Як суспільство сприймає такий тип лідерства думок? Які міфи він руйнує, а які, можливо, створює?'
  - '[!anti-hagiography] Критичний погляд: ризики технократичного підходу, небезпека дегуманізації війни через фокус на логістиці,
    обмеженість такого дискурсу.'
  - 'Спадщина: Чи увійде "інституційна есеїстика" в канон української літератури, чи залишиться феноменом свого часу? Прогноз
    та аргументація.'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз есеїстики та публічних виступів Тараса Чмута як форми аргументативної прози, спрямованої на деколонізацію українського
  дискурсу та утвердження суб'єктності через інституційну розбудову.
