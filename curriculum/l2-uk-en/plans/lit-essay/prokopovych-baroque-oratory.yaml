vocabulary_hints:
- definition: наука про способи переконання та впливу на аудиторію шляхом публічного виступу; мистецтво красномовства.
  pos: ж.
  word: риторика
- definition: промова або літературний твір, що містить беззастережну, часто перебільшену похвалу особі, події або явищу.
  pos: ч.
  word: панегірик
- definition: (про красномовство) урочистий, показовий; жанр, зосереджений на похвалі або осуді чогось у теперішньому часі.
  pos: прикм.
  word: епідейктичний
- definition: риторичний прийом, що полягає в накопиченні синонімів, епітетів, порівнянь для посилення виразності та емоційного
    впливу.
  pos: ж.
  word: ампліфікація
- definition: середньовічний тип філософії, що характеризується поєднанням догматичних засновків із раціоналістичною методикою
    та інтересом до формальної логіки.
  pos: ж.
  word: схоластика
- definition: сукупність творів, визнаних взірцевими, класичними в певній галузі (літературі, мистецтві) і рекомендованих
    для вивчення.
  pos: ч.
  word: канон
- definition: процес надання законності або визнання певній владі, праву, статусу в очах суспільства.
  pos: ж.
  word: легітимація
- definition: процес надання чомусь священного, божественного статусу; перетворення світського на релігійне.
  pos: ж.
  word: сакралізація
