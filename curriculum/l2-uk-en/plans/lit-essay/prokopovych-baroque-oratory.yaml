content_outline:
- points:
  - 'Провокація: Як людина, що заклала основи сучасної української риторики, стала головним ідеологом Російської імперії?
    Чи можна відділити інструмент (риторику) від мети (побудова імперії)?'
  - 'Цитата без контексту: «Волею монаршою всяка совість управляється». Що це — цинізм, реалізм чи теологічна доктрина?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Місце в каноні. Чи є Прокопович «українським» мислителем, чи «російським» реформатором, якого Україна має «експортувати»
    зі свого канону? Аргументи «за» (київський період, заклав основи) vs «проти» (петербурзький період, автор «Духовного регламенту»).'
  - 'Дебат 2: Інтелектуальна чесність. Чи був Прокопович цинічним кар''єристом, що використовував риторику для виправдання
    будь-якої влади, чи щирим реформатором, який вірив у модель освіченої монархії як єдиний шлях до прогресу?'
  - '[!epistemic-humility] Оцінки Прокоповича коливаються від «апостола деспотизму» до «провідника Просвітництва». Правда,
    як завжди, у складних відтінках, а не в чорно-білих ярликах.'
  section: 'Конфліктна карта: Український геній чи імперський слуга?'
  words: 900
- points:
  - 'Ключовий уривок: аналіз трьох видів красномовства (дорадчого, судового, епідейктичного) та їхньої мети. Як Прокопович
    визначає завдання оратора: переконувати, подобатися, зворушувати.'
  - '[!decolonization] «Риторика» Прокоповича написана в Києві латиною і спирається на європейську (Цицерон, Квінтиліан),
    а не московську традицію. Це продукт Києво-Могилянської академії як європейського інтелектуального центру.'
  - 'Аргументативна структура: Прокопович вибудовує свою працю як логічну, раціональну систему, що відрізняється від середньовічної
    схоластики. Це передвісник есеїстичного мислення.'
  - 'Порівняння з «Поетикою» (1705): перехід від аналізу художнього тексту до аналізу тексту, що впливає на реальність. Поезія
    як mimesis (наслідування) vs риторика як actio (дія).'
  section: 'Читання: "De Arte Rhetorica" (Київ, 1706)'
  words: 1700
- points:
  - 'Аналіз «Слова похвального про Полтавську перемогу» (1709) та «Надгробного слова Петру I» (1725). Як працює пропаганда:
    творення міфу про монарха, сакралізація перемоги, легітимація влади.'
  - 'Риторичні прийоми: amplificatio (перебільшення) і brevitas (стислість) як дві сторони барокового стилю. Використання
    біблійних та античних алюзій для створення авторитету.'
  - 'Мова як поле битви: поєднання церковнослов’янізмів, латинізмів і «простої мови». Кожен вибір створює певний ефект і звертається
    до різної аудиторії.'
  - '[!epistemic-humility] Де закінчується щира похвала і починається придворне лицемірство? Аналіз панегіриків Прокоповича
    — це вправа у читанні між рядками та розумінні умовностей жанру.'
  section: 'Риторика та аргументація: Панегірик як політичний інструмент'
  words: 1200
- points:
  - 'Повернення до розминки: тож як зброя, створена в Києві, була використана проти України? Формулювання відповіді на основі
    аналізу.'
  - 'Рецепція: як Прокоповича сприймали у XIX ст. (негативно, як зрадника), у радянський час (позитивно, як «прогресивного
    діяча»), і як його переоцінюють сьогодні.'
  - '[!anti-hagiography] Парадокс Прокоповича: його інтелектуальні інструменти (риторика, теорія держави) були використані
    для зміцнення імперії, що згодом намагалася знищити його народ. Це трагедія не лише однієї людини, а й цілого покоління.'
  - 'Сучасне значення: чи актуальні риторичні прийоми Прокоповича в сучасній політичній пропаганді? Аналіз сучасних промов
    на наявність барокових технік переконання.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз риторики Феофана Прокоповича як інструменту влади, пропаганди та церковної реформи. Дебат про його місце в українському
  каноні.
level: LIT-ESSAY
module: lit-essay-003
objectives:
- Аналізувати риторичні стратегії та прийоми в політичних та релігійних текстах на прикладі творів Феофана Прокоповича.
- Критично оцінювати складну роль історичної постаті в контексті деколонізаційних дебатів, розрізняючи київський та петербурзький
  періоди.
- Застосовувати риторичну термінологію для аналізу аргументативних текстів.
- Формулювати власну аргументовану позицію щодо місця суперечливих постатей в національному літературному каноні.
