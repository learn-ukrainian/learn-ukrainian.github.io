activity_hints:
- description: Визначити, якому з двох дебатів (канон чи чесність) належить теза, або чию позицію вона представляє (захисників
    чи критиків).
  focus: 'Розуміння конфліктної карти: Дебати про Прокоповича'
  items: 6
  type: quiz
- description: Вставити правильний термін (риторика, панегірик, ампліфікація, епідейктичний) у речення з контекстом з модуля.
  focus: Риторична термінологія
  items: 6
  type: fill-in
- description: Порівняйте уривок з київської «Риторики» та уривок з петербурзького «Духовного регламенту». Які риторичні прийоми
    є спільними? Як змінюється мета і тон автора? (300-400 слів)
  focus: 'Аналіз аргументації: Київ vs Петербург'
  type: note
- description: Чи повинен Феофан Прокопович вивчатися в українських школах як частина «нашого» канону? Сформулюйте аргументовану
    позицію «за» або «проти», спираючись на матеріали модуля (500-700 слів).
  focus: 'Есе: Місце Прокоповича в сучасному українському каноні'
  type: note
