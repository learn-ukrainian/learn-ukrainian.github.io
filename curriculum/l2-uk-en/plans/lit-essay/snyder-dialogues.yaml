content_outline:
- points:
  - 'Провокативне питання: Чи може історик бути об''єктивним, коли його країна перебуває у стані війни, а предмет його дослідження
    стає зброєю?'
  - 'Цитата Тімоті Снайдера (з "Шляху до несвободи"): "Коли ми думаємо, що минуле не може повторитися, ми помиляємось. Воно
    повертається в іншій формі". Як це стосується сучасної України?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Академічна історіографія vs "публічна історія". Критики звинувачують Снайдера у спрощенні заради доступності.
    Його захисники кажуть, що він робить історію релевантною. Чия позиція вам ближча? [!epistemic-humility]'
  - 'Дебат 2: Полеміка навколо "Кривавих земель". Одні історики критикували концепцію за урівнювання нацистського та радянського
    режимів, інші — за недостатню увагу до української перспективи. Як Снайдер відповів на цю критику?'
  - 'Роль інтелектуала у війні: чи має історик займати чітку моральну позицію, чи зберігати нейтралітет? Аргументи "за" і
    "проти".'
  section: 'Конфліктна карта: Історик vs Публічний інтелектуал'
  words: 900
- points:
  - 'Ключовий уривок: Аналіз розділу, присвяченого російській ідеології "вічної війни" та її застосуванню до України.'
  - 'Деконструкція міфу про "братні народи": як Снайдер, використовуючи історичні факти, руйнує ключовий наратив російської
    пропаганди. [!decolonization]'
  - 'Концепції "політики неминучості" (Захід) та "політики вічності" (Росія): аналіз цих інструментів для розуміння сучасної
    геополітичної кризи.'
  - '[!myth-buster] Снайдер показує, що ідея "русского мира" — це не відродження давньої традиції, а сучасна політична технологія,
    створена на початку XXI століття.'
  section: 'Читання: "Шлях до несвободи" як деколоніальний маніфест'
  words: 1700
- points:
  - 'Теза через наратив: аналіз того, як Снайдер використовує історії окремих людей (наприклад, дисидентів, солдатів) для
    ілюстрації своїх глобальних тез (патос).'
  - 'Логічна структура: порівняльний аналіз як основний метод. Як порівняння фашизму, комунізму та сучасного російського режиму
    допомагає побудувати його аргумент (логос).'
  - 'Етос "інсайдера-аутсайдера": Снайдер — професор Єльського університету, що дає йому авторитет, але водночас він позиціонує
    себе як захисник "забутої" Східної Європи. Як це впливає на довіру читача?'
  - 'Використання метафор як аргументів: "політика вічності", "криваві землі" — це не просто яскраві образи, а концептуальні
    рамки.'
  section: 'Риторика та аргументація: Як Снайдер переконує читача'
  words: 1200
- points:
  - 'Повернення до розминки: чи може історик бути об''єктивним? Як би відповів на це сам Снайдер, спираючись на його тексти?'
  - 'Рецепція в Україні та світі: чому Снайдера одночасно називають "адвокатом України" і критикують за недостатню "українськість"
    погляду? [!anti-hagiography]'
  - 'Сучасне значення: яку роль відіграли праці Снайдера у формуванні західної громадської думки та політики щодо України
    після повномасштабного вторгнення?'
  - 'Провокація для роздумів: чи не створюємо ми нового "канону" та "агіографії" навколо Снайдера, ігноруючи слабкі місця
    його аргументації?'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз аргументативної прози Тімоті Снайдера: деконструкція імперських міфів, риторичні стратегії в історичному наративі,
  та роль публічного інтелектуала у формуванні політики пам''яті.'
level: LIT-ESSAY
module: lit-essay-044
objectives:
- Аналізувати аргументативну прозу як жанр на перетині історії, політології та літератури.
- Розрізняти та критично оцінювати риторичні стратегії (етос, патос, логос) в науково-популярних текстах.
- Застосовувати концепції "політики пам'яті" та "деколонізації" до аналізу сучасних історичних наративів.
- Формулювати власну аргументовану позицію в рамках академічної дискусії, спираючись на аналіз першоджерел та критики.
