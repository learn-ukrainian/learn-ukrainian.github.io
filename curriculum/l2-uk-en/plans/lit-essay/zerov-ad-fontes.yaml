content_outline:
- points:
  - 'Провокація: Що означало гасло "Ad Fontes!" ("До джерел!") у радянській Україні 1920-х? Відповідь, яку дає Микола Зеров,
    може вас здивувати.'
  - Коротка цитата Зерова про "органічне й велике мистецтво", вирвана з контексту. Що це за мистецтво і проти чого воно спрямоване?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Неокласики vs Футуристи. Боротьба за канон. Зеров і його вимога "високої" літературної традиції, орієнтованої
    на античність, проти масового "пролетарського" мистецтва, яке пропагували інші угруповання.'
  - 'Дебат 2: "Європа чи Москва?". Полеміка Хвильового "Геть від Москви!" і відповідь Зерова — орієнтація на "джерела" європейської
    культури як спосіб вирватися з провінційності та малоросійства.'
  - '[!epistemic-humility] Чи був неокласицизм елітарним рухом, відірваним від народу, чи єдиним способом зберегти високу
    культуру в умовах ідеологічного тиску? Аргументи обох сторін.'
  section: 'Конфліктна карта: Європа чи Просвіта?'
  words: 900
- points:
  - Аналіз ключових уривків з есе, де Зеров формулює свою програму. Що таке "справжня" і "несправжня" сучасність за Зеровим?
  - 'Риторичний аналіз: як Зеров використовує історичні приклади (Ренесанс, французький класицизм) для обґрунтування своєї
    позиції в українському контексті.'
  - '[!decolonization] Твердження про спадкоємність української літератури від античності — це прямий виклик імперському наративу
    про "молодшого брата". Зеров доводить, що Україна — повноцінна європейська нація з глибоким корінням.'
  - '[!myth-buster] Неокласики не були "сухими академіками". Їхня творчість була гострою політичною заявою, за яку вони заплатили
    життям.'
  section: 'Читання: Есе "Ad Fontes!"'
  words: 1700
- points:
  - 'Структура аргументації Зерова: теза (потреба в класичній освіті) -> антитеза (критика "профанів" і "масовістів") -> докази
    (приклади з історії світової літератури).'
  - 'Риторичні прийоми: іронія, алюзії, ерудиція як форма авторитету (ethos). Зеров не переконує, а доводить свою правоту
    через демонстрацію інтелектуальної переваги.'
  - Порівняння риторики Зерова і Хвильового. Якщо Хвильовий — це емоційний вибух (pathos), то Зеров — це логічна побудова
    і доказ (logos).
  - '[!epistemic-humility] Як сьогодні читати тексти, побудовані на такій інтелектуальній дистанції? Чи є такий стиль аргументації
    ефективним у 21 столітті?'
  section: 'Риторика та аргументація: Полеміка як високе мистецтво'
  words: 1200
- points:
  - 'Повернення до провокації з розминки: то що ж означає "Ad Fontes!" сьогодні, після повномасштабного вторгнення?'
  - 'Історія рецепції: герой для еміграції, ворог народу в СРСР, ікона "розстріляного відродження" в незалежній Україні. Як
    змінювалося сприйняття Зерова?'
  - '[!anti-hagiography] Критичний погляд: чи не призвела орієнтація на "високу полицю" до відриву від реальних потреб українського
    суспільства того часу? Чи не був це рух для обраних?'
  - 'Спадщина Зерова: перекладацька школа, канон української літератури, ідея про європейську ідентичність України — що з
    цього є найбільш актуальним сьогодні?'
  section: Дискусія та підсумок
  words: 800
focus: Микола Зеров та київські неокласики, літературна дискусія 1925-28 рр., концепція "Ad Fontes" як деколоніальна стратегія,
  аналіз аргументативної есеїстики.
level: LIT-ESSAY
