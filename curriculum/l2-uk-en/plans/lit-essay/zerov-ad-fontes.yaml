objectives:
- Аналізувати аргументативну есеїстику Миколи Зерова в контексті літературної дискусії 1920-х років.
- Розрізняти позиції ключових літературних угруповань того часу (неокласики, футуристи, ВАПЛІТЕ).
- Пояснювати гасло "Ad Fontes!" як стратегію культурної деколонізації та утвердження європейської ідентичності України.
- Застосовувати риторичний аналіз для деконструкції полемічних текстів.
