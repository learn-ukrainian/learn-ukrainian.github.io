content_outline:
- points:
  - 'Провокація: Чому для імперії головне — не армія, а провінціалізація культури? Розбираємо на прикладі одного з найважливіших
    українських есе XX століття.'
  - 'Цитата без контексту: «Москва вимагає єдности, але здебільшого дістає слухняну посередність». Про що це?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Позиція Шевельова vs офіційний радянський/російський наратив. Україна як самобутня культура проти ідеї про «регіональний
    варіант» загальноросійської.'
  - 'Дебат 2: Рецепція постаті Шевельова. Чому його одночасно атакували і радянські ідеологи, і частина української діаспори?'
  - '[!epistemic-humility] Шевельов не «пророк», а науковець. Його тези — це аргументи в дискусії, а не істина в останній
    інстанції. Розглядаємо критику його поглядів.'
  section: 'Конфліктна карта: Україна — ''спірна територія'' чи окрема цивілізація?'
  words: 900
- points:
  - 'Детальний розбір трьох принципів імперського контролю за Шевельовим, з цитатами з тексту:'
  - '1. Принцип провінціалізму: як центр нав''язує периферії відчуття власної вторинності.'
  - '2. Принцип конформізму: механізми, що змушують талановитих людей периферії зрікатися своєї ідентичності задля кар''єри.'
  - '3. Принцип комплексу меншовартості: як нав''язана культурна ієрархія інтерналізується її жертвами.'
  - '[!decolonization] Цей текст дає інтелектуальні інструменти для демонтажу імперського погляду на українську культуру та
    історію.'
  section: 'Читання: Есе «Москва, Маросейка»'
  words: 1700
- points:
  - 'Аналіз стилю Шевельова: використання точної, майже клінічної мови для опису емоційно заряджених тем. Створення ефекту
    об''єктивності (ethos).'
  - 'Структура аргументації: як автор використовує історичні факти та літературні приклади для підтвердження своїх теоретичних
    висновків (logos).'
  - 'Порівняння з іншими есеїстами: чим риторика Шевельова відрізняється від стилю, наприклад, Оксани Забужко чи Сергія Жадана?'
  - '[!epistemic-humility] Шевельов представляє свої висновки як наукову діагностику. Наскільки такий підхід є переконливим
    і де його слабкі місця?'
  section: 'Риторика та аргументація: Науковий стиль як зброя'
  words: 1200
- points:
  - 'Повернення до розминки: тож чому культурний контроль важливіший за військовий з точки зору імперської логіки?'
  - Рецепція есе після 1991 року, а особливо після 2014 та 2022. Як змінилося його сприйняття та актуальність?
  - '[!anti-hagiography] Критика позицій Шевельова з боку інших інтелектуалів. Чи був він безпомилковим? Розглядаємо альтернативні
    погляди.'
  - 'Рефлексія: який з «трьох принципів» ви найчастіше бачите в сучасному культурному чи політичному житті?'
  section: Дискусія та підсумок
  words: 800
focus: Юрій Шевельов, есе «Москва, Маросейка», три принципи імперії (провінціалізм, конформізм, комплекс меншовартості), риторика
  наукового тексту, деколонізація української гуманітаристики
