objectives:
- Аналізувати ключові аргументи та риторичні стратегії в есе Юрія Шевельова «Москва, Маросейка»
- Застосовувати концепції «провінціалізму», «конформізму» та «комплексу меншовартості» для аналізу культурних явищ
- Критично оцінювати роль інтелектуалів у процесах деколонізації та формування національної ідентичності
- Розрізняти позиції в дискусії про українську культурну суб'єктність (Шевельов vs. імперський наратив)
