activity_hints:
- description: Визначте, яка з позицій (формалістична чи національно-орієнтована) відповідає наведеній тезі про походження
    есеїстики.
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставте правильні терміни (етос, пафос, логос, метафора, іронія) у речення, що описують фрагменти есе.
  focus: Риторична термінологія
  items: 5
  type: fill-in
- description: Проаналізуйте короткий уривок з есе. Визначте основну тезу автора та риторичні прийоми, які він використовує
    для її доведення.
  focus: Аналіз риторичних стратегій
  type: note
- description: Напишіть коротке есе (400-600 слів), де ви аргументуєте, чому певний есеїстичний твір (на вибір) має або не
    має залишатися в шкільній програмі сьогодні.
  focus: 'Есе-відповідь: Місце в сучасному каноні'
  type: note
cefr_min: C1
connects_to:
- lit-essay-002-sheres-vs-dragomanov
- lit-prose-015-pidmohylny
content_outline:
- points:
  - 'Провокація: Чи може есей бути зброєю? Розглядаємо цитату, де автор стверджує, що "кожне добре есе — це акт інтелектуальної
    диверсії".'
  - 'Загадка: Подано три короткі уривки з текстів різних епох. Який із них можна вважати першим українським есе і чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Формалістична позиція (есе як жанр з''явилося в Україні під впливом західноєвропейських зразків наприкінці ХІХ
    ст.) vs Національно-орієнтована позиція (елементи есеїстики присутні вже в полемічній літературі XVI-XVII ст.).'
  - 'Дебат 2: Хто в каноні? Юрій Шерех (Шевельов) як центральна постать vs альтернативні погляди, що пропонують включити раніше
    маргіналізованих авторів, зокрема жінок.'
  - '[!epistemic-humility] Не існує єдиної "правильної" дати народження жанру. Його визначення — це поле для постійних академічних
    дискусій.'
  section: 'Конфліктна карта: Де починається українське есе?'
  words: 900
- points:
  - Уривок з ключового есе, де автор формулює свою центральну тезу про культурну суб'єктність України.
  - 'Структура аргументації: аналіз того, як автор вибудовує доказову базу, використовуючи історичні, культурні та філософські
    аргументи.'
  - '[!decolonization] Розгляд есе як інструменту для руйнування імперських наративів та утвердження української інтелектуальної
    незалежності.'
  - 'Порівняння авторського стилю з його опонентами: як відрізняється їхня риторика та вибір доказів?'
  section: 'Читання: Полеміка навколо "Україна Incognita"'
  words: 1700
- points:
  - 'Аналіз риторичних фігур: як метафори, іронія та алегорії використовуються для переконання читача.'
  - 'Етос, пафос, логос: виявлення трьох стовпів риторики в тексті та оцінка їхньої ефективності.'
  - 'Контраргументація: як автор передбачає та спростовує можливі заперечення опонентів.'
  - '[!myth-buster] Розвінчання міфу про "об''єктивність" академічного письма. Кожен текст має свою риторичну стратегію та
    мету.'
  section: 'Риторика та аргументація: Мова як зброя в дебатах про ідентичність'
  words: 1200
- points:
  - 'Повернення до розминки: чи є есеїстика "інтелектуальною диверсією" на основі проаналізованих текстів? Студенти формулюють
    власну аргументовану відповідь.'
  - 'Рецепція тоді і зараз: як сприймали ці есе в момент публікації, і як їх читають сьогодні, особливо в контексті повномасштабного
    вторгнення?'
  - '[!anti-hagiography] Критична оцінка спадщини: чи були у провідних есеїстів "сліпі плями" або тези, які сьогодні виглядають
    застарілими чи проблематичними?'
  - 'Рефлексія: що нового ви дізналися про силу слова та роль інтелектуалів у суспільстві?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз ключових текстів та постатей, що сформували модерну українську есеїстику, дебати про канон та деколоніальну
  риторику.
level: LIT-ESSAY
module: lit-essay-001
objectives:
- Критично аналізувати полеміку про витоки та канон української есеїстики, формулюючи власну позицію.
- Розрізняти риторичні стратегії (етос, пафос, логос) та стилістичні прийоми в аргументативній прозі.
- Застосовувати деколоніальний підхід для аналізу есеїстичних текстів, виявляючи імперські та антиімперські наративи.
- Створювати власні аргументовані висловлювання у форматі есе-відповіді, реагуючи на прочитані тексти.
