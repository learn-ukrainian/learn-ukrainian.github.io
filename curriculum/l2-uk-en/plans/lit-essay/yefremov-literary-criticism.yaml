content_outline:
- points:
  - 'Провокація: Хто вирішує, які книги є «класикою»? Український літературний канон було «знайдено» чи «збудовано»? І ким?'
  - Цитата з гострою, полемічною думкою Єфремова про роль критика, подана без авторства — студент має вгадати, хто міг таке
    написати.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Єфремов — «об''єктивний» історик літератури чи «суб''єктивний» творець канону? Позитивістський метод vs ідеологічне
    завдання.'
  - 'Дебат 2: Канон Єфремова — інклюзивний чи ексклюзивний? Його критика модерністів (Хвильового, Семенка) — це захист класики
    чи несприйняття нового? [!epistemic-humility]'
  - 'Контекст: Полеміка з «радянськими» літературознавцями, які звинувачували Єфремова в «буржуазному націоналізмі».'
  - 'Глобальна синхронність: Єфремов і його «Історія українського письменства» vs подібні проекти канонотворення в інших «бездержавних»
    націях (Польща, Чехія, Фінляндія).'
  section: 'Конфліктна карта: Боротьба за канон'
  words: 900
- points:
  - Уривок з передмови до «Історії...» — аналіз його методологічного кредо.
  - Приклад аналізу конкретного автора (напр. Шевченка) за Єфремовим. Як він вибудовує наратив про «народність» та «європейськість»?
  - '[!decolonization] Як Єфремов відвойовує українську літературу в імперської схеми «малоросійського» письменства? Його
    концепція безперервності літературного процесу.'
  - Порівняння оцінки одного й того ж твору Єфремовим та його опонентами (напр., радянською критикою).
  section: 'Читання: "Історія українського письменства"'
  words: 1700
- points:
  - 'Структура аргументу: Єфремов використовує величезний масив біографічних та історичних даних («фактів») для побудови своєї
    ідеологічної концепції.'
  - 'Риторичні прийоми: використання сарказму та іронії в полеміці з опонентами.'
  - 'Метафори як аргумент: «будинок української літератури», «золотий вік», «темні часи». Як ці образи формують читацьке сприйняття?'
  - '[!epistemic-humility] Аналіз «сліпих плям»: кого Єфремов «не помітив» або недооцінив? Чи був його канон остаточним?'
  section: 'Риторика та аргументація: Позитивізм як зброя'
  words: 1200
- points:
  - 'Повернення до розминки: тож канон «будують» чи «знаходять»? Відповідь студента на основі аналізу методу Єфремова.'
  - 'Рецепція: як змінювалось ставлення до спадщини Єфремова (від канонізації до критики і нового прочитання)?'
  - '[!anti-hagiography] Єфремов як трагічна фігура — академіст, що опинився в епіцентрі революційних бур. Його арешт і загибель
    як символ долі української інтелігенції.'
  - 'Сучасна релевантність: чи потрібен Україні сьогодні новий Єфремов? Чи можливий єдиний канон в епоху постмодерну?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз методології Сергія Єфремова, його роль у формуванні українського літературного канону та дебати навколо його
  спадщини.
level: LIT-ESSAY
module: lit-essay-021
objectives:
- Аналізувати методологію Сергія Єфремова в контексті творення національного канону.
- Розрізняти позитивістський та ідеологічний підходи в літературній критиці.
- Критично оцінювати роль Єфремова у полеміці з радянською критикою та модерністами.
- Формулювати власну позицію щодо актуальності літературного канону в XXI столітті.
