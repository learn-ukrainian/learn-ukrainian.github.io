content_outline:
- points:
  - 'Провокація: знаменита дилема Грушевського «Україна чи Малоросія?» — що змусило головного історика нації взятися за гостре
    перо публіциста?'
  - 'Цитата без контексту: «Організований, свідомий своїх потреб, своєї мети народ може осягнути все». Де і за яких обставин
    це було сказано?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Об''єктивний вчений vs заангажований політик. Чи можна довіряти Грушевському-історику, знаючи про його політичні
    амбіції? Позиція радянської критики vs сучасні погляди.'
  - 'Дебат 2: Публіцистика — це «справжня» робота чи побічний продукт? Дискусія про те, чи не применшує політична есеїстика
    величі Грушевського як автора монументальної «Історії України-Руси».'
  - '[!epistemic-humility] Не існує єдиної «правильної» оцінки спадщини Грушевського; є лише різні оптики та аргументовані
    позиції.'
  section: 'Конфліктна карта: Історик чи політик?'
  words: 900
- points:
  - 'Ключовий уривок з програмного есе: аналіз мови, стилю та центральної тези.'
  - Як Грушевський використовує історичні приклади для аргументації поточної політичної позиції (напр., щодо автономії України).
  - 'Концепція «суб''єктності»: аналіз того, як текст конструює образ українців як самостійних творців власної долі, а не
    об''єктів політики імперій.'
  - '[!decolonization] Текст як зброя: руйнування імперського наративу про «єдиний народ» та утвердження самостійності української
    історії та культури.'
  section: 'Читання: Есе зі збірки «З біжучої хвилі»'
  words: 1700
- points:
  - 'Структура аргументу: Грушевський будує політичні тези на фундаменті глибоких історичних знань, що надає їм надзвичайної
    ваги.'
  - 'Риторичні стратегії: використання спокійного, академічного тону для створення ефекту об''єктивності та незаперечності
    (етос вченого).'
  - 'Порівняння стилів: чим риторика Грушевського-публіциста відрізняється від емоційних закликів його політичних опонентів
    (напр., з націоналістичного чи консервативного таборів).'
  - '[!myth-buster] Грушевський — не просто «професор з бородою». Він був майстром політичної риторики, що свідомо використовував
    свій авторитет для просування конкретного політичного проєкту.'
  section: 'Риторика та аргументація: Науковий стиль як політичний інструмент'
  words: 1200
- points:
  - 'Повернення до розминки: Як есеїстика Грушевського дає відповідь на питання «Україна чи Малоросія?»'
  - 'Рецепція та спадщина: Чому радянська влада так боялася його публіцистики, часто ігноруючи її на користь критики його
    «буржуазно-націоналістичної» історичної концепції?'
  - 'Сучасне значення: Як аргументи Грушевського столітньої давності про державність, ідентичність та суб''єктність звучать
    у контексті сучасної російсько-української війни?'
  - '[!anti-hagiography] Критичний погляд: Чи не були деякі політичні прогнози Грушевського помилковими? Аналіз його ідеї
    федералізму в Росії та її критика з боку самостійників.'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз політичної есеїстики Михайла Грушевського як інструменту державотворення, формування національної ідентичності
  та деколонізації української історіографії.
level: LIT-ESSAY
module: lit-essay-012
objectives:
- Аналізувати публіцистику Михайла Грушевського у широкому контексті українського державотворення початку ХХ століття.
- Розрізняти ролі Грушевського як об'єктивного історика та заангажованого публіциста, оцінюючи сильні та слабкі сторони обох
  позицій.
- Застосовувати методи риторичного аналізу для дослідження есеїстики як інструменту політичного впливу.
- Формулювати власну аргументовану позицію щодо актуальності ідей Грушевського для сучасної України.
