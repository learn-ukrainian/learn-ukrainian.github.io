activity_hints:
- description: Визначте, яка позиція належить радянській критиці, а яка — сучасній історіографії. Чия це теза — Грушевського-історика
    чи Грушевського-політика?
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставте в речення з тексту модуля правильні терміни: історіографія, наратив, суб''єктність, публіцистика.'
  focus: Ключова термінологія
  items: 4
  type: fill-in
- description: 'Порівняйте два уривки: один з «Історії України-Руси», інший — з політичного есе. Проаналізуйте різницю у стилі,
    тоні та меті висловлювання. Де Грушевський більш переконливий і чому? (300-400 слів)'
  focus: 'Джерельний аналіз: Історія vs Есе'
  type: note
- description: Оберіть один з ключових аргументів Грушевського (про суб'єктність, про розрив з Москвою, про державність) і
    напишіть есе про те, як він може бути використаний сьогодні для протидії російській дезінформації. (400-600 слів)
  focus: 'Есе: Аргументи Грушевського сьогодні'
  type: note
cefr_min: C1
connects_to:
