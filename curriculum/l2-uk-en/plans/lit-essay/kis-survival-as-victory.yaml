objectives:
- Аналізувати специфіку жіночого досвіду ГУЛАГу, використовуючи інструментарій гендерної антропології та усної історії.
- Критично оцінювати риторичні стратегії та методи аргументації в науковій гуманітаристиці на прикладі праці Оксани Кісь.
- Пояснювати деколонізаційний вимір дослідження, що розглядає українських жінок як суб'єктів національного опору, а не лише
  як жертв радянського тоталітаризму.
- Формулювати власну позицію в рамках ключових дебатів, що стосуються пам'яті про ГУЛАГ (наукова об'єктивність vs емпатія,
  опір vs виживання).
