content_outline:
- points:
  - 'Провокація: Чи може письменник, що не живе в Україні, бути голосом нації? Цитата Юрія Луцького про «обов''язок діаспори
    говорити те, що не може сказати метрополія».'
  - 'Ключове питання: Як інтелектуал, що знаходиться поза контекстом, може впливати на національний наратив, не спотворюючи
    його?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Діаспорна література vs література метрополії. Луцький як представник «гарвардської школи» — це збагачення чи
    спотворення української думки?'
  - 'Дебат 2: Місце Луцького в каноні діаспорної критики. Його полеміка з більш консервативними колами та згодом із постмодерністами.'
  - '[!epistemic-humility] Не існує єдиної «діаспорної» позиції. Луцький — лише один із голосів у складній поліфонії.'
  - '[!decolonization] Луцький як один з перших, хто застосував західну академічну методологію для аналізу української літератури
    як самостійного, а не провінційного явища.'
  section: 'Конфліктна карта: Голос ''ззовні'''
  words: 900
- points:
  - 'Ключовий уривок з однойменного есе Луцького: аналіз вибору між імперським та національним шляхами розвитку.'
  - 'Аргументація Луцького: чому вибір Шевченка був не естетичним, а екзистенційним для української культури.'
  - 'Структура тексту: як Луцький вибудовує свою тезу, використовуючи біографічні, історичні та текстуальні докази.'
  - '[!decolonization] Читання Гоголя не як «українського» чи «російського» письменника, а як символу культурної дилеми, яку
    Луцький вважав центральною для України.'
  section: 'Читання: ''Між Гоголем і Шевченком'''
  words: 1700
- points:
  - 'Аналіз риторичних стратегій Луцького: використання логіки та доказів (logos) проти емоційних патріотичних аргументів
    (pathos).'
  - Роль іронії та академічного скепсису в його стилі. Як він руйнує «чорно-білі» наративи.
  - Порівняння стилю Луцького з іншими критиками його доби — наприклад, з більш емоційним стилем Дмитра Донцова.
  - '[!epistemic-humility] Критика Луцького: чи не був його погляд іноді занадто відстороненим, «західним», що не враховував
    локальну специфіку?'
  section: 'Риторика та аргументація: Полеміка як метод'
  words: 1200
- points:
  - 'Повернення до розминки: то яку роль відіграє «голос ззовні»? Аргументована відповідь на основі аналізу творчості Луцького.'
  - 'Рецепція в Україні: як праці Луцького були сприйняті в Україні після 1991 року? Чи став він «своїм»?'
  - '[!anti-hagiography] Критичний погляд на спадщину: чи не ідеалізував Луцький роль західної академії? Де межі його аналітичного
    методу?'
  - 'Сучасна релевантність: наскільки аргументи Луцького про культурний вибір актуальні для України в стані війни?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз есеїстики Юрія Луцького, роль діаспорної думки у формуванні модерної української ідентичності, полеміка з радянською
  та західною історіографією.
level: LIT-ESSAY
module: lit-essay-054
objectives:
- Аналізувати аргументативну прозу як інструмент формування національної ідентичності на прикладі есеїстики Юрія Луцького
- Розрізняти та критично оцінювати різні позиції в літературно-критичних дебатах про роль діаспори
- Застосовувати методи риторичного аналізу для розуміння стратегій переконання в публіцистичному тексті
- Формулювати власну позицію щодо актуальності інтелектуальної спадщини діаспори для сучасної України
