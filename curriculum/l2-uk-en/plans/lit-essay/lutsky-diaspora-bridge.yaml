activity_hints:
- description: Кому належить теза? Визначте, яка з позицій у дебаті про діаспорну літературу належить Луцькому, а яка — його
    опонентам.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Заповніть пропуски в реченнях, використовуючи ключові терміни з розділу "Риторика та аргументація": logos,
    pathos, іронія, скепсис.'
  focus: Риторичні стратегії
  items: 4
  type: fill-in
- description: Прочитайте уривок з есе Луцького. Сформулюйте його центральну тезу своїми словами та наведіть 2-3 аргументи,
    які він використовує для її доведення.
  focus: 'Аналіз есе: ''Між Гоголем і Шевченком'''
  type: note
- description: 'Напишіть коротке есе (400-600 слів) на тему: "Чи актуальна сьогодні полеміка Юрія Луцького про культурний
    вибір України?". Використовуйте аргументи з модуля.'
  focus: 'Есе: Спадщина Луцького'
  type: note
cefr_min: C1
connects_to:
