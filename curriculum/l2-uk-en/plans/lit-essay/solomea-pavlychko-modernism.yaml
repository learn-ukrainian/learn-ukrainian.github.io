content_outline:
- points:
  - 'Провокація: Чи справді Ольга Кобилянська — «гірська орлиця»? А що, як вона — «царівна»? Провокативне питання Соломії
    Павличко, що перевернуло канон.'
  - Цитата без контексту з праці Павличко про «нездорові» бажання в текстах Лесі Українки, що змушує переосмислити хрестоматійний
    образ поетеси.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Національно-патріотична школа критики (канонічний образ письменника як пророка нації) vs феміністична психоаналітична
    критика Павличко (у фокусі — тіло, бажання, витіснене).'
  - 'Дебат 2: Що таке «канон» і хто його формує? Аргумент Павличко про те, як радянська та націоналістична критика «очищала»
    модерністів від усього «небезпечного».'
  - '[!epistemic-humility] Критика Павличко не є істиною в останній інстанції, а потужною контрінтерпретацією, що відкрила
    нові шляхи для прочитання класики.'
  section: 'Конфліктна карта: Патріархальний канон vs. Феміністична ревізія'
  words: 900
- points:
  - Розбір уривку з аналізом образу жінки-«вамп» у прозі Винниченка або Кобилянської.
  - 'Коментар Павличко: як вона використовує поняття «дискурсу» Фуко для аналізу влади, втіленої в мові та літературних образах.'
  - '[!decolonization] Павличко показує, як український модернізм, попри колоніальний тиск, був глибоко інтегрований у європейські
    філософські та мистецькі течії, а не був лише «молодшим братом» російської літератури.'
  - 'Аналіз наративної стратегії самої Павличко: як вона будує свій текст, щоб переконати читача.'
  section: 'Читання: Фрагмент з «Дискурсу модернізму»'
  words: 1700
- points:
  - 'Теза Павличко: бажання є ключем до розуміння текстів модернізму.'
  - 'Риторичні стратегії: як Павличко використовує фройдистські поняття (витіснене, несвідоме, Едипів комплекс) для побудови
    своєї аргументації.'
  - '[!epistemic-humility] Павличко звинувачували в «надмірному» психологізмі. Розгляд контраргументів: де межа між інтерпретацією
    та «натягуванням» теорії на текст?'
  - Порівняння її методу з методами попередників (наприклад, з позитивістською критикою) — що саме вона змінила в українському
    літературознавстві?
  section: 'Риторика та аргументація: Психоаналіз як інструмент критики'
  words: 1200
- points:
  - 'Повернення до розминки: то ким є Кобилянська після аналізу Павличко? Студент формулює свою позицію.'
  - 'Рецепція та спадщина: чому праці Павличко викликали такий резонанс на початку 90-х? Чи актуальні її ідеї сьогодні?'
  - '[!anti-hagiography] Павличко як людина своєї епохи: які її тези сьогодні виглядають застарілими, а які — пророчими?'
  - 'Сучасне значення: як ідеї Павличко про деконструкцію імперських та патріархальних міфів допомагають розуміти сучасну
    українську культуру та війну.'
  section: Дискусія та підсумок
  words: 700
focus: Феміністична та постколоніальна критика українського модернізму, аналіз аргументаційної прози Павличко, оскарження
  патріархального канону.
level: LIT.ESSAY
module: lit-essay-057
objectives:
- Критично аналізувати аргументаційні стратегії Соломії Павличко в її есеїстиці.
- Пояснювати внесок Павличко у феміністичну ревізію та деколонізацію українського літературного канону.
- Застосовувати базовий апарат феміністичної та психоаналітичної критики до аналізу літературних текстів.
- Формулювати власну позицію в літературній дискусії, спираючись на запропоновані тексти та аргументи.
