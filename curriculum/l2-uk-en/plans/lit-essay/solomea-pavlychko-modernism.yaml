    цитатою.
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: 'Вставити в речення терміни з модуля: дискурс, канон, суб''єктність, деконструкція, психоаналіз.'
  focus: Ключова термінологія
  items: 5
