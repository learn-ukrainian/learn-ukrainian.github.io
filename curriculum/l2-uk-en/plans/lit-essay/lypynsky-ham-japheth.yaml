content_outline:
- points:
  - 'Провокація: "Ніхто не збудує держави в Україні, крім нас самих". Чому цей заклик Липинського, написаний 100 років тому,
    звучить так гостро сьогодні?'
  - 'Що важливіше для нації: територія чи воля до влади? Липинський дає несподівану відповідь.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Держава чи народ? Полеміка Липинського з народниками та соціалістами про першочерговість інституцій над "волею
    мас".'
  - 'Дебат 2: Еліта — рушій чи гальмо? Липинський обстоює "класократію" (владу відповідальної еліти) проти "охлократії" (влади
    натовпу).'
  - '[!epistemic-humility] Чи не була ідея аристократичної еліти утопією в країні селян? Критика концепції Липинського зліва.'
  - 'Суб''єктність України: Липинський доводить, що Україна — не об''єкт змагань між Польщею та Росією, а самостійний гравець.'
  section: 'Конфліктна карта: Консерватор vs Народник'
  words: 900
- points:
  - 'Аналіз центральної метафори: поділ нащадків Ноя — Хам (рабська психологія), Яфет (кочовий інстинкт руйнування), Сем (творча
    державницька праця).'
  - '[!decolonization] Розвінчання міфу про "вічне братерство" з Росією. Липинський як один з перших ідеологів повного розриву
    з "московською євразійською цивілізацією".'
  - Критика українського "провансальства" — мрій про аполітичну, "етнографічну" націю без держави.
  - Поняття "державного інстинкту" та його роль у формуванні нації.
  section: 'Читання: "Листи до братів-хліборобів"'
  words: 1800
- points:
  - 'Стратегія "шокової терапії": використання гострих, провокативних термінів ("охлократія", "державний інстинкт", "провансальство").'
  - 'Історична аналогія як головний інструмент: порівняння України з Англією часів Кромвеля, Іспанією, Францією.'
  - 'Риторика відповідальності: звернення до читача ("брата-хлібороба") не як до жертви, а як до відповідального громадянина.'
  - 'Аналіз структури аргументу: від діагнозу хвороби (бездержавність) до пропозиції ліків (консервативна ідея).'
  section: 'Риторика та аргументація: Полемічний стиль Липинського'
  words: 1200
- points:
  - 'Повернення до розминки: чи збудували ми державу, про яку писав Липинський? Студент формулює відповідь.'
  - 'Рецепція: чому Липинський був забутий в СРСР і "воскрес" в 1990-х? Його роль у сучасних дебатах про національну ідентичність.'
  - '[!anti-hagiography] Чи не є "класократія" Липинського просто легітимацією влади олігархів? Критичне прочитання його елітизму.'
  - 'Спадщина: вплив Липинського на сучасний український консерватизм та політичну думку.'
  section: Дискусія та підсумок
  words: 700
focus: В'ячеслав Липинський та його праця "Листи до братів-хліборобів". Аналіз консервативної моделі держави, критика "охлократії",
  полеміка з соціалістами та народниками.
