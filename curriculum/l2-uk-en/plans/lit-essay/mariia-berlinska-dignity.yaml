content_outline:
- points:
  - 'Провокація: «Технології — це не про залізо. Це про шанс вижити». Як одна цитата Марії Берлінської змінила оборонну стратегію
    цілої країни?'
  - 'Питання до роздумів: Чи може текст есею бути більш дієвим за наказ генерала?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Берлінська — це насамперед громадська діячка, для якої тексти є лише інструментом, чи її есеїстика має самостійну
    літературну цінність?'
  - 'Дебат 2: Чи є її тексти «літературою» в класичному розумінні, чи це новий жанр — «оперативна публіцистика», що існує
    на межі з документалістикою та політичним маніфестом?'
  - '[!epistemic-humility] Позиція критиків: одні вважають її продовжувачкою традиції української публіцистики (Драгоманов,
    Липинський), інші — що її творчість позалітературна і має оцінюватися за критеріями ефективності, а не естетики.'
  section: 'Конфліктна карта: Активістка чи Есеїстка?'
  words: 900
- points:
  - 'Ключовий уривок: аналіз поняття гідності не як абстрактної чесноти, а як прагматичної умови виживання нації.'
  - 'Структура аргументу: як Берлінська переходить від особистого досвіду на фронті до філософських узагальнень про природу
    держави та суспільства.'
  - 'Наративний голос: поєднання експертної оптики (аеророзвідка) та глибоко особистої, майже сповідальної інтонації.'
  - '[!decolonization] Текст як акт деколонізації свідомості: відмова від ролі «жертви» та утвердження української суб''єктності
    через дію, технології та інтелект.'
  section: 'Читання: Фрагменти з есею «Анатомія Гідності»'
  words: 1800
- points:
  - 'Аналіз риторики: використання точних, майже військових формулювань для опису соціальних процесів. Мінімум метафор, максимум
    фактів.'
  - 'Основні прийоми: апеляція до логіки (logos) через статистику та технологічні обґрунтування; до емоцій (pathos) через
    пряму мову побратимів; до авторитету (ethos) через власний бойовий досвід.'
  - 'Порівняння стилів: чим риторика Берлінської відрізняється від класичної політичної промови або академічної статті? Роль
    соцмереж у формуванні її стилю.'
  - '[!epistemic-humility] Контраргумент: чи не призводить така гранична ясність та прямота до надмірного спрощення складних
    соціальних проблем?'
  section: 'Риторика та аргументація: Мова як зброя'
  words: 1200
- points:
  - 'Повернення до розминки: після аналізу текстів, як би ви відповіли на питання про дієвість слова у порівнянні з наказом?'
  - 'Рецепція та вплив: як суспільство та влада реагують на тексти Берлінської? Аналіз конкретних кейсів, коли її есеї призводили
    до реальних змін.'
  - '[!anti-hagiography] Критичний погляд: які потенційні ризики несе в собі концентрація такого значного впливу в руках однієї
    людини, навіть з бездоганною репутацією? Де межа між пророцтвом і тиском на демократичні інститути?'
  - 'Сучасне значення: роль публічного інтелектуала у воюючій країні. Чи є Берлінська моделлю для наслідування?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз есеїстики Марії Берлінської про війну, технології, громадянське суспільство та деколонізацію. Риторика як інструмент
  змін.
level: LIT-ESSAY
module: lit-essay-045
objectives:
- Аналізувати есеїстику Марії Берлінської як інструмент громадянського впливу та риторичної дії
- Розрізняти та критично оцінювати риторичні стратегії (ethos, pathos, logos), що використовуються для аргументації позиції
- Формулювати власну аргументовану позицію в дебатах про співвідношення літератури, активізму та публіцистики в умовах війни
- Застосовувати концепт "деколонізація" для аналізу сучасних українських текстів, що формують національну суб'єктність
