content_outline:
- points:
  - 'Провокація: «Я готовий померти за цю країну, але хочу знати, за яку саме країну я воюю». Як це питання, поставлене воїном,
    змінює політичну дискусію?'
  - Цитата без контексту з інтерв'ю «Да Вінчі» про майбутнє України, що змушує замислитись.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Свідчення чи публіцистика? Чи є тексти та інтерв''ю «Да Вінчі» лише особистим свідченням, чи це свідома політична
    аргументація, спрямована на зміну суспільства?'
  - 'Дебат 2: Спадщина для нації чи заповіт для побратимів? Дискусія про те, хто був головним адресатом його слів і як це
    впливає на їх інтерпретацію.'
  - '[!epistemic-humility] Уникаємо однозначних оцінок: аналізуємо аргументи обох сторін, розглядаючи тексти як багатошарове
    явище.'
  section: 'Конфліктна карта: Заповіт Воїна'
  words: 900
- points:
  - Аналіз уривків з ключових інтерв'ю «Да Вінчі», де він формулює своє бачення війни, держави та відповідальності.
  - Розбір його дописів у соцмережах як прикладу прямої комунікації з суспільством, що обходить традиційні медіа.
  - '[!decolonization] «Да Вінчі» як приклад повної деколонізації свідомості. Його мова — це мова суб''єкта, який діє і говорить
    від свого імені, відкидаючи будь-які імперські наративи.'
  - 'Наративна структура його розповідей: як він вибудовує аргумент через особисту історію, роблячи її універсальною.'
  section: 'Читання: Фрагменти інтерв''ю та дописів'
  words: 1800
- points:
  - 'Аналіз риторичних стратегій: максимальна прямота, відсутність евфемізмів, апеляція до досвіду (етос воїна).'
  - 'Логіка аргументації: як він використовує конкретні приклади з фронту для обґрунтування широких політичних тез.'
  - Іронія та чорний гумор як інструменти критики та спосіб зберегти людську гідність в нелюдських умовах.
  - '[!epistemic-humility] Порівняння його риторики з офіційними промовами політиків та військових: в чому сила і слабкість
    кожного підходу?'
  section: 'Риторика та аргументація: Пряма мова як політичний акт'
  words: 1200
- points:
  - 'Повернення до розминки: що робить слово воїна таким вагомим у суспільній дискусії?'
  - 'Рецепція спадщини: як постать «Да Вінчі» почала міфологізуватися після його загибелі. Які аспекти його меседжу посилюються,
    а які — зникають?'
  - '[!anti-hagiography] Критичний погляд на процес творення національного героя. Чи не губиться за іконою реальна людина
    з її суперечностями?'
  - 'Сучасне значення: як ідеї «Да Вінчі» впливають на дискусії про майбутнє України сьогодні?'
  section: Дискусія та підсумок
  words: 700
