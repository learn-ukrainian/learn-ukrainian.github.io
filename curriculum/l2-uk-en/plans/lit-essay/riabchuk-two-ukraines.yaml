content_outline:
- points:
  - 'Провокаційне питання: чи є Україна єдиною нацією? І що, якщо відповідь на це питання кардинально змінилася після повномасштабного
    вторгнення?'
  - 'Цитата з Рябчука без контексту: "Головний конфлікт української посткомуністичної трансформації... це конфлікт між автохтонною,
    українською за мовою і культурою, частиною суспільства та частиною креольською".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Теза Рябчука (постколоніальний розлам, креольська еліта vs автохтонне суспільство) vs альтернативні пояснення
    (регіоналізм, радянська спадщина, теорія Гантінгтона про "зіткнення цивілізацій").'
  - 'Дебат 2: Рябчук — пророк чи історик свого часу? Наскільки його концепція, сформульована у 1990-х, пояснює події 2014
    та 2022 років? Чи вона застаріла?'
  - '[!epistemic-humility] Критики Рябчука вказували на надмірну схематичність його моделі та ігнорування динаміки суспільних
    змін.'
  section: 'Конфліктна карта: Одна чи дві України?'
  words: 900
- points:
  - 'Аналіз ключових есе з праці "Від Малоросії до України: парадокси запізнілого націєтворення".'
  - 'Ключові поняття: розрізнення "Малоросії" (провінційної лояльності до імперії) та "України" (суб''єктної національної
    ідентичності).'
  - Феномен "homo sovieticus" та "креольської" ідентичності як інструменти аналізу української еліти 1990-х.
  - '[!decolonization] Рябчук одним із перших в Україні системно застосував постколоніальну теорію для аналізу українського
    суспільства, виводячи його з тіні російських наративів.'
  section: 'Читання: Від Малоросії до України'
  words: 1800
- points:
  - 'Аргументація Рябчука: як він поєднує соціологічні дані, історичний аналіз та літературну критику для побудови своєї тези.'
  - 'Риторичні прийоми: використання гострих дихотомій (креоли/автохтони, Малоросія/Україна) для загострення думки.'
  - 'Інтелектуальні джерела: як Рябчук адаптує ідеї Едварда Саїда, Франца Фанона та інших теоретиків постколоніалізму до українського
    контексту.'
  - '[!epistemic-humility] Порівняння стилю Рябчука зі стилем інших українських есеїстів (напр., Оксани Забужко чи Ярослава
    Грицака) — чим його підхід є унікальним?'
  section: 'Риторика та аргументація: Постколоніальний інструментарій'
  words: 1200
- points:
  - 'Повернення до розминки: чи є сьогодні в Україні "дві України"? Формулювання аргументованої відповіді з опорою на тези
    Рябчука та сучасні реалії.'
  - 'Рецепція творчості: як сприймали ідеї Рябчука у 2000-х і як їхнє значення змінилося після повномасштабного вторгнення.'
  - '[!anti-hagiography] Критичний погляд: чи не стала модель "двох Україн" самовтілюваним пророцтвом або навіть інструментом
    для політичних маніпуляцій?'
  - 'Спадщина: у чому полягає головний внесок Миколи Рябчука в українську інтелектуальну думку?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз політичної есеїстики Миколи Рябчука, концепція 'двох Україн', постколоніальна критика та її актуальність після
  2022 року.
level: LIT-ESSAY
module: lit-essay-034
objectives:
- Аналізувати концепцію «двох Україн» Миколи Рябчука як інструмент постколоніальної критики.
- Застосовувати теоретичний апарат Рябчука для аналізу сучасних українських суспільно-політичних процесів.
- Критично оцінювати сильні та слабкі сторони моделі «двох Україн» у контексті подій після 2014 та 2022 років.
- Розрізняти поняття «малоросійства», «креолізації» та «гомо совєтікус» у працях автора.
