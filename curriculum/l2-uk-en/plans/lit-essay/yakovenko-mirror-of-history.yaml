content_outline:
- points:
  - 'Провокація: Чи може історик бути об''єктивним, чи він завжди є автором, що конструює минуле як текст?'
  - Аналіз концепції "образу іншого" як ключа до розуміння історичної свідомості.
  - 'Цитата з Яковенко: "Історія — це завжди палімпсест, де під новими письменами проступають старі".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Яковенко vs Радянська історіографія. Демонтаж марксистської схеми та телеології, фокус на людині та її виборах.'
  - 'Дебат 2: Яковенко vs Народницька школа (Грушевський, Костомаров). Критика фокусу на "народних масах" та введення в обіг
    історії еліт (шляхти), їхньої культури та ідентичності.'
  - '[!decolonization] Відмова від радянських та російсько-імперських схем, повернення України в європейський інтелектуальний
    контекст (Res Publica).'
  - '[!epistemic-humility] Яковенко не дає "остаточних" відповідей, а показує складність та неоднозначність минулого.'
  section: 'Конфліктна карта: Історія як поле бою'
  words: 900
- points:
  - Близьке читання уривків з "Дзеркал історії" про ранньомодерну ідентичність.
  - Аналіз того, як Яковенко використовує першоджерела для реконструкції світогляду шляхтича та козака.
  - 'Проблема "націоналізації" історії XVII століття: як уникнути проєкції сучасних націй на минуле.'
  - '[!decolonization] Розгляд латинської, польської та церковнослов''янської мов як невід''ємних частин культурного ландшафту
    України-Русі, на противагу міфу про монолітну "народну" культуру.'
  section: 'Читання: Шляхта vs Козаки — подвійна оптика'
  words: 1800
- points:
  - 'Аналіз "барокової" стилістики Яковенко: довгі речення, складна термінологія, інтелектуальна насиченість як спосіб передати
    складність епохи.'
  - 'Іронія та наукова точність: як авторка використовує іронію для дистанціювання від застарілих концепцій.'
  - 'Термінологічна вишуканість: розбір ключових понять (дискурс, ідентичність, топос, палімпсест) як інструментів аналізу.'
  - 'Метафора як аргумент: "дзеркала історії", "палімпсест", "конструкція" — як ці образи формують розуміння історичного процесу.'
  section: 'Риторика та аргументація: Науковий стиль як зброя'
  words: 1200
- points:
  - 'Повернення до розминки: тож історик — суддя, літописець чи митець? Формулювання відповіді на основі аналізу праці Яковенко.'
  - Рецепція та вплив "Дзеркал історії" на сучасну українську гуманітаристику. Чому ця праця стала канонічною?
  - '[!anti-hagiography] Критичний погляд: які слабкі місця методології Яковенко? Які альтернативні підходи існують?'
  - 'Рефлексія: як прочитання цієї праці змінює ваше уявлення про те, що таке історія та як її пишуть?'
  section: Дискусія та підсумок
  words: 700
focus: 'Наталя Яковенко''s "Дзеркала історії" as argumentative prose: deconstruction of historical myths, historiography as
  rhetoric, and the role of the historian as author.'
level: LIT-ESSAY
module: lit-essay-037
objectives:
- Аналізувати концепцію "історії як тексту" та роль історика як конструктора минулого на прикладі праці Н. Яковенко.
- Розрізняти методологічні підходи Н. Яковенко, радянської історіографії та народницької школи.
- Інтерпретувати уривки з "Дзеркал історії", виявляючи риторичні стратегії та особливості наукового стилю авторки.
- Формулювати власну аргументовану позицію щодо впливу методології на конструювання історичного наративу.
