activity_hints:
- description: Визначити, яка позиція (скептик/апологет) відповідає наведеним тезам про «Історію Русів».
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Заповнити пропуски в реченнях, використовуючи слова: памфлет, суб''єктність, рецепція, містифікація, наратив.'
  focus: Ключові терміни
  items: 5
  type: fill-in
- description: Порівняйте фрагмент з промови Полуботка та уривок з поеми «Сон» (сцена в царських палатах). Визначте спільні
    мотиви та образи. Як Шевченко трансформує риторику «Історії Русів»?
  focus: 'Джерельний аналіз: «Історія Русів» vs «Сон» Шевченка'
  type: note
- description: Використовуючи «Історію Русів» як приклад, напишіть коротке есе (400-600 слів) на тему "Чи може політичний
    міф бути корисним для суспільства, що бореться за незалежність?".
  focus: 'Есе: Роль міфу в національній мобілізації'
  type: note
