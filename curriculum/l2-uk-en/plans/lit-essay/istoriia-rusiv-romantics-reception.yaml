content_outline:
- points:
  - 'Провокаційне питання: Чи могла українська нація постати без «Історії Русів» — тексту, автор якого невідомий, а більшість
    фактів — сумнівні?'
  - 'Цитата без контексту: "Кожен зобов''язаний захищати свою батьківщину, жертвуючи останнім... і сама смерть у бою за батьківщину
    краща, ніж життя в рабстві". — Звідки ця промова, і чому вона стала маніфестом цілого покоління?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Історія Русів» — це фальсифікат, історичний документ чи літературний твір? Позиції скептиків (свідома містифікація)
    та апологетів (втрачене джерело).'
  - 'Дебат 2: Текст *створив* український національний наратив чи лише *зафіксував* його? Дискусія про роль еліт у конструюванні
    ідентичності.'
  - '[!epistemic-humility] Немає остаточної відповіді щодо авторства (Кониський? Полетика? Ханенко?). Важливіше — чому текст
    став настільки впливовим, незважаючи на анонімність.'
  - '[!myth-buster] «Історія Русів» — не об''єктивна історія, а політичний памфлет, написаний з конкретною метою: довести
    історичну тяглість та окремішність українського народу.'
  section: 'Конфліктна карта: Історична правда vs Політичний міф'
  words: 900
- points:
  - 'Ключовий уривок: аналіз промови гетьмана Полуботка в Петербурзі — центральний міф «Історії Русів».'
  - 'Аналіз наративу: як автор конструює ідеалізований образ козацької республіки як антитези до російського самодержавства.'
  - 'Романтична рецепція: як Шевченко, Костомаров та інші романтики використовували образи та ідеї з «Історії Русів» (наприклад,
    у вірші «Сон» або в «Книгах буття українського народу»).'
  - '[!decolonization] Текст є першою масштабною спробою написати історію України з української перспективи, відкидаючи імперську
    схему «єдиного народу».'
  section: 'Читання: Промова Полуботка та козацька республіка'
  words: 1800
- points:
  - 'Структура аргументу: як автор вибудовує наратив від часів Ноя до XVIII ст., щоб довести безперервність української державної
    традиції.'
  - 'Риторичні стратегії: використання промов, драматичних сцен, апеляцій до честі та свободи (етос і патос) для емоційного
    впливу на читача.'
  - 'Логіка і докази: автор часто посилається на невідомі або вигадані джерела, створюючи ілюзію науковості. Аналіз того,
    як "фейк" може бути переконливішим за правду.'
  - '[!epistemic-humility] Порівняння з іншими європейськими "національними епосами" XIX ст. (Калевала, пісні Оссіана), які
    також були на межі містифікації та історичної реконструкції.'
  section: 'Риторика та аргументація: Як переконати в неіснуючому'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чи є «Історія Русів» основоположним міфом модерної України? Аргументація власної позиції
    студентом.'
  - 'Історична рецепція: як змінювалося ставлення до тексту від захоплення в XIX ст. до наукової критики у XX ст. та нового
    інтересу в XXI ст.'
  - '[!anti-hagiography] Чи не ідеалізували романтики текст, ігноруючи його антисемітські та антипольські пасажі? Критичний
    погляд на "сліпі плями" національного канону.'
  - 'Сучасне значення: Чому «Історія Русів» знову актуальна в умовах сучасної російсько-української війни? Які її ідеї резонують
    сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз рецепції «Історії Русів» серед романтиків (Шевченко, Костомаров) як тексту, що сформував модерну українську
  національну ідентичність, та його роль як політичного памфлету, а не історичної хроніки.
level: LIT-ESSAY
module: lit-essay-004
objectives:
- Аналізувати, як українські романтики (Шевченко, Костомаров) інтерпретували «Історію Русів» для конструювання національної
  ідентичності.
- Оцінювати роль «Історії Русів» як політичного памфлету та його вплив на формування модерної української нації.
- Розрізняти поняття історичного факту, літературної вигадки та політичного міфу на прикладі аналізованого тексту.
- Формулювати аргументовану позицію щодо ролі інтелектуальних еліт та їхніх творів у процесах націотворення.
