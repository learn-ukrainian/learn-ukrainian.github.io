content_outline:
- points:
  - 'Провокація: Чи може історія бути цікавою, як серіал на Netflix? Ярослав Грицак доводить, що так. З чого почати «дивитися»
    історію України?'
  - 'Цитата-загадка: «Українці — це нація, яка постійно запізнюється, але завжди встигає на останній потяг». Про який «потяг»
    ідеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Популярна» історія vs академічна. Чи не є спрощення складних тем заради широкої аудиторії профанацією науки?'
  - 'Дебат 2: Глобальна історія України vs національний наратив. Чи не розмиває підхід Грицака унікальність українського шляху,
    вписуючи його у світові тренди?'
  - '[!epistemic-humility] Грицак сам наголошує: історія не дає рецептів, а лише розширює поле для роздумів. Його мета — не
    дати остаточну відповідь, а поставити правильні питання.'
  section: 'Конфліктна карта: Історик як публічний інтелектуал'
  words: 900
- points:
  - 'Уривок про Богдана Хмельницького: не як ікона, а як політик, що робив складний вибір між кількома «імперіями».'
  - 'Аналіз структури: як Грицак пояснює складні процеси (наприклад, модернізацію) через прості метафори та життєві історії.'
  - '[!decolonization] Розвінчання міфу про «братні народи». Грицак показує, як українська суб''єктність формувалася не завдяки,
    а всупереч Російській імперії.'
  - 'Наративний голос: хто говорить з читачем? Це «всезнаючий автор» чи радше довірливий співрозмовник?'
  section: 'Читання: Фрагменти з «Нарису історії України»'
  words: 1700
- points:
  - 'Основна теза Грицака: модерна українська нація народилася не у ХІХ, а на зламі ХХ століття. Які докази він наводить?'
  - 'Риторичні прийоми: використання парадоксів, особистих спогадів, гумору для пояснення складних історичних процесів.'
  - '[!myth-buster] Руйнування міфу про «віковічну бідність» України. Грицак показує економічний потенціал українських земель
    у різні епохи.'
  - 'Порівняння стилів: чим мова Грицака відрізняється від мови класичної академічної праці (наприклад, праць Грушевського)?'
  section: 'Риторика та аргументація: Як історія стає розмовою'
  words: 1200
- points:
  - 'Повернення до розминки: тож у чому полягає «мистецтво встигати на останній потяг» для української нації?'
  - 'Рецепція та критика: чому праці Грицака викликають такі бурхливі дебати? Хто його головні опоненти і в чому суть їхніх
    претензій?'
  - '[!anti-hagiography] Грицака часто звинувачують у надмірному оптимізмі. Чи є підстави для такого погляду на історію України,
    особливо після 2022 року?'
  - 'Спадщина: як роботи Грицака змінили спосіб, у який українці говорять про своє минуле?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз есеїстики Ярослава Грицака, його метод «глобальної історії», деколонізаційна риторика, роль історика як публічного
  інтелектуала
level: LIT-ESSAY
module: lit-essay-035
objectives:
- Аналізувати есеїстику Ярослава Грицака як приклад «глобальної історії».
- Розрізняти риторичні стратегії та прийоми, що використовуються для побудови історичного наративу.
- Формулювати власну позицію в рамках ключових історіографічних дебатів.
- Критично оцінювати роль історика як публічного інтелектуала та його вплив на суспільну думку.
