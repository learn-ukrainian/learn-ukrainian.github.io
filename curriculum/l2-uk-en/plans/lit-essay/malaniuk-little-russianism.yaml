content_outline:
- points:
  - 'Провокація: "Малоросійство є історична патологія, психо-духовна хвороба...". Що це за хвороба, яку діагностує Маланюк,
    і чому його діагноз досі викликає запеклі суперечки?'
  - Коротка цитата-визначення "малороса" з тексту без коментаря.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Есе Маланюка — це об''єктивний історико-психологічний аналіз чи суб''єктивна політична інвектива? Позиція "за"
    (це науковий діагноз) vs "проти" (це радше мистецтво памфлету).'
  - 'Дебат 2: "Малоросійство" — це незмінна "національна риса" чи історично зумовлений стан, який можна подолати? Есенціалістське
    прочитання (Маланюк) vs конструктивістське (сучасна post-colonial theory).'
  - '[!epistemic-humility] Аргументи Маланюка часто є безапеляційними. Завдання семінару — не прийняти їх на віру, а зрозуміти
    їхню логіку та риторичну силу.'
  section: 'Конфліктна карта: Памфлет чи діагноз?'
  words: 900
- points:
  - 'Ключовий уривок з есе: деконструкція психологічного портрету "малороса" — брак національного інстинкту, провінціалізм,
    комплекс меншовартості.'
  - 'Історичні корені явища за Маланюком: поразка під Полтавою, русифікація еліт, розрив між "народом" та "інтелігенцією".'
  - '[!decolonization] Текст Маланюка — це радикальна спроба деколонізувати українську свідомість, відмовившись від будь-яких
    компромісів з імперським наративом. Він вимагає не реформувати, а "ампутувати" колоніальну спадщину.'
  section: 'Читання: Анатомія "малороса"'
  words: 1700
- points:
  - 'Аналіз стилю: використання медичної та біологічної лексики ("патологія", "хвороба", "атрофія", "організм"). Як цей вибір
    впливає на сприйняття аргументу?'
  - 'Риторичні стратегії: безапеляційність тону, апеляція до історії (ethos), емоційна напруга (pathos), логічні конструкції,
    що ведуть до невтішних висновків (logos).'
  - '[!epistemic-humility] Протилежна позиція: чи не є така агресивна риторика сама по собі контрпродуктивною? Порівняння
    з більш "ліберальними" національними мислителями (напр., Липинський).'
  section: 'Риторика та аргументація: Мова як скальпель'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, що таке "малоросійство" за Маланюком? Студент формулює власне визначення, спираючись на
    аналіз.'
  - 'Рецепція твору: чому есе було настільки важливим для української діаспори, і як його сприйняли в Україні після 1991 року?'
  - 'Сучасне значення: наскільки концепція "малоросійства" актуальна сьогодні, в умовах повномасштабної війни? Чи пояснює
    вона поведінку певних груп населення?'
  - '[!anti-hagiography] Критичний погляд: небезпека есенціалізму та "полювання на відьом". Де межа між діагностикою суспільної
    хвороби та тавруванням опонентів?'
  section: Дискусія та підсумок
  words: 700
focus: Євген Маланюк, есе "Малоросійство", психологічний аналіз національної ідентичності, колоніальна свідомість, риторика
  інвективи
