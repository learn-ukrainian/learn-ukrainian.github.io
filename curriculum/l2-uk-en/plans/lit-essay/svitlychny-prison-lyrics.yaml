content_outline:
- points:
  - 'Провокація: Чи може лист бути гострішим за зброю? Розглядаємо рядок з листа Світличного: "Ми мусимо мислити. Це наш єдиний
    і останній рубіж оборони".'
  - Фрагмент з поезії "Серце для куль і для рим" без авторства — що відчуває людина, яка це написала?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Світличний vs Стус. Два шляхи дисидентства. Стус — безкомпромісний борець, "лицар духу". Світличний — "невидимий
    лідер", інтелектуальний центр, стратег. Чия позиція була ефективнішою?'
  - 'Дебат 2: Табірна література — це документ чи мистецтво? Позиція 1: Це перш за все свідчення про злочини режиму, естетика
    другорядна. Позиція 2: Це повноцінна література, що існує за своїми законами, хоч і в екстремальних умовах.'
  - '[!epistemic-humility] Світличний був "тихим" центром шістдесятництва, його вплив часто недооцінюють порівняно з "голосними"
    постатями. Його роль — предмет дискусій.'
  section: 'Конфліктна карта: Свідок чи актор?'
  words: 900
- points:
  - 'Аналіз ключових віршів з табірного циклу: мотиви стоїцизму, внутрішньої свободи, цінності культури.'
  - 'Епістолярна спадщина: листи як форма інтелектуального спротиву, підтримки зв''язку зі світом, і філософський щоденник.'
  - 'Літературно-критичні есеї Світличного: розгляд його ролі як критика і теоретика шістдесятництва.'
  - '[!decolonization] Творчість Світличного — це пряме продовження традиції Розстріляного Відродження, доказ тяглості української
    інтелектуальної еліти, яку СРСР намагався системно нищити.'
  section: 'Читання: Табірна лірика і листи'
  words: 1700
- points:
  - 'Теза Світличного: інтелектуальна ясність і точність формулювань — головна зброя проти тоталітарної демагогії. Аналіз
    його есеїв.'
  - 'Риторика іронії та самоіронії: як Світличний використовує гумор як захисний механізм і засіб критики системи.'
  - 'Стилістичний аналіз листів: поєднання високого інтелектуального стилю з побутовими деталями. Створення образу незламної
    особистості.'
  - '[!epistemic-humility] На відміну від експресивного стилю Стуса, "холодний", раціональний стиль Світличного є іншою, не
    менш потужною формою спротиву.'
  section: 'Риторика та аргументація: Ясність думки проти абсурду'
  words: 1200
- points:
  - 'Повернення до розминки: Як саме лист Світличного виявляється "гострішим за зброю" в контексті його боротьби?'
  - 'Рецепція творчості: посмертна публікація, канонізація, визнання як одного з ключових моральних авторитетів нації.'
  - '[!anti-hagiography] Світличний був не просто "святим мучеником", а складним інтелектуалом, стратегом, який свідомо обрав
    свою роль у русі опору.'
  - 'Сучасне значення: Чому ідеї Світличного про інтелектуальну відповідальність та ясність мислення є особливо актуальними
    для сучасної України?'
  section: Дискусія та підсумок
  words: 800
focus: 'Іван Світличний: інтелектуальний спротив, табірна лірика та епістолярій як свідчення доби. Аналіз риторики іронії
  та "ясної думки" в умовах несвободи.'
