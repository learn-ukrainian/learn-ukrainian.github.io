activity_hints:
- description: Розрізнити позиції та стилі двох дисидентів за цитатами з модуля. Чия це теза — Стуса чи Світличного?
  focus: 'Дебати: Світличний vs Стус'
  items: 6
  type: quiz
- description: 'Вставити в речення ключові терміни модуля: дисидент, епістолярний, табірна лірика, правозахисний, стоїцизм.'
  focus: Лексика спротиву
  items: 5
  type: fill-in
- description: Проаналізуйте короткий уривок з листа Світличного. Які риторичні прийоми (іронія, апеляція до логіки, емоційний
    заклик) він використовує і з якою метою?
  focus: Аналіз риторичної стратегії
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: "Чи може інтелектуальна ясність та критичне мислення бути формою спротиву
    в сучасному інформаційному світі?". Використовуйте ідеї Світличного як відправну точку.'
  focus: 'Есе: Інтелектуальний спротив сьогодні'
  type: note
