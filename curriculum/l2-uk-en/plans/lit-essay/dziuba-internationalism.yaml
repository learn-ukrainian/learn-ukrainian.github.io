objectives:
- Аналізувати памфлет «Інтернаціоналізм чи русифікація?» як ключовий текст української політичної думки XX століття
- Дослідити риторичні стратегії та структуру аргументації, що дозволили Дзюбі критикувати радянську систему зсередини
- Пояснювати роль твору в історії шістдесятництва, самвидаву та сучасних деколонізаційних дискурсів
- Критично оцінювати різні інтерпретації тексту, враховуючи його складну рецепцію та спадщину
