content_outline:
- points:
  - 'Провокація: Як праця, що цитує Леніна на кожній сторінці, стала одним із найпотужніших антирадянських документів в історії
    України?'
  - 'Запитання до роздумів: Чи може мова колонізатора бути зброєю для деколонізації?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Стратегія Дзюби. Це була щира спроба «повернути партію на істинний ленінський шлях» чи свідоме використання
    марксистської риторики як єдино можливого способу висловити антиколоніальний протест?'
  - 'Дебат 2: Жанрова приналежність. Це науковий трактат, політичний памфлет чи акт літературної критики? Як визначення жанру
    впливає на наше розуміння мети автора?'
  - '[!epistemic-humility] Позиції критиків розділилися: одні бачать у Дзюбі «останнього романтика» ленінізму, інші — хитрого
    стратега, що використав ідеологію ворога проти нього самого.'
  section: 'Конфліктна карта: Наївний ідеаліст чи свідомий дисидент?'
  words: 900
- points:
  - 'Аналіз ключових розділів: розбір аргументів Дзюби про деформацію національної політики в освіті, культурі, економіці.'
  - 'Метод Дзюби: зіткнення офіційної пропаганди про «дружбу народів» із реальною практикою культурної та мовної асиміляції.'
  - 'Цитата як доказ: як Дзюба використовує твори Леніна для демонстрації кричущої розбіжності між теорією та радянською практикою.'
  - '[!decolonization] Текст Дзюби — це маніфест української суб''єктності. Він переводить розмову з площини «братніх народів»
    у площину аналізу колоніальної політики, називаючи речі своїми іменами задовго до того, як це стало мейнстримом.'
  section: 'Читання: «Інтернаціоналізм чи русифікація?»'
  words: 1700
- points:
  - 'Етос автора: Дзюба конструює образ вірного комуніста, який вболіває за чистоту ідеології, що надає його критиці особливої
    сили та легітимності в очах системи.'
  - 'Структура доказу: аналіз логіки побудови твору — від аналізу теоретичних засад до конкретних прикладів русифікації в
    усіх сферах життя.'
  - 'Використання іронії та сарказму: як Дзюба імпліцитно висміює радянські ідеологічні штампи, формально залишаючись у межах
    офіційного дискурсу.'
  - '[!myth-buster] Поширена думка, що Дзюба «злякався» і відмовився від своїх поглядів. Аналіз його «покаянної» заяви показує
    складну риторичну гру, спрямовану на виживання, а не повну капітуляцію.'
  section: 'Риторика та аргументація: Риторика «істинного ленініста»'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, як текст, що апелює до Леніна, зміг підірвати систему? Формулювання відповіді на основі
    аналізу риторики та історичного контексту.'
  - 'Історія рецепції: шлях від рукопису «самвидаву», через арешт автора, до канонічного тексту, що вивчається в університетах.'
  - '[!anti-hagiography] Обговорення «покаяння» Дзюби 1973 року. Чи применшує цей вчинок, зроблений під тиском КДБ, значення
    його праці? Дискусія про ціну спротиву в тоталітарній державі.'
  - 'Сучасне значення: наскільки аргументи Дзюби про «злиття націй» та культурну асиміляцію актуальні в контексті сучасної
    російсько-української війни?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз політичного есе Івана Дзюби «Інтернаціоналізм чи русифікація?», його риторичної структури, впливу на дисидентський
  рух та ролі як засадничого тексту української деколоніальної думки.
