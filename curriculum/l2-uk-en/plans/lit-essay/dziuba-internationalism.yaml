activity_hints:
- description: 'Перевірка розуміння дебатів навколо тексту. Чия це теза: Дзюба — наївний ідеаліст чи свідомий дисидент? Визначити
    позицію за цитатою.'
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Терміни з аналізу аргументації: етос, памфлет, імпліцитний, суб''єктність — у контексті речень із модуля.'
  focus: Риторична термінологія
  items: 6
  type: fill-in
- description: Наведено уривок з тексту Дзюби та уривок з офіційної радянської газети того ж періоду. Порівняйте, як обидва
    тексти використовують поняття «інтернаціоналізм» та «дружба народів». Проаналізуйте різницю в риторичних стратегіях.
  focus: 'Аналіз першоджерела: Дзюба vs Пропаганда'
  type: note
- description: «Чи є праця Дзюби актуальною сьогодні, чи це лише історичний документ?» Напишіть есе-роздум (400-600 слів),
    аргументуючи свою позицію на основі матеріалів модуля.
  focus: 'Есе: Спадщина Дзюби'
  type: note
