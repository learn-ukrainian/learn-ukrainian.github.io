objectives:
- Аналізувати твір "FM Галичина" як приклад сучасної української есеїстики.
- Розрізняти риторичні стратегії та прийоми аргументації в неформальній прозі.
- Пояснювати роль "малих історій" та особистої пам'яті в процесах деколонізації.
- Формулювати власну позицію в літературно-критичних дебатах щодо гібридних жанрів.
