content_outline:
- points:
  - 'Провокація: Чи може радіоефір стати мапою зниклого світу? І як розмова про гриби, каву та старі фотографії стає актом
    спротиву імперії?'
  - Фрагмент есею без контексту, що описує буденну деталь з глибоким філософським підтекстом.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "FM Галичина" — це висока література чи якісна публіцистика? Дискусія про межі жанру есе, його гібридну природу
    між фактом та фікцією.'
  - 'Дебат 2: Творчість Прохаська — це універсальне явище чи герметичний "галицький" феномен? Його місце в національному каноні
    vs. роль як речника локальної ідентичності.'
  - '[!epistemic-humility] Критики не мають єдиної відповіді. Одні бачать у Прохаськові філософа, інші — майстра стилю, треті
    — історика повсякдення.'
  section: 'Конфліктна карта: Есеїстика — Література чи Журналістика?'
  words: 900
- points:
  - 'Аналіз ключового уривку: як пейзаж, спогад дитинства та ботанічна деталь сплітаються в єдиний наратив про плинність часу
    та стійкість пам''яті.'
  - 'Наративна стратегія: аналіз голосу оповідача — меланхолійного, споглядального, іронічного. Як створюється ефект довірливої
    розмови з читачем?'
  - '[!decolonization] Прохасько деколонізує простір не гаслами, а через "малу" історію, повертаючи імена та сенси місцям,
    затертим імперськими наративами. Українська суб''єктність проявляється в праві на власну, негероїчну пам''ять.'
  section: 'Читання: Уривки з "FM Галичина"'
  words: 1800
- points:
  - 'Структура аргументу: Прохасько рідко використовує формальну логіку. Його аргументація — це асоціативний ланцюг, "ризома".
    Аналіз того, як одна ідея проростає з іншої.'
  - 'Риторичні стратегії: переконування через довіру (етос), емоційний відгук (пафос) та непряму логіку. Анекдот, метафора
    та чуттєва деталь як головні інструменти.'
  - '[!epistemic-humility] Есей як "спроба" (фр. essai). Мета Прохаська — не довести тезу, а запросити читача до спільного
    мислення, показати процес народження думки.'
  section: 'Риторика та аргументація: Неформальна логіка та переконання'
  words: 1200
- points:
  - 'Повернення до розминки: як радіоефір стає мапою? Формулювання відповіді на основі аналізу "FM Галичини".'
  - 'Історія рецепції: як сприймали книгу в момент виходу і як її читають зараз, в умовах повномасштабної війни? Чи змінився
    її сенс?'
  - '[!anti-hagiography] Критичний погляд на "галицький міф". Чи не є ідилічний, споглядальний світ Прохаська втечею від реальності?
    Дебати про ескапізм в його творчості.'
  - 'Рефлексія: що змінилося у вашому сприйнятті буденних речей та власної географії після читання Прохаська?'
  section: Дискусія та підсумок
  words: 700
focus: Аргументативна проза Тараса Прохаська в 'FM Галичина', аналіз риторичних стратегій, деколонізація через особистий наратив,
  картографування пам'яті та ідентичності.
