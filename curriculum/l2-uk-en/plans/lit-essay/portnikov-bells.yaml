activity_hints:
- description: Визначити, яка позиція ("публіцист" чи "історик") відповідає наведеній цитаті про роль Віталія Портнікова.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Заповнити пропуски в реченнях, що описують риторичні прийоми Портнікова (історична аналогія, логос, метафора,
    деконструкція міфу).
  focus: Риторичні стратегії
  items: 5
  type: fill-in
- description: Прочитайте короткий уривок з есе Портнікова. Сформулюйте його головну тезу, знайдіть 2-3 аргументи, якими він
    її підкріплює, та визначте, який риторичний прийом він використовує.
  focus: Аналіз аргументу
  type: note
- description: 'Напишіть коротке есе (400-600 слів) на тему: "Як, на вашу думку, тексти Віталія Портнікова сприяють утвердженню
    української суб''єктності?". Використайте аргументи з модуля.'
  focus: 'Есе: Суб''єктність через текст'
  type: note
cefr_min: C1
