objectives:
- Аналізувати риторичні стратегії та структуру аргументації в політичній есеїстиці Віталія Портнікова.
- Критично оцінювати роль публіциста в деконструкції імперських міфів та формуванні української суб'єктності.
- Розрізняти поняття "журналістика", "історія" та "есеїстика", аналізуючи їхній синтез у текстах.
- Формулювати власну аргументовану позицію щодо ефективності тексту як інструменту в інформаційній війні.
