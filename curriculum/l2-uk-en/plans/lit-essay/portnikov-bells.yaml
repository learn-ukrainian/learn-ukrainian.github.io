content_outline:
- points:
  - 'Провокація: Чи може текст бути зброєю? Віталій Портніков все життя доводить, що так. Але як саме працює ця зброя — переконує,
    руйнує чи будує?'
  - 'Цитата-загадка: "Імперії вмирають не тоді, коли в них закінчуються гроші чи солдати, а тоді, коли в них закінчуються
    міфи". Кому належать ці слова і про яку імперію йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Портніков — це публіцист чи історик? Одні вважають його аналітиком, що працює з фактами, інші — творцем сучасних
    наративів, що використовує історію як інструмент.'
  - 'Дебат 2: Есеїстика як жанр на межі. Де закінчується аналіз і починається літературна творчість? Чи можна вимагати від
    есеїста академічної точності історика?'
  - '[!epistemic-humility] Немає єдиної відповіді на те, ким є Портніков. Його роль змінюється залежно від тексту, контексту
    та оптики читача.'
  - 'Порівняння: Портніков та його місце серед інших східноєвропейських інтелектуалів (напр., Адам Міхнік, Тімоті Снайдер).'
  section: 'Конфліктна карта: Журналіст, історик чи пророк?'
  words: 900
- points:
  - 'Ключова теза: розбір центрального аргументу Портнікова про "Новоросію" як політичний симулякр, сконструйований для виправдання
    агресії.'
  - 'Аналіз уривку: детальний розгляд кількох абзаців з есе, де автор показує, як імперський наратив підміняє історичну реальність.'
  - '[!decolonization] Портніков показує, що український Південь — це не "подарунок Леніна", а результат століть української
    колонізації та культурної праці. Він повертає регіону його українську історію.'
  - 'Структура тексту: як автор веде читача від конкретного факту до глобального висновку, створюючи герметичний та переконливий
    аргумент.'
  section: 'Читання: "Дзвони за Новоросією"'
  words: 1700
- points:
  - 'Логос понад усе: аналіз того, як Портніков апелює до логіки та раціональності читача, а не до емоцій. Його головний інструмент
    — історична аналогія та виявлення причинно-наслідкових зв''язків.'
  - 'Метафора як аргумент: розгляд ключових метафор ("дзвони", "корабель", "будинок") і як вони структурують його есе.'
  - 'Стратегія "від протилежного": як Портніков часто пояснює Україну через аналіз Росії, показуючи, що Україна — це "не-Росія".'
  - '[!myth-buster] Автор послідовно руйнує міфи: про "братні народи", про "спільну історію", про "штучність" України. Його
    тексти — це сеанс викриття імперської "чорної магії".'
  section: 'Риторика та аргументація: Архітектура переконання'
  words: 1200
- points:
  - 'Повернення до розминки: то як саме текст стає зброєю в руках Портнікова? Які "цілі" він вражає?'
  - 'Рецепція та критика: як сприймають тексти Портнікова в Україні та за її межами? Хто його головні опоненти і в чому вони
    його звинувачують?'
  - '[!anti-hagiography] Чи не стає подекуди сам Портніков заручником власної риторики? Обговорення можливих "сліпих плям"
    у його аналізі.'
  - 'Сучасне значення: яку роль відіграє есеїстика Портнікова у формуванні повоєнної української ідентичності?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз політичної есеїстики Віталія Портнікова, його роль як публічного інтелектуала, риторичні стратегії деконструкції
  імперських міфів, та поняття української суб'єктності.
