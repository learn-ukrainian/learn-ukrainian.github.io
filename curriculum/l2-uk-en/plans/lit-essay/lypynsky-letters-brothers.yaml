content_outline:
- points:
  - 'Провокація: Чи може монархіст та елітарист, що зневажав демократію, навчити чогось сучасну Україну, яка бореться за демократичні
    цінності? Розглядаємо цитату Липинського про "активну меншість" та "пасивну більшість".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Липинський vs. Грушевський. Аристократична "класократія" (влада відповідального класу-власника) проти народницької
    демократії (влада "трудового народу"). Чому Липинський вважав демократію шляхом до охлократії та руїни?'
  - 'Дебат 2: Липинський — політичний філософ чи історик? Його "Листи" — це універсальна теорія держави чи лише коментар до
    подій 1917-20 рр.? [!epistemic-humility] Дискусія про місце Липинського в каноні української думки.'
  section: 'Конфліктна карта: Класократія vs. Демократія'
  words: 900
- points:
  - 'Ключовий фрагмент: аналіз концепції "класократії" та ролі "національної аристократії" (не за кров''ю, а за служінням).'
  - 'Критика "інтелігентської політики": чому Липинський вважав, що інтелігенція не здатна будувати державу?'
  - '[!decolonization] Аргументи проти "малоросійства" та орієнтації на Москву. Обґрунтування потреби власної, суверенної
    держави як єдиної гарантії існування нації. Липинський як теоретик українського самостійництва.'
  - 'Поняття "територіального патріотизму": чому для Липинського важливіша лояльність до держави на певній території, ніж
    етнічне походження?'
  section: 'Читання: Уривки з "Листів до братів-хліборобів"'
  words: 1700
- points:
  - 'Теза: Державу творить не народ, а організована активна меншість (еліта), яка бере на себе відповідальність.'
  - 'Докази: Історичні аналогії (Рим, Англія, козацька держава), критика реалій УНР, соціологічний аналіз класів.'
  - 'Риторичні прийоми: суворий, пророчий тон (етос); апеляція до інстинкту самозбереження нації (пафос); логічні конструкції
    та класифікації (логос).'
  - '[!epistemic-humility] Порівняння аргументації Липинського з аргументами його опонентів (наприклад, Дмитра Донцова). Різні
    візії націоналізму — консервативний державницький vs. дієвий вольовий.'
  section: 'Риторика та аргументація: Структура консервативного аргументу'
  words: 1200
- points:
  - 'Повернення до розминки: Так що ж може порадити Липинський сучасній Україні? Формулюємо відповідь з аргументами з тексту.'
  - 'Історія рецепції: Заборонений в СРСР, культовий в діаспорі, суперечливий в незалежній Україні. Чому його ідеї так і не
    стали мейнстрімом?'
  - '[!anti-hagiography] Слабкі місця теорії Липинського: ідеалізація гетьманату, недооцінка соціальних рухів, практична неможливість
    реалізації "класократії".'
  - 'Сучасна релевантність: Дискусії про роль еліт, відповідальність бізнесу, кризу демократії та загрозу популізму в Україні
    XXI століття.'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз політичної філософії та риторики В. Липинського в його ключовому творі "Листи до братів-хліборобів", зокрема
  його критики демократії та обґрунтування "класократії" як моделі для української державності.
level: LIT-ESSAY
module: lit-essay-014
objectives:
- Аналізувати аргументативну структуру та риторичні прийоми у політичному есе на прикладі "Листів" В. Липинського
- Критично оцінювати концепцію "класократії" в її історичному та сучасному контексті
- Пояснювати внесок В. Липинського у формування ідеології українського державництва та деколонізацію політичної думки
- Формулювати власну аргументовану позицію щодо актуальності консервативних ідей у сучасній демократичній державі
