content_outline:
- points:
  - 'Провокація: Чому Гамлет, "вічний образ" світової культури, в українському контексті стає зброєю? Який сенс має трагедія
    принца данського для нації, що століттями боролась за суб''єктність?'
  - 'Цитата з есе Забужко: "Нація — це спосіб екзистенції Гамлетового батька". Як це розуміти без контексту?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Постколоніальне vs. універсалістське прочитання. Чи "псує" Забужко Шекспіра, використовуючи його для локальних
    потреб, чи навпаки — розкриває його прихований політичний потенціал?'
  - 'Дебат 2: Роль інтелектуала — описувати чи створювати реальність? Забужко лише аналізує українську культуру чи активно
    її формує, пропонуючи новий міф про Фортінбраса?'
  - '[!epistemic-humility] Критики звинувачують Забужко в надмірній есеїстичності та браку "академічної строгості". Прихильники
    ж бачать у цьому силу — здатність говорити про складне зрозумілою мовою.'
  section: 'Конфліктна карта: Інтелектуал як інтерпретатор'
  words: 900
- points:
  - 'Аналіз ключового уривку: Фортінбрас як "інший" Гамлет — людина дії, що приходить на руїни, щоб будувати нову державу.'
  - 'Система персонажів в есе: Гамлет (рефлексуючий інтелігент), Клавдій (колаборант), Фортінбрас (деколонізатор).'
  - '[!decolonization] Забужко свідомо протиставляє українське "фортінбрасівське" прочитання російській традиції "гамлетизму"
    (вічна рефлексія, нездатність до дії). Це пряме руйнування імперського наративу.'
  - Як есе використовує історіографію, щоб перетворити літературний аналіз на політичний маніфест.
  section: 'Читання: "Хроніки Фортінбраса"'
  words: 1700
- points:
  - 'Структура аргументу: від літературної алюзії до широкого політичного узагальнення. Теза → доказ з тексту → культурний
    коментар → політичний висновок.'
  - 'Риторичні стратегії: використання провокативних метафор ("ментальний СНІД"), апеляція до спільного досвіду (етос "своєї"
    для читача), створення відчуття невідкладності (пафос).'
  - Порівняння стилю Забужко з іншими есеїстами, що пишуть на схожі теми (напр., Юрій Андрухович, Тарас Прохасько). У чому
    її унікальність?
  - '[!epistemic-humility] Забужко не стільки доводить, скільки переконує. Її сила — не в логіці, а в енергії тексту та влучності
    формулювань.'
  section: 'Риторика та аргументація: Полемічний стиль Забужко'
  words: 1200
- points:
  - 'Повернення до розминки: тож яку функцію виконує Фортінбрас в українській культурі після есе Забужко?'
  - 'Історія рецепції: як "Хроніки Фортінбраса" вплинули на український публічний дискурс 1990-2000-х? Чи актуальний цей текст
    сьогодні, в умовах повномасштабної війни?'
  - 'Студентська рефлексія: чи змінилось ваше розуміння "Гамлета" та ролі літератури в суспільстві після прочитання цього
    аналізу?'
  - '[!anti-hagiography] Критичний погляд на спадщину: чи не створює "фортінбрасівський міф" ризику спрощення та надмірної
    мілітаризації культури?'
  section: Дискусія та підсумок
  words: 800
focus: Есе Оксани Забужко "Хроніки Фортінбраса", постколоніальне прочитання Гамлета, риторика деколонізації, роль публічного
  інтелектуала, аргументативна проза.
