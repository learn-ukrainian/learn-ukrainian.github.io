    сфери.
  pos: ж.
  word: деколонізація
- definition: Гостра публічна суперечка на наукову, літературну чи політичну тему.
  pos: ж.
  word: полеміка
- definition: Літературний жанр, що характеризується вільною, часто суб'єктивною трактовкою теми; сукупність творів у цьому
    жанрі.
  pos: ж.
  word: есеїстика
- definition: Наука про ораторське мистецтво та ширше — про мистецтво переконування за допомогою мови.
