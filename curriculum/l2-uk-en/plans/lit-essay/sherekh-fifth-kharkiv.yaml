content_outline:
- points:
  - 'Провокація: Чому Юрій Шерех наполягав, що українська література — «не для дітей»? Що це вимагає від читача і як це твердження
    кидає виклик імперському погляду на українську культуру як на «просту» та «народну»?'
  - 'Циатата без контексту: «Краще бути чесним паралітиком, ніж брехливим акробатом». Як цей афоризм відображає інтелектуальну
    позицію Шереха?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Незалежний літературний процес vs. «молодший брат». Шерех доводив, що українська література має власну логіку
    розвитку, орієнтовану на Європу, тоді як радянська критика зображувала її як вторинну, провінційну відносно російської.'
  - 'Дебат 2: «Націоналістичний фальсифікатор» vs. засновник модерної української гуманітаристики. Репутація Шереха як поле
    битви — як його демонізували в СРСР і канонізували в діаспорі.'
  - '[!epistemic-humility] Літературна критика — це не пошук об''єктивної істини, а боротьба за право інтерпретації. Шерех
    не просто «аналізував», він вів війну за український сенс.'
  section: 'Конфліктна карта: Шерех vs. Радянська критика'
  words: 900
- points:
  - 'Уривок з есе: Аналіз ключових тез про відмову від інфантилізації та сентиментальності в українській літературі.'
  - '[!decolonization] Як Шерех руйнує колоніальний міф про «співучу і дитячу» Україну. Його вимога бачити українську літературу
    складною, трагічною та інтелектуальною — це акт культурного суверенітету.'
  - 'Концепція «П''ятого Харкова»: майбутній інтелектуальний центр України, вільний від провінціалізму та імперського контролю.
    Харків як символ незавершеного модерного проєкту.'
  section: 'Читання: Есе ''Не для дітей'''
  words: 1800
- points:
  - 'Структура аргументу: аналіз есе «Не для дітей» з точки зору риторики — теза, докази, робота з контр-аргументами патріотичної
    та радянської критики.'
  - 'Риторичні стратегії: Іронія як зброя, наукова точність як форма опору ідеологічним штампам, афористичність як спосіб
    карбування нових інтелектуальних формул.'
  - '[!epistemic-humility] Шерех не був нейтральним академічним спостерігачем. Його стиль — це свідомий вибір полеміста, що
    прагне не «збалансувати» думки, а встановити нову інтелектуальну гегемонію.'
  section: 'Риторика та аргументація: Полемічний стиль Шереха'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чому українська література «не для дітей» і чому ця ідея є особливо актуальною в контексті
    сучасної війни?'
  - '[!anti-hagiography] Рецепція Шереха: від тотального замовчування в СРСР до безкритичної ідеалізації в 90-х. Обговорення
    складних аспектів його біографії та поглядів.'
  - 'Сучасне значення: Як ідеї Шереха про інтелектуальну незалежність, деколонізацію та європейську орієнтацію впливають на
    сучасну українську культуру та ідентичність?'
  - 'Рефлексія: Які ваші власні «дитячі» уявлення про українську літературу були зруйновані після знайомства з поглядами Шереха?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз полемічної есеїстики Юрія Шереха (Шевельова), зокрема концепції «П'ятого Харкова», есе «Не для дітей» та його
  деколоніальних риторичних стратегій.
level: LIT-ESSAY
module: lit-essay-023
objectives:
- Аналізувати полемічну есеїстику Юрія Шереха як інструмент деколонізації української літературної свідомості.
- Пояснювати концепцію «П''ятого Харкова» та її значення для розриву з імперською культурною парадигмою.
- Розрізняти риторичні стратегії Шереха (іронія, аналіз, афористичність) та радянської критики (ідеологічні кліше, звинувачення).
- Формулювати власну позицію щодо ролі літературної критики у формуванні національного канону та культурної ідентичності.
