- definition: Здатність бути активним, незалежним діячем, що має власну волю, позицію та мету; протилежність об'єктності.
  pos: ж.
  word: суб'єктність
- definition: Спосіб розповіді або викладу подій, що формує певне їх розуміння та інтерпретацію.
  pos: ч.
  word: наратив
- definition: Сукупність досліджень в галузі історії, що присвячені певній темі або епосі; наука про розвиток історичної думки.
  pos: ж.
  word: історіографія
