activity_hints:
- description: Перевірка розуміння дебатів та ідей з модуля. Що таке «П'ятий Харків»? Яку літературу Шерех називає «дитячою»?
    Кому належить теза?
  focus: Ключові концепції Шереха
  items: 5
  type: quiz
- description: 'Вставити в речення терміни: суб''єктність, наратив, деколонізація, полеміка, канон.'
  focus: Термінологія літературного аналізу
  items: 5
  type: fill-in
- description: 'Наведено два уривки: один Шереха, другий — типовий радянський критик. Порівняйте їхні риторичні стратегії,
    лексику, та мету висловлювання.'
  focus: 'Порівняльний аналіз: Шерех vs. радянська критика'
  type: note
- description: Чому ідеї Юрія Шереха про деколонізацію української культури, висловлені в середині XX століття, стали особливо
    актуальними у XXI столітті? Аргументуйте свою думку, наводячи приклади з сучасного культурного життя. (400-600 слів).
  focus: 'Есе: Актуальність Шереха сьогодні'
  type: note
cefr_min: C1
