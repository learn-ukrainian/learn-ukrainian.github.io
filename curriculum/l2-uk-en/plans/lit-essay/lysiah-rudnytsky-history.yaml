activity_hints:
- description: Визначте, яка позиція належить Рудницькому, а яка — його опонентам, на основі цитат з модуля.
  focus: Дебати навколо спадщини Рудницького
  items: 5
  type: quiz
- description: 'Заповніть пропуски в реченнях, використовуючи терміни: суб''єктність, модернізація, історична нація, деколонізація,
    еліта.'
  focus: Ключові поняття історіософії Рудницького
  items: 5
  type: fill-in
- description: Порівняйте підхід до історії України у Івана Лисяка-Рудницького (елітарно-державницький) та Михайла Грушевського
    (народницький). Напишіть короткий аналіз (300-400 слів), вказуючи на ключові відмінності.
  focus: 'Порівняльний аналіз: Рудницький vs. Грушевський'
  type: note
- description: 'Напишіть есе на тему: "Чи є ідеї Івана Лисяка-Рудницького зброєю в сучасній інформаційній війні проти Росії?".
    Аргументуйте свою позицію, посилаючись на його концепції (400-600 слів).'
  focus: 'Есе: Актуальність Рудницького сьогодні'
  type: note
