content_outline:
- points:
  - 'Провокація: Чи може історик бути аполітичним, коли його нація бореться за існування? Роздуми над спадщиною Івана Лисяка-Рудницького.'
  - 'Цитата-загадка з есе Рудницького: "Проблема новочасної української історії полягає в тому, що українське суспільство
    не розвинуло з-поміж себе адекватної політичної еліти". Про який період ідеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Лисяк-Рудницький — об''єктивний науковець чи політичний мислитель, що використовував історію як інструмент?
    Позиція Ярослава Грицака vs позиція діаспорних опонентів.'
  - 'Дебат 2: Наскільки актуальні сьогодні ідеї Рудницького? Чи не стали його колись дисидентські погляди на "історичну націю"
    та європеїзацію новим мейнстрімом?'
  - '[!epistemic-humility] Рудницький сам визнавав, що "повна об''єктивність недосяжна", але інтелектуальна чесність — обов''язкова.
    Як це відображено в його працях?'
  section: 'Конфліктна карта: Історик vs. Публіцист'
  words: 900
- points:
  - 'Ключове есе: "Україна між Сходом і Заходом". Аналіз центральної тези про цивілізаційну приналежність України.'
  - 'Основні концепції: "історична" та "неісторична" нація, "неповнота" соціальної структури українського суспільства, консервативна
    модернізація.'
  - '[!decolonization] Як Рудницький руйнує російський імперський наратив про "триєдиний народ", доводячи окремішність українського
    історичного шляху з XVI-XVII століть.'
  - 'Порівняльний метод: постійне порівняння України з Польщею, Чехією, Італією для виявлення спільних та відмінних рис модернізації.'
  section: 'Читання: "Історичні есе"'
  words: 1800
- points:
  - 'Аналіз стилю: холодна, логічна, майже юридична проза. Відсутність емоційних закликів, ставка на докази та раціональний
    аналіз.'
  - 'Структура есе: теза на початку, розгортання аргументації через історичні приклади, висновок, що підтверджує або модифікує
    тезу.'
  - 'Риторичний прийом "ad absurdum": доведення хибності поглядів опонентів (наприклад, народників), показуючи абсурдність
    їхніх логічних висновків.'
  - '[!epistemic-humility] Рудницький часто полемізує з В''ячеславом Липинським, Дмитром Донцовим, Михайлом Грушевським, показуючи
    повагу до опонентів, але безжально критикуючи їхні ідеї.'
  section: 'Риторика та аргументація: Структура переконання'
  words: 1200
- points:
  - 'Повернення до розминки: тож ким був Рудницький — істориком чи політиком? Формулювання відповіді на основі аналізу його
    есе.'
  - 'Рецепція: як сприймали Рудницького в діаспорі (часто як "лівого" і "угодовця") і як його "відкрили" в Україні в 1990-х.'
  - '[!anti-hagiography] Критика елітаризму Рудницького. Його скепсис щодо "народу" і ставка на еліту — наскільки це релевантно
    для сучасної України?'
  - 'Сучасне значення: чи допомагають ідеї Рудницького зрозуміти сучасну російсько-українську війну та місце України у світі?'
  section: Дискусія та підсумок
  words: 700
focus: The historical essays of Ivan L. Rudnytsky, analyzing his argumentative style, concept of 'historical nation', and
  decolonization of Ukrainian historiography.
level: LIT.ESSAY
module: lit-essay-029
objectives:
- Аналізувати ключові есе Івана Лисяка-Рудницького, визначаючи його основні історичні та політичні аргументи.
- Характеризувати внесок Лисяка-Рудницького в деколонізацію української історіографії та формування модерної національної
  ідентичності.
- Розрізняти риторичні стратегії та логічну структуру в аргументативній прозі на прикладі його творів.
- Формулювати власну позицію в рамках дебатів щодо ролі інтелектуала в суспільстві, що бореться за незалежність.
