activity_hints:
- description: 'Визначте, кому належить твердження: Портникову чи його опонентам з академічної школи? Перевірка розуміння
    конфліктної карти.'
  focus: 'Розуміння дебатів: Портников vs Опоненти'
  items: 6
  type: quiz
- description: 'Вставте в речення правильні терміни з модуля: теза, риторика, полеміка, суб''єктність, наратив.'
  focus: Лексика аргументації та риторики
  items: 5
  type: fill-in
- description: Прочитайте уривок з есе В. Портникова та уривок з праці Я. Грицака на одну й ту саму тему. Порівняйте стиль,
    використані джерела, мету та цільову аудиторію. Що робить ці тексти різними?
  focus: 'Порівняльний аналіз: Есеїст vs Історик'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: «В епоху інформаційних воєн та соцмереж, чи стає гостра публіцистика,
    подібна до текстів Портникова, більш впливовою формою історіографії, ніж академічні дослідження?»'
  focus: 'Есе: Чи є публіцистика новою історіографією?'
  type: note
cefr_min: C1
connects_to:
