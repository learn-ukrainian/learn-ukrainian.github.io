content_outline:
- points:
  - 'Провокація: «Історія — це не те, що було, а те, про що сперечаються». Як це речення пояснює всю творчість Портникова?'
  - 'Теза без контексту: «Українська сучасна нація народилася 24 серпня 1991 року, але її зачаття відбулося в день поразки
    під Полтавою». Що мав на увазі автор?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Портников vs академічна історіографія. Де межа між публіцистикою та історичним аналізом? [!epistemic-humility]
    Позиція оппонентів: Портников — блискучий полеміст, але не історик, бо спрощує та обирає факти під свою тезу.'
  - 'Дебат 2: Що таке українська історія? Неперервна тяглість від Русі (школа Грушевського) чи серія катастроф та відроджень,
    де сучасна Україна — новий проєкт (теза Портникова)?'
  - '[!myth-buster] Портников руйнує міф про "спільну колиску", доводячи, що Москва та Київ — це два різні цивілізаційні проєкти
    з самого початку.'
  section: 'Конфліктна карта: Історія як поле бою'
  words: 900
- points:
  - Розбір ключових есеїв Портникова, де він аналізує, як Російська імперія конструювала міф про "триєдиний народ".
  - 'Аналіз наративу: як Портников виявляє підміну понять, коли "Русь" (Київська) була привласнена "Росією" (Московською).'
  - '[!decolonization] Головний інструмент Портникова: демонстрація того, як українська історія та культура послідовно зводились
    до провінційного, фольклорного варіанту загальноімперської.'
  - 'Лексичний аналіз: як автор використовує слова «окупація», «колонізація», «присвоєння» щодо культурних та історичних явищ.'
  section: 'Читання: Анатомія міфу про «братніх народів»'
  words: 1700
- points:
  - 'Структура аргументів: теза → історична паралель → доказ з першоджерела (часто неочікуваного) → висновок.'
  - 'Риторичні прийоми: використання гострої іронії, апеляція до логіки (logos), створення ефекту присутності (ethos свідка),
    звернення до почуття національної гідності (pathos).'
  - 'Порівняльний аналіз: як аргументи Портникова відрізняються від стилю інших есеїстів (напр., Оксани Забужко чи Ярослава
    Грицака).'
  - '[!epistemic-humility] Аналіз слабких місць: чи завжди аргументи Портникова є бездоганними? Де він покладається на риторику
    більше, ніж на факти?'
  section: 'Риторика та аргументація: Переконання як зброя'
  words: 1200
- points:
  - 'Повернення до розминки: Як поразка може стати точкою відліку для нової ідентичності? Формулювання відповіді на основі
    аналізу текстів.'
  - 'Рецепція: чому Портникова одночасно вважають пророком і гострим полемістом, якого неможливо читати спокійно?'
  - '[!anti-hagiography] Критичний погляд: чи не створює Портников, руйнуючи старі міфи, нові — про ідеальну, вільнодумну,
    європейську Україну?'
  - 'Сучасне значення: Як есеї Портникова, написані 10-15 років тому, допомагають зрозуміти події після 2022 року?'
  section: Дискусія та підсумок
  words: 700
focus: Аргументативна проза Віталія Портникова, деконструкція імперських міфів, риторичні стратегії в політичній есеїстиці,
  українська суб'єктність
