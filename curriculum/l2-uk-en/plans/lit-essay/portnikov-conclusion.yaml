objectives:
- Аналізувати ключові аргументи в есеїстиці Віталія Портникова, визначаючи їх місце в сучасній українській політичній думці
- Критично оцінювати риторичні стратегії, які автор використовує для деконструкції імперських міфів
- Розрізняти публіцистичний та академічний підходи до написання історії
- Формулювати власну аргументовану позицію щодо дискусійних історичних питань, порушених у модулі
