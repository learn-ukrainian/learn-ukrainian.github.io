content_outline:
- points:
  - 'Провокація: Чи може ідея бути небезпечнішою за зброю? Роздуми над цитатою Єрмоленка про те, як слова формують реальність.'
  - 'Загадка: Подано три анонімні тези — одна від Маркса, друга від Фукуями, третя від Єрмоленка. Завдання — інтуїтивно визначити,
    яка з них пропонує найбільш гнучке розуміння історії.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що є рушієм історії — матеріальні чинники (економіка, війни), як вважають марксисти, чи еволюція ідей, як пропонує
    Єрмоленко? Позиція Єрмоленка як виклик традиційній історіографії.'
  - 'Дебат 2: Володимир Єрмоленко — філософ, есеїст чи публіцист? Дискусія про міждисциплінарність та розмивання жанрових
    кордонів у сучасній гуманітаристиці.'
  - '[!epistemic-humility] Інтелектуальна історія не дає остаточних відповідей, а лише показує, як різні епохи по-різному
    відповідали на "вічні питання".'
  section: 'Конфліктна карта: Історія ідей vs. Історія подій'
  words: 900
- points:
  - 'Центральний уривок: Аналіз розділу про те, як українська культура історично балансувала між "грецьким" (раціональним)
    та "римським" (вольовим) началом.'
  - 'Структура аргументу: Як Єрмоленко використовує історичні приклади для побудови своєї теорії "плинності" ідентичностей.'
  - 'Наративна техніка: аналіз того, як автор переходить від великих історичних узагальнень до конкретних постатей (Сковорода,
    Куліш, Шевченко).'
  - '[!decolonization] Робота Єрмоленка як спосіб повернути українській думці її власну, не імпортовану, генеалогію, кидаючи
    виклик російському наративу про "молодшого брата".'
  section: 'Читання: Фрагменти з есе «Плинні ідеології»'
  words: 1700
- points:
  - 'Аналіз ключових метафор: "плинність", "потоки", "океан ідей", "кореневища". Як ці образи створюють не лише стиль, а й
    саму логіку аргументації.'
  - 'Стиль Єрмоленка: поєднання академічної глибини з есеїстичною легкістю. Чому це ефективно для сучасної аудиторії?'
  - '[!epistemic-humility] Порівняння риторики Єрмоленка з іншими українськими інтелектуалами (напр., Грицаком, Забужко).
    Не "хто кращий", а "хто інакший" і чому.'
  - 'Контраргументи: Які слабкі місця в риториці "плинності"? Чи не веде вона до релятивізму, де всі ідеї рівноцінні?'
  section: 'Риторика та аргументація: Метафора як інструмент філософії'
  words: 1200
- points:
  - 'Повернення до розминки: Як тепер, після аналізу, ви відповісте на питання про силу ідей? Наведіть аргументи з тексту
    Єрмоленка.'
  - 'Рецепція та критика: Як праці Єрмоленка були сприйняті в академічних та ширших колах? Які основні точки критики?'
  - 'Сучасне значення: Наскільки концепція "плинних ідеологій" допомагає зрозуміти сучасну ідеологічну боротьбу України проти
    російського імперіалізму?'
  - '[!anti-hagiography] Пошук "сліпих плям": Які теми чи постаті української історії залишаються поза увагою в моделі Єрмоленка?
    Чи є його підхід універсальним?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз аргументативної прози Володимира Єрмоленка, зокрема концепції "плинних ідеологій", риторичних стратегій в його
  есе та його ролі в сучасних інтелектуальних дебатах України.
level: LIT-ESSAY
module: lit-essay-041
objectives:
- Аналізувати есеїстику Володимира Єрмоленка як приклад сучасної української інтелектуальної прози.
- Визначати ключові риторичні стратегії та метафори, які Єрмоленко використовує для аналізу 'плинних ідеологій'.
- Формулювати власну позицію в дебатах щодо ролі ідей в історії, спираючись на аргументи з текстів.
- Критично оцінювати концепцію 'плинності' в контексті викликів, що стоять перед сучасною Україною.
