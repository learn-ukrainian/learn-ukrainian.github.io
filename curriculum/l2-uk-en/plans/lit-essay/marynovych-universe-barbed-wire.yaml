content_outline:
- points:
  - 'Провокація: Як можна говорити про Бога в епіцентрі абсолютного зла? Чи є богослов''я можливим у ГУЛАГу?'
  - Фрагмент з есе Мариновича про "гріх як структуру" без пояснення — студент має здогадатися, про яку "структуру" йдеться.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Богословське vs. політичне прочитання. Чи є есеїстика Мариновича передусім релігійним текстом про гріх і спокуту,
    чи політичним маніфестом про спротив тоталітаризму?'
  - 'Дебат 2: Універсальне vs. національне свідчення. Чи є "Всесвіт за колючим дротом" універсальною метафорою (як "Архіпелаг
    ГУЛАГ"), чи це унікально український досвід, вкорінений у боротьбі УГКЦ та Руху опору?'
  - '[!epistemic-humility] Немає "правильного" прочитання. Аргументи Мариновича працюють на обох рівнях, і сила тексту — саме
    в їхньому переплетенні.'
  section: 'Конфліктна карта: Теологія чи політика?'
  words: 900
- points:
  - 'Ключовий уривок: детальний розбір центральної метафори — табір як модель світу, де ідеологія стає єдиною реальністю.'
  - 'Аргументативна структура: як Маринович використовує досвід ув''язнення для побудови цілісної філософсько-богословської
    системи.'
  - 'Наративна стратегія: автор як "свідок", а не жертва. У чому різниця?'
  - '[!decolonization] Переосмислення дисидентського руху: Маринович показує, що це була не просто боротьба "за права людини",
    а боротьба національних ідентичностей проти російського імперського ядра, замаскованого під радянську ідеологію.'
  section: 'Читання: Аналіз "Всесвіту за колючим дротом"'
  words: 1700
- points:
  - 'Центральна теза: радянська ідеологія як сектантська, квазірелігійна доктрина, що функціонує за законами "первородного
    гріха".'
  - 'Риторичні прийоми: використання богословської лексики (гріх, спокута, свідчення, благодать) для аналізу політичної системи.'
  - 'Порівняння: як аргументація Мариновича відрізняється від секулярної критики тоталітаризму (напр., Ганни Арендт).'
  - '[!epistemic-humility] Аналіз контраргументів: чи не є така теологізація надмірним спрощенням складних соціально-політичних
    процесів?'
  section: 'Риторика та аргументація: Гріх як ідеологічна система'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, як Маринович відповідає на питання про можливість віри в епіцентрі зла?'
  - 'Рецепція: як твори Мариновича сприймали в таборах, у дисидентському середовищі та на Заході? Чому його "теологічний"
    підхід не завжди розуміли?'
  - 'Сучасне значення: як есеїстика Мариновича допомагає зрозуміти ідеологічні основи сучасної Росії та природу її агресії.'
  - '[!anti-hagiography] Критична рефлексія: чи не створює образ автора-мученика та богослова дистанцію, що заважає побачити
    в ньому живу людину з її сумнівами та слабкостями?'
  section: Дискусія та підсумок
  words: 800
