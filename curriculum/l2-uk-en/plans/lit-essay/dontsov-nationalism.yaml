content_outline:
- points:
  - 'Провокація: Чи може ненависть бути творчою силою? Аналіз центральної тези Донцова про "творчий конфлікт" як рушій історії.'
  - 'Цитата без контексту: "Національна ідея є все, а форма правління – ніщо". Що це може означати для побудови держави?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Донцов як "апостол" української незалежності vs Донцов як теоретик інтегрального націоналізму, що має ознаки
    фашизму. Аналіз аргументів обох сторін.'
  - 'Дебат 2: Місце "Націоналізму" в сучасному каноні. Це обов''язкове читання для розуміння XX століття, чи небезпечний текст,
    що пропагує антидемократичні ідеї?'
  - '[!epistemic-humility] Оцінки Донцова коливаються від повної апології до безапеляційного засудження. Завдання — зрозуміти
    логіку його думки, а не "призначити" правильну оцінку.'
  section: 'Конфліктна карта: Пророк чи ідеолог тоталітаризму?'
  words: 900
- points:
  - 'Ключові концепти: "чинний націоналізм", "воля до влади", "ініціативна меншість", "національний інстинкт".'
  - Розбір аргументів проти демократії, раціоналізму та гуманізму. Чому Донцов вважав їх шкідливими для нації?
  - '[!decolonization] Радикальний розрив з "малоросійством". Аналіз того, як Донцов використовує риторику для утвердження
    української суб''єктності через протиставлення "європейської" України "азійській" Росії.'
  - Портрет "нової людини" — надлюдини, що керується не мораллю, а волею до національного самоствердження.
  section: 'Читання: Аналіз есе "Націоналізм"'
  words: 1700
- points:
  - 'Аналіз риторичних прийомів: емоційні заклики, категоричні судження, бінарні опозиції (своє/чуже, сильне/слабке), створення
    образу ворога.'
  - 'Структура аргументації: відмова від логічних доказів на користь "догмату" та "віри". Як це впливає на переконливість
    тексту?'
  - '[!epistemic-humility] Порівняння ідей Донцова з європейськими мислителями (Ніцше, Шпенглер, Сорель), щоб зрозуміти інтелектуальний
    контекст епохи.'
  - Критика ліберального та соціалістичного націоналізму як "неповноцінних" форм. У чому, за Донцовим, їхня слабкість?
  section: 'Риторика та аргументація: Мова волюнтаризму'
  words: 1200
- points:
  - 'Повернення до розминки: Як текст "Націоналізм" відповідає на питання про роль ненависті та конфлікту в політиці?'
  - 'Рецепція та вплив: Як ідеї Донцова були сприйняті сучасниками (ОУН) та як їх оцінюють сьогодні в Україні та діаспорі.'
  - '[!anti-hagiography] Небезпека "донцовщини": аналіз негативних наслідків його ідеології — схильності до авторитаризму,
    розколів у національному русі, виправдання політичного насильства.'
  - 'Сучасна актуальність: Чи є ідеї Донцова релевантними в умовах сучасної російсько-української війни? Де межа між патріотизмом
    та крайнім націоналізмом?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз ключового есе Дмитра Донцова "Націоналізм", його концепції "чинного націоналізму", риторичних стратегій та суперечливої
  спадщини в українській політичній думці.
