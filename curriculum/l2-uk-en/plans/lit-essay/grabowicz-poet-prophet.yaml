content_outline:
- points:
  - 'Провокація: Шевченко — "батько нації" чи складний, суперечливий поет? Як праця Грабовича змусила переглянути хрестоматійний
    образ Кобзаря?'
  - Цитата з Грабовича, що ставить під сумнів усталене уявлення про "народність" Шевченка, без прямого коментаря.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянське vs. діаспорне шевченкознавство. Грабович як "ревізіоніст", що кинув виклик "народницькому" і радянському
    прочитанню Шевченка. [!epistemic-humility]'
  - 'Дебат 2: Формалізм vs. біографізм. Чи можна аналізувати міф Шевченка окремо від його "реальної" біографії? Позиція Грабовича
    та його опонентів.'
  - 'Глобальний контекст: Грабович застосовує інструменти західної теорії (структуралізм, психоаналіз) до українського матеріалу.
    Реакція в Україні та в діаспорі.'
  section: 'Конфліктна карта: Канон і контр-канон у шевченкознавстві'
  words: 900
- points:
  - 'Уривок з Грабовича: аналіз центральної тези про "міфотворчість" Шевченка — як поет свідомо конструював власну біографію
    та образ пророка.'
  - 'Close reading аргументу: як Грабович використовує аналіз віршів ("Кавказ", "Заповіт") для підтвердження своєї теорії
    про міф.'
  - 'Система персонажів у Грабовича: "поет", "пророк", "кобзар" — як аналітичні категорії, а не біографічні ролі.'
  - '[!decolonization] Грабович виводить Шевченка з вузьких рамок "селянського поета" і вписує його у світовий контекст пророчої
    поезії (Мілтон, Блейк), стверджуючи його універсальне значення.'
  section: 'Читання: Аргумент "Поета як пророка"'
  words: 1800
- points:
  - 'Структура аргументації: як Грабович будує свою книгу — від аналізу окремих міфів до синтезу загальної теорії "коду" Шевченка.'
  - 'Риторичні стратегії: використання термінології з психоаналізу та антропології (archetype, myth, ritual) для переконання
    академічної аудиторії.'
  - 'Робота з джерелами: як Грабович цитує (або не цитує) своїх опонентів. Полемічний стиль наукової прози.'
  - 'Порівняння з контраргументами: аналіз критичних статей на працю Грабовича. Як опоненти будують свою аргументацію проти
    його тез? [!epistemic-humility]'
  section: 'Риторика та аргументація: Структуралістський метод Грабовича'
  words: 1200
- points:
  - 'Повернення до розминки: тож хто такий Шевченко після Грабовича? Студент формулює власну відповідь.'
  - 'Рецепція: Чому "Поет як пророк" став такою скандальною і впливовою книгою? Її роль у "перезавантаженні" гуманітаристики
    в незалежній Україні.'
  - 'Сучасне значення: Як ідеї Грабовича про "самотворення" нації через літературу резонують із сьогоднішніми культурними
    війнами? [!anti-hagiography]'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз праці Джорджа Грабовича "Поет як пророк", структура аргументації, риторичні стратегії, дебати про канон Шевченка,
  деколонізаційний підхід до шевченкознавства.
level: LIT-ESSAY
module: lit-essay-030
objectives:
- Аналізувати структуру та риторику академічного аргументу на прикладі праці Джорджа Грабовича "Поет як пророк"
- Розрізняти та критично оцінювати різні школи інтерпретації в українському літературознавстві (народницьку, радянську, діаспорну)
- Застосовувати поняття "канон", "міф", "суб'єктність" до аналізу творчості Тараса Шевченка
- Формулювати власну аргументовану позицію щодо ролі Тараса Шевченка в українській культурі, виходячи за межі шкільних стереотипів
pedagogy: CBI
