activity_hints:
- description: Перевірка розуміння дебатів у шевченкознавстві. Визначити, кому належить теза — Грабовичу чи його критикам.
  focus: 'Розуміння конфліктної карти: Грабович та його опоненти'
  items: 4
  type: quiz
- description: 'Вставити у речення з модуля ключові терміни: міф, код, ритуал, пророк, суб''єктність, архетип.'
  focus: Термінологія структуралістського аналізу
  items: 6
  type: fill-in
- description: 'Подано два короткі уривки: з "Поета як пророка" та з критичної статті. Порівняйте риторичні стратегії та стиль
    аргументації обох авторів.'
  focus: 'Аналіз риторики: Грабович vs його критики'
  type: note
- description: Як праця Грабовича змінила ваше особисте сприйняття Шевченка? Аргументуйте свою позицію, посилаючись на конкретні
    ідеї з модуля (400-600 слів).
  focus: 'Есе: Десакралізація чи нове прочитання?'
  type: note
cefr_min: C1
connects_to:
