activity_hints:
- description: Визначити, яка з наведених тез належить до позиції модерністів, а яка — до народників у баченні Лесі Українки.
  focus: 'Розуміння конфліктної карти: Модернізм vs. Народництво'
  items: 6
  type: quiz
- description: 'Вставити в речення з модуля терміни з аналізу аргументації: полеміка, дихотомія, риторичне питання, іронія,
    теза.'
  focus: Риторичні стратегії Лесі Українки
  items: 5
  type: fill-in
- description: 'Наведено два короткі уривки: один з есе Лесі Українки, інший — з гіпотетичної статті її опонента-народника.
    Проаналізуйте риторичні стратегії обох сторін.'
  focus: 'Аналіз аргументу: Леся Українка vs. критик-опонент'
  type: note
- description: Оберіть одну з дискусій, порушених Лесею Українкою (мистецтво для народу vs. елітарне мистецтво; національне
    vs. європейське). Напишіть коротке есе (400-600 слів), де ви аргументуєте, чому ця дискусія є (або не є) актуальною для
    сучасної України.
  focus: Сучасна актуальність полеміки Лесі Українки
  type: essay-response
