objectives:
- Аналізувати есеїстику Лесі Українки як приклад полемічної прози, визначаючи ключові тези та аргументи
- Розрізняти риторичні стратегії автора, такі як іронія, антитеза, та логічні структури
- Критично оцінювати позицію Лесі Українки в контексті літературних дебатів її епохи (модернізм vs. народництво)
- Формулювати власну аргументовану позицію щодо актуальності інтелектуальної спадщини Лесі Українки для сучасної України
