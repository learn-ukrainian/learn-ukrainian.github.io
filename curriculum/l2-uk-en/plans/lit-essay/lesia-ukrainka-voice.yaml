content_outline:
- points:
  - 'Провокація: "Поезія не може бути посторонньою, холодною, вона мусить або любити, або ненавидіти, горіти або замерзати,
    а не бути теплою". Як цей вислів Лесі Українки визначає її власну творчість і роль митця в суспільстві?'
  - 'Загадка: Який італійський письменник став для Лесі Українки символом "нового", а який — "старого" мистецтва, і чому ця
    дихотомія була для неї принциповою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Європейський модернізм vs. українське народництво. Чи була Леся Українка "зрадою" національної ідеї, орієнтуючись
    на європейські зразки, чи навпаки — виводила українську літературу на світовий рівень?'
  - 'Дебат 2: Феміністична суб''єктність vs. національний обов''язок. Як Леся Українка поєднувала боротьбу за права жінок
    з визвольною боротьбою нації? Чи були ці два вектори в конфлікті?'
  - '[!epistemic-humility] Критики-народники звинувачували її в "космополітизмі" та відриві від народу. Модерністи (і пізніше,
    Оксана Забужко) бачили в ній творця української інтелектуальної жінки.'
  section: 'Конфліктна карта: Модернізм проти народництва'
  words: 900
- points:
  - 'Ключовий уривок: Аналіз Лесиного розмежування творчості Ади Негрі (соціальна, "народницька") та Габріеле д''Аннунціо
    (елітарна, "модерна").'
  - 'Close reading: Як Леся Українка використовує аналіз італійської літератури для критики українських реалій? Пошук прихованої
    полеміки з українськими опонентами.'
  - '[!decolonization] Через аналіз "чужої" літератури Леся утверджує право української культури бути рівною серед рівних,
    мати власні інтелектуальні дебати, а не лише "служити народові". Вона вимагає для України не провінційної, а світової
    ролі.'
  - 'Структура тексту: Це не просто огляд, а маніфест. Як побудовано аргументацію для доведення переваги "нового" мистецтва?'
  section: 'Читання: Два напрямки в новітній італійській літературі'
  words: 1700
- points:
  - 'Теза і антитеза: Як Леся Українка вибудовує свою аргументацію на протиставленнях (старе/нове, провінційне/світове, емоція/інтелект)?'
  - 'Риторичні прийоми: Використання іронії, сарказму, риторичних запитань для дискредитації позиції опонентів (навіть коли
    вони не названі прямо).'
  - 'Логічна структура: Аналіз логіки її доказів. Чи завжди вона коректна? Де вона спирається на факти, а де — на емоційне
    переконання (ethos/pathos)?'
  - '[!epistemic-humility] Чи є її поділ на "два напрямки" об''єктивним аналізом, чи радше інструментом для просування власної
    естетичної програми? Розгляд альтернативних інтерпретацій.'
  section: 'Риторика та аргументація: Полемічна майстерність'
  words: 1200
- points:
  - 'Повернення до розминки: Чи була сама Леся "холодною" інтелектуалкою чи "гарячою" поборницею ідеї? Формулювання відповіді
    на основі аналізу її есеїстики.'
  - 'Рецепція: Як її критична проза сприймалася сучасниками? Чому радянська влада намагалася представити її виключно як "співачку
    досвітніх вогнів", замовчуючи її інтелектуалізм?'
  - '[!anti-hagiography] Леся Українка була безкомпромісною полемісткою. Її гострий розум і сарказм створювали їй не лише
    союзників, а й ворогів. Це не "ніжна квітка", а боєць.'
  - 'Сучасне значення: Які з її дебатів (про роль мистецтва, про орієнтацію на Європу, про фемінізм) залишаються актуальними
    для України сьогодні?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз есеїстики Лесі Українки як зразка європейської інтелектуальної прози. Розбір риторичних стратегій, аргументації
  та деколоніального потенціалу її критичних текстів.
