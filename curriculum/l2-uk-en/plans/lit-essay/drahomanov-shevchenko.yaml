content_outline:
- points:
  - 'Провокація: Чи міг «батько нації» Тарас Шевченко бути насправді соціалістом, що критикував націоналізм?'
  - Цитата з Драгоманова без контексту про «обмеженість» українофілів, що змушує студента поставити питання про альтернативний
    погляд на історію.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Національний пророк» (традиційна, народницька інтерпретація) проти «Послідовного демократа-соціаліста» (інтерпретація
    Драгоманова). Аргументи сторін.'
  - 'Дебат 2: Місце Драгоманова в каноні. Чому його погляди на Шевченка були маргіналізовані як в радянській, так і в діаспорній
    історіографії?'
  - '[!epistemic-humility] Не існує «єдино правильного» Шевченка. Кожна епоха конструює свого Кобзаря, що відповідає її потребам
    та ідеологіям.'
  section: 'Конфліктна карта: Шевченко народницький vs. Шевченко соціалістичний'
  words: 900
- points:
  - 'Аналіз ключових уривків з есе Драгоманова: як він використовує вірші Шевченка («Кавказ», «Посланіє») для доведення своєї
    соціалістичної тези.'
  - Драгомановська критика «культурництва» та «хуторянства» — що він пропонував натомість?
  - '[!decolonization] Аргумент Драгоманова проти «московського централізму» та одночасно проти «провінційного націоналізму»
    як шлях до справжньої суб''єктності України у європейському контексті.'
  section: 'Читання: «Шевченко, українофіли й соціалізм»'
  words: 1700
- points:
  - 'Структура аргументації Драгоманова: від аналізу тексту до політичних висновків. Використання історичних доказів, порівняльного
    методу.'
  - 'Риторичні стратегії: раціональний, майже «науковий» стиль як противага емоційному, романтичному стилю його опонентів-народників.'
  - '[!epistemic-humility] Порівняння аргументів Драгоманова з аргументами його опонентів. Чия позиція є більш переконливою
    і чому?'
  section: 'Риторика та аргументація: Драгоманов як полеміст'
  words: 1200
- points:
  - 'Повернення до розминки: тож ким був Шевченко для Драгоманова і чому цей погляд був таким скандальним?'
  - 'Рецепція есе: як робота Драгоманова вплинула на подальші шевченкознавчі студії та українську політичну думку.'
  - '[!anti-hagiography] Драгоманов «десакралізує» Шевченка, перетворюючи ікону на живу людину з суперечностями. Чи допомагає
    це краще зрозуміти поета?'
  - 'Сучасне значення: наскільки критика Драгомановим націоналізму та його ідеї європейської інтеграції актуальні для сучасної
    України?'
  section: Дискусія та підсумок
  words: 800
focus: Суперечлива реінтерпретація Шевченка Михайлом Драгомановим як соціалістичного діяча, що кидає виклик міфу про національного
  пророка. Аналіз есе «Шевченко, українофіли й соціалізм».
level: LIT.ESSAY
module: lit-essay-008
objectives:
- Аналізувати ключові аргументи та риторичні стратегії в есе М. Драгоманова «Шевченко, українофіли й соціалізм»
- Порівнювати соціалістичну інтерпретацію Шевченка з традиційною «національно-пророчою»
- Критично оцінювати роль інтелектуальних дискусій XIX століття у формуванні сучасної української ідентичності
- Формулювати аргументовану позицію щодо актуальності ідей Драгоманова в сучасних дебатах про націоналізм та євроінтеграцію
