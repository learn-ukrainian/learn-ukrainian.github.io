content_outline:
- points:
  - 'Провокація: Іван Франко, "вічний революціонер", стверджував, що прогрес — це ілюзія, а людство не стає кращим. Чому "Каменяр"
    був таким песимістом?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Позитивізм vs. Соціал-дарвінізм. Франко ("поступ — це боротьба") проти Драгоманова ("поступ — це поширення знань
    та свобод").'
  - 'Дебат 2: Франко — націоналіст чи соціаліст? Чиє "добро" він ставить на перше місце в есе — нації чи "люду"?'
  - '[!epistemic-humility] Аргументи Франка про "право сильнішого" шокували сучасників. Його звинувачували в аморальності,
    хоча він лише діагностував, а не виправдовував стан речей.'
  section: 'Конфліктна карта: Прогрес — це закон чи боротьба?'
  words: 900
- points:
  - 'Аналіз центральної тези: прогрес не є лінійним, він включає періоди регресу, і "культурні" народи можуть бути надзвичайно
    жорстокими.'
  - 'Структура аргументації: від критики "культурників" і "народників" до власної теорії суспільного розвитку.'
  - '[!decolonization] Франко руйнує російський імперський міф про "старшого брата", який несе прогрес. Він показує, що кожна
    нація мусить виборювати своє місце під сонцем, а не чекати "благодіянь" від імперії.'
  - 'Поняття "сили" у Франка: це не лише військова міць, а й інтелектуальна, організаційна та культурна енергія нації.'
  section: 'Читання: "Що таке поступ?"'
  words: 1700
- points:
  - 'Стиль Франка: науковий аналіз, що межує з політичним памфлетом. Використання іронії, сарказму та провокативних прикладів.'
  - 'Джерела аргументів: як Франко використовує історію (Рим, Наполеонівські війни) та природознавство (Дарвін) для побудови
    своєї теорії.'
  - 'Полеміка із невидимими опонентами: есе є відповіддю на панівні ідеї епохи — народництво, лібералізм, марксизм.'
  - '[!epistemic-humility] Франко не пропонує легких рішень. Його мета — зруйнувати ілюзії, навіть якщо правда є неприємною.'
  section: 'Риторика та аргументація: Франко як полеміст'
  words: 1200
- points:
  - 'Повернення до розминки: тож чому Франко був таким "песимістом"? Відповідь студента з посиланням на текст.'
  - 'Рецепція твору: як есе було сприйняте в кінці XIX ст. і чому воно стало надзвичайно актуальним у XXI ст. (особливо після
    2014/2022).'
  - '[!anti-hagiography] Цей твір показує "незручного" Франка — не "батька нації", а жорсткого аналітика, готового говорити
    непопулярну правду.'
  - 'Сучасне значення: чи можна вважати російсько-українську війну підтвердженням теорії Франка про "боротьбу за існування"
    між народами?'
  section: Дискусія та підсумок
  words: 700
focus: 'The essay "What is Progress?" by Ivan Franko: critique of linear progress, social Darwinism, the role of conflict
  in civilization, and the search for a unique Ukrainian path to modernity.'
level: LIT-ESSAY
module: lit-essay-009
objectives:
- Аналізувати центральну тезу есе Івана Франка "Що таке поступ?", розрізняючи його погляд від поглядів позитивістів
- Пояснювати, як Франко використовує риторичні прийоми та аргументи з історії для критики ілюзій про лінійний прогрес
- Формулювати аргументовану позицію щодо актуальності ідей Франка для розуміння сучасних глобальних конфліктів
- Застосовувати поняття "суб'єктність" та "деколонізація" для аналізу українського інтелектуального спадку
