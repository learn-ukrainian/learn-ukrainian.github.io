content_outline:
- points:
  - 'Провокація: «Де ви бачите хаос, я бачу волю до життя». Чи є ідеологія Донцова рецептом для виживання нації чи виправданням
    політичного екстремізму?'
  - 'Цитата без контексту: «Не мир, а війна; не братерство, а боротьба; не contract social, а насильство сильнішого». Що це
    — маніфест тиранії чи формула національного визволення?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Донцов — політичний ідеолог чи літературний критик? Його аналіз Шевченка, Лесі Українки — це об''єктивне читання
    чи підганяння класиків під свою доктрину?'
  - 'Дебат 2: «Санітар нації» чи «апостол фашизму»? Дискусія про місце Донцова в українському інтелектуальному пантеоні. Чи
    були його ідеї необхідним щепленням від «провінціалізму», чи токсичною ідеологією?'
  - '[!epistemic-humility] Інтерпретації спадщини Донцова є вкрай поляризованими — від поклоніння до повного заперечення.
    Істина, як завжди, ускладнена.'
  section: 'Конфліктна карта: Ідеолог чи літератор?'
  words: 900
- points:
  - 'Ключові тези есе «Націоналізм»: критика демократії, гуманізму, інтернаціоналізму. Пропаганда «чинного націоналізму» (волюнтаризму).'
  - 'Аналіз аргументації: як Донцов використовує історію (княжа доба, козацтво) для легітимації своєї доктрини «аморальності»
    в політиці.'
  - 'Читання класиків «очима Донцова»: як він перетворює Лесю Українку з соціалістки на пророчицю «ордену сильних духом».'
  - '[!decolonization] Радикальний розрив із «москвофільством» та «провансальством» як центральна вісь доктрини. Донцов вимагав
    повної емансипації української культури від російського впливу, навіть ціною жорстокості.'
  section: 'Читання: ''Націоналізм'' та ''Дух нашої давнини'''
  words: 1800
- points:
  - 'Стиль Донцова: агресивний, афористичний, провокативний. Використання біологічних метафор («здорові» vs «хворі» нації),
    історичних аналогій (Рим, Спарта).'
  - 'Структура аргументу: не логічний доказ, а емоційний заклик до волі (pathos). Пріоритет інстинкту, ірраціонального над
    розумом і «вселюдськими цінностями».'
  - 'Контраргумент: порівняння риторики Донцова з його опонентами — консерватором В''ячеславом Липинським (пріоритет держави
    і закону) та соціал-демократами (пріоритет соціальної справедливості).'
  - '[!epistemic-humility] Донцов не переконує, він навертає. Його тексти — це не науковий аналіз, а політична проповідь,
    що вимагає віри, а не критичного мислення.'
  section: 'Риторика та аргументація: Волюнтаризм і аристократизм'
  words: 1200
- points:
  - 'Повернення до розминки: тож хаос Донцова — це творча енергія чи руйнівна стихія? Студент формулює відповідь з аргументами.'
  - 'Рецепція: як читали Донцова в ОУН, у діаспорі після Другої світової, і як його ідеї реанімуються в сучасній Україні,
    особливо після 2014 року.'
  - '[!anti-hagiography] Проблемні аспекти доктрини: елітаризм («орден кращих людей»), антидемократизм, виправдання політичного
    насильства. Чи можна відділити «здорові» ідеї від «небезпечних»?'
  - 'Сучасне значення: наскільки актуальні ідеї Донцова в умовах повномасштабної війни? Чи є його «дух» тим, що допомагає
    Україні вистояти, чи це небезпечна ілюзія?'
  section: Дискусія та підсумок
  words: 700
focus: Dmytro Dontsov's voluntarist philosophy, the concept of 'creative chaos', his critique of 'provincialism', analysis
  of his key essays, and his role as a controversial ideologue of Ukrainian nationalism.
level: LIT-ESSAY
module: lit-essay-017
objectives:
- Аналізувати ключові есе Дмитра Донцова, виокремлюючи центральні поняття його доктрини
- Розрізняти поняття «чинного націоналізму», «волюнтаризму» та «аристократизму» в його інтерпретації
- Критично оцінювати риторичні стратегії та маніпулятивні прийоми в текстах Донцова
- Формулювати аргументовану позицію щодо ролі та спадщини Донцова в українській інтелектуальній історії
pedagogy: CBI
