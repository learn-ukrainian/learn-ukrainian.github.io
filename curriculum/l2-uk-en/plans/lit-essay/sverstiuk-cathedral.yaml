objectives:
- Аналізувати argumentative prose на прикладі есеїстики українських дисидентів
- Розрізняти риторичні стратегії, що використовуються в політично заангажованій літературній критиці
- Формулювати власну позицію щодо ролі інтелектуала в тоталітарному суспільстві
- Застосовувати деколонізаційний підхід до аналізу текстів радянського періоду
