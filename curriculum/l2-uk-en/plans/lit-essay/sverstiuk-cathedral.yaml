activity_hints:
- description: 'Визначити, кому належить теза про "Собор": офіційній радянській критиці чи Євгену Сверстюку.'
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити в речення з есе ключові поняття: суб''єктність, риштовання, езопова мова, конформізм.'
  focus: Риторична лексика Сверстюка
  items: 4
  type: fill-in
- description: Прочитайте уривок з роману "Собор" О. Гончара та уривок з есе "Собор у риштованні" Є. Сверстюка. Порівняйте
    стиль, тон та основний посил обох авторів. Що Сверстюк "додав" до Гончара?
  focus: 'Порівняльний аналіз: Гончар vs Сверстюк'
  type: note
- description: Напишіть коротке есе (400-600 слів) на тему "Чи потрібні сучасній Україні "собори в риштованні"?". Аргументуйте
    свою позицію, спираючись на ідеї Євгена Сверстюка.
  focus: 'Есе: Актуальність Сверстюка'
  type: note
