content_outline:
- points:
  - 'Провокація: Чому есе на захист офіційно опублікованого радянського роману стало одним з найгучніших текстів дисидентського
    руху і призвело до арешту автора?'
  - 'Цитата Сверстюка: "Існують народи, для яких історія — це безперервна низка випробувань на право існування". Як ця думка
    визначає підхід автора до аналізу літератури?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Собор" Гончара — офіційна критика vs дисидентський захист Сверстюка. Як один і той самий текст міг бути і "наклепом
    на радянську дійсність", і "символом духовного відродження"?'
  - 'Дебат 2: "Собор у риштованні" — це літературна критика чи політичний маніфест? Суперечки про жанрову природу тексту та
    його мету.'
  - '[!epistemic-humility] Позиція "знизу": аналіз тексту Сверстюком як спроба повернути право на інтерпретацію культури,
    відібране в народу державою.'
  - 'Глобальний контекст: порівняння з есеїстикою Вацлава Гавела ("Сила безсилих") або Чеслава Мілоша ("Поневолений розум")
    — інтелектуалісти Східної Європи проти тоталітаризму.'
  section: 'Конфліктна карта: Літкритика чи Політика?'
  words: 900
- points:
  - 'Розбір ключових уривків: Сверстюк про образ собору як метафори культури, про "зелених чортів" (духовних руйнівників)
    і про спадкоємність поколінь.'
  - 'Як Сверстюк використовує роман Гончара як привід для розмови про значно ширші проблеми: русифікацію, історичну амнезію,
    конформізм інтелігенції.'
  - '[!decolonization] Текст Сверстюка як акт відновлення української суб''єктності. Він говорить про Україну не як про об''єкт
    зовнішніх впливів, а як про самостійного актора з власною тисячолітньою культурною логікою.'
  - '[!myth-buster] Сверстюк не ідеалізує минуле, а шукає в ньому джерела моральної сили для сьогодення. Його консерватизм
    — це консерватизм цінностей, а не форм.'
  section: 'Читання: Аналіз есе "Собор у риштованні"'
  words: 1800
- points:
  - 'Езопова мова: як Сверстюк говорить про заборонені речі (репресії, Голодомор, русифікацію), не називаючи їх прямо, через
    систему натяків та алюзій.'
  - 'Аргументація через етос: автор виступає не як політик, а як моральний авторитет, совість нації. Аналіз того, як створюється
    цей образ у тексті.'
  - Використання біблійних та історичних паралелей для надання універсального масштабу локальним проблемам.
  - 'Порівняння риторики Сверстюка з мовою офіційної радянської критики: суха ідеологічна мова vs жива, образна, екзистенційна
    мова.'
  section: 'Риторика та аргументація: Стиль як спротив'
  words: 1200
- points:
  - 'Повернення до розминки: чи могла влада проігнорувати есе Сверстюка? У чому полягала його головна небезпека для системи?'
  - 'Рецепція твору: як "Собор у риштованні" поширювався в самвидаві та як вплинув на покоління українських дисидентів 70-х
    років.'
  - '[!anti-hagiography] Критичний погляд: чи не є позиція Сверстюка занадто елітарною? Наскільки його ідеї були зрозумілі
    та близькі широким масам, а не лише вузькому колу інтелігенції?'
  - 'Сучасне значення: чи актуальні сьогодні ідеї Сверстюка про "собор у риштованні" в контексті відбудови України після війни?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз есе Євгена Сверстюка "Собор у риштованні" як зразка інтелектуального спротиву, його риторичних стратегій та
  ролі у дебатах навколо роману "Собор" Олеся Гончара.
