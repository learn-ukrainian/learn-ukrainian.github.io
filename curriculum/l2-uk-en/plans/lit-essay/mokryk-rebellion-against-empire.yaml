module: lit-essay-mokryk-rebellion
level: LIT.ESSAY
slug: mokryk-rebellion-against-empire
version: '2.0'
title: 'Радомир Мокрик: Бунт проти імперії'
subtitle: Шістдесятники як предтечі незалежності
content_outline:
- section: Вступ — Новий погляд на шістдесятників
  points:
  - Відмова від пафосу та жертовності
  - Шістдесятники як молоді, стильні, живі люди
  - Контекст "Відлиги"
- section: Клуб Творчої Молоді (КТМ)
  points:
  - "Сучасник" як центр тяжіння
  - Алла Горська, Ліна Костенко, Василь Симоненко
  - Вечори, виставки, самвидав
- section: Конфлікт з системою
  points:
  - Еволюція від культурництва до політичного опору
  - Арешти 1965 та 1972 років
  - "Інтернаціоналізм чи русифікація?" Дзюби
- section: Стилістика тексту
  points:
  - Наративна легкість та кінематографічність
  - Вплив європейської есеїстики
  - Доступність для широкого читача
- section: Підсумок
  points:
  - Тяглість поколінь: від шістдесятників до сьогодення
  - Чому імперія програла культурну війну
vocabulary_hints:
  required:
  - хрущовська відлига
  - шістдесятництво
  - нонконформізм
  - русифікація
  - дисидентство
  recommended:
  - соцреалізм
  - тоталітаризм
activity_hints:
- type: reading
  focus: Аналіз уривків
- type: essay-response
  focus: Есе про культурний опір
- type: critical-analysis
  focus: Історичний контекст
focus: literature
pedagogy: literature
immersion: 100% Ukrainian
phase: LIT Expansion
objectives:
- Дослідити феномен шістдесятництва через книгу Радомира Мокрика
- Зрозуміти механізми культурного опору тоталітаризму
persona:
  voice: Literary Historian
  role: Cultural Critic
