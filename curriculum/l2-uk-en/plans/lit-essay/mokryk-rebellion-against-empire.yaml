objectives:
- Аналізувати книгу Радомира Мокрика "Бунт проти імперії" як зразок сучасної української історичної есеїстики
- 'Критично оцінювати дебати навколо руху шістдесятників: культурний нонконформізм проти політичного опору'
- Визначати риторичні стратегії та особливості стилю Мокрика, що роблять складну тему доступною для широкого читача
- Формулювати власну позицію щодо тяглості культурного спротиву від шістдесятників до сьогодення
