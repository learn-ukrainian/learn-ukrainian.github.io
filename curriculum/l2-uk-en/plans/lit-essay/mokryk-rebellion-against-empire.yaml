  focus: Дебати про шістдесятників
  items: 4
  type: quiz
- description: 'Вставте в речення правильні терміни: відлига, самвидав, русифікація, нонконформізм, дисидентство.'
  focus: Ключові терміни епохи
  items: 5
  type: fill-in
- description: Знайдіть у тексті модуля приклад "кінематографічної" оповіді Мокрика. Поясніть, які прийоми він використовує
    і як це впливає на читача.
  focus: Аналіз риторики
  type: note
