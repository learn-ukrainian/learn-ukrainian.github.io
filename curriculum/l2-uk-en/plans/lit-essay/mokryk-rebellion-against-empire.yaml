content_outline:
- points:
  - 'Провокація: Чому радянська система боялася джазу, абстрактного мистецтва та вільної любові більше, ніж прямих політичних
    гасел?'
  - Цитата з книги Мокрика про шістдесятників як "молодих, стильних, живих людей" — спроба побачити за бронзовими пам'ятниками
    реальних особистостей
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Шістдесятники — це культурний нонконформізм чи політичний спротив? Позиція 1: це була "революція смаку", що
    випадково стала політичною. Позиція 2: в умовах тоталітаризму будь-який прояв свободи є політичним актом.'
  - 'Дебат 2: Чи були шістдесятники приречені на поразку? Позиція 1: їхній рух був розчавлений арештами 1965-72 рр. Позиція
    2: вони виграли культурну війну, заклавши основи для незалежності 1991 року.'
  - '[!epistemic-humility] Мокрик уникає однозначних оцінок, показуючи еволюцію руху від культурництва до прямого дисидентства.'
  section: 'Конфліктна карта: Культура проти Політики'
  words: 900
- points:
  - 'Аналіз ключових розділів книги Мокрика: заснування Клубу Творчої Молоді "Сучасник" як центру тяжіння.'
  - 'Портрети руху: Алла Горська, Ліна Костенко, Василь Симоненко, Іван Дзюба. Як Мокрик показує їхні особисті трагедії та
    вибір.'
  - 'Переломні моменти: арешти 1965 року, реакція на них, публікація праці Дзюби "Інтернаціоналізм чи русифікація?".'
  - '[!decolonization] Шістдесятництво як вияв антиколоніального опору. Боротьба за українську мову та культуру проти тотальної
    русифікації.'
  section: 'Читання: Бунт проти імперії'
  words: 1800
- points:
  - 'Теза Мокрика: культурний спротив був не менш важливим за політичний.'
  - 'Риторичні стратегії: використання біографічних деталей для "олюднення" історії, кінематографічність оповіді, залучення
    читача через емоційний відгук.'
  - 'Структура аргументації: Мокрик будує оповідь як захопливу історію, а не сухий академічний текст. Як це впливає на переконливість?'
  - '[!epistemic-humility] Порівняння стилю Мокрика з академічними працями про дисидентський рух. Переваги та недоліки "популярної
    історії".'
  section: 'Риторика та аргументація: Наративна легкість Мокрика'
  words: 1200
- points:
  - 'Повернення до розминки: то чому ж система боялася джазу? Формулювання відповіді на основі аналізу книги.'
  - 'Рецепція книги: як "Бунт проти імперії" був сприйнятий в Україні? Чому ця тема виявилася настільки актуальною у 2020-х?'
  - '[!anti-hagiography] Як уникнути ідеалізації шістдесятників? Обговорення внутрішніх конфліктів, особистих слабкостей та
    неоднозначних постатей руху.'
  - 'Сучасне значення: тяглість поколінь — чи можна вважати сучасних українських митців та активістів спадкоємцями шістдесятників?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз книги Радомира Мокрика "Бунт проти імперії", феномен шістдесятництва як культурний та політичний опір, стилістика
