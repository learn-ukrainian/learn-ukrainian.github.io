activity_hints:
- description: 'Визначте, кому належить теза: Драгоманову чи його опонентам-націоналістам. Перевірка розуміння ключового конфлікту.'
  focus: 'Дебати Драгоманова: федералізм vs самостійність'
  items: 8
  type: quiz
- description: 'Вставте в речення поняття з модуля: суб''єктність, федералізм, раціоналізм, полеміка, космополітизм.'
  focus: Лексика політичної думки
  items: 5
  type: fill-in
- description: Прочитайте уривок з "Чудацьких думок" та колонку сучасного українського публіциста на схожу тему. Порівняйте
    їхні риторичні стратегії, стиль аргументації та ключові ідеї.
  focus: 'Порівняльний аналіз: Драгоманов vs сучасний публіцист'
  type: note
- description: Напишіть есе (400-600 слів) на тему "Ідеї Михайла Драгоманова в контексті європейської інтеграції України XXI
    століття". Використовуйте аргументи з модуля.
  focus: 'Есе: Чи актуальний Драгоманов сьогодні?'
  type: note
