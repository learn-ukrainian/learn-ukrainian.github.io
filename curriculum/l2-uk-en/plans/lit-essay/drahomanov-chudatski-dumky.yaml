content_outline:
- points:
  - 'Провокація: Чому провідний український мислитель XIX ст. виступав проти негайної державної незалежності України і вважав
    "патріотичну істерику" шкідливою?'
  - 'Цитата-загадка: "Чи визнавати себе за європейця, чи за українця? Я кажу: і за європейця, і за українця..." — Як ви розумієте
    цю позицію?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Федералізм vs Незалежність. Позиція Драгоманова (широка автономія в рамках демократичної федерації) проти позиції
    галицьких радикалів (незалежна соборна держава).'
  - 'Дебат 2: "Культурник" чи політик? Драгоманов наполягав на пріоритеті загальнолюдських прав і свобод над національними
    інтересами. Його опоненти вважали це зрадою національної справи.'
  - '[!epistemic-humility] Для свого часу Драгоманов був "єретиком", а сьогодні його ідеї про європейську інтеграцію та децентралізацію
    виглядають пророчими. Немає єдиної "правильної" відповіді на питання, поставлені ним.'
  section: 'Конфліктна карта: Федераліст проти самостійників'
  words: 900
- points:
  - 'Аналіз ключового уривку: критика "історичного права" і "національного сентименту" як основи для політики.'
  - 'Структура тексту: Драгоманов будує аргументацію не на емоціях, а на логіці, фактах та порівняльному аналізі європейського
    досвіду.'
  - Поняття "відкритого патріотизму" — служіння своєму народові через служіння прогресу людства.
  - '[!decolonization] Драгоманов вимагав деколонізувати український розум не лише від російського імперіалізму, але й від
    вузького, етноцентричного націоналізму, який він вважав іншою формою самоізоляції.'
  section: 'Читання: Уривки з "Чудацьких думок"'
  words: 1700
- points:
  - 'Теза та антитеза: Драгоманов систематично аналізує аргументи опонентів і спростовує їх один за одним, використовуючи
    логіку, а не гасла.'
  - 'Риторична стратегія: відмова від метафор та емоційних закликів на користь "сухої" мови фактів. Це свідомий вибір, що
    підкреслює європейський, раціональний характер його думки.'
  - 'Порівняльний метод: постійні посилання на політичний досвід Швейцарії, Бельгії, США як зразок для майбутнього України.'
  - '[!epistemic-humility] Драгоманов не боявся визнавати слабкі місця в українській історії та характері, що робило його
    критику болючою, але чесною.'
  section: 'Риторика та аргументація: Сила раціонального слова'
  words: 1200
- points:
  - 'Повернення до розминки: Чи був Драгоманов "зрадником" чи "пророком"? Студенти формулюють власну позицію, спираючись на
    текст.'
  - 'Рецепція: Чому ідеї Драгоманова були маргіналізовані на початку XX століття, але стали надзвичайно актуальними у XXI?'
  - '[!anti-hagiography] Драгоманов був складною фігурою: різкий, безкомпромісний у полеміці, що робило його самотнім. Важливо
    бачити не ікону, а живу людину з її сильними сторонами та суперечностями.'
  - 'Сучасне значення: Наскільки ідеї Драгоманова про європейський вибір, громадянське суспільство та критичне мислення актуальні
    для сучасної України, що бореться за своє місце в Європі?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз політичного есе М. Драгоманова "Чудацькі думки", його полеміки з галицькими націоналістами, концепції федералізму
  та раціонального підходу до політики.
level: LIT-ESSAY
module: lit-essay-007
objectives:
- Аналізувати аргументативну прозу Михайла Драгоманова, розрізняючи його раціональну риторику від емоційної риторики опонентів.
- 'Формулювати власну позицію в рамках ключових дебатів української політичної думки: федералізм vs. незалежність, космополітизм
  vs. націоналізм.'
- Застосовувати деколонізаційну оптику для аналізу текстів, що кидають виклик імперським та вузько-націоналістичним наративам.
- Критично оцінювати складні історичні постаті, уникаючи агіографії та спрощених оцінок.
