content_outline:
- points:
  - 'Провокація: Текст, що став «справжньою» історією для цілих поколінь, — фальшивка. Чи знецінює це його роль у творенні
    нації?'
  - 'Цитата без контексту: "Кожен повинен знати, що ми є те, чим предки наші були..." — що, якщо самі "предки" є конструктом?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Авторство): Хто написав "Історію Русів"? Версії та кандидати — Григорій Кониський, Георгій Полетика, Олександр
    Безбородько. Чи це колективна праця? Чому авторство досі є предметом спекуляцій?'
  - 'Дебат 2 (Жанр): Це історія, політичний памфлет чи літературна містифікація? Як твір водночас створював минуле і проектував
    майбутнє України?'
  - '[!epistemic-humility] Не маючи остаточної відповіді про автора, ми можемо аналізувати, ЯК і НАВІЩО цей текст був створений.
    Фокус зміщується з "хто сказав" на "що сказано і з якою метою".'
  section: 'Конфліктна карта: Авторство та інтерпретація'
  words: 900
- points:
  - Уривок з тексту, що конструює ідеал козацької республіки та безперервність української державної традиції.
  - 'Аналіз наративної структури: як "Історія Русів" створює відчуття глибокої історичної тяглості, протиставляючи "нас" (русів-українців)
    "їм" (полякам, московитам).'
  - 'Персонажна система: героїзація Мазепи, ідеалізація козацької старшини. Створення пантеону національних героїв.'
  - '[!decolonization] "Історія Русів" як акт інтелектуального опору імперії. Твір створює українську суб''єктність, відмовляючи
    імперському наративу в монополії на минуле.'
  section: 'Читання: Наратив про "вільних і сміливих" предків'
  words: 1700
- points:
  - 'Теза та антитеза: як текст вибудовує аргумент про право українців на власну державу через історичні приклади.'
  - 'Риторичні стратегії: використання біблійних алюзій, пафос у зображенні страждань, етос "об''єктивного літописця", іронія
    щодо опонентів.'
  - 'Мова як мистецтво: аналіз стилістики, що імітує бароковий літопис, для створення ефекту автентичності.'
  - '[!epistemic-humility] Порівняння аргументації "Історії Русів" з офіційною історіографією Російської імперії того часу
    (напр. Карамзін). Як вони конструюють принципово різні версії минулого?'
  section: 'Риторика та аргументація: "Історія" як зброя'
  words: 1200
- points:
  - 'Повернення до провокації: чи може "фальшивка" бути більш правдивою для культури, ніж "справжній" документ?'
  - 'Рецепція та спадщина: як рукописний текст став "святим письмом" для кирило-мефодіївців, натхненням для Шевченка, і чому
    його вплив відчутний досі.'
  - 'Сучасне значення: в епоху фейкових новин та інформаційних воєн, який урок нам дає "Історія Русів"?'
  - '[!anti-hagiography] Деконструкція міфу про "об''єктивну історію". "Історія Русів" вчить, що будь-який історичний наратив
    є інструментом боротьби за сьогодення і майбутнє.'
  section: Дискусія та підсумок
  words: 800
focus: '"Історія Русів" як літературний та політичний феномен, аналіз риторичних стратегій, проблема авторства та вплив твору
  на формування української національної ідентичності.'
level: LIT-ESSAY
module: lit-essay-003
objectives:
- Аналізувати "Історію Русів" як комплексний літературний, політичний та історіографічний феномен.
- Критично оцінювати проблему авторства та її вплив на інтерпретацію твору.
- Розпізнавати та аналізувати риторичні стратегії, використані у тексті для створення національного наративу.
- Формулювати аргументовану позицію щодо ролі "Історії Русів" у процесах деколонізації та формування української ідентичності.
