objectives:
- Аналізувати ключові ідеї та риторичні стратегії памфлетів Миколи Хвильового в контексті літературної дискусії 1925–1928
  рр.
- Формулювати та обґрунтовувати власну позицію в дебаті "Європа чи Москва", спираючись на аргументи Хвильового та його опонентів.
- Критично оцінювати роль Хвильового як мислителя-деколонізатора, враховуючи складність його політичних поглядів.
- Застосовувати поняття "суб''єктність", "наратив", "деколонізація" для аналізу культурних процесів в Україні, як історичних,
  так і сучасних.
