content_outline:
- points:
  - 'Провокація: «Геть від Москви!» — це політичне гасло чи естетична програма? І чим вони відрізняються?'
  - Цитата без контексту з памфлету Хвильового, що кидає виклик усталеним уявленням про "пролетарську культуру"
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Куди йти українській культурі? Позиція Хвильового ("азіатський ренесанс", орієнтація на психологічну Європу)
    vs позиція опонентів (орієнтація на Москву як центр "пролетарської культури").'
  - 'Дебат 2: Це була літературна дискусія чи політична боротьба? [!epistemic-humility] Як вільний обмін думками перетворився
    на інструмент політичного контролю та подальших репресій.'
  - Аналіз аргументів опонентів Хвильового (Пилипенко, Хвиля) — їхня логіка та мотивація.
  section: 'Конфліктна карта: Європа чи Малоросія?'
  words: 900
- points:
  - 'Розбір ключових уривків з тексту: критика епігонства, провінціалізму та "масовізму".'
  - 'Концепція "азіатського ренесансу": що саме мав на увазі Хвильовий і чому це було так небезпечно для імперського центру?'
  - '[!decolonization] Проект Хвильового як перша послідовна спроба інтелектуальної деколонізації української культури, її
    звільнення від ролі "молодшого брата".'
  - Аналіз того, як Хвильовий визначає "українську суб'єктність" не через етнографію, а через волю до творення власного модерного
    проекту.
  section: 'Читання: Памфлет "Україна чи Малоросія?"'
  words: 1700
- points:
  - 'Аналіз мови памфлетів: неологізми, іронія, сарказм, використання риторичних запитань для залучення та провокації читача.'
  - 'Структура аргументації: як Хвильовий будує свою тезу, які докази наводить, як випереджає та спростовує контраргументи
    опонентів.'
  - Використання метафор як інструменту переконання ("психологічна Європа", "червоний грааль").
  - '[!epistemic-humility] Порівняння риторики Хвильового з риторикою його опонентів: хто був більш переконливим і для якої
    аудиторії?'
  section: 'Риторика та аргументація: Полемічний стиль Хвильового'
  words: 1200
- points:
  - 'Повернення до розминки: чи можна сьогодні відокремити політику від естетики в українському культурному просторі, спираючись
    на досвід Хвильового?'
  - 'Рецепція і спадщина: як ідеї Хвильового були заборонені, спотворені радянською пропагандою, і як вони повернулись в український
    дискурс у 1990-х та 2010-х.'
  - '[!anti-hagiography] Як комуністичні переконання Хвильового ускладнюють його образ "національного пророка"? Чи можна бути
    комуністом і антиколоніальним мислителем одночасно?'
  - 'Сучасне значення: чому дебати 1920-х років виявились пророчими і досі визначають ключові вектори розвитку України?'
  section: Дискусія та підсумок
  words: 700
focus: Полемічні есе Миколи Хвильового, літературна дискусія 1925–1928 рр., дебат "Європа чи Москва?", риторичні стратегії
  деколонізації української культури
level: LIT-ESSAY
