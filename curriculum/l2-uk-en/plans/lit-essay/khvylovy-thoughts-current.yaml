activity_hints:
- description: Визначте, кому з учасників дискусії (Хвильовий чи його опоненти) належить та чи інша теза. Перевірка розуміння
    понять "масовізм", "азіатський ренесанс", "психологічна Європа".
  focus: Ключові поняття літературної дискусії
  items: 6
  type: quiz
- description: Вставити правильний термін (іронія, сарказм, гіпербола, риторичне питання) в аналіз цитат з памфлетів.
  focus: Риторичні прийоми Хвильового
  items: 6
  type: fill-in
- description: Наведено два короткі уривки — один Хвильового, інший його опонента. Проаналізуйте риторичні стратегії обох
    сторін. Чиї аргументи є більш переконливими і чому?
  focus: 'Аналіз аргументів: Хвильовий vs Опоненти'
  type: note
- description: Чому гасло Миколи Хвильового, висунуте 100 років тому, залишається одним із ключових для сучасної України?
    Аргументуйте свою позицію, наводячи приклади з політики, культури та суспільного життя (400-600 слів).
  focus: 'Есе: "Геть від Москви!" сьогодні'
  type: note
cefr_min: C1
