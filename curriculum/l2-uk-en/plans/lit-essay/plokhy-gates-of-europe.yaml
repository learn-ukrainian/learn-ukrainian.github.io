content_outline:
- points:
  - 'Провокація: Чому до 2014 року Захід майже не помічав Україну на мапі? Чи може одна книга змінити світосприйняття цілої
    країни?'
  - 'Цитата-загадка: "Історія — це розповідь про минуле, що має сенс у сьогоденні". Як ця фраза пояснює мету "Брами Європи"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Національна історія vs. глобальна історія. Чи послаблює "глобальний" підхід Плохія унікальність українського
    наративу, чи, навпаки, робить його зрозумілішим для світу?'
  - 'Дебат 2: Наукпоп vs. академічна монографія. Чи неминуче спрощення при популяризації історії? Критики, що звинувачують
    Плохія в "надмірній наративності".'
  - '[!epistemic-humility] Історія не має остаточних відповідей. "Брама Європи" — це одна з можливих інтерпретацій, хоч і
    надзвичайно впливова. Як відрізнити факт від інтерпретації в тексті?'
  section: 'Конфліктна карта: Історія для кого?'
  words: 900
- points:
  - 'Уривок з "Брами Європи": аналіз розділу про Козацьку добу та Переяславську раду.'
  - Як Плохій конструює аргумент про "втрачений суверенітет", а не "возз'єднання"? Аналіз вибору джерел та риторики.
  - '[!decolonization] Плохій руйнує імперський міф про "єдиний народ", показуючи, як саме козацька еліта сформулювала ідею
    політичної нації, відмінної від Московії.'
  - 'Порівняльний аналіз: як той самий період описується в радянському підручнику історії.'
  section: 'Читання: Народження модерної нації'
  words: 1700
- points:
  - 'Структура аргументу: використання довгої історичної перспективи (longue durée) для пояснення сучасних подій.'
  - 'Робота з джерелами: як Плохій поєднує архівні дані, мемуари та праці інших істориків для створення переконливого наративу.'
  - 'Стратегія "відстороненого оповідача": Плохій пише для західної аудиторії, пояснюючи складні українські реалії через зрозумілі
    аналогії, але не втрачаючи наукової точності.'
  - '[!epistemic-humility] Аналіз контраргументів: як Плохій визнає та спростовує альтернативні точки зору (наприклад, російську
    імперську версію історії).'
  section: 'Риторика та аргументація: Як Плохій переконує'
  words: 1200
- points:
  - 'Повернення до розминки: яку роль "Брама Європи" відіграла у формуванні суб''єктності України на міжнародній арені після
    2014 року?'
  - 'Рецепція твору: як книгу сприйняли в Україні, в діаспорі та на Заході? Які основні точки критики?'
  - '[!myth-buster] Книга руйнує міф про Україну як "вічну жертву", натомість показуючи історію постійної боротьби за власну
    державність та ідентичність.'
  - 'Рефлексія: чи змінилось ваше розуміння історії України після знайомства з підходом Плохія? Які питання залишились без
    відповіді?'
  section: Дискусія та підсумок
  words: 800
