content_outline:
- points:
  - 'Провокація: «Історія — це наука не про минуле, а про майбутнє». Як ви розумієте цю тезу історика?'
  - 'Фрагмент есе без авторства: «Минуле неможливо змінити, але можна змінити його наслідки». Як текст може цього досягти?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Національна історія vs глобальна історія. Чи можлива історія України поза світовим контекстом? Аргументи Грицака
    проти «історичної бульбашки».'
  - 'Дебат 2: Історик як «моральний авторитет» vs історик як «незалежний аналітик». Дискусія навколо ролі інтелектуала в суспільстві,
    що воює.'
  - '[!epistemic-humility] Грицак кидає виклик традиційній українській історіографії, яка часто фокусувалася на віктимізації
    та героїзмі.'
  section: 'Конфліктна карта: Історія як поле битви'
  words: 900
- points:
  - 'Ключова теза книги: аналіз центрального аргументу про необхідність «перезавантаження» української історичної свідомості.'
  - 'Наративна структура: як Грицак поєднує великі наративи (модернізація, світові війни, глобалізація) з українською специфікою.'
  - '[!decolonization] Як Грицак виводить історію України з тіні «русского мира» та східноєвропейських імперій, не вдаючись
    до етноцентризму. Україна як суб''єкт, а не об''єкт історії.'
  section: 'Читання: Подолати минуле: глобальна історія України'
  words: 1800
- points:
  - 'Риторичні стратегії Грицака: доступність, використання метафор, парадоксів та провокаційних питань для залучення неакадемічної
    аудиторії.'
  - 'Структура аргументації: як автор використовує дані соціології, економіки та культурології для підсилення історичних тез.
    Інтердисциплінарність як метод.'
  - '[!epistemic-humility] Порівняння стилів: Грицак vs Забужко vs Плохій — три різні способи говорити про українську історію
    та ідентичність.'
  section: 'Риторика та аргументація: Мова як інструмент історика'
  words: 1200
- points:
  - 'Повернення до розминки: то чому історія — це наука про майбутнє? Формулювання відповіді на основі аналізу есеїстики Грицака.'
  - 'Рецепція та критика: хто і за що критикує підхід Грицака? (звинувачення в «космополітизмі», недостатній увазі до «національних
    святинь» тощо).'
  - 'Сучасне значення: яку роль відіграють праці Грицака у формуванні української політичної нації під час повномасштабного
    вторгнення?'
  - '[!anti-hagiography] Чи не є «глобальна історія» новою формою універсалізму, що ризикує стерти унікальний український
    досвід?'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз есеїстики Ярослава Грицака, зокрема книги «Подолати минуле: глобальна історія України». Аргументативна структура,
  риторичні стратегії, деколоніальний підхід до історії.'
level: LIT-ESSAY
module: lit-essay-036
objectives:
- Аналізувати ключові тези та риторичні стратегії в есеїстиці Ярослава Грицака.
- Критично оцінювати роль історика як публічного інтелектуала в сучасній Україні.
- Розрізняти та порівнювати різні підходи до написання української історії (національний, глобальний, постколоніальний).
- Формулювати власну аргументовану позицію в рамках дебатів щодо української історії та ідентичності.
