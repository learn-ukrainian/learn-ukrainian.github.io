content_outline:
- points:
  - 'Провокація: Чи може «поганий» смак (кітч) бути інструментом національного спротиву? Погляд Оксани Гундорової.'
  - Цитата з 'Післячорнобильської бібліотеки' про 'травматичне письмо' без пояснень, що змушує замислитись.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є постколоніальна теорія, розроблена на матеріалі Індії та Африки, адекватною для аналізу України? Позиція
    Гундорової vs. її опонентів.'
  - 'Дебат 2: Статус української літератури — "жертва" імперії чи активний гравець? Аналіз Гундорової, як література і зазнавала
    утисків, і створювала власні потужні наративи.'
  - '[!epistemic-humility] Критики звинувачують постколоніальний підхід у надмірному фокусі на травмі, тоді як прихильники
    бачать у ньому ключ до звільнення від ментальних пут імперії.'
  section: 'Конфліктна карта: Постколоніалізм: Теорія чи реальність?'
  words: 900
- points:
  - Ключова теза з праці Гундорової 'Транзитна культура. Симптоми постколоніальної травми' (уривок).
  - 'Аналіз аргументу: як Гундорова доводить, що кітч (шароварщина) був не просто "поганим смаком", а симптомом культурного
    переходу.'
  - '[!decolonization] Гундорова показує, як імперія нав''язувала "високу" культуру (російську), а українська зводилася до
    екзотичного "народного" кітчу. Авторка перевертає цю ієрархію.'
  - Поняття 'транзитної культури' — аналіз на прикладі української літератури та масової культури 1990-х.
  section: 'Читання: ''Транзитна культура'' та кітч'
  words: 1700
- points:
  - 'Риторична стратегія Гундорової: використання західної теорії (Дерріда, Саїд) для аналізу українського матеріалу. Як це
    посилює її аргумент?'
  - 'Аналіз термінології: ''постколоніальна травма'', ''карнавалізація'', ''транзитна культура''. Як авторка створює нову
    мову для опису українського досвіду?'
  - 'Гундорова як ''археолог культури'': вона ''розкопує'' приховані смисли у відомих текстах, показуючи їхню постколоніальну
    природу.'
  - '[!myth-buster] Гундорова руйнує міф про "єдиний потік" української літератури, показуючи її розриви, травми та внутрішні
    конфлікти.'
  section: 'Риторика та аргументація: Деконструкція імперського наративу'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, кітч — це інструмент спротиву чи ознака культурної деградації? Формулювання відповіді на
    основі аналізу Гундорової.'
  - Рецепція праць Гундорової в Україні та за кордоном. Чому її ідеї викликали такі бурхливі дискусії?
  - '[!anti-hagiography] Чи є ризики в застосуванні постколоніальної оптики? Чи не призводить це до надмірної концентрації
    на минулому та травмі, заважаючи дивитися в майбутнє?'
  - 'Сучасна релевантність: Як праці Гундорової допомагають зрозуміти сучасну війну як колоніальну та боротьбу України за
    остаточну деколонізацію?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз праць Оксани Гундорової, зокрема 'Транзитна культура' та 'Післячорнобильська бібліотека'. Постколоніальна теорія
  в українському літературознавстві. Деконструкція імперських наративів.
level: LIT-ESSAY
module: lit-essay-058
objectives:
- Аналізувати ключові концепції Оксани Гундорової ('транзитна культура', 'постколоніальна травма', 'кітч') на матеріалі її
  праць.
- Застосовувати постколоніальну оптику для критичного аналізу українських літературних та культурних явищ.
- Формулювати власну аргументовану позицію в дебатах щодо застосування постколоніальної теорії до українського контексту.
- Розрізняти риторичні стратегії та методи аргументації в академічному есеїстичному тексті.
