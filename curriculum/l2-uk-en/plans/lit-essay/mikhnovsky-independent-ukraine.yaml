content_outline:
- points:
  - 'Провокація: "Україна для українців!" — це гасло патріота чи ксенофоба? Розбираємо найрадикальніший і найвпливовіший текст
    українського націоналізму початку XX століття.'
  - 'Цитата без контексту: "Ми виголошуємо, що ми візьмемо силою те, що нам належиться по праву, але було відібране від нас
    теж силою".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Самостійна Україна" літературою? Позиція 1: Це суто політичний маніфест, що не має художньої цінності.
    Позиція 2: Це зразок блискучої риторичної прози, що вплинула на мову і стиль XX століття.'
  - 'Дебат 2: Драгоманов vs Міхновський. Федералізм і "культурництво" проти радикального націоналізму й державної незалежності.
    [!epistemic-humility] Це не просто історична суперечка, а два полюси української політичної думки, актуальні донині.'
  - 'Контекст: Поява РУП (Революційної української партії) і замовлення на програмовий текст, що "вперше від часів Шевченка"
    проголосив би самостійність як мету.'
  section: 'Конфліктна карта: Маніфест чи література?'
  words: 900
- points:
  - Повний текст та детальний аналіз "Десяти заповідей" УНП — квінтесенції ідеології Міхновського.
  - 'Аналіз ключової тези: "одна, єдина, неподільна, від Карпат аж до Кавказу самостійна, вільна, демократична Україна" —
    як вона протиставлялася ідеям федералізму та автономії.'
  - '[!decolonization] Радикальний розрив із "малоросійством". Міхновський свідомо рве з будь-якою ідеєю спільної історії
    чи культури з Росією. Це не прохання, а вимога, підкріплена історичним аналізом Переяславської угоди як помилки.'
  - 'Мова тексту: високий стиль, біблійні алюзії, наказовий спосіб — створення нового політичного канону і мови національної
    гідності.'
  section: 'Читання: Десять заповідей Української Народної Партії'
  words: 1700
- points:
  - 'Риторичні прийоми: анафора, епіфора, риторичні питання. Як Міхновський створює емоційне напруження та переконує читача.'
  - 'Структура аргументу: від історичної кривди (Переяславська рада) до політичної мети (незалежність). Логіка побудови тексту,
    що веде до неминучого висновку.'
  - Пафос як основний інструмент. Текст апелює не до розуму, а до почуття національної гідності та гніву. Аналіз емоційної
    складової аргументації.
  - '[!epistemic-humility] Порівняння з іншими маніфестами: чим риторика Міхновського відрізняється від "Маніфесту комуністичної
    партії" Маркса чи "Що робити?" Леніна?'
  section: 'Риторика та аргументація: Мова як зброя'
  words: 1200
- points:
  - 'Повернення до розминки: тож "Україна для українців" — це етнічний шовінізм чи гасло деколонізаційної боротьби? Студент
    формулює власну аргументовану позицію.'
  - 'Рецепція твору: як сприйняли памфлет сучасники? Чому він був "занадто радикальним" для багатьох українських діячів того
    часу?'
  - 'Спадщина: роль ідей Міхновського в ідеології ОУН, УПА та сучасному українському дискурсі. [!myth-buster] Чи справді Міхновський
    є "батьком" українського націоналізму?'
  - '[!anti-hagiography] Критика Міхновського: звинувачення в авторитаризмі, ксенофобії та відмові від демократичних ідеалів.
    Чи можна відокремити ідею незалежності від її суперечливого автора?'
  section: Дискусія та підсумок
  words: 800
focus: The rhetoric of radical nationalism in Mykola Mikhnovsky's pamphlet "Independent Ukraine", its argumentative structure,
  and its place in the debate between federalism and independence within Ukrainian political thought.
level: LIT-ESSAY
module: lit-essay-013
objectives:
- Проаналізувати памфлет "Самостійна Україна" Миколи Міхновського як зразок політичної есеїстики та риторичної прози
- Розрізняти позиції радикального націоналізму (Міхновський) та федералізму (Драгоманов) в українській політичній думці
- Виявляти риторичні стратегії, спрямовані на створення нового національного канону та розрив з імперським наративом
- Формулювати власну аргументовану позицію щодо спадщини Міхновського та актуальності його ідей сьогодні
