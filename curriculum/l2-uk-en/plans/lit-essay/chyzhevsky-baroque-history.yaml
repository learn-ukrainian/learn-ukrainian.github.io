content_outline:
- points:
  - 'Провокація: Чи може історія літератури бути зброєю? Праця Дмитра Чижевського — це об''єктивний науковий опис чи культурний
    маніфест?'
  - 'Цитата-загадка: «Українське бароко — це не відхилення, а повноцінна, органічна частина європейського культурного простору».
    Хто і всупереч кому міг це сказати у XX столітті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Високе» бароко vs «низове». Чижевський фокусується на елітарній, книжній культурі. Наскільки це повна картина?
    Критика з боку фольклористів та соціо-істориків.'
  - 'Дебат 2: Чижевський vs радянська історіографія. Для радянської науки бароко — «реакційний», «занепадницький» стиль. Для
    Чижевського — золотий вік. [!decolonization] Це не просто естетична суперечка, а боротьба за місце України на культурній
    карті Європи.'
  - '[!epistemic-humility] Чижевський, як емігрант, писав для західної академії та діаспори. Як ця позиція вплинула на його
    вибір фактів та аргументів?'
  section: 'Конфліктна карта: Бароко як поле бою'
  words: 900
- points:
  - 'Уривок з книги: аналіз Чижевським поезії Івана Величковського або проповіді Іоаникія Галятовського.'
  - 'Коментар: Як Чижевський використовує порівняльний метод, знаходячи паралелі з німецькими чи італійськими авторами, щоб
    довести «європейськість» українського бароко.'
  - 'Аналіз мови самого Чижевського: точна термінологія, структура доказу, створення великого наративу про тяглість української
    культури.'
  - '[!decolonization] Ключовий прийом Чижевського — повне ігнорування російського літературного контексту для XVII-XVIII
    ст. Він свідомо розриває імперську концепцію «спільної колиски».'
  section: 'Читання: «Історія української літератури»'
  words: 1700
- points:
  - 'Головна теза: українська література є частиною європейської, а бароко — її найяскравіший вияв до XIX ст. Як він її доводить?'
  - 'Риторичні стратегії: авторитет ерудита (демонстрація знання десятків мов і літератур), створення канону (вибір «ключових»
    авторів), періодизація (поділ історії на епохи, що підтверджують його тезу).'
  - 'Контраргумент: аналіз критики, зокрема з боку Г. Грабовича. Чи не є «національний характер» в літературі, який шукає
    Чижевський, лише конструкцією самого історика?'
  - '[!epistemic-humility] Чижевський — представник «історії ідей». Як би його праця виглядала, якби він використовував методи
    соціальної історії чи економічного аналізу?'
  section: 'Риторика та аргументація: Риторика історика'
  words: 1200
- points:
  - 'Повернення до розминки: тож праця Чижевського — це наука чи маніфест? Студент формулює аргументовану відповідь.'
  - 'Рецепція: як працю сприйняли в діаспорі (як одкровення) і в УРСР (де її заборонили). Чому одна й та сама книга викликала
    такі протилежні реакції?'
  - 'Сучасне значення: чому праці Чижевського знову стали актуальними після 1991 і особливо після 2014 року?'
  - '[!anti-hagiography] Попри свою монументальність, праця Чижевського має «сліпі плями». Які аспекти української культури
    того часу він проігнорував і чому?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз наукової праці Дмитра Чижевського «Історія української літератури» як зразка аргументаційної прози. Дебати про
  бароко, риторика історика, деколонізаційний погляд.
