activity_hints:
- description: Визначте, кому належить теза — Чижевському чи радянським критикам. Перевірка розуміння конфліктної карти.
  focus: 'Дебати про бароко: Чижевський vs радянська історіографія'
  items: 6
  type: quiz
- description: 'Вставте в речення терміни з модуля: історіографія, наратив, суб''єктність, бароко, риторика.'
  focus: Ключові терміни історіографії Чижевського
  items: 5
  type: fill-in
- description: Проаналізуйте уривок з праці Чижевського. Яку тезу він доводить? Які докази використовує? Які риторичні прийоми
    застосовує? (300-400 слів).
  focus: Аналіз аргументації Чижевського
  type: note
- description: На основі модуля поясніть, як написання історії літератури може бути інструментом культурного спротиву та деколонізації.
    Наведіть приклади з аргументації Чижевського. (400-600 слів).
  focus: 'Есе: Історія літератури як політичний акт'
  type: note
