content_outline:
- points:
  - 'Провокація: "Геть від Москви! Дайош Європу!" — чому цей лозунг 1920-х років звучить так, ніби написаний у 2020-х? І чому
    його автор був комуністом?'
  - 'Цитата без контексту: "Московські задрипанки… нас не задовольнять". Про що, на вашу думку, міг так гостро писати автор
    у 1926 році?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хвильовий-комуніст vs Хвильовий-націоналіст. Чи був його заклик до Європи зрадою комуністичних ідеалів, чи спробою
    їх врятувати від російського імперіалізму?'
  - '[!epistemic-humility] Позиція 1 (Офіційна радянська): "Націоналістичний ухил", зрада пролетарського інтернаціоналізму.
    Позиція 2 (Сучасна українська): Спроба побудувати "націонал-комунізм", незалежний від Москви.'
  - 'Дебат 2: "Азіатський ренесанс" vs "Просвіта". Хвильовий боровся не лише з Москвою, а й з "просвітянщиною" — епігонським,
    провінційним наслідуванням. Він пропонував Україні очолити "Азіатський ренесанс", стати мостом між Сходом і Заходом.'
  - 'Контекст: Літературна дискусія 1925-1928 рр. — останній спалах вільної думки в радянській Україні, жорстоко придушений
    Сталіним.'
  section: 'Конфліктна карта: Європа чи Москва?'
  words: 900
- points:
  - 'Аналіз ключової тези: Чому, за Хвильовим, українська культура та література повинні орієнтуватися на "психологічну Європу",
    а не на Москву?'
  - 'Близьке читання: Розбір уривків, де Хвильовий викриває "малоросійство" як комплекс культурної та політичної меншовартості.'
  - '[!decolonization] Хвильовий одним з перших сформулював українську культурну деколонізацію як політичний проєкт. Він показав,
    що російська культура — це не "світоч", а інструмент імперського контролю.'
  - 'Стиль: Текст написаний не як академічний трактат, а як гострий, полемічний памфлет. Як це впливає на сприйняття аргументів?'
  section: 'Читання: Памфлет "Україна чи Мала Росія?"'
  words: 1700
- points:
  - 'Аргументаційна структура: Хвильовий не стільки доводить свою тезу, скільки атакує позицію опонентів. Аналіз його тактики
    "від протилежного".'
  - 'Риторичні прийоми: Використання сарказму, іронії, гіперболи ("Московський сморід"). Як емоційна мова підсилює його аргументи?'
  - '[!epistemic-humility] Критики звинувачували Хвильового в елітаризмі та відриві від мас. Чи була його позиція дійсно спрямована
    на вузьке коло інтелектуалів, а не на широку авдиторію?'
  - 'Порівняння: Як стиль памфлетів Хвильового відрізняється від стилістики, наприклад, політичних есе Івана Франка? Хто з
    них більш "академічний", а хто — більш "бойовий"?'
  section: 'Риторика та аргументація: Полемічний стиль Хвильового'
  words: 1200
- points:
  - 'Повернення до розминки: Чи дав Хвильовий відповідь на питання "Україна чи Мала Росія?". Як його власна доля (самогубство
    у 1933 році) відповідає на це питання?'
  - 'Рецепція та спадщина: Заборонений в СРСР, Хвильовий став символом для шістдесятників та української діаспори. Як змінювалося
    сприйняття його ідей?'
  - '[!anti-hagiography] Ми ідеалізуємо Хвильового, але він залишався комуністом. Як нам сьогодні ставитися до його спроби
    поєднати українську незалежність із комуністичною ідеологією?'
  - 'Сучасне значення: Чому дискусія, розпочата Хвильовим 100 років тому, виявилася пророчою і залишається центральною для
    сучасної України?'
  section: Дискусія та підсумок
  words: 800
focus: Analysis of Mykola Khvylovy's key political essay 'Ukraine or Little Russia?', its role in the Literary Discussion
  of 1925-1928, the 'Away from Moscow!' slogan, and the concept of an 'Asian Renaissance'.
level: LIT-ESSAY
module: lit-essay-018
objectives:
- Аналізувати аргументативну структуру та риторичні стратегії політичного памфлету на прикладі есе Хвильового "Україна чи
  Мала Росія?"
- Критично оцінювати ключові дебати Літературної дискусії 1925-1928 рр., розрізняючи позиції різних сторін.
- Застосовувати концепт "культурна деколонізація" для аналізу літературних текстів.
- Формулювати власну аргументовану позицію щодо спадщини Хвильового та актуальності його ідей для сучасної України.
pedagogy: CBI
persona:
  role: Модератор літературної кав'ярні 1920-х. Гострий на язик, не боїться ставити незручні питання, змушує думати, а не
    повторювати завчені істини.
  voice: Provocative-Modernist
phase: LIT Expansion
