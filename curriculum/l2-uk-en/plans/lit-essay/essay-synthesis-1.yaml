objectives:
- Аналізувати памфлети Миколи Хвильового в історичному контексті Літературної дискусії 1925-1928 рр.
- Застосовувати деколоніальну оптику для аналізу аргументів Хвильового проти культурної залежності від Москви.
- Оцінювати риторичні стратегії та стилістичні особливості полемічної прози Хвильового.
- Формулювати аргументовану позицію щодо актуальності ідей Хвильового для сучасної України.
