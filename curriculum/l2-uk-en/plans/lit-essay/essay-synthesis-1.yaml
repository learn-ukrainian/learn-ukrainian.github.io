content_outline:
- points:
  - 'Провокація: "Геть від Москви! Дайош Європу!" — чому цей лозунг 1920-х років звучить так, ніби написаний сьогодні?'
  - 'Загадка: Який український письменник стверджував, що "російська література важить на нас, як пан, що виховував нас на
    свою подобу"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Орієнтація на "психологічну Європу" (Хвильовий) vs орієнтація на "братню" пролетарську літературу Москви (офіційна
    лінія партії).'
  - 'Дебат 2: Хвильовий — "націонал-ухильник", що прагнув розколоти СРСР, чи "націонал-комуніст", що намагався врятувати українську
    культуру в рамках революції?'
  - '[!epistemic-humility] Трактування Літературної дискусії змінювалось: від політичного звинувачення у 30-х, до реабілітації
    у 60-х, і до канонізації як прояву антиколоніальної боротьби сьогодні.'
  section: 'Конфліктна карта: Літературна дискусія 1925-1928'
  words: 900
- points:
  - 'Аналіз ключових уривків: діагноз "малоросійства" як комплексу культурної залежності.'
  - 'Концепція "азіатського ренесансу": ідея про те, що Україна має очолити культурне відродження східних народів, оминаючи
    Москву.'
  - '[!decolonization] Хвильовий першим системно застосував деколонізаційну оптику, аналізуючи українську культуру не як периферію
    російської, а як самостійний суб''єкт, що має обрати свій шлях.'
  - 'Наративна стратегія: як Хвильовий конструює образ "молодої, вітаїстичної" української культури на противагу "старій,
    імперській" російській.'
  section: 'Читання: Памфлети "Україна чи Малоросія?" та "Думки проти течії"'
  words: 1700
- points:
  - 'Аргументативна структура: використання провокативних тез, риторичних запитань та емоційних закликів для мобілізації аудиторії.'
  - 'Лексичні інновації: створення неологізмів ("малоросійство", "москвофільство") для опису колоніальної ситуації.'
  - '[!epistemic-humility] Критики Хвильового звинувачували його в елітаризмі та відриві від "пролетарських мас". Наскільки
    його аргументи були зрозумілі тогочасному читачу?'
  - 'Порівняльний аналіз: як риторика Хвильового відрізняється від стилю його опонентів (наприклад, Сергія Пилипенка)?'
  section: 'Риторика та аргументація: Полемічний стиль Хвильового'
  words: 1200
- points:
  - 'Повернення до розминки: чи є сучасний курс України на євроінтеграцію прямим продовженням ідей Хвильового?'
  - '[!anti-hagiography] Як поєднати образ Хвильового — палкого комуніста і вірного ленінця — з його роллю "хрещеного батька"
    українського культурного сепаратизму?'
  - 'Рецепція: як самогубство Хвильового перетворило його на символ опору, і як його ідеї були "перевідкриті" в епоху шістдесятників
    та в незалежній Україні.'
  - 'Підсумкове есе: "Інтелектуальна броня" — що це означає сьогодні? Які ідеї з арсеналу Хвильового можуть бути корисними
    для захисту культурного суверенітету України в XXI столітті?'
  section: Дискусія та підсумок
  words: 700
focus: The polemical essays of Mykola Khvylovy, the Literary Discussion of 1925-1928, and the formation of a decolonial cultural
  orientation.
level: LIT-ESSAY
