content_outline:
- points:
  - 'Провокація: Чому теза про те, що українська мова походить від "давньоруської", є імперським міфом, а не науковим фактом?
    І як один науковець-емігрант спростував її назавжди?'
  - 'Цитата Шевельова (без авторства): "Історія не знає прикладів, щоб народ, який має свою державу, говорив однією мовою
    з народом, що ту державу хоче знищити".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Теорія "спільної колиски" vs. концепція самостійного походження. Позиція радянської/російської лінгвістики (одна
    мова розпалась на три) проти тези Шевельова (різні діалекти консолідувались у різні мови).'
  - 'Дебат 2: Науковець vs. "ідеологічний диверсант". Як радянська система таврувала Шевельова, і як його праці стали інструментом
    політичної боротьби за українську суб''єктність.'
  - '[!epistemic-humility] Аргументи обох сторін базуються на інтерпретації тих самих історичних джерел. Різниця — у методології
    та політичній рамці.'
  section: 'Конфліктна карта: Битва за мову'
  words: 900
- points:
  - Ключовий уривок з "Історичної фонології...", що аналізує занепад редукованих та його різні наслідки у києво-поліських
    та новгородсько-суздальських говорах.
  - 'Аргумент Шевельова: відсутність "єдиної" давньоруської мови. Він доводить, що вже в XII-XIII ст. фонетичні відмінності
    були настільки значними, що мова йшла про різні діалектні континууми.'
  - '[!decolonization] Шевельов виводить українську мову з-під домінування російського наративу. Він показує, що українська
    — не "молодша сестра", а самостійний суб''єкт історії.'
  - 'Аналіз наративної структури праці: це не просто сухий виклад фактів, а детективне розслідування, що веде читача до єдиного
    можливого висновку.'
  section: 'Читання: Історична фонологія як поле битви'
  words: 1700
- points:
  - 'Теза та докази: як Шевельов вибудовує свою аргументацію — від аналізу найдрібніших звукових змін до глобальних висновків
    про історію народу.'
  - 'Риторичні стратегії: використання нищівної іронії щодо опонентів, точність формулювань, що не залишає простору для двозначності,
    залучення величезного масиву доказів.'
  - '[!epistemic-humility] Аналіз критики на адресу Шевельова: де його аргументи є найбільш вразливими? Чи всі його тези витримали
    перевірку часом?'
  - 'Порівняння стилю Шевельова зі стилем його радянських опонентів: вільна наукова дискусія проти догматичного цитування.'
  section: 'Риторика та аргументація: Науковий стиль як полеміка'
  words: 1200
- points:
  - 'Повернення до розминки: Як тепер ви відповісте на питання про "спільну колиску"? Сформулюйте свою позицію, спираючись
    на аргументи з модуля.'
  - 'Рецепція та спадщина: Чому праці Шевельова були заборонені в СРСР, але стали канонічними в незалежній Україні?'
  - '[!anti-hagiography] Шевельов був складною фігурою з непростим характером. Як його особисті риси вплинули на його науковий
    стиль та рецепцію його праць?'
  - 'Сучасне значення: Чому сьогодні, під час повномасштабної війни, праці Шевельова знову стали надзвичайно актуальними?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз праці Юрія Шевельова "Історична фонологія української мови" як ключового тексту для деколонізації українського
  мовознавства, його риторичних стратегій та полеміки з концепцією "спільної колиски".
level: LIT-ESSAY
module: lit-essay-025
objectives:
- Аналізувати працю Юрія Шевельова як аргументативний текст, визначаючи його тезу, докази та риторичні стратегії.
- Критично порівнювати концепцію самостійного походження української мови Шевельова з радянською теорією "спільної колиски".
- Пояснювати, як лінгвістичний аналіз може бути інструментом деколонізації та утвердження національної суб'єктності.
- Формулювати власну аргументовану позицію щодо дискусійних питань історії української мови.
pedagogy: CBI
