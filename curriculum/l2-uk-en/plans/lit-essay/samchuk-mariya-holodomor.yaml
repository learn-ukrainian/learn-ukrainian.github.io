content_outline:
- points:
  - 'Провокація: Як написати про голод, коли слова зникають разом із тілом? Чи може художній текст бути правдивішим за сухий
    історичний документ?'
  - 'Фрагмент з роману «Марія» без контексту: «...В селі не стало ні одного пса, ні одної кішки, ні одної ворони. Все поїли.
    В селі їли кору з дерев, їли землю, їли один одного...»'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Марія» — це історичне свідчення чи художній твір? Позиція 1 (документальна): це роман-хроніка, головна цінність
    якого — точна фіксація злочину Голодомору, написана по гарячих слідах. Позиція 2 (естетична): це модерністський твір,
    що використовує біблійні архетипи та символізм для осмислення травми, де історична точність другорядна.'
  - 'Дебат 2: Тестимоніальна проза — це унікальний жанр? Чи це піджанр історичного роману, чи форма на межі літератури, права
    та психотерапії, що вимагає інших критеріїв оцінки?'
  - '[!epistemic-humility] Критики досі сперечаються, чи варто оцінювати «Марію» за законами мистецтва, чи за законами свідчення,
    де етика переважає естетику.'
  section: 'Конфліктна карта: Документ чи мистецтво?'
  words: 900
- points:
  - 'Аналіз структури: три «книги» (Книга про народження Марії, Книга днів Марії, Книга про хліб), що символізують три епохи
    життя України — до, під час, і після катастрофи.'
  - 'Марія як архетип України: її життєвий шлях від народження до мученицької смерті як алегорія долі українського селянства.'
  - 'Close-reading уривків: порівняння мови і стилю в описі традиційного життя (весілля, праця на землі) та в описі Голодомору
    — як руйнується не лише життя, а й сама мова.'
  - '[!decolonization] «Марія» як акт опору. В той час, як радянська пропаганда заперечувала голод, Самчук в еміграції створює
    літературний доказ геноциду, який неможливо було знищити в архівах.'
  section: 'Читання: Роман «Марія»'
  words: 1800
- points:
  - 'Аргументація через наратив: Самчук не пише політичний трактат, він будує аргумент про геноцид через долю однієї жінки,
    змушуючи читача пережити трагедію емоційно (пафос).'
  - Епічний, біблійний стиль як риторична стратегія. Піднесення трагедії українського села до рівня вселюдської, позачасової
    історії про добро і зло.
  - 'Автентичність голосу (етос): використання волинського діалекту, фольклорних елементів для створення відчуття документальності
    та глибокого народного коріння тексту.'
  - 'Стратегія «очуднення»: як Самчук знаходить мову для опису невимовного, поєднуючи натуралістичні деталі з високою символікою,
    щоб уникнути простого «репортажу жахів».'
  section: 'Риторика та аргументація: Наратив як свідчення'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи може художній текст бути правдивішим за документ? Відповідь на основі аналізу «Марії».'
  - 'Рецепція та спадщина: заборона в СРСР, роль в діаспорі, повернення в Україну після 1991 року. Чому цей роман досі викликає
    такі сильні емоції?'
  - '[!anti-hagiography] Критичний погляд: чи не ідеалізує Самчук образ Марії, перетворюючи її на безтілесну ікону-страдницю?
    Де проходить межа між створенням символу та спрощенням людської природи?'
  - 'Сучасне значення: як досвід читання «Марії» допомагає зрозуміти сучасну українську «літературу свідчень» про війну? Які
    паралелі та відмінності?'
  section: Дискусія та підсумок
  words: 700
focus: Роман Уласа Самчука «Марія» як перше літературне свідчення про Голодомор; аналіз тестимоніальної прози як жанру; діалектика
  документального та художнього у репрезентації травми.
level: LIT-ESSAY
module: lit-essay-060
objectives:
- Аналізувати роман «Марія» як складний текст на перетині історичного свідчення, модерністської прози та національного епосу.
- Формулювати власну позицію в дебаті «документ vs художність» стосовно літератури про геноцид.
- Розрізняти та аналізувати риторичні та наративні стратегії, які автор використовує для зображення травматичного досвіду.
- Контекстуалізувати твір у межах української літературної історії та сучасної дискусії про пам'ять та свідчення.
pedagogy: CBI
