content_outline:
- points:
  - 'Провокація: "В основі історії великоруського народу лежить державність, початок єдності. В основі української — індивідуальна
    свобода". Цитата з Костомарова без коментарів. Що це — наукове відкриття чи політичний маніфест?'
  - 'Запитання: Чому ця праця, написана в середині XIX століття, досі викликає запеклі суперечки і вважається "екстремістською"
    в Росії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Дві руські народності" — це об''єктивна історична праця чи політичний памфлет? Позиція російської імперської
    історіографії (Соловйов, Карамзін) vs народницька школа Костомарова.'
  - 'Дебат 2: Чи є Костомаров "батьком українського сепаратизму"? Аналіз звинувачень з боку імперського центру та відповідь
    на них з боку українських інтелектуалів (Драгоманов, Грушевський).'
  - '[!epistemic-humility] Праця Костомарова — не абсолютна істина, а спроба сформулювати українську суб''єктність в умовах
    імперського тиску. Сучасна наука розглядає її критично, але визнає її колосальне значення.'
  section: 'Конфліктна карта: Історик vs Публіцист'
  words: 900
- points:
  - 'Центральна антитеза: "федеративний" дух України (громада, віче, козацька республіка) vs "монолітний", "державницький"
    дух Росії (самодержавство, централізація, поглинання індивіда державою).'
  - 'Аналіз доказової бази: як Костомаров використовує фольклор, літописи та юридичні пам''ятки для обґрунтування своєї теорії.'
  - 'Роль православної церкви: різна модель взаємин церкви і держави в Україні та в Московії як один з аргументів Костомарова.'
  - '[!decolonization] Це — акт інтелектуальної деколонізації. Костомаров відмовляється від нав''язаної імперією схеми єдиної
    "русской" історії та стверджує право українців на власну історичну долю і власний цивілізаційний вибір.'
  section: 'Читання: Аналіз ключових тез "Двох руських народностей"'
  words: 1800
- points:
  - 'Структура аргументу: використання бінарних опозицій (свобода/рабство, індивід/колектив, Європа/Азія) для створення чіткої
    та переконливої картини.'
  - 'Риторичні стратегії: поєднання наукової риторики (посилання на джерела) з емоційними, майже поетичними зверненнями до
    "народного духу" (етос, патос, логос).'
  - 'Жанрова специфіка: чому Костомаров обирає форму есе, а не сухої академічної монографії? Аналіз цільової аудиторії та
    комунікативної мети.'
  - '[!epistemic-humility] Порівняння аргументації Костомарова з його опонентами. Чи завжди його докази є переконливими з
    точки зору сучасної історичної науки?'
  section: 'Риторика та аргументація: Полемічний стиль Костомарова'
  words: 1200
- points:
  - 'Повернення до розминки: тож ким був Костомаров — об''єктивним ученим чи ідеологічним борцем? Студент формулює власну
    аргументовану відповідь.'
  - 'Рецепція та спадщина: як ідеї Костомарова вплинули на подальший розвиток української політичної думки та національно-визвольного
    руху.'
  - 'Сучасна актуальність: наскільки тези "Двох руських народностей" пояснюють ментальні та цивілізаційні відмінності, що
    так гостро проявилися під час повномасштабного вторгнення Росії у 2022 році?'
  - '[!anti-hagiography] Критичний погляд: обмеженість народницького підходу, ідеалізація козацтва, певні суперечності в поглядах
    Костомарова.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз есе Миколи Костомарова "Дві руські народності", його центральних тез, риторичних стратегій та місця в деколоніальній
  боротьбі української думки XIX ст.
