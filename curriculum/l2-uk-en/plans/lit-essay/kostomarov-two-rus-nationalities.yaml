vocabulary_hints:
- definition: 1. Історія як наука. 2. Сукупність історичних праць, що належать до певного періоду, напряму або теми.
  pos: ж.
  word: історіографія
- definition: Здатність бути самостійним, активним діячем, носієм свідомості та волі; протилежне до об'єкта, над яким виконують
    дії.
  pos: ж.
  word: суб'єктність
- definition: Спосіб розповіді, викладу подій, що формує певне їх розуміння та інтерпретацію. Історичний наратив — це не просто
    факти, а їх зв'язок у певну історію.
  pos: ч.
  word: наратив
- definition: Гостра публічна суперечка з наукових, політичних чи літературних питань; Костомаров був майстром гострої полеміки.
  pos: ж.
  word: полеміка
- definition: Принцип державного устрою, за якого окремі землі чи штати мають значну автономію в рамках єдиної держави; Костомаров
    вбачав його в історії України.
  pos: ч.
  word: федералізм
- definition: Форма абсолютной монархії, характерна для Московського царства та Російської імперії, де вся влада зосереджена
    в руках царя.
  pos: с.
  word: самодержавство
- definition: Риторична фігура, що полягає в різкому протиставленні понять або образів; ключовий прийом в аргументації Костомарова.
  pos: ж.
  word: антитеза
- definition: Процес позбавлення від колоніальної залежності — не лише політичної, але й культурної та інтелектуальної. Праця
    Костомарова — приклад інтелектуальної деколонізації.
  pos: ж.
  word: деколонізація
