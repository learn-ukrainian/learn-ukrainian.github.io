objectives:
- Аналізувати центральні тези та аргументаційну структуру есе Миколи Костомарова "Дві руські народності"
- Розрізняти позиції в історичній полеміці навколо праці між українською народницькою та російською імперською школами
- Застосовувати поняття "деколонізація", "суб'єктність" та "наратив" до аналізу української історіографії XIX століття
- Оцінювати риторичні стратегії автора та їхній вплив на переконливість тексту
- Формулювати власну аргументовану позицію щодо актуальності ідей Костомарова в сучасному контексті
