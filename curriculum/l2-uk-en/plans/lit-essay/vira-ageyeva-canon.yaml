objectives:
- Аналізувати ключові ідеї та риторичні стратегії Віри Агеєвої на прикладі її есеїстики
- Пояснювати роль Віри Агеєвої у процесах деколонізації та феміністичної ревізії українського літературного канону
- Розрізняти традиційні та ревізіоністські підходи до аналізу літературних творів
- Формулювати власну аргументовану позицію у літературних дебатах, ініційованих у модулі
