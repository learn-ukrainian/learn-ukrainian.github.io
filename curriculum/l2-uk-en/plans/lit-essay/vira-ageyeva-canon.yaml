content_outline:
- points:
  - 'Провокація: "Класика — це те, що кожен хотів би прочитати, але ніхто не читає". Як Вірі Агеєвій вдалося перетворити вивчення
    літератури з нудного обов''язку на інтелектуальний детектив?'
  - 'Цитата без контексту з есе Агеєвої: "Імперії руйнуються не лише на полі бою, але і в головах читачів". Про яку війну
    йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Феміністична ревізія vs традиційне "шкільне" літературознавство. Чи є Леся Українка "просто" геніальною поетесою,
    чи радикальною мислителькою, що випередила свій час? Позиція Агеєвої.'
  - 'Дебат 2: Деколонізація канону — "скинути з корабля сучасності" чи критично переосмислити? Полеміка навколо авторів, пов''язаних
    з імперською культурою.'
  - '[!epistemic-humility] Літературний канон не є об''єктивною реальністю; це поле битви за сенси, де Агеєва — одна з найвпливовіших
    постатей.'
  section: 'Конфліктна карта: Канон — це вирок чи діалог?'
  words: 900
- points:
  - Аналіз ключового есе Агеєвої про українсько-російські культурні відносини. Розбір її методу роботи з текстом.
  - Як Агеєва виявляє і деконструює імперські наративи, сховані в, здавалося б, аполітичних текстах. Приклад її аналізу творів
    Пушкіна чи Достоєвського в українському контексті.
  - '[!decolonization] Аргумент Агеєвої: українська література не є "молодшою сестрою" російської, а самодостатньою традицією
    з власними законами розвитку.'
  - Close-reading уривку, де Агеєва аналізує конкретний твір, щоб показати її техніку "повільного читання".
  section: 'Читання: Есей з "За лаштунками імперії"'
  words: 1700
- points:
  - 'Аналіз риторичних прийомів: іронія, провокативні запитання, апеляція до здорового глузду та етики читача.'
  - 'Структура її аргументації: як вона будує свої есе, щоб переконати, а не просто поінформувати. Використання біографічних
    деталей, історичного контексту та текстуального аналізу.'
  - '[!epistemic-humility] Порівняння її стилю з іншими українськими інтелектуалами (напр., Оксана Забужко, Тамара Гундорова)
    — різні способи ведення публічної дискусії.'
  - Поняття "інтелектуальної провокації" як основного інструменту Агеєвої.
  section: 'Риторика та аргументація: Полемічний стиль Віри Агеєвої'
  words: 1200
- points:
  - 'Повернення до розминки: тож як Агеєва робить класику "небезпечною"? Студент формулює власну відповідь.'
  - 'Рецепція творчості Агеєвої: хто її критики і за що її критикують? Розбір основних контраргументів.'
  - '[!anti-hagiography] Чи є ризик, що сама Агеєва створює новий, "правильний" канон замість старого? Дискусія про роль та
    відповідальність публічного інтелектуала.'
  - 'Сучасне значення: яку роль відіграє літературна критика у час повномасштабної війни та інформаційних війн?'
  section: Дискусія та підсумок
  words: 700
focus: Віра Агеєва як ключова постать у деколонізації та феміністичній ревізії українського літературного канону. Аналіз її
  риторичних стратегій та впливу на сучасний інтелектуальний дискурс.
