content_outline:
- points:
  - 'Провокація: Чому творець українського правопису та автор першого історичного роману в кінці життя назвав козацтво «п''яною
    голотою» і зневірився в ідеї незалежності?'
  - 'Цитата без контексту: «Краще бути ворогом вітчизни, ніж рабом її тупого, безглуздого патріотизму» — як це міг написати
    один з «батьків нації»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Хуторянська філософія» — це ідеал просвітництва чи апологія ізоляціонізму? Позиція Куліша (культурна праця
    на хуторі) vs позиція Драгоманова (європеїзація, політична боротьба).'
  - 'Дебат 2: Куліш — творець чи руйнівник канону? Його нападки на Шевченка як «п''яного генія» і спроба створити «високу»
    культуру на противагу «мужицькій» — хто мав рацію?'
  - '[!epistemic-humility] Немає «остаточного» Куліша. Існує щонайменше три Куліші: романтик-народолюбець, консерватор-державник,
    і розчарований патріарх. Критики досі сперечаються, який з них «справжній».'
  section: 'Конфліктна карта: Хутір vs Імперія'
  words: 900
- points:
  - 'Аналіз ключового уривка: Куліш викладає свою програму культурного просвітництва — «праця, праця і ще раз праця».'
  - 'Аргумент твору: Україна врятується не політикою, а освітою, наукою та збереженням культурної спадщини. Хутір як мікрокосм
    ідеальної України.'
  - 'Стиль: поєднання публіцистики, філософського есе, автобіографії та етнографічного нарису. Як цей гібридний жанр працює
    на головну ідею?'
  - '[!decolonization] Куліш одним з перших намагався визначити українську ідентичність НЕ через протиставлення «москалям»
    чи «ляхам», а через позитивну програму культурного розвитку. Він шукав українську суб''єктність поза імперським контекстом.'
  section: 'Читання: Листи з хутора'
  words: 1800
- points:
  - 'Теза як провокація: Куліш часто починає есе з шокуючої заяви, щоб одразу захопити увагу і викликати на суперечку.'
  - 'Риторичні стратегії: використання історичних аналогій (часто маніпулятивних), звернення до авторитету (Біблія, європейські
    мислителі), сарказм та їдка іронія щодо опонентів.'
  - 'Логічна структура: як Куліш будує аргументацію? Від загального (філософський принцип) до конкретного (приклад з історії
    чи сучасного життя). Аналіз логічних хиб та сильних сторін.'
  - '[!epistemic-humility] Порівняння з Костомаровим: якщо Костомаров — історик-романтик, що переконує через емоції, то Куліш
    — полеміст-раціоналіст, що прагне довести свою правоту будь-якою ціною.'
  section: 'Риторика та аргументація: Полемічний стиль Куліша'
  words: 1200
- points:
  - 'Повернення до розминки: тож чому Куліш став таким суперечливим? Студент формулює власну гіпотезу, спираючись на матеріал
    модуля.'
  - 'Історія рецепції: як Куліша сприймали в різні епохи — від повного заперечення до безкритичної ідеалізації. Чому він завжди
    «незручний»?'
  - '[!anti-hagiography] Куліш як приклад трагедії українського інтелектуала XIX ст.: відсутність держави та інституцій змушує
    його бути «всім одразу» — письменником, істориком, мовознавцем, видавцем, — і в результаті він «згорає» у власних суперечностях.'
  - 'Сучасна актуальність: суперечки про «правильний» патріотизм, про роль культури під час війни, про ставлення до власної
    історії — чи не є це продовженням полеміки, яку почав Куліш?'
  section: Дискусія та підсумок
  words: 700
focus: 'Есеїстика Пантелеймона Куліша: хуторянська філософія, полемічний стиль, суперечлива роль у формуванні національної
  ідентичності та історіографії.'
