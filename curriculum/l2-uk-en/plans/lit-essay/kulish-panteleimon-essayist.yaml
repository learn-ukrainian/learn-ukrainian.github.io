activity_hints:
- description: 'Перевірка дебатів навколо Куліша. Кому належить теза: Кулішу, Драгоманову, Костомарову? Визначити позицію
    за цитатою.'
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Поняття з модуля: хуторянство, суб''єктність, полеміка, публіцистика — у контексті речень, що пояснюють його
    ідеї.'
  focus: Ключова термінологія Куліша
  items: 6
  type: fill-in
- description: Проаналізуйте короткий уривок з есе Куліша. Які риторичні прийоми він використовує для переконання? Наведіть
    приклади етосу, патосу, логосу. Чи є його аргументація логічною?
  focus: 'Аналіз риторики: уривок з есе Куліша'
  type: note
- description: Пантелеймон Куліш — приклад «незручного» інтелектуала, що кидав виклик національним міфам. Чи потрібні такі
    постаті сучасній Україні, що перебуває у стані війни? Аргументуйте свою позицію (400-600 слів).
  focus: 'Есе: Чи потрібні Україні «незручні» мислителі?'
  type: note
