content_outline:
- points:
  - 'Провокація: Як людина може пережити 42 роки в ув''язненні, пройшовши польські, нацистські та радянські табори, і не лише
    вижити, а й написати про це свідчення? Чи є мемуари Шумука звинуваченням, уроком історії чи актом прощення?'
  - 'Цитата з мемуарів без контексту: "Сорок два роки і два місяці по тюрмах, таборах, засланнях — це мій головний запис у
    трудовому списку..."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мемуари — це література чи історія? Позиція 1: Це незамінне історичне джерело, що фіксує факти, імена, дати
    з точністю документа (документальний стиль Шумука). Позиція 2: Це суб''єктивна розповідь, літературний наратив, де пам''ять
    автора конструює минуле (порівняння з Солженіциним).'
  - 'Дебат 2: Образ УПА в мемуарах — свідчення чи апологія? Позиція 1: Шумук показує УПА зсередини, без ідеалізації, як очевидець.
    Позиція 2: Його розповідь, навіть будучи правдивою, є частиною більшого національного наративу і не може бути повністю
    об''єктивною.'
  - '[!epistemic-humility] Як відрізнити факт від інтерпретації у тексті, де автор єдиний свідок?'
  section: 'Конфліктна карта: Свідок проти Історика'
  words: 900
- points:
  - 'Фрагмент тексту з мемуарів, що описує переломний момент: ідеологічну трансформацію автора від переконаного комуніста
    до українського патріота в умовах табору.'
  - 'Аналіз наративу: Як Шумук пояснює зміну своїх поглядів? Які події та зустрічі стають каталізаторами?'
  - 'Взаємодія з вояками УПА в таборах: як описується це братерство, які конфлікти та дискусії виникають?'
  - '[!decolonization] Порівняння перспективи Шумука на Ґулаг з "Архіпелагом ГУЛАГ" Солженіцина. Що унікального в українському
    погляді на радянську репресивну систему?'
  section: 'Читання: "За східним обрієм" — Трансформація в Ґулазі'
  words: 1700
- points:
  - 'Аналіз стилю: Шумук використовує "риторику свідчення". Його головний інструмент — не метафори чи епітети, а точний, сухий
    факт. Мова солдата, а не інтелектуала.'
  - 'Документальна точність як риторична стратегія: переліки імен, дат, місць створюють ефект незаперечної автентичності.'
  - 'Ethos страждання: авторське право говорити засноване не на освіті, а на 42 роках ув''язнення. Як текст використовує біографію
    автора для підсилення свого впливу?'
  - '[!myth-buster] Шумук не створює міф про "ідеального в''язня" чи "безгрішного повстанця". Він показує людей з їхніми слабкостями
    та суперечностями, і саме це робить його свідчення переконливим.'
  section: 'Риторика та аргументація: Сила факту'
  words: 1200
- points:
  - 'Повернення до розминки: Як мемуари Шумука відповідають на питання про виживання та збереження людської гідності?'
  - 'Рецепція твору: як мемуари були сприйняті в українській діаспорі та в незалежній Україні? Чи змінилося їхнє значення
    з часом?'
  - 'Спадщина: Шумук як моральний авторитет і його мемуари як історичне джерело для вивчення трьох окупаційних режимів.'
  - '[!anti-hagiography] Критичний погляд на постать Шумука: чи є в його мемуарах "сліпі плями"? Які аспекти боротьби він,
    можливо, замовчує або ідеалізує, попри документальний стиль?'
  section: Дискусія та підсумок
  words: 800
focus: Danylo Shumuk's memoirs as testimonial prose, the rhetoric of witnessing, Gulag literature from a Ukrainian perspective,
  and the complex portrayal of UPA.
level: LIT-ESSAY
module: lit-essay-063
objectives:
- Аналізувати мемуари Данила Шумука як унікальний літературний та історичний документ, що свідчить про три окупаційні режими
- Досліджувати ідеологічну трансформацію автора від комуніста до українського патріота через аналіз тексту
- Розрізняти риторичні стратегії мемуарної прози, зокрема "риторику свідчення" та її відмінність від художньої вигадки
- Формулювати власну позицію в дебатах щодо ролі мемуарів як історичного джерела та літературного твору
pedagogy: CBI
