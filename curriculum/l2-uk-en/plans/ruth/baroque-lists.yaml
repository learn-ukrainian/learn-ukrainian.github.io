content_outline:
- points:
  - 'Провокація: Фрагмент барокового списку з 10-15 слів (суміш церковнослов''янізмів, полонізмів, наукових термінів, побутових
    слів). Запитання: це поезія, божевілля чи інвентарний опис?'
  - Що спільного між планетами, святими, мінералами та частинами тіла в одному реченні? Вступ до барокової техніки «нагромадження».
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Нагромадження» — це ознака багатства й гнучкості «простої мови» чи хаотичне, нерегульоване змішування, що свідчить
    про її незрілість як літературної?'
  - 'Дебат 2: Яка функція списків? Це чиста риторична прикраса, «словесна різьба» в дусі епохи, чи спроба каталогізувати світ,
    створити «текстуальну кунсткамеру»?'
  - '[!decolonization] Бароковий синкретизм — не доказ «нечистоти» мови, а свідчення її включеності в загальноєвропейський
    культурний простір, де змішування латини, національних мов та класичних алюзій було нормою.'
  - '[!epistemic-humility] Важко точно сказати, наскільки ці тексти відображали реальну мовну практику, а наскільки були суто
    книжною, елітарною грою.'
  section: 'Конфліктна карта: Орнамент чи енциклопедія?'
  words: 700
- points:
  - 'Первинне джерело: Аналіз уривку з твору Іоаникія Галятовського або Лазаря Барановича, де застосовано прийом «нагромадження».'
  - Оригінальний текст (нормалізована орфографія) поруч із сучасним українським перекладом-адаптацією.
  - 'Глоси: розбір архаїзмів, запозичень та незрозумілих форм прямо в тексті.'
  - 'Граматичний коментар: аналіз синтаксичної структури, що дозволяє поєднувати настільки різнорідні елементи в одному довгому
    реченні.'
  - '[!decolonization] Існування таких складних риторичних конструкцій спростовує імперський наратив про «простонародність»
    української мови до XIX століття.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз адміністративної, військової та побутової лексики, запозиченої з польської.'
  - 'Латинізми: виявлення наукової, філософської та риторичної термінології латинського походження.'
  - 'Церковнослов''янізми: ідентифікація «високої» лексики, що надавала тексту книжного, авторитетного звучання.'
  - 'Аналіз: як ці три шари лексики взаємодіють в одному списку? Чи є між ними напруга чи вони гармонійно співіснують?'
  - '[!myth-buster] Доводить, що мовний пуризм — це концепція XIX століття. Для автора XVII століття жонглювання різними мовними
    шарами було ознакою освіченості, а не проблемою.'
  section: 'Мовний контакт: Анатомія барокового списку'
  words: 1200
- points:
  - 'Стилістична лабораторія: студенти отримують довгий бароковий список і завдання класифікувати кожне слово за походженням
    (полонізм, латинізм, церковнослов''янізм, питоме слово).'
  - 'Порівняльна лабораторія: порівняння барокового списку з аналогічним за функцією списком у сучасному науковому тексті.
    Що змінилося в принципах класифікації та переліку?'
  - 'Етимологічний трек: простежити шлях одного слова зі списку від руської доби до його сучасного українського відповідника
    (або його зникнення).'
  section: 'Мовна лабораторія: Деконструкція «нагромадження»'
  words: 1000
- points:
  - 'Повернення до розминки: тож, бароковий список — це поезія, божевілля чи інвентарний опис? Студент формулює аргументовану
    відповідь.'
  - 'Лінгвістичний підсумок: що техніка «нагромадження» говорить про стан української мови XVII століття? Про її лексичні
    можливості та синтаксичну гнучкість.'
  - 'Зв''язок із сучасністю: чи існують сучасні аналоги «нагромадження» в літературі, рекламі чи інтернет-культурі (напр.,
    теги, меми)?'
  section: Дискусія та підсумок
  words: 600
focus: The Baroque "heaping" (нагромадження) technique as a rhetorical device and cultural phenomenon; analysis of Polonisms,
  Latinisms, and Church Slavonicisms within these lists; debate on ornament vs. encyclopedia.
