activity_hints:
- description: Тест на розрізнення позицій у дебатах. Чия це теза — що списки є ознакою багатства мови чи її хаотичності?
  focus: 'Розуміння соціолінгвістичних дебатів: Орнамент vs Енциклопедія'
  items: 5
  type: quiz
- description: Проаналізуйте поданий список. Виділіть полонізми, латинізми та церковнослов'янізми та поясніть їхню функцію
    в тексті.
  focus: Порівняльний аналіз лексичних шарів
  type: note
- description: Напишіть есе (400-600 слів), як аналіз барокових «нагромаджень» спростовує тезу про «відсутність» розвиненої
    української літературної мови до Котляревського.
  focus: 'Есе: Барокові списки як доказ розвитку мови'
  type: note
- description: Заповніть пропуски в реченнях, використовуючи відповідні полонізми, латинізми чи церковнослов'янізми з тексту
    модуля.
  focus: Ідентифікація запозичень
  items: 5
  type: fill-in
