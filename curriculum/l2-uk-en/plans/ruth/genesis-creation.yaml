content_outline:
- points:
  - 'Провокація: «На початку сотворив Бог небо та землю». Порівняйте цей рядок із Пересопницького Євангелія з сучасним перекладом.
    Які слова змінилися, а які залишились? Що це говорить про стабільність мови?'
  - 'Термін для роздумів: "безодня". Що означало це слово у XVI ст. і чи збігається це з нашим сьогоднішнім розумінням?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є руський переклад Біблії "простою мовою", церковнослов''янською з помилками, чи самостійною літературною
    мовою? Позиції мовознавців.'
  - 'Дебат 2: Навіщо перекладати Святе Письмо у XVI ст.? Це вплив Реформації, спроба конкурувати з католицизмом чи внутрішня
    потреба православної спільноти?'
  - '[!decolonization] Переклад Біблії народною мовою — це потужний акт утвердження її гідності та спростування тези про українську
    як "селянський діалект".'
  - '[!epistemic-humility] Межі між "церковнослов''янською", "руською" та "польською" в текстах того часу були розмитими й
    часто залежали від мети та автора.'
  section: 'Конфліктна карта: Мова Бога чи мова народу?'
  words: 700
- points:
  - 'Первинний текст: Фрагмент Книги Буття (1:1-8) з руського джерела (напр. Пересопницьке Євангеліє).'
  - 'Глоси та коментарі: Аналіз слів "твердь", "світлость", "дух Божий ношашеся над водами".'
  - 'Граматичні нотатки: Форми аориста ("рече"), двоїни, синтаксис речення — що відрізняє цей текст від сучасної української?'
  - 'Паралельний переклад: Де оригінальний текст занадто складний, надається сучасний український відповідник для порівняння
    стратегій перекладу.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: Ядро теологічної лексики ("сотворити", "благословити", "дух"). Чому ці слова залишаються незмінними?'
  - 'Полонізми та латинізми: Чи є в тексті про створення світу місце для запозичень з мов адміністрації та науки? Аналіз їх
    відсутності або прихованої присутності.'
  - 'Рутенізми (народні елементи): Слова на позначення природних явищ, побутових реалій. Як мова народу описує божественний
    акт?'
  - '[!myth-buster] Цей текст — не хаотична суміш мов, а свідома побудова стилістичної ієрархії, де кожен шар виконує свою
    функцію — від сакральної до пояснювальної.'
  section: 'Мовний контакт: Лексичні шари світотворення'
  words: 1200
- points:
  - 'Порівняльна лабораторія: Перший вірш Буття церковнослов''янською, руською (XVI ст.) та сучасною українською мовами. Простежте
    еволюцію кожного слова та граматичної конструкції.'
  - 'Етимологічна розвідка: Походження слова "світ". Як воно пов''язане зі "світлом" і як змінювалося його значення від руської
    доби?'
  - 'Стилістичний аналіз: Визначте в уривку слова, що належать до високого (книжного) та низького (розмовного) стилів. Якого
    ефекту досягає їх поєднання?'
  section: 'Мовна лабораторія: Граматика створення'
  words: 1000
- points:
  - 'Повернення до розминки: Як цей текст доводить, що українська мова існувала до Котляревського? Студент формулює аргументовану
    відповідь.'
  - 'Лінгвістичний висновок: Руський переклад Буття демонструє мову, здатну передавати найскладніші філософські та теологічні
    концепції, використовуючи багату систему регістрів.'
  - 'Зв''язок у майбутнє: Як цей високий релігійний стиль вплинув на розвиток української літературної мови, зокрема на творчість
    Г. Сковороди?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз мови та космології в руських перекладах Книги Буття, зокрема стилістичних шарів (церковнослов'янський, народний)
  та їх взаємодії.
