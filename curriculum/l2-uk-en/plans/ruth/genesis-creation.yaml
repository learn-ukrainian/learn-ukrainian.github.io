objectives:
- Аналізувати лінгвістичні шари (церковнослов'янський, руський) у біблійному тексті XVI століття.
- Розрізняти та пояснювати функцію церковнослов'янізмів, полонізмів та народної лексики в руському тексті.
- Використовувати лінгвістичний аналіз тексту для аргументації в соціолінгвістичних дебатах про історію української мови.
- Простежувати еволюцію ключових богословських та космологічних термінів від руської доби до сучасності.
