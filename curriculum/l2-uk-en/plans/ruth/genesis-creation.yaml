activity_hints:
- description: На основі цитат визначте, яка позиція належить якому лінгвістичному табору щодо статусу руської мови.
  focus: Розуміння соціолінгвістичних дебатів
  items: 4
  type: quiz
- description: Порівняйте фрагмент тексту церковнослов'янською, руською та сучасною українською мовами. Заповніть таблицю,
    вказавши відмінності в лексиці, граматиці та синтаксисі.
  focus: Порівняльний аналіз перекладів
  type: note
- description: 'Напишіть коротке есе (300-400 слів) на тему: "Як аналіз руського перекладу Книги Буття спростовує імперський
    міф про відсутність української мови до XIX століття?".'
  focus: 'Есе: Доказ існування'
  type: note
