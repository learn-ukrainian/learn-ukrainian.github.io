objectives:
- Аналізувати соціолінгвістичний контекст виникнення друкарства на українських землях у XVI столітті
- Читати та інтерпретувати оригінальні тексти руської доби, зокрема післямову до «Букваря» 1574 року
- Розрізняти церковнослов'янські, польські та власне руські елементи в тексті, пояснюючи їхню функцію
- Аргументовано доводити значення діяльності Івана Федоровича та львівського «Букваря» для утвердження культурного суверенітету
