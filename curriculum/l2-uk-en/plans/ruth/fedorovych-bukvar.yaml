content_outline:
- points:
  - 'Провокація: Фрагмент із післямови «Букваря» (1574): "…друкованя книг пред тим убогих ради деля не бѣ". Сучасний переклад:
    "…друкування книг до того для простих людей не було". Що, окрім орфографії, змінилося в мові, і що залишилось незмінним?'
  - 'Загадка: Чому «першодрукар» покинув Москву, де друкарство підтримував цар, і поїхав до Львова, щоб друкувати книги "убогих
    ради"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою написаний «Буквар»? Це церковнослов''янська мова, «проста мова» (руська), чи свідомий гібрид? Як
    сам Федорович визначав мову свого тексту, і що це означало в XVI столітті?'
  - 'Дебат 2: Чому Федорович покинув Москву? Офіційна радянська версія — «гоніння з боку реакційного духовенства». Деколоніальна
    перспектива — економічна конкуренція з переписувачами та фундаментальна різниця між культурним середовищем Московії та
    мультикультурного Львова у складі Речі Посполитої.'
  - '[!decolonization] Існування львівського «Букваря» спростовує російський міф про те, що Іван Федоров (Федорович) був виключно
    «російським» першодрукарем. Його праця у Львові та Острозі — це невід''ємна частина історії української культури.'
  - '[!epistemic-humility] Межі між «церковнослов''янською», «простою мовою» та локальними діалектами були розмитими. Текст
    Федоровича — це радше спектр, аніж одна чітка мовна система.'
  section: 'Конфліктна карта: Мова друку: руська чи церковнослов''янська?'
  words: 700
- points:
  - 'Першоджерело: читання та аналіз знаменитої післямови («колофона») до «Букваря» — особистого звернення друкаря до читача.'
  - 'Оригінальний текст (нормалізована орфографія) з паралельним глосарієм: "не хитрого ради умислу", "братолюбивих", "старання".'
  - 'Граматичні ноти: аналіз форм минулого часу (аорист, перфект), які відрізняються від сучасних дієслівних форм.'
  - Сучасний український паралельний переклад ключових, найскладніших фрагментів для виявлення синтаксичних та лексичних розбіжностей.
  - '[!decolonization] У післямові Федорович свідомо ідентифікує себе з "богоспасаємим градом, нарицаємим Лвов" і його "народом
    посполитим руским", чітко вписуючи свою працю в український контекст.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналіз молитовної частини «Букваря». Це "високий стиль", мова літургії та освіти, яка слугувала
    престижним стандартом.'
  - 'Полонізми та латинізми: юридична, адміністративна та побутова лексика, що проникала в руську мову через політичне та
    культурне життя в Речі Посполитій. Пошук можливих запозичень у тексті післямови.'
  - 'Грецька спадщина: вплив грецької мови на абетку (назви літер), граматичну термінологію та богословські поняття.'
  - '[!myth-buster] «Буквар» — це не хаотична суміш, а впорядкована система регістрів. Федорович демонструє, як одна мова
    може використовувати різні ресурси (слов''янські, грецькі, польські) для різних комунікативних завдань — від молитви до
    особистої розповіді.'
  section: 'Мовний контакт: Слов''янський, грецький та польський світи'
  words: 1200
- points:
  - 'Палеографічна лабораторія: порівняльний аналіз кириличного шрифту Федоровича із сучасним українським алфавітом. Які літери
    зникли (юси, омега), а які змінили свою форму (земля, добро)?'
  - 'Технологія друку: аналіз верстки сторінки «Букваря». Як організовано простір? Використання кіноварі (червоної фарби),
    орнаментів, заставок. Поняття про набір, верстат, колофон.'
  - 'Стилістична лабораторія: порівняння "високого" стилю молитов і "середнього" стилю післямови. Які лексичні та синтаксичні
    засоби створюють цю різницю?'
  - 'Етимологічний слід: простежити шлях слів, пов''язаних із друкарством (буквар, шрифт, друкарня), які увійшли в українську
    мову саме в цю епоху.'
  section: 'Мовна лабораторія: Верстка та шрифт першодруку'
  words: 1000
- points:
  - 'Повернення до розминки: як тепер ми можемо відповісти на питання про мову та мотивацію Федоровича, маючи повний контекст?'
  - 'Лінгвістичний висновок: «Буквар» 1574 року — це доказ існування кодифікованої, багаторегістрової української писемної
    мови задовго до Котляревського. Це мова, здатна обслуговувати найсучаснішу технологію свого часу — друкарство.'
  - 'Зв''язок уперед: як львівська ініціатива Федоровича призвела до створення Острозької Біблії та розквіту братських шкіл,
    заклавши основи сучасної української літературної мови.'
  section: Дискусія та підсумок
  words: 600
focus: The first printed textbook in Ukrainian lands (Lviv, 1574) as a monument of language, technology, and cultural sovereignty.
