content_outline:
- points:
  - 'Провокація: Перед вами пара синонімів з рукопису XVII ст.: «благодать» / «ласка». Яке слово «вище»? Яке «живіше»? Яке
    з них дожило до нашої доби і в якому значенні?'
  - 'Загадка: Чому книжнику XVII століття взагалі знадобилося укладати словник синонімів? Хіба люди не знали, що значать слова?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це доказ диглосії (стабільного співіснування «високої» церковнослов’янської та «низької» простої мови) чи хаотичного
    білінгвізму (невпорядкованого змішування двох мов)?'
  - 'Дебат 2: «Синоніма» — це ознака сили чи слабкості руської мови? Це спроба «підтягнути» просту мову до високих стандартів
    чи, навпаки, зафіксувати її унікальність і відмінність від церковнослов’янської?'
  - '[!decolonization] Існування цього словника — прямий доказ спростування імперського міфу про те, що українська мова до
    XIX ст. була лише «сільським діалектом». Освічені люди її активно кодифікували.'
  - '[!epistemic-humility] Межі між церковнослов’янською та «простою мовою» були нечіткими. «Синоніма» — це спроба накреслити
    ці межі, але сам факт її існування показує, наскільки вони були розмитими.'
  section: 'Конфліктна карта: Словник самосвідомості чи суржик?'
  words: 700
- points:
  - 'Читання фрагментів «Синоніми»: аналіз структури парних записів (слов’янське слово → руське тлумачення).'
  - 'Глибоке занурення: розбір 5-7 ключових пар. Які семантичні відтінки, стилістичні регістри вони розкривають? (напр. «брак»/«весілє»,
    «воскресеніє»/«завмертвихвстанє»)'
  - 'Граматичні нотатки: як «Синоніма» фіксує морфологічні відмінності, що вже існували між двома мовними стихіями.'
  - '[!decolonization] «Синоніма» показує, що руські книжники не були пасивними споживачами церковнослов’янщини. Вони активно
    «перекладали», адаптували та обирали, створюючи власний літературний стандарт.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз джерел лексики: які сфери життя обслуговує церковнослов’янська лексика в словнику (абстрактні поняття, релігія,
    філософія)? А які — руська (побут, право, емоції)?'
  - 'Полонізми та латинізми: як «Синоніма» відображає вплив польської та латинської мов на тодішню «просту мову», іноді пропонуючи
    їх як еквіваленти церковнослов’янізмам.'
  - 'Семантичні зсуви: як руські відповідники змінюють, звужують або розширюють значення церковнослов’янських слів. Процес
    «приземлення» високої лексики.'
  - '[!myth-buster] Словник демонструє, що мовний пуризм — модерна ідея. Для книжника XVII ст. змішування та запозичення були
    нормою, а не «засміченням» мови. Головне — донести сенс.'
  section: 'Мовний контакт: Церковнослов’янізми vs. «Проста мова»'
  words: 1200
- points:
  - 'Етимологічний трек: простежити долю 10 слів з «руської» частини «Синоніми». Які з них збереглися в сучасній українській
    мові? Які зникли? Які змінили значення?'
  - 'Порівняльна лабораторія: взяти 5 понять (напр. «любов», «закон», «смерть») і порівняти, як вони виражені в «Синонімі»
    (церковнослов’янський/руський варіанти) та в сучасній українській літературній мові.'
  - 'Стилістичний аналіз: на основі словника написати короткий текст (3-4 речення) у «високому» церковнослов’янському стилі,
    а потім «перекласти» його «простою мовою», використовуючи руські відповідники.'
  section: 'Мовна лабораторія: Лексико-семантичний аналіз'
  words: 1000
- points:
  - 'Повернення до розминки: «благодать» / «ласка». Що тепер ми можемо сказати про ці слова та мовну свідомість людини, що
    їх записала?'
  - 'Лінгвістичний висновок: що «Синоніма славеноросская» говорить нам про стан української мови у XVII столітті? Це мова
    в процесі становлення, занепаду чи активної самоідентифікації?'
  - 'Зв’язок уперед: як робота, розпочата в «Синонімі», була продовжена в граматиках, лексиконах та зрештою призвела до кодифікації
    нової української літературної мови Іваном Котляревським?'
  section: Дискусія та підсумок
  words: 600
focus: The first Ukrainian synonym dictionary ("Synonyma slavenorosskaya") as a map of the competition between Church Slavonic
  and vernacular Ruthenian language in the 17th century
level: RUTH
module: ruth-104
objectives:
- Аналізувати «Синоніму» як ключове джерело для розуміння мовної ситуації та диглосії в Україні XVII ст.
- Розрізняти церковнослов'янський та руський («простомовний») лексичні шари в історичних текстах.
- Використовувати дані історичних словників для аргументації в дискусії про тяглість української літературної мови.
- Простежувати семантичну та етимологічну еволюцію слів від руської доби до сучасної української мови.
