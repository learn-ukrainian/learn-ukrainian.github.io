focus: "Synonym dictionary mapping Church Slavonic to vernacular — documenting the living relationship between two registers"
content_outline:
- section: Вступ
  description: "The genre of synonyma in Ukrainian literary tradition. Context: bilingual consciousness — educated Ukrainians navigating between CS and vernacular daily."
- section: Основний матеріал
  description: "Structure of the Synonyma: paired entries. Analysis of synonym relationships — not always simple equivalence. Semantic nuance, register marking, dialectal variation. Sample entries showing Ukrainian lexical richness."
- section: Практика
  description: "Working with synonym pairs. Identifying which Ukrainian words survived to modern language. Tracing semantic shifts from CS to modern meaning."
- section: Підсумок
  description: "The Synonyma as evidence of active diglossia management. Ukrainian speakers were not passive recipients of CS — they actively mapped, translated, and chose."
