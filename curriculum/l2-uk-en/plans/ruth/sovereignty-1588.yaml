content_outline:
- points:
  - 'Провокація: «Але которий бы колвек чловек, якого колвек народу в том панстве нашом, за грошы, а любо за ласку нашую,
    уряд и достоенство светское альбо духовное просил... таковый вжо кождому обецане не мает справовати...». Чия це мова?
    Що тут зрозуміло, а що ні?'
  - 'Термін: «Річ Посполита». Це «спільна справа» чи «держава»? Як це поняття у Статуті визначає відносини з Короною Польською?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Кому належить спадщина Статуту? Українська vs білоруська історіографія про мову документа. Чому це питання таке
    політизоване?'
  - 'Дебат 2: Чому офіційною мовою ВКЛ стала «проста мова», а не польська чи латина? Це прояв культурного суверенітету чи
    прагматичний вибір для багатоетнічної держави?'
  - '[!decolonization] Статут, писаний «руською мовою», є доказом існування розвиненої юридичної мовної традиції, що спростовує
    російський наратив про «неіснування» української/білоруської мов до XIX ст.'
  - '[!epistemic-humility] Терміни «староукраїнська» та «старобілоруська» є модерними конструктами. Сучасники називали цю
    мову «простою» або «руською», протиставляючи її «книжній» церковнослов''янській.'
  section: 'Конфліктна карта: ''Руська мова'' чи ''старобілоруська''?'
  words: 700
- points:
  - 'Оригінальний текст: Артикул 1, Розділ 3: «О врядех земских, и хто может быти обиран на вряды» — заборона давати уряди
    «чужоземцям и заграничником».'
  - 'Глоси та граматичні нотатки: аналіз архаїчних форм (аорист, двоїна), синтаксичних конструкцій (давальний самостійний).'
  - 'Паралельний переклад: порівняння руського тексту з сучасним українським юридичним перекладом для виявлення семантичних
    зсувів.'
  - '[!decolonization] Цей артикул — юридичне закріплення суверенітету ВКЛ, спрямоване проти польського експансіонізму в рамках
    Люблінської унії.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз запозичень, що прийшли через польську (уряд, панство, шляхта, вольность). Чи були місцеві відповідники?'
  - 'Латинізми: аналіз термінів, що прийшли з римського права (статут, артикул, мандат, апеляція). Як вони адаптувалися до
    руської фонетики та морфології?'
  - 'Церковнослов''янізми: чому їх мало в юридичному тексті? Свідоме розмежування світської та духовної сфер.'
  - '[!myth-buster] Запозичення в юридичній термінології — це не «засмічення» мови, а ознака її інтеграції в європейський
    правовий простір.'
  section: 'Мовний контакт: Полонізми та латинізми у правничій термінології'
  words: 1200
- points:
  - 'Граматична лабораторія: еволюція минулих часів. Як перфект (єсьмь писал) витісняє аорист і імперфект, що були в «Руській
    Правді»?'
  - 'Порівняльна лабораторія: поняття «закон» у церковнослов''янській (законъ), руській (право, статут) та сучасній українській
    мові. Простежити еволюцію.'
  - 'Палеографічна лабораторія: знайомство з прикладами скоропису канцелярії ВКЛ. Як писалися ключові терміни?'
  - 'Етимологічний слід: слово «вряд» (уряд). Його шлях від праслов''янського *rędъ до ключового терміну в Статуті.'
  section: 'Мовна лабораторія: Відмінності від давньоруської та зближення з народною мовою'
  words: 1000
- points:
  - 'Повернення до розминки: чия ж мова у Статуті? Формулювання відповіді з урахуванням концепції «простої мови» та сучасних
    національних історіографій.'
  - 'Лінгвістичний висновок: Статут демонструє мову, яка, хоч і має спільні риси з мовою сусідів, вже розвинула унікальний
    юридичний стиль і термінологію, відмінну від церковнослов’янської та давньоруської.'
  - 'Зв''язок із сьогоденням: як аргументи про «спільну спадщину» використовуються в сучасних політичних дебатах між Україною,
    Білоруссю та Литвою?'
  section: Дискусія та підсумок
  words: 600
