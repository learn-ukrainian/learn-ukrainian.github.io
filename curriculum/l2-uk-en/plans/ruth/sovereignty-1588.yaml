objectives:
- Аналізувати мову Третього Литовського статуту як приклад «простої мови», що обслуговувала державні потреби.
- Розрізняти полонізми, латинізми та власне руські елементи в юридичному тексті XVI ст.
- Пояснювати відмінності між руською діловою мовою та церковнослов’янською книжною мовою того періоду.
- Формулювати аргументовану позицію в соціолінгвістичній дискусії про спадщину Великого Князівства Литовського.
