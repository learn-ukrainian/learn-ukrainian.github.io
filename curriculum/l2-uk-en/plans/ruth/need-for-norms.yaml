activity_hints:
- description: Перевірка позицій у дебаті "Латина vs Проста Мова". Чия це теза — прихильників латинізації чи захисників народної
    мови?
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: 'Розподіліть слова з уривку тексту за походженням: полонізм, латинізм, церковнослов’янізм, питоме українське
    слово.'
  focus: Ідентифікація мовних контактів
  items: 8
  type: fill-in
- description: Прочитайте фрагмент передмови до Острозької Біблії. Випишіть 3-4 основні аргументи, які наводить автор на захист
    перекладу Святого Письма "простою мовою".
  focus: 'Джерельний аналіз: аргументація автора'
  type: note
- description: 'На основі матеріалів модуля напишіть коротке есе (400-600 слів) на тему: "Як полемічна література XVI-XVII
    ст. доводить безперервність розвитку української мови ще до Котляревського?"'
  focus: 'Есе: Доказ існування'
  type: note
cefr_min: C2
connects_to:
- ruth-orthography-letters
- oes-byliny-vs-chronicles
content_outline:
- points:
  - 'Провокація: два речення з полемічного тексту 17 ст. — одне насичене латинізмами, інше — церковнослов’янізмами. Яке з
    них є «більш українським» і чому це питання є пасткою?'
  - 'Термін: "проста мова". Що він означав для автора 16 ст.? Мову для простолюду, чи мову, просту для розуміння всіма, включно
    з елітою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була "проста мова" достатньо розвиненою для теології та науки? Позиція латиністів (це "варварський" діалект)
    vs позиція "руських" авторів (це мова нашого народу, нею треба говорити про Бога).'
  - 'Дебат 2: Кодифікація — це збагачення чи збіднення? Одні вважали, що граматики (як у Смотрицького) "вбивають" живу мову;
    інші — що без граматик вона програє латині та польській.'
  - '[!decolonization] Вибір "простої мови" — це акт культурного суверенітету, відмова від чужої мовної норми (церковнослов’янської
    чи латинської) на користь своєї.'
  - '[!epistemic-humility] Межі між мовами були розмиті. Автори часто змішували регістри, створюючи гібридні тексти. "Чиста"
    проста мова — це радше ідеал, ніж реальність.'
  section: 'Конфліктна карта: Латина vs Проста Мова'
  words: 700
- points:
  - 'Першоджерело: Фрагмент передмови до Острозької Біблії (1581) або "Ключа Царства Небесного" Герасима Смотрицького (1587),
    де автор пояснює, чому він пише "простою мовою".'
  - 'Оригінальний текст з паралельним глосарієм: аналіз аргументів автора.'
  - 'Граматичний коментар: які риси цього тексту вже чітко українські, а які — ще спільні з іншими слов’янськими мовами?'
  - '[!decolonization] Факт друку Біблії народною мовою в XVI ст. сам по собі спростовує імперський міф про "неіснування"
    української мови до XIX ст.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз латинізмів у тексті: лексичні (терміни з права, риторики, теології), синтаксичні (складні речення, побудовані
    за латинським зразком), стилістичні (риторичні фігури).'
  - 'Полонізми як посередники: чимало "латинізмів" прийшло в українську через польську мову. Як відрізнити пряме запозичення
    від опосередкованого?'
  - 'Церковнослов’янізми: як автори використовували їх для створення "високого стилю" та дистанціювання від побутової мови,
    не вдаючись до латини.'
  - '[!myth-buster] Запозичення з латини не "псували" мову, а збагачували її, створюючи термінологію для нових сфер знань,
    що було необхідною умовою виживання мови в конкуренції з іншими.'
  section: 'Мовний контакт: Латинський виклик'
  words: 1200
- points:
  - 'Лабораторна робота: взяти одне речення з Біблії (напр., початок "Отче наш").'
  - 'Порівняти його версії: 1) церковнослов’янською (з Острозької Біблії), 2) латинською (Вульгата), 3) "простою мовою" (з
    полемічного тексту), 4) сучасною українською.'
  - 'Завдання: знайти відмінності на рівні лексики, морфології (відмінки, форми дієслів), синтаксису. Які форми зникли, а
    які збереглися?'
  - 'Стилістичний аналіз: яке враження справляє кожна версія? Яка "вища", яка "зрозуміліша"?'
  section: 'Мовна лабораторія: Порівняльний аналіз регістрів'
  words: 1000
- points:
  - 'Повернення до розминки: чому питання про "кращий" варіант (латинізований чи слов’янізований) було ключовим для інтелектуалів
    XVI-XVII ст.?'
  - 'Лінгвістичний висновок: як тиск з боку латини та потреба в полеміці з католиками прискорили розвиток і стандартизацію
    української мови?'
  - 'Зв’язок уперед: як створені в цю добу норми та ідеї вплинули на подальшу історію української літературної мови, зокрема
    на Івана Котляревського?'
  section: Дискусія та підсумок
  words: 600
focus: 'The Latin Challenge: Why and how Ruthenian ("prosta mova") began to codify itself in response to the prestige and
  pressure of Latin in the 16th-17th centuries, focusing on polemical literature and prefaces to early printed books.'
level: RUTH
module: ruth-049
objectives:
- Аналізувати соціолінгвістичний конфлікт між латиною та "простою мовою" в українських землях XVI-XVII ст.
- Читаті та інтерпретувати фрагменти полемічних текстів та передмов до стародруків, написаних "простою мовою".
- Ідентифікувати латинізми, полонізми та церковнослов’янізми в руському тексті та пояснювати їхню функцію.
- Формулювати аргументовану позицію щодо ролі друкарства та релігійної полеміки в процесі становлення української літературної
  мови.
