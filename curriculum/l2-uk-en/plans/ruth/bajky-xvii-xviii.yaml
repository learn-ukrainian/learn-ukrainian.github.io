focus: "Ukrainian fables in vernacular — moral tales as vehicles for spoken language, Skovoroda's precursors"
content_outline:
- section: Вступ
  description: "The fable tradition in Ukrainian literature. Connection to European Aesopic tradition and its Ukrainian transformation. Social function: teaching morality in the people's own language."
- section: Основний матеріал
  description: "Reading 17th-18th century Ukrainian fables. Animal characters as social commentary. Language analysis: vernacular vocabulary, proverbs embedded in narrative, humor as pedagogical tool. Connection to Skovoroda's later fables."
- section: Практика
  description: "Analyzing fable language: identifying colloquialisms, proverbs, and idiomatic expressions. Tracing vocabulary from 18th-century fables to modern Ukrainian."
- section: Підсумок
  description: "Fables as Ukrainian moral philosophy in popular form. The genre bridges elite and folk culture, Church Slavonic and vernacular."
