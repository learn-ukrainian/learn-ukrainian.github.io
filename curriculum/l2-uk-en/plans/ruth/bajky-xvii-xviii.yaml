activity_hints:
- description: Визначити, яка позиція ("проста мова" — низький жанр vs. повноцінна література) відповідає наведеній цитаті
    з модуля.
  focus: Розуміння соціолінгвістичних дебатів
  items: 4
  type: quiz
- description: 'Вставити слова з тексту байки у дві колонки: "книжні слова" (церковнослов''янізми) та "прості слова" (народна
    лексика).'
  focus: Розрізнення мовних регістрів
  items: 6
  type: fill-in
- description: 'Надано два уривки: опис лева в байці та опис князя в літописі. Порівняйте мовні засоби, стилістику та мету
    опису. Що робить лева в байці алегорією, а не просто твариною?'
  focus: 'Порівняльний аналіз: байка vs. літопис'
  type: note
- description: 'Напишіть есе на тему: "Як аналіз байок XVII-XVIII ст. доводить безперервність та самостійність розвитку української
    мови до Івана Котляревського?" (400-600 слів).'
  focus: 'Есе: Доказ існування'
  type: note
cefr_min: C2
connects_to:
- ruth-110-hryhorii-skovoroda
- ruth-108-polemichna-literatura
content_outline:
- points:
  - 'Провокація: Подано мораль з байки без контексту. Це висока філософія чи проста народна мудрість? Чи може проста мова
    нести глибокий сенс?'
  - 'Порівняння: "Вовк в овечій шкурі" — фраза з байки, що стала міжнародним ідіоматичним виразом. Які ще українські байки
    дали життя сучасним приказкам?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Проста мова vs. книжна мова. Чи є байки, написані "простою мовою", повноцінною літературою, чи це "низький"
    жанр? Полеміка про те, якою мовою слід говорити про мораль.'
  - 'Дебат 2: Оригінальність vs. наслідування. Українські байки — це лише переспіви Езопа чи самостійний жанр, що використовує
    алегорію для коментування українських соціальних реалій?'
  - '[!decolonization] Факт існування літератури простою мовою в XVII-XVIII ст. спростовує імперський наратив про "селянський
    діалект", нібито винайдений у ХІХ столітті.'
  - '[!epistemic-humility] Межі між "простою мовою", "руською мовою" та "церковнослов''янською" були розмитими. Автори свідомо
    змішували регістри для досягнення стилістичного ефекту.'
  section: 'Конфліктна карта: Мова для Бога чи для людей?'
  words: 700
- points:
  - Оригінальний текст байки XVII-XVIII ст. (напр., з "Харківських байок" Сковороди або анонімних джерел) у нормалізованій
    орфографії.
  - Паралельний переклад сучасною українською мовою для уривків, де мовний розрив є значним.
  - 'Глосарій: пояснення архаїчних форм, діалектизмів, полонізмів, що зустрічаються в тексті.'
  - 'Контекст: аналіз персонажів-тварин як алегорій соціальних типів (напр., Лев як цар/магнат, Лисиця як хитрий дрібний шляхтич,
    Віл як працьовитий селянин).'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз "простої мови" байок: виявлення народної лексики, фразеології, приказок, що вплетені в текст.'
  - 'Церковнослов’янізми: як елементи "високого" стилю використовуються для іронії чи підкреслення моралі.'
  - 'Полонізми та латинізми: дослідження запозичень, що потрапили в розмовну мову того часу і знайшли відображення в байках.'
  - '[!myth-buster] Байки не "засмічували" літературну мову просторіччям, а легітимізували її, доводячи, що вона здатна передавати
    складні морально-філософські ідеї.'
  section: 'Мовний контакт: Простонародне у книжному'
  words: 1200
- points:
  - 'Граматичний аналіз: як синтаксична структура (прості речення, пряма мова) створює ефект усної розповіді.'
  - 'Стилістичний лаб: порівняння мовних засобів для опису одного й того ж персонажа (напр., Вовка) у байці та в літописі
    або релігійному тексті.'
  - 'Етимологічний слід: простежити шлях кількох слів з тексту байки від руської доби до їх сучасних відповідників, відзначаючи
    зміни у значенні та формі.'
  - 'Практикум: спроба "перекласти" сучасну соціальну ситуацію мовою алегоричної байки, використовуючи тварин як персонажів.'
  section: 'Мовна лабораторія: Стилістичний аналіз алегорії'
  words: 1000
- points:
  - 'Повернення до розминки: студент формулює власну відповідь — чи може проста мова бути мовою філософії?'
  - 'Лінгвістичний висновок: байка як "лабораторія" української літературної мови, де народна мова випробовувалась на здатність
    до вираження складних ідей, готуючи ґрунт для Сковороди та Котляревського.'
  - 'Зв''язок з майбутнім: як традиція алегоричної критики суспільства, закладена в байках, продовжується в українській літературі
    (напр., у творчості Шевченка, Франка, сатириків ХХ ст.).'
  section: Дискусія та підсумок
  words: 600
focus: Ukrainian fables in vernacular (prosta mova) as a literary phenomenon; moral tales as vehicles for spoken language;
  precursors to Skovoroda; language contact between bookish and colloquial registers.
level: RUTH
module: ruth-109
objectives:
- Аналізувати байку як жанр на перетині книжної церковнослов'янської традиції та усної народної мови
- Розрізняти та ідентифікувати в текстах XVII-XVIII ст. елементи різних мовних регістрів (проста мова, полонізми, церковнослов'янізми)
- Інтерпретувати алегоричний зміст байок у контексті соціальних реалій руської доби
- Формулювати аргументовану позицію щодо ролі простомовної літератури у спротиві мовній асиміляції та утвердженні самобутності
  української мови
