content_outline:
- points:
  - 'Провокація: Дві фрази — «А інший є способ правдивий / которым ся Русь веселит» та «И҆́стинꙋ глаго́лю ва́мъ, не пре́йдетъ
    ро́дъ се́й...». Яка з них написана «простою мовою», а яка — церковнослов''янською? І чому полеміст Герасим Смотрицький
    використовував обидві?'
  - 'Загадка: що таке «ключ царства» в контексті XVI століття? Про яке царство йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Проста мова» — це мова, діалект чи регістр? Дискусія між сучасними мовознавцями про статус писемної мови руських
    інтелектуалів XVI-XVII ст.'
  - 'Дебат 2: Полеміка з католицизмом. Чи була мова Герасима Смотрицького свідомим політичним вибором для захисту православної
    ідентичності перед наступом латинізації?'
  - '[!decolonization] Вірші Смотрицького — доказ існування високорозвиненої літературної мови та філософської думки в Україні
    за 200 років до Котляревського, що руйнує імперський міф про «народження» мови лише у XIX ст.'
  - '[!epistemic-humility] Межі між «простою мовою», «руською мовою» та «церковнослов''янською» були розмитими. Самі автори
    того часу не завжди їх чітко розрізняли, свідомо змішуючи регістри.'
  section: 'Конфліктна карта: ''Проста мова'' чи ''руська мова''?'
  words: 700
- points:
  - 'Оригінальний текст: Фрагмент передмови до «Ключа Царства» та вибрані вірші Герасима Смотрицького.'
  - 'Глоси та коментарі: Пояснення архаїчних форм, синтаксичних конструкцій та полемічних натяків у тексті.'
  - 'Паралельний переклад: Ключові строфи у зіставленні з сучасним українським перекладом для аналізу розбіжностей.'
  - '[!decolonization] Контекст: Острозька академія як інтелектуальний центр, що кинув виклик як польській культурній домінації,
    так і московським претензіям на спадщину Русі.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз лексики, запозиченої з польської мови, особливо в адміністративній та суспільній сферах. Чи це «засмічення»
    чи збагачення?'
  - 'Латинізми: як мова Ціцерона вплинула на українську полемічну літературу? Розбір риторичних фігур та наукової термінології
    латинського походження.'
  - 'Церковнослов''янізми: свідоме використання високого, «священного» стилю для надання авторитету власним тезам. Як Смотрицький
    перемикає регістри?'
  - '[!myth-buster] Мовна чистота — це міф. «Проста мова» Смотрицького є яскравим прикладом живого, динамічного мовного середовища,
    де різні впливи створювали нову унікальну якість, а не псували «чисту» мову.'
  section: 'Мовний контакт: ''Сплав мов'' в Острозі'
  words: 1200
- points:
  - 'Порівняльний аналіз: одне й те саме богословське поняття (напр., «благодать») у трьох варіантах: церковнослов''янському
    (літургія), руському (текст Смотрицького) та сучасному українському.'
  - 'Граматична лабораторія: розбір форм аористу та імперфекту, які ще зустрічаються у Смотрицького, але вже зникають з живої
    мови. Як вони функціонують у тексті?'
  - 'Етимологічний трек: простежити шлях одного слова з віршів Смотрицького, наприклад «посполитий», від його латинських коренів
    через польське посередництво до його значення в Речі Посполитій та сучасному вжитку.'
  - 'Стилістичний аналіз: ідентифікація риторичних прийомів, запозичених з античної та ренесансної поетики, у віршах Смотрицького.'
  section: 'Мовна лабораторія: Анатомія полемічного вірша'
  words: 1000
- points:
  - 'Повернення до розминки: тепер, після аналізу, як би ви відповіли на питання про «просту мову» та «ключ царства»? Сформулюйте
    відповідь, спираючись на матеріал модуля.'
  - 'Лінгвістичний підсумок: що вірші Герасима Смотрицького говорять нам про стан, статус та напрямок розвитку української
    мови наприкінці XVI століття?'
  - 'Зв''язок із майбутнім: як полемічна література Острозького гуртка підготувала ґрунт для козацького бароко та, врешті-решт,
    для нової української літератури?'
  section: Дискусія та підсумок
  words: 600
focus: Полемічна поезія Герасима Смотрицького, розрізнення «простої мови» та церковнослов'янщини, мова Острозького інтелектуального
  кола, Ключ Царства
