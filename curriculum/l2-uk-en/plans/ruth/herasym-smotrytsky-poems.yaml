objectives:
- Аналізувати соціолінгвістичний контекст «простої мови» в Речі Посполитій XVI століття
- Ідентифікувати та пояснювати полонізми, латинізми та церковнослов'янізми в тексті Герасима Смотрицького
- Порівнювати граматичні форми та лексику руської мови XVI ст. з аналогами в церковнослов'янській та сучасній українській
  мовах
- Формулювати аргументовану позицію, як полемічна література спростовує імперські наративи про «неіснування» української мови
  до XIX століття
