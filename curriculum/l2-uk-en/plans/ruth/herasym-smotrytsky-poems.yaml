activity_hints:
- description: Перевірка розуміння дебатів навколо "простої мови". Чия це теза — що це окрема мова чи що це регістр? Визначити
    позицію за цитатою.
  focus: Розуміння соціолінгвістичних дебатів
  items: 4
  type: quiz
- description: 'Вставити в речення правильний термін: полонізм, латинізм, церковнослов''янізм — на основі контексту з віршів
    Смотрицького.'
  focus: Мовні контакти в дії
  items: 5
  type: fill-in
- description: 'Подано три фрагменти (церковнослов''янський, руський, сучасний український), що описують одне поняття. Порівняйте:
    що змінилося в лексиці, граматиці та синтаксисі?'
  focus: 'Порівняльний аналіз: три мови — одна концепція'
  type: note
- description: На основі аналізу тексту Герасима Смотрицького напишіть коротке есе (400-600 слів), яке доводить, чому цей
    текст є неспростовним доказом існування розвиненої української літературної мови задовго до Івана Котляревського.
  focus: 'Есе: Доказ існування'
  type: note
