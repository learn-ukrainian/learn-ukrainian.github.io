content_outline:
- points:
  - 'Провокація: Порівняйте два речення: «Воскресе из мертвых» (церковнослов''янська) та «Воскрес із мертвих» (сучасна українська).
    Які саме зміни відбулися і що вони говорять про еволюцію мови?'
  - 'Термін: «сошествіє во ад» (сходження в пекло). Чому цей апокрифічний сюжет був таким популярним у бароковій культурі
    і як він зображувався в текстах того часу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова цього тексту — це «проста мова», церковнослов''янська з помилками чи вже рання українська? Як сучасники
    класифікували цю мову і які були політичні наслідки такого вибору?'
  - 'Дебат 2: Чи було використання народної мови в релігійних текстах «профанацією» святого, чи свідомим актом утвердження
    власної київської ідентичності, відмінної від польської та московської?'
  - '[!decolonization] Сам факт перекладу Євангелія та створення полемічних текстів «простою мовою» є найсильнішим аргументом
    проти імперської тези про «неіснування» української мови до XIX ст.'
  - '[!epistemic-humility] Межі між «церковнослов''янською», «простою мовою» та «руською» були розмитими, і самі автори часто
    не мали для них чіткого визначення, обираючи регістр інтуїтивно.'
  section: 'Конфліктна карта: Віра і мова'
  words: 700
- points:
  - 'Першоджерело: Фрагмент полемічного твору або драми про Воскресіння Христове (напр., з "Діалога о правой вірі" або іншого
    тексту XVI-XVII ст.).'
  - 'Читання з коментарем: Глоси для архаїчних форм («ад», «паки», «гроб») та синтаксичних конструкцій (давальний самостійний).'
  - 'Граматичний фокус: Аналіз вживання минулих часів (аорист, імперфект) у розповіді про події Воскресіння — як це створює
    динаміку оповіді?'
  - '[!decolonization] Паралельний переклад сучасною українською мовою для демонстрації не лише відмінностей, але й величезної
    спадкоємності між мовою XVII та XXI століття.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: Як адміністративна та військова лексика Речі Посполитої (urząd, prawo, pancerz) проникала у релігійні
    тексти?'
  - 'Аналіз латинізмів: Вплив єзуїтської та протестантської полемічної традиції — риторичні фігури, логічні структури, наукова
    термінологія (argumentum, conclusio).'
  - 'Аналіз церковнослов''янізмів: Коли автор використовує «високий» слов''янізм, а коли — «низький» народний відповідник?
    Це свідомий стилістичний вибір чи автоматизм?'
  - '[!myth-buster] Текст є мозаїкою, а не «засміченою» мовою. Запозичення були не слабкістю, а інструментом для вираження
    складних богословських ідей, для яких ще не було власної термінології.'
  section: 'Мовний контакт: Сплав священного'
  words: 1200
- points:
  - 'Порівняльний аналіз: Один і той самий біблійний вірш про Воскресіння у трьох варіантах: церковнослов''янський (Острозька
    Біблія), руський (Пересопницьке Євангеліє) та сучасний (переклад Огієнка). Студенти відстежують зміни.'
  - 'Граматичний практикум: Роль дієприкметників та дієприслівників у синтаксисі руських текстів. Як змінилася їхня функція
    в сучасній мові?'
  - 'Етимологічний слід: Простежити шлях слова «пекло» від його індоєвропейського кореня до сучасних конотацій, аналізуючи
    його вживання в тексті модуля.'
  - 'Стилістичний експеримент: Переписати короткий уривок тексту, замінивши всі полонізми/латинізми на питомі українські слова
    (якщо можливо). Що втрачається, а що з''являється?'
  section: 'Мовна лабораторія: Відтінки минулого'
  words: 1000
- points:
  - 'Повернення до розминки: Тепер студент може пояснити не лише, ЯК змінилося речення «Воскресе из мертвых», але й ЧОМУ ці
    зміни (відпадіння аориста, зміна прийменника) є закономірними.'
  - 'Лінгвістичний висновок: Як релігійні тексти ставали «плавильним котлом», де створювалася літературна українська мова,
    поєднуючи «високу» книжну традицію з живим народним мовленням?'
  - 'Зв''язок у майбутнє: Як досвід полемічної літератури XVII століття вплинув на філософську мову Сковороди та публіцистику
    Шевченка?'
  section: Дискусія та підсумок
  words: 600
