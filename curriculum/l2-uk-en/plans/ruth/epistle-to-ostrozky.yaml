content_outline:
- points:
  - 'Провокація: Фрагмент з «Листа» з виразним полонізмом. Це «зіпсована» мова чи свідомий вибір автора для звернення до шляхти?'
  - 'Таємниця: Чому полемічний текст, що захищає православ''я, написаний не чистою церковнослов''янською, а «простою мовою»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Як класифікувати мову листа? Це «руська», «проста мова», «староукраїнська», чи «церковнослов''янська з елементами
    народної»? Що ці терміни означали тоді і що означають для лінгвістів сьогодні?'
  - 'Дебат 2: Політична теологія листа — це захист віри чи боротьба за культурну ідентичність руської шляхти в Речі Посполитій?'
  - '[!decolonization] Текст спростовує тезу про відсутність розвиненої писемної традиції до Котляревського, демонструючи
    складну мовну та політичну свідомість.'
  - '[!epistemic-humility] Межі між мовними регістрами були розмитими. Автори свідомо «міксували» мови для охоплення різної
    аудиторії.'
  section: 'Конфліктна карта: ''Проста мова'' чи ''староукраїнська''?'
  words: 700
- points:
  - 'Оригінальний текст (фрагмент): Аналіз ключових пасажів, де автор звертається до князя Острозького, з нормалізованою орфографією.'
  - 'Глоси та коментарі: Пояснення архаїчних форм, синтаксичних конструкцій та полемічної риторики.'
  - 'Граматичні нотатки: Особливості дієслівних форм та відмінювання іменників, що відрізняються від сучасних.'
  - 'Контекст: Лист як реакція на Берестейську унію. Хто автор (клірик з оточення Острозького?), яка його мета?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз лексики з адміністративної, юридичної та військової сфери (напр., "уряд", "шляхта", "посполитий").
    Це мода чи необхідність?'
  - 'Латинізми: вплив європейської академічної традиції на богословську та філософську термінологію.'
  - 'Церковнослов''янізми: використання престижної «високої» лексики для авторитетності та зв''язку з православною традицією.'
  - '[!myth-buster] "Проста мова" — не "нечиста", а гібридна мова, що показує відкритість тогочасного суспільства до культурних
    обмінів, а не його слабкість.'
  section: 'Мовний контакт: Сплав трьох регістра'
  words: 1200
- points:
  - 'Порівняльний аналіз: Одне й те саме поняття (напр., "благодать", "єресь") у церковнослов''янському, руському (в листі)
    та сучасному українському варіантах. Простежте еволюцію.'
  - 'Граматична лабораторія: Розбір синтаксису складних речень у листі. Як риторичні періоди, успадковані з латини, поєднуються
    з простішими народними конструкціями?'
  - 'Етимологічний слід: Простежити шлях одного слова з тексту, яке увійшло в сучасну українську мову через польське посередництво.'
  section: 'Мовна лабораторія: Граматика полеміки'
  words: 1000
- points:
  - 'Повернення до розминки: Як тепер ви можете відповісти на питання про «зіпсованість» мови? Аргументуйте свою позицію.'
  - 'Лінгвістичний висновок: Що «Лист до Острозького» говорить нам про стан і статус української мови наприкінці XVI століття?'
  - 'Зв''язок уперед: Як цей текст і полемічна література загалом підготували ґрунт для подальшого розвитку української літературної
    мови? Зв''язок із спадщиною Івана Вишенського.'
  section: Дискусія та підсумок
  words: 600
focus: The polemical "Epistle to Ostrozky" as a monument of "prosta mova", analyzing its political theology, and its blend
  of Church Slavonic, Polish, and vernacular Ukrainian elements.
level: RUTH
module: ruth-065
objectives:
- Аналізувати соціолінгвістичний контекст «простої мови» на прикладі «Листа до Острозького»
- Визначати та аналізувати мовні контакти (полонізми, латинізми, слов'янізми) у полемічному тексті
- Порівнювати граматичні та лексичні риси руської доби з сучасною українською мовою
- Формулювати аргументовану позицію в дебаті про роль полемічної літератури у становленні української ідентичності
