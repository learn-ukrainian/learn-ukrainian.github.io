activity_hints:
- description: Перевірка розуміння дебатів навколо "простої мови". Чия це теза — що це самостійна мова чи діалект? Визначити
    позицію за цитатою.
  focus: Розуміння соціолінгвістичної карти
  items: 5
  type: quiz
- description: Вставити в речення з тексту відповідні полонізми, латинізми та церковнослов'янізми з наданого списку.
  focus: Ідентифікація мовних контактів
  items: 6
  type: fill-in
- description: 'Подано три короткі речення на одну тему: церковнослов''янською, "простою мовою" з листа, та сучасною українською.
    Опишіть, які граматичні та лексичні зміни відбулися.'
  focus: Порівняльний аналіз регістрів
  type: note
- description: 'Напишіть коротке есе (400-600 слів), використовуючи «Лист до Острозького» як головний доказ у відповіді на
    питання: "Як цей текст доводить безперервність та багатство української писемної традиції задовго до XIX століття?"'
  focus: 'Есе: Аргумент на користь мови'
  type: note
cefr_min: C2
