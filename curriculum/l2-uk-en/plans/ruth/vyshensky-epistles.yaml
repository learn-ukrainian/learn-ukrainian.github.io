content_outline:
- points:
  - 'Провокація: Чому видатний український письменник-полеміст Іван Вишенський стверджував, що проста мова — це «мова для
    свиней»? Що могло змусити інтелектуала так зневажати мову власного народу?'
  - 'Порівняння: два речення. Одне — складна конструкція церковнослов''янською з тексту Вишенського. Інше — те ж саме поняття,
    виражене гіпотетичною простою мовою. Що здобувається і що втрачається у кожному варіанті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був Вишенський консерватором, що гальмував розвиток національної мови? Позиція 1: Так, його обскурантизм
    і захист мертвої церковнослов''янської мови заважали становленню літературного стандарту на народній основі. Позиція 2:
    Ні, він захищав високу культуру і богословську точність від спрощення і «профанації» в добу релігійних воєн.'
  - 'Дебат 2: Це лінгвістичний чи політичний конфлікт? Вишенський реагував на католицьку контрреформацію (що використовувала
    польську) та протестантизм (що використовував народні мови). Його боротьба за церковнослов''янську — це боротьба за збереження
    православної ідентичності проти «латинської» та «лютеранської» експансії.'
  - '[!decolonization] Вибір мови — це політичний акт. Відмова Вишенського від простої мови була формою опору полонізації
    та окатоличенню, спробою зберегти культурний суверенітет православної громади.'
  - '[!epistemic-humility] Побоювання Вишенського не були безпідставними. Тиск асиміляції був реальним. Питання в тому, чи
    була його стратегія єдино правильною, чи вона в довгостроковій перспективі виявилася тупиковою.'
  section: 'Конфліктна карта: Мова свята чи мова проста?'
  words: 700
- points:
  - 'Первинне джерело: Аналіз уривку з «Посланія до єпископів-утікачів» — найгострішого полемічного твору Вишенського.'
  - 'Оригінальний текст (нормалізована орфографія) з паралельним глосарієм: розбір архаїзмів, церковнослов''янізмів та синтаксичних
    конструкцій (напр. давальний самостійний).'
  - 'Граматичні нотатки: форми минулих часів (аорист, імперфект), що відрізняють «високу» книжну мову від живої розмовної.'
  - 'Контекст: Це не філософський трактат, а публіцистичний памфлет, написаний для того, щоб присоромити, переконати та мобілізувати
    православну громаду.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Парадокс Вишенського: він палко захищає чистоту церковнослов''янської мови, але його власні тексти рясніють українізмами
    та полонізмами.'
  - 'Церковнослов''янізми: маркери «високого стилю», свідомий вибір для додання тексту авторитету та сакральності.'
  - 'Полонізми: аналіз лексики, пов''язаної з адміністративним, суспільним та побутовим життям. Чому Вишенський, борючись
    із «латинством», не міг уникнути польських запозичень?'
  - 'Українізми ("проста мова"): де і чому жива народна мова «проривається» крізь броню високого стилю? Чи це несвідомі «помилки»,
    чи свідомий прийом для кращого контакту з читачем?'
  - '[!myth-buster] Уявлення про «чисту» мову — це фікція. Навіть її найзатятіший захисник не зміг її втілити. Текст Вишенського
    — це гібрид, що є доказом реальності, а не чистоти.'
  section: 'Мовний контакт: Чиста віра, «нечиста» мова?'
  words: 1200
- points:
  - 'Стилістичний практикум: студентам пропонується уривок з тексту Вишенського для «колорування» — виділення різними кольорами
    церковнослов''янізмів, полонізмів та українізмів.'
  - 'Порівняльна лабораторія: аналіз одного поняття (напр. «віра», «церква», «єресь») у трьох текстах епохи: у Вишенського
    (православний, церковнослов''янський), у «Катехізисі» Лаврентія Зизанія (православний, але з елементами простої мови),
    та в польському католицькому тексті. Порівняння лексичних та стилістичних виборів.'
  - 'Лексична еволюція: простежити, які зі слів, що Вишенський вживав, збереглися в сучасній українській мові, які зникли,
    а які змінили своє значення.'
  section: 'Мовна лабораторія: Стилістичний аналіз полеміки'
  words: 1000
- points:
  - 'Повернення до розминки: «проста мова для свиней». Тепер студент може пояснити цю позицію в історичному та соціолінгвістичному
    контексті, не погоджуючись із нею.'
  - 'Лінгвістичний висновок: Вишенський парадоксально довів протилежне. Сила його текстів — у динамічному поєднанні різних
    мовних шарів, а не в «чистоті» церковнослов''янщини. Він сам став доказом життєздатності гібридної мови.'
  - 'Зв''язок уперед: Напруга між «високою» книжною та «низькою» народною мовою стає центральним сюжетом української лінгвоісторії
    на наступні 200 років, що завершиться появою Котляревського. Вишенський — ключова, хоч і суперечлива, фігура в цій драмі.'
  section: Дискусія та підсумок
  words: 600
