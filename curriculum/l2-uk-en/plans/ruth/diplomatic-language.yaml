content_outline:
- points:
  - 'Провокація: "Ясновельможний хане..." — чим відрізнялася дипломатична мова Гетьманщини від мови, якою говорили на вулиці?'
  - 'Фрагмент дипломатичної ноти гетьманського уряду до шведського короля. Студент має вгадати: це лестощі, погроза чи прохання?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була ''проста мова'' гетьманських канцелярій повноцінною літературною мовою, чи лише ''зіпсованим'' варіантом
    польської/церковнослов''янської?'
  - 'Дебат 2: Дипломатичне листування як поле битви. Чому Мазепа писав до європейських монархів однією мовою, а до царя —
    іншою? Мова як інструмент суверенітету.'
  - '[!decolonization] Аналіз дипломатичних документів доводить існування розвиненої української державної мови задовго до
    Котляревського, спростовуючи імперський наратив про її ''недержавність''.'
  - '[!epistemic-humility] Термін ''проста мова'' — це екзонім. Самі писарі називали свою мову ''руською''. Межі між ''руською'',
    ''польською'' та ''церковнослов''янською'' були гнучкими і залежали від адресата.'
  section: 'Конфліктна карта: ''Проста мова'' чи державна мова?'
  words: 700
- points:
  - 'Первинне джерело: уривок з договору гетьмана Пилипа Орлика зі Шведським королівством або Кримським ханством (оригінал
    ''простою мовою'').'
  - 'Глосований текст: розбір архаїчних правових та дипломатичних термінів (наприклад, ''послушенство'', ''крепость'', ''лист'').'
  - 'Граматичний коментар: аналіз специфічних конструкцій, що відрізняються від сучасної мови (вплив латинського та польського
    синтаксису).'
  - '[!decolonization] Порівняння тексту договору з аналогічним московським документом того ж періоду — демонстрація відмінностей
    у правовій культурі та політичному мисленні.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз адміністративної та правової лексики польського походження (''уряд'', ''річ'', ''посполита''). Чи були
    вони необхідністю чи модною ознакою?'
  - 'Латинізми: вплив європейської гуманістичної освіти на мову гетьманських дипломатів. Риторичні фігури, юридичні формули
    (''pacta conventa'').'
  - 'Тюркізми: лексика зносин із Кримським ханством та Османською імперією (''калга-султан'', ''ярлик'', ''бей''). Які з цих
    слів були інструментальними, а які асимілювалися?'
  - '[!myth-buster] Мовна ''чистота'' — це міф. Дипломатична мова Гетьманщини була ефективною саме через її гібридність та
    здатність вбирати лексику з різних мовних систем для точного вираження складних понять.'
  section: 'Мовний контакт: Дипломатичний ''Вавилон'' Гетьманщини'
  words: 1200
- points:
  - 'Порівняльний аналіз: одне й те саме поняття (напр., ''союзний договір'') виражене церковнослов''янською, ''простою мовою''
    та сучасною українською. Простежити еволюцію.'
  - 'Етимологічний слід: простежити шлях слова, наприклад, ''конституція'' від латини через польську до Конституції Пилипа
    Орлика.'
  - 'Стилістична лабораторія: студенти отримують сучасний дипломатичний термін і мають ''перекласти'' його руською мовою канцелярій,
    використовуючи лексику та синтаксис модуля.'
  - 'Палеографічний виклик (опційно): розбір короткого фрагменту, написаного козацьким скорописом.'
  section: 'Мовна лабораторія: Реконструкція дипломатичного стилю'
  words: 1000
- points:
  - 'Повернення до розминки: чим насправді була ''проста мова'' дипломатії — сумішшю мов чи самобутнім інструментом? Студент
    формулює обґрунтовану відповідь.'
  - 'Лінгвістичний висновок: як мова гетьманських канцелярій одночасно зберігала спадщину Русі та інтегрувала європейські
    впливи, закладаючи основи сучасної української літературної мови.'
  - 'Зв''язок із сучасністю: які риси тогочасної дипломатичної мови (напр., прагнення до точності, використання міжнародної
    термінології) актуальні для сучасної української дипломатії?'
  section: Дискусія та підсумок
  words: 600
focus: Diplomatic correspondence of the Hetmanate (late 17th - early 18th c.), analyzing language contact (Polonisms, Latinisms,
  Turkisms) in treaties with Sweden and the Crimean Khanate, and the development of a distinct Ukrainian chancellery language.
level: RUTH
module: ruth-089
objectives:
- Аналізувати особливості 'простої мови' гетьманських канцелярій як інструменту дипломатії.
- Розрізняти полонізми, латинізми та тюркізми в дипломатичних текстах XVII-XVIII ст. та пояснювати їхню функцію.
- Читати та інтерпретувати уривки з оригінальних дипломатичних документів, зокрема договорів зі Швецією та Кримським ханством.
- Формулювати аргументовану позицію в дискусії про роль руської канцелярської мови у формуванні сучасної української літературної
  мови.
