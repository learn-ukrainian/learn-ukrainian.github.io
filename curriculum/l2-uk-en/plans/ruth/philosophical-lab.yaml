content_outline:
- points:
  - 'Провокація: Сковорода пише: «Нерівна всім рівність». Як це можливо? Що означає цей парадокс?'
  - 'Термін: Що таке «сродна праця»? Спробуйте дати визначення, спираючись на власне розуміння. Потім порівняємо з оригіналом.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Сковороди — це «російська», «староукраїнська» чи унікальний «сковородинський» сплав? Чому його мова стала
    полем для ідеологічних маніпуляцій?'
  - 'Дебат 2: Сковорода — «народний мудрець» чи елітарний інтелектуал? Чи були його ідеї доступні простому народу, мовою якого
    він нібито писав?'
  - '[!decolonization] Творчість Сковороди — це найсильніший доказ існування безперервної української інтелектуальної традиції,
    що спростовує імперський міф про «південноросійський діалект».'
  - '[!epistemic-humility] Точно класифікувати мову Сковороди складно. Це свідома суміш реєстрів, яка не вписується в прості
    категорії. Він писав так, бо це відповідало його філософським завданням.'
  section: 'Конфліктна карта: Мова філософії: висока чи народна?'
  words: 700
- points:
  - 'Оригінальний текст (фрагмент): аналіз ключового діалогу про щастя.'
  - 'Глоси: розбір архаїчних форм, церковнослов''янізмів та синтаксичних конструкцій.'
  - 'Граматичні нотатки: як Сковорода використовує форми двоїни або аорист для створення певного стилістичного ефекту?'
  - 'Паралельний переклад: сучасний український переклад для найскладніших фрагментів, щоб підкреслити мовну еволюцію.'
  - '[!decolonization] Це не «общерусский» філософ, а український Сократ, що заклав основи української філософії серця.'
  section: 'Текст: Читання та переклад "Розмови п''яти подорожніх"'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналіз біблійних цитат, літургічної лексики. Коли Сковорода використовує «високий» стиль і навіщо?'
  - 'Латинізми: філософські терміни (substantia, natura), риторичні фігури. Як латина допомагає йому будувати абстрактні концепції?'
  - 'Полонізми та германізми: побутова та адміністративна лексика. Як вона «заземлює» високу філософію?'
  - '[!myth-buster] Мовний «суржик» Сковороди — це не ознака безграмотності, а свідомий інструмент. Це створення нової філософської
    мови, здатної виразити складні ідеї для освіченої людини того часу.'
  section: 'Мовний контакт: Сплав мов у діалогах Сковороди'
  words: 1200
- points:
  - 'Компаративний аналіз: візьмемо поняття «серце». Як Сковорода описує його, використовуючи церковнослов''янську, латинську
    та народну лексику в межах одного абзацу?'
  - 'Етимологічний слід: простежимо шлях слова «сродність» від його виникнення до ключового терміна у філософії Сковороди.'
  - 'Синтаксичний практикум: перебудуйте речення Сковороди за нормами сучасної української мови. Що змінилося у стилі та змісті?'
  - 'Реєстровий аналіз: розкладіть фрагмент тексту на «шари»: ось це — з Біблії, це — з латинського трактату, а це — з народної
    пісні.'
  section: 'Мовна лабораторія: Стилістичний аналіз: Високе vs Низьке'
  words: 1000
- points:
  - 'Повернення до розминки: що ж таке «нерівна рівність» і «сродна праця» в контексті мовного аналізу, який ми провели?'
  - 'Лінгвістичний висновок: що мова Сковороди говорить нам про стан української мови у XVIII столітті напередодні її кодифікації?'
  - 'Зв''язок у майбутнє: як «сковородинський» стиль вплинув на Івана Котляревського та всю подальшу українську літературу?'
  section: Дискусія та підсумок
  words: 600
