activity_hints:
- description: Перевірка обох позицій дебату. Чия це теза — що "проста мова" була штучним канцеляритом? Визначити позицію
    за цитатою.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити в речення зі Статуту слова "сейм", "декрет", "дідизна", "уряд", визначивши їх походження (руське,
    полонізм, латинізм).
  focus: Ідентифікація запозичень
  items: 5
  type: fill-in
- description: 'Подано два тексти: фрагмент з Руської Правди та аналогічний за змістом фрагмент з Литовського статуту. Порівняйте:
    що змінилося в термінології та структурі речення? Чому?'
  focus: 'Джерельний аналіз: Руська Правда vs Литовський статут'
  type: note
- description: «Литовський статут як доказ неперервності української правової та мовної традиції». Аргументуйте, спираючись
    на матеріал модуля (400-600 слів).
  focus: 'Есе: Литовський статут як доказ'
  type: note
cefr_min: C2
connects_to:
- legal-personhood
- sovereign-state
content_outline:
- points:
  - 'Провокація: Що означає «шляхтич голий — однаково, що король»? Порівняння руської правової норми з сучасною концепцією
    рівності перед законом.'
  - 'Фрагмент з Литовського статуту: «...жадного шляхтича без права суду карати не маємо...» — студент аналізує, що в цій
    фразі «польське», а що «руське».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Литовський статут — пам''ятка польської, білоруської чи української мови? Політичне та лінгвістичне значення
    «простої мови» (lingua ruthenica).'
  - 'Дебат 2: Чи була «проста мова» справжньою розмовною мовою, чи штучним канцеляритом, зрозумілим лише елітам?'
  - '[!decolonization] Цей текст — юридичний доказ існування розвиненої правової мови на українських землях за 200+ років
    до Енеїди, що спростовує тезу про «вигадану» мову.'
  - '[!epistemic-humility] Тогочасні писарі не мали нашої оптики «національних мов». Вони використовували доступний їм престижний
    регістр, змішуючи елементи.'
  section: 'Конфліктна карта: Мова закону чи закон мови?'
  words: 700
- points:
  - 'Першоджерело: Стаття з Литовського статуту (1588) про права шляхтича на землю та суд (оригінальний текст у нормалізованій
    орфографії).'
  - 'Кероване читання: Глоси для архаїзмів (''дідизна'', ''отчизна''), полонізмів (''уряд'', ''повіт'') та юридичних термінів.'
  - 'Граматичний коментар: Форми двоїни у юридичних текстах, використання аориста та імперфекта для позначення минулих дій.'
  - '[!decolonization] Аналіз того, як російський переклад Статуту в XIX столітті систематично замінював руську термінологію
    на російську, стираючи юридичну традицію.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: Адміністративна та військова лексика (''сейм'', ''посол'', ''ротмістр''). Синтаксичні конструкції, що калькують
    польську мову.'
  - 'Латинізми: Юридична та абстрактна лексика (''декрет'', ''апеляція'', ''термін''). Вплив європейської правової думки.'
  - 'Церковнослов''янізми: Високий стиль у преамбулах та моральних обґрунтуваннях закону.'
  - '[!myth-buster] Запозичення — не «засмічення», а інструмент. Шляхта свідомо використовувала полонізми та латинізми для
    дистанціювання від простолюду та інтеграції в європейський політичний простір.'
  section: 'Мовний контакт: Полонізми, латинізми та руська основа'
  words: 1200
- points:
  - 'Comparative lab: Одна й та сама правова норма (напр., про спадкування) у трьох версіях: уривок з Руської Правди (давньоруська),
    Литовського статуту (руська) та сучасного Цивільного кодексу України. Простежити еволюцію термінології та синтаксису.'
  - 'Etymology trace: Шлях від «віче» до «сейму». Як змінювалася лексика представницьких органів влади.'
  - 'Stylistic lab: Визначення реєстру. Студенту дається набір речень зі Статуту; потрібно визначити, яке слово є руським
    за походженням, яке — полонізмом, яке — латинізмом.'
  section: 'Мовна лабораторія: Порівняльний аналіз правових формул'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, що означає «шляхтич голий — однаково, що король» в контексті XVI століття, і як це розуміння
    змінилося?'
  - 'Лінгвістичний підсумок: Литовський статут — це текст, що фіксує момент, коли руська мова стає державною, вбираючи в себе
    елементи сусідніх мов для створення складного юридичного апарату.'
  - 'Зв''язок уперед: Як правова термінологія Статуту вплинула на мову козацьких універсалів та, врешті, на сучасну українську
    юридичну мову?'
  - 'Головне питання: Як аналіз цього тексту допомагає аргументувати існування української мови як окремої юридичної та державної
    мови задовго до XIX століття?'
  section: Дискусія та підсумок
  words: 600
focus: Права та привілеї шляхти в Литовському статуті; аналіз мови закону — суміш руської, польської та латини; соціолінгвістичний
  статус "простої мови"
level: RUTH
module: ruth-003
objectives:
- Аналізувати соціолінгвістичний статус «простої мови» (lingua ruthenica) в Речі Посполитій
- Ідентифікувати та класифікувати полонізми, латинізми та церковнослов'янізми в юридичному тексті XVI ст.
- Порівнювати правову термінологію різних епох (Руська Правда vs Литовський статут vs сучасне право)
- Використовувати аналіз історичного юридичного документа для аргументації в сучасній дискусії про історію української мови
