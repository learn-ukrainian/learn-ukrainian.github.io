content_outline:
- points:
  - 'Провокація: «Бачити серцем, а не очима». Цитата Памфіла Юркевича. Що означає ця фраза в контексті філософії?'
  - 'Порівняння двох термінів: «кордоцентризм» vs «раціоналізм». Студент має припустити, який з них більше характеризує українську
    філософську традицію.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова філософії. Чи можлива українська філософія «простою мовою»? Дискусія між книжною (церковнослов’янською/латиною)
    та народною мовою у творах мислителів.'
  - 'Дебат 2: Кордоцентризм — унікальна риса чи частина європейського романтизму? Полеміка Юркевича проти німецького ідеалізму
    та російського матеріалізму.'
  - '[!decolonization] Кордоцентризм як відповідь на імперський раціоналізм і спроба знайти «свій шлях» у філософії, відкидаючи
    нав’язані Москвою чи Варшавою моделі.'
  - '[!epistemic-humility] Точні межі кордоцентризму як філософської школи є предметом дискусій. Деякі дослідники вважають
    його радше культурною настановою, аніж стрункою системою.'
  section: 'Конфліктна карта: Серце проти Розуму'
  words: 700
- points:
  - 'Першоджерело: Фрагмент з праці Памфіла Юркевича «Серце та його значення у духовному житті людини» мовою оригіналу (книжна
    українська XIX ст.).'
  - 'Глоси та коментарі: Пояснення застарілих термінів, синтаксичних конструкцій та відмінностей від сучасної мови.'
  - 'Паралельний переклад: Ключові, найскладніші для розуміння уривки подано із паралельним перекладом сучасною українською.'
  - '[!decolonization] Контекст: Праця Юркевича як полеміка з матеріалізмом Чернишевського та утвердження тяглості київської
    філософської традиції в стінах Московського університету.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналіз використання біблійної та літургійної лексики для вираження філософських понять (благодать,
    істина, душа).'
  - 'Латинізми та германізми: Як Юркевич адаптує або відкидає західну філософську термінологію (субстанція, раціо, ідея, апріорі)?'
  - 'Народномовні елементи: Вкраплення елементів живої народної мови для пояснення абстрактних ідей як стилістичний прийом.'
  - '[!myth-buster] Мова філософії не є «чистою». Вона завжди є гібридом книжної традиції, іноземних запозичень та живої мови.
    Юркевич — яскравий приклад такого синтезу.'
  section: 'Мовний контакт: Мова філософії серця'
  words: 1200
- points:
  - 'Етимологічний аналіз: Простежити шлях слова «серце» від праслов''янського *sьrdьce до його метафоричного значення у філософії.'
  - 'Стилістичний аналіз: Порівняти, як поняття «серце» описується в тексті Юркевича (академічний стиль), у поезії Шевченка
    (романтичний стиль) та в сучасному побутовому мовленні.'
  - 'Порівняльний аналіз: «Серце» (Юркевич), «воля» (Шопенгауер), «розум» (Кант). Як вибір центрального поняття змінює філософську
    систему?'
  - 'Термінологічна вправа: Спробувати перекласти фрагмент тексту Юркевича, замінивши слово «серце» на «свідомість» або «психіка».
    Що втрачається?'
  section: 'Мовна лабораторія: Деконструкція філософського терміна'
  words: 1000
- points:
  - 'Повернення до розминки: Як тепер ви розумієте вислів «бачити серцем»? Сформулюйте власне визначення кордоцентризму.'
  - 'Лінгвістичний висновок: Як мова (суміш церковнослов’янської, народної та запозичень) у творах Юркевича слугувала інструментом
    для створення унікальної філософської концепції?'
  - 'Зв''язок із сучасністю: Чи актуальна філософія серця в епоху штучного інтелекту та раціоналізму? Де ми бачимо прояви
    кордоцентризму в сучасній українській культурі?'
  section: Дискусія та підсумок
  words: 600
