objectives:
- Аналізувати складні релігійно-філософські тексти руською мовою, розрізняючи мовні шари (питомий, слов''янський, польський,
  грецький)
- Критично оцінювати роль мовних контактів та запозичень у розвитку літературної мови
- Використовувати аналіз історичних текстів для аргументації в сучасних соціолінгвістичних та історичних дебатах
- Простежувати еволюцію богословської та риторичної лексики від руської доби до сучасної української мови
