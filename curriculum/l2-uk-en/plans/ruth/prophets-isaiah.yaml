content_outline:
- points:
  - 'Провокація: «Се, дїва во чревї прииметъ и родитъ сына». Цей рядок із руського перекладу Ісаї звучить архаїчно, але наскільки?
    Порівняйте з сучасним українським перекладом. Які слова змінились, а які залишились майже недоторканими, і що це каже
    про тяглість мови?'
  - Що таке «грецька калька» в богословському тексті? Чи це ознака «засмічення» мови, чи спроба передати складну концепцію?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чиєю мовою говорить пророк? Дискусія про регістр перекладу. Одні вчені вважають, що перекладач свідомо використовував
    високий, «книжний» слов''янізм, щоб надати тексту сакральності. Інші — що він намагався наблизити текст до «простої мови»,
    зрозумілої широкому загалу.'
  - 'Дебат 2: Грецький вплив — збагачення чи спотворення? Полеміка навколо риторичних структур, запозичених із Септуагінти.
    Чи були ці «грецизми» органічною частиною тогочасної «високої» мови, чи штучним конструктом перекладача, що не мав аналогів
    у живій мові?'
  - '[!decolonization] Існування перекладу Біблії руською мовою в XVI-XVII ст. — це потужний аргумент проти російського імперського
    міфу про «неіснування» української мови до XIX ст. Цей текст є доказом тяглості писемної традиції.'
  - '[!epistemic-humility] Ми не можемо знати напевно, якими були точні інтенції перекладача. Аналіз — це реконструкція, заснована
    на текстових даних, а не читання думок.'
  section: 'Конфліктна карта: Мова пророків: Священний чи народний?'
  words: 700
- points:
  - Читання фрагменту з Книги пророка Ісаї в руському перекладі (нормалізована орфографія).
  - Паралельний переклад сучасною українською мовою для виявлення лексичних та синтаксичних розбіжностей.
  - 'Глоси: аналіз архаїчних форм, що не збереглися (напр., форми двоїни, аорист).'
  - 'Граматичний коментар: розбір складних синтаксичних конструкцій, що є ймовірними кальками з грецької мови (напр., participium
    conjunctum).'
  - '[!decolonization] Цей текст показує, що українці мали доступ до Святого Письма зрозумілою їм мовою задовго до появи Синодального
    перекладу, який Російська імперія нав''язувала як єдиний канонічний.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Грецизми та елліністичні кальки: Аналіз риторичних фігур та синтаксичних моделей, що походять з грецької Септуагінти.
    Як вони впливають на урочистість та складність тексту?'
  - 'Церковнослов''янізми: Ідентифікація лексики та граматичних форм, що належать до високого, літургійного регістру. Чому
    перекладач вдався до них? (престиж, відсутність аналогів, традиція).'
  - 'Полонізми: Пошук лексичних запозичень з польської мови, особливо в абстрактній та адміністративній лексиці. Як вони співіснують
    з церковнослов''янською базою?'
  - '[!myth-buster] Твердження, що запозичення «псують» мову, є ненауковим. Цей текст — приклад того, як мова вбирає в себе
    елементи з різних джерел (грецького, слов''янського, польського), створюючи унікальний стилістичний сплав для передачі
    складних ідей.'
  section: 'Мовний контакт: Риторика та Регістр'
  words: 1200
- points:
  - 'Стилістичний аналіз: Студенти отримують фрагмент тексту і мають «розшарувати» його, ідентифікуючи слова та конструкції,
    що належать до різних шарів: 1) питома руська лексика; 2) церковнослов''янізми; 3) полонізми; 4) грецькі кальки.'
  - 'Порівняльний аналіз: Один і той самий богословський концепт (напр., «спасіння», «благодать») аналізується в трьох варіантах:
    церковнослов''янському, руському (з тексту Ісаї) та сучасному українському. Студенти простежують еволюцію терміна.'
  - 'Етимологічний слід: Простежити шлях кількох ключових слів з тексту від їхнього праслов''янського чи грецького кореня
    до сучасного стану в українській мові.'
  section: 'Мовна лабораторія: Стилістична стратиграфія тексту'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, наскільки «чужою» є мова руського перекладу Ісаї для сучасного українця? Формулювання аргументованої
    відповіді.'
  - 'Головне питання: Як аналіз цього тексту допомагає спростувати тезу про те, що українська мова до Котляревського була
    лише «селянським діалектом»?'
  - 'Лінгвістичний висновок: Що цей переклад говорить про стан та потенціал руської (староукраїнської) мови в XVII ст.? Які
    риси свідчать про її розвиненість та здатність обслуговувати найвищі сфери — богослов''я та філософію?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз риторичної складності та мовних контактів у руському перекладі Книги пророка Ісаї, з фокусом на грецьких кальках
  та високому стилі.
