objectives:
- Аналізувати соціолінгвістичний контекст рутенської полемічної літератури, розрізняючи регістри "простої мови" та "слов'янщини"
- Читаті та інтерпретувати уривки з філософсько-богословського трактату XVII століття, ідентифікуючи архаїчні форми та запозичення
- Визначати та класифікувати мовні контакти в тексті (латинізми, полонізми, церковнослов'янізми) та пояснювати їхню функцію
- Формулювати аргументовану позицію щодо ролі руської книжної мови як інструменту для вираження складних абстрактних ідей
  до нової української літературної доби
