content_outline:
- points:
  - 'Провокація: "Бо є двояка природа речей: одна видима, друга невидима". Що, на вашу думку, автор мав на увазі, і як би
    ми це сказали сьогодні?'
  - 'Термінологічна загадка: Що означає слово "єство"? Чи є воно в сучасній українській мові?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою написано трактат? Це церковнослов''янська, "проста мова" чи специфічний рутенський науковий регістр?
    Аргументи "за" і "проти" кожного визначення.'
  - 'Дебат 2: Текст як зброя. Проти кого чи чого спрямована полеміка "Двох природ"? Аналіз історичного контексту (Берестейська
    унія, конфесійні суперечки).'
  - '[!decolonization] Існування такого складного філософсько-богословського тексту руською мовою спростовує імперський наратив
    про "селянський діалект" до XIX століття.'
  - '[!epistemic-humility] Межі між "простою мовою" та "слов''янщиною" в полемічних текстах того часу є розмитими та предметом
    наукових дискусій.'
  section: 'Конфліктна карта: Мова Теології: Руська чи Слов''янська?'
  words: 700
- points:
  - 'Первинний текст: ключовий уривок з трактату "Дві природи", що розкриває концепцію видимого і невидимого світу.'
  - 'Лексичний коментар: глоси для архаїчних та спеціалізованих термінів (напр., "іпостась", "субстанція", "єство").'
  - 'Граматичні нотатки: аналіз синтаксичних конструкцій та морфологічних форм, що відрізняються від сучасної української
    мови (напр., форми минулого часу, конструкції з давальним самостійним).'
  - 'Паралельний переклад: модернізована українська версія для прояснення складних філософських аргументів.'
  - '[!decolonization] Контекст: Цей текст є свідченням інтелектуальної суверенності та здатності руської книжної мови обслуговувати
    найвищі сфери мислення.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз латинізмів: як богословські та філософські терміни з латини (natura, substantia) адаптувалися в тексті? Це прямі
    запозичення чи кальки?'
  - 'Аналіз полонізмів: вивчення впливу польської богословської традиції на лексику та синтаксис трактату.'
  - 'Аналіз церковнослов''янізмів: визначення шару "високої", книжної лексики, що підкреслює авторитетність та спадкоємність
    тексту.'
  - '[!myth-buster] Інтелектуальні запозичення — це не "засмічення" мови, а інструмент її розвитку. Як автор використовує
    іншомовні поняття для побудови власної аргументації?'
  section: 'Мовний контакт: Латинізми, Полонізми та Грецизми в Полеміці'
  words: 1200
- points:
  - 'Порівняльна лабораторія: як поняття "природа" (natura) виражається в оригінальному тексті, у церковнослов’янському еквіваленті
    та в сучасному українському філософському тексті? Прослідкуйте еволюцію.'
  - 'Етимологічний аналіз: шлях слова "єство" від праслов''янських коренів до його специфічного використання в рутенській
    філософській думці.'
  - 'Стилістична лабораторія: розбір абзацу з тексту. Які слова належать до високого слов''янського регістру, які є запозиченнями,
    а які становлять основу "простої мови"?'
  section: 'Мовна лабораторія: Анатомія Богословського Аргументу'
  words: 1000
- points:
  - 'Повернення до розминки: після аналізу тексту та його контексту, як тепер ви розумієте розрізнення "видимого" та "невидимого"
    світів у автора?'
  - 'Лінгвістичний висновок: що цей трактат говорить нам про здатність руської мови XVI-XVII століть до абстрактного мислення?'
  - 'Зв''язок із майбутнім: як полемічна традиція та її мовні засоби вплинули на мову та філософію Григорія Сковороди?'
  section: Дискусія та підсумок
  words: 600
focus: 'Полемічний трактат "Дві природи": аналіз мови теології та філософії в рутенську добу, розрізнення видимого та невидимого
  світів, та інтелектуальні запозичення для вираження абстрактних ідей.'
