- Аналізувати візуальні та структурні елементи руських рукописів як єдність мистецтва та тексту
- Розрізняти основні типи руського письма (устав, півустав, скоропис) та їх характерні риси
- Критично оцінювати дебати щодо стандартизації правопису в додрукарську епоху
- Пояснювати, як орфографія рукописів відображає мовні контакти та культурні впливи
