content_outline:
- points:
  - 'Провокація: Перед вами ініціал з руського рукопису. Це мистецтво чи текст? Де проходить межа між літерою та орнаментом
    у додрукарську епоху?'
  - 'Порівняння: Два написання одного й того ж слова з різних рукописів. Що змінилося? Чи можемо ми говорити про «помилку»
    чи це просто інша норма?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи існував єдиний руський правопис? Позиція "ЗА": школи книжників (Острог, Київ) створювали локальні, але послідовні
    норми. Позиція "ПРОТИ": кожен писар мав свій "почерк" та орфографічні звички, стандартів не було.'
  - 'Дебат 2: Вплив друкарства — стандартизація чи занепад мистецтва? Друкарство уніфікувало письмо, але вбило живу каліграфічну
    традицію рукописів.'
  - '[!epistemic-humility] Межі між "уставом", "півуставом" та "скорописом" не завжди чіткі. Багато рукописів є гібридними.'
  - '[!decolonization] Твердження про "хаотичність" руського письма використовувалось для заперечення тяглості української
    писемної традиції. Насправді це була жива система в процесі розвитку.'
  section: 'Конфліктна карта: Правопис: Система чи Хаос?'
  words: 700
- points:
  - 'Первинне джерело: Фрагмент сторінки з Peresopnytsia Gospel або іншого ілюмінованого рукопису (факсиміле).'
  - 'Візуальний аналіз: розбір композиції сторінки — співвідношення тексту, ініціалів, орнаментів на полях. Використання кіноварі.'
  - Читання тексту в оригінальній орфографії з глосами для архаїчних форм.
  - 'Граматичні нотатки: як орфографія відображає фонетичні процеси, що відрізняються від сучасної мови (напр., написання
    "ять", редукованих).'
  - '[!decolonization] Цей рукопис — доказ високої писемної культури, що існувала на українських землях задовго до імперських
    наративів про "безписемність" народу.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз правопису запозичень: як писар передає польське "rz" чи латинське "qu"?'
  - 'Полонізми: чи зберігається польська орфографія в юридичних документах (prosta mova) для точності термінології?'
  - 'Латинізми: аналіз орфографії наукових та філософських термінів у текстах Острозької академії.'
  - 'Церковнослов''янізми: як орфографія служить маркером "високого стилю"? Використання титл, специфічних літер (пси, ксі).'
  - '[!myth-buster] Орфографічна варіативність запозичень — це не хаос, а свідчення живого процесу адаптації нових понять
    і пошуку адекватних засобів їх передачі.'
  section: 'Мовний контакт: Впливи на папері: Полонізми, латинізми та слов''янізми'
  words: 1200
- points:
  - 'Практикум з палеографії: розбір трьох основних типів письма — устав, півустав, скоропис.'
  - 'Аналіз лігатур та виносок: як писарі економили місце та прикрашали текст одночасно?'
  - 'Вправа на транскрипцію: студент отримує фрагмент скоропису і має переписати його нормалізованими літерами.'
  - 'Етимологічний слід: простежити еволюцію написання одного слова від руської доби до сучасності, звертаючи увагу на зміни
    в орфографії.'
  section: 'Мовна лабораторія: Палеографічний аналіз: Каліграфія як мистецтво'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, мистецтво чи текст? Студент формулює обґрунтовану відповідь, використовуючи термінологію
    модуля.'
  - 'Лінгвістичний висновок: Що правопис руських рукописів говорить нам про стан мови в ту епоху? Це мова, що активно розвивається,
    запозичує та адаптує.'
  - 'Зв''язок із сучасністю: як сучасні українські шрифтові дизайнери використовують спадщину руської каліграфії?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз візуального стилю та орфографічних норм руських рукописів, палеографія та вплив мовних контактів на письмо
