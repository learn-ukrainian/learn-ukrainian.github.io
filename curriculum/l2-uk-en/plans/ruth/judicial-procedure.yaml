content_outline:
- points:
  - 'Провокація: Ви отримуєте судову повістку (позву) 1650 року. Ви можете прочитати слова, але чи розумієте ви їхню юридичну
    силу? Де проходить межа між простим читанням та розумінням правового документа іншої епохи?'
  - 'Термін: "возний" — ким була ця людина в суді, і чому без нього процес не міг розпочатися?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою написаний Литовський статут? Це "проста мова", "руська канцелярська мова" чи "церковнослов''янська
    з народними елементами"? Що ці визначення означали політично в XVI-XVII ст.?'
  - 'Дебат 2: Закон для всіх чи інструмент шляхти? Чи був Литовський статут втіленням верховенства права, чи лише закріплював
    привілеї одного класу, використовуючи мову як бар''єр?'
  - '[!decolonization] Сам факт існування кодифікованого збірника законів руською мовою спростовує імперський наратив про
    "недержавність" та "нерозвиненість" українського суспільства до возз''єднання з Москвою.'
  - '[!epistemic-humility] Точні мовні кордони в цей період розмиті. Автори текстів часто змішували регістри свідомо, щоб
    надати документу ваги (церковнослов''янізми) або доступності (народні вирази).'
  section: 'Конфліктна карта: ''Проста мова'' чи ''руська мова закону''?'
  words: 700
- points:
  - 'Первинне джерело: Аналіз текстуального фрагменту "позви" (судового виклику) з Литовського статуту.'
  - Оригінальний текст з нормалізованою орфографією та паралельним сучасним українським перекладом для складних конструкцій.
  - 'Глосарій: розбір архаїчних юридичних термінів: "позов", "свідок", "статут", "уряд", "ґрунт".'
  - 'Граматичні нотатки: аналіз форм двоїни та аориста, що збереглися в юридичних текстах довше, ніж у розмовній мові.'
  - '[!decolonization] Цей текст — доказ функціонування української мови на найвищому державному рівні за сотні років до її
    "дозволу" Емським указом.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз мовних запозичень у юридичній лексиці: полонізми, латинізми, церковнослов''янізми.'
  - 'Полонізми: "уряд", "шляхта", "сейм" — як терміни польської адміністративної системи увійшли до руської мови.'
  - 'Латинізми: "апеляція", "декрет", "термін" — спадок римського права, що прийшов через польську юриспруденцію та католицьку
    освіту.'
  - 'Церковнослов''янізми: "свідчення", "закон", "правда" — використання високого стилю для надання тексту авторитету та сакральності.'
  - '[!myth-buster] Запозичення в юридичній термінології — це не "засмічення" мови, а ознака її інтеграції в європейський
    правовий простір. Вибір між полонізмом та церковнослов''янізмом був стилістичним вибором автора.'
  section: 'Мовний контакт: Полонізми та латинізми в залі суду'
  words: 1200
- points:
  - 'Граматична лабораторія: розбір синтаксису юридичних формул. Як будувалося речення, щоб уникнути двозначності?'
  - 'Порівняльна лабораторія: одне й те саме поняття (напр., "порушення закону") церковнослов''янською (гріх), руською (виступ)
    та сучасною українською (правопорушення). Простежити еволюцію.'
  - 'Етимологічний слід: як слово "справа" еволюціонувало від "судової справи" до свого сучасного широкого значення?'
  - 'Стилістична лабораторія: аналіз тексту на предмет різних регістрів. Де говорить закон, де — писар, а де — проглядає жива
    розмовна мова?'
  section: 'Мовна лабораторія: Граматика Литовського статуту'
  words: 1000
- points:
  - 'Повернення до розминки: що робить "позву" 1650 року не просто текстом, а юридичним документом? Студент формулює відповідь,
    спираючись на знання про мову, синтаксис та соціальний контекст.'
  - 'Лінгвістичний висновок: що ці тексти говорять про стан української мови в XVI-XVII ст.? Це мова в занепаді чи мова, що
    активно розвивається та адаптується?'
  - 'Зв''язок із сучасністю: які архаїчні юридичні терміни досі живуть в українській мові, можливо, в метафоричному сенсі?'
  section: Дискусія та підсумок
  words: 600
focus: 'Позва та Свідчення в судах Руського воєводства: аналіз мови Литовського статуту'
