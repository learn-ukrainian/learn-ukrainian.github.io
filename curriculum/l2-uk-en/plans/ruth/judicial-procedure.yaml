objectives:
- Аналізувати соціолінгвістичні дебати навколо статусу 'руської мови' в XVI-XVII ст.
- Читати та перекладати оригінальні юридичні тексти (позви, свідчення) з Литовського статуту
- Ідентифікувати та аналізувати полонізми, латинізми та церковнослов'янізми в юридичному регістрі
- Спростовувати міф про відсутність розвиненої української адміністративної мови до ХІХ століття
