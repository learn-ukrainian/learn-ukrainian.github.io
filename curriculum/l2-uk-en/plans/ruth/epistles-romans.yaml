activity_hints:
- description: Чия це теза — прихильників "простої мови" чи "високого стилю"? Визначити позицію за цитатою з уявних полемістів.
  focus: Розуміння соціолінгвістичних дебатів
  items: 5
  type: quiz
- description: 'Розподіліть слова з тексту Послання на групи: церковнослов''янізми, полонізми, грецизми/латинізми.'
  focus: Ідентифікація мовних шарів
  items: 6
  type: fill-in
- description: Подано чотири переклади одного вірша (церковнослов'янський, руський, польський, сучасний український). Проаналізуйте,
    як змінюється лексика та граматична структура для передачі поняття "оправдання вірою".
  focus: Порівняльний аналіз перекладів
  type: note
- description: Використовуючи матеріал модуля, напишіть есе на тему "Як руський переклад Послання до Римлян спростовує тезу
    про те, що українська мова до Котляревського була нездатною до вираження складних ідей?" (400-600 слів).
  focus: 'Есе: Аргумент на захист мови'
  type: note
