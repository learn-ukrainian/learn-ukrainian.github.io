content_outline:
- points:
  - 'Провокація: "Оправданіє" — це юридичний термін чи духовний стан? Порівняйте два речення: одне з руського перекладу Послання
    до Римлян, інше — із сучасного Кримінального кодексу України.'
  - Що змінилося в значенні слова, а що залишилось? Чи можемо ми сьогодні зрозуміти богословський текст XVI століття без спеціального
    коментаря?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова для Бога і для людей. Чи є руський переклад Послання спробою говорити про складне "простою мовою", чи це
    лише адаптація "високого" церковнослов’янського стилю? [!decolonization] Переклад Біблії на народну мову — це завжди політичний
    акт, який утверджує суб''єктність цієї мови.'
  - 'Дебат 2: Католицький чи православний вплив? Аналізуємо лексику: чи більше в тексті полонізмів, що вказують на західні
    (протестантські) джерела, чи він спирається суто на східну, візантійсько-слов''янську традицію? [!epistemic-humility]
    Точні джерела багатьох перекладів того часу невідомі, і часто вони були компілятивними.'
  section: 'Конфліктна карта: "Проста мова" чи високий стиль?'
  words: 700
- points:
  - 'Читання уривку з Послання до Римлян (розділ 3, вірші 21-28) в руському перекладі: концепція оправдання вірою.'
  - 'Оригінальний текст з паралельним глосарієм: розбираємо архаїчні форми, синтаксичні конструкції та ключові терміни.'
  - 'Граматичний коментар: аналіз форм аориста та імперфекта, що зникли в сучасній мові, але були ключовими для передачі минулих
    дій у тексті.'
  - '[!decolonization] Саме існування такого тексту, здатного передати найскладніші богословські концепції, є найкращим спростуванням
    імперського міфу про "нерозвиненість" української мови до XIX століття.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз лексичних шарів: виділяємо в тексті церковнослов''янізми (високий стиль), полонізми (адміністративна та абстрактна
    лексика) та богемізми.'
  - 'Грецизми та латинізми як основа богословської термінології: простежуємо шлях слів "благодать" (грец. charis), "оправдання"
    (лат. justificatio через грец. dikaiosune), "церква" (грец. ekklesia).'
  - Чи були в "простій мові" власні відповідники для цих понять? Чому перекладач обрав саме запозичення?
  - '[!myth-buster] Запозичення богословської термінології — це не ознака "бідності" мови, а свідчення її включеності в глобальний
    європейський інтелектуальний простір.'
  section: 'Мовний контакт: Теологія в полонізмах та грецизмах'
  words: 1200
- points:
  - 'Порівняльний аналіз: беремо ключовий вірш про "оправдання вірою" і порівнюємо його в чотирьох версіях: церковнослов''янській
    (Острозька Біблія), руській ("проста мова"), польській (Біблія Якуба Вуєка) та сучасній українській (переклад Івана Огієнка).
    Які лексичні та граматичні зрушення відбуваються?'
  - 'Стилістичний експеримент: спробуйте "перекласти" уривок з тексту, замінюючи всі церковнослов’янізми на гіпотетичні "простомовні"
    відповідники. Що втрачається, а що здобувається?'
  - 'Етимологічний ланцюжок: простежуємо шлях слова "гріх" від старослов''янського "грѣхъ" до сучасного розуміння.'
  section: 'Мовна лабораторія: Граматика спасіння'
  words: 1000
- points:
  - 'Повернення до розминки: чи можемо ми тепер дати більш повну відповідь на питання про "оправдання"? Як розуміння історичного
    контексту змінює наше сприйняття слова?'
  - 'Лінгвістичний висновок: що Послання до Римлян говорить нам про стан, можливості та багатство руської мови XVI-XVII століть?'
  - 'Зв''язок із сучасністю: як сучасні українські церкви вирішують мовне питання? Чи існує сьогодні поділ на "високий" літургійний
    стиль та "просту" мову проповіді?'
  section: Дискусія та підсумок
  words: 600
focus: Theological terminology (Оправданіє, Благодать) in the Ruthenian translation of Romans, the language of polemics, and
  the interplay between Church Slavonic and "prosta mova" registers.
level: RUTH
module: ruth-040
objectives:
- Аналізувати ключові богословські терміни ('оправдання', 'благодать') в їх руському лінгвістичному та історичному контексті
- Розрізняти та аналізувати різні мовні шари (церковнослов'янізми, полонізми, латинізми) у релігійному тексті XVI-XVII ст.
- Порівнювати різні переклади Святого Письма для розуміння еволюції української літературної мови
- Формулювати аргументовану позицію щодо ролі та спроможності "простої мови" в релігійних та інтелектуальних дискусіях Ранньомодерної
  доби
