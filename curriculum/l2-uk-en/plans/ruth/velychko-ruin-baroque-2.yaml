content_outline:
- points:
  - 'Провокація: рядок з «Плачу Малоросії» Величка: «На що ми, Боже милостивий, Твой гнівний гнів на себе рушили?». Хто це
    говорить, до кого, і головне — чому?'
  - 'Порівняння: два терміни — «Літопис» та «Історія». У чому різниця для автора XVII-XVIII століть?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Самійло Величко — останній літописець чи перший історик? Чи він об''єктивно фіксує події, чи свідомо конструює
    національний наратив?'
  - 'Дебат 2: Автентичність промов. Чи промову Хмельницького під Берестечком справді виголошено, чи це барокова риторична
    вправа, яку Величко вклав в уста гетьмана за зразком античних істориків?'
  - '[!decolonization] Літопис Величка — монументальна пам''ятка української державницької думки, що спростовує імперський
    міф про «неісторичність» українського народу.'
  - '[!epistemic-humility] Ми не можемо достеменно знати, наскільки Величко був точним. Його праця — це амальгама факту, інтерпретації,
    чуток та літературного хисту.'
  section: 'Конфліктна карта: Літопис як історія vs Літопис як література'
  words: 700
- points:
  - 'Основний текст: Фрагмент «Плачу Малоросії» з Літопису Самійла Величка.'
  - 'Оригінал (нормалізований): читання тексту мовою оригіналу (книжна українська XVIII ст.).'
  - 'Глосарій: розбір архаїзмів, церковнослов''янізмів, полонізмів (напр. «трунок», «респектувати», «блюзнірство»).'
  - 'Паралельний переклад: порівняння з сучасним українським перекладом для виявлення синтаксичних та лексичних розбіжностей.'
  - 'Контекст: «Плач» як персоніфікація України, що нарікає на свою долю в добу Руїни — популярний бароковий жанр.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: адміністративна, військова та побутова лексика, що увійшла в мову козацької еліти (напр. «уряд», «рейментар»,
    «клейноди»).'
  - 'Аналіз латинізмів: риторичні конструкції, юридичні терміни, абстрактні поняття, засвоєні через систему колегіумів (напр.
    «рація», «конституція», «публічний»).'
  - 'Аналіз церковнослов''янізмів: високий стиль, біблійні алюзії, моралізаторська лексика для надання тексту урочистості
    та авторитету.'
  - '[!myth-buster] Мова Величка — не «засмічена» і не «нечиста», а типовий приклад багаторегістрової книжної мови своєї епохи,
    що свідомо використовує різні мовні ресурси для різних стилістичних завдань.'
  section: 'Мовний контакт: Полонізми, латинізми та церковнослов''янізми у прозі Величка'
  words: 1200
- points:
  - 'Лабораторна робота: аналіз «Промови Богдана Хмельницького до війська під Берестечком».'
  - 'Ідентифікація риторичних фігур: пошук прикладів анафор, епіфор, риторичних питань, антитез, метафор та їхня роль у тексті.'
  - 'Порівняльний аналіз: зіставлення опису битви під Берестечком у Величка з описом тієї ж події у сучасному підручнику історії.
    Що Величко додає? На чому акцентує? Які емоції викликає?'
  - 'Стилістичний експеримент: переписати короткий фрагмент промови Хмельницького в сучасному публіцистичному стилі. Що втрачається,
    а що з''являється?'
  section: 'Мовна лабораторія: Стилістичний аналіз риторичних фігур'
  words: 1000
- points:
  - 'Повернення до розминки: з новим розумінням контексту, як би ви тепер відповіли на питання «Плачу Малоросії»?'
  - 'Лінгвістичний висновок: як синтетична, багатошарова мова Величка віддзеркалює культурне та політичне перехрестя, на якому
    опинилася Україна в добу Руїни?'
  - 'Зв''язок із сучасністю: чи існують сучасні «літописці»? Як змінилася роль історика та письменника у фіксації та осмисленні
    трагічних подій національної історії?'
  section: Дискусія та підсумок
  words: 600
