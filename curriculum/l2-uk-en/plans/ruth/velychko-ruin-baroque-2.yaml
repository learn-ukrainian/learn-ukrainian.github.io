objectives:
- Аналізувати Літопис Величка як історичне джерело та літературний твір, розрізняючи факти та риторику.
- Ідентифікувати та пояснювати мовні контакти (полонізми, латинізми, церковнослов'янізми) у бароковому тексті.
- Застосовувати методи стилістичного аналізу до риторичної прози на прикладі промов з Літопису.
- Формулювати обґрунтовану позицію в дискусії про співвідношення історії та літератури в козацьких літописах.
