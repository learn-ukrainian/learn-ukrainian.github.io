activity_hints:
- description: Наведено цитати з Величка. Визначте, яке слово є полонізмом, латинізмом чи церковнослов'янізмом, і поясніть
    його функцію в реченні.
  focus: Розрізнення мовних шарів
  items: 5
  type: quiz
- description: Заповніть пропуски в аналізі промови Хмельницького, ідентифікуючи використані риторичні прийоми (анафора, епіфора,
    риторичне питання).
  focus: Риторичні фігури
  items: 5
  type: fill-in
- description: Проаналізуйте фрагмент опису битви під Берестечком. Які елементи вказують на Величка-історика (деталі, дати),
    а які — на Величка-письменника (метафори, емоційні оцінки)? Аргументуйте свою відповідь (300-400 слів).
  focus: 'Аналіз: Історик чи письменник?'
  type: note
- description: Поясніть, як Самійло Величко використовує "голоси" (промови, листи, плачі) для створення панорамної картини
    епохи Руїни. Чому він обирає такий метод, а не сухий виклад фактів? (400-600 слів).
  focus: 'Есе: "Голоси Доби"'
  type: note
