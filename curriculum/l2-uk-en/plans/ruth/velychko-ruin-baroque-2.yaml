vocabulary_hints:
- definition: період в історії України після смерті Богдана Хмельницького, що характеризувався розпадом державності, громадянською
    війною та іноземними інтервенціями.
  pos: ж.
  word: руїна
- definition: історико-літературний твір в Русі та Україні, в якому розповідь велася за роками; у Величка — вже на межі з
    авторською історіографією.
  pos: ч.
  word: літопис
- definition: мистецтво красномовства, теорія ораторського мистецтва та ширше — наука про художню прозу, невід'ємна частина
    барокової освіти та літератури.
  pos: ж.
  word: риторика
- definition: публічний виступ на певну тему; у Величка — часто літературно опрацьований текст, вкладений в уста історичної
    особи для драматизації розповіді.
  pos: ж.
  word: промова
- definition: жанр літератури, що виражає скорботу й нарікання з приводу трагічної події, часто національного масштабу, популярний
    у бароковій літературі.
  pos: ч.
  word: плач
- definition: слово або вираз, запозичені з польської мови, що відбивають тогочасний культурний та політичний вплив Речі Посполитої.
  pos: ч.
  word: полонізм
- definition: слово або вираз, запозичені з латинської мови, що свідчать про класичну освіту автора та належність до європейського
    наукового простору.
  pos: ч.
  word: латинізм
- definition: 'у переносному значенні: суміш, поєднання різнорідних елементів в одне ціле.'
  pos: ж.
  word: амальгама
