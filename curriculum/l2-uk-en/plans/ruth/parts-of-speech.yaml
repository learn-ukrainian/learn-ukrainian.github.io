content_outline:
- points:
  - 'Провокація: «рука Авраамова» vs «рука Авраама». Чому змінився родовий відмінок чоловічого роду в українській мові?'
  - 'Представлення короткого речення з руського тексту, де іменник має незвичну для сучасної мови форму. Завдання студенту:
    вгадати значення та функцію.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи були граматичні норми в руській мові, чи це був «хаотичний суржик»? Позиція імперських лінгвістів vs сучасний
    погляд на мовну варіативність.'
  - 'Дебат 2: Вплив польської граматики на українську — «засмічення» чи «збагачення»? Аналіз на прикладі синтаксичних конструкцій
    з іменниками.'
  - '[!decolonization] Твердження про «відсутність граматики» до XIX ст. — ключовий інструмент лінгвоциду, що заперечував
    самостійність української мови.'
  - '[!epistemic-humility] Межі між церковнослов’янськими, польськими та народними граматичними моделями в текстах того періоду
    часто розмиті та залежать від автора, жанру та аудиторії.'
  section: 'Конфліктна карта: Граматика чи політика?'
  words: 700
- points:
  - Читання уривку з руського юридичного або полемічного тексту, де іменникові форми відіграють ключову роль (напр., визначення
    власності, спадку).
  - 'Глоси та граматичний коментар до кожної незвичної форми іменника: аналіз закінчень, порівняння з очікуваними сучасними
    формами.'
  - Паралельний переклад сучасною українською, що підкреслює, як змінилася система відмінків (наприклад, зникнення двоїни,
    уніфікація закінчень).
  - '[!decolonization] Демонстрація того, що руські тексти мали складну і послідовну систему відмінювання, що спростовує міф
    про «нерозвиненість» мови.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз іменників, запозичених з польської, та їх адаптація до руської системи відмінювання. Чи зберігають
    вони польські закінчення?'
  - 'Латинізми: юридична та академічна термінологія. Як латинські іменники (часто незмінні) інтегруються в слов’янський синтаксис?'
  - 'Церковнослов’янізми: використання архаїчних відмінкових форм (кличний, давальний) як ознака високого, «книжного» стилю.'
  - '[!myth-buster] Запозичення граматичних конструкцій — це не «псування» мови, а нормальний процес мовного контакту, що
    свідчить про двомовність та культурний обмін.'
  section: 'Мовний контакт: Відмінки на перехресті мов'
  words: 1200
- points:
  - 'Граматична лабораторія: Побудова парадигми відмінювання для кількох іменників з тексту — порівняння з давньоруською (ОЕС)
    та сучасною українською парадигмою.'
  - 'Компаративна лабораторія: Взяти одне поняття (напр., «воля короля») і простежити, як воно виражається в церковнослов’янському,
    руському, польському та сучасному українському текстах.'
  - 'Етимологічний слід: Простежити шлях одного іменника від праслов’янської форми через руську до його сучасного відповідника,
    фіксуючи всі зміни у відмінюванні.'
  section: 'Мовна лабораторія: Реконструкція відмінювання'
  words: 1000
- points:
  - 'Повернення до розминки: Тепер, знаючи про еволюцію відмінків, поясніть різницю між «рука Авраамова» та «рука Авраама».'
  - 'Синтез: Як аналіз системи відмінювання в одному тексті може слугувати доказом безперервності та самостійності розвитку
    української мови до Котляревського?'
  - 'Зв''язок із майбутнім: Які з проаналізованих руських граматичних рис збереглися в сучасних діалектах, а що зникло назавжди?'
  section: Дискусія та підсумок
  words: 600
focus: Analysis of noun declensions in a primary Ruthenian text, focusing on the interplay of Church Slavonic, Polish, and
  vernacular Ukrainian forms. Examines how grammatical structures serve as evidence for the language's independent evolution.
level: RUTH
module: ruth-051
objectives:
- Аналізувати еволюцію системи відмінювання іменників від руської до сучасної української мови.
- Розрізняти полонізми, латинізми та церковнослов’янізми в руських текстах на граматичному рівні.
- Критично оцінювати соціолінгвістичні дебати навколо статусу руської мови.
- Формулювати аргументовану позицію щодо безперервності розвитку української мови, використовуючи лінгвістичні дані.
