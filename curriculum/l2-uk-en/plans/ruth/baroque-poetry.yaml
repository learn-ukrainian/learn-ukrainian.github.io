content_outline:
- points:
  - 'Провокація: Перед вами фігурний вірш у формі хреста. Що тут важливіше — форма чи зміст? Це глибока теологія чи інтелектуальна
    гра?'
  - 'Порівняння: "Анна дар бо ім-рода-м рівна" (Іван Величковський) та його сучасний переклад. Що робить цей рядок "раковим
    віршем" і чому цей ефект втрачається при перекладі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була барокова поезія проявом витонченої поліглосії, що поєднувала польські, латинські та церковнослов''янські
    елементи, чи це була хаотична "макаронічна мова", що псувала народну основу?'
  - 'Дебат 2: Чи була візуальна поезія (carmina figurata) глибоким духовним інструментом для медитації, чи лише формою інтелектуального
    хизування, доступною вузькому колу "обраних"?'
  - '[!decolonization] Існування цих складних, ігрових форм доводить, що руські інтелектуали були частиною паневропейського
    культурного руху, а не ізольованою периферією. Це руйнує міф про "селянську" природу української культури.'
  - '[!epistemic-humility] Ми не можемо з упевненістю сказати, як сучасники сприймали ці твори — як високе мистецтво чи дивацтво.
    Літературні смаки стрімко змінюються.'
  section: 'Конфліктна карта: ''Високий стиль'' чи мовна анархія?'
  words: 700
- points:
  - 'Первинне джерело: Аналіз "ракового вірша" та акровірша Івана Величковського з його збірки "Зегар з полудневою і млеко".'
  - Оригінальний текст з глосами, що пояснюють складну гру слів, омоніми та архаїзми.
  - 'Граматичні нотатки: Як поет свідомо порушує граматичні норми (наприклад, порядок слів) заради дотримання візуальної форми
    чи метричної схеми?'
  - Паралельний переклад сучасною українською, що демонструє, як багато семантичних та естетичних відтінків втрачається, коли
    форма руйнується.
  - '[!decolonization] Контекст: Це не просто "розваги". Це були серйозні жанри панегіричної, геральдичної та духовної поезії,
    що доводять існування розвиненої світської та придворної культури.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: Лексика та синтаксичні конструкції, пов''язані з риторикою, придворним життям та абстрактними поняттями. Як
    вони адаптуються до руської фонетики?'
  - 'Латинізми: Аналіз теологічної, філософської та наукової термінології. Чи це прямі запозичення, чи через польське посередництво?'
  - 'Церковнослов''янізми: Високий, "книжний" реєстр. Поет використовує його для підкреслення урочистості, для побожності,
    чи для створення комічного ефекту через контраст?'
  - '[!myth-buster] Це мовне змішування не "псувало" мову. Воно розширювало її виражальні можливості для нових, складних ідей.
    Літературна українська мова виросла з цього сміливого експерименту, а не з "чистоти".'
  section: 'Мовний контакт: Польський, Латинський, Слов''янський'
  words: 1200
- points:
  - 'Стилістична лабораторія: Деконструкція фігурного вірша. Складання карти, де візуальна структура накладається на поетичний
    метр, римування та семантичний зміст.'
  - 'Порівняльна лабораторія: Порівняння рядка з барокового вірша з його гіпотетичним відтворенням у "чистому" церковнослов''янському
    та сучасному українському варіантах. Що здобувається і втрачається в кожному випадку?'
  - 'Палеографічна лабораторія: Короткий вступ до скоропису XVII століття. Спроба прочитати кілька слів з рукопису Величковського.'
  - 'Етимологічний слід: Простежити ключовий "концепт" з вірша (напр., "мудрість", "чеснота") через його латинське чи польське
    походження.'
  section: 'Мовна лабораторія: Розтин курйозного вірша'
  words: 1000
- points:
  - 'Повернення до розминки: Тепер студент може надати обґрунтовану відповідь, чим є фігурний вірш — грою чи теологією, —
    спираючись на аналіз модуля.'
  - 'Лінгвістичний висновок: Барокова поезія демонструє мову, достатньо впевнену в собі, щоб грати, запозичувати та експериментувати.
    Це доказ живої, а не вмираючої літературної культури.'
  - 'Зв''язок уперед: Як ця любов до гри слів, алегорій та стилізації вплинула на пізніших авторів, таких як Григорій Сковорода,
    і навіть на українських футуристів початку XX століття?'
  section: Дискусія та підсумок
  words: 600
focus: Baroque curiosity verse (acrostics, palindromes), visual poetry (carmina figurata), and the linguistic experimentation
  between Polish, Latin, and Ruthenian registers in the works of poets like Ivan Velychkovsky.
level: RUTH
module: ruth-072
objectives:
- Аналізувати складні взаємозв'язки між формою та змістом у бароковій "курйозній поезії".
- Розрізняти та ідентифікувати полонізми, латинізми та церковнослов'янізми в текстах XVII століття, пояснюючи їх функцію.
- Критично оцінювати соціолінгвістичні дебати навколо "макаронічної мови" та її ролі у формуванні української літературної
  традиції.
- Формулювати аргументовану позицію щодо того, як барокова поезія є доказом існування розвиненої української літературної
  культури до Котляревського.
