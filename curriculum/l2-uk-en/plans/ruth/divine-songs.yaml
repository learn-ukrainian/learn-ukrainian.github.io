content_outline:
- points:
  - '''Що є свобода? Добро в ній якеє?'' — рядок Сковороди vs. сучасне ''Що таке свобода? Яке в ній благо?'''
  - 'Провокація: студент має визначити, що змінилося (лексика, синтаксис), а що залишилось незмінним (філософське питання).'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою писав Сковорода? Церковнослов''янська, «проста мова», чи унікальний філософський ідіолект, що синтезував
    різні стилі?'
  - 'Дебат 2: Сковорода — «останній представник бароко» чи «перший просвітитель»? Як мова його текстів (високий стиль vs.
    народні елементи) відображає цей перехід?'
  - '[!decolonization] Твердження про «відсутність» філософської мови в Україні до XIX ст. спростовується аналізом мови Сковороди,
    яка демонструє здатність обслуговувати складні абстрактні концепції.'
  - '[!epistemic-humility] Точна класифікація мови Сковороди — досі предмет гострих наукових дискусій. Не існує єдиної думки,
    а лише обґрунтовані позиції.'
  section: 'Конфліктна карта: Мова Сковороди: між Небом і Землею'
  words: 700
- points:
  - Оригінальний текст "De Libertate" зі збірки "Сад божественних пісень" — читання з нормалізованою орфографією.
  - Глоси для архаїчних форм та церковнослов'янізмів (якеє, благо, злато, ідол).
  - 'Граматичний коментар: аналіз форм, що відрізняються від сучасних (напр., стягнені форми прикметників).'
  - '[!decolonization] Поема спростовує імперський міф про «нефілософічність» української мови до XIX століття, демонструючи
    її спроможність виражати складні ідеї.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналіз лексики високого, духовного регістру (благо, істина, дух). Як вони створюють філософський
    контекст?'
  - 'Латинізми: сама назва "De Libertate". Вплив латинської філософської традиції на синтаксис та термінологію (напр. риторичні
    питання).'
  - 'Народна мова: аналіз просторічних та фольклорних елементів у поезії Сковороди — як вони «приземлюють» високу філософію,
    роблячи її доступнішою.'
  - '[!myth-buster] Мова Сковороди — не хаотична «суміш», а свідомий синтез різних мовних пластів для досягнення філософської
    точності та поетичної виразності.'
  section: 'Мовний контакт: Синкретизм мови Сковороди'
  words: 1200
- points:
  - 'Стилістичний аналіз: розшарування лексики "De Libertate" на три пласти: церковнослов''янський (високий), народно-розмовний
    (низький), латинсько-європейський (науковий).'
  - 'Порівняльний аналіз: як поняття «свобода» виражено в "De Libertate" vs. в сучасному українському юридичному тексті.'
  - 'Метричний аналіз: розбір силабічного віршування, характерного для барокової поезії, на прикладі "De Libertate".'
  - 'Етимологічний слід: простежити шлях слова «свобода» та його синонімів в історії української мови від руської доби.'
  section: 'Мовна лабораторія: Стилістичний аналіз "De Libertate"'
  words: 1000
- points:
  - 'Повернення до розминки: з новим розумінням, студент аналізує різницю між "Що є свобода?" та "Що таке свобода?" в історичному
    та лінгвістичному контексті.'
  - 'Лінгвістичний підсумок: що мова "De Libertate" говорить про стан української літературної мови у XVIII столітті та її
    готовність до входження в Новий час?'
  - 'Зв''язок із сучасністю: як філософія та мова свободи Сковороди резонують у сучасній Україні, що знову бореться за свою
    незалежність?'
  section: Дискусія та підсумок
  words: 600
focus: '"De Libertate" Григорія Сковороди — барокова поезія, метрика, філософія свободи, мовний синкретизм'
