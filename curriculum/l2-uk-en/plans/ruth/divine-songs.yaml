module: ruth-095
objectives:
- Аналізувати мовний синкретизм у поезії Григорія Сковороди, розрізняючи церковнослов'янські, латинські та народномовні елементи.
- Критично оцінювати наукові дебати щодо класифікації мови Сковороди та його місця в історії української літератури.
- Інтерпретувати філософський зміст поезії "De Libertate" через призму її мовних та стилістичних особливостей.
- Застосовувати методи стилістичного та метричного аналізу до текстів українського бароко.
