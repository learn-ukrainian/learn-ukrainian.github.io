content_outline:
- points:
  - 'Провокація: Подано два речення: одне церковнослов''янською, інше — «простою мовою» того ж періоду. «Отче наш, іже єси
    на небесіх...» vs «Ойче наш, который єст в небі...». Яке «більш українське»? Чи коректне це питання?'
  - 'Термін-загадка: Що таке «проста мова»? Це мова простолюду, чи це складний літературний інструмент?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що таке «руська мова» XVI-XVII ст.? Це пізній етап давньоруської? Ранній етап української? Окрема східнослов''янська
    мова? Чому кожне визначення є політичним?'
  - 'Дебат 2: Мова до Котляревського — спадкоємність чи винахід? Позиція 1: сучасна літ. мова — це «очищена» від церковнослов''янізмів
    і полонізмів народна мова. Позиція 2: вона є прямим спадкоємцем книжної традиції, що свідомо синтезувала різні стилі.'
  - '[!decolonization] Тексти цього періоду — найкращий доказ безперервності української мовної традиції, що спростовує імперський
    наратив про «винайдення» мови в XIX ст.'
  - '[!epistemic-humility] Межі між «стилями», «регістрами» та «мовами» в цей період були розмитими. Автори часто змішували
    їх свідомо для досягнення певного ефекту.'
  section: 'Конфліктна карта: Одна мова чи декілька?'
  words: 700
- points:
  - 'Первинне джерело: Фрагмент з полемічного твору Івана Вишенського або Мелетія Смотрицького.'
  - Оригінальний текст (нормалізована орфографія) з паралельним глосарієм архаїзмів та запозичень.
  - 'Граматичний коментар: аналіз форм, що відрізняються від сучасної мови (напр., форми минулого часу, двоїна, кличний відмінок).'
  - 'Контекст: Полемічна література як арена боротьби ідентичностей — релігійної, культурної, мовної. Вибір мови був політичним
    актом.'
  - '[!decolonization] Аналіз того, як українські автори використовували церковнослов''янську — не як «чужу» мову, а як свій
    власний високий стиль, спільний спадок православної ойкумени.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: висока, книжна лексика, біблійні алюзії, архаїчні граматичні конструкції. Регістр релігійної поваги
    та вченості.'
  - 'Полонізми: адміністративна, юридична, військова, побутова лексика. Маркер контакту з Річчю Посполитою. Чи були вони «засміченням»
    мови, чи необхідним інструментом для опису нових реалій?'
  - 'Латинізми: наукова та філософська термінологія, риторичні фігури. Засвідчують приналежність української еліти до європейського
    освітнього простору.'
  - 'Власне українські (народномовні) елементи: основа, на яку накладаються інші шари, забезпечуючи зрозумілість тексту для
    ширшої аудиторії.'
  - '[!myth-buster] Мовна «чистота» — це модерний конструкт. Книжна мова Русі-України завжди була гібридною і вбачала в цьому
    свою силу, а не слабкість.'
  section: 'Мовний контакт: Стилістичні шари тексту'
  words: 1200
- points:
  - 'Стилістичний лаб: взяти абзац з тексту і «розфарбувати» слова за походженням (церковнослов''янізм, полонізм, латинізм,
    народне слово). Оцінити пропорції.'
  - 'Компаративний лаб: те саме поняття (напр., «любов», «батьківщина», «закон») у трьох варіантах — церковнослов''янському,
    руському (простою мовою) та сучасному українському. Простежити еволюцію конотацій.'
  - 'Етимологічний слід: простежити шлях одного слова з тексту, що має латинське або польське походження, до його сучасної
    форми та значення в українській мові.'
  - 'Перекладацький лаб: спробувати перекласти фрагмент тексту двома способами: 1) намагаючись зберегти стилістичну багатошаровість,
    2) адаптуючи до сучасної нейтральної норми. Обговорити втрати і здобутки.'
  section: 'Мовна лабораторія: Аналіз стилістичних реєстрів'
  words: 1000
- points:
  - 'Повернення до розминки: Чи є сенс питати, який варіант «більш український»? Студент формулює відповідь, спираючись на
    поняття стилістичних рівнів.'
  - 'Лінгвістичний висновок: свідоме оперування різними мовними регістрами було ключовою компетенцією українського інтелектуала
    XVI-XVIII ст.'
  - 'Зв''язок з майбутнім: як цей складний мовний ландшафт ліг в основу творчості Котляревського, Шевченка та становлення
    сучасної літературної мови?'
  - 'Фінальний аргумент: як аналіз текстів цього модуля дозволяє аргументовано спростовувати тезу про «штучність» української
    мови?'
  section: Дискусія та підсумок
  words: 600
focus: Distinguishing "high" (Church Slavonic), "middle" (Ruthenian/prosta mova), and "low" (vernacular) styles in early modern
  Ukrainian texts. Analysis of Polonisms, Latinisms, and their interaction. Using textual evidence to refute the "no language
  before Kotliarevsky" myth.
level: RUTH
module: ruth-056
objectives:
- Розрізняти стилістичні шари (церковнослов'янський, руський, польський, латинський) у текстах XVI-XVIII ст.
- Аналізувати явище мовного контакту та його роль у формуванні української книжної мови.
- Аргументовано спростовувати імперський міф про відсутність в українців безперервної мовної традиції до XIX ст.
- Застосовувати лінгвістичний аналіз для розуміння культурних та політичних процесів у ранньомодерній Україні.
