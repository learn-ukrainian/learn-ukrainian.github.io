content_outline:
- points:
  - 'Провокація: «Ваш покірний слуга і вічний боржник...» vs «Привіт, Іване!». Чому для написання листа потрібен був посібник?'
  - 'Загадка: що таке «лист віншувальний», «лист жалісний» та «лист оскаржувальний»? Студент має вгадати призначення за назвою.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є «проста мова» письмовника повноцінною літературною українською? Позиція 1: Так, це кодифікована мова освіченої
    еліти. Позиція 2: Ні, це лише практичний ужиток, позбавлений високого стилю.'
  - 'Дебат 2: Чи можна писати історію за листами? Історія «великих подій» (літописи) vs соціальна історія «маленьких людей»
    (листування).'
  - '[!decolonization] Письмовники доводять існування розвиненої писемної культури українською мовою задовго до XIX ст., спростовуючи
    імперський міф про «селянський діалект».'
  - '[!epistemic-humility] Розмежування між «офіційним» та «приватним» у XVII ст. було іншим. Особистий лист міг мати юридичну
    вагу.'
  section: 'Конфліктна карта: Мова офіційна vs Мова приватна'
  words: 700
- points:
  - 'Читання зразків листів з посібника: прохання про позику, скарга на сусіда, привітання зі святом, висловлення співчуття.'
  - Оригінальний текст (нормалізована орфографія) з паралельним перекладом сучасною українською мовою для складних фрагментів.
  - 'Глоси: пояснення застарілих слів та виразів (напр., «зичливість», «ласкаве панство», «скрипт»).'
  - 'Граматичні нотатки: аналіз форм кличного відмінка, конструкцій з двоїною, архаїчних дієслівних форм.'
  - 'Контекст: хто до кого писав? Аналіз соціальної ієрархії, закодованої у формах звертання та підпису.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - Аналіз джерел етикетних формул у письмовнику.
  - 'Полонізми: адміністративна та судова лексика, шляхетські титули, що прийшли з діловодства Речі Посполитої («Ваша милість»,
    «пане», «зволити»).'
  - 'Латинізми: риторичні фігури та юридичні терміни, що проникли через освітню систему (колегіуми, академії).'
  - 'Церковнослов''янізми: вирази високого стилю, що використовуються при зверненні до духовенства або в особливо урочистих
    листах.'
  - '[!myth-buster] Мовні запозичення в листах — не «засмічення» мови, а ознака освіченості автора та його вміння оперувати
    різними соціокультурними кодами.'
  section: 'Мовний контакт: Анатомія епістолярної формули'
  words: 1200
- points:
  - 'Граматична лабораторія: еволюція кличного відмінка. Порівняння форм звертання у письмовнику з сучасними нормами. Чому
    «пане господарю», але «пану полковнику»?'
  - 'Стилістична лабораторія: реєстровий аналіз. Розбір одного листа на складові: де тут «проста мова», де «канцелярська»,
    а де «високий штиль»?'
  - 'Порівняльна лабораторія: вираження одного й того ж прохання (напр., «прошу повернути борг») у трьох реєстрах: церковнослов''янському,
    «простою мовою» письмовника та сучасним офіційно-діловим стилем.'
  - 'Практикум: написання короткого листа за правилами письмовника, використовуючи правильні формули звертання, прощання та
    компліменти.'
  section: 'Мовна лабораторія: Реконструкція епістолярного стилю'
  words: 1000
- points:
  - 'Повернення до розминки: тепер студент може пояснити, чому для написання листа був потрібен посібник, посилаючись на складну
    систему соціальних та мовних кодів.'
  - 'Лінгвістичний висновок: письмовник демонструє, що українська мова мала кодифікований, наддіалектний стандарт для повсякденного
    вжитку, здатний обслуговувати складні соціальні взаємодії.'
  - 'Зв''язок уперед: як епістолярні традиції змінилися в XIX ст. під впливом романтизму та народництва? Які формули зникли,
    а які трансформувалися?'
  section: Дискусія та підсумок
  words: 600
