objectives:
- Аналізувати «Тренос» Мелетія Смотрицького як ключову пам''ятку полемічної літератури початку XVII століття.
- Розрізняти та характеризувати різні мовні шари у тексті: церковнослов''янізми, полонізми, елементи «простої мови».
- Пояснювати риторичну стратегію Смотрицького, зокрема використання персоніфікації.
- Формулювати аргументовану позицію щодо ролі «Треносу» в історії української мови та культури.
