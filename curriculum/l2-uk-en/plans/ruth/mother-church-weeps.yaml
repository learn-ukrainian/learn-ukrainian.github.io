content_outline:
- points:
  - 'Провокація: Фрагмент з «Треносу»: «Плачу гірко невтішним голосом... бо мене, колись прекрасну й багату, мої власні сини
    й дочки покинули». Хто це говорить і до кого?'
  - 'Питання: Якби сучасна інституція (напр., університет, держава) хотіла висловити глибоку кризу, якими словами вона б це
    зробила? Порівняйте з мовою Смотрицького.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова «Треносу» — це церковнослов''янська, «проста мова» чи свідомо створений гібрид? Чиєю мовою Смотрицький
    звертається до православних — мовою еліти чи народу?'
  - 'Дебат 2: Берестейська унія 1596 року — це було возз''єднання церков чи культурна капітуляція? «Тренос» — це богословський
    аргумент чи політичний памфлет?'
  - '[!decolonization] Текст є пам''яткою культурного спротиву полонізації та окатоличенню, спробою створити власну, руську,
    ідентичність, здатну конкурувати з польською.'
  - '[!epistemic-humility] Межі між «своїм» і «чужим» у мові та культурі Речі Посполитої були розмиті. Сам Смотрицький згодом
    перейшов в унію, що ускладнює однозначну оцінку його позиції.'
  section: 'Конфліктна карта: Полеміка про Мову та Віру'
  words: 700
- points:
  - Оригінальний текст першого розділу «Треносу», де вводиться образ Матері-Церкви.
  - 'Глоси та коментарі: розбір архаїчних форм, полонізмів та слов''янізмів, що ускладнюють розуміння.'
  - 'Граматичні нотатки: аналіз риторичних фігур (апострофа, просопопея), синтаксичних конструкцій, запозичених з польської
    та латини.'
  - 'Контекст: «Тренос» був виданий анонімно у Вільні (1610), викликав шалений скандал, був заборонений королем Сигізмундом
    III, а його автор — засуджений на смерть.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз лексики з адміністративної, суспільної та військової сфер. Це вимушені запозичення чи модна стилізація
    під мову еліти?'
  - 'Церковнослов''янізми: як Смотрицький використовує «високий» регістр для надання своїм аргументам богословської ваги та
    авторитету?'
  - 'Латинізми та грецизми: вплив європейської освіти на риторичну структуру та термінологію тексту.'
  - '[!myth-buster] Мова Смотрицького — не «засмічена», а складносинтезована. Це свідомий інструмент, що відображає багатомовне
    середовище інтелектуала того часу і його прагнення говорити з різними аудиторіями.'
  section: 'Мовний контакт: Сплав Слов''янського, Польського та Грецького'
  words: 1200
- points:
  - 'Компаративний аналіз: взяти тезу з «Треносу» і порівняти, як цю ж думку висловив би Іван Вишенський (більш емоційно та
    безкомпромісно) і як її формулюють у сучасній академічній статті.'
  - 'Стилістичний аналіз: студенти класифікують лексику з уривків за регістрами (високий/слов''янський, середній/руський,
    запозичений/польський) та аналізують риторичний ефект їх поєднання.'
  - 'Палеографічний екскурс: знайомство зі шрифтами, якими друкували книги на початку XVII ст. (на прикладі видань віленських
    та львівських друкарень).'
  - 'Етимологічний слід: простежити шлях 2-3 ключових слів (напр., «благочестя», «єресь», «схизма») від грецького оригіналу
    через церковнослов''янську до вжитку в «Треносі».'
  section: 'Мовна лабораторія: Синтаксис Полеміки'
  words: 1000
- points:
  - 'Повернення до розминки: Чому персоніфікація Церкви як матері, покинутої дітьми, була настільки потужним образом у 1610
    році?'
  - 'Лінгвістичний висновок: «Тренос» — це не просто полемічний твір, а доказ того, що руська мова на початку XVII ст. була
    здатна обслуговувати найскладніші жанри і абстрактні концепти.'
  - 'Зв''язок уперед: пізніше Смотрицький написав свою знамениту «Граматику». Як його робота над «Треносом» вплинула на його
    погляди на кодифікацію мови?'
  section: Дискусія та підсумок
  words: 600
focus: 'Тренос (1610) Мелетія Смотрицького: персоніфікація як риторичний прийом, мова полеміки, зіткнення церковнослов''янської
  та простої мови'
