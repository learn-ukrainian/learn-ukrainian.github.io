content_outline:
- points:
  - 'Провокація: «Гетьман» — це король, президент чи генерал? Посада, запозичена з польської, стала символом української державності.
    Як так сталося?'
  - 'Фрагмент з козацького універсалу: «...пан полковник чернігівський з усією старшиною полковою...». Що означає «старшина»
    — вік чи ранг?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова козацьких канцелярій — це «проста мова», руський варіант польської канцелярської мови, чи вже українська?
    [!epistemic-humility] — Термінологія досі є предметом дискусій серед лінгвістів.'
  - 'Дебат 2: Козацька старшина — це меритократична військова еліта чи новий клас землевласників, що копіював польську шляхту?
    І як це відбилося в титулах?'
  - '[!decolonization] Існування складної, ієрархічної системи управління з власною термінологією спростовує російський імперський
    міф про козаків як про «банду втікачів-селян».'
  section: 'Конфліктна карта: Мова влади чи влада мови?'
  words: 700
- points:
  - 'Первинне джерело: Уривок з «Договорів і Постанов» Пилипа Орлика 1710 року, що перелічує права та обов''язки генеральної
    старшини.'
  - Оригінальний текст (староукраїнська книжна мова) з паралельним перекладом сучасною українською.
  - 'Глосарій: аналіз ключових титулів (гетьман, обозний, суддя, писар, осавул, хорунжий, бунчужний) та їхніх функцій.'
  - '[!decolonization] Текст є доказом тяглості української правової та державної думки, що сягає часів Русі та Великого Князівства
    Литовського.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз запозичень, що прийшли через Польщу (гетьман, полковник, уряд). Чи змінилося їхнє значення на українському
    ґрунті?'
  - 'Тюркізми: «осавул», «бунчук», «кіш». Як слова зі степового, військового лексикону стали частиною державної адміністрації?'
  - 'Латинізми та германізми: вплив західноєвропейської освіти та військової справи (канцелярія, хорунжий).'
  - 'Власне українські терміни: «полк» як адміністративно-територіальна одиниця — унікальне українське явище.'
  - '[!myth-buster] Запозичення в адміністративній лексиці — це не ознака слабкості мови, а нормальний процес культурного
    обміну та адаптації. Важливо, як мова їх «перетравлює».'
  section: 'Мовний контакт: Польський, латинський чи свій? Аналіз титулів'
  words: 1200
- points:
  - 'Граматична лабораторія: відмінювання титулів у текстах XVII-XVIII ст. — порівняння з сучасними нормами.'
  - 'Порівняльна лабораторія: поняття «полковник» у трьох текстах — уривку з козацького літопису, у польському королівському
    привілеї та в сучасній історичній праці. Як змінюється конотація?'
  - 'Етимологічний слід: шлях слова «полк» від праслов''янського *pьlkъ до військово-адміністративної одиниці Гетьманщини.'
  - 'Стилістична лабораторія: аналіз епітетів, що супроводжують титули у думах та літописах («Ясний пане гетьмане», «пан полковник
    славний»).'
  section: 'Мовна лабораторія: Анатомія звання — ''Полковник'''
  words: 1000
- points:
  - 'Повернення до розминки: Отже, гетьман — це хто? Студент формулює відповідь, враховуючи військовий, політичний та символічний
    аспекти посади.'
  - 'Лінгвістичний підсумок: що мова козацької ієрархії говорить нам про геополітичну орієнтацію та культурні впливи тогочасної
    України?'
  - 'Зв''язок уперед: як козацькі ранги та титули трансформувалися або були відроджені в часи УНР та в сучасній українській
    армії?'
  section: Дискусія та підсумок
  words: 600
