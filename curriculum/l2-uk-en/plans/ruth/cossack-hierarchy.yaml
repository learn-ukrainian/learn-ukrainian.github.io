objectives:
- Аналізувати соціолінгвістичний контекст адміністративної мови Гетьманщини
- Розрізняти польські, латинські, тюркські та автохтонні елементи в козацькій термінології
- Інтерпретувати первинні джерела (уривки з літописів, універсалів) для реконструкції соціальних реалій
- Формулювати аргументовану позицію щодо ролі козацької державності у безперервності української історії
