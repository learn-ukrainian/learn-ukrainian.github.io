content_outline:
- points:
  - 'Провокація: речення з передмови Величка (бароковий синтаксис) поруч із його сучасним «перекладом». Що втрачається та
    здобувається при спрощенні?'
  - 'Термін: «козацьке бароко». Що це, на вашу думку, означає в контексті написання історії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Величко — об''єктивний історик чи автор історичного роману? Аналіз його «архітектурної» структури як літературного
    прийому.'
  - 'Дебат 2: Достовірність джерел Величка. Він свідомо компілював усні перекази, документи та власні вставки. Чи можна довіряти
    такій історії?'
  - '[!epistemic-humility] Сучасна історіографія бачить у Величкові не стільки джерело фактів, скільки джерело про світогляд
    епохи.'
  - '[!decolonization] Створюючи монументальну історію Козаччини, Величко утверджував тяглість української державності всупереч
    імперським наративам про «Малоросію».'
  section: 'Конфліктна карта: Літописець чи письменник?'
  words: 700
- points:
  - 'Оригінальний уривок з Літопису Величка: опис однієї з подій Руїни.'
  - 'Глосарій: розбір архаїчних форм, канцеляризмів та історичних реалій, що згадуються в тексті.'
  - 'Граматичні нотатки: аналіз синтаксичних конструкцій, нетипових для сучасної мови (напр., форми минулого часу, інфінітивні
    звороти).'
  - 'Контекст: хто є акторами в цьому уривку? Як Величко зображує їхні мотивації?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз мовних шарів у тексті Величка: де він використовує «просту мову», а де — «книжну»?'
  - 'Полонізми: розбір прикладів адміністративної та військової лексики польського походження.'
  - 'Латинізми та німецькі запозичення: як європейська освіта автора вплинула на його мову? Риторичні фігури, юридична термінологія.'
  - 'Церковнослов''янізми: маркери високого стилю, біблійні алюзії та їхня функція в тексті.'
  - '[!myth-buster] Мова Величка — не «засмічена», а є типовим зразком багатомовності освіченої людини тієї епохи. Це доказ
    інтегрованості України в європейський культурний простір.'
  section: 'Мовний контакт: Полонізми, латинізми та церковнослов''янізми'
  words: 1200
- points:
  - 'Граматична лабораторія: деконструкція одного надскладного речення Величка. Визначення головних та підрядних частин, аналіз
    зв’язків між ними.'
  - 'Стилістична лабораторія: порівняння стилю Величка та Самовидця (іншого літописця Руїни). Як по-різному вони описують
    ту саму подію?'
  - 'Етимологічний трек: простежити шлях одного слова з тексту (напр., «респект», «нація», «артикул») від мови-донора до літопису
    Величка і до його сучасного значення.'
  section: 'Мовна лабораторія: Синтаксис Бароко'
  words: 1000
- points:
  - 'Повернення до розминки: як тепер ви можете відповісти на питання про «козацьке бароко»?'
  - 'Лінгвістичний підсумок: що мова Величка говорить нам про стан української літературної мови на початку XVIII століття?'
  - 'Зв''язок уперед: як барокова традиція історіописання вплинула (або не вплинула) на «Історію Русів» та подальшу українську
    історичну думку?'
  section: Дискусія та підсумок
  words: 600
focus: Velychko's method, sources, and baroque architectural structure
level: RUTH
module: ruth-084
objectives:
- Аналізувати працю Величка як історичне джерело та як літературний артефакт епохи бароко.
- Ідентифікувати та класифікувати полонізми, латинізми та церковнослов'янізми в тексті XVIII століття.
- Деконструювати складний синтаксис української барокової прози.
- Формулювати аргументовану позицію щодо ролі суб'єктивності в домодерній історіографії.
