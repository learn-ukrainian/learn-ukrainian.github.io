activity_hints:
- description: Перевірка розуміння обох позицій дебату про мову Острозької Біблії та мотивацію Івана Федорова. Чия це теза
    — Огієнка чи Житецького?
  focus: Розуміння конфліктної карти
  items: 8
  type: quiz
- description: 'Вставте в речення з післямови Федорова правильні терміни: "друкованіе", "коштом", "ізводъ", "начертаніє".'
  focus: Лексика друкарства
  items: 8
  type: fill-in
- description: 'Заповніть таблицю: "Поняття", "Церковнослов’янський відповідник", "Форма в простій мові", "Сучасний відповідник".
    Проаналізуйте один рядок на вибір.'
  focus: Порівняльний аналіз регістрів
  type: note
- description: 'На основі аналізу післямови до «Апостола» напишіть коротке есе (400-600 слів) на тему: "Як цей текст доводить
    існування розвиненої української писемної мови та національної самосвідомості за 200 років до Котляревського?"'
  focus: 'Есе: Доказ існування'
  type: note
cefr_min: C2
connects_to:
