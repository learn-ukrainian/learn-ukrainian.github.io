- herasym-smotrytsky-poems
content_outline:
- points:
  - 'Провокація: Перед вами фрагмент післямови до «Апостола» 1574 року: "Ізложен бист початком ѿ воплощенїа господа бога и
    спаса нашего Іисуса Христа, в тысяща[л]ное пѧть сотъ седмь десѧть и третее лѣто". Який це рік за сучасним календарем,
    і чому формулювання таке складне?'
  - Термін "друкарня" — коли він з'явився і що використовували до нього? Порівняння з латинським "officina typographica" та
    церковнослов’янським "домъ печати".
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Острозької Біблії — це церковнослов''янська «високого стилю» чи спроба її наближення до живої народної
    мови? Позиції Огієнка та Житецького.'
  - 'Дебат 2: Іван Федоров — просвітитель-патріот чи мандрівний ремісник-прагматик? Аналіз його знаменитої фрази про «духовні
    зерна» як місійної декларації vs реалії конкуренції та пошуку патронів.'
  - '[!decolonization] Факт друку кириличних книг у XVI ст. є самодостатнім доказом існування розвиненої писемної культури
    та мовної норми, що спростовує імперський наратив про «неіснування» української мови до XIX ст.'
  - '[!epistemic-humility] Тогочасні автори не мислили в сучасних категоріях "національна мова". Терміни «руська мова» та
    «проста мова» мали плаваюче значення. Наша класифікація є ретроспективною.'
  section: 'Конфліктна карта: Мова друку: божественна чи народна?'
  words: 700
- points:
  - 'Первинний текст: післямова («О съвершенїи сея книги») до львівського «Апостола» Івана Федорова (1574) — розповідь про
    створення друкарні у Львові.'
  - 'Глосований розбір: лексика друкарства ("друкованіе", "начертаніє", "ізводъ"), фінансування ("тщанієм і пособієм", "коштом"),
    самоідентифікація автора ("Іоаннъ Федоровичь друкарь москвитинъ").'
  - 'Граматичні нотатки: форми двоїни ("руцѣ"), аорист та імперфект у наративі Федорова. Чим його мова відрізняється від сучасної?'
  - '[!decolonization] Аналіз самоназви «москвитин» у контексті XVI ст. як вказівки на географічне походження (з Московії),
    а не політичної ідентичності, тотожної сучасній російській.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми як основа «високого» богословського стилю: "благодать", "воскресеніє", "святий дух". Це мова вічності,
    мова Бога.'
  - 'Полонізми як мова техніки та адміністрації: "друкарня", "аркуш", "кошт", "вряд". Чому для нових технологій та правових
    реалій брали слова з польської?'
  - 'Латинізми та грецизми: міжнародна мова науки, що проникала через польське посередництво: "типографія", "граматика", "катавасія",
    "папір".'
  - '[!myth-buster] Мова першодруків — це не «засмічена» мова, а свідомий синтез кількох мовних пластів для різних комунікативних
    завдань. Це ознака сили та інтегрованості в європейський контекст, а не слабкості.'
  section: 'Мовний контакт: Сплав регістра: слов''янізми, полонізми та грецизми'
  words: 1200
- points:
  - 'Порівняльна лабораторія: одне й те саме поняття трьома регістрами. Таблиця: Церковнослов''янська | Мова післямови (проста
    мова) | Сучасна українська.'
  - 'Приклади для аналізу: "Бог", "книга", "друкувати", "рік", "місто". Простежте зміни у фонетиці, лексиці та морфології.'
  - 'Етимологічний слід: слово "тысячъ". Його походження та зникнення з активного вжитку на користь форми "тисяча". Зв''язок
    з кириличною системою числення.'
  - 'Стилістичний аналіз: розбір післямови Федорова. Де він говорить як монах, де — як ремісник, а де — як купець, що шукає
    ринок збуту? Визначте лексичні маркери кожного регістра.'
  section: 'Мовна лабораторія: Анатомія колофону'
  words: 1000
- points:
  - 'Повернення до розминки: тепер ви можете не просто розшифрувати дату, а й пояснити, хто, де, якою мовою і навіщо написав
    цей текст, і в якому культурному та політичному контексті це відбувалося.'
  - 'Лінгвістичний підсумок: Як друкарство вплинуло на українську мову? З одного боку, воно її стандартизувало та канонізувало.
    З іншого — законсервувало певні архаїчні форми.'
  - 'Зв''язок уперед: лексика та синтаксис першодруків — що з них залишилося в поезії бароко, що в "Енеїді" Котляревського,
    а що — в сучасній літературній мові?'
  section: Дискусія та підсумок
  words: 600
focus: 'The language of early printing: colophon terms ("друкарня", "тысяч"), the language contact situation (Church Slavonic,
  Polish, Latin), and the role of printing in the formation of the Ukrainian literary standard.'
level: RUTH
module: ruth-043
objectives:
- Аналізувати соціолінгвістичні дебати навколо мови українських першодруків XVI століття
- Читати та інтерпретувати автентичний текст ("простою мовою") з лінгвістичним коментарем
- Ідентифікувати та класифікувати мовні контакти (слов’янізми, полонізми, латинізми) у тексті
- Пояснювати роль друкарства у процесах стандартизації та розвитку української літературної мови
