activity_hints:
- description: Перевірка знань про дебати довкола мови (церковнослов'янська vs проста мова) та канону Псалмів.
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Порівняйте уривок Псалма трьома мовами (церковнослов'янською, руською, сучасною українською) та опишіть ключові
    відмінності в граматиці та лексиці.
  focus: 'Порівняльний аналіз: три мови'
  type: note
- description: 'Написати есе (400-600 слів) на тему: "Як аналіз перекладів Псалмів доводить існування української писемної
    мови до Котляревського?"'
  focus: 'Есе: Доказ безперервності'
  type: note
cefr_min: C2
connects_to:
- prophets-isaiah
- genesis-creation
content_outline:
- points:
  - 'Провокація: рядок з Псалма церковнослов''янською поруч із сучасним українським перекладом. Що змінилося, а що залишилося
    незмінним?'
  - Що таке "псальма" в руській традиції? Літургійний текст, приватна молитва чи поетичний взірець для наслідування?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Церковнослов''янська vs ''проста мова''. Чи можна було перекладати Святе Письмо ''народною'' мовою? Полеміка
    навколо Пересопницького Євангелія як контекст.'
  - 'Дебат 2: Канон vs апокриф. Як визначалося, які псалми ''правильні''? Вплив католицьких (польських) та православних (московських)
    друків.'
  - '[!decolonization] Факт перекладів та переспівів Псалмів ''простою мовою'' — це прямий доказ безперервності української
    писемної традиції та спростування міфу про ''селянський діалект''.'
  - '[!epistemic-humility] Межі між ''високою'' слов''янською та ''простою'' мовою були нечіткими. Автори часто змішували
    регістри для стилістичного ефекту.'
  section: 'Конфліктна карта: Чия мова ''богоугодніша''?'
  words: 700
- points:
  - 'Первинний текст: Фрагмент Давидових Псалмів (напр., Псалом 50, ''Помилуй мя, Боже'') з видання XVI-XVII ст.'
  - Оригінальний текст (нормалізована орфографія) з паралельним сучасним українським перекладом (Огієнко/Хоменко).
  - 'Глоси та граматичні нотатки: архаїчні форми (аорист, імперфект), лексичні розбіжності, синтаксичні конструкції.'
  - 'Контекст: Як Псалми використовувалися в літургії? Хто і як їх читав/співав? Роль у приватній побожності.'
  - '[!decolonization] Аналіз показує, що руська мова мала повний набір засобів для передачі складної поетичної та теологічної
    думки.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: як відрізнити ''високий штиль'' від базової лексики? Слова, що залишились (Господь, спасення) vs.
    ті, що зникли.'
  - 'Полонізми: Вплив польських перекладів (Псалтир Кохановського). Чи є полонізми ''засміченням'' чи збагаченням мови?'
  - 'Латинізми: Чи проникала латинська термінологія єзуїтських колегіумів у релігійні тексти? Аналіз лексики.'
  - '[!myth-buster] Уявлення про ''чисту'' мову є хибним. Мова Псалмів — це динамічний гібрид, де кожен шар (слов''янський,
    польський, руський) виконує свою функцію.'
  section: 'Мовний контакт: Божественне і Земне в мові Псалмів'
  words: 1200
- points:
  - 'Порівняльна лабораторія: Один вірш Псалма трьома мовами: церковнослов''янською, ''простою мовою'' (з тексту модуля) та
    сучасною українською. Відстежити граматичні та лексичні зміни.'
  - 'Стилістична лабораторія: Аналіз синонімічних рядів. Коли автор обирає слов''янізм, коли полонізм, а коли рутенізм? Якого
    ефекту він досягає?'
  - 'Етимологічний слід: Простежити шлях 3-4 ключових слів з тексту (напр., ''душа'', ''покаяння'', ''милість'') від праслов''янських
    коренів до сучасного вжитку.'
  - 'Палеографічна вправа (опційно): Фрагмент рукописного Псалтиря — спроба розібрати кілька слів у скорописі.'
  section: 'Мовна лабораторія: Реконструкція руської мови'
  words: 1000
- points:
  - 'Повернення до розминки: Чим є різниця між церковнослов''янським та руським Псалмом — лише перекладом чи чимось більшим?'
  - 'Головний висновок: Як аналіз мови Псалмів доводить безперервність та багатство української літературної традиції задовго
    до Котляревського?'
  - 'Зв''язок уперед: Як руська літургійна мова вплинула на формування високого стилю нової української літератури (Шевченко,
    Куліш)?'
  section: Дискусія та підсумок
  words: 600
focus: Літургійне використання Псалмів у руську добу, аналіз поетичної структури, порівняння церковнослов'янських та 'простомовних'
  версій, та роль Псалмів як доказу безперервності української писемної традиції.
level: RUTH
module: ruth-037
objectives:
- Аналізувати мовні та стилістичні відмінності між церковнослов'янськими та руськими версіями Псалмів
- Ідентифікувати та класифікувати мовні контакти (полонізми, латинізми, слов'янізми) у руських релігійних текстах
- Пояснювати соціолінгвістичний контекст полеміки щодо перекладу Святого Письма "простою мовою"
- Використовувати аналіз тексту як доказ безперервності та багатства української писемної традиції до XIX століття
