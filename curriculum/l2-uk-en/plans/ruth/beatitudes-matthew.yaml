activity_hints:
- description: Перевірка позицій щодо статусу «простої мови» та причин перекладу Святого Письма. Чия це теза? Про що йдеться?
  focus: Розуміння соціолінгвістичних дебатів
  items: 5
  type: quiz
- description: У реченнях з тексту визначити, чи є виділене слово церковнослов'янізмом, полонізмом чи народним словом.
  focus: Ідентифікація мовних шарів
  items: 6
  type: fill-in
- description: 'Заповніть таблицю, порівнюючи один вірш із Заповідей Блаженства у трьох версіях: церковнослов''янській, руській
    (Пересопниця) та сучасній українській. Зазначте лексичні та граматичні відмінності.'
  focus: Порівняльний аналіз перекладів
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: «Як аналіз фрагменту з Пересопницького Євангелія спростовує тезу про
    те, що українська мова не існувала до XIX століття?»'
  focus: 'Есе: Існування до існування'
  type: note
cefr_min: C2
connects_to:
- lords-prayer
- peresopnytsia-gospel-phenomenon
content_outline:
- points:
  - 'Провокація: «Блаженні» чи «щасливі»? Чому сучасна українська мова уникає прямого перекладу ключового слова Заповідей
    Блаженства?'
  - 'Перше знайомство: два рядки з Пересопницького Євангелія (Матвій 5:3) — «Блажени суть убогыи духомъ, и Богомъ оубозии,
    понеже ихъ есть царство нбскоє». Що в цьому реченні зрозуміло, а що ні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Пересопницького Євангелія — це «проста мова», «руська мова», чи «церковнослов''янська з елементами народної»?
    Політичне значення термінів.'
  - 'Дебат 2: Навіщо було перекладати? Гуманістична потреба в зрозумілому тексті vs. вплив Реформації та загроза для сакрального
    статусу церковнослов''янської.'
  - '[!decolonization] Сам факт перекладу Біблії на живу народну мову в XVI ст. спростовує імперський наратив про «неіснування»
    української мови до XIX ст.'
  - '[!epistemic-humility] Точна класифікація мови є складною; це гібридний текст, що свідомо поєднує різні регістри для досягнення
    нової мети — сакрального тексту зрозумілою мовою.'
  section: 'Конфліктна карта: Переклад Святого Письма — адаптація чи святотатство?'
  words: 700
- points:
  - 'Оригінальний текст: Фрагмент Заповідей Блаженства з Пересопницького Євангелія (транслітерований).'
  - 'Паралельний переклад: Текст оригіналу поруч із сучасним перекладом (І. Огієнко) для виявлення розбіжностей.'
  - 'Глоси та граматичні нотатки: пояснення архаїчних форм (двоїна, аорист/імперфект, кличний відмінок), застарілих слів та
    синтаксичних конструкцій.'
  - 'Контекст: Пересопницьке Євангеліє як рукописна пам''ятка, його замовники (Анастасія Заславська), виконавці та подальша
    доля.'
  - '[!decolonization] На цьому Євангелії присягають президенти України — прямий зв''язок між державою XVI ст. та сучасною.'
  section: 'Текст: Читання та переклад (Матвій 5:3-12)'
  words: 1300
- points:
  - 'Церковнослов''янізми: високий, сакральний регістр. Слова як «блаженний», «царство», «праведність», «заповідь». Чому їх
    зберегли?'
  - 'Полонізми та латинізми: вплив західних сусідів, адміністративна та абстрактна лексика.'
  - 'Українізми (народна мова): слова побутового вжитку, що надають тексту зрозумілості та вкоріненості в місцевий контекст.
    Наприклад, «лагідні».'
  - '[!myth-buster] Мовна «чистота» — це міф. Пересопницьке Євангеліє демонструє, як жива мова творчо засвоює запозичення,
    створюючи багатий і гнучкий інструмент.'
  section: 'Мовний контакт: Лексичні шари Пересопниці'
  words: 1200
- points:
  - 'Порівняльна лабораторія: Аналіз однієї заповіді (напр., Матвій 5:5) у трьох версіях: оригінальна церковнослов''янська
    (Остромирове Євангеліє), руська (Пересопницьке Євангеліє), та сучасна українська (переклад Огієнка). Які зміни відбулися
    на кожному етапі?'
  - 'Етимологічна лабораторія: Простежити шлях слова «блаженний» від праслов''янського *bolgъ («добрий, багатий») до його
    сакралізації в церковнослов''янській та його значення сьогодні.'
  - 'Граматична лабораторія: Аналіз форм двоїни (якщо є у фрагменті) або специфічних конструкцій з давальним відмінком у тексті.
    Як ці функції виконує сучасна мова?'
  section: 'Мовна лабораторія: Слідами «блаженства»'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, чому «блаженні», а не «щасливі»? Студент формулює відповідь, спираючись на богословський,
    історичний та лінгвістичний контекст.'
  - 'Лінгвістичний висновок: Пересопницьке Євангеліє — це не просто переклад, а свідомий акт кодифікації «простої мови» для
    найвищих функцій.'
  - 'Зв''язок із сьогоденням: Як досвід Пересопниці може допомогти зрозуміти сучасні мовні дебати в Україні?'
  - 'Підсумкове есе: Як текст Заповідей Блаженства з Пересопницького Євангелія доводить існування та високий рівень розвитку
    української мови за 250 років до Котляревського?'
  section: Дискусія та підсумок
  words: 600
focus: Лінгвістичний та культурний аналіз Заповідей Блаженства з Пересопницького Євангелія, фокус на понятті «блаженство»
  vs «щастя» та мовних контактах у тексті
