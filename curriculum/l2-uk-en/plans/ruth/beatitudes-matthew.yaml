objectives:
- Аналізувати соціолінгвістичний контекст перекладу Святого Письма на «просту мову» в XVI столітті
- Розрізняти лексичні шари (церковнослов'янізми, полонізми, народна лексика) у тексті Пересопницького Євангелія
- Порівнювати граматичні та лексичні особливості руської мови XVI ст. із сучасною українською на прикладі Заповідей Блаженства
- Формулювати аргументовану позицію щодо ролі Пересопницького Євангелія у становленні української літературної мови
