activity_hints:
- description: 'Розрізнення позицій у дебатах. Чия це теза: що Конституція Орлика — справжня конституція, чи що це феодальний
    договір? Визначити позицію за цитатою.'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставити в речення з тексту модуля правильні терміни: пакт, уряд, старшина, резолюція, право.'
  focus: Юридична лексика руської доби
  items: 5
  type: fill-in
- description: 'Подано два тексти: фрагмент з «Пактів і Конституцій...» про суди + фрагмент із сучасної Конституції України
    про судову владу. Порівняйте: що спільного, що відрізняється, які ідеї є спадковими?'
  focus: 'Джерельний аналіз: текст Орлика vs сучасний закон'
  type: note
- description: Напишіть коротке есе (400-600 слів), яке спростовує тезу, що до Котляревського не існувало української літературної
    та юридичної мови. Використовуйте матеріал з цього модуля як доказову базу.
  focus: 'Есе: Аргумент для скептика'
  type: note
