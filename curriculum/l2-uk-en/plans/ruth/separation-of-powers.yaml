content_outline:
- points:
  - 'Провокація: фраза з документа XVIII ст. «...аби гетьман сам не мав права ... судити» поруч із статтею з сучасної Конституції
    України. Що спільного і що відмінного в розумінні меж влади тоді й тепер?'
  - 'Ключовий термін: «пакти». Що це означає у контексті козацької держави — договір з народом, угода еліт чи щось інше?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Конституція Орлика — це перша українська конституція в сучасному розумінні, чи радше середньовічний «договір
    обмеження» монарха (як Magna Carta)? [!epistemic-humility]'
  - 'Дебат 2: Чиї інтереси захищали ці «пакти»? Це був ранній прояв народного суверенітету, чи козацька старшина просто обмежувала
    владу гетьмана, щоб посилити свою власну?'
  - '[!decolonization] Існування такого документу спростовує імперський наратив про «нездатність українців до державотворення».
    Це доказ розвиненої політико-правової культури.'
  section: 'Конфліктна карта: Договірна держава чи олігархія?'
  words: 700
- points:
  - 'Первинний текст: Стаття VI з «Пактів і Конституцій...» Пилипа Орлика, яка встановлює залежність гетьмана від Генеральної
    ради.'
  - 'Глосарій: розбір термінів «Генеральна Рада», «старшина», «резолюція», «ординанс».'
  - 'Граматичний коментар: аналіз синтаксису «книжної мови» — довгі речення, дієприкметникові звороти, високий стиль.'
  - 'Паралельний переклад: порівняння оригінального тексту статті з її перекладом сучасною українською юридичною мовою. [!decolonization]'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз запозичень з польської мови в адміністративній лексиці («уряд», «скарб», «посол»). Чи були українські
    відповідники?'
  - 'Латинізми: дослідження слів латинського походження, що прийшли через польську освіту («конституція», «републіка», «пакт»,
    «апеляція»).'
  - 'Церковнослов’янізми: роль церковнослов’янської мови у формуванні високого, урочистого стилю преамбули та клятв.'
  - '[!myth-buster] Запозичення юридичної лексики — це не ознака «нерозвиненості» мови, а нормальний процес інтеграції в європейський
    правовий простір.'
  section: 'Мовний контакт: Полонізми та латинізми в мові права'
  words: 1200
- points:
  - 'Порівняльна лабораторія: порівняння статті про суд з Конституції Орлика, Литовського статуту та сучасної Конституції
    України. Простежити еволюцію поняття «незалежний суд».'
  - 'Етимологічний слід: як слово «право» змінило своє значення від «прямий/правильний» у давньоруській до «сукупність законів»
    та «суб''єктивне право» в руській та сучасній мові.'
  - 'Стилістична лабораторія: аналіз різних мовних регістрів в одному документі — висока риторика преамбули vs. чіткі формулювання
    статей.'
  section: 'Мовна лабораторія: Аналіз юридичної термінології'
  words: 1000
- points:
  - 'Повернення до розминки: тепер, знаючи контекст, як ми можемо інтерпретувати фразу про обмеження влади гетьмана?'
  - 'Лінгвістичний висновок: як мова (через запозичення, синтаксис, вибір стилю) ставала інструментом для побудови держави
    та обмеження влади.'
  - 'Зв''язок із сучасністю: як ідеї, закладені в «Пактах і Конституціях...», актуальні для сучасної України, особливо в контексті
    боротьби за верховенство права?'
  section: Дискусія та підсумок
  words: 600
focus: 'Обмеження влади гетьмана в козацьку добу: мова та практика на прикладі Пактів і Конституцій Пилипа Орлика'
