objectives:
- Аналізувати, як правові концепції (зокрема, обмеження влади) виражалися в українській книжній мові XVIII століття
- Розрізняти полонізми, латинізми та церковнослов’янізми в юридичному тексті руської доби та пояснювати їхню функцію
- Критично оцінювати дебати щодо природи «Пактів і Конституцій...» Пилипа Орлика
- Аргументовано доводити тяглість української державотворчої та правової традиції, використовуючи першоджерела
