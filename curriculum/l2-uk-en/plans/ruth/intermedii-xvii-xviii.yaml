objectives:
- Аналізувати інтермедію як соціокультурний феномен та доказ життєздатності української мови у XVII-XVIII ст.
- Розрізняти мовні регістри (високий, низький) у текстах руської доби та пояснювати їхню функцію.
- Ідентифікувати полонізми, латинізми та церковнослов'янізми в тексті та аналізувати їхнє сатиричне чи технічне використання.
- Критично оцінювати використання стереотипних персонажів як відображення соціальної реальності та як інструмент комедії.
