content_outline:
- points:
  - 'Провокація: Йде XVII століття, у колегіумі ставлять серйозну латинську драму, але найгучніший сміх в аудиторії — українською.
    Чому?'
  - Фрагмент діалогу з інтермедії, де селянин сперечається зі шляхтичем. Студент має вгадати, хто є хто, лише за стилем мовлення.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Інтермедії — це повноцінна література чи «низький» жанр для розваги? Позиція 1: Це перші зразки живої народної
    мови в драматургії. Позиція 2: Це лише примітивна буфонада, що не має літературної вартості.'
  - 'Дебат 2: Стереотипи на сцені (селянин, козак, єврей, поляк) — це точне відображення суспільства чи груба карикатура?
    Як розрізнити соціальну сатиру та ксенофобію?'
  - '[!decolonization] Інтермедії — це найпотужніший доказ того, що українська мова існувала як розвинена, жива система задовго
    до Котляревського, спростовуючи імперський міф про її «селянське» походження.'
  - '[!epistemic-humility] Ми не можемо точно знати, наскільки текст інтермедії відтворював реальну розмовну мову, а наскільки
    був стилізований для сцени.'
  section: 'Конфліктна карта: Мова сміху — мова народу?'
  words: 700
- points:
  - 'Оригінальний текст інтермедії (у нормалізованій орфографії): читання сцени з ярмарку, де перетинаються різні соціальні
    типи.'
  - Глоси для архаїчних форм та слів, що вийшли з ужитку (напр., специфічні тогочасні грошові одиниці, адміністративні терміни).
  - 'Граматичні нотатки: аналіз форм двоїни, залишків старих відмінювань, що вже зникли в сучасній мові, але ще є в тексті.'
  - 'Контекст: Де і коли виконувалися ці п''єси? Між актами серйозної шкільної драми латиною чи церковнослов''янською. Інтермедія
    була мовним «ковтком свіжого повітря» для глядачів.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз лексики, пов''язаної з адміністрацією, побутом, модою. Чи це просто запозичення, чи сатиричне зображення
    персонажа-поляка?'
  - 'Латинізми та церковнослов''янізми: як «висока» лексика використовується в комічному контексті? Пародіювання «вченості»
    через неправильне вживання латинських фраз.'
  - 'Діалектизми: виявлення в текстах рис різних українських говорів. Спроба локалізувати автора чи місце постановки за мовними
    ознаками.'
  - '[!myth-buster] Мовна «чистота» — це міф. Інтермедії показують, що жива мова завжди є гібридом, вона активно вбирає і
    перетравлює елементи з мов-сусідів, і це є ознакою її сили, а не слабкості.'
  section: 'Мовний контакт: Сміх трьома мовами'
  words: 1200
- points:
  - 'Стилістичний лаб: аналіз розмовних маркерів у письмовому тексті. Як драматург передає емоції, паузи, спонтанність мовлення
    (вигуки, повтори, обірвані фрази)?'
  - 'Порівняльний лаб: одне й те саме поняття (напр., «гроші», «кохання», «бійка») у трьох регістрах: церковнослов''янською
    (з релігійної драми), «простою мовою» (з інтермедії) та сучасною українською. Простежити еволюцію.'
  - 'Етимологічний трек: взяти 5-7 слів з інтермедії, що збереглися в сучасній мові (особливо лайливих чи жаргонних), і простежити
    їхню етимологію та зміну значення.'
  section: 'Мовна лабораторія: Відтворення живого мовлення'
  words: 1000
- points:
  - 'Повернення до розминки: то чому сміх був українською? Студент формулює відповідь: бо це була мова реального життя, емоцій
    та гумору, на противагу штучній «високій» мові драми.'
  - 'Лінгвістичний підсумок: що інтермедії говорять нам про стан української мови у XVII-XVIII ст.? Це мова, що вже має усталену
    граматичну структуру, багатющий лексичний фонд і здатна обслуговувати всі сфери життя.'
  - 'Зв''язок із сучасністю: чи можна порівняти тогочасні інтермедії з сучасними українськими комедійними шоу чи стендапом?
    Що спільного, а що відмінного у функціях та мовних засобах?'
  section: Дискусія та підсумок
  words: 600
focus: Vernacular comedy between acts of high drama — the closest we get to hearing how Ukrainians actually spoke
