content_outline:
- points:
  - 'Провокація: «Річ проста, учені в Греції, у Римі і у нас пишуть не по-простому…» — цитата з полемічного тексту XVI ст.
    Чому автор протиставляє «просту» і «вчену» мови? Якою мовою, на вашу думку, варто було друкувати Біблію?'
  - 'Порівняння: два речення — одне з Острозької Біблії, інше — його сучасний український переклад. Що змінилося в граматиці
    та лексиці? Що залишилося незмінним?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою написана Острозька Біблія? Це церковнослов’янська мова? «Проста мова»? Чи «руська»? Чому вибір мови
    для друку був політичним актом?'
  - 'Дебат 2: Острозький — меценат-патріот чи прагматичний політик? Чи була Острозька академія щирим культурним проєктом,
    чи інструментом для збереження впливу православної шляхти у Речі Посполитій?'
  - '[!decolonization] Острозький проєкт — це удар по імперському міфу, що українська культура до ХІХ ст. була виключно «народною»
    і «селянською». Це доказ існування високої інтелектуальної традиції.'
  - '[!epistemic-humility] Точна класифікація мови острозьких видань — досі предмет наукових дискусій. Межі між «церковнослов''янською
    української редакції» та «простою мовою» були розмитими.'
  section: 'Конфліктна карта: Мова, віра і влада'
  words: 700
- points:
  - 'Першоджерело: Фрагмент передмови князя Василя-Костянтина Острозького до Острозької Біблії (1581).'
  - 'Оригінальний текст з паралельним глосарієм: аналіз ключових термінів, архаїчних форм та риторичних фігур.'
  - 'Граматичний коментар: особливості синтаксису, вживання часів та відмінків, що відрізняються від сучасної мови.'
  - 'Контекст: Чому друкована Біблія національною мовою була революцією? Роль друкарні Івана Федорова.'
  - '[!decolonization] Видання Біблії церковнослов''янською мовою, але зрозумілою для руського населення, було відповіддю
    на культурну експансію католицької Польщі та водночас утвердженням власної ідентичності, відмінної від московської.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз мови острозьких полемічних текстів: свідоме змішування різних мовних шарів як риторичний прийом.'
  - 'Церковнослов''янізми: високий стиль, біблійні цитати, літургійна лексика. Як вони створювали авторитет тексту?'
  - 'Полонізми: адміністративна, військова та побутова лексика. Це результат панування польської мови чи свідоме запозичення
    для опису реалій Речі Посполитої?'
  - 'Латинізми та грецизми: наукова та філософська термінологія, що проникала через польську освіту та прямі контакти з європейськими
    університетами.'
  - '[!myth-buster] Мовна «чистота» — це міф. Мова острозьких інтелектуалів була гібридною, і саме це робило її живою та здатною
    обслуговувати всі сфери життя — від богослов’я до юриспруденції.'
  section: 'Мовний контакт: Острозький плавильний котел'
  words: 1200
- points:
  - 'Порівняльний стіл: один і той самий біблійний уривок (напр., Псалом 22) у чотирьох версіях: 1) чистою церковнослов''янською
    (московський ізвод), 2) в Острозькій Біблії, 3) у Пересопницькому Євангелії, 4) у сучасному перекладі (Огієнко/Турконяк).'
  - 'Завдання: студент відстежує, як змінюється лексика, синтаксис та морфологія від одного тексту до іншого. Які форми ближчі
    до сучасної української? Які — до церковної традиції?'
  - 'Етимологічний трек: простежити шлях кількох слів з передмови Острозького. Наприклад, «благочестя», «отечество», «народ».
    Як змінювалося їхнє значення?'
  section: 'Мовна лабораторія: Порівняльний аналіз регістрів'
  words: 1000
- points:
  - 'Повернення до розминки: Чому Острозький та його коло обрали саме такий мовний «компроміс» для друку Біблії? Студент формулює
    відповідь, використовуючи знання про політичний та культурний контекст.'
  - 'Лінгвістичний підсумок: Що Острозька Біблія та діяльність академії говорять нам про стан української мови в XVI столітті?
    Це доказ її занепаду чи, навпаки, розвитку?'
  - 'Зв''язок із сучасністю: Як есе з v3 питало: як цей текст доводить існування української мови до Котляревського? Сформулюйте
    3-4 аргументи для сучасного скептика.'
  section: Дискусія та підсумок
  words: 600
focus: 'The cultural and political project of Prince Vasyl-Kostiantyn Ostrozky: the Ostrih Academy and the Ostroh Bible as
  tools for creating a distinct Ruthenian intellectual and linguistic space, navigating between Polish Catholic and Muscovite
  Orthodox pressures.'
