objectives:
- Аналізувати роль князя Острозького як культурного мецената та прагматичного політичного діяча
- Розрізняти мовні шари (полонізми, латинізми, церковнослов'янізми) в текстах острозького осередку
- Критично оцінювати Острозьку Біблію як пам'ятку мови, культури та політичної думки
- Формулювати аргументи на основі історичних текстів для спростування сучасних імперських міфів
