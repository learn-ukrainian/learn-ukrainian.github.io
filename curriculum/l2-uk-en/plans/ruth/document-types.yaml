objectives:
- Аналізувати відмінності між юридичним, адміністративним та особистим письмом руської доби
- Визначати полонізми, латинізми та церковнослов'янізми в історичних документах та пояснювати їх функцію
- Розрізняти поняття «проста мова» та «канцелярський стиль» у контексті XVI-XVII ст.
- Аргументовано спростовувати міф про відсутність розвиненої української мови до Котляревського, використовуючи decolonization-аргументи
