content_outline:
- points:
  - 'Провокація: Порівняйте два уривки. Один — з королівського привілею, інший — з приватного листа купця. Які мовні риси
    (звертання, лексика, тон) негайно вказують на різницю в аудиторії та меті?'
  - 'Загадка: Термін «річ посполита». Що він означав для писаря XVII століття і як його значення трансформувалось до сьогодні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була тодішня ділова мова простою, «народною» (prosta mova), чи це був окремий, штучно створений «канцелярський»
    стиль, сповнений полонізмів та латинізмів?'
  - 'Дебат 2: Наскільки доступними були ці документи для пересічної людини? Чи була юридична мова інструментом влади та відокремлення
    еліт, чи засобом комунікації з народом?'
  - '[!decolonization] Існування розвиненої, стандартизованої юридичної та адміністративної мови в XVI-XVII ст. — прямий доказ
    спростування імперського наративу про «селянську говірку», що нібито не мала державницького потенціалу.'
  - '[!epistemic-humility] Межі між «простою мовою» та церковнослов’янською чи польською були розмитими. Автори часто свідомо
    змішували стилі для досягнення певного ефекту.'
  section: 'Конфліктна карта: Prosta Mova чи Канцелярський Стиль?'
  words: 700
- points:
  - 'Оригінальний текст (фрагмент універсалу): читання з нормалізованою орфографією.'
  - 'Глоси та коментарі: розбір ключових термінів (гетьман, полковник, скарб військовий, клейноди) та архаїчних граматичних
    форм.'
  - 'Структура універсалу: від преамбули до санкцій. Як побудова тексту відображає ієрархію влади та юридичну думку того часу?'
  - '[!decolonization] Універсали гетьманів — це не просто листи, а акти державного волевиявлення. Вони демонструють тяглість
    української державотворчої традиції.'
  section: 'Текст: Читання та переклад Універсалу Богдана Хмельницького'
  words: 1300
- points:
  - 'Полонізми: аналіз запозичень в адміністративній сфері (уряд, сейм, воєводство) та юридичній (позивати, скарга, вирок).
    Чи були українські відповідники?'
  - 'Латинізми: як терміни римського права (каденція, апеляція, мандат) потрапили в козацькі документи? Роль Києво-Могилянської
    академії.'
  - 'Церковнослов’янізми: використання високого, «книжного» стилю для надання тексту авторитету та сакральності, особливо
    в преамбулах.'
  - '[!myth-buster] Запозичення в юридичній термінології — це не ознака «неповноцінності» мови, а світова норма. Англійська
    юриспруденція насичена французькими словами, і це нікого не дивує. Важливо, ЯК мова адаптує ці запозичення.'
  section: 'Мовний контакт: Полонізми та Латинізми в Канцелярській Мові'
  words: 1200
- points:
  - 'Граматична лабораторія: порівняння синтаксису. Як відрізняється структура речення в короткому приватному листі та розлогому
    тексті привілею?'
  - 'Лексична лабораторія: аналіз лексики трьох документів — привілею, листа, універсалу. Складання трьох окремих лексичних
    хмар. Які слова є спільними, а які — унікальними для кожного типу?'
  - 'Стилістична лабораторія: ідентифікація різних «регістрів» в одному документі. Де автор використовує високий слов’янізм,
    де — побутову лексику, а де — польський адміністративний термін, і головне — навіщо?'
  section: 'Мовна лабораторія: Порівняльний аналіз трьох документів'
  words: 1000
- points:
  - 'Повернення до розминки: студент, використовуючи знання з модуля, дає розгорнуту відповідь про мовні відмінності між документами.'
  - 'Лінгвістичний висновок: руська канцелярська мова XVI-XVII ст. — це складна, багатошарова система з чітко визначеними
    функціональними стилями.'
  - 'Зв''язок у майбутнє: як лексика та синтаксис козацьких універсалів та литовських статутів вплинули на формування сучасної
    української юридичної та політичної термінології?'
  section: Дискусія та підсумок
  words: 600
focus: 'Аналіз юридичних, адміністративних та особистих документів руської доби: привілеї, листи, універсали. Мовні відмінності,
  юридична термінологія, суспільна роль.'
