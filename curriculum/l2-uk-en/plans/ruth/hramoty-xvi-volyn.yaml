content_outline:
- section: Вступ
  description: "Volhynia in the 16th century: between the Grand Duchy of Lithuania and the Polish Crown. Regional identity expressed through legal language."
- section: Основний матеріал
  description: "Reading Volhynian charters. Comparison with Galician and Kyivan documents — regional variation in Ruthenian. Polish influences vs preserved Ukrainian forms. Land disputes, family law, trade agreements."
- section: Практика
  description: "Identifying Volhynian dialectal features. Legal terminology comparison across regions. Document authentication methods."
- section: Підсумок
  description: "Regional charters as evidence of Ukrainian linguistic diversity within unity. Not one Ruthenian but many local variants — all recognizably Ukrainian."
