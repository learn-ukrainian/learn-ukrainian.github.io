content_outline:
- points:
  - 'Провокація: Термін «по-просту» у грамоті означає «народною мовою» чи «не формальною, не латинською»? Що це говорить про
    статус мови?'
  - 'Фрагмент судового акту XVI ст.: «...а хто би освабодити не хотів, той вину понесет». Що змінилося, а що залишилося в
    сучасному українському праві?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Волинська «проста мова» — це самобутній варіант української чи «зіпсована» полонізмами руська мова? Позиції
    мовознавців XIX та XXI ст.'
  - 'Дебат 2: Чому юридичні документи писалися «простою мовою», а не церковнослов''янською чи латиною? Боротьба за юридичну
    автономію від Польської Корони та Ватикану.'
  - '[!decolonization] Існування розвиненої юридичної термінології та сталої канцелярської мови в XVI ст. — прямий доказ спростування
    тези про «нерозвиненість» української мови до XIX ст.'
  - '[!epistemic-humility] Межі між «полонізмом», «латинізмом» та «питомим словом» у тогочасному юридичному тексті часто розмиті
    та є предметом наукових дискусій.'
  section: 'Конфліктна карта: Мова закону чи закон мови?'
  words: 700
- points:
  - Читання та аналіз земельного акту (грамоти) з Волині XVI ст. (нормалізований текст).
  - 'Паралельний переклад ключових фрагментів сучасною українською юридичною мовою: порівняння структури речення, термінів,
    синтаксису.'
  - 'Глосарій архаїчних форм: «зверх помененого», «слушне вчинити», «лист особний».'
  - 'Контекст документа: хто позивач, хто відповідач, роль воєводи, процедура засвідчення.'
  - '[!decolonization] Документ демонструє безперервність української правової традиції, що сягає часів Руської Правди, а
    не є імпортом з Москви.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: лексика (уряд, маєток, скарга), синтаксичні конструкції (калька з "aby"), морфологія (вплив на відмінювання).'
  - 'Аналіз латинізмів: юридична термінологія, що прийшла через польське посередництво (апеляція, мандат, декрет).'
  - '[!myth-buster] Запозичення — не «засмічення», а збагачення та адаптація до нових реалій. Як волинські писарі адаптували
    іноземні терміни до руської граматики?'
  - 'Порівняння з іншими регіонами: у галицьких грамотах більше польського впливу, у київських — більше церковнослов’янського.
    Волинь як «зона контакту».'
  section: 'Мовний контакт: Полонізми та латинізми у волинському діловодстві'
  words: 1200
- points:
  - 'Порівняльний аналіз: один і той самий юридичний концепт (напр., «власність») у волинській грамоті, Литовському статуті
    та сучасних законах України.'
  - 'Етимологічний слід: простежити шлях терміну «воєвода» або «підсудок» від XVI ст. до сьогодні, фіксуючи зміни у значенні.'
  - 'Стилістичний аналіз: ідентифікація шарів лексики в одному реченні — питома руська, церковнослов''янська, польська, латинська.
    Яку функцію виконує кожен шар?'
  section: 'Мовна лабораторія: Регіональні особливості юридичної термінології'
  words: 1000
- points:
  - 'Повернення до розминки: що статус «простої мови» у волинських грамотах говорить нам про мовну свідомість руської шляхти
    XVI ст.?'
  - 'Лінгвістичний висновок: волинські грамоти — це доказ не лише існування української мови, але й її функціональної повноти
    та регіонального розмаїття.'
  - 'Зв''язок із сучасністю: як досвід мовного контакту та вироблення юридичної мови в XVI ст. може бути корисним для сучасної
    України у процесі очищення від русизмів?'
  section: Дискусія та підсумок
  words: 600
