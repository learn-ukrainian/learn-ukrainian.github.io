activity_hints:
- description: Кому належить теза? Визначити, чи є твердження позицією прихильників «самобутності» чи «полонізації» волинських
    грамот.
  focus: Розуміння соціолінгвістичних дебатів
  items: 4
  type: quiz
- description: 'Вставити у речення з тексту грамоти правильний термін: маєток, воєвода, слушне, по-просту, скарга.'
  focus: Архаїчна юридична лексика
  items: 5
  type: fill-in
- description: Порівняйте фрагмент волинської грамоти XVI ст. та статтю з сучасного Земельного кодексу України, що регулюють
    схоже питання. Визначте 3-5 ключових відмінностей у структурі, термінології та стилістиці.
  focus: 'Джерельний аналіз: правовий документ vs сучасний закон'
  type: note
- description: Напишіть коротке есе (400-600 слів) на тему «Як Волинські грамоти XVI століття спростовують імперський міф
    про українську мову як про «селянський діалект»?». Використовуйте докази з тексту модуля.
  focus: 'Есе: Аргумент на користь мови'
  type: note
