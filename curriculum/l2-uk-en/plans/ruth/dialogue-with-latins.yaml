content_outline:
- points:
  - 'Провокація: "Ліпше є у своїй убогій церкві з вірою правдивою спасіння чекати, аніж у папських костелах з кривою вірою
    на вічну погибель очікувати". Що означає "крива віра" і якою мовою написана ця образа?'
  - 'Ключове поняття: Унія. Це возз''єднання християн чи зрада православної віри? Ваша перша реакція?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова полеміки. Чи писали автори "простою мовою", щоб їх зрозумів народ, чи витонченою церковнослов''янською,
    щоб довести свою освіченість? Чи цей вибір був політичним?'
  - 'Дебат 2: Суть Унії. Це була щира спроба подолати розкол 1054 року, чи політичний інструмент Речі Посполитої для асиміляції
    русинів?'
  - '[!decolonization] Існування цих текстів, написаних розвиненою літературною мовою, спростовує імперський міф про те, що
    українська мова до XIX ст. була лише "селянським діалектом".'
  - '[!epistemic-humility] Мотивація православних єпископів, що підписали унію, була складною: вони прагнули отримати рівні
    права з католицькими єпископами та підвищити престиж своєї церкви.'
  section: 'Конфліктна карта: Віра чи Мова?'
  words: 700
- points:
  - Оригінальний текст (фрагмент з "Перестороги"), де автор застерігає русинів від переходу в унію.
  - 'Кероване читання: аналіз ключових слів — "латини", "відступник", "зрадник віри", "папеж", "єресь". Як вони створюють
    образ ворога?'
  - 'Граматичні нотатки: аналіз форм двоїни (двойственного числа) та аориста, що вже зникали з живої мови, але зберігались
    у книжній традиції для надання тексту авторитетності.'
  - '[!decolonization] Цей текст — не просто релігійний трактат, а рання форма національного самозахисту, де віра та мова
    стають маркерами ідентичності.'
  section: 'Текст: Читання та переклад "Перестороги" (1605)'
  words: 1300
- points:
  - 'Полонізми: аналіз юридичної та адміністративної лексики, запозиченої з польської ("справа", "уряд", "сейм"), для обговорення
    політичних наслідків унії.'
  - 'Латинізми: "Діалог з латинами" неможливий без латинської теологічної термінології ("аргумент", "догмат", "теологія",
    "субстанція"). Як автори-полемісти використовують їх — як нейтральні терміни чи як "зброю ворога"?'
  - 'Церковнослов''янізми: Високий стиль церковнослов''янської мови як інструмент для апеляції до авторитету традиції та Святого
    Письма. Як він контрастує з "простою мовою"?'
  - '[!myth-buster] Запозичення не були ознакою "засмічення" мови. Це був свідомий вибір, що дозволяв вести інтелектуальну
    дискусію на рівних з католицькою Європою, використовуючи спільний понятійний апарат.'
  section: 'Мовний контакт: Полемічна зброя'
  words: 1200
- points:
  - 'Порівняльний аналіз: Візьмемо одне речення з "Перестороги" і порівняємо його з перекладом на сучасну українську. Які
    граматичні конструкції та лексика змінилися найбільше?'
  - 'Стилістичний аналіз: Як автор використовує риторичні фігури, сарказм, емоційні звертання, щоб переконати читача? Знайдіть
    приклади інвектив (лайки) у тексті.'
  - 'Регістровий аналіз: У тексті одночасно існують високий (церковнослов''янізми), середній ("проста мова") та низький (побутова
    лексика) регістри. Навіщо автор їх змішує?'
  - 'Етимологічний слід: Простежте шлях слова "унія" — від латинського "unio" (єдність) до руського "унія" (символ релігійного
    розколу та зради).'
  section: 'Мовна лабораторія: Анатомія полемічного тексту'
  words: 1000
- points:
  - 'Повернення до розминки: що тепер для вас означає фраза "крива віра"? Поясніть її, використовуючи поняття мовного контакту,
    політичної боротьби та теологічної полеміки.'
  - 'Лінгвістичний висновок: що цей текст говорить нам про стан руської (староукраїнської) мови на межі XVI-XVII ст.? Чи була
    вона "єдиною", чи радше системою різних мовних практик?'
  - 'Зв''язок із сучасністю: Полеміка навколо надання Томосу про автокефалію ПЦУ у 2019 році. Які паралелі з подіями 1596
    року ви бачите в аргументах сторін?'
  section: Дискусія та підсумок
  words: 600
