content_outline:
- points:
  - 'Провокація: У Литовському статуті правителя називають «господар». Чому не «князь» чи «король»? Що це слово говорить нам
    про владу та мову того часу?'
  - 'Порівняння фрази: руською «Мають панове і шляхта ... вільно скаржити» та сучасною «Пани та шляхта мають ... вільно подавати
    позов». Що залишилось, що змінилось, і чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Проста мова» — це окрема мова, народний варіант церковнослов’янської, чи просто суміш? Позиції лінгвістів (Шевельов,
    Струмінський).'
  - 'Дебат 2: Литовський статут — це пам’ятка білоруської, української чи спільної «руської» мови? Політичні наслідки кожного
    з цих тверджень.'
  - '[!decolonization] Твердження про «спільну колиску» часто використовувалось для заперечення самостійності української
    мови. Статут доводить існування розвиненої правової мови задовго до Котляревського.'
  - '[!epistemic-humility] Точні мовні кордони в XVI ст. були розмиті. Мова Статуту — це наддіалектний канцелярський стандарт,
    що увібрав риси різних майбутніх східнослов’янських мов.'
  section: 'Конфліктна карта: Руська мова — чия вона?'
  words: 700
- points:
  - 'Первинний текст: Преамбула до Литовського статуту (1529) в оригінальній орфографії (з незначною нормалізацією).'
  - 'Кероване читання: Глоси до ключових термінів («вряд», «реч посполита», «головщина», «привілей»).'
  - 'Граматичний коментар: Пояснення архаїчних форм (аорист, двоїна, форми кличного відмінка).'
  - 'Паралельний переклад: Ключові статті Статуту руською та сучасною українською мовами для ілюстрації синтаксичних та лексичних
    змін.'
  - '[!decolonization] Статут, написаний руською, був правовою основою для земель від Балтійського до Чорного моря. Це доказ
    престижності та державотворчої функції мови.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: Аналіз польських запозичень в адміністративній («воєводство», «староста») та правовій («скарга», «позов»)
    термінології. Це результат політичного союзу чи культурного домінування?'
  - 'Латинізми: Як латинські правові концепти («статут», «конституція») потрапляли до руської мови, зазвичай через польське
    посередництво.'
  - 'Церковнослов’янізми: Роль «високого» церковнослов’янського стилю у преамбулі для надання документу урочистості та легітимності
    («благочестивий», «милістю Божою»).'
  - '[!myth-buster] Запозичення — це не «засмічення», а збагачення мови та ознака активних культурних контактів. Аналіз показує,
    як руська мова адаптувала іноземні концепти для власних потреб.'
  section: 'Мовний контакт: Полонізми, латинізми та церковнослов’янізми'
  words: 1200
- points:
  - 'Фонетична лабораторія: Простежуємо розвиток ікавізму (перехід «о», «е» в «і» у закритих складах) та повноголосся на прикладах
    з тексту Статуту.'
  - 'Морфологічна лабораторія: Аналіз залишків двоїни та зародження аналітичної форми майбутнього часу («буду писати» замість
    «писатиму»). Спрощення системи відмін.'
  - 'Порівняльна лабораторія: Те саме поняття (наприклад, «справедливість») у трьох варіантах: церковнослов’янському, руському
    (зі Статуту) та сучасною українською. Аналізуємо еволюцію.'
  section: 'Мовна лабораторія: Відмінності від давньоруської'
  words: 1000
- points:
  - 'Повернення до розминки: Чому «господар», а не «князь»? Студент формулює відповідь, спираючись на знання про політичний
    устрій ВКЛ та семантику слова.'
  - 'Лінгвістичний підсумок: Руська мова XVI ст. — це мова в стані диглосії, що балансує між трьома регістрами. Статут є унікальним
    свідченням цього стану.'
  - 'Зв’язок уперед: Як канцелярська мова Статуту вплинула на формування сучасної української юридичної та адміністративної
    лексики?'
  section: Дискусія та підсумок
  words: 600
focus: Transition from OES to Ruthenian — Diglossia, registers, and the role of the Lithuanian Statute (1529)
level: RUTH
module: ruth-001
objectives:
- Розрізняти три основні регістри руської мови (церковнослов’янський, канцелярський, розмовний) на прикладі Литовського статуту
- Аналізувати польські та латинські запозичення в тексті Статуту та пояснювати їхню історичну зумовленість
- Простежувати ключові фонетичні та морфологічні зміни, що відрізняють руську мову від давньоруської
- Формулювати аргументовану позицію в дебатах щодо статусу руської мови та її зв’язку з сучасною українською
