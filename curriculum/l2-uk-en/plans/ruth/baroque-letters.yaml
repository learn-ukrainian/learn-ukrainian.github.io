content_outline:
- points:
  - 'Провокація: «Ясновельможний пане, добродію мій милостивий...» — чому Хмельницький писав так, а не інакше? Якою мовою
    листувалися гетьмани?'
  - Фрагмент листа Хмельницького з вимогою здати місто. Студент має визначити, це погроза, прохання чи юридичний ультиматум.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була мова гетьманської канцелярії «простою мовою», польською, чи вже українською? Роль церковнослов''янізмів
    та полонізмів.'
  - 'Дебат 2: Листи Хмельницького до московського царя vs до польського короля vs до османського султана. Чи змінював він
    мовний регістр залежно від адресата?'
  - '[!decolonization] Існування розвиненої канцелярської мови, здатної обслуговувати державу, спростовує імперський наратив
    про «неписьменних селян» та відсутність мовної норми до XIX ст.'
  - '[!epistemic-humility] Термін «проста мова» — це науковий конструкт для опису надзвичайно строкатого мовного узусу, а
    не тогочасний термін. Межі між мовами були проникними.'
  section: 'Конфліктна карта: Мова гетьманської канцелярії'
  words: 700
- points:
  - Оригінальний текст універсалу Богдана Хмельницького (1648) у нормалізованій орфографії.
  - 'Глоси: розбір архаїчних форм (''єсмо'', ''поневаж''), канцелярських термінів (''лист'', ''універсал''), та титулатури
    (''ясновельможний'').'
  - 'Граматичний коментар: аналіз форм двоїни, давального самостійного (Dativus absolutus), та інших синтаксичних конструкцій,
    що відрізняються від сучасної мови.'
  - '[!decolonization] Листи — доказ безперервності української державотворчої традиції та правової культури.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: Адміністративно-правова лексика (''уряд'', ''річ посполита'', ''сейм'') — свідоме запозичення чи мовна норма
    епохи?'
  - 'Латинізми: Риторичні фігури та юридичні концепти, що прийшли через польське посередництво (''реляція'', ''мандат'', ''апеляція'').'
  - 'Церковнослов''янізми: Високий стиль у преамбулах та звертаннях, біблійні алюзії для легітимізації влади.'
  - 'Тюркізми: Військова та фінансова лексика в листах, що стосуються татарських союзників (''орда'', ''ясир'', ''казна'').'
  - '[!myth-buster] Багатомовність гетьманської канцелярії — це не «засміченість», а ознака участі в європейському культурному
    та політичному просторі. Це мова сили, а не слабкості.'
  section: 'Мовний контакт: Сплав канцелярії'
  words: 1200
- points:
  - 'Палеографічна лабораторія: Аналіз зразків козацького скоропису. Спроба прочитати кілька слів з факсиміле листа Хмельницького.'
  - 'Стилістична лабораторія: Порівняння риторики Хмельницького в листах до різних адресатів. Визначення ключових маркерів
    високого, нейтрального та ультимативного стилів.'
  - 'Етимологічний слід: Простежити шлях слова «козак» або «гетьман» через руські та європейські джерела.'
  - 'Порівняльна лабораторія: Той самий концепт — ''договір'' — у листі Хмельницького, Пересопницькому Євангелії та сучасній
    юридичній мові.'
  section: 'Мовна лабораторія: Палеографія та стилістика'
  words: 1000
- points:
  - 'Повернення до розминки: тож якою мовою писав Хмельницький? Студент формулює відповідь, використовуючи поняття «проста
    мова», «мовний контакт», «регістр».'
  - 'Лінгвістичний висновок: що листи Хмельницького говорять про стан української мови у XVII столітті — її гнучкість, багатство
    та здатність обслуговувати державу.'
  - 'Зв''язок уперед: як канцелярська мова Гетьманщини вплинула на формування нової української літературної мови Івана Котляревського?'
  section: Дискусія та підсумок
  words: 600
focus: The art of epistolography in the Cossack Hetmanate, focusing on the letters of Bohdan Khmelnytsky. Analysis of language
  contact, political rhetoric, and the "prosta mova" of Cossack chanceries.
level: RUTH
module: ruth-078
objectives:
- Аналізувати соціолінгвістичну ситуацію в Україні XVII ст., використовуючи поняття «проста мова», «мовний контакт» та «мовний
  регістр».
- Розпізнавати та класифікувати полонізми, латинізми та церковнослов'янізми у текстах гетьманської канцелярії.
- Читати та інтерпретувати фрагменти листів Богдана Хмельницького, коментуючи їхні граматичні та стилістичні особливості.
- Формулювати аргументовану позицію щодо ролі канцелярської мови Гетьманщини як доказу безперервності української державотворчої
  традиції.
