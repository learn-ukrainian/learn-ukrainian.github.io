content_outline:
- points:
  - 'Провокація: «Особа» і «чоловік» заходять до руського суду. Хто має більше прав? Відповідь залежить від їхнього соціального
    статусу та конкретного правового кодексу.'
  - 'Термін з Литовського статуту: що означає «паробок» або «челядник» з юридичної точки зору? Вгадайте їхній правовий статус.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова права — це «проста мова» під польським впливом чи самобутній руський юридичний реєстр?'
  - 'Дебат 2: Чи був термін «особа» кроком до універсальних прав, чи інструментом для розмежування і обмеження прав нешляхетських
    станів (міщан, селян)?'
  - '[!decolonization] Існування цієї складної юридичної мови спростовує імперський наратив про правову та мовну нерозвиненість
    русинів.'
  - '[!epistemic-humility] Історики сперечаються, наскільки писаний закон відповідав реальній судовій практиці. Чи була «особа»
    філософським поняттям чи прагматичним інструментом?'
  section: 'Конфліктна карта: Особа vs. Чоловік: Мова права та соціальний статус'
  words: 700
- points:
  - Фрагмент з Третього Литовського статуту (1588), що визначає права та обов'язки різних «осіб» (шляхти, міщан).
  - 'Кероване читання: глосарій юридичних термінів, таких як «врядник» (урядовець), «позов» (судовий позов), «маєтність» (маєток).'
  - 'Граматичні нотатки: аналіз пасивних дієприкметників та умовних конструкцій, типових для мови права.'
  - '[!decolonization] Цей правовий кодекс є пам''яткою державотворення, написаною прямим предком сучасної української мови,
    а не російською.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз польських юридичних термінів, що увійшли до руської мови: «pozew» (позов), «urząd» (уряд), «sejm» (сойм).'
  - 'Латинізми: аналіз термінів, засвоєних через європейську юридичну освіту: «persona», «decretum», «privilegium» та їх адаптація.'
  - 'Церковнослов''янізми: використання високого стилю для надання авторитетності тексту, особливо в присягах та преамбулах.'
  - '[!myth-buster] Запозичення юридичної лексики — це не «засмічення» мови, а ознака її активної участі в європейському інтелектуальному
    просторі.'
  section: 'Мовний контакт: Полонізми та Латинізми в мові права'
  words: 1200
- points:
  - 'Порівняльна лабораторія: порівняйте поняття «свідок» або «показання» церковнослов''янською, руською та сучасною українською
    мовами.'
  - 'Етимологічний слід: простежте еволюцію слова «особа» від його коренів до сучасних значень «людина» та «особистість».'
  - 'Стилістична лабораторія: розбір синтаксису речення з Литовського статуту. Визначте головну та підрядні частини, функції
    дієприкметників та сполучників, що створюють формальний стиль.'
  section: 'Мовна лабораторія: Анатомія правового терміна'
  words: 1000
- points:
  - 'Повернення до розминки: хто мав більше прав — «особа» чи «чоловік»? Студент формулює нюансовану відповідь.'
  - 'Лінгвістичний висновок: розвиток складного юридичного реєстру доводить здатність руської мови оперувати абстрактними
    поняттями.'
  - 'Зв''язок уперед: як правова дистинкція між «особою» і «чоловіком» еволюціонувала в козацьку добу та пізніше, що призвело
    до сучасного універсального поняття «особи» в українському праві?'
  section: Дискусія та підсумок
  words: 600
focus: The evolution of 'правосуб'єктність' (legal personhood) in the Grand Duchy of Lithuania, analyzing how terms like 'особа'
  and 'чоловік' defined rights for different social strata in legal texts like the Lithuanian Statutes.
level: RUTH
module: ruth-004
objectives:
- Аналізувати еволюцію поняття 'правосуб''єктність' у руській правничій традиції
- Розрізняти правовий статус 'особи' та 'чоловіка' в залежності від соціального стану та контексту
- Ідентифікувати полонізми та латинізми в юридичних текстах та пояснювати їхню функцію
- Використовувати аналіз юридичної мови як доказ спростування імперських наративів про 'нерозвиненість' української мови
