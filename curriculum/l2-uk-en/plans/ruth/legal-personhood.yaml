activity_hints:
- description: Розрізнення правового статусу «особи» та «чоловіка» в різних контекстах Литовського Статуту.
  focus: Розуміння Конфліктної карти
  items: 5
  type: quiz
- description: Заповнити пропуски в реченнях з Литовського Статуту, використовуючи терміни «позов», «маєтність», «шляхтич»,
    «міщанин».
  focus: Юридична лексика
  items: 4
  type: fill-in
- description: 'Порівняйте два фрагменти з Литовського статуту: один про права шляхти, інший про права міщан. Які мовні засоби
    використовуються для розрізнення їхнього правового статусу?'
  focus: Аналіз джерела
  type: note
- description: На основі проаналізованого тексту поясніть, як розвиток юридичної термінології в руській мові спростовує тезу
    про її «нерозвиненість» до XIX століття. (400-600 слів).
  focus: 'Есе: Доказ існування мови'
  type: note
cefr_min: C2
