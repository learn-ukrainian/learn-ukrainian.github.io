content_outline:
- points:
  - 'Провокація: термін «воєводство» — це польський імпорт, латинський спадок чи місцевий винахід? Порівняйте руське «воєвода»
    та сучасне «голова ОДА».'
  - Фрагмент тексту з Литовського статуту (2-3 рядки) про межі повіту — що можна зрозуміти, не знаючи контексту?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Литовських статутів — це «руська», «староукраїнська», «старобілоруська» чи «західноруська»? Політичні ставки
    за кожним терміном. [!decolonization]'
  - 'Дебат 2: Адміністративна реформа 1560-х — це інструмент полонізації, модернізації за європейським зразком чи внутрішня
    еволюція ВКЛ? [!epistemic-humility]'
  - '[!epistemic-humility] Тогочасні джерела не розрізняли «українську» і «білоруську». Для них це була єдина «руська мова»,
    що протистояла польській та латині.'
  section: 'Конфліктна карта: Наша Prosta Mova чи їхня Kancelaria?'
  words: 700
- points:
  - 'Першоджерело: Розділ з Третього Литовського статуту (1588), що визначає статус воєводств та повітів.'
  - Оригінальний текст (нормалізована орфографія) з паралельним перекладом сучасною українською мовою.
  - 'Глосарій: детальний розбір термінів «воєводство», «повіт», «каштелян», «урядник», «сеймик».'
  - 'Контекст: Чому саме Статут став тим документом, де зафіксовано ці норми? Роль шляхти у кодифікації права. [!decolonization]'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: як польські `województwo` і `powiat` адаптувалися в руській мові? Чи це було пряме запозичення, чи
    адаптація існуючих слів?'
  - 'Аналіз латинізмів: сліди `palatinatus` (воєводство) та `castellanus` (каштелян) у правовій термінології. Як латина потрапляла
    в руські документи?'
  - 'Аналіз церковнослов''янізмів: чи є вони в адміністративній лексиці? Чому їх менше, ніж у релігійних текстах?'
  - '[!myth-buster] Запозичення правової термінології — це не ознака слабкості мови, а свідчення її інтеграції в європейський
    правовий простір.'
  section: 'Мовний контакт: Латина, Полонізми та Руська Канцелярія'
  words: 1200
- points:
  - 'Порівняльний аналіз: простежте еволюцію понять «влада» і «територія» на прикладі тріади: церковнослов''янське «власть»
    → руське «уряд» → сучасне «адміністрація».'
  - 'Етимологічний ланцюжок: від праслов''янського *vojь + *voditi до руського «воєвода» та його переосмислення під впливом
    польського `wojewoda`.'
  - 'Стилістичний аналіз: порівняйте синтаксис і лексику уривка зі Статуту з уривком з козацького літопису на ту ж тему (якщо
    є). Де більше полонізмів? Де більше церковнослов''янізмів? Чому?'
  section: 'Мовна лабораторія: Етимологія адміністративних термінів'
  words: 1000
- points:
  - 'Повернення до розминки: тож «воєводство» — це запозичення чи ні? Сформулюйте відповідь, враховуючи дані з модуля.'
  - 'Ширше питання: як цей текст доводить існування розвиненої української мови права та адміністрації за 200 років до Котляревського?'
  - 'Зв''язок із сучасністю: як поняття «децентралізація» та «об''єднана територіальна громада» (ОТГ) є сучасними аналогами
    реформ XVI століття?'
  section: Дискусія та підсумок
  words: 600
focus: 'Адміністративна реформа Великого князівства Литовського: воєводства, повіти та їх мовна реальність у документах. Аналіз
  термінології та її походження (латинізми, полонізми).'
level: RUTH
module: ruth-009
objectives:
- Аналізувати походження та еволюцію адміністративної термінології (воєводство, повіт) на руських землях ВКЛ.
- Розрізняти полонізми, латинізми та автохтонні елементи в мові Литовських статутів.
- Формулювати аргументовану позицію в дискусії про статус «руської мови» як державної мови ВКЛ.
- Критично оцінювати вплив адміністративних реформ на формування української правової та політичної культури.
