content_outline:
- points:
  - 'Провокація: Порівняйте два речення — одне Григорія Сковороди, інше Івана Котляревського. Що змінилося в мові? Який текст
    "зрозуміліший" і чому?'
  - 'Загадка: Чи була «Енеїда» революцією, що створила сучасну українську мову, чи кульмінацією довгої еволюції, що вже відбувалася?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Енеїда» як революція (Котляревський — єдиний батько сучасної мови) vs. «Енеїда» як кульмінація (Котляревський
    — майстерний синтезатор існуючих народних тенденцій).'
  - 'Дебат 2: Бурлескний стиль «Енеїди» — це був свідомий політичний акт піднесення розмовної мови чи просто популярна розвага,
    яка випадково стала наріжним каменем?'
  - '[!decolonization] Існування розвиненої «простої мови» до Котляревського спростовує імперську тезу про те, що українську
    мову «створили» в XIX столітті. Котляревський її кодифікував, а не вигадав.'
  - '[!epistemic-humility] Точна природа переходу є предметом наукових дискусій. Немає єдиної простої відповіді, і роль особистостей
    та соціальних процесів є складною.'
  section: 'Конфліктна карта: Революція чи Еволюція?'
  words: 700
- points:
  - 'Первинний текст: уривок з інтерлюдії до драми Якуба Гаватовича (1619) або іншої вертепної драми XVIII ст.'
  - 'Аналіз: Розбір діалогу, де «поважні» персонажі говорять книжною мовою, а «прості» — живою народною українською, дуже
    близькою до мови Котляревського.'
  - 'Глосарій: Пояснення архаїчних форм та синтаксичних конструкцій у фрагменті.'
  - '[!decolonization] Текст доводить, що народна мова вже мала літературне (драматичне) використання задовго до Котляревського,
    руйнуючи міф про суто «селянський» її статус.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: Які з них, поширені в барокових текстах, Котляревський відкидає, а які зберігає? Аналіз на прикладі адміністративної
    та побутової лексики.'
  - 'Церковнослов''янізми: Свідома відмова від «високого стилю» як центральний елемент проєкту Котляревського. Порівняння
    уривку Сковороди з уривком з «Енеїди» на схожу тему.'
  - 'Русизми vs. Народна мова: Чи просто Котляревський використовував полтавський діалект, чи він активно уникав російських
    форм, що вже починали проникати в мову?'
  - '[!myth-buster] Міф про те, що Котляревський «очистив» мову. Він не стільки «очистив», скільки перецентрував її на іншій
    діалектній та стилістичній основі.'
  section: 'Мовний контакт: Остаточний відбір'
  words: 1200
- points:
  - 'Компаративний аналіз: Простежити, як поняття «любов», «війна», «бог» описуються в церковнослов''янському тексті, вірші
    Сковороди та строфі Котляревського.'
  - 'Стилістичний аналіз: Яку функцію виконує просторіччя в «Енеїді»? Це лише для сміху, чи воно несе власну, нову форму гідності
    та легітимності?'
  - 'Етимологічне дослідження: Простежити походження кількох ключових слів з «Енеїди», які здаються «новими», щоб показати
    їхню присутність у давніших руських текстах.'
  section: 'Мовна лабораторія: Від синтаксису до стилю'
  words: 1000
- points:
  - 'Повернення до розминки: Революція чи еволюція? Студент тепер має сформулювати нюансовану відповідь, спираючись на матеріал
    модуля.'
  - 'Лінгвістичний висновок: Перехід до сучасної української мови — це не просто нові слова, а фундаментальна зміна джерела
    літературного стандарту: від книжкового слов''янізму до живого мовлення народу.'
  - 'Зв''язок із майбутнім: Як вибір Котляревського підготував ґрунт для Шевченка та всієї літературної традиції XIX століття?'
  section: Дискусія та підсумок
  words: 600
focus: The linguistic and cultural shift from the late Baroque/Skovoroda era to the publication of Kotliarevsky's 'Eneida',
  marking the birth of modern literary Ukrainian.
level: RUTH
module: ruth-098
objectives:
- Аналізувати лінгвістичні відмінності між пізньобароковою книжною мовою та новою літературною мовою, започаткованою Котляревським.
- Оцінювати різні наукові позиції в дебаті «революція чи еволюція» щодо ролі Котляревського у формуванні сучасної української
  мови.
- Розрізняти полонізми, церковнослов'янізми та питомі народні елементи в текстах XVIII століття.
- Формулювати аргументовану позицію щодо утвердження народної мови як нового літературного стандарту.
