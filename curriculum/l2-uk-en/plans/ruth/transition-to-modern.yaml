vocabulary_hints:
- definition: Загальновживана розмовна мова руської (української) шляхти та міщан у XVI-XVIII ст., що протиставлялася книжній
    церковнослов'янській.
  pos: ж.
  word: проста мова
- definition: Високий, переважно церковнослов'янський стиль, що використовувався в релігійній, філософській та офіційній літературі
    до XIX ст.
  pos: ж.
  word: книжна мова
- definition: Жанр комічної поезії, що полягає в гумористичному, пародійному наслідуванні високого стилю чи теми.
  pos: ч.
  word: бурлеск
- definition: Різновид бурлеску, де твір серйозного, «високого» змісту та стилю переробляється на твір комічного, «низького»
    змісту при збереженні первісної форми.
  pos: ж.
  word: травестія
- definition: Коротка комічна сценка, яку виконували в антрактах між діями серйозної драми.
  pos: ж.
  word: інтерлюдія
- definition: Старовинний український ляльковий театр, у виставах якого часто поєднувалися релігійні сюжети («висока» частина)
    та побутові комічні сценки («низька» частина).
  pos: ч.
  word: вертеп
- definition: Термін, що позначає літературну традицію, започатковану Іваном Котляревським, з її орієнтацією на народну мову
    та бурлескно-травестійні жанри.
  pos: ж.
  word: котляревщина
- definition: Слово або вираз, запозичені з польської мови.
  pos: ч.
  word: полонізм
- definition: Слово або вираз, запозичені з церковнослов'янської мови.
  pos: ч.
  word: церковнослов''янізм
- definition: Принцип, що утвердився в епоху романтизму, згідно з яким література має відображати дух, побут і мову народу.
  pos: ж.
  word: народність
