content_outline:
- points:
  - 'Провокація: Дано речення з Литовського статуту: «Абыхмо того права не вживали противъ вольности шляхетскои». Чому «шляхетскои»,
    а не «шляхетської»? Де ще ховаються синтаксичні відмінності?'
  - Що таке «узгодження»? Коротка дефініція з прикладом з сучасної мови.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Проста мова» — це хаотична суміш чи система зі своїми (хоч і неписаними) правилами? Позиція структуралістів
    vs. «граматичних пуристів» XVIII ст.'
  - 'Дебат 2: Чи руські писарі слідували формальним церковнослов''янським нормам, чи писали «на слух», розкриваючи реальний
    народний синтаксис?'
  - '[!decolonization] Сам факт існування складних синтаксичних конструкцій у юридичних документах XVI ст. спростовує імперський
    наратив про «неповноцінність» української мови до Котляревського.'
  - '[!epistemic-humility] Межі між церковнослов''янською, польською та руською мовами в голові одного писаря були розмитими.
    Текст — це поле боротьби цих систем.'
  section: 'Конфліктна карта: Чи була граматика?'
  words: 700
- points:
  - 'Первинне джерело: фрагмент з «Ключа Царства Небесного» Герасима Смотрицького, де автор полемізує щодо природи влади.'
  - 'Оригінальний текст з паралельним глосарієм: фокус на формах прикметників, займенників та дієприкметників, що узгоджуються
    з іменниками.'
  - 'Граматичний коментар: аналіз незвичних для сучасного мовця форм узгодження (напр., залишки двоїни, аналітичні конструкції).'
  - 'Сучасний український «переклад»: як би ця сама думка була висловлена сьогодні? Які синтаксичні структури змінилися?'
  - '[!decolonization] Полемічні тексти Смотрицького доводять, що українська мова була здатна обслуговувати найвищі сфери
    інтелектуального життя — теологію та філософію.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: конструкції з «jako» (як), вплив польської моделі керування дієслів.'
  - 'Аналіз церковнослов''янізмів: давальний самостійний (Dativus absolutus), специфічні форми дієприкметників та їх узгодження.'
  - 'Конкуренція моделей: в одному реченні автор може використати польську синтаксичну модель, а в наступному — церковнослов''янську.
    Що це говорить про його мовну свідомість?'
  - '[!myth-buster] Синтаксична калька — це не «засмічення» мови, а доказ інтенсивного культурного діалогу та інструмент збагачення
    виражальних засобів.'
  section: 'Мовний контакт: Синтаксичні кальки'
  words: 1200
- points:
  - 'Граматична лабораторія: узгодження числівників з іменниками в руських текстах. Чому «два королѣ», але «три короли»?'
  - 'Порівняльна лабораторія: таблиця. Одне поняття (напр. «батькова хата») у трьох мовах: церковнослов''янській, простій
    мові (з тексту), сучасній українській. Простежуємо зміну відмінкових закінчень.'
  - 'Стилістична лабораторія: аналіз речення з тексту. Які елементи вказують на високий, «книжний» стиль, а які — на розмовну
    основу?'
  section: 'Мовна лабораторія: Реконструкція правил узгодження'
  words: 1000
- points:
  - 'Повернення до розминки: чому «шляхетскои»? Студент дає розгорнуту відповідь, посилаючись на історичну фонетику та морфологію.'
  - 'Лінгвістичний висновок: синтаксис руської мови — це не деградована церковнослов''янська і не простонародна мова, а динамічна
    система в процесі становлення сучасних українських норм.'
  - 'Зв''язок із майбутнім: як проаналізовані сьогодні явища (напр., конкуренція моделей керування) призвели до формування
    синтаксичної системи, яку ми маємо в сучасній українській мові?'
  section: Дискусія та підсумок
  words: 600
focus: 'Ruthenian syntax: agreement (узгодження) and government (керування) in legal and polemical texts. Tracing the evolution
  of case endings and syntactic structures under the influence of Polish and Church Slavonic.'
level: RUTH
module: ruth-053
objectives:
- Аналізувати моделі узгодження та керування в руських текстах XVI-XVII ст.
- Розрізняти польські та церковнослов'янські синтаксичні впливи в тексті
- Простежувати еволюцію конкретних правил узгодження від руської доби до сучасної української мови
- Використовувати синтаксичний аналіз для аргументації безперервності розвитку української мови до XIX століття
