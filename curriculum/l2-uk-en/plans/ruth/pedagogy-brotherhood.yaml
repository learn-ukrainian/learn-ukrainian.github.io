content_outline:
- points:
  - 'Провокація: «Аще кто своєго языка не помнить, или не любитъ, тотъ не свой, а чужій есть». Як вивчення граматики в XVII
    столітті було актом політичного спротиву?'
  - 'Порівняння: правило про вісім частин мови у Смотрицького vs. сучасний підхід. Що змінилося, а що залишилося незмінним?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чия це мова? Смотрицький кодифікує церковнослов''янську, але на основі руської (української) вимови та граматичних
    особливостей. Це «виправлення» церковних книг чи створення нового стандарту?'
  - 'Дебат 2: Граматика — опис реальності чи інструмент для її зміни? Для братських шкіл це був спосіб не просто описати мову,
    а й виховати «правильну» людину та захистити православну ідентичність від католицького впливу.'
  - '[!decolonization] Москва спочатку прийняла «Граматику» Смотрицького як зразок для виправлення власних книг (патріарх
    Никон), а потім засудила її як «литовську єресь». Це доводить, що інтелектуальний центр східного слов''янства в XVII ст.
    був у Києві, а не в Москві.'
  - '[!epistemic-humility] Сам Смотрицький, геніальний філолог, трагічно метався між православ''ям та уніатством, що відображає
    складність та суперечливість епохи.'
  section: 'Конфліктна карта: Граматика як поле битви'
  words: 700
- points:
  - 'Первинне джерело: Фрагменти з передмови до «Грамматіки славенския правилное синтагма» (1619) Мелетія Смотрицького.'
  - Оригінальний текст (нормалізована орфографія) з паралельним перекладом сучасною українською мовою.
  - 'Глоси та граматичний коментар: розбір термінів «дієсловіє», «містоіменіє», «падеж», «совершенний вид» у розумінні Смотрицького.'
  - 'Контекст: «Граматика» як відповідь на Брестську унію 1596 року та як інструмент у полемічній боротьбі.'
  - '[!decolonization] Наявність такої праці повністю спростовує імперський міф про «неіснування» української мови та філологічної
    думки до XIX століття.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Грецька основа: Смотрицький орієнтується на грецькі граматичні взірці, намагаючись довести, що слов''янська мова не менш
    «досконала».'
  - 'Латинська структура: вся система відмінків, часів та частин мови запозичена з латинських граматик (Донат, Прісціан),
    які були стандартом освіти в тогочасній Європі.'
  - 'Польські запозичення: використання польської наукової термінології для нових понять, що свідчить про тісні контакти з
    польською освітньою системою.'
  - '[!myth-buster] Синтетичність граматики Смотрицького — не її слабкість, а сила. Це ознака включеності української культури
    в загальноєвропейський інтелектуальний простір, а не її «вторинності».'
  section: 'Мовний контакт: Грецький фундамент, латинські стіни, польська покрівля'
  words: 1200
- points:
  - 'Граматична лабораторія: Спробуйте розібрати речення з «Пересопницького Євангелія» за правилами Смотрицького. Визначте
    вісім частин мови, відмінки та часи, як це робив би учень XVII століття.'
  - 'Порівняльна лабораторія: Розгляньте таблицю відмінювання іменника «камінь» у Смотрицького, в сучасній українській та
    в російській мові. Які форми збереглися, а які зникли? Про що це свідчить?'
  - 'Палеографічна лабораторія: аналіз сторінки з «Граматики», шрифтів, структури тексту. Як візуальне оформлення підкреслює
    ієрархію знань?'
  - 'Стилістична лабораторія: Знайдіть у тексті Смотрицького приклади «високого» (церковнослов''янського) та «простого» (руського)
    стилів. Чому він їх розрізняє?'
  section: 'Мовна лабораторія: Реконструкція уроку в братській школі'
  words: 1000
- points:
  - 'Повернення до розминки: Як, на вашу думку, вивчення граматичних правил могло слугувати інструментом спротиву та самозбереження
    нації?'
  - 'Лінгвістичний підсумок: «Граматика» Смотрицького — це революція чи еволюція? Вона створила нову мову чи кодифікувала
    вже існуючу?'
  - 'Зв''язок уперед: Праця Смотрицького стала основою для граматики Ломоносова і, таким чином, вплинула на формування сучасної
    російської літературної мови. Що це говорить про культурні вектори того часу?'
  section: Дискусія та підсумок
  words: 600
focus: How grammar was taught in 16-17th century brotherhood schools, focusing on Meletiy Smotrytsky's 1619 Grammar as a tool
  for spiritual discipline and national identity.
level: RUTH
module: ruth-057
objectives:
- Аналізувати фрагменти з «Граматики» Мелетія Смотрицького та пояснювати його ключові ідеї
- Пояснювати роль братських шкіл та граматичної науки в українському культурному спротиві XVII століття
- Розрізняти грецькі, латинські та польські впливи на становлення української філологічної думки
- Застосовувати методи історико-лінгвістичного аналізу до текстів руської доби
- Формулювати аргументовану позицію щодо зв'язку між мовою, релігією та політикою в ранньомодерній Україні
