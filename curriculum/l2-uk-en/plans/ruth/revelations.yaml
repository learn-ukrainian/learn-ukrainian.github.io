content_outline:
- points:
  - 'Провокація: «І я, Іван, бачив...» — Руський текст Одкровення поруч із сучасним українським перекладом. Що змінилося у
    способі говорити про кінець світу?'
  - 'Термін: «проста мова». Це спрощена церковнослов’янська чи ускладнена народна? Як би ви визначили цей регістр?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Для кого цей текст? Для літургії чи для домашнього читання? Вибір мови як ключ до розуміння аудиторії.'
  - 'Дебат 2: Вплив польських протестантських перекладів (Берестейська Біблія) на православний руський текст. Запозичення
    чи свідомий діалог?'
  - '[!decolonization] Переклад Біблії на «просту мову» — це не «занепад» високого стилю, а потужний акт утвердження власної
    мовної та культурної ідентичності, що кидає виклик імперській ідеї єдиної сакральної мови.'
  - '[!epistemic-humility] Межі між церковнослов’янською, «простою мовою» та польською в текстах XVI-XVII ст. є розмитими.
    Автори свідомо змішували регістри для досягнення певного стилістичного ефекту.'
  section: 'Конфліктна карта: Божественне одкровення чи людський переклад?'
  words: 700
- points:
  - 'Першоджерело: Фрагменти з «Откровення» в руському перекладі (напр., описи чотирьох вершників або Нового Єрусалиму).'
  - 'Глосований текст: Оригінал з коментарями, що пояснюють архаїчні форми, синтаксис та лексику, яка відрізняється від сучасної.'
  - 'Граматичні нотатки: Аналіз руських дієслівних форм (аорист, імперфект) та відмінкових закінчень, що зникли в сучасній
    мові.'
  - 'Контекст: Чому «Апокаліпсис» став таким популярним у бурхливу добу козацьких воєн та релігійних суперечок?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - Аналіз мовних шарів у тексті «Откровення».
  - 'Полонізми: адміністративна та абстрактна лексика, що прийшла через польське посередництво.'
  - 'Латинізми: богословські та філософські терміни, що свідчать про європейський освітній контекст.'
  - 'Церковнослов’янізми: свідоме використання «високих» слів для збереження сакрального авторитету тексту.'
  - '[!myth-buster] Текст не є «засміченим» іноземними словами. Він демонструє, як руські книжники майстерно жонглювали кількома
    мовними регістрами для створення нового, складного богословського стилю.'
  section: 'Мовний контакт: Лексика кінця світу'
  words: 1200
- points:
  - 'Comparative lab: Один і той самий уривок з «Откровення» трьома мовами: церковнослов’янською (Острозька Біблія), руською
    («простою мовою») та сучасною українською (переклад Огієнка).'
  - 'Завдання: Простежити, як змінюється лексика, синтаксис та загальний тон тексту.'
  - 'Etymology trace: Шлях одного слова (напр., «печать» чи «царство») від його біблійного значення до сучасного вжитку.'
  - 'Stylistic lab: Визначити, до якого мовного шару (церковнослов’янського, польського, народного) належить кожне слово у
    вибраному реченні.'
  section: 'Мовна лабораторія: Порівняльний аналіз'
  words: 1000
- points:
  - 'Повернення до розминки: Тепер, розуміючи контекст, чому переклад Святого Письма на «просту мову» був революційним кроком?'
  - 'Лінгвістичний висновок: Що цей текст говорить нам про стан української мови у XVI-XVII століттях? Наскільки вона вже
    була «українською»?'
  - 'Зв’язок уперед: Як лексика та синтаксичні моделі з цих ранніх перекладів вплинули на формування сучасної української
    літературної мови?'
  section: Дискусія та підсумок
  words: 600
focus: Ruthenian translation of the Book of Revelation, apocalyptic imagery, rare lexicon, and the politics of translating
  sacred texts into prosta mova
level: RUTH
module: ruth-041
objectives:
- Аналізувати соціолінгвістичний контекст перекладу сакральних текстів на «просту мову» в руську добу
- Розрізняти церковнослов’янські, польські та власне руські мовні шари в тексті «Откровення»
- Простежувати еволюцію ключових богословських понять від їхніх руських форм до сучасних українських відповідників
- Аргументувати, як сам факт цього перекладу служить доказом розвитку окремої української літературної мови
