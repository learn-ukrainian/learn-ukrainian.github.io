content_outline:
- points:
  - 'Провокація: Руський термін «криміналъ» — це те саме, що й сучасний «кримінал»? Розглянемо речення з історичного документа.'
  - 'Вгадай термін: як у XVI столітті називали судовий позов?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Литовського Статуту — це «староукраїнська», «старобілоруська» чи «проста мова»? Що стоїть за цими термінами.'
  - 'Дебат 2: Чи є правова система Великого Князівства Литовського доказом неперервності української державності, чи це чужа
    традиція? [!decolonization]'
  - '[!epistemic-humility] Межі між мовами та ідентичностями в добу Ренесансу були розмитими. Вчені досі сперечаються про
    точну класифікацію.'
  section: 'Конфліктна карта: Мова права — народна чи державна?'
  words: 700
- points:
  - Читання фрагменту з Литовського Статуту (1588) про процедуру суду — оригінальний текст у нормалізованій орфографії.
  - 'Глосарій: розбір ключових правових термінів, що не мають прямих аналогів сьогодні (напр., «ґвалт», «позовъ», «заповідь»).'
  - 'Граматичний коментар: руський аорист та імперфект у дії — як форми дієслів передавали правові нюанси.'
  - '[!decolonization] Цей текст, написаний за 200+ років до Котляревського, є доказом існування розвиненої української юридичної
    мови.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: адміністративна лексика (уряд, урядовець, сойм) як результат політичної унії.'
  - 'Аналіз латинізмів: юридична термінологія (декрет, апеляція, мандат) як частина європейської правової традиції.'
  - 'Церковнослов''янізми: як елементи високого стилю використовувалися для надання тексту авторитету.'
  - '[!myth-buster] Запозичення не є «засміченням» мови. Це свідчення її активної ролі в міжнародному правовому полі тогочасної
    Європи.'
  section: 'Мовний контакт: Полонізми та латинізми в мові суду'
  words: 1200
- points:
  - 'Граматична лабораторія: відмінювання іменників-термінів. Чому «суд» відмінюється інакше, ніж «уряд»?'
  - 'Етимологічна лабораторія: шлях слова «справедливість» від праслов''янських часів до руської доби та сучасного стану.'
  - 'Порівняльна лабораторія: поняття «свідок» у церковнослов''янській, руській (простій мові) та сучасній українській мовах.'
  section: 'Мовна лабораторія: Анатомія судового терміна'
  words: 1000
- points:
  - 'Повернення до розминки: як розуміння історичного контексту змінило ваше трактування терміна «криміналъ»?'
  - 'Лінгвістичний підсумок: що цей текст розповів нам про стан української мови у XVI столітті? Які риси є спадком OES, а
    які — інноваціями?'
  - 'Зв''язок уперед: як руська правова термінологія вплинула (або не вплинула) на формування сучасної української юридичної
    мови?'
  section: Дискусія та підсумок
  words: 600
focus: 'Судовий процес у Литовському Статуті: мова права, термінологія, полонізми та латинізми'
level: RUTH
