objectives:
- Аналізувати оригінальні тексти руської доби (Литовський Статут) з лінгвістичним коментарем
- Розрізняти та аналізувати явища мовного контакту (полонізми, латинізми, церковнослов'янізми) в історичних текстах
- Формулювати аргументовану позицію в соціолінгвістичних дебатах про статус «простої мови»
- Використовувати докази з першоджерел для спростування імперських міфів про історію української мови
