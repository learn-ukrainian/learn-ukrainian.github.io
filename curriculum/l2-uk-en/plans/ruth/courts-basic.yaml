activity_hints:
- description: Чия це теза — прихильників «староукраїнської» чи «старобілоруської» концепції? Визначити позицію за цитатою.
  focus: 'Конфліктна карта: Розуміння дебатів'
  items: 4
  type: quiz
- description: Вставити правильний юридичний термін (ґвалт, позовъ, декрет, апеляція) у речення з тексту модуля.
  focus: Термінологія Литовського Статуту
  items: 5
  type: fill-in
- description: 'На основі матеріалів «Мовної лабораторії» напишіть коротке порівняння: як виражалося поняття «закон» церковнослов''янською,
    руською та сучасною українською мовами. Які семантичні зсуви відбулися?'
  focus: 'Порівняльний аналіз: еволюція поняття'
  type: note
- description: Уявіть, що ви берете участь у дискусії про історію української мови. Використовуючи фрагмент Литовського Статуту
    як головний доказ, напишіть 3-4 абзаци, що спростовують тезу про те, що українська мова до XIX ст. була лише «селянським
    діалектом» (400-600 слів).
  focus: 'Есе: Аргумент для дискусії'
  type: note
