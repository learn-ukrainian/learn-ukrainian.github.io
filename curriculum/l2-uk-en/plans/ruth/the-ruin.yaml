content_outline:
- points:
  - 'Провокація: Поруч два речення: одне з Літопису Самовидця про знищене місто, інше — із сучасного репортажу про Маріуполь.
    Що змінилося в мові опису війни за 350 років, а що — ні?'
  - 'Термін: "спустошення". Що, на вашу думку, означає це слово в контексті XVII століття? Це просто "руйнування" чи щось
    більше?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова "Літопису Самовидця" — це "проста мова", "староукраїнська літературна", чи "церковнослов''янська з народними
    елементами"? Як вибір терміна впливає на наше розуміння історії української мови?'
  - 'Дебат 2: Хто винен у Руїні? Це був неминучий наслідок Хмельниччини, громадянська війна козацьких еліт чи результат прямої
    інтервенції Москви та Польщі?'
  - '[!decolonization] Трактування Руїни в радянській історіографії як "возз''єднання" з Росією vs сучасний погляд на це як
    на початок тривалої окупації та знищення української державності.'
  - '[!epistemic-humility] Джерела того періоду часто суперечливі; літописці та автори листів мали власні політичні симпатії,
    що ускладнює встановлення об''єктивної істини.'
  section: 'Конфліктна карта: Історична правда чи політичний міф?'
  words: 700
- points:
  - 'Первинне джерело: Уривок з Літопису Самовидця, що описує наслідки Чорної ради або руйнування конкретного міста (напр.
    Глухова).'
  - 'Оригінальний текст (нормалізована орфографія) з паралельним глосарієм: "спустошення", "зостали", "шаблею", "в ясир".'
  - 'Граматичні нотатки: аналіз форм минулого часу (перфект, плюсквамперфект), що передають різні шари подій.'
  - 'Контекст: "Літопис Самовидця" — це анонімний текст. Хто міг бути його автором і для кого він писав? Як це впливає на
    достовірність?'
  - '[!decolonization] Цей текст — доказ існування розвиненої української історіографічної традиції задовго до того, як імперія
    намагалася її стерти.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз адміністративної та військової лексики, що прийшла з Речі Посполитої ("уряд", "полковник", "скарб").
    Чи були українські відповідники?'
  - 'Тюркізми: слова, пов''язані з війною та татарськими набігами ("ясир", "орда", "козак"). Як ці слова інтегрувалися в українську
    мову?'
  - 'Церковнослов''янізми: високий стиль для опису трагедії, моралізаторські висновки, біблійні алюзії. Як автор перемикається
    між регістрами?'
  - '[!myth-buster] Мова Літопису — не "засмічена", а "гібридна". Ця гібридність — доказ живих контактів та здатності мови
    адаптувати чужі поняття для опису власної складної реальності.'
  section: 'Мовний контакт: Словник Руїни'
  words: 1200
- points:
  - 'Стилістичний аналіз: як автор створює відчуття хаосу та відчаю? Аналіз риторичних фігур, повторів, метафор ("Україна
    кров''ю і слізьми облита").'
  - 'Порівняльна лабораторія: порівняння уривку з Літопису з офіційним документом того часу (напр., універсалом гетьмана).
    Як відрізняється лексика, синтаксис, тон?'
  - 'Етимологічний слід: простежити шлях слова "руїна" — від латинського кореня до ключового поняття української історичної
    пам''яті.'
  section: 'Мовна лабораторія: Стилістика скорботи'
  words: 1000
- points:
  - 'Повернення до розминки: озброївшись знаннями з модуля, студент дає розгорнуту відповідь на питання про мову війни.'
  - 'Лінгвістичний підсумок: що Літопис Самовидця говорить нам про стан української мови у другій половині XVII ст.? Наскільки
    вона була уніфікованою?'
  - 'Зв''язок уперед: як період Руїни та посилення московського впливу підготували ґрунт для мовних утисків XVIII ст. і, водночас,
    для появи "Енеїди" як відповіді на них?'
  section: Дискусія та підсумок
  words: 600
