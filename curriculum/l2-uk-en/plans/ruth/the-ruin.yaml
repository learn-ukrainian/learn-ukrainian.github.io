- Розрізняти та аналізувати різні шари лексики (полонізми, тюркізми, церковнослов'янізми) в українських текстах XVII ст.
- Формулювати аргументовану позицію в історичних та соціолінгвістичних дебатах про період Руїни
- Використовувати мову першоджерел для доказу безперервності української літературної традиції
