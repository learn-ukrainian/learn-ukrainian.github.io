activity_hints:
- description: Перевірка розуміння соціолінгвістичних дебатів. Чия це теза — про органічний розвиток чи штучне наслідування?
    Визначити позицію за цитатою.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити правильні сполучники (полонізми, церковнослов'янізми) у бароковий текст, обравши з наданого списку.
  focus: Маркери мовного контакту
  items: 5
  type: fill-in
- description: Подано два речення — з руського тексту та його сучасний переклад. Розібрати обидва, вказавши на ключові синтаксичні
    зміни (порядок слів, тип зв'язку, використання сполучників).
  focus: Порівняльний синтаксичний аналіз
  type: note
- description: Як аналіз синтаксису руських текстів XVI-XVII століть спростовує імперський міф про "нерозвиненість" та "відсутність"
    української літературної мови до XIX ст.? Аргументуйте, посилаючись на матеріал модуля (400-600 слів).
  focus: 'Есе: Синтаксис як доказ'
  type: note
cefr_min: C2
connects_to:
- kyiv-mohyla-rhetoric
content_outline:
- points:
  - 'Провокація: Одне речення з полемічного тексту XVII ст. на 5-6 рядків і його сучасний "переклад" одним коротким реченням.
    Питання: чому писали так складно?'
  - Що втрачається і що здобувається при "спрощенні" синтаксису з риторичної точки зору?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи бароковий синтаксис — це органічний розвиток української мови, чи штучне наслідування латинських та польських
    риторичних взірців?'
  - 'Дебат 2: Чи є цей «високий стиль» доказом розвиненої літературної мови, чи, навпаки, свідченням її відриву від народної
    «простої мови»?'
  - '[!decolonization] Твердження про "засмічення" української мови полонізмами і латинізмами в цей період — це імперський
    наратив. Насправді це доказ приналежності до європейського культурного простору та інтелектуальної полеміки.'
  - '[!epistemic-humility] Межа між «простою мовою» і «книжною» була дуже розмитою. Автори часто свідомо перемикали синтаксичні
    регістри в межах одного тексту для досягнення риторичного ефекту.'
  section: 'Конфліктна карта: Синтаксис — це стиль чи політика?'
  words: 700
- points:
  - 'Первинне джерело: Аналіз уривку з полемічного твору (напр., "Ключ Царства Небесного" Герасима Смотрицького), відомого
    своїм складним синтаксисом.'
  - Оригінальний текст з паралельним сучасним українським "декодуванням" для найскладніших конструкцій.
  - 'Глоси та граматичні нотатки: розбір архаїчних сполучників, інфінітивних конструкцій (дателний самостійний), нетипового
    порядку слів.'
  - '[!decolonization] Цей текст, написаний за 200+ років до Котляревського, спростовує міф про відсутність розвиненої літературної
    традиції. Це не "проста мова", а мова високої теологічної та філософської полеміки.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз синтаксичних конструкцій, запозичених з польської (напр., сполучники `ale`, `jakoż`, структура умовних
    речень).'
  - 'Латинізми: Вплив латинської риторики — довгі періоди, підрядні речення, що вкладаються одне в одне, абсолютні конструкції
    (Ablativus/Dativus Absolutus).'
  - 'Церковнослов''янізми: Як книжна літургійна традиція впливала на синтаксис? Використання специфічних конструкцій для піднесення
    стилю та надання авторитетності.'
  - '[!myth-buster] Складний синтаксис — не "забруднення", а потужний інструмент. Автор свідомо обирає модель (польську, латинську,
    церковнослов''янську) для досягнення певного риторичного ефекту, а не через "бідність" власної мови.'
  section: 'Мовний контакт: Анатомія барокового речення'
  words: 1200
- points:
  - 'Граматична лабораторія: Деконструкція барокового речення. Студент розбирає довгий період на прості речення, будуючи його
    синтаксичне дерево.'
  - 'Порівняльна лабораторія: Одне й те саме абстрактне поняття (напр. «чеснота») у викладі церковнослов''янською, руською
    (бароковою) та сучасною українською мовою. Аналіз синтаксичних засобів вираження.'
  - 'Стилістична лабораторія: Студент намагається "переписати" сучасний науковий абзац у стилі бароко, використовуючи вивчені
    конструкції.'
  - 'Палеографічна лабораторія: Розбір фрагменту рукописного тексту (скоропис) для розуміння, як синтаксичні одиниці поєднувались
    на письмі.'
  section: 'Мовна лабораторія: Реконструкція та деконструкція'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, чому писали так складно? Студент формулює відповідь, використовуючи поняття «регістр»,
    «мовний контакт», «риторичний ідеал».'
  - 'Лінгвістичний висновок: Бароковий синтаксис — це не хаос, а складна система зі своїми правилами, що відображала культурні
    та інтелектуальні зв''язки України з Західною Європою.'
  - 'Зв''язок уперед: Які елементи барокового синтаксису вижили в сучасній українській науковій або художній мові, а які були
    повністю відкинуті як чужорідні?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз складного, "звивистого" речення в руських текстах XVI-XVII ст. як приклад мовного контакту та розвитку літературного
  стилю
level: RUTH
module: ruth-069
objectives:
- Аналізувати складні синтаксичні конструкції в руських текстах XVI-XVII ст., ідентифікуючи їхні компоненти.
- Розрізняти полонізми, латинізми та церковнослов'янізми на рівні синтаксису.
- Використовувати аналіз мовних контактів для спростування імперських наративів про українську мову.
- Пояснювати зв'язок між риторичними ідеалами епохи та синтаксичною складністю текстів.
