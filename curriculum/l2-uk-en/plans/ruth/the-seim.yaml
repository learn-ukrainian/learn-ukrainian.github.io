objectives:
- Аналізувати соціолінгвістичні дебати навколо «простої мови» в Речі Посполитій
- Читати та інтерпретувати оригінальні тексти сеймових ухвал XVI-XVII ст. з коментарем
- Розрізняти полонізми, латинізми та церковнослов'янізми в юридичних документах руською мовою
- Простежувати еволюцію української юридичної термінології від руської доби до сьогодення
pedagogy: CBI
