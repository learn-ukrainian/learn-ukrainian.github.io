content_outline:
- points:
  - 'Провокація: Слово "ухвала" — це запозичення з польської чи питоме руське слово? Як воно звучало в документах Литовського
    Статуту?'
  - Фрагмент ухвали Сейму з XVI ст. — що з цього тексту зрозуміло сучасній людині без перекладу, а що вимагає «лінгвістичного
    розкодування»?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Проста мова» сеймових ухвал — це жива народна мова чи штучний «канцелярит» для шляхти?'
  - 'Дебат 2: Що сильніше вплинуло на мову закону — польська модель чи місцева руська правова традиція? Дискусія про джерела
    Литовського Статуту.'
  - '[!decolonization] Існування розвиненої юридичної термінології руською мовою — доказ її державного статусу, а не «селянського»
    характеру, що спростовує імперський наратив.'
  - '[!epistemic-humility] Шляхта була білінгвальною, тому розмежувати свідоме запозичення і природне змішування мов у текстах
    Сейму вкрай важко.'
  section: 'Конфліктна карта: Мова закону: народна чи елітарна?'
  words: 700
- points:
  - Читання автентичної ухвали (постанови) регіонального Сеймику, наприклад, з Волинського воєводства (XVI-XVII ст.).
  - 'Гайд з читання: паралельний текст сучасною українською з коментарями щодо лексичних та граматичних розбіжностей.'
  - 'Розбір ключових термінів: "ухвала", "маршалок", "посол", "статут", "воєводство", "повіт".'
  - '[!decolonization] Аналіз тексту як доказу безперервності української правової та державницької традиції.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз адміністративної та парламентської лексики, запозиченої з польської ("посол", "сейм", "урядник", "резолюція").'
  - 'Латинізми: юридична термінологія, що прийшла через польське посередництво ("декрет", "мандат", "конституція", "апеляція").'
  - 'Церковнослов''янізми: елементи високого стилю в преамбулах ухвал, апеляція до божественного права як джерела легітимності.'
  - '[!myth-buster] Запозичення юридичної термінології — норма для всіх європейських мов того часу. Це ознака інтеграції в
    європейський правовий простір, а не «засмічення» мови.'
  section: 'Мовний контакт: Полонізми та латинізми в мові Сейму'
  words: 1200
- points:
  - 'Порівняльна лабораторія: як одне й те саме поняття (напр., "справедливість", "власність") виражалося в церковнослов''янському,
    руському (мовою Статуту) та сучасному українському законодавстві.'
  - 'Етимологічна лабораторія: простежити шлях слова "ухвала" та його синонімів ("постанова", "рішення") через століття.'
  - 'Палеографічна вправа: спроба прочитати фрагмент рукописної ухвали, написаної "скорописом".'
  - 'Стилістичний аналіз: риторичні фігури у преамбулі сеймової ухвали. Як шляхта переконувала у легітимності своїх рішень?'
  section: 'Мовна лабораторія: Від ухвали до закону'
  words: 1000
- points:
  - 'Повернення до розминки: тож "ухвала" — запозичення чи ні? Студент формулює відповідь, використовуючи знання про мовні
    контакти та історію слова.'
  - 'Лінгвістичний підсумок: що мова сеймових документів говорить нам про стан руської мови напередодні занепаду Речі Посполитої?'
  - 'Зв''язок із сьогоденням: які терміни з мови Сейму дожили до сучасної Верховної Ради? Які зникли і чому?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз мови сеймових документів (ухвал) XVI-XVII ст., зокрема парламентської та юридичної лексики, та її зв'язок із
  сучасною українською мовою.
