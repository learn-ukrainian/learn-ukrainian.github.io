activity_hints:
- description: 'Перевірка розуміння двох головних дебатів: про народність "простої мови" та про польський/руський вплив на
    законодавство.'
  focus: Розуміння соціолінгвістичних дебатів
  items: 5
  type: quiz
- description: 'Заповніть пропуски в реченнях, використовуючи ключові терміни з модуля: ухвала, маршалок, посол, статут, воєводство.'
  focus: Парламентська лексика
  items: 5
  type: fill-in
- description: Порівняйте фрагмент оригінальної ухвали Сеймику та статтю сучасного закону України на схожу тему. Визначте
    3 ключові відмінності в структурі, лексиці та стилі.
  focus: 'Джерельний аналіз: текст ухвали vs сучасний закон'
  type: note
- description: Напишіть коротке есе (400-600 слів), як аналіз мови сеймових документів спростовує імперську тезу про відсутність
    української державності та літературної мови до XIX століття.
  focus: 'Есе: Доказ існування'
  type: note
cefr_min: C2
connects_to:
