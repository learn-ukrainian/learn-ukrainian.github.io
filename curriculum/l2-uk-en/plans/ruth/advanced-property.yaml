activity_hints:
- description: Перевірка розуміння дебатів про "свою" та "запозичену" лексику в Литовському статуті.
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: 'Вставити в речення з Литовського статуту терміни: застава, аренда, пожиток, чинш, майно.'
  focus: Юридична лексика руської доби
  items: 5
  type: fill-in
- description: 'Надано два списки слів: полонізми/латинізми та власне руські слова з тексту. Поясніть, чому в одних випадках
    мова запозичує, а в інших — розвиває власні терміни.'
  focus: 'Джерельний аналіз: запозичення vs еволюція'
  type: note
- description: Напишіть есе (400-600 слів), що доводить, як юридичний текст XVI ст. спростовує імперський наратив про українську
    мову як "селянський діалект".
  focus: 'Есе: Мова Литовського статуту як доказ державності'
  type: note
cefr_min: C2
connects_to:
- latinisms
- polonisms-in-law
content_outline:
- points:
  - 'Провокація: "Пожиток з рухомого майна" — що це означає в Литовському статуті? Як це пов''язано із сучасною іпотекою?'
  - Фрагмент тексту про заставу — студент має визначити, хто кому і що винен.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Литовських статутів — це "староукраїнська", "руська" чи "проста мова"? Чи була вона зрозумілою для всіх,
    чи лише для еліти?'
  - 'Дебат 2: Наскільки правова система була запозичена з польського та німецького права, а наскільки базувалася на місцевій
    традиції "Руської правди"?'
  - '[!decolonization] Існування розвиненої правничої термінології руською мовою спростовує імперську тезу про "неповноцінність"
    української мови, нібито непридатної для держави та закону.'
  - '[!epistemic-humility] Межі між "своїм" і "запозиченим" у правовій лексиці того часу є розмитими. Багато термінів є інтернаціоналізмами
    латинського походження.'
  section: 'Конфліктна карта: Мова права — своя чи запозичена?'
  words: 700
- points:
  - 'Першоджерело: Розділ з Литовського статуту 1588 року про "заставу" (заставне право).'
  - 'Читання оригіналу з глосами: аналіз термінів "кадоубъ", "зъ пожиткомъ", "аренда", "держати".'
  - 'Граматичний коментар: форми аориста та імперфекта в юридичних описах, відмінності в уживанні прийменників порівняно з
    сучасною мовою.'
  - '[!decolonization] Статут був написаний руською мовою, а не польською чи латиною, що свідчить про її державний статус
    у Великому князівстві Литовському.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз юридичної лексики польського походження ("оренда", "чинш", "позов"). Чи були руські відповідники?'
  - 'Латинізми: терміни, що прийшли з римського права через польське посередництво ("декрет", "апеляція", "магістрат").'
  - 'Церковнослов''янізми: використання високого стилю в преамбулах законів для надання їм сакрального авторитету.'
  - '[!myth-buster] Запозичення юридичної термінології — це не "засмічення" мови, а стандартна практика інтеграції в європейський
    правовий простір. Важливо, як мова адаптує ці терміни.'
  section: 'Мовний контакт: Латинь і польська в суді'
  words: 1200
- points:
  - 'Етимологічний трек: простежити шлях слова "аренда" від латинського "rendere" до руської правничої мови. Чому не прижилося
    власне слово "найм"?'
  - 'Порівняльна лабораторія: поняття "іпотека" в сучасному праві vs "застава з пожитком" у Литовському статуті — порівняльний
    аналіз термінів та правових відносин.'
  - 'Стилістичний аналіз: порівняння мови юридичного документа (статут) та літописного викладу — як змінюється синтаксис та
    лексика залежно від жанру?'
  section: 'Мовна лабораторія: Етимологія власності'
  words: 1000
- points:
  - 'Повернення до розминки: що ж таке "пожиток з рухомого майна" і як це поняття відображає економічні реалії того часу?'
  - 'Підсумкове есе: як аналіз мови Литовського статуту доводить безперервність та розвиток української юридичної традиції
    ще за 200 років до Котляревського?'
  - 'Зв''язок із сучасністю: які руські юридичні терміни збереглися в сучасній українській мові, а які були замінені пізнішими
    запозиченнями чи новотворами?'
  section: Дискусія та підсумок
  words: 600
focus: Застава (mortgage) та оренда (lease) в руських юридичних текстах, аналіз полонізмів та латинізмів у правовій лексиці,
  доказ тяглості української правничої мови.
level: RUTH
module: ruth-020
objectives:
- Аналізувати юридичні тексти руської доби (Литовський статут) для виявлення специфічної правової лексики
- Розрізняти шари запозичень (полонізми, латинізми) та власне руську лексику в текстах
- Використовувати аналіз мови права як доказ безперервності української мовної та державної традиції
- Формулювати аргументовану позицію щодо ролі запозичень у розвитку спеціалізованих мовних реєстрів
