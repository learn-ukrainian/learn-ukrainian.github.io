activity_hints:
- description: 'Перевірка розуміння дебатів про мотиви та наслідки апостазії. Кому належить теза: історикам-романтикам чи
    представникам критичної школи?'
  focus: Розуміння конфліктної карти
  items: 8
  type: quiz
- description: Вставити правильний термін (полонізм, латинізм, церковнослов'янізм, соціолект) у речення з аналізом мови конвертитів.
  focus: Термінологія мовного контакту
  items: 8
  type: fill-in
- description: На основі уривку з твору М. Смотрицького, напишіть коротке есе (300-400 слів) на тему "Як цей текст доводить
    існування розвиненої української літературної мови задовго до Котляревського?".
  focus: 'Аналіз: Мова як доказ'
  type: note
- description: Вам надано три речення з однаковим базовим змістом (з літопису, полемічного твору, листа шляхтича). Опишіть
    синтаксичні відмінності та поясніть, які культурні та мовні процеси вони відображають.
  focus: Порівняльний аналіз синтаксису
  type: note
cefr_min: C2
connects_to:
