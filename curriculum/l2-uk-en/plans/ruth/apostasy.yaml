- ruth-polemics
content_outline:
- points:
  - 'Провокація: Рід Вишневецьких — зрадники православної віри чи творці європейської держави? Як одна родина може символізувати
    і велич, і трагедію Русі?'
  - 'Порівняння двох підписів: "Kniaź Jarema Wiśniowiecki" та "Ієремія Корибут Вишневецький". Що означає зміна мови та імені
    для ідентичності людини?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мотиви конверсії. Це був щирий духовний пошук в епоху Реформації та Контрреформації, чи цинічний прагматизм
    для отримання політичних прав та маєтків у Речі Посполитій?'
  - 'Дебат 2: Наслідки для руської спільноти. Чи була "зрада еліт" головною причиною занепаду руської культури, чи цей процес
    стимулював розвиток полемічної літератури та братського руху?'
  - '[!decolonization] Апостазія — це не просто "зрада". Це складний вибір в умовах, коли "руська віра" асоціювалася з відсталістю,
    а "польська/латинська" — з прогресом, освітою та владою. Аналіз цього вибору спростовує імперський наратив про "одвічне
    прагнення до Москви".'
  - '[!epistemic-humility] Ми не можемо знати справжніх думок людини XVII століття. Історики, як Наталя Яковенко, закликають
    уникати моральних оцінок і натомість аналізувати соціальні та культурні механізми, що стояли за конверсією.'
  section: 'Конфліктна карта: Віра чи нація?'
  words: 700
- points:
  - 'Первинне джерело: Уривок з полемічного твору Мелетія Смотрицького "Тренос, або плач Східної Церкви", де він оплакує відступництво
    руських княжих родів.'
  - 'Оригінальний текст (книжна українська мова поч. XVII ст.): аналіз риторичних фігур, що описують "духовну порожнечу" конвертитів.'
  - 'Граматичні нотатки: форми двоїни, давальний самостійний (Dativus absolutus), складні форми минулого часу (перфект, плюсквамперфект)
    — маркери високого стилю.'
  - 'Паралельний переклад сучасною українською: Як передати барокову пишність і пафос, не втративши сенсу? Де Смотрицький
    перебільшує, а де точно фіксує реальність?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - Аналіз мови документів, написаних представниками конвертованої шляхти (напр., Адамом Киселем).
  - 'Полонізми: Не лише лексичні запозичення, а й синтаксичні конструкції (e.g., "mieć" + інфінітив), що витісняють руські
    відповідники. Це свідома полонізація чи несвідомий білінгвізм?'
  - 'Латинізми: Юридична та адміністративна термінологія. Чи були вони ознакою освіченості, чи способом дистанціюватися від
    "простої" руської мови?'
  - 'Церковнослов''янізми: Парадоксальне використання високих церковнослов''янізмів у текстах, що обґрунтовують перехід у
    католицтво. Як це працювало риторично?'
  - '[!myth-buster] Мова конвертитів — не "зіпсована" руська, а гібридний соціолект, що виконував конкретні соціальні функції:
    демонстрацію лояльності до нової політичної нації та збереження зв''язку зі своїм руським корінням.'
  section: 'Мовний контакт: Мова зради чи мова еліти?'
  words: 1200
- points:
  - 'Порівняльний аналіз речень: як одну й ту саму думку виражено у руському літописі, у тексті Смотрицького, і в приватному
    листі конвертита.'
  - 'Граматична лабораторія: Занепад синтетичних конструкцій (простих минулих часів, відмінкових форм) та розквіт аналітичних
    конструкцій під впливом польської мови.'
  - 'Вплив бароко: ускладнення речень, використання періодів, риторичних запитань та окликів як у руських полемістів, так
    і в їхніх опонентів. Чий синтаксис "більш український"?'
  - 'Вправа на реконструкцію: Студентам дається "полонізоване" речення з тексту конвертита. Завдання — "перекласти" його назад
    на імовірну "чисту" руську мову того періоду.'
  section: 'Мовна лабораторія: Синтаксис переходу'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, ким був Ярема Вишневецький? Студент має сформулювати комплексну відповідь, використовуючи
    поняття ідентичності, віри, мови та політичної лояльності.'
  - 'Лінгвістичний висновок: Як феномен апостазії вплинув на розвиток української мови? З одного боку, він "очистив" її від
    частини еліти, з іншого — збагатив новими поняттями та змусив виробляти власну інтелектуальну відповідь.'
  - 'Зв''язок із сучасністю: Дискусії про "перевзування", мовне питання та лояльність під час війни. Наскільки історичний
    досвід XVII століття є релевантним для розуміння сучасної України?'
  section: Дискусія та підсумок
  words: 600
focus: 'The phenomenon of apostasy among Ruthenian nobility in the Polish-Lithuanian Commonwealth: linguistic, cultural, and
  political consequences of religious conversion.'
