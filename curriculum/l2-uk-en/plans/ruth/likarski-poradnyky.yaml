content_outline:
- points:
  - 'Провокація: у рецепті XVIII ст. написано «візьми калганного кореня». Що таке «калган»? Чи це українське слово? І чи використовуємо
    ми його сьогодні в аптеці чи на кухні?'
  - 'Порівняння: два речення — одне з порадника, інше — з сучасної інструкції до ліків. Що змінилось у структурі наказового
    способу, а що лишилось незмінним?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою написані ці порадники? Це «проста мова», «народний» варіант літературної, чи вже зароджується українська
    наукова термінологія?'
  - 'Дебат 2: Наскільки ці тексти оригінальні? Це переклади з польських/латинських джерел, чи це фіксація автентичної української
    народної медицини? [!epistemic-humility] Точну межу між запозиченням і компіляцією встановити важко.'
  - '[!decolonization] Ці порадники спростовують імперський міф про те, що українська мова до XIX ст. була лише мовою «селян
    і пісень». Вона була повноцінним інструментом для передачі практичних, медичних та агрономічних знань.'
  section: 'Конфліктна карта: Мова науки чи мова народу?'
  words: 700
- points:
  - 'Читання фрагментів з порадників: рецепти настоянок, поради щодо ведення господарства, сільськогосподарський календар.'
  - Оригінальний текст (нормалізована орфографія) з паралельним сучасним українським перекладом для найскладніших фрагментів.
  - 'Глосарій: розбір архаїчної лексики, пов’язаної з хворобами, ліками, рослинами та побутом (напр. «пропасниця», «падуча»,
    «зілля»).'
  - '[!decolonization] Контекст: ці тексти писалися для українців українською, демонструючи внутрішню функціональність мови
    у сферах, де імперська політика просувала латину, польську або російську.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз латинізмів: назви рослин (Mentha, Viburnum), медичні терміни (дози, інгредієнти), що прийшли через європейську
    наукову традицію.'
  - 'Аналіз полонізмів: побутова лексика, назви інструментів, синтаксичні конструкції (кальки), що потрапили в мову через
    культурний та адміністративний вплив Речі Посполитої.'
  - 'Аналіз церковнослов’янізмів: чи є вони в текстах практичного характеру? Якщо так, яку стилістичну функцію виконують?'
  - '[!myth-buster] Запозичення — не «засмічення», а доказ контактів та включеності в європейський науковий простір. Багато
    з цих запозичень досі є частиною української медичної термінології.'
  section: 'Мовний контакт: Латина, польська і народна медицина'
  words: 1200
- points:
  - 'Граматичний аналіз: структура речень-інструкцій. Дослідження вживання наказового способу дієслів у XVIII ст. та порівняння
    з сучасними нормами.'
  - 'Етимологічний слід: простежуємо шлях 5-6 ключових слів з тексту (напр. «зілля», «рецепт», «аптека», «горілка») від їх
    походження до сучасного значення.'
  - 'Стилістичний аналіз: чим мова порадників відрізняється від мови тогочасних релігійних чи козацьких текстів? Аналіз на
    рівні лексики та синтаксису.'
  section: 'Мовна лабораторія: Анатомія рецепта'
  words: 1000
- points:
  - 'Повернення до розминки: тож що нам розповів «калганний корінь» про українську мову XVIII століття?'
  - 'Лінгвістичний висновок: ці тексти доводять, що українська мова мала розвинену лексику і граматику для обслуговування
    складних практичних сфер життя, що є ключовою ознакою повноцінної мови.'
  - 'Зв’язок у майбутнє: як цей пласт «практичної» лексики вплинув на формування сучасної української наукової термінології,
    зокрема в ботаніці, медицині та фармакології?'
  section: Дискусія та підсумок
  words: 600
focus: 'Ukrainian domestic & practical register: medical/household manuals. Language of science and daily life vs. high literary/church
  styles. Analysis of Latin/Polish borrowings in a practical context.'
level: RUTH
module: ruth-111
objectives:
- Аналізувати соціолінгвістичний статус «простої мови» XVIII ст. на матеріалі лікарських порадників
- Читатати та інтерпретувати оригінальні українські тексти практичного призначення XVIII століття
- Ідентифікувати та класифікувати латинізми, полонізми та церковнослов’янізми в текстах, пояснюючи їхню функцію
- Формулювати аргументовану позицію щодо ролі практичних текстів у доведенні функціональної повноцінності української мови
  до XIX століття
