content_outline:
- points:
  - 'Провокація: «Аз єсмь Жеривіл, отрок Ярополка, князя тьмочисленних полков». Це українська мова? Польська? Церковнослов''янська?'
  - 'Питання для роздумів: Чому автор XVIII століття змішує стільки мов в одній п''єсі? Це ознака занепаду чи сили?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою написана шкільна драма? «Проста мова», «книжна українська», «макаронічна мова» — кожен термін є політичним
    вибором.'
  - 'Дебат 2: «Володимир» Прокоповича — це панегірик Петру І чи прихована критика імперських амбіцій через історичну алегорію?'
  - '[!decolonization] Існування розвиненої театральної культури в Києві XVIII ст. — найкраще спростування імперського міфу
    про «неіснування» української мови до Котляревського.'
  - '[!epistemic-humility] Межі між церковнослов''янською, «простою мовою» та польськими впливами були розмитими. Автори свідомо
    грали на цих регістрах.'
  section: 'Конфліктна карта: Драма ідентичності'
  words: 700
- points:
  - 'Первинний текст: читання уривків з трагікомедії Феофана Прокоповича «Володимир».'
  - 'Структура: аналіз п''ятиактної будови, ролі хору, прологу та епілогу як синтезу класичної форми та барокового змісту.'
  - 'Глосарій: розбір архаїчних форм, запозичень та незрозумілих слів безпосередньо в тексті.'
  - '[!decolonization] Прокопович використовує історію хрещення Русі для легітимації власної держави, а не для підтвердження
    «спільного коріння» з Москвою.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Латинізми: аналіз риторичних фігур, алегорій, емблем та самої структури драми як запозичень з класичної та європейської
    традиції.'
  - 'Полонізми: дослідження впливу польської мови на синтаксис та лексику, особливо в побутових сценах.'
  - 'Церковнослов''янізми: як «високий стиль» використовується для характеристики влади, духовенства та для надання пафосу
    подіям.'
  - '[!myth-buster] Макаронічна мова — це не «засмічення», а свідомий художній прийом бароко, що відображав багатомовну реальність
    тогочасної еліти.'
  section: 'Мовний контакт: Сплав мов у шкільній драмі'
  words: 1200
- points:
  - 'Граматична лабораторія: аналіз синтаксичних конструкцій з поетик Митрофана Довгалевського, що кодифікували правила для
    студентів.'
  - 'Стилістична лабораторія: студенти отримують уривок з «Володимира» і класифікують лексику за походженням (латинізми, полонізми,
    церковнослов''янізми, простомовні елементи).'
  - 'Порівняльна лабораторія: одне й те саме поняття (наприклад, «влада» або «віра») у викладі різними регістрами, наявними
    в тексті. Як змінюється сенс?'
  - 'Етимологічний слід: простежити шлях кількох ключових слів з п''єси до сучасної української мови.'
  section: 'Мовна лабораторія: Стилістичний аналіз реєстрів'
  words: 1000
- points:
  - 'Повернення до розминки: тепер ми розуміємо, що мовна мішанина — це не хаос, а складна система кодів, що передає соціальний
    статус та контекст.'
  - 'Лінгвістичний підсумок: шкільна драма демонструє гнучкість та життєздатність української мови, її здатність абсорбувати
    впливи та творити високі жанри.'
  - 'Зв''язок з майбутнім: як традиції шкільної драми (алегоричність, політичний підтекст, високий стиль) вплинули на розвиток
    українського театру та літератури у ХІХ столітті?'
  section: Дискусія та підсумок
  words: 600
focus: Прокопович, «Володимир», Довгалевський, барокова риторика, макаронічна мова
