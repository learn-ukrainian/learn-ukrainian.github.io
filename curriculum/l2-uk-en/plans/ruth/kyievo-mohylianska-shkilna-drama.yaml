objectives:
- Аналізувати шкільну драму КМА як синтез класичної та барокової поетики.
- Інтерпретувати «Володимира» Прокоповича як політичну алегорію.
- Розрізняти мовні реєстри (церковнослов'янський, латинський, польський, простомовний) у текстах XVIII століття.
- Використовувати матеріал модуля для аргументації існування та розвитку української мови до Котляревського.
