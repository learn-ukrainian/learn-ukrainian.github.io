activity_hints:
- description: Перевірка розуміння позицій щодо мови Сковороди. Чия це теза — Шевельова чи радянських критиків? Визначити
    позицію за цитатою.
  focus: Розуміння соціолінгвістичних дебатів
  items: 5
  type: quiz
- description: Вставте слова (благодать, натура, серце, істина) у речення, пояснюючи, до якого стилістичного регістру вони
    належать.
  focus: Ідентифікація мовних шарів
  items: 4
  type: fill-in
- description: Наведіть по одному фрагменту тексту Сковороди та Котляревського. Порівняйте їхні мовні стратегії. Чому один
    вважається «початком», а інший — «кінцем» епохи?
  focus: 'Порівняльний аналіз: Сковорода і Котляревський'
  type: note
- description: Напишіть есе (400-600 слів), де на основі матеріалів модуля ви доводите, що лінгвістичні особливості текстів
    Сковороди є доказом безперервності розвитку української мови, а не її «відсутності» до ХІХ ст.
  focus: 'Есе: Як мова Сковороди спростовує імперські міфи?'
  type: note
