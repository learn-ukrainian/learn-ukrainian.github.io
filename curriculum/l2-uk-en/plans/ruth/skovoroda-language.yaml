- Аналізувати мовну гібридність текстів Григорія Сковороди, розрізняючи церковнослов'янські, народномовні та запозичені елементи
- Формулювати аргументовану позицію в соціолінгвістичних дебатах щодо місця Сковороди в історії української літературної мови
- Застосовувати методи стилістичного та етимологічного аналізу до текстів руської доби
