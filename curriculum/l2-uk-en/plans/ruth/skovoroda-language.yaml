content_outline:
- points:
  - 'Провокація: «Нерівна всім рівність» — відомий афоризм Сковороди. А якою мовою він його записав? Порівняйте: церковнослов’янський
    варіант, сучасний український, і оригінал. Що змінилося, а що залишилося?'
  - 'Ключове поняття: «сродна праця». Як ви розумієте це словосполучення? З яких мовних шарів походять ці два слова?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сковорода — останній письменник «книжної» традиції чи перший український філософ? Класифікація його мови: штучний
    високий стиль чи спроба створити філософську термінологію на народній основі?'
  - 'Дебат 2: Російський вплив у текстах Сковороди — це органічні риси спільного культурного простору чи свідоме «обрусіння»?
    Полеміка між Шевельовим (барокова багатомовність) та радянськими літературознавцями (початок «возз''єднання» мов).'
  - '[!decolonization] Твердження, що Сковорода писав «староросійською» — інструмент імперського наративу. Аналіз показує
    переважно українську фонетику та морфологію під церковнослов''янською «оболонкою».'
  - '[!epistemic-humility] Межі між «руською», «російською» та «церковнослов''янською» в XVIII ст. були нечіткими. Сам Сковорода
    свідомо грався з цими регістрами, створюючи унікальний стиль.'
  section: 'Конфліктна карта: Мова «висока» чи «народна»?'
  words: 700
- points:
  - 'Первинне джерело: Фрагмент з «Байки Харківські» або «Саду Божественних Пісень» в оригінальній орфографії.'
  - 'Кероване читання: Розбір тексту з глосарієм для архаїчних форм (двоїна, аорист, нестягнені форми прикметників).'
  - 'Граматичні нотатки: Аналіз синтаксичних конструкцій, що відрізняються від сучасної мови (давальний самостійний, інверсії).'
  - 'Паралельний переклад: Оригінальний уривок поруч із сучасним українським літературним перекладом для виявлення семантичних
    та стилістичних зсувів.'
  - '[!decolonization] Читання Сковороди в оригіналі — це прямий доказ існування розвиненої української літературно-філософської
    мови задовго до Котляревського.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов’янізми: Аналіз використання абстрактної лексики (благодать, премудрість, єство) та синтаксису для створення
    «високого», філософського регістру.'
  - 'Полонізми та Латинізми: Як лексика, засвоєна через Києво-Могилянську академію (натура, термін, аппетит), використовується
    для наукової точності.'
  - 'Народна основа: Виявлення живої розмовної мови в основі текстів — побутова лексика, фразеологія, прислів’я. Сковорода
    пояснює «високе» через «просте».'
  - '[!myth-buster] Мова Сковороди — це не хаотичний «суржик». Це свідомий бароковий синтез, де кожен мовний шар виконує свою
    стилістичну функцію, створюючи унікальний ефект.'
  section: 'Мовний контакт: Сплав трьох стилів'
  words: 1200
- points:
  - 'Порівняльний аналіз: Перекладіть один абзац Сковороди трьома способами: 1) імітуючи чисту церковнослов''янську, 2) сучасною
    літературною українською, 3) розмовною українською. Проаналізуйте, що втрачається та здобувається в кожному випадку.'
  - 'Стилістичний аналіз: У поданому тексті розмаркуйте слова за походженням (церковнослов’янізм, народне слово, полонізм/латинізм).
    Обговоріть, як це поєднання створює філософський ефект.'
  - 'Етимологічний слід: Простежте шлях ключових слів Сковороди (напр., «сродність», «любомудріє») — від їхніх коренів до
    статусу філософських термінів.'
  section: 'Мовна лабораторія: Стилістична стратиграфія'
  words: 1000
- points:
  - 'Повернення до розминки: Тепер, знаючи про мовну палітру Сковороди, як ви розумієте його вибір мови для фрази «нерівна
    всім рівність»? Чи могла б ця ідея бути висловлена суто народною мовою того часу?'
  - 'Зв''язок уперед: Сковорода — це глухий кут чи основа для подальшого розвитку? Чому мовна модель Котляревського (чиста
    народна мова) зрештою перемогла модель Сковороди (синтетична)?'
  - 'Лінгвістичний висновок: Мова Сковороди — це доказ не «відсутності» української мови, а її існування у складній, багатошаровій
    формі, типовій для європейської барокової культури.'
  section: Дискусія та підсумок
  words: 600
focus: 'The hybrid language of Hryhorii Skovoroda: a conscious blend of Church Slavonic, Ruthenian, and vernacular Ukrainian,
  used to create a unique philosophical style.'
