content_outline:
- points:
  - 'Провокація: Фрагмент грамоти 1398 року: "а хто тую грамоту нашу порушить, судити ему Богъ". Що означає ця формула і де
    ми знаходимо її сучасні відповідники?'
  - 'Вгадай термін: що таке "маєтність" у XIV столітті? Це те саме, що "майно" сьогодні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Як класифікувати мову цих грамот? Це "проста мова" (спільний розмовний койне), "руська мова" (офіційна мова
    ВКЛ) чи рання українська? Які політичні наслідки має кожен термін?'
  - 'Дебат 2: Чи є ці грамоти доказом неперервної писемної традиції, чи лише випадковими "проблисками" народного мовлення
    у церковнослов''янській канцелярській рутині?'
  - '[!decolonization] Саме існування цих документів руйнує імперський міф про те, що українська мова до XIX ст. була виключно
    "селянським діалектом" без писемної та юридичної традиції.'
  - '[!epistemic-humility] Межі між мовами в цей період були розмитими. Книжники оперували кількома мовними регістрами одночасно,
    і не завжди легко визначити, де закінчується один і починається інший.'
  section: 'Конфліктна карта: ''Проста мова'' чи ''руська мова''?'
  words: 700
- points:
  - 'Читання фрагменту дарчої грамоти (1390-ті). Розбір структури: вступна формула, опис майна, список свідків, присяга та
    санкції.'
  - 'Глоси та коментарі: розбираємо архаїчні форми та юридичні терміни, що вийшли з ужитку (напр. "печатник", "тивунь").'
  - 'Граматичні нотатки: аналіз форм двоїни, аориста та імперфекта, що зустрічаються в тексті, та їхня відмінність від сучасних
    форм.'
  - '[!decolonization] Текст грамоти демонструє функціонування української мови на найвищому рівні — у сфері права та адміністрування
    — за 400 років до Котляревського.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналіз лексики високого стилю, релігійних формул у присягах. Це данина традиції чи свідомий вибір
    для надання ваги документу?'
  - 'Полонізми та германізми: перші ластівки західного впливу в адміністративній лексиці (напр., через міське право). Як відрізнити
    запозичення від спільної індоєвропейської спадщини?'
  - 'Українська основа: виділення суто українських фонетичних та морфологічних рис, що відрізняють мову грамот і від церковнослов''янської,
    і від польської.'
  - '[!myth-buster] Запозичення в юридичній термінології — це не "засмічення" мови, а глобальна норма. Аналізуємо, які запозичення
    вижили, а які були замінені пізніше.'
  section: 'Мовний контакт: Полонізми та церковнослов''янізми'
  words: 1200
- points:
  - 'Палеографічна практика: робота з фотокопіями грамот. Основи тогочасного скоропису ("устав" та "півустав"). Вчимося розпізнавати
    ключові літери та лігатури.'
  - 'Порівняльна лабораторія: порівнюємо юридичну формулу з грамоти XIV ст. з аналогічною нормою з "Руської Правди" (XI-XII
    ст.) та сучасного Цивільного кодексу України. Що змінилося, а що залишилося незмінним?'
  - 'Етимологічний слід: простежуємо шлях слова "свідок" — від його перших фіксацій у грамотах до його сучасного значення
    та вживання в юридичній практиці.'
  section: 'Мовна лабораторія: Палеографія та юридична лексика'
  words: 1000
- points:
  - 'Повернення до розминки: тепер, маючи повний контекст, як би ви пояснили іноземному юристу значення формули "а хто тую
    грамоту нашу порушить..."?'
  - 'Лінгвістичний висновок: що грамоти XIV століття говорять нам про стан, статус та функціональну повноту української мови
    в середньовіччі?'
  - 'Зв''язок уперед: як правова мова цих ранніх грамот заклала фундамент для кодифікації права у Литовських статутах XVI
    століття?'
  section: Дискусія та підсумок
  words: 600
focus: Oldest surviving Ukrainian administrative documents — legal language predating the Lithuanian Statutes
level: RUTH
module: ruth-105
objectives:
- Аналізувати соціолінгвістичний контекст XIV століття та розрізняти поняття 'проста мова' та 'руська мова'.
- Читати та інтерпретувати фрагменти оригінальних українських грамот XIV століття, розпізнаючи архаїчну лексику та граматичні
  форми.
- Визначати вплив церковнослов'янської та польської мов на формування української адміністративно-юридичної лексики.
- Формулювати аргументовану позицію щодо безперервності української писемної традиції, використовуючи грамоти як доказову
  базу.
