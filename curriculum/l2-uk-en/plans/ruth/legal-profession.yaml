content_outline:
- points:
  - 'Провокація: Вам до рук потрапив судовий декрет 16-го століття. Ви бачите посаду «возний». Хто це? Сучасний «візник»?
    Судовий виконавець? Охоронець?'
  - 'Порівняння: «Прокуратор» (руська доба) vs «прокурор» (сучасність). У чому різниця функцій, що ховається за схожою назвою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Литовський статут написаний «простою мовою» чи це вже кодифікована «руська канцелярська мова»? Аргументи за
    і проти кожної з назв.'
  - 'Дебат 2: Статут — інструмент полонізації через юридичну термінологію чи, навпаки, засіб збереження руської ідентичності
    через кодифікацію права?'
  - '[!decolonization] Існування такого комплексного юридичного документу, написаного руською мовою, спростовує імперський
    міф про відсутність в українців власної державної та правової традиції до 19-го століття.'
  - '[!epistemic-humility] Межі між «руською», «польською» та «латинською» в мові права того часу були дуже розмитими. Це
    не стільки три різні мови, скільки три функціональні регістри однієї освіченої людини.'
  section: 'Конфліктна карта: Мова закону чи закон мови?'
  words: 700
- points:
  - 'Первинне джерело: Аналіз статті з Третього Литовського статуту, що регулює обов''язки возного та прокуратора.'
  - 'Оригінальний текст (нормалізована орфографія) з паралельним глосарієм: «позов», «ґвалт», «кревна справа», «урядник».'
  - 'Граматичний коментар: аналіз конструкцій з давальним самостійним, форми минулого часу, синтаксичні впливи польської мови.'
  - 'Контекст: Чому саме Литовський статут, а не якийсь інший документ, став взірцем права на українських землях на століття
    вперед?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз юридичної та адміністративної лексики, запозиченої з польської (уряд, урядник, маєстат, держак).'
  - 'Латинізми: розбір абстрактних юридичних понять, що прийшли через польське посередництво з латини (декрет, апеляція, мандат,
    прокуратор).'
  - 'Церковнослов''янізми: пошук в текстах слів високого стилю, що використовуються для надання ваги та морального авторитету
    закону (справедливість, закон, гріх).'
  - '[!myth-buster] Запозичення в юридичній термінології — це не «засмічення» мови, а ознака її участі в загальноєвропейському
    правовому полі. Кожне запозичення мало свою функцію.'
  section: 'Мовний контакт: Полонізми, латинізми та слов''янізми в мові суду'
  words: 1200
- points:
  - 'Стилістичний аналіз: розбираємо реальний судовий позов XVI століття на «лінгвістичні шари».'
  - 'Завдання 1: Виділити в тексті кольорами слова руського, польського, латинського та церковнослов''янського походження.'
  - 'Завдання 2 (Етимологічний трек): Простежити шлях слова «прокуратор» від латинського `procurator` до сучасного українського
    «прокурор», фіксуючи зміни у значенні на кожному етапі.'
  - 'Завдання 3 (Порівняльний аналіз): Як поняття «договір» виражалося в руській канцелярській мові, церковнослов''янській
    та як воно звучить у сучасній юридичній українській? Проаналізувати відмінності.'
  section: 'Мовна лабораторія: Анатомія судового позову'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, хто такий «возний» і чим він відрізняється від «прокуратора»? Сформулюйте відповідь, спираючись
    на текст Статуту.'
  - 'Лінгвістичний висновок: Що аналіз мови права говорить нам про стан руської мови в XVI-XVII століттях? Це мова в обороні
    чи в наступі?'
  - 'Зв''язок уперед: Які з проаналізованих юридичних термінів збереглися в сучасній українській мові, а які були втрачені
    (і чому, наприклад, через русифікацію)?'
  - 'Головне питання: Як існування Литовського статуту доводить безперервність української правової та мовної традиції задовго
    до Котляревського?'
  section: Дискусія та підсумок
  words: 600
focus: 'Прокуратор, Возний та інші урядники: мова суду в Литовському статуті'
level: RUTH
module: ruth-022
objectives:
- Аналізувати юридичну лексику руської доби, розрізняючи полонізми, латинізми та церковнослов'янізми.
- Пояснювати роль Третього Литовського статуту в історії української мови та державності.
- Читати та інтерпретувати автентичні юридичні тексти XVI-XVII століть з науковим коментарем.
- Аргументовано доводити безперервність української правової традиції, спростовуючи імперські наративи.
