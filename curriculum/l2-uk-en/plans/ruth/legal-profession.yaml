activity_hints:
- description: Кому належить теза? Розподіліть аргументи між прихильниками ідеї «простої мови» та «канцелярської мови».
  focus: Розуміння соціолінгвістичних дебатів
  items: 6
  type: quiz
- description: 'Вставте в речення з Литовського статуту пропущені терміни: возний, прокуратор, ґвалт, позов, урядник.'
  focus: Юридична лексика в контексті
  items: 5
  type: fill-in
- description: 'Наведено три короткі тексти, що описують поняття «справедливість»: з Біблії (церковнослов''янська), з Литовського
    статуту (руська) та з Конституції України (сучасна). Порівняйте лексику та синтаксис. Що змінилося?'
  focus: 'Порівняльний аналіз: еволюція поняття'
  type: note
- description: Використовуючи матеріал модуля, напишіть есе (400-600 слів) на тему «Чому Литовський статут є доказом існування
    розвиненої української мови та правової культури задовго до Івана Котляревського?»
  focus: 'Есе: Мова як доказ державності'
  type: note
