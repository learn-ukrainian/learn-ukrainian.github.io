activity_hints:
- description: Перевірка розуміння дебатів про співіснування "простої мови" та церковнослов'янської, а також про мету драми
    (пропаганда чи народна побожність).
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: 'Визначити походження слів у фрагментах тексту: церковнослов''янізм, полонізм, чи питоме руське слово.'
  focus: Аналіз мовного контакту
  items: 6
  type: fill-in
- description: Проаналізуйте діалог між алегоричними персонажами (напр., Правда та Гріх). Які богословські ідеї вони представляють
    і як їхня мова це відображає?
  focus: Аналіз алегорії
  type: note
- description: Як «Слово про збурення пекла» слугує доказом безперервності української літературної традиції до Котляревського?
    Аргументуйте, спираючись на мовні та стилістичні особливості тексту (400-600 слів).
  focus: 'Есе: Доказ існування мови'
  type: note
cefr_min: C2
