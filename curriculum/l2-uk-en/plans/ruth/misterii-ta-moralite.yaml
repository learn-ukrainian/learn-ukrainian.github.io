content_outline:
- points:
  - 'Провокація: Як церковний обряд перетворюється на вуличну виставу? Розглядаємо рядок з «Слова про збурення пекла» та його
    літургійне джерело.'
  - 'Загадка: що спільного між Христом, який перемагає Пекло, і алегоричною фігурою Правди, що сперечається з Гріхом? Відповідь
    лежить у жанровій природі середньовічної драми.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Мовний): Чи є «Слово про збурення пекла» текстом церковнослов''янським, чи це вже руська (староукраїнська) мова?
    Аналіз лексики та синтаксису, що показує співіснування обох систем.'
  - 'Дебат 2 (Ідеологічний): Це інструмент церковної пропаганди для навчання пастви чи вияв народної побожності, що використовує
    апокрифічні (неканонічні) сюжети?'
  - '[!epistemic-humility] Межі між "високим" (слов''янським) та "низьким" (народним) регістрами були розмитими. Автори свідомо
    змішували їх для досягнення різних ефектів.'
  - '[!decolonization] Саме існування таких складних літературних текстів руською мовою руйнує імперський міф про "селянський
    діалект" без давньої писемної традиції.'
  section: 'Конфліктна карта: Проста мова чи високий стиль?'
  words: 700
- points:
  - 'Первинне джерело: Читання уривків з «Слова про збурення пекла» в адаптованій орфографії.'
  - 'Діалог Христа та Пекла: Аналіз риторики, аргументів та драматичної напруги у ключовій сцені.'
  - 'Глоси та коментарі: Пояснення архаїчних форм, граматичних конструкцій та їх відмінностей від сучасної української мови.'
  - 'Контекст: Текст базується на апокрифічному Євангелії від Никодима — як це вплинуло на його зміст та популярність?'
  - '[!decolonization] Цей текст — частина європейського культурного простору, а не периферійна імітація.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: Аналіз лексики та синтаксису високого, літургійного стилю. Коли і навіщо автор використовує слов''янізми?'
  - 'Полонізми: Вплив польської католицької традиції на українську драму. Пошук лексичних запозичень, що прийшли через польську
    мову.'
  - 'Латинізми: богословські та філософські терміни, що проникали через європейську схоластику.'
  - '[!myth-buster] Запозичення не є "засміченням" мови. Аналіз показує, як руські автори освоювали європейський інтелектуальний
    простір, адаптуючи поняття до власної мовної системи.'
  section: 'Мовний контакт: Священні мови'
  words: 1200
- points:
  - 'Стилістичний аналіз: Як працює алегорична персоніфікація? Розбір діалогів між Смертю, Гріхом, Правдою. Якими мовними
    засобами створюються їхні образи?'
  - 'Порівняльний аналіз: Зіставлення фрагмента літургійної служби, відповідного уривку з Євангелія та сцени з драми. Простежити
    еволюцію від ритуалу до театру.'
  - 'Граматична еволюція: Виявлення у тексті архаїчних форм дієслів або відмінювання іменників та порівняння їх із сучасними
    українськими відповідниками.'
  section: 'Мовна лабораторія: Від обряду до драми'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, як народжується театр з ритуалу? Узагальнення на основі проаналізованого матеріалу.'
  - 'Лінгвістичний висновок: «Слово про збурення пекла» демонструє складну мовну свідомість автора, що вільно володіє різними
    регістрами — від високого церковного до розмовного народного.'
  - 'Зв''язок уперед: Як традиції містерій та мораліте вплинули на розвиток українського вертепу та шкільної драми?'
  section: Дискусія та підсумок
  words: 600
focus: «Слово про збурення пекла» як зразок літургійної драми, алегорична персоніфікація, мовний контакт у релігійних текстах
