activity_hints:
- description: 'Розрізнення позицій у дебатах. Чия це теза: що барокова поезія — це "мистецтво на замовлення" чи "доказ суб''єктності"?'
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: У поданих рядках з барокових віршів визначити, де полонізм, де латинізм, а де церковнослов'янізм.
  focus: Ідентифікація мовних контактів
  items: 8
  type: fill-in
- description: Порівняйте уривок з "Віршів на жалосний погреб Сагайдачного" з уривком з козацького літопису про ту ж подію.
    Що поет додав, перебільшив, замовчав і чому?
  focus: 'Джерельний аналіз: Вірш vs Історична подія'
  type: note
- description: 'Напишіть коротке есе (400-600 слів), використовуючи 2-3 приклади з модуля, щоб довести тезу: "Українська барокова
    поезія є найсильнішим спростуванням міфу про те, що українська мова до Котляревського була лише селянським діалектом".'
  focus: 'Есе: Доказ існування'
  type: note
cefr_min: C2
connects_to:
- bajky-xvii-xviii
- intermedii-xvii-xviii
content_outline:
- points:
  - 'Провокація: два рядки з панегірика Касіяна Саковича поруч із сучасним перекладом. Що це — підлабузництво чи висока політика?
    Як форма вірша служить меті?'
  - 'Термін: "силабічний вірш". Студент має припустити, що це означає, перш ніж отримати визначення.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є барокова поезія "українською"? Дискусія про "просту мову" vs полонізми/латинізми як мову еліти. Чи це "польська
    література, писана руськими літерами"?'
  - 'Дебат 2: Це мистецтво чи сервіс? Панегірики гетьманам та єпископам — щирий вияв почуттів чи оплачена праця придворного
    поета?'
  - '[!decolonization] Існування розвиненої силабічної поезії в XVI-XVII ст. повністю спростовує російський імперський наратив
    про "неіснування" української мови до XIX ст.'
  - '[!epistemic-humility] Межі між "високим" (церковнослов''янським), "середнім" (книжною українською) та "низьким" (народним)
    регістрами були розмитими. Поети свідомо гралися з цими регістрами.'
  section: 'Конфліктна карта: Поезія для Бога, Гетьмана чи Народу?'
  words: 700
- points:
  - 'Первинний текст: "Вірші на жалосний погреб... Петра Конашевича-Сагайдачного" Касіяна Саковича (фрагменти).'
  - 'Кероване читання: оригінальний текст з нормалізованою орфографією, глоси для архаїзмів та полонізмів.'
  - 'Граматичні нотатки: аналіз форм двоїни, аориста та інших руських граматичних рис, що зникають.'
  - 'Контекст: похорон гетьмана як політична подія. Поема — не просто жаль, а політична декларація козацької суб''єктності.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: лексичні запозичення (уряд, край, власний) та синтаксичні конструкції. Це мода чи необхідність?'
  - 'Аналіз латинізмів: академічна та риторична лексика. Вплив єзуїтських колегіумів та європейської освітньої традиції.'
  - Церковнослов'янізми як ознака "високого стилю" в релігійній ліриці (Лазар Баранович).
  - '[!myth-buster] Запозичення не є "засміченням" мови. Вони показують, до якого культурного простору (Річ Посполита, Латинська
    Європа) належала українська еліта.'
  section: 'Мовний контакт: Полонізми та латинізми в силабічному вірші'
  words: 1200
- points:
  - 'Граматична лабораторія: відмінювання іменників та дієслів у тексті — порівняння з сучасними формами. Простежити еволюцію.'
  - 'Стилістична лабораторія: ідентифікація шарів лексики в одному вірші — церковнослов''янізми, полонізми, рутенізми. Яку
    функцію виконує кожен шар?'
  - 'Версифікаційна лабораторія: сканування силабічного вірша. Підрахунок складів, аналіз рими (суміжна, перехресна), цезури.
    Створення власного чотиривірша за цими правилами.'
  section: 'Мовна лабораторія: Розтин силабічного вірша'
  words: 1000
- points:
  - 'Повернення до розминки: чи можна вважати панегірик "щирою" поезією? Студент формулює відповідь, спираючись на знання
    про епоху та патронаж.'
  - 'Лінгвістичний висновок: барокова поезія доводить, що українська мова в XVI-XVII ст. мала кілька розвинених регістрів,
    здатних обслуговувати складні літературні та філософські потреби.'
  - 'Зв''язок уперед: як барокова традиція (складний синтаксис, риторика) вплинула на філософію Сковороди та пізніше — на
    український модернізм?'
  section: Дискусія та підсумок
  words: 600
focus: Syllabic verse, panegyrics, and laments — Ukrainian competing with Latin and Polish as a literary language
level: RUTH
module: ruth-108
objectives:
- Аналізувати соціолінгвістичний контекст української барокової поезії, зокрема її конкуренцію з польською та латинською мовами.
- Ідентифікувати та аналізувати мовні контакти (полонізми, латинізми, церковнослов'янізми) у літературних текстах XVI-XVII
  ст.
- Застосовувати основи версифікації для аналізу силабічного вірша.
- Формулювати аргументовану позицію щодо ролі барокової літератури як доказу безперервності української мовної та культурної
  традиції.
pedagogy: CBI
