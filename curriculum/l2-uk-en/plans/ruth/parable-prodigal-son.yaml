content_outline:
- points:
  - 'Порівняння фрази з притчі: «Отче, згрішивъ єсмь на небо и перед тобою» (Острозька Біблія) vs. «Отче, я згрішив проти
    неба й перед тобою» (сучасний переклад). Які граматичні форми зникли і чому?'
  - 'Провокація: Слово «блудний» у назві притчі. Це моральна оцінка чи точний переклад грецького оригіналу (ἄσωτος — ''не-рятівний'',
    ''марнотратний'')?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Переклади Біблії руською мовою (Пересопницьке Євангеліє) — це політичний акт створення окремої «української»
    церковної мови чи просто спроба зробити текст зрозумілішим («проста мова»)?'
  - 'Дебат 2: Лексика притчі — це «високий стиль» церковнослов''янської мови, чи автор свідомо використовує побутову, «низьку»
    лексику для досягнення емоційного ефекту?'
  - '[!decolonization] Існування цих перекладів доводить безперервність зусиль зі створення окремого українського літературно-релігійного
    стандарту, спростовуючи імперську тезу про «неіснування» мови до XIX ст.'
  - '[!epistemic-humility] Межа між «простою мовою» та «книжним церковнослов''янізмом» була дуже розмитою. Писарі постійно
    змішували регістри, що ускладнює чітку класифікацію мови тексту.'
  section: 'Конфліктна карта: Мова Святого Письма: Висока чи проста?'
  words: 700
- points:
  - Читання фрагменту тексту притчі з руського джерела (напр., Печерський Патерик).
  - Паралельний переклад сучасною українською для синтаксично складних ділянок.
  - 'Глоси для архаїчних форм: аналіз вживання двоїни, аориста та імперфекта (напр. «єсмь згрішивъ»).'
  - 'Лексичний аналіз: розгляд ключових слів для вираження емоцій та родинних стосунків (любов, прощення, гнів, спадщина)
    та їх семантичних полів.'
  - '[!decolonization] Сам акт перекладу Євангелія на зрозумілу народові мову був формою культурного самоствердження в умовах
    польського католицького та московського православного тиску.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналіз «високої» релігійної лексики (гріх, покаяння, благословення) та її роль у тексті.'
  - 'Полонізми та латинізми: пошук та аналіз можливих слідів польського впливу в синтаксисі або лексиці, характерних для даного
    періоду.'
  - 'Народна мова: аналіз побутової, «низької» лексики (свині, теля, маєток) та її взаємодія з високим стилем притчі.'
  - '[!myth-buster] Текст не є «чистим» зразком якоїсь однієї мови, а живим гібридом. Це демонструє, як формуються літературні
    мови — не за наказом, а через поглинання та адаптацію впливів.'
  section: 'Мовний контакт: Слов''янізми, полонізми та народна мова'
  words: 1200
- points:
  - 'Граматична лабораторія: простежити еволюцію від руських дієслівних форм (аорист, імперфект) до сучасної системи минулого
    часу на -в/-ла на прикладах з тексту.'
  - 'Порівняльна лабораторія: поняття «прощення» в церковнослов''янській, руській та сучасній українській мові. Як змінювалася
    семантика та способи вираження?'
  - 'Етимологічний слід: відтворити шлях слова «маєток» від руських текстів до його сучасного значення та вжитку.'
  - 'Стилістична лабораторія: ідентифікувати в тексті приклади «високого» (книжного) та «низького» (побутового) стилів. Пояснити,
    чому автор їх поєднує.'
  section: 'Мовна лабораторія: Еволюція дієслова та абстрактних понять'
  words: 1000
- points:
  - 'Повернення до розминки: як глибокий аналіз граматичної еволюції пояснює різницю між руською та сучасною фразами на початку
    модуля?'
  - 'Лінгвістичний висновок: що текст притчі говорить про стан української мови XVI–XVII ст.? Це мова в стані занепаду чи
    активного формування?'
  - 'Зв''язок уперед: як біблійний концепт «блудного сина» і пов''язана з ним лексика були переосмислені у творчості Шевченка,
    Франка та модерністів?'
  section: Дискусія та підсумок
  words: 600
focus: 'The Parable of the Prodigal Son: linguistic analysis of a key religious text in its Ruthenian form, language contact
  (Church Slavonic, vernacular), and the codification of emotional and familial vocabulary.'
level: RUTH
module: ruth-031
objectives:
- Аналізувати соціолінгвістичний контекст перекладів Святого Письма в XVI-XVII ст.
- Ідентифікувати та розрізняти церковнослов'янізми, можливі полонізми та питомі українські риси в руському тексті.
- Пояснювати ключові відмінності в граматичній системі (зокрема, дієслівній) між руською та сучасною українською мовою.
- Формулювати аргументовану позицію щодо ролі «простої мови» у формуванні української літературної традиції.
