objectives:
- Аналізувати «монументальний стиль» як характеристику барокової прози на прикладі літопису С. Величка
- Розрізняти та ідентифікувати в тексті полонізми, латинізми та церковнослов’янізми як маркери різних мовних регістрів
- Критично оцінювати історичний текст, розмежовуючи його функцію як документального джерела та літературного артефакту
- Формулювати аргументовану позицію щодо ролі та статусу української мови в Гетьманщині XVIII століття
