content_outline:
- points:
  - 'Провокація: Фрагмент із літопису Величка поруч із сучасним новинним репортажем про ту саму подію (гіпотетично). Що змінилося
    в подачі інформації? Чому Величко пише так «пишно»?'
  - 'Термін: Що таке «монументальний стиль»? Студент пропонує власне визначення перед тим, як отримати академічне.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи можна вважати літопис Величка об''єктивним історичним документом? Позиція 1: Так, це компіляція справжніх
    канцелярійних паперів. Позиція 2: Ні, це авторська інтерпретація, літературний твір.'
  - 'Дебат 2: Якою мовою написаний літопис? Це «проста мова», «слов''яноруська», «книжна українська»? Що ці терміни означають
    політично та лінгвістично?'
  - '[!decolonization] Текст Величка — доказ існування розвиненої адміністративної та історіографічної традиції в Гетьманщині,
    що спростовує імперський міф про «бездержавність» і «безписемність».'
  - '[!epistemic-humility] Точна класифікація мови є складною. Текст є гібридом, що поєднує риси кількох мовних регістрів
    — церковнослов''янського, польського канцелярійного та українського розмовного.'
  section: 'Конфліктна карта: Літопис як джерело vs Літопис як література'
  words: 700
- points:
  - Оригінальний уривок з літопису Самійла Величка (нормалізована орфографія).
  - 'Кероване читання: глоси для архаїчних форм, синтаксичних конструкцій, незрозумілих термінів.'
  - 'Граматичний коментар: аналіз форм минулого часу, умовного способу, синтаксичних особливостей, що відрізняються від сучасної
    української.'
  - 'Контекст: Козацька канцелярія як інституція. Роль писаря. Як створювалися, зберігалися та використовувалися документи
    в Гетьманщині.'
  - '[!decolonization] Величко пише історію з козакоцентричної перспективи, утверджуючи суб''єктність України.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: адміністративна, юридична та військова лексика (уряд, сейм, жовнір).'
  - 'Аналіз латинізмів: риторичні фігури, абстрактні поняття, наукова термінологія (реляція, інструкція, рація).'
  - 'Аналіз церковнослов''янізмів: високий стиль, біблійні алюзії, моралізаторські пасажі.'
  - '[!myth-buster] Запозичення — не «засмічення» мови, а ознака її активної участі в європейському культурному просторі.
    Вибір мовного шару (полонізм vs церковнослов''янізм) був свідомим стилістичним інструментом.'
  section: 'Мовний контакт: Полонізми та латинізми в козацькій канцелярії'
  words: 1200
- points:
  - 'Аналіз складних синтаксичних конструкцій: довгі періоди, розгалужена система підрядних речень, інверсії.'
  - 'Порівняльний аналіз: те саме речення в редакції Величка і в спрощеній сучасній версії. Які смислові відтінки втрачаються?'
  - 'Стилістичний експеримент: студент пробує переписати короткий сучасний текст (напр., новину) у «монументальному стилі»,
    використовуючи лексику та синтаксис з модуля.'
  - 'Етимологічний слід: простежити шлях кількох слів з тексту Величка до сучасної української мови (або їх зникнення).'
  section: 'Мовна лабораторія: Синтаксис бароко'
  words: 1000
- points:
  - 'Повернення до розминки: Чому козацька еліта потребувала саме такого «монументального» стилю для своїх документів та літописів?'
  - 'Лінгвістичний висновок: Що цей текст говорить про стан і статус української мови у XVIII столітті? Як він балансує між
    різними мовними стихіями?'
  - 'Зв''язок із сучасністю: Чи існують сьогодні аналоги «монументального стилю»? Де і з якою метою використовується «високий»,
    ускладнений стиль?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз «монументального стилю» козацького літописання на прикладі праці Самійла Величка. Дослідження мовних контактів
  (полонізми, латинізми, церковнослов’янізми) та синтаксису барокової прози.
