content_outline:
- points:
  - 'Провокація: Фрагмент тексту церковнослов''янською мовою, а на полях рукою писаря додано слово з «простої мови». Для кого
    він це робив? Чому наважився «пояснювати» священний текст?'
  - 'Запитання для роздумів: Сьогодні «або» — це сполучник. У XVI ст. воно також могло означати «тобто, чи». Як ця, на перший
    погляд, дрібна зміна відображає фундаментальні процеси в еволюції мови?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Глоси — це ознака занепаду церковнослов''янської мови чи народження нового літературного стандарту, «простої
    мови»? Чи була «проста мова» окремою мовою, чи просто «спрощеною» церковнослов''янською?'
  - 'Дебат 2: Глоси — це санкціонований освітній інструмент чи підривна діяльність, що наближала текст до народу в обхід церковної
    влади? Чи міг писар діяти з власної ініціативи?'
  - '[!decolonization] Існування глос доводить, що окрема українська мовна свідомість існувала за століття до того, як Російська
    імперія почала заперечувати саме існування української мови. Писарі активно відрізняли «свою» мову від церковнослов''янської.'
  - '[!epistemic-humility] Ми не можемо знати точних намірів писаря. Можливо, він робив нотатки для себе, для менш освіченого
    священника, чи для учня. Докази неоднозначні.'
  section: 'Конфліктна карта: Мова народу чи мова церкви?'
  words: 700
- points:
  - Аналіз фрагментів Пересопницького Євангелія — видатного прикладу перекладу «простою мовою».
  - Оригінальний текст (нормалізована орфографія) з виділеними глосами та перекладними відповідниками.
  - 'Граматичні нотатки: як глоса перекладає складну церковнослов''янську граматичну форму (напр., двоїну або аорист) у простішу,
    розмовну конструкцію.'
  - 'Контекст: що робить Пересопницьке Євангеліє унікальною пам''яткою? Чому на ньому присягають президенти України?'
  - '[!decolonization] Це не переклад з польської чи російської, а прямий переклад з канонічних текстів на живу українську
    мову того часу. Це встановлює пряму, не опосередковану імперіями, мовну і культурну лінію.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - Аналіз мовних запозичень, що використовуються в глосах для пояснення складних церковнослов'янських слів.
  - 'Полонізми: як слова з адміністративної та побутової сфери Речі Посполитої (напр., «місто» замість «градъ») стають інструментом
    перекладу.'
  - 'Латинізми: чи використовуються в глосах академічні та юридичні терміни для пояснення теологічних понять?'
  - 'Церковнослов''янізми: які слова вважаються настільки «високими» або сакральними, що їх ніколи не глосують? Де проходить
    межа між «зрозумілим» і «незрозумілим» для тогочасного читача?'
  - '[!myth-buster] Писарі не «засмічували» мову полонізмами. Вони використовували найефективніший інструмент (lingua franca
    тогочасного суспільства), щоб пояснити поняття. Це ознака прагматизму, а не мовної нечистоти.'
  section: 'Мовний контакт: Анатомія глоси'
  words: 1200
- points:
  - 'Порівняльна лабораторія: візьміть речення сучасною українською. Спробуйте перекласти його церковнослов''янською (за допомогою
    словника), а потім напишіть «простомовну» глосу для найскладніших слів. Відтворіть роботу середньовічного писаря.'
  - 'Етимологічна розвідка: простежте шлях слова з глоси (напр., «потреба», «річ», «закон») від XVI ст. до сьогодення за допомогою
    історичних словників.'
  - 'Стилістична лабораторія: проаналізуйте різні типи глос. Деякі є простими синонімами («або», «тобто»), інші — розгорнутими
    поясненнями, треті — граматичними коментарями. Що це говорить про те, що саме писар вважав «складним» для читача?'
  section: 'Мовна лабораторія: Слідами перекладача XVI століття'
  words: 1000
- points:
  - 'Повернення до розминки: тепер ви можете пояснити, чому глоса була необхідна, що вона говорить про стосунки між церковнослов''янською
    та простою мовою, і в які соціолінгвістичні дебати вона вписується.'
  - 'Лінгвістичний висновок: народні глоси — це унікальний знімок мовних змін у дії, «відсутня ланка» між високою книжною
    мовою та живим розмовним словом.'
  - 'Зв''язок із майбутнім: як процес «глосування» врешті-решт призвів до повних перекладів текстів (Пересопницьке Євангеліє)
    і, зрештою, до нової української літератури, започаткованої Котляревським? Це єдиний процес наближення літератури до народної
    мови.'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз «народних глос» (пояснень на полях) як доказу існування живої української мови та інструменту перекладу в XVI-XVII
  ст., зокрема на прикладі синонімів «чыто» та «або».
level: RUTH
module: ruth-026
objectives:
- Аналізувати соціолінгвістичний контекст функціонування «простої мови» та церковнослов'янської в XVI-XVII ст.
- Інтерпретувати «народні глоси» як доказ мовної свідомості та неперервності української мовної традиції
- Розрізняти мовні шари в текстах руської доби (церковнослов'янізми, полонізми, власне українські елементи)
- Відтворювати логіку середньовічного перекладача-писаря, виконуючи симуляційні завдання
- Формулювати аргументовану позицію для спростування імперських міфів про історію української мови
