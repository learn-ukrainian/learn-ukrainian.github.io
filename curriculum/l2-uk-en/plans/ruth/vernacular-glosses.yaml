activity_hints:
- description: Перевірка позицій з «Конфліктної карти». Чия це теза — що глоси є ознакою занепаду чи народження нової мови?
    Визначте позицію за цитатою.
  focus: Розуміння соціолінгвістичних дебатів
  items: 4
  type: quiz
- description: 'У реченнях із глосами визначте походження виділених слів: церковнослов''янізм, полонізм, чи власне українське
    слово з простої мови.'
  focus: Ідентифікація мовного шару
  items: 5
  type: fill-in
- description: Вам дано речення сучасною українською мовою. Користуючись словником, перекладіть його церковнослов'янською,
    а потім напишіть власну «народну глосу» для найскладнішого слова, обґрунтувавши свій вибір.
  focus: 'Джерельний аналіз: Станьте перекладачем XVI століття'
  type: note
- description: 'На основі матеріалів модуля напишіть есе (400-600 слів) на тему: «Як аналіз народних глос спростовує імперський
    міф про те, що українська мова була «вигадана» у ХІХ столітті?»'
  focus: 'Есе: Глоси як доказ неперервності'
  type: note
