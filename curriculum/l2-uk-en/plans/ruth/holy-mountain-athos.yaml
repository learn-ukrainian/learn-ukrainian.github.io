objectives:
- Аналізувати мову та стиль полемічних творів Івана Вишенського
- Розрізняти мовні шари (церковнослов'янізми, полонізми, просторіччя) у руських текстах XVI-XVII ст.
- Пояснювати історичний та соціолінгвістичний контекст церковної полеміки в Речі Посполитій
- Формулювати власну позицію щодо дилеми «культурна ізоляція vs модернізація» на прикладі дискусії Вишенського
