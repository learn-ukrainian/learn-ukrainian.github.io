content_outline:
- points:
  - 'Провокація: Цитата Івана Вишенського, де він засуджує «латинську хитрість» та світську науку, поряд із сучасним твердженням
    про цінність критичного мислення. У чому конфлікт?'
  - Термін «проста мова» — що це означало для Вишенського? Мова для народу чи мова простолюду?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою писав Вишенський? Це високий церковнослов''янський стиль, «проста мова» чи унікальний авторський
    гібрид для максимального впливу?'
  - 'Дебат 2: Суперечка про освіту — чи повинна православна церква запозичувати латинські освітні моделі, щоб конкурувати
    з католицизмом? Позиція Вишенського — категоричне «ні».'
  - '[!decolonization] Вишенський бачив у католицизмі та його освітніх практиках інструмент полонізації та втрати православної
    ідентичності, що відображало ширший опір культурній асиміляції.'
  - '[!epistemic-humility] Захищаючи «чистоту віри», Вишенський водночас відкидав наукові знання та гуманістичні ідеї, що
    йшли з Європи, фактично закликаючи до культурної ізоляції.'
  section: 'Конфліктна карта: Дух і буква: Полеміка про мову та віру'
  words: 700
- points:
  - 'Першоджерело: Фрагмент «Послання до єпископів-утікачів» Івана Вишенського (оригінал, нормалізована орфографія), де він
    засуджує ієрархів, що прийняли унію.'
  - 'Глоси: розбір архаїчних форм та церковнослов''янізмів («благочестя», «мшелоімство», «сосуд»).'
  - 'Граматичний коментар: аналіз риторичних звертань у кличному відмінку, складні синтаксичні конструкції (періоди), форми
    минулого часу.'
  - '[!decolonization] Текст Вишенського — доказ існування потужної полемічної літератури руською мовою за 200 років до Котляревського,
    що спростовує імперський наратив про «неповноцінність» мови до XIX ст.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналіз лексики високого стилю, біблійних алюзій. Як Вишенський використовує їх для створення авторитетного,
    пророчого тону?'
  - 'Полонізми та латинізми: Як Вишенський описує своїх опонентів? Часто — через запозичення, що маркують їх як «чужих» (напр.,
    терміни католицької догматики, назви посад).'
  - 'Грецизми: Вплив афонського монастирського середовища на мову Вишенського. Терміни аскетичної практики та православного
    богослов''я.'
  - '[!myth-buster] Мова Вишенського не є «чистою» від запозичень. Це свідомо сконструйований інструмент, де вибір кожного
    слова (слов''янського для святості, польського для критики) є ідеологічним актом.'
  section: 'Мовний контакт: Слов''янська риторика проти латинської хитрості'
  words: 1200
- points:
  - 'Компаративний аналіз: Фрагмент від Вишенського vs Фрагмент від про-унійного автора (напр., Іпатія Потія) на ту саму тему.
    Розбір лексики, синтаксису, риторики.'
  - 'Стилістична лабораторія: Ідентифікація різних мовних шарів у тексті Вишенського — де він говорить як пророк (слов''янізми),
    де як сатирик (просторіччя), де як богослов (грецизми)?'
  - 'Етимологічний слід: Простежити шлях слова «благочестя» — від грецького εὐσέβεια через церковнослов''янське до розуміння
    Вишенського і до сучасного вжитку.'
  section: 'Мовна лабораторія: Стилістичний аналіз полемічного тексту'
  words: 1000
- points:
  - 'Повернення до розминки: чи є виправданою відмова від світських знань заради «духовної чистоти»? Оцінка позиції Вишенського
    з погляду XXI століття.'
  - 'Лінгвістичний підсумок: Що мова Вишенського говорить нам про стан руської мови на межі XVI-XVII ст.? Її гнучкість, багатство
    стилів, здатність виражати складні ідеї.'
  - 'Зв''язок уперед: Як полемічна традиція, започаткована Вишенським, вплинула на подальший розвиток української літератури
    та суспільної думки?'
  section: Дискусія та підсумок
  words: 600
focus: Полемічна література, твори Івана Вишенського з Афону, дебат між «світською» та «духовною» церквою, церковнослов'янська
  мова проти простої мови в релігійних текстах
