content_outline:
- points:
  - 'Провокація: Дано речення церковнослов’янською. Якими синтаксичними правилами керувались, щоб його розібрати у XVII столітті?
    Чи схожі вони на сучасні?'
  - 'Речення-загадка: «Человѣкъ красенъ єстъ не сановитствомъ, но оумомъ». Студент має припустити, що тут підмет, що присудок,
    і яка роль інфінітива.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Смотрицький — кодифікатор чи реформатор? Він просто описав існуючу церковнослов’янську мову, чи створив штучну
    «правильну» норму, яка відрізнялася від живої практики?'
  - 'Дебат 2: «Граматика» — це зброя в конфесійній боротьбі (православ’я проти католицизму) чи продукт культурного синтезу
    (слов’янська мова, описана за латинськими граматичними моделями)?'
  - '[!decolonization] «Граматика» Смотрицького стала основою для граматик російської мови (Ломоносов). Це доказ українського
    культурного впливу, а не «спільної спадщини».'
  - '[!epistemic-humility] Точно визначити, де закінчується опис і починається припис у граматиках того часу — майже неможливо.
    Смотрицький сам був частиною мовного конфлікту, який намагався врегулювати.'
  section: 'Конфліктна карта: Смотрицький: Кодифікатор чи реформатор?'
  words: 700
- points:
  - 'Першоджерело: Фрагмент з розділу «О Сложеніи» з «Граматики» Мелетія Смотрицького (1619).'
  - Оригінальний текст (нормалізована орфографія) з правилами синтаксичного розбору (наприклад, про узгодження прикметника
    з іменником).
  - Паралельний переклад сучасною українською мовою для ключових, найскладніших правил та термінів (напр. «различіе», «падежъ»,
    «согласіе»).
  - '[!decolonization] Аналіз термінології: Смотрицький створює першу повноцінну слов’янську граматичну термінологію, доводячи,
    що слов’янські мови можна аналізувати так само системно, як і латину.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Латинізми: аналіз синтаксичних конструкцій у Смотрицького, що є кальками з латини (Ablativus absolutus, Accusativus cum
    infinitivo).'
  - 'Полонізми: чи є в «Граматиці» синтаксичні впливи польської мови, чи Смотрицький свідомо їх уникав, орієнтуючись на «чисту»
    церковнослов’янщину?'
  - 'Церковнослов’янізми vs. «проста мова»: як Смотрицький розрізняє «високий» синтаксис книжної мови і синтаксис розмовної
    «простої мови» у своїх прикладах?'
  - '[!myth-buster] Твердження, що українська граматика «зіпсована» полонізмами/латинізмами. Смотрицький показує, як запозичення
    граматичних моделей (не лише слів) було інструментом модернізації мови.'
  section: 'Мовний контакт: Латинський вплив на слов’янський синтаксис'
  words: 1200
- points:
  - 'Граматична лабораторія: Студент отримує речення з тексту XVII ст. і має розібрати його за правилами, викладеними у Смотрицького
    (знайти підмет, присудок, визначити відмінки, узгодження).'
  - 'Порівняльна лабораторія: Те саме речення розбирається за правилами сучасної української мови. Які категорії аналізу збігаються,
    а які ні (напр., категорія стану, кличний відмінок)?'
  - 'Етимологічний слід: Простежити, як терміни Смотрицького («именителный», «винителный») перетворилися на сучасні «називний»,
    «знахідний».'
  - 'Стилістична лабораторія: Аналіз прикладів у Смотрицького. З яких джерел він їх брав (Біблія, античні автори)? Що це говорить
    про його уявлення про «правильну» мову?'
  section: 'Мовна лабораторія: Практичний розбір за Смотрицьким'
  words: 1000
- points:
  - 'Повернення до розминки: Тепер студент може пояснити, за якими правилами розбирали речення у XVII ст. і в чому їхня логіка.'
  - 'Лінгвістичний висновок: Що «Граматика» Смотрицького говорить про стан мовної свідомості українських інтелектуалів на
    початку XVII ст.?'
  - 'Зв’язок уперед: Як робота Смотрицького вплинула на подальший розвиток граматичної думки в Україні та в усьому слов’янському
    світі?'
  section: Дискусія та підсумок
  words: 600
