objectives:
- Аналізувати явища мовного контакту (полонізми, латинізми) в юридичних текстах руської доби
- Пояснювати роль польської мови як посередника у формуванні української правничої термінології
- Критично оцінювати соціолінгвістичні дебати щодо статусу "простої мови" у Великому Князівстві Литовському
- Аргументувати, як існування розвиненої юридичної мови в XVI ст. спростовує імперські наративи про «неісторичність» української
  мови
