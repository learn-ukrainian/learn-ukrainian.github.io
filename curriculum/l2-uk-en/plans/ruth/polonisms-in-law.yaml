content_outline:
- points:
  - 'Провокація: польське слово "grunt" в Литовському статуті. Це «засмічення» мови чи єдиний доступний термін для нової правової
    реальності?'
  - 'Порівняння: «Але всими видатками с тых именей моих мает быти наперед за волею моею волное захованье...» — що тут означає
    «маєт»? Натяк на майбутній час чи модальність?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є мова Литовського статуту самостійною "простою мовою", чи це лише регіональний варіант польської канцелярської
    мови?'
  - 'Дебат 2: Наскільки Статут є оригінальним твором руської юридичної думки, а наскільки — компіляцією чи прямим перекладом
    польських правових кодексів?'
  - '[!epistemic-humility] Точне розмежування мов у багатомовному середовищі Речі Посполитої є складним; терміни "руська"
    та "польська" мови мали інше значення, ніж сьогодні.'
  - '[!decolonization] Визнання руської мови державною мовою у ВКЛ є прямим спростуванням російського імперського наративу
    про відсутність в українців власної державної та правової традиції до XIX ст.'
  section: 'Конфліктна карта: "Prosta Mova" чи польська канцелярія?'
  words: 700
- points:
  - 'Першоджерело: Аналіз уривків з Третього Литовського статуту (1588), що регулюють шляхетське землеволодіння.'
  - 'Кероване читання: Оригінальний текст з глосарієм ключових полонізмів ("уряд", "скарб", "побор", "чинш") та латинізмів
    ("декрет", "апеляція").'
  - 'Граматичний коментар: Розбір синтаксичних конструкцій, що зазнали польського впливу, зокрема вживання дієслова "мати"
    для вираження майбутнього часу та зобов''язання.'
  - '[!decolonization] Литовський статут, написаний руською мовою, є пам''яткою не лише права, але й мови, що доводить її
    спроможність обслуговувати найвищі державні функції.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Лексичний аналіз: Систематизація полонізмів за тематичними групами: адміністративні ("сейм", "урядник"), фінансові ("пенязь",
    "скарбниця"), судові ("реєстр", "свідок").'
  - 'Синтаксичні кальки: Виявлення та аналіз речень, побудованих за польським зразком (напр., позиція дієслова, ужиток сполучників).'
  - 'Посередництво у запозиченнях: Роль польської мови як каналу для проникнення в руську мову латинізмів ("мандат", "термін")
    та германізмів ("ґрунт", "чинш").'
  - '[!myth-buster] Запозичення в юридичній термінології — це не ознака "неповноцінності" мови, а результат інтеграції в європейський
    правовий простір. Це збагачення, а не "засмічення".'
  section: 'Мовний контакт: Польський вектор у правничій мові'
  words: 1200
- points:
  - 'Компаративна лабораторія: Порівняння визначення одного юридичного поняття (напр., "спадщина" або "злочин") у Литовському
    статуті (руською), коронних статутах (польською) та Судебнику 1497 року (церковнослов''янською).'
  - 'Етимологічний трек: Простежити шлях слова "ґрунт" з німецької в польську, а звідти в руську юридичну мову, фіксуючи семантичні
    зміни на кожному етапі.'
  - 'Стилістична лабораторія: В уривку тексту класифікувати лексичні шари: питомий руський, церковнослов''янський, польський.
    Визначити, який шар домінує і чому саме в цьому контексті.'
  section: 'Мовна лабораторія: Відтворення руської канцелярії'
  words: 1000
- points:
  - 'Повернення до розминки: Спираючись на матеріал модуля, студент дає аргументовану відповідь, чи були полонізми "засміченням",
    чи функціональною необхідністю для руської правової мови.'
  - 'Лінгвістичний висновок: Яку спадщину залишили полонізми руської доби в сучасній українській юридичній термінології? Які
    терміни збереглися, а які були витіснені чи замінені?'
  - 'Зв''язок із сучасністю: Як досвід мовних контактів XVI ст. відлунює в сучасних дискусіях про пуризм та запозичення в
    українській мові, особливо у фахових сферах?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз полонізмів та мовних контактів у юридичних текстах, зокрема в Литовському статуті
