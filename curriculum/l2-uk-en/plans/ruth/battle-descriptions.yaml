content_outline:
- points:
  - 'Провокація: Чи можна програти битву, але виграти війну? Два погляди на наслідки Берестечка — польський тріумфалізм vs
    козацька стратегічна стійкість.'
  - 'Фрагмент опису битви (3-4 рядки) з невідомого джерела. Завдання: визначити, на чиєму боці автор — польському, козацькому,
    чи він намагається бути нейтральним?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чия правда? Аналіз свідчень польського (Освенцім), українського (Самовидець) та османського хроніста про ту
    саму подію. Як політична позиція впливає на опис фактів?'
  - 'Дебат 2: «Проста мова» vs «високий стиль». Чи є стиль літопису (слов''янізми, полонізми) маркером ідеології? Чи це просто
    літературна норма епохи?'
  - '[!decolonization] Порівняння джерел показує, що український погляд на історію існував і був артикульований, спростовуючи
    імперську тезу про «мовчання» України до ХІХ ст.'
  - '[!epistemic-humility] Жоден літопис не є «об''єктивним» дзеркалом. Всі вони — інтерпретації, сформовані освітою, вірою
    та політичною лояльністю автора.'
  section: 'Конфліктна карта: Битва за наратив'
  words: 700
- points:
  - 'Первинне джерело: Уривок з Літопису Самовидця про ключовий момент битви під Берестечком (наприклад, відступ табору).'
  - 'Паралельне читання: оригінальний текст «простою мовою» та його адаптація сучасною українською мовою. Глоси для архаїзмів
    та військової термінології.'
  - 'Граматичний коментар: аналіз специфічних дієслівних форм (дуратив, форми минулого часу), що відрізняються від сучасних
    норм.'
  - '[!decolonization] Читання «Самовидця» в оригіналі — це акт відновлення української суб''єктності, слухання голосу з минулого
    без російських чи польських посередників.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз військової, адміністративної та побутової лексики, запозиченої з польської (e.g., ''шабля'', ''мушкет'',
    ''обоз'').'
  - 'Латинізми: розбір риторичних фігур та юридичної термінології, що прийшли через польську з латини. Як барокова освіта
    впливала на стиль літописання?'
  - 'Церковнослов''янізми: ідентифікація «високої» лексики для опису патріотичних чи релігійних почуттів.'
  - '[!myth-buster] Запозичення — не «засмічення» мови, а свідчення живих контактів. Аналіз показує, що українська мова активно
    «перетравлювала» іноземні слова, адаптуючи їх до власної системи.'
  section: 'Мовний контакт: Мова війни XVII століття'
  words: 1200
- points:
  - 'Comparative lab: Один і той самий епізод битви (наприклад, зрада татар) в описі українського «Самовидця» та польського
    Шимона Окольського. Скласти таблицю відмінностей у фактах, оцінках, лексиці.'
  - 'Stylistic lab: Аналіз синтаксису. Як довжина речень, вживання дієприкметникових зворотів та порядок слів створюють різний
    ефект — динамічний опис бою vs. спокійна розповідь.'
  - 'Etymology trace: Простежити шлях ключового військового терміну, наприклад, «табір». Його походження, семантичний розвиток
    і сучасне значення.'
  section: 'Мовна лабораторія: Порівняльна хронікографія'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, хто «переміг» у битві наративів про Берестечко? Чия версія подій виявилася впливовішою
    і чому?'
  - 'Лінгвістичний підсумок: Що опис битви в руському літописі говорить нам про стан мови в середині XVII століття?'
  - 'Зв''язок уперед: Як бароковий стиль опису битв вплинув на подальшу українську літературу, зокрема на козацькі літописи
    XVIII ст. та історичні романи XIX ст.?'
  section: Дискусія та підсумок
  words: 600
focus: Comparing chroniclers (e.g., Polish, Ukrainian, Ottoman) on the Battle of Berestechko (1651). Analysis of linguistic
  register, bias, and language contact in military narratives.
level: RUTH
module: ruth-081
objectives:
- Аналізувати та порівнювати першоджерела (літописи) для виявлення авторської позиції та упереджень.
- Ідентифікувати та класифікувати мовні контакти (полонізми, латинізми, церковнослов'янізми) у текстах XVII століття.
- Розрізняти стилістичні регістри «простої мови» та «книжної мови» в барокових текстах.
- Аргументовано доводити існування самобутньої української літературної та історичної традиції в добу Руїни.
pedagogy: CBI
