activity_hints:
- description: Перевірка розуміння обох позицій дебату. Чия це теза — апологета чи критика Вишенського?
  focus: 'Розуміння конфліктної карти: Святий чи радикал?'
  items: 5
  type: quiz
- description: На основі тексту модуля, поясніть, чому Вишенський уникав полонізмів, але активно вживав церковнослов'янізми.
    Яку ідеологічну мету він переслідував?
  focus: 'Аналіз мовного контакту: Пуризм vs Запозичення'
  type: note
- description: Як текст Вишенського доводить існування української мови до Котляревського? Аргументуйте, використовуючи поняття
    «проста мова», «церковнослов'янська мова» та «полемічний стиль». (400-600 слів).
  focus: 'Есе: Спадщина Вишенського та сучасність'
  type: note
- description: 'Заповніть пропуски в реченнях, використовуючи ключову лексику модуля: полеміка, посланіє, пуризм, відступник,
    благочестя.'
  focus: Лексика полеміки
  items: 5
  type: fill-in
cefr_min: C2
connects_to:
