content_outline:
- points:
  - 'Провокація: «Хай згине ліпше царство, аніж оскверниться єдина крихітка віри». Чи може ця цитата Вишенського бути актуальною
    сьогодні?'
  - 'Порівняння: два речення про освіту — одне Вишенського (про «латинську хитромудрість»), інше — сучасне. Що змінилося в
    ставленні до знань?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Вишенського — це церковнослов''янська, «проста мова» чи унікальний авторський стиль? Як класифікація впливає
    на наше розуміння його місця в історії української мови?'
  - 'Дебат 2: Вишенський — ревний захисник православ''я та української ідентичності чи ретроград, що гальмував культурну інтеграцію
    з Європою?'
  - '[!decolonization] Трактування Вишенського в російській імперській та радянській історіографії як «борця за возз''єднання»
    — приклад маніпуляції та апропріації української історії.'
  - '[!epistemic-humility] Ми не можемо точно знати, наскільки «народною» була мова Вишенського. Його тексти — це свідомий
    вибір високого, книжного стилю, а не дзеркало повсякденного мовлення.'
  section: 'Конфліктна карта: Святий чи радикал?'
  words: 700
- points:
  - 'Первинне джерело: Фрагмент з «Посланія до єпископів-відступників» — аналіз інвектив та сарказму.'
  - 'Кероване читання: Глоси до архаїчних форм (аорист, імперфект), синтаксичних конструкцій (давальний самостійний), лексики
    (грецизми, церковнослов''янізми).'
  - 'Граматичний коментар: Як Вишенський використовує граматику для створення ефекту «священного гніву»?'
  - 'Контекст: Берестейська унія 1596 року як каталізатор полемічної літератури. Хто такі «єпископи-відступники» і в чому
    їх звинувачують?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз свідомого пуризму Вишенського: відмова від полонізмів та латинізмів, які активно входили в мову руської еліти.'
  - 'Церковнослов''янізми: Не просто запозичення, а інструмент для створення «високого» стилю, протиставленого «низькій» латинізованій
    мові опонентів.'
  - 'Грецизми: Вишенський, як афонський монах, активно використовує грецьку лексику, підкреслюючи зв''язок з Візантією, а
    не Римом.'
  - '[!myth-buster] Мовна «чистота» Вишенського — це ілюзія. Його мова — це складний гібрид, штучний конструкт, створений
    для конкретної ідеологічної мети. Це не «чиста» народна мова.'
  section: 'Мовний контакт: Анти-латинська пурифікація'
  words: 1200
- points:
  - 'Стилістичний аналіз: Розбір одного абзацу з тексту Вишенського. Завдання — ідентифікувати джерело кожного слова: церковнослов''янське,
    народне, грецьке.'
  - 'Риторичний аналіз: Визначення риторичних фігур (анафора, антитеза, риторичне питання), якими користується автор для переконання
    читача.'
  - 'Порівняльний лаб: Фрагмент тексту Вишенського поруч з фрагментом тексту його опонента (напр., Петра Скарги). Порівняти
    лексику, синтаксис, аргументацію.'
  - 'Етимологічний слід: Простежити шлях кількох ключових слів (напр., «благочестя», «єресь», «хитрість») від часів Вишенського
    до сьогодні.'
  section: 'Мовна лабораторія: Стилістична анатомія полеміки'
  words: 1000
- points:
  - 'Повернення до розминки: Як тепер ви оцінюєте цитату Вишенського про «царство» і «віру»? Це фанатизм чи патріотизм?'
  - 'Лінгвістичний підсумок: Що спадщина Вишенського говорить нам про стан і статус української мови на межі XVI-XVII століть?'
  - 'Зв''язок із сучасністю: Де сьогодні проходять лінії мовних та культурних «фронтів» в Україні? Чи є сучасні аналоги «полеміки»
    Вишенського?'
  section: Дискусія та підсумок
  words: 600
