activity_hints:
- description: Перевірка позицій дебату про правосуб'єктність жінки. Чия це теза? Визначити за цитатою.
  focus: Розуміння соціолінгвістичних дебатів
  items: 4
  type: quiz
- description: Надано фрагмент тексту скорописом. Зробіть транскрипцію та перекладіть сучасною українською мовою.
  focus: Транскрипція та переклад
  type: note
- description: Поясніть різницю між поняттями 'віно', 'материзна' та 'посаг', спираючись на матеріали модуля. Наведіть приклади.
  focus: Порівняльний аналіз термінів
  type: note
- description: Напишіть есе (400-600 слів) на тему "Як аналіз правових документів щодо жіночих майнових прав доводить існування
    окремої української правової культури до XIX століття?".
  focus: 'Есе: Доказова база'
  type: note
cefr_min: C2
connects_to:
- wills-testaments
- judicial-procedure
content_outline:
- points:
  - '''Жінка в церкві мовчати повинна'' — а якщо вона володіє селами? Провокація: чи були жінки в руську добу більш захищені
    у майнових правах, ніж у XIX столітті?'
  - Фрагмент з Литовського статуту про 'віно'. Студент має здогадатися, чи це гроші, що дають жінці, чи гроші, які вона приносить.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Правосуб''єктність жінки. Позиція 1: Жінка — лише провідник для передачі майна між чоловічими родами. Позиція
    2: "Віно" та "материзна" давали жінці реальну економічну владу та незалежність.'
  - 'Дебат 2: Джерела права. Чи були ці права "на папері" (в Литовському статуті) чи реально виконувались? Аналіз судових
    справ, де жінки позиваються щодо свого майна.'
  - '[!decolonization] На противагу російському "Домострою", де жінка — власність чоловіка, руське/литовське право надавало
    жінці чіткі майнові гарантії. Це доказ окремого правового та культурного поля.'
  - '[!epistemic-humility] Ступінь реальної влади жінки сильно залежав від її соціального статусу (шляхтянка vs міщанка vs
    селянка). Закони для еліти не завжди відображали життя більшості.'
  section: 'Конфліктна карта: Жінка — суб''єкт права чи об''єкт власності?'
  words: 700
- points:
  - 'Первинне джерело: фрагмент із заповіту або судової справи XVI ст. про передачу "материзни".'
  - 'Читання оригінального тексту (скоропис) з глосарієм: ''записати'', ''держати'', ''отчизна'', ''посаг''.'
  - 'Граматичний коментар: конструкції з давальним відмінком для позначення власності, архаїчні форми дієслів.'
  - '[!decolonization] Аналіз тексту як доказ неперервності української правової традиції, що фундаментально відрізняється
    від московської.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів у юридичній термінології: ''позвати'' (викликати в суд), ''маєток'', ''урядник''. Чому польська була
    мовою права?'
  - 'Латинізми як ознака освіченості та високого стилю: ''мандат'', ''апеляція'', ''декрет''. Як вони потрапили в руську мову?'
  - 'Слова руської основи, що збереглися: ''віно'', ''спадщина'', ''суд''. Що це говорить про ядро правової системи?'
  - '[!myth-buster] Запозичення в юридичній мові — не "засмічення", а результат інтенсивних контактів у Речі Посполитій. Це
    ознака інтеграції в європейський правовий простір.'
  section: 'Мовний контакт: Правова лексика — Полонізми, Латинізми та Руська основа'
  words: 1200
- points:
  - 'Порівняльний аналіз: ''віно'' (забезпечення від чоловіка), ''придане/посаг'' (майно від батьків), ''материзна'' (спадщина
    від матері). Чим відрізняються ці три види жіночої власності?'
  - 'Етимологічний слід: як слово ''віно'' (від ''ціна'', ''викуп'') перетворилося на юридичний термін, що гарантує права
    вдови?'
  - 'Стилістичний аналіз судової справи: де автор використовує високу книжну мову, де — розмовну ''просту мову'', і з якою
    метою?'
  section: 'Мовна лабораторія: Аналіз термінів "віно" та "материзна"'
  words: 1000
- points:
  - 'Повернення до розминки: чи справді майнові права жінок в руську добу були кращими? Студент формулює аргументовану відповідь.'
  - 'Лінгвістичний підсумок: що лексика, пов''язана з жіночими правами, говорить нам про соціальну структуру того часу?'
  - 'Зв''язок із сучасністю: як поняття ''спадщина'' та ''шлюбний контракт'' сьогодні продовжують або змінюють логіку ''віна''
    та ''материзни''?'
  section: Дискусія та підсумок
  words: 600
focus: 'Юридичний статус жінки в Великому князівстві Литовському та Гетьманщині: майнові права через поняття ''віно'' та ''материзна'',
  аналіз юридичних документів.'
level: RUTH
module: ruth-012
objectives:
- Аналізувати юридичний статус жінки в руську добу через поняття 'віно' та 'материзна'
- Розрізняти полонізми, латинізми та руську основу в юридичній лексиці XVI-XVII ст.
- Читати та інтерпретувати фрагменти оригінальних юридичних документів 'простою мовою'
- Формулювати аргументовану позицію щодо ступеня правосуб'єктності жінок у Речі Посполитій
