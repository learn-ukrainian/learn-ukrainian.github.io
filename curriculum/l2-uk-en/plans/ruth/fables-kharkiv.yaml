content_outline:
- points:
  - 'Провокація: Що солодше — мед чи свобода його збирати? Ключове питання з байки Сковороди.'
  - Фрагмент діалогу Бджоли і Шершня — студент має визначити, хто представляє «корисний труд», а хто — «дармоїдство».
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою писав Сковорода? «Руська», «словено-руська», «староукраїнська» — аналіз термінів та їх політичного
    забарвлення. Чи була це свідома спроба створити філософську мову?'
  - 'Дебат 2: «Сродна праця» — це про роботу чи про покликання? Дебат між «соціальним» та «екзистенційним» прочитанням філософії
    Сковороди.'
  - '[!decolonization] Сковорода як «російський філософ» — імперський наратив. Аналіз мови байок доводить його глибоку вкоріненість
    в українську мовну та культурну традицію.'
  - '[!epistemic-humility] Мова Сковороди — це свідомий синтез церковнослов''янізмів, латинізмів, народної мови та авторських
    неологізмів. Розмежувати їх не завжди можливо.'
  section: 'Конфліктна карта: Сковорода — філософ чи мовотворець?'
  words: 700
- points:
  - Повний текст байки «Бджола та Шершень» у нормалізованій орфографії.
  - 'Ключовий діалог: детальний розбір аргументів Бджоли («нам незрівнянно більша радість збирати мед, аніж його споживати»)
    з граматичним коментарем та глосами.'
  - 'Мораль байки («сила»): розбір філософського висновку Сковороди про «сродну працю» та її зв''язок з «натурою».'
  - '[!decolonization] Байка як відповідь на російську політику «просвещенного абсолютизма», що цінувала лише «корисних» підданих.
    Сковорода пропонує альтернативу — внутрішню свободу через самопізнання.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми як мова високої філософії: аналіз абстрактної лексики (благодать, єство, премудрість, созіданіє).'
  - 'Латинізми та полонізми: Сковорода як випускник Києво-Могилянської академії та європейський мандрівник. Поняття з риторики
    та логіки (натура, сентенція, афект).'
  - 'Народна мова як джерело мудрості: використання прислів''їв, приказок та побутової лексики для ілюстрації найскладніших
    філософських ідей.'
  - '[!myth-buster] Теза про «хаотичність» мови Сковороди. Насправді — це свідоме жонглювання регістрами, де кожен шар мови
    має свою чітку функцію.'
  section: 'Мовний контакт: Філософський язик Слобожанщини'
  words: 1200
- points:
  - 'Лабораторія порівняння: поняття «праця» у трьох регістрах — церковнослов''янське «трудъ», русько-українське «праця» та
    латинське «labor». Як Сковорода використовує ці синоніми у байці?'
  - 'Стилістичний аналіз: ідентифікація шарів лексики у фрагменті «сили» (моралі) байки. Яке слово з якого джерела походить
    і яку конотацію несе?'
  - 'Етимологічний слід: простежуємо шлях слова «сродний» — від праслов''янського кореня до філософського терміна Сковороди.
    Чому саме «сродний», а не «рідний» чи «природний»?'
  section: 'Мовна лабораторія: Стилістичний аналіз Сковороди'
  words: 1000
- points:
  - 'Повернення до розминки: що важливіше для Бджоли — мед чи процес його створення? Студент формулює відповідь на основі
    концепції «сродної праці».'
  - 'Лінгвістичний підсумок: як байки Сковороди спростовують міф про «відсутність» української літературної мови до Котляревського?'
  - 'Зв''язок уперед: концепція «сродної праці» як один з наріжних каменів української ментальності. Як вона проявляється
    в сучасній культурі та етиці праці?'
  section: Дискусія та підсумок
  words: 600
focus: Григорій Сковорода, байка «Бджола та Шершень», філософська концепція «сродної праці», мовні особливості слобожанського
  варіанту літературної мови XVIII ст.
