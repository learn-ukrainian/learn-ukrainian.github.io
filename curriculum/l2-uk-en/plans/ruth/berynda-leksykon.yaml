module: berynda-leksykon
objectives:
- Аналізувати "Лексикон" Памви Беринди як ключове джерело для історії української мови та лексикографії.
- 'Розрізняти та аналізувати мовні шари в "Лексиконі": церковнослов''янізми, полонізми, латинізми та питому українську лексику.'
- Використовувати дані "Лексикону" для аргументації в дискусіях про тяглість та самобутність української мови докотляревської
  доби.
- Простежувати етимологічну долю слів від XVII століття до сучасної української мови, виявляючи збережені та втрачені лексеми.
