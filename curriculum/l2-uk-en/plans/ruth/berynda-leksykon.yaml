content_outline:
- points:
  - 'Провокація: Один церковнослов''янський термін, три українські відповідники в словнику Беринди. Чому? Що це говорить про
    мовну ситуацію XVII ст.?'
  - 'Загадка: Подано словарну статтю з "Лексикону". Студент має здогадатися, яке сучасне українське слово в ній "заховано".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Беринда — реєстратор чи творець? Він просто фіксував живу мову, чи свідомо конструював літературний стандарт,
    відбираючи "правильні" слова?'
  - 'Дебат 2: Політичний акт лексикографії. "Лексикон" як утвердження руської (української) ідентичності, окремої від польської
    та московської, але пов''язаної з престижною слов''янською спадщиною.'
  - '[!decolonization] Створення такого словника — це пряма відповідь на тезу про "відсутність" мови. Це доказ її багатства,
    складності та потреби в кодифікації.'
  - '[!epistemic-humility] Межі між "народним" і "книжним" були нечіткі. Беринда сам вагався, що включати, а що ні.'
  section: 'Конфліктна карта: Словник як поле бою'
  words: 700
- points:
  - 'Оригінальний текст: Факсиміле та нормалізований текст кількох сторінок "Лексикону" (напр., на літеру "В" - вода, воля,
    воїн).'
  - 'Структура словникової статті: аналіз, як Беринда організовує матеріал — гасло, тлумачення, українські відповідники.'
  - 'Граматичні нотатки: архаїчні форми (двоїна, аорист) та орфографія в українських відповідниках Беринди.'
  - 'Паралельний переклад: порівняння статті Беринди зі статтею в сучасному тлумачному словнику (СУМ) — що змінилося в значенні
    та вжитку?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналіз слів, які Беринда подає без українського відповідника, що свідчить про їх повну інтеграцію
    в книжну мову.'
  - 'Полонізми: ідентифікація та аналіз запозичень з польської, особливо в адміністративній, військовій та побутовій сферах.
    Чому Беринда їх включає?'
  - 'Латинізми та германізми: аналіз слів, що прийшли через польське посередництво, особливо в науковій та ремісничій термінології.'
  - '[!myth-buster] "Лексикон" доводить, що мовні контакти та запозичення — це нормальний процес збагачення мови, а не її
    "псування". Питання в тому, які запозичення вижили, а які ні.'
  section: 'Мовний контакт: Анатомія словника'
  words: 1200
- points:
  - 'Етимологічний слід: простежити шлях 5 слів з "Лексикону" до сучасної української мови. Які з них вижили, які зникли,
    які змінили значення?'
  - 'Порівняльна лабораторія: взяти 3 поняття (напр., "справедливість", "освіта", "держава") і порівняти, як вони передані
    церковнослов''янською, у Беринди та в сучасній українській мові.'
  - 'Стилістичний аналіз: Беринда часто дає кілька синонімів-відповідників. Аналіз, який з них є стилістично вищим, який нейтральним,
    а який "простим".'
  section: 'Мовна лабораторія: Лексикографічна реконструкція'
  words: 1000
- points:
  - 'Повернення до розминки: Чому знадобився "Лексикон"? Студент формулює розгорнуту відповідь, спираючись на знання про мовну,
    політичну та культурну ситуацію.'
  - 'Лінгвістичний висновок: "Лексикон" — це не просто словник, а знімок мовної свідомості українського інтелектуала початку
    XVII ст.'
  - 'Зв''язок уперед: як праця Беринди вплинула на подальшу українську лексикографію, включаючи "Словарь" Грінченка та сучасні
    словники?'
  section: Дискусія та підсумок
  words: 600
