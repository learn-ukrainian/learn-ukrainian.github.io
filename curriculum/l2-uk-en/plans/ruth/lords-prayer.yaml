  молитви «Отче наш»
- Пояснювати соціолінгвістичний конфлікт між «священною» та «народною» мовами в українських землях XVI століття
- Ідентифікувати слов'янізми та українізми в тексті Пересопницького Євангелія, пояснюючи вибір перекладача
- Аргументовано доводити, що Пересопницьке Євангеліє є свідченням безперервності української писемної традиції
