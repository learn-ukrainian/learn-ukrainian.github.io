content_outline:
- points:
  - 'Провокація: «Хліб наш насущний дай нам сьогодні» vs «Хлѣбъ нашъ насущный даждь намъ днесь». Одне слово змінилось, два
    — ні. Чому? Яка з цих молитов «правильніша»?'
  - Що таке «проста мова»? Це зіпсована церковнослов'янська, архаїчна українська чи щось інше?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є переклад «Отче наш» у Пересопницькому Євангелії «українським»? Позиції: 1) Так, це пам''ятка староукраїнської
    мови. 2) Ні, це церковнослов''янська з вкрапленнями місцевої говірки.'
  - 'Дебат 2: Навіщо взагалі перекладати Святе Письмо? Позиції: 1) Для збереження чистоти віри потрібна одна сакральна мова
    (церковнослов''янська). 2) Для спасіння душі людина має розуміти, про що молиться, тому потрібен переклад.'
  - '[!epistemic-humility] Межі між мовами в XVI ст. були розмиті. Самі автори називали свою мову «руською» або «простою»,
    протиставляючи її «словенській» (книжній).'
  - '[!decolonization] Існування таких текстів — найкращий доказ безперервності української писемної традиції, що спростовує
    імперський міф про «вигадану» мову.'
  section: 'Конфліктна карта: Священна мова vs народна'
  words: 700
- points:
  - 'Первинне джерело: Молитва «Отче наш» з Пересопницького Євангелія (1556-1561).'
  - 'Паралельне читання: Текст у трьох колонках — церковнослов''янський оригінал (Острозька Біблія), руський переклад (Пересопниця),
    сучасний український переклад.'
  - 'Глоси та граматичні нотатки: аналіз архаїчних форм (`даждь`, `іскушеніє`, `воля Твоя яко`), кличного відмінка (`Отче`),
    синтаксичних конструкцій.'
  - '[!decolonization] Контекст: Пересопницьке Євангеліє — рукопис, створений на Волині на замовлення княгині. Це не випадковість,
    а свідомий культурний проєкт руської шляхти.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз лексики: Які слова перекладач залишив церковнослов''янськими, а які замінив на народні? (напр. `ізбави` vs. `визволи`).'
  - 'Граматична навігація: Де перекладач зберігає слов''янську граматику (аорист, двоїна), а де переходить на аналітичні конструкції,
    властиві живій мові?'
  - 'Полонізми та латинізми: Чи є в тексті вплив польської мови, домінуючої в Речі Посполитій? (Спойлер: у самій молитві майже
    немає, але в коментарях до Євангелія — є).'
  - '[!myth-buster] Мовна «чистота» — це міф. Перекладач Пересопниці свідомо використовує різні мовні шари (високий книжний
    і низький народний) для досягнення стилістичного ефекту.'
  section: 'Мовний контакт: Слов''янізми vs. українізми'
  words: 1200
- points:
  - 'Граматична лабораторія: Кличний відмінок — від `Отче` до `Батьку`. Простежити, як змінювались форми звертання.'
  - 'Дієслівна лабораторія: Наказовий спосіб — `даждь`, `остави`, `ізбави`. Як ці форми трансформувались у сучасні `дай`,
    `залиши`, `визволи`?'
  - 'Лексична лабораторія: `Насущний` — слово, що існує лише в цій молитві. Його етимологія та спроби перекладу в різних традиціях.'
  - 'Стилістична лабораторія: Порівняння ритму та мелодики трьох версій молитви. Яка з них більше пристосована для читання
    вголос, а яка — для співу?'
  section: 'Мовна лабораторія: Порівняльний аналіз форм'
  words: 1000
- points:
  - 'Повернення до розминки: То яка молитва «правильніша»? Відповідь тепер має враховувати поняття мовного стандарту, регістру
    та історичного контексту.'
  - 'Лінгвістичний підсумок: Пересопницьке Євангеліє — це не просто переклад, а «народження» українського літературного стандарту,
    який намагається знайти баланс між престижною книжною мовою та зрозумілою народною.'
  - 'Зв''язок із сучасністю: Дебати про «Отче наш» у XVI ст. і сучасні суперечки про мову богослужіння в Україні — знайти
    паралелі.'
  section: Дискусія та підсумок
  words: 600
