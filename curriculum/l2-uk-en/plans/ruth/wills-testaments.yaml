vocabulary_hints:
- definition: юридичний документ, письмова воля особи щодо розподілу її майна після смерті (латинізм, що прийшов через польську).
  pos: ч.
  word: тестамент
- definition: те саме, що заповіт, але з наголосом на духовному аспекті, часто містить релігійні формули (церковнослов'янізм).
  pos: ж.
  word: духовниця
- definition: комплекс нерухомого майна, передусім земля та будівлі, що належали шляхтичу.
  pos: ч.
  word: маєток
- definition: право користування майном (напр., вдовою) до кінця її життя, без права продажу чи передачі у спадок.
  pos: с.
  word: доживоття
- definition: спадкове майно, отримане від батька (пор. сучасне «вітчизна»).
  pos: ж.
  word: отчизна
- definition: спадкове майно, отримане від матері.
  pos: ж.
  word: материзна
- definition: 'рухоме майно: гроші, коштовності, одяг, худоба, зброя.'
  pos: ж.
  word: рухомість
- definition: особа, що засвідчує справжність заповіту своєю присутністю та підписом (полонізм).
  pos: ч.
  word: свідок
- definition: майно, права та обов'язки, що переходять від померлої особи до спадкоємців.
  pos: ж.
  word: спадщина
- definition: особа, що має право на отримання спадщини за законом або за заповітом.
  pos: ч.
  word: спадкоємець
