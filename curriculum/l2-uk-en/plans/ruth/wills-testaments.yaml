activity_hints:
- description: Перевірка дебатів про статус руської мови в Литовському Статуті. Чия це теза? Заповнити пропуски в твердженнях.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити правильний термін (тестамент, духовниця, маєток, доживоття, отчизна) у фрагменти з руських документів.
  focus: Юридична термінологія
  items: 5
  type: fill-in
- description: Дано фрагмент заповіту. Визначте, кому і яке майно відписано. Перекладіть 2-3 речення сучасною українською
    мовою, звертаючи увагу на граматичні відмінності.
  focus: Аналіз першоджерела
  type: note
- description: Як аналіз мови заповітів спростовує імперський міф про «відсутність» української мови до XIX століття? Аргументуйте,
    використовуючи матеріал з «Мовного контакту» та «Тексту» (400-600 слів).
  focus: 'Есе: Мова як доказ'
  type: note
cefr_min: C2
connects_to:
- guardianship-ruth
content_outline:
- points:
  - 'Провокація: Дружина успадковує все рухоме майно, а донька отримує родинний замок. Це сучасний заповіт чи руський тестамент
    XVI століття?'
  - 'Фрагмент тестаменту: «А жона моя, пані Олена, має до живота свого держати...» — що означає «до живота» і чому це ключова
    юридична формула?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова закону — «проста мова», канцеляризм чи полонізм? Чому шляхтич пише заповіт «простою мовою», і наскільки
    вона «проста»?'
  - 'Дебат 2: Юридична сила. Чи є тестамент, писаний руською, чинним у Литовському Статуті? Конфлікт звичаєвого права та писаного
    закону.'
  - '[!decolonization] Існування розвиненої руської юридичної термінології доводить її самостійність, спростовуючи імперські
    наративи про «нерозвиненість».'
  - '[!epistemic-humility] Межі між правовими та мовними системами (руською, польською, латинською) в цей період були розмитими
    та проникними.'
  section: 'Конфліктна карта: Чия мова, того й право?'
  words: 700
- points:
  - 'Первинний текст: Фрагмент заповіту волинського шляхтича з 1580-х років (нормалізована орфографія).'
  - 'Кероване читання з глосами: «маєток», «доживоття», «рухомість», «отчизна і материзна».'
  - 'Граматичні нотатки: форми аориста та імперфекта у функції минулого часу, конструкції з давальним відмінком, що виражають
    володіння.'
  - '[!decolonization] Цей текст — доказ існування самобутньої правової культури та мови, що обслуговувала її потреби задовго
    до Котляревського.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: «свідок», «позивати», «скарбниця» — як польська судова практика впливала на руську лексику.'
  - 'Латинізми: «тестамент», «легат», «нотаріус» — сліди європейської правової традиції, що прийшли через Польщу.'
  - 'Церковнослов''янізми: «духовниця», «благословляю», «во ім''я Отця і Сина» — сакральний пласт лексики у світському документі.'
  - '[!myth-buster] Запозичення юридичних термінів — це не «засмічення» мови, а стандартна практика для мов без власної державної
    підтримки, що інтегруються в ширший правовий простір.'
  section: 'Мовний контакт: Правова термінологія на роздоріжжі'
  words: 1200
- points:
  - 'Comparative lab: Порівняння формули заповіту в руському тестаменті, польському та церковнослов''янському текстах. Що
    спільне, що унікальне?'
  - 'Etymology trace: Простежити шлях слова «спадщина» від руських часів до сьогодні. Які синоніми існували (напр., «дідизна»)?'
  - 'Stylistic lab: Аналіз синтаксису. Як конструкції з дієприкметниками (вплив польської) конкурують з архаїчними конструкціями
    з давальним відмінком?'
  - 'Paleography lab: Вправа на читання фрагменту тестаменту, писаного кириличним скорописом.'
  section: 'Мовна лабораторія: Юридична лінгвістика'
  words: 1000
- points:
  - 'Повернення до розминки: тож чи міг руський шляхтич XVI століття залишити замок доньці? Відповідь з опорою на текст та
    правові норми доби.'
  - 'Лінгвістичний підсумок: Як руська юридична мова балансувала між церковнослов''янською книжністю, польським діловим стилем
    та живою народною мовою?'
  - 'Зв''язок уперед: Які з цих юридичних термінів та конструкцій увійшли до сучасної української юридичної мови, а які зникли
    і чому?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз юридичної мови XIV-XVI ст. через тестаменти та духовниці. Полонізми, латинізми та церковнослов'янізми у правовій
  лексиці.
level: RUTH
module: ruth-013
objectives:
- Аналізувати оригінальний текст руського заповіту, ідентифікуючи ключові юридичні формули та граматичні особливості
- Розрізняти полонізми, латинізми та церковнослов'янізми в юридичній лексиці та пояснювати їх функцію
- Критично оцінювати соціолінгвістичні дебати навколо «простої мови» та її статусу в правовому полі
- Реконструювати еволюцію правових понять, порівнюючи руські, польські та сучасні українські тексти
