activity_hints:
- description: 'Дебати про літеру "ґ": це полонізм, латинізм, чи питома потреба? Визначити, яка позиція відповідає якій школі
    думки (грекофільській чи латинофільській).'
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Дано речення з руського тексту. Визначити, які слова є полонізмами, латинізмами, церковнослов'янізмами та пояснити
    свій вибір.
  focus: Ідентифікація мовних впливів
  items: 6
  type: fill-in
- description: Як історія літери "ґ" спростовує тезу про те, що українська мова не існувала до Котляревського? Побудуйте аргументацію
    на матеріалах модуля (400-600 слів).
  focus: 'Есе: Орфографія як доказ'
  type: note
- description: Використовуючи доступні словники, простежте етимологію 3-4 слів з літерою "ґ". Визначте мову-джерело та приблизний
    час запозичення.
  focus: Етимологічне дослідження
  type: note
cefr_min: C2
