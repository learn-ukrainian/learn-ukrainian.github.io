content_outline:
- points:
  - 'Провокація: Руський текст XVII ст. пише "кгвалт", а сучасний — "ґвалт". Де поділася літера, і чому її історія — це політичний
    детектив?'
  - 'Здогадка: Подивіться на літеру "g" у латинському альфавіті. Як, на вашу думку, руські книжники могли адаптувати її до
    кирилиці?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є введення "ґ" свідченням полонізації та "засмічення" мови, як стверджували москвофіли? Чи це природна потреба
    для мови, що розвивається?'
  - 'Дебат 2: Диграф "кг" (за грецьким зразком) проти нової літери "ґ" (за латинським). Це боротьба орфографічних шкіл чи
    культурних орієнтацій?'
  - '[!decolonization] Сам факт дебатів про орфографію спростовує імперський наратив про "неіснування" мови. Ніхто не сперечається
    про орфографію діалекту — лише про мову, що прагне стати на рівні з іншими.'
  - '[!epistemic-humility] Межа між "рідним" і "запозиченим" у XVII ст. була розмитою. Книжники не мислили в категоріях "чистоти
    мови", а шукали найефективніший інструмент.'
  section: 'Конфліктна карта: Ґ — латинський гість чи питома буква?'
  words: 700
- points:
  - 'Першоджерело: Фрагмент з «Граматики» Мелетія Смотрицького (1619), де він обговорює вимову та написання різних звуків.'
  - 'Кероване читання: Аналіз речень, де автор свідомо вживає слова з /g/ та /h/, щоб продемонструвати різницю.'
  - 'Граматичні нотатки: Як Смотрицький класифікує звуки? Чи його підхід відрізняється від сучасного?'
  - '[!decolonization] Смотрицький кодифікує живу мовну практику, а не сліпо копіює церковнослов''янські чи грецькі зразки.
    Це акт мовного самоствердження.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: Масове запозичення польської лексики з /g/ (grunt, gont, ganek) як основний стимул для створення нової літери.'
  - 'Латинізми: Вплив латинської мови, офіційної мови Речі Посполитої, де літера "g" була стандартною. Як це вплинуло на руських
    інтелектуалів?'
  - 'Церковнослов''янізми: Консервативна роль церковної традиції, що не знала /g/ і намагалася передати його через незграбні
    конструкції типу "кг".'
  - '[!myth-buster] Запозичення літер — нормальне явище. Англійська абетка — це суміш латинських, грецьких та рунічних знаків.
    Історія "ґ" доводить, що українська мова була частиною європейського культурного простору.'
  section: 'Мовний контакт: Латинська "g" проти грецької "гамми"'
  words: 1200
- points:
  - 'Порівняльний лаб: Аналізуємо "Отче наш" трьома мовами: церковнослов''янською, руською та латинською. Як передається ім''я
    "Бог" (Bog, Deus) і які висновки можна з цього зробити?'
  - 'Палеографічний лаб: Розглядаємо фрагменти скорописних документів. Чи намагалися писарі якось візуально розрізняти "г"
    і "ґ", навіть якщо не мали для цього окремої літери?'
  - 'Етимологічний лаб: Простежуємо шлях слова "ґатунок". З якої мови воно прийшло? Коли? Як його записували до появи офіційної
    "ґ"?'
  section: 'Мовна лабораторія: Детектив "Ґ": Пошук доказів у рукописах'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, чому "кгвалт" став "ґвалтом"? Студент має сформулювати відповідь, використовуючи поняття
    мовного контакту, культурної орієнтації та стандартизації.'
  - 'Лінгвістичний висновок: Історія літери "ґ" — це мікрокосм історії української мови: постійний діалог із Заходом та Сходом,
    боротьба за власний стандарт і доказ безперервності розвитку.'
  - 'Зв''язок із сучасністю: Заборона літери "ґ" у радянський час і її повернення у 1990-х. Чому одна маленька літера стала
    символом політичного та культурного суверенітету?'
  section: Дискусія та підсумок
  words: 600
focus: The history and sociolinguistics of the letter Ґ in Ruthenian texts, its distinction from G/H, the use of digraphs
  like КГ, and the influence of Latin/Polish vs. Greek/Slavonic orthographic traditions.
level: RUTH
module: ruth-050
objectives:
- Аналізувати соціолінгвістичний контекст виникнення та стандартизації літери 'ґ' в руській мові
- Розрізняти полонізми, латинізми та церковнослов'янізми в історичних текстах на прикладі орфографічних рішень
- Читати та інтерпретувати фрагменти з першоджерел XVII століття, що стосуються мовних питань
- Пояснювати, як історія орфографії є доказом безперервності розвитку української мови
