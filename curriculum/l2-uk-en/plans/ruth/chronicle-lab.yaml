content_outline:
- points:
  - 'Провокація: Літопис Самійла Величка описує битву. Сучасний репортаж з фронту описує битву. Чи можна написати літопис
    про сучасну подію? Що для цього потрібно змінити у стилі, а що — зберегти?'
  - 'Порівняння: Фрагмент з козацького літопису vs речення з новин — визначити відмінності в лексиці, синтаксисі та меті.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Козацький літопис — об''єктивна фіксація подій чи інструмент створення національного міфу? [!decolonization]'
  - 'Дебат 2: «Проста мова» літописів — це окрема мова, розмовний варіант української чи суміш церковнослов''янської та народної?
    [!epistemic-humility]'
  - 'Позиція А (Історична школа): Літописці (Величко, Самовидець) виступали як історики, що прагнули до точності в межах своєї
    епохи.'
  - 'Позиція Б (Конструктивістська школа): Літописці були ідеологами, що конструювали минуле для обґрунтування прав козацької
    старшини.'
  section: 'Конфліктна карта: Літопис: Історія чи Ідеологія?'
  words: 700
- points:
  - 'Первинне джерело: Фрагмент з Літопису Самовидця про Переяславську раду 1654 року (в оригіналі).'
  - 'Кероване читання: Глоси для архаїзмів (єнеральная рада, протекція, підданство, реляція).'
  - 'Граматичні нотатки: Аналіз форм двоїни, аориста та імперфекта, що збереглися в тексті, та їхня стилістична роль.'
  - '[!decolonization] Риторичний аналіз: як літописець описує настрої козаків? Чи справді це було «возз''єднання»? Розбір
    термінів, які російська історіографія вирвала з контексту.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз адміністративної та військової лексики, запозиченої з Речі Посполитої (уряд, рада, полковник, маєстат).'
  - 'Латинізми: юридична та риторична лексика, що прийшла через польську (протекція, реляція, документ, апеляція).'
  - 'Церковнослов''янізми: високий стиль, біблійні алюзії, лексика для опису сакральних понять (благочестя, єдиномисліє).'
  - '[!myth-buster] Мова літописів — не «засмічена», а багаторівнева. Автор свідомо перемикає регістри для досягнення стилістичного
    ефекту. Це ознака сили, а не слабкості мови.'
  section: 'Мовний контакт: Суржик XVII століття?'
  words: 1200
- points:
  - 'Завдання: Описати одну сучасну подію (наприклад, підписання міжнародної угоди, ключову битву) у стилі козацького літопису.'
  - 'Стилістичний інструментарій: Використання риторичних фігур (персоніфікація, метафори), архаїзмів та синтаксичних конструкцій
    (складні речення з інверсією), проаналізованих у модулі.'
  - 'Регістрова гра: Свідоме вживання полонізмів/латинізмів для юридичних понять, церковнослов''янізмів для високого стилю
    та народної лексики для прямої мови.'
  - 'Порівняльний аналіз: Студент пише свій літописний уривок, а потім — сучасний новинний репортаж про ту ж подію, аналізуючи
    відмінності в меті та засобах.'
  section: 'Мовна лабораторія: Пишемо літопис XXI століття'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, чи можна написати літопис сьогодні? У чому буде його цінність порівняно з репортажем чи
    історичною статтею?'
  - 'Лінгвістичний підсумок: Як практика написання літопису допомагає зрозуміти еволюцію української мови від «простої мови»
    до сучасних стилістичних норм?'
  - 'Зв''язок із сьогоденням: Чи виконують сучасні блоги, телеграм-канали та воєнні щоденники функцію літописання для майбутніх
    поколінь?'
  section: Дискусія та підсумок
  words: 600
