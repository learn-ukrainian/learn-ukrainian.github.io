- Читаті та аналізувати оригінальний текст з руського літопису, ідентифікуючи архаїчні граматичні форми
- Ідентифікувати полонізми, латинізми та церковнослов'янізми в тексті, аналізуючи їх стилістичну функцію
- Створити власний текст у стилі козацького літопису, застосовуючи вивчені лексичні та синтаксичні особливості
