- definition: історичний твір, в якому розповідь ведеться за роками (літами).
  pos: ч.
  word: літопис
- definition: написаний у формі віршів, з дотриманням рими та ритму.
  pos: прикм.
  word: віршований
- definition: розмовна українсько-білоруська мова XVI—XVIII століть, що використовувалась в офіційних документах та літературі.
  pos: ж.
  word: проста мова
- definition: слово або вираз, запозичені з польської мови.
  pos: ч.
  word: полонізм
- definition: слово або вираз, запозичені з латинської мови, часто через польську; ознака освіченості.
  pos: ч.
  word: латинізм
- definition: слово або вираз, запозичені з церковнослов'янської мови; використовувався для "високого" стилю.
  pos: ч.
  word: церковнослов'янізм
- definition: мистецтво красномовства, теорія ораторського мистецтва.
  pos: ж.
  word: риторика
- definition: історичний твір, що послідовно описує події без чіткого поділу на роки.
