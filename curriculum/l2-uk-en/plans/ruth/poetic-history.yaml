activity_hints:
- description: Перевірка обох позицій дебату. Чия це теза — що вірш є прикрасою, а чия — що це джерело?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'У реченнях з тексту визначити походження виділених слів: полонізм, латинізм, церковнослов''янізм чи питоме
    слово.'
  focus: Розпізнавання мовних шарів
  items: 5
  type: fill-in
- description: 'Подано два тексти: прозовий опис події та віршований. Порівняйте: що спільного у фактажі, що відрізняється
    у подачі, які емоції викликає кожен текст і чому?'
  focus: 'Джерельний аналіз: проза vs. поезія в літописі'
  type: note
- description: Як аналізовані в модулі поетичні тексти спростовують імперську тезу про "неіснування" української літературної
    мови до Котляревського? (400-600 слів).
  focus: 'Есе: Доказ існування мови'
  type: note
cefr_min: C2
connects_to:
- monumental-style
- skovoroda-philosophy
content_outline:
- points:
  - 'Провокація: Чи є вірш у літописі брехнею? Як історик використовує поезію і що це каже про його уявлення про правду?'
  - Фрагмент віршованої вставки з руського літопису — студент має вгадати, це хвала князю чи опис битви?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Віршована вставка в літописі — це літературний прийом для прикраси чи повноцінне історичне джерело?'
  - 'Дебат 2: "Prosta mova" віршів vs. "книжний" стандарт літописної прози — чи говорить автор різними мовами з читачем?'
  - '[!decolonization] Літописні вірші як доказ існування розвиненої поетичної традиції та мови, здатної до високого стилю,
    задовго до "Енеїди". Це спростовує імперський міф про "нелітературність" руської мови.'
  - '[!epistemic-humility] Межа між історіографією та белетристикою в середньовічній свідомості була розмитою. Автори не бачили
    суперечності у поєднанні фактів та поетичних тропів.'
  section: 'Конфліктна карта: Історія чи література?'
  words: 700
- points:
  - 'Первинний текст: Аналіз віршованих фрагментів з козацьких літописів (напр., Літопис Самійла Величка).'
  - Оригінальний текст (нормалізована орфографія) з паралельним перекладом сучасною українською мовою.
  - 'Глоси: пояснення архаїчних форм, синтаксичних конструкцій, поетичних фігур, що не збереглися.'
  - '[!decolonization] Розбір, як козацькі літописці свідомо використовували поезію для створення національного наративу та
    утвердження своєї історичної суб''єктності.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: як адміністративна та військова лексика Речі Посполитої проникає у поетичну мову літописів.'
  - 'Аналіз церковнослов''янізмів: високий стиль, біблійні алюзії, риторичні фігури як інструмент сакралізації історії.'
  - 'Аналіз латинізмів: вплив єзуїтських колегіумів на поетичну техніку, використання латинської риторики для опису української
    історії.'
  - '[!myth-buster] Мовна "чистота" — це міф. Руська поезія була плавильним котлом, де з різних елементів виковувалася нова
    літературна мова.'
  section: 'Мовний контакт: Сплав мов у хроніках'
  words: 1200
- points:
  - 'Компаративний аналіз: Один і той же сюжет (напр. битва) у викладі прози літопису, віршованої вставки та сучасної історичної
    праці. Що змінюється?'
  - 'Стилістичний аналіз: Визначення, до якого мовного шару належить кожне слово у фрагменті: церковнослов''янізм, полонізм,
    народне слово.'
  - 'Граматична лабораторія: Аналіз рутенських дієслівних форм у віршах — як вони відрізняються від прозового стандарту того
    часу?'
  - 'Етимологічний слід: Простежити шлях ключового слова з вірша (напр. "звитяга", "слава") від руської доби до сьогодення.'
  section: 'Мовна лабораторія: Реконструкція поетики'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, вірш у літописі — це брехня чи вища форма правди? Студент формулює відповідь на основі
    матеріалу модуля.'
  - 'Лінгвістичний висновок: Як використання поезії в історичних текстах сприяло розвитку та стандартизації української літературної
    мови?'
  - 'Зв''язок із сучасністю: Чи можна порівняти поетичні вставки в літописах із сучасними історичними романами чи фільмами,
    де художній вимисел служить для розкриття історичної правди?'
  section: Дискусія та підсумок
  words: 600
focus: The emergence of poetic verse in Ruthenian chronicles, analyzing the intersection of history and literature, and the
  linguistic registers used.
level: RUTH
module: ruth-076
objectives:
- Аналізувати відмінності між прозовим та віршованим регістрами в руських літописах.
- Ідентифікувати полонізми, латинізми та церковнослов'янізми в первинному тексті та пояснювати їх функцію.
- Критично оцінювати віршовану вставку як історичне джерело, враховуючи соціолінгвістичний контекст.
- Сформулювати аргументовану позицію в дебаті про роль поезії в історіографії руської доби.
