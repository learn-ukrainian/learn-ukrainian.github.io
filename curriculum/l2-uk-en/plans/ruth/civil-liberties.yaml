activity_hints:
- description: 'Перевірка обох позицій дебату: чий це аргумент — що Статут є доказом правової традиції, чи що він є інструментом
    закріпачення?'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Заповніть пропуски ключовими термінами з тексту Статуту: вольность, уряд, право, привілей, шляхтич.'
  focus: Юридична лексика Статуту
  items: 5
  type: fill-in
- description: 'Подано два тексти: артикул з Литовського Статуту та стаття з Конституції України про свободу особи. Порівняйте:
    що є спільним у принципах, а що — у формулюваннях? Що змінилося кардинально і чому?'
  focus: 'Порівняльний аналіз: Статут 1588 vs Конституція 1996'
  type: note
- description: Використовуючи фрагмент Статуту, напишіть есе (400-600 слів), що доводить здатність руської мови XVI ст. функціонувати
    як повноцінна державна мова, спростовуючи тезу про її виключно «побутовий» характер.
  focus: 'Есе: Як цей текст доводить існування української мови до Котляревського?'
  type: note
