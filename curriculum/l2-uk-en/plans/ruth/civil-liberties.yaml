content_outline:
- points:
  - 'Провокація: "Neminem captivabimus nisi iure victum" (1588) vs "Ніхто не може бути заарештований... інакше як за вмотивованим
    рішенням суду" (1996). Що спільного за 400+ років, а що змінилося?'
  - Чий це привілей? Розбираємо поняття "шляхетська вольность" — це свобода для всіх чи тільки для обраних?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Статуту — це «проста мова», «руська мова» чи «канцелярський полонізований жаргон»? Політичне значення класифікації.'
  - 'Дебат 2: "Neminem captivabimus" — це універсальне право людини зародження чи лише привілей шляхти, що паралельно закріпачував
    селян?'
  - '[!decolonization] Існування такого правового кодексу руйнує московський міф про «дике поле» і відсутність державно-правової
    традиції в Україні.'
  - '[!epistemic-humility] Межі між «правом» і «привілеєм» у до-модерному суспільстві були розмитими. Цей принцип захищав
    шляхту від королівського свавілля, але не захищав селян від шляхетського.'
  section: 'Конфліктна карта: Право чи привілей?'
  words: 700
- points:
  - Оригінальний текст артикулу про свободу особи з Третього Литовського Статуту.
  - 'Глосарій: розбираємо ключові терміни — "особа", "вряд", "право", "кривда", "порука".'
  - 'Граматичний коментар: аналіз архаїчних форм дієслів (аорист, імперфект) та відмінювання іменників, що відрізняються від
    сучасних.'
  - Паралельний переклад сучасною українською для виявлення синтаксичних та лексичних змін.
  - '[!decolonization] Цей текст — прямий доказ тяглості української правової думки, що існувала задовго до Котляревського
    та Російської імперії.'
  section: 'Текст: Читання та переклад (Статут ВКЛ 1588)'
  words: 1300
- points:
  - 'Латинізми: аналіз латинських юридичних термінів ("neminem captivabimus", "status", "decretum") як мови європейської правової
    традиції.'
  - 'Полонізми: розгляд запозичень з польської в адміністративній та судовій сферах ("уряд", "сейм", "позов").'
  - 'Церковнослов’янізми: їхня залишкова роль у преамбулах та текстах присяг як мови високого, сакрального стилю.'
  - '[!myth-buster] Запозичення не є «засміченням» мови. Це доказ участі руської шляхти в загальноєвропейському політичному
    та правовому житті. Мова була інструментом інтеграції.'
  section: 'Мовний контакт: Латинізми та полонізми у правничій термінології'
  words: 1200
- points:
  - 'Компаративний аналіз: порівнюємо семантичні поля слів "вольность" (руська мова), "libertas" (лат.), "wolność" (пол.),
    "свобода" (суч. укр.).'
  - 'Етимологічний трекінг: як слово "право" еволюціонувало від "прямий, правильний" до "сукупність законів" та "гарантована
    можливість".'
  - 'Стилістичний аналіз: визначаємо, до якого мовного шару (латинський, польський, руський) належать ключові терміни в тексті
    Статуту.'
  section: 'Мовна лабораторія: Еволюція поняття «свобода»'
  words: 1000
- points:
  - 'Повернення до розминки: тож "Neminem captivabimus" — це прото-конституціоналізм чи феодальний привілей? Формулюємо відповідь
    на основі матеріалів модуля.'
  - 'Лінгвістичний висновок: що мова Литовського статуту говорить нам про стан руської мови в XVI ст. та її здатність обслуговувати
    державні інституції?'
  - 'Зв’язок із майбутнім: як ідея особистих прав, закріплена в Статуті, була втрачена в добу Російської імперії і як вона
    відродилася в сучасній Україні?'
  section: Дискусія та підсумок
  words: 600
focus: The Ruthenian legal principle of "Neminem captivabimus" (Habeas Corpus) in the Lithuanian Statute, its linguistic features
  (Polonisms, Latinisms), and the sociolinguistic debate over rights vs. privilege.
level: RUTH
module: ruth-019
objectives:
- Аналізувати соціолінгвістичні дебати навколо мови та правового статусу Литовських статутів
- Читати та інтерпретувати фрагменти юридичних текстів руською мовою XVI ст., розрізняючи мовні впливи
- Визначати полонізми, латинізми та церковнослов'янізми в юридичному тексті та аналізувати їхню функцію
- Аргументовано доводити наявність розвиненої української правової традиції та мови до XIX століття, використовуючи текст
  Статуту як доказ
