objectives:
- Аналізувати хроніку Грабянки як комплексний текст, що поєднує риси історичного джерела, літературного твору та політичного
  маніфесту
- Розрізняти та ідентифікувати в тексті мовні шари: церковнослов'янізми, полонізми, латинізми та народнорозмовну лексику
- Критично оцінювати ступінь історичної достовірності барокових хронік, порівнюючи їхні наративи з іншими джерелами
- Пояснювати роль козацьких літописів у формуванні української національної ідентичності та історичної пам'яті
