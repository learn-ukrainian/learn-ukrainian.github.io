content_outline:
- points:
  - 'Провокація: Фрагмент з хроніки Грабянки поруч із сучасним українським перекладом — що змінилося в синтаксисі, а що залишилось
    незмінним?'
  - 'Ключове поняття: «героїчна хроніка» — це історія, епос чи політичний маніфест?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Грабянки — це «проста мова», «книжна українська» чи свідомий бароковий синтез? Порівняння з мовою Пересопницького
    Євангелія та Величка.'
  - 'Дебат 2: Хроніка як джерело vs Хроніка як міф. Чи можна довіряти Грабянці як історику, чи він насамперед творець національного
    міфу?'
  - '[!decolonization] Сам факт існування козацьких літописів, написаних руською (українською) мовою, спростовує імперську
    тезу про «безісторичність» і «безсловесність» української нації до XIX ст.'
  - '[!epistemic-humility] Барокова історіографія не знала сучасного розмежування між фактом і риторикою. Грабянка писав не
    для архіву, а для формування ідентичності освіченої еліти.'
  section: 'Конфліктна карта: Історія чи Епос?'
  words: 700
- points:
  - Уривок з «Дій зборів презельной і от части немалой войни Богдана Хмельницького...» — оригінальний текст (нормалізована
    орфографія).
  - 'Читання з коментарями: розбір застарілих форм (аорист, імперфект), незрозумілої лексики та складних синтаксичних конструкцій.'
  - Паралельний переклад сучасною українською мовою для ключових, найскладніших фрагментів.
  - '[!decolonization] На відміну від російських хронік, що фокусуються на постаті царя, козацькі літописи ставлять у центр
    колективного героя — Військо Запорозьке та руський народ.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз адміністративної, військової та побутової лексики, запозиченої з польської (напр., ''уряд'', ''армата'',
    ''ридван'', ''старшина'').'
  - 'Церковнослов''янізми: високий стиль, біблійні алюзії та риторичні фігури як засіб створення епічної, урочистої атмосфери.'
  - 'Латинізми: вплив Києво-Могилянської академії на лексику абстрактних понять, науки та риторики.'
  - '[!myth-buster] Барокова «змішаність» мови — не ознака «нерозвиненості», а свідомий стилістичний прийом і норма для всієї
    тогочасної Центрально-Східної Європи.'
  section: 'Мовний контакт: Бароковий Сплав'
  words: 1200
- points:
  - 'Граматична лабораторія: як Грабянка утворює минулі часи? Пошук у тексті прикладів аориста, імперфекта та перфекта і їхня
    функціональна роль.'
  - 'Стилістична лабораторія: виділити в уривку лексику трьох шарів: церковнослов''янського (високий), польського/латинського
    (адміністративний) та народного (розмовний).'
  - 'Порівняльна лабораторія: той самий епізод (напр., Переяславська рада) в описі Грабянки, Самовидця та Величка. Які акценти
    розставляє кожен автор?'
  - 'Палеографічний екскурс: як виглядав цей текст у рукописі? Знайомство з українським скорописом XVII-XVIII ст.'
  section: 'Мовна лабораторія: Стилістичний Аналіз'
  words: 1000
- points:
  - 'Повернення до розминки: тож хроніка Грабянки — це історія чи література? Сформулювати власну аргументовану відповідь.'
  - 'Мовний підсумок: що мова хроніки говорить про стан і напрямки розвитку української літературної мови на початку XVIII
    століття?'
  - 'Зв''язок із майбутнім: як «Історія Русів», а згодом і Тарас Шевченко, трансформували героїчний наратив, закладений козацькими
    літописами?'
  section: Дискусія та підсумок
  words: 600
