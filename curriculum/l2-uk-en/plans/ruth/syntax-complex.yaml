activity_hints:
- description: Чия це теза — імперських філологів чи українських? Визначити позицію за цитатою.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Визначте походження синтаксичної конструкції в реченнях: полонізм, латинізм чи церковнослов''янізм.'
  focus: Ідентифікація мовних впливів
  items: 5
  type: fill-in
- description: Розберіть синтаксичну структуру речення з Пересопницького Євангелія. Визначте головну, підрядні частини, сполучники
    та їх функції.
  focus: Аналіз першоджерела
  type: note
- description: 'На основі матеріалів модуля напишіть есе (400-600 слів) на тему: "Як аналіз синтаксису руських текстів спростовує
    імперський міф про ''неіснування'' української мови до XIX століття?"'
  focus: Аргументативне есе
  type: note
