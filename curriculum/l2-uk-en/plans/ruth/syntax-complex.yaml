content_outline:
- points:
  - 'Провокація: Складнопідрядне речення з «Пересопницького Євангелія» поруч з його сучасним українським перекладом.'
  - 'Питання: Які синтаксичні конструкції змінилися, а які залишились? Що це говорить про вплив грецької мови на тогочасну
    українську?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Проста мова" — це архаїчний діалект, суміш церковнослов''янської та народної, чи повноцінна літературна мова?
    Полеміка між імперськими філологами та українськими.'
  - 'Дебат 2: Грецький синтаксичний вплив — це збагачення чи спотворення? Ознака високого стилю чи штучне, книжне явище?'
  - '[!decolonization] Тексти з розвиненим синтаксисом спростовують тезу про "селянський діалект". Це доказ існування мови
    для права, релігії та науки за століття до Котляревського.'
  - '[!epistemic-humility] Межі між церковнослов''янською, "простою мовою" та польською були розмитими. Автори часто свідомо
    змішували регістри.'
  section: 'Конфліктна карта: Руська мова — самобутня чи суржик?'
  words: 700
- points:
  - 'Першоджерело: Фрагмент «Пересопницького Євангелія» з характерними складнопідрядними реченнями.'
  - Оригінальний текст (нормалізована орфографія) з паралельним сучасним українським перекладом для синтаксичного зіставлення.
  - 'Граматичні нотатки: аналіз архаїчних сполучників, форм дієприслівників та дієприкметників, що утворюють складні конструкції,
    успадковані з грецької.'
  - '[!decolonization] Це Євангеліє — переклад на живу народну мову того часу, доказ її спроможності передавати найскладніші
    релігійні та філософські концепції.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз синтаксичних конструкцій, запозичених з польської мови, особливо в юридичних текстах (умовні речення,
    специфічні сполучники).'
  - 'Латинізми: вплив латинської риторики та синтаксису на науковий та полемічний стиль (абсолютні конструкції, довгі періоди).'
  - 'Церковнослов''янізми: аналіз книжних синтаксичних моделей, успадкованих від церковнослов''янської (напр., давальний самостійний).'
  - '[!myth-buster] Синтаксичне запозичення — це не "засмічення" мови, а інструмент її розвитку. Українські автори свідомо
    використовували різні моделі для розширення виражальних можливостей мови.'
  section: 'Мовний контакт: Синтаксичні запозичення'
  words: 1200
- points:
  - 'Граматична лабораторія: "дерево розбору" складного речення з тексту; визначення головної та підрядних частин, типів зв''язку.'
  - 'Порівняльна лабораторія: одне й те саме поняття у трьох синтаксичних варіантах: церковнослов''янському, руському та сучасному
    українському.'
  - 'Стилістична лабораторія: переписати простий наратив у "високому стилі" барокової прози, використовуючи складні синтаксичні
    конструкції.'
  - 'Етимологічний слід: простежити шлях сполучника (напр., "аби", "бо", "якщо") від старої форми до сучасної.'
  section: 'Мовна лабораторія: Розтин складного речення'
  words: 1000
- points:
  - 'Повернення до розминки: Пояснити різницю між руським та сучасним синтаксисом на глибинному рівні.'
  - 'Лінгвістичний висновок: Як здатність мови до складних конструкцій пов''язана з її державницьким та культурним статусом?'
  - 'Зв''язок уперед: Як бароковий синтаксис був "спрощений" і "очищений" у XIX столітті, і що було втрачено, а що здобуто?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз складнопідрядних речень у руській писемності, зокрема під впливом грецького синтаксису в релігійних текстах.
  Дослідження полонізмів, латинізмів та церковнослов'янізмів у синтаксисі. Використання текстових доказів для спростування
  міфу про відсутність української літературної мови до Котляревського.
