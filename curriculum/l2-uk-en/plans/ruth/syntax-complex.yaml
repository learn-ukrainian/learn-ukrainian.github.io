objectives:
- Аналізувати соціолінгвістичні дебати навколо статусу 'простої мови' та іноземних впливів.
- Читати та аналізувати синтаксичну структуру оригінальних руських текстів, зокрема з 'Пересопницького Євангелія'.
- Ідентифікувати та розрізняти синтаксичні полонізми, латинізми та церковнослов'янізми.
- Використовувати текстові докази для аргументованого спростування імперських наративів про українську мову.
