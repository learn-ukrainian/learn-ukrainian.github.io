content_outline:
- points:
  - 'Провокація: Подано два варіанти одного речення з XVII століття. Одне — «книжне», інше — «просте». Яке з них є більш «українським»
    і чому?'
  - 'Загадка: що означає термін "проста мова"? Це мова простолюду, чи це мова, проста для розуміння?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Класифікація "простої мови". Це окрема мова, діалект, чи просто церковнослов''янська з помилками? Політичні
    наслідки кожного визначення.'
  - 'Дебат 2: Навіщо існувало чотири версії одного тексту? Це боротьба за теологічну точність, чи за мовну доступність для
    різної аудиторії (духовенство, шляхта, міщани)?'
  - '[!decolonization] Існування "простої мови" та полемічних текстів нею спростовує імперський міф про відсутність української
    літературної традиції до XIX століття.'
  - '[!epistemic-humility] Межі між мовними регістрами в цю добу були розмитими. Автори свідомо "перемикали коди", і не завжди
    легко визначити, де закінчується один стандарт і починається інший.'
  section: 'Конфліктна карта: Війна стандартів: Церковнослов''янська vs. Prosta Mova'
  words: 700
- points:
  - 'Первинний текст: Аналіз однієї з версій вірша (ймовірно, з полемічного твору Мелетія Смотрицького).'
  - Оригінальний текст з нормалізованою орфографією та глосарієм для архаїчних форм.
  - 'Граматичні нотатки: Які форми (напр. аорист, імперфект) відрізняються від сучасної української?'
  - 'Контекст: Хто автор? До кого він звертається? Яка мета цього тексту — навчальна, полемічна, літургійна?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз мовних запозичень у тексті: полонізми, латинізми, церковнослов''янізми.'
  - 'Полонізми: це лексичні запозичення (termin), чи синтаксичні кальки (конструкції речень)?'
  - 'Латинізми: чому в теологічній полеміці використовуються латинські терміни? Це престиж чи необхідність?'
  - '[!myth-buster] Запозичення — це не "засмічення" мови, а нормальний процес мовного контакту. Які з цих запозичень вижили
    в сучасній українській мові, і що це говорить про культурний вплив?'
  section: 'Мовний контакт: Полонізми та латинізми в полеміці'
  words: 1200
- points:
  - 'Side-by-side аналіз: Усі чотири версії вірша представлені поруч для детального порівняння.'
  - 'Граматична лабораторія: Порівняння відмінювання іменників та дієслівних форм (напр., форми минулого часу) у кожній версії.'
  - 'Лексична лабораторія: Які синоніми використовуються для ключових понять? Чи є різниця в стилістичному забарвленні?'
  - 'Стилістична лабораторія: Визначення, до якого мовного шару (церковнослов''янський, польський, народний) належить кожне
    слово в реченні.'
  section: 'Мовна лабораторія: Порівняльний аналіз чотирьох версій'
  words: 1000
- points:
  - 'Повернення до розминки: Студент тепер може дати обґрунтовану відповідь на питання, яка версія є "більш українською".'
  - 'Лінгвістичний висновок: Що цей текст говорить про стан української мови в XVII столітті? Про її поліваріантність та боротьбу
    за стандарт.'
  - 'Зв''язок із сучасністю: Як тогочасні дебати про мову та ідентичність перегукуються з сучасними мовними дискусіями в Україні?'
  section: Дискусія та підсумок
  words: 600
focus: Linguistic analysis of one verse across four different Ruthenian versions (Church Slavonic, Prosta Mova, polemical,
  etc.)
level: RUTH
module: ruth-048
objectives:
- Аналізувати соціолінгвістичний контекст функціонування "простої мови" у XVII столітті
- Порівнювати граматичні та лексичні риси різних версій руського тексту
- Ідентифікувати та аналізувати полонізми, латинізми та церковнослов'янізми в полемічних текстах
- Формулювати аргументовану позицію щодо взаємозв'язку мовного стандарту та релігійно-політичної ідентичності в Україні XVII
  століття
