activity_hints:
- description: Розрізнення фактів про історичну Чорну раду та художніх елементів у романі Куліша.
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставити слова (полонізми, архаїзми, народні) у речення з тексту, щоб завершити аналіз стилізації.
  focus: Мовні шари в романі
  items: 5
  type: fill-in
- description: Як роман "Чорна рада", написаний у ХІХ ст., доводить безперервність української державницької та мовної традиції,
    незважаючи на те, що він не є першоджерелом XVII ст.? (400-600 слів).
  focus: 'Есе: Історичний роман як доказ безперервності'
  type: note
- description: Порівняйте уривок з "Чорної ради" та уривок з Літопису Самовидця. Визначте, які мовні засоби Куліш використовує
    для "оживлення" історії, і чим його мова відрізняється від мови реального джерела XVII ст.
  focus: 'Джерельний аналіз: Куліш vs Самовидець'
  type: note
