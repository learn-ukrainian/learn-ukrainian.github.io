content_outline:
- points:
  - 'Провокація: "А що нам, бгате, до Вкраїни?" — Ця фраза з 17-го чи 19-го століття? Розбираємо стилізацію Куліша.'
  - 'Порівняйте два уривки: один з «Чорної ради», інший — з реального козацького літопису XVII ст. Що видає в Куліші автора
    ХІХ століття?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи можна вивчати мову XVII ст. за романом XIX ст.? «Чорна рада» як історичне джерело vs. «Чорна рада» як художня
    стилізація.'
  - 'Дебат 2: Історична правда Чорної ради 1663 року. Конфлікт городової козаччини та запорожців — чи це класова боротьба,
    чи маніпуляція Москви?'
  - '[!decolonization] Куліш показує, як внутрішній розкол в Гетьманщині призвів до Руїни та посилення московського впливу.'
  - '[!epistemic-humility] Мова Куліша — це не «чиста» руська мова, а складний гібрид, що поєднує реальні архаїзми, діалектизми
    та авторські неологізми.'
  section: 'Конфліктна карта: Роман Куліша як (не)джерело'
  words: 700
- points:
  - 'Читання ключової сцени: сама Чорна рада. Аналіз мови персонажів — як мова відображає соціальний статус (старшина vs.
    чернь)?'
  - 'Глосарій стилізації: розбираємо лексику Куліша. Де справжній архаїзм, де полонізм, а де романтична вигадка?'
  - 'Граматичний розбір: які архаїчні форми (напр., двоїна, нестягнені форми прикметників) Куліш використовує для створення
    історичного колориту?'
  - '[!decolonization] Текст показує не "єдиний народ", а глибокі соціальні та політичні розколи всередині козацької держави.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: як Куліш використовує польську лексику для характеристики про-польської старшини?'
  - 'Церковнослов''янізми: мова духовенства та книжна риторика. Чи завжди вона доречна у персонажів?'
  - 'Народна мова: використання діалектизмів та фольклорних елементів для характеристики простого козацтва та "черні".'
  - '[!myth-buster] Куліш не просто копіює мову XVII ст. Він створює власну художню мовну систему, де кожне запозичення чи
    архаїзм має стилістичну функцію.'
  section: 'Мовний контакт: Свідомий вибір Куліша'
  words: 1200
- points:
  - 'Стилістичний лаб: вам дано уривок з роману. Визначте в кожному реченні мовні шари: де тут народна мова, де книжний вплив,
    де авторська мова ХІХ ст.?'
  - 'Порівняльний лаб: порівняйте опис однієї й тієї ж події у Куліша та в Літописі Самовидця. Знайдіть 5 ключових відмінностей
    у лексиці та синтаксисі.'
  - 'Етимологічний слід: простежте шлях 3-х слів із роману (напр., "горопаха", "джура", "клейноди") від їх походження до сучасного
    значення.'
  section: 'Мовна лабораторія: Стилістичний аналіз'
  words: 1000
- points:
  - 'Повернення до розминки: тож чи є «Чорна рада» добрим джерелом для вивчення історії української мови?'
  - 'Лінгвістичний підсумок: «Чорна рада» — це не документ мови XVII ст., а документ мовних уявлень українського інтелектуала
    XIX ст. про своє минуле.'
  - 'Зв''язок із сучасністю: як сучасні українські історичні романи та фільми використовують мовну стилізацію? Чи є паралелі
    з методом Куліша?'
  section: Дискусія та підсумок
  words: 600
focus: Language and politics in Panteleimon Kulish's "The Black Council", analyzing a 19th-century stylized text about a 17th-century
  event.
level: RUTH
module: ruth-080
objectives:
- Аналізувати «Чорну раду» П. Куліша як приклад художньої стилізації мови XVII століття.
- 'Розрізняти мовні шари в тексті роману: архаїзми, полонізми, церковнослов''янізми та авторські інновації.'
- Критично порівнювати мову та опис подій у романі Куліша з автентичними історичними джерелами (Літопис Самовидця).
- Формулювати аргументовану позицію щодо ролі історичного роману у формуванні національної пам'яті та мовного канону.
pedagogy: CBI
