activity_hints:
- description: Перевірка розуміння позицій у дебатах навколо Смотрицького. Чия це теза? Яку подію описує цитата?
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставити в речення терміни "апологія", "унія", "схизматик", "полеміка" у правильному контексті.
  focus: Ключова термінологія полеміки
  items: 4
  type: fill-in
- description: Подано два фрагменти на одну тему — від Мелетія Смотрицького та Івана Вишенського. Порівняйте риторику, лексику,
    синтаксис. Що відрізняє бароковий стиль від аскетичного?
  focus: 'Порівняльний аналіз: стилі полемістів'
  type: note
- description: 'Напишіть коротке есе (400-600 слів) на тему: "Як аналіз полемічної літератури XVII ст. спростовує імперський
    наратив про відсутність в українців власної високорозвиненої літературної мови до Котляревського?". Використайте "Апологію"
    як ключовий приклад.'
  focus: 'Есе: Доказ існування мови'
  type: note
