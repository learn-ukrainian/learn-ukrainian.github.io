objectives:
- Аналізувати соціолінгвістичний контекст "Апології" Мелетія Смотрицького в Речі Посполитій
- Розрізняти полонізми, латинізми та церковнослов’янізми в полемічному тексті XVII століття
- Оцінювати риторичні стратегії Смотрицького в захисті церковнослов’янської мови
- Формулювати аргументовану позицію щодо ролі мовних дискусій у формуванні української ідентичності
