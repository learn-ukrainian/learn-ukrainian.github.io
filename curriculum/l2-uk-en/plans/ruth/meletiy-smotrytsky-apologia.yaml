content_outline:
- points:
  - 'Провокація: Якщо церковнослов’янська — "богонатхненна" мова, чому Мелетію Смотрицькому довелося писати книгу на її захист?'
  - 'Фрагмент з "Апології": студент має визначити, проти кого чи чого спрямовано цей риторичний випад.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Смотрицький захищає мову чи руську культурно-релігійну ідентичність в Речі Посполитій? Мовна полеміка як політичний
    інструмент.'
  - 'Дебат 2: Трагедія Смотрицького — перехід в унію. Як автор православної "Граматики" став уніатським апологетом, і як це
    вплинуло на сприйняття його творів?'
  - '[!epistemic-humility] Межі між "православним" та "уніатським" дискурсом у той час були проникними, а особисті переконання
    часто підпорядковувались політичній кон''юнктурі.'
  - '[!decolonization] Захист "простої мови" чи церковнослов’янщини був формою культурного опору полонізації та латинізації,
    спробою довести рівноправність руської культури.'
  section: 'Конфліктна карта: Апологія мови чи апологія ідентичності?'
  words: 700
- points:
  - 'Фрагмент з "Apologia peregrinatiey do kraiow wschodnych": Смотрицький доводить, що слов’янська мова не є "гіршою" за
    грецьку чи латину.'
  - Оригінальний текст (у нормалізованій орфографії) з глосами для архаїчних форм та полонізмів.
  - 'Граматичні нотатки: аналіз барокових синтаксичних конструкцій (періодів), що наслідують латинську риторику.'
  - '[!decolonization] Полемічні твори XVII ст. — це доказ безперервності української інтелектуальної традиції, що спростовує
    імперський міф про "культурну прірву".'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: Смотрицький пише в сильно полонізованому середовищі. Чи використовує він полонізми свідомо для донесення думки
    до опонентів, чи це вже частина його мовної практики?'
  - 'Латинізми: Аналіз структури аргументації. Смотрицький використовує західну схоластичну риторику та логіку (силогізми),
    щоб захистити східну літургійну мову.'
  - 'Церковнослов''янізми: Які саме риси церковнослов’янської мови він висуває як доказ її "гідності" та багатства? Аналіз
    лексики високого стилю.'
  - '[!myth-buster] Мовна "чистота" — це анахронізм для XVII ст. Смотрицький та його опоненти вільно перемикалися між регістрами
    та мовами (руська, польська, латина, церковнослов’янська) залежно від аудиторії та мети.'
  section: 'Мовний контакт: Риторика та Регістр у Бароковій Полеміці'
  words: 1200
- points:
  - 'Стилістична лабораторія: Аналіз барокових риторичних фігур у тексті "Апології" — антитези, риторичні питання, градації.
    Як ці прийоми створюють емоційне напруження?'
  - 'Порівняльна лабораторія: Одне й те саме теологічне поняття (напр. "благодать", "Трійця") у викладі Смотрицького (бароковий
    стиль), Вишенського (аскетичний стиль) та в сучасному богословському тексті. Простежити еволюцію стилю.'
  - 'Етимологічний слід: Простежити шлях ключового терміну з тексту, наприклад, "апологія" або "схизма", від грецького оригіналу
    до його адаптації в руській книжній мові.'
  section: 'Мовна лабораторія: Порівняльний аналіз полеміки'
  words: 1000
- points:
  - 'Повернення до розминки: Чому церковнослов’янська мова потребувала захисту? Студент формулює відповідь на основі політичного,
    релігійного та культурного контексту Речі Посполитої.'
  - 'Лінгвістичний висновок: Що "Апологія" говорить нам про стан мовної свідомості руської еліти XVII ст.? Яким було співвідношення
    "свого" і "чужого"?'
  - 'Зв''язок уперед: Як полеміка Смотрицького та його сучасників вплинула на подальшу долю української літературної мови,
    зокрема на її секуляризацію у XVIII-XIX ст.?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз "Апології" Мелетія Смотрицького як захисту церковнослов’янської мови, її риторичних стратегій та місця в релігійно-політичній
  полеміці XVII століття.
