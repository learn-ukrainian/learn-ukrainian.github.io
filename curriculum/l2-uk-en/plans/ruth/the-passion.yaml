content_outline:
- points:
  - 'Провокація: Рутенський текст "Страстей" каже: "вирок йому дали". Слово "вирок" — полонізм. Яким би було "рідне" слово,
    і чому автори драми XVII ст. обрали запозичення?'
  - 'Порівняння: "урядник Пилат" (в тексті) vs "правитель Пилат" (сучасний переклад). Що нам говорить зміна цього слова про
    державу та право?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є мова "Страстей" — "простою мовою", якою розмовляли, чи це спеціальний "високий" літературний стиль, що
    свідомо змішує церковнослов’янські та польські елементи?'
  - 'Дебат 2: Наскільки юридичні сцени в тексті (суд над Христом) відображають реальну судову практику Речі Посполитої (з
    її польсько-латинською термінологією), а наскільки це лише літературний переклад біблійного сюжету?'
  - '[!decolonization] Цей текст, створений для української аудиторії XVII ст., є прямим доказом існування розвиненої літературної
    мови, здатної обслуговувати складні юридичні та богословські поняття, спростовуючи імперський міф про "селянський діалект".'
  - '[!epistemic-humility] Межі між "своєю" та "запозиченою" лексикою в цю добу були розмитими. Слово, що сьогодні здається
    полонізмом, тоді могло сприйматися як єдиний можливий технічний термін.'
  section: 'Конфліктна карта: Мова закону та мова віри'
  words: 700
- points:
  - 'Першоджерело: фрагмент тексту "Страстей" (XVII ст.) — сцена суду перед Пилатом.'
  - 'Глоси та коментарі: розбір архаїчних форм та юридичних термінів прямо в тексті (наприклад, "свідок", "прокуратор", "засудити").'
  - 'Граматичні нотатки: аналіз форм минулого часу (перфект, аорист), що відрізняються від сучасних дієслів.'
  - 'Контекст: "Страсті" — це не просто текст, а сценарій для великопісної драми. Як орієнтація на усне виконання вплинула
    на синтаксис та вибір лексики?'
  - '[!decolonization] Демонстрація, що українська мова мала власний драматичний театр і складні тексти за 150 років до того,
    як російська імперська культура "дозволила" їй існувати.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз полонізмів: детальний розбір юридичної лексики польського походження ("вирок", "скарга", "позивати"). Чи були
    в тогочасній українській мові відповідники?'
  - 'Аналіз латинізмів: терміни, що прийшли з латини через польську ("апеляція", "декрет", "мандат"). Чому мова права була
    настільки інтернаціональною?'
  - 'Аналіз церковнослов''янізмів: лексика, що описує духовні поняття ("гріх", "спокута", "благодать"). Як вона контрастує
    з "польською" юридичною лексикою в одному реченні?'
  - '[!myth-buster] Твердження, що полонізми "засмічували" мову — це модерний націоналістичний погляд. Для людей XVII ст.
    це було ознакою освіченості та доступу до європейської правової культури.'
  section: 'Мовний контакт: Полонізми в юридичній драмі'
  words: 1200
- points:
  - 'Порівняльний аналіз: одне й те саме юридичне поняття (напр. "свідчення") у трьох текстах: Литовський статут (руська мова),
    "Страсті" (українська XVII ст.), сучасний Кримінальний кодекс України. Простежте еволюцію.'
  - 'Етимологічний слід: розслідування походження слова "уряд". Як воно пов''язане з польським "urząd" та німецьким "Ordnung",
    і як воно відрізняється від церковнослов’янського "власть"?'
  - 'Стилістичний аналіз: візьміть один абзац тексту і "розфарбуйте" слова за походженням: синім — церковнослов''янізми, червоним
    — полонізми, зеленим — народна лексика. Який "колір" переважає і чому?'
  section: 'Мовна лабораторія: Слідство ведуть філологи'
  words: 1000
- points:
  - 'Повернення до розминки: тепер, знаючи контекст, поясніть, чому автор "Страстей" використав слово "вирок". Чи був це єдиний
    можливий вибір?'
  - 'Лінгвістичний висновок: текст "Страстей" демонструє, що рутенська/староукраїнська мова XVII ст. не була монолітною, а
    являла собою складну систему реєстрів, де мовець свідомо обирав між різними мовними ресурсами (слов''янськими, польськими,
    латинськими) для досягнення певного стилістичного ефекту.'
  - 'Зв''язок із майбутнім: як ця традиція використання полонізмів у праві була згодом перервана русифікацією, і як сучасна
    українська юридична термінологія намагається віднайти свій шлях між радянською спадщиною та європейською інтеграцією?'
  section: Дискусія та підсумок
  words: 600
