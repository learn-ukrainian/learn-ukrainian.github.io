- Аналізувати роль полонізмів та церковнослов'янізмів у драматичних текстах XVII століття
- Розрізняти різні лінгвістичні реєстри (юридичний, релігійний, розмовний) в межах одного рутенського тексту
- Критично оцінювати науковий диспут щодо статусу "простої мови" у порівнянні зі специфічними літературними стилями
- Використовувати докази з тексту для аргументації наявності самобутньої української літературної мови до XIX століття
