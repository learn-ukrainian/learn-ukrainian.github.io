content_outline:
- points:
  - 'Провокація: Термін "имѣніе" у Литовському статуті — це "маєток" чи "обов''язок"? Суть феодального землеволодіння в одному
    питанні.'
  - 'Фрагмент норми: "...абы с того имѣнья панъ его службу земскую служилъ". Студент має розібратися, хто кому служить і за
    що.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Литовського статуту — це "проста мова", "руська канцелярська мова" чи "полонізований суржик"? Політичні
    ставки мовних класифікацій.'
  - 'Дебат 2: Статут — це інструмент захисту прав руської шляхти чи знаряддя її полонізації через правове поле?'
  - '[!decolonization] Існування розвиненого кодексу права руською мовою спростовує імперську тезу про "бездержавність" та
    "безправність" українського народу до XIX ст.'
  - '[!epistemic-humility] Межі між "руською", "польською" та "церковнослов''янською" лексикою в юридичних текстах того часу
    були розмитими та ситуативними.'
  section: 'Конфліктна карта: Мова права — "проста" чи "висока"?'
  words: 700
- points:
  - 'Першоджерело: Стаття з Третього Литовського статуту (1588) про право власності на землю ("ґрунт").'
  - 'Читання з коментарем: аналіз архаїчних юридичних термінів — "ґрунт", "дідизна", "отчизна", "доживоття".'
  - 'Граматичні нотатки: особливості синтаксису юридичного документа, залишки архаїчних граматичних форм.'
  - '[!decolonization] Цей складний юридичний текст написаний мовою предків українців за століття до того, як російська імперія
    почала заперечувати саме існування цієї мови.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз термінів, що прийшли через польське посередництво ("ґрунт", "чинш", "побор"). Це було запозичення чи
    мовна мода?'
  - 'Латинізми: як терміни римського права ("декрет", "мандат", "каденція") потрапляли в руську мову, і як змінювалося їхнє
    значення.'
  - 'Церковнослов''янізми: використання високої "книжної" лексики для надання тексту більшої авторитетності та легітимності.'
  - '[!myth-buster] Присутність запозичень не свідчить про "нечистоту" мови. Це ознака активної взаємодії в європейському
    правовому просторі. Сучасна юридична українська також насичена іншомовними словами.'
  section: 'Мовний контакт: Полонізми та латинізми в правничій термінології'
  words: 1200
- points:
  - 'Тип лабораторії: Етимологічно-порівняльний аналіз.'
  - 'Завдання: Простежити еволюцію поняття "спадкове володіння".'
  - 'Аналіз: Порівняння термінів з Литовського статуту ("дідизна", "отчизна", "материзна") із сучасним українським терміном
    "спадщина".'
  - 'Висновок: Чому термін "спадщина" витіснив інші? Що ця зміна говорить про трансформацію поняття власності від родового
    до індивідуального?'
  section: 'Мовна лабораторія: Від дідизни до спадщини'
  words: 1000
- points:
  - 'Повернення до розминки: Тож "имѣніе" — це маєток чи обов''язок? Відповідь — і те, і інше, і в цьому суть феодалізму.
    Студент формулює розгорнуту відповідь.'
  - 'Лінгвістичний висновок: Мова Статуту — це функціональна, точна, гнучка система, здатна обслуговувати найскладніші сфери
    суспільного життя.'
  - 'Зв''язок із сьогоденням: Як руська юридична термінологія вплинула на сучасну українську правничу мову? Які терміни вижили,
    а які були замінені пізнішими запозиченнями?'
  section: Дискусія та підсумок
  words: 600
focus: Ruthenian land law concepts (земля, ім'єніє), property rights vs obligations in the Lithuanian Statute, linguistic
  analysis of legal terminology
