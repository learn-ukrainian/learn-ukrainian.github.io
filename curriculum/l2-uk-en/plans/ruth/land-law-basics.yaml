module: ruth-005
objectives:
- Аналізувати ключові поняття руського земельного права (ім'єніє, дідизна) у контексті Литовського статуту
- Розрізняти полонізми, латинізми та церковнослов'янізми в юридичному тексті XVI ст.
- Простежувати еволюцію юридичної термінології від "простої мови" до сучасної української
- Формулювати аргументовану позицію в дискусії про роль "простої мови" у формуванні української літературної традиції
