content_outline:
- points:
  - 'Провокація: Що страшніше в 1588 році — образити короля на словах чи продати ворогу державну таємницю? Чи є різниця?'
  - 'Юридична загадка: Подано термін "Образа Маєстату". Студент має вгадати, що він означає, і яке покарання за це передбачалося.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова права. Чи є "Образа Маєстату" полонізмом, латинізмом чи оригінальним руським терміном? Вибір мови для опису
    злочину як політичний акт.'
  - 'Дебат 2: Суб''єкт злочину. Кого зраджує зрадник у Речі Посполитій — виборного короля, шляхетську республіку, "руський
    народ" чи Бога? Розмитість поняття "держава".'
  - '[!decolonization] Існування в руській мові розвиненої юридичної термінології для державних злочинів спростовує імперський
    міф про "недержавність" українців.'
  - '[!epistemic-humility] Лояльність у XVI-XVII ст. — складна матерія. Козак, що вступав у союз із Москвою, міг вважати себе
    патріотом Русі, а у Варшаві його вважали зрадником. Хто мав рацію?'
  section: 'Конфліктна карта: Зрада королю чи зрада вітчизні?'
  words: 700
- points:
  - 'Первинне джерело: Стаття 1, Розділ 1 з Третього Литовського статуту 1588 року (руською мовою) — про цілісність держави
    та відповідальність за злочини проти неї.'
  - 'Кероване читання: Глоси та пояснення до термінів "маєстат", "Річ Посполита", "важити на пана", "горло и честь тратити".'
  - 'Граматичні нотатки: Синтаксис юридичної прози — довгі речення, пасивні конструкції, номіналізація.'
  - '[!decolonization] Статут, написаний руською мовою, був кодексом законів для величезної території, що доводить статус
    руської мови як мови держави та права, а не лише побутового спілкування.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: Адміністративна та судова лексика, що прийшла через польську ("уряд", "вирок", "шляхта").'
  - 'Латинізми: Фундаментальні поняття римського права, що є основою європейської юриспруденції ("маєстат" < maiestas, "статут"
    < statutum, "републіка" < res publica).'
  - 'Церковнослов''янізми: Мова присяги, поняття божественного права, моральні категорії ("благословення", "гріх", "покута").'
  - '[!myth-buster] "Чистота" мови — не показник її сили. Сила руської мови XVI ст. полягала в її здатності абсорбувати та
    адаптувати міжнародну юридичну термінологію, створюючи функціональний і точний інструмент для державотворення.'
  section: 'Мовний контакт: Юридичний регістр руської мови'
  words: 1200
- points:
  - 'Порівняльна лабораторія: Одне й те саме поняття — "зрада" — у трьох текстах: уривок із літопису (церковнослов''янська),
    стаття Статуту (руська), стаття Кримінального кодексу України (сучасна українська). Простежити еволюцію відтінків.'
  - 'Етимологічний слід: Походження слова "зрада". Як воно пов''язане зі словами "рада", "радити"? Коли відбулося семантичне
    розходження?'
  - 'Стилістична лабораторія: Аналіз мовних засобів, що створюють авторитет та безкомпромісність юридичного тексту в Статуті
    (формули, повтори, відсутність емоційної лексики).'
  section: 'Мовна лабораторія: Анатомія зради'
  words: 1000
- points:
  - 'Повернення до розминки: Студент дає розгорнуту відповідь: що таке "Образа Маєстату" в 1588 році, посилаючись на мовні,
    політичні та юридичні аспекти.'
  - 'Лінгвістичний висновок: Руська мова наприкінці XVI ст. була не просто "простою мовою", а мала розвинені, спеціалізовані
    функціональні стилі, зокрема юридичний.'
  - 'Зв''язок уперед: Як поняття "зради" трансформувалося в добу козацьких повстань? Чи можна вважати виступ Хмельницького
    "образою маєстату" короля Яна Казимира?'
  section: Дискусія та підсумок
  words: 600
focus: The concept of treason (Образа Маєстату) in the Third Lithuanian Statute (1588), the evolution from personal loyalty
  to state crime, and the linguistic landscape of Ruthenian legal terminology.
level: RUTH
module: ruth-018
objectives:
- Аналізувати еволюцію поняття «зрада» від особистої невірності монарху до злочину проти держави
- Розрізняти полонізми, латинізми та церковнослов''янізми в юридичних текстах руської доби
- Читати та інтерпретувати фрагменти оригінального тексту Литовського статуту 1588 року
- Аргументовано дискутувати про зв''язок між мовою права та державним суверенітетом
