content_outline:
- points:
  - 'Провокація: "Почалася війна і різня в Короні Польській" (Самовидець) vs "Почалася війна і різанина в Речі Посполитій"
    (сучасний переклад). Що стоїть за заміною одного слова?'
  - Чому автор називає себе "Самовидцем"? Що це каже про його претензії на істину?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Проблема авторства. Роман Ракушка-Романовський — доведена особа чи зручна гіпотеза? Аргументи "за" і "проти".'
  - 'Дебат 2: "Проста мова" чи мішанина? Лінгвістична класифікація мови Літопису — це народний варіант, книжний стандарт чи
    свідомий стилістичний вибір?'
  - '[!epistemic-humility] Точне авторство досі не встановлене, а мова Літопису є унікальним зразком, що не вписується в прості
    категорії.'
  - '[!decolonization] Літопис Самовидця — це пряма відповідь на імперський наратив про "неіснування" української мови та
    державності до XIX ст. Це погляд зсередини на події, що визначили долю України.'
  section: 'Конфліктна карта: Хто автор і якою мовою писав?'
  words: 700
- points:
  - 'Оригінальний текст: Фрагмент про початок Хмельниччини (1648). Читання в нормалізованій орфографії.'
  - 'Глоси та коментарі: розбір архаїчних форм ("на той час", "трафунок"), синтаксичних конструкцій.'
  - 'Граматичні нотатки: форми минулого часу (перфект), вживання аориста, відмінності в керуванні дієслів.'
  - 'Контекст: Літопис як жанр — між середньовічною хронікою та модерною історіографією. Хто був імовірним читачем цього тексту?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз адміністративної та військової лексики ("уряд", "полковник", "ринок"). Це необхідність чи мовна мода?'
  - 'Церковнослов''янізми: високий стиль у передмові та в описах значущих подій. Як автор використовує регістр для створення
    ефекту?'
  - 'Народна мова: вкраплення розмовної лексики та фразеології. Як це характеризує автора та його ставлення до описуваних
    подій?'
  - '[!myth-buster] Мова Літопису — не "засмічена", а жива. Вона відображає реальність багатомовності та культурних контактів
    українських еліт XVII ст.'
  section: 'Мовний контакт: Полонізми, церковнослов''янізми та народна стихія'
  words: 1200
- points:
  - 'Порівняльний аналіз: одне й те саме речення з Літопису, в перекладі церковнослов''янською (умовному) та сучасною українською.
    Простежити зміни в синтаксисі та лексиці.'
  - 'Граматичний практикум: ідентифікація та аналіз умовних конструкцій ("аби", "коли б") у тексті. Чим вони відрізняються
    від сучасних?'
  - 'Етимологічний слід: простежити шлях кількох слів з Літопису (напр., "реч", "посполитий") до їхніх сучасних українських
    відповідників або зникнення.'
  - 'Стилістичний експеримент: переписати короткий фрагмент з Літопису, замінюючи всі полонізми та церковнослов''янізми на
    сучасні синоніми. Що втрачається?'
  section: 'Мовна лабораторія: Еволюція норми'
  words: 1000
- points:
  - 'Повернення до розминки: Як тепер ви розумієте різницю між "Короною Польською" та "Річчю Посполитою" в контексті XVII
    ст.?'
  - 'Підсумкове питання: Як Літопис Самовидця слугує доказом безперервності української літературної та мовної традиції до
    Котляревського?'
  - 'Зв''язок уперед: Які з мовних рис, помічених у Літописі, збереглися в українській мові, а які зникли під впливом подальшої
    історії (Російська імперія, СРСР)?'
  section: Дискусія та підсумок
  words: 600
