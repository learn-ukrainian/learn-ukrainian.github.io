activity_hints:
- description: Кому належить теза? Розрізнення аргументів щодо авторства та мовної класифікації Літопису.
  focus: Перевірка розуміння соціолінгвістичних дебатів
  items: 6
  type: quiz
- description: Вставити в речення з Літопису пропущене слово, визначивши його походження (полонізм, церковнослов'янізм, народне).
  focus: Розпізнавання мовних шарів
  items: 8
  type: fill-in
- description: Наведено фрагмент з Літопису Самовидця та уривок з іншого козацького літопису (напр., Грабянки) про ту саму
    подію. Порівняйте мову, стиль, акценти. Що це каже про авторів?
  focus: Порівняльний аналіз джерел
  type: note
- description: 'Напишіть коротке есе (400-600 слів) на тему: "Як Літопис Самовидця спростовує імперський міф про те, що українську
    мову "вигадали" в XIX столітті?" Використовуйте конкретні приклади з модуля.'
  focus: 'Есе: Літопис як доказ'
  type: note
cefr_min: C2
