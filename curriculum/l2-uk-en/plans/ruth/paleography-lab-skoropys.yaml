activity_hints:
- description: Наведено 5 літер скорописом. Оберіть правильний варіант їхнього сучасного відповідника.
  focus: Розпізнавання літер скоропису
  items: 5
  type: quiz
- description: Прочитайте речення з універсалу та вставте пропущені слова, транскрибовані зі скоропису.
  focus: Транскрипція скоропису
  items: 4
  type: fill-in
- description: 'Надано зображення короткого рукописного речення. Проведіть повний палеографічний аналіз: визначте тип письма,
    опишіть характерні літери, лігатури, скорочення.'
  focus: Палеографічний аналіз
  type: note
- description: 'Напишіть коротке есе (300-400 слів) на тему: "Як розвиток власного канцелярського письма (скоропису) сприяв
    утвердженню української державності в козацьку добу?"'
  focus: 'Есе: Скоропис як політичний інструмент'
  type: note
cefr_min: C2
connects_to:
- document-types
- peresopnytsia-gospel-linguistics
content_outline:
- points:
  - 'Провокація: Показано одне слово, написане складним скорописом. Що це може бути? Чому його майже неможливо прочитати без
    підготовки?'
  - 'Зв''язок із сучасністю: Чому вміння читати старі рукописи є ключем до розуміння нецензурованої історії України?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була «проста мова» канцелярій справді «простою»? Скоропис як соціальний бар''єр та інструмент влади.'
  - 'Дебат 2: Вплив польської канцелярії на український скоропис. Це було природне запозичення чи мовно-культурна експансія?'
  - '[!decolonization] Радянська історіографія цілеспрямовано ігнорувала документи, написані скорописом, оскільки вони доводили
    безперервність української державної та правової традиції до-російського періоду.'
  - '[!epistemic-humility] Точна атрибуція та датування багатьох скорописних документів є предметом гострих наукових суперечок
    через схожість почерків та брак прямих дат.'
  section: 'Конфліктна карта: Канцелярська мова vs. Народна мова'
  words: 700
- points:
  - 'Первинне джерело: Фрагмент універсалу гетьмана Богдана Хмельницького (факсиміле та розшифровка).'
  - 'Порядковий аналіз: Розбір кожної літери, виносних елементів, скорочень (титл) та лігатур на прикладі тексту.'
  - 'Граматичні нотатки: Аналіз архаїчних граматичних форм (напр., форми минулого часу, двоїна), що збереглися в тексті універсалу.'
  - '[!decolonization] Читання оригінальних документів козацької доби руйнує імперський міф про «возз''єднання» — це були
    переговори суб''єктних сторін з власною розвиненою правовою та канцелярською культурою.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми в канцелярії: Аналіз лексики універсалу — які терміни (уряд, пан, маєток) прийшли з польської і як вони адаптувалися?'
  - 'Латинізми: Як латинська риторика та правова термінологія проникали в козацькі документи через польське посередництво?'
  - 'Слов''янізми: Чи є в тексті церковнослов''янські елементи? Якщо так, яку стилістичну функцію вони виконують — урочистості
    чи традиції?'
  - '[!myth-buster] Скоропис — це не «зіпсований» кириличний устав, а динамічна система, що ефективно адаптувалася для швидкого
    письма та увібрала в себе риси європейського діловодства.'
  section: 'Мовний контакт: Скоропис на перехресті культур'
  words: 1200
- points:
  - 'Палеографічний практикум: Студент отримує факсиміле кількох рукописних слів і має їх розшифрувати, користуючись таблицями
    літер.'
  - 'Граматична лабораторія: Ідентифікація та аналіз архаїчних дієслівних форм (аорист, імперфект) у наданому фрагменті.'
  - 'Лабораторія транскрипції: Завдання на транскрипцію короткого речення зі скоропису в сучасну українську графіку.'
  - 'Етимологічний аналіз: Простежити походження 2-3 ключових термінів з документа (напр., "реєстр", "клейноди").'
  section: 'Мовна лабораторія: Практикум зі скоропису'
  words: 1000
- points:
  - 'Повернення до розминки: Тепер, знаючи основи скоропису, студент знову дивиться на перше слово. Розшифровка та аналіз
    помилок первісного припущення.'
  - 'Лінгвістичний висновок: Що вивчення скоропису говорить нам про рівень розвитку української мови та її соціальні функції
    в XVI-XVII ст.?'
  - 'Зв''язок уперед: Як канцелярська мова козацької доби вплинула на формування сучасної української літературної мови?'
  section: Дискусія та підсумок
  words: 600
focus: Читання та аналіз рукописних документів XVI-XVII ст., написаних скорописом
