objectives:
- Розпізнавати та транскрибувати базові елементи українського скоропису XVI-XVII століть
- Аналізувати мовні особливості (лексичні, граматичні) оригінальних документів козацької доби
- Пояснювати роль та місце скоропису в системі тогочасного українського діловодства та культури
- Критично оцінювати історичні документи, написані скорописом, як доказ безперервності української правової та мовної традиції
