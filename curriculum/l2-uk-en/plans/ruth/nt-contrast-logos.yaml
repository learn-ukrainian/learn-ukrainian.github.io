content_outline:
- points:
  - 'Провокація: Два тексти, один вірш — ''Въ начала бѣ Слово'' (Острозька Біблія) vs ''На початку было Слово'' (Пересопницьке
    Євангеліє). Чи однакове це ''Слово''?'
  - Студент має вгадати, який текст є канонічним церковнослов''янським, а який — перекладом на народну мову, і на основі яких
    ознак.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Лінгвістичний): Чи є ''проста мова'' Пересопницького Євангелія автентичною народною мовою, чи це штучний літературний
    конструкт, що змішує церковнослов''янську, польську та українську основи?'
  - 'Дебат 2 (Богословський): Чи був переклад Євангелія на живу мову ''протестантським'' актом, що мав на меті зробити текст
    доступним для всіх, чи це був приватний девоційний проєкт для княгині?'
  - '[!decolonization] Сам факт перекладу Святого Письма на мову, близьку до народної, у XVI ст. є потужним доказом її зрілості
    та спростуванням імперського наративу про ''нерозвиненість'' української мови до XIX ст.'
  - '[!epistemic-humility] Вчені досі сперечаються про точну аудиторію та функцію Пересопницького Євангелія. Його розкішне
    виконання свідчить про елітарне, а не масове призначення.'
  section: 'Конфліктна карта: Канон чи народна мова?'
  words: 700
- points:
  - Паралельне читання та аналіз Івана 1:1-14 з Острозької Біблії та Пересопницького Євангелія.
  - 'Ключовий термін ''Логос'': чому обидва тексти використовують ''Слово''? Які були альтернативи і чому їх не обрали?'
  - 'Граматичні нотатки: порівняння відмінкових закінчень, дієслівних форм (аорист ''бѣ'' vs. минулий час ''было''), лексичних
    розбіжностей (''свѣтъ'' vs ''свѣтло'').'
  - '[!decolonization] Пересопницьке Євангеліє — не просто ''опольщена'' версія, а свідома спроба створити високий стиль на
    основі української мови, здатної передавати найскладніші богословські поняття.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналіз лексики та синтаксису Острозької Біблії як прикладу високого ''книжного'' стилю. Виявлення
    форм, що є архаїчними навіть для XVI ст.'
  - 'Полонізми та богемізми: аналіз лексики та синтаксису Пересопницького Євангелія. Де проходить межа між запозиченням та
    спільною лексичною спадщиною Речі Посполитої?'
  - 'Грецизми та латинізми: як обидва тексти передають богословські поняття грецького оригіналу (''Логос'', ''харіс'', ''пневма'')?
    Пряме запозичення, калькування чи семантична адаптація?'
  - '[!myth-buster] Теза про ''засміченість'' простої мови полонізмами. Насправді, це була спільна лексика епохи. Обидві мови,
    українська та польська, активно запозичували з латини та німецької.'
  section: 'Мовний контакт: Слов''янізми, полонізми та грецизми'
  words: 1200
- points:
  - 'Граматична лабораторія: порівняння системи минулих часів (аорист, імперфект) в церковнослов''янській (Острог) та їх трансформацій
    у ''простій мові'' (Пересопниця).'
  - 'Лексична лабораторія: семантичне поле ''світло/світ''. Як два тексти передають грецьке розрізнення ''phos'' (світло як
    явище) і ''kosmos'' (світ як творіння, порядок)?'
  - 'Порівняльна лабораторія: Іван 1:1 у трьох версіях — грецький оригінал, Острозька Біблія, Пересопницьке Євангеліє. Простежити
    шлях кожного слова та граматичної конструкції.'
  - 'Стилістична лабораторія: аналіз реєстрів. Які слова в Пересопницькому Євангелії є книжними, а які — розмовними?'
  section: 'Мовна лабораторія: Від аориста до минулого часу'
  words: 1000
- points:
  - 'Повернення до розминки: тож чи однакове ''Слово'' в обох текстах? Студент формулює аргументовану відповідь, враховуючи
    богословський, лінгвістичний та культурний контекст.'
  - 'Лінгвістичний висновок: що цей контраст говорить про співіснування та взаємодію ''високої'' книжної та ''низької'' народної
    мов у XVI столітті?'
  - 'Зв''язок уперед: як перекладацькі стратегії Пересопниці (і поразка цієї традиції) вплинули на подальший розвиток української
    літературної мови?'
  section: Дискусія та підсумок
