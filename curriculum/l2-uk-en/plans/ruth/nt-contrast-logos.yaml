focus: A comparative analysis of the rendering of "Logos" (John 1:1) in the Ostrih Bible (Church Slavonic) and the Peresopnytsia
  Gospel (vernacular Ruthenian), exploring theological implications and linguistic choices.
level: RUTH
module: ruth-039
objectives:
- Аналізувати лінгвістичні та богословські відмінності у перекладах Івана 1 в Острозькій Біблії та Пересопницькому Євангелії.
- Формулювати аргументовану позицію щодо дебатів про класифікацію 'простої мови' та її ролі у XVI столітті.
- Розпізнавати та аналізувати церковнослов'янізми, полонізми та грецизми в текстах ранньомодерної доби.
- Пояснювати еволюцію граматичних форм (напр., системи минулих часів) від церковнослов'янської до сучасної української мови
  на прикладі текстів.
