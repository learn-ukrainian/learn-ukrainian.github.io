activity_hints:
- description: 'Перевірка дебатів: чия це позиція — прихильників «простої мови» чи «високого стилю»? Ідентифікувати аргументи
    релігійної та соціальної критики.'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити в речення з тексту слова, що означають багатство та бідність (напр. злато, палати, нужда, голий).
  focus: Архаїчна лексика критики
  items: 5
  type: fill-in
- description: Надано три варіанти речення (церковнослов'янський, руський, сучасний). Проаналізуйте, як змінюється стилістичне
    забарвлення та які смислові відтінки виникають.
  focus: Порівняльний аналіз регістрів
  type: note
- description: Напишіть есе (400-600 слів), як аналізований текст спростовує імперський міф про «відсутність» української
    інтелектуальної культури до XIX століття.
  focus: 'Есе: Текст як доказ'
  type: note
