content_outline:
- points:
  - 'Провокація: фраза з полемічного тексту Івана Вишенського, що викриває розкіш духовенства, поруч із її сучасним еквівалентом.
    Що змінилося в мові, а що — в суспільній критиці?'
  - Термін з тексту, напр. «лихварство» або «душогубство» — студент має вгадати його точне значення в контексті соціальної
    нерівності XVI-XVII ст.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Вибір мови як політичний акт. Чи використовує автор «просту мову», щоб звернутися до народу, чи стилізовану
    церковнослов''янську, щоб критикувати церкву зсередини?'
  - 'Дебат 2: Джерело критики — релігійне чи соціальне? Це боротьба з моральним занепадом (єрессю) чи з економічною нерівністю?
    Де межа?'
  - '[!decolonization] Існування гострої внутрішньої полеміки спростовує імперський наратив про Україну як пасивний об''єкт
    без власної інтелектуальної історії.'
  - '[!epistemic-humility] Грань між релігійною єрессю та боротьбою за соціальну справедливість у цю добу була вкрай розмитою.
    Ми не можемо прямо проєктувати сучасні поняття на минуле.'
  section: 'Конфліктна карта: Багатство мови vs мова про багатство'
  words: 700
- points:
  - 'Первинний текст: Фрагмент з «Послання до єпископів» Івана Вишенського, де він атакує прелатів за їхнє багатство та відхід
    від християнських ідеалів.'
  - 'Кероване читання: глоси до слів, що позначають розкіш («злото», «палати», «коштовні ризи») та бідність («нужда», «голота»,
    «сльози вдови»).'
  - 'Граматичні нотатки: аналіз риторичних прийомів для створення сатиричного ефекту — антитеза, риторичні запитання, гіпербола.'
  - '[!decolonization] Текст як доказ існування розвиненої полемічної традиції та соціальної думки в Україні задовго до імперських
    наративів про «відсталість».'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз польських слів для опису соціальних структур, адміністрації та багатства («пан», «маєток»). Це нейтральні
    терміни чи вони вжиті з сатиричним наміром?'
  - 'Латинізми: як латинські терміни в теологічній критиці використовуються для побудови авторитету або нападу на брак освіченості
    опонента?'
  - 'Церковнослов''янізми: як використовуються слова «високого стилю»? Для піднесення критики до божественного рівня чи іронічно,
    для глузування з духовенства їхньою ж священною мовою?'
  - '[!myth-buster] Вживання полонізмів чи церковнослов''янізмів — це не «засмічення», а свідомий стилістичний вибір. Автор
    використовує весь доступний лінгвістичний арсенал для досягнення мети.'
  section: 'Мовний контакт: Мова гніву — зброя з Польщі, лексика з Греції'
  words: 1200
- points:
  - 'Порівняльна лабораторія: те саме поняття (напр. «жадібність», «лицемірство») виражене церковнослов''янською, руською
    та сучасною українською мовами. Простежте еволюцію та стилістичні відтінки.'
  - 'Стилістична лабораторія: ідентифікація та аналіз риторичних прийомів сатири в тексті — іронія, сарказм, гіпербола. Як
    саме мовні засоби створюють критичний ефект?'
  - 'Етимологічний слід: простежити шлях слова на кшталт «хабар» чи «здирство» з аналізованого тексту до його сучасного значення
    та вжитку.'
  section: 'Мовна лабораторія: Стилістичний аналіз сатири'
  words: 1000
- points:
  - 'Повернення до розминки: тепер, розуміючи історичний та лінгвістичний контекст, як співвідносяться мовна форма та соціальний
    меседж у критиці багатства?'
  - 'Лінгвістичний висновок: що цей текст розкриває про здатність руської мови обслуговувати такі складні жанри, як соціальна
    сатира та філософська полеміка?'
  - 'Зв''язок із майбутнім: як ця традиція гострої соціальної критики розвивається в українській літературі пізніше (наприклад,
    у творчості Шевченка)?'
  - 'Есейна теза: сформулюйте аргумент, як цей текст доводить існування української мови як самодостатньої інтелектуальної
    сили до Котляревського.'
  section: Дискусія та підсумок
  words: 600
focus: 'Полемічні тексти як інструмент соціальної критики в руську добу: захист бідних проти лицемірства багатих прелатів,
  аналіз сатиричної риторики, мовні контакти як зброя в інтелектуальній боротьбі.'
