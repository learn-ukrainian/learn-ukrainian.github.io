module: ruth-063
objectives:
- Аналізувати полемічні тексти руської доби, розрізняючи соціальну та релігійну критику.
- Ідентифікувати та аналізувати мовні контакти (полонізми, латинізми, церковнослов'янізми) як стилістичний інструмент.
- Пояснювати, як існування складної полемічної літератури спростовує колоніальні наративи про українську мову.
- Створювати власні аргументовані висловлювання щодо соціолінгвістичної ситуації в Україні XVI-XVII століть.
