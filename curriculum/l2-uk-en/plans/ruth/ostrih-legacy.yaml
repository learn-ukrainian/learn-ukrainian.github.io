content_outline:
- points:
  - 'Провокація: Чи є Острозька Біблія «зрозумілішою» за сучасний синодальний переклад? Порівняння одного вірша у трьох версіях:
    Острозька, сучасна українська, сучасна російська.'
  - 'Термін на обговорення: «проста мова». Це мова простаків чи спрощена висока мова для широкого загалу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була мова острозьких видань «простою мовою», церковнослов''янською руської рецензії, чи унікальним гібридом?
    Позиції лінгвістів.'
  - 'Дебат 2: Вплив на Москву. Чи була граматика Смотрицького «вкрадена» і адаптована для московської норми, чи це був природний
    процес культурного трансферу?'
  - '[!epistemic-humility] Точно класифікувати мову Острога складно; це був свідомий проєкт синтезу для протистояння католицизму,
    а не фіксація розмовної норми.'
  - '[!decolonization] Твердження про те, що Острог писав «давньоруською», ігнорує два століття окремого розвитку та цілеспрямовану
    роботу з унормування саме руської (української) версії.'
  section: 'Конфліктна карта: Мова Острога: своя чи чужа?'
  words: 700
- points:
  - 'Першоджерело: Фрагмент передмови до Острозької Біблії або з полемічного твору Герасима Смотрицького.'
  - 'Кероване читання: Оригінальний текст з глосами для архаїчних форм (двоєна, аорист, імперфект, складні конструкції).'
  - 'Граматичні нотатки: Як працює руська система відмінювання порівняно з сучасною? Де видно вплив польської синтаксису?'
  - '[!decolonization] Цей текст — не просто «старий», він є продуктом конкретної інтелектуальної школи, що мала на меті створити
    власний стандарт, відмінний і від польського, і від московського.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз адміністративної, військової та суспільної лексики, запозиченої з польської мови (уряд, право, республіка).'
  - 'Латинізми: вплив європейської академічної традиції через навчальний процес в Острозькій академії (ректор, студент, дисципліна).'
  - 'Церковнослов''янізми: як високий стиль церковної мови використовувався для створення авторитету та легітимності друкованого
    слова.'
  - '[!myth-buster] Запозичення не були ознакою «нечистоти» мови. Навпаки, це був інструмент модернізації, що дозволяв руській
    мові обговорювати найскладніші теми того часу на рівних з іншими європейськими мовами.'
  section: 'Мовний контакт: Острозький "плавильний котел"'
  words: 1200
- points:
  - 'Порівняльна лабораторія: Аналіз одного й того ж релігійного постулату в церковнослов''янській, руській (острозькій) та
    сучасній українській версіях. Простежити еволюцію.'
  - 'Етимологічний слід: Простежити шлях слова «друкарство» або «граматика» від його першого вжитку в Острозі до сучасного
    значення.'
  - 'Стилістичний аналіз: Визначити, які частини тексту написані у високому книжному стилі, а які — у більш доступному, «простому».
    Чому автор перемикає регістри?'
  section: 'Мовна лабораторія: Граматика, що змінила світ'
  words: 1000
- points:
  - 'Повернення до розминки: Як тепер ви можете пояснити різницю між трьома перекладами Біблії?'
  - 'Лінгвістичний висновок: Як спадщина Острога спростовує імперський міф про те, що українська мова — це «сільський діалект»,
    створений у XIX столітті?'
  - 'Зв''язок уперед: Як робота острозьких книжників та граматика Смотрицького вплинули не тільки на майбутню українську норму,
    але й стали основою для граматики Ломоносова в Росії?'
  section: Дискусія та підсумок
  words: 600
focus: The Ostrih Bible, the Academy, and its impact on the development of a Ruthenian literary standard and its influence
  on Muscovite norms.
