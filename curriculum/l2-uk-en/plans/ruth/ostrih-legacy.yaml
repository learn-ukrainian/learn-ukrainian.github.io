activity_hints:
- description: Чия це теза — що острозькі видання були "простою мовою" чи "церковнослов'янщиною"? Визначити позицію за цитатою.
  focus: Дебати про мову Острога
  items: 4
  type: quiz
- description: 'Заповніть пропуски в реченнях, використовуючи ключові терміни модуля: рецензія, полеміка, проста мова, передмова.'
  focus: Термінологія Острога
  items: 4
  type: fill-in
- description: Проаналізуйте уривок з передмови Івана Федорова. Визначте і випишіть слова, що належать до церковнослов'янського,
    польського та простого розмовного шарів. Поясніть, чому автор їх поєднує.
  focus: Аналіз мовних шарів
  type: note
- description: Напишіть есе (400-600 слів), використовуючи матеріал модуля, яке спростовує тезу, що українська літературна
    мова була "створена" у XIX столітті. Наведіть конкретні приклади з острозьких видань.
  focus: 'Есе: Спадщина Острога як доказ'
  type: note
cefr_min: C2
connects_to:
