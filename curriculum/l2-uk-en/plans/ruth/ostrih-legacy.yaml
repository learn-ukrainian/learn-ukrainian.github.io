- definition: Руська літературна мова XVI-XVII ст., що базувалася на народній основі, але збагачена церковнослов'янізмами
    та полонізмами.
  pos: ж.
  word: проста мова
- definition: Книжна, переважно конфесійна мова православних слов'ян, що мала різні місцеві варіанти (рецензії).
  pos: ж.
  word: церковнослов'янська мова
- definition: Гостра публіцистична суперечка на релігійну, політичну чи наукову тему, характерна для доби Ренесансу та Реформації.
  pos: ж.
  word: полеміка
- definition: Вступна частина до книги, написана автором, видавцем чи упорядником, що пояснює мету та зміст видання.
  pos: ж.
  word: передмова
- definition: Технологія та процес виготовлення книг шляхом відбитків з набірних форм; започатковане в Україні Іваном Федоровим.
  pos: с.
  word: друкарство
- definition: У мовознавстві — місцевий варіант (ізвод) книжної мови, що має усталені риси.
  pos: ж.
  word: рецензія
- definition: Наука про будову мови; також книга, що описує закони та правила певної мови, як-от «Граматика» Мелетія Смотрицького.
  pos: ж.
