objectives:
- Аналізувати лінгвістичні та політичні дебати навколо мови Острозької академії
- Розрізняти мовні шари (церковнослов'янізми, полонізми, простонародні елементи) в текстах XVI-XVII ст.
- Використовувати спадщину Острога як доказ безперервності української літературної традиції
- Пояснювати вплив Острозької Біблії та граматик на розвиток мов східнослов'янського регіону
