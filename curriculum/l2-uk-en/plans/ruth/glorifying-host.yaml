content_outline:
- points:
  - 'Провокація: Чи походять козаки від хозар? Автор XVII століття стверджував, що так. Де закінчується історія і починається
    ідеологія?'
  - Фрагмент з літопису Грабянки про «народ хоробрих козар» — спробуйте перекласти, не знаючи контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою мовою написаний літопис Грабянки? Це «проста мова», «книжний український» чи щось інше? Як вибір мови служить
    ідеологічним цілям автора?'
  - 'Дебат 2: Хозарський міф — це реальна історична теорія того часу чи політичний інструмент для створення шляхетного, непольського
    походження для козацької еліти?'
  - '[!epistemic-humility] Історіографія бароко мала інші стандарти істини, ніж сучасна наука. Для них «благородний» міф був
    ціннішим за «низьку» правду.'
  - '[!decolonization] Створення «глибокої історії» було відповіддю на імперські наративи, що відмовляли українцям у власному
    минулому. Це рання форма культурного суверенітету.'
  section: 'Конфліктна карта: Історія чи ідеологія?'
  words: 700
- points:
  - Читання уривку з літопису Грабянки, де він виводить козацький рід від Хозарського каганату.
  - 'Оригінальний текст з паралельним глосарієм: аналіз архаїчних форм (`паче`, `абіє`, `колико`, `сего ради`).'
  - 'Граматичні нотатки: особливості синтаксису бароко, вплив латинських та польських конструкцій.'
  - '[!decolonization] Цей текст — доказ того, що українська ідентичність і державницька думка існували задовго до Котляревського,
    спростовуючи імперську тезу про «вигадану націю».'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов’янізми: високий стиль, біблійні алюзії, книжна лексика (`воїнство`, `благочестя`, `держава`). Створення
    аури сакральності та авторитету.'
  - 'Полонізми: адміністративна та військова термінологія, що відображає реалії Речі Посполитої (`шляхта`, `уряд`, `панцирні`).'
  - 'Латинізми: наукова та риторична лексика, що свідчить про європейську освіченість автора (`нація`, `республіка`, `оратор`).'
  - '[!myth-buster] Мовний пуризм — це ідея XIX століття. Для автора бароко використання слів з різних мов було ознакою вченості
    та широти поглядів, а не «засміченням» мови.'
  section: 'Мовний контакт: Мова барокової історіографії'
  words: 1200
- points:
  - 'Comparative lab: Як одне поняття (напр. «шляхетний воїн») виражається різними мовними засобами в тексті: церковнослов’янським
    (`благородний воїн`), польським (`рицар`), місцевим (`козак`).'
  - 'Аналіз вибору: чому в одному місці Грабянка пише `битва`, в іншому `баталія`, а в третьому — `брань`? Семантичні та стилістичні
    відтінки.'
  - Спробуйте «переписати» фрагмент літопису, замінивши всі запозичення на гіпотетичні питомі відповідники. Що втрачається?
  section: 'Мовна лабораторія: Реєстровий аналіз'
  words: 1000
- points:
  - 'Повернення до розминки: тож звідки взявся хозарський міф? Студент формулює відповідь, пояснюючи його ідеологічну функцію.'
  - 'Лінгвістичний висновок: що літопис Грабянки говорить нам про стан української літературної мови на початку XVIII століття?
    Це складна, гібридна система.'
  - 'Зв''язок із майбутнім: як традиція таких «історичних» міфів вплинула на українських романтиків XIX століття?'
  section: Дискусія та підсумок
  words: 600
focus: Hryhorii Hrabianka's chronicle, the myth of Khazar origins for Cossacks, Baroque historiography vs. modern history,
  and analyzing 'prosta mova' with Church Slavonic elements.
level: RUTH
module: ruth-075
objectives:
- Аналізувати ідеологічну функцію історичного міфу в бароковій історіографії на прикладі «хозарського міфу» Грабянки.
- Розрізняти та аналізувати мовні шари (церковнослов’янізми, полонізми, розмовні елементи) у тексті «простою мовою».
- Критично читати та інтерпретувати фрагменти козацького літопису в оригіналі з науковим коментарем.
- Формулювати аргументовану позицію в дискусії про співвідношення «історії» та «літератури» в текстах до XIX століття.
pedagogy: CBI
persona:
  role: 'Роль: Вчений-монах, сучасник Грабянки, який бачить історію як моральну та теологічну драму, а не просто послідовність
    фактів. Для нього благородний міф цінніший за "низьку" правду.'
  voice: Baroque-Chronicler
