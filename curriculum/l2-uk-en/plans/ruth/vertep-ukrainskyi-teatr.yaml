objectives:
- Аналізувати вертеп як унікальну двоярусну форму українського лялькового театру, пояснюючи символізм священної та профанної
  частин.
- Розпізнавати та аналізувати різні мовні регістри (церковнослов''янський, полонізований, розмовний) у тексті вертепної драми.
- Критично оцінювати роль вертепу в українській культурі як доказ безперервності та складності мовно-літературного процесу
  до XIX ст.
- Демонструвати знання типових персонажів Галаганівського вертепу та їх соціальної функції.
