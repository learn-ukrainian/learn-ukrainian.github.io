activity_hints:
- description: Перевірка розуміння дебатів про мову та політичну роль вертепу. Чия це теза? Який доказ наводить кожна сторона?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити слова та фрази у репліки персонажів, обираючи правильний регістр (церковнослов'янізм, полонізм, розмовне
    слово).
  focus: Мовні регістри вертепу
  items: 5
  type: fill-in
- description: Оберіть одного персонажа з нижнього ярусу (Запорожець, Шинкар, Циган) і проаналізуйте 2-3 його репліки. Які
    риси характеру та соціального стану розкриває його мова?
  focus: Аналіз мови персонажа
  type: note
- description: 'Напишіть есе (400-600 слів), використовуючи матеріал модуля, на тему: "Як текст Галаганівського вертепу спростовує
    імперський міф про «неіснування» української мови та культури до XIX століття?"'
  focus: 'Есе: Вертеп як доказ'
  type: note
