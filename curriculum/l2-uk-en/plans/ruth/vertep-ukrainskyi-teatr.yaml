content_outline:
- points:
  - 'Провокація: Різдвяна шопка, в якій козак погрожує чорту, а шинкар-єврей скаржиться на життя. Як це поєднується з народженням
    Христа? Де межа між священним і світським?'
  - Фрагмент діалогу з нижнього ярусу (Запорожець і Шинкар) — студент має вгадати соціальний статус персонажів за їхньою мовою.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Мовний): Мова вертепу — це справжня «проста мова» XVIII ст., чи це стилізований театральний суржик для комічного
    ефекту?'
  - 'Дебат 2 (Політичний): Вертеп — це вияв української культурної ідентичності, чи інструмент, який Російська імперія пізніше
    заборонила, бо бачила в ньому загрозу?'
  - '[!decolonization] Заборона вертепів у XIX ст. — це не просто цензура, а цілеспрямоване знищення української публічної
    сфери та низової культури, яку неможливо було контролювати.'
  - '[!epistemic-humility] Ми маємо дуже мало повних текстів вертепних драм. Галаганівський вертеп — це виняток. Наскільки
    він репрезентативний для всього жанру?'
  section: 'Конфліктна карта: Театр для народу чи знаряддя імперії?'
  words: 700
- points:
  - 'Первинне джерело: Аналіз ключових сцен з Галаганівського вертепу (1770).'
  - 'Верхній ярус: сцена поклоніння волхвів. Мова персонажів — книжна, сповнена церковнослов''янізмів.'
  - 'Нижній ярус: сцена Запорожця, що виганяє чорта. Мова — жива, розмовна, з конкретними побутовими деталями.'
  - '[!biography] Знайомство з персонажами як соціальними типами: Запорожець (захисник), Шинкар (економічні реалії), Циган,
    Лях, Москаль (етнічні стереотипи того часу).'
  - 'Сцена смерті Ірода: як алегорична фігура Смерті взаємодіє з тираном — філософський і богословський підтекст.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - Аналіз мовних шарів у тексті вертепу.
  - 'Церковнослов''янізми: мова ангелів, пастухів у священній частині. Високий, книжний регістр.'
  - 'Полонізми та латинізми: мова Ірода та його двору, адміністративна та військова лексика. Ознака «західної» освіченості
    та влади.'
  - 'Українська розмовна мова (проста мова): мова персонажів нижнього ярусу. Найбільш динамічна і жива частина тексту.'
  - '[!myth-buster] Мовна «чистота» — це міф. Вертеп демонструє, що українська мова XVIII ст. була багатошаровою, активно
    взаємодіяла з іншими мовами і використовувала різні регістри для різних соціальних функцій.'
  section: 'Мовний контакт: Вавилонська вежа у шопці'
  words: 1200
- points:
  - 'Стилістичний лаб: Студентам дано репліки з вертепу без авторства. Завдання — визначити, якому персонажу (і з якого ярусу)
    може належати фраза, аргументуючи свій вибір лексичними та граматичними маркерами.'
  - 'Порівняльний лаб: Розгляд одного поняття (напр. «влада», «смерть», «гроші») і як воно представлене в мові Ірода (верхній
    ярус, полонізми), Запорожця (нижній ярус, розмовна мова) та ангелів (книжна мова).'
  - 'Етимологічний слід: Простежити шлях кількох слів з вертепу (напр. «пардон», «рація», «скаржитись») у сучасну українську
    мову.'
  section: 'Мовна лабораторія: Реєстровий аналіз'
  words: 1000
- points:
  - 'Повернення до розминки: Чому поєднання священного і профанного у вертепі не є блюзнірством, а є цілісною картиною світу
    українця XVIII ст.?'
  - 'Лінгвістичний висновок: Вертеп — це живий доказ існування розвиненої, багатошарової української мови задовго до Котляревського,
    здатної обслуговувати як високі богословські, так і низові комедійні жанри.'
  - 'Зв''язок із сучасністю: Вертепний театр сьогодні — відродження традиції на Різдво, політична сатира, терапевтичний інструмент.
    Як жанр адаптується до нових реалій?'
  section: Дискусія та підсумок
  words: 600
focus: Двоярусна структура (священне/профанне), Галаганівський вертеп 1770, мовні регістри персонажів, вертеп як соціокультурне
  явище
