activity_hints:
- description: Перевірка знання аргументів у дебатах. Чия це теза — прихильників «конституції» чи «пактів»? Визначити позицію
    за цитатою.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити в речення з тексту відповідні терміни: пакти, вольності, прерогатива, річ посполита.'
  focus: Ідентифікація мовних запозичень
  items: 4
  type: fill-in
- description: 'Подано два уривки: з Конституції Орлика та Литовського статуту, що говорять про права та свободи. Порівняйте
    мову, стиль та зміст. Що є спільним, а що відмінним у підходах до закону?'
  focus: 'Джерельний аналіз: текст Орлика vs Литовський Статут'
  type: note
- description: 'Напишіть коротке есе (400-60о слів) на тему: «Як преамбула Конституції Пилипа Орлика доводить існування української
    політичної нації та розвиненої мови до Котляревського?»'
  focus: 'Есе: Доказ існування нації'
  type: note
cefr_min: C2
connects_to:
- separation-of-powers
content_outline:
- points:
  - 'Провокація: «Народ колись козацький, а спершу званий хозарським». Хто і чиї права обґрунтовує, посилаючись на стародавній
    народ? Представлено оригінальний уривок та сучасний переклад.'
  - 'Термін на вгадування: Що таке «пакти і конституції»? Це договір з королем, основний закон держави чи щось інше?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була це перша конституція в Європі? Аргументи «за» (закріплює три гілки влади) та «проти» (не мала реальної
    сили, є радше договором гетьмана зі старшиною — pacta conventa).'
  - 'Дебат 2: Якою мовою написано документ? Це «проста мова», «слов''яно-руська», «церковнослов''янська» чи суміш? Що вибір
    мови говорить про аудиторію та амбіції авторів?'
  - '[!decolonization] Сам факт створення такого документу, що обґрунтовує тяглість і суверенітет, є спростуванням імперського
    міфу про «недержавність» українців та «штучність» мови.'
  - '[!epistemic-humility] Мовні та політичні категорії XVIII століття неможливо точно перекласти сучасними термінами. «Народ»,
    «вольності» та «конституція» мали інші значення.'
  section: 'Конфліктна карта: Конституція чи пакти? Мова закону vs мова дипломатії'
  words: 700
- points:
  - Оригінальний текст преамбули (староукраїнська версія) з паралельним сучасним українським перекладом.
  - 'Глосарій: розбір ключових термінів — `вольності`, `утиск`, `Вітчизна`, `народ`, `право`, `справедливість`.'
  - 'Граматичний коментар: аналіз синтаксису барокової прози — довгі періоди, риторичні фігури, вплив латини на побудову речень.'
  - 'Контекст: документ написаний у вигнанні, після Полтавської катастрофи. Як це вплинуло на його зміст і мету?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз латинізмів: `constitutio`, `pacta`, `res publica`, `dominium`, `praerogativa`. Як вони адаптуються в тексті? Чи
    є вони прямими запозиченнями, чи вже частиною тогочасного мовного стандарту?'
  - 'Аналіз полонізмів: `Річ Посполита`, `вольності`, `ухвала`, `привілей`. Це лексика необхідності (для опису понять, що
    прийшли з Польщі) чи лексика престижу?'
  - 'Церковнослов''янізми: `Бога в Тройці єдиного`, `благословенням`, `православний`. Як релігійна лексика використовується
    для сакралізації світської влади та легітимізації політичних вимог?'
  - '[!myth-buster] Мова документа — не «засмічена» і не «недосконала». Це живий зразок мовної практики еліти того часу, що
    інтегрувала Україну в європейський інтелектуальний простір.'
  section: 'Мовний контакт: Латина та Полонізми в мові козацької канцелярії'
  words: 1200
- points:
  - 'Стилістичний аналіз: як Орлик будує історичний наратив для обґрунтування прав козацтва? Виділення риторичних прийомів:
    історичні алюзії, градація, антитеза.'
  - 'Порівняльний аналіз: порівняння уривку з Конституції Орлика, статті з Литовського Статуту та преамбули сучасної Конституції
    України. Як змінилась мова українського закону за 300 років?'
  - 'Етимологічний слід: простежити шлях слова `конституція` від латинського оригіналу до його появи в українській мові XVIII
    століття і до сьогоднішнього значення.'
  section: 'Мовна лабораторія: Риторика бароко та юридична аргументація'
  words: 1000
- points:
  - 'Повернення до розминки: чи можна вважати «Пакти і Конституції» Орлика першою українською конституцією? Студенти формулюють
    власну аргументовану позицію.'
  - 'Лінгвістичний висновок: що цей текст говорить про стан і можливості української (руської) мови на початку XVIII століття?
    Чи була вона готовою обслуговувати державні потреби?'
  - 'Зв''язок із сучасністю: як ідеї, закладені в Конституції Орлика (розподіл влади, права народу, суверенітет), резонують
    у сучасній Україні?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз преамбули Конституції Пилипа Орлика (1710) як юридичного, політичного та мовного документа епохи бароко. Дослідження
  мовних контактів (латинізми, полонізми) та риторичних стратегій для обґрунтування суверенітету Війська Запорозького.
level: RUTH
module: ruth-086
objectives:
- Аналізувати преамбулу Конституції Пилипа Орлика як історичний та мовний артефакт.
- Розрізняти полонізми, латинізми та церковнослов'янізми в тексті, пояснюючи їхню функцію.
- Брати участь у дебатах щодо соціолінгвістичного та політичного статусу документа.
- Формулювати аргументовану відповідь на питання про роль документа в спростуванні імперських міфів про українську державність.
