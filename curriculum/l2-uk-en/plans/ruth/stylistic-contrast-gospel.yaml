activity_hints:
- description: Наведено цитати. Визначте, звідки цитата — з тексту сакрального чи канцелярського стилю. Вкажіть маркери, що
    допомогли зробити вибір.
  focus: Ідентифікація стилів
  items: 8
  type: quiz
- description: Вставити пропущені терміни (полонізм, слов'янізм, проста мова, канцеляризм, регістр) у речення з модуля.
  focus: Термінологічний диктант
  items: 5
  type: fill-in
- description: Вам дано два паралельні уривки (з Євангелія та Статуту) на одну тему (напр., "свідчення"). Випишіть 5 ключових
    лексичних та 3 граматичні відмінності. Поясніть, чим зумовлена кожна відмінність.
  focus: 'Компаративний аналіз: Євангеліє vs Статут'
  type: note
- description: Поясніть, чому саме цей текст, а не, наприклад, Литовський статут, став книгою, на якій присягають президенти.
    Яке значення має його «проста мова» для національної ідентичності? (400-600 слів).
  focus: 'Есе: Чому Пересопницьке Євангеліє є національним символом?'
  type: note
cefr_min: C2
connects_to:
- administrative-reform
- lithuanian-statute
content_outline:
- points:
  - 'Провокація: два речення. Одне з Пересопницького Євангелія, інше з Литовського статуту. Яке з них «більш українське»?
    Чому?'
  - 'Термінологічна загадка: що таке «проста мова»? Мова простолюду, спрощена церковнослов''янська чи щось інше?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи було Пересопницьке Євангеліє перекладом на «живу народну мову»? Чи це було радше створення нового, високого
    сакрального регістру цієї мови?'
  - 'Дебат 2: Чи була «руська мова ділова» (канцелярська) суто функціональним жаргоном, чи повноцінною літературною мовою?
    Порівняння її статусу з латиною на Заході.'
  - '[!decolonization] Існування і кодифікованої сакральної мови, і розвиненої юридичної мови в XVI ст. спростовує імперську
    тезу про «неіснування» української мови до XIX ст.'
  - '[!epistemic-humility] Вчені досі сперечаються про точний відсоток церковнослов''янізмів, полонізмів та питомих українських
    елементів у кожному стилі та їхнє функціональне навантаження.'
  section: 'Конфліктна карта: Священна книга чи народна мова?'
  words: 700
- points:
  - 'Джерело 1: Уривок з Євангелія від Івана з Пересопницького Євангелія. Аналіз лексики (архаїзми, сакралізми) та синтаксису
    (давальний самостійний).'
  - 'Джерело 2: Стаття з Литовського статуту. Аналіз лексики (юридичні терміни, полонізми) та синтаксису (складнопідрядні
    речення, усталені формули).'
  - 'Паралельний аналіз: як обидва тексти передають поняття «закон», «справедливість», «свідок»? Які конотації виникають у
    кожному стилі?'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз Пересопницького Євангелія: де закінчується «проста мова» і починається церковнослов''янська? Функції слов''янізмів:
    престиж, теологічна точність, літургійна традиція.'
  - 'Аналіз канцелярського стилю: Полонізми та германізми (через польську) як джерело адміністративної та юридичної термінології
    (війт, магістрат, апеляція).'
  - Латинізми як мова європейської вченості та права, їх проникнення в ділову мову (термін, мандат, декрет).
  - '[!myth-buster] Запозичення — це не «засмічення», а інструмент розвитку функціональних стилів. Боротьба не з запозиченнями,
    а за їх асиміляцію та адаптацію до фонетичної й морфологічної системи мови.'
  section: 'Мовний контакт: Слов''янізми, Полонізми, Латинізми'
  words: 1200
- points:
  - 'Граматична лабораторія: Порівняння вживання дієслівних часів (аорист, імперфект в Євангелії vs минулий на -в/-ла в ділових
    текстах). Відмінності в номінальній морфології.'
  - 'Стилістична лабораторія: «Перекладіть» сучасне українське речення (напр., «Громадянин має право на справедливий суд»)
    у два способи: як би воно звучало в Пересопницькому Євангелії, і як у Литовському статуті.'
  - 'Лексичний аналіз: Студенти отримують список слів і повинні розподілити їх за реєстрами: «сакральний» vs «канцелярський».
    Обґрунтування вибору.'
  section: 'Мовна лабораторія: Стилістична реконструкція'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, який стиль «більш український»? Студент формулює нюансовану відповідь, аргументуючи, що
    обидва є функціональними полюсами однієї мовної системи.'
  - 'Лінгвістичний висновок: Руська мова XVI ст. була поліфункціональною мовою з високорозвиненими регістрами для різних соціальних
    потреб.'
  - 'Зв''язок із сучасністю: Які риси сакрального стилю, а які — канцелярського, успадкувала сучасна українська літературна
    мова? Що було втрачено?'
  section: Дискусія та підсумок
  words: 600
focus: Stylistic contrast between the high sacral style of the Peresopnytsia Gospel and the pragmatic legal language of Ruthenian
  chancery documents. Analysis of Church Slavonic vs "prosta mova" registers.
level: RUTH
module: ruth-008
objectives:
- Порівнювати стилістичні та лексичні особливості високого сакрального стилю (Пересопницьке Євангеліє) та ділового канцелярського
  стилю
- Аналізувати вплив церковнослов'янської, польської та німецької мов на різні функціональні стилі руської мови XVI ст.
- Ідентифікувати ключові граматичні та синтаксичні відмінності між двома аналізованими регістрами
- Формулювати аргументовану позицію щодо концепції «простої мови» та її ролі у становленні української літературної мови
