content_outline:
- points:
  - 'Провокація: Фраза з руського тексту з дієсловом в аористі чи імперфекті поруч із сучасним українським перекладом. Що
    змінилося в системі часів дієслова?'
  - Студент має вгадати, як змінилася форма та значення дієслова, спираючись на контекст.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чия граматика панує? Церковнослов''янські норми (аорист, імперфект) vs народна «проста мова» (формування нових
    аналітичних конструкцій).'
  - 'Дебат 2: Польський вплив на руську дієслівну систему. Чи були форми як "chodziłem/chodziłam" поширеними? Як вони конкурували
    з питомими східнослов''янськими формами?'
  - '[!decolonization] Твердження, що українська граматика — це «зіпсована» польська або російська, спростовується аналізом
    саме руських текстів, де видно еволюцію питомих форм.'
  - '[!epistemic-humility] Межі між мовними шарами були розмитими. Автори часто змішували регістри в межах одного тексту,
    свідомо чи ні.'
  section: 'Конфліктна карта: Чия граматика?'
  words: 700
- points:
  - 'Первинне джерело: Фрагмент руського тексту (напр. з Пересопницького Євангелія) з високою концентрацією дієслівних форм.'
  - 'Оригінальний текст з паралельним глосарієм: розбір архаїчних форм дієслів, інфінітивів, особових закінчень.'
  - 'Граматичний фокус: аналіз вживання минулих часів (аорист, імперфект, перфект, плюсквамперфект) у тексті — як вони передають
    аспект і темпоральність.'
  - '[!decolonization] Цей текст — доказ існування розвиненої книжної мови на українських землях задовго до Котляревського,
    з власною складною граматичною системою.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз дієслівних запозичень з польської (напр. "дякувати", "мусити") та синтаксичних конструкцій (кальки).'
  - 'Латинізми: вплив латини на юридичну та наукову дієслівну лексику. Як руська мова адаптувала латинські дієслова?'
  - 'Церковнослов''янізми: дієслова високого стилю, що використовуються в релігійних текстах. Як вони контрастують з народними
    відповідниками?'
  - '[!myth-buster] Запозичення дієслів — це не «засмічення» мови, а збагачення її виражальних можливостей. Аналіз того, які
    дієслова залишилися в сучасній мові, а які зникли.'
  section: 'Мовний контакт: Дієслівні запозичення та кальки'
  words: 1200
- points:
  - 'Граматична лабораторія: відмінювання руських дієслів. Студент заповнює парадигми для дієслів з тексту, порівнюючи їх
    із сучасними.'
  - 'Порівняльна лабораторія: одне й те саме поняття (напр. "він сказав") церковнослов''янською (рєчє), руською (рєкъ, мовилъ)
    та сучасною українською (він сказав). Простежити еволюцію.'
  - 'Лабораторія аспектів: як руська мова розрізняла доконаний і недоконаний вид? Аналіз префіксації та суфіксації в дієсловах
    з тексту.'
  - 'Етимологічний слід: простежити шлях дієслова від руської доби до сьогодні, аналізуючи зміни у формі та значенні.'
  section: 'Мовна лабораторія: Еволюція дієслівних форм'
  words: 1000
- points:
  - 'Повернення до розминки: тепер, розуміючи систему минулих часів, поясніть, чому руська форма змінилася саме так.'
  - 'Лінгвістичний підсумок: що аналіз дієслова говорить про стан руської мови? Як вона поєднувала архаїчні риси з інноваціями?'
  - 'Зв''язок із сучасністю: які рудименти руської дієслівної системи можна знайти в сучасних українських діалектах або в
    літературній мові?'
  - 'Аргумент для есе: як аналіз дієслів у цьому тексті слугує доказом безперервності та самостійності розвитку української
    мови до Котляревського?'
  section: Дискусія та підсумок
  words: 600
focus: 'Ruthenian verb systems: evolution of conjugation patterns, tense (aorist, imperfect), aspect, and language contact
  phenomena (Polonisms, Latinisms) in primary source texts.'
