objectives:
- Аналізувати еволюцію дієвідмінювання від руської до сучасної української мови
- Розрізняти церковнослов'янські, польські та питомі народні впливи на руське дієслово
- Ідентифікувати та описувати форми минулих часів (аорист, імперфект) у текстах першоджерел
- Формулювати аргументовану позицію щодо ролі руської дієслівної системи як доказу самостійного розвитку української мови
