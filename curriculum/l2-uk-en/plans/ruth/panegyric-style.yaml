content_outline:
- points:
  - 'Провокація: «Герой, що сонцем для нас сяє» — це про кого? Розшифруйте бароковий комплімент і порівняйте з тим, як би
    ми сказали це сьогодні.'
  - Наведіть приклад панегіричної фрази на честь Петра Могили та її сучасний, сухий переклад. Що втрачено, крім пишності?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Панегірик — це висока література чи політичне замовлення? Аналіз ролі мецената (Могила, Мазепа) у визначенні
    змісту та форми твору.'
  - 'Дебат 2: «Проста мова» vs «високий стиль». Чи є панегірики свідченням розриву між елітарною та народною культурою, чи
    це просто різні функціональні стилі однієї мови?'
  - '[!decolonization] Панегірики Мазепі спростовують російський наратив про нього як про «зрадника». Вони показують його
    як покровителя культури та будівничого держави в очах тогочасної еліти.'
  - '[!epistemic-humility] Важко розрізнити, де закінчується щире захоплення патроном і починається риторична гра за встановленими
    правилами жанру.'
  section: 'Конфліктна карта: Хвала чи підлабузництво?'
  words: 700
- points:
  - 'Первинне джерело: уривок з панегірика Стефана Яворського «Echo głosu wołającego na puszczy» на честь Івана Мазепи.'
  - 'Читання з коментарем: аналіз барокових метафор та алегорій (Мазепа як сонце, орел, новий Ясон).'
  - 'Граматичні нотатки: особливості синтаксису «високого стилю» — інверсії, довгі періоди, риторичні фігури, що відрізняють
    його від сучасної мови.'
  - '[!decolonization] Цей текст, написаний «книжною» мовою, є частиною української літератури, а не польської чи російської,
    попри використання латиниці чи церковнослов’янізмів.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз адміністративної та військової лексики, що проникає навіть у найвищий стиль (наприклад, «уряд», «палац»,
    «жовнір»).'
  - 'Латинізми: риторична та філософська термінологія як ознака освіченості автора та слухача (oratio, virtus, fama).'
  - 'Церковнослов’янізми: біблійні алюзії та висока лексика, що надають тексту сакральності та урочистості.'
  - '[!myth-buster] Панегіричний стиль не є «засміченим». Це свідомий вибір автора, який демонструє свою здатність оперувати
    кількома мовними регістрами для досягнення стилістичного ефекту.'
  section: 'Мовний контакт: Коктейль мов у бароковому стилі'
  words: 1200
- points:
  - 'Стилістична лабораторія: Деконструкція панегіричної метафори. Візьміть метафору (Мазепа = сонце) і розкладіть її на складові:
    що саме порівнюється і з якою метою?'
  - 'Порівняльна лабораторія: Порівняйте уривок з панегірика Могилі та панегірика Мазепі. Знайдіть спільні риторичні фігури
    та відмінності у виборі образів.'
  - 'Етимологічний слід: Простежте шлях слова «чеснота» (virtus) від латини через польську до руської книжної мови. Як змінювалося
    його значення?'
  section: 'Мовна лабораторія: Риторичний розтин'
  words: 1000
- points:
  - 'Повернення до розминки: Тепер, знаючи правила жанру, чи здається вам бароковий комплімент таким вже й дивним? Аргументуйте.'
  - 'Лінгвістичний висновок: Панегіричний стиль — це глухий кут у розвитку мови чи необхідний етап для вироблення інтелектуального
    та абстрактного лексикону?'
  - 'Зв’язок уперед: Як риторичні прийоми бароко (антитеза, гіпербола) трансформувалися і збереглися в сучасній українській
    політичній та рекламній мові?'
  section: Дискусія та підсумок
  words: 600
focus: 'Panegyric style in Ruthenian literature: praising patrons like Mazepa and Mohyla, analyzing rhetorical devices, and
  exploring the sociolinguistic context of baroque praise.'
level: RUTH
module: ruth-071
objectives:
- Аналізувати жанр панегірика в руській літературі, визначаючи його ключові риторичні особливості та соціополітичну функцію
- Читати та інтерпретувати оригінальні уривки з панегіриків на честь меценатів, як-от Мазепа та Могила
- Аналізувати мовні контакти (полонізми, латинізми, церковнослов’янізми) у високому стилі панегіриків
- Дискутувати про класифікацію «простої мови» та книжної мови в контексті барокової риторики
