content_outline:
- points:
  - 'Провокація: Фрагмент із Євангелія: «и оставиша сіти, идоша по нем». Сучасний переклад: «і, покинувши сіті, пішли за ним».
    Що «зникло» з дієслова, і чому «по» тепер означає «за»?'
  - 'Термін: «проста мова». Це «простацька» мова чи щось інше? Чому княгиня замовила переклад Євангелія саме нею?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Проста мова» — це руська (староукраїнська) літературна мова чи церковнослов''янська з домішками народної? Позиція
    Огієнка vs позиція Живова.'
  - 'Дебат 2: Пересопницьке Євангеліє — це прояв Реформації (протестантський вплив) чи акт локального патріотизму та культурного
    самоствердження православної шляхти?'
  - '[!epistemic-humility] Межі між «церковнослов''янською», «простою мовою» та «польщизною» були розмиті. Автори свідомо
    комбінували ресурси різних мов для різних стилістичних ефектів.'
  - '[!decolonization] Створення перекладу Святого Письма живою народною мовою за 200+ років до Котляревського — нищівний
    удар по імперському міфу про «селянський діалект, винайдений в Австрії».'
  section: 'Конфліктна карта: Навіщо перекладати Святе Письмо?'
  words: 700
- points:
  - 'Оригінальний текст: Читаємо фрагмент запису-посвяти про мотиви перекладу — «для лепшого вырозумѣня люду христианского
    посполитого».'
  - 'Глоси та коментарі: розбираємо лексику — «архімандрит», «богодухновенного», «вспоможенієм», «скончалося». Які слова збереглися,
    а які стали архаїзмами?'
  - 'Граматичні нотатки: аналізуємо форми двоїни («два євангелиста») та давньоминулого часу («был описал»), що зникли в сучасній
    мові.'
  - 'Контекст: Хто такі княгиня Анастасія Заславська (Гольшанська), архімандрит Григорій, переписувач Михайло Василієвич?
    Яку роль кожен з них відіграв у створенні пам''ятки?'
  - '[!decolonization] Це не анонімний текст. Детальна посвята — це політична декларація, що фіксує імена, місце та мету,
    утверджуючи суб''єктність руської шляхти та духовенства.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: аналізуємо вживання високої, книжної лексики для передачі сакральних понять («благодать», «воскресіння»,
    «єдинородний»).'
  - 'Полонізми: досліджуємо вплив польської адміністративної та суспільної лексики («потреба», «власне», «старання», «обачивши»).
    Це свідоме запозичення чи мовна мода епохи?'
  - 'Лексичні українізми: знаходимо в тексті слова живої народної мови, що стали основою для сучасної лексики («дружина»,
    «хлопець», «криниця», «мова»).'
  - '[!myth-buster] Мовний пуризм — це ідея ХІХ ст. Для книжників XVI ст. використання слів з різних мов (церковнослов''янської,
    польської, латини, народної) було ознакою освіченості та широти поглядів, а не «засміченням» мови.'
  section: 'Мовний контакт: Слов’янізми, полонізми та жива мова'
  words: 1200
- points:
  - 'Граматична лабораторія: Аналіз дієслівних форм. Як у тексті співіснують старі форми аориста та імперфекта з новими конструкціями
    минулого часу на -в, -ла, -ло?'
  - 'Порівняльна лабораторія: Беремо один вірш з Пересопницького Євангелія, Острозької Біблії (церковнослов''янська) та сучасного
    перекладу (Огієнко/Турконяк). Порівнюємо синтаксис, лексику, морфологію. Що змінилося?'
  - 'Етимологічний слід: Простежимо шлях слова «мова». Від значення «народ» у церковнослов''янській до «мова, якою говорять»
    у Пересопницькому Євангелії та сучасного терміна.'
  - 'Стилістична лабораторія: В одному абзаці знаходимо слова, що належать до різних стилістичних шарів (високий, офіційно-діловий,
    розмовний). Як перекладач їх поєднує?'
  section: 'Мовна лабораторія: Граматика перехідної доби'
  words: 1000
- points:
  - 'Повернення до розминки: Тепер ви можете пояснити, що сталося з дієсловом «идоша» (зникла форма аориста і двоїни) і чому
    змінився прийменник. Це не помилка, а результат 450 років мовної еволюції.'
  - 'Лінгвістичний висновок: Пересопницьке Євангеліє — це не просто переклад, а «лабораторія», де свідомо випробовувалися
    можливості народної мови стати мовою високої культури та духовності.'
  - 'Зв''язок уперед: Як цей досвід кодифікації «простої мови» вплинув на розвиток української літературної мови у наступні
    століття, зокрема на полемічні твори та козацькі літописи?'
  section: Дискусія та підсумок
  words: 600
