content_outline:
- points:
  - 'Провокація: Перед вами речення, записане українцем у Парижі в 1643 році: "Kto iest iako Boh?" Що воно означає? Чому записано
    латиницею? Що ця транскрипція говорить нам про тодішню вимову?'
  - 'Загадка: Ужевич пише граматику «руської» мови, але називає її «слов''янською». Чому? Це синоніми, чи політичний вибір?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Яку мову описує Ужевич? Це розмовна «проста мова» (vernacular), чи книжна церковнослов''янська мова в її українському
    варіанті? Порівняння з граматикою Смотрицького.'
  - 'Дебат 2: Для кого написана граматика? Для французьких вчених, що цікавляться слов''янськими мовами, чи для самих українців,
    щоб стандартизувати власну мову за латинським зразком?'
  - '[!epistemic-humility] Точна мета автора невідома. Аргументи є на користь обох версій. Рукопис — це одночасно і документ
    для зовнішнього світу, і спроба саморефлексії.'
  - '[!decolonization] Сам факт створення граматики в Парижі, поруч із граматиками французької та італійської, доводить, що
    українська мова в XVII ст. усвідомлювалася як окрема європейська мова, а не «зіпсована» діалектна форма.'
  section: 'Конфліктна карта: Граматика для кого: для своїх чи для чужих?'
  words: 700
- points:
  - 'Читання фрагментів «Граматики» в оригінальній латинській транскрипції Ужевича. Приклад: опис української фонетики.'
  - 'Глоси та коментарі: як Ужевич намагається передати звуки [ж], [ч], [ш], [щ] та [и] засобами латинської абетки. Які звуки
    виявляються «проблемними»?'
  - 'Паралельний переклад: Оригінальний латинський текст Ужевича (пояснення граматичних правил) та його переклад сучасною
    українською.'
  - 'Контекст: Паризький рукопис як унікальний артефакт. Чому він не був надрукований за життя автора? Доля рукопису та його
    відкриття.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз граматичної термінології: які терміни Ужевич бере з латинської граматичної традиції (casus, declinatio, conjugatio),
    а для яких знаходить слов''янські відповідники?'
  - 'Полонізми та латинізми в прикладах: Ужевич використовує живий мовний матеріал, де видно вплив польської та латинської
    мов на лексику та синтаксис тогочасної української.'
  - 'Церковнослов''янізми: як автор розрізняє «просту мову» та «книжну» (церковнослов''янську)? Чи змішує він їх у своїх прикладах?'
  - '[!myth-buster] Граматика Ужевича спростовує міф, що українська мова до XIX ст. була «некодифікованою». Це свідома спроба
    застосувати найсучаснішу європейську лінгвістичну модель до українського матеріалу.'
  section: 'Мовний контакт: Слов''янська vs Латинська: Коди в голові Ужевича'
  words: 1200
- points:
  - 'Фонетична лабораторія: на основі транскрипцій Ужевича реконструюємо, як вимовлялися ключові звуки: чи був «ікавізм»,
    як звучали дифтонги, якою була доля редукованих.'
  - 'Порівняльний аналіз: порівнюємо фонетичну систему, описану Ужевичем, із системою, описаною Мелетієм Смотрицьким. Де вони
    збігаються, а де суперечать? Що це говорить про діалектну базу авторів?'
  - 'Палеографічний аналіз: як особливості почерку в Паризькому рукописі можуть вказувати на вимову або наголос.'
  - 'Етимологічний трек: простежуємо еволюцію кількох слів від транскрипції Ужевича до їхньої сучасної форми.'
  section: 'Мовна лабораторія: Реконструкція вимови XVII століття'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, чому українець у Парижі пише граматику рідної мови латиницею? Студент формулює відповідь,
    використовуючи поняття «культурна репрезентація», «стандартизація», «мовний контакт».'
  - 'Лінгвістичний підсумок: що «Граматика» Ужевича говорить про стан української мови в середині XVII століття? Наскільки
    вона вже відійшла від церковнослов''янської та спільносхіднослов''янської єдності?'
  - 'Зв''язок уперед: як ідеї Ужевича (хоч і невідомі широкому загалу) випереджають пізніші спроби кодифікації української
    мови? Місце «Граматики» в історії української лінгвістичної думки.'
  section: Дискусія та підсумок
  words: 600
focus: 'A Ukrainian grammar written in Paris: documenting 17th-century phonology in Latin alphabet, analyzing language contact,
  and asserting identity in exile.'
