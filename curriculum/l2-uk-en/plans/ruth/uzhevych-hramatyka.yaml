objectives:
- Аналізувати 'Граматику' Ужевича як джерело з історичної фонології та морфології української мови XVII ст.
- Реконструювати приблизну вимову слів на основі латинської транскрипції автора.
- Розрізняти та аналізувати явища мовного контакту (полонізми, латинізми, церковнослов'янізми) у тексті.
- Формулювати аргументовану позицію щодо ролі 'Граматики' як доказу високого рівня української мовної свідомості в європейському
  контексті XVII ст.
