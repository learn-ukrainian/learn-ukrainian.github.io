content_outline:
- points:
  - 'Провокація: Чи мала вдова у XVII столітті більше юридичних прав, ніж звичайний селянин? Розглянемо фрагмент Литовського
    статуту.'
  - 'Термін: "посполитий чоловік". Що означає це поняття в руських текстах — "проста людина" чи "громадянин"? Відповідь не
    така очевидна.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Мовний): Чи була "проста мова" достатньою для вираження складної правової філософії? Дискусія про те, чи потребували
    руські мислителі латини та церковнослов''янської для розмов про державу.'
  - 'Дебат 2 (Правовий): Звідки походять права? Козацькі договори та міські привілеї бачили права як надані Богом/монархом,
    чи як невід''ємні права громади?'
  - '[!decolonization] Ідея "договору" між правителем та народом у руських землях — це спростування московського міфу про
    "віковічне прагнення до самодержавства".'
  - '[!epistemic-humility] Межа між "природним правом", "звичаєвим правом" та "божественним законом" у текстах того часу була
    надзвичайно розмитою.'
  section: 'Конфліктна карта: Боже право чи воля громади?'
  words: 700
- points:
  - 'Першоджерело: Фрагменти з "Артикулів" Магдебурзького права, адаптованих для українського міста, що регулюють права вдів
    та опіку над сиротами.'
  - Оригінальний текст (нормалізована орфографія) з глосарієм для архаїчних правових термінів.
  - 'Граматичний коментар: аналіз форм умовного способу в конструкціях "аще бы..." (якби...), що виражають гіпотетичні правові
    ситуації.'
  - '[!decolonization] Читання оригінальних юридичних документів доводить існування розвиненої правової культури та мови,
    незалежної від московської традиції.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - Аналіз правової термінології у тексті джерела.
  - 'Латинізми: "артикул", "декрет", "трибунал" — як терміни римського права адаптувалися на руському ґрунті.'
  - 'Полонізми: "уряд", "сейм", "шляхта" — запозичення адміністративної та станової лексики.'
  - 'Руська основа: Як питомі слова ("право", "суд", "справедливість", "громада") набували нового, більш точного юридичного
    значення.'
  - '[!myth-buster] Запозичення юридичної термінології — це не "засмічення" мови, а ознака її інтеграції в європейський правовий
    простір.'
  section: 'Мовний контакт: Юридичний лексикон між латиною та простою мовою'
  words: 1200
- points:
  - 'Етимологічний слід: Простежимо шлях слова "право". Від праслов''янського *pravъ ("прямий, правильний") до руського поняття
    закону та справедливості.'
  - 'Порівняльна лабораторія: "Справедливість". Як це поняття виражалося церковнослов''янською ("правда"), у руській простій
    мові ("справедливость") та в латині ("justitia")? Які відтінки значення мав кожен варіант?'
  - 'Стилістичний аналіз: Визначення реєстру. У фрагменті тексту розрізнити слова, що належать до високого (церковнослов''янського),
    офіційного (канцелярського) та розмовного шарів.'
  section: 'Мовна лабораторія: Еволюція правових термінів'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, чиї права були краще захищені — вдови чи селянина? Студент формулює відповідь, спираючись
    на аналіз джерел.'
  - 'Лінгвістичний висновок: Як здатність мови абсорбувати та адаптувати іноземну термінологію свідчить про її життєздатність
    та розвиток?'
  - 'Зв''язок із сучасністю: Як руське розуміння "договору" та "громади" вплинуло на формування сучасного українського громадянського
    суспільства?'
  section: Дискусія та підсумок
  words: 600
focus: The concept of a "social contract" in Ruthenian legal texts, focusing on the rights of widows, orphans, and commoners,
  and the philosophical language used to define them
level: RUTH
module: ruth-088
objectives:
- Аналізувати концепцію "суспільного договору" в контексті руських правових пам''яток XVI-XVII ст.
- Розрізняти та аналізувати мовні шари (латинізми, полонізми, церковнослов''янізми) у юридичних текстах
- Простежувати еволюцію ключових правових термінів від руської доби до сучасності
- Аргументовано доводити існування розвиненої української правової традиції та мови до XIX століття
