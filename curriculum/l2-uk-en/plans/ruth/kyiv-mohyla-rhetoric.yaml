objectives:
- Аналізувати риторичні прийоми та стратегії в текстах XVII-XVIII ст.
- Розрізняти мовні впливи (латинізми, полонізми, церковнослов’янізми) в барокових текстах.
- Конструювати власні аргументативні висловлювання, використовуючи риторичні канони Могилянки.
- Критично оцінювати історичні дебати щодо культурної самостійності української барокової риторики.
