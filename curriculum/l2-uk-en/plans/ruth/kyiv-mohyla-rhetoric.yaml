activity_hints:
- description: Чия це теза — радянської історіографії чи сучасної? Визначити, хто є автором твердження про могилянську риторику.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Подано два тексти, що доводять ту саму тезу: фрагмент промови Прокоповича та колонка сучасного блогера. Порівняйте
    використані риторичні стратегії. Які "loci communes" є спільними, а які унікальні для кожної епохи?'
  focus: 'Компаративний аналіз: Бароко vs Сучасність'
  type: note
- description: Оберіть будь-який "locus communis" з модуля і напишіть короткий абзац (100-150 слів), що переконує у необхідності
    вивчення історії. Використовуйте стилістичні риси, притаманні бароковій прозі.
  focus: Практичне застосування риторики
  type: note
cefr_min: C2
connects_to:
- panegyric-style
content_outline:
- points:
  - 'Провокація: латинський термін "Locus a causa" та українське прислів’я "немає диму без вогню". Що спільного?'
  - Знайомство з одним із "загальних місць" (loci communes) — як інструментом доказу, що працював і для могилянського спудея,
    і для сучасного юриста.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова викладання. Чи була риторика в Могилянці латинською, польською, церковнослов’янською чи "простою мовою"?
    Чи це був штучний макаронічний конструкт?'
  - '[!epistemic-humility] Межі між цими мовами були розмиті, а викладачі свідомо грали з регістрами, створюючи унікальний
    академічний жаргон.'
  - 'Дебат 2: Джерельна база. Радянська історіографія наполягала, що могилянська риторика — це сліпа копія польських єзуїтських
    моделей. Сучасні дослідники доводять, що це був творчий синтез для потреб православного світу.'
  - '[!decolonization] Визнання риторики Могилянки самостійним явищем — це відмова від імперського наративу про "впливи" і
    повернення суб’єктності українській інтелектуальній історії.'
  section: 'Конфліктна карта: Риторика — польський імпорт чи український синтез?'
  words: 700
- points:
  - 'Первинне джерело: Фрагмент курсу риторики Феофана Прокоповича (1706-1707 рр) — розділ про "Loci Communes".'
  - Оригінальний текст (латиною з українськими/слов’янськими вставками) з паралельним українським перекладом.
  - 'Глоси: пояснення термінів (inventio, dispositio, elocutio), архаїчних форм та синтаксичних конструкцій.'
  - 'Контекст: Як Прокопович адаптує класичну риторику Цицерона та Квінтиліана для навчання майбутніх проповідників та державних
    діячів.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Латинізми: ядро риторичної термінології (аргумент, теза, ампліфікація) та логічних структур. Як ці слова увійшли в сучасну
    наукову мову?'
  - 'Полонізми: синтаксичні конструкції (напр., умовні речення), адміністративна та судова лексика, що використовувалась у
    прикладах.'
  - 'Церковнослов’янізми: високий стиль, біблійні цитати, моральні сентенції. Риторика як інструмент проповіді.'
  - '[!myth-buster] Мовна "чистота" — це ілюзія. Могилянський "коктейль" не був ознакою занепаду; це була ознака інтелектуальної
    відкритості до світу та здатності синтезувати різні традиції.'
  section: 'Мовний контакт: Латина, польська і слов’янська'
  words: 1200
- points:
  - 'Стилістичний лаб: взяти сучасну новину (напр., про корупцію) і побудувати аргументацію проти неї, використовуючи 3-4
    "загальних місця" з риторики Прокоповича (locus a persona, locus a re, locus a tempore).'
  - 'Порівняльний лаб: один і той же аргумент "треба платити податки", висловлений (1) мовою церковнослов’янської проповіді,
    (2) мовою барокового панегірика, (3) мовою сучасного закону. Проаналізувати різницю в лексиці та синтаксисі.'
  - 'Етимологічний слід: простежити шлях слова "аргумент" від латини через польську до староукраїнської і до сучасного вжитку.'
  section: 'Мовна лабораторія: Практикум з Loci Communes'
  words: 1000
- points:
  - 'Повернення до розминки: Як саме "locus a causa" пов’язує "дим" і "вогонь"? Студент пояснює механізм риторичного прийому.'
  - 'Лінгвістичний висновок: Могилянська риторика демонструє, що українська інтелектуальна еліта XVII-XVIII ст. вільно володіла
    кількома мовами та регістрами, створюючи складний і живий лінгвістичний простір.'
  - 'Зв’язок із сьогоденням: Як принципи барокової риторики використовуються в сучасній політичній пропаганді, рекламі та
    судових дебатах? Чи стали ми більш захищеними від маніпуляцій?'
  section: Дискусія та підсумок
  words: 600
focus: Loci Communes — The Five Canons of Rhetoric in the Kyiv-Mohyla Academy
