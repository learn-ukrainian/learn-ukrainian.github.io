content_outline:
- points:
  - 'Провокація: у тексті XVI століття читаємо «на ролію». Що це таке? Порівняйте з сучасним «на ріллю». Які звукові зміни
    відбулися?'
  - 'Загадка: що спільного між словами «притча», «пророк» та «ректи»? Пошук спільного кореня.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є мова Пересопницького Євангелія «простою мовою», чи це церковнослов''янська з елементами народної? Аргументи
    філологів.'
  - 'Дебат 2: Для кого писали? Для княгині-протестантки, для широкого загалу, чи це була спроба створити новий стандарт?'
  - '[!decolonization] Саме існування такого перекладу спростовує російську тезу про відсутність потреби в перекладі Біблії
    на «малоросійське наріччя».'
  - '[!epistemic-humility] Межі між «простою мовою», «руською мовою» та «церковнослов''янською» були розмитими. Автори самі
    не завжди їх розрізняли.'
  section: 'Конфліктна карта: «Проста мова» чи «високий стиль»?'
  words: 700
- points:
  - Оригінальний текст «Притчі про сіяча» з Пересопницького Євангелія (нормалізований правопис).
  - Паралельний переклад сучасною українською мовою для виявлення розбіжностей.
  - 'Глоси: пояснення архаїчних слів (паде, при дорозі, терніє, каменіє).'
  - 'Граматичні нотатки: форми аориста та імперфекта, що зникли в сучасній мові.'
  - '[!decolonization] Цей текст — прямий доказ тяглості української літературної традиції від Русі до сьогодні.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - Аналіз мовних шарів у тексті притчі.
  - 'Полонізми: адміністративна та побутова лексика, що проникла в «просту мову» (напр. «ролія»).'
  - 'Латинізми: мінімальний вплив у цьому фрагменті, але важливий для загального контексту тогочасної освіти.'
  - 'Церковнослов''янізми: високий стиль, абстрактні поняття, біблійна термінологія («царствіє», «глаголати»).'
  - '[!myth-buster] Запозичення — це не «засмічення» мови, а нормальний процес взаємодії культур. Виживання чи відторгнення
    запозичень показує напрям культурних зв''язків.'
  section: 'Мовний контакт: Сплав мов у Євангелії'
  words: 1200
- points:
  - 'Comparative lab: один і той самий фрагмент «Притчі про сіяча» трьома мовами: церковнослов''янською (Острозька Біблія),
    руською/«простою» (Пересопницьке Євангеліє) та сучасною українською.'
  - Студенти в таблиці відстежують зміни в лексиці, фонетиці (перехід "о" в "і"), морфології (зникнення двоїни, зміна відмінків).
  - 'Etymology trace: простежити етимологію слова «зерно» від праслов''янських часів до його символічного значення в притчі.'
  section: 'Мовна лабораторія: Порівняльний аналіз'
  words: 1000
- points:
  - 'Повернення до розминки: тепер, знаючи контекст, поясніть, чому «ролія» стала «ріллею» і що це говорить про розвиток мови.'
  - 'Головний висновок: як «Притча про сіяча» в цьому конкретному перекладі слугує аргументом в дискусії про безперервність
    та самостійність української мови до Котляревського?'
  - 'Зв''язок уперед: які з архаїчних рис, помічених у тексті, ще можна зустріти в діалектах або поетичній мові?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз «Притчі про сіяча» з Пересопницького Євангелія, лексика рільництва (ролія, зерно), мовний контакт у тексті та
  його роль як доказу існування української мови до Котляревського.
level: RUTH
module: ruth-030
objectives:
- Аналізувати оригінальний текст XVI століття, розрізняючи мовні шари (церковнослов'янізми, полонізми, народна мова).
- Пояснювати ключові лінгвістичні та політичні дебати навколо «простої мови».
- Простежувати еволюцію фонетичних та граматичних рис від руської доби до сучасності на конкретних прикладах.
- Формулювати аргументовану позицію щодо ролі Пересопницького Євангелія як доказу безперервності української літературної
  традиції.
