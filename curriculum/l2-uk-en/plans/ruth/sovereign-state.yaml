content_outline:
- points:
  - 'Провокація: «А коли хто з шляхти, сусід наш, межу нашу переоре...» — звідки цей рядок? Шкільний твір чи державний документ?'
  - 'Термін: «Господар» — це власник квартири чи правитель держави? Як одне слово може означати і те, і інше, і що це говорить
    про історію?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Проста мова» Литовського статуту — це «старобілоруська» чи «староукраїнська»? Чи це взагалі одна мова? [!decolonization]
    Розвінчання міфу про «спільну колиску» та демонстрація політичної ваги термінології.'
  - 'Дебат 2: Литовський статут — це інструмент полонізації чи кодифікація руського права? Чи міг він бути і тим, і іншим
    одночасно? [!epistemic-humility] Статут як поле боротьби культурних і правових впливів.'
  - 'Історичний контекст: Велике Князівство Литовське, Руське і Жемайтійське — держава, де офіційною мовою діловодства була
    руська.'
  section: 'Конфліктна карта: Чия це мова і чия держава?'
  words: 700
- points:
  - 'Первинне джерело: Стаття з Третього Литовського статуту (1588) про статус господаря, права шляхти або порядок успадкування
    землі.'
  - 'Оригінальний текст (нормалізована орфографія) з паралельним глосарієм: «артикул», «уряд», «кривда», «посполитий».'
  - 'Граматичний коментар: форми двоїни, аорист, особливості синтаксису юридичного тексту.'
  - '[!decolonization] Цей текст, написаний за 200+ років до Котляревського, є беззаперечним доказом існування розвиненої
    української юридичної мови.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз юридичної та адміністративної лексики, запозиченої з польської («уряд», «повіт», «сейм»). Це було збагачення
    чи витіснення?'
  - 'Латинізми: як терміни з римського права («статут», «декрет», «апеляція») потрапляли в руську мову, часто через польське
    посередництво.'
  - 'Церковнослов''янізми: високий стиль у преамбулах та присягах («благочестя», «закон», «справедливість»).'
  - '[!myth-buster] Мовний пуризм — це модерна ідея. Руська мова XVI ст. була жвавим перехрестям впливів, і саме це робило
    її живою та адекватною до вимог часу.'
  section: 'Мовний контакт: Полонізми, латинізми та руська основа'
  words: 1200
- points:
  - 'Порівняльний аналіз: одне й те саме правове поняття (напр., «договір») у трьох текстах: фрагменті з римського права (латиною),
    польського закону та Литовського статуту (руською).'
  - 'Етимологічний слід: як слово «кривда» перетворилось із морального поняття на юридичний термін? Простежити шлях слова.'
  - 'Стилістичний аналіз: чим відрізняється мова закону від мови літопису чи проповіді того ж періоду? Розбір синтаксису,
    лексики, прагматики.'
  section: 'Мовна лабораторія: Юридична термінологія'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, «господар» — це... Студент формулює комплексну відповідь, пояснюючи історичну еволюцію
    значення.'
  - 'Лінгвістичний підсумок: що цей текст говорить про стан української мови в XVI ст.? Які риси наближають її до сучасної,
    а які — віддаляють?'
  - 'Зв''язок уперед: Як втрата державності вплинула на долю цієї юридичної мови? Що з неї збереглося, а що було втрачено
    і замінено російськими/австрійськими термінами?'
  section: Дискусія та підсумок
  words: 600
focus: 'Поняття держави, влади та закону в текстах руської доби: ''господар'', ''панство'', Литовський статут'
level: RUTH
module: ruth-002
objectives:
- Аналізувати фрагменти з Литовського статуту, ідентифікуючи ключові юридичні терміни та граматичні особливості руської мови
  XVI ст.
- Розрізняти та класифікувати мовні запозичення (полонізми, латинізми) у юридичних текстах, пояснюючи їх функцію.
- Формулювати аргументовану позицію в соціолінгвістичних дебатах щодо статусу "простої мови" та її ролі у ВКЛ.
- Використовувати історико-лінгвістичний аналіз для спростування колоніальних наративів про історію української мови.
pedagogy: CBI
