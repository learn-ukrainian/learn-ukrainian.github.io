content_outline:
- points:
  - 'Провокація: Юридичний термін «головщина» з Литовського статуту. Як ви вважаєте, це стосується злочину проти голови держави,
    покарання відрубуванням голови чи грошового штрафу за вбивство?'
  - 'Порівняння: «А хто бы чоловіка забил...» (руська мова) vs «А хто б чоловіка вбив...» (сучасна українська). Яка граматична
    форма минулого часу зникла?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова Литовського статуту — це «староукраїнська», «старобілоруська» чи спільна «руська» канцелярська мова Великого
    Князівства Литовського? Політичне значення класифікації.'
  - 'Дебат 2: Литовський статут — це кодифікація руського звичаєвого права чи пряме запозичення польських та німецьких правових
    моделей? Дискусія про джерела та оригінальність правової системи.'
  - '[!decolonization] Існування розвиненої юридичної мови в XVI ст. спростовує імперську тезу про українську як «селянську
    мову без власної традиції державності та права».'
  - '[!epistemic-humility] Межі між «українським» і «білоруським» у XVI ст. були розмитими. Мова Статуту — це наддіалектна
    система з елементами церковнослов''янської, польської та місцевих говірок, яку важко класифікувати однозначно.'
  section: 'Конфліктна карта: Мова права чи право сили?'
  words: 700
- points:
  - 'Первинне джерело: Стаття про «головщину» (вбивство) з Третього Литовського статуту (1588). Оригінальний текст у нормалізованій
    орфографії.'
  - 'Кероване читання з глосами: розбір ключових термінів «кшталт», «вряд», «винє», «навязка», «слушне».'
  - 'Граматичний коментар: аналіз залишків аориста та імперфекта (напр., «убил бы», «рекл») та їх функціональне значення у
    тексті.'
  - Паралельний переклад сучасною українською мовою для ключових, найскладніших для розуміння положень статті про навмисне
    та ненавмисне вбивство.
  - '[!decolonization] Текст демонструє складну правову систему, що розрізняє ступені вини та соціальний статус жертви, що
    є ознакою зрілої державності, а не «дикого поля».'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: аналіз юридичної лексики польського походження («вряд», «позов», «свідок», «маєстат») як наслідок Люблінської
    унії та політичного домінування.'
  - 'Латинізми: розбір термінів, що прийшли через польське посередництво з римського права («мандат», «декрет», «апеляція»).
    Чи були вони адаптовані фонетично до руської мови?'
  - 'Церковнослов''янізми: виявлення слів високого стилю («совершити», «злочин», «кара», «закон»), що використовуються для
    надання тексту авторитетності та сакральності.'
  - '[!myth-buster] Запозичення в юридичній термінології — це не «засмічення» мови, а глобальна норма. Порівняння з англійською,
    де левова частка юридичної лексики — французька та латинська.'
  section: 'Мовний контакт: Юридична термінологія на перехресті культур'
  words: 1200
- points:
  - 'Порівняльна лабораторія: поняття «вбивство» в Руській Правді (XІ ст.) та Литовському статуті (XVI ст.). Що таке «віра»
    і що таке «головщина»? Як еволюціонувало поняття злочину та кари за 500 років?'
  - 'Етимологічний слід: простежити шлях слова «право». Від пра-інд.-євр. *pro-vos до сучасного багатозначного терміна. Як
    його значення змінювалось у руській мові?'
  - 'Стилістичний аналіз: порівняння синтаксису юридичної норми в Статуті та в сучасному Кримінальному кодексі України. Що
    стало простішим, а що ускладнилося?'
  section: 'Мовна лабораторія: Від віри до головщини'
  words: 1000
- points:
  - 'Повернення до розминки: що ж таке «головщина» і яке її відношення до «голови»? Студент формулює точне визначення на основі
    матеріалів модуля.'
  - 'Лінгвістичний підсумок: що аналіз мови Литовського статуту говорить про стан руської (української) мови в XVI ст.? Які
    процеси (втрата аориста, полонізація синтаксису) вже помітні?'
  - 'Зв''язок із сучасністю: як ідеї Литовського статуту (наприклад, презумпція невинуватості — «ніхто не має бути караний
    без вироку суду») вплинули на сучасне право?'
  section: Дискусія та підсумок
  words: 600
focus: 'Аналіз статті про головщину в Литовському статуті: поняття злочину, юридична термінологія, мовні впливи (полонізми,
  латинізми) у правовій сфері XVI ст.'
