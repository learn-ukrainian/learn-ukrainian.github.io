activity_hints:
- description: Перевірка розуміння соціолінгвістичних дебатів. Чия це теза — прихильників унії чи опонентів? Визначити позицію
    за цитатою.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: У поданих реченнях із тексту визначте, де полонізм, де латинізм, а де церковнослов'янізм.
  focus: Ідентифікація мовних шарів
  items: 5
  type: fill-in
- description: 'Подано три варіанти речення: церковнослов''янською, «простою мовою» та сучасною українською. Проаналізуйте,
    які саме граматичні та лексичні зміни відбулися.'
  focus: 'Порівняльний аналіз: три мови'
  type: note
- description: Напишіть коротке есе (400-600 слів), як текст «Напад на єпископів» можна використати як аргумент у дискусії
    про існування та розвиток української мови до Котляревського.
  focus: 'Есе: Доказ існування'
  type: note
cefr_min: C2
connects_to:
- baroque-lists
content_outline:
- points:
  - 'Провокація: «Вовки в овечій шкурі» — що змусило українського автора XVII століття вживати таку гостру лайку щодо єпископів?'
  - Порівняння фрази з полемічного тексту та її сучасного еквівалента. Що змінилося в мові, а що — в релігійних конфліктах?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мова тексту — «проста мова», «церковнослов''янська з елементами народної» чи вже «староукраїнська»? Дискусія
    про термінологію та її політичне забарвлення.'
  - 'Дебат 2: Берестейська унія — це було духовне примирення чи політична капітуляція православної еліти перед Польщею? Погляд
    з обох боків.'
  - '[!decolonization] Існування цього тексту спростовує імперський міф про те, що українська мова до Котляревського була
    лише «селянським діалектом».'
  - '[!epistemic-humility] Точні межі між «простою мовою» та церковнослов''янською в цей період є предметом наукових суперечок,
    а не чітким кордоном.'
  section: 'Конфліктна карта: Теологія чи політика?'
  words: 700
- points:
  - Читання уривка з «Нападу на єпископів» в оригіналі (нормалізована орфографія).
  - 'Глосарій: розбір архаїчних форм, незрозумілих слів та синтаксичних конструкцій.'
  - Паралельний переклад сучасною українською мовою для найскладніших фрагментів.
  - '[!decolonization] Аналіз тексту як доказу безперервності української літературної традиції та її здатності обслуговувати
    найвищі інтелектуальні сфери — релігійну полеміку.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз лексичних шарів: виявлення полонізмів (адміністративна, військова лексика), латинізмів (наукові, риторичні терміни)
    та церковнослов''янізмів (богословські поняття).'
  - Свідомий вибір чи несвідоме змішування? Як автор використовує різні мовні ресурси для створення експресії та переконання.
  - 'Синтаксичні кальки: чи вплинула польська та латинська мови на структуру речення в тексті?'
  - '[!myth-buster] Мовна «чистота» — це міф. Цей текст показує, що мова розвивається через контакт і запозичення, що є ознакою
    сили, а не слабкості.'
  section: 'Мовний контакт: Полонізми, латинізми та церковнослов''янізми в полеміці'
  words: 1200
- points:
  - 'Граматична лабораторія: аналіз складних синтаксичних конструкцій, що характерні для барокової прози.'
  - 'Стилістична лабораторія: виявлення риторичних фігур (метафори, антитези, градації), які автор використовує для емоційного
    впливу на читача.'
  - 'Порівняльна лабораторія: порівняння одного й того ж речення в церковнослов''янському, руському та сучасному українському
    варіантах для відстеження еволюції граматики.'
  - 'Етимологічний слід: простежити шлях кількох ключових слів з тексту від руської доби до сьогодення.'
  section: 'Мовна лабораторія: Риторика та синтаксис полемічного тексту'
  words: 1000
- points:
  - 'Повернення до розминки: тепер, розуміючи історичний та мовний контекст, як би ви пояснили фразу «вовки в овечій шкурі»?'
  - 'Лінгвістичний висновок: що цей текст говорить нам про стан української мови в XVII столітті? Наскільки вона була «самостійною»?'
  - 'Зв''язок із сучасністю: як досвід мовних і релігійних конфліктів минулого допомагає зрозуміти сучасну боротьбу України
    за свою ідентичність?'
  section: Дискусія та підсумок
  words: 600
focus: Fierce invective against the Union of Brest; analysis of polemical prose as a genre and evidence of a distinct Ukrainian
  literary language.
level: RUTH
module: ruth-060
objectives:
- Аналізувати оригінальний полемічний текст XVII ст., розрізняючи в ньому різні мовні шари (полонізми, латинізми, церковнослов'янізми).
- Формулювати аргументовану позицію щодо соціолінгвістичних дебатів навколо «простої мови» та Берестейської унії.
- Критично оцінювати риторичні та стилістичні засоби барокової прози.
- Використовувати аналіз історичного тексту як доказ безперервності української літературної традиції.
