content_outline:
- points:
  - 'Провокація: «І породила сина свого первенця, і вповила його, і поклала його в яслах» — наскільки ця фраза з руського
    Євангелія відрізняється від сучасної? Що змінилося, а що залишилося?'
  - 'Термін: що означає «вертеп»? Це лише ляльковий театр чи щось більше?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це церковнослов''янська, руська чи «проста мова»? Аналіз мовних маркерів у тексті про Різдво та їхня роль у
    визначенні реєстру.'
  - 'Дебат 2: Канонічний текст vs народна адаптація. Як Євангеліє від Луки стало основою для народного вертепу, і що «додав»
    чи «спростив» фольклор?'
  - '[!epistemic-humility] Межа між «високою» церковнослов''янською та «простою» руською мовою в XVI-XVII ст. була нечіткою.
    Автори часто змішували реєстри для досягнення різних стилістичних ефектів.'
  - '[!decolonization] Існування перекладів Святого Письма руською мовою, як-от Пересопницьке Євангеліє, доводить безперервність
    української писемної традиції та спростовує імперський міф про «неписемність» народу до XIX ст.'
  section: 'Конфліктна карта: Мова Бога і мова народу'
  words: 700
- points:
  - 'Оригінальний текст: Фрагменти з 2-го розділу Євангелія від Луки (за виданням XVI-XVII ст., напр. Пересопницьке Євангеліє).'
  - 'Глоси та коментарі: Розбір архаїчних слів (ясла, віл, пастирі) та граматичних конструкцій.'
  - 'Граматичні нотатки: Форми аориста та імперфекта у дієсловах, двоїна, форми кличного відмінка, що відрізняються від сучасних.'
  - '[!decolonization] Цей текст є частиною української духовної спадщини, що розвивалася паралельно, а не підпорядковано,
    до московської традиції.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Церковнослов''янізми: «Благодать», «Спас», «воплочення» — аналіз лексики високого стилю та її функція у сакральному тексті.'
  - 'Полонізми та латинізми: Чи є в тексті сліди впливу польської адміністративної чи латинської теологічної лексики? Наприклад,
    терміни, пов''язані з переписом населення.'
  - 'Грецизми: «ангел», «Євангеліє», «Христос» — як слова грецького походження були адаптовані у давній українській мові.'
  - '[!myth-buster] Запозичення не є «засміченням» мови. Аналіз показує, як руські книжники свідомо використовували різні
    мовні шари для створення багатого, багатостильового тексту.'
  section: 'Мовний контакт: Слов''янізми, Полонізми та Грецизми'
  words: 1200
- points:
  - 'Порівняльний аналіз: Ключова фраза з Євангелія церковнослов''янською, руською (простою мовою) та сучасною українською
    мовами. Простежити зміни.'
  - 'Граматична лабораторія: Аналіз форм минулого часу в тексті. Як аорист та імперфект поступилися місцем сучасній системі
    минулого часу?'
  - 'Етимологічний слід: Простежити шлях слова «Різдво» від праслов''янських коренів до його сучасного значення та форми.'
  section: 'Мовна лабораторія: Еволюція мови'
  words: 1000
- points:
  - 'Повернення до розминки: Як тепер ви можете відповісти на питання про відмінності між руським та сучасним перекладом?
    Які історичні сили спричинили ці зміни?'
  - 'Головний висновок: Як цей текст доводить існування розвиненої української літературної мови задовго до Котляревського?
    Сформулюйте 3-4 ключові аргументи.'
  - 'Зв''язок уперед: Як мова релігійних текстів XVI-XVII ст. вплинула на формування сучасної української літературної мови?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз руського перекладу Євангелія від Луки (Різдво), мовний контакт, відмінності між церковнослов'янською та простою
  мовою.
