objectives:
- Аналізувати відмінності між церковнослов'янським, руським та сучасним українським перекладами біблійного тексту
- Ідентифікувати та пояснювати функцію церковнослов'янізмів, полонізмів та грецизмів у тексті XVI-XVII ст.
- Розрізняти мовні реєстри («високий» книжний та «проста мова») в історичному контексті
- Формулювати аргументи на доказ безперервності української писемної традиції до XIX століття
