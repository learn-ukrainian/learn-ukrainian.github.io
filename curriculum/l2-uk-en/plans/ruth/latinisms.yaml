activity_hints:
- description: Перевірка розуміння дебатів про латинізми. Чия це теза — прихильників «чистоти мови» чи «європейської інтеграції»?
    Розподілити аргументи.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити в речення з історичних документів пропущені терміни: акт, протокол, інстигатор, декрет, мандат.'
  focus: Юридична термінологія
  items: 5
  type: fill-in
- description: 'Подано три варіанти юридичної формули: латинський оригінал, руська адаптація, сучасний український відповідник.
    Опишіть граматичні та лексичні зміни на кожному етапі.'
  focus: 'Порівняльний аналіз: від Риму до Києва'
  type: note
- description: На основі аналізу тексту з модуля напишіть коротке есе (400-600 слів) на тему «Як юридичні тексти XVI-XVII
    століть спростовують міф про відсутність розвиненої української мови до XIX століття?»
  focus: 'Есе: Доказ існування'
  type: note
cefr_min: C2
connects_to:
- legal-profession
- history-of-ukrainian-law
content_outline:
- points:
  - 'Провокація: Слово «акт» — чи завжди воно означало документ? Порівняння руського юридичного терміна з його сучасним значенням.'
  - 'Загадка: «Инстигаторъ отъ имене нашого писалъ до него листъ». Хто такий інстигатор і що він робив при дворі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Престиж чи відчуження? Використання латинських термінів як маркер освіченості канцеляристів та водночас мовний
    бар''єр для простого люду.'
  - 'Дебат 2: Прямий шлях чи польське посередництво? Дискусія про те, чи руська правнича мова запозичувала латинізми напряму,
    чи через польську мову, яка сама була під сильним латинським впливом.'
  - '[!epistemic-humility] Межі між прямим запозиченням, полонізмом та спільним європейським юридичним спадком у цей період
    є вкрай розмитими.'
  - '[!decolonization] Використання латинської, а не церковнослов''янської чи польської, термінології як спосіб утвердження
    власної, окремої від Москви та Варшави, європейської ідентичності.'
  section: 'Конфліктна карта: Латинізми — збагачення чи загроза?'
  words: 700
- points:
  - 'Первинне джерело: Фрагмент протоколу суду з актової книги XVI століття, що описує позов (скаргу), поданий інстигатором.'
  - Оригінальний текст з нормалізованою орфографією та паралельним сучасним українським перекладом для найскладніших фрагментів.
  - 'Глоси: розбір архаїчних форм та синтаксичних конструкцій (напр. давальний самостійний, форми аориста/імперфекта).'
  - 'Контекст: Як працював суд у Великому князівстві Литовському? Роль інстигатора як державного обвинувача.'
  - '[!decolonization] Цей текст — доказ існування розвиненої української юридичної мови за століття до наративу про її «створення»
    в XIX ст.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз латинізмів у тексті: «акт», «протокол», «декрет», «мандат», «термін». Їхня формальна адаптація до руської граматики.'
  - 'Порівняння з полонізмами: Як відрізнити латинізм від полонізму, якщо польська мова сама сповнена латинізмів? Фонетичні
    та морфологічні маркери.'
  - 'Конкуренція з церковнослов''янізмами: В яких сферах переважала церковнослов''янська лексика («закон», «право»), а в яких
    — латинська («юрисдикція», «процес»)?'
  - '[!myth-buster] Запозичення — не «засмічення», а ознака інтеграції в європейський культурний та правовий простір. Мова,
    що не запозичує, — мертва мова.'
  section: 'Мовний контакт: Анатомія латинізму'
  words: 1200
- points:
  - 'Етимологічний слід: Простежуємо шлях слова «протокол» (від грец. protokollon -> лат. protocollum -> пол. protokół ->
    укр. протокол).'
  - 'Граматична лабораторія: Як іменники латинського походження (II і III відміни) адаптувалися до системи відмінків руської
    мови?'
  - 'Порівняльна лабораторія: Поняття «документ» у трьох регістрах: церковнослов''янською («грамота»), руською («лист», «акт»),
    сучасною українською («документ»).'
  - 'Стилістична лабораторія: Аналіз синтаксису юридичного тексту — вплив латинських риторичних конструкцій (довгі речення,
    підрядні звороти).'
  section: 'Мовна лабораторія: Етимологічний маршрут — від Риму до Києва'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, хто такий інстигатор і як його посада відображає структуру тогочасного суспільства?'
  - 'Лінгвістичний підсумок: Що масове запозичення латинізмів говорить про стан та напрямок розвитку української мови в XVI-XVII
    ст.?'
  - 'Зв''язок із сьогоденням: Проблема засилля англіцизмів у сучасній українській мові. Чи можна провести паралелі з добою
    латинізації? Які уроки можна винести?'
  section: Дискусія та підсумок
  words: 600
focus: Латинська юридична термінологія в актових книгах XVI-XVII ст. (акт, протокол, інстигатор), її адаптація та вплив на
  формування української правничої мови.
