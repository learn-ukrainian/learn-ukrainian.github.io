objectives:
- Аналізувати роль та шляхи проникнення латинізмів у юридичну мову Русі XVI-XVII ст.
- Розрізняти латинізми, полонізми та церковнослов'янізми в історичних юридичних текстах
- Простежувати етимологічний шлях юридичних термінів від латинського оригіналу до сучасного українського вжитку
- Формулювати аргументовану позицію в дискусії про мовні запозичення як інструмент розвитку та/чи загрози для мови
