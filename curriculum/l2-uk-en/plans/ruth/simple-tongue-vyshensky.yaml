activity_hints:
- description: Перевірка розуміння соціолінгвістичних дебатів навколо «простої мови» Вишенського. Чий це аргумент?
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Класифікуйте слова з тексту як церковнослов’янізм, полонізм або питоме українське слово.
  focus: Аналіз мовних шарів
  items: 6
  type: fill-in
- description: 'Візьміть речення з тексту Вишенського. Перепишіть його двічі: 1) максимально наближено до церковнослов’янської,
    2) сучасною українською мовою. Поясніть, що змінилося.'
  focus: Порівняльний аналіз регістрів
  type: note
- description: 'Напишіть коротке есе (400-600 слів) на тему: «Як тексти Івана Вишенського доводять існування розвиненої української
    мови за два століття до Котляревського?»'
  focus: 'Есе: Аргумент на користь мови'
  type: note
cefr_min: C2
connects_to:
- epistle-to-ostrozky
- union-of-brest
content_outline:
- points:
  - 'Провокація: Фрагмент із послання Вишенського: "Але бачу з вас, панове, же ся вам в головах повертає і же хочете быти
    мудрійші над Духа Святого".'
  - 'Запитання: Чому монах-аскет з Афону пише так розмовно і зухвало? Проти кого спрямована ця «проста» мова?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була «проста мова» Вишенського цілісною системою, чи лише його особистим ідіолектом — сумішшю церковнослов’янської,
    діалектної та польської лексики?'
  - 'Дебат 2: Це був свідомий пастирський хід (зробити слово Боже доступним), чи політичний маніфест (проти унії, латинізації
    та польської культурної експансії)?'
  - '[!epistemic-humility] Межі «простої мови» нечіткі. Це радше регістр, ніж кодифікована мова. Вишенський сам є її творцем.'
  - '[!decolonization] Вибір Вишенським «простої мови» — це акт культурного супротиву, що стверджує гідність місцевої мови
    для найвищих теологічних дебатів.'
  section: 'Конфліктна карта: Свята мова vs проста мова'
  words: 700
- points:
  - 'Текст: Фрагмент із «Послання до єпископів-утікачів», де Вишенський викриває їхнє відступництво.'
  - Оригінальний текст (нормалізована орфографія) з паралельним сучасним українським перекладом.
  - 'Глоси: розбір архаїчних форм (двоїна, аорист) та церковнослов’янізмів, що створюють високий стиль.'
  - 'Контекст: Це не просто текст, а зброя в гострій релігійній війні після Берестейської унії 1596 року.'
  - '[!decolonization] Цей текст доводить, що українська мова мала потужний полемічний потенціал за два століття до Котляревського.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Аналіз мовних шарів у тексті: церковнослов’янська основа, народнорозмовна стихія та полонізми.'
  - 'Церковнослов’янізми: Використовуються для теологічних понять (благодать, єресь) та для надання тексту авторитетності.'
  - 'Полонізми: Вишенський критикує «ляхський» вплив, але його мова містить полонізми (пан, річ, уряд). Це несвідоме запозичення
    чи мова епохи?'
  - '[!myth-buster] Мовна «чистота» — це міф. Вишенський демонструє, як жива мова вбирає та адаптує елементи з різних джерел
    для власних потреб.'
  section: 'Мовний контакт: Коктейль Вишенського'
  words: 1200
- points:
  - 'Граматична лабораторія: аналіз залишків старих граматичних форм (аорист, імперфект, двоїна) у тексті Вишенського. Як
    вони функціонують?'
  - 'Стилістична лабораторія: "кольорове" читання. Розмітити уривок тексту, виділяючи різними кольорами церковнослов’янізми,
    полонізми та питому українську лексику.'
  - 'Порівняльна лабораторія: Взяти одне речення Вишенського і спробувати «переписати» його: 1) виключно церковнослов’янською,
    2) сучасною літературною українською. Що змінюється у змісті та стилі?'
  section: 'Мовна лабораторія: Стилістичний аналіз регістрів'
  words: 1000
- points:
  - 'Повернення до розминки: Чому Вишенський обрав таку мову? Студенти формулюють відповідь, використовуючи поняття «полеміка»,
    «регістр», «мовний контакт».'
  - 'Лінгвістичний підсумок: Творчість Вишенського — це доказ того, що українська мова наприкінці XVI ст. була гнучким інструментом,
    здатним до вираження складних ідей.'
  - 'Зв’язок уперед: Боротьба за мову та її «чистоту», яку веде Вишенський, триватиме в українській культурі століттями, аж
    до сьогоднішнього дня.'
  section: Дискусія та підсумок
  words: 600
focus: Ivan Vyshensky's radical choice to write in the vernacular (prosta mova), mixing it with Church Slavonic, and the sociolinguistic
  statement this represents in his polemics from Mount Athos.
level: RUTH
module: ruth-064
objectives:
- Аналізувати причини та наслідки вибору Іваном Вишенським «простої мови» для своїх полемічних творів
- Розрізняти церковнослов’янізми, полонізми та питомі українські елементи в тексті
- Формулювати аргументовану позицію в дискусії про статус «простої мови» як літературного стандарту
- Використовувати аналіз текстів Вишенського як доказ існування розвиненої української літературної мови до Котляревського
