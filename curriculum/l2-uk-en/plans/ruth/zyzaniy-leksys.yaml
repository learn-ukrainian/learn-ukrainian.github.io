  description: "Lavrentiy Zyzaniy and the Vilnius brotherhood school. Context: why Ukrainians needed to TRANSLATE Church Slavonic — it was no longer understood."
- section: Основний матеріал
  description: "Structure of the Lexis: 1061 entries. Analysis of translation strategies. What the vernacular equivalents reveal about spoken Ukrainian in 1596. Sample entries with modern parallels."
- section: Практика
  description: "Comparative reading: Zyzaniy's Ukrainian vs modern Ukrainian. Semantic shifts over 400 years. Identifying still-living vocabulary."
- section: Підсумок
  description: "The Lexis as evidence of Ukrainian as a distinct language. Connection to Berynda's later expansion."
