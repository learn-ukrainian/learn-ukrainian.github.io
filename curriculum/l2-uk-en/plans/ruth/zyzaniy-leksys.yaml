objectives:
- Аналізувати «Лексис» Зизанія як ключове джерело для вивчення історії української мови
- Розрізняти лексичні шари в «простій мові» XVI століття: полонізми, церковнослов'янізми, народну лексику
- Пояснювати соціолінгвістичний контекст появи першого друкованого українського словника
- Формулювати аргументи на основі тексту «Лексиса» для спростування імперських наративів про історію української мови
