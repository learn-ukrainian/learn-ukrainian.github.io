content_outline:
- points:
  - 'Провокація: Чому в 1596 році українцям знадобився словник, щоб читати церковні книги? Розглянемо один запис: «Злато —
    золото». Що ця проста заміна говорить про мовну ситуацію?'
  - 'Загадка: Зизаній перекладає слово «воня» як «пахощі». Чому? Який семантичний зсув відбувся за 400 років?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була «проста мова» Зизанія повноцінною літературною мовою, чи лише «нечистою» сумішшю церковнослов''янської
    та народної говірки? Позиції Мелетія Смотрицького (проти) та самого Зизанія (за).'
  - 'Дебат 2: «Лексис» — це акт національного спротиву полонізації чи суто практичний посібник для братських шкіл? [!decolonization]
    Як створення словника власної мови стає політичним актом в умовах бездержавності.'
  - '[!epistemic-humility] Ми не знаємо точно, як звучала розмовна мова того часу. «Лексис» — це наш найкращий, але все ж
    опосередкований, погляд на лексикон XVI століття.'
  section: 'Конфліктна карта: ''Проста мова'' — народна чи ''простацька''?'
  words: 700
- points:
  - 'Оригінальний текст: Аналіз структури «Лексиса» — 1061 словникова стаття. Приклади статей з розбором: церковнослов''янське
    слово, його «простомовний» відповідник.'
  - 'Глоси та коментарі: Розгляд 10-15 ключових статей, що показують розбіжність між двома мовами (напр. «брак»-весілля, «живот»-життя,
    «алчный»-жадібний).'
  - 'Граматичні нотатки: Які граматичні форми, що трапляються в «простій мові» Зизанія, вже відійшли від сучасної української
    норми?'
  - '[!decolonization] «Лексис» — це неспростовний доказ того, що українська мова існувала як окрема система задовго до Котляревського,
    з власним багатим словниковим запасом.'
  section: 'Текст: Читання та переклад'
  words: 1300
- points:
  - 'Полонізми: Які польські слова Зизаній вважав частиною «простої мови» (напр. «пенкный»-гарний, «склеп»-крамниця)? Чому
    вони увійшли в ужиток?'
  - 'Церковнослов''янізми: Навіть у «простомовних» відповідниках Зизаній іноді використовує книжні форми. Чому? Це свідомий
    вибір для підвищення престижу мови чи несвідоме змішування реєстрів?'
  - 'Власне українська лексика: Виділення шару слів, які є ядром української мови і фіксуються вже тоді (напр. «гай», «криниця»,
    «мрія»).'
  - '[!myth-buster] Запозичення — не «засмічення», а нормальний процес збагачення мови. Аналіз того, які запозичення Зизанія
    залишились у мові, а які зникли, і чому.'
  section: 'Мовний контакт: Анатомія ''простої мови'''
  words: 1200
- points:
  - 'Comparative lab: Порівняння тріад: те саме поняття церковнослов''янською (з лівої колонки «Лексиса»), «простою мовою»
    XVI ст. (з правої колонки) та сучасною українською. Простежити еволюцію.'
  - 'Etymology trace: Дослідження подорожі 2-3 слів з «Лексиса» до сьогодні. Які з них змінили значення, а які — зникли?'
  - 'Stylistic lab: Спробувати «перекласти» сучасний короткий текст (2-3 речення) «простою мовою» Зизанія, використовуючи
    лексику та форми з його словника.'
  section: 'Мовна лабораторія: Семантичний зсув за 400 років'
  words: 1000
- points:
  - 'Повернення до розминки: Отже, чому «воня» означала «пахощі»? Студент формулює відповідь, використовуючи поняття семантичного
    поля та історичних змін.'
  - 'Лінгвістичний висновок: «Лексис» Зизанія — це не просто словник, а «декларація про мовну незалежність» від церковнослов''янської.
    Він кодифікував розмовну мову, надавши їй статусу.'
  - 'Зв''язок уперед: Як праця Зизанія підготувала ґрунт для значно більшого «Лексикону славенороського» Памви Беринди (1627)?'
  section: Дискусія та підсумок
  words: 600
focus: 'The first printed Ukrainian-Church Slavonic dictionary: translation as an act of linguistic self-awareness and the
  codification of ''проста мова''.'
