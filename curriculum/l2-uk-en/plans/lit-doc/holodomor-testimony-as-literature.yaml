content_outline:
- points:
  - 'Провокація: Чи може щоденник дитини, що помирає від голоду, вважатися літературою? Де проходить межа між документом і
    мистецтвом?'
  - 'Фрагмент з "Жовтого князя" без згадки автора чи назви: "Люди перетворилися на сіру, голодну масу, що рухалася в одному
    напрямку — до цвинтаря". Чия це перспектива? Що відчуває автор?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Естетизація vs. Автентичність. Чи не зраджує літературне опрацювання (метафори, сюжет) сиру правду свідчення?
    Позиція: "мистецтво ушляхетнює страждання" проти "мистецтво експлуатує трагедію".'
  - 'Дебат 2: Канонізація травми. Чи повинні свідчення про Голодомор бути частиною літературного канону, чи це окрема категорія
    історичних джерел? Хто це вирішує?'
  - '[!epistemic-humility] Немає "правильної" відповіді. Критики-формалісти аналізують текст, історики — достовірність. Обидва
    підходи валідні, але неповні.'
  section: 'Конфліктна карта: Естетика чи правда?'
  words: 900
- points:
  - 'Аналіз структури: алегоричний роман. Хто такий "Жовтий князь"? Як біблійні алюзії (Апокаліпсис) поглиблюють розуміння
    трагедії?'
  - 'Наративна техніка: потік свідомості, зміна фокусу між членами родини. Як це створює ефект всеохопного жаху?'
  - 'Стилістика та мова: експресіонізм, натуралізм, символізм. Роль неологізмів та діалектизмів у відтворенні реальності.'
  - '[!decolonization] "Жовтий князь" як відповідь на радянське замовчування. Барка повертає українцям суб''єктність та право
    на власну пам''ять, вириваючи Голодомор з імперського наративу "спільної трагедії".'
  section: 'Читання: "Жовтий князь" Василя Барки'
  words: 1700
- points:
  - 'Свідоцтво vs. Фікція: Що може зробити щоденник очевидця, чого не може роман? І навпаки? Аналіз уривків з реальних щоденників.'
  - 'Архівна робота: Як автор використовує документи, листи, усні історії? Порівняння "Жовтого князя" з працями, що базуються
    на архівах (напр., Енн Епплбом).'
  - 'Пам''ять і травма: розрив між пережитим досвідом і можливістю його розказати. "Нерозказуваність" як центральна проблема
    літератури про геноцид.'
  - '[!epistemic-humility] [!anti-hagiography] Свідок — не святий і не безгрішний репортер. Його пам''ять вибіркова, його
    розповідь — це конструкція. Аналізувати свідчення — означає розуміти ці обмеження, а не шукати "об''єктивну правду".'
  section: 'Свідчення як жанр: Етика та естетика травми'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, щоденник голодуючої дитини — це література? Сформулюйте свою позицію, спираючись на матеріал
    модуля.'
  - 'Історія рецепції: Як сприймали "Жовтий князь" у діаспорі та в незалежній Україні? Чому роман був заборонений в СРСР?'
  - 'Сучасна релевантність: Як свідчення про Голодомор допомагають зрозуміти сучасну війну Росії проти України? Чи можна говорити
    про геноцидальну тяглість?'
  - '[!anti-hagiography] Уникнення сакралізації жертви. Як говорити про Голодомор, не перетворюючи людей на безлику масу мучеників,
    а показуючи їхню складність і людяність?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз свідчень про Голодомор як літературної форми, етика та естетика травми, наратив свідка, "Жовтий князь" Василя
  Барки
level: LIT-DOC
module: lit-doc-11
objectives:
- Критично аналізувати свідчення про Голодомор як складний літературний та культурний феномен
- Розрізняти поняття "свідчення", "документ" та "художній твір", розуміючи їх взаємозв'язок та відмінності
- Застосовувати деколонізаційну оптику для аналізу літературних творів про Голодомор, виявляючи імперські наративи та протиставляючи
  їм українську суб'єктність
- Формулювати власну аргументовану позицію щодо етичних та естетичних проблем, пов'язаних із зображенням геноциду в літературі
pedagogy: CBI
