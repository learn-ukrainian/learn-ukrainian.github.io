- definition: повідомлення очевидця про що-небудь; доказ, підтвердження чогось
  pos: с.
  word: свідчення
- definition: оповідь, розповідь про певні пов’язані між собою події, представлена читачеві або слухачеві в певній послідовності
  pos: ч.
  word: наратив
- definition: здатність бути активним, незалежним діячем, що має власну волю та позицію, а не бути пасивним об'єктом впливу
  pos: ж.
  word: суб'єктність
- definition: наука, що вивчає історію історичної науки; сукупність історичних праць, присвячених певній темі або епосі
  pos: ж.
  word: історіографія
- definition: процес позбавлення від політичного, економічного та культурного панування імперії; перегляд імперських наративів
  pos: ж.
  word: деколонізація
- definition: надання чому-небудь (часто трагічному чи потворному) естетичної, художньої форми
  pos: ж.
  word: естетизація
- definition: сукупність творів, визнаних взірцевими в певній культурі або в певний період
  pos: ч.
  word: канон
- definition: у психології та культурології — глибоке переживання, що завдає тривалої шкоди психіці та впливає на пам'ять
    і самосприйняття
  pos: ж.
  word: травма
