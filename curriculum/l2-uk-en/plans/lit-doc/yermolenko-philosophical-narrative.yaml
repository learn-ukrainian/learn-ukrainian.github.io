content_outline:
- points:
  - 'Провокація: Чи може філософія бути зброєю? Як есеїстика стає формою інтелектуального опору?'
  - 'Цитата-загадка: Короткий уривок з есе Єрмоленка про природу зла, поданий без автора та контексту.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Філософ — об''єктивний спостерігач чи активний учасник історії? Позиція Єрмоленка vs класична відстороненість.'
  - 'Дебат 2: Роль українського публічного інтелектуала. Творення нових національних наративів vs деконструкція всіх ідеологій,
    включно з "нашими".'
  - '[!epistemic-humility] Аналіз позицій без "правильної" відповіді: чи є "деконструкція в час війни" зрадою чи найвищою
    формою патріотизму?'
  section: 'Конфліктна карта: Інтелектуал між вежею та окопом'
  words: 900
- points:
  - 'Текстуальний аналіз центральної концепції Єрмоленка: "плинні ідеології" та їх застосування до аналізу російського імперіалізму
    та західних демократій.'
  - 'Стилістика та мова: як Єрмоленко поєднує філософську глибину з ясністю викладу, роблячи складні ідеї доступними.'
  - 'Робота з уривком: детальний розбір есе, де аналізується "дегуманізація як проект" у російській культурі.'
  - '[!decolonization] Єрмоленко як приклад деколонізації української думки — вихід з тіні "великої російської літератури"
    та побудова власного інтелектуального простору.'
  section: 'Читання: "Плинні ідеології" як ключ до розуміння сучасності'
  words: 1700
- points:
  - 'Етика свідчення: як Єрмоленко використовує та інтерпретує свідчення інших (солдатів, біженців, волонтерів) у своїх текстах.'
  - 'Інтелектуальна автобіографія: аналіз того, як досвід Майдану (2014) та повномасштабного вторгнення (2022) трансформував
    його філософію.'
  - 'Межі свідчення: чи може філософський аналіз "зрадити" автентичність особистого досвіду? Дискусія про естетику та етику
    травми.'
  - '[!anti-hagiography] Єрмоленко не як пророк, а як мислитель в процесі: аналіз зміни його поглядів, визнання помилок та
    інтелектуальна еволюція.'
  section: 'Свідчення як жанр: Філософ як свідок'
  words: 1200
- points:
  - 'Повернення до розминки: озброївшись знаннями з модуля, студенти дають власну відповідь на питання "чи може філософія
    бути зброєю?".'
  - 'Рецепція та вплив: як ідеї Єрмоленка сприймаються в Україні та на Заході? Його роль як одного з "голосів" України у світі.'
  - 'Сучасне значення: що філософська есеїстика дає нам для розуміння не лише війни, але й майбутньої відбудови України?'
  - 'Рефлексія: яке з понять, проаналізованих у модулі, найбільше змінило ваш погляд на сучасні події?'
  section: Дискусія та підсумок
  words: 700
focus: Philosophical essay as a genre, Fluid Ideologies, Testimony and the intellectual's role, decolonizing Ukrainian thought
level: LIT-DOC
module: lit-doc-010
objectives:
- Аналізувати жанрові особливості філософської есеїстики на прикладі творчості Володимира Єрмоленка
- Критично оцінювати концепт "плинних ідеологій" та застосовувати його для аналізу сучасних подій
- Розрізняти етичні та естетичні виміри жанру свідчення в літературі non-fiction
- Формулювати власну позицію в рамках літературно-критичних дебатів про роль інтелектуала в суспільстві
