content_outline:
- points:
  - 'Провокація: Що відбувається з людиною, коли зникає межа між катом і жертвою? Уривок зі «Світлого Шляху» без коментарів.'
  - 'Запитання до роздумів: чи може текст, написаний у полоні, бути об''єктивним свідченням?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Світлий Шлях» — це документ чи літературний твір? Етичні межі естетизації травми та катування.'
  - 'Дебат 2: Чи може досвід одного свідка представляти колективну травму? Проблема репрезентативності в літературі свідчень.'
  - '[!epistemic-humility] Не існує «правильного» способу читати свідчення, але є відповідальний. Аналізуємо позиції критиків.'
  section: 'Конфліктна карта: Свідок vs. Літератор'
  words: 900
- points:
  - 'Уривок: Детальний опис буденності концтабору «Ізоляція». Аналіз «мови насильства» та її впливу на свідомість.'
  - 'Наративна стратегія: чому Асєєв обирає відсторонений, квазі-аналітичний тон для опису жахів? Стилістичний аналіз.'
  - 'Характерна система: в''язні, кати, колаборанти. Як текст показує розмивання цих ролей?'
  - '[!decolonization] Розвінчання російського міфу про «громадянську війну» через показ реальності окупації, контрольованої
    спецслужбами РФ.'
  section: 'Читання: "Світлий Шлях" — Анатомія пекла'
  words: 1800
- points:
  - 'Свідчення vs. фікція: що може зробити текст Асєєва, чого не може зробити вигаданий роман про війну?'
  - 'Пам''ять і травма: як автор реконструює події? Аналіз психологічної трансформації оповідача, межі пам''яті.'
  - 'Документальна основа: використання реальних протоколів допитів, описів камер, прізвиськ.'
  - '[!epistemic-humility] [!anti-hagiography] Свідок — не святий. Асєєв чесно описує власні моральні компроміси та психологічні
    злами. Це посилює чи послаблює довіру до тексту?'
  section: 'Свідчення як жанр: Етика свідка'
  words: 1200
- points:
  - 'Повернення до розминки: як текст відповів на питання про межу між катом і жертвою?'
  - 'Рецепція: як книгу сприйняли в Україні та за кордоном? Чому її переклад став важливою подією?'
  - 'Сучасне значення: «Світлий Шлях» як доказ у міжнародних судах. Роль тексту після повномасштабного вторгнення.'
  - 'Пропозиція для рефлексії: що у вашому сприйнятті війни на Донбасі змінилося після прочитання цього аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману-свідчення Станіслава Асєєва «Світлий Шлях», етика свідка та документальна література як інструмент деколонізації
level: LIT-DOC
module: lit-doc-019
objectives:
- Аналізувати твір «Світлий Шлях» як літературне свідчення, розрізняючи фактичний, психологічний та символічний рівні.
- Застосовувати поняття «етика свідка» для критичної оцінки тексту, зважуючи на проблему репрезентативності та естетизації
  травми.
- Визначати та спростовувати російські колоніальні наративи про війну на Донбасі, використовуючи текст Асєєва як контр-аргумент.
- Формулювати власну позицію в дебатах про співвідношення документалістики та художньої літератури в контексті екстремального
  досвіду.
