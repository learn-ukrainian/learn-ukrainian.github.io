content_outline:
- points:
  - 'Провокація: "Володю, не забувай про наш сад". Остання фраза, яку Вакуленко почув від батька. Що може означати "сад" для
    письменника, який за мить закопає свій щоденник під вишнею, щоб врятувати його від окупантів?'
  - 'Загадка: Чому найважливіші тексти української історії ХХ-ХХІ століть — це часто не романи, а щоденники?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є щоденник Вакуленка літературою, чи це суто історичний документ? Аргументи "за" (стиль, метафори, саморефлексія
    письменника) vs аргументи "проти" (приватний характер, відсутність фікційної рамки).'
  - 'Дебат 2: Етика читання. Чи маємо ми право аналізувати цей текст як літературу, знаючи про трагічну долю автора? Де межа
    між аналізом та експлуатацією трагедії?'
  - '[!epistemic-humility] Немає "правильної" відповіді. Мета — зрозуміти, що щоденник існує на межі жанрів, і наш спосіб
    читання визначає його статус.'
  section: 'Конфліктна карта: Документ vs Література'
  words: 900
- points:
  - 'Уривки з щоденника: аналіз ключових записів — опис окупантів, рефлексії про мову, звернення до сина, передчуття смерті.'
  - 'Стилістика та мова: Як Вакуленко-поет проявляється в прозі щоденника? Аналіз метафор, лаконічність, "телеграфний" стиль
    як відповідь на екстремальні умови.'
  - '[!decolonization] Акт письма українською в окупації як форма спротиву. Щоденник — це не просто фіксація подій, а утвердження
    української суб''єктності перед лицем загрози тотального знищення.'
  - 'Наративна структура щоденника: від спостереження до саморефлексії, від надії до прийняття долі.'
  section: 'Читання: "Я сьогодні знову вчуся ходити"'
  words: 1800
- points:
  - 'Щоденник як артефакт: історія поховання та віднайдення тексту. Як матеріальність носія (зошит, закопаний в саду) впливає
    на наше сприйняття?'
  - 'Письменник як свідок: Вакуленко не просто фіксує, а й осмислює свою роль. Його мета — "все задокументувати", стати очима
    й пам''яттю для майбутнього.'
  - 'Травма і нарація: Як мова намагається (і не може) передати досвід окупації та загрози смерті? Розриви, мовчання, недомовленість
    у тексті.'
  - '[!anti-hagiography] Вакуленко не "святий мученик", а жива людина зі страхами, сумнівами, люттю. Аналіз "темних" емоцій
    у щоденнику, що робить його свідчення більш людяним і переконливим.'
  section: 'Свідчення як жанр: Голос з-під землі'
  words: 1200
- points:
  - 'Повернення до розминки: То що ж таке "сад" Вакуленка? Студент формулює власну інтерпретацію: реальний сад, Україна, культура,
    пам''ять?'
  - 'Рецепція та спадщина: Як публікація щоденника вплинула на пам''ять про війну та про самого автора? Роль тексту в міжнародних
    судах.'
  - 'Сучасний контекст: Порівняння щоденника Вакуленка з іншими свідченнями про російську окупацію (напр., щоденники з Маріуполя).
    Що спільного, що унікального?'
  section: Дискусія та підсумок
  words: 700
focus: The occupation diary of Volodymyr Vakulenko as literary testimony, the ethics of witness, the poetics of a writer facing
  death, and the role of the written word in preserving memory and resisting erasure.
level: LIT-DOC
module: lit-doc-017
objectives:
- Аналізувати "Щоденник окупації" Володимира Вакуленка на перетині літератури та історичного документа.
- Застосовувати поняття "свідчення", "травма", "суб''єктність" для інтерпретації тексту, написаного в екстремальних умовах.
- Критично оцінювати етичні виклики, пов''язані з читанням та аналізом посмертно опублікованих текстів-свідчень.
- Формулювати власну аргументовану позицію щодо ролі письменника та літератури під час війни.
