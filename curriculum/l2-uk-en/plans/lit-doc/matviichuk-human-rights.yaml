content_outline:
- points:
  - 'Провокація: Чи може одне речення в документі врятувати життя? Чи може слово стати доказом у Гаазі?'
  - 'Фрагмент з Нобелівської промови О. Матвійчук: «Ми повинні утвердити для людини право, як це колись зробив Томас Гоббс
    для держави».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Документалістика vs. література. Чи є тексти Матвійчук та її центру літературою, чи це сухий юридичний документ?
    Де проходить межа?'
  - 'Дебат 2: Етика свідчення. Чи не перетворює збір свідчень людську трагедію на «матеріал»? Дискусія про ризики естетизації
    болю та "вторинної травматизації".'
  - '[!epistemic-humility] Немає єдиної відповіді. Юристи, літературознавці та психологи пропонують різні, часто суперечливі,
    критерії оцінки.'
  section: 'Конфліктна карта: Слово як зброя чи свідчення?'
  words: 900
- points:
  - 'Аналіз ключових метафор: «правосуддя, що відстає», «імена замість цифр», «війна як чорна діра». Як вони працюють?'
  - 'Структура промови: від особистої історії до глобального заклику. Наративна стратегія.'
  - '[!decolonization] Промова Матвійчук — це свідоме повернення суб’єктності українському опору, виклик колоніальній оптиці,
    що бачить Україну лише як об’єкт агресії, а не як активного творця міжнародного права.'
  - 'Порівняльний аналіз: промова Матвійчук та інші Нобелівські промови (наприклад, Бродського, Алексієвич).'
  section: 'Читання: Промова на врученні Нобелівської премії миру'
  words: 1700
- points:
  - 'Методологія Центру громадянських свобод: як зібрані свідчення перетворюються на доказову базу для Міжнародного кримінального
    суду.'
  - 'Проблема мови: як передати досвід тортур, полону, втрати? Мовчання як частина свідчення.'
  - '[!epistemic-humility] Свідчення — це не дзеркало реальності, а її інтерпретація, забарвлена пам''яттю, болем та надією.
    Воно є доказом, але не абсолютною істиною.'
  - '[!anti-hagiography] Робота правозахисника вимагає холоднокровності та дистанції, що може здаватися нелюдським. Аналіз
    етичних дилем "професійного свідка".'
  section: 'Свідчення як жанр: Естетика та етика документації воєнних злочинів'
  words: 1200
- points:
  - 'Повернення до розминки: тож яку силу має задокументоване слово? Відповідь студента з посиланням на матеріал модуля.'
  - 'Рецепція: як сприйняли діяльність та промову Матвійчук в Україні та світі? Аналіз критики та підтримки.'
  - 'Сучасне значення: роль документалістики у формуванні національної пам''яті про війну, що триває.'
  - '[!anti-hagiography] Нобелівська премія — це визнання, але й тягар. Дискусія про відповідальність, яку вона накладає на
    лауреата та її організацію.'
  section: Дискусія та підсумок
  words: 700
focus: The language of justice, documentary testimony, the work of Oleksandra Matviichuk and the Center for Civil Liberties,
  testimony as a literary genre.
level: LIT-DOC
module: lit-doc-011
objectives:
- Аналізувати тексти на перетині документалістики, юриспруденції та літератури.
- Критично оцінювати етичні дилеми, пов''язані зі збором та публікацією свідчень про травматичний досвід.
- Розрізняти поняття «документ», «свідчення» та «літературний твір» на прикладі праць Олександри Матвійчук.
- Формулювати власну позицію щодо ролі митця та правозахисника в умовах війни.
