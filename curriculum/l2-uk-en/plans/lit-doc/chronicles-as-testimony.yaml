content_outline:
- points:
  - 'Провокація: Чи є козацький літопис XVII століття «документальною прозою» у сучасному розумінні?'
  - 'Визначення-ключ: факт як матеріал, свідок як автор, пам''ять як зобов''язання.'
  - Уривок з Літопису Самовидця про Руїну — без коментаря, тільки текст.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автор як (не)надійний свідок. «Літопис Самовидця» — анонімність як риторична позиція «я бачив все». Протилежна
    теза: суб''єктивність неминуча, і мовчання Самовидця є таким же виразним свідченням, як і його слова.'
  - 'Дебат 2: Літопис як документ vs епос. Барокова риторика Самійла Величка, його «вкладені промови» в уста Хмельницького.
    Це історична реконструкція чи художній вимисел за мотивами Фукідіда?'
  - '[!epistemic-humility] Немає «правильної» відповіді. Завдання — зрозуміти, що кожен літопис є наративною конструкцією,
    а не дзеркалом реальності.'
  section: 'Конфліктна карта: Літописець — об''єктивний реєстратор чи суб''єктивний творець історії?'
  words: 900
- points:
  - '«Літопис Самовидця»: аналіз наративної стратегії. Хронологія як драма. Опис Руїни як перший «репортаж» з поля національної
    трагедії. Мовна стриманість і те, що залишається між рядками.'
  - '«Літопис Самійла Величка»: аналіз барокової риторики. Порівняння з Самовидцем. Як Величко перетворює хроніку на епос
    про «козацьку націю». Аналіз вставних новел та документів.'
  - '[!decolonization] Знищення Запорізької Січі 1775 р. як свідома ліквідація документальної пам''яті імперією. Козацькі
    літописи як єдині збережені голоси зсередини, їхнє значення як «контрархіву» проти імперського стирання історії.'
  section: 'Читання: Літописи Самовидця та Величка'
  words: 1800
- points:
  - 'Еволюція форми: Хроніка → Щоденник → Репортаж → Документальний роман. «Щоденник» Шевченка (1857–1858) як ключовий місток
    між козацькою і модерною традицією свідчення.'
  - 'Сучасні «самовидці»: наративні стратегії в репортажах з Майдану (2014), щоденниках війни Володимира Вакуленка, Станіслава
    Асєєва, Вікторії Амеліної. Що вони успадкували від літописців?'
  - '[!epistemic-humility] Доктрина «нульового дистанціювання»: особиста участь автора як моральний мандат на свідчення, але
    й виклик для об''єктивності. Де межа між свідком та учасником?'
  - '[!anti-hagiography] Свідок не є святим. Аналіз того, як особиста травма, ідеологія та етичний вибір формують наратив,
    навіть коли автор прагне лише «записати правду».'
  section: 'Свідчення як жанр: Від хроніки до сучасного репортажу'
  words: 1200
- points:
  - 'Повернення до розминки: Чи є козацький літопис документальною прозою? Студенти формулюють власну аргументовану відповідь,
    використовуючи матеріал модуля.'
  - 'Рецепція та спадщина: Видання літописів у XIX ст. та їх роль у формуванні модерної української ідентичності. Проблема
    доступу до власної пам''яті: від рукописів до оцифрованих архівів.'
  - 'Сучасна релевантність: від козацького літопису до військових щоденників — безперервність української документальної традиції.
    Свідчення як форма опору та громадянська практика.'
  section: Дискусія та підсумок
  words: 700
focus: Cossack chronicles (Samovydets, Velychko) as the foundation of Ukrainian documentary prose, exploring the genre's evolution
  from eyewitness accounts to modern war testimonies.
level: LIT-DOC
module: lit-doc-001
objectives:
- Аналізувати козацькі літописи як витоки української документальної прози
- Розрізняти наративні стратегії Самовидця (стриманість) і Величка (риторичність)
- Формулювати аргументовану позицію в дебаті «документ vs епос» щодо літописів
- Простежувати еволюцію жанру свідчення від козацьких хронік до сучасних військових щоденників
- Критично оцінювати суб'єктивність автора-свідка та поняття «об'єктивності» в документальному письмі
pedagogy: CBI
persona:
  role: Модератор семінару, який вчить читати документи "проти шерсті" — аналізувати не тільки те, що написано, а й те, чому
    це було написано саме так і що було замовчано.
  voice: Historian-Archivist
phase: LIT-DOC.1
