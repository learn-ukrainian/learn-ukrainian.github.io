content_outline:
- points:
  - 'Провокація: «Щоби написати історію Бабиного Яру, треба збожеволіти...». Цитата з Анатолія Кузнєцова. Що це означає для
    автора-свідка? Чи може мова взагалі передати такий досвід?'
  - 'Запитання без відповіді: Чому деякі свідчення про Голокост написані десятиліттями пізніше? Що змушує мовчати, і що змушує
    говорити?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Свідчення як документ vs. Свідчення як література. Чи має автор право на художній вимисел, якщо це допомагає
    передати емоційну правду? Чи це зрада факту?'
  - 'Дебат 2: Канон і витіснення. Чому радянська влада замовчувала саме єврейську трагедію Бабиного Яру, говорячи про «мирних
    радянських громадян»? Як це вплинуло на свідчення, що з''являлися?'
  - '[!decolonization] Розвінчання радянського міфу про «Велику Вітчизняну війну» та інтернаціоналізм. Аналіз того, як імперія
    стирала ідентичності своїх жертв.'
  - '[!epistemic-humility] Немає єдиної «правди» про Бабин Яр. Є мозаїка свідчень, які часто суперечать одне одному. Наша
    мета — зрозуміти, чому ці суперечності існують.'
  section: 'Конфліктна карта: Пам''ять проти Забуття'
  words: 900
- points:
  - Аналіз уривків з «Бабиного Яру» Анатолія Кузнєцова — робота з документальним матеріалом, монтаж, голос автора-підлітка.
  - Порівняння з іншими свідченнями, наприклад, Діни Пронічевої. Як відрізняється перспектива, мова, фокус?
  - 'Наративна структура травми: фрагментарність, повтори, лакуни мовчання. Як текст відтворює стан свідомості свідка.'
  - '[!decolonization] Повернення суб''єктності. Ці тексти — не просто пасивні записи злочинів, а активні акти спротиву забуттю
    та дегуманізації, що утверджують українську єврейську історію.'
  section: 'Читання: Голоси з Бабиного Яру'
  words: 1700
- points:
  - 'Етика свідка: відповідальність перед мертвими та живими. Чи є «право не говорити»?'
  - 'Естетика травми: використання метафор, уникнення прямого опису найжахливіших сцен, роль деталі.'
  - '[!anti-hagiography] Кузнєцов як складний персонаж: співпраця з КДБ, цензурування власного тексту, втеча. Як біографія
    автора впливає на читання його свідчення?'
  - 'Архівна робота: Як Кузнєцов використовує фотографії, німецькі накази, свідчення інших людей для підсилення ефекту документальності.'
  section: 'Свідчення як жанр: Межі мови та пам''яті'
  words: 1200
- points:
  - 'Повернення до розминки: Чи можна «збожеволіти», пишучи про Бабин Яр, але все ж таки написати? Студент формулює відповідь,
    спираючись на аналіз текстів.'
  - 'Рецепція: Як «Бабин Яр» Кузнєцова читали в СРСР (у цензурованій версії) і на Заході. Чому цей текст досі актуальний?'
  - 'Сучасне значення: Як свідчення про Голокост допомагають нам розуміти сучасні воєнні злочини в Україні? Що спільного в
    етиці свідка тоді і зараз?'
  - '[!anti-hagiography] Уникнення сакралізації жертви. Свідчення показують не лише героїзм, але й страх, колабораціонізм,
    сірі зони — і це робить їх людяними.'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз українських свідчень Голокосту (Бабин Яр) як документальної прози, етика свідка, конфлікт пам'ятей, та стилістика
  травматичного наративу.
level: LIT-DOC
module: lit-doc-10
objectives:
- Аналізувати українські свідчення Голокосту (на прикладі «Бабиного Яру» А. Кузнєцова) у контексті світової документальної
  прози
- Розрізняти поняття «історичний факт», «літературна правда» та «травматичний наратив»
- Критично оцінювати радянську та пострадянську політику пам'яті щодо Голокосту в Україні
- Формулювати власну позицію щодо етичних дилем, пов'язаних зі створенням та читанням свідчень про геноцид
pedagogy: CBI
