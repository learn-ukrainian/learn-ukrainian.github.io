content_outline:
- points:
  - 'Провокація: Чи може книга бути небезпечнішою за зброю? У 2020 році суд заборонив розповсюдження книги Вахтанга Кіпіані
    за позовом Віктора Медведчука. Що в цій книзі змусило політика судитися?'
  - 'Цитата-загадка: "У матеріалах справи є свідчення, що адвокат у розмові з підсудним визнав безперспективність доведення
    його невинуватості". Про кого йдеться і чому ця фраза стала предметом судового позову через 40 років?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Свобода слова vs. захист честі та гідності. Позиція Кіпіані (право на історичне дослідження та цитування документів)
    vs. позиція Медведчука (інформація є недостовірною та ганьбить його). Чому цей дебат є центральним для документалістики?'
  - 'Дебат 2: Історична правда vs. юридична правда. Радянський суд визнав Стуса "особливо небезпечним рецидивістом". Книга
    Кіпіані доводить, що це була політична розправа. Чи може документальна книга "скасувати" вирок суду в очах суспільства?'
  - '[!epistemic-humility] Ми не можемо знати, що *насправді* говорив адвокат Стусу без диктофона. Ми маємо лише архівні протоколи,
    спогади та їхні інтерпретації. Кіпіані пропонує одну версію, Медведчук — іншу.'
  section: 'Конфліктна карта: Суд над історією'
  words: 900
- points:
  - 'Аналіз структури: Книга як "папка зі справою". Кіпіані виступає не як автор-оповідач, а як упорядник, що веде читача
    через лабіринт архівних документів: протоколів допитів, обшуків, листів, свідчень.'
  - Наративна техніка "документ говорить сам за себе". Розбір уривків, де Кіпіані мінімально коментує, дозволяючи радянській
    бюрократичній мові викрити абсурдність та жорстокість системи.
  - 'Персонажі: Стус, судді, прокурори, свідки, адвокат. Як вони постають через сухі документи? Чи створює Кіпіані "героїв"
    та "лиходіїв", чи залишає це на розсуд читача?'
  - '[!decolonization] Книга переводить справу Стуса з категорії "кримінальної" (як її подавала радянська система) в категорію
    "антиколоніальної боротьби". Стус — не злочинець, а представник окупованого народу, що бореться за право на мову та культуру.'
  section: 'Читання: "Справа Василя Стуса"'
  words: 1800
- points:
  - 'Етика упорядника: Де межа між цитуванням і маніпуляцією? Як вибір документів формує наратив? Аналіз того, що Кіпіані
    включив у книгу, і роздуми про те, що міг би залишити поза нею.'
  - 'Книга як акт реабілітації: Не юридичної, а історичної та суспільної. Як робота з архівами повертає імена не лише жертв,
    але й катів, відновлюючи повноту історичної картини.'
  - 'Травма і пам''ять: Книга не лише про Стуса, а й про травму українського суспільства, що пережило репресії. Як робота
    з документами допомагає пропрацювати цю травму?'
  - '[!epistemic-humility] Чи є архів абсолютно об''єктивним? Документи КДБ теж створювалися з певною метою. Робота історика-документаліста
    — це критика джерела, а не сліпа довіра до нього.'
  section: 'Свідчення як жанр: Архів як головний герой'
  words: 1200
- points:
  - 'Повернення до розминки: Чому книга стала небезпечною? Відповідь після аналізу: бо вона перетворила забуту архівну справу
    на живу і болючу частину сучасної політики та національної пам''яті.'
  - 'Рецепція та феномен: Заборона суду спричинила "ефект Стрейзанд" — наклади були розкуплені за години. Що це говорить про
    запит українського суспільства на історичну справедливість?'
  - '[!anti-hagiography] Книга показує не лише Стуса-титана, а й Стуса-людину — через його листи, сумніви, втому. Як це змінює
    наше сприйняття іконічного образу поета?'
  - 'Сучасна релевантність: Справа Стуса як прецедент для документування сучасних воєнних злочинів Росії. Чого нас вчить досвід
    Кіпіані про важливість збереження доказів?'
  section: Дискусія та підсумок
  words: 700
focus: Книга Вахтанга Кіпіані "Справа Василя Стуса" як приклад документальної літератури та боротьби за історичну справедливість
  через архівну роботу.
