objectives:
- Аналізувати жанрові особливості документальної літератури на прикладі конкретної справи.
- Критично оцінювати роль архівних документів як джерела історичної правди, враховуючи можливість маніпуляції.
- Аргументувати власну позицію в дебатах про співвідношення свободи слова та захисту особистої гідності в історичних дослідженнях.
- Пояснювати, як робота з історичною пам''яттю є інструментом деколонізації на прикладі справи Василя Стуса.
