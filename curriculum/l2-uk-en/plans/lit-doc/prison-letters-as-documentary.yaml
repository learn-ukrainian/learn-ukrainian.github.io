content_outline:
- points:
  - 'Провокація: Чи є лист, написаний у в''язниці, найправдивішою формою літератури? Або ж це найвища форма маніпуляції?'
  - 'Фрагмент листа без імені автора: "Тут час зупинився. Кожен день схожий на попередній, і лише думка про вас дає силу не
    зламатися". Хто це пише? До кого?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Лист як документ (об''єктивне свідчення епохи) vs. Лист як література (суб''єктивна конструкція, авто-міф).'
  - 'Дебат 2: Етика публікації. Чи має суспільство право на приватне листування в''язня? Де межа між історичним джерелом та
    втручанням у приватне життя?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у листах точний звіт, інші — ретельно сконструйований образ для
    нащадків.'
  section: 'Конфліктна карта: Приватне vs. Публічне'
  words: 900
- points:
  - 'Тексти: Аналіз уривків з листів (напр. Василя Стуса, Івана Світличного). Стилістичні особливості: метафори, підтекст,
    "езопова мова" для обходу цензури.'
  - 'Наративна стратегія: як автор конструює образ себе, своїх опонентів, свого часу. Що він обирає сказати, а про що мовчить?'
  - '[!decolonization] Листи як акт культурного опору. Відстоювання української ідентичності та мови в умовах тоталітарного
    тиску та русифікації.'
  - 'Мова як останній бастіон: аналіз мовних засобів, які підкреслюють національну суб''єктність автора.'
  section: 'Читання: Аналіз листів з ув''язнення'
  words: 1700
- points:
  - 'Свідок і його правда: Чим свідчення в листі відрізняється від свідчення в суді чи в мемуарах? Фактор цензури та "адресата".'
  - 'Естетика страждання: як описати біль, не скочуючись у мелодраму? Аналіз того, як автори знаходять баланс між емоційністю
    та стриманістю.'
  - '[!epistemic-humility] Лист — це не фотографія реальності, а її інтерпретація. Які фільтри (особисті, політичні) накладає
    автор на свій досвід?'
  - '[!anti-hagiography] Пошук "тріщин" у героїчному наративі. Чи є в листах моменти слабкості, сумнівів, помилок? Як вони
    змінюють наше розуміння автора як людини?'
  section: 'Свідчення як жанр: Лист як свідчення'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, тюремний лист — це документ, література чи щось третє? Формулювання власної позиції на
    основі матеріалу модуля.'
  - 'Рецепція: як ці листи сприймалися сучасниками (якщо доходили до них) і як їх читаємо ми сьогодні? Що змінилося в нашій
    оптиці?'
  - 'Сучасний вимір: листи Олега Сенцова, листи інших політв''язнів. Чи є традиція "тюремної епістолярії" безперервною?'
  section: Дискусія та підсумок
  words: 800
focus: Листи з ув'язнення як форма документальної прози, етика свідчення, роль автора у формуванні національної ідентичності,
  співвідношення документа і літератури
level: LIT-DOC
module: lit-doc-12
objectives:
- Аналізувати листи з ув'язнення як специфічний жанр документальної прози
- Досліджувати вплив автора та його текстів на формування національної ідентичності
- Розрізняти інтерпретації тюремних листів як історичного документа та літературного твору
- Застосовувати деколонізаційну оптику для аналізу текстів, написаних в умовах імперського тиску
- Оцінювати етичні дилеми, пов'язані з публікацією та аналізом приватного листування
