activity_hints:
- description: Визначити, яка з позицій дебату (лист як об'єктивний документ vs суб'єктивна література) відповідає наведеній
    тезі.
  focus: 'Конфліктна карта: Документ vs Література'
  items: 4
  type: quiz
- description: 'Заповнити пропуски в реченнях з огляду, використовуючи слова: епістолярій, суб''єктність, цензура, рецепція,
    свідчення.'
  focus: Ключова лексика аналізу
  items: 5
  type: fill-in
- description: Проаналізуйте уривок листа. Які літературні прийоми використовує автор? Чи підсилюють вони, чи послаблюють
    достовірність свідчення? Обґрунтуйте.
  focus: 'Аналіз: Свідок і його свідчення'
  type: note
- description: Чи виправдана публікація приватних листів без прямої згоди автора, якщо вони мають велике суспільне значення?
    Аргументуйте свою позицію, спираючись на матеріал модуля (400-600 слів).
  focus: 'Есе: Етика публікації'
  type: note
cefr_min: C1
