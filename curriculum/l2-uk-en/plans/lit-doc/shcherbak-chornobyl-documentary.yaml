content_outline:
- points:
  - 'Провокація: "Чи можна перетворити біль на літературу, не зрадивши правди свідка? І чи варто це робити?"'
  - 'Фрагмент зі спогадів лікаря з книги Щербака: "Ми не знали, що вже померли. Ми просто продовжували працювати".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Література vs Журналістика. Чи є "Чорнобиль" художнім твором, чи це блискучий репортаж? Що важливіше — естетична
    форма чи документальна точність?'
  - 'Дебат 2: Продукт "гласності" чи антирадянський текст? Як змінилося прочитання книги після 1991 та 2022 років?'
  - '[!epistemic-humility] Немає єдиної "правильної" інтерпретації. Щербак одночасно і викриває систему, і створює пантеон
    її героїв.'
  - 'Глобальний контекст: порівняння з іншими творами "літератури факту" (Світлана Алексієвич, Трумен Капоте).'
  section: 'Конфліктна карта: Документ чи пам''ятник?'
  words: 900
- points:
  - 'Поліфонічна структура: аналіз, як автор поєднує інтерв''ю, архівні документи, наукові дані та власний коментар.'
  - 'Мова катастрофи: зіткнення наукового жаргону, бюрократичного новоязу та живої мови свідків. Як це створює ефект достовірності?'
  - 'Ключові уривки: детальний розбір спогадів пожежників, лікарів, інженерів. Аналіз наративної стратегії Щербака.'
  - '[!decolonization] Чорнобиль як українська трагедія, а не абстрактна "радянська" катастрофа. Мовчання та брехня Москви
    як центральний антагоніст тексту.'
  section: 'Читання: "Чорнобиль" — хроніка голосів'
  words: 1800
- points:
  - 'Етика свідка: Щербак-лікар vs Щербак-письменник. Чи має право автор на "літературну обробку" чужого болю та травми?'
  - 'Пам''ять і травма: як Щербак працює з ненадійністю людської пам''яті, суперечливими свідченнями та психологічними захисними
    механізмами?'
  - '[!epistemic-humility] Автор — не прозоре скло, а фільтр. Аналіз авторських ремарок, вибору героїв та монтажу інтерв''ю.
    Як це формує наше сприйняття?'
  - '[!anti-hagiography] Критика радянської системи, але й одночасна героїзація її окремих представників. Чи не створює Щербак
    новий пантеон "радянських героїв"?'
  section: 'Свідчення як жанр: Лікар, свідок, суддя'
  words: 1300
- points:
  - 'Повернення до розминки: тож як розповісти про невимовне? Які межі документальної літератури?'
  - 'Рецепція твору: як "Чорнобиль" сприймали в СРСР, на Заході, і як його читають сьогодні.'
  - 'Сучасне значення: окупація Чорнобильської АЕС у 2022 році. Як текст Щербака допомагає зрозуміти логіку та злочини російської
    армії?'
  - 'Студентська рефлексія: що у вашому сприйнятті Чорнобиля змінилося після прочитання та аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Документальний роман "Чорнобиль", свідчення як літературний жанр, етика свідка, деколонізація чорнобильського наративу,
  поліфонічна структура
level: LIT-DOC
module: lit-doc-001
objectives:
- Аналізувати роман "Чорнобиль" як ключовий текст української документалістики та важливий артефакт епохи "гласності"
- Критично оцінювати етичні дилеми, пов''язані зі створенням літератури на основі реальних травматичних свідчень
- Формулювати аргументовану позицію в літературно-критичних дебатах щодо статусу та інтерпретації твору
- Застосовувати деколонізаційну оптику для аналізу радянських та пострадянських текстів про Україну, відрізняючи імперський
  погляд від національного
