activity_hints:
- description: 'Класифікуйте аргументи з тексту модуля: який належить до табору "літературознавців", а який — до табору "журналістів"?'
  focus: 'Розуміння конфліктної карти: Література vs Журналістика'
  items: 6
  type: quiz
- description: 'Заповніть пропуски в реченнях ключовими словами з модуля: ліквідатор, саркофаг, радіація, новояз, поліфонія.'
  focus: Термінологія катастрофи
  items: 5
  type: fill-in
- description: 'Вам надано два тексти: уривок зі спогадів ліквідатора в книзі Щербака та сухий офіційний звіт ТАРС про ті
    самі події. Порівняйте, що замовчує офіційна версія і чому.'
  focus: 'Джерельний аналіз: Свідчення vs Пропаганда'
  type: note
- description: Напишіть есе (400-600 слів) про те, як російська окупація зони відчуження у 2022 році змушує по-новому прочитати
    книгу Щербака. Які паралелі ви бачите?
  focus: 'Есе: Чорнобиль тоді і тепер'
  type: note
