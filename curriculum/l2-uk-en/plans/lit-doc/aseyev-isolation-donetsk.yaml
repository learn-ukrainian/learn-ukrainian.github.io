content_outline:
- points:
  - 'Провокація: Чи може катування бути «роботою»? Уривок з тексту Асєєва, де він аналізує психологію ката, який після зміни
    повертається до родини.'
  - 'Загадка: «Тут можуть вбити за одне українське слово, але не помітять цитати з Ніцше». Як розуміти це парадоксальне середовище
    донецької тюрми «Ізоляція»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Світлий шлях» — це історичний документ чи літературний твір? Позиція 1: це першоджерело, доказ злочинів, який
    вимагає фактологічної точності. Позиція 2: це конструйований наратив, де автор осмислює, а не просто фіксує досвід, використовуючи
    літературні засоби.'
  - 'Дебат 2: Це продовження російської табірної прози (Шаламов, Солженіцин) чи народження нового українського канону літератури
    свідчень? [!decolonization] Асєєв як представник покоління, що свідомо розриває з імперською традицією.'
  - '[!epistemic-humility] Ми не можемо знати «всю правду», ми маємо лише текст свідка. Наше завдання — не верифікувати факти,
    а зрозуміти, як текст конструює реальність табірного досвіду.'
  section: 'Конфліктна карта: Свідок чи письменник?'
  words: 900
- points:
  - 'Аналіз наративної структури: чому Асєєв відмовляється від хронології? Роль філософських відступів та сновидінь у тексті.'
  - 'Стилістика та мова: синтез високого (філософські рефлексії) та низького (тюремний побут, брутальність). Як мова стає
    інструментом опору та збереження людської гідності.'
  - 'Система персонажів: «камера» як мікро-суспільство. Взаємини між в''язнями, проблема зради та солідарності.'
  - '[!decolonization] Текст як акт деколонізації свідомості. Асєєв руйнує російський міф про «громадянську війну», показуючи
    окупацію Донбасу як екзистенційну та культурну війну проти української суб''єктності.'
  section: 'Читання: «Світлий Шлях: історія одного концтабору»'
  words: 1700
- points:
  - 'Проблема автентичності: що робить свідчення переконливим? Чи може літературна майстерність зашкодити достовірності?'
  - 'Пам''ять і травма: як травматичний досвід впливає на здатність свідчити? Розриви, повтори, замовчування у тексті Асєєва
    як симптоми травми.'
  - '[!anti-hagiography] Автор як свідок не є безтілесним моральним авторитетом. Асєєв рефлексує над власними компромісами,
    страхами та моментами слабкості, що робить його свідчення більш людяним та переконливим.'
  - '[!epistemic-humility] Свідчення — це не дзеркало реальності, а її інтерпретація. Воно дає доступ не до «фактів», а до
    досвіду переживання цих фактів.'
  section: 'Свідчення як жанр: Етика та естетика свідка'
  words: 1200
- points:
  - 'Повернення до розминки: тож як співіснують Ніцше і катування в «Ізоляції»? Формулювання відповіді на основі аналізу тексту.'
  - 'Рецепція твору: як «Світлий шлях» вплинув на сприйняття війни на Донбасі в Україні та у світі? Роль автора як публічного
    інтелектуала.'
  - 'Сучасне значення: що цей текст говорить нам про природу людської жорстокості, стійкості та про роль культури в умовах
    екстремального насильства?'
  - 'Рефлексія: Що для вас було найскладнішим у читанні цього тексту і чому?'
  section: Дискусія та підсумок
  words: 800
focus: Stanislav Aseyev's "The Torture Camp on Paradise Street", testimony as literature, ethics of witness, decolonization
  of the Donbas narrative
level: LIT-DOC
module: lit-doc-001
objectives:
- Аналізувати «Світлий шлях» як зразок документальної літератури (testimony literature), розрізняючи його риси від художньої
  прози.
- Критично оцінювати етичні та естетичні виклики, що постають перед автором-свідком, на прикладі тексту Асєєва.
- Пояснювати роль літератури свідчень у процесах деколонізації та формуванні національної пам'яті.
- Формулювати аргументовану позицію щодо місця твору в сучасному українському та світовому літературному каноні.
