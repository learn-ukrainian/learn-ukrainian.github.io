activity_hints:
- description: 'Розрізнення позицій у двох ключових дебатах: «документ vs література» та «російська традиція vs український
    канон».'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Заповніть пропуски в реченнях, використовуючи терміни з вокабуляру: свідчення, наратив, суб''єктність, травма,
    автентичність.'
  focus: Ключові терміни модуля
  items: 5
  type: fill-in
- description: Проаналізуйте короткий уривок з тексту Асєєва. Які літературні прийоми використовує автор? Як вони допомагають
    (чи заважають) передати досвід свідка? (250-400 слів).
  focus: 'Аналіз уривка: етика та естетика'
  type: note
- description: 'Напишіть есе на тему: «Як книга Станіслава Асєєва "Світлий шлях" сприяє деколонізації української історії
    та літератури?». Використовуйте аргументи з модуля. (400-600 слів).'
  focus: 'Есе: Деколонізація через свідчення'
  type: note
cefr_min: C1
