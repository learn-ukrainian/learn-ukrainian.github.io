content_outline:
- points:
  - 'Студент слухає (або читає) фрагмент думи — нерівноскладовий, речитативний. Потім — фрагмент пісні. Питання: Чим дума
    відрізняється від пісні? Це вірш, проза чи щось третє?'
  - 'Провокація: Думи — це НЕ пісні. Їх не «співають», а «кажуть». Це принципово інший жанр'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чижевський — думи виникли у XVI ст. і повністю витіснили старокняжий епос. Новий козацький епос замінив княжий'
  - 'Дебат 2: Проблема датування — дума про Самійла Кішку (іст. особа 1575-1602) містить елементи з оповідання 1643 року.
    Тексти еволюціонували протягом століть'
  - '[!epistemic-humility] «Більшість дослідників сходяться на XVI ст., але конкретні тексти могли створюватися, змінюватися
    та існувати в усній традиції протягом кількох століть»'
  - 'Глобальна синхронність: сербські юнацькі пісні (XV-XVII ст.), іспанські романси (XV ст.), шотландські балади (XVI ст.)
    — ренесансний розквіт епосу в Європі'
  section: 'Конфліктна карта: Коли з''явилися думи?'
  words: 1150
- points:
  - Речитативне виконання — НЕ мелодія, а ритмізоване промовляння під акомпанемент кобзи/бандури. Імпровізація в межах традиції
  - Нерівноскладовий вірш — асиметричні рядки, НЕстрофічна побудова. Це відрізняє думу від пісні (рівноскладовий, строфічний)
  - 'Синонімічні тавтологічні пари: «плаче-ридає», «квилить-проквиляє». Формульні зачини, славослів''я (closing blessing)'
  - 'Первинне джерело: фрагмент думи — зачин + формульні пари + закінчення-бажання'
  section: 'Читання: Жанрова специфіка'
  words: 1450
- points:
  - Невільницькі (полон) → Лицарські (героїка) → Побутові (родина). Хронологічний розвиток від XV до XVIII ст.
  - Думи як «епос без великого центрального героя» (Чижевський) — тяжіння до анонімності. На відміну від билин, де Ілля =
    центр
  - 'Попович: козацька героїка та боротьба з татарськими ордами сформували стійку українську легенду, яка заступила давнішу
    києво-руську'
  - '[!decolonization] Думи — СУТО УКРАЇНСЬКЕ явище. Жодного аналога в російському, польському чи сербському фольклорі. Билини
    — спільний спадок, але думи — виключно наші'
  - '[!myth-buster] «Думи — це козацькі пісні» — спрощення. Думи — це речитативні ПОЕМИ, а не пісні. Різниця жанрова, а не
    лише тематична'
  section: 'Аналіз: Три тематичні цикли'
  words: 1350
- points:
  - 'Повернення до розминки: студент тепер може артикулювати різницю між думою та піснею — ритм, виконання, структура'
  - Чому думи перемогли билини? Новий досвід (козацтво, неволя) потребував нового жанру. Форма слідує за змістом
  - '[!anti-hagiography] Думи — не лише «героїчний» жанр. Побутовий цикл показує зраду, підлість, родинну трагедію. Козацький
    світ — не утопія'
  section: Дискусія та підсумок
  words: 850
