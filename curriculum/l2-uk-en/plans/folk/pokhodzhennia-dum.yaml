objectives:
- Чітко артикулювати жанрову відмінність думи від пісні та билини за формальними ознаками
- Розуміти контроверзію датування дум та її методологічні причини
- Аналізувати три тематичні цикли як хронологічний розвиток жанру
- Визнавати думи як унікально український жанр без аналогів в інших слов'янських традиціях
