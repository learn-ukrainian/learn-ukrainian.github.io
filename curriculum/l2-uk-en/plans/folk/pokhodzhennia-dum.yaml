module: folk-017
level: FOLK
cefr_min: C1
sequence: 17
slug: pokhodzhennia-dum
version: '4.0'
title: Походження та специфіка козацьких дум
subtitle: Origins and Specifics of Cossack Dumas
focus: Duma as uniquely Ukrainian genre, recitative vs song, irregular meter, displacement of byliny, dating controversy, duma as epic without central hero
phase: FOLK.4
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Студент слухає (або читає) фрагмент думи — нерівноскладовий, речитативний. Потім — фрагмент пісні. Питання: Чим дума відрізняється від пісні? Це вірш, проза чи щось третє?'
  - 'Провокація: Думи — це НЕ пісні. Їх не «співають», а «кажуть». Це принципово інший жанр'
  words: 400
- section: 'Конфліктна карта: Коли з''явилися думи?'
  points:
  - 'Дебат 1: Чижевський — думи виникли у XVI ст. і повністю витіснили старокняжий епос. Новий козацький епос замінив княжий'
  - 'Дебат 2: Проблема датування — дума про Самійла Кішку (іст. особа 1575-1602) містить елементи з оповідання 1643 року. Тексти еволюціонували протягом століть'
  - '[!epistemic-humility] «Більшість дослідників сходяться на XVI ст., але конкретні тексти могли створюватися, змінюватися та існувати в усній традиції протягом кількох століть»'
  - 'Глобальна синхронність: сербські юнацькі пісні (XV-XVII ст.), іспанські романси (XV ст.), шотландські балади (XVI ст.) — ренесансний розквіт епосу в Європі'
  words: 800
- section: 'Читання: Жанрова специфіка'
  points:
  - 'Речитативне виконання — НЕ мелодія, а ритмізоване промовляння під акомпанемент кобзи/бандури. Імпровізація в межах традиції'
  - 'Нерівноскладовий вірш — асиметричні рядки, НЕстрофічна побудова. Це відрізняє думу від пісні (рівноскладовий, строфічний)'
  - 'Синонімічні тавтологічні пари: «плаче-ридає», «квилить-проквиляє». Формульні зачини, славослів''я (closing blessing)'
  - 'Первинне джерело: фрагмент думи — зачин + формульні пари + закінчення-бажання'
  words: 1100
- section: 'Аналіз: Три тематичні цикли'
  points:
  - 'Невільницькі (полон) → Лицарські (героїка) → Побутові (родина). Хронологічний розвиток від XV до XVIII ст.'
  - 'Думи як «епос без великого центрального героя» (Чижевський) — тяжіння до анонімності. На відміну від билин, де Ілля = центр'
  - 'Попович: козацька героїка та боротьба з татарськими ордами сформували стійку українську легенду, яка заступила давнішу києво-руську'
  - '[!decolonization] Думи — СУТО УКРАЇНСЬКЕ явище. Жодного аналога в російському, польському чи сербському фольклорі. Билини — спільний спадок, але думи — виключно наші'
  - '[!myth-buster] «Думи — це козацькі пісні» — спрощення. Думи — це речитативні ПОЕМИ, а не пісні. Різниця жанрова, а не лише тематична'
  words: 1000
- section: Дискусія та підсумок
  points:
  - 'Повернення до розминки: студент тепер може артикулювати різницю між думою та піснею — ритм, виконання, структура'
  - 'Чому думи перемогли билини? Новий досвід (козацтво, неволя) потребував нового жанру. Форма слідує за змістом'
  - '[!anti-hagiography] Думи — не лише «героїчний» жанр. Побутовий цикл показує зраду, підлість, родинну трагедію. Козацький світ — не утопія'
  words: 500
vocabulary_hints:
- word: дума
  pos: ж.
  definition: унікальний український ліро-епічний жанр, що виконувався речитативно під акомпанемент кобзи або бандури
- word: речитатив
  pos: ч.
  definition: мелодійне промовляння між співом і мовленням — спосіб виконання дум
- word: нерівноскладовий
  pos: прикм.
  definition: такий, де рядки мають різну кількість складів — на відміну від рівноскладового вірша пісень
- word: кобзар
  pos: ч.
  definition: мандрівний сліпий музикант-співець, що виконував думи під акомпанемент кобзи або бандури
- word: формула
  pos: ж.
  definition: 'в усному епосі: усталений словесний зворот, що повторюється (зачин, звертання, закінчення)'
- word: славослів'я
  pos: с.
  definition: заключне побажання-благословення в кінці думи
- word: невільник
  pos: ч.
  definition: полонений, раб — центральний образ невільницького циклу дум
- word: тавтологічний
  pos: прикм.
  definition: побудований на повторенні близьких за значенням слів — «плаче-ридає» як характерний прийом дум
- word: анонімність
  pos: ж.
  definition: відсутність авторства — думи не мають авторів, вони належать традиції
- word: строфа
  pos: ж.
  definition: група рядків, що утворює ритмічну одиницю — в думах НЕМАЄ строф, на відміну від пісень
activity_hints:
- type: quiz
  focus: Жанрова специфіка
  description: 'Порівняння: дума чи пісня? Студенту подано 4 ознаки (нерівноскладовий вірш, строфічність, речитативне виконання, фіксована мелодія) — визначити, яка ознака до якого жанру належить.'
  items: 4
- type: fill-in
  focus: Думознавча лексика
  description: 'Терміни: речитатив, нерівноскладовий, славослів''я, тавтологічний, анонімність — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: зачин думи vs зачин билини'
  description: 'Подано два зачини: (1) билинний — «Гей, у славному та у городі...», (2) думовий — речитативний фрагмент. Студент порівнює ритм, структуру, лексику. Що об''єднує ці жанри, а що принципово різнить?'
- type: note
  focus: 'Есе: Чому жанри вмирають?'
  description: 'Билини зникли в Україні, витіснені думами. Думи зникли, коли знищили кобзарів. Чи може жанр «воскреснути» — або він завжди стає чимось іншим? (400-600 слів)'
