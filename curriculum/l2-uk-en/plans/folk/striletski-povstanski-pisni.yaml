content_outline:
- section: Постановка проблеми
  words: 720
  points:
  - 'Start from the genre problem: twentieth-century resistance songs are neither ancient anonymous lyric nor dumy, but songs that entered oral and public memory through authors, printed songbooks, school canon, family transmission, and public performance.'
  - 'Establish the evidence tiers: school-canonical framing, public Ukrlib full texts, and corpus-attested literary witnesses that show circulation without becoming field recordings.'
- section: Корпус і контекст
  words: 980
  points:
  - Separate the Sich Riflemen / Ukrainian Sich Riflemen layer of 1914-1920 from the insurgent / UPA and underground layer of the 1940s-1950s.
  - Use public readings from Ukrlib and canonical school/Osvita/Wikipedia pages; learner citations must stay on public URLs.
  - Explain authorship and anonymity without either erasing known authors or denying folklorization.
- section: Поетика, символіка і виконання
  words: 1050
  points:
  - Analyze stanza, refrain, march pulse, elegiac repetition, communal pickup, and variant circulation.
  - Compare kalyna, Makivka, the fallen rifleman, the prison/forest underground, and the grave marked by national memory.
  - Include primary-reading blocks for every hosted reading.
- section: Деколонізаційна рамка
  words: 700
  points:
  - Reject Soviet criminalizing vocabulary and Russian-imperial erasure of Ukrainian agency while avoiding uncritical hagiography.
  - Keep UPA and USS historically distinct; name public memory, state recognition, school canon, and source limits.
- section: Підсумок
  words: 550
  points:
  - 'Return to the central skill: classify the source situation before interpreting the song.'
  - Give learners a seminar answer pattern that cites public source, genre layer, poetic evidence, and limits of inference.
focus: Twentieth-century Ukrainian resistance songs as folklorized public memory.
level: FOLK
module: folk-015
objectives:
- Розрізняти стрілецький і повстанський шари української пісенної пам'яті без змішування УСС, УГА, ОУН, УПА та повоєнного підпілля.
- Пояснювати, як авторська або анонімна пісня входить у фольклорний обіг через співаник, школу, родинну пам'ять і публічне виконання.
- Аналізувати строфу, приспів, маршовий імпульс, реквіємну повторність і мотиви калини, дороги, могили, лісу та гуртового голосу.
- Відкидати радянські криміналізувальні ярлики й водночас називати межі джерела, авторства, варіанта і сучасної пам'яті.
