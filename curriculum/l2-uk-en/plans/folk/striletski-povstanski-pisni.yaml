vocabulary_hints:
- word: стрілецька пісня
  pos: ж.
  definition: пісня, пов'язана з колом Українських січових стрільців, Визвольних Змагань і ширшим стрілецьким пісенним репертуаром
- word: повстанська пісня
  pos: ж.
  definition: пісня визвольного підпілля, УПА або ширшої пам'яті збройного спротиву XX століття
- word: фольклоризація
  pos: ж.
  definition: перехід авторського або друкованого тексту в усний, варіантний і спільнотний обіг
- word: співаник
  pos: ч.
  definition: друкована або рукописна збірка пісень, через яку репертуар переходить між школою, військом, родиною і сценою
- word: реквієм
  pos: ч.
  definition: жалобний твір або виконання, що надає спільноті мову втрати й пам'яті
