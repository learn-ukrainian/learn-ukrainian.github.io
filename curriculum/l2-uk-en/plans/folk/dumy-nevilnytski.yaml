content_outline:
- points:
  - 'Фрагмент думи: козак-невільник звертається до Дніпра, до вітру, до зозулі — благає передати звістку додому. Але ж Дніпро
    не почує. Навіщо?'
  - 'Питання: Коли людина в неволі — до кого вона звертається? До Бога? До природи? Чому в думах — саме до природи?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чижевський — невільницькі думи унікальні «психологізмом, що переважає над героїкою». Герой тут — не воїн, а
    змучена душа. Центральна дія — не битва, а плач'
  - 'Дебат 2: Героїчна версія — навіть у полоні козаки борються (Кішка), визволяють братів (Богуславка), тікають (три брати
    з Азова). Це все одно героїчний епос'
  - '[!epistemic-humility] «Думи описують галерне рабство як пережитий досвід. Але хто їх складав — ті, хто повернувся? Що
    з тисячами, хто НЕ повернувся?»'
  - 'Глобальна синхронність: Negro spirituals (рабство в Америці), Armenian laments (геноцид), Jewish kinot (вигнання) — плач
    поневоленого народу як транскультурний жанр'
  section: 'Конфліктна карта: Епос жертв чи героїв?'
  words: 1025
- points:
  - 'Невільницький плач — анонімний, узагальнений. Не один козак, а ВСІ. Молитва-скарга до Бога: «Визволи нас, бідних невільників,
    з тяжкої неволі турецької»'
  - 'Символічний світ: зозуля = мати/сестра, явір = сум та смерть, степ/море = безмежна туга, Дніпро = дорога додому'
  - 'Плач як жанр: ритмізована імпровізація (як поховальне голосіння), але адресована не мертвому, а втраченій свободі. Символічна
    смерть'
  - 'Первинне джерело: фрагмент думи «Плач невільника» — звертання до Бога та природних стихій'
  section: 'Читання: Плач невільників'
  words: 1325
- points:
  - Маруся — дочка священика, що «потурчилась, побусурменилась для розкоші турецької». На Великдень визволяє 700 козаків-невільників
  - 'Трагічний вибір: Маруся має свободу (вона — дружина турка), але жертвує безпекою заради інших. Жіноча агентність в епосі'
  - '[!decolonization] Маруся — ЖІНОЧИЙ епічний герой в суто ЧОЛОВІЧОМУ жанрі. Це унікально не лише для українського, а й
    для європейського епосу'
  - '[!anti-hagiography] Маруся «потурчилась» — зрадила віру. Це НЕ «героїня без вад». Народ не засуджує її зраду — а прославляє
    її вчинок ПОПРИ зраду. Складна мораль'
  section: 'Читання: Маруся Богуславка'
  words: 1125
- points:
  - 'Реальність: кримсько-татарські набіги, невільничі ринки Кафи, галерне рабство. Тисячі людей щороку. Це не метафора —
    це документ'
  - 'Козацькі морські походи як відповідь — але Костомаров: козаки самі часто потрапляли в полон під час «визвольних» рейдів'
  - '[!myth-buster] «Козаки визволяли полонених» — частково правда. Але козацькі набіги також створювали нових полонених (з
    іншого боку). Війна — не чорно-біла'
  section: 'Аналіз: Історичний контекст'
  words: 925
- points:
  - 'Повернення до розминки: звертання до природи — бо Дніпро, вітер, зозуля — єдині «посланці», що можуть перетнути межу
    між неволею та домом'
  - 'Ключова теза: невільницькі думи — не лише «сумні пісні», а одна з перших в Європі поетичних систем фіксації колективної
    травми'
  section: Підсумок
  words: 400
