module: folk-018
level: FOLK
cefr_min: C1
sequence: 18
slug: dumy-nevilnytski
version: '4.0'
title: 'Невільницькі думи: Плач бранців'
subtitle: 'Captivity Dumas: The Captives'' Lament'
focus: Captivity dumas as testimony of collective trauma, Marusia Bohuslavka as tragic female agent, lament genre repurposed for captivity, symbolism of nature in exile
phase: FOLK.4
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Фрагмент думи: козак-невільник звертається до Дніпра, до вітру, до зозулі — благає передати звістку додому. Але ж Дніпро не почує. Навіщо?'
  - 'Питання: Коли людина в неволі — до кого вона звертається? До Бога? До природи? Чому в думах — саме до природи?'
  words: 400
- section: 'Конфліктна карта: Епос жертв чи героїв?'
  points:
  - 'Дебат 1: Чижевський — невільницькі думи унікальні «психологізмом, що переважає над героїкою». Герой тут — не воїн, а змучена душа. Центральна дія — не битва, а плач'
  - 'Дебат 2: Героїчна версія — навіть у полоні козаки борються (Кішка), визволяють братів (Богуславка), тікають (три брати з Азова). Це все одно героїчний епос'
  - '[!epistemic-humility] «Думи описують галерне рабство як пережитий досвід. Але хто їх складав — ті, хто повернувся? Що з тисячами, хто НЕ повернувся?»'
  - 'Глобальна синхронність: Negro spirituals (рабство в Америці), Armenian laments (геноцид), Jewish kinot (вигнання) — плач поневоленого народу як транскультурний жанр'
  words: 800
- section: 'Читання: Плач невільників'
  points:
  - 'Невільницький плач — анонімний, узагальнений. Не один козак, а ВСІ. Молитва-скарга до Бога: «Визволи нас, бідних невільників, з тяжкої неволі турецької»'
  - 'Символічний світ: зозуля = мати/сестра, явір = сум та смерть, степ/море = безмежна туга, Дніпро = дорога додому'
  - 'Плач як жанр: ритмізована імпровізація (як поховальне голосіння), але адресована не мертвому, а втраченій свободі. Символічна смерть'
  - 'Первинне джерело: фрагмент думи «Плач невільника» — звертання до Бога та природних стихій'
  words: 1100
- section: 'Читання: Маруся Богуславка'
  points:
  - 'Маруся — дочка священика, що «потурчилась, побусурменилась для розкоші турецької». На Великдень визволяє 700 козаків-невільників'
  - 'Трагічний вибір: Маруся має свободу (вона — дружина турка), але жертвує безпекою заради інших. Жіноча агентність в епосі'
  - '[!decolonization] Маруся — ЖІНОЧИЙ епічний герой в суто ЧОЛОВІЧОМУ жанрі. Це унікально не лише для українського, а й для європейського епосу'
  - '[!anti-hagiography] Маруся «потурчилась» — зрадила віру. Це НЕ «героїня без вад». Народ не засуджує її зраду — а прославляє її вчинок ПОПРИ зраду. Складна мораль'
  words: 900
- section: 'Аналіз: Історичний контекст'
  points:
  - 'Реальність: кримсько-татарські набіги, невільничі ринки Кафи, галерне рабство. Тисячі людей щороку. Це не метафора — це документ'
  - 'Козацькі морські походи як відповідь — але Костомаров: козаки самі часто потрапляли в полон під час «визвольних» рейдів'
  - '[!myth-buster] «Козаки визволяли полонених» — частково правда. Але козацькі набіги також створювали нових полонених (з іншого боку). Війна — не чорно-біла'
  words: 700
- section: Підсумок
  points:
  - 'Повернення до розминки: звертання до природи — бо Дніпро, вітер, зозуля — єдині «посланці», що можуть перетнути межу між неволею та домом'
  - 'Ключова теза: невільницькі думи — не лише «сумні пісні», а одна з перших в Європі поетичних систем фіксації колективної травми'
  words: 400
vocabulary_hints:
- word: невільник
  pos: ч.
  definition: полонений, раб — людина, позбавлена свободи та відірвана від батьківщини
- word: бранець
  pos: ч.
  definition: полонений, захоплений під час набігу — синонім невільника
- word: галера
  pos: ж.
  definition: військовий корабель з веслярами-рабами — місце каторжної праці для козаків-невільників
- word: ясир
  pos: ч.
  definition: полонені, захоплені як живий товар під час набігу (тюркізм)
- word: визволення
  pos: с.
  definition: звільнення з неволі — центральний мотив та бажання в невільницьких думах
- word: потурчитись
  pos: дієсл.
  definition: прийняти іслам — трагічний вибір між виживанням і зрадою віри
- word: зозуля
  pos: ж.
  definition: птах-символ — уособлення материнського плачу, туги за домом
- word: явір
  pos: ч.
  definition: дерево-символ — асоціюється з нещастям, сумом, чужиною
- word: каторга
  pos: ж.
  definition: важка примусова праця — в контексті дум: гребля на галерах
- word: колективна травма
  pos: ж.
  definition: психологічна рана, що зачіпає не окрему людину, а цілий народ або спільноту
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: епос жертв (психологізм, плач) чи епос героїв (боротьба, визволення)? Студент визначає за фрагментом думи.'
  items: 4
- type: fill-in
  focus: Лексика неволі та символіки
  description: 'Терміни: ясир, галера, потурчитись, зозуля, колективна травма — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: Маруся Богуславка'
  description: 'Подано фрагмент думи про Марусю Богуславку. Студент аналізує: (1) як народ оцінює її «потурчення»? (2) чи засуджує, чи прощає? (3) що важливіше для народної моралі — вірність віри чи вірність свого народу?'
- type: note
  focus: 'Есе: Поезія травми'
  description: 'Невільницькі думи, Negro spirituals, вірменські плачі — поневолені народи створюють поезію страждання. Чи є в цьому терапевтична функція — або це лише фіксація болю? (400-600 слів)'
