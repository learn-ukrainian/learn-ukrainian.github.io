slug: narodni-anekdoty
version: '4.0'
title: 'Народні анекдоти та небилиці: Сміхова культура'
subtitle: 'Folk Anecdotes and Tall Tales: Laughter Culture'
focus: Laughter culture as essential Ukrainian worldview, Sich as carnival anti-world (Popovich), interludes as literary bridge, moskаl and social targets, Vyshnya as folk humor heir
phase: FOLK.5
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Анекдот XVII ст. з інтермедії Ґаватовича: «Продав кота в мішку» — студент вгадує розв''язку. Потім: цей сюжет став «народним анекдотом». Хто автор — Ґаватович чи народ?'
  - 'Провокація: Після «Енеїди» Котляревського здавалося, що сміхова культура — ПРИРОДНИЙ регістр української культури (Попович). Чому саме сміх?'
  words: 400
- section: 'Конфліктна карта: Сміх як зброя чи як розвага?'
  points:
  - 'Дебат 1: Попович — сміхова культура як «антисвіт». Запорозька Січ — «світ навиворіт», де жорстокість і нестримність є «ритуальною поведінкою». Сміх = спротив нормованому суспільству'
  - 'Дебат 2: Просвітницька версія (Квітка-Основ'яненко) — народний гумор як прояв «народної темноти». Вірування та перекази — матеріал для анекдотів, а не глибока мудрість'
  - '[!epistemic-humility] «Романтики бачили в народному гуморі глибокий сенс. Просвітителі — темноту. Сучасний дослідник мав би визнати і те, і інше»'
  - 'Глобальна синхронність: commedia dell''arte (Італія), Karagöz (Туреччина), Punch and Judy (Англія), Nasreddin (Персія) — народний сміховий театр як універсальне явище'
  words: 800
- section: 'Читання: Анекдот від бароко до модерну'
  points:
  - 'XVII ст. — інтермедії в шкільних драмах. Ґаватович (1619): багатомовні сценки, що висміюють соціальні типи. Комедійні ситуації: помилки, крадіжки, бійки (Чижевський)'
  - 'Перекладні збірки: «Велике Зерцало», «Римські історії» — європейські анекдоти в українській обробці'
  - 'Квітка-Основ'яненко: «Пархімове снідання», «Підбрехач», «Купований розум» — літературна обробка народних сюжетів'
  - 'Остап Вишня: «усмішки» XX ст. — невідповідність між довірливим тоном і абсурдним матеріалом. Прийом, запозичений із народних анекдотів'
  - 'Первинне джерело: фрагмент інтермедії або анекдоту — діалогова комічна сцена'
  words: 1100
- section: 'Читання: Небилиці та абсурд'
  points:
  - 'Небилиці — свідоме порушення логіки та реальності. «Світ навиворіт»: риба лізе на дерево, мертвий танцює'
  - 'Карнавальна логіка — інверсія природного порядку заради комічного ефекту'
  - 'Гулак-Артемовський: «Солопій та Хівря» — нісенітниці, наслідування народної словесності'
  - '[!decolonization] Шельменко-денщик Квітки — український архетип «розумного слуги», що створює «низовий» сміховий дубль до «високого» світу панів. Це НЕ «малоросійський» гумор — це УКРАЇНСЬКА сміхова традиція'
  words: 700
- section: 'Аналіз: Соціальні мішені'
  points:
  - 'Пан — дурний, жадібний. Піп — лицемірний. Москаль — грубий, чужий. Циган — хитрий. Стереотипи як інструмент соціальної критики'
  - 'Січ як «антисвіт» (Попович): «за порогами» = на межі з «чужим» світом. Карнавальна, сміхова символізація — ритуальна, а не буденна поведінка'
  - '[!myth-buster] «Народний гумор — добрий і безневинний» — ні. Анекдоти містять жорстокість, ксенофобію, мізогінію. Сміх може бути і зброєю, і насильством'
  - '[!anti-hagiography] Образ «москаля» в народних анекдотах — сатира на імперського солдата. Але це також стереотипізація цілого народу. Як працювати з таким спадком критично?'
  words: 800
- section: Підсумок
  points:
  - 'Повернення до розминки: хто автор — Ґаватович чи народ? І те, і інше. Літературний та усний сміх живлять одне одного'
  - 'Ключова теза: сміхова культура — не «периферія» української літератури, а її серцевина, від Котляревського до Зеленського'
  words: 400
vocabulary_hints:
- word: анекдот
  pos: ч.
  definition: коротка дотепна розповідь із несподіваним, комічним фіналом
- word: небилиця
  pos: ж.
  definition: розповідь про свідомо неможливі, абсурдні події — «світ навиворіт»
- word: сміхова культура
  pos: ж.
  definition: сфера культури, пов'язана з гумором, карнавалом та ритуальним «перевертанням» порядку
- word: карнавал
  pos: ч.
  definition: ритуальне свято, де норми інвертуються — сильний стає слабким, пан стає слугою
- word: інтермедія
  pos: ж.
  definition: коротка гумористична сцена між актами серйозної шкільної драми (XVII ст.)
- word: пародія
  pos: ж.
  definition: комічне наслідування з метою висміювання — прийом анекдотів та небилиць
- word: дотепність
  pos: ж.
  definition: здатність швидко та влучно жартувати — головна зброя народного гумору
- word: ксенофобія
  pos: ж.
  definition: ворожість до чужинців — мотив, що трапляється в народних анекдотах про «москаля», «цигана»
- word: інверсія
  pos: ж.
  definition: перевертання звичного порядку — карнавальний прийом небилиць
- word: усмішка
  pos: ж.
  definition: короткий гумористичний твір (жанр Остапа Вишні) — літературний нащадок народного анекдоту
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: сміх як спротив (Попович — «антисвіт») чи сміх як «народна темнота» (Квітка — просвітницька версія)? Студент визначає за описом функції гумору.'
  items: 4
- type: fill-in
  focus: Гумористична та культурологічна лексика
  description: 'Терміни: карнавал, інтермедія, інверсія, ксенофобія, усмішка — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: інтермедія vs сучасний анекдот'
  description: 'Подано два тексти: (1) фрагмент інтермедії Ґаватовича (XVII ст.), (2) сучасний український анекдот на аналогічний сюжет. Що змінилось за 400 років? Що залишилось незмінним?'
- type: note
  focus: 'Есе: Чи можна сміятися з усього?'
  description: 'Народні анекдоти висміюють панів, попів, «москалів». Сучасна сатира висміює владу та ворога. Де проходить межа між здоровим гумором та ксенофобією? Хто встановлює цю межу? (400-600 слів)'
