content_outline:
- points:
  - 'Анекдот XVII ст. з інтермедії Ґаватовича: «Продав кота в мішку» — студент вгадує розв''язку. Потім: цей сюжет став «народним
    анекдотом». Хто автор — Ґаватович чи народ?'
  - 'Провокація: Після «Енеїди» Котляревського здавалося, що сміхова культура — ПРИРОДНИЙ регістр української культури (Попович).
    Чому саме сміх?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Попович — сміхова культура як «антисвіт». Запорозька Січ — «світ навиворіт», де жорстокість і нестримність є
    «ритуальною поведінкою». Сміх = спротив нормованому суспільству'
  - 'Дебат 2: Просвітницька версія (Квітка-Основ''яненко) — народний гумор як прояв «народної темноти». Вірування та перекази
    — матеріал для анекдотів, а не глибока мудрість'
  - '[!epistemic-humility] «Романтики бачили в народному гуморі глибокий сенс. Просвітителі — темноту. Сучасний дослідник
    мав би визнати і те, і інше»'
  - 'Глобальна синхронність: commedia dell''arte (Італія), Karagöz (Туреччина), Punch and Judy (Англія), Nasreddin (Персія)
    — народний сміховий театр як універсальне явище'
  section: 'Конфліктна карта: Сміх як зброя чи як розвага?'
  words: 1050
- points:
  - 'XVII ст. — інтермедії в шкільних драмах. Ґаватович (1619): багатомовні сценки, що висміюють соціальні типи. Комедійні
    ситуації: помилки, крадіжки, бійки (Чижевський)'
  - 'Перекладні збірки: «Велике Зерцало», «Римські історії» — європейські анекдоти в українській обробці'
  - 'Квітка-Основ''яненко: «Пархімове снідання», «Підбрехач», «Купований розум» — літературна обробка народних сюжетів'
  - 'Остап Вишня: «усмішки» XX ст. — невідповідність між довірливим тоном і абсурдним матеріалом. Прийом, запозичений із народних
    анекдотів'
  - 'Первинне джерело: фрагмент інтермедії або анекдоту — діалогова комічна сцена'
  section: 'Читання: Анекдот від бароко до модерну'
  words: 1350
- points:
  - 'Небилиці — свідоме порушення логіки та реальності. «Світ навиворіт»: риба лізе на дерево, мертвий танцює'
  - Карнавальна логіка — інверсія природного порядку заради комічного ефекту
  - 'Гулак-Артемовський: «Солопій та Хівря» — нісенітниці, наслідування народної словесності'
  - '[!decolonization] Шельменко-денщик Квітки — український архетип «розумного слуги», що створює «низовий» сміховий дубль
    до «високого» світу панів. Це НЕ «малоросійський» гумор — це УКРАЇНСЬКА сміхова традиція'
  section: 'Читання: Небилиці та абсурд'
  words: 950
- points:
  - Пан — дурний, жадібний. Піп — лицемірний. Москаль — грубий, чужий. Циган — хитрий. Стереотипи як інструмент соціальної
    критики
  - 'Січ як «антисвіт» (Попович): «за порогами» = на межі з «чужим» світом. Карнавальна, сміхова символізація — ритуальна,
    а не буденна поведінка'
  - '[!myth-buster] «Народний гумор — добрий і безневинний» — ні. Анекдоти містять жорстокість, ксенофобію, мізогінію. Сміх
    може бути і зброєю, і насильством'
  - '[!anti-hagiography] Образ «москаля» в народних анекдотах — сатира на імперського солдата. Але це також стереотипізація
    цілого народу. Як працювати з таким спадком критично?'
  section: 'Аналіз: Соціальні мішені'
  words: 1050
- points:
  - 'Повернення до розминки: хто автор — Ґаватович чи народ? І те, і інше. Літературний та усний сміх живлять одне одного'
  - 'Ключова теза: сміхова культура — не «периферія» української літератури, а її серцевина, від Котляревського до Зеленського'
  section: Підсумок
  words: 400
