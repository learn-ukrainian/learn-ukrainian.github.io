objectives:
- Аналізувати сміхову культуру як системний феномен — від усного анекдоту до літературної «усмішки»
- Розуміти Запорозьку Січ як «антисвіт» (Попович) — карнавальне перевертання норм
- Простежувати еволюцію анекдоту від інтермедій XVII ст. до Остапа Вишні
- Критично оцінювати соціальні мішені народного гумору — між справедливою сатирою та стереотипізацією
