objectives:
- Критично оцінювати відношення між історичним фактом та фольклорною гіперболізацією на прикладі лицарських дум
- Аналізувати повний текст думи з лінгвістичним та культурологічним коментарем
- Порівнювати козацький героїчний епос із паралельними європейськими традиціями (сербські юнацькі пісні, шотландські балади)
- Формулювати аргументовану позицію щодо функції героїчного епосу в суспільстві, що перебуває під екзистенційною загрозою
