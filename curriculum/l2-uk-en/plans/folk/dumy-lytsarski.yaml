title: 'Лицарські думи: Оспівування звитяги'
subtitle: 'Heroic Dumas: Celebrating Valor'
focus: Heroic dumas — Samiilo Kishka, Baida, Cossack martial ethos
phase: FOLK.4
word_target: 5000
content_outline:
- section: Вступ
  points:
  - The лицарський цикл — dumas of battle, victory, and Cossack glory
  - Historical heroes transformed into epic figures
  words: 750
- section: Самійло Кішка
  points:
  - The longest and most complex duma — mutiny on a Turkish galley
  - Narrative structure — captivity, ruse, liberation, battle
  words: 950
- section: Дума про Байду
  points:
  - Байда (Dmytro Vyshnevetsky) — defiance before the Sultan
  - Martyrdom motif — death chosen over submission
  words: 850
- section: Козацький ідеал лицарства
  points:
  - Honor (слава), brotherhood (побратимство), freedom (воля)
  - The sea campaign (морський похід) as ultimate test of valor
  words: 800
- section: Текстовий аналіз
  points:
  - Close reading of heroic dumas with linguistic commentary
  - Military vocabulary, Turkish loanwords, Cossack terminology
  words: 850
- section: Підсумок
  points:
  - Heroic dumas as foundation of Ukrainian martial identity
  - Vocabulary table
  words: 800
