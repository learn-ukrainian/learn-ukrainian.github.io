module: folk-019
level: FOLK
cefr_min: C1
sequence: 19
slug: dumy-lytsarski
version: '4.0'
title: 'Лицарські думи: Оспівування звитяги'
subtitle: 'Heroic Dumas: Celebrating Valor'
focus: Heroic dumas — Samiilo Kishka, Baida, Cossack martial ethos, epic vs history, martyrdom motif
phase: FOLK.4
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Провокація: Самійло Кішка — реальний гетьман чи казковий супергерой? Де межа між фактом і епосом?'
  - Фрагмент думи (3-4 рядки) без контексту — студент має визначити, про кого це і що відбувається
  words: 400
- section: 'Конфліктна карта: Герой чи міф?'
  points:
  - 'Дебат 1: Чи існував Самійло Кішка насправді? Історичні джерела vs фольклорна гіперболізація'
  - 'Дебат 2: Байда = Дмитро Вишневецький? Ототожнення князя з епічним героєм — дискусія в українській фольклористиці'
  - '[!epistemic-humility] Романтична школа (Костомаров) вважала думи «живими хроніками». Структуралісти — художніми текстами з умовним зв''язком до реальності'
  - 'Глобальна синхронність: козацький героїчний епос vs сербські юнацькі пісні vs шотландські балади Border — паралельні традиції XVI-XVII ст.'
  words: 800
- section: 'Читання: Дума про Самійла Кішку'
  points:
  - Фрагмент тексту думи (оригінал) — бунт на галері, визволення бранців
  - 'Наративна структура: полон → хитрість → визволення → битва — чому саме цей порядок?'
  - 'Кішка як «розумний герой» (стратег) vs «сильний герой» (богатир) — що цінує народна традиція більше?'
  - '[!decolonization] Думи — УКРАЇНСЬКЕ, не «спільносхіднослов''янське» явище. Жодного аналога в російському фольклорі. Билини — інший жанр, інша поетика, інший етос.'
  words: 1000
- section: 'Читання: Дума про Байду'
  points:
  - Фрагмент тексту — Байда перед Султаном, відмова від ісламу та шлюбу з султанівною
  - 'Мотив мучеництва: смерть на гаку як свідомий вибір. Байда обирає загибель замість підкорення'
  - '[!anti-hagiography] Історичний Вишневецький — далеко не святий. Авантюрист, що переходив від одного сюзерена до іншого. Як народ «відредагував» реальну людину?'
  - 'Первинне джерело: лист султана Сулеймана про «козацькі напади» — погляд з іншого боку'
  words: 900
- section: 'Аналіз: Козацький ідеал лицарства'
  points:
  - 'Тріада козацьких цінностей: слава, побратимство, воля — не абстрактні поняття, а конкретний кодекс поведінки'
  - Морський похід як ініціація — юнак стає козаком лише через бойовий подвиг
  - 'Мовний аналіз: військова лексика (табір, ясир, чайка), тюркізми (бей, султан, галера), формульні епітети'
  - '[!myth-buster] «Козацька демократія» — реальність чи ретроспективний міф? Думи оспівують ієрархію (гетьман → отаман → козак), не рівність'
  words: 1000
- section: 'Дискусія та підсумок'
  points:
  - 'Повернення до розминки: Кішка — факт чи міф? Студент формулює відповідь із аргументами'
  - 'Ширше питання: навіщо народові потрібні «ідеальні герої»? Яку функцію виконує епос у суспільстві, що постійно воює?'
  - 'Зв''язок із сьогоденням: чи є сучасні пісні про Азовсталь та Маріуполь продовженням думової традиції?'
  words: 500
vocabulary_hints:
- word: звитяга
  pos: ж.
  definition: героїчний подвиг, вияв найвищої мужності в бою
- word: побратимство
  pos: с.
  definition: козацький союз вірності між двома воїнами, нерозривний до смерті
- word: слава
  pos: ж.
  definition: 'у козацькому етосі — не марнославство, а визнання жертовного служіння громаді'
- word: морський похід
  pos: ч.
  definition: козацький рейд на чайках через Чорне море до турецьких берегів
- word: ясир
  pos: ч.
  definition: полонені, захоплені під час набігу (тюркізм)
- word: чайка
  pos: ж.
  definition: козацький бойовий човен для морських походів
- word: гіперболізація
  pos: ж.
  definition: художнє перебільшення — прийом, яким народний епос підносить героя до надлюдських масштабів
- word: мучеництво
  pos: с.
  definition: свідома смерть за віру або переконання — ключовий мотив думи про Байду
- word: ініціація
  pos: ж.
  definition: обряд переходу в новий соціальний статус (юнак → козак)
- word: тюркізм
  pos: ч.
  definition: слово, запозичене з тюркських мов — численні в козацькому лексиконі
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Перевірка обох позицій дебату. Чия це теза — романтиків чи структуралістів? Визначити позицію за цитатою.'
  items: 4
- type: fill-in
  focus: Козацька та тюркська лексика
  description: 'Військові терміни з тексту дум: ясир, чайка, морський похід, табір, бей — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: текст думи vs історичний документ'
  description: 'Подано два тексти: фрагмент думи про Байду + фрагмент історичного документа про Вишневецького. Порівняйте: що спільне, що відрізняється, що «дописав» народний епос і чому?'
- type: note
  focus: 'Есе: Думова традиція і сьогодення'
  description: 'Пісні про захисників Маріуполя та Азовсталі поширюються в соцмережах. Чи є це продовженням думової традиції — чи принципово новим явищем? Аргументуйте, посилаючись на характеристики жанру думи (400-600 слів).'
