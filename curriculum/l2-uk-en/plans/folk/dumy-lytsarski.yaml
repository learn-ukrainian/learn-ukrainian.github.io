content_outline:
- points:
  - 'Провокація: Самійло Кішка — реальний гетьман чи казковий супергерой? Де межа між фактом і епосом?'
  - Фрагмент думи (3-4 рядки) без контексту — студент має визначити, про кого це і що відбувається
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи існував Самійло Кішка насправді? Історичні джерела vs фольклорна гіперболізація'
  - 'Дебат 2: Байда = Дмитро Вишневецький? Ототожнення князя з епічним героєм — дискусія в українській фольклористиці'
  - '[!epistemic-humility] Романтична школа (Костомаров) вважала думи «живими хроніками». Структуралісти — художніми текстами
    з умовним зв''язком до реальності'
  - 'Глобальна синхронність: козацький героїчний епос vs сербські юнацькі пісні vs шотландські балади Border — паралельні
    традиції XVI-XVII ст.'
  section: 'Конфліктна карта: Герой чи міф?'
  words: 920
- points:
  - Фрагмент тексту думи (оригінал) — бунт на галері, визволення бранців
  - 'Наративна структура: полон → хитрість → визволення → битва — чому саме цей порядок?'
  - Кішка як «розумний герой» (стратег) vs «сильний герой» (богатир) — що цінує народна традиція більше?
  - '[!decolonization] Думи — УКРАЇНСЬКЕ, не «спільносхіднослов''янське» явище. Жодного аналога в російському фольклорі. Билини
    — інший жанр, інша поетика, інший етос.'
  section: 'Читання: Дума про Самійла Кішку'
  words: 1120
- points:
  - Фрагмент тексту — Байда перед Султаном, відмова від ісламу та шлюбу з султанівною
  - 'Мотив мучеництва: смерть на гаку як свідомий вибір. Байда обирає загибель замість підкорення'
  - '[!anti-hagiography] Історичний Вишневецький — далеко не святий. Авантюрист, що переходив від одного сюзерена до іншого.
    Як народ «відредагував» реальну людину?'
  - 'Первинне джерело: лист султана Сулеймана про «козацькі напади» — погляд з іншого боку'
  section: 'Читання: Дума про Байду'
  words: 1020
- points:
  - 'Тріада козацьких цінностей: слава, побратимство, воля — не абстрактні поняття, а конкретний кодекс поведінки'
  - Морський похід як ініціація — юнак стає козаком лише через бойовий подвиг
  - 'Мовний аналіз: військова лексика (табір, ясир, чайка), тюркізми (бей, султан, галера), формульні епітети'
  - '[!myth-buster] «Козацька демократія» — реальність чи ретроспективний міф? Думи оспівують ієрархію (гетьман → отаман →
    козак), не рівність'
  section: 'Аналіз: Козацький ідеал лицарства'
  words: 1120
- points:
  - 'Повернення до розминки: Кішка — факт чи міф? Студент формулює відповідь із аргументами'
  - 'Ширше питання: навіщо народові потрібні «ідеальні герої»? Яку функцію виконує епос у суспільстві, що постійно воює?'
  - 'Зв''язок із сьогоденням: чи є сучасні пісні про Азовсталь та Маріуполь продовженням думової традиції?'
  section: Дискусія та підсумок
  words: 620
focus: Heroic dumas — Samiilo Kishka, Baida, Cossack martial ethos, epic vs history, martyrdom motif
level: FOLK
module: folk-019
objectives:
- Критично оцінювати відношення між історичним фактом та фольклорною гіперболізацією на прикладі лицарських дум
- Аналізувати повний текст думи з лінгвістичним та культурологічним коментарем
- Порівнювати козацький героїчний епос із паралельними європейськими традиціями (сербські юнацькі пісні, шотландські балади)
- Формулювати аргументовану позицію щодо функції героїчного епосу в суспільстві, що перебуває під екзистенційною загрозою
