content_outline:
- section: Розминка
  words: 560
  points:
  - 'Гачок-сцена: знахарка шепоче над хворою дитиною; слово не описує світ, а намагається його змінити'
  - 'ЛІТЕРАТУРНЕ відображення (П. Мирний, знахарка Вовчиха) — пристріт/уроки й народна медицина; verify_quote 1.0'
  - 'Дві загадки: замовляння — забобон, архаїка чи структурована словесна практика? І чому формулу так важко знайти записаною з перших уст?'
- section: 'Чому формулу так важко почути: джерела й чесна рамка'
  words: 800
  points:
  - 'Таємне, усне, виконавське слово вузького кола (знахар, шептуха, ворожбит) — берегли від чужого вуха, майже не записували'
  - 'Жанр із трьох рук: польові збирачі (Комаров, Сумцов, Малинка, Новицький, Милорадович, Шухевич, Єфименко 1874), наукові зведення (Грушевський, Енциклопедія українознавства), художня література'
  - '[!caution] Немає самостійного народного запису в корпусі — кожну формулу читаємо як запис-у-праці й називаємо джерело (kalendarna-патерн чесної джерельної рамки)'
  - 'Ключ читання: звернення → наказ → простір вигнання → закріплення (за «Енциклопедією українознавства»)'
- section: 'Конфліктна карта: суперечки навколо жанру'
  words: 680
  points:
  - 'Спір про назву: замовляння/заговір (укр.), а не «заговор»; «малоросійських» у Єфименка — історичний слід, не норма; регістр цитати vs регістр аналізу'
  - 'Спір про тип: двочленні «як-так» (Потебня — основний) vs одночленні наказові формули'
  - '[!epistemic-humility] Образ чи культ: засвідчений образ (дерево, місяць, вода) доводить обрядове мовлення, а не язичницький пантеон'
- section: 'Читання: формула зблизька'
  words: 1180
  points:
  - 'Стисла формула вигнання «Волос, волос, вийди на колос» (Енциклопедія українознавства, chunk feaa5fa7_c0588; verify_quote 1.0): звернення → наказ → простір'
  - 'Розгорнута формула «Я тебе виганяю, виклинаю, проклинаю! Йди пріч!...» (Енциклопедія українознавства; verify_quote 1.0): градація наказів, перелік безлюдних місць, нарощення зачину й переліку органів'
  - 'Примовка до молодика «Молодик-гвоздик, тобі роги красні, мені очі ясні!» (запис у зведенні М. Грушевського, chunk da46aa92_c0205; verify_quote 1.0): обмін «тобі-мені», двочленний тип'
  - 'Кровоспинне замовляння «Текло три ріки під калиновий міст...» (М. Грушевський; verify_quote 1.0): образна/функціональна магія'
- section: 'Аналіз: поетика дієвого слова'
  words: 900
  points:
  - 'Словесний і обрядовий текст в акті замовляння тотожні; естетична функція = утилітарна'
  - 'Чотири рухи формули (звернення, наказ, простір, закріплення) + [!tip] мнемоніка читання'
  - 'Простір як інструмент: своє/дике; лікувати = переселити, а не знищити'
  - 'Варіант як норма усної традиції; [!myth-box] «замовляння = темний забобон» vs структурована практика (радянська атеїстична операція знецінення)'
- section: 'Деколонізаційна рамка і висока культура'
  words: 840
  points:
  - '[!myth-box] «українські замовляння — різновид російських заговорів / безіменних загальнослов''янських» vs самостійний жанр із власною термінологією, виконавцями, історією збирання'
  - 'Три вимоги рамки: починати з українського (іменовані збирачі), не плутати образ із культом, не романтизувати «таємничу магію»'
  - '[!high-culture-bridge] народна формула → О. Гончар «Собор» (шептуха над мискою; verify_quote 1.0), Леся Українка, М. Йогансен; література зберігає й переписує («виклинаю» → «викликаю»)'
- section: Підсумок
  words: 440
  points:
  - 'Повернення до питання з «Розминки»: структурована словесна практика, не забобон і не сама лише архаїка'
  - 'Головний урок — про джерела: жанр дійшов із чужих рук, і чесний опис називає кожне'
  - 'Спосіб опису — теж дія: деколонізований опис робить те саме, що замовляння, — словом утверджує стан речей'
focus: Magic formulas, blessing and curse speech, ritual pragmatics, and oral performance contexts
level: FOLK
module: folk-003
objectives:
- Пояснювати жанр або культурну практику як частину ширшої системи народної культури.
- Аналізувати корпусні приклади, символи, формули або перформативні послідовності на основі досьє.
- Розпізнавати імперські, радянські або романтизовані міфи в описі теми й формулювати коректну рамку.
