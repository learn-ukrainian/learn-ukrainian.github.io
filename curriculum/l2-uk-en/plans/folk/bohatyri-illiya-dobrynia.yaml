content_outline:
- section: Вступ
  points:
  - Bogatyr as epic hero type — defender of the land
  - The triad — Ілля, Добриня, Альоша Попович
  words: 750
- section: Ілля Муромець
  points:
  - From paralyzed peasant to greatest bogatyr
  - Illness-and-cure motif as initiation pattern
  - Illia's conflicts with Volodymyr — tension between hero and king
  words: 950
- section: Добриня Нікітич
  points:
  - The courtly bogatyr — diplomat, musician, dragon-slayer
  - Dobrynia and the Zmiy — the archetypal dragon fight
  words: 850
- section: Типологія героїв
  points:
  - Strength (Ілля), wisdom (Добриня), cunning (Альоша)
  - Women warriors — Настасія Микулічна
  words: 800
- section: Текстовий аналіз
  points:
  - Close reading of key battle scenes with linguistic glosses
  - Epic formulas for arming, riding, fighting
  words: 850
- section: Підсумок
  points:
  - Bogatyr as ideal and critique — folk ambivalence about power
  - Vocabulary table
  words: 800
