objectives:
- Обґрунтовувати чернігівське/київське походження Іллі Муромця на основі історичних свідчень
- Інтерпретувати мотив хвороби-зцілення як ініціаційний сценарій
- Аналізувати типологію богатирів (сила, мудрість, хитрість) як систему цінностей
- Визнавати амбівалентність епічних героїв — не ідеали, а складні характери
