slug: bohatyri-illiya-dobrynia
version: '4.0'
title: 'Богатирський епос: Ілля Муромець та Добриня'
subtitle: 'Bogatyr Epic: Illia Muromets and Dobrynia'
focus: Illia as Chernihiv hero (not Murom), initiation motif (illness-cure), Dobrynia as dragon-slayer, hero typology (strength-wisdom-cunning), women warriors
phase: FOLK.3
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Факт: мощі «святого Іллі Муромця» зберігаються в Києво-Печерській лаврі. Якщо він з Мурому — чому в Києві?'
  - 'Питання: А якщо він НЕ з Мурому? Чижевський має докази'
  words: 400
- section: 'Конфліктна карта: Муром чи Моровськ?'
  points:
  - 'Дебат 1: Чижевський — Ілля належить до «чернігівського циклу». Свідчення: Лясота (1594) бачив мощі «Ілля Муравлина» в Києві. Кальнофойський (1638) називає його «Чоботок». Географія подвигів — Чернігів, не Муром'
  - 'Дебат 2: Російська версія — Ілля з Мурому (Владімірська область). Село Карачарово біля Мурому. Ця версія стала канонічною в XIX ст.'
  - '[!epistemic-humility] «Ім''я ''Муромець'' може бути пізньою деформацією ''Моровець'' (від Моровська на Чернігівщині). Але фонетична реконструкція — не безсумнівний доказ»'
  - 'Глобальна синхронність: Herakles (Греція), Cú Chulainn (Ірландія), Siegfried (Німеччина) — герой-воїн з надлюдською силою як архетип індоєвропейського епосу'
  words: 800
- section: 'Читання: Ілля — від хвороби до подвигу'
  points:
  - 'Мотив хвороби-зцілення: Ілля 30 років нерухомий, зцілений каліками перехожими. Пропп: це не «біографія», а ініціаційний сценарій — символічна смерть і перенародження'
  - 'Конфлікт з Володимиром — герой vs неблагодарний князь. Ілля ув''язнений, але визволяється для захисту Києва. Народна амбівалентність щодо влади'
  - 'Первинне джерело: фрагмент билини — зачин із Чернігівом/Муромом, формули озброєння'
  words: 1000
- section: 'Читання: Добриня — дипломат і змієборець'
  points:
  - 'Добриня Микитич — придворний богатир: музикант, дипломат, змієборець. «Поліфункціональний» герой (Чижевський)'
  - 'Бій зі Змієм — прадавній міфологічний мотив Перун vs Велес. Перемога = встановлення космічного порядку'
  - 'Настасія Микулічна — жінка-богатир. Поленіца, що б''є Добриню і стає його дружиною. Ґендерна амбівалентність епосу'
  - '[!decolonization] Добриня = історичний воєвода Добриня, дядько Володимира. Зв''язок із Київською Руссю — не з «Россией»'
  words: 900
- section: 'Аналіз: Типологія героїв'
  points:
  - 'Тріада: Ілля (сила), Добриня (мудрість), Альоша Попович (хитрість). Три способи перемоги — три типи героїчного'
  - '[!myth-buster] «Богатирі — ідеальні герої» — ні. Ілля буває жорстоким, Альоша — підступним, Добриня — зарозумілим. Епос не створює ідеалів — він досліджує людську природу'
  - '[!anti-hagiography] Володимир у билинах — не «мудрий правитель», а деспот, що ганьбить героїв. Народна пам''ять не прощає неблагодарної влади'
  words: 700
- section: Підсумок
  points:
  - 'Повернення до розминки: мощі в Києві — ще один доказ чернігівсько-київського зв''язку Ілля'
  - 'Ключова теза: богатирський епос — не «казка про силу», а складна система цінностей, де сила, мудрість і хитрість конкурують'
  words: 400
vocabulary_hints:
- word: змієборець
  pos: ч.
  definition: герой, що перемагає Змія — прадавній індоєвропейський мотив боротьби порядку з хаосом
- word: ініціація
  pos: ж.
  definition: обряд переходу — хвороба Іллі та зцілення як символічна смерть і перенародження
- word: поленіця
  pos: ж.
  definition: жінка-богатир у билинному епосі — воїтелька надлюдської сили
- word: двобій
  pos: ч.
  definition: поєдинок один на один між героєм та ворогом — центральний епізод билини
- word: палиця
  pos: ж.
  definition: бойова зброя богатиря — важка булава для ближнього бою
- word: застава
  pos: ж.
  definition: богатирський пост на степовому кордоні — оборонний рубіж Київської Русі
- word: калика
  pos: ч.
  definition: мандрівний паломник або жебрак зі сакральною силою — зцілителі Іллі
- word: кожум'яка
  pos: ч.
  definition: ремісник-шкіряник, що став героєм — типовий «народний герой» із низів
- word: амбівалентність
  pos: ж.
  definition: поєднання протилежних оцінок або якостей в одному образі
- word: чернігівський
  pos: прикм.
  definition: пов'язаний з Черніговом та Чернігівщиною — ключовий регіон для атрибуції Іллі
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: Ілля з Мурому (російська версія) чи з Моровська/Чернігівщини (українська)? Студент визначає позицію за історичним аргументом.'
  items: 4
- type: fill-in
  focus: Епічна та богатирська лексика
  description: 'Терміни: змієборець, ініціація, поленіця, двобій, амбівалентність — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: хвороба Іллі'
  description: 'Подано фрагмент билини про зцілення Іллі каліками перехожими. Студент аналізує: це «біографія» (реальна подія) чи ініціаційний сценарій (символічна смерть і перенародження)? Наведіть аргументи для обох версій.'
- type: note
  focus: 'Есе: Герой — сильний чи мудрий?'
  description: 'Три богатирі — три типи героїзму. Сучасна культура (фільми, серіали) також пропонує різні типи героїв. Який тип актуальніший сьогодні — і чому? (400-600 слів)'
