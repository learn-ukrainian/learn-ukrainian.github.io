content_outline:
- points:
  - 'Факт: мощі «святого Іллі Муромця» зберігаються в Києво-Печерській лаврі. Якщо він з Мурому — чому в Києві?'
  - 'Питання: А якщо він НЕ з Мурому? Чижевський має докази'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чижевський — Ілля належить до «чернігівського циклу». Свідчення: Лясота (1594) бачив мощі «Ілля Муравлина» в
    Києві. Кальнофойський (1638) називає його «Чоботок». Географія подвигів — Чернігів, не Муром'
  - 'Дебат 2: Російська версія — Ілля з Мурому (Владімірська область). Село Карачарово біля Мурому. Ця версія стала канонічною
    в XIX ст.'
  - '[!epistemic-humility] «Ім''я ''Муромець'' може бути пізньою деформацією ''Моровець'' (від Моровська на Чернігівщині).
    Але фонетична реконструкція — не безсумнівний доказ»'
  - 'Глобальна синхронність: Herakles (Греція), Cú Chulainn (Ірландія), Siegfried (Німеччина) — герой-воїн з надлюдською силою
    як архетип індоєвропейського епосу'
  section: 'Конфліктна карта: Муром чи Моровськ?'
  words: 1050
- points:
  - 'Мотив хвороби-зцілення: Ілля 30 років нерухомий, зцілений каліками перехожими. Пропп: це не «біографія», а ініціаційний
    сценарій — символічна смерть і перенародження'
  - Конфлікт з Володимиром — герой vs неблагодарний князь. Ілля ув'язнений, але визволяється для захисту Києва. Народна амбівалентність
    щодо влади
  - 'Первинне джерело: фрагмент билини — зачин із Чернігівом/Муромом, формули озброєння'
  section: 'Читання: Ілля — від хвороби до подвигу'
  words: 1250
- points:
  - 'Добриня Микитич — придворний богатир: музикант, дипломат, змієборець. «Поліфункціональний» герой (Чижевський)'
  - Бій зі Змієм — прадавній міфологічний мотив Перун vs Велес. Перемога = встановлення космічного порядку
  - Настасія Микулічна — жінка-богатир. Поленіца, що б'є Добриню і стає його дружиною. Ґендерна амбівалентність епосу
  - '[!decolonization] Добриня = історичний воєвода Добриня, дядько Володимира. Зв''язок із Київською Руссю — не з «Россией»'
  section: 'Читання: Добриня — дипломат і змієборець'
  words: 1150
- points:
  - 'Тріада: Ілля (сила), Добриня (мудрість), Альоша Попович (хитрість). Три способи перемоги — три типи героїчного'
  - '[!myth-buster] «Богатирі — ідеальні герої» — ні. Ілля буває жорстоким, Альоша — підступним, Добриня — зарозумілим. Епос
    не створює ідеалів — він досліджує людську природу'
  - '[!anti-hagiography] Володимир у билинах — не «мудрий правитель», а деспот, що ганьбить героїв. Народна пам''ять не прощає
    неблагодарної влади'
  section: 'Аналіз: Типологія героїв'
  words: 950
- points:
  - 'Повернення до розминки: мощі в Києві — ще один доказ чернігівсько-київського зв''язку Ілля'
  - 'Ключова теза: богатирський епос — не «казка про силу», а складна система цінностей, де сила, мудрість і хитрість конкурують'
  section: Підсумок
  words: 400
