objectives:
- Аналізувати степовий кордон як культурний код — не лише географію, а й систему символів
- Розуміти складність стосунків з кочівниками — не лише війна, а й торгівля та союзництво
- Працювати з билинним описом степу, розрізняючи описові та символічні елементи
- Простежувати безперервність від билинної застави до козацької Січі
