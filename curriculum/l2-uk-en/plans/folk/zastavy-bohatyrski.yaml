content_outline:
- points:
  - 'Костомаров: «...необозримые равнины, выжженные пожарами; печальные могилы — остатки неизвестной старины, темные леса,
    далекие степи...» — це опис простору, де живе козак'
  - 'Питання: Степ — це свобода чи небезпека? І чи можна відповісти «і те, і інше»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Літописна версія — степ = загроза, кочівники = ворог. Билини та думи кличуть до оборони'
  - 'Дебат 2: Попович — стосунки з кочівниками складніші за війну. Торговельні шляхи (Залозний, Соляний, Гречник) проходили
    через степ. Князі використовували половців як союзників. Соловйов: Мономах приводив половців 19 разів'
  - '[!epistemic-humility] «Билинний образ степу — ХУДОЖНІЙ, не документальний. Реальний степовий кордон був зоною обміну,
    а не лише стіною»'
  - 'Глобальна синхронність: limes romanus (Рим), Великий Мур (Китай), American Frontier (Тернер) — кордон між осілим і кочовим
    як універсальна тема'
  section: 'Конфліктна карта: Кордон як стіна чи як фронтир?'
  words: 1050
- points:
  - Дике Поле — «чисте поле» спочатку = відкрите, очищене від лісу, небезпечне (Попович). «Польовий» = «дикий» (паралель у
    слов'янських мовах)
  - Шляхи, роздоріжжя, каміння з написами — просторова символіка билини. Три шляхи на камені = три варіанти долі
  - Могила — НЕ просто пагорб, а пам'ятник, архів пам'яті. «Печальные могилы — остатки неизвестной старины» (Костомаров)
  - 'Первинне джерело: фрагмент билини з описом степу — рух богатиря через простір'
  section: 'Читання: Степ як епічний простір'
  words: 1250
- points:
  - 'Епічні вороги як кодування реальних загроз: печеніги, половці, монголи. Монструозне збільшення ворога — він стає чудовиськом'
  - Тугарин Змійович — Тугоркан? Ідолище Поганое — збірний образ кочівника. Калін-цар — хан Батий?
  - Одиночний двобій vs армія — в билині герой перемагає один. Індивідуальний героїзм як ідеал
  - '[!decolonization] Степовий кордон — УКРАЇНСЬКИЙ досвід. Москва не мала цього фронтиру до XV ст. Билинний степ — це Причорномор''я,
    а не Підмосков''я'
  section: 'Читання: Ворог — Ідолище, Тугарин, Калін'
  words: 1150
- points:
  - 'Безперервність: билинна застава → козацька Січ → лінія укріплень XVIII ст. Одна і та сама ідея — захист землі на кордоні
    з Диким Полем'
  - '[!myth-buster] «Козаки — спадкоємці богатирів» — романтичний міф. Насправді козацький етос відрізняється: рівність (не
    підкорення князеві), демократія (виборний отаман), морські походи (а не степовий дозор)'
  - '[!anti-hagiography] Степовий кордон — не лише «героїчна оборона». Це також зона работоргівлі, набігів, жорстокості з
    ОБОХ боків. Билини не показують страждання мирного населення'
  section: 'Аналіз: Від билинного степу до козацького'
  words: 950
- points:
  - 'Повернення до розминки: степ — і свобода, і небезпека. Цей дуалізм визначає всю українську культурну свідомість від билин
    до сучасності'
  - 'Ключова теза: степовий кордон — не географічна лінія, а культурний код, що структурує уявлення про «своє» і «чуже»'
  section: Підсумок
  words: 400
