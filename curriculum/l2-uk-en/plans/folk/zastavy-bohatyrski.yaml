slug: zastavy-bohatyrski
version: '4.0'
title: 'Застави богатирські: Образ степового кордону'
subtitle: 'Bogatyr Outposts: The Steppe Frontier Image'
focus: Steppe as liminal space between civilization and wild, frontier as zone of contact not just conflict, epic enemies as encoded nomadic threat, mogyla as memory archive
phase: FOLK.3
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Костомаров: «...необозримые равнины, выжженные пожарами; печальные могилы — остатки неизвестной старины, темные леса, далекие степи...» — це опис простору, де живе козак'
  - 'Питання: Степ — це свобода чи небезпека? І чи можна відповісти «і те, і інше»?'
  words: 400
- section: 'Конфліктна карта: Кордон як стіна чи як фронтир?'
  points:
  - 'Дебат 1: Літописна версія — степ = загроза, кочівники = ворог. Билини та думи кличуть до оборони'
  - 'Дебат 2: Попович — стосунки з кочівниками складніші за війну. Торговельні шляхи (Залозний, Соляний, Гречник) проходили через степ. Князі використовували половців як союзників. Соловйов: Мономах приводив половців 19 разів'
  - '[!epistemic-humility] «Билинний образ степу — ХУДОЖНІЙ, не документальний. Реальний степовий кордон був зоною обміну, а не лише стіною»'
  - 'Глобальна синхронність: limes romanus (Рим), Великий Мур (Китай), American Frontier (Тернер) — кордон між осілим і кочовим як універсальна тема'
  words: 800
- section: 'Читання: Степ як епічний простір'
  points:
  - 'Дике Поле — «чисте поле» спочатку = відкрите, очищене від лісу, небезпечне (Попович). «Польовий» = «дикий» (паралель у слов''янських мовах)'
  - 'Шляхи, роздоріжжя, каміння з написами — просторова символіка билини. Три шляхи на камені = три варіанти долі'
  - 'Могила — НЕ просто пагорб, а пам''ятник, архів пам''яті. «Печальные могилы — остатки неизвестной старины» (Костомаров)'
  - 'Первинне джерело: фрагмент билини з описом степу — рух богатиря через простір'
  words: 1000
- section: 'Читання: Ворог — Ідолище, Тугарин, Калін'
  points:
  - 'Епічні вороги як кодування реальних загроз: печеніги, половці, монголи. Монструозне збільшення ворога — він стає чудовиськом'
  - 'Тугарин Змійович — Тугоркан? Ідолище Поганое — збірний образ кочівника. Калін-цар — хан Батий?'
  - 'Одиночний двобій vs армія — в билині герой перемагає один. Індивідуальний героїзм як ідеал'
  - '[!decolonization] Степовий кордон — УКРАЇНСЬКИЙ досвід. Москва не мала цього фронтиру до XV ст. Билинний степ — це Причорномор''я, а не Підмосков''я'
  words: 900
- section: 'Аналіз: Від билинного степу до козацького'
  points:
  - 'Безперервність: билинна застава → козацька Січ → лінія укріплень XVIII ст. Одна і та сама ідея — захист землі на кордоні з Диким Полем'
  - '[!myth-buster] «Козаки — спадкоємці богатирів» — романтичний міф. Насправді козацький етос відрізняється: рівність (не підкорення князеві), демократія (виборний отаман), морські походи (а не степовий дозор)'
  - '[!anti-hagiography] Степовий кордон — не лише «героїчна оборона». Це також зона работоргівлі, набігів, жорстокості з ОБОХ боків. Билини не показують страждання мирного населення'
  words: 700
- section: Підсумок
  points:
  - 'Повернення до розминки: степ — і свобода, і небезпека. Цей дуалізм визначає всю українську культурну свідомість від билин до сучасності'
  - 'Ключова теза: степовий кордон — не географічна лінія, а культурний код, що структурує уявлення про «своє» і «чуже»'
  words: 400
vocabulary_hints:
- word: застава
  pos: ж.
  definition: богатирський пост на степовому кордоні — місце дозору та оборони
- word: степ
  pos: ч.
  definition: відкритий безлісний простір — одночасно символ свободи та небезпеки в епосі
- word: Дике Поле
  pos: с.
  definition: незаселений степ між осілими та кочовими народами — простір «нічий»
- word: кордон
  pos: ч.
  definition: 'у контексті модуля: не стіна, а порозниста зона обміну, конфлікту та взаємопроникнення'
- word: кочівник
  pos: ч.
  definition: людина, що веде кочовий спосіб життя — у билинах закодований як мустроподібний ворог
- word: двобій
  pos: ч.
  definition: поєдинок богатиря з епічним ворогом — центральний епізод билини
- word: дозор
  pos: ч.
  definition: охорона кордону, спостереження за ворогом — основна функція застави
- word: фронтир
  pos: ч.
  definition: рухомий кордон між освоєним і неосвоєним простором — тернерівська концепція
- word: могила
  pos: ж.
  definition: 'у степовому контексті: курган, насипаний пагорб — архів пам''яті в ландшафті'
- word: лімес
  pos: ч.
  definition: укріплений кордон Римської імперії — паралель до степового кордону
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: кордон як стіна (лише оборона) чи як фронтир (обмін + конфлікт)? Студент визначає позицію за описом стосунків із степом.'
  items: 4
- type: fill-in
  focus: Степова та військова лексика
  description: 'Терміни: застава, фронтир, Дике Поле, кочівник, дозор — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: билинний степ'
  description: 'Подано фрагмент билини з описом степового ландшафту (дорога, роздоріжжя, могили). Студент аналізує: які елементи описові, які символічні? Що означає «три шляхи» на камені?'
- type: note
  focus: 'Есе: Кордон як ідентичність'
  description: 'Україна — «країна на кордоні» (ukraine = u-krajina). Як степовий фронтир сформував українську ідентичність — від билин до сучасної війни? (400-600 слів)'
