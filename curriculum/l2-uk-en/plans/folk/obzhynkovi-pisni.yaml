content_outline:
- points:
  - 'Цитата Костомарова: «предмет телесный, входя в произведение народной поэзии, получает в ней духовное значение». Що це
    означає для жнив?'
  - 'Питання: Чому збирання зерна — не просто робота, а священнодійство?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Романтична версія (Костомаров) — обжинкові пісні як вираження гармонійного зв''язку хлібороба з природою. Праця
    = духовний акт, «душа хлібороба радіє»'
  - 'Дебат 2: Соціально-критична версія — в тих самих піснях звучать скарги на несправедливого господаря, втому, біль у спині.
    Пісня — не лише радість, а й протест'
  - '[!epistemic-humility] «Романтики XIX ст. бачили в жниварських піснях ''народний дух''. Але записувачі часто фільтрували
    — скарги на панів не завжди потрапляли до збірок»'
  - 'Глобальна синхронність: Erntedankfest (Німеччина), Sukkot (Ізраїль), Pongal (Індія), Lammas (кельти) — жнива як священний
    момент у всіх аграрних культурах'
  section: 'Конфліктна карта: Праця як культ чи як експлуатація?'
  words: 1075
- points:
  - 'Три Спаси: Медовий, Яблучний, Горіховий — благословення перших плодів, накладання християнського календаря на аграрний'
  - 'Три етапи жнив: зажинки (початок) → власне жнива → обжинки (завершення). Кожен етап має свій пісенний супровід'
  - Дідух (останній сніп) — не просто колосся, а дух поля. Його залишають, вносять до хати, вшановують як живу істоту
  - Обрядовий вінок зі снопів для господаря — величальні пісні, побажання достатку
  - 'Первинне джерело: фрагмент обжинкової пісні — прославлення жниці та побажання врожаю'
  section: 'Читання: Три Спаси та обжинкова обрядовість'
  words: 1375
- points:
  - 'Костомаров: «велике місце у світогляді українців посідає природа... трави, дерева, птахи — все дихає, мислить, відчуває
    разом з людиною»'
  - Ритм пісні = ритм праці. Серп, жниво, в'язання снопів — рухи тіла відображені у мелодиці та ритміці пісень
  - '[!decolonization] Хліборобська культура — серцевина українського світогляду. Це НЕ «відсталість» порівняно з номадизмом
    чи індустрією. Аграрний ритуальний цикл — одна з найскладніших культурних систем людства'
  - '[!myth-buster] «Щасливий хлібороб» — міф. Обжинкові пісні містять скарги на виснажливу працю, спрагу, біль. Величання
    — ПІСЛЯ завершення, як нагорода за страждання'
  section: 'Аналіз: Сакралізація праці'
  words: 1275
- points:
  - 'Повернення до розминки: студент формулює, як матеріальне (зерно) стає духовним (обряд)'
  - Дідух у сучасному побуті — символ Різдва, але без жнивного контексту. Трансформація символу
  - '[!anti-hagiography] Обжинки — не лише «радість праці». Для наймитів та наймичок це був день, коли панський серп нарешті
    відпускав. Соціальна ієрархія жнив'
  section: 'Дискусія: Що залишилося від жнив?'
  words: 675
- points:
  - Студент формулює відповідь із двох позицій — романтичної та критичної
  - 'Ключова теза: обжинкові пісні — не лише мистецтво, а документ, що фіксує світогляд суспільства на піку його річного циклу'
  section: Підсумок
  words: 400
