objectives:
- Критично аналізувати обжинкові пісні як одночасно мистецький твір та етнографічний документ
- Розуміти механізм сакралізації матеріальної праці в аграрному суспільстві
- Аналізувати символіку дідуха та обрядового вінка в контексті уявлень про дух поля
- Формулювати аргументовану позицію щодо романтизації vs критичного аналізу хліборобської культури
