slug: obzhynkovi-pisni
version: '4.0'
title: 'Обжинкові пісні: Апофеоз хліборобської праці'
subtitle: 'Harvest Songs: Apotheosis of the Grain Grower'
focus: Harvest as sacred act, last sheaf (didukh) symbolism, Tri Spasy, labor as spiritual practice, social tensions within harvest songs
phase: FOLK.1
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Цитата Костомарова: «предмет телесный, входя в произведение народной поэзии, получает в ней духовное значение». Що це означає для жнив?'
  - 'Питання: Чому збирання зерна — не просто робота, а священнодійство?'
  words: 400
- section: 'Конфліктна карта: Праця як культ чи як експлуатація?'
  points:
  - 'Дебат 1: Романтична версія (Костомаров) — обжинкові пісні як вираження гармонійного зв''язку хлібороба з природою. Праця = духовний акт, «душа хлібороба радіє»'
  - 'Дебат 2: Соціально-критична версія — в тих самих піснях звучать скарги на несправедливого господаря, втому, біль у спині. Пісня — не лише радість, а й протест'
  - '[!epistemic-humility] «Романтики XIX ст. бачили в жниварських піснях ''народний дух''. Але записувачі часто фільтрували — скарги на панів не завжди потрапляли до збірок»'
  - 'Глобальна синхронність: Erntedankfest (Німеччина), Sukkot (Ізраїль), Pongal (Індія), Lammas (кельти) — жнива як священний момент у всіх аграрних культурах'
  words: 800
- section: 'Читання: Три Спаси та обжинкова обрядовість'
  points:
  - 'Три Спаси: Медовий, Яблучний, Горіховий — благословення перших плодів, накладання християнського календаря на аграрний'
  - 'Три етапи жнив: зажинки (початок) → власне жнива → обжинки (завершення). Кожен етап має свій пісенний супровід'
  - 'Дідух (останній сніп) — не просто колосся, а дух поля. Його залишають, вносять до хати, вшановують як живу істоту'
  - 'Обрядовий вінок зі снопів для господаря — величальні пісні, побажання достатку'
  - 'Первинне джерело: фрагмент обжинкової пісні — прославлення жниці та побажання врожаю'
  words: 1100
- section: 'Аналіз: Сакралізація праці'
  points:
  - 'Костомаров: «велике місце у світогляді українців посідає природа... трави, дерева, птахи — все дихає, мислить, відчуває разом з людиною»'
  - 'Ритм пісні = ритм праці. Серп, жниво, в''язання снопів — рухи тіла відображені у мелодиці та ритміці пісень'
  - '[!decolonization] Хліборобська культура — серцевина українського світогляду. Це НЕ «відсталість» порівняно з номадизмом чи індустрією. Аграрний ритуальний цикл — одна з найскладніших культурних систем людства'
  - '[!myth-buster] «Щасливий хлібороб» — міф. Обжинкові пісні містять скарги на виснажливу працю, спрагу, біль. Величання — ПІСЛЯ завершення, як нагорода за страждання'
  words: 1000
- section: 'Дискусія: Що залишилося від жнив?'
  points:
  - 'Повернення до розминки: студент формулює, як матеріальне (зерно) стає духовним (обряд)'
  - 'Дідух у сучасному побуті — символ Різдва, але без жнивного контексту. Трансформація символу'
  - '[!anti-hagiography] Обжинки — не лише «радість праці». Для наймитів та наймичок це був день, коли панський серп нарешті відпускав. Соціальна ієрархія жнив'
  words: 400
- section: Підсумок
  points:
  - Студент формулює відповідь із двох позицій — романтичної та критичної
  - 'Ключова теза: обжинкові пісні — не лише мистецтво, а документ, що фіксує світогляд суспільства на піку його річного циклу'
  words: 400
vocabulary_hints:
- word: обжинки
  pos: мн.
  definition: завершальний етап жнив та відповідний обряд святкування успішного збору врожаю
- word: зажинки
  pos: мн.
  definition: початковий етап жнив та ритуальний обряд першого дня жниварської праці
- word: дідух
  pos: ч.
  definition: останній сніп, залишений на полі — символ духу поля, якого вносять до хати як оберіг
- word: хлібороб
  pos: ч.
  definition: людина, що вирощує хліб — центральна постать аграрного суспільства
- word: жниця
  pos: ж.
  definition: жінка, що жне серпом — одна з головних дійових осіб жнив та обжинкових пісень
- word: серп
  pos: ч.
  definition: знаряддя для жнивної праці — вигнутий ніж для зрізування колосся
- word: апофеоз
  pos: ч.
  definition: найвищий прояв чогось, обожнення, звеличення — в контексті модуля: прославлення праці
- word: сакралізація
  pos: ж.
  definition: наділення буденного явища священним, ритуальним значенням
- word: величальна
  pos: ж.
  definition: обрядова пісня, що прославляє людину — господаря, жницю, нареченого
- word: календарно-обрядовий
  pos: прикм.
  definition: такий, що прив'язаний до певної пори року та пов'язаного з нею ритуалу
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція позицій: романтична (праця = духовний акт) чи критична (праця = експлуатація)? Студент визначає за цитатою з пісні.'
  items: 4
- type: fill-in
  focus: Аграрна та обрядова лексика
  description: 'Терміни з тексту: обжинки, зажинки, дідух, серп, сакралізація — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: величальна vs скарга'
  description: 'Подано два фрагменти обжинкових пісень: (1) величальна пісня господареві, (2) пісня зі скаргою на важку працю. Порівняйте тон, лексику, адресата. Як одна традиція вміщує обидва голоси?'
- type: note
  focus: 'Есе: Дідух — символ чого?'
  description: 'Сучасний дідух — це різдвяна прикраса. Давній дідух — дух поля. Як і чому відбулася трансформація символу? Чи зберігається щось від початкового значення? Аргументуйте (400-600 слів).'
