content_outline:
- points:
  - 'Прислів''я: «Не біжить собака від калача, але від бича.» Питання: Це спостереження — чи філософія? Де межа між народною
    мудрістю та банальністю?'
  - 'Провокація: Прислів''я часто суперечать одне одному («Тихше їдеш — далі будеш» vs «Хто рано встає — тому Бог дає»). Як
    це можливо, якщо це «мудрість»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Романтична версія (Костомаров) — прислів''я як «несвідоме висловлювання народного духу». Джерело пізнання національного
    характеру'
  - 'Дебат 2: Критична версія — прислів''я як набір стереотипів та упереджень. «Жінка без розуму — бубон» — це «мудрість»
    чи сексизм?'
  - '[!epistemic-humility] «Прислів''я суперечать одне одному — тому що вони НЕ є системою. Це ситуативні відповіді на різні
    обставини, а не кодекс»'
  - 'Глобальна синхронність: китайський чеґяо (chengyu), арабські amsal, латинські proverbia, японські kotowaza — мала форма
    народної мудрості є УНІВЕРСАЛЬНИМ жанром'
  section: 'Конфліктна карта: Мудрість чи стереотип?'
  words: 1100
- points:
  - 'Прислів''я vs приказка: прислів''я = завершене судження («Без труда нема плода»), приказка = образний зворот без висновку
    («Як з гуся вода»)'
  - 'Поетика (Попович): тонічний вірш, обов''язкова рима (від латинської через польську), синтаксичний паралелізм двох половин,
    алітерація'
  - 'Чижевський: це «коротка формула» з дохристиянським корінням. Літописи містять вислови, що за структурою є пареміями'
  - 'Первинне джерело: 5-6 прислів''їв з різних тематичних груп — для аналізу структури'
  section: 'Читання: Структура та поетика'
  words: 1300
- points:
  - Праця («Без труда нема плода»), родина, справедливість, природа, розум vs дурість
  - 'Антивладні прислів''я: скептицизм до панів, попів, чиновників. «Закон як дишло — куди повернув, туди й вийшло» — системна
    недовіра до влади'
  - 'Костомаров: «у родинному й громадському житті українці прагнуть незалежності». Жінка «рівноправна з чоловіками і не терпить
    їхнього деспотизму» — це відображено в пареміях'
  - '[!decolonization] Збірка Номиса — перша систематична українська пареміологічна збірка. Це НАША пареміологія, а не «южнорусская»
    підкатегорія'
  - '[!myth-buster] «Народна мудрість завжди права» — ні. Прислів''я також транслюють ксенофобію, сексизм, забобони. Мудрість
    = відбір, а не сліпе прийняття'
  section: 'Аналіз: Тематичні групи та етика'
  words: 1300
- points:
  - 'Повернення до розминки: прислів''я суперечать одне одному — і це їхня СИЛА, а не слабкість. Життя суперечливе'
  - Чи використовує сучасна українська мова прислів'я — чи вони замінені мемами та цитатами?
  - '[!anti-hagiography] «Жінка без чоловіка — як сирота» — прислів''я патріархального суспільства. Як працювати з таким спадком?'
  section: 'Дискусія: Прислів''я живі?'
  words: 700
- points:
  - 'Ключова теза: прислів''я — не «мудрість предків», а найкомпактніша форма фіксації досвіду. Не кодекс, а інструмент'
  section: Підсумок
  words: 400
