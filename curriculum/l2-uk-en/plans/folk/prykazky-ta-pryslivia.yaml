slug: prykazky-ta-pryslivia
version: '4.0'
title: 'Приказки та прислів''я: Етика повсякдення'
subtitle: 'Proverbs and Sayings: Ethics of Everyday Life'
focus: Proverbs as condensed philosophy, tonic verse with rhyme, Nomis collection, anti-authority proverbs, Chyzhevsky on pre-Christian origins, binary structure
phase: FOLK.5
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Прислів''я: «Не біжить собака від калача, але від бича.» Питання: Це спостереження — чи філософія? Де межа між народною мудрістю та банальністю?'
  - 'Провокація: Прислів''я часто суперечать одне одному («Тихше їдеш — далі будеш» vs «Хто рано встає — тому Бог дає»). Як це можливо, якщо це «мудрість»?'
  words: 400
- section: 'Конфліктна карта: Мудрість чи стереотип?'
  points:
  - 'Дебат 1: Романтична версія (Костомаров) — прислів''я як «несвідоме висловлювання народного духу». Джерело пізнання національного характеру'
  - 'Дебат 2: Критична версія — прислів''я як набір стереотипів та упереджень. «Жінка без розуму — бубон» — це «мудрість» чи сексизм?'
  - '[!epistemic-humility] «Прислів''я суперечать одне одному — тому що вони НЕ є системою. Це ситуативні відповіді на різні обставини, а не кодекс»'
  - 'Глобальна синхронність: китайський чеґяо (chengyu), арабські amsal, латинські proverbia, японські kotowaza — мала форма народної мудрості є УНІВЕРСАЛЬНИМ жанром'
  words: 800
- section: 'Читання: Структура та поетика'
  points:
  - 'Прислів''я vs приказка: прислів''я = завершене судження («Без труда нема плода»), приказка = образний зворот без висновку («Як з гуся вода»)'
  - 'Поетика (Попович): тонічний вірш, обов''язкова рима (від латинської через польську), синтаксичний паралелізм двох половин, алітерація'
  - 'Чижевський: це «коротка формула» з дохристиянським корінням. Літописи містять вислови, що за структурою є пареміями'
  - 'Первинне джерело: 5-6 прислів''їв з різних тематичних груп — для аналізу структури'
  words: 1000
- section: 'Аналіз: Тематичні групи та етика'
  points:
  - 'Праця («Без труда нема плода»), родина, справедливість, природа, розум vs дурість'
  - 'Антивладні прислів''я: скептицизм до панів, попів, чиновників. «Закон як дишло — куди повернув, туди й вийшло» — системна недовіра до влади'
  - 'Костомаров: «у родинному й громадському житті українці прагнуть незалежності». Жінка «рівноправна з чоловіками і не терпить їхнього деспотизму» — це відображено в пареміях'
  - '[!decolonization] Збірка Номиса — перша систематична українська пареміологічна збірка. Це НАША пареміологія, а не «южнорусская» підкатегорія'
  - '[!myth-buster] «Народна мудрість завжди права» — ні. Прислів''я також транслюють ксенофобію, сексизм, забобони. Мудрість = відбір, а не сліпе прийняття'
  words: 1000
- section: 'Дискусія: Прислів''я живі?'
  points:
  - 'Повернення до розминки: прислів''я суперечать одне одному — і це їхня СИЛА, а не слабкість. Життя суперечливе'
  - 'Чи використовує сучасна українська мова прислів''я — чи вони замінені мемами та цитатами?'
  - '[!anti-hagiography] «Жінка без чоловіка — як сирота» — прислів''я патріархального суспільства. Як працювати з таким спадком?'
  words: 400
- section: Підсумок
  points:
  - 'Ключова теза: прислів''я — не «мудрість предків», а найкомпактніша форма фіксації досвіду. Не кодекс, а інструмент'
  words: 400
vocabulary_hints:
- word: прислів'я
  pos: с.
  definition: короткий влучний вислів із завершеним судженням — «Без труда нема плода»
- word: приказка
  pos: ж.
  definition: образний зворот без закінченого судження — «Як з гуся вода»
- word: пареміологія
  pos: ж.
  definition: наука про прислів'я та приказки (паремії) як культурний феномен
- word: антитеза
  pos: ж.
  definition: протиставлення двох понять для підсилення думки — основний структурний прийом прислів'їв
- word: алітерація
  pos: ж.
  definition: повторення однакових приголосних на початку сусідніх слів — звуковий прийом
- word: паралелізм
  pos: ч.
  definition: повторення подібних конструкцій — бінарна структура прислів'я (X, а Y)
- word: тонічний
  pos: прикм.
  definition: такий, де ритм створюється кількістю наголосів, а не складів — ритмічна основа паремій
- word: афоризм
  pos: ч.
  definition: короткий влучний вислів із глибоким значенням — літературний родич прислів'я
- word: скептицизм
  pos: ч.
  definition: 'критичне ставлення, схильність до сумніву — в пареміях: недовіра до влади'
- word: дидактичний
  pos: прикм.
  definition: повчальний — основна функція прислів'їв
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: романтична (прислів''я = народний дух) чи критична (прислів''я = набір стереотипів)? Студент визначає за прислів''ям — яка версія краще його пояснює.'
  items: 4
- type: fill-in
  focus: Пареміологічна лексика
  description: 'Терміни: антитеза, паралелізм, пареміологія, тонічний, скептицизм — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: 4 прислів''я'
  description: 'Подано 4 прислів''я — про працю, жінку, владу, природу. Студент аналізує кожне: (1) яка структура (антитеза? паралелізм?), (2) яка цінність виражена, (3) чи актуальне сьогодні — чи застаріло?'
- type: note
  focus: 'Есе: Прислів''я vs мем'
  description: 'Прислів''я — мала форма, що фіксує досвід. Інтернет-мем — теж мала форма, що фіксує реакцію. Чи є мем «прислів''ям XXI століття» — чи принципово іншим явищем? (400-600 слів)'
