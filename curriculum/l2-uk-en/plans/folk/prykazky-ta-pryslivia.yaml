objectives:
- Розрізняти прислів'я та приказку за структурними ознаками — завершене судження vs образний зворот
- Аналізувати поетику малої форми — ритм, рима, паралелізм, антитеза
- Критично оцінювати «народну мудрість» — визнаючи як цінність, так і стереотипність паремій
- Формулювати позицію щодо живучості прислів'їв у сучасній мові
