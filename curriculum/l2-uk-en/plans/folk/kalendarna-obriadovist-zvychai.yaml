content_outline:
- section: Розминка
  words: 380
  points:
  - 'Гачок на корпусній веснянці «Ой весна, весна, ти красна» — пісня звертається до пори року на «ти» й вимагає відповіді'
  - 'Провокаційне питання: календарний фольклор — це «проста забава» чи зв''язана система дій із власною логікою?'
  - Чотири опори року (зима/весна/літо/осінь) і обіцянка пройти їх крізь першоджерела
- section: 'Конфліктна карта: чотири цикли, чотири суперечки'
  words: 730
  points:
  - 'Схема типів доказу: походження назви vs давнина тексту vs обрядова дія vs порівняння з сусідами'
  - 'Суперечка 1: опис зсередини (українські назви, регіони, збирачі) vs «загальнослов''янська» рамка'
  - 'Суперечка 2: засвідчений образ vs доведений культ — наукова стриманість, без добудови язичницького «пантеону»'
  - '[!epistemic-humility] Реконструкції на кшталт «Лелю-Ладо» — обережно: рефрен засвідчує обрядове мовлення, але не доводить бога з таким іменем'
  - 'Суперечка 3: синкретизм — який пласт давніший і як вони тримаються разом'
  - 'Три робочі поняття як апарат: обряд, мотив, варіант'
- section: 'Читання: рік крізь першоджерела'
  words: 1540
  points:
  - Астрономічний кістяк року (сонцестояння та рівнодення) і зв'язок із хліборобською працею
  - 'Зима: кутя, дідух, колядка/щедрівка/посівання; корпусні читання «Щедрик, щедрик, щедрівочка» та «Ой над Дунаєм, над береженьком»; обрядовий гурт (береза, міхоноша, ряджені); календар днів від Святвечора до Водохреща'
  - 'Весна: веснянки/гаївки/гагілки, антифонність, продукувальна магія; корпусне читання «Ой весна, весна, ти красна»; кривий vs коловий танець'
  - 'Літо: Купало, вода й вогонь, гільце, опудало, синкретизм з Іваном; корпус-чесність — купальський текст дійшов лише в чужому переказі (reading-needed)'
  - 'Осінь: обжинки, «борода», останній сніп, золотий вінок, процесія; корпус-чесність — обжинкові пісні дійшли в записах збирачів (reading-needed)'
  - 'Метанавичка «Як читати обрядовий текст»: дія → мотив → варіант, із розібраним прикладом'
- section: 'Аналіз: поетика обрядового слова'
  words: 890
  points:
  - 'Чотири ключі: перформативність, формульність, синкретизм, варіантність'
  - 'Наскрізний мотив достатку, що зшиває всі цикли'
  - 'Страва, реквізит і простір як рівноправні обрядові дієвці; гурт як колективний виконавець'
  - '[!myth-buster] «Щедрик» Леонтовича → «Carol of the Bells»: висока культура з обрядового коріння й питання культурного привласнення'
- section: Деколонізаційна рамка
  words: 770
  points:
  - '[!decolonization] Імперсько-радянське знеособлення обрядовості в «загальнослов''янському» матеріалі'
  - 'Міф 1: «проста народна розвага» — доброзичливе знецінення системи вірувань'
  - 'Міф 2: «регіональний відтінок спільної спадщини» — стирання власного центру'
  - 'Три вимоги рамки: починати з українського, описувати зсередини, зберігати наукову стриманість'
- section: 'Дискусія: що вижило і чому'
  words: 770
  points:
  - 'Конкурентні гіпотези тривкості: ритуальна необхідність vs прихований спротив vs консерватизм побуту'
  - '[!anti-hagiography] Не романтизувати село: корпусна «Ой виорю я нивку широкую» як чесний контрапункт — соціальна нерівність, доля багатої й убогої сестри'
  - Як критично працювати з темними мотивами; ролі етнографа й аналітика
  - 'Сучасність: колядування й щедрування в 2022–2025 рр. — нове значення старого обряду'
- section: Підсумок
  words: 420
  points:
  - 'Повернення до питання з «Розминки»: забава чи система?'
  - Обряд/мотив/варіант як винесений апарат; межі джерела (нерівність корпусу циклів)
  - Методологічний урок за межі фольклору — право народу називати власну культуру
