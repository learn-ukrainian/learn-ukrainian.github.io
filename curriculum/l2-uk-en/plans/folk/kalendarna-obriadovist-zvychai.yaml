module: folk-002
level: FOLK
sequence: 2
slug: kalendarna-obriadovist-zvychai
title: "Календарна обрядовість і звичаї"
subtitle: "Calendar rites as oral tradition, Christian heritage, and literary source"
version: 2
status: locked
phase: base-first
cefr_min: C1
word_target: 4000
focus: "A clean source-first map of the Ukrainian ritual year: winter, spring, summer, and harvest cycles as verbal art and performance."
persona: "C1+ seminar learner reading calendar folklore through public primary texts, school canon, and careful framing."
objectives:
  - "Пояснити календарну обрядовість як річну систему пісні, звичаю, часу, предмета, виконавця і громади."
  - "Розрізняти зимовий, весняний, літній і жниварський цикли без змішування їхніх жанрів і функцій."
  - "Читати календарну пісню через виконавську ситуацію: хто співає, коли, для кого, поруч із якою дією."
  - "Використовувати лише публічні джерела для learner-facing цитування й не переносити службові корпусні позначки в урок."
  - "Утримувати християнсько-історичну рамку української культури без зниження Різдва, Великодня або вертепу до зовнішнього шару."
pedagogy:
  approach: "source-first seminar map"
  notes:
    - "Start from two clean public readings, then build the yearly map."
    - "M02 is an overview; detailed genre work belongs in later block B modules."
    - "Use FOLK framing standard as a hard gate before module/readings build."
content_outline:
  - section: "Постановка проблеми"
    words: 550
    points:
      - "Why calendar folklore is not a holiday list: text, time, action, object, performer, community."
      - "Source discipline: public reading URL first; school-canonical framing second; no internal source labels in learner-facing materials."
  - section: "Карта річного кола"
    words: 950
    points:
      - "Winter cycle: Christmas, Щедрий вечір, Маланка, Василь, обхідний гурт, колядка, щедрівка, вертеп."
      - "Spring cycle: веснянки, гаївки, ягілки, великодній час, group movement, question-answer forms."
      - "Summer cycle: Купало, Зелені свята, rusalia-linked songs as seasonal poetic material to be handled carefully in later modules."
      - "Harvest cycle: зажинки, жнива, обжинки, last sheaf/wreath, procession, shared labor memory."
  - section: "Первинні читання"
    words: 850
    points:
      - "Read 'Ой сивая та і зозулечка' as winter well-wishing song: refrain, addressee, house, garden, prosperity image."
      - "Read 'Ой весна, весна, ти красна' as spring song: dialogue, season, grain, flowers, communal voice."
      - "Name but do not duplicate later readings for koliadky, kupalski/rusalni, zhnyvarski/obzhynkovi until public full texts are cleaned."
  - section: "Виконавська ситуація і поетика"
    words: 850
    points:
      - "Track who performs: family, children, youth group, carol group, harvest workers."
      - "Analyze repetition, refrain, address, parallelism, short stanza, movement, and call-response."
      - "Connect object and space: table, door, yard, churchyard, field, wreath, sheaf, road."
  - section: "Деколонізаційна рамка"
    words: 550
    points:
      - "Reject reduction of Ukrainian calendar tradition to decorative ethnography."
      - "Show Ukrainian as a language for ordering time, work, blessing, home, and public memory."
      - "Keep source limits visible: one public text is one recorded variant, not the whole living tradition."
  - section: "Міст до писемної культури"
    words: 250
    points:
      - "Recorded calendar songs become school readings, choral transformations, drama, and literary memory."
      - "Set up later modules in block B without repeating their full analysis."
activity_hints:
  - type: cycle-map
    placement: inline
    focus: "Classify a text by time, performer, addressee, action, object, and public source."
  - type: source-check
    placement: workbook
    focus: "Given a citation, decide whether it is learner-facing public source or internal-only research note."
  - type: comparative-reading
    placement: workbook
    focus: "Compare winter щедрівка and spring веснянка by refrain, address, season, and community role."
