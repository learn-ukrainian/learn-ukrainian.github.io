objectives:
- Аналізувати невільницькі думи як систему фіксації колективної травми з унікальною поетикою
- Інтерпретувати образ Марусі Богуславки як приклад складної народної моралі — героїзм ПОПРИ зраду
- Працювати з символічним кодом дум — зозуля, явір, Дніпро, степ — як з мовою вигнання
- Порівнювати невільницькі думи з іншими традиціями поезії поневолення
