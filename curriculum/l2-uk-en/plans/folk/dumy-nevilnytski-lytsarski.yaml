content_outline:
- points:
  - 'Гак: козак, прикутий до весла турецької галери, звертається до Дніпра, вітру, зозулі — благає передати
    звістку додому, хоч знає, що ріка не почує. Навіщо?'
  - 'Центральне питання: коли людину відрізано від церкви, календаря, рідної мови — до кого вона звертається?
    Чому до природних стихій?'
  - 'Анонс руху семінару: модель близького читання → кероване читання чотирьох текстів → поетика й історичний
    ґрунт → деколонізаційна рамка → повернення до питання'
  section: Розминка
  words: 450
- points:
  - 'Розрізнення трьох планів: про що дума говорить (сюжет) / як говорить (поетика) / що з нею робила громада
    (функція)'
  - 'Дебат 1: Чижевський — психологізм над героїкою; герой не воїн, а змучена душа; центральна дія — плач.
    Подвійні синоніми «плаче-ридає», «кляне-проклинає»'
  - 'Дебат 2: героїчна версія — Кішка, Богуславка, троє братів. Опір навіть у полоні'
  - '[!epistemic-humility] Епос виживання недочуває мертвих: складали ті, хто повернувся; тисячі, хто не
    повернувся, поза піснею'
  - 'Транскультурна рамка без розчинення: дума в ряду світової поезії втрати, але питомо українська'
  section: 'Конфліктна карта: Епос жертв чи героїв?'
  words: 800
- points:
  - 'Модель близького читання (центральний педагогічний прийом): назви ситуацію → знайди прийом → сформулюй
    висновок. Прикладається до кожного тексту'
  - 'Плач невільників: колективний/анонімний голос; негативне порівняння «не сизі орли заклекотали»; стала
    молитовна формула «тихі води, ясні зорі»; символічний код (зозуля, явір, Дніпро); будова плачу'
  - 'Маруся Богуславка: голос вибору; «потурчилась… для розкоші»; жіноча агентність; складна мораль ПОПРИ
    зраду (не агіографія)'
  - 'Самійло Кішка: воля з дна; побратимство як лицарська етика; потрійний паралелізм «трьома цвітами»; Лях
    Бутурлак — неоднозначний зрадник'
  - 'Троє братів азовських: ціна вибору; той самий негативний зачин, що й у плачі; зрада побратимства; моральна
    шкала циклу'
  section: 'Читання: як читати невільницьку думу'
  words: 1900
- points:
  - 'Поетика: символічний код, стала формула, подвійні синоніми (Чижевський), негативне порівняння —
    усі підносять приватне до спільного'
  - 'Історичний ґрунт: ясир, ринки Кафи, галери-каторги; козацькі морські походи; Костомаров — рейди теж
    робили бранців, війна не чорно-біла'
  - '[!epistemic-humility] Чий голос ми чуємо — тих, хто вижив; загиблі поза піснею'
  - 'Як звучала дума: кобзар/лірник, речитатив, кобза/бандура/ліра; ліро-епічний жанр, не історична пісня;
    обряд зосередженого слухання; усність як спосіб виживання тексту'
  section: 'Аналіз: поетика плачу й історичний ґрунт'
  words: 1150
- points:
  - 'Імперська/радянська рамка: кобзарський епос як «південноруська»/«загальноруська» чи безіменна
    «східнослов''янська» старовина (навіть Чижевський порівнює з російським епосом)'
  - 'Деколонізований опис зсередини: українська мова речитативу, козацько-чорноморський досвід, український
    кобзар; Маруся/Самійло — власні герої власної традиції'
  - 'Дисципліна деколонізації: не домальовувати давнини, не зводити до суцільної героїки; тримати складність'
  - 'Записи Лисенка й Колесси зафіксували живий голос перед майже урваною традицією; Попович — кобзарі як
    охоронці пам''яті; сучасна вага слів «неволя/полон/визволення» (2022–2025)'
  section: 'Деколонізаційна рамка: чий це епос і чий голос'
  words: 800
- points:
  - 'Повернення до розминки: ріка, вітер, птах — єдині посланці через межу неволі; звертання до природи —
    точна поетична логіка, а не наївність'
  - 'Головна теза: старший цикл — одна з найдавніших у Європі систем фіксації колективної травми; моральна
    шкала чотирьох текстів; навіщо повертатися сьогодні'
  section: Підсумок
  words: 450
