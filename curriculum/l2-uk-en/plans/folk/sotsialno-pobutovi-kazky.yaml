content_outline:
- points:
  - 'Анекдотична ситуація з казки: наймит дурить пана — студент вгадує, хто переможе. Спойлер: у побутовій казці ЗАВЖДИ перемагає
    слабший'
  - 'Провокація: Чому народ вигадав казки, де бідний мужик ЗАВЖДИ розумніший за багатого пана? Це правда — чи мрія?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Костомаров — народна пісня (і казка) є «істиною», несвідомим вираженням народного характеру. Казки показують
    «внутрішнє життя» народу — побут, мораль, цінності'
  - 'Дебат 2: Критична версія — побутові казки як компенсаторна фантазія. Народ, що не міг перемогти пана в реальності, перемагав
    його в казці. Це не «реалізм», а мрія про справедливість'
  - '[!epistemic-humility] «Костомаров попередив: в піснях не шукайте літописної точності. Але якщо це не точний опис — то
    що саме вони відображають?»'
  - 'Глобальна синхронність: Nasreddin (Туреччина/Персія), Birbal (Індія), Till Eulenspiegel (Німеччина) — розумний простак,
    що дурить владу — архетип у всіх культурах'
  section: 'Конфліктна карта: Реалізм чи компенсація?'
  words: 1200
- points:
  - Пан — дурний, жадібний, далекий від реального життя. Піп — лицемірний, корисливий. Чорт — не страшний, а скоріше нещасний
    та дурний
  - 'Інверсія ієрархії: у казці соціальний порядок перевернутий. Наймит командує паном, мужик вчить попа, жінка проганяє чорта'
  - 'Стороженко як літературна обробка: «Скарб», «Жонатий чорт», «Вчи лінивого не молотом, а голодом» — монтаж із народних
    анекдотів та казок (Чижевський)'
  - 'Первинне джерело: фрагмент казки про розумного наймита — діалог із паном'
  section: 'Читання: Антигерої — пан, піп, чорт'
  words: 1400
- points:
  - 'Костомаров: «Нам треба побачити бідного поселянина в його хаті, прислухатися до його домашньої мови» — фольклор як дзеркало
    «внутрішнього життя»'
  - 'Потебня: шлях «від сутності фольклорних образів до закладеної в них системи народного мислення» — не реалізм факту, а
    реалізм світогляду'
  - '[!decolonization] Побутові казки — не «примітивний» жанр. Це складна система соціальної критики, що функціонувала в умовах,
    коли відкритий протест був неможливий'
  - '[!myth-buster] «Щаслива розв''язка» — не завжди. В деяких казках розумний наймит програє, жадібний пан перемагає. Народний
    реалізм — не завжди оптимістичний'
  section: 'Аналіз: Народний реалізм як концепція'
  words: 1400
- points:
  - 'Повернення до розминки: перемога слабшого — це і мрія, і соціальна програма. Казка моделює справедливий світ'
  - 'Ґендер у побутових казках: «лінива жінка», «дурний чоловік» — народна комедія чи транслювання стереотипів?'
  - '[!anti-hagiography] Казки також транслюють упередження: антисемітські сюжети, ксенофобські мотиви. «Народна мудрість»
    — не завжди мудра'
  section: Дискусія та підсумок
  words: 800
focus: Folk realism as worldview not photographic accuracy, clever peasant vs powerful fool, humor as weapon of powerless,
  Kostоmarov concept of internal history
level: FOLK
module: folk-010
objectives:
- Критично аналізувати концепцію «народного реалізму» Костомарова — що саме реалістичне в побутових казках
- Інтерпретувати інверсію соціальної ієрархії як механізм народної критики та компенсаторної фантазії
- Порівнювати народну казку з її літературною обробкою (Стороженко, Квітка-Основ'яненко)
- Формулювати позицію щодо етичної амбівалентності «народної мудрості»
