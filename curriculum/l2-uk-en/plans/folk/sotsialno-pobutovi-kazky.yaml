slug: sotsialno-pobutovi-kazky
version: '4.0'
title: 'Соціально-побутові казки: Народний реалізм'
subtitle: 'Everyday Tales: Folk Realism'
focus: Folk realism as worldview not photographic accuracy, clever peasant vs powerful fool, humor as weapon of powerless, Kostоmarov concept of internal history
phase: FOLK.2
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Анекдотична ситуація з казки: наймит дурить пана — студент вгадує, хто переможе. Спойлер: у побутовій казці ЗАВЖДИ перемагає слабший'
  - 'Провокація: Чому народ вигадав казки, де бідний мужик ЗАВЖДИ розумніший за багатого пана? Це правда — чи мрія?'
  words: 400
- section: 'Конфліктна карта: Реалізм чи компенсація?'
  points:
  - 'Дебат 1: Костомаров — народна пісня (і казка) є «істиною», несвідомим вираженням народного характеру. Казки показують «внутрішнє життя» народу — побут, мораль, цінності'
  - 'Дебат 2: Критична версія — побутові казки як компенсаторна фантазія. Народ, що не міг перемогти пана в реальності, перемагав його в казці. Це не «реалізм», а мрія про справедливість'
  - '[!epistemic-humility] «Костомаров попередив: в піснях не шукайте літописної точності. Але якщо це не точний опис — то що саме вони відображають?»'
  - 'Глобальна синхронність: Nasreddin (Туреччина/Персія), Birbal (Індія), Till Eulenspiegel (Німеччина) — розумний простак, що дурить владу — архетип у всіх культурах'
  words: 800
- section: 'Читання: Антигерої — пан, піп, чорт'
  points:
  - 'Пан — дурний, жадібний, далекий від реального життя. Піп — лицемірний, корисливий. Чорт — не страшний, а скоріше нещасний та дурний'
  - 'Інверсія ієрархії: у казці соціальний порядок перевернутий. Наймит командує паном, мужик вчить попа, жінка проганяє чорта'
  - 'Стороженко як літературна обробка: «Скарб», «Жонатий чорт», «Вчи лінивого не молотом, а голодом» — монтаж із народних анекдотів та казок (Чижевський)'
  - 'Первинне джерело: фрагмент казки про розумного наймита — діалог із паном'
  words: 1000
- section: 'Аналіз: Народний реалізм як концепція'
  points:
  - 'Костомаров: «Нам треба побачити бідного поселянина в його хаті, прислухатися до його домашньої мови» — фольклор як дзеркало «внутрішнього життя»'
  - 'Потебня: шлях «від сутності фольклорних образів до закладеної в них системи народного мислення» — не реалізм факту, а реалізм світогляду'
  - '[!decolonization] Побутові казки — не «примітивний» жанр. Це складна система соціальної критики, що функціонувала в умовах, коли відкритий протест був неможливий'
  - '[!myth-buster] «Щаслива розв''язка» — не завжди. В деяких казках розумний наймит програє, жадібний пан перемагає. Народний реалізм — не завжди оптимістичний'
  words: 1000
- section: Дискусія та підсумок
  points:
  - 'Повернення до розминки: перемога слабшого — це і мрія, і соціальна програма. Казка моделює справедливий світ'
  - 'Ґендер у побутових казках: «лінива жінка», «дурний чоловік» — народна комедія чи транслювання стереотипів?'
  - '[!anti-hagiography] Казки також транслюють упередження: антисемітські сюжети, ксенофобські мотиви. «Народна мудрість» — не завжди мудра'
  words: 400
vocabulary_hints:
- word: побутовий
  pos: прикм.
  definition: пов'язаний з повсякденним життям, домашнім устроєм та соціальними стосунками
- word: сатира
  pos: ж.
  definition: різке висміювання суспільних вад через комічні ситуації та образи
- word: наймит
  pos: ч.
  definition: найманий робітник у панському господарстві — часто герой побутових казок
- word: інверсія
  pos: ж.
  definition: перевертання, протиставлення звичного порядку — соціальна ієрархія перевертається у казці
- word: дотепність
  pos: ж.
  definition: здатність швидко та влучно відповідати — головна зброя казкового наймита
- word: компенсаторний
  pos: прикм.
  definition: такий, що відшкодовує, заміщує — казка як компенсація за несправедливість реального життя
- word: пареміологія
  pos: ж.
  definition: наука про прислів'я та приказки — побутові казки часто вбудовують паремії у наратив
- word: хитрощі
  pos: мн.
  definition: вигадливі прийоми, спрямовані на обман сильнішого — основна стратегія казкового героя
- word: етнографія
  pos: ж.
  definition: наука про побут, звичаї та культуру народів — побутові казки є етнографічним джерелом
- word: справедливість
  pos: ж.
  definition: відповідність між вчинком і нагородою/покаранням — центральна цінність побутових казок
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: реалістична версія (казки як дзеркало життя) чи компенсаторна (казки як мрія про справедливість)? Студент визначає за цитатою.'
  items: 4
- type: fill-in
  focus: Соціальна та фольклористична лексика
  description: 'Терміни: інверсія, компенсаторний, дотепність, етнографія, пареміологія — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: казка vs Стороженко'
  description: 'Подано два тексти: (1) народна казка про наймита й пана, (2) оповідання Стороженка на той самий сюжет. Порівняйте: що додає літературна обробка? Чи зберігається «народний голос»?'
- type: note
  focus: 'Есе: Сміх як зброя'
  description: 'У побутових казках безсилий мужик перемагає могутнього пана через гумор і хитрість. Чи працює цей механізм у сучасному суспільстві — наприклад, в інтернет-мемах та сатирі? (400-600 слів)'
