slug: kobzarstvo-fenomen
version: '4.0'
title: Кобзарство як унікальний феномен
subtitle: Kobzarstvo as a Unique Phenomenon
focus: Blind kobzars as sacred institution, guild system, lebiyska mova, Soviet destruction, modern revival and its contradictions
phase: FOLK.4
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Фото 1930-х: сліпі кобзарі на базарі. Через кілька років їх усіх розстріляють. Чому?'
  - 'Питання: Що настільки небезпечного в сліпому старому чоловіку з бандурою, що тоталітарна держава вирішила його знищити?'
  words: 400
- section: 'Конфліктна карта: Кобзар — жебрак, святий чи агент впливу?'
  points:
  - 'Дебат 1: Романтична версія (Шевченко, Костомаров) — кобзар як «голос народу», сакральна фігура, живий літопис'
  - 'Дебат 2: Соціально-економічна версія — кобзарство як професійне жебрацтво сліпих, цехова монополія на милостиню'
  - '[!epistemic-humility] Обидві версії мають докази. Романтики ідеалізували. Соціологи десакралізували. Істина — складніша за обидві'
  - 'Глобальна синхронність: грецькі аеди (Гомер — теж сліпий?), західноафриканські гріо, японські бівá-хоші — сліпий співець як архетип'
  words: 800
- section: 'Читання: Інструменти, цехи, таємна мова'
  points:
  - 'Три інструменти — кобза, бандура, ліра (рілля): різні традиції, різний репертуар, різний статус'
  - 'Цехова організація — учнівство (3-6 років!), ініціація, ієрархія. Ні ринку, ні конкуренції — монополія'
  - 'Лебійська мова — таємний жаргон (криптолект) сліпих музикантів. Навіщо сліпим — таємна мова? Захист від чужих, кодування маршрутів, торговельна перевага'
  - 'Первинне джерело: фрагмент зі словника лебійської мови (Борзенко/Грінченко) — студент спробує «перекласти»'
  words: 1100
- section: 'Читання: Репертуар і суспільна функція'
  points:
  - 'Що саме виконували: думи (героїчні), псальми (духовні), сатиричні пісні (соціальна критика)'
  - 'Кобзар як «жива газета» — новини, мораль, пам''ять. На базарі — єдине медіа до друкованої преси'
  - 'Кобзар як моральний авторитет: міг прилюдно засудити несправедливого пана. Хто ще мав таке право?'
  - '[!decolonization] Кобзарство — суто УКРАЇНСЬКЕ явище. Не існує в жодній іншій слов''янській традиції. Російські «скоморохи» — принципово інший феномен (розважальний, не сакральний)'
  words: 900
- section: 'Аналіз: Знищення як культурний геноцид'
  points:
  - '1930-ті: «Перший Всеукраїнський з''їзд кобзарів» — запрошення, збір, розстріл. Факти та свідчення'
  - 'Чому саме кобзарі? Не «відсталість» — а небезпека незалежного голосу. Радянська влада знищувала не мистецтво, а альтернативну систему пам''яті'
  - '[!myth-buster] Чи був «з''їзд-розстріл» саме так, як його описують? Дискусія про масштаб — деякі дослідники вважають, що знищення було більш поступовим, не одномоментним'
  - '[!anti-hagiography] Не всі кобзарі були героями. Деякі співпрацювали з радянською владою, адаптували репертуар. Як оцінювати людей в умовах терору?'
  words: 1000
- section: 'Дискусія та підсумок'
  points:
  - 'Сучасне кобзарство: відродження чи реконструкція? Молоді бандуристи вчаться з YouTube, а не від сліпих майстрів. Це та сама традиція?'
  - 'Повернення до розминки: тепер студент може відповісти — чому тоталітарна держава боялася сліпого старого з бандурою'
  - 'Ширше: які інші культурні інституції були знищені разом із кобзарством? (Церква? Хедер? Кобзар = ?)'
  words: 400
vocabulary_hints:
- word: кобзар
  pos: ч.
  definition: мандрівний сліпий музикант-співець, що виконував думи та псальми під акомпанемент кобзи або бандури
- word: бандура
  pos: ж.
  definition: український струнний інструмент з великою кількістю струн (до 68), символ кобзарської традиції
- word: лірник
  pos: ч.
  definition: мандрівний музикант, що грав на лірі (колісній лірі) — нижчий статус у цеховій ієрархії
- word: цех
  pos: ч.
  definition: професійне об'єднання кобзарів з чіткою ієрархією, учнівством та правилами
- word: лебійська мова
  pos: ж.
  definition: таємна мова (криптолект) сліпих музикантів — для захисту від сторонніх
- word: псальма
  pos: ж.
  definition: духовна пісня кобзарського репертуару, часто парафраз біблійних псалмів
- word: криптолект
  pos: ч.
  definition: таємна мова соціальної групи, зрозуміла лише її членам
- word: культурний геноцид
  pos: ч.
  definition: цілеспрямоване знищення культурних інституцій, носіїв традиції, мови та пам'яті народу
- word: реконструкція
  pos: ж.
  definition: відтворення зниклої традиції на основі записів та документів — на відміну від живого передавання
- word: скоморох
  pos: ч.
  definition: російський мандрівний артист-блазень — розважальна функція (НЕ аналог кобзаря)
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція позицій: яка теза належить романтичній, а яка — соціально-економічній інтерпретації кобзарства?'
  items: 4
- type: fill-in
  focus: Лебійська мова та цехова термінологія
  description: 'Речення з тексту модуля — вставити терміни: криптолект, цех, ініціація, псальма, реконструкція'
  items: 5
- type: note
  focus: 'Джерельний аналіз: два документи'
  description: 'Подано два тексти: (1) романтичний опис кобзаря у Шевченка (поезія «Перебендя»), (2) радянський документ про «ліквідацію жебрацтва». Порівняйте: як одна й та сама людина описана двома системами? Що це говорить про владу мови?'
- type: note
  focus: 'Есе: Відродження чи стилізація?'
  description: 'Сучасні бандуристи вивчають традицію з архівних записів, а не від живих носіїв. Чи є це справжнім відродженням — чи фольклорною стилізацією? Де проходить межа? (400-600 слів)'
