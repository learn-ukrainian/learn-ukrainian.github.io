objectives:
- Критично аналізувати конкурентні інтерпретації кобзарства — від романтичної сакралізації до соціально-економічного пояснення
- Працювати з первинним джерелом (лебійська мова, етнографічні записи) на рівні текстового аналізу
- Оцінювати радянське знищення кобзарства як акт культурного геноциду з урахуванням складності історичних обставин
- Розрізняти живу традицію та її сучасну реконструкцію, формулюючи власну позицію щодо автентичності
