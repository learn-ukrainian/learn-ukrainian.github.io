objectives:
- Обґрунтовувати українське походження билинного епосу, спираючись на текстуальні та історичні свідчення
- Розуміти парадокс збереження — чому українські за змістом тексти записані на російській Півночі
- Аналізувати формульну поетику усного епосу та образ Володимира як епічного короля
- Формулювати позицію в дискусії про культурну приналежність спірної спадщини
