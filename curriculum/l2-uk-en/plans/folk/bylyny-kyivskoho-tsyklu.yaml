content_outline:
- points:
  - 'Факт: билини оспівують Київ, але записані на російській Півночі. Чому? Студент формулює гіпотезу'
  - 'Провокація: Росія століттями називає билини «русскими». Чи має Україна право на цей епос?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українська позиція (Чижевський, Попович) — зміст билин пов''язаний із Києвом, Черніговом, Дніпром. Історичні
    свідчення XVI-XVII ст. (Кміта, Лясота) доводять їх побутування в Україні. Витіснені думами в XVII ст.'
  - 'Дебат 2: Імперська версія — билини є «общерусским наследием». Факт запису на Півночі = факт приналежності. Навіть сам
    термін «билина» — штучний, вигаданий Сахаровим у XIX ст. на основі хибного читання «Слова о полку». Носії називали їх
    «старинами»'
  - '[!epistemic-humility] «Попович чесно зазначає: старокиївські варіанти були безнадійно втрачені. Ми порівнюємо українські
    реалії в текстах — але не маємо самих текстів із України»'
  - 'Глобальна синхронність: Iliad (Греція — теж збережена не на батьківщині героїв), Kalevala (Фінляндія — записана в Карелії),
    Manas (Киргизстан) — епос часто мігрує'
  section: 'Конфліктна карта: Чий це епос?'
  words: 1200
- points:
  - Володимир Красне Сонечко — НЕ державний діяч, а пасивний епічний король. «Їсть, п'є, прохлаждається» (Костомаров) — подібний
    до Агамемнона, Артура
  - Бенкет як епічний топос — місце, де герої збираються, отримують завдання, конфліктують із князем
  - 'Формульна поетика: «рясний ужиток епітетів, повторення, паралелізм, гіперболи, постійні формули» (Чижевський). Пейзаж
    — степ, поле, могили — вказує на південне походження'
  - 'Первинне джерело: фрагмент билинного зачину — «Гей, у славному та у городі...»'
  section: 'Читання: Епічний світ Києва'
  words: 1400
- points:
  - 1574 — Філон Кміта згадує Іллю Муравленина. 1585 — Сарніцький про богатирів у Києві. 1594 — Лясота про могилу Ілля Муравлина
    та мощі «Чоботка»
  - 'Чижевський: традиція старого епосу згасла в Україні лише в XVII ст., коли її замінили думи'
  - '[!decolonization] Це НЕ «спільний епос». Билини описують УКРАЇНСЬКІ реалії: Київ, Почайну, Дніпрові пороги, Чернігів.
    Записані на Півночі, бо там НЕ БУЛО нового епосу, який би їх витіснив'
  - '[!myth-buster] «Билини — це російський фольклор» — один із найстійкіших імперських міфів. Факт запису ≠ факт приналежності.
    Гомерів записали в Александрії — це не робить Іліаду єгипетською'
  section: 'Читання: Свідчення XVI-XVII ст.'
  words: 1300
- points:
  - 'Повернення до розминки: студент тепер може відповісти на обидва питання з аргументами'
  - 'Чому билини зникли в Україні? Костомаров: козацькі подвиги витіснили княжі. Народна пам''ять — не архів, а живий організм'
  - '[!anti-hagiography] Не романтизувати: билини також містять насильство, деспотизм Володимира, жорстокість до жінок. Епос
    — не «золотий вік», а складна система цінностей'
  section: Дискусія та підсумок
  words: 900
