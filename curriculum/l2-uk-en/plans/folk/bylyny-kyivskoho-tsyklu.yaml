slug: bylyny-kyivskoho-tsyklu
version: '4.0'
title: 'Билини київського циклу: Епос княжої доби'
subtitle: 'Kyiv Cycle Byliny: Epic of the Princely Era'
focus: Ukrainian origins of byliny, paradox of northern preservation, Volodymyr's court as epic center, oral-formulaic theory, displacement by Cossack dumas
phase: FOLK.3
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Факт: билини оспівують Київ, але записані на російській Півночі. Чому? Студент формулює гіпотезу'
  - 'Провокація: Росія століттями називає билини «русскими». Чи має Україна право на цей епос?'
  words: 400
- section: 'Конфліктна карта: Чий це епос?'
  points:
  - 'Дебат 1: Українська позиція (Чижевський, Попович) — зміст билин пов''язаний із Києвом, Черніговом, Дніпром. Історичні свідчення XVI-XVII ст. (Кміта, Лясота) доводять їх побутування в Україні. Витіснені думами в XVII ст.'
  - 'Дебат 2: Імперська версія — билини є «общерусским наследием». Факт запису на Півночі = факт приналежності. Навіть сам термін «билина» — штучний, вигаданий Сахаровим у XIX ст. на основі хибного читання «Слова о полку». Носії називали їх «старинами»'
  - '[!epistemic-humility] «Попович чесно зазначає: старокиївські варіанти були безнадійно втрачені. Ми порівнюємо українські реалії в текстах — але не маємо самих текстів із України»'
  - 'Глобальна синхронність: Iliad (Греція — теж збережена не на батьківщині героїв), Kalevala (Фінляндія — записана в Карелії), Manas (Киргизстан) — епос часто мігрує'
  words: 800
- section: 'Читання: Епічний світ Києва'
  points:
  - 'Володимир Красне Сонечко — НЕ державний діяч, а пасивний епічний король. «Їсть, п''є, прохлаждається» (Костомаров) — подібний до Агамемнона, Артура'
  - 'Бенкет як епічний топос — місце, де герої збираються, отримують завдання, конфліктують із князем'
  - 'Формульна поетика: «рясний ужиток епітетів, повторення, паралелізм, гіперболи, постійні формули» (Чижевський). Пейзаж — степ, поле, могили — вказує на південне походження'
  - 'Первинне джерело: фрагмент билинного зачину — «Гей, у славному та у городі...»'
  words: 1000
- section: 'Читання: Свідчення XVI-XVII ст.'
  points:
  - '1574 — Філон Кміта згадує Іллю Муравленина. 1585 — Сарніцький про богатирів у Києві. 1594 — Лясота про могилу Ілля Муравлина та мощі «Чоботка»'
  - 'Чижевський: традиція старого епосу згасла в Україні лише в XVII ст., коли її замінили думи'
  - '[!decolonization] Це НЕ «спільний епос». Билини описують УКРАЇНСЬКІ реалії: Київ, Почайну, Дніпрові пороги, Чернігів. Записані на Півночі, бо там НЕ БУЛО нового епосу, який би їх витіснив'
  - '[!myth-buster] «Билини — це російський фольклор» — один із найстійкіших імперських міфів. Факт запису ≠ факт приналежності. Гомерів записали в Александрії — це не робить Іліаду єгипетською'
  words: 900
- section: 'Дискусія та підсумок'
  points:
  - 'Повернення до розминки: студент тепер може відповісти на обидва питання з аргументами'
  - 'Чому билини зникли в Україні? Костомаров: козацькі подвиги витіснили княжі. Народна пам''ять — не архів, а живий організм'
  - '[!anti-hagiography] Не романтизувати: билини також містять насильство, деспотизм Володимира, жорстокість до жінок. Епос — не «золотий вік», а складна система цінностей'
  words: 500
vocabulary_hints:
- word: билина
  pos: ж.
  definition: героїчна епічна пісня княжої доби, що оспівує подвиги богатирів при дворі Володимира
- word: старина
  pos: ж.
  definition: автентична народна назва билини — від «старі часи»
- word: богатир
  pos: ч.
  definition: епічний герой-воїн — захисник землі, наділений надлюдською силою
- word: бенкет
  pos: ч.
  definition: епічний топос — князівський бенкет як місце збору героїв та розгортання дії
- word: формульний
  pos: прикм.
  definition: побудований на усталених словесних формулах — ознака усної епічної традиції
- word: тонічний вірш
  pos: ч.
  definition: вірш, де ритм визначається кількістю наголосів, а не складів — ритмічна основа билини
- word: гіпербола
  pos: ж.
  definition: художнє перебільшення — в билинах герой одним ударом знищує ціле військо
- word: ретардація
  pos: ж.
  definition: уповільнення розгортання подій через повтори та деталі — ознака епічного стилю
- word: апропріація
  pos: ж.
  definition: 'привласнення чужої культурної спадщини — в контексті модуля: імперське привласнення билин'
- word: дружина
  pos: ж.
  definition: 'в давньоруському контексті: військовий загін князя, а не подружжя'
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: українська позиція (билини виникли в Києві, записані на Півночі через витіснення думами) чи імперська (спільний епос)? Студент визначає за аргументом.'
  items: 4
- type: fill-in
  focus: Епічна та літературознавча лексика
  description: 'Терміни: богатир, тонічний вірш, формульний, ретардація, апропріація — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: свідчення XVI ст.'
  description: 'Подано три коротких цитати: Кміта (1574), Сарніцький (1585), Лясота (1594). Студент аналізує: що саме вони доводять? Чи достатньо цих свідчень для висновку про українське походження?'
- type: note
  focus: 'Есе: Кому належить культурна спадщина?'
  description: 'Билини, Elgin Marbles, Бенінські бронзи — хто «власник» культурних артефактів, коли місце створення і місце збереження різні? Як це стосується українських билин? (400-600 слів)'
