content_outline:
- section: Постановка проблеми
  words: 600
  points:
  - 'Провокаційне питання: Чому пісня про Байду не є думою, а прозовий переказ про Кармелюка не є історичною піснею?'
  - 'Корпусні опори жанру: розрізнення вузького робочого ядра історичних пісень від дум без сталої строфи та усних переказів (Українська літературна енциклопедія, «Історичні пісні», Заболотний, 8 клас, с. 9).'
  - 'Жанрова межа: історичні пісні є строфічними, куплетною формою, що поєднують лірику й епос, тоді як думи не мають сталої строфи і виконуються речитативно (розвідка про походження дум, с. 10, Заболотний, 8 клас, с. 23).'
  - 'Статус та автентичність: потреба критичного аналізу перед використанням пісень як фактографічного джерела (Голобуцький, «Запорозьке козацтво»).'
- section: Корпус і контекст
  words: 1200
  points:
  - 'Генезис жанру: формування у XIV-XV століттях на тлі татарських нападів, ясиру та оборони степового порубіжжя (Історія української культури, т. 2).'
  - 'Ранній пласт: пісні про турецьку неволю та перші протистояння (наприклад, «Зажурилась Україна», «В Цариграді на риночку») (Українська літературна енциклопедія, «Історичні пісні»).'
  - 'Козацька епоха та Хмельниччина: зміна носія та виникнення великих пісенних циклів про Хмельницького, Богуна, Кривоноса, Нечая (Українська літературна енциклопедія, «Історичні пісні»).'
  - 'Соціальні рухи XVIII-XIX століття: гайдамаччина (Коліївщина, Залізняк, Гонта), опришківство та спрямовані проти кріпацтва протести (Кармелюк) (Українська літературна енциклопедія, «Гайдамацькі пісні»).'
  - 'Байда-Вишневецький: деконструкція зв''язку між легендарним Байдою та реальним князем Дмитром Вишневецьким (Грушевський, «Байда-Вишневецький в поезії й історії»).'
- section: Поетика, символіка і виконання
  words: 1400
  points:
  - 'Метрика та строфіка: використання куплетів з двох або чотирьох рядків, однакова складова структура та стабільна ритмомелодика (Заболотний, 8 клас, с. 8).'
  - 'Музична перформативність: гуртовий багатоголосний спів у чоловічому козацькому середовищі як розвинений художній акт (Історія української культури, т. 2).'
  - 'Особливості композиції: динамічний зачин, діалогізація, часті повтори для підсилення емоційного напруження (Заболотний, 8 клас, с. 9).'
  - 'Лексичний інвентар та історична лексика: функціональне вживання історизмів (ясир, гайдамаччина, опришок, голота) без суржикового нашарування.'
  - 'Еволюція поетики: бароковий період, зближення усної традиції з писемною пісенною культурою (Антонович, «Українська культура»).'
- section: Деколонізаційна рамка
  words: 900
  points:
  - 'Українське історичне суб''єктство: спростування імперських міфів про «бездержавність» та «етнографічну декоративність» українського народу через аналіз пісенної оцінки подій (Заболотний, 8 клас, с. 8).'
  - 'Протидія імперським термінам: маркування колоніальних назв збірників («малоросійські») як історичних маркерів доби, а не нейтральних термінів (Українська літературна енциклопедія, розділ про збірники історичних пісень).'
  - 'Радянська догматизація та цензура: витіснення пісень із прокляттям Хмельницькому та еміграційного пласту на догоду міфу про «вікове прагнення до возз''єднання» («Героїчне та знаменитості в українській культурі»).'
  - 'Романтичні фальсифікації: критичне ставлення до романтичних збірників (наприклад, «Запорожская Старина» Срезневського) та виявлення авторських вставок (Енциклопедія українознавства, Русанівський, «Історія української літературної мови»).'
- section: Підсумок
  words: 900
  points:
  - 'Культурний синтез: роль історичної пісні як живого голосу пам''яті, що переходить у модерну культуру (Шевченко, Карпенко-Карий, Ліна Костенко) (Українська літературна енциклопедія, розділ про збірники історичних пісень).'
  - 'Літературний міст: вплив історичного фольклору на Шевченкову поему «Гайдамаки» та драму Костомарова і Карпенка-Карого «Сава Чалий» («Шевченківський словник», «Українська драматургія першої половини XIX ст.»).'
  - 'Сучасне переосмислення: чому ці форми залишаються актуальними як моральні документи спротиву та національної самосвідомості в сучасному контексті.'
