content_outline:
- section: Постановка проблеми
  words: 600
  points:
  - Провокаційне питання: Чому пісня про Байду не є думою, а прозовий переказ про Кармелюка не є історичною піснею?
  - Корпусні опори жанру: розрізнення вузького робочого ядра історичних пісень від астрофічних дум та усних переказів (fc2291b5_c2976, S4433).
  - Жанрова межа: історичні пісні є строфічними, куплетною формою, що поєднують лірику й епос, тоді як думи є астрофічними та речитативними (pokhodzhennia-dum:p10-10, S4438).
  - Статус та автентичність: потреба критичного аналізу перед використанням пісень як фактографічного джерела (9a2443f5_c0184).
- section: Корпус і контекст
  words: 1200
  points:
  - Генезис жанру: формування у XIV-XV століттях на тлі татарських нападів, ясиру та оборони степового порубіжжя (484d0ffb_c0871).
  - Ранній пласт: пісні про турецьку неволю та перші протистояння (наприклад, «Зажурилась Україна», «В Цариграді на риночку») (fc2291b5_c2976).
  - Козацька епоха та Хмельниччина: зміна носія та виникнення великих пісенних циклів про Хмельницького, Богуна, Кривоноса, Нечая (fc2291b5_c2976).
  - Соціальні рухи XVIII-XIX століття: гайдамаччина (Коліївщина, Залізняк, Гонта), опришківство та антикріпацькі протести (Кармелюк) (fc2291b5_c1266).
  - Байда-Вишневецький: деконструкція зв'язку між легендарним Байдою та реальним князем Дмитром Вишневецьким (5794da94_c0817).
- section: Поетика, символіка і виконання
  words: 1400
  points:
  - Метрика та строфіка: використання куплетів з двох або чотирьох рядків, однакова складова структура та стабільна ритмомелодика (S4432).
  - Музична перформативність: гуртовий багатоголосний спів у чоловічому козацькому середовищі як розвинений художній акт (484d0ffb_c0871).
  - Особливості композиції: динамічний зачин (інципіт), діалогізація, часті повтори для підсилення емоційного напруження (S4433).
  - Лексичний інвентар та історична лексика: функціональне вживання історизмів (ясир, гайдамаччина, опришок, голота) без суржикового нашарування.
  - Еволюція поетики: бароковий період, зближення усної традиції з писемною пісенною культурою (2971c499_c0657).
- section: Деколонізаційна рамка
  words: 900
  points:
  - Українське історичне суб'єктство: спростування імперських міфів про «бездержавність» та «етнографічну декоративність» українського народу через аналіз пісенної оцінки подій (S4432).
  - Протидія імперським термінам: маркування колоніальних назв збірників («малоросійські») як історичних маркерів доби, а не нейтральних термінів (fc2291b5_c2977).
  - Радянська догматизація та цензура: витіснення пісень із прокляттям Хмельницькому та еміграційного пласту на догоду міфу про «вікове прагнення до возз'єднання» (a5f3ae7f_c0029).
  - Романтичні фальсифікації: критичне ставлення до романтичних збірників (наприклад, «Запорожская Старина» Срезневського) та виявлення авторських вставок (feaa5fa7_c0417, 7808b51b_c0257).
- section: Підсумок
  words: 900
  points:
  - Культурний синтез: роль історичної пісні як живого голосу пам'яті, що переходить у модерну культуру (Шевченко, Карпенко-Карий, Ліна Костенко) (fc2291b5_c2977).
  - Літературний міст: вплив історичного фольклору на Шевченкову поему «Гайдамаки» та драму Костомарова і Карпенка-Карого «Сава Чалий» (d77902e2_c1253, bf813e34_c0026).
  - Сучасне переосмислення: чому ці форми залишаються актуальними як моральні документи спротиву та національної самосвідомості в сучасному контексті.
