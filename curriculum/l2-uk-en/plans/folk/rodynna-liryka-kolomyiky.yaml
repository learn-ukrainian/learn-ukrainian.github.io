content_outline:
- points:
  - 'Коломийка: «Коломийко, коломийко, / Ти мене навчила / Як любити — не забути, / Щоб голова не боліла.» Питання: Чи може
    двострофна пісенька бути серйозним мистецтвом?'
  - 'Провокація: Костомаров вважав українську лірику найбільш «одухотвореною» серед слов''янських. Це компліментарна риторика
    чи обґрунтоване судження?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Костомаров — українська лірика «нероздільна від природи, вона оживляє її». Любовне почуття «досягає найвищого
    одухотворення». Жінка — «духовно-прекрасна». Це мистецтво найвищого ґатунку'
  - 'Дебат 2: Етнографічна версія — лірика є побутовим жанром: колискові заспокоюють дитину, пісні кохання — частина залицяння,
    коломийки — реакція на події. Функція > естетика'
  - '[!epistemic-humility] «Костомаров порівнював українську та великоросійську лірику — і виніс вердикт на користь української.
    Але це порівняння робив УКРАЇНЕЦЬ. Наскільки воно об''єктивне?»'
  - 'Глобальна синхронність: haiku (Японія — теж коротка форма миттєвої реакції), corrido (Мексика), limerick (Ірландія) —
    мала поетична форма як інструмент соціального коментаря'
  section: 'Конфліктна карта: Лірика як мистецтво чи як побут?'
  words: 1050
- points:
  - 'Колискова — перший літературний жанр у житті дитини. Магічний акт: побажання долі, захист від зла. «Ой ти, коте, коточок»
    — анафора як гіпнотичний засіб'
  - 'Пісні кохання: мотив посланництва (голуби, орли — знайдіть кохану), перешкоди (поговір, розлука), ідеалізація краси'
  - 'Рослинна символіка: рута = дівоцтво, барвінок = вірність, калина = краса'
  - 'Первинне джерело: фрагмент любовної пісні з мотивом посланництва — «Сиві голубонки, нехай мні шукають...»'
  section: 'Читання: Колискові та пісні кохання'
  words: 1250
- points:
  - 'Жанрова специфіка: 4+4+4+6 складів, дворядкова строфа, зв''язок із танцем. Карпатське походження'
  - 'Тематичне розмаїття: кохання, гумор, сатира, політика. «Народний твітер» — миттєва реакція на будь-яку подію'
  - 'Коломийка як опір: антиімперська сатира, антипанські жарти, пародії на владу. Мала форма = велике мистецтво'
  - '[!decolonization] Коломийка — СУТО УКРАЇНСЬКА форма. Не існує в жодній іншій слов''янській традиції. Карпатське коріння,
    поширення по всій Україні'
  section: 'Читання: Коломийки'
  words: 1150
- points:
  - 'Костомаров: жінка в українській ліриці «виступає як особистість духовна, рівноправна з чоловіками і не терпить їхнього
    деспотизму»'
  - Колискова — материнський голос, пісня кохання — дівочий голос, голосіння — вдовиний голос. Лірична традиція = ЖІНОЧА традиція
  - '[!myth-buster] «Народна лірика — це лише про кохання» — ні. Бурлацькі, рекрутські, соціальні пісні теж належать до лірики.
    Але саме жіночий голос формує її ядро'
  - '[!anti-hagiography] Не ідеалізувати: «жінка — духовно-прекрасна» (Костомаров) — це теж конструкт. Пісні також показують
    ревнощі, зраду, насильство. Реальне життя складніше за ідеал'
  section: 'Аналіз: Жіночий голос як основа'
  words: 950
- points:
  - 'Повернення до розминки: коломийка — серйозне мистецтво саме ТОМУ, що вона коротка. Стиснути думку до двох рядків — складніше,
    ніж написати поему'
  - 'Ключова теза: родинна лірика та коломийки — інтимний голос народу, де жінка є не об''єктом, а суб''єктом поезії'
  section: Підсумок
  words: 400
