slug: rodynna-liryka-kolomyiky
version: '4.0'
title: 'Родинна лірика та коломийки: Інтимний голос'
subtitle: 'Family Lyrics and Kolomyiky: The Intimate Voice'
focus: Lullaby as first literary genre in life, kolomyika as Ukrainian Twitter (instant reaction), Kostоmarov on Ukrainian lyric superiority, women's voice as foundation of lyric tradition
phase: FOLK.5
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Коломийка: «Коломийко, коломийко, / Ти мене навчила / Як любити — не забути, / Щоб голова не боліла.» Питання: Чи може двострофна пісенька бути серйозним мистецтвом?'
  - 'Провокація: Костомаров вважав українську лірику найбільш «одухотвореною» серед слов''янських. Це компліментарна риторика чи обґрунтоване судження?'
  words: 400
- section: 'Конфліктна карта: Лірика як мистецтво чи як побут?'
  points:
  - 'Дебат 1: Костомаров — українська лірика «нероздільна від природи, вона оживляє її». Любовне почуття «досягає найвищого одухотворення». Жінка — «духовно-прекрасна». Це мистецтво найвищого ґатунку'
  - 'Дебат 2: Етнографічна версія — лірика є побутовим жанром: колискові заспокоюють дитину, пісні кохання — частина залицяння, коломийки — реакція на події. Функція > естетика'
  - '[!epistemic-humility] «Костомаров порівнював українську та великоросійську лірику — і виніс вердикт на користь української. Але це порівняння робив УКРАЇНЕЦЬ. Наскільки воно об''єктивне?»'
  - 'Глобальна синхронність: haiku (Японія — теж коротка форма миттєвої реакції), corrido (Мексика), limerick (Ірландія) — мала поетична форма як інструмент соціального коментаря'
  words: 800
- section: 'Читання: Колискові та пісні кохання'
  points:
  - 'Колискова — перший літературний жанр у житті дитини. Магічний акт: побажання долі, захист від зла. «Ой ти, коте, коточок» — анафора як гіпнотичний засіб'
  - 'Пісні кохання: мотив посланництва (голуби, орли — знайдіть кохану), перешкоди (поговір, розлука), ідеалізація краси'
  - 'Рослинна символіка: рута = дівоцтво, барвінок = вірність, калина = краса'
  - 'Первинне джерело: фрагмент любовної пісні з мотивом посланництва — «Сиві голубонки, нехай мні шукають...»'
  words: 1000
- section: 'Читання: Коломийки'
  points:
  - 'Жанрова специфіка: 4+4+4+6 складів, дворядкова строфа, зв''язок із танцем. Карпатське походження'
  - 'Тематичне розмаїття: кохання, гумор, сатира, політика. «Народний твітер» — миттєва реакція на будь-яку подію'
  - 'Коломийка як опір: антиімперська сатира, антипанські жарти, пародії на владу. Мала форма = велике мистецтво'
  - '[!decolonization] Коломийка — СУТО УКРАЇНСЬКА форма. Не існує в жодній іншій слов''янській традиції. Карпатське коріння, поширення по всій Україні'
  words: 900
- section: 'Аналіз: Жіночий голос як основа'
  points:
  - 'Костомаров: жінка в українській ліриці «виступає як особистість духовна, рівноправна з чоловіками і не терпить їхнього деспотизму»'
  - 'Колискова — материнський голос, пісня кохання — дівочий голос, голосіння — вдовиний голос. Лірична традиція = ЖІНОЧА традиція'
  - '[!myth-buster] «Народна лірика — це лише про кохання» — ні. Бурлацькі, рекрутські, соціальні пісні теж належать до лірики. Але саме жіночий голос формує її ядро'
  - '[!anti-hagiography] Не ідеалізувати: «жінка — духовно-прекрасна» (Костомаров) — це теж конструкт. Пісні також показують ревнощі, зраду, насильство. Реальне життя складніше за ідеал'
  words: 700
- section: Підсумок
  points:
  - 'Повернення до розминки: коломийка — серйозне мистецтво саме ТОМУ, що вона коротка. Стиснути думку до двох рядків — складніше, ніж написати поему'
  - 'Ключова теза: родинна лірика та коломийки — інтимний голос народу, де жінка є не об''єктом, а суб''єктом поезії'
  words: 400
vocabulary_hints:
- word: колискова
  pos: ж.
  definition: пісня для заколисування дитини — магічний акт побажання долі та захисту
- word: коломийка
  pos: ж.
  definition: коротка дворядкова пісня з ритмом 4+4+4+6 складів — карпатського походження, пов'язана з танцем
- word: лірика
  pos: ж.
  definition: 'рід літератури, що виражає внутрішній світ, почуття та переживання людини'
- word: строфа
  pos: ж.
  definition: група рядків, що утворює ритмічну та смислову одиницю — коломийка = одна строфа
- word: анафора
  pos: ж.
  definition: повторення слів на початку рядків — прийом колискових для створення гіпнотичного ритму
- word: рута
  pos: ж.
  definition: рослина-символ — втілення дівоцтва та цноти в народній ліриці
- word: барвінок
  pos: ч.
  definition: рослина-символ — втілення вічного кохання та вірності
- word: залицяння
  pos: с.
  definition: процес ухаження за дівчиною — один із контекстів виконання любовних пісень
- word: посланництво
  pos: с.
  definition: мотив у ліриці — звертання до птахів з проханням знайти кохану та передати звістку
- word: сміхова культура
  pos: ж.
  definition: сфера культури, пов'язана з гумором та карнавалом — коломийки як її яскравий вияв
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: лірика як високе мистецтво (Костомаров) чи як побутова функція (етнографічна версія)? Студент визначає за описом функції пісні.'
  items: 4
- type: fill-in
  focus: Лірична та ботанічна лексика
  description: 'Терміни: анафора, строфа, рута, посланництво, сміхова культура — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: колискова та коломийка'
  description: 'Подано два тексти: (1) колискова (повільна, захисна, магічна), (2) коломийка (швидка, сатирична, реактивна). Студент аналізує: це два полюси однієї традиції — чи принципово різні жанри?'
- type: note
  focus: 'Творче завдання: спроба написати коломийку'
  description: 'Студент пише власну коломийку (2 рядки, ритм 4+4+4+6) на будь-яку тему. Потім аналізує: що найскладніше — ритм, рима чи зміст?'
