module: folk-027
level: FOLK
sequence: 27
slug: rodynna-liryka-kolomyiky
version: '2.0'
title: 'Родинна лірика та коломийки: Інтимний голос'
subtitle: Family Lyrics and Kolomyiky — The Intimate Voice
focus: Lullabies, love songs, Carpathian kolomyiky as distinct micro-genres
phase: FOLK.5
word_target: 5000
content_outline:
- section: Вступ
  points:
  - Родинно-побутова лірика — пісні поза обрядом
  - Інтимний простір — дім, родина, кохання
  words: 750
- section: Колискові пісні
  points:
  - Колискова як перший літературний жанр у житті дитини
  - Материнський голос — охоронна магія, побажання долі
  - Поетика колискової — повтори, ритміка заколисування
  words: 850
- section: Пісні кохання
  points:
  - Дівочі пісні — очікування, розлука, зрада
  - Парубоцькі пісні — залицяння, суперництво
  - Символіка — барвінок, рута, калина, місяць
  words: 900
- section: Коломийки
  points:
  - Жанрова специфіка — чотирирядкова строфа (4+4+4+6 складів)
  - Карпатське походження — зв'язок із танцем
  - Тематичне розмаїття — кохання, гумор, сатира, політика
  - Коломийка як «народний твітер» — миттєва реакція на події
  words: 950
- section: Деколонізаційний вимір
  points:
  - Коломийка як форма опору — антиімперська сатира
  - Родинна лірика — збереження мови через інтимний простір
  - Жіночий голос як основа ліричної традиції
  words: 800
- section: Підсумок
  points:
  - Мала форма як велике мистецтво
  - Словник термінів
  words: 750
