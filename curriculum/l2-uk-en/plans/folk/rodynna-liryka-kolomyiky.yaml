objectives:
- Аналізувати коломийку як унікальну українську поетичну форму з чітким ритмічним каноном
- Розуміти роль жіночого голосу як основи ліричної традиції — від колискової до голосіння
- Критично оцінювати Костомарівське порівняння української та великоросійської лірики
- Спробувати написати власну коломийку, усвідомлюючи складність малої форми
