module: folk-005
level: FOLK
sequence: 5
slug: kupalski-rusalni-pisni
title: "Купальські та русальні пісні"
subtitle: "Summer calendar songs, Green holidays, Ivan Kupala, public source discipline"
version: 6
status: locked
phase: base-first
cefr_min: C1
word_target: 4200
focus: "Clean source-first M05 base Ukrainian summer-cycle songs: купальські пісні, русальні пісні, Зелені свята, Трійця, Івана Купала, performance, poetics, public-source readings."
persona: "C1+ seminar learner reading Ukrainian summer folk songs through public primary texts, school canon, careful framing, source discipline, and respect for Christian-era calendar terms."
objectives:
  - "Розрізняти купальські й русальні пісні за календарним часом, виконавською ситуацією, пісенними образами, дією і текстовою формою."
  - "Пояснити русальні пісні через Зелені свята, Трійцю, поле, воду, березу, вінок і провід, не перетворюючи русалку на окремий belief entry."
  - "Пояснити купальські пісні через Івана Купала, Купайло, гуртовий спів, воду, вогонь, вінки, хоровод і повтор."
  - "Читати публічний текст через звертання, рефрен, анафору, діалог, рух, реквізит і source limits."
  - "Працювати тільки з публічними Ukrlib/Osvita/Pidruchnyk-style джерелами у learner-facing матеріалах."
pedagogy:
  approach: "source-first seminar"
  notes:
    - "Begin with a short verified folk-text excerpt or candidate title, then ask what public source can prove."
    - "Keep Christian-era calendar names visible: Трійця, Зелені свята, Івана Купала."
    - "Treat older seasonal material as poetic motif and performance vocabulary only when a public source supports it."
    - "Do not link dirty legacy readings; Phase B must clean and host public texts in #3903 format before lesson use."
content_outline:
  - section: "Вхід: літній цикл без сенсації"
    words: 550
    points:
      - "Open with classification: русальні пісні and купальські пісні are neighboring summer calendar-song blocks, not one generic summer lyric."
      - "Set FOLK identity: oral verbal art feeding Ukrainian written literature and public cultural memory."
      - "State source rule: public URL or bibliographic source in learner-facing page; internal research markers stay out."
      - "Ask source-first questions: who speaks, when, to whom, with what repeated form and object?"
  - section: "Русальні пісні: Зелені свята, голос і провід"
    words: 750
    points:
      - "Place rusalky songs near Зелені свята and Трійця where school/curriculum sources support the frame."
      - "Handle русалка as a song figure and voice: location, request, address, field/water/tree vocabulary, closing action."
      - "Use candidate 'Сиділа русалка на білій березі' only after Phase B full public-text fetch and quote verification."
      - "Teach the difference between folk-song image, textbook explanation, curriculum locator, and hosted primary reading."
  - section: "Купальські пісні: Купайло, вінки, вода, вогонь, гурт"
    words: 850
    points:
      - "Place kupalski songs under Івана Купала and public summer youth/community performance."
      - "Use Купало / Купайло as song and performance names, not as doctrine."
      - "Teach action sequence: gathering, repeated line, circle or procession, object action, release or close."
      - "Use candidate texts 'Купайло, Купайло, де ти зимувало?' and 'А де наше Купайло стояло' only after Phase B public-source verification."
      - "Frame water, fire and wreaths through performance and poetic action, not as instructions."
  - section: "Поетика дії: повтор, діалог, реквізит"
    words: 750
    points:
      - "Teach рефрен, анафора, звертання and question-answer form as group-performance tools."
      - "Show how object words carry action: вінок, берізка, сорочка, вода, вогонь, поле, дорога."
      - "Replace single-symbol decoding with action questions: what happens to the object, who carries it, where does it move?"
      - "Mark variants carefully: one public text is a recorded variant, not the whole tradition."
  - section: "Читання і source hammer"
    words: 600
    points:
      - "Phase B must fetch full public primary texts from Ukrlib/Wikisource/public archive or verified corpus-backed metadata before hosted readings."
      - "Every `:::primary-reading` excerpt and every `PrimaryReading text={...}` page must be quote-verified before shipping."
      - "Osvita and Pidruchnyk may orient classification; do not host textbook or curriculum prose as reading text."
      - "Keep PR notes with verification details; do not expose internal source markers to learners."
  - section: "Міст до писемної, музичної і сценічної культури"
    words: 450
    points:
      - "Move from verified folk text to reception: literature, music, theatre, painting, school memory."
      - "Label Gogol, Lysenko or later stage material as reception only after public-source check."
      - "Do not let an authored work replace the folk primary text."
  - section: "Деколонізаційна рамка і підсумок"
    words: 300
    points:
      - "Keep Ukrainian terms, calendar names, local performance and public source provenance visible."
      - "Reject imperial flattening into a vague all-Slavic zone."
      - "Also avoid romantic overclaiming: source first, interpretation second, limits explicit."
activity_hints:
  - type: ritual-sequencing
    placement: inline
    focus: "Order a clean performance sequence from public text evidence: calendar moment, group, repeated line, object action, closing."
  - type: source-check
    placement: inline
    focus: "Classify a citation as public primary text, textbook frame, curriculum locator, or reception source."
  - type: motif-formula
    placement: workbook
    focus: "Identify refrain, address, object words and movement words without inventing one hidden code."
  - type: variant-comparison
    placement: workbook
    focus: "Compare two verified public variants only after Phase B hosting; note what differs without declaring one original."
  - type: reception-comparison
    placement: workbook
    focus: "Compare a verified folk line with an authored literary or musical reception source."
