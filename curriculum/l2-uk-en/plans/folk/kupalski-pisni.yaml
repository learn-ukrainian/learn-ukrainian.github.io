content_outline:
- points:
  - Цитата зі скарги церковного діяча XVIII ст. на «бісовські пісні та плясанія» — чому Церква століттями боролася проти Купала?
  - 'Питання: Що таке небезпечне в стрибках через багаття та пусканні вінків на воду, що це треба заборонити?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Костомаров — Купало як давній солярний обряд, де вогонь і вода символізують шлюб космічних стихій. Марена =
    водне жіноче божество'
  - 'Дебат 2: Попович — елементи оргіастичності та, можливо, людської жертви (потоплення дівчини). Не «красиве свято», а потужний
    ритуал з темним боком'
  - '[!epistemic-humility] «Ми реконструюємо Купало з пізніх записів XIX ст. Наскільки вони відображають реальний давній обряд
    — а не романтичну стилізацію?»'
  - 'Глобальна синхронність: Midsommar (Швеція), Noc Świętojańska (Польща), Litha (кельти), Tirgan (Іран) — літнє сонцестояння
    як універсальне свято'
  section: 'Конфліктна карта: Язичницький обряд чи народна розвага?'
  words: 1100
- points:
  - Купальське вогнище — очищення, ініціація (перехід у доросле життя), ворожіння для пар
  - 'Вінки на воді — рослинна магія: м''ята, барвінок, чорнобильник. Кожна рослина має функцію (Костомаров)'
  - 'Опудало Марени — виготовлення, вшанування, знищення (спалення або потоплення). Костомаров: поєднання вогню і води = акт
    космічної гармонії'
  - 'Первинне джерело: фрагмент купальської пісні про вінок та долю — «Ой на Купала вогонь горить...»'
  section: 'Читання: Вогонь, вода та Марена'
  words: 1400
- points:
  - 'Міф про цвіт папороті — квест за прихованим скарбом та провидінням. Чому знання небезпечне? Народна мораль: хто отримав
    надприродне — того чекає погибель (Костомаров)'
  - Еротична символіка купальських пісень — діалоги, залицяння, ворожіння на шлюб. Головний мотив — дівоча доля (Авраменко)
  - '[!decolonization] Купало — УКРАЇНСЬКЕ свято з глибокою місцевою специфікою. Російський «Иван Купала» — пізня запозичена
    назва. Український обрядовий комплекс не має аналога в російській традиції'
  - '[!myth-buster] «Ніч на Івана Купала» Гоголя — геніальна література, але НЕ етнографія. Гоголь створив літературний міф,
    який тепер плутають із реальним обрядом'
  section: 'Аналіз: Цвіт папороті та заборонене знання'
  words: 1200
- points:
  - 'Повернення до розминки: тепер студент може відповісти — Церква боролася не з «розвагою», а з альтернативною сакральною
    системою'
  - Сучасне відродження Купала — автентичний обряд чи фестиваль для Instagram? Де межа?
  - '[!anti-hagiography] Не романтизувати: Попович згадує потоплення дівчини як можливий елемент давнього обряду. Як працювати
    з темним спадком?'
  section: 'Дискусія: Купало сьогодні'
  words: 700
- points:
  - Студент формулює відповідь з позиції обох дебатів
  - 'Ключова теза: Купало — точка перетину язичницького і християнського, еротичного і сакрального, народного і літературного'
  section: Підсумок
  words: 400
