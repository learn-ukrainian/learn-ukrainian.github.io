slug: kupalski-pisni
version: '4.0'
title: 'Купальські пісні: Магія літнього сонцестояння'
subtitle: 'Kupala Songs: Midsummer Solstice Magic'
focus: Dual purification by fire and water, fern flower myth, Marena ritual, syncretic fusion of pagan and Christian, Kupala as erotic and sacrificial rite
phase: FOLK.1
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Цитата зі скарги церковного діяча XVIII ст. на «бісовські пісні та плясанія» — чому Церква століттями боролася проти Купала?'
  - 'Питання: Що таке небезпечне в стрибках через багаття та пусканні вінків на воду, що це треба заборонити?'
  words: 400
- section: 'Конфліктна карта: Язичницький обряд чи народна розвага?'
  points:
  - 'Дебат 1: Костомаров — Купало як давній солярний обряд, де вогонь і вода символізують шлюб космічних стихій. Марена = водне жіноче божество'
  - 'Дебат 2: Попович — елементи оргіастичності та, можливо, людської жертви (потоплення дівчини). Не «красиве свято», а потужний ритуал з темним боком'
  - '[!epistemic-humility] «Ми реконструюємо Купало з пізніх записів XIX ст. Наскільки вони відображають реальний давній обряд — а не романтичну стилізацію?»'
  - 'Глобальна синхронність: Midsommar (Швеція), Noc Świętojańska (Польща), Litha (кельти), Tirgan (Іран) — літнє сонцестояння як універсальне свято'
  words: 800
- section: 'Читання: Вогонь, вода та Марена'
  points:
  - 'Купальське вогнище — очищення, ініціація (перехід у доросле життя), ворожіння для пар'
  - 'Вінки на воді — рослинна магія: м''ята, барвінок, чорнобильник. Кожна рослина має функцію (Костомаров)'
  - 'Опудало Марени — виготовлення, вшанування, знищення (спалення або потоплення). Костомаров: поєднання вогню і води = акт космічної гармонії'
  - 'Первинне джерело: фрагмент купальської пісні про вінок та долю — «Ой на Купала вогонь горить...»'
  words: 1100
- section: 'Аналіз: Цвіт папороті та заборонене знання'
  points:
  - 'Міф про цвіт папороті — квест за прихованим скарбом та провидінням. Чому знання небезпечне? Народна мораль: хто отримав надприродне — того чекає погибель (Костомаров)'
  - 'Еротична символіка купальських пісень — діалоги, залицяння, ворожіння на шлюб. Головний мотив — дівоча доля (Авраменко)'
  - '[!decolonization] Купало — УКРАЇНСЬКЕ свято з глибокою місцевою специфікою. Російський «Иван Купала» — пізня запозичена назва. Український обрядовий комплекс не має аналога в російській традиції'
  - '[!myth-buster] «Ніч на Івана Купала» Гоголя — геніальна література, але НЕ етнографія. Гоголь створив літературний міф, який тепер плутають із реальним обрядом'
  words: 900
- section: 'Дискусія: Купало сьогодні'
  points:
  - 'Повернення до розминки: тепер студент може відповісти — Церква боролася не з «розвагою», а з альтернативною сакральною системою'
  - 'Сучасне відродження Купала — автентичний обряд чи фестиваль для Instagram? Де межа?'
  - '[!anti-hagiography] Не романтизувати: Попович згадує потоплення дівчини як можливий елемент давнього обряду. Як працювати з темним спадком?'
  words: 400
- section: Підсумок
  points:
  - Студент формулює відповідь з позиції обох дебатів
  - 'Ключова теза: Купало — точка перетину язичницького і християнського, еротичного і сакрального, народного і літературного'
  words: 400
vocabulary_hints:
- word: сонцестояння
  pos: с.
  definition: астрономічне явище, коли тривалість дня є максимальною або мінімальною в році
- word: Купала
  pos: ч.
  definition: давнє українське свято літнього сонцестояння, що поєднало язичницькі обряди з днем Іоанна Хрестителя
- word: Марена
  pos: ж.
  definition: ритуальне опудало, що символізує жіноче водне божество — його знищення є кульмінацією купальського обряду
- word: ворожіння
  pos: с.
  definition: магічна практика передбачення майбутнього — на вінках, на вогні, на травах
- word: очищення
  pos: с.
  definition: ритуальна дія звільнення від хвороб, зла та скверни через контакт із сакральною стихією (вогнем або водою)
- word: ініціація
  pos: ж.
  definition: обряд переходу в новий соціальний статус — зокрема з юнацтва в доросле життя
- word: синкретизм
  pos: ч.
  definition: поєднання елементів різних релігій чи культурних систем в одному обряді
- word: оргіастичний
  pos: прикм.
  definition: пов'язаний з ритуальним зняттям соціальних норм та обмежень
- word: солярний
  pos: прикм.
  definition: пов'язаний із сонцем, сонячним культом
- word: чорнобильник
  pos: ч.
  definition: рослина (Artemisia), з якої робили обереги на Купала
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Перевірка обох позицій: студент визначає, чия інтерпретація — Костомарова (космічний шлюб стихій) чи Поповича (оргіастичний обряд з темним боком).'
  items: 4
- type: fill-in
  focus: Купальська та ботанічна лексика
  description: 'Терміни з тексту: сонцестояння, Марена, ініціація, синкретизм, солярний — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: купальська пісня vs Гоголь'
  description: 'Подано два тексти: (1) фольклорна купальська пісня про вінок і долю, (2) фрагмент «Вечора на хуторі» Гоголя про Купальську ніч. Порівняйте: що спільне, що відрізняється, що Гоголь додав від себе?'
- type: note
  focus: 'Есе: Купало — обряд чи бренд?'
  description: 'Сучасні купальські фестивалі збирають тисячі людей. Учасники стрибають через багаття і пускають вінки. Чи є це продовженням традиції — чи культурною імітацією без ритуальної суті? Аргументуйте (400-600 слів).'
