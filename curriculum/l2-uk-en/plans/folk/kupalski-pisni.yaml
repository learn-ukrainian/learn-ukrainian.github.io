objectives:
- Критично аналізувати Купало як складний обрядовий комплекс з язичницькими та християнськими елементами
- Читати купальські пісні з увагою до еротичної символіки та ритуальної функції
- Розрізняти фольклорний обряд та його літературну інтерпретацію (Гоголь)
- Формулювати аргументовану позицію щодо сучасного відродження купальських обрядів
