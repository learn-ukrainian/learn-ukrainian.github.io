content_outline:
- points:
  - 'Загадка: «Стоїть дім, повен зерна, та ні вікон, ні дверей.» (Відповідь: мак.) Питання: Чому описувати мак як «дім без
    вікон» — а не просто сказати «мак»?'
  - 'Провокація: Загадка — не розвага. У фольклорі неправильна відповідь = смерть (русалка залоскоче, диявол забере душу).
    Чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ритуальна версія (Попович) — загадка як випробування на межі «свого» і «чужого» світу. Кашубський «кривий диявол»
    загадує загадки заблуканим: хто вгадав — живе. Знання = влада над хаосом'
  - 'Дебат 2: Когнітивна версія — загадка як тренування метафоричного мислення. Бачити одне через інше — ключова когнітивна
    здібність. Розвага з дидактичною функцією'
  - '[!epistemic-humility] «Ми не знаємо, чи загадки СПРАВДІ виконували ритуальну функцію у давніх слов''ян — чи це реконструкція
    з аналогій»'
  - 'Глобальна синхронність: Sphinx riddle (Греція — вгадай або помри), koan (Японія — логічний парадокс як шлях до просвітлення),
    Arabic alghaz — загадка як випробування розуму у всіх культурах'
  section: 'Конфліктна карта: Розвага чи ритуал?'
  words: 1050
- points:
  - 'Костомаров: символ = «духовне значення тілесного предмета». Загадка — це процес у дії: тілесний предмет описаний ЛИШЕ
    через його «духовне значення»'
  - 'Механізм: відоме описується через незвичне (мак = дім без вікон). Метафора — не прикраса, а ЄДИНИЙ спосіб опису'
  - 'Кеннінг як паралель: «Слово о полку Ігоревім» — «криваве вино» замість «кров». Та сама логіка: замінити назву описовим
    зворотом'
  - 'Первинне джерело: 4-5 загадок різних типів — описова, питальна, числова, парадоксальна'
  section: 'Читання: Метафора як мова загадки'
  words: 1250
- points:
  - Костомаров записав казку «Про дівку-семилітку» — пан загадує загадки підданим, лише бідна дівчинка вгадує. Мудрість перемагає
    владу та статус
  - 'Літопис: Ярослав посилає гінця з загадкою — «меду мало варено, а дружини багато?» Метафорична мова як військовий код'
  - 'Русальна загадка з модуля folk-003: «Що росте без кореня, що біжить без повода, що цвіте без цвіту?» — камінь, вода,
    папороть. Відгадай або помри'
  - '[!decolonization] Костомаров збирав загадки як частину УКРАЇНСЬКОЇ фольклорної традиції, а не «южнорусской». Його збірка
    — один із перших наукових корпусів'
  section: 'Читання: Загадка як випробування'
  words: 1150
- points:
  - 'Тематичні групи: природа, побут, тіло, знаряддя, абстрактні поняття. Сільськогосподарський світ як основне джерело метафор'
  - 'Звукова гра: асонанс, консонанс, ономатопоея. Загадка — не лише ЗМІСТ, а й ЗВУК'
  - '[!myth-buster] «Загадки — для дітей» — НЕ лише. Клим Смолятич (XII ст.) тлумачив Святе Письмо як загадку: «Премудрість
    утворила собі храм на семи стовпах» — це загадка, де кожен елемент має приховане значення'
  - '[!anti-hagiography] Загадки також можуть бути грубими, сексуальними, скатологічними. «Народна мудрість» включає і те,
    що сучасні збірки вирізають'
  section: 'Аналіз: Мікрокосм у хаті'
  words: 950
- points:
  - 'Повернення до розминки: чому «дім без вікон», а не «мак»? Тому що загадка тренує бачити ЗОВНІШНЄ через ВНУТРІШНЄ. Це
    не ускладнення — це інший спосіб пізнання'
  - 'Ключова теза: загадка — не розвага, а архаїчний механізм метафоричного мислення, що існує на межі гри, ритуалу та філософії'
  section: Підсумок
  words: 400
