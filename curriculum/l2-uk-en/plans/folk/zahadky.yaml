module: folk-025
level: FOLK
cefr_min: C1
sequence: 25
slug: zahadky
version: '4.0'
title: 'Загадки: Метафоричне бачення світу'
subtitle: 'Riddles: A Metaphorical Worldview'
focus: Riddle as ritual test (life/death), metaphor as core mechanism, microcosm-macrocosm correspondence, kenning as literary parallel, Kostоmarov riddle collection
phase: FOLK.5
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Загадка: «Стоїть дім, повен зерна, та ні вікон, ні дверей.» (Відповідь: мак.) Питання: Чому описувати мак як «дім без вікон» — а не просто сказати «мак»?'
  - 'Провокація: Загадка — не розвага. У фольклорі неправильна відповідь = смерть (русалка залоскоче, диявол забере душу). Чому?'
  words: 400
- section: 'Конфліктна карта: Розвага чи ритуал?'
  points:
  - 'Дебат 1: Ритуальна версія (Попович) — загадка як випробування на межі «свого» і «чужого» світу. Кашубський «кривий диявол» загадує загадки заблуканим: хто вгадав — живе. Знання = влада над хаосом'
  - 'Дебат 2: Когнітивна версія — загадка як тренування метафоричного мислення. Бачити одне через інше — ключова когнітивна здібність. Розвага з дидактичною функцією'
  - '[!epistemic-humility] «Ми не знаємо, чи загадки СПРАВДІ виконували ритуальну функцію у давніх слов''ян — чи це реконструкція з аналогій»'
  - 'Глобальна синхронність: Sphinx riddle (Греція — вгадай або помри), koan (Японія — логічний парадокс як шлях до просвітлення), Arabic alghaz — загадка як випробування розуму у всіх культурах'
  words: 800
- section: 'Читання: Метафора як мова загадки'
  points:
  - 'Костомаров: символ = «духовне значення тілесного предмета». Загадка — це процес у дії: тілесний предмет описаний ЛИШЕ через його «духовне значення»'
  - 'Механізм: відоме описується через незвичне (мак = дім без вікон). Метафора — не прикраса, а ЄДИНИЙ спосіб опису'
  - 'Кеннінг як паралель: «Слово о полку Ігоревім» — «криваве вино» замість «кров». Та сама логіка: замінити назву описовим зворотом'
  - 'Первинне джерело: 4-5 загадок різних типів — описова, питальна, числова, парадоксальна'
  words: 1000
- section: 'Читання: Загадка як випробування'
  points:
  - 'Костомаров записав казку «Про дівку-семилітку» — пан загадує загадки підданим, лише бідна дівчинка вгадує. Мудрість перемагає владу та статус'
  - 'Літопис: Ярослав посилає гінця з загадкою — «меду мало варено, а дружини багато?» Метафорична мова як військовий код'
  - 'Русальна загадка з модуля folk-003: «Що росте без кореня, що біжить без повода, що цвіте без цвіту?» — камінь, вода, папороть. Відгадай або помри'
  - '[!decolonization] Костомаров збирав загадки як частину УКРАЇНСЬКОЇ фольклорної традиції, а не «южнорусской». Його збірка — один із перших наукових корпусів'
  words: 900
- section: 'Аналіз: Мікрокосм у хаті'
  points:
  - 'Тематичні групи: природа, побут, тіло, знаряддя, абстрактні поняття. Сільськогосподарський світ як основне джерело метафор'
  - 'Звукова гра: асонанс, консонанс, ономатопоея. Загадка — не лише ЗМІСТ, а й ЗВУК'
  - '[!myth-buster] «Загадки — для дітей» — НЕ лише. Клим Смолятич (XII ст.) тлумачив Святе Письмо як загадку: «Премудрість утворила собі храм на семи стовпах» — це загадка, де кожен елемент має приховане значення'
  - '[!anti-hagiography] Загадки також можуть бути грубими, сексуальними, скатологічними. «Народна мудрість» включає і те, що сучасні збірки вирізають'
  words: 700
- section: Підсумок
  points:
  - 'Повернення до розминки: чому «дім без вікон», а не «мак»? Тому що загадка тренує бачити ЗОВНІШНЄ через ВНУТРІШНЄ. Це не ускладнення — це інший спосіб пізнання'
  - 'Ключова теза: загадка — не розвага, а архаїчний механізм метафоричного мислення, що існує на межі гри, ритуалу та філософії'
  words: 400
vocabulary_hints:
- word: загадка
  pos: ж.
  definition: короткий твір, де предмет описаний метафорично з метою перевірити кмітливість
- word: відгадка
  pos: ж.
  definition: правильна відповідь на загадку — предмет, зашифрований у метафоричному описі
- word: метафора
  pos: ж.
  definition: перенесення властивостей одного предмета на інший за подібністю — основний прийом загадки
- word: кеннінг
  pos: ч.
  definition: описовий метафоричний зворот замість прямої назви — «криваве вино» = кров
- word: персоніфікація
  pos: ж.
  definition: наділення неживих предметів людськими рисами — частий прийом у загадках
- word: парадокс
  pos: ч.
  definition: логічне протиріччя — тип загадки, де відповідь суперечить очевидному
- word: ономатопоея
  pos: ж.
  definition: звуконаслідування — використання звуків для підказки у загадці
- word: мікрокосм
  pos: ч.
  definition: малий світ (хата, двір) як модель великого світу (Всесвіту) — принцип загадки
- word: когнітивний
  pos: прикм.
  definition: пов'язаний з пізнанням, мисленням — загадка як когнітивне тренування
- word: криптолект
  pos: ч.
  definition: таємна мова — загадка як форма кодованого знання, доступного лише посвяченим
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: ритуальна функція (загадка = випробування на межі світів) чи когнітивна (загадка = тренування метафоричного мислення)? Студент визначає за прикладом.'
  items: 4
- type: fill-in
  focus: Поетична та когнітивна лексика
  description: 'Терміни: метафора, кеннінг, парадокс, мікрокосм, когнітивний — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: 3 загадки'
  description: 'Подано 3 загадки різних типів: описова, парадоксальна, числова. Студент аналізує метафоричний механізм кожної: (1) що описано, (2) через що описано, (3) яка логіка зв''язку між ними?'
- type: note
  focus: 'Есе: Загадка як філософія'
  description: 'Загадка вимагає бачити приховане за видимим. Та сама здатність потрібна в науці (гіпотеза), мистецтві (символ), психології (підтекст). Чи є загадка — першою формою філософського мислення? (400-600 слів)'
