objectives:
- Аналізувати метафору як основний механізм загадки — не прикрасу, а спосіб пізнання
- Розуміти ритуальну функцію загадки — випробування на межі «свого» та «чужого»
- Порівнювати загадку з кеннінгом та алегоричним тлумаченням як спорідненими формами
- Класифікувати загадки за типами (описова, парадоксальна, числова) та тематикою
