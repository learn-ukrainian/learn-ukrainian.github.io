objectives:
- Критично аналізувати конкурентні інтерпретації веснянок — як магічного заклинання vs естетичного жанру
- Читати повний текст архаїчної веснянки з лінгвістичним та ритуалознавчим коментарем
- Формулювати аргументовану позицію щодо функції хороводу як космічної моделі в контексті індоєвропейської обрядовості
- Оцінювати сучасне побутування веснянок у контексті дискусії про автентичність та музеїфікацію фольклору
