content_outline:
- points:
  - 'Провокаційне питання: що таке веснянка — пісня, гра, танок чи все разом? У повній традиційній формі це слово + мелодія + хоровий рух + гра + сезонний час + громада'
  - 'Фрагмент верифікованого корпусного тексту — «Вже весна воскресла, / Що ж сь нам принесла?» (Грушевський, chunk da46aa92_c0178, verify_quote 1.0) — як великодня лексика воскресіння стає мовою пробудження весни'
  - Студент формулює першу гіпотезу про функцію веснянки — закликання й вітання весни, великодня обрядовість, спільнотна гра, естетична форма
  section: Розминка
  words: 400
- points:
  - 'Дебати 1: Костомаров — веснянки як залишок язичницьких святкувань, що тривали місяць і завершувались
    Купалом. Сучасні фольклористи — це реконструкція романтиків, а не факт'
  - 'Дебати 2: Богиня Лада — реальне божество чи вигадка романтиків? Приспів «ой лелю-ладо» — ім''я богині
    (Костомаров) чи просто вигук без етимології?'
  - '[!epistemic-humility] «За версією Костомарова, Лада — слов''янська Афродіта... Однак сучасні лінгвісти
    ставлять під сумнів саму реконструкцію...»; приспів «ой лелю-ладо» у корпусі — це обрядовий рефрен, а не доведене ім''я божества'
  - '[!critical-source] Радянська фольклористика часто зводила веснянки до «пережитку язичництва» й «магії», щоб применшити їхній християнсько-обрядовий (великодній) шар. Цю атеїстично-redukціоністську рамку треба назвати й не відтворювати: веснянки несуть і дохристиянський аграрно-обрядовий, і християнсько-великодній зміст'
  - 'Глобальна синхронність: весняні обряди вітання весни — персидський Новруз, японський Ханамі, кельтський
    Белтейн — як різні культури відзначають пробудження природи'
  section: 'Конфліктна карта: як читати походження веснянок'
  words: 1100
- points:
  - 'Верифіковані корпусні тексти звертання до весни й птахів: «Ой вилинь, вилинь, гоголю, / Винеси літо з собою» (Грушевський, chunk da46aa92_c0284, verify_quote 1.0) та «Чом ти, жаворонку, рано з вир''я вилетів» (chunk da46aa92_c0284, 0.99) — птах як вісник тепла й літа'
  - 'Мова закликів: кличний відмінок і наказовий спосіб — це пряме звертання до весни, птахів і сонця як до бажаних гостей (вітання, запрошення, прохання про врожай), а не «наказ» комусь. Це жива граматична риса української мови, яку учень бачить у дії'
  - Проста мелодія, повтор і хоровий рефрен — засіб спільного виконання, пам''яті й залучення всієї громади, а не «формула»
  - 'Великодній шар: багато гаївок співають у великодній час коло церкви; християнська формула «Боже» входить у весняний аграрний текст — це синкретизм (поєднання), а не заміна одного змісту іншим'
  - '[!decolonization] Українська веснянка — НЕ «общеславянская» традиція. Гаївки великоднього циклу —
    специфічно українське явище, не зафіксоване в російській традиції'
  section: 'Читання: Як веснянка кличе весну'
  words: 1300
- points:
  - 'Хоровод (танок, коло) — не просто танець: коло як образ сонця, безперервності життя та єдності громади (за культурологічним прочитанням Поповича)'
  - 'Великодній контекст: на Благовіщення та у великодній час дівчата виводять перший хоровод і кривий танець коло церкви; гаївки тривають від ранньої весни до св. Юрія / Зелених свят'
  - Гаївки та драматизовані ігри — вибір партнера, залицяння, обрядове змагання, перехід молоді в новий сезон
  - 'Рослинна символіка у верифікованих текстах: «При долині мак» (Енциклопедія українознавства, chunk feaa5fa7_c0604), «Вийся, горошку» (feaa5fa7_c0605); барвінок, калина, верба як образи росту й оновлення'
  - 'Кривий танець як «маршрутна карта» руху: «Кривого танця йдемо, кінця му не знайдемо, / то вгору, то в долину, то в ружу, то в калину» (feaa5fa7_c0605, verify_quote 1.0)'
  - '[!epistemic-humility] Романтичні образи — Весна-дівиця/мати (за інтерпретацією Костомарова), вирій/Урай із ключами, що «відмикає» весну — це поширені фольклорні мотиви та реконструкції XIX ст., а не доведена давня «механіка» обряду. Подаємо як образ і як версію, не як факт'
  section: 'Аналіз: Хоровод, гаївка і великодній простір'
  words: 1300
- points:
  - 'Повернення до питання розминки: обрядова функція чи естетична форма — і чи вони взагалі взаємовиключні? Студент формулює відповідь'
  - Романтизм XIX ст. — Максимович, Срезнєвський відкрили веснянки для освічених кіл (Чижевський). Чи
    їхній ентузіазм допоміг зберегти, чи спотворив?
  - '[!anti-hagiography] Романтики ідеалізували «народний дух» у веснянках — але це були живі обряди конкретних громад із конкретними соціальними функціями, а не лише «чисте мистецтво» відірваних від життя текстів'
  - 'Сучасність: фольклорні ансамблі виконують веснянки без обрядового контексту — це збереження чи музеєфікація?'
  section: 'Дискусія: Від обряду до естетики'
  words: 700
- points:
  - Студент формулює відповідь на питання розминки з аргументами різних позицій
  - 'Ключова теза: веснянки / гаївки — весняні обрядові пісні, де ритуальна функція (закликання й вітання весни, великодня гаївка, спільнотний хоровод) і естетична форма існують разом; жанр зберігає і релігійно-обрядовий, і художній шар української традиції'
  section: Підсумок
  words: 400
focus: Spring calendar-ritual songs (calling and welcoming spring, Easter hayivky), circle dance, plant
  symbolism, the contested Lada reconstruction, romantic reception vs lived community ritual function
level: FOLK
module: folk-006
objectives:
- Аналізувати веснянки / гаївки як весняний обрядовий жанр (закликання весни, великодня гаївка, хоровод) та як естетичну форму, з епістемічною обережністю щодо реконструкцій походження
- Читати верифіковані корпусні тексти веснянок з лінгвістичним та обрядознавчим коментарем
- Формулювати аргументовану позицію щодо функції хороводу й гаївки в українській весняній обрядовості
- Оцінювати сучасне побутування веснянок у контексті дискусії про автентичність та музеєфікацію фольклору
