content_outline:
- points:
  - 'Провокаційне питання: Чи можна «наспівати» весну? Якщо так — то веснянки це мистецтво чи магія?'
  - Фрагмент архаїчної веснянки — «Прокидайтесь, квіти, трави...» — без контексту, лише текст
  - Студент формулює першу гіпотезу про функцію веснянки — естетичну чи ритуальну
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Костомаров — веснянки як залишок язичницьких святкувань, що тривали місяць і завершувались Купалом. Сучасні
    фольклористи — це реконструкція романтиків, а не факт'
  - 'Дебат 2: Богиня Лада — реальне божество чи вигадка романтиків? Приспів «ой лелю-ладо» — ім''я богині (Костомаров) чи
    просто вигук без етимології?'
  - '[!epistemic-humility] «За версією Костомарова, Лада — слов''янська Афродіта... Однак сучасні лінгвісти ставлять під сумнів
    саму реконструкцію...»'
  - 'Глобальна синхронність: весняні обряди закликання — персидський Новруз, японський Ханамі, кельтський Бельтейн — як різні
    культури «будять» природу'
  section: 'Конфліктна карта: Заклинання чи розвага?'
  words: 1100
- points:
  - Повний текст архаїчної веснянки із записів Максимовича або Чубинського — звертання до птахів, сонця, тепла
  - Формульні заклинання (заклички) — наказовий спосіб, кличний відмінок — не прохання, а ритуальний наказ природі
  - Мелодична простота — чому заклинання має бути простим? Повтор = магічне закріплення
  - '[!decolonization] Українська веснянка — НЕ «общеславянская» традиція. Гаївки великоднього циклу — специфічно українське
    явище, не зафіксоване в російській традиції'
  section: 'Читання: Веснянка як заклинання'
  words: 1300
- points:
  - 'Хоровод (танок, коло) — не просто танець, а космічна модель: коло = сонце, безперервність життя, магічний захисний простір
    (Попович)'
  - Гаївки та драматизовані ігри — вибір партнера, залицяння, ритуальне змагання
  - 'Рослинна символіка: барвінок = вірність, калина = краса/дівоцтво, верба = печаль/пробудження'
  - Образ Весни як персоніфікованої дівиці/матері (Костомаров) — мотив матері й доньки як вічне оновлення
  - '[!myth-buster] Образ Ураю з ключами до неба — весну треба «відімкнути», вона не приходить сама. Ритуал = ключ, пісня
    = інструмент'
  section: 'Аналіз: Хоровод як модель Всесвіту'
  words: 1300
- points:
  - Повернення до початкового питання — магія чи мистецтво? Студент формулює відповідь
  - Романтизм XIX ст. — Максимович, Срезнєвський відкрили веснянки для освічених кіл (Чижевський). Чи їхній ентузіазм допоміг
    зберегти, чи спотворив?
  - '[!anti-hagiography] Романтики ідеалізували «народний дух» у веснянках — але в реальності це були обряди конкретних громад
    з конкретними соціальними функціями. Не «чисте мистецтво», а інструмент'
  - 'Сучасність: фольклорні ансамблі виконують веснянки без ритуального контексту — це збереження чи музеїфікація?'
  section: 'Дискусія: Від обряду до естетики'
  words: 700
- points:
  - Студент формулює відповідь на питання розминки з аргументами обох позицій
  - 'Ключова теза: веснянки — точка, де магія стає мистецтвом, а мистецтво зберігає пам''ять про магію'
  section: Підсумок
  words: 400
