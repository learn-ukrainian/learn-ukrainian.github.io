vesum_exemptions:
  # Per-module VESUM-gate exemptions (gate: scripts/build/linear_pipeline.py _vesum_gate).
  # Each entry is rationale-bearing and module-scoped. The two REAL spelling errors
  # build12 surfaced (дебат→дебати, музеїфікація→музеєфікація) are NOT exempted — they
  # were fixed at source in content_outline/objectives above.
  foreign_cultural_terms:
  # Comparative "global synchrony of spring rites" content (Конфліктна карта section).
  - term: Белтейн
    forms: [Белтейн, Белтейном, Белтейну, Белтейні]
    wikipedia_url: https://uk.wikipedia.org/wiki/Белтейн
    rationale: кельтське весняне свято Колеса Року; порівняльний контекст глобальної синхронності весняних обрядів
  - term: Навруз
    forms: [Навруз, Наврузом, Навруза, Новруз, Новрузом]
    wikipedia_url: https://uk.wikipedia.org/wiki/Навруз
    rationale: іранське свято весняного рівнодення (варіанти Навруз/Новруз за статтею uk.wikipedia); порівняльний контекст
  - term: ханамі
    forms: [ханамі]
    wikipedia_url: https://uk.wikipedia.org/wiki/Милування_квітами
    rationale: японський звичай милування квітами (ханамі); чужомовний культурний термін у нижньому регістрі, якого немає у VESUM
  quoted_critical_terms:
  # Imperial term cited in «…» to be REJECTED (the [!decolonization] point, Читання section).
  - term: общеславянська
    forms: [общеславянська, общеславянською, общеславянської, общеславянській, общеславянськими]
    rationale: імперський термін «общеславянская», цитований у лапках для критики деколонізаційної рамки — НЕ власна лексика тексту
  corpus_attested_quotes:
  # Folk forms the writer analyses in prose; verbatim in the module's cited readings.
  - term: васильочок
    forms: [васильочок]
    source_chunk: da46aa92_c0284
    rationale: вербатим із цитованої веснянки «Запашненький васильочок» (запис Грушевського)
  - term: жаворонку
    forms: [жаворонку]
    source_chunk: da46aa92_c0284
    rationale: вербатим із цитованої веснянки «Чом ти, жаворонку, рано з вир'я вилетів» (запис Грушевського)
  - term: вирья
    forms: [вирья]
    source_chunk: da46aa92_c0284
    rationale: вербатим із цитованої веснянки «…рано з вирья вилетів» (архаїчна форма «вир'я», запис Грушевського)
  - term: літо-літечко
    forms: [літо-літечко]
    source_chunk: da46aa92_c0284
    rationale: вербатим із цитованої веснянки «Винеси літо-літечко» (запис Грушевського)
  - term: лелю-ладо
    forms: [лелю-ладо]
    source_chunk: 6890007d_c0300
    rationale: обрядовий рефрен «ой лелю-ладо», цитований із Костомарова; модуль трактує його як ритуальний рефрен, а не доведене ім'я божества
