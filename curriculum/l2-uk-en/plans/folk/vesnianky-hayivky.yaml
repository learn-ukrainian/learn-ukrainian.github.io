module: folk-004
level: FOLK
sequence: 4
slug: vesnianky-hayivky
title: "Веснянки та гаївки"
subtitle: "Spring songs, Easter hayivky, movement, public source discipline"
version: 5
status: locked
phase: base-first
cefr_min: C1
word_target: 4700
focus: "Clean source-first M04 base for Ukrainian spring-cycle songs: веснянки, гаївки, public Ukrlib texts, Easter context, performance, movement, poetics."
persona: "C1+ seminar learner reading Ukrainian spring folk songs through public primary texts, school canon, and careful framing."
objectives:
  - "Розрізняти веснянки, гаївки, гагілки й ягілки за назвою, регіоном, часом, виконавською ситуацією і текстовою формою."
  - "Пояснити веснянки як spring-cycle calendar songs, а гаївки як Easter-season song-games where the source supports that frame."
  - "Читати публічний текст через звертання, повтор, рух, образ весни, поля, квітів, птахів і громадного голосу."
  - "Працювати тільки з public Ukrlib/Pidruchnyk/Osvita-style sources in learner-facing materials."
  - "Утримувати Christian-historical Easter context where гаївки are taught as Easter songs, without hidden-core or sensational framing."
pedagogy:
  approach: "source-first seminar"
  notes:
    - "Begin with a short public spring-song excerpt, then ask whether it is poem, song, game, movement, or all together."
    - "Keep movement and performer visible; do not reduce the genre to silent lyric."
    - "Phase B must clean and host readings before linking any candidate beyond existing clean pages."
content_outline:
  - section: "Розминка: що робить веснянка?"
    words: 450
    points:
      - "Open from 'Ой весна, весна, ти красна': direct address, dialogue, gifts of summer, grain, flowers, and community voice."
      - "Pose the central question: when the text is sung with movement, is it mainly poem, song, game, seasonal greeting, or public memory?"
      - "Name the source boundary: one public recorded text is not the whole living tradition."
  - section: "Назви, межі жанру і шкільна рамка"
    words: 700
    points:
      - "Use grade 6 Ukrainian literature sources to place веснянки and гаївки inside calendar-cycle folk songs."
      - "Separate веснянка, гаївка, гагілка, ягілка as names tied to region and performance setting."
      - "Avoid claiming one master origin; show what the source can prove: title, text, genre, performer, season."
  - section: "Primary readings and source hammer"
    words: 850
    points:
      - "Use existing hosted 'Ой весна, весна, ти красна' only after Phase B metadata and quote recheck."
      - "Clean and host 'Ой виорю я нивку широкую' from public Ukrlib before lesson linking."
      - "Survey the Ukrlib spring-song collection for additional public texts; do not count collection pages as multiple readings unless generator/source policy supports separate pages."
      - "Every `:::primary-reading` excerpt must pass quote verification under `Народна творчість` before shipping."
  - section: "Поетика руху, повтору і звертання"
    words: 900
    points:
      - "Analyze address to spring, birds, girls, boys, field, or imagined speaker."
      - "Show repetition as a memory, rhythm, and group-performance device."
      - "Teach movement grammar: circle, line, gate, winding path, sowing gesture, paired game."
      - "Keep archaic or variant forms inside verified primary reading text; use modern explanatory prose elsewhere."
  - section: "Гаївка, Великдень і громадний простір"
    words: 650
    points:
      - "When sources support it, explain гаївки as Easter-season song-games in public festive space."
      - "Give Christian/Easter context proper weight: Великдень, Воскресіння, churchyard space, community joy."
      - "Do not describe Christian tradition as an outer layer over a hidden system."
  - section: "Деколонізаційна рамка і source limits"
    words: 650
    points:
      - "Reject flattening Ukrainian веснянки into unnamed imperial or generic material."
      - "Also avoid romantic overclaiming: public source, textbook, scholarly interpretation, and modern performance are different evidence types."
      - "Name Ukrainian terms and regional variation as evidence, not as a problem to erase."
  - section: "Міст до писемної та високої культури"
    words: 500
    points:
      - "Move from public folk text to later literature, choral practice, stage adaptation, and school memory."
      - "Keep Lesia Ukrainka or choral references short and source-supported; do not let them replace spring-song reading."
      - "Return to the opening question with evidence: text + movement + season + community."
activity_hints:
  - type: cycle-map
    placement: inline
    focus: "Classify examples by season, performer, place, addressee, action, and public source."
  - type: performance
    placement: inline
    focus: "Infer movement from a spring-song text: circle, line, gate, sowing, winding, or dialogue."
  - type: motif-formula
    placement: workbook
    focus: "Track spring, field, grain, flowers, birds, repetition, and address across public texts."
  - type: variant-comparison
    placement: workbook
    focus: "Compare two public spring-song pages without declaring one original."
  - type: source-check
    placement: workbook
    focus: "Separate public primary text, textbook explanation, scholarly note, and build-only research."
