slug: vesnianky-hayivky
version: '4.0'
title: 'Веснянки та гаївки: Пробудження природи'
subtitle: 'Spring Songs and Circle Dances: Awakening of Nature'
focus: Spring invocation songs as performative magic, circle dance as cosmic model, plant symbolism, Lada debate, romantic idealization vs ritual function
phase: FOLK.1
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Провокаційне питання: Чи можна «наспівати» весну? Якщо так — то веснянки це мистецтво чи магія?'
  - 'Фрагмент архаїчної веснянки — «Прокидайтесь, квіти, трави...» — без контексту, лише текст'
  - Студент формулює першу гіпотезу про функцію веснянки — естетичну чи ритуальну
  words: 400
- section: 'Конфліктна карта: Заклинання чи розвага?'
  points:
  - 'Дебат 1: Костомаров — веснянки як залишок язичницьких святкувань, що тривали місяць і завершувались Купалом. Сучасні фольклористи — це реконструкція романтиків, а не факт'
  - 'Дебат 2: Богиня Лада — реальне божество чи вигадка романтиків? Приспів «ой лелю-ладо» — ім''я богині (Костомаров) чи просто вигук без етимології?'
  - '[!epistemic-humility] «За версією Костомарова, Лада — слов''янська Афродіта... Однак сучасні лінгвісти ставлять під сумнів саму реконструкцію...»'
  - 'Глобальна синхронність: весняні обряди закликання — персидський Новруз, японський Ханамі, кельтський Бельтейн — як різні культури «будять» природу'
  words: 800
- section: 'Читання: Веснянка як заклинання'
  points:
  - 'Повний текст архаїчної веснянки із записів Максимовича або Чубинського — звертання до птахів, сонця, тепла'
  - 'Формульні заклинання (заклички) — наказовий спосіб, кличний відмінок — не прохання, а ритуальний наказ природі'
  - 'Мелодична простота — чому заклинання має бути простим? Повтор = магічне закріплення'
  - '[!decolonization] Українська веснянка — НЕ «общеславянская» традиція. Гаївки великоднього циклу — специфічно українське явище, не зафіксоване в російській традиції'
  words: 1000
- section: 'Аналіз: Хоровод як модель Всесвіту'
  points:
  - 'Хоровод (танок, коло) — не просто танець, а космічна модель: коло = сонце, безперервність життя, магічний захисний простір (Попович)'
  - 'Гаївки та драматизовані ігри — вибір партнера, залицяння, ритуальне змагання'
  - 'Рослинна символіка: барвінок = вірність, калина = краса/дівоцтво, верба = печаль/пробудження'
  - 'Образ Весни як персоніфікованої дівиці/матері (Костомаров) — мотив матері й доньки як вічне оновлення'
  - '[!myth-buster] Образ Ураю з ключами до неба — весну треба «відімкнути», вона не приходить сама. Ритуал = ключ, пісня = інструмент'
  words: 1000
- section: 'Дискусія: Від обряду до естетики'
  points:
  - 'Повернення до початкового питання — магія чи мистецтво? Студент формулює відповідь'
  - 'Романтизм XIX ст. — Максимович, Срезнєвський відкрили веснянки для освічених кіл (Чижевський). Чи їхній ентузіазм допоміг зберегти, чи спотворив?'
  - '[!anti-hagiography] Романтики ідеалізували «народний дух» у веснянках — але в реальності це були обряди конкретних громад з конкретними соціальними функціями. Не «чисте мистецтво», а інструмент'
  - 'Сучасність: фольклорні ансамблі виконують веснянки без ритуального контексту — це збереження чи музеїфікація?'
  words: 400
- section: Підсумок
  points:
  - Студент формулює відповідь на питання розминки з аргументами обох позицій
  - 'Ключова теза: веснянки — точка, де магія стає мистецтвом, а мистецтво зберігає пам''ять про магію'
  words: 400
vocabulary_hints:
- word: веснянка
  pos: ж.
  definition: календарно-обрядова пісня весняного циклу, що виконувалася для закликання тепла та пробудження природи
- word: гаївка
  pos: ж.
  definition: різновид веснянки великоднього циклу, виконувана у гаях біля церков, часто з іграми та хороводами
- word: закличка
  pos: ж.
  definition: пісня-звертання до сил природи у формі ритуального наказу або прохання
- word: хоровод
  pos: ч.
  definition: ритуальний круговий танець, що символізує сонце, єдність громади та магічний захисний простір
- word: персоніфікація
  pos: ж.
  definition: художній прийом наділення абстрактних понять або природних явищ людськими рисами
- word: обрядовість
  pos: ж.
  definition: система ритуальних дій, пов'язаних із певними подіями календарного циклу або життєвого переходу
- word: заклинання
  pos: с.
  definition: магічна формула, ритуальний текст, що має на меті вплинути на природні чи надприродні сили
- word: паралелізм
  pos: ч.
  definition: стилістичний прийом повторення подібних синтаксичних конструкцій для підсилення думки
- word: калина
  pos: ж.
  definition: дерево-символ у фольклорі — втілення краси, дівоцтва, України
- word: автохтонний
  pos: прикм.
  definition: місцевого, корінного походження — протилежність запозиченому
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція позицій дебату: чия теза — Костомарова, сучасних фольклористів, Поповича? Студент визначає позицію за цитатою.'
  items: 4
- type: fill-in
  focus: Обрядова та ботанічна лексика
  description: 'Терміни з тексту модуля: закличка, персоніфікація, хоровод, автохтонний, заклинання — вставити у речення з контексту'
  items: 5
- type: note
  focus: 'Джерельний аналіз: дві веснянки'
  description: 'Подано дві веснянки — архаїчну (закличку з наказовими формами) та пізню (ліричну пісню про кохання). Студент аналізує: яка з них старша? Які мовні маркери вказують на магічну функцію? Що змінилось при переході від обряду до естетики?'
- type: note
  focus: 'Есе: Весна приходить сама чи її треба кликати?'
  description: 'Сучасні фольклорні фестивалі відтворюють веснянки як культурну подію. Чи зберігається їхня суть поза ритуальним контекстом — чи це вже інше явище? Аргументуйте (400-600 слів).'
