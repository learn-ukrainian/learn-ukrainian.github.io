content_outline:
- points:
  - 'Цитата з весільної пісні-сватання: «Ми мисливці, полювали на куницю — вона забігла на ваше подвір''я, віддайте нам її».
    Хто «ми», хто «куниця», і чому шлюб = полювання?'
  - 'Питання: Чому найрадісніша подія в житті починається з мови війни та захоплення?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Попович — весілля як архаїчний обмін жінками між ворогуючими родами. «Освоєння чужого» через споріднення. Два
    роди = ворожі сторони, що укладають мир'
  - 'Дебат 2: Функціональна версія — весілля як господарська угода (додаткові робочі руки), юридичний акт (заручини незворотні),
    соціальний театр для громади'
  - '[!epistemic-humility] «Попович реконструює архаїчну модель з пізніх записів. Чи коли-небудь весілля НАСПРАВДІ було ритуальною
    війною — чи це інтерпретація?»'
  - 'Глобальна синхронність: bride capture (Центральна Азія), mahr (ісламський шлюбний контракт), обряди переходу (ван Геннеп)
    — шлюб як універсальний rite de passage'
  section: 'Конфліктна карта: Шлюб як договір чи як драма?'
  words: 975
- points:
  - Сватання — дипломатична місія з алегоричною мовою. Старости як «ворогуючі дипломати». Мисливська термінологія — «князь»
    і «княгиня» з княжої доби (Чижевський)
  - Рушник як сакральний знак згоди. Гарбуз як публічна відмова та образа
  - 'Заручини — незворотний юридичний акт. Відмова після заручин = компенсація. Попович: заручини як торговельна угода'
  - 'Первинне джерело: фрагмент весільної величальної пісні'
  section: 'Читання: Від сватання до заручин'
  words: 1175
- points:
  - Дівич-вечір — ритуальна «смерть» дівоцтва. Розплітання коси, жалісливі пісні. Плач нареченої — не спонтанний, а обрядово
    необхідний (Попович)
  - Коровай — космічний акт, не випічка. «Чисті» жінки печуть, чоловік саджає до печі. Сороміцькі пісні — стимулювання плодючості
  - Гільце (весільне деревце) — пережиток Світового дерева. Прикрашена гілка сосни = axis mundi нової родини
  - '[!decolonization] Весільний обряд — найскладніша форма українського народного театру. Жоден інший слов''янський народ
    не зберіг таку розвинену весільну драматургію'
  section: 'Читання: Дівич-вечір, коровай, гільце'
  words: 1075
- points:
  - 'Обряд переходу (rite de passage): сепарація (від батьківської родини) → лімінальний стан (ні дівчина, ні заміжня) → інкорпорація
    (в нову родину)'
  - Викуп нареченої — імітація штурму воріт, переговори. Символічне протистояння двох родів
  - Виїзд з батьківського дому — прощання з порогом, піччю, сакральними центрами рідної домівки. Це символічна смерть
  - '[!myth-buster] «Щаслива наречена» — сучасний міф. У традиційному весіллі наречена ЗОБОВ''ЯЗАНА плакати. Радість — для
    глядачів, для нареченої — горе переходу'
  - '[!anti-hagiography] Весілля не завжди було добровільним. Ранні шлюби, примусові сватання, економічний тиск. Пісні прославляють
    обряд, але не завжди — вибір нареченої'
  section: 'Аналіз: Смерть і народження'
  words: 1175
- points:
  - 'Повернення до розминки: студент тепер розуміє, чому шлюб починається з мови полювання — це архаїчний слід «освоєння чужого»'
  - 'Ключова теза: весілля — не свято, а містерія смерті старого статусу і народження нового'
  section: Підсумок
  words: 400
focus: Wedding as multi-act folk drama, rite of passage (van Gennep), symbolic death and rebirth of bride, korovai as cosmic
  act, two clans as ritual enemies
level: FOLK
module: folk-006
objectives:
- Аналізувати українське весілля як багатоактову ритуальну драму з чіткою структурою обряду переходу
- Інтерпретувати символіку короваю, гільця та рушника в контексті космологічних уявлень
- Критично оцінювати архаїчну модель «ворогуючих родів» як інтерпретацію — а не як безсумнівний факт
- Формулювати позицію щодо збереження/трансформації весільної обрядовості в сучасності
