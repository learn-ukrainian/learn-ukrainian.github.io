slug: vesilni-pisni
version: '4.0'
title: 'Весільна обрядовість: Драматизм переходу'
subtitle: 'Wedding Rituals: The Drama of Passage'
focus: Wedding as multi-act folk drama, rite of passage (van Gennep), symbolic death and rebirth of bride, korovai as cosmic act, two clans as ritual enemies
phase: FOLK.1
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Цитата з весільної пісні-сватання: «Ми мисливці, полювали на куницю — вона забігла на ваше подвір''я, віддайте нам її». Хто «ми», хто «куниця», і чому шлюб = полювання?'
  - 'Питання: Чому найрадісніша подія в житті починається з мови війни та захоплення?'
  words: 400
- section: 'Конфліктна карта: Шлюб як договір чи як драма?'
  points:
  - 'Дебат 1: Попович — весілля як архаїчний обмін жінками між ворогуючими родами. «Освоєння чужого» через споріднення. Два роди = ворожі сторони, що укладають мир'
  - 'Дебат 2: Функціональна версія — весілля як господарська угода (додаткові робочі руки), юридичний акт (заручини незворотні), соціальний театр для громади'
  - '[!epistemic-humility] «Попович реконструює архаїчну модель з пізніх записів. Чи коли-небудь весілля НАСПРАВДІ було ритуальною війною — чи це інтерпретація?»'
  - 'Глобальна синхронність: bride capture (Центральна Азія), mahr (ісламський шлюбний контракт), обряди переходу (ван Геннеп) — шлюб як універсальний rite de passage'
  words: 800
- section: 'Читання: Від сватання до заручин'
  points:
  - 'Сватання — дипломатична місія з алегоричною мовою. Старости як «ворогуючі дипломати». Мисливська термінологія — «князь» і «княгиня» з княжої доби (Чижевський)'
  - 'Рушник як сакральний знак згоди. Гарбуз як публічна відмова та образа'
  - 'Заручини — незворотний юридичний акт. Відмова після заручин = компенсація. Попович: заручини як торговельна угода'
  - 'Первинне джерело: фрагмент весільної величальної пісні'
  words: 1000
- section: 'Читання: Дівич-вечір, коровай, гільце'
  points:
  - 'Дівич-вечір — ритуальна «смерть» дівоцтва. Розплітання коси, жалісливі пісні. Плач нареченої — не спонтанний, а обрядово необхідний (Попович)'
  - 'Коровай — космічний акт, не випічка. «Чисті» жінки печуть, чоловік саджає до печі. Сороміцькі пісні — стимулювання плодючості'
  - 'Гільце (весільне деревце) — пережиток Світового дерева. Прикрашена гілка сосни = axis mundi нової родини'
  - '[!decolonization] Весільний обряд — найскладніша форма українського народного театру. Жоден інший слов''янський народ не зберіг таку розвинену весільну драматургію'
  words: 900
- section: 'Аналіз: Смерть і народження'
  points:
  - 'Обряд переходу (rite de passage): сепарація (від батьківської родини) → лімінальний стан (ні дівчина, ні заміжня) → інкорпорація (в нову родину)'
  - 'Викуп нареченої — імітація штурму воріт, переговори. Символічне протистояння двох родів'
  - 'Виїзд з батьківського дому — прощання з порогом, піччю, сакральними центрами рідної домівки. Це символічна смерть'
  - '[!myth-buster] «Щаслива наречена» — сучасний міф. У традиційному весіллі наречена ЗОБОВ''ЯЗАНА плакати. Радість — для глядачів, для нареченої — горе переходу'
  - '[!anti-hagiography] Весілля не завжди було добровільним. Ранні шлюби, примусові сватання, економічний тиск. Пісні прославляють обряд, але не завжди — вибір нареченої'
  words: 1000
- section: Підсумок
  points:
  - 'Повернення до розминки: студент тепер розуміє, чому шлюб починається з мови полювання — це архаїчний слід «освоєння чужого»'
  - 'Ключова теза: весілля — не свято, а містерія смерті старого статусу і народження нового'
  words: 400
vocabulary_hints:
- word: сватання
  pos: с.
  definition: перший етап весільного циклу — дипломатична місія старостів до батьків нареченої
- word: коровай
  pos: ч.
  definition: головний весільний хліб, що символізує сонце, родючість та єдність нової родини
- word: рушник
  pos: ч.
  definition: обрядовий вишитий рушник — знак згоди, долі, зв'язку між родинами
- word: дівич-вечір
  pos: ч.
  definition: обряд прощання нареченої з дівоцтвом напередодні весілля
- word: гільце
  pos: с.
  definition: весільне деревце — символ Світового дерева та створення нового родинного космосу
- word: величальна
  pos: ж.
  definition: обрядова пісня, що прославляє наречених, батьків або старостів під час весілля
- word: посаг
  pos: ч.
  definition: майно, яке наречена приносить у нову родину — відображення її соціального статусу
- word: інкорпорація
  pos: ж.
  definition: включення особи в нову соціальну групу — фінальна фаза обряду переходу
- word: лімінальний
  pos: прикм.
  definition: пороговий — стан між двома статусами, коли старий уже втрачений, а новий ще не набутий
- word: сороміцький
  pos: прикм.
  definition: непристойний за змістом, але ритуально необхідний — зокрема пісні під час печіння короваю
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція позицій: архаїчна модель (шлюб як обмін між ворогуючими родами) чи функціональна (шлюб як господарська угода)? Студент визначає за цитатою.'
  items: 4
- type: fill-in
  focus: Весільна обрядова лексика
  description: 'Терміни з тексту: сватання, коровай, гільце, лімінальний, інкорпорація — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: два весільних тексти'
  description: 'Подано два фрагменти: (1) жалісливу пісню дівич-вечора (наречена плаче), (2) величальну пісню весільного дня (радість і прославлення). Порівняйте: це протиріччя чи дві частини одного обряду переходу?'
- type: note
  focus: 'Есе: Чи зберігся обряд переходу в сучасному весіллі?'
  description: 'Сучасне українське весілля зберігає елементи обряду: викуп, коровай, рушник. Але чи зберігається їхня ритуальна суть — чи це вже лише традиція «для фото»? Аргументуйте (400-600 слів).'
