module: folk-023
level: FOLK
sequence: 23
slug: chumatski-burlatski-pisni
version: '2.0'
title: 'Чумацькі та бурлацькі пісні: Голос мандрівника'
subtitle: Chumak and Burlak Songs — The Wanderer's Voice
focus: Social lyrical songs of trade, displacement, and wandering life
phase: FOLK.2
word_target: 5000
content_outline:
- section: Вступ
  points:
  - Суспільно-побутова лірика — пісні соціальних груп
  - Чумацтво як культурний феномен — сіль, риба, степ
  words: 750
- section: Чумацькі пісні
  points:
  - Тематика — дорога, небезпека, розлука з родиною
  - '«Ой поїхав чумаченько» — аналіз тексту'
  - Степовий пейзаж як психологічний простір
  words: 950
- section: Бурлацькі пісні
  points:
  - Бурлаки — сезонні робітники, маргіналізація
  - Соціальний протест у пісні
  - Порівняння з волзькими бурлацькими піснями — різні традиції
  words: 900
- section: Рекрутські та солдатські пісні
  points:
  - Примусова мобілізація — трагедія відриву від землі
  - Антимілітарний пафос народної пісні
  words: 800
- section: Поетичні засоби
  points:
  - Ліризм — суб'єктивність, емоційність
  - Символіка дороги — шлях як метафора долі
  - Мелодика та ритміка — зв'язок тексту з мелодією
  words: 850
- section: Підсумок
  points:
  - Чумацька пісня як документ зниклого побуту
  - Словник термінів
  words: 750
