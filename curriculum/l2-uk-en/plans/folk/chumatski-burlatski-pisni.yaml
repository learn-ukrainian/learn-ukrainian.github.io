content_outline:
- points:
  - 'Фрагмент: «Мене змиють дрібні дощі, / А розчешуть густі терни, / А просушить ясне сонце, / А розкудрять буйні вітри»
    — мати кличе додому, а син відмовляється. Чому?'
  - 'Провокація: Чумак ОБИРАЄ дорогу замість дому — як козак обирає Січ. Але чумак не воює. Що його тримає в степу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Костомаров — чумацтво як перехідний стан «між старим битом і наступаючим». Козак став чумаком: «по духу і характеру
    — козак», але заняття мирне. Валка = похід, отаман = батько'
  - 'Дебат 2: Соціально-економічна версія — чумак їде не за романтикою, а за заробітком. Бурлак — ще гірше: безземельний маргінал,
    що шукає будь-яку роботу'
  - '[!epistemic-humility] «Костомаров романтизує чумака. Але ж чумацькі пісні САМІ містять і романтику, і відчай. Обидва
    голоси — автентичні»'
  - 'Глобальна синхронність: американські cowboy songs, австралійські waltzing matilda, російські бурлацькі (але порівняйте
    — різна естетика!), ірландські emigrant ballads — пісня мандрівника як архетип'
  section: 'Конфліктна карта: Романтика чи злидні?'
  words: 1075
- points:
  - 'Туга за домом: «Весь вік у дорозі марно літа трачу, / Ні жінки, ні діток ніколи не бачу» — центральний мотив'
  - 'Небезпеки: татарські напади, загибель цілих обозів. «Над річкою, над Салгір''ю» — Україна-мати плаче за синами'
  - 'Романтика свободи: «Мене змиють дрібні дощі...» — гімн незалежності та єднання з природою. Степ як простір свободи, а
    не лише небезпеки'
  - 'Темний бік: пияцтво, програш у кості, руйнування. «Зазнавшись із великими господарями» — моральна притча (Костомаров)'
  - 'Первинне джерело: фрагмент чумацької пісні з діалоговою структурою (мати — син)'
  section: 'Читання: Чумацькі пісні'
  words: 1375
- points:
  - Бурлак — не чумак. Без землі, без родини, без статусу. «Нікому не милий» — гострий соціальний біль
  - Рекрутські пісні — примусова мобілізація. Відрив від землі = символічна смерть. Антимілітарний пафос народної пісні
  - '[!decolonization] Українська бурлацька пісня — НЕ «волжская бурлацкая». Різні соціальні контексти, різна поетика, різний
    ступінь відчаю. Не змішувати'
  section: 'Читання: Бурлацькі та рекрутські пісні'
  words: 975
- points:
  - Шлях = доля. Чумак «в дорозі» = людина «на шляху життя». Степовий пейзаж — не декорація, а психологічний простір (Костомаров)
  - '[!myth-buster] «Чумаки — перші українські далекобійники» (Заболотний) — вдала метафора, але спрощує. Чумацтво — складна
    соціальна інституція з ієрархією, ритуалами, кодексом'
  - '[!anti-hagiography] Чумацькі пісні також містять насильство, алкоголізм, знущання з іноземців. «Народна мудрість» — не
    завжди мудра і добра'
  section: 'Аналіз: Дорога як метафора долі'
  words: 975
- points:
  - 'Повернення до розминки: син відмовляється від дому — бо степ дає те, чого дім не може: волю. Але ціна — самотність'
  - 'Ключова теза: чумацькі та бурлацькі пісні — документ зниклого побуту, де дорога є одночасно свободою та прокляттям'
  section: Підсумок
  words: 400
