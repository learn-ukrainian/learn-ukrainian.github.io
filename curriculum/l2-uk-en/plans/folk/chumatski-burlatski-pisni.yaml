slug: chumatski-burlatski-pisni
version: '4.0'
title: 'Чумацькі та бурлацькі пісні: Голос мандрівника'
subtitle: 'Chumak and Burlak Songs: The Wanderer''s Voice'
focus: Chumak trade as Cossack spirit in peacetime (Kostоmarov), steppe as psychological space, burlak marginalization, road as metaphor of fate, anti-militarist folk lyric
phase: FOLK.2
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Фрагмент: «Мене змиють дрібні дощі, / А розчешуть густі терни, / А просушить ясне сонце, / А розкудрять буйні вітри» — мати кличе додому, а син відмовляється. Чому?'
  - 'Провокація: Чумак ОБИРАЄ дорогу замість дому — як козак обирає Січ. Але чумак не воює. Що його тримає в степу?'
  words: 400
- section: 'Конфліктна карта: Романтика чи злидні?'
  points:
  - 'Дебат 1: Костомаров — чумацтво як перехідний стан «між старим битом і наступаючим». Козак став чумаком: «по духу і характеру — козак», але заняття мирне. Валка = похід, отаман = батько'
  - 'Дебат 2: Соціально-економічна версія — чумак їде не за романтикою, а за заробітком. Бурлак — ще гірше: безземельний маргінал, що шукає будь-яку роботу'
  - '[!epistemic-humility] «Костомаров романтизує чумака. Але ж чумацькі пісні САМІ містять і романтику, і відчай. Обидва голоси — автентичні»'
  - 'Глобальна синхронність: американські cowboy songs, австралійські waltzing matilda, російські бурлацькі (але порівняйте — різна естетика!), ірландські emigrant ballads — пісня мандрівника як архетип'
  words: 800
- section: 'Читання: Чумацькі пісні'
  points:
  - 'Туга за домом: «Весь вік у дорозі марно літа трачу, / Ні жінки, ні діток ніколи не бачу» — центральний мотив'
  - 'Небезпеки: татарські напади, загибель цілих обозів. «Над річкою, над Салгір''ю» — Україна-мати плаче за синами'
  - 'Романтика свободи: «Мене змиють дрібні дощі...» — гімн незалежності та єднання з природою. Степ як простір свободи, а не лише небезпеки'
  - 'Темний бік: пияцтво, програш у кості, руйнування. «Зазнавшись із великими господарями» — моральна притча (Костомаров)'
  - 'Первинне джерело: фрагмент чумацької пісні з діалоговою структурою (мати — син)'
  words: 1100
- section: 'Читання: Бурлацькі та рекрутські пісні'
  points:
  - 'Бурлак — не чумак. Без землі, без родини, без статусу. «Нікому не милий» — гострий соціальний біль'
  - 'Рекрутські пісні — примусова мобілізація. Відрив від землі = символічна смерть. Антимілітарний пафос народної пісні'
  - '[!decolonization] Українська бурлацька пісня — НЕ «волжская бурлацкая». Різні соціальні контексти, різна поетика, різний ступінь відчаю. Не змішувати'
  words: 700
- section: 'Аналіз: Дорога як метафора долі'
  points:
  - 'Шлях = доля. Чумак «в дорозі» = людина «на шляху життя». Степовий пейзаж — не декорація, а психологічний простір (Костомаров)'
  - '[!myth-buster] «Чумаки — перші українські далекобійники» (Заболотний) — вдала метафора, але спрощує. Чумацтво — складна соціальна інституція з ієрархією, ритуалами, кодексом'
  - '[!anti-hagiography] Чумацькі пісні також містять насильство, алкоголізм, знущання з іноземців. «Народна мудрість» — не завжди мудра і добра'
  words: 700
- section: Підсумок
  points:
  - 'Повернення до розминки: син відмовляється від дому — бо степ дає те, чого дім не може: волю. Але ціна — самотність'
  - 'Ключова теза: чумацькі та бурлацькі пісні — документ зниклого побуту, де дорога є одночасно свободою та прокляттям'
  words: 400
vocabulary_hints:
- word: чумак
  pos: ч.
  definition: мандрівний торговець-перевізник сіллю та рибою — шанована, але небезпечна професія
- word: бурлак
  pos: ч.
  definition: безземельний найманий робітник — маргіналізований статус, об'єкт соціального болю в піснях
- word: валка
  pos: ж.
  definition: чумацький обоз із возів та волів — до 50 возів, із виборним отаманом
- word: отаман
  pos: ч.
  definition: виборний ватажок чумацької валки — батько, арбітр, стратег (як козацький отаман)
- word: рекрут
  pos: ч.
  definition: людина, примусово мобілізована до армії — оплакується в піснях як «живий мертвий»
- word: розлука
  pos: ж.
  definition: розставання з рідними на невизначений час — центральний мотив чумацьких пісень
- word: степ
  pos: ч.
  definition: 'у контексті чумацьких пісень: і простір свободи, і простір небезпеки та смерті'
- word: туга
  pos: ж.
  definition: глибокий сум через розлуку — наскрізний емоційний стан чумацьких пісень
- word: мандрівник
  pos: ч.
  definition: людина в дорозі — чумак і бурлак як два типи мандрівника з різним статусом
- word: антимілітарний
  pos: прикм.
  definition: спрямований проти війни та примусової мобілізації — характеристика рекрутських пісень
