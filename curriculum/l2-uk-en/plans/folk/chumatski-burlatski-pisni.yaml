objectives:
- Аналізувати чумацькі пісні як документ зниклого способу життя з подвійним кодом — романтика та відчай
- Розуміти Костомарівську концепцію чумака як козака «по духу і характеру»
- Порівнювати чумацькі та бурлацькі пісні як два різні голоси мандрівника
- Формулювати позицію щодо степу як психологічного простору в українській ліриці
