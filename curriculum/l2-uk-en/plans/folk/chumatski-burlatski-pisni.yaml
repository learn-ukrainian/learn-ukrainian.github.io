  items: 4
- type: fill-in
  focus: Чумацька та соціальна лексика
  description: 'Терміни: валка, отаман, рекрут, туга, антимілітарний — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: чумацька vs бурлацька пісня'
  description: 'Подано два фрагменти: (1) чумацька пісня (романтика дороги), (2) бурлацька пісня (відчай безземельного). Порівняйте: тон, лексику, ставлення до долі. Що об''єднує, що різнить?'
- type: note
  focus: 'Есе: Заробітчани XXI ст.'
  description: 'Мільйони українців працюють за кордоном, як чумаки — далеко від родини, з тугою за домом. Чи є сучасна трудова міграція продовженням чумацького досвіду? (400-600 слів)'
