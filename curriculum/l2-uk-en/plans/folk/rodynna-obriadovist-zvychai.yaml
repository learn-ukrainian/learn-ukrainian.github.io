module: folk-007
level: FOLK
sequence: 7
slug: rodynna-obriadovist-zvychai
title: "Родинна обрядовість і звичаї"
subtitle: "Birth, christening, wedding, funeral, kinship voice"
version: 3
status: locked
phase: base-first
cefr_min: C1
word_target: 5000
focus: >-
  Clean M07 base: rodyny, khrestyny, wedding, funeral, holosinnia, kinship
  transition, Christian-community framing, verified short fragments, public
  Hrushevsky lament candidates, and honest reading coverage.
persona: >-
  C1+ seminar learner reading Ukrainian family rites as oral pre-literary
  culture: source-bound, Christian-heritage-aware, and careful about regional
  variants.
objectives:
  - "Пояснити родинну обрядовість як систему життєвих переходів: народження, хрестини, весілля, похорон, поминання."
  - "Розрізняти родини, хрестини, пострижини, весільну драму та голосіння за дією, виконавцями, предметами і голосом."
  - "Аналізувати короткі корпусно перевірені фрагменти без осучаснення, вигадування або перенесення службових позначок в учнівський текст."
  - "Утримувати християнсько-історичну рамку там, де джерела говорять про хрещення, вінчання, похорон і поминання."
  - "Не романтизувати родовий контроль, майнові домовленості або гендерну асиметрію; пояснювати їх як історичні форми."
pedagogy:
  approach: "джерельно уважний FOLK-семінар"
  notes:
    - "Begin with a transition question: how does a family rite move a person across status?"
    - "Use six verified excerpts as close-reading anchors, but do not promise four separate full reading pages for M07."
    - "Keep M07 as a map; detailed wedding songs belong to M08 and detailed holosinnia to M09."
    - "Lesson citations must use public source names only; do not expose internal IDs or workspace labels."
content_outline:
  - section: "Розминка: перехід, дім, рід"
    words: 650
    points:
      - "Open with the central question: what changes when a child, bride, groom, or deceased person crosses a family boundary?"
      - "Name the main cycle: родини, хрестини, пострижини, весілля, похорон, поминання."
      - "Set the method: action, performer, object, spoken formula, and source limit."
  - section: "Корпус і джерельна обережність"
    words: 850
    points:
      - "Use the school textbook anchor for родини, хрестини, весілля, похорон."
      - "Explain that XVI-XVIII evidence is fragmentary and nineteenth/twentieth-century ethnographic records cannot be flattened into one national script."
      - "State reading coverage honestly: M07 has short verified fragments, public Hrushevsky lament candidates, and public reference links, not four full primary texts ready as separate reading pages."
  - section: "Народження і хрестини"
    words: 700
    points:
      - "Use the verified fragment 'щоб було таке тверде' as a local formula, not universal rule."
      - "Explain повитуха, куми, хрещення, пострижини, піч, сволок, припічок, покуть through source-bound action."
      - "Keep Christian hrestyny framing primary where the source speaks about baptism and church recognition."
  - section: "Весілля як родова драма"
    words: 1000
    points:
      - "Use three verified fragments about родину зібрати, коровай and овес / рід."
      - "Explain сватання, заручини, гільце, вінок, коровай, вінчання, весільний поїзд, приймання молодої."
      - "Show that wedding song and action stage two роди, not only two individuals."
      - "Flag historical pressure and asymmetry without turning the rite into either nostalgia or denunciation."
  - section: "Похорон, голосіння, пам'ять"
    words: 900
    points:
      - "Use two verified Hrushevsky fragments: відламаність and смутне-невеселе весілля."
      - "Explain formula, repetition, address, epithet and recitative as poetic technique."
      - "Show how wedding and funeral codes can mirror each other when a life transition is interrupted."
  - section: "Деколонізаційна рамка"
    words: 650
    points:
      - "Reject reduction to decorative ethnography, patronizing backwardness, or exotic spectacle."
      - "Reject the hidden-older-core framing; older motifs are source-bound historical notes, not the module thesis."
      - "Keep Ukrainian agency: family rites preserve language, home, memory, public voice and Christian-community recognition."
  - section: "Підсумок: як читати родинний обряд"
    words: 250
    points:
      - "Return to the repeatable method: status boundary, performer, object, formula, source limit."
      - "Prepare learners for M08 vesilni-pisni and M09 holosinnya without duplicating those modules."
activity_hints:
  - type: ritual-sequencing
    placement: inline
    focus: "Order родини / хрестини / пострижини, wedding stages, and funeral-pomynalnyi sequence from source cues."
  - type: motif-formula
    placement: inline
    focus: "Identify рід, піч, коровай, овес, відламаність, смутне весілля as formula/object anchors."
  - type: variant-comparison
    placement: workbook
    focus: "Compare a local birth formula, wedding kinship formula and holosinnia image without flattening regional scope."
  - type: comparative-study
    placement: workbook
    focus: "Explain what M07 maps generally and what M08/M09 must treat in detail."
