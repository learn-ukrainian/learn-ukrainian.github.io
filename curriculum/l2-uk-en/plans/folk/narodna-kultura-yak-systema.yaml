content_outline:
- section: Розминка
  words: 360
  points:
  - Гачок на космогонічній колядці «Як ще не було початку світа» — у простій різдвяній пісні сховано цілу космогонію зі світовим деревом
  - 'Провокаційне питання: народна культура — «пережиток села» чи повноцінна система пам''яті?'
  - Вісім складників системи (слово, мелодія, рух, обряд, предмет, простір, виконавець, громада) і обіцянка читати тексти трьома питаннями
- section: 'Конфліктна карта: що ми насправді читаємо'
  words: 560
  points:
  - 'Схема типів доказу: походження назви vs давнина тексту vs обрядова дія vs порівняння'
  - 'Суперечка 1: опис зсередини (українські назви, регіони, збирачі) vs «загальнослов''янська»/«народницька» рамка'
  - 'Суперечка 2: засвідчений образ vs доведений культ — без добудови язичницького «пантеону»'
  - '[!epistemic-humility] Берегиня як новітня реконструкція, а не засвідчений давній культ'
  - 'Суперечка 3: синкретизм; три робочі поняття як апарат: обряд, мотив, варіант'
- section: 'Читання: система в кількох голосах'
  words: 1280
  points:
  - 'Жанрова мережа: календарний, епічний, родинний цикли, проза, малі жанри як сполучені русла'
  - 'Читацький апарат: назви ситуацію → випиши дію → сформулюй висновок'
  - 'Корпусне читання веснянки «Ой весна, весна, ти красна»: антифонність, продукувальна магія, варіант (веснянка/гаївка/гагілка)'
  - 'Корпусні читання колядки «Ой над Дунаєм» і щедрівки «Щедрик»: мотив достатку, що мандрує між жанрами; обрядові ролі (береза, міхоноша, ряджені)'
  - 'Світове дерево/явір як мандрівний мотив (Потебня, Грушевський): вісь творення → дерево достатку → символ туги; перехід між словом і річчю'
- section: 'Аналіз: чому це система, а не перелік'
  words: 820
  points:
  - 'Чотири ключі: перформативність, формульність, синкретизм, варіантність'
  - 'Вісім складників значення з розбором на космогонічній колядці'
  - 'Поетичні формули: зачин, постійний епітет, паралелізм, рефрен, речитатив'
  - '[!high-culture-bridge] «Щедрик» Леонтовича → «Carol of the Bells» і питання привласнення; матеріальний знак (Антонович)'
- section: 'Носії, регіони і варіант'
  words: 600
  points:
  - 'Носій як співавтор; кобзарі та лірники, цехи, речитатив; знищення середовища за радянської влади'
  - 'Громада й родина як канал передання; етнографічні зони й діалект; варіантність як закон традиції'
- section: 'Від голосу до архіву'
  words: 460
  points:
  - 'Усність vs писемна фіксація як два способи буття тексту'
  - 'Засновники фольклористики (Грушевський, Колесса, Гнатюк, Чубинський, Драгоманов, Антонович, Грінченко, Франко); етика збирання; архів як слід, не жива практика'
- section: Деколонізаційна рамка
  words: 640
  points:
  - '[!decolonization] Імперсько-радянське знеособлення культури в «народність»; критика Грабовича щодо оцінкових критеріїв «повноти»'
  - '[!myth-buster] «Народність» vs повноцінна система пам''яті'
  - 'Механізм привласнення (доля «Щедрика»); точна мова: Голодомор як геноцид, що вдарив по носіях традиції'
- section: 'Пастки тлумачення'
  words: 500
  points:
  - 'Чотири пастки: буквалізм, модернізація, гонитва за «первісним», ізоляція тексту'
  - '[!anti-hagiography] Не романтизувати село: корпусна «Ой виорю я нивку широкую» — соціальна нерівність двох сестер; ролі етнографа й аналітика'
- section: Підсумок
  words: 480
  points:
  - 'Повернення до питання з «Розминки»: пережиток чи система?'
  - Обряд/мотив/варіант як винесений апарат; народна культура сьогодні (2022–2025); право народу називати власну культуру
focus: Systems overview of Ukrainian folk culture across ritual, genre, region, performance, and oral-written
  boundaries
level: FOLK
module: folk-001
objectives:
- Пояснювати жанр або культурну практику як частину ширшої системи народної культури.
- Аналізувати корпусні приклади, символи, формули або перформативні послідовності на основі досьє.
- Розпізнавати імперські, радянські або романтизовані міфи в описі теми й формулювати коректну рамку.
pedagogy: CBI
