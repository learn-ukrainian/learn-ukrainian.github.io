module: folk-001
level: FOLK
sequence: 1
slug: narodna-kultura-yak-systema
title: "Народна культура як система"
subtitle: "Oral tradition as the foundation of written Ukrainian literature"
version: 4
status: locked
phase: base-first
cefr_min: C1
word_target: 4200
focus: "A clean system map for the FOLK seminar: genre, performance, source, public text, and oral-to-written literary continuity."
persona: "C1+ seminar learner reading Ukrainian folk texts as evidence, not as decorative ethnography."
objectives:
  - "Пояснити народну культуру як систему слова, звуку, руху, предмета, простору, виконавця й громади."
  - "Відрізняти жанр, виконавську ситуацію, записаний текст і пізніше авторське переосмислення."
  - "Працювати з публічним джерелом: шкільна канонічна рамка, УкрЛіб-повний текст, без внутрішніх корпусних ідентифікаторів."
  - "Розпізнавати імперське зниження фольклору до декоративної етнографії та відповідати джерельно точно."
pedagogy:
  approach: "source-first seminar"
  notes:
    - "Begin from a short primary text excerpt, then move to genre/system map."
    - "Keep Christian-heritage-first framing where the tradition is historically Christian; seasonal imagery is read as poetics in genre context."
    - "Do not publish module until hosted readings are cleaned or created with public source_url frontmatter."
content_outline:
  - section: "Постановка проблеми"
    words: 550
    points:
      - "Opening question: how can one system contain a щедрівка, веснянка, дума, історична пісня, прислів'я, казка, рушник, бандура and a later literary echo?"
      - "School-canonical anchor: Grade 5 literature frames oral folk creativity as the beginning of verbal art."
      - "Course contract: folklore is read as oral foundation for written Ukrainian literature, not as a catalogue of exotic practices."
  - section: "Системна карта"
    words: 950
    points:
      - "Six layers: verbal, musical, performative, material, spatial, written-transmission."
      - "Genre zones: small forms, tales/legends, calendar songs, family-cycle forms, epic/historical memory, material/performance signs."
      - "Method: genre -> performance situation -> formula/stanza -> source limit -> literary bridge."
  - section: "Первинні тексти"
    words: 1000
    points:
      - "Use four public-source examples: щедрівка, веснянка, дума, історична пісня."
      - "Quote only fragments verified against full public texts; module build must run formal quote verification before shipping."
      - "Do not link learner pages to any hosted reading that still exposes internal corpus IDs."
  - section: "Деколонізаційна рамка"
    words: 850
    points:
      - "Reject imperial reduction of Ukrainian folk culture to decorative ethnography."
      - "Avoid romantic overclaiming; name source limits and variant boundaries."
      - "Treat Ukrainian regional variation as evidence, not as a problem to flatten."
  - section: "Міст до писемної культури"
    words: 650
    points:
      - "Trace oral formula -> recorded text -> school reading -> author/composer/theatre transformation."
      - "Use Шевченко's думова intonation, Леонтович's choral transformation of Щедрик, and literary fairy-tale continuity only where source support is supplied."
  - section: "Підсумок"
    words: 200
    points:
      - "Return to the reading discipline learners will reuse across the whole FOLK track."
activity_hints:
  - type: motif-formula
    placement: inline
    focus: "Identify formula, refrain, parallelism, and address across four public-source examples."
  - type: variant-comparison
    placement: workbook
    focus: "Separate full public text, recorded variant, and later author/composer transformation."
  - type: performance
    placement: workbook
    focus: "Describe who performs, where, for whom, and what changes when the text is only read silently."
