content_outline:
- points:
  - 'Фрагмент літописного плачу: «Батьку, батьку мій! Чи жив ти без печалі на цьому світі...» — хто це говорить і кому?'
  - 'Провокація: Це справжнє горе — чи професійний літературний прийом?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Народна версія — голосіння як автентичний жіночий жанр дохристиянських часів. Живий обряд, записаний етнографами
    XIX ст.'
  - 'Дебат 2: Чижевський — «плакатися» у літописах часто є літературним прийомом (топосом), а не описом реального обряду.
    Плачуть бояри, іноземці — а реальна традиція приписує цю роль жінкам'
  - '[!epistemic-humility] «Ми не знаємо, чи літописні плачі відображають народний обряд, чи книжна культура вплинула на формування
    народних практик. Найімовірніше — взаємопроникнення»'
  - 'Глобальна синхронність: ірландський keening, грецький threnos, арабський niyaha, корейський гок — ритуальний плач жінок
    як архетип'
  section: 'Конфліктна карта: Народний плач чи книжний топос?'
  words: 950
- points:
  - 'Поетична структура голосіння (за Чижевським): (1) звертання до померлого як до живого, (2) порівняння зі сходом/заходом
    сонця, (3) бажання померти разом, (4) гіперболізація горя, (5) ритмізована проза'
  - Голосільниця — не «плакальниця», а професійна виконавиця. Імпровізація в межах формульних рамок
  - 'Не лише смерть: плачі за рекрутами (як за мертвими), над згорілою хатою, за дітьми, забраними до шкіл (Володимир Великий)'
  - 'Первинне джерело: фрагмент голосіння з записів XIX ст. — звертання до покійного, демінутиви, риторичні питання'
  section: 'Читання: Голосіння як мистецтво'
  words: 1250
- points:
  - «Сказаніє про Бориса і Гліба» — плач Бориса за батьком, плач Гліба за братом. Лірична кульмінація твору, збудована за
    канонами народного плачу
  - '«Слово о полку Ігоревім» — Плач Ярославни як квінтесенція ліричного начала. Попович: все «Слово» поєднує жанри плачу
    (за Руською землею) та слави (князям)'
  - 'Візантійський вплив: плач Давида, плач Єви, проповіді Кирила Турівського. Де закінчується фольклор і починається книжність?'
  section: 'Читання: Плач у давньокиївській літературі'
  words: 1050
- points:
  - Голосіння — суто жіночий жанр. Чоловіки в традиційному суспільстві НЕ голосять. Чому? Гендерний розподіл ритуальних ролей
  - 'Від голосіння до лірики: Попович — мелодійність плачів допомогла їм вижити після великих фонетичних змін (падіння редукованих),
    на відміну від епічних текстів'
  - '[!decolonization] Голосіння — одна з найдавніших форм усної поезії в Європі. Українська традиція зберегла її до XX ст.
    — на відміну від більшості європейських країн, де обряд зник'
  - '[!myth-buster] Плач Ярославни — НЕ «реальне голосіння княгині». Це високий літературний текст, що використовує фольклорну
    поетику. Різниця між жанром та його літературним наслідуванням'
  section: 'Аналіз: Жіночий голос як основа ліричної традиції'
  words: 1150
- points:
  - 'Повернення до розминки: студент формулює відповідь — і справжнє горе, і професійне мистецтво. Одне не виключає інше'
  - 'Ключова теза: голосіння — жіноче вербальне мистецтво, що тисячоліттями структурувало людське горе і стало основою ліричної
    традиції'
  section: Підсумок
  words: 400
