objectives:
- Критично аналізувати голосіння як жанр усної поезії з унікальною формульною поетикою
- Розрізняти народний обряд голосіння та його літературне наслідування у давньокиївських текстах
- Оцінювати роль жінок як хранительок ліричної традиції в контексті гендерних ритуальних ролей
- Формулювати аргументовану позицію щодо дискусії «народний плач vs книжний топос»
