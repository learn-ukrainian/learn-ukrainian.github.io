module: folk-007
level: FOLK
cefr_min: C1
sequence: 7
slug: holosinnya
version: '4.0'
title: 'Голосіння: Поетика скорботи та плачі'
subtitle: 'Funeral Laments: The Poetics of Grief'
focus: Funeral laments as structured verbal art, women as tradition keepers, literary vs folk lament debate, Plach Yaroslavny, Byzantine influence question
phase: FOLK.1
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Фрагмент літописного плачу: «Батьку, батьку мій! Чи жив ти без печалі на цьому світі...» — хто це говорить і кому?'
  - 'Провокація: Це справжнє горе — чи професійний літературний прийом?'
  words: 400
- section: 'Конфліктна карта: Народний плач чи книжний топос?'
  points:
  - 'Дебат 1: Народна версія — голосіння як автентичний жіночий жанр дохристиянських часів. Живий обряд, записаний етнографами XIX ст.'
  - 'Дебат 2: Чижевський — «плакатися» у літописах часто є літературним прийомом (топосом), а не описом реального обряду. Плачуть бояри, іноземці — а реальна традиція приписує цю роль жінкам'
  - '[!epistemic-humility] «Ми не знаємо, чи літописні плачі відображають народний обряд, чи книжна культура вплинула на формування народних практик. Найімовірніше — взаємопроникнення»'
  - 'Глобальна синхронність: ірландський keening, грецький threnos, арабський niyaha, корейський гок — ритуальний плач жінок як архетип'
  words: 800
- section: 'Читання: Голосіння як мистецтво'
  points:
  - 'Поетична структура голосіння (за Чижевським): (1) звертання до померлого як до живого, (2) порівняння зі сходом/заходом сонця, (3) бажання померти разом, (4) гіперболізація горя, (5) ритмізована проза'
  - 'Голосільниця — не «плакальниця», а професійна виконавиця. Імпровізація в межах формульних рамок'
  - 'Не лише смерть: плачі за рекрутами (як за мертвими), над згорілою хатою, за дітьми, забраними до шкіл (Володимир Великий)'
  - 'Первинне джерело: фрагмент голосіння з записів XIX ст. — звертання до покійного, демінутиви, риторичні питання'
  words: 1100
- section: 'Читання: Плач у давньокиївській літературі'
  points:
  - '«Сказаніє про Бориса і Гліба» — плач Бориса за батьком, плач Гліба за братом. Лірична кульмінація твору, збудована за канонами народного плачу'
  - '«Слово о полку Ігоревім» — Плач Ярославни як квінтесенція ліричного начала. Попович: все «Слово» поєднує жанри плачу (за Руською землею) та слави (князям)'
  - 'Візантійський вплив: плач Давида, плач Єви, проповіді Кирила Турівського. Де закінчується фольклор і починається книжність?'
  words: 900
- section: 'Аналіз: Жіночий голос як основа ліричної традиції'
  points:
  - 'Голосіння — суто жіночий жанр. Чоловіки в традиційному суспільстві НЕ голосять. Чому? Гендерний розподіл ритуальних ролей'
  - 'Від голосіння до лірики: Попович — мелодійність плачів допомогла їм вижити після великих фонетичних змін (падіння редукованих), на відміну від епічних текстів'
  - '[!decolonization] Голосіння — одна з найдавніших форм усної поезії в Європі. Українська традиція зберегла її до XX ст. — на відміну від більшості європейських країн, де обряд зник'
  - '[!myth-buster] Плач Ярославни — НЕ «реальне голосіння княгині». Це високий літературний текст, що використовує фольклорну поетику. Різниця між жанром та його літературним наслідуванням'
  words: 1000
- section: Підсумок
  points:
  - 'Повернення до розминки: студент формулює відповідь — і справжнє горе, і професійне мистецтво. Одне не виключає інше'
  - 'Ключова теза: голосіння — жіноче вербальне мистецтво, що тисячоліттями структурувало людське горе і стало основою ліричної традиції'
  words: 400
vocabulary_hints:
- word: голосіння
  pos: с.
  definition: ритуалізований поетичний плач за померлим — структурована імпровізація в межах усталених формул
- word: голосільниця
  pos: ж.
  definition: професійна виконавиця голосінь, запрошена на похорон для ритуального оплакування
- word: топос
  pos: ч.
  definition: усталений літературний прийом або мотив, що повторюється у творах різних авторів
- word: скорбота
  pos: ж.
  definition: глибокий сум, печаль через втрату близької людини
- word: демінутив
  pos: ч.
  definition: зменшувально-пестливий суфікс — характерний прийом голосінь для вираження ніжності та горя
- word: речитатив
  pos: ч.
  definition: мелодійне промовляння між співом та мовленням — форма виконання голосінь
- word: апострофа
  pos: ж.
  definition: риторичне звертання до відсутньої особи, абстрактного поняття або неживого предмета
- word: гіперболізація
  pos: ж.
  definition: художнє перебільшення — в голосіннях підсилює глибину страждання
- word: рекрутський
  pos: прикм.
  definition: пов'язаний з примусовим набором до війська — рекрутські голосіння оплакували «живих мертвих»
- word: сирітський
  pos: прикм.
  definition: пов'язаний із сиротою — сирітські голосіння виражали соціальну вразливість через поетику
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція позицій: народна версія (автентичний обряд) чи книжна (літературний топос)? Студент визначає за описом плачу.'
  items: 4
- type: fill-in
  focus: Лексика голосінь та поетики
  description: 'Терміни з тексту: топос, апострофа, демінутив, речитатив, гіперболізація — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: народне голосіння vs Плач Ярославни'
  description: 'Подано два тексти: (1) фольклорне голосіння з етнографічного запису XIX ст., (2) Плач Ярославни зі «Слова о полку Ігоревім». Порівняйте поетичні прийоми: що спільне, де починається літературна обробка?'
- type: note
  focus: 'Есе: Чи потрібен ритуал горя?'
  description: 'Сучасна культура «приховує» горе — тихі похорони, мінімум плачу. Традиційна культура вимагала публічного оплакування. Який підхід здоровіший — і чи коректне таке питання? Аргументуйте (400-600 слів).'
