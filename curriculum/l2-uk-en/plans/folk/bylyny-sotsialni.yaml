content_outline:
- points:
  - 'Сюжет: Князь Вольга з дружиною не може витягнути плуга простого орача Микули. Питання: Хто сильніший — князь з армією
    чи мужик з плугом?'
  - 'Провокація: Билини оспівують НЕ лише воїнів. Простий орач може бути головним героєм — і перемогти князя'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Архетипічна версія — Вольга (маг, воїн, князь) vs Микула (орач, селянин, труд). Два способи бути в світі: підкорювати
    vs годувати. Билина стає на бік годувальника'
  - 'Дебат 2: Чижевський — Вольга як «нечислений і не цілком ясний» архаїчний образ. Чи цей конфлікт справді про «народ vs
    князя» — чи про магію vs працю?'
  - '[!epistemic-humility] «Соціальна інтерпретація билини — продукт XIX ст. (народники). Давній слухач міг сприймати її інакше»'
  - 'Глобальна синхронність: Ілля vs Володимир (герой vs неблагодарний цар), Ахілл vs Агамемнон (Іліада), Roland vs Charlemagne
    — конфлікт героя і влади як архетип'
  section: 'Конфліктна карта: Військова сила vs продуктивна праця'
  words: 1075
- points:
  - Вольга — один з найархаїчніших образів. Чудесне народження (без батька), перекидання на тварин, чарівне завоювання Індійського
    царства (Чижевський)
  - Магія як інструмент влади — Вольга перемагає не силою, а трансформацією. Але навіть магія не здатна підняти плуга Микули
  - 'Первинне джерело: фрагмент билини — епізод, де дружина Вольги не може витягнути плуга'
  section: 'Читання: Вольга Всеславич — князь-чаклун'
  words: 1175
- points:
  - Микула — орач, що ОРЕ так, що «соха присвистує», а камені «відлітають». Гіперболізація праці до героїчного масштабу
  - 'Плуг як символ: те, що не під силу князю з армією — під силу одному трудівнику. Алегорія переваги продуктивної праці
    над військовою'
  - '[!decolonization] Микула — образ із АГРАРНОЇ культури. Російська Північ зберегла билину, але аграрний контекст — УКРАЇНСЬКИЙ.
    Степові чорноземи, а не лісова Північ'
  - '[!myth-buster] «Билинний герой = воїн» — не завжди. Микула не б''ється — він ОРЕ. Епос може прославляти працю, а не лише
    бій'
  section: 'Читання: Микула Селянинович — орач-надлюдина'
  words: 1175
- points:
  - Ілля vs Володимир — герой, ув'язнений неблагодарним князем. Бунт богатирів проти двору. Народна недовіра до влади
  - 'Костомаров: в народній поезії «ідеальний герой-лицар» цінує віру, вітчизну і товариство — НЕ підкорення князеві'
  - '[!anti-hagiography] Не ідеалізувати: Микула — фантазія, а не документ. Реальні селяни Київської Русі не мали жодної влади.
    Билина компенсує безсилля'
  section: 'Аналіз: Соціальна критика в епосі'
  words: 975
- points:
  - 'Повернення до розминки: орач сильніший за князя — бо без нього нікому годувати дружину. Епос знає це'
  - 'Ключова теза: билини — не лише героїчний, а й СОЦІАЛЬНИЙ жанр, що артикулює конфлікт між владою та продуктивною працею'
  section: Підсумок
  words: 400
focus: Peasant vs prince tension, Mykula the superhuman plowman, Volga the sorcerer-prince, labor superiority over military
  power, social critique within heroic form
level: FOLK
module: folk-016
objectives:
- Аналізувати соціальний конфлікт між князем і орачем у билині — не лише як сюжет, а як систему цінностей
- Інтерпретувати образ Микули як алегорію продуктивної праці, що перевершує військову силу
- Розуміти архаїчність образу Вольги — князь-чаклун як дохристиянський тип героя
- Оцінювати билини як джерело соціальної критики, а не лише героїчного епосу
