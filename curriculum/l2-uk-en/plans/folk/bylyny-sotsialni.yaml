slug: bylyny-sotsialni
version: '4.0'
title: 'Соціальний конфлікт в епосі: Вольга і Микула'
subtitle: 'Social Conflict in Epic: Volga and Mykula'
focus: Peasant vs prince tension, Mykula the superhuman plowman, Volga the sorcerer-prince, labor superiority over military power, social critique within heroic form
phase: FOLK.3
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Сюжет: Князь Вольга з дружиною не може витягнути плуга простого орача Микули. Питання: Хто сильніший — князь з армією чи мужик з плугом?'
  - 'Провокація: Билини оспівують НЕ лише воїнів. Простий орач може бути головним героєм — і перемогти князя'
  words: 400
- section: 'Конфліктна карта: Військова сила vs продуктивна праця'
  points:
  - 'Дебат 1: Архетипічна версія — Вольга (маг, воїн, князь) vs Микула (орач, селянин, труд). Два способи бути в світі: підкорювати vs годувати. Билина стає на бік годувальника'
  - 'Дебат 2: Чижевський — Вольга як «нечислений і не цілком ясний» архаїчний образ. Чи цей конфлікт справді про «народ vs князя» — чи про магію vs працю?'
  - '[!epistemic-humility] «Соціальна інтерпретація билини — продукт XIX ст. (народники). Давній слухач міг сприймати її інакше»'
  - 'Глобальна синхронність: Ілля vs Володимир (герой vs неблагодарний цар), Ахілл vs Агамемнон (Іліада), Roland vs Charlemagne — конфлікт героя і влади як архетип'
  words: 800
- section: 'Читання: Вольга Всеславич — князь-чаклун'
  points:
  - 'Вольга — один з найархаїчніших образів. Чудесне народження (без батька), перекидання на тварин, чарівне завоювання Індійського царства (Чижевський)'
  - 'Магія як інструмент влади — Вольга перемагає не силою, а трансформацією. Але навіть магія не здатна підняти плуга Микули'
  - 'Первинне джерело: фрагмент билини — епізод, де дружина Вольги не може витягнути плуга'
  words: 900
- section: 'Читання: Микула Селянинович — орач-надлюдина'
  points:
  - 'Микула — орач, що ОРЕ так, що «соха присвистує», а камені «відлітають». Гіперболізація праці до героїчного масштабу'
  - 'Плуг як символ: те, що не під силу князю з армією — під силу одному трудівнику. Алегорія переваги продуктивної праці над військовою'
  - '[!decolonization] Микула — образ із АГРАРНОЇ культури. Російська Північ зберегла билину, але аграрний контекст — УКРАЇНСЬКИЙ. Степові чорноземи, а не лісова Північ'
  - '[!myth-buster] «Билинний герой = воїн» — не завжди. Микула не б''ється — він ОРЕ. Епос може прославляти працю, а не лише бій'
  words: 900
- section: 'Аналіз: Соціальна критика в епосі'
  points:
  - 'Ілля vs Володимир — герой, ув''язнений неблагодарним князем. Бунт богатирів проти двору. Народна недовіра до влади'
  - 'Костомаров: в народній поезії «ідеальний герой-лицар» цінує віру, вітчизну і товариство — НЕ підкорення князеві'
  - '[!anti-hagiography] Не ідеалізувати: Микула — фантазія, а не документ. Реальні селяни Київської Русі не мали жодної влади. Билина компенсує безсилля'
  words: 700
- section: Підсумок
  points:
  - 'Повернення до розминки: орач сильніший за князя — бо без нього нікому годувати дружину. Епос знає це'
  - 'Ключова теза: билини — не лише героїчний, а й СОЦІАЛЬНИЙ жанр, що артикулює конфлікт між владою та продуктивною працею'
  words: 400
vocabulary_hints:
- word: орач
  pos: ч.
  definition: той, хто оре землю — в билині Микула піднесений до статусу надлюдини
- word: плуг
  pos: ч.
  definition: знаряддя для оранки — в билині символ продуктивної праці, що перевершує військову силу
- word: перекидання
  pos: с.
  definition: здатність перетворюватися на тварин — магічна сила Вольги Всеславича
- word: соціальний конфлікт
  pos: ч.
  definition: протистояння між різними станами суспільства — в билині: князь vs орач
- word: алегорія
  pos: ж.
  definition: іносказання — плуг, що не піддається дружині, є алегорією переваги праці над владою
- word: бунт
  pos: ч.
  definition: відкритий спротив владі — в билинах богатирі іноді повстають проти Володимира
- word: компенсаторний
  pos: прикм.
  definition: такий, що відшкодовує у фантазії те, чого немає в реальності
- word: чаклун
  pos: ч.
  definition: людина з магічними здібностями — Вольга як архаїчний тип князя-мага
- word: продуктивний
  pos: прикм.
  definition: такий, що створює матеріальні блага — праця орача як продуктивна, на відміну від військової
- word: дружина
  pos: ж.
  definition: 'в давньоруському контексті: військовий загін князя'
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: соціальна інтерпретація (народ vs князь) чи архетипічна (магія vs праця)? Студент визначає за описом конфлікту.'
  items: 4
- type: fill-in
  focus: Соціальна та епічна лексика
  description: 'Терміни: орач, соціальний конфлікт, алегорія, компенсаторний, перекидання — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: Вольга vs Микула'
  description: 'Подано фрагмент билини (епізод з плугом). Студент аналізує: (1) якими засобами автор показує перевагу Микули? (2) чому дружина Вольги не може витягнути плуга — це фізика чи символіка?'
- type: note
  focus: 'Есе: Хто справжній герой?'
  description: 'Билини пропонують два типи героя: воїн (Ілля) та орач (Микула). Яка модель героїзму актуальніша для сучасної України — країни, що одночасно воює і вирощує зерно? (400-600 слів)'
