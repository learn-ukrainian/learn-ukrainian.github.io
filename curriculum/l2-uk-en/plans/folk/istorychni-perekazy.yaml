objectives:
- Критично аналізувати історичні перекази як форму народної пам'яті з власними механізмами відбору та спотворення
- Розуміти процес героїзації Довбуша та Кармалюка — від реальної людини до народного символу
- Працювати з переказом як з джерелом «внутрішньої історії» (Костомаров)
- Формулювати позицію щодо цінності та обмежень усної історії
