content_outline:
- points:
  - 'Переказ: Олекса Довбуш кидає топірець у скелю — і скеля розколюється. Студент визначає: це правда, легенда чи пропаганда?'
  - 'Провокація: Народ створює «своїх» героїв — не тих, кого пропонує офіційна історія. Чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Костомаров — у переказах «не слід шукати літописної повноти й точності». Художня фантазія переосмислює та витісняє
    реальні факти. Перекази = НЕ історія, а «внутрішнє життя» народу'
  - 'Дебат 2: Модерна версія — перекази як «історія знизу» (history from below). Те, що літопис не записав, зберіг фольклор.
    Народна пам''ять — альтернативне джерело, а не спотворення'
  - '[!epistemic-humility] «Козацькі перекази витіснили з пам''яті навіть Київську Русь (Костомаров). Народна пам''ять — не
    архів, а живий організм, що відбирає і спотворює»'
  - 'Глобальна синхронність: Robin Hood (Англія), Stenka Razin (Росія — але порівняйте з Кармалюком!), Sandino (Нікарагуа)
    — народний герой-розбійник як архетип'
  section: 'Конфліктна карта: Правда чи поезія?'
  words: 1050
- points:
  - Січ як «народна утопія свободи» — простір за порогами, де «звичайні закони не діють» (Попович)
  - 'Козацькі перекази: походження Січі, бойові подвиги, «золотий вік» козацтва — народна пам''ять фільтрує і ідеалізує'
  - 'Давніші пласти: перекази про заснування Києва (Кий, Щек, Хорив), помста Ольги деревлянам, Роман Галицький, що «орав литовцями»
    (Чижевський)'
  - 'Первинне джерело: фрагмент переказу про козацький подвиг — де закінчується факт і починається епос?'
  section: 'Читання: Козацькі перекази та Запорозька Січ'
  words: 1250
- points:
  - Олекса Довбуш — карпатський «Робін Гуд». Реальний розбійник чи народний месник? Процес героїзації в народній пам'яті
  - Устим Кармалюк — селянський бунтівник. Арешти, втечі, легенда. Чим відрізняється народний образ від історичного?
  - '[!decolonization] Довбуш і Кармалюк — герої УКРАЇНСЬКІ, а не «загальнослов''янські». Їхні перекази відображають специфічно
    українські соціальні реалії — кріпацтво, шляхетський гніт, карпатський бандитизм'
  - '[!anti-hagiography] Довбуш був розбійником. Кармалюк — засланцем і злочинцем за законом. Народна пам''ять «відбілює»
    — як і чому?'
  section: 'Читання: Народні герої — опришки та повстанці'
  words: 1150
- points:
  - 'Топонімічні перекази: «Чому ця скеля називається Довбушева?» — ландшафт як архів народної пам''яті'
  - Могили, хрести, дуби — фізичні об'єкти, до яких прив'язана пам'ять. Коли зникає об'єкт — зникає і переказ
  - '[!myth-buster] «Народна пам''ять зберігає істину» — ні. Народна пам''ять ВІДБИРАЄ, СПОТВОРЮЄ, ІДЕАЛІЗУЄ. Це цінне джерело
    — але потребує критичного аналізу, як і будь-яке інше'
  section: 'Аналіз: Ландшафт як пам''ять'
  words: 950
- points:
  - 'Повернення до розминки: переказ про Довбуша — це і правда (реальна людина), і легенда (надлюдські подвиги), і пропаганда
    (народна ідеалізація). Все одночасно'
  - 'Ключова теза: перекази — не «спотворена» історія, а ІНША форма пам''яті, з власними правилами та функціями'
  section: Підсумок
  words: 400
focus: Folk memory as alternative history, heroization of outlaws (Dovbush, Karmaliuk), Cossack Sich as folk utopia, landscape
  as memory archive, limits of oral history
