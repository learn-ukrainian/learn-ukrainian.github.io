slug: istorychni-perekazy
version: '4.0'
title: "Історичні перекази: Пам'ять про минуле"
subtitle: 'Historical Legends: Memory of the Past'
focus: Folk memory as alternative history, heroization of outlaws (Dovbush, Karmaliuk), Cossack Sich as folk utopia, landscape as memory archive, limits of oral history
phase: FOLK.2
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Переказ: Олекса Довбуш кидає топірець у скелю — і скеля розколюється. Студент визначає: це правда, легенда чи пропаганда?'
  - 'Провокація: Народ створює «своїх» героїв — не тих, кого пропонує офіційна історія. Чому?'
  words: 400
- section: 'Конфліктна карта: Правда чи поезія?'
  points:
  - 'Дебат 1: Костомаров — у переказах «не слід шукати літописної повноти й точності». Художня фантазія переосмислює та витісняє реальні факти. Перекази = НЕ історія, а «внутрішнє життя» народу'
  - 'Дебат 2: Модерна версія — перекази як «історія знизу» (history from below). Те, що літопис не записав, зберіг фольклор. Народна пам''ять — альтернативне джерело, а не спотворення'
  - '[!epistemic-humility] «Козацькі перекази витіснили з пам''яті навіть Київську Русь (Костомаров). Народна пам''ять — не архів, а живий організм, що відбирає і спотворює»'
  - 'Глобальна синхронність: Robin Hood (Англія), Stenka Razin (Росія — але порівняйте з Кармалюком!), Sandino (Нікарагуа) — народний герой-розбійник як архетип'
  words: 800
- section: 'Читання: Козацькі перекази та Запорозька Січ'
  points:
  - 'Січ як «народна утопія свободи» — простір за порогами, де «звичайні закони не діють» (Попович)'
  - 'Козацькі перекази: походження Січі, бойові подвиги, «золотий вік» козацтва — народна пам''ять фільтрує і ідеалізує'
  - 'Давніші пласти: перекази про заснування Києва (Кий, Щек, Хорив), помста Ольги деревлянам, Роман Галицький, що «орав литовцями» (Чижевський)'
  - 'Первинне джерело: фрагмент переказу про козацький подвиг — де закінчується факт і починається епос?'
  words: 1000
- section: 'Читання: Народні герої — опришки та повстанці'
  points:
  - 'Олекса Довбуш — карпатський «Робін Гуд». Реальний розбійник чи народний месник? Процес героїзації в народній пам''яті'
  - 'Устим Кармалюк — селянський бунтівник. Арешти, втечі, легенда. Чим відрізняється народний образ від історичного?'
  - '[!decolonization] Довбуш і Кармалюк — герої УКРАЇНСЬКІ, а не «загальнослов''янські». Їхні перекази відображають специфічно українські соціальні реалії — кріпацтво, шляхетський гніт, карпатський бандитизм'
  - '[!anti-hagiography] Довбуш був розбійником. Кармалюк — засланцем і злочинцем за законом. Народна пам''ять «відбілює» — як і чому?'
  words: 900
- section: 'Аналіз: Ландшафт як пам''ять'
  points:
  - 'Топонімічні перекази: «Чому ця скеля називається Довбушева?» — ландшафт як архів народної пам''яті'
  - 'Могили, хрести, дуби — фізичні об''єкти, до яких прив''язана пам''ять. Коли зникає об''єкт — зникає і переказ'
  - '[!myth-buster] «Народна пам''ять зберігає істину» — ні. Народна пам''ять ВІДБИРАЄ, СПОТВОРЮЄ, ІДЕАЛІЗУЄ. Це цінне джерело — але потребує критичного аналізу, як і будь-яке інше'
  words: 700
- section: Підсумок
  points:
  - 'Повернення до розминки: переказ про Довбуша — це і правда (реальна людина), і легенда (надлюдські подвиги), і пропаганда (народна ідеалізація). Все одночасно'
  - 'Ключова теза: перекази — не «спотворена» історія, а ІНША форма пам''яті, з власними правилами та функціями'
  words: 400
vocabulary_hints:
- word: переказ
  pos: ч.
  definition: усний прозовий твір, що претендує на правдивість і прив'язаний до реальних подій або місць
- word: опришок
  pos: ч.
  definition: карпатський соціальний розбійник — грабував панів, допомагав бідним (у народній версії)
- word: героїзація
  pos: ж.
  definition: процес наділення реальної людини надлюдськими рисами в народній пам'яті
- word: топонім
  pos: ч.
  definition: географічна назва (села, гори, річки) — часто зберігає народну пам'ять у своєму імені
- word: утопія
  pos: ж.
  definition: ідеалізоване уявлення про досконале суспільство — Запорозька Січ як народна утопія свободи
- word: кріпацтво
  pos: с.
  definition: система залежності селян від поміщика — соціальний контекст переказів про Довбуша і Кармалюка
- word: бандитизм
  pos: ч.
  definition: розбійницька діяльність — у карпатському контексті перетинається з соціальним протестом
- word: фольклорне оздоблення
  pos: с.
  definition: художні додатки народної уяви до реального історичного ядра переказу
- word: альтернативна історія
  pos: ж.
  definition: 'у фольклористиці: версія подій, збережена не літописом, а народною пам''яттю'
- word: внутрішня історія
  pos: ж.
  definition: за Костомаровим — історія побуту, звичаїв, страждань народу (на відміну від «зовнішньої» історії подій)
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: Костомаров (перекази = не точна історія, а «внутрішнє життя») чи «історія знизу» (перекази = альтернативне джерело)? Студент визначає позицію.'
  items: 4
- type: fill-in
  focus: Історична та фольклористична лексика
  description: 'Терміни: героїзація, топонім, утопія, фольклорне оздоблення, внутрішня історія — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: переказ vs історичний документ'
  description: 'Подано два тексти: (1) народний переказ про Довбуша, (2) фрагмент судового протоколу або хроніки. Порівняйте: що збігається, що відрізняється, що «додав» народ і чому?'
- type: note
  focus: 'Есе: Чи потрібні народу герої?'
  description: 'Кожен народ створює «своїх» героїв — часто всупереч офіційній історії. Чому суспільству потрібні ці ідеалізовані фігури? Яку функцію виконує героїзація — і чи є в ній небезпека? (400-600 слів)'
