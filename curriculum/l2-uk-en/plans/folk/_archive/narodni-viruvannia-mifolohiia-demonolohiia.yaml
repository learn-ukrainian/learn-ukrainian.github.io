content_outline:
- section: Розминка
  words: 430
  points:
  - 'Гачок: жива сцена повір''я в дії — бабуся над хворою дитиною шепоче «це вроки», тягнеться по свячену воду й часник'
  - 'Літературне відображення повір''я (Панас Мирний, «Хіба ревуть воли, як ясла повні?») — віра й сумнів («бреше!») співіснують у громаді'
  - 'Центральне питання: як читати вірування, що майже не лишило власного тексту, — джерело тут опис, а не голос самої традиції'
- section: 'Конфліктна карта: образ, культ і чотири нашарування'
  words: 830
  points:
  - 'Схема типів доказу: назва (етимологія) vs текст запису vs обрядова дія vs порівняння — з розібраним прикладом «бога води»'
  - 'Вища vs нижча міфологія: не виводити демонологію з пантеону'
  - 'Ключове правило: засвідчений образ ≠ доведений культ; приклад рефренів «Лель/Ладо», з яких романтики хибно вивели богів'
  - 'Джерела пізні, нерівні, неповні (Крип''якевич: «Імен інших божеств не знаємо»); чотири історичні нашарування'
  - '[caution] Чому в модулі немає тексту-першоджерела: вірування жило практикою, не текстом — honest source-criticism'
- section: 'Читання: як влаштований демонологічний запис'
  words: 1290
  points:
  - 'Модель розбору на корпусному описі домовика (В. Петров): назва+синоніми → функція → амбівалентність → форма появи'
  - 'Лісовик (чужий простір), водяник і русалка (вода, нечисті мерці, «неправильна смерть» як вікно в моральний лад громади)'
  - 'Формула назва → місце → функція; регіональна географія (Полісся / Карпати / степ)'
  - 'Worked example «Читаємо запис разом: водяник»; «Як народжується етнографічний запис» — критика джерела'
- section: 'Аналіз: поетика, межа і виконання'
  words: 1200
  points:
  - 'Поетика без пісні: назви, заборони, евфемізми, оберіг, замовляння як перформативне слово'
  - 'Літературне відображення обряду (Шевченко, «Невольник»): ворожка замовляє пристріт, виливає на віск'
  - 'Межа і перехідний час; календар демонології (русальний тиждень, Купало, полудень); типологія за простором'
  - 'Амбівалентність (чугайстер: страшний вигляд ≠ зла функція); варіант як норма; [high-culture-bridge] «Лісова пісня» / «Мавка»'
- section: Деколонізаційна рамка
  words: 700
  points:
  - 'Дві спокуси: мовна колонізація (лісовик ≠ «лєший») і дзеркальна вигадка «чистого пантеону»'
  - '[myth-box] українська демонологія як «варіант російської»; [myth-box] Берегиня як реконструкція XX ст., а не давній культ'
  - 'Радянське «пережиток» як колоніальна логіка; правило порівняння — функції, не назви; табу на ім''я'
- section: Підсумок
  words: 440
  points:
  - 'Повернення до питання «Розминки»: розрізняти рівні свідчення (запис / художнє відлуння / реконструкція)'
  - 'Шість питань як винесений апарат: назва, місце, функція, варіант, обряд, мотив'
  - 'Чому це важливо тепер: жива циркуляція образів у високій культурі; тема як вправа з чесності; місток до замовлянь'
focus: Folk worldview, mythological beings, demonological vocabulary, and responsible anti-romantic framing
