module: folk-003
level: FOLK
sequence: 3
slug: koliadky-shchedrivky
title: "Колядки та щедрівки"
subtitle: "Christmas carols, Shchedryi Vechir well-wishing songs, and Ukrainian winter verbal art"
version: 2
status: locked
phase: base-first
cefr_min: C1
word_target: 4000
focus: "Clean source-first M03 base for Ukrainian winter-cycle songs: колядки, щедрівки, public texts, performance, Christian-era calendar context, and poetics."
persona: "C1+ seminar learner reading Ukrainian winter folk songs through public primary texts, school canon, careful framing, and source discipline."
objectives:
  - "Розрізняти колядки, щедрівки, віншування і посівання за часом, адресатом, текстовою формою і виконавською ситуацією."
  - "Пояснити колядки як різдвяні величальні пісні, а щедрівки як щедровечірні або новорічні пісні-побажання."
  - "Читати публічний текст через приспів, повтор, звертання, образ дому, побажання достатку і роль гуртового голосу."
  - "Працювати тільки з публічними Ukrlib/Pidruchnyk/Osvita-style джерелами у learner-facing матеріалах."
  - "Утримувати християнсько-історичну рамку зимового циклу без редукції Різдва або Щедрого вечора до зовнішньої назви."
  - "Готувати міст від народної щедрівки до хорової культури лише на перевірених публічних джерелах."
pedagogy:
  approach: "source-first FOLK seminar"
  notes:
    - "Open with a public primary text, then map time, performer, addressee, refrain, and wish."
    - "Keep existing dirty hosted readings unlinked until the module/readings PR cleans metadata and rendering."
    - "Use FOLK activity families: ritual-sequencing, variant-comparison, motif-formula, performance."
content_outline:
  - section: "Розминка через первинний текст"
    words: 550
    points:
      - "Begin with a verified winter-song excerpt from a public Ukrlib source, preferably an already-clean hosted reading."
      - "Ask what the text does in the house: greet, praise, bless, wish, invite response."
      - "Keep quoted primary text inside primary-reading convention; do not quote from memory."
  - section: "Жанрова карта зимового циклу"
    words: 700
    points:
      - "Separate колядка, щедрівка, віншування, посівання, Маланка, and вертеп without flattening them."
      - "Frame колядки as Christmas/Nativity carols and щедрівки as Shchedryi Vechir/New-Year well-wishing songs."
      - "Use school-canonical signs: Різдво, Щедрий вечір, Маланка, Василь, ластівка, господар, Різдвяна зірка, побажання добробуту."
  - section: "Поетика приспіву, звертання і побажання"
    words: 850
    points:
      - "Analyze refrain, repeated address, household praise, parallelism, and short formulaic lines."
      - "Track images of house, garden, light, livestock, grain, gifts, table, stars, and swallow as poetic vocabulary."
      - "Explain that Christian festive meaning and household well-wishing are both central to the recorded winter-cycle texts."
  - section: "Виконавська ситуація"
    words: 650
    points:
      - "Show who sings, where the group stands, how the household answers, what gift or response closes the exchange."
      - "Use ritual-sequencing activity to order arrival, permission/greeting, song, household response, gift, closing wish."
      - "Keep material culture inside the song/performance context rather than as a separate decorative list."
  - section: "Публічні читання і source hammer"
    words: 700
    points:
      - "Use cleaned public Ukrlib readings only; never link an existing reading page that still exposes service IDs."
      - "Prefer at least four distinct public primary texts when Phase B cleans them: one already clean shchedrivka plus additional carol/shchedrivka pages."
      - "Record quote/source verification in PR handoff, not generated audit artifacts."
  - section: "Міст до хорової культури"
    words: 350
    points:
      - "Use Щедрик as a careful high-culture bridge only after public date/title/source verification."
      - "Sequence bridge as public folk text -> close reading -> choral treatment -> international recognition."
      - "Do not let the composer story replace the folk primary text."
  - section: "Деколонізаційна рамка і підсумок"
    words: 200
    points:
      - "Reject reduction of Ukrainian winter song to decorative ethnography."
      - "Show Ukrainian language organizing Christmas-season time, home, reciprocity, and public memory."
      - "Return to the opening text: what can the source prove, and where must interpretation stop?"
activity_hints:
  - type: ritual-sequencing
    placement: inline
    focus: "Order the winter visit: arrival, greeting, song, household response, gift, final wish, movement to next house."
  - type: variant-comparison
    placement: workbook
    focus: "Compare a колядка and a щедрівка by time, addressee, refrain, wish, and public source."
  - type: motif-formula
    placement: inline
    focus: "Find repeated formulas: добрий вечір, господар, господиня, ластівка, жито, пшениця, здоров'я."
  - type: performance
    placement: workbook
    focus: "Explain how meaning changes when a household song is read silently on a page."
