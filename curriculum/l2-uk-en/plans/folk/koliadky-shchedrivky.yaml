slug: koliadky-shchedrivky
version: '4.0'
title: 'Колядки та щедрівки: Міф про створення світу'
subtitle: 'Carols and Shchedrivky: The Cosmogonic Myth'
focus: Cosmogonic myths in winter ritual songs, world tree symbolism, pre-Christian layers, historiographical debate on origins
phase: FOLK.1
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Провокаційне питання: Чи є колядки християнськими піснями — чи язичницькими обрядами в християнській оболонці?'
  - Цитата з архаїчної колядки — «Коли не було знащада світа...» — без пояснень, лише текст
  - Студент має сформулювати першу гіпотезу до кінця модуля
  words: 400
- section: 'Конфліктна карта: Хто «винайшов» колядку?'
  points:
  - 'Дебат 1: Латинське походження (calendae) vs автохтонне слов''янське — Костомаров vs сучасні етнолінгвісти'
  - 'Дебат 2: Дохристиянський обряд vs пізня стилізація — чи архаїчні мотиви справді давні, чи реконструйовані романтиками?'
  - '[!epistemic-humility] «За версією Костомарова... Попович натомість вказує...» — подавати як дискусію, не як факт'
  - Глобальна синхронність — зимові обряди солярного циклу в Скандинавії (Yule), Римі (Saturnalia), Ірані (Yaldā)
  words: 800
- section: 'Читання: Космогонічний міф у тексті колядки'
  points:
  - Повний текст архаїчної колядки з Карпат (мотив пірнання птахів у первісне море)
  - Світове дерево (явір) як axis mundi — зв'язок із індоєвропейською міфологією
  - 'Тріада у колядках: господар = місяць, господиня = сонце, діти = зорі (Попович)'
  - '[!decolonization] Українська тріада vs великоросійський «овсень» — не один «домовладика», а родина як модель Космосу'
  - Первинне джерело — фрагмент із записів Чубинського або Потебні
  words: 1000
- section: 'Аналіз: Поетика та ритуальна функція'
  points:
  - Формульні зачини, паралелізм, рефрени («Даж Бог!», «Ой рано-рано!»)
  - 'Не просто «красиво» — кожен прийом має магічну функцію: повтор = закріплення заклинання'
  - Щедрівки та Маланка — новорічний цикл, засівання, ґендерні ролі у виконанні
  - '[!myth-buster] Щедрик Леонтовича — не «різдвяна пісня», а щедрівка новорічного циклу. Американська назва «Carol of the Bells» — культурне привласнення?'
  words: 1000
- section: 'Дискусія: Що вижило і чому?'
  points:
  - Колядки пережили християнізацію, татарські навали, радянський атеїзм — чому?
  - 'Гіпотези: ритуальна необхідність (календарний цикл не зупиниш) vs прихована резистентність vs простий консерватизм побуту'
  - '[!anti-hagiography] Не романтизувати — колядки також містили антисемітські та ксенофобські мотиви. Як з цим працювати?'
  - 'Сучасність: колядування в зоні бойових дій 2022-2025 — нове значення старого обряду'
  words: 1000
- section: Підсумок
  points:
  - Повернення до початкового питання — студент формулює відповідь
  - 'Ключова теза модуля: колядки — не музейний експонат, а живий інструмент культурної ідентичності'
  words: 400
vocabulary_hints:
- word: колядка
  pos: ж.
  definition: обрядова пісня різдвяного циклу, що величає господаря та його родину
- word: щедрівка
  pos: ж.
  definition: обрядова пісня новорічного циклу, пов'язана зі святом Маланки/Василя
- word: космогонія
  pos: ж.
  definition: міф або вчення про походження та створення Всесвіту
- word: світове дерево
  pos: с.
  definition: універсальний міфологічний образ — вісь, що з'єднує три рівні Всесвіту (axis mundi)
- word: засівання
  pos: с.
  definition: новорічний обряд посипання зерном підлоги на добробут і врожай
- word: паралелізм
  pos: ч.
  definition: стилістичний прийом повторення подібних синтаксичних конструкцій
- word: обрядовий
  pos: прикм.
  definition: пов'язаний із виконанням ритуалу, традиційного обряду
- word: автохтонний
  pos: прикм.
  definition: місцевого, корінного походження — протилежність запозиченому
- word: стилізація
  pos: ж.
  definition: свідоме наслідування стилю іншої епохи або жанру
- word: солярний
  pos: прикм.
  definition: пов'язаний із сонцем, сонячним культом
activity_hints:
- type: quiz
  focus: Розуміння прочитаного — конфліктна карта
  description: 'Після секції «Конфліктна карта» — перевірка розуміння обох позицій дебату. Студент має визначити, чия це позиція (Костомаров? Попович? сучасні етнолінгвісти?)'
  items: 4
- type: fill-in
  focus: Академічна лексика з контексту
  description: 'Терміни з тексту: космогонія, автохтонний, axis mundi, солярний, паралелізм — вставити у речення з модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: порівняння двох колядок'
  description: 'Подано дві колядки — архаїчну (космогонічну) та пізню (християнізовану). Студент аналізує: які мотиви спільні? Що додано? Що зникло? Яка з них «давніша» і чому ви так вважаєте?'
- type: note
  focus: 'Есе: Щедрик — українська спадщина чи глобальний хіт?'
  description: 'Леонтович переклав народну щедрівку в хорову мініатюру. Американці назвали її Carol of the Bells і прибрали українське походження. Чи є це культурним привласненням? Аргументуйте (400-600 слів).'
