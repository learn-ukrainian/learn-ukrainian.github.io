slug: kazky-pro-tvaryn
version: '4.0'
title: 'Казки про тварин: Від тотемізму до алегорії'
subtitle: 'Animal Tales: From Totemism to Allegory'
focus: Animal tales as oldest narrative stratum, totemistic roots, trickster figure (fox), allegory as social commentary, baroque influence on folk symbolism
phase: FOLK.2
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Питання: Чому Лисичка завжди хитра, Вовк — жадібний, а Заєць — боягузливий? Хто вирішив, що ці тварини мають такий характер?'
  - 'Фрагмент казки «Коза-дереза» — без пояснень. Студент визначає: це казка для дітей чи соціальна сатира?'
  words: 400
- section: 'Конфліктна карта: Тотем чи алегорія?'
  points:
  - 'Дебат 1: Архаїчна версія (Попович, Костомаров) — тварини у казках як слід тотемічних вірувань. Ведмідь, вовк, лисиця були не «персонажами», а предками, духами-покровителями'
  - 'Дебат 2: Літературна версія (Чижевський) — алегорія прийшла з перекладних збірок (Стефаніт та Іхнілат, XIII-XIV ст.) та барокової культури. Тварина = маска для соціальної критики'
  - '[!epistemic-humility] «Тотемічні сліди в українських казках — гіпотеза, не факт. Ми не маємо прямих свідчень тотемізму у давніх слов''ян — лише реконструкції»'
  - 'Глобальна синхронність: Reynard (Західна Європа), Anansi (Західна Африка), Coyote (корінні американці) — трікстер-тварина як архетип у всіх культурах'
  words: 800
- section: 'Читання: Лисичка-сестричка як трікстер'
  points:
  - 'Лисиця — не «зла», а хитра. Трікстер: порушує правила, обманює сильніших, перевертає ієрархію'
  - 'Казки про Лисицю та Вовка — хитрість перемагає силу. Це не дитяча мораль, а соціальний маніфест: розум сильніший за владу'
  - 'Кумулятивна структура: «Рукавичка», «Колобок» — нанизування однотипних елементів. Чому це працює? Ритм повтору як мнемонічний прийом та наростання напруги'
  - 'Первинне джерело: фрагмент казки з діалоговою структурою — тварини «розмовляють» як люди'
  words: 1000
- section: 'Аналіз: Від тотему до байки'
  points:
  - 'Етапи еволюції: (1) тотемічний — тварина як сакральна істота, (2) казковий — тварина як персонаж з характером, (3) алегоричний — тварина як маска для людських вад'
  - 'Бароко та «Ифіка ієрополитика» — спеціальна енциклопедія алегорій, що впливала на фольклор (Попович)'
  - 'Байка як сестра казки: Гулак-Артемовський, Глібов — літературна обробка тих самих сюжетів із чіткою мораллю'
  - '[!decolonization] Коза-дереза, Котик і Півник, Рукавичка — суто УКРАЇНСЬКІ сюжети з оригінальною поетикою. Не зводити до «слов''янських казок» — це НАШІ казки'
  - '[!myth-buster] «Казки про тварин — для малих дітей» — ні. Оригінальні версії містили жорстокість та соціальну сатиру. «Дитяча» версія — це XIX ст.'
  words: 1000
- section: Дискусія та підсумок
  points:
  - 'Повернення до розминки: характери тварин — не випадкові. Це столітнє спостереження + культурна конвенція + алегоричний код'
  - 'Стороженко, Квітка-Основ'яненко — літературна обробка народних сюжетів. Де межа між фольклором і літературою?'
  - '[!anti-hagiography] Казки також транслюють стереотипи: «хитрий циган», «дурний ведмідь». Алегорія може бути і мудрістю, і упередженням'
  words: 400
vocabulary_hints:
- word: тотемізм
  pos: ч.
  definition: архаїчна система вірувань, за якою рід вважає тварину своїм предком та покровителем
- word: трікстер
  pos: ч.
  definition: фольклорний персонаж-хитрун, що порушує правила та перевертає встановлений порядок
- word: алегорія
  pos: ж.
  definition: іносказання — коли конкретний образ (тварина) представляє абстрактне поняття (хитрість, жадібність)
- word: кумулятивний
  pos: прикм.
  definition: побудований на нанизуванні однотипних елементів з наростанням напруги
- word: антропоморфізм
  pos: ч.
  definition: наділення тварин чи предметів людськими рисами — мовою, мисленням, емоціями
- word: байка
  pos: ж.
  definition: короткий алегоричний твір повчального змісту — літературна сестра казки про тварин
- word: дидактичний
  pos: прикм.
  definition: повчальний, спрямований на виховання та навчання
- word: мнемонічний
  pos: прикм.
  definition: такий, що допомагає запам'ятовуванню — повтори в казках мають мнемонічну функцію
- word: сатира
  pos: ж.
  definition: різке висміювання вад суспільства або конкретних осіб через художні засоби
- word: персоніфікація
  pos: ж.
  definition: наділення неживих предметів або абстрактних понять людськими рисами
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: тотемічна версія (тварина як сакральна істота) чи алегорична (тварина як маска)? Студент визначає за описом функції тварини у сюжеті.'
  items: 4
- type: fill-in
  focus: Казкознавча лексика
  description: 'Терміни: трікстер, алегорія, кумулятивний, антропоморфізм, тотемізм — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: казка vs байка'
  description: 'Подано два тексти: (1) народна казка про Лисицю та Вовка, (2) байка Глібова на той самий сюжет. Порівняйте: що додає літературна обробка? Що втрачається?'
- type: note
  focus: 'Есе: Тварини як дзеркало суспільства'
  description: 'У кожній культурі тварини несуть різний символічний код. Чому в українській традиції саме Лисиця стала головним трікстером — а не, скажімо, Ворона чи Жаба? Що це говорить про цінності суспільства? (400-600 слів)'
