content_outline:
- points:
  - 'Питання: Чому Лисичка завжди хитра, Вовк — жадібний, а Заєць — боягузливий? Хто вирішив, що ці тварини мають такий характер?'
  - 'Фрагмент казки «Коза-дереза» — без пояснень. Студент визначає: це казка для дітей чи соціальна сатира?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Архаїчна версія (Попович, Костомаров) — тварини у казках як слід тотемічних вірувань. Ведмідь, вовк, лисиця
    були не «персонажами», а предками, духами-покровителями'
  - 'Дебат 2: Літературна версія (Чижевський) — алегорія прийшла з перекладних збірок (Стефаніт та Іхнілат, XIII-XIV ст.)
    та барокової культури. Тварина = маска для соціальної критики'
  - '[!epistemic-humility] «Тотемічні сліди в українських казках — гіпотеза, не факт. Ми не маємо прямих свідчень тотемізму
    у давніх слов''ян — лише реконструкції»'
  - 'Глобальна синхронність: Reynard (Західна Європа), Anansi (Західна Африка), Coyote (корінні американці) — трікстер-тварина
    як архетип у всіх культурах'
  section: 'Конфліктна карта: Тотем чи алегорія?'
  words: 1200
- points:
  - 'Лисиця — не «зла», а хитра. Трікстер: порушує правила, обманює сильніших, перевертає ієрархію'
  - 'Казки про Лисицю та Вовка — хитрість перемагає силу. Це не дитяча мораль, а соціальний маніфест: розум сильніший за владу'
  - 'Кумулятивна структура: «Рукавичка», «Колобок» — нанизування однотипних елементів. Чому це працює? Ритм повтору як мнемонічний
    прийом та наростання напруги'
  - 'Первинне джерело: фрагмент казки з діалоговою структурою — тварини «розмовляють» як люди'
  section: 'Читання: Лисичка-сестричка як трікстер'
  words: 1400
- points:
  - 'Етапи еволюції: (1) тотемічний — тварина як сакральна істота, (2) казковий — тварина як персонаж з характером, (3) алегоричний
    — тварина як маска для людських вад'
  - Бароко та «Ифіка ієрополитика» — спеціальна енциклопедія алегорій, що впливала на фольклор (Попович)
  - 'Байка як сестра казки: Гулак-Артемовський, Глібов — літературна обробка тих самих сюжетів із чіткою мораллю'
  - '[!decolonization] Коза-дереза, Котик і Півник, Рукавичка — суто УКРАЇНСЬКІ сюжети з оригінальною поетикою. Не зводити
    до «слов''янських казок» — це НАШІ казки'
  - '[!myth-buster] «Казки про тварин — для малих дітей» — ні. Оригінальні версії містили жорстокість та соціальну сатиру.
    «Дитяча» версія — це XIX ст.'
  section: 'Аналіз: Від тотему до байки'
  words: 1400
- points:
  - 'Повернення до розминки: характери тварин — не випадкові. Це столітнє спостереження + культурна конвенція + алегоричний
    код'
  - Стороженко, Квітка-Основ'яненко — літературна обробка народних сюжетів. Де межа між фольклором і літературою?
  - '[!anti-hagiography] Казки також транслюють стереотипи: «хитрий циган», «дурний ведмідь». Алегорія може бути і мудрістю,
    і упередженням'
  section: Дискусія та підсумок
  words: 800
focus: Animal tales as oldest narrative stratum, totemistic roots, trickster figure (fox), allegory as social commentary,
  baroque influence on folk symbolism
level: FOLK
module: folk-009
objectives:
- Критично аналізувати еволюцію казок про тварин від тотемічного підґрунтя до алегоричної функції
- Інтерпретувати образ трікстера (Лисиці) як соціальний коментар — не лише «мораль для дітей»
- Розуміти кумулятивну структуру як мнемонічний та естетичний прийом
- Порівнювати українських казкових тварин із трікстерами інших культур
