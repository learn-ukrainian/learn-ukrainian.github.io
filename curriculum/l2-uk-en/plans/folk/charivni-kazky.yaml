content_outline:
- points:
  - 'Казковий зачин: «Жив собі...» — студент має продовжити. Потім питання: чому КОЖНА казка починається однаково? Це бідність
    уяви чи ритуальна необхідність?'
  - 'Провокація: Чарівна казка — це не «казка для дітей». Це зашифрований обряд ініціації, де герой проходить символічну смерть'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Пропп/Попович — казки як «вироджені форми міфів». Давні боги стали персонажами, ритуали стали сюжетами. Казка
    = пам''ять про обряд'
  - 'Дебат 2: Чижевський/Костомаров — казки як «стихійна поезія народного духу», безпосереднє вираження національної уяви.
    Не шифр, а мистецтво'
  - '[!epistemic-humility] «Пропп переконливо показав універсальну структуру. Але чи кожен мотив справді кодує конкретний
    ритуал — чи це наукова гіперінтерпретація?»'
  - 'Глобальна синхронність: ATU-класифікація — ті самі сюжети (Попелюшка, Змієборець) в Україні, Індії, Скандинавії. Чому?
    Спільне індоєвропейське коріння чи незалежний винахід?'
  section: 'Конфліктна карта: Казка як розвага чи як міф?'
  words: 1200
- points:
  - 'Космологія казки: Верхній світ (вирій, птахи, боги) → Середній (люди) → Нижній (потойбіччя, змій, вода). Попович: тричленна
    модель характерна для землеробських культур'
  - 'Кордон між світами: Світова ріка (Дніпро як потойбіччя у Гоголя — Попович), густий ліс, хатинка на курячій ніжці (портал)'
  - 'Дніпрові пороги як сакральна межа: Запорозька Січ «за порогами» = простір контакту з «антисвітом» (Попович)'
  - 'Первинне джерело: фрагмент казки про подорож до «того світу» — перетин кордону'
  section: 'Читання: Світове дерево та три світи'
  words: 1400
- points:
  - 'Баба Яга — НЕ «зла відьма». Вартовий порталу: годує, парить у бані, дає чарівний предмет. Пропп: Яга = жриця, що проводить
    ініціацію'
  - Змій — хтонічний антагоніст, викрадач жінок/води. Перемога над Змієм = встановлення космічного порядку. Зв'язок з прадавнім
    міфом Перун vs Велес
  - Герой (Іван-Царевич, Котигорошко) — наймолодший, «дурень», сирота. Його «неповноцінність» = незрілість ДО ініціації
  - '[!decolonization] Котигорошко, Кирило Кожум''яка — суто УКРАЇНСЬКІ типи героїв. Не підставляти «Ивана-дурака» — це різні
    культурні коди'
  - '[!myth-buster] «Казки — для дітей» — міф XIX ст. Оригінальні казки містять жорстокість, еротику, канібалізм. Дитячі версії
    — пізня адаптація'
  section: 'Аналіз: Архетипи — Баба Яга, Змій, Герой'
  words: 1400
- points:
  - 'Повернення до розминки: формульний зачин — це «двері» до іншого світу, ритуальна фраза переходу'
  - 'Чому чарівні казки НЕ зникають? Пропп: структура ініціації актуальна для кожного покоління'
  - '[!anti-hagiography] Казки — не «чиста мудрість предків». Вони також транслюють стереотипи: пасивна царівна, злий вітчим,
    «чужий» = ворог'
  section: Дискусія та підсумок
  words: 800
