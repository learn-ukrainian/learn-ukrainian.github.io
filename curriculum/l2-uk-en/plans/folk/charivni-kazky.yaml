slug: charivni-kazky
version: '4.0'
title: 'Чарівні казки: Міфологічні архетипи та ініціація'
subtitle: 'Magic Tales: Mythological Archetypes and Initiation'
focus: Magic tale as degraded myth (Propp/Popovich), initiation rite encoded in narrative, Baba Yaga as threshold guardian, World Tree cosmology, Ukrainian vs universal motifs
phase: FOLK.2
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Казковий зачин: «Жив собі...» — студент має продовжити. Потім питання: чому КОЖНА казка починається однаково? Це бідність уяви чи ритуальна необхідність?'
  - 'Провокація: Чарівна казка — це не «казка для дітей». Це зашифрований обряд ініціації, де герой проходить символічну смерть'
  words: 400
- section: 'Конфліктна карта: Казка як розвага чи як міф?'
  points:
  - 'Дебат 1: Пропп/Попович — казки як «вироджені форми міфів». Давні боги стали персонажами, ритуали стали сюжетами. Казка = пам''ять про обряд'
  - 'Дебат 2: Чижевський/Костомаров — казки як «стихійна поезія народного духу», безпосереднє вираження національної уяви. Не шифр, а мистецтво'
  - '[!epistemic-humility] «Пропп переконливо показав універсальну структуру. Але чи кожен мотив справді кодує конкретний ритуал — чи це наукова гіперінтерпретація?»'
  - 'Глобальна синхронність: ATU-класифікація — ті самі сюжети (Попелюшка, Змієборець) в Україні, Індії, Скандинавії. Чому? Спільне індоєвропейське коріння чи незалежний винахід?'
  words: 800
- section: 'Читання: Світове дерево та три світи'
  points:
  - 'Космологія казки: Верхній світ (вирій, птахи, боги) → Середній (люди) → Нижній (потойбіччя, змій, вода). Попович: тричленна модель характерна для землеробських культур'
  - 'Кордон між світами: Світова ріка (Дніпро як потойбіччя у Гоголя — Попович), густий ліс, хатинка на курячій ніжці (портал)'
  - 'Дніпрові пороги як сакральна межа: Запорозька Січ «за порогами» = простір контакту з «антисвітом» (Попович)'
  - 'Первинне джерело: фрагмент казки про подорож до «того світу» — перетин кордону'
  words: 1000
- section: 'Аналіз: Архетипи — Баба Яга, Змій, Герой'
  points:
  - 'Баба Яга — НЕ «зла відьма». Вартовий порталу: годує, парить у бані, дає чарівний предмет. Пропп: Яга = жриця, що проводить ініціацію'
  - 'Змій — хтонічний антагоніст, викрадач жінок/води. Перемога над Змієм = встановлення космічного порядку. Зв''язок з прадавнім міфом Перун vs Велес'
  - 'Герой (Іван-Царевич, Котигорошко) — наймолодший, «дурень», сирота. Його «неповноцінність» = незрілість ДО ініціації'
  - '[!decolonization] Котигорошко, Кирило Кожум''яка — суто УКРАЇНСЬКІ типи героїв. Не підставляти «Ивана-дурака» — це різні культурні коди'
  - '[!myth-buster] «Казки — для дітей» — міф XIX ст. Оригінальні казки містять жорстокість, еротику, канібалізм. Дитячі версії — пізня адаптація'
  words: 1000
- section: Дискусія та підсумок
  points:
  - 'Повернення до розминки: формульний зачин — це «двері» до іншого світу, ритуальна фраза переходу'
  - 'Чому чарівні казки НЕ зникають? Пропп: структура ініціації актуальна для кожного покоління'
  - '[!anti-hagiography] Казки — не «чиста мудрість предків». Вони також транслюють стереотипи: пасивна царівна, злий вітчим, «чужий» = ворог'
  words: 400
vocabulary_hints:
- word: чарівна казка
  pos: ж.
  definition: фольклорний наративний жанр, побудований на чудесних перетвореннях, подорожі до іншого світу та випробуваннях героя
- word: архетип
  pos: ч.
  definition: універсальний, прадавній образ або мотив, спільний для різних культур — за Юнгом
- word: ініціація
  pos: ж.
  definition: обряд переходу в новий соціальний статус — в казці закодований як подорож та випробування
- word: потойбіччя
  pos: с.
  definition: інший світ, нижній світ — простір, куди подорожує казковий герой
- word: хтонічний
  pos: прикм.
  definition: пов'язаний із землею та підземним світом — хтонічні істоти мешкають у нижньому світі
- word: морфологія
  pos: ж.
  definition: 'у фольклористиці: аналіз структурних елементів казки за методом Проппа'
- word: вирій
  pos: ч.
  definition: давня назва раю, теплого краю, куди відлітають птахи — верхній ярус Світового дерева
- word: формульний
  pos: прикм.
  definition: побудований на усталених словесних формулах — характерна риса усного епосу та казки
- word: кумулятивний
  pos: прикм.
  definition: побудований на нанизуванні однотипних елементів — тип казки з наростаючим повтором
- word: axis mundi
  pos: с.
  definition: вісь світу — Світове дерево, що з'єднує три рівні Всесвіту
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: казка як вироджений міф (Пропп) чи як стихійна поезія (Костомаров)? Студент визначає позицію за описом функції казки.'
  items: 4
- type: fill-in
  focus: Казкознавча та міфологічна лексика
  description: 'Терміни: архетип, хтонічний, ініціація, потойбіччя, морфологія — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: Баба Яга — ворог чи помічник?'
  description: 'Подано два фрагменти казок з Бабою Ягою: (1) Яга як ворог, що хоче з''їсти героя, (2) Яга як помічник, що дає чарівний предмет і пораду. Студент аналізує: це два різних персонажі — чи два боки одного архетипу? Як це пов''язано з функцією ініціації?'
- type: note
  focus: 'Есе: Чому казки живуть?'
  description: 'Чарівні казки розповідають вже тисячі років. Голлівуд продовжує їх переказувати. Чому ці сюжети не старіють — і чи змінюється їхнє значення з кожною епохою? Аргументуйте (400-600 слів).'
