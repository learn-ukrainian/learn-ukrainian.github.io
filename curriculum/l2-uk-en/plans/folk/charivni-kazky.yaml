objectives:
- Критично аналізувати конкурентні інтерпретації чарівної казки — як вироджений міф vs стихійна поезія
- Працювати з текстом казки, визначаючи космологічну структуру та архетипні функції персонажів
- Розуміти концепцію ініціації як ключ до структури казкового сюжету
- Порівнювати українські казкові мотиви з індоєвропейськими паралелями
