module: folk-008
level: FOLK
sequence: 8
slug: charivni-kazky
version: '2.0'
title: 'Чарівні казки: Міфологічні архетипи та ініціація'
subtitle: 'Magic Tales: Mythological Archetypes and Initiation'
focus: Magic tales, Baba Yaga, initiation rites, Propp's morphology
phase: FOLK.2
word_target: 5000
content_outline:
- section: Вступ
  points:
  - The magic tale (чарівна казка) as the most complex folk narrative genre
  - Propp's morphology — universal structure, Ukrainian specifics
  words: 750
- section: Архетипні персонажі
  points:
  - Баба Яга — initiator, gatekeeper to the other world
  - Змій (dragon) — chaos principle, adversary
  - Котигорошко, Іван — hero types
  words: 950
- section: Ініціаційна структура
  points:
  - Departure, threshold crossing, trials, transformation, return
  - The forest as liminal space — between worlds
  words: 850
- section: Чарівні предмети та помічники
  points:
  - Magic objects — клубочок, скатертинка-самобранка, чоботи-скороходи
  - Animal helpers — вдячні тварини motif
  words: 800
- section: Текстовий аналіз
  points:
  - Close reading of selected tales with formulaic analysis
  - Opening and closing formulas — "Жив собі..." / "І я там був..."
  words: 850
- section: Підсумок
  points:
  - Ukrainian magic tales in comparative context
  - Vocabulary table
  words: 800
