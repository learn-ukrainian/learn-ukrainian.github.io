objectives:
- Аналізувати фундаментальний конфлікт козацьких побутових дум — побратимство vs біологічна родина
- Інтерпретувати материнське прокляття як абсолютну моральну санкцію в народній етиці
- Визнавати жіночу перспективу (дружина, мати, сестра) як повноцінний голос у чоловічому жанрі
- Формулювати позицію щодо ціни козацького ідеалу свободи
