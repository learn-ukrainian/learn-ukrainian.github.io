module: folk-020
level: FOLK
cefr_min: C1
sequence: 20
slug: dumy-sotsialno-pobutovi
version: '4.0'
title: 'Соціально-побутові думи: Родинна мораль'
subtitle: 'Domestic Dumas: Family Morality'
focus: Fundamental conflict between Cossack freedom and family duty, mother's curse as ultimate sanction, widow and orphan as moral test, kozak brotherhood vs blood ties
phase: FOLK.4
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Фрагмент козацької пісні: «Не для того стара мати, щоб її поважати... Ой у мене є коняка та й гарний коняка — ой я того та коняку поважати буду...» (Костомаров)'
  - 'Провокація: Козак свідомо обирає шаблю та коня замість матері та сестри. Це — героїзм чи зрада?'
  words: 400
- section: 'Конфліктна карта: Побратимство vs родина'
  points:
  - 'Дебат 1: Костомаров — козацький світ створив НОВУ систему цінностей: товариство (побратимство) замінює біологічну родину. Козаки — «брати і товариші» з «однаковими думками»'
  - 'Дебат 2: Побутові думи як КРИТИКА цієї системи — вони показують ціну козацької свободи: покинута мати, осиротілі діти, зрада сестри. Козацький ідеал — не утопія'
  - '[!epistemic-humility] «Побутовий цикл — менш досліджений і менш популярний за героїчний. Чижевський: ці думи рідше цитуються, бо не вписуються в національний міф»'
  - 'Глобальна синхронність: Одіссей vs Пенелопа (вірна дружина чекає), самурайський bushido vs ie (клан vs лорд), Viking saga women — жіноча перспектива в чоловічому епосі'
  words: 800
- section: 'Читання: Вдова та невдячні сини'
  points:
  - 'Дума про вдову — сини зневажають матір. Материнське прокляття як абсолютна моральна санкція. Хто проклятий матір''ю — проклятий Богом'
  - 'Прокляття → покарання → каяття — моральна схема побутових дум. Не «справедливість», а НЕВІДВОРОТНІСТЬ'
  - 'Чижевський: поетика цих дум — ті самі тавтологічні пари, формули, паралелізми, що й у героїчних. Жанрова єдність'
  - 'Первинне джерело: фрагмент думи — мати проклинає сина, природа відповідає'
  words: 1000
- section: 'Читання: Козак і дружина'
  points:
  - 'Конфлікт: козак іде на Січ — дружина залишається. Очікування, горе, економічна скрута'
  - 'Жіночий голос у думах — дружина не «фон», а повноцінний голос із власними аргументами. Але козацька ідеологія ставить товариство вище'
  - 'Зрада: дума про сестру, що отруює брата. Гендер і родинна лояльність — складніше, ніж «герої та лиходії»'
  - '[!decolonization] Побутові думи — ЖІНОЧА перспектива в суто ЧОЛОВІЧОМУ жанрі. Голос, якого немає в героїчних думах'
  words: 900
- section: 'Аналіз: Народна етика'
  points:
  - 'Тріада цінностей побутових дум: вдячність (до матері), вірність (до родини), покора (перед долею). Порушення = прокляття'
  - '[!myth-buster] «Козацька демократія» як ідеал — побутові думи показують зворотний бік: свобода козака = несвобода його родини. Ціна ідеалу'
  - '[!anti-hagiography] Не всі козаки — герої. Побутові думи показують п''яниць, зрадників, невдячних синів. Це НЕ «антикозацька пропаганда» — це реалізм жанру'
  words: 700
- section: Підсумок
  points:
  - 'Повернення до розминки: козак обирає шаблю замість матері — і побутові думи показують, що за цей вибір доведеться заплатити'
  - 'Ключова теза: побутові думи — моральне дзеркало козацького світу, де кожен ідеал має свою ціну'
  words: 400
vocabulary_hints:
- word: побутовий
  pos: прикм.
  definition: пов'язаний з повсякденним, родинним, домашнім життям — на відміну від героїчного
- word: прокляття
  pos: с.
  definition: магічна формула, що прирікає на нещастя — материнське прокляття є абсолютною санкцією
- word: вдова
  pos: ж.
  definition: жінка, чий чоловік помер — одна з найвразливіших постатей у народній моралі
- word: сирота
  pos: ч./ж.
  definition: дитина без батьків — образ соціальної вразливості та морального випробування для громади
- word: побратимство
  pos: с.
  definition: козацький союз вірності між двома воїнами — обрана родина, що замінює біологічну
- word: вдячність
  pos: ж.
  definition: визнання добра — у побутових думах невдячність до матері є найтяжчим гріхом
- word: зрада
  pos: ж.
  definition: порушення вірності — в думах може бути родинною, подружньою, козацькою
- word: покара
  pos: ж.
  definition: кара, покарання — в побутових думах невідворотна для того, хто порушив моральний закон
- word: санкція
  pos: ж.
  definition: 'у контексті модуля: морально обґрунтоване покарання (материнське прокляття як абсолютна санкція)'
- word: каяття
  pos: с.
  definition: щире визнання провини та жаль — фінальний етап моральної схеми побутових дум
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: побратимство vs родина? Студент визначає, яка система цінностей представлена у фрагменті — козацька (товариство > сім''я) чи побутова (родина > воля).'
  items: 4
- type: fill-in
  focus: Моральна та родинна лексика
  description: 'Терміни: побратимство, прокляття, вдячність, зрада, каяття — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: героїчна дума vs побутова'
  description: 'Подано два фрагменти: (1) героїчна дума (козак перемагає ворога), (2) побутова дума (мати проклинає невдячного сина). Порівняйте: хто герой? Яка модель конфлікту? Яка мораль?'
- type: note
  focus: 'Есе: Свобода і відповідальність'
  description: 'Козак обирає волю — але його родина платить ціну. Чи змінилась ця дилема? Сучасні воїни теж залишають родини. Як суспільство ставиться до цього вибору — і чи має право засуджувати? (400-600 слів)'
