content_outline:
- section: Вступ
  points:
  - The побутовий цикл — dumas of family life, not battlefield
  - Later chronological layer — 17th-18th century social conflicts
  words: 750
- section: Дума про вдову та синів
  points:
  - The widow's sons who dishonor her — ingratitude punished
  - Mother's curse as ultimate sanction in folk morality
  words: 900
- section: Дума про сестру і брата
  points:
  - Sibling betrayal — the sister who poisons, the brother who forgives
  - Gender and family loyalty conflicts
  words: 850
- section: Козак та родина
  points:
  - Tension between Cossack freedom and family obligation
  - The wife left behind — waiting, mourning, economic hardship
  words: 850
- section: Текстовий аналіз
  points:
  - Close reading of domestic dumas with linguistic commentary
  - Emotional register — curses, blessings, lament formulas
  words: 850
- section: Підсумок
  points:
  - Domestic dumas as folk ethics — honor, loyalty, gratitude
  - Vocabulary table
  words: 800
