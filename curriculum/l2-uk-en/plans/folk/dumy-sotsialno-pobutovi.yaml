content_outline:
- points:
  - 'Фрагмент козацької пісні: «Не для того стара мати, щоб її поважати... Ой у мене є коняка та й гарний коняка — ой я того
    та коняку поважати буду...» (Костомаров)'
  - 'Провокація: Козак свідомо обирає шаблю та коня замість матері та сестри. Це — героїзм чи зрада?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Костомаров — козацький світ створив НОВУ систему цінностей: товариство (побратимство) замінює біологічну родину.
    Козаки — «брати і товариші» з «однаковими думками»'
  - 'Дебат 2: Побутові думи як КРИТИКА цієї системи — вони показують ціну козацької свободи: покинута мати, осиротілі діти,
    зрада сестри. Козацький ідеал — не утопія'
  - '[!epistemic-humility] «Побутовий цикл — менш досліджений і менш популярний за героїчний. Чижевський: ці думи рідше цитуються,
    бо не вписуються в національний міф»'
  - 'Глобальна синхронність: Одіссей vs Пенелопа (вірна дружина чекає), самурайський bushido vs ie (клан vs лорд), Viking
    saga women — жіноча перспектива в чоловічому епосі'
  section: 'Конфліктна карта: Побратимство vs родина'
  words: 1050
- points:
  - Дума про вдову — сини зневажають матір. Материнське прокляття як абсолютна моральна санкція. Хто проклятий матір'ю — проклятий
    Богом
  - Прокляття → покарання → каяття — моральна схема побутових дум. Не «справедливість», а НЕВІДВОРОТНІСТЬ
  - 'Чижевський: поетика цих дум — ті самі тавтологічні пари, формули, паралелізми, що й у героїчних. Жанрова єдність'
  - 'Первинне джерело: фрагмент думи — мати проклинає сина, природа відповідає'
  section: 'Читання: Вдова та невдячні сини'
  words: 1250
- points:
  - 'Конфлікт: козак іде на Січ — дружина залишається. Очікування, горе, економічна скрута'
  - Жіночий голос у думах — дружина не «фон», а повноцінний голос із власними аргументами. Але козацька ідеологія ставить
    товариство вище
  - 'Зрада: дума про сестру, що отруює брата. Гендер і родинна лояльність — складніше, ніж «герої та лиходії»'
  - '[!decolonization] Побутові думи — ЖІНОЧА перспектива в суто ЧОЛОВІЧОМУ жанрі. Голос, якого немає в героїчних думах'
  section: 'Читання: Козак і дружина'
  words: 1150
- points:
  - 'Тріада цінностей побутових дум: вдячність (до матері), вірність (до родини), покора (перед долею). Порушення = прокляття'
  - '[!myth-buster] «Козацька демократія» як ідеал — побутові думи показують зворотний бік: свобода козака = несвобода його
    родини. Ціна ідеалу'
  - '[!anti-hagiography] Не всі козаки — герої. Побутові думи показують п''яниць, зрадників, невдячних синів. Це НЕ «антикозацька
    пропаганда» — це реалізм жанру'
  section: 'Аналіз: Народна етика'
  words: 950
- points:
  - 'Повернення до розминки: козак обирає шаблю замість матері — і побутові думи показують, що за цей вибір доведеться заплатити'
  - 'Ключова теза: побутові думи — моральне дзеркало козацького світу, де кожен ідеал має свою ціну'
  section: Підсумок
  words: 400
