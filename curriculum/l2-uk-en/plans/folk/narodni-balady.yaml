objectives:
- Критично аналізувати баладний трагізм як жанрову категорію — між раціональним вибором і фатумом
- Інтерпретувати метаморфозу як символічний код незворотності долі
- Порівнювати українську баладну традицію з європейською (шотландською, скандинавською)
- Розуміти роль балади в становленні літературного романтизму (Шевченко)
