content_outline:
- points:
  - 'Фрагмент «Ой не ходи, Грицю» — дівчина готує отруту для коханого. Питання: Це злочин чи долею визначений вчинок? Хто
    винен — людина чи фатум?'
  - Студент формулює першу гіпотезу про природу баладного трагізму
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Попович — баладний трагізм спирається на «абсолютну розсудливість міркувань», які ведуть до втрати «сенсу буття».
    Не ірраціональний фатум, а раціональний вибір із жахливими наслідками (дума про трьох братів з Азова)'
  - 'Дебат 2: Романтична версія (Костомаров, Шевченко) — балада як вираження «народного духу», де трагедія невідворотна, як
    природна стихія. Доля визначена наперед'
  - '[!epistemic-humility] «Слово ''балада'' прийшло з Франції (baller — танцювати). Чи є український жанр тим самим, що й
    європейська балада — чи лише схожою формою?»'
  - 'Глобальна синхронність: шотландські балади (Lord Randal — теж отруєння!), скандинавські кемпе-балади, іспанські романси
    — трагічна пісня як євразійський архетип'
  section: 'Конфліктна карта: Доля чи вибір?'
  words: 1100
- points:
  - '«Ой не ходи, Грицю» — отруєння, ревнощі, фатум. Три варіанти розв''язки: отруєння, самогубство, прокляття. Кожен регіон
    має свою версію'
  - «Бондарівна» — соціальна нерівність і трагедія. Не лише кохання, а й класовий конфлікт
  - 'Дума «Про втечу трьох братів з Азова» — старші кидають молодшого. Попович: їхня логіка бездоганна і жахлива. Раціональний
    розрахунок vs моральний обов''язок'
  - 'Первинне джерело: фрагмент балади з діалоговою структурою'
  section: 'Читання: Класичні балади'
  words: 1300
- points:
  - Метаморфоза — перетворення людини на тополю, вербу, зозулю. Не «казковий елемент», а символічне відображення незворотності
    долі
  - 'Символіка: калина = краса/дівоцтво, верба = печаль, зозуля = материнський плач, вода = межа життя і смерті'
  - Драматизм — балада побудована на діалозі, а не на описі. Мінімум персонажів, максимум напруги
  - '[!decolonization] Українська балада — самостійна європейська традиція. Імперська класифікація зводила її до «общерусской»
    — це фальсифікація. Жіночий голос у баладі — агентність героїні, не пасивність'
  - '[!myth-buster] «Балади — це красиві сумні пісні» — спрощення. Балада може бути жорстокою, натуралістичною, з табуйованими
    темами (інцест, отруєння, самогубство). Фольклор не цензурує'
  section: 'Аналіз: Метаморфоза та символічний код'
  words: 1300
- points:
  - 'Повернення до розминки: у баладі «Ой не ходи, Грицю» — і доля, і вибір. Трагізм саме в тому, що одне не виключає інше'
  - 'Шевченко — «Причинна», «Тополя». Чижевський: саме Шевченко ввів «трагічні теми з селянського життя» в літературу'
  - '[!anti-hagiography] Балади не лише «прекрасні». Вони також транслюють патріархальні цінності: «непокірна дівчина» карається,
    «зрадник» знищується. Доля у баладі — часто код для соціального контролю'
  section: 'Дискусія: Балада і романтизм'
  words: 700
- points:
  - 'Ключова теза: балада — жанр, що досліджує темний бік долі і свободи. Не розвага, а екзистенційне запитання'
  section: Підсумок
  words: 400
