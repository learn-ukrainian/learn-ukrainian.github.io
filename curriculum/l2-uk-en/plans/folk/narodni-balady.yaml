module: folk-022
level: FOLK
cefr_min: C1
sequence: 22
slug: narodni-balady
version: '4.0'
title: 'Народні балади: Трагізм і доля'
subtitle: 'Folk Ballads: Tragedy and Fate'
focus: Ballad as distinct genre between song and epic, tragic fate as core category, metamorphosis motif, Popovich on rational tragedy, decolonization of Ukrainian ballad tradition
phase: FOLK.2
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Фрагмент «Ой не ходи, Грицю» — дівчина готує отруту для коханого. Питання: Це злочин чи долею визначений вчинок? Хто винен — людина чи фатум?'
  - 'Студент формулює першу гіпотезу про природу баладного трагізму'
  words: 400
- section: 'Конфліктна карта: Доля чи вибір?'
  points:
  - 'Дебат 1: Попович — баладний трагізм спирається на «абсолютну розсудливість міркувань», які ведуть до втрати «сенсу буття». Не ірраціональний фатум, а раціональний вибір із жахливими наслідками (дума про трьох братів з Азова)'
  - 'Дебат 2: Романтична версія (Костомаров, Шевченко) — балада як вираження «народного духу», де трагедія невідворотна, як природна стихія. Доля визначена наперед'
  - '[!epistemic-humility] «Слово ''балада'' прийшло з Франції (baller — танцювати). Чи є український жанр тим самим, що й європейська балада — чи лише схожою формою?»'
  - 'Глобальна синхронність: шотландські балади (Lord Randal — теж отруєння!), скандинавські кемпе-балади, іспанські романси — трагічна пісня як євразійський архетип'
  words: 800
- section: 'Читання: Класичні балади'
  points:
  - '«Ой не ходи, Грицю» — отруєння, ревнощі, фатум. Три варіанти розв''язки: отруєння, самогубство, прокляття. Кожен регіон має свою версію'
  - '«Бондарівна» — соціальна нерівність і трагедія. Не лише кохання, а й класовий конфлікт'
  - 'Дума «Про втечу трьох братів з Азова» — старші кидають молодшого. Попович: їхня логіка бездоганна і жахлива. Раціональний розрахунок vs моральний обов''язок'
  - 'Первинне джерело: фрагмент балади з діалоговою структурою'
  words: 1000
- section: 'Аналіз: Метаморфоза та символічний код'
  points:
  - 'Метаморфоза — перетворення людини на тополю, вербу, зозулю. Не «казковий елемент», а символічне відображення незворотності долі'
  - 'Символіка: калина = краса/дівоцтво, верба = печаль, зозуля = материнський плач, вода = межа життя і смерті'
  - 'Драматизм — балада побудована на діалозі, а не на описі. Мінімум персонажів, максимум напруги'
  - '[!decolonization] Українська балада — самостійна європейська традиція. Імперська класифікація зводила її до «общерусской» — це фальсифікація. Жіночий голос у баладі — агентність героїні, не пасивність'
  - '[!myth-buster] «Балади — це красиві сумні пісні» — спрощення. Балада може бути жорстокою, натуралістичною, з табуйованими темами (інцест, отруєння, самогубство). Фольклор не цензурує'
  words: 1000
- section: 'Дискусія: Балада і романтизм'
  points:
  - 'Повернення до розминки: у баладі «Ой не ходи, Грицю» — і доля, і вибір. Трагізм саме в тому, що одне не виключає інше'
  - 'Шевченко — «Причинна», «Тополя». Чижевський: саме Шевченко ввів «трагічні теми з селянського життя» в літературу'
  - '[!anti-hagiography] Балади не лише «прекрасні». Вони також транслюють патріархальні цінності: «непокірна дівчина» карається, «зрадник» знищується. Доля у баладі — часто код для соціального контролю'
  words: 400
- section: Підсумок
  points:
  - 'Ключова теза: балада — жанр, що досліджує темний бік долі і свободи. Не розвага, а екзистенційне запитання'
  words: 400
vocabulary_hints:
- word: балада
  pos: ж.
  definition: ліро-епічний пісенний твір з драматично напруженим сюжетом і трагічною розв'язкою
- word: фатум
  pos: ч.
  definition: невідворотна доля, визначеність наперед — центральна категорія баладного трагізму
- word: метаморфоза
  pos: ж.
  definition: перетворення людини на рослину, тварину або природний об'єкт — символ незворотності долі
- word: трагізм
  pos: ч.
  definition: неможливість щасливої розв'язки — конфлікт, який НЕ може бути вирішений без втрати
- word: ліро-епічний
  pos: прикм.
  definition: такий, що поєднує сюжетну розповідь (епос) з вираженням почуттів (лірика)
- word: отрута
  pos: ж.
  definition: смертельна речовина — поширений засіб вбивства у баладних сюжетах
- word: зозуля
  pos: ж.
  definition: птах-символ у фольклорі — уособлення материнського плачу та самотності
- word: агентність
  pos: ж.
  definition: здатність діяти самостійно, робити вибір — героїня балади є агентом, а не жертвою
- word: романс
  pos: ч.
  definition: іспанська народна балада — європейський аналог українського жанру
- word: інцест
  pos: ч.
  definition: табуйований мотив у баладах — родинний зв'язок як джерело трагічного конфлікту
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: раціональний трагізм (Попович — герой робить логічний, але жахливий вибір) чи фатальний (романтики — доля невідворотна)? Студент визначає за фрагментом балади.'
  items: 4
- type: fill-in
  focus: Баладна та літературознавча лексика
  description: 'Терміни: фатум, метаморфоза, ліро-епічний, агентність, трагізм — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: народна балада vs Шевченко'
  description: 'Подано два тексти: (1) народна балада «Ой не ходи, Грицю» (фрагмент), (2) фрагмент «Тополі» Шевченка. Порівняйте: як літературна обробка трансформує народний жанр? Що зберігається — мотив метаморфози, трагізм, жіночий голос?'
- type: note
  focus: 'Есе: Трагедія як жанр'
  description: 'Чому людям потрібні трагічні історії? Від баладних пісень до серіалів — жанр трагедії не зникає. Яку функцію він виконує — і чому «щасливий кінець» не може його замінити? (400-600 слів)'
