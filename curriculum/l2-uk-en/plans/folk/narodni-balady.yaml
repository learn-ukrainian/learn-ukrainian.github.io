module: folk-022
level: FOLK
sequence: 22
slug: narodni-balady
version: '2.0'
title: 'Народні балади: Трагізм і доля'
subtitle: Folk Ballads — Tragedy and Fate
focus: Ukrainian folk ballads as distinct genre — tragic, romantic, mythological motifs
phase: FOLK.2
word_target: 5000
content_outline:
- section: Вступ
  points:
  - Балада як окремий жанр — не пісня, не дума, не казка
  - Трагічний конфлікт як жанрова ознака
  words: 750
- section: Класичні балади
  points:
  - '«Ой не ходи, Грицю» — отруєння, ревнощі, фатум'
  - '«Бондарівна» — соціальна нерівність і трагедія'
  - Європейські паралелі (шотландські, скандинавські балади)
  words: 950
- section: Тематичні групи
  points:
  - Родинні балади — конфлікт поколінь, нещасливий шлюб
  - Козацькі балади — розлука, загибель, вірність
  - Міфологічні балади — русалки, відьми, перевертні
  words: 900
- section: Поетика балади
  points:
  - Драматизм — діалог як основа композиції
  - Символіка — калина, верба, зозуля, вода
  - Психологізм — внутрішній монолог героїні
  words: 850
- section: Деколонізаційний вимір
  points:
  - Українська балада як самостійна європейська традиція
  - Імперське привласнення — «общерусская» класифікація
  - Жіночий голос у баладі — агентність героїні
  words: 800
- section: Підсумок
  points:
  - Балада в сучасній культурі — обробки, адаптації
  - Словник фольклорних термінів
  words: 750
