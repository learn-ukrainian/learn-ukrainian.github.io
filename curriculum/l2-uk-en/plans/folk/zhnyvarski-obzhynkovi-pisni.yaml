module: folk-006
level: FOLK
sequence: 6
slug: zhnyvarski-obzhynkovi-pisni
title: "Жниварські та обжинкові пісні"
subtitle: "Harvest labor, obzhynky, wreath, sheaf, community voice"
version: 5
status: locked
phase: base-first
cefr_min: C1
word_target: 4200
focus: >-
  Чиста база M06: українські пісні жниварського циклу, зажинки, жнива,
  жниварські пісні, обжинки, дожинки, обжинковий вінок, сніп, борода,
  праця, втома, громада, господар, публічні текстові кандидати УкрЛіб.
persona: >-
  студент поглибленого семінару, який читає українські жниварські пісні
  через публічні першоджерела, шкільний канон, уважну рамку і рух від
  тексту до висновку.
objectives:
  - "Розрізняти зажинки, власне жнивні пісні та обжинки / дожинки за календарним моментом, дією, предметами і голосом."
  - "Пояснити жниварські пісні як тексти праці, гуртового співу, втоми, ритму, звертання і соціального обміну."
  - "Читати обжинковий вінок, сніп, копу, стодолу, межу і 'бороду' через дію в тексті, не через позатекстову сенсацію."
  - "Показати, як радість завершення співіснує з тяжкою працею, ієрархією, проханням винагороди, жартом і подякою."
  - "Працювати в студентських матеріалах тільки із публічними джерелами на кшталт УкрЛіб, Pidruchnyk і Osvita."
pedagogy:
  approach: "семінар: спершу текст, потім висновок"
  notes:
    - >-
      Почати з одного повного короткого публічного тексту, потім визначити
      фазу, дію, мовця, адресата і предметні слова.
    - "Тримати працю і втому видимими; не перетворювати обжинки на загальну веселу декорацію врожаю."
    - >-
      Використовувати українські академічні терміни: жниварська пісня,
      обжинки, дожинки, обжинковий вінок, сніп, борода, господар,
      виконавська ситуація.
    - "Наступна фаза має створити або оновити сторінки читання перед посиланнями в уроці."
content_outline:
  - section: "Жнивний цикл: зажинки, жнива, обжинки"
    words: 700
    points:
      - "Визначити пісні жниварського циклу в рамці календарно-обрядових пісень."
      - "Розвести зажинки, жнивні пісні, обжинки / дожинки за дією і моментом."
      - "Провести межі з купальськими літніми піснями перед жнивами і стодольними / молотницькими роботами після поля."
      - "Увести основні ролі: жниця, жнець, гурт, господар, господиня."
  - section: "Праця, тіло і ритм"
    words: 700
    points:
      - "Використати кандидат 'Жали женчики, жали' після повної звірки публічного тексту в наступній фазі."
      - "Показати повтор дії, серпи, молодість, зламане знаряддя і гуртовий ритм."
      - "Використати кандидат 'Нуте, нуте, до межі' для наказового ритму, руху до межі й очікування їжі після праці."
      - "Тримати виснаження і тілесну працю видимими, не зводячи урок лише до скарги."
  - section: "Обжинкове завершення: вінок, сніп, борода"
    words: 850
    points:
      - >-
        Використати кандидат 'Котився віночок по полю', щоб показати рух
        від поля до стодоли, спочинок і майбутнє повернення.
      - >-
        Використати кандидат 'Сидить ведмідь на копі', щоб показати
        жартівливе опрацювання 'бороди' і соціальне порівняння.
      - "Подати обжинки як завершення після праці: вінок / сніп, стодола, господарство, гостинність, прохання, похвала."
      - "Не давати одного ключа до всіх предметів; питати, що відбувається з предметом і хто до кого звертається."
  - section: "Поетика короткої пісні"
    words: 750
    points:
      - "Аналізувати повтор, наказову форму, звертання, зменшувальність і конкретні предметні слова."
      - "Порівняти тон: стиснення праці, спонукання, обжинковий рух, жартівливе спостереження."
      - "Навчити варіантності: один друкований текст є одним записаним варіантом, не всією традицією."
      - "Для чотирирядкових пісень віддавати перевагу повному близькому читанню, а не ізольованим піврядкам."
  - section: "Соціальний адрес і деколонізаційна рамка"
    words: 650
    points:
      - "Назвати ієрархію: господар, пан, винагорода від двору, обов'язок, похвала, прохання, жарт."
      - "Відкинути декоративну етнографію, що ховає втому і соціальний зв'язок."
      - "Також відкинути великі історії походження, які випереджають публічний текст."
      - "Тримати видимими українські терміни і шкільно-канонічні жанрові категорії."
  - section: "Джерела і межі висновку"
    words: 350
    points:
      - "Розвести публічний первинний текст, підручникову рамку, навчальну програму і науковий контекст."
      - "Кожне цитування в уроці має йти до публічної бібліографічної адреси."
      - "Називати, де пісня доводить працю, рух, звертання або предмет; зупинятися перед непідтвердженим твердженням."
  - section: "Підсумок"
    words: 200
    points:
      - "Повернутися до методу: текст, дія, соціальний зв'язок, обережне тлумачення."
      - >-
        Підготувати перехід до родинної обрядовості через мову вінця і
        соціального циклу лише там, де це підтримують джерела.
activity_hints:
  - type: cycle-sequencing
    placement: inline
    focus: >-
      Упорядкувати дії жниварського циклу: початок, польова праця,
      межа / перепочинок, завершення, вінок / сніп, господарство.
  - type: close-reading
    placement: inline
    focus: "Визначити слово дії, предметне слово, адресата і фазу в одній короткій пісні."
  - type: motif-formula
    placement: workbook
    focus: "Порівняти повтор, наказову форму, звертання і предметні слова у двох звірених публічних текстах."
  - type: source-check
    placement: workbook
    focus: >-
      Класифікувати типи джерел: публічний первинний текст, підручникова
      рамка, навчальна програма, науковий контекст.
  - type: social-address
    placement: workbook
    focus: "Пояснити, як похвала, прохання, очікування винагороди і жарт співіснують в обжинковому тексті."
