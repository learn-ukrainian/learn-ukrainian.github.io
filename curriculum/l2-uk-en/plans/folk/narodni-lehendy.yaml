slug: narodni-lehendy
version: '4.0'
title: 'Народні легенди: Народне християнство'
subtitle: 'Folk Legends: Popular Christianity'
focus: Dvovirya (dual faith) as syncretic worldview, apocryphal influence, dualism (God vs Devil in creation), pagan deities behind Christian saints, folk theodicy
phase: FOLK.2
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Легенда: Бог створив світ, а чорт — болота, гори та шкідливих тварин. Питання: це православне вчення чи єресь?'
  - 'Студент формулює першу гіпотезу: звідки в народних легендах дуалізм, якого немає в офіційному православ''ї?'
  words: 400
- section: 'Конфліктна карта: Двовір''я — гібрид чи синтез?'
  points:
  - 'Дебат 1: Костомаров — українці «віддані самому духові християнства», а не обрядності. Їхній світ поєднує Бога з «неприродними істотами, духами, чарами» — і це НЕ суперечність'
  - 'Дебат 2: Церковна версія — двовір''я як неповне хрещення, «народна темнота», яку треба долати. Язичницькі елементи = залишки паганства'
  - '[!epistemic-humility] «Термін двовір''я — сучасна конструкція. Самі носії не відчували протиріччя між свічкою в церкві та обрядом на Купала»'
  - 'Глобальна синхронність: syncretismo (Латинська Америка — Діва Марія Ґвадалупська = Тонанцін), Candomblé (Бразилія), shinto-буддизм (Японія) — синкретизм як норма, не виняток'
  words: 800
- section: 'Читання: Джерела народного християнства'
  points:
  - 'Апокрифічна література — «цікаві і фантастичні оповідання, що запліднили народні казки та легенди про святих» (Чижевський). Хождіння Агапія в рай, плач Єви, боротьба Михаїла з сатаною'
  - 'Богомильський дуалізм — Бог і Сатанаїл як рівносильні начала. Костомаров: народні легенди близькі до богомільського розуміння'
  - 'Функціональна заміна: Перун → Ілля-пророк, Велес → Юрій, Мокоша → Параскева. Старі боги не зникли — «перехрестились»'
  - 'Первинне джерело: фрагмент етіологічної легенди — Бог і чорт творять світ, чорт «наслідує» Бога'
  words: 1100
- section: 'Аналіз: Святі як «народні герої»'
  points:
  - 'Святий Юрій відмикає весну, святий Миколай — швидкий помічник. Петро і Павло — мандрівники, що випробовують гостинність. Це НЕ канонічні образи — це народне переосмислення'
  - 'Етіологічні легенди — чому осика тремтить, чому ластівка має роздвоєний хвіст. Народна «наука», закодована в наративі'
  - '[!decolonization] Українське народне християнство — окрема система, що НЕ зводиться до «російського православ''я». Український двовір''я має свою специфіку, пов''язану з аграрним циклом та західними (богомільськими) впливами'
  - '[!myth-buster] «Народ був темний і не розумів справжнього християнства» — версія просвітителів. Насправді народне християнство — це складна система, що інтегрувала нову віру зі збереженням спадкових уявлень'
  words: 1000
- section: Дискусія та підсумок
  points:
  - 'Повернення до розминки: дуалістична легенда — НЕ єресь і НЕ православ''я. Це третій шлях — народна теодіцея, пояснення зла у світі'
  - 'Чижевський vs Квітка: романтики бачили в народних віруваннях «народний дух», а просвітитель Квітка — «народну темноту». Хто правий?'
  - '[!anti-hagiography] Народне християнство — не лише «мудрість». Воно також транслювало страх перед «нечистим», підозри до «інших», демонізацію жінок (відьом)'
  words: 400
- section: Підсумок
  points:
  - 'Ключова теза: двовір''я — не неповноцінність, а один з найскладніших синкретичних світоглядів Європи'
  words: 300
vocabulary_hints:
- word: двовір'я
  pos: с.
  definition: співіснування християнських та дохристиянських вірувань в одній культурній системі
- word: апокриф
  pos: ч.
  definition: твір на біблійну тему, не включений до офіційного канону Церкви
- word: етіологічний
  pos: прикм.
  definition: такий, що пояснює походження явища — етіологічна легенда розповідає, чому щось є таким
- word: синкретизм
  pos: ч.
  definition: поєднання елементів різних релігій та культурних систем в одну цілісність
- word: теодіцея
  pos: ж.
  definition: спроба пояснити існування зла у світі, створеному добрим Богом
- word: дуалізм
  pos: ч.
  definition: уявлення про світ як арену боротьби двох рівносильних начал — доброго і злого
- word: богомильство
  pos: с.
  definition: середньовічне єретичне вчення з яскравим дуалізмом, що проникло на українські землі з Балкан
- word: функціональна заміна
  pos: ж.
  definition: процес, за яким християнський святий перебирає функції язичницького божества
- word: демонізація
  pos: ж.
  definition: перетворення колишніх богів або нейтральних істот на злих духів під впливом нової релігії
- word: переказ
  pos: ч.
  definition: усний прозовий твір, що претендує на правдивість — на відміну від казки
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція: народна версія (двовір''я як органічний синтез) чи церковна (двовір''я як неповне хрещення)? Студент визначає за описом ставлення до народних вірувань.'
  items: 4
- type: fill-in
  focus: Релігієзнавча та фольклористична лексика
  description: 'Терміни: двовір''я, апокриф, етіологічний, теодіцея, дуалізм — у контексті речень із модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: етіологічна легенда'
  description: 'Подано дуалістичну легенду (Бог і чорт творять світ). Студент аналізує: (1) які елементи християнські, які — дохристиянські? (2) як легенда «вирішує» проблему зла? (3) чи є паралелі з іншими культурами?'
- type: note
  focus: 'Есе: Чи існує «чисте» християнство?'
  description: 'Кожна християнська культура адаптувала віру до місцевих традицій. Чи є це «спотворенням» — чи природним процесом? Де межа між синкретизмом і єрессю? (400-600 слів)'
