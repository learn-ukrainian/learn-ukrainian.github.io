content_outline:
- points:
  - 'Легенда: Бог створив світ, а чорт — болота, гори та шкідливих тварин. Питання: це православне вчення чи єресь?'
  - 'Студент формулює першу гіпотезу: звідки в народних легендах дуалізм, якого немає в офіційному православ''ї?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Костомаров — українці «віддані самому духові християнства», а не обрядності. Їхній світ поєднує Бога з «неприродними
    істотами, духами, чарами» — і це НЕ суперечність'
  - 'Дебат 2: Церковна версія — двовір''я як неповне хрещення, «народна темнота», яку треба долати. Язичницькі елементи =
    залишки паганства'
  - '[!epistemic-humility] «Термін двовір''я — сучасна конструкція. Самі носії не відчували протиріччя між свічкою в церкві
    та обрядом на Купала»'
  - 'Глобальна синхронність: syncretismo (Латинська Америка — Діва Марія Ґвадалупська = Тонанцін), Candomblé (Бразилія), shinto-буддизм
    (Японія) — синкретизм як норма, не виняток'
  section: 'Конфліктна карта: Двовір''я — гібрид чи синтез?'
  words: 1100
- points:
  - Апокрифічна література — «цікаві і фантастичні оповідання, що запліднили народні казки та легенди про святих» (Чижевський).
    Хождіння Агапія в рай, плач Єви, боротьба Михаїла з сатаною
  - 'Богомильський дуалізм — Бог і Сатанаїл як рівносильні начала. Костомаров: народні легенди близькі до богомільського розуміння'
  - 'Функціональна заміна: Перун → Ілля-пророк, Велес → Юрій, Мокоша → Параскева. Старі боги не зникли — «перехрестились»'
  - 'Первинне джерело: фрагмент етіологічної легенди — Бог і чорт творять світ, чорт «наслідує» Бога'
  section: 'Читання: Джерела народного християнства'
  words: 1400
- points:
  - Святий Юрій відмикає весну, святий Миколай — швидкий помічник. Петро і Павло — мандрівники, що випробовують гостинність.
    Це НЕ канонічні образи — це народне переосмислення
  - Етіологічні легенди — чому осика тремтить, чому ластівка має роздвоєний хвіст. Народна «наука», закодована в наративі
  - '[!decolonization] Українське народне християнство — окрема система, що НЕ зводиться до «російського православ''я». Український
    двовір''я має свою специфіку, пов''язану з аграрним циклом та західними (богомільськими) впливами'
  - '[!myth-buster] «Народ був темний і не розумів справжнього християнства» — версія просвітителів. Насправді народне християнство
    — це складна система, що інтегрувала нову віру зі збереженням спадкових уявлень'
  section: 'Аналіз: Святі як «народні герої»'
  words: 1300
- points:
  - 'Повернення до розминки: дуалістична легенда — НЕ єресь і НЕ православ''я. Це третій шлях — народна теодіцея, пояснення
    зла у світі'
  - 'Чижевський vs Квітка: романтики бачили в народних віруваннях «народний дух», а просвітитель Квітка — «народну темноту».
    Хто правий?'
  - '[!anti-hagiography] Народне християнство — не лише «мудрість». Воно також транслювало страх перед «нечистим», підозри
    до «інших», демонізацію жінок (відьом)'
  section: Дискусія та підсумок
  words: 700
- points:
  - 'Ключова теза: двовір''я — не неповноцінність, а один з найскладніших синкретичних світоглядів Європи'
  section: Підсумок
  words: 300
focus: Dvovirya (dual faith) as syncretic worldview, apocryphal influence, dualism (God vs Devil in creation), pagan deities
  behind Christian saints, folk theodicy
level: FOLK
module: folk-011
objectives:
- Критично аналізувати двовір'я як складну синкретичну систему, а не «помилку» чи «мудрість»
- Розуміти механізм функціональної заміни — як язичницькі боги стали християнськими святими
- Працювати з етіологічними легендами як з джерелом народної теодіцеї
- Порівнювати український синкретизм із аналогічними явищами в інших культурах
