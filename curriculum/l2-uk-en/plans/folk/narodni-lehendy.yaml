slug: narodni-lehendy
version: '2.0'
title: 'Народні легенди: Народне християнство'
subtitle: 'Folk Legends: Popular Christianity'
focus: Apocryphal legends, syncretic worldview, folk explanations of the world
phase: FOLK.2
word_target: 5000
content_outline:
- section: Вступ
  points:
  - Legends as folk genre — between myth and history
  - Distinction from казка — legends claim truth
  words: 750
- section: Апокрифічні легенди
  points:
  - Non-canonical stories about Christ, saints, creation
  - Folk reinterpretation of biblical narratives
  words: 900
- section: Етіологічні легенди
  points:
  - Why-stories — origin of animals, plants, geographic features
  - Folk science encoded in narrative
  words: 850
- section: Синкретичний світогляд
  points:
  - Christian saints replacing pagan deities — Іл'ля/Перун, Параскева/Мокоша
  - двовір'я (dual faith) as cultural phenomenon
  words: 850
- section: Текстовий аналіз
  points:
  - Close reading of selected legends with glosses
  - Narrative voice — authority, didacticism, wonder
  words: 850
- section: Підсумок
  points:
  - Legends as evidence of folk worldview
  - Vocabulary table
  words: 800
