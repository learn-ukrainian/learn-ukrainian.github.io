objectives:
- Критично аналізувати конкурентні інтерпретації образу русалки — від романтичної ідеалізації до етнографічного аналізу
- Працювати з текстом русальної пісні, визначаючи ритуальну функцію та символічний код
- Розуміти концепцію лімінальності як ключ до народної демонології
- Порівнювати фольклорний та літературний образи русалки, визначаючи трансформації
