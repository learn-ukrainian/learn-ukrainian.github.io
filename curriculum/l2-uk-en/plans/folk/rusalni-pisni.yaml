slug: rusalni-pisni
version: '4.0'
title: 'Русальні пісні: Троїцький цикл та духи природи'
subtitle: 'Rusalka Songs: Green Holidays and Nature Spirits'
focus: Rusalka as liminal being between worlds, ambivalent nature spirit, ritual function of rusalka week, folk demonology vs literary romanticism
phase: FOLK.1
word_target: 5000
pedagogy: CBI
content_outline:
- section: Розминка
  points:
  - 'Загадка з русальної пісні: «Ой що росте без кореня, / А що біжить без повода, / А що цвіте без цвіту?» — студент спробує відгадати'
  - 'Провокація: Якщо не вгадаєш — русалка тебе залоскоче. Чому народна уява пов''язує загадки зі смертю?'
  words: 400
- section: 'Конфліктна карта: Русалка — дух природи чи нежить?'
  points:
  - 'Дебат 1: Романтична версія (від Костомарова до Гоголя) — русалка як прекрасна трагічна дівчина, утоплениця, жертва. Літературний образ, що став «народним»'
  - 'Дебат 2: Етнографічна версія — русалка як аграрний дух родючості, пов''язаний з житом, а не з водою. «Там, де вони пробіжать, жито буде рости густішим»'
  - '[!epistemic-humility] Русалка — НЕ однозначний образ. Регіональні варіації: лісова vs водяна, добра vs зла. Будь-яка одна інтерпретація = спрощення'
  - 'Глобальна синхронність: грецькі наяди, японські кіцуне біля води, ірландські шілі — духи води як архетип на перетині культур'
  words: 800
- section: 'Читання: Русальний тиждень — табу та обряди'
  points:
  - 'Троїцький цикл і Зелені свята — час, коли межа між світами стає тонкою (Попович)'
  - 'Табу русального тижня: не плавати, не прати, не прясти — чому саме ці заборони? Все пов''язане з водою та ниткою (долею)'
  - 'Проводи русалок — ритуальне вигнання духів назад у їхній світ. Не ворожість, а порядок: кожен має бути на своєму місці'
  - 'Первинне джерело: фрагмент русальної пісні «У ржі на межі» — русалка просить у дівчат сорочку. Ритуальний дар чи пастка?'
  words: 1000
- section: 'Аналіз: Лімінальна істота між світами'
  points:
  - 'Русалка як порогова (лімінальна) істота — між живими і мертвими, між водою і землею, між «своїм» і «чужим» (Попович)'
  - 'Двоїста природа: життєдайна (родючість полів) та смертоносна (залоскотує до смерті). Чому одна істота поєднує обидва полюси?'
  - '[!decolonization] Українська русалка — НЕ «русская русалка». Російська традиція звузила образ до еротичної утоплениці. Українська — складніший аграрно-демонологічний комплекс'
  - '[!myth-buster] «Ой біжить, біжить мала дівчина» — русалка загадує загадки. Це НЕ «казкова красуня» — це істота з потойбіччя, що випробовує живих'
  words: 1000
- section: 'Дискусія: Від демонології до літератури'
  points:
  - 'Повернення до розминки: тепер студент розуміє, чому загадка = випробування на межі життя і смерті'
  - 'Русалка в літературі: Гоголь («Майська ніч»), Шевченко («Русалка»), Леся Українка («Лісова пісня»). Який образ вони взяли з фольклору — і що додали від себе?'
  - '[!anti-hagiography] Не ідеалізувати народні вірування. Русальні обряди супроводжувались реальним страхом. Жінки, визнані «русалками» громадою, могли зазнати насильства'
  words: 400
- section: Підсумок
  points:
  - Студент формулює власне розуміння русалки як культурного феномену
  - 'Ключова теза: русалка — не «красива казка», а складна система уявлень про межу між людським і природним світами'
  words: 400
vocabulary_hints:
- word: русалка
  pos: ж.
  definition: міфічна істота, дух природи у фольклорі — водночас пов'язана з родючістю полів і з потойбіччям
- word: лімінальний
  pos: прикм.
  definition: пороговий, такий що існує на межі двох станів або світів
- word: демонологія
  pos: ж.
  definition: система народних уявлень про надприродних істот — духів, чортів, русалок, відьом
- word: анімізм
  pos: ч.
  definition: віра в одухотвореність природи — рослин, тварин, стихій
- word: троїцький
  pos: прикм.
  definition: пов'язаний зі святом Трійці та відповідним обрядовим циклом
- word: табу
  pos: с.
  definition: заборона, що має сакральний або магічний характер
- word: залоскотати
  pos: дієсл.
  definition: специфічний спосіб вбивства русалками — лоскочучи жертву до смерті
- word: потойбіччя
  pos: с.
  definition: інший світ, світ мертвих — простір, звідки приходять русалки
- word: синкретизм
  pos: ч.
  definition: поєднання різних релігійних та культурних традицій в одній системі
- word: оберіг
  pos: ч.
  definition: магічний предмет або дія для захисту від злих сил
activity_hints:
- type: quiz
  focus: Розуміння конфліктної карти
  description: 'Атрибуція позицій: яка теза — романтична, етнографічна, літературна? Студент визначає джерело інтерпретації за описом русалки.'
  items: 4
- type: fill-in
  focus: Демонологічна та ритуальна лексика
  description: 'Терміни з тексту: лімінальний, анімізм, табу, потойбіччя, синкретизм — вставити у речення з модуля'
  items: 5
- type: note
  focus: 'Джерельний аналіз: русальна пісня та літературний текст'
  description: 'Подано два тексти: (1) фольклорна русальна пісня «У ржі на межі», (2) фрагмент «Лісової пісні» Лесі Українки. Порівняйте: як змінюється образ русалки від фольклору до літератури? Що втрачається, що додається?'
- type: note
  focus: 'Есе: Чому ми все ще боїмося води?'
  description: 'Сучасні табу щодо купання в певні дні зберігаються в деяких регіонах України. Чи є це «забобон» — чи культурна пам''ять, що має свою логіку? Аргументуйте (400-600 слів).'
