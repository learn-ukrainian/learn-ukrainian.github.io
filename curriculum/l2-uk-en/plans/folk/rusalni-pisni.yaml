content_outline:
- points:
  - 'Загадка з русальної пісні: «Ой що росте без кореня, / А що біжить без повода, / А що цвіте без цвіту?» — студент спробує
    відгадати'
  - 'Провокація: Якщо не вгадаєш — русалка тебе залоскоче. Чому народна уява пов''язує загадки зі смертю?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Романтична версія (від Костомарова до Гоголя) — русалка як прекрасна трагічна дівчина, утоплениця, жертва. Літературний
    образ, що став «народним»'
  - 'Дебат 2: Етнографічна версія — русалка як аграрний дух родючості, пов''язаний з житом, а не з водою. «Там, де вони пробіжать,
    жито буде рости густішим»'
  - '[!epistemic-humility] Русалка — НЕ однозначний образ. Регіональні варіації: лісова vs водяна, добра vs зла. Будь-яка
    одна інтерпретація = спрощення'
  - 'Глобальна синхронність: грецькі наяди, японські кіцуне біля води, ірландські шілі — духи води як архетип на перетині
    культур'
  section: 'Конфліктна карта: Русалка — дух природи чи нежить?'
  words: 1100
- points:
  - Троїцький цикл і Зелені свята — час, коли межа між світами стає тонкою (Попович)
  - 'Табу русального тижня: не плавати, не прати, не прясти — чому саме ці заборони? Все пов''язане з водою та ниткою (долею)'
  - 'Проводи русалок — ритуальне вигнання духів назад у їхній світ. Не ворожість, а порядок: кожен має бути на своєму місці'
  - 'Первинне джерело: фрагмент русальної пісні «У ржі на межі» — русалка просить у дівчат сорочку. Ритуальний дар чи пастка?'
  section: 'Читання: Русальний тиждень — табу та обряди'
  words: 1300
- points:
  - Русалка як порогова (лімінальна) істота — між живими і мертвими, між водою і землею, між «своїм» і «чужим» (Попович)
  - 'Двоїста природа: життєдайна (родючість полів) та смертоносна (залоскотує до смерті). Чому одна істота поєднує обидва
    полюси?'
  - '[!decolonization] Українська русалка — НЕ «русская русалка». Російська традиція звузила образ до еротичної утоплениці.
    Українська — складніший аграрно-демонологічний комплекс'
  - '[!myth-buster] «Ой біжить, біжить мала дівчина» — русалка загадує загадки. Це НЕ «казкова красуня» — це істота з потойбіччя,
    що випробовує живих'
  section: 'Аналіз: Лімінальна істота між світами'
  words: 1300
- points:
  - 'Повернення до розминки: тепер студент розуміє, чому загадка = випробування на межі життя і смерті'
  - 'Русалка в літературі: Гоголь («Майська ніч»), Шевченко («Русалка»), Леся Українка («Лісова пісня»). Який образ вони взяли
    з фольклору — і що додали від себе?'
  - '[!anti-hagiography] Не ідеалізувати народні вірування. Русальні обряди супроводжувались реальним страхом. Жінки, визнані
    «русалками» громадою, могли зазнати насильства'
  section: 'Дискусія: Від демонології до літератури'
  words: 700
- points:
  - Студент формулює власне розуміння русалки як культурного феномену
  - 'Ключова теза: русалка — не «красива казка», а складна система уявлень про межу між людським і природним світами'
  section: Підсумок
  words: 400
