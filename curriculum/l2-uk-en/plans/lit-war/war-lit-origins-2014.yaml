content_outline:
- points:
  - 'Провокація: Чи може текст, написаний у 2014-му про щойно розпочату війну, бути "літературою"? Чи це завжди "свідчення"?
    Де проходить межа між документом і мистецтвом?'
  - 'Уривок з невідомого тексту 2014 року: "Місто пахло металом і тривогою. Ми ще не знали назв зброї, але вже розрізняли
    її звуки". Про що цей текст?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Документалістика проти фікції. Позиція "тільки свідчення мають право на існування" vs позиція "художнє осмислення
    дозволяє глибше зрозуміти травму".'
  - 'Дебат 2: Формування канону. Чому одні тексти 2014 року стали відомими, а інші — ні? Роль літературних інституцій, медіа
    та особистого бренду автора.'
  - '[!epistemic-humility] Не існує єдиної "правильної" відповіді на те, як писати про війну. Кожен автор обирає свою етичну
    та естетичну стратегію.'
  section: 'Конфліктна карта: Свідчення vs. Мистецтво'
  words: 900
- points:
  - Аналіз ключових уривків з прози та поезії, що з''явилися у 2014-2015 роках.
  - 'Стилістика та мова: як автори намагаються знайти нову мову для опису нового досвіду? Фрагментарність, документальність,
    емоційна стриманість чи надмір?'
  - '[!decolonization] Як тексти 2014 року почали руйнувати імперський міф про "братні народи" та "громадянську війну". Утвердження
    української суб''єктності через мову та наратив.'
  section: 'Читання: Перші тексти гібридної війни'
  words: 1700
- points:
  - Як тексти представляють насильство: графічно, метафорично, через замовчування?
  - 'Література свідчення vs. фікція: які етичні зобов''язання має кожен з цих підходів? Чи має право автор на вигадку, говорячи
    про реальні трагедії?'
  - '[!anti-hagiography] Література про війну не повинна глорифікувати насильство. Як автори показують ціну війни, не перетворюючи
    страждання на естетичний об''єкт?'
  - '[!epistemic-humility] Позиція читача: чи текст викликає емпатію, лють, оніміння? Як ми, читачі, несемо відповідальність
    за інтерпретацію цих текстів?'
  section: 'Етика зображення: Насильство, травма, відповідальність'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи є тексти 2014 року літературою? Студенти формулюють власну аргументовану відповідь.'
  - 'Рецепція тоді і зараз: як змінилося наше сприйняття цих перших текстів про війну після досвіду повномасштабного вторгнення?'
  - '[!anti-hagiography] Сучасна релевантність: що ці ранні тексти говорять нам про еволюцію українського суспільства та його
    готовності до тривалої боротьби?'
  - 'Рефлексія: що у вашому розумінні війни та літератури змінилося після цього аналізу?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз текстів, що започаткували канон сучасної української воєнної літератури. Дебати про роль свідчення, етику зображення
  травми та деколоніальну оптику перших творів, написаних після 2014 року.
level: LIT-WAR
module: lit-war-005
objectives:
- Аналізувати ключові тексти першої хвилі воєнної літератури (2014-2015) через призму літературних та етичних дебатів
- Формулювати власну позицію в дискусії "свідчення vs. мистецтво" на матеріалі конкретних творів
- Критично оцінювати етичні стратегії автора у зображенні війни, травми та насильства
- Розрізняти деколоніальні та імперські/радянські наративні рамки в аналізі літератури про війну
