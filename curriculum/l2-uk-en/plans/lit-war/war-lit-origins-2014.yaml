activity_hints:
- description: Перевірка розуміння дебатів "свідчення vs. мистецтво" та "канон vs. медіа". Чия це теза? Який твір є прикладом?
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставити пропущені терміни (метафора, метонімія, оксюморон) в аналітичний коментар до уривку з тексту.
  focus: Аналіз стилістики та мови
  items: 5
  type: fill-in
- description: Проаналізуйте уривок з тексту. Чи автор естетизує війну, чи свідчить про неї? Які художні засоби він використовує
    і з якою метою? Аргументуйте свою позицію (400-600 слів).
  focus: 'Есе-роздум: Етика зображення'
  type: note
- description: На прикладі проаналізованого твору поясніть, як автор працює (або не працює) з деколонізаційною перспективою.
    Які імперські міфи він руйнує? (300-500 слів).
  focus: 'Критичний аналіз: Деколоніальна оптика'
  type: note
