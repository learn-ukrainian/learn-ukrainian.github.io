content_outline:
- points:
  - 'Провокація: Чи можна написати роман про війну, перебуваючи в її епіцентрі? Чи не є будь-яка спроба «олітературити» досвід
    зрадою реальності?'
  - 'Цитата-загадка: «Це тексти про армію, які я писав для себе, щоб не забути, і для вас, щоб ви зрозуміли». Чия це позиція
    — письменника, солдата чи журналіста?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Точка Нуль» — це документалістика чи художня проза? Аргументи «за» (фактографічність, відсутність вигаданого
    сюжету) vs аргументи «проти» (ретельна мовна робота, композиція, авторський погляд).'
  - 'Дебат 2: Автор-учасник — це перевага чи недолік? Перевага (автентичність, глибина) vs недолік (відсутність дистанції,
    ризик суб''єктивізму, неможливість бачити «велику картину»).'
  - '[!epistemic-humility] Критики досі не дійшли згоди, на якій полиці має стояти книга — non-fiction чи fiction. Це розмивання
    меж — одна з ключових рис тексту.'
  section: 'Конфліктна карта: Свідчення чи Література?'
  words: 900
- points:
  - Аналіз ключових уривків: фокус на зображенні побуту, рутини, абсурду армійського життя, а не батальних сцен.
  - 'Стиль Чеха: навмисна безпристрасність, мінімалізм, уникнення патетики та героїзму. Як мова передає стан «замороження»
    та травми?'
  - 'Система персонажів: відсутність класичних «героїв» та «лиходіїв». Кожен — це людина у екстремальних обставинах. Як це
    працює?'
  - '[!decolonization] «Точка Нуль» як антитеза до радянської та російської воєнної прози з її культом героїзму, жертовності
    та «великої перемоги». Це текст про маленьку людину та її гідність, а не про імперську велич.'
  section: 'Читання: «Точка Нуль» як антропологічне дослідження'
  words: 1700
- points:
  - Як Чех пише про смерть і тілесність? Аналіз сцен поранень та загибелі. Уникнення натуралізму заради натуралізму.
  - 'Дилема свідка: чи має автор право мовчати про щось? Або, навпаки, чи все можна показувати? Де межа між свідченням і травмуванням
    читача?'
  - 'Позиція читача: текст не викликає адреналінового захоплення війною, а радше відчуття глибокої втоми, емпатії та розуміння
    ціни, яку платить людина.'
  - '[!anti-hagiography] Автор не ідеалізує ані себе, ані своїх побратимів. Він показує страх, роздратування, слабкості —
    це робить його свідчення чесним.'
  section: 'Етика зображення: Насилля без естетизації'
  words: 1200
- points:
  - Повернення до розминки: тож, чи можливо написати про війну зсередини? Як «Точка Нуль» відповідає на це питання?
  - 'Рецепція: як змінилося сприйняття книги після повномасштабного вторгнення 2022 року? Чи стала вона ще більш актуальною,
    чи, навпаки, сприймається як документ «минулої» війни?'
  - 'Місце у каноні: «Точка Нуль» поруч із творами Жадана, Солонар, інших авторів-ветеранів. Що робить текст Чеха унікальним?'
  - '[!anti-hagiography] Підсумок: головний внесок Чеха — деромантизація та дегероїзація війни, повернення її людського виміру.'
  section: Дискусія та підсумок
  words: 800
focus: «Точка Нуль» Артема Чеха як феномен сучасної воєнної літератури, етика свідчення, мова травми та антропологія фронту.
level: LIT-WAR
module: lit-war-008
objectives:
- Аналізувати унікальний стиль Артема Чеха, що поєднує риси репортажу, есеїстики та художньої прози.
- Критично оцінювати етичні виклики зображення війни, розрізняючи між свідченням та естетизацією насилля.
- Формулювати аргументовану позицію в дебатах про роль автора-учасника та жанрову природу сучасної воєнної літератури.
- Розпізнавати та аналізувати деколонізаційні аспекти у тексті, що протиставляють український досвід імперським наративам
  про війну.
