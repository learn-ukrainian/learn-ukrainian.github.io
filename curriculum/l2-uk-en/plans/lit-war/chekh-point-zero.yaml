activity_hints:
- description: Розрізнити аргументи на користь «Точки Нуль» як документалістики та як художньої прози. Чия це теза?
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити у речення терміни з модуля: естетизація, автентичність, патетика, суб''єктність, свідчення.'
  focus: Ключова термінологія
  items: 5
  type: fill-in
- description: 'Подано два уривки: один з «Точки Нуль», інший — з класичного радянського роману про війну. Порівняйте мову,
    тон, фокус. Якими засобами автори досягають протилежного ефекту?'
  focus: Стилістичний аналіз
  type: note
- description: 'Напишіть коротке есе (400-600 слів) на тему: «Як змінилося моє сприйняття «Точки Нуль» (або як воно могло
    б змінитися), читаючи текст до і після 24 лютого 2022 року?».'
  focus: 'Есе: Рецепція тексту в часі'
  type: note
cefr_min: C1
connects_to:
