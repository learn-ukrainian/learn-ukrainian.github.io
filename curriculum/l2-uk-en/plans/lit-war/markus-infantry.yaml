content_outline:
- points:
  - 'Провокація: Чи може солдат бути письменником? І чи може письменник бути солдатом? Де межа між автором, персонажем та
    публічною особою на прикладі Валерія Маркуса?'
  - Цитата без контексту з твору "Сліди на дорозі", що ілюструє жорстокість або, навпаки, людяність на війні.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Сліди на дорозі» — це документалістика чи художня проза? Мемуари солдата vs. літературний наратив, що використовує
    реальний досвід.'
  - '[!epistemic-humility] Дебат 2: Чи є «солдатська проза» тимчасовим феноменом воєнного часу, чи це новий етап у каноні
    української літератури?'
  - 'Позиція критиків: одні вважають це автентичним голосом покоління, інші — популярною, але не "великою" літературою.'
  section: 'Конфліктна карта: Документ vs. Література'
  words: 900
- points:
  - 'Аналіз ключових епізодів: бій, побут, стосунки з побратимами. Як структура тексту відображає хаотичність воєнного досвіду?'
  - 'Стилістика та мова автора: використання військового сленгу, ненормативної лексики, лаконічність та прямота висловлювання.'
  - '[!decolonization] Українська суб''єктність у тексті: як Маркус створює образ сучасного українського воїна, вільного від
    імперських та радянських наративів про "спільного ворога" чи "братні народи".'
  - 'Наративна перспектива: розповідь від першої особи як інструмент створення ефекту присутності та максимальної довіри читача.'
  section: 'Читання: "Сліди на дорозі"'
  words: 1800
- points:
  - Як Маркус зображує насильство, смерть і травму? Чи є ризик естетизації війни в його прозі?
  - '[!anti-hagiography] Образ солдата: героїзація vs. дегуманізація. Чи є в тексті місце для страху, сумнівів, втоми, моральних
    дилем?'
  - 'Свідок vs. автор: які етичні зобов''язання накладає бойовий досвід на письменника? Чи має він право на художній вимисел?'
  - '[!epistemic-humility] Позиція читача: текст викликає емпатію, шок, патріотичне піднесення, чи відчуття безвиході? Як
    читач стає співучасником досвіду?'
  section: 'Етика зображення: Реальність бою'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи може солдат бути письменником? Формулювання власної відповіді студентом на основі аналізу.'
  - 'Рецепція твору: феномен популярності Маркуса. Як соціальні мережі та публічна діяльність автора вплинули на сприйняття
    його текстів?'
  - 'Спадщина: яке місце "Слідів на дорозі" в українській літературі про війну? Порівняння з творами інших авторів-ветеранів.'
  - 'Сучасне значення: що проза Маркуса говорить про українське суспільство та його трансформацію під час війни?'
  section: Дискусія та підсумок
  words: 700
focus: Valerii Markus (Markus Infantry), soldier-author phenomenon, "Сліди на дорозі", documentary prose vs. fiction, ethics
  of representing combat, decolonizing the soldier's narrative
level: LIT-WAR
module: lit-war-012
objectives:
- Аналізувати твір «Сліди на дорозі» в контексті дебату між документалістикою та художньою прозою
- Оцінювати етичні аспекти зображення війни, насильства та травми в літературі
- Розпізнавати та аналізувати елементи деколонізаційного наративу в сучасній українській "солдатській прозі"
- Формулювати власну аргументовану позицію щодо місця творчості авторів-ветеранів в українському літературному каноні
