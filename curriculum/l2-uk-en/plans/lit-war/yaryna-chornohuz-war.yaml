content_outline:
- points:
  - 'Провокація: Уривок з вірша Ярини Чорногуз без коментарів.'
  - 'Питання до роздумів: Чи може поет бути солдатом? Чи може солдат бути поетом? Де проходить межа між свідченням і творчістю?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Естетизація болю vs. документація травми. Чи має право поетична мова на "красу", коли говорить про жах? Чи її
    завдання — лише фіксувати?'
  - 'Дебат 2: Канонізація в реальному часі. Як статус комбатанта впливає на сприйняття тексту? Чи не заважає біографія бачити
    літературу?'
  - '[!epistemic-humility] Критика воєнної літератури часто вагається між етикою (повага до досвіду) та естетикою (оцінка
    форми). Єдиної правильної оптики не існує.'
  section: 'Конфліктна карта: Свідок проти Поета'
  words: 900
- points:
  - Розширені уривки з ключових поезій, що репрезентують еволюцію стилю авторки.
  - 'Аналіз наративної оптики: хто говорить у цих віршах? Це голос індивідуальний, колективний, чи "голос із нуля"?'
  - 'Стилістика та мова: фрагментованість, рубаний ритм, відсутність розділових знаків як спосіб передачі стану на межі.'
  - '[!decolonization] Як поезія Чорногуз повертає українському тілу та землі суб''єктність, відвойовуючи їх у імперського
    наративу про "неіснування".'
  section: 'Читання: Поезії з циклу "[dasein]'' та інші'
  words: 1700
- points:
  - Як текст представляє насильство, поранення та смерть? Графічно, метафорично, через замовчування?
  - '[!anti-hagiography] Поезія Чорногуз послідовно уникає пафосу та глорифікації. Війна тут — це брудна, виснажлива робота,
    а не подвиг. Як це досягається на рівні тексту?'
  - 'Позиція читача: чи текст створює емпатію, чи відштовхує своєю відвертістю? Які етичні зобов''язання виникають у читача
    такої поезії?'
  - 'Тілесність у війні: деконструкція міфу про "безтілесного" героя. Тіло, що страждає, втомлюється, болить — центральний
    образ.'
  section: 'Етика зображення: Деконструкція "героїчного"'
  words: 1200
- points:
  - 'Повернення до розминки: Чи змінилася ваша відповідь на питання про поета-солдата після аналізу текстів?'
  - 'Рецепція та критика: як творчість Чорногуз сприймається в Україні та за кордоном? Які ключові точки напруги в критичних
    відгуках?'
  - 'Сучасне значення: що ця поезія говорить про сучасну Україну та про майбутнє української літератури, народженої з війни?'
  - 'Рефлексія: Який образ, рядок чи ідея з поезії Ярини Чорногуз залишилися з вами і чому?'
  section: Дискусія та підсумок
  words: 700
focus: Воєнна поезія, література свідчень, травма, жіночий досвід у війні, деколонізація тіла, поетика межі
