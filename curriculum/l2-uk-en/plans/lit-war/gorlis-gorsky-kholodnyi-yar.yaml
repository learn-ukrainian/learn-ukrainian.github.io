content_outline:
- points:
  - 'Провокація: "Холодний Яр" — це історичне свідчення, сповідь учасника подій чи талановито написаний пропагандистський
    міф?'
  - 'Цитата без контексту: "І я, юнак, що мріяв про створення нових, вільних форм життя <...>, я мусів узяти до рук закривавлену
    зброю і стати в обороні того, що мені було найдорожче". Як ця цитата визначає головний конфлікт для оповідача?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Холодний Яр" як історичний документ vs. як літературний твір. Аргументи "за": автор — учасник подій, точність
    у деталях. Аргументи "проти": елементи сюжетної побудови, психологізація, створення героїчних архетипів.'
  - 'Дебат 2: Канонізація тексту. Чому твір, заборонений в СРСР, став культовим в еміграції та обов''язковим для патріотичного
    виховання після 1991 року?'
  - '[!epistemic-humility] Різні прочитання в різні епохи: від критики сучасників (Сергій Єфремов) до беззастережного захоплення
    сьогодні. Що це говорить про текст і про нас?'
  section: 'Конфліктна карта: Документ проти Роману'
  words: 900
- points:
  - 'Уривок з тексту: сцена бою або епізод, що розкриває жорстокість "отаманщини" (наприклад, суд і страта).'
  - 'Аналіз наратора: як автор конструює свій образ — інтелігента, що змушений стати воїном? Де межа між автором, оповідачем
    і героєм?'
  - 'Система персонажів: отамани (Василь Чучупака, Чорний Ворон) як уособлення різних аспектів повстанського руху. Вороги:
    чекісти, "московські комісари" — їх дегуманізація в тексті.'
  - '[!decolonization] Текст як антиколоніальний маніфест: боротьба в Холодному Яру — не "громадянська війна", а війна за
    незалежність проти російської окупації.'
  section: 'Читання: Холодний Яр'
  words: 1700
- points:
  - 'Репрезентація насильства: чи є в тексті естетизація жорстокості? Як автор виправдовує "червоний терор у відповідь"?'
  - 'Свідок vs. Пропагандист: які етичні зобов''язання автора-учасника? Чи показує Горліс-Горський "незручну" правду про своїх
    побратимів?'
  - '[!anti-hagiography] Деромантизація героя: постать самого Горліс-Горського (Юрія Городянина-Лісовського) є суперечливою.
    Його подальша доля та звинувачення у співпраці з німцями. Як це впливає на прочитання тексту?'
  - 'Читацька позиція: текст викликає емпатію, лють, бажання помсти. Як працювати з цими емоціями критично?'
  section: 'Етика зображення: Насильство як метод і реальність'
  words: 1200
- points:
  - 'Повернення до розминки: Документ, міф чи щось третє? Студент має сформулювати власну, аргументовану відповідь.'
  - 'Історія рецепції: від самвидаву до бестселера. Роль "Холодного Яру" під час Помаранчевої революції, Революції Гідності
    та сучасної війни.'
  - 'Зв''язок із сьогоденням: чому книга, написана століття тому, знову стала актуальною? Які паралелі можна провести між
    холодноярськими повстанцями і сучасними українськими військовими?'
  section: Дискусія та підсумок
  words: 700
focus: '"Холодний Яр", жанрова природа (мемуари, роман, документ), етика зображення повстанської боротьби, деколоніальне прочитання,
  постать автора'
