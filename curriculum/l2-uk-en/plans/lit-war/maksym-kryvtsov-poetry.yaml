objectives:
- Аналізувати поезію Максима Кривцова в контексті новітньої української воєнної літератури
- Застосовувати інструменти літературного аналізу до текстів, що описують травматичний досвід
- Формулювати власну позицію в дебатах щодо етики зображення війни та проблеми канонізації
- Досліджувати, як текст поета-воїна формує сучасну національну ідентичність та пам'ять
