content_outline:
- points:
  - 'Провокація: "Коли ти мертвий, тобі не треба дозвіл писати про війну". Цитата з Максима Кривцова. Як ми читаємо текст,
    знаючи, що автора вже немає?'
  - 'Питання для роздумів: чи може поезія бути зброєю? І якщо так, то як вона "стріляє"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Поезія Кривцова — це перш за все документальне свідчення учасника подій чи самостійний мистецький акт, що має
    оцінюватися за естетичними критеріями?'
  - 'Дебат 2: Проблема канонізації. Як трагічна загибель поета впливає на його місце в літературному каноні? Чи можлива критика
    його текстів без звинувачень у неповазі до героя?'
  - '[!epistemic-humility] Немає "правильної" відповіді. Літературознавці сперечаються, чи варто відділяти біографію автора
    від його творчості, особливо у випадку поета-воїна.'
  - 'Українська суб''єктність: Творчість Кривцова як приклад голосу, що говорить про себе і за себе, відкидаючи зовнішні інтерпретації
    війни.'
  section: 'Конфліктна карта: Свідчення vs. Мистецтво'
  words: 900
- points:
  - Аналіз ключових творів зі збірки "Вірші з бійниці". Розбір поезій "Він переїхав", "Жовтий скотч", "Вони ходять по колу".
  - 'Наративна структура: фрагментарність, потік свідомості, різкі переходи від побутового до екзистенційного.'
  - 'Стилістика та мова: використання розмовної лексики, чорного гумору, сюрреалістичних образів для зображення воєнної реальності.'
  - '[!decolonization] Тексти Кривцова як руйнування імперського міфу про "братні народи". Показ екзистенційної та культурної
    прірви між Україною та агресором.'
  section: 'Читання: Вірші з бійниці'
  words: 1800
- points:
  - Як Кривцов зображує насильство, страждання та смерть? Аналіз на прикладі конкретних віршів.
  - 'Свідок vs. Митець: текст як терапія, як свідчення для суду, і як естетичний об''єкт. Як ці ролі конфліктують і поєднуються?'
  - '[!anti-hagiography] Поезія Кривцова не героїзує війну. Вона показує її втому, абсурдність, бруд і водночас — моменти
    людяності та краси, що пробиваються крізь них.'
  - 'Позиція читача: чи викликають ці тексти емпатію, шок, звикання до жаху? Як автор керує нашими емоціями?'
  section: 'Етика зображення: Смерть у присутності краси'
  words: 1200
- points:
  - 'Повернення до розминки: чи стала поезія Кривцова зброєю? Якщо так, то проти кого чи проти чого вона спрямована?'
  - 'Спадщина: як творчість і життя Максима Кривцова впливають на сучасну українську ідентичність та культуру пам''яті про
    війну.'
  - '[!anti-hagiography] Важливо пам''ятати, що за іконою героя стоїть жива людина зі своїми слабкостями, гумором, любов''ю.
    Тексти дозволяють нам побачити цю людину.'
  - 'Рефлексія: Що для вас змінилося у сприйнятті поезії про війну після знайомства з творчістю Максима Кривцова?'
  section: Дискусія та підсумок
  words: 700
