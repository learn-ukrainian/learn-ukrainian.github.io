activity_hints:
- description: Визначте, яка позиція (естетична чи соціологічна) відповідає наведеним тезам про стрілецьку поезію.
  focus: 'Розуміння конфліктної карти: Мистецтво чи пропаганда?'
  items: 4
  type: quiz
- description: 'Вставте в уривки з віршів пропущені слова, що позначають ключові символи: калина, журавлі, криниця, могила
    тощо.'
  focus: Ключові образи та мотиви
  items: 5
  type: fill-in
- description: 'На основі прочитаних текстів напишіть коротке есе (300-400 слів) на тему: "Стрілецька поезія більше прославляє
    війну чи оплакує її жертв?". Наведіть аргументи з текстів.'
  focus: 'Етичний аналіз: Слава чи Трагедія?'
  type: note
- description: Порівняйте "Ой у лузі червона калина" з будь-якою сучасною українською піснею про війну (напр., "Фортеця Бахмут").
    Що спільного та відмінного в образах, настрої, меті цих творів?
  focus: 'Порівняльний аналіз: Стрілецька пісня vs. Сучасна воєнна пісня'
  type: note
