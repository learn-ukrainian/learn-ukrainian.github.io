content_outline:
- points:
  - 'Провокація: Рядки "А ми тую червону калину підіймемо" знає вся Україна. Але чи була це пісня про радісну перемогу, чи
    про гірку втрату? Що насправді стоїть за найвідомішим хітом стрілецтва?'
  - 'Початковий контекст: аналіз лише музики та ритму пісні, без слів, для виявлення емоційного настрою.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є стрілецька поезія автентичним мистецтвом, народженим в окопах, чи це перш за все політичний інструмент
    мобілізації та агітації?'
  - 'Дебат 2: Чому "Червона калина" стала глобальним символом, а інші, не менш популярні в той час стрілецькі пісні (напр.,
    "Бо війна війною"), майже забуті? Дискусія про механізми канонізації.'
  - '[!epistemic-humility] Немає єдиної відповіді. Позиції коливаються від "чистої" естетики до функціональної соціології
    літератури. Важливий сам аналіз аргументів.'
  section: 'Конфліктна карта: Мистецтво чи пропаганда?'
  words: 900
- points:
  - 'Текст 1: "Ой у лузі червона калина" (С. Чарнецький, Г. Трух). Детальний розбір метафори калини, символіки "суму" та "радості",
    трансформація змісту у 2022 році.'
  - 'Текст 2: "Чуєш, брате мій" (Б. Лепкий, Л. Лепкий). Аналіз мотиву прощання, туги за домом, архетипу журавлів.'
  - 'Стилістика та мова: Поєднання народнопісенної традиції (епітети, паралелізми) з модерністськими елементами. Створення
    "нового фольклору".'
  - '[!decolonization] Стрілецька поезія як акт мовного та культурного спротиву Австро-Угорській та Російській імперіям. Ствердження
    української суб''єктності через творення власного пантеону героїв та символів.'
  section: 'Читання: Аналіз ключових текстів'
  words: 1700
- points:
  - Як стрілецька поезія зображує смерть? Героїчна ідеалізація vs реалістична трагедія.
  - Поняття "солодкої смерті" за Батьківщину (pro patria mori). Чи є в цих текстах місце для страху, болю, сумнівів?
  - '[!anti-hagiography] Романтизація війни. Аналіз того, як естетизація конфлікту може затінювати його справжню ціну — людські
    життя та травми. Порівняння з антивоєнною лірикою (напр., Ремарк).'
  - 'Позиція читача: Чи викликають ці тексти емпатію до загиблих, чи лише патріотичне піднесення? Де межа між комеморацією
    та інструменталізацією трагедії?'
  section: 'Етика зображення: Смерть і слава'
  words: 1200
- points:
  - 'Повернення до розминки: Чи змінилося ваше сприйняття "Червоної калини" після детального аналізу її історичного та етичного
    контексту?'
  - 'Рецепція: Як ці пісні сприймалися сучасниками в Галичині, а як — у підросійській Україні? Як змінювалося їхнє значення
    в УРСР, в діаспорі та в незалежній Україні?'
  - 'Сучасна релевантність: Чому стрілецькі пісні знову стали актуальними після 2014 та 2022 років? Які нові сенси вони набули?'
  - 'Студентська рефлексія: Який твір стрілецької поезії найбільше резонує з вами і чому?'
  section: Дискусія та підсумок
  words: 700
focus: The poetry of the Sich Riflemen as a phenomenon of war literature, national identity formation, and the ethics of depicting
  conflict.
level: LIT-WAR
module: lit-war-001
objectives:
- Аналізувати поезію Січових Стрільців як комплексний культурний феномен на перетині мистецтва, політики та історії
- Розрізняти та аргументувати позиції в літературно-критичних дебатах щодо стрілецької лірики (мистецтво vs пропаганда, механізми
  канонізації)
- Проводити етичний аналіз воєнної поезії, оцінюючи ризики естетизації насилля та ідеалізації війни
- Критично осмислювати процес творення та функціонування національних символів та їх реінтерпретацію в сучасному контексті
pedagogy: CBI
persona:
  role: 'Модератор семінару, який ставить незручні питання: за красивими метафорами шукає ідеологію, за патріотизмом — ціну,
    а за героїкою — людську трагедію.'
  voice: Literary-Skeptic
phase: LIT-WAR.1
