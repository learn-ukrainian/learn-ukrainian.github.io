content_outline:
- points:
  - 'Провокація: "Від кларнета твого — пофарбована кров''ю трава". Чи може поезія бути зброєю? І чи не стає вона сама жертвою,
    коли перетворюється на інструмент боротьби?'
  - 'Головоломка: Чому поет, який оспівував "залізну" силу та "імперський" дух, провів усе життя у вигнанні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Степова Еллада" vs. "Бетон і залізо". Маланюк — неокласик, що шукає античну гармонію в українському степу,
    чи жорсткий модерніст, що оспівує індустріальну міць?'
  - 'Дебат 2: "Імператор залізної строфи" — це комплімент чи звинувачення? Критики зліва (соціалісти) бачили в ньому апологета
    "фашизму", праві (націоналісти) — "універсаліста", недостатньо відданого нації.'
  - '[!epistemic-humility] Не існує одного "правильного" Маланюка. Його творчість — це поле битви ідей, де естетика, політика
    та історія нерозривно пов''язані.'
  section: 'Конфліктна карта: Поет-воїн чи поет-естет?'
  words: 900
- points:
  - 'Аналіз ключових творів воєнного періоду: "Під чужим небом", "Стилет чи стилос?", "Балада про кістряві руки".'
  - 'Стилістика та мова: оксиморони (кривавий сонет), мілітарна лексика, алюзії на античну та українську історію.'
  - '[!decolonization] Маланюк як "деколонізатор" історії. Він відкидає російський наратив про "малоросійство" і стверджує
    українську суб''єктність через волю до влади та готовність до боротьби. Україна — не жертва, а воїн.'
  - 'Нарративна структура: переосмислення поразки УНР не як кінця, а як трагічної, але необхідної фази гартування нації.'
  section: 'Читання: Поезія на лезі ножа'
  words: 1700
- points:
  - Як Маланюк зображує насильство? Це натуралізм, символізм чи естетизація? Аналіз образів "крові", "заліза", "вогню".
  - '[!anti-hagiography] Поезія Маланюка — це не пацифізм. Він не засуджує війну як таку, а розглядає її як екзистенційний
    вибір, трагічний інструмент історії. Це робить його творчість незручною для сучасного гуманістичного дискурсу.'
  - 'Позиція автора: Маланюк, колишній офіцер армії УНР, пише не як сторонній спостерігач, а як учасник подій. Як його особистий
    досвід впливає на зображення війни?'
  - '[!epistemic-humility] Чи є межа, за якою поетизація боротьби перетворюється на апологію насильства? Де пролягає ця межа
    у творчості Маланюка?'
  section: 'Етика зображення: Кривава естетика'
  words: 1200
- points:
  - 'Повернення до розминки: Чи може поезія бути зброєю? Відповідь на основі аналізу творчості Маланюка.'
  - 'Рецепція: Як змінювалося сприйняття Маланюка від еміграційного середовища до незалежної України? Чому він став одним
    із стовпів "канону розстріляного відродження", хоча й уникнув фізичної розправи?'
  - 'Сучасне значення: Наскільки актуальними є ідеї Маланюка про "двобій двох рас" (європейської та євразійської) у контексті
    сучасної російсько-української війни?'
  - 'Студентська рефлексія: Чи змінилося ваше ставлення до ролі митця під час війни після аналізу творчості Маланюка?'
  section: Дискусія та підсумок
  words: 700
focus: Воєнна поезія Євгена Маланюка в контексті Другої світової війни, концепція "Степової Еллади", етика зображення війни,
  деколонізаційний погляд на історію.
level: LIT-WAR
module: lit-war-004
objectives:
- Аналізувати воєнну поезію Євгена Маланюка як естетичний та ідеологічний феномен, пов'язаний з досвідом Визвольних змагань.
- Критично оцінювати концепцію "Степової Еллади" та її роль у формуванні деколоніального погляду на українську історію.
- Брати участь у дискусії про етичні межі зображення війни в літературі, використовуючи творчість Маланюка як кейс-стаді.
- Формулювати власну аргументовану позицію щодо актуальності та місця Маланюка в сучасному українському каноні.
