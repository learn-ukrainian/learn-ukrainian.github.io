vocabulary_hints:
- definition: здатність бути активним діячем, а не пасивним об'єктом історії; самостійність у прийнятті рішень.
  pos: ж.
  word: суб'єктність
- definition: спосіб розповіді та інтерпретації подій, що формує певне уявлення про історію чи культуру.
  pos: ч.
  word: наратив
- definition: філософія історії; система поглядів на рушійні сили, сенс та мету історичного процесу.
  pos: ж.
  word: історіософія
- definition: вид кинджала з тонким, гострим клинком; у Маланюка — символ дієвої, безкомпромісної боротьби.
  pos: ч.
  word: стилет
- definition: паличка для письма на воскових табличках; у Маланюка — символ мистецтва, поетичної творчості.
  pos: ч.
  word: стилос
- definition: духовий музичний інструмент; у Павла Тичини — символ гармонії та чистого мистецтва, який Маланюк протиставляє
    своїй "залізній" поезії.
  pos: ч.
  word: кларнет
- definition: вимушений або добровільний переїзд з батьківщини в інші країни з політичних, економічних чи інших причин.
  pos: ж.
  word: еміграція
- definition: філософський напрям, що визнає волю першоосновою всього сущого; у Маланюка — віра в те, що воля нації є вирішальним
    фактором історії.
  pos: ч.
  word: волюнтаризм
