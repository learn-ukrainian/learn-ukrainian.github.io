activity_hints:
- description: Кому належить теза? Розрізнити позиції критиків, що звинувачували Маланюка у "фашизмі" та "недостатньому націоналізмі".
  focus: 'Конфліктна карта: ідеологічні дебати навколо Маланюка'
  items: 4
  type: quiz
- description: 'Вставити в речення ключові слова з модуля: стилет, стилос, суб''єктність, Степова Еллада, волюнтаризм.'
  focus: 'Лексика Маланюка: оксиморони та ключові поняття'
  items: 5
  type: fill-in
- description: Порівняйте два вірші про Україну — "Любіть Україну" В. Сосюри та уривок з "Уривка з поеми" Є. Маланюка. Які
    дві різні візії України вони пропонують? У чому полягає їхній ідеологічний конфлікт? (300-400 слів).
  focus: 'Порівняльний аналіз: Маланюк vs. Сосюра'
  type: note
- description: Чи актуальна сьогодні поезія Маланюка? Аргументуйте свою позицію, посилаючись на конкретні твори та ідеї з
    модуля. Чи потрібна сучасній Україні така "залізна" поезія? (400-600 слів).
  focus: 'Есе: "Імператор залізної строфи" у ХХІ столітті'
  type: note
