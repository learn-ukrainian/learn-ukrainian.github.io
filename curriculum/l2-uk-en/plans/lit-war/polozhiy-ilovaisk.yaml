content_outline:
- points:
  - 'Провокація: Книга «Іловайськ» — це журналістське розслідування, художній роман чи свідчення в суді історії? Чи може один
    текст бути всім одночасно?'
  - 'Цитата: «Війна пахне потом, залізом, кров’ю і гноєм. І ще порохом, який солодкий на смак, якщо з голодухи лизнути язиком
    стінку ящика з-під патронів». Як ця деталь працює на читача?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Документалістика vs. фікція. Положій зібрав понад 100 годин свідчень. Де проходить межа між свідченням реальної
    людини і створенням узагальненого образу? Чи має право автор на художній домисел, працюючи з реальною трагедією?'
  - 'Дебат 2: Естетизація vs. травматичний реалізм. Критики сперечаються: чи не перетворює детальний опис жахіть саму війну
    на «видовище»? Де межа між необхідною деталізацією для свідчення та експлуатацією травми?'
  - '[!epistemic-humility] Немає єдиної відповіді на те, як «правильно» писати про війну. Позиція «лише голі факти» змагається
    з позицією «лише мистецтво може передати глибину трагедії».'
  section: 'Конфліктна карта: Свідок проти письменника'
  words: 900
- points:
  - 'Аналіз ключових епізодів: вихід «зеленим коридором», бої в місті, перебування в полоні. Як автор конструює наратив з
    фрагментарних спогадів?'
  - 'Система персонажів: чи є в романі головний герой? Чи головний герой — це колективне тіло добровольчих батальйонів та
    ЗСУ?'
  - 'Наративна техніка: використання теперішнього часу, пряма мова, потік свідомості. Як ці прийоми створюють «ефект присутності»?'
  - '[!decolonization] Роман фіксує момент остаточного розриву з «братнім народом» і народження нової української політичної
    нації, що готова захищати свою суб''єктність зі зброєю в руках.'
  section: 'Читання: Уривки з роману «Іловайськ»'
  words: 1700
- points:
  - 'Тілесність і біль: Як Положій описує поранення, смерть, фізичні страждання? Аналіз на предмет уникнення експлуатації
    та сенсаційності.'
  - 'Мова ворожнечі vs. дегуманізація: Як у тексті зображені супротивники? Чи зберігається людський вимір, чи відбувається
    повна дегуманізація ворога? Чому це важливо?'
  - 'Відповідальність автора та читача: Яку відповідальність накладає на автора робота з таким матеріалом? Яку відповідальність
    накладає прочитання цього тексту на читача? Чи можна залишитись «нейтральним»?'
  - '[!anti-hagiography] Положій не створює ікони. Його герої — живі люди зі своїми слабкостями, страхами, іноді помилковими
    рішеннями. Це робить їхнє свідчення та їхній подвиг ще більш вагомим.'
  section: 'Етика зображення: Ціна свідчення'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, «Іловайськ» — це роман чи свідчення? Студент формулює власну позицію, спираючись на аналіз.'
  - 'Рецепція твору: Як роман був сприйнятий ветеранською спільнотою? А широким загалом? Чи змінилось його сприйняття після
    повномасштабного вторгнення 2022 року?'
  - 'Місце в каноні: Чи можемо ми вже говорити про «Іловайськ» як про класику сучасної української літератури? Які аргументи
    «за» і «проти»?'
  - 'Зв''язок із сьогоденням: Що цей текст говорить нам про природу війни, людяності та ціну свободи, що є актуальним і сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Yevhen Polozhiy's novel "Ilovaisk" as a key text of the Russo-Ukrainian war literature, exploring the intersection
  of documentary and fiction, the ethics of representing trauma, and its role in forming a decolonized national narrative.
level: LIT-WAR
module: lit-war-014
objectives:
- Аналізувати роман «Іловайськ» як ключовий текст української воєнної літератури, розрізняючи в ньому документальні та фікційні
  елементи.
- Формулювати аргументовану позицію щодо етичних викликів зображення війни в літературі, зокрема проблеми травматичного реалізму
  та естетизації.
- Застосовувати інструменти деколоніальної критики для аналізу тексту, що утверджує українську суб'єктність.
- Критично оцінювати рецепцію твору та його роль у формуванні національної пам'яті про російсько-українську війну.
pedagogy: CBI
persona:
  role: Модератор семінару, що розглядає текст як доказ і як мистецтво, вимагаючи від студентів чітко розрізняти ці два виміри
    та аналізувати етичні наслідки вибору автора.
  voice: Literary-Forensic-Analyst
phase: LIT.WAR
