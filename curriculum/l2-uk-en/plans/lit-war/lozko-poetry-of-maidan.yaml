objectives:
- Аналізувати феномен мережевої поезії на прикладі творчості Lozko в контексті Революції Гідності та війни
- Розрізняти та аргументувати позиції в дебатах про документальну та художню цінність літератури факту
- Критично оцінювати етичні аспекти зображення травми, насилля та смерті у воєнній літературі
- Формулювати власну позицію щодо ролі та сучасного значення поезії, народженої в соціальних мережах
