content_outline:
- points:
  - 'Провокація: Чи може пост у Facebook бути високою поезією? Розглядаємо вірш Lozko, що набрав 10 000 репостів, без імені
    автора.'
  - 'Запитання: Коли вірш перестає бути особистим щоденниковим записом і стає голосом покоління?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Література факту vs. художня література. Чи є поезія Lozko первинним історичним джерелом, чи це естетизований
    досвід?'
  - 'Дебат 2: Канонізація "знизу". Як інтернет-фольклор (меми, репости) перетворює анонімного автора на літературний феномен,
    оминаючи традиційні інституції (видавництва, критики).'
  - '[!epistemic-humility] Немає єдиної відповіді. Позиція залежить від того, що ми цінуємо більше: історичну точність чи
    емоційну правду.'
  section: 'Конфліктна карта: Поезія Майдану — Документ чи Мистецтво?'
  words: 900
- points:
  - 'Аналіз ключових творів Lozko: розбір конкретних текстів про Революцію Гідності та початок війни.'
  - 'Наративна структура: від ейфорії та єднання Майдану до болю, люті та розгубленості перших боїв.'
  - 'Стилістика та мова: використання розмовної лексики, суржику, нецензурної лексики як інструмент досягнення автентичності.'
  - '[!decolonization] Тексти Lozko як акт мовної деколонізації: свідома відмова від "високого" поетичного стилю, що часто
    асоціювався з російською класикою, на користь "живої" мови спротиву.'
  section: 'Читання: Поезія Майдану та перші місяці війни'
  words: 1800
- points:
  - 'Як тексти Lozko репрезентують насилля: прямолінійно, метафорично, чи через замовчування? Аналіз естетики травми.'
  - 'Поет як свідок (witness) vs. поет як комбатант: які етичні зобов''язання накладає кожна з цих ролей?'
  - '[!anti-hagiography] Поезія війни не для естетичної насолоди. Вона показує ціну свободи. Розглядаємо, як Lozko уникає
    пафосу та героїзації, фокусуючись на стражданні та стійкості.'
  - '[!epistemic-humility] Позиція читача: чи породжує ця поезія емпатію, чи веде до емоційного вигорання? Де межа між свідченням
    та експлуатацією трагедії?'
  section: 'Етика зображення: Свідок чи Учасник?'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, пост у Facebook — це література? Студент формулює власну аргументовану позицію.'
  - 'Рецепція та спадщина: як змінилося сприйняття поезії Lozko від 2014 року до сьогодні? Чи витримали ці тексти випробування
    часом?'
  - 'Сучасне значення: що ця поезія говорить нам про українську суб''єктність, про здатність суспільства до самоорганізації
    та спротиву?'
  - 'Рефлексія: що у вашому сприйнятті поезії про війну змінилося після цього аналізу?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз феномену мережевої поезії Майдану та війни на прикладі творчості Lozko. Дебати про її документальну та художню
  цінність, етику зображення травми та процес канонізації.
level: LIT-WAR
