content_outline:
- points:
  - 'Провокація: Чи є "література чину" суто історичним феноменом, чи вона пишеться прямо зараз — на фронті, в окупації, в
    тилу? Що робить текст частиною цього канону — тема, авторська позиція чи вплив на суспільство?'
  - 'Архетип: Образ "сталевої нитки", що зв''язує покоління інтелектуалів опору.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що є первинним для "літератури чину" — стилістична новизна та мовні експерименти чи філософська глибина та чітка
    ідеологічна позиція?'
  - 'Дебат 2: Чи є канон "літератури чину" закритим списком, чи це "живий канон", що постійно переглядається для деконструкції
    імперських наративів? Хто вирішує, що входить до канону?'
  - '[!epistemic-humility] Позиції варіюються від формалістів, що цінують текст "як такий", до постколоніальних критиків,
    для яких головним є політичний ефект.'
  section: 'Конфліктна карта: Канон опору — естетика чи ідеологія?'
  words: 900
- points:
  - 'Діахронний аналіз: Як пізніші автори (шістдесятники, сучасні письменники) ведуть діалог з попередниками (Розстріляне
    відродження, Празька школа).'
  - 'Приклад: Порівняльний аналіз мотивів опору та урбаністичних пейзажів у творах Хвильового, Підмогильного, Стуса та Жадана.'
  - 'Трансформація мови: Від барокових ускладнень до аскетичної точності та до сучасного використання сленгу як маркера реальності.'
  - '[!decolonization] Розгляд текстів як системного процесу деконструкції імперського наративу, а не окремих "винятків".'
  section: 'Читання: Інтертекстуальний діалог — від Хвильового до Жадана'
  words: 1700
- points:
  - 'Філософія ідентичності: Як література конструює образ українського суб''єкта, що діє, а не страждає, навіть в умовах
    екстремального насильства?'
  - 'Література як простір етики: Чи може текст, що естетизує насильство, бути частиною "літератури чину"? Де межа між свідченням
    та експлуатацією травми?'
  - '[!anti-hagiography] Аналіз того, як тексти показують не лише героїзм, але й ціну опору — моральні компроміси, психологічні
    травми, втрати.'
  - '[!epistemic-humility] Дискусія про те, чи має читач право "судити" автора за його етичний вибір у зображенні війни.'
  section: 'Етика зображення: Відповідальність свідка'
  words: 1200
- points:
  - 'Повернення до розминки: Студент формулює власну відповідь на питання про сучасну "літературу чину", використовуючи аргументи
    з модуля.'
  - 'Спадщина: Як канон "літератури чину" впливає на сучасний літературний процес та інтелектуальну безпеку нації?'
  - 'Горизонти майбутнього: Які нові виклики стоять перед українською літературою у світлі поточної війни та як досвід попередників
    може допомогти їх осмислити?'
  - '[!anti-hagiography] Важливість критичної дистанції: канон — це не іконостас, а поле для діалогу та суперечок.'
  section: Дискусія та підсумок
  words: 800
focus: Synthesizing the Ukrainian "literature of action" canon, tracing the evolution of intellectual resistance, decolonial
  thought, and ethical representation across different authors and genres of war literature.
level: LIT-WAR
module: lit-war-021
objectives:
- Синтезувати знання про українську "літературу чину" як цілісне явище, що розвивається в часі
- Застосовувати деколонізаційну та постколоніальну оптику для аналізу взаємозв'язків між авторами та текстами
- Аналізувати етичні дилеми та відповідальність автора при зображенні війни та травматичного досвіду
- Оцінювати тяглість української інтелектуальної традиції та її вплив на сьогодення, формулюючи власну аргументовану позицію
