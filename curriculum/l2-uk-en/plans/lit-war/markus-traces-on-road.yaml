content_outline:
- points:
  - 'Провокативне питання: «Чи може солдат бути письменником? І чи повинен?»'
  - 'Цитата з книги без контексту: «Війна — це робота. Брудна, виснажлива, огидна робота. Тут немає місця для пафосу».'
  - 'Сучасний паралель: порівняння популярності книги з вірусними відео з фронту — що ми шукаємо в цих свідченнях?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Де межа між художньою прозою та документальним свідченням? Чи є «Сліди на дорозі» романом чи розширеним репортажем?'
  - 'Дебат 2: Феномен популярності. Книга стала бестселером до виходу завдяки соцмережам. Це літературна подія чи соціологічний
    кейс?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у Маркусі нового Ремарка, інші — талановитого блогера. Істина,
    як завжди, складніша.'
  - 'Позиція автора: Маркус неодноразово наголошував, що він насамперед солдат, а не письменник. Як це впливає на наше прочитання?'
  section: 'Конфліктна карта: Література чи репортаж?'
  words: 900
- points:
  - 'Уривок 1: Опис бою. Аналіз стилю — короткі, уривчасті речення, відсутність метафор, максимальна фактографічність. Мова
    як інструмент фіксації.'
  - 'Уривок 2: Побут на нулі. Як автор передає атмосферу очікування, втоми та чорного гумору?'
  - '[!decolonization] Текст як акт утвердження української суб''єктності. Солдат ЗСУ — не жертва, а актор, що свідомо захищає
    свою землю від імперського агресора. Його мова — українська, його світ — український.'
  - 'Наративна структура: фрагментарність, відсутність єдиного сюжету, крім самого шляху. Чому автор обирає таку форму?'
  section: 'Читання: Фрагменти зі «Слідів на дорозі»'
  words: 1700
- points:
  - Як текст зображує насильство? Графічно, відсторонено, метафорично? Чи є межа, яку автор не переходить?
  - 'Тіло на війні: біль, поранення, смерть. Аналіз того, як Маркус описує фізичні страждання, уникаючи експлуатації та естетизації.'
  - '[!anti-hagiography] Герої Маркуса — не ідеалізовані «кіборги». Вони бояться, сумніваються, помиляються. Чому показ «негероїчних»
    сторін війни є важливим?'
  - '[!epistemic-humility] Позиція читача: чи дає нам читання цієї книги право «розуміти» війну? Обговорення ризиків хибного
    відчуття причетності.'
  section: 'Етика зображення: Свідок vs Автор'
  words: 1200
- points:
  - 'Повернення до розминки: то чи може солдат бути письменником? Формулювання студентом власної відповіді на основі аналізу.'
  - 'Історія рецепції: книга, що стала явищем. Обговорення публічних дискусій, критики та впливу на інших авторів-ветеранів.'
  - 'Сучасне значення: що «Сліди на дорозі» говорять Україні, яка продовжує боротьбу? Яку функцію виконує така література
    під час війни?'
  - 'Рефлексія студента: що змінилося у вашому сприйнятті воєнної літератури після цього аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз книги Валерія Маркуса «Сліди на дорозі» як феномену сучасної української воєнної літератури. Дебати про межу
  між літературою та репортажем, етика зображення травми та роль автора-солдата.
level: LIT-WAR
module: lit-war-011
objectives:
- Аналізувати книгу «Сліди на дорозі» як феномен сучасної української літератури війни
- Розрізняти та аргументувати позиції в дебатах «література vs репортаж» та «автор vs свідок»
- Оцінювати етичні виклики зображення війни, травми та насильства у художньому тексті
- Застосовувати деколоніальну оптику для аналізу утвердження української суб'єктності у творі
