activity_hints:
- description: На основі цитат визначити, яку позицію вони представляють у дискусії про жанр книги.
  focus: 'Перевірка розуміння дебатів: література vs репортаж'
  items: 4
  type: quiz
- description: Вставити в речення слова та вирази, характерні для стилю Маркуса (професійний сленг, пряма мова).
  focus: Специфіка мови автора
  items: 5
  type: fill-in
- description: Проаналізуйте короткий уривок, де описано сцену з високим емоційним напруженням. Які художні засоби (або їх
    відсутність) використовує автор? Чи вдається йому уникнути експлуатації теми?
  focus: 'Етика зображення: аналіз уривка'
  type: note
- description: 'Напишіть коротке есе (400-600 слів) на тему «Автор-солдат: переваги та ризики». Чому тексти, написані учасниками
    подій, мають особливий статус, і які виклики це створює для літературної критики та читачів?'
  focus: 'Есе: Роль автора-солдата'
  type: note
