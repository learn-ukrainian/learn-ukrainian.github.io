content_outline:
- points:
  - 'Провокація: "Сьогодні я вперше вбила людину. Відчуття дивне." — уривок з реального щоденника. Чи може такий текст бути
    літературою? І чи повинен?'
  - 'Питання до читача: Ви — присяжний. Перед вами два тексти: сухий звіт про бойову операцію та емоційний вірш про неї. Який
    з них є більш правдивим свідченням про війну?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Щоденник" Білозерської — це історичний документ чи літературний твір? Де межа між фактом і його художнім осмисленням?'
  - 'Дебат 2: Місце в каноні. Чи варто включати такі "незручні" тексти в шкільну програму? Ризик травматизації читача vs.
    необхідність свідчення про війну.'
  - '[!epistemic-humility] Позиція 1 (документалісти): цінність тексту в його фактографічності. Позиція 2 (літературознавці):
    цінність у тому, як мова організовує травматичний досвід.'
  section: 'Конфліктна карта: Свідоцтво vs. Література'
  words: 900
- points:
  - 'Голос Білозерської: аналіз стилістики. Сухий, фактографічний, майже без емоцій. Чому цей стиль діє потужніше за патетику?'
  - 'Наративна структура: як щоденникові записи про побут, бої та втрати складаються у єдиний епос про війну.'
  - '[!decolonization] Щоденник як зброя проти імперії. Погляд українського солдата — це суб''єктний погляд, що руйнує російські
    міфи про "громадянську війну".'
  - 'Аналіз ключових епізодів: перший бій, втрата побратима, снайперська "робота", повернення до цивільного життя.'
  section: 'Читання: Уривки з ''Щоденника нелегального солдата'''
  words: 1700
- points:
  - 'Зображення насилля: Білозерська — снайперка. Вона описує свою "роботу". Чи є в її описах естетизація, чи це "чисте" свідчення
    без прикрас?'
  - 'Тіло на війні: поранення, смерть, фізичний дискомфорт. Як авторка уникає експлуатації страждання та зберігає гідність
    людини?'
  - '[!anti-hagiography] "Щоденник" не створює ікону з авторки. Він показує складність етичного вибору солдата та неминучість
    дегуманізації, якої вимагає війна.'
  - Читач як свідок чи співучасник? Як текст позиціонує нас стосовно описаних подій?
  section: 'Етика зображення: Погляд через приціл'
  words: 1200
- points:
  - 'Повернення до розминки: тож, чи може щоденник солдата бути високою літературою? Формулювання власної аргументованої відповіді.'
  - Рецепція щоденника в Україні та за кордоном. Чому на Заході його сприйняли з подивом і навіть шоком?
  - 'Актуальність у 2026 році: як "Щоденник" 2014-2017 років читається в контексті повномасштабного вторгнення? Що змінилося
    у сприйнятті?'
  - 'Студентська рефлексія: що змінилося у вашому розумінні війни та літератури після прочитання та аналізу цього тексту?'
  section: Дискусія та підсумок
  words: 800
focus: Eyewitness war testimony, ethics of representation in soldier diaries, Olena Bilozerska's "Diary of an Illegal Soldier",
  decolonizing the Donbas war narrative
level: LIT.WAR
module: lit-war-015
objectives:
- Аналізувати 'Щоденник нелегального солдата' на перетині літератури, документалістики та етичного свідчення
- Розрізняти поняття 'свідок', 'учасник' та 'автор' у контексті воєнної літератури
- Формулювати власну позицію щодо етичних дилем зображення війни та насильства
- Критично оцінювати роль солдатських щоденників у деколонізації української історії та спротиві російським наративам
