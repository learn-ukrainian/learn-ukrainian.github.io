activity_hints:
- description: Кому належить теза? Розрізнення позицій щодо статусу ліричного героя та місця Жадана в каноні.
  focus: Розуміння літературно-критичних дебатів
  items: 4
  type: quiz
- description: 'Вставити в речення терміни: суб''єктність, рецепція, естетизація, свідоцтво, травма.'
  focus: Ключова термінологія аналізу
  items: 5
  type: fill-in
- description: Наведіть приклад з вірша, де Жадан, на вашу думку, балансує на межі між свідченням та естетизацією. Поясніть
    свій вибір (250-300 слів).
  focus: 'Аналіз: Етика зображення'
  type: note
- description: Порівняйте власне сприйняття збірки "Життя Марії" до та після аналізу в цьому модулі. Які аспекти відкрилися
    для вас по-новому і чому? (400-600 слів).
  focus: 'Есе: Рецепція та сучасне значення'
  type: note
