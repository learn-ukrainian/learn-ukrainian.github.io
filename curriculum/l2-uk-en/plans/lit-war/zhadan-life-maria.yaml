content_outline:
- points:
  - 'Провокативне питання: Чи може поезія існувати на війні? Фрагмент вірша Жадана про зруйноване місто без вказівки автора
    та назви.'
  - 'Сучасна паралель: Пост у соцмережах від військового з передової, що цитує Жадана — як поезія функціонує сьогодні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хто говорить у віршах Жадана — автобіографічний свідок подій чи сконструйований ліричний суб''єкт? Позиції формалістів
    та біографічної критики.'
  - 'Дебат 2: Жадан — «поет Донбасу», «національний поет» чи «європейський постмодерніст»? Дискусія про місце автора в каноні
    та поза ним.'
  - '[!epistemic-humility] Літературна критика не дає остаточних відповідей, а лише пропонує краще аргументовані інтерпретації.'
  section: 'Конфліктна карта: Ліричний герой vs. Свідок'
  words: 900
- points:
  - Розгорнутий аналіз 2-3 ключових віршів зі збірки з коментарем.
  - 'Наративний голос: як він змінюється від вірша до вірша? Відсторонений спостерігач, прямий учасник, рефлексуючий філософ.'
  - 'Структура збірки: Чому саме такий порядок віршів? Як вибудовується загальний наратив?'
  - '[!decolonization] "Життя Марії" як відповідь на російську агресію 2014 року. Формування нової української суб''єктності
    перед лицем війни, руйнування імперських міфів про «братні народи».'
  section: 'Читання: Вибрані вірші зі збірки "Життя Марії"'
  words: 1800
- points:
  - Як Жадан зображує насильство і травму, не скочуючись в експлуатацію страждання?
  - 'Аналіз мови: використання буденної лексики для опису небуденних, жахливих подій. Ефект очуднення.'
  - 'Позиція читача: текст викликає емпатію, лють, чи емоційне оніміння? Як автор керує реакцією читача?'
  - '[!anti-hagiography] Поезія війни не для того, щоб нею захоплюватись. Жадан показує не героїзм, а ціну, яку платять звичайні
    люди. Війна як брудна, виснажлива робота.'
  section: 'Етика зображення: Свідчення vs. Естетизація'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи може поезія існувати на війні? Відповідь студента з опорою на проаналізовані тексти.'
  - 'Історія рецепції: як сприймали "Життя Марії" у 2015 році? Як це сприйняття змінилося після повномасштабного вторгнення
    2022 року?'
  - 'Сучасне значення: Яку роль відіграє ця збірка та творчість Жадана загалом у формуванні образу сучасної України у світі?'
  - '[!anti-hagiography] Уникнення ідеалізації автора. Жадан як жива людина, а не бронзовий пам''ятник.'
  section: Дискусія та підсумок
  words: 700
focus: Поезія Сергія Жадана, збірка "Життя Марії", етика зображення травми, деколонізація літературного канону, історія рецепції
level: LIT-WAR
module: lit-war-010
objectives:
- Аналізувати етичні дилеми зображення війни в поезії на прикладі збірки Сергія Жадана "Життя Марії"
- Розрізняти та аргументувати позиції в літературно-критичних дебатах щодо творчості автора
- Застосовувати інструментарій деколоніальної оптики для аналізу сучасного літературного твору
- Формулювати власну позицію щодо ролі та функції поезії в умовах екзистенційної загрози
