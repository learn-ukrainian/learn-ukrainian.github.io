content_outline:
- points:
  - 'Провокація: Чи може вірш бути зброєю? Уявіть, що ви у криївці, довкола ворог. У вас є папір і олівець. Що ви напишете
    — наказ, лист додому чи сонет?'
  - Фрагмент анонімного повстанського вірша (4-5 рядків) — про що він? Які емоції передає?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Література опору — це в першу чергу функціональний текст (агітка, пропаганда) чи самодостатнє мистецтво? Позиція
    "функціоналістів" vs "естетів".'
  - 'Дебат 2: Канонізація постфактум. Чи можна оцінювати тексти, написані в екстремальних умовах, за тими ж критеріями, що
    й "мирну" літературу? Дискусія про легітимність "повстанського канону".'
  - '[!epistemic-humility] Немає єдиної відповіді. Аналіз залежить від оптики: історичної, літературознавчої, етичної.'
  section: 'Конфліктна карта: Агітка чи мистецтво?'
  words: 900
- points:
  - 'Основний текст: добірка віршів з рукописних збірок УПА (напр., "Пісні і вірші в боротьбі за волю України").'
  - 'Аналіз мотивів: ліс як прихисток і пастка, зброя як товариш, зрада і вірність, туга за домівкою.'
  - 'Стилістика: як поєднується фольклорна традиція (пісенні розміри, символізм) із модерністськими елементами (верлібр, урвані
    образи)?'
  - '[!decolonization] Порівняння з радянською партизанською поезією. Повстанська лірика — це антиколоніальний голос, що бореться
    проти ДВОХ імперій, а не лише однієї.'
  section: 'Читання: Поезія нескорених'
  words: 1700
- points:
  - 'Як тексти виправдовують збройну боротьбу? Образ ворога: він дегуманізований чи має людські риси?'
  - 'Зображення смерті: героїчна жертва, буденність війни, чи трагедія? Аналіз текстів, що описують загибель побратимів.'
  - '[!anti-hagiography] Чи є в текстах рефлексія щодо ціни перемоги? Чи зображується насильство як вимушений, але жахливий
    акт, а не як щось славетне?'
  - 'Позиція читача: чи спонукають ці тексти до емпатії, до ненависті, чи до того й іншого одночасно?'
  section: 'Етика зображення: Право на насильство'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи може вірш бути зброєю? Як саме? Студент формулює відповідь на основі аналізу.'
  - 'Рецепція: як ці тексти сприймалися в діаспорі? Як їхнє відкриття в незалежній Україні змінило наше розуміння Другої світової
    війни?'
  - 'Сучасна релевантність: чи бачимо ми подібні процеси у літературі, що народжується в окопах сьогоднішньої російсько-української
    війни?'
  - '[!anti-hagiography] Важливо пам''ятати, що це література однієї сторони конфлікту. Вона не є об''єктивною хронікою, а
    є свідченням, зброєю та криком.'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of UPA-era underground literature, the tension between propaganda and art, ethics of representing violence,
  and the formation of a resistance canon.
level: LIT-WAR
module: lit-war-001
objectives:
- Розрізняти та аналізувати позиції в літературно-критичних дебатах щодо функціональності та естетики літератури опору
- Проводити детальний аналіз поетичного тексту, написаного в екстремальних умовах, виявляючи ключові мотиви та стилістичні
  риси
- Критично оцінювати етичні дилеми зображення насильства та образу ворога у воєнній літературі
- Формулювати аргументовану позицію щодо місця літератури українського підпілля в національному каноні та її зв'язку з сучасністю
pedagogy: CBI
