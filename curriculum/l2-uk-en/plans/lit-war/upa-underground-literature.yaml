vocabulary_hints:
- definition: військово-оборонна й господарська підземна споруда УПА, що слугувала сховищем для воїнів
  pos: ж.
  word: криївка
- definition: учасник збройного народного повстання; боєць УПА
  pos: ч.
  word: повстанець
- definition: зневажлива назва твору (літературного, музичного), що має на меті не художню цінність, а пряму політичну агітацію
  pos: ж.
  word: агітка
- definition: нелегальне видання та розповсюдження літератури, забороненої в СРСР; у контексті УПА — рукописні збірки
  pos: ч.
  word: самвидав
- definition: літературні твори, створені в умовах іноземної окупації або тоталітарного режиму, що виражають ідеї боротьби
    за свободу
  pos: ж.
  word: література опору
- definition: бойовий товариш, зв''язаний обітницею вірності, що в умовах підпілля була сильнішою за родинні зв''язки
  pos: ч.
  word: побратим
- definition: вірш без рими та регулярного розміру, що часто використовувався для передачі "рваної" свідомості бійця
  pos: ч.
  word: верлібр
- definition: процес включення твору або автора до "канону" — офіційно визнаного списку найважливіших творів національної
    літератури
  pos: ж.
  word: канонізація
- definition: процес зображення ворога як нелюда, позбавленого людських рис, що полегшує застосування насильства щодо нього
  pos: ж.
  word: дегуманізація
- definition: пов''язаний з крайніми, надзвичайними умовами, що загрожують життю
  pos: прикм.
  word: екстремальний
