content_outline:
- points:
  - 'Провокація: "Коли поет бере до рук зброю, чи має він право на метафору?" — питання для роздумів над рядками Babich Poetry.'
  - 'Цитата без контексту: кілька сильних, можливо шокуючих рядків з вірша про бойовий досвід.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є поезія солдата "літературою" в класичному сенсі, чи це "свідчення", що існує за іншими законами? Позиція
    "чистого мистецтва" vs. позиція "літератури факту".'
  - 'Дебат 2: Канонізація "на крові". Чи не є швидке включення творів загиблих героїв до канону спробою заглушити біль втрати,
    замість глибокого критичного аналізу?'
  - '[!epistemic-humility] Немає єдиної відповіді на те, як оцінювати тексти, написані на війні та про війну. Наше завдання
    — навчитися ставити правильні питання.'
  section: 'Конфліктна карта: Поет чи Комбатант?'
  words: 900
- points:
  - 'Детальний розбір кількох знакових віршів Babich Poetry: аналіз образної системи, ритміки, стилістики.'
  - 'Наративна структура: як автор конструює ліричного героя? Чи є він "голосом покоління"?'
  - 'Стилістика та мова автора: використання військового сленгу, ненормативної лексики, створення унікальних неологізмів.'
  - '[!decolonization] Руйнування імперського міфу про "братські народи". Як поезія Грабова утверджує українську суб''єктність
    та право на власну історіографію війни.'
  section: 'Читання: Аналіз ключових поезій'
  words: 1800
- points:
  - 'Як текст представляє насильство: натуралістично, метафорично, через замовчування? Чи є межа, за якою зображення страждань
    стає їх експлуатацією?'
  - 'Тіло на війні: аналіз того, як поезія Грабова працює з темами поранення, болю, смерті, не скочуючись у сентиментальність
    чи порнографію насилля.'
  - 'Позиція читача: текст викликає емпатію, лють, шок чи заціпеніння? Як автор керує емоціями читача?'
  - '[!anti-hagiography] Поезія Babich — це не про героїчні марші. Це про втому, біль, втрати і тиху лють. Аналіз того, як
    автор уникає пафосу та глорифікації війни.'
  section: 'Етика зображення: Свідок чи митець?'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи має поет на війні право на метафору? Студент формулює відповідь, спираючись на проаналізовані
    тексти.'
  - 'Рецепція та спадщина: як творчість Babich Poetry вже вплинула на українську культуру? Аналіз мемів, пісень, цитувань.'
  - 'Сучасне значення: що ці тексти говорять нам про війну, про пам''ять і про те, як жити після Перемоги?'
  - '[!anti-hagiography] Рефлексія: чи не перетворюємо ми поета-героя на ікону, гублячи за цим складну, живу людину та її
    неоднозначні тексти?'
  section: Дискусія та підсумок
  words: 700
focus: Поезія Валерія "Babich" Грабова, література свідчень, етика зображення війни, дилема поета-комбатанта, деколонізація
  наративів про війну
