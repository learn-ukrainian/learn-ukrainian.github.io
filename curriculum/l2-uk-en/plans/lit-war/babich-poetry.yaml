objectives:
- Аналізувати поезію Валерія Грабова як феномен сучасної української "воєнної" літератури
- Застосовувати інструменти деколоніального аналізу для інтерпретації текстів про війну
- Критично оцінювати етичні дилеми зображення насильства, травми та смерті у літературі
- Формулювати власну позицію в літературних дебатах щодо ролі митця-комбатанта та місця його творчості в каноні
