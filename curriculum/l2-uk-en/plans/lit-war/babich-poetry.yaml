activity_hints:
- description: Чия це теза — прихильників "чистого мистецтва" чи "літератури факту"? Визначити позицію за цитатою.
  focus: 'Розуміння конфліктної карти: Поет vs. Комбатант'
  items: 4
  type: quiz
- description: 'Вставити в речення терміни з модуля: свідчення, естетизація, комбатант, суб''єктність, наратив.'
  focus: Ключові терміни воєнної літератури
  items: 5
  type: fill-in
- description: 'Подано два уривки: один з поезії Babich, інший — з твору іншого автора на схожу тему. Порівняйте, як обидва
    автори працюють з темою насилля. Чий підхід ви вважаєте більш етичним і чому?'
  focus: 'Етика зображення: Аналіз уривку'
  type: note
- description: Спираючись на аргументи з "Конфліктної карти" та власний аналіз, напишіть есе (400-600 слів) на тему "Чи потрібен
    українській літературі канон, що народжується на війні?".
  focus: 'Есе: Місце Babich Poetry у каноні української літератури'
  type: essay-response
