content_outline:
- points:
  - 'Провокація: Zernya Daughter Donetsk — це псевдонім. Чому авторка, що пише настільки особисті тексти про війну, приховує
    своє справжнє ім''я? Яку дистанцію це створює між текстом і читачем?'
  - 'Цитата без контексту: уривок, що описує буденну дію (наприклад, приготування кави) на тлі звуків вибухів, щоб показати
    контраст норми та жаху.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є тексти Zernya в першу чергу документом, свідченням (testimony literature), чи художньою прозою? Де проходить
    межа між фактом і фікцією?'
  - 'Дебат 2: Чи можна оцінювати літературу про війну за суто естетичними критеріями, чи етичні (відповідальність перед зображуваним)
    завжди мають пріоритет?'
  - '[!epistemic-humility] Немає єдиної відповіді; критики сперечаються, чи є "література свідчення" окремим жанром зі своїми
    правилами.'
  section: 'Конфліктна карта: Свідчення vs. Література'
  words: 900
- points:
  - 'Аналіз ключових уривків: фокус на тому, як авторка передає досвід через фрагментарність, недомовленість, потік свідомості.'
  - 'Стилістика та мова: використання розмовної лексики, суржику, нецензурної лексики як інструмент автентичності та відтворення
    реальності війни.'
  - '[!decolonization] Як авторка через особисту історію руйнує імперський міф про "один народ" та показує глибину прірви
    між українським та російським світами.'
  - 'Наратив та суб''єктність: аналіз того, як конструюється українська суб''єктність, що чинить опір, страждає, але не здається.'
  section: 'Читання: Анатомія тексту Zernya'
  words: 1700
- points:
  - Як текст представляє насильство та страждання? Чи уникає авторка естетизації болю, чи, навпаки, використовує її для сильнішого
    ефекту?
  - 'Тілесність у прозі: як зображується тіло у стані стресу, болю, виснаження? Чи не стає таке зображення експлуатаційним?'
  - '[!anti-hagiography] Текст не створює ідеалізованих героїв. Він показує звичайних людей у нелюдських обставинах, з їхніми
    слабкостями та силою.'
  - '[!epistemic-humility] Позиція читача: чи викликає текст емпатію, чи призводить до емоційного вигорання та "втоми від
    співчуття"? Чи є "правильна" реакція?'
  section: 'Етика зображення: Травма, тіло, відповідальність'
  words: 1200
- points:
  - 'Повернення до розминки: обговорення ролі псевдоніма після аналізу текстів. Це захист, художній прийом чи щось інше?'
  - 'Рецепція та вплив: як тексти Zernya були сприйняті в Україні та за кордоном? Яку роль вони відіграють у формуванні глобального
    розуміння війни?'
  - '[!anti-hagiography] Спадщина: чи можна вважати ці тексти "літературою на експорт"? Чи не спрощують вони складну реальність
    для іноземного читача?'
  - 'Зв''язок із сучасністю: порівняння з іншими воєнними щоденниками та блогами. Що робить тексти Zernya унікальними?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз прози Zernya Daughter Donetsk як свідчення про війну, дослідження етики зображення травми та деконструкція імперських
  наративів.
level: LIT-WAR
module: lit-war-013
objectives:
- Аналізувати прозу Zernya Daughter Donetsk у контексті сучасної української "літератури свідчення".
- Критично оцінювати етичні виклики, пов'язані із зображенням війни та травми в літературі.
- Застосовувати поняття "суб'єктність", "наратив" та "деколонізація" для аналізу літературних текстів.
- Формулювати власну аргументовану позицію в літературно-критичних дебатах щодо воєнної прози.
