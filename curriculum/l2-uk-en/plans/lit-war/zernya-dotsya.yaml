activity_hints:
- description: На основі цитат визначити, яку позицію в дебаті "свідчення vs. література" вони представляють.
  focus: 'Конфліктна карта: Дебати про літературу свідчення'
  items: 5
  type: quiz
- description: 'Вставити в речення слова: суб''єктність, наратив, деколонізація, автентичність, свідчення.'
  focus: Ключова термінологія модуля
  items: 5
  type: fill-in
- description: Оберіть один уривок з тексту, де зображено насильство або страждання. Проаналізуйте, якими засобами авторка
    досягає ефекту та чи вдається їй уникнути експлуатації теми.
  focus: Аналіз етики зображення
  type: note
- description: Порівняйте, як тема війни та травми розкривається в прозі Zernya Daughter Donetsk та в поезії Сергія Жадана.
    Що спільного та відмінного в їхніх підходах? (400-600 слів).
  focus: 'Есе: Порівняльний аналіз'
  type: note
