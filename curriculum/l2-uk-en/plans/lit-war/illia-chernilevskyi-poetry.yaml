content_outline:
- points:
  - 'Провокація: Ілля Чернілевський до 24 лютого 2022 року був відомий як дитячий письменник. Як творець казок стає літописцем
    найжорстокішої реальності? Чи може автор "втекти" від своєї попередньої ідентичності?'
  - 'Цитата з вірша (без дати і контексту): "тут весна, але весни не буде..." — що може означати цей оксюморон?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є доля Чернілевського та його покоління прямим повторенням долі Розстріляного Відродження 1930-х? Аргументи
    "за" (тяглість геноциду) vs аргументи "проти" (інший історичний контекст, глобальна підтримка України).'
  - 'Дебат 2: Як класифікувати поезію Чернілевського? Це література свідчень (bearing witness), де головне — фіксація травми?
    Чи це нова форма модерністського ліризму, народжена в екстремальних умовах?'
  - '[!epistemic-humility] Критики ще не дійшли згоди. Деякі бачать у ньому документаліста, інші — продовжувача традиції українського
    екзистенціалізму.'
  section: 'Конфліктна карта: Історія, що римується кров''ю'
  words: 900
- points:
  - 'Аналіз ключових поезій зі збірки: розбір центральних образів (втрачена весна, осквернений дім, тіло як поле бою).'
  - 'Наративна голос: як змінюється "я" ліричного героя від передвоєнного до воєнного періоду? Чи є це одна людина?'
  - 'Структура збірки: чи є у послідовності віршів сюжет — від надії до розпачу, від ліризму до хроніки?'
  - '[!decolonization] Поезія Чернілевського як акт утвердження української суб''єктності. Його вибір воювати і писати — це
    свідомий опір стиранню ідентичності, яке є метою російського імперіалізму.'
  section: 'Читання: Поезія несправдженого майбуття'
  words: 1800
- points:
  - Як Чернілевський пише про смерть і насилля? Чи є межа, за якою зображення стає нестерпним для читача? Де пролягає ця межа
    для самого автора?
  - 'Тілесність у військовій поезії: як уникнути експлуатації страждання та об''єктивації тіла? Аналіз на прикладі конкретних
    віршів.'
  - '[!anti-hagiography] Автор — не святий і не мученик, а людина в нелюдських обставинах. Як його поезія уникає пафосу та
    глорифікації війни, показуючи її брудну, механічну роботу?'
  - 'Позиція читача: чи дає нам право поезія "відчути" війну? Чи це небезпечна ілюзія? Яку відповідальність накладає на нас
    читання таких текстів?'
  section: 'Етика зображення: Біль, що не став метафорою'
  words: 1200
- points:
  - 'Повернення до розминки: тож як дитячий письменник стає поетом війни? Студент формулює відповідь на основі аналізу.'
  - 'Рецепція та спадщина: як творчість Чернілевського вже зараз впливає на українську культуру? Чому його вірші стали "народними"?'
  - 'Сучасне значення: що поезія Чернілевського говорить нам про ціну свободи та природу людської стійкості сьогодні?'
  - 'Студентська рефлексія: яке питання, що поставив цей текст, залишилося для вас без відповіді?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз поезії Іллі Чернілевського, поета-воїна, як частини нового покоління "Розстріляного Відродження". Етика зображення
  війни, розрив між ліризмом і травматичним досвідом, деколоніальний вимір опору.
level: LIT-WAR
module: lit-war-025
objectives:
- Аналізувати поезію Іллі Чернілевського в контексті російсько-української війни та історичної тяглості культурних репресій.
- Розрізняти та застосовувати поняття "література свідчень" та "лірична поезія" до текстів воєнного часу.
- Формулювати аргументовану позицію щодо етичних викликів, пов'язаних із зображенням війни в літературі.
- Критично оцінювати зв'язок між сучасним культурним опором та поколінням Розстріляного Відродження.
