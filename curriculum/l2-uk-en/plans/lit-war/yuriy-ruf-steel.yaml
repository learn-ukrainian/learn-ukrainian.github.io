content_outline:
- points:
  - 'Провокативне питання: «Хто не боровся, той не жив». Як цей рядок Юрія Руфа визначає його творчість і долю?'
  - 'Цитата без контексту: коротка, жорстка поезія, що змушує замислитись про ціну свободи.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є поезія Руфа мистецтвом, чи це радше мілітарна інструкція та націоналістичний маніфест? Погляди з позицій
    естетизму та дієвої етики.'
  - 'Дебат 2: Тяглість чи розрив? Як "поезія сталі" співвідноситься з воєнною лірикою УПА, Січових Стрільців та Розстріляного
    Відродження (напр. Маланюк, Теліга).'
  - '[!epistemic-humility] Критики вказують на потенційну одновимірність та ідеологічну заангажованість, тоді як апологети
    бачать у цьому силу та чесність.'
  section: 'Конфліктна карта: ''Література чину'' чи політична агітація?'
  words: 900
- points:
  - 'Текстуальний аналіз ключових віршів: аналіз мови, ритму, образності.'
  - 'Образ ліричного героя: воїн, філософ, будівничий нації. Його еволюція.'
  - 'Структура збірки: як окремі вірші складаються в єдиний наратив про боротьбу та самопожертву.'
  - '[!decolonization] Поезія Руфа як акт деколонізації свідомості: відмова від образу жертви, утвердження української суб''єктності
    через силу та опір.'
  section: 'Читання: Поезія сталі'
  words: 1800
- points:
  - Як текст зображує ворога? Дегуманізація чи необхідне зло? Етичні дилеми війни.
  - 'Насилля в тексті: чи є ризик естетизації жорстокості? Як автор балансує між оспівуванням сили та показом ціни війни?'
  - 'Позиція читача: чи створює текст емпатію, чи мобілізує до дії? Чи можливе критичне читання "літератури чину"?'
  - '[!anti-hagiography] Руф — не ікона, а людина зі своїми переконаннями. Аналіз його публіцистики та ідеологічної позиції
    поза поезією.'
  section: 'Етика зображення: Мілітарна естетика та національна етика'
  words: 1200
- points:
  - 'Повернення до розминки: що означає «жити, борючись» у ХХІ столітті?'
  - 'Рецепція творчості: як сприймали поезію Руфа до і після повномасштабного вторгнення та його загибелі? Як змінився контекст?'
  - 'Спадщина: чи став Юрій Руф символом нового покоління, що поєднує слово і дію? Порівняння з іншими поетами, що загинули
    на війні (напр. Максим Кривцов).'
  - 'Рефлексія для студента: які етичні та естетичні питання ставить перед вами ця поезія?'
  section: Дискусія та підсумок
  words: 700
focus: Yuriy Ruf's "Poetry of Steel", the concept of "literature of action", militaristic aesthetics vs. national ethics,
  and decolonial resistance
level: LIT-WAR
module: lit-war-024
objectives:
- Аналізувати концепт «літератури чину» на прикладі творчості Юрія Руфа, розрізняючи її ідеологічний та естетичний виміри
- Критично оцінювати етичні дилеми зображення війни та насилля в літературі
- Встановлювати тяглість та відмінності між мілітарною поезією ХХ та ХХІ століть
- Формулювати власну аргументовану позицію щодо ролі митця та мистецтва в умовах екзистенційної загрози для нації
