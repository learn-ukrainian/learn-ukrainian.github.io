content_outline:
- points:
  - 'Провокація: Фрагмент з есе Вікторії Амеліної: "Хтось мусить розказувати цю історію, щоб Бог не почувався таким самотнім,
    дивлячись на все це". Якою є ціна цього свідчення для письменника? І чи може слово справді протистояти злочину?'
  - 'Загадка: що спільного між щоденником воєнних злочинів та дитячою книжкою? Відповідь — авторка, що намагається зберегти
    людяність.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Свідок vs Митець. Чи має письменник під час геноциду право на "чисте мистецтво"? Чи його обов''язок — документувати,
    навіть ціною художньої форми?'
  - 'Дебат 2: Миттєва канонізація. Як ми оцінюємо тексти, написані "в моменті" катастрофи? Чи можлива об''єктивна критика,
    коли автор стає мучеником?'
  - '[!epistemic-humility] Немає єдиної відповіді. Деякі критики бачать в Амеліній передусім документалістку (Truth Hounds),
    інші — продовжувачку модерністської прози.'
  section: 'Конфліктна карта: Роль письменника у війні'
  words: 900
- points:
  - Аналіз уривків з щоденника, де Амеліна фіксує свідчення про злочини російської армії.
  - 'Стилістика факту: як авторка використовує мінімалістичну, "прозору" мову для зображення жаху? Відмова від метафор як
    етичний вибір.'
  - 'Наративна рамка: хто є оповідачем? Сама Амеліна, жертви, чи це спільний голос?'
  - '[!decolonization] Текст як доказ у майбутньому трибуналі. Амеліна свідомо пише український досвід в універсальний архів
    злочинів проти людяності, руйнуючи імперський наратив про "внутрішній конфлікт".'
  section: 'Читання: Свідчення з "War and Justice Diary"'
  words: 1700
- points:
  - 'Проблема "травматичного порно": як показати страждання, не перетворюючи його на видовище? Аналіз того, як Амеліна уникає
    цієї пастки.'
  - 'Діалог з жертвами: її тексти — це не монолог письменника, а простір, де звучать голоси тих, хто вижив. Як вона цього
    досягає?'
  - 'Мовчання як прийом: що Амеліна вирішує не показувати? Яку роль відіграють пропуски та недомовки у її текстах про війну?'
  - '[!anti-hagiography] Амеліна сама рефлексувала над етичними ризиками своєї роботи. Це не розповідь про святу, а про людину,
    що робить складний моральний вибір у неможливих обставинах.'
  section: 'Етика зображення: Межа між свідченням та експлуатацією'
  words: 1200
- points:
  - 'Повернення до розминки: то якою є ціна свідчення? Формулювання відповіді на основі аналізу текстів Амеліної.'
  - 'Спадщина: термін "Нове Розстріляне Відродження", введений Амеліною. Що він означає? Кого він включає? Як він змінює наше
    розуміння історії української культури?'
  - 'Сучасне значення: як творчість та діяльність Амеліної впливають на сучасних українських митців та інтелектуалів?'
  - 'Студентська рефлексія: чи змінилося ваше уявлення про роль літератури під час війни після цього модуля?'
  section: Дискусія та підсумок
  words: 800
focus: Victoria Amelina's role as a witness and chronicler of the "New Executed Renaissance", the ethics of documenting war
  crimes, and her place in the decolonial literary canon.
level: LIT.WAR
module: lit-war-020
objectives:
- Аналізувати етичні дилеми документування воєнних злочинів у літературі на прикладі творчості Вікторії Амеліної
- Критично оцінювати роль письменника як свідка геноциду та хроніста 'Нового Розстріляного Відродження'
- Інтерпретувати ключові тексти Амеліної, визначаючи її стилістичні та деколонізаційні стратегії
- Формулювати власну позицію в дебаті про межі між літературою факту та художньою прозою під час війни
