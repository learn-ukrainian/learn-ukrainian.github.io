content_outline:
- points:
  - 'Провокація: Паша, вчитель української мови, на початку роману каже: «Якось воно буде». Чому людина, що живе посеред війни,
    обирає таку пасивну позицію? Чи це мудрість, чи боягузтво?'
  - 'Цитата-загадка: «Історія, яку він віз із собою, була важча за нього самого». Про яку історію йдеться і чому вона важча
    за людину?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Паша — це втілення українського інтелігента, що «проспав» війну, чи реалістичний образ звичайної людини, що
    намагається вижити?'
  - 'Дебат 2: «Інтернат» — це воєнний роман чи роман про дорослішання? Чи є подорож Паші за племінником алегорією шляху України
    до самоусвідомлення?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у романі гостру соціальну критику, інші — екзистенційну драму
    про людську самотність.'
  section: 'Конфліктна карта: Свідок чи учасник?'
  words: 900
- points:
  - 'Аналіз ключових сцен: перетин блокпосту, розмова з військовими, ніч у дитсадку, повернення додому. Як змінюється Паша
    і його сприйняття «своїх» та «чужих».'
  - 'Стилістика Жадана: метафора туману як стану свідомості та суспільства; фізичність та тілесність мови; пейзаж як дійова
    особа.'
  - 'Наративна структура: роман-дорога (road novel) як спосіб показати зріз суспільства та внутрішню трансформацію героя.'
  - '[!decolonization] Роман повертає український Донбас в культурний простір України, руйнуючи російський міф про «особливий
    регіон» та «громадянську війну». Мова Паші — це теж інструмент деколонізації.'
  section: 'Читання: Шлях крізь туман'
  words: 1700
- points:
  - 'Зображення насилля: Жадан майже не показує бойових дій, натомість фокусується на їхніх наслідках — руйнуваннях, страху,
    смерті цивільних. Чому такий підхід може бути сильнішим?'
  - 'Тіло у війні: холод, голод, втома, хвороби. Як автор показує негероїчний, фізичний вимір страждань?'
  - 'Позиція читача: чи викликає текст емпатію, чи призводить до емоційного вигорання? Як Жадан уникає «порнографії травми»?'
  - '[!anti-hagiography] Паша — не герой. Він не здійснює подвигів, а лише намагається врятувати одну дитину. Роман деромантизує
    війну, показуючи її як брудну, виснажливу реальність.'
  section: 'Етика зображення: По той бік фронту'
  words: 1200
- points:
  - 'Повернення до розминки: Як змінилася ваша відповідь на питання про пасивність Паші після прочитання аналізу?'
  - 'Рецепція роману: як сприймали «Інтернат» у 2017 році, і як його читають після повномасштабного вторгнення 2022 року?
    Чи змінився його сенс?'
  - 'Сучасне значення: що «Інтернат» говорить нам про відповідальність, вибір та людяність в умовах екзистенційної загрози?'
  - 'Студентське есе-роздум: «Одного разу ти прокидаєшся, і на твоїй війні вже все вирішено без тебе». Як ви розумієте цю
    цитату з роману?'
  section: Дискусія та підсумок
  words: 800
focus: 'Роман "Інтернат": шлях цивільного крізь війну, етика свідчення, деконструкція міфу про "громадянську війну", трансформація
  ідентичності'
level: LIT-WAR
module: lit-war-009
objectives:
- Аналізувати роман «Інтернат» як ключовий текст сучасної української воєнної літератури
- Дослідити, як роман деконструює імперські наративи та утверджує українську суб''єктність у просторі Донбасу
- Оцінити етичні виклики зображення війни, травми та цивільного досвіду у «сірій зоні»
- Формулювати власну позицію щодо трансформації головного героя та його морального вибору
