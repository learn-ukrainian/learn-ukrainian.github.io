activity_hints:
- description: 'Дебат про Пашу: герой чи антигерой? Визначити, кому належить теза — критикам чи захисникам героя.'
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставити пропущені слова (туман, вода, мова, дорога) у речення з аналізом символіки твору.
  focus: Ключові метафори роману
  items: 5
  type: fill-in
- description: Шлях Паші — це історія про вимушений вибір. Чи є його остаточне рішення ("треба брати малого") морально достатнім?
    Аргументуйте свою позицію (300-500 слів).
  focus: 'Есе-аналіз: Етика Паші'
  type: note
- description: Порівняйте образи цивільних на війні у романах Сергія Жадана та Андрія Куркова. Що спільного та відмінного
    у їхніх стратегіях виживання та етичних виборах?
  focus: 'Порівняльний аналіз: «Інтернат» vs «Сірі бджоли»'
  type: note
cefr_min: C1
