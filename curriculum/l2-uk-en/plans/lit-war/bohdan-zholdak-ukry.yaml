content_outline:
- points:
  - 'Провокація: Чи можна сміятися з війни? Богдан Жолдак відповідає — не просто можна, а необхідно. Але де межа між сміхом
    як зброєю і блюзнірством?'
  - 'Цитата без контексту: «Сєпари з градами — то, канєшно, стрёмно. Но єслі вони ще й говорять по-нашому, то це вже повний
    піздєц» — що цей суржик говорить про гібридну природу війни?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Жолдак — геній чи хуліган? Постколоніальна критика бачить у його «Украх» потужну деконструкцію російського імперського
    міфу про «малоросійський суржик». Пуристи — небезпечну легітимацію мовного хаосу.'
  - 'Дебат 2: Місце в каноні. «Укри» — це нішевий постмодерний експеримент чи центральний текст для розуміння війни після
    2014, що стоїть поруч із «Інтернатом» Жадана?'
  - '[!epistemic-humility] Немає єдиної відповіді. Аналіз залежить від оптики: чи ми дивимось як лінгвісти, літературознавці,
    чи як історики культури?'
  section: 'Конфліктна карта: Суржик як зброя чи слабкість?'
  words: 900
- points:
  - 'Аналіз структури: фрагментарність та поліфонія як відображення хаосу війни. Не лінійний сюжет, а калейдоскоп голосів.'
  - Назва «Укри» — іронічне привласнення російського пропагандистського пейоративу. Перетворення образи на знак гордості.
  - 'Наративна техніка: кінематографічний монтаж, швидка зміна планів, вплив кіно на прозу Жолдака.'
  - 'Характерна система: персонажі — не психологічні портрети, а носії певних «мовних масок» та соціальних типів.'
  - '[!decolonization] Жолдак не виправдовується, а нападає. Він бере стереотип «смішного й недолугого укра», доводить його
    до абсурду і тим самим знешкоджує.'
  section: 'Читання: роман «Укри»'
  words: 1800
- points:
  - 'Гротескне тіло війни: вплив Рабле та Гоголя. Жолдак показує війну не через героїчні подвиги, а через фізіологію, бруд,
    абсурдні смерті та поранення.'
  - '[!anti-hagiography] У Жолдака немає «святої війни». Є кривавий карнавал, де героїзм і ницість, сміх і жах нероздільні.
    Чи не є це більш чесним поглядом?'
  - 'Сміх крізь сльози: карнавальна поетика Бахтіна. Сміх у «Украх» — це не розвага, а спосіб вижити і зберегти глузд, коли
    реальність розпадається.'
  - 'Читацька позиція: чи створює такий текст емпатію, чи, навпаки, емоційну дистанцію? Чи є ризик, що гротеск естетизує насильство?'
  - '[!epistemic-humility] Етична оцінка тут складна. Текст змушує читача до некомфортних висновків про природу людини на
    війні.'
  section: 'Етика зображення: Гротеск і сміх як свідчення'
  words: 1300
- points:
  - 'Повернення до розминки: тож чи можна сміятися з війни? Формулювання відповіді на основі аналізу тексту «Укри».'
  - 'Рецепція: смерть Жолдака у 2018 році залишила роман незавершеним, перетворивши його на унікальний пам''ятник епохи.'
  - 'Сучасне значення: наскільки актуальним є метод Жолдака для осмислення повномасштабного вторгнення? Чи змінилася природа
    сміху під час війни?'
  - 'Студентська рефлексія: чи змінилося ваше ставлення до суржику та ненормативної лексики в літературі після цього аналізу?'
  section: Дискусія та підсумок
  words: 700
