vocabulary_hints:
- definition: здатність бути активним діячем, а не об'єктом чужої волі; самостійність у прийнятті рішень та формуванні власної
    історії.
  pos: ж.
  word: суб'єктність
- definition: спосіб розповіді, сукупність пов'язаних історій та інтерпретацій, що формують певне уявлення про світ.
  pos: ч.
  word: наратив
- definition: сукупність досліджень в галузі історії; те, як певна спільнота пише та інтерпретує власне минуле.
  pos: ж.
  word: історіографія
- definition: процес позбавлення від колоніальної спадщини в політиці, культурі та свідомості.
  pos: ж.
  word: деколонізація
- definition: справжність, відповідність оригіналу; у літературі — створення відчуття реальності, правдивості досвіду.
  pos: ж.
  word: автентичність
- definition: глибоке психологічне потрясіння, спричинене жахливою подією, що залишає тривалий слід.
  pos: ж.
  word: травма
- definition: представлення чогось (часто жахливого, як-от війна) у прикрашеному, художньо привабливому вигляді, що може применшувати
    його справжню суть.
  pos: ж.
  word: естетизація
- definition: розповідь очевидця про події, що має на меті зафіксувати правду, часто з юридичною або історичною точністю.
  pos: с.
  word: свідчення
word_target: 5000
