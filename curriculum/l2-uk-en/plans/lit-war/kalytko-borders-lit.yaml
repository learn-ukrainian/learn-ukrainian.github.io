content_outline:
- points:
  - 'Провокація: Чи може література свідчити про війну, не експлуатуючи чужий біль? Де межа між свідченням і мистецтвом?'
  - 'Цитата: "Кордон проходить крізь тіло, а не по карті". Як ви розумієте цю фразу Калитко до читання аналізу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є поезія Калитко "терапевтичною" для нації, чи вона лише фіксує травму, не даючи виходу?'
  - 'Дебат 2: Канонізація за життя. Чи не є зарано включати сучасних авторів до канону, поки війна триває? Чия оптика вирішує?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у Калитко голос покоління, інші — талановиту, але одну з багатьох,
    хто пише про війну.'
  section: 'Конфліктна карта: Поезія після Бучі'
  words: 900
- points:
  - Аналіз ключових уривків збірки "Земля загублених, або маленькі страшні казки".
  - 'Наративна стратегія: чому автор обирає форму казки для розповіді про реальні жахи війни?'
  - 'Мова та стиль: використання діалектизмів, суржику, "непоетичної" лексики як інструмент автентичності.'
  - '[!decolonization] Калитко свідомо відмовляється від мови імперії, не лише на рівні лексики, але й на рівні наративних
    структур, повертаючи суб''єктність українському досвіду.'
  section: 'Читання: ''Земля загублених'' та інші тексти'
  words: 1800
- points:
  - Як Калитко зображує тілесність, біль, смерть? Аналіз на прикладі конкретних віршів та оповідань.
  - 'Проблема "красивої" метафори: чи припустимо описувати трагедію витонченою мовою? Де ризик естетизації зла?'
  - '[!anti-hagiography] Тексти Калитко не створюють героїчного міфу. Вони показують війну як брудну, виснажливу роботу, де
    немає однозначно "чистих" перемог.'
  - '[!epistemic-humility] Позиція читача: текст вимагає співпраці, емпатії, але не дає легких відповідей. Що робити з отриманим
    досвідом після читання?'
  section: 'Етика зображення: Свідчення проти естетизації'
  words: 1200
- points:
  - 'Повернення до розминки: Чи змінилася ваша думка про те, де проходить межа між свідченням і мистецтвом?'
  - 'Рецепція творчості: як критики та читачі в Україні та за кордоном сприймають тексти Калитко?'
  - 'Сучасне значення: яку роль відіграє література свідчень у формуванні пам''яті про російсько-українську війну?'
  - 'Рефлексія: що найважче було читати в цьому модулі і чому? Які питання залишилися без відповіді?'
  section: Дискусія та підсумок
  words: 700
focus: Поезія та проза Катерини Калитко як література свідчень, етика зображення травми, проблема кордонів та ідентичності
  у воєнний час.
level: LIT-WAR
module: lit-war-018
objectives:
- Аналізувати творчість Катерини Калитко в контексті сучасної української "літератури свідчень"
- Розрізняти поняття "свідчення" та "естетизація" при аналізі текстів про війну
- Критично оцінювати дебати щодо канонізації сучасних авторів та ролі літератури під час війни
- Формулювати власну позицію щодо етичних дилем зображення травми в мистецтві
