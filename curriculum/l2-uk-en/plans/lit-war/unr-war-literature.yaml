content_outline:
- points:
  - 'Провокація: "Який з мене письменник, коли Батьківщина в небезпеці?" Чи була література визвольних змагань мистецтвом,
    чи лише інструментом пропаганди?'
  - 'Цитата без контексту: уривок, що показує внутрішній конфлікт автора між роллю митця та обов''язком громадянина.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи жертвували письменники УНР естетичною якістю заради ідеологічного посилу? (напр. політичні п''єси Винниченка
    vs його проза).'
  - 'Дебат 2: Формування канону. Які тексти були канонізовані в діаспорі, які — заборонені в УРСР, і як це впливає на наше
    сьогоднішнє прочитання?'
  - '[!epistemic-humility] Оцінка літератури за критерієм "політичної корисності" — пастка, яку слід усвідомлювати, але яку
    неможливо оминути, аналізуючи тексти, написані під час війни за існування.'
  section: 'Конфліктна карта: Ідеологія vs Мистецтво'
  words: 900
- points:
  - 'Аналіз ключових уривків: рання революційна поезія Павла Тичини ("Замість сонетів і октав"), проза Володимира Винниченка.'
  - Наративний голос, символізм (образ степу, синьо-жовті кольори), стилістичні інновації.
  - 'Характер і конфлікт: як автори зображували "нову людину" — революціонера, солдата, інтелектуала на війні.'
  - '[!decolonization] Порівняння з російською літературою про "громадянську війну" (напр. "Конармія" Бабеля). Показ унікальної
    української перспективи на ті самі події — як на війну за національне визволення, а не внутрішній конфлікт.'
  section: 'Читання: Проза та поезія боротьби'
  words: 1800
- points:
  - Як зображується ворог? Чи є місце для "людяності" ворога, чи це тотальна дегуманізація?
  - 'Насильство та травма: як тексти говорять про воєнні злочини, страждання цивільних, психологічні наслідки війни?'
  - 'Позиція автора: чи намагається він об''єктивно свідчити, чи свідомо мобілізує читача на боротьбу?'
  - '[!anti-hagiography] Аналіз текстів, що наважуються показати внутрішні конфлікти, зраду та "негероїчні" аспекти визвольної
    боротьби, руйнуючи монолітний міф.'
  section: 'Етика зображення: Свідок чи пропагандист?'
  words: 1200
- points:
  - 'Повернення до провокації з розминки: тож мистецтво чи пропаганда? Студент формулює власну аргументовану відповідь.'
  - 'Рецепція тоді і зараз: як ці тексти сприймалися сучасниками і як ми читаємо їх сьогодні, в контексті нової війни за незалежність?'
  - 'Сучасне значення: які теми, мотиви та етичні питання літератури УНР є актуальними для сучасної української воєнної літератури?'
  section: Дискусія та підсумок
  words: 700
focus: Prose and poetry of the UNR period, analyzing the tension between patriotic mobilization, ethical representation of
  violence, and the formation of a modern Ukrainian literary voice during wartime.
level: LIT.WAR
module: lit-war-002
objectives:
- Аналізувати ключові твори прози та поезії періоду визвольних змагань 1917-1921 років.
- Формулювати власну позицію в літературно-критичних дебатах щодо співвідношення ідеології та мистецької вартості.
- Оцінювати етичні дилеми зображення війни в літературі, розрізняючи свідчення та пропаганду.
- Проводити паралелі між літературою УНР та сучасною українською воєнною літературою.
pedagogy: CBI
persona:
  role: Проблематизує національний наратив, ставить незручні питання про співвідношення мистецтва, етики та війни, спонукає
    до критичного мислення.
  voice: Post-colonial-Critic
phase: LIT.WAR.1
