activity_hints:
- description: Розрізнення позицій у дебатах "мистецтво vs ідеологія" та "канон діаспори vs канон УРСР".
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити в речення терміни: суб''єктність, естетизація, свідчення, канон, наратив.'
  focus: Ключова термінологія
  items: 5
  type: fill-in
- description: Порівняйте уривок з поезії П. Тичини та прози В. Винниченка на тему революції. Які можливості для зображення
    епохи дає кожен із жанрів? Які аспекти вони підкреслюють, а про які мовчать?
  focus: 'Компаративний аналіз: Поезія vs Проза'
  type: note
- description: Чи можлива для воєнної літератури повна відмова від пропаганди? Чи не є будь-який текст, написаний в умовах
    екзистенційної загрози, певною мірою пропагандою? Аргументуйте свою позицію на прикладах з літератури УНР та сучасності
    (400-600 слів).
  focus: 'Есе: Етика і війна'
  type: note
