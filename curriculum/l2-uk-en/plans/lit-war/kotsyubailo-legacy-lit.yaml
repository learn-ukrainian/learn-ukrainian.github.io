content_outline:
- points:
  - 'Провокація: Фрагмент щоденникового запису бійця з-під Авдіївки (без автора та дати). Питання до студента: Це документ
    чи літературний текст? Де проходить межа?'
  - 'Ключове питання: Як ми говоримо про героїв, щоб не створювати ікони, а розуміти людей?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хто має право писати про війну? Дискусія між ветеранською літературою (прямий досвід) та творами професійних
    письменників (літературна майстерність).'
  - 'Дебат 2: Канонізація наживо. Чиї тексти про цю війну залишаться у шкільній програмі через 50 років? Ті, що популярні
    в соцмережах, чи ті, що отримують літературні премії?'
  - '[!epistemic-humility] Не існує єдиної "правди про війну" в літературі. Існують різні оптики: солдата, волонтера, біженця,
    цивільного в тилу. Кожна з них валідна, але часткова.'
  section: 'Конфліктна карта: Свідок vs Митець'
  words: 900
- points:
  - 'Аналіз ключових текстів, що формують образ Коцюбайла: репортажі (Рустем ХалІлов), інтерв''ю, уривки з книжок, де він
    є прототипом героя.'
  - 'Наративна структура: Як конструюється біографія героя в реальному часі? Від перших боїв у 18 років до статусу легенди
    та загибелі.'
  - 'Стилістика та мова: Аналіз мови самого Коцюбайла (з інтерв''ю) та мови текстів про нього. Пряма мова vs авторський коментар.'
  - '[!decolonization] Образ "Да Вінчі" як втілення української суб''єктності. Він не "жертва обставин", а свідомий актор
    історії, що сам обирає свою долю — на противагу імперському наративу про "малоросів".'
  section: 'Читання: Літературний портрет "Да Вінчі"'
  words: 1700
- points:
  - Як тексти про "Да Вінчі" та його покоління показують ціну війни? Аналіз сцен болю, втрати, втоми.
  - 'Проблема "бронзовіння": Як уникнути перетворення живої людини на плакатний образ, пам''ятник самому собі ще за життя
    (і особливо після смерті)?'
  - '[!anti-hagiography] Пошук у текстах не лише героїчних, а й суперечливих, "людських" рис. Чи є місце для сумнівів, страху,
    злості в образі національного героя?'
  - 'Читацька позиція: Чи викликають ці тексти бажання наслідувати, співчуття, чи просто шану? Як література про війну впливає
    на цивільних?'
  section: 'Етика зображення: По той бік героїзму'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, що важливіше для літератури війни — документальна точність чи художня сила? Студент формулює
    позицію.'
  - 'Рецепція спадщини: Як суспільство "працює" зі спадщиною Коцюбайла? Вулиці, премії, меморіали vs тексти, що намагаються
    зрозуміти його феномен.'
  - '[!anti-hagiography] Ризик міфологізації: Чим небезпечне спрощення образу героя до набору гасел? Як література може цьому
    протистояти?'
  - 'Сучасне значення: Чому історія Дмитра Коцюбайла — це не просто біографія, а ключ до розуміння цілого покоління, що взяло
    на себе відповідальність за країну?'
  section: Дискусія та підсумок
  words: 700
focus: The literary reflection on the new generation of war heroes, using Dmytro "Da Vinci" Kotsyubailo as a case study. Analysis
  of how witness literature (diaries, reportage) and fiction document the ethos of the volunteer movement since 2014.
level: LIT-WAR
module: lit-war-017
objectives:
- Аналізувати, як сучасна українська література (документальна та художня) осмислює феномен героїв нового покоління на прикладі
  Дмитра "Да Вінчі" Коцюбайла
- Критично оцінювати етичні дилеми зображення війни в літературі, розрізняючи свідчення та естетизацію
- Формулювати власну позицію в дебаті про "право на письмо" про війну та критерії канонізації воєнної літератури
- Дослідити, як тексти про сучасну війну формують національну ідентичність та історичну пам''ять, утверджуючи українську суб''єктність
