content_outline:
- points:
  - 'Провокація: "Тут немає пафосу і немає подвигів". Чому книга про війну починається із заперечення власної "важливості"?'
  - 'Цитата без контексту: "Війна — це передусім простір, а вже потім час". Що це означає для солдата і для читача?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Точка нуль" — це документалістика чи художня проза? Де межа між щоденником і романом?'
  - 'Дебат 2: Чи є відсторонений, "протокольний" стиль Чеха єдиним етично можливим способом говорити про війну? Позиція 1:
    Так, це чесність. Позиція 2: Ні, це естетизація порожнечі.'
  - '[!epistemic-humility] Критики досі сперечаються, чи є "Точка нуль" антивоєнним текстом, чи апологією солдатського досвіду,
    недоступного цивільним.'
  section: 'Конфліктна карта: Свідчення проти літератури'
  words: 900
- points:
  - 'Ключовий уривок: опис побуту, рутини, абсурду на позиціях. Аналіз стилю "нульового ступеня письма".'
  - 'Система персонажів: чому в книзі майже немає імен, а є лише позивні або функції ("поет", "тракторист")?'
  - 'Наративна структура: фрагментарність, відсутність класичного сюжету. Як це відтворює досвід ПТСР?'
  - '[!decolonization] Текст свідомо уникає "великих" імперських наративів про "братні народи" і фокусується на суб''єктному
    досвіді українського солдата, який захищає своє.'
  section: 'Читання: "Точка нуль"'
  words: 1800
- points:
  - Як Чех показує смерть і тілесність? Аналіз уривків, де тіло зводиться до функції або об'єкта.
  - 'Мовчання і недомовленість: що залишається поза текстом і чому? Чи є це формою поваги до травми?'
  - 'Читач як "свідок свідка": які етичні зобов''язання накладає читання такого тексту?'
  - '[!anti-hagiography] Чех не створює героїв. Його персонажі — звичайні люди в незвичайних обставинах, часто втомлені, роздратовані,
    далекі від плакатного ідеалу.'
  section: 'Етика зображення: Погляд із "нуля"'
  words: 1200
- points:
  - 'Повернення до розминки: чи вдалося тексту уникнути пафосу і подвигів? Аргументована відповідь студента.'
  - 'Рецепція: як "Точку нуль" читали у 2017 році, і як її читають після повномасштабного вторгнення 2022-го? Що змінилося?'
  - 'Зв''язок із сьогоденням: чи може література "факту" підготувати суспільство до реальності війни краще, ніж героїчні епоси?'
  section: Дискусія та підсумок
  words: 700
focus: Література факту, етика свідчення, деконструкція героїчного міфу, посттравматичний досвід у тексті Артема Чеха "Точка
  нуль"
