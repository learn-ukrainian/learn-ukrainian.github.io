objectives:
- Аналізувати текст Артема Чеха "Точка нуль" як зразок літератури факту
- Розрізняти поняття документального свідчення та художньої інтерпретації у контексті війни
- Критично оцінювати етичні виклики, пов'язані із зображенням травми та насильства
- Формулювати власну позицію щодо ролі "антигероїчної" літератури у формуванні національної пам'яті про війну
