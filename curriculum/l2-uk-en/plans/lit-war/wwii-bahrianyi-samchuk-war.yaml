activity_hints:
- description: Кому належить теза? Розрізнити позиції критиків щодо творчості Багряного і Самчука. Визначити позицію за цитатою.
  focus: 'Конфліктна карта: Шерех проти Самчука'
  items: 5
  type: quiz
- description: Заповнити пропуски в реченнях, обравши слово, що характерне для стилю одного з авторів (напр. «земляний», «динамічний»,
    «монументальний»).
  focus: 'Стилістичний аналіз: мова Самчука vs мова Багряного'
  items: 5
  type: fill-in
- description: Порівняйте фрагменти з «Марії» Самчука та «Саду Гетсиманського» Багряного. Як автори показують нелюдські страждання?
    Які художні засоби використовують? Чи є їхній підхід етично виправданим?
  focus: 'Етичний аналіз: зображення травми'
  type: note
- description: Чому «Тигролови» стали масовим, майже культовим романом, а «Волинь» залишається «літературою для фахівців»?
    Сформулюйте та аргументуйте власну гіпотезу (400-600 слів).
  focus: 'Есе: Чому «Тигролови» — культовий роман?'
  type: note
