content_outline:
- points:
  - 'Провокація: Як написати про пекло? Іван Багряний обрав гостросюжетний роман, Улас Самчук — монументальну епопею. Хто
    з них був ближчим до правди війни, і чи існує єдина правда?'
  - 'Цитата-контраст: уривок з «Волині» Самчука (повільний, детальний опис землі) vs уривок з «Тигроловів» Багряного (динамічна
    сцена погоні в тайзі).'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Естетичний): «Волинь» Самчука як «літопис нації» проти «Тигроловів» Багряного як «голівудського сценарію». Чи
    є «великий стиль» Самчука мистецтвом, чи лише багатослів’ям? Чи може серйозна література про ГУЛАГ бути пригодницькою?'
  - 'Дебат 2 (Ідеологічний): Самчук і його «органічна» візія нації (земля, селянин, традиція) vs Багряний і його «політична»
    візія (боротьба з режимом, інтелектуал-втікач, право на свободу). Чия модель українця виявилася життєздатнішою?'
  - '[!epistemic-humility] Літературна критика діаспори розділилася: Юрій Шерех (Шевельов) критикував Самчука за «культ сили»
    та стилістичну неохайність, водночас захоплюючись динамізмом Багряного. Інші вважали Багряного «полегшеним» автором для
    масового читача.'
  section: 'Конфліктна карта: Епос проти бойовика'
  words: 900
- points:
  - 'Улас Самчук, «Волинь»: аналіз стилю «великого епосу». Як зображено війну не через битви, а через зміни в житті села,
    в природі, в психології людей. Наратив, прив''язаний до землі.'
  - 'Іван Багряний, «Тигролови»: як пригодницький жанр стає інструментом для розповіді про ГУЛАГ та незламність українського
    духу. Мотив втечі як метафора свободи.'
  - '[!decolonization] Обидва автори пишуть українську історію всупереч імперії. Самчук — створюючи монументальний образ автохтонної
    нації, що існує поза часом і режимами. Багряний — показуючи українця як активного суб''єкта, що кидає виклик тоталітарній
    системі, а не як пасивну жертву.'
  - 'Порівняльний аналіз мови: «земляна», важка, діалектна мова Самчука vs стрімка, публіцистична, часом плакатна мова Багряного.'
  section: 'Читання: Самчук vs. Багряний'
  words: 1800
- points:
  - 'Самчук, «Марія»: чи є межа деталізації в описі Голодомору? Етика документального зображення геноциду в художньому творі.
    Ризик естетизації страждання.'
  - 'Багряний, «Сад Гетсиманський»: як зобразити тортури НКВС, не перетворюючи текст на каталог жахів? Фокус на психологічному
    спротиві Андрія Чумака як спосіб збереження людської гідності.'
  - '[!anti-hagiography] Чи не романтизує Багряний в «Тигроловах» виживання в ГУЛАГу? Дискусія про «памфлет оптимізму» і його
    етичну виправданість у порівнянні з реальним досвідом в''язнів.'
  - '[!epistemic-humility] Позиція читача: ці тексти викликають емпатію, катарсис чи травматичну втому? Обговорення ролі «важкої»
    літератури у формуванні історичної пам''яті.'
  section: 'Етика зображення: Травма і пам''ять'
  words: 1200
- points:
  - 'Повернення до розминки: то хто ж мав рацію — Самчук чи Багряний? Аргументована відповідь студента: обидві стратегії письма
    — епічна та пригодницька — є легітимними формами свідчення та боротьби.'
  - 'Історія рецепції: чому Багряний був зіркою діаспори, а Самчука читали з обережністю? Як звинувачення у колабораціонізмі
    вплинули на спадщину Самчука? Як змінилося сприйняття обох авторів в незалежній Україні?'
  - 'Сучасне прочитання: що нам говорять «Тигролови» і «Волинь» під час повномасштабного вторгнення? Які уроки виживання та
    спротиву є актуальними сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Comparative analysis of war prose by Ivan Bahrianyi ('Тигролови', 'Сад Гетсиманський') and Ulas Samchuk ('Марія', 'Волинь')
  focusing on themes of survival, national identity, and the ethics of representing trauma.
level: LIT-WAR
module: lit-war-003
objectives:
- Порівнювати стилістичні та ідеологічні підходи Івана Багряного та Уласа Самчука до зображення війни та виживання
- Аналізувати етичні дилеми зображення травми, геноциду та тоталітарного насильства в художній літературі
- Критично оцінювати місце обох авторів в українському літературному каноні та їхню роль у формуванні національної ідентичності
- Застосовувати деколоніальний підхід до аналізу текстів, написаних як спротив імперському наративу
