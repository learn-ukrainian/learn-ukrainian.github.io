content_outline:
- points:
  - 'Провокація: «я розкладаюся на слова / і на прості речення». Що відбувається з мовою, коли руйнується світ? Чи може поезія
    говорити про війну, не зраджуючи ані поезії, ані правді?'
  - 'Питання до студента: Які слова у вас асоціюються з війною? А які — з Донбасом? Як ці асоціації сформовані і чи може література
    їх змінити?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є «Абрикоси Донбасу» літературою свідчення (witness literature), чи це передусім формалістичний експеримент?
    Чи не применшує естетизація (сюрреалістичні образи, неологізми) документальну цінність тексту?'
  - 'Дебат 2: Наскільки важлива біографія авторки для розуміння тексту? Чи можна читати ці вірші, ігноруючи, що Якимчук —
    біженка з Донбасу? Ризик «біографічної пастки» vs ризик «стерильного» аналізу.'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у Якимчук «голос Донбасу», інші — продовжувачку традицій українського
    авангарду. Немає єдиної правильної відповіді, є лише аргументовані позиції.'
  section: 'Конфліктна карта: Свідчення проти естетики'
  words: 900
- points:
  - 'Ключовий концепт: «поезія розкладання». Аналіз віршів, де тіла, предмети і сама мова розпадаються на елементи. Як цей
    прийом передає досвід травми?'
  - 'Наративна структура: рух від ідилічного довоєнного світу до пекла війни і, врешті, до спроби віднайти мову для життя
    «після».'
  - 'Аналіз мови: неологізми, русизми, суржик, діалектизми. Як поетка використовує «нечисту» мову для створення автентичного
    портрету регіону?'
  - '[!decolonization] Текст як поле битви з імперськими міфами. Як Якимчук повертає українську суб’єктність Донбасу, показуючи
    його не як «радянський» чи «російський», а як складну, багатошарову українську територію?'
  section: 'Читання: Аналіз збірки «Абрикоси Донбасу»'
  words: 1700
- points:
  - Як текст зображує тілесність у стані руйнації? Аналіз образів поранених тіл, мертвих, розчленованих. Чи є межа, за якою
    зображення страждання стає експлуатацією?
  - 'Тиша і невимовне: на що поетка лише натякає? Яку роль відіграють пропуски, паузи, замовчування у тексті про травму?'
  - '[!anti-hagiography] Війна у Якимчук — це не про героїчні подвиги. Це про бруд, біль, розпад, втрату людської подоби.
    Текст уникає будь-якої форми глорифікації насильства.'
  - '[!epistemic-humility] Позиція читача: текст змушує нас бути свідками чужого болю. Які етичні зобов''язання це на нас
    накладає? Емпатія, відсторонення, відчуття провини?'
  section: 'Етика зображення: Тіло і травма'
  words: 1200
- points:
  - 'Повернення до розминки: тож як мова може існувати після того, як світ розклався? Як поезія Якимчук дає відповідь на це
    питання?'
  - 'Рецепція: як збірку сприйняли в Україні та за кордоном? Чому саме цей текст став одним із символів сучасної української
    воєнної літератури?'
  - 'Актуальність: як змінилося сприйняття «Абрикосів Донбасу» після повномасштабного вторгнення 2022 року? Які сенси стали
    гострішими, а які відійшли на другий план?'
  - '[!anti-hagiography] Розвінчання міфу про «поезію, що надихає». Чи надихає Якимчук? Чи, може, її функція — не дати забути,
    не дозволити відвернутися, змусити думати?'
  section: Дискусія та підсумок
  words: 800
focus: Lyuba Yakimchuk's "Apricots of Donbas", ethics of representing trauma, decolonization of the Donbas narrative, poetics
  of decomposition
level: LIT-WAR
module: lit-war-019
objectives:
- Аналізувати поетичну мову та стилістику Любові Якимчук у збірці «Абрикоси Донбасу»
- Оцінювати етичні виклики зображення війни та травми в літературі, розрізняючи естетизацію та свідчення
- Визначати, як текст деконструює імперські та радянські міфи про Донбас, утверджуючи українську суб’єктність регіону
- Аргументовано брати участь у літературній дискусії щодо співвідношення біографії автора та тексту
