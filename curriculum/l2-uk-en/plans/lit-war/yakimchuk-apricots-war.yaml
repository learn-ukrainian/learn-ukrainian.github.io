activity_hints:
- description: 'Кому належить теза: прихильникам «літератури свідчення» чи «формалістичного аналізу»? Визначити позицію за
    цитатою з уявного критика.'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити в речення специфічні слова та вирази з поезії Якимчук, пояснюючи їхнє значення в контексті.
  focus: Неологізми та мова Якимчук
  items: 5
  type: fill-in
- description: 'Наведено два уривки: один з «Абрикосів Донбасу», інший — з новинного репортажу про ту саму подію. Порівняйте,
    як два різні жанри говорять про насильство. Які етичні рішення приймає поетка, і до чого це призводить?'
  focus: 'Етичний аналіз: Свідок чи експлуататор?'
  type: note
- description: Проаналізуйте, як Любов Якимчук використовує мовні засоби (діалектизми, неологізми, суржик) для деконструкції
    імперського міфу про «єдиний народ» та повернення Донбасу в український культурний простір. (400-600 слів).
  focus: 'Есе: Деколонізація через мову'
  type: note
