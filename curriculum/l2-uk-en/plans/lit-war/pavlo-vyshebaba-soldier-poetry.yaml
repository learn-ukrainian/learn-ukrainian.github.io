objectives:
- Аналізувати поезію Павла Вишебаби як голос покоління, сформованого Революцією Гідності та війною
- Розрізняти та критично оцінювати дебати навколо його творчості (деколонізаційний вимір, антигероїзм, перформативність)
- Застосовувати концепт «етика зображення» для аналізу текстів про війну
- Формулювати власну позицію щодо ролі поезії в умовах екзистенційної загрози
