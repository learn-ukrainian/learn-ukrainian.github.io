content_outline:
- points:
  - 'Провокація: чому збірка поезії про війну має назву, що просить про неї не писати? «Тільки не пиши мені про війну» — це
    прохання, наказ чи поетичний маніфест?'
  - 'Цитата без контексту: «…бо любов і війна мають спільний інфінітив // убивати» — як цей рядок задає тон усій збірці?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Антигероїчний пафос vs традиційна воєнна лірика. Чи є щоденність війни, описана Вишебабою, більш чесною за оспівування
    подвигів?'
  - 'Дебат 2: Поезія Вишебаби — це акт деколонізації (спростування міфу про «русскоязычный Донбасс») чи універсальна антивоєнна
    лірика, що могла б виникнути в будь-якому контексті?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у Вишебабі насамперед східноукраїнського поета, що утверджує
    українську ідентичність, інші — митця, що говорить про загальнолюдські теми втрати та надії.'
  - 'Рок-поетика та слем: чи є усна, «музична» подача віршів автентичнішою за тихе читання з книжки? Дискусія про перформативність
    у сучасній поезії.'
  section: 'Конфліктна карта: Голос покоління чи рупор деколонізації?'
  words: 900
- points:
  - 'Аналіз ключових віршів: структура, ритміка, центральні образи (дім, фронт, тил, утрата).'
  - 'Розмовна інтонація: як Вишебаба створює ефект сповіді, листа, особистої розмови з читачем?'
  - 'Мінімалізм образності: чому поет уникає складних метафор, надаючи перевагу силі «простих» слів? Як це пов''язано з досвідом
    війни?'
  - '[!decolonization] Краматорськ як топос дому, а не «окупованої території». Екоактивізм як форма любові до землі, яку захищаєш.
    Війна як каталізатор мовної та культурної свідомості.'
  section: 'Читання: Тільки не пиши мені про війну'
  words: 1700
- points:
  - 'Свідчення vs естетизація: як Вишебаба зображує страждання та смерть, не перетворюючи їх на естетичний об''єкт?'
  - '[!anti-hagiography] Поет свідомо уникає героїзації. Його ліричний герой — звичайна людина у незвичайних обставинах. Чому
    такий підхід може бути етично сильнішим?'
  - 'Парадокс назви як етичний вибір: прохання «не писати про війну» — це спроба захистити близьких від травми чи визнання
    неможливості передати цей досвід словами?'
  - '[!epistemic-humility] Чи має право поет-солдат говорити від імені всіх солдатів? Вишебаба наголошує на особистому досвіді,
    уникаючи узагальнень.'
  section: 'Етика зображення: Антигероїзм як етична позиція'
  words: 1200
- points:
  - 'Повернення до розминки: то як ми тепер розуміємо назву збірки? Студент формулює відповідь з опорою на аналіз.'
  - 'Рецепція: як творчість Вишебаби сприймається в Україні та за кордоном? Роль книжкових презентацій та фестивалів як культурного
    фронту.'
  - 'Контекст: місце Вишебаби серед інших поетів війни (Сергій Жадан, Любов Якимчук, Борис Гуменюк). Що робить його голос
    унікальним?'
  - 'Рефлексія: чи може поезія, що просить не говорити про війну, насправді допомогти її пережити?'
  section: Дискусія та підсумок
  words: 800
focus: 'Павло Вишебаба як голос покоління війни: аналіз збірки «Тільки не пиши мені про війну» через призму антигероїзму,
  перформативності та деколонізації'
