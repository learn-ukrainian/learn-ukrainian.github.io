objectives:
- Аналізувати роман «Три листки за вікном» як зразок історіографічної метафікції
- Розрізняти історичний факт та художню вигадку в літературному творі, присвяченому минулому
- Характеризувати стилістичні особливості письма Валерія Шевчука, зокрема орнаменталізм
- Формулювати аргументовану позицію в рамках літературно-критичних дебатів щодо інтерпретації та канонізації твору
- Оцінювати внесок твору в деконструкцію імперських та радянських історичних наративів
