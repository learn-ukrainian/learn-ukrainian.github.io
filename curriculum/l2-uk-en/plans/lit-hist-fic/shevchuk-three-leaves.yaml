content_outline:
- points:
  - 'Провокація: Чи може історик бути вбивцею? А якщо вбивство — це єдиний спосіб дізнатися правду? Розглядаємо дилему центрального
    героя роману Шевчука.'
  - 'Цитата без контексту: «Правда — це те, що ми обираємо пам''ятати, а історія — це мистецтво переконувати інших у своєму
    виборі».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Три листки» — це історичний роман чи анти-історичний? Позиція 1: це спроба реконструкції барокового світогляду.
    Позиція 2: це постмодерна гра з історичними джерелами, що доводить неможливість реконструкції.'
  - 'Дебат 2: Місце Шевчука в каноні. Він — «патріарх» української літератури чи «складний» автор для вузького кола інтелектуалів?
    Дискусія про його рецепцію в радянський час та після здобуття незалежності.'
  - '[!epistemic-humility] Шевчук не дає відповідей, він ставить під сумнів саму можливість остаточної відповіді в гуманітаристиці.
    Його твори — це запрошення до герменевтичної гри, а не підручник.'
  section: 'Конфліктна карта: Дзеркало історії чи гра в бісер?'
  words: 900
- points:
  - 'Аналіз ключових епізодів: розслідування Кирила, його діалоги з уявними та реальними персонажами минулого, фінальне «одкровення».'
  - 'Стилістика та мова: орнаменталізм, барокова ускладненість синтаксису, використання архаїзмів. Як мова створює атмосферу
    інтелектуального лабіринту?'
  - 'Структура роману: три «листки» як три версії подій, що не складаються в єдину картину. Принцип «ненадійного оповідача».'
  - '[!decolonization] Відмова від реалізму як інструменту імперії. Шевчук повертає українській літературі її барокову, «химерну»
    традицію, протиставляючи її російському імперському наративу XIX століття з його претензією на об''єктивність.'
  section: 'Читання: Уривки з «Трьох листків за вікном»'
  words: 1800
- points:
  - 'Історична основа: реальні постаті та події XVII століття, які Шевчук використовує як відправну точку.'
  - 'Авторська вигадка: як Шевчук «домислює» біографії, мотивації, думки історичних персонажів. Де закінчується документ і
    починається психологічна реконструкція?'
  - '[!myth-buster] Руйнування міфу про «просту» народну культуру. Шевчук показує бароко як час високої інтелектуальної складності,
    філософських диспутів та богословських суперечок, а не лише козацьких воєн.'
  - '[!epistemic-humility] Автор свідомо демонструє, як легко маніпулювати історичними «фактами» для створення потрібного
    наративу. Роман — це попередження проти догматичного читання історії.'
  section: 'Історія vs. Вигадка: Факти та фікція в українському бароко'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи є правда в історії? Студент формулює власну відповідь, спираючись на аналіз роману.'
  - 'Рецепція твору: як критика сприйняла такий складний роман у 1980-х? Як його читають сьогодні, в епоху постправди та інформаційних
    воєн?'
  - '[!anti-hagiography] Персонажі Шевчука — не ідеалізовані герої, а складні, часто морально неоднозначні особистості. Як
    це працює проти «шароварних» стереотипів про минуле?'
  - 'Рефлексія: що змінилося у вашому розумінні історії та літератури після прочитання цього роману?'
  section: Дискусія та підсумок
  words: 700
