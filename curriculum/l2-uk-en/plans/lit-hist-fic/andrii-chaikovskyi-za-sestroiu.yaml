content_outline:
- points:
  - 'Провокація: «За сестрою» — це дитяча казка про козаків чи інструкція з національного спротиву, написана адвокатом?'
  - 'Цитата без контексту: уривок про втечу Павлика, що показує його рішучість, але не розкриває мети.'
  - 'Сучасна паралель: як сьогоднішні підліткові романи про війну продовжують традицію Чайковського?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чайковський — сумлінний популяризатор історії чи творець романтичного міфу про козацтво? Порівняння його підходу
    з працями істориків.'
  - 'Дебат 2: Місце Чайковського в каноні. Радянська критика — «вторинний провінційний автор». Сучасна оцінка — «фундатор
    українського пригодницького роману для юнацтва». Хто має рацію?'
  - '[!epistemic-humility] Літературна репутація — це не стала величина, а поле битви інтерпретацій, що змінюється з кожною
    епохою.'
  section: 'Конфліктна карта: Історик, педагог чи міфотворець?'
  words: 900
- points:
  - 'Аналіз ключових сцен: напад татар на село, полон Ганнусі, втеча та мандри Павлика, зустріч із козаками.'
  - 'Система персонажів: Павлик як герой, що дорослішає; Ганнуся як символ втраченої України; козаки як ідеалізована сила.'
  - 'Наративна структура: як темп і напруга пригодницького сюжету служать виховній меті.'
  - '[!decolonization] Чайковський створює український простір і українського героя, свідомо протиставляючи його імперським
    наративам. Його козаки — не "малоросійські" розбійники, а державники та захисники.'
  section: 'Читання: За сестрою'
  words: 1800
- points:
  - 'Що в романі є історичним фактом: побут татар, організація козацького війська, географія Дикого Поля.'
  - 'Що є художньою вигадкою: родинна історія, конкретні пригоди, мотивація персонажів.'
  - Як Чайковський, юрист за фахом, працює з "прогалинами" в історичних джерелах? Чи не зловживає він правом на вигадку?
  - '[!myth-buster] Чи не закріплює роман "За сестрою" стереотипний погляд на татар як на безлику ворожу силу, ігноруючи складні
    відносини між Козаччиною та Кримським ханством?'
  section: 'Історія vs. Вигадка: Козацька романтика та історична правда'
  words: 1200
- points:
  - 'Повернення до розминки: тож казка чи інструкція? Формулювання студентом власної позиції.'
  - 'Історія рецепції: чому роман, написаний для дітей, виявився настільки небезпечним для радянської імперії, що його заборонили?'
  - '[!anti-hagiography] Критичний погляд: чи не є романтизація козацтва Чайковським надто однобокою? Обговорення "темних
    сторін" козацької доби, які автор оминув.'
  - 'Сучасне значення: Чому "За сестрою" знову став популярним після 2014 року? Порівняння з творами Василя Шкляра та Володимира
    Рутківського.'
  section: Дискусія та підсумок
  words: 700
focus: Пригодницький роман "За сестрою" Андрія Чайковського як інструмент формування національної свідомості, дебати про історичну
  правду та художню вигадку, аналіз причин радянської заборони та сучасної канонізації.
