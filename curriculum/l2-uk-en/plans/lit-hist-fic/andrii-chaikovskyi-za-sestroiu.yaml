objectives:
- Критично аналізувати зв'язок між історичною правдою та художньою вигадкою в романі «За сестрою»
- Формулювати аргументовану позицію в літературних дебатах щодо місця автора в національному каноні
- Розпізнавати та пояснювати причини радянської цензури щодо українських патріотичних творів
- Оцінювати роль історичної прози у формуванні національної ідентичності та її актуальність сьогодні
