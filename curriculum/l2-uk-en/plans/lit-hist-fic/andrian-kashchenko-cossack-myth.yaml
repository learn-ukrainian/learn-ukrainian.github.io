content_outline:
- points:
  - 'Провокація: Андріан Кащенко — популяризатор історії чи PR-менеджер козацького бренду?'
  - 'Цитата: "Історія скінчилася. Почалася пам''ять." — як цей вислів стосується його творчості?'
  - 'Сучасна паралель: Чи можна вважати Кащенка творцем "козацького фентезі" початку XX століття?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історична достовірність vs. романтична ідеалізація. Кащенко як сумлінний "вчитель історії" для народу проти
    Кащенка як автора пригодницького жанру, що вільно поводиться з фактами.'
  - 'Дебат 2: Канон і влада. Чому твори, що формували національну свідомість, були заборонені як "буржуазно-націоналістичні"?
    Чи була ця заборона неминучою відповіддю на його успіх?'
  - '[!epistemic-humility] Немає єдиної відповіді на те, ким був Кащенко. Його спадщина — поле битви між тими, хто цінує історичну
    точність, і тими, для кого важливіший патріотичний наратив.'
  section: 'Конфліктна карта: Історик чи міфотворець?'
  words: 900
- points:
  - 'Уривок з тексту: опис Дніпра та порогів як самостійних, живих персонажів, що визначають долю козацтва.'
  - 'Аналіз сюжету: структура пригодницької повісті, архетипи героїв (мудрий ватажок, молодий джура).'
  - 'Контекст: Як оповідання "З Дніпра на Дунай" продовжує і ускладнює тему "втраченого раю" Запорозької Січі.'
  - '[!decolonization] Кащенко створював український козацький міф як пряму противагу імперському "малоросійському" наративу,
    де козаки були лише бунтівниками або екзотичними підданими царя.'
  section: 'Читання: "Над Кодацьким порогом"'
  words: 1800
- points:
  - 'Що є фактом: існування Січі, Кодацької фортеці, реальні історичні постаті, що згадуються побіжно.'
  - 'Що є вигадкою: ідеалізовані стосунки всередині козацтва, майже повна відсутність соціальних конфліктів, романтизовані
    діалоги та мотивації героїв.'
  - 'Авторська стратегія: Кащенко використовує історичний каркас, але наповнює його емоційним, дидактичним змістом, перетворюючи
    історію на притчу.'
  - '[!myth-buster] Чи була Запорозька Січ таким ідилічним місцем братерства, як її змальовує Кащенко? Історичні джерела свідчать
    про жорстоку боротьбу за владу, зради та соціальне розшарування.'
  section: 'Історія vs. Вигадка: Кащенківський міф'
  words: 1200
- points:
  - 'Повернення до провокації: Ким є Кащенко для сучасного читача? Яку роль він відіграв у збереженні національної пам''яті?'
  - 'Історія рецепції: Тріумфальне повернення після 1991 року. Чому його "наївна" проза виявилася такою затребуваною?'
  - '[!anti-hagiography] Критичний погляд: чи не завадив популярний міф Кащенка розвитку серйозної історичної науки про козацтво
    в масовій свідомості?'
  - 'Рефлексія: Що важливіше для національного наративу — історична правда чи надихаюча легенда?'
  section: Дискусія та підсумок
  words: 700
focus: The work of Andrian Kashchenko as the founder of popular Cossack prose; the role of "Over the Kodak Threshold" and
  "From the Dnipro to the Danube" in shaping the Cossack myth; the reasons for Kashchenko's ban in the USSR as a "bourgeois
  nationalist".
level: LIT-HIST-FIC
module: lit-hist-fic-020
objectives:
- Критично оцінювати творчість Андріана Кащенка в контексті його ролі як основоположника популярної козацької прози
- Аналізувати ключові твори ("Над Кодацьким порогом", "З Дніпра на Дунай") як інструменти формування національного міфу
- Розрізняти історичний факт та літературну вигадку в історичній белетристиці
- Формулювати аргументовану позицію щодо причин заборони Кащенка в СРСР та його значення для сучасної України
