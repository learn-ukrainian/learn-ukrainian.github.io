activity_hints:
- description: 'Розрізнити позиції: що є тезою істориків, а що — літературознавців? Чия це цитата — прихильника чи критика
    Іваничука?'
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: 'Вставити в речення ключові поняття з модуля: метафікція, суб''єктність, деколонізація, рецепція, наратив.'
  focus: Термінологія аналізу
  items: 5
  type: fill-in
- description: Порівняйте уривок з історичної хроніки про Батурин та уривок з роману 'Шрам'. Визначте 3 факти, які Іваничук
    зберіг, та 3 деталі, які він додав від себе. Поясніть, з якою метою він це зробив.
  focus: 'Джерельний аналіз: історія vs. вигадка'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: "Як роман ''Шрам'' допомагає зрозуміти сучасну російсько-українську війну?".'
  focus: 'Есе: Сучасне значення ''Шраму'''
  type: note
