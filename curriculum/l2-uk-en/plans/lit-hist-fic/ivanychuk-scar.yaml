objectives:
- Аналізувати історіографічний роман, розрізняючи історичний факт та художню вигадку.
- Формулювати власну позицію в літературно-критичних дебатах щодо твору.
- Застосовувати поняття «деколонізація», «суб''єктність», «колективна травма» для аналізу тексту.
- Критично оцінювати роль літератури у формуванні національної ідентичності та історичної пам''яті.
