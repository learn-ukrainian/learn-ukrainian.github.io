content_outline:
- points:
  - 'Провокація: Чи може роман «вилікувати» історичну травму нації, чи він лише перетворює її на новий міф?'
  - Цитата з роману про шрам, що не гоїться — але без вказівки на автора чи твір.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: ''Шрам'' — це історичне дослідження в художній формі чи все ж таки вільна фантазія на тему історії? Позиція
    автора vs. оцінка істориків.'
  - 'Дебат 2: Місце роману в каноні. За радянських часів — небезпечна «реабілітація Мазепи». У незалежній Україні — обов''язкова
    програма. Як змінювалась рецепція твору?'
  - '[!epistemic-humility] Іваничук сам визнавав, що «домислював» там, де мовчали архіви. Де проходить межа між художньою
    реконструкцією та фальсифікацією?'
  section: 'Конфліктна карта: Історія чи Література?'
  words: 900
- points:
  - 'Структура роману: поліфонія голосів, переплетення часових пластів (XVII, XVIII, XX ст.) — як це працює на головну ідею?'
  - 'Система персонажів: не лише історичні постаті, а й узагальнені образи (літописець, хранитель пам''яті).'
  - 'Стилістика та мова: використання архаїзмів, біблійних алюзій, поетична насиченість прози.'
  - '[!decolonization] Як роман руйнує імперський міф про «зрадника Мазепу» і повертає українцям суб''єктність в оцінці власної
    історії.'
  section: 'Читання: Аналіз роману ''Шрам'''
  words: 1700
- points:
  - Що відомо історикам про знищення Батурина? Документальні свідчення (листи, хроніки) vs. версія Іваничука.
  - 'Авторська свобода: які епізоди, персонажі та діалоги є повністю вигаданими? Чи виправдане це художньо?'
  - '[!myth-buster] Чи справді Іваничук «розвінчує міфи», чи він створює новий, патріотичний міф на противагу імперському?'
  - '[!epistemic-humility] Аналіз прогалин в історичних джерелах та як автор використовує їх для побудови власного наративу.'
  section: 'Історія vs. Вигадка: Батуринська трагедія'
  words: 1200
- points:
  - 'Повернення до розминки: тож чим є «шрам» для сучасної України — незагоєною раною чи щепленням від майбутніх помилок?'
  - 'Рецепція сьогодні: як війна з Росією 2014-2026 років змушує по-новому читати роман про події XVIII століття?'
  - '[!anti-hagiography] Чи не ідеалізує Іваничук козацьку добу, створюючи надто «правильних» героїв у боротьбі з абсолютним
    злом?'
  - 'Спадщина: вплив роману на сучасну українську історичну прозу (Шкляр, Луцишина).'
  section: Дискусія та підсумок
  words: 700
focus: Роман Романа Іваничука 'Шрам', історіографічна метафікція, травма Батурина, національна пам'ять vs. імперський наратив,
  деконструкція міфу про Мазепу
