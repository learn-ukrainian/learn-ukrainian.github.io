objectives:
- Аналізувати творчість Романа Іваничука в контексті української історичної прози XX століття
- Розрізняти історичний факт, художню вигадку та ідеологічну мету в літературному творі
- Застосовувати деколоніальну оптику для аналізу української літератури, написаної в радянський період
- Формулювати власну аргументовану позицію щодо ролі історичного роману у формуванні національної пам'яті
