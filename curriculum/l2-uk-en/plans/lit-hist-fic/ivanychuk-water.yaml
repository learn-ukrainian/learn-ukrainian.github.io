content_outline:
- points:
  - 'Провокація: Чи може зрада бути патріотизмом? Питання, яке ставить роман «Мальви» через долі яничарів.'
  - 'Цитата без контексту: «Немає страшнішої неволі, як духовна, бо вона невідчутна». Як це стосується української історії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Іваничук — реконструктор історії чи її міфотворець? Позиція «літературного історика» (Іваничук) vs позиція «архівного»
    історика (критики).'
  - 'Дебат 2: Чи є історична проза Іваничука «небезпечною»? Дискусія про те, чи не підміняє художня версія реальні історичні
    події у масовій свідомості.'
  - '[!epistemic-humility] Немає єдиної «правильної» версії минулого. Історичний роман — це лише одна з інтерпретацій, що
    конкурує з іншими.'
  section: 'Конфліктна карта: Історик чи романіст?'
  words: 900
- points:
  - 'Ключові уривки: полон, виховання яничарів, зустріч матері з синами-яничарами.'
  - 'Аналіз структури: система персонажів як алегорія розірваної України.'
  - 'Наративна стратегія: чому автор обирає саме жіночу оптику для розповіді про національну трагедію?'
  - '[!decolonization] «Мальви» як відповідь на імперський наратив про «спільну колиску». Іваничук показує, як імперія знищує
    ідентичність, перетворюючи її на зброю проти самої себе.'
  section: 'Читання: Роман «Мальви» (уривки)'
  words: 1700
- points:
  - 'Історичний факт: корпус яничарів в Османській імперії, система «девширме» (податок кров''ю).'
  - 'Художня вигадка: долі конкретних персонажів, їхні мотивації, діалоги — авторська реконструкція «білих плям».'
  - '[!myth-buster] Іваничук руйнує радянський міф про «дружбу народів», показуючи асиміляцію як насильницький акт.'
  - '[!epistemic-humility] Наскільки відповідально автор поводиться з історичними джерелами? Чи не спотворює художня метафора
    реальний історичний контекст?'
  section: 'Історія vs. Вигадка: Яничарство як факт і метафора'
  words: 1200
- points:
  - 'Повернення до розминки: Як після аналізу роману ви відповідаєте на питання про зраду та патріотизм?'
  - 'Рецепція твору: Чому «Мальви», написані у 1965-67 рр., були настільки резонансними в СРСР?'
  - 'Сучасне значення: Як метафора яничарства працює сьогодні, в контексті війни та інформаційних атак?'
  - '[!anti-hagiography] Погляд на самого Іваничука: чи не ідеалізує він козацьке минуле у своїх творах, створюючи нові міфи
    замість старих?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз історичної прози Романа Іваничука, зокрема роману «Мальви», на перетині факту, міфу та деколоніального наративу.
