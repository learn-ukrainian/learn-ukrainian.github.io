content_outline:
- points:
  - 'Провокація: Чи могла одна жінка, українська полонянка, справді керувати Османською імперією? Чи це лише красива легенда,
    яку ми хочемо чути?'
  - 'Цитата без контексту: "Смерть — це останнє приниження, якого може зазнати людина. Але й тут можна залишитися переможцем."'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Загребельний — історик чи міфотворець? Одні критики вбачають у "Роксолані" ретельну реконструкцію, інші — створення
    національного міфу про українку, що підкорила імперію.'
  - 'Дебат 2: "Роксолана" — радянський компроміс чи дисидентство? Чи був роман дозволеною формою патріотизму в СРСР, чи прихованою
    критикою імперського центру?'
  - '[!epistemic-humility] Літературна критика не має "правильних" відповідей, лише краще аргументовані позиції. Завдання
    не знайти істину, а зрозуміти складність тексту.'
  section: 'Конфліктна карта: Історична правда чи національний міф?'
  words: 900
- points:
  - 'Аналіз ключової сцени: розмова Роксолани з Сулейманом. Як Загребельний вибудовує її суб''єктність через мову, психологію
    та маніпуляцію.'
  - 'Стилістика автора: барокова пишність мови, поєднання брутального натуралізму та високої філософії.'
  - 'Система персонажів: Роксолана не як одна фігура, а як центр, що виявляє суть інших — Сулеймана, Ібрагіма, Валіде.'
  - '[!decolonization] Загребельний повертає українці її історію, вириваючи з імперського наративу, де вона була лише екзотичною
    наложницею. Він створює українську суб''єктність у серці ворожої імперії.'
  section: 'Читання: Роман "Роксолана"'
  words: 1800
- points:
  - Що ми знаємо напевно? Аналіз листів Роксолани та донесень венеційських послів — мізерні факти, що дійшли до нас.
  - Що вигадав Загребельний? Внутрішні монологи, дитинство в Рогатині, філософські діалоги. Як автор заповнює "білі плями"
    історії.
  - '[!myth-buster] Роман створює міф про "феміністичну" Роксолану, що бореться за права. Історична Гюррем Султан діяла в
    межах жорстокої логіки боротьби за владу та виживання своїх синів.'
  - '[!epistemic-humility] Чи спотворює така вигадка історію? Чи, навпаки, допомагає зрозуміти людську драму за сухими фактами?
    Однозначної відповіді немає.'
  section: 'Історія vs. Вигадка: Документ та авторська уява'
  words: 1300
- points:
  - 'Повернення до розминки: тож ким була Роксолана Загребельного — реальною жінкою чи символом незламності нації? Формулювання
    власної позиції.'
  - 'Рецепція твору: як роман сприймали в 1980-х і як його читають сьогодні, в контексті нової війни за незалежність.'
  - '[!anti-hagiography] Чи не є ідеалізація Роксолани пасткою? Чи не виправдовуємо ми її жорстокість тим, що вона "наша"?
    Дискусія про моральну неоднозначність героїні.'
  - 'Рефлексія: що у вашому сприйнятті Роксолани змінилося після цього аналізу?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману Павла Загребельного "Роксолана" як історичної фікції, його місце в каноні та деколонізаційна роль.
