objectives:
- Аналізувати роман "Роксолана" Павла Загребельного, розрізняючи історичні факти та авторську вигадку
- Формулювати аргументовану позицію в літературно-критичних дебатах щодо твору
- Застосовувати деколонізаційну оптику для аналізу української літератури, написаної в радянський період
- Оцінювати роль історичного роману у формуванні національної ідентичності та переосмисленні минулого
