content_outline:
- points:
  - 'Провокаційне питання: Богдан Хмельницький у трилогії Старицького — це реальна історична постать чи національно-романтичний
    ідеал, сконструйований у XIX столітті?'
  - Цитата з роману, що показує Хмельницького в момент сумнівів або моральної дилеми, без контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Народницька критика (Старицький як просвітитель мас) vs модерністська критика (оцінка художньої вартості його
    прози, її "старомодності").'
  - 'Дебат 2: Історична трилогія — це об''єктивна історія чи національна пропаганда? Дискусія про межі авторської інтерпретації
    в історичному жанрі.'
  - '[!epistemic-humility] Немає єдиної "правильної" відповіді; є лише краще аргументовані позиції. Завдання — зрозуміти логіку
    кожної зі сторін.'
  section: 'Конфліктна карта: Старицький — просвітянин чи митець?'
  words: 900
- points:
  - 'Аналіз ключових сцен: Переяславська рада, битва під Жовтими Водами — як Старицький створює драматичну напругу та героїчний
    пафос.'
  - 'Система персонажів: Хмельницький, Богун, Кривоніс. Як вони втілюють різні аспекти національного характеру?'
  - 'Стилістика та мова: архаїзми, фольклорні елементи, риторичні фігури. Як мова працює на створення "історичної" атмосфери.'
  - '[!decolonization] Старицький пише історію з української перспективи, повертаючи українцям суб''єктність та руйнуючи імперський
    погляд на Хмельниччину як на "бунт".'
  section: 'Читання: Трилогія «Богдан Хмельницький»'
  words: 1700
- points:
  - 'Що є історичним фактом: аналіз використання Старицьким джерел (Літопис Самовидця, праці Костомарова).'
  - 'Що є авторською вигадкою: любовні лінії, вигадані персонажі, драматизовані діалоги. Яку функцію вони виконують?'
  - '[!myth-buster] Чи створює Старицький нові міфи про козацтво? Аналіз міфологеми "єдності народу" в романі та її відповідності
    історичним реаліям.'
  - '[!epistemic-humility] Оцінка відповідальності письменника: чи не спотворює художня вигадка розуміння минулого? Де межа
    між інтерпретацією та фальсифікацією?'
  section: 'Історія vs. Вигадка: Трилогія як дзеркало'
  words: 1200
- points:
  - 'Повернення до розминки: студент формулює власну відповідь на питання про образ Хмельницького у Старицького, використовуючи
    аргументи з усього модуля.'
  - 'Рецепція твору: як трилогію читали в XIX столітті, в радянський час, і як читають зараз? Чому її популярність змінювалася?'
  - '[!anti-hagiography] Чи не надто ідеалізований образ Хмельницького у Старицького? Обговорення складних та суперечливих
    аспектів гетьмана, які автор міг оминути.'
  - 'Сучасна релевантність: яку роль історичний роман може відігравати сьогодні, в умовах інформаційної війни?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз історичної трилогії Михайла Старицького "Богдан Хмельницький", протиставлення історичного факту та літературної
  вигадки, деколонізація козацького наративу.
