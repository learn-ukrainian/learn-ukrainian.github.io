objectives:
- Аналізувати трилогію "Богдан Хмельницький" Михайла Старицького, розрізняючи історичні факти та літературну вигадку.
- Оцінювати роль Старицького у формуванні українського національного наративу та його деколонізаційне значення.
- Формулювати власну позицію в літературно-критичних дебатах щодо творчості Старицького та жанру історичного роману.
- Критично аналізувати рецепцію історичних постатей та подій в літературі.
