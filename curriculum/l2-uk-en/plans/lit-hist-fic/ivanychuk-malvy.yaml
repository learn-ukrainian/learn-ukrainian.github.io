content_outline:
- points:
  - 'Провокація: Чи може людина забути, хто вона? Що залишається від українця, який усе життя віддано служить чужій імперії?'
  - 'Цитата з роману без контексту: "Мамо! — скрикнув він не по-турецьки. — То я, твій син!" — хто і за яких обставин міг
    би це сказати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Мальви" — це спроба реконструкції XVII століття чи позачасова алегорія про зраду, пам''ять і національну ідентичність?'
  - 'Дебат 2: Радянський бестселер чи прихований націоналістичний маніфест? Рецепція твору в 1960-х роках і його прочитання
    сьогодні.'
  - '[!epistemic-humility] Критики досі сперечаються, чи є роман апологією неминучої асиміляції, чи закликом до опору.'
  section: 'Конфліктна карта: Історичний роман чи філософська притча?'
  words: 900
- points:
  - 'Аналіз ключової сцени: Марія впізнає своїх синів серед яничарів.'
  - 'Система персонажів: Марія як символ України, її сини (Алім і Селім) як уособлення різних шляхів асиміляції та опору.'
  - 'Наративна техніка: як Іваничук використовує внутрішні монологи та ретроспекції для розкриття психології персонажів.'
  - '[!decolonization] Роман "Мальви" як алегорія русифікації та знищення історичної пам''яті в СРСР. Яничар — це метафора
    "радянської людини".'
  section: 'Читання: Уривок з роману "Мальви"'
  words: 1700
- points:
  - 'Документована реальність: хто такі були яничари? Як формувалися їхні загони? Якою була їхня роль в Османській імперії?'
  - 'Авторська інтерпретація: наскільки історично точним є зображення побуту та психології яничарів у Іваничука? Що він додає
    від себе і навіщо?'
  - '[!myth-buster] Розвінчання міфу про яничарів як про бездушних убивць. Іваничук показує їх як трагічні постаті, жертв
    системи.'
  - '[!epistemic-humility] Історичні джерела про яничарів фрагментарні та часто упереджені. Художня література заповнює ці
    прогалини, але створює власний міф.'
  section: 'Історія vs. Вигадка: Яничарство як історичне явище та літературний образ'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи може людина забути, хто вона? Як роман відповідає на це питання?'
  - 'Історія рецепції: чому роман, опублікований у 1968 році, став настільки важливим для покоління шістдесятників і залишається
    актуальним досі?'
  - '[!anti-hagiography] Чи не романтизує Іваничук трагедію відступництва? Критичний погляд на образ "нещасного зрадника".'
  - 'Сучасна релевантність: тема колабораціонізму та втрати ідентичності в умовах сучасної російсько-української війни.'
  section: Дискусія та підсумок
  words: 800
focus: Роман Романа Іваничука "Мальви" (1968), алегорія національного відступництва, історичний роман vs. філософська притча,
  тема ясиру та яничарства.
level: LIT-HIST-FIC
module: lit-hist-fic-008
objectives:
- Проаналізувати роман "Мальви" як алегорію національного відступництва та історичну драму
- Оцінити різницю між історичним фактом яничарства та його художнім втіленням у романі
- Сформулювати власну позицію щодо актуальності проблематики роману в контексті сучасної України
- Розрізняти та аналізувати різні критичні підходи до інтерпретації твору (історичний, філософський, постколоніальний)
