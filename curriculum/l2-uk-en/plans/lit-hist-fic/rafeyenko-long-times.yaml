content_outline:
- points:
  - 'Провокація: "Місто Z говорило мовою, якої більше ніхто не знав". Як роман, написаний про неможливість говорити, стає
    найважливішим висловлюванням? '
  - 'Питання для роздумів: Чи може письменник "змінити" мову, як одяг? І що відбувається з його попередніми текстами?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Рафєєнко-перекладач vs Рафєєнко-творець. Його роман — це авто-переклад власних довоєнних ідей українською, чи
    народження абсолютно нової художньої свідомості?'
  - 'Дебат 2: Місце в каноні. Чи достатньо мовного переходу, щоб російськомовний до 2014 року автор став центральною фігурою
    сучасної української літератури? Чи це питання не так про мову, як про політичний вибір?'
  - '[!epistemic-humility] Немає "правильної" відповіді на те, коли закінчується один автор і починається інший; є лише різні
    оптики аналізу — біографічна, формалістична, постколоніальна.'
  section: 'Конфліктна карта: Мова і Пам''ять'
  words: 900
- points:
  - 'Аналіз уривків: сюрреалістична подорож Z, міфологія міста, що зникає. Як Рафєєнко використовує елементи магічного реалізму
    для зображення травми?'
  - 'Наративна структура: фрагментарність, сновидіння, нелінійність. Чому розповідь про війну не може бути послідовною?'
  - 'Стилістика та мова: винайдення нової української мови, очищеної від російських кальок, але наповненої пам''яттю про них.
    Аналіз неологізмів та синтаксису.'
  - '[!decolonization] Роман як акт мовної деколонізації. Рафєєнко не просто "перейшов" на українську, він її "завоював" для
    себе, демонструючи, що українська культура здатна асимілювати та перетворити досвід, раніше артикульований російською.'
  section: 'Читання: "Довгі часи"'
  words: 1700
- points:
  - 'Історична основа: реальна окупація Донецька у 2014 році, початок війни, статус біженця.'
  - 'Авторська вигадка: місто Z, персонаж Z, міфологічні елементи. Чому автор уникає прямої документалістики?'
  - 'Аналіз: Як вигаданий світ роману дозволяє точніше передати психологічну реальність війни, ніж будь-який репортаж? Чи
    не є сюрреалізм найчеснішим способом говорити про абсурдність того, що сталося?'
  - '[!myth-buster] Руйнування міфу про "громадянську війну". Роман показує війну як зовнішнє, ірраціональне вторгнення в
    тканину життя, а не як результат внутрішнього конфлікту.'
  - '[!epistemic-humility] Чи має право письменник "міфологізувати" реальні страждання? Дискусія про етичні межі художньої
    літератури на тлі трагедії.'
  section: 'Історія vs. Вигадка: Сюрреалізм як свідчення'
  words: 1200
- points:
  - 'Повернення до розминки: Як тепер ви розумієте фразу про "мову, якої ніхто не знав"? Чия це мова?'
  - 'Рецепція твору: Шевченківська премія 2021 року — що це говорить про те, як українське суспільство готове осмислювати
    війну та мовну ідентичність?'
  - '[!anti-hagiography] Аналіз пасивності протагоніста Z. Чи є він героєм? Чи його блукання є алегорією нездатності частини
    суспільства до спротиву, чи це критика "маленької людини"?'
  - 'Рефлексія: Яку роль відіграє мова у вашій власній ідентичності? Чи змінилося ваше ставлення до цього питання після аналізу
    роману Рафєєнка?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз роману Володимира Рафєєнка "Довгі часи" як прикладу історичної фікції про війну на Донбасі, що досліджує теми
  травми, пам'яті та свідомої зміни мовної ідентичності письменником.
level: LIT.HIST.FIC
module: lit-hist-fic-018
objectives:
- Аналізувати роман "Довгі часи" як приклад історичної фікції, що використовує сюрреалізм для зображення травми війни.
- Формулювати аргументовану позицію в літературних дебатах щодо мовної ідентичності автора та його місця в каноні.
- Критично розрізняти історичну основу та художню вигадку в тексті, оцінюючи етичні та естетичні аспекти авторського вибору.
- Застосовувати поняття постколоніальної теорії (суб'єктність, деколонізація, транслінгвізм) для аналізу сучасного літературного
  процесу в Україні.
