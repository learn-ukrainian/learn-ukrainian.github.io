content_outline:
- points:
  - 'Провокація: Чи могла 16-річна дівчина очолити повстанський загін? Василь Шкляр каже "так". Історія вагається. Де правда?'
  - 'Цитата з роману: "Страх — то остання зброя ворога. Відбери в нього цю зброю — і ти непереможний".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Маруся" — це історична реконструкція чи політичний маніфест, що використовує історію як інструмент?'
  - 'Дебат 2: "Ефект Шкляра". Популяризація історії через белетристику — це просвітництво чи небезпечне створення нових міфів?'
  - '[!epistemic-humility] Критики звинувачують Шкляра у відході від фактів, прихильники — у створенні дієвого національного
    наративу. Хто має рацію?'
  section: 'Конфліктна карта: Художня правда vs Історична точність'
  words: 900
- points:
  - 'Аналіз ключового уривку: сцена бою або важкого морального вибору Марусі. Як Шкляр конструює героїзм?'
  - 'Стилістика автора: "кінематографічна" проза, використання діалектизмів, жорсткий, "чоловічий" стиль письма. Як мова працює
    на ідею твору?'
  - '[!decolonization] Роман як інструмент повернення суб''єктності. Шкляр пише про українських повстанців не як про жертв,
    а як про акторів історії, що роблять свідомий вибір.'
  - 'Система персонажів: Маруся як символ незламності, її оточення як зріз повстанського руху.'
  section: 'Читання: Роман "Маруся"'
  words: 1700
- points:
  - 'Історичний прототип: Що ми насправді знаємо про Олександру Соколовську, отаманку Марусю? Аналіз архівних документів та
    спогадів.'
  - 'Художня вигадка: Які персонажі, сюжетні лінії та діалоги є винаходом автора? Навіщо вони потрібні?'
  - '[!myth-buster] Чи справді Маруся була настільки безкомпромісною? Шкляр створює ікону, але якою була реальна людина?'
  - '[!epistemic-humility] Де проходить межа між мистецькою свободою та історичною відповідальністю? Чи має право автор "додумувати"
    історію заради сильнішого ефекту?'
  section: 'Історія vs. Вигадка: Анатомія повстанської легенди'
  words: 1200
- points:
  - 'Повернення до провокації: тож, чи могла 16-річна дівчина... Якою буде ваша відповідь тепер, після аналізу?'
  - 'Рецепція роману: Чому "Маруся" та інші твори Шкляра стали бестселерами? Що це говорить про запит українського суспільства
    на "своїх героїв"?'
  - '[!anti-hagiography] "Маруся" як ікона. Чи не заважає така іконізація критичному осмисленню історії? Які ризики несе створення
    бездоганних героїв?'
  - 'Сучасне значення: Як роман "Маруся" читається сьогодні, в контексті повномасштабної війни? Чи змінилося ваше сприйняття?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману Василя Шкляра "Маруся" як зразка історичної фікції, його роль у деколонізації свідомості та дебати навколо
  художньої інтерпретації історії.
level: LIT-HIST-FIC
module: lit-hist-fic-014
objectives:
- Аналізувати роман "Маруся" Василя Шкляра, розрізняючи історичні факти та художню вигадку.
- Формулювати та аргументувати власну позицію в літературно-критичних дебатах щодо ролі історичної белетристики.
- Оцінювати стилістичні особливості прози автора та їхній вплив на читача.
- Критично осмислювати процес деколонізації історичної пам'яті та створення національних міфів.
