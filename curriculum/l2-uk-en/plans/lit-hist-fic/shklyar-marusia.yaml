activity_hints:
- description: Кому належить теза — критикам чи прихильникам Шкляра? Перевірка розуміння літературно-критичних дебатів навколо
    роману.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставити в речення терміни: історіографія, наратив, суб''єктність, белетристика, прототип.'
  focus: Ключові терміни модуля
  items: 5
  type: fill-in
- description: Порівняйте короткий уривок з історичного документа про Олександру Соколовську та уривок з роману "Маруся",
    що описує ту саму подію. Які деталі Шкляр додав, змінив або видалив? Чому, на вашу думку?
  focus: 'Джерельний аналіз: Історія vs. Вигадка'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: "Чи повинна історична література бути точною, чи вона має право на вигадку
    заради формування національної ідеї?". Використовуйте роман "Маруся" як основний приклад.'
  focus: 'Есе: Роль історичної белетристики'
  type: note
cefr_min: C1
connects_to:
