content_outline:
- points:
  - 'Провокація: Чи може роман бути більш правдивим за підручник історії? І чи повинен?'
  - Уривок з роману, де отаман Чорний Ворон приймає жорстоке рішення — без контексту, що змушує задуматися про ціну боротьби.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Чорний Ворон" — це історична реконструкція у формі роману чи художній текст, що вільно поводиться з фактами
    заради ідеї?'
  - 'Дебат 2: Місце роману в каноні. Чи є "Чорний Ворон" частиною "нового канону" літератури про Визвольні змагання, що витісняє
    радянські та імперські наративи?'
  - '[!epistemic-humility] Позиція критиків: від звинувачень у "романтизації бандитизму" до проголошення "настільною книгою
    патріота". Єдиної думки не існує.'
  section: 'Конфліктна карта: Історична правда vs. Художня вигадка'
  words: 900
- points:
  - 'Аналіз ключової сцени: бій у лісі або внутрішній монолог героя. Як Шкляр створює ефект присутності?'
  - 'Стилістика та мова: використання діалектизмів, військової лексики, лаконічність діалогів. Мова як характеристика персонажів.'
  - 'Наративна структура: чому історія розказана нелінійно? Роль спогадів та пророцтв у тексті.'
  - '[!decolonization] Роман як акт повернення суб''єктності: повстанці — не безіменні "бандити", а люди з мотивацією, ідеями
    та трагедією.'
  section: 'Читання: Уривки з роману "Чорний Ворон"'
  words: 1800
- points:
  - 'Документована історія: що ми знаємо про Холодноярську республіку з архівів ЧК, спогадів учасників, праць істориків?'
  - 'Персонажі: хто з героїв роману є реальною історичною постаттю (Василь Чучупака), хто збірним образом, а хто — повністю
    вигаданий?'
  - 'Авторська інтерпретація: як Шкляр заповнює "білі плями" в історії? Чи не створює він нові міфи, руйнуючи старі?'
  - '[!myth-buster] Руйнування радянського міфу про "класову боротьбу" на селі та показ Визвольних змагань як національної,
    а не соціальної революції.'
  - '[!epistemic-humility] Відповідальність автора історичного роману: де межа між художнім домислом та фальсифікацією?'
  section: 'Історія vs. Вигадка: Холодноярська Республіка: Факти та Міфи'
  words: 1200
- points:
  - 'Повернення до розминки: тож, чи може роман бути "правдивішим" за історію? Студент формулює відповідь, спираючись на аналіз.'
  - 'Рецепція роману: чому "Чорний Ворон" став бестселером і викликав такий суспільний резонанс?'
  - 'Сучасне значення: як цей текст читається після 2014 та 2022 року? Чи змінилося його сприйняття?'
  - '[!anti-hagiography] Дискусія про "темний бік" партизанської боротьби. Чи завжди мета виправдовує засоби?'
  section: Дискусія та підсумок
  words: 700
focus: Роман Василя Шкляра "Чорний Ворон. Залишенець", Холодноярська республіка, історична проза як інструмент деколонізації,
  співвідношення факту та вигадки у літературі про Визвольні змагання 1917-1921 рр.
