objectives:
- Критично аналізувати роман "Чорний Ворон" як зразок сучасної української історичної прози.
- Оцінювати роль літератури у процесах деколонізації та формуванні національної пам'яті.
- Розрізняти історичний факт та художню вигадку в тексті та аналізувати їхню взаємодію.
- Формулювати власну аргументовану позицію в літературно-критичних дебатах щодо твору та його суспільного значення.
