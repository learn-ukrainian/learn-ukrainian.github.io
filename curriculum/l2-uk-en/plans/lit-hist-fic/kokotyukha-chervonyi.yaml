objectives:
- Аналізувати роман 'Червоний' як зразок сучасної української історичної белетристики
- Оцінювати вплив популярної літератури на формування історичної пам'яті та процес деколонізації
- Розрізняти історичний факт та художній вимисел у літературному творі
- Формулювати власну позицію в літературно-критичних дебатах щодо тексту
