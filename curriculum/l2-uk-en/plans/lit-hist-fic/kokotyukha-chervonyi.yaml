content_outline:
- points:
  - 'Провокація: Чи може сучасний бестселер змінити історичну пам''ять про УПА більше, ніж десятки монографій?'
  - Цитата з роману, що показує жорстокість ГУЛАГу без прямого контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є ''Червоний'' історичним романом чи пригодницьким бойовиком на історичному тлі? Позиція автора vs. критика
    істориків.'
  - 'Дебат 2: Роль УПА в масовій культурі. ''Червоний'' як інструмент ''лагідної декомунізації'' vs. ризик спрощення та комерціалізації
    трагічної історії.'
  - '[!epistemic-humility] Оцінка твору залежить від оптики читача: історик шукає точності, масовий читач — захопливого сюжету.
    Обидва погляди легітимні.'
  section: 'Конфліктна карта: Історична правда vs. Художній запит'
  words: 900
- points:
  - 'Аналіз ключових сцен: втеча з табору, допити, внутрішні конфлікти між в''язнями.'
  - 'Портрет головного героя, Данила Червоного: відхід від канонічного образу ''націоналіста'' радянської пропаганди.'
  - 'Мова та стиль Кокотюхи: кінематографічність, динамізм, використання історичного сленгу та жаргону ГУЛАГу.'
  - '[!decolonization] Твір як відповідь на російський імперський наратив про ''українських пособників фашизму''. Створення
    українського суб''єктного героя.'
  section: 'Читання: Уривки з роману Червоний'
  words: 1700
- points:
  - 'Документальна основа: повстання в таборах ГУЛАГу (Норильське, Кенгірське) — що є в романі?'
  - 'Авторський домисел: персонаж Данила Червоного — збірний образ чи має конкретного прототипа?'
  - '[!myth-buster] Чи руйнує роман міфи про УПА, чи створює нові, ''зручні'' для сучасності міфи?'
  - Аналіз спогадів реальних в'язнів ГУЛАГу в порівнянні з художнім текстом.
  section: 'Історія vs. Вигадка: ГУЛАГ очима Кокотюхи'
  words: 1200
- points:
  - 'Повернення до розминки: як ''Червоний'' впливає на історичну пам''ять про УПА?'
  - 'Рецепція твору: популярність книги та фільму, критика з боку професійних істориків та літературознавців.'
  - 'Спадщина: місце ''Червоного'' в пантеоні сучасної української масової літератури. Чи є це ''новою класикою''?'
  - '[!anti-hagiography] Чи не романтизує твір жорстокість та насильство, представляючи його як єдиний шлях боротьби?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз роману 'Червоний' А. Кокотюхи. Історична основа vs художній вимисел. Дебати про роль УПА в сучасній культурі.
  Деколонізація історичного наративу.
level: LIT-HIST-FIC
