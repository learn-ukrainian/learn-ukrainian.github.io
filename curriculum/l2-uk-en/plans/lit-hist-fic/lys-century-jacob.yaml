content_outline:
- points:
  - 'Провокація: Чи може одна людина, проживши сто років, втілити в собі всю історію України ХХ століття? Або її історія —
    це лише приватна трагедія на тлі великих подій?'
  - Цитата-загадка з роману про вибір між двома жінками та двома світами без розкриття імен та контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Століття Якова" — це достовірне відображення життя на Поліссі чи "фольклорна" історія, що романтизує минуле
    для сучасного читача?'
  - 'Дебат 2: Чи може популярний роман-бестселер бути серйозним джерелом для розуміння історії, чи він неминуче спрощує та
    спотворює складну реальність заради сюжету?'
  - '[!epistemic-humility] Критики сперечаються: одні бачать у романі "народну епопею", інші — вдалу комерційну мелодраму
    в історичних декораціях. Де істина?'
  section: 'Конфліктна карта: Історія для народу чи народна історія?'
  words: 900
- points:
  - 'Аналіз ключових уривків: знайомство з Уляною, війна, повернення, старість — як змінюється мова та світосприйняття героя?'
  - 'Наративна структура: нелінійний сюжет, спогади, що переплітаються з реальністю. Як цей прийом працює на ідею "довгого
    століття"?'
  - 'Стилістика та мова: використання поліських діалектизмів для створення автентичності. Як мова персонажів відображає їх
    соціальний статус та історичну епоху?'
  - '[!decolonization] Роман показує українську історію зсередини, з точки зору селянина, а не через оптику імперських наративів
    (польського, радянського, німецького). Яків — об''єкт чи суб''єкт історії?'
  section: 'Читання: "Століття Якова"'
  words: 1800
- points:
  - 'Задокументовані факти: операція "Вісла", колективізація, діяльність УПА на Волині. Як ці події представлені в романі
    порівняно з історичними джерелами?'
  - 'Художня вигадка: персонажі, їхні долі, любовні лінії. Чи слугує вигадка для кращого розуміння історичної доби, чи лише
    для емоційного залучення читача?'
  - '[!myth-buster] Роман руйнує міф про "тихе, патріархальне Полісся", показуючи його як арену жорстоких конфліктів — етнічних,
    соціальних, особистих.'
  - '[!epistemic-humility] Автор використовує "білі плями" в історії (наприклад, повсякденне життя під різними окупаціями)
    для створення художнього світу. Наскільки цей світ є вірогідним?'
  section: 'Історія vs. Вигадка: Полісся у "Столітті Якова"'
  words: 1200
- points:
  - 'Повернення до розминки: Чи є історія Якова Меха алегорією долі України? Аргументована відповідь студента на основі аналізу.'
  - 'Рецепція та спадщина: Чому "Століття Якова" стало феноменом сучасної української літератури? Аналіз екранізації та її
    впливу на популярність твору.'
  - '[!anti-hagiography] Чи не перетворює роман складну та жорстоку історію на мелодраму, де окремі герої стають "святими"
    мучениками, а їхні вчинки позбавляються неоднозначності?'
  - 'Сучасне значення: Що "Століття Якова" говорить українцям сьогодні, в умовах нової війни за існування?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману Володимира Лиса "Століття Якова" як зразка сучасної української історичної прози, деконструкція міфів
  про Волинь, співвідношення історичного факту та літературної вигадки.
level: LIT-HIST-FIC
module: lit-hist-fic-015
objectives:
- Аналізувати роман "Століття Якова" в контексті української історичної прози та деколоніальних студій
- Розрізняти історичний факт та художню вигадку в літературному творі та оцінювати їх взаємодію
- Застосовувати інструменти літературного аналізу для інтерпретації наративної структури, стилістики та системи персонажів
- Формулювати власну аргументовану позицію щодо ролі та значення твору в сучасному українському культурному просторі
