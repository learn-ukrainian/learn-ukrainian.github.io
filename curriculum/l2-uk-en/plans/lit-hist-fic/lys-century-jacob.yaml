activity_hints:
- description: Визначте, яка з тез належить до "апологетичної", а яка до "критичної" інтерпретації роману.
  focus: Розуміння літературно-критичних дебатів
  items: 6
  type: quiz
- description: Вставити у речення діалектизми з тексту роману (напр., "крисаня", "бузьок", "мацьо") відповідно до контексту.
  focus: Поліські діалектизми
  items: 5
  type: fill-in
- description: Порівняйте уривок з роману, що описує прихід радянської влади, з архівним документом того періоду. Визначте
    3 факти, що збігаються, та 2 художні домисли автора.
  focus: 'Джерельний аналіз: Історія vs. Вигадка'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: "Чи є Яків Мех суб''єктом власної долі, чи лише об''єктом історичних
    обставин?". Використовуйте докази з тексту.'
  focus: 'Есе: Суб''єктність Якова Меха'
  type: note
