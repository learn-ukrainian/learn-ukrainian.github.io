objectives:
- Аналізувати роман Павла Загребельного "Роксолана", розрізняючи історичні факти, авторську вигадку та елементи національного
  міфу
- 'Критично оцінювати різні інтерпретації образу Роксолани: як історичної постаті та як літературної героїні'
- Застосовувати деколонізаційний підхід до аналізу, розглядаючи роман як спробу утвердження української суб'єктності
- Формулювати аргументовану позицію щодо місця роману в українському літературному каноні та його значення для сучасності
