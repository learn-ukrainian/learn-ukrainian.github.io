content_outline:
- points:
  - 'Провокаційне питання: Роксолана — українка, що підкорила імперію, чи трагічна бранка, яка стала інструментом у чужих
    руках? Що робить її образ таким привабливим для сучасної України?'
  - Коротка цитата з роману, де Роксолана розмірковує про владу та долю, без прямого зазначення імені.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історична реконструкція vs. національний міф. Чи намагався Загребельний відтворити реальну Хюррем Султан, чи
    він свідомо створював ідеалізований образ української жінки-переможниці?'
  - 'Дебат 2: Місце роману в каноні. Чи є "Роксолана" конформістським радянським романом, дозволеним цензурою, чи це прихована
    спроба утвердити український погляд на історію Османської імперії?'
  - '[!epistemic-humility] Позиції критиків: одні бачать у романі феміністичний маніфест, інші — націоналістичний проект,
    треті — лише майстерну белетристику.'
  section: 'Конфліктна карта: Роксолана: Ікона чи інструмент?'
  words: 900
- points:
  - 'Уривок з роману: сцена, де Роксолана приймає ключове політичне рішення. Аналіз її мотивації та методів.'
  - 'Наративна структура: як Загребельний вибудовує шлях героїні від безправної рабині до найвпливовішої жінки імперії.'
  - 'Стилістика та мова: багатство історичної лексики, психологізм портретів, використання внутрішніх монологів для розкриття
    характеру.'
  - '[!decolonization] Роман як відповідь на російський імперський погляд, що традиційно зображував українців як пасивних
    жертв. Загребельний створює образ активної української суб''єктності, що змінює хід світової історії.'
  section: 'Читання: Портрет Роксолани у Загребельного'
  words: 1800
- points:
  - Що говорять османські та європейські хроніки про Хюррем Султан? Порівняння історичних фактів (походження, діти, вплив
    на політику) з версією Загребельного.
  - 'Авторська вигадка: які епізоди, діалоги та персонажі є цілковитим винаходом письменника? Яку функцію вони виконують у
    тексті?'
  - '[!myth-buster] Чи справді Роксолана була отруйницею та безжальною інтриганкою, як стверджують деякі джерела? Як Загребельний
    працює з цими "чорними міфами"?'
  - '[!epistemic-humility] Загребельний як інтерпретатор: письменник заповнює лакуни в історичних документах, пропонуючи свою
    психологічну версію подій. Наскільки ця версія є переконливою?'
  section: 'Історія vs. Вигадка: Документи проти роману'
  words: 1200
- points:
  - 'Повернення до розминки: після аналізу тексту та історичного контексту, студент має сформулювати власну аргументовану
    відповідь на питання про роль Роксолани.'
  - 'Рецепція твору: як сприймали роман у СРСР і як його читають в незалежній Україні? Чому "Роксолана" стала телесеріалом
    і частиною масової культури?'
  - 'Сучасне значення: що міф Роксолани говорить про українське суспільство сьогодні? Про прагнення до влади, стратегії виживання,
    відносини з ісламським світом?'
  - '[!anti-hagiography] Чи не ідеалізуємо ми Роксолану, забуваючи про жорстокість епохи та ціну, яку було заплачено за владу
    в Османській імперії?'
  section: Дискусія та підсумок
  words: 700
focus: Роман Павла Загребельного "Роксолана", аналіз історичної правди проти художньої вигадки, Роксолана як символ української
  суб'єктності, деконструкція імперського наративу в радянському історичному романі.
