vocabulary_hints:
- definition: розгляд мовних, літературних чи культурних явищ в їхньому історичному розвитку
  pos: ж.
  word: діахронія
- definition: поєднання різнорідних елементів у єдине цілісне утворення
  pos: ч.
  word: синтез
- definition: прообраз, початкова модель або ідея, що несвідомо відтворюється в культурі та мистецтві
  pos: ч.
  word: архетип
- definition: властивість тексту містити посилання, цитати або алюзії на інші тексти, створюючи діалог між ними
  pos: ж.
  word: інтертекстуальність
- definition: система думок, ідей та практик, що визначає спосіб говоріння та мислення про певний об''єкт чи явище
  pos: ч.
  word: дискурс
- definition: процес позбавлення від колоніальної спадщини в культурі, мисленні та інтерпретації історії
  pos: ж.
  word: деколонізація
- definition: здатність бути активним, самостійним діячем історії чи культури, а не пасивним об''єктом зовнішніх впливів
  pos: ж.
