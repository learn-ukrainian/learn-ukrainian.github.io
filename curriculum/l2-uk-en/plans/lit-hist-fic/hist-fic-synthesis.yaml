activity_hints:
- description: Перевірка розуміння двох ключових дебатів, представлених у секції "Конфліктна карта".
  focus: Розуміння літературно-критичних дебатів
  items: 4
  type: quiz
- description: 'Заповнення пропусків у реченнях термінами з модуля: діахронія, синтез, архетип, інтертекстуальність, деколонізація.'
  focus: Ключова термінологія
  items: 5
  type: fill-in
- description: 'Порівняйте два тексти: уривок з історичного джерела про певну ідею та уривок з літературного твору, де ця
    ідея художньо осмислюється. Проаналізуйте, що було додано, змінено чи ідеалізовано автором.'
  focus: 'Джерельний аналіз: Історія ідей vs. Літературна конструкція'
  type: note
- description: Напишіть есе (400-600 слів), де ви аналізуєте сучасний український твір (література, кіно, музика) як "палімпсест",
    що веде діалог з класичною спадщиною.
  focus: 'Есе-аналіз: Палімпсести пам''яті в сучасності'
  type: note
cefr_min: C1
connects_to: []
content_outline:
- points:
  - 'Провокація: Чи є українська література єдиним текстом, що століттями переписує сам себе? Де шукати ключ до цього палімпсесту?'
  - 'Архетип на старті: Розгляньте три ключові образи з різних епох. Що їх об''єднує, окрім поверхневих ознак?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є діалог між поколіннями свідомим актом (автори сперечаються з попередниками) чи несвідомим успадкуванням
    архетипів та структур?'
  - 'Дебат 2: Деколонізаційна оптика — це автентичний інструмент для розуміння текстів минулого, чи це модерна рамка, що викривляє
    їхнє початкове значення?'
  - '[!epistemic-humility] Немає єдиної "правильної" відповіді. Критика — це мистецтво аргументації, а не пошук істини в останній
    інстанції.'
  section: 'Конфліктна карта: Як читати зв''язки між епохами?'
  words: 900
- points:
  - 'Спільні стратегії інтелектуального опору: як автори різних жанрів та епох деконструювали імперський наратив?'
  - '[!decolonization] Деконструкція як системний процес: від "Енеїди" до Розстріляного відродження — аналіз наскрізних прийомів.'
  - 'Трансформація літературної мови: порівняльний аналіз мовних експериментів та стилістичних технік на прикладах з трьох
    ключових епох.'
  - 'Інтертекстуальність як зброя: як автори використовували посилання на попередників для створення нового, антиколоніального
    сенсу.'
  section: 'Читання: Стилістичний калейдоскоп та спільні стратегії'
  words: 1700
- points:
  - 'Історична основа: які реальні історичні процеси та ідеї лягли в основу "філософії ідентичності" в літературі?'
  - '[!myth-buster] "Вигаданий" суб''єкт: як література конструює ідеалізований або міфологізований образ українця, і чим
    він відрізняється від історичних реалій?'
  - 'Література як простір формування національної етики: чи можна вважати це "відповідальною вигадкою", що служить виживанню
    нації?'
  - '[!epistemic-humility] Аналіз того, як "фікшн" (літературна ідентичність) стає "фактом" (політичною реальністю).'
  section: 'Історія vs. Вигадка: Конструювання українського суб''єкта'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи є українська література єдиним палімпсестом? Сформулюйте відповідь з аргументами з модуля.'
  - Вплив вивченого періоду на сучасний літературний процес та інтелектуальну безпеку України.
  - 'Спадщина та горизонти майбутнього: які "незакриті гештальти" минулого продовжують визначати сьогодення?'
  - '[!anti-hagiography] Критичне осмислення канону: чи всі твори, що вважаються "канонічними", однаково релевантні сьогодні?'
  section: Дискусія та підсумок
  words: 800
focus: Diachronic analysis of Ukrainian literature, decolonial optics, stylistic evolution, and the philosophy of identity
  across a historical period.
level: LIT-HIST-FIC
module: lit-hist-fic-022
objectives:
- Синтезувати знання про літературний процес вивченого періоду, виявляючи діахронні зв'язки.
- Застосовувати деколонізаційну оптику для критичного аналізу взаємозв'язків між авторами та епохами.
- Оцінювати тяглість та трансформацію ключових архетипів та ідей в українській інтелектуальній традиції.
- Аргументовано дискутувати про роль літератури у формуванні національної ідентичності та спадщини.
pedagogy: CBI
persona:
  role: Модератор семінару, що розглядає літературу як єдиний мета-текст, шукаючи приховані зв'язки та структури між епохами.
  voice: Literary Archaeologist
