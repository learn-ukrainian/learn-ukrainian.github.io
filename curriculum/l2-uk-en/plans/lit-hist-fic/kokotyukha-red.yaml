content_outline:
- points:
  - 'Провокація: Чи може кат стати жертвою, а герой — катом? Роман "Червоний" як виклик чорно-білому баченню історії УПА.'
  - Фрагмент тексту, де радянський офіцер висловлює неочікувану "повагу" до упівця — без контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Червоний" — це історична реконструкція, пригодницький бойовик, чи політичний маніфест у формі роману? [!epistemic-humility]'
  - 'Дебат 2: Чи має право автор на художню вигадку при зображенні УПА, чи це спотворює історію? Порівняння з позиціями академічних
    істориків.'
  - Критики з академічних кіл звинувачують Кокотюху в спрощенні, тоді як масовий читач сприймає роман як "справжню історію".
  section: 'Конфліктна карта: Історичний роман чи політичний трилер?'
  words: 900
- points:
  - 'Аналіз ключової сцени: підготовка та втеча з табору. Як автор будує напругу (саспенс)?'
  - 'Система персонажів: Данило Червоний (упівець), Віктор Гуров (радянський льотчик), майор Абрамов (начальник табору). Хто
    є протагоністом, а хто антагоністом?'
  - 'Мова та стиль: використання табірного жаргону, військової лексики. Наскільки мова автентична?'
  - '[!decolonization] Роман повертає українцям суб''єктність, зображуючи їх як активних борців, а не пасивних жертв ГУЛАГу.
    Це пряма відповідь на радянський наратив про "бандитів".'
  section: 'Читання: Уривки з роману "Червоний"'
  words: 1700
- points:
  - 'Що є фактом: існування системи ГУЛАГ, Норильське повстання 1953 року як реальна історична подія.'
  - 'Що є вигадкою: персонаж Данило Червоний є збірним образом, конкретні сюжетні лінії та діалоги є авторською конструкцією.'
  - '[!myth-buster] Роман спростовує радянський міф про те, що повстання в таборах були лише кримінальними бунтами, показуючи
    їх політичний, організований характер.'
  - 'Оцінка: чи виправдана авторська вигадка? Чи допомагає вона зрозуміти дух епохи, чи створює нові, спрощені міфи? [!epistemic-humility]'
  section: 'Історія vs. Вигадка: Норильське повстання як тло'
  words: 1200
- points:
  - 'Повернення до розминки: чи можливий однозначний поділ на героїв та зрадників у табірних умовах? Відповідь з опорою на
    текст.'
  - 'Рецепція твору: комерційний успіх роману та його екранізації. Чому цей наратив виявився затребуваним в Україні у 2010-х
    роках?'
  - '[!anti-hagiography] Хоча Червоний — герой, роман показує жорстокість та неоднозначність методів боротьби, уникаючи створення
    "ікони".'
  - 'Сучасна актуальність: як досвід опору в ГУЛАГу резонує з досвідом сучасної російсько-української війни?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз роману "Червоний" як зразка сучасної української історичної белетристики. Розрізнення історичних фактів (Норильське
  повстання) та художньої вигадки. Дебати про жанр, рецепцію та деколонізаційну роль твору.
