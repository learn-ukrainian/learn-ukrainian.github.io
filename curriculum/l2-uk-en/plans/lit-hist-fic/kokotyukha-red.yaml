objectives:
- Аналізувати роман "Червоний" як зразок сучасної української історичної прози.
- Розрізняти історичний факт (Норильське повстання) та художню вигадку в літературному творі про УПА.
- Критично оцінювати роль літератури у процесі деколонізації та формування національних міфів.
- Формулювати власну аргументовану позицію в літературно-критичних дебатах щодо твору.
