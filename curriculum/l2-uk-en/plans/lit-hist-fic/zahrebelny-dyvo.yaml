content_outline:
- points:
  - 'Провокація: Хто насправді збудував Софію Київську? Таємничий майстер Сивоок — ключ до розуміння душі народу чи майстерна
    літературна містифікація?'
  - Цитата з роману, що описує собор як "диво", без пояснення — що робить архітектуру дивом?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Диво" — це історичний роман, що реконструює минуле, чи це міфопоетичний текст, що створює національний епос?
    (Формалістичний vs. історичний підхід).'
  - 'Дебат 2: Творчість Загребельного — це дозволений радянською владою "націоналізм у межах" чи прихована форма дисидентства
    та культурного опору?'
  - '[!epistemic-humility] Немає єдиної відповіді; критики досі сперечаються, чи був Загребельний конформістом, чи прихованим
    нонконформістом, що використовував езопову мову.'
  section: 'Конфліктна карта: Історичний роман чи національний міф?'
  words: 900
- points:
  - 'Аналіз ключових пасажів: портрети Ярослава Мудрого та Сивоока, опис процесу будівництва собору.'
  - 'Наративна структура: як паралельне ведення сюжетних ліній (XI та XX століття) створює відчуття тяглості історії.'
  - 'Барокова стилістика Загребельного: аналіз метафор, порівнянь, розлогих синтаксичних конструкцій.'
  - '[!decolonization] Роман представляє український погляд на історію Київської Русі, повертаючи її з імперського наративу
    "колиски трьох братніх народів" у питомо український культурний простір.'
  section: 'Читання: Уривки з роману "Диво"'
  words: 1800
- points:
  - Що насправді відомо історикам про будівництво Софії Київської з літописів та археологічних даних?
  - Сивоок — повністю вигаданий персонаж. Яку функцію виконує цей образ? Чому Загребельний "віддає" створення національного
    символу самотньому генію-язичнику?
  - '[!myth-buster] Роман створює і закріплює міф про народну, позадержавну основу української культури, протиставляючи її
    офіційній візантійській традиції Ярослава.'
  - '[!epistemic-humility] Загребельний заповнює прогалини в історичних джерелах художньою інтуїцією, але чи не видає він
    свою інтерпретацію за історичну правду?'
  section: 'Історія vs. Вигадка: Софія Київська та її будівничі'
  words: 1200
- points:
  - 'Повернення до розминки: тож хто збудував Софію? Студент формулює відповідь, розрізняючи історичний факт, авторську вигадку
    та національний міф.'
  - 'Рецепція роману: як сприймали "Диво" у 1968 році та як його читають зараз, в умовах повномасштабної війни?'
  - '[!anti-hagiography] Обговорення складної постаті Загребельного, який був одночасно лауреатом радянських премій і творцем
    потужного національного наративу.'
  section: Дискусія та підсумок
  words: 700
focus: Роман Павла Загребельного "Диво", його роль у формуванні міфу про Київську Русь, напруга між історичним фактом та художньою
  вигадкою, а також його деколонізаційне значення в радянські часи.
