activity_hints:
- description: Перевірка розуміння двох ключових дебатів щодо роману "Диво". Чия це теза — що роман є міфом, чи що він є дисидентським?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Заповнити пропуски в реченнях, використовуючи характерні для автора барокові епітети та метафори з тексту модуля.
  focus: Стилістика Павла Загребельного
  items: 5
  type: fill-in
- description: Порівняйте уривок з "Дива" про заснування Софії та відповідний уривок з "Повісті временних літ". Що Загребельний
    додав, змінив, замовчав? Чому?
  focus: 'Джерельний аналіз: "Диво" vs. "Повість временних літ"'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: "Чи потрібні сучасній Україні такі твори, як "Диво", що створюють національні
    міфи? Чи, навпаки, нам потрібна лише сувора історична правда?"'
  focus: 'Есе: Роль "Дива" в сучасній Україні'
  type: note
