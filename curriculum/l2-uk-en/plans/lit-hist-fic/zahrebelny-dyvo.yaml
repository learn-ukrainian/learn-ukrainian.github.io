objectives:
- Аналізувати роман "Диво" Павла Загребельного як складне явище української літератури XX століття.
- Оцінювати роль твору у формуванні національного міфу про Київську Русь та його деколонізаційний потенціал.
- Критично розрізняти історичні факти та художню вигадку в тексті роману, аналізуючи авторську стратегію.
- Формулювати власну аргументовану позицію в літературно-критичних дебатах щодо творчості Павла Загребельного.
