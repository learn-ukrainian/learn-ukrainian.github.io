content_outline:
- points:
  - 'Провокація: Мазепа — зрадник чи герой? Чому образ гетьмана, створений Лепким на початку XX століття, став для українців
    важливішим за саму історичну постать?'
  - 'Цитата: Уривок з внутрішнього монологу Мазепи перед прийняттям рішення про союз зі Швецією, що показує складність вибору.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історичний): Зрада чи державницький чин? Російська імперська історіографія (анафема, образ Юди) проти української
    державницької школи (спроба вирватися з-під московського ярма).'
  - 'Дебат 2 (Літературний): Роман Лепкого — це історичний документ чи художня вигадка? Наскільки автор мав право «додумувати»
    за гетьмана, щоб створити національний епос?'
  - '[!epistemic-humility] Позиція Лепкого не єдина. Порівняння з іншими інтерпретаціями образу Мазепи в літературі (від Вольтера
    та Байрона до Сосюри).'
  section: 'Конфліктна карта: Імперський міф vs. Національний наратив'
  words: 900
- points:
  - 'Аналіз ключових епізодів: Полтавська битва очима Лепкого, стосунки Мазепи з Карлом XII, Мотрею Кочубей, Пилипом Орликом.'
  - 'Характер Мазепи: державний діяч, політик, меценат, людина з її слабкостями. Як Лепкий гуманізує ікону?'
  - 'Стилістика та мова: синтез історичної лексики та модерністської психологічної прози.'
  - '[!decolonization] Лепкий свідомо повертає українській культурі постать, яку вкрала і спотворила імперія. Його роман —
    це акт культурної реституції.'
  section: 'Читання: Роман "Мазепа"'
  words: 1800
- points:
  - 'Джерельна база роману: на що спирався Лепкий? Літописи (Самійла Величка, "Історія Русів"), закордонні джерела, родинні
    архіви.'
  - 'Що є фактом: Полтавська битва, союз зі Швецією, анафема. Що є художньою вигадкою: більшість діалогів, любовні лінії,
    внутрішні монологи.'
  - '[!myth-buster] Чи не створив Лепкий новий міф, борючись зі старим? Аналіз романтизації та ідеалізації образу гетьмана.'
  - '[!epistemic-humility] Чи спотворює художня вигадка Лепкого історичну правду, чи, навпаки, допомагає її глибше зрозуміти,
    надаючи емоційного виміру сухим фактам?'
  section: 'Історія vs. Вигадка: Факти, документи та художній домисел'
  words: 1200
- points:
  - 'Повернення до розминки: Як після аналізу роману ви відповідаєте на питання "зрадник чи герой"?'
  - 'Рецепція твору: Чому роман був заборонений в СРСР? Як його читали в діаспорі? Яке його значення для України після 1991
    року?'
  - '[!anti-hagiography] Чи не заважає ідеалізований Лепким образ Мазепи бачити реальну історичну постать з її помилками та
    суперечностями?'
  - 'Рефлексія: Що цей текст говорить про роль літератури у формуванні національної пам''яті та ідентичності воюючої нації?'
  section: Дискусія та підсумок
  words: 700
focus: Роман Богдана Лепкого "Мазепа" — аналіз протистояння історичних джерел та літературної вигадки, деконструкція імперського
  міфу про Мазепу та створення канонічного образу українського національного героя.
level: LIT-HIST-FIC
module: lepkyi-mazepa
objectives:
- Аналізувати роман "Мазепа" Богдана Лепкого як ключовий текст українського модернізму та інструмент національного самоствердження
- Розрізняти історичні факти та художній домисел у тексті, оцінюючи внесок Лепкого у деконструкцію імперського міфу про Мазепу
- Формулювати власну аргументовану позицію в дебатах щодо рецепції та канонізації твору в українській культурі
- Критично оцінювати роль літератури у формуванні національної пам'яті та протистоянні імперським наративам
pedagogy: CBI
