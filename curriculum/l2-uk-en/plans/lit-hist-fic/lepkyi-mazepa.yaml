activity_hints:
- description: Розрізнити аргументи імперської та національної історіографії щодо постаті Мазепи. Визначити тезу за цитатою.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити в речення ключові терміни модуля: історіографія, наратив, суб''єктність, художній домисел, рецепція.'
  focus: 'Термінологія: Історія та література'
  items: 5
  type: fill-in
- description: 'Подано два тексти: уривок з роману Лепкого про Полтавську битву та фрагмент з літопису Самійла Величка. Порівняйте,
    що спільного, що відмінного, і як Лепкий трансформує історичний документ на художній текст.'
  focus: 'Джерельний аналіз: Роман vs. Літопис'
  type: note
- description: Спираючись на текст модуля, поясніть, чому роман Лепкого став не просто літературним твором, а частиною політичної
    ідеології "мазепинства". Аргументуйте, чому ця ідеологія залишається актуальною і сьогодні (400-600 слів).
  focus: 'Есе: "Мазепинство" як явище'
  type: note
