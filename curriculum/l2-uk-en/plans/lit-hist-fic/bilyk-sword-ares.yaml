activity_hints:
- description: На основі матеріалу модуля визначте, яка зі сторін у дебаті про "Меч Арея" могла б висловити кожну з наведених
    тез.
  focus: 'Конфліктна карта: Історик чи Націоналіст?'
  items: 4
  type: quiz
- description: 'Заповніть пропуски в реченнях, використовуючи слова з секції "Словник": історіографія, наратив, суб''єктність,
    міфотворчість, рецепція.'
  focus: Ключова термінологія
  items: 5
  type: fill-in
- description: Порівняйте уривок з "Гетики" Йордана про Германаріха з відповідним епізодом з роману Білика. Визначте, що Білик
    запозичив, що змінив, а що повністю вигадав. Обґрунтуйте, чому він це зробив.
  focus: 'Аналіз джерел: Йордан vs. Білик'
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: "Чи повинен історичний романіст бути вірним фактам, чи його головна мета
    — створити переконливий національний міф?". Аргументуйте свою позицію на прикладі "Меча Арея".'
  focus: 'Есе: Роль історичного роману'
  type: note
