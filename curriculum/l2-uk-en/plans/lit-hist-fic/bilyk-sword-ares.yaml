content_outline:
- points:
  - 'Провокація: Чому роман, який став національним бестселером у 1970-х, був заборонений, а його автор — репресований? Що
    такого небезпечного побачила радянська влада в історії про готів IV століття?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історична реконструкція vs. художня вигадка. Чи можна вважати "Меч Арея" джерелом знань про готів, чи це лише
    авторська фантазія на історичну тему?'
  - 'Дебат 2: Національний міф vs. "буржуазний націоналізм". Позиція офіційної радянської критики (звинувачення в "націоналістичних
    перекрученнях") проти народної рецепції (роман як "наша історія").'
  - '[!epistemic-humility] Розгляд аргументів літературознавців, які бачать у романі і прото-наукову розвідку, і свідоме міфотворення.'
  section: 'Конфліктна карта: Історик чи Націоналіст?'
  words: 900
- points:
  - 'Аналіз ключового епізоду: рада готських вождів. Як Білик створює ефект "присутності" та історичної достовірності.'
  - 'Стилістика та мова: архаїзація, використання історичної лексики, створення "готського" колориту. Наскільки це мовноправдоподібно?'
  - '[!decolonization] Роман як відповідь на радянську/російську концепцію "спільної колиски". Білик стверджує глибоке, неслов''янське
    коріння на українських землях, руйнуючи імперський наратив про "молодшого брата".'
  section: 'Читання: Фрагменти роману "Меч Арея"'
  words: 1700
- points:
  - 'Документовані факти: що ми насправді знаємо про готського короля Германаріха та його державу з римських джерел (Амміан
    Марцеллін, Йордан)?'
  - 'Авторська вигадка: де Білик домислює, заповнює лакуни або свідомо змінює історичні факти на догоду сюжету? Аналіз образу
    Богдана Гатила.'
  - '[!myth-buster] Руйнування міфу про "споконвічну дружбу слов''ян і готів". Білик показує складні, часто ворожі стосунки,
    що суперечило радянській ідеології.'
  - '[!epistemic-humility] Оцінка відповідальності автора: чи не створює роман нових міфів, борючись зі старими? Дискусія
    про межі художньої свободи в історичному жанрі.'
  section: 'Історія vs. Вигадка: "Меч Арея" під мікроскопом історика'
  words: 1200
- points:
  - 'Повернення до розминки: Чому книга про IV століття стала загрозою для СРСР у ХХ столітті? Студент формулює відповідь
    на основі аналізу.'
  - 'Рецепція твору: від заборони та спецсховів до культового статусу та перевидань у незалежній Україні.'
  - '[!anti-hagiography] Критичний погляд на спадщину Білика: чи не призводить його підхід до заміни однієї міфології (радянської)
    іншою (націоналістичною)?'
  - 'Сучасне значення: Як "Меч Арея" читається сьогодні, в умовах нової війни за ідентичність? Що він говорить про тяглість
    української боротьби?'
  section: Дискусія та підсумок
  words: 800
focus: Іван Білик та його роман "Меч Арея", реконструкція готської доби IV ст., радянська цензура, історична правда та художня
  вигадка
