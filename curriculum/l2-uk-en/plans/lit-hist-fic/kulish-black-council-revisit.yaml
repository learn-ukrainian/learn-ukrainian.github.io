content_outline:
- points:
  - 'Провокаційне питання: Чому перший український історичний роман присвячений не перемозі, а поразці державницьких сил?'
  - Цитата з роману, що показує сліпу жорстокість «чорні», без прямого авторського осуду.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Чорна рада» — це романтичний твір про ідеалізоване козацтво чи реалістичний аналіз причин Руїни? Позиція самого
    Куліша vs. пізніші інтерпретації.'
  - 'Дебат 2: Чи був роман завжди в центрі канону? Як радянська критика намагалася «приручити» «Чорну раду», ігноруючи її
    державницький пафос.'
  - '[!epistemic-humility] Куліш сам кардинально змінював свої погляди на роман і козацтво, що ускладнює будь-яку однозначну
    інтерпретацію.'
  section: 'Конфліктна карта: Романтизм проти Історії'
  words: 900
- points:
  - 'Крупним планом: аналіз ключових уривків, що характеризують Якима Сомка як ідеального, але трагічно відірваного від народу
    лідера.'
  - 'Портрет Івана Брюховецького: демагог, популіст чи виразник справжніх народних прагнень? Аналіз його промов до «черні».'
  - 'Характери другого плану: Шрам, Кирило Тур, Петро — як вони представляють різні верстви та ідеали козацтва.'
  - '[!decolonization] Роман Куліша як свідома спроба створити український національний епос, що конкурує з імперським російським
    наративом про «Малоросію» і доводить власну історичну тяглість.'
  section: 'Читання: Образи Сомка та Брюховецького'
  words: 1700
- points:
  - Що Куліш взяв безпосередньо з «Літопису Самовидця» (основні події, персонажі), а що є цілковито художньою вигадкою (любовна
    лінія, характери).
  - 'Аналіз розбіжностей: чому Куліш «виправляє» або драматизує історію? Чи служить вигадка кращому розумінню епохи, чи спотворює
    її?'
  - '[!myth-buster] Руйнування міфу про «простий народ» як носія абсолютної правди. Куліш показує, як легко маніпулювати натовпом
    для досягнення влади.'
  - '[!epistemic-humility] Сам «Літопис Самовидця» не є об''єктивним джерелом, а представляє погляд старшинської еліти. Куліш
    працює з інтерпретацією інтерпретації.'
  section: 'Історія vs. Вигадка: Літопис Самовидця як відправна точка'
  words: 1200
- points:
  - 'Повернення до розминки: чи є «Чорна рада» романом про поразку? Аргументована відповідь студента на основі аналізу.'
  - 'Рецепція твору: як роман сприймали сучасники (від захоплення Шевченка до критики) і як його читають зараз, в умовах нової
    війни за державність.'
  - '[!anti-hagiography] Куліш не створює ікони. Навіть позитивні герої (Сомко) мають серйозні вади (гординя, зверхність),
    що призводять до трагедії.'
  - 'Фінальна дискусія: Які уроки «Чорної ради» є найболючішими та найактуальнішими для сучасної України?'
  section: Дискусія та підсумок
  words: 800
focus: Panteleimon Kulish's "Chorna Rada" (The Black Council) as the first Ukrainian historical novel, its relationship with
  Cossack chronicles, the romanticism vs. realism debate, and its role in shaping national identity.
level: LIT-HIST-FIC
module: lit-hist-fic-001
objectives:
- Аналізувати роман «Чорна рада» Пантелеймона Куліша в історичному та літературному контексті.
- Розрізняти історичний факт (на основі літописів) та художню вигадку в романі.
- Формулювати власну позицію в ключових літературознавчих дебатах навколо твору.
- Оцінювати вплив «Чорної ради» на формування українського національного наративу та історичної пам'яті.
