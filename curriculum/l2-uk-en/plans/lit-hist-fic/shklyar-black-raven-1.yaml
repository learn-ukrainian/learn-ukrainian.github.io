objectives:
- Аналізувати роман «Чорний Ворон» як історичне явище та літературний текст, розглядаючи його в контексті української визвольної
  боротьби ХХ століття.
- Розрізняти історичний факт та художню вигадку в романі, оцінюючи авторську стратегію та її вплив на читача.
- Формулювати власну аргументовану позицію щодо ролі «важкої» історичної прози у формуванні національної пам''яті та деколонізації
  свідомості.
- Критично оцінювати літературні дебати навколо твору, розглядаючи його з різних ідеологічних та естетичних позицій.
