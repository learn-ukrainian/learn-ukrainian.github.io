content_outline:
- points:
  - 'Провокація: «І найсолодшою мрією нашого життя була мрія про смерть — смерть ворожу». Цитата з роману. Як може мрія про
    смерть бути «найсолодшою»? Що це говорить про психологічний стан героїв?'
  - 'Таємниця: Чому успішне повстання у Холодному Яру, що тривало роками, було практично викреслене з радянської історії,
    а його учасники названі «бандитами»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Чорний Ворон» — це якісна історична проза чи політичний маніфест, замаскований під роман? Позиція критиків,
    що звинувачували Шкляра в надмірній ідеологізації та натуралізмі.'
  - 'Дебат 2: Місце в каноні. Чи є «Чорний Ворон» частиною «великої» української літератури, чи це феномен масової культури,
    популярність якого зумовлена політичним запитом суспільства, а не художньою цінністю?'
  - '[!epistemic-humility] Дискусія навколо Шевченківської премії, від якої автор відмовився, оголила конфлікт між «офіційним»
    і «народним» визнанням.'
  section: 'Конфліктна карта: Політика чи література?'
  words: 900
- points:
  - 'Уривок 1: Бойова сцена. Аналіз мови, стилістики, використання діалектизмів та історизмів для створення ефекту присутності.'
  - 'Уривок 2: Внутрішній монолог отамана Чорного Ворона. Як автор розкриває психологію людини, що щодня дивиться в очі смерті
    та несе відповідальність за життя інших.'
  - 'Система персонажів: Чорний Ворон як архетип українського воїна-одинака. Жіночі образи в романі — жертви чи рушійні сили?'
  - '[!decolonization] Роман повертає суб''єктність українським повстанцям, зображуючи їх не як пасивних жертв, а як активних
    борців, що мали власну політичну програму й вели війну за незалежність.'
  section: 'Читання: Уривки з роману «Чорний Ворон»'
  words: 1800
- points:
  - 'Що є історичним фактом: існування Холодноярської республіки, її лідери (брати Чучупаки), методи боротьби ЧК проти повстанців
    (спецоперація «Синдикат-2»).'
  - 'Що є художньою вигадкою: головний герой, отаман Чорний Ворон — це збірний образ, що уособлює багатьох реальних отаманів.
    Аналіз, навіщо автору знадобився цей прийом.'
  - '[!myth-buster] Роман руйнує радянський міф про «бандитів», але чи не створює він новий міф про «ідеальних героїв»? Аналіз
    жорстокості та неоднозначних вчинків повстанців у тексті.'
  - 'Документальна основа: автор працював в архівах СБУ. Як робота з першоджерелами вплинула на достовірність роману?'
  section: 'Історія vs. Вигадка: Холодноярська республіка'
  words: 1200
- points:
  - 'Повернення до розминки: що означає «мрія про смерть ворожу» в контексті філософії холодноярців?'
  - 'Рецепція роману: чому книга, написана у 2009 році, стала настільки актуальною після 2014-го? «Чорний Ворон» як «підручник»
    для нового покоління захисників України.'
  - '[!anti-hagiography] Роман не ідеалізує війну. Аналіз сцен, що показують її руйнівну силу, психологічні травми та моральні
    дилеми.'
  - 'Провокаційне питання для роздумів: чи може художній твір бути більш впливовим для формування історичної пам''яті, ніж
    праці професійних істориків? Аргументуйте свою позицію.'
  section: Дискусія та підсумок
  words: 700
focus: Роман Василя Шкляра «Чорний Ворон» (Залишинець), Холодноярська республіка, конфлікт історичної правди та художньої
  вигадки, деколонізація пам'яті про збройний опір
level: LIT-HIST-FIC
