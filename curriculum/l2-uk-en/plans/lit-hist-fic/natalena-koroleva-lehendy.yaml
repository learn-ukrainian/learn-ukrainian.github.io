content_outline:
- points:
  - 'Провокація: Як іспанська аристократка, що до 30 років не знала української, стала авторкою одного з найвишуканіших творів
    про княжий Київ? Що дає «погляд ззовні» для розуміння власної історії?'
  - 'Цитата: «Навесні земля знову прокидалась, пахла, і дихала, і жила, і кликала жити». — Чи цей опис належить до середземноморського
    пейзажу чи до берегів Дніпра? '
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чий Київ «справжніший»? Королевої — аристократичний, європейський, лицарський центр цивілізації. Чи народницький
    — селянський, православний, зосереджений на соціальних проблемах?'
  - 'Дебат 2: Чи є місце для Королевої в каноні? Аргументи «за»: унікальний голос, деколоніальний європейський вектор. Аргументи
    «проти»: відірваність від народної традиції, еміграційний статус, «нетиповість».'
  - '[!epistemic-humility] Немає «правильного» погляду на історію. Є різні оптики, що висвітлюють різні грані минулого. Завдання
    — зрозуміти, ЩО САМЕ робить видимим кожен із поглядів.'
  section: 'Конфліктна карта: Елітарне vs. Народницьке бачення історії'
  words: 900
- points:
  - 'Аналіз структури: легенда як жанр на межі історії, притчі та агіографії. Як Королева використовує цю форму для створення
    свого наративу?'
  - 'Стиль та мова: орнаментальна, архаїзована проза, що імітує літописний регістр, але з вишуканістю модернізму. Вплив латинської
    та західноєвропейської літератури (інтертекстуальність).'
  - 'Система образів: князі, святі, воїни та аскети. Як католицька оптика авторки змінює традиційні православні образи (напр.
    Ольга, Володимир)?'
  - '[!decolonization] Протиставлення Київської Русі як невід’ємної частини європейської цивілізації імперському міфу про
    «спільну колиску» трьох народів.'
  section: 'Читання: «Легенди старокиївські»'
  words: 1700
- points:
  - 'Документальна основа: на які літописи та історичні джерела спирається Королева?'
  - 'Художня вигадка: де авторка доповнює історичні лакуни? Аналіз легенди про хрещення Русі — чим її версія відрізняється
    від «Повісті минулих літ»?'
  - 'Вплив біографії: як її власне життя (іспанське походження, католицтво, життя в еміграції) вплинуло на інтерпретацію українського
    Середньовіччя?'
  - '[!myth-buster] Чи не створює Королева новий міф — про ідеалізований, «лицарський» Київ, очищений від історичної жорстокості
    та політичного прагматизму?'
  section: 'Історія vs. Вигадка: Католицька оптика на Київську Русь'
  words: 1200
- points:
  - 'Повернення до розминки: тож як саме «погляд ззовні» збагачує українську історичну прозу? Формулювання відповіді з опорою
    на текст.'
  - 'Рецепція: чому Королева була майже невідомою в УРСР і чому її «повернення» в 1990-х було таким важливим?'
  - 'Сучасне значення: наскільки актуальним сьогодні є її елітарний, європоцентричний погляд на історію України в контексті
    війни та боротьби за місце в європейській спільноті?'
  - '[!anti-hagiography] Критичний погляд: чи не є аристократизм Королевої формою ескапізму, втечі від складних соціальних
    питань української історії?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз «Легенд старокиївських» Наталени Королевої — унікального погляду іспанської аристократки на історію Київської
  Русі, її католицької інтерпретації та полеміки з народницькою традицією.
