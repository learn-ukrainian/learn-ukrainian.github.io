  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставити в речення терміни з модуля: орнаментальність, літописний, інтертекстуальність, аристократизм, еміграція.'
  focus: Стиль та поетика
  items: 5
  type: fill-in
- description: Порівняйте уривок з «Легенд старокиївських» про Ольгу та відповідний уривок з «Повісті минулих літ». Що Королева
    змінила, додала чи пропустила і з якою метою?
  focus: Історія vs. Вигадка
  type: note
- description: Наскільки погляд Наталени Королевої на Київську Русь як на частину Європи є актуальним для сучасної України?
    Напишіть есе (400-600 слів), де ви погодитеся або спростуєте цю тезу, використовуючи аргументи з модуля.
  focus: 'Есе: Європейський погляд сьогодні'
  type: note
