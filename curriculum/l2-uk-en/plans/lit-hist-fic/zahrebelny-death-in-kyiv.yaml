activity_hints:
- description: 'Кому належить теза: Загребельному-історику чи Загребельному-психологу? Оцінка позицій критиків щодо роману.'
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставити пропущені метафори та епітети з уривків роману, що аналізуються в модулі.
  focus: Стилістика та мова автора
  items: 6
  type: fill-in
- description: 'Наведено два уривки: з Іпатіївського літопису про смерть Юрія та з роману Загребельного. Визначте 3 ключові
    відмінності у зображенні подій та поясніть, з якою метою автор вдався до художньої вигадки.'
  focus: 'Джерельний аналіз: Літопис vs. Роман'
  type: note
- description: У романі Загребельного історія — це не набір фактів, а повторювана драма влади. Напишіть есе (400-600 слів),
    де ви доводите або спростовуєте цю тезу, використовуючи приклади з роману та сучасного життя.
  focus: 'Есе: Історія як попередження'
  type: note
