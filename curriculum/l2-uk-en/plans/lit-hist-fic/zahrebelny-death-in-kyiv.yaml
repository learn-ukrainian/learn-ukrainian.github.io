content_outline:
- points:
  - 'Провокація: Юрій Долгорукий — «основатель Москви» та київський князь. Чому кияни, за літописом, так раділи його смерті?'
  - 'Цитата з роману: «Влада — це самотність, помножена на підозру». Як це гасло визначає долю головних героїв?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Смерть у Києві» — це історичний роман чи психологічний трилер? Загребельний-історик проти Загребельного-психолога.'
  - 'Дебат 2: Роман написаний у 1973 році. Це спроба «олюднити» офіційну радянську історіографію чи прихована критика будь-якої
    авторитарної влади?'
  - '[!epistemic-humility] Загребельний сам визнавав, що «домислював» мотивацію героїв. Де проходить межа між реконструкцією
    та вигадкою?'
  section: 'Конфліктна карта: Історична правда проти художньої волі'
  words: 900
- points:
  - 'Аналіз ключової сцени: бенкет у Петрила та отруєння Юрія. Мова, деталі, психологічна напруга.'
  - 'Портрет влади: як Загребельний зображує механізми боротьби за київський престол?'
  - 'Стиль автора: барокова, метафорична мова як інструмент створення «ефекту епохи».'
  - '[!decolonization] Роман показує Київ XII століття як самостійний центр сили, а не як майбутню «колиску» трьох народів.
    Юрій Долгорукий тут — чужинець і загарбник.'
  section: 'Читання: Уривки з роману "Смерть у Києві"'
  words: 1700
- points:
  - 'Джерельна база: що ми знаємо про смерть Юрія з Іпатіївського літопису? Порівняння тексту літопису та тексту роману.'
  - 'Образ князя: ким був реальний Юрій Долгорукий? Агресивний завойовник, талановитий політик, засновник міст? Оцінка істориків.'
  - '[!myth-buster] Чи справді Загребельний «руйнує міфи»? Чи він створює новий, не менш потужний міф про «прокляття влади»?'
  - '[!epistemic-humility] Історичні джерела мовчать про особисті почуття героїв. Вся психологічна лінія роману — це авторська
    гіпотеза.'
  section: 'Історія vs. Вигадка: Юрій Долгорукий: літопис та роман'
  words: 1200
- points:
  - 'Повернення до розминки: тож чому кияни раділи смерті князя? Відповідь студента з опорою на роман та історичні факти.'
  - 'Рецепція твору: як роман сприймали в СРСР? Як його читають зараз, в контексті нової російської агресії?'
  - '[!anti-hagiography] Загребельний не створює «героїв» та «лиходіїв». Кожен персонаж має свою правду і свої гріхи. Чи згодні
    ви з такою оцінкою?'
  - 'Сучасна актуальність: чи є паралелі між боротьбою за владу в Києві XII століття та сучасною українською політикою?'
  section: Дискусія та підсумок
  words: 700
focus: Pavlo Zahrebelny's 'Death in Kyiv', Yuri Dolgorukiy, power struggles in 12th-c. Kyiv, historiography vs. historical
  fiction, Soviet-era deconstruction of official history
level: LIT-HIST-FIC
module: lit-hist-fic-007
objectives:
- Аналізувати роман "Смерть у Києві" як приклад історичної белетристики, розрізняючи документовані факти та авторську вигадку
- Критично оцінювати полеміку навколо історичної постаті Юрія Долгорукого, використовуючи як літературні, так і історичні
  джерела
- Розпізнавати та інтерпретувати стилістичні особливості прози Павла Загребельного
- Формулювати аргументовану позицію щодо ролі історичного роману в деконструкції імперських міфів та формуванні національної
  пам'яті
