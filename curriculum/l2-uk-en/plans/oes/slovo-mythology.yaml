content_outline:
- points:
  - 'Провокація: "Рища въ тропу Трояню чресъ поля на горы..." — Що це за «тропа Трояня» у "Слові"? Студент має висунути первинну
    гіпотезу.'
  - 'Лінгвістична загадка: Спроба розшифрувати значення фрази, спираючись виключно на знання сучасної української та інтуїцію.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Реальні боги чи поетичні метафори? Позиція Бориса Рибакова («повноцінний пантеон») vs. Дмитра Ліхачова («книжковість»
    та риторичні фігури).'
  - 'Дебат 2: Хто такий Троян? Римський імператор Траян (версія Романа Якобсона), скіфський бог, слов''янське триголовий божество
    чи уособлення диявола?'
  - '[!epistemic-humility] Жодна з гіпотез не має остаточних доказів. Робота з «темними місцями» тексту як основа медієвістики
    — демонстрація наукового методу в умовах неповноти даних.'
  - '[!decolonization] Виклик російській імперській традиції, що намагалася «християнізувати» або ігнорувати язичницький шар
    «Слова», применшуючи його значення для розуміння культури Русі.'
  section: 'Конфліктна карта: Інтерпретація язичницьких богів'
  words: 800
- points:
  - 'Читання уривку про Дива: «Дивъ кличетъ връху дрѣва...» — детальний розбір фрази, граматичний аналіз форми локатива «връху»
    та дієслова 3-ї особи однини «кличетъ».'
  - 'Читання уривку про Бояна, «внука» Велеса: «О Бояне, соловию стараго времени!... абы ты сиа плъкы ущекоталъ...» — аналіз
    вокатива (кличний відмінок), форм аориста та дієприкметників.'
  - 'Читання уривків про Трояна: «на землю Трояню», «вѣчи Трояни» — аналіз різних відмінкових форм, їх синтаксичної ролі та
    можливих інтерпретацій.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо відмінностей між давньосхіднослов'янською та церковнослов'янською
    лексикою у тексті.
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Іменник «Дивъ». Простеження праіндоєвропейського кореня *deiwos (бог) у різних мовах. Порівняльний
    аналіз з лат. deus, санскр. deva, лит. dievas.'
  - 'Етимологічна лабораторія: Іменник «Велесъ». Розбір конкуруючих етимологій: від «волость», «волос», «волхв». Оцінка лінгвістичної
    обґрунтованості кожної версії.'
  - 'Історико-лінгвістичний аналіз: «Троянъ». Чи могли спогади про римського імператора Траяна зберегтися в усній традиції
    східних слов''ян до XII ст.? Аргументи "за" і "проти".'
  - '[!myth-buster] Розвінчання «народних етимологій» та аматорських теорій (напр., з «Велесової книги»), протиставлення їм
    наукового компаративного методу.'
  section: 'Мовна лабораторія: Етимологічний слід язичницьких імен'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, «тропа Трояня» — це шлях бога, імператора чи алегорія? Студент формулює власну аргументовану
    гіпотезу на основі матеріалу модуля.'
  - 'Лінгвістичний висновок: Що наявність цих «темних місць» говорить про мовну ситуацію та світогляд у Русі XII ст.? Феномен
    двовір''я, взаємодія книжної та усної традицій.'
  - 'Зв''язок із сучасною українською: Які слова чи форми з проаналізованих уривків збереглися (напр., кличний відмінок),
    а які зникли (аорист, двоїна)?'
  section: Дискусія та підсумок
  words: 600
focus: 'The pagan stratum in "Slovo o polku Ihorevim": interpreting Veles, Div, Troyan, and the "ages of Troyan" through philological
  and linguistic analysis.'
level: OES
module: oes-085
objectives:
- Аналізувати основні філологічні дебати щодо язичницьких мотивів у «Слові о полку Ігоревім»
- Читати та перекладати фрагменти давньосхіднослов'янського тексту, виконуючи морфологічний та синтаксичний аналіз
- Застосовувати методи етимологічного аналізу для дослідження походження ключових теонімів (Велес, Див, Троян)
- Критично оцінювати джерела та відрізняти наукові гіпотези від псевдонаукових теорій у східнослов'янській медієвістиці
