  focus: Критичний аналіз гіпотези
  type: note
- description: Що «темні місця» та язичницькі алюзії «Слова» розповідають нам про феномен двовір'я та взаємодію книжної та
    усної культур у Київській Русі XII століття? (400-600 слів).
  focus: 'Есе: Мовний світ «Слова»'
  type: note
