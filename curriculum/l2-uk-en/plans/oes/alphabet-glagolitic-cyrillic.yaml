content_outline:
- points:
  - 'Провокація: на стіні Софії Київської XI ст. надряпано напис. Якою абеткою він зроблений — глаголицею чи кирилицею? І
    що це говорить про те, хто його написав?'
  - 'Фрагмент реального графіті: "а б в г д є ж s з и і к л м н о п р с т оу ф х ѡ ц ч ш щ ъ ы ь ѣ ю я ѫ ѭ ѥ ѧ ѩ ѱ ѳ ѵ". Студент
    має спробувати "прочитати" та знайти "зайві" літери.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була глаголиця першою абеткою Русі? Аргументи "за" (давність, зв''язок з Моравською місією) та "проти" (обмежене
    поширення, швидке витіснення кирилицею).'
  - 'Дебат 2: Графіті Софії Київської — це доказ співіснування двох абеток чи свідчення конфлікту писемних шкіл? [!epistemic-humility]
    Точне датування та інтерпретація написів є предметом гострих суперечок.'
  - '[!decolonization] Твердження російської історіографії про кирилицю як єдину "справжню" абетку Русі, а глаголицю — як
    маргінальний "західний" вплив, є політично мотивованим спрощенням.'
  - 'Палеографічний аналіз: порівняння накреслення літер у Софійських графіті з іншими пам''ятками (Остромирове Євангеліє,
    новгородські берестяні грамоти).'
  section: 'Конфліктна карта: Глаголиця vs Кирилиця в Київській Русі'
  words: 800
- points:
  - 'Первинне джерело: Добірка графіті XI-XII ст. зі стін Софії Київської (написи про смерть Ярослава, купівлю землі, приватні
    молитви).'
  - 'Оригінальний текст (нормалізована кирилиця): "Господи помози рабу своєму [...]".'
  - 'Пофразовий глос: "Господи" (vocative sg.) "помози" (aorist 2nd sg.) "рабу" (dative sg.) "своєму" (dative sg.).'
  - 'Граматичний парсинг: аналіз форм кличного відмінка, аориста, давального відмінка, що відрізняються від сучасних українських.'
  - 'Паралельний переклад сучасною українською: "Господи, допоможи рабові своєму [...]".'
  - '[!decolonization] Нотатки: розрізнення церковнослов''янських (книжних) та давньосхіднослов''янських (розмовних) рис у
    написах. Це мова наших предків, а не "давньоруська".'
  section: 'Текст: Читання та переклад "Софійських" графіті'
  words: 1700
- points:
  - 'Палеографія: аналіз уставного та напівуставного письма Софійських графіті. Форми літер (наприклад, "омега", "юси"), використання
    титл для скорочень.'
  - 'Вправа: студент отримує зображення кількох графіті і має класифікувати їх за типом письма та спробувати транскрибувати.'
  - 'Історична фонетика: як правопис графіті відображає мовні процеси? Пошук прикладів, що вказують на падіння редукованих
    (єрів), початок ствердіння шиплячих, долю носових голосних.'
  - 'Етимологічний ланцюжок: простежити еволюцію слова з напису, наприклад, "земля" (д.-сх.-сл.) → "земля" (ст.-укр.) → "земля"
    (суч. укр.), аналізуючи зміни у вимові та значенні.'
  - '[!myth-buster] Абетка — це не просто набір літер, а "зліпок" фонетичної системи мови в певний період. Зміни в абетці
    (зникнення "юсів", "єрів") — це результат глибинних мовних змін.'
  section: 'Мовна лабораторія: Палеографія та історична фонетика'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може повністю розшифрувати абетку та пояснити функцію кожної "незрозумілої" літери.'
  - 'Лінгвістичний висновок: що графіті Софії Київської говорять нам про мовну ситуацію в столиці Русі XI століття? (білінгвізм,
    диглосія, варіативність).'
  - 'Зв''язок із сучасністю: які літери кирилиці зникли з української абетки і чому? (напр., Ѣ, Ы). Які реформи абетки відбувалися
    в XX столітті?'
  - 'Кінцеве питання: чи можна вважати створення абетки політичним актом?'
  section: Дискусія та підсумок
  words: 600
focus: The Glagolitic and Cyrillic graffiti in St. Sophia of Kyiv, philological debates on their dating and relationship,
  and the linguistic features they reveal about early East Slavic.
level: OES
module: oes-002
objectives:
- Аналізувати палеографічні та лінгвістичні особливості графіті Софії Київської XI-XII ст.
- Розрізняти основні тези в науковій дискусії про походження та співіснування глаголиці та кирилиці на Русі.
- Виконувати базовий граматичний та фонетичний аналіз коротких давньосхіднослов'янських текстів (написів).
- Критично оцінювати роль писемності як маркера культурної та політичної ідентичності в середньовічному суспільстві.
