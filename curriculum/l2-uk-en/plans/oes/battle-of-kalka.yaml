content_outline:
- points:
  - 'Провокація: «Придоша езыци незнаеми». Хто ці «незнаємі люди» в тексті літопису? Що ця фраза говорить про світогляд автора?'
  - Студент намагається розшифрувати короткий фрагмент з літопису про першу зустріч з монголами, використовуючи знання сучасної
    української.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Звідки літописець знав про битву? Аналіз джерел — чи це розповідь очевидця, чи пізніша компіляція з південних
    (київських) та північних (суздальських) ізводів.'
  - 'Дебат 2: Хто ворог? Проблема ідентифікації «татар» у тексті. Як літописець розрізняє етнічну, релігійну та політичну
    ідентичність. Чи є «погані» синонімом до «половці» чи це новий термін?'
  - '[!decolonization] Оскарження російської імперської традиції, що монополізувала спадщину Русі. Текст належить всім східним
    слов''янам. Термін «Давня Русь» vs «Київська Русь».'
  - '[!epistemic-humility] Брак єдиного джерела та суперечливі деталі в різних списках літопису не дозволяють створити одну
    «канонічну» версію подій.'
  section: 'Конфліктна карта: Джерела та інтерпретації'
  words: 800
- points:
  - 'Основний матеріал: розлогий уривок з Іпатіївського або Лаврентіївського літопису про битву на Калці (рік 1223).'
  - Текст подається в оригіналі з паралельним рядковим перекладом сучасною українською мовою.
  - 'Детальний граматичний розбір ключових дієслівних форм: аорист (`приидоша`, `рекоша`), імперфект, дієприкметники.'
  - 'Лексичний коментар: військова лексика (`полкъ`, `січа`), назви народів (`половци`, `татары`), церковнослов''янізми vs
    народна мова.'
  - '[!decolonization] Порівняння з тим, як цю ж подію описують пізніші московські літописи — аналіз зміщення акцентів.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: таблиці парадигм аориста та імперфекта для ключових дієслів з тексту. Студент вчиться розрізняти
    ці форми та розуміти їх аспектне значення (завершена дія vs процес).'
  - Вправи на ідентифікацію та переклад речень з аористом та імперфектом.
  - 'Етимологічний слід: простежуємо еволюцію слова «полк» від його значення в тексті (народ, військо) до сучасного українського
    «полк».'
  - '[!myth-buster] Давньосхіднослов''янська граматика не «простіша», а інакша. Складна система минулих часів (аорист, імперфект,
    перфект, плюсквамперфект) свідчить про високий рівень абстрактного мислення, а не про «примітивність».'
  section: 'Мовна лабораторія: Аорист і дієприкметники'
  words: 1700
- points:
  - 'Повернення до розминки: що тепер означає фраза «Придоша езыци незнаеми» для студента? Повний лінгвістичний та історичний
    аналіз.'
  - 'Головний лінгвістичний висновок: Як використання аориста формує динамічний, подієвий наратив літопису?'
  - 'Зв''язок із сучасністю: що сталося з аористом та імперфектом в українській мові? Як їхні функції перебрав на себе сучасний
    минулий час?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз розповіді про битву на Калці (1223) за літописними джерелами; філологічні дебати щодо інтерпретації тексту;
  лінгвістичний аналіз давньосхіднослов'янських дієслівних форм (аорист, імперфект).
