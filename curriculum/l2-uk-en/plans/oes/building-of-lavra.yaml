content_outline:
- points:
  - 'Провокація: «І прийшли майстри грецькі...» — божественне чудо чи стандартний візантійський контракт на будівництво? Подано
    короткий уривок з Патерика без коментарів.'
  - 'Завдання: спробуйте перекласти фрагмент, спираючись на знання сучасної української. Які слова ви впізнали? Які форми
    здаються дивними?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Достовірність розповіді. Чи є розповідь про будівництво собору історичним записом, чи це агіографічна легенда,
    створена для прославлення монастиря? [!epistemic-humility]'
  - 'Дебат 2: Мова Патерика. Це церковнослов’янська мова, чи в тексті є виразні риси давньосхіднослов’янської народної мови
    (протоукраїнської)? [!decolonization] Виклик тезі про «давньоруську» єдність мови.'
  - 'Позиція 1 (А. Шахматов): Патерик — це компіляція, де історичне ядро обросло легендарними шарами.'
  - 'Позиція 2 (Д. Абрамович): Патерик — це насамперед літературний твір, який не мав на меті документальну точність.'
  section: 'Конфліктна карта: Патерик як історичне джерело'
  words: 800
- points:
  - 'Оригінальний текст: Розповідь з Патерика про прихід грецьких майстрів до Антонія і Феодосія.'
  - 'Пофразовий глос: «поставити камену» — збудувати кам’яну; «въ образъ Влахерньской» — за зразком Влахернської церкви.'
  - 'Граматичний розбір: аналіз форм аориста (придоша, ркоша), імперфекта, двоїни (в руку ваю), які вживаються в тексті.'
  - 'Паралельний переклад: Порівняння оригінального тексту з сучасним українським науковим перекладом.'
  - '[!decolonization] Примітка про термінологію: «Русь» у тексті означає Київську митрополію, а не сучасну Росію.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: детальний аналіз відмінювання іменників, що означають будівельні матеріали (камы, плинѳъ) у тексті.'
  - 'Етимологічний слід: простежуємо шлях слів від OES до сучасної української: церькы → церква; градъ → город → місто; злато
    → золото.'
  - 'Лексична скарбниця: аналіз спеціалізованої «архітектурної» та «чудотворної» лексики в тексті (зодчий, основание, знаменіє,
    чудо).'
  - '[!myth-buster] Чи справді «плінфа» — це просто «цегла»? Розбираємо відмінності у значенні та технології.'
  section: 'Мовна лабораторія: Архітектурна лексика та її еволюція'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може дати повний переклад і граматичний коментар до уривку.'
  - 'Відповідь на провокацію: спираючись на матеріал модуля, студент формулює аргументовану відповідь — наскільки розповідь
    є чудом, а наскільки — типовим візантійським будівельним проєктом.'
  - 'Лінгвістичний висновок: що цей текст говорить нам про стан мови в Києві XI століття? Які риси вказують на живу народну
    мову, а які — на книжну традицію?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз розповіді про будівництво Успенського собору в Києво-Печерському патерику. Філологічний аналіз, розрізнення
  агіографії та історії, мовні особливості тексту.
