- description: 'Надано уривок з Патерика та короткий звіт про археологічні дослідження Успенського собору. Порівняйте: що
    підтверджується, що спростовується, а що залишається відкритим питанням?'
  focus: 'Джерельний аналіз: Патерик vs археологія'
  type: note
- description: На основі аналізу тексту «Будівництво Лаври», напишіть есе (400-600 слів) про те, якою була мовна ситуація
    в Києві часів Ярославичів. Яку роль відігравали церковнослов’янська та місцева народна мова?
  focus: 'Есе: Мовний портрет Києва XI століття'
  type: note
