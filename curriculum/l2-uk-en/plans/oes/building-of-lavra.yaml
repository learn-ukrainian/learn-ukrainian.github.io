objectives:
- Аналізувати фрагмент Києво-Печерського патерика як історичне та лінгвістичне джерело
- Розрізняти агіографічний наратив та спроби історичної реконструкції
- Ідентифікувати та пояснювати ключові граматичні риси давньосхіднослов'янського тексту (аорист, двоїна)
- Простежувати еволюцію української будівельної лексики від XI століття до сучасності
