content_outline:
- points:
  - 'Провокація: Прочитайте цей уривок давньосхіднослов''янською: "Се бо не въ полу половѣцькѣ испепелѣють, нъ въ...". Це
    з літопису, закону чи чогось іншого?'
  - 'Загадка: що спільного між промовою на похороні князя, листом до монаха та описом паломництва? Відповідь — мова, але яка
    саме?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чому ми знаємо "Слово о полку Ігоревім", але не "Послання" Климента Смолятича? Дискусія про формування літературного
    канону — результат художньої цінності чи історичної випадковості?'
  - 'Дебат 2: Чи є "малі" тексти (промови, листи) більш репрезентативними для розмовної мови, ніж офіціозні літописи? Де шукати
    справжню мову Києва?'
  - '[!decolonization] Виклик російській наративі, що привласнює весь канон. Ці тексти — спільна спадщина, і багато з них
    показують унікальні риси, що розвинулись в українську мову.'
  - '[!epistemic-humility] Ми маємо лише фрагменти. Чи можемо ми робити висновки про всю літературу на основі того, що випадково
    збереглося?'
  section: 'Конфліктна карта: Канон vs Периферія'
  words: 800
- points:
  - 'Приклад: "Слово про закон і благодать" Іларіона або "Повчання" Володимира Мономаха як приклад дидактичної прози.'
  - Оригінальний текст (уривок) з нормалізованою орфографією.
  - 'Послівний глосарій: розбір кожного слова, його граматичної форми та значення.'
  - 'Граматичний парсинг: визначення складних форм, як-от аорист, імперфект, двоїна, дієприкметники.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо розбіжностей у синтаксисі та лексиці.
  - 'Аналіз: риторичні фігури, біблійні алюзії, відмінності між церковнослов''янськими та місцевими мовними елементами.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Порівняльний стіл: уривок з "Руської Правди" (юридичний регістр), уривок з промови Іларіона (гомілетичний/високий регістр),
    уривок з берестяної грамоти (побутовий регістр).'
  - 'Лексичний аналіз: порівняння частки церковнослов''янізмів, юридичних термінів та побутової лексики в кожному тексті.'
  - 'Синтаксичний аналіз: прості речення в грамотах vs складні періоди в промовах. Як структура речення відображає функцію
    тексту?'
  - '[!myth-buster] Давньосхіднослов''янська мова не була монолітною. Це був "лінгвістичний екосистем", де співіснували різні
    стилі, регістри та норми.'
  - 'Вправа: студенти отримують анонімні уривки і мають визначити, до якого жанру/регістру вони належать, обґрунтовуючи свою
    думку.'
  section: 'Мовна лабораторія: Аналіз стилістичних регістрів'
  words: 1700
- points:
  - 'Повернення до розминки: тепер студент може не лише ідентифікувати жанр уривка, але й описати його стилістичні особливості.'
  - 'Головний висновок: багатство і розмаїття літератури Київської Русі виходить далеко за межі "великої трійки". Це розмаїття
    — основа української літературної традиції.'
  - 'Зв''язок із сучасністю: як поняття мовного регістру працює в сучасній українській мові? (напр., мова законів, мова поезії,
    мова соцмереж).'
  section: Дискусія та підсумок
  words: 600
focus: Miscellaneous XI-XIII century texts — epistles, funeral orations, didactic prose — showing the breadth of early Ukrainian
  writing
level: OES
module: oes-099
objectives:
- Критично аналізувати поняття "літературного канону" та його формування в контексті давньої літератури
- Виконувати філологічний розбір (читання, переклад, граматичний аналіз) автентичного тексту XI-XIII століття
- Порівнювати та розрізняти мовні регістри (юридичний, гомілетичний, епістолярний) у давньосхіднослов'янських текстах
- Ідентифікувати та пояснювати функціонування церковнослов'янських та місцевих мовних елементів у першоджерелах
