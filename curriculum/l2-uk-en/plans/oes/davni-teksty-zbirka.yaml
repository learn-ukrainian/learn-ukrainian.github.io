activity_hints:
- description: Чия це теза — прихильників "канону" чи "периферії"? Визначити позицію за цитатою.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Ідентифікувати аорист, двоїну та інші архаїчні форми в уривках з "Повчання" Мономаха.
  focus: Граматичні форми в тексті
  items: 5
  type: fill-in
- description: 'Подано два тексти: уривок з "Руської Правди" та уривок з промови Іларіона. Порівняйте їх лексику та синтаксис.
    Які висновки можна зробити про їхні функції?'
  focus: 'Джерельний аналіз: порівняння регістрів'
  type: note
- description: 'На основі вивчених текстів напишіть есе на тему: "Що ми дізнаємося про суспільство та цінності Київської Русі
    з текстів, які не є літописами чи епосом?" (400-600 слів).'
  focus: 'Есе: Що "малі жанри" розповідають про культуру?'
  type: note
cefr_min: C2
connects_to:
