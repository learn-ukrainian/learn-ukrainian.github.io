activity_hints:
- description: Визначити, яка з тез належить до історичного аналізу, а яка — до лінгвістичного, щодо наративу про помсту Ольги.
  focus: Розуміння філологічних дебатів
  items: 4
  type: quiz
- description: Заповнити пропуски в реченнях з тексту ПВЛ, вибравши правильну форму дієслова — аорист або імперфект — залежно
    від контексту (дія чи стан).
  focus: Аорист та Імперфект
  items: 6
  type: fill-in
- description: Порівняйте опис злочину (вбивство Ігоря) та покарання (помста Ольги) в ПВЛ із тим, як би ці дії кваліфікувалися
    в сучасному праві. Що це говорить про еволюцію поняття "справедливість"?
  focus: 'Порівняльний аналіз: ПВЛ vs. сучасний юридичний кодекс'
  type: note
- description: 'На основі "Мовної лабораторії" напишіть есе (400-600 слів) на тему: "Як літописець використовує аорист та
    імперфект для характеристики Ольги як мудрого та рішучого правителя?".'
  focus: 'Есе: Наративна функція минулих часів'
  type: note
cefr_min: C2
connects_to:
- pvl-sviatoslav
content_outline:
- points:
  - 'Провокація: “и рече имъ Олга: уже мьщена есмь” — Ольга каже, що вже помстилася. Але це лише початок. Що насправді означає
    ця фраза в контексті її чотирьох помст?'
  - 'Задача на декодування: “послаша Деревляне лучьшии мужи” — хто і куди послав “кращих мужів” і з якою метою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чотири помсти Ольги — це точний історичний звіт чи фольклорна структура, що символізує чотири сторони світу
    або чотири стихії? [!epistemic-humility] Історики сперечаються, наскільки буквально можна читати цей епізод.'
  - 'Дебат 2: Мова Помсти Ольги — це жива давньосхіднослов''янська розмовна мова чи книжковий, церковнослов''янський стиль?
    [!decolonization] Дискусія про те, чи є в тексті суто протоукраїнські риси, що відрізняють його від спільного східнослов''янського
    підґрунтя.'
  section: 'Конфліктна карта: Історичний факт чи фольклорний мотив?'
  words: 800
- points:
  - 'Оригінальний текст з ПВЛ: перша помста (закопування послів), друга помста (спалення в бані), третя помста (вбивство на
    тризні).'
  - 'Пофразовий глос: розбір кожної фрази з лексичним та граматичним коментарем.'
  - 'Граматичний парсинг: детальний аналіз дієслівних форм (аорист, імперфект, перфект) для кожної дії.'
  - Паралельний переклад сучасною українською мовою для порівняння.
  - '[!decolonization] Примітки про церковнослов''янізми vs. вернакулярні (народні) форми в тексті, що показує мовну реальність,
    відмінну від імперського наративу "давньоруської мови".'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Теорія: Що таке аорист і імперфект? Як вони виражали аспект у давньосхіднослов''янській мові до появи сучасних доконаного/недоконаного
    видів.'
  - 'Практикум 1 (Імперфект): Аналіз уривків, де Ольга планує або обдумує помсту. Дієслова описують незавершену, тривалу дію
    в минулому (вона "хотіла", "думала").'
  - 'Практикум 2 (Аорист): Аналіз уривків, що описують самі акти помсти — швидкі, одноразові, завершені дії. "Рекоша" (сказали),
    "погребоша" (поховали), "запалиша" (запалили).'
  - '[!myth-buster] Руйнування міфу, що давня мова була "простішою". Складна система минулих часів (аорист, імперфект, перфект,
    плюсквамперфект) була багатшою за сучасну українську, але виражала інші смислові відтінки.'
  section: 'Мовна лабораторія: Аорист vs Імперфект — дія проти стану'
  words: 1700
- points:
  - 'Повернення до розминки: аналіз фрази “уже мьщена есмь” з точки зору перфекта, що означає стан-результат, а не завершення
    всього плану.'
  - 'Лінгвістичний висновок: Як використання аориста та імперфекта створює наративну напругу в тексті? Автор свідомо протиставляє
    тривалий стан (планування) та миттєву дію (виконання).'
  - 'Зв''язок із сучасною українською: Як аорист та імперфект "вимерли", але їхня функція (вираження аспекту) перейшла до
    сучасної системи доконаного/недоконаного виду? На прикладі дієслів з тексту.'
  section: Дискусія та підсумок
  words: 600
focus: 'Аорист та імперфект у розповіді: планування (імперфект) та реалізація (аорист) помсти'
level: OES
module: oes-029
objectives:
- Розрізняти та аналізувати вживання аориста та імперфекта в оригінальному тексті ПВЛ для розуміння наративної стратегії літописця
- Критично оцінювати епізод "Помста Ольги" з точки зору історичної та філологічної дискусій (факт vs. фольклор, вернакуляр
  vs. церковнослов'янська)
- Читати та перекладати фрагмент тексту ПВЛ з повним граматичним та лексичним коментарем
- Пояснювати еволюцію вираження аспекту від системи минулих часів давньосхіднослов'янської до сучасної видової системи української
  мови
