content_outline:
- points:
  - 'Провокація: "Аже оубьють смерда любо холопа, за 5 гривенъ". Чому життя смерда в Руській Правді оцінюється так само, як
    життя раба, але в 16 разів дешевше, ніж життя княжого дружинника?'
  - 'Спробуйте розшифрувати фразу: "А иже смердъ моучить, а безъ княжа слова..." — про яке право тут ідеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історіографія): Смерди — це напіввільні селяни, що сидять на державній землі (ключова теза радянської історіографії,
    Б. Греков), чи це загальна назва для всього "простого" населення, включно з вільними общинниками (позиція М. Грушевського,
    пізніше розвинена в працях П. Толочка)?'
  - 'Дебат 2 (Лінгвістика/Етимологія): Походження слова "смерд". Версія 1: від індоєвропейського *smer-d- (той, що залежить),
    вказуючи на підлеглий статус. Версія 2 (народна етимологія): від дієслова "смердіти" як принизлива назва для підкореного
    населення. Чому друга версія є менш науковою?'
  - '[!decolonization] Розвінчання радянського марксистського підходу, який штучно намагався втиснути соціальну структуру
    Русі в європейську феодальну модель "сеньйор-васал-кріпак". Структура Русі була іншою: князь, дружина, вільні общинники,
    різні категорії залежних людей.'
  - '[!epistemic-humility] Джерела (Руська Правда) дають лише фрагментарну картину. Ми бачимо смерда через призму злочину
    та покарання, але майже нічого не знаємо про його побут, вірування, самосвідомість.'
  section: 'Конфліктна карта: Статус смерда'
  words: 800
- points:
  - Аналіз статей 11-18 та 26-28 Короткої редакції Руської Правди (Правди Ярославичів).
  - 'Оригінальний текст: "А иже оубиеть княжа моужа ... 80 гривенъ ... Аще ли боудеть закупа, любо бочьвиникъ, любо сельскыи
    староста, то 12 гривенъ. А за смердии холопъ 5 гривенъ, а за робѹ 6 гривенъ."'
  - 'Пофразовий глосинг: розбір конструкцій "А иже оубиеть" (Умовне речення), "княжа моужа" (Присвійний прикметник + знахідний
    відмінок), "80 гривенъ" (числівник + родовий відмінок).'
  - 'Граматичний парсинг: форми аориста (оубиеть), інфінітива, відмінкові закінчення іменників чоловічого та жіночого роду
    (моужа, гривенъ, робѹ).'
  - Паралельний переклад сучасною українською мовою з коментарями щодо юридичних нюансів.
  - '[!decolonization] Акцент на термінах "давньосхіднослов''янська мова" та "право Київської Русі", уникнення імперського
    конструкту "Древняя Русь" та "древнерусский язык".'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Відмінювання іменників різних соціальних категорій (моужь, смердъ, холопъ, роба, кнѧзь). Аналіз
    таблиці штрафів як вправа на розпізнавання відмінкових форм та їх функцій.'
  - 'Етимологічна лабораторія: Простежити еволюцію слів: "гривна" (прикраса на шию → грошова одиниця), "вира" (штраф за вбивство),
    "закупъ" (боржник), "правда" (звичай → закон → істина).'
  - 'Фонологічна лабораторія: Сліди "падіння єрів" у тексті. Чому "холопъ", але в родовому "холопа"? Розбір на прикладах з
    Руської Правди.'
  - '[!myth-buster] Руська Правда — це не "конституція", а кодифікація звичаєвого права, що фіксувала вже існуючі норми. Її
    мова — це жива юридична мова того часу, а не абстрактна теорія.'
  section: 'Мовна лабораторія: Юридична лексика та відмінювання'
  words: 1700
- points:
  - 'Повернення до розминки: Чи можна тепер дати однозначну відповідь про статус смерда — вільний він чи раб? Формулювання
    відповіді на основі аналізу джерел.'
  - 'Лінгвістичний висновок: Як мова Руської Правди відображає соціальну ієрархію? Що ми можемо сказати про суспільство, в
    якому штраф за образу бороди є важливішим за життя залежної людини?'
  - 'Зв''язок із сучасністю: Поняття "правда" і "справедливість" в українській мові та культурі. Який шлях пройшли ці поняття
    від часів Руської Правди до сьогодні?'
  section: Дискусія та підсумок
  words: 600
focus: Правовий та соціальний статус смердів у Київській Русі через призму статей Руської Правди, філологічні дебати та лінгвістичний
  аналіз джерел.
level: OES
module: oes-060
objectives:
- Аналізувати оригінальний текст Руської Правди, розпізнаючи ключові юридичні терміни та граматичні форми давньосхіднослов'янської
  мови.
- Критично оцінювати різні історіографічні та лінгвістичні теорії щодо статусу смердів, розрізняючи наукові гіпотези та ідеологічні
  конструкції.
- Простежувати етимологію та семантичну еволюцію ключових слів (гривна, правда, смерд) від давнини до сучасності.
- Формулювати аргументовану позицію щодо соціальної структури Київської Русі, спираючись на першоджерела.
