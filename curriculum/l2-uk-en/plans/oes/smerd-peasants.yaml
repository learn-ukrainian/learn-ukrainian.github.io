vocabulary_hints:
- definition: у Київській Русі — селянин, що сидів на державній/князівській землі і мав певну правову дієздатність, але був
    обмежений у правах порівняно з вільними общинниками та дружинниками.
  pos: ч.
  word: смерд
- definition: збірник стародавнього права Київської Русі XI–XII ст., основне джерело для вивчення соціальних, економічних
    та правових відносин того часу.
  pos: ж.
  word: Руська Правда
- definition: у Руській Правді — великий грошовий штраф за вбивство вільної людини.
  pos: ж.
  word: вира
- definition: основна грошова та вагова одиниця в Київській Русі, спочатку — срібний злиток або шийна прикраса.
  pos: ж.
  word: гривна
- definition: категорія залежного населення, людина, що потрапила в тимчасову боргову кабалу і мусила працювати на кредитора
    до виплати боргу ("купи").
  pos: ч.
  word: закуп
- definition: особа, що перебувала у повній власності свого пана; раб.
  pos: ч.
  word: холоп
- definition: форма минулого часу дієслова, що позначала коротку, завершену дію в минулому; одна з характерних рис давньосхіднослов'янської
    мови.
  pos: ч.
  word: аорист
- definition: одна з ключових фонологічних змін у слов'янських мовах (X-XIII ст.), коли надкороткі голосні ъ та ь або зникли,
    або перейшли в голосні повного творення (о, е).
