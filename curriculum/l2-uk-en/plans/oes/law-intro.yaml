connects_to:
- note: Наступний модуль, що розглядає до-правові форми помсти (кровна помста), які обмежувала Руська Правда
  slug: murder-blood-revenge
content_outline:
- points:
  - 'Провокація: «Аще кто убьєть кнѧжа мужа...» — один із перших законів Руської Правди. Як ви думаєте, яка кара чекала на
    вбивцю? А якщо вбитий — простий селянин? Чому різниця?'
  - 'Слово-загадка: сучасне слово «урок» походить від давньосхіднослов''янського «урóкъ». Яке з його давніх значень збереглося
    у фразі «це для мене буде уроком»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Звідки походить Руська Правда? Теорії про скандинавський (варязький) вплив vs теорія про автохтонне слов''янське
    звичаєве право.'
  - 'Дебат 2: Це єдиний кодекс чи механічне об''єднання різних правових норм (статутів, княжих уставів, прецедентів) протягом
    століть?'
  - '[!decolonization] Термін «Давньоруська держава» та «Давньоруське право» — імперський конструкт. Коректно — «Руська Правда»,
    право середньовічної Русі, спільної спадщини українців, білорусів та росіян.'
  - '[!epistemic-humility] Ми не маємо оригіналу Руської Правди, лише пізніші списки (XV ст.). Наскільки переписувачі змінили
    текст, додаючи власні норми?'
  section: 'Конфліктна карта: Правда: Звід законів чи збірка прецедентів?'
  words: 800
- points:
  - 'Оригінальний текст: Фрагменти Короткої та Розширеної редакцій Руської Правди, що містять умовні конструкції з «аще» (статті
    про вбивство, крадіжку, тілесні ушкодження).'
  - 'Послівний глосарій: розбір ключових юридичних термінів: «вира» (штраф), «потокъ» (конфіскація та вигнання), «головникъ»
    (вбивця), «послухъ» (свідок).'
  - 'Граматичний розбір: аналіз синтаксичної структури «Аще... то...». Розбір форм аориста та імперфекта в юридичному контексті.'
  - 'Паралельний переклад: порівняння оригінального тексту з сучасним українським академічним перекладом, виявлення семантичних
    зсувів.'
  - '[!decolonization] Чому російські переклади часто використовують архаїзми, що імітують церковнослов''янську, а українські
    — більш модернізовану юридичну лексику?'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Детальний аналіз умовних речень. Види умов: реальна (аще + індикатив) та потенційна/ірреальна.
    Як OES виражала умову до появи сполучника «якщо»?'
  - 'Порівняльна етимологія: Трасування лексем «правда» (істина → закон), «законъ» (те, що за коном/межею → правило), «судъ».
    Як їх значення змінилися до сьогодні?'
  - 'Вправа: Студент отримує набір слів (злочин, кара, суб''єкт) і має самостійно скласти юридичну норму за зразком Руської
    Правди, використовуючи «аще».'
  - '[!myth-buster] Уявлення про «темні віки» спростовується складною та структурованою мовою права. Руська Правда — доказ
    високого рівня абстрактного мислення.'
  section: 'Мовна лабораторія: Синтаксис умови в "аще"-реченнях'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер, знаючи про систему штрафів («вир»), студент дає обґрунтовану відповідь про різницю в покаранні
    за вбивство княжого мужа та простолюдина.'
  - 'Лінгвістичний висновок: Як структура «аще»-речень відображає логіку причинно-наслідкових зв''язків у середньовічній правосвідомості?'
  - 'Зв''язок із сучасністю: Чи існують у сучасній українській мові залишки правових формул Руської Правди? (наприклад, фразеологізми).'
  section: Дискусія та підсумок
  words: 600
focus: The concepts of Pravda, Zakon, and Sud in early legal texts like the Ruska Pravda, with a linguistic focus on conditional
  "ashche" (if) clauses.
level: OES
module: oes-049
objectives:
- Аналізувати ключові юридичні поняття Русі («правда», «закон», «суд», «вира») в їхньому історичному контексті
- Читати та перекладати уривки з Руської Правди, розбираючи умовні конструкції з «аще»
- Критично оцінювати різні історіографічні та лінгвістичні підходи до вивчення Руської Правди, зокрема в контексті деколонізації
- Пояснювати, як мова закону відображає соціальну структуру та правосвідомість середньовічного суспільства
pedagogy: CBI
