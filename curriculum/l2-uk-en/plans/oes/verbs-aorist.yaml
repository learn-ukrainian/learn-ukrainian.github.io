content_outline:
- points:
  - 'Провокація: Дано два речення: 1) «Ігор полки заверну» (OES, аорист) та 2) «Ігор полки завернув» (Mod. Ua, минулий час).
    Що означає перше речення? Чому дієслова виглядають так по-різному, хоча роблять те саме?'
  - Студент намагається розшифрувати значення аористної форми «заверну», спираючись на знання сучасної української.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Якою була справжня функція аориста? Теорія «пунктуальності» (миттєва дія) vs теорія «наративної рамки» (подія,
    що рухає сюжет вперед). Чи був аорист просто "зробив" — чи щось більше?'
  - 'Дебат 2: Чому аорист зник зі східнослов''янських мов, але зберігся у південнослов''янських? Аргументи «за»: внутрішні
    фонологічні зміни, що зруйнували парадигму. Аргументи «проти»: зовнішні фактори, переструктурування всієї системи часу.'
  - '[!decolonization] Виклик наративу про «спрощення» мови. Занепад аориста — це не деградація, а масштабна перебудова системи
    минулого часу, де функції аориста/імперфекта перебрала на себе нова система виду (доконаний/недоконаний).'
  - '[!epistemic-humility] Ми реконструюємо значення з обмеженої кількості текстів. Жоден лінгвіст не може запитати у Нестора
    Літописця, що саме він мав на увазі, вживаючи аорист. Наші знання — це інтерпретація, а не факт.'
  section: 'Конфліктна карта: Аорист — втрачений час чи прихований вплив?'
  words: 800
- points:
  - 'Оригінальний уривок з Повісті временних літ (розповідь про смерть Олега): «И рече Олегъ... и посмѣꙗсꙗ... и приїха на
    мѣсто... и видѣ кости... и настꙋпи на лобъ... и вьісѣче змиꙗ и оужали... И с того разболѣсꙗ и оумре».'
  - 'Послівний переклад з граматичним коментарем: `рече` (він сказав, 3 ос. одн. аорист), `посмѣꙗсꙗ` (він посміявся, 3 ос.
    одн. аорист), `приїха` (він приїхав, 3 ос. одн. аорист), `оумре` (він помер, 3 ос. одн. аорист).'
  - 'Граматичний розбір: ідентифікація аористних форм, визначення їх основи (сигматична/асигматична) та особового закінчення.'
  - Паралельний переклад сучасною українською, де всі аористні форми передано минулим часом доконаного виду. Демонстрація,
    як функцію аориста взяв на себе вид.
  - '[!decolonization] Текст є давньосхіднослов''янським, а не «давньоруським». Ця мовна спадщина належить українцям, білорусам
    та росіянам. Російська імперська історіографія монополізувала цю спадщину, що є політичним актом.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія 1 (Форми): Парадигми аориста. Як утворювався асигматичний аорист (від `нести` -> `нѣсъ`), сигматичний
    аорист (від `речи` -> `рѣхъ`), та «новий» аорист (від `знати` -> `зна`). Вправи на утворення форм.'
  - 'Граматична лабораторія 2 (Функції): Аорист vs. Імперфект. Порівняльний аналіз уривків, де хроніст вживає `рече` (аорист)
    для позначення ключової дії, та `глаголаше` (імперфект) для опису фонової ситуації.'
  - 'Етимологічна лабораторія: Сліди аориста в сучасній мові. Як форма 2-ї особи аориста «паде» (ти впав) була переосмислена
    як 3-тя особа і стала основою для сучасної форми «(він) упав»? Простеження ланцюжка змін.'
  - '[!myth-buster] Аорист не "зник" безслідно. Його ДНК лежить в основі сучасної системи минулого часу. Кожен раз, коли ми
    кажемо "він приніс", ми несвідомо використовуємо нащадка давньої аористної форми.'
  section: 'Мовна лабораторія: Форми та функції аориста'
  words: 1700
- points:
  - 'Повернення до розминки: «Ігор полки заверну». Студент тепер може пояснити, що це аорист, 1-а особа однини, і означає
    одномоментну, завершену дію в минулому — «Я повернув полки».'
  - 'Головний лінгвістичний висновок: Аорист був «мотором» давньосхіднослов''янської розповіді, що рухав сюжет від однієї
    завершеної події до наступної.'
  - 'Зв''язок із сучасною українською: система аорист/імперфект, що базувалася на часі, еволюціонувала в систему доконаний/недоконаний
    вид, що базується на аспекті. Функція залишилася, але інструмент змінився.'
  section: Дискусія та підсумок
  words: 600
focus: The OES aorist tense — form, function, and meaning. Parsing aorist forms in primary texts. Contrast with imperfect
  and perfect. The evolution of the past tense system from OES to Modern Ukrainian.
level: OES
module: oes-011
objectives:
- Розпізнавати та аналізувати форми сигматичного та асигматичного аориста в оригінальних давньосхіднослов’янських текстах.
- Пояснювати функціональну різницю між аористом та імперфектом у наративі.
- Реконструювати етапи занепаду аориста та його трансформації в сучасній українській системі минулого часу.
- Критично оцінювати наукові дебати щодо ролі та значення аориста в історії української мови.
