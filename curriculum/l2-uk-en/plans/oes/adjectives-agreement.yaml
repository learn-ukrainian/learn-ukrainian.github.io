activity_hints:
- description: Розрізнення позицій щодо походження прикметникових форм. Визначити, яка теза стосується впливу церковнослов'янської,
    а яка — народної мови.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Заповнити пропуски в реченнях з "Повісті временних літ", поставивши прикметник у правильну форму (рід, число,
    відмінок).
  focus: Узгодження прикметників
  items: 5
  type: fill-in
- description: Дано іменник (напр., "столъ"). Студент має утворити словосполучення з прикметником "добръ" у називному, родовому
    та орудному відмінках однини, множини та двоїни.
  focus: Аналіз парадигми
  type: note
- description: На основі прикладів з модуля поясніть, у чому полягала функціональна різниця між короткими ("радъ") та довгими
    ("радыи") прикметниками. Чому, на вашу думку, сучасна українська мова втратила це розрізнення? (400-600 слів).
  focus: 'Есе: Короткі vs Довгі форми'
  type: note
cefr_min: C2
connects_to:
