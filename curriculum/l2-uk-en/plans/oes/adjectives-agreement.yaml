- syntax-simple-sentences
content_outline:
- points:
  - 'Провокація: Вам трапилася фраза в літописі: "даша куны лодиинѣи". Що це означає і чому ці два слова ніби "римуються"?'
  - 'Загадка: Чому в одному тексті ми бачимо "добръ мужь", а в іншому "добрыи мужь"? Чи це помилка переписувача, чи закономірність?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Форми прикметників — це спільна спадщина праслов''янської мови чи інновація окремих діалектних груп? Позиції
    лінгвістів-компаративістів.'
  - 'Дебат 2: Наскільки послідовним було розрізнення коротких (іменних) та довгих (займенникових) форм прикметників у різних
    текстах Київської Русі? Вплив церковнослов''янської мови vs жива народна мова.'
  - '[!decolonization] Термінологія: не "давньоруська", а "давньосхіднослов''янська" мова. Аналіз прикметників показує спільну
    базу, від якої однаковою мірою походять українська, білоруська та російська мовні системи.'
  - '[!epistemic-humility] Точно розмежувати діалектні риси предків українців, білорусів та росіян у текстах XI-XII ст. вкрай
    важко. Ми бачимо складну взаємодію різних мовних шарів.'
  section: 'Конфліктна карта: Слов''янська чи східнослов''янська спадщина?'
  words: 800
- points:
  - 'Першоджерело: фрагменти з "Повісті временних літ" та берестяних грамот, де активно використовуються прикметники в різних
    відмінках та родах.'
  - 'Оригінальний текст: "сѣдяше въ ризахъ паволочитыхъ", "посла Олегъ мужи свои", "на кораблихъ по двЂстѣ мужь".'
  - 'Пофразовий глосинг: розбір кожної фрази з акцентом на закінченнях прикметників та іменників, з якими вони узгоджуються.'
  - 'Граматичний парсинг: "паволочитыхъ" — прикметник, повна форма, тверда основа, місцевий відмінок, множина. "свои" — присвійний
    займенник (діє як прикметник), повна форма, знахідний відмінок, множина.'
  - Паралельний переклад сучасною українською мовою для виявлення розбіжностей та спільних рис у граматичній структурі.
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Реконструкція повних парадигм відмінювання прикметників твердої ("добръ") та м''якої ("синь")
    основ в однині, множині та двоїні.'
  - 'Порівняльний аналіз: Таблиці відмінювання коротких (іменних) та довгих (займенникових) форм. У яких відмінках вони збігалися,
    а в яких відрізнялися?'
  - 'Вправи на узгодження: Студент має поставити прикметник у дужках у правильну форму, виходячи з контексту речення давньосхіднослов''янською
    мовою.'
  - 'Етимологічний слід: Простежити шлях сучасного українського закінчення "-ого" (доброго) від церковнослов''янського "-аго"
    та східнослов''янського "-ого".'
  - '[!myth-buster] "Правило дев''ятки" в українській мові — це не щось нове. Його коріння — у давньому розрізненні твердих
    та м''яких прикметникових основ, яке ми бачимо в OES.'
  section: 'Мовна лабораторія: Парадигми прикметників'
  words: 1700
- points:
  - 'Повернення до розминки: Студент тепер може повністю розібрати фразу "даша куны лодиинѣи", пояснити узгодження та функцію
    кожної форми.'
  - 'Лінгвістичний висновок: Які головні принципи узгодження прикметників в OES? Що було найскладнішим у цій системі (напр.,
    двоїна, короткі форми)?'
  - 'Зв''язок із сучасністю: Які елементи давньої системи узгодження (патерни, закінчення) збереглися в сучасній українській
    мові? Що було втрачено і чому (напр., зникнення двоїни та коротких форм предикативів)?'
  - 'Прогноз: Як знання про давню систему прикметників допомагає зрозуміти сучасні українські діалекти та історичну граматику?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз системи прикметникового узгодження в давньосхіднослов'янській мові на прикладі першоджерел (рід, число, відмінок,
  короткі та повні форми)
level: OES
module: oes-020
objectives:
- Розрізняти короткі та повні форми давньосхіднослов'янських прикметників та пояснювати їх функціональну різницю
- Відмінювати прикметники твердої та м'якої основи в однині, множині та двоїні, дотримуючись правил узгодження
- Аналізувати оригінальні тексти, ідентифікуючи прикметникові форми та їх граматичні характеристики
- Критично оцінювати лінгвістичні дебати щодо спадщини давньосхіднослов'янської мовної системи
