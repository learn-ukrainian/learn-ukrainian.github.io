content_outline:
- points:
  - 'Провокація: Вам дали шматок берести XII ст. з кількома подряпаними словами. Це приватний борговий запис. Які перші три
    кроки вашого лінгвістичного аналізу?'
  - 'Фрагмент тексту грамоти: "а комоу еси далъ грамотоу..." — студент має припустити, про що йдеться, і визначити хоча б
    одну граматичну форму.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автентичність vs Репрезентативність. Чи можна на основі однієї приватної записки робити висновки про мову цілого
    регіону? Позиція номіналістів (кожен текст унікальний) vs генералістів (текст є зразком ширшої системи).'
  - 'Дебат 2: [!decolonization] «Давньоруська» писемність чи східнослов’янський континуум? Дискусія про роль церковнослов’янської
    мови як lingua franca та наявність виразних місцевих (прото-українських) рис у побутових текстах Новгорода та Києва.'
  - '[!epistemic-humility] Ми читаємо не саму мову, а її графічне представлення, спотворене помилками писаря та багатовіковими
    змінами в копіях. Наскільки ми можемо реконструювати живу мову за мертвим текстом?'
  section: 'Конфліктна карта: Текст і контекст'
  words: 800
- points:
  - 'Первинне джерело: Повний текст невідомої берестяної грамоти XII-XIII ст. (наприклад, боргова розписка або скарга).'
  - Оригінальний текст у графіці того часу (устав/полуустав) та нормалізована транслітерація.
  - 'Послівний глосинг: кожне слово з граматичним розбором (наприклад, "далъ" — аорист, 3 ос. одн. від "дати").'
  - Паралельний переклад сучасною українською мовою з коментарями, що пояснюють синтаксичні відмінності (наприклад, порядок
    слів, використання енклітик).
  - 'Контекстуалізація: що цей документ говорить про суспільство, правові відносини та побут того часу?'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Ідентифікація та аналіз усіх "архаїчних" форм у тексті: аорист, імперфект, перфект, двоїна, форми
    кличного відмінка, енклітичні частки. Створення парадигм для ключових слів тексту.'
  - 'Фонологічна лабораторія: Аналіз написання для реконструкції вимови. Пошук свідчень занепаду редукованих (єрів), змішування
    "ѣ" та "е", долі носових голосних. [!myth-buster] "Читали як писали" — розвінчання міфу на прикладі нерегулярних написань
    у грамоті.'
  - 'Палеографічна лабораторія: Аналіз почерку, скорочень (титл), виносних літер, матеріалу (береста) як джерела інформації
    про писаря та епоху.'
  section: 'Мовна лабораторія: Синтетичний аналіз тексту'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер має надати повний, обґрунтований план аналізу берестяної грамоти.'
  - 'Підсумковий синтез: Яку комплексну картину мовної ситуації XII-XIII ст. ми можемо намалювати на основі цього одного тексту?
    (Взаємодія церковнослов’янської та розмовної мов, діалектні риси, рівень грамотності).'
  - 'Велика картина: Як аналіз таких мікротекстів допомагає нам зрозуміти макропроцеси формування української мови та відрізнити
    її шлях розвитку від шляхів інших східнослов’янських мов?'
  section: Дискусія та підсумок
  words: 600
focus: Full linguistic analysis of an unknown Old East Slavic birchbark manuscript, applying cumulative knowledge of OES phonology,
  morphology, syntax, and paleography.
level: OES
module: oes-102
objectives:
- Самостійно аналізувати невідомий давньосхіднослов'янський текст, застосовуючи знання з фонології, морфології та синтаксису
- Реконструювати ймовірну вимову та граматичні парадигми на основі письмових свідчень
- Критично оцінювати текстологічні та філологічні проблеми, пов'язані з давніми рукописами
- Формулювати обґрунтовані висновки про стан мови певної епохи на основі аналізу першоджерела
pedagogy: CBI
