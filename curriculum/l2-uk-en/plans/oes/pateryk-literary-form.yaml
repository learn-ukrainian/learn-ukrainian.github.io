content_outline:
- points:
  - 'Провокація: Подано короткий уривок з Патерика про ченця, що впав у гріх, але був врятований дивним чином. Питання: Це
    історія про гріх чи про милосердя? Що цей гумор та парадокс говорять про середньовічну духовність?'
  - 'Слово до розгадки: "патерик" (πατερικόν). Що означає грецьке слово і як воно пов''язане з "батьком"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (текстологічний): Яка редакція Патерика "справжня"? Арсеніївська (XIII ст.) vs Касіянівська (XV ст.). Одна —
    ближча до оригіналу, інша — повніша і літературно досконаліша. Яку читати?'
  - 'Дебат 2 (лінгвістичний): Чиєю мовою написаний Патерик? Церковнослов’янська основа проти східнослов’янського (давньоукраїнського)
    просторіччя. Де пролягає межа?'
  - '[!decolonization] Патерик — пам''ятка східнослов’янської, а не "давньоруської" літератури. Наголос на спільній спадщині
    та унікальних українських рисах, що вже простежуються.'
  - '[!epistemic-humility] Точне датування та атрибуція багатьох оповідань є предметом наукових суперечок. Ми працюємо з текстологічними
    гіпотезами.'
  section: 'Конфліктна карта: Редакції та мова Патерика'
  words: 800
- points:
  - 'Оригінальний текст: "Слово про Ісакія, затворника Печерського" — класична історія про спокусу бісами, що вдають із себе
    ангелів. Аналіз тексту з II Касіянівської редакції.'
  - 'Послівний глос та граматичний розбір: "И єгда бысть вечеръ, сѣде, наченъ пѣти псалтырь..." — розбір форм аориста (бысть,
    сѣде, наченъ) та імперфекта.'
  - 'Паралельний переклад сучасною українською мовою: порівняння синтаксису та лексики.'
  - '[!decolonization] Примітки про церковнослов’янізми (єгда, абіє) та місцеву лексику, що свідчить про живий мовний процес
    на території Русі-України.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматичний практикум: аорист. Як утворюється і що означає? Таблиця парадигм і вправи на знаходження та аналіз аористних
    форм у тексті про Ісакія.'
  - 'Лексичний аналіз: Виокремлення шарів лексики в тексті: 1) церковнослов’янізми (книжні, високі), 2) східнослов’янська
    розмовна лексика (побутова), 3) грецизми (патерик, аскет).'
  - 'Етимологічний слід: Простежуємо шлях слів "чудо", "спокуса", "житіє" від давньосхіднослов’янської через староукраїнську
    до сучасної української мови. Які семантичні зміни відбулися?'
  - '[!myth-buster] Спростування міфу про "мертву" книжну мову. Патерик показує, що церковнослов’янська була гнучким інструментом,
    що активно взаємодіяв з місцевими говірками.'
  section: 'Мовна лабораторія: Аорист і лексичні шари'
  words: 1700
- points:
  - 'Повернення до розминки: Як тепер ви інтерпретуєте історію про грішного ченця? Які інструменти аналізу (текстологія, лінгвістика)
    допомогли вам?'
  - 'Лінгвістичний висновок: Патерик — це не моноліт, а "лінгвістичний акваріум", де співіснують різні мовні стилі та епохи.
    Це не недолік, а джерело знань про мовну ситуацію в Русі.'
  - 'Літературний спадок: Як жанр житія та оповіді про чудеса з Патерика вплинув на подальшу українську літературу, від барокових
    драм до творів Гоголя та Шевченка?'
  section: Дискусія та підсумок
  words: 600
focus: The Paterikon as a complete literary genre — narrative techniques, miracle stories, and the art of monastic storytelling
  in its philological and linguistic context
level: OES
module: oes-098
objectives:
- Аналізувати Києво-Печерський патерик як складне літературне та лінгвістичне явище
- Розрізняти основні редакції тексту та розуміти суть філологічних дебатів навколо них
- Читати та перекладати короткий уривок тексту давньосхіднослов'янською мовою, ідентифікуючи ключові граматичні форми (аорист)
- Розрізняти лексичні шари в тексті (церковнослов’янізми, східнослов’янська лексика) та пояснювати їх функцію
- Формулювати аргументовану позицію щодо мовної ситуації в Русі-Україні на основі аналізу Патерика
