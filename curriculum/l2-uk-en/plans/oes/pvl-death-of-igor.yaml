content_outline:
- points:
  - 'Провокація: "Поидемъ, княже, с нами въ дань: и ты добудеши, и мы". Хто, до кого, і з якою пропозицією звертається? Спробуйте
    розшифрувати це речення, спираючись на знання сучасної української.'
  - Що може піти не так, коли дружина каже своєму князю, що він "худый и нагъ", а сусідські "отроки изодѣани суть оружьємъ
    и порты"?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була смерть Ігоря саме такою? Аналіз версії ПВЛ проти візантійських джерел (Лев Диякон). Чи це реальний звіт,
    чи мораліте про небезпеку жадібності?'
  - 'Дебат 2: Чия мова в тексті? Лінгвістична дискусія про співвідношення церковнослов''янізмів та східнослов''янських вернакулярних
    форм у цьому конкретному уривку. Що це говорить про автора та його аудиторію?'
  - '[!epistemic-humility] Ми не знаємо, як "насправді" помер Ігор. ПВЛ — це не журналістський репортаж, а компіляція з певним
    дидактичним та політичним порядком денним.'
  - '[!decolonization] Російська імперська історіографія використовувала ПВЛ для обґрунтування прямої спадкоємності від Києва
    до Москви. Розглядаємо текст як спільну спадщину, а не ексклюзивну власність одного народу.'
  section: 'Конфліктна карта: Історичність vs. Наратив'
  words: 800
- points:
  - 'Первинний текст: Уривок з Повісті Временних Літ про другий похід Ігоря на деревлян (за Іпатіївським списком).'
  - 'Послівний глосарій та граматичний розбір: "рекоша", "помысливъ", "взя", "умыслиша", "убьємъ".'
  - 'Аналіз синтаксису: короткі, динамічні речення, що передають швидкість розвитку подій.'
  - 'Паралельний переклад сучасною українською мовою: порівняння лексики та граматичних конструкцій.'
  - '[!decolonization] Наголос на терміні "давньосхіднослов''янська мова", а не "давньоруська".'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аорист. Повний розбір форм аориста з тексту ("рекоша", "послуша", "иде"). Як утворюється? Яке
    його значення порівняно з імперфектом?'
  - 'Вправи на розпізнавання: знайти всі дієслова в аористі в уривку та визначити їх особу та число.'
  - 'Етимологічний слід: простежуємо еволюцію ключових слів — "дань", "полюддя", "дружина", "порты" — від давньосхіднослов''янської
    до сучасної української.'
  - '[!myth-buster] Аорист — не просто "минулий час". Це маркер завершеної, одноразової дії, що робить розповідь динамічною,
    схожою на кінокадри. Це вибір оповідача.'
  section: 'Мовна лабораторія: Аорист як інструмент наративу'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер ви можете повністю зрозуміти фразу "Поидемъ, княже...". Які граматичні та лексичні знання
    вам для цього знадобилися?'
  - 'Лінгвістичний висновок: Як використання аориста створює драматичний ефект у розповіді про смерть Ігоря?'
  - 'Зв''язок із наступним модулем: Смерть Ігоря — це лише зав''язка. Як ця подія готує сцену для наступного персонажа — княгині
    Ольги та її помсти?'
  section: Дискусія та підсумок
  words: 600
