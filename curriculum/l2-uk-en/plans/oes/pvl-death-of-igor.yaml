activity_hints:
- description: Перевірка розуміння дебатів про історичність тексту ПВЛ та лінгвістичну класифікацію уривка.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: Заповніть пропуски в реченнях з тексту, поставивши дієслово в дужках у правильну форму аориста.
  focus: Форми аориста
  items: 8
  type: fill-in
- description: 'Вам надано два уривки: розповідь про смерть Ігоря з ПВЛ та згадка про це у візантійського історика. Порівняйте
    їх. Що спільного? Що відмінного? Чому, на вашу думку, існують ці розбіжності?'
  focus: 'Порівняльний аналіз: ПВЛ vs Лев Диякон'
  type: note
- description: Проаналізуйте, як послідовне вживання аориста в уривку про смерть Ігоря створює ефект швидкої зміни "кадрів".
    Як би змінився наратив, якби він був написаний з використанням інших минулих часів? (300-500 слів).
  focus: 'Есе: Аорист і кінематографічність'
  type: note
