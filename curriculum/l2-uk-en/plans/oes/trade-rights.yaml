activity_hints:
- description: 'Перевірка розуміння дебатів: правовий статус купців (партнери чи прохачі?) та походження комерційної лексики
    (питома чи запозичена?).'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Заповніть пропуски в реченнях з модуля, використовуючи ключові терміни: місячне, гість, мито, гривня, устав.'
  focus: Комерційна лексика договору
  items: 5
  type: fill-in
- description: Проаналізуйте фрагмент договору. Які висновки про стан мови (фонетика, морфологія, синтаксис) можна зробити
    на основі цього тексту? Які риси є архаїчними, а які вказують на розвиток майбутніх східнослов'янських мов?
  focus: 'Критичний аналіз: Договір як лінгвістичне джерело'
  type: note
- description: Простежте семантичну еволюцію слова "гість" від давньосхіднослов'янського купця до сучасного відвідувача. Чому
    відбулися ці зміни і що вони говорять про трансформацію суспільства? (400-600 слів).
  focus: 'Есе: "Гість" у Х столітті vs "гість" у XXI столітті'
  type: note
cefr_min: C2
connects_to:
- treaty-911-oleg
- crimes-abroad
content_outline:
- points:
  - 'Провокативне питання: Купці з Києва у X столітті отримували "місячне" в Константинополі. Що це було — зарплата, стипендія
    чи данина? Початковий аналіз терміну.'
  - 'Фрагмент з договору без перекладу: "А о гостьхъ... да взимають мѣсѧчное". Спроба розшифрувати на основі сучасної української.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Правовий статус руських купців. Вони були рівноправними торговими партнерами чи прохачами під захистом імперії?
    Аналіз формулювань "просити місячне" vs "отримувати за договором".'
  - 'Дебат 2: Лінгвістичний спір про комерційну лексику. Терміни "мито", "паволоки", "гривня" — це питомі слов''янські слова
    чи запозичення з грецької/скандинавської? [!epistemic-humility]'
  - '[!decolonization] Текст договору — це документ давньоСХІДНОслов''янської мови, а не "давньоруської". Він є спільною спадщиною,
    а не ексклюзивною власністю російської історії.'
  section: 'Конфліктна карта: Юридичний статус чи привілей?'
  words: 800
- points:
  - 'Оригінальний текст: фрагмент з русько-візантійського договору (911 або 944 рр.), що стосується "місячного" та правил
    перебування купців.'
  - 'Послівний глосарій та граматичний розбір: аналіз форм давального ("кому дають") та знахідного ("що дають") відмінків.
    Розбір форм аориста та імперфекта.'
  - Паралельний переклад сучасною українською мовою для порівняння синтаксису та лексики.
  - '[!decolonization] Аналіз церковнослов''янських (високий стиль) та народно-розмовних (вернакулярних) рис у тексті договору,
    що демонструє багатошаровість мови.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Давальний відмінок обов''язку ("послам даяти") та знахідний відмінок товару ("брати паволоки").
    Практичні вправи на побудову фраз за моделлю договору.'
  - 'Фонологічна лабораторія: Аналіз написання слів у тексті для ілюстрації процесу падіння єрів (наприклад, "гость" vs "гостя").'
  - 'Етимологічний слід: Простежити семантичну еволюцію слів "гість" (купець → відвідувач), "гривня" (шийна прикраса → грошова
    одиниця), "торг" від OES до сучасної української. [!myth-buster]'
  section: 'Мовна лабораторія: Відмінки в комерції'
  words: 1700
- points:
  - 'Повернення до розминки: що ж таке "місячне"? Студент формулює вичерпну відповідь, спираючись на аналіз тексту та філологічні
    дебати.'
  - 'Лінгвістичний висновок: Як давньосхіднослов''янська мова виражала складні юридичні та економічні поняття? Які граматичні
    інструменти вона використовувала?'
  - 'Зв''язок із сучасністю: Які з проаналізованих термінів та граматичних конструкцій збереглися в сучасній українській юридичній
    та комерційній лексиці?'
  section: Дискусія та підсумок
  words: 600
focus: 'Давньосхіднослов''янське торговельне право: поняття "місячне" (щомісячне утримання) для купців у Константинополі на
  основі русько-візантійських договорів.'
level: OES
module: oes-070
objectives:
- Аналізувати оригінальний текст русько-візантійського договору, ідентифікуючи ключові юридичні та економічні терміни
- Розрізняти питому лексику та запозичення в давньосхіднослов'янських текстах на комерційну тематику
- Застосовувати знання про відмінкову систему OES для точного перекладу та інтерпретації комерційних угод
- Формулювати аргументовану позицію щодо філологічних дебатів, пов'язаних з інтерпретацією давніх текстів
pedagogy: CBI
