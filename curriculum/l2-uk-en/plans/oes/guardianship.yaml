content_outline:
- points:
  - 'Провокація: Чи могла жінка в XI столітті керувати майном? Розглядаємо давньосхіднослов''янську фразу: "аже буде жена...
    а сама сядеть дома"'
  - 'Задача: Дано сучасне слово "опіка". Яким міг бути його давній відповідник і що він означав — захист, контроль чи обов''язок?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Статті про опіку в "Руській Правді" — це пряма рецепція візантійського права (номоканону) чи кодифікація місцевих
    слов''янських звичаїв?'
  - 'Дебат 2: Мова закону — це церковнослов''янська калька чи жива розмовна мова? Аналіз термінів "опекун", "порука", "задниця"
    (спадщина).'
  - '[!decolonization] Термінологія "Давня Русь" vs "Київська Русь". Заперечення тези російської історіографії про "давньоруську
    народність" як виключно російську спадщину. Давньосхіднослов''янська мова — спільне джерело.'
  - '[!epistemic-humility] Багато правових норм дійшли до нас у пізніших списках (XV-XVI ст.), що ускладнює розрізнення оригінального
    тексту XI ст. та пізніших нашарувань.'
  section: 'Конфліктна карта: Візантійський імпорт чи місцевий звичай?'
  words: 800
- points:
  - 'Першоджерело: Розширена редакція "Руської Правди" — статті, що регулюють права вдови та опіку над дітьми-сиротами.'
  - 'Оригінальний текст: "Аже оу кого жена сядеть по мужи, а буде дворъ боярьскъ... а что далъ мужь женѣ, то же женѣ и есть.
    А задницѣ мужнѣи она не надобѣ."'
  - 'Порядковий переклад і глоси: аналіз кожного слова (аже=якщо, задниця=спадщина, не надобѣ=не потрібна, не стосується).'
  - 'Граматичний парсинг: розбір форм умовного способу ("аже буде"), давального відмінка для позначення належності ("то же
    женѣ и есть").'
  - Порівняння з сучасним українським перекладом та виявлення семантичних зсувів.
  - '[!decolonization] Демонстрація, що юридична культура на українських землях має тисячолітню безперервну традицію, яка
    не є "подарунком" з Москви.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Дослідження синтаксичних конструкцій, що передають правовий статус та відносини власності в тексті
    "Руської Правди".'
  - 'Давальний відмінок належності: Як конструкції типу "женѣ есть" (дружині є, належить) відрізняються від сучасного "у дружини
    є"?'
  - 'Дієприкметники як юридичні маркери: аналіз активних та пасивних дієприкметників для опису сторін у правових відносинах
    (напр., "обидимыи" — скривджений).'
  - 'Синтаксис обов''язку: Вивчення безособових конструкцій та інфінітивів для вираження повинності ("а платити ему").'
  - 'Вправа: Студент самостійно аналізує нову статтю з "Руської Правди", ідентифікуючи вивчені граматичні конструкції статусу
    та власності.'
  - '[!myth-buster] Руйнування міфу про "примітивність" давнього права. Мова закону демонструє складну та нюансовану систему
    соціальних відносин.'
  section: 'Мовна лабораторія: Граматика статусу та власності'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, чи могла жінка керувати майном? Студент формулює відповідь, спираючись на аналіз тексту
    та граматичних конструкцій.'
  - 'Лінгвістичний підсумок: Як граматика (відмінки, дієприкметники, синтаксис) конструює соціальну реальність у юридичному
    тексті?'
  - 'Зв''язок із сучасністю: Які поняття з "Руської Правди" (спадщина, порука, опіка) дожили до наших днів, а які зникли?
    Що це говорить про еволюцію суспільства?'
  - 'Ширший висновок: ОЕС — це не лише мова билин, а й високорозвинена мова права, адміністрації та дипломатії.'
  section: Дискусія та підсумок
  words: 600
focus: Legal and linguistic analysis of guardianship (опіка) in Old East Slavic society through primary sources like the Ruska
  Pravda. Explores concepts of property, widowhood, and orphan status.
level: OES
module: oes-065
objectives:
- Аналізувати оригінальний давньосхіднослов'янський юридичний текст, застосовуючи філологічний та граматичний коментар.
- Розрізняти наукові гіпотези щодо походження правових норм (рецепція vs місцева традиція).
- Пояснювати, як граматичні конструкції (відмінки, стан дієслова) використовуються для передачі правового статусу та відносин
  власності.
- Формулювати аргументовану позицію щодо ролі мови у конструюванні соціальної та правової реальності в Давній Русі.
