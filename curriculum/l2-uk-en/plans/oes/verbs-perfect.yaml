content_outline:
- points:
  - 'Провокація: фраза "въкралъ єси" (вкрав єси). Чому тут є форма теперішнього часу ("єси"), але значення — минулого? Перша
    спроба розгадати таємницю походження минулого часу.'
  - 'Відгадка в сучасному діалекті: "Я чув-ем". Як карпатські говори зберегли уламок давньої мови?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є слов''янський перфект калькою з грецької? Позиція "за": перфект з''являється в найдавніших перекладних
    текстах (Остромирове Євангеліє), точно відтворюючи грецькі конструкції. Позиція "проти": схожі аналітичні конструкції
    існували в інших індоєвропейських мовах; це міг бути паралельний розвиток.'
  - 'Дебат 2: Швидкість розпаду перфекта. Чи зникло допоміжне дієслово одночасно на всіх східнослов''янських територіях? [!decolonization]
    Аргумент проти "єдиної давньоруської мови": дані берестяних грамот (Новгород) показують швидшу втрату допоміжного дієслова,
    ніж тексти з Києва, що вказує на діалектні відмінності вже в XII-XIII ст.'
  - '[!epistemic-humility] Точні причини та хронологія розпаду перфекта є предметом дискусій, оскільки писемні пам''ятки відображають
    консервативну, а не розмовну норму.'
  section: 'Конфліктна карта: Грецький вплив чи питомий розвиток?'
  words: 800
- points:
  - 'Першоджерело: фрагмент із Повісті временних літ, де літописець використовує перфект для опису подій, що мають наслідки
    для теперішнього (наприклад, "Володимиръ же... сѣлъ єсть въ Кыевѣ").'
  - 'Слово-в-слово: розбір фрази "сѣлъ єсть" (сів є) — дієприкметник "сѣлъ" (рід, число) + допоміжне дієслово "єсть" (особа,
    число).'
  - 'Граматичний парсинг: аналіз перфектних форм у тексті, визначення їх особи, числа, роду та їхня роль у наративі порівняно
    з аористом (для простих фактів у минулому).'
  - '[!decolonization] Паралельний переклад: порівняння OES тексту з українським та російським перекладами, щоб показати,
    як однакова давня конструкція дала різні рефлекси в сучасних мовах (укр. "сів", рос. "сел" — але обидва без допоміжного
    дієслова).'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: відтворення повної парадигми перфекта для дієслова "писати" ("писалъ єсмь", "писала єси", "писали
    суть").'
  - 'Етимологічний слід: простеження еволюції "писалъ єсмь" → "писав-єм" (діалект) → "писав" (сучасна норма). Пояснення, як
    l-форма дієприкметника взяла на себе всю функцію минулого часу.'
  - '[!myth-buster] "Простота" українського минулого часу — це міф. Насправді це результат складного історичного процесу спрощення,
    де одна форма (l-дієприкметник) перемогла цілу систему часів (аорист, імперфект, перфект, плюсквамперфект).'
  - 'Порівняльний аналіз: як та сама доля спіткала перфект в інших слов''янських мовах (польська, чеська), але не в південнослов''янських
    (болгарська, македонська), де він зберігся.'
  section: 'Мовна лабораторія: Розпад перфекта та народження минулого часу'
  words: 1700
- points:
  - 'Повернення до розминки: тепер студент може повністю пояснити лінгвістичний парадокс фрази "въкралъ єси".'
  - 'Лінгвістичний висновок: перфект — це не просто "минулий час". Це час, що позначав дію в минулому, результат якої актуальний
    у теперішньому. Саме ця "результативність" відрізняла його від аориста.'
  - 'Зв''язок із сучасністю: втрата перфекта та перемога l-форми — це один із ключових моментів, що визначив граматичну структуру
    сучасної української мови. Обговорення, які переваги та недоліки мало це спрощення.'
  section: Дискусія та підсумок
  words: 600
focus: Давньосхіднослов'янський перфект (конструкція "дієприкметник + єсмь/єси"), його розпад та еволюція в сучасну українську
  l-форму минулого часу, на відміну від аориста та імперфекта.
