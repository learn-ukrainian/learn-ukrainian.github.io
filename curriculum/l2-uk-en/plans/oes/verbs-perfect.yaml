objectives:
- Розрізняти функції аориста, імперфекта та перфекта в давньосхіднослов'янських текстах
- Аналізувати процес розпаду перфектної конструкції та виникнення сучасної української форми минулого часу
- Правильно ідентифікувати, аналізувати та перекладати перфектні форми в оригінальних текстах
- Аргументовано обговорювати наукові дебати щодо походження та еволюції перфекта в слов'янських мовах
