- definition: аналітичний минулий час у давньосхіднослов'янській мові, що утворювався з дієприкметника на -л та допоміжного
    дієслова 'бути' в теперішньому часі
  pos: ч.
  word: перфект
- definition: синтетичний минулий час, що позначав раптову, одноразову дію в минулому, засвідчену оповідачем
  pos: ч.
  word: аорист
- definition: синтетичний минулий час, що позначав тривалу або повторювану дію в минулому
  pos: ч.
  word: імперфект
- definition: форма дієслова, що поєднує ознаки дієслова та прикметника; l-дієприкметник є основою сучасного минулого часу
  pos: ч.
  word: дієприкметник
- definition: дієслово, що втратило своє лексичне значення і служить для творення аналітичних форм (напр. 'єси' у конструкції
    перфекта)
  pos: с.
  word: допоміжне дієслово
- definition: слово або вираз, створені за зразком іншої мови шляхом точного перекладу її частин
  pos: ж.
  word: калька
