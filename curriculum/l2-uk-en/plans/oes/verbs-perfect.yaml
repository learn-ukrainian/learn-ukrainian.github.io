activity_hints:
- description: Чия це теза? Розрізнити аргументи на користь грецького впливу та питомого розвитку. Визначити, які факти свідчать
    про ранні діалектні відмінності.
  focus: Розуміння дебатів про походження перфекта
  items: 6
  type: quiz
- description: Заповнити пропуски в реченнях з літопису, обравши правильну форму l-дієприкметника та допоміжного дієслова.
  focus: 'Парсинг: Конструкції перфекта'
  items: 6
  type: fill-in
- description: Надано два уривки з літопису. В одному домінує аорист, в іншому — перфект. Поясніть, чому літописець обрав
    різні часи для опису подій. Який відтінок значення надає кожен час?
  focus: 'Джерельний аналіз: Аорист vs Перфект у "Повісті временних літ"'
  type: note
- description: Опишіть шлях, який пройшла давньосхіднослов'янська мова від складної системи з 4 минулих часів до сучасної
    української з одним. Які лінгвістичні та позалінгвістичні фактори могли спричинити це спрощення? (400-600 слів).
  focus: 'Есе: Від перфекта до минулого часу'
  type: note
