activity_hints:
- description: Тест на знання аргументів "за" і "проти" автентичності «Слова». Чия це теза — скептиків чи прихильників?
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставити правильні форми вокатива та імператива у речення з тексту «Плачу Ярославни».
  focus: Граматичні форми Плачу
  items: 6
  type: fill-in
- description: Порівняйте два переклади «Плачу Ярославни» (напр. Рильського та Шевченка) з оригіналом. Які смислові акценти
    ставить кожен перекладач? Які лінгвістичні труднощі вони вирішують по-різному?
  focus: 'Джерельний аналіз: Переклад vs Оригінал'
  type: note
- description: Що звернення Ярославни до сил природи говорить нам про дуалізм віри (християнство та язичництво) у свідомості
    людини XII століття? Аргументуйте свою відповідь, спираючись на текст модуля (400-600 слів).
  focus: 'Есе: Світогляд у «Плачі Ярославни»'
  type: note
