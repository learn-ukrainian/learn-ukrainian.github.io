content_outline:
- points:
  - 'Провокація: "На Дунаї Ярославнинъ голосъ ся слышитъ..." Чому Ярославна звертається до вітру, сонця і Дніпра, а не до
    Бога чи святих? Що це говорить про світогляд людини XII століття?'
  - 'Розшифровка: Спробуйте перекласти перші два рядки, спираючись на знання сучасної української.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є «Слово» автентичним текстом XII ст. чи геніальною містифікацією XVIII ст.? Позиції скептиків (А. Мазон,
    О. Зимін) та прихильників (Р. Якобсон, Д. Лихачов).'
  - 'Дебат 2: Чи є «Плач Ярославни» органічною частиною тексту, чи пізнішою вставкою? Аргументи стилістичної єдності проти
    звинувачень у сентиментальності.'
  - '[!decolonization] Боротьба за спадщину: як «Слово» стало інструментом російської імперської ідеології та чому це спільний
    пам''ятник мови предків українців, білорусів та росіян.'
  - '[!epistemic-humility] Рукопис згорів у 1812 році. Уся сучасна наука базується на першодруку 1800 року. Ми ніколи не будемо
    знати напевно.'
  section: 'Конфліктна карта: Автентичність «Слова»'
  words: 800
- points:
  - 'Звернення до Вітру: "О, вѣтрѣ, вѣтрило! чему, господине, насильно вѣеши?" — розбір тексту, аналіз епітетів, граматичний
    коментар (форма "вѣтрило" як вокатив).'
  - 'Звернення до Дніпра: "Днепре Cловутицю! пробилъ еси каменныя горы..." — аналіз образу Дніпра, роль дієслів-аористів.'
  - 'Звернення до Сонця: "Cвѣтлое и тресвѣтлое слънце! всѣмъ тепло и красно єси..." — розбір символізму сонця, граматика вокативних
    конструкцій.'
  - 'Паралельний переклад: Повний текст Плачу в оригіналі та в сучасному українському перекладі з коментарями до розбіжностей
    у синтаксисі та лексиці.'
  - '[!decolonization] Мова Плачу: аналіз слів, що мають прямі відповідники в сучасній українській, але не в російській (зегзицею,
    тужити).'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія 1 (Вокатив): Таблиця кличного відмінка в давньосхіднослов''янській мові. Порівняння форм з тексту
    (вѣтре, господине, Дніпре) із сучасним українським кличним відмінком.'
  - 'Граматична лабораторія 2 (Імперативи): Аналіз форм наказового способу (прилелѣй, вознеси, принеси). Як утворювалися ці
    форми і як вони змінилися?'
  - 'Етимологічний слід: Простежуємо шлях слова "зегзиця" (зозуля) від давніх часів до наших днів через різні писемні пам''ятки.'
  - '[!myth-buster] Язичництво чи поезія? Аналіз жанру "заклинання" та його трансформації в ліричний монолог. Чи справді Ярославна
    "молиться" вітру, чи це висока поетична фігура?'
  section: 'Мовна лабораторія: Вокатив, імперативи та персоніфікація'
  words: 1700
- points:
  - 'Повернення до розминки: Озброївшись знаннями з модуля, студент дає розгорнуту відповідь — чому звернення до сил природи
    є логічним у контексті світогляду та жанру.'
  - 'Лінгвістичний підсумок: Як граматичні категорії (вокатив, імператив) стають інструментом для створення найвищої емоційної
    напруги в тексті?'
  - 'Зв''язок із сучасністю: "Плач Ярославни" як архетип образу жінки, що чекає воїна з війни, в українській культурі (від
    народних пісень до сучасної поезії).'
  section: Дискусія та підсумок
  words: 600
