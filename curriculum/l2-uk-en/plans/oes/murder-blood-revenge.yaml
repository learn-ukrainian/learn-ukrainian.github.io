content_outline:
- points:
  - 'Провокація: "Брат за брата, син за батька..." — а якщо ні? Давньосхіднослов''янський закон пропонує інший вихід: заплати
    або помри. Скільки коштувало життя вільної людини в XI столітті?'
  - 'Фрагмент з "Правди Руської": "Аще оубиеть моужь моужа, то мьстить братоу брата..." — спробуйте розшифрувати, спираючись
    на знання сучасної української.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Правда Руська" — це кодифікація існуючого звичаєвого права чи княжий закон, нав''язаний згори для централізації
    влади?'
  - 'Дебат 2: Скандинавський вплив на право Русі. "Вира" — це пряме запозичення германського "wergeld" чи паралельний слов''янський
    розвиток?'
  - '[!decolonization] Виклик термінології "Давньоруський закон". "Правда Руська", а не "Русская правда" — це правовий кодекс
    східнослов''янської держави Русь, спільний предок України, Білорусі та Росії, а не ексклюзивна власність російської історії.'
  - '[!epistemic-humility] Точне походження багатьох норм "Правди Руської" є предметом гострих наукових дискусій через брак
    джерел до XI століття.'
  section: 'Конфліктна карта: Закон писаний чи звичай кривавий?'
  words: 800
- points:
  - 'Оригінальний текст: Стаття 1 з Короткої редакції "Правди Руської" ("Аще оубиеть моужь моужа...")'
  - 'Послівний глосарій: розбір слів "оубиеть", "мьстить", "любо", "синови", "головникъ".'
  - 'Граматичний парсинг: аорист "оубиеть" (дія минула, завершена, одноразова), форми давального відмінка ("братоу"), архаїчні
    сполучники.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо втрачених та змінених значень.
  - '[!decolonization] Аналіз мови тексту: відсутність специфічних "російських" чи "українських" маркерів, що свідчить про
    спільну східнослов''янську мовну основу.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аорист. Детальний аналіз дієслівних форм минулого часу в тексті. Як аорист передає юридичну точність
    "факту, що відбувся"?'
  - 'Етимологічний слід: Простежуємо шлях ключових юридичних термінів: "вира" (зв''язок з германськими мовами), "мьсть" (праслов''янський
    корінь), "головникъ" (внутрішня деривація від "голова").'
  - 'Синтаксичний аналіз: структура речення в "Правді Руській" — "Якщо... то...". Як ця конструкція створює універсальну правову
    норму?'
  - '[!myth-buster] Руйнуємо міф про "диких слов''ян". Система "вири" була кроком до подолання кровної помсти та становлення
    державного суду, а не ознакою варварства.'
  section: 'Мовна лабораторія: Від аориста до номіналу — граматика помсти'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, скільки коштувало життя? Студент формулює відповідь, пояснюючи систему "вири" та її соціальну
    диференціацію.'
  - 'Лінгвістичний висновок: Що "Правда Руська" говорить нам про стан давньосхіднослов''янської мови? Лексична точність, роль
    аориста в юридичному дискурсі, відсутність абстрактних термінів.'
  - 'Зв''язок із сучасністю: Які поняття ("помста", "вбивство", "закон") збереглися в українській мові, а які ("вира", "головник")
    стали історизмами? Що це говорить про еволюцію суспільства та права?'
  section: Дискусія та підсумок
  words: 600
