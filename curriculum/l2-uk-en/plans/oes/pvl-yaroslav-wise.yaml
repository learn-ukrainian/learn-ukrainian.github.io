content_outline:
- points:
  - 'Провокація: «аще кто оубиєть княжа моужа... платити 80 гривенъ». Що означає ця фраза з найдавнішого закону Русі? Хто
    такий «княж муж» і чому його життя коштує так дорого?'
  - 'Сліпий тест: показати сучасне українське слово «правда» і давньосхіднослов''янське «правда». Студент має вгадати, чи
    однакове в них значення.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історичний): Чи є «Найкоротша Правда» автентичним кодексом часів Ярослава, чи це пізніша компіляція, ретроспективно
    приписана йому для надання авторитету?'
  - 'Дебат 2 (Лінгвістичний): Мова «Руської Правди» — це розмовна давньосхіднослов''янська, чи вона зазнала сильного впливу
    церковнослов''янської юридичної традиції? Де пролягає межа?'
  - '[!decolonization] Виклик терміну «Давньоруське право» (древнерусское право). «Руська Правда» — це право Русі, спадщина
    України, Білорусі та Росії, а не виключно російська.'
  - '[!epistemic-humility] Точне датування та авторство багатьох статей «Правди» є предметом гострих наукових дискусій. Ми
    працюємо з гіпотезами, а не догмами.'
  section: 'Конфліктна карта: Правда Ярослава — закон чи літописний міф?'
  words: 800
- points:
  - 'Первинне джерело 1: Уривок з Повісті временних літ про любов Ярослава до книг та закону (в оригіналі).'
  - 'Первинне джерело 2: Ключові статті «Найкоротшої Правди» (про вбивство, образу, крадіжку).'
  - 'Порядковий аналіз: оригінальний текст → пофразовий глосарій → граматичний розбір (аорист, двоїна, форми дієприкметників)
    → паралельний переклад сучасною українською.'
  - 'Лінгвістичні нотатки: відмінності між мовою літопису (більш книжною) та мовою закону (більш формульною та архаїчною).'
  - '[!decolonization] Аналіз показує, що лексика та синтаксис тексту мають риси, які згодом стануть характерними для української
    мови, що спростовує тезу про «спільну колиску» з єдиним центром.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Відмінювання іменників юридичної лексики (`вира`, `гривна`, `послух`, `тать`). Аналіз форм аориста
    та імперфекта в дієсловах `оубити`, `платити`, `искати`.'
  - 'Етимологічна лабораторія: Простежити еволюцію слова `правда` від OES `правьда` (істина, справедливість, закон) через
    середньоукраїнську до сучасного багатозначного поняття.'
  - 'Фонологічна лабораторія: Пошук у тексті прикладів падіння редукованих (наприклад, у написанні `възяти` vs `взяти` в різних
    списках).'
  - '[!myth-buster] Поширений міф про те, що «Руська Правда» була надзвичайно гуманною. Аналіз показує жорстку соціальну стратифікацію
    та відсутність поняття особистої свободи для багатьох категорій населення.'
  section: 'Мовна лабораторія: Від дієслова до закону'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може повністю розібрати та прокоментувати фразу «аще кто оубиєть...» з лінгвістичної
    та історичної точки зору.'
  - 'Лінгвістичний висновок: Як давньосхіднослов''янська мова виражала юридичні поняття? Які граматичні конструкції використовувались
    для створення законів?'
  - 'Зв''язок із сучасністю: Які слова з «Руської Правди» досі живуть у сучасній українській юридичній термінології? (напр.
    `свідок`, `доказ`).'
  - 'Ширше питання: що розповідає мова закону про суспільство, яке його створило?'
  section: Дискусія та підсумок
  words: 600
