content_outline:
- points:
  - 'Провокація: Що спільного між половцем та полюванням? Питання про етимологію етноніму.'
  - 'Давньосхіднослов''янська фраза з літопису: ''Лучче жъ намъ потятымъ быти, неже полоненымъ быти''. Студент намагається
    розшифрувати без перекладу.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Половці — «дике поле» чи складний сусід? Радянська історіографія (образ «вічного ворога») vs сучасний погляд
    на династичні шлюби та торгові контакти.'
  - 'Дебат 2: Наскільки «східнослов’янським» є літописний опис степовиків? Аналіз тюркізмів (''тлумач'', ''ясир'', ''вежа'')
    та їх інтеграції в мову літопису.'
  - '[!decolonization] Виклик російській імперській рамці «спільної колиски». Як розповідь про південний кордон Русі формує
    саме прото-українську ідентичність, відмінну від північно-східних земель (Залісся).'
  - '[!epistemic-humility] Літопис — це не репортаж, а компіляція з політичним замовленням. Як відрізнити факт від пропаганди,
    наприклад, у промовах князів перед битвою?'
  section: 'Конфліктна карта: Половці: вороги чи сусіди?'
  words: 800
- points:
  - 'Оригінальний текст з Повісті временних літ: опис битви на річці Стугні (1093). ''И бысть брань люта...'''
  - 'Порядковий переклад та глоси: розбір ключових фраз, напр. ''Смирять гордость ихъ''.'
  - 'Граматичний парсинг: форми аориста (''погыбоша'', ''впадоша''), двоїна (''полка'', ''князя''), форми дієприкметників
    (''побѣжени'').'
  - '[!decolonization] Порівняння церковнослов''янських елементів (лексика, синтаксис) із розмовними, прото-українськими рисами
    в тексті. Літописець пише «високим штилем», але чи говорить він так?'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аорист та імперфект. На матеріалі тексту про битву на Стугні порівняти використання аориста (миттєва
    дія: ''побѣгоша'') та імперфекта (тривала дія: ''плакахуся'').'
  - 'Етимологічний слід: відстеження степової лексики. Як слова ''шатро'', ''богатир'', ''тлумач'' прийшли з тюркських мов
    і адаптувалися в давньосхіднослов''янській.'
  - '[!myth-buster] Аналіз слова ''поганий''. У літописі ''погані'' — це язичники (лат. paganus). Як відбулася семантична
    деградація до сучасного значення «поганий» = «bad»?'
  - 'Фонологічна лабораторія: Падіння редукованих. Пошук у тексті прикладів, де ''ъ'' та ''ь'' ще пишуться, але вже, ймовірно,
    не вимовляються у слабкій позиції.'
  section: 'Мовна лабораторія: Степова лексика та дієслівні часи'
  words: 1700
- points:
  - 'Повернення до розминки: повний лінгвістичний аналіз фрази ''Лучче жъ намъ потятымъ быти, неже полоненымъ быти''.'
  - 'Лінгвістичний висновок: як військова загроза зі Степу збагатила та змінила давньосхіднослов''янську мову, формуючи військову
    лексику.'
  - 'Зв''язок із сучасністю: тюркізми в сучасній українській мові (''кавун'', ''килим'', ''майдан'') як спадок багатовікового
    сусідства.'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз Половецьких війн у Повісті временних літ, лінгвістичний розбір степової лексики, граматика давніх дієслівних
  часів (аорист/імперфект) та підготовка до контексту "Слова о полку Ігоревім".
