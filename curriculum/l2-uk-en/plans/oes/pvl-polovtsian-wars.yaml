objectives:
- Аналізувати літописний текст про Половецькі війни, розрізняючи церковнослов'янські та розмовні елементи
- Застосовувати граматичні знання (аорист, імперфект, двоїна) для точного перекладу та інтерпретації давньосхіднослов'янських
  джерел
- Критично оцінювати історіографічні та філологічні дебати навколо взаємин Русі та Степу, уникаючи імперських наративів
- Простежувати етимологію степової лексики та її вплив на розвиток української мови
