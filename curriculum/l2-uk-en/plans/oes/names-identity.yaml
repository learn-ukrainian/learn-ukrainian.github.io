activity_hints:
- description: Чия це теза — прихильників теорії витіснення чи диглосії? Визначити позицію за цитатою з уявного наукового
    тексту.
  focus: 'Розуміння конфліктної карти: Дебати про імена'
  items: 4
  type: quiz
- description: Вставити імена у правильній відмінковій формі в речення з літописів. Напр., "Князь Ярославъ дасть (Остромиръ)
    посадництво..."
  focus: Граматичні форми імен
  items: 5
  type: fill-in
- description: Подано фрагмент "Руської Правди" зі згадками різних соціальних груп (княжі мужі, смерди, холопи). Проаналізуйте,
    які типи імен у них переважають. Чи є кореляція між іменем та соціальним статусом?
  focus: 'Джерельний аналіз: ім''я та ідентичність у "Руській Правді"'
  type: note
- description: На основі матеріалів модуля напишіть есе (400-600 слів) на тему "Ім'я як дзеркало епохи". Як система іменування
    в Давній Русі відображала її релігійні, соціальні та культурні трансформації?
  focus: 'Есе: Що нам розповідає система імен про суспільство?'
  type: note
cefr_min: C2
