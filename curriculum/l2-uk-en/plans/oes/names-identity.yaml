content_outline:
- points:
  - 'Провокація: У літописі написано "Іоаннъ, прізвиськомъ Ніженець". Чому одна людина має два імені? Яке з них "справжнє"?'
  - 'Завдання на декодування: спробуйте пояснити походження прізвиська "Ніженець", спираючись на знання сучасної української.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Наскільки повним було витіснення слов''янських імен християнськими? Дискусія про ономастичну диглосію — паралельне
    існування двох систем імен (церковної та мирської).'
  - 'Дебат 2: Що нам кажуть імена про соціальну структуру? Чи були слов''янські прізвиська маркером нижчого статусу, чи, навпаки,
    знаком приналежності до місцевої еліти?'
  - '[!decolonization] Християнізація імен — не просто "прогрес", а складна культурна колонізація. Розгляд опору цій системі
    через збереження дохристиянських імен як прізвиськ.'
  - '[!epistemic-humility] Джерела (літописи, берестяні грамоти) дають нам лише фрагментарну картину. Ми бачимо імена, які
    записали освічені ченці, але не завжди знаємо, як люди називали одне одного в побуті.'
  section: 'Конфліктна карта: Ім''я церковне vs. прізвисько мирське'
  words: 800
- points:
  - 'Первинне джерело: фрагмент із літопису або юридичного документа (напр., "Руська Правда"), де фігурують персонажі з подвійними
    іменами.'
  - 'Оригінальний текст: "А се Якиме, нарицаемыи Гюрята, повѣда намъ..."'
  - 'Послівний глос: розбір кожного слова, його граматичної форми та значення (Якиме — вокатив від Якимъ; нарицаемыи — активний
    дієприкметник).'
  - 'Граматичний парсинг: аналіз відмінювання імен — грецьких за походженням (Якимъ < Ιωακείμ) і слов''янських (Гюрята — від
    Гюрги/Георгій, але зі слов''янським суфіксом).'
  - '[!decolonization] Паралельний переклад, що показує, як сучасна українська мова зберегла або трансформувала ці давні конструкції.
    Звернення уваги на слов''янську основу навіть у "чужих" іменах.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: порівняльний аналіз парадигм відмінювання. Як відмінювалися чоловічі імена на -о (Данило), на
    приголосний (Ігорь, Олегъ), і як відмінювалися прізвиська, утворені від загальних назв.'
  - 'Вправа 1: Провідміняти за відмінками пару імен "Всеволодъ" (слов''янське) та "Михаилъ" (християнське). Знайти спільне
    та відмінне.'
  - 'Етимологічний слід: простежити шлях імені від давньосхіднослов''янської до сучасної української. Напр., Гюрги → Юрій,
    Гюргиня → Юр''єва.'
  - '[!myth-buster] Міф про те, що слов''яни не мали складної системи імен. Розгляд дохристиянських двоосновних імен (Володимиръ,
    Святославъ) як доказ розвиненої ономастичної культури.'
  section: 'Мовна лабораторія: Відмінювання імен та прізвиськ'
  words: 1700
- points:
  - 'Повернення до розминки: студент дає розгорнуту відповідь на питання про "Іоанна Ніженця", використовуючи терміни "ономастична
    диглосія", "хрещене ім''я", "мирське ім''я".'
  - 'Лінгвістичний висновок: імена — це не просто етикетки, а поле битви культур, індикатор соціальних змін та безцінне джерело
    для вивчення історії мови.'
  - 'Зв''язок із сьогоденням: як давня традиція подвійних імен відлунює в сучасних українських прізвищах, що походять від
    прізвиськ (Кривоніс, Головатий)?'
  section: Дискусія та підсумок
  words: 600
focus: Dual naming system in Old East Slavic — Christian baptismal names vs. Slavic vernacular nicknames (e.g., Іоаннъ vs.
  Ніженець), onomastic diglossia, sources of names.
level: OES
module: oes-018
objectives:
- Розрізняти християнські та слов'янські імена в давньосхіднослов'янських текстах
- Аналізувати явище ономастичної диглосії як результат культурного контакту
- Застосовувати базові методи граматичного та етимологічного аналізу до давніх антропонімів
- Формулювати аргументовану позицію щодо ролі імен у конструюванні соціальної та культурної ідентичності
