content_outline:
- points:
  - 'Провокація: «Слово о полку Ігоревім» — це автентичний епос XII століття чи геніальна підробка XVIII століття? Показуємо
    два фрагменти тексту: один — безперечно з XII ст., інший — з XVIII ст. Чи зможете ви на око відрізнити, до якої епохи
    належить фрагмент «Слова»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Текстологічний): Чи могла людина XVIII століття знати так багато про реалії XII століття? Аргументи скептиків
    (Мазон, Зімін) про анахронізми та пізніші запозичення. Аргументи традиціоналістів (Залізняк, Якобсон) про унікальні деталі,
    які неможливо було сфальсифікувати.'
  - 'Дебат 2 (Лінгвістичний): Чи є мова «Слова» типовою для XII століття? Скептики вказують на унікальні слова (гапакси) та
    граматичні форми. Традиціоналісти доводять, що ці риси — ознака високого поетичного стилю, а не помилка фальсифікатора.'
  - '[!decolonization] Російська імперська та радянська наука монополізувала «Слово» як суто «древнерусское» явище. Дискусія
    про автентичність використовувалася для політичних цілей. Ми розглядаємо текст як спільну спадщину східних слов''ян.'
  - '[!epistemic-humility] Остаточної крапки в суперечці немає. Обидві сторони мають вагомі аргументи. Наше завдання — навчитися
    розуміти логіку доказів, а не обрати «правильну» відповідь.'
  section: 'Конфліктна карта: Скептики проти традиціоналістів'
  words: 800
- points:
  - 'Оригінальний текст: Аналіз фрагменту «Слова», який є центральним для дебатів (напр., «Боянъ бо вѣщій, аще кому хотяше
    пѣснь творити...»)'
  - 'Словотвір та лексика: Дослівний розбір фрази, підкреслення слів, які скептики вважають підозрілими (гапакси, нетипові
    форми).'
  - 'Граматичний коментар: Парсинг дієслівних форм (аорист, імперфект), відмінювання іменників, використання двоїни. Чи відповідає
    це нормам XII ст.?'
  - 'Паралельний переклад: Порівняння з кількома перекладами на сучасну українську мову — як різні перекладачі інтерпретували
    складні місця?'
  - '[!decolonization] Розвінчання міфу про «незрозумілість». Показуємо, що 90% лексики має прямі відповідники в сучасній
    українській мові.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична експертиза: Порівняльний аналіз. Беремо граматичну конструкцію зі «Слова» і порівнюємо її з аналогічними конструкціями
    з беззаперечно автентичних текстів XII ст. (напр., «Повість временних літ») та текстів XVIII ст.'
  - 'Пошук анахронізмів: Чи є в тексті слова, які з''явилися в мові значно пізніше XII ст.? Методологія лінгвістичного аналізу.'
  - 'Етимологічний слід: Простежуємо еволюцію 3-4 ключових слів зі «Слова» від давньосхіднослов’янської до сучасної української.
    Чи виглядає їхня форма у «Слові» логічним етапом цього розвитку?'
  - '[!myth-buster] Міф про «унікальність» мови «Слова». Залізняк довів, що більшість нібито унікальних рис насправді зустрічаються
    в інших, менш відомих текстах того періоду (наприклад, у берестяних грамотах).'
  section: 'Мовна лабораторія: Лінгвістичні докази в суді історії'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер, озброївшись знаннями, на чиєму ви боці в дебаті про автентичність? Студент має сформулювати
    власну позицію, спираючись на докази з модуля.'
  - 'Лінвістичний висновок: Що ця суперечка говорить нам про стан давньосхіднослов’янської мови у XII ст.? Якою була варіативність,
    якою була роль церковнослов’янізмів, яким був поетичний стиль?'
  - 'Зв''язок із сучасністю: Як дебати про текст тисячолітньої давності впливають на сучасну ідентичність та культурну політику?'
  section: Дискусія та підсумок
  words: 600
focus: Philological and linguistic arguments for and against the 12th-century origin of the "Slovo", analyzing the text as
  primary evidence in the debate.
level: OES
module: oes-086
objectives:
- Аналізувати основні аргументи "за" і "проти" автентичності «Слова о полку Ігоревім» з позицій текстології та лінгвістики.
- Читати та перекладати фрагменти оригінального тексту «Слова», виконуючи граматичний та лексичний розбір ключових форм.
- Застосовувати методи лінгвістичного аналізу (порівняння, пошук анахронізмів, етимологічний аналіз) для оцінки історичних
  текстів.
- Сформулювати власну обґрунтовану думку щодо дискусійного питання, спираючись на філологічні докази.
