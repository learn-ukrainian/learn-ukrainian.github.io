content_outline:
- points:
  - 'Провокація: "Игорь князь поскочи горнастаемъ къ тростію и бѣлымъ гоголемъ на воду". Як це речення, що описує втечу, розкриває
    всю поетику та граматику давньосхіднослов''янського епосу?'
  - Студент отримує тільки цей фрагмент і має спробувати розшифрувати його, спираючись на знання сучасної української.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Слово" автентичним текстом XII ст., чи це геніальна підробка XVIII ст.? Аргументи "за" і "проти", від
    Мусіна-Пушкіна до сучасних скептиків.'
  - 'Дебат 2: "Темні місця" у сцені втечі. Це помилки переписувачів, втрачені реалії, чи свідомі поетичні прийоми? Як різні
    наукові школи (радянська, українська, західна) їх інтерпретують?'
  - '[!epistemic-humility] Ми ніколи не будемо певні на 100% щодо автентичності, бо оригінал згорів. Вся філологія "Слова"
    — це робота з єдиною, можливо, недосконалою копією.'
  - '[!decolonization] Російська імперська наука часто "виправляла" незрозумілі місця, підганяючи їх під норми сучасних російських
    діалектів, ігноруючи при цьому унікальні протоукраїнські риси тексту.'
  section: 'Конфліктна карта: Автентичність тексту та «темні місця»'
  words: 800
- points:
  - Повний текст сцени втечі Ігоря з полону в оригіналі (давньосхіднослов'янською мовою).
  - 'Дослівний переклад-глосування: кожне слово або фраза з детальним граматичним розбором (особлива увага на форми дієслів).'
  - 'Граматичний коментар: аналіз форм аориста (поскочи, поверже) та імперфекта для передачі динаміки подій. Як автор розрізняє
    миттєві та тривалі дії.'
  - Паралельний переклад сучасною українською мовою з коментарями, що пояснюють синтаксичні та лексичні розбіжності.
  - '[!decolonization] Замість "древнерусский язык" використовуємо "давньосхіднослов''янська мова". Аналізуємо лексику, що
    має прямі відповідники в сучасній українській, але не в російській.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Детальний аналіз системи минулих часів (аорист, імперфект, перфект, плюсквамперфект) на матеріалі
    тексту. Як і чому ця система зникла?'
  - 'Етимологічна лабораторія: Простежуємо шлях слів зі сцени втечі: "вълкъ", "гоголь", "вечеръ", "зори". Як змінились їхні
    форми та значення в сучасній українській мові.'
  - 'Синтаксична лабораторія: Порівняння структури речення у "Слові" та в сучасній українській. Вільний порядок слів, використання
    енклітик та постпозитивних часток.'
  - '[!myth-buster] Міф про те, що давня мова була "простішою". Система з чотирьох минулих часів була значно складнішою за
    сучасну українську чи російську.'
  section: 'Мовна лабораторія: Дієслова руху та перфектні часи'
  words: 1700
- points:
  - 'Повернення до розминки: аналізуємо речення "Игорь князь поскочи..." з повним розумінням граматики, лексики та поетики.'
  - 'Головний лінгвістичний висновок: Як використання аориста та дієслів-метафор (поскочи горностаєм, полетѣ соколом) створює
    унікальний кінематографічний ефект у тексті?'
  - 'Зв''язок із сучасністю: Які з граматичних явищ "Слова" (наприклад, залишки двоїни, кличний відмінок) досі живі в українській
    мові, і чому це важливо?'
  section: Дискусія та підсумок
  words: 600
focus: The escape of Prince Ihor from Polovtsian captivity in 'The Tale of Ihor's Campaign'. Linguistic focus on OES verbs
  of motion, aspect (aorist, imperfect), and the transformation motif.
level: OES
module: oes-081
objectives:
- Аналізувати філологічні дебати навколо автентичності та інтерпретації 'Слова о полку Ігоревім'
- Читати та перекладати уривок з оригінального тексту 'Слова', ідентифікуючи ключові граматичні форми (аорист, імперфект,
  дієслова руху)
- Пояснювати різницю між аористом та імперфектом у давньосхіднослов'янській мові на прикладах з тексту
- Критично оцінювати 'давньоруські' наративи, розрізняючи риси, спільні для східних слов'ян, та протоукраїнські особливості
