activity_hints:
- description: Розрізнення аргументів "автентистів" та "скептиків". Визначення, до якої наукової школи належить певна інтерпретація
    "темного місця".
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: Вставити правильну форму дієслова (аорист або імперфект) у речення з тексту, виходячи з контексту (миттєва
    чи тривала дія).
  focus: Граматика "Слова"
  items: 8
  type: fill-in
- description: 'Подано два тексти: уривок зі "Слова" та уривок зі спогадів Івана Багряного "Тигролови". Порівняйте мовні засоби
    опису втечі, мотиви героїв та образ "дикої природи" як ворога і помічника. Що спільного і відмінного у світовідчутті людини
    XII та XX століття?'
  focus: 'Порівняльний аналіз: Втеча Ігоря vs Втеча з ГУЛАГу'
  type: note
- description: На основі матеріалів модуля (лексика, граматичні риси, історичний контекст) напишіть есе (400-600 слів), що
    обґрунтовує належність "Слова о полку Ігоревім" до української літературної традиції, спростовуючи тези російської пропаганди
    про "общерусское наследие".
  focus: 'Есе: Чому "Слово" — це українська література?'
  type: note
