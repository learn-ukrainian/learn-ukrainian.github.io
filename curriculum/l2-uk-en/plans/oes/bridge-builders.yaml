content_outline:
- points:
  - 'Провокація: "Аще кто режеть мост, или жордье, или вервь..." — що це: кримінальний кодекс чи прейскурант? Розшифруйте
    фрагмент із "Руської Правди" без словника.'
  - 'Загадка: слово "мостникъ". Це будівельник мостів, чиновник, що збирає плату за проїзд, чи сам міст? Простежте логіку
    давньосхіднослов''янського словотвору.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Мостники" — це давній звід законів часів Ярославичів чи пізніша вставка у "Правду Руську"? Проблема датування
    та кодифікації.'
  - 'Дебат 2: Лексика "мостників" — це побутова давньосхіднослов''янська чи юридичний жаргон, запозичений у варягів? Аналіз
    термінів "гривна", "вервь".'
  - '[!epistemic-humility] Точне датування фрагментів "Руської Правди" є неможливим; вчені оперують відносними хронологіями
    на основі лінгвістичних маркерів.'
  - '[!decolonization] Російська імперська історіографія представляла "Руську Правду" як виключно "древнерусский" закон. Насправді,
    це спільна спадщина, що відображає правові норми саме на території сучасної України (Київ).'
  section: 'Конфліктна карта: Чий закон, чия мова?'
  words: 800
- points:
  - 'Оригінальний текст: повний уривок про "мостників" з "Просторої редакції Правди Руської".'
  - 'Послівний глосарій: розбір ключових термінів — "мостъ", "горожа", "вервь", "гривна кунъ", "головникъ".'
  - 'Граматичний парсинг: аналіз форм дієслів (інфінітиви, умовний спосіб "аще"), синтаксис юридичних формул.'
  - 'Паралельний переклад сучасною українською мовою: як би цей закон виглядав сьогодні?'
  - '[!decolonization] Нотатки про специфічні риси мови (повноголосся), що вказують на її київське, а не новгородське походження.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: структура юридичної норми "Аще... то...". Аналіз синтаксису умовних конструкцій у давньосхіднослов''янській.'
  - 'Етимологічний слід: як слово "гривна" еволюціонувало від шийної прикраси до грошової одиниці, і зрештою до національної
    валюти України.'
  - 'Лексична семантика: аналіз групи слів, пов''язаних із будівництвом та інфраструктурою ("мост", "горожа", "жердье").'
  - '[!myth-buster] "Гривна" — це не просто "стара грошова одиниця". Це складна система ваги срібла з різними номіналами ("гривна
    кунъ" vs "гривна срібла"), що видно з тексту.'
  section: 'Мовна лабораторія: Економіка та право в мові'
  words: 1700
- points:
  - 'Повернення до розминки: тож "Мостники" — це кримінальний кодекс чи прейскурант? Студент формулює відповідь, спираючись
    на аналіз тексту.'
  - 'Лінгвістичний підсумок: як давньосхіднослов''янська мова створювала абстрактні юридичні та економічні поняття з конкретних,
    побутових слів ("вервь" — мотузка → громада).'
  - 'Зв''язок із сучасністю: які принципи з "Руської Правди" (наприклад, грошова компенсація за злочин) збереглися в сучасному
    праві? Які слова дожили до наших днів?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз економічного фрагменту "Руської Правди" ("Мостники"), господарська лексика, структура тарифів, правові норми
  та суспільні відносини давніх східних слов'ян
