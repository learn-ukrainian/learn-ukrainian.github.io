content_outline:
- points:
  - 'Провокація: «Клянемось мечами нашими...» vs «Цілуємо хрест...». Подано дві формули клятви з тексту договору. Яка з них
    «руська», а яка «грецька»? Що це говорить про суспільство того часу?'
  - 'Лінгвістична загадка: Що означає форма «на двою саблю»? Чому не «на дві саблі»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Текстологічний): Чи є збережений текст договору оригіналом, чи це переклад з грецької? Аргументи «за» (синтаксичні
    еллінізми) та «проти» (багата східнослов’янська лексика).'
  - 'Дебат 2 (Лінгвістичний): Мова договору — це церковнослов’янська чи жива давньосхіднослов’янська? Як розрізнити ці шари?
    [!decolonization] Це не «давньоруська», а мова спільного спадку, що містить риси, які згодом стануть прото-українськими.'
  - '[!epistemic-humility] Більшість вчених схиляються до гіпотези про грецький оригінал, але якість перекладу настільки висока,
    що його можна вважати самостійним літературним пам''ятником.'
  section: 'Конфліктна карта: Оригінал чи переклад?'
  words: 800
- points:
  - 'Повний текст клятв з Договору 944 року: язичницької (Ігор та його бояри) та християнської (християнська частина дружини).'
  - Оригінальний текст (у нормалізованій орфографії) з паралельним сучасним українським перекладом.
  - 'Послівний глосарій: розбір лексики, зокрема юридичної та військової (оружжя, паволоки, скора).'
  - 'Граматичний парсинг: аналіз форм аористу (рекохом, ходихом), імперфекту, двоїни (на двою саблю) та синтаксису (давальний
    самостійний).'
  - '[!decolonization] Аналіз показує, що східнослов’янська мова вже в X ст. мала повний набір засобів для вираження складних
    юридичних і дипломатичних понять, спростовуючи імперський міф про її «нерозвиненість».'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Двоїна. Аналіз усіх випадків двоїни в тексті договору. Як вона функціонує? Чому зникла з української
    мови?'
  - 'Часова система: Аорист та імперфект. Вправи на розпізнавання та переклад минулих часів. Порівняння з сучасною українською
    системою (один минулий час).'
  - 'Синтаксична лабораторія: Давальний самостійний (Dativus Absolutus). Розбір конструкцій типу «склонившимъся воемъ нашимъ».
    Як ця грецька за походженням конструкція адаптувалася у східнослов’янському синтаксисі?'
  - '[!myth-buster] Помилково вважати, що всі незрозумілі форми — це «церковнослов’янізми». Багато з них (аорист, двоїна)
    — це автентичні риси живої мови того часу, згодом втрачені.'
  section: 'Мовна лабораторія: Морфологія та синтаксис клятви'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може пояснити не лише різницю між клятвами, а й граматичну суть форми «на двою
    саблю».'
  - Що Договір 944 розповідає про стан мови в Русі X ст.? (двомовність еліти, співіснування церковнослов’янської та народної
    мов, багатство граматичної системи).
  - 'Зв''язок із сучасністю: які риси мови договору збереглися в сучасній українській мові, а які стали архаїзмами? (Наприклад,
    лексика vs граматика).'
  section: Дискусія та підсумок
  words: 600
focus: Philological and linguistic analysis of the Treaty of 944, focusing on the dichotomy of Pagan and Christian oath formulas
  and their grammatical structure in Old East Slavic.
level: OES
module: oes-072
objectives:
- Аналізувати лінгвістичні особливості християнської та язичницької формул клятви у Договорі 944 року.
- Розрізняти давньосхіднослов’янські та церковнослов’янські елементи в тексті договору.
- Аргументувати позицію в філологічному дебаті щодо оригінальної мови договору (грецька vs. східнослов’янська).
- Простежити еволюцію граматичних форм (двоїна, аорист) від давньосхіднослов’янської до сучасної української мови.
