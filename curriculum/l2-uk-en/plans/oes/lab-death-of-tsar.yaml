activity_hints:
- description: Визначити, яка з наведених тез стосується дебату про автентичність, а яка — про значення титулу.
  focus: 'Конфліктна карта: Дебати про титул ''цар'''
  items: 4
  type: quiz
- description: Вставити слова 'місяць', 'цар', 'наш' у правильній формі родового відмінка в речення з тексту.
  focus: Давньосхіднослов'янські відмінки
  items: 3
  type: fill-in
- description: Дано фотографію графіті (або його промальовку). Опишіть 2-3 літери, що відрізняються від сучасних. Поясніть
    роль титла у слові ц(а)ря.
  focus: 'Палеографічний аналіз: Реконструкція напису'
  type: note
- description: 'Напишіть коротке есе (300-400 слів) на тему: "Як використання слова ''цар'' у графіті 1054 року допомагає
    спростувати російські імперські наративи про історію Русі?"'
  focus: 'Есе: Чому одне слово має значення?'
  type: note
cefr_min: C2
