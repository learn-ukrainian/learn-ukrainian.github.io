content_outline:
- points:
  - 'Провокація: один напис на стіні собору. Що він може розповісти про мову, політику та світогляд Києва ХІ століття?'
  - 'Текст для дешифрування: "В 6562 мсця февраля 20 успеніе царя нашего". Студент має спробувати перекласти, спираючись на
    знання сучасної української.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автентичність та датування графіті. Чи це запис сучасника події, чи пізніша вставка? Аналіз палеографічних доказів.'
  - 'Дебат 2: Чому Ярослава названо ''царем''? Це офіційний титул, церковний панегірик чи політична декларація? [!decolonization]
    — виклик московській монополії на титул ''цар'' і спадщину Візантії.'
  - '[!epistemic-humility] Висоцький та інші палеографи сперечаються про тотожність почерків. Докази не є остаточними.'
  - 'Контекст: використання титулу ''каган'' щодо Володимира та Ярослава. Як ''цар'' вписується в цю систему титулів?'
  section: 'Конфліктна карта: ''Цар'' у Києві?'
  words: 800
- points:
  - 'Повний текст графіті: "В(ъ) лѣт(о) ҃ѕ҃ф҃ѯ҃в҃ м(ѣся)ця февраля въ к҃ успеніє ц(а)ря нашего". Представлення різних варіантів
    реконструкції.'
  - 'Послівний глос: В(ъ) лѣт(о) (в рік) — ҃ѕ҃ф҃ѯ҃в҃ (6562) — м(ѣся)ця февраля (місяця лютого) — въ к҃ (в 20-й) — успеніє
    (успіння, смерть) — ц(а)ря нашего (царя нашого).'
  - 'Граматичний розбір: конструкція дати (родовий відмінок місяця), форми родового відмінка однини ''мсця'', ''царя'', ''нашего''.'
  - '[!decolonization] Паралельний переклад сучасною українською: "У 6562 [1054] році, місяця лютого, у 20-й день, успіння
    нашого царя". Акцент на східнослов''янській природі мови, а не ''давньоруській''.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Палеографічний аналіз: форма літер (устав), наявність виносних літер, титла (над ''лѣт'', ''мсця'', ''цря''). Що це говорить
    про писаря?'
  - 'Система датування: "від створення світу" (6562 р.) vs "від Різдва Христового" (1054 р.). Як і чому використовували першу?'
  - 'Лексичний аналіз: ''успеніє'' — церковнослов’янізм. Як би звучало це слово у народній мові? Порівняння зі ''смерть''.'
  - '[!myth-buster] Графіті — це не просто вандалізм. У середньовічних соборах це була форма комунікації, молитви, залишення
    історичної пам’яті.'
  section: 'Мовна лабораторія: Палеографія та датування'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може дати повний лінгвістичний та історичний коментар до фрази.'
  - 'Лінгвістичний висновок: що це єдине речення говорить про мовну ситуацію в Києві ХІ ст.? (Співіснування церковнослов’янської
    та місцевої розмовної основ).'
  - 'Історичний висновок: як напис про смерть Ярослава відображає політичні амбіції та культурні зв''язки Русі?'
  - 'Зв''язок із сучасністю: чому аналіз таких дрібних деталей є критично важливим для деколонізації історії Східної Європи?'
  section: Дискусія та підсумок
  words: 600
focus: 'Аналіз графіті 1054 року про смерть Ярослава Мудрого: палеографія, лінгвістика, історичний контекст'
level: OES
module: oes-023
objectives:
- Аналізувати графіті як історичне та лінгвістичне джерело, розрізняючи палеографічні, мовні та історичні рівні аналізу
- Реконструювати та перекладати короткі давньосхіднослов'янські тексти, ідентифікуючи граматичні форми та церковнослов'янізми
- Розрізняти наукові дебати щодо інтерпретації джерел та формулювати власну позицію, спираючись на докази
- Використовувати лінгвістичний аналіз для критики та спростування імперських історичних наративів
