content_outline:
- points:
  - 'Провокація: "Не лѣпо ли ны бяшетъ, братїе, начяти старыми словесы..." — що означає це речення? Спроба декодування без
    підказок, спираючись на знання сучасної української.'
  - 'Загадка: хто такий Боян і чому він "растекашется мыслію по древу"? Початкові гіпотези студента.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Слово" автентичним текстом XII ст., чи це геніальна підробка XVIII ст.? Аргументи скептиків (Мазон, Зімін)
    vs. захисників (Якобсон, Ліхачов). [!epistemic-humility]'
  - 'Дебат 2: Ким був Боян? Реальний придворний співець, узагальнений образ барда, чи суто літературний прийом автора "Слова"?
    Аналіз різних інтерпретацій.'
  - '[!decolonization] Виклик терміну "давньоруська література". "Слово" як спільна спадщина, а не ексклюзивна власність російської
    культури. Його мова — це давньосхіднослов''янська, а не "давньоросійська".'
  section: 'Конфліктна карта: Автентичність "Слова" та особа Бояна'
  words: 800
- points:
  - Повний текст Заспіву ("Не лѣпо ли ны...") в оригіналі (нормалізована орфографія).
  - 'Детальний пофразовий розбір: оригінальна фраза → дослівний переклад → граматичний коментар (розбір відмінків, часів дієслів).'
  - 'Граматичний парсинг: ідентифікація та аналіз форм аориста (начяти), імперфекта (бяшетъ), перфекта та форм двоїни.'
  - Паралельний переклад сучасною українською мовою для порівняння синтаксису та лексики.
  - '[!decolonization] Примітки щодо церковнослов''янізмів (книжна лексика) та народних (вернакулярних) елементів у тексті.'
  section: 'Текст: Читання та переклад "Заспіву"'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз складних речень у Заспіві. Як поєднуються дієприкметникові та дієприслівникові звороти,
    що є типовим для книжної мови того часу.'
  - 'Етимологічна розвідка: Простеження еволюції ключових слів із Заспіву: "лѣпо", "трудный", "повести", "былина" — від давньосхіднослов''янської
    через староукраїнську до сучасних форм.'
  - 'Поетична лабораторія: Розбір метафор Бояна ("сірий вовк", "сизий орел", "розтікатися мислю по древу"). Порівняння з кельтськими
    кеннінгами або іншими епічними традиціями. [!myth-buster]'
  - 'Палеографічний куточок: Як міг виглядати цей текст у рукописі XII ст. (устав, півустав)?'
  section: 'Мовна лабораторія: Синтаксис та поетика Бояна'
  words: 1700
- points:
  - 'Повернення до розминки: повний лінгвістичний та історичний аналіз фрази "Не лѣпо ли ны бяшетъ, братїе...".'
  - 'Лінгвістичний підсумок: що Заспів "Слова" говорить нам про стан давньосхіднослов''янської мови кінця XII ст.? (багатство
    синонімії, складна система часів, високий стиль).'
  - 'Зв''язок із сучасністю: як "високий штиль" і книжна традиція "Слова" вплинули на розвиток української літературної мови?'
  section: Дискусія та підсумок
  words: 600
focus: 'The Bard''s prologue in "Slovo o polku Ihorevim": debates on authenticity, the figure of Boyan, and the tension between
  poetic truth and historical fact.'
