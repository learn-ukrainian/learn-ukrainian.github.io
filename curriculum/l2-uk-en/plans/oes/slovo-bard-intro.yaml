activity_hints:
- description: Наведено цитати з аргументами скептиків та захисників автентичності "Слова". Визначити, до якого табору належить
    теза.
  focus: 'Філологічна дискусія: хто правий?'
  items: 6
  type: quiz
- description: У реченнях з тексту пропущено дієслова. Студент має вставити правильну форму аориста або імперфекта.
  focus: 'Граматика Заспіву: Аорист чи Імперфект?'
  items: 5
  type: fill-in
- description: Проаналізуйте уривок, де описується творчість Бояна. Які метафори використовуються? Що вони говорять про роль
    поета в суспільстві того часу? (300-400 слів).
  focus: 'Джерельний аналіз: Поетика Бояна'
  type: note
- description: На основі Заспіву поясніть, як автор "Слова" розрізняє "старі словеса" Бояна та "повісті временних літ". Чому
    для нього важливо розповісти історію "по былинам сего времени", а не "по замышленію Бояню"? (400-600 слів).
  focus: 'Есе: Історична правда vs. Поетична правда'
  type: note
cefr_min: C2
connects_to:
