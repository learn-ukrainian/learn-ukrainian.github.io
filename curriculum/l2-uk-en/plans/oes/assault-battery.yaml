activity_hints:
- description: Кому належить теза про первинність Короткої Правди? Які мовні риси вказують на церковнослов'янський вплив?
    Перевірка позицій з Конфліктної карти.
  focus: Розуміння філологічних дебатів
  items: 5
  type: quiz
- description: Вставити правильну форму інструментального відмінка в речення з Руської Правди (меч_, палиц_, рог_, чаш_).
  focus: Інструментальний відмінок знаряддя
  items: 4
  type: fill-in
- description: 'Надано статтю про образу з Короткої та Розширеної Правди. Порівняйте текст: що було додано чи змінено в Розширеній
    редакції і які юридичні та лінгвістичні наслідки це мало?'
  focus: 'Джерельний аналіз: Порівняння редакцій'
  type: note
- description: 'На основі проаналізованих текстів напишіть есе (400-600 слів) на тему: "Як Руська Правда використовує мову
    (синтаксис, лексику, граматичні форми) для створення чіткої системи правових норм та покарань?"'
  focus: 'Есе: Мова як правовий інструмент'
  type: note
