content_outline:
- points:
  - 'Провокація: "Аще кто ударить кого батогомь..." Що означала ця фраза для людини ХІ століття і чим вона відрізняється від
    "...ударить мечемь"?'
  - 'Спробуйте розшифрувати: "А за пакощь, що єму будеть, то єму платити". Про яку "пакощь" ідеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Проблема редакцій. Коротка, Розширена, Скорочена Правда — що є оригіналом, а що пізнішою компіляцією? Позиції
    Шахматова vs. Тихомирова.'
  - 'Дебат 2: Мовне питання. Це побутова давньосхіднослов''янська мова чи текст, що зазнав сильного впливу церковнослов’янської
    книжності? [!decolonization] Чому називати її "давньоруською" є імперським наративом?'
  - '[!epistemic-humility] Більшість списків Руської Правди дійшли до нас у редакціях XIV-XV ст., що ускладнює точне датування
    та атрибуцію мовних рис ХІ ст.'
  section: 'Конфліктна карта: Чия Правда? Філологічні дебати'
  words: 800
- points:
  - 'Першоджерело: Статті 22-27 Розширеної Правди (за Синодальним списком) про побої, ушкодження та образу.'
  - 'Порядковий аналіз: "Аще ли кто вынезъ мечь, а не утнеть..." — розбір синтаксису умовних речень.'
  - 'Граматичний коментар: Розбір форм інструментального відмінка: ударити (чим?) мечемь, палицею, рогомь, чашею.'
  - 'Паралельний переклад: Порівняння оригінального тексту з сучасним академічним українським перекладом.'
  - '[!decolonization] Підкреслення того, що Руська Правда є спільною правовою пам''яткою предків українців, білорусів та
    росіян, а не виключно російською спадщиною.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Функції інструментального відмінка в тексті Правди. Інструмент дії (ударити мечемь), спосіб дії,
    агенс у пасивних конструкціях.'
  - 'Етимологічна розвідка: Простежуємо еволюцію юридичних термінів: "вира", "гривна", "послух", "головник" від ХІ ст. до
    сучасності (або їх зникнення).'
  - 'Фонологічна лабораторія: Аналіз написання слів у тексті для ілюстрації падіння редукованих (наприклад, "кто" vs "къто").'
  - '[!myth-buster] Поширений міф про те, що будь-який удар карався однаково. Руська Правда чітко диференціює покарання залежно
    від знаряддя, статусу потерпілого та наявності "образи".'
  section: 'Мовна лабораторія: Інструменталіс знаряддя та покарання'
  words: 1700
- points:
  - 'Повернення до розминки: Студент тепер може дати повну юридичну та лінгвістичну оцінку фрази "ударити батогомь".'
  - 'Лінгвістичний висновок: Як кодифікація права в Руській Правді сприяла стандартизації юридичної термінології та синтаксичних
    конструкцій у давньосхіднослов''янській мові?'
  - 'Зв''язок із сучасністю: Як поняття "образа честі" з Руської Правди трансформувалося в сучасне українське поняття "образа
    честі та гідності"?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз статей Руської Правди про тілесні ушкодження. Інструментальний відмінок як маркер знаряддя злочину. Філологічні
  дебати навколо автентичності та мовних шарів тексту.
level: OES
