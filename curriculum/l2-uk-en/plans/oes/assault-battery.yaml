objectives:
- Аналізувати статті Руської Правди про тілесні ушкодження та образу, розрізняючи юридичні нюанси
- Пояснювати ключові філологічні дебати щодо датування та мовних особливостей Руської Правди
- Правильно ідентифікувати та аналізувати форми інструментального відмінка у давньосхіднослов'янському юридичному тексті
- Простежувати еволюцію юридичної лексики від давньосхіднослов'янської до сучасної української мови
