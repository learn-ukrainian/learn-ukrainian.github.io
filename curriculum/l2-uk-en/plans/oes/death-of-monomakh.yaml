content_outline:
- points:
  - 'Провокація: "А се благородныи князь... не дасть бо силному обидети меншаго". Ця ідеалізована характеристика Мономаха
    з його посмертної похвали — щира правда чи політична пропаганда XII століття?'
  - Короткий уривок (2-3 слова) з тексту, що містить аорист або імперфект. Студент має спробувати вгадати значення, спираючись
    на сучасну мову.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Текстологічний): Чи є похвала Мономаху цілісним текстом, написаним одразу по його смерті, чи це компіляція з
    кількох джерел, додана до літопису пізніше? Позиції Шахматова vs. Ліхачова.'
  - 'Дебат 2 (Лінгвістичний): Мова похвали — це переважно церковнослов’янський «високий стиль» чи вона відображає розмовні
    риси тогочасної давньосхіднослов’янської мови Києва? [!decolonization] Розвінчання міфу про «давньоруську мову» — аналіз
    мовних рис, спільних та відмінних для предків українців та білорусів.'
  - '[!epistemic-humility] Ми не маємо оригіналу; аналізуємо копії (списки), зроблені через сотні років, що ускладнює остаточні
    висновки.'
  section: 'Конфліктна карта: Створення образу ідеального князя'
  words: 800
- points:
  - Повний текст похвали Володимиру Мономаху з Повісті Временних Літ (за Лаврентіївським списком).
  - Оригінальний текст (нормалізована орфографія) поряд із паралельним перекладом сучасною українською мовою.
  - 'Детальний граматичний розбір ключових речень: визначення відмінків іменників (особливо давального самостійного), форм
    минулих часів дієслів (аорист, імперфект, перфект), функцій дієприкметників.'
  - '[!decolonization] Примітки про різницю між церковнослов’янізмами (книжними елементами) та східнослов’янськими рисами
    (повноголосся, специфічна лексика), що доводять місцевий характер мови.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: детальний аналіз дієслів минулого часу в тексті похвали. Чому автор в одному випадку вживає аорист
    (для констатації факту дії), а в іншому — імперфект (для опису тривалої чи повторюваної дії)?'
  - 'Вправи на розрізнення: студентам дано речення з тексту з пропущеним дієсловом і дві форми (аорист та імперфект) — треба
    вибрати правильну і пояснити вибір.'
  - 'Етимологічний слід: як система минулих часів OES (аорист, імперфект, перфект, плюсквамперфект) спростилася до єдиного
    минулого часу в сучасній українській мові? Простежуємо шлях трансформації.'
  - '[!myth-buster] Розвінчання міфу, що OES була «простою» мовою. Її дієслівна система була значно складнішою та нюансованішою,
    ніж у сучасних східнослов’янських мовах.'
  section: 'Мовна лабораторія: Аорист та Імперфект'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, похвала Мономаху — це пропаганда чи історичне джерело? Студент має сформулювати власну
    відповідь, використовуючи аргументи з модуля.'
  - 'Лінгвістичний висновок: що текст похвали говорить нам про стан мови в Києві першої половини XII століття? Як співіснували
    книжна та розмовна стихії?'
  - 'Зв''язок із сучасністю: які риси «ідеального правителя», описані в похвалі Мономаху, залишаються актуальними для політичних
    лідерів і сьогодні?'
  section: Дискусія та підсумок
  words: 600
