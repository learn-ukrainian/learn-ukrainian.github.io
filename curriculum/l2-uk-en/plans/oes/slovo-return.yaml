objectives:
- Аналізувати філологічні дебати про автентичність 'Слова о полку Ігоревім'
- Виконувати граматичний та синтаксичний розбір давньосхіднослов'янських славослов'їв
- Пояснювати різницю між книжно-слов'янськими та народно-розмовними елементами в тексті 'Слова'
- Простежувати еволюцію семантики ключових понять (слава, честь) від давньосхіднослов'янської до сучасної української мови
