activity_hints:
- description: Перевірка позицій у суперечці про автентичність. Чия це теза — скептиків (Зімін) чи автентистів (Залізняк)?
  focus: Дебати про автентичність "Слова"
  items: 4
  type: quiz
- description: Заповніть пропуски правильними відмінковими формами (давальний, кличний) у фрагментах славослов'їв з тексту
    модуля.
  focus: Граматичні форми у славослов'ї
  items: 5
  type: fill-in
- description: Оберіть один лінгвістичний аргумент "за" або "проти" автентичності "Слова" (напр., наявність аориста, унікальна
    лексика, "гапакси"). Оцініть його силу та можливі контраргументи.
  focus: Аналіз доказової бази
  type: note
- description: Порівняйте структуру та функцію сучасного гасла "Слава Україні! — Героям Слава!" із формулами славослов'я у
    "Слові". Що спільного, що відмінного, як традиція трансформувалась? (400-600 слів).
  focus: 'Есе: "Слава Україні!" як продовження традиції'
  type: note
cefr_min: C2
connects_to:
- slovo-poetic-syntax-lab
content_outline:
- points:
  - 'Провокація: "Слава Игорю Святъславличю, буй туру Всеволоду, Володимиру Игоревичю!". Що це — початок молитви, кінець бойового
    наказу чи приспів народної пісні?'
  - Студент розшифровує фразу, спираючись на знання сучасної української. Чиї імена тут згадані і в якому контексті?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автентичність vs Фальсифікація. Чи є "Слово" геніальним текстом XII ст., чи геніальною підробкою XVIII ст.?
    Позиції скептиків (Сенковський, Зімін) та автентистів (Ліхачов, Залізняк).'
  - 'Дебат 2: Текстологія славослов''я. Чи є фінальні пасажі "Слава князям..." органічною частиною епосу, чи це пізніша книжна
    вставка, що імітує фольклорний стиль?'
  - '[!decolonization] "Давньоруська" чи "давньосхіднослов''янська" пам''ятка? Боротьба за спадщину "Слова" як частина імперського
    та антиколоніального наративів.'
  - '[!epistemic-humility] Жодного "остаточного" доказу не існує. Ми працюємо з балансом ймовірностей, і сила лінгвістичних
    аргументів на боці автентичності.'
  section: 'Конфліктна карта: Автентичність ''Слова'''
  words: 800
- points:
  - 'Читання фінального славослов''я "Слову": "Слава Игорю Святъславличю..."'
  - 'Порядковий переклад та глосування: розбір кожного слова. Що таке "буй тур"? Чому "Игорю", а не "Игорь"?'
  - 'Граматичний коментар: давальний відмінок як об''єкт слави, кличний відмінок у звертаннях, форми двоїни (дв. ч.), синтаксис
    поетичних формул.'
  - '[!decolonization] Аналіз лексики: виявлення прото-українських рис (повноголосся, специфічна лексика) у тексті, що оскаржує
    ексклюзивні російські претензії.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо втрачених граматичних форм.
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Порівняльний аналіз синтаксичних моделей славослов''я у "Слові". Чим відрізняється формула "Слава
    [кому?]" від "Здоровъ [хто?] да будеши"? '
  - 'Етимологічна розвідка: "Слава", "честь", "хвала", "животъ". Простежуємо еволюцію семантики ключових понять "радості та
    похвали" від OES до сучасної української.'
  - 'Фонологічна лабораторія: Аналіз написання слів у славослов''ях на предмет наявності/відсутності редукованих (ъ, ь) та
    їх вокалізації.'
  - '[!myth-buster] "Слово" — не суцільний язичницький текст. Аналіз лексики та формул славослов''я показує складний синкретизм
    християнської книжності та народної героїчної епіки.'
  section: 'Мовна лабораторія: Синтаксис славослов''я'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може не просто перекласти, а й пояснити граматичну структуру та культурний контекст
    фрази "Слава Игорю...".'
  - 'Лінгвістичний підсумок: Що структура славослов''їв говорить нам про функцію мови в OES культурі — від ритуальної до соціально-маркувальної?'
  - 'Зв''язок із сьогоденням: "Слава Україні! — Героям Слава!". Аналізуємо сучасне гасло як нащадка давньої традиції, що отримав
    нове життя та нові сенси.'
  section: Дискусія та підсумок
  words: 600
