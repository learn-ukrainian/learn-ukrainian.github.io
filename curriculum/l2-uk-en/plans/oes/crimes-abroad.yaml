content_outline:
- points:
  - 'Провокація: «Аще убьєтъ Русинъ Християна...» — що буде далі? Спробуйте вгадати, як у X столітті вирішували справи про
    вбивства за кордоном, спираючись на логіку сучасного права.'
  - Порівняйте давньосхіднослов'янське «убииство» і сучасне «вбивство». Що змінилось у слові, а що — в законі?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є збережений слов''янський текст просто перекладом, чи договір від початку укладався двома мовами? Позиції
    лінгвістів та істориків.'
  - 'Дебат 2: [!decolonization] Мова договору — це прото-українська розмовна мова, чи «висока» церковнослов''янська? Чому
    російська історіографія наполягає на терміні «древнерусский язык» і в чому тут політичний розрахунок?'
  - '[!epistemic-humility] Багато питань про створення тексту залишаються без відповіді через брак джерел. Ми аналізуємо те,
    що маємо, але мусимо визнавати межі наших знань.'
  section: 'Конфліктна карта: Текст договору — грецький оригінал чи слов''янський переклад?'
  words: 800
- points:
  - 'Читання статті про вбивство: «Аще убьєтъ Русинъ Християна, или Християнъ Русина, да умретъ, идеже аще сотворитъ убииство».'
  - 'Синтаксичний розбір: структура речення, роль інфінітива «умретъ».'
  - 'Морфологічний аналіз: форма «убьєтъ» (аорист), відмінки іменників.'
  - '[!decolonization] Паралельний аналіз грецького тексту: чи точно слов''янський переклад передає юридичні нюанси візантійського
    права? Де є розходження?'
  - 'Читання статті про крадіжку: аналіз понять «татьба», «послуси» (свідки) та процедури доказування.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аорист — минулий час для юристів. Чому саме аорист (миттєва, завершена дія) став ідеальним інструментом
    для опису злочинів?'
  - 'Приклади аориста з тексту: «сотворитъ», «погуби», «въкраде». Відмінювання та семантика.'
  - 'Етимологічна лабораторія: терміни «вира» (штраф), «послух» (свідок), «тать» (злодій). Простежуємо їх шлях від давньосхіднослов''янської
    до сучасних правових систем.'
  - '[!myth-buster] «Руська Правда» — не єдине джерело права. Договори з Візантією є не менш важливим пам''ятником юридичної
    думки, що показує Русь як суб''єкта міжнародного права.'
  section: 'Мовна лабораторія: Юридична лексика та аорист'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, що станеться з русином, який убив грека? Формулюємо точну відповідь на основі прочитаного
    тексту.'
  - 'Лінгвістичний висновок: яку роль відігравали аорист та специфічна юридична лексика в правовій системі Русі?'
  - 'Історичний висновок: що текст договору говорить нам про рівень правової культури та міжнародних відносин Київської Русі
    в X столітті?'
  section: Дискусія та підсумок
  words: 600
focus: Analysis of articles on homicide and theft in the Rus-Byzantine Treaty of 944. Focus on legal terminology (вира, послух),
  dual-language text issues, and the use of the aorist in legal contexts.
level: OES
module: oes-071
objectives:
- Аналізувати оригінальний текст давньосхіднослов'янського юридичного документа (договору 944 р.) з повним граматичним коментарем
- Розрізняти семантику та вживання форм аориста та імперфекта в юридичному контексті
- Критично оцінювати філологічні та історичні дебати щодо автентичності та мови міжнародних договорів Київської Русі
- Простежувати еволюцію ключових юридичних термінів від давньосхіднослов'янської до сучасної української мови
