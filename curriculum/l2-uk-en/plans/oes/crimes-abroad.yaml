activity_hints:
- description: Перевірка розуміння дебатів про походження та мову договору. Чия це теза? Що означає термін?
  focus: Розуміння філологічної карти
  items: 5
  type: quiz
- description: Вставте правильний термін (аорист, вира, послух, тать) у речення з тексту договору.
  focus: Юридична лексика X століття
  items: 4
  type: fill-in
- description: Порівняйте статтю про вбивство з договору 944 року з відповідною статтею Кримінального кодексу сучасної України.
    Напишіть короткий аналіз (300-400 слів), відзначаючи ключові відмінності в підходах до доказування, покарання та самої
    філософії права.
  focus: 'Джерельний аналіз: Право X vs XXI століття'
  type: note
- description: Проаналізуйте мовні особливості статей про злочини (використання аориста, специфічна лексика). Що ці особливості
    говорять про правову культуру, соціальні відносини та цінності Київської Русі X століття? (400-600 слів)
  focus: 'Есе: Що мова договору говорить про суспільство?'
  type: note
