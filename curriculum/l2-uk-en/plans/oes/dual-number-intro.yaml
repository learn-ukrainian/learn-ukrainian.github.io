activity_hints:
- description: 'Перевірка обох позицій дебату: чи була двоїна живою нормою, чи церковнослов''янським рудиментом? Визначити
    позицію за цитатою.'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Заповніть пропуски правильними формами двоїни (іменники, прикметники) у реченнях із первинного тексту.
  focus: Форми двоїни
  items: 6
  type: fill-in
- description: На основі матеріалів Мовної лабораторії, поясніть 2-3 лінгвістичні причини, чому двоїна зникла з української
    мови. Чому деякі слова (очі, плечі) збереглися як винятки?
  focus: 'Аналіз: Занепад двоїни'
  type: note
- description: Візьміть речення з сучасного українського тексту про двох осіб. Перекладіть його давньосхіднослов'янською,
    використовуючи правильні форми двоїни. Поясніть свої граматичні рішення.
  focus: Порівняльний аналіз
  type: note
cefr_min: C2
