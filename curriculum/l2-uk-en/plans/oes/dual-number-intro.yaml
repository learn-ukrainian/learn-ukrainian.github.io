content_outline:
- points:
  - 'Провокація: В українській мові є однина і множина. А що, якби існувало третє число, спеціально для пар? Прочитайте фразу:
    "на коима тоима има". Про скількох людей ідеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Двоїна в текстах Русі — це жива розмовна риса чи книжковий церковнослов''янізм, що його використовували для
    високого стилю?'
  - 'Дебат 2: Чому двоїна зникла? Фонетичні зміни, що стерли різницю між формами, морфологічне спрощення чи вплив сусідніх
    мов?'
  - '[!decolonization] Твердження, що втрата двоїни є ознакою "спрощення" мови — це імперський наратив. Це природна еволюція,
    що відбувалася в усіх східнослов''янських мовах, але різними шляхами.'
  - '[!epistemic-humility] Писемні пам''ятки не дають повної картини. Писці були непослідовні, а реальна вимова могла відрізнятися
    від написаного.'
  section: 'Конфліктна карта: Жива норма чи мертвий рудимент?'
  words: 800
- points:
  - 'Первинне джерело: Уривок із літопису про двох братів-князів або юридичного тексту про двох свідків ("послуха").'
  - 'Послівний переклад та глоси: аналіз ключових форм двоїни, як-от "два брата", "обѣма рукама", "двою столу".'
  - 'Граматичний розбір: Визначення відмінків, родів та синтаксичної ролі форм двоїни в реченні.'
  - 'Паралельний переклад сучасною українською: Як ті самі поняття виражаються сьогодні за допомогою множини.'
  - '[!decolonization] Двоїна зберігалася в деяких українських діалектах значно довше, ніж у російській мові, що свідчить
    про окремий шлях розвитку.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Реконструкція парадигми двоїни для іменників, прикметників та займенників на основі тексту.'
  - 'Аналіз ключових пар: детальний розбір спадщини двоїни у словах "очі", "плечі", "руці", "нозі".'
  - 'Етимологічний слід: Як "помирала" двоїна? Простежуємо фонетичні та морфологічні зміни (занепад слабких єрів, сплутування
    флексій), що призвели до її поглинання множиною.'
  - '[!myth-buster] Двоїна не зникла безслідно. Її "привиди" існують в наголосах ("дві сестрі" vs "дві сестри") та фразеологізмах
    ("в обох руках").'
  section: 'Мовна лабораторія: Парадигма та розпад двоїни'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер ви можете повністю розібрати фразу "на коима тоима има". Що вона означає?'
  - 'Лінгвістичний висновок: Двоїна — це не просто "множина для двох". Це окремий спосіб бачення світу, організованого в природні
    пари.'
  - 'Зв''язок із сучасною українською: Які "привиди" двоїни живуть у сучасній мові та діалектах? Чому саме ці слова вижили?'
  - 'Ширше питання: Про що нам говорить втрата цілої граматичної категорії, як-от двоїна, в історії мови?'
  section: Дискусія та підсумок
  words: 600
focus: 'Двоїна (the dual number) in Old East Slavic: grammatical function, key forms (очі, руці, плечі), and its eventual
  decline.'
