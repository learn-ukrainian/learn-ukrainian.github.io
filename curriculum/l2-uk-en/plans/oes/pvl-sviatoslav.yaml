content_outline:
- points:
  - 'Провокація: фраза "Іду на ви!" без контексту. Що вона означає для сучасного українця?'
  - 'Лінгвістична загадка: як ця фраза могла звучати давньосхіднослов''янською? Які граматичні форми ви очікуєте побачити?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історіографія): Чи є оповідь про Святослава в ПВЛ об''єктивною хронікою, чи це стилізований героїчний епос,
    подібний до скандинавських саг?'
  - 'Дебат 2 (Лінгвістика): Чи є пряма мова Святослава ("Іду на ви", "Мертві сорому не мають") автентичним зразком розмовної
    мови X ст., чи це літературна конструкція літописця?'
  - '[!decolonization] Виклик терміну "Давня Русь". Аналіз тексту як пам''ятки давньосхіднослов''янської мови — спільної спадщини,
    а не ексклюзивно російської.'
  - '[!epistemic-humility] Брак джерел робить будь-яку реконструкцію гіпотетичною. Ми аналізуємо текст, а не реконструюємо
    "реальність".'
  section: 'Конфліктна карта: Хроніка чи епос?'
  words: 800
- points:
  - 'Оригінальний текст з ПВЛ: уривки про походи Святослава, його промови до дружини, та обставини смерті.'
  - 'Пофразовий глосинг: давньосхіднослов''янська фраза → дослівний переклад → граматичний коментар.'
  - 'Граматичний парсинг: аналіз форм аориста (напр., "иде"), імперфекта, залишків двоїни, відмінкових закінчень іменників.'
  - Паралельний переклад сучасною українською мовою для порівняння.
  - '[!decolonization] Нотатки про церковнослов''янські та східнослов''янські (протоукраїнські) риси в мові літопису.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Детальний розбір системи минулих часів (аорист, імперфект, перфект, плюсквамперфект) на матеріалі
    уривків про Святослава. Вправи на ідентифікацію та переклад.'
  - 'Етимологічний слід: Простеження еволюції ключових слів з тексту — "хоробрий", "дружина", "честь", "меч" — від давньосхіднослов''янської
    до сучасної української.'
  - 'Фонетична лабораторія: Пошук у тексті прикладів східнослов''янського повноголосся (оро/оло) та відсутність падіння єрів.'
  - '[!myth-buster] "Проста" мова Святослава — це міф про варвара чи витончена риторика полководця? Аналіз синтаксичної лаконічності
    як риторичного прийому.'
  section: 'Мовна лабораторія: Аналіз мови воїна'
  words: 1700
- points:
  - 'Повернення до розминки: Як тепер, після аналізу, ви розумієте фразу "Іду на ви"? Сформулюйте повну лінгвістичну та історичну
    інтерпретацію.'
  - 'Лінгвістичний висновок: Що текст про Святослава розповів нам про стан давньосхіднослов''янської мови X століття? (Співвідношення
    усного мовлення та книжної норми).'
  - 'Зв''язок із сучасністю: Як образ Святослава та його крилаті фрази продовжують жити в українській культурі та військовому
    етосі?'
  section: Дискусія та підсумок
  words: 600
focus: The Warrior Prince Sviatoslav in the Primary Chronicle, his "Idu na vy" message, linguistic features of his speech,
  and philological debates surrounding the text.
level: OES
module: oes-030
objectives:
- Аналізувати уривок з "Повісті временних літ" про Святослава, розрізняючи давньосхіднослов'янський текст, граматичний коментар
  та сучасний переклад
- Визначати та пояснювати ключові граматичні явища (аорист, імперфект) та лексичні особливості у тексті
- Брати участь у дискусії про філологічні та історичні дебати щодо автентичності та інтерпретації образу та мови Святослава
- Простежувати етимологічний зв'язок між лексикою давньосхіднослов'янської мови та сучасної української
