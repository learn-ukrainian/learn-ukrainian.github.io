content_outline:
- points:
  - 'Провокація: «Володимеръ же сѣде въ Києвѣ». Хто, що, де? Як ми це знаємо, якщо порядок слів такий вільний? Чи справді
    він вільний?'
  - 'Зворотній погляд: сучасне українське речення «Я читаю книгу» можна сказати як «Книгу читаю я» або «Читаю я книгу». Звідки
    ця свобода і як вона пов''язана з давньою мовою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чий синтаксис ми читаємо? Коли порядок слів у літописі відрізняється у різних списках (напр. Лаврентіївському
    та Іпатіївському), це помилка переписувача, його діалект чи свідома стилістична правка?'
  - 'Дебат 2: «Книжна» vs «народна» мова. Чи був порядок слів SVO (підмет-присудок-додаток) ознакою «високого стилю» під впливом
    грецької, тоді як народна мова надавала перевагу іншим структурам (напр. VSO)?'
  - '[!epistemic-humility] Точних записів «народної мови» X-XI ст. не існує. Лінгвісти реконструюють її, вишукуючи «помилки»
    та відхилення від церковнослов''янської норми в письмових пам''ятках.'
  - '[!decolonization] Твердження про «хаотичність» синтаксису «давньоруської» мови часто маскувало імперську ідею про її
    «нерозвиненість». Насправді це була інша логіка — логіка інформаційної структури, а не граматичної підпорядкованості.'
  section: 'Конфліктна карта: Порядок слів — норма чи хаос?'
  words: 800
- points:
  - 'Первинний текст: фрагмент із Повісті временних літ (напр., розповідь про прибуття Рюрика або похід Олега), де є речення
    з різним порядком слів.'
  - 'Послівний глос: «И рекоша дружина Игорю...». Игорь -> Igor (subject, nom.sg.), рекоша -> said (verb, 3rd.pl.aorist),
    дружина -> retinue (subject, nom.sg.), Игорю -> to Igor (object, dat.sg.). Розбір кожного слова.'
  - 'Граматичний парсинг: визначення синтаксичної ролі слова за його відмінковою формою, а не позицією. Демонстрація того,
    як відмінки роблять речення однозначним.'
  - 'Паралельний переклад: порівняння оригінального порядку слів із природним для сучасної української мови. Обговорення стилістичних
    втрат і надбань при перекладі.'
  - '[!decolonization] Розбір речень, що демонструють прото-українські риси (напр., певні форми дієслів), на відміну від спільних
    східнослов''янських або церковнослов''янських.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: вчимося виділяти «групу підмета» (іменник + узгоджені прикметники) та «групу присудка». Як узгодження
    всередині групи тримає речення купи.'
  - 'Експеримент: «Склади речення». Дано набір слів у початковій формі (напр., Ольꙃа, мьсть, древлянинъ, имѣти). Студент має
    скласти граматично правильне речення, розставивши слова у флексії.'
  - 'Порівняльний аналіз: діаграми речень. Креслимо структуру OES речення і його перекладу на сучасну українську та англійську.
    Візуалізація того, як синтаксис передається через порядок слів (англійська) vs через флексію (OES).'
  - '[!myth-buster] Міф про те, що у давніх мовах не було правил порядку слів. Правила були, але вони стосувались не граматики,
    а прагматики: що є темою (вже відомим), а що — ремою (новим).'
  section: 'Мовна лабораторія: Синтаксичний аналіз простого речення'
  words: 1700
- points:
  - 'Повернення до розминки: тепер студент може пояснити, що в реченні «Володимеръ же сѣде въ Києвѣ» підмет визначений не
    позицією, а формою називного відмінка.'
  - 'Головний висновок: синтаксис давньосхіднослов’янської мови базувався на морфології (системі відмінків), що давало свободу
    в порядку слів для вираження прагматичних відтінків.'
  - 'Міст у сучасність: як ця морфологічна свобода збереглась у сучасній українській мові і чим вона відрізняється від мов
    з більш жорстким синтаксисом (як англійська).'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз порядку слів у давньосхіднослов'янській мові, розрізнення впливу народної мови та книжного церковнослов'янського
  стандарту на структуру речення.
level: OES
module: oes-019
objectives:
- Аналізувати синтаксичну структуру простих речень у давньосхіднослов'янських текстах
- Розрізняти вплив церковнослов'янської та народної мови на порядок слів
- Застосовувати знання про систему відмінків для правильного перекладу текстів, де порядок слів не є первинним
- Формулювати аргументовану позицію в дискусіях щодо лінгвістичної інтерпретації давніх пам'яток
