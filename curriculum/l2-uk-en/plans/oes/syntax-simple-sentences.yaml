activity_hints:
- description: 'Кому належить теза: дослідникам, що бачать вплив грецької, чи тим, хто реконструює народну мову? Визначте
    позицію за цитатою.'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: У реченнях пропущено закінчення іменників. Поставте правильну флексію, щоб речення стало граматично коректним.
  focus: Відмінки як ключ до синтаксису
  items: 5
  type: fill-in
- description: Подано оригінальне речення з літопису. Перекладіть його на сучасну українську, намагаючись зберегти оригінальний
    порядок слів. Потім перекладіть його ще раз, але так, щоб воно звучало природно. Поясніть різницю.
  focus: 'Джерельний аналіз: порядок слів у OES vs Сучасна Українська'
  type: note
- description: 'Напишіть коротке есе (400-600 слів): Як суперечки про порядок слів у давніх текстах можуть бути пов''язані
    з сучасними дискусіями про «правильність» мови та національну ідентичність?'
  focus: 'Есе: Синтаксис як ідеологія'
  type: note
