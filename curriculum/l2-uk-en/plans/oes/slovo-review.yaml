content_outline:
- points:
  - 'Провокація: "Боянъ бо вѣщій, аще кому хотяше пѣснь творити, то растѣкашется мыслію по древу..." Що означає цей знаменитий
    пасаж? Спроба розшифровки без словника.'
  - Сучасне слово "туга". Яким воно було в "Слові"? Спрогнозуйте його вигляд та значення.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Слово" автентичним текстом XII ст., чи підробкою XVIII ст.? Позиції скептиків (Зімін) та прихильників
    (Пушкін, Якобсон).'
  - 'Дебат 2: Якою мовою написане "Слово"? Це церковнослов''янська, прото-українська чи унікальна поетична мова? [!decolonization]
    Розвінчання міфу про "давньоруську" мову як виключно російську спадщину.'
  - '[!epistemic-humility] Жодного прижиттєвого списку "Слова" не існує. Мусін-Пушкінський список згорів у 1812 році. Вся
    текстологія базується на копії 1790-х та першодруку 1800 року.'
  section: 'Конфліктна карта: Автентичність та інтерпретації ''Слова'''
  words: 800
- points:
  - 'Фрагмент для аналізу: "Плач Ярославни" — один із найбільш ліричних та граматично насичених уривків.'
  - 'Оригінальний текст: "На Дунаи Ярославнынъ гласъ ся слышитъ, зегзицею незнаема рано кычеть..."'
  - 'Порядковий переклад з граматичним розбором: аналіз вокатива (Дунаю), форм двоїни (оба багряная), аориста та імперфекта.'
  - Паралельний переклад сучасною українською (напр., у версії М. Рильського). Порівняння лексичних та синтаксичних рішень
    перекладача.
  - '[!decolonization] Підкреслення південних, українських рис мови "Слова" на противагу північним, що лягли в основу російської.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Двоїна (дуаліс) у "Слові". Як відмінювалися іменники та дієслова у двоїні на прикладах "сва своя
    мила" та "вѣ нозѣ"?'
  - 'Фонологічна лабораторія: Сліди падіння редукованих. Аналіз слів, де "ъ" та "ь" вже не вимовлялися, але ще писалися за
    традицією (напр., "пълку").'
  - 'Етимологічний слід: Простежити шлях слів "хоругва", "стяг", "дружина" від "Слова" до сучасного військового лексикону.'
  - '[!myth-buster] Чи справді Боян "розтікався мислю по древу"? Альтернативна інтерпретація "мысію" як "білкою" (мись), що
    змінює всю метафору.'
  section: 'Мовна лабораторія: Відмінки, часи та метафори'
  words: 1700
- points:
  - 'Повернення до розминки: Як тепер ми розуміємо фразу про Бояна? Повний лінгвістичний та культурний аналіз.'
  - 'Лінгвістичний висновок: Що "Слово" говорить нам про стан давньосхіднослов''янської мови наприкінці XII ст.? Які процеси
    були в розпалі?'
  - 'Зв''язок із сучасністю: Вокатив (кличний відмінок) — яскрава риса "Слова", що зникла в російській, але збереглася й розцвіла
    в українській. Що це каже про спадкоємність?'
  section: Дискусія та підсумок
  words: 600
