content_outline:
- points:
  - 'Провокація: «Мы от рода рускаго...» — хто ці «мы»? Як одна фраза з договору 911 року стала полем битви для істориків
    та лінгвістів?'
  - 'Спробуйте перекласти сучасною українською: «послухы», «рота», «уставъ». Що ці слова кажуть про суспільство, яке їх використовувало?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історичний): Чи є текст договору автентичним документом X ст., чи це пізніша вставка літописця? Позиції Шахматова
    (конструкція) vs. дослідників, що доводять автентичність через юридичні та мовні деталі.'
  - 'Дебат 2 (Лінгвістичний): Мова договору — це церковнослов''янська (болгарська) основа з вкрапленнями місцевого східнослов''янського
    діалекту, чи навпаки? Як це впливає на наше розуміння мовної ситуації в Києві X ст.?'
  - '[!decolonization] Чому російська історіографія наполягає на терміні «древнерусский язык», а українська — на «давньосхіднослов’янська
    мова»? Аналіз термінології як політичного інструменту.'
  - '[!epistemic-humility] Жодного оригіналу не збереглося. Ми аналізуємо копії в літописах, що на 300-400 років молодші за
    саму подію. Що могли змінити чи не зрозуміти переписувачі?'
  section: 'Конфліктна карта: Автентичність vs. Літописна конструкція'
  words: 800
- points:
  - 'Оригінальний текст (уривок): Преамбула та ключові статті договору 911 року (нормалізована версія).'
  - 'Послівний глосарій: розбір ключових юридичних та дипломатичних термінів — «поконъ», «гость», «гривна», «послухъ», «рота»,
    «уставъ».'
  - 'Граматичний парсинг: аналіз форм двоїни (дуаліс) у іменах послів, форми аориста та імперфекта у дієсловах, синтаксичні
    конструкції з давальним самостійним.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо лексичних та граматичних розбіжностей.
  - '[!decolonization] Виявлення східнослов''янських рис (повноголосся, специфічна лексика) на фоні церковнослов’янської основи
    як доказ участі місцевих правників.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз синтаксичної структури клятви: «кляшася... по закону и по покону языка нашего». Що означає
    «закон» і «покон»? Як ця формула відображає дуалізм писаного і звичаєвого права?'
  - 'Етимологічний слід: Простежуємо еволюцію слів «правда», «суд», «свідок» від давньосхіднослов''янської до сучасної української
    юридичної термінології.'
  - 'Фонологічна лабораторія: Пошук у тексті прикладів «нового» повноголосся (городъ, волость) та залишків неповноголосних
    церковнослов''янізмів (градъ, власть). Чому вони існують паралельно?'
  - '[!myth-buster] Міф про «просту» мову давніх слов''ян. Договір демонструє надзвичайно складну, формалізовану юридичну
    мову, здатну передавати абстрактні поняття.'
  section: 'Мовна лабораторія: Дипломатична формула та синтаксис'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, хто такі «Мы от рода рускаго»? Студент формулює відповідь, використовуючи докази з модуля
    про поліетнічність та багатомовність Русі.'
  - 'Головний лінгвістичний висновок: Договір 911 року є свідченням мовної диглосії — паралельного існування та взаємовпливу
    високої, книжної церковнослов''янської мови та живої місцевої східнослов''янської мови.'
  - 'Зв''язок із сучасністю: Як традиції юридичної мови, закладені в часи Русі, вплинули на розвиток української правової
    думки та термінології?'
  section: Дискусія та підсумок
  words: 600
focus: Philological and linguistic analysis of the Treaty of 911 between Kyivan Rus' and Byzantium, focusing on its diplomatic
  formulas, legal vocabulary, and the mix of Old East Slavic and Church Slavonic features.
level: OES
module: oes-069
objectives:
- Аналізувати філологічні дебати щодо автентичності та мовної класифікації Договору 911 року.
- Читати та перекладати уривок з Договору 911 року, виконуючи граматичний розбір ключових давньосхіднослов'янських форм (аорист,
  дуаль, архаїчна лексика).
- Простежувати етимологію та семантичну еволюцію юридичних термінів від давньосхіднослов'янської до сучасної української мови.
- Розрізняти східнослов'янські та церковнослов'янські мовні риси в тексті договору, пояснюючи їхнє значення для історії української
  мови.
