content_outline:
- points:
  - 'Провокація: На стіні Софії Київської XI ст. написано: "Олисеи писалъ а се небіжъ его". Хто такий Олисей і ким йому доводиться
    автор цього напису? Що цей короткий текст говорить про родину та грамотність у Київській Русі?'
  - 'Загадка: Чому найінтимніші записи про родину залишали на стінах головного собору держави?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є терміни "брат", "отець", "син" у графіті позначенням кровної спорідненості, чи це метафори духовної єдності
    (члени церковної громади, "брат у Христі")? [!epistemic-humility] Позиція С. Висоцького (буквальне читання) vs позиція
    С. Франкліна (соціально-духовне читання).'
  - 'Дебат 2: Наскільки "народною" є мова графіті? Це чиста давньосхіднослов''янська розмовна мова, чи це "низький" регістр
    церковнослов''янської, що імітує високий стиль? [!decolonization] Розгляд мови графіті як автентичного зразка мови предків
    українців, а не як "зіпсованої" церковнослов''янської.'
  section: 'Конфліктна карта: Кров чи дух?'
  words: 800
- points:
  - 'Корпус графіті: Добірка автентичних написів про родину зі стін Софії Київської (XI-XIII ст.).'
  - 'Приклад 1: "МАТИ ОУЛІѦНИНА". Оригінал, пофразовий глос, граматичний розбір (форма "мати", непрямі відмінки), паралельний
    переклад, коментар про нетипові форми імен.'
  - 'Приклад 2: "ГОСПОДИ ПОМОЗИ РАБУ СВОЄМУ СЪБІСЛАВУ І МАТЕРИ ЕГО". Розбір конструкції з давальним відмінком, форми присвійного
    займенника "своєму", форма родового відмінка "матери".'
  - 'Приклад 3: "ПИСАЛЪ ГРІШНИКЪ ОУГРИНЪ БРАТЪ ЖДАНЪ". Аналіз структури речення, поняття "брат" у можливому подвійному сенсі,
    етимологія імен.'
  - '[!decolonization] Підкреслення, що ці тексти — прямий голос мешканців середньовічного Києва, частина безперервної писемної
    традиції на території України.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Неправильні іменники. Повні парадигми відмінювання слів "мати", "дчи" (дочка), "отець", "брат"
    у давньосхіднослов''янській мові. Порівняння з сучасними українськими формами.'
  - 'Етимологічний аналіз: "Небіж" vs "племінник". Історія слова "небіж", його індоєвропейське коріння та витіснення з активного
    вжитку полонізмом "племінник".'
  - 'Фонологічна лабораторія: Де і як упав "Ъ"? Аналіз слів з графіті типу "писалъ", "братъ" для ілюстрації процесу занепаду
    редукованих. Пояснення, чому в сучасній українській "брат", але "брата".'
  - '[!myth-buster] Руйнування міфу про "безграмотність" авторів графіті. Демонстрація, що їхні "помилки" — це насправді фіксація
    живих фонетичних процесів у мові.'
  section: 'Мовна лабораторія: Парадигми спорідненості'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер студент може дати розгорнуту відповідь про Олисея та його "небожа", залучаючи аргументи
    з філологічної дискусії та граматичного аналізу.'
  - 'Лінгвістичний висновок: Що графіті розповідають про стан системи відмінків та розвиток фонетики в живій мові Київської
    Русі, чого ми не бачимо у формальних літописах?'
  - 'Зв''язок із сьогоденням: Які давні терміни спорідненості збереглися в українській мові, які зникли, а які змінили своє
    значення?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз сімейних стосунків (небіж, мати, брат) через неформальні написи XI-XIII ст. на стінах соборів. Розрізнення кровної
  та духовної спорідненості.
level: OES
module: oes-022
objectives:
- Аналізувати автентичні давньосхіднослов'янські графіті XI-XIII ст. як історичне та лінгвістичне джерело.
- Розрізняти поняття кровної та духовної спорідненості в текстах Київської Русі, аргументуючи свою позицію на основі тексту.
- Відтворювати та аналізувати нерегулярні парадигми відмінювання ключових термінів спорідненості (мати, отець, брат, дчи).
- Формулювати аргументовану позицію щодо філологічних дебатів про природу та мову графіті.
