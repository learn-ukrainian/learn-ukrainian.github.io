activity_hints:
- description: Перевірка розуміння позицій щодо впливу церковнослов'янської та зникнення прийменника "къ".
  focus: Розуміння філологічних дебатів
  items: 4
  type: quiz
- description: Вставити правильний прийменник (въ, на, къ) та поставити іменник у потрібному відмінку в реченнях, взятих з
    первинного джерела.
  focus: Прийменники в контексті
  items: 6
  type: fill-in
- description: Подано уривок з літопису. Зробіть паралельний переклад сучасною українською та напишіть коментар (150-200 слів),
    пояснюючи, як змінилися способи вираження просторових відношень.
  focus: 'Джерельний аналіз: OES vs Modern Ukrainian'
  type: note
- description: 'Спираючись на матеріал модуля, напишіть есе (400-600 слів) на тему: "Як історичний розвиток прийменників `въ`
    та `на` в давньосхіднослов''янській мові допомагає зрозуміти сучасну дискусію `в Україні / на Україні`?"'
  focus: 'Есе: Історичні корені сучасної суперечки'
  type: note
cefr_min: C2
connects_to:
- legal-language-debt
- numbers-currency
content_outline:
- points:
  - 'Провокація: два речення з літопису — "иде къ Киеву" та "бѧше вь Киевѣ". У чому різниця у значенні? Чи можна їх взаємозамінити?'
  - 'Загадка: сучасне українське слово "доки" — як воно пов''язане з давньосхіднослов''янським прийменником "къ"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Вплив церковнослов''янської. Чи є вживання прийменників у літописах відображенням живої мови, чи калькою з болгарських/грецьких
    зразків? [!decolonization]'
  - 'Дебат 2: Коли зник прийменник "къ"? Дискусія про хронологію та причини його заміни на "до" у протоукраїнських діалектах.'
  - '[!epistemic-humility] Точне розмежування семантичних полів "въ" та "на" для деяких контекстів є предметом наукових суперечок,
    оскільки писемні пам''ятки фіксують варіативність.'
  section: 'Конфліктна карта: Семантика простору'
  words: 800
- points:
  - 'Первинне джерело: уривок з «Повісті временних літ», що описує маршрут або переміщення (напр., подорож княгині Ольги до
    Царгорода).'
  - 'Послівний розбір: аналіз кожного вживання "въ", "на", "къ", "изъ", "отъ" у тексті. Оригінал, дослівний переклад, граматичний
    коментар (відмінок залежного іменника).'
  - 'Паралельний переклад сучасною українською: демонстрація, як давні конструкції трансформувались у сучасні відповідники
    (къ → до, въ → в/у).'
  - '[!decolonization] Аналізований текст — це давньоСХІДНОСЛОВ''ЯНСЬКА мова, спільний предок, а не "давньоруська" в імперському
    розумінні.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: аналіз відмінкової рекції. Чому "въ" вимагає місцевого відмінка для локації (въ городѣ) і знахідного
    для напрямку (въ городъ)? Побудова таблиці рекції.'
  - 'Етимологічний слід: простежуємо шлях прийменника "къ" та його зникнення, аналізуючи його залишки в сучасних словах (доки,
    поки) та прислівниках.'
  - 'Порівняльний аналіз: зіставлення семантичних карт "въ"/"на" в давньосхіднослов''янській та в сучасній українській. Які
    значення збереглися, які зникли, які нові з''явились?'
  - '[!myth-buster] Розвінчання міфу про "правильність" прийменника "в" на противагу "на" (або навпаки) через історичну перспективу.'
  section: 'Мовна лабораторія: Карта просторових відношень'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може дати експертну відповідь щодо різниці між "иде къ Киеву" та "бѧше вь Киевѣ",
    пояснюючи граматичну та семантичну основу.'
  - 'Лінгвістичний висновок: як система просторових прийменників змінилася від синтетизму (вираження значення через відмінок)
    до аналітизму (більша роль прийменника)?'
  - 'Зв''язок із сьогоденням: аналіз сучасної суперечки "в Україні / на Україні" крізь призму історичного розвитку прийменників
    "въ" та "на".'
  section: Дискусія та підсумок
  words: 600
focus: Лінгвістичний аналіз давньосхіднослов’янських просторових прийменників (въ, на, къ), їх семантичних полів (напрямок
  vs місцезнаходження), відмінкової рекції та еволюції в сучасну українську мову.
level: OES
module: oes-015
objectives:
- Аналізувати семантичні поля та граматичну рекцію давньосхіднослов'янських просторових прийменників (въ, на, къ)
- Читати та перекладати оригінальні давньосхіднослов'янські тексти, ідентифікуючи конструкції напрямку та місцезнаходження
- Відрізняти вплив церковнослов'янської та розмовної мови на вживання прийменників у писемних пам'ятках
- Простежувати еволюцію просторових прийменників від давньосхіднослов'янської до сучасної української мови
