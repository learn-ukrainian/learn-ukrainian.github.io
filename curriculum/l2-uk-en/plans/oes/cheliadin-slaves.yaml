content_outline:
- points:
  - 'Провокація: «Аще убьѥть холопа или робоу… то за холопъ 5 гривенъ, а за робоу 6 гривенъ». Чому життя рабині в Русі коштувало
    дорожче за життя раба? Спробуйте пояснити з економічної точки зору.'
  - Спроба декодування: Що означає фраза «А холопъ на господина своего не послушствуѥть»?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: ''Челядь'' vs ''холопи''. Це синоніми чи різні категорії? Одна версія: челядь — раби-військовополонені (зовнішнє
    джерело), холопи — боргові раби (внутрішнє). Інша версія: челядь — патріархальне рабство, холопи — повне, безумовне рабство.'
  - 'Дебат 2: Джерела термінології. Це питомо слов''янські поняття, чи є скандинавський вплив (пор. давньоскан. þræll)? Як
    термінологія відображає ставлення до рабства як до інституту?'
  - '[!decolonization] Російська імперська історіографія намагалася применшити масштаби рабства в Русі, протиставляючи його
    «азійській» Золотій Орді. Насправді, Руська Правда кодифікує розгалужену систему неволі, що є типовою для тогочасної Європи.'
  - '[!epistemic-humility] Більшість джерел — це юридичні кодекси, написані елітою для еліти. Ми не знаємо, як самі невільники
    сприймали свій статус і чи розрізняли вони ці терміни.'
  section: 'Конфліктна карта: Термінологія неволі'
  words: 800
- points:
  - 'Оригінальний текст: Статті з Руської Правди, що визначають статус челяді та холопів (про вбивство, крадіжку, шлюб, спадок).'
  - 'Послівний глос: «А за воръжескоую робоу и за челядинъ цѣна не платитьсѧ». Розбір: «воръжескоую» (ворожу), «цѣна» (тут:
    судова компенсація), «не платитьсѧ» (пасивний стан).'
  - 'Граматичний розбір: Аналіз відмінкових закінчень, що вказують на суб''єкт/об''єкт права. Чому про холопа сказано «за
    нього», а про вільну людину «за голову»?'
  - 'Паралельний переклад: Порівняння давньосхіднослов''янського оригіналу з сучасним українським науковим перекладом.'
  - '[!decolonization] Примітка про термін «давньоруська мова». Правильно казати «давньосхіднослов''янська», оскільки ця мова
    є спільною спадщиною українців, білорусів та росіян.'
  section: 'Текст: Читання та переклад (Руська Правда)'
  words: 1700
- points:
  - 'Граматична лабораторія: Володіння vs приналежність. Як Руська Правда граматично розрізняє майно вільної людини («У нього
    є...») і статус раба як майна («Він є власністю...»)? Аналіз конструкцій з родовим відмінком та дієсловом «быти».'
  - 'Етимологічний слід: Простежуємо шлях слова «челядь» від праслов''янського *čelędь (домашні, сім''я) до його значення
    в Русі (раби, слуги) і до сучасного архаїзму. Як змінилося значення і чому?'
  - 'Фонологічна лабораторія: Аналіз написання слова «холопъ». Чому в деяких списках трапляється «хлопъ»? Розглядаємо феномен
    неповноголосся/повноголосся та його діалектні варіації.'
  - '[!myth-buster] Міф про «просту» мову Русі. Юридична мова Руської Правди демонструє високий рівень абстракції, складну
    термінологію та чіткі синтаксичні структури, спростовуючи уявлення про примітивність правової думки.'
  section: 'Мовна лабораторія: Граматика соціального статусу'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, чому життя рабині могло цінуватися дорожче? Відповідь із залученням поняття репродуктивної
    цінності в патріархальному суспільстві.'
  - 'Лінгвістичний висновок: Мова — це не просто засіб комунікації, а й інструмент соціальної класифікації та влади. Руська
    Правда — яскравий приклад того, як граматика й лексика кодифікують і легітимізують суспільну нерівність.'
  - 'Зв''язок із сучасністю: Слова «холоп» і «челядь» сьогодні. «Холоп» — лайливе слово, що зберегло негативну конотацію.
    «Челядь» — застаріле, книжне. Як і чому слова, що позначали рабство, виходять з ужитку або змінюють своє значення?'
  section: Дискусія та підсумок
  words: 600
focus: The legal and social status of 'челядь' and 'холопи' in Kyivan Rus', analyzing primary sources like the Ruska Pravda
  to understand the vocabulary and grammar of servitude.
