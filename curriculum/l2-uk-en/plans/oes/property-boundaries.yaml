content_outline:
- points:
  - 'Провокація: Фрагмент давньосхіднослов''янської грамоти: "А се єсть межа тоѣ землѣ..." Як ви розумієте це речення? Які
    сучасні українські слова впізнаєте?'
  - Що таке "межа"? Простежити етимологічний шлях від давнього поняття до сучасного.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автентичність vs. Фальсифікація. Чи є ця грамота про межі власності справжнім документом XII ст., чи пізнішою
    підробкою для юридичного обґрунтування прав на землю?'
  - 'Дебат 2: Мова канцелярії vs. народна мова. Чи відображає лексика та граматика тексту (особливо прийменники простору)
    реальну розмовну мову регіону, чи це "заморожена" юридична мова?'
  - '[!decolonization] Мова грамот — не «давньоруська», а давньосхіднослов''янська канцелярійна мова з виразними місцевими
    рисами. Аналіз цих рис як маркерів протоукраїнського мовного простору.'
  - '[!epistemic-humility] Палеографічний та лінгвістичний аналіз дає лише ймовірнісну, а не стовідсоткову відповідь щодо
    автентичності та датування.'
  section: 'Конфліктна карта: Автентичність грамот'
  words: 800
- points:
  - Оригінальний текст фрагменту грамоти, що описує межі земельної ділянки.
  - 'Послівний глосарій та граматичний розбір: ідентифікація прийменників (въ, на, по, до, отъ) та відмінків, які вони вимагають
    (місцевий, знахідний, родовий).'
  - Паралельний переклад сучасною українською мовою для порівняння синтаксичних конструкцій.
  - '[!decolonization] Аналіз топонімів та мікротопонімів (назви урочищ, річок, пагорбів) як доказ безперервності українського
    заселення території.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Система просторових прийменників у давньосхіднослов''янській мові. Семантичні поля "в/на", "до/к",
    "від/з".'
  - 'Аналіз відмінкових закінчень: як місцевий, родовий, та знахідний відмінки розрізняють статику (де?) та динаміку (куди?
    звідки?).'
  - 'Вправи на реконструкцію: відновити пропущені прийменники або правильні відмінкові закінчення у реченнях з грамоти.'
  - '[!myth-buster] "В Україні" vs "на Україні". Історичні корені вживання прийменників "в" та "на" для позначення територій
    — аналіз на матеріалі грамот.'
  section: 'Мовна лабораторія: Просторові відношення та відмінки'
  words: 1700
- points:
  - 'Повернення до розминки: повний лінгвістичний аналіз речення "А се єсть межа тоѣ землѣ..."'
  - 'Лінгвістичний висновок: Як система прийменників та відмінків у давньосхіднослов''янській мові створювала точну "юридичну
    карту" простору?'
  - 'Спадок: Які з цих конструкцій повністю збереглися в сучасній українській? Які змінилися, а які зникли?'
  section: Дискусія та підсумок
  words: 600
focus: Читання давньосхіднослов'янських грамот про власність на землю; просторові прийменники та відмінкові конструкції для
  визначення меж; філологічні дебати щодо автентичності грамот.
level: OES
module: oes-062
objectives:
- Аналізувати автентичний давньосхіднослов'янський юридичний текст, ідентифікуючи його структуру та лексичні особливості
- Розрізняти просторові прийменники та відмінки, якими вони керують, для опису статичних та динамічних відносин
- Формулювати основні аргументи в філологічних дебатах щодо автентичності та мовної класифікації давніх грамот
- Простежувати еволюцію юридичної та просторової лексики від давньосхіднослов'янської до сучасної української мови
