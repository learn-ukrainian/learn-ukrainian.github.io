objectives:
- Аналізувати оригінальні статті «Руської Правди» про крадіжку, ідентифікуючи ключову юридичну лексику та її значення
- Розрізняти та правильно утворювати форми знахідного відмінка множини для істот та неістот у давньосхіднослов’янській мові
- Аргументовано обговорювати філологічні та історичні дебати навколо «Руської Правди», застосовуючи деколонізаційну оптику
- Пояснювати, як граматичні структури (зокрема, категорія живого/неживого) відображають правову та соціальну свідомість епохи
