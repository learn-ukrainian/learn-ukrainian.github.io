content_outline:
- points:
  - 'Провокація: Що було ціннішим у Київській Русі — кінь чи раб? Відповідь міститься в тексті закону.'
  - 'Фрагмент закону для декодування: «аще оубиѥть мужь мужа». Спробуйте розшифрувати значення, спираючись на сучасну українську.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Руська Правда» — це кодифікація місцевого слов''янського звичаєвого права чи запозичення з варязького/візантійського
    законодавства?'
  - 'Дебат 2: Мова закону — це жива розмовна мова чи книжна церковнослов''янська? Аналіз лексики: «тать», «вира», «потокъ»
    у порівнянні з їхніми церковнослов''янськими відповідниками.'
  - '[!decolonization] Назва «Руська Правда», а не «Русская Правда». Це пам''ятка права саме Русі, спільної спадщини українців,
    білорусів та (частково) росіян, а не ексклюзивна власність московської історіографії.'
  - '[!epistemic-humility] Точне датування та авторство багатьох списків «Правди» є предметом гострих наукових суперечок.
    Ми працюємо з науковими реконструкціями, а не з незаперечним оригіналом.'
  section: 'Конфліктна карта: Джерела права та мови'
  words: 800
- points:
  - Читання фрагменту «Просторої Правди» про крадіжку та її наслідки (статті 31-40).
  - 'Оригінальний текст: «Аже оубиють татя на своемь дворѣ...»'
  - 'Послівний глосарій та граматичний розбір: аналіз форм дієслів (аорист, імперфект), відмінків іменників, особливо знахідного.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо розбіжностей у синтаксисі та юридичній термінології.
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Фокус: як давньосхіднослов''янська мова граматично розрізняла живі та неживі об''єкти у знахідному відмінку множини.'
  - 'Аналіз прикладів з тексту: «Аже кто поѣдеть на чюжемь конѣ...» (крадіжка коня, істота) vs «А кто клѣти подѣлаѥть...»
    (пошкодження комори, неістота).'
  - 'Правило: у назв істот форма знахідного відмінка множини збігається з формою родового (Acc.Pl. = Gen.Pl.), у назв неістот
    — з називним (Acc.Pl. = Nom.Pl.).'
  - Вправи на утворення форм знахідного відмінка для різних основ іменників (*-o, *-a, *-u, *-i) на прикладах юридичної лексики.
  - '[!myth-buster] Ця риса (категорія істоти/неістоти) не була унікальною. Вона розвинулась паралельно в різних слов''янських
    мовах, але її послідовне застосування в юридичних текстах свідчить про високий ступінь граматичної стандартизації.'
  section: 'Мовна лабораторія: Знахідний відмінок множини (Accusativus Pluralis)'
  words: 1700
- points:
  - 'Повернення до розминки: то що ж цінніше, кінь чи раб? Відповідь на основі проаналізованих штрафів («вир») та правового
    статусу.'
  - 'Лінгвістичний висновок: Як розрізнення живого/неживого у знахідному відмінку відображає правову картину світу давніх
    слов''ян?'
  - 'Зв''язок із сучасністю: як ця система розрізнення збереглася та трансформувалася в сучасній українській мові?'
  section: Дискусія та підсумок
  words: 600
focus: Юридичні норми та знахідний відмінок множини в давньосхіднослов'янських текстах
