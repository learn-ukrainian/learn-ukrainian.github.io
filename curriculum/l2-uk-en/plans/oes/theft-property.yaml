    Правді».
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: Вставити правильні форми знахідного відмінка множини (істоти/неістоти) в речення, взяті з тексту модуля.
  focus: Знахідний відмінок множини
  items: 8
  type: fill-in
- description: Порівняйте статтю про крадіжку з «Руської Правди» та відповідну статтю Кримінального кодексу України. Що змінилося
    в поняттях «крадіжка», «власність» та «покарання»? Сформулюйте відповідь у вигляді короткого аналітичного тексту.
  focus: 'Порівняльний аналіз: «Руська Правда» vs сучасний ККУ'
  type: note
- description: На основі проаналізованого тексту напишіть коротке есе (400-600 слів) про те, як граматичні та лексичні особливості
    давньосхіднослов'янського юридичного тексту відображають соціальну структуру та цінності тогочасного суспільства.
  focus: 'Есе: Що мова закону говорить про суспільство?'
  type: note
