content_outline:
- points:
  - 'Провокація: «И ядяху хлѣбъ свой…» — цей «хліб» такий самий, як наш? Розкодовуємо просту фразу з літопису.'
  - Що спільного між словами «скотъ» (худоба) і «скарб»? Відгадка — у побуті та економіці Русі.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була давньосхіднослов''янська мова єдиною? Феномен диглосії: церковнослов''янська (високий стиль) vs. народна
    розмовна (низький стиль). Як лінгвісти розрізняють ці шари в текстах?'
  - 'Дебат 2: Проблема «суржику» ХІІ століття. Чи були слова типу «хлѣбъ» (народне) і «агнець» (церковне) взаємозамінними,
    чи їх вибір залежав від контексту (проповідь vs. торговий договір)?'
  - '[!decolonization] Термін «давньоруська мова» є імперським конструктом. Коректно говорити про «давньосхіднослов''янську»
    як спільну спадщину українців, білорусів та росіян, та про церковнослов''янську як спільну літургійну мову.'
  - '[!epistemic-humility] Точні межі між розмовною та книжною мовами є предметом гострих наукових дискусій, адже ми маємо
    справу лише з письмовими пам''ятками.'
  section: 'Конфліктна карта: Мова побуту чи мова Бога?'
  words: 800
- points:
  - 'Першоджерело: Фрагменти «Руської Правди» та берестяних грамот, що стосуються торгівлі, майна та побуту.'
  - 'Послівний розбір: «Аже пояти скотъ чюжь… а лодью украдеть…» — розбираємо кожне слово у його правовому та мовному контексті.'
  - 'Граматичний коментар: аналіз форм іменників (хлѣбъ, конь, лодья) у різних відмінках та числах (включно з двоїною).'
  - Паралельний переклад сучасною українською мовою з коментарями про семантичні зсуви.
  - '[!decolonization] «Руська Правда», не «Русская Правда». Наголос на тому, що це правовий кодекс Русі, а не ексклюзивно
    Росії.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Деклінація основ на *-u- (медъ, сынъ) та *-ŏ- (хлѣбъ, столъ). Порівняння парадигм з сучасними
    українськими.'
  - 'Етимологічний ланцюжок: Простежуємо шлях слів «скотъ» → «худоба» та «животъ» (життя/майно) → «живіт» (частина тіла).'
  - '[!myth-buster] Чи правда, що «корабель» — це не «корабель»? Розбираємо семантичні поля морського транспорту: лодья, чёлнъ,
    корабль, насадъ.'
  - 'Вправа: Класифікувати лексику з тексту «Руської Правди» на церковнослов''янізми та питомі східнослов''янські слова.'
  section: 'Мовна лабораторія: Семантичні поля та етимологія'
  words: 1700
- points:
  - 'Повернення до розминки: то чим «хлѣбъ» ХІІ століття відрізняється від нашого? Студент формулює відповідь з урахуванням
    концепції диглосії.'
  - 'Лінгвістичний висновок: Побутова лексика — це ключ до розуміння мовної свідомості епохи. Вона показує, де закінчувалась
    «книжна» мова і починалось реальне життя.'
  - 'Зв''язок із сучасною українською: які слова (кінь, м''ясо) майже не змінились, а які (лодья, скотъ) стали архаїзмами
    або змінили значення? Чому?'
  section: Дискусія та підсумок
  words: 600
focus: Distinguishing vernacular (побутова) vs. liturgical (церковнослов'янська) vocabulary for common items in OES texts.
  Analysis of terms like хлѣбъ, мясо, конь, лодья.
