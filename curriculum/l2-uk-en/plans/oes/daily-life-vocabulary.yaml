activity_hints:
- description: Перевірка розуміння концепції диглосії. Розподіліть слова на умовно «високі» (книжні) та «низькі» (побутові).
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставте правильне давньосхіднослов'янське слово (хлѣбъ, скотъ, лодья) у речення з «Руської Правди».
  focus: Побутова лексика в контексті
  items: 5
  type: fill-in
- description: Порівняйте вживання слова «хлѣбъ» у «Руській Правді» та уривку з «Житія Феодосія Печерського». Де воно є просто
    їжею, а де набуває символічного значення? Чому?
  focus: 'Джерельний аналіз: Побутова лексика у праві та релігії'
  type: note
- description: На основі проаналізованих текстів напишіть коротке есе (400-600 слів), як феномен диглосії міг проявлятись
    у житті звичайного купця чи ремісника ХІІ століття.
  focus: 'Есе: Диглосія в повсякденному житті Київської Русі'
  type: note
