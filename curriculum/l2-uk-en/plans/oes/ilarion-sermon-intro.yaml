content_outline:
- points:
  - 'Провокація: Чому найвідоміша проповідь Київської Русі починається не з Христа, а з порівняння єврейської рабині та її
    вільної пані?'
  - 'Фрагмент тексту: «...спочатку був Закон, а потім – Благодать; спочатку тінь, а потім – істина». Як ця одна фраза визначає
    всю політичну теологію Русі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Авторство. Чи справді митрополит Іларіон написав «Слово»? Аргументи за (літописна згадка) і проти (відсутність
    прямого автографа).'
  - 'Дебат 2: Мета. Це суто богословський твір для внутрішнього вжитку чи політична декларація, спрямована на Константинополь,
    щоб обґрунтувати церковну незалежність Русі?'
  - '[!decolonization] «Слово» — пам''ятка не «давньоруської», а давньосхіднослов''янської літератури. Російська історіографія
    намагалася монополізувати її як виключно «свою», але вона є спільною спадщиною українців та білорусів.'
  - '[!epistemic-humility] Ми не можемо знати напевно, чи слухав Ярослав Мудрий цю проповідь, але її структура і зміст тісно
    пов''язані з його державною політикою.'
  section: 'Конфліктна карта: Проповідь чи політичний маніфест?'
  words: 800
- points:
  - 'Оригінальний текст вступу (за Синодальним списком): розбір алегорії Агарі (Закон) та Сарри (Благодать).'
  - 'Пофразовий глосинг: виявлення ключових богословських термінів та їх грецьких відповідників (номікос, харіс).'
  - 'Граматичний парсинг: аналіз форм аориста та імперфекта, використання двоїни, функції дієприкметників у складних реченнях.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо втрачених значень та синтаксичних конструкцій.
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Виявлення церковнослов''янських маркерів (неповноголосся «-ра-», «-ла-»; дієслівні форми на -ущ/-ющ)
    у тексті Іларіона.'
  - 'Лексична лабораторія: Розрізнення «високої» лексики (абстрактні поняття, богослов''я) та «низької» (побутові реалії).
    Які слова є церковнослов''янськими запозиченнями, а які — питомими східнослов''янськими?'
  - 'Етимологічний слід: Простеження еволюції 3-4 ключових слів зі «Слова» (напр., «благодать», «істина», «закон») через середньоукраїнську
    до сучасної української мови.'
  - '[!myth-buster] Мова Іларіона — це не «проста» розмовна мова XI ст. Це витончений, риторично складний гібрид, де слов''янські
    елементи свідомо використовуються для створення «високого стилю».'
  section: 'Мовна лабораторія: Церковнослов’янізми та східнослов’янська основа'
  words: 1700
- points:
  - 'Повернення до розминки: Як тепер ви розумієте алегорію Агарі та Сарри? Чому Іларіон починає саме з неї, а не, скажімо,
    з цитати з Євангелія?'
  - 'Лінгвістичний висновок: Що гібридна природа мови Іларіона говорить нам про культурний та мовний стан Київської Русі XI
    століття?'
  - 'Зв''язок із сучасністю: Ідея «нового народу», що приходить на зміну «старому», постійно використовується в політичній
    риториці. Як аргументи Іларіона резонують (або не резонують) із сучасною українською ідентичністю?'
  section: Дискусія та підсумок
  words: 600
