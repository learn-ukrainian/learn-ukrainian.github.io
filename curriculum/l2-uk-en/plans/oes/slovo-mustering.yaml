content_outline:
- points:
  - 'Провокація: "А мои ти куряни — свѣдоми къмети..." — що саме означає "свѣдоми къмети"? Це досвідчені воїни, прості дружинники
    чи щось інше? Спробуйте розшифрувати, спираючись на сучасну українську.'
  - 'Лінгвістична загадка: Який зв''язок між давньосхіднослов''янським "тули" (quivers) і сучасним українським "втулити" (to
    stick in)?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Слово" автентичним текстом XII ст.? Аргументи "скептичної школи" (Андре Мазон, радянська ідеологія) проти
    "традиціоналістів" (Роман Якобсон, Дмитро Ліхачов).'
  - 'Дебат 2: Чи є військова лексика у сцені збору війська автентичною для XII ст.? Дискусія про походження слів: тюркізми
    ("комонъ"), іранізми ("сабли"), питомі слов''янські ("стягъ", "полкъ").'
  - '[!decolonization] Розвінчання міфу про "Слово" як виключно "древнерусский" епос. Аналіз мовних рис, що вказують на прото-український
    характер тексту.'
  - '[!epistemic-humility] Жодна сторона не має остаточних доказів. Робота з "Словом" — це робота з гіпотезами, що базуються
    на обмежених даних.'
  section: 'Конфліктна карта: Автентичність "Слова" та його військової лексики'
  words: 800
- points:
  - Оригінальний текст сцени збору війська ("Игорь ждетъ мила брата Всеволода...") у нормалізованій орфографії.
  - 'Пофразовий переклад та детальний лексико-граматичний коментар: "буй туръ" (епітет), "бръзыи комони" (форма двоїни), "осѣдлани"
    (пасивний дієприкметник).'
  - Паралельний переклад сучасною українською мовою для порівняння синтаксису та лексики.
  - '[!decolonization] Акцент на формах, що збереглися в українській мові, але зникли в російській (кличний відмінок "брате",
    форми двоїни, лексика).'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз форм аориста ("рече") та імперфекта для опису дій. Розбір форм двоїни ("оба есвѣ").'
  - 'Етимологічна лабораторія: Простеження еволюції ключових військових термінів: полкъ > полк; стягъ > стяг; дружина (княжий
    загін) > дружина (жінка); комонъ > кінь.'
  - 'Лексична лабораторія: Класифікація військової лексики: зброя (луци, тули, сабли), обладунки (шеломы), особовий склад
    (къмети, дружина), коні (комони).'
  - '[!myth-buster] Розвінчання міфу, що "Слово" написане церковнослов''янською. Ідентифікація та аналіз питомих східнослов''янських
    слів та форм, що відрізняють його від церковнослов''янських текстів.'
  section: 'Мовна лабораторія: Військова лексика та граматика "Слова"'
  words: 1700
- points:
  - 'Повернення до розминки: Як тепер ви розумієте фразу "свѣдоми къмети"? Які нові значення ви відкрили?'
  - 'Лінгвістичний висновок: Що військова лексика "Слова" говорить нам про суспільство та мову Київської Русі XII століття?'
  - 'Зв''язок із сучасністю: Як змінилося значення слова "полк" від часів Ігоря до сьогодення? Чому "дружина" перестала бути
    військовим терміном?'
  section: Дискусія та підсумок
  words: 600
focus: 'Лінгвістичний аналіз сцени збору війська у "Слові о полку Ігоревім": військова лексика, філологічні дебати про автентичність,
  граматичні особливості (аорист, двоїна).'
