  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Вставити пропущені військові терміни (стяг, комон, къмети, тули) у фрагменті з опису збору війська.
  focus: Військова лексика в тексті
  items: 5
  type: fill-in
- description: Порівняйте використання термінів "полк" та "дружина" у "Слові" та в сучасній українській мові. Які семантичні
    зсуви відбулися і чому?
  focus: 'Аналіз військової лексики: "полк" vs "дружина"'
  type: note
- description: На основі матеріалів "Конфліктної карти", напишіть есе (400-600 слів), де ви аналізуєте, як суперечка про автентичність
    "Слова" використовувалася в російській імперській та радянській ідеології.
  focus: 'Есе: Автентичність і пропаганда'
  type: note
