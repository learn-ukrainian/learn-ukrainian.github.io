content_outline:
- points:
  - 'Провокація: «О, світла світла і красно украшена земле Руськая!» — ліричний вступ без контексту. Звідки це? Що це — вірш,
    молитва, початок епосу?'
  - 'Задача на декодування: студент намагається розшифрувати фразу, спираючись на знання сучасної української, і висуває гіпотезу
    про її жанр та епоху.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Проблема авторства та жанру. ГВЛ — це єдиний твір одного автора чи компіляція праці багатьох літописців? Аргументи
    на користь єдиного задуму (стилістична цілісність) vs. компіляції (різні стилі в різних частинах).'
  - 'Дебат 2: ГВЛ — це «давньоруський» чи «давньоукраїнський» текст? [!decolonization] Розвінчання імперського наративу про
    «спільну колиску». ГВЛ як пам''ятка мови й державності саме руських (українських) князівств, а не Московії. Аналіз мовних
    рис, що вказують на протоукраїнську основу.'
  - '[!epistemic-humility] Точне авторство встановити неможливо; сучасна наука оперує гіпотезами про «волинського книжника»
    чи «оточення Данила Галицького».'
  section: 'Конфліктна карта: Літопис чи Повість?'
  words: 800
- points:
  - 'Оригінальний текст: знаменитий плач після битви на Калці («О, горе тобі, Галиче!») та батальна сцена взяття міста (наприклад,
    бій за Бакоту).'
  - 'Послівний глос: розбір лексики, включаючи військову (сідлати, стяг, полк) та емоційну (тужити, ятрити).'
  - 'Граматичний парсинг: аналіз форм аориста (напр., "побігоша") та імперфекта для передачі динаміки бою. Розбір складних
    речень та риторичних фігур (анафора, порівняння).'
  - Паралельний переклад сучасною українською мовою, що підкреслює літературну якість, а не лише інформативний зміст.
  - '[!decolonization] Наголос на тому, що текст написаний мовою, зрозумілою для тодішнього світського читача, а не виключно
    церковнослов’янською.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: аналіз синтаксису «ритмічної прози». Як специфічний порядок слів, використання дієприкметникових
    зворотів та паралелізм конструкцій створюють ефект епічної оповіді? Вправи на реконструкцію ритмічних фраз.'
  - 'Практикум з морфології: Вокатив (кличний відмінок) у плачах та звертаннях («Галиче!», «княже!»). Порівняння давніх форм
    із сучасними. Вправи на утворення вокативних форм від імен та назв з тексту.'
  - 'Етимологічний слід: простежуємо еволюцію ключових слів з літопису — «дружина» (від військового загону до дружини-жінки),
    «город» (від укріплення до міста), «віче».'
  - '[!myth-buster] Розвінчання міфу, що давня мова була «простою». Літературний стиль ГВЛ свідчить про високий рівень володіння
    мовними регістрами та риторичними прийомами.'
  section: 'Мовна лабораторія: Ритмічна проза та вокатив'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може не просто перекласти фразу «О, світла світла...», а й проаналізувати її стилістику,
    риторичні засоби та культурний контекст.'
  - 'Лінгвістичний висновок: ГВЛ демонструє не лише історичні події, а й стан мови — живу, розвинену «руську мову», здатну
    передавати складні емоції та створювати яскраві художні образи. Це мова світської еліти, а не лише церковної служби.'
  - 'Зв''язок із сучасністю: як ідеї державності, європейського вибору та боротьби із зовнішнім ворогом, виражені в ГВЛ, резонують
    із сучасною Україною?'
  section: Дискусія та підсумок
  words: 600
focus: 'Literary style of the Galician-Volhynian Chronicle: military poetics, nature imagery, “О горе” laments, rhythmic prose,
  and its unique secular voice compared to the Primary Chronicle.'
level: OES
module: oes-097
objectives:
- Аналізувати Галицько-Волинський літопис як унікальну літературну пам'ятку, відрізняючи його стиль від інших літописів.
- Розпізнавати та пояснювати вживання давніх дієслівних форм (аорист, імперфект) та вокатива в оригінальному тексті.
- Критично оцінювати філологічні та ідеологічні дебати навколо авторства, мови та культурної приналежності літопису.
- Формулювати аргументовану позицію щодо значення ГВЛ для формування української літературної традиції та національної ідентичності.
