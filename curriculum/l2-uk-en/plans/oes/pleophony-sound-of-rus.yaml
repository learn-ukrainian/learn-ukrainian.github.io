content_outline:
- points:
  - 'Провокація: «градъ» vs «городъ». Що спільного, що відмінного, і чому одне слово стало звуковим символом Русі, а інше
    — книжною архаїкою?'
  - 'Представлення пари слів: «врата» (суч. укр. ворота) і «ворогъ» (суч. укр. ворог). Студент має припустити, яке слово є
    «своїм», а яке «чужим» (церковнослов''янським) і чому.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Повноголосся — це інновація чи архаїзм? Теорія Олексія Шахматова (спільна прамова) vs теорія Федота Філіна (діалектний
    континуум). Чи існувала єдина «давньоруська мова»?'
  - 'Дебат 2: Чому церковнослов''янська мова (староболгарська) не має повноголосся? Політичний та культурний вибір Русі —
    прийняти «престижну» південнослов''янську мову для письма, зберігаючи власну розмовну вимову.'
  - '[!decolonization] Термін «давньоруська мова» — імперський конструкт. Коректніше: «давньосхіднослов''янська». Повноголосся
    — одна з ключових рис, що відрізняє східнослов''янський ареал від південно- та західнослов''янського.'
  - '[!epistemic-humility] Точний механізм виникнення повноголосся (падіння єрів як тригер) — це наукова реконструкція. Прямих
    свідчень немає, лише аналіз «помилок» у рукописах, які насправді є фіксацією живої мови.'
  section: 'Конфліктна карта: Схід чи Південь?'
  words: 800
- points:
  - 'Первинне джерело: уривок з Лаврентіївського літопису, де послідовно вживаються форми з повноголоссям (`городъ`, `черезъ`,
    `молодъ`, `волость`) та церковнослов''янізми (`градъ`, `глава`, `благо`).'
  - 'Оригінальний текст (нормалізований): читання фрагменту про будівництво міст, де автор свідомо чи несвідомо перемикається
    між двома мовними регістрами.'
  - 'Послівний глосарій та граматичний парсинг: `городъ` → укріплене місто; `-оро-` < прасл. `*or` у закритому складі перед
    приголосним. `глава` → голова; `-ла-` < прасл. `*ol`.'
  - 'Паралельний переклад сучасною українською: демонстрація, як давні форми трансформувалися у сучасні, і як церковнослов''янізми
    закріпилися у високому стилі.'
  - '[!decolonization] Розрізнення «своєї» розмовної лексики з повноголоссям та «чужої» книжної церковнослов''янської — основа
    диглосії на Русі. Це не «псування» мови, а стилістичне розшарування.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Фонологічна лабораторія: Реконструкція праслов''янських сполучень *orT, *olT, *erT, *elT (де Т — будь-який приголосний)
    у закритих складах.'
  - 'Правило Гавліка та падіння єрів: як напружені єри (`ъ`, `ь`) вокалізувалися в `о` та `е`, «відкриваючи» склад і запускаючи
    процес повноголосся. `*gordъ` → `городъ`.'
  - 'Вправи на ідентифікацію: студент отримує список слів (сучасних українських та давніх) і має визначити, які з них мають
    повноголосне походження (берег, мороз, золото), а які — церковнослов''янське (прах, глава, храм).'
  - 'Етимологічний ланцюжок: простежити шлях слова, напр. прасл. *melko → д.сх.сл. молоко → суч. укр. молоко. Порівняти з
    іншими слов''янськими: польск. mleko, болг. мляко, чеськ. mléko.'
  - '[!myth-buster] Повноголосся — це не «неправильна» вимова чи «псування» мови. Це систематичний фонетичний закон, який
    охопив східнослов''янські діалекти у VIII-X ст. і став однією з їхніх визначальних рис.'
  section: 'Мовна лабораторія: Фонетична реконструкція повноголосся'
  words: 1700
- points:
  - 'Повернення до розминки: «градъ» vs «городъ». Студент тепер може дати повну, аргументовану відповідь, пояснюючи походження
    обох форм, їх стилістичне забарвлення та долю в сучасній мові.'
  - 'Лінгвістичний висновок: Повноголосся як звуковий «паспорт» східного слов''янина. Це одна з перших чітких фонетичних інновацій,
    що відокремила діалекти предків українців від діалектів предків болгар та поляків.'
  - 'Зв''язок із наступним модулем: якщо повноголосся показує, як один звук (*tort) дав дві різні форми в споріднених мовах,
    то наступна тема (`yat-mystery`) покаже, як один звук («ять») дав абсолютно різні рефлекси всередині однієї мови, ставши
    основою для майбутніх діалектів.'
  section: Дискусія та підсумок
  words: 600
focus: Повноголосся (Pleophony) як ключова риса, що відрізняє східнослов'янський мовний ареал (ToroT/TereT) від південнослов'янського
  (TraT/TreT), його зв'язок із падінням єрів та його діагностична сила в аналізі давньосхіднослов'янських текстів.
