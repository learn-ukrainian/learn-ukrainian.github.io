activity_hints:
- description: Перевірка розуміння дебатів про Корсунську легенду та мовні шари тексту ПВЛ. Чия це теза? Який аргумент спростовує
    цю позицію?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити правильну форму аориста (рече, повелѣ, крестиша, ...) у речення з літопису.
  focus: Граматичні форми аориста
  items: 5
  type: fill-in
- description: 'Подано два уривки: оригінальний текст про повалення ідолів і сучасний український переклад. Знайдіть 3-4 ключові
    відмінності в лексиці та синтаксисі. Поясніть, чому перекладач зробив саме такі зміни.'
  focus: 'Порівняльний аналіз: ПВЛ vs. сучасний переклад'
  type: note
- description: 'На основі аналізу тексту про Хрещення Русі напишіть коротке есе (400-600 слів) на тему: "Як літописець використовує
    граматику (наказовий спосіб, дієслівні часи) для конструювання образу сильного та легітимного правителя?"'
  focus: 'Есе: Мова як інструмент влади'
  type: note
cefr_min: C2
