objectives:
- Аналізувати уривок з Повісті временних літ, розрізняючи мовні шари (церковнослов'янський та давньосхіднослов'янський)
- Ідентифікувати та пояснювати вживання форм аориста та імператива в оригінальному тексті
- Формулювати аргументовану позицію щодо філологічних дебатів про автентичність та інтерпретацію літописного тексту
- Критично оцінювати роль мови як інструменту легітимації влади на прикладі розповіді про Хрещення Русі
