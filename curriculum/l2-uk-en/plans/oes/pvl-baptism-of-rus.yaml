content_outline:
- points:
  - 'Провокація: фраза з літопису «Аще кто не обрѧщетсѧ заутра на рѣцѣ... то противникъ мнѣ да будетъ». Чи це наказ, прохання
    чи погроза? Як мова передає владу?'
  - 'Простежити слово: «церква». Як воно потрапило в нашу мову і що означало в Х столітті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Корсунська легенда vs. дніпровська версія. Чи було хрещення Володимира в Корсуні пізнішою вставкою для легітимації
    княжої влади?'
  - 'Дебат 2: Мова наказу — церковнослов''янська чи давньосхіднослов''янська? Аналіз граматичних форм на предмет «південнослов''янських»
    (книжних) та «східнослов''янських» (розмовних) елементів.'
  - '[!decolonization] Розвінчання міфу про «давньоруську» мову. Текст ПВЛ — спільна спадщина, а не ексклюзивна власність
    російської історіографії. Використовуємо термін «давньосхіднослов''янська».'
  - '[!epistemic-humility] Ми не маємо оригіналів, лише списки XIV-XVI ст. Кожен переписувач міг вносити зміни. Наскільки
    ми можемо довіряти тексту?'
  section: 'Конфліктна карта: Літопис чи пропаганда?'
  words: 800
- points:
  - 'Оригінальний текст з Іпатіївського списку: опис наказу Володимира, повалення ідолів, масове хрещення в Дніпрі.'
  - 'Послівний глосинг та розбір ключових фраз: «пове лѣ идолы исещи», «поставити церкви по мѣстомъ», «крестишасѧ бес числа».'
  - 'Граматичний парсинг: аналіз форм аориста (пове лѣ, рече), імперфекта та інфінітивів (крестити, рушити).'
  - '[!decolonization] Паралельний переклад сучасною українською мовою, що підкреслює прямий зв''язок та еволюцію, а не розрив
    традиції.'
  - 'Нотатки: розрізнення церковнослов''янізмів (благословенъ) та питомої лексики (ріка, люди).'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: дієслова наказу та минулої дії. Як літописець конструює розповідь про минуле, використовуючи
    аорист (одноразова дія) та імперфект (тривала дія).'
  - 'Аналіз парадигми: відмінювання дієслова «повеліти» в аористі. Порівняння з іншими дієсловами дії в тексті.'
  - 'Вправа на реконструкцію: подано сучасні українські речення, студент має перекласти їх давньосхіднослов’янською, використовуючи
    правильні форми аориста.'
  - '[!myth-buster] Аорист не «зник», а трансформувався. Його сліди можна знайти в сучасних українських формах та діалектах.'
  section: 'Мовна лабораторія: Аорист та імператив'
  words: 1700
- points:
  - 'Повернення до розминки: аналіз фрази «противникъ мнѣ да будетъ». Тепер студент може пояснити граматику, семантику та
    прагматику цього наказу.'
  - 'Лінгвістичний висновок: як структура дієслівних часів (аорист, імперфект) впливає на сприйняття історичної оповіді? Чому
    літописець обрав саме ці форми?'
  - 'Зв''язок із сучасністю: які ритуальні та юридичні формули в сучасній українській мові успадкували структуру давньосхіднослов''янських
    наказів?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз літописного тексту про Хрещення Русі, ритуальна лексика, філологічні дебати про автентичність та мовні шари
  тексту
