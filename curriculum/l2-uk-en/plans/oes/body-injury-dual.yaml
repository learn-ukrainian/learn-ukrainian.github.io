activity_hints:
- description: Перевірка розуміння філологічних дебатів щодо «Руської Правди». Чия це теза — норманістів чи анти-норманістів?
    Який вплив переважає в цьому фрагменті?
  focus: 'Конфліктна карта: Датування та впливи'
  items: 4
  type: quiz
- description: Заповніть пропуски правильними формами двоїни іменників та дієслів у реченнях із «Руської Правди».
  focus: Форми двоїни в тексті
  items: 6
  type: fill-in
- description: Проаналізуйте новий короткий фрагмент тексту. Знайдіть, випишіть та розберіть граматично всі форми двоїни.
  focus: 'Аналіз першоджерела: Двоїна в новому контексті'
  type: note
- description: Що статті «Руської Правди» про тілесні ушкодження говорять про суспільство та його цінності? Як мова (використання/відсутність
    двоїни, точність опису) відбиває ці цінності? (400-600 слів).
  focus: 'Есе: Право і мова'
  type: note
cefr_min: C2
connects_to:
- theft-property
content_outline:
- points:
  - 'Провокація: «Очи єста свѣдка» — чому «єста», а не «є» чи «суть»? Розшифровка фрази з Руської Правди, що веде до концепції
    двоїни.'
  - 'Загадка: що спільного між очима, вухами та плечима в давньосхіднослов’янській мові, чого немає в сучасній?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Датування та авторство «Руської Правди». «Правда Ярослава» vs «Правда Ярославичів» — чи це єдиний текст, чи
    компіляція різних епох?'
  - 'Дебат 2: Наскільки мова «Правди» відбиває живу давньосхіднослов’янську мову, а наскільки — церковнослов''янський вплив,
    особливо в юридичній термінології?'
  - '[!decolonization] Термінологічний виклик: «древнерусское право» vs «право Русі». Кому «належить» Руська Правда? Розвінчування
    імперського міфу про ексклюзивну спадщину.'
  - '[!epistemic-humility] Жоден з оригінальних списків «Правди» не зберігся; ми працюємо з копіями, що на 200-300 років новіші
    за гіпотетичний оригінал.'
  section: 'Конфліктна карта: Чия Правда?'
  words: 800
- points:
  - 'Першоджерело: Статті про тілесні ушкодження з просторової редакції «Руської Правди» (за Синодальним списком).'
  - 'Порядковий переклад та граматичний розбір: форми двоїни (очи, уши, нозѣ, руцѣ), аорист дієслів дії (ударить, вынезъ),
    лексика болю та каліцтва (раны, кровь, хромота).'
  - 'Синтаксис та фразеологія: конструкції «Аще кто...», числові вирази для штрафів («три гривнѣ за ногу»).'
  - '[!decolonization] Звертаємо увагу на лексику, що має прямі відповідники в українській, а не в російській мові, підкреслюючи
    пряму лінію спадковості.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: повна парадигма двоїни для іменників, прикметників та займенників. Порівняння з одниною та множиною
    в таблицях.'
  - 'Етимологічний слід: як двоїна зникла, але залишила сліди в сучасній українській мові? (очі, плечі, вуха; двісті; по обидві
    сторони).'
  - 'Синтаксис двоїни: узгодження дієслів (очи видѣста), числівників (двѣма рукама), та прикметників.'
  - '[!myth-buster] Двоїна — це не просто «форма для двох предметів». Це окрема граматична категорія зі своєю семантикою природної
    парності.'
  section: 'Мовна лабораторія: Двоїна (Dualis) на практиці'
  words: 1700
- points:
  - 'Повернення до розминки: «Очи єста свѣдка». Повний граматичний та семантичний розбір фрази студентом з використанням знань
    з модуля.'
  - 'Лінгвістичний висновок: що втратила і що здобула мова, відмовившись від двоїни? Перехід від тричленної системи (1 - 2
    - багато) до двочленної (1 - багато).'
  - 'Зв''язок із наступним модулем: від права тілесного до права майнового. Як мова фіксує поняття власності в «Руській Правді»?'
  section: Дискусія та підсумок
  words: 600
focus: Dual number in OES for body parts (очи, уши, плечі), legal texts on bodily harm from Ruska Pravda, and the evolution
  of dual to plural.
level: OES
module: oes-053
objectives:
- Аналізувати уривки з «Руської Правди», ідентифікуючи форми двоїни та їх синтаксичні функції
- Відтворювати парадигму відмінювання для іменників та дієслів у двоїні
- Пояснювати ключові філологічні дебати щодо датування та мовних особливостей «Руської Правди»
- Простежити еволюцію залишків двоїни в сучасній українській мові та її діалектах
pedagogy: CBI
