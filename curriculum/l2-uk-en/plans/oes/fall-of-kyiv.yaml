activity_hints:
- description: Кому належить теза — історіографу-ревізіоністу чи філологу-деколонізатору? Визначте позицію за цитатою з модуля.
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: 'Вставте в речення з літопису правильне слово з "лексики руйнування": зърушити, розбити, ізбити, попалити.'
  focus: Лексика руйнування
  items: 4
  type: fill-in
- description: Наведіть 2 аргументи з тексту модуля на користь того, що літописець перебільшив масштаби руйнування, і 2 аргументи
    на користь того, що його розповідь є точною.
  focus: 'Джерельний аналіз: Літопис vs Археологія'
  type: note
- description: 'На основі матеріалів модуля напишіть есе (400-600 слів) на тему: "Що розповідь про падіння Києва в Іпатіївському
    літописі може розповісти лінгвісту про історію української мови?"'
  focus: 'Есе: Мова як свідок історії'
  type: note
