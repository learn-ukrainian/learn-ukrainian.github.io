content_outline:
- points:
  - 'Провокація: Прочитайте давньосхіднослов''янську фразу без перекладу: "и бысть плачь и туга людемъ, иже бѧху остали живи".
    Що ви можете зрозуміти, спираючись на сучасну українську?'
  - 'Вгадайте слово: сучасне українське слово "полон" походить від давньосхіднослов''янського "полонъ". Які ще слова, пов''язані
    з війною та руйнуванням, ми могли успадкувати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історіографічний): Наскільки точним є опис тотального знищення Києва? Порівняння літописного наративу з археологічними
    даними про післямонгольське відновлення міста.'
  - 'Дебат 2 (Філологічний): Якою мовою написаний фрагмент про падіння Києва? Аналіз співвідношення церковнослов''янізмів
    (книжна традиція) та живих народних рис (прото-українські елементи).'
  - '[!decolonization] Термін "Давня Русь" vs "Київська Русь". Літопис — спадщина України, Білорусі та Росії, а не ексклюзивна
    власність Москви. Чому важливо використовувати термін "давньосхіднослов''янська мова", а не "древнерусский язык"?'
  - '[!epistemic-humility] Літописець був не журналістом, а середньовічним інтелектуалом з власними теологічними та політичними
    поглядами. Як його світогляд міг вплинути на зображення подій?'
  section: 'Конфліктна карта: Іпатіївський літопис — хроніка чи панегірик?'
  words: 800
- points:
  - 'Читання уривку з Іпатіївського літопису: облога Києва, взяття "города Володимирового", руйнування Десятинної церкви.'
  - 'Дослівний розбір: "И взяша Кыевъ татарове... и не оста в немъ от людеи ничтоже, вся избиша". Аналіз кожного слова, граматична
    форма, паралельний переклад сучасною українською.'
  - 'Граматичний коментар: розбір форм аориста (взяша, избиша) та дієприкметників (зърушена, посѣчени), їхня роль у створенні
    динамічного наративу.'
  - '[!decolonization] Акцент на рисах, що вказують на південно-західний (український) діалект літописця, на противагу тезі
    про "спільну мову".'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Пасивні дієприкметники минулого часу на -н- та -т- в тексті (попаленъ, зърушена, убьєнъ). Як
    вони функціонують для опису наслідків руйнування? Створення таблиці форм.'
  - 'Етимологічна траса: Простеження еволюції слів плач, туга, вопль, ясир від давньосхіднослов''янської через староукраїнську
    до сучасних форм. Які семантичні відтінки змінились?'
  - 'Стилістичний аналіз: Виявлення та класифікація "лексики руйнування" в тексті: слова, що позначають знищення (зърушити,
    розбити, ізбити), захоплення (взяти, устремити ся), та емоційної реакції (плачь, туга, стонание).'
  - '[!myth-buster] Розвінчання міфу про те, що монгольська навала "обірвала" мовну традицію. Текст показує тяглість мовних
    процесів, що лягли в основу української.'
  section: 'Мовна лабораторія: Лексика руйнування та плачу'
  words: 1700
- points:
  - 'Повернення до розминки: повний лінгвістичний аналіз фрази "и бысть плачь и туга людемъ, иже бѧху остали живи" з усіма
    граматичними та лексичними коментарями.'
  - 'Головний лінгвістичний висновок: що розповідь про падіння Києва говорить нам про стан давньосхіднослов''янської мови
    середини XIII ст.? Які процеси (фонетичні, граматичні) ми можемо "почути" в тексті?'
  - 'Зв''язок із сучасністю: як травма падіння Києва відобразилась у мові та культурі? Які паралелі можна провести із сучасним
    досвідом руйнування та спротиву?'
  section: Дискусія та підсумок
  words: 600
focus: Linguistic analysis of the Hypatian Codex's account of the 1240 Mongol siege and destruction of Kyiv, focusing on destruction
  vocabulary, participles, and the distinction between chronicle fact and literary narrative.
level: OES
module: oes-047
objectives:
- Аналізувати оригінальний уривок з Іпатіївського літопису, розрізняючи церковнослов'янські та прото-українські мовні риси
- Критично оцінювати літописний текст як історичне джерело, порівнюючи його з даними археології
- Пояснювати ключові граматичні явища давньосхіднослов'янської мови (аорист, пасивні дієприкметники) на матеріалі тексту
- Простежувати етимологічну та семантичну еволюцію лексики, пов'язаної з війною та руйнуванням
