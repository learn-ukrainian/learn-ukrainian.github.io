content_outline:
- points:
  - 'Провокація: Князь Ігор бачить сонячне затемнення, але ігнорує це лихе знамення. Чому герой епосу діє всупереч логіці
    та здоровому глузду? Чи це безрозсудність, чи щось інше?'
  - 'Фрагмент тексту: «Солнце ему тъмою путь заступаше» — студент має розшифрувати, що означає ця фраза, спираючись на знання
    сучасної української.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є затемнення в «Слові» описом реальної астрономічної події 1 травня 1185 року, чи це лише художній символ?
    [!epistemic-humility] Аргументи астрономів vs аргументи літературознавців.'
  - 'Дебат 2: Автентичність самого «Слова». Скептики (Мазон, Зімін), які вважали текст пізньою підробкою XVIII ст., vs традиційна
    школа (Лихачов, Якобсон), що доводила його давньоруське походження. [!decolonization] Як цей спір використовувався в ідеологічних
    війнах?'
  - '[!myth-buster] Поширений міф, що затемнення було "повним". Насправді, з точки зору Ігоревого війська, воно було лише
    частковим. Як це змінює інтерпретацію його "сліпоти"?'
  section: 'Конфліктна карта: Затемнення: Факт чи символ?'
  words: 800
- points:
  - 'Оригінальний текст: Уривок про сонячне затемнення з Іпатіївського літопису та «Слова о полку Ігоревім». Порівняння двох
    версій.'
  - 'Послівний глосарій: «знаменіє», «тъма», «заступаше», «погании» — розбір лексики, пов’язаної з пророцтвами та ворогами.'
  - 'Граматичний парсинг: аналіз форм аориста (напр. «видѣша») та імперфекта, які передають динаміку подій. Роль дієприкметників.'
  - 'Паралельний переклад: Порівняння наукового перекладу Лихачова з поетичними перекладами Рильського та Шевченка. Що втрачається
    і що додається?'
  - '[!decolonization] Термінологічна війна: «давньоруський» vs «давньосхіднослов''янський» текст. Чому це важливо для розуміння
    спадщини «Слова».'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Як ОЕС виражає ідею "поганого знаку"? Аналіз конструкцій з давальним відмінком (етичним дативом),
    безособових речень та модальних дієслів.'
  - 'Фонологічна лабораторія: «Солнце» vs «Сонце». Простеження рефлексів носових голосних та повноголосся на прикладі лексики
    з уривку.'
  - 'Етимологічний слід: Слово «туга». Від ОЕС «тѫга» (скорбота, тривога) через середньоукраїнську до сучасного значення.
    Як змінювався семантичний відтінок?'
  - 'Вправа: Студент отримує кілька ОЕС речень з описом природи. Завдання — визначити, де природа є просто фоном, а де — активним
    персонажем, що віщує майбутнє, і пояснити свою думку на основі граматичних маркерів.'
  - '[!myth-buster] Багато хто думає, що ОЕС — це суцільні архаїзми. Насправді, синтаксична структура багатьох речень «Слова»
    напрочуд близька до сучасної української.'
  section: 'Мовна лабораторія: Граматика лихих знамень'
  words: 1700
- points:
  - 'Повернення до розминки: Чому Ігор ігнорує затемнення? Студент формулює відповідь, використовуючи поняття «лицарська честь»,
    «фатум», «християнське vs язичницьке світосприйняття».'
  - 'Лінгвістичний висновок: Як граматика та лексика ОЕС дозволяли автору «Слова» перетворити природне явище на потужний наративний
    інструмент?'
  - 'Зв''язок із сучасністю: Які «лихі знамення» існують у сучасній культурі? Як змінився спосіб говорити про долю та майбутнє?'
  section: Дискусія та підсумок
  words: 600
