content_outline:
- points:
  - 'Провокація: Дано речення з літопису: "Игорь же сѣде княжа въ Киевѣ". Чому "княжа", а не "князь" чи "князем"? Розбираємося
    з О-основами та їхніми несподіваними формами.'
  - 'Лінгвістична загадка: Який зв''язок між сучасним словом "дружина" та давнім "дружина" (озброєний загін)? Простежуємо
    еволюцію а-основ.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Форми двоїни (-а/-і в Н.в. o-основ). Це риса живої мови, успадкована з праслов''янської, чи книжний церковнослов''янський
    архаїзм, що підтримувався штучно?'
  - 'Дебат 2: Закінчення -ови/-еви в Д.в. однини (братови). Це галицько-волинський діалектизм, що завоював українську мову,
    чи спільна східнослов''янська інновація, яку російська мова втратила?'
  - '[!decolonization] Інтерпретація цих рис часто була політичною. Російська імперська наука бачила в них "південно-західні
    відхилення", а українська — докази окремого шляху розвитку мови.'
  - '[!epistemic-humility] Писемні пам''ятки не завжди відображають живу мову. Ми бачимо лише те, що записав писар, який міг
    мати власні уявлення про "правильну" мову.'
  section: 'Конфліктна карта: Церковнослов''янський вплив vs народна мова'
  words: 800
- points:
  - 'Джерело: фрагмент із "Руської Правди" (найдавніший кодекс права), де перелічуються штрафи ("вири") за злочини. Текст
    насичений іменниками о- та а-основ у різних відмінках.'
  - 'Оригінальний текст: "Аще убьєть мужь мужа, то мьстить брату брата, любо отцю, любо сыну; аще ли не будеть хто мьстя,
    то 80 гривенъ за голову..."'
  - 'Послівний розбір: "мужь" (Н.в. одн.), "мужа" (З.в. одн.), "брату" (Д.в. одн.), "отцю" (Д.в. одн.), "сыну" (Д.в. одн.),
    "гривенъ" (Р.в. мн.), "голову" (З.в. одн.).'
  - 'Граматичний коментар: аналіз закінчень -а, -у, -ю в контексті парадигми о-основ та а-основ. Чому "брату", але "голову"?'
  - '[!decolonization] Переклад "Руської Правди" як "Russian Justice" — імперський анахронізм. Це "Rus'' Justice" — право
    Русі, спільної спадщини.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія 1: Відмінювання іменників з основою на -о. Розбираємо три типи: твердий ("столъ"), м''який ("конь"),
    мішаний ("мужь").'
  - 'Граматична лабораторія 2: Відмінювання іменників з основою на -а. Розбираємо твердий ("рука") та м''який ("земля") типи.'
  - 'Порівняльний аналіз: будуємо повні парадигми для кожного типу, звертаючи увагу на омонімію (однакові форми для різних
    відмінків).'
  - '[!myth-buster] Кличний відмінок не зник, а еволюціонував! Простежуємо його форми від давньосхіднослов''янських "княже",
    "жено" до сучасних українських "князю", "жінко".'
  - 'Вправа на реконструкцію: відновити пропущені закінчення іменників у реченнях із Початкового літопису, обґрунтовуючи свій
    вибір.'
  section: 'Мовна лабораторія: Парадигми о-основ та а-основ'
  words: 1700
- points:
  - 'Повернення до розминки: Так чому "княжа"? Відповідь криється в давній формі називного відмінка двоїни, що згодом набула
    інших функцій.'
  - 'Лінгвістичний висновок: О- та А-основи — це морфологічний кістяк східнослов''янських мов. Розуміння їхньої логіки — ключ
    до всієї історичної граматики.'
  - 'Зв''язок із сучасною українською: які відмінки злилися (напр., у множині), які закінчення уніфікувалися, а які збереглися
    майже без змін, ставши маркерами української мови?'
  - 'Погляд у майбутнє: як знання про о- та а-основи допоможе нам зрозуміти складніші u- та i-основи в наступному модулі?'
  section: Дискусія та підсумок
  words: 600
focus: 'Давньосхіднослов''янські іменники на -о та -а: відмінювання, діалектні риси та еволюція'
