- Читати, перекладати та граматично розбирати оригінальні тексти ("Руська Правда"), ідентифікуючи іменникові форми та їх функції
- Розрізняти риси церковнослов'янської та розмовної мови у відмінкових закінченнях на основі аналізу джерел
- Формулювати аргументовану позицію в ключових філологічних дискусіях щодо еволюції східнослов'янських відмінків
