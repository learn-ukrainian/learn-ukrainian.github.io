content_outline:
- points:
  - 'Провокація: «И с того времѧни поднѧласѧ в Рускѣи землѣ ненависть межи ними...». Прочитайте речення з літопису. Які граматичні
    форми чи слова тут здаються вам «несучасними»? Що, на вашу думку, стало причиною цієї «ненависті»?'
  - 'Вгадайте слово: Яке сучасне українське слово походить від давньосхіднослов''янського «усобь» (окремо, для себе)?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (текстологія): Київський літопис у складі Іпатіївського зведення — це об''єктивна хроніка чи політична пропаганда
    Мономаховичів? Чи існували втрачені літописи Ольговичів?'
  - 'Дебат 2 (лінгвістика): Чи можна за мовними особливостями (діалектизмами) тексту визначити політичну позицію літописця?
    Супраслівські риси vs. Київська говірка.'
  - '[!decolonization] Терміни «Давня Русь» та «давньоруська мова» vs «Руська земля» та «давньосхіднослов''янська мова». Аналіз
    імперського наративу, що привласнює спільну спадщину.'
  - '[!epistemic-humility] Більшість джерел дійшли до нас у пізніших списках. Розрізнити оригінальний текст XII ст. та нашарування
    переписувачів XIV-XV ст. — надскладне завдання.'
  section: 'Конфліктна карта: Чия правда в літописі?'
  words: 800
- points:
  - 'Оригінальний текст: Фрагмент з Київського літопису про битву на річці Супій (1135).'
  - 'Пофразовий глосинг: Розбір кожного речення з дослівним перекладом та поясненням невживаних слів.'
  - 'Граматичний парсинг: Аналіз форм аориста (рѣхъ, поидоша), імперфекта, дуаля (кнѧзѧ) та дієприкметників у тексті.'
  - 'Паралельний переклад: Порівняння оригінального тексту із сучасним українським академічним перекладом. Які смислові відтінки
    втрачаються?'
  - '[!decolonization] Аналіз вживання етнонімів та топонімів — як текст конструює уявлення про «своїх» та «чужих».'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аорист vs. імперфект для опису динаміки бою. Чому літописець обирає ту чи іншу форму? Вправи
    на трансформацію.'
  - 'Синтаксична лабораторія: Абсолютний номінатив (participium absolutum) як маркер високого книжного стилю. Вчимося розпізнавати
    та перекладати ці конструкції.'
  - 'Етимологічний слід: Простежуємо еволюцію ключових слів конфлікту: усобиця, полк, дружина, честь, слава — від давньосхіднослов''янської
    до сучасної української.'
  - '[!myth-buster] «Єдина давньоруська мова». На прикладі тексту доводимо існування регіональних діалектних рис, що пізніше
    лягли в основу сучасних східнослов''янських мов.'
  section: 'Мовна лабораторія: Мова ворожнечі XII століття'
  words: 1700
- points:
  - 'Повернення до розминки: Як тепер ви розумієте фразу «поднѧласѧ ненависть»? Які лінгвістичні та історичні виміри цього
    вислову ви можете назвати?'
  - 'Лінгвістичний підсумок: Які ключові граматичні та лексичні риси відрізняють мову Київського літопису від сучасної української?'
  - 'Історичний підсумок: Як мовний аналіз допомагає глибше зрозуміти політичну боротьбу в Руській землі XII століття?'
  - 'Зв''язок із сьогоденням: Як сучасна пропаганда використовує мову для розпалювання ворожнечі? Паралелі з XII століттям.'
  section: Дискусія та підсумок
  words: 600
focus: Лінгвістичний аналіз літописних текстів про усобиці Ольговичів та Мономаховичів; виявлення діалектних маркерів та протоукраїнських
  рис; філологічні дебати щодо атрибуції джерел.
