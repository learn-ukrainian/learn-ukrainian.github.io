objectives:
- Аналізувати фрагменти літописів, що висвітлюють усобиці Ольговичів та Мономаховичів, на предмет мовних особливостей
- Розрізняти позиції в наукових дебатах щодо атрибуції та діалектних рис аналізованих текстів
- 'Проводити базовий лінгвістичний аналіз давньосхіднослов''янського тексту: визначати ключові граматичні форми (аорист, дуаль)
  та синтаксичні конструкції'
- Критично оцінювати імперські наративи про «Давню Русь» та формулювати деколонізований погляд на спільну спадщину
