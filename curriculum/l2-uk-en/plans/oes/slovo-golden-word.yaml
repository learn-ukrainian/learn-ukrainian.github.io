content_outline:
- points:
  - 'Провокація: Чи може промова зупинити громадянську війну? Розбираємо одну фразу зі «Слова» Святослава: «Вступіте, господине,
    въ златъ стремень...» — що вона означає без контексту?'
  - 'Лінгвістична загадка: Слово «усобиця» — як воно пов''язане зі словами «особа» і «собі» і чому стало центральним у політичному
    лексиконі Русі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Золоте слово» — це реальний запис промови Святослава чи це цілком літературна конструкція автора «Слова»?'
  - 'Дебат 2: Наскільки оригінальною є риторика Святослава? Де межа між традиційними епічними формулами і унікальним ораторським
    мистецтвом?'
  - '[!epistemic-humility] Точних доказів щодо авторства та ступеня автентичності промови немає. Вчені аналізують ритміку
    та лексику, але висновки залишаються гіпотетичними.'
  - '[!decolonization] Російська імперська традиція представляла «Слово» як виключно «давньоруський» текст. Насправді це спільна
    спадщина, що відображає мовні риси, які згодом розвинулися в українській мові.'
  section: 'Конфліктна карта: Риторика чи політика?'
  words: 800
- points:
  - Повний текст «Золотого слова» Святослава давньосхіднослов'янською мовою.
  - Паралельний переклад сучасною українською мовою для зіставлення.
  - 'Детальний лексико-граматичний коментар: розбір ключових дієслівних форм (аорист, імперфект), синтаксичних конструкцій
    (дієприкметникові звороти), закличної риторики.'
  - '[!decolonization] Аналіз мовних рис тексту, що вказують на його зв''язок з територією майбутньої України (південно-західні
    діалектизми).'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз складного синтаксису «Слова». Як влаштовані довгі періоди, що поєднують десятки речень?
    Роль дієприкметників та дієприслівників.'
  - 'Риторична лабораторія: Ідентифікація та аналіз риторичних прийомів: метафори («золоте слово»), апострофа (звертання до
    князів), антитези, градації.'
  - 'Етимологічний слід: Простежуємо еволюцію ключових слів від «Слова» до сучасної української: стягъ -> стяг, мужь -> муж,
    слава -> слава.'
  - '[!myth-buster] Міф про «простоту» давніх мов. Синтаксис «Золотого слова» за складністю не поступається кращим зразкам
    європейської риторики того часу.'
  section: 'Мовна лабораторія: Риторичні фігури та синтаксис'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер, проаналізувавши текст, як ви відповісте на питання — чи могла ця промова щось змінити?'
  - 'Лінгвістичний підсумок: Які ключові особливості давньосхіднослов’янської мови XII ст. демонструє «Золоте слово» Святослава?
    (складна дієслівна система, вільний порядок слів, багатство синонімії).'
  - 'Зв''язок із сучасністю: Як ідея єдності перед лицем зовнішнього ворога, висловлена у «Слові», резонує в сучасній Україні?'
  section: Дискусія та підсумок
  words: 600
