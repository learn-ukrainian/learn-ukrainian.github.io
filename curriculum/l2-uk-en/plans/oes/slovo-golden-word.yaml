- Розрізняти наукові гіпотези щодо автентичності та авторства тексту, посилаючись на лінгвістичні та історичні аргументи
- Ідентифікувати та пояснювати складні граматичні явища (аорист, імперфект, дієприкметникові звороти) у тексті
- Застосовувати риторичний аналіз для інтерпретації політичного та культурного значення тексту
