content_outline:
- points:
  - 'Провокація: "О, великий самодержцю!" — це лестощі придворного чи політична декларація? Представлено одну фразу з тексту.
    Які граматичні ознаки вказують на її мету?'
  - 'Загадка: Сучасне українське слово "владика". Який його давньосхіднослов''янський предок у тексті панегірика і що це говорить
    про еволюцію поняття влади?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Атрибуція): Чи є "Панегірик" частиною "Слова о законі і благодаті" митрополита Іларіона, чи це окремий світський
    текст? Аргументи "за" і "проти" єдності тексту.'
  - 'Дебат 2 (Жанр): Панегірик (світська похвала) vs. Проповідь (церковна дидактика). Як лінгвістичні риси (риторичні фігури,
    лексика) підтримують кожну з версій?'
  - '[!decolonization] Текст називають "Похвала князю Владимиру". Це не "давньоруський", а давньосхіднослов''янський текст,
    спільна спадщина. Російська історіографія часто монополізує його, ігноруючи протоукраїнські риси.'
  - '[!epistemic-humility] Без підпису автора чи чітких вказівок у рукописах, будь-яка атрибуція є науковою реконструкцією,
    а не абсолютним фактом.'
  section: 'Конфліктна карта: Маніфест чи проповідь?'
  words: 800
- points:
  - 'Оригінальний текст: Фрагмент, що прославляє Володимира як хрестителя та Ярослава як будівничого.'
  - 'Глоси: Послівний розбір ключових термінів влади та віри: "самодържьць", "благовѣрьнъ", "каганъ", "просвѣтитель".'
  - 'Граматичний парсинг: Розбір форм кличного відмінка ("кнѧже!"), аористу для опису минулих дій ("крѣсти", "съзьда") та
    дієприкметників.'
  - 'Паралельний переклад: Сучасний український переклад, що зберігає високий стиль оригіналу.'
  - '[!decolonization] Нотатки про відмінності між церковнослов''янськими (книжними) та місцевими східнослов''янськими (розмовними)
    елементами в тексті.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз парадигми кличного відмінка в тексті ("отче", "кнѧже", "учителю"). Порівняння закінчень
    для різних основ.'
  - 'Етимологічний слід: Простеження еволюції форм звертання від OES до сучасного українського кличного відмінка. Які форми
    збереглися, які зникли?'
  - '[!myth-buster] Кличний відмінок — не "архаїчна" чи "сільська" риса. "Панегірик" доводить, що це був ключовий інструмент
    високого, офіційного стилю, що відділяв мову еліти.'
  - 'Вправа: Студент має переписати фрагмент, замінивши кличний відмінок називним, щоб відчути втрату риторичної сили.'
  section: 'Мовна лабораторія: Кличний відмінок як інструмент влади'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, "самодержцю" — це лестощі чи декларація? Студент формулює відповідь, спираючись на аналіз
    жанру, лексики та граматики.'
  - 'Лінгвістичний висновок: Як граматика (зокрема, кличний відмінок та часові форми дієслів) використовувалася в OES для
    побудови ідеологічного наративу про владу та спадковість?'
  - 'Зв''язок із сучасністю: Де сьогодні в українській мові живе цей "високий стиль"? Проаналізуйте інавгураційні промови
    президентів чи тексти томосів на предмет риторичних прийомів, успадкованих з цієї доби.'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз "Панегірика Русі" як зразка високого стилю, політичної риторики та лінгвістичне джерело з фокусом на похвалу
  Володимиру та Ярославу.
level: OES
module: oes-094
objectives:
- Аналізувати "Панегірик Русі" як історичне та лінгвістичне джерело, розрізняючи в ньому факти та ідеологічні конструкти.
- Формулювати аргументовану позицію щодо філологічних дебатів про атрибуцію та жанр тексту.
- Ідентифікувати та аналізувати форми кличного відмінка та аористу в давньосхіднослов'янському тексті, пояснюючи їхню риторичну
  функцію.
- Критично оцінювати російські імперські наративи щодо спільної культурної спадщини Русі.
