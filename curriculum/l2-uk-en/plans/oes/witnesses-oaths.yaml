objectives:
- Аналізувати оригінальні давньосхіднослов'янські правничі тексти, ідентифікуючи ключові лексичні та граматичні особливості.
- Розпізнавати та коректно інтерпретувати форми двоїни в іменниках, прикметниках, займенниках та дієсловах.
- Критично оцінювати основні філологічні та історичні дебати щодо автентичності та мовної природи давніх текстів.
- Пояснювати процес еволюції граматичних категорій на прикладі зникнення двоїни та її реліктів у сучасній українській мові.
