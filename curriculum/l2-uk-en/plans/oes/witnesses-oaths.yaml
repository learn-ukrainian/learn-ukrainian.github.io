content_outline:
- points:
  - 'Провокація: "И клѧшасѧ Игорь и мужи его..." Чому присягають "мужи", а не "мужчины"? І що таке "клѧшасѧ"? Розшифровуємо
    першу фразу договору.'
  - 'Загадка двоїни: "…и да не имуть помощи отъ Бога, ни подъ щитомь своимъ". Чому "щитомь", а не "щитами"? Чи це помилка
    переписувача?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автентичність договорів у "Повісті временних літ". Це точний переклад з грецької чи пізніша вставка київського
    літописця? Позиції Шахматова vs. Істріна.'
  - 'Дебат 2: Мова договорів — жива давньосхіднослов''янська чи штучний "койне" з болгарським (церковнослов''янським) нашаруванням?
    [!decolonization] Чому це не "давньоруська" мова і як це спростовує імперські міфи про "єдину колиску".'
  - '[!epistemic-humility] Ми не маємо оригіналів. Весь аналіз базується на копіях у списках XIV-XVI ст. — це як намагатися
    відновити фільм за описом очевидця.'
  section: 'Конфліктна карта: Чий текст, чия мова?'
  words: 800
- points:
  - Оригінальний текст присяги Ігоря з договору 944 р. (за Лаврентіївським списком).
  - 'Пофразовий глосинг: "А некрещенаꙗ Русь да полагають щиты своꙗ и мечи своꙗ нагы..." — аналіз лексики (полагати, нагы)
    та граматики.'
  - 'Граматичний парсинг: аналіз форм аористу (клѧшасѧ, рѣша), імперфекту, та особливостей синтаксису давньосхіднослов''янської
    мови.'
  - '[!decolonization] Язичницька присяга Перуном поряд із християнською — свідчення релігійної складності Русі, а не її "дикості".
    Це руський, а не візантійський правовий звичай.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: повна парадигма двоїни для іменників, прикметників та займенників. Чим відрізняються "два стола",
    "двѣ женѣ", "двѣ селѣ".'
  - 'Вправи на розпізнавання: знайти всі форми двоїни в тексті присяги (напр., "обѣма сторонама", "своима рукама").'
  - 'Етимологічний слід: як двоїна "законсервувалася" в сучасних українських словах "очі", "плечі", "вуха", числівнику "двісті".
    [!myth-buster] Це не винятки, а закономірні релікти.'
  - 'Синтаксис двоїни: узгодження з дієсловом. Чому "два князя рекоста", а не "рекоша"?'
  section: 'Мовна лабораторія: Двоїна — граматичний свідок епохи'
  words: 1700
- points:
  - 'Повернення до розминки: студент пояснює форми "клѧшасѧ" та "щитомь", використовуючи знання з модуля.'
  - 'Лінгвістичний висновок: Двоїна — не просто граматична категорія, а спосіб мислення, що розрізняв "один", "два/пара" і
    "багато". Її зникнення — це перехід до бінарної опозиції "один-багато".'
  - 'Зв''язок із сучасним правом: порівняння лексики та синтаксису присяги Ігоря з текстом сучасної присяги Президента України.
    Що змінилося, а що лишилося незмінним у сакральному акті клятви?'
  section: Дискусія та підсумок
  words: 600
focus: Лінгвістичний аналіз давньосхіднослов'янських правничих текстів, зокрема договорів Русі з Візантією. Центральна тема
  — категорія двоїни як граматичний свідок епохи та її відображення у юридичних формулах.
