content_outline:
- points:
  - 'Провокація: Роздивіться фразу «Господи, помози». Чому «Господи» — це звертання, а не підмет? Яким відмінком є «Господи»
    і чому «помози» вимагає саме такої форми?'
  - 'Вправа на інтуїцію: Спробуйте перекласти сучасне українське «Пане, допоможіть» давньосхіднослов''янською. Які форми ви
    б використали?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Звідки походять молитовні формули? Це калька з церковнослов''янської (і, відповідно, грецької), чи вони адаптували
    місцеві, можливо, дохристиянські, синтаксичні моделі звертань?'
  - 'Дебат 2: Чи є різниця між мовою молитов у літописах та написами на стінах церков (графіті)? Чи свідчить це про різні
    мовні регістри — «високий» книжний та «низький» народний?'
  - '[!decolonization] Теза про «спільну давньоруську мову» часто затирає локальні діалектні риси. Ми шукатимемо в текстах
    ознаки, які можуть вказувати на протоукраїнську фонетику чи морфологію.'
  - '[!epistemic-humility] Більшість текстів, що дійшли до нас, написані книжниками. Наскільки репрезентативною є їхня мова
    для всього суспільства — питання відкрите.'
  section: 'Конфліктна карта: Молитва — канон чи народна творчість?'
  words: 800
- points:
  - 'Первинне джерело: Фрагменти з Остромирового Євангелія та Ізборника Святослава 1073 р. з формульними звертаннями до Бога
    та святих.'
  - 'Глоси та розбір: Детальний розбір фрази «Господи, помози рабоу своѥму...». Граматичний аналіз кожної словоформи: кличний
    відмінок (vocative), давальний відмінок (dative of interest), особові займенники.'
  - 'Паралельний переклад: Порівняння оригінального тексту з церковнослов''янським та сучасним українським перекладами. Де
    збігаються форми, а де розходяться?'
  - '[!decolonization] Аналіз показує, що навіть у найдавніших текстах є риси, що відрізняють місцеву мовну практику від південнослов''янського
    (церковнослов''янського) канону.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Парадигма давального відмінка для основ на *-o, *-a, *-u, *-i в давньосхіднослов''янській мові.
    Таблиці та приклади з текстів.'
  - 'Синтаксичний аналіз: Чому в молитвах використовується давальний відмінок («помози МЕНІ»), а не, скажімо, знахідний? Концепція
    Dativus Commodi (давальний користі).'
  - 'Етимологічний слід: Як форми кличного та давального відмінків еволюціонували (або зникли) в сучасній українській мові?
    Історія втрати дуалізму та злиття деяких відмінкових форм.'
  - '[!myth-buster] Кличний відмінок — не «втрачена» форма. В українській мові він зберігся і активно використовується, на
    відміну від російської, де він майже повністю зник. Це одна з ключових відмінностей.'
  section: 'Мовна лабораторія: Давальний відмінок у молитвах'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер ви можете дати повну граматичну та історичну характеристику фрази «Господи, помози».'
  - 'Лінгвістичний висновок: Що вивчення молитовних формул говорить нам про співіснування різних мовних шарів (місцеві діалекти,
    церковнослов''янська) у свідомості книжника XI століття?'
  - 'Зв''язок із сучасністю: Як сучасна українська мова використовує кличний відмінок? Порівняйте «пане» (кличний) vs «пан»
    (називний). Чи є відлуння давньосхіднослов''янських правил у нашій сьогоднішній мові?'
  section: Дискусія та підсумок
  words: 600
focus: The syntax and semantics of Old East Slavic invocations, with a deep dive into the Dative case as used in prayers and
  formal address.
