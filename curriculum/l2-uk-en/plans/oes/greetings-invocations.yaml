objectives:
- Аналізувати оригінальні давньосхіднослов'янські тексти з молитовними формулами
- Розрізняти та правильно вживати форми давального та кличного відмінків у давньосхіднослов'янській мові
- Критично оцінювати наукові дебати щодо походження та класифікації мовних явищ
- Пояснювати еволюцію відмінкових форм від давньосхіднослов'янської до сучасної української мови
