content_outline:
- points:
  - 'Провокація: «Игорь жъ поглянувъ на небо и видѣ солнце стояще яко мѣсяць» (Літопис) vs. «Тогда Игорь възрѣ на свѣтлоє
    солнце и видѣ отъ него тьмою вся своя воя прикрыты» (Слово). Один факт, два погляди. Де репортаж, а де поезія?'
  - 'Вгадай слово: що означає "паволока" в контексті княжого одягу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є літописна оповідь лише сухим фактажем, а «Слово» — його художньою обробкою? Аргументи за і проти самостійної
    літературної цінності літописного тексту.'
  - 'Дебат 2: Що було першим — «Слово» чи літописний запис? Дискусія про взаємовпливи та спільне джерело (можлива усна героїчна
    пісня, що не збереглася).'
  - '[!decolonization] Тексти належать до давньосхіднослов’янської (давньокиївської) писемної традиції, а не є виключно «давньоруською»
    спадщиною. Обидва твори є однаковою мірою витоками української, білоруської та російської літератур.'
  - '[!epistemic-humility] Точне датування та авторство «Слова» є одним з найгостріших питань філології. Деякі дослідники
    (скептики) взагалі вважали його пізнішою підробкою XVIII ст.'
  section: 'Конфліктна карта: Історичний запис vs. Поетичний твір'
  words: 800
- points:
  - 'Оригінальний текст: Фрагмент з Іпатіївського літопису про похід Ігоря (запис під 1185 роком).'
  - 'Послівний розбір: Глосування ключових слів та фраз, що відрізняються від сучасного розуміння (напр., "поскочи соколомъ",
    "наведе на ня своя борзыя плъкы").'
  - 'Граматичний коментар: Розбір форм аориста ("рѣша", "поидоша") та імперфекта, що передають динаміку подій. Аналіз синтаксису
    "да" + інфінітив.'
  - 'Паралельний переклад: Порівняння оригінального тексту із сучасним українським академічним перекладом. Аналіз втрат та
    знахідок при перекладі.'
  - 'Нотатки: Виявлення рис книжної (церковнослов''янської) та народної (давньокиївської) мови в тексті літопису.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Ідентифікація та класифікація форм минулих часів (аорист, імперфект, перфект, плюсквамперфект)
    у літописному тексті. Складання таблиці дієслівних форм.'
  - 'Вправа на розрізнення: Чому літописець в одному випадку вживає аорист (одноразова миттєва дія), а в іншому — імперфект
    (тривала або повторювана дія)? Аналіз на конкретних прикладах з тексту.'
  - 'Етимологічний слід: Простеження еволюції слова «полк» від його значення в OES (озброєний загін, військовий похід, битва)
    до сучасного українського.'
  - 'Палеографічний куточок: Якби ми мали оригінальний рукопис, на що б ми звернули увагу? Устав, півустав, титла, виносні
    літери — короткий огляд.'
  section: 'Мовна лабораторія: Аналіз аориста та імперфекта'
  words: 1700
- points:
  - 'Повернення до розминки: Аналізуючи літописний текст, чи можемо ми тепер сказати, що він є суто "репортажем"? Які елементи
    художньої прози в ньому присутні?'
  - 'Лінгвістичний висновок: Як літописний запис демонструє стан мови XII ст.? Які архаїчні риси (напр., двоїна, форми минулого
    часу) ми бачимо, і що це говорить про мовну свідомість автора?'
  - 'Зв''язок із сучасністю: Форми аориста та імперфекта зникли з української мови. Як їхні функції були перерозподілені між
    сучасними формами минулого часу доконаного та недоконаного виду?'
  section: Дискусія та підсумок
  words: 600
