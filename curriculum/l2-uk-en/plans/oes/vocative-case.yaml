content_outline:
- points:
  - 'Провокація: Вам надійшов берестяний лист. Там написано одне слово: "Андрониче!". Що це означає і до кого звертаються?'
  - 'Міст у сучасність: чому ми кажемо "Андрію!", а не "Андрониче!"? Які мовні закони перетворили одне в інше?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Книжний винахід чи народна мова? Чи був кличний відмінок живим інструментом у всіх верств населення, чи це переважно
    церковнослов''янський імпорт, що закріпився в елітарній писемності? (аналіз берестяних грамот vs. літописів).'
  - 'Дебат 2: Звідки взявся сучасний кличний? Чи є український кличний відмінок на "-ю" прямим спадкоємцем давнього, чи це
    пізніша інновація, що виникла на руїнах старих парадигм під впливом аналогії?'
  - '[!decolonization] Кличний відмінок не "зберігся" в українській і "зник" у російській. Це хибна імперська оптика. Обидві
    мови інновували: українська перебудувала парадигму, російська — злила кличний з називним. Це два різні шляхи еволюції,
    а не "правильний" і "неправильний".'
  - '[!epistemic-humility] Ми не можемо точно знати, як говорили на вулицях Києва у XII столітті. Наші висновки базуються
    на уривчастих письмових даних, що не завжди відображали живу мову.'
  section: 'Конфліктна карта: Живий чи мертвий кличний?'
  words: 800
- points:
  - 'Первинне джерело: Фрагмент із "Повісті временних літ", де князь звертається до дружини ("братиє и дружино!") та до Бога
    ("боже преблагыи").'
  - 'Порядковий переклад: Оригінальний давньосхіднослов''янський текст із паралельним сучасним українським перекладом.'
  - 'Граматичний розбір: Детальний аналіз кожної форми кличного відмінка в тексті — "кнѧже", "братиє", "боже", "господи".
    Визначення основи, закінчення, впливу церковнослов''янської мови.'
  - '[!decolonization] Розрізнення форм: вчимося бачити різницю між питомими східнослов’янськими формами (княже) та церковнослов’янськими
    (господи), які співіснували в одній мові.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Реконструкція повної парадигми кличного відмінка для основних типів іменників (*o-stems, *jo-stems,
    *a-stems). Чому "друже", але "отче"?'
  - 'Історична фонетика: Чому "князь" -> "княже", а "Олег" -> "Олеже"? Розглядаємо ефект першої палаталізації на прикладі
    форм кличного відмінка.'
  - 'Етимологічний слід: Простежуємо шлях слова "богъ" -> "боже" від праслов''янського *bogъ -> *bože, демонструючи тисячолітню
    тяглість мовних законів.'
  - '[!myth-buster] Кличний відмінок — не "польський вплив". Демонструємо наявність аналогічних форм у всіх слов''янських
    мовах і праслов''янські корені, доводячи, що це спільна спадщина, а не запозичення.'
  section: 'Мовна лабораторія: Парадигми та аналогії'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер ви — експерт. Поясніть, хто такий "Андрониче!" і чому така форма є закономірною для давньосхіднослов''янської
    мови.'
  - 'Лінгвістичний висновок: Кличний відмінок — це не просто ще одна граматична форма, а маркер соціальної взаємодії, регістра
    та ідентичності. Його еволюція — дзеркало еволюції суспільства.'
  - 'Зв''язок із сьогоденням: Чому в XXI столітті в Україні відбувається "ренесанс" кличного відмінка? Як граматика стає інструментом
    культурного опору та деколонізації?'
  section: Дискусія та підсумок
  words: 600
focus: 'Кличний відмінок у давньосхіднослов''янській мові: звертання до святих, князів та розбійників (Андрониче!)'
