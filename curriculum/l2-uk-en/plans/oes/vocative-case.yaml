objectives:
- Аналізувати форми та функції кличного відмінка в давньосхіднослов'янських текстах
- Реконструювати парадигму кличного відмінка для різних типів основ та пояснювати її історичні зміни
- Розрізняти питомі східнослов’янські та церковнослов’янські форми кличного відмінка
- Пояснювати різні шляхи еволюції кличного відмінка в сучасній українській та російській мовах як результат розходження, а
  не "збереження" чи "втрати"
