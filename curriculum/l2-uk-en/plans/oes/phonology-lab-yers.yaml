objectives:
- Аналізувати процес падіння єрів за правилом Гавліка, розрізняючи сильні та слабкі позиції.
- Читати та перекладати фрагмент давньосхіднослов'янського тексту, ідентифікуючи в ньому рефлекси єрів та ятя.
- Простежувати еволюцію праслов'янських звуків [ъ], [ь] та [ѣ] в сучасній українській мові.
- Критично оцінювати наукові дебати щодо хронології та географії падіння єрів, пов'язуючи їх з decolonization наративом.
