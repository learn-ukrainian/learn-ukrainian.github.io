connects_to:
- note: Наступний модуль покаже, як фонологічні зміни, вивчені тут, відобразились у літературній мові Галицько-Волинського
    князівства.
  slug: galytsko-volynskyi-literary-art
content_outline:
- points:
  - 'Провокація: Давньосхіднослов''янське слово — `дньсь`. Сучасне українське — `день`. Куди зник `с`, і звідки взявся `е`?
    Спробуйте розшифрувати код.'
  - 'Мікрозадача: Подивіться на пару слів: `сънъ` (сон) vs `съна` (сну). Чому в одному випадку `ъ` став `о`, а в іншому зник?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Коли саме впали єри? Дискусія про хронологію (XI-XIII ст.) на основі помилок у рукописах. Позиція Шевельова
    vs позиція Німчука.'
  - 'Дебат 2: Чи було падіння єрів спільним для всіх східнослов''янських діалектів, чи це серія локальних процесів? Теорія
    Шахматова про єдиний центр vs сучасні діалектологічні дані.'
  - '[!epistemic-humility] Філологи сперечаються, бо писемні пам''ятки консервативні й не завжди відображають живу мову. Ми
    бачимо "тіні" звуків, а не самі звуки.'
  - '[!decolonization] Ідея про єдиний центр і єдиний процес падіння єрів підживлювала міф про "спільну колиску". Насправді,
    відмінності в рефлексах єрів — один із маркерів, що розділив майбутні українську, білоруську та російську мови.'
  section: 'Конфліктна карта: Час та простір падіння єрів'
  words: 800
- points:
  - 'Першоджерело: Фрагмент з "Ізборника Святослава" 1076 року, насичений словами з єрами.'
  - 'Порядковий глосарій: `дньсь` → `дьньсь` (день), `сънъ` (сон), `отьць` (отець), `чьсть` (честь).'
  - 'Граматичний розбір: Ідентифікація слабких єрів (напр. в `коньць`) та сильних єрів (напр. в `сънъ`) безпосередньо в тексті.'
  - 'Паралельний переклад: Порівняння оригінального тексту з сучасним українським перекладом, щоб візуально побачити, де єри
    зникли, а де вокалізувалися в `е` та `о`.'
  - 'Коментар: Як відрізнити церковнослов''янські написання від власне східнослов''янських рис у тексті?'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Правило Гавліка: Детальний розбір механізму визначення сильних і слабких позицій єрів у ланцюжку складів.'
  - 'Практикум: Беремо давньосхіднослов''янські форми (`мьгла`, `вьсь`, `дьнь`, `съхнѫти`) і, застосовуючи правило, крок за
    кроком виводимо сучасні українські форми (`імла`/`мла`, `увесь`/`весь`, `день`, `сохнути`).'
  - 'Еволюція ятя (`ѣ`): Простеження його різних рефлексів в українській мові (`і`) порівняно з іншими мовами на прикладах
    з тексту (`лѣто`, `хлѣбъ`, `сѣдѣти`).'
  - '[!myth-buster] Міф про "простоту": Падіння єрів — це не просто "випадіння", а складна ланцюгова реакція, що спричинила
    нові чергування (о, е — Ø) і змінила всю фонологічну систему мови.'
  section: 'Мовна лабораторія: Реконструкція падіння єрів'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер ви можете точно пояснити, чому `ь` в `дньсь` перетворився на `е` в `день`, а `ъ` в `сънъ`
    став `о` в `сон`.'
  - 'Лінгвістичний висновок: Падіння єрів як "Велика фонологічна революція", що визначила звукову подобу сучасної української
    мови і відокремила її від інших слов''янських.'
  - 'Зв''язок із сучасністю: "Приховані" єри в сучасній мові — чергування о/е з нулем звука (сон-сну, день-дня, беру-брати).
    Ми досі живемо за законами, встановленими в XIII столітті.'
  section: Дискусія та підсумок
  words: 600
focus: Tracing Yer loss (ъ, ь) and Yat (ѣ) evolution as the "Great Phonological Revolution" of East Slavic
