content_outline:
- points:
  - 'Провокація: Фрагмент з літопису, де Ізяслав каже: "нема мені життя без стола київського". Чи це слова патріота, чи амбітного
    узурпатора?'
  - 'Лінгвістична загадка: Слово "честь" у сучасній українській та в мові XII століття. Студент має припустити, які значення
    були первинними.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історичний): Право Ізяслава на Київ. З одного боку, він онук Мономаха і сильний воїн. З іншого — він порушує
    "ліствичне право", йдучи проти свого дядька Юрія Долгорукого. [!epistemic-humility]'
  - 'Дебат 2 (Філологічний): Як літописець конструює образ Ізяслава? Чи є літопис об''єктивним джерелом, чи політичним замовленням,
    що виправдовує дії свого патрона?'
  - '[!decolonization] Оцінка Ізяслава в російській історіографії (як сепаратиста) vs українській (як захисника Русі від суздальської
    загрози). Розбір термінів "Давня Русь" vs "Київська Русь".'
  - 'Джерелознавчий аналіз: Порівняння фрагментів про одну й ту саму подію з Київського та Суздальського літописних ізводів.'
  section: 'Конфліктна карта: Філологія князівської честі'
  words: 800
- points:
  - 'Первинне джерело: Промова Ізяслава до дружини перед битвою (за Іпатіївським літописом).'
  - 'Оригінальний текст (давньосхіднослов''янський): "Луче бы намъ смерть на своеи оучинѣ и на своеи дѣдинѣ, нежели на чюжѣи
    сторонѣ славу обрѣсти..."'
  - 'Словотвірний аналіз: розбір слів "оучина" (отчина) та "дѣдина" як ключових концептів права на землю.'
  - 'Граматичний розбір: форми аориста та імперфекта у промові, синтаксис прямої мови, використання давального відмінка ("луче
    бы намъ").'
  - Паралельний переклад сучасною українською мовою з коментарями про втрачені/змінені граматичні форми.
  - '[!decolonization] Підкреслення відмінностей мови київського літописця від північних (суздальських) діалектів.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматичний фокус: Синтаксис прямої мови та непрямої мови в літописі. Як літописець передає слова князя — дослівно чи
    у переказі?'
  - 'Вправа 1: Ідентифікація та розбір форм вокатива (кличного відмінка) у звертаннях до дружини ("братіє и дружино!").'
  - 'Вправа 2: Аналіз використання дієприкметників (активних і пасивних) у характеристиках князів ("рекъ", "побѣженъ").'
  - 'Етимологічний слід: Простежити шлях слів "честь", "слава", "правда" від їх значень у XII ст. до сучасного розуміння.'
  - '[!myth-buster] Розвінчання міфу про "просту" мову літописів. Аналіз складнопідрядних речень та риторичних фігур у промові
    Ізяслава.'
  section: 'Мовна лабораторія: Синтаксис князівського слова'
  words: 1700
- points:
  - 'Повернення до розминки: Студент дає розгорнуту відповідь, ким був Ізяслав, спираючись на текстовий та лінгвістичний аналіз.'
  - 'Лінгвістичний висновок: Як поняття "честь" виражалося через граматику та лексику давньосхіднослов''янської мови?'
  - 'Зв''язок із сучасністю: Поняття честі та гідності в сучасній українській політичній риториці — спадковість та відмінності
    від середньовічних концептів.'
  section: Дискусія та підсумок
  words: 600
focus: The concept of princely honor (честь) in Old East Slavic sources, focusing on the chronicle portrayal of Izyaslav Mstyslavych's
  struggles for Kyiv.
level: OES
module: oes-041
objectives:
- Аналізувати поняття «честі» в уявленнях князівської дружини XII ст. на основі літописних текстів.
- Розрізняти та пояснювати вживання форм аориста та імперфекта у давньосхіднослов’янській мові.
- Критично оцінювати літопис як історичне джерело, враховуючи його можливу політичну упередженість.
- Деконструювати імперські наративи щодо "єдиної" Давньої Русі, аналізуючи мовні та політичні розбіжності між різними центрами.
