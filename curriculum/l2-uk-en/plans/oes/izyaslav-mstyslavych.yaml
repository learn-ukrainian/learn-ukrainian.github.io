  focus: 'Конфліктна карта: Право на Київ'
  items: 5
  type: quiz
- description: Вставити правильні форми аориста та імперфекта у речення з модуля, вибравши з наданих варіантів.
  focus: Граматика літопису
  items: 6
  type: fill-in
- description: Подано два короткі уривки про одну подію з Київського та Суздальського літописів. Порівняйте лексику та синтаксис.
    Які ідеологічні розбіжності ви можете виявити через мовний аналіз?
