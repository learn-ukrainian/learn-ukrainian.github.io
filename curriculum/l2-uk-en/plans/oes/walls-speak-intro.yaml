content_outline:
- points:
  - 'Провокація: Чи може подряпана на стіні молитва розповісти про мову більше, ніж князівський літопис?'
  - 'Загадка: Фрагмент графіті "О, Лазоре, помози рабоу..." — хто, до кого, і якою мовою звертається?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є Софійські графіті свідченням живої народної мови, чи це просто "неграмотна" церковнослов''янщина, записана
    з помилками?'
  - 'Дебат 2: Хто писав? Це були прості парафіяни, що залишали повідомлення, чи самі священники та книжники, які практикувалися
    або записували щось для себе?'
  - '[!decolonization] Графіті — доказ існування самобутньої мовної культури в Києві, яка не була ані "давньоруською", ані
    простою копією болгарської. Це — протоукраїнська спадщина.'
  - '[!epistemic-humility] Ми не можемо точно знати соціальний статус авторів, але самі тексти (молитви, прокльони, ділові
    нотатки) дають підказки.'
  section: 'Конфліктна карта: Народна мова чи церковна помилка?'
  words: 800
- points:
  - 'Першоджерело: Добірка графіті з Софії Київської (XI-XIII ст.) в оригінальному написанні (з нормалізацією).'
  - 'Послівний розбір: "Господи, помози рабу своєму Гюргєви..." — аналіз кожної словоформи.'
  - 'Граматичний коментар: знахідний vs. давальний відмінки, форми перфекту (ходилъ єсмь), архаїчний кличний відмінок.'
  - 'Паралельний переклад: Оригінальний текст поруч із сучасним українським перекладом для порівняння синтаксису та лексики.'
  - '[!decolonization] Написи, зроблені на території сучасної України, є частиною саме української лінгвістичної історії.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз перфекту та аористу в текстах графіті. Чому один час зник, а інший трансформувався?'
  - 'Фонологічна лабораторія: Падіння редукованих ъ та ь. Як написи типу "князь" замість "кънѧзь" показують фонетичні процеси
    в реальному часі.'
  - 'Палеографічна лабораторія: Аналіз уставного та напівуставного письма. Чи можна за почерком визначити епоху та освіченість
    автора?'
  - '[!myth-buster] Помилки в графіті — це не ознака неграмотності, а безцінне свідчення того, як мова звучала насправді,
    на відміну від ідеалізованої мови книжників.'
  section: 'Мовна лабораторія: Граматика на стінах'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер ми можемо відповісти, що саме подряпана молитва говорить нам про диглосію, освіту та живу
    мову Київської Русі.'
  - 'Лінгвістичний підсумок: Які риси давньосхіднослов’янської мови, зафіксовані в графіті, збереглися в сучасній українській
    (кличний відмінок, повноголосся)? Які зникли (перфект, двоїна)?'
  - 'Ширший контекст: Епіграфіка як інструмент "археології" мови. Що ще, окрім графіті, може розповісти про мову минулого?'
  section: Дискусія та підсумок
  words: 600
focus: Епіграфіка як лінгвістична археологія, графіті Софії Київської як першоджерело, диглосія, палеографія
level: OES
module: oes-001
objectives:
- Аналізувати Софійські графіті як першоджерело для вивчення історії української мови
- Розрізняти ознаки церковнослов'янської та давньосхіднослов'янської мов у текстах XI-XIII ст.
- Пояснювати ключові фонетичні процеси (падіння редукованих) та граматичні зміни (еволюція перфекту) на прикладах з графіті
- Формулювати аргументовану позицію в рамках філологічних дебатів про природу мови Київської Русі
pedagogy: CBI
