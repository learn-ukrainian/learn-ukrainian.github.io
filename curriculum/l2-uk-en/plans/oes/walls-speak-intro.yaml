activity_hints:
- description: Визначте, яка з наукових позицій (графіті як "жива мова" vs графіті як "неграмотна книжна мова") відповідає
    наведеним аргументам.
  focus: 'Конфліктна карта: Дебати про графіті'
  items: 6
  type: quiz
- description: Вставте правильні форми перфекту або кличного відмінка у речення, взяті з графіті.
  focus: 'Граматика на стінах: Перфект і кличний відмінок'
  items: 8
  type: fill-in
- description: Наведено графіті XI ст. та його переклад сучасною українською мовою. Визначте 3-4 ключові граматичні або фонетичні
    відмінності та поясніть їх.
  focus: 'Порівняльний аналіз: Графіті та сучасна мова'
  type: note
- description: 'На основі матеріалів модуля, напишіть коротке есе (400-600 слів) на тему: "Чому Софійські графіті є унікальним
    джерелом для історії української мови?".'
  focus: 'Есе: Що стіни розповідають про мову?'
  type: note
