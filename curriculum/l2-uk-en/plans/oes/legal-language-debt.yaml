content_outline:
- points:
  - 'Провокація: Перед вами фрагмент боргової записки XIII ст.: "Оли ..." Як ви думаєте, що означає це слово і яку юридичну
    реальність воно створює?'
  - Студент намагається розшифрувати умову, спираючись на знання сучасних українських сполучників "коли", "якщо".
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автентичність звенигородських грамот. Як палеографи відрізняють оригінальні берестяні документи XIII ст. від
    пізніших підробок? Аргументи "за" і "проти".'
  - 'Дебат 2: Це вже українська мова? Лінгвістична суперечка: чи є мова цих грамот прото-українською, чи це просто один із
    діалектів давньосхіднослов''янської? [!decolonization] Виклик новгород-центричній моделі "давньоруської" мови.'
  - '[!epistemic-humility] Більшість берестяних грамот — це уривки. Відновлення повного контексту боргових зобов''язань є
    значною мірою науковою реконструкцією, а не прямим читанням.'
  section: 'Конфліктна карта: Автентичність та класифікація'
  words: 800
- points:
  - 'Первинне джерело: Текст звенигородської грамоти №2 (про борг). Повний текст у давньосхіднослов''янській графіці.'
  - 'Послівний аналіз та глоси: Розбір кожного слова. "Оли" (якщо), "далъ" (дав, аорист), "ми" (мені, давальний відмінок),
    "пшеницѣ" (пшениці, родовий відмінок).'
  - 'Граматичний парсинг: Детальний розбір умовного сполучника "оли", форм аориста ("далъ"), і перфекта. Відсутність дієслів-зв''язок.'
  - Паралельний переклад сучасною українською мовою для порівняння синтаксису та лексики.
  - '[!decolonization] Примітка про побутову, народну мову грамоти на противагу книжній церковнослов''янській мові офіційних
    текстів того ж періоду. Це мова, якою говорили предки українців.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Умовні конструкції з "оли" та "аче". Порівняння з сучасними "якщо" та "коли".'
  - 'Аналіз парадигми: Аорист — минулий час миттєвої дії. Відмінювання дієслів в аористі на прикладі слів з грамоти ("далъ",
    "взѧлъ").'
  - 'Етимологічний слід: Простежуємо шлях слів "боргъ", "куна", "гривна" від давньосхіднослов''янської через середньоукраїнську
    до сучасного вжитку.'
  - '[!myth-buster] "Проста" мова берестяних грамот. Чому відсутність складних конструкцій є ознакою не примітивності, а іншого
    типу синтаксису (паратаксис).'
  section: 'Мовна лабораторія: Умовні конструкції та аорист'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер, розуміючи конструкцію з "оли" та аорист, студент може точно перекласти та пояснити юридичні
    наслідки фрази з боргової записки.'
  - 'Лінгвістичний висновок: Як давньосхіднослов''янська мова виражала умовність та зобов''язання? Які граматичні інструменти
    використовувались для цього?'
  - 'Спадок: Що з юридичної лексики та граматики XIII століття збереглося в сучасній українській юридичній мові, а що зникло
    назавжди?'
  section: Дискусія та підсумок
  words: 600
