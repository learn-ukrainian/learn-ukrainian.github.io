content_outline:
- points:
  - 'Провокація: Що було гірше в Київській Русі — вбити людину чи збанкрутувати? Розглядаємо казус із Руської Правди.'
  - 'Фрагмент тексту: "Аже купець, шед в чюжю землю, истроуить чюжь товаръ..." — хто, як і чим мав платити за борги в XI столітті?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Статті про банкрутство — це кодифікований закон чи запис звичаєвого права? Дискусія про вплив візантійського
    та скандинавського права.'
  - 'Дебат 2: Термінологія боргу. Слово "продажа" означає штраф, а не продаж. Чи є це доказом унікальності правової системи
    Русі, чи просто архаїзм мови?'
  - '[!decolonization] Це не "давньоруське", а східнослов''янське право. Аналізуємо терміни, що мають паралелі в інших слов''янських
    мовах, але не в російській юридичній традиції.'
  - '[!epistemic-humility] Точне походження багатьох статей Руської Правди є предметом гострих наукових дискусій. Ми розглядаємо
    основні гіпотези, а не кінцеву істину.'
  section: 'Конфліктна карта: Закон чи звичай?'
  words: 800
- points:
  - Читання уривку з Просторої редакції Руської Правди (статті 54, 55) про купців-банкрутів.
  - 'Пофразовий розбір: "Аже гость гдѣ или инъ кто... неволею потерпить..." — аналіз синтаксису і лексики.'
  - 'Граматичний коментар: розбір форм аориста ("истроуивъ"), імперфекта та умовного способу ("абы..."), що є ключовими для
    юридичної логіки.'
  - 'Порівняльний аналіз: чим відрізняється регулювання боргу для "гостя" (іноземного купця) та місцевого?'
  - 'Примітки: розрізнення між церковнослов''янськими ("агнць") та власне східнослов''янськими ("овьца") термінами в тексті.'
  section: 'Текст: Читання та переклад'
  words: 1800
- points:
  - 'Граматична лабораторія: структура умовних речень "Аже... то..." як основа юридичної формули в Руській Правді.'
  - 'Етимологічний аналіз: простежуємо еволюцію слів "боржник", "продажа" (штраф), "вира" (штраф за вбивство), "послух" (свідок).'
  - 'Лексична класифікація: розрізнення трьох типів банкрутства за дієсловами: "погубити" (нещасний випадок), "пропити" або
    "пробитись" (розтрата), "утекти" (шахрайство).'
  - '[!myth-buster] "Банкрут" — це не просто боржник. Руська Правда чітко розрізняє відповідальність залежно від наміру, що
    є надзвичайно прогресивною юридичною концепцією.'
  section: 'Мовна лабораторія: Юридичний синтаксис'
  words: 1800
- points:
  - 'Повернення до розминки: так що ж гірше? Студент формулює відповідь, спираючись на текст Руської Правди і поняття "продажі"
    та "вири".'
  - 'Лінгвістичний підсумок: як синтаксис та лексика Руської Правди віддзеркалюють суспільну ієрархію та економічні відносини?'
  - 'Зв''язок із сучасністю: які давні правові терміни досі живуть в українській мові, можливо, змінивши своє значення (напр.,
    "борг", "правда")?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз статей про банкрутство у Руській Правді, розрізнення між ненавмисним ("нещасним") та умисним ("злим") банкрутством,
  юридична лексика та синтаксис давньосхіднослов'янської мови.
level: OES
module: oes-067
objectives:
- Аналізувати юридичні статті про банкрутство в Руській Правді, розрізняючи умисні та неумисні випадки
- Читати та перекладати фрагменти оригінального тексту Руської Правди з повним граматичним розбором
- Простежувати еволюцію ключових юридичних термінів від давньосхіднослов'янської до сучасної української мови
- Критично оцінювати різні наукові гіпотези щодо походження та класифікації правових норм Київської Русі
