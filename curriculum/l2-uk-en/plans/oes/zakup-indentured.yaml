activity_hints:
- description: 'Розрізнення позицій: яка теза належить радянській історіографії, а яка — сучасній? Чий статус був вищим —
    закупа чи холопа?'
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: 'Вставити в речення з модуля правильні терміни: закупъ, купа, вира, аже, тата.'
  focus: Юридична лексика Руської Правди
  items: 5
  type: fill-in
- description: 'На основі прочитаних статей Руської Правди, складіть у вигляді таблиці перелік: 1) Що господар мав право робити
    із закупом? 2) Які права мав закуп? 3) За що закуп міг стати повним холопом?'
  focus: 'Джерельний аналіз: права та обов''язки закупа'
  type: note
- description: Порівняйте правове регулювання боргових зобов'язань у Руській Правді та в сучасному Цивільному кодексі України.
    Що змінилося кардинально, а які принципи залишилися незмінними? (400-600 слів).
  focus: 'Есе: Еволюція поняття боргу'
  type: note
