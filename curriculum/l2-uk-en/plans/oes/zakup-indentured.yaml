content_outline:
- points:
  - 'Провокація: «Аже закупъ бѣжить от господина, то обелныи холопъ». Прочитайте цю фразу з Руської Правди. Що вона означає?
    Це вирок чи умова?'
  - 'Сучасний аналог: Уявіть, що ви взяли кредит у банку. За яких умов банк може забрати ваше майно? Як це регулюється законом
    сьогодні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Закуп — це майже раб (холоп) чи вільна людина, що відпрацьовує борг? Позиція Б.Д. Грекова (радянська історіографія)
    vs сучасні погляди.'
  - 'Дебат 2: Чи є статті про закупів у Руській Правді доказом класової боротьби, чи це просто регуляція економічних відносин?
    Лінгвістичний аналіз термінів «господинъ», «купа», «тата».'
  - '[!decolonization] Заперечення радянської тези про «феодальну кабалу» як єдину рамку. Руська Правда — це складний юридичний
    документ, а не лише інструмент пригнічення.'
  - '[!epistemic-humility] Джерела дають нам лише юридичну норму. Ми не знаємо, наскільки поширеним було закупництво і як
    воно виглядало на практиці.'
  section: 'Конфліктна карта: Раб чи боржник?'
  words: 800
- points:
  - 'Первинне джерело: статті 56-64 з Розширеної редакції Руської Правди (за Академічним списком).'
  - 'Оригінальний текст (фрагменти): «О закупѣ. Аже закупъ бѣжить...», «Аже господинъ бьет закупа...», «Аже закупа погубить
    господинъ...».'
  - 'Послівний розбір: аналіз ключових форм (аорист «бѣжить», «погубить»; умовний спосіб «аже... то»; юридична лексика «обелныи»,
    «тата», «вира»).'
  - 'Паралельний переклад: порівняння давньосхіднослов''янського тексту з сучасним українським перекладом, коментарі до розбіжностей.'
  - '[!decolonization] Підкреслення, що Руська Правда є спільною спадщиною українців, білорусів та росіян, а не виключно «давньоруським»
    (тобто російським) законом.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: аналіз синтаксису умовних речень з «аже» (якщо) та «оли» (коли).'
  - 'Лексична лабораторія: семантичне поле боргу. «Купа» (борг, позика), «рѣзъ» (відсотки), «наставка». Як ці поняття пов''язані?'
  - 'Етимологічний слід: від «за-куп-а» до сучасного «купувати». Як значення слова змінилося за тисячу років?'
  - '[!myth-buster] Руська Правда — це не примітивний набір правил. Це кодифікована система з чіткою логікою, що розрізняє
    намір, провину та відповідальність.'
  - 'Вправи: реконструювати парадигму відмінювання слова «господинъ» (з дуплексними формами); знайти всі дієслова в аористі
    у фрагменті.'
  section: 'Мовна лабораторія: Правова лексика та конструкції'
  words: 1700
- points:
  - 'Повернення до розминки: «Аже закупъ бѣжить...» — тепер студент може дати повний юридичний та лінгвістичний коментар до
    цієї фрази.'
  - 'Лінгвістичний висновок: Як давньосхіднослов''янська мова виражала складні правові відносини? Які граматичні інструменти
    для цього використовувалися?'
  - 'Зв''язок із сучасністю: Які поняття з Руської Правди (наприклад, «свідок», «доказ», «відповідальність») досі є основою
    українського права?'
  section: Дискусія та підсумок
  words: 600
focus: Debt slavery (закупництво) in Kyivan Rus, analyzing the legal status of закупи based on the Ruska Pravda
