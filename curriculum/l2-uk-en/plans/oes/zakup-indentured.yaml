objectives:
- Аналізувати фрагменти з Руської Правди в оригіналі, розпізнаючи ключові лексичні та граматичні форми давньосхіднослов'янської
  мови
- Пояснювати різницю в правовому статусі закупа, холопа та смерда на основі першоджерел
