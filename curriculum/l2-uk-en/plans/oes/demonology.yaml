content_outline:
- points:
  - 'Провокація: «побѣдиши бѣсы». Хто, кого, і за яких обставин? Спробуйте розшифрувати давньосхіднослов''янське пророцтво,
    спираючись на знання сучасної української.'
  - Слово «біс» — звідки воно, і чи завжди означало злого духа в нашій мові?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історія про Ісакія — автентична частина Києво-Печерського патерика чи пізніша агіографічна вставка? Аналіз різних
    редакцій та списків.'
  - 'Дебат 2: «Біси» Ісакія — реальні онтологічні сутності чи метафора психічної хвороби (глубокої депресії)? Лінгвістичний
    аналіз термінології зла в тексті.'
  - '[!decolonization] Києво-Печерський патерик як пам''ятка давньосхіднослов''янської, а не суто «давньоруської» літератури.
    Виклик монополізації спадщини Київської Русі московською історіографією.'
  - '[!epistemic-humility] Ми не можемо поставити медичний діагноз Ісакію через тисячу років. Ми аналізуємо те, ЯК текст конструює
    його досвід через мову та тогочасні уявлення.'
  section: 'Конфліктна карта: Ісакій — святий чи жертва?'
  words: 800
- points:
  - 'Читання центрального фрагменту з Патерика: спокуса Ісакія в печері «ангелами світла», що насправді були бісами.'
  - 'Оригінальний текст: детальний розбір лексики, що описує демонів (явишасѧ ему бѣси въ образѣ ангелъ свѣтълъ) та їхні дії.'
  - 'Граматичний парсинг: форми аориста (рѣша, поидоша), імперфекта (кланѧше сѧ), двоїни (въ лица своꙗ) та їх функціональне
    навантаження в наративі.'
  - 'Паралельний переклад сучасною українською: порівняння синтаксису, ідіоматики та способів вираження психологічних станів.'
  - '[!decolonization] Аналіз співвідношення церковнослов''янізмів (книжна мова) та східнослов''янських розмовних елементів
    у тексті як свідчення мовної ситуації в Русі.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Дієслова спокуси та омани. Аналіз ролі префіксів (пре-, о-, из-) у дієсловах, що описують дії
    демонів (прельстити, обавати, изгнати).'
  - 'Етимологічний слід: «Бѣсъ» — від індоєвропейського кореня *bhoidh- (викликати страх) до сучасного «біс». Простежити семантичний
    шлях слова.'
  - 'Фонологічна лабораторія: Падіння редукованих ъ та ь на прикладі слів з тексту. Як «дъхъ» перетворився на «дух»? Аналогії
    з «сънъ» → «сон», «дьнь» → «день».'
  - '[!myth-buster] Чи всі «нечисті духи» однакові? Лінгвістичне розрізнення між «бісами» (демонами християнської традиції)
    та духами природи з язичницького субстрату.'
  section: 'Мовна лабораторія: Лексикон надприродного'
  words: 1700
- points:
  - 'Повернення до розминки: «побѣдиши бѣсы». Як тепер ви розумієте цю фразу в повному контексті історії Ісакія та її лінгвістичних
    особливостей?'
  - 'Лінгвістичний висновок: Як давньосхіднослов''янська мова виражала складні абстрактні та теологічні поняття? Роль церковнослов''янських
    запозичень та кальок.'
  - 'Зв''язок із сучасністю: Слова «спокуса», «омана», «печера», «подвиг» — як їхнє давнє значення з Патерика продовжує жити
    у сучасній українській мові та культурі.'
  section: Дискусія та підсумок
  words: 600
focus: The story of Isaac the Recluse (Ісакій Печерський) from the Patericon as a case study in Old East Slavic demonology,
  textual analysis of his spiritual battles, and the linguistic representation of supernatural beings.
level: OES
module: oes-092
objectives:
- Аналізувати оригінальний уривок з Києво-Печерського патерика, розрізняючи церковнослов'янські та східнослов'янські риси
- Ідентифікувати та пояснювати ключові граматичні явища давньосхіднослов'янської мови (аорист, двоїна) на матеріалі тексту
- Розрізняти філологічні та історико-культурні підходи до аналізу агіографічних текстів, беручи участь у дебаті про природу
  «бісів» Ісакія
- Простежувати етимологію та семантичну еволюцію ключових слів, пов'язаних із духовністю та мораллю
