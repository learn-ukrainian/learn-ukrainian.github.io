content_outline:
- points:
  - 'Провокація: Вам наснилося, що вас "вдягають у чорний саван на тисовому ліжку". Це обіцянка багатства чи смертний вирок?
    Розшифруйте давній омен.'
  - 'Оригінальна фраза: "...одягахуть мя чръною паполомою на кроваты тисовѣ..." — що означає кожне слово?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи "Слово о полку Ігоревім" — автентичний текст XII ст. чи геніальна підробка XVIII ст.? Аргументи скептиків
    (Андре Мазон, Олександр Зімін) проти захисників (Роман Якобсон, Дмитро Лихачов).'
  - 'Дебат 2: "Сон Святослава" — це язичницьке пророцтво чи християнська алегорія? Аналіз символіки (перли-сльози, отруєне
    вино, круки) з точки зору двовір''я.'
  - '[!epistemic-humility] Жодного оригіналу не збереглося, лише копія 1790-х років, що згоріла в 1812 році. Вся сучасна наука
    базується на аналізі цієї втраченої копії.'
  - '[!decolonization] Заперечення російської монополії на "Слово". Текст створено в Чернігові або Києві, його мова має протоукраїнські
    риси, а географія — суто українська. Це спільна спадщина, а не ексклюзивний "давньоруський" текст.'
  section: 'Конфліктна карта: Справжність чи підробка?'
  words: 800
- points:
  - Повний текст "Сну Святослава" давньосхіднослов'янською мовою з нормалізованою орфографією.
  - 'Послівний глос: "смутенъ сонъ", "женчугъ", "синее вино, съ трудомь смѣшено", "врани граяхуть".'
  - 'Граматичний розбір: форми двоїни (двѣма соколома), аорист ("въскричаша") та імперфект ("одягахуть"), їхня роль у динаміці
    сну.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо втрачених значень.
  - '[!decolonization] Примітки про відмінності мови "Слова" від церковнослов''янської та її зв''язок із живими східнослов''янськими
    діалектами того часу.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Двоїна. Як і чому зникла ця категорія? Аналіз усіх форм двоїни у "Сні" та їх функція.'
  - 'Етимологічний слід: Простежуємо шлях ключових слів сну: "паполома" (саван), "трудъ" (скорбота, отрута), "кнѣсь" (гребінь
    даху) від праслов''янських коренів до сучасних українських нащадків.'
  - 'Фонологічна лабораторія: Реконструкція вимови. Як звучали носові голосні ("женчугъ") і редуковані "ъ", "ь" у мові Святослава?
    Аналіз написання як ключ до фонетики.'
  - '[!myth-buster] Розвінчання міфу про "чисте язичництво" символів. Багато образів (чорний колір, розсипані перли) мають
    паралелі у біблійній та візантійській літературі сновидінь.'
  section: 'Мовна лабораторія: Символічна семантика та етимологія'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, "чорний саван на тисовому ліжку" — що це означає? Студент формулює повну відповідь, використовуючи
    знання про символіку, граматику та історичний контекст.'
  - 'Лінгвістичний висновок: Що "Сон Святослава" говорить нам про стан давньокиївської мови кінця XII ст.? Які процеси (зникнення
    двоїни, падіння редукованих) вже помітні в тексті?'
  - 'Зв''язок із сучасністю: Чи існують в сучасній українській мові та культурі відгомони символіки "Слова" (наприклад, "чорна"
    звістка, круки як провісники біди)?'
  section: Дискусія та підсумок
  words: 600
