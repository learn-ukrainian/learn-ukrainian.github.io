objectives:
- Аналізувати процес падіння єрів (Ъ, Ь) у давньосхіднослов'янській мові, застосовуючи закон Гавлика
- Розпізнавати та граматично коментувати форми з єрами в оригінальних давньосхіднослов'янських текстах
- Реконструювати сучасні українські форми слів, виходячи з їхніх давньосхіднослов'янських прототипів із єрами
- Критично оцінювати наукові дебати щодо хронології та механізмів падіння єрів
