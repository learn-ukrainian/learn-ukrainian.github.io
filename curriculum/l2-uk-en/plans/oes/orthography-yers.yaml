content_outline:
- points:
  - 'Провокація: Розгляньте давньосхіднослов''янське слово «сънъ». Його сучасний український нащадок — «сон». Куди зникли
    дві останні літери? І чи були вони взагалі літерами?'
  - 'Запитання до роздумів: Чи були «ъ» та «ь» німими літерами, як у сучасній російській орфографії до 1918 року, чи вони
    позначали реальні звуки?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Хронологія): Коли саме відбулося падіння єрів? Суперечка між О. Шахматовим (XI-XII ст.) та Ю. Шевельовим (XII-XIII
    ст.). Це був моментальний зсув чи довготривалий процес?'
  - 'Дебат 2 (Універсальність): Чи закон Гавлика, що пояснює долю єрів, діяв однаково на всій території східних слов''ян?
    Аналіз діалектних відмінностей, що могли існувати ще в дописемний період.'
  - '[!epistemic-humility] Точне датування неможливе. Лінгвісти реконструюють процес на основі непрямих доказів: помилок у
    рукописах, запозичень в інші мови та порівняльного аналізу.'
  - '[!decolonization] Процес падіння єрів відбувався у ВСІХ східнослов''янських діалектах, що були предками української,
    білоруської та російської мов. Це спільна спадщина, а не ексклюзивно «давньоруська» риса.'
  section: 'Конфліктна карта: Датування та механізми падіння єрів'
  words: 800
- points:
  - 'Першоджерело: Фрагмент з Остромирового Євангелія (1056–1057) або «Ізборника Святослава» (1073), де вживання «ъ» та «ь»
    ще є послідовним і фонетичним.'
  - 'Порядковий аналіз: Оригінальний текст — слово-в-слово глосарій — сучасний український переклад. Приклад: «въ ıмѧ отьца
    ı съıна…» → «въ-імѧ-отьца-і-съıна» → «в ім''я Отця і Сина…»'
  - 'Граматичний коментар: Як наявність єра вказує на кінець слова або складу. Розбір відмінкових закінчень, що містять єри
    (напр., «градъ» - називний, «града» - родовий).'
  - 'Лингвістичний коментар: Розрізнення між давньосхіднослов''янською вимовою та церковнослов''янською орфографічною традицією
    в тексті.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Правило Гавлика: Детальне пояснення сильної (перетворюється на /о/ або /е/) та слабкої (зникає) позиції єрів. «Сильна»
    — перед складом зі слабким єром. «Слабка» — перед складом із сильним єром або голосним повного творення.'
  - 'Практикум: Студенту дається список давньосхіднослов''янських слів (напр., дьнь, сънъ, пьсъ, вьсь, огнь). Застосовуючи
    закон Гавлика, студент повинен реконструювати їхні сучасні українські форми (день, сон, пес, село, вогонь).'
  - '[!myth-buster] Падіння єрів — не хаотичний процес. Це був строгий фонетичний закон, який змінив структуру кожного східнослов''янського
    слова. Наслідок цього — поява «втікаючих голосних» (день-дня, сон-сну) в сучасній українській мові.'
  - 'Палеографічний аналіз: Як помилки переписувачів (пропуски або вставки зайвих єрів) у пізніших рукописах (XIII-XIV ст.)
    свідчать про те, що вони вже не чули цих звуків, а писали за традицією.'
  section: 'Мовна лабораторія: Реконструкція падіння єрів'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер ви можете точно пояснити, що сталося зі словом «сънъ» і чому «сон» має форму «сну» в родовому
    відмінку. Сформулюйте пояснення, використовуючи терміни «сильна позиція», «слабка позиція» та «втікаючий голосний».'
  - 'Лінгвістичний висновок: Падіння єрів було найважливішим фонетичним процесом у історії східнослов''янських мов, що призвело
    до зміни кількості складів у словах і появи нових закритих складів.'
  - 'Зв''язок із сучасністю: Як знання про єри допомагає зрозуміти сучасний український правопис (напр., написання прийменника
    «у/в») та чергування голосних?'
  section: Дискусія та підсумок
  words: 600
focus: The phonological process of the fall of the yers (Ъ, Ь) in Old East Slavic and its orthographic consequences, governed
  by Havlík's Law
