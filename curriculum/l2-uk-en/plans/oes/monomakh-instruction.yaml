activity_hints:
- description: Перевірка розуміння позицій щодо автентичності тексту та його мовної класифікації. Чия це теза?
  focus: Філологічні дебати навколо "Повчання"
  items: 4
  type: quiz
- description: Заповніть пропуски, перетворивши давньосхіднослов'янську форму дієслова з "Повчання" на її сучасний український
    відповідник.
  focus: OES vs Сучасні форми
  items: 5
  type: fill-in
- description: Надано фрагмент тексту. Визначте та поясніть 2-3 церковнослов'янізми та 2-3 виразні східнослов'янські риси.
    Аргументуйте свій вибір.
  focus: Аналіз мовних шарів
  type: note
- description: 'На основі проаналізованого тексту напишіть есе (400-600 слів) на тему: "Що лінгвістичний аналіз "Повчання
    Мономаха" говорить нам про мовну ситуацію та самосвідомість еліти Київської Русі в XII столітті?"'
  focus: 'Есе: "Повчання" як мовний портрет епохи'
  type: note
