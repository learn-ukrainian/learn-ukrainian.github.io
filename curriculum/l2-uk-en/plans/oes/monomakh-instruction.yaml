content_outline:
- points:
  - 'Провокація: "не даите сильнїмъ погубити чоловѣка". Що означає цей наказ і чому він був центральним для правителя Русі?'
  - Студент має розшифрувати OES фразу, спираючись на знання сучасної української та інтуїцію.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Повчання" автентичним текстом Мономаха? Роль переписувачів Лаврентіївського літопису. [!epistemic-humility]'
  - 'Дебат 2: Церковнослов''янська vs давньосхіднослов''янська основа. Це високий стиль для наслідування чи відображення реальної
    мови князя?'
  - '[!decolonization] Термінологічна війна: "давньоруський" vs "давньосхіднослов''янський". Як імперська історіографія використовувала
    "Повчання" для обґрунтування спадкоємності "Москва — третій Рим".'
  section: 'Конфліктна карта: Автентичність та мова'
  words: 800
- points:
  - 'Оригінальний текст: Фрагмент з "Повчання" про обов''язки князя — суд, милосердя, праця, повага до старших.'
  - 'Пофразовий глосинг та граматичний розбір ключових форм: імперативи (e.g., послушаите, не лѣнитесѧ), давальний відмінок
    (сильнїмъ), інфінітиви.'
  - Паралельний переклад сучасною українською мовою для порівняльного аналізу.
  - '[!decolonization] Аналіз церковнослов''янізмів (e.g., неповноголосся "градъ" vs "город") та східнослов''янських рис як
    маркерів мовної гібридності, а не "засміченості".'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: система імперативів у "Повчанні". Форми 2-ї особи однини, множини та 1-ї особи множини ("...
    а такъ глаголѣте: пондѣте...").'
  - 'Етимологічний слід: простежити еволюцію ключових слів з тексту: "трудъ" → "труд", "очи" → "очі", "чоловѣкъ" → "чоловік".'
  - '[!myth-buster] "Повчання" — це не просто мораль, а практичний посібник з управління. Розбір дієслів дії: "управлѧите",
    "блюдете", "избавлѧите".'
  - 'Палеографічний екскурс: як виглядав би цей текст в уставному письмі XI-XII ст., візуалізація.'
  section: 'Мовна лабораторія: Імператив та дієслівні форми'
  words: 1700
- points:
  - 'Повернення до розминки: повний лінгвістичний та історичний розбір фрази "не даите сильнїмъ погубити чоловѣка".'
  - 'Лінгвістичний підсумок: Яку роль відігравав імператив у дидактичному жанрі OES? Як "Повчання" демонструє взаємодію високого
    (церковнослов''янського) та розмовного (східнослов''янського) стилів?'
  - 'Зв''язок із сучасністю: Які з моральних настанов Мономаха та мовних форм збереглися в сучасній українській мові та культурі?'
  section: Дискусія та підсумок
  words: 600
focus: Linguistic analysis of "Monomakh's Instruction"; didactic genre in OES; Church Slavonic vs. vernacular features; Imperative
  mood; philological debates on authenticity.
level: OES
module: oes-038
objectives:
- Аналізувати "Повчання Мономаха" як зразок дидактичного жанру давньосхіднослов'янської літератури.
- Розрізняти та коментувати церковнослов'янські та власне східнослов'янські мовні риси у тексті.
- Застосовувати знання про граматику OES для перекладу та інтерпретації оригінального тексту, зокрема форм імперативу.
- Формулювати аргументовану позицію щодо ключових філологічних дебатів про автентичність та мовну класифікацію "Повчання".
pedagogy: CBI
