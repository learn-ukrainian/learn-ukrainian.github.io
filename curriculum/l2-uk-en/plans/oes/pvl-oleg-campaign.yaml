module: oes-027
objectives:
- Аналізувати фрагмент ПВЛ про похід Олега, розрізняючи мовні та історичні шари
- Ідентифікувати та пояснювати ключові граматичні риси тексту: аорист, двоїну, давальний абсолют
- Критично оцінювати наукові дебати щодо історичності походу та автентичності договору 911 року
- Розрізняти давньосхіднослов'янську військову, юридичну та побутову лексику та простежувати її етимологію (слов'янську та
  скандинавську)
