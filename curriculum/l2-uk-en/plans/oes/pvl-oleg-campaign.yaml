content_outline:
- points:
  - 'Провокація: Літопис каже, Олег поставив кораблі на колеса. Це поетична метафора, військова хитрість, чи помилка переписувача?'
  - 'Фрагмент тексту: "Иде Олегъ на Грекы, Игоря оставивъ Кыевѣ". Студент має зробити первинний синтаксичний та морфологічний
    розбір.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історичність походу 907 р. Позиція скептиків (Шахматов), які вважають його компіляцією, проти аргументів на
    користь автентичності.'
  - 'Дебат 2: Мова договору Олега з греками. Це переклад з грецької чи оригінальний давньосхіднослов''янський текст? Що це
    говорить про рівень грамотності та правової культури Русі?'
  - '[!decolonization] Норманська теорія vs антинорманська в контексті мови договору. Як імена послів (Карлъ, Фарлофъ, Веремудъ)
    свідчать про поліетнічний характер руської дружини?'
  - '[!epistemic-humility] Літопис як нашарування різних текстів. Вчимося розрізняти хроніку, легенду, юридичний документ
    та ідеологічну вставку в одному наративі.'
  section: 'Конфліктна карта: Договір чи легенда?'
  words: 800
- points:
  - 'Оригінальний текст з Лаврентіївського списку: детальний опис походу Олега, облоги Царгорода, "кораблів на колесах" та
    укладення договору.'
  - 'Пофразовий глосинг та розбір: "И повелѣ Олегъ воемъ своимъ, да исходъ творять, колеса изъ волоку..."'
  - 'Граматичний парсинг: аналіз форм аористу (иде, повелѣ, сътвориша), двоїни (колеса, вѣтрила), давального абсолюту.'
  - '[!decolonization] Чому літописець називає мову "словенску", а не "руську"? Розбір термінології та її політичного значення.'
  - Паралельний переклад сучасною українською для зіставлення синтаксису та лексики.
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аорист. Як він утворюється (сигматичний, асигматичний)? Чим його значення дії відрізняється від
    імперфекта? Вправи на знаходження та утворення форм аористу з тексту про Олега.'
  - 'Етимологічна лабораторія: Імена дружинників. Трасування скандинавських імен (Helgi -> Олег, Ingvarr -> Ігор, Karl ->
    Карлъ) та їх адаптація у східнослов''янському мовному середовищі.'
  - '[!myth-buster] "Паволочиты вѣтрила" — чи справді це шовкові вітрила? Аналіз лексеми "паволока" в давніх текстах, її значення
    та статус.'
  - 'Фонологічна лабораторія: Сліди другої палатализації в тексті (Грекы -> у Грецихъ). Пояснення механізму на прикладах з
    літопису.'
  section: 'Мовна лабораторія: Аорист та імена воїнів'
  words: 1700
- points:
  - 'Повернення до розминки: кораблі на колесах. Студент формулює обґрунтовану гіпотезу (міф, метафора, реальність), використовуючи
    дані з модуля.'
  - 'Лінгвістичний висновок: що військова лексика, юридичні терміни та імена в договорі Олега говорять про суспільство, військо
    та правову систему Київської Русі на початку X століття?'
  - 'Зв''язок із сучасністю: як терміни "договір", "данина", "посол", "мир" еволюціонували від часів Олега до сучасної української
    дипломатичної мови?'
  section: Дискусія та підсумок
  words: 600
focus: Analysis of Oleg's 907 campaign narrative in the PVL. Focus on military vocabulary, Varangian/Slavic names, and grammatical
  features of the text (aorist, dual number).
