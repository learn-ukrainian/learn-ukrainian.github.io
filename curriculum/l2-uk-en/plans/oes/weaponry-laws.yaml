content_outline:
- points:
  - 'Провокація: Якщо вільний муж вдарить іншого мечем, не вбивши, яке покарання справедливіше за Руською Правдою — штраф
    3 гривні чи відсікання руки? Чому?'
  - 'Фрагмент тексту: «Аже кто кого ударить батогомъ, любо жердью, любо пястью...» — студент має вгадати, про який злочин
    ідеться та яким буде покарання.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Статті про зброю та вбивство в Руській Правді — це кодифікація давнього східнослов’янського звичаєвого права
    чи адаптація візантійського кодексу (Еклоги)? [!epistemic-humility]'
  - 'Дебат 2: Лексика зброї («меч», «копье», «щит») — наскільки вона відбиває скандинавський (варязький) вплив на військову
    еліту Русі, а наскільки є питомо слов’янською? [!decolonization]'
  - 'Філологічний вимір: чи можна за діалектними рисами в різних списках Правди відрізнити північні (новгородські) та південні
    (київські) правничі норми?'
  section: 'Конфліктна карта: Слов’янське право чи візантійський імпорт?'
  words: 800
- points:
  - 'Оригінальний текст: Статті 1-10 з Короткої редакції Руської Правди (про вбивство та тілесні ушкодження).'
  - 'Глосування: «Аще убьєть мужь мужа, то мьстить брату брата...», «головникові», «вира» — розбір ключових юридичних термінів
    та формул.'
  - 'Граматичний парсинг: аналіз умовних конструкцій з «аще» (якщо), вживання аориста та імперфекта для опису злочину, форми
    двоїни в статтях про тілесні ушкодження.'
  - Паралельний переклад сучасною українською мовою з коментарями про втрачені та змінені правові реалії. [!decolonization]
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Відмінювання іменників-назв зброї. Особливості вживання орудного відмінка знаряддя дії («ударить
    мечемь»).'
  - 'Етимологічний слід: Простежуємо шлях слів «вира», «гривна», «голова» (в значенні «життя/особа»), «урок» (в значенні «штраф»)
    від давньосхіднослов’янської через середньоукраїнську до сучасної мови.'
  - 'Порівняльний аналіз: «Кровна помста» vs «грошова компенсація» — як мова відбиває перехід від одного принципу до іншого?
    [!myth-buster] Руська Правда — це не про варварську помсту, а про її системне обмеження та заміну.'
  - 'Палеографія: порівняння написання ключових термінів у різних списках (рукописах) Руської Правди.'
  section: 'Мовна лабораторія: Юридична та військова лексика'
  words: 1700
- points:
  - 'Повернення до розминки: студент формулює обґрунтовану відповідь про покарання за удар мечем, спираючись на прочитані
    статті.'
  - 'Лінгвістичний висновок: що робить мову Руської Правди ефективним юридичним інструментом? (точність, формульність, відсутність
    емоційної лексики).'
  - 'Зв''язок із сучасністю: чи залишилися в сучасній українській мові чи правовій системі сліди концепцій Руської Правди?
    (напр., ідея грошової компенсації за моральну шкоду).'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз статей про зброю, тілесні ушкодження та вбивство в короткій та широкій редакціях Руської Правди; лексика зброї
  та юридичних покарань в давньосхіднослов’янській мові.
