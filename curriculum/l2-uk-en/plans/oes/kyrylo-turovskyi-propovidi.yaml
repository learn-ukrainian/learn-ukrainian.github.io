activity_hints:
- description: Перевірка розуміння філологічних дебатів. Чия це теза — Франкліна чи Єрьоміна? Визначити позицію за цитатою.
  focus: 'Конфліктна карта: Златоуст чи компілятор?'
  items: 4
  type: quiz
- description: Ідентифікувати риторичні фігури (анафора, антитеза, ампліфікація) у фрагментах проповідей Кирила Турівського.
  focus: Риторичні фігури
  items: 5
  type: fill-in
- description: На основі прочитаного уривку, проаналізуйте співвідношення церковнослов'янських та східнослов'янських елементів.
    Які висновки можна зробити про мовну ситуацію в Русі ХІІ ст.? (300-400 слів).
  focus: 'Джерельний аналіз: Мова Кирила'
  type: note
- description: Опишіть, яким є риторичний ідеал Кирила Турівського. Яку роль, на його думку, відіграє «красне слово» в духовному
    житті? Чи можна простежити вплив його стилю на подальшу українську літературу? (400-600 слів).
  focus: 'Есе: Риторичний ідеал Кирила та його спадщина'
  type: note
