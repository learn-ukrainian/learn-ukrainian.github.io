content_outline:
- points:
  - 'Провокація: «Или мните, яко земля под нами движеться...» — що змусило «руського Златоуста» Кирила Турівського так звернутися
    до пастви? Спробуйте розшифрувати сенс цієї фрази з його «Слова на Вербницю», спираючись на знання сучасної української.'
  - 'Лінгвістична загадка: звідки в мові ХІІ століття зʼявляється така складна алегорична конструкція?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Оригінальний мислитель vs блискучий стиліст. Чи був Кирило самостійним богословом, чи лише талановитим перекладачем
    і адаптатором візантійських взірців? Позиції Франкліна vs Єрьоміна.'
  - 'Дебат 2: Мова Кирила — церковнослов’янська чи давньосхіднослов’янська? Аналіз співвідношення південнослов’янських (болгарських)
    і східнослов’янських елементів у текстах.'
  - '[!decolonization] Виклик терміну «давньоруський Златоуст». Мова Кирила — це «руська» (Ruthenian) версія церковнослов’янської,
    спільна спадщина, а не ексклюзивна власність російської традиції.'
  - '[!epistemic-humility] Ми не маємо автографів Кирила. Тексти дійшли в пізніших списках XIV-XVI ст. Наскільки переписувачі
    змінили оригінал?'
  section: 'Конфліктна карта: Златоуст чи компілятор?'
  words: 800
- points:
  - 'Читання «Слова на Вербницю»: розбір ключового фрагменту про алегорію входу Господнього в Єрусалим.'
  - Оригінальний текст (нормалізована давньосхіднослов’янська вимова в кириличній графіці).
  - Дослівний підрядковий глосарій з граматичним розбором ключових форм (аорист, імперфект, двоїна, дієприкметники).
  - Паралельний переклад сучасною українською мовою для порівняння синтаксису та лексики.
  - '[!decolonization] Коментар: розрізнення церковнослов’янізмів (книжних форм) та живих східнослов’янських елементів (вернакулярні
    форми) у тексті.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: аналіз риторичних фігур як інструментів смислотворення у проповідях Кирила.'
  - 'Практикум 1: Анафора та антитеза. Знайти та проаналізувати приклади анафори (єдинопочатку) та антитези (протиставлення)
    у тексті «Слова на Великдень». Як вони створюють емоційне напруження?'
  - 'Практикум 2: Ампліфікація. Розбір прийому ампліфікації (розширення, накопичення синонімів) на прикладі опису Воскресіння
    Христового.'
  - '[!myth-buster] Це не просто «красиві слова». Риторика в середньовічній культурі — це спосіб моделювання світу. Кожна
    фігура має богословське та дидактичне навантаження.'
  - 'Етимологічний слід: від OES *вѣтійство* до сучасного *красномовство*.'
  section: 'Мовна лабораторія: Візантійська риторика в дії'
  words: 1700
- points:
  - 'Повернення до розминки: «Или мните, яко земля под нами движеться...». Після аналізу алегоричного методу Кирила, як тепер
    ви розумієте цю фразу? Запропонуйте повний переклад і тлумачення.'
  - 'Лінгвістичний підсумок: що проповіді Кирила говорять нам про співіснування книжної (церковнослов’янської) та розмовної
    (східнослов’янської) мов у Русі ХІІ століття?'
  - 'Звʼязок із сьогоденням: традиція «високого стилю» в українській літературі. Чи можна побачити спадщину Кирила Турівського
    в бароковій поезії XVII ст.?'
  section: Дискусія та підсумок
  words: 600
focus: Slovo na Verbnytsiu, Slovo na Velykden, Byzantine rhetoric, "Zlatoust ruskyi", philological debates, grammatical parsing
  of Old East Slavic
level: OES
module: oes-100
objectives:
- Аналізувати проповіді Кирила Турівського в контексті візантійської гомілетики та філологічних дебатів щодо їхньої мови та
  оригінальності
- Читати та перекладати фрагменти давньосхіднослов’янського тексту, розбираючи граматичні форми та риторичні фігури
- Розрізняти церковнослов’янські (книжні) та вернакулярні (східнослов’янські) елементи в мові Кирила Турівського
- Формулювати аргументовану позицію щодо ролі риторики в культурі Київської Русі та спадковості цієї традиції в українській
  літературі
