activity_hints:
- description: Кому належить теза? Відрізнити аргументи "скептиків" та "автентистів" у дебаті про справжність «Слова».
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Дано фрагменти з «Слова». Визначте, де інверсія, де паралелізм, а де хіазм.
  focus: Ідентифікація стилістичних фігур
  items: 6
  type: fill-in
- description: Візьміть речення з "Плачу Ярославни" в оригіналі та в перекладі М. Рильського. Опишіть, які синтаксичні зміни
    зробив перекладач і чому, на вашу думку, він це зробив.
  focus: Порівняльний синтаксичний аналіз
  type: note
- description: Що синтаксис «Слова» говорить нам про його автора? Чи був він книжником, дружинником, чи придворним співцем?
    Обґрунтуйте свою думку на основі проаналізованих у модулі синтаксичних особливостей (400-600 слів).
  focus: 'Есе: Синтаксис як характеристика автора'
  type: note
