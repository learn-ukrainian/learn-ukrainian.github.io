vocabulary_hints:
- definition: зміна звичайного (прямого) порядку слів у реченні з метою виділити певне слово чи надати фразі особливого стилістичного
    забарвлення.
  pos: ж.
  word: інверсія
- definition: стилістична фігура, що полягає в перехресному розташуванні елементів двох суміжних фраз або речень (схема A-B-B-A).
  pos: ч.
  word: хіазм
- definition: стилістичний прийом, що полягає в аналогічній синтаксичній побудові сусідніх речень або їх частин.
  pos: ч.
  word: паралелізм
- definition: справжність, дійсність, відповідність оригіналу. У контексті «Слова» — питання про те, чи текст є справжнім
    твором XII ст.
  pos: ж.
  word: автентичність
- definition: у палеографії — рукописна копія тексту, на відміну від друкованого видання.
  pos: ч.
  word: список
- definition: розділ граматики, що вивчає способи поєднання слів у словосполучення та речення; будова речення.
  pos: ч.
  word: синтаксис
- definition: незвичний синтаксичний зворот, що використовується для посилення виразності та емоційного впливу мови.
  pos: ж.
  word: стилістична фігура
- definition: техніка в лінгвістиці, що полягає в підрядковому коментуванні або перекладі кожного слова чи морфеми тексту.
  pos: ч.
  word: глосинг
