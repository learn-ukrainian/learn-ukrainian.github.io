content_outline:
- points:
  - 'Провокація: "Боянъ бо вѣщій, аще кому хотяше пѣснь творити, то растѣкашется мыслію по древу". Це вишукана поезія чи "неправильний"
    порядок слів? Розбираємо один рядок.'
  - Студент отримує картку з трьома варіантами порядку слів у фразі з «Слова» і має вгадати, який з них є оригінальним.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є унікальний синтаксис «Слова» доказом його автентичності (теза Романа Якобсона), чи навпаки, ознакою пізньої
    підробки, що імітує "архаїчний" стиль?'
  - 'Дебат 2: Скандинавський слід vs Тюркський вплив. Чи є синтаксичні особливості «Слова» (напр., постпозиція прикметника)
    результатом впливу мови варягів, чи це спільна риса поетичного мовлення степових народів?'
  - '[!epistemic-humility] Немає консенсусу. Одні вчені вбачають у синтаксисі «Слова» праслов''янську спадщину, інші — інновацію
    геніального автора.'
  - '[!decolonization] Російська імперська школа трактувала будь-яку незрозумілу рису як "псування" тексту переписувачами.
    Сучасний підхід — бачити в цьому авторський задум.'
  section: 'Конфліктна карта: Синтаксис як доказ'
  words: 800
- points:
  - 'Оригінальний текст: Плач Ярославни. Розбір одного з найскладніших та найпоетичніших фрагментів «Слова».'
  - 'Порядковий переклад: дословний глосинг кожної лексеми для демонстрації оригінального порядку слів.'
  - 'Граматичний парсинг: розбір інверсій, паралельних конструкцій, риторичних звертань Ярославни. "Полечу, рече, зегзицею
    по Дунаеви" — аналіз кожного слова.'
  - 'Паралельний переклад: порівняння з трьома класичними українськими перекладами (Шевченко, Франко, Рильський) — як вони
    вирішували проблему синтаксису?'
  - 'Нотатки: відмінності між церковнослов''янськими та розмовними синтаксичними моделями у фрагменті.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Лабораторія інверсії: каталогізація та класифікація типів інверсії у «Слові». Коли прикметник стоїть після іменника і
    чому?'
  - 'Лабораторія паралелізму: аналіз синтаксичного паралелізму як основного композиційного принципу. "Что ми шумить, что ми
    звенить давеча рано предъ зорями?"'
  - 'Лабораторія хіазму: пошук та аналіз перехресних синтаксичних структур (AB:BA). Як вони створюють відчуття гармонії та
    завершеності.'
  - '[!myth-buster] "Примітивне мистецтво" чи складна техніка? Доводимо, що автор «Слова» володів синтаксисом як свідомим
    інструментом, а не робив помилки.'
  section: 'Мовна лабораторія: Інструменти поета'
  words: 1700
- points:
  - 'Повернення до розминки: чи є порядок слів у «Слові» "неправильним"? Студент формулює відповідь, спираючись на знання
    про стилістичні фігури.'
  - 'Лінгвістичний висновок: синтаксис у «Слові» — це не просто граматика, а інструмент для створення ритму, емоцій та образів.'
  - 'Зв''язок із сучасною українською: які з цих синтаксичних прийомів досі використовуються в українській поезії? А які залишились
    у минулому?'
  section: Дискусія та підсумок
  words: 600
focus: 'Поетичний синтаксис у «Слові о полку Ігоревім»: аналіз інверсії, хіазму, паралелізму та їх стилістичної функції в
  оригінальному тексті.'
level: OES
module: oes-083
objectives:
- Аналізувати складні поетичні фігури (інверсію, хіазм, паралелізм) в оригінальному давньосхіднослов'янському тексті.
- Критично оцінювати ключові філологічні дебати щодо автентичності та інтерпретації «Слова о полку Ігоревім».
- Самостійно виконувати переклад та граматичний розбір фрагментів «Слова», приділяючи особливу увагу синтаксичним конструкціям.
- Формулювати аргументовану позицію щодо ролі синтаксису як стилістичного інструменту в давній літературі.
pedagogy: CBI
