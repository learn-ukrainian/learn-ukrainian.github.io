content_outline:
- points:
  - 'Провокація: "И бѣ тѣлом чистъ и свѣтелъ, аки новъ снѣгъ." — Чому агіограф описує святого через зовнішність, а не вчинки?
    Коротка цитата з Житія для розшифровки.'
  - Сучасне слово "подвиг". Його давньосхіднослов'янський предок "подвизати ся" означав аскетичну практику. Як змінилося значення?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи справді Нестор Літописець написав "Житіє Феодосія"? Аргументи "за" (традиція, стилістична близькість до "Повісті
    временних літ") та "проти" (розбіжності в фактах).'
  - 'Дебат 2: Якою мовою написане "Житіє"? Це церковнослов''янська "висока" мова чи в ній пробиваються риси живої давньосхіднослов''янської
    (протоукраїнської) мови?'
  - '[!epistemic-humility] Питання авторства залишається відкритим; докази є непрямими, що дозволяє різним школам (Шахматов,
    Присьолков) відстоювати свої теорії.'
  - '[!decolonization] Твердження російської історіографії про "давньоруську" мову тексту є політичним. Це мова Київської
    Русі — давньосхіднослов''янська, спільний предок, а не ексклюзивна власність Москви.'
  section: 'Конфліктна карта: Авторство та мова "Житія"'
  words: 800
- points:
  - 'Оригінальний текст: фрагмент "Житія", де описується запровадження Феодосієм Студійського уставу в Печерському монастирі.'
  - 'Порядковий переклад: слово-в-слово та фраза-в-фразу, з поясненням граматичних форм (аорист, імперфект, двоїна).'
  - 'Граматичний розбір: форми аористу "принесе", "въведе"; конструкції з давальним самостійним.'
  - 'Паралельний переклад сучасною українською мовою: порівняння синтаксису та лексики.'
  - '[!decolonization] Наголос на візантійському, а не московському, джерелі чернечої традиції Русі. Феодосій приносить устав
    з Константинополя.'
  section: 'Текст: Читання та переклад "Уставу Студійського"'
  words: 1700
- points:
  - 'Граматична лабораторія: аналіз імперативів (наказовий спосіб) у тексті уставу. Форми 2-ї та 3-ї особи однини та множини
    ("да не буде", "творіте").'
  - 'Фонологічна лабораторія: відстеження занепаду редукованих (ъ, ь) на прикладі слів з тексту. Де "jer" впав, а де вокалізувався
    в "о", "е".'
  - 'Етимологічний слід: шлях слів "монахъ", "игуменъ", "уставъ", "законъ" від грецьких оригіналів через церковнослов''янську
    до сучасної української.'
  - '[!myth-buster] Давньосхіднослов''янська граматика не була "простою". Наявність аориста, імперфекта та двоїни свідчить
    про складну систему часів та чисел, багатшу за сучасну.'
  section: 'Мовна лабораторія: Граматика наказу та чернечих правил'
  words: 1700
- points:
  - 'Повернення до розминки: Як тепер ми розуміємо фразу "тѣлом чистъ"? Це метафора духовної чистоти, виражена мовою агіографічного
    канону.'
  - 'Лінгвістичний підсумок: "Житіє" — це приклад тексту, де книжна церковнослов''янська мова взаємодіє з місцевими східнослов''янськими
    рисами, що робить його безцінним джерелом для історичної лінгвістики.'
  - 'Зв''язок із сучасністю: як ідеали спільножиття та служіння, описані в "Житії", вплинули на українську культуру? Чи актуальні
    вони сьогодні?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз "Житія Феодосія Печерського" Нестора Літописця як ключового джерела для вивчення давньосхіднослов'янської мови,
  агіографічного жанру та ідеології спільножитного монастиря в Київській Русі.
