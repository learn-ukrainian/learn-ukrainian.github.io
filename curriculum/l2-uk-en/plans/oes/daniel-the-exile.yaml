content_outline:
- points:
  - 'Провокація: "Лучєє ми єсть нога своя в лаптю, нежели сапогом чюжимъ". Що цей уривок говорить про автора — він жебрак
    чи філософ?'
  - 'Загадка: Чому текст називається "Моління", якщо він сповнений сарказму та світських афоризмів?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Авторство і датування): Хто був Данило? Одна людина чи збірний образ? Коли написано текст — у XII чи XIII ст.?
    Аргументи "за" і "проти" раннього датування.'
  - 'Дебат 2 (Жанр і автентичність): "Моління" — це реальне прохання до князя, літературна містифікація чи сатиричний твір,
    що висміює владу?'
  - '[!decolonization] Російська імперська наука традиційно "привласнювала" Данила як "древнерусского" письменника, ігноруючи
    унікальні риси мови, що вказують на зв''язок з територією Русі-України.'
  - '[!epistemic-humility] Жоден з рукописів не є авторським оригіналом. Ми маємо справу з копіями переписувачів, що ускладнює
    остаточні висновки про текст.'
  section: 'Конфліктна карта: Загадка Данила Заточника'
  words: 800
- points:
  - 'Оригінальний текст (фрагменти у давньосхіднослов''янській редакції): аналіз знаменитих афоризмів про багатих і бідних,
    мудрих і дурних, добрих і злих жон.'
  - 'Слово за словом: детальний глосарій та паралельний переклад сучасною українською мовою.'
  - 'Граматичний розбір: ідентифікація форм аориста, імперфекта, двоїни. Аналіз синтаксису складних речень.'
  - '[!decolonization] Порівняння церковнослов''янських цитат з Біблії та розмовних, "простонародних" виразів. Данило як майстер
    мовного змішування.'
  section: 'Текст: Читання та переклад "Моління"'
  words: 1700
- points:
  - 'Граматична лабораторія: Як Данило створює свій унікальний стиль? Аналіз синтаксичних конструкцій: антитези, паралелізми,
    риторичні питання.'
  - 'Етимологічний слід: Простежуємо еволюцію 5-7 ключових слів з "Моління" (напр., "тулитись", "лихий", "злидні") від їхнього
    давнього значення до сучасного українського вжитку.'
  - '[!myth-buster] Данило не був "простим чоловіком". Його мова свідчить про високу книжну освіченість, знання Біблії та
    візантійської літератури.'
  - 'Вправа: Студент намагається "перекласти" сучасний анекдот чи мем у стиль Данила, використовуючи вивчені синтаксичні конструкції.'
  section: 'Мовна лабораторія: Синтаксис дотепності'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, ким був Данило — придворним блазнем, політичним вигнанцем чи інтелектуалом, що не знайшов
    собі місця?'
  - 'Лінгвістичний висновок: Що "Моління" говорить нам про мовну ситуацію в Русі XII-XIII ст.? Яким було співвідношення книжної
    та розмовної мов?'
  - 'Зв''язок із сучасністю: Чому афоризми Данила Заточника залишаються актуальними й досі? Які з них ви чули в сучасній українській
    мові?'
  section: Дискусія та підсумок
  words: 600
focus: 'Літературна особистість Данила Заточника: придворний дотепник чи смиренний монах? Аналіз мови та стилю "Моління"'
