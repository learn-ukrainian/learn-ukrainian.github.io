objectives:
- Аналізувати філологічні дебати навколо авторства, датування та жанру "Моління Данила Заточника"
- Виконувати лінгвістичний та стилістичний аналіз фрагментів оригінального тексту "Моління", розрізняючи книжні та розмовні
  елементи
- Пояснювати, як синтаксичні та лексичні засоби використовуються для створення унікального стилю та авторської іронії
- Формулювати обґрунтовану позицію щодо соціальної ролі та мовної особистості Данила Заточника в контексті культури Русі XII-XIII
  ст.
