content_outline:
- points:
  - 'Провокація: «Аже оубиеть моужа моужь, то мьстити братоу брата, любо сынови отца, любо отцю сына, любо братоучадоу, любо
    сестриноу сынови». Хто в цьому переліку зайвий з точки зору сучасного права, і що це говорить про суспільство?'
  - 'Слово-загадка: «тіун». Слуга, суддя, чи управитель? Спробуйте розшифрувати статус за одним реченням з Руської Правди.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що таке «тіун»? Посада з чіткими обов''язками (юридична школа) чи особистий слуга князя з невизначеними повноваженнями
    (соціально-історична школа)?'
  - 'Дебат 2: Звідки походять адміністративні терміни? [!decolonization] Скандинавський імпорт (варязька теорія) vs. самобутній
    слов''янський розвиток vs. візантійський вплив. Розбір етимології слів «тіун», «гридь», «огнищанин».'
  - '[!epistemic-humility] Джерела (Руська Правда) фіксують норму, але не завжди описують реальну практику. Ми бачимо юридичну
    рамку, але не повну соціальну картину.'
  - 'Суперечка про «огнищанина»: це управитель двору (дослівно «людина вогнища») чи представник вищої аристократії?'
  section: 'Конфліктна карта: Посада чи статус?'
  words: 800
- points:
  - 'Першоджерело: Статті з розширеної редакції Руської Правди, що стосуються вбивства та штрафів (віри) за представників
    княжої адміністрації.'
  - 'Оригінальний текст: «Аже оубьють огнищанина въ ωбидоу, то платити за нъ 80 гривенъ... а за княжа тивуна 80 гривенъ».'
  - 'Послівний граматичний розбір: форми аориста (оубьють), конструкції з «аже» (якщо), форми знахідного відмінка (огнищанина),
    числівники (80 гривенъ).'
  - Паралельний переклад сучасною українською мовою з коментарями щодо семантичних зсувів.
  - '[!decolonization] Аналіз терміну «Руська Правда». Це не «російська», а «руська» — тобто, що стосується Русі. Наголошення
    на спадкоємності саме для української правової традиції.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Відмінювання титулів (тіун, огнищанин, посадник) у давньосхіднослов''янській мові. Аналіз відмінностей
    від сучасних українських парадигм.'
  - 'Етимологічна лабораторія: Простеження шляху слів. «Князь» (прагерм. *kuningaz), «тіун» (давньосканд. þjónn), «посадник»
    (питоме слов''янське). Що запозичення говорять про контакти Русі?'
  - '[!myth-buster] Уявлення про монолітну «княжу владу». Текст показує складну ієрархію: князь, тіун княжий, тіун конюший,
    староста, рядович. Кожен має свою «ціну».'
  - 'Практикум: Студенти складають «соціальну драбину» Русі, розміщуючи на ній різні соціальні та адміністративні групи відповідно
    до розміру віри (штрафу) за їхнє життя.'
  section: 'Мовна лабораторія: Семантичні поля адміністрації'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, «тіун» — це... Студент формулює визначення, спираючись на текст і аналіз, та пояснює, чому
    це не просто «слуга».'
  - 'Лінгвістичний висновок: Як правовий документ (Руська Правда) стає безцінним лінгвістичним джерелом? Обговорення ролі
    юридичних текстів у вивченні мертвих мов.'
  - 'Зв''язок із сучасністю: Чи є в сучасній українській мові/адміністративній системі прямі «нащадки» термінів з Руської
    Правди? (напр. «посада» від «посадник»?).'
  - 'Перехід до наступного модуля: від княжої адміністрації до селян (смердів) — як змінюється мова, коли ми спускаємося соціальною
    драбиною?'
  section: Дискусія та підсумок
  words: 600
focus: Old East Slavic administrative titles and social hierarchy in the Kyivan Rus state, as reflected in legal texts like
  the Russkaya Pravda. Focus on titles like тіун, огнищанин, посадник.
level: OES
module: oes-059
objectives:
- Аналізувати фрагменти Руської Правди в оригіналі, виконуючи граматичний та лексичний розбір
- Розрізняти та пояснювати ключові філологічні та історичні дебати щодо адміністративної системи Русі
- Простежувати етимологію адміністративних термінів, виявляючи слов'янські, скандинавські та візантійські впливи
- Реконструювати соціальну ієрархію Русі на основі аналізу правових норм
