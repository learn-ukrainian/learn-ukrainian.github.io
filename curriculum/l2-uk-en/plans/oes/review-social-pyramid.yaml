activity_hints:
- description: Визначте, яка наукова позиція (Грекова чи Зиміна) відповідає твердженню про статус "смерда".
  focus: Розуміння філологічних дебатів
  items: 4
  type: quiz
- description: Вставте правильний соціальний термін ("гридинъ", "смердъ", "холопъ") у речення з "Руської Правди", спираючись
    на розмір "віри".
  focus: Юридична термінологія Руської Правди
  items: 5
  type: fill-in
- description: На основі прочитаних статей "Руської Правди", складіть ієрархічну піраміду суспільства Київської Русі. Обґрунтуйте
    кожну позицію цитатою з тексту (розміром штрафу).
  focus: 'Джерельний аналіз: Соціальна ієрархія'
  type: note
