content_outline:
- points:
  - 'Провокація: Вам представили фрагмент літопису: "а се я, холопъ твой". Які соціальні відносини тут описані? Що означає
    "холоп" у цьому контексті — раб, слуга, васал?'
  - 'Лінгвістична загадка: Сучасне українське слово "смердіти" і давньосхіднослов''янський соціальний термін "смердъ". Чи
    є між ними зв''язок?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Статус "смерда". Вільний селянин-общинник (позиція Грекова) чи категорія залежного населення (позиція Зиміна)?
    Аналіз різних списків "Руської Правди". [!epistemic-humility]'
  - 'Дебат 2: "Холопи" vs "челядь". Це синоніми рабства чи різні категорії? "Челядь" як військовополонені, "холопи" як боргові
    раби — одна з гіпотез. [!decolonization]'
  - '[!decolonization] Відмова від терміну "давньоруський" на користь "давньосхіднослов''янський" та "руський". Пояснення,
    чому "давньоруський" є імперським наративом, що привласнює спільну спадщину.'
  - 'Лінгвістичний вимір конфлікту: чи можна на основі етимології слів робити висновки про соціальний статус? (приклад зі
    "смердом").'
  section: 'Конфліктна карта: Хто є хто у Руській Правді?'
  words: 800
- points:
  - 'Первинний текст: Статті з Просторовоï редакції "Руської Правди", що встановлюють розмір "віри" (штрафу) за вбивство представників
    різних соціальних груп.'
  - 'Послівний глос: "Аже оубиють княжа моужа... аще буде гридинъ... любо смердъ... любо холопъ..."'
  - 'Граматичний розбір: аналіз форм давального та знахідного відмінків у юридичних формулах. Як граматика відтворює ієрархію.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо юридичної термінології.
  - 'Контекст: Чому життя "княжого мужа" коштувало 80 гривень, а життя "смерда" чи "холопа" — лише 5?'
  section: 'Текст: Читання та переклад "Руської Правди"'
  words: 1700
- points:
  - 'Граматична лабораторія: Відмінювання соціальних термінів ("князь", "гридинъ", "смердъ", "холопъ") за зразками з "Руської
    Правди". Аналіз відмінкових закінчень.'
  - 'Етимологічний слід: Простежуємо шлях слів. "Гридинъ" → "гридниця" (скандинавське походження?). "Князь" (праслов''янське
    *kъnędzь, запозичення з германських).'
  - '[!myth-buster] Міф про безкласове суспільство ранніх слов''ян. Мова юридичних документів свідчить про складну і жорстку
    соціальну стратифікацію задовго до появи феодалізму в його класичному вигляді.'
  - 'Вправа на реконструкцію: Відновіть повну парадигму відмінювання слова "смердъ" в однині та множині, спираючись на текст.'
  section: 'Мовна лабораторія: Граматика соціальної нерівності'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер, знаючи контекст "Руської Правди", як би ви переклали фразу "а се я, холопъ твой"? Які
    відтінки значення ви можете назвати?'
  - 'Лінгвістичний підсумок: Які граматичні та лексичні інструменти використовувала давньосхіднослов''янська мова для позначення
    соціального статусу?'
  - 'Історичний зв''язок: Які з цих соціальних термінів зникли ("гридинъ"), які змінили значення ("смерд(іти)"), а які збереглися
    в сучасній мові ("князь")? Про що це свідчить?'
  - 'Вихід на наступний модуль: Знання соціальної структури є ключем до розуміння наступної теми — договору Олега з Візантією
    911 року.'
  section: Дискусія та підсумок
  words: 600
