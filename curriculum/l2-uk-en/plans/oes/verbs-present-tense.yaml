- Реконструювати парадигму дієвідмінювання на основі первинних джерел
- Розрізняти церковнослов'янські та народно-розмовні риси в мові XI-XII століть
- Аргументовано брати участь у дискусії щодо датування та лінгвістичної класифікації епіграфічних пам'яток
