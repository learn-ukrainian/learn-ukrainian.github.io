content_outline:
- points:
  - 'Провокативне питання: Що може розповісти напис на стіні собору XI століття про повсякденну мову наших предків?'
  - Представлено одне слово з графіті, наприклад, "ходитъ" — студент має вгадати, що воно означає і чим відрізняється від
    сучасного "ходить"
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Датування): Чи є графіті в Софії Київській автентичним свідченням мови XI ст., чи це пізніші нашарування? Позиції
    палеографів (Висотський vs. Корнієнко)'
  - 'Дебат 2 (Класифікація): Закінчення дієслів у графіті — це церковнослов''янський стандарт чи жива народна мова? Аналіз
    форм "єси", "єсмь" та ін.'
  - '[!decolonization] Термінологічний виклик: Чому "давньосхіднослов''янська мова", а не "давньоруська"? Розвінчання міфу
    про ексклюзивну спадщину Росії.'
  - '[!epistemic-humility] Багато графіті пошкоджено. Реконструкція форм — це часто наукова гіпотеза, а не доконаний факт.'
  section: 'Конфліктна карта: Мова стін — чия вона?'
  words: 800
- points:
  - 'Первинні джерела: добірка автентичних графіті XI-XII ст. зі стін Софії Київської, що містять дієслова теперішнього часу.'
  - 'Оригінальний текст (устав): "а се осподи помози рабоу своємоу..." з детальною транслітерацією.'
  - 'Послівний глос: "а" (and/but), "се" (this), "осподи" (O Lord), "помози" (help!), "рабоу" (servant dat.sg.), "своємоу"
    (your dat.sg.).'
  - 'Граматичний парсинг: аналіз форм дієслів, наприклад, "пише" (3 os. sg. pres.), "молять" (3 os. pl. pres.).'
  - Паралельний переклад сучасною українською мовою та коментар щодо розбіжностей.
  - '[!decolonization] Акцент на київському походженні текстів як доказі глибокого коріння української мовної традиції.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Реконструкція парадигми дієвідмінювання теперішнього часу на основі матеріалу графіті.'
  - Аналіз п'яти класів дієслів у давньосхіднослов'янській мові та їх відображення в написах.
  - Порівняння закінчень 1-ї, 2-ї, 3-ї особи однини та множини (e.g., -у/-ю, -ши, -ть vs -емо, -ете, -уть/-ють).
  - Вправи на розпізнавання та класифікацію дієслівних форм із корпусу графіті.
  - '[!myth-buster] Розвінчання міфу про "простоту" давніх мов. Система дієвідмінювання була складнішою, ніж у сучасній українській.'
  - 'Етимологічний слід: як форма "єси" (ти є) еволюціонувала і зникла в сучасній мові.'
  section: 'Мовна лабораторія: Парадигма теперішнього часу'
  words: 1700
- points:
  - 'Повернення до розминки: повний граматичний аналіз фрази "ходитъ" та пояснення її історичного контексту.'
  - 'Лінгвістичний висновок: що графіті Софії Київської говорять нам про стан дієслівної системи в XI-XII століттях?'
  - 'Зв''язок із сучасністю: які закінчення теперішнього часу збереглися в українській мові, які зникли, а які змінилися?'
  - Що втратила, а що здобула українська мова, відкинувши форми на кшталт "єсмь" та "єси"?
  section: Дискусія та підсумок
  words: 600
focus: Analysis of present tense verb forms in 11th-12th century graffiti from Kyiv's St. Sophia Cathedral
level: OES
