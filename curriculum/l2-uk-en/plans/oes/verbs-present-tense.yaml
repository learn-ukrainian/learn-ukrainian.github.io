activity_hints:
- description: Визначте, яка наукова школа (палеографічна чи лінгвістична) могла б висловити певну тезу щодо графіті.
  focus: Розуміння філологічних дебатів
  items: 6
  type: quiz
- description: Вставте правильне давньосхіднослов'янське закінчення дієслова в реченнях, взятих з модуля.
  focus: Дієслівні закінчення
  items: 8
  type: fill-in
- description: Проаналізуйте подане зображення графіті. Опишіть тип письма, спробуйте транслітерувати напис та визначити граматичні
    форми дієслів.
  focus: 'Джерельний аналіз: графіті'
  type: note
- description: Напишіть есе на тему "Що графіті XI-XII століть можуть розповісти історику мови, чого не можуть розповісти
    офіційні літописи?" (400-600 слів).
  focus: 'Есе: Мова стін як історичне джерело'
  type: note
