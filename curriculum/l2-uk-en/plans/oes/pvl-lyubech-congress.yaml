activity_hints:
- description: Чия це теза — Шахматова чи Пріселкова? Який наратив просуває термін «Давньоруська держава»? Перевірка розуміння
    ключових дебатів.
  focus: 'Розуміння конфліктної карти: ПВЛ як джерело'
  items: 5
  type: quiz
- description: Вставте правильну форму дієслова (да держить, имемься, съблюдѣмь) у речення з тексту ПВЛ.
  focus: Форми повелительного способу
  items: 5
  type: fill-in
- description: Подано уривок з ПВЛ та його сучасний переклад. Знайдіть 3-4 приклади слів або конструкцій, що кардинально змінили
    своє значення або форму. Поясніть ці зміни.
  focus: 'Джерельний аналіз: OES vs Сучасна українська'
  type: note
- description: Спираючись на текст модуля, проаналізуйте, що означав термін «Русьска земля» для автора ПВЛ. Це була конкретна
    територія, політичний союз чи етнічна спільнота? (400-600 слів).
  focus: 'Есе: "Русьска земля" — географія чи ідея?'
  type: note
cefr_min: C2
connects_to:
