content_outline:
- points:
  - 'Провокація: «Кождо да держить отчину свою». Розшифруйте це речення з 1097 року. Що означає «да держить»? Чому «кождо»,
    а не «кожний»?'
  - Це заклик до єдності чи легалізація роздробленості? Спробуйте визначити політичний сенс, не знаючи контексту.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: ПВЛ — це об''єктивна хроніка чи політичний маніфест? Суперечка між Шахматовим (ПВЛ як компіляція) та Пріселковим
    (ПВЛ як цілеспрямований ідеологічний твір).'
  - 'Дебат 2: Мова запису з''їзду — це автентична розмовна мова князів чи книжна, церковнослов''янська стилізація? Аргументи
    за і проти «достовірності» діалогів у ПВЛ.'
  - '[!decolonization] Термін «Давньоруська держава» vs. «Руська земля» (як у тексті ПВЛ). Чому російська історіографія наполягає
    на першому, і як це пов''язано з привласненням спадщини Києва?'
  - '[!epistemic-humility] Ми не маємо оригінального рукопису ПВЛ. Найдавніші списки (Лаврентіївський, Іпатіївський) — це
    копії, зроблені через 200-300 років. Наскільки можна довіряти точності передачі тексту?'
  section: 'Конфліктна карта: Хроніка чи Політика?'
  words: 800
- points:
  - Повний уривок з Повісті временних літ про Любецький з'їзд 1097 року (за Іпатіївським списком).
  - 'Міжрядковий переклад: оригінальний текст OES поряд із сучасним українським перекладом для детального порівняння лексики
    та синтаксису.'
  - 'Граматичний розбір ключових фраз: «Почто губимъ Русьску землю, сами на ся котору дѣюще?» та «Да отьселѣ оуже имемься
    въ едино сердце и съблюдѣмь Русьску землю».'
  - 'Лексичний аналіз: значення слів «отчина», «волость», «котора» (сварка), «послушати» (в значенні підкорятися).'
  - '[!decolonization] Аналіз терміну «Русьска земля». Показати, що в тексті він стосується виключно території Середнього
    Подніпров''я (Київ, Чернігів, Переяслав), а не всієї Східної Європи.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Повелительний спосіб (hortative/imperative) у давньосхіднослов''янській мові — аналіз на матеріалі
    тексту з''їзду.'
  - 'Розбір форм: «да держить», «имемься» (давай візьмемося), «съблюдѣмь». Як виражається заклик до дії для 1-ї, 2-ї та 3-ї
    особи?'
  - Конструкція «да + презенс» як стандартна модель для вираження наказу або заклику до 3-ї особи. Порівняння з сучасними
    українськими формами «нехай/хай тримає».
  - 'Етимологічний слід: як форма «имемься» (візьмемося) пов''язана з сучасним зворотним дієсловом на -ся?'
  - '[!myth-buster] Це не просто «стара версія» наказового способу. Розбір аориста («рѣша») та імперфекта у тексті для контрасту
    — як OES передавала різні типи минулих дій.'
  section: 'Мовна лабораторія: Повелительний спосіб (Hortative)'
  words: 1700
- points:
  - 'Повернення до розминки: «Кождо да держить отчину свою». Перекладіть цю фразу максимально точно, враховуючи знання про
    повелительний спосіб. Які нові нюанси ви тепер бачите?'
  - 'Лінгвістичний висновок: Яку роль відігравав повелительний спосіб у мові дипломатії та права Русі? Наведіть приклади з
    тексту.'
  - 'Історичний висновок: Чи спрацювало рішення з''їзду? (Спойлер: ні, одразу після нього — осліплення Василька). Що це говорить
    про ефективність «права» проти «сили» в ту епоху?'
  - 'Зв''язок із сучасністю: поняття «отчина» (батьківщина) — як воно еволюціонувало в українській політичній думці від спадкового
    володіння до національної держави?'
  section: Дискусія та підсумок
  words: 600
focus: The Lyubech Congress (1097) in the PVL; hortative mood (повелительний спосіб); the concept of 'otchina' (отчина); early
  statecraft vs. feudal fragmentation
level: OES
module: oes-036
objectives:
- Аналізувати уривок з Повісті временних літ в оригіналі, розрізняючи давньосхіднослов'янські та церковнослов'янські риси
- Ідентифікувати та пояснювати форми повелительного способу (hortative mood) у тексті, порівнюючи їх із сучасними українськими
  відповідниками
- Критично оцінювати ПВЛ як історичне джерело, розрізняючи філологічні та ідеологічні дебати навколо тексту
- Деконструювати імперські наративи щодо терміну «Русь», спираючись на вживання «Русьска земля» в першоджерелі
