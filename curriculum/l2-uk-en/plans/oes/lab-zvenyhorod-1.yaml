content_outline:
- points:
  - 'Провокація: «ѿ Говѣновꙑ къ Нєжѣнѣ». Хто ці люди? Який статус жінки, що пише листа у XII столітті? Розшифруйте цей фрагмент,
    використовуючи лише знання сучасної української.'
  - 'Історичний контекст: Звенигородська берестяна грамота №1 (Зв. 1) — що ми знаємо про цей артефакт, знайдений у 1988 році?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автентичність та датування. Як палеографія та стратиграфія доводять, що це не підробка? Аргументи та контраргументи
    в науковій дискусії.'
  - 'Дебат 2: Це «прото-українська» чи «спільносхіднослов''янська» мова? Аналіз мовних рис грамоти на предмет їх відповідності
    рисам, що пізніше сформували українську мову.'
  - '[!decolonization] Виклик терміну «давньоруська мова». Грамота зі Звенигорода (Галицького) — це першоджерело для історії
    української мови, а не «загальноруської». Використовуємо «давньосхіднослов''янська».'
  - '[!epistemic-humility] Висновки на основі одного короткого листа є гіпотетичними. Філологія — це наука про інтерпретацію
    неповних даних.'
  section: 'Конфліктна карта: Справжність та мовний паспорт грамоти'
  words: 800
- points:
  - 'Оригінальний текст грамоти: «+ ѿ говѣновꙑ ко нєжѣнѣ даи ٦٠ коуно лоукоуно + а ко нєvомово даи ٦٠ коуно а во томо коупи
    ми сорокоу соболокоуо а матєри коупи сорокоу»'
  - 'Дослівний переклад та глосування: розбір кожного слова. «ѿ» (від), «Говѣновꙑ» (Говіни, родовий відмінок), «къ» (до),
    «Нєжѣнѣ» (Нежани, давальний відмінок), «даи» (дай), «коуно» (кун, грошова одиниця).'
  - 'Граматичний парсинг: Родовий та давальний відмінки жіночих імен, наказовий спосіб дієслова «дати», числівник «٦٠» (60),
    відсутність повноголосся в «Говѣновꙑ» (але не «сорокоу»).'
  - 'Паралельний переклад сучасною українською: «Від Говіни до Нежани. Дай 60 кун Луці. А до Невовола (?) дай 60 кун. А за
    ті (гроші) купи мені сорок соболів, а матері купи сорочку».'
  - '[!decolonization] Мова грамоти — жива, побутова, народна (vernacular), на відміну від книжної церковнослов''янської.
    Це мова, якою говорили предки українців.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Фонологічний аналіз: Відсутність «цокання» (Нєжѣнѣ, а не *Нежене*). Закінчення «-ови» у родовому відмінку (Говѣновꙑ)
    як архаїчна риса, що відрізняється від північних діалектів.'
  - 'Морфологічний аналіз: Форми іменників та дієслів. Як конструкція «даи ... коуно» відображає синтаксис керування, що зберігся
    в українській?'
  - 'Лексичний аналіз: «Сорока соболокоуо» (сорок соболів) та «сорокоу» (сорочку) — омонімія чи помилка писаря? Розбір гіпотез.'
  - '[!myth-buster] Ця грамота, знайдена на території майбутнього Галицько-Волинського князівства, є речовим доказом того,
    що вже в XII ст. діалекти на території сучасної України розвивалися в іншому напрямку, ніж діалекти на півночі (Новгород,
    Псков).'
  section: 'Мовна лабораторія: Південно-західні риси в мові XII ст.'
  words: 1700
- points:
  - 'Повернення до розминки: Що ми тепер можемо сказати про Говіну та Нежану? Яким було їхнє життя, судячи з цього короткого
    ділового листа?'
  - 'Лінгвістичний висновок: Які 3-4 ключові риси давньосхіднослов''янської мови південно-західного ареалу демонструє ця грамота?'
  - 'Історичне значення: Як один клаптик берести з Галичини допомагає спростовувати імперські міфи про «спільну колиску» та
    «єдиний давньоруський народ»?'
  section: Дискусія та підсумок
  words: 600
focus: Лінгвістичний аналіз Звенигородської берестяної грамоти №1 (лист від Говінови до Нежани), її філологічний контекст
  та її значення як доказу існування окремого південно-західного діалекту давньосхіднослов'янської мови.
level: OES
module: oes-017
objectives:
- Аналізувати автентичний побутовий текст XII століття, написаний на бересті
- Розрізняти ключові фонологічні та морфологічні риси південно-західного діалекту давньосхіднослов'янської мови на прикладі
  конкретного першоджерела
- Критично оцінювати філологічні та історичні дебати щодо датування, автентичності та лінгвістичної класифікації давніх текстів
- Спростовувати імперський наратив про «єдину давньоруську мову» на основі доказів із першоджерел
