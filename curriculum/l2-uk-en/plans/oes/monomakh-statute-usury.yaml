objectives:
- Аналізувати оригінальний текст Статуту Мономаха, розпізнаючи ключову фінансово-юридичну лексику
- Розрізняти та аргументувати різні історіографічні та лінгвістичні інтерпретації мети та походження Статуту
- Простежувати етимологію та семантичну еволюцію давньосхіднослов'янських фінансових термінів
- Критично оцінювати соціальну роль права в Київській Русі на прикладі регулювання лихварства
