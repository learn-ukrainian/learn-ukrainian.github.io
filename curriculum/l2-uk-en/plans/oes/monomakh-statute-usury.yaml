content_outline:
- points:
  - 'Провокаційне питання: «Береш чужі, а віддаєш свої». Як у Русі XII століття регулювали борги, щоб уникнути соціального
    вибуху?'
  - 'Фрагмент Статуту: "аже закупъ бѣжить отъ господы, то обельнъ рабъ". Студент має припустити, що це означає для боржника.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Статут про лихварство — це прогресивна соціальна реформа, що обмежила хижацькі відсотки після повстання 1113
    року, чи спосіб Мономаха та верхівки взяти фінансову систему під жорсткіший контроль?'
  - 'Дебат 2: Мова закону — це жива розмовна мова фінансових відносин чи калька з візантійського права? Дискусія про рівень
    автохтонності юридичної термінології (різ, іст, куна).'
  - '[!epistemic-humility] Джерела не дають однозначної відповіді про реальний економічний ефект закону. Ми аналізуємо намір,
    а не доведені наслідки.'
  - '[!decolonization] Російська історіографія традиційно представляє Мономаха як "збирача земель руських". Ми ж дивимося
    на нього як на правителя, що вирішує конкретну соціально-економічну кризу в Києві.'
  section: 'Конфліктна карта: Реформа чи контроль?'
  words: 800
- points:
  - Оригінальний текст Статуту Володимира Мономаха про різи (проценти) з розширеної редакції Руської Правди.
  - 'Пофразовий розбір: "Аже кто емлеть по 10 кунъ от гривны на годъ, то того не отставити". Аналіз синтаксису та лексики.'
  - 'Граматичний коментар: розбір форм аориста та імперфекта в юридичному тексті, функції умовних конструкцій з "аже".'
  - Паралельний переклад сучасною українською мовою з коментарями щодо лексичних втрат та змін (різ → процент, закуп → боржник).
  - '[!decolonization] Наголос на термінах, що є унікальними для східнослов''янського правового поля і не мають прямих аналогів
    у візантійському.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз юридичних формул. Як структура речення "аже... то..." створює норму закону? Розбір безособових
    конструкцій ("достоїть", "не є льзѣ").'
  - 'Етимологічний слід: Простежуємо еволюцію ключових фінансових термінів: різати → різ (процент), куна (грошова одиниця
    від хутра куниці), боргъ, лихва.'
  - 'Фонологічна лабораторія: Явище повноголосся / неповноголосся в юридичній лексиці (градъ/городъ, глава/голова) — що переважає
    в Статуті і чому?'
  - '[!myth-buster] Розвінчуємо міф про "простий" фінансовий світ Русі. Статут показує складну систему кредитування, банкрутства
    та стягнення боргів.'
  section: 'Мовна лабораторія: Анатомія боргу'
  words: 1700
- points:
  - 'Повернення до розминки: що насправді означало "обѣльнъ рабъ" і чи був Статут вироком для закупів?'
  - 'Лінгвістичний висновок: Що лексика боргу та кредиту говорить нам про економіку та суспільство Київської Русі XII століття?'
  - 'Зв''язок із сучасністю: Які давньосхіднослов''янські правові та фінансові поняття досі живуть в українській мові та юридичній
    думці?'
  section: Дискусія та підсумок
  words: 600
