content_outline:
- points:
  - 'Провокація: Прочитайте цей уривок про початок битви: "Чрьна земля подъ копыты костьми была посѣяна, а кровію польяна:
    тугою взыдоша по Рускои земли". Якими дієслівними формами передано дію? Що вони повідомляють про характер бою — це моментальний
    знімок чи панорама подій?'
  - Спробуйте розшифрувати OES фразу "сѣдѣ на конь свои борзыи". Як це пов'язано з сучасним "сісти на коня"?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Слово" автентичним текстом XII століття, чи це геніальна підробка XVIII століття? Позиції Олександра Зіміна
    (скептик) проти Дмитра Лихачова та Романа Якобсона (захисники).'
  - 'Дебат 2: Мова "Слова" — це жива давньосхіднослов''янська мова чи суміш церковнослов''янізмів, тюркізмів та пізніших спотворень?
    Лінгвістична суперечка про нашарування в тексті.'
  - '[!epistemic-humility] Аргументи обох сторін у дебаті про автентичність є непрямими. Оригінальний рукопис втрачено, що
    унеможливлює остаточну палеографічну експертизу.'
  - '[!decolonization] Наратив про "Слово" як виключно "давньоруський" (древнерусский) текст ігнорує його спільну спадщину
    для української, білоруської та російської культур. Це пам''ятка давньоСХІДНОслов''янської літератури.'
  section: 'Конфліктна карта: Автентичність "Слова"'
  words: 800
- points:
  - Читання уривку "Слова" про першу битву (від "Игорь къ Дону полкы ведетъ" до "ту ся пригоди дѣяше").
  - 'Порядковий глосарій та граматичний розбір: аналіз ключових форм дієслів (аорист, імперфект, перфект) та іменників.'
  - Паралельний переклад на сучасну українську мову з коментарями щодо втрачених значень та граматичних конструкцій.
  - '[!decolonization] Розбір тюркізмів у тексті ("яруга", "булатъ") як доказ культурного контакту, а не "засмічення" мови,
    як це подавала імперська критика.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аорист (простий минулий) для вираження раптових, послідовних, завершених дій ("гримну", "вступи",
    "потягьну"). Створення ефекту "кінематографічного монтажу".'
  - 'Граматична лабораторія: Імперфект (тривалий минулий) для опису фонових, незавершених, повторюваних дій ("свистаху", "стояше",
    "трепеташе"). Створення ефекту "панорами" або "уповільненої зйомки".'
  - 'Практичний аналіз: Студент знаходить у тексті битви 5 прикладів аориста і 5 імперфекта, пояснюючи, який поетичний ефект
    створює кожен із них.'
  - '[!myth-buster] Аорист та імперфект — це не просто "архаїчні минулі часи". Це потужна семантична опозиція, яку автор "Слова"
    використовував для керування темпом та емоціями наративу, що була втрачена в сучасній мові.'
  section: 'Мовна лабораторія: Поетика аориста та імперфекта'
  words: 1700
- points:
  - 'Повернення до розминки: аналіз дієслів "посѣяна", "польяна", "взыдоша" з повним розумінням їх граматичної природи та
    семантичної ролі.'
  - 'Лінгвістичний висновок: Як використання аориста та імперфекта створює динамічний та візуально насичений опис битви? Яка
    роль цих часів у героїчному епосі?'
  - 'Зв''язок з сучасною українською: Як функцію аориста/імперфекта перебрала на себе опозиція доконаного/недоконаного виду?
    Наведіть приклади, як би сцена битви звучала з сучасними дієсловами (напр., "сіяв" vs "посіяв").'
  section: Дискусія та підсумок
  words: 600
