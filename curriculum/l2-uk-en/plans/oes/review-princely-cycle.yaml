activity_hints:
- description: Перевірка розуміння позицій щодо авторства літописів та лінгвістичної класифікації текстів княжого циклу.
  focus: Розуміння філологічних дебатів
  items: 5
  type: quiz
- description: Заповніть пропуски у фрагментах літопису правильними формами слів "князь", "престол", "дружина", "уділ".
  focus: Династична лексика в контексті
  items: 6
  type: fill-in
- description: Порівняйте опис однієї й тієї ж династичної події (наприклад, вокняжіння) у двох різних літописних ізводах.
    Які лексичні та граматичні відмінності ви помітили і як вони впливають на інтерпретацію?
  focus: Порівняльний аналіз першоджерел
  type: note
- description: 'Напишіть есе (400-600 слів) на тему: "Як лінгвістичні особливості (вибір лексики, граматичних форм) у літописі
    формують образ князя та легітимізують його владу?"'
  focus: 'Есе: Мова як інструмент влади'
  type: note
cefr_min: C2
connects_to:
- law-intro
- fall-of-kyiv
content_outline:
- points:
  - 'Провокація: Що насправді означає фраза «сѣде Кыевѣ на столѣ отца своего»? Розбираємо юридичну та лінгвістичну формулу
    престолонаслідування.'
  - 'Від сучасного до давнього: українське слово "спадщина". Який його давньосхіднослов''янський предок і що він означав?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є «Повість временних літ» єдиним текстом? Дискусія про різні редакції та вплив Нестора, Сильвестра та інших
    на опис династичних подій. [!epistemic-humility]'
  - 'Дебат 2: Мова князів — протоукраїнська чи церковнослов''янська? Аналіз термінів влади (князь, престол, дружина) на предмет
    їхнього походження та стилістичного забарвлення. [!decolonization]'
  section: 'Конфліктна карта: Дебати про княжу владу в літописах'
  words: 800
- points:
  - 'Першоджерело: Фрагмент літопису про князівські усобиці — текст, пофразовий глос, граматичний розбір ключових форм (аорист,
    двоїна).'
  - 'Аналіз династичної лексики в контексті: "волость", "уділ", "віче", "посадник". Розмежування юридичних та побутових значень.'
  - '[!decolonization] Розвінчання міфу про «єдину давньоруську народність» через мовні маркери регіональних відмінностей
    у літописах, що описують князів.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: відмінювання іменників-термінів влади ("князь", "боярин") у давньосхіднослов''янській. Порівняння
    з сучасними залишками.'
  - 'Етимологічний слід: як слово "дружина" еволюціонувало від "озброєний загін, що є опорою князя" до "жінка"?'
  - '[!myth-buster] "Золотий стіл" у Києві: аналіз епітетів та метафор, що описують владу, та їхня стійкість у мові.'
  section: 'Мовна лабораторія: Еволюція династичної термінології'
  words: 1700
- points:
  - 'Повернення до розминки: повний лінгвістичний аналіз фрази «сѣде на столѣ отца своего».'
  - 'Лінгвістичний підсумок: які риси давньосхіднослов''янської мови, що описує владу, збереглися в сучасній українській,
    а які зникли?'
  - 'Зв''язок з наступним модулем ("law-intro"): як мова влади стає мовою закону.'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз та консолідація династичної термінології в давньосхіднослов'янських текстах
level: OES
module: oes-048
objectives:
- Аналізувати уривки з давньосхіднослов'янських літописів, розпізнаючи ключову династичну термінологію.
- Пояснювати основні філологічні та історичні дебати, що стосуються текстів княжого циклу.
- Простежувати етимологічну та граматичну еволюцію слів, пов'язаних із владою, від давньосхіднослов'янської до сучасної української
  мови.
- Застосовувати знання про граматику (аорист, двоїна) та лексику давньосхіднослов'янської мови для перекладу та аналізу першоджерел.
