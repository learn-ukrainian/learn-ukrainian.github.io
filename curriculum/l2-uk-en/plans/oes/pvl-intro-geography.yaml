content_outline:
- points:
  - 'Провокація: «Поля́не бо сво́ихъ отéць óбычаи и́мѧху, ти́хъ и кро́токъ...». Що означає це речення з літопису? Яку дію
    описує дієслово «и́мѧху» — одноразову чи тривалу?'
  - 'Вгадай слово: Яке сучасне українське слово походить від давньосхіднослов''янського «племѧ»?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Авторство та джерела): "Несторівське питання". Чи був Нестор єдиним автором, чи ПВЛ — це компіляція (звод) кількох
    попередніх літописів? Теорія Олексія Шахматова vs її критики.'
  - 'Дебат 2 (Жанр та мета): Географічний вступ — це об''єктивний етнографічний опис чи політичний маніфест? Як автор конструює
    "свій" простір Русі та протиставляє "цивілізованих" полян "диким" сусідам?'
  - '[!epistemic-humility] Точне авторство та дата створення ПВЛ досі є предметом гострих наукових дискусій, а не встановленим
    фактом.'
  - '[!decolonization] ПВЛ — це не "давньоруська", а давньосхіднослов''янська пам''ятка, спільна спадщина українців, білорусів
    та росіян. Спроби монополізувати її — інструмент імперської ідеології.'
  section: 'Конфліктна карта: Хто, коли і навіщо написав "Повість временних літ"?'
  words: 800
- points:
  - 'Оригінальний текст: Фрагмент із вступу до ПВЛ про розселення слов''ян та опис звичаїв полян, деревлян, сіверян.'
  - 'Пофразовий глосинг: «Деревлѧне же живѧ́ху звѣрьскымъ óбразомъ...» → Деревляни ж жили звірячим способом...'
  - 'Граматичний парсинг: аналіз форм дієслів (імперфект `живѧ́ху`), іменників (інструменталіс `óбразомъ`), застарілої лексики.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо розбіжностей.
  - 'Лінгвістичні нотатки: Виявлення церковнослов''янізмів (у лексиці) та східнослов''янських рис (повноголосся у слові «Деревлѧне»).'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Як утворювався імперфект у давньосхіднослов''янській мові? Його семантика: тривала, повторювана,
    звичаєва дія в минулому.'
  - 'Контрастивний аналіз: Імперфект vs. аорист. Чому звичаї племен описуються імперфектом (`имѧху`, `живѧху`), а історичні
    події — аористом?'
  - 'Вправи на ідентифікацію: Студенти знаходять та аналізують усі форми імперфекта у наданому уривку з ПВЛ.'
  - '[!myth-buster] Давньосхіднослов''янська мова мала значно складнішу систему минулих часів, ніж сучасна українська. Це
    не ознака "примітивності", а інша граматична логіка.'
  - 'Етимологічний слід: Куди зник імперфект? Простежуємо шлях від давніх синтетичних форм до сучасної аналітичної системи
    минулого часу в українській мові.'
  section: 'Мовна лабораторія: Імперфект для опису звичаїв'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер ви можете точно пояснити, чому літописець вжив форму «и́мѧху», описуючи звичаї полян. Який
    сенс вона передає?'
  - 'Лінгвістичний висновок: Як вибір граматичного часу (імперфект) стає інструментом для створення характеристики персонажів/груп
    у літописі?'
  - 'Зв''язок із сучасністю: Втрата імперфекта та аориста — це збіднення мови чи її раціоналізація? Обговорення еволюції граматичних
    систем.'
  section: Дискусія та підсумок
  words: 600
focus: The geographical and tribal introduction to the Primary Chronicle (PVL), philological debates on its sources, and linguistic
  analysis of the imperfect tense used to describe customs.
level: OES
module: oes-025
objectives:
- Аналізувати початковий етап літописання, спираючись на текст вступу до «Повісті временних літ»
- Розрізняти та пояснювати вживання імперфекта та аориста в давньосхіднослов'янському тексті для опису звичаїв та подій
- Критично оцінювати ключові філологічні дебати щодо авторства, джерел та мети створення ПВЛ
- Пояснювати, як літописець конструює географічний та етнічний простір Русі, використовуючи мовні засоби
