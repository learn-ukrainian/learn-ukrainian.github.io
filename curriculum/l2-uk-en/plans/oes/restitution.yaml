content_outline:
- points:
  - 'Провокація: Якщо раб убив вільну людину, хто має платити "виру" (штраф за вбивство)? Сам раб чи його господар? Проаналізуйте
    цей фрагмент з Руської Правди.'
  - 'Лінгвістична загадка: Чому в одному реченні "має платити", а в іншому "подобає платити"? У чому різниця?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Коротка, Широка та Скорочена редакції — це еволюція одного тексту чи три різні, хоч і пов''язані, правові кодекси,
    що відображають різні епохи та регіони? [!epistemic-humility]'
  - 'Дебат 2: Мова Руської Правди — це жива розмовна мова Києва чи книжна церковнослов''янська, адаптована для юридичних потреб?
    [!decolonization] Виклик імперській тезі про "древнерусский" юридичний язик.'
  - 'Позиція вчених: Як дослідники (напр., Тихомиров, Толочко) класифікують мовні шари тексту: церковнослов''янізми, місцеві
    діалектизми, юридичні архаїзми?'
  section: 'Конфліктна карта: Списки Руської Правди'
  words: 800
- points:
  - 'Текст: Статті про відшкодування (вира, головництво) з Широкої редакції Руської Правди — оригінал давньосхіднослов''янською.'
  - 'Лексичний розбір: Аналіз термінів "вира", "головництво", "урок", "продажа" — їх точне значення в контексті.'
  - 'Граматичний коментар: Парсинг дієслів обов''язку (`мати`, `подобати`, `быти + инфинитив`) у різних конструкціях.'
  - 'Паралельний переклад: Порівняння оригінального тексту з сучасним українським юридичним перекладом для виявлення семантичних
    зсувів.'
  - '[!decolonization] Аналіз розрізнення між "русином" та "гридь" у тексті як доказ складної соціальної структури, а не монолітного
    "древнерусского народа".'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз модальних конструкцій. Порівняння семантики "Аще убьють ... то платити виру" (умовна конструкція)
    та "Аще кто ... то есть платити ему" (конструкція з дієсловом `быти`).'
  - 'Етимологічний слід: Простежити еволюцію слова "вира" від давньосхіднослов''янської до його зникнення чи трансформації
    в пізніших правових системах.'
  - '[!myth-buster] Міф про те, що давньосхіднослов''янська мова мала примітивну систему модальності. Аналіз показує складну
    систему вираження обов''язку, дозволу та можливості.'
  - 'Практикум: Переклад сучасних юридичних фраз ("обвинувачений зобов''язаний з''явитися до суду") на давньосхіднослов''янську,
    використовуючи моделі з Руської Правди.'
  section: 'Мовна лабораторія: Дієслова обов''язку'
  words: 1700
- points:
  - 'Повернення до розминки: Студент формулює повну відповідь на питання про відповідальність за вбивство, вчинене рабом,
    аргументуючи свою позицію цитатами та граматичним аналізом.'
  - 'Лінгвістичний висновок: Як вживання різних дієслів обов''язку відображало правосвідомість та соціальну ієрархію Київської
    Русі?'
  - 'Зв''язок із сучасністю: Чи збереглися в сучасній українській мові (особливо в юридичній) сліди модальних конструкцій
    з Руської Правди?'
  section: Дискусія та підсумок
  words: 600
focus: Дієслова обов'язку (мати, подобати, быти) в юридичному контексті відшкодування, аналізовані через статті Руської Правди
level: OES
module: oes-056
objectives:
- Аналізувати статті Руської Правди, що стосуються відшкодування, з філологічної та юридичної перспективи
- Розрізняти відтінки значення давньосхіднослов'янських дієслів обов'язку (мати, подобати, быти) в юридичному контексті
- Ідентифікувати та пояснювати ключові лінгвістичні риси юридичного тексту давньосхіднослов''янською мовою
- Формулювати аргументовану позицію щодо філологічних дебатів навколо редакцій та мови Руської Правди
