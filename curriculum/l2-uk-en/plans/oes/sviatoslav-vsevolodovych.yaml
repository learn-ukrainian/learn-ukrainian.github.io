activity_hints:
- description: 'Кому належить теза: скептикам чи традиціоналістам? Визначити позицію за цитатою про автентичність "Слова".'
  focus: Розуміння філологічних дебатів
  items: 5
  type: quiz
- description: Вставити правильну форму аориста або дієприкметника в речення з тексту (напр., "Святослав ... злато слово").
  focus: Граматичні форми "Золотого слова"
  items: 6
  type: fill-in
- description: Порівняйте опис походу Ігоря у "Слові" та в Іпатіївському літописі. Що "додав" автор "Слова" і з якою метою?
    Напишіть короткий аналіз (300-400 слів).
  focus: 'Джерельний аналіз: "Слово" vs Літопис'
  type: note
- description: Проаналізуйте "Золоте слово" Святослава як політичний документ. Які ідеї він просуває? До кого апелює? Чому
    його заклик був настільки актуальним у XII ст.? (400-600 слів).
  focus: 'Есе: "Золоте слово" як політичний маніфест'
  type: note
