content_outline:
- points:
  - 'Провокація: "смутен сон" Святослава — це реальний віщий сон чи літературний прийом автора "Слова"?'
  - 'Фрагмент "Золотого слова": "...въстаръйшинъство твоє!" — спробуйте розшифрувати, до кого звертається Святослав і що він
    вимагає.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є "Слово о полку Ігоревім" автентичним текстом XII ст.? Позиції скептиків (О. Зимін) та традиціоналістів
    (Д. Лихачов).'
  - 'Дебат 2: Хто автор "Слова"? Чи міг це бути сам Святослав або хтось із його оточення? Розгляд гіпотез.'
  - '[!epistemic-humility] Більшість доказів щодо "Слова" є непрямими. Ми працюємо з філологічними реконструкціями, а не з
    абсолютними фактами.'
  - '[!decolonization] "Слово" — це пам''ятка давньосхіднослов''янської, а не "давньоруської" мови. Російська імперська наука
    намагалася монополізувати спадщину Русі.'
  section: 'Конфліктна карта: Авторство та автентичність "Слова"'
  words: 800
- points:
  - 'Оригінальний текст: повний фрагмент "Золотого слова" Святослава, від сну до заклику до князів.'
  - 'Глосування: розбір складних слів та конструкцій: "злато слово, съ слезами смѣшено", "велика яруга", "синее вино съ трудомь
    смѣшено".'
  - 'Граматичний парсинг: аналіз форм аориста ("въскрича", "изрони") та дієприкметників ("притрепетанъ", "затворенъ"), що
    є ключовими для розуміння тексту.'
  - 'Паралельний переклад: сучасний український переклад, що зберігає ритміку та образність оригіналу.'
  - '[!decolonization] Коментарі до перекладу, що показують прямий зв''язок лексики "Слова" із сучасною українською, минаючи
    російські аналоги.'
  section: 'Текст: Читання та переклад "Золотого слова"'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз складних синтаксичних конструкцій. Довгі речення Святослава, роль дієприкметникових зворотів.'
  - 'Риторична лабораторія: Ідентифікація та аналіз риторичних фігур: метафори ("золоте слово"), епітети ("залізні плъци"),
    символи (чорна пелена, сине вино).'
  - 'Етимологічний слід: Простежуємо еволюцію слів зі "Слова": "поганий" (paganus -> чужий -> поганий), "дружина" (воїнська
    -> колектив -> дружина), "жир" (багатство).'
  - '[!myth-buster] Розвінчання міфу про "простоту" давньої мови. Синтаксис "Слова" складніший за багато сучасних літературних
    текстів.'
  section: 'Мовна лабораторія: Синтаксис та риторика "Золотого слова"'
  words: 1700
- points:
  - 'Повернення до розминки: що означає сон Святослава в контексті всього "Золотого слова"?'
  - 'Лінгвістичний підсумок: які особливості мови "Слова" (аорист, двоїна, дієприкметники) доводять його архаїчність та відмінність
    від пізніших мовних станів?'
  - 'Зв''язок із сучасністю: заклик Святослава до єдності проти зовнішнього ворога — як цей мотив резонує в історії України?'
  section: Дискусія та підсумок
  words: 600
