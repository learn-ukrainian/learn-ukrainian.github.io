content_outline:
- points:
  - 'Провокація: "Житіє святого" — це біографія чи пропаганда? Чи можна використовувати його як історичне джерело?'
  - Коротка фраза з житія (2-3 рядки), що описує диво. Студент має вгадати, що це за текст і яка його мета.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Житіє як історичне джерело. Позиція "за": містить реальні імена, дати, географічні назви. Позиція "проти": мета
    житія — повчання, а не фіксація фактів, тому події ідеалізовані.'
  - 'Дебат 2: Канон vs апокриф. Як визначали, які житія "правильні", а які — "єретичні"? Боротьба за наратив у середньовічній
    церкві.'
  - '[!epistemic-humility] Багато житій дійшли до нас у пізніших списках, що ускладнює відділення оригінального тексту від
    пізніших нашарувань.'
  - '[!decolonization] Російська імперська історіографія часто використовувала житія для підтвердження концепції "Третього
    Риму", ігноруючи український контекст.'
  section: 'Конфліктна карта: Історія vs Агіографія'
  words: 800
- points:
  - Читання уривку з "Житія Феодосія Печерського", написаного Нестором Літописцем — один із перших зразків жанру.
  - Оригінальний давньосхіднослов'янський текст з паралельним сучасним українським перекладом.
  - 'Пофразовий розбір: глоси для незрозумілих слів, граматичний коментар (форми аориста, імперфекта, двоїни).'
  - 'Аналіз структури: обов''язкові елементи житія (народження від благочестивих батьків, раннє прагнення до Бога, подвиги,
    чудеса, праведна смерть).'
  - '[!decolonization] Текст написаний у Києві, є частиною саме української, а не "спільної" спадщини. Акцент на лексичних
    та синтаксичних рисах, що згодом розвинулись в українській мові.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматичний аналіз: Високий стиль vs народна мова. Порівняння мови житія з мовою "Повісті временних літ".'
  - 'Лексичний аналіз: "Формули святості" — сталі епітети та метафори (боголюбивий, світло віри, духовний подвиг). Як мова
    конструює ідеал?'
  - 'Фонологічний слід: пошук у тексті прикладів повноголосся, падіння редукованих та інших фонетичних явищ, що відрізняють
    давньосхіднослов''янську від церковнослов''янської.'
  - '[!myth-buster] Міф про "чисту" церковнослов''янську мову. Текст житія демонструє постійне змішування та взаємовплив церковнослов''янської
    основи та живих місцевих діалектів.'
  section: 'Мовна лабораторія: Граматика святості'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, "Житіє" — це біографія чи пропаганда? Студент має сформулювати власну відповідь, спираючись
    на матеріал модуля.'
  - 'Лінгвістичний підсумок: які мовні засоби роблять житіє житієм? Чим цей жанр відрізняється від літопису на рівні граматики
    та лексики?'
  - 'Зв''язок із сучасністю: чи існують сучасні "агіографічні" жанри? (Наприклад, біографії відомих людей, написані з певною
    ідеологічною метою).'
  section: Дискусія та підсумок
  words: 600
focus: 'The genre of "Life" (Житіє) in Old East Slavic literature: its structure, purpose, and linguistic features, distinguishing
  it from historical chronicles.'
level: OES
module: oes-088
objectives:
- Розрізняти літературний жанр житія та історичну хроніку (літопис) на основі їх мети та мовних особливостей.
- Аналізувати оригінальний давньосхіднослов'янський текст "Житія", ідентифікуючи ключові граматичні форми (аорист, імперфект)
  та лексичні шари.
- Критично оцінювати житіє як історичне джерело, розуміючи різницю між фактом та ідеологічною інтерпретацією.
- Формулювати аргументовану позицію щодо філологічних дебатів про канонічність та автентичність середньовічних текстів.
