- Аналізувати фрагмент з ПВЛ, розрізняючи церковнослов'янські та давньосхіднослов'янські мовні риси
- Ідентифікувати та пояснювати вживання аориста, імперфекта та дієприкметників у літописному тексті
- Формулювати аргументовану позицію в рамках ключових філологічних та історичних дебатів щодо ПВЛ
- Простежувати етимологію та семантичну еволюцію ключових понять (законъ, вѣра)
