activity_hints:
- description: Визначити, яка з тез належить до історичної, а яка до лінгвістичної дискусії щодо «вибору віри».
  focus: Розуміння філологічних дебатів
  items: 4
  type: quiz
- description: Вставити правильну форму аориста чи імперфекта (надано інфінітив) у речення з тексту модуля.
  focus: Граматичні форми в ПВЛ
  items: 5
  type: fill-in
- description: Порівняйте мову грецького філософа та, наприклад, мусульманських послів у ПВЛ. Які риторичні прийоми вони використовують?
    Які лексичні особливості ви помітили? Як це характеризує ставлення літописця до них?
  focus: Порівняльний аналіз мови послів
  type: note
- description: На основі аналізу тексту про вибір віри, напишіть коротке есе (400-600 слів) про те, як мова (вибір лексики,
    граматичних форм, риторики) використовується в літописі для легітимізації вибору Володимира та утвердження нової ідеології.
  focus: 'Есе: Мова як інструмент влади в ПВЛ'
  type: note
cefr_min: C2
connects_to:
- pvl-baptism-of-rus
- pvl-sviatoslav
content_outline:
- points:
  - 'Провокація: Фрагмент з ПВЛ: «И рече Володимиръ: "Яко придосте, отче, что учите ны?"». Що саме означає дієслово «учити»
    в цьому контексті? Це навчання чи проповідь?'
  - 'Загадка: У тексті Володимир говорить з «німцями», «греками», «жидами». Як ці слова відрізняються від сучасних екзонімів
    і що це каже про світогляд літописця?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історичність «вибору віри». Це реальна подія чи пізніша літературна конструкція, створена для легітимізації
    вибору православ''я? Позиції Шахматова vs. Толочка.'
  - 'Дебат 2: Мова ПВЛ — церковнослов’янська чи давньосхіднослов’янська? Аналіз фрагменту про вибір віри як приклад мовного
    «двовір’я» та свідомого вибору стилю.'
  - '[!decolonization] ПВЛ — це не «давньоруський» текст, а спільна спадщина. Термін «давньоруська мова» — імперський конструкт.
    Коректно — «давньосхіднослов’янська». Розмежування «руський» (належний до Русі) vs «російський» (належний до Росії).'
  - '[!epistemic-humility] Ми не маємо оригінального списку ПВЛ, лише пізніші копії (Лаврентіївський, Іпатіївський). Кожен
    переписувач міг вносити зміни, свідомі чи несвідомі.'
  section: 'Конфліктна карта: Історичний факт чи літературний топос?'
  words: 800
- points:
  - 'Оригінальний текст з ПВЛ: Промови послів — мусульманського, католицького, іудейського та грецького — до Володимира, та
    його роздуми.'
  - 'Порядковий переклад та глоси: розбір ключових фраз, наприклад, відповідь грецького філософа та аргументи проти інших
    вір.'
  - 'Граматичний розбір: ідентифікація форм аориста (рече, придоша), імперфекта, дієприкметників у реченнях.'
  - 'Лексичний коментар: аналіз семантичного поля «віра/закон», порівняння термінології, яку використовують різні посли (наприклад,
    «законъ» vs «вѣра»).'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аорист vs Імперфект. Як літописець використовує вибір дієслівного часу для побудови розповіді
    та надання їй динаміки чи описовості?'
  - 'Аналіз дієприкметників: активні та пасивні дієприкметники в тексті, їх синтаксична роль (наприклад, абсолютні конструкції)
    та переклад сучасною українською.'
  - 'Етимологічний слід: шлях слова «закон» від давньосхіднослов''янського «законъ» (віра, правило) до сучасного юридичного
    терміну. Чому віра була «законом»?'
  - '[!myth-buster] Міф про «просту» мову літописів. Аналіз синтаксису (складні речення, інверсії, риторичні питання) показує
    високий рівень книжної культури.'
  section: 'Мовна лабораторія: Аорист, імперфект і риторика влади'
  words: 1700
- points:
  - 'Повернення до розминки: що насправді означало «вибрати закон» для Володимира? Студент формулює відповідь, розрізняючи
    релігійний, юридичний та культурний аспекти.'
  - 'Лінгвістичний підсумок: яку роль відіграє мовний вибір (церковнослов’янізми vs. народна мова) у характеристиці персонажів
    та ідей літопису?'
  - 'Зв''язок із сучасністю: доля аориста та імперфекта в українській мові. Як ми виражаємо ті самі наративні функції сьогодні?
    (минулий час на -в/-ла/-ло).'
  section: Дискусія та підсумок
  words: 600
focus: 'Лінгвістичний аналіз оповіді про вибір віри Володимиром у Повісті временних літ (ПВЛ): церковнослов’янські та давньосхіднослов’янські
  риси, риторика, лексика релігії'
