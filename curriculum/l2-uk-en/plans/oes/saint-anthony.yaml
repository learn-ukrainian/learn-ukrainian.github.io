content_outline:
- points:
  - 'Провокація: Давньосхіднослов''янська фраза «ископа собѣ пещерку малу». Що вона означає? Хто, де і навіщо міг таке зробити?'
  - Сучасне слово «подвиг» — як воно пов'язане з монахом у печері?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Антоній — реальна історична постать чи збірний образ, створений за візантійськими агіографічними лекалами? [!epistemic-humility]
    Історики (Толочко) вказують на брак позалітописних джерел, тоді як церковна традиція наполягає на буквальній правдивості.'
  - 'Дебат 2: Мова «Житія Антонія» в Патерику — це церковнослов''янська чи давньосхіднослов''янська? [!decolonization] Російська
    імперська історіографія називала її «древнерусским языком». Сучасний аналіз (Залізняк, Живов) показує складну суміш церковнослов''янської
    основи та численних східнослов''янських (протоукраїнських) рис.'
  section: 'Конфліктна карта: Факт чи агіографічний канон?'
  words: 800
- points:
  - Фрагмент з Повісті Временних Літ про прихід Антонія з Афону та заснування печерного монастиря (оригінальний текст).
  - 'Слово за словом: розбір фрази «приде Афоньстѣи горѣ ископавъ пещеру ту и в неи же пребываше».'
  - 'Граматичний коментар: аналіз форм дієприслівників (ископавъ, пребываше), давального відмінка місця (Афоньстѣи горѣ).'
  - 'Паралельний переклад: порівняння оригінального тексту з сучасним українським перекладом — що втрачається, а що додається?'
  - '[!decolonization] Примітка: текст описує духовний зв''язок Києва з Афоном (Візантією), а не з північними землями. Це
    підриває московський міф про «спільну колиску».'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Відмінювання іменників на -а (пещера, молитва) та -ъ (постникъ) у тексті житія. Як виражались
    місце, знаряддя, мета?'
  - 'Етимологічний слід: Простежуємо шлях слова «подвиг» від OES «подвигъ» (зусилля, рух) через середньоукраїнське «подвиг»
    (військовий вчинок) до сучасного багатозначного терміну. [!myth-buster] Це не завжди означало героїзм.'
  - 'Фонологічна лабораторія: аналіз написання слів типу «постникъ» та «смирение» на предмет редукованих голосних (ъ, ь).
    Коли вони зникли і як це змінило мову?'
  - 'Лексичний аналіз: термінологія аскетизму — «пост», «молитва», «смирение», «терпѣние». Які з них були запозичені, а які
    — кальками з грецької?'
  section: 'Мовна лабораторія: Граматика аскетизму'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може повністю розібрати фразу «ископа собѣ пещерку малу» з граматичним та історичним
    коментарем.'
  - 'Лінгвістичний підсумок: як давньосхіднослов''янська мова адаптувалася для вираження нових, абстрактних християнських
    концепцій аскези? Які інструменти (синтаксис, словотвір) вона використовувала?'
  - 'Зв''язок із сучасністю: як поняття «смирення», «подвиг», «терпіння» функціонують у сучасній українській культурі? Чи
    змінилося їхнє значення?'
  section: Дискусія та підсумок
  words: 600
focus: Hagiography of St. Anthony in the Primary Chronicle; philological debates on authenticity; linguistic analysis of ascetic
  vocabulary (пещера, постникъ, подвигъ) in Old East Slavic.
level: OES
module: oes-090
objectives:
- Аналізувати філологічні та історичні дебати навколо житія Святого Антонія, розрізняючи агіографічний канон та історичну
  реконструкцію.
- Читати, перекладати та граматично аналізувати фрагменти з Повісті Временних Літ, що стосуються теми аскетизму.
- Простежувати етимологічну та семантичну еволюцію ключових слів від давньосхіднослов'янської до сучасної української мови.
- Формулювати аргументовану позицію щодо ролі церковнослов'янської мови та місцевих східнослов'янських елементів у мові Київської
  Русі.
