content_outline:
- points:
  - 'Провокація: «…бысть самодерьжцемь всея Руской земли». Що означав цей титул Романа Мстиславича за 300 років до того, як
    його привласнила Москва?'
  - 'Спробуйте розшифрувати фразу з літопису: «л̑ѧхы же бєжаху подъ ѡманомь, мьнѧще Романа оубита». Що тут сталося?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Текстологічний): Чи є Галицько-Волинський літопис єдиним твором, написаним одним автором при дворі Данила, чи
    це компіляція з кількох джерел, включно з окремим «літописом Романа»?'
  - 'Дебат 2 (Лінвістичний): Мова, якою описано Романа, — це висока церковнослов''янська, чи вона вже насичена місцевими,
    протоукраїнськими рисами, що видають її походження?'
  - '[!decolonization] Російська історіографія традиційно применшує значення Романового титулу «самодержця», трактуючи його
    як місцевий, на відміну від «справжнього» московського. Розглядаємо це як політичну, а не наукову інтерпретацію.'
  - '[!epistemic-humility] Точне авторство літопису невідоме. Ми можемо лише реконструювати соціальний статус та ідеологію
    автора (чи авторів) на основі самого тексту.'
  section: 'Конфліктна карта: Хто і як писав про Романа?'
  words: 800
- points:
  - 'Оригінальний текст: Фрагмент «Похвали Роману» з Галицько-Волинського літопису, де його називають «самодержцем».'
  - 'Словотвір: Розбір слова «самодержець» (самъ + дьржати) у порівнянні з грецьким «αὐτοκράτωρ». Це точний переклад чи нова
    концепція?'
  - 'Граматичний розбір: Аналіз форм аориста (бѣ, рину), імперфекта та дієприкметників (мьнѧще), що створюють динаміку оповіді.'
  - 'Паралельний переклад: Порівняння оригінального тексту з сучасним українським перекладом, звертаючи увагу на втрачені
    синтаксичні конструкції (давальний самостійний).'
  - '[!decolonization] Мова літопису називається «давньокиївською» або «давньоукраїнською», а не «давньоруською» (Old Russian),
    щоб підкреслити її прямий зв''язок із сучасною українською.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз синтаксису. Як функціонують дієприкметникові звороти (e.g. давальний самостійний) як засіб
    створення складних речень, на відміну від сучасних підрядних речень.'
  - 'Етимологічна розвідка: Простежуємо шлях слів з літопису: «вотчина», «дружина», «боярин», «смерд». Як їхнє значення змінилося
    за 800 років?'
  - 'Фонологічна лабораторія: Пошук у тексті прикладів написання, що відображають ключові фонетичні зміни: занепад зредукованих
    (єрів), розвиток «нового ятя» (і < ѣ).'
  - '[!myth-buster] Мова літопису — не монолітна. Це суміш книжної церковнослов''янської та живих народних елементів. Розрізняємо
    ці шари на конкретних прикладах.'
  section: 'Мовна лабораторія: Граматика Галицько-Волинського літопису'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер, проаналізувавши текст, як ви розумієте фразу «бысть самодерьжцемь всея Руской земли»?
    Аргументуйте свою відповідь.'
  - 'Лінгвістичний підсумок: Які три ключові риси мови Галицько-Волинського літопису відрізняють її від сучасної української,
    а які, навпаки, вказують на безперервність мовної традиції?'
  - 'Зв''язок із сьогоденням: Чому філологічний аналіз середньовічних текстів є важливим інструментом у сучасних інформаційних
    війнах та боротьбі з імперськими міфами?'
  section: Дискусія та підсумок
  words: 600
focus: Роман Мстиславич, Галицько-Волинський літопис, концепція «самодержця», лінгвістичні риси мови літопису, об'єднання
  Галичини та Волині
