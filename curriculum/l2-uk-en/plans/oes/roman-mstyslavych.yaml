objectives:
- Аналізувати концепт «самодержавства» в контексті політичної думки Русі XII-XIII ст. на основі першоджерела
- Читати, перекладати та проводити граматичний аналіз фрагменту Галицько-Волинського літопису
- Розрізняти церковнослов’янські та протоукраїнські риси в мові літопису
- Формулювати аргументовану позицію щодо філологічних дебатів про авторство та мову літописного тексту
