content_outline:
- points:
  - 'Провокація: Дано три давньосхіднослов''янські слова: лѣсъ, вѣра, рѣка. Студент має написати їх сучасні українські відповідники
    і спробувати пояснити, чому одна і та сама буква (ѣ) перетворилася на різні звуки.'
  - 'Вступний декодинг: короткий вислів із давнього тексту, де є слово з «ятєм». Наприклад, «въ вѣкы» (навіки).'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історична орфографія. Боротьба між «драгоманівкою» (фонетичний правопис) та «максимовичівкою» (етимологічний)
    у ХІХ ст. Чи варто було зберігати букву «ѣ», щоб показати походження звука [і]?'
  - 'Дебат 2: Ікавізм як маркер українськості. Полеміка з російською імперською лінгвістикою. Чому перехід *ě > і є доказом
    самостійного розвитку української мови, а не її «діалектності»? (хлѣбъ > укр. хліб vs рос. хлеб).'
  - '[!decolonization] Розвінчання міфу про «давньоруську мову» як пряму власність Росії. Давньосхіднослов''янська (Old East
    Slavic) — спільний предок. Ікавізм — одна з ключових розбіжностей, що почалася ще в XII ст.'
  - '[!epistemic-humility] Точне датування та географія поширення ікавізму є предметом дискусій. Різні діалекти показували
    різну швидкість переходу.'
  section: 'Конфліктна карта: Ікавізм чи етимологія?'
  words: 800
- points:
  - 'Первинне джерело: Фрагмент з Ізборника Святослава 1073 року, насичений словами з буквою ѣ.'
  - Оригінальний текст (уставне письмо, нормалізована орфографія).
  - 'Порядковий переклад та глоси: розбір кожного слова, що містить ѣ. Наприклад: "мѣсто" (місце), "тѣло" (тіло), "дѣла" (діла).'
  - 'Граматичний розбір: визначення відмінків, часів, осіб, де ѣ з''являється в закінченнях (напр., м.в. одн. -ѣ).'
  - Паралельний переклад сучасною українською мовою, що підкреслює фонетичні зміни.
  - '[!decolonization] Підкреслення, що текст є пам''яткою книжної мови, спільної для Русі, але місцеві фонетичні риси (прообрази
    українських) вже пробиваються крізь церковнослов''янську основу.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Від праслов''янської до сучасної України: простежуємо шлях дифтонга *ě.'
  - 'Основне правило ікавізму: як *ě перетворився на [і] в нових закритих складах (лѣто > літо), але зберігся як [je] в інших
    позиціях (моѥго > моєго).'
  - 'Практикум: аналіз слів з ѣ з тексту-джерела. Студенти класифікують кожен випадок і пояснюють результат переходу.'
  - 'Етимологічний слід: як сучасні українські чергування (Києва/Київ, летіти/політ) є відлунням давнього явища.'
  - '[!myth-buster] Це не хаос, а система. Ікавізм — це регулярний фонетичний закон, один із найважливіших в історії української
    мови, а не випадковість.'
  - 'Вправа на передбачення: студентам дають давньосхіднослов''янські слова з ѣ, і вони мають вивести сучасну українську форму,
    обґрунтовуючи свій вибір.'
  section: 'Мовна лабораторія: Фонологічна доля яті (ѣ)'
  words: 1700
- points:
  - 'Повернення до розминки: студент тепер може науково пояснити, чому лѣсъ > ліс, але рѣка > ріка.'
  - 'Лінгвістичний висновок: Ікавізм — це не просто зміна одного звука, а системна перебудова фонологічної системи, що відмежувала
    українську мову від її сусідів.'
  - 'Зв''язок із сучасністю: Чому знання про «ять» важливе сьогодні? Розуміння глибинних історичних процесів у мові як інструмент
    проти імперських наративів.'
  section: Дискусія та підсумок
  words: 600
focus: The unique sound of ѣ, its phonological evolution (ikavism), and its central role in defining the Ukrainian language
level: OES
module: oes-005
objectives:
- Аналізувати фонологічний розвиток праслов'янського звука *ě в українській мові
- Розрізняти рефлекси ѣ в сучасній українській мові ([і], [ї], [є]) та пояснювати умови їх виникнення
- Читати, перекладати та граматично аналізувати фрагмент автентичного давньосхіднослов'янського тексту
- Аргументовано пояснювати роль ікавізму як одного з основних маркерів самостійності української мови
