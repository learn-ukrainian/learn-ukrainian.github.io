activity_hints:
- description: Перевірка розуміння дебатів про правопис та роль ікавізму. Чия це теза — прихильників фонетичного чи етимологічного
    правопису?
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: Дано 10 давньосхіднослов'янських слів з ѣ. Впишіть їхні сучасні українські форми та вкажіть, у закритому чи
    відкритому складі стояв ѣ.
  focus: Прогнозування рефлексів ѣ
  items: 10
  type: fill-in
- description: Наведіть 3 приклади слів з ѣ з тексту-джерела. Проаналізуйте граматичну форму кожного слова та поясніть фонетичний
    результат в сучасній українській мові.
  focus: 'Джерельний аналіз: Ізборник 1073'
  type: note
- description: Чому саме ікавізм вважається однією з ключових рис, що визначає українську мову як окрему одиницю? Аргументуйте
    свою відповідь, використовуючи приклади з модуля та порівняння з іншими слов'янськими мовами (400-600 слів).
  focus: 'Есе: Ікавізм як мовний кордон'
  type: note
cefr_min: C2
connects_to:
