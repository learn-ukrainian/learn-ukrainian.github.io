objectives:
- Аналізувати оригінальні статті Руської Правди, що стосуються спадкового права, з детальним граматичним коментарем
- Розрізняти основні наукові дебати щодо автентичності, датування та лінгвістичних шарів Руської Правди
- Пояснювати функціонування давального відмінка в юридичному контексті давньосхіднослов’янської мови
- Простежувати етимологічну еволюцію ключових термінів родини від Київської Русі до сучасної України
