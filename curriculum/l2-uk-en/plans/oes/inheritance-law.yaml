content_outline:
- points:
  - 'Провокація: Ваш бездітний брат помирає. За законами Руської Правди, хто отримає його майно: його дружина, його батьки
    чи ви? Спробуйте передбачити.'
  - 'Декодування: «Аже боудеть кто оумирати, то роздаяти имьньє свое дътемъ...» — розшифруйте цей фрагмент з Руської Правди,
    спираючись на знання сучасної української.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хто написав Руську Правду? Питання авторства та автентичності. Коротка, Розширена та Скорочена редакції — це
    еволюція одного кодексу чи три різні компіляції?'
  - 'Дебат 2: Мова закону — народна чи книжна? Лінгвістичні шари Руської Правди: сліди давньосхіднослов''янської розмовної
    мови, церковнослов''янізми та правова термінологія (скандинавська чи слов''янська за походженням?).'
  - '[!decolonization] Руська Правда — це право Київської Русі, спільний спадок, а не «Давньоруський закон». Опір російській
    імперській традиції привласнення.'
  - '[!epistemic-humility] Точне датування та атрибуція багатьох статей Правди є предметом гострих наукових суперечок, а не
    встановленим фактом.'
  section: 'Конфліктна карта: Чия Правда?'
  words: 800
- points:
  - 'Першоджерело: Аналіз статей з Розширеної редакції Руської Правди, що регулюють спадкування синами, доньками, братами
    та вдовами.'
  - 'Оригінальний текст: «Аже оу кого сынове боудоуть, а любо дчери, то пьрвъи с(ы)н(о)мъ даяти часть, а по томъ дчерямъ».'
  - 'Послівний глосарій та граматичний розбір: детальний аналіз форм, зокрема вживання давального відмінка для позначення
    отримувача спадку.'
  - 'Паралельний переклад сучасною українською: Порівняння правових норм та мовних конструкцій.'
  - 'Юридична нотатка: Чому доньки успадковують лише за відсутності синів? Соціальна структура XI-XII ст. крізь призму закону.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Давальний відмінок (Dativus) у юридичному контексті. Розбір функцій: отримувач (Dativus commodi),
    приналежність, ціль. Відмінювання ключових іменників з тексту.'
  - 'Етимологічний слід: Простеження еволюції термінів родини від давньосхіднослов’янської до сучасної української: *отчина*
    (батьківська спадщина) vs *материзна*, *чадо* vs *дитя*, *жена*, *братъ*, *сестра*.'
  - '[!myth-buster] Чи завжди «сім’я» означала те саме? Аналіз семантичних зсувів у термінах родини та їхній правовий статус.'
  - 'Вправа на реконструкцію: Відновлення парадигми відмінювання для слів *дчи* (донька) та *мати* на основі текстових прикладів.'
  section: 'Мовна лабораторія: Давальний відмінок та терміни родини'
  words: 1700
- points:
  - 'Повернення до розминки: Використовуючи знання з модуля, дайте обґрунтовану відповідь, хто успадкує майно бездітного брата.'
  - 'Лінгвістичний підсумок: Як давньосхіднослов’янська мова використовувала граматичні інструменти, зокрема давальний відмінок,
    для структурування складних правових та соціальних відносин?'
  - 'Зв''язок із сучасністю: Які принципи спадкового права Руської Правди були втрачені, а які — в трансформованому вигляді
    — дійшли до наших днів у цивільному кодексі України?'
  section: Дискусія та підсумок
  words: 600
