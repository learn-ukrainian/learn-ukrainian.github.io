activity_hints:
- description: Перевірка позицій щодо тріумвірату та «феодалізму». Чия це теза — літописця чи сучасного історика? Визначити
    позицію за цитатою.
  focus: Розуміння філологічних дебатів
  items: 5
  type: quiz
- description: Вставити коректні терміни (волость, удѣлъ, старшинство, посадник) у речення, що описують політичний устрій
    часів Ярославичів.
  focus: Термінологія влади
  items: 5
  type: fill-in
- description: 'Подано два тексти: фрагмент ідеалізованого заповіту Ярослава з ПВЛ та короткий опис подальших усобиць між
    братами. Порівняйте: що з заповіту було виконано, а що ні, і чому?'
  focus: 'Порівняльний аналіз: Заповіт Ярослава vs реальність'
  type: note
- description: На основі тексту модуля, поясніть, чим поняття «волость» у Ярославичів відрізнялося від сучасного поняття приватної
    власності на землю. Аргументуйте, посилаючись на лексику та граматику ПВЛ (400-600 слів).
  focus: 'Есе: Що означає «володіти» землею в ХІ столітті?'
  type: note
cefr_min: C2
connects_to:
- pvl-yaroslav-wise
- pvl-polovtsian-wars
content_outline:
- points:
  - 'Провокація: «И раздѣлиша межи собою, и бѧше имъ мирно». Чи справді було мирно? Розшифруйте фразу та спрогнозуйте, що
    сталося далі.'
  - 'Мовний зв''язок: від давньосхіднослов''янського «волость» до сучасного «володіти». Що означало це слово для синів Ярослава?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історіографічний): Тріумвірат Ярославичів — це стабільна система колективного правління чи відкладена громадянська
    війна? Позиція літописця vs історична реальність.'
  - 'Дебат 2 (Лінгвістичний): Чи можна називати суспільний устрій Русі «феодалізмом»? Аналіз термінів «волость», «удѣлъ»,
    «посадник» — чи є вони точними відповідниками західноєвропейських «ф''єф», «домен», «васал»?'
  - '[!decolonization] Термінологічна боротьба: Чому радянська історіографія наполягала на моделі «феодальної роздробленості»,
    і як це применшувало унікальність політичної системи Русі?'
  - '[!epistemic-humility] Літопис — це не репортаж, а сконструйований наратив. Ми аналізуємо не стільки «як було», скільки
    «як автор хотів, щоб ми думали, що було».'
  section: 'Конфліктна карта: Доля спадщини Ярослава'
  words: 800
- points:
  - 'Первинне джерело: Заповіт Ярослава Мудрого з Повісті временних літ.'
  - 'Оригінальний текст: «Се же поручаю вмѣсто себе столъ свои стареишему сыну моему...»'
  - 'Послівний розбір: граматичний аналіз ключових форм (давальний відмінок, займенники, форми аориста).'
  - 'Паралельний переклад: порівняння давньосхіднослов''янського синтаксису з сучасним українським.'
  - 'Коментар: розрізнення між церковнослов''янізмами (книжна лексика) та розмовними східнослов''янськими елементами в тексті
    заповіту.'
  - '[!decolonization] Читаємо текст мовою ОРИГІНАЛУ, а не в російському перекладі чи «давньоруській» транскрипції. Це мова,
    спільна для предків українців, білорусів та росіян.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Аналіз присвійних прикметників та родового відмінка в тексті ПВЛ для вираження власності та спадкоємства.'
  - 'Лексична лабораторія: Семантичне поле термінів влади — «кнѧзь», «дружина», «посадник», «волость», «городъ».'
  - 'Етимологічний слід: Простежуємо шлях слова «удѣлъ» від його значення в ПВЛ («частка спадщини») до сучасних українських
    слів «ділити», «наділ», «доля».'
  - '[!myth-buster] «Старшинство» було не лише питанням віку, а складною юридичною та мовною концепцією, що включала володіння
    столичним престолом («столъ»).'
  - 'Вправа: Студенти складають генеалогічне дерево Ярославичів, підписуючи їхні «волості» та «столи» мовою ПВЛ.'
  section: 'Мовна лабораторія: Термінологія влади та власності'
  words: 1700
- points:
  - 'Повернення до розминки: «И раздѣлиша межи собою, и бѧше имъ мирно». Студент дає розгорнуту відповідь: чому ця фраза є
    одночасно правдивою (на момент написання) і трагічно іронічною в історичній перспективі.'
  - 'Лінгвістичний висновок: Як граматика (форми дієслів, відмінки) та лексика ПВЛ конструюють ідею законної, впорядкованої
    передачі влади?'
  - 'Зв''язок із сучасністю: Поняття «спадщини», «розподілу», «братської зради» в українській політичній культурі — чи є відлуння
    з часів Ярославичів?'
  section: Дискусія та підсумок
  words: 600
focus: The division of Rus' among the Yaroslavychi (Izyaslav, Svyatoslav, Vsevolod), the concept of seniority, and the linguistic
  basis of early East Slavic feudal terminology.
