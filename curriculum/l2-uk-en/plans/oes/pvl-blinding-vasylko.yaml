content_outline:
- points:
  - 'Провокація: «Да и сѣде Давыдъ и Василко, и начата ѣсти.» Чому цей, на перший погляд, мирний обід є початком одного з
    найстрашніших епізодів у літописі?'
  - 'Спробуйте розшифрувати фразу: «не далъ ми еси зрѣти свѣта сего» — хто, до кого і за яких обставин міг це сказати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є розповідь про осліплення об''єктивною історією чи політичною пропагандою, що виправдовує подальші дії Володимира
    Мономаха?'
  - 'Дебат 2: Мова оповіді — це високий церковнослов''янський стиль чи жива давньосхіднослов''янська мова? Чому літописець
    змішує реєстри, використовуючи високу лексику для молитов і просту для опису насильства?'
  - '[!epistemic-humility] Ми читаємо версію подій, написану з певної точки зору. Істинних мотивів Давида Ігоровича чи Святополка
    ми ніколи не дізнаємося.'
  - '[!decolonization] Цей текст — частина спільної спадщини, що належить предкам українців, білорусів та росіян. Твердження
    про його «виключно російський» характер — це імперський анахронізм.'
  section: 'Конфліктна карта: Історія чи пропаганда?'
  words: 800
- points:
  - 'Оригінальний текст: Сцена у світлиці — від арешту до вироку. Читання уривку з Іпатіївського списку.'
  - 'Синтаксис напруги: аналіз довгих, складних речень, що передають хаос і зраду.'
  - 'Граматичний розбір: давальний самостійний (dativus absolutus), форми аориста та імперфекта, що створюють динаміку оповіді.'
  - 'Паралельний переклад сучасною українською: Як би ця сцена виглядала з синтаксисом сучасної мови? Порівняння показує,
    які інструменти втрачено, а які з’явились.'
  - '[!decolonization] Примітки щодо термінології: «давньоруський» vs «давньосхіднослов''янський».'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Деконструкція конструкції «давальний самостійний». Як вона працює і чому була такою популярною
    в літописах? Приклади з тексту: «Давидови же сѣдящу на дворѣ...»'
  - 'Часова лабораторія: Аорист vs Імперфект. Визначення та порівняння форм у тексті. Чому літописець каже «рече» (аорист),
    але «сѣдяше» (імперфект)? Як це впливає на сприйняття часу читачем?'
  - 'Етимологічний слід: Простежуємо еволюцію ключових слів: *животъ* (життя), *очи*, *ножъ*, *свѣтъ*, *склепъ* (погреб) від
    OES до сучасної української.'
  - '[!myth-buster] Міф про «простоту» давніх мов. Синтаксична структура цього уривку ПВЛ є значно складнішою за багато сучасних
    літературних текстів.'
  section: 'Мовна лабораторія: Синтаксис жаху та давальний самостійний'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер фраза «не далъ ми еси зрѣти свѣта сего» розкриває всю глибину трагедії. Студент дає повний
    граматичний та історичний коментар.'
  - 'Лінгвістичний підсумок: Що робить мову цієї оповіді такою потужною? Це не просто набір фактів, а майстерно сконструйований
    наратив, де граматика служить експресії.'
  - 'Зв''язок із сучасністю: Чому ми втратили такі граматичні інструменти, як аорист та давальний самостійний? Обговорення
    шляхів розвитку українського синтаксису.'
  section: Дискусія та підсумок
  words: 600
