objectives:
- Аналізувати відмінювання та вжиток особових і зворотного займенників (азъ, ты, собѣ) у давньосхіднослов'янських текстах
- Розрізняти розмовні східнослов'янські та церковнослов'янські риси в особистому листуванні
- Читати та перекладати фрагмент автентичної давньосхіднослов'янської берестяної грамоти
- Критично оцінювати філологічні дебати щодо автентичності та лінгвістичної класифікації берестяних рукописів
