content_outline:
- points:
  - 'Провокація: у сучасній українській є «я» і «мені». У давньосхіднослов’янській — «азъ» і «мьнѣ». Чи це просто давніші
    версії тих самих слів? Розгляньмо рядок з листа XII ст.: "отъ гюрга къ матери. дай ми сорочьку..." Чи так би написали
    сьогодні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Автентичність vs підробка. Як лінгвісти доводять, що берестяні грамоти — не пізніші фальсифікації? Аргументи
    від палеографії та стратиграфії.'
  - 'Дебат 2: Мова народу чи мова еліти? Чи відображають займенникові форми в листах живу розмовну мову, чи це кальки з престижної
    церковнослов’янської? [!decolonization] — теза про «давньоруську єдність» часто спирається на церковнослов''янські тексти,
    ігноруючи розмовні діалекти, які вже тоді показували майбутні відмінності.'
  - '[!epistemic-humility] Багато грамот фрагментарні. Відновлення повного тексту та його інтерпретація — це завжди гіпотеза,
    а не догма.'
  section: 'Конфліктна карта: Чиї листи ми читаємо?'
  words: 800
- points:
  - 'Первинне джерело: Берестяна грамота №109 (Новгород, XII ст.) — лист-прохання з активним використанням особових займенників.'
  - 'Оригінальний текст: "поклоно ѿ гюрге къ ѡсипоу присли ми конѧ... аже ми не прислеши коѧ..."'
  - 'Пофразовий глосинг та розбір: "аже ми не прислеши" — що означає форма "ми"? Чому не "мьнѣ"?'
  - 'Граматичний парсинг: аналіз форм "ми" (enclitic dative), "ти" (implied subject of "прислеши"), порівняння з очікуваними
    повними формами "мьнѣ", "тобѣ".'
  - Паралельний переклад сучасною українською, з коментарями про втрачені форми та зміни в синтаксисі.
  - '[!decolonization] Чому ми вивчаємо грамоту з Новгорода? Бо це частина спільної давньосхіднослов''янської спадщини. Політичні
    кордони XII ст. не збігаються з сучасними, а мова ще не розділилася на українську, білоруську та російську.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Повна парадигма відмінювання займенників «азъ», «ты», «мы», «вы» в однині, двоїні та множині.'
  - 'Втрачена двоїна: як сказати "ми двоє" (`вѣ`) або "ви двоє" (`ва`)? Аналіз таблиць відмінювання для числа двоїни.'
  - 'Енклітики: короткі форми займенників (ми, ти, сѧ) як маркер розмовної мови. Їх місце в реченні.'
  - 'Етимологічний слід: від «азъ» до «я». Фонетична реконструкція процесу.'
  - '[!myth-buster] Займенник «себе» не мав називного відмінка вже тоді. Теза, що можна було сказати *«себе прийшов», є хибною.'
  section: 'Мовна лабораторія: Граматика особових займенників'
  words: 1700
- points:
  - 'Повернення до розминки: тож чи є "азъ" і "мьнѣ" просто старими версіями "я" і "мені"? Студент формулює відповідь, враховуючи
    відмінності в граматичних категоріях (двоїна) та синтаксисі (енклітики).'
  - 'Лінгвістичний висновок: що система займенників розповідає про граматичну структуру давньосхіднослов''янської мови? Як
    вона виражала поняття "я", "ти", "свій", "чужий"?'
  - 'Зв''язок із сучасністю: які давні форми збереглися в українських діалектах? (напр. архаїчне "вы" як форма ввічливості
    до однієї особи).'
  section: Дискусія та підсумок
  words: 600
focus: Граматика та вжиток особових та зворотного займенників (азъ, ты, мьнѣ, тобѣ, собѣ) у давньосхіднослов'янських особистих
  листах (берестяні грамоти). Розрізнення розмовних східнослов'янських форм та церковнослов'янського впливу.
level: OES
