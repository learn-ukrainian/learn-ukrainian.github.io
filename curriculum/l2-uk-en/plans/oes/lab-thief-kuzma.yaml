content_outline:
- points:
  - 'Провокація: Фрагмент із давньосхіднослов''янської берестяної грамоти (XI ст.): ''А ЯКИМЪ ЖЕ ТО ЗОЛОТОМЬ ПЛАТИШИ''. Що
    це — частина торговельної угоди, особистий лист чи щось інше?'
  - 'Студент висуває гіпотезу: про що цей текст і хто його учасники?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Жанровий): Це юридичний документ, приватний лист чи магічний текст? Аргументи за і проти кожної версії. Позиція
    А. А. Мединцевої (побутове прокляття) vs позиція А. А. Залізняка (текст, близький до юридичного).'
  - 'Дебат 2 (Діалектологічний): Чиї риси в мові грамоти — псковські чи київські? Аналіз специфічних написань, що вказують
    на давньоновгородський діалект.'
  - '[!decolonization] Текст написаний мовою, що є прямим предком сучасних східнослов''янських мов, а не "давньоруською мовою".
    Важливо розрізняти риси місцевого діалекту та спільні риси.'
  - '[!epistemic-humility] Точне датування берестяних грамот є предметом дискусій, що спираються на стратиграфію, палеографію
    та лінгвістичні дані.'
  section: 'Конфліктна карта: Грамота №10 — жанр і діалект'
  words: 800
- points:
  - 'Оригінальний текст грамоти: ''Ѿ ПОПА КЪ НЕЖЕНОВИ ТАТЬ КОЗЬМА НЕКА ВЕДАѤТЪ ТЪ ЖЕ ЕГО ОПУСТИЛЕ У СВОБОДУ А ЯКИМЪ ЖЕ ТО
    ЗОЛОТОМЬ ПЛАТИШИ ѦЗЪ ЖЕ ЕСМЬ ЗАПЛАТИЛЪ ПОЛЪ ВТОРА ЗОЛОТНИКА А ТВОЕГО ЗОЛОТА НЕ ТРЕБѢ'''
  - 'Пофразовий глосинг та граматичний розбір: аналіз форм дієслів (перфект ''опустиле''), іменників (називний відмінок ''тать
    Козьма'', орудний ''золотомь''), і особливостей синтаксису.'
  - Паралельний переклад сучасною українською мовою з коментарями щодо лексичних розбіжностей.
  - Відмінності між церковнослов'янськими та народномовними елементами в тексті (наприклад, форми дієслів, відсутність '-оу-'
    в коренях).
  section: 'Текст: Читання та переклад грамоти №10'
  words: 1700
- points:
  - 'Граматична лабораторія: Форми перфекта в тексті (''опустиле'', ''Ѧзъ же есмь заплатилъ''). Як вони утворювались і як
    трансформувались у сучасний український минулий час?'
  - 'Фонологічна лабораторія: Явище занепаду редукованих. Аналіз слова ''Козьма'' (з ''ъ'') та ''золотникъ''. Простежити еволюцію
    цих слів до сучасних форм.'
  - '[!myth-buster] Палеографічний аналіз: Це не просто "закарлючки". Розбір особливостей написання літер (наприклад, ''Ѧ'',
    ''Ѣ''), відсутність пробілів між словами як норма для побутових текстів того часу.'
  - 'Етимологічна лабораторія: Простежити шлях слова ''тать'' від давньосхіднослов''янської до його сучасних значень та вжитку
    в українській мові (переважно в історичному або архаїчному контексті).'
  section: 'Мовна лабораторія: Граматика прокляття'
  words: 1700
- points:
  - 'Повернення до розминки: Тепер, знаючи повний контекст, як би ви інтерпретували фразу ''А ЯКИМЪ ЖЕ ТО ЗОЛОТОМЬ ПЛАТИШИ''?
    У чому полягає сарказм автора?'
  - Що цей короткий побутовий текст розповідає про рівень грамотності, правові стосунки та повсякденну мову в Новгороді XI
    століття?
  - 'Зв''язок із сучасністю: Які граматичні конструкції з грамоти збереглися в сучасній українській мові, а які зникли або
    кардинально змінилися?'
  section: Дискусія та підсумок
  words: 600
focus: Philological and linguistic analysis of the birchbark graffiti No. 10 from Novgorod, a curse against the thief Kozma.
level: OES
module: oes-013
objectives:
- Аналізувати автентичний давньосхіднослов'янський текст (берестяну грамоту), застосовуючи філологічні та палеографічні знання
- Розрізняти наукові гіпотези (дебати) щодо інтерпретації, жанру та діалектних особливостей давніх текстів
- Простежувати еволюцію конкретних фонологічних, морфологічних та лексичних одиниць від давньосхіднослов'янської до сучасної
  української мови
- Формулювати обґрунтовану думку про соціальний та культурний контекст, відображений у давньому писемному джерелі
