objectives:
- Аналізувати фрагмент з «Повісті временних літ» з повним граматичним та лексичним коментарем
- Аргументовано обговорювати основні положення та контр-аргументи "норманської теорії"
- Розпізнавати та аналізувати форми аориста в давньосхіднослов'янському тексті
- Відрізняти церковнослов'янські та питомі східнослов'янські елементи в тексті
