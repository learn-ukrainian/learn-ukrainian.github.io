content_outline:
- points:
  - 'Провокація: уривок з ПВЛ: "идоша за море к варягомъ, к руси". Хто така ця "русь" і чому за нею треба було йти "за море"?'
  - 'Лінгвістична загадка: Що спільного між словами "йшли", "пішли" та давньою формою "идоша"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історичний): Варяги — це скандинави (норманісти) чи західні слов''яни (антинорманісти)? Аналіз аргументів обох
    сторін.'
  - 'Дебат 2 (Лінгвістичний): Імена "Рюрик", "Олег", "Ігор" — германського чи слов''янського походження? Як мовні дані використовуються
    в історичних суперечках?'
  - '[!decolonization] Норманізм як інструмент російської імперської ідеології: теорія про "нездатність слов''ян до державотворення"
    та її сучасні відлуння.'
  - '[!epistemic-humility] Брак джерел та неоднозначність літописного тексту. Чому остаточна відповідь може бути неможливою?'
  section: 'Конфліктна карта: Норманська теорія'
  words: 800
- points:
  - 'Оригінальний текст з ПВЛ: розповідь про те, як слов''янські та фінські племена прогнали варягів, а потім покликали їх
    княжити.'
  - 'Послівний глосарій та граматичний розбір: "И рѣша русь, чюдь, словенѣ и кривичи и вси..."'
  - 'Аналіз ключових дієслівних форм в аористі: рѣша, идоша, пояша. Що означає ця форма і чим відрізняється від сучасного
    минулого часу?'
  - '[!decolonization] Паралельний переклад: порівняння з оригіналом, виявлення церковнослов''янізмів та питомої давньосхіднослов''янської
    лексики.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Як утворюється аорист? Парадигма дієслова "рѣкти" (сказати) в аористі.'
  - 'Фокус на формі "рѣша" (вони сказали): аналіз закінчення, порівняння з іншими дієслівними формами в тексті.'
  - '[!myth-buster] Аорист — це не просто "давній минулий час". Це маркер доконаної дії, що відбулася один раз. Протиставлення
    імперфекту.'
  - 'Етимологічний слід: від "варяг" до "варяжити" (шахраювати). Як змінювалося значення слова.'
  section: 'Мовна лабораторія: Знайомство з аористом'
  words: 1700
- points:
  - 'Повернення до розминки: що тепер ми можемо сказати про фразу "идоша за море к варягомъ, к руси"?'
  - 'Лінгвістичний висновок: Яку роль відігравав аорист у системі часів давньосхіднослов’янської мови?'
  - 'Зв''язок із сучасністю: Чому "норманська теорія" досі є предметом гострих політичних, а не тільки наукових, дискусій?'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз уривку з ПВЛ про покликання варягів. Філологічна дискусія про норманізм. Вступ до аориста на прикладі форм "рѣша"
  та "идоша".
