content_outline:
- points:
  - 'Провокація: "а оу коморьника коуно десѧто". Ця фраза з XI століття означає борг у 10 шкірок куниці чи 10 монет? І чи
    є різниця?'
  - Сучасне українське слово "гроші" походить від "гривня". А що означала "гривня" в Київській Русі, і чому її можна було
    "рубати"?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Автентичність): Чи є Звенигородські берестяні грамоти справжніми документами XI ст., чи пізнішою підробкою?
    Аргументи палеографів (за) vs скептицизм деяких істориків (проти).'
  - 'Дебат 2 (Лінгвістична класифікація): Чи є мова грамот "прото-українською", чи спільною "давньосхіднослов''янською"? Аналіз
    фонетичних рис (напр., "оу" на місці праслов''янського *ǫ) та їх значення.'
  - '[!decolonization] Терміни "древнерусский" vs "давньосхіднослов''янський". Чому російська історіографія наполягає на першому,
    і чому це політичний, а не лінгвістичний вибір.'
  - '[!epistemic-humility] Ми аналізуємо фрагменти, що дивом збереглися. Наші висновки про всю фінансову систему є реконструкцією,
    а не прямим знанням.'
  section: 'Конфліктна карта: Справжність та інтерпретація Звенигородських грамот'
  words: 800
- points:
  - Оригінальний текст грамоти в нормалізованій графіці: а оу коморьника коуно десѧто а дроугоє полъ четвьрта...
  - 'Пофразовий глоссінг: "коуно десѧто" → "куниць десять (або монет)"; "полъ четвьрта" → "три з половиною".'
  - 'Граматичний розбір: форми двоїни ("коуне дъве"), конструкції з числівниками ("десѧть коунъ" - родовий відмінок), застиглі
    форми.'
  - 'Паралельний переклад сучасною українською мовою: порівняння синтаксису та лексики.'
  - '[!decolonization] Цей текст написано на території сучасної України за 100 років до заснування Москви. Він є частиною
    саме української писемної спадщини.'
  section: 'Текст: Читання та переклад (Звенигородська грамота №1)'
  words: 1700
- points:
  - 'Лабораторія граматики: Складна система відмінювання числівників. Чому "дъва" відмінювалось як іменник, а "пѧть" — як
    іменник ж.р. на *-ь?'
  - 'Лабораторія етимології: Звідки взялися назви грошей? куна (куниця), ногата (частина шкірки), векша (білка). Відтворення
    економіки натурального обміну.'
  - 'Лабораторія фонології: Як звучали ці слова? Розбір падіння єрів у слові "коморьникъ" > "комірник".'
  - '[!myth-buster] "Проста" мова народу vs "складна" церковнослов''янська. Грамота демонструє, що побутова мова мала надзвичайно
    складну граматичну систему (двоїна, аорист), яка згодом спростилася.'
  section: 'Мовна лабораторія: Граматика давньосхіднослов''янських числівників'
  words: 1700
- points:
  - 'Повернення до розминки: Отже, "коуно десѧто" — це шкірки чи монети? Формулювання відповіді на основі аналізу тексту та
    історичного контексту.'
  - 'Лінгвістичний висновок: Що Звенигородська грамота розповідає про стан мови в XI ст.? Які граматичні категорії були живими,
    а які вже зникали?'
  - 'Зв''язок із сучасною українською: Які залишки давньої системи числівників збереглися в сучасній мові (напр., "дві гривні",
    але "п''ять гривень")?'
  section: Дискусія та підсумок
  words: 600
focus: 'Аналіз фінансової системи Київської Русі через берестяну грамоту №1 зі Звенигорода: система числівників, грошові одиниці
  (куни, ногати, гривні), боргові зобов''язання.'
level: OES
module: oes-014
objectives:
- Аналізувати оригінальний текст давньосхіднослов'янською мовою (берестяну грамоту) з повним граматичним та лексичним коментарем
- Реконструювати давньосхіднослов'янську систему числівників та грошових одиниць (куна, гривня, ногата)
- Розрізняти позиції в наукових дебатах щодо автентичності та лінгвістичної класифікації давніх текстів
- Пояснювати зв'язок між історичними змінами в граматиці (падіння єрів, втрата двоїни) та еволюцією сучасної української мови
