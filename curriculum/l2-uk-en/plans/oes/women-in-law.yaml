content_outline:
- points:
  - 'Провокація: Давньосхіднослов’янська фраза з юридичного тексту: «аще оубиеть моужь женоу, то платити оубиици по женинѣ
    вѣно». Що це означає? Про що свідчить такий закон?'
  - 'Мозковий штурм: які права, на вашу думку, мала жінка в суспільстві Київської Русі? Назвіть три.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи були закони про опіку над вдовами та сиротами (напр. в «Руській Правді») патерналістським обмеженням їхніх
    прав чи реальною соціальною гарантією в жорстокому суспільстві?'
  - 'Дебат 2: Джерела права — звичаєве право vs. церковне право. Який кодекс мав більший вплив на статус жінки? Чиї інтереси
    захищав кожен з них?'
  - '[!decolonization] Термін «давньоруське право» є імперським конструктом. Використовуємо «право Русі», «давньосхіднослов’янське
    право», щоб підкреслити спільну спадщину, а не ексклюзивну російську.'
  - '[!epistemic-humility] Джерела, що дійшли до нас, відображають точку зору еліти (князів та духовенства). Ми мало знаємо
    про реальний юридичний стан селянок.'
  section: 'Конфліктна карта: Захист чи контроль?'
  words: 800
- points:
  - 'Первинне джерело: Розширена редакція «Руської Правди», статті про спадщину доньок, права вдови та покарання за злочини
    проти жінок.'
  - 'Оригінальний текст: «Аже буде бо тобе дчи у дому, а не вдасть ю за мужь, то по твоеи смрти часть дати…»'
  - 'Пофразовий глосинг: розбір кожного слова (аже -> якщо, дчи -> донька, вдасть -> видасть).'
  - 'Граматичний парсинг: аналіз форм аориста («вдасть»), умовного способу, відмінкових закінчень іменників («у дому» vs «в
    домі»).'
  - Паралельний переклад сучасною українською мовою.
  - '[!decolonization] Аналіз мовних особливостей, що вказують на протоукраїнський діалектний шар, на відміну від церковнослов’янських
    нашарувань.'
  section: 'Текст: Читання та переклад'
  words: 1700
- points:
  - 'Граматична лабораторія: Відмінювання ключових понять: «жена», «дъчи», «вдова» в різних відмінках (особливо давальний
    та знахідний, що визначають суб’єктність/об’єктність).'
  - 'Етимологічний слід: Простежити еволюцію слів «віно» (посаг), «опіка», «спадщина» від давньосхіднослов’янської до сучасної
    української мови. Що змінилось у значенні?'
  - 'Фонологічна лабораторія: аналіз написання слів у тексті на предмет падіння редукованих (напр. «мужь» vs «мужа») як маркера
    датування тексту.'
  - '[!myth-buster] Міф про повну безправність жінок. Аналіз статей, що надавали жінкам майнові права, недоступні в багатьох
    тогочасних європейських суспільствах.'
  section: 'Мовна лабораторія: Аналіз юридичної лексики'
  words: 1700
- points:
  - 'Повернення до розминки: студент повинен тепер повністю розібрати та прокоментувати фразу «аще оубиеть моужь женоу...»
    з юридичної та лінгвістичної точки зору.'
  - 'Лінгвістичний висновок: Як граматичні категорії (відмінок, вид дієслова) в давньосхіднослов’янській мові слугували інструментом
    для точного визначення юридичних відносин?'
  - 'Зв’язок із сьогоденням: Які правові поняття, що зародилися в праві Русі, збереглися (хоча б у коренях слів) в сучасній
    українській юриспруденції?'
  section: Дискусія та підсумок
  words: 600
focus: Правовий статус жінки в Руській Правді. Опіка, спадщина, шлюб. Аналіз юридичної термінології та її еволюції.
level: OES
module: oes-064
objectives:
- Аналізувати статті «Руської Правди», що стосуються прав жінок (вдови, доньки, дружини)
- Розрізняти поняття «віно», «посаг» та «спадщина» в давньосхіднослов’янському праві
- Критично оцінювати філологічні та історичні дебати щодо інтерпретації правових джерел Русі
- Використовувати давньосхіднослов’янську юридичну лексику для аналізу соціальних відносин
