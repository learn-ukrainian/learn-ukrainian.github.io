activity_hints:
- description: Розрізнення історіографічних та філологічних тез щодо подій 1169 року. Кому належить твердження?
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: Заповнити пропуски в реченнях з літопису правильними формами аориста чи імперфекта (на вибір)
  focus: Форми минулого часу
  items: 8
  type: fill-in
- description: Порівняйте опис розграбування Києва 1169 року з описом захоплення міста ворогом (напр. половцями). Які риторичні
    прийоми використовує літописець, щоб підкреслити трагедію нападу «своїх»?
  focus: Аналіз джерела
  type: note
- description: На основі проаналізованого тексту напишіть коротке есе (400-600 слів) на тему «Що мова літописного уривку говорить
    нам про світогляд та цінності автора?»
  focus: 'Есе: Мова як свідок'
  type: note
cefr_min: C2
connects_to:
