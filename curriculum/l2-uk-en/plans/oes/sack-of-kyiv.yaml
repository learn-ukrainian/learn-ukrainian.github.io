content_outline:
- points:
  - 'Провокація: «И бысть въ Киевѣ плачь...». Чому розграбування 1169 року було безпрецедентним шоком, а не черговою усобицею
    за престол?'
  - 'Декодування фрази: «грабиша... иконы... и книгы». Що цей короткий перелік говорить про цінності та пріоритети нападників
    і хроніста?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Історіографічний): Це була типова феодальна усобиця за київський стіл, чи це був цивілізаційний розрив — атака
    периферії на центр?'
  - 'Дебат 2 (Філологічний): Чий голос звучить у літописі? Мова опису — це вираз локального київського патріотизму чи загальноруська
    риторика засудження гріха?'
  - '[!decolonization] Розвінчання російського імперського міфу про Андрія Боголюбського як «збирача земель руських». Його
    вчинок — не збирання, а руйнування сакрального центру.'
  - '[!epistemic-humility] Оцінка мотивів Боголюбського — особиста образа на киян, бажання принизити ''матір городів руських'',
    чи холодний політичний розрахунок? Джерела дають неоднозначні відповіді.'
  section: 'Конфліктна карта: Кінець Русі чи початок Росії?'
  words: 800
- points:
  - Оригінальний текст з Іпатіївського літопису про пограбування церков, монастирів та вивіз святинь
  - 'Пофразовий розбір: «взяша... икону... юже бѣ принесъ Пирогощею изъ Царягорода». Граматичний та семантичний коментар.'
  - 'Аналіз ключових дієслів дії: грабиша, запалиша, взяша, повезоша — розрізнення аориста й імперфекта.'
  - '[!decolonization] Порівняння з описом захоплення Києва Святополком (1018) чи Ізяславом (1068). Показати, що пограбування
    міста ''своїми'' було новим, жахливим явищем.'
  - Паралельний переклад сучасною українською мовою для порівняння синтаксису та лексики.
  section: 'Текст: Читання та переклад'
  words: 1800
- points:
  - 'Граматична лабораторія: Аорист, імперфект, перфект та плюсквамперфект в уривку про погром. Таблиці форм та їх функції
    в наративі.'
  - 'Вправа: знайти та класифікувати всі форми минулого часу в тексті. Яку дію позначає кожна форма (раптова, тривала, результативна)?'
  - 'Етимологічний слід: як слово «полон» еволюціонувало в значеннях від OES до сучасної української?'
  - '[!myth-buster] ''Простий'' минулий час в українській мові — не спрощення, а складна еволюція, що почалася саме в цей
    період з відмирання аориста та імперфекта в живому мовленні.'
  section: 'Мовна лабораторія: Часова система давньосхіднослов''янського дієслова'
  words: 1600
- points:
  - 'Повернення до розминки: студент формулює відповідь, чому пограбування 1169 року стало кінцем епохи, спираючись на аналіз
    тексту.'
  - 'Лінгвістичний підсумок: як використання аориста та імперфекта створює «кінематографічний» ефект у літописному наративі.'
  - 'Зв''язок із сучасністю: поняття «розграбована спадщина». Обговорення вивезення Вишгородської ікони як символу культурної
    апропріації.'
  section: Дискусія та підсумок
  words: 600
focus: Аналіз опису розграбування Києва 1169 р. в Іпатіївському літописі; лінгвістичні особливості тексту; крах інституту
  «старійшинства» та зсув політичного центру Русі на північ.
level: OES
module: oes-042
objectives:
- Аналізувати уривок з Іпатіївського літопису про пограбування Києва 1169 року, ідентифікуючи риторичні та стилістичні прийоми
  автора
- Розрізняти основні форми минулого часу в давньосхіднослов'янській мові (аорист, імперфект, перфект) та пояснювати їх функції
  в наративі
- Формулювати аргументовану позицію щодо історіографічних та філологічних дебатів про значення та наслідки подій 1169 року
- Критично оцінювати роль події в процесі дезінтеграції Київської Русі та в контексті українсько-російських історичних наративів
