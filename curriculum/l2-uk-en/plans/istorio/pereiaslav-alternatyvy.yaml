content_outline:
- points:
  - 'Два описи України 1654 року: 1) "Возз''єднана з братнім народом, навіки захищена від ворогів". 2) "Тактичний союзник,
    що зберіг автономію для війни на два фронти". Який опис став офіційною історією і чому?'
  - 'Провокація: Чи був вибір Хмельницького "трагічною помилкою" чи єдиноможливим прагматичним кроком для виживання?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Союз із одновірцями (Москва) vs. ситуативний альянс із іновірцями (Стамбул, Стокгольм, Варшава). Що було пріоритетом
    для Хмельницького — релігія чи державний інтерес?'
  - 'Дебат 2: Чи була реалістичною повна незалежність? [!epistemic-humility] Оцінка військових, економічних та дипломатичних
    ресурсів Гетьманщини для самостійного існування в оточенні імперій.'
  section: 'Конфліктна карта: Вибір вектора чи збереження суб''єктності?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Переяслав як акт "возз''єднання братніх народів", "віковічне прагнення" українців
    до Москви. Методологія: ігнорування альтернатив, підміна понять (союз → возз''єднання). Агенда: легітимізація поглинання
    України.'
  - 'Український національний наратив: Переяслав як тимчасовий військовий союз (протекторат), згодом зраджений Москвою. [!decolonization]
    Розглядається в контексті Гадяцької унії як доказ бажання зберегти суб''єктність. Агенда: утвердження тяглості української
    державності.'
  - 'Західний наратив: Переяслав як прагматичний геополітичний хід Хмельницького в умовах війни на виснаження. [!myth-buster]
    Україна розглядається як активний гравець, а не об''єкт. Методологія: аналіз балансу сил, порівняння з іншими європейськими
    союзами того часу.'
  section: 'Зіткнення наративів: Переяславська рада та її інтерпретації'
  words: 1700
- points:
  - 'Аналіз тексту Березневих статей: що написано, а що мається на увазі? Пошук "юридичних пасток" та неоднозначних формулювань
    щодо суверенітету (податки, зовнішня політика).'
  - Порівняння стилю та змісту листів Хмельницького до царя Олексія Михайловича та до шведського короля Карла X Густава. Різні
    тональності, різні аргументи, різна обіцяна лояльність.
  - '[!epistemic-humility] Чи можна довіряти дипломатичним документам? Розбір мови лестощів та прихованих погроз як інструментів
    політики XVII століття.'
  section: 'Джерельна критика: Березневі статті та листи Хмельницького'
  words: 1500
- points:
  - 'Повернення до розминки: чому наратив про "возз''єднання" переміг в офіційній історіографії на століття? Як він конструювався?'
  - 'Уроки Переяслава: Які висновки можна зробити про ризики та переваги союзів із великими державами для менших гравців?'
  - '[!decolonization] Зв''язок із сьогоденням: як міф про Переяслав використовується сучасною російською пропагандою для
    виправдання агресії та заперечення української суб''єктності?'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of the 1654 Pereiaslav Agreement, exploring the Swedish, Ottoman, and Polish alternatives
  and deconstructing the Russian imperial narrative of reunification.
level: ISTORIO
module: istorio-089
objectives:
- Аналізувати причини та наслідки Переяславської ради 1654 року, досліджуючи альтернативні геополітичні вектори
- Критично оцінювати методологію контрфактичного моделювання в історії та її застосування до аналізу рішень Богдана Хмельницького
- Деконструювати російський імперський міф про "возз'єднання" та український національний наратив про "вічну зраду"
- Застосовувати навички джерельної критики для аналізу неоднозначних історичних документів, таких як Березневі статті
