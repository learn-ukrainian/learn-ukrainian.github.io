content_outline:
- points:
  - 'Провокація: «Слово о полку Ігоревім» — це автентична перлина XII століття чи геніальна підробка XVIII? Які докази змусили
    б вас змінити думку?'
  - 'Цитата-загадка: «І сказав Ігор-князь до дружини своєї: "Браття і дружино! Лучче ж потятим бути, аніж полоненим бути"».
    Що в цій фразі видає епічного героя, а не реального політика XII століття?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є «Слово» автентичним текстом XII ст.? Аргументи «за» (лінгвістичні архаїзми, відповідність історичним реаліям)
    vs аргументи «проти» (втрата оригіналу, підозрілі обставини знахідки, скептицизм Зіміна та Мазона).'
  - 'Дебат 2: Це язичницький чи християнський твір? Аналіз синкретизму: формально християнський контекст, але глибинна структура
    та образність (Плач Ярославни, сонячне затемнення, звернення до сил природи) сягають язичницьких вірувань.'
  - '[!epistemic-humility] Науковий консенсус схиляється до автентичності, але визнає можливість окремих пізніших вставок
    (інтерполяцій). Втрата оригіналу робить остаточну верифікацію неможливою.'
  section: 'Конфліктна карта: Автентичність та інтерпретація'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Слово» як пам''ятка «давньоруської» (древнерусской) літератури, що доводить
    єдність «східнослов''янських народів» під проводом Москви. Акцент на ідеї «єдиної руської землі» та засудженні князівських
    міжусобиць, що нібито ослабили Русь.'
  - 'Український наратив: «Слово» як засадничий текст української літератури. Акцент на його географії (Дон, Дунай, Київ,
    Чернігів), поетиці, що має паралелі в українському фольклорі (плачі, думи), та мові, що демонструє риси праукраїнських
    діалектів. Це пам''ятка саме києво-чернігівського, а не московського культурного простору.'
  - 'Західний наратив: «Слово» розглядається в порівняльному контексті європейського героїчного епосу («Пісня про Роланда»,
    «Пісня про Нібелунгів»). Аналізуються унікальні риси: високий статус жіночих персонажів, складна символіка природи, відсутність
    чіткого дидактизму. Питання національної приналежності менш важливе, ніж жанрова та поетична унікальність.'
  - '[!decolonization] Привласнення «Слова» російською культурою — це акт імперської апропріації, спрямований на те, щоб позбавити
    Україну її власної середньовічної спадщини та обґрунтувати «історичне право» Москви на київські землі.'
  - '[!myth-buster] Попри спроби представити «Слово» як заклик до єдності, це насамперед твір про честь, славу та трагічні
    наслідки невдалого військового походу одного конкретного князя, а не політичний трактат.'
  section: 'Зіткнення наративів: Чиє «Слово»?'
  words: 1700
- points:
  - 'Крупним планом: «Плач Ярославни». Детальний розбір тексту: язичницькі звернення до Вітру, Дніпра, Сонця. Аналіз ролі
    жіночого голосу в маскулінному світі епосу. Чому саме плач, а не молитва?'
  - 'Порівняння джерел: Похід Ігоря 1185 року в «Слові» та в Іпатіївському літописі. Що спільного? Що відмінного?'
  - 'Літопис: сухий, фактологічний звіт. Фіксує дати, імена, результат. Моральна оцінка дається з християнської перспективи
    (Божий гнів за гріхи).'
  - '«Слово»: поетичне переосмислення. Додає психологічну мотивацію, ліричні відступи, символізм. Причини поразки — не гріх,
    а порушення гармонії, гординя, нехтування знаменням.'
  - '[!epistemic-humility] «Слово» не є історичним документом у сучасному розумінні. Це літературний твір, що використовує
    історичну подію як канву для роздумів про долю, честь і владу. Літопис також не є об''єктивним — він служить ідеології
    князівської та церковної влади.'
  section: 'Джерельна критика: Епос vs Літопис'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, підробка чи оригінал? Студент має сформулювати власну позицію, спираючись на аргументи
    з модуля, і пояснити, чому це питання є настільки важливим.'
  - 'Мета-рефлексія: Чому один середньовічний твір став полем битви для національних наративів XIX-XXI століть? Що це говорить
    про роль історії та літератури у формуванні ідентичності?'
  - '[!decolonization] Як розуміння історіографічних дебатів навколо «Слова» допомагає нам сьогодні розпізнавати сучасну російську
    пропаганду, яка апелює до «спільної історії»?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiographical debate around "The Tale of Igor''s Campaign": authenticity, narrative ownership (Ukrainian vs. Russian),
  and source criticism (epic vs. chronicle).'
level: ISTORIO
module: istorio-014
objectives:
- Аналізувати аргументи «за» і «проти» автентичності «Слова» в контексті історіографічних дебатів
- Визначати місце «Слова» в українському, російському імперському та західному наративах про середньовічну Русь
- Застосовувати методи джерельної критики для порівняння епічного та літописного описів однієї події
- Розрізняти язичницькі та християнські елементи в тексті та аналізувати їх синкретизм
pedagogy: CBI
persona:
  role: 'Модератор семінару, що ставиться до «Слова» як до місця злочину: є текст, є підозрювані (автор, переписувачі, фальсифікатори),
    і є суперечливі докази. Завдання — навчити студентів бути детективами, а не просто читачами.'
  voice: Textual-Critic-Detective
