content_outline:
- points:
  - 'Провокація: Угода про Асоціацію з ЄС — це кінець 300-річної економічної колонізації чи лише зміна колонізатора? Два погляди
    на один і той самий документ.'
  - 'Цитата: "Україна не може бути суверенною поза єдиним економічним простором з Росією". Кому належить ця теза і які економічні
    аргументи за нею стоять?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історія економіки України — це історія зовнішньої експлуатації (теза російської/радянської школи) чи історія
    внутрішніх інституційних провалів та рентних еліт (теза західної ліберальної школи)?'
  - 'Дебат 2: Розрив економічних зв''язків з Росією після 2014 року — це здобуття справжньої економічної суб''єктності чи
    просто переорієнтація на новий центр асиметричної залежності (ЄС)?'
  - '[!epistemic-humility] Аргументи "за" і "проти" в обох дебатах. Чи можливий синтез цих поглядів?'
  section: 'Конфліктна карта: Суб''єктність чи залежність?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Україна як "Малоросія", невід''ємна частина "єдиного народногосподарського
    комплексу". Її ресурси (зерно, вугілля, промисловість) служать центру. Незалежність — економічна катастрофа, викликана
    Заходом.'
  - 'Український наратив: 300 років систематичної колоніальної експлуатації. Голодомор як економічний геноцид. Пострадянська
    "газова голка" як інструмент неоколоніального контролю. Євроінтеграція як цивілізаційний вибір та шлях до суверенітету.'
  - 'Західний наратив: Україна як "перехідна економіка" (transitional economy). Фокус на корупції, олігархах, інституційній
    слабкості. Угода з ЄС розглядається через призму "умовності" (conditionality) та ринкових стандартів, а не деколонізації.'
  - '[!decolonization] Викриття механізмів, якими імперський наратив маскує експлуатацію під "братерство" та "спільну історію".'
  - '[!myth-buster] Міф про "щедру" радянську індустріалізацію України — аналіз реальної вартості та наслідків.'
  section: 'Зіткнення наративів: Україна як економічний ресурс'
  words: 1700
- points:
  - 'Джерело 1: Економічні статті Переяславських угод (1654) або аналогічних договорів. Аналіз лексики протекціонізму, "царської
    руки" та збору податків.'
  - 'Джерело 2: Фрагменти Угоди про асоціацію між Україною та ЄС (DCFTA). Аналіз лексики "гармонізації", "регуляторного наближення",
    "технічних стандартів".'
  - '[!epistemic-humility] Порівняльний аналіз: як прямий військово-політичний контроль (XVII ст.) трансформувався у "м''яку
    силу" нормативного та ринкового контролю (XXI ст.)? Чи є друге меншим злом?'
  - 'Авторство та порядок денний: хто писав ці документи? Чиї інтереси вони відображають в першу чергу — центру чи периферії?'
  section: 'Джерельна критика: Мова економічного контролю'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, Угода з ЄС — це деколонізація чи ре-колонізація? Студент формулює відповідь, використовуючи
    терміни "асиметрична взаємозалежність", "нормативна влада", "структурна залежність".'
  - 'Мета-рефлексія: Як цей модуль змінив ваше розуміння слів "незалежність", "партнерство", "інтеграція" в економічному контексті?'
  - '[!decolonization] Зв''язок із сьогоденням: як три ключові наративи (російський, український, західний) проявляються в
    сучасних дискусіях про повоєнну відбудову України та іноземну допомогу?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiographical debate on Ukraine''s economic history: Russian imperial/Soviet narrative vs. Ukrainian national
  narrative vs. Western perspectives on dependency, exploitation, and integration into the EU.'
level: ISTORIO
module: istorio-107
objectives:
- Аналізувати різні історіографічні наративи (імперський, національний, західний) щодо економічної історії України
- Застосовувати методику критики джерел до економічних та політичних документів, таких як торговельні угоди
- Розрізняти поняття 'деколонізація', 'неоколоніалізм', 'структурна залежність' та 'асиметрична інтеграція'
- Формулювати власну аргументовану позицію щодо ризиків та переваг економічної інтеграції України до ЄС
