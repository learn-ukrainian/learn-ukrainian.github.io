- Аналізувати багатофакторну модель української стійкості у 2022 році, розрізняючи суспільні, інституційні та лідерські компоненти
- Критично порівнювати український, російський та західний наративи про причини та характер повномасштабного вторгнення
- Застосовувати методи джерельної критики до аналізу політичних промов та медійних повідомлень
- Формулювати аргументовану позицію щодо ролі довгострокових трансформацій (з 2014 року) у підготовці до національного спротиву
