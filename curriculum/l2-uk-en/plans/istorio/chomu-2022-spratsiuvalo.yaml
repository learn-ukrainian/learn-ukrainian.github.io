content_outline:
- points:
  - 'Провокація: "Київ за три дні" — очікування агресора та провідних розвідок світу. Чому їхній прогноз провалився, а готовність
    України до спротиву виявилася неочікувано високою?'
  - 'Два погляди: 1) "Це був дивовижний вибух громадянської солідарності, що народився в перші години вторгнення". 2) "Це
    був закономірний результат восьми років війни та інституційних трансформацій". Яка теза ближча до істини?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що стало вирішальним — інституційна спроможність чи суспільна самоорганізація? [!epistemic-humility]'
  - 'Позиція А (інституціоналісти): Реформа ЗСУ за стандартами НАТО, бойовий досвід армії, створення Сил ТрО та реформа децентралізації
    створили скелет спротиву.'
  - 'Позиція Б (соціологи): Горизонтальні зв''язки, волонтерський рух, що визрів з 2014 року, та психологічна готовність суспільства
    до мобілізації стали "нервовою системою" спротиву.'
  - 'Дебат 2: Роль лідерства — харизма Зеленського чи ефективність місцевих еліт?'
  - 'Позиція А (персоналісти): Комунікаційна стратегія та особистий приклад президента ("I need ammunition, not a ride") мобілізували
    націю та світ.'
  - 'Позиція Б (децентралісти): Стійкість продемонстрували мери та голови громад, які взяли на себе відповідальність на місцях,
    довівши ефективність реформи децентралізації.'
  section: 'Конфліктна карта: Спонтанність чи підготовка?'
  words: 900
- points:
  - 'Російський імперський наратив: "Спеціальна військова операція" для "денацифікації" та "демілітаризації" України; "один
    народ"; Україна як "failed state", нездатна до самостійного існування; очікування на "квіти від населення". [!decolonization]'
  - 'Український наратив: Спротив як продовження багатовікової боротьби за незалежність; війна, що почалася у 2014, а не 2022;
    нація, що консолідувалася через досвід Майдану та 8 років війни; єдність армії, влади та громадянського суспільства. [!myth-buster]'
  - 'Західний наратив (в еволюції): Початковий скепсис (прогнози про падіння Києва за 72 години); подив від масштабу та ефективності
    українського спротиву; переоцінка можливостей російської армії та недооцінка української стійкості; поступовий перехід
    від "допомогти Україні не програти" до "допомогти Україні перемогти".'
  - 'Методологія та agenda: Аналіз джерел, на яких базується кожен наратив (офіційні заяви, пропагандистські ЗМІ, соціологічні
    дані, свідчення очевидців).'
  section: 'Зіткнення наративів: Анатомія українського спротиву'
  words: 1700
- points:
  - 'Джерело 1: Промова Путіна від 24.02.2022 про початок "СВО". Аналіз риторики, евфемізмів ("вимушений захід"), історичних
    маніпуляцій (апеляція до ВВВ) та цільової аудиторії (внутрішня російська).'
  - 'Джерело 2: Реконструкція комунікації Володимира Зеленського в перші дні вторгнення (відмова від евакуації, звернення
    до українців та світових лідерів). Аналіз символізму ("Я тут"), автентичності та ефекту мобілізації, який це справило
    на націю та партнерів. [!epistemic-humility]'
  - 'Джерело 3: Перші звіти західних аналітичних центрів (ISW, RUSI) та розвідок. Критика методології: на чому базувались
    їхні прогнози про швидку поразку України? Які фактори (мотивація, суспільна стійкість) не були враховані у військових
    моделях?'
  section: 'Джерельна критика: "I need ammunition" vs "спеціальна військова операція"'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чому 2022 рік "спрацював"? Студент має сформулювати комплексну відповідь, поєднуючи інституційні,
    суспільні та лідерські фактори.'
  - 'Не випадковість, а кульмінація: Стійкість 2022 року як результат процесів, що відбувалися в Україні щонайменше з 2014
    року. Відмова від наративу "дива".'
  - 'Зв''язок із сьогоденням: Як уроки мобілізації 2022 року впливають на подальшу стратегію ведення війни та післявоєнну
    відбудову? Які наративні патерни, проаналізовані в модулі, продовжують використовуватись у сучасній міжнародній політиці
    та пропаганді? [!decolonization]'
  section: Дискусія та підсумок
  words: 700
