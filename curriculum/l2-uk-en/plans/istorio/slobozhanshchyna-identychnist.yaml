content_outline:
- points:
  - 'Провокація: Українські козаки тікають від Речі Посполитої, щоб заснувати «вільні землі» (слободи), але присягають на
    вірність московському царю. Це акт виживання, державницька мудрість чи зрада?'
  - 'Дві цитати без авторства: одна описує заселення Слобожанщини як «возз''єднання» братніх народів, інша — як українську
    колонізацію Дикого Поля. Студент має припустити, хто автори.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Заселення Слобожанщини — це стихійна українська колонізація чи керований російський проєкт? Розглядаємо докази
    на користь обох версій.'
  - 'Дебат 2: Слобідські полки — це автономне козацьке утворення чи просто нерегулярні війська на службі імперії? Порівняння
    з Гетьманщиною та Запоріжжям.'
  - '[!epistemic-humility] Аналіз указу 1765 р. про скасування полкового устрою: чи це була «зрада» з боку імперії, чи логічний
    кінець тимчасового військового союзу?'
  section: 'Конфліктна карта: Прикордоння чи форпост?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Слобожанщина як частина «Новоросії» або «Півдня Росії». Заселення — акт милості
    царя. Харків — російськомовне місто, промисловий центр СРСР.'
  - 'Український наратив: Слобожанщина як продовження українського життєвого простору. Козаки як носії державності. Харків
    — центр національного відродження (університет, романтики, видавництва), перша столиця УСРР як компроміс.'
  - 'Західний наратив: Слобожанщина як класичне «прикордоння» (frontier). Аналіз через порівняння з американським Заходом.
    Зона культурного обміну, гібридних ідентичностей та державного насильства.'
  - '[!decolonization] Викриття міфу про «віковічну дружбу»: як імперія використовувала українців для захисту своїх кордонів,
    а потім асимілювала їх.'
  - '[!myth-buster] Харків не був «подарований» Україні. Він був і залишається українським містом, що розвивалося на перетині
    культур, але в межах українського етнічного масиву.'
  section: 'Зіткнення наративів: Ідентичність Слобожанщини'
  words: 1700
- points:
  - 'Джерело 1: Фрагмент з твору Григорія Квітки-Основ''яненка, що оспівує Харків та його мешканців. Аналіз: ідеалізація,
    створення регіонального міфу, мова, приховані сенси.'
  - 'Джерело 2: Уривок з імперського указу про створення Слобідсько-Української губернії. Аналіз: бюрократична мова, мета
    — уніфікація, стирання відмінностей, централізація влади.'
  - '[!epistemic-humility] Порівняльний аналіз: як два різні документи створюють абсолютно різні образи однієї й тієї ж реальності.
    Чия версія «правдивіша» і для кого?'
  section: 'Джерельна критика: Романтики vs. Імперія'
  words: 1500
- points:
  - 'Повернення до розминки: чи змінилася ваша думка про перших поселенців? Обґрунтуйте свою позицію, використовуючи терміни
    «агентність», «структура», «історичний контекст».'
  - 'Харків 2022: як битва за місто та спротив окупації підтверджують, спростовують або ускладнюють наративи, проаналізовані
    в модулі?'
  - '[!decolonization] Як розуміння історіографічних наративів про Слобожанщину допомагає протидіяти сучасній російській пропаганді
    про «один народ» та «історичні землі Росії»?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiography of Slobozhanshchyna: Ukrainian self-colonization vs. Russian imperial project, Kharkiv as a cultural
  center, Russification, and modern identity under siege.'
level: ISTORIO
module: istorio-076
objectives:
- Аналізувати щонайменше три різні історіографічні наративи (російський, український, західний) щодо минулого Слобожанщини
- Застосовувати методику критики джерел до уривків з історичних документів та літературних творів
- Розрізняти поняття «колонізація», «самоколонізація» та «внутрішня колонізація» на прикладі регіону
- Формулювати обґрунтовану позицію щодо зв'язку між історичними наративами про Слобожанщину та сучасною війною
