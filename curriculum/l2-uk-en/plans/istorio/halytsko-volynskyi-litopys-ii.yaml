content_outline:
- points:
  - 'Провокація: уривок з Галицько-Волинського літопису, що описує битву. Чи це історія, чи епічна поема? Де межа?'
  - Поряд — уривок з іншої, більш сухої хроніки. Якому джерелу ви довіряєте більше і чому?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Літопис — це об''єктивна історія чи політична пропаганда? Аналіз риторичних прийомів (гіпербола, порівняння)
    як інструментів впливу.'
  - 'Дебат 2: Чиїми очима дивиться літописець? Дискусія про впливи: візантійська традиція vs. західноєвропейська рицарська
    культура.'
  - '[!epistemic-humility] Позиція 1 (Грушевський): літопис — це політичний документ, що обґрунтовує претензії Романовичів
    на владу. Позиція 2 (Чижевський): це перш за все літературний твір, що існує за законами жанру «військової повісті».'
  section: 'Конфліктна карта: Літопис як джерело'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: ГВЛ як історія «Юго-Западной Руси», сепаратистського уламка, що занепав.
    Акцент на «усобицях», що підкреслює «рятівну» місію Москви як збирача земель.'
  - 'Український наратив: ГВЛ як доказ безперервності української державності після занепаду Києва. Князі — європейські монархи
    (Rex Russiae), а Галичина — центр Русі.'
  - 'Західний наратив: ГВЛ як приклад ''frontier state building''. Аналіз у порівнянні з Польщею, Угорщиною. У центрі уваги
    — геополітичні маневри між католицьким Заходом та Золотою Ордою.'
  - '[!decolonization] Викриття імперського міфу про «спільну колиску» — ГВЛ показує відмінний від північно-східного політичний
    та культурний вектор розвитку.'
  - '[!myth-buster] "Занепад" Волинської частини — це не кінець історії, а зміна політичного центру та стилю письма, що відображає
    нові реалії.'
  section: 'Зіткнення наративів: Образ князя і Русі'
  words: 1700
- points:
  - 'Close reading: Текст опису битви під Ярославом (1245). Повний текст уривка з глосами.'
  - 'Автор і його agenda: Хто міг бути автором? Придворний книжник Данила Галицького? Воїн? Як його позиція впливає на опис
    битви?'
  - 'Методологія: Як літописець конструює розповідь? Використання біблійних цитат, епічних порівнянь («як лев», «як орел»).
    Це прикраса чи спосіб надати подіям вищого сенсу?'
  - '[!epistemic-humility] Порівняння з іншими джерелами: чи є угорські або польські хроніки, що описують цю битву? Як їхні
    версії відрізняються?'
  section: 'Джерельна критика: Опис битви під Ярославом'
  words: 1500
- points:
  - 'Повернення до розминки: Тепер, проаналізувавши стиль і наратив, як би ви відповіли на питання: ГВЛ — це надійне джерело
    чи літературний твір?'
  - 'Мета-рефлексія: Що цей модуль навчив про те, як історики працюють із джерелами? Чому стиль тексту є таким же важливим,
    як і його зміст?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна російська пропаганда використовує прийоми, схожі на ті, що ми бачили
    в імперському наративі про ГВЛ (наприклад, зображення України як «failed state»)?'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of the Galician-Volhynian Chronicle, its literary style as a "military tale", Western influences,
  and the construction of its narrative versus Russian imperial and Western academic interpretations.
level: ISTORIO
module: istorio-016
objectives:
- Розрізняти український, російський імперський та західний наративи щодо Галицько-Волинської держави
- Застосовувати методи джерельної критики для аналізу фрагментів літопису, виявляючи упередження та наративну стратегію автора
- Аналізувати стилістичні особливості «військової повісті» та їхній вплив на історичну інтерпретацію
- Пояснювати, як ідеологічні та політичні цілі впливають на конструювання історичної розповіді
