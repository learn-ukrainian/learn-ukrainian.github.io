content_outline:
- points:
  - 'Провокація: "Історію пишуть переможці". Чи є "декомунізація" просто переписуванням радянської історії на націоналістичну?
    Чи це повернення до правди? Наведіть аргументи.'
  - 'Цитата-загадка: "В Україні немає громадянської війни, є лише незакінчена війна за незалежність". Хто міг би це сказати
    — український історик, західний політолог чи російський пропагандист? Поясніть.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Декомунізація — це відновлення історичної справедливості чи політичний інструмент? Позиція 1 (В''ятрович, УІНП):
    це акт деколонізації, необхідний для національної безпеки. Позиція 2 (критики): це політизація історії, що створює нових
    "правильних" героїв замість старих.'
  - 'Дебат 2: Інститут національної пам''яті (УІНП) — це академічна установа чи орган державної ідеології? Порівняння з польським
    IPN та німецьким "штазі-архівом".'
  - '[!epistemic-humility] Як розрізнити "політику пам''яті" та "політизацію історії"? Де проходить межа між формуванням національного
    наративу та маніпуляцією?'
  section: 'Конфліктна карта: Пам''ять чи політика?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Українську історію вигадали в австрійському генштабі". Стверджує, що українська
    державність і нація — штучні, а історіографія — політичний проєкт, спрямований проти "спільної історії". Омітує Голодомор,
    репресії, русифікацію. Агенда: заперечення української суб''єктності.'
  - 'Український наратив (після 1991): Повернення "забороненої історії" — Голодомор, УПА, репресоване Відродження. Реабілітація
    Грушевського. Акцент на тяглості державності від Русі до сучасності. Методологія: відкриття архівів, усна історія. Агенда:
    конструювання постколоніального національного наративу.'
  - 'Західний наратив: Розглядає Україну через призму "транзитології" (перехід від СРСР до демократії). Часто фокусується
    на "проблемних" темах (ОУН, колабораціонізм), не завжди розуміючи колоніальний контекст. Методологія: порівняльний аналіз,
    критична теорія. Сліпі плями: погляд на Україну як на "територію між" Росією та Європою.'
  - '[!decolonization] Розкриття механізму, як радянська історіографія перетворювала національно-визвольну боротьбу на "буржуазний
    націоналізм" чи "фашизм".'
  - '[!myth-buster] Міф про те, що до 1991 року в Україні не було "справжньої" історичної науки. Аналіз "партизанської" історіографії
    радянських часів.'
  section: 'Зіткнення наративів: Історіографія після 1991'
  words: 1700
- points:
  - 'Close reading: Аналіз тексту закону "Про засудження комуністичного та націонал-соціалістичного (нацистського) тоталітарних
    режимів...". Що саме забороняється? Які терміни використовуються? ("пропаганда", "символіка").'
  - 'Авторство та інституційний контекст: Роль Українського інституту національної пам''яті та Володимира В''ятровича. Які
    цілі вони декларували?'
  - 'Джерела та методологія: На яку міжнародну практику (досвід країн Балтії, Польщі, Чехії) спиралися автори законів?'
  - '[!epistemic-humility] Критика законів з боку Венеціанської комісії та західних істориків. Закиди щодо свободи слова та
    неоднозначності деяких формулювань. Як УІНП відповідав на цю критику?'
  section: 'Джерельна критика: Аналіз "Законів про декомунізацію" (2015)'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є декомунізація переписуванням історії? Студент формулює відповідь, використовуючи поняття
    "деколонізація", "політика пам''яті", "наратив".'
  - 'Мета-рефлексія: Що процес становлення нової історіографії говорить нам про те, як нація конструює свою ідентичність після
    розпаду імперії?'
  - 'Зв''язок із сьогоденням: Як наративи, що зіткнулися в 90-х, проявляються у сучасній російській пропаганді про "один народ"
    та "неіснуючу Україну"?'
  - '[!decolonization] Чому для Росії контроль над українською історією є таким важливим інструментом війни?'
  section: Дискусія та підсумок
  words: 700
focus: Post-1991 Ukrainian historiography, de-tabooing (Holodomor), decommunization, UINP, narrative wars, decolonization
  of history
level: ISTORIO
module: istorio-007
objectives:
- Аналізувати три основні історіографічні наративи про Україну (російський, український, західний), виявляючи їхні методології,
  цілі та сліпі плями
- Критично оцінювати процес декомунізації як інструмент політики пам'яті та деколонізації
- Застосовувати методику джерельної критики до аналізу офіційних документів (на прикладі законів про декомунізацію)
- Формулювати аргументовану позицію щодо ролі історика та історичної науки в постколоніальному суспільстві
