module: istorio-020
level: ISTORIO
sequence: 20
slug: litopys-samovidtsia
version: '3.0'
title: 'Літопис Самовидця: Голос очевидця'
focus: history
pedagogy: seminar
word_target: 5000
objectives:
- 'Analyze the causes and consequences of літопис самовидця: голос очевидця'
- Evaluate the historical significance of найстаріший козацький літопис
content_outline:
- section: Вступ — Найстаріший козацький літопис
  points:
  - Чому «Самовидець» — очевидець
  - Найменш стилізований з трьох
  - Цінність безпосередності
  - Хронологія — 1648-1702
  words: 700
- section: Питання авторства
  points:
  - Анонімність — хто написав?
  - Гіпотези — Роман Ракушка-Романовський?
  - Внутрішні свідчення тексту
  - Чому важко встановити
  words: 700
- section: Зміст і структура
  points:
  - Від 1648 до 1702 року
  - Хмельницький — детально
  - Руїна — хаос і громадянська війна
  - Останні гетьмани
  - Що охоплено, що пропущено
  words: 700
- section: Особливості стилю
  points:
  - Простий, діловий стиль
  - Мінімум риторики
  - Фактографічність
  - Мова — українська канцелярська
  words: 700
- section: Фрагмент — Початок повстання 1648
  points:
  - Текст (з глосами)
  - Як описано Хмельницького
  - Перші перемоги
  - Позиція автора — за чи проти?
  words: 700
- section: Критика джерела
  points:
  - Очевидець — але з якої позиції?
  - Що автор міг знати, чого не міг
  - Пізніші редакції — що додано?
  - Порівняння з іншими джерелами
  words: 700
- section: Підсумок
  points:
  - Найближче до «первинного» джерела
  - Цінність для історика
  - Зв'язок із наступними літописами
  words: 800
