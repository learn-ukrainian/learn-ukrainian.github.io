content_outline:
- points:
  - 'Провокація: Чи є звіт очевидця автоматично правдою? Уявіть, що ви читаєте два звіти про одну й ту саму битву: один написаний
    простим солдатом, інший — генералом. Чиїй версії ви довіряєте більше і чому?'
  - 'Цитата для роздумів: «Я, що сам у той час на Україні проживав і не яко чужим умом, але своїм власним розумом усе те,
    що діялося, обміркував, те все у цьому літописі зобразив». Як ця заява автора впливає на ваше сприйняття тексту?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хто написав "Літопис Самовидця"? Гіпотеза про Романа Ракушку-Романовського (генерального підскарбия) vs. інші
    версії (священник, козацький урядовець). Як різні версії авторства змінюють нашу інтерпретацію тексту?'
  - 'Дебат 2: Чи є "Самовидець" об''єктивним джерелом? Позиція 1: Так, його простий, фактографічний стиль ("сухий", "канцелярський")
    свідчить про намагання бути неупередженим. Позиція 2: Ні, відсутність риторики є власним стилістичним прийомом, що маскує
    глибоко прокозацьку, станову позицію автора.'
  - '[!epistemic-humility] Встановлення автора — це не просто розгадування загадки. Це фундаментально змінює те, як ми читаємо
    текст, змушуючи питати: з чиєї перспективи ми бачимо Руїну?'
  section: 'Конфліктна карта: Авторство та об''єктивність'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Повстання Хмельницького як "возз''єднання" України з Росією. Самовидець використовується
    вибірково для ілюстрації "польського гніту" та "народного прагнення" до московського царя. Ігнорується українська державницька
    ідея.'
  - 'Український наратив (на основі "Самовидця"): Повстання як відповідь на порушення козацьких прав та релігійний утиск.
    Хмельницький — захисник "вольностей" та православної віри. Літопис є голосом самого народу, "найстарішим" та "найправдивішим"
    джерелом.'
  - 'Західний наратив (на прикладі польської історіографії та сучасних досліджень): Повстання як елемент загальноєвропейської
    "Кризи XVII століття". Аналіз соціально-економічних причин (земельне питання, магнатське свавілля) та ролі зовнішніх гравців
    (Кримське ханство, Османська імперія). Самовидець розглядається як одне з багатьох джерел, що потребує критичної перевірки.'
  - '[!decolonization] Порівняння показує, як імперія використовує автентичне джерело, вириваючи його з контексту, щоб створити
    міф про "вічне прагнення до єдності", ігноруючи власну агентність та цілі українського козацтва.'
  - '[!myth-buster] "Самовидець" не є "голосом народу". Це голос освіченого представника козацької старшини, чиї інтереси
    не завжди збігалися з інтересами простого селянства чи міщан.'
  section: 'Зіткнення наративів: Початок повстання 1648 року'
  words: 1700
- points:
  - 'Аналіз мови: "Канцелярський стиль" як ознака епохи. Використання полонізмів, церковнослов''янізмів та військової термінології.
    Що мова говорить про освіту та соціальний статус автора?'
  - 'Анонімність та її наслідки: Чому автор залишився анонімним? Страх перед репресіями? Бажання надати тексту більшої ваги,
    ніби говорить сама історія? Як анонімність впливає на довіру до тексту?'
  - 'Очевидець, але не всевидець: Аналіз тексту на предмет того, що автор міг бачити на власні очі (наприклад, події на Правобережжі),
    а про що він міг знати лише з чуток (події на Запоріжжі чи в Москві).'
  - '[!epistemic-humility] Критика джерела не руйнує його цінність, а навпаки, дозволяє використовувати його більш точно та
    відповідально, розуміючи його сильні сторони та обмеження.'
  section: 'Джерельна критика: Як читати "Самовидця"?'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є звіт очевидця автоматично правдою? Як змінилася ваша відповідь після аналізу "Літопису Самовидця"?'
  - 'Мета-рефлексія: Чому "Літопис Самовидця" є наріжним каменем української історіографії, незважаючи на анонімність та потенційну
    упередженість? Яку роль він відіграв у формуванні української національної ідентичності?'
  - '[!decolonization] Як знання про те, як імперські наративи маніпулюють джерелами на кшталт "Самовидця", допомагає нам
    розпізнавати сучасну російську пропаганду про історію України?'
  section: Дискусія та підсумок
  words: 700
focus: Літопис Самовидця as a foundational text of Ukrainian historiography, anonymity and authorship, source criticism, comparison
  of Cossack and Polish narratives on the 1648 uprising
level: ISTORIO
module: istorio-020
objectives:
- Аналізувати "Літопис Самовидця" як першоджерело, розрізняючи факти, інтерпретації та упередження
- Порівнювати та деконструювати український, російський імперський та західний наративи про Хмельниччину
- Застосовувати методи джерельної критики для оцінки автентичності, авторства та надійності історичного тексту
- Формулювати аргументовану позицію щодо ролі анонімних свідчень у створенні національної історичної пам'яті
