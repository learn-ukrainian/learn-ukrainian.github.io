content_outline:
- points:
  - 'Провокація: Дві карти смертності 1932-33 рр. Одна показує «неврожай», інша — цілеспрямовану атаку. Не знаючи легенди,
    як визначити, де яка?'
  - '[!epistemic-humility] Що робить географічний патерн смертності «штучним» на вигляд?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Географія як доказ геноциду (свідоме покарання українського села) vs географія як наслідок безгосподарності
    (провал політики суцільної колективізації).'
  - 'Дебат 2: Що було вирішальним фактором вимирання: етнічність чи економіка? Тиск на зернові райони сам по собі був формою
    етнічного покарання чи суто економічною експропріацією?'
  - '[!epistemic-humility] Аналіз карти не дає остаточної відповіді без залучення документів, але він дозволяє відкинути певні
    версії (напр., про «природні причини») як неспроможні.'
  section: 'Конфліктна карта: Причина чи наслідок?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: заперечення, применшення, евфемізм «продовольчі труднощі». Карти, що приховують
    злочин: маніпуляція масштабом, уникнення етнічних даних, розчинення української трагедії в «загальносоюзній».'
  - 'Український наратив: карта як головний доказ геноциду. Роботи Інституту демографії, проєкт «Атлас Голодомору». Збіг карти
    надсмертності з кордонами УНР 1918 р. та етнічною картою розселення українців (включно з Кубанню).'
  - 'Західний наратив: еволюція від «голоду» (famine) до «терору-голоду» (terror-famine). Праці Конквеста, Епплбом, Снайдера.
    Методологія: демографічна реконструкція та статистичне моделювання для доказу «штучності» голоду.'
  - '[!decolonization] Як радянська цензура та західна «радянологія», що не мала доступу до архівів, десятиліттями робили
    невидимою географію злочину.'
  - '[!myth-buster] Міф про «загальносоюзний голод» спростовується картою: чому українські села на кордоні з РРФСР вимирали,
    а російські за кілька кілометрів — ні?'
  section: 'Зіткнення наративів: Картографування Голодомору'
  words: 1700
- points:
  - 'Джерело 1: Аналіз радянських демографічних звітів 1930-х. Аналіз мови («продовольчі труднощі»), вибірковості даних (ігнорування
    сіл), маніпулятивних методів картографування, засекречення результатів перепису 1937 року.'
  - 'Джерело 2: Сучасні ГІС-карти Голодомору (проєкт UCRDC). Методологія збору даних: поєднання даних РАЦС, архівів СБУ, свідчень
    очевидців. Як демографи реконструюють втрати на рівні окремих районів і сіл.'
  - '[!epistemic-humility] Критика обох джерел: радянські — пропаганда, але містять фактичний матеріал для аналізу маніпуляцій;
    сучасні — наукові, але спираються на реконструкції та моделювання через не повноту первинних даних, знищених режимом.'
  section: 'Джерельна критика: Карти Сталінської доби vs. Сучасна демографія'
  words: 1500
- points:
  - 'Повернення до розминки: студент пояснює, які саме риси (концентрація, збіг з етнічними та політичними кордонами, «чорні
    дошки») видають «штучність» геноцидної карти.'
  - 'Мета-рефлексія: Чому картографування злочину та його візуалізація є потужним актом його визнання та інструментом подолання
    імперського наративу заперечення?'
  - '[!decolonization] Зв''язок із сьогоденням: аналіз сучасних російських пропагандистських карт, що «доводять» історичну
    приналежність українських земель до Росії. Як ті самі механізми маніпуляції, вивчені на прикладі Голодомору, працюють
    сьогодні.'
  section: Дискусія та підсумок
  words: 700
focus: Regional disparities in Holodomor mortality, cartographic analysis as evidence, comparison of Ukrainian, Soviet/Russian,
  and Western historiographical interpretations of the Famine's geography
level: ISTORIO
module: istorio-048
objectives:
- Аналізувати, як географічний розподіл смертності під час Голодомору використовується як доказ у наукових та політичних дебатах
- Критично оцінювати різні історіографічні наративи (радянський, український, західний) через призму картографічних джерел
- Застосовувати методи джерельної критики до історичних карт та демографічних даних
- Пояснювати зв'язок між географією Голодомору та сучасними проявами російської інформаційної війни
