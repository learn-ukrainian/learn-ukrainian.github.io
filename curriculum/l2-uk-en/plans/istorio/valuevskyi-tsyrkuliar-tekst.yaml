content_outline:
- points:
  - 'Провокація: «...никакого особеннаго малороссійскаго языка не было, нѣтъ и быть не можетъ». Цей рядок написав міністр
    внутрішніх справ імперії. Як один документ може заперечувати існування цілої мови? Які політичні цілі ховаються за такими
    формулюваннями?'
  - 'Завдання для студента: не знаючи контексту, спробуйте вгадати, в якому столітті та в якій імперії міг з''явитися такий
    документ. Які ваші аргументи?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Циркуляр — це стратегічний крок у довготривалій політиці русифікації чи тактична, панічна реакція на Польське
    повстання 1863 року?'
  - 'Дебат 2: Чи був «українофільський рух» реальною політичною загрозою сепаратизму, як стверджував Валуєв, чи суто культурним
    рухом, який імперія не могла відрізнити від політичного інакомислення?'
  - '[!epistemic-humility] Позиція А: циркуляр — це логічне продовження імперської політики, що розглядала українську ідентичність
    як загрозу. Позиція Б: саме повстання поляків спровокувало жорстку реакцію, побоюючись союзу українців та поляків.'
  section: 'Конфліктна карта: ''Превентивний удар'' чи ''Панічна реакція''?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: Українська мова — це «малоросійське наріччя» російської, непридатне для високої
    літератури. Українофіли — це інтригани, яких фінансують вороги імперії (поляки, австрійці). Заборона — це лише адміністративний
    захід для захисту єдності та боротьби з сепаратизмом.'
  - 'Український наратив: Циркуляр — це акт лінгвоциду, свідома спроба знищити основу національної ідентичності. Це реакція
    на успіхи української культури (Шевченко). Заборона доводить, що імперія визнавала українську мову окремою і боялася її
    сили. Це ключовий епізод у багатовіковій історії національного гніту.'
  - 'Західний наратив: Розглядає циркуляр у контексті європейського націєтворення 19 ст. Порівнює з політикою інших імперій
    (Британської, Австро-Угорської). Аналізує документ як приклад придушення ідентичності меншин, що є типовим для незахищених
    імперій, які бояться модернізації та національних рухів на своїх околицях.'
  - '[!decolonization] Викриття механіки імперської риторики: як концепція «триєдиного народу» використовувалася для виправдання
    культурного пригнічення.'
  - '[!myth-buster] Міф про те, що заборона була «неповною» або «не дуже суворою». Аналіз показує, що вона ефективно зупинила
    розвиток українського книговидання у підросійській Україні.'
  section: 'Зіткнення наративів: Мовна політика Російської імперії'
  words: 1700
- points:
  - 'Close reading тексту: аналіз ключових фраз. Що означає формула «не було, немає і бути не може» з погляду імперської ідеології?
    Як термін «наріччя» використовується як політичний інструмент?'
  - 'Бюрократична мова як знаряддя: аналіз стилю документа — сухий, канцелярський тон маскує акт культурного насильства. Як
    офіційний стиль створює ілюзію легітимності?'
  - 'Автор та його agenda: Хто такий Петро Валуєв? Його кар''єра, політичні погляди. Чи був він просто виконавцем волі імператора,
    чи активним ідеологом заборони?'
  - '[!epistemic-humility] Внутрішні суперечності документа: як можна заборонити те, чого, за словами автора, не існує? Чому
    були зроблені винятки для релігійної літератури? Що ці суперечності говорять про справжні мотиви влади?'
  section: 'Джерельна критика: Анатомія імперського документа'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер студент розуміє фразу про «неіснуючу мову»? Які рівні смислу (політичний, ідеологічний,
    психологічний) він може в ній виділити?'
  - 'Довготривалі наслідки: Як циркуляр вплинув на переміщення центру українського культурного життя до Галичини (Австро-Угорщина)?
    Як він підготував ґрунт для ще жорсткішого Емського указу 1876 року?'
  - '[!decolonization] Зв''язок із сучасністю: Аналіз паралелей між риторикою Валуєвського циркуляра та сучасною російською
    пропагандою, яка заперечує право українського народу на існування, мову та державу. Як старі імперські наративи відроджуються
    у 21 столітті?'
  section: Дискусія та підсумок
  words: 700
focus: 'The Valuev Circular of 1863: analysis of the full text, the imperial logic of language prohibition (linguicide), and
  the historiographical debate surrounding its causes and consequences.'
