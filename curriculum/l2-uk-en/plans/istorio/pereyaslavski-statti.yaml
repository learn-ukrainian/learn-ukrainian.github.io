objectives:
- Критично аналізувати різні історіографічні наративи (український, російський, польський, західний) щодо Переяславської угоди
- Застосовувати методи джерельної критики до тексту Березневих статей, виявляючи неоднозначності та потенційні маніпуляції
- Розрізняти поняття 'церемонія', 'договір', 'рада' та 'статті' в контексті подій 1654 року
- Формулювати аргументовану позицію щодо юридичного статусу та історичних наслідків Переяславської угоди, посилаючись на джерела
