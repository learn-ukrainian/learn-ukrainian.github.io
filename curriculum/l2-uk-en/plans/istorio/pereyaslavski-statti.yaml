content_outline:
- points:
  - 'Провокація: Два описи однієї події. Перший: «возз''єднання братніх народів». Другий: «прийняття під високу руку государя».
    Який опис точніший для Переяслава 1654 року? І що кожен з них приховує?'
  - 'Цитата для роздумів: «У Переяславі не було угоди, була лише вистава. Справжній договір написали пізніше, в Москві». Чи
    згодні ви з цим?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: [!epistemic-humility] Юридичний статус угоди. Українська школа (Сергій Єкельчик): «персональна унія» або «васалітет»
    зі збереженням суверенітету. Російська імперська школа (Василь Ключевський): «возз''єднання», повернення «відторгнутої»
    частини до «єдиного» цілого.'
  - 'Дебат 2: Що є справжнім договором? Переяславська рада (публічна церемонія присяги) vs. Березневі статті (письмовий документ,
    підписаний у Москві). Чи мала Рада юридичну силу без письмового договору?'
  - 'Інцидент з присягою: відмова московських бояр присягати від імені царя. Що цей момент говорить про асиметрію влади та
    різне розуміння договірних зобов''язань?'
  section: 'Конфліктна карта: Союз чи поглинання?'
  words: 900
- points:
  - '1. Російський імперський/радянський наратив: [!myth-buster] «Вічне возз''єднання». Подія подається як закономірний фінал
    багатовікової боротьби українського народу за єднання з Росією. Голодомор, репресії та русифікація в цьому наративі оминаються.'
  - '2. Український національний наратив: [!decolonization] «Трагічна помилка» або «тимчасовий військовий союз». Переяслав
    розглядається як вимушений крок Хмельницького, наслідки якого виявились катастрофічними для української державності. Акцент
    на порушенні Москвою умов договору.'
  - '3. Польський наратив: «Зрада козаків». Переяслав як акт віроломства козацької еліти, що порушила вірність Речі Посполитій
    і віддала Україну під владу Москви, що призвело до занепаду Речі Посполитої.'
  - '4. Західний наратив: «Типовий васалітет XVII століття». Угода розглядається не як унікальна подія, а як один із багатьох
    прикладів, коли менша держава шукає протекції у сильнішого сусіда, жертвуючи частиною суверенітету (зовнішня політика)
    заради внутрішньої автономії.'
  section: 'Зіткнення наративів: Переяславська угода'
  words: 1700
- points:
  - 'Аналіз тексту: розбір ключових пунктів з 23 статей, поданих Хмельницьким, і резолюцій царя. Які пункти були прийняті,
    а які відхилені або змінені?'
  - 'Стаття про реєстр: "60 000". Чому чисельність армії була ключовим елементом суверенітету?'
  - 'Стаття про зовнішні зносини: дозвіл на відносини з усіма, крім польського короля та османського султана. Як цей пункт
    обмежував геополітичну агентність Гетьманщини?'
  - 'Проблема копій: оригінал Березневих статей не зберігся. Існують лише копії, які відрізняються в деталях. Як відсутність
    єдиного аутентичного тексту впливає на інтерпретації?'
  section: 'Джерельна критика: Читаємо Березневі статті'
  words: 1500
- points:
  - 'Повернення до розминки: після аналізу джерел та наративів, як би ви тепер описали події 1654 року? Які слова ви б обрали
    і чому?'
  - '[!decolonization] Деконструкція міфу про «возз''єднання»: як цей наратив використовувався в російській та радянській
    пропаганді для легітимізації панування над Україною?'
  - 'Історична пам''ять vs. історичний документ: чому церемоніальна присяга в Переяславі затьмарила в народній пам''яті нудний
    бюрократичний текст Березневих статей, хоча саме він мав реальну силу?'
  - 'Зв''язок із сьогоденням: як сучасна російська агресія проти України використовує та переосмислює наративи, що походять
    від Переяслава?'
  section: Дискусія та підсумок
  words: 700
focus: 'The Pereyaslav Agreement of 1654: treaty analysis, historiographical debate (union vs. annexation), source criticism
  of the March Articles, and the legacy of the "reunification" myth.'
