content_outline:
- points:
  - 'Провокація: Вам представлено два описи індустріалізації 1930-х. Один — про «героїчну працю та створення гігантів промисловості».
    Інший — про «викачування ресурсів та економіку геноциду». Не знаючи автора, який опис ви б приписали радянському джерелу,
    а який — сучасному українському? Поясніть свою логіку.'
  - 'Цитата для роздумів: «Ми перетворили аграрну країну на індустріальну державу!» Чи може це гасло бути одночасно і правдою,
    і маніпуляцією?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Індустріалізація — це був проект модернізації УРСР чи форма внутрішнього колоніалізму з боку Москви? Розгляд
    аргументів «за» (нові заводи, урбанізація) і «проти» (неконтрольований вивіз продукції, підпорядкування економіки центру).'
  - 'Дебат 2: Чи був Голодомор необхідною умовою та економічним інструментом індустріалізації (продаж зерна для закупівлі
    технологій), чи це окремий злочин, не пов''язаний з економікою напряму?'
  - '[!epistemic-humility] Західні історики (dependency theory) vs. радянські марксистські історики (теорія формацій) — абсолютно
    різні методологічні підходи до одного й того ж процесу.'
  section: 'Конфліктна карта: Модернізація чи колоніалізм?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Україна — відстала аграрна околиця, якій Москва «подарувала» промисловість.
    ДніпроГЕС та Донбас як символи «братньої допомоги». Методологія: вибіркові статистичні дані про зростання виробництва.
    Агенда: легітимізація панування центру. Сліпі плями: ціна індустріалізації, доля селянства, ГУЛАГ.'
  - 'Український наратив: Індустріалізація за рахунок пограбування українського села та Голодомору. Україна — сировинний придаток
    та «цех» для союзного ВПК, прибутки з якого йшли до Москви. Методологія: аналіз міжреспубліканських бюджетних потоків,
    демографічна статистика, усні історії. Агенда: утвердження суб''єктності України, визнання геноциду. [!decolonization]'
  - 'Західний наратив: Розгляд індустріалізації в УРСР як приклад state-led development, але з екстремальним рівнем державного
    насильства. Порівняння з індустріалізаціями в інших країнах (Британія, Японія). Методологія: порративно-історичний аналіз,
    теорії тоталітаризму. Сліпі плями: часто бракує розуміння колоніальної природи відносин Москва-Київ.'
  - '[!myth-buster] Міф про те, що індустріалізація була суто «радянським», а не «російським» проектом. Аналіз кадрової політики
    та домінування росіян на керівних посадах в українській промисловості.'
  section: 'Зіткнення наративів: Українська індустріалізація'
  words: 1700
- points:
  - 'Close reading 1: Таблиця з радянського статистичного збірника «Народне господарство УРСР в 1940 р.». Аналіз показників
    росту виробництва сталі, вугілля, електроенергії. Яку історію розповідають ці цифри, якщо читати їх буквально?'
  - 'Close reading 2: Фрагмент з праці західного історика (напр., Джеймс Мейс або Тімоті Снайдер), де аналізується експорт
    українського зерна в ті ж роки. Як ці дані змінюють інтерпретацію статистичних успіхів промисловості?'
  - 'Критика джерел: Хто і як збирав радянську статистику? Які були стимули для маніпуляцій та приписок («п''ятирічку — за
    чотири роки»)? Чому статистика про експорт зерна та демографічні втрати була засекречена?'
  - '[!epistemic-humility] Висновок: навіть «об''єктивні» цифри є історичним джерелом, яке вимагає критики, контекстуалізації
    та розуміння, хто, як і з якою метою його створив.'
  section: 'Джерельна критика: Радянська статистика vs. західна аналітика'
  words: 1500
- points:
  - 'Повернення до розминки: Студент тепер може не просто вгадати, а аргументовано пояснити, на яких ідеологічних та методологічних
    засадах базуються обидва описи індустріалізації.'
  - 'Мета-рефлексія: Як аналіз наративів про індустріалізацію допомагає зрозуміти сучасну російську пропаганду про «відбудову»
    окупованих територій чи заяви про те, що «Ленін створив Україну»?'
  - 'Підсумок: Радянська індустріалізація не «розвивала» Україну, а експлуатувала її ресурси та людей для побудови імперського
    центру, використовуючи терор і геноцид як інструменти економічної політики. [!decolonization]'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of Soviet industrialization in Ukraine as a colonial project, the link to the Holodomor,
  and the clash of imperial vs. decolonial narratives.
