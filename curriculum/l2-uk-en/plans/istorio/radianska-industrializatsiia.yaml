objectives:
- 'Аналізувати радянську індустріалізацію в Україні з позицій трьох історіографічних наративів: радянського, українського
  та західного'
- Застосовувати методику критики джерел до радянської статистики та пропагандистських матеріалів
- Пояснювати економічний зв'язок між індустріалізацією, колективізацією та Голодомором
- Використовувати історіографічну метамову (дискурс, наратив, суб'єктність) для аналізу історичних процесів
