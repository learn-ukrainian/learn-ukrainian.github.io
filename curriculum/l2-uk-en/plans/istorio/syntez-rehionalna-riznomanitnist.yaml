content_outline:
- points:
  - 'Провокація: Україна — «клаптикова держава», штучно зшита з несумісних частин, чи «мозаїчна нація», де різноманітність
    є джерелом сили? Представлено два анонімні погляди — студент має визначити, який з них є імперським, а який — українським,
    і пояснити свою логіку.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Примордіалізм vs. Модернізм. Чи є регіональні відмінності України «споконвічними», вкоріненими в глибокій історії
    (позиція, яку часто просуває російська історіографія), чи вони є продуктом модерних часів — наслідком перебування у різних
    імперіях (Російській та Австро-Угорській)?'
  - 'Дебат 2: Загроза чи ресурс? Дискусія про роль регіоналізму. Чи є він загрозою для унітарної держави (як стверджує російська
    пропаганда, просуваючи ідею «федералізації»), чи джерелом стійкості через модель децентралізації?'
  - '[!epistemic-humility] Розгляд аргументів обох сторін у кожному дебаті, аналіз, хто і з якою метою використовує ці аргументи
    сьогодні.'
  section: 'Конфліктна карта: Природа регіональних відмінностей'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Україна — це не нація, а конгломерат земель («Новоросія», «Малоросія», «Галичина»).
    Акцент на мовних, релігійних та культурних відмінностях як «доказ» штучності держави. Мета: виправдання експансії та контролю.'
  - 'Український наратив: Регіональні відмінності є наслідком різних окупаційних режимів, але вони існують у межах спільного
    культурного простору та єдиної політичної нації. Події 2014 та 2022 років довели фундаментальну єдність. Мета: побудова
    інклюзивної, сучасної, унітарної держави.'
  - 'Західний наратив: Часто вагається між розумінням України як постколоніальної держави та інерційним повторенням кліше
    про «поділ на Схід і Захід». Аналіз того, як західна академія та медіа еволюціонували у своєму баченні України.'
  - '[!decolonization] Розкриття механізмів, за допомогою яких імперська історіографія створює та використовує наративи про
    «розділеність» для ослаблення національного суверенітету.'
  - '[!myth-buster] Деконструкція міфів про «русифікований схід» та «націоналістичний захід».'
  section: 'Зіткнення наративів: Регіони України'
  words: 1700
- points:
  - 'Close reading: порівняльний аналіз уривків з праць ключових істориків, що досліджують українські регіони.'
  - 'Джерело 1: Ярослав Грицак. Аналіз його концепції «модернізації через революцію» та погляду на регіони як на різні «шляхи
    до сучасності» в рамках єдиного українського проєкту.'
  - 'Джерело 2: Сергій Плохій («Брама Європи»). Розгляд того, як він пояснює формування регіональних ідентичностей через концепцію
    «кордонів» та «прикордоння» (borderlands).'
  - 'Джерело 3: Погляд з іншого боку — аналіз тексту проросійського історика (напр., Петра Толочка), який обстоює ідею «спільноруської
    єдності» та розглядає регіональні особливості як відхилення від норми.'
  - '[!epistemic-humility] Критичний аналіз методології кожного автора: на які джерела вони спираються? Які терміни використовують?
    Чиїм інтересам слугує їхня інтерпретація?'
  section: 'Джерельна критика: Як історики пишуть про регіони'
  words: 1500
- points:
  - 'Повернення до розминки: студент тепер може не просто ідентифікувати джерела, а й деконструювати їхні аргументи, використовуючи
    понятійний апарат з модуля (примордіалізм, наратив, дискурс).'
  - 'Мета-рефлексія: Що цей модуль говорить про те, як писати й читати історію? Чому розуміння історіографії є ключем до протидії
    сучасній інформаційній війні?'
  - '[!decolonization] Підсумок: Регіональна різноманітність України — це не «проблема», а історичний факт і ресурс. Імперська
    спроба перетворити її на зброю проти української державності зазнала поразки.'
  section: Дискусія та підсумок
  words: 700
focus: Історіографічні дебати щодо українського регіоналізму, порівняння імперських (російських/радянських), національних
  (українських) та західних наративів про формування регіональної ідентичності та національної єдності.
level: ISTORIO
module: istorio-080
objectives:
- Розрізняти та аналізувати ключові історіографічні наративи (російський, український, західний) щодо регіональної структури
  України.
- Застосовувати методику джерельної критики до аналізу текстів сучасних істориків.
- Деконструювати міфи про «штучність» України та «споконвічні» регіональні конфлікти, що просуваються імперською пропагандою.
- Аргументовано пояснювати, як досвід перебування в різних імперіях вплинув на формування регіональних траєкторій.
