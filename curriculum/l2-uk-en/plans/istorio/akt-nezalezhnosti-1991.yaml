content_outline:
- points:
  - 'Провокація: 24 серпня 1991 року. Чому комуністична більшість, яка роками блокувала будь-які рухи до суверенітету, раптом
    майже одностайно голосує за повну незалежність? Чи це було «прозріння нації» чи цинічний розрахунок?'
  - 'Представлено дві цитати без авторства: одна про «історичний шанс, дарований Богом», інша про «необхідність врятувати
    партійні активи від хаосу в Москві». Студент має припустити, хто міг сказати кожну, і яка мотивація була вирішальною.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Незалежність — це результат багатовікової боротьби чи втеча номенклатури? Позиція 1 (національно-демократична):
    Акт — це логічне завершення визвольних змагань (УНР, дисиденти). Позиція 2 (ревізіоністська): Акт — це змова комуністичної
    еліти на чолі з Кравчуком, щоб зберегти владу і власність, відгородившись від непередбачуваного Єльцина.'
  - 'Дебат 2: Референдум 1 грудня — тріумф національної єдності чи голосування за «ковбасу»? Позиція 1: 90.32% «за» — це безпрецедентний
    мандат, що об''єднав Схід і Захід. Позиція 2: Це було голосування проти московського хаосу і економічного колапсу, а не
    за абстрактні національні ідеали, особливо на Півдні та Сході.'
  - '[!epistemic-humility] Обидві позиції в кожному дебаті мають вагомі аргументи. Завдання — не обрати «правильну», а зрозуміти
    логіку кожної.'
  section: 'Конфліктна карта: Революція чи втеча?'
  words: 900
- points:
  - '1. Російський імперський / радянський наратив: Акт 1991 — це «найбільша геополітична катастрофа», результат змови Заходу
    та «зради» місцевих еліт. Незалежність України — незаконна, бо порушила процедуру виходу з СРСР; українці та росіяни —
    «один народ», штучно розділений.'
  - 'Методологія: Юридичний формалізм, апеляція до спільної історії (спотвореної), ігнорування волі народу (референдуму).'
  - '2. Український національний наратив: Акт — це відновлення історичної справедливості, кульмінація тисячолітньої традиції
    державотворення. Незалежність є абсолютно легітимною, бо спирається на міжнародне право (право націй на самовизначення)
    та волю народу.'
  - 'Методологія: Історична тяглість (від Русі до сьогодні), акцент на відмінності та утиски в імперії, сакралізація Акту
    та Референдуму. [!myth-buster] Цей наратив іноді применшує роль прагматичних комуністів, ідеалізуючи подію.'
  - '3. Західний наратив (на прикладі США): Спочатку — обережність і страх («Chicken Kiev speech»). Головний пріоритет — контроль
    над ядерною зброєю та стабільний, керований розпад СРСР, а не незалежність України. Визнання відбулося лише після того,
    як референдум підтвердив незворотність процесу. Україна розглядалася не як суб''єкт, а як об''єкт у великій грі з Москвою.'
  - '[!decolonization] Порівняння наративів викриває імперську оптику, де воля «менших народів» ігнорується, та показує, як
    Україна поступово здобувала власну суб''єктність.'
  section: 'Зіткнення наративів: Розпад імперії чи відновлення державності?'
  words: 1700
- points:
  - 'Джерело 1: Текст Акту проголошення незалежності. Аналіз формулювань: «виходячи зі смертельної небезпеки», «продовжуючи
    тисячолітню традицію», «право на самовизначення», «верховенство, самостійність, повнота і неподільність». Чому саме ці
    слова? Який юридичний та ідеологічний вантаж вони несуть? Порівняння з Декларацією про державний суверенітет 1990 року
    — що змінилося?'
  - 'Джерело 2: Фрагменти з мемуарів Леоніда Кравчука. Як він пояснює свою роль та мотивацію? Як описує атмосферу в Верховній
    Раді? Які аргументи він використовував для переконання комуністів? Аналіз його риторики самопрезентації.'
  - 'Джерело 3: Фрагменти з мемуарів дисидента (напр., Левка Лук''яненка). Як він описує той самий день? Хто є героями та
    рушійними силами в його розповіді? Порівняння його перспективи з перспективою Кравчука: де їхні спогади збігаються, а
    де кардинально розходяться і чому?'
  - '[!epistemic-humility] Спогади — це не об''єктивна реальність, а конструювання власної ролі в історії. Аналіз розбіжностей
    показує, як твориться історичний міф.'
  section: 'Джерельна критика: Текст Акту vs. спогади учасників'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чому комуністи проголосували за незалежність? Студент має сформулювати комплексну відповідь,
    використовуючи аргументи з усього модуля (історичний контекст, страх, тиск опозиції, особисті амбіції, розрахунок).'
  - 'Мета-рефлексія: Що історія ухвалення Акту говорить нам про те, як відбуваються великі історичні зміни? Чи це завжди результат
    чистої ідеології, чи частіше це збіг обставин, компромісів та цинічних розрахунків?'
  - 'Зв''язок із сьогоденням: Як сучасна російська пропаганда атакує легітимність Акту 1991 року? Проаналізуйте, як аргументи
    з «російського імперського наративу» (розглянутого в модулі) використовуються сьогодні для виправдання агресії.'
  - '[!decolonization] Розуміння того, як і чому Україна здобула незалежність у 1991, є ключем до розуміння, чому вона бореться
    за неї сьогодні.'
  section: Дискусія та підсумок
  words: 700
