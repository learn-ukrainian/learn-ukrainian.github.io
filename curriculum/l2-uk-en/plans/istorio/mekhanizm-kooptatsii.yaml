content_outline:
- points:
  - 'Провокація: Вам пропонують дві угоди, укладені з українською елітою з різницею у 150 років. Одна гарантує «вільності
    та привілеї», інша — «дворянські права та землі». Яка з них призвела до ліквідації автономії? Відповідь: обидві. Чому
    еліти щоразу погоджувалися?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Російська модель — це унікальний метод кооптації чи просто варіація стандартної колоніальної асиміляції? Порівняння
    з французьким та британським підходами.'
  - 'Дебат 2: Чи був цикл «підкуп-зрада-знищення» свідомою довгостроковою стратегією з самого початку, чи серією імпровізованих
    тактичних рішень, що склалися в систему?'
  - '[!epistemic-humility] Ми не можемо залізти в голову імперським стратегам, але можемо аналізувати результати їхніх дій
    та виявляти системні патерни.'
  section: 'Конфліктна карта: Кооптація vs. Асиміляція'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Возз''єднання братніх народів». Еліти «малоросів» добровільно приєднуються
    до цивілізованої імперії, отримуючи захист, землі та титули в обмін на лояльність. Це не знищення, а «включення» у вищу
    культуру.'
  - 'Український наратив: Цинічний, повторюваний цикл зради (Bribe, Bind, Betray, Burn). Короткострокові привілеї для еліти
    купуються ціною довгострокової втрати суверенітету для нації. Кожна «угода» — це пастка.'
  - 'Західний наратив: Модель «непрямого управління» (indirect rule) з подальшою централізацією. Порівняння з тим, як інші
    імперії використовували місцеві еліти для управління колоніями. Акцент на інституційній слабкості та персоналізованій
    владі як ключових рисах російської моделі.'
  - '[!decolonization] Викриття «добровільного приєднання» як фундаментального міфу, що легітимізує імперське панування.'
  - '[!myth-buster] Міф про «особливі стосунки» — насправді, це універсальний інструмент імперського контролю, просто з російською
    специфікою.'
  section: 'Зіткнення наративів: Цикл Кооптації'
  words: 1700
- points:
  - 'Кейс 1: Переяславські статті. Аналіз мови: що обіцяно, а що замовчується? Які «гарантії» насправді є інструментами для
    майбутнього втручання? Де «сірі зони» для інтерпретації?'
  - 'Кейс 2: Указ Катерини ІІ про дарування дворянства козацькій старшині. Як пропозиція індивідуального піднесення руйнує
    колективну солідарність стану? Читання між рядків: що старшина отримує, а що втрачає (політичну суб''єктність).'
  - Порівняння публічної риторики (листи до гетьманів) та таємних інструкцій (накази генерал-губернаторам). Як виявити справжні
    наміри за фасадом дипломатичної мови.
  - '[!epistemic-humility] Ми читаємо ці документи, знаючи наслідки. А як їх сприймали сучасники, які не знали майбутнього?'
  section: 'Джерельна критика: Аналізуючи імперські угоди'
  words: 1500
- points:
  - 'Повернення до розминки: Чому еліти щоразу потрапляли в ту саму пастку? Аналіз з позицій раціонального вибору, короткострокових
    інтересів та відсутності альтернатив.'
  - 'Мета-рефлексія: Як знання про цикл кооптації змінює наше розуміння української історії? Це історія поразок чи історія
    опору?'
  - '[!decolonization] Як цей історичний патерн проявляється сьогодні у гібридній війні, енергетичному шантажі та спробах
    Росії «купити» лояльність еліт в інших країнах?'
  section: Дискусія та підсумок
  words: 700
focus: 'The Russian imperial cycle of co-optation: Bribe, Bind, Betray, Burn. Comparison with other empires. Analysis of mechanisms
  for elite capture and destruction of autonomy.'
level: ISTORIO
module: istorio-081
objectives:
- Аналізувати теоретичну модель російської імперської кооптації («Bribe, Bind, Betray, Burn»)
- Порівнювати російську модель елітного контролю з британською та французькою колоніальними стратегіями
- Критично читати первинні джерела (угоди, укази), виявляючи приховані наміри та інструменти майбутнього контролю
- Застосовувати модель кооптації для аналізу сучасних проявів російського імперіалізму та гібридної війни
