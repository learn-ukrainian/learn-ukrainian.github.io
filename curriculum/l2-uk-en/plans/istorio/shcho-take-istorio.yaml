focus: Distinction between history and historiography, analysis of narrative, bias, and perspective, with Pereiaslav 1654
  as a case study.
level: ISTORIO
module: istorio-001
objectives:
- Аналізувати різницю між історією (події) та історіографією (наука про написання історії)
- Оцінювати вплив упереджень, перспективи та наративу на історичний виклад
- Застосовувати базові методи критики джерел для аналізу історичних текстів
- Розрізняти ключові риси російського імперського, українського національного та західного наративів на прикладі Переяславської
  ради
