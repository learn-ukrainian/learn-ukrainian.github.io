content_outline:
- points:
  - 'Провокація: Вам дано два описи Переяславської ради 1654 року. Який з них є українським, а який — російським імперським?
    Поясніть свою логіку.'
  - 'Цитата: "Історія — це політика, перекинута в минуле". Як ви розумієте це твердження?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історія — це наука про факти чи мистецтво інтерпретації? Позитивістський підхід (історія як точна наука) vs
    постмодерністський (історія як текст).'
  - 'Дебат 2: Чи може історик бути повністю об''єктивним? Обговорення концепцій упередження (bias), перспективи та контексту
    автора.'
  - '[!epistemic-humility] Розгляд тези, що будь-який історичний наратив — це лише одна з можливих версій, а не абсолютна
    істина.'
  section: 'Конфліктна карта: Факт vs. Інтерпретація'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Возз''єднання братніх народів". Акт віковічного прагнення українців до єдності
    з Росією. Методологія: вибіркове цитування, ігнорування умов договору. Агенда: легітимізація панування над Україною. Сліпі
    плями: козацька державність, умови договору.'
  - 'Український наратив (державницька школа): Військово-політичний союз рівних партнерів для боротьби зі спільним ворогом.
    Методологія: аналіз тексту договору, міжнародного контексту. Агенда: утвердження тяглості української державності. Сліпі
    плями: внутрішні конфлікти, що змусили Хмельницького до союзу.'
  - 'Західний наратив: Тактичний альянс у складній геополітичній грі Східної Європи, де одна сторона (Московія) поступово
    поглинула іншу. Методологія: порівняльний аналіз, теорія міжнародних відносин. Агенда: академічне розуміння динаміки влади.
    Сліпі плями: культурні та релігійні аспекти.'
  - '[!decolonization] Демонтаж міфу про "возз''єднання" як центрального елементу імперської ідеології.'
  - '[!myth-buster] Переяславська угода не була угодою про приєднання, а тимчасовим військовим союзом, типовим для тогочасної
    Європи.'
  section: 'Зіткнення наративів: Переяславська рада 1654'
  words: 1700
- points:
  - 'Методологія критики джерел: Питання 1: Хто автор? (Біографія, погляди, національність). Питання 2: Коли написано? (Історичний
    контекст створення). Питання 3: Для кого написано? (Цільова аудиторія). Питання 4: Яка мета тексту? (Пропаганда, хроніка,
    аналіз). Питання 5: Про що текст мовчить? (Що було свідомо чи несвідомо опущено).'
  - 'Практичний аналіз: Застосування 5 питань до двох джерел — уривку з радянського підручника про "дружбу народів" та вступу
    до "Історії України-Руси" Грушевського.'
  - '[!epistemic-humility] Порівняння показує, як різні автори, працюючи з тими ж фактами, створюють кардинально різні наративи.'
  section: 'Джерельна критика: 5 питань до будь-якого історичного тексту'
  words: 1500
- points:
  - 'Повернення до розминки: Студенти знову аналізують два описи Переяславської ради, але тепер застосовуючи 5 питань критики
    джерел.'
  - 'Мета-рефлексія: Що цей модуль змінив у вашому розумінні того, як читати новини, статті та історичні тексти?'
  - 'Зв''язок із сьогоденням: Як наративи про Переяславську раду використовуються у сучасній російсько-українській інформаційній
    війні?'
  - '[!decolonization] Усвідомлення того, що боротьба за власну історію є частиною боротьби за незалежність.'
  section: Дискусія та підсумок
