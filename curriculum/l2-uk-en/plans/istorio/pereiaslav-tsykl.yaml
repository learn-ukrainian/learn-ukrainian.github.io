content_outline:
- points:
  - 'Провокація: Дві цитати про Переяславську раду — одна про «возз''єднання», інша про «ярмо». Яка з них радянська, а яка
    — українська, і чому ви так думаєте?'
  - 'Таємниця оригіналу: Чому не зберігся оригінальний текст угоди, підписаний Хмельницьким? Що це говорить про наміри сторін?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Правова природа угоди. Українська історіографія (васалітет/протекторат) vs. російська імперська (возз''єднання,
    інкорпорація).'
  - 'Дебат 2: Причини Руїни. Це неминучий наслідок Переяслава чи результат внутрішнього конфлікту козацької еліти, яким скористалася
    Москва?'
  - '[!epistemic-humility] Чи був у Хмельницького вибір? Аналіз альтернатив: союз із Османською імперією, Швецією, чи продовження
    війни з Польщею наодинці.'
  section: 'Конфліктна карта: Протекторат чи возз''єднання?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "віковічне прагнення" малоросів до возз''єднання з "братнім російським народом".
    Хмельницький — мудрий діяч, що "повернув" Русь під руку "білого царя".'
  - 'Український наратив: Вимушений військово-політичний союз суверенних держав для боротьби зі спільним ворогом. Москва систематично
    порушувала статті угоди, перетворюючи протекторат на анексію.'
  - 'Західний наратив: Геополітичний розворот. Васал Речі Посполитої переходить під протекторат Московського царства, змінюючи
    баланс сил у Східній Європі. Подія розглядається в контексті Тридцятилітньої війни та зростання імперій.'
  - '[!decolonization] Механізм кооптації: підкуп еліт (обіцянки), створення залежності (московські воєводи), зрада (Андрусівський
    "мир"), поглинання (підпорядкування Церкви, скасування автономії).'
  - '[!myth-buster] Міф про "єдиний народ". Угода 1654 року укладалася між різними політичними культурами: козацькою республікою
    з виборним гетьманом та абсолютною монархією з деспотичним царем.'
  section: 'Зіткнення наративів: Переяславська рада 1654 року'
  words: 1700
- points:
  - 'Порівняльний аналіз: "Статті Богдана Хмельницького" (проєкт козацької сторони) vs. "Жалувана грамота" царя Олексія Михайловича.
    Які пункти були змінені, проігноровані чи додані Москвою?'
  - 'Приклад: 60-тисячний реєстр, право на міжнародні відносини (крім Польщі та Туреччини), фінансова автономія — як ці пункти
    трактувалися і порушувалися.'
  - 'Джерело: Літопис Самовидця. Хто автор? Яку позицію він займає? Як він описує настрої козацької старшини та простих козаків
    під час укладання угоди?'
  - '[!epistemic-humility] Як історики працюють із копіями та списками, коли оригінал втрачено? Проблема реконструкції первинного
    тексту та його інтерпретацій.'
  section: 'Джерельна критика: Березневі статті vs. царська грамота'
  words: 1500
- points:
  - 'Повернення до розминки: Аналіз цитат про Переяслав. Студент тепер може ідентифікувати не лише авторство, а й історіографічну
    школу, методологію та політичну мету кожного висловлювання.'
  - 'Мета-рефлексія: Чому Переяславський цикл є центральним для розуміння українсько-російських відносин? Як він повторювався
    в пізнішій історії?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна російська пропаганда використовує та перекручує наратив "возз''єднання"?
    Які паралелі можна провести між подіями XVII ст. та сучасною війною?'
  section: Дискусія та підсумок
  words: 700
focus: 'Переяславська угода (1654) як класичний цикл російської імперської кооптації: обіцянки, посилення залежності, зрада
  (Андрусово, підпорядкування Церкви 1686), знищення (Руїна). Порівняння української, російської та західної історіографії
  події.'
