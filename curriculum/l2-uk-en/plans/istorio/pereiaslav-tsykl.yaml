objectives:
- Аналізувати Переяславську угоду в контексті трьох істоографічних наративів: українського, російського імперського та західного
- Застосовувати модель "циклу кооптації" для аналізу еволюції українсько-російських відносин у XVII ст.
- Проводити джерельну критику, порівнюючи різні версії та інтерпретації Березневих статей
- Пояснювати, як маніпуляція історичним наративом про Переяслав стала інструментом сучасної російської пропаганди
