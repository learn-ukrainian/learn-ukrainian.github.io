content_outline:
- points:
  - 'Провокація: Два анонімні уривки описують події 1648 року. Один — єврейського літописця, інший — українського історика-романтика.
    Спробуйте визначити, де чий погляд, і поясніть свою логіку.'
  - 'Запитання для роздумів: Чому найбільша єврейська громада світу до початку XX ст. сформувалася саме на українських землях?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Теорія вічної ворожнечі» vs «Теорія структурного конфлікту». Чи є український антисемітизм унікальним, глибоко
    вкоріненим явищем, чи він є наслідком конкретних соціально-економічних умов (роль посередника, орендаря), нав''язаних
    імперіями?'
  - 'Дебат 2: Хто несе відповідальність за погроми? Російський імперський уряд (державна політика), місцеве населення (народна
    стихія) чи революційний хаос? Аналіз ролі кожного з чинників.'
  - '[!epistemic-humility] Розгляд позицій: від звинувачення євреїв у експлуатації до звинувачення українців у «природній»
    ксенофобії — та деконструкція обох спрощених підходів.'
  section: 'Конфліктна карта: Причини українсько-єврейських відносин'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Возз''єднання братніх народів». Повстання Хмельницького — класова боротьба
    проти польських панів. Єврейська трагедія ігнорується або згадується побіжно як «знищення поплічників шляхти».'
  - 'Український наратив: Від романтичного (національно-визвольна війна) до постколоніального. Сучасний підхід визнає трагедію
    єврейської громади, аналізуючи її причини в контексті соціального гніту з боку польської шляхти, де євреї-орендарі часто
    ставали інструментом та об''єктом ненависті.'
  - 'Західний (зокрема, єврейський) наратив: «Хмельниччина» як національна катастрофа, прото-Голокост. Хмельницький — жорстокий
    тиран. Основні джерела — єврейські хроніки (Натан Ганновер, «Євен Мецула»), що фіксують масштаби різанини.'
  - '[!decolonization] Викриття того, як імперська Росія, а згодом СРСР, маніпулювали пам''яттю про Хмельниччину для розпалювання
    ворожнечі між українцями та євреями, представляючи себе «захисником» то одних, то інших.'
  - '[!myth-buster] Деконструкція міфу про «віковічну ненависть», показ того, як економічні та політичні фактори перетворили
    співіснування на кривавий конфлікт.'
  section: 'Зіткнення наративів: Хмельниччина 1648 року'
  words: 1700
- points:
  - 'Аналіз текстів: Уривки з наказів Симона Петлюри, що засуджували погроми та запроваджували смертну кару за участь у них,
    порівняно зі свідченнями про погроми, що чинили загони підпорядковані Директорії УНР.'
  - 'Контекст: Історичні умови — розвал імперії, хаос громадянської війни, десятки воюючих сторін. Чи міг Петлюра контролювати
    свою армію? Наскільки його влада була реальною?'
  - '[!epistemic-humility] Постать Петлюри в історіографії: від «головного погромника» (радянська та частина єврейської історіографії)
    до «праведника, що намагався зупинити зло» (частина української історіографії). Аналіз аргументів обох сторін та ролі
    Володимира Жаботинського.'
  - 'Джерелознавчий аналіз: Як відрізнити офіційний наказ від реальної практики? Як читати мемуари учасників подій, враховуючи
    їхню політичну позицію?'
  section: 'Джерельна критика: Симон Петлюра та погроми 1918–1921 рр.'
  words: 1500
- points:
  - 'Повернення до розминки: Аналіз уривків про 1648 рік. Тепер студент може ідентифікувати авторів та пояснити, які наративні
    та ідеологічні установки визначають їхній погляд.'
  - 'Мета-рефлексія: Що історія українсько-єврейських відносин говорить нам про небезпеку ролі «народу-посередника» в імперських
    структурах?'
  - '[!decolonization] Як сучасна російська пропаганда використовує та спотворює складні моменти українсько-єврейської історії
    (зокрема, постаті Петлюри та Бандери) для дискредитації сучасного українського визвольного руху?'
  section: Дискусія та підсумок
  words: 700
focus: Historiography of Ukrainian-Jewish relations; analyzing narratives of coexistence and conflict from the Cossack era
  to the early 20th century.
level: ISTORIO
module: istorio-118
objectives:
- Аналізувати та порівнювати різні історіографічні наративи (український, єврейський, російський) щодо ключових подій спільної
  історії.
- Застосовувати методи джерельної критики для аналізу суперечливих історичних постатей, таких як Богдан Хмельницький та Симон
  Петлюра.
- Деконструювати імперські та націоналістичні міфи про українсько-єврейські відносини.
- Формулювати аргументовану позицію щодо причин та наслідків конфліктів, уникаючи спрощених звинувачень.
