content_outline:
- points:
  - 'Провокація: два уривки про Київську Русь. Один описує її як «колиску трьох братніх народів», інший — як виключно українську
    державу. Чи можете ви визначити, де чия версія, і пояснити чому?'
  - 'Питання до роздумів: Що робить один історичний наратив «українським», а інший «імперським»? Які слова, ідеї та акценти
    їх видають?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Схема Грушевського vs. російська імперська схема. Чи є історія України-Русі безперервною від Києва до козацтва,
    чи це лише «південно-західна» гілка загальноросійської історії?'
  - 'Дебат 2: "Народницька" (Грушевський) vs. "державницька" (Липинський) історіографія. Хто є головним суб''єктом історії
    — народні маси чи державні інституції та еліти?'
  - '[!epistemic-humility] Обидві схеми — це інтерпретації, а не об''єктивна реальність. Ми аналізуємо, як і чому ці інтерпретації
    були сконструйовані та з якою метою.'
  - '[!biography] Ключові постаті дебату: Михайло Грушевський (народник), Вячеслав Липинський (державник), Василь Ключевський
    (імперська школа).'
  section: 'Конфліктна карта: Схема, школа, наратив'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Історія «Малоросії» як частина «великої російської історії». Заперечення
    окремішності, акцент на «возз''єднанні». Методологія: державний централізм, ігнорування недержавних форм життя. Агенда:
    легітимізація імперського панування.'
  - 'Український національний наратив (Школа Грушевського): Концепція безперервності українського історичного процесу від
    Русі до сучасності. Суб''єктність народу. Методологія: народництво, аналіз соціальних та культурних процесів. Агенда:
    обґрунтування права на державність.'
  - 'Діаспорний наратив: Збереження традиції в еміграції (Дорошенко, Полонська-Василенко, Оглоблин). Синтез українських та
    західних методологій. Агенда: протистояння радянській фальсифікації. [!decolonization] Це був інтелектуальний фронт Холодної
    війни.'
  - 'Західний наратив (Subtelny, Snyder): Україна як об''єкт дослідження, а не національного проєкту. Використання порівняльних
    методів, ширший глобальний контекст. [!myth-buster] Часто саме західні історики першими кидали виклик як українським,
    так і російським національним міфам.'
  section: 'Зіткнення наративів: Історія бездержавної нації'
  words: 1700
- points:
  - 'Джерело 1: Уривок зі вступу до «Історії України-Руси» Михайла Грушевського. Аналіз стилю, риторики, ключових термінів
    («народ», «територія», «традиція»). Як він конструює суб''єкт своєї історії?'
  - 'Контекст автора: Грушевський — голова НТШ, професор, політик. Як його біографія та інституційна приналежність вплинули
    на його історичну візію?'
  - 'Джерело 2: Уривок з «Ukraine: A History» Ореста Субтельного. Порівняння структури аргументів, цільової аудиторії (західний
    читач vs. українська нація). Як Субтельний "перекладає" українську історію для світу?'
  - '[!epistemic-humility] Контекст автора: Субтельний — канадський історик українського походження, Гарвардська школа. Чому
    його книга стала міжнародним бестселером, але викликала критику з боку деяких українських істориків за «недостатній патріотизм»?'
  section: 'Джерельна критика: Читаючи Грушевського та Субтельного'
  words: 1500
- points:
  - 'Повернення до розминки: Тепер, знаючи про схеми та школи, проаналізуйте два початкові уривки ще раз. Які конкретні елементи
    вказують на приналежність до українського національного чи російського імперського наративу?'
  - 'Мета-рефлексія: Чи можлива "об''єктивна" історія України, чи ми завжди будемо мати справу з конкуренцією наративів? Яка
    роль історика в цьому процесі?'
  - '[!decolonization] Як розуміння цих історіографічних дебатів допомагає протистояти сучасній російській пропаганді, яка
    часто використовує аргументи імперської історіографії XIX століття?'
  - 'Підсумок: Українська історіографічна традиція — це не просто набір текстів, а безперервна боротьба за право на власний
    голос та власну інтерпретацію минулого.'
  section: Дискусія та підсумок
  words: 700
focus: The evolution of Ukrainian historical thought from Hrushevsky to the present, focusing on the debate between national
  and imperial narratives, the role of diaspora, and methodological shifts.
level: ISTORIO
module: istorio-002
objectives:
- Простежити еволюцію української історичної думки від школи Грушевського до сьогодення
- Критично оцінити внесок Михайла Грушевського в контексті імперських та західних наративів
- Розрізняти ключові історіографічні школи та їх методологічні підходи (народницький, державницький, діаспорний)
- Застосовувати методи джерельної критики для аналізу історіографічних текстів
- Аргументовано виявляти маніпуляції та упередження в історичних наративах різного походження
