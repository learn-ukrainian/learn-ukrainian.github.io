content_outline:
- points:
  - 'Провокація: Дві цитати з весни 2014 року — одна від західного лідера про «ціну, яку заплатить Росія», інша від російського
    пропагандиста про «повернення Криму в рідну гавань». Яка з них точніше передбачила майбутнє на наступні 8 років? Чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чому відповідь Заходу була такою слабкою? Була це цинічна ''Реальполітик'' (захист економічних інтересів, як-от
    Nord Stream 2) чи фундаментальна наївність і нерозуміння природи путінського режиму?'
  - 'Дебат 2: Мінські угоди — дипломатичний прорив чи капітуляція? Одні історики кажуть, що це був єдиний спосіб зупинити
    ескалацію. Інші — що це легітимізувало російську агресію та дало час на підготовку до більшої війни.'
  - '[!epistemic-humility] Аналіз позицій Меркель/Олланда: вони були прагматичними миротворцями, що врятували сотні життів,
    чи мимовільними помічниками агресора, що відклали неминуче?'
  section: 'Конфліктна карта: ''Реальполітик'' чи ''Наївність''?'
  words: 900
- points:
  - 'Російський імперський наратив: "Історичне возз''єднання", захист російськомовних від "фашистської хунти" в Києві. Методологія:
    маніпуляція історією, фейковий "референдум". Агенда: виправдання агресії, утвердження "сфер впливу".'
  - 'Український наратив: Акт неспровокованої збройної агресії та анексія суверенної території. Порушення Будапештського меморандуму.
    Методологія: міжнародне право, докази військового вторгнення. Агенда: відновлення територіальної цілісності, викриття
    імперіалізму.'
  - 'Західний наратив: Складний і суперечливий. Публічне "глибоке занепокоєння" і "засудження". Реальні дії: мінімальні, символічні
    санкції, відмова в летальній зброї, пріоритет "деескалації" будь-якою ціною. Агенда: уникнути прямої конфронтації з ядерною
    державою, зберегти бізнес-зв''язки.'
  - '[!decolonization] Викриття механіки: як термін "деескалація" використовувався Заходом для тиску на Україну, а не на агресора.'
  - '[!myth-buster] Міф про "громадянську війну": як російська пропаганда успішно продала цей наратив багатьом на Заході,
    маскуючи власне вторгнення на Донбасі.'
  section: 'Зіткнення наративів: Кримська криза 2014'
  words: 1700
- points:
  - 'Close reading: Аналіз тексту Мінськ-II. Які пункти були свідомо неоднозначними? (напр. "вибори до відновлення контролю
    над кордоном"). Хто виграв від цих формулювань?'
  - 'Автор і контекст: Роль "нормандської четвірки". Чи були Меркель і Олланд нейтральними посередниками? Аналіз їхніх мемуарів
    та заяв після 2022 року.'
  - 'Порівняльний аналіз: Текст угоди vs. стаття-рефлексія історика (напр., Тімоті Снайдера або Сергія Плохія) через 5 років.
    Як змінилося розуміння подій? Які наслідки, неочевидні у 2015, стали явними пізніше?'
  - '[!epistemic-humility] Чому багато досвідчених дипломатів та аналітиків у 2015 році вважали Мінські угоди успіхом? Критика
    ретроспективного "знання заднім числом".'
  section: 'Джерельна критика: Мінські угоди — текст і контекст'
  words: 1500
- points:
  - 'Повернення до розминки: аналізуючи події 2014-2022, чи можна сказати, що "ціна" для Росії була достатньо високою?'
  - 'Мета-рефлексія: Чого вчить нас історія 2014 року про природу міжнародної політики, цінність запевнень безпеки та ефективність
    санкцій?'
  - 'Зв''язок із сьогоденням: Чи стала слабка відповідь Заходу у 2014 році головною причиною повномасштабного вторгнення 2022
    року? Аргументуйте позицію.'
  - '[!decolonization] Як досвід 2014 року змінив Україну та змусив її покладатися лише на власні сили, а не на міжнародних
    партнерів?'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of the weak Western response to the 2014 annexation of Crimea and the Minsk agreements.
level: ISTORIO
module: istorio-101
objectives:
- Аналізувати причини та наслідки слабкої реакції Заходу на анексію Криму у 2014 році
- Оцінювати історичне значення концепції "безкарності" у російсько-українських відносинах
- Порівнювати різні історіографічні наративи (російський, український, західний) щодо подій 2014 року
- Застосовувати навички джерельної критики до аналізу міжнародних угод
