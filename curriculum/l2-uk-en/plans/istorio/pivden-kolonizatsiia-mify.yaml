content_outline:
- points:
  - 'Провокація: Два анонімні описи заснування Одеси — один з імперської енциклопедії, інший з листа українського купця. Який
    з них "правдивий" і чому?'
  - 'Цитата-пастка: "Одеса завжди була вільним, космополітичним містом, далеким від вузьких національних рамок". Чи справді
    "далеким"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Дике поле" vs "Великий Луг". Російська історіографія представляє Південь як порожню, нецивілізовану землю.
    Українська — як простір козацької вольниці та кримськотатарського життя. Чиї карти, того й територія?'
  - 'Дебат 2: Колонізація чи заселення? Термін "колонізація" передбачає імперський центр і периферію. "Заселення" — нейтральний
    процес. Який термін адекватніший для опису подій на Півдні у XVIII-XIX ст.?'
  - '[!epistemic-humility] Розгляд первинних джерел: укази Катерини II про запрошення іноземних колоністів vs козацькі літописи,
    що описують зимівники на цих землях за століття до того.'
  section: 'Конфліктна карта: "Дике поле" чи козацький степ?'
  words: 900
- points:
  - '1. Російський імперський / радянський наратив: Південь — це "Новоросія", штучно "подарована" Україні. Земля, освоєна
    імперією з нуля.'
  - 'Методологія: вибіркове цитування указів Катерини ІІ, акцент на іменах імперських губернаторів, ігнорування етнічної статистики.'
  - 'Агенда: обґрунтування "історичних прав" сучасної Росії на українські території. Легітимізація анексії.'
  - '[!decolonization] Сліпі зони: козацька та кримськотатарська історія регіону, етнічний склад населення (де росіяни були
    меншиною), русифікація.'
  - '2. Український наратив: Південь — це історичні землі Запорозької Січі та Кримського ханства. Українці становили більшість
    населення від початку масового заселення.'
  - 'Методологія: аналіз церковних метрик, даних переписів населення, фольклору, козацьких архівів. Акцент на соціальній історії.'
  - 'Агенда: доведення автохтонності українців, спростування імперських міфів, зміцнення національної єдності.'
  - '3. Західний наратив: розглядає Південь України в контексті європейської колонізації та розширення імперій.'
  - '[!myth-buster] Методологія: "Subaltern studies", порівняльна історія імперій. Акцент на мультикультурності та ролі іноземних
    спільнот (греки, німці, євреї).'
  section: 'Зіткнення наративів: "Новоросія" — від імперського проекту до сучасної зброї'
  words: 1800
- points:
  - 'Джерело 1: Фрагмент з праці російського історика XIX ст. (напр., Дмитро Багалій) про "освоєння" південних земель.'
  - 'Аналіз: Хто автор? Яка його позиція в імперській академічній ієрархії? Як терміни "освоєння", "захист кордонів" формують
    наратив?'
  - 'Джерело 2: Фрагмент з праці сучасного українського історика (напр., Сергій Плохій) про міф Одеси.'
  - '[!epistemic-humility] Порівняння: Як обидва історики використовують (або ігнорують) однакові дані про етнічний склад
    населення? Де їхні інтерпретації розходяться і чому?'
  section: 'Джерельна критика: Читаючи імперського історика'
  words: 1500
- points:
  - 'Повернення до розминки: Чи можете ви тепер назвати 3-4 маркери імперського стилю історичного письма?'
  - 'Мета-рефлексія: Чому міф про "Новоросію" виявився таким живучим? Які потреби він задовольняє для російського суспільства?'
  - '[!decolonization] Зв''язок із сьогоденням: Аналіз промов Путіна від 2014 та 2022 років. Як сучасна пропаганда використовує
    та переробляє історичні наративи, проаналізовані в модулі?'
  - 'Підсумок: Південь України — не "Новоросія", а невід''ємна частина українського історичного простору.'
  section: Дискусія та підсумок
  words: 700
focus: Deconstruction of the "Novorossiya" myth, Russian colonization of Southern Ukraine, historiographical narratives (imperial,
  Ukrainian, Western), and the Ukrainian identity of the region.
level: ISTORIO
module: istorio-079
objectives:
- Аналізувати ідеологічне підґрунтя та історичний контекст імперського конструкту 'Новоросія'.
- Критично оцінювати російський, український та західний наративи про історію Півдня України, виявляючи їх методологію, агенду
  та сліпі зони.
- Застосовувати методи джерельної критики до аналізу історіографічних текстів.
- Аргументовано спростовувати міф про 'російський' характер Півдня України, спираючись на демографічні та історичні дані.
