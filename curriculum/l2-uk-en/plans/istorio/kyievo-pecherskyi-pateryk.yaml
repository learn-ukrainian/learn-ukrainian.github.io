content_outline:
- points:
  - 'Провокація: уривок з Патерика про диво і сухий запис із літопису про ту ж епоху. Де більше історичної правди?'
  - 'Питання на роздум: чи може текст, написаний для прославлення святих, бути надійним джерелом для історика? Поясніть свою
    думку.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Патерик як точне історичне джерело (позиція церковних істориків) vs. Патерик як літературний твір із набором
    агіографічних топосів (позиція світської медієвістики).'
  - 'Дебат 2: Авторство. Симон і Полікарп — історики, що фіксували реальність, чи компілятори усних переказів та візантійських
    зразків?'
  - '[!epistemic-humility] Розгляд доказів обох сторін: які аргументи використовують для доказу/спростування історичності
    чудес та подій?'
  section: 'Конфліктна карта: Агіографія: Джерело чи Міраж?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Монахи як паразитичний клас, Патерик — інструмент ідеологічного одурманення
    народу, що приховує класову боротьбу та виправдовує феодалізм. Мета — показати "спільну колиску".'
  - 'Український національний наратив: Патерик як доказ тисячолітньої духовності, прямого зв''язку з Візантією, фундамент
    національної ідентичності. Антоній і Феодосій — духовні батьки нації. Патерик як свідок європейської орієнтації Русі.'
  - 'Західний академічний наратив: Патерик як джерело для вивчення ментальності, соціальних структур, економіки монастиря.
    Аналіз агіографічних топосів як запозичень, а не унікальних місцевих подій.'
  - '[!decolonization] Викриття радянської інструменталізації Патерика для концепції "братніх народів".'
  - '[!myth-buster] Критичний погляд на національний наратив: наскільки Патерик є "унікально українським", а наскільки — частиною
    загальноєвропейської агіографічної традиції?'
  section: 'Зіткнення наративів: Образ Ченця в Середньовіччі'
  words: 1700
- points:
  - 'Close reading: уривки з "Житія Феодосія" про його конфлікти з князем Святославом.'
  - 'Біографічні факти vs. агіографічні топоси: що в житії є перевірюваним фактом (зв''язки з князями, економіка монастиря),
    а що — обов''язковим елементом жанру (боротьба з бісами, пророцтва, посмертні дива)?'
  - 'Аналіз мови: церковнослов''янізми та побутова лексика, що свідчить про реалії XI ст.'
  - '[!epistemic-humility] Порівняння з візантійськими патериками: що є прямим запозиченням, а що може свідчити про унікальні
    київські реалії?'
  section: 'Джерельна критика: Житіє Феодосія Печерського'
  words: 1500
- points:
  - 'Повернення до розминки: чи можна використовувати агіографію як історичне джерело? Студент формулює критерії надійності.'
  - 'Мета-рефлексія: що Патерик розповідає нам про цінності, страхи та світогляд людини Київської Русі?'
  - '[!decolonization] Зв''язок із сьогоденням: як сьогодні творяться "житія" сучасних героїв (військових, активістів)? Які
    наративні прийоми з агіографії використовуються в сучасній пропаганді та контрпропаганді?'
  section: Дискусія та підсумок
  words: 700
focus: The Patericon as a historical source, historiographical criticism of hagiography, Simon and Polikarp's authorship,
  Byzantine topoi vs. Kyivan reality, and the Patericon's role in narrative construction from medieval times to the present.
level: ISTORIO
module: istorio-013
objectives:
- Розрізняти наративи про Патерик: радянський, український національний та західний академічний
- Застосовувати методи джерельної критики до агіографічних текстів, відділяючи історичні факти від літературних топосів
- Аналізувати "Житіє Феодосія Печерського" як приклад для розуміння структури та мети Патерика
- Формулювати аргументовану позицію щодо можливостей та обмежень використання агіографії як історичного джерела
pedagogy: CBI
