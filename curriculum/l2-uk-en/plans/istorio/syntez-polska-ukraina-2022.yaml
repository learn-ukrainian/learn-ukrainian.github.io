objectives:
- Аналізувати причини та наслідки історичного перелому 2022 року у польсько-українських відносинах, розрізняючи офіційний
  дискурс та суспільні настрої
- Критично оцінювати концепцію «неочікуваного братерства», розглядаючи її як історичний феномен і як інструмент політичної
  комунікації
- Виявляти та аналізувати російські імперські наративи, спрямовані на підрив польсько-української солідарності
- Застосовувати методи джерельної критики до аналізу сучасних медійних та аналітичних текстів про міжнародні відносини
