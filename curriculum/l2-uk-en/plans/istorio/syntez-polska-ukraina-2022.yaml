content_outline:
- points:
  - 'Провокація: Порівняйте два висловлювання. Перше, 2021: «Волинська трагедія — це рана, що ніколи не загоїться». Друге,
    березень 2022: «Ми не біженців приймаємо, ми приймаємо братів». Що змінилося в історичній свідомості двох народів за кілька
    тижнів?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є солідарність 2022 року справжнім історичним примиренням, що закриває питання Волині, чи це лише тимчасова
    «пауза» у історичних суперечках перед обличчям спільного ворога?'
  - 'Дебат 2: Що було рушієм допомоги — щирий порив громадянського суспільства знизу чи прагматичний розрахунок польських
    політичних еліт, що побачили шанс посилити свою роль в регіоні?'
  - '[!epistemic-humility] Аналіз доказів на користь обох тез: з одного боку — безпрецедентна мобілізація звичайних поляків,
    з іншого — швидкі та системні рішення уряду.'
  section: 'Конфліктна карта: Примирення чи стратегічна пауза?'
  words: 900
- points:
  - 'Польський наратив: «Історичний обов''язок і шанс». Допомога Україні — це не лише моральний імператив, але й інвестиція
    у власну безпеку та лідерство в Центральній Європі. Акцент на спільній історії боротьби проти російського імперіалізму.'
  - 'Український наратив: «Неочікуване братерство». Вдячність за безпрецедентну допомогу, що сприймається як справжній акт
    солідарності, який перекреслює старі образи. Польща як найближчий союзник і адвокат в ЄС.'
  - '[!decolonization] Російський імперський наратив: «Польща готується до анексії». Кремлівська пропаганда представляє допомогу
    як підступний план поглинання Західної України, реанімацію ідей Речі Посполитої, намагаючись посіяти недовіру між двома
    народами.'
  - '[!myth-buster] Аналіз того, як російська пропаганда використовує реальні історичні травми (Волинь), викривлюючи їх, щоб
    підірвати сучасну солідарність.'
  section: 'Зіткнення наративів: Польсько-українське братерство 2022 року'
  words: 1700
- points:
  - 'Джерело 1: Аналіз емоційної публіцистичної статті Адама Міхніка (умовно) з березня 2022 року. Ідентифікація риторичних
    прийомів, історичних алюзій (Солідарність, «за нашу і вашу свободу»), визначення цільової аудиторії та мети тексту.'
  - 'Джерело 2: Розбір аналітичного звіту західного think-tank (напр. CEPA) за 2023 рік про «втому від біженців» та «зерновий
    конфлікт». Методологія (статистика, соціологія), мова (нейтральна, об''єктивізуюча), agenda (попередження політичних ризиків),
    фінансування.'
  - '[!epistemic-humility] Порівняння двох джерел: як по-різному можна описувати ту саму реальність? Які аспекти підсвічує
    емоційна публіцистика, а які — сухий аналітичний звіт? Що залишається поза увагою в кожному з них?'
  section: 'Джерельна критика: Від Gazeta Wyborcza до звітів Chatham House'
  words: 1500
- points:
  - 'Повернення до розминки: Як, озброївшись знаннями з модуля, можна тепер пояснити разючу зміну риторики у 2022 році? Чи
    є це зміною історичної пам''яті чи лише зміною політичного дискурсу?'
  - 'Мета-рефлексія: Цей модуль показав, як теперішні події можуть кардинально змінювати інтерпретацію минулого. Історія —
    це не те, що було, а те, як ми про це пам''ятаємо і розповідаємо.'
  - '[!decolonization] Як розуміння механізмів російської пропаганди, проаналізованих у модулі, допомагає протистояти спробам
    посварити українців та поляків сьогодні?'
  - 'Прогноз: Які з виявлених у модулі «точок напруги» (історична пам''ять, економічні інтереси) можуть стати найбільшими
    викликами для польсько-українських відносин після закінчення війни?'
  section: Дискусія та підсумок
  words: 700
focus: The 2022 shift in Polish-Ukrainian relations, from historical trauma to solidarity, analysis of narratives (Polish,
  Ukrainian, Russian), and future challenges.
