module: istorio-004
level: ISTORIO
sequence: 4
slug: radyanska-istorio
version: '1.0'
title: 'Радянська історіографія: Деформації'
focus: history
pedagogy: seminar
word_target: 5000
objectives:
- 'Analyze the causes and consequences of радянська історіографія: деформації'
- Evaluate the historical significance of історія на службі партії
- Trace the development of спадщина радянської історіографії
sources:
