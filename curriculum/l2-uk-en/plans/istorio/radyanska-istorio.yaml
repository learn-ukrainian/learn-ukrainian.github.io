content_outline:
- points:
  - 'Провокація: «...великий російський народ допоміг українському народу... створити свою єдину українську державу». Вгадайте,
    звідки ця цитата? Хто, кому, і за яких обставин «допоміг»?'
  - 'Вступне питання: Чи може історія бути об''єктивною, коли її пишуть на замовлення держави, що веде тотальну ідеологічну
    війну?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Марксизм-ленінізм як єдина дозволена методологія vs. західні історичні школи (Анналів, Кембриджська). У чому
    фундаментальна різниця підходів до минулого?'
  - 'Дебат 2: Переяславська рада 1654 року. Радянська теза про «віковічне прагнення до возз''єднання» vs. український погляд
    на ситуативний військовий союз. Які джерела використовують обидві сторони?'
  - '[!epistemic-humility] Радянський історик як «ідеологічний працівник» на «історичному фронті». Чи можлива наукова дискусія
    в таких умовах?'
  - 'Глобальний контекст: порівняння радянської історіографії з історичною політикою в інших тоталітарних режимах (нацистська
    Німеччина, маоїстський Китай).'
  section: 'Конфліктна карта: ''Партійність'' vs. ''Об''єктивність'''
  words: 900
- points:
  - '1. Радянський наратив: Повне замовчування до 1980-х. Пізніше — «продовольчі труднощі», «ексцеси колективізації», «спільна
    трагедія радянських народів». АГЕНДА: зняти відповідальність з Кремля, заперечити цілеспрямованість проти українців. СЛІПІ
    ЗОНИ: документи про загороджувальні загони, «чорні дошки», закриття кордонів УРСР.'
  - '2. Український наратив (діаспора, сучасна Україна): Голодомор-геноцид. ДЖЕРЕЛА: свідчення очевидців, демографічна статистика,
    документи з розсекречених архівів, праці Джеймса Мейса. АГЕНДА: відновити історичну справедливість, довести злочинний
    характер режиму.'
  - '3. Західний наратив: Еволюція від скептицизму до визнання. Ранні праці (Роберт Конквест) vs. сучасні дослідження (Тімоті
    Снайдер, Енн Епплбом). ДЕБАТИ: чи підпадає Голодомор під юридичне визначення геноциду ООН? АГЕНДА: академічна об''єктивність,
    порівняльні дослідження сталінізму.'
  - '[!decolonization] Розвінчання міфу про «спільну трагедію» — аналіз документів, що доводять специфічно антиукраїнську
    спрямованість терору голодом.'
  - '[!myth-buster] "Голод був і в Поволжі". Так, але чому в Україні він супроводжувався терором проти інтелігенції та церкви,
    а кордони закривали на виїзд, а не на в''їзд?'
  section: 'Зіткнення наративів: Голодомор 1932-1933 рр.'
  words: 1700
- points:
  - 'Close reading документа: аналіз лексики («великий російський народ», «віковічна дружба», «вороги народу»), евфемізмів
    та замовчувань.'
  - 'Авторство та інституційний контекст: документ ЦК КПРС. Як це впливає на його зміст та мету? Це історичний документ чи
    політична декларація?'
  - 'Механізми контролю: як ці Тези ставали обов''язковою рамкою для всіх підручників, дисертацій, фільмів? Роль Головліту
    (цензури) та самоцензури (страху).'
  - 'Доступ до архівів: які джерела були доступні авторам Тез, а які — свідомо ігнорувались або були закриті? (наприклад,
    документи про репресії проти козацької старшини).'
  - '[!epistemic-humility] Порівняння Тез із текстами українських істориків-емігрантів (Липинський, Дорошенко). Як абсолютно
    по-різному можна інтерпретувати ті самі події 1654 року?'
  section: 'Джерельна критика: ''Тези про 300-річчя возз''єднання України з Росією'' (1954)'
  words: 1500
- points:
  - 'Повернення до розминки: тепер, знаючи контекст, як би ви проаналізували цитату з Тез 1954 року? Які ідеологічні маніпуляції
    в ній закладено?'
  - 'Мета-рефлексія: що залишається від радянської історіографії в головах людей? Аналіз стійких міфів («ОУН-УПА — нацистські
    колаборанти», «Крим завжди був російським»).'
  - '[!decolonization] Сучасні виклики: як російська пропаганда використовує старі радянські наративні шаблони для виправдання
    агресії проти України?'
  - 'Підсумкове питання: декомунізація — це лише про знесення пам''ятників, чи про глибинну роботу з переосмислення минулого?
    Аргументуйте свою позицію.'
  section: Дискусія та підсумок
  words: 700
focus: Marxist-Leninist methodology, party control over history, forbidden topics (Holodomor, OUN-UPA), mandatory narratives
  (1654 Pereiaslav "reunification"), mechanisms of control, and the legacy of Soviet historical narratives in contemporary
  discourse.
level: ISTORIO
module: istorio-004
objectives:
- Аналізувати причини, механізми та наслідки деформацій в радянській історіографії
- Застосовувати методи джерельної критики для аналізу радянських ідеологічних документів
- Порівнювати та деконструювати радянський, український та західний наративи щодо ключових подій (на прикладі Голодомору)
- Виявляти спадщину радянської історичної школи в сучасних російських пропагандистських наративах
pedagogy: CBI
