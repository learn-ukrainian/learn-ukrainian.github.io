content_outline:
- points:
  - 'Провокація: «Зрада» чи «визвольна боротьба»? Два описи вчинку Івана Мазепи, один з російського підручника, інший — з
    українського. Студент має визначити, який є який, і пояснити, за якими маркерами.'
  - 'Цитата для роздумів: "Історія — це політика, перекинута у минуле". Як це висловлювання стосується битви під Полтавою?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Союз Мазепи з Карлом ХІІ — це зрада присяги російському царю чи легімна спроба гетьмана-суверена розірвати Переяславський
    договір в умовах, коли Москва його першою порушила?'
  - 'Дебат 2: Поразка під Полтавою була неминучою? Аргументи "за" (втрата Батурина, люта зима 1708-09, недостатня підтримка
    козацтва) vs. Аргументи "проти" (стратегічні помилки Карла, переваги шведської армії).'
  - '[!epistemic-humility] Оцінка рішення Мазепи залежить від вихідної точки: чи розглядаємо ми Гетьманщину як суверенну державу,
    чи як частину "царства Російського".'
  section: 'Конфліктна карта: Неминуча поразка чи втрачений шанс?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: Полтава — "матір" Російської імперії, тріумф Петра І, що "прорубав вікно в
    Європу". Мазепа — ниций зрадник, ім''я якого піддано анафемі. Мета: легітимізація контролю над Україною як "споконвічно
    російською" землею.'
  - 'Український наратив: Полтава — трагічна втрата шансу на незалежність, кульмінація боротьби за вихід з-під московського
    впливу. Мазепа — національний герой, далекоглядний політик європейського масштабу. Конституція Орлика — доказ європейських
    прагнень України. Мета: обґрунтування тяглості української державності та її європейської ідентичності.'
  - 'Західний наратив (шведський/британський/німецький): Полтава як епізод Великої Північної війни, кінець шведського домінування
    на Балтиці та народження нової сили — Росії. Мазепа — екзотичний союзник Карла XII, другорядна фігура у великій геополітичній
    грі. Мета: аналіз зміни балансу сил у Європі.'
  - '[!decolonization] Порівняння того, як російська пропаганда від Петра І до Путіна використовує міф про "мазепинську зраду"
    для заперечення права українців на власну державу.'
  - '[!myth-buster] Поширений міф, що Мазепа не мав підтримки. Аналіз причин, чому значна частина старшини та козацтва не
    приєдналася до гетьмана.'
  section: 'Зіткнення наративів: Битва за Полтаву'
  words: 1700
- points:
  - 'Джерело 1: Аналіз "Пактів і Конституцій прав і вольностей Війська Запорозького" (1710). Яку модель держави пропонує Орлик?
    Як розподіляється влада? Які європейські ідеї Просвітництва вже присутні в тексті? Аналіз поняття "вільний народ".'
  - 'Джерело 2: Аналіз маніфесту Петра І про "зраду" Мазепи (1708). Якими словами цар описує гетьмана та його вчинок? Які
    звинувачення висуваються? Як Петро конструює образ "вірного малоросійського народу" та протиставляє його "зрадливій" старшині?'
  - 'Порівняльний аналіз: мова права та договору в Конституції Орлика проти мови влади, власності та покарання в маніфесті
    Петра. Дві різні політичні культури.'
  - '[!epistemic-humility] Як би ми інтерпретували ці документи, не знаючи, хто в результаті переміг? Наскільки на наше прочитання
    впливає "знання майбутнього"?'
  section: 'Джерельна критика: Конституція Орлика vs. Маніфест Петра І'
  words: 1500
- points:
  - 'Повернення до розминки: Чи можна дати однозначну оцінку діям Мазепи? Які нові аргументи "за" і "проти" з''явились у вас
    після аналізу джерел та наративів?'
  - 'Мета-рефлексія: Чому битва під Полтавою є настільки важливою для ідеологічного обґрунтування сучасної російсько-української
    війни? Які наративи з XVIII століття досі використовуються у пропаганді?'
  - 'Контрфактична вправа: Уявіть, що ви радник гетьмана Мазепи у 1708 році. Спираючись на аналіз модуля, напишіть коротку
    записку з аргументами "за" і "проти" союзу зі Швецією.'
  - '[!decolonization] Розвінчання ідеї про "братні народи" на прикладі відносин Петра І та Мазепи. Полтава як точка неповернення.'
  section: Дискусія та підсумок
  words: 700
focus: 'Counterfactual history of the Battle of Poltava: Mazepa-Charles XII alliance, Orlyk Constitution, and the clash of
  Russian imperial, Ukrainian national, and Western historiographical narratives.'
