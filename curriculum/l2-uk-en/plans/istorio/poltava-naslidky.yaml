objectives:
- 'Аналізувати битву під Полтавою та її наслідки з трьох історіографічних перспектив: російської імперської, української національної
  та західної.'
- Застосовувати методи джерельної критики для порівняльного аналізу "Конституції Орлика" та маніфестів Петра І, виявляючи
  їхні світоглядні засади.
- Розрізняти факти, інтерпретації та цілеспрямовані маніпуляції в історичних наративах про Мазепу та Полтаву.
- Формулювати аргументовану позицію щодо ролі Полтавської битви в історії української державності та її актуальності в сучасному
  російсько-українському конфлікті.
