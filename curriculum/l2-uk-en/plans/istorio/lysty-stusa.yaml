content_outline:
- points:
  - 'Провокація: Перед вами два тексти про одну людину. Один — вирок радянського суду, інший — номінація на Нобелівську премію.
    Не знаючи, хто є хто, що ви можете сказати про об''єкт опису та про авторів текстів?'
  - 'Цитата з листа Стуса: "І вірю, що моя дорога — це та, що заодно веде і до храму". Що означає "храм" для людини в радянському
    концтаборі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Листи Стуса — це висока література чи політична агітація? Радянська влада бачила в них "антирадянську пропаганду".
    Дисидентське коло — "голос правди". Де проходить межа?'
  - 'Дебат 2: Стус — жертва чи борець? Український національний наратив часто зображує його мучеником. Чи не применшує це
    його свідомого вибору, його агентності та готовності до боротьби?'
  - '[!epistemic-humility] Західні дослідники, як-от Джордж Шевельов, аналізували Стуса передусім як поета-модерніста, тоді
    як для української діаспори він був насамперед національним героєм. Обидві перспективи є валідними, але неповними.'
  section: 'Конфліктна карта: Поет чи злочинець?'
  words: 900
- points:
  - '1. Радянський наратив: Стус — "особливо небезпечний державний злочинець", "рецидивіст", "український буржуазний націоналіст".
    Його творчість — прикриття для підривної діяльності. Методологія: юридичний формалізм, ігнорування творчості. Агенда:
    криміналізація інакодумства.'
  - '2. Український наратив (пост-радянський): Стус — святий, мученик, пророк нації. Його листи — духовний заповіт. Методологія:
    агіографія, ідеалізація. Агенда: побудова національного пантеону. [!anti-hagiography] Такий підхід ризикує дегуманізувати
    Стуса, перетворюючи його з живої людини на ікону.'
  - '3. Західний наратив (Cold War era): Stus as a case study of Soviet human rights violations. Його справа використовувалася
    для демонстрації репресивної природи СРСР. Методологія: соціологія дисидентства, аналіз тоталітаризму. Агенда: ідеологічна
    боротьба.'
  - '[!decolonization] Радянський наратив досі живий у сучасній російській пропаганді, яка таврує будь-який прояв української
    ідентичності як "нацизм", так само як КДБ таврувало його як "націоналізм".'
  - '[!myth-buster] Міф про "адвоката-зрадника" Медведчука часто затьмарює системний характер радянського "правосуддя": вирок
    Стусу був вирішений наперед на рівні Політбюро, і жоден адвокат не міг його змінити.'
  section: 'Зіткнення наративів: Справа Василя Стуса'
  words: 1700
- points:
  - 'Читання між рядками: Аналіз фрагментів листів до дружини та сина. Як Стус говорить про важливі речі (творчість, гідність,
    Україна) езоповою мовою, щоб обійти цензуру?'
  - 'Цензура та самоцензура: Порівняння опублікованих версій листів із архівними копіями, де видно правки цензорів. Які теми
    були абсолютно заборонені? Про що Стус волів мовчати сам, аби лист дійшов?'
  - 'Лист vs. Поезія: Зіставлення уривка з листа, де Стус описує свій стан, та вірша, написаного в той же період. Де він більш
    відвертий? Які образи він використовує в поезії, але уникає в листах?'
  - '[!epistemic-humility] Ми ніколи не будемо мати "повного" Стуса. Те, що ми читаємо — це текст, скалічений та відфільтрований
    ГУЛАГом. Наше завдання — не "реконструювати" оригінал, а зрозуміти, як людина зберігає голос в умовах, створених для його
    знищення.'
  section: 'Джерельна критика: Листи як свідчення'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер, знаючи про три різні наративи, ви б проаналізували вирок суду та номінацію на Нобелівську
    премію? Які ідеологічні припущення лежать в основі кожного документа?'
  - 'Мета-рефлексія: Чого нас вчить історія Стуса про природу імперії та роль поета в суспільстві? Чому тоталітарні режими
    так бояться поетів?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна Росія використовує методи радянської пропаганди для дискредитації
    українських культурних діячів? Наведіть приклади.'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of Vasyl Stus's prison letters, comparing Soviet, Ukrainian nationalist, and Western narratives,
  and applying source criticism to censored epistolary texts.
level: ISTORIO
module: istorio-040
objectives:
- Аналізувати листи Стуса як складне історичне джерело, враховуючи фактори цензури та самоцензури.
- Критично розрізняти та порівнювати радянський, український національний та західний наративи про постать Василя Стуса.
- Застосовувати базові методи джерельної критики до епістолярних текстів, написаних в умовах тоталітарного режиму.
- Формулювати аргументовану позицію щодо ролі митця в умовах політичних репресій та екзистенційних загроз.
