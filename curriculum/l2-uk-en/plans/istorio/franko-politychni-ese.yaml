content_outline:
- points:
  - 'Провокація: «Ідеал» — це утопія чи необхідний інструмент політики? Представлено дві цитати без авторства — одна Франка,
    інша Драгоманова — про майбутнє України. Студент має визначити, яка з них здається більш «реалістичною» і чому.'
  - 'Запитання для роздумів: Чи може нація, позбавлена державності, дозволити собі мріяти про повну незалежність, чи це політичне
    самогубство?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Франко vs. Драгоманов. Повна державна незалежність (Франко) проти федералізму в оновленій демократичній Росії
    (Драгоманов). Чий підхід був більш обґрунтованим для кінця XIX ст.?'
  - 'Дебат 2: «Реальна політика» vs. «Поза межами можливого». Чи має інтелігенція працювати в рамках існуючих імперських інституцій,
    поступово здобуваючи права (позиція галицьких «реалістів»), чи її обов''язок — формулювати й обстоювати максималістський
    ідеал, навіть якщо він здається недосяжним (позиція Франка)?'
  - '[!epistemic-humility] Аргументи обох сторін мали свою логіку: Драгоманов боявся, що ізольована Україна стане жертвою
    сусідів, Франко — що без ідеалу незалежності нація розчиниться в імперії.'
  section: 'Конфліктна карта: Ідеал vs. Реальна політика'
  words: 900
- points:
  - 'Російський імперський наратив: «Малоросійський народ» — частина «триєдиного російського народу». Мова — «нарєчіє», культура
    — провінційна. Політична мета — повна асиміляція. Емський указ як інструмент. Джерела: офіційні урядові документи, праці
    російських істориків-державників.'
  - 'Український наратив (версія Франка): Українці — окрема нація з власною історією, мовою та культурою, що має право на
    повну державну суверенність. Обов''язок інтелігенції — плекати цей ідеал, незважаючи на тиск. Джерела: есе «Поза межами
    можливого», «Ukraina irredenta».'
  - 'Західний наратив (австро-польський): В Австро-Угорщині українці (русини) — об''єкт, а не суб''єкт політики. Для Відня
    — противага полякам та росіянам. Для поляків Галичини — конкуренти, чиї національні прагнення треба обмежувати. Політика
    «полонофільства» як спроба інтегрувати українську еліту в польський проєкт.'
  - '[!decolonization] Франко одночасно боровся проти трьох форм колоніалізму: прямого російського асиміляційного, австрійського
    «управлінського» та польського домінантного в Галичині.'
  - '[!myth-buster] Міф про те, що ідея незалежності була маргінальною. Франко доводить, що це єдина логічна кінцева точка
    національного розвитку.'
  section: 'Зіткнення наративів: «Українське питання» наприкінці XIX ст.'
  words: 1700
- points:
  - 'Близьке читання ключових фрагментів: аналіз риторики, логіки та стилістики Франка.'
  - 'Автор та його мета: Франко — не просто поет, а політичний мислитель. Його мета — не написати науковий трактат, а створити
    маніфест, що змінить свідомість української інтелігенції.'
  - 'Контекст написання (1900): реакція на «угодівство» та політичний прагматизм, що панували в Галичині. Полеміка з опонентами,
    яких він не називає прямо.'
  - 'Ключові поняття: аналіз термінів «національний ідеал», «духова суверенність», «поступ», «цілість нації» в розумінні Франка.'
  - '[!epistemic-humility] Як би опоненти Франка відповіли на його звинувачення? Спроба реконструкції їхньої позиції: «Ми
    рятуємо те, що можемо, а Франко кличе нас у прірву утопії».'
  section: 'Джерельна критика: Есе Івана Франка «Поза межами можливого»'
  words: 1500
- points:
  - 'Повернення до розминки: Чия позиція — Франка чи Драгоманова — виявилася більш пророчою для XX та XXI століть? Аргументація
    з посиланням на текст модуля.'
  - 'Мета-рефлексія: Яку роль відіграє «неможлива мрія» в історії? Коли вона стає рушійною силою, а коли — небезпечною ілюзією?'
  - 'Зв''язок із сьогоденням: Як аргументи Франка про «ідеал понад усе» та критику «реальної політики» можна застосувати до
    сучасних українських та світових політичних дебатів (напр., щодо компромісів із агресором)?'
  - '[!decolonization] Франко вчить, що перший крок до деколонізації — це деколонізація уяви: дозволити собі уявити майбутнє,
    яке імперія називає «неможливим».'
  section: Дискусія та підсумок
  words: 700
focus: Політична есеїстика Івана Франка, аналіз есе «Поза межами можливого», полеміка з Драгомановим (федералізм vs незалежність),
  критика москвофільства та «реальної політики»
