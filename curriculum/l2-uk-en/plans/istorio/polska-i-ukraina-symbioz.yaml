content_outline:
- points:
  - 'Провокація: два анонімні погляди на Річ Посполиту. Один — «золота доба шляхетських вольностей», інший — «тюрма народів».
    Який з них польський, а який український? Чому?'
  - 'Цитата-загадка: «Братерство народів, що об''єдналися добровільно». Чия це пропаганда і про яку епоху?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сутність Речі Посполитої. Це була «спільна справа» руської та польської шляхти, чи польський проект колонізації
    українських земель?'
  - '[!epistemic-humility] Аргументи «за»: участь руської еліти в управлінні, поширення західної культури. Аргументи «проти»:
    полонізація, закріпачення селян, релігійний тиск.'
  - 'Дебат 2: Повстання Хмельницького 1648 року. Це була національно-визвольна війна, громадянська війна всередині однієї
    держави, чи релігійний конфлікт?'
  - 'Методологія: марксистська історіографія бачить класову боротьбу, національна — державницький рух, ревізіоністи — боротьбу
    еліт.'
  section: 'Конфліктна карта: Спільна держава чи колоніальна імперія?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: Річ Посполита як «failed state», анархія та католицька загроза православним
    «братам». Хмельниччина — «возз''єднання» України з Росією.'
  - 'Агенда: виправдання російського експансіонізму та заперечення існування окремої української історії.'
  - 'Український наратив: «втрачений шанс» на триєдину державу (Польща, Литва, Русь). Люблінська унія як початок кінця «золотої
    осені» руської еліти. Хмельниччина як точка неповернення, народження козацької держави.'
  - '[!decolonization] Цей наратив відкидає ідею «возз''єднання» і ставить у центр українську суб''єктність.'
  - 'Польський наратив: Річ Посполита як унікальний оплот «шляхетської демократії» та релігійної толерантності (до певного
    моменту). Хмельниччина як трагічний «бунт» (bunt), що зруйнував спільну державу.'
  - 'Західний наратив (напр., Норман Дейвіс): фокус на унікальності державного устрою, порівняння з іншими європейськими монархіями.
    Хмельниччина як одна з багатьох криз середини XVII ст. в Європі.'
  section: 'Зіткнення наративів: Річ Посполита'
  words: 1700
- points:
  - 'Джерело 1: Фрагмент з «Історії України-Руси» Михайла Грушевського. Погляд на Хмельниччину як кульмінацію тисячолітньої
    боротьби українського народу за державність.'
  - 'Аналіз: Грушевський як представник народницької школи. Хто є головним героєм історії для нього? Яку роль він відводить
    елітам?'
  - 'Джерело 2: Фрагмент з праць Наталі Яковенко. Аналіз ментальності руської шляхти, яка вважала Річ Посполиту своєю батьківщиною.'
  - '[!epistemic-humility] Аналіз: Яковенко як представниця ревізіоністської школи. Як її погляд змінює наше розуміння «полонізації»
    та «зради»?'
  - 'Порівняння методологій: де Грушевський бачить конфлікт націй, там Яковенко бачить складну гру ідентичностей у межах одного
    соціального стану.'
  section: 'Джерельна критика: Грушевський vs Яковенко'
  words: 1500
- points:
  - 'Повернення до розминки: студент тепер може не просто вгадати, а й пояснити, яка історична школа та національна традиція
    стоять за кожною цитатою.'
  - '[!decolonization] Чому російський наратив про «возз''єднання» є інструментом імперської політики до сьогодні?'
  - 'Мета-рефлексія: чи можлива «спільна історія» для поляків та українців, чи кожна нація приречена мати свій власний, несумісний
    з іншими, наратив?'
  - 'Сучасний вимір: як історична пам''ять про Річ Посполиту та Хмельниччину впливає на сучасні польсько-українські відносини
    в умовах російської агресії?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiographical debate on the Polish-Lithuanian Commonwealth: a space of cultural symbiosis or a colonial empire?
  Analysis of Polish, Ukrainian, and Russian imperial narratives of shared history.'
level: ISTORIO
module: istorio-114
objectives:
- Аналізувати різні історіографічні наративи (російський, український, польський) щодо спільної історії в Речі Посполитій
- Критично оцінювати первинні та вторинні джерела, виявляючи методологію та можливу упередженість автора
- Застосовувати поняття «наратив», «дискурс», «суб''єктність» для аналізу історичних дебатів
- Формулювати власну аргументовану позицію щодо суперечливих питань польсько-української історії
