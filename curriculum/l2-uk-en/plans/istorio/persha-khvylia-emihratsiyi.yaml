content_outline:
- points:
  - 'Провокація: Вам пропонують два описи життя в Канаді з кінця XIX ст. Один — з рекламної брошури пароплавної компанії,
    інший — з приватного листа додому в Галичину. Не знаючи, де який, визначте, якому б ви повірили і чому?'
  - 'Цитата для роздумів: "Вони не були ані зрадниками, що покинули батьківщину, ані героями, що будували нову. Вони були
    просто голодними". Чия це перспектива?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Push vs. Pull". Що було вирішальним: внутрішня криза в Галичині (земельний голод, перенаселення, тиск імперій)
    чи зовнішні "спокуси" (агресивна реклама агентів, листи від родичів, міф про "вільну землю")?'
  - 'Дебат 2: "Успіх vs. Експлуатація". Канадський наратив про "хоробрих піонерів" (sturdy peasants in sheepskin coats), що
    заселили прерії, проти реальності українських шахтарів у Пенсільванії та робітників на бразильських плантаціях.'
  - '[!epistemic-humility] Оцінка "успіху" міграції залежить від точки зору: для канадського уряду — успішна колонізація;
    для родини в селі — грошові перекази; для самого емігранта — часто трагедія.'
  section: 'Конфліктна карта: Надія чи вигнання?'
  words: 900
- points:
  - '1. Російський імперський наратив: Емігранти — "малороси", що тікають від "австрійського гніту" та католицизму. Їхні спроби
    самоорганізації — примітивне "селянське" копіювання російських інституцій. Мета наративу: заперечити існування окремої
    української ідентичності.'
  - '2. Український національний наратив: Емігранти — свідомі носії національної ідеї, які, рятуючись від економічного та
    політичного утиску, будують "Нову Україну" за океаном. Церкви, читальні, "Просвіти" — це акти політичної волі та продовження
    боротьби. Мета: довести життєздатність нації.'
  - '3. Західний (канадський/американський) наратив: Емігранти — перш за все, робоча сила. "Чоловіки в кожухах" (Sifton) —
    ідеальний інструмент для колонізації прерій. Етнічність — адміністративна категорія, часто проблематична (статус "enemy
    aliens" під час Першої світової). Мета: асиміляція в "плавильному котлі" або контроль у рамках "мозаїки".'
  - '[!decolonization] Порівняння показує, як історія одних і тих же людей використовується для абсолютно різних політичних
    проєктів — імперського, національного та колоніального.'
  - '[!myth-buster] Міф про "землю обітовану" активно конструювався і продавався пароплавними компаніями та їхніми агентами,
    які отримували комісію за кожного "доставленого" емігранта.'
  section: 'Зіткнення наративів: Ідентичність емігранта'
  words: 1700
- points:
  - 'Аналіз джерела №1: Приватний лист емігранта з Канади до родини в Галичину. Мова, емоції, побутові деталі, що згадується,
    а що замовчується. Хто аудиторія? Яка мета листа — поскаржитись, похвалитись, застерегти, покликати?'
  - 'Аналіз джерела №2: Фрагмент зі звіту австрійського чиновника про "еміграційну гарячку" в регіоні. Канцелярська мова,
    статистика, спроби знайти "винних" (агенти, "пропаганда"). Емігранти представлені як об''єкт, а не суб''єкт історії.'
  - 'Порівняльний аналіз: Як обидва документи описують одне й те саме явище? Де інформація збігається, а де суперечить? Чий
    погляд є "правдивим"? Чи можлива єдина "правда"?'
  - '[!epistemic-humility] Кожне джерело — це лише фрагмент реальності, відфільтрований через досвід, мету та упередження
    автора. Історик не "знаходить" правду, а "реконструює" її з цих фрагментів.'
  section: 'Джерельна критика: Листи з-за океану та звіти чиновників'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер, після аналізу джерел та наративів, ви оцінюєте рекламну брошуру та приватний лист?
    Які складніші смисли ви в них бачите?'
  - 'Мета-рефлексія: Як писати історію людей, що переважно були неписьменними і не залишили по собі архівів? Чиїм голосом
    говорить "історія першої хвилі еміграції"?'
  - 'Зв''язок із сьогоденням: Порівняйте наративи про трудових мігрантів кінця XIX ст. з сучасними наративами про українських
    біженців, що рятуються від війни. Які паралелі та відмінності ви бачите в тому, як їх сприймають приймаючі суспільства?'
  - '[!decolonization] Історія еміграції — це також історія про те, як імперії (Австро-Угорська, Російська) втрачали контроль
    над своїми підданими, які "голосували ногами".'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of the first wave of Ukrainian economic emigration, contrasting imperial, national, and
  Western narratives about the causes, processes, and outcomes of migration to the Americas.
level: ISTORIO
module: istorio-064
objectives:
- Розрізняти та аналізувати три основні історіографічні наративи про першу хвилю української еміграції: імперський, національний
    та західний
- Застосовувати методи джерельної критики для аналізу первинних документів (приватні листи, офіційні звіти)
- Критично оцінювати ключові історіографічні дебати щодо причин та наслідків масової міграції
- Формулювати власну аргументовану позицію щодо агентності та суб''єктності українських емігрантів у рамках історичного контексту
