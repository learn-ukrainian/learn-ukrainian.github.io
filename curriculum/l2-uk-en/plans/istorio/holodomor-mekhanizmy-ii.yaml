content_outline:
- points:
  - 'Провокативне питання: Чи може постанова про «заборгованість по хлібозаготівлях» бути знаряддям убивства? Аналізуємо уривок
    з Постанови ЦК КП(б)У 1932 року, не знаючи контексту.'
  - 'Вправа на інтуїцію: Два описи села — один з радянської газети, інший зі щоденника очевидця. Який де? Та чому радянський
    звіт виглядає так підозріло оптимістично?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Голодомор — це «трагічна помилка» чи цілеспрямований геноцид? Позиція 1 (радянська/ревізіоністська): надмірний
    ентузіазм місцевих виконавців, саботаж «куркулів», посуха. Позиція 2 (українська/більшість західних): це був свідомий
    удар по українському селянству.'
  - 'Дебат 2: «Чорні дошки» — це інструмент для збору зерна чи для вбивства людей? Позиція 1 (офіційна радянська): це був
    «показовий» захід для покарання «саботажників». Позиція 2 (дослідники геноциду): це була система створення локалізованих
    зон смерті, де виживання було неможливим.'
  - '[!epistemic-humility] Ми аналізуємо не лише факти, а й аргументацію. Як кожна сторона використовує (або ігнорує) одні
    й ті самі документи для доведення своєї правоти?'
  section: 'Конфліктна карта: Некомпетентність чи злий умисел?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Загальносоюзний голод», спричинений «труднощами колективізації» та «перегинами
    на місцях». Українська специфіка заперечується. «Чорні дошки» — вимушена міра проти селянського саботажу. Методологія:
    фокус на макроекономічних даних, ігнорування етнічного фактору. Агенда: зняти відповідальність з центру (Москви, Сталіна),
    представити українців як «ще одних постраждалих», а не цільову групу.'
  - 'Український наратив: Штучно створений терор голодом (Голодомор), який є актом геноциду проти української нації. «Чорні
    дошки», блокада, натуральні штрафи — це не ексцеси, а свідомо розроблені інструменти знищення. Методологія: аналіз первинних
    джерел (постанов, наказів), демографічна статистика, свідчення очевидців. Агенда: довести злочинний умисел режиму та визнання
    Голодомору геноцидом на міжнародному рівні. [!decolonization]'
  - 'Західний наратив: Еволюція від замовчування (Волтер Дюранті) до визнання (Роберт Конквест, Джеймс Мейс, Енн Епплбом).
    Спочатку — сприйняття радянської версії, потім — поступове визнання унікальності української трагедії. Методологія: архівна
    робота (після відкриття архівів), порівняльний аналіз з іншими геноцидами. Агенда: академічне дослідження злочинів тоталітаризму.
    [!myth-buster]'
  section: 'Зіткнення наративів: Голод 1932-33 рр.'
  words: 1700
- points:
  - Аналіз Постанови ЦК КП(б)У та РНК УСРР від 6 грудня 1932 р. про «чорні дошки». Які евфемізми використовуються («припинити
    підвіз товарів», «повне припинення торгівлі»)? Що вони означали в реальності абсолютної державної монополії на все?
  - Аналіз таємної директиви Сталіна від 22 січня 1933 р. про заборону виїзду селян з України та Кубані. Як формулюється «причина»
    заборони («пошук кращого життя»)? Який реальний наслідок (блокада, перетворення УСРР на гігантський концтабір)?
  - Порівняння мови офіційних документів із мовою свідчень очевидців. Як «натуральний штраф» виглядає у спогадах тих, у кого
    забирали «все до останньої зернини»?
  - '[!epistemic-humility] Автор документа — радянський апарат. Яка його мета? Кого він хоче переконати? Чи можемо ми довіряти
    цифрам, але не інтерпретаціям у цих текстах?'
  section: 'Джерельна критика: Читаючи мовою катів'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер виглядає постанова про «хлібозаготівлі»? Поясніть, чому цей бюрократичний документ є
    доказом геноцидного наміру.'
  - 'Мета-рефлексія: Чому для доказу геноциду так важливо аналізувати саме механізми, а не лише кількість жертв? Що це нам
    говорить про природу сучасного, бюрократизованого зла?'
  - '[!decolonization] Як сьогоднішня російська пропаганда використовує радянські наративні стратегії (заперечення, применшення,
    перекладання відповідальності) для опису війни проти України?'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of the "black board" system, natural fines, and village blockades as deliberate mechanisms
  of the Holodomor genocide, contrasting Soviet, Ukrainian, and Western narratives.
