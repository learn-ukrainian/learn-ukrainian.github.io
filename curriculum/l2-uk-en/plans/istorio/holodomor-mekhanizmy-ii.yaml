objectives:
- Аналізувати «чорні дошки», натуральні штрафи та блокаду як взаємопов''язані механізми геноциду
- Розрізняти та критично оцінювати радянський, український та західний історіографічні наративи про Голодомор
- Проводити джерельну критику офіційних радянських документів, виявляючи евфемізми та прихований зміст
- Формулювати аргументовану позицію щодо наявності геноцидного наміру в діях радянського режиму
