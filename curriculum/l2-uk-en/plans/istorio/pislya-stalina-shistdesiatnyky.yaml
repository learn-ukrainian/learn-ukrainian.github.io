objectives:
- Аналізувати рух шістдесятників як історіографічну проблему, а не лише як послідовність подій
- Розрізняти радянський, український та західний наративи про шістдесятників, ідентифікуючи їхні методології та політичні
  завдання
- Застосовувати методи джерельної критики до аналізу первинних джерел (поезія, протоколи допитів, мемуари)
- Формулювати обґрунтовану позицію щодо спадку шістдесятників для сучасної України та глобального правозахисного руху
