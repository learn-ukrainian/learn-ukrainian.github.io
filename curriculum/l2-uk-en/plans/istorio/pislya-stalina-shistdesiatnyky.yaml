content_outline:
- points:
  - 'Провокація: Вам дають два тексти про українську культуру 1960-х. Один називає її «розквітом соціалістичного реалізму»,
    інший — «ренесансом розстріляного відродження». Не знаючи авторів, спробуйте визначити, який текст радянський, а який
    — дисидентський. На яких маркерах ви базуєте своє припущення?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Шістдесятники — це культурний чи політичний феномен? Українська радянська історіографія наполягала на аполітичності
    «здорової частини» митців. Національна історіографія (та самі дисиденти) стверджують, що в умовах СРСР будь-який культурний
    спротив був політичним.'
  - 'Дебат 2: «Хрущовська відлига» — це реальна лібералізація чи контрольований «випуск пари»? Одні історики бачать у ній
    спробу гуманізації системи, інші — прагматичний крок для підвищення ефективності режиму без зміни його суті.'
  - '[!epistemic-humility] Чи можна вважати шістдесятників єдиним рухом, чи це була сукупність індивідуальних творчих траєкторій,
    штучно об''єднаних репресивною машиною?'
  section: 'Конфліктна карта: Культура чи політика?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Буржуазні націоналісти», «відщепенці», що піддалися західній пропаганді.
    КПРС дала їм можливість творити, а вони «зрадили» ідеали соціалізму. Акцент на «покаянних» листах та відмовах від своїх
    поглядів. Методологія: цитати з протоколів допитів, партійних резолюцій. Агенда: легітимізація репресій, дискредитація
    національного руху.'
  - 'Український наратив: Шістдесятники — «совість нації», мученики, які зберегли українську культуру та підготували ґрунт
    для незалежності. Акцент на незламності, творчому доробку, спадкоємності з Розстріляним відродженням. Методологія: аналіз
    творів, мемуари, листи з таборів. Агенда: побудова пантеону національних героїв, легітимізація незалежності.'
  - 'Західний наратив: Шістдесятники як частина ширшого правозахисного руху в Східній Європі. Акцент на універсальних цінностях:
    свобода слова, права людини. Аналіз у контексті Холодної війни, як індикатор внутрішньої кризи СРСР. Методологія: порівняльний
    аналіз, теорії тоталітаризму. Агенда: демонстрація переваг ліберальної демократії.'
  - '[!decolonization] Радянська спроба представити шістдесятників як «локальний націоналістичний» рух була способом ізолювати
    їх від глобального правозахисного контексту.'
  - '[!myth-buster] Міф про те, що всі шістдесятники були антирадянськими дисидентами. Багато з них починали як «вірні ленінці»
    і вірили в «соціалізм з людським обличчям».'
  section: 'Зіткнення наративів: Оцінка руху шістдесятників'
  words: 1700
- points:
  - 'Джерело 1: Аналіз вірша Василя Стуса «Як добре те, що смерті не боюсь я...». Які філософські та політичні погляди автора
    можна реконструювати з тексту? Які мовні засоби він використовує для вираження своєї позиції?'
  - 'Джерело 2: Аналіз фрагменту протоколу допиту Василя Стуса з архівів КДБ. Як слідчий намагається маніпулювати, перекручувати
    слова, створювати образ «ворога»? Яку тактику захисту обирає Стус?'
  - 'Порівняльний аналіз: Як ці два документи — вірш і протокол — створюють два абсолютно різні, непорівнянні образи однієї
    людини? Який з них є більш «правдивим» джерелом для історика, і чому це питання є складним?'
  - '[!epistemic-humility] Історик не може повністю довіряти жодному з цих джерел. Поезія — це художній образ, а протокол
    допиту — документ, створений з метою репресій. Істина знаходиться у критичному зіставленні обох.'
  section: 'Джерельна критика: Поезія як доказ, протокол як зброя'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви можете ідентифікувати радянський та дисидентський наративи? Які інструменти аналізу,
    отримані в цьому модулі, ви використали?'
  - 'Мета-рефлексія: Чому для розуміння шістдесятників недостатньо просто читати їхні твори або біографії? Чому історіографічний
    аналіз (хто, як і навіщо пише історію) є ключовим?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна російська пропаганда використовує ті самі наративні техніки (дискредитація,
    звинувачення в «нацизмі»), що й КДБ проти шістдесятників? Чому розуміння механізмів радянської історіографії є зброєю
    в інформаційній війні?'
  section: Дискусія та підсумок
  words: 700
focus: 'The Sixtiers (Шістдесятники) as a historiographical problem: cultural revival, KGB repressions, and competing historical
  narratives (Soviet, Ukrainian, Western).'
