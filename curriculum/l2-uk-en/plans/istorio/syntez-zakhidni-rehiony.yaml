content_outline:
- points:
  - 'Провокація: Звідки походить стереотип про «більш патріотичних» і «справжніх» українців із заходу? Чиїм наративам цей
    стереотип служить, і як він використовується сьогодні?'
  - 'Цитата-загадка: "Возз''єднання споконвічних земель з матір''ю-вітчизною було актом історичної справедливості". Обговоріть,
    хто міг бути автором цих слів і яка ідеологія за ними стоїть.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи справді Австро-Угорщина була «тюрмою народів», чи радше «лабораторією націй»? Порівняння правового статусу,
    політичного представництва та освітніх можливостей українців у Галичині та Наддніпрянщині.'
  - 'Дебат 2: Греко-Католицька Церква — інструмент збереження ідентичності чи агент зовнішнього впливу? Дискусія про її роль
    у формуванні окремої галицької ідентичності, відмінної від православного сходу.'
  - '[!epistemic-humility] Оцінка «прогресивності» однієї імперії над іншою — пастка. Обидві обмежували суверенітет, але робили
    це різними інструментами (закон, асиміляція, репресії), що породило різні стратегії опору.'
  section: 'Конфліктна карта: Імперський спадок: Австрія vs. Росія'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Возз''єднання" 1939 року як виправлення історичної помилки, "визволення"
    братського народу від польського гніту та "капіталістичної експлуатації". Подальша радянізація як модернізаційний проєкт.'
  - 'Український наратив: Концепція «Українського П''ємонту». Західна Україна як осередок національного руху, що зберіг мову,
    культуру та політичну свідомість, поки схід був під тиском русифікації. ЗУНР як доказ державницьких прагнень.'
  - 'Західний наратив: Розглядає регіон як "borderlands" або частину Центральної Європи (спадщина Габсбургів), де український
    національний рух був лише одним з багатьох (поряд з польським, єврейським). Акцент на мультикультурності та складності
    міжетнічних відносин, іноді применшуючи український державницький проєкт.'
  - '[!decolonization] Викриття терміну «возз''єднання» як інструменту імперської легітимації анексії. Аналіз того, як радянська
    історіографія систематично замовчувала існування ЗУНР та опір радянізації.'
  - '[!myth-buster] Розвінчання міфу про монолітність західних земель. Порівняння траєкторій Галичини, Волині, Буковини та
    Закарпаття, що перебували у складі різних держав.'
  section: 'Зіткнення наративів: Галичина як «Український П''ємонт»'
  words: 1700
- points:
  - 'Джерело 1 (уривок): Праця радянського історика 1970-х років про «возз''єднання» західноукраїнських земель. Аналіз лексики
    («буржуазні націоналісти», «воля народу»), відбір фактів, посилання на рішення партійних з''їздів як на доказ.'
  - 'Джерело 2 (уривок): Праця українського історика з діаспори (США/Канада) того ж періоду. Аналіз методології (акцент на
    усній історії, архівних документах некомуністичних партій), ідеологічної позиції (антикомунізм), можливих сліпих плям
    (ідеалізація міжвоєнного періоду).'
  - '[!epistemic-humility] Завдання — не знайти «правдиву» версію, а зрозуміти, як ідеологічні рамки, доступ до джерел та
    інституційний контекст (державний університет в СРСР vs. західний університет) формують історичний наратив.'
  - 'Порівняльний аналіз: як обидва автори описують одну й ту ж подію, наприклад, прихід Червоної армії у Львів 1939 року?
    Які факти вони використовують, а які замовчують?'
  section: 'Джерельна критика: Аналіз радянської та діаспорної історіографії'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є стереотип про «більш українських» західняків продуктом радянської пропаганди (розділяй і
    володарюй) чи відображенням реальних історичних відмінностей?'
  - 'Мета-рефлексія: Як різні імперські спадки (Габсбурзький та Романівський) вплинули на формування різних моделей української
    ідентичності?'
  - '[!decolonization] Чи актуальний сьогодні поділ на «Схід» і «Захід»? Як повномасштабне вторгнення 2022 року змінило регіональні
    ідентичності та зруйнувало старі стереотипи?'
  - 'Зв''язок із сьогоденням: аналіз сучасної російської пропаганди про «Галичину, що нав''язує свою волю всій Україні» як
    прямого продовження імперських та радянських наративів.'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical debate on Western Ukraine's distinct identity, the "Ukrainian Piedmont" concept, and the clash of
  imperial (Habsburg, Russian/Soviet) and national narratives.
level: ISTORIO
module: istorio-075
objectives:
- Критично аналізувати радянський, український національний та західний наративи про історію західноукраїнських земель.
- Визначати ідеологічні впливи та методологічні підходи в уривках з історичних праць.
- Пояснювати, як різні імперські політики (Австро-Угорська та Російська) призвели до формування відмінних регіональних траєкторій.
- Аргументовано дискутувати про актуальність та трансформацію регіональних поділів у сучасній Україні.
