objectives:
- Аналізувати "мазепинський цикл" як приклад кооптації та конфлікту в імперських системах
- Розрізняти український, російський імперський та західний наративи про постать Івана Мазепи
- Критично оцінювати первинні джерела, зокрема церковну анафему та політичні маніфести, як інструменти війни
- Пояснювати, як історичні наративи про "зраду" використовуються в сучасній політиці та пропаганді
