content_outline:
- points:
  - 'Провокація: Як найбагатший аристократ Європи, улюбленець царя і 20-річний гетьман в один день став “Юдою” і отримав церковне
    прокляття? Що насправді сталося восени 1708 року?'
  - 'Цитата без авторства: "Зрада чи вірність визначаються не вчинком, а тим, хто пише історію". Як цей вислів стосується
    долі Івана Мазепи?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мазепа — зрадник Петра I чи захисник України? Аналіз аргументів "державницької" школи (Мазепа як останній захисник
    автономії) та "імперської" (Мазепа як клятвопорушник).'
  - 'Дебат 2: Союз зі шведами — це вимушений крок відчаю чи давно спланована змова? Розгляд доказів обох версій на основі
    листування Мазепи та донесень старшини.'
  - '[!epistemic-humility] Чи були в Мазепи інші варіанти у 1708 році, окрім союзу зі шведами чи повної капітуляції перед
    Петром? Оцінка альтернативних сценаріїв.'
  section: 'Конфліктна карта: Зрадник чи державник?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Мазепа — втілення зради, “мазепинство” — синонім сепаратизму. Анафема як
    справедлива кара за порушення присяги царю. Докази: церковні тексти, праці російських істориків ХІХ ст.'
  - 'Український наратив: Мазепа — державник, що наважився на розрив з імперією заради збереження Гетьманщини. Анафема — політичний
    інструмент, а не релігійний акт, спрямований на знищення ідеї української незалежності. Докази: маніфести Мазепи, українська
    еміграційна історіографія.'
  - 'Західний наратив: Мазепа як фігура європейської політики. Для шведів — ситуативний союзник. Для романтиків (Байрон, Гюго)
    — трагічний герой, що бореться за свободу. Як західний погляд ігнорує або підкреслює аспекти, важливі для української
    та російської сторін.'
  - '[!decolonization] Розкриття механізму: як анафема, церковний акт, була використана як зброя інформаційної війни, що діяла
    300 років.'
  - '[!myth-buster] Міф про "вічну дружбу" і "зраду" як єдину причину розриву. Аналіз економічних та військових причин, що
    призвели до конфлікту.'
  section: 'Зіткнення наративів: Анафема Мазепі'
  words: 1700
- points:
  - 'Close reading тексту самої анафеми: аналіз лексики ("Юда", "проклятий", "порушник хрестоцілування"). Чи є в тексті політичні
    аргументи, чи тільки релігійні звинувачення? Хто автор і яка його мета?'
  - Порівняльний аналіз маніфестів Мазепи до козацької старшини та універсалів до українського народу. Як гетьман пояснює
    свої дії? Які аргументи він використовує для різних аудиторій? Чи є суперечності?
  - '[!epistemic-humility] Оцінка надійності джерел: наскільки ми можемо довіряти текстам, написаним в умовах війни? Як відрізнити
    пропаганду від реальних мотивів?'
  section: 'Джерельна критика: Маніфести та анафема'
  words: 1500
- points:
  - 'Повернення до розминки: хто кого зрадив у 1708 році — Мазепа Петра чи Петро Мазепу та Україну? Студент має сформулювати
    власну позицію, спираючись на три наративи.'
  - Чому анафема Мазепі досі офіційно не знята РПЦ, незважаючи на прохання українських церков? Що це говорить про сучасну
    політику пам'яті в Росії?
  - '[!decolonization] Як термін "мазепинство" продовжує жити в сучасному російському пропагандистському дискурсі для таврування
    будь-яких проявів української незалежності.'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiography of Ivan Mazepa: the imperial narrative of “traitor” vs. the Ukrainian narrative of state-building,
  the logic of the alliance with Sweden, and the anathema as a tool of political warfare.'
