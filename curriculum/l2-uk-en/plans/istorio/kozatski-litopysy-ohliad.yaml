content_outline:
- points:
  - 'Провокація: два анонімні уривки про Переяславську раду. Один — сухий звіт, інший — пишний панегірик. Який належить очевидцю,
    а який — ідеологу? Чому?'
  - 'Запитання до роздумів: Чому наприкінці XVII століття, в період кризи, козацька старшина раптом почала масово писати історію?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Літопис — це об''єктивна історія чи суб''єктивна література? Позиція 1 (історія): це первинні джерела, звіти
    очевидців. Позиція 2 (література): це барокові тексти, де риторика важливіша за факт.'
  - 'Дебат 2: Патріотичний маніфест чи пропаганда окремих угруповань? Позиція 1: літописи обґрунтовують право України на автономію.
    Позиція 2: кожен літопис відстоює інтереси своєї "партії" старшини.'
  - '[!epistemic-humility] Радянська історіографія замовчувала літописи як "націоналістичні". Сучасні дослідники (Плохій,
    Яковенко) аналізують їх як інструменти конструювання ідентичності еліти.'
  section: 'Конфліктна карта: Історія чи література?'
  words: 900
- points:
  - '1. Російський імперський / радянський наратив: "Возз''єднання". Літописи — доказ "віковічного прагнення" до єдності з
    Москвою. Методологія: вибіркове цитування, ігнорування ідеї автономії. Агенда: легітимізація панування над Україною.'
  - '[!decolonization] 2. Український наратив: "Народження нації". Літописи — "свідоцтво про народження" модерної української
    ідентичності та державницької традиції. Агенда: обґрунтування права на незалежну державу.'
  - '3. Західний наратив (Плохій, Субтельний): "Винайдення традиції". Літописи — інструмент конструювання політичної нації
    ранньомодерною елітою. Методологія: порто-націоналізм, інтелектуальна історія. Агенда: вписати Україну в глобальний контекст.'
  - '[!myth-buster] Міф про "спільного ворога". Український наратив фокусується на боротьбі з Польщею/Москвою. Насправді,
    літописи показують, що найбільшим ворогом старшина часто вважала іншу старшину (громадянська війна "Руїна").'
  section: 'Зіткнення наративів: Гетьманщина та її історія'
  words: 1700
- points:
  - 'Крупним планом: Літопис Самовидця. Автор: анонімний очевидець. Стиль: лаконічний, фактографічний. Мета: зафіксувати події
    "яко бачив очима своїми".'
  - 'Крупним планом: Літопис Григорія Грабянки. Автор: гадяцький полковник. Стиль: високе бароко, риторика, поетичні вставки.
    Мета: створити патріотичний епос про шляхетне походження козацтва.'
  - 'Крупним планом: Літопис Самійла Величка. Автор: канцелярист. Стиль: монументальний, "документальний", з включенням сотень
    справжніх документів. Мета: створити всеохопну "Повість літ временних" козацької України.'
  - '[!epistemic-humility] Порівняння: як кожен літопис описує фігуру Богдана Хмельницького? Для Самовидця він — дійова особа.
    Для Грабянки — "новий Мойсей". Для Величка — державний діяч, автор документів.'
  section: 'Джерельна критика: Самовидець, Грабянка, Величко'
  words: 1500
- points:
  - 'Повернення до розминки: тепер ви можете точно сказати, який уривок належить Самовидцю, а який — Грабянці. Поясніть свій
    вибір.'
  - 'Мета-рефлексія: Де проходить межа між хронікою, історіографією та пропагандою? Чи є козацькі літописи всім трьома одночасно?'
  - '[!decolonization] Зв''язок із сьогоденням: сучасна війна породжує безліч текстів. Як історики майбутнього будуть аналізувати
    *наші* джерела? Які "літописи" пишемо ми сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Порівняльний аналіз трьох головних козацьких літописів (Самовидця, Грабянки, Величка), зародження української історіографії,
  легітимація Гетьманщини, боротьба наративів
