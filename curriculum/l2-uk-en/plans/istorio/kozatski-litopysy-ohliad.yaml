objectives:
- Аналізувати причини виникнення та наслідки появи козацької історіографії як явища
- Порівнювати методологію, політичну позицію та риторичні стратегії трьох головних козацьких літописів
- Розрізняти український, російський імперський та західний наративи про Гетьманщину
- Застосовувати методи джерельної критики для аналізу уривків з літописів, виявляючи упередження авторів
