objectives:
- Аналізувати, як Гельсінські угоди стали інструментом у боротьбі за права людини та національний суверенітет в УРСР
- Порівнювати та деконструювати радянський, дисидентський та західний наративи щодо правозахисного руху
- Застосовувати методи джерельної критики до документів УГГ та звітів КДБ
- Оцінювати спадщину УГГ у контексті розпаду СРСР та сучасної боротьби України за незалежність
