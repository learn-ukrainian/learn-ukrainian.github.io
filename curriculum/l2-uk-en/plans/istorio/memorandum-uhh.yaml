content_outline:
- points:
  - 'Провокація: у 1975 році СРСР підписує Гельсінські угоди, святкуючи їх як перемогу дипломатії. За рік у Києві створюється
    група, яка використовує цей самий документ, щоб довести, що СРСР — тюрма народів. Як це стало можливим?'
  - Цитата з газети «Правда» про Гельсінський акт vs цитата з Меморандуму №1 УГГ про порушення прав людини. Студент має пояснити,
    як один документ міг породити дві протилежні реальності.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Легалізм vs Радикалізм. Чи була ставка УГГ на міжнародне право («діяти виключно в рамках закону») єдиною можливою
    стратегією, чи це була наївна спроба грати за правилами з шулером?'
  - 'Дебат 2: Націоналізм vs Універсалізм. УГГ — це насамперед національно-визвольна організація, що використовувала риторику
    прав людини як інструмент, чи це частина глобального правозахисного руху, що діяла в українському контексті?'
  - '[!epistemic-humility] Історики досі сперечаються, чи була діяльність групи ефективним засобом тиску на режим, чи лише
    моральним свідченням, що призвело до трагічних жертв.'
  section: 'Конфліктна карта: Стратегії опору'
  words: 900
- points:
  - '1. Радянський імперський наратив: Гельсінські угоди — це про непорушність кордонів і невтручання. «Третій кошик» (права
    людини) — формальність. УГГ — «буржуазні націоналісти», «найманці ЦРУ», що намагаються підірвати радянський лад.'
  - '2. Український дисидентський наратив: Угоди — це юридичне зобов''язання СРСР. УГГ — легальна організація, що здійснює
    громадський моніторинг виконання міжнародних договорів. Права людини і національні права (мова, культура, суверенітет)
    нероздільні.'
  - '3. Західний наратив: Складний і суперечливий. Для одних (правозахисники, Конгрес США) УГГ — герої. Для інших (прихильники
    «розрядки») — незручна проблема, що заважає діалогу з Москвою.'
  - '[!decolonization] Викриття механізму: радянська пропаганда таврує будь-який прояв національної ідентичності як «фашизм»
    або «буржуазний націоналізм», щоб делегітимізувати його в очах світу.'
  - '[!myth-buster] Міф про те, що «весь Захід підтримував дисидентів». Багато західних урядів були готові заплющити очі на
    порушення прав людини заради стабільності та економічних інтересів.'
  section: 'Зіткнення наративів: «Гельсінський процес»'
  words: 1700
- points:
  - 'Close reading: Аналіз фрагментів Меморандуму №1. Чому обрано таку суху, юридичну мову? Які саме порушення задокументовано
    (проти мови, релігії, права на еміграцію)?'
  - 'Аналіз авторів: Хто такі Микола Руденко, Оксана Мешко, Левко Лук''яненко? Їхній бекграунд (письменники, ветерани, колишні
    політв''язні) вплинув на текст і стратегію групи.'
  - 'Контр-джерело: Аналіз звітів КДБ про членів УГГ. Як таємна поліція описувала їхню діяльність? Які «злочини» їм інкримінували?
    Порівняння мови Меморандуму і мови звітів КДБ.'
  - '[!epistemic-humility] Ми не можемо знати всіх мотивів авторів. Чи вірили вони, що радянська система може бути реформована,
    чи свідомо йшли на самопожертву, щоб засвідчити злочин?'
  section: 'Джерельна критика: Меморандум №1'
  words: 1500
- points:
  - 'Повернення до розминки: Студент дає розгорнуту відповідь на питання, як міжнародний договір став зброєю в руках пригноблених.'
  - 'Мета-рефлексія: Цей модуль вчить, як юридичні документи можуть ставати полем битви наративів, і як аналіз мови викриває
    приховані політичні agendas.'
  - 'Спадщина УГГ: Як діяльність групи вплинула на розпад СРСР і проголошення незалежності України? Чи є сучасні українські
    правозахисні організації (напр., ті, що документують воєнні злочини РФ) продовжувачами традиції УГГ?'
  - '[!decolonization] Боротьба УГГ демонструє, що рух за деколонізацію Радянської імперії був нерозривно пов''язаний з боротьбою
    за права людини.'
  section: Дискусія та підсумок
  words: 700
focus: The Ukrainian Helsinki Group, the 1975 Helsinki Accords, human rights as a weapon against the USSR, comparative analysis
  of Soviet vs. dissident narratives.
level: ISTORIO
