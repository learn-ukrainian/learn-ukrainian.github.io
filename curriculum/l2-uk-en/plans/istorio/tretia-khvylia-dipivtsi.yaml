content_outline:
- points:
  - 'Провокація: два погляди на українців на Заході у 1945. Перший: «зрадники, що втекли з нацистами». Другий: «жертви, що
    рятувалися від радянського терору». Який опис точніший і чому саме це питання є ключовим для розуміння української історії
    ХХ століття?'
  - '[!myth-buster] Поширений міф: усі, хто опинився на Заході, були "політичними". А як щодо 80% "остарбайтерів" — цивільних,
    вивезених на примусові роботи?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ялтинські угоди — гуманітарний акт чи політична зброя? Позиція СРСР: всі радянські громадяни мають бути повернуті,
    без винятків. Позиція Заходу: розрізнення між військовополоненими та цивільними, добровільність повернення.'
  - 'Дебат 2: Операція «Кілхоул» (Keelhaul) — трагедія неминучості чи військовий злочин? Аргумент "за": виконання союзницьких
    зобов''язань. Аргумент "проти": насильницька видача людей (включно з козаками, що ніколи не були громадянами СРСР) на
    вірну смерть.'
  - '[!epistemic-humility] Як історики оцінюють докази? З одного боку — офіційні звіти союзників про "порядок" і "ефективність".
    З іншого — тисячі свідчень про масові самогубства під час спроб примусової репатріації.'
  section: 'Конфліктна карта: Репатріація — порятунок чи покарання?'
  words: 900
- points:
  - 'Радянський наратив: "Зрадники Батьківщини та пособники фашистів". Методологія: ототожнення всіх українців із "бандерівцями"
    та вояками дивізії "Галичина". Агенда: делегітимізація будь-якої української політичної активності, виправдання примусової
    репатріації. Сліпі плями: мільйони остарбайтерів, біженці 1944 року, інтелігенція.'
  - 'Український наратив: "Третя хвиля — найосвіченіша еміграція". Методологія: акцент на культурному та інтелектуальному
    житті в таборах ДіПі ("маленька Україна" з театрами, школами, УВАН, НТШ). Агенда: створення образу "держави в екзилі",
    збереження тяглості української державності. Сліпі плями: соціальні конфлікти в таборах, роль звичайних людей, не лише
    еліти.'
  - '[!decolonization] Західний наратив: "Від гуманітарної проблеми до політичного ресурсу". Методологія: аналіз змін у політиці
    — від UNRRA (допомога) до IRO та закону США 1948 р. (відбір "корисних" антикомуністів). Агенда: прагматизм холодної війни.
    Сліпі плями: ігнорування української суб''єктності, розгляд українців як об''єкта, а не суб''єкта міжнародної політики.'
  - '[!myth-buster] Чи була еміграція єдиною? Розбір трьох основних груп: остарбайтери, політичні біженці, вояки УПА та дивізії.
    Чому радянська пропаганда змішувала їх в одну купу?'
  section: 'Зіткнення наративів: Хто такі "переміщені особи"?'
  words: 1700
- points:
  - 'Джерело 1: Фрагменти зі спогадів мешканця табору ДіПі (напр., Івана Багряного). Аналіз мови, емоційного тону, щоденних
    турбот. Як автор описує своє оточення, надії, страхи? На кого покладає відповідальність за своє становище?'
  - 'Джерело 2: Уривок з офіційного звіту адміністрації табору (UNRRA/IRO). Аналіз бюрократичної мови, статистики. Як звіт
    класифікує людей (за національністю, професією, політичною приналежністю)? Які проблеми для адміністрації є пріоритетними?'
  - '[!epistemic-humility] Зіставлення джерел: де описи збігаються, а де суперечать одне одному? Чому "культурне життя", про
    яке пише мемуарист, може бути відсутнім у звіті, зосередженому на санітарії та харчуванні? Як, читаючи обидва тексти,
    реконструювати більш повну картину?'
  - 'Аналіз автора та інституції: хто такий Багряний, який його політичний бекграунд? Що таке UNRRA, хто її фінансував, які
    були її цілі? Як це впливає на їхні тексти?'
  section: 'Джерельна критика: Щоденник із табору та звіт UNRRA'
  words: 1500
- points:
  - 'Повернення до розминки: після аналізу трьох наративів, як би ви тепер відповіли на питання — українські ДіПі це "зрадники"
    чи "жертви"? Чи можлива третя відповідь?'
  - '[!decolonization] Як наративні стратегії, виявлені в цьому модулі (радянське змішування всіх в одну групу, українська
    ідеалізація, західний прагматизм), проявляються сьогодні у висвітленні війни в Україні та проблеми українських біженців?'
  - 'Спадщина ДіПі: як створені в таборах інституції (УВАН, НТШ, політичні організації) вплинули на розвиток діаспори та,
    зрештою, на відновлення незалежності України в 1991 році?'
  section: Дискусія та підсумок
  words: 700
focus: Historiography of Ukrainian Displaced Persons, Yalta agreements, forced repatriation, DP camp culture, and the narrative
  conflict between Soviet, Ukrainian, and Western perspectives.
level: ISTORIO
module: istorio-066
objectives:
- Аналізувати та порівнювати радянський, український та західний наративи щодо "переміщених осіб"
- Застосовувати методи джерельної критики до первинних джерел (мемуари, офіційні звіти)
- Пояснювати вплив Ялтинських угод та операції «Кілхоул» на долю українців у Європі
- Формулювати аргументовану позицію щодо історичної ролі та спадщини "третьої хвилі" еміграції
