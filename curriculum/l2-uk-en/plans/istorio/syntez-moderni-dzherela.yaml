content_outline:
- points:
  - 'Провокація: Вам дано два документи про події 1933 року — офіційний радянський звіт про виконання плану хлібозаготівель
    та уривок з усної історії очевидця. Який документ є "правдивішим"? Чи може історик довіряти лише одному з них?'
  - 'Цитата для роздумів: "Надлишок джерел створює ілюзію повноти знання, але насправді лише посилює шум". Як це стосується
    історії XX століття?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи робить масова грамотність та поява преси, фотографії та кіно історію "об''єктивнішою"? Аргументи "за" (більше
    голосів, візуальні докази) vs "проти" (нові інструменти пропаганди, маніпуляція).'
  - 'Дебат 2: Усна історія vs Архівний документ. Яке джерело має перевагу при вивченні репресій та травматичного досвіду?
    Конфлікт між "офіційною" пам''яттю архіву та "живою" пам''яттю свідка.'
  - '[!epistemic-humility] Проблема надлишку: як історик може впоратися з мільйонами документів XX століття, не потонувши
    в них і не ставши жертвою упередженого відбору?'
  section: 'Конфліктна карта: Інформаційний вибух чи інформаційний хаос?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Подія подається як "труднощі з хлібозаготівлями", "перегини на місцях" або
    "спільна трагедія" народів СРСР. Джерела: офіційні постанови, звіти НКВС, статті в газеті "Правда". Агенда: заперечення
    геноциду, приховування злочину, перекладання відповідальності. Сліпі плями: голос жертви, національний аспект, докази
    спланованості.'
  - 'Український наратив: Подія визначається як акт геноциду, спланований для знищення українського селянства як основи нації.
    Джерела: усна історія (свідчення очевидців), самвидав, демографічна статистика, документи з розсекречених архівів СБУ.
    Агенда: встановлення історичної справедливості, визнання геноциду. Сліпі плями: початково обмежений доступ до державних
    архівів.'
  - 'Західний наратив: Еволюція від початкового скептицизму (через радянську пропаганду та впливових журналістів як Волтер
    Дюранті) до визнання геноциду багатьма країнами. Джерела: звіти дипломатів, статті окремих сміливих журналістів (Гарет
    Джонс), праці істориків (Роберт Конквест). Методологія: порівняльний аналіз, демографічні моделі. [!decolonization] Розкриття
    механізмів радянської дезінформації на Заході.'
  - '[!myth-buster] Міф про "відсутність джерел". Джерела існували завжди, але їх замовчували, знищували або ігнорували.'
  section: 'Зіткнення наративів: Голодомор 1932-1933 років'
  words: 1700
- points:
  - 'Аналіз офіційних джерел: політичні маніфести, імперські укази про заборону мови (Емський, Валуєвський), радянські постанови.
    Як читати між рядків "бюрократичної" мови, що приховує репресивну суть.'
  - 'Аналіз пропаганди: Публіцистика, преса, фото- та кінохроніки. Розпізнавання технік маніпуляції. Приклад: порівняння фото
    "щасливих колгоспників" з реальним станом речей.'
  - 'Аналіз джерел спротиву: Підпільні видання (самвидав), щоденники, листи. Як ці джерела компенсують брехню офіційних? Проблема
    репрезентативності та ризики для авторів.'
  - 'Аналіз усної історії: Пошук "голосу жертви". Переваги (емоційна правда, деталі побуту) та недоліки (суб''єктивність,
    викривлення пам''яті). Етичні питання роботи зі свідками травматичних подій.'
  - '[!epistemic-humility] Кожне джерело — це лише фрагмент. Завдання історика — не просто зібрати їх, а зрозуміти контекст,
    мотивацію автора та обмеження кожного типу джерел.'
  section: 'Джерельна критика: Як читати мову влади та голос жертви'
  words: 1500
- points:
  - 'Повернення до розминки: Після аналізу різних типів джерел, як би ви тепер відповіли на питання про "правдивість" радянського
    звіту та усної історії? Якою буде ваша методологія їх синтезу?'
  - 'Створення чек-ліста: Розробка власного списку питань для критичного аналізу будь-якого джерела з XX століття (Хто автор?
    Яка мета? Для кого написано? Що замовчується?).'
  - 'Зв''язок із сьогоденням: Як методологічні уроки роботи з джерелами XX століття допомагають аналізувати сучасну інформаційну
    війну, фейки та пропаганду?'
  - '[!decolonization] Готовність до роботи з дисидентськими та підпільними джерелами є ключовою для деконструкції імперських
    та тоталітарних наративів.'
  section: Дискусія та підсумок
  words: 700
focus: Typology of 19-20th c. sources (press, photography, archives, oral history), source criticism of imperial/Soviet documents,
  distinguishing propaganda from fact, synthesis of conflicting narratives.
level: ISTORIO
module: istorio-038
objectives:
- Класифікувати джерела XIX-XX століть (преса, фото, архіви, усна історія) та розуміти їхні особливості.
- Застосовувати методи джерельної критики для аналізу офіційних, пропагандистських та підпільних документів.
- Аналізувати та порівнювати різні історіографічні наративи (радянський, український, західний) на прикладі Голодомору.
- Формулювати власну методологію для синтезу суперечливих джерел та реконструкції історичних подій.
