content_outline:
- points:
  - 'Провокація: Два уривки тексту, що описують Богдана Хмельницького. Один написаний радянським істориком, інший — американським
    професором з української діаспори. Чи можете ви визначити, який є який, і пояснити свою логіку?'
  - 'Цитата-загадка: «Історія, написана за межами батьківщини, ніколи не може бути об''єктивною. Вона завжди є або актом ностальгії,
    або політичною зброєю». Розглянемо, наскільки це твердження справедливе для української історіографії на Заході.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була західна україністика «об''єктивною» наукою? Позиція 1: Так, це була спроба застосувати західні академічні
    стандарти до української історії, вільні від радянської цензури. Позиція 2: Ні, це був проєкт збереження національної
    пам''яті, де «об''єктивність» поступалася місцем патріотичному наративу.'
  - 'Дебат 2: Наука як замінник держави. Позиція 1: Інституції на кшталт HURI та CIUS виконували функцію «академічного уряду
    в екзилі», зберігаючи спадщину для майбутньої незалежної України. Позиція 2: Це обмежувало їхню критичну функцію, перетворюючи
    істориків на «охоронців нації», а не на незалежних дослідників.'
  - '[!epistemic-humility] Розгляд критики, що деякі праці діаспори ідеалізували козацтво або замовчували складні сторінки,
    як-от міжетнічні конфлікти, у прагненні створити консолідований національний міф.'
  section: 'Конфліктна карта: Об''єктивність чи національний обов''язок?'
  words: 900
- points:
  - 'Радянський наратив: Західні «українські буржуазні націоналісти» та їхні «фальсифікаторські центри» (НТШ, HURI) представлялися
    як інструменти ЦРУ, що спотворюють «спільну історію братніх народів» для розпалювання ворожнечі.'
  - 'Український наратив (пост-1991): Праці Субтельного, Пріцака та інших були сприйняті як «повернення вкраденої історії».
    Вони заповнили вакуум, що утворився після десятиліть радянської цензури, і стали основою для нових шкільних та університетських
    програм.'
  - 'Західний наратив (внутрішній): Історія створення HURI (1973) Омеляном Пріцаком — це не лише історія про збереження спадщини,
    а й про академічну боротьбу за місце україністики в західному університеті, доводячи її релевантність поза рамками славістики,
    керованої русистами.'
  - '[!decolonization] Викриття радянської тактики маргіналізації української історії як «селянської», «неповноцінної» та
    «провінційної» порівняно з «великою» імперською російською історією. Західні інституції повернули Україні її суб''єктність.'
  - '[!myth-buster] Міф про те, що діаспорна історіографія була монолітною. Насправді, між Пріцаком (орієнталіст, тюрколог)
    та Субтельним (популяризатор), а згодом Плохієм (архівіст) і Снайдером (глобальний контекст) існували значні методологічні
    розбіжності та гострі дебати.'
  section: 'Зіткнення наративів: Створення української історії на Заході'
  words: 1700
- points:
  - 'Автор та його контекст: Орест Субтельний як представник другого покоління діаспори, що прагнув пояснити історію України
    не для внутрішнього споживання, а для широкої англомовної аудиторії.'
  - 'Аналіз тексту: Чому книга «Ukraine: A History» (1988) стала світовим бестселером? Аналіз її структури, доступної мови
    та наративних рішень, що зробили складну історію зрозумілою для неспеціалістів.'
  - 'Джерельна база та методологія: На які джерела спирався Субтельний? Які компроміси були зроблені заради створення єдиного,
    лінійного наративу? Порівняння з підходом Пріцака, що базувався на орієнталістиці.'
  - '[!epistemic-humility] Критика та еволюція: Що в книзі Субтельного застаріло через 30+ років? Які розділи (напр., про
    Другу світову війну) сьогодні виглядають спрощеними? Як нові історики (Плохій, Снайдер, Химка) ускладнили та доповнили
    його погляд?'
  - 'Рецепція та вплив: Як переклад книги українською вплинув на формування історичної свідомості в Україні в 1990-х? Чому
    ця книга стала «класикою» і водночас об''єктом для критики нового покоління істориків?'
  section: 'Джерельна критика: «Ukraine: A History» Ореста Субтельного'
  words: 1500
- points:
  - 'Повернення до розминки: Аналізуючи уривки про Хмельницького, студент тепер має назвати конкретні маркери радянської та
    діаспорної шкіл (класова боротьба vs. державницький підхід, лексика, акценти).'
  - 'Мета-рефлексія: Що цей модуль говорить про саму природу історії? Чи є історія наукою про минуле, чи радше полем битви
    за наративи, де доступ до архівів та інституційна підтримка є вирішальними?'
  - '[!decolonization] Зв''язок із сьогоденням: Як досвід та експертиза західних українознавчих центрів сьогодні допомагають
    у протидії російській дезінформації та пропаганді під час повномасштабного вторгнення? Роль істориків як експертів у сучасній
    інформаційній війні.'
  - Що далі? Після розпаду СРСР та «повернення» історії на батьківщину, яка нова роль залишається для діаспорних центрів?
    Від «охоронців» до «партнерів» у глобальному академічному діалозі.
  section: Дискусія та підсумок
  words: 700
focus: The role of diaspora institutions (HURI, CIUS) and key figures (Pritak, Subtelny, Plokhy) in shaping Ukrainian historiography
  in the West as a counter-narrative to Soviet historical doctrine.
level: ISTORIO
module: istorio-006
objectives:
- Аналізувати причини, що спонукали українську діаспору створити власні потужні наукові інституції на Заході.
- Порівнювати методологічні підходи радянської, діаспорної та сучасної західної історіографії України.
- 'Критично оцінювати ключові праці, як-от «Ukraine: A History» Ореста Субтельного, розуміючи їхній історичний контекст, сильні
  сторони та обмеження.'
- Формулювати аргументовану позицію щодо ролі історичної науки в умовах бездержавності та її впливу на сучасні політичні та
  культурні процеси.
