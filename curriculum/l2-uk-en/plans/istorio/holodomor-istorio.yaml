content_outline:
- points:
  - 'Провокація: Ось два звіти про Україну 1933 року від двох західних журналістів. Один описує апокаліптичний голод, інший
    — процвітаючі колгоспи. Хто з них бреше і чому?'
  - 'Початкова гіпотеза: які політичні чи особисті мотиви могли змусити іноземного журналіста заперечувати масовий голод?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Голодомор як геноцид vs. "штучний голод". У чому полягає юридична та історична різниця? Аналіз аргументів Станіслава
    Кульчицького та його опонентів.'
  - 'Дебат 2: "Унікальна трагедія українського народу" vs. "спільна трагедія радянських народів". Розбір російського контр-наративу
    та його мети.'
  - '[!epistemic-humility] Роль наміру: як історики доводять або спростовують намір Сталіна знищити саме українців, коли прямих
    наказів не знайдено?'
  - '[!decolonization] Чому термін "спільна трагедія" є інструментом імперського наративу, що применшує агентність та суб''єктність
    України?'
  section: 'Конфліктна карта: Геноцид чи "спільна трагедія"?'
  words: 900
- points:
  - '1. Радянський та російський наратив: від повного замовчування та версії про "неврожай" до сучасної концепції "спільної
    трагедії". Мета: зняти з Кремля відповідальність за цілеспрямовану атаку на українство. [!myth-buster]'
  - '2. Український наратив (діаспора та незалежна Україна): від збору свідчень очевидців у діаспорі (коли архіви були закриті)
    до інституціоналізації досліджень після 1991 року. Мета: утвердити Голодомор як акт геноциду та центральну подію національної
    пам''яті.'
  - '3. Західний наратив: розкол із самого початку. Гарет Джонс (правда) vs. Волтер Дюранті (брехня). Пізніше — "Жнива скорботи"
    Конквеста в контексті Холодної війни, праці Джеймса Мейса та Комісії Конгресу США. Сучасні дебати в західній академії.
    [!decolonization]'
  section: 'Зіткнення наративів: Замовчування, визнання та заперечення'
  words: 1700
- points:
  - Читання уривка з "Жнив скорботи" Роберта Конквеста. Які джерела він використовує (свідчення з діаспори, нечисленні офіційні
    документи)? Як контекст Холодної війни впливає на його висновки?
  - Читання уривка з праці Станіслава Кульчицького. Які джерела він аналізує (відкриті архіви СБУ)? Чим його підхід "зсередини"
    відрізняється від підходу Конквеста "ззовні"?
  - 'Роль Джеймса Мейса: як його діяльність у Комісії Конгресу США вплинула на юридичну кваліфікацію Голодомору? Чим звіт
    політичної комісії відрізняється від академічної монографії? [!epistemic-humility]'
  - 'Порівняльний аналіз методологій: сильні та слабкі сторони синтетичного підходу (Конквест) та архівно-орієнтованого підходу
    (Кульчицький).'
  section: 'Джерельна критика: Конквест, Мейс та Кульчицький'
  words: 1500
- points:
  - 'Повернення до розминки: хто брехав, Джонс чи Дюранті? Тепер студент може пояснити політичні, ідеологічні та особисті
    чинники, що стояли за запереченням Дюранті.'
  - 'Мета-рефлексія: Як історія вивчення Голодомору ілюструє, що історія — це не просто факти, а поле битви наративів?'
  - 'Зв''язок із сьогоденням: Як риторичні прийоми заперечення Голодомору (whataboutism, "спільна трагедія", звинувачення
    жертв) використовуються сучасною російською пропагандою під час повномасштабного вторгнення? [!decolonization]'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiography of the Holodomor: Soviet denial and cover-up (Jones vs. Duranty), diaspora studies (Conquest, Mace),
  post-Soviet archival debates (Kulchytsky), and modern Russian denialism.'
level: ISTORIO
module: istorio-045
objectives:
- Аналізувати еволюцію історіографії Голодомору, від радянського замовчування до сучасних наукових дебатів
- Розрізняти ключові наративи (радянський/російський, український, західний), ідентифікуючи їхні методології, цілі та "сліпі
  плями"
- Застосовувати навички джерельної критики для порівняльного аналізу праць провідних істориків (Конквест, Кульчицький, Мейс)
- Критично оцінювати сучасні прояви денаєрства Голодомору, розпізнаючи в них історичні тактики заперечення
pedagogy: CBI
persona:
  role: Модератор семінару — ставить під сумнів очевидні істини, змушує аналізувати не "що сталося", а "чому ми знаємо, що
    це сталося саме так".
  voice: Academic Historiographer
phase: ISTORIO.2
