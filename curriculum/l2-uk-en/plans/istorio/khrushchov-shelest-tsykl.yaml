content_outline:
- points:
  - 'Провокація: Дві цитати про керівника радянської України. Одна — «дбав про республіку, захищав мову». Друга — «небезпечний
    націоналіст, що загрожував єдності». Хто є хто? Про кого з них — Шелеста чи Щербицького — йдеться?'
  - 'Загадка: Чому книга з назвою «Україно, наша Радянська» стала причиною падіння її автора, першого секретаря ЦК КПУ?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був Петро Шелест щирим українським патріотом («націонал-комуністом»), який намагався розширити автономію
    України в рамках СРСР? Чи він був лише типовим радянським апаратником, який випадково перетнув дозволену межу?'
  - 'Дебат 2: Чи була епоха Щербицького неминучим «закручуванням гайок» після «Празької весни», чи жорстка русифікація була
    результатом його особистої лояльності до Москви та боротьби за владу з Шелестом?'
  - '[!epistemic-humility] Оцінки цих постатей залежать від оптики: чи дивимось ми з позиції дисидентів, партійної еліти,
    західних советологів чи сучасної української історіографії?'
  section: 'Конфліктна карта: Націонал-комунізм чи кар''єризм?'
  words: 900
- points:
  - '1. Радянський наратив: Шелест — «буржуазний націоналіст», який ідеалізував минуле України, применшував роль Росії та
    заохочував «місництво». Його книга «Україно, наша Радянська» — яскравий приклад таких «відхилень». Усунення Шелеста було
    необхідним кроком для зміцнення ідеологічної єдності та інтернаціоналізму радянського народу.'
  - '2. Український наратив (пост-радянський): Шелест — трагічна фігура, «останній козак» у Політбюро, який намагався захистити
    українську культуру та економіку. Його усунення в 1972 році поклало край «відлизі» та розпочало 17-річну епоху тотальної
    русифікації під керівництвом Щербицького.'
  - '3. Західний наратив (совітологія): Справа Шелеста — це передусім боротьба за владу в Кремлі між кланами. Звинувачення
    в «націоналізмі» були лише зручним приводом для Брежнєва усунути впливового конкурента. Це був сигнал усім республіканським
    елітам про межі їхньої автономії.'
  - '[!decolonization] Аналіз того, як радянський центр використовував звинувачення в «націоналізмі» як інструмент колоніального
    контролю над республіками.'
  - '[!myth-buster] Розвінчання міфу про «дружбу народів» та показ того, як будь-який прояв національної суб''єктності в СРСР
    трактувався як загроза.'
  section: 'Зіткнення наративів: Падіння Петра Шелеста'
  words: 1700
- points:
  - Аналіз фрагментів книги Петра Шелеста «Україно, наша Радянська» (1970). Що саме в тексті могло бути розцінено як «націоналізм»?
    (Акцент на козацтві? Історія до-радянської України? Економічна самодостатність?)
  - Порівняльний аналіз з розгромною рецензією на книгу, опублікованою в журналі «Комуніст України» після усунення Шелеста.
    Як ті самі факти інтерпретуються з діаметрально протилежних позицій?
  - Вивчення уривків зі стенограм засідань Політбюро ЦК КПРС, де обговорювалася «справа Шелеста». Які були справжні мотиви
    його усунення, а що було для публіки?
  - '[!epistemic-humility] Студент вчиться читати радянські документи, розрізняючи офіційну риторику, езопову мову та реальні
    владні інтереси.'
  section: 'Джерельна критика: "Україно, наша Радянська" vs протоколи Політбюро'
  words: 1500
- points:
  - 'Повернення до розминки: Чому книга про радянську Україну стала антирадянською? Студент формулює відповідь, використовуючи
    знання про контекст та наративи.'
  - 'Мета-рефлексія: Що цикл «Шелест-Щербицький» говорить нам про природу імперій та межі «дозволеної» національної ідентичності
    в тоталітарній державі?'
  - '[!decolonization] Як досвід поразки «націонал-комунізму» вплинув на подальший розвиток українського дисидентського руху,
    який остаточно відмовився від ідеї «покращення» СРСР?'
  - 'Зв''язок із сьогоденням: Як сучасна російська пропаганда використовує звинувачення в «нацизмі» та «русофобії» проти України
    та інших держав, повторюючи радянські методики боротьби з «націоналізмом»?'
  section: Дискусія та підсумок
  words: 700
focus: 'The cycle of national revival and suppression in Soviet Ukraine: The Khrushchev Thaw, Petro Shelest''s "national communism",
  and Volodymyr Shcherbytsky''s subsequent era of intense Russification. Analysis of historiographical narratives surrounding
  these figures.'
level: ISTORIO
module: istorio-086
objectives:
- Аналізувати причини та наслідки циклу «відлига-закручування гайок» на прикладі зміни керівництва в УРСР (Хрущов-Шелест-Щербицький)
- Порівнювати та деконструювати радянський, сучасний український та західний наративи щодо постатей Шелеста та Щербицького
- Застосовувати методику джерельної критики для аналізу текстів радянської доби, розрізняючи офіційну риторику та приховані
  інтереси
- Оцінювати, як боротьба за владу в центрі впливала на долю національних республік та як звинувачення в «націоналізмі» використовувалося
  як інструмент колоніального контролю
