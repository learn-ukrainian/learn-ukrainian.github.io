content_outline:
- points:
  - 'Провокація: 1764 рік. Останній гетьман, Кирило Розумовський, «добровільно» складає повноваження. Чи був це акт зради,
    прагматизму, чи добре інсценована вистава? Розгляньте два анонімні описи події — де тут українська версія, а де російська
    імперська?'
  - '[!decolonization] З самого початку ставимо під сумнів термін «добровільно».'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мазепа vs Розумовський. Чому один гетьман обрав збройний опір імперії, а інший — капітуляцію та інтеграцію?
    Порівняння стратегій виживання української еліти у XVIII ст.'
  - 'Дебат 2: Примус чи компенсація? Що саме змусило Розумовського зректися влади? Аналіз доказів на користь версії таємного
    тиску Катерини II проти версії, що він «виторгував» особисте багатство в обмін на інституцію.'
  - '[!epistemic-humility] Не існує простої відповіді. Розглядаємо аргументи обох сторін, щоб зрозуміти складність його становища.'
  section: 'Конфліктна карта: Зрада чи неминучість?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Ліквідація Гетьманщини як «прогресивний» крок, що уніфікував управління,
    покінчив із «архаїчною» козацькою вольницею та інтегрував «Малоросію» в єдиний цивілізаційний простір. Розумовський —
    лояльний підданий, що мудро зрозумів хід історії.'
  - 'Український наратив (традиційний): Скасування Гетьманщини як національна трагедія, апогей тривалого процесу інкорпорації.
    Розумовський — трагічна фігура, слабкий лідер, що не зміг або не захотів протистояти імперському тиску. Його зречення
    — символ втрати державності.'
  - 'Західний наратив (Post-colonial studies): Розумовський як класичний приклад кооптованої еліти (co-opted elite). Імперія
    не просто завойовує, а «купує» лояльність місцевих лідерів, пропонуючи їм особисті статки та статус в обмін на здачу інтересів
    своєї спільноти. Ліквідація Гетьманщини — фінальний етап інкорпорації, коли місцева автономія стає непотрібною.'
  - '[!decolonization] Викриття механіки імперського поглинання, де «м''яка сила» (патронаж, титули) є не менш ефективною
    зброєю, ніж армія.'
  - '[!myth-buster] Міф про «золотий вік» гетьманату Розумовського — чи не була це лише позолочена клітка, збудована на гроші
    імперії?'
  section: 'Зіткнення наративів: Скасування Гетьманщини'
  words: 1700
- points:
  - 'Close Reading 1: Указ про зречення гетьманства. Аналіз мови документа: які формулювання використовуються? Як обґрунтовується
    рішення? На що робиться наголос? Хто є аудиторією цього тексту?'
  - 'Close Reading 2: Фрагменти з праць істориків. Порівняння того, як цю подію описує російський імперський історик (напр.,
    Сергій Соловйов) і український державницький історик (напр., Дмитро Дорошенко).'
  - '[!epistemic-humility] Виявлення упереджень автора: як походження, політична позиція та доступ до архівів впливають на
    інтерпретацію однієї й тієї ж події?'
  - 'Аналіз «мовчання» джерел: про що не говорять офіційні документи? Чого бракує в тій чи іншій інтерпретації?'
  section: 'Джерельна критика: Указ про зречення vs. оцінки істориків'
  words: 1500
- points:
  - 'Повернення до розминки: Зрада, прагматизм чи вистава? Студент формулює власну аргументовану відповідь, використовуючи
    концепції з модуля (кооптація, історіографічний наратив, джерельна критика).'
  - 'Мета-рефлексія: Чого вчить історія Розумовського про стосунки між центром та периферією в імперіях? Як еліти балансують
    між особистими інтересами та національними обов''язками?'
  - '[!decolonization] Зв''язок із сьогоденням: Як наратив про «братні народи» та «спільну історію» використовується сучасною
    російською пропагандою для виправдання агресії? Які паралелі можна провести з методами кооптації еліт у XVIII ст.?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiographical debate over the abolition of the Hetmanate: Kyrylo Rozumovsky as a case study in elite co-optation,
  comparing Ukrainian, Russian imperial, and Western narratives of his "voluntary" abdication.'
level: ISTORIO
module: istorio-084
objectives:
- Аналізувати різні історіографічні підходи (російський імперський, український державницький, західний постколоніальний)
  до оцінки ролі Кирила Розумовського та скасування Гетьманщини.
- Застосовувати методи джерельної критики для аналізу офіційних документів та праць істориків, виявляючи їхні приховані припущення
  та порядок денний.
- Пояснювати механізми імперської кооптації еліт на прикладі кар'єри Кирила Розумовського.
- Формулювати власну аргументовану позицію щодо дискусійних питань, пов'язаних із кінцем Гетьманщини, та її значення для сучасної
  України.
