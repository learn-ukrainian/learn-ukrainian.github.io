content_outline:
- points:
  - 'Провокація: "З''їзд у Сєвєродонецьку був легітимною спробою захистити права російськомовних від помаранчевого перевороту".
    Ця теза належить учаснику подій чи сучасному історику? Поясніть свою думку.'
  - 'Забута загроза: Чому подія, що у 2004 році могла призвести до розколу країни, сьогодні майже забута?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Причини провалу — слабкість сепаратистів чи сила суспільства? Аргументи "за": нерішучість місцевих еліт, відсутність
    реальної народної підтримки. Аргументи "проти": тиск київського Майдану, консолідація проукраїнських сил.'
  - 'Дебат 2: Роль Кучми — гарант єдності чи прагматичний гравець? Чи був його відхід від ідеї розколу свідомим державницьким
    кроком, чи лише спробою зберегти владу та уникнути міжнародної ізоляції?'
  - '[!epistemic-humility] Оцінка мотивів ключових гравців (Кучми, Януковича, Ахметова) залишається дискусійною. Аналіз базується
    на непрямих свідченнях та пізніших інтерпретаціях.'
  section: 'Конфліктна карта: Провал сепаратизму — випадковість чи закономірність?'
  words: 900
- points:
  - 'Російський імперський наратив: З''їзд — це "захист від наступу націоналізму", вимушений крок для "федералізації" та захисту
    прав російськомовних. Помаранчева революція — інспірований Заходом "переворот". Присутність Лужкова як символ підтримки
    "русского мира".'
  - 'Український державницький наратив: З''їзд — це шантаж та спроба узурпації влади з боку переможеної на виборах донецької
    еліти. Технологія для тиску на Київ, а не реальний сепаратизм. Інструмент для збереження впливу та торгів за посади.'
  - 'Західний академічний наратив: Розглядається як класичний приклад пострадянської політики, де еліти використовують сепаратистську
    карту в боротьбі за ресурси. "Репетиція" до 2014 року, що показала як слабкість української держави, так і відсутність
    у Кремля на той момент готового сценарію прямої агресії.'
  - '[!decolonization] Викриття "федералізації" як інструменту імперського контролю, що просувається Росією в сусідніх країнах
    для їх послаблення.'
  - '[!myth-buster] Руйнування міфу про "споконвічний сепаратизм" Сходу. Події 2004 року показали його штучність та керованість
    з боку еліт.'
  section: 'Зіткнення наративів: Сєвєродонецький з''їзд 2004 року'
  words: 1700
- points:
  - 'Джерело 1: Аналіз стенограми з''їзду. Виявлення ключових гасел, аналіз риторики. Хто виступав? Які конкретно вимоги висувалися?
    Чи була єдність серед делегатів?'
  - 'Джерело 2: Порівняльний аналіз двох статей. Перша — українського історика (напр., з "Україна Модерна") про роль олігархічних
    кланів у подіях 2004 року. Друга — звіт міжнародної кризової групи (International Crisis Group) за 2005 рік про ризики
    стабільності в Україні.'
  - 'Методологія: Як історики визначають мотивацію дійових осіб? Як відрізнити реальні наміри від політичної риторики? Критика
    джерел: чиї інтереси представляють автори, на яку аудиторію розраховані тексти?'
  - '[!epistemic-humility] Визнання обмеженості джерел. Багато рішень ухвалювались непублічно, і ми можемо лише реконструювати
    події.'
  section: 'Джерельна критика: Аналізуючи "репетицію"'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви відповісте на питання про легітимність з''їзду? Які аргументи ви можете навести?'
  - 'Уроки 2004 для 2014: Що змінилося за 10 років? Чому сценарій, що провалився у 2004, спрацював (частково) у 2014? Аналіз
    ролі російського військового втручання, зміни медіа-ландшафту та стану української армії.'
  - 'Мета-рефлексія: Чого нас вчить історія Сєвєродонецького з''їзду про природу сепаратизму та методи гібридної війни?'
  - '[!decolonization] Усвідомлення, що боротьба за наративи та історію є такою ж важливою частиною захисту суверенітету,
    як і військовий захист кордонів.'
  section: Дискусія та підсумок
  words: 700
focus: The 2004 Severodonetsk separatist congress during the Orange Revolution, failure analysis, and comparison with the
  2014 scenario from a historiographical perspective.
level: ISTORIO
