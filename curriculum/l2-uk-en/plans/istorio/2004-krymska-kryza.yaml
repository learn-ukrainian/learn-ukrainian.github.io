objectives:
- Аналізувати причини, перебіг та наслідки Сєвєродонецького з'їзду 2004 року в контексті Помаранчевої революції
- Розрізняти та критично оцінювати український, російський та західний наративи щодо спроби сепаратизму у 2004 році
- Застосовувати методи джерельної критики для аналізу історичних документів та медіа-повідомлень, що стосуються подій
- Формулювати аргументовану позицію щодо відмінностей між кризовими ситуаціями 2004 та 2014 років в Україні
