content_outline:
- points:
  - 'Провокація: Вам дають два описи однієї людини — Василя Стуса. Один називає його «особливо небезпечним рецидивістом»,
    інший — «сумлінням нації». Не знаючи, хто автор, поясніть, які маркери в мові та логіці видають радянський та український
    наративи?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був дисидентський рух єдиною силою? Позиція А: Так, це був єдиний фронт боротьби за незалежність. Позиція
    Б: Ні, це була сукупність розрізнених груп (націоналісти, правозахисники, релігійні діячі) з різними, іноді суперечливими,
    цілями.'
  - 'Дебат 2: Яка стратегія була ефективнішою? Культурний опір (збереження мови, «самвидав») vs Політико-правовий опір (апеляція
    до радянських законів, Гельсінська група).'
  - '[!epistemic-humility] Оцінка «ефективності» залежить від критеріїв: збереження ідентичності чи наближення розпаду СРСР?
    Обидві стратегії мали непередбачувані наслідки.'
  section: 'Конфліктна карта: Методологічні дебати в дослідженні дисидентства'
  words: 900
- points:
  - '1. Радянський наратив: «Відщепенці» та «найманці». Методологія: кримінальні справи, психіатричні діагнози, партійні звіти.
    Агенда: представити опір як кримінальний злочин або психічне відхилення, заперечити його політичну та національну основу.
    Сліпі плями: ігнорування ідеологічних мотивів, масовості репресій, зв''язку з попередніми етапами визвольного руху.'
  - '2. Український наратив: «Герої та мученики». Методологія: спогади, «самвидав», табірні щоденники. Агенда: створити національний
    пантеон героїв, підкреслити тяглість боротьби за державність. Сліпі плями: тенденція до гагіографії, ігнорування внутрішніх
    конфліктів, ідеологічних розбіжностей та складних особистих мотивацій.'
  - '3. Західний наратив: «Борці за права людини». Методологія: звіти Amnesty International, Radio Liberty, фокус на порушенні
    Гельсінських угод. Агенда: використати дисидентів як інструмент тиску на СРСР у Холодній війні. Сліпі плями: часто ігнорувався
    національно-визвольний аспект, зводячи все до універсальних прав людини і не розуміючи глибини колоніального гноблення.'
  - '[!decolonization] Розкриття того, як імперія криміналізує політичний опір, а західні союзники інструменталізують його
    для власних цілей.'
  - '[!myth-buster] Дисиденти не були монолітною групою, що мріяла про ліберальну демократію західного зразка. Серед них були
    і консервативні націоналісти, і ліві, і християнські демократи.'
  section: 'Зіткнення наративів: Дисидентський рух'
  words: 1700
- points:
  - 'Close reading: Аналіз кількох сторінок з підпільного журналу «Український вісник» (випуск під редакцією В. Чорновола).'
  - 'Авторство та редактура: Як анонімність авторів впливала на стиль? Які ризики несла редакційна робота? Як Чорновіл як
    редактор формував обличчя журналу?'
  - 'Інституційний аналіз: «Самвидав» як інституція. Як друкували? Як поширювали? Хто був цільовою аудиторією?'
  - 'Порівняльний аналіз: Як «Хроника текущих событий» (московський правозахисний бюлетень) та «Український вісник» висвітлювали
    ті самі події? Різниця в акцентах: права людини vs національні права.'
  - '[!epistemic-humility] Ми читаємо те, що збереглося. А скільки текстів було втрачено, конфісковано, не написано через
    страх? Наша джерельна база — це вершина айсберга.'
  section: 'Джерельна критика: Читаємо «Український вісник»'
  words: 1500
- points:
  - 'Повернення до розминки: Аналіз уривків про Стуса. Тепер студент може не просто вгадати, а професійно деконструювати обидва
    наративи, вказуючи на використані прийоми.'
  - 'Мета-рефлексія: Чим дослідження історії дисидентства відрізняється від дослідження, наприклад, Київської Русі? Роль живих
    свідків, закритих архівів КДБ, особистої ангажованості дослідника.'
  - 'Зв''язок із сьогоденням: Як сучасна РФ використовує радянські лекала («терористи», «екстремісти», «іноагенти») для дискредитації
    українського спротиву? Чому західні медіа іноді повторюють ці наративи?'
  - '[!decolonization] Підсумок: Дисидентський рух був не просто «опором», а актом повернення суб''єктності — права говорити
    про себе, свою історію та своє майбутнє власною мовою.'
  section: Дискусія та підсумок
  words: 700
focus: 'Аналіз дисидентського руху в Україні 1960-80х: джерела, стратегії, наративи та методологія дослідження.'
level: ISTORIO
module: istorio-044
objectives:
- Розрізняти та аналізувати радянський, український та західний наративи про дисидентський рух.
- Застосовувати методи джерельної критики для аналізу текстів «самвидаву».
- Формулювати аргументовану позицію в ключових методологічних дебатах щодо історії українського опору.
- Критично оцінювати роль дисидентського руху в підготовці та здобутті незалежності України.
