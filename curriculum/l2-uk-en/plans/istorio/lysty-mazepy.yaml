content_outline:
- points:
  - 'Провокація: Ось два уривки з листів однієї людини: один — повний принизливих компліментів до московського царя, інший
    — наказ про будівництво величного собору. Чи могла це писати одна й та сама особа? Чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Підданий чи союзник? Чи був тон Мазепи у листах до Петра І щирим приниженням, чи це була стандартна дипломатична
    гра слабшого союзника, ритуал, за яким ховався розрахунок?'
  - 'Дебат 2: "Справжній" Мазепа. Чи можемо ми взагалі реконструювати його справжні думки з листів, які за визначенням є публічними
    документами, чи ми бачимо лише серію масок?'
  - '[!epistemic-humility] Історіографія не має остаточної відповіді; наше завдання — зрозуміти, як кожне прочитання конструює
    "свого" Мазепу.'
  section: 'Конфліктна карта: Підданий чи суверен?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: Мазепа — архетип зрадника. Його ім''я піддано анафемі. Його листи — доказ підступності
    та обману. Меценатство — спроба купити лояльність старшини. [!decolonization]'
  - 'Український наратив: Мазепа — державник, європейський політик, "останній гетьман" незалежної Козацької держави. Його
    листи — зразок дипломатичної майстерності. Зрада царя — це вірність Україні. Меценатство — розбудова національної культури.'
  - 'Західний наратив: Мазепа — фігура доби бароко; авантюрист або трагічний герой (від Вольтера до Байрона). Його дії аналізуються
    в контексті типових для того часу раціональних політичних розрахунків та зміни альянсів.'
  - '[!myth-buster] Мазепа не був "націоналістом" у сучасному розумінні. Він боровся за права та привілеї козацької еліти,
    а не за "народну" державу.'
  section: 'Зіткнення наративів: Іван Мазепа'
  words: 1700
- points:
  - 'Крупний план: детальний розбір одного листа. Аналіз "челобитної" формули, пишної титулатури, ритуалів самоприниження.
    Що це — візантійська спадщина, тюркський звичай чи московська політична культура?'
  - 'Прихований зміст: Як Мазепа між рядками доносить свої прохання, скарги та попередження. Мистецтво говорити, нічого не
    кажучи прямо.'
  - 'Порівняльний аналіз: Тон листів до 1708 року і після. Як змінюється риторика, коли рішення про розрив вже прийнято?'
  - '[!epistemic-humility] Ми ніколи не дізнаємось, що Мазепа *відчував*, пишучи ці листи. Ми можемо лише аналізувати, що
    він *робив* за їх допомогою.'
  section: 'Джерельна критика: Читаючи лист до Петра І'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ми можемо пояснити співіснування двох облич Мазепи — прислужливого дипломата і величного
    мецената?'
  - 'Мета-рефлексія: Чого нас вчить цей кейс про природу влади та використання мови в політиці? Як епістолярні джерела можуть
    одночасно висвітлювати та приховувати правду?'
  - '[!decolonization] Як російська імперська історіографія перетворила складну політичну фігуру на одновимірний символ "зрадника"
    для легітимізації власного панування над Україною?'
  section: Дискусія та підсумок
  words: 700
focus: Critical analysis of Ivan Mazepa's correspondence as a historical source, revealing the conflict between his role as
  a subject of the Tsar and a builder of a proto-Ukrainian state. Comparison of Russian imperial, Ukrainian national, and
  Western narratives.
level: ISTORIO
module: istorio-026
objectives:
- Аналізувати листи Мазепи, розрізняючи риторичні стратегії, спрямовані на різні аудиторії
- Порівнювати російський імперський, український національний та західний наративи щодо постаті Мазепи
- Застосовувати методи джерельної критики до епістолярних текстів для виявлення упереджень та прихованих мотивів
- Формулювати власну аргументовану позицію щодо оцінки дій Мазепи, спираючись на аналіз історіографічних підходів
