title: 'Листи Мазепи: Дипломат і меценат'
focus: history
pedagogy: seminar
word_target: 5000
objectives:
- 'Analyze the causes and consequences of листи мазепи: дипломат і меценат'
- Evaluate the historical significance of мазепа у листах
