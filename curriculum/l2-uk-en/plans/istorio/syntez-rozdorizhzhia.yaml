content_outline:
- points:
  - 'Провокація: «Географія — це вирок. Україна, затиснута між великими державами, приречена назавжди залишатися полем бою».
    Інша цитата: «Кожен народ має таку історію, на яку заслуговує через свою здатність до самоорганізації». Яка з цих тез
    ближча до російського імперського погляду, а яка — до сучасного українського? Поясніть чому.'
  - 'Без контексту: «Народ, що протягом століть не міг збудувати власної держави, довів свою нездатність до самостійного історичного
    існування». Хто міг би це сказати і про який період?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історію рухають «структури» чи «герої»? Позиція структуралістів (школа «Анналів», марксисти): географія, клімат,
    економічні цикли та соціальні структури визначають долю народів. Позиція «історії великих людей»: рішення, харизма та
    помилки лідерів (Хмельницького, Мазепи, Грушевського, Зеленського) мають вирішальне значення.'
  - 'Дебат 2: Чи можна передбачити історію? Позитивістський погляд: історія — це наука, що має відкривати закони розвитку
    суспільства і робити прогнози. Постмодерністський погляд: історія — це лише текст, сукупність суб''єктивних наративів,
    а будь-які «закономірності» є інтелектуальною конструкцією.'
  - '[!epistemic-humility] Обидві позиції в кожному дебаті мають сильні аргументи. Завдання історика — не обрати одну сторону,
    а зрозуміти складну взаємодію між структурними обмеженнями та людським вибором у кожній конкретній ситуації.'
  section: 'Конфліктна карта: Детермінізм vs Агентність'
  words: 900
- points:
  - 'Тема: Ключові роздоріжжя (1654, 1709, 1917, 1991, 2014) в трьох історіографічних традиціях.'
  - '1. Російський імперський / радянський наратив: 1654 — «возз''єднання», 1709 — «зрада» Мазепи, 1917 — «хаос» і «німецька
    інтрига», 1991 — «геополітична катастрофа», 2014 — «інспірований Заходом переворот». Агентність українців заперечується,
    вони є об''єктом маніпуляцій зовнішніх сил. Мета — легітимізація контролю над Україною.'
  - '2. Український національний наратив: 1654 — вимушений тактичний союз, 1709 — спроба розриву з імперією, 1917 — відновлення
    державності, 1991 — здобуття незалежності, 2014 — Революція Гідності та утвердження європейського вибору. Наголос на тяглості
    державотворчих зусиль та зростанні суб''єктності народу.'
  - '3. Західний наратив (усереднений): Україна як «borderland» (пограниччя) між цивілізаціями. Події розглядаються через
    призму геополітики та інтересів великих держав. Часто бракує розуміння внутрішньої динаміки. Сучасні історики (Снайдер,
    Плохій) все більше визнають центральну роль української агентності.'
  - '[!decolonization] Розбір російського наративу як інструменту імперського домінування, що заперечує право українців на
    власну історію та власний вибір.'
  - '[!myth-buster] Міф про «вічне прагнення» українців до союзу з Росією спростовується аналізом кожного «роздоріжжя» як
    свідомого, хоч і часто трагічного, вибору.'
  section: 'Зіткнення наративів: Поворотні точки української історії'
  words: 1700
- points:
  - 'Джерело 1: Фрагмент із радянського підручника історії 1970-х років. Аналіз лексики («вікопомний акт», «братні народи»),
    замовчувань (умови договору, обмеження суверенітету), посилань на «волю народу» без джерел.'
  - 'Джерело 2: Фрагмент з «Історії України-Руси» М. Грушевського. Аналіз методології: опора на першоджерела (листи, літописи),
    критична оцінка їх достовірності, реконструкція позицій різних козацьких угруповань, показ вагань Хмельницького.'
  - 'Джерело 3: Фрагмент із праці Сергія Плохія «The Gates of Europe». Аналіз підходу: Переяслав як частина ширшого європейського
    контексту, порівняння з іншими договорами того часу, використання концепту «протекторат», аналіз довгострокових наслідків.'
  - '[!epistemic-humility] Порівняння показує, що той самий факт (угода 1654 року) може бути вписаний у абсолютно різні, взаємовиключні
    історичні розповіді залежно від мети, методології та ідеологічної позиції автора.'
  section: 'Джерельна критика: Як пишуть про Переяславську раду'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є історія України фатально детермінованою? Студент має сформулювати власну, аргументовану
    відповідь, використовуючи концепції «структури» та «агентності».'
  - 'Мета-рефлексія: Що робить історичний аналіз цінним, якщо він не може точно передбачати майбутнє? Роль історії у формуванні
    національної ідентичності, колективної пам''яті та здатності суспільства робити усвідомлений вибір.'
  - 'Погляд у майбутнє: Чому повномасштабне вторгнення 2022 року стало кульмінацією всіх попередніх «роздоріж»? Чи можна вважати,
    що в цей момент українська агентність остаточно подолала структурні обмеження минулого?'
  - '[!decolonization] Підсумок: історія — це не вирок, а поле боротьби за право розповідати власну історію. Опанування історіографічної
    критики є інструментом деколонізації свідомості.'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical debates on determinism vs. agency across major turning points in Ukrainian history, comparing Russian
  imperial, Ukrainian national, and Western narratives.
level: ISTORIO
module: istorio-syntez-rozdorizhzhia
objectives:
- Порівнювати різні історіографічні наративи (російський імперський, український, західний) щодо ключових подій української
  історії.
- Застосовувати методи джерельної критики для аналізу уривків з історіографічних праць.
- Розрізняти поняття «структура» та «агентність» і аналізувати їх взаємодію в історичному процесі.
- Формулювати аргументовану позицію щодо закономірностей та випадковостей в історії України, уникаючи крайнощів детермінізму
  та волюнтаризму.
