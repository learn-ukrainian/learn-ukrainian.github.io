content_outline:
- points:
  - 'Провокація: Вам дано два уривки, що описують історію України. Один представляє її як трагічну послідовність іноземних
    поневолень, інший — як безперервну боротьбу за державність. Який з них здається вам більш «правдивим» і чому? Чи може
    «правда» бути поєднанням обох?'
  - '[!myth-buster] Поширене кліше: «Історія України — це історія страждань». Цей модуль пропонує поглянути на неї як на історію
    спротиву.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історія України — це історія колоніального пригнічення (віктимний наратив) чи історія державотворчих змагань
    (агентний наратив)? Як ці дві рамки інтерпретують ті самі події (напр. Переяславська рада)?'
  - 'Дебат 2: Хто є рушієм історії — еліти (гетьмани, інтелігенція) чи народні маси (козацтво, селянські повстання, громадянське
    суспільство)? Чи можна говорити про «народну агентність»?'
  - '[!epistemic-humility] Обидві моделі (агентності та віктимності) є інтерпретаціями. Задача історика — не обрати «правильну»,
    а зрозуміти, як, ким і навіщо ці наративи конструюються.'
  section: 'Конфліктна карта: Агентність vs Віктимність'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Україна як «об''єкт» історії, «молодший брат» або «Малоросія». Методологія:
    вибіркове цитування джерел, ігнорування українських інституцій. Агенда: легітимізація панування. Сліпі плями: козацька
    державність, УНР, дисидентський рух.'
  - '[!decolonization] Український наратив: Україна як «суб''єкт», що має безперервну традицію державності від Русі до сьогодні.
    Методологія: фокус на українських джерелах, інституціях (Церква, Академія, Гетьманат), визвольних рухах. Агенда: обґрунтування
    права на незалежність. Сліпі плями: внутрішні конфлікти, колаборація, непопулярні рішення еліт.'
  - 'Західний наратив: Еволюція від сприйняття України через російську оптику (школа Пайпса) до визнання її повноцінним суб''єктом
    (школа Снайдера, Плохія). Методологія: порівняльний аналіз, доступ до раніше закритих архівів. Агенда: академічне розуміння
    регіону. Сліпі плями: часто не враховує внутрішньої української дискусії, покладаючись на англомовні джерела.'
  - '[!myth-buster] Міф про «вічну дружбу» vs міф про «вічну боротьбу». Реальність складніша і включає періоди співпраці,
    конфліктів та прагматичних союзів.'
  section: 'Зіткнення наративів: Українська суб''єктність'
  words: 1700
- points:
  - 'Джерело 1 (уривок): Праця російського історика-державника (напр. Карамзін, Соловйов) про «приєднання Малоросії». Аналіз:
    Яка лексика використовується (приєднання, возз''єднання)? Хто єдиний активний актор у тексті? Які українські постаті згадані
    і в якій ролі?'
  - 'Джерело 2 (уривок): Праця українського історика (напр. Грушевський, Липинський) про той самий період. Аналіз: Як описується
    Гетьманщина? Які інституції та процеси в центрі уваги? Хто є акторами?'
  - '[!epistemic-humility] Порівняння методологій: один бачить історію як розширення імперського центру, інший — як розвиток
    національного організму. Обидва використовують джерела, але ставлять їм різні питання.'
  section: 'Джерельна критика: Імперська оптика vs український погляд'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви можете проаналізувати два початкові уривки? Які ідеологічні та методологічні припущення
    лежать в основі кожного з них?'
  - 'Мета-рефлексія: Що означає бути «суб''єктом» історії? Це політичний статус, культурна свідомість чи здатність діяти колективно?
    Наведіть приклади з модуля.'
  - '[!decolonization] Зв''язок із сьогоденням: Як наратив про українську агентність використовується сьогодні для мобілізації
    суспільства та в міжнародній комунікації? Чому російська пропаганда так наполегливо намагається його зруйнувати?'
  section: Дискусія та підсумок
  words: 700
