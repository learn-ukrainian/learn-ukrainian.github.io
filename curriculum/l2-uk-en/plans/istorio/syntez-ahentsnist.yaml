objectives:
- Порівнювати різні історіографічні наративи (імперський, національний, західний) щодо української історії
- Аналізувати поняття "агентність", "суб'єктність" та "віктимність" на історичних прикладах
- Застосовувати методи джерельної критики для аналізу уривків з праць істориків
- Оцінювати, як минулі наративи впливають на сучасні події та пропаганду
