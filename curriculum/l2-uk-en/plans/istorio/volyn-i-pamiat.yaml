content_outline:
- points:
  - 'Провокація: два уривки, що описують той самий день у селі на Волині 1943 року. Один — зі спогадів поляка, інший — зі
    звіту УПА. Без підписів. Хто є хто? Що видає автора?'
  - 'Цитата історика: «Контекст не виправдовує, але пояснює». Чи завжди це так?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Злочин УПА чи превентивний удар? Позиція українських націоналістів (відповідь на пацифікації та дискримінацію)
    vs позиція польської сторони (неспровокована агресія).'
  - 'Дебат 2: Етнічна чистка чи геноцид? Юридичні та історичні визначення. Чому вибір терміна є політичним актом для обох
    сторін.'
  - '[!epistemic-humility] Аналіз джерел: як звіти ОУН та АК, а також свідчення цивільних, малюють діаметрально протилежні
    картини причин та наслідків.'
  section: 'Конфліктна карта: Виправдання чи пояснення?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Радянська історіографія замовчувала трагедію або подавала її як «розправу
    буржуазних націоналістів». Сучасна РФ використовує її для розколу між Україною та Польщею, зображуючи УПА виключно як
    нацистських колаборантів.'
  - 'Український наратив: Акцент на контексті — дискримінаційна політика міжвоєнної Польщі, пацифікації, німецька окупація.
    Трагедія розглядається як частина визвольної боротьби зі страшною ціною. Тенденція до применшення ролі ОУН або підкреслення
    «відплатних акцій» з боку поляків.'
  - 'Польський наратив: Акцент на жертвах серед цивільного населення та жорстокості методів. Центральна теза — це був односторонній,
    спланований геноцид (ludobójstwo), скоєний українськими націоналістами. Фільм «Wołyń» як квінтесенція цього наративу.'
  - '[!decolonization] Західний наратив (Т. Снайдер): Волинь як трагедія «Кривавих земель» (Bloodlands) — зона подвійної окупації,
    де насильство стало нормою. Аналіз циклів помсти та ескалації, уникнення простого поділу на «добрих» і «поганих».'
  - '[!myth-buster] Міф про «виключно односторонню» відповідальність. Аналіз польських «відплатних акцій» та ролі Армії Крайової.'
  section: 'Зіткнення наративів: Волинь 1943'
  words: 1700
- points:
  - 'Порівняльний аналіз: Гжегож Мотика («Od rzezi wołyńskiej do akcji «Wisła»») vs. Ярослав Грицак («Нарис історії України»).
    Як методологія, вибір джерел та національна приналежність впливають на висновки історика?'
  - 'Первинне джерело: розбір звіту з архіву УПА про «антипольську акцію». Яку лексику використано? Як описуються жертви?
    Яка мета документа — інформування чи виправдання?'
  - '[!epistemic-humility] Аналіз візуального наративу: фільм «Wołyń» (2016) Войцеха Смажовського. Які історичні факти він
    використовує, а які — опускає? Чи є фільм історичним документом чи політичним висловлюванням?'
  section: 'Джерельна критика: Як пишуть про Волинь?'
  words: 1500
- points:
  - 'Повернення до розминки: Чи можете ви тепер точно ідентифікувати авторів уривків? Які маркери в тексті стали для вас очевидними?'
  - 'Мета-рефлексія: Чому Волинь — «найболючіша тема»? Як говорити про неї, щоб уникнути релятивізації злочину з одного боку
    та дегуманізації «іншого» — з іншого?'
  - '[!decolonization] Зв''язок із сьогоденням: Як Росія використовує волинську карту сьогодні? Як змінився діалог між поляками
    та українцями після 24 лютого 2022 року? Чи можливе остаточне примирення?'
  section: Дискусія та підсумок
  words: 700
focus: Волинь 1943, українсько-польський конфлікт, історіографічна пам'ять, зіткнення наративів про етнічну чистку та геноцид
level: ISTORIO
module: istorio-116
objectives:
- Аналізувати Волинську трагедію з позицій трьох різних історіографічних наративів: українського, польського та російського/західного.
- Застосовувати методи джерельної критики для оцінки праць істориків та первинних документів (звітів УПА, спогадів).
- Розрізняти поняття «контекст» і «виправдання», а також «етнічна чистка» і «геноцид» у складних історичних дискусіях.
- Виявляти інструменталізацію історичної пам'яті в сучасній політиці та пропаганді.
pedagogy: CBI
