content_outline:
- points:
  - 'Провокація: «Хоробрі предки наші, народ слов''янський, або, як літописці кажуть, сарматський, а по-простому козацький...»
    — це цитата з історичного документу чи політичної промови? Поясніть свою думку.'
  - Чому гадяцький полковник на початку XVIII ст. раптом почав шукати предків козаків серед давніх сарматів? Що це говорить
    про його мету?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Літопис Грабянки — це історичне джерело чи політичний маніфест? Позиція 1: Це компіляція, що містить цінні,
    хоч і спотворені, відомості. Позиція 2: Це апологетика, створена з єдиною метою — легітимізувати козацьку еліту.'
  - 'Дебат 2: Чому Грабянка «крутіший» за Самовидця? Порівняння барокової риторики Грабянки (ідеалізація, панегірики) з прагматичним,
    сухим стилем Літопису Самовидця. Чия розповідь «правдивіша» і що таке «правда» для історика?'
  - '[!epistemic-humility] Кожен літопис — це не фотографія минулого, а портрет, написаний на замовлення. Наше завдання —
    зрозуміти, хто замовник і яка його мета.'
  section: 'Конфліктна карта: Історія чи ідеологія?'
  words: 900
- points:
  - '1. Український наратив (Грабянка): Козаки — не вчорашні втікачі, а нащадки давнього шляхетного народу (сарматів/хозар),
    лицарі, що споконвіку захищали православну віру. Мета: довести «природне право» козаків на автономію та привілеї. Сліпі
    плями: ігнорує соціальні причини виникнення козацтва.'
  - '2. Російський імперський/радянський наратив: Козацтво — це «голытьба», втікачі-селяни та розбійники на окраїнах держави.
    Їхня історія — частина бунтівної історії «русского народа». Мета: заперечити право українців на окрему історію та державність.
    Сліпі плями: не може пояснити унікальну політичну культуру та державні інституції Гетьманщини.'
  - '3. Західний наратив: Розглядає літопис Грабянки як типовий для Європи раннього модерну «етіологічний міф» — створення
    славетного минулого для обґрунтування політичних амбіцій у сучасному. Мета: вписати українську історію в загальноєвропейський
    контекст. Сліпі плями: може недооцінювати унікальність української ситуації та тиск імперії.'
  - '[!decolonization] Наратив Грабянки — це відчайдушна спроба створити власну історію в умовах, коли твою історію починає
    писати імперія.'
  - '[!myth-buster] Грабянка не «вигадав» усе з нуля. Він майстерно компілював польські хроніки, церковні тексти та народні
    перекази, створюючи потрібний йому наратив.'
  section: 'Зіткнення наративів: Міф про походження козацтва'
  words: 1700
- points:
  - 'Close reading фрагменту з літопису про походження козацтва. Аналіз риторичних прийомів: звернення до авторитетів, біблійні
    алюзії, символізм.'
  - 'Стиль бароко в історіографії: метафори, алегорії, гіперболи. Як книжний, пишний стиль служить ідеологічній меті?'
  - 'Автор і його позиція: як біографія Грабянки (гадяцький полковник, учасник політичної боротьби) вплинула на його текст?
    Чому він пише саме в 1710 році, після Полтавської катастрофи?'
  - '[!epistemic-humility] Ми не можемо читати Грабянку, шукаючи «факти». Ми мусимо читати його, щоб зрозуміти ментальність,
    страхи та амбіції української еліти на зорі імперії.'
  section: 'Джерельна критика: Аналіз міфу про «хозарське» походження козаків'
  words: 1500
- points:
  - 'Повернення до розминки: тож літопис Грабянки — це історія чи політика? Сформулюйте відповідь, використовуючи поняття
    «ідеологія», «легітимація», «барокова історіографія».'
  - Літопис як політичний маніфест. Чи може історія бути аполітичною, особливо в умовах бездержавності?
  - '[!decolonization] Як наративи, створені Грабянкою, використовуються (або спотворюються) в сучасній російсько-українській
    війні? Чому контроль над минулим є ключем до контролю над майбутнім?'
  section: Дискусія та підсумок
  words: 700
focus: Літопис Григорія Грабянки як ідеологічний маніфест; барокова історіографія; міфологізація походження козацтва; порівняння
  з Самовидцем та Величком; критика джерел.
