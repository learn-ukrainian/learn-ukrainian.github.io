objectives:
- Аналізувати Літопис Грабянки як ключовий текст для розуміння ідеології козацької старшини початку XVIII ст.
- Відрізняти барокову історіографію від сучасних методів історичного дослідження, ідентифікуючи риторику, апологетику та міфологізацію.
- Критично порівнювати різні історіографічні наративи (український, імперський, західний) щодо походження та ролі козацтва.
- Застосовувати навички джерельної критики для аналізу уривків з історичних текстів, враховуючи контекст та мету автора.
