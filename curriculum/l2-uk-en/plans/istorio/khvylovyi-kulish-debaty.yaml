content_outline:
- points:
  - 'Провокація: В 1933 році Микола Хвильовий, автор гасла «Геть від Москви!», накладає на себе руки. Його передсмертна записка
    закінчується словами: «Хай живе комунізм. Хай живе... Комуністична партія». Як це можливо? Де справжній Хвильовий?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Куди йти українській культурі? Позиція Хвильового («психологічна Європа», орієнтація на західне мистецтво) vs
    офіційна лінія партії (орієнтація на Москву, «пролетарська культура»).'
  - 'Дебат 2: Ким був Хвильовий? Націонал-комуністом, що вірив у можливість реформувати систему зсередини? Чи прихованим націоналістом,
    що використовував комуністичну риторику для просування українського порядку денного?'
  - '[!epistemic-humility] Оцінка його постаті досі викликає суперечки: він одночасно ікона національного відродження і трагічний
    приклад комуніста, що повірив в утопію.'
  section: 'Конфліктна карта: Інтелектуальна війна за душу нації'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Хвильовизм» — це небезпечний «буржуазно-націоналістичний ухил», що підриває
    єдність радянських народів. Його ідеї — зрада інтернаціоналізму, спроба відірвати Україну від «братньої» Росії.'
  - 'Український наратив (пост-радянський): Хвильовий — пророк, мученик і візіонер, що першим розгледів екзистенційну загрозу
    з боку Москви. «Геть від Москви!» — це формулювання українського цивілізаційного вибору. Його смерть — символ краху українського
    відродження.'
  - 'Західний наратив (академічний): Хвильовий розглядається як ключовий приклад «націонал-комунізму». Його випадок ілюструє
    нерозв’язні суперечності радянського проєкту: спроба поєднати імперський центр із формально незалежними республіками та
    їхніми культурними елітами.'
  - '[!decolonization] Радянська риторика про «інтернаціоналізм» викривається як інструмент для маскування імперського контролю.'
  - '[!myth-buster] Хвильовий не був антикомуністом; він був комуністом, який вірив, що справжній комунізм в Україні можливий
    лише за умови повної культурної незалежності від Москви.'
  section: 'Зіткнення наративів: Літературна дискусія 1925-1928'
  words: 1700
- points:
  - 'Close reading «Камо грядеши» (1925): Аналіз риторики. Кого він критикує під назвою «Просвіта» та «хуторянство»? Що саме
    він вкладає в поняття «психологічна Європа»? Це географія чи система цінностей?'
  - 'Close reading «Думки проти течії» (1926): Як змінюється тон? Чому гасло «Геть від Москви!» з''являється саме тут? Аналіз
    концепції «азіатського ренесансу» як виклику європоцентризму та російській гегемонії одночасно.'
  - 'Критика жанру: Чому памфлет? Це не наукова стаття, а бойова публіцистика. Як жанр впливає на зміст і стиль? Для кого
    він писав — для широкої публіки чи для партійної еліти?'
  - '[!epistemic-humility] Ми читаємо ці тексти через призму Голодомору та Розстріляного відродження. А як їх читали сучасники
    в 1926 році, в розпал політики «українізації»?'
  section: 'Джерельна критика: Аналіз памфлетів «Камо грядеши» та «Думки проти течії»'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, як поєднати «Геть від Москви!» і «Хай живе Компартія»? Студент має сформулювати власну
    інтерпретацію, спираючись на матеріали модуля.'
  - 'Мета-рефлексія: Чого вчить нас історія Хвильового про стосунки митця та влади в тоталітарній державі? Чи можливий «третій
    шлях» в умовах імперії?'
  - 'Зв''язок із сьогоденням: Наскільки дебати Хвильового про культурну орієнтацію України актуальні сьогодні, в контексті
    війни з Росією та інтеграції до ЄС?'
  - '[!decolonization] Історія Хвильового — це приклад того, як імперія апропріює та знищує будь-які спроби самостійного культурного
    розвитку на підкорених територіях.'
  section: Дискусія та підсумок
  words: 700
