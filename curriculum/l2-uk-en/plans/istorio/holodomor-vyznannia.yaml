content_outline:
- points:
  - 'Провокація: Вам представлено два твердження. Одне називає Голодомор «спільною трагедією народів СРСР», інше — «актом
    геноциду українського народу». Не знаючи джерела, яке з них здається вам більш точним з історичної та правової точки зору?
    Поясніть свою думку.'
  - 'Цитата для роздумів: «Щоб контролювати майбутнє, треба контролювати минуле». Як цей вислів стосується теми визнання Голодомору?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Геноцид чи злочин проти людяності? Деякі міжнародні юристи та історики, визнаючи масштаб трагедії, вагаються
    з використанням терміну «геноцид», вказуючи на суворі критерії Конвенції ООН. Інші наполягають, що дії радянського режиму
    повністю відповідають цим критеріям.'
  - 'Дебат 2: Роль «наміру» (intent) у доведенні геноциду. Як довести геноцидний намір без прямого наказу «знищити українців»?
    Одна сторона вказує на сукупність доказів (закриття кордонів, конфіскація їжі, удари по інтелігенції). Інша вимагає «залізного»
    документального доказу прямого наміру.'
  - '[!epistemic-humility] Юриспруденція — це не математика. Інтерпретація доказів та застосування правових норм може відрізнятися,
    що створює простір для дебатів навіть серед фахівців.'
  section: 'Конфліктна карта: Правова кваліфікація злочину'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Голодомор — це «спільна трагедія» всіх народів СРСР, спричинена «перегинами
    на місцях» та поганими погодними умовами. МЕТОДОЛОГІЯ: вибіркове використання даних, ігнорування документів про національну
    спрямованість репресій, підміна понять. АГЕНДА: зняти з Кремля відповідальність за колоніальне насильство, представити
    Україну як невід''ємну частину «русского мира».'
  - 'Український наратив: Голодомор — це свідомий акт геноциду, організований радянським режимом з метою зламати опір українського
    селянства та знищити українську національну ідентичність. МЕТОДОЛОГІЯ: аналіз первинних документів (постанови, листи),
    свідчення очевидців, демографічна статистика. АГЕНДА: відновити історичну справедливість, утвердити суб''єктність України.'
  - 'Західний наратив: Еволюція від замовчування в 1930-х до поступового визнання. Більшість західних істориків погоджуються
    з фактом штучного голоду, але дискусії щодо правової кваліфікації («геноцид») тривають. РАФАЕЛ ЛЕМКІН, автор терміну «геноцид»,
    вважав український випадок класичним прикладом геноциду. АГЕНДА: різна — від академічного пошуку істини до політичного
    прагматизму (не бажання псувати відносини з РФ).'
  - '[!decolonization] Наратив «спільної трагедії» — це класичний прийом імперії, що намагається приховати асиметричність
    своїх дій, розмиваючи відповідальність та урівнюючи жертву й агресора.'
  - '[!myth-buster] Твердження, що голод був по всьому СРСР, не спростовує геноцид в Україні. Геноцид — це не про кількість
    жертв, а про намір знищити конкретну групу.'
  section: 'Зіткнення наративів: Боротьба за визнання'
  words: 1700
- points:
  - 'Close Reading: Конвенція ООН про запобігання злочину геноциду та покарання за нього (1948). Аналіз статті II: п''ять
    ознак геноциду. Які з них прямо застосовні до Голодомору? Які вимагають інтерпретації? Які групи захищені Конвенцією,
    і чи підпадають під них «українці» як нація?'
  - 'Close Reading: Закон України «Про Голодомор 1932–1933 років в Україні» (2006). Як український закон визначає Голодомор?
    Як він співвідноситься з Конвенцією ООН? Що означає положення про «публічне заперечення Голодомору» як «наругу над пам''яттю»
    та «приниження гідності Українського народу»?'
  - 'Порівняльний аналіз: Де український закон розширює чи конкретизує положення Конвенції? Чому для України було важливо
    ухвалити власний закон, а не просто посилатися на міжнародне право?'
  - '[!epistemic-humility] Юридичні тексти — це продукти свого часу. Конвенція 1948 року писалася з огляду на Голокост і не
    могла передбачити всі форми геноциду. Тому її застосування до інших випадків — це завжди предмет юридичної інтерпретації.'
  section: 'Джерельна критика: Конвенція ООН vs. Закон України'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви оцінюєте твердження про «спільну трагедію» та «геноцид»? Які аргументи та докази
    ви можете навести на підтримку своєї позиції?'
  - 'Мета-рефлексія: Чому юридичний термін «геноцид» є настільки важливим і політично зарядженим у контексті Голодомору? Чому
    простого визнання факту масової загибелі людей недостатньо?'
  - 'Зв''язок із сьогоденням: Як наративи заперечення Голодомору, що були розроблені в СРСР та сучасній РФ, використовуються
    в пропаганді щодо поточної російсько-української війни? Наведіть приклади.'
  - '[!decolonization] Визнання Голодомору геноцидом — це не лише про минуле. Це акт деколонізації української історії та
    утвердження права України на власну пам''ять і суб''єктність, вільну від імперського контролю.'
  section: Дискусія та підсумок
  words: 700
focus: Юридичне визначення геноциду (Конвенція ООН 1948), його застосування до Голодомору, український закон 2006 року, динаміка
  міжнародного визнання та історіографічна боротьба з російськими наративами заперечення.
