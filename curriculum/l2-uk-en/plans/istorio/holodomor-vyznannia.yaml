objectives:
- Застосовувати критерії Конвенції ООН для аналізу Голодомору як акту геноциду
- Порівнювати та критично оцінювати український, російський та західний історіографічні наративи про Голодомор
- Аналізувати первинні юридичні документи (Конвенцію ООН, Закон України) як історичні джерела
- Виявляти маніпулятивні прийоми та ідеологічні цілі в історичному дискурсі заперечення геноциду
