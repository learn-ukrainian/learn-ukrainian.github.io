objectives:
- Аналізувати причини, форми та наслідки політики державного антисемітизму в СРСР.
- Оцінювати історичне значення феномену «антисемітизму без антисемітів» та його проявів.
- Розрізняти радянський, західний та сучасний український наративи щодо «єврейського питання» в СРСР.
- Застосовувати методи джерельної критики до аналізу радянських офіційних та неофіційних (самвидав) текстів.
