content_outline:
- points:
  - 'Провокація: СРСР офіційно проголошував «дружбу народів» та інтернаціоналізм, але водночас провадив політику державного
    антисемітизму. Як ці дві реальності співіснували?'
  - 'Завдання: Порівняйте дві цитати — уривок з радянської конституції про рівність усіх громадян та спогади «відмовника»
    про дискримінацію. Поясніть, що є декларацією, а що — реальною практикою.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був антисемітизм в СРСР унікальним явищем, чи лише одним з проявів загальної репресивної політики? Позиція
    СРСР (боротьба з «сіонізмом») vs позиція західної історіографії (державна політика).'
  - 'Дебат 2: Замовчування Бабиного Яру — це була форма заперечення Голокосту чи стандартна радянська практика уніфікації
    пам''яті, де всі жертви — «радянські громадяни»?'
  - '[!epistemic-humility] Радянська історіографія наполягала на відсутності антисемітизму, тоді як західні дослідники аналізували
    його приховані форми. Істина — у вивченні механізмів, а не в простих «так» чи «ні».'
  section: 'Конфліктна карта: Заперечення чи специфіка?'
  words: 900
- points:
  - 'Радянський наратив: В СРСР немає антисемітизму. Є боротьба з «буржуазним націоналізмом», «сіонізмом» та «безрідним космополітизмом».
    «П''ята графа» — адміністративна формальність. Жертви нацизму — це єдиний «радянський народ».'
  - 'Український дисидентський наратив: Визнання антисемітизму як злочинної державної політики. Солідарність з єврейським
    народом (Іван Дзюба, «Бабин Яр»). Аналіз замовчування як інструменту тоталітарного контролю.'
  - 'Західний наратив: Аналіз державного антисемітизму як інструменту для мобілізації мас, боротьби з інакомисленням та ідеологічної
    зброї у Холодній війні. Вивчення кодової мови та інституційних практик дискримінації.'
  - '[!decolonization] Викриття радянського міфу про «інтернаціоналізм» як форми імперського контролю над національними ідентичностями.'
  - '[!myth-buster] Міф про те, що СРСР був головним борцем з антисемітизмом після Другої світової війни.'
  section: 'Зіткнення наративів: «Єврейське питання» в СРСР'
  words: 1700
- points:
  - 'Аналіз статті з газети «Правда» періоду кампанії проти «безрідних космополітів» (1948-1953). Завдання: ідентифікувати
    кодову мову, евфемізми та справжні мішені критики.'
  - 'Аналіз уривку з «Хроніки поточних подій» або відкритого листа «відмовника». Завдання: порівняти стиль, термінологію та
    мету цього тексту з офіційним документом. Як описується та сама реальність?'
  - '[!epistemic-humility] Обидва джерела є суб''єктивними. Завдання історика — зрозуміти agenda, аудиторію та невисловлені
    припущення кожного з них, щоб реконструювати реальність.'
  section: 'Джерельна критика: Читання між рядків — від «Правди» до самвидаву'
  words: 1500
- points:
  - 'Повернення до розминки: Як СРСР вдавалося поєднувати декларативний інтернаціоналізм з практичним антисемітизмом? Студент
    має сформулювати відповідь, використовуючи поняття «кодова мова», «політика пам''яті», «державний контроль».'
  - 'Зв''язок із сьогоденням: Як сучасна російська пропаганда використовує звинувачення в «нацизмі» проти України, одночасно
    застосовуючи радянські методи історичної маніпуляції та переписування минулого?'
  - '[!decolonization] Рефлексія: як розуміння радянських наративних технік допомагає протистояти сучасній дезінформації?'
  section: Дискусія та підсумок
  words: 700
focus: Радянський державний антисемітизм, замовчування Голокосту (Бабин Яр), кампанія проти «безрідних космополітів», «п'ята
  графа» як інструмент дискримінації, сучасний спадок цих наративів.
