vocabulary_hints:
- definition: форма ксенофобії, що виражається у ворожому ставленні до євреїв, від побутової нетерпимості до державної політики
  pos: ч.
  word: антисемітизм
- definition: ідеологічне кліше сталінської доби (1948–1953), що використовувалось для таврування єврейської інтелігенції
    як непатріотичної та чужої радянському ладу
  pos: ч.
  word: безрідний космополіт
- definition: пункт в радянському паспорті про національність, що слугував інструментом інституційної дискримінації, зокрема
    для євреїв, при вступі до вишів та працевлаштуванні
  pos: ж.
  word: п'ята графа
- definition: неофіційний термін для радянських євреїв, яким влада відмовила у праві на еміграцію до Ізраїлю
  pos: ч.
  word: відмовник
- definition: політика свідомого ігнорування або приховування певних історичних фактів, зокрема єврейського характеру трагедії
    Бабиного Яру
  pos: с.
  word: замовчування
- definition: політичний рух за об'єднання та відродження єврейського народу на історичній батьківщині. В СРСР — ідеологічне
    тавро для переслідування єврейських активістів
  pos: ч.
  word: сіонізм
- definition: кримінальна справа 1953 року, сфабрикована проти групи видатних радянських лікарів (переважно євреїв), звинувачених
    у змові та вбивстві радянських лідерів
  pos: ж.
  word: справа лікарів
