content_outline:
- points:
  - 'Провокація: Два описи Переяславської ради 1654 року. Один говорить про «возз''єднання братніх народів», інший — про «трагічну
    помилку, що призвела до втрати суверенітету». Який з них радянський, а який — сучасний український? Поясніть свою думку.'
  - '[!myth-buster] Чи була «дружба народів» справді про дружбу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ідеологема «дружби народів» — це утопічний інтернаціоналістичний проєкт чи цинічне прикриття для російського
    імперського домінування та концепції «старшого брата»?'
  - 'Дебат 2: Історична фальсифікація — це тотальне замовчування (Голодомор, депортації, УПА) чи тонка реінтерпретація («спільна
    колиска», «возз''єднання»)?'
  - '[!epistemic-humility] Як розрізнити щиру віру в ідеологію від її інструментального використання для утримання влади?'
  section: 'Конфліктна карта: Рівність чи ієрархія?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: СРСР як добровільний союз рівних республік під мудрим керівництвом Москви.
    Спільна історія («колиска Київської Русі»), спільні перемоги, «старший брат» допомагає «молодшим». Мета — легітимізація
    централізованої влади та асиміляція.'
  - 'Український наратив (дисидентський/пост-радянський): СРСР як тюрма народів. «Дружба» як евфемізм для колоніального панування,
    економічної експлуатації, лінгвоциду та придушення національної ідентичності. Докази: Голодомор, репресії, русифікація.'
  - 'Західний наратив (доба Холодної війни): Аналіз через призму тоталітаризму. Пропаганда — ключовий інструмент контролю
    над суспільством. «Дружба народів» розглядається не як ідеологія, а як технологія управління, спрямована на запобігання
    національно-визвольним рухам.'
  - '[!decolonization] Розкриття механізму, за яким наратив про «дружбу» приховував ієрархію та насильство.'
  section: 'Зіткнення наративів: "Дружба народів" як ідеологема'
  words: 1700
- points:
  - 'Close reading: Аналіз уривків з радянських підручників історії про Київську Русь та Переяславську раду 1654 року.'
  - 'Автор та контекст: Хто писав ці підручники? Яким було замовлення від Агітпропу? Цензура та ідеологічний контроль як співавтори.'
  - 'Мова як зброя: Виявлення та аналіз ключових пропагандистських термінів: «возз''єднання», «спільна колиска», «братній
    народ», «буржуазний націоналізм».'
  - '[!epistemic-humility] Оцінка «простору для маневру» радянського історика. Чи міг він сказати правду? Де межа між компромісом
    та колаборацією?'
  section: 'Джерельна критика: Аналіз радянського шкільного підручника'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер, після аналізу механізмів, ви можете деконструювати пропагандистський міф про «возз''єднання»?'
  - 'Мета-рефлексія: Чим радянська пропаганда відрізняється від сучасної російської дезінформації? Які інструменти залишились
    незмінними, а які — еволюціонували?'
  - '[!decolonization] Чому ностальгія за СРСР та міф про «дружбу народів» є небезпечними для сучасної України? Як спадок
    радянської пропаганди впливає на сьогоднішню війну?'
  section: Дискусія та підсумок
  words: 700
