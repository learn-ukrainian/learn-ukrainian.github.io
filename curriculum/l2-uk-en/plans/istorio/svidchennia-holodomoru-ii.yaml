content_outline:
- points:
  - 'Провокація: Вам дано два описи конфіскації зерна. Один — звіт партійного активіста, інший — спогади вцілілої селянки.
    Не знаючи, де чий, спробуйте визначити джерело та пояснити свою логіку.'
  - 'Цитата-загадка: «У відповідь на саботаж куркульських елементів, партія вживає рішучих заходів для забезпечення виконання
    плану хлібозаготівель». Що насправді означає це речення?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Голодомор — трагічний наслідок хаотичної політики та «перегинів на місцях» чи свідомий, спланований геноцид?
    Позиція радянської історіографії та західних ревізіоністів vs позиція української та провідної західної історіографії.'
  - 'Дебат 2: Радянські документи — це надійне джерело чи суцільна фальсифікація? Як читати звіти ОГПУ чи партійні постанови
    — буквально чи «між рядками»?'
  - '[!epistemic-humility] Розгляд доказів, що наводили обидві сторони у дебаті Конквест-Гетті, що сформував західну дискусію
    про Голодомор.'
  section: 'Конфліктна карта: Хаос чи Намір?'
  words: 900
- points:
  - 'Радянський наратив: Документи фіксують боротьбу держави з «куркульським саботажем», необхідність індустріалізації та
    подолання «дрібновласницької стихії». Смерті — трагедія, але не чийсь намір.'
  - 'Український наратив: Документи («Закон про п''ять колосків», система «чорних дошок», закриття кордонів) складають повну
    доказову базу свідомого злочину. Бюрократична мова — це код для виконавців геноциду.'
  - 'Західний наратив: Еволюція від замовчування (Дюранті) до академічних дебатів (Конквест vs Гетті) і до сучасного консенсусу,
    що визнає геноцид на основі розкритих архівів.'
  - '[!decolonization] Викриття механізму, за яким імперія використовує бюрократію для вчинення та одночасного заперечення
    злочинів.'
  - '[!myth-buster] Руйнування міфу про «відсутність документів». Документів безліч, питання в їхній правильній інтерпретації.'
  section: 'Зіткнення наративів: Документи як доказ'
  words: 1700
- points:
  - 'Close reading: Повний текст Постанови ЦВК і РНК СРСР від 7 серпня 1932 року. Аналіз термінології: «розкрадання соціалістичної
    власності», «вороги народу». Які покарання передбачалися і за що?'
  - 'Close reading: Типова шифротелеграма Кагановича або Молотова про «незадовільний хід хлібозаготівель». Аналіз мови: погрози,
    вимоги, евфемізми («застосувати жорсткіші заходи»).'
  - '[!epistemic-humility] Порівняння офіційного тексту закону з тим, як його застосовували на практиці, на основі звітів
    ОГПУ. Розрив між писаним правом і реальним терором.'
  section: 'Джерельна критика: «Закон про п''ять колосків» та шифротелеграма'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви прочитаєте звіт партійного активіста? Які маркери радянської новомови ви можете ідентифікувати?'
  - 'Мета-рефлексія: Чому для тоталітарного режиму важливо документувати свої злочини в такий бюрократичний спосіб? Яку функцію
    виконує така мова?'
  - '[!decolonization] Як сучасна російська пропаганда використовує схожі бюрократичні та юридичні евфемізми для опису війни
    проти України? (напр., «СВО», «денацифікація», «захист російськомовного населення»)'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз первинних радянських документів (закони, телеграми, звіти ОГПУ) як доказової бази геноциду. Критика джерела,
  розшифровка бюрократичної мови, зіткнення наративів.
level: ISTORIO
module: istorio-037
objectives:
- Аналізувати радянські документи як історичне джерело, розпізнаючи бюрократичну мову та евфемізми.
- Критично порівнювати офіційний радянський наратив про «труднощі хлібозаготівель» з українським та західним поглядами на
  Голодомор як геноцид.
- Застосовувати методи джерельної критики до ключових документів, таких як «Закон про п'ять колосків».
- Формулювати доказову базу геноциду, спираючись на аналіз первинних документів.
pedagogy: CBI
