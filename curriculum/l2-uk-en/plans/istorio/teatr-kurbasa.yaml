content_outline:
- points:
  - 'Провокація: Представлено два відгуки на виставу «Народний Малахій». Один називає її «вершиною сучасного мистецтва», інший
    — «формалістичним знущанням над пролетаріатом». Котрий з них належить радянському критику, а котрий — українському інтелектуалу?
    На основі чого ви робите висновок?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Режисер-новатор vs епігон Заходу. Чи був Курбас унікальним творцем українського модерного театру, чи він лише
    копіював європейські експресіоністські та конструктивістські моделі (Мейєрхольд, Піскатор)?'
  - 'Дебат 2: Естетична критика vs політичний донос. Чи була боротьба з «курбасівським формалізмом» щирою спробою знайти «мистецтво
    для мас», чи «формалізм» був лише зручним ярликом для знищення політично та національно нелояльних митців?'
  - '[!epistemic-humility] В умовах тоталітарної держави, де естетика невіддільна від ідеології, чи взагалі можливо провести
    чітку межу між мистецькою дискусією та політичним переслідуванням?'
  section: 'Конфліктна карта: Реформатор чи формаліст?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Курбас — буржуазний націоналіст, що проповідував відрив від «братньої» російської
    культури. Його «формалістичні» експерименти були незрозумілі народу і ворожі до завдань соціалістичного будівництва. Театр
    «Березіль» був осередком антирадянської діяльності, який закономірно було ліквідовано.'
  - 'Український наратив: Курбас — геній і мученик Розстріляного відродження. Він створював театр світового рівня, який був
    свідомим актом культурної деколонізації. Його знищили саме за його український успіх, бо імперія не терпить існування
    повноцінної національної культури у своїй колонії. [!decolonization]'
  - 'Західний наратив: Курбас — ключова, хоч і маловідома на Заході, фігура європейського театрального авангарду 1920-х, на
    рівні з Арто, Брехтом, Мейєрхольдом. Його трагедія — класичний приклад зіткнення мистецького модернізму з тоталітаризмом,
    де радянський проєкт пожирав власних революціонерів.'
  - '[!myth-buster] Поширена теза, що Курбаса знищили виключно за «український націоналізм», спрощує ситуацію. Авангардне
    мистецтво як таке було несумісне зі сталінською доктриною соцреалізму, і схожі процеси відбувалися по всьому СРСР.'
  section: 'Зіткнення наративів: Справа Курбаса'
  words: 1700
- points:
  - 'Close reading: Аналіз статті з радянської газети 1933 року з вимогою «покінчити з курбасівщиною». Аналіз лексики («формалізм»,
    «відрив від мас», «націоналістичні ухили»), риторичних прийомів та логіки звинувачень. Хто автор? Яка його мета? Як текст
    конструює образ ворога?'
  - 'Close reading: Аналіз фрагменту з монографії українського історика театру 1990-х років. Які джерела він використовує
    (архіви КДБ, спогади, рецензії)? Як він реабілітує Курбаса? Які аспекти його творчості підкреслює, а які замовчує?'
  - '[!epistemic-humility] Порівняння двох текстів. Як той самий факт (наприклад, постановка «Народного Малахія») подається
    у двох джерелах? Студент вчиться бачити не «об''єктивну реальність», а її текстову репрезентацію, залежну від мети та
    позиції автора.'
  section: 'Джерельна критика: Читаючи звинувачення'
  words: 1500
- points:
  - 'Повернення до розминки: Студент тепер може не просто ідентифікувати джерела, але й пояснити, які історіографічні та політичні
    наративи за ними стоять, використовуючи апарат, засвоєний у модулі.'
  - 'Мета-рефлексія: Чому історія театрального режисера, що жив 100 років тому, досі викликає такі гострі дебати? Що «справа
    Курбаса» говорить нам про стосунки мистецтва та влади?'
  - '[!decolonization] Зв''язок із сьогоденням: Як наративні техніки, використані для знищення Курбаса, застосовуються в сучасній
    російській пропаганді проти української культури? Наведіть приклади.'
  section: Дискусія та підсумок
  words: 700
focus: Les Kurbas's 'Berezil' theater as a case study in avant-garde aesthetics, Soviet cultural policy, and the weaponization
  of 'formalism' against artistic innovation. Compares Ukrainian, Soviet, and Western historiographical takes on Kurbas's
  legacy.
level: ISTORIO
module: istorio-055
objectives:
- Аналізувати різні історіографічні наративи (радянський, український, західний) про постать Леся Курбаса та театр «Березіль».
- Критично оцінювати первинні джерела, зокрема радянську пропагандистську критику, виявляючи їхню мету та риторичні стратегії.
- Застосовувати поняття «формалізм», «конструктивізм», «умовний театр» для аналізу театральних явищ.
- Формулювати аргументовану позицію щодо взаємовідносин мистецтва та тоталітарної влади на прикладі «справи Курбаса».
