objectives:
- Аналізувати причини, методи та наслідки Помаранчевої революції та Революції гідності, пояснюючи відмінності в їхніх траєкторіях
- Виявляти та порівнювати ключові елементи українського, західного та російського наративів щодо сучасних українських революцій
- Застосовувати методи джерельної критики до аналізу особистих свідчень (блогів, репортажів), розрізняючи емоційний досвід
  та історичний факт
- Формулювати аргументовану позицію щодо ролі еліт, громадянського суспільства та зовнішніх факторів у (не)успіху суспільних
  трансформацій
