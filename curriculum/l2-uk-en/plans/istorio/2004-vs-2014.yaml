content_outline:
- points:
  - 'Провокація: Вам дано дві цитати про протести в Києві. Одна — про «свято свободи», інша — про «ціну, сплачену кров''ю».
    Яка з них про 2004, а яка про 2014 рік? Поясніть свою логіку.'
  - 'Теза для роздумів: «У 2004 році українці перемогли владу, а в 2014 — перемогли державу». Чи згодні ви? Чому ця фраза
    може бути як правдивою, так і маніпулятивною?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чому «провалилася» Помаранчева революція? Позиція А (провал еліт): особистий конфлікт Ющенка і Тимошенко та
    корупція зруйнували довіру. Позиція Б (структурні чинники): незрілість громадянського суспільства та потужний олігархічний
    консенсус не дозволили провести системні зміни.'
  - 'Дебат 2: Чи був Євромайдан неминучим наслідком Помаранчевої революції? Позиція А (так, це продовження): 2014 — це виправлення
    помилок 2004, завершення незавершеної справи. Позиція Б (ні, це новий феномен): цілі, методи та ціна Революції гідності
    були настільки іншими, що це якісно новий етап, не пов''язаний з 2004.'
  - '[!epistemic-humility] Обидві позиції в кожному дебаті мають сильні аргументи. Завдання історика — не обрати «правильну»,
    а зрозуміти логіку кожної.'
  section: 'Конфліктна карта: Поразка 2004 чи відкладена перемога?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Обидві події — це «кольорові революції», інспіровані та профінансовані Заходом
    (США) з метою відірвати Україну від «русского мира». 2004 — «м''який» державний переворот, 2014 — «жорсткий» фашистський
    путч. Методологія: конспірологія, вибіркові факти, ігнорування внутрішніх причин. Агенда: делегітимізація української
    державності та будь-якого протесту проти проросійської влади.'
  - 'Український національний наратив: 2004 — ненасильницьке повстання проти фальсифікацій та спроби встановити авторитарний
    режим, що закінчилося розчаруванням через зраду еліт. 2014 — національно-визвольна революція проти спроби остаточної колонізації
    Росією, що переросла у війну за незалежність. Методологія: акцент на свідченнях учасників, ролі громадянського суспільства,
    національних символах. Агенда: утвердження суб''єктності українського народу та його європейського вибору.'
  - 'Західний академічний наратив: Розглядає революції в рамках парадигми «демократичних транзитів». 2004 — класичний приклад
    успішного громадянського протесту, що призвів до демократичних виборів. 2014 — складніший випадок, де громадянський протест
    перетнувся з геополітичним конфліктом, насильством та зовнішньою агресією. Методологія: порівняльний аналіз з іншими пострадянськими
    країнами, соціологічні дані, аналіз інститутів. Агенда: зрозуміти динаміку демократизації та роль зовнішніх акторів.'
  - '[!decolonization] Порівняння наративів викриває, як Росія використовує імперську оптику, заперечуючи агентність України,
    тоді як український наратив її утверджує.'
  - '[!myth-buster] Міф про «повністю мирну» Помаранчеву революцію — були зіткнення та блокування, хоча й без жертв. Міф про
    «антиросійський» характер 2004 — тоді вимоги були переважно внутрішніми.'
  section: 'Зіткнення наративів: Дві українські революції'
  words: 1700
- points:
  - 'Джерело 1: Аналіз щоденникових записів або блогу учасника Помаранчевої революції (2004). Фокус на лексиці: «свято», «надія»,
    «мирний», «креатив». Який образ протесту створює автор? Які його очікування?'
  - 'Джерело 2: Аналіз постів у Facebook або репортажів журналіста з Євромайдану (січень-лютий 2014). Фокус на лексиці: «барикади»,
    «щити», «кров», «боротьба», «жертва». Як змінився тон і ставки порівняно з 2004 роком?'
  - 'Порівняльний аналіз: Як обидва джерела відображають роль лідерів, організаційну структуру та рівень насильства? Які висновки
    можна зробити про еволюцію українського протесту, читаючи ці тексти як історик?'
  - '[!epistemic-humility] Важливо розрізняти особистий досвід автора (емоційний, фрагментарний) та загальну картину подій.
    Джерело не є «правдою», а лише її частиною.'
  section: 'Джерельна критика: Голоси Майданів'
  words: 1500
- points:
  - 'Повернення до розминки: Чи змінилася ваша первинна відповідь? Як розуміння різних наративів та аналіз джерел дозволяє
    глибше інтерпретувати дві цитати?'
  - 'Мета-рефлексія: Чому 2014 рік приніс тривалі, хоч і трагічні, зміни, а 2004 — ні? Сформулюйте відповідь, використовуючи
    поняття «ціна свободи», «громадянське суспільство», «зовнішній фактор», «системні зміни».'
  - 'Зв''язок із сьогоденням: Як російська пропаганда сьогодні використовує наратив про «Майдан» для дискредитації будь-яких
    протестів у світі? Чому для України досвід обох революцій є джерелом стійкості у війні?'
  - '[!decolonization] Усвідомлення того, що 2014 рік був не просто протестом, а актом деколонізації (остаточним розривом
    з імперією), є ключовим для розуміння подальшої війни.'
  section: Дискусія та підсумок
  words: 700
