content_outline:
- points:
  - 'Провокація: Лідер Росії заявляє про намір «денацифікувати» Україну. Водночас президентом України є людина з єврейським
    корінням, чия родина постраждала від Голокосту. Як ці два факти можуть існувати одночасно?'
  - 'Цитата для роздумів: "Я президент України. Я народився тут, мої батьки народилися тут, і мої дідусі та бабусі народилися
    тут." — В. Зеленський. Що ця заява говорить про сучасну українську ідентичність?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історична пам''ять про Бабин Яр. Змагання проєктів меморіалу — державний український vs. приватний міжнародний
    (з початковою участю російських олігархів). Чия версія історії має бути увічнена?'
  - 'Дебат 2: Українсько-єврейські відносини — історія примирення чи вічного конфлікту? Радянська/російська історіографія
    акцентує на погромах та колабораціонізмі. Сучасна українська — на тривалому співіснуванні та спільній боротьбі проти імперій.'
  - '[!epistemic-humility] Обидві сторони дебату про меморіал звинувачували одна одну в політизації пам''яті. Як відрізнити
    щире вшанування від інструменталізації трагедії?'
  section: 'Конфліктна карта: Політика пам''яті'
  words: 900
- points:
  - 'Російський імперський наратив: Україна — «штучна держава», де панує неонацизм. Мета — виправдати агресію. Методологія:
    вибіркове цитування, маніпуляція фактами про УПА, ігнорування результатів виборів. Агенда: відновлення імперського контролю.'
  - 'Український наратив: Сучасна Україна — багатонаціональна політична нація. Обрання Зеленського — доказ відсутності антисемітизму
    на державному рівні. Методологія: апеляція до демократичних виборів, особистої історії президента, заяв лідерів єврейської
    громади. Агенда: утвердження суверенітету та європейської ідентичності.'
  - 'Західний наратив: Російські звинувачення абсурдні та є лише приводом до війни. Методологія: аналіз фактів, інтерв''ю
    з експертами, порівняння з реальною ситуацією. Агенда: підтримка міжнародного права, засудження агресії. Сліпі плями:
    недостатнє розуміння глибини українсько-російського конфлікту до 2022 року.'
  - '[!decolonization] Російський наратив про «нацизм» є класичним прикладом імперської тактики: звинуватити колонізований
    народ у гріхах самої імперії, щоб виправдати насильство.'
  - '[!myth-buster] Твердження, що «в Україні немає нацизму», є спрощенням. Як і в будь-якій країні, тут існують ультраправі
    групи, але вони є маргінальними і не мають політичного впливу, що доведено результатами виборів.'
  section: 'Зіткнення наративів: «Денацифікація» України'
  words: 1700
- points:
  - 'Аналіз промови Зеленського (напр., перед Кнессетом або Конгресом США): хто автор, яка аудиторія, яка мета (мобілізація
    підтримки)? Розбір риторики: використання історичних аналогій, особистих історій, емоційних звернень.'
  - 'Аналіз промови Путіна про оголошення «СВО»: хто є цільовою аудиторією (внутрішня російська)? Які псевдоісторичні «докази»
    наводяться? Виявлення технік пропаганди: дегуманізація, теорії змови, створення образу ворога.'
  - '[!epistemic-humility] Порівняння джерел, до яких апелюють обидва лідери. Чому вони обирають саме ці факти? Які архіви
    їм доступні? Хто фінансує їхніх історичних консультантів?'
  - 'Кейс-стаді: Аналіз того, як обидві сторони використовують термін «Голокост» — Зеленський як родинну трагедію та аргумент
    проти геноциду, Путін — як інструмент для звинувачення опонентів у нацизмі.'
  section: 'Джерельна критика: Промова Зеленського vs. промова Путіна'
  words: 1500
- points:
  - 'Повернення до розминки: Студент тепер може дати розгорнуту відповідь, пояснюючи, як російська пропаганда створює фальшиву
    реальність, і як постать Зеленського руйнує цей наратив.'
  - 'Мета-рефлексія: Чого цей модуль вчить про те, як історія стає зброєю в сучасних конфліктах? Як відрізнити історичний
    аналіз від політичної маніпуляції?'
  - '[!decolonization] Чи є обрання Зеленського остаточним кінцем «єврейсько-українського питання» в тому вигляді, в якому
    його формулювала імперська та радянська пропаганда? Яким є майбутнє єврейської громади у незалежній, європейській Україні?'
  section: Дискусія та підсумок
  words: 700
focus: Volodymyr Zelensky's presidency as a turning point in Ukrainian-Jewish relations and a counter-narrative to Russian
  propaganda about "denazification".
