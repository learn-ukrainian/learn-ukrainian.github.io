objectives:
- Аналізувати, як обрання президента з єврейським корінням стало інструментом у зіткненні наративів між Україною та Росією
- Застосовувати методи джерельної критики до аналізу політичних промов та пропагандистських матеріалів
- Порівнювати різні історіографічні підходи до українсько-єврейських відносин (радянський, сучасний український, західний)
- Оцінювати роль політики пам’яті на прикладі меморіалізації Бабиного Яру та її використання в сучасних конфліктах
