content_outline:
- points:
  - 'Провокація: Радянський звіт 1933 року показує рекордний експорт зерна до Європи. Лист селянина з Полтавщини 1933 року
    описує канібалізм. Як ці два документи можуть існувати одночасно?'
  - '[!myth-buster] Голод був не наслідком неврожаю, а результатом свідомої політики.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Економічна раціональність Сталіна. Чи був Голодомор цинічним, але "раціональним" інструментом для фінансування
    індустріалізації, чи актом цілеспрямованого знищення?'
  - 'Дебат 2: «Закон про п''ять колосків» — це захід для захисту "соціалістичної власності" чи юридичне прикриття для тотальної
    конфіскації продовольства?'
  - '[!epistemic-humility] Позиція "некомпетентності": деякі західні історики (до відкриття архівів) припускали, що голод
    був наслідком хаотичного та погано керованого планування, а не злого умислу.'
  section: 'Конфліктна карта: Геноцид чи «трагічна помилка»?'
  words: 900
- points:
  - '1. Радянський наратив («Перегини на місцях»): Голод — результат опору «куркулів» колективізації та саботажу. Хлібозаготівлі
    були необхідні для годування міст та армії. Масштаб трагедії приховувався або применшувався.'
  - '2. Український наратив (Геноцид): Голод — свідомо організована економічна зброя для придушення українського національно-визвольного
    руху та фізичного знищення українського селянства. Конфіскація, «чорні дошки», блокада — докази умислу.'
  - '3. Західний наратив (Еволюція поглядів): від «трагедії колективізації» (Роберт Конквест) до визнання геноциду (Тімоті
    Снайдер). Аналіз економічних даних: порівняння експорту зерна та масштабів смертності.'
  - '[!decolonization] Викриття радянської термінології: «куркуль», «хлібозаготівлі», «ворог народу» — як мова використовувалася
    для дегуманізації жертв та виправдання терору.'
  - '[!myth-buster] Міф про те, що зерно йшло виключно на закупівлю західного обладнання. Аналіз, що показує експорт для скидання
    цін на світовому ринку та політичного тиску.'
  section: 'Зіткнення наративів: Економіка Голодомору'
  words: 1700
- points:
  - 'Критичний розбір Постанови РНК УСРР «Про заходи по посиленню хлібозаготівель». Аналіз мови документа: що означають терміни
    «безумовне виконання», «застосування репресій».'
  - 'Порівняння двох документів: звіт про виконання плану експорту зерна з Одеського порту та доповідна записка місцевого
    ГПУ про «продовольчі труднощі» в сусідніх селах.'
  - '[!epistemic-humility] Як історик може перевірити достовірність радянської статистики? Проблема сфальсифікованих звітів
    та "потьомкінських сіл" для іноземних журналістів.'
  - 'Авторство та наміри: хто писав ці документи і для кого? Аналіз мотивації авторів: страх, ідеологія, кар''єризм.'
  section: 'Джерельна критика: Накази про конфіскацію та звіти про експорт'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви пояснюєте співіснування рекордного експорту та масового голоду? Які наративи це створює?'
  - 'Мета-рефлексія: Чому економічний аналіз є ключовим для розуміння Голодомору як геноциду, а не просто трагедії?'
  - '[!decolonization] Сучасні паралелі: як Росія сьогодні використовує енергетику та продовольство (блокада українських портів)
    як економічну зброю? Які наративи вона для цього створює?'
  section: Дискусія та підсумок
  words: 700
focus: 'Історіографічна дискусія про економічні мотиви Голодомору: порівняння радянського наративу про «індустріалізацію»
  з українським наративом про «геноцид» та західними поглядами на «політичний провал». Джерельна критика даних про експорт
  зерна та наказів про конфіскацію.'
level: ISTORIO
module: istorio-105
objectives:
- Аналізувати економічні механізми Голодомору (конфіскації, «чорні дошки», експорт зерна) як інструменти геноциду
- Порівнювати та критично оцінювати радянський, український та західний історіографічні наративи щодо економічних причин Голодомору
- Застосовувати методи джерельної критики до первинних документів епохи (постанови, звіти, листи)
- Виявляти та деконструювати маніпулятивну термінологію, що використовувалася для виправдання економічного терору
pedagogy: CBI
