vocabulary_hints:
- definition: Використання економічних важелів (торгівля, ресурси) для досягнення політичних цілей, аж до фізичного знищення
    супротивника.
  pos: ж.
  word: економічна зброя
- definition: Примусове безоплатне вилучення майна, продовольства та засобів до існування як каральний захід.
  pos: ж.
  word: конфіскація
- definition: Статус села чи району, який не виконав план хлібозаготівель, що означало повну продовольчу блокаду та приречення
    на голодну смерть.
  pos: мн.
  word: «чорні дошки»
- definition: Марксистський термін, що описує експлуатацію однієї соціальної групи (селян) іншою (пролетаріатом/державою)
    всередині однієї країни, аналогічно до експлуатації заморських колоній.
  pos: ж.
  word: «внутрішня колонія»
- definition: Евфемізм для позначення примусових реквізицій зерна у селян, що часто перевищували реальний врожай.
  pos: мн.
  word: хлібозаготівлі
- definition: Примусове вилучення державою майна у власника з наступною компенсацією або без неї.
  pos: ж.
  word: реквізиція
- definition: Процес фізичного та культурного знищення селянства як класу та носія традиційної ідентичності.
  pos: ж.
  word: деселянізація
- definition: Дії, спрямовані на повне або часткове знищення національної, етнічної, расової чи релігійної групи.
  pos: ч.
  word: геноцид
- definition: Процес створення великого машинного виробництва, який в СРСР фінансувався за рахунок пограбування селянства.
  pos: ж.
  word: індустріалізація
