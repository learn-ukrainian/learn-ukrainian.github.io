content_outline:
- points:
  - 'Провокація: Історія українських революцій ХХ століття — це історія чоловіків: Петлюри, Бандери, Чорновола. Назвіть трьох
    жінок-лідерок визвольних змагань 1917-1921 рр. Чому це питання таке складне?'
  - 'Цитата-загадка: "Вони готували їжу, прали білизну та надихали воїнів". З якого джерела ця цитата про жінок на Майдані
    — з російської пропаганди чи з українського підручника історії? Поясніть свою думку.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історіографічна неуважність vs. Патріархальне витіснення. Жінок "забувають", бо історики-чоловіки традиційно
    фокусуються на "великій політиці" та війні, чи їх активно викреслюють, бо жіноча агентність загрожує патріархальному наративу
    нації?'
  - 'Дебат 2: Роль жінок у 1917-1921 рр. — "берегині тилу" чи повноцінні комбатантки? Порівняння офіційних звітів УНР, де
    згадуються лише медсестри, з уривками щоденників, де жінки описують свою участь у боях.'
  - '[!epistemic-humility] Чи можемо ми взагалі відновити "справжню" роль жінок, якщо більшість джерел створено чоловіками?'
  section: 'Конфліктна карта: Чому жінки зникають з історії?'
  words: 900
- points:
  - 'Російський імперський наратив: Майдан — це хаос і розгул "фашистів". Жінки в цьому наративі або відсутні, або представлені
    як пасивні жертви ("бідні жінки, що страждають від націоналістів") чи як аморальні учасниці ("польові дружини"). Мета:
    дегуманізувати протест, позбавити жінок агентності.'
  - 'Український наратив (в еволюції): Початковий наратив фокусувався на чоловіках-героях ("Небесна Сотня"). Поступово відбулося
    визнання "жіночого обличчя" Майдану: волонтерки, медикині, "Жіноча сотня". Сліпа пляма: фокус на символічних ролях (берегиня,
    мати) замість аналізу політичного лідерства.'
  - 'Західний наратив: Спроба вписати українських жінок у знайомі рамки західного фемінізму. Фокус на яскравих, але не завжди
    репрезентативних явищах (напр., Femen). Часто ігнорується специфічний український контекст та унікальна роль волонтерського
    руху, організованого переважно жінками.'
  - '[!decolonization] Розвінчання міфу про "жінок, що надихають": аналіз того, як компліментарні, на перший погляд, описи
    насправді позбавляють жінок суб''єктності та закріплюють другорядні ролі.'
  section: 'Зіткнення наративів: Жінки на Майдані (2014)'
  words: 1700
- points:
  - 'Джерело 1: Уривок з класичної праці історика-емігранта про Українську революцію (1950-ті рр.). Аналіз синтаксису: хто
    є суб''єктом дії? "Армія УНР", "уряд", "Центральна Рада" — всі граматично чоловічого роду. Жінки з''являються лише в пасивних
    конструкціях ("жертви терору").'
  - 'Джерело 2: Уривок з монографії сучасної української дослідниці гендерної історії (напр., Оксана Кісь). Методологія: використання
    его-документів (щоденники, листи), усної історії для відновлення жіночих голосів. Порівняння висновків, зроблених на основі
    різних типів джерел.'
  - '[!epistemic-humility] Автор, інституція, фінансування: як бекграунд історика впливає на його здатність "бачити" чи "не
    бачити" жінок в історії? Чи може історик-чоловік адекватно написати жіночу історію?'
  section: 'Джерельна критика: Як пишуть історію без жінок'
  words: 1500
- points:
  - 'Повернення до розминки: Чому ми не знаємо жінок-революціонерок? Тепер студент може дати комплексну відповідь, посилаючись
    на проблеми джерел, історіографічну традицію та патріархальну природу національного міфу.'
  - 'Мета-рефлексія: Цей модуль не стільки про те, ЩО робили жінки, скільки про те, ЯК їхню історію роблять невидимою і ЯК
    її можна повернути. Історія — це не те, що було, а те, що ми про це знаємо і розповідаємо.'
  - '[!decolonization] Зв''язок із сьогоденням: Повномасштабне вторгнення 2022 року зробило жінок у ЗСУ та волонтерському
    русі надзвичайно видимими. Чи є це стійкою зміною наративу, чи після перемоги знову відбудеться "повернення героїв" і
    "забуття героїнь"?'
  section: Дискусія та підсумок
  words: 700
focus: The invisibility of women in the historiography of Ukrainian revolutions (1917, 1990, 2014, 2022), recovering female
  agency, and comparing traditional vs. feminist historical methods.
level: ISTORIO
module: istorio-130
objectives:
- Аналізувати причини та механізми виключення жінок з історичних наративів про українські революції
- Застосовувати методи джерельної критики для виявлення гендерних упереджень в історичних текстах
- Порівнювати різні історіографічні наративи (традиційний, радянський/імперський, феміністичний) щодо ролі жінок у ключових
  подіях
- Критично оцінювати зміни у видимості жінок у контексті повномасштабного вторгнення 2022 року
