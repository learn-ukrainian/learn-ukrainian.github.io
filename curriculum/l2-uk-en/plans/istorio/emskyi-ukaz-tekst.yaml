objectives:
- Аналізувати текст Емського указу як історичне джерело, розрізняючи його юридичний, політичний та ідеологічний виміри
- Порівнювати та критично оцінювати російський імперський, український національний та західний науковий наративи щодо причин
  та наслідків указу
- Застосовувати методи джерельної критики для аналізу офіційних документів та полемічних текстів
- Формулювати аргументовану позицію щодо парадоксальних наслідків репресивної політики та її зв'язку з сучасними подіями
