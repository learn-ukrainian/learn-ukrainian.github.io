content_outline:
- points:
  - 'Провокація: 1863 року Валуєвський циркуляр заявив, що української мови «не было, нет и быть не может». 1876 року Емський
    указ заборонив її тотально. Який із цих документів є більшою катастрофою, а який — більшим компліментом українському рухові?'
  - 'Цитата для роздумів: «Мета указу — не просто придушити, а й профілактично унеможливити саме існування української ідентичності
    поза фольклорно-етнографічними межами». Чия це оцінка — сучасного історика чи сучасника указу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був український рух 1870-х реальною загрозою для імперії? Позиція імперії: «польська інтрига» та «австрійська
    пропаганда» використовують «малоросійське наріччя» для сепаратизму. Позиція українців: культурний рух (громади, недільні
    школи) був природним етапом національного розвитку, а не політичним проектом.'
  - 'Дебат 2: Чи був Емський указ логічним продовженням Валуєвського циркуляра? Позиція 1: Так, це ескалація тієї ж політики
    лінгвоциду. Позиція 2: Ні, це якісний стрибок від обмеження друку до тотальної заборони публічної присутності мови (театр,
    музика, освіта), що свідчить про паніку режиму.'
  - '[!epistemic-humility] Аналіз звіту спеціальної комісії, що передував указу. Як добирались «докази» загрози і як ігнорувались
    альтернативні думки?'
  section: 'Конфліктна карта: Причина чи привід?'
  words: 900
- points:
  - 'Російський імперський наратив: Указ — це «охоронний захід». Захист «простого малоросійського народу» від «шкідливих»
    ідей, що поширюються штучною, політизованою мовою, створеною ворогами Росії. Мета: зберегти «загальноруську єдність».
    Методологія: поліцейські доноси, цензурні звіти. Порядок денний: асиміляція, централізація імперії.'
  - 'Український наратив (Драгоманов, Франко): Указ — це акт лінгвоциду та етноциду, спроба зупинити історію. Мета: довести
    життєздатність мови та культури попри заборону. Методологія: підпільний друк, контрабанда літератури з Галичини, створення
    наукових інституцій в еміграції (НТШ у Львові, кафедра Грушевського). Порядок денний: виживання нації, перетворення «етнографічного
    матеріалу» на модерну націю.'
  - '[!decolonization] Західний наратив (сучасні історики): Указ як типовий приклад реакції імперії XIX ст. на виклик модерного
    націоналізму. Порівняння з політикою Пруссії щодо польської мови або Угорщини щодо словацької. Сліпа пляма імперського
    наративу: він не може пояснити, чому «неіснуюча» мова потребує таких драконівських заборон. Сліпа пляма раннього українського
    наративу: ідеалізація «народу», недооцінка внутрішніх соціальних конфліктів.'
  - '[!myth-buster] Міф: указ повністю зупинив українське життя. Реальність: він стимулював перенесення культурного центру
    до Галичини, що парадоксально прискорило інтелектуальний розвиток і політизацію українства.'
  section: 'Зіткнення наративів: Заборона мови'
  words: 1700
- points:
  - 'Джерело 1: Повний текст Емського указу. Аналіз мови документа: бюрократичний, безпристрасний тон для опису репресивних
    заходів. Чому заборонено не лише друк, а й театральні вистави, ноти з українськими текстами, і навіть ввезення книг? Що
    це говорить про страхи імперської влади?'
  - 'Ключовий пункт указу: закриття Київського відділу Імператорського російського географічного товариства. Чому наукова
    установа стала головною мішенню? Аналіз списку публікацій та діяльності товариства (Чубинський, Антонович).'
  - 'Джерело 2: Фрагмент з брошури Михайла Драгоманова «La littérature oukrainienne proscrite par le gouvernement russe» (1878),
    представленої на Літературному конгресі в Парижі. Аналіз риторики: як Драгоманов пояснює суть заборони європейській аудиторії?
    Які аргументи він використовує (право на освіту, природний розвиток мови)?'
  - '[!epistemic-humility] Порівняння двох джерел: указ говорить про «сепаратистські тенденції», Драгоманов — про «право на
    існування». Як обидва документи, будучи суб''єктивними, розкривають об''єктивну реальність конфлікту?'
  section: 'Джерельна критика: Текст указу та відповідь на нього'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, Валуєвський циркуляр чи Емський указ? Який із них був небезпечнішим, і чому відповідь на
    це питання не є очевидною?'
  - 'Мета-рефлексія: Емський указ мав на меті знищити український рух, але натомість виштовхнув його за кордон і радилізував.
    Які уроки можна винести про ефективність (чи неефективність) тотальних заборон у боротьбі з національними рухами?'
  - '[!decolonization] Зв''язок із сьогоденням: Як логіка Емського указу (заперечення існування мови/народу, оголошення культури
    «політичним проектом ворога», заборона освіти рідною мовою) відтворюється в діях Росії на окупованих територіях України
    у XXI столітті?'
  section: Дискусія та підсумок
  words: 700
