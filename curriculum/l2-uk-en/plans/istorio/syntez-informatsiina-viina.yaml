objectives:
- Аналізувати еволюцію російських антиукраїнських наративів від імперського періоду до сучасності.
- Застосовувати методику джерельної критики для деконструкції пропагандистських текстів.
- Порівнювати український, російський та західний підходи до висвітлення російсько-української війни.
- Формулювати обґрунтовану позицію щодо ролі інформації та медіаграмотності у сучасних конфліктах.
