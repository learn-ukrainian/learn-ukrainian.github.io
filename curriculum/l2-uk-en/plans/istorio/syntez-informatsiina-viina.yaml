content_outline:
- points:
  - 'Провокація: Два описи перших днів вторгнення 2022 року — один з російського, один з українського джерела. Без маркування.
    Студент має визначити, де чий, і обґрунтувати свою думку.'
  - 'Цитата для роздумів: "Війна — це коли люди, що не знають одне одного, вбивають одне одного заради інтересів людей, що
    знають одне одного, але не вбивають одне одного". Чи справедливе це твердження для інформаційної війни?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи може пропаганда бути ефективною без "зерна правди"? Радянська школа (тотальна брехня) vs сучасна російська
    (постмодерна гра з фактами).'
  - 'Дебат 2: Чи є "об''єктивність" можливою при висвітленні війни? Український наратив (боротьба за існування) vs західний
    ідеал "нейтральності" (bothsidesism) — де проходить межа?'
  - '[!epistemic-humility] Розгляд тези, що в інформаційній війні перемагає не той, хто каже правду, а той, чия історія простіша
    і емоційніша.'
  section: 'Конфліктна карта: Правда vs Постправда'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Малоросія", "триєдиний народ", "штучна держава, створена Леніним", "фашистська
    хунта". Аналіз методології: вибіркове цитування, історичні маніпуляції, емоційний шантаж. Агенда: виправдання агресії,
    заперечення суб''єктності України.'
  - 'Український наратив: історія безперервного державотворення, спадковість від Русі, визвольні рухи, 300 років опору. Джерела:
    державні архіви, західні історики, дисидентські праці. Агенда: утвердження національної ідентичності, мобілізація суспільства.'
  - 'Західний наратив: коливання від "сфери впливу Росії" та "пострадянського простору" до розуміння України як самостійного
    гравця. Вплив академічних шкіл (славістика vs україністика). Агенда: підтримка міжнародного права, стримування імперіалізму,
    страх перед ескалацією.'
  - '[!decolonization] Розбір, як російський наратив використовує колоніальні тропи (менший брат, неспроможна держава) для
    делегітимізації України.'
  - '[!myth-buster] Руйнування міфу про "вічну дружбу народів" та "громадянську війну".'
  section: 'Зіткнення наративів: заперечення української державності'
  words: 1700
- points:
  - 'Джерело 1: Стаття В. Путіна "Про історичну єдність росіян та українців" (липень 2021). Аналіз: хто автор, цільова аудиторія,
    ключові тези, використані джерела, риторичні прийоми. Яка мета статті?'
  - 'Джерело 2: Звернення В. Зеленського до народу Росії 23 лютого 2022 року. Аналіз: хто автор, аудиторія, ключові тези,
    риторичні прийоми. Чому ця промова вважається зразком комунікації?'
  - 'Порівняльний аналіз: Як обидва тексти апелюють до історії? Як конструюють образ "свого" та "чужого"? Які цінності пропонують?'
  - '[!epistemic-humility] Вивчення того, як одні й ті самі історичні події (Хрещення Русі, Переяславська рада) інтерпретуються
    діаметрально протилежно.'
  section: 'Джерельна критика: Стаття Путіна vs промова Зеленського'
  words: 1500
- points:
  - 'Повернення до розминки: аналіз двох описів вторгнення з використанням набутих знань про пропаганду та наративи.'
  - 'Майбутнє інформаційної війни: Як технології штучного інтелекту (deepfakes, генерація тексту) змінюють поле бою? Які нові
    загрози та можливості вони створюють?'
  - 'Мета-рефлексія: Чи може правда перемогти пропаганду в епоху постправди? Яка роль освіти та медіаграмотності в індивідуальному
    та національному спротиві?'
  - '[!decolonization] Як побудова власного сильного наративу є інструментом деколонізації та утвердження суб''єктності.'
  section: Дискусія та підсумок
  words: 700
focus: 'Information warfare as a key battleground: evolution of Russian anti-Ukrainian propaganda (imperial, Soviet, modern),
