content_outline:
- points:
  - 'Провокація: Чому першу успішну українську революцію XX століття називають «забутою»? І хто виграв від цього забуття?'
  - '[!decolonization] Цитата з радянської газети 1990 року, що називає студентів «екстремістами, якими маніпулюють західні
    спецслужби». Студент має спрогнозувати, чим закінчився протест.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Революція чи «керований протест»? Позиція 1: Спонтанний вияв студентської волі. Позиція 2: Протест був таємно
    підтриманий частиною комуністичної номенклатури (Кравчуком) для ослаблення консерваторів (Масола).'
  - 'Дебат 2: Чого насправді вимагали студенти? Позиція 1: Виконання 5 конкретних політичних вимог. Позиція 2: Глобальна мета
    — вихід України з СРСР, а 5 вимог — лише тактична програма-мінімум.'
  - '[!epistemic-humility] Оцінка ризиків: чи розуміли студенти, що їм загрожує повторення Тяньаньмень, чи радянська система
    була вже занадто слабкою для такого сценарію?'
  section: 'Конфліктна карта: Студентський бунт чи національне пробудження?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Дрібний інцидент», «невеликий гурт націоналістично налаштованої молоді»,
    «провокація», що була вирішена «мудрим компромісом» влади. Наслідки (відставка Масола) применшуються.'
  - 'Український наратив: «Перша перемога над системою», «пробудження нації», «акт ненасильницького спротиву», що довів силу
    громадянського суспільства. Голодування та 5 вимог — центральні події.'
  - 'Західний наратив: Розглядається як один із багатьох «національних рухів» на уламках СРСР. Часто недооцінюється його унікальність
    та значення як прецеденту для майбутніх Майданів. Порівнюється з протестами в країнах Балтії чи Грузії.'
  - '[!decolonization] Викриття радянської тактики: показати, як офіційна преса ігнорувала, а потім дискредитувала протест,
    і як це стало шаблоном для російської пропаганди на десятиліття вперед.'
  - '[!myth-buster] Це не був протест виключно студентів із Західної України. Ядром були київські та львівські студенти, але
    учасники були з усієї України.'
  section: 'Зіткнення наративів: Голодування на площі Жовтневої революції'
  words: 1700
- points:
  - 'Джерело 1: Фрагменти з мемуарів учасників голодування (напр., Олеся Донія, Олега Баркова). Аналіз мови, емоцій, особистих
    мотивацій. Як вони описують страх, надію, солідарність?'
  - 'Джерело 2: Статті з газети «Правда Украины» за жовтень 1990 року. Аналіз лексики («екстремісти», «хуліганські елементи»),
    маніпулятивних прийомів, замовчування масштабів протесту.'
  - '[!epistemic-humility] Порівняння «фактів»: як обидва джерела описують одну й ту саму подію (напр., перекриття руху, сутички
    з міліцією). Де розбіжності? Чому?'
  - Хто говорить, а хто мовчить? Аналіз того, чиї голоси представлені, а чиї відсутні в кожному типі джерел.
  section: 'Джерельна критика: Спогади учасників vs. Радянська преса'
  words: 1500
- points:
  - 'Повернення до розминки: Чому революцію «забули»? Можлива відповідь: її успіх був незручний як для старих комуністів,
    так і для нових «націонал-демократів», які швидко перехопили ініціативу.'
  - 'Модель для майбутнього: Як досвід, тактики та символи Революції на граніті були використані у Помаранчевій революції
    (2004) та Революції Гідності (2014)?'
  - '[!decolonization] Революція на граніті як акт деколонізації свідомості: відмова від статусу «радянської людини» та вибір
    власної політичної суб''єктності.'
  section: Дискусія та підсумок
  words: 700
focus: The 1990 student hunger strike (Revolution on Granite) as a foundational event for modern Ukrainian civil society,
  comparing Soviet, Ukrainian, and Western narratives of the protest.
level: ISTORIO
module: istorio-128
objectives:
- Аналізувати причини, перебіг та наслідки Революції на граніті
- Оцінювати історичне значення «забутої революції» в контексті українського визвольного руху кінця XX століття
- Порівнювати радянський, український та західний наративи про студентські протести 1990 року
- Застосовувати методи джерельної критики до аналізу мемуарів та медіа-повідомлень того часу
