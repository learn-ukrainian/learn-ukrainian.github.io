objectives:
- Аналізувати структуру та інструменти української системи протидії дезінформації.
- Розрізняти методи та цілі російської пропаганди та українських контрнаративів.
- Критично оцінювати етичні межі та ризики інформаційної боротьби.
- Застосовувати навички джерельної критики до сучасних медіа-повідомлень та фактчекінгових матеріалів.
