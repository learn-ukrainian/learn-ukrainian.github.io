content_outline:
- points:
  - 'Провокація: Вам представлено два короткі повідомлення про одну й ту саму подію на фронті. Одне — російський пропагандистський
    звіт, інше — зведення Генштабу ЗСУ. Не знаючи джерела, чи можете ви визначити, де чиє, і на основі яких мовних маркерів?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Пропаганда vs. контрнаратив — де проходить межа? Чи може держава, що захищається, використовувати методи, які
    вона засуджує в агресора, і не втратити довіру?'
  - 'Дебат 2: Державні інституції (ЦПД) vs. громадянське суспільство (StopFake): хто ефективніший у боротьбі з фейками? Чиє
    слово вагоміше для внутрішньої та зовнішньої аудиторії?'
  - '[!epistemic-humility] Розгляд сильних та слабких сторін обох підходів: швидкість та ресурси держави проти гнучкості та
    довіри до низових ініціатив.'
  section: 'Конфліктна карта: Ефективність та етика'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Конструювання приводів до вторгнення («нацисти», «загроза НАТО»), історичний
    ревізіонізм, тактика «whataboutism», звинувачення України у власних злочинах.'
  - 'Український наратив: Поєднання офіційної комунікації (промови Зеленського), інституційного фактчекінгу (ЦПД, UCMC), низової
    верифікації (StopFake, Texty.org.ua), культурної дипломатії («м''яка сила» через мистецтво, спорт, Євробачення).'
  - 'Західний наратив: Спектр від повної підтримки та поширення української позиції до «втоми від війни» та наративів про
    необхідність «зберегти обличчя Путіну». Роль NAFO як унікального феномену громадянської інфо-війни.'
  - '[!decolonization] Викриття механізмів, як Росія використовує колоніальні стереотипи про «неповноцінність» України для
    виправдання агресії.'
  - '[!myth-buster] Руйнування міфу про «братні народи» та «спільну історію» через аналіз дезінформаційних кампаній.'
  section: 'Зіткнення наративів: Інформаційна війна за Україну'
  words: 1700
- points:
  - 'Кейс-стаді: Детальний розбір конкретного російського фейку (наприклад, про «бойових комарів» або «брудну бомбу»).'
  - 'Текстологічний аналіз джерела фейку: стилістика, лексика, апеляція до емоцій, відсутність доказів, посилання на анонімні
    «джерела».'
  - 'Аналіз спростування від StopFake/VoxCheck: методологія перевірки, залучення експертів, пошук першоджерел, чітке маркування
    «правда/фейк». '
  - '[!epistemic-humility] Оцінка, чому спростування не завжди досягає тієї ж аудиторії, що й фейк. Психологія сприйняття
    інформації.'
  section: 'Джерельна критика: Анатомія фейку та його спростування'
  words: 1500
- points:
  - 'Повернення до розминки: Чи змінився ваш підхід до аналізу повідомлень після вивчення модуля? Які нові інструменти для
    критичного читання ви отримали?'
  - 'Стратегічне питання: Чи може Україна «виграти» інформаційну війну, маючи значно менші ресурси, ніж Росія? В чому полягає
    перемога?'
  - '[!decolonization] Як боротьба за наратив є частиною ширшого процесу деколонізації української ідентичності та історії.'
  - 'Зв''язок із сьогоденням: Аналіз актуального медійного кейсу, де стикаються російський та український наративи.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз державних (ЦПД, UCMC) та громадських (StopFake, NAFO) інструментів протидії російській дезінформації, етичні
  межі контрпропаганди та культурна дипломатія як «м'яка сила».
