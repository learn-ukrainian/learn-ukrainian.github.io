content_outline:
- points:
  - 'Провокація: Прочитайте дві цитати про Майдан. Одна — звіт західного аналітика, інша — пост українського волонтера. Не
    знаючи автора, спробуйте визначити, яка з них краще пояснює, чому мільйони людей вийшли на вулиці, і чому.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історичні корені чи сучасний феномен? Одні історики (напр., субтельні) вбачають тяглість від козацького самоврядування
    до Майдану. Інші (напр., модерністи) вважають, що сучасне громадянське суспільство — продукт пост-радянської доби, що
    не має прямого зв''язку з минулим.'
  - 'Дебат 2: Знак сили чи симптом хвороби? Чи є потужна самоорганізація ознакою зрілої нації, здатної замінити собою державу?
    Чи це, навпаки, доказ слабкості та недієздатності державних інституцій, що змушує громадян виконувати їхню роботу?'
  - '[!epistemic-humility] Обидві позиції мають сильні аргументи. Наше завдання — зрозуміти логіку кожної сторони, а не визначити
    «переможця».'
  section: 'Конфліктна карта: Сила чи слабкість?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: Українці не мають державотворчого таланту. Будь-яка самоорганізація — це або
    «анархія» (махновщина), або «змова зовнішніх ворогів» (Сорос, ЦРУ). Майдани — це інсценовані перевороти, а не народні
    повстання.'
  - 'Український національний наратив: Горизонтальні зв''язки та самоорганізація — це ключова риса української ідентичності,
    спадок козацької вольниці. Це доказ того, що суспільство є первинним, а держава — вторинним інструментом. Майдан — це
    повернення до своїх історичних джерел.'
  - 'Західний ліберальний наратив: Громадянське суспільство розглядається через призму НГО, грантів та інституційної спроможності.
    Часто не помічає неформальних мереж та історичної глибини. Сприймає українську самоорганізацію як «диво», бо вона не вписується
    у звичні моделі.'
  - '[!decolonization] Розкриття того, як імперія систематично заперечує агентність та суб''єктність колонізованого народу,
    представляючи його як об''єкт маніпуляцій.'
  - '[!myth-buster] Руйнування міфу про «братні народи» через демонстрацію абсолютно різного ставлення до дихотомії «держава-суспільство».'
  section: 'Зіткнення наративів: Природа української самоорганізації'
  words: 1700
- points:
  - 'Джерело 1: Аналітичний звіт західного аналітичного центру про «політичну кризу в Україні» у 2014 році. Аналіз мови, фокусу
    (стабільність, геополітика), упущень (голоси учасників).'
  - 'Джерело 2: Уривок зі щоденника учасника Євромайдану або збірки спогадів. Аналіз лексики (свобода, гідність), емоційного
    тону, опису самоорганізації «зсередини» (кухня, медична служба, самооборона).'
  - 'Порівняльний аналіз: Як ці два тексти описують ті самі події? Які аспекти кожен з них висвітлює, а які ігнорує? Чий погляд
    виявився точнішим для прогнозування подій після 2014 та 2022 років?'
  - '[!epistemic-humility] Жодне джерело не є абсолютно об''єктивним. Вчимося виявляти позицію автора, його оптику та мету.'
  section: 'Джерельна критика: Голоси Майдану vs. звіти ззовні'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви можете проаналізувати дві стартові цитати? Які наративні та методологічні припущення
    в них закладені?'
  - 'Мета-рефлексія: Що важливіше для виживання нації — сильна держава чи сильне суспільство? Досвід України після 2014 року
    як унікальний кейс для світової історії.'
  - '[!decolonization] Як розуміння власного громадянського суспільства допомагає протистояти сучасній російській пропаганді?'
  - 'Зв''язок із сьогоденням: Волонтерський рух, що підтримує ЗСУ, краудфандинг на армію — чи є це продовженням традицій,
    проаналізованих у модулі?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiographical debates on Ukrainian civil society: its historical roots (Cossacks vs. modern), its nature (strength
  vs. weakness), and competing narratives (Ukrainian national, Russian imperial, Western liberal) used to interpret phenomena
  from the Zaporozhian Sich to the Euromaidan and the post-2022 volunteer movement.'
