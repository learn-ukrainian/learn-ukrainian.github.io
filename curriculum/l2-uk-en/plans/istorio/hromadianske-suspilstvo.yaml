objectives:
- Розрізняти та аналізувати три основні наративи (російський, український, західний) щодо українського громадянського суспільства
- Застосовувати методи джерельної критики до аналізу сучасних історичних текстів (звіти, спогади)
- Аргументовано брати участь у дебаті про історичні корені та природу української самоорганізації
- Пояснювати, як різні історіографічні підходи (напр., модернізм vs. примордіалізм) впливають на інтерпретацію історичних
  подій
- Використовувати академічну лексику (агентність, наратив, дискурс) для аналізу соціальних та історичних явищ
