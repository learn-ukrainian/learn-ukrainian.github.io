module: istorio-068
level: ISTORIO
sequence: 68
slug: diaspora-naukovtsi
version: '3.0'
title: 'Діаспорні науковці: Збереження спадщини'
focus: history
pedagogy: seminar
word_target: 5000
objectives:
- 'Analyze the causes and consequences of діаспорні науковці: збереження спадщини'
- Evaluate the historical significance of наука в еміграції
content_outline:
- section: Вступ — Наука в еміграції
  points:
  - Чому потрібні наукові інституції
  - Науковці серед ДіПі
  - Створення альтернативного простору
  - Структура модуля
  words: 700
- section: Гарвардський український інститут (HURI)
  points:
  - Заснування — 1973
  - Омелян Пріцак — візія
  - Кафедра українознавства
  - Видання — Harvard Ukrainian Studies
  - Вплив на західну науку
  words: 700
- section: УВАН — Українська вільна академія наук
  points:
  - Заснування — 1945, Аугсбург
  - Переїзд до Нью-Йорка
  - Наукова діяльність
  - Видання і публікації
  - Збереження традиції
  words: 700
- section: НТШ в діаспорі
  points:
  - Історія — від Львова до еміграції
  - Відновлення в діаспорі
  - Наукові осередки — США, Канада, Європа
  - Енциклопедія українознавства
  words: 700
- section: Ключові постаті
  points:
  - Омелян Пріцак — орієнталіст
  - Ярослав Пеленський — політолог
  - Джон-Пол Химка — історик
  - Роман Шпорлюк — націолог
  - Оксана Забужко — письменниця-науковиця
  words: 700
- section: Спадщина для України
  points:
  - Що зберегли — бібліотеки, архіви
  - Вплив після 1991
  - Повернення знань
  - Сучасна співпраця
  words: 700
- section: Підсумок
  points:
  - Діаспора — «інтелектуальний ковчег»
  - Без діаспори — що б втратили
  - Зв'язок з незалежною Україною
  words: 800
