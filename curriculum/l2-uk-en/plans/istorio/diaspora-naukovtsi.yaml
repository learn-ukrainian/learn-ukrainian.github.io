content_outline:
- points:
  - 'Провокація: Два погляди на одну інституцію. Один текст називає її «кублом буржуазних націоналістів та агентів ЦРУ», інший
    — «інтелектуальним ковчегом нації». Не знаючи автора, визначте, де радянська пропаганда, а де — маніфест діаспори. Поясніть
    свою логіку.'
  - 'Початкова теза для обговорення: чи може наука бути повністю аполітичною, особливо в умовах бездержавності та інформаційної
    війни?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Збереження vs Інтеграція. Чи було головним завданням діаспорної науки «законсервувати» автентичну українську
    традицію (модель УВАН), чи інтегрувати українознавство у світову академічну систему (візія Пріцака для HURI)?'
  - 'Дебат 2: Наука vs Політика. Чи були діаспорні інституції в першу чергу академічними центрами, чи політичними інструментами
    для боротьби за незалежність? Аргументи «за» і «проти» обох тез.'
  - '[!epistemic-humility] Позиція 1: Це були суто політичні проєкти, що використовували академічну риторику як прикриття.
    Позиція 2: Це були суто академічні проєкти, вимушено політизовані через радянську агресію.'
  - 'Порівняльний контекст: як функціонували інші «емігрантські» академічні центри (польські, єврейські, балтійські) в той
    самий період?'
  section: 'Конфліктна карта: Ізоляція чи інтеграція?'
  words: 900
- points:
  - '1. Радянський наратив: «фальсифікатори історії». Методологія: цитування поза контекстом, звинувачення в колабораціонізмі,
    ігнорування академічних досягнень. Агенда: повна делегітимізація будь-якої непідконтрольної думки про Україну. Сліпі плями:
    нездатність пояснити високу якість деяких праць та їх вплив на Заході. [!decolonization]'
  - '2. Український (діаспорний) наратив: «інтелектуальний ковчег». Методологія: акцент на безперервності традиції (від НТШ
    у Львові до НТШ в екзилі), ідеалізація постатей засновників. Агенда: легітимізація себе як єдиних справжніх спадкоємців
    української науки. Сліпі плями: внутрішні конфлікти, фінансові труднощі, обмежений вплив на американське суспільство поза
    академією. [!myth-buster]'
  - '3. Західний наратив: «центри area studies». Методологія: інституційний аналіз, вивчення джерел фінансування, аналіз цитувань.
    Агенда: вписати українські студії в загальну історію науки часів Холодної війни. Сліпі плями: часто не враховує екзистенційну
    важливість цих інституцій для самих українців; може недооцінювати глибину ідеологічного протистояння з СРСР.'
  section: 'Зіткнення наративів: Діаспорна наука — ковчег, зрада чи ''area studies''?'
  words: 1700
- points:
  - 'Текст 1: Фрагменти зі статуту Української вільної академії наук (1945). Аналіз лексики: «збереження», «національна культура»,
    «традиція». Контекст: табори для переміщених осіб (ДіПі) в Німеччині, травма війни, бажання зберегти ідентичність.'
  - 'Текст 2: Фрагменти з програмних статей Омеляна Пріцака про заснування HURI (1970-ті). Аналіз лексики: «інтеграція», «міждисциплінарність»,
    «глобальний контекст», «порівняльні студії». Контекст: елітний американський університет, епоха ''détente'', необхідність
    доводити академічну спроможність.'
  - 'Порівняльний аналіз: Які цілі ставлять автори? Хто їхня аудиторія? Як вони розуміють «українознавство»? Як це відображає
    еволюцію діаспори від «таборової» спільноти до інтегрованої частини західного суспільства?'
  - '[!epistemic-humility] Критика джерел: Статут УВАН — це ідеалізований документ, що не відображає реальних конфліктів.
    Статті Пріцака — це також fundraising-пропозиція, що апелює до мови, зрозумілої американським донорам і адміністраторам.'
  section: 'Джерельна критика: Візія Пріцака vs Статут УВАН'
  words: 1500
- points:
  - 'Повернення до розминки: Аналізуючи два початкові тексти, поясніть тепер, які риторичні прийоми, ключові слова та історичні
    алюзії видають їхнє походження.'
  - 'Мета-рефлексія: Що історія діаспорних наукових центрів говорить нам про взаємини між знанням, владою та грошима? Чи можлива
    наука поза цим трикутником?'
  - 'Зв''язок із сьогоденням: Після 2022 року в західних університетах виникла нова хвиля зацікавленості Україною. Які уроки
    (позитивні та негативні) з досвіду HURI, УВАН, НТШ можуть бути корисними для сучасних інституцій, що розвивають українські
    студії? [!decolonization]'
  section: Дискусія та підсумок
  words: 700
focus: Порівняльний аналіз радянського, українського та західного наративів про наукові центри діаспори (УВАН, НТШ, HURI).
  Критика джерел та виявлення історіографічних маніпуляцій.
level: ISTORIO
