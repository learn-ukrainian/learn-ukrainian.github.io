objectives:
- Аналізувати та порівнювати радянський, діаспорний та західний наративи щодо ролі української науки в еміграції.
- Застосовувати методи джерельної критики до аналізу програмних документів наукових інституцій (на прикладі УВАН та HURI).
- Розрізняти методологічні підходи та приховані політичні agendas в історіографічних текстах про Україну.
- Формулювати аргументовану позицію щодо зв'язку між академічною діяльністю, політичним контекстом та фінансуванням.
