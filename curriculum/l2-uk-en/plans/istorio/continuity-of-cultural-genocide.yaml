content_outline:
- points:
  - 'Провокація: Два описи трагедії в Сандармосі — один говорить про «сталінські репресії проти радянської інтелігенції»,
    інший про «цілеспрямоване знищення українського національного відродження». Яка з цих версій є актом деколонізації пам''яті
    і чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Геноцид vs Політика пам''яті. Чи є визнання цих подій геноцидом точним юридичним і історичним терміном, чи це
    політичний інструмент сучасності? Порівняння підходів Рафаеля Лемкіна та сучасної російської історіографії.'
  - 'Дебат 2: Межі історичної аналогії. Наскільки коректно напряму порівнювати методи НКВС 1937 року з діями російської армії
    у 2022? Аргументи за і проти прямої аналогії.'
  - '[!epistemic-humility] Розгляд позицій, що наголошують на унікальності кожного історичного контексту, проти тих, що підкреслюють
    незмінність імперських практик.'
  section: 'Конфліктна карта: Тяглість чи історична аналогія?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: «Велика трагедія радянського народу». Інтелігенція постраждала як класовий
    ворог, а не як національна еліта. Методологія: фокус на соціальних, а не національних причинах. Агенда: заперечення колоніального
    виміру терору. Сліпі плями: непропорційно висока кількість жертв серед українців, цілеспрямоване нищення мови та культури.'
  - 'Український наратив: Цілеспрямований культурний геноцид. Мета — позбавити націю її «мозку» та лідерства, розірвати культурну
    традицію. Джерела: списки розстріляних, статистичний аналіз, свідчення вцілілих. Агенда: відновлення історичної справедливості,
    утвердження суб''єктності.'
  - 'Західний наратив: Еволюція погляду. Від «жертв комунізму» (Р. Конквест) до визнання національного виміру терору та геноцидної
    природи (Т. Снайдер). Методологія: доступ до архівів, нові теоретичні рамки (постколоніалізм). Сліпі плями: тривале ігнорування
    української перспективи, розгляд України переважно в контексті Росії.'
  - '[!decolonization] Розкриття механізмів, якими імперський наратив маскує геноцид під «внутрішні проблеми» чи «спільну
    трагедію».'
  - '[!myth-buster] Спростування міфу про те, що терор був хаотичним, а не системним і спрямованим на конкретні національні
    групи.'
  section: 'Зіткнення наративів: Знищення української інтелігенції'
  words: 1700
- points:
  - 'Close reading тексту №1: Фрагмент «Списку Сандармоху». Аналіз структури списку: що він повідомляє (імена, дати, фах)
    і про що мовчить (звинувачення, процес, місце поховання). Як «читати» список як історичне джерело?'
  - 'Close reading тексту №2: Звіт PEN Ukraine або свідчення про загибель письменника/ці з 2022 року (напр., Вікторії Амеліної).
    Як змінилися методи документування злочинів (цифрові докази, миттєве поширення) та мова свідчень?'
  - '[!epistemic-humility] Порівняння «об''єктивності» бюрократичного списку НКВС та емоційної насиченості сучасних свідчень.
    Які пастки для історика криються в кожному з цих джерел?'
  section: 'Джерельна критика: Списки та свідчення'
  words: 1500
- points:
  - 'Повернення до розминки: Чому термін «сталінські репресії» вже недостатній для опису подій 1937 року в Україні? Студент
    має сформулювати відповідь на основі концепцій геноциду, деколонізації та наративу.'
  - 'Мета-рефлексія: Чому імперії систематично знищують культуру та її носіїв? Що це говорить про роль культури у боротьбі
    за незалежність?'
  - 'Зв''язок із сьогоденням: Як наративи, проаналізовані в модулі, використовуються у сучасній інформаційній війні? Наведіть
    приклади пропаганди, що експлуатує міфи про «спільну історію» або «боротьбу з націоналізмом».'
  - '[!decolonization] Підсумок: визнання тяглості геноциду як необхідна умова для виходу з-під російського культурного впливу.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз тяглості російського культурного геноциду, порівняння Розстріляного відродження (1937) та вторгнення 2022 року;
  історіографічний аналіз імперських методів та наративів.
level: ISTORIO
module: istorio-135
objectives:
- Аналізувати та порівнювати російські імперські практики культурного геноциду в XX та XXI століттях
- Розрізняти та критично оцінювати російський, український та західний історіографічні наративи щодо знищення української
  інтелігенції
- Застосовувати методи джерельної критики до аналізу таких джерел, як списки жертв та сучасні свідчення
- Формулювати аргументовану позицію щодо концепції «тяглості» в історичному аналізі та її зв'язку з сучасною деколонізаційною
  боротьбою
