content_outline:
- points:
  - 'Провокація: Вам дано два анонімні фрагменти тексту про роль УПЦ МП у війні 2022 року. Один описує її як «останній форпост
    русского мира», інший — як «найбільшу жертву релігійних переслідувань в Європі». Який текст є російською пропагандою,
    а який — українською контрпропагандою? Поясніть свою логіку.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є Україна «канонічною територією» Московського патріархату? Позиція РПЦ (історична єдність «Святої Русі»,
    неканонічність розкольників) vs позиція Вселенського патріархату (скасування акту 1686 року, право на автокефалію для
    українського народу).'
  - 'Дебат 2: Томос 2019 року — це відновлення історичної справедливості чи політичний проєкт? Позиція ПЦУ (повернення до
    родини помісних церков) vs позиція УПЦ МП (політичне втручання, що поглибило розкол).'
  - '[!epistemic-humility] Обидві сторони апелюють до канонічного права, але інтерпретують його діаметрально протилежно. Це
    теологічний спір чи боротьба за юрисдикцію та ресурси?'
  section: 'Конфліктна карта: Канонічна територія чи національна церква?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: Єдина «русская» православна цивілізація з центром у Москві. Українська автокефалія
    — вигадка австрійського генштабу, Ватикану, ЦРУ. Радянський атеїзм як спроба стерти релігійні відмінності.'
  - 'Український наратив: Історія української церкви — це історія боротьби за незалежність. Київська митрополія старша за
    Московську. 1686 (підпорядкування Москві) та 1946 (ліквідація УГКЦ) — акти імперіалізму. Томос — деколонізація українського
    православ''я.'
  - 'Західний наратив: Розглядає конфлікт через призму постколоніалізму, студій націоналізму та міжнародних відносин. Аналізує
    роль Вселенського Патріарха як глобального гравця. Часто наголошує на плюралізмі та релігійній свободі як на універсальній
    цінності.'
  - '[!decolonization] Викриття механізму, як імперія використовує релігію для легітимації свого панування та заперечення
    суб''єктності колонізованого народу.'
  - '[!myth-buster] Міф про «братні народи» та «спільну духовну колиску» — як він конструюється і як спростовується через
    аналіз церковної історії.'
  section: 'Зіткнення наративів: Релігія та українська ідентичність'
  words: 1700
- points:
  - 'Джерело 1: Фрагмент проповіді Патріарха Кирила про «русский мир» та «метафізичну боротьбу» в Україні. Аналіз риторики,
    ключових понять (канонічна територія, духовна єдність), аудиторії та політичного контексту.'
  - 'Джерело 2: Фрагмент промови Митрополита Епіфанія на першій річниці отримання Томосу. Аналіз аргументації (історичне право,
    канонічне визнання), звернення до національної ідентичності та міжнародної спільноти.'
  - 'Порівняльний аналіз: Як обидва ієрархи використовують історію для обґрунтування своїх позицій? Які події вони замовчують?
    Які богословські аргументи є прикриттям політичних цілей?'
  - '[!epistemic-humility] Чи можна встановити «об''єктивну істину» в цьому конфлікті, чи ми приречені на зіткнення інтерпретацій?'
  section: 'Джерельна критика: Аналіз промов Патріарха Кирила та Митрополита Епіфанія'
  words: 1500
- points:
  - 'Повернення до розминки: Студент знову аналізує анонімні тексти, але вже з використанням понять «наратив», «дискурс»,
    «канонічна юрисдикція».'
  - 'Мета-рефлексія: Чому релігійний фактор є настільки важливим для розуміння сучасної України? Як історія церковних розколів
    впливає на сьогодення?'
  - '[!decolonization] Як процес деколонізації свідомості пов''язаний із відмовою від московської церковної юрисдикції? Чи
    є заборона УПЦ МП питанням національної безпеки чи порушенням релігійної свободи? (дискусія)'
  section: Дискусія та підсумок
  words: 700
