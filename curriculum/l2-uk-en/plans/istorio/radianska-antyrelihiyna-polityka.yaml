content_outline:
- points:
  - 'Провокація: Подано два короткі тексти. Один — замітка в радянській газеті про те, як колгоспники села N одноголосно вирішили
    закрити церкву і відкрити в ній клуб. Інший — уривок зі спогадів мешканця того ж села про те, як НКВС заарештувало священика,
    а активісти з сусіднього району скидали хрести. Якому джерелу ви вірите і чому? На основі яких маркерів ви робите свій
    вибір?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була антирелігійна кампанія лише практичним втіленням марксистської догми про «опіум для народу»? Позиція:
    радянська влада була послідовно матеріалістичною і прагнула модернізувати суспільство, викорінюючи «забобони».'
  - 'Дебат 2: Чи була боротьба з церквою в Україні, в першу чергу, формою боротьби з українською національною ідентичністю?
    Позиція: кампанія в УСРР була значно жорстокішою, ніж в РРФСР, і була спрямована на знищення інституцій (УАПЦ, УГКЦ),
    що були носіями національної пам''яті та культури.'
  - '[!epistemic-humility] Аналіз статистики: порівняння кількості закритих церков, заарештованих священиків та часових рамок
    основних хвиль репресій в Україні та Росії для оцінки обох аргументів.'
  section: 'Конфліктна карта: Ідеологія vs Національне питання'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Возз''єднання» уніатів з «матір''ю-церквою», РПЦ. Подається як добровільний,
    історично закономірний процес виправлення «польської інтриги» та повернення «заблудлих овець» в лоно православ''я. Львівський
    собор 1946 р. — акт волевиявлення.'
  - 'Український наратив: Силова ліквідація найбільшої національної інституції в Західній Україні. Арешт всього єпископату
    на чолі з Йосипом Сліпим, терор проти священиків, що відмовлялись переходити в РПЦ, інсценування «собору» агентами НКВС.
    Розглядається як частина радянізації та інструмент геноциду.'
  - 'Західний наратив (зокрема, Ватикан): Акт релігійного переслідування та порушення свободи совісті. Розглядається в контексті
    протистояння комунізму і католицького світу. УГКЦ стає «церквою-мученицею» та символом «мовчазної церкви» за Залізною
    завісою.'
  - '[!decolonization] Викриття механіки: як радянська пропаганда використовувала мову «возз''єднання» і «братерства», щоб
    приховати акт державного терору.'
  - '[!myth-buster] Міф про «добровільність» Львівського собору спростовується аналізом документів НКВС, що показують повний
    контроль спецслужб над його підготовкою та проведенням.'
  section: 'Зіткнення наративів: Ліквідація Української Греко-Католицької Церкви (1946)'
  words: 1700
- points:
  - 'Аналіз джерела 1: «Протокол зборів трудящих с. Іванівка про закриття церкви» (умовний). Розбір офіційної, канцеляристської
    мови. Пошук ознак фальсифікації: шаблонні фрази («одностайне рішення», «численні прохання трудящих»), відсутність індивідуальних
    думок. Хто автор? Яка його мета?'
  - 'Аналіз джерела 2: «Запис у щоденнику підпільного священика» (умовний). Розбір емоційної лексики, описів насильства, поіменне
    згадування жертв та катів. Які ризики пов''язані зі створенням такого документу? Наскільки він може бути суб''єктивним?'
  - '[!epistemic-humility] Порівняльний аналіз: що відбувається, коли ми читаємо ці два документи разом? Як вони доповнюють
    або спростовують один одного? Яку картину реальності ми можемо реконструювати, маючи лише ці два тексти? Вчимося читати
    «між рядками» офіційних документів.'
  section: 'Джерельна критика: Протокол vs Щоденник'
  words: 1500
- points:
  - 'Повернення до розминки: як змінилося ваше сприйняття двох уривків на початку модуля? Які інструменти аналізу тепер є
    у вашому розпорядженні для виявлення пропаганди та маніпуляції?'
  - 'Мета-рефлексія: Чи можна вважати радянську антирелігійну політику в Україні частиною геноциду за визначенням Рафаеля
    Лемкіна (зокрема, за пунктом про знищення культурних та духовних лідерів)?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна російська пропаганда використовує РПЦ та наративи про «єдиний духовний
    простір» для виправдання агресії проти України? Пошук паралелей у методах та риториці.'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of the Soviet anti-religious campaign in Ukraine, comparing Soviet, Ukrainian, and Western
  narratives of church destruction, repression of clergy, and the liquidation of the UGCC and UAOC.
level: ISTORIO
module: istorio-062
objectives:
- Аналізувати та порівнювати радянський, український та західний наративи щодо антирелігійної політики СРСР в Україні.
- Застосовувати методи джерельної критики для аналізу офіційних радянських документів та текстів альтернативних джерел (спогади,
  щоденники).
- Розрізняти ідеологічні та прагматичні мотиви радянської влади у боротьбі з релігійними інституціями в Україні.
- Формулювати аргументовану позицію щодо питання, чи була антирелігійна політика в Україні інструментом геноциду.
- Проводити паралелі між історичними методами радянської пропаганди та сучасними російськими інформаційними війнами.
pedagogy: CBI
