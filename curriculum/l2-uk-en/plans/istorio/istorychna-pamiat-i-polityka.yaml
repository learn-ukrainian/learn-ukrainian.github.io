content_outline:
- points:
  - 'Провокація: два погляди на один закон. «Це відновлення історичної справедливості» vs «Це небезпечна політизація історії».
    Про який український закон іде мова?'
  - 'Загадка: що спільного між назвою вулиці, шкільним підручником і державним святом? Вони є інструментами...'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Пам''ять — соціальна чи культурна? Моріс Альбвакс (колективна пам''ять як продукт соціальних груп) проти Яна
    Ассмана (культурна пам''ять як канонізована традиція).'
  - 'Дебат 2: Де живе пам''ять? П''єр Нора («місця пам''яті» як острівці в океані забуття) проти Алейди Ассман (функціональна
    пам''ять, що служить сьогоденню, vs накопичувальна пам''ять архівів).'
  - '[!epistemic-humility] Жодна теорія не є універсальною. Як ці концепції застосовуються (або не застосовуються) до постколоніального
    українського контексту?'
  section: 'Конфліктна карта: Теоретики пам''яті'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Велика Вітчизняна війна" (1941-45), СРСР як головний переможець над фашизмом,
    "братні народи", будь-який антирадянський рух = "нацистські колаборанти".'
  - 'Український наратив: Друга світова війна (1939-45), Україна як об''єкт змови двох тоталітарних режимів, УПА як третя
    сила у визвольній боротьбі, акцент на українських жертвах та внеску.'
  - 'Західний наратив: WWII, визнання вирішальної ролі СРСР, але й засудження його злочинів (Пакт Молотова-Ріббентропа, окупація
    Східної Європи), УПА як складний випадок націоналізму з елементами колаборації та етнічних чисток.'
  - '[!decolonization] Аналіз методів: як російський наратив використовує "перемогу" для легітимізації сучасної агресії та
    заперечення української суб''єктності.'
  - '[!myth-buster] Міф про "спільну трагедію" та "спільну перемогу" як інструмент нівелювання українського досвіду та жертв.'
  section: 'Зіткнення наративів: Друга світова чи Велика Вітчизняна?'
  words: 1700
- points:
  - 'Close reading: Текст Закону «Про засудження комуністичного та націонал-соціалістичного (нацистського) тоталітарних режимів...».
    Які терміни використовуються? Що саме забороняється? Які наслідки передбачені?'
  - 'Close reading: Текст Закону «Про правовий статус та вшанування пам''яті борців за незалежність України у XX столітті».
    Хто є "борцями"? Який статус їм надається? Чому цей закон викликав найбільше критики?'
  - 'Аналіз автора: Верховна Рада України 2015 року — політичний контекст після Революції Гідності та початку війни. Хто були
    ініціатори? Які були їхні мотиви?'
  - 'Аналіз інструментарію: декомунізація, топоніміка ("ленінопад"), пам''ятники, музеї — як ці закони змінили фізичний та
    символічний простір України.'
  - '[!epistemic-humility] Критика законів: погляди українських істориків (Грицак, Касьянов) та західних партнерів (Венеційська
    комісія) — звинувачення в обмеженні свободи слова та героїзації.'
  section: 'Джерельна критика: Українські "закони про пам''ять" (2015)'
  words: 1500
- points:
  - 'Повернення до розминки: студент має аргументовано відповісти, про які закони йшлося, і пояснити суть критики та захисту.'
  - 'Мета-рефлексія: Чи можлива історія без політики пам''яті? Чи може держава існувати без офіційного наративу про минуле?'
  - 'Зв''язок із сьогоденням: Як "війни пам''яті" 2000-х та закони 2015 року підготували ідеологічне підґрунтя для повномасштабного
    вторгнення 2022 року?'
  - '[!decolonization] Роздуми про майбутнє: якою має бути політика пам''яті у повоєнній Україні, щоб сприяти єдності та демократії,
    а не створювати нові лінії розколу?'
  section: Дискусія та підсумок
  words: 700
