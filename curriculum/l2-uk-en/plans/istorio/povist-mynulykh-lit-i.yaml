content_outline:
- points:
  - 'Провокація: знаменитий вступ «Откуда єсть пошла Русская земля...» — це смиренний запит літописця чи зухвала політична
    декларація про право на спадщину? Представлено дві анонімні інтерпретації — студент має визначити, яка з них належить
    імперському історику XIX ст., а яка — сучасному українському.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1 (Авторство): Чи був Нестор єдиним автором? Традиційна версія vs. гіпотеза Олексія Шахматова про «шари» та компіляцію
    з різних джерел. Аргументи за і проти.'
  - 'Дебат 2 (Мета): Літопис — це об''єктивна хроніка подій чи інструмент легітимізації правлячої династії та її політики?
    Розглядаємо на прикладі висвітлення хрещення Русі.'
  - '[!epistemic-humility] Ми ніколи не знайдемо «оригінальний» текст ПВЛ. Ми працюємо з копіями, зробленими через сотні років,
    кожна з яких має власні політичні та ідеологічні нашарування.'
  section: 'Конфліктна карта: Як і хто писав літопис?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: ПВЛ як «колиска спільного східнослов''янського народу», доказ «віковічного
    прагнення до єдності» під егідою Москви. Лаврентіївський список як канон.'
  - 'Український наратив: ПВЛ як пам''ятка, що засвідчує державницьку традицію саме на території України з центром у Києві.
    Іпатіївський список як альтернативна, південна перспектива.'
  - 'Західний наратив: ПВЛ розглядається в контексті європейських хронік (Gesta Danorum, Anglo-Saxon Chronicle). Аналіз через
    призму source criticism, виявлення фольклорних мотивів та біблійних алюзій.'
  - '[!decolonization] Викриття механізму, за допомогою якого імперія привласнила київську спадщину, перетворивши ПВЛ на інструмент
    обґрунтування власних територіальних та політичних претензій.'
  - '[!myth-buster] Міф про «братні народи» бере свій початок саме з маніпулятивної інтерпретації ПВЛ.'
  section: 'Зіткнення наративів: Повість минулих літ'
  words: 1700
- points:
  - Порівняльний аналіз одного і того ж епізоду (напр., повстання древлян) у двох редакціях. Які деталі додано, прибрано або
    змінено?
  - 'Мовний аналіз: виявлення церковнослов''янізмів vs. місцевих, давньокиївських діалектизмів. Що це говорить про автора/редактора
    та його аудиторію?'
  - 'Палеографічний аспект: розбір мініатюр Радзивіллівського списку. Як зображення доповнюють або спотворюють текст? Чи є
    вони самостійним джерелом?'
  - '[!epistemic-humility] Кожна редакція — це не «помилка», а свідомий акт інтерпретації, що відображає погляди та інтереси
    свого часу і місця.'
  section: 'Джерельна критика: Лаврентіївський vs Іпатіївський списки'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, ПВЛ — це джерело чи інструмент влади? Студент має сформулювати комплексну відповідь, використовуючи
    поняття «редакція», «список», «наратив».'
  - 'Мета-рефлексія: Чому для розуміння історії важливо не стільки знати, «що сталося», скільки «хто і як про це написав»?'
  - '[!decolonization] Як навички, отримані при аналізі середньовічних літописів, допомагають сьогодні виявляти маніпуляції
    у сучасних медіа та пропаганді?'
  section: Дискусія та підсумок
  words: 700
focus: 'The Primary Chronicle (PVL) as a historiographical problem: authorship debates (Nestor vs. compilers), redactional
  politics (Laurentian vs. Hypatian), and the collision of imperial, Soviet, and Ukrainian national narratives.'
level: ISTORIO
module: istorio-011
objectives:
- Розрізняти ключові редакції (Лаврентіївську, Іпатіївську) та пояснювати їхні ідеологічні розбіжності
- Критично аналізувати концепцію авторства ПВЛ, порівнюючи традиційну версію з гіпотезою О. Шахматова
- Ідентифікувати та порівнювати російський імперський, український національний та західний наративи щодо Повісті минулих
  літ
- Застосовувати базові методи джерельної критики для аналізу уривків з літопису
