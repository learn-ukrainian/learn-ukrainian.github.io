content_outline:
- points:
  - 'Провокація: У 1919 році українські та польські солдати вбивають один одного у Львові. У 1920 році вони разом проводять
    парад у Києві. Як це можливо? Яка з цих подій "справжня" історія України?'
  - 'Цитата для роздумів: "В політиці не існує вічних союзників чи вічних ворогів. Існують лише вічні інтереси." Чи пояснює
    ця фраза парадокс 1918-1920 років?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Варшавський договір — це прагматичний крок для порятунку державності УНР (позиція Петлюри) чи зрада Галичини
    та національних інтересів (позиція ЗУНР та багатьох сучасників)?'
  - 'Дебат 2: Мотиви Пілсудського — це щира спроба реалізувати федералістський проєкт "Прометеїзм" (створення блоку держав
    проти російського імперіалізму) чи цинічне бажання створити буферну, залежну від Польщі українську державу?'
  - '[!epistemic-humility] Розгляд обох сторін: аргументи Петлюри (загроза більшовизму, відсутність інших союзників) та його
    опонентів (відмова від соборності, втрата західноукраїнських земель).'
  section: 'Конфліктна карта: Неминучий союз чи національна зрада?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Польська інтервенція". Договір — це змова "буржуазних націоналістів" та
    польських панів проти волі українського народу. Петлюра — маріонетка Пілсудського. Похід на Київ — це окупація.'
  - 'Український наратив (лінія УНР): "Союз проти спільного ворога". Єдиний шанс врятувати незалежність перед обличчям більшовицької
    навали. Трагічний, але вимушений вибір, де союзник згодом зрадив (Ризький мир).'
  - 'Західний наратив (зокрема, польський): "Прометеїзм Пілсудського". Спроба створити "Міжмор''я" — федерацію держав від
    Балтики до Чорного моря як санітарний кордон проти Росії. "Чудо на Віслі" врятувало не лише Польщу, а й усю Європу від
    комунізму.'
  - '[!decolonization] Викриття радянської термінології: "інтервенція" та "братовбивча війна" як інструменти делегітимізації
    української незалежності. Наратив про "одного ворога" (Польщу) для приховування головної загрози (Росії).'
  - '[!myth-buster] Міф про те, що Петлюра "продав" Галичину. На момент підписання договору УНР вже не контролювала ці території,
    які були окуповані Польщею внаслідок програної війни 1918-1919 рр.'
  section: 'Зіткнення наративів: Варшавський договір 1920 року'
  words: 1700
- points:
  - 'Аналіз тексту Варшавського договору: юридична мова, визнання кордонів, таємна військова конвенція. Що було сказано прямо,
    а що залишилось "за дужками"?'
  - 'Close reading прокламації Петлюри до українського народу та армії: як він пояснював необхідність союзу з учорашнім ворогом?
    Які риторичні прийоми використовував?'
  - 'Порівняльний аналіз: чи суперечить риторика прокламацій реальним пунктам договору? Де і чому?'
  - '[!epistemic-humility] Розгляд джерел з польського боку: що писала тогочасна польська преса про союз? Як це подавалося
    польському суспільству?'
  section: 'Джерельна критика: Текст договору vs політичні прокламації'
  words: 1500
- points:
  - 'Повернення до розминки: студент дає розгорнуту відповідь, пояснюючи парадокс 1918-1920 років з урахуванням різних історіографічних
    підходів та інтересів сторін.'
  - 'Мета-рефлексія: чи міг Петлюра діяти інакше? Якими є критерії "правильного" політичного рішення в умовах екзистенційної
    загрози для держави?'
  - '[!decolonization] Зв''язок із сьогоденням: як історична пам''ять про Варшавський договір та Ризький мир впливає на сучасні
    українсько-польські відносини? Чому союз 2022 року є безпрецедентним і в чому його відмінність від союзу 1920 року?'
  section: Дискусія та підсумок
  words: 700
focus: 'The paradox of the Polish-Ukrainian relationship 1918-1920: war over Galicia, followed by an alliance against the
  Bolsheviks. Analysis of the Warsaw Treaty, its historiographical interpretations, and its consequences.'
level: ISTORIO
module: istorio-115
objectives:
- Аналізувати причини, умови та наслідки парадоксальної ситуації 'війна і союз' між УНР та Польщею в 1918-1920 рр.
- Порівнювати та критично оцінювати українську, польську та російську/радянську історіографічні перспективи щодо Варшавського
  договору.
- Застосовувати методи джерельної критики до політичних документів та прокламацій тієї доби.
- Формулювати аргументовану позицію щодо дилеми 'прагматизм vs національні інтереси' на прикладі рішень Симона Петлюри.
