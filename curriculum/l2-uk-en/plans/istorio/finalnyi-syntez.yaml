content_outline:
- points:
  - 'Провокація: Прочитайте тезу з класичної праці: "Малоросійський народ ніколи не мав своєї історії і з самого початку не
    міг її мати". Які ідеологічні та методологічні припущення закладені в цьому реченні? Які інструменти з курсу ISTORIO потрібні
    для його деконструкції?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Примордіалізм vs Модернізм. Українська нація — це давній суб''єкт, що існував віками (версія романтиків XIX
    ст.), чи сучасний конструкт, що виник на хвилі націоналізму (версія модерністів)? Як обидві позиції використовують історичні
    дані?'
  - 'Дебат 2: Державницька vs Народницька школа. Історія України — це історія її державних утворень (Київська Русь, Гетьманщина,
    УНР) чи історія народу (селянства, козацтва), що існував попри відсутність держави? Чия перспектива домінує сьогодні і
    чому?'
  - '[!epistemic-humility] Жодна з цих позицій не є абсолютно "правильною". Завдання історика — розуміти, як кожна з них формує
    свій наратив і які докази вважає пріоритетними.'
  section: 'Конфліктна карта: Фундаментальні розриви в історіографії'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Україна як "Малоросія", органічна, але підпорядкована частина "загальноруського"
    простору. Історія подається як низка "возз''єднань". Методологія: державний централізм, ігнорування відмінностей. Агенда:
    легітимізація імперського контролю. Сліпі плями: українська культура, мова, прагнення до незалежності.'
  - 'Український наратив (Народницько-державницький синтез): Історія як безперервна боротьба за збереження ідентичності та
    здобуття державності. Методологія: фокус на культурній безперервності та політичній агентності. Агенда: побудова національної
    держави. Сліпі плями: ідеалізація козацтва, применшення внутрішніх конфліктів.'
  - 'Західний наратив ("Borderland studies"): Україна як "землі на межі" між імперіями (Річ Посполита, Османська, Російська,
    Австро-Угорська). Методологія: порівняльний аналіз, фокус на транскультурних впливах. Агенда: академічне розуміння складності
    регіону. Сліпі плями: донедавна — погляд на Україну через "російські окуляри" через доступ до джерел та академічні традиції.'
  - '[!decolonization] Розпізнавання цих трьох наративів — головний інструмент проти сучасної російської пропаганди, яка є
    лише новим втіленням старої імперської схеми.'
  - '[!myth-buster] Міф про "братні народи" є продуктом саме імперського наративу, що заперечує агентність та окремішність
    української історії.'
  section: 'Зіткнення наративів: Українська історія як поле битви'
  words: 1700
- points:
  - Застосування навичок курсу до самих істориків. Аналізуємо два фундаментальні тексти західної україністики як "первинні
    джерела" про стан дисципліни.
  - 'Орест Субтельний, "Ukraine: A History" (1988): Написана до розпаду СРСР. Контекст: холодна війна, обмежений доступ до
    радянських архівів. Методологія: сильний національний наратив, що мав на меті представити Україну західному читачу як
    окрему одиницю. Вплив: книга, що сформувала погляд цілого покоління на Україну.'
  - 'Сергій Плохій, "The Gates of Europe" (2015): Написана після "архівної революції". Контекст: незалежна Україна, глобальна
    історія як тренд. Методологія: транснаціональний підхід, Україна як центральний елемент європейських та глобальних процесів.
    Вплив: переосмислення ролі України в світовій історії.'
  - '[!epistemic-humility] Порівняння показує, що історія — це не статичний набір фактів, а динамічний процес інтерпретації,
    що залежить від доступу до джерел, методологічної моди та політичного контексту.'
  section: 'Джерельна критика: Як читати істориків: Субтельний vs. Плохій'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер виглядає теза про "народ без історії"? Які конкретні аргументи з курсу ви можете використати
    для її спростування?'
  - 'Мета-рефлексія: Курс ISTORIO — це не про те, ЩО думати про історію України, а про те, ЯК думати. Які три головні навички
    ви здобули?'
  - 'Від споживача історії до критика: як змінився ваш підхід до новин, політичних заяв та "історичних" дописів у соцмережах?'
  - '[!decolonization] Головний підсумок: Розуміння того, як конструюються історичні наративи, є фундаментальною навичкою
    для громадянина країни, чиє право на існування оскаржується за допомогою маніпуляції минулим.'
  section: Дискусія та підсумок
  words: 700
focus: 'Meta-reflection on the ISTORIO course: key methodological, thematic, and practical lessons in historiography, source
  criticism, and narrative deconstruction.'
level: ISTORIO
