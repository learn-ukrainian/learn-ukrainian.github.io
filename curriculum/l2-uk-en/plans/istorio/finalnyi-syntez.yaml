objectives:
- Синтезувати ключові методологічні підходи, вивчені в курсі ISTORIO.
- Критично аналізувати та порівнювати різні історіографічні наративи (імперський, національний, західний).
- Застосовувати техніки джерельної критики до праць сучасних істориків.
- Сформулювати власне, базоване на доказах, розуміння того, як конструюється та оскаржується історичне знання.
