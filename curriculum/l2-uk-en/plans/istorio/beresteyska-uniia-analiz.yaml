content_outline:
- points:
  - 'Провокація: два погляди на унію. Цитата 1 (від православного полеміста): «зрадницький акт відступництва». Цитата 2 (від
    унійного єпископа): «єдиний шлях до порятунку руського народу». Хто з них ближчий до істини?'
  - 'Завдання для студента: не обирати сторону, а припустити, які аргументи могли стояти за кожною з цих позицій у 1596 році.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Причини унії. Це була щира спроба оновити церкву та врятувати її від занепаду (позиція Грушевського) чи цинічна
    політична змова єпископів заради сенаторських крісел (теза радянської історіографії)? [!epistemic-humility]'
  - 'Дебат 2: Канонічність рішення. Чи мав собор у Бересті, де меншість єпископів представляла всю церкву, право ухвалювати
    таке доленосне рішення? Проблема репрезентативності та легітимності.'
  - 'Погляд третій (західна історіографія): Унія як частина ширшого процесу конфесіоналізації в Європі, спроба модернізації
    церкви за західним зразком.'
  section: 'Конфліктна карта: Зрада чи порятунок?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Унія — це акт «насильницького відторгнення» українців від «єдиного православного
    тіла», інструмент полонізації та католицької експансії. Мета — довести штучність української окремішності. Докази: опір
    козаків, повстання. [!decolonization]'
  - 'Український наратив (дві версії): 1) Національно-державницький (до 1991): Унія — трагедія, що розколола народ і послабила
    його перед зовнішніми ворогами. 2) Сучасний греко-католицький та екуменічний: Унія — це вибір європейського шляху, що
    зберіг українську ідентичність від поглинання польською та російською культурами.'
  - 'Західний наратив (Джон-Пол Химка, Сергій Плохій): Унія як складний соціально-релігійний феномен. Не «зрада» і не «порятунок»,
    а раціональний вибір еліт в умовах кризи. Аналіз умов унії як спроби створити "третій шлях".'
  - '[!myth-buster] Міф про те, що унія була нав''язана силою. Рішення приймали українські православні єпископи, хоч і під
    тиском обставин.'
  section: 'Зіткнення наративів: Берестейська унія'
  words: 1700
- points:
  - 'Джерело 1: «Апокрисис» Христофора Філалета (1597) — маніфест православної опозиції. Аналіз аргументації: апеляція до
    давніх прав, звинувачення єпископів у корупції та зраді, канонічне право як зброя.'
  - 'Джерело 2: «Оборона унії» Іпатія Потія (1603) — відповідь унійного митрополита. Аналіз аргументації: апеляція до патріотизму
    («порятунок Русі»), ідея «повернення до джерел».'
  - '[!epistemic-humility] Порівняльний аналіз: обидва автори використовують ті самі біблійні цитати й історичні приклади
    для доведення протилежних тез. Як це можливо? Аналіз риторичних прийомів та маніпуляцій.'
  section: 'Джерельна критика: Полеміка без компромісів'
  words: 1500
- points:
  - 'Повернення до розминки: «Зрада» чи «порятунок»? Студент має сформулювати власну, складнішу відповідь, використовуючи
    терміни «модернізація», «конфесіоналізація», «вибір еліт».'
  - 'Мета-рефлексія: Чому Берестейська унія досі викликає такі гарячі суперечки? Що це говорить про роль релігії в українській
    історії та ідентичності?'
  - 'Зв''язок із сьогоденням: Сучасні дискусії про ПЦУ, Томос, відносини з Ватиканом та Москвою — як у них відлунюють аргументи
    та наративи XVI століття? [!decolonization]'
  section: Дискусія та підсумок
  words: 700
focus: 'The Union of Brest (1596): causes, terms, consequences, and historiographical debates (Orthodox vs. Greek Catholic
  vs. modern)'
level: ISTORIO
module: istorio-059
objectives:
- Аналізувати причини, умови та наслідки Берестейської унії, розрізняючи факти та історіографічні інтерпретації
- Порівнювати аргументи прихильників та противників унії, аналізуючи першоджерела полемічної літератури
- Розпізнавати та деконструювати російський імперський, український національний та західний наративи про унію
- Застосовувати методи джерельної критики для оцінки історіографічних текстів
