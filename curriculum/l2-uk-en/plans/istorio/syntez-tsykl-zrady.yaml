content_outline:
- points:
  - 'Провокація: Чи приречена Україна вічно повторювати цикл «зрада-руїна-відродження»? Уявіть, що ви читаєте два описи стосунків
    української еліти з Москвою — один з XVII ст., інший з кінця XX ст. Чи зможете ви відрізнити, де який, не дивлячись на
    дати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Історичний детермінізм vs. агентність. Чи є цей цикл неминучим наслідком географії та асиметрії сил (теза російської
    історіографії), чи результатом конкретних рішень українських еліт (теза української державницької школи)? [!epistemic-humility]'
  - 'Дебат 2: Економіка vs. культура. Що є первинним драйвером кооптації — економічні вигоди, які імперія пропонує елітам,
    чи культурна русифікація та ментальна спорідненість? (Погляд західної соціології vs української культурології).'
  section: 'Конфліктна карта: Фатум чи вибір?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Возз''єднання братніх народів". Подає цей процес як природне повернення
    "Малоросії" в лоно єдиної цивілізації. Еліти, що йдуть на співпрацю — "реалісти", ті, хто чинить опір — "зрадники-мазепинці".
    Методологія: ігнорування насильства, підміна понять, фокус на "спільних перемогах". Агенда: легітимізація власного панування.
    [!decolonization]'
  - 'Український наратив: "Колоніальна кооптація". Розглядає цикл як трагедію втрати суверенітету через продажність національної
    еліти. Хмельницький, Мазепа, Шелест — різні актори в тій самій драмі. Методологія: фокус на джерелах, що засвідчують тиск,
    маніпуляції та наслідки для української державності та культури. Агенда: утвердження суб''єктності України, пояснення
    причин історичних поразок. [!myth-buster]'
  - 'Західний наратив (політологія імперій): "Elite Co-optation as a Tool of Imperial Control". Розглядає український випадок
    як класичний приклад стратегії "divide and rule", де метрополія інкорпорує частину еліти колонії для управління територією.
    Методологія: порівняльний аналіз (Британська Індія, Римська Галлія). Агенда: створення універсальної моделі функціонування
    імперій. Сліпа зона: часто недооцінює унікальний культурний та ідеологічний тиск у російському випадку.'
  section: 'Зіткнення наративів: Цикл Кооптації'
  words: 1700
- points:
  - 'Джерело 1: "Чому Україна не Росія" Леоніда Кучми (рання редакція) vs. його ж дії на посту президента. Як текст, що декларує
    окремішність, співіснував із практикою багатовекторності, що продовжувала цикл?'
  - 'Джерело 2: Заяви західних аналітиків 2014-2021 рр. про необхідність "зрозуміти Росію" та "не провокувати". Як ці тексти,
    написані з позицій "реалізму", об''єктивно підштовхували Україну до продовження циклу залежності? [!epistemic-humility]'
  - Аналіз феномену "громадянського суспільства" як нового історичного актора, що руйнує елітні змови. Порівняння ролі громадськості
    під час Помаранчевої революції та Революції Гідності.
  section: 'Джерельна критика: Аналіз "кінця циклу" 2014-2022'
  words: 1500
- points:
  - 'Повернення до розминки: Чи зламався цикл назавжди? Студент формулює відповідь, використовуючи поняття агентності, ролі
    громадянського суспільства та зміни геополітичного контексту.'
  - 'Мета-рефлексія: Чи не є сама концепція "історичного циклу" інтелектуальною пасткою, що знімає відповідальність з конкретних
    осіб? Як не перетворити історію на фатум?'
  - 'Зв''язок із сьогоденням: Які загрози рестарту циклу існують після перемоги (втома, економічна залежність від союзників,
    спокуса "нормалізації" стосунків)? Як знання про минулі цикли допомагає розпізнавати ці загрози сьогодні? [!decolonization]'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of the recurring historical cycle of Ukrainian elites' co-optation by Russian imperial structures and the
  conditions for breaking this cycle in the 21st century.
level: ISTORIO
module: istorio-088
objectives:
- Аналізувати повторюваний цикл кооптації українських еліт імперськими структурами, виділяючи його фази та ключових акторів
- Порівнювати та критично оцінювати три основні історіографічні наративи (російський, український, західний) щодо цього циклу
- Застосовувати методику джерельної критики до сучасних аналітичних текстів та політичних заяв
- Формулювати аргументовану позицію щодо умов, за яких Україна може остаточно вийти з історичного циклу залежності
