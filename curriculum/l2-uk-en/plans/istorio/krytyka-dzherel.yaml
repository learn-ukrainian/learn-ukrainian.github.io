content_outline:
- points:
  - 'Провокація: Вам дають два документи про походження Русі. Один — «Повість временних літ». Другий — лист імператора Візантії.
    Якому ви довіряєте більше і чому? Ваша інтуїтивна відповідь, швидше за все, неправильна.'
  - 'Цитата-пастка: "Історія — це версія минулих подій, на якій люди домовилися погодитись" (Наполеон). Чи справді це так?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Позитивісти (Леопольд фон Ранке) vs Ідеалісти (Робін Коллінгвуд). Чи завдання історика — просто показати "як
    усе було насправді" (wie es eigentlich gewesen), чи проникнути в думки автора джерела?'
  - '[!epistemic-humility] Дебат 2: Автентичність «Слова о полку Ігоревім». Аргументи "за" (лінгвістичні паралелі, унікальні
    деталі) vs аргументи "проти" (підозріла історія знахідки, відсутність згадок в інших джерелах). Сучасний консенсус.'
  - 'Зовнішня критика (автентичність) vs Внутрішня критика (достовірність): чи може фальшивий документ говорити правду? Чи
    може автентичний документ брехати?'
  section: 'Конфліктна карта: Що важливіше — факт чи авторський задум?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: "Возз''єднання" братніх народів. Акт віковічного прагнення Малоросії до руки
    великого російського брата. Методологія: вибіркові цитати, ігнорування контексту, наголос на спільній вірі. Агенда: легітимізація
    панування. Сліпі плями: що саме підписали? Який статус мали подібні договори в XVII ст.?'
  - '[!decolonization] Український наратив: Військово-політичний союз, вимушений крок для виживання держави. Хмельницький
    як суб''єкт, що обирає протекторат. Методологія: аналіз повного тексту "Березневих статей", порівняння з іншими договорами
    (Османська імперія, Швеція). Агенда: утвердження суб''єктності України. Сліпі плями: чи всі козацькі полковники були згодні?'
  - 'Західний наратив (e.g., Плохій, Снайдер): Прагматичний вибір гетьмана в рамках логіки "ранньомодерної держави". Переяслав
    як початок кінця "козацької автономії" та поступового поглинання імперією. Методологія: компаративний аналіз, розгляд
    в контексті європейської Тридцятилітньої війни. Агенда: академічна, де-драматизація. Сліпі плями: недооцінка культурно-релігійного
    фактора.'
  - '[!myth-buster] "Братні народи" — це термін, винайдений у ХІХ столітті, а не реальність XVII століття. Аналіз того, як
    міф стає "джерелом".'
  section: 'Зіткнення наративів: Переяславська рада 1654 року'
  words: 1700
- points:
  - 'Практикум: читаємо фрагмент реального Універсалу.'
  - 'Застосування "П''яти ключових питань":'
  - 1. ХТО? — Богдан Хмельницький та його канцелярія. Які їхні інтереси? Яка в них влада?
  - 2. КОЛИ? — Конкретна дата в розпалі війни. Що відбувалося в цей момент на фронті та в дипломатії?
  - 3. ДЛЯ КОГО? — До кого звертається Універсал? До козаків? До селян? До шляхти? Як це впливає на мову і зміст?
  - 4. ЧОМУ? — Яка мета цього документа? Наказати? Переконати? Залякати? Заручитися підтримкою?
  - '[!epistemic-humility] 5. ЩО ОПУЩЕНО? — Аналіз мовчання. Про що Універсал не говорить? Які незручні теми оминає? Порівняння
    з листами того ж періоду.'
  - 'Особливості українських джерел: радянська фільтрація, знищення архівів, роль діаспорних збірок у збереженні спадщини.'
  section: 'Джерельна критика: Універсал Богдана Хмельницького'
  words: 1500
- points:
  - 'Повернення до розминки: тож якому джерелу про походження Русі вірити? (Правильна відповідь: жодному сліпо, але обидва
    є безцінними для розуміння СВОГО часу).'
  - Чи може історик бути повністю об'єктивним? Якщо ні, то чим наукова історія відрізняється від пропаганди?
  - 'Мета-рефлексія: ви більше ніколи не зможете читати новини, пости в соцмережах чи навіть підручники "наївно". Як нові
    навички змінюють ваше сприйняття інформації?'
  - '[!decolonization] Зв''язок із сьогоденням: розбір сучасного російського пропагандистського тексту про Україну за "п''ятьма
    питаннями". Як працюють старі методи на новому матеріалі?'
  section: Дискусія та підсумок
  words: 700
focus: 'Methodology of source criticism: distinguishing primary vs. secondary, external (authenticity) vs. internal (credibility)
  criticism, identifying authorial bias, analyzing narrative framing, and understanding the specific challenges of the Ukrainian
  source base (archival destruction, Soviet filtering, narrative warfare).'
level: ISTORIO
module: istorio-009
objectives:
- Розрізняти первинні та вторинні історичні джерела та пояснювати їхню роль в історичному дослідженні
- Застосовувати методи зовнішньої (автентичність) та внутрішньої (достовірність) критики до історичного джерела
- Ідентифікувати та аналізувати авторські упередження, мету та аудиторію в історичних текстах
- Аналізувати, як різні історіографічні наративи (російський, український, західний) інтерпретують ту саму подію
- Сформулювати власну аргументовану позицію щодо ступеня надійності конкретного історичного джерела
