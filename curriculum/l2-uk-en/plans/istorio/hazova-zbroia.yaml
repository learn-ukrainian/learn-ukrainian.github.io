content_outline:
- points:
  - 'Провокація: Україна — невинна жертва російського газового шантажу чи активний співучасник корупційних схем? Де проходить
    межа між залежністю та колаборацією?'
  - 'Цитата-загадка: "Це суто комерційний проєкт, що підвищує енергетичну безпеку Європи". Кому належать ці слова і про який
    газопровід йдеться?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи були "газові війни" 2006 та 2009 років звичайними комерційними суперечками щодо ціни та боргу, як наполягала
    Росія, чи це були акти політичного тиску та покарання за Помаранчеву революцію?'
  - 'Дебат 2: Nord Stream — це економічний проєкт для диверсифікації маршрутів до ЄС, чи геополітична зброя для ізоляції України,
    позбавлення її транзитного статусу та посилення європейської залежності від "Газпрому"?'
  - '[!epistemic-humility] Аналіз позицій: як німецькі бізнес-кола, східноєвропейські політики та американські аналітики по-різному
    інтерпретували ті самі факти до 24.02.2022.'
  section: 'Конфліктна карта: Ринковий спір чи геополітична агресія?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Україна — "ненадійний транзитер", що хронічно не платить борги і "краде"
    газ. Росія змушена будувати обхідні газопроводи (Nord Stream), щоб гарантувати поставки в Європу. Конфлікти — це виключно
    бізнес.'
  - 'Український наратив: Росія з 1991 року використовує газ як інструмент неоколоніального контролю. "Газові війни", відключення
    та ціновий шантаж — це покарання за геополітичний вибір (НАТО, ЄС). Харківські угоди — приклад прямої купівлі суверенітету
    за газові знижки.'
  - 'Західний наратив (до 2022): Розколотий. Частина (особливо німецький бізнес) приймала російську версію "комерційних суперечок".
    Інша частина (США, Польща, країни Балтії) попереджала про використання Росією енергетики як зброї. Після 2022 року домінує
    українська інтерпретація.'
  - '[!decolonization] Викриття механіки: як термін "братній народ" використовувався для виправдання неринкових цін, а термін
    "ринкова ціна" — для економічного покарання.'
  - '[!myth-buster] Міф про "дешевий російський газ": аналіз прихованої ціни — політичні поступки, корупційні схеми та втрата
    суверенітету.'
  section: 'Зіткнення наративів: Енергетична залежність України'
  words: 1700
- points:
  - 'Джерело 1: Текст Харківських угод (2010). Аналіз формулювань: як пов''язані "знижка на газ" та "продовження перебування
    Чорноморського флоту РФ". Які юридичні наслідки мала ця угода?'
  - 'Джерело 2: Прес-релізи "Газпрому" під час кризи 2009 року. Порівняльний аналіз риторики для європейської та української
    аудиторій. Як конструювався образ "неконструктивної" України?'
  - 'Авторство та контекст: Хто були архітекторами цих угод та заяв? Чиї інтереси вони представляли? Аналіз інституційних
    та особистих мотивацій.'
  - '[!epistemic-humility] Як офіційні документи можуть приховувати реальний зміст домовленостей? Читання між рядків та аналіз
    політичного бекграунду.'
  section: 'Джерельна критика: Харківські угоди та заяви "Газпрому"'
  words: 1500
- points:
  - 'Повернення до розминки: Жертва чи співучасник? Студент формулює відповідь, використовуючи докази з модуля, розрізняючи
    державну політику та дії окремих еліт.'
  - 'Мета-рефлексія: Що історія газових відносин говорить про природу сучасної війни? Як економічна залежність стає інструментом
    обмеження державного суверенітету?'
  - '[!decolonization] Зв''язок із сьогоденням: Як Україні вдалося розірвати 30-річну залежність після 2014 року? Яку роль
    відіграв "реверс"? Чому повна відмова від російського газу стала можливою лише після повномасштабного вторгнення?'
  section: Дискусія та підсумок
  words: 700
