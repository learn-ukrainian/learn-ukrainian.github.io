objectives:
- Аналізувати та порівнювати російський, український та західний наративи щодо енергетичної залежності України
- Застосовувати методи джерельної критики до аналізу міжнародних угод та заяв корпорацій (на прикладі Харківських угод та
  'Газпрому')
- Розрізняти поняття 'комерційний спір' та 'економічна війна' в контексті українсько-російських відносин
- Формулювати аргументовану позицію щодо впливу енергетичної залежності на державний суверенітет
