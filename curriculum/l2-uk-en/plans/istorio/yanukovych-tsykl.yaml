content_outline:
- points:
  - 'Провокація: Вам представлено два анонімні коментарі щодо відмови від підписання Угоди про асоціацію з ЄС у 2013 році.
    Один називає це «зрадою національних інтересів», інший — «прагматичним економічним рішенням». Не знаючи автора, спробуйте
    визначити, який із них належить українському, а який — російському джерелу. Поясніть свою логіку.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що було рушійною силою Революції Гідності — свідома дія (агентність) мільйонів українців чи об''єктивні історичні
    закони (структура), що зробили крах системи неминучим?'
  - 'Дебат 2: Чи був Янукович суверенним гравцем, що припустився фатальних помилок, чи маріонеткою, чиї дії були повністю
    продиктовані Кремлем? Розглядаємо докази обох версій.'
  - '[!epistemic-humility] Аналіз ролі олігархічних груп — чиї інтереси вони представляли і як їхня позиція змінювалася від
    листопада 2013 до лютого 2014 року?'
  - 'Порівняння з Помаранчевою революцією 2004 року: чому досвід попереднього Майдану водночас і допоміг, і заважав адекватно
    оцінити ситуацію у 2013-му?'
  section: 'Конфліктна карта: Агентність чи структура?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Події 2014 року — це «незаконний державний переворот», інспірований Заходом
    та здійснений руками «неонацистів». Аналіз лексики («хунта», «карателі») та візуальних маніпуляцій у російських ЗМІ.'
  - 'Український наратив: Це «Революція Гідності», всенародне повстання проти корумпованого режиму, що зрадив європейський
    вибір нації. Розбір ключових символів: Небесна Сотня, самоорганізація Майдану, єдність.'
  - '[!decolonization] Як український наратив свідомо протиставляє себе старим колоніальним схемам «братніх народів» та «спільної
    історії», утверджуючи суб''єктність.'
  - 'Західний наратив: Складний процес, де переплелися боротьба з корупцією, геополітичне протистояння та народний протест.
    Аналіз того, як західні медіа та політики намагалися вписати українські події у зрозумілі їм рамки (наприклад, «Арабська
    весна»).'
  - '[!myth-buster] Розвінчання міфів з усіх боків: чи був Майдан монолітним, чи справді Захід його «організував», чи вся
    влада Януковича трималася лише на російських грошах?'
  section: 'Зіткнення наративів: Революція Гідності'
  words: 1700
- points:
  - 'Close reading: Текст Харківських угод 2010 року. Аналіз офіційних формулювань: що було заявлено публічно (знижка на газ)
    і що було приховано (довгострокові наслідки для суверенітету та безпеки в Криму).'
  - 'Порівняння джерел: Офіційні коментарі МЗС РФ та прес-служби Президента України після підписання угод. Знаходимо розбіжності
    в акцентах, термінології та цілях.'
  - Аналіз виступу Януковича на Вільнюському саміті 2013 року та заяв європейських лідерів у відповідь. Які аргументи використовувалися
    сторонами? Як риторика відображала реальний політичний тиск за лаштунками?
  - '[!epistemic-humility] Розглядаємо мемуари учасників подій (напр., Жозе Мануеля Баррозу, Вікторії Нуланд) та українських
    політиків. Як ретроспективне знання про наслідки (анексія, війна) змінює їхню інтерпретацію власних дій?'
  section: 'Джерельна критика: Харківські угоди та Вільнюський саміт'
  words: 1500
- points:
  - 'Повернення до розминки: Озброївшись знаннями з модуля, проаналізуйте два анонімні висловлювання ще раз. Які наративні
    конструкти, ідеологічні маркери та приховані припущення ви тепер можете в них ідентифікувати?'
  - 'Мета-рефлексія: Чому «цикл кооптації» цього разу дав збій і завершився не підкоренням, а революцією? Який елемент виявився
    ключовим — сила громадянського суспільства, хибна оцінка ситуації Кремлем чи особиста неадекватність Януковича?'
  - '[!decolonization] Як аналіз циклу Януковича допомагає зрозуміти сучасні методи російського імперіалізму щодо інших країн?
    Де ці самі патерни (підкуп еліт, енергетична залежність, політичний тиск) застосовуються сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: The Yanukovych presidency (2010-2014) as a modern example of the historical co-optation cycle. Historiographical debate
  on agency vs. structure in the Revolution of Dignity. Comparison of Russian, Ukrainian, and Western narratives of the Euromaidan.
level: ISTORIO
module: istorio-087
objectives:
- Аналізувати президентство Януковича як приклад сучасного застосування історичної моделі кооптації
- Розрізняти та деконструювати російський, український та західний наративи про Революцію Гідності
- Застосовувати методику джерельної критики до аналізу політичних угод та медійних повідомлень 2010-2014 років
- Формулювати аргументовану позицію щодо ролі громадянського суспільства та структурних факторів у краху режиму Януковича
