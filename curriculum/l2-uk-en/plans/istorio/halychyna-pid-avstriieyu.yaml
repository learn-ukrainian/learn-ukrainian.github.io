content_outline:
- points:
  - 'Провокація: Вам дано два уривки з офіційних документів XIX століття. Один легалізує українську мову в церковних справах,
    інший її повністю забороняє. Не знаючи дат і назв, спробуйте визначити, який документ австрійський, а який — російський.
    На чому ґрунтується ваше припущення?'
  - 'Цитата для роздумів: "Австрія дала нам можливість бути українцями легально, Росія — лише підпільно". Наскільки це твердження
    є точним, а наскільки — спрощенням?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Галичина — «Український П''ємонт»? Аргументи «за»: легальні українські інституції, розвиток преси, кооперації,
    політичного досвіду. Аргументи «проти» (ревізіоністський погляд): це була лише «золота клітка», інструмент Відня для контролю
    над поляками, що не скасовував імперського гніту.'
  - 'Дебат 2: «Весна народів» 1848 року — прорив чи поразка? Класична історіографія: створення Головної Руської Ради, скасування
    панщини — величезний крок уперед. Критична історіографія: Рада була значною мірою інспірована та контрольована австрійською
    адміністрацією для ослаблення польського руху; реальні здобутки були обмежені.'
  - '[!epistemic-humility] Обидві імперії були авторитарними. Питання не в «хороша vs погана», а в тому, як різні системи
    — конституційна монархія з елементами правової держави та самодержавна автократія — створювали абсолютно різні умови для
    національного руху.'
  section: 'Конфліктна карта: «П''ємонт» чи «в''язниця народів»?'
  words: 900
- points:
  - 'Російський імперський наратив: Українці — не окрема нація, а «малоросійська» гілка «єдиного російського народу». Мова
    — «зіпсований польським впливом діалект». Греко-католицька церква — «уніатська єресь», результат зради православ''ю. Мета:
    повна асиміляція. Докази: Валуєвський циркуляр, Емський указ.'
  - 'Український наратив (галицький варіант): Українці — окрема нація з давньою історією, спадкоємці Русі. Габсбурзька монархія
    — простір для збереження ідентичності в умовах російського тиску. Головна Руська Рада (1848): «Ми, русини галицькі, належимо
    до великого руського народу, котрий говорить однією мовою і нараховує 15 мільйонів». Мета: здобуття автономії, зрештою
    — соборність.'
  - 'Західний (австрійський) наратив: «Рутени» (Ruthenen) — один з багатьох народів імперії. Їхні права визнаються в рамках
    закону, а їхня лояльність використовується як противага полякам та угорцям. Мета: стабільність імперії через політику
    "розділяй і володарюй". Українське питання — внутрішня справа, не цивілізаційний вибір.'
  - '[!decolonization] Викриття механіки російського лінгвоциду та спроб привласнити історію Русі. Порівняння імперської політики
    асиміляції (Росія) та політики контролю через обмежену емансипацію (Австрія).'
  section: 'Зіткнення наративів: Статус українців як нації'
  words: 1700
- points:
  - 'Аналіз тексту 1: Уривки з маніфесту Головної Руської Ради (1848). Мова, риторика, до кого звертаються (до «народу» і
    до «цісаря»). Які права вимагають? Якою бачать свою ідентичність? Лексичний аналіз: «Русь», «народ», «права», «конституція».'
  - 'Аналіз тексту 2: Уривки з Емського указу (1876). Аналіз заборонних формулювань («не допускати», «заборонити»). Яка логіка
    стоїть за забороною друкувати книги «малоросійським наріччям»? Як автори указу конструюють образ «неіснуючої» мови?'
  - 'Порівняльний аналіз: Як обидва документи відображають правову культуру своїх імперій? Один апелює до права та лояльності,
    інший — до сили та заборони. Які інституції стоять за кожним текстом (публічна політична рада vs таємний указ самодержця)?'
  - '[!epistemic-humility] Навіть маніфест Ради містить елементи імперської лояльності, які сьогодні можуть здатися наївними.
    Важливо розуміти історичний контекст, в якому це був єдиний можливий спосіб політичної дії.'
  section: 'Джерельна критика: Маніфест Головної Руської Ради vs. Емський указ'
  words: 1500
- points:
  - 'Повернення до розминки: Після аналізу джерел, які конкретні ознаки (юридична термінологія, тон, мета) дозволяють чітко
    розрізнити австрійський та російський підходи до «українського питання»?'
  - 'Мета-рефлексія: Чи не призвела «особлива доля» Галичини до певного розколу в українському національному русі? Які стереотипи
    про «галичан» та «наддніпрянців» виникли внаслідок цього історичного розділення?'
  - '[!decolonization] Як сучасна російська пропаганда використовує ті самі аргументи, що й Емський указ, для заперечення
    існування української нації? Чому досвід Галичини є доказом того, що за сприятливих умов український рух неминуче розвивається?'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical comparison of Ukrainian national development under the Habsburg and Russian empires, focusing on
  the concepts of "rule of law" vs. "autocratic decree", the role of the UGCC, the "Spring of Nations", and the "Ukrainian
  Piedmont" debate.
