objectives:
- Порівнювати правовий статус, освітні та релігійні можливості українців в Австрійській та Російській імперіях у XIX столітті.
- 'Аналізувати ключові історіографічні дебати щодо Галичини: концепцію «Українського П''ємонту» та значення «Весни народів»
  1848 року.'
- Розпізнавати та деконструювати російський імперський, український національний та західний наративи щодо статусу українців.
- Застосовувати методи джерельної критики для аналізу первинних документів, таких як маніфест Головної Руської Ради та Емський
  указ.
