content_outline:
- points:
  - 'Провокація: Перед вами два описи однієї події — арешту українського поета. Один — сухий перелік фактів, інший — звинувачення
    у «дрібному хуліганстві». Який із них є політичним актом, і чому?'
  - 'Цитата: "Найбільша брехня — це не сказати всієї правди". Як цей принцип визначав редакційну політику В''ячеслава Чорновола?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Дисидентський рух — політична опозиція чи злочинна діяльність? Позиція «Вісника» (документування порушень радянської
    ж конституції) vs позиція КДБ (антирадянська агітація та пропаганда).'
  - 'Дебат 2: В''ячеслав Чорновіл — журналіст-правозахисник чи «наймит західних спецслужб»? Аналіз звинувачувальних вироків
    проти нього та його власних текстів.'
  - '[!epistemic-humility] Як відсутність доступу до архівів (або доступ лише до архівів КДБ) формує абсолютно протилежні
    історичні наративи про шістдесятників?'
  section: 'Конфліктна карта: Факт чи Наклеп?'
  words: 900
- points:
  - 'Російський радянський наратив: "жменька відщепенців", фінансованих ЦРУ; їхня діяльність — кримінальні злочини, що не
    мають підтримки в "щасливому радянському суспільстві". Джерела: газети «Правда», вироки судів, "щиросердні зізнання".'
  - 'Український наратив («Вісника»): рух інтелектуалів, що ненасильницькими, легальними методами (апеляція до Гельсінських
    угод) вимагали дотримання прав, гарантованих конституцією. Джерела: самвидавні тексти, хроніки репресій, листи з таборів.'
  - 'Західний наратив: дисиденти як союзники у Холодній війні, символ боротьби за права людини в СРСР. Джерела: репортажі
    Радіо Свобода, звіти Amnesty International, переклади самвидаву. Сліпі плями: часто ігнорувався національний вимір боротьби,
    зводячи все до загальнорадянського контексту.'
  - '[!decolonization] Порівняння «Українського вісника» та російського «Хроника текущих событий»: виявлення унікальних рис
    українського руху опору, які не зводяться до загальноросійського.'
  - '[!myth-buster] Міф про те, що дисиденти були повністю ізольовані. «Вісник» доводить існування розгалуженої мережі інформаторів
    по всій Україні.'
  section: 'Зіткнення наративів: Діяльність дисидентів 1970-х'
  words: 1700
- points:
  - 'Close reading: уривок з першого випуску «Вісника», розділ «Хроніка репресій». Аналіз стилю: безоціночність, фактографічність,
    відсутність емоцій.'
  - 'Автор/Редактор: В''ячеслав Чорновіл — його бекграунд як журналіста, його попередня праця «Лихо з розуму». Чому він обрав
    саме таку «безсторонню» манеру письма?'
  - 'Інституційна приналежність: Самвидав. Як нелегальний статус видання впливав на збір інформації, її перевірку та розповсюдження?'
  - '[!epistemic-humility] Сила простого свідчення: як перелік прізвищ, дат і статей кримінального кодексу стає потужнішим
    за політичні декларації? Обговорення стратегії "документація як спротив".'
  section: 'Джерельна критика: Аналіз «Українського вісника»'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви можете проаналізувати два початкові тексти? Які ідеологічні маркери приховані в «нейтральному»
    описі?'
  - 'Мета-рефлексія: Чи може історія бути повністю об''єктивною? Яку роль відіграє редактор/історик у відборі та презентації
    фактів, навіть якщо він не додає коментарів?'
  - 'Зв''язок із сьогоденням: Як стратегії «Українського вісника» використовуються сьогодні для документування воєнних злочинів
    Росії в Україні? Порівняння самвидаву 70-х та сучасних Telegram-каналів.'
  - '[!decolonization] Чому для імперії так важливо контролювати не лише сьогодення, але й минуле? «Вісник» як спроба повернути
    контроль над власною історією.'
  section: Дискусія та підсумок
  words: 700
focus: The samvydav journal 'Ukrainskyi Visnyk', Viacheslav Chornovil's role as editor, the strategy of documentary evidence,
  and its contrast with Soviet/Russian historiography of dissent.
level: ISTORIO
module: istorio-041
objectives:
- Аналізувати, як «Український вісник» став інструментом опору через свідому відмову від коментаря на користь документального
  факту
- Протиставляти наратив «Вісника» радянській та сучасній російській пропаганді для виявлення маніпулятивних технік
- Застосовувати методику джерельної критики до аналізу самвидавних текстів, враховуючи особу автора, обставини створення та
  мету публікації
