content_outline:
- points:
  - 'Провокація: Вам дано два уривки. Один — це заклик до священної війни за віру. Інший — скарга монарху на утиски місцевої
    шляхти. Обидва написані однією людиною в один рік. Як це можливо? (обидва уривки з універсалів Хмельницького)'
  - 'Цитата для роздумів: «Сам документ ніколи не бреше, брехати може лише його інтерпретатор». Як це стосується універсалів
    Хмельницького?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Універсали — це відображення народних прагнень чи інструмент для маніпуляції масами з боку козацької еліти?
    Позиція «народницької» історіографії vs «державницької».'
  - 'Дебат 2: Чи були універсали спрямовані на створення незалежної держави з самого початку, чи це була лише боротьба за
    «козацькі вольності» в межах Речі Посполитої, що вийшла з-під контролю?'
  - '[!epistemic-humility] Ми читаємо універсали через призму знання про те, що сталося далі (Переяслав, Руїна). А як їх читали
    сучасники в 1648 році, не знаючи майбутнього?'
  section: 'Конфліктна карта: Джерело правди чи інструмент маніпуляції?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Возз''єднання» братніх народів. Хмельницький — мудрий лідер, що обрав єдиний
    правильний шлях до Москви. Універсали — це крик про допомогу до царя.'
  - 'Польський шляхетський наратив: «Зрада і бунт». Хмельницький — дикий, невдячний зрадник, що випустив джина з пляшки. Універсали
    — це популістська демагогія, що розпалила криваве повстання черні.'
  - 'Український наратив (державницька школа): «Національно-визвольна війна». Хмельницький — засновник козацької держави.
    Універсали — це установчі документи нової держави, декларації незалежності.'
  - '[!decolonization] Порівняння риторики Хмельницького в універсалах до кримського хана, московського царя і козацької маси.
    Як він «перекладає» свої цілі для різних аудиторій?'
  - '[!myth-buster] Універсали — це не лише про «боротьбу з ляхами». Аналіз анти-єврейської та анти-католицької риторики як
    інструменту мобілізації.'
  section: 'Зіткнення наративів: Повстання 1648 року'
  words: 1700
- points:
  - 'Close reading: Детальний розбір одного з перших універсалів. Структура: вступ (апеляція до Бога), основна частина (перелік
    кривд), заключна (заклик до дії).'
  - 'Риторичні прийоми: Використання релігійної мови («за віру православну»), соціальної («визволення з неволі»), історичної
    («права та вольності наші»).'
  - 'Формуляр документа: Як структура універсалу (печатка, підпис, титулатура) легітимізувала владу Хмельницького, перетворюючи
    його з бунтівника на правителя?'
  - '[!epistemic-humility] «Народ руський»: Хто це? Козаки? Селяни? Православна шляхта? Аналіз того, як значення цього терміну
    змінюється залежно від контексту універсалу.'
  - 'Що замовчано: Про що універсали НЕ говорять? Які теми Хмельницький уникає, звертаючись до мас?'
  section: 'Джерельна критика: Аналіз універсалу 1648 року'
  words: 1500
- points:
  - 'Повернення до розминки: Тепер, знаючи контекст, поясніть, чому Хмельницький міг одночасно писати і про «священну війну»,
    і про «утиски шляхти». Кому адресувався кожен меседж?'
  - 'Мета-рефлексія: Чому універсали є таким цінним, але й небезпечним джерелом для історика? Які навички «критичного читання»
    ми розвинули, аналізуючи їх?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна російська пропаганда використовує схожі риторичні прийоми (захист
    «співвітчизників», апеляція до спільної історії/віри), що й в імперських наративах про Хмельниччину?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз універсалів Богдана Хмельницького як інструментів пропаганди, легітимації влади та джерел для вивчення риторики
  і цілей повстання 1648 року.
level: ISTORIO
module: istorio-023
objectives:
- Аналізувати універсали Хмельницького як першоджерело, розрізняючи риторику, пропаганду та історичну інформацію.
- Критично порівнювати український, польський та російський/радянський наративи про Хмельниччину.
- Застосовувати методи джерельної критики для аналізу структури, мови та цільової аудиторії документів XVII століття.
- Формулювати обґрунтовану позицію щодо ролі універсалів у легітимації влади гетьмана та мобілізації населення.
