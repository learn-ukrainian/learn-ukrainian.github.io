content_outline:
- points:
  - 'Провокація: Перед вами — фрагмент листа, який гетьман Мазепа нібито написав своєму соратнику. Його знайшли в Літописі
    Самійла Величка. Чи можна довіряти цьому документу? На основі чого ви б робили висновок?'
  - '[!myth-buster] Величко — не просто літописець, а «конструктор» історії. Його праця — це архів, літературний твір і політичний
    маніфест в одному.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Величко — об''єктивний архіваріус чи бароковий автор? Одна школа (переважно позитивісти XIX ст.) бачила в ньому
    збирача документів, що прагнув до точності. Інша (модерністи, структуралісти) — письменника, що створював цілісний наратив
    із власним стилем та ідеологією.'
  - 'Дебат 2: Чи автентичні документи, що вставлені в літопис? Дискусія про «інтерполяції» (пізніші вставки). Чи були це справжні
    універсали та листи, чи їхні перекази, чи навіть фальсифікати, створені самим Величком для підсилення своєї розповіді?'
  - '[!epistemic-humility] Немає простої відповіді. Величко мав доступ до Генеральної військової канцелярії, але також жив
    у добу, коли історія була частиною літератури.'
  section: 'Конфліктна карта: Літописець чи маніпулятор?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Використовував Літопис Величка вибірково, цитуючи пасажі, що можна було трактувати
    як прагнення до «возз''єднання». Постать Величка подавалася як приклад «прогресивного» малоросійського діяча, що розумів
    неминучість єдності з Москвою.'
  - 'Український наратив: Вбачає у Величкові одного з творців національної історичної свідомості. Його опис Переяслава аналізується
    як трагічна розповідь про складний вибір, а не тріумф. Порівняння з Літописами Самовидця та Грабянки показує унікальність
    позиції Величка.'
  - 'Західний наратив (Plokhy, Kohut): Аналізує Літопис Величка як приклад «винайдення традиції». Досліджує, як барокові інтелектуали,
    подібні до Величка, формували ідею «козацького народу» та його історичних прав, часто конструюючи минуле, щоб легітимізувати
    сьогодення.'
  - '[!decolonization] Розкриття того, як імперія «привласнювала» українські джерела, перекручуючи їхній зміст для власних
    цілей.'
  section: 'Зіткнення наративів: Переяславська рада 1654 року'
  words: 1700
- points:
  - 'Close reading: Аналіз одного з універсалів Богдана Хмельницького, вставленого в літопис. Яка його мова, структура, лексика?'
  - 'Дипломатика: Порівняння тексту універсалу з іншими збереженими документами того часу. Чи відповідає він формуляру XVII
    століття? Чи є в ньому анахронізми?'
  - 'Авторський контекст: Величко — колишній канцелярист, він знав, як виглядають документи. Чи міг він їх «покращити» або
    «стилізувати» під бароковий смак?'
  - '[!epistemic-humility] Критика джерела не означає «викриття». Це спроба зрозуміти, ЯК текст був створений і ЩО він нам
    говорить про свого автора та його добу.'
  section: 'Джерельна критика: Універсали Хмельницького в тексті Величка'
  words: 1500
- points:
  - 'Повернення до розминки: Чи можна довіряти листу Мазепи? Студент має сформулювати відповідь, що враховує поняття автентичності,
    інтерполяції та авторської інтенції Величка.'
  - 'Мета-рефлексія: Що важливіше для історика — «чистий факт» чи наратив, у який він вписаний? Чи можлива історія без інтерпретації?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна російська пропаганда використовує тактику «вкидання документів»
    (фейкові накази, листи), наслідуючи старі імперські методи? Чому критичне ставлення до джерел є елементом інформаційної
    гігієни?'
  section: Дискусія та підсумок
  words: 700
focus: The chronicle of Samiylo Velychko as a masterpiece of Baroque historiography, its revolutionary use of embedded documents,
  the problem of authenticity, and its role in shaping the narrative of Cossack history.
level: ISTORIO
module: istorio-022
objectives:
- Розрізняти поняття «літопис» та «історичне джерело», аналізуючи Величка як автора, а не простого реєстратора подій.
- Застосовувати методи джерельної критики до вставлених у літопис документів, оцінюючи їх автентичність та контекст.
- Аналізувати наративну стратегію Величка на прикладі опису Переяславської ради, порівнюючи її з іншими літописами та історіографічними
  школами.
- Формулювати обґрунтовану позицію щодо ролі Літопису Величка у формуванні українського національного наративу та його використання
  в імперській/радянській пропаганді.
