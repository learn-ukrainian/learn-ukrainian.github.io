content_outline:
- points:
  - 'Провокація: У 2015 році Україна ухвалила закони про «декомунізацію». Деякі західні оглядачі назвали їх «недемократичними»
    та «такими, що розколюють суспільство». Російська пропаганда — «нацистськими». Українська влада — «відновленням історичної
    справедливості». Хто з них мав рацію?'
  - 'Цитата для роздумів: «Кожне перейменування вулиці — це не просто зміна таблички, а маленький акт екзорцизму імперії».
    Чи згодні ви з цим?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Закони про декомунізацію 2015 року. Позиція «ЗА»: це був необхідний крок для національної безпеки та розриву
    з тоталітарним минулим. Позиція «ПРОТИ»: закони були ухвалені поспішно, обмежували свободу слова та ідеалізували суперечливих
    історичних діячів, що ускладнило діалог у суспільстві.'
  - 'Дебат 2: Закон про мову 2019 року. Позиція «ЗА»: це був ключовий інструмент для зміцнення державного суверенітету та
    утвердження української мови в усіх сферах життя. Позиція «ПРОТИ»: закон був дискримінаційним щодо російськомовних громадян
    України і використовувався російською пропагандою для виправдання агресії.'
  - '[!epistemic-humility] Як розрізнити обґрунтовану критику та ворожу пропаганду, коли обидві використовують схожі аргументи
    (наприклад, про «права людини»)?'
  section: 'Конфліктна карта: Деколонізація — методи та наслідки'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: Україна — це штучне утворення, яке проводить політику «насильницької українізації»
    та «переписування спільної історії». «Ленінопад» — це варварство, а захист російської мови — це привід для «визволення».
    Методологія: виривання з контексту, маніпуляція даними, емоційний шантаж. Агенда: збереження України у своїй сфері впливу,
    заперечення її суб''єктності.'
  - 'Український наратив: Декомунізація та дерусифікація — це природний і запізнілий процес повернення до власної ідентичності
    після століть колоніального гніту. Це відновлення історичної справедливості. Методологія: опора на архівні документи про
    русифікацію, Голодомор, репресії. Агенда: побудова суверенної національної держави, інтеграція до європейського простору.'
  - 'Західний наратив: Складний і неоднорідний. Частина бачить це як легітимне право суверенної нації. Інша частина (часто
    під впливом російських інформаційних операцій або власного постколоніального досвіду) висловлює занепокоєння щодо прав
    меншин та «темпів» змін. Методологія: аналіз через призму ліберальної демократії, часто без глибокого розуміння українського
    історичного контексту. Агенда: стабільність у регіоні, дотримання формальних демократичних процедур.'
  - '[!decolonization] Розкриття механізму: як Росія використовує мову ліберальних цінностей (права людини, свобода слова)
    для просування неоімперської політики.'
  - '[!myth-buster] Міф про «розкол України» через мову. Аналіз даних, що показують добровільний перехід мільйонів російськомовних
    громадян на українську після 2014 та особливо після 2022 року.'
  section: 'Зіткнення наративів: Українська культурна політика після 2014'
  words: 1700
- points:
  - 'Близьке читання тексту закону: аналіз термінології («пропаганда», «символіка»), що саме забороняється, які винятки передбачені.'
  - 'Аналіз пояснювальної записки: які цілі декларували автори закону? Чи відповідає текст закону цим цілям?'
  - 'Контекст: аналіз стенограми засідання Верховної Ради. Які аргументи лунали «за» і «проти»? Які фракції як голосували?'
  - 'Критика Венеційської комісії: які конкретні статті викликали зауваження міжнародних експертів і чому? Як Україна відреагувала
    на цю критику?'
  - '[!epistemic-humility] Порівняння українського закону з аналогічними законами в Польщі, Литві, Німеччині. У чому схожість
    та відмінності?'
  section: 'Джерельна критика: Аналіз закону «Про засудження комуністичного та націонал-соціалістичного (нацистського) тоталітарних
    режимів»'
  words: 1500
- points:
  - 'Повернення до розминки: Чи можна тепер дати більш обґрунтовану відповідь на питання, чиєю оцінкою законів про декомунізацію
    була найближчою до істини?'
  - 'Головне питання синтезу: Чим культурний спротив після 2022 року фундаментально відрізняється від попередніх циклів (шістдесятники,
    Розстріляне відродження)? Чи є це нарешті «останнім циклом» боротьби за ідентичність?'
  - '[!decolonization] Від об''єкта історії до суб''єкта: як культурний вибух після 2022 року змінив міжнародне сприйняття
    України з жертви на активного гравця («агентність»).'
  - 'Прогноз: які ризики та умови успіху для закріплення результатів цієї культурної трансформації?'
  section: Дискусія та підсумок
  words: 700
focus: Post-2014 decolonization, 2015 decommunization laws, 2019 language law, post-2022 cultural explosion, comparison of
  historical cycles of resistance
level: ISTORIO
module: istorio-125
objectives:
- Аналізувати процеси декомунізації та деколонізації в Україні після 2014 року, розрізняючи український, російський та західний
  наративи.
- Застосовувати методи джерельної критики до аналізу текстів законів та політичної публіцистики.
- Оцінювати аргументи «за» і «проти» суперечливих законів у сфері історичної пам'яті та мовної політики.
- Формулювати обґрунтовану позицію щодо унікальності та потенційних наслідків культурної трансформації України після 2022
  року.
