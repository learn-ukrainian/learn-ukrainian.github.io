content_outline:
- points:
  - 'Провокація: Вам представлено два погляди на Чернівці початку XX ст. Один описує місто як «маленький Відень», гармонійну
    мозаїку культур. Інший — як арену прихованої боротьби за національне виживання. Який з них є австрійською імперською перспективою,
    а який — українським поглядом? Поясніть.'
  - 'Цитата для роздумів: «У Габсбурзькій монархії народам дозволяли бути, але не дозволяли ставати». Як ви розумієте цю тезу
    стосовно українців Буковини?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Золота осінь народів» чи колоніальна адміністрація? Був австрійський період (1775-1918) епохою гармонійного
    мультикультуралізму, розвитку та правової держави, чи лише ефективним управлінням етнічними напруженнями, яке консервувало
    українську бездержавність?'
  - 'Дебат 2: «Возз''єднання» чи «окупація»? Було приєднання Буковини до Румунії в 1918 році актом історичної справедливості
    (повернення румунських земель) чи агресією з подальшою політикою насильницької асиміляції (румунізації) українського населення?'
  - '[!epistemic-humility] Обидва погляди спираються на реальні факти: австрійці справді відкрили університет і дали певну
    автономію; румуни справді вважали Буковину частиною своєї історичної держави. Питання в інтерпретації та виборі доказів.'
  section: 'Конфліктна карта: Австрійський міф vs Румунська травма'
  words: 900
- points:
  - '1. Російський імперський / радянський наратив: Буковина — «ісконно русская/східнослов''янська земля», тимчасово відторгнута
    від «Батьківщини». Австрійський та румунський періоди — подвійне гноблення. Анексія 1940 року — це «возз''єднання» та
    «визволення» трудящих від капіталістичного та націоналістичного ярма.'
  - '2. Український національний наратив: Буковина — невід''ємна частина українського етнічного та історичного простору. Австрійський
    період — час культурного пробудження та формування сучасної ідентичності. Румунський період — трагедія окупації та румунізації.
    Радянська анексія — заміна одного окупанта іншим, що призвела до репресій та поділу регіону.'
  - '3. Румунський національний наратив: Буковина — історична північна частина Молдовського князівства. Українці є міноритарним
    населенням. Приєднання до Румунії в 1918 — акт національного об''єднання. Політика у міжвоєнний період розглядається як
    стандартна інтеграція.'
  - '4. Західний наратив (Post-colonial): Буковина як класичний «borderland» або «shatterzone empire». Ідентичності тут не
    є фіксованими, а плинними та ситуативними. Історія регіону — це не лінійна розповідь про «націю», а складна взаємодія
    імперських центрів, місцевих еліт та селянства.'
  - '[!decolonization] Радянський наратив про «возз''єднання» маскує акт імперської агресії, узгоджений з нацистською Німеччиною
    (Пакт Молотова-Ріббентропа).'
  - '[!myth-buster] Міф про «толерантну» австрійську імперію спростовується аналізом її політики «розділяй і володарюй», що
    нацьковувала народи один на одного.'
  section: 'Зіткнення наративів: Чия Буковина?'
  words: 1700
- points:
  - 'Джерело 1: Аналіз фрагменту австрійського перепису населення або щорічного звіту губернатора. Які категорії використовуються
    для класифікації людей (мова, релігія, етнічність)? Що ці категорії говорять про світогляд імперської бюрократії? Які
    групи є «видимими», а які «невидимими» для держави?'
  - 'Джерело 2: Аналіз статті з української газети «Буковина» міжвоєнного періоду. Як автор говорить про румунську владу —
    прямо чи езоповою мовою? Які культурні коди та історичні алюзії використовуються для мобілізації української громади?
    Як конструюється образ «свого» і «чужого» в умовах цензури?'
  - '[!epistemic-humility] Обидва джерела є упередженими. Завдання історика — не прийняти одне і відкинути інше, а зрозуміти,
    як і чому кожне з них створює свою версію реальності.'
  section: 'Джерельна критика: Чернівці на папері'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер, після аналізу наративів та джерел, ви можете деконструювати міф про «маленький Відень»?
    Чия це пам''ять, і хто її конструював?'
  - 'Спадщина поділу: Як історія Буковини як прикордоння впливає на її сучасний стан (Чернівецька область в Україні та повіт
    Сучава в Румунії)? Чи є кордон лише лінією на карті, чи ментальним розломом?'
  - '[!decolonization] Як розуміння історії Буковини допомагає нам розпізнавати сучасні російські імперські наративи про «історичні
    землі» та «захист населення»?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiography of Bukovyna: deconstruction of the "Austrian multicultural myth," comparison of Ukrainian, Romanian,
  and Soviet/Russian narratives of the region, analysis of primary sources on identity and assimilation.'
level: ISTORIO
