objectives:
- Аналізувати історію Буковини крізь призму конкуруючих імперських та національних наративів
- Розрізняти методології та виявляти упередження в українських, румунських, радянських та західних історичних джерелах
- Критично оцінювати міф про «австрійську мультикультурну ідилію» та його політичне використання
- Застосовувати навички джерельної критики до аналізу автентичних історичних текстів
