content_outline:
- points:
  - 'Провокація: "Всі українці допомагали нацистам" vs "Всі українці рятували євреїв". Два фрагменти свідчень без авторства
    — одне про жорстокість допоміжної поліції, друге про порятунок ціною власного життя. Який з них краще описує реальність?
    Чи можливо, що обидва є правдою?'
  - '[!myth-buster] Міф про "однорідну" реакцію. Чому спрощення — головний ворог розуміння Голокосту?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Хто йшов в українську допоміжну поліцію? Аналіз мотивацій: ідеологічний антисемітизм, кар''єризм, прагнення
    вижити, примус. Чи можна відокремити злочинця від його соціального контексту?'
  - 'Дебат 2: ОУН і євреї. Як узгодити антисемітські тексти організації, участь окремих членів у погромах 1941 р. та пізніші
    випадки порятунку і накази не брати участі в акціях нацистів? Це еволюція позиції чи внутрішня суперечність?'
  - '[!epistemic-humility] Дискусія про терміни: "колаборація" vs "співучасть". У чому різниця і чому це важливо для історичної
    оцінки?'
  section: 'Конфліктна карта: Мотиви та відповідальність'
  words: 900
- points:
  - 'Російський радянський наратив: Фокус на "українських буржуазних націоналістах" як головних поплічниках фашистів. Замовчування
    участі росіян. Розчинення єврейських жертв у загальному понятті "мирних радянських громадян". Агенда: перекласти відповідальність,
    представити український національний рух як злочинний.'
  - 'Український наратив (пост-1991): Акцент на Україні як на окупованій території без власної держави. Визнання злочинів
    окремих колаборантів. Одночасне вшанування Праведників (понад 2700). Контекстуалізація дій ОУН. Агенда: формування складної
    національної пам''яті, що включає і ганьбу, і гордість.'
  - 'Західний наратив (Снайдер, Гімка, Беркгофф): Концепція "подвійної окупації". Аналіз "Голокосту від куль" як специфічної
    риси Східного фронту. Дослідження мікро-мотивів на рівні окремих громад та індивідів. Агенда: академічне розуміння без
    національних апріорі.'
  - '[!decolonization] Як радянський наратив досі використовується в сучасній російській пропаганді для виправдання агресії
    ("денацифікація")?'
  section: 'Зіткнення наративів: Українці у Голокості'
  words: 1700
- points:
  - 'Джерело 1: Аналіз спогадів єврейського партизана про співпрацю місцевого населення з нацистами. Ідентифікація автора,
    його ідеологічної позиції, можливих упереджень. Що його розповідь підтверджує, а що ставить під сумнів?'
  - 'Джерело 2: Аналіз щоденника українського селянина, що переховував єврейську родину. Аналіз мови, щоденних страхів, мотивації.
    Чи можна вважати його "типовим"?'
  - 'Методологія: Як історики працюють з такими суперечливими особистими свідченнями? Процес верифікації. Небезпека "cherry-picking"
    — вибіркового цитування для підтвердження власної позиції.'
  - '[!epistemic-humility] Обмеженість джерел: чому ми ніколи не будемо знати точної кількості ані злочинців, ані рятівників?'
  section: 'Джерельна критика: Голоси з безодні'
  words: 1500
- points:
  - 'Повернення до розминки: Студент дає розгорнуту відповідь на початкове питання, використовуючи концепції "агентність",
    "структурний тиск", "подвійна окупація".'
  - 'Ключовий висновок: Злочини та подвиги скоювали не "українці" як колектив, а конкретні люди в конкретних обставинах. Завдання
    історика — зрозуміти ці обставини.'
  - '[!decolonization] Як пам''ять про Голокост стала частиною української національної ідентичності після 1991 року, витісняючи
    радянську версію?'
  - 'Зв''язок із сьогоденням: Чи допомагає розуміння складності Голокосту краще аналізувати сучасні воєнні злочини та реакцію
    на них?'
  section: Дискусія та підсумок
  words: 700
focus: 'Історіографія Голокосту в Україні: радянські, українські та західні наративи про колаборацію та порятунок'
level: ISTORIO
module: istorio-119
objectives:
- Аналізувати та порівнювати радянський, сучасний український та західний наративи про Голокост в Україні
- Розрізняти поняття "співучасть" та "колабораціонізм", застосовуючи їх до конкретних історичних ситуацій
- Критично оцінювати первинні джерела (свідчення, щоденники), враховуючи позицію автора та історичний контекст
- Формулювати власну аргументовану позицію щодо ролі українців у Голокості, уникаючи спрощених оцінок
