content_outline:
- points:
  - 'Провокація: Ангела Меркель у 2022 році назвала своє рішення 2008 року не надавати Україні ПДЧ «правильним». Кондоліза
    Райс назвала його «катастрофічною помилкою, що заохотила Путіна». Хто з них має рацію, і чому?'
  - 'Цитата без автора: «Ми не могли прийняти Україну в НАТО, бо це корумпована, внутрішньо розколота країна, не готова до
    членства». Хто це сказав: критик в ЄС, російський пропагандист, чи український опозиціонер?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи було ненадання ПДЧ спробою «не провокувати Росію» (умиротворення) чи реалістичною оцінкою неготовності України
    (прагматизм)?'
  - 'Дебат 2: Чи є розширення НАТО загрозою для Росії, чи гарантією стабільності в Європі? Аналіз двох парадигм міжнародних
    відносин: реалізму та лібералізму.'
  - '[!epistemic-humility] Аргумент «за»: надання ПДЧ слабкій Україні могло б змусити НАТО воювати за неї, до чого Альянс
    не був готовий. Аргумент «проти»: відмова показала слабкість і дала Росії зелене світло.'
  section: 'Конфліктна карта: Стримування vs. Умиротворення'
  words: 900
- points:
  - 'Російський імперський наратив: "НАТО — агресивний блок, що прагне оточити Росію. Розширення на схід — це порушення обіцянок
    Заходу і екзистенційна загроза. Україна в НАТО — червона лінія".'
  - 'Український наратив: "НАТО — єдина гарантія суверенітету та безпеки від російського імперіалізму. ПДЧ — технічний крок
    до інтеграції. Відмова — зрада західних партнерів та заохочення агресора".'
  - 'Західний наратив (розколотий): позиція США/Східної Європи ("Треба прийняти Україну, щоб стримати Росію") vs. позиція
    Німеччини/Франції ("Не треба дратувати Росію, це дестабілізує континент").'
  - '[!decolonization] Аналіз мови: російська риторика про «сфери впливу» і «братські народи» як інструмент заперечення суб''єктності
    України. Західна риторика про «провокації» як несвідоме прийняття російської рамки.'
  - '[!myth-buster] "Обіцянка не розширювати НАТО": розбір міфу. Юридичний аналіз угод кінця Холодної війни.'
  section: 'Зіткнення наративів: Бухарестський саміт'
  words: 1700
- points:
  - 'Аналіз фінального комюніке саміту: формула «Україна і Грузія стануть членами НАТО», але без ПДЧ. Як ця дипломатична неоднозначність
    була прочитана в Києві, Москві та Вашингтоні?'
  - 'Порівняльний аналіз мемуарів: Кондолізи Райс («No Higher Honor»), Ніколя Саркозі («Le Temps des Tempêtes»), Ангели Меркель.
    Як кожен з них виправдовує свою позицію в Бухаресті?'
  - Читання аналітичних звітів 2008-2009 років (Chatham House, RAND, Carnegie Endowment). Чи передбачали експерти війну в
    Грузії та Україні як наслідок рішення саміту?
  - '[!epistemic-humility] Вивчення того, як історики використовують особисті спогади політиків — не як об''єктивне джерело,
    а як доказ їхньої мотивації, світогляду та спроб сформувати власну спадщину.'
  section: 'Джерельна критика: Мемуари, комюніке, прогнози'
  words: 1500
- points:
  - 'Повернення до розминки: озброївшись знаннями з модуля, студент формулює власну відповідь на питання про правоту Меркель
    та Райс.'
  - 'Симуляція: якби Україна отримала ПДЧ у 2008 році, чи це б відвернуло агресію 2014 та 2022 років, чи прискорило б її?'
  - 'Зв''язок із сьогоденням: як досвід Бухареста впливає на сьогоднішні дебати про вступ України до НАТО? Які уроки були
    засвоєні, а які — ні?'
  - '[!decolonization] Роздуми про те, як рішення, прийняті в кабінетах західних столиць, безпосередньо впливають на життя
    мільйонів українців. Концепція «агентності» та її відсутності у великій геополітиці.'
  section: Дискусія та підсумок
  words: 700
focus: The 2008 Bucharest NATO summit's decision to deny MAP to Ukraine and Georgia, analyzing the clash of narratives between
  Ukrainian aspirations, Russian pressure, and Western appeasement.
level: ISTORIO
module: istorio-100
objectives:
- Аналізувати причини та наслідки рішення Бухарестського саміту НАТО 2008 року щодо України.
- Розрізняти та деконструювати російський, український та західний наративи стосовно розширення НАТО.
- Застосовувати методи джерельної критики до аналізу політичних мемуарів та офіційних документів.
- Оцінювати історичне значення «вето на безпеку» в контексті російської агресії 2008, 2014 та 2022 років.
pedagogy: CBI
