content_outline:
- points:
  - 'Провокація: Дві цитати одного митця — одна з офіційної промови, інша з приватного щоденника. Де справжня людина? Що таке
    «вижити» в умовах тоталітарного режиму?'
  - 'Загадка: «Дозволене» про «заборонене» — як мистецтво може говорити про свободу, не вживаючи цього слова? Наведіть приклад.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Стратегія «подвійного життя» — це мудрий компроміс для збереження нації чи форма колабораціонізму, що легітимізувала
    режим?'
  - 'Дебат 2: «Езопова мова» — це ефективний інструмент опору чи самообман інтелігенції, незрозумілий для мас і безпечний
    для влади?'
  - '[!epistemic-humility] Позиція 1 (Прагматична): Головне — фізичне виживання нації, культурні компроміси були неминучі.
    Позиція 2 (Принципова): Будь-який компроміс із тоталітаризмом є поразкою і розмиває моральні орієнтири.'
  section: 'Конфліктна карта: Компроміс чи колаборація?'
  words: 900
- points:
  - '1. Радянський наратив: Дисенти — це «відщепенці», «купка божевільних», «агенти ЦРУ». Їхня «творчість» — антирадянська
    пропаганда. Культурний опір — неіснуюче явище, є лише поодинокі кримінальні злочини.'
  - '2. Український наратив: Культурна резистенція — це безперервна традиція національно-визвольних змагань. Самвидав, УГКЦ,
    правозахисний рух — це три гілки єдиного процесу опору тоталітарній системі. [!decolonization]'
  - '3. Західний наратив: Спочатку фокус на «порушеннях прав людини в СРСР», де українські дисиденти є частиною «загальнорадянського»
    руху. Пізніше — визнання унікальності українського опору та аналіз через постколоніальні студії. [!myth-buster]'
  - 'Методологія та Агенда: Радянська (доповідні КДБ для легітимізації репресій), Українська (самвидав, спогади для конструювання
    тяглості боротьби), Західна (офіційні документи, інструменталізація в Холодній війні).'
  section: 'Зіткнення наративів: Дисидентський рух'
  words: 1700
- points:
  - 'Джерело 1: Фрагмент статті В''ячеслава Чорновола з журналу «Український вісник». Аналіз мови, аргументації, цільової
    аудиторії.'
  - 'Джерело 2: Фрагмент аналітичної записки КДБ про «Український вісник». Як спецслужби «читали» самвидав? Які загрози вони
    бачили? Яка лексика використовується для опису авторів та ідей?'
  - 'Авторський аналіз: Чорновіл — журналіст, політв''язень. Хто автори звіту КДБ? Їхня освіта, кар''єрні мотиви. Як це впливає
    на текст?'
  - '[!epistemic-humility] Де «правда»? Чи є звіт КДБ в чомусь більш «об''єктивним» (наприклад, в оцінці масштабів поширення),
    ніж текст Чорновола? Чи можна довіряти самооцінці дисидентів?'
  section: 'Джерельна критика: Самвидав vs Архів КДБ'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви оцінюєте дві цитати? Чи була стратегія «подвійного життя» єдино можливою?'
  - 'Мета-рефлексія: Чому радянська історіографія замовчувала культурний опір, а західна — довго не розуміла його національного
    характеру?'
  - '[!decolonization] Як сьогоднішні дискусії про «хороших рускіх» та ціну компромісу з агресором продовжують дебати, що
    велися в дисидентських колах?'
  - 'Підсумок: Культурна резистенція — це не лише про збереження ідентичності, але й про створення смислів та мереж, що уможливили
    появу громадянського суспільства в 1991 році.'
  section: Дискусія та підсумок
  words: 700
focus: Cultural resistance strategies (Aesopian language, samvydav, UGCC underground), historiographical debates on accommodation
  vs. confrontation, comparing Ukrainian, Soviet, and Western narratives of dissent.
level: ISTORIO
module: istorio-126
objectives:
- Аналізувати різні стратегії культурного спротиву в умовах тоталітарного режиму (компроміс, езопова мова, самвидав, підпілля).
- Критично порівнювати радянський, український та західний наративи про дисидентський рух.
- Застосовувати методи джерельної критики для аналізу історіографічних текстів та документів спецслужб.
- Формулювати власну аргументовану позицію щодо моральних дилем та ефективності різних стратегій виживання.
