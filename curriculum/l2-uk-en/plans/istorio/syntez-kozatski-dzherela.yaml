content_outline:
- points:
  - 'Провокація: два описи однієї події з козацької історії, взятих з українського та російського джерел. Чи зможете ви визначити,
    де чий наратив, і пояснити, за якими маркерами?'
  - 'Цитата історика: «Козацькі літописи — це не стільки дзеркало епохи, скільки сцена, на якій розігрується драма легітимації
    влади». Що означає ця теза?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Державницька» школа vs «народницька» школа історіографії. Чия історія є «справжньою» історією Гетьманщини —
    історія рішень старшини чи історія повсякденного життя рядових козаків і селян?'
  - 'Дебат 2: Джерело як факт vs джерело як артефакт. Чи маємо ми довіряти літописам як правдивому опису подій, чи аналізувати
    їх як політичні тексти, що переслідують певну мету?'
  - '[!epistemic-humility] Розгляд літописів Самовидця, Грабянки та Величка не як «хронік», а як конкуруючих політичних проєктів
    кінця XVII — початку XVIII ст.'
  section: 'Конфліктна карта: Історія гетьманів чи історія народу?'
  words: 900
- points:
  - '1. Російський імперський / радянський наратив: Гетьманщина як «Малоросія», частина «триєдиного русского народу». Агенда:
    заперечення української суб''єктності, легітимація анексії. Сліпа пляма: внутрішні соціальні та політичні процеси в Гетьманщині.'
  - '2. Український державницький наратив: Гетьманщина як козацька республіка, спадкоємиця Русі, етап українського державотворення.
    Агенда: довести безперервність та самостійність української історії. Сліпа пляма: ідеалізація старшини, замовчування соціальних
    конфліктів.'
  - '3. Польський шляхетський наратив: Гетьманщина як «бунтівні креси», «дике поле». Агенда: виправдання спроб повернути контроль
    над українськими землями. Сліпа пляма: ігнорування соціальних та релігійних причин повстань.'
  - '[!decolonization] Аналіз того, як кожен наратив використовує, ігнорує або перекручує ті самі події (наприклад, Переяславську
    раду або постать Івана Мазепи).'
  - '[!myth-buster] Деконструкція міфу про «віковічну дружбу» чи «віковічну ворожнечу» — показ того, що стосунки між народами
    були динамічними та ситуативними.'
  section: 'Зіткнення наративів: Гетьманщина у трьох дзеркалах'
  words: 1700
- points:
  - 'Домінантний голос: козацька старшина. Літописи відображають її інтереси, цінності та погляд на світ. Як це впливає на
    те, що ми знаємо про минуле?'
  - 'Замовчані голоси: де в джерелах голос рядового козака, селянина, жінки, міщанина? Методи реконструкції «історії знизу»:
    аналіз судових справ, скарг, фольклору.'
  - 'Приклад: аналіз Універсалу гетьмана. Чийого голосу в ньому більше — гетьмана, генерального писаря чи колективного «війська
    запорізького»?'
  - '[!epistemic-humility] Практикум з просопографії: відтворення біографій десятка рядових козаків з одного полку для розуміння
    соціальної структури та мобільності.'
  section: 'Джерельна критика: Хто говорить у козацьких літописах?'
  words: 1500
- points:
  - 'Повернення до розминки: Які нові інструменти аналізу джерел ви тепер маєте для ідентифікації наративів?'
  - 'Мета-рефлексія: Чому важливо питати не тільки «Що сталося?», а й «Хто розповідає історію і навіщо?»'
  - '[!decolonization] Зв''язок із сьогоденням: Як знання про історіографічні наративи допомагає розпізнавати сучасну російську
    пропаганду про Україну?'
  - 'Підсумковий синтез: Створення власного «чек-листа для критики джерела» на основі матеріалів модуля.'
  section: Дискусія та підсумок
  words: 700
focus: 'Критика козацьких історичних джерел: літописів, документів, листів. Порівняльний аналіз українського, польського та
  російського наративів про ті самі події. Виявлення домінантних голосів (старшина) та реконструюція голосів субалтернів (рядове
  козацтво, селяни, жінки).'
level: ISTORIO
module: istorio-028
objectives:
- Розрізняти домінантні та субалтерні голоси в історичних джерелах козацької доби.
- Критично аналізувати козацькі літописи як політичні та ідеологічні тексти, а не лише як хроніки подій.
- Порівнювати та деконструювати український, російський та польський наративи про Гетьманщину.
- Застосовувати базові методи джерельної критики та реконструкції для аналізу історичних текстів.
