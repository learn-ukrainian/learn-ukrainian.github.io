content_outline:
- points:
  - 'Провокація: Термін «українське питання» виник в імперському XIX столітті. Чи вирішене це питання сьогодні, чи просто
    змінило форму? Чия це взагалі проблема: України, Росії, Європи чи всього світу?'
  - 'Цитата для роздумів: «Майбутнє Росії вирішується в Україні». Обговоріть, що ця фраза може означати з точки зору історика.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Що є головним викликом для України — спадщина російського імперіалізму чи труднощі євроінтеграції? Позиція А:
    Без подолання імперського тиску інтеграція неможлива. Позиція Б: Без стандартів ЄС подолати пострадянську спадщину неможливо.'
  - '[!epistemic-humility] Дебат 2: Україна — це унікальний історичний прецедент чи модель для глобальної деколонізації XXI
    століття? Позиція А: Український досвід є sui generis через тисячолітню історію з Росією. Позиція Б: Українська боротьба
    пропонує універсальний інструментарій для інших націй, що звільняються від імперського впливу.'
  section: 'Конфліктна карта: Виклики та прецеденти'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Україна як «історична помилка», «невід''ємна частина русского мира». Методологія:
    вибіркове цитування спільних історичних епізодів, ігнорування періодів незалежності. Агенда: легітимізація агресії, заперечення
    української суб''єктності. Сліпі плями: вся історія українського національно-визвольного руху.'
  - 'Український наратив: Україна як неперервна державна традиція від Русі до сьогодення, жертва імперіалізму, форпост Європи.
    Методологія: акцент на джерелах, що підтверджують окремішність, фокус на визвольних змаганнях. Агенда: обґрунтування суверенітету,
    мобілізація суспільства. Сліпі плями: складні внутрішні конфлікти, періоди колабораціонізму.'
  - '[!decolonization] Західний наратив: Україна як «буферна зона», «об''єкт геополітики», а згодом — як «прецедент для міжнародного
    права». Методологія: аналіз з позицій realpolitik, міжнародних відносин, права. Агенда: збереження стабільності, підтримка
    міжнародного порядку. Сліпі плями: довгий час ігнорування української агентності, розгляд України через російську оптику.'
  - '[!myth-buster] Наратив «Глобального Півдня»: Україна як арена «проксі-війни» між США та Росією. Методологія: постколоніальна
    критика, фокус на економічних інтересах. Агенда: обґрунтування нейтралітету, критика «західного гегемонізму». Сліпі плями:
    заперечення агентності самої України та її права на самовизначення.'
  section: 'Зіткнення наративів: Україна у світових наративах'
  words: 1700
- points:
  - 'Аналіз джерела 1: Стаття Тімоті Снайдера. Хто автор (академічний історик)? Яка його інституційна приналежність (Єльський
    університет)? Доступ до яких архівів він має? Яка його методологія (транснаціональна історія, історія ідей)?'
  - 'Аналіз джерела 2: Стаття Владіміра Путіна «Про історичну єдність росіян та українців». Хто автор (політичний лідер)?
    Яка його мета (обґрунтування політики)? Які джерела він використовує (вибіркові, часто вирвані з контексту)? Яка методологія
    (відсутня, замінена ідеологічними постулатами)?'
  - '[!epistemic-humility] Порівняння: Як обидва тексти використовують історію для аргументації? Де закінчується аналіз і
    починається політика? Як верифікувати їхні твердження?'
  section: 'Джерельна критика: Хто і як пише історію сьогодні'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, «українське питання» — це питання про що? Про кордони? Про ідентичність? Про право? Сформулюйте
    власну відповідь, використовуючи поняття «наратив», «агентність», «суб''єктність».'
  - '[!decolonization] Мета-рефлексія: Як аналіз різних наративів допомагає зрозуміти не тільки минуле, а й сучасні новини,
    пропаганду та політичні заяви? Наведіть приклади.'
  - 'Зв''язок із сьогоденням: Відповідь на «українське питання» пишеться прямо зараз на полі бою та в міжнародній дипломатії.
    Яку роль у цьому процесі відіграє історія та її інтерпретації?'
  section: Дискусія та підсумок
  words: 700
