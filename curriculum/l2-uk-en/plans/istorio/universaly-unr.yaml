content_outline:
- points:
  - 'Провокація: Уявіть, що ви читаєте два анонімні коментарі до Першого Універсалу. Один називає його «боягузливим кроком
    назад», інший — «мудрим і зваженим рішенням». Який коментар, на вашу думку, належить українському діячу, а який — російському?
    Чому?'
  - 'Цитата-загадка: «Не одділяючись від всієї Росії… хай буде Україна вільною». Що це — проголошення незалежності чи декларація
    про наміри залишитися у складі Росії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Центральна Рада — федералісти чи державники? Одні історики (переважно радянські) стверджують, що лідери УНР
    панічно боялися незалежності і до останнього чіплялися за ідею федерації. Інші (державницька школа) доводять, що федералізм
    був лише тактичним ходом для накопичення сил.'
  - 'Дебат 2: Коли був пройдений «пункт неповернення»? Що стало вирішальним для проголошення IV Універсалу — більшовицький
    переворот у Петрограді чи початок відкритої агресії Раднаркому проти УНР? Розглядаємо аргументи обох сторін.'
  - '[!epistemic-humility] Чи можна взагалі застосовувати терміни ХХІ століття («сепаратизм») до політичних реалій 1917 року,
    коли сама імперія розвалилася, а концепт національної держави ще не був домінуючим у регіоні?'
  section: 'Конфліктна карта: Федералізм чи сепаратизм?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Центральна Рада — це «купка буржуазних націоналістів», що не мала підтримки
    народу і намагалася «розчленувати єдину й неподільну Росію» на гроші німецького Генштабу. Універсали — нелегітимні акти
    сепаратизму. Агентність: зовнішні вороги (Німеччина). Сліпа пляма: масова підтримка УЦР на початковому етапі.'
  - '[!decolonization] Український наратив (державницька школа): Універсали — це вимушені, але послідовні кроки до відновлення
    державності. Еволюція від автономії до незалежності була логічною реакцією на розпад імперії та агресію сусідів. Це історія
    про дорослішання нації та її політичної еліти. Агентність: український народ та його лідери. Сліпа пляма: глибокі соціальні
    та ідеологічні конфлікти всередині самого українського руху.'
  - 'Західний наратив: Часто розглядає Українську революцію як локальний епізод «великої» Російської революції. Фокусується
    на соціалістичних аспектах Універсалів та боротьбі УНР проти більшовиків як на одному з фронтів громадянської війни. [!myth-buster]
    Багато західних істориків, слідом за радянською пропагандою, недооцінювали рівень національної свідомості та прагнення
    до незалежності.'
  section: 'Зіткнення наративів: Еволюція до незалежності'
  words: 1700
- points:
  - 'Перший та Другий Універсали: Аналіз лексики. Чому використовуються обережні формулювання «автономія», «порядок на Україні»,
    «не одділяючись від Росії»? Які юридичні та політичні «лазівки» залишали собі автори? Про що свідчить сам факт компромісу
    (Другий Універсал)?'
  - 'Третій Універсал: Проголошення Української Народної Республіки, але у федеративному зв''язку з Росією. Що це за оксюморон?
    Аналізуємо, як цей текст намагається поєднати непоєднуване — суверенність і федерацію — і для якої аудиторії це було написано.'
  - '[!epistemic-humility] Четвертий Універсал: «Самостійна, ні від кого незалежна... держава». Аналізуємо не тільки те, що
    сказано, а й те, про що мовчать. Чому поряд із декларацією незалежності йде розлогий перелік соціалістичних реформ (соціалізація
    землі)? Як це відображає ідеологічний бекграунд авторів та їхню спробу перехопити гасла у більшовиків?'
  section: 'Джерельна критика: Тексти Універсалів як історичне джерело'
  words: 1500
- points:
  - 'Повернення до розминки: Тепер, знаючи контекст, як би ви відповіли на питання, чому УЦР не проголосила незалежність у
    березні 1917? Сформулюйте відповідь, використовуючи поняття «історичний горизонт можливостей».'
  - 'Мета-рефлексія: Чого нас вчить історія Універсалів про природу державотворення? Це одномоментний акт чи тривалий процес?
    Як мова документів (від обережних прохань до ультимативних декларацій) відображає цей процес?'
  - '[!decolonization] Зв''язок із сьогоденням: Порівняйте риторику Універсалів із риторикою Декларації про державний суверенітет
    (1990) та Акту проголошення незалежності (1991). Які історичні уроки 1918 року були враховані у 1991, а які — ні?'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical debate on the Central Rada's path to independence; comparison of Ukrainian vs. Soviet vs. Western
  narratives on the evolution from autonomy to sovereignty; source criticism of the Four Universals.
level: ISTORIO
module: istorio-034
objectives:
- Аналізувати еволюцію української політичної думки від автономії до незалежності на прикладі Універсалів УЦР.
- Критично оцінювати тексти Універсалів як історичні джерела, виявляючи їхні ідеологічні та політичні контексти.
- Розрізняти та порівнювати український, російсько-радянський та західний наративи про Українську революцію.
- Застосовувати базові методи джерельної критики для аналізу політичних документів.
