content_outline:
- points:
  - 'Провокація: Вам представлено два короткі, анонімні описи облоги Києва 1240 року. Один — трагічний, інший — буденний.
    Який з них належить київському літописцю, а який — написаний через 200 років у Москві? Поясніть свою логіку.'
  - 'Цитата для роздумів: "Літопис — це не дзеркало, що відображає минуле, а молоток, яким його формують". Як ви розумієте
    цю тезу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Звідки пішла Русь? Норманістська теорія (покликання варягів як заснування держави) проти антинорманістської
    (слов''янський автохтонний розвиток). Як одна й та сама фраза з "Повісті временних літ" стає доказом для протилежних теорій?'
  - 'Дебат 2: Що таке "критика джерела"? Зовнішня критика (чи автентичний документ? коли написаний?) vs внутрішня критика
    (чи можна довіряти автору? яка його мета?). Приклад: дискусія про автентичність "Слова о полку Ігоревім".'
  - '[!epistemic-humility] Жодна з позицій не є абсолютно "правильною". Важливо розуміти, як вибір методологічної рамки визначає
    висновки історика.'
  section: 'Конфліктна карта: Норманісти vs Антинорманісти'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Концепція єдиного "давньоруського народу" та прямої лінії спадкоємності "Київ
    → Володимир → Москва". Літописи редагуються та інтерпретуються для підтримки схеми "возз''єднання земель". Методологія:
    текстологічний позитивізм (пошук "первинного" тексту), ігнорування регіональних відмінностей. Агенда: легітимація імперського
    центру.'
  - 'Український наратив (школа Грушевського): Київська Русь як унікальна спадщина українського народу, відмінна від Володимиро-Суздальської
    традиції. Акцент на південних літописах (Галицько-Волинський). Методологія: народницький підхід, пошук безперервності
    етнокультурного розвитку. Агенда: обґрунтування права українців на власну державу.'
  - 'Західний наратив: Розглядає Русь як одну з багатьох середньовічних "periphery" політій. Аналіз джерел як політичних документів
    свого часу, що відображають інтереси еліт, а не як "національних епосів". Методологія: компаративістика, структуралізм.
    Агенда: деконструкція національних міфів, академічна об''єктивність.'
  - '[!decolonization] Розвінчання міфу про "спільну колиску" як інструменту імперського панування.'
  - '[!myth-buster] "Повість временних літ" — це не єдиний текст, а компіляція різних, часто суперечливих, джерел.'
  section: 'Зіткнення наративів: Кому належить Київська Русь?'
  words: 1700
- points:
  - 'Практикум з історіографії: порівнюємо, як Михайло Грушевський ("Історія України-Руси") та радянський історик Борис Греков
    ("Київська Русь") аналізують ОДИН І ТОЙ САМИЙ фрагмент літопису про повстання смердів.'
  - 'Аналіз методу Грушевського: на що він звертає увагу? Які слова використовує? Як його народницька позиція впливає на інтерпретацію?
    Кого він бачить "агентом" історії?'
  - 'Аналіз методу Грекова: як його марксистсько-ленінська оптика (класова боротьба) змушує його читати той самий текст абсолютно
    інакше? Які аспекти він підкреслює, а які ігнорує?'
  - '[!epistemic-humility] Студент вчиться застосовувати методи критики джерел не до літописів, а до самих істориків, розглядаючи
    їхні праці як продукти свого часу та ідеології.'
  section: 'Джерельна критика: Читаючи істориків як джерела'
  words: 1500
- points:
  - 'Повернення до розминки: Тепер, озброївшись знаннями про історіографічні школи, повторно проаналізуйте два описи облоги
    Києва. Які маркери вказують на "імперський" чи "національний" наратив?'
  - 'Мета-рефлексія: Що таке "історичний факт"? Чи існує він поза інтерпретацією? Сформулюйте власний чек-ліст для аналізу
    будь-якого історичного тексту (від літопису до статті у Вікіпедії).'
  - '[!decolonization] Зв''язок із сьогоденням: Проаналізуйте сучасну промову політика (напр., Путіна) про історію України.
    Знайдіть у ній відгомін наративів, проаналізованих у цьому модулі. Як знання історіографії допомагає протистояти пропаганді?'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical methods (source criticism, textology, comparative analysis), challenges in medieval source studies,
  and a comparative analysis of Russian imperial, Soviet, and Ukrainian approaches to chronicle studies.
level: ISTORIO
module: istorio-018
objectives:
- Застосовувати базові методи джерельної критики (зовнішньої та внутрішньої) до середньовічних текстів
- Порівнювати та протиставляти ключові тези російської імперської, радянської та української історіографічних шкіл щодо походження
  та характеру Русі
- Аналізувати праці істориків (напр., Грушевського) як самостійні історичні джерела, враховуючи їхній контекст та методологію
- Виявляти використання історичних наративів у сучасній політичній пропаганді
