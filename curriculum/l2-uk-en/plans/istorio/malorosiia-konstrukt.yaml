content_outline:
- points:
  - 'Провокація: один документ XVIII ст. називає територію «Малоросією», інший — «Україною». Чи це синоніми? Чому вибір слова
    був політичним актом?'
  - 'Цитата для роздумів: «Назва — це не опис, а команда». Як ця теза стосується історії України?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Мала Русь» — нейтральний візантійський термін для центру держави чи імперський інструмент приниження? Позиція
    1: Церковний, географічний термін, аналогічний «Малій Греції». Позиція 2: Політичний конструкт, що нав''язував ідею «молодшого
    брата».'
  - 'Дебат 2: «Триєдиний народ» — наукова теорія чи ідеологічне обґрунтування асиміляції? Позиція 1 (Погодін): об''єктивна
    етнічна реальність. Позиція 2 (Костомаров): штучна схема для заперечення української самобутності.'
  - '[!epistemic-humility] Як один і той самий термін може мати кардинально різні значення залежно від історичного контексту
    та того, хто його використовує?'
  section: 'Конфліктна карта: Географія чи політика?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: «Малоросія» — історична назва південної частини єдиної Русі. Малороси — гілка
    єдиного російського народу. Назва підкреслює єдність. Методологія: державницька, централізована, ігнорує місцеві відмінності.
    Агенда: легітимізація влади Москви.'
  - 'Український національний наратив: «Малоросія» — колоніальна назва, нав''язана ззовні для стирання власної ідентичності
    та історії. Заміна самоназви «Україна» є актом лінгвоциду. Методологія: народницька, акцент на самосвідомості, культурі,
    мові. Агенда: обґрунтування права на власну державу.'
  - '[!decolonization] Західний наратив (постколоніальні студії): Випадок «Малоросії» розглядається як класичний приклад «imperial
    naming» — практики, де імперія дає назви колонізованим територіям, щоб інтегрувати їх у свій простір і позбавити суб''єктності.'
  - '[!myth-buster] Міф про те, що «Малоросія» завжди була зневажливою назвою. У ранній період вона могла вживатися нейтрально,
    але імперська політика XVIII-XIX ст. надала їй остаточного колоніального забарвлення.'
  section: 'Зіткнення наративів: «Малоросія» в історіографії'
  words: 1700
- points:
  - 'Аналіз 1: Уривок з листа М. Погодіна до С. Уварова. Як автор «науково» обґрунтовує концепцію «триєдиного народу»? Які
    риторичні прийоми він використовує, щоб представити українців як частину російського народу?'
  - 'Аналіз 2: Текст Емського указу 1876 року. Як теоретичні конструкції (Погодін) перетворюються на репресивну державну політику?
    Які конкретні заборони щодо української мови («малорусского наречия») вводяться і як це пов''язано з боротьбою проти назви
    «Україна»?'
  - '[!epistemic-humility] Розглядаємо, хто фінансував Погодіна, в якому інституті він працював, і як це могло вплинути на
    його «наукові» висновки. Джерельна критика як інструмент проти маніпуляцій.'
  section: 'Джерельна критика: Тексти, що творили реальність'
  words: 1500
- points:
  - 'Повернення до розминки: Студент тепер може аргументовано пояснити, чому вибір між «Малоросією» та «Україною» у XVIII
    ст. був принциповим політичним вибором.'
  - 'Мета-рефлексія: Чому імперіям так важливо контролювати назви? Як боротьба за назву є боротьбою за право на існування?'
  - '[!decolonization] Зв''язок із сьогоденням: Аналіз сучасної російської пропаганди про «Новоросію». Як логіка та риторика,
    використані для створення міфу про «Малоросію», відтворюються сьогодні? Чому цей наратив виявився таким живучим?'
  section: Дискусія та підсумок
  words: 700
