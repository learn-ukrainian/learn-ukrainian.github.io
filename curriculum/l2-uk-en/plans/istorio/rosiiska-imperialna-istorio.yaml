content_outline:
- points:
  - 'Провокація: два тексти описують одну й ту саму подію — Переяславську раду 1654 року. Один — як «возз’єднання братніх
    народів», інший — як «тимчасовий військовий союз». Не знаючи автора, спробуйте визначити, де українська версія, а де російська.
    На чому ґрунтується ваше припущення?'
  - 'Ключове питання: чи може історія бути об''єктивною, коли вона стає інструментом державної ідеології?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Теорія Погодіна (великоросійське походження населення Київщини після монголів) vs. концепція Грушевського (пряма
    й безперервна спадкоємність українського етносу на своїй землі).'
  - 'Дебат 2: "Возз''єднання" 1654 року — добровільний акт чи анексія? Аналіз термінології ("під руку царя") та юридичних
    інтерпретацій договору в різних історіографіях.'
  - '[!epistemic-humility] Джерела (літописи, договори) — ті самі, але методологія інтерпретації (філологічна, юридична, ідеологічна)
    різна. Вчимося бачити не лише текст, а й «окуляри» історика, що його читає.'
  section: 'Конфліктна карта: Київська Русь — чия спадщина?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Київ — «спільна колиска», українці — «малороси» або «молодші брати». Мета
    — легітимація права Москви на київську спадщину. Методологія — вибіркове цитування літописів, ігнорування відмінностей.
    Агенда — обґрунтування єдиної держави та асиміляція.'
  - 'Український наратив: Київська Русь — перша державна форма українського народу. Мета — довести тяглість власної історії
    та право на суверенітет. Методологія — комплексний аналіз джерел, акцент на культурній та мовній еволюції. Агенда — утвердження
    національної ідентичності.'
  - 'Західний наратив (Plokhy, Snyder): Розглядає Київську Русь як середньовічну імперію, спадок якої ліг в основу КІЛЬКОХ
    сучасних націй (українців, білорусів, частково росіян). Методологія — порівняльна історія імперій. Агенда — деконструкція
    національних міфів, зокрема російського імперського.'
  - '[!decolonization] Викриття «привласнення» історії як ключової імперської тактики. Москва не просто претендує на спадок
    Русі, вона заперечує право інших на цей спадок.'
  - '[!myth-buster] Розвінчання міфу про «спільну колиску» та «братні народи». Аналіз показує, що це не історичні категорії,
    а політичні конструкти XIX-XX століть.'
  section: 'Зіткнення наративів: Конструювання імперської історії'
  words: 1700
- points:
  - 'Джерело 1: Аналіз фрагментів з «Історії держави Російської» М. Карамзіна. Автор: придворний історіограф. Мета: створення
    великого наративу для імперії. Прийоми: патетика, телеологія (вся історія веде до самодержавства), замовчування незручних
    фактів.'
  - 'Джерело 2: Аналіз есе В. Путіна «Про історичну єдність росіян та українців» (2021). Автор: глава держави-агресора. Мета:
    ідеологічне обґрунтування вторгнення. Прийоми: маніпуляція цитатами, апеляція до «спільної історії», заперечення суб''єктності
    України.'
  - 'Порівняльний аналіз: які риторичні прийоми та історичні «аргументи» Карамзіна (XIX ст.) без змін відтворює Путін (XXI
    ст.)? У чому полягає спадкоємність імперського наративу?'
  - '[!epistemic-humility] Читаючи Путіна, ми аналізуємо не історичну працю, а політичний маніфест. Важливо розрізняти жанри
    та не шукати в пропаганді наукової істини, а вивчати її як джерело для розуміння намірів автора.'
  section: 'Джерельна критика: Від Карамзіна до Путіна'
  words: 1500
- points:
  - 'Повернення до розминки: тепер ви можете не просто вгадати, а й детально пояснити, які маркери в текстах про 1654 рік
    вказують на їхнє походження. Які саме слова та концепти є ключовими?'
  - 'Мета-рефлексія: Що ми дізналися про те, ЯК читати історію? Які ключові маркери імперського наративу (привласнення, заперечення
    суб''єктності, патерналізм, телеологія) ми можемо тепер ідентифікувати?'
  - '[!decolonization] Підсумок: деконструкція імперського наративу — це не просто академічна вправа, а інструмент виживання
    та утвердження власної ідентичності. Як розуміння цих механізмів допомагає протидіяти сучасній російській пропаганді?'
  section: Дискусія та підсумок
  words: 700
focus: The development and continuity of Russian imperial historiography, analyzing key concepts like the Pogodin theory,
  "Malorossiya," and the "one people" myth, and tracing their use as political tools from the 19th century to the present
  day.
level: ISTORIO
module: istorio-003
objectives:
- Аналізувати ключові тези та фігури російської імперської історіографії, від Карамзіна до Путіна
- Застосовувати методи джерельної критики для деконструкції пропагандистських та ідеологічно заангажованих історичних текстів
- Порівнювати та протиставляти російський імперський, український національний та західний академічний наративи щодо спільної
  історії
- Ідентифікувати та пояснювати механізми, за якими історія використовується як інструмент легітимації імперської політики
  та війни
