content_outline:
- points:
  - 'Провокація: Акт Злуки — тріумф національної єдності чи трагічний доказ її відсутності? Вам дано два документи 1919 року:
    урочистий текст Акту і таємний наказ про арешт галицьких офіцерів. Який з них краще описує реальність, і чому?'
  - '[!epistemic-humility] Завдання — не дати "правильну" відповідь, а сформулювати критерії, за якими можна оцінювати історичну
    реальність vs. політичну декларацію.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Юридичний vs. фактичний статус Злуки. Чи був Акт юридично зобов''язуючим об''єднанням, що створило єдину державу,
    чи лише декларацією про наміри, яка ніколи не була втілена через політичні розбіжності та війну?'
  - 'Дебат 2: Причини невдачі — "об''єктивні" чи "суб''єктивні"? Чи був провал об''єднання неминучим наслідком зовнішніх факторів
    (війна з Польщею, більшовиками), чи він став результатом внутрішніх конфліктів та недовіри між керівництвом УНР та ЗУНР
    (Петлюра vs. Петрушевич)?'
  - '[!epistemic-humility] Обидві сторони використовували історичні аргументи, але їхні інтерпретації залежали від політичних
    цілей та особистих амбіцій.'
  section: 'Конфліктна карта: Символ чи реальність?'
  words: 900
- points:
  - '1. Радянський наратив: Акт як "буржуазно-націоналістичний фарс" та "змова з Антантою". Подія маргіналізується, а справжнім
    "возз''єднанням" подається встановлення радянської влади.'
  - '[!decolonization] Цей наратив заперечує українську суб''єктність і представляє будь-які незалежні державні утворення
    як антинародні та тимчасові.'
  - '2. Український державний наратив: Акт як сакральна, кульмінаційна подія, втілення віковічних мрій народу. Історична пам''ять
    часто замовчує гострі конфлікти між УНР та ЗУНР, фокусуючись на ідеалізованому образі єдності.'
  - '[!myth-buster] Міф про безхмарну єдність спростовується фактами: існування двох окремих армій, урядів та зовнішньополітичних
    курсів навіть після проголошення Акту.'
  - '3. Західний наратив: Акт розглядається в контексті розпаду імперій та Версальської системи. Прагматичний крок двох слабких
    державних утворень, що шукали порятунку перед військовою загрозою. Аналіз причин, чому Антанта не підтримала українську
    незалежність.'
  section: 'Зіткнення наративів: Акт Злуки в дзеркалі історіографії'
  words: 1700
- points:
  - 'Джерело 1: Універсал Директорії УНР про Злуку. Аналіз мови: "однині воєдино зливаються", "мрії, якими жили і за які умирали
    кращі сини України", "одна, велика Україна". Розбір декларативної, перформативної риторики, що має на меті створити нову
    реальність через слово.'
  - 'Джерело 2: Фрагменти зі спогадів та щоденників Євгена Петрушевича, Симона Петлюри, та інших військових і політичних діячів.
    Як піднесена риторика Акту співвідноситься з їхніми записами про взаємну недовіру, суперечки щодо командування армією
    та міжнародних союзів?'
  - '[!epistemic-humility] Порівняння показує прірву між публічною політичною декларацією та непублічною, кулуарною реальністю.
    Історик має працювати з обома типами джерел, щоб зрозуміти складність подій.'
  section: 'Джерельна критика: Текст Акту vs. щоденники учасників'
  words: 1500
- points:
  - 'Повернення до розминки: чому, незважаючи на фактичний провал, символічне значення Акту Злуки виявилося набагато сильнішим
    і тривалішим за його реальні політичні наслідки?'
  - 'Мета-рефлексія: Яку функцію виконує "міф Злуки" в українській національній свідомості? Чи може такий ідеалізований символ
    бути корисним для консолідації нації, навіть якщо він спрощує історію?'
  - '[!decolonization] Зв''язок із сьогоденням: як концепт "Соборності" використовується в сучасній Україні у контексті тимчасово
    окупованих територій Криму та Донбасу? Які паралелі та відмінності з ситуацією 1919 року?'
  section: Дискусія та підсумок
  words: 700
focus: The 1919 Act of Unification (Акт Злуки), its symbolic meaning versus political reality, and its conflicting interpretations
  in Ukrainian, Soviet, and Western historiography.
level: ISTORIO
module: istorio-035
objectives:
- Аналізувати причини, перебіг та наслідки проголошення Акту Злуки, розрізняючи політичний та символічний виміри
- Критично оцінювати різні історіографічні наративи (радянський, сучасний український, західний) щодо Акту Злуки та його реального
  втілення
- Порівнювати офіційні документи епохи зі спогадами та щоденниками учасників для реконструкції повної картини подій
- Формулювати аргументовану позицію щодо ролі історичних символів та міфів у процесі націєтворення
