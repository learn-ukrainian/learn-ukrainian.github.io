content_outline:
- points:
  - 'Провокація: Вам дають два анонімні висловлювання з Галичини XIX ст. Одне каже: «Ми — частина великого 150-мільйонного
    російського народу». Інше: «Ми — окрема українська нація, спадкоємиця Київської Русі». Не знаючи авторів, як би ви визначили,
    хто є хто, і на які маркери в мові та ідеях звернули б увагу?'
  - 'Завдання: Поясніть свою логіку, перш ніж ми зануримось в аналіз.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Сутність галицьких русинів. Москвофіли стверджували, що галичани — це відірвана гілка «единого русского народа».
    Народовці доводили, що це окремий український народ з власною історією та мовою. [!epistemic-humility]'
  - 'Дебат 2: Шляхи до мети. Москвофіли робили ставку на зовнішню силу (Російську імперію) та консервативні еліти. Народовці
    — на «органічну працю» серед селян через мережу «Просвіти» та кооперативів. Чия стратегія була більш далекоглядною?'
  - 'Позиція Відня: Австрійська імперія балансувала між цими рухами, використовуючи їх у своїй грі проти поляків та Російської
    імперії. Як це вплинуло на результат боротьби?'
  section: 'Конфліктна карта: Нація чи народ?'
  words: 900
- points:
  - 'Російський імперський / москвофільський наратив: Галичина — «ісконно русская земля», що страждає під іноземним (австрійським
    та польським) гнітом. Мета — возз’єднання з «матір’ю-Росією». МЕТОДОЛОГІЯ: маніпуляція історією Русі, етимологією, спільністю
    віри. АГЕНДА: геополітичне розширення Російської імперії. СЛІПІ ПЛЯМИ: ігнорування століть окремого розвитку, мовних відмінностей,
    іншої політичної культури. [!decolonization]'
  - 'Український національний наратив (народовці): Галичина — невід’ємна частина України, «П’ємонт» українського руху. Мета
    — збудувати модерну націю на основі народної мови та культури, і в перспективі об’єднатися з Наддніпрянщиною. МЕТОДОЛОГІЯ:
    романтизм, етнографія, «органічна праця». АГЕНДА: створення незалежної української держави. СЛІПІ ПЛЯМИ: ідеалізація козацтва,
    початкове недооцінення політичної боротьби. [!myth-buster]'
  - 'Австрійський державний наратив: Галицькі русини — один з лояльних народів імперії Габсбургів, корисна противага полякам
    та загрозі російського панславізму. МЕТОДОЛОГІЯ: бюрократична класифікація, перепис населення, контрольована підтримка
    культурних ініціатив. АГЕНДА: стабільність та керованість провінції. СЛІПІ ПЛЯМИ: нерозуміння глибини національного питання,
    віра, що його можна вирішити адміністративними методами.'
  section: 'Зіткнення наративів: Боротьба за душу Галичини'
  words: 1700
- points:
  - 'Аналіз тексту москвофільської газети «Слово»: Яку мову вони використовували («язичіє»)? Які аргументи наводили на користь
    єдності з Росією? Хто був їхньою цільовою аудиторією (священники, стара інтелігенція)?'
  - 'Аналіз тексту народовецького журналу «Правда»: Якою мовою писали (народна, з елементами «високого» стилю)? Як вони конструювали
    ідею окремішності від поляків та росіян? На кого орієнтувалися (молода інтелігенція, студенти, селяни)?'
  - 'Порівняльний аналіз: фінансування. Хто фінансував москвофільську пресу (російський уряд, місцеві меценати)? Як фінансувалися
    народовці (пожертви, доходи від «Просвіти»)? Як джерело фінансування впливало на зміст? [!epistemic-humility]'
  - 'Кейс «Просвіти»: розгляд статуту товариства як історичного джерела. Які цілі декларувалися? Якими методами їх досягали?
    Чому проста «освітня діяльність» виявилася потужною політичною зброєю?'
  section: 'Джерельна критика: Читаючи «Слово» і «Правду»'
  words: 1500
- points:
  - 'Повернення до розминки: Тепер, маючи повний контекст, проаналізуйте ті ж два висловлювання. Які конкретні історіографічні
    та ідеологічні маркери ви можете ідентифікувати?'
  - Чому москвофіли програли в Галичині? Формулювання комплексної відповіді з урахуванням ідеологічних, соціальних, культурних
    та зовнішньополітичних факторів.
  - 'Зв’язок із сьогоденням: Як наративи, що виникли в Галичині XIX ст., використовуються в сучасній російсько-українській
    інформаційній війні? Які аргументи москвофілів ви чуєте сьогодні від російських політиків та пропагандистів? [!decolonization]'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of the Galician national awakening, focusing on the conflict between Narodovtsi (Ukrainophiles)
  and Moskvofily (Russophiles), and the role of institutions like Prosvita.
level: ISTORIO
module: istorio-071
objectives:
- Аналізувати ідеологічні, соціальні та політичні причини виникнення та конкуренції між москвофільським та народовецьким рухами
  в Галичині XIX ст.
- Критично оцінювати стратегії (культурні, політичні) та інституції («Просвіта», партії, преса) кожного руху.
- 'Розрізняти та деконструювати три ключові наративи про Галичину: російсько-імперський, український національний та австрійський
  державний.'
- Застосовувати методи джерельної критики для аналізу історичної преси, виявляючи ідеологічні позиції, мовні маніпуляції та
  цільову аудиторію.
- Пояснювати довгострокові наслідки перемоги народовецького проєкту та зв’язок цих історичних дискурсів із сучасною інформаційною
  війною.
