content_outline:
- points:
  - 'Провокація: Подано два короткі, анонімні описи подій 1932-33 років. Один — зі звіту партійного активіста про успішне
    виконання плану хлібозаготівель, інший — уривок зі спогадів дитини про зникнення їжі. Який документ є більш "правдивим"
    історичним джерелом? Чому?'
  - 'Загадка: "Вони не померли, їх убили". Звідки ця фраза? Що вона змінює у сприйнятті подій?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Свідчення проти Архіву. Позитивістський підхід (довіра лише офіційним документам) vs постмодерний (голос "знизу",
    досвід жертви). Чому радянські архіви брешуть, і як свідчення викривають цю брехню?'
  - 'Дебат 2: Травма пам''яті. Чи можна довіряти спогадам, записаним через 50 років? Аргументи "за": емоційна правда, деталі,
    що не фіксуються документами. Аргументи "проти": ретроспективність, вплив пізніших наративів, проблема репрезентативності
    (свідчать ті, хто вижив).'
  - '[!epistemic-humility] Усна історія не дає "простих" відповідей, а ставить складні питання про природу історичної правди.'
  section: 'Конфліктна карта: Методологічні дебати усної історії'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Повне заперечення або применшення ролі свідчень. Тези: "фальсифікація", "націоналістична
    пропаганда", "нерепрезентативні поодинокі випадки". Агенда: збереження міфу про "дружбу народів" та безпомилковість радянської
    політики. Сліпа пляма: людський досвід, страждання.'
  - 'Український наратив: Центральність свідчень. Свідчення як доказ геноциду, як акт відновлення справедливості, як основа
    національної пам''яті. Проєкти (UCRDC, українські інститути). Агенда: утвердження суб''єктності, надання голосу жертвам,
    побудова національної ідентичності навколо пам''яті про Голодомор.'
  - 'Західний наратив: Від початкового скепсису до визнання. Роль Комісії Конгресу США (1980-ті) у легітимізації свідчень.
    Методологія: крос-верифікація свідчень з архівними даними, демографічною статистикою. Агенда: академічна об''єктивність,
    порівняльні дослідження геноцидів. Сліпа пляма: часто ігнорується колоніальний контекст.'
  - '[!decolonization] Боротьба за визнання свідчень є боротьбою проти колоніального стирання пам''яті.'
  - '[!myth-buster] Усна історія Голодомору — це не просто збір спогадів, а цілеспрямована інтелектуальна робота, що кинула
    виклик радянській системі брехні.'
  section: 'Зіткнення наративів: Статус свідка Голодомору'
  words: 1700
- points:
  - 'Close reading: Аналіз реального свідчення з архіву (напр., UCRDC). Як воно структуроване? Які теми піднімає (голод, конфіскація,
    виживання, смерть)?'
  - 'Методологічний паспорт джерела: Хто і коли записав свідчення? Які питання ставив інтерв''юер? Як це вплинуло на розповідь?
    Аналіз "тиші" — про що свідок мовчить і чому? (табу, травма).'
  - 'Контекстуалізація: Як це свідчення співвідноситься з іншими свідченнями з того ж села/регіону? Як воно доповнює чи заперечує
    офіційні документи того часу (напр., доповідні записки ГПУ)?'
  - '[!epistemic-humility] Кожне свідчення — це не просто "факт", а інтерпретація минулого, сформована досвідом, пам''яттю
    та мовою. Наше завдання — зрозуміти цю складність, а не спростити її.'
  section: 'Джерельна критика: Анатомія одного свідчення'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви оцінюєте співвідношення партійного звіту та дитячого спогаду? Які сильні та слабкі
    сторони кожного джерела?'
  - 'Мета-рефлексія: Що вивчення усної історії Голодомору говорить нам про те, як працює історична пам''ять? Чому для імперій
    так важливо контролювати не лише архіви, а й людські спогади?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна російська пропаганда використовує ті самі методи дискредитації
    свідчень очевидців щодо війни в Україні, які СРСР використовував для заперечення Голодомору?'
  section: Дискусія та підсумок
  words: 700
focus: 'Oral history of the Holodomor: methodology, source criticism, and the historiographical debate over the status of
  survivor testimonies versus official archives and propaganda.'
level: ISTORIO
module: istorio-036
objectives:
- Аналізувати сильні та слабкі сторони усної історії як методу дослідження травматичного минулого.
- Розрізняти російський/радянський, український та західний наративи щодо статусу свідчень про Голодомор.
- Застосовувати методи джерельної критики до аналізу усних свідчень, враховуючи проблеми пам'яті, травми та ретроспективності.
- Формулювати аргументовану позицію щодо ролі свідчень у протидії історичним фальсифікаціям та деколонізації національної
  пам'яті.
