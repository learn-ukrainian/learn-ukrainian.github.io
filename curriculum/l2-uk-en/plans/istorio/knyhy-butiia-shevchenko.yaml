content_outline:
- points:
  - 'Провокація: таємне товариство, маніфест у біблійному стилі, поет як духовний лідер. Це сюжет романтичного роману чи реальна
    сторінка української історії? Що це було — гурток мрійників чи перша політична організація?'
  - 'Цитата-загадка з «Книг Буття»: "І встане Україна зі своєї могили і знову озоветься до всіх братів своїх слов''янських".
    Що означає цей месіанський тон? Хто і для кого це писав у 1846 році?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Гурток ідеалістів vs Небезпечна змова. Одна історіографічна традиція (ліберальна) бачить у братстві лише дискусійний
    клуб. Інша (народницька, радянська) — підпільну організацію з чітким планом дій. Які докази в кожної зі сторін?'
  - 'Дебат 2: Роль Шевченка — духовний натхненник чи активний член? Чому саме він отримав найсуворіше покарання, хоча формально
    не був автором програми? Аналіз свідчень та доносів.'
  - '[!epistemic-humility] Братство не залишило статуту. Наше розуміння базується на програмних документах, свідченнях на
    допитах (часто під тиском) та приватних листах. Як історику працювати з такими суперечливими джерелами?'
  section: 'Конфліктна карта: Мрійники чи змовники?'
  words: 900
- points:
  - 'Російський імперський наратив: "малоросійський сепаратизм". Подається як небезпечна змова, інспірована "польською інтригою"
    для розколу "єдиного російського народу". Мета — виправдати жорстокі репресії та заперечити існування окремої української
    ідентичності. Методологія — поліцейський донос і звинувачення. Сліпа пляма — ігнорування інтелектуального змісту програми.'
  - 'Український національний наратив: "Пробудження нації". Братство — точка відліку модерної політичної історії України.
    Перша спроба сформулювати програму, що поєднує національне визволення (незалежність) і соціальну справедливість (скасування
    кріпацтва). Методологія — телеологічна, пошук витоків сучасної держави. Сліпа пляма — ідеалізація та ігнорування утопічних,
    романтичних елементів програми.'
  - 'Західний наратив (Western historiography): "Східноєвропейський романтизм". Розглядає братство в контексті "Весни народів"
    1848 р. як типовий для Центрально-Східної Європи рух. Порівнює з польським месіанізмом (Міцкевич) або чеським національним
    відродженням. Мета — вписати Україну в загальноєвропейські процеси. Сліпа пляма — часто недостатня увага до унікальності
    українського контексту (подвійне гноблення — соціальне та національне).'
  - '[!decolonization] Порівняння наративів викриває, як імперія використовує історію для контролю, а національний рух — для
    легітимації. Чи можливий "об''єктивний" погляд?'
  section: 'Зіткнення наративів: Кирило-Мефодіївське братство'
  words: 1700
- points:
  - 'Авторство та ідеолог: Микола Костомаров. Чому історик обирає форму біблійного пророцтва, а не політичного трактату? Аналіз
    стилю: алюзії, символізм, ритмічна проза.'
  - 'Структура та зміст: від створення світу до майбутньої слов''янської федерації. Ключові ідеї: Україна як "нерозтлінна"
    країна без агресивної аристократії, її месіанська роль у визволенні слов''ян, республіканська федерація як ідеал.'
  - '[!myth-buster] "Книги" — не просто про Україну. Це проєкт перебудови всієї Східної Європи на республіканських засадах.
    Наскільки реалістичним був цей план?'
  - 'Порівняльний аналіз: "Книги буття" vs "Послання до мертвих і живих..." Шевченка. Спільні ідеї (критика імперії, кріпацтва)
    та відмінності в тональності (оптимістичний провіденціалізм Костомарова vs гнівний сарказм Шевченка).'
  section: 'Джерельна критика: «Книги буття українського народу»'
  words: 1500
- points:
  - 'Повернення до розминки: тож мрійники чи перші політичні діячі? Студент має сформулювати власну аргументовану позицію,
    спираючись на матеріали модуля.'
  - 'Довготривалий вплив: ідеї братства (федералізм, республіканізм, соціальна справедливість) стали основою для майбутніх
    українських політичних партій. Драгоманов, Франко, Грушевський — усі вели діалог із Кирило-Мефодіївцями.'
  - '[!decolonization] Як ідея "Україна — не Росія", сформульована в "Книгах", трансформувалася протягом 180 років? Як вона
    проявляється в сучасній війні?'
  - 'Мета-рефлексія: чим є «Книги буття» для нас сьогодні — історичним документом, утопією, актуальною політичною програмою
    чи джерелом національних міфів?'
  section: Дискусія та підсумок
  words: 700
focus: The Cyril and Methodius Brotherhood, "Books of Genesis of the Ukrainian People" as the first political program, Ukrainian
  messianism vs. Polish messianism, the historiographical debate around the Brotherhood's significance
level: ISTORIO
module: istorio-029
objectives:
- Аналізувати причини створення, ідеї та наслідки діяльності Кирило-Мефодіївського братства
- Оцінювати історичне значення «Книг буття українського народу» як першої політичної програми модерного українського руху
- Порівнювати різні історіографічні наративи (імперський, український, західний) щодо Кирило-Мефодіївського братства
- Застосовувати методи джерельної критики для аналізу програмних документів романтичного націоналізму
