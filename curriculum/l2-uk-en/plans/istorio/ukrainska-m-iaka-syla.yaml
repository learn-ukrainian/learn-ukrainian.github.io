content_outline:
- points:
  - 'Провокація: До 2022 року Україна була майже невидимою на культурній карті світу. Після — прорив. Це випадковість, спричинена
    війною, чи активація довготривалих інвестицій? Як відрізнити щирий культурний продукт від інструменту державної пропаганди?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Успіх української м''якої сили — це результат централізованої державної стратегії (культурної дипломатії) чи
    спонтанний низовий рух, підсилений глобальною емпатією?'
  - 'Дебат 2: "Зброя" культура — це легітимний інструмент державного захисту чи небезпечна політизація, що руйнує універсальну
    цінність мистецтва? Порівняння радянського використання культури для пропаганди та українського — для виживання.'
  - '[!epistemic-humility] Розгляд позицій: культура як самоцінність vs. культура як інструмент національної безпеки.'
  section: 'Конфліктна карта: Стратегія чи спонтанність?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Перемога Kalush Orchestra — це "голос співчуття", а не мистецька цінність.
    Це доказ тотальної русофобії та політизації Заходом аполітичних конкурсів. Прецедент — "антирадянська" пісня Джамали "1944".'
  - 'Український наратив: "Стефанія" — потужна мистецька заява, що відображає дух нації. Перемога — це акт культурного спротиву
    та платформа для утримання України в центрі уваги світу. Це не "політика", а боротьба за існування.'
  - 'Західний наратив: Аналіз перемоги як моменту європейської солідарності. Визнання як політичного виміру, так і мистецької
    цінності треку (синтез фолку та репу). Приклад успішного використання публічної платформи для проєкції м''якої сили.'
  - '[!decolonization] Викриття російської тактики "звинувачуй іншого в тому, що робиш сам" (політизація культури).'
  - '[!myth-buster] Розвінчання міфу про "аполітичність" великих культурних подій.'
  section: 'Зіткнення наративів: Перемога на Євробаченні'
  words: 1700
- points:
  - 'Джерело 1: Фільм "20 днів у Маріуполі" Мстислава Чернова. Аналіз як документального доказу воєнних злочинів для міжнародних
    судів. Розбір візуальної мови та режисерських рішень.'
  - 'Джерело 2: Промова Чернова на врученні премії "Оскар". Аналіз риторики: цільова аудиторія, ключові меседжі, вибір слів
    ("Я хотів би, щоб я ніколи не знімав цей фільм"). Як промова перетворює режисера на дипломата?'
  - '[!epistemic-humility] Порівняння рецензій на фільм у західних (The Guardian, Variety) та незахідних виданнях. Як геополітичний
    контекст впливає на інтерпретацію документального кіно?'
  section: 'Джерельна критика: Кіно як доказ і зброя'
  words: 1500
- points:
  - 'Повернення до розминки: тож успіх української культури — це випадковість чи стратегія? Студент формулює nuanced відповідь,
    використовуючи приклади з кіно, музики та цифрової дипломатії.'
  - 'Мета-рефлексія: Як знання про механізми "м''якої сили" змінює наше сприйняття культури під час війни? Чи можемо ми тепер
    дивитись фільм або слухати пісню, не аналізуючи їхній "дипломатичний" потенціал?'
  - '[!decolonization] Підсумок: перетворення України з об''єкта геополітики на суб''єкта, що активно формує глобальний наратив
    про себе через культуру.'
  section: Дискусія та підсумок
  words: 700
focus: The post-2022 breakthrough of Ukrainian soft power, analyzing Eurovision, cinema (20 Days in Mariupol), and digital
  diplomacy as tools for narrative control and global influence.
level: ISTORIO
module: istorio-132
objectives:
- Аналізувати, як українська культура перетворилася на ефективний інструмент 'м'якої сили' після 2022 року.
- Критично оцінювати різні наративи (український, російський, західний) щодо культурних подій, таких як Євробачення чи вручення
  "Оскара".
- Розпізнавати методи маніпуляції та пропаганди у висвітленні культурних явищ.
- Застосовувати методику джерельної критики до сучасних медіа-продуктів (фільмів, промов, дописів), визначаючи їхню мету та
  аудиторію.
