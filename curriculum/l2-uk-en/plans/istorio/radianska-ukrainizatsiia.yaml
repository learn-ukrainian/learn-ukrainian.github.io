content_outline:
- points:
  - 'Провокація: 1920-ті — "золота доба" української культури чи добре спланована пастка? Представити два погляди: захопленого
    сучасника і гірку оцінку історика.'
  - 'Цитата без автора: "Ніколи раніше не друкувалося стільки українських книжок!" Поруч — "Кожен новий театр був кроком до
    розстрільного списку". Студент має обґрунтувати, хто міг це сказати і коли.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Українізація — це щира спроба створити "позитивну дію" для неросійських націй (теза Террі Мартіна), що пізніше
    була згорнута, чи цинічна пастка для ідентифікації та знищення еліт (традиційна українська історіографія)?'
  - '[!epistemic-humility] Аргументи "за" Мартіна: коренізація була загальносоюзною політикою, не лише українською. Аргументи
    "проти": масштаби подальшого терору в Україні були безпрецедентними.'
  - 'Дебат 2: Чи можна було уникнути пастки? Порівняння позицій: "використати радянські можливості для розбудови культури"
    (Микола Скрипник) vs "будь-яка співпраця з окупантом — це самогубство" (погляд з еміграції).'
  section: 'Конфліктна карта: Пастка чи Помилка?'
  words: 900
- points:
  - '1. Радянський/імперський наратив: "Великодушна політика партії, спрямована на культурний розвиток братнього народу, яку
    зіпсували місцеві націоналісти". Методологія: аналіз партійних постанов, офіціозу. Агенда: легітимізація центральної влади
    та репресій. Сліпі плями: роль Москви у згортанні політики.'
  - '[!decolonization] 2. Український наратив: "Короткий спалах національного відродження, використаний для ідентифікації
    та подальшого планомірного знищення інтелектуальної еліти". Джерела: твори "розстріляного відродження", спогади, розстрільні
    списки. Агенда: довести геноцидальний характер радянської влади.'
  - '[!myth-buster] 3. Західний наратив (Террі Мартін, Сергій Плохій): "Прагматична імперська стратегія управління неросійськими
    територіями через ''позитивну дискримінацію''". Методологія: порівняльний аналіз імперій, архівні дослідження. Агенда:
    зрозуміти СРСР як модерну імперію, а не монолітну ідеологічну державу.'
  section: 'Зіткнення наративів: Політика Українізації 1920-х'
  words: 1700
- points:
  - 'Джерело 1: Публічна промова наркома освіти Миколи Скрипника (1927) про успіхи українізації. Аналіз: хто аудиторія? Які
    успіхи підкреслюються? Які загрози замовчуються? Риторика тріумфу.'
  - 'Джерело 2: Внутрішній секретний звіт ОДПУ (1928) про "націоналістичні ухили" в середовищі української інтелігенції. Аналіз:
    хто автор, хто адресат? Як ті самі явища, що у промові Скрипника, подаються як злочин? Мова підозри та звинувачення.'
  - '[!epistemic-humility] Зіткнення джерел: як одна й та сама людина (напр., письменник Хвильовий) може бути одночасно "гордістю
    радянської України" у промові і "небезпечним елементом" у звіті? Критика джерела: аналіз мети, аудиторії, неявних припущень.'
  section: 'Джерельна критика: Промова Скрипника vs. звіт ОДПУ'
  words: 1500
- points:
  - 'Повернення до розминки: Чи була українізація "золотою добою"? Студент формулює складну відповідь: так, для творчості,
    але це була творчість "в борг" у диявола.'
  - 'Мета-рефлексія: Який головний урок українізації 1920-х для розуміння імперської політики? Обговорення циклу "загравання
    → кооптація → асиміляція/знищення".'
  - '[!decolonization] Зв''язок із сьогоденням: Чи можна побачити схожі патерни в сучасній політиці РФ щодо "братніх народів"
    (напр., у Білорусі)? Як наратив про "спільну історію" використовується для виправдання агресії?'
  section: Дискусія та підсумок
  words: 700
focus: The Soviet policy of "Ukrainization" as a calculated trap, comparing the official narrative of cultural support with
  the reality of co-optation and subsequent destruction of the Ukrainian intelligentsia (Executed Renaissance).
level: ISTORIO
module: istorio-085
objectives:
- 'Аналізувати політику українізації 1920-х з трьох різних історіографічних перспектив: радянської, української та західної'
- Застосовувати методи джерельної критики для порівняння публічних та таємних документів радянської епохи
- Розрізняти поняття "коренізація" та "українізація" та пояснювати їх зв'язок
- Формулювати аргументовану позицію щодо того, чи була українізація заздалегідь спланованою пасткою
- Виявляти патерни імперської політики кооптації та асиміляції та розпізнавати їх у сучасних подіях
