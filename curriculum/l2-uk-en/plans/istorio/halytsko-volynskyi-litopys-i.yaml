objectives:
- Аналізувати Галицько-Волинський літопис як історичне джерело, розрізняючи факти та елементи придворної апології
- Порівнювати та критично оцінювати український, російський імперський та західний наративи про Королівство Руське та постать
  Данила Галицького
- Застосовувати методи джерельної критики для аналізу уривків з літопису та папських листів
- Формулювати аргументовану позицію щодо значення Данила Галицького в історії України, спираючись на розуміння різних історіографічних
  підходів
