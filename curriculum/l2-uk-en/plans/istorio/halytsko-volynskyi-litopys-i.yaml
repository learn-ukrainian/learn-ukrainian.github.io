content_outline:
- points:
  - 'Провокація: Представлено два анонімні описи коронації Данила Галицького. Один — звеличує подію як утвердження європейської
    держави, інший — називає її зрадою «справжньої Русі». Який з них належить українській, а який російській імперській традиції?
    Поясніть свою думку.'
  - 'Цитата для роздумів: «Для того, щоб утримати державу, Данило мусив платити данину ханові, і для того, щоб отримати корону,
    він мусив визнати зверхність Папи. Чи був він сувереном у власній державі?»'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Коронація Данила — це блискучий дипломатичний тріумф, що інтегрував Русь у Європу, чи відчайдушний крок для
    отримання допомоги проти монголів, що не мав реальних наслідків?'
  - 'Дебат 2: Галицько-Волинський літопис — це об''єктивне історичне джерело чи придворна апологія династії Романовичів, що
    приховує невдачі та перебільшує перемоги?'
  - '[!epistemic-humility] Українська історіографія XIX ст. бачила в Данилі ідеального монарха. Критичні історики XX ст. вказують
    на його прагматичні, часом жорстокі, методи боротьби за владу.'
  section: 'Конфліктна карта: Король чи васал?'
  words: 900
- points:
  - '1. Російський імперський / радянський наратив: Данило — дрібний «удільний князь», що через гординю відколовся від «єдиної
    руської землі» (з центром у Володимирі-на-Клязьмі, а потім Москві). Його коронація — католицька інтрига та зрада православ''я.'
  - '2. Український наратив: Данило — спадкоємець київських князів, що зберіг державність після монгольської навали. Королівство
    Руське — перша українська держава, орієнтована на Захід. Літопис — ключова пам''ятка, що це доводить.'
  - '3. Західний наратив (на основі папських джерел): Данило — один з багатьох правителів «на кордоні християнського світу»,
    потенційний союзник у хрестовому поході проти монголів та об''єкт зусиль з розширення унії. Його титул «Король Русі» визнається,
    але його реальна влада і вплив оцінюються в контексті сусідніх королівств — Польщі та Угорщини.'
  - '[!decolonization] Викриття механізму, за яким російська історіографія маргіналізує історію України, представляючи її
    як локальну версію «загальноросійської» історії.'
  - '[!myth-buster] Данило ніколи не припиняв бути васалом Золотої Орди, навіть після коронації. Його «поїздка в Орду» — приниження,
    яке літопис намагається представити як дипломатичну місію.'
  section: 'Зіткнення наративів: Королівство Руське'
  words: 1700
- points:
  - 'Close reading 1: Фрагмент Галицько-Волинського літопису про коронацію Данила в Дорогочині. Аналіз лексики: «вінець»,
    «королівство», «честь». Як літописець конструює образ величної події?'
  - 'Close reading 2: Фрагмент з листів Папи Інокентія IV до Данила. Аналіз тону і змісту: Папа вітає Данила, але водночас
    висуває умови (церковна унія, участь у поході). Які цілі переслідує кожна зі сторін?'
  - 'Методологія: порівняння придворної хроніки (зацікавленої у звеличенні правителя) та дипломатичної кореспонденції (зацікавленої
    у досягненні політичних цілей). Де інформація збігається, а де суперечить?'
  - '[!epistemic-humility] Автор літопису — ймовірно, придворний клірик, що писав на замовлення. Його мета — не інформувати,
    а легітимізувати владу Романовичів. Папа ніколи не бачив Данила і знав про ситуацію на Русі зі слів своїх легатів.'
  section: 'Джерельна критика: Літопис про коронацію vs папські джерела'
  words: 1500
- points:
  - 'Повернення до розминки: Студент тепер може не лише ідентифікувати наративи, але й пояснити, на яких історичних та ідеологічних
    припущеннях вони базуються.'
  - Що важливіше для історії — факт чи його інтерпретація? Коронація Данила — це одна подія, але три різні історії. Що це
    говорить нам про природу історичного знання?
  - '[!decolonization] Як боротьба за спадщину Київської Русі та Королівства Руського продовжується в сучасній культурній
    та інформаційній війні між Україною та Росією?'
  - 'Мета-рефлексія: Цей модуль не про те, «що насправді сталося» в 1253 році, а про те, як навчитися читати будь-яке історичне
    джерело критично, розуміючи, хто, коли і з якою метою його створив.'
  section: Дискусія та підсумок
  words: 700
