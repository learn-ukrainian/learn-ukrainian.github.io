content_outline:
- points:
  - 'Провокація: Чи є українська культура «вічно відроджуваною» чи «ніколи не вмираючою»? Порівняння двох метафор для опису
    культурної тяглості.'
  - 'Два погляди на історію: один описує її як серію катастроф і відновлень, інший — як безперервну боротьбу. Який з них краще
    описує досвід України? Чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Теорія «циклів» (Рябчук) vs Теорія «тяглості» (Грицак). Чи кожне «відродження» починається з нуля, чи це лише
    зміна фаз неперервного процесу?'
  - 'Дебат 2: Драйвер культури — внутрішня еліта чи зовнішній ворог? Чи є культура актом самотворення, чи лише реакцією на
    пригнічення?'
  - '[!epistemic-humility] Модель «циклів» може ненавмисно легітимізувати російський наратив про «неповноцінність» української
    культури, яка потребує зовнішнього поштовху для розвитку.'
  - 'Порівняння з іншими культурами (ірландською, польською, єврейською): чи є український випадок унікальним, чи він вписується
    у глобальний патерн культури під імперським тиском?'
  section: 'Конфліктна карта: Тяглість чи розрив?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: Українська культура — це «малоросійський» фольклор або «буржуазний націоналізм».
    «Відродження» — це штучні, інспіровані Заходом політичні проєкти. Методологія: ігнорування джерел, підміна понять. Агенда:
    асиміляція, виправдання пригнічення.'
  - 'Український наратив (романтичний/державницький): Культура — це душа нації. «Відродження» — це пробудження національного
    духу, повернення до своїх витоків. Методологія: акцент на мові, літературі, героїчних постатях. Агенда: легітимізація
    права на власну державу.'
  - 'Західний наратив (пост-колоніальний): Українська культура як приклад subaltern studies. «Відродження» — це акти культурної
    резистентності, боротьба за право голосу та суб''єктність. Методологія: порівняльний аналіз, теорія дискурсу. Агенда:
    академічне розуміння динаміки імперій та колоній.'
  - '[!decolonization] Розбір міфу про «спільний культурний простір». Як концепція «трьох братніх народів» використовувалася
    для маргіналізації української культури.'
  - '[!myth-buster] «Розстріляне відродження» — це не просто репресії проти митців. Це була цілеспрямована операція з обезголовлення
    модерної української культури та заміни її на радянський симулякр.'
  section: 'Зіткнення наративів: Культурні відродження'
  words: 1700
- points:
  - 'Джерело 1 (Самвидав): Аналіз тексту Івана Дзюби «Інтернаціоналізм чи русифікація?». Як автор, перебуваючи в СРСР, використовує
    марксистську лексику для критики радянської системи? Які ризики це несло?'
  - 'Джерело 2 (Діаспора): Аналіз праці Ореста Субтельного. Які переваги та недоліки має погляд історика, що пише «ззовні»?
    До яких джерел він мав доступ, а до яких — ні? Чи є його погляд «об''єктивнішим»?'
  - 'Джерело 3 (Радянський архів): Аналіз доповідної записки КДБ про «націоналістичні прояви» серед студентів. Як мова документа
    конструює образ «ворога»? Що цей документ говорить про страхи самої системи?'
  - '[!epistemic-humility] Порівняння трьох джерел: як одне й те саме явище (наприклад, покладання квітів до пам''ятника Шевченку)
    описується в кожному з них і чому ці описи так різняться.'
  section: 'Джерельна критика: Самвидав, діаспора та радянські архіви'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, «вічно вмираюча» чи «безсмертна»? Студент формулює власну метафору для опису української
    культури, спираючись на матеріал модуля.'
  - 'Мета-рефлексія: Чи є теорія «циклів» корисною аналітичною рамкою, чи це самоздійснюване пророцтво, що нормалізує травму
    та поразку?'
  - '[!decolonization] Як розуміння механізмів імперського пригнічення культури допомагає протидіяти сучасній російській пропаганді
    та інформаційній війні?'
  - 'Зв''язок із сьогоденням: Чи можна вважати культурний вибух після 2022 року черговим «відродженням», чи це якісно новий
    етап, що розриває попередні цикли?'
  section: Дискусія та підсумок
  words: 700
focus: The theory of Ukrainian cultural cycles (suppression → underground → revival), comparing historical cycles (Cossack,
  Romantic, Executed Renaissance, Sixtiers) and cultural survival mechanisms against Russian imperial and Soviet narratives.
level: ISTORIO
module: istorio-122
objectives:
- Розрізняти та аналізувати український, російський імперський/радянський та західний наративи щодо українських культурних
  циклів
- Застосовувати методику критики джерел до текстів істориків, самвидаву та офіційних документів
- Оцінювати концепцію «культурних циклів», розуміючи її сильні сторони як аналітичної моделі та слабкі сторони як потенційно
  фаталістичного наративу
- Використовувати історіографічну метамову (тяглість, дискурс, наратив, агентність) для аналізу історичних дебатів
pedagogy: CBI
persona:
  role: Модератор дискусії, який ставить під сумнів саму ідею «циклів». Чи не є ця теорія зручним виправданням для поразки
    та способом нормалізувати травму?
  voice: Narrative-Skeptic
phase: ISTORIO.12
