content_outline:
- points:
  - 'Провокація: «Повість временних літ» описує вибір віри Володимиром як духовний пошук. Сучасні історики кажуть про холодний
    політичний розрахунок. Яка версія вам здається більш переконливою і чому?'
  - 'Цитата-загадка: «Для них це було не хрещення, а капітуляція». Як ви гадаєте, з чиєї перспективи — візантійців, варягів,
    чи самих русів — можна було так схарактеризувати подію 988 року?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Духовний акт vs Геополітичний проєкт. Чи був вибір Володимира свідомим цивілізаційним кроком, чи прагматичним
    союзом з найсильнішим сусідом для легітимізації власної династії?'
  - 'Дебат 2: «Симфонія» влади vs Цезаропапізм. Візантійська ідеологія пропонувала гармонію світської та духовної влади, але
    чи не стала церква на Русі з самого початку інструментом у руках князя?'
  - '[!epistemic-humility] Ми не можемо знати думок Володимира, але можемо аналізувати наслідки його дій. Історики сперечаються,
    чи були ці наслідки запланованими, чи випадковими.'
  section: 'Конфліктна карта: Вибір віри чи політичний розрахунок?'
  words: 900
- points:
  - 'Російський імперський/радянський наратив: Хрещення — це точка відліку «єдиного російського народу» та «Святої Русі».
    Київ — «мати міст руських», а Москва — її єдиний легітимний спадкоємець («Третій Рим»). Агентність українців та білорусів
    заперечується.'
  - 'Український наратив: Хрещення — це європейський вибір Русі-України, що визначив її окрему цивілізаційну траєкторію. Це
    акт, що відділив Русь від євразійського простору і заклав основи власної державності та культури, спадкоємицею якої є
    сучасна Україна.'
  - 'Західний наратив: Розглядає хрещення Русі в контексті загальноєвропейської хвилі християнізації. Аналізує подію через
    призму політики, торгівлі та боротьби за вплив між Римом та Константинополем, часто розглядаючи подальші українсько-російські
    суперечки як анахроністичні.'
  - '[!decolonization] Викриття механізму, за яким імперія привласнює історію колонізованого народу, оголошуючи себе єдиним
    спадкоємцем спільного минулого.'
  - '[!myth-buster] Міф про «братні народи», що походять з однієї «київської колиски», є конструктом імперської ідеології
    XIX ст.'
  section: 'Зіткнення наративів: Спадщина 988 року'
  words: 1700
- points:
  - 'Close reading 1: Легенда про вибір віри з «Повісті временних літ». Аналіз структури: чому мусульманство, юдаїзм та західне
    християнство представлені карикатурно? Яку ідеологічну мету переслідував автор, створюючи такий наратив через 100+ років
    після події?'
  - 'Close reading 2: Фрагменти з хронік Лева Диякона та Іоанна Скіліци про русів. Якими вони бачать «варварів з півночі»?
    Як описують військові конфлікти та дипломатичні контакти? Порівняння візантійського погляду «згори» з героїчним автопортретом
    у ПВЛ.'
  - '[!epistemic-humility] «Повість временних літ» — не репортаж, а теологічно-політичний трактат. Візантійські хроніки —
    теж не об''єктивні; вони відображають інтереси імперії. Правда — у зіставленні цих упереджених поглядів.'
  section: 'Джерельна критика: «Повість временних літ» vs Візантійські хроніки'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви можете відповісти на питання про духовний пошук vs політичний розрахунок? Які нові
    аргументи у вас з''явилися?'
  - 'Мета-рефлексія: Як цей модуль змінив ваше розуміння того, що таке «історичний факт»? Чому боротьба за минуле є настільки
    важливою частиною сучасних воєн?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна РФ використовує наратив про «єдину купіль» для виправдання агресії?
    Як Україна протиставляє цьому свій наратив про європейський вибір?'
  section: Дискусія та підсумок
  words: 700
focus: The historiography of the Christianization of Kyivan Rus in 988. Comparing Ukrainian, Russian imperial, and Western
  narratives about the event, its political motives, and its long-term cultural and institutional legacy.
level: ISTORIO
module: istorio-058
objectives:
- Аналізувати різні історіографічні підходи (український, російський, західний) до причин та наслідків хрещення 988 року
- Критично оцінювати первинні джерела, зокрема «Повість временних літ», розрізняючи в них історичний факт, легенду та ідеологічне
  завдання
- Пояснювати зв'язок між візантійською спадщиною (право, архітектура, модель «симфонії») та подальшим розвитком української
  державності та культури
- Простежувати, як суперечки про «київську спадщину» використовуються у сучасних політичних та церковних конфліктах
