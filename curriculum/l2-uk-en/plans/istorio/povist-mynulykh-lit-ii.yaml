content_outline:
- points:
  - 'Провокація: "Земля наша велика і рясна, а порядку в ній нема. Ідіть-но княжити і володіти нами". Чи є ця фраза історичним
    записом чи політичним маніфестом, написаним через століття для легітимізації влади?'
  - 'Студент має висловити початкову гіпотезу: це точна цитата чи вигадка літописця?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Норманська теорія. Чи були Рюриковичі скандинавами (варягами), що принесли державність на слов''янські землі,
    як стверджують "норманісти"? Чи це приниження ролі місцевих еліт, як наполягають "антинорманісти"?'
  - 'Дебат 2: Що таке "Повість минулих літ"? Це об''єктивна хроніка подій, як її сприймали в XIX ст.? Чи це цілеспрямований
    ідеологічний твір, що має на меті довести легітимність династії Рюриковичів та їхньої християнської віри?'
  - '[!epistemic-humility] Обидві теорії мають докази та слабкі місця. Завдання — не обрати "правильну", а зрозуміти аргументи
    кожної зі сторін та їхні політичні наслідки.'
  section: 'Конфліктна карта: Норманізм vs Політичний міф'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: ПВЛ — це "спільна колиска" трьох "братніх народів", що доводить споконвічну
    єдність та право Москви як наступниці Києва. Акцент на ідеї "збирання земель" та централізованої влади.'
  - 'Український наратив: ПВЛ — це доказ тисячолітньої історії української державності з центром у Києві. Акцент на європейських
    зв''язках Русі (Візантія, Скандинавія) та її окремішності від північно-східних земель.'
  - 'Західний наратив: ПВЛ розглядається як типова середньовічна династична хроніка, а не національна історія. Аналізується
    її літературна структура, риторичні прийоми та використання біблійних топосів для легітимізації влади.'
  - '[!decolonization] Виявлення того, як імперський наратив використовує літопис для заперечення суб''єктності України.'
  - '[!myth-buster] Розвінчання міфу про ПВЛ як просту "літописну правду".'
  section: 'Зіткнення наративів: Фундаментальні міфи ПВЛ'
  words: 1700
- points:
  - 'Фрагмент 1: Покликання варягів (862). Аналіз мотивів: чому літописець стверджує, що владу "покликали" ззовні? Чиї інтереси
    обслуговує ця легенда?'
  - 'Фрагмент 2: Хрещення Володимира (988). Розбір "легенди про вибір вір": наскільки вона історична? Яку роль відіграє Візантія?
    Чому літописець зображує хрещення як мудрий державний вибір, а не складний соціальний процес?'
  - 'Фрагмент 3: Помста Ольги. Аналіз фольклорних мотивів (хитрість, чотириразове повторення) та ідеологічного посилу: язичницька
    жорстокість Ольги до хрещення протиставляється її подальшій святості.'
  - '[!epistemic-humility] Кожен фрагмент — це сплав реальних подій, фольклору та ідеологічного задуму. Вчимося розрізняти
    ці шари.'
  section: 'Джерельна критика: Анатомія трьох легенд'
  words: 1500
- points:
  - 'Повернення до розминки: студент тепер може надати розгорнуту відповідь про фразу "Земля наша велика...", аналізуючи її
    з позицій норманізму, антинорманізму та як інструмент легітимації влади.'
  - 'Мета-рефлексія: Що цей модуль говорить нам про природу історичної "правди"? Як і навіщо створюються та використовуються
    національні міфи?'
  - '[!decolonization] Як наративи, закладені в ПВЛ тисячу років тому, досі використовуються у сучасній російсько-українській
    війні для обґрунтування агресії та заперечення української ідентичності?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз трьох ключових фрагментів Повісті минулих літ (покликання варягів, хрещення Володимира, помста Ольги) та зіткнення
  історіографічних наративів (норманізм, державна пропаганда, національна історія)
