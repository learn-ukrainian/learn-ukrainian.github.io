content_outline:
- points:
  - 'Провокація: «Прагматичний компроміс» чи «збереження плацдарму»? Два погляди на Угоду 1997 року.'
  - 'Цитата українського політика 90-х: «Ми вирішили складну проблему, флот не стріляє». Цитата російського адмірала: «Севастополь
    залишився нашим». Хто з них мав рацію у довгостроковій перспективі?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Угода 1997 року — прагматичний крок для уникнення війни чи відкладена капітуляція? Позиція «реалістів» (уникнули
    крові) vs позиція «державників» (втратили суверенітет).'
  - '[!epistemic-humility] Аргументи «за»: стабілізація ситуації, визнання Росією кордонів. Аргументи «проти»: легалізація
    іноземної військової присутності, створення точки напруги.'
  - 'Дебат 2: Харківські угоди 2010 року — державна зрада Януковича чи закономірний наслідок 20 років політики «багатовекторності»?
    Роль олігархічних інтересів vs системний тиск Росії.'
  - '[!decolonization] Як західні партнери дивилися на флот у Криму? Чи сприймали вони це як загрозу чи як «внутрішню справу»
    України та Росії?'
  section: 'Конфліктна карта: Зрада чи некомпетентність?'
  words: 900
- points:
  - 'Російський імперський наратив: Севастополь — «місто російської слави», флот — невід''ємна частина російської присутності.
    Угоди — лише тимчасова формальність, що закріплює «історичне право». Методологія: апеляція до історії імперії, ігнорування
    міжнародного права. Агенда: виправдання експансії.'
  - '[!myth-buster] Міф про «спільний» флот. Радянський флот належав СРСР, а не РРФСР. Україна як спадкоємиця СРСР мала повне
    право на свою частку.'
  - 'Український наратив: Флот — окупаційна сила, що залишилася після розпаду СРСР. Угоди — вимушені поступки під тиском,
    які виявилися фатальною помилкою. Присутність бази — постійне джерело дестабілізації та інструмент для анексії. Методологія:
    міжнародне право, аналіз наслідків. Агенда: утвердження суверенітету.'
  - 'Західний наратив: Спершу — складна «пострадянська суперечка». Пізніше — занепокоєння, але без реального тиску на Росію.
    Проблема розглядалася через призму «сфер впливу» та енергетичної безпеки (газові знижки). Сліпа зона: нерозуміння екзистенційної
    природи загрози для України.'
  - '[!decolonization] Як термін «братські народи» використовувався російською пропагандою для нормалізації військової присутності
    на території України.'
  section: 'Зіткнення наративів: Статус Чорноморського флоту'
  words: 1700
- points:
  - 'Аналіз Угоди про статус та умови перебування ЧФ РФ на території України (1997): ключові статті. Обмеження на пересування,
    оновлення техніки, кількість особового складу. Чи були ці обмеження дієвими?'
  - 'Порівняльний аналіз: Договір 1997 vs. Харківські угоди 2010. Які пункти були змінені? Що означає «автоматична пролонгація»
    на 5-річні періоди?'
  - '[!epistemic-humility] Стенограма засідання Верховної Ради під час ратифікації Харківських угод. Аргументи «за» і «проти».
    Як риторика депутатів відображала політичні та економічні інтереси?'
  - 'Джерело: Мемуари українського дипломата, учасника переговорів 1990-х. Як він оцінює результати своєї роботи через 20
    років? Де були допущені помилки?'
  section: 'Джерельна критика: Тексти угод 1997 та 2010 років'
  words: 1500
- points:
  - 'Повернення до розминки: Тож «прагматичний компроміс» чи «відкладена катастрофа»? Сформулюйте відповідь, використовуючи
    поняття «суверенітет», «національна безпека» та «асиметрична залежність».'
  - 'Мета-рефлексія: Чому українська держава протягом 20 років не змогла вирішити проблему Чорноморського флоту? Які внутрішні
    (корупція, слабкість інститутів) та зовнішні (тиск Росії) фактори цьому завадили?'
  - '[!decolonization] Зв''язок із сьогоденням: Урок Чорноморського флоту. Чому будь-яка угода з імперією, що легалізує її
    військову присутність на вашій території, є екзистенційною загрозою?'
  section: Дискусія та підсумок
  words: 700
focus: The Black Sea Fleet basing agreements (1997, 2010), Ukrainian state failure, and the fleet's role as a trojan horse
  for the 2014 annexation of Crimea
level: ISTORIO
module: istorio-099
objectives:
- Аналізувати договори 1997 та 2010 років, виявляючи юридичні лазівки та асиметричні зобов'язання.
- Порівнювати та деконструювати український, російський та західний наративи щодо статусу Чорноморського флоту в Криму.
- Застосовувати методику критики джерел до офіційних документів та політичних заяв.
- Оцінювати роль Чорноморського флоту як інструменту гібридної війни та плацдарму для анексії Криму у 2014 році.
