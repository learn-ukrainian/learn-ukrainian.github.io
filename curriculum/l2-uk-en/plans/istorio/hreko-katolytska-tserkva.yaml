content_outline:
- points:
  - 'Провокація: «Возз''єднання» чи «ліквідація»? Вам дано два описи Львівського собору 1946 року. Один говорить про «історичний
    акт возз''єднання», інший — про «брутальну ліквідацію». Не знаючи, хто автор, спробуйте визначити, який з них є радянським,
    а який — українським. На чому ви базуєте своє припущення?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Святий чи колаборант? Позиція 1: Шептицький — праведник, що рятував тисячі євреїв, ризикуючи життям. Позиція
    2: Шептицький — колаборант, що вітав німецькі війська і співпрацював з окупаційною владою. Як узгодити ці два образи?'
  - 'Дебат 2: Церковний лідер чи національний політик? Чи мав митрополит право втручатись у політичні справи, підтримуючи
    певні політичні сили (навіть помірковані) і засуджуючи інші (радикальні, зокрема ОУН)? Де проходить межа між душпастирством
    та політикою?'
  - '[!epistemic-humility] Аналіз джерел: свідчення врятованих євреїв, пастирські листи Шептицького, звіти німецької та радянської
    розвідок. Кожен документ показує лише частину картини.'
  section: 'Конфліктна карта: Спадщина Андрея Шептицького'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Історичне возз''єднання". Твердження: греко-католики Галичини, відірвані
    унією від "матері-церкви", добровільно повернулися в лоно Російського Православ''я. Докази: протоколи собору, підписи
    делегатів, кінохроніка. Агенда: ліквідація потужного центру української ідентичності, уніфікація релігійного простору
    СРСР. Сліпі плями: арешти всього єпископату УГКЦ перед собором, роль НКВД в "організації".'
  - 'Український наратив: "Брутальна ліквідація". Твердження: інсценований НКВД "псевдособор" був лише фінальним актом знищення
    Церкви, яка відмовилася співпрацювати. Докази: існування "катакомбної церкви" протягом 43 років, спогади репресованих
    священиків, сам факт відсутності єпископів. Агенда: збереження пам''яті про мучеництво та опір. [!decolonization]'
  - 'Західний наратив: "Релігійні переслідування за Залізною завісою". Твердження: ліквідація УГКЦ — типовий приклад сталінського
    тоталітаризму та переслідування свободи совісті. Докази: звіти Ватикану, заяви західних урядів, свідчення біженців. Агенда:
    використання цього кейсу в ідеологічній боротьбі Холодної війни. Сліпі плями: часто спрощене розуміння тисячолітньої історії
    церковних відносин у регіоні.'
  - '[!myth-buster] Це не був теологічний спір. Це була спецоперація радянських спецслужб.'
  section: 'Зіткнення наративів: Львівський псевдособор 1946 року'
  words: 1700
- points:
  - 'Джерело 1: Пастирський лист митрополита Андрея Шептицького «Не убий» (1942). Аналіз мови, аргументації, адресатів. Як
    митрополит намагається говорити про моральні абсолюти в умовах тотального насильства з боку кількох окупаційних режимів?'
  - 'Джерело 2: Фрагмент «Діянь Собору» 1946 року. Аналіз стилістики "одностайності" та "радості". Як використовується мова
    для легітимізації акту насильства? Які евфемізми (як "возз''єднання") використовуються для маскування реальності?'
  - 'Порівняльний аналіз: як обидва тексти використовують біблійні цитати та історичні посилання для досягнення абсолютно
    протилежних цілей?'
  - '[!epistemic-humility] Вивчення біографії авторів та обставин написання тексту є ключем до його розуміння. Хто писав "Діяння
    Собору"? Чи були вони вільними у своїх висловлюваннях?'
  section: 'Джерельна критика: Читаючи між рядків'
  words: 1500
- points:
  - 'Повернення до розминки: тепер, знаючи контекст, проаналізуйте, які саме мовні маркери видають радянський та український
    наративи про собор 1946 року.'
  - 'Мета-рефлексія: Чому УГКЦ, маленька церква східного обряду, стала такою важливою мішенню для імперій (Речі Посполитої,
    Російської імперії, СРСР)? Що її існування говорить про українську ідентичність?'
  - '[!decolonization] Зв''язок із сьогоденням: як досвід "катакомбної церкви" та виживання в підпіллі вплинув на роль УГКЦ
    у сучасній Україні, зокрема після повномасштабного вторгнення 2022 року? Чому капеланський рух став таким потужним?'
  section: Дискусія та підсумок
  words: 700
focus: UGCC as a crucible of Ukrainian identity; Brest Union vs. 1946 Pseudo-council; Andrei Sheptytsky's complex legacy;
  historiographical conflict between 'reunification' (Soviet) and 'liquidation' (Ukrainian) narratives.
level: ISTORIO
module: istorio-061
objectives:
- Аналізувати причини та наслідки утворення УГКЦ як унікального явища на перетині цивілізацій
- Оцінювати історичну роль УГКЦ у формуванні модерної української ідентичності в Галичині та її збереженні в умовах бездержавності
- Розрізняти та деконструювати радянський/імперський, український та західний наративи щодо історії УГКЦ, зокрема її ліквідації
  у 1946 році
- Застосовувати методи джерельної критики до аналізу текстів церковних діячів (А. Шептицький) та офіційних документів радянської
  доби
