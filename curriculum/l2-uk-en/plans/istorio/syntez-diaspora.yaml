content_outline:
- points:
  - 'Провокація: Представлено два анонімні описи української діаспори — один називає її «зрадниками та посіпаками фашистів»,
    інший — «єдиним легітимним представником вільної нації». Не знаючи автора, студент має припустити, звідки походить кожна
    цитата та на якій ідеології базується.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи існувала «одна місія» для трьох хвиль? Національно-патріотична історіографія (особливо в діаспорі) стверджує
    про тяглість державницької мети. Критична соціологія вказує на фундаментальні відмінності в мотивації та цілях: від економічного
    виживання (І хвиля) до політичної боротьби (ІІ хвиля) та культурного нонконформізму (ІІІ хвиля).'
  - 'Дебат 2: Четверта хвиля 2022 року — це нова діаспора чи тимчасові біженці? Класична теорія діаспори вимагає формування
    стійких інституцій та почуття «неповернення». Сучасна теорія транснаціоналізму стверджує, що завдяки технологіям можна
    бути інтегрованим у дві країни одночасно, роблячи старі моделі застарілими.'
  - '[!epistemic-humility] Кожна школа думок використовує власний інструментарій (політична історія vs соціологія vs cultural
    studies), що призводить до різних, але однаково обґрунтованих висновків.'
  section: 'Конфліктна карта: Єдність чи розбрат?'
  words: 900
- points:
  - '1. Радянський та сучасний російський наратив: Діаспора як «колаборанти» та «агенти ЦРУ». Методологія: вибіркове цитування,
    створення образу ворога, ігнорування 99% культурної та наукової діяльності. Агенда: делегітимізація будь-якої некомуністичної
    української ідентичності. Сліпі плями: внутрішня різноманітність діаспори, її науковий та культурний внесок.'
  - '2. Український державницький наратив: Діаспора як «Ковчег нації» та «держава в екзилі». Методологія: інституційна історія
    (УНР в екзилі, УГКЦ, СКУ, НТШ), аналіз політичного лобіювання. Агенда: довести тяглість української державності, навіть
    коли територія була окупована. [!decolonization] Сліпі плями: ідеалізація, замовчування внутрішніх конфліктів та співпраці
    з суперечливими режимами.'
  - '3. Західний академічний наратив: Діаспора як «етнічна група тиску» (ethnic lobby). Методологія: соціологічний аналіз,
    порівняльні дослідження з іншими діаспорами (єврейською, ірландською). Агенда: об''єктивний аналіз впливу діаспори на
    політику США, Канади. [!myth-buster] Сліпі плями: часто не враховує унікальний постколоніальний контекст України та екзистенційний
    характер боротьби.'
  section: 'Зіткнення наративів: Роль діаспори у долі України'
  words: 1700
- points:
  - 'Джерело 1: Аналіз уривку з праці діаспорного історика (напр., Любомира-Романа Винара), де обґрунтовується концепція діаспори
    як політичного суб''єкта та спадкоємця УНР.'
  - 'Джерело 2: Аналіз розділу з сучасної монографії західного політолога (напр., Олександра Мотиля або Домінік Арель), де
    діяльність діаспори аналізується через призму теорії лобіювання та інтересів.'
  - 'Завдання для студента: Застосувати апарат джерельної критики. Хто автори? Яка їхня інституційна приналежність? Яку термінологію
    вони використовують («держава в екзилі» vs «група інтересів»)? На які джерела спираються? Чиї інтереси представляють їхні
    інтерпретації?'
  section: 'Джерельна критика: Два погляди на "паралельну державу"'
  words: 1500
- points:
  - 'Повернення до розминки: студент має не просто ідентифікувати цитати, а й пояснити, яку функцію виконував кожен з цих
    наративів (мобілізаційну, репресивну тощо).'
  - 'Мета-рефлексія: Чи є діаспора об''єктом історії чи її суб''єктом? Як технології та глобалізація змінили саме поняття
    «діаспора»?'
  - '[!decolonization] Зв''язок із сьогоденням: Як сучасна українська держава взаємодіє з мільйонами біженців 2022 року? Чи
    враховує вона уроки та помилки попередніх століть у стосунках із «зовнішньою» Україною?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiography of the Ukrainian diaspora: Three waves, the "parallel state" concept, narrative clashes (Soviet vs.
  national vs. Western), and the impact of the 2022 "fourth wave"'
level: ISTORIO
module: istorio-069
objectives:
- Розрізняти та аналізувати радянський, український державницький та західний академічний наративи про українську діаспору.
- Застосовувати методику джерельної критики до уривків з праць діаспорних та західних істориків.
- Критично оцінювати концепції «трьох хвиль», «паралельної держави» та «четвертої хвилі» в контексті сучасних теорій міграції
  та транснаціоналізму.
- Формулювати аргументовану позицію щодо ролі діаспори в минулому та майбутньому України, уникаючи ідеологічних крайнощів.
pedagogy: CBI
