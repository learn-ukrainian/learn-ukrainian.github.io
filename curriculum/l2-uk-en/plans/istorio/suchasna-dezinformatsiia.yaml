content_outline:
- points:
  - 'Провокація: Вам подано два заголовки про одну й ту саму подію в Україні. Один — з російського джерела, інший — з західного.
    Чи можете ви, не знаючи джерела, визначити, де чий, і пояснити свою логіку?'
  - 'Цитата-пастка: "Правда суб''єктивна, кожна сторона має свою версію". Чому цей, на перший погляд, розумний вислів є наріжним
    каменем дезінформаційних кампаній?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це "дезінформація" чи стара-добра "пропаганда"? Дискусія про те, чи є російські методи якісно новими, чи це
    лише технологічне масштабування радянських практик.'
  - 'Дебат 2: "Пожежний шланг брехні" — це геніальна стратегія чи ознака слабкості? Аналіз того, чому завалювання ефіру суперечливими
    версіями може бути ефективнішим, ніж просування однієї "правильної".'
  - '[!epistemic-humility] Позиція дослідників: одні вважають це новою епохою інформаційних війн (Pomerantsev), інші — "старим
    вином у нових пляшках" (історики пропаганди).'
  section: 'Конфліктна карта: Методи чи лише масштаб?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Конвеєр суперечливих версій: "збив український винищувач", "це був замах
    на Путіна", "на борту були вже мертві тіла", "докази сфальсифіковані ЦРУ". Мета — не переконати, а заплутати, створити
    враження, що "правди не знає ніхто".'
  - 'Український наратив: Збиття пасажирського літака російським ЗРК "Бук" з території, контрольованої проросійськими силами.
    Позиція, що спирається на дані розвідки та підтверджена міжнародним слідством.'
  - 'Західний наратив: Незалежне розслідування Bellingcat за відкритими джерелами, яке відстежило маршрут "Бука" з Росії в
    Україну і назад. Робота міжнародної Спільної слідчої групи (JIT), що юридично встановила вину конкретних осіб, пов''язаних
    з РФ.'
  - '[!decolonization] Аналіз методології: Росія використовує "щовизм" (whataboutism) та фальшивих експертів. Україна та Захід
    — криміналістику, розвідку та верифіковані дані. Викриття механізму створення "альтернативної реальності".'
  - '[!myth-buster] Міф про "громадянську війну": кейс MH17 чітко демонструє пряму військову участь Росії з самого початку
    конфлікту у 2014 році.'
  section: 'Зіткнення наративів: Катастрофа MH17'
  words: 1700
- points:
  - 'Close reading 1: Стаття з RT. Аналіз мови: використання емоційно забарвлених слів, "вкиди" без доказів через фрази "як
    повідомляється", "на думку експертів". Хто ці "експерти"? Аналіз їхньої афіліації.'
  - 'Close reading 2: Розслідування про "Агентство інтернет-досліджень" ("тролі з Ольгіна"). Як створюється ілюзія масової
    підтримки? Технологія "вирощування" ботів, їхня спеціалізація (провокатор, патріот, експерт), метрики ефективності. Це
    не ідеологія, це — бізнес.'
  - '[!epistemic-humility] Чому це працює? Когнітивні упередження, на яких грають дезінформатори: схильність до підтвердження
    своєї точки зору, ефект ехо-камери, недовіра до офіційних інституцій.'
  section: 'Джерельна критика: Анатомія Russia Today та тролеферм'
  words: 1500
- points:
  - 'Повернення до розминки: Студент знову аналізує заголовки, але тепер із повним арсеналом знань про маркери дезінформації.'
  - 'Адаптація після 24.02.2022: Як змінилися методи після блокування RT у Європі? Перехід на нові платформи (Telegram, TikTok),
    використання проксі-спікерів та "корисних ідіотів" на Заході.'
  - 'Зв''язок із сьогоденням: Як наративи про "нацистів" та "захист російськомовних" продовжують жити і трансформуватися?
    Як розпізнати їх у сучасному інформаційному потоці?'
  - '[!decolonization] Мета-рефлексія: Дезінформація — це не просто "фейки". Це інструмент імперської політики, спрямований
    на позбавлення українців суб''єктності та права на власну історію і державу.'
  section: Дискусія та підсумок
  words: 700
focus: Інфраструктура російської дезінформації (RT, тролеферми), методи («пожежний шланг брехні») та ключові антиукраїнські
  наративи (кейс MH17). Зіткнення російської, української та західної оптики.
