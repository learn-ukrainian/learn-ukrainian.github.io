content_outline:
- points:
  - 'Провокація: "Спогади — найменш надійне джерело, спотворене травмою та часом" проти "Усна історія — єдине джерело, що
    говорить правду про людські почуття". Яка позиція вам ближча і чому?'
  - 'Анонімний фрагмент: "...їли ми кору з дерева, і гнилу картоплю, і котів, і собак". Чи можемо ми використати цей текст
    як "доказ" у суді? А в підручнику історії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Свідок проти архіву. Позитивістська школа історії (вимагає верифікований документ) проти школи усної історії
    (цінує унікальний людський досвід).'
  - 'Аргумент радянської/російської історіографії: індивідуальні спогади — це "суб''єктивні викривлення" або "антирадянська
    брехня", нерепрезентативні "анекдоти".'
  - 'Дебат 2: Етика та межі. Чи маємо ми право публікувати найстрашніші деталі (напр. канібалізм)? Позиція "за": повна правда,
    якою б вона не була. Позиція "проти": ретравматизація свідка та його нащадків, ризик "порнографії страждань".'
  - '[!epistemic-humility] Не існує "чистих" свідчень. Кожен спогад — це інтерпретація, сформована подальшим життям, травмою
    та колективною пам''яттю.'
  section: 'Конфліктна карта: Довіряти чи перевіряти?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Голоси, яких не було". Методологія: тотальне замовчування, потім — дискредитація.
    Стверджується, що свідчення — це або брехня, або нерелевантні приватні випадки. Агенда: приховати злочин, зберегти міф
    про "мудрість партії". Сліпа пляма: мільйони людських доль.'
  - 'Український наратив: "Голос як головний доказ". Методологія: збір та канонізація свідчень. Свідчення — це не просто джерело,
    а акт відновлення справедливості. Агенда: довести геноцидний характер злочину через демонстрацію наміру, відчутого на
    особистому рівні. Сліпа пляма: іноді — ризик сакралізації свідка, недостатня критика суперечливих спогадів.'
  - 'Західний наратив: "Голос у контексті". Методологія: синтез усної історії та архівних даних. Свідчення використовуються
    для ілюстрації та "олюднення" статистичних висновків (напр. у Енн Епплбом). Агенда: об''єктивне академічне дослідження.
    Сліпа пляма: початково — надмірна довіра до радянських архівів, ігнорування усних джерел.'
  - '[!decolonization] Викриття механізму: радянська система одночасно створювала травму і забороняла про неї говорити, роблячи
    свідчення єдиним, але й "нелегітимним" джерелом.'
  - '[!myth-buster] Міф про те, що "всі мовчали". Мовчали публічно. В родинах пам''ять передавалася, але в кодованій, уривчастій
    формі. Усна історія — це розкодування цього мовчання.'
  section: 'Зіткнення наративів: Свідчення про Голодомор'
  words: 1700
- points:
  - 'Кейс 1: Свідчення дорослого. Фрагмент спогаду про конфіскацію. Аналіз: автор — голова родини, його мова — про втрату
    статусу, відповідальність. Він розуміє "хто" і "навіщо".'
  - 'Критика джерела (дорослий): Можливі спотворення — політична позиція, спроба вписати свій досвід у ширший наратив, "синдром
    того, хто вижив".'
  - 'Кейс 2: Свідчення дитини. Фрагмент спогаду про те, як зникла їжа. Аналіз: автор не розуміє "навіщо", але фіксує сенсорні
    деталі — запах, звук, холод.'
  - 'Критика джерела (дитина): Можливі спотворення — наївність, змішування реальності та уяви, накладання пізніших розповідей
    дорослих на власні спогади.'
  - '[!epistemic-humility] Яке свідчення "правдивіше"? Вони обидва правдиві, але говорять про різну правду: дорослий — про
    соціально-економічну катастрофу, дитина — про екзистенційну катастрофу.'
  section: 'Джерельна критика: Свідок-дорослий vs свідок-дитина'
  words: 1500
- points:
  - 'Повернення до розминки: Тепер, знаючи про конфлікт "свідок vs архів" та етичні дилеми, як би ви відповіли на питання
    про надійність спогадів?'
  - 'Мета-рефлексія: Що важливіше для історика Голодомору — знати точну кількість конфіскованого зерна чи знати, що відчувала
    дитина, в якої забирали останню хлібину?'
  - 'Зв''язок із сьогоденням: Як досвід роботи зі свідченнями про Голодомор допомагає нам аналізувати свідчення про сучасні
    воєнні злочини Росії (Буча, Маріуполь)?'
  - '[!decolonization] Усна історія — це інструмент деколонізації, який повертає агентність та суб''єктність тим, кого імперія
    намагалася перетворити на безмовну масу.'
  section: Дискусія та підсумок
  words: 700
focus: Oral history of the Holodomor, analyzing survivor testimonies, methodological challenges (trauma, memory, ethics),
  comparing historiographical narratives (Ukrainian, Soviet, Western), and source criticism of different witness types (adult
  vs. child).
level: ISTORIO
module: istorio-049
objectives:
- Аналізувати свідчення про Голодомор як історичне джерело, враховуючи його сильні сторони та методологічні обмеження.
- Розрізняти український, радянський/російський та західний історіографічні наративи щодо усної історії Голодомору.
- Застосовувати методи джерельної критики до усних спогадів, зокрема порівнюючи свідчення дорослих і дітей.
- Формулювати аргументовану позицію щодо етичних викликів роботи з травматичною пам'яттю.
pedagogy: CBI
persona:
  role: Модератор семінару, що вчить читати між рядками спогадів, розрізняти фактичну та емоційну правду, ставлячи складні
    етичні питання.
  voice: Empathetic-Skeptic
phase: ISTORIO.1
