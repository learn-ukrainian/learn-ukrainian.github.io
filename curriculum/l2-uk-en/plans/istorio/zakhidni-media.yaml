content_outline:
- points:
  - 'Провокація: Подано два заголовки про одну й ту саму подію 2014 року. Один — «Проросійські сепаратисти захопили будівлю
    в Донецьку». Другий — «Російський спецназ розпочав окупацію Донбасу». Який заголовок є точнішим і чому? Які припущення
    лежать в основі кожного з них?'
  - 'Цитата-загадка: «Щоб зрозуміти Україну, я 20 років працював у нашому московському бюро». Яка проблема криється в цьому,
    на перший погляд, логічному твердженні?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є надання однакового ефірного часу агресору та жертві об''єктивністю? Концепція «хибної еквівалентності»
    (false balance) та її наслідки при висвітленні російсько-української війни.'
  - 'Дебат 2: «Прагматичний реалізм» vs «колоніальна оптика». Чи є заклики до «врахування інтересів Росії» об''єктивним аналізом,
    чи продовженням традиції, де Захід говорить про Україну з Москвою, а не з Києвом?'
  - '[!epistemic-humility] Журналісти часто діють із найкращих намірів, дотримуючись професійних стандартів. Проблема в тому,
    що ці стандарти, розроблені для мирного часу, стають інструментом маніпуляції в умовах інформаційної війни.'
  section: 'Конфліктна карта: Журналістський ''баланс'' чи хибна еквівалентність?'
  words: 900
- points:
  - 'Російський імперський наратив: «захист російськомовних», «відновлення історичної справедливості», «фашистський переворот
    у Києві», «громадянська війна». МЕТОДОЛОГІЯ: дезінформація, псевдоісторичні трактати, емоційна маніпуляція. АГЕНДА: легітимізація
    агресії, демонізація України. СЛІПІ ПЛЯМИ: міжнародне право, суверенітет України, воля українського народу.'
  - 'Західний наратив (проблемні аспекти): «сфери впливу», «провокація НАТО», «складний етнічний конфлікт», «братовбивча війна».
    МЕТОДОЛОГІЯ: покладання на московських кореспондентів, теорія «реалізму» в міжнародних відносинах, пошук «середини» між
    правдою і брехнею. АГЕНДА: уникнення ескалації, збереження статус-кво. СЛІПІ ПЛЯМИ: колоніальна природа РФ, історія українського
    опору, суб''єктність України.'
  - 'Український наратив: «Революція Гідності», «російське вторгнення та окупація», «війна за незалежність». МЕТОДОЛОГІЯ:
    міжнародне право, докази військової присутності РФ, свідчення очевидців. АГЕНДА: мобілізація суспільства та міжнародної
    підтримки, утвердження державності. СЛІПІ ПЛЯМИ: інколи ідеалізація внутрішньої політики, недостатня увага до власних
    помилок до 2014 року.'
  - '[!decolonization] Висвітлення подій через призму «великих держав» та їхніх «інтересів» — це класичний колоніальний підхід,
    що позбавляє Україну власної агентності та права на самовизначення.'
  - '[!myth-buster] Міф про «громадянську війну» — один із найуспішніших російських наративів. Аналіз, як він був створений
    та поширений через західні медіа.'
  section: 'Зіткнення наративів: Анексія Криму та війна на Донбасі (2014)'
  words: 1700
- points:
  - 'Close reading: Аналіз статті з The New York Times за 2014-2015 роки. Хто автор? Чи має він досвід роботи в Україні, чи
    тільки в Росії? Які джерела він цитує — посадовців, «простих людей», експертів? Хто ці «експерти»?'
  - 'Порівняльний аналіз: Зіставлення цієї статті з публікацією того ж періоду від автора, що спеціалізується на Східній Європі
    (напр., Тімоті Снайдер, Енн Епплбом). Яка різниця в термінології, контексті, висновках?'
  - '[!epistemic-humility] Інституційна проблема: Чому бюро в Москві традиційно покривало весь пострадянський простір? Як
    географія впливає на оптику? Аналіз «інформаційної асиметрії» та її наслідків.'
  section: 'Джерельна критика: Як The New York Times пояснював Україну своїм читачам'
  words: 1500
- points:
  - 'Повернення до розминки: аналіз заголовків з першого завдання з використанням нового інструментарію («хибна еквівалентність»,
    «агенда», «фреймінг»).'
  - 'Мета-рефлексія: Як змінилося висвітлення України після 2022 року? Які «сліпі плями» зникли, а які залишилися? Чи можна
    сказати, що західні медіа «прозріли», чи це тимчасовий ефект?'
  - '[!decolonization] Медіаграмотність як інструмент деколонізації свідомості. Як споживачу новин розпізнавати імперські
    наративи та протистояти їм, навіть коли вони замасковані під «об''єктивну» журналістику.'
  section: Дискусія та підсумок
  words: 700
focus: How Western media's structural biases—'both-sides-ism,' lack of regional expertise, and reliance on Moscow bureaus—create
  'blind spots' that are exploited by Kremlin narratives.
level: ISTORIO
module: istorio-111
objectives:
- Аналізувати причини та наслідки «сліпих плям» у західних медіа щодо України
- Критично оцінювати, як стандартні журналістські практики, такі як «баланс думок», можуть ставати інструментом дезінформації
- Розпізнавати ключові російські дезінформаційні наративи, інтегровані в західний медійний простір
- Застосовувати методику джерельної критики для аналізу медійних матеріалів та ідентифікації упереджень і маніпуляцій
