- definition: Польський термін для позначення колишніх східних околиць Речі Посполитої; має сильні імперські та ностальгічні
    конотації.
  pos: ч. мн.
  word: Креси
- definition: Сукупність керівних теоретичних або політичних принципів; зокрема, доктрина Ґедройця — концепція зовнішньої
    політики Польщі.
  pos: ж.
  word: доктрина
- definition: Процес відновлення дружніх, довірливих стосунків між сторонами, що перебували у конфлікті.
  pos: с.
  word: примирення
- definition: Політика «умиротворення» силою; зокрема, каральні акції польської влади проти українського населення в Галичині
    у 1930 році.
  pos: ж.
  word: пацифікація
- definition: Політика насадження польської мови, культури та ідентичності серед непольського населення.
  pos: ж.
  word: полонізація
- definition: Гострі публічні конфлікти між різними соціальними, етнічними або державними групами щодо інтерпретації минулого.
  pos: ч. мн.
  word: війни пам'яті
- definition: Перегляд усталених історичних концепцій, часто з політичною метою.
  pos: ч.
  word: ревізіонізм
- definition: Привілейований дворянський стан у Речі Посполитій, носій ідеології «сарматизму» та імперської величі.
  pos: ж.
