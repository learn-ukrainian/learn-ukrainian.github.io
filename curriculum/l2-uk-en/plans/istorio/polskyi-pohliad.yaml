content_outline:
- points:
  - 'Провокація: Два анонімні фрагменти. Один описує Львів як «вічно польське місто-герой», інший — як «ключовий осередок
    української культури, тимчасово окупований». Який текст старіший? Чому ви так думаєте?'
  - 'Ключове питання: Чи є польсько-українське примирення остаточним, чи це лише тимчасовий союз, що може розпастися через
    історичні образи?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Прометеїзм Пілсудського vs. націоналізм Дмовського. Яку роль для України передбачали два головні архітектори
    польської політики ХХ століття? (федерація проти полонізації)'
  - 'Дебат 2: Волинь 1943 — «геноцид» чи «етнічний конфлікт на тлі війни»? Аналіз термінології, її юридичних та політичних
    наслідків. Чому саме слово є полем битви?'
  - '[!epistemic-humility] Розгляд позицій польського Інституту національної пам''яті (IPN) та українських інституцій. Як
    доступ до різних архівів формує різні версії подій?'
  section: 'Конфліктна карта: Дві Польщі: Імперська vs. Постімперська'
  words: 900
- points:
  - '1. Традиційний польський наратив: «Різанина», одностороння трагедія, геноцид поляків з боку «диких» українських націоналістів.
    Докази: свідчення вцілілих, звіти Армії Крайової. Порядок денний: представити поляків як єдиних жертв, а українців — як
    злочинців. Сліпі плями: контекст німецької окупації, антипольські акції до 1943, діяльність АК.'
  - '2. Український наратив: «Друга польсько-українська війна», симетричний конфлікт, трагедія обох народів. Докази: документи
    ОУН-УПА, свідчення про «пацифікаційні» акції АК. Порядок денний: показати дії УПА як відповідь на терор, зняти звинувачення
    в геноциді. Сліпі плями: жорстокість проти цивільного населення, етнічні чистки.'
  - '3. Постімперський / «західний» наратив (Т. Снайдер, Я. Гросс): Ескалація насильства в «кривавих землях», спровокована
    двома тоталітарними режимами. Джерельна база: порівняльний аналіз, мікроісторія. Порядок денний: зрозуміти механізми масового
    насильства, вийти за межі національних звинувачень. Сліпі плями: ризик втрати агентності та відповідальності конкретних
    акторів.'
  - '[!decolonization] Викриття того, як наратив про «геноцид» використовується сучасними політичними силами для блокування
    діалогу та підтримки імперського міфу про «цивілізаційну місію» Польщі на Сході.'
  - '[!myth-buster] Руйнування міфу про «тисячолітню ворожнечу». Конфлікт був продуктом модерних націоналізмів ХХ століття,
    а не вічною константою.'
  section: 'Зіткнення наративів: Волинь 1943'
  words: 1700
- points:
  - 'Аналіз фрагменту з есе Єжи Ґедройця (журнал «Культура»): Хто автор? Емігрант, інтелектуал, далеко від прямого політичного
    впливу. Аудиторія: польська інтелігенція. Мета: переконати поляків, що імперські амбіції щодо Вільнюса та Львова шкодять
    майбутньому Польщі. Аргументація: геополітична, прагматична, орієнтована на майбутнє.'
  - 'Аналіз фрагменту з офіційної публікації польського Інституту національної пам''яті (IPN) про Волинь: Хто автор? Державна
    інституція. Аудиторія: широка польська громадськість. Мета: встановити єдину офіційну версію минулого, вшанувати пам''ять
    жертв. Аргументація: юридична, моральна, емоційна, орієнтована на минуле.'
  - '[!epistemic-humility] Порівняння мови: Ґедройць — аналітична, холодна, стратегічна. IPN — емоційна, патетична, віктимна.
    Як вибір лексики формує ставлення читача?'
  section: 'Джерельна критика: Текст «Культури» vs. текст «IPN»'
  words: 1500
- points:
  - 'Повернення до розминки: Тепер, знаючи про доктрину Ґедройця та наратив «Кресів», як би ви ідентифікували авторів та епоху
    двох цитат? Які світоглядні позиції вони представляють?'
  - 'Революція Ґедройця: чому його ідеї, що здавалися радикальними в 1970-х, стали основою зовнішньої політики Польщі після
    1989 року і уможливили безпрецедентну підтримку України у 2022?'
  - '[!decolonization] Чи померла імперська ідея «Кресів» остаточно? Як вона проявляється в сучасних польсько-українських
    культурних та політичних дебатах (напр., щодо фільму «Волинь»)?'
  - 'Підсумок: Польща — це не лише адвокат України в ЄС, але й дзеркало, в якому Україна може побачити власні проблеми з історичною
    пам''яттю та націоналізмом.'
  section: Дискусія та підсумок
  words: 700
focus: 'Polish historiography on Ukraine: "Kresy" narrative, interwar policies, Volhynia 1943, Giedroyc doctrine, modern reconciliation
  and disputes.'
level: ISTORIO
module: istorio-005
objectives:
- Аналізувати еволюцію польського погляду на історію України: від імперського наративу «Кресів» до доктрини Ґедройця та стратегічного
    партнерства
- Розрізняти методології та аргументи різних шкіл польської історіографії (націоналістичної, постімперської)
- Застосовувати методику джерельної критики для аналізу текстів польських істориків та публіцистів
- Пояснювати, як історична політика та «війни пам'яті» впливають на сучасні польсько-українські відносини
