content_outline:
- points:
  - 'Провокація: Два погляди на роль мистецтва у 1920-х. Один автор каже про орієнтацію на "психологічну Європу", інший —
    про служіння "пролетарській революції". Який погляд виявився "контрреволюційним" і чому?'
  - 'Цитата-загадка: "Саме тоді, коли минула для нас небезпека політичного обрусіння, прапор русифікації підіймає Москва".
    Хто і в якому контексті міг це сказати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи була дискусія справжнім мистецьким спором про шляхи розвитку літератури (модернізм vs. реалізм), чи це була
    лише ширма для політичної боротьби за контроль над культурною сферою?'
  - 'Дебат 2: Гасло "Геть від Москви!" — це заклик до політичного сепаратизму чи вимога культурної деколонізації та право
    на власний шлях у мистецтві?'
  - '[!epistemic-humility] Позиція 1: Це була остання вільна дискусія, де митці щиро шукали відповіді. Позиція 2: Це була
    від самого початку керована партією кампанія з виявлення та подальшого знищення інакодумців.'
  section: 'Конфліктна карта: Мистецтво чи політика?'
  words: 900
- points:
  - 'Радянський наратив: Хвильовий — "буржуазний націоналіст", "агент куркульства", що під гаслами "боротьби з Москвою" намагався
    відірвати Україну від СРСР. Його "самокритика" — доказ перемоги партійної лінії.'
  - 'Український наратив (пост-1991): Хвильовий — націонал-комуніст, візіонер, що намагався врятувати українську культуру
    від провінціалізації та русифікації. Його самогубство — акт протесту проти сталінського терору.'
  - 'Західний наратив: Дискусія — класичний приклад боротьби націонал-комунізму проти імперського центру в ранньому СРСР.
    Хвильовий аналізується як постать, що випробовувала межі дозволеного, але недооцінила тоталітарну природу режиму.'
  - '[!decolonization] Викриття механізму: як радянська влада перетворювала мистецьку полеміку на політичний донос, а "самокритику"
    — на інструмент публічного приниження та зламу особистості.'
  - '[!myth-buster] Міф про те, що дискусія була суто "літературною". Вона стосувалася всього: ідеології, економіки, зовнішньої
    політики, самого права української нації на існування.'
  section: 'Зіткнення наративів: Трагедія Миколи Хвильового'
  words: 1700
- points:
  - 'Close reading: Аналіз уривків з памфлету "Україна чи Малоросія?". Досліджуємо риторику Хвильового: іронія, афористичність,
    поняття "психологічної Європи" та "азіатського ренесансу".'
  - 'Джерело 2: Уривок з резолюції ЦК КП(б)У про "ухил т. Хвильового". Аналізуємо мову документа: бюрократизми ("ухил", "установка"),
    таврування ("націоналізм", "формалізм"), відсутність аргументів по суті.'
  - '[!epistemic-humility] Порівняльний аналіз: як одні й ті самі тези виглядають у вільній публіцистиці та в офіційному партійному
    документі? Де проходить межа між полемікою та звинуваченням?'
  section: 'Джерельна критика: Памфлети Хвильового vs. відповідь партії'
  words: 1500
- points:
  - 'Повернення до розминки: Студент тепер може не тільки ідентифікувати авторів цитат, але й пояснити, чому одна з них була
    смертельно небезпечною.'
  - 'Мета-рефлексія: Чому для тоталітарних режимів контроль над культурою та історією є не менш важливим, ніж контроль над
    армією та економікою?'
  - '[!decolonization] Зв''язок із сьогоденням: Як гасла "Геть від Москви!" та "Європа чи провінція?" лунають сьогодні? Чи
    можна вважати сучасну боротьбу за українську ідентичність продовженням дискусії 1920-х?'
  section: Дискусія та підсумок
  words: 700
focus: The Literary Discussion of 1925-1928, Mykola Khvylovyi, VAPLITE, the slogan "Away from Moscow!", and the clash between
  Ukrainian cultural sovereignty and Soviet ideological control.
