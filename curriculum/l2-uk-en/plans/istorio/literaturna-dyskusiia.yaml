objectives:
- Аналізувати причини, перебіг та наслідки Літературної дискусії 1925-1928 років
- Оцінювати історичне значення боротьби за культурну автономію в ранньому СРСР
- Застосовувати методи джерельної критики для аналізу памфлетів Хвильового та партійних резолюцій
- Порівнювати та деконструювати радянський, український та західний наративи про цю подію
