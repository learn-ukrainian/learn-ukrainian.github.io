content_outline:
- points:
  - 'Провокація: Один документ називають «першою конституцією Європи», інший — «сепаратистським памфлетом». Як ви гадаєте,
    про що йдеться і чому такі різні оцінки?'
  - 'Цитата-загадка: «Цей договір є радше аристократичною реакцією проти можливого абсолютизму, аніж демократичною хартією».
    Чи стосується ця оцінка документа, що обмежує владу гетьмана?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Конституція vs Договір. Чи є документ Орлика конституцією в сучасному розумінні (верховенство права), чи це
    договір між гетьманом та старшиною (обмеження монарха аристократією) за зразком польських Pacta conventa?'
  - 'Дебат 2: Прогресивний ідеал чи консервативна реакція? Документ закріплював передові ідеї розподілу влади, чи лише захищав
    привілеї козацької старшини, обмежуючи як владу гетьмана, так і права простих козаків?'
  - '[!epistemic-humility] Українська державницька школа бачить у тексті вияв неперервної традиції, правнича школа — аналізує
    його юридичну (не)спроможність.'
  section: 'Конфліктна карта: Державний акт чи політичний маніфест?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Документ — нікчемний папірець, написаний «зрадником»-мазепинцем в екзилі.
    Повністю ігнорується або згадується як приклад безсилля «українського сепаратизму». Мета: заперечення тяглості української
    державності.'
  - 'Український національний наратив: Документ — «перша конституція Європи», доказ тисячолітньої демократичної традиції та
    європейськості України. Символ, що легітимізує сучасну державу. Слабкі місця: ігнорування факту, що документ не діяв,
    гіперболізація його демократичності.'
  - 'Західний академічний наратив: Розглядає Конституцію Орлика в контексті європейського ранньомодерного конституціоналізму.
    Порівнює її зі шведськими, польськими, угорськими аналогами. Аналізує не як діючий закон, а як пам''ятку політичної думки.
    Мета: об''єктивний порівняльний аналіз.'
  - '[!decolonization] Розкриття механізмів: як український наратив виник у відповідь на імперський, і як обидва використовують
    історію для політичних цілей.'
  - '[!myth-buster] "Перша в Європі"? Американська (1787) і польська (1791) були першими чинними. Конституція Орлика (1710)
    — один із перших проєктів, але не унікальний.'
  section: 'Зіткнення наративів: Пакти та Конституції Пилипа Орлика'
  words: 1700
- points:
  - 'Close Reading 1 (Текст Конституції): Аналіз ключових артикулів про обмеження влади гетьмана та роль Генеральної Ради.
    Якою мовою вони написані — юридичною чи декларативною? Хто є суб''єктом (народ, військо, старшина)? Які повноваження є
    чіткими, а які — розмитими?'
  - 'Close Reading 2 (Інтерпретації): Порівняння фрагмента з праці українського історика-державника (напр., О. Субтельного),
    який наголошує на прогресивності, та західного історика (напр., С. Плохія), який вписує її в ширший контекст. Звертаємо
    увагу на вибір слів, акценти, замовчування.'
  - '[!epistemic-humility] Аналіз авторства: Пилип Орлик — освічений випускник Києво-Могилянської академії. Наскільки його
    текст відображає ідеї європейського Просвітництва, а наскільки — старі козацькі традиції?'
  section: 'Джерельна критика: Читаючи Орлика та його інтерпретаторів'
  words: 1500
- points:
  - 'Повернення до розминки: Чому один і той же документ можна одночасно назвати «конституцією», «договором», «памфлетом»
    і «маніфестом»? Студент має сформулювати відповідь, спираючись на три наративи.'
  - 'Мета-рефлексія: Що історія Конституції Орлика говорить нам про різницю між історією як академічною дисципліною та історією
    як інструментом національної міфотворчості та політики пам''яті?'
  - '[!decolonization] Зв''язок із сьогоденням: Як апеляція до Конституції Орлика використовується в сучасній Україні для
    обґрунтування її європейського вибору та цивілізаційної відмінності від Росії?'
  section: Дискусія та підсумок
  words: 700
