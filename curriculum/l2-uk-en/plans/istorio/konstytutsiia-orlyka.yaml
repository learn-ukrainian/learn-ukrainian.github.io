- Застосовувати методи джерельної критики до аналізу уривків з історичних документів та праць істориків
- Критично оцінювати поняття "конституція", "республіка", "демократія" в контексті ранньомодерної Європи
- Формулювати аргументовану позицію щодо ролі Конституції Орлика як історичного документа та як національного символу
