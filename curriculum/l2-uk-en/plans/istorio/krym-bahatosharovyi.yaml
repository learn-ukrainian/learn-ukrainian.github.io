objectives:
- Аналізувати ключові історіографічні дебати щодо історії Криму (статус Ханства, передача 1954 року)
- Порівнювати та деконструювати російський, український та західний наративи щодо «права на Крим»
- Застосовувати методи джерельної критики до політичних документів, що виправдовують державне насильство (депортація, анексія)
- Пояснювати, як історичні наративи використовуються в сучасній інформаційній війні та політичній боротьбі за Крим
