content_outline:
- points:
  - 'Провокація: у 1954 році Крим «подарували» Україні? Розглядаємо два анонімні уривки, що описують передачу півострова.
    Один — про «братерський подарунок», інший — про «економічну необхідність».'
  - 'Завдання: який із цих наративів є радянським офіціозом, а який — сучасною українською інтерпретацією? На які мовні маркери
    ви звернули увагу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Роль Кримського ханства. Це була «хижацька держава работорговців» (російська імперська візія) чи складна політична
    одиниця зі своїми законами, торгівлею та династичними союзами з Гетьманщиною (сучасна українська та кримськотатарська
    історіографія)?'
  - 'Дебат 2: Передача Криму 1954 року. Це був «волюнтаристський акт Хрущова» (сучасна російська теза) чи юридично обґрунтоване
    адміністративне рішення для вирішення економічної кризи після депортації татар та неефективного повоєнного управління
    (аргументи, що базуються на радянських документах)?'
  - '[!epistemic-humility] Кожна сторона використовує ті джерела, які підтверджують її позицію, ігноруючи інші. Завдання історика
    — бачити всю картину.'
  section: 'Конфліктна карта: Кримське ханство та радянська передача'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: претензії на «споконвічно російську землю», починаючи від Тмутаракані. Завоювання
    Катериною II як «цивілізаційна місія». Севастополь як «місто російської слави». Анексія 2014 — «відновлення історичної
    справедливості».'
  - 'Український наратив: зв''язки з часів Київської Русі, козацькі походи, значна частка українського населення в XIX-XX
    ст., юридична правомірність передачі 1954 року, визнання кримських татар корінним народом України, непорушність кордонів
    згідно з міжнародним правом.'
  - 'Західний наратив: фокус на міжнародному праві (Гельсінський акт), правах людини та правах корінних народів. Анексія 2014
    — брутальне порушення світового порядку. Історичні аргументи розглядаються як претекст, а не реальна причина.'
  - '[!decolonization] Російський наратив систематично стирає або маргіналізує історію Кримського ханства та ігнорує сам факт
    депортації 1944 року як геноцидного акту.'
  - '[!myth-buster] Міф про «подарунок Хрущова» — розвінчання через аналіз економічних та адміністративних документів того
    часу.'
  section: 'Зіткнення наративів: Історичне право на Крим'
  words: 1700
- points:
  - 'Аналіз джерела №1: Уривок з Постанови ДКО № 5859сс «Про кримських татар» від 11 травня 1944 року. Розбір лексики: «зрадницькі
    дії», «масове винищення радянських людей», «співпраця з німецько-фашистськими загарбниками».'
  - 'Критика джерела №1: Хто автор (Сталін/Берія)? Яка мета (виправдання тотальної депортації)? Про що документ мовчить (презумпція
    колективної вини, відсутність доказів, нелюдські умови депортації)?'
  - 'Аналіз джерела №2: Уривок з «Кримської промови» Володимира Путіна 18 березня 2014 року. Розбір лексики: «історична справедливість»,
    «повернення в рідну гавань», «бандерівці», «державний переворот у Києві».'
  - 'Критика джерела №2: Хто автор (Путін)? Яка мета (легітимізація анексії)? Які історичні паралелі та маніпуляції використовуються?
    На яку аудиторію це розраховано?'
  - '[!epistemic-humility] Обидва тексти є не історичними документами, а політичними маніфестами, що використовують історію
    для виправдання насильства.'
  section: 'Джерельна критика: Мова виправдання — 1944 vs 2014'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер, після аналізу різних наративів та джерел, ви можете проаналізувати два початкові уривки
    про передачу Криму 1954 року? Які ідеологічні та політичні цілі стоять за кожною з версій?'
  - 'Мета-рефлексія: Чому саме історія Криму є таким гострим полем битви? Що цей модуль говорить про роль історика та історичної
    науки в сучасних конфліктах?'
  - '[!decolonization] Як розуміння багатошарової історії Криму та суб''єктності кримськотатарського народу допомагає протистояти
    сучасній російській пропаганді?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiographical debates on Crimea: from the Khanate''s role and Russian colonization to the 1944 deportation, 1954
  transfer, and 2014 annexation.'
