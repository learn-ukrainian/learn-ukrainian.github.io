objectives:
- Аналізувати причини та наслідки політики Антанти щодо України в 1918-1921 рр., розрізняючи офіційну риторику та реальні
  геополітичні інтереси.
- Критично оцінювати три основні історіографічні наративи (російський, український, західний) щодо української боротьби за
  незалежність.
- Застосовувати методи джерельної критики до аналізу історичних документів, виявляючи упередження, контекст та мету автора.
- Формулювати аргументовану позицію щодо довгострокових наслідків подій 1918-1921 рр. для української політичної культури
  та відносин із Заходом.
