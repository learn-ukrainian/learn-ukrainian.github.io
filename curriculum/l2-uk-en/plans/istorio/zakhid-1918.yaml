content_outline:
- points:
  - 'Провокація: Принцип «самовизначення націй» Вудро Вільсона застосували до Польщі, але проігнорували для України. Чому
    один новостворений сусід імперії отримав усе, а інший — нічого? '
  - 'Дві цитати без авторства: одна — з меморандуму української делегації, інша — з внутрішнього документа британського МЗС.
    Студент має вгадати, де чия позиція, і пояснити логіку.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Позиція Антанти щодо України — це результат свідомого геополітичного вибору (ставка на «єдину та неподільну»
    білу Росію як противагу Німеччині та більшовизму) чи банального невігластва (нерозуміння, що таке Україна, та звичка бачити
    її як «Малу Росію»)?'
  - 'Дебат 2: Французька інтервенція в Одесі — це була спроба допомогти, що провалилася через місцеві умови, чи цинічний крок
    для захисту французьких інвестицій та підтримки білих, де українські інтереси ніколи не бралися до уваги?'
  - '[!epistemic-humility] Аргументи «за» невігластво: карти того часу, де Україна — частина Росії; звіти дипломатів, що плутають
    УНР з Директорією, Скоропадським та більшовиками. Аргументи «за» розрахунок: меморандуми, що прямо говорять про важливість
    підтримки Колчака та Денікіна для відновлення східного фронту.'
  section: 'Конфліктна карта: Стратегічний розрахунок чи сліпа пляма?'
  words: 900
- points:
  - 'Російський імперський / білий наратив: Український рух — інспірована німцями та австрійцями «зрада» з метою розчленування
    єдиної Росії. УНР — нелегітимна сепаратистська кліка. Надання їм слова в Парижі легітимізувало б хаос.'
  - 'Український наратив: УНР — легітимна держава, що постала на руїнах імперій на основі демократичного принципу самовизначення.
    Недопущення української делегації до конференції — зрада західними демократіями власних ідеалів та стратегічна помилка,
    що відкрила шлях радянській окупації.'
  - 'Західний (Антанта) наратив: Пріоритет №1 — стабільність у повоєнній Європі. «Українське питання» — незрозуміле, ризиковане
    і відволікає від головної мети — стримування більшовизму та відновлення сильної, але неагресивної Росії. Польща — зрозумілий
    і надійний партнер-«санітарний кордон», Україна — ні.'
  - '[!decolonization] Викриття механіки: як Антанта використовувала риторику самовизначення вибірково, де це відповідало
    її колоніальним та геополітичним інтересам, ігноруючи її, де вона створювала «проблеми».'
  - '[!myth-buster] Міф про те, що «Захід завжди підтримував демократію». Історія 1918-1921 рр. показує, що підтримка надавалася
    не демократії, а геополітичній стабільності та власним інтересам, часто за рахунок молодих демократій.'
  section: 'Зіткнення наративів: Статус України на Паризькій мирній конференції'
  words: 1700
- points:
  - 'Аналіз тексту: порівняння офіційного меморандуму української делегації до учасників конференції та приватного листа одного
    з делегатів до Києва. Що говорилося для публіки, а що — для своїх?'
  - 'Автор та його agenda: хто були члени української делегації? Які партії та класи вони представляли? Чи була їхня позиція
    єдиною?'
  - 'Інституційний контекст: аналіз звіту британського дипломата з Foreign Office про «українське питання». Які стереотипи
    (про «нездатність слов''ян до державності», «природні кордони Росії») впливають на його аналіз? На які джерела він посилається
    (російські емігранти, польські політики)?'
  - '[!epistemic-humility] Читаючи ці документи, ми бачимо не об''єктивну реальність, а її інтерпретацію через призму національних
    інтересів, упереджень та обмеженої інформації.'
  section: 'Джерельна критика: Доповіді з Парижа'
  words: 1500
- points:
  - 'Повернення до розминки: Чому Вільсон не став «хрещеним батьком» незалежної України, як став для Польщі чи Чехословаччини?
    Студент формулює відповідь, спираючись на аналіз наративів та джерел.'
  - 'Мета-рефлексія: Як історія провалу в Парижі вчить нас читати сучасні новини про міжнародну підтримку України? Які паралелі
    та відмінності ви бачите між 1919 та 2022 роками?'
  - '[!decolonization] Чи є залежність від зовнішньої допомоги та визнання сама по собі колоніальною спадщиною? Як цей епізод
    вплинув на формування української політичної культури та ставлення до «Заходу»?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiography of the Ukrainian War of Independence: Analysis of the Entente''s policies, the failure of the Ukrainian
  delegation at the Paris Peace Conference, and the establishment of a long-term pattern in Western-Ukrainian relations.'
level: ISTORIO
