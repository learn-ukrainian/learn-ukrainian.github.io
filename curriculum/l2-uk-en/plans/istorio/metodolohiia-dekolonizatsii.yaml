content_outline:
- points:
  - 'Провокація: Чому західні університети, що десятиліттями вивчали постколоніалізм в Індії та Африці, до 2014 року майже
    не помічали найбільшу континентальну імперію світу — Росію — та її найстарішу колонію, Україну? Які стереотипи та сліпі
    зони зробили Україну невидимою?'
  - 'Цитата для роздумів: «Імперії не мають кордонів, лише горизонт». Як цей принцип визначав політику Росії щодо України?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи можна застосувати «класичну» постколоніальну теорію, розроблену на матеріалі заморських імперій (Британія,
    Франція), до «внутрішньої» колонізації в російській імперії? Аргументи «за» (універсальність імперських механізмів) і
    «проти» (специфіка спільного кордону, культурної близькості, релігії).'
  - 'Дебат 2: «Підпорядкований не може говорити» (Співак) vs український активний опір. Чи була Україна пасивною жертвою (subaltern),
    чи активним агентом, що постійно боровся за суб''єктність, навіть будучи частиною імперії? Дискусія між Марком Павлишиним
    та Тамарою Гундоровою.'
  - '[!epistemic-humility] Розгляд концепції «самоколонізації» — як частина українських еліт інтерналізувала імперські наративи
    та працювала на імперію.'
  section: 'Конфліктна карта: Чия теорія, чия практика?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Концепція «єдиного народу» або «братніх народів». Україна як «Малоросія»
    — регіональна, фольклорна версія «великої російської культури». Українська мова — «діалект». Будь-який рух за незалежність
    — інтриги зовнішніх ворогів (Польщі, Австрії, США).'
  - 'Український національний наратив: Історія багатовікового опору колоніальному гнобленню. Емський указ, Валуєвський циркуляр,
    Голодомор, Розстріляне відродження як етапи геноцидної політики. Мова, культура та історія — ключові фронти боротьби за
    існування.'
  - 'Західний наратив: Довгий час ігнорував колоніальний вимір, розглядаючи Україну через призму «внутрішніх справ Росії/СРСР»
    або як об''єкт у грі великих держав. Після 2014 — повільне пробудження, але часто з намаганням знайти «середину» між позиціями
    колонізатора і колонізованого.'
  - '[!decolonization] Викриття механізмів імперського контролю: присвоєння історії (Русь), заперечення суб''єктності, патологізація
    визвольного руху.'
  - '[!myth-buster] Руйнування міфу про «вічну дружбу» та «спільну колиску».'
  section: 'Зіткнення наративів: Природа російсько-українських відносин'
  words: 1700
- points:
  - 'Текст 1: Аналіз уривків з «Орієнталізму» Едварда Саїда. Як конструюється образ «Іншого» (The Other)? Які інституції (університети,
    уряди, медіа) створюють і підтримують «орієнталістський дискурс»? Який контекст Саїда (Палестина, США, Близький Схід)?'
  - 'Текст 2: Аналіз уривків з «Післячорнобильської бібліотеки» Тамари Гундорової. Як вона адаптує, а де сперечається з Саїдом?
    Що таке «культурний колоніалізм» в українському контексті? Чому, на її думку, Україна — це не просто «Схід» для російського
    «Заходу»?'
  - '[!epistemic-humility] Порівняння методологій: Саїд аналізує зовнішній погляд на колонію. Гундорова аналізує, як колонія
    бачить сама себе і світ через нав''язану імперську оптику. Це принципово різні завдання.'
  section: 'Джерельна критика: Саїд vs Гундорова'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чому Захід не бачив в Україні колонію? Студент має сформулювати комплексну відповідь, використовуючи
    поняття орієнталізму, расиалізації (білі європейці не можуть бути колонізованими), специфіки континентальних імперій та
    успішності російського наративу.'
  - 'Зв''язок із сьогоденням: Як розуміння деколоніальної теорії допомагає розшифровувати сучасну російську пропаганду? Проаналізуйте
    висловлювання Путіна про «один народ» та «Україну, створену Леніним» з точки зору імперського дискурсу.'
  - '[!decolonization] Рефлексія: Деколонізація — це не лише про політику, це про повернення собі права на власний погляд,
    власну історію та власну мову. Що означає «деколонізувати» свій розум для українця сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Постколоніальна теорія (Саїд, Співак, Баба), українська деколоніальна критика (Гундорова, Павлишин, Забужко), методи
  аналізу імперських наративів, критика західних сліпих зон
level: ISTORIO
module: istorio-008
objectives:
- Пояснювати ключові поняття постколоніальної теорії (орієнталізм, гібридність, суб'єктність) та їхню релевантність для України
- Порівнювати російський імперський, український національний та західний наративи щодо української історії та ідентичності
- Застосовувати методи деколоніального аналізу для критики історичних, політичних та медійних текстів
- Критично оцінювати межі застосовності західних теоретичних моделей до східноєвропейського контексту
- Формулювати аргументовану позицію щодо ролі інтелектуалів у процесах деколонізації
pedagogy: CBI
