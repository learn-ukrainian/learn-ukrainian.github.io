content_outline:
- points:
  - 'Провокація: «Мир для нашого часу» чи співучасть у злочині? Подано два уривки: один — з промови західного дипломата про
    забезпечення стабільності після війни, другий — зі щоденника українського біженця, якому загрожує примусова репатріація.
    Як перший документ призвів до ситуації, описаної в другому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи було рішення Заходу погодитись на примусову репатріацію цинічним актом realpolitik (розуміючи наслідки, але
    приймаючи їх заради стабільності), чи наслідком тотального нерозуміння природи сталінського режиму?'
  - 'Дебат 2: Де саме відбулася «зрада»? В самому Ялтинському договорі, чи в його жорстокій і розширеній інтерпретації під
    час операції «Кілхол», коли видавали навіть тих, хто ніколи не був громадянином СРСР?'
  - '[!epistemic-humility] Західні історики часто говорять про «трагічну помилку», українські — про «свідому зраду». Де проходить
    межа між цими інтерпретаціями?'
  section: 'Конфліктна карта: Реальполітик чи злочинна недбалість?'
  words: 900
- points:
  - 'Радянський наратив: Усі радянські громадяни за кордоном — зрадники, колаборанти або військовополонені, яких треба повернути
    на батьківщину для «фільтрації» та покарання. Це внутрішня справа СРСР, гарантована угодами.'
  - 'Український наратив: Примусова репатріація — це масове викрадення та вбивство з санкції держави, продовження геноцидної
    політики проти українців. Табори ДіПі (DPs) — це притулок для політичних біженців, а не колаборантське кубло. [!decolonization]'
  - 'Західний наратив (самовиправдання): Це була прикра, але необхідна ціна за збереження союзу зі Сталіним для перемоги над
    Японією. Трагічні «ексцеси» були непередбачуваними наслідками бюрократичного виконання угод. [!myth-buster]'
  section: 'Зіткнення наративів: Примусова репатріація'
  words: 1700
- points:
  - 'Аналіз уривку з таємного наказу Allied Forces Headquarters про операцію «Кілхол». Мова документа: бюрократична, дегуманізуюча
    («displaced persons», «Soviet nationals»), акцент на логістиці, повна відсутність моральних категорій.'
  - 'Аналіз уривку зі спогадів українського письменника (напр. Івана Багряного) або очевидця з табору ДіПі. Мова свідчення:
    емоційна, особиста, деталі опору, самогубств, жорстокості британських та американських солдатів.'
  - '[!epistemic-humility] Як зіставлення цих двох текстів показує прірву між офіційною історією, записаною в документах,
    та історією людських доль?'
  section: 'Джерельна критика: Операція «Кілхол» — наказ і свідчення'
  words: 1500
- points:
  - 'Повернення до розминки: студент має тепер чітко пояснити, як логіка «великої політики» призвела до трагедії мільйонів,
    і хто несе відповідальність.'
  - 'Мета-рефлексія: Як мова дипломатії та військових наказів може слугувати інструментом для приховування та легітимізації
    масових злочинів?'
  - '[!decolonization] Зв''язок із сьогоденням: Як ялтинська логіка «сфер впливу» та «непровокування Росії» проявилася в політиці
    Заходу у 1991 (промова «Курча по-київськи»), 2008, 2014 і 2022 роках? Чи вивчив Захід уроки 1945 року?'
  section: Дискусія та підсумок
  words: 700
focus: The Yalta Conference, forced repatriation of Soviet citizens (Operation Keelhaul), Western complicity, and the historiographical
  debate over 'betrayal' vs. 'realpolitik'.
level: ISTORIO
module: istorio-096
objectives:
- Аналізувати рішення Ялтинської конференції щодо України та їхні наслідки, зокрема примусову репатріацію.
- Критично оцінювати позиції та мотиви «Великої трійки» (СРСР, США, Велика Британія) у питанні повоєнного устрою Європи.
- Порівнювати радянський, український та західний наративи щодо статусу переміщених осіб (DPs) та операції «Кілхол».
- Застосовувати методи джерельної критики для аналізу офіційних документів та свідчень очевидців.
pedagogy: CBI
