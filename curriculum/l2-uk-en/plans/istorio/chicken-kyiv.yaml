content_outline:
- points:
  - 'Провокація: 1 серпня 1991 року президент США виступає у Києві і застерігає українців від «суїцидального націоналізму».
    24 серпня Україна проголошує незалежність. Що пішло не так для Буша?'
  - 'Цитата без автора: "Надії всього людства спочивають на вас... щоб ви повели за собою Радянський Союз до демократії та
    свободи". Хто і кому це сказав? Які припущення лежать в основі цієї фрази?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Політика США щодо України в 1991 році — це був прагматичний realpolitik, спрямований на уникнення хаотичного
    розпаду ядерної держави, чи цинічна «здача» українських інтересів заради збереження добрих стосунків з Горбачовим?'
  - 'Дебат 2: Реакція українського істеблішменту — це був шок і розчарування, що змусило діяти всупереч позиції США, чи промова
    Буша була просто проігнорована як нерелевантна для внутрішніх процесів?'
  - '[!epistemic-humility] Ми не можемо знати точних мотивів Буша, але можемо аналізувати, як різні історіографічні школи
    інтерпретують його дії на основі наявних доказів.'
  section: 'Конфліктна карта: Прагматизм чи зрада?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Промова Буша — момент здорового глузду. Західний лідер намагався зупинити
    «сепаратистів» і зберегти велику державу, яку реформував Горбачов. Розпад СРСР — геополітична катастрофа, якої можна було
    уникнути.'
  - 'Український наратив: Промова — історична образа та символ нерозуміння Заходом прагнень України. Вона продемонструвала,
    що Україна може покладатися лише на себе. Термін «Курча по-київськи» — це тавро ганьби для американської дипломатії, яка
    зрадила демократичні цінності.'
  - 'Західний (американський) наратив: Промова — це класичний приклад realpolitik. Головна мета — стабільність і керованість
    процесу розпаду СРСР, а не підтримка національних рухів. Пріоритетом була безпека ядерного арсеналу, а не незалежність
    України.'
  - '[!decolonization] Порівняння наративів викриває імперську оптику, в якій Україна не розглядається як самостійний суб''єкт,
    а лише як частина «радянського питання».'
  - '[!myth-buster] Міф про те, що США завжди були головним союзником української незалежності. 1991 рік показує, що ситуація
    була набагато складнішою.'
  section: 'Зіткнення наративів: Промова «Курча по-київськи»'
  words: 1700
- points:
  - 'Близьке читання тексту промови: аналіз ключових фраз — «суїцидальний націоналізм», «безнадійна етнічна ненависть», «тиранія
    більшості». Які конотації вони несуть?'
  - 'Авторство: хто насправді написав промову? Роль Кондолізи Райс, радянолога та спеціаліста по СРСР. Як її бекграунд вплинув
    на текст?'
  - 'Цільова аудиторія: до кого насправді звертався Буш? До українського парламенту, до Михайла Горбачова, чи до американських
    виборців?'
  - 'Сприйняття та наслідки: Як колонка Вільяма Сафайра в New York Times створила безсмертний ярлик «Chicken Kiev speech»
    і перетворила промову на символ політичного провалу.'
  - '[!epistemic-humility] Аналіз показує, що один і той самий текст може мати кардинально різні інтерпретації залежно від
    позиції та мети читача.'
  section: 'Джерельна критика: Деконструкція промови'
  words: 1500
- points:
  - 'Повернення до розминки: студент тепер може пояснити, чому Буш сказав те, що сказав, і чому його слова не мали очікуваного
    ефекту, а навпаки, стали контрпродуктивними.'
  - 'Мета-рефлексія: Чого вчить нас історія промови «Курча по-київськи» про те, як аналізувати політичні заяви? Як виявляти
    приховані інтереси та ідеологічні рамки?'
  - '[!decolonization] Зв''язок із сучасністю: порівняйте обережну позицію Заходу в 1991 році з рішучою підтримкою у 2022.
    Які уроки були винесені? Як змінилося сприйняття України як суб''єкта міжнародної політики?'
  section: Дискусія та підсумок
  words: 700
focus: The 1991 "Chicken Kiev" speech, US foreign policy towards Ukraine, Western vs. Russian vs. Ukrainian perspectives on
  the collapse of the USSR, and the historiography of Ukrainian independence.
level: ISTORIO
module: istorio-097
objectives:
- Аналізувати причини та наслідки промови «Курча по-київськи», розглядаючи її з трьох наративних позицій: американської, української
    та російської
- Критично оцінювати аргументи різних історіографічних шкіл щодо ролі США в процесі розпаду СРСР
- Застосовувати методи джерельної критики для аналізу політичних промов та виявлення прихованих ідеологічних установок
- Формулювати аргументовану позицію щодо змін у зовнішній політиці США щодо України між 1991 та 2022 роками
