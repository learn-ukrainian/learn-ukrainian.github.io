content_outline:
- points:
  - 'Питання: Чи був експорт українського зерна благом для населення, чи механізмом викачування ресурсів? Подано два погляди:
    один наголошує на модернізації портів і залученні до світової торгівлі, інший — на збагаченні імперського центру за рахунок
    праці кріпаків. Який з них вам здається ближчим до істини і чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Україна — класична колонія чи відстала аграрна периферія імперії? Позиція 1 (колоніальна): вивіз сировини, контроль
    над інфраструктурою, політична залежність. Позиція 2 (імперська): Україна — невід''ємна частина єдиного економічного простору,
    її розвиток (порти, залізниці) був в інтересах всієї імперії.'
  - 'Дебат 2: Що було головним інструментом експлуатації — кріпацтво чи ринкові механізми? Позиція 1: кріпацтво як система
    безоплатної праці було основою всього. Позиція 2: навіть після скасування кріпацтва інфраструктура (залізниці до портів,
    а не між українськими містами) та податкова політика консервували залежність.'
  - '[!epistemic-humility] Радянська історіографія часто замовчувала колоніальний характер експлуатації, говорячи про «спільний
    економічний розвиток».'
  section: 'Конфліктна карта: Колонія чи периферія?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Україна — «житниця імперії», її місія — годувати промислові центри та армію.
    Розвиток портів (Одеса) та залізниць — це «цивілізаційна місія» та прогрес, що прийшов з центру. Прибутки справедливо
    йдуть до столиці, де ухвалюються рішення.'
  - 'Український наратив: Україна — окупована територія, з якої викачують ресурси. Чорноземи — це прокляття, а не багатство.
    Зерно, цукор, вугілля — все йде на експорт або до метрополії. Інфраструктура побудована як колоніальна — для вивезення,
    а не для внутрішнього зв''язку. Селяни — раби, що виробляють багатство для панів у Петербурзі.'
  - 'Західний наратив (Postcolonial studies): Аналіз України через призму теорії залежності (dependency theory). Порівняння
    з іншими аграрними колоніями (Індія, Єгипет, країни Латинської Америки). Аналіз торговельного балансу, відсутність інвестицій
    у переробну промисловість та людський капітал. Україна як приклад внутрішнього колоніалізму.'
  - '[!decolonization] Розвінчання міфу про «спільний дім» і «братню допомогу».'
  - '[!myth-buster] Міф про те, що імперія «розвивала» Україну. Насправді вона розвивала інструменти для пограбування України.'
  section: 'Зіткнення наративів: Українське зерно та імперський бюджет'
  words: 1700
- points:
  - 'Аналіз 1: Митні звіти Одеського порту за XIX ст. Яка частка експорту — зерно? Хто є власниками компаній-експортерів (прізвища,
    національність)? Куди йдуть кораблі? Які товари імпортуються? — Висновок: структура торгівлі типова для колонії.'
  - 'Аналіз 2: Бюджет Полтавської губернії vs. бюджет армії та флоту імперії. Співставлення доходів, отриманих з українських
    земель, з витратами на місцеві потреби (освіта, медицина). Куди насправді йшли гроші, зароблені на українському зерні?'
  - 'Аналіз 3: Порівняння статутів двох цукрових заводів — один належить родині Терещенків, інший — російському аристократу.
    Як розподіляється прибуток? Чи є інвестиції в соціальну сферу для робітників? — Виняток (Терещенки) лише підтверджує правило
    (колоніальна експлуатація).'
  - '[!epistemic-humility] Статистика — це теж наратив. Імперська статистика приховує більше, ніж показує, групуючи дані так,
    щоб не було видно колоніального статусу України.'
  section: 'Джерельна критика: Статистика експорту vs. реальність селян'
  words: 1500
- points:
  - 'Повернення до розминки: Отже, чи була Україна економічною колонією? Сформулюйте відповідь, використовуючи поняття «метрополія»,
    «периферія», «торговельний баланс», «структура експорту».'
  - 'Мета-рефлексія: Як наратив про «житницю» використовується сьогодні? Чому Росія досі розглядає Україну як ресурс і територію,
    а не як самостійного актора?'
  - '[!decolonization] Як розуміння економічної історії допомагає боротися із сучасною російською пропагандою про «один народ»
    та «історичні землі»?'
  section: Дискусія та підсумок
  words: 700
focus: 'Historiographical debate on Ukraine''s economic role in the Russian Empire: a resource colony or an integrated agricultural
  region? Analysis of grain/sugar exports, serfdom, and infrastructure as mechanisms of imperial control.'
level: ISTORIO
module: istorio-103
objectives:
- Розрізняти російський імперський, український національний та західний постколоніальний наративи про економічну історію
  України
- Аналізувати статистичні дані (експорт, бюджети) для виявлення ознак колоніальної експлуатації
- Застосовувати поняття "центр-периферія", "метрополія-колонія", "теорія залежності" до українського історичного контексту
- Критично оцінювати роль інфраструктури (залізниць, портів) як інструменту контролю та визиску
- Формулювати аргументовану позицію в дискусії про економічний статус України в Російській імперії
