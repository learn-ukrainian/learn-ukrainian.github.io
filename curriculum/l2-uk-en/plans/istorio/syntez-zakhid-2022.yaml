content_outline:
- points:
  - 'Провокація: «Рішуча підтримка» vs. «Уникнення ескалації». Чи є це двома сторонами однієї медалі, чи взаємовиключними
    стратегіями західної політики щодо України? Наведіть аргументи, базуючись на подіях 2014-2024 років.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: 2022 рік як фундаментальна зміна. Аргументи «за»: безпрецедентний масштаб військової та фінансової допомоги,
    швидкість та жорсткість санкцій, розрив з ідеєю «не провокувати Росію».'
  - 'Дебат 2: 2022 рік як продовження старих патернів. Аргументи «за»: страх ескалації досі домінує, допомога надається поступово
    і часто із запізненням, зберігається наратив про «збереження обличчя Путіну».'
  - '[!epistemic-humility] Як розрізнити реальну зміну стратегії від тактичної реакції, продиктованої шоком від масштабу російської
    агресії та українського спротиву?'
  section: 'Конфліктна карта: Зміна парадигми чи ситуативна реакція?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Захід використовує Україну як інструмент для ослаблення Росії, допомога лише
    затягує конфлікт і веде до страждань українського народу, це «війна НАТО до останнього українця».'
  - 'Український наратив: Західна допомога — це інвестиція у спільну безпеку і захист міжнародного права, але вона часто запізнюється
    і є недостатньою через десятиліття помилкової політики щодо Росії. Спротив України дав Заходу шанс виправити свої помилки.'
  - 'Західний наратив: Ми є коаліцією демократій, що надає історичну підтримку жертві агресії, але змушені діяти обережно,
    щоб уникнути прямого конфлікту з ядерною державою і глобальної катастрофи.'
  - '[!decolonization] Аналіз показує, як українська агентність (спротив) змусила Захід переглянути свій наратив про «сфери
    впливу» та визнати суб''єктність України.'
  - '[!myth-buster] Міф про «миттєвий і нищівний» ефект санкцій vs. реальність довгострокової війни на виснаження економік.'
  section: 'Зіткнення наративів: Західна допомога Україні'
  words: 1700
- points:
  - 'Джерело 1: Промова Олафа Шольца «Zeitenwende» (поворотний момент). Аналіз риторики vs. реальні поставки зброї у перші
    місяці. Як інституційна інерція та політичні фракції гальмують проголошену зміну курсу?'
  - 'Джерело 2: Рамштайнські комюніке. Еволюція мови від «допомоги в обороні» до «забезпечення перемоги України». Які конкретні
    зобов''язання стоять за цими формулюваннями? Хто є автором цих змін — політики чи військові?'
  - 'Порівняння риторики американських та європейських лідерів: єдність у заявах, розбіжності у швидкості та типах допомоги.
    Як ці відмінності відображають різні національні інтереси та історичний досвід?'
  - '[!epistemic-humility] Читаючи офіційні заяви, ми маємо аналізувати не лише те, що сказано, але й те, про що промовчали,
    і хто є цільовою аудиторією кожного повідомлення.'
  section: 'Джерельна критика: Аналіз промов та документів'
  words: 1500
- points:
  - 'Повернення до розминки: Чи є «уникнення ескалації» легітимною стратегією чи евфемізмом для страху і нерішучості? Сформулюйте
    відповідь з урахуванням матеріалів модуля.'
  - 'Мета-рефлексія: Що цей модуль говорить про природу міжнародних відносин? Наскільки ідеї та цінності (демократія, суверенітет)
    впливають на політику порівняно з прагматичними інтересами та сирою силою?'
  - '[!decolonization] Як закріпити суб''єктність України у західному дискурсі, щоб уникнути повернення до патерну «Russia
    first» після завершення гарячої фази війни?'
  section: Дискусія та підсумок
  words: 700
focus: A historiographical analysis of Western policy towards Ukraine, questioning whether the 2022 full-scale invasion marked
  a genuine paradigm shift or a temporary, situational reaction, by comparing it to historical patterns of appeasement and
  insufficient support.
level: ISTORIO
module: istorio-102
objectives:
- Аналізувати та порівнювати російський, український та західний наративи щодо міжнародної допомоги Україні.
- Застосовувати методику джерельної критики для аналізу офіційних політичних заяв та документів.
- Розрізняти довгострокові стратегічні зміни та короткострокові ситуативні реакції в міжнародній політиці.
- Формулювати аргументовану позицію щодо стійкості та глибини змін у політиці Заходу щодо України після 2022 року.
