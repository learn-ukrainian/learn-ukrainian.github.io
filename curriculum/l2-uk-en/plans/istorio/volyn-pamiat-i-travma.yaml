content_outline:
- points:
  - 'Провокація: Представлено два спогади про події на Волині 1943 року — один польський, один український, без авторства.
    Студент має визначити, який з них кому належить і пояснити свою логіку.'
  - 'Цитата для роздумів: «Історія — це не те, що було, а те, що про це пам''ятають». Як ця фраза стосується Волинської трагедії?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Правова та моральна класифікація подій. Польська сторона наполягає на терміні «геноцид». Українська сторона
    частіше використовує «трагедія», «антипольські акції», наголошуючи на двосторонньому характері конфлікту. У чому різниця?'
  - 'Дебат 2: Роль командування УПА. Чи була це централізовано спланована акція (позиція більшості польських істориків), чи
    ініціатива місцевих командирів, що вийшла з-під контролю (погляд частини українських істориків)?'
  - '[!epistemic-humility] Обидві сторони використовують документи та свідчення, що підтверджують їхню версію. Завдання —
    не знайти «єдину правду», а зрозуміти, як формуються та аргументуються ці позиції.'
  section: 'Конфліктна карта: Трагедія чи геноцид?'
  words: 900
- points:
  - 'Польський наратив: розповідь про «різанину» (rzeź), жорстоку та неспровоковану етнічну чистку, здійснену українськими
    націоналістами з ОУН-УПА проти мирного польського населення. Акцент на жертвах та злочинах.'
  - 'Український наратив: розповідь про війну у війні, де акція УПА була відповіддю на багаторічну політику полонізації, репресій
    (пацифікація, осадництво) та співпрацю частини поляків з німецькими та радянськими окупантами.'
  - 'Російський імперський / радянський наратив: зображення подій як доказу «вічної» звірячої сутності «українських буржуазних
    націоналістів». Використання трагедії для розколу між українцями та поляками та для дискредитації українського визвольного
    руху.'
  - 'Західний наратив (Тімоті Снайдер, Норман Дейвіс): спроба побачити події в ширшому контексті подвійної окупації (нацистської
    та радянської), краху держав та «кривавих земель», де насильство було багатостороннім.'
  - '[!decolonization] Аналіз того, як радянська та сучасна російська пропаганда маніпулюють темою Волині для просування власних
    імперських цілей.'
  - '[!myth-buster] Міф про «односторонню» провину. Документи свідчать про жертви з обох сторін, хоча кількість польських
    жертв була значно більшою.'
  section: 'Зіткнення наративів: Волинська трагедія 1943 року'
  words: 1700
- points:
  - 'Close reading: Тімоті Снайдер («Реконструкція націй»). Аналіз його концепції «подвійної асиметрії» та акценту на мікроісторії
    та свідченнях очевидців.'
  - 'Close reading: Ґжеґож Мотика («Від волинської різанини до операції «Вісла»»). Розгляд його аргументів на користь тези
    про геноцидний характер дій УПА, його робота з польськими архівами та свідченнями.'
  - 'Методологія: Порівняння джерельної бази обох істориків. Хто на які архіви спирається? Як вони ставляться до усної історії?
    Які категорії доказів вважають пріоритетними?'
  - '[!epistemic-humility] Обидва — видатні історики, але їхні висновки різняться. Завдання студента — зрозуміти, чому, аналізуючи
    їхню методологію, фокус та історичний контекст, у якому вони пишуть.'
  section: 'Джерельна критика: Снайдер vs. Мотика'
  words: 1500
- points:
  - 'Повернення до розминки: Чи можете ви тепер не лише ідентифікувати авторів спогадів, але й пояснити, які елементи наративу
    (польського чи українського) в них присутні?'
  - 'Пам''ять і примирення: Аналіз процесу польсько-українського діалогу після 1991 року. Формула «пробачаємо і просимо пробачення».
    Чому вона іноді не працювала?'
  - 'Зв''язок із сьогоденням: Як повномасштабне російське вторгнення 2022 року змінило динаміку історичної пам''яті? Чому
    стало можливим безпрецедентне примирення на рівні народів, попри складне минуле?'
  - '[!decolonization] Роздуми про те, чи є спільний ворог єдиним шляхом до подолання травм минулого. Які уроки Волині важливі
    для майбутнього України та Європи?'
  section: Дискусія та підсумок
  words: 700
focus: The Volhynian tragedy of 1943, analyzing its historical context, competing Ukrainian and Polish narratives, and the
  path towards reconciliation.
level: ISTORIO
module: istorio-074
objectives:
- Аналізувати та порівнювати ключові елементи польського, українського та російського наративів щодо Волинської трагедії
- Критично оцінювати історичні джерела та історіографічні праці, розрізняючи факти, інтерпретації та маніпуляції
- Застосовувати поняття «пам'ять», «травма» та «примирення» для аналізу складних сторінок минулого
- Формулювати власну обґрунтовану позицію щодо причин, перебігу та наслідків волинських подій, визнаючи їхню складність та
  багатогранність
