- definition: політика насильницького об'єднання одноосібних селянських господарств у колективні (колгоспи) в СРСР.
  pos: ж.
  word: колективізація
- definition: репресивна політика СРСР, спрямована проти «куркулів» (заможних селян), що включала конфіскацію майна, виселення,
    заслання та фізичне знищення.
  pos: с.
  word: розкуркулення
- definition: у радянській пропаганді — заможний селянин, що використовує найману працю; на практиці — політичний ярлик для
    будь-якого селянина, що чинив опір колективізації.
  pos: ч.
  word: куркуль
- definition: одиниця обліку праці в колгоспах, за яку нараховувалася оплата (зазвичай, мінімальна, натурою) в кінці року;
    форма прихованого кріпацтва.
  pos: ч.
  word: трудодень
- definition: система примусового вилучення державою зерна у селян за значно заниженими цінами або безкоштовно, що стала прямим
    інструментом Голодомору.
  pos: мн.
  word: хлібозаготівлі
- definition: спосіб розповіді та інтерпретації історичних подій, що відображає певну ідеологічну позицію, культурну пам'ять
    та політичні інтереси.
  pos: ч.
  word: наратив
- definition: сукупність пов'язаних текстів, висловлювань та практик, що формують та відображають уявлення про певне явище
    в суспільстві.
  pos: ч.
  word: дискурс
