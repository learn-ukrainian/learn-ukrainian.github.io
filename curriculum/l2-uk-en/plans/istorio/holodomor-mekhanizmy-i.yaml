content_outline:
- points:
  - 'Провокація: Представлено дві цитати. Одна описує колективізацію як «великий крок уперед до соціалістичного майбутнього
    села», інша — як «друге кріпацтво». Без авторства. Завдання студента: хто міг це сказати і чому? Які ідеологічні позиції
    відображають ці погляди?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Економічна доцільність vs. політичне знаряддя. Радянська версія: колективізація — вимушений, хоч і жорстокий,
    крок для фінансування індустріалізації. Альтернативна позиція: економічні цілі були другорядними; головна мета — знищення
    українського селянина-власника як основи національного опору.'
  - 'Дебат 2: Хто такий «куркуль»? Об''єктивна класова категорія чи політичний ярлик? Радянська пропаганда малювала образ
    сільського експлуататора. Історичні джерела показують, що під розкуркулення потрапляли найефективніші господарі, які були
    опорою громади, а часто й просто ті, хто не хотів іти до колгоспу.'
  - '[!epistemic-humility] Аналіз дефініцій «куркуля» в різних постановах показує їхню розмитість, що дозволяло застосовувати
    репресії максимально широко.'
  section: 'Конфліктна карта: Економічна політика чи національне упокорення?'
  words: 900
- points:
  - '1. Російський імперський / радянський наратив: Колективізація — це модернізація. Подолання «відсталості» села, створення
    ефективних агропромислових господарств. Опір чинили лише «куркулі» та «вороги народу». Голод 1932-33 рр. — трагічний збіг
    обставин, викликаний «перегинами на місцях», саботажем та поганим врожаєм.'
  - '2. Український наратив: Колективізація — це війна проти українського села та основа геноциду. Мета — не економічна, а
    національно-політична: підірвати соціальну базу українського визвольного руху. Вилучення зерна та розкуркулення були свідомими
    інструментами для створення умов, несумісних із життям.'
  - '3. Західний наратив: Еволюція погляду. Від початкових оцінок деяких лівих інтелектуалів як «жорстокої, але необхідної
    модернізації» (В. Дюранті) до визнання її інструментом тоталітарного контролю (Р. Конквест) та, зрештою, ключовим механізмом
    геноциду (Т. Снайдер, Е. Епплбом).'
  - '[!decolonization] Викриття радянської риторики про «допомогу відсталому селу» як прикриття для колоніального пограбування
    та упокорення.'
  - '[!myth-buster] Голод був не наслідком, а метою політики хлібозаготівель, яка стала можливою лише після знищення приватних
    господарств через колективізацію.'
  section: 'Зіткнення наративів: Колективізація як інструмент'
  words: 1700
- points:
  - 'Текст: Уривок з Постанови Політбюро ЦК ВКП(б) «Про заходи щодо ліквідації куркульських господарств у районах суцільної
    колективізації» від 30 січня 1930 р.'
  - 'Аналіз мови: Бюрократичний, дегуманізуючий стиль. Люди діляться на «категорії» (перша — розстріл, друга — заслання, третя
    — виселення). Відсутність понять вини, суду, апеляції. «Куркуль» — це вирок, а не звинувачення.'
  - 'Інституційний аналіз: Хто ухвалював рішення на місцях? «Трійки» з представників партії, ГПУ та міліції. Яка роль сільських
    активістів? Можливість звести особисті рахунки під виглядом класової боротьби.'
  - '[!epistemic-humility] Як документ, що проголошує економічні цілі, насправді є інструкцією для масових репресій? Розгляд
    прихованих механізмів та імплікацій тексту.'
  section: 'Джерельна критика: Аналіз постанови про розкуркулення'
  words: 1500
- points:
  - 'Повернення до розминки: Студент аналізує початкові цитати, використовуючи знання про радянський та український наративи,
    і пояснює, як мова конструює реальність.'
  - 'Мета-рефлексія: Чому важливо аналізувати не лише події, а й те, як про них говорять? Як економічна політика та бюрократична
    мова можуть слугувати знаряддям масового вбивства?'
  - '[!decolonization] Зв''язок із сьогоденням: Порівняння радянської риторики про «куркулів» із сучасною російською пропагандою
    про «денацифікацію». Пошук спільних патернів у мові ворожнечі, що легітимізує насильство.'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of collectivization as the foundational mechanism of the Holodomor, comparing Soviet, Ukrainian,
  and Western narratives.
level: ISTORIO
module: istorio-046
objectives:
- Аналізувати різні історіографічні наративи (радянський, український, західний) про колективізацію, виявляючи їхні ключові
  аргументи та замовчування.
- Застосовувати методи джерельної критики для аналізу офіційних радянських документів, виявляючи їхню дегуманізуючу мову та
  репресивні механізми.
- Розрізняти поняття «економічна політика» та «політичні репресії» на прикладі розкуркулення.
- Формулювати аргументовану позицію щодо ролі колективізації як передумови та інструменту Голодомору-геноциду.
