content_outline:
- points:
  - 'Провокація: Донбас — це «споконвічно російська земля» чи капіталістичний проєкт британського інженера? Подано два описи
    регіону: один з радянського підручника, інший — із праці сучасного українського історика. Студент має вгадати, де чий,
    і пояснити логіку.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Радянська теза vs Українська. Чи була «робітнича ідентичність» Донбасу органічним явищем, що витіснило національну,
    чи це був лише фасад, за яким приховувалась насильницька русифікація та маргіналізація українства?'
  - 'Дебат 2: Природа «проросійських настроїв» після 1991. Чи це був природний наслідок радянської спадщини, чи результат
    цілеспрямованої маніпуляції місцевих олігархів та російської пропаганди?'
  - '[!epistemic-humility] Розгляд аргументів обох сторін з посиланням на економічні дані, демографічну статистику та мовну
    політику.'
  section: 'Конфліктна карта: Ідентичність — класова чи національна?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Донбас як «дике поле», освоєне імперією (Джон Юз), або як серце «радянського
    пролетаріату». Акцент на індустріалізації як цивілізаційній місії, що затерла «дрібнобуржуазний націоналізм».'
  - 'Український наратив: Акцент на доіндустріальній історії — землі Запорізької Січі. Індустріалізація як форма колонізації,
    що супроводжувалася маргіналізацією українського селянства та цілеспрямованою русифікацією міст. [!biography] постаті
    як Василь Стус — доказ невмирущості українського духу.'
  - 'Західний наратив (умовно): Погляд на Донбас як на унікальну «фронтирну» зону з високою соціальною мобільністю та насильством,
    де ідентичності були плинними та інструментальними (праці Хіроакі Куромії, Сергія Плохія). Не «російський» і не «український»,
    а специфічний продукт індустріалізації.'
  - '[!decolonization] Аналіз, як імперський наратив свідомо замовчує українську історію регіону, а радянський — підміняє
    національну ідентичність класовою.'
  - '[!myth-buster] Розвінчання міфу про «однорідний російськомовний Донбас» — демонстрація складної етнічної та мовної карти
    регіону в різні періоди.'
  section: 'Зіткнення наративів: Історична належність Донбасу'
  words: 1700
- points:
  - 'Аналіз джерела 1: Фрагмент статті з газети «Социалистический Донбасс» 1970-х років. Опис «щасливого інтернаціонального»
    життя шахтарської родини. Критика: аналіз автора, інституції (партійна газета), мети (пропаганда), лексики.'
  - 'Аналіз джерела 2: Фрагмент з табірних листів або поезії Василя Стуса, де він рефлексує про свою донецьку юність та українську
    ідентичність. Критика: аналіз автора (дисидент, жертва режиму), контексту (неволя), мети (саморефлексія, свідчення).'
  - '[!epistemic-humility] Порівняльний аналіз: як два тексти, що описують одну й ту саму епоху та місце, створюють діаметрально
    протилежні реальності. Студент вчиться читати «між рядків» та ідентифікувати авторську позицію та маніпуляції.'
  section: 'Джерельна критика: Василь Стус vs Радянська преса'
  words: 1500
- points:
  - 'Повернення до розминки: студент дає розгорнуту відповідь на початкове питання, використовуючи знання з модуля.'
  - 'Мета-рефлексія: Чому історія Донбасу є полем битви наративів? Яку роль відіграє контроль над історією у сучасній політиці?'
  - '[!decolonization] Зв''язок із сьогоденням: Як наратив про «громадянську війну» та «захист російськомовних», що використовувався
    Росією з 2014 року, спирається на історичні міфи, проаналізовані в модулі?'
  section: Дискусія та підсумок
  words: 700
focus: Історіографічний аналіз ідентичності Донбасу, порівняння радянського «пролетарського інтернаціоналізму», українського
  національного наративу та російської імперської розповіді про регіон.
level: ISTORIO
module: istorio-077
objectives:
- Аналізувати Донбас як історичний проєкт, а не як «природний» регіон із віковічною ідентичністю
- Розрізняти та критично оцінювати російський імперський, радянський та український наративи про історію Донбасу
- Застосовувати методи джерельної критики для аналізу текстів різного походження, зокрема пропагандистських та дисидентських
- Пояснювати зв'язок між історичними міфами про Донбас та сучасною російською агресією й пропагандою
