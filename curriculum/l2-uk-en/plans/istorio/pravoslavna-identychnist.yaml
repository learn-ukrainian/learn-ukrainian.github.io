content_outline:
- points:
  - 'Провокація: два погляди на одну подію. Один історик називає перехід Київської митрополії під юрисдикцію Москви у 1686
    році «возз''єднанням», інший — «анексією». Не знаючи авторів, спробуйте визначити, який термін належить до української
    історіографії, а який — до російської. На чому базується ваше припущення?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Реформи Петра Могили — це було православне відродження чи «латинізація» (вестернізація) київської церкви? Чи
    можна було відповісти на виклик католицизму, не запозичуючи його ж інтелектуальну зброю (схоластику, латину)?'
  - 'Дебат 2: Києво-Могилянська академія — це був унікальний український освітній проєкт чи вдала копія єзуїтських колегіумів?
    [!epistemic-humility] Оцінка ролі «ворожих» моделей в модернізації власної культури.'
  - 'Глобальний контекст: Контрреформація в Речі Посполитій vs. православна відповідь у Києві. Розгляд подій не як унікальної
    української драми, а як частини загальноєвропейських релігійних конфліктів та культурних трансферів.'
  section: 'Конфліктна карта: Реформа чи вестернізація?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Петро Могила як «прогресивний» діяч, що готував Україну до «возз''єднання»
    з «братньою» Росією. Перепідпорядкування 1686 року — закономірний і позитивний акт, що «врятував» українське православ''я
    від полонізації.'
  - 'Український наратив: Могилянська доба як «золотий вік» українського православ''я, що модернізувалося за європейським
    зразком, зберігши свою ідентичність. 1686 рік — трагічний акт анексії та початок систематичної русифікації української
    церкви та культури. [!decolonization]'
  - 'Західний наратив (умовно): Розглядає ситуацію через призму «конфесіоналізації» — процесу, коли релігійна ідентичність
    тісно переплітається з розбудовою ранньомодерних держав. Могила діяв як типовий ієрарх своєї епохи, що використовував
    освіту для зміцнення своєї конфесії. Анексія 1686 року аналізується як типовий приклад поглинання церковної структури
    сильнішою державною владою.'
  - '[!myth-buster] Міф про «віковічне прагнення до єдності» спростовується аналізом джерел, що показують значні відмінності
    між київською та московською православними традиціями XVII ст.'
  section: 'Зіткнення наративів: Київська митрополія у XVII ст.'
  words: 1700
- points:
  - 'Джерело 1: Аналіз фрагментів із «Православного ісповідання віри» та «Требника» Петра Могили. Яка мова використовується?
    Які теологічні концепції підкреслюються (чистилище, філіокве)? Як ці тексти показують спробу Могили створити «третій шлях»
    між Римом і Москвою?'
  - 'Джерело 2: Уривок із полемічного твору Касіяна Саковича або іншого опонента Могили. Як критики оцінювали його реформи?
    Які звинувачення висували? Аналіз риторики та аргументації. [!epistemic-humility]'
  - 'Авторський аналіз: розглядаємо постать самого Петра Могили — молдавський аристократ, вихований у Речі Посполитій. Як
    його походження та освіта вплинули на його церковну політику?'
  section: 'Джерельна критика: «Требник» Петра Могили та полемічні тексти'
  words: 1500
- points:
  - 'Повернення до розминки: тепер, маючи повну картину, проаналізуйте терміни «возз''єднання» та «анексія». Які ідеологічні
    та методологічні настанови стоять за кожним із них?'
  - 'Мета-рефлексія: Що цей модуль говорить про природу «реформи» в церкві? Де межа між оновленням та втратою ідентичності?
    Як політичні інтереси держав використовують релігійні інституції?'
  - 'Зв''язок із сьогоденням: Як наративи про «канонічну територію» та «історичну справедливість», що сформувалися у XVII
    ст., використовуються в сучасній російській пропаганді проти автокефалії Православної Церкви України? [!decolonization]'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical debates on Petro Mohyla's reforms, the Kyiv-Mohyla Academy, Ukrainian Baroque, and the 1686 transfer
  of the Kyiv Metropolia to Moscow.
level: ISTORIO
module: istorio-060
objectives:
- Розрізняти та аналізувати український, російський імперський та західний наративи щодо церковної історії України XVII ст.
- Застосовувати методи джерельної критики до полемічних та теологічних текстів епохи.
- Деконструювати поняття «реформа», «вестернізація» та «анексія» на прикладі могилянської доби.
- Простежувати зв'язок між історичними наративами XVII ст. та сучасною геополітичною та релігійною боротьбою в Східній Європі.
