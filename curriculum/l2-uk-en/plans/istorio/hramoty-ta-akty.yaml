content_outline:
- points:
  - 'Провокація: Літопис каже, що князь "дав" монастирю село. Грамота каже, що монастир "купив" село у князя за 50 гривень.
    Якому джерелу ви повірите і чому? Що це говорить про владу та власність у Русі?'
  - Представлено два анонімні уривки, що описують правову систему Русі. Один — з російського підручника XIX ст., інший — з
    праці Михайла Грушевського. Студент має вгадати, де чий, і пояснити свої міркування.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Літопис vs. грамота. Що є "кращим" джерелом? Позиція 1 (школа "наративістів"): літописи дають контекст, ідеологію,
    "велику картину". Позиція 2 (школа "документалістів"): грамоти — це юридичні факти, соціальна реальність без прикрас.'
  - 'Дебат 2: Автентичність Церковного уставу Володимира. Чи є цей документ справжнім актом Х століття, чи пізнішою підробкою
    для обґрунтування церковних прав? Аргументи "за" (архаїчна мова) і "проти" (анахронізми).'
  - '[!epistemic-humility] Жодне джерело не є об''єктивним. Історик не "знаходить" правду, а "реконструює" її, усвідомлюючи
    упередженість кожного тексту, включно з юридичними.'
  section: 'Конфліктна карта: Історик як детектив'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: "Руська Правда" — колиска єдиного "давньоруського" права, прямою спадкоємицею
    якого є Москва. Судебники XV-XVI ст. — це розвиток саме московської версії, що доводить тяглість влади. Методологія: порівняльний
    аналіз, що ігнорує альтернативні правові системи. Агенда: легітимізація Москви як єдиного центру збирання "руських земель".
    Сліпі плями: повне ігнорування правової традиції Великого Князівства Литовського.'
  - 'Український наратив: "Руська Правда" — пам''ятка права саме КИЇВСЬКОЇ держави. Її прямим продовженням на українських
    землях були Литовські статути, а згодом — козацьке право. Методологія: доведення безперервної лінії від "Руської Правди"
    до Статутів, аналіз запозичень і розвитку. Агенда: обґрунтування окремої, безперервної української правової та державної
    традиції. Сліпі плями: ідеалізація козацького права, іноді недооцінка польських впливів.'
  - 'Західний наратив: "Руська Правда" розглядається в контексті європейських "варварських прав" (Салічна, Вестготська). Аналізується
    соціальна структура (статуси людей), економічні відносини, рівень насильства. Менше цікавиться, хто "справжній" спадкоємець,
    більше — як документ відображає суспільство свого часу. Методологія: порівняльно-історичний метод, соціо-економічний аналіз.'
  - '[!decolonization] Розвінчання міфу про "загальноруську" єдність. Демонстрація того, як юридичний документ стає полем
    битви за історичну спадщину.'
  - '[!myth-buster] "Руська Правда" не була конституцією. Це був збірник прецедентного права, що фіксував штрафи за злочини,
    а не визначав державний устрій.'
  section: 'Зіткнення наративів: "Руська Правда" та її спадкоємці'
  words: 1700
- points:
  - 'Тіло документа: аналіз "Грамоти Мстислава Володимировича та Всеволода Мстиславича Юр''ївському монастирю". Читання тексту
    з глосами (поясненнями архаїчних термінів).'
  - 'Дипломатичний аналіз (формуляр): Ініціальний протокол (хто видав), основна частина (суть пожалування), есхатокол (свідки,
    печатка). Як структура документа захищає його від підробок?'
  - Що ми дізнаємося про суспільство? Економіка (перелік угідь, люди як частина власності), соціальна ієрархія (князь, ігумен),
    правова система (закріплення власності).
  - 'Контрастний аналіз: Берестяні грамоти. Короткі, побутові, приватні. Список боргів, прохання, скарги. Як ці "неелітні"
    тексти доповнюють картину, яку дають княжі грамоти?'
  - '[!epistemic-humility] Навіть автентичний документ відображає лише позицію його автора (князя). Ми не знаємо, як селяни,
    згадані в грамоті, ставилися до передачі їх іншому власнику.'
  section: 'Джерельна критика: Грамота Мстислава (1130) та берестяні грамоти'
  words: 1500
- points:
  - 'Повернення до розминки: Літопис чи грамота? Студент має сформулювати nuanced відповідь: це не питання "краще/гірше",
    а питання "для чого?". Літопис — для ідеології, грамота — для соціальної історії, але обидва є упередженими.'
  - 'Мета-рефлексія: Чому вивчення середньовічних канцелярій та печаток є потужною зброєю проти сучасної пропаганди?'
  - 'Зв''язок із сьогоденням: Як сьогоднішні міжнародні договори (напр., Будапештський меморандум) можуть бути по-різному
    "прочитані" та інструменталізовані, подібно до давніх грамот?'
  - '[!decolonization] Усвідомлення, що контроль над архівами та інтерпретацією документів є інструментом влади.'
  section: Дискусія та підсумок
  words: 700
focus: Historiographical analysis of Kyivan Rus legal documents (hramoty); source criticism and diplomatics; comparing chronicle
  narratives with legal charters; analyzing Russian imperial, Soviet, and Ukrainian historiographical approaches to early
  legal texts like Ruska Pravda.
