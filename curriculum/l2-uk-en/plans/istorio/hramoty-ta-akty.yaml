objectives:
- Розрізняти типи та структуру правових документів Київської Русі (грамоти, устави).
- Застосовувати базові методи дипломатики для аналізу автентичності та змісту історичних документів.
- Порівнювати різні історіографічні наративи (російський імперський, український, західний) щодо спадщини права Київської
  Русі.
- Критично оцінювати історичні джерела, протиставляючи інформацію з літописів та юридичних актів.
