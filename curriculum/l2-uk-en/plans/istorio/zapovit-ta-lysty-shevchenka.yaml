content_outline:
- points:
  - 'Провокація: Вам дано два тлумачення «Заповіту» Шевченка. Одне — про класову боротьбу пригноблених, друге — про національне
    визволення. Не знаючи автора, яке з них ви б назвали «радянським», а яке «націоналістичним»? Поясніть свою логіку.'
  - 'Цитата-загадка: «Шевченко належить не тільки Україні, а й усьому людству». Хто міг це сказати: радянський ідеолог, український
    патріот чи західний славіст? Яка мета цього твердження?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи може поезія бути історичним джерелом? Позиція 1 (умовно «позитивістська»): Ні, поезія — це емоції та метафори,
    а не факти. Позиція 2 («культурно-історична»): Так, поезія є ключовим джерелом для розуміння ментальності, цінностей та
    ідеологій епохи.'
  - 'Дебат 2: Листи Шевченка — щире свідчення чи цензурована вистава? Позиція 1: Листи, навіть писані під наглядом, розкривають
    приватні думки та реальний стан поета. Позиція 2: Кожен лист — це перформанс, розрахований на конкретного адресата та
    можливого цензора; довіряти їм наївно.'
  - '[!epistemic-humility] Історики не мають «машини часу». Вони працюють з текстами. Наше завдання — навчитися читати ці
    тексти так, щоб бачити не тільки те, що автор хотів сказати, а й те, про що він мовчав або що приховував.'
  section: 'Конфліктна карта: Поет як (не)надійний свідок'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Шевченко — «поет-демократ», «співець дружби народів», борець проти «царизму»,
    але не проти імперії як такої. Його антимосковські твори — помилки, викликані «буржуазним націоналізмом». «Заповіт» —
    це заклик до соціальної, а не національної революції.'
  - 'Український національний наратив: Шевченко — пророк незалежності, батько нації. Його творчість — це програма побудови
    суверенної держави. «Заповіт» — це політичний маніфест, прямий наказ нащадкам боротися за волю. Його російськомовні твори
    — вимушений компроміс, а листи — свідчення незламності духу.'
  - 'Західний наратив (узагальнений): Шевченко — представник європейського романтичного націоналізму, «український Байрон»
    або «польський Міцкевич». Його постать аналізується в контексті «весни народів» та боротьби імперій. Акцент на антикріпосницькому
    пафосі, іноді з нерозумінням глибини антиколоніального спротиву.'
  - '[!decolonization] Радянська стратегія полягала не в тому, щоб заборонити Шевченка, а в тому, щоб «одомашнити» його, каструвати
    його антиімперський потенціал і перетворити на безпечний символ «народного мистецтва».'
  - '[!myth-buster] Твердження, що Шевченко був «проти царя, але за Росію» — це маніпуляція. Його тексти сповнені критики
    саме імперської системи та її ментальності.'
  section: 'Зіткнення наративів: Чий пророк Тарас Шевченко?'
  words: 1700
- points:
  - 'Кейс 1: Аналіз радянської академічної статті (умовний приклад). Як автор використовує цитати, щоб довести «соціально-революційну»
    тезу? Які рядки «Заповіту» він ігнорує? Які слова (нація, Україна, незалежність) він уникає?'
  - 'Кейс 2: Аналіз статті українського історика з діаспори (напр., умовний текст за мотивами Ю.Шереха). Як він працює з тими
    ж цитатами? На які історичні контексти (Кирило-Мефодіївське братство) він посилається? Яку роль відіграє аналіз мови та
    символів («Дніпро реве»)?'
  - 'Методологія критики: дивимось на рік видання, установу, де працює автор, цитовані джерела, термінологію. Вчимося бачити
    «шви» ідеологічної конструкції в академічному тексті.'
  - '[!epistemic-humility] Обидва автори не «вигадують», а «інтерпретують». Наше завдання — зрозуміти логіку їхніх інтерпретацій
    та ідеологічні рамки, в яких вони працюють.'
  section: 'Джерельна критика: Як історики читають «Заповіт»'
  words: 1500
- points:
  - 'Повернення до розминки: Чи змінилася ваша відповідь щодо двох тлумачень «Заповіту»? Які саме деталі в мові чи аргументації
    тепер здаються вам маркерами певної ідеології?'
  - 'Мета-рефлексія: Чому постать Шевченка стала таким запеклим полем битви наративів? Що це говорить про роль «національного
    поета» у формуванні ідентичності?'
  - '[!decolonization] Як сьогоднішні спроби Росії «привласнити» українських культурних діячів (Гоголя, Булгакова) продовжують
    ту саму імперську логіку, яку ми бачили на прикладі радянського шевченкознавства?'
  - 'Підсумкова теза: Шевченко як історичне джерело — це не так джерело фактів про ХІХ століття, як дзеркало, в якому кожна
    наступна епоха бачить власні прагнення, страхи та ідеологічні проєкти.'
  section: Дискусія та підсумок
  words: 700
