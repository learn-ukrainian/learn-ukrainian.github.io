objectives:
- Аналізувати причини виникнення, форми та наслідки явища самвидаву в УРСР.
- Порівнювати радянський, український національний та західний наративи щодо дисидентського руху, виявляючи їхні методології
  та agendas.
- Застосовувати методи джерельної критики для аналізу текстів самвидаву, зокрема «Українського вісника».
- Оцінювати історичне значення підпільної літератури як форми ненасильницького опору та її зв'язок із сучасними формами інформаційного
  спротиву.
