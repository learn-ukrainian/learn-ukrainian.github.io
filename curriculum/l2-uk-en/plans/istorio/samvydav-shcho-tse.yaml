content_outline:
- points:
  - 'Провокація: Вам дають два тексти 1970-х років. Один — стаття з газети «Правда», інший — зі сторінок «Українського вісника».
    Ярликів немає. Чи зможете ви визначити, де — офіційна пропаганда, а де — «наклеп на радянську владу»? За якими ознаками?'
  - 'Цитата для роздумів: «Коли держава контролює кожне друковане слово, єдиний спосіб сказати правду — стати злочинцем».
    Як ви розумієте цей парадокс?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Самвидав — це політичний опір чи культурний феномен? Одні історики (переважно західні) бачать у ньому інструмент
    боротьби за права людини. Інші (часто українські) наголошують на культурній місії — збереженні мови та літератури в умовах
    тотальної цензури.'
  - 'Дебат 2: Український самвидав — унікальне національне явище чи частина загальносоюзного дисидентського руху? Дискусія
    про те, чи був «Український вісник» Чорновола просто регіональною версією московської «Хроники текущих событий», чи мав
    власну, глибоко національну програму.'
  - '[!epistemic-humility] Обидві точки зору мають докази. Істина в тому, що самвидав був і тим, і іншим одночасно, а співвідношення
    політики та культури змінювалося з часом.'
  section: 'Конфліктна карта: Опір чи культура?'
  words: 900
- points:
  - '1. Радянський наратив: Самвидав — це «антирадянська агітація та пропаганда», «наклепницькі вигадки». Продукується жменькою
    «відщепенців», «націоналістів» та «кримінальних елементів» на гроші західних спецслужб. Методологія: кримінальні справи
    КГБ, викривальні статті в пресі. Агенда: збереження монополії партії на інформацію, дискредитація будь-якої опозиції.
    Сліпі плями: повне ігнорування причин (цензура, репресії) та масштабу явища.'
  - '2. Український наратив (дисидентський): Самвидав — це форма національного самозбереження та визвольної боротьби. Це єдиний
    спосіб говорити про Голодомор, русифікацію, репресії. Це повернення заборонених імен (Курбас, Хвильовий). Методологія:
    підпільні хроніки, літературні твори, історичні есе. Агенда: утвердження національної ідентичності, вихід з-під імперського
    контролю. Сліпі плями: ідеалізація руху, іноді недостатня увага до внутрішніх конфліктів.'
  - '3. Західний наратив (Cold War era): Самвидав — це доказ існування опозиції в тоталітарному СРСР, важливе джерело інформації
    про порушення прав людини. Методологія: совітологія, аналіз текстів, що потрапили на Захід (у «тамвидав»). Агенда: використання
    дисидентського руху як морального та політичного інструменту в холодній війні. Сліпі плями: часто не розрізняли український,
    російський, литовський рухи, зводячи все до «радянських дисидентів».'
  - '[!decolonization] Викриття механізмів, якими імперія таврувала будь-який прояв національної самосвідомості як «буржуазний
    націоналізм» та «злочин».'
  - '[!myth-buster] Міф про те, що «всі в СРСР мовчали». Самвидав доводить, що опір існував завжди, хоч і в небезпечних підпільних
    формах.'
  section: 'Зіткнення наративів: Феномен самвидаву'
  words: 1700
- points:
  - 'Близьке читання першого випуску «Українського вісника» (1970). Автор/упорядник: В''ячеслав Чорновіл. Інституційна приналежність:
    жодної, це чиста ініціатива «знизу». Фінансування: відсутнє, все на ентузіазмі. Доступ до архівів: нульовий, джерелами
    були розповіді очевидців та інші тексти самвидаву.'
  - 'Аналіз структури: «Хроніка» (арешти, обшуки), «Листи і звернення», «Творчість» (неопубліковані вірші Стуса, Симоненка).
    Чому така структура? Це і газета, і правозахисний бюлетень, і літературний журнал одночасно.'
  - 'Мова та стиль: сухий, фактологічний тон у «Хроніці» — для довіри. Емоційний, патріотичний — у літературній частині. Кому
    це адресовано? Українській інтелігенції, а через неї — всьому народові та світу.'
  - 'Технологія та ризики: 5-7 копій на друкарській машинці «Україна». Кожен передрук — ризик арешту (стаття 187-1 КК УРСР).
    Аналіз поняття «ланцюжкового розповсюдження» та його небезпек.'
  - '[!epistemic-humility] Ми читаємо це як історичний документ, але для його авторів та читачів це була небезпечна реальність.
    Кожен рядок міг коштувати свободи.'
  section: 'Джерельна критика: Анатомія «Українського вісника»'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви дивитесь на два тексти? Чи можете ви не просто їх ідентифікувати, а й пояснити, які
    наративні та лінгвістичні техніки використовує пропаганда, а які — підпільна преса?'
  - 'Мета-рефлексія: Чого нас вчить історія самвидаву про природу інформації та влади? Чому для тоталітарних режимів незалежна
    думка небезпечніша за зброю?'
  - '[!decolonization] Зв''язок із сьогоденням: Чи можна вважати Telegram-канали на окупованих територіях, партизанські листівки
    чи військовий фольклор сучасними формами самвидаву? Де проходить межа між самвидавом та громадянською журналістикою в
    епоху інтернету?'
  section: Дискусія та підсумок
  words: 700
