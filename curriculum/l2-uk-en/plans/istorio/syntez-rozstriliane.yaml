content_outline:
- points:
  - 'Провокація: Прочитайте два анонімні описи культурної політики СРСР 1930-х. Один називає це «боротьбою з буржуазним націоналізмом»,
    інший — «цілеспрямованим винищенням національної ідентичності». Який із них здається вам більш точним і чому? Чи можуть
    обидва бути правдивими одночасно?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є «культурний геноцид» коректним терміном? Позиція 1: Так, це точне визначення цілеспрямованого знищення
    культури як такої (застосовуючи концепцію Рафала Лемкіна). Позиція 2: Ні, це були політичні репресії проти «антирадянських
    елементів», культура була лише однією з арен, а не головною ціллю.'
  - 'Дебат 2: Розстріляне відродження — окремий геноцид чи частина Голодомору? Позиція 1: Це два синхронні, але різні злочини:
    один проти селянства (фізичне виживання), інший проти інтелігенції (культурне виживання). Позиція 2: Це єдиний геноцид
    українського народу, де Голодомор був інструментом фізичного знищення, а репресії проти інтелігенції — інструментом духовного.'
  - '[!epistemic-humility] Радянська влада ніколи не декларувала «знищення української культури» як мету. Вона говорила про
    «створення пролетарської культури, соціалістичної за змістом і національної за формою». Чи можемо ми судити про наміри
    лише за результатами?'
  section: 'Конфліктна карта: Геноцид чи репресії?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Трагічні «перегини» в рамках боротьби з контрреволюцією та українським буржуазним
    націоналізмом. Талановиті митці, що «заблукали», але не системна політика. Агенда: виправдати дії держави, зобразити жертв
    як ворогів або помилки, заперечити геноцидний намір.'
  - 'Український наратив: Цілеспрямована кампанія з обезголовлення нації. Знищення цілого покоління інтелектуалів, що творили
    модерну, європейську, незалежну від Москви культуру. Докази: синхронність арештів, сфабриковані справи, розстрільні списки,
    заміна національного канону на промосковський. Агенда: встановити історичну справедливість, довести геноцидний характер
    радянської влади, пояснити культурний розрив.'
  - 'Західний наратив: Часто розглядається як частина Великого терору Сталіна. Акцент на тоталітарній природі режиму, що знищував
    будь-яку незалежну думку. Сліпа пляма: іноді не враховується специфічно анти-український, постколоніальний вимір, зводячи
    все до загальної боротьби з інакомисленням. Агенда: зрозуміти механізми тоталітаризму, порівняти з іншими режимами.'
  - '[!decolonization] Розкриття того, як радянський наратив маскував колоніальну політику під ідеологічну боротьбу.'
  section: 'Зіткнення наративів: Розстріляне відродження'
  words: 1700
- points:
  - 'Джерело 1: Аналіз уривків з памфлетів Миколи Хвильового (напр., «Україна чи Малоросія?»). Фокус: мова, впевненість, орієнтація
    на Європу, сміливість постановки питань. Хто автор? Яка його аудиторія? Яка його мета?'
  - 'Джерело 2: Аналіз уривків з протоколу допиту або статті з розгромною критикою того ж автора. Фокус: зміна лексики, самоприниження,
    визнання «помилок», ритуальні звинувачення. В яких умовах створювався цей текст? Хто його реальний автор — підсудний чи
    слідчий?'
  - 'Порівняльний аналіз: Як змінюється мова під тиском? Які аргументи стають «злочинними»? Як відбувається процес «переписування»
    власної біографії та поглядів під диктовку тоталітарної держави?'
  - '[!myth-buster] Критика міфу про «добровільне каяття». Демонстрація того, що протоколи допитів — це не джерело думок людини,
    а джерело про методи роботи репресивної машини.'
  section: 'Джерельна критика: Від маніфесту до протоколу допиту'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер ви оцінюєте два анонімні описи? Які ідеологічні та методологічні припущення стоять за
    кожним із них?'
  - 'Мета-рефлексія: Чому для імперії так важливо контролювати не лише територію, а й культуру та історію? Яку роль у цьому
    відіграє знищення інтелектуальної еліти?'
  - '[!decolonization] Зв''язок із сьогоденням: Порівняйте радянські звинувачення в «буржуазному націоналізмі» з сучасними
    російськими звинуваченнями в «нацизмі». Які наративні патерни повторюються у війні Росії проти України з 2014 року?'
  section: Дискусія та підсумок
  words: 700
focus: Applying the cultural genocide framework to the destruction of the Ukrainian intellectual elite in the 1930s, analyzing
  patterns of destruction, memory, and parallels to today.
level: ISTORIO
module: istorio-057
objectives:
- Аналізувати події 1930-х в Україні через призму концепції культурного геноциду
- Розрізняти радянський, український та західний наративи щодо Розстріляного відродження, ідентифікуючи їхні цілі та сліпі
  плями
- Застосовувати методи джерельної критики для аналізу текстів, створених в умовах тоталітарного тиску
- Формулювати аргументовану позицію щодо паралелей між історичними та сучасними методами ведення Росією війни проти української
  ідентичності
