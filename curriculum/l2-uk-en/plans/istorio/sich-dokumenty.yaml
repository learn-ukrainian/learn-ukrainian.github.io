content_outline:
- points:
  - 'Провокація: Запорозька Січ — унікальна демократична республіка чи жорстка військова олігархія? Подано два описи її устрою
    (без авторства) — один з романтичної праці XIX ст., інший з рапорту російського чиновника XVIII ст. Який опис є точнішим
    і чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Природа козацької влади. Чи була козацька рада справжнім інструментом прямої демократії (позиція народницької
    історіографії), чи лише ширмою для рішень старшинської олігархії (позиція державницької школи)?'
  - 'Дебат 2: Природа козацького права. Звичаєве право — це гнучка і справедлива система, що відображала волю громади, чи
    це було право сильного, що легітимізувало сваволю і жорстокі покарання?'
  - '[!epistemic-humility] Розгляд аргументів обох сторін, аналіз джерел, на які вони спираються (протоколи рад, судові справи,
    листи).'
  section: 'Конфліктна карта: Демократія чи олігархія?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Січ — це "розбійницьке гніздо", спільнота втікачів-маргіналів без ознак державності.
    Її ліквідація була історично прогресивним актом "цивілізування" дикого кордону.'
  - 'Український наратив: Січ — це унікальна козацька республіка, протодержава з власною територією, урядом (рада, кіш), армією,
    правом та дипломатією. Вона є прямим доказом державницьких традицій українського народу.'
  - 'Західний наратив: Розглядає Січ через порівняння з іншими "frontier societies" або військовими орденами. Аналізує її
    як функціональну військово-політичну структуру на кордоні цивілізацій, менше уваги приділяючи питанню "справжньої" державності.'
  - '[!decolonization] Викриття імперської методології: як російська історіографія цілеспрямовано заперечувала суб''єктність
    Січі, використовуючи терміни "втеча", "бунт", "хаос".'
  - '[!myth-buster] Аналіз романтизації образу Січі в українській культурі — де закінчується історія і починається міф.'
  section: 'Зіткнення наративів: Державність Запорозької Січі'
  words: 1700
- points:
  - 'Close reading: Детальний аналіз тексту реальної судової справи з архіву Коша Запорозького (XVIII ст.). Розбір лексики,
    юридичних формул, процедури.'
  - 'Аналіз джерела: Хто автор документа (писар)? Для кого він написаний (кошовий, судді)? Якою є його мета (зафіксувати злочин,
    легітимізувати покарання)?'
  - 'Що документ говорить і про що мовчить: Як представлені аргументи сторін? Чий голос є домінантним? Що ми дізнаємося про
    соціальну ієрархію, власність, норми поведінки?'
  - '[!epistemic-humility] Порівняння тексту судового протоколу з його інтерпретаціями в працях істориків (наприклад, Яворницького).
    Як історики "добудовують" контекст, якого немає в джерелі?'
  section: 'Джерельна критика: Судова справа проти козака Левка'
  words: 1500
- points:
  - 'Повернення до розминки: Чи була Січ демократією? Студент має сформулювати власну, аргументовану відповідь, використовуючи
    знання про різні історіографічні наративи та джерела.'
  - 'Мета-рефлексія: Чому питання про "державність" Січі є таким політично зарядженим? Як боротьба за історію стає частиною
    сучасної війни?'
  - '[!decolonization] Як аналіз козацьких документів допомагає деконструювати імперські міфи про "нездатність українців до
    самоуправління"?'
  - 'Зв''язок із сьогоденням: Обговорення використання образів та символів Січі в сучасній українській армії та політиці.'
  section: Дискусія та підсумок
  words: 700
focus: The Zaporozhian Sich as a political entity, analyzed through its surviving documents. Compares Ukrainian national,
  Russian imperial, and Western historiographical narratives of Cossack statehood, law, and democracy.
level: ISTORIO
module: istorio-027
objectives:
- Критично аналізувати три основні історіографічні наративи (російський, український, західний) про державність Запорозької
  Січі.
- Застосовувати методи джерельної критики до автентичних документів з архіву Коша Запорозького.
- Розрізняти поняття "демократія", "олігархія", "анархія" та "військова диктатура" на прикладі політичного устрою Січі.
- Формулювати аргументовану позицію щодо ступеня державності Січі, спираючись на докази з першоджерел.
pedagogy: CBI
