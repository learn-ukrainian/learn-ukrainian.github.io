objectives:
- Аналізувати розбіжності між українським, російським та західним наративами щодо Будапештського меморандуму
- Застосовувати методи джерельної критики до тексту меморандуму, відрізняючи юридичні зобов'язання від політичних декларацій
- Відрізняти терміни «гарантії безпеки» та «запевнення в безпеці» в міжнародному праві
- Формулювати обґрунтовану позицію щодо історичних альтернатив, які були доступні Україні в 1994 році
