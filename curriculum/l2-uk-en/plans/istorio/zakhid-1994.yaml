content_outline:
- points:
  - 'Провокація: Україна в 1994 році мала третій за розміром ядерний арсенал світу. Через 20 років на її територію вторглася
    країна, що обіцяла поважати її суверенітет. Що пішло не так?'
  - 'Два погляди на одну подію: 1) «Історичний крок до глобальної безпеки». 2) «Найбільша геополітична помилка з часів Другої
    світової». Який із них є українським, і чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ядерне роззброєння — мудрий крок до міжнародного визнання чи вимушена капітуляція під тиском? Позиція «реалістів»
    (зберегти зброю було неможливо) vs позиція «державників» (було втрачено унікальний інструмент стримування).'
  - 'Дебат 2: Чи були альтернативи? Аргументи, що Україна могла вимагати значно більше (справжні гарантії, фінансова компенсація,
    інтеграція в НАТО) vs аргументи, що Захід ніколи б на це не погодився через страх перед дестабілізацією Росії.'
  - '[!epistemic-humility] Оцінка історичних альтернатив — завжди спекуляція. Ми аналізуємо не те, «що було б», а те, які
    аргументи використовували сторони для обґрунтування своїх рішень тоді.'
  section: 'Конфліктна карта: Неминучість чи помилка?'
  words: 900
- points:
  - 'Російський імперський / радянський наратив: Україна ніколи не контролювала ядерну зброю (кнопка була в Москві), тому
    нічого не «віддала». Роззброєння було частиною загального процесу контролю над радянським спадком. Меморандум — політична
    декларація, а не юридичний договір. Події 2014 року — внутрішній український конфлікт, що не підпадає під дію меморандуму.'
  - 'Український наратив: Акт національної зради з боку підписантів. Україна, як спадкоємиця УРСР, добровільно відмовилася
    від реального інструменту суверенітету в обмін на ефемерні «гарантії», які виявились обманом. Це історія про довірливість
    та зраду.'
  - 'Західний наратив (США/Британія): Прагматичне вирішення небезпечної проблеми. Головна мета — не допустити розповсюдження
    ядерної зброї після розпаду СРСР. Меморандум був політичним запевненням (assurance), а не військовою гарантією (guarantee)
    у стилі НАТО. Це був максимум, можливий у політичних реаліях 1994 року.'
  - '[!decolonization] Викриття механіки, як Росія використовує міжнародне право для легітимізації своїх імперських амбіцій,
    трактуючи зобов''язання як нікчемні, коли це їй вигідно.'
  section: 'Зіткнення наративів: Будапештський меморандум'
  words: 1700
- points:
  - 'Close reading: Аналіз ключових формулювань. Чому «to respect independence» та «to refrain from the threat or use of force»
    не зупинили агресію?'
  - '«Гарантії» vs «Запевнення»: Лінгвістичний та юридичний аналіз термінів "guarantees" та "assurances". Чому в українському
    перекладі з''явились «гарантії», і яку роль це зіграло у формуванні суспільних очікувань?'
  - '[!myth-buster] Меморандум НЕ є юридично зобов''язуючим договором. Його механізм — «проводити консультації», а не «надавати
    військову допомогу». Порівняння з текстом Вашингтонського договору (НАТО) для ілюстрації різниці.'
  - 'Авторство та контекст: Хто писав текст? Чиї інтереси він відображав у першу чергу? Аналіз позицій дипломатів, що брали
    участь у переговорах (Юрій Костенко, Стівен Пайфер).'
  section: 'Джерельна критика: Текст Будапештського меморандуму'
  words: 1500
- points:
  - 'Повернення до розминки: Як тепер виглядає відповідь на питання «Що пішло не так?»? Студент формулює комплексну відповідь,
    враховуючи позиції трьох наративів та юридичні нюанси.'
  - 'Мета-рефлексія: Чого вчить історія Будапештського меморандуму про природу міжнародних відносин, силу права та ціну наївності?'
  - '[!decolonization] Зв''язок із сьогоденням: Як уроки Будапешта впливають на поточні переговори про майбутні гарантії безпеки
    для України? Які помилки не можна повторити?'
  section: Дискусія та підсумок
  words: 700
focus: 'The 1994 Budapest Memorandum: analysis of Ukraine''s nuclear disarmament, the crucial difference between "security
  guarantees" and "assurances", a comparative study of Ukrainian, Russian, and Western narratives, and source criticism of
  the memorandum''s text.'
