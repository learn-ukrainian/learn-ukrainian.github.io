content_outline:
- points:
  - 'Провокація: Чи може існувати держава без території? Українська діаспора будувала свої інституції — конгреси, комітети,
    навіть "армії в екзилі". Хто насправді говорив від імені України, коли сама Україна мовчала під радянською владою?'
  - 'Уявіть два заголовки 1960-х: "Борці за свободу поневолених націй" та "Фашистські посіпаки на службі ЦРУ". Обидва — про
    ті самі організації. Який наратив переміг і чому?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи були діаспорні організації (UCC, UCCA) справжньою "державою в еміграції", що зберігала суверенітет нації,
    чи просто ефективними етнічними лобі, що діяли в межах політичних систем Канади та США?'
  - 'Дебат 2: Внутрішній розкол ОУН на мельниківців та бандерівців — це була принципова ідеологічна боротьба за майбутнє України
    чи трагічна боротьба за владу, що послабила визвольний рух? [!epistemic-humility]'
  section: 'Конфліктна карта: "Держава в еміграції" чи "Етнічне лобі"?'
  words: 900
- points:
  - 'Радянський наратив: ОУН — це "буржуазні націоналісти", "фашистські колаборанти", "агенти ЦРУ", що зрадили український
    народ. Їхня діяльність — доказ зради, а не патріотизму.'
  - 'Наратив ОУН (в еміграції): Ми — "невгасимий вогонь визвольної боротьби", єдиний легітимний представник поневоленої нації.
    АБН — авангард світової антикомуністичної революції. [!decolonization]'
  - 'Західний наратив (історики та спецслужби): ОУН — корисні, але складні "союзники" у боротьбі з СРСР. Ефективні в пропаганді,
    але їхній авторитарний бекграунд, антидемократизм та внутрішні чвари створюють проблеми. [!myth-buster]'
  section: 'Зіткнення наративів: Роль ОУН та АБН у Холодній війні'
  words: 1700
- points:
  - 'Аналіз статуту UCC (Канада): акцент на "мультикультуралізмі", збереженні спадщини, інтеграції в канадське суспільство
    як "етнічна група".'
  - 'Аналіз "Декларації про цілі" UCCA (США): фокус на "визволенні України від комуністичного ярма", лобіюванні антирадянських
    законів (Public Law 86-90 "Captive Nations Week").'
  - 'Порівняння риторики: як політичний контекст приймаючої країни ("мозаїчна" Канада vs "плавильний котел" США) визначив
    публічне обличчя та методи українських організацій? [!epistemic-humility]'
  section: 'Джерельна критика: Стратегії представництва UCC та UCCA'
  words: 1500
- points:
  - 'Повернення до розминки: тож чим були ці організації — державою в екзилі, етнічним лобі, чимось третім?'
  - 'Спадщина: Який вплив — позитивний і негативний — мали ці діаспорні структури на формування політичної культури незалежної
    України після 1991 року?'
  - 'Сучасність: Як досвід діаспори у лобіюванні та представництві інтересів (наприклад, через Світовий конгрес українців)
    використовується сьогодні для підтримки України у війні? [!decolonization]'
  section: Дискусія та підсумок
  words: 700
focus: Діаспорні організації (UCC, UCCA, OUN) як "держава в еміграції" під час Холодної війни, їхнє політичне лобіювання,
  внутрішні розколи (мельниківці vs. бандерівці) та роль у пострадянській Україні.
level: ISTORIO
module: istorio-067
objectives:
- Аналізувати причини, структуру та діяльність ключових українських діаспорних організацій (UCC, UCCA, ОУН)
- Критично порівнювати різні історіографічні наративи (радянський, діаспорний, західний) щодо ролі ОУН у Холодній війні
- Застосовувати навички джерельної критики для аналізу документів діаспорних організацій, виявляючи вплив політичного контексту
- Формулювати аргументовану позицію щодо концепції "держави в еміграції" та оцінювати спадщину діаспорних політичних рухів
  для сучасної України
