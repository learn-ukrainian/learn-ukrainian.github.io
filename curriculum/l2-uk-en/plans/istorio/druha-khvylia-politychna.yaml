content_outline:
- points:
  - 'Провокація: "Уряд в екзилі — це фікція, театр одного актора" vs "Це — невгасимий смолоскип нашої державності". Яка цитата
    точніше описує уряд УНР у 1920-х, і чому?'
  - 'Коротка біографія невідомого діяча, який помер у злиднях у Празі. Студент має вгадати: це міністр, поет чи генерал?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чий проєкт мав майбутнє? УНР (парламентська демократія) vs Гетьманат (авторитарна монархія) vs ОУН (інтегральний
    націоналізм) — ідеологічна війна на уламках держави.'
  - 'Дебат 2: Чи був уряд УНР в екзилі легітимним? Аргументи "за" (безперервність) vs аргументи "проти" (втрата території,
    відсутність армії, міжнародне невизнання).'
  - '[!epistemic-humility] "Руська акція" Масарика: щира допомога слов''янському народу чи інструмент чеської геополітики
    проти Польщі та радянської Росії?'
  - '[!myth-buster] Міф про "монолітність" еміграції. Розглядаємо реальні конфлікти: від політичних вбивств до боротьби за
    контроль над друкарнями.'
  section: 'Конфліктна карта: Легітимність чи фікція?'
  words: 900
- points:
  - 'Радянський наратив: "Петлюрівські бандити" та "буржуазні націоналісти", що втекли від народного гніву і продалися західним
    розвідкам. Методологія: класова боротьба. Агенда: делегітимізація будь-якої не-більшовицької України.'
  - 'Український емігрантський наратив: "Лицарі у вигнанні", що зберегли ідею і безперервність державності. Методологія: державницька
    школа, культ героїв. Агенда: збереження легітимності для майбутнього реваншу. Сліпа пляма: внутрішні конфлікти, корупція.'
  - '[!decolonization] Західний наратив (чехословацький/польський): Українці як об''єкт, а не суб''єкт. Для Польщі — загроза
    і розмінна монета. Для Чехословаччини — корисні інтелектуали та інструмент тиску. Методологія: прагматизм, державний інтерес.
    Сліпа пляма: українська агентність.'
  section: 'Зіткнення наративів: Українська політична еміграція 1920-х'
  words: 1700
- points:
  - 'Джерело 1: Уривок з офіційного видання уряду УНР в екзилі (журнал "Тризуб"). Аналіз мови: урочиста, державницька, сповнена
    оптимізму. Що замовчується?'
  - 'Джерело 2: Уривок з мемуарів Євгена Чикаленка або іншого критика уряду. Аналіз мови: сарказм, розчарування, звинувачення
    в некомпетентності. Чиї інтереси представляє автор?'
  - '[!epistemic-humility] Порівняльний аналіз: як одні й ті самі події (напр., призначення міністра) описані в обох джерелах.
    Де правда, і чи можна її встановити?'
  - 'Автор, інституція, фінансування: розбираємо, хто стояв за кожним текстом і як це вплинуло на його зміст. Чому один автор
    пише про "національну єдність", а інший про "гризню таборів"?'
  section: 'Джерельна критика: Мемуари та офіціози'
  words: 1500
- points:
  - 'Повернення до розминки: що ми тепер можемо сказати про "фікцію" та "смолоскип"? Студент формулює власну, складнішу метафору
    для уряду УНР в екзилі.'
  - 'Мета-рефлексія: що важливіше для збереження нації — символічна легітимність уряду чи жива культурна праця (університети,
    видавництва, мистецтво)?'
  - '[!decolonization] Чи може існувати "держава" без території? Уроки української еміграції для сучасних народів, що борються
    за незалежність.'
  - 'Зв''язок із сьогоденням: порівняння уряду УНР в екзилі з сучасними урядами у вигнанні (напр., білоруським). Що спільного,
    що відмінного?'
  section: Дискусія та підсумок
  words: 700
focus: The UNR government in exile, Prague as an emigre capital, internecine political conflicts, and historiographical debates
  on the significance of interwar political emigration.
level: ISTORIO
module: istorio-065
objectives:
- Аналізувати ідеологічні розбіжності між ключовими політичними течіями української еміграції (УНР, гетьманці, націоналісти).
- Критично порівнювати радянський, український емігрантський та західний наративи про поразку УНР та її наслідки.
- Застосовувати методи джерельної критики для аналізу офіційних документів та мемуарів діячів УНР в екзилі.
- Формулювати обґрунтовану позицію щодо історичного значення та легітимності уряду УНР в екзилі.
