module: a1-47
level: A1
sequence: 47
slug: imperative-and-requests
version: '2.0'
title: Imperative and Requests
subtitle: Do This, Please!
content_outline:
- section: Наказовий спосіб (Imperative mood)
  words: 500
  points:
  - 'Formation rule: 2nd person singular and plural. Remove -ти ending, add imperative
    suffix. Pattern depends on conjugation type and stem final consonant.'
  - 'Ти-form vs Ви-form: читай (ти) → читайте (ви), пиши (ти) → пишіть (ви), говори
    (ти) → говоріть (ви). Ви-form adds -те/-іть for politeness and plurality.'
  - 'Learner error: confusing imperative with infinitive. "Читати!" is a sign/rule
    (read!), "Читай!" is a personal command. Context determines which form to use.'
- section: Вісім обов'язкових дієслів (Eight required verbs)
  words: 500
  points:
  - 'State Standard §4.2.4.2 required verbs: читай(те) (read!), пиши(те) (write!),
    скажи(те) (say/tell!), дай(те) (give!), іди(те) (go!), слухай(те) (listen!),
    дивись(те) (look!), стій(те) (stop!).'
  - 'Classroom commands context: Читайте текст (Read the text). Пишіть у зошиті
    (Write in your notebook). Слухайте уважно (Listen carefully). Дивіться на дошку
    (Look at the board).'
  - 'Irregular stems: дати → дай (not *дайи), сказати → скажи (consonant mutation
    к→ж), стояти → стій (stem vowel change). These must be memorized as set forms.'
- section: Ввічливе прохання (Polite requests)
  words: 400
  points:
  - 'Будь ласка as universal softener: Дайте, будь ласка (Please give). Position
    flexibility: beginning, middle, or end of sentence. Most common after the verb.'
  - 'Прошу вас + infinitive: Прошу вас сісти (Please sit down). More formal than
    будь ласка. Used in official or service contexts.'
  - 'Indirect request pattern: Чи не могли б ви...? (Could you...?). Preview of
    conditional mood. Чи не могли б ви повторити? (Could you repeat?). Most polite
    option available at A1.'
- section: Заборони (Prohibitions)
  words: 300
  points:
  - 'Negative imperative: Не + imperative form. Не кури! (Do not smoke!). Не біжи!
    (Do not run!). Не чіпай! (Do not touch!). Same formation as positive, with не.'
  - 'Preview connection to a1-55 (Prohibitions and Signs): Distinction between personal
    prohibition (Не чіпай!) and public sign prohibition (Не торкатися! — infinitive
    form). Both mean "do not touch" but differ in register.'
- section: Практика (Practice)
  words: 300
  points:
  - 'Command drills: Teacher gives situation, learner produces correct imperative
    form. Focus on the 8 required verbs in varied contexts.'
  - 'Polite request formation: Upgrading direct commands to polite requests. Дай →
    Дайте, будь ласка → Чи не могли б ви дати? Politeness escalation practice.'
vocabulary_hints:
  required:
  - читати/читай (to read / read!) — Читайте текст; classroom command
  - писати/пиши (to write / write!) — Пишіть у зошиті; classroom command
  - сказати/скажи (to say / say!) — Скажіть, будь ласка; irregular к→ж mutation
  - дати/дай (to give / give!) — Дайте, будь ласка; irregular short form
  - іти/іди (to go / go!) — Ідіть сюди; movement command
  - слухати/слухай (to listen / listen!) — Слухайте уважно; classroom command
  - дивитися/дивись (to look / look!) — Дивіться на дошку; classroom command
  - стояти/стій (to stop / stop!) — Стійте! Не рухайтеся!; safety command
  recommended:
  - показати/покажи (to show / show!) — Покажіть, будь ласка; service context
  - допомогти/допоможи (to help / help!) — Допоможіть!; emergency context
  - взяти/візьми (to take / take!) — Візьміть це; irregular stem
  - чекати/чекай (to wait / wait!) — Зачекайте хвилинку; patience context
