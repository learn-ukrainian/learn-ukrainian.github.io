module: a1-03
level: A1
sequence: 3
slug: the-gender-code
version: '2.0'
title: The Gender Code
subtitle: Unlocking Ukrainian Gender Patterns
content_outline:
- section: Warm-up
  points:
  - 'Every Ukrainian noun has a gender — masculine, feminine, or neuter — cultural
    hook: contrast sun (neuter) with other languages; seen as gentle/impartial life-giver'
  - 'The ending reveals the gender (pattern recognition, not memorization) — Mnemonic
    aids: M = Hard/Stop, F = Open/A, N = Round/Circle'
  - '95% predictable from the word ending — learner error: over-reliance on English
    ''it'' for objects'
- section: Presentation
  points:
  - 'Masculine: consonant ending (стіл, хліб, дім) — collocations: новий дім, дерев''яний
    стіл; include ''гарний день'' (M) from research'
  - 'Feminine: -а or -я ending (книга, кімната, земля) — collocations: цікава книга,
    рідна земля; include ''добра ніч'' (F)'
  - 'Neuter: -о or -е ending (вікно, місто, море) — collocations: відкрите вікно,
    велике місто, тепле море; include ''добре серце'' (N)'
  - 'Gender affects adjectives, pronouns, and case endings — State Standard §4.2.2:
    introduction of мій, моя, моє'
  - Mini-dialogue demonstrating all three genders — include high-frequency family
    context (брат, сестра, мама); add 'тато' (dad) and 'мій/моя' agreement
- section: Practice
  points:
  - '4 declension families overview (відміни) — State Standard §4.2.1.1: focus on
    singular general gender meanings'
  - 'Family 1: -а/-я (mostly feminine) — мама, земля — learner error: ''тато'' ends
    in -o but is M due to natural gender; biological sex overrides ending'
  - 'Family 2: masculine consonant + neuter -о/-е — стіл, вікно — learner error: ''день''
    is M (consonant) despite soft sign; ''м''який знак'' trap'
  - 'Family 3: feminine consonant (rare) — ніч, любов — learner error: ''ніч'' is
    F; common ''ь'' trap for learners (compare with день-M)'
  - 'Family 4: neuter -а/-я with stem changes — імʼя, теля — learner error: ''ім''я''
    is N, not F; ends in -я but is Neuter'
- section: Production
  points:
  - 'Categorize nouns by gender from endings — Use visual memory hooks: Blue (M),
    Red (F), Yellow (N)'
  - Identify declension family for common words — Focus on high-frequency heart and
    nature terms (серце, море)
- section: Cultural Insight
  points:
  - S.T.A.L.K.E.R. Ukrainian game vocabulary example — артефакт (M), зона (F), укриття
    (N) as modern hooks
  - 'Home vocabulary across all three genders — State Standard §4.2.1.1: чоловік,
    жінка, місто examples; include ''собака'' (M) distinction'
vocabulary_hints:
  required:
  - брат (brother) — старший брат (older brother)
  - сестра (sister) — молодша сестра (younger sister)
  - мама (mother) — моя мама (my mom), люба мама (dear mom)
  - тато (father) — мудрий тато (wise dad); natural gender overrides -o ending; мій
    тато (my dad)
  - дім (house) — новий дім (new house), рідний дім (native home)
  - вікно (window) — відкрите вікно (open window)
  - книга (book) — цікава книга (interesting book)
  - місто (city) — моє місто (my city), велике місто (big city)
  recommended:
  - стіл (table) — дерев'яний стіл (wooden table)
  - море (sea) — синє море (blue sea), тепле море (warm sea)
  - ніч (night) — добра ніч (good night), темна ніч (dark night); feminine exception
    with soft sign
  - день (day) — гарний день (good day); masculine with soft sign
  - земля (earth) — рідна земля (native land), чорна земля (black earth)
  - серце (heart) — добре серце (kind heart), моє серце (my heart)
  - собака (dog) — мій собака (my dog); masculine gender trap
  - ім'я (name) — моє ім'я (my name); neuter family 4 exception
