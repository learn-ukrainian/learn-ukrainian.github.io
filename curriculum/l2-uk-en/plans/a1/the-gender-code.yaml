module: a1-07
level: A1
sequence: 7
slug: the-gender-code
version: '2.0'
title: The Gender Code
subtitle: Unlocking Ukrainian Gender Patterns
content_outline:
- section: Вступ (Introduction)
  words: 300
  points:
  - 'Introduction to the Ukrainian three-gender system: Masculine, Feminine, and Neuter
    — stressing that gender is a linguistic category for all nouns, not just people.'
  - 'Cultural Hook: The Neuter Sun (сонце) — explain its role as an impartial, gentle
    life-giver in Ukrainian folklore, contrasting it with the masculine sun in Romance
    languages (el sol/le soleil).'
  - 'Visual Mnemonic Framework: Categorization logic using color codes — Blue for
    Masculine (Hard/Consonant), Red for Feminine (Open/A-ending), and Yellow for Neuter
    (Round/O-E-ending).'
- section: Презентація правил (Presentation of Rules)
  words: 500
  points:
  - 'Pattern Recognition for Endings: Masculine (consonant: стіл, хліб, дім), Feminine
    (-а/-я: книга, кімната, земля), and Neuter (-о/-е: вікно, місто, море).'
  - 'State Standard §4.2.2 Integration: Introduction of possessive pronouns ''мій,
    моя, моє'' as the primary diagnostic tool for gender agreement and identity.'
  - 'Syntactic Agreement: How gender dictates the form of adjectives and pronouns
    — examples with ''великий стіл'' (M), ''цікава книга'' (F), and ''чисте вікно''
    (N).'
  - 'Identity and Family Dialogue: High-frequency context using ''брат'' (M), ''сестра''
    (F), ''мама'' (F), and ''тато'' (M) to demonstrate natural vs. grammatical gender.'
- section: Практичні вправи (Practice Exercises)
  words: 500
  points:
  - 'Natural Gender Override Trap: The case of ''тато'' — explain that biological
    sex overrides the ''-o'' ending, making it Masculine (мій тато); contrast with
    ''місто'' (N).'
  - 'The Soft Sign Ambiguity (Ь): Drill with the high-frequency minimal pair ''день''
    (Masculine) vs. ''ніч'' (Feminine); strategy for memorizing these essential ''soft''
    exceptions.'
  - 'The ''Name'' Trap and Family 4: Explaining why ''ім''я'' (name) is Neuter despite
    ending in ''-я'' — contrast with Feminine ''земля'' to avoid common learner confusion.'
  - 'State Standard §4.2.1.1 Drill: Categorizing high-frequency nouns ''чоловік''
    (man), ''жінка'' (woman), and ''місто'' (city) into their respective gender buckets.'
- section: Самостійна робота (Independent Work/Production)
  words: 400
  points:
  - 'The ''It'' Trap Correction: Targeted drill to stop learners from using neuter
    ''воно'' for all objects; reinforcing ''стіл = він'' and ''книга = вона''.'
  - 'Mapping Gender to Modern Contexts: Using S.T.A.L.K.E.R. vocabulary — ''Артефакт''
    (M), ''Зона'' (F), and ''Укриття'' (N) as classification anchors.'
  - 'Applying Agreement: Creating simple descriptive phrases for personal items and
    nature terms using ''мій/моя/моє'' and basic adjectives (новий, цікавий, великий).'
- section: Культурний код та підсумок (Cultural Code and Summary)
  words: 300
  points:
  - 'Summary of gender prediction from endings: 95% predictability rule — reinforcement
    of the ''Soft Sign'' and ''Natural Gender'' exceptions.'
  - 'Cultural Reflection: How gendered language shapes the Ukrainian worldview — personification
    of nature (земля-мати, сонце-життя).'
  - 'Final Competency Check: Identification of gender for core identity vocabulary
    (ім''я, тато, мама, місто) as per State Standard requirements.'
vocabulary_hints:
  required:
  - брат (brother) — старший брат (older brother); high-frequency family term
  - сестра (sister) — молодша сестра (younger sister); high-frequency family term
  - мама (mother) — моя мама; люба мама; high-frequency feminine
  - тато (father) — мій тато (my dad); natural gender overrides -o ending; masculine
    trap
  - дім (house) — новий дім; рідний дім; high-frequency masculine
  - вікно (window) — відкрите вікно; велике вікно; чисте вікно; high-frequency neuter
  - книга (book) — цікава книга; стара книга; електронна книга; high-frequency feminine
  - місто (city) — моє місто; велике місто; State Standard §4.2.1.1 example
  recommended:
  - стіл (table) — дерев'яний стіл; великий стіл; новий стіл; core masculine
  - море (sea) — синє море; тепле море; high-frequency neuter
  - ніч (night) — добра ніч (good night); feminine exception with soft sign
  - день (day) — гарний день (good day); masculine contrast with 'ніч'
  - земля (earth) — рідна земля; чорна земля; feminine ending in -я
  - серце (heart) — добре серце; моє серце; high-frequency neuter
  - сонце (sun) — ясне сонце; cultural hook; neuter life-giver
  - собака (dog) — мій собака (my dog); masculine gender trap for -a endings
  - ім'я (name) — моє повне ім'я; гарне ім'я; neuter exception (Family 4)
  - артефакт (artifact) — S.T.A.L.K.E.R. hook; masculine consonant ending
  - зона (zone) — S.T.A.L.K.E.R. hook; feminine -a ending
  - укриття (shelter) — S.T.A.L.K.E.R. hook; neuter -я ending with stem change
