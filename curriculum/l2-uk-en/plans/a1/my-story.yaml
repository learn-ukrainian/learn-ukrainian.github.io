module: a1-052
level: A1
sequence: 52
slug: my-story
version: '1.0'
title: My Story
subtitle: "Я народився, я живу, я буду... — your life in three tenses"
focus: communicative
pedagogy: PPP
phase: A1.8 [Past, Future, Graduation]
word_target: 1200
objectives:
- Combine all three tenses (past, present, future) in one coherent narrative
- Tell a simple life story: where you were born, where you live, what you plan
- Use time expressions to signal tense shifts
- Understand a short biography read aloud or in text
content_outline:
- section: "Dialogues"
  words: 300
  points:
  - "Dialogue 1 — Getting to know someone deeply:
    — Розкажи про себе! — Я народився в Канаді, у Торонто.
    — А зараз ти живеш тут? — Так, зараз я живу в Києві.
    — Чому ти переїхав? — Я хотів вивчати українську. Мої бабуся і дідусь з України.
    — А що ти будеш робити далі? — Я буду працювати тут і вчити мову.
    — Чудово! Успіхів тобі!
    All three tenses in one conversation."
  - "Dialogue 2 — Anna's story:
    — Я народилася у Львові. Там я вчилася в школі.
    — Потім я переїхала в Київ і закінчила університет.
    — Зараз я працюю вчителькою і живу в центрі міста.
    — А що далі? — Я буду подорожувати! Я хочу побачити Японію.
    — І ти будеш вчити японську? — Може! Але спочатку — українська для тебе!
    Past → present → future flow."
- section: "Три часи разом (Three Tenses Together)"
  words: 300
  points:
  - "Life story structure:
    PAST (минулий час): Я народився/народилася в... Я жив/жила в...
    Я вчився/вчилася... Я працював/працювала...
    PRESENT (теперішній час): Зараз я живу в... Я працюю...
    Я вивчаю... Я люблю...
    FUTURE (майбутній час): Я буду працювати... Я буду вивчати...
    Я буду жити..."
  - "Signal words that mark tense shifts:
    Past: раніше (before), у дитинстві (in childhood), коли я був/була маленьким/маленькою (when I was little).
    Present: зараз (now), сьогодні (today), цього року (this year).
    Future: потім (then), далі (further), наступного року (next year).
    These words help the listener know which tense is coming."
- section: "Моя історія (My Story)"
  words: 300
  points:
  - "Model story — Taras's life:
    Я народився в Одесі у тисяча дев'ятсот дев'яносто п'ятому році.
    Я жив там з батьками і сестрою. Я ходив у школу і любив математику.
    Потім я переїхав у Київ і вчився в університеті.
    Зараз я живу в Києві. Я працюю програмістом. Я люблю свою роботу.
    У вільний час я граю у футбол і читаю книжки.
    Далі я буду подорожувати. Я буду вивчати англійську.
    І я буду жити в Києві — це моє місто!
    Past (народився, жив, ходив) → Present (живу, працюю) → Future (буду подорожувати)."
  - "Your turn — tell YOUR story:
    Start: Я народився/народилася в [city/country].
    Past: Я жив/жила... Я вчився/вчилася... Я працював/працювала...
    Present: Зараз я живу... Я працюю... Я вивчаю українську, тому що...
    Future: Я буду... Я хочу...
    Use at least 3 past verbs, 3 present verbs, and 3 future constructions."
- section: "Summary"
  words: 300
  points:
  - "Three tenses — one story:
    Past: -в/-ла/-ло/-ли (gender endings). Я народився. Я жила.
    Present: person endings. Я живу. Ти працюєш. Вона вивчає.
    Future: буду + infinitive. Я буду працювати. Вона буде жити.
    Signal words: раніше → past, зараз → present, далі → future.
    Life story vocabulary: народитися (to be born), жити (to live),
    вчитися (to study), переїхати (to move), подорожувати (to travel).
    Self-check: Write your life story in 8-10 sentences using all three tenses."
vocabulary_hints:
  required:
  - народитися (to be born)
  - жити (to live)
  - вчитися (to study)
  - переїхати (to move)
  - зараз (now)
  - раніше (before/earlier)
  - далі (further/next)
  - розповідати (to tell/narrate)
  recommended:
  - подорожувати (to travel)
  - закінчити (to finish/graduate)
  - дитинство (childhood, n)
  - університет (university, m)
  - програміст (programmer, m)
  - успіх (success, m)
  - мрія (dream, f)
  - батьки (parents, pl)
activity_hints:
- type: order
  focus: "Put the life story in order: народився, ходив у школу, вчився в університеті, працює, буде подорожувати"
  items: 6
- type: quiz
  focus: "Which tense? Я народився / Я живу / Я буду працювати — past, present, or future?"
  items: 8
- type: fill-in
  focus: "Complete the story: Я ___ (народитися) в Києві. Зараз я ___ (жити) у Львові."
  items: 8
- type: fill-in
  focus: "Write about yourself: Я народився/народилася в ___ . Зараз я ___ . Далі я буду ___ ."
  items: 6
connects_to:
