grammar:
- 'Зворотні дієслова: звичайне відмінювання + постфікс -ся/-сь'
- 'Вимова: -шся=[с'':а], -ться=[ц'':а] (подовження приголосних)'
- 'Слова послідовності: спочатку, потім, після цього, нарешті'
register: розмовний
references:
- title: Захарійчук Grade 1, p.24
  notes: 'chunk_id: 1-klas-bukvar-zaharijchuk-2025-1_s0024. Grade 1 text gives a simple daily plan with A1-friendly -ся routine infinitives such as одягнутися, прогулятися, and погратися; use it to ground the lesson''s routine-verb examples.'
- title: Захарійчук Grade 1, p.52
  notes: 'chunk_id: 1-klas-bukvar-zaharijchuk-2025-2_s0052. Grade 1 text gives a self-directed morning sequence with getting up, making the bed, exercising, setting a cup, and washing dishes after breakfast; use it for A1 morning routine sequencing.'
