module: a1-020
level: A1
sequence: 20
slug: my-morning
version: '1.1'
title: My Morning
subtitle: "Прокидаюся, вмиваюся — reflexive verbs and routines"
focus: grammar
pedagogy: PPP
phase: A1.3 [Actions]
word_target: 1200
objectives:
- Recognize and use reflexive verbs with -ся/-сь
- Describe a morning routine using sequence words
- Conjugate reflexive verbs in present tense (same endings + ся)
- Tell a simple daily story in sequence
content_outline:
- section: "Діалоги (Dialogues)"
  words: 300
  points:
  - "Dialogue 1 — Morning routine:
    — Коли ти прокидаєшся? — Я прокидаюся о сьомій.
    — Що ти робиш потім? — Вмиваюся, одягаюся і снідаю.
    — А коли ти йдеш на роботу? — О восьмій.
    Reflexive verbs emerge through describing the morning."
  - "Dialogue 2 — Weekend morning (contrast):
    — У суботу я не поспішаю. Прокидаюся пізно, лежу, дивлюся телефон.
    — А я навчаюся вранці. Потім гуляю.
    Mix of reflexive and non-reflexive verbs."
- section: "Дієслова на -ся (Reflexive Verbs)"
  words: 300
  points:
  - "Караман Grade 10 p.176: Дієслова із суфіксом -ся(-сь) означають дію, спрямовану на себе.
    вмивати (to wash someone) → вмиватися (to wash oneself).
    одягати (to dress someone) → одягатися (to dress oneself).
    The -ся attaches to the end of every conjugated form:
    я вмиваюся, ти вмиваєшся, він/вона вмивається."
  - "Кравцова Grade 4 p.113: pronunciation note:
    -шся sounds like [с':а] (long soft с): вмиваєшся → [вмиваєс':а].
    -ться sounds like [ц':а] (long soft ц): вмивається → [вмиваєц':а].
    The spelling and pronunciation differ — learn both!"
- section: "Мій ранок (My Morning)"
  words: 300
  points:
  - "Morning routine vocabulary (reflexive verbs):
    прокидатися (to wake up), вмиватися (to wash face/hands),
    одягатися (to get dressed), збиратися (to get ready),
    повертатися (to return home).
    Non-reflexive morning verbs for contrast:
    снідати (to have breakfast), пити каву (to drink coffee).
    Йти (to go) — irregular: я йду, ти йдеш, він/вона йде.
    Learn these forms — they don't follow Group I or II patterns."
  - "Sequence words for telling a story:
    спочатку (first), потім (then), після цього (after this), нарешті (finally).
    Мій ранок: Спочатку я прокидаюся. Потім вмиваюся і одягаюся.
    Після цього снідаю. Нарешті йду на роботу."
- section: "Підсумок — Summary"
  words: 300
  points:
  - "Reflexive verbs = regular verb + ся at the end.
    я -юся, ти -єшся, він/вона -ється (Group I pattern + ся).
    Morning routine: прокидатися → вмиватися → одягатися → снідати → йти.
    Sequence words: спочатку, потім, після цього, нарешті.
    Self-check: Describe your morning in 4-5 sentences using sequence words."
vocabulary_hints:
  required:
  - прокидатися (to wake up)
  - вмиватися (to wash face/hands)
  - одягатися (to get dressed)
  - снідати (to have breakfast)
  - йти (to go — irregular)
  - спочатку (first, at first)
  - потім (then, next)
  recommended:
  - збиратися (to get ready)
  - повертатися (to return)
  - навчатися (to study/learn)
  - поспішати (to hurry)
  - після цього (after this)
  - нарешті (finally)
  - вранці (in the morning)
  - пізно (late)
