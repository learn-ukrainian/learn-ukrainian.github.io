module: a1-020
level: A1
sequence: 20
slug: my-morning
version: 1.2.3
title: Мій ранок
subtitle: Прокидаюся, вмиваюся — зворотні дієслова та ранкова рутина
focus: grammar
pedagogy: PPP
phase: A1.3 [Дії]
word_target: 1200
objectives:
- Вміти розпізнавати та використовувати зворотні дієслова із постфіксом -ся/-сь
- Навчитися описувати свою ранкову рутину за допомогою слів послідовності
- Вміти відмінювати зворотні дієслова в теперішньому часі (стандартні закінчення + ся)
- Навчитися розповідати просту щоденну історію у хронологічній послідовності
dialogue_situations:
- setting: Дві сусідки по кімнаті порівнюють свої ранкові звички перед виходом на роботу
  speakers:
  - Ліна
  - Настя
  motivation: 'Зворотні дієслова: прокидаюся, вмиваюся, одягаюся у логічній послідовності'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Ранкова рутина: — Коли ти прокидаєшся? — Я прокидаюся о сьомій. — Що ти робиш потім? — Вмиваюся, одягаюся і снідаю. — А коли ти йдеш на роботу? — О восьмій. Зворотні дієслова з''являються природно під час розповіді про ранок.'
  - 'Діалог 2 — Ранок вихідного дня (порівняння): — У суботу я не поспішаю. Прокидаюся пізно, лежу, дивлюся телефон. — А я навчаюся вранці. Потім гуляю. Поєднання зворотних і незворотних дієслів.'
- section: Дієслова на -ся
  words: 300
  points:
  - 'Захарійчук, 4 клас, с. 162: Дієслова із суфіксом -ся(-сь) означають дію, спрямовану на себе. вмивати (когось) → вмиватися (себе). одягати (когось) → одягатися (себе). Постфікс -ся додається в кінці кожної особової форми: я вмиваюся, ти вмиваєшся, він/вона вмивається.'
  - 'Захарійчук, 4 клас, с. 163: правило вимови: -шся звучить як [с'':а] (подовжений м''який "с"): вмиваєшся → [вмиваєс'':а]. -ться звучить як [ц'':а] (подовжений м''який "ц"): вмивається → [вмиваєц'':а]. Написання і вимова відрізняються — потрібно запам''ятати і те, і інше!'
- section: Мій ранок
  words: 300
  points:
  - 'Лексика ранкової рутини (зворотні дієслова): прокидатися, вмиватися, одягатися, збиратися, повертатися. Незворотні дієслова для ранку (для контрасту): снідати, пити каву. Дієслово "йти" — неправильне: я йду, ти йдеш, він/вона йде. Запам''ятайте ці форми — вони не підпорядковуються правилам І або ІІ дієвідміни.'
  - 'Слова послідовності для створення розповіді: спочатку, потім, після цього, нарешті. Мій ранок: Спочатку я прокидаюся. Потім вмиваюся і одягаюся. Після цього снідаю. Нарешті йду на роботу.'
- section: Підсумок
  words: 300
  points:
  - 'Зворотні дієслова = звичайне дієслово + ся в кінці. я -юся, ти -єшся, він/вона -ється (схема І дієвідміни + ся). Ранкова рутина: прокидатися → вмиватися → одягатися → снідати → йти. Слова послідовності: спочатку, потім, після цього, нарешті. Самоперевірка: Опишіть свій ранок у 4-5 реченнях, використовуючи слова послідовності.'
vocabulary_hints:
  required:
  - прокидатися (to wake up)
  - вмиватися (to wash face/hands)
  - одягатися (to get dressed)
  - снідати (to have breakfast)
  - йти (to go — irregular)
  - спочатку (first, at first)
  - потім (then, next)
  recommended:
  - збиратися (to get ready)
  - повертатися (to return)
  - навчатися (to study/learn)
  - поспішати (to hurry)
  - після цього (after this)
  - нарешті (finally)
  - вранці (in the morning)
  - пізно (late)
activity_hints:
- type: fill-in
  focus: 'Додайте -ся: я вмиваю__ , ти одягаєш__ , він прокидаєть__'
  items: 10
- type: quiz
  focus: 'Зворотне чи ні? Оберіть: Я (вмиваю/вмиваюся) руки.'
  items: 8
- type: fill-in
  focus: 'Відновіть правильний порядок ранкової рутини: спочатку ___, потім ___, нарешті ___'
  items: 6
- type: fill-in
  focus: Опишіть свій ранок у 3 реченнях
  items: 3
connects_to:
- a1-021 (Рубіжний контроль — Дії)
prerequisites:
- a1-019 (Запитання)
grammar:
- 'Зворотні дієслова: звичайне відмінювання + постфікс -ся/-сь'
- 'Вимова: -шся=[с'':а], -ться=[ц'':а] (подовження приголосних)'
- 'Слова послідовності: спочатку, потім, після цього, нарешті'
register: розмовний
references:
- title: Захарійчук Grade 4, p.162
  notes: 'Дієслова на -ся: правило, відмінювання (я вмиваюся, ти вмиваєшся, він/вона вмивається), вправи з типовою лексикою. Заміняє раніше цитований Караман 10 клас p.187 (помилка LEVEL_MISMATCH + TOPIC_MISMATCH — Караман p.187 насправді про сленг і просторічну лексику, не -ся; виправлено 2026-05-15 після плановиx аудиту #2007 і фіксу matcher #2008).'
- title: Захарійчук Grade 4, p.163
  notes: 'Дієслова на -ся продовження: -шся/-ться вимова, фонетична заміна -шся→[с'':а] / -ться→[ц'':а]. Заміняє раніше цитований Кравцова 4 клас p.113 (Кравцова Grade 4 не існує в корпусі — Кравцова є тільки Grade 2; виправлено 2026-05-15).'
