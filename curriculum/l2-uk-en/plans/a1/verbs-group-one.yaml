module: a1-016
level: A1
sequence: 16
slug: verbs-group-one
version: '1.1.1'
title: Дієслова першої групи
subtitle: Читаю, читаєш, читає — ваша перша дієвідміна
focus: grammar
pedagogy: PPP
phase: A1.3 [Дії]
word_target: 1200
objectives:
- Відмінювати дієслова I дієвідміни (-ати) в теперішньому часі для всіх осіб
- Використовувати 6 найуживаніших дієслів I дієвідміни в реченнях
- Розпізнавати модель закінчень I дієвідміни (-у/-ю, -єш, -є, -ємо, -єте, -ють)
- Будувати прості речення про повсякденні справи
dialogue_situations:
- setting: На спільній кухні — одна людина готує, інша запитує, що вона робить
  speakers:
  - Юля
  - Сашко
  motivation: Дієслова I дієвідміни в дії (читаєш, працюєш, готуєш)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Що ти робиш?: — Що ти робиш? — Я читаю книгу. А ти? — Я слухаю музику. — А що робить Олена? — Вона готує вечерю. Усі три особи (я/ти/він, вона) виникають природно.'
  - 'Діалог 2 — На роботі/навчанні: — Де ти працюєш? — Я працюю в офісі. А ти? — Я не працюю, я навчаюся. — Ти знаєш українську? — Так, я вивчаю! Дієслова I дієвідміни в практичному контексті.'
- section: Перша дієвідміна
  words: 300
  points:
  - 'Варзацька, 4 клас, с. 129: таблиця відмінювання дієслів (теперішній час). Дієслова I дієвідміни мають інфінітив на -ати (або -увати, -яти): читати → я читаю, ти читаєш, він/вона читає ми читаємо, ви читаєте, вони читають. Модель: основа + -ю, -єш, -є, -ємо, -єте, -ють.'
  - 'Шість основних дієслів I дієвідміни: читати: читаю, читаєш, читає... знати: знаю, знаєш, знає... працювати: працюю, працюєш, працює... слухати: слухаю, слухаєш, слухає... гуляти: гуляю, гуляєш, гуляє... готувати: готую, готуєш, готує...'
- section: Я, ти, він/вона
  words: 300
  points:
  - 'Зосередження на трьох найуживаніших формах: Я читаю — закінчення -ю. Ти читаєш — закінчення -єш. Він/вона читає — закінчення -є. Ці три форми покривають 90% розмов на рівні A1. Форми множини для розпізнавання: ми читаємо, ви читаєте, вони читають.'
  - 'Побудова речень із відомою лексикою: Я читаю нову книгу. Ти знаєш цю пісню? Вона слухає українську музику. Зверніть увагу: об''єкт може змінювати форму (книгу, пісню) — наразі вивчайте це як цілісні фрази.'
- section: Підсумок
  words: 300
  points:
  - 'Модель відмінювання I дієвідміни: я -ю, ти -єш, він/вона -є, ми -ємо, ви -єте, вони -ють. Працює для слів: читати, знати, працювати, слухати, гуляти, готувати. Самоперевірка: Провідміняйте слово "слухати" для я, ти, він/вона. Розкажіть, що ви робите (Я читаю...), запитайте, що робить інша людина (Що ти робиш?).'
vocabulary_hints:
  required:
  - читати (to read)
  - знати (to know)
  - працювати (to work)
  - слухати (to listen)
