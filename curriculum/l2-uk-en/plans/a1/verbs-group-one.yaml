module: a1-016
level: A1
sequence: 16
slug: verbs-group-one
version: '1.0'
title: Verbs Group I
subtitle: "Читаю, читаєш, читає — your first conjugation"
focus: grammar
pedagogy: PPP
phase: A1.3 [Actions]
word_target: 1200
objectives:
- Conjugate Group I (-ати) verbs in present tense for all persons
- Use 6 high-frequency Group I verbs in sentences
- Recognize the Group I ending pattern (-у/-ю, -єш, -є, -ємо, -єте, -ють)
- Build simple sentences about daily activities
content_outline:
- section: "Діалоги (Dialogues)"
  words: 300
  points:
  - "Dialogue 1 — What do you do? (ULP Ep22 pattern):
    — Що ти робиш? — Я читаю книгу. А ти?
    — Я слухаю музику. — А що робить Олена?
    — Вона готує вечерю.
    All three persons (я/ти/він,вона) emerge naturally."
  - "Dialogue 2 — At work/school:
    — Де ти працюєш? — Я працюю в офісі. А ти?
    — Я не працюю, я навчаюся. — Ти знаєш українську? — Так, я вивчаю!
    Group I verbs in practical context."
- section: "Перша дієвідміна (Group I Verbs)"
  words: 300
  points:
  - "Варзацька Grade 4 p.129: verb conjugation table (теперішній час).
    Group I verbs have infinitive in -ати (or -увати, -яти):
    читати → я читаю, ти читаєш, він/вона читає
    ми читаємо, ви читаєте, вони читають.
    Pattern: stem + -ю, -єш, -є, -ємо, -єте, -ють."
  - "Six essential Group I verbs:
    читати (to read): читаю, читаєш, читає...
    знати (to know): знаю, знаєш, знає...
    працювати (to work): працюю, працюєш, працює...
    слухати (to listen): слухаю, слухаєш, слухає...
    гуляти (to walk): гуляю, гуляєш, гуляє...
    готувати (to cook): готую, готуєш, готує..."
- section: "Я, ти, він/вона (Persons)"
  words: 300
  points:
  - "Focus on the three most-used forms:
    Я читаю (I read) — ending -ю
    Ти читаєш (You read) — ending -єш
    Він/вона читає (He/she reads) — ending -є
    These three cover 90% of A1 conversations.
    Plural forms for recognition: ми читаємо, ви читаєте, вони читають."
  - "Building sentences with known vocabulary:
    Я читаю нову книгу. (M08 noun + M09 adjective + M16 verb)
    Ти знаєш цю пісню? (M12 demonstrative + M16 verb)
    Вона слухає українську музику. (M16 verb + adjective + noun)
    Note: the object may change form (книгу, пісню) — learn as chunks for now."
- section: "Підсумок — Summary"
  words: 300
  points:
  - "Group I conjugation pattern:
    я -ю, ти -єш, він/вона -є, ми -ємо, ви -єте, вони -ють.
    Works for: читати, знати, працювати, слухати, гуляти, готувати.
    Self-check: Conjugate 'слухати' for я, ти, він/вона.
    Say what you do (Я читаю...), ask what someone does (Що ти робиш?)."
vocabulary_hints:
