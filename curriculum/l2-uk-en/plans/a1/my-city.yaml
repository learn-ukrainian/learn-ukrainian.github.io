module: a1-030
level: A1
sequence: 30
slug: my-city
version: 1.1.3
title: Моє місто
subtitle: Бібліотека, аптека, ресторан — лексика міста
focus: vocabulary
pedagogy: PPP
phase: A1.5 [Місця]
word_target: 1200
objectives:
- Вміти називати понад 15 основних місць у місті (бібліотека, аптека, ресторан тощо)
- Навчитися вживати місцевий відмінок з лексикою на тему міста (на базі модуля модуль №29)
- Вміти описувати, що ви робите в кожному місці (за допомогою дієслів з A1.3)
- Навчитися пояснювати дорогу, використовуючи дієслово «є» та прислівники «тут»/«там»
dialogue_situations:
- setting: 'Малюємо карту свого району в Києві для друга по листуванню — позначаємо: бібліотека (f), музей, площа, озеро, зупинка, церква. Використовуємо «біля», «поруч з», «далеко від» для опису відстані.'
  speakers:
  - Аліна (describing)
  - Ігор (asking questions)
  motivation: 'Лексика на тему міста: бібліотека(f), музей(m), площа(f), озеро(n)'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Новачок у місті: — Вибачте, де тут аптека? — Аптека на вулиці Шевченка. — А бібліотека? — Бібліотека в центрі, біля парку. — Дякую! — Будь ласка! Міські локації в контексті запитань про дорогу.'
  - 'Діалог 2 — Мій район: — Що є біля твого дому? — Біля дому є магазин і кафе. — А школа? — Школа далеко, у центрі міста. Повторення: прийменники в/на + місцевий відмінок для всіх місць.'
- section: Місця в місті
  words: 300
  points:
  - 'Базова міська лексика: аптека, бібліотека, лікарня, магазин, супермаркет, ресторан, кафе, банк, пошта, вокзал, готель, музей, театр, кінотеатр, церква, стадіон, університет.'
  - 'Кожне місце з відповідним прийменником (місцевий відмінок з модуля №29): в аптеці, у бібліотеці, у лікарні, в магазині, у ресторані, у кафе, у банку, на пошті, на вокзалі, у готелі, в музеї. Що ми там робимо: Я купую ліки в аптеці. Я читаю в бібліотеці. Я працюю в офісі. Я відпочиваю в парку.'
- section: Де це?
  words: 300
  points:
  - 'Слова для позначення розташування: тут, там, далеко, близько, біля + родовий відмінок (біля парку, біля дому), у центрі, на розі. Примітка: «біля» вимагає родового відмінка — запам''ятовуємо як сталі вирази, а не як граматичне правило.'
  - 'Опис вашого міста: У моєму місті є великий парк і два музеї. Бібліотека біля університету. Магазин тут, біля дому. Зверніть увагу: використовуємо «є» для позначення наявності (вивчено у модулі №6).'
- section: Підсумок
  words: 300
  points:
  - 'Міська лексика з прийменниками: В/у: аптеці, бібліотеці, магазині, банку, готелі, ресторані. На: пошті, вокзалі, стадіоні, площі. Слова розташування: тут, там, далеко, близько, біля. Самоперевірка: Назвіть 5 місць біля вашого дому. Що ви там робите?'
vocabulary_hints:
  required:
  - аптека (pharmacy, f)
  - бібліотека (library, f)
  - магазин (shop, m)
  - ресторан (restaurant, m)
  - готель (hotel, m)
  - вокзал (train station, m)
  - тут (here)
  - там (there)
  recommended:
  - лікарня (hospital, f)
  - супермаркет (supermarket, m)
  - пошта (post office, f)
  - музей (museum, m)
  - церква (church, f)
  - далеко (far)
  - близько (near)
  - біля (near — + genitive chunk)
activity_hints:
- type: match-up
  focus: 'З''єднайте місце з дією: аптека ↔ купувати ліки'
  items: 8
- type: quiz
  focus: 'В чи на? Оберіть правильний прийменник для місць у місті.'
  items: 8
- type: fill-in
  focus: 'Опишіть своє місто: У моєму місті є ___.'
  items: 6
- type: quiz
  focus: 'Куди б ви пішли? Оберіть правильне місце для кожної ситуації.'
  items: 6
connects_to:
