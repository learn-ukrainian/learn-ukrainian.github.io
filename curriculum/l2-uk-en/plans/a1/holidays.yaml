module: a1-046
level: A1
sequence: 46
slug: holidays
version: '1.1.2'
title: Свята
subtitle: Різдво, Великдень, День Незалежності — українські свята
focus: cultural
pedagogy: PPP
phase: A1.7 [Спілкування]
word_target: 1200
objectives:
- Називати та описувати головні українські свята (Різдво, Великдень, День Незалежності)
- Доречно використовувати святкові привітання (З Різдвом! З Великоднем! З Днем Незалежності!)
- Розповідати про те, що люди роблять на свята, використовуючи знайому лексику
- Розуміти культурне значення українських свят
dialogue_situations:
- setting: 'Українська Свята вечеря — пояснення 12 страв: кутя, борщ (m), вареники (pl), риба, узвар. З Різдвом Христовим! Зі святом!'
  speakers:
  - Українська родина
  - Іноземний гість
  motivation: 'Святкова їжа: кутя (f), борщ (m), вареники (pl), узвар (m) + привітання'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Перед Різдвом: — Коли в тебе Різдво? — Двадцять п''ятого грудня. А в тебе? — У нас — теж! Раніше святкували сьомого січня, але тепер — двадцять п''ятого. — Що ви робите на Різдво? — Ми співаємо колядки і їмо кутю. — Як гарно! З Різдвом! — З Різдвом Христовим! Лексика Різдва: колядки, кутя (kutia — ритуальна страва), святкувати.'
  - 'Діалог 2 — День Незалежності: — Двадцять четверте серпня — День Незалежності! — Так, це головне державне свято України. — Що ви робите? — Ми дивимося парад і ходимо на концерт. — А ввечері? — Ввечері — салют і святковий вечір з друзями. — З Днем Незалежності! — Слава Україні! Національне свято: парад, концерт, салют.'
- section: Українські свята
  words: 300
  points:
  - 'Різдво — 25 грудня: Україна перенесла святкування Різдва з 7 січня на 25 грудня у 2023 році. 7 січня було російською православною датою; 25 грудня об''єднує з Європою. Традиції: Свята вечеря 24 грудня — 12 страв (12 dishes). кутя — пшенична каша з медом і маком — перша страва. колядки — традиційні різдвяні пісні. Колядники ходять від хати до хати.'
  - 'Великдень: Найбільше релігійне свято. Дата змінюється щороку (навесні). Традиції: писанки (decorated eggs — унікальне українське мистецтво), паска, святити кошик. Привітання: Христос воскрес! — Воістину воскрес! (Christ is risen! — Indeed risen!)'
- section: Державні свята
  words: 300
  points:
  - 'День Незалежності — 24 серпня 1991 року: Україна проголосила незалежність від Радянського Союзу. Найважливіше державне свято. Святкування: парад, концерти, салют, прапори. Привітання: З Днем Незалежності! (Happy Independence Day!) Слава Україні! — Героям слава! (Glory to Ukraine! — Glory to the heroes!)'
  - 'Інші свята, які варто знати: Новий рік — 1 січня — найбільше світське свято. День вишиванки — третій четвер травня. Усі одягають вишиванку — символ української ідентичності. День Конституції — 28 червня. День захисників і захисниць (Defenders'' Day) — 1 жовтня.'
- section: Підсумок
  words: 300
  points:
  - 'Шаблон святкових привітань: З + орудний відмінок! З Різдвом! (Merry Christmas!) З Великоднем! (Happy Easter!) З Новим роком! (Happy New Year!) З Днем Незалежності! З днем народження! (Happy birthday!) Шаблон: З + [назва свята чи події в орудному відмінку] + ! Ви вже знаєте орудний відмінок з конструкції з + іменник (кава з молоком). Тут те саме: «з» (with) святом → орудний відмінок. Короткий календар: 25 грудня — Різдво, 1 січня — Новий рік, весна — Великдень, 24 серпня — День Незалежності. Самоперевірка: Як сказати «Merry Christmas» та «Happy New Year»?'
vocabulary_hints:
  required:
  - свято (holiday, n)
  - святкувати (to celebrate)
  - Різдво (Christmas, n)
  - Великдень (Easter, m)
  - Новий рік (New Year)
  - вітати (to congratulate/greet)
  recommended:
  - кутя (kutia, f)
  - колядка (carol, f)
  - писанка (decorated Easter egg, f)
  - паска (Easter bread, f)
  - парад (parade, m)
  - прапор (flag, m)
  - вишиванка (embroidered shirt, f)
  - незалежність (independence, f)
  - салют (fireworks, m)
