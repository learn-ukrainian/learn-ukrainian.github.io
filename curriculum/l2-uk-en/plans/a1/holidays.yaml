  items: 8
- type: quiz
  focus: Яке свято? Кутя, колядки, Свята вечеря → (Різдво / Великдень / Новий рік)
  items: 8
- type: group-sort
  focus: 'Розподіліть традиції за святами: Різдво проти Великдень проти День Незалежності'
  items: 10
