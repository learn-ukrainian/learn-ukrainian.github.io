title: Свята
subtitle: Привітання, родинні традиції та державні свята України
focus: cultural
pedagogy: PPP
phase: A1.7 [Спілкування]
word_target: 1200
objectives:
- Називати основні українські свята (Новий рік, Різдво, Великдень, День Незалежності України)
- Використовувати готові святкові привітання (`З Новим роком!`, `З Різдвом Христовим!`, `З Великоднем!`, `З Днем Незалежності України!`)
- Говорити, що люди роблять на свята (`ми святкуємо`, `співаємо колядки`, `печемо паски`, `фарбуємо яйця`)
- Розрізняти моделі `святкувати + назва свята` і `на + назва свята` для позначення часу
- Не плутати `колядки` і `щедрівки` в зимовому святковому циклі
- Упізнавати дати 1 січня, 25 грудня, 24 серпня і 22 січня
dialogue_situations:
- setting: 'Перед зимовими канікулами двоє друзів готують короткі вітання для друзів і родини. Потрібні: Новий рік, Різдво, листівка, подарунок, зимові канікули.'
  speakers:
  - Марта
  - Данило
  motivation: 'Формули `Вітаю з...`, `Бажаю...`, `Веселих свят!` + коротка розмова про плани на канікули'
- setting: 'Удома на Різдво або Великдень українська родина пояснює гостеві, що вони роблять на свято: співають колядки, приймають гостей, печуть паски, фарбують яйця.'
  speakers:
  - Оксана
  - Алекс
  motivation: '`Що ви робите на...?` + `святкувати Різдво/Великдень` + родинна святкова лексика'
- setting: 'У школі або на міській події двоє однокласників говорять про державне свято. Треба назвати дату, свято й дуже коротко пояснити його значення.'
  speakers:
  - Ігор
  - Софія
  motivation: '`24 серпня — День Незалежності України`; пасивне впізнавання `22 січня — День Соборності України`'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Вітальна листівка / повідомлення до Нового року: — Привіт! Я пишу листівку бабусі. — Що ти напишеш? — Вітаю з Новим роком! Бажаю веселих свят і добрих канікул. — Гарно! А я напишу другові: З Різдвом Христовим! Відпрацьовуємо `Вітаю з...`, `Бажаю...`, `Веселих свят!` як готові мовленнєві чанки.'
  - 'Діалог 2 — Що ви робите на Різдво / Великдень?: — Що ви робите на Різдво? — Ми святкуємо вдома, співаємо колядки і приймаємо гостей. — А на Великдень? — Печемо паски й фарбуємо яйця. Тут автор мусить тримати два патерни окремо: `святкуємо Різдво` але `на Різдво співаємо колядки`.'
  - 'Діалог 3 — Державне свято: — Коли День Незалежності України? — Двадцять четвертого серпня. — Це державне свято України. — З Днем Незалежності України! — Дякую! Короткий, фактологічно точний блок без салютів і надмірного пафосу.'
- section: Формули привітання
  words: 300
  points:
  - 'Активний набір привітань: `З Новим роком!`, `З Різдвом Христовим!`, `З Великоднем!`, `З Днем Незалежності України!`, `Веселих свят!`.'
  - 'Шаблони для короткого письма й усного мовлення: `Вітаю з...`, `Бажаю...`, `Бажаю здоров''я / радості / добрих канікул`. А1-підхід: не читаємо лекцію про орудний відмінок; даємо готові фразові блоки й кілька керованих підстановок.'
  - 'Окремо зафіксувати типову помилку: `Вітаю з Новий рік` НЕ можна; правильно тільки `Вітаю з Новим роком`. Те саме з `З Різдвом` і `З Великоднем`.'
- section: Родинні свята
  words: 300
  points:
  - 'Зимовий блок: `1 січня — Новий рік`, `25 грудня — Різдво Христове`. На Різдво співають `колядки`; на `Щедрий вечір` діти `щедрують`, а звучать `щедрівки`. Не зливати ці слова в один кошик "зимових пісень".'
  - 'Великдень: `паска`, `писанки`, `фарбувати яйця`, `пекти паски`, `З Великоднем!` Авторова межа: формулу `Христос воскрес! — Воістину воскрес!` можна дати як культурну довідку або додатковий діалог, але базова активна опора модуля — нейтральне `З Великоднем!`.'
  - 'Родинний контекст: `родина`, `гість`, `листівка`, `подарунок`. Модуль має звучати як домашнє святкування й обмін привітаннями, а не як абстрактний "урок про традиції".'
- section: Державні свята і підсумок
  words: 300
  points:
  - 'Головна активна дата: `24 серпня — День Незалежності України`. Додаткова дата для впізнавання: `22 січня — День Соборності України`.'
  - 'Мінімальні речення для автора: `Це державне свято України.` `Люди вітають одне одного.` `Люди бачать прапори й ідуть на святкові події.` Writer note: не будувати цей блок навколо `салюту`; це і прагматично слабко, і не допомагає мовленню.'
  - 'Самоперевірка: учень має вміти (1) привітати з 3-4 святами, (2) сказати, що родина робить на Різдво або Великдень, (3) назвати дату Дня Незалежності України, (4) не плутати `святкувати свято` з `на свято ми...`.'
vocabulary_hints:
  required:
  - свято (holiday, n)
  - святкувати (to celebrate)
  - Новий рік (New Year)
  - Різдво (Christmas, n)
  - Великдень (Easter, m)
  - День Незалежності України (Independence Day of Ukraine)
  - вітати (to congratulate / greet)
  - бажати (to wish)
  - колядка (Christmas carol, f)
  - паска (Easter bread, f)
  recommended:
  - щедрівка (Shchedryi Vechir / New Year song, f)
  - щедрувати (to perform shchedrivky)
  - святвечір (Christmas Eve supper time, m)
  - писанка (decorated Easter egg, f)
  - листівка (greeting card, f)
  - подарунок (gift, m)
  - родина (family, f)
  - гість (guest, m)
  - День Соборності України (Unity Day of Ukraine)
  - прапор (flag, m)
activity_hints:
- type: match-up
  focus: З'єднайте свято з датою.
  items:
  - Новий рік: 1 січня
  - Різдво Христове: 25 грудня
  - День Незалежності України: 24 серпня
  - День Соборності України: 22 січня
- type: fill-in
  focus: Святкові привітання — оберіть правильну форму після `з`.
  items:
  - Вітаю з {Новим роком|Новий рік|Новому році}!
  - З {Різдвом|Різдво|Різдві} Христовим!
  - З {Великоднем|Великдень|Великодні}!
  - З Днем {Незалежності|Незалежність|Незалежністю} України!
- type: fill-in
  focus: '`святкувати` чи `на`? Оберіть правильну модель.'
  items:
  - 'Ми {святкуємо Різдво|на Різдво святкуємо Різдво|святкуємо на Різдво} вдома.'
  - '{На Великдень|Святкуємо Великдень|Великдень} ми печемо паски.'
  - 'Я {святкую День Незалежності України|святкую на День Незалежності України|на День Незалежності України святкую} з родиною.'
  - '{На Новий рік|Святкуємо Новий рік|Новий рік} ми даруємо подарунки.'
- type: quiz
  focus: Що до якого свята належить?
  items:
  - question: Що співають на Різдво?
    options:
    - колядки
    - щедрівки
    - гаївки
  - question: Що звучить на Щедрий вечір?
    options:
    - щедрівки
    - колядки
    - веснянки
  - question: Що печуть на Великдень?
    options:
    - паски
    - вареники
    - млинці
  - question: Яке це свято — 24 серпня?
    options:
    - День Незалежності України
    - День Соборності України
    - Новий рік
- type: fill-in
  focus: Коротке привітання або листівка до свята.
  items:
  - 'Вітаю тебе з {Новим роком|Новий рік|Новому році}! Бажаю веселих свят.'
  - 'З {Різдвом|Різдво|Різдві} Христовим! Нехай у вас буде радісний день.'
  - 'З {Великоднем|Великдень|Великодні}! Бажаю здоров''я й добра.'
  - 'Двадцять четвертого серпня — День {Незалежності|Незалежність|Незалежністю} України.'
