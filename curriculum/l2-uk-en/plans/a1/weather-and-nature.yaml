module: a1-043
level: A1
sequence: 43
slug: weather-and-nature
version: '2.0'
title: Weather & Nature
subtitle: Seasons, Weather & The Natural World
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Tenses & Daily Life]
word_target: 2000
objectives:
- Learner can describe the weather
- Learner can ask about weather conditions
- Learner can name the four seasons
- Learner can use impersonal weather expressions
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - 'Вступ від імені Карпатського рейнджера: погода як універсальний ключ до small talk в Україні та основа для планування
    походів; акцент на чіткій зміні чотирьох пір року (State Standard §3.4).'
  - 'Культурний гачок: концепція «Бабиного літа» (Indian Summer) — теплий період на межі вересня та жовтня, його значення
    для фольклору та сільськогосподарського циклу.'
- section: Погода та безособові форми (Weather & Impersonal Forms)
  words: 500
  points:
  - 'Безособові конструкції для стану природи: вживання прислівників (тепло, холодно, спекотно, прохолодно) без фіктивного
    підмета — виправлення помилки *Це холодно* замість **Холодно**.'
  - 'Опади через ідіоматичні дієслова руху: вивчення конструкцій «йде дощ» та «йде сніг» — drill для запобігання калькуванню
    *дощ робить* (wrong verb error).'
- section: Пори року та природа (Seasons & Nature)
  words: 550
  points:
  - 'Часові прислівники від назв пір року (State Standard §3.4): навесні, влітку, восени, взимку — фокус на фонетиці та наголосах
    (восени́, навесні́) та уникненні помилки *в весні*.'
  - 'Природні об’єкти за Стандартом (§3.11): ліс, озеро, річка, гори, море — опис типової погоди в цих локаціях (наприклад,
    «влітку на морі спекотно», «взимку в горах багато снігу»).'
- section: Складні речення та прогноз (Complex Sentences & Forecast)
  words: 550
  points:
  - 'Синтаксис складного речення за Стандартом (§4.3.2): побудова конструкцій зі сполучником «бо» для пояснення планів залежно
    від погоди (наприклад: «Ми не гуляємо, бо холодно»).'
  - 'Діалог «Прогноз погоди»: запитання про умови (Яка сьогодні погода? Чи буде вітер?) та використання колокацій «гарна/погана
    погода», «сильний дощ».'
vocabulary_hints:
  required:
  - погода (weather) — яка сьогодні погода?, прогноз погоди; High (Top 1000)
  - 'дощ (rain) — йде дощ (it rains), сильний дощ, після дощу; learner error: *дощ робить*'
  - сніг (snow) — йде сніг (it snows), багато снігу; High (Top 1000)
  - сонце (sun) — світить сонце, на сонці; High (Top 500)
  - тепло (warm) — на вулиці тепло; adverbial use (no dummy subject 'it')
  - 'холодно (cold) — дуже холодно; learner error: *це холодно* (literal translation)'
  - 'весна (spring) — навесні (in spring); watch stress: navesní'
  - зима (winter) — взимку (in winter); State Standard §3.4
  recommended:
  - літо (summer) — влітку (in summer)
  - 'осінь (autumn) — восени (in autumn); watch stress: vóseny'
  - ліс (forest) — State Standard §3.11; у лісі гарно
  - гори (mountains) — в горах сніг; Карпатський рейнджер context
  - море (sea) — State Standard §3.11; на морі спекотно
  - хмара (cloud) — хмарно (cloudy), сьогодні хмарно
  - вітер (wind) — сильний вітер; бо вітер
  - спекотно (hot) — дуже спекотно; влітку
  - прохолодно (cool) — прохолодна погода; visual scale between warm and cold
