sequence: 41
module: a1-41
level: A1
slug: phone-basics
version: '2.0'
title: Phone Basics
subtitle: Making Calls and Texting
content_outline:
- section: Warm-up
  points:
  - 'Як українці відповідають на телефон (Алло! / Слухаю!) — cultural hook: «Слухаю!»
    signals professional readiness/politeness distinct from neutral «Алло!»; State
    Standard §2 «установити контакт»'
  - 'Формальні vs неформальні дзвінки — learner error: using «ти» with strangers (couriers/receptionists),
    must default to «Ви» until established otherwise'
- section: Presentation
  points:
  - 'Початок розмови (Алло! / Добрий день, це...) — learner error: saying «Я є Олена»
    instead of natural «Це Олена» or «Олена слухає»'
  - 'Запитання про людину (Чи можу я поговорити з...?) — pronunciation note: «дз»
    in «дзвонити» is a single affricate sound, not two separate letters'
  - 'Уточнення (Повторіть, будь ласка / Хвилинку) — collocation: «Зачекайте, будь
    ласка»; State Standard phrase «Скажіть, будь ласка»'
  - 'Завершення (Дякую за дзвінок / До зв''язку!) — cultural hook: «До зв''язку!»
    is the modern standard for closing calls/messages, bridging formal/informal'
  - Помилкові номери (Вибачте, я помилився номером) — teach «я помилився номером»
    as a fixed formula/chunk even if grammar is advanced
  - 'Повідомлення та смс — collocations: «написати повідомлення», «залишити повідомлення»'
- section: Practice
  points:
  - 'Діалог 1: Дзвінок другу — reinforce collocations: «дзвонити другу», «дзвонити
    мамі», «передзвоню за хвилину»'
  - 'Діалог 2: Дзвінок на рецепцію готелю — reinforce use of «Слухаю вас» and formal
    «Ви» address'
  - 'Діалог 3: Помилковий номер — practice fixed phrase «Вибачте, я помилився номером»
    with polite closing'
- section: Warm-up 2
  points:
  - Наратив про телефонну розмову з кур'єром — key real-world scenario for foreigners
    in Ukraine; focus on simple contact instructions
  - Практичні фрази для доставки їжі — e.g., «Я буду через 5 хвилин», «Ваше замовлення
    прибуло»
vocabulary_hints:
  required:
  - телефон (phone) — номер телефону, мій телефон
  - 'дзвонити (to call) — дзвонити другу/мамі; pronunciation note: single «дз» sound'
  - відповідати (to answer) — відповідати на дзвінок
  - номер (number) — номер телефону, помилитися номером
  - повідомлення (message) — написати повідомлення, залишити повідомлення
  - зайнятий (busy) — лінія зайнята, я зайнятий
  - передзвонити (to call back) — Я передзвоню за хвилину, передзвоніть пізніше
  - алло (hello - phone) — Алло! Хто це?
  recommended:
  - слухаю (I'm listening) — Так, слухаю вас (polite/professional answer)
  - хвилинка (a moment) — Зачекайте хвилинку, одну хвилинку
  - помилитися (to make a mistake) — помилитися номером (fixed phrase)
  - передати (to pass on) — передати повідомлення, що передати?
  - телефонувати (to phone) — телефонувати в офіс (more formal than дзвонити)
  - зачекайте (wait - imperative) — Зачекайте, будь ласка (polite request)
