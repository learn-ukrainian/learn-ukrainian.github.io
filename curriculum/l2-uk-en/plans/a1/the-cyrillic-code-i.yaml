module: a1-001
level: A1
sequence: 1
slug: the-cyrillic-code-i
version: '4.0'
title: The Cyrillic Code I
subtitle: А О У М Л Н С — Your First 7 Letters
focus: grammar
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 1200
objectives:
- Learner can recognize and pronounce 7 Ukrainian letters (А, О, У, М, Л, Н, С)
- Learner can classify letters as голосні (vowels) or приголосні (consonants)
- Learner can combine letters into open and closed syllables
- Learner can read simple words using the 7 known letters
content_outline:
- section: Вступ — Introduction
  words: 200
  points:
  - A1 immersion 10-50%. English scaffolding explains the system, Ukrainian carries the content.
  - 'The Ukrainian alphabet has 33 letters. It is highly phonetic — each letter maps to one sound. This module covers the first
    7 letters (3 vowels + 4 consonants), chosen to match Ukrainian primer textbooks (Bolshakova 2018, Zaharijchuk NUS 2025).'
  - 'Cultural hook: the Cyrillic script descends from the alphabet created by students of Saints Cyril and Methodius in the First
    Bulgarian Empire.'
  - Introduce Anna Ohoiko (Ukrainian Lessons) as the pronunciation guide. Embed overview video link.
- section: Голосні — Vowels А, О, У
  words: 250
  points:
  - 'Explain: Ukrainian has 10 vowels (голосні). This module introduces 3. Vowels are ''voice only'' — no obstruction.'
  - 'А — sounds like ''a'' in ''father'' (never reduced). Key word for Anna''s video: ананас. Additional video examples: Африка,
    Аргентіна, аеропорт.'
  - 'О — sounds like ''o'' in ''more''. Key word: око. Video. Critical contrast with Russian: Ukrainian О never reduces to /a/
    in unstressed position. О stays О everywhere.'
  - 'У — sounds like ''oo'' in ''moon''. Key word: Україна. Video.'
  - 'Golden Rule: Ukrainian vowels stay pure and stable in any position, stressed or unstressed.'
- section: Приголосні — Consonants М, Л, Н, С
  words: 250
  points:
  - 'Explain: Ukrainian has 22 consonants (приголосні). This module introduces 4.'
  - 'М — like English M. Key word: мама. Video link.'
  - 'Л — looks like a tent (Λ shape). Key word: лама. Video link.'
  - 'Н — FALSE FRIEND: looks like English H but sounds like N. Key word: нам. Video link.'
  - 'С — FALSE FRIEND: looks like English C but always /s/, never /k/. Key word: сом. Video link.'
- section: Склади і слова — Syllables and Words
  words: 300
  points:
  - 'Open syllables (end in vowel): МА МО МУ НА НО НУ ЛА ЛО ЛУ СА СО СУ.'
  - 'Closed syllables (end in consonant): АМ ОМ УМ АН ОН УН АС ОС УС АЛ ОЛ УЛ.'
  - 'Blending into words: ма+ма = мама (two open syllables), со+сна = сосна (two syllables), а+на+нас = ананас (three syllables).
    Single closed syllables read as a whole: сом, сон, нам, нас, сам.'
  - 'Word reading drill (all decodable from 7 letters): мама, сом, сон, оса, масло, сосна, ананас, насос, лама, смола, нам,
    нас, сам, мало, слон.'
  - 'Textbook phrases (from Bolshakova p.22): «У нас — ананас.» «У нас — сом.» «А у вас?»'
- section: Підсумок — Summary
  words: 100
  points:
  - 'Progress: 7 of 33 letters learned (3 голосні + 4 приголосні).'
  - 'Self-check: Can you read мама? сом? масло? What sound does Н make? What sound does С make?'
  - 'Next module: The Cyrillic Code II adds 7 more letters (К, И, І, Р, В, Т, Е).'
vocabulary_hints:
  required:
  - мама (mom) — first word readable from known letters; universal; Bolshakova p.12
  - сом (catfish) — noun, decodable; Bolshakova p.22
  - сон (dream/sleep) — noun, decodable; Bolshakova p.22
  - масло (butter/oil) — noun, decodable; Bolshakova p.15
  - ананас (pineapple) — noun, decodable; Bolshakova p.22; Anna's key word for А
  - нам (to us) — pronoun, decodable; both bukvars
  - нас (us) — pronoun, decodable; both bukvars
  - сам (self/alone) — adjective, decodable; both bukvars
  recommended:
  - оса (wasp) — noun, decodable; Bolshakova p.22
  - сосна (pine tree) — noun, decodable; Bolshakova p.22
  - насос (pump) — noun, decodable; Bolshakova p.22
  - лама (llama) — noun, decodable; Bolshakova p.21
  - смола (resin) — noun, decodable; Bolshakova p.22
  - слон (elephant) — noun, decodable; Bolshakova p.30 (preview)
  - мало (little/few) — adverb, decodable; Bolshakova p.14
activity_hints:
- type: watch-and-repeat
  focus: Watch Anna's video for each of the 7 letters
  items: 7
- type: classify
  focus: Sort А О У М Л Н С into голосні vs приголосні
  items: 7
- type: image-to-letter
  focus: See picture — which letter does the word start with?
  items: 7
- type: match-up
  focus: Match letter to key word (А↔ананас, М↔мама, etc.)
  items: 7
- type: group-sort
  focus: Sort syllables into open (МА, НО) vs closed (АМ, ОН)
  items: 12
connects_to:
- a1-02 (The Cyrillic Code II)
