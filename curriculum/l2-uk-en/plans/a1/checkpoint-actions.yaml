module: a1-021
level: A1
sequence: 21
slug: checkpoint-actions
version: '1.2.2'
title: 'Перевірка: Дії'
subtitle: Чи можете ви сказати, що ви робите, хочете, та ставити запитання?
focus: review
pedagogy: PPP
phase: А1.3 [Дії]
word_target: 1200
objectives:
- Продемонструвати вміння відмінювати дієслова I та II дієвідміни
- Використовувати модальні дієслова (хотіти, могти, мусити) з інфінітивами
- Ставити запитання, використовуючи всі 7 питальних слів
- Описувати рутину за допомогою зворотних дієслів та слів послідовності
- Поєднувати навички A1.1-A1.3 у зв'язному мовленні
dialogue_situations:
- setting: Зустріч з новим сусідом по квартирі та обмін розпорядком дня — хто коли готує, хто вчиться вранці, хто що любить або може робити з домашніх обов'язків
  speakers:
  - Новий сусід по квартирі
  - Давній мешканець
  motivation: 'Закріплення: дієслова, модальні дієслова, запитання, зворотні дієслова — у невимушеному середовищі, відповідному для А1 (не співбесіда, що є рівнем B1+).'
content_outline:
- section: Що ми знаємо?
  words: 200
  points:
  - 'Самоперевірка за матеріалами модулів №15–20: Чи вмієте ви говорити, що вам подобається? (модуль №15) Чи можете ви відмінювати дієслова I дієвідміни? (модуль №16) Чи можете ви відмінювати дієслова II дієвідміни? (модуль №17) Чи вмієте ви говорити, що ви хочете, можете і мусите? (модуль №18) Чи вмієте ви ставити запитання? (модуль №19) Чи вмієте ви описувати свій ранок? (модуль №20)'
- section: Читання
  words: 250
  points:
  - 'Короткий український текст (8-10 речень) з використанням ЛИШЕ лексики з модулів №15–20. Без нових слів. Учень читає вголос. Зміст: людина описує свій день — ранкова рутина, робота, хобі. Приклад: Я прокидаюся о сьомій. Потім вмиваюся і снідаю. Я працюю в офісі. Я люблю читати. Увечері я дивлюся фільм.'
- section: Граматика
  words: 200
  points:
  - 'Ключові шаблони з A1.3: 1. Інфінітив: -ти (читати, говорити, хотіти) 2. I дієвідміна: -ю, -єш, -є, -ємо, -єте, -ють 3. II дієвідміна: -ю/-у, -иш, -ить, -имо, -ите, -ять 4. Модальні дієслова: хочу/можу/мушу + інфінітив 5. Запитання: хто, що, де, куди, коли, чому, як 6. Заперечення: не + дієслово; подвійне заперечення (ніхто не) 7. Зворотні дієслова: дієслово + ся (прокидаюся, вмиваюся)'
- section: Діалог
  words: 300
  points:
  - 'Повноцінна розмова, що поєднує всі навички A1.3: Ситуація знайомства + плани. — Привіт! Що ти робиш? — Я читаю книгу. А ти? — Я хочу гуляти. Ти можеш? — Не можу, мушу працювати. — Шкода! Коли ти працюєш? — До шостої. — Добре, тоді гуляємо ввечері! Використання: обидві групи дієслів, модальні дієслова, запитання, заперечення.'
- section: Підсумок
  words: 250
  points:
  - 'Підсумок досягнень A1.3: Тепер ви можете говорити про дії українською. Ви вмієте відмінювати дієслова обох дієвідмін. Ви вмієте виражати бажання, можливості та обов''язки. Ви вмієте ставити запитання та будувати заперечні речення. Ви можете описати свою щоденну рутину. Далі: A1.4 — Час і природа (час, дні, погода).'
vocabulary_hints:
  required:
  - любити (to love/like)
  - хотіти (to want)
  - могти (to be able to)
  - мусити (to have to, must)
  - читати (to read)
  - говорити (to speak)
  - працювати (to work)
  - дивитися (to watch)
  - прокидатися (to wake up)
  - вмиватися (to wash one's face)
  recommended:
  - снідати (to have breakfast)
  - готувати (to cook)
  - прибирати (to clean)
  - допомагати (to help)
  - танцювати (to dance)
  - співати (to sing)
  - грати (to play)
  - гуляти (to walk)
  - писати (to write)
