module: a1-025
level: A1
sequence: 25
slug: my-day
version: 1.2.3
title: Мій день
subtitle: Спочатку, потім, нарешті — як розповісти про свій день
focus: communication
pedagogy: PPP
phase: A1.4 [Час та природа]
word_target: 1200
objectives:
- Навчитися описувати весь день від ранку до вечора, використовуючи дієслова та слова на позначення часу
- Вміти вживати слова послідовності для поєднання подій (спочатку, потім, після того, нарешті)
- Навчитися поєднувати час (модуль №22), дні тижня (модуль №23), погоду (модуль №24) та дієслова дій (A1.3)
- Вміти розповісти просту і зв'язну історію про свій типовий або конкретний день
dialogue_situations:
- setting: Пишемо допис у блог / запис у щоденник про свій день — читаємо його другові
  speakers:
  - Автор (narrator)
  - Друг (listener, reacting)
  motivation: 'Слова послідовності: спочатку, потім, нарешті під час розповіді'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Що ти робив сьогодні? — Як пройшов твій день? — Добре! Вранці я працював. — А потім? — Потім обідав о першій. Після обіду гуляв. — А ввечері? — Ввечері дивився фільм і читав книгу. Минулий час з''являється природно — подаємо як лексичні конструкції, а не граматику (граматика минулого часу = модулі №48–49).'
  - 'Діалог 2 — Плануємо завтрашній день: — Що ти будеш робити завтра? — Вранці буду працювати. — А після обіду? — Буду вивчати українську. А ввечері — гуляти. Майбутній час «буду + інфінітив» подається як цілісна фраза.'
- section: Мій типовий день
  words: 300
  points:
  - 'Текст-зразок із використанням усіх навичок A1.3-A1.4: Я прокидаюся о сьомій. Спочатку вмиваюся і одягаюся. Потім снідаю. О дев''ятій я працюю. О першій обідаю. Після обіду працюю до п''ятої. Ввечері готую вечерю, читаю і дивлюся фільм. О одинадцятій лягаю спати.'
  - 'Частини доби: вранці, вдень, після обіду, ввечері, вночі. Це прислівники — їх просто додають на початку речення.'
- section: Від ранку до вечора
  words: 300
  points:
  - 'Розширені слова послідовності (на базі модуля №20): спочатку, потім, після того/після цього, нарешті, також, а потім. Вони поєднують речення у зв''язну розповідь.'
  - 'Дієслова повсякденних справ (повторення + нові): снідати (повторення з модуля №20), обідати, вечеряти, відпочивати, лягати спати (сталий вираз). Всі належать до І дієвідміни (-ати), легко відмінюються за зразками з модуля №16.'
- section: Підсумок
  words: 300
  points:
  - 'Розповідь про свій день: Час + послідовність + дія = зв''язна розповідь. О сьомій прокидаюся. Спочатку снідаю. Потім працюю. Після обіду відпочиваю. Ввечері читаю. Нарешті лягаю спати. Самоперевірка: Опишіть свій типовий понеділок від ранку до вечора. Використайте щонайменше 3 вирази часу та 3 слова послідовності.'
vocabulary_hints:
  required:
  - вранці (in the morning)
  - вдень (during the day)
  - ввечері (in the evening)
  - обідати (to have lunch)
  - вечеряти (to have dinner)
  - відпочивати (to rest)
  - після (after)
  recommended:
  - прокидатися (to wake up — review from модуль №20)
  - вмиватися (to wash — review from модуль №20)
  - одягатися (to get dressed — review from модуль №20)
  - вночі (at night)
  - після обіду (in the afternoon)
  - також (also)
  - лягати спати (to go to bed — chunk)
  - типовий (typical)
  - вільний (free)
activity_hints:
- type: match-up
  focus: З'єднайте дію з логічним часом доби
  pairs:
  - прокидаюся ↔ вранці
  - снідаю ↔ вранці
  - працюю ↔ вдень
  - обідаю ↔ вдень
  - вечеряю ↔ ввечері
  - дивлюся фільм ↔ ввечері
  - лягаю спати ↔ вночі
  - сплю ↔ вночі
- type: fill-in
  focus: Завершіть логічну послідовність дня
  items:
  - '{Спочатку|Потім|Нарешті} я прокидаюся і вмиваюся.'
  - Після того я {снідаю|вечеряю|лягаю спати}.
  - Вдень я {працюю|прокидаюся|снідаю} в офісі.
  - О першій годині я {обідаю|вечеряю|прокидаюся}.
  - '{Потім|Спочатку|Вранці} я читаю книгу або дивлюся фільм.'
  - '{Нарешті|Спочатку|Вдень} я лягаю спати о дванадцятій.'
- type: fill-in
  focus: Оберіть правильну частину доби
  items:
  - Я п'ю каву {вранці|вночі|ввечері}.
  - Ми вечеряємо {ввечері|вранці|вдень}.
  - Вона працює з дев'ятої до п'ятої {вдень|вночі|вранці}.
  - Вони гуляють у парку {після обіду|вночі|вранці}.
connects_to:
- a1-026 (Вільний час)
prerequisites:
- a1-024 (Погода)
grammar:
- 'Слова послідовності: спочатку, потім, після того, нарешті'
- 'Частини доби як прислівники: вранці, вдень, ввечері, вночі'
- 'Лише як сталі вирази (без глибокого аналізу): працював/працювала, буду + інфінітив (граматика вивчається в A1.8)'
register: розмовний
references:
- title: Вашуленко Grade 2, p.83
  notes: 'Вправа на планування дня — поєднання дій та часу доби.'
