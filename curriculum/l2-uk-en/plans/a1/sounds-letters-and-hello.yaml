module: a1-001
level: A1
sequence: 1
slug: sounds-letters-and-hello
version: 1.5.2
title: Звуки, літери та привіт
subtitle: 33 літери, 38 звуків, Привіт!
focus: phonetics
pedagogy: PPP
phase: A1.1 [Звуки, літери та перший контакт]
word_target: 1200
objectives:
- Розуміти різницю між звуками та літерами — базову відмінність в українській фонетиці
- Розрізняти дві групи звуків — голосні та приголосні — та способи їх творення
- Знати, чому в українській мові 33 літери, але 38 звуків, і які літери позначають кілька звуків
- Ознайомитися з українською абеткою через відео Анни Огойко — почути кожен звук, побачити кожну літеру
- Навчитися вітатися та відповідати на привітання
dialogue_situations:
- setting: Перший урок української мови — вчитель вітає учнів, учні відповідають і практикують базовий обмін фразами Привіт/Добрий день
  speakers:
  - Вчитель
  - Учні
  motivation: 'Практика вітальних фраз: Привіт! Добрий день! Як справи? Добре.'
- setting: 'Двоє нових однокласників зустрічаються в коридорі перед першим уроком української мови та знайомляться. ОБОВ''ЯЗКОВО використовувати імена для реплік (Марко: ..., Софія: ...), обмінятися іменами та використати взаємне «А у тебе?».'
  speakers:
  - Марко
  - Софія
  motivation: Привіт! Як тебе звати? Мене звати... А у тебе? — перше соціальне використання вивчених звуків
content_outline:
- section: Звуки і літери
  words: 300
  points:
  - 'Золоте правило з підручника Заболотного, 5 клас, стор. 83: «Звуки ми чуємо й вимовляємо, а букви бачимо й пишемо». Ми чуємо і вимовляємо звуки. Ми бачимо і пишемо літери (букви). Це НЕ одне й те саме. Літера — це символ на папері. Звук — це те, що вимовляє рот. Це розрізнення є основою української фонетики — українські вчителі відпрацьовують його з 1 класу.'
  - 'В українській мові 33 літери, але 38 звуків. Чому так? Деякі літери позначають два звуки (Я, Ю, Є, Ї в певних позиціях). Одна літера (Ь) взагалі не позначає звуку — вона лише пом''якшує попередній приголосний. Літвінова, 5 клас, стор. 130 запитує: Чи можна говорити «голосна літера»? Відповідь: ні! Звуки бувають голосні або приголосні, а не літери. Літери лише позначають звуки.'
  - 'Український алфавіт (абетка): усі 33 літери по порядку. Кожна літера має свою назву. На відміну від англійської, український правопис переважно фонетичний — те, що ви бачите, те (здебільшого) і чуєте. Жодних "німих" літер, жодних несподіваних вимов. Щойно ви вивчите звуки, ви зможете прочитати будь-яке слово.'
- section: Голосні звуки
  words: 250
  points:
  - 'Большакова, 1 клас, стор. 24 навчає голосним через вірш: «Голосні почуєш в пісні, і у темному у лісі, і коли дивуєшся, і коли милуєшся. Легко вимовляються, весело співаються!» Голосні звуки утворюються лише за допомогою голосу — повітря вільно проходить через рот без жодних перешкод. Ви можете їх проспівати. Їх можна прокричати через поле.'
  - '6 голосних звуків: [а], [о], [у], [е], [и], [і]. Але 10 голосних літер: А, О, У, Е, И, І, Я, Ю, Є, Ї. Інші чотири (Я, Ю, Є, Ї) є йотованими — вони можуть позначати два звуки. Усі деталі — в M02. Наразі: кожне українське слово має хоча б один голосний звук. Голосні — це серце кожного складу.'
  - 'Позначення Захарійчук, 1 клас, стор. 13: голосні звуки позначаються [•] у звукових моделях. Практика сприйняття голосних: мА-мА (два [а]), мО-лО-кО (три [о]), У-ля (одне [у]). Відео Анни Огойко для кожної голосної літери — дивіться, слухайте, повторюйте.'
- section: Приголосні звуки
  words: 250
  points:
  - 'Большакова, 1 клас, стор. 24: «Приголосні деренчать і тихенько шелестять, голосно свистять і шиплять». Приголосні звуки утворюються за допомогою голосу і шуму або лише шуму. Ваші губи, зуби або язик створюють перешкоду. Неможливо проспівати чистий приголосний — спробуйте проспівати [к] або [п].'
  - '32 приголосних звуки з 22 приголосних літер. Деякі приголосні утворюють пари: тверді і м''які. Захарійчук, 1 клас, стор. 15: тверді звуки позначаються [–], м''які позначаються [=]. Цього поділу на тверді та м''які немає в англійській мові — це суто слов''янська особливість.'
  - 'Приголосні літери для вивчення через відео Анни Огойко: М, Н, С, К, Л, Р, Б, В, Д, П, Т, Г, Ґ, З, Ж, Ш, Х, Й, Ч, Щ, Ц, Ф. Кожне відео показує літеру, демонструє звук і наводить приклади слів. Особливість: літера Ґ позначає твердий звук [g], тоді як Г — це фарингальний [ɦ]. Щ завжди дорівнює двом звукам [шч]. Ь (м''який знак) не має звуку — він пом''якшує попередній приголосний.'
- section: Привіт!
  words: 250
  points:
  - 'Ваша перша розмова українською. На основі епізоду 1 ULP Анни Огойко. Привіт! (неформально, для друзів, родини, однолітків). Як справи? Відповіді: Добре. Чудово. Нормально. А у тебе?'
  - 'Рада тебе бачити! (каже жінка) / Радий тебе бачити! (каже чоловік) — Радий/рада зустрічі! В українській мові є родові форми — жінки кажуть «рада», чоловіки — «радий». Це ваше перше знайомство з граматичним родом. Це стане великою темою, починаючи з M08.'
  - 'Прочитаймо «Привіт» по літерах — ваш перший звуковий аналіз: П [п] приголосний + р [р] приголосний + и [и] голосний + в [в] приголосний + і [і] голосний + т [т] приголосний. Два голосні, чотири приголосні. Кожен тип звука, який ви вивчили в цьому модулі, з''являється в цьому єдиному слові.'
- section: Підсумок
  words: 150
  points:
  - 'Запитання для самоперевірки: Скільки літер в українській абетці? (33) Скільки звуків? (38) Чому вони відрізняються? Що таке голосні? Що таке приголосні? Чи можна сказати «голосна літера»? (Ні — голосні бувають звуки, а не літери!) Що означає «Привіт»? Як ви відповісте на «Як справи?»'
vocabulary_hints:
  required:
  - звук (sound)
  - літера (letter)
  - голосний (vowel sound)
  - приголосний (consonant sound)
  - привіт (hi, informal)
  - як справи (how are you)
  - добре (fine, good)
  - чудово (great, wonderful)
  - мама (mother)
  - молоко (milk)
  recommended:
  - нормально (okay)
  - тато (father)
  - око (eye)
  - дім (house)
  - ніс (nose)
  - сон (dream)
activity_hints:
- type: quiz
  focus: 'Розрізняй звуки та літери. Приклади питань: Що ми чуємо і вимовляємо? → звуки | Що ми бачимо і пишемо? → літери | Скільки літер в абетці? → 33 | Скільки звуків в українській мові? → 38 | Чи можна говорити «голосна літера»? → Ні, голосний — це звук, не літера.'
  items: 6
- type: match-up
  focus: 'З''єднай українські літери зі звуками, які вони позначають — за схемою Захарійчук «Бачу... Чую...». Пари: А ↔ [а], О ↔ [о], У ↔ [у], М ↔ [м], К ↔ [к], Н ↔ [н]. Саме так вчаться українські першокласники: бачать літеру (бачу), чують звук (чую).'
  items: 6
- type: fill-in
  focus: 'Доповни базовий діалог-привітання. — {Привіт}! Як {справи}? / — {Добре}. А у {тебе}? / — {Чудово}. Варіанти: Привіт / справи / Добре / тебе / Чудово / Нормально.'
  items: 4
- type: group-sort
  focus: 'Розподіли українські звуки на Голосні та Приголосні. Голосні: [а], [о], [у], [е], [и], [і]. Приголосні: [к], [м], [т], [в], [н], [р], [с], [х].'
  items: 8
- type: letter-grid
  focus: 'Інтерактивна таблиця абетки, що показує всі 33 українські літери. Кожна картка: велика/мала літера, ключове слово з емодзі, кольорове розрізнення голосних/приголосних. Голосні літери виділені іншим кольором, ніж приголосні. Ь позначено як особливий (без звуку).'
  items: 33
- type: watch-and-repeat
  focus: 'Практика вимови з відео Анни Огойко. Голосні: А (hvB3VpcR3ZE), У (VB1O6PmtYRU), Е (KFlsroBW0dk), И (W-1rCu0indE), І (Z9TH0H4ShGo). Приголосні: М (Ez95H4ibuJo), Н (vNUfiKHPYaU), С (7UsFBgSL91E), К (J7sGEI4-xJo), Л (v6-3Xg52Buk), Р (fMGsQ5KPQgg). Кожен пункт: відео YouTube + літера + ключове слово + позначення звука.'
  items: 11
connects_to:
- a1-002 (Читаємо українською)
prerequisites: []
grammar:
- Звуки проти літер — 33 літери, 38 звуків. 'Звуки ми чуємо й вимовляємо, а букви бачимо й пишемо.'
- Голосні (6 звуків, 10 літер) — лише голос, немає перешкод, можна співати
- Приголосні (32 звуки, 22 літери) — голос + шум або лише шум, є перешкода
- 'Чому 38 > 33: йотовані голосні (Я, Ю, Є, Ї), тверді/м''які пари, Ь (без звуку)'
- Звуковий аналіз — визначення голосних і приголосних у слові
- Привітання "Привіт" як перші кроки в розмовній українській
register: розмовний
references:
- title: Большакова, буквар 1 клас, стор. 24
  notes: Голосні/приголосні вивчаються через вірші. «Голосні почуєш в пісні.» «Приголосні деренчать.»
- title: Захарійчук, буквар 1 клас (НУШ 2025), стор. 13
  notes: 'Позначення звуків: [•] для голосних, [–] для приголосних, [=] для м''яких приголосних.'
- title: Заболотний 5 клас, стор. 83
  notes: '«Звуки ми чуємо й вимовляємо, а букви бачимо й пишемо.» 33 букви, 38 звуків.'
- title: Літвінова 5 клас, стор. 130
  notes: '«Чи можна говорити «голосна літера»? Чому?» — педагогічне запитання про звуки та літери.'
