grammar:
- Мене звати construction (impersonal)
- Це + noun identification
- Zero copula (Я — студент, no verb 'is')
- Nationality and profession vocabulary (nominative)
- Звідки? + country as memorized chunk (NOT genitive grammar)
register: розмовний
