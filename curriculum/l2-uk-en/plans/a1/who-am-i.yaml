title: Хто я?
subtitle: Мене звати... — ваша перша справжня розмова
focus: vocabulary
pedagogy: PPP
phase: A1.1 [Звуки, літери та перший контакт]
word_target: 1200
objectives:
- Вміти представити себе, назвавши своє ім'я, національність і професію
- Використовувати конструкцію з часткою «це» для ідентифікації предметів і людей
- Вміти ставити запитання «Як тебе/вас звати?» та відповідати на нього формально і неформально
- Розуміти структуру українського речення без дієслова-зв'язки «бути» (Я — студент)
- Переадресовувати питання співрозмовникові еховим патерном `А тебе?` / `А вас?` (БЕЗ форми `А у тебе?`, яка викликає граматику родового відмінка з прийменником)
- Вибирати нормативну форму на противагу типовому русизму/суржику теми «знайомство» (тато, а не папа; дружина, а не жена; лікар/лікарка, а не врач; вибачте, а не ізвиніть; дякую/спасибі, а не спасібо; теж/також, а не тоже; фемінітив, а не чоловічий генерик для жінки)
dialogue_situations:
- setting: Кімната відпочинку в хостелі — два туристи з рюкзаками вперше зустрічаються
  speakers:
  - Марко
  - Олена
  motivation: Мене звати, Звідки ти? — контекст реального першого знайомства
- setting: Орієнтаційний день в університеті — студенти представляються групі
  speakers:
  - Тарас
  - Софія
  motivation: Формальний та неформальний регістри, назви професій із конструкцією Я — студент
content_outline:
- section: Діалоги
  words: 350
  points:
  - 'Діалог 1 — У хостелі (неформальний, за зразком Anna Ep3): — Привіт! Як тебе звати? — Мене звати Марко. А тебе? — Мене звати Олена. Звідки ти? — Я з Канади. А ти? — Я з України. — Дуже приємно!'
  - 'Діалог 2 — На конференції (формальний, за зразком Anna Ep3-4): — Добрий день! Як вас звати? — Мене звати Петро. Дуже приємно! — Мені також! Ви з України? — Так, я з Києва.'
  - 'Діалог 3 — Представлення когось іншого (обов''язково ДВА СПІВРОЗМОВНИКИ, не монолог). — Це Андрій. Він зі Львова. — Дуже приємно. А це хто? — А це Оксана. Вона з Одеси. Вона — лікарка. Завдання автора: чергувати репліки між двома мовцями; питання `А це хто?` переводить фокус на другу особу. УВАГА: для жінки обов''язково використовуйте фемінітив (`лікарка`, не `лікар`).'
- section: Мене звати...
  words: 250
  points:
  - 'За зразком Anna Ep3: Конструкція «Мене звати...» є безособовою. В українській мові для представлення себе дієслово-зв''язка «є» не потрібне. Питання: Як тебе звати? (неформально) / Як вас звати? (формально). Про інших: Як його звати? / Як її звати?.'
  - 'Приємно познайомитись: Дуже приємно! або Приємно познайомитись! Ця фраза звучить ПІСЛЯ обміну іменами.'
  - 'Еховий патерн «відлуння» (обов''язковий у Діалозі 1 і 2): після того, як А назвала ім''я, Б відповідає `А тебе?` (неформально) або `А вас?` (формально). НЕ використовувати форму `А у тебе?` — вона тягне за собою родовий відмінок з прийменником `у`, який на А1 ще не вивчається (див. wiki «Крок 1»; уникнення патерну #1392 Defect 2).'
- section: Це...
  words: 200
  points:
  - 'Займенник «це» використовується для вказівки на щось або когось. Дієслово-зв''язка «є» тут також не потрібне. Це кава. Це Київ. Це Андрій. Питання: Що це? Хто це? Питальні слова завжди стоять НА ПОЧАТКУ речення: Хто це? (не *Це хто?).'
- section: Особові займенники
  words: 100
  points:
  - 'Базові особові займенники: я, ти (неформально), він, вона, ми, ви (формально/множина), вони. Зверніть увагу: «ви» використовується як для ввічливого звертання до однієї особи, так і для звертання до кількох осіб (на письмі при ввічливому звертанні часто пишеться з великої літери — Ви). Ці займенники знадобляться для побудови будь-якого речення.'
- section: Я — студент
  words: 150
  points:
  - 'У теперішньому часі дієслово-зв''язка «є» пропускається. Підмет — Іменник: Я — студент. Він — лікар. Вона — вчителька. Тире (—) позначає місце, де в інших мовах стояло б дієслово «бути».'
  - 'Національності (називний відмінок, без дієслова): українець / українка, американець / американка, канадієць / канадка. Професії: студент/студентка, вчитель/вчителька, лікар/лікарка, програміст/програмістка, інженер/інженерка, авторка. УВАГА до автора: для жінки ПОДАВАТИ ФЕМІНІТИВ як основну форму (`Оксана — лікарка`, не `Оксана — лікар`). Російська мова фемінітивів системно не має; українська — має. Усі перелічені жіночі форми перевірено у VESUM. Див. wiki «Крок 6» + «Деколонізаційні застереження» пункт 5.'
- section: Звідки?
  words: 200
  points:
  - 'За зразком Anna Ep4: Звідки ти? / Звідки ви? Я з України. Я з Канади. Я зі Штатів. Я з Німеччини. Зверніть увагу: у конструкції «з/зі + країна» використовуються форми родового відмінка (України, Канади), але ми подаємо їх як ЗАВЧЕНІ ФРАЗИ, оскільки граматика родового відмінка вивчається на рівні А2. На цьому етапі НЕ вводьте питання «Де ви живете?» — використання місцевого відмінка та дієвідмінювання вивчатимуться пізніше (дієслова в М16, місцевий відмінок у М29).'
- section: Підсумок
  words: 0
  points:
  - 'Самоперевірка включена до практики діалогів, наведеної вище.'
vocabulary_hints:
  required:
  - я (I)
  - ти (you, informal)
  - він (he)
  - вона (she)
  - ви (you, formal/plural)
  - мене звати (my name is)
  - як тебе звати? (what's your name, informal)
  - як вас звати? (what's your name, formal)
  - це (this is / these are)
  - дуже приємно (pleased to meet you)
  - студент, студентка (student m/f)
  - вчитель, вчителька (teacher m/f)
  - лікар, лікарка (doctor m/f)
  - українець, українка (Ukrainian m/f)
  - Україна (Ukraine)
  recommended:
  - ми (we)
  - вони (they)
  - програміст, програмістка (programmer m/f)
  - інженер, інженерка (engineer m/f)
  - авторка (author — feminitive)
  - звідки (where from)
  - друг, подруга (friend m/f)
  - його (his — doesn't change)
  - її (her — doesn't change)
  - Канада (Canada)
  - Німеччина (Germany)
  - тато (dad — native form, NOT `папа`)
  - дружина (wife — native form, NOT `жена`)
  - дякую / спасибі (thank you — native forms, NOT `спасібо`)
  - вибачте / пробачте (excuse me — native forms, NOT `ізвиніть`)
  - теж / також (also — native forms, NOT `тоже`)
  - А тебе? / А вас? (echo-reciprocal — chunk, NOT `А у тебе?`)
activity_hints:
- type: fill-in
  focus: 'Доповніть розповідь про себе: Мене звати..., Я з..., Я —...'
  items: 6
- type: quiz
  focus: Формально чи неформально? Оберіть правильний варіант представлення.
  items: 6
- type: match-up
  focus: З'єднайте назви професій у чоловічому та жіночому роді
  items: 8
- type: fill-in
  focus: Доповніть діалог правильними фразами
  items: 6
- type: fill-in
  focus: 'Типові суржикові пари теми «знайомство» — оберіть нормативну українську форму (див. wiki "Типові помилки L2")'
  items:
  - 'Мого {папу|тата} звати Петро.'
  - 'Це моя {жена|дружина} Марія.'
  - '{Ізвиніть|Вибачте}, як вас звати?'
  - '{Спасібо|Дякую}, дуже приємно!'
  - 'Мені {тоже|теж} приємно.'
  - 'Оксана — {інженер|інженерка}.'
  - 'Це мій {врач|лікар}.'
