module: a1-024
level: A1
sequence: 24
slug: weather
version: '1.2.2'
title: Погода
subtitle: Сьогодні холодно — розмовляємо про погоду
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Час і природа]
word_target: 1200
objectives:
- Описувати погоду за допомогою безособових конструкцій (холодно, тепло, спекотно)
- Використовувати конструкцію іде дощ / іде сніг для опадів
- Поєднувати опис погоди з порами року та місяцями
- Запитувати та відповідати "Яка погода?"
dialogue_situations:
- setting: Двоє друзів вирішують, чи йти в похід, і разом перевіряють погоду
  speakers:
  - Іванко
  - Галя
  motivation: Безособові речення (Сьогодні холодно, Завтра буде тепло, Іде дощ)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Дивлячись у вікно: — Яка сьогодні погода? — Сьогодні холодно і йде дощ. — А завтра? — Завтра буде тепло і сонячно. — Добре! Тоді завтра гуляємо! Погода та плани на майбутнє.'
  - 'Діалог 2 — Розмова про пори року: — Яка пора року тобі подобається? — Мені подобається літо. — Чому? — Тому що влітку тепло і сонячно. А тобі? — Мені подобається осінь. Восени красиво. Погода, пори року та дієслова вподобань із модуля №15.'
- section: Яка погода?
  words: 300
  points:
  - 'Безособові вирази для опису погоди (без підмета): Сьогодні холодно. Сьогодні тепло. Сьогодні спекотно. Сьогодні прохолодно. Заболотний, 8 клас, с. 126: безособові речення передають явища природи. Це прислівники — підмет не потрібен, лише стан.'
  - 'Фрази для опадів: Іде дощ. Іде сніг. Дме вітер. Світить сонце. Хмарно / ясно. Зверніть увагу: іде дощ — це найприродніша розмовна форма.'
- section: Погода і пори року
  words: 300
  points:
  - 'Поєднання погоди з порами року (модуль №23): Взимку холодно. Іде сніг. Навесні тепло. Все зелене. Влітку спекотно. Світить сонце. Восени прохолодно. Іде дощ.'
  - 'Лексика для температури: градуси — Сьогодні двадцять градусів. плюс / мінус — Мінус десять. тепло / холодно як стан: На вулиці тепло. Слова часу: сьогодні, завтра, вчора.'
- section: Підсумок
  words: 300
  points:
  - 'Словник погоди: Запитання: Яка сьогодні погода? Температура: холодно, тепло, спекотно, прохолодно. Опади: іде дощ, іде сніг, дме вітер, світить сонце. Небо: хмарно, ясно, сонячно. Пори року: взимку холодно, влітку спекотно. Самоперевірка: Опишіть сьогоднішню погоду. Яка зима там, де ви живете?'
vocabulary_hints:
  required:
  - погода (weather, f)
  - холодно (cold — adverb)
  - тепло (warm — adverb)
  - дощ (rain, m)
  - сніг (snow, m)
  - сонце (sun, n)
  - сьогодні (today)
  - завтра (tomorrow)
  recommended:
  - спекотно (hot)
  - прохолодно (cool)
  - вітер (wind, m)
  - хмарно (cloudy)
  - ясно (clear)
  - сонячно (sunny)
  - градус (degree, m)
  - вчора (yesterday)
activity_hints:
- type: match-up
  focus: З'єднайте вираз про погоду з логічним контекстом або порою року
  pairs:
  - іде дощ ↔ холодно і мокро
  - іде сніг ↔ зима
  - світить сонце ↔ сонячно
  - дме вітер ↔ прохолодно
  - мінус десять ↔ холодно
  - плюс тридцять ↔ спекотно
  - плюс двадцять ↔ тепло
  - хмарно ↔ сонце не світить
- type: fill-in
  focus: Виберіть логічну погоду для кожної пори року
  items:
  - Взимку часто {іде сніг|іде дощ|світить сонце}.
  - Влітку дуже {спекотно|холодно|хмарно}.
  - Восени часто {іде дощ|іде сніг|сонячно}.
  - Навесні {тепло|холодно|спекотно} і красиво.
  - Сьогодні мінус п'ять, дуже {холодно|тепло|спекотно}.
  - Сьогодні плюс двадцять п'ять, {тепло|прохолодно|холодно}.
- type: fill-in
  focus: Доповніть діалог про погоду
  items:
  - — Яка сьогодні {погода|сонце|дощ}? — Сьогодні тепло.
  - — Завтра {буде|є|був} сонячно. — Добре, гуляємо!
  - — Яка пора року тобі {подобається|любить|робить}? — Літо.
  - — Чому ти любиш літо? — Тому що влітку {сонячно|холодно|хмарно}.
connects_to:
- a1-025 (Мій день)
prerequisites:
- a1-023 (Дні та місяці)
grammar:
- Безособові конструкції стану (холодно/тепло/спекотно)
- Конструкція іде дощ / іде сніг
- Прислівники часу (сьогодні, завтра, вчора)
register: розмовний
references:
