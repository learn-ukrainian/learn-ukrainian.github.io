module: a1-026
level: A1
sequence: 26
slug: my-daily-life
version: '1.0'
title: My Daily Life
subtitle: "From Morning to Evening"
focus: grammar
pedagogy: PPP
phase: A1.4 [Time & Nature]
word_target: 1200
objectives:
- Describe a sequence of events from morning to evening
- Use sequence adverbs correctly
- Integrate time expressions with daily routines
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Asking about the day.
    — Що ти робиш сьогодні?
    — Спочатку я працюю. Потім я гуляю в парку.
    — А ввечері?
    — Нарешті, я відпочиваю і дивлюся фільм."
  - "Dialogue 2 — A typical routine.
    — О котрій ти снідаєш?
    — О восьмій. Потім я п'ю каву. А ти?"
- section: "Частини дня (Parts of the Day)"
  words: 350
  points:
  - "Review morning, day, evening, night."
  - "Teach the adverbs for 'when': вранці (in the morning), вдень (during the day), ввечері (in the evening), вночі (at night)."
- section: "Послідовність (Sequence Adverbs)"
  words: 350
  points:
  - "Introduce adverbs to connect actions: спочатку (first/at first), потім (then/after that), нарешті (finally/at last)."
  - "Connect this to M20 (routines) and M22 (time). E.g., Вранці о восьмій я снідаю. Потім я працюю."
  - "Practice narrating a full day's sequence."
vocabulary_hints:
  required:
  - нарешті (finally, at last)
  - вранці (in the morning)
  - вдень (in the day)
  - ввечері (in the evening)
  - вночі (at night)
  recommended:
  - спочатку (first, at first - already taught in M20)
  - потім (then, after that - already taught in M20)
  - рано (early)
  - пізно (late)
  - снідати (to eat breakfast)
  - обідати (to eat lunch)
  - вечеряти (to eat dinner)
activity_hints:
- type: ordering
  focus: Order the sequence of a typical day using sequence adverbs
  items: 6
- type: fill-in
  focus: Choose between спочатку, потім, and нарешті based on context
  items: 10
- type: reading-comprehension
  focus: Read a short diary entry and answer questions about the timing of events
  items: 8
connects_to:
- a1-027 (Free Time and Hobbies)
prerequisites:
- a1-020 (My Morning Routine - for daily verbs)
- a1-022 (What Time Is It? - for time scheduling)
grammar:
- "Sequence adverbs (спочатку, потім, нарешті)"
- "Adverbs of time/parts of day (вранці, ввечері)"
register: розмовний
references:
- title: "ULP Ep15/16"
  url: ""
  notes: "Builds upon previous time and sequence concepts to create a cohesive narrative."