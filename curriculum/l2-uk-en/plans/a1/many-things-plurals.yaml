module: a1-011
level: A1
sequence: 11
slug: many-things-plurals
version: '1.0'
title: Many Things & Plurals
subtitle: "Organizing a Messy Desk — Plurals"
focus: grammar
pedagogy: PPP
phase: A1.2 [My World]
word_target: 1200
objectives:
- Form plural nouns in the Nominative case (-и, -і, -ї)
- Form plural adjectives to match plural nouns (-і)
- Describe multiple objects (Нові книги, великі столи)
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Organizing a messy desk.
    — Що це? Це твої книги?
    — Так, це мої нові книги. А там мої зошити і ручки.
    — А це чиї ключі?
    — Це мої ключі.
    Natural conversation sorting multiple objects."
  - "Dialogue 2 — Packing clothes.
    — У мене є теплі светри і нові футболки.
    — А де твої чорні шапки?
    — Вони тут.
    Applying plurals to clothing from M10."
- section: "Один чи багато? (One or many? - Noun Plurals)"
  words: 350
  points:
  - "Basic rules for plural nouns (Nominative):
    Hard consonants -> add -и (телефон -> телефони, комп'ютер -> комп'ютери).
    Note: стіл -> столи has a vowel change (і -> о) — mention as exception.
    -а -> -и (книга -> книги, лампа -> лампи).
    Soft consonants / -я / -ь -> -і or -ї (лікар -> лікарі, двері - already pl, лінія -> лінії).
    -о -> -а, -е -> -я (вікно -> вікна, місто -> міста - briefly mention, but focus is on -и/-і)."
  - "Exceptions/Irregulars (preview): брат -> брати, сестра -> сестри, друг -> друзі."
- section: "Прикметники у множині (Plural Adjectives & Possessives)"
  words: 350
  points:
  - "Plural adjectives are easy: they all end in -і!
    великий/велика/велике -> великі
    новий/нова/нове -> нові
    гарний/гарна/гарне -> гарні"
  - "Review plural possessives from M06/M07:
    мої, твої, наші, ваші."
  - "Putting it together: мої нові книги, великі столи, гарні футболки."
vocabulary_hints:
  required:
  - вони (they)
  - вони (they) — used with plural nouns
  - ключі (keys)
  - речі (things/stuff)
  - друзі (friends)
  recommended:
