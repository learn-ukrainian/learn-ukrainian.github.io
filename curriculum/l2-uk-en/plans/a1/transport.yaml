module: a1-032
level: A1
sequence: 32
slug: transport
version: '1.1'
title: Transport
subtitle: Автобус, метро, таксі — getting around
focus: communication
pedagogy: PPP
phase: A1.5 [Places]
word_target: 1200
objectives:
- Name common transport types (автобус, метро, таксі, потяг, трамвай)
- Buy a ticket and ask about routes
- Use їхати + transport expressions (їхати автобусом / на метро)
- Combine transport with direction (куди) and locative (де) from M29-31
content_outline:
- section: Діалоги (Dialogues)
  words: 300
  points:
  - 'Dialogue 1 — Getting to the train station: — Як дістатися до вокзалу? — Їдьте автобусом або на метро. — Який автобус?
    — Номер сім. Зупинка ось там. — Дякую! — На здоров''я! Transport vocabulary in practical context.'
  - 'Dialogue 2 — Buying a ticket: — Один квиток до Львова, будь ласка. — В один бік чи туди й назад? — Туди й назад. Скільки
    коштує? — П''ятсот гривень. — О котрій відправлення? — О дев''ятій ранку. Combines transport + numbers (M11) + time (M22).'
- section: Транспорт (Transport Types)
  words: 300
  points:
  - 'City transport: автобус (bus, m), тролейбус (trolleybus, m), трамвай (tram, m), метро (metro, n — indeclinable), маршрутка
    (minibus, f), таксі (taxi, n — indeclinable). Intercity: потяг (train, m), автобус (bus), літак (plane, m).'
  - 'How to say ''by transport'': їхати автобусом / тролейбусом / трамваєм (instrumental chunk — not grammar). їхати на метро
    / на таксі / на машині (на + locative chunk). Note: both patterns mean ''by'' — learn each transport with its pattern.'
- section: Корисні фрази (Useful Phrases)
  words: 300
  points:
  - 'At the station/stop: Зупинка (stop/station), Де зупинка автобуса? (Where''s the bus stop?) квиток (ticket), Один квиток,
    будь ласка. (One ticket, please.) Скільки коштує квиток? (How much is a ticket?) Коли наступний потяг? (When is the next
    train?)'
  - 'On the way: Яка це зупинка? (What stop is this?) Мені виходити тут? (Do I get off here?) Вибачте, як дістатися до...?
    (Excuse me, how do I get to...?) прямо (straight), направо (right), наліво (left).'
- section: Підсумок — Summary
  words: 300
  points:
  - 'Transport communication: Types: автобус, метро, таксі, потяг, трамвай. By: автобусом / на метро (two patterns). Buying:
    Один квиток до... Скільки коштує? Asking: Де зупинка? Як дістатися до...? Self-check: How do you get to work? Buy a train
    ticket to Lviv.'
vocabulary_hints:
  required:
  - автобус (bus, m)
  - метро (metro, n)
  - таксі (taxi, n)
  - потяг (train, m)
  - квиток (ticket, m)
  - зупинка (stop, f)
  recommended:
  - трамвай (tram, m)
  - маршрутка (minibus, f)
  - літак (plane, m)
  - направо (right)
  - наліво (left)
  - прямо (straight)
  - дістатися (to get to)
