module: a1-033
level: A1
sequence: 33
slug: transport
version: '1.0'
title: Transport
subtitle: "Getting around (Bus, metro, taxi)"
focus: vocabulary
pedagogy: PPP
phase: A1.5 [Places & Movement]
word_target: 1200
objectives:
- Learn vocabulary for public and private transport
- Express how you travel using 'їхати' (to go by vehicle)
- Buy tickets and ask for transport information
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - "Dialogue-first: At a bus stop or metro station. Asking if this bus goes to the center. 'Цей автобус їде в центр?' (Does this bus go to the center?)."
  - "Buying a ticket: 'Один квиток, будь ласка.' (One ticket, please)."
- section: "Транспорт (Transport Vocabulary)"
  words: 300
  points:
  - "Introduce vehicles: автобус (bus), тролейбус (trolleybus), трамвай (tram), метро (metro), таксі (taxi), поїзд/тягтяг (train), машина (car)."
  - "Notice that 'метро' and 'таксі' are indeclinable (they never change their endings)."
- section: "Їхати vs Іти (To go by vehicle vs by foot)"
  words: 250
  points:
  - "Introduce 'їхати' (to go by vehicle): я їду, ти їдеш, він/вона їде, ми їдемо, ви їдете, вони їдуть."
  - "Contrast clearly with 'іти' (by foot) learned in M32. Я йду в магазин (walking) vs Я їду в центр (taking transport)."
  - "Combine 'їхати' with Accusative direction: Я їду на вокзал (I am going to the train station)."
- section: "Квитки та зупинки (Tickets and Stops)"
  words: 250
  points:
  - "Practical phrases for commuting: зупинка (stop), вокзал (train station), аеропорт (airport), квиток (ticket)."
  - "Asking 'Яка це зупинка?' (What stop is this?) or saying 'Моя зупинка' (My stop)."
vocabulary_hints:
  required:
  - ї́хати (to go by vehicle) -> я ї́ду, ти ї́деш
  - автóбус (bus)
  - метрó (metro)
  - таксі́ (taxi)
  - машúна (car)
  - по́їзд (train)
  - зупúнка (stop)
  - квитóк (ticket)
  recommended:
  - вокзáл (train station)
  - аеропóрт (airport)
  - трамвáй (tram)
  - троле́йбус (trolleybus)
activity_hints:
- type: fill-in
  focus: Choose between 'іти' and 'їхати' depending on the distance/context
  items: 10
- type: match-up
  focus: Match transport vocabulary with pictures or definitions
  items: 8
connects_to:
- a1-034 (Where Are You From?)
prerequisites:
- a1-032 (Going Places)
grammar:
- Verbs of motion: їхати (by vehicle)
- Contrast: іти vs їхати
- Indeclinable nouns (метро, таксі)
register: розмовний
references:
- title: "Ukrainian Lessons Podcast - Transport"
  url: "https://www.ukrainianlessons.com/"
  notes: "Focus on practical navigation using vehicles."