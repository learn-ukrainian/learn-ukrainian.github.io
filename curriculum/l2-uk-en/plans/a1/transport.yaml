module: a1-032
level: A1
sequence: 32
slug: transport
version: '1.1.1'
title: Транспорт
subtitle: Автобус, метро, таксі — як пересуватися
focus: communication
pedagogy: PPP
phase: A1.5 [Місця]
word_target: 1200
objectives:
- Називати поширені види транспорту (автобус, метро, таксі, потяг, трамвай)
- Купувати квиток і розпитувати про маршрути
- Використовувати дієслово їхати з назвами транспорту (їхати автобусом / на метро)
- Поєднувати транспорт із напрямком (куди) та місцезнаходженням (де) з модулів M29-31
dialogue_situations:
- setting: Пояснення, як дістатися з аеропорту Бориспіль до готелю — автобус, потяг, таксі, метро. Їхати автобусом, потягом. Їхати на метро, на таксі.
  speakers:
  - Приїжджий
  - Друг
  motivation: Транспортна лексика (автобус, потяг, таксі, метро)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Як дістатися до вокзалу: — Як дістатися до вокзалу? — Їдьте автобусом або на метро. — Який автобус? — Номер сім. Зупинка ось там. — Дякую! — На здоров''я! Транспортна лексика в практичному контексті.'
  - 'Діалог 2 — Купівля квитка: — Один квиток до Львова, будь ласка. — В один бік чи туди й назад? — Туди й назад. Скільки коштує? — П''ятсот гривень. — О котрій відправлення? — О дев''ятій ранку. Поєднання транспорту, числівників (M11) та часу (M22).'
- section: Види транспорту
  words: 300
  points:
  - 'Міський транспорт: автобус, тролейбус, трамвай, метро (невідмінюване), маршрутка, таксі (невідмінюване). Міжміський транспорт: потяг, автобус, літак.'
  - 'Як сказати, чим їхати: їхати автобусом / тролейбусом / трамваєм (орудний відмінок). їхати на метро / на таксі / на машині (прийменник на + місцевий відмінок). Обидві моделі означають спосіб пересування — вивчайте кожну назву транспорту з її моделлю.'
- section: Корисні фрази
  words: 300
  points:
  - 'На станції/зупинці: Зупинка, Де зупинка автобуса? квиток, Один квиток, будь ласка. Скільки коштує квиток? Коли наступний потяг?'
  - 'У дорозі: Яка це зупинка? Мені виходити тут? Вибачте, як дістатися до...? прямо, направо, наліво.'
- section: Підсумок
  words: 300
  points:
  - 'Комунікація в транспорті: Види: автобус, метро, таксі, потяг, трамвай. Чим їхати: автобусом / на метро (дві моделі). Купівля: Один квиток до... Скільки коштує? Запитання: Де зупинка? Як дістатися до...? Самоперевірка: Розкажіть, як ви добираєтеся на роботу. Купіть квиток на потяг до Львова.'
vocabulary_hints:
  required:
  - автобус (bus, m)
  - метро (metro, n)
  - таксі (taxi, n)
  - потяг (train, m)
  - квиток (ticket, m)
  - зупинка (stop, f)
  recommended:
  - трамвай (tram, m)
  - маршрутка (minibus, f)
  - літак (plane, m)
  - направо (right)
  - наліво (left)
  - прямо (straight)
  - дістатися (to get to)
activity_hints:
- type: quiz
  focus: Який транспорт? З'єднайте ситуацію з видом транспорту.
  items: 8
- type: fill-in
  focus: 'Купівля квитка: Один ___ до ___, будь ласка.'
  items: 6
- type: quiz
  focus: Автобусом чи на метро? Виберіть правильну модель конструкції.
  items: 6
- type: fill-in
  focus: 'Запитайте дорогу: Як дістатися до ___?'
  items: 6
connects_to:
- a1-033 (Містом)
prerequisites:
