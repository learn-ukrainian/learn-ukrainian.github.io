module: a1-035
level: A1
sequence: 35
slug: checkpoint-places
version: '1.2.3'
title: 'Підсумок: Місця'
subtitle: Чи вмієте ви орієнтуватися в українському місті?
focus: review
pedagogy: PPP
phase: A1.5 [Місця]
word_target: 1200
objectives:
- Правильно застосовувати правила милозвучності (у/в, і/й, з/із/зі)
- Використовувати місцевий відмінок для місця (Де?) та знахідний для напрямку руху (Куди?)
- Орієнтуватися за допомогою лексики міста, транспорту та напрямків
- Відповідати на питання Звідки?, використовуючи сталі вирази з родовим відмінком
- Поєднувати всі навички рівня A1.5 у зв'язних міських ситуаціях
dialogue_situations:
- setting: 'Відеодзвінок другу під час прогулянки Одесою — показ місць: Дерибасівська вулиця (f), Потьомкінські сходи (pl), порт (m), пляж (m). Опис свого місцеперебування та напрямку руху.'
  speakers:
  - Мешканець (filming)
  - Онлайн-друг (watching)
  motivation: 'Закріплення з вулиця(f), сходи(pl), порт(m), пляж(m)'
content_outline:
- section: Що ми знаємо?
  words: 200
  points:
  - 'Самоперевірка за темами модулів №28–34: Чи вмієте ви застосовувати правила милозвучності? (модуль №28) Чи можете сказати, де знаходяться речі? (модуль №29) Чи можете назвати міські локації? (модуль №30) Чи можете сказати, куди ви йдете? (модуль №31) Чи вмієте користуватися транспортом? (модуль №32) Чи можете вказувати напрямок? (модуль №33) Чи можете сказати, звідки ви? (модуль №34)'
- section: Читання
  words: 250
  points:
  - 'Короткий український текст із використанням лексики з модулів №28–34. Зміст: турист орієнтується в Києві — питає дорогу, їде на метро, знаходить музей, розповідає, звідки він і куди йде. Використовуються правила милозвучності, місцевий і знахідний відмінки, сталі вирази з родовим відмінком, транспорт.'
- section: Граматика
  words: 200
  points:
  - 'Ключові конструкції з A1.5: 1. Милозвучність: у/в, і/й, з/із/зі (модуль №28) 2. Де? → в/на + місцевий відмінок: в школі, на роботі (модуль №29) 3. Куди? → в/на + знахідний відмінок: у школу, на роботу (модуль №31) 4. Звідки? → з + конструкція родового відмінка: з України, з роботи (модуль №34) 5. Транспорт: автобусом, на метро (модуль №32) 6. Напрямки: прямо, направо, наліво (модуль №33) 7. Міські локації з правильними прийменниками (модуль №30)'
- section: Діалог
  words: 300
  points:
  - 'Турист у Києві просить допомоги: — Вибачте, я з Канади. Де тут музей? — Музей у центрі. Ідіть на метро до станції Хрещатик. — А як дістатися від метро? — Вийдіть і йдіть направо. Музей на площі. — Дякую! А потім я хочу їхати у Львів. Де вокзал? — Вокзал далеко, їдьте на метро до станції Вокзальна. Використовує всі навички A1.5 в одній реалістичній ситуації.'
- section: Підсумок
  words: 250
  points:
  - 'Огляд досягнень A1.5: Тепер ви можете орієнтуватися в українських містах. Ви знаєте правила милозвучності для природного мовлення. Ви можете сказати, ДЕ щось знаходиться (місцевий відмінок). Ви можете сказати, КУДИ ви ЙДЕТЕ (знахідний відмінок). Ви можете сказати, ЗВІДКИ ви РОДОМ (конструкції родового відмінка). Ви вмієте користуватися транспортом і вказувати дорогу. Далі: A1.6 — Їжа та покупки (замовлення, покупки, знахідний відмінок для об''єктів).'
vocabulary_hints:
  required: []
  recommended: []
activity_hints:
- type: quiz
  focus: 'Оберіть правильне запитання: Де? Куди? Звідки?'
  items: 8
  questions:
  - '... ти живеш? — У Києві. (Де / Куди / Звідки)'
  - '... ти йдеш? — У магазин. (Куди / Де / Звідки)'
  - '... ви? — Ми з Канади. (Звідки / Де / Куди)'
  - '... музей? — У центрі. (Де / Куди / Звідки)'
  - '... їде автобус? — На вокзал. (Куди / Де / Звідки)'
  - '... ти їдеш? — З роботи. (Звідки / Куди / Де)'
  - '... аптека? — Направо. (Де / Куди / Звідки)'
  - '... вони? — Зі США. (Звідки / Де / Куди)'
- type: fill-in
  focus: Доповніть зв'язний діалог правильними формами
  items: 6
  blanks:
  - Вибачте, я {з Канади}. Де тут музей?
  - Музей {у центрі}. Ідіть на метро.
  - А як дістатися {від метро}?
  - Вийдіть і йдіть {направо}. Музей на площі.
  - Я хочу їхати {у Львів}. Де вокзал?
  - Вокзал далеко, їдьте {на метро}.
- type: group-sort
  focus: Розподіліть фрази за відмінком/функцією (місцевий, знахідний, сталі вирази з родовим)
  items: 9
  groups:
  - name: Локація (Де?)
    items:
    - у школі
    - на площі
    - в центрі
  - name: Напрямок (Куди?)
    items:
    - на роботу
    - у Львів
    - в Канаду
  - name: Походження (Звідки?)
    items:
    - з України
    - зі США
    - з роботи
- type: quiz
  focus: 'Перевірка правил милозвучності: у/в, і/й, з/із/зі'
  items: 8
  questions:
  - Брат ... сестра (і / й)
  - Вона живе ... Львові (у / в)
  - Я йду ... школи (зі / з)
  - Він ... Києві (у / в)
  - Мама ... тато (і / й)
  - Ми ... України (з / із)
  - Я ... кімнаті (в / у)
  - Вона ... США (зі / з)
