module: a1-035
level: A1
sequence: 35
slug: checkpoint-places
version: '1.0'
title: "Checkpoint: Places"
subtitle: "Can you navigate a Ukrainian city?"
focus: review
pedagogy: PPP
phase: A1.5 [Places]
word_target: 1200
objectives:
- Demonstrate correct use of euphony (у/в, і/й, з/із/зі)
- Use locative for location (Де?) and accusative for direction (Куди?)
- Navigate using city vocabulary, transport, and directions
- Answer Звідки? with genitive chunks
- Combine all A1.5 skills in connected urban scenarios
content_outline:
- section: "Що ми знаємо? (What Do We Know?)"
  words: 200
  points:
  - "Self-check covering M28-M34:
    Can you apply euphony rules? (M28)
    Can you say where things are? (M29)
    Can you name city places? (M30)
    Can you say where you're going? (M31)
    Can you use transport? (M32)
    Can you give directions? (M33)
    Can you say where you're from? (M34)"
- section: "Читання (Reading Practice)"
  words: 250
  points:
  - "A short Ukrainian text using vocabulary from M28-M34.
    Content: a tourist navigates Kyiv — asks for directions, takes metro,
    finds a museum, describes where they're from and where they're going.
    Uses euphony, locative, accusative, genitive chunks, transport."
- section: "Граматика (Grammar Summary)"
  words: 200
  points:
  - "Key patterns from A1.5:
    1. Euphony: у/в, і/й, з/із/зі (M28)
    2. Де? → в/на + locative: в школі, на роботі (M29)
    3. Куди? → в/на + accusative: у школу, на роботу (M31)
    4. Звідки? → з + genitive chunk: з України, з роботи (M34)
    5. Transport: автобусом, на метро (M32)
    6. Directions: прямо, направо, наліво (M33)
    7. City places with correct prepositions (M30)"
- section: "Діалог (Connected Dialogue)"
  words: 300
  points:
  - "A tourist in Kyiv asks for help:
    — Вибачте, я з Канади. Де тут музей?
    — Музей у центрі. Ідіть на метро до станції Хрещатик.
    — А як дістатися від метро? — Вийдіть і йдіть направо. Музей на площі.
    — Дякую! А потім я хочу їхати у Львів. Де вокзал?
    — Вокзал далеко, їдьте на метро до станції Вокзальна.
    Uses all A1.5 skills in one realistic scenario."
- section: "Підсумок — Summary"
  words: 250
  points:
  - "A1.5 achievement summary:
    You can now navigate Ukrainian cities.
    You know euphony rules for natural speech.
    You can say WHERE something is (locative).
    You can say WHERE you're GOING (accusative).
    You can say WHERE you're FROM (genitive chunks).
    You can use transport and give directions.
    Next: A1.6 — Food and Shopping (ordering, buying, accusative for objects)."
