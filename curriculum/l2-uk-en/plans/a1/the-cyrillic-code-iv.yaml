module: a1-004
level: A1
sequence: 4
slug: the-cyrillic-code-iv
version: '3.0'
title: The Cyrillic Code IV
subtitle: Й Ч Щ Я Ю Є Ь Ї Ц Ф + ДЖ ДЗ + ' — The Full Alphabet
focus: grammar
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 1200
objectives:
- Learner can recognize and pronounce all 33 Ukrainian letters
- Learner understands iotated vowels (Я, Ю, Є, Ї) and their dual nature
- Learner understands the soft sign (Ь) and apostrophe functions
- Learner can identify ДЖ and ДЗ digraphs as single sounds
- Learner can read the complete Ukrainian alphabet fluently
content_outline:
- section: Вступ
  words: 200
  points:
  - You know 22 letters — only 11 characters remain plus 2 digraphs and the apostrophe. The finish line is in sight.
  - 'Quick diagnostic: read 5 words using all 22 previously learned letters.'
- section: Злиті звуки — Affricates
  words: 300
  points:
  - 'Ц — цибуля 🧅. Video link. An affricate: Т+С pronounced as one sound. Like English ''ts'' in ''cats''. Common in word
    endings (-ець, -иця).'
  - 'Ч — черепаха 🐢. Video link. An affricate: Т+Ш pronounced as one sound. Like English ''ch'' in ''church''. Very frequent.'
  - 'Щ — щітка 🪥. Video link. Two sounds in one letter: Ш+Ч. Uniquely Ukrainian. Common in high-frequency words: ще, що, щастя.'
  - Ф — фламінго 🦩. Video link. Like English 'f'. Rare in native Ukrainian words — appears mostly in borrowings (факт, фото,
    футбол). Voiceless partner of В.
- section: Йотовані голосні — Iotated Vowels
  words: 400
  points:
  - 'Explain the ''dual nature'' concept: Я, Ю, Є, Ї represent TWO sounds at word beginning or after a vowel (Й+vowel), but
    soften the preceding consonant when after a consonant.'
  - Я — яблуко 🍎. Video link. = /ja/ at word start. Also the word for 'I' (я іду). High frequency.
  - 'Ю — юнак 🧑. Video link. = /ju/ at word start. After consonant: softens it (люди — Л becomes soft).'
  - 'Є — єнот 🦝. Video link. = /je/ at word start. Relatively rare after consonants. Cultural touchstone: Євромайдан.'
  - 'Ї — їжак 🦔. Video link. ALWAYS two sounds /ji/. Never softens a consonant. Cultural hook: the letter Ї as a symbol of
    Ukrainian resistance — used in graffiti in occupied territories.'
  - Й — йогурт 🥛. Video link. A very short consonant sound. Never forms a syllable on its own. Frequent in word endings (край,
    рай, гай).
- section: М'який знак та апостроф
  words: 350
  points:
  - 'Ь (soft sign) — сіль 🧂. Video link. Not a letter with its own sound — a modifier that softens the preceding consonant
    (palatalization). Examples: день, сіль, Львів.'
  - 'Contrast: кон (horse, archaic) vs кінь (horse, modern) — the soft sign changes meaning.'
  - 'Апостроф ('') — separates a consonant from a following iotated vowel to preserve the /j/ sound. Examples: м''яч (ball),
    сім''я (family), п''ять (five).'
  - 'Rule summary: Ь softens what comes BEFORE it. Apostrophe BLOCKS softening and keeps the /j/ in the following iotated
    vowel.'
- section: Дигріфи — ДЖ та ДЗ
  words: 200
  points:
  - 'ДЖ — джерело ⛲. Two letters, one sound (voiced postalveolar affricate /dʒ/). Like English ''j'' in ''jungle''. Examples:
    бджола, джаз.'
  - 'ДЗ — дзвін 🔔. Two letters, one sound (voiced alveolar affricate /dz/). No English equivalent. Examples: дзвінок, дзеркало.
    Uniquely Ukrainian — absent from Russian.'
- section: 'Підсумок: Весь алфавіт'
  words: 350
  points:
  - 'The complete 33-letter Ukrainian alphabet: А Б В Г Ґ Д Е Є Ж З И І Ї Й К Л М Н О П Р С Т У Ф Х Ц Ч Ш Щ Ь Ю Я.'
  - '10 голосні: А Е И І О У + 4 йотовані (Є Ї Ю Я). 22 приголосні. 1 special (Ь). 2 digraphs (ДЖ, ДЗ). 1 apostrophe.'
  - 'Celebration: the learner has cracked the entire Cyrillic code. Reading fluency comes with practice — the letter recognition
    phase is complete.'
  - 'Full alphabet reading drill: a short paragraph using all 33 letters with stress marks.'
  - 'Bridge to next module: syllables-and-transfer where letter knowledge becomes word-building skill.'
vocabulary_hints:
  required:
  - 'чай (tea) — top 500 word; demonstrates Ч; collocations: пити чай, чорний чай'
  - 'яблуко (apple) — key word for Я; collocations: червоне яблуко'
  - ще (more/still) — high frequency function word; demonstrates Щ
  - 'їжа (food) — demonstrates Ї; collocations: смачна їжа'
  - 'день (day) — top 50 word; demonstrates soft sign; collocations: добрий день'
  - 'сім''я (family) — demonstrates apostrophe; collocations: моя сім''я'
  - Львів (Lviv) — demonstrates soft sign; cultural significance
  - 'Європа (Europe) — demonstrates Є; collocations: жити в Європі'
  recommended:
  - 'центр (center) — demonstrates Ц; collocations: центр міста'
  - 'щастя (happiness) — demonstrates Щ; collocations: бажаю щастя'
  - м'яч (ball) — demonstrates apostrophe; demonstrates м'який знак concept
  - 'факт (fact) — demonstrates Ф; internationalism; collocations: це факт'
