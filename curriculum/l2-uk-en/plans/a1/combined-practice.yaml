sequence: 43
module: a1-43
level: A1
slug: combined-practice
version: '2.0'
title: Combined Practice
subtitle: Review of Practical Skills
content_outline:
- section: Warm-up
  points:
  - 'Планування декількох справ — cultural hook: «піти на каву» (to go for coffee)
    is the universal starting point for any plan or meeting in Ukraine'
  - 'Сполучники послідовності (спочатку, потім, нарешті) — learner error: overuse
    of «потім» (then... then... then) instead of structured markers like «спочатку»
    (first) and «нарешті» (finally)'
- section: Complex Scenarios
  points:
  - 'Сценарій 1: Ранок → кафе → магазин → транспорт — use sequence markers to guide
    the learner through the scenario (Step 1, Step 2, Step 3)'
  - 'Сценарій 2: Проблема → рішення → допомога — focus on the transition from single
    sentences to narrative arcs (e.g., «First I go here... because I need...»)'
  - 'Сценарій 3: Телефон → зустріч → ресторан — use «разом» (together) for social
    planning context'
- section: Practice
  points:
  - 'Діалог 1: Зміна планів через проблему — note: «бо» is shorter/more colloquial
    than «тому що», both valid for A1'
  - 'Діалог 2: Комбінація покупок та їжі — cultural hook: the «Базар» (market) as
    a hub for combining skills (negotiating, identifying produce, handling cash)'
  - 'Діалог 3: Несподіванка та адаптація — usage of «але» (but) to introduce conflict
    or change'
- section: Warm-up 2
  points:
  - 'Наратив про день з багатьма справами — Standard §4.3.2: focus on complex sentences
    with «і» (and), «але» (but), «тому що» (because)'
  - Інтеграція всіх практичних навичок A1 — combining Speech Acts from previous modules
    (Café, Transport, Emergencies)
  - Вирішення несподіваних проблем — use «якщо» (if) constructions for conditional
    problem solving
vocabulary_hints:
  required:
  - 'спочатку (first) — collocations: «спочатку я» (firstly I), «спочатку треба» (firstly
    one needs)'
  - 'потім (then) — collocations: «а потім» (and then), «потім ми» (then we)'
  - нарешті (finally) — use to close a sequence started with «спочатку»
  - 'тому що (because) — collocations: «тому що я» (because I), «тому що... був хворий»;
    note: distinct from colloquial «бо»'
  - 'якщо (if) — collocations: «якщо ви» (if you), «якщо є» (if there is)'
  - 'але (but) — collocations: «але потім» (but then), «але не» (but not); Standard
    A1 conjunction'
  - 'також (also) — collocations: «але також» (but also), «він також» (he also); learner
    error: putting «також» at the end of the sentence (English interference)'
  - 'разом (together) — collocations: «разом з» (together with), «ходімо разом» (let''s
    go together)'
  recommended:
  - 'план (plan) — context: making a plan (often over coffee)'
  - 'проблема (problem) — collocations: «немає проблеми» (no problem), «вирішити проблему»
    (solve a problem)'
  - 'вирішити (to solve) — context: «вирішити проблему»'
  - 'змінити (to change) — context: «змінити плани» (change plans)'
