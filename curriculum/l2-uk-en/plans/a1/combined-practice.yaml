title: Combined Practice
subtitle: Review of Practical Skills
content_outline:
- section: 'Вступ: Культура планування (Introduction: Planning Culture)'
  words: 450
  points:
  - 'The «Na Kavu» (For Coffee) Ritual: Establish «піти на каву» as the universal
    Ukrainian starting point for any plan, meeting, or decision-making session (Cultural
    Hook).'
  - 'Introduction to Standard §4.3.2: Connecting simple intentions using coordinating
    conjunctions «і» (and) and «але» (but) in the context of planning a day.'
- section: 'Презентація: Структура та Причини (Presentation: Structure and Reasons)'
  words: 650
  points:
  - 'Correcting the «Потім» loop: Drill sequence markers «спочатку» (first) and «нарешті»
    (finally) to build structured narratives instead of simple «then... then» strings
    (Learner Error).'
  - 'The logic of «Бо» vs «Тому що»: Explain that «бо» is shorter and more colloquial
    while «тому що» is the standard full form for A1 reasons (Standard §4.3.2).'
  - 'Word Order Alert: Explicit drill on «також» (also) placement (e.g., «Я також
    хочу...») to prevent English-style end-of-sentence interference (Learner Error).'
- section: 'Практика: Сценарії реального життя (Practice: Real-life Scenarios)'
  words: 500
  points:
  - 'The «Bazar» (Market) Hub: A complex scenario combining produce identification,
    negotiation, and cash handling in a traditional Ukrainian market setting (Cultural
    Hook).'
  - 'Problem-Solving with «Якщо»: Using conditional «якщо» (if) to handle unexpected
    changes, such as a closed shop or a transport delay, integrating skills from a1-39
    and a1-42.'
- section: 'Висновок: Мій наратив (Conclusion: My Narrative)'
  words: 400
  points:
  - 'Transition to Narrative Arcs: Guiding the learner to move from single-sentence
    responses to a cohesive 3-step story (Planning -> Execution -> Problem Solving).'
  - 'Final consolidation of Standard §4.3.2 competencies: Using «і», «але», «тому
    що», and «бо» to describe a complete, structured busy day.'
vocabulary_hints:
  required:
  - 'спочатку (first) — collocations: «спочатку я» (firstly I), «спочатку треба» (firstly
    one needs)'
  - 'потім (then) — collocations: «а потім» (and then), «потім ми» (then we)'
  - нарешті (finally) — use to close a sequence started with «спочатку»
  - 'тому що (because) — Standard A1 form; collocations: «тому що я», «тому що...
    був хворий»'
  - бо (because) — colloquial/shorter version of «тому що», high frequency in speech
    (Standard §4.3.2)
  - 'якщо (if) — collocations: «якщо ви» (if you), «якщо є» (if there is)'
  - 'але (but) — collocations: «але потім» (but then), «але не» (but not)'
  - 'також (also) — word order: never at the end of a sentence (prevents English interference)'
  - 'разом (together) — collocations: «разом з» (together with), «ходімо разом» (let''s
    go together)'
  recommended:
  - 'план (plan) — context: making a plan (often over coffee)'
  - 'проблема (problem) — collocations: «немає проблеми» (no problem), «вирішити проблему»
    (solve a problem)'
  - 'вирішити (to solve) — context: «вирішити проблему»'
  - 'змінити (to change) — context: «змінити плани» (change plans)'
