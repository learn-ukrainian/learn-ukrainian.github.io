module: a1-022
level: A1
sequence: 22
slug: what-time
version: '1.1.2'
title: Котра година?
subtitle: Котра година? О котрій? — позначення часу в українській мові
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Час і природа]
word_target: 1200
objectives:
- Вміти запитувати та відповідати на запитання «Котра година?».
- Навчитися називати час (повні години та половини годин).
- Застосовувати прийменник «о»/«об» із часом як лексичні конструкції (без заглиблення у граматику місцевого відмінка).
- Вміти планувати прості події, використовуючи часові вирази.
dialogue_situations:
- setting: 'Узгодження часу зустрічі телефоном — співрозмовники перевіряють свої графіки'
  speakers:
  - Марина
  - Олексій
  motivation: 'Використання конструкції «О котрій годині?» для планування зустрічі'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — планування зустрічі: — Котра година? — Десята. — О котрій ти працюєш? — О дев''ятій. А ти? — Я працюю о десятій. — Добре, тоді о першій? — Так! Вирази часу засвоюються під час планування.'
  - 'Діалог 2 — розпорядок дня: — Коли ти снідаєш? — О восьмій ранку. — А обідаєш? — О першій. Вечеряю о сьомій. Поєднання часу з дієсловами з модуля A1.3.'
- section: Котра година?
  words: 300
  points:
  - 'Захарійчук Grade 4 p.117: Котра година? — порядкові числівники для позначення годин. Для повних годин використовуються порядкові числівники жіночого роду: Перша (1:00), друга (2:00), третя (3:00), четверта (4:00), п''ята (5:00), шоста (6:00), сьома (7:00), восьма (8:00), дев''ята (9:00), десята (10:00), одинадцята (11:00), дванадцята (12:00). Вивчати як лексику — граматика порядкових числівників буде пізніше.'
  - 'Половини та чверті годин: Пів на другу (1:30). Чверть на третю (2:15). За чверть третя (2:45). На рівні A1: зосередитися на повних годинах і конструкції «пів на». Чверті — лише для розпізнавання.'
- section: О котрій?
  words: 300
  points:
  - 'Для вказівки на час дії використовується конструкція о/об + місцевий відмінок (вивчається як лексичні блоки): О першій (at 1), о другій (at 2), о третій (at 3), о четвертій (at 4), о п''ятій (at 5), о шостій (at 6), о сьомій (at 7), о восьмій (at 8), о дев''ятій (at 9), о десятій (at 10), об одинадцятій (at 11), о дванадцятій (at 12). Зверніть увагу: форма об перед голосними (об одинадцятій).'
  - 'Слова для позначення частини доби: ранку, дня, вечора, ночі. О сьомій ранку (at 7 AM). О третій дня (at 3 PM). О десятій вечора (at 10 PM). Опівдні. Опівночі.'
- section: Підсумок
  words: 300
  points:
  - 'Позначення часу: Котра година? — Десята. О котрій? — О десятій. Пів на другу (1:30). О пів на другу (at 1:30). Самоперевірка: Котра зараз година? Коли ви прокидаєтеся? Коли обідаєте? Скажіть це українською мовою тричі.'
vocabulary_hints:
  required:
  - година (hour, f)
  - котра (which — feminine, for time)
  - перша, друга, третя (1st, 2nd, 3rd — feminine ordinals)
  - ранок (morning, m)
  - вечір (evening, m)
  - день (day, m)
  - ніч (night, f)
  recommended:
  - четверта, п'ята, шоста (4th, 5th, 6th)
  - сьома, восьма, дев'ята (7th, 8th, 9th)
  - десята, одинадцята, дванадцята (10th, 11th, 12th)
  - пів (half)
  - чверть (quarter)
  - опівдні (at noon)
activity_hints:
- type: quiz
  focus: 'Котра година? Зіставити зображення годинників із названим часом.'
  items: 8
- type: fill-in
  focus: 'О котрій? Доповнити: Я снідаю о ___. (восьмій)'
  items: 8
- type: match-up
  focus: 'Зіставити час: 7:00 ↔ сьома, 9:00 ↔ дев''ята'
  items: 6
- type: quiz
  focus: 'Ранку, дня чи вечора? Обрати правильну частину доби.'
  items: 6
connects_to:
- a1-023 (Дні тижня та місяці)
prerequisites:
- a1-021 (Підсумок — дії)
grammar:
- Порядкові числівники для позначення годин (форми жіночого роду — вивчаються як лексика)
- Конструкції о/об + місцевий відмінок для позначення часу (засвоюються як лексичні блоки)
- Конструкція пів на + порядковий числівник для позначення половини години
register: розмовний
references:
- title: Захарійчук Grade 4, p.117
  notes: О котрій годині? Котра година? — часові вирази з порядковими числівниками.
- title: Літвінова Grade 6, p.245-246
  notes: 'Повна система часових виразів: на, по, до, пів на.'
- title: Авраменко Grade 6, p.172
  notes: 'Прийменники на позначення часу: о, за, на, по, до.'
