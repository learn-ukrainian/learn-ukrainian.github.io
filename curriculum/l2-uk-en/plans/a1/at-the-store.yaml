module: a1-061
level: A1
sequence: 61
slug: at-the-store
version: '2.0'
title: At the Store
subtitle: Supermarket Shopping
focus: practical
pedagogy: PPP
phase: A1.6 [Real-World Skills]
word_target: 1200
objectives:
- Learner can navigate a supermarket
- Learner can find items and ask for help
- Learner can complete checkout process
- Learner can read basic product labels
content_outline:
- section: Вступ (Introduction)
  words: 300
  points:
  - 'Структура українського супермаркету — cultural hook: ''Silpo'' themed supermarkets (GTA, Steampunk) offer immersive cultural
    experiences unlike standardized Western stores'
  - The 'Bag Ritual' — the universal interaction 'Пакет потрібен?' (Do you need a bag?) as a cultural meme and essential communicative
    script
  - 'Alignment with State Standard §3.8: Shopping for essential goods (bread, eggs, dairy) and store navigation competencies'
- section: Презентація (Presentation)
  words: 500
  points:
  - 'Відділи магазину (молочний, м''ясний, кондитерський, хлібний) — collocation: ''у якому відділі?'' (Locative context)'
  - Питання про місцезнаходження (Де знаходиться...?) та прохання допомогти (Вибачте, де тут...?)
  - 'Граматика: Accusative case for shopping items (§4.2.3.2) — reinforcing -у/-ю endings using high-frequency feminine nouns
    (кава, вода, сметана, олія)'
  - На касі (Пакет потрібен? / Готівкою чи карткою?) — teaching 'карткою чи готівкою' as fixed lexical chunks (Instrumental
    case) for A1 communicative success
- section: Практика (Practice)
  words: 500
  points:
  - 'Learner error drill: Case confusion between destination (Acc) and location (Loc) — ''іти в магазин'' vs ''бути в магазині'''
  - 'Lexical nuance (process vs result): «покупка» as PROCESS (buying) is a Russicism — use «купівля» or «купування» instead
    (❌ покупка квитків → ✅ купівля квитків). «Покупка» as RESULT (the item bought, the bags in your hands) is correct Ukrainian.
    The calque «робити покупки» should be replaced by «скуповуватися» or «ходити по крамницях».'
  - 'Gender agreement practice: Reinforcing ''ця ціна'' (fem), ''ця каса'', ''ця знижка'' to avoid agreement errors common
    with inanimate direct objects'
  - 'Learner error: Inanimate Masculine Over-correction — drill to reinforce ''я купую магазин'' (Acc=Nom) instead of incorrect
    ''магазина'''
- section: Продукція (Production)
  words: 400
  points:
  - 'Ситуація: Пошук товарів за списком згідно зі Стандартом (овочі, фрукти, м’ясо, хліб) та запит про ціну'
  - 'Ситуація: Розрахунок на касі — використання картки на знижку та вибір способу оплати (карткою/готівкою)'
  - 'Вирішення проблем: ''Ця ціна неправильна'' та прохання про надання чека — ''Чек, будь ласка'''
- section: Підсумок (Summary)
  words: 300
  points:
  - 'Cultural hook: The tradition of ''Передбачення на чеках'' (Predictions on receipts) in Ukrainian stores as an engaging
    reading activity'
  - 'Review of high-frequency collocations: ''акційна знижка'', ''черга до каси'', ''ціна за кілограм'''
  - 'Підсумок комунікативних навичок: Навігація в супермаркеті та завершення транзакції згідно з вимогами рівня A1'
vocabulary_hints:
  required:
  - магазин (store) — High frequency (A1 Core); іти в магазин (Acc.), продуктовий магазин
  - супермаркет (supermarket) — High frequency; Silpo themed stores; у супермаркеті (Loc.)
  - каса (checkout) — High frequency; на касі, вільна каса, черга до каси
  - відділ (section/department) — Medium frequency; у якому відділі?, молочний/м'ясний відділ
  - пакет (bag) — High frequency; 'Пакет потрібен?' (Bag Ritual); покласти в пакет
  - знижка (discount) — Medium frequency; велика знижка, акційна знижка, картка на знижку
  - ціна (price) — High frequency; 'ця ціна' (feminine agreement); ціна за кілограм
  - чек (receipt) — High frequency; передбачення на чеку (predictions); чек, будь ласка
  recommended:
  - готівка (cash) — Medium frequency; платити готівкою (fixed Instrumental chunk)
  - картка (card) — High frequency; платити карткою (fixed Instrumental chunk)
  - кошик (basket) — Medium frequency; покласти в кошик
  - візок (cart) — Medium frequency; взяти візок
  - полиця (shelf) — High frequency; на полиці
  - акція (sale/promotion) — High frequency; це в акції?, товар по акції
