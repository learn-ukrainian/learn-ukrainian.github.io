sequence: 38
module: a1-38
level: A1
slug: at-the-store
version: '2.0'
title: At the Store
subtitle: Supermarket Shopping
content_outline:
- section: Warm-up
  points:
  - 'Структура українського супермаркету — cultural hook: ''Silpo'' themed supermarkets
    offer immersive cultural experiences (e.g., GTA, Steampunk themes)'
  - 'Відділи (молочний, м''ясний, кондитерський) — collocation: у якому відділі?'
- section: Presentation
  points:
  - 'Питання про місцезнаходження (Де знаходиться...? / В якому відділі...?) — learner
    error: Inanimate Masculine Over-correction (e.g., ''я купую магазин'', not ''магазина'')'
  - Прохання допомогти (Вибачте, де тут...?)
  - 'На касі (Пакет потрібен? / Готівкою чи карткою?) — emphasizing the ''Bag Ritual''
    (''Пакет потрібен?''); learner error: avoid Russian calque ''покупка'', use ''купівля''
    or ''закупи'''
  - 'Акції та знижки (Це в акції? / Скільки відсотків знижка?) — collocation: акційна
    знижка'
  - 'Проблеми (Ця ціна неправильна / Чек, будь ласка) — cultural hook: tradition of
    printing predictions/quotes on receipts (''чек'')'
- section: Practice
  points:
  - 'Діалог 1: Пошук товару в магазині — writing note: use high-frequency feminine
    nouns (кава, вода) to reinforce Accusative -у/-ю ending'
  - 'Діалог 2: Оплата на касі — collocation: розрахуватися на касі'
  - 'Діалог 3: Повернення товару'
- section: Warm-up 2
  points:
  - 'Наратив про похід у супермаркет — collocation: іти в магазин (movement context)'
  - Типові ситуації та фрази
vocabulary_hints:
  required:
  - магазин (store) — продуктовий магазин, іти в магазин
  - супермаркет (supermarket) — Silpo themed stores
  - каса (checkout) — на касі, черга до каси
  - відділ (section/department) — у якому відділі?, молочний/м'ясний відділ
  - пакет (bag) — пакет потрібен?, покласти в пакет
  - знижка (discount) — велика знижка, акційна знижка
  - ціна (price) — ціна за кілограм, низька ціна
  - чек (receipt) — чек, будь ласка; predictions on receipts
  recommended:
  - кошик (basket)
  - візок (cart)
  - полиця (shelf)
  - акція (sale/promotion)
activity_hints:
- type: fill-in
  focus: Supermarket conversation
  items: 10
- type: match-up
  focus: Store section names
  items: 20
- type: quiz
  focus: Checkout interactions
  items: 10
- type: fill-in
  focus: Shopping scenario
  items: 5
focus: practical
pedagogy: PPP
prerequisites:
- a1-37 (At the Market)
connects_to:
- a1-39 (Buying Tickets)
objectives:
- Learner can navigate a supermarket
- Learner can find items and ask for help
- Learner can complete checkout process
- Learner can read basic product labels
grammar:
- Location questions (Де знаходиться...?)
- Accusative for shopping
- Quantity expressions
register: розмовний
phase: A1.4 [Practical Scenarios]
persona:
  voice: Patient Supportive Tutor
  role: Supermarket Manager
