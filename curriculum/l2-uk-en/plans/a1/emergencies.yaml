module: a1-057
level: A1
sequence: 57
slug: emergencies
version: '1.0'
title: Emergencies
subtitle: Asking for help, pharmacy, police
focus: communication
pedagogy: PPP
phase: A1.8 [Past, Future & Graduation]
word_target: 1200
objectives:
- Call for help in an emergency (Допоможіть!)
- Interact at a pharmacy to buy basic medicine
- Report a lost item or problem (e.g., to police)
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: In a pharmacy (аптека). Asking for medicine for a headache.'
  - 'Dialogue 2: Losing a passport/wallet on the street. Asking police for help.'
- section: Екстрені ситуації (Emergencies)
  words: 400
  points:
  - 'Vocabulary: Допоможіть! (Help!), поліція (police), швидка (ambulance), пожежна (fire department),
    112 (emergency number in Ukraine).'
  - 'Phrase: Я загубив / Я загубила (I lost) + Accusative (паспорт, телефон).'
- section: В аптеці (At the pharmacy)
  words: 400
  points:
  - 'Vocabulary: ліки (medicine), таблетки (pills), аптека (pharmacy).'
  - 'Structure: Дайте мені, будь ласка, ліки від... (medicine for/against) + Genitive (від голови, від
    кашлю).'
vocabulary_hints:
  required:
  - допоможіть
  - поліція
  - швидка
  - аптека
  - ліки
  - загубив
  - загубила
  - проблема
  - паспорт
  - гаманець
  recommended:
  - таблетки
  - від
  - небезпечно
  - рятуйте
activity_hints:
- type: matching
  focus: Match emergency situations to the correct service to call
  items: 5
- type: fill-in
  focus: Complete phrases asking for medicine (від + Genitive)
  items: 8
connects_to:
- a1-058 (Phone And Writing)
prerequisites:
- a1-056 (Body And Health)
- a1-045 (Please Do This)
grammar:
- Basic Genitive (від кашлю) chunking
- Past tense (загубив)
register: розмовний
references: []
