module: a1-054
level: A1
sequence: 54
slug: emergencies
version: '1.0'
title: Emergencies
subtitle: "Допоможіть! Викличте швидку! — survival Ukrainian"
focus: communicative
pedagogy: PPP
phase: A1.8 [Past, Future, Graduation]
word_target: 1200
objectives:
- Call for help using key emergency phrases (Допоможіть! Викличте...)
- Call 112 and explain a basic emergency in Ukrainian
- Ask for help at a pharmacy, hospital, or police station
- Give basic personal information in an emergency (name, address, phone)
content_outline:
- section: "Dialogues"
  words: 300
  points:
  - "Dialogue 1 — Calling 112:
    — Служба порятунку, слухаю вас.
    — Допоможіть! Тут аварія! Людина не рухається!
    — Де ви? — На вулиці Хрещатик, біля метро Майдан Незалежності.
    — Зрозуміло. Швидка вже їде. Як вас звати?
    — Мене звати Адам. Мій номер — нуль дев'яносто три...
    — Дякую. Залишайтеся на місці.
    Emergency call: location + problem + personal info."
  - "Dialogue 2 — Lost documents:
    — Вибачте, де тут поліція? — Поліція? Прямо і наліво.
    — Дякую! (at the station) Добрий день. Я загубив паспорт.
    — Де ви його загубили? — Я не знаю. Може, в метро.
    — Як ваше прізвище? — Сміт. Адам Сміт.
    — Ваш номер телефону? — Нуль дев'яносто три, п'ятсот двадцять один...
    — Добре. Заповніть цю форму, будь ласка.
    Police station: reporting a lost document."
- section: "Екстрені ситуації (Emergencies)"
  words: 300
  points:
  - "Emergency number: 112 (один один два) — works everywhere in Ukraine.
    Key phrases (learn as chunks!):
    Допоможіть! (Help! — formal/plural imperative)
    Викличте швидку! (Call an ambulance!)
    Викличте поліцію! (Call the police!)
    Тут аварія! (There's an accident here!)
    Тут пожежа! (There's a fire here!)
    Людині погано! (Someone is feeling bad!)
    Мені потрібна допомога! (I need help!)"
  - "Giving your location:
    Де ви? — Where are you?
    Я на вулиці... (I'm on ... street.)
    Я біля... (I'm near...)
    Я в метро... (I'm in the metro...)
    Адреса: вулиця Хрещатик, будинок десять. (Address: Khreshchatyk street, building 10.)
    Use places vocabulary from A1.5 (біля, навпроти, поруч)."
- section: "Допомога (Getting Help)"
  words: 300
  points:
  - "At the hospital / лікарня:
    Мені потрібен лікар. (I need a doctor.)
    У мене болить... (My ... hurts — from M53.)
    У мене алергія на... (I'm allergic to...)
    Я не розумію. Повторіть, будь ласка. (I don't understand. Please repeat.)
    Ви говорите англійською? (Do you speak English?)"
  - "Personal information for emergencies:
    Мене звати... (My name is...)
    Моє прізвище... (My surname is...)
    Мій номер телефону... (My phone number is...)
    Я з [country]. (I'm from [country].)
    Мій паспорт... / Я загубив/загубила паспорт. (My passport... / I lost my passport.)
    Мій готель — ... (My hotel is...)
    All review from previous modules — applied to a critical situation."
- section: "Summary"
  words: 300
  points:
  - "Emergency survival kit:
    112 — universal emergency number.
    Допоможіть! (Help!) Викличте швидку / поліцію!
    Тут аварія / пожежа!
    Location: Я на вулиці... Я біля...
    At hospital: У мене болить... Мені потрібен лікар.
    At police: Я загубив/загубила [document].
    Personal info: ім'я, прізвище, номер телефону, країна, адреса.
    Self-check: Practice a 112 call — state the problem, give your location, give your name."
vocabulary_hints:
  required:
  - допомога (help, f)
  - допоможіть (help! — imperative)
  - швидка (ambulance, f — short for швидка допомога)
  - поліція (police, f)
  - лікарня (hospital, f)
  - аварія (accident, f)
  - загубити (to lose)
  - викликати (to call/summon)
  recommended:
  - пожежа (fire, f)
  - порятунок (rescue, m)
  - паспорт (passport, m)
  - адреса (address, f)
  - номер (number, m)
  - алергія (allergy, f)
  - форма (form/document, f)
  - будинок (building, m)
activity_hints:
- type: quiz
  focus: "What do you say? Accident → Тут аварія! Fire → Тут пожежа! Need doctor → Мені потрібен лікар."
  items: 8
- type: fill-in
  focus: "Emergency call: Допоможіть! Тут ___ ! Я на вулиці ___ . Мене звати ___ ."
  items: 6
- type: order
  focus: "Put the 112 call in order: dial 112, state problem, give location, give name, wait for help"
  items: 5
- type: fill-in
  focus: "At the police station: Я ___ (загубити) паспорт. Моє прізвище ___ ."
  items: 6
