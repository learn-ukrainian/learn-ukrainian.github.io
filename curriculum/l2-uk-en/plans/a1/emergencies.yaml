module: a1-054
level: A1
sequence: 54
slug: emergencies
version: '1.2.3'
title: Екстрені ситуації
subtitle: Допоможіть! Викличте швидку! — українська для виживання
focus: communicative
pedagogy: PPP
phase: A1.8 [Минуле, майбутнє, завершення рівня]
word_target: 1200
objectives:
- Кликати на допомогу, використовуючи ключові екстрені фрази (Допоможіть! Викличте...)
- Телефонувати на 112 і пояснювати базову суть екстреної ситуації українською
- Просити про допомогу в аптеці, лікарні чи поліцейському відділку
- Надавати основну особисту інформацію під час екстреної ситуації (ім'я, адреса, телефон)
dialogue_situations:
- setting: 'Незначна автомобільна аварія на вулиці Хрещатик (f) — виклик 103: Допоможіть! Аварія (f) на Хрещатику! Потрібна швидка (f)! Є постраждалий (m). Машина (f) пошкоджена.'
  speakers:
  - Водій
  - Оператор 103
  motivation: Екстрена ситуація зі словами аварія(f), швидка(f), машина(f), вулиця(f)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Дзвінок до 112: — Служба порятунку, слухаю вас. — Допоможіть! Тут аварія! Людина не рухається! — Де ви? — На вулиці Хрещатик, біля метро Майдан Незалежності. — Зрозуміло. Швидка вже їде. Як вас звати? — Мене звати Адам. Мій номер — нуль дев''яносто три... — Дякую. Залишайтеся на місці. Екстрений виклик: місцеперебування + проблема + особиста інформація.'
  - 'Діалог 2 — Втрачені документи: — Вибачте, де тут поліція? — Поліція? Прямо і наліво. — Дякую! (у відділку) Добрий день. Я загубив паспорт. — Де ви його загубили? — Я не знаю. Може, в метро. — Як ваше прізвище? — Сміт. Адам Сміт. — Ваш номер телефону? — Нуль дев''яносто три, п''ятсот двадцять один... — Добре. Заповніть цю форму, будь ласка. Відділок поліції: повідомлення про втрачений документ.'
- section: Екстрені ситуації
  words: 300
  points:
  - 'Номер екстреної допомоги: 112 (один один два) — працює всюди в Україні. Ключові фрази (вивчайте як сталі вирази!): Допоможіть! (наказовий спосіб, ввічлива форма/множина) Викличте швидку! Викличте поліцію! Тут аварія! Тут пожежа! Людині погано! Мені потрібна допомога!'
  - 'Вказування місцеперебування: Де ви? Я на вулиці... Я біля... Я в метро... Адреса: вулиця Хрещатик, будинок десять. Використовуйте лексику про місця з рівня A1.5 (біля, навпроти, поруч).'
- section: Допомога
  words: 300
  points:
  - 'У лікарні: Мені потрібен лікар. У мене болить... (з модуля №53). У мене алергія на... Я не розумію. Повторіть, будь ласка. Ви говорите англійською?'
  - 'Особиста інформація для екстрених ситуацій: Мене звати... Моє прізвище... Мій номер телефону... Я з [країна]. Мій паспорт... / Я загубив/загубила паспорт. Мій готель — ... Усе це — повторення з попередніх модулів, застосоване до критичної ситуації.'
- section: Підсумок
  words: 300
  points:
  - 'Набір для виживання в екстрених ситуаціях: 112 — універсальний номер. Допоможіть! Викличте швидку / поліцію! Тут аварія / пожежа! Місцеперебування: Я на вулиці... Я біля... У лікарні: У мене болить... Мені потрібен лікар. У поліції: Я загубив/загубила [документ]. Особиста інформація: ім''я, прізвище, номер телефону, країна, адреса. Самоперевірка: Розіграйте дзвінок на 112 — опишіть проблему, назвіть місцеперебування та ім''я.'
vocabulary_hints:
  required:
  - допомога (help, f)
  - допоможіть (help! — imperative)
  - швидка (ambulance, f — short for швидка допомога)
  - поліція (police, f)
  - лікарня (hospital, f)
  - аварія (accident, f)
  - загубити (to lose)
  - викликати (to call/summon)
  recommended:
  - пожежа (fire, f)
  - порятунок (rescue, m)
  - паспорт (passport, m)
  - адреса (address, f)
  - номер (number, m)
  - алергія (allergy, f)
  - форма (form/document, f)
  - будинок (building, m)
activity_hints:
- type: quiz
  focus: Оберіть правильну екстрену фразу для конкретної ситуації.
  items:
  - question: You see a car crash.
    options:
    - Тут аварія! Викличте швидку!
    - Тут пожежа! Допоможіть!
    - Я загубив паспорт.
  - question: You see a building on fire.
    options:
    - Тут пожежа! Допоможіть!
    - Тут аварія!
    - Мені потрібен лікар.
  - question: Someone is feeling very ill on the street.
    options:
    - Людині погано! Викличте швидку!
    - Викличте поліцію!
    - Я загубив паспорт.
  - question: You cannot find your passport at the airport.
    options:
    - Я загубив паспорт.
    - Тут аварія!
    - Мені потрібна швидка.
  - question: Someone stole your wallet.
    options:
    - Викличте поліцію! Допоможіть!
    - Тут пожежа!
    - Мені потрібен лікар.
- type: fill-in
  focus: Доповніть екстрений дзвінок.
  items:
  - Алло! {Допоможіть|Дякую|Вибачте}! Тут аварія!
  - '{Викличте|Загубив|Потрібен} швидку допомогу!'
  - Я на {вулиці|лікарні|поліції} Хрещатик, біля метро.
  - Мене {звати|прізвище|адреса} Адам.
  - Мій номер {телефону|паспорта|будинку} — нуль дев'яносто три...
  - Мені потрібна {допомога|пожежа|аварія}!
- type: order
  focus: Розташуйте діалог з оператором 112 у правильному порядку.
  items:
  - — Служба порятунку, слухаю вас.
  - — Допоможіть! Тут пожежа!
  - — Де ви?
  - — На вулиці Шевченка, будинок п'ять.
  - — Зрозуміло. Швидка і пожежники вже їдуть. Як вас звати?
  - — Мене звати Анна. Дякую!
- type: fill-in
  focus: Повідомлення про проблему в поліції або лікарні.
  items:
  - Добрий день. Я {загубив|викличте|допоможіть} паспорт.
  - Моє {прізвище|ім'я|номер} — Сміт.
  - Мені {потрібен|погана|хворий} лікар.
  - У мене {алергія|пожежа|аварія} на ці таблетки.
  - Я не розумію. {Повторіть|Допоможіть|Викличте}, будь ласка.
connects_to:
- a1-055 (Фінал A1)
prerequisites:
- a1-053 (Здоров'я)
grammar:
- 'Наказовий спосіб для екстрених ситуацій: Допоможіть! Викличте! Повторіть! (повторення з модуля №43)'
- 'Фрази розташування: на вулиці, біля, в метро (повторення з A1.5)'
- 'Мені потрібен/потрібна (сталий вираз, без граматичного аналізу)'
register: розмовний
references:
- title: State Standard 2024, §3
  notes: 'Тематична сфера: здоров''я і безпека — екстрені ситуації.'
