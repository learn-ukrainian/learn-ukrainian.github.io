sequence: 42
module: a1-42
level: A1
slug: emergencies
version: '2.0'
title: Emergencies
subtitle: Help and Safety
content_outline:
- section: Warm-up
  points:
  - 'Номери екстрених служб в Україні (101, 102, 103, 112) — cultural hook: перехід
    на єдиний європейський номер 112 як символ інтеграції'
  - Коли дзвонити кому — чітко розмежувати 101 (пожежна), 102 (поліція), 103 (швидка)
    та роль диспетчера 112
- section: Presentation
  points:
  - 'Прохання про допомогу (Допоможіть! / Мені потрібна допомога!) — learner error:
    ігнорування кличного відмінка (Лікарю! Поліціє!)'
  - 'Опис проблеми (У мене вкрали... / Я загубив...) — learner error: вживання «дзвонити
    поліцію» замість «викликати поліцію»'
  - 'Повідомлення про місце (Я на вулиці... / Біля...) — фокус на практичних локаторах:
    «Я біля метро», «на вулиці», «біля орієнтирів»'
  - Опис стану (Мені погано / Тут аварія) — builds on A1-31 (Body and Health)
  - 'Запитання про документи (Мені потрібна заява / довідка) — official context usage:
    «пред''явити документи», «втратити документи»'
- section: Practice
  points:
  - 'Діалог 1: Дзвінок у поліцію (крадіжка) — alignment: State Standard §1.3.2 (опис
    проблемних ситуацій)'
  - 'Діалог 2: Виклик швидкої допомоги — learner error: русизм «визивати швидку» замість
    «викликати швидку»'
  - 'Діалог 3: Візит до посольства — context: написати заяву про втрату документів'
- section: Warm-up 2
  points:
  - 'Наратив про втрачений паспорт — cultural hook: reference to digital documents
    (Дія) as a modern context'
  - 'Візит у поліцію та посольство — focus on collocations: «подати заяву», «працівник
    поліції»'
  - Практичні фрази для вирішення проблеми
vocabulary_hints:
  required:
  - допомога (help) — Потребувати допомоги, надати допомогу, швидка допомога
  - швидка (ambulance) — Викликати швидку (не «визивати»!), чекати на швидку
  - поліція (police) — Викликати поліцію, патрульна поліція, працівник поліції
  - пожежна (fire service) — Standard emergency service context
  - небезпека (danger) — General warning context
  - аварія (accident) — Сталася аварія, ДТП (дорожньо-транспортна пригода)
  - лікарня (hospital) — Дитяча лікарня, районна лікарня, лягти в лікарню
  - документи (documents) — Перевіряти документи, втратити документи, пред'явити документи
  recommended:
  - загубити (to lose) — General usage
  - вкрасти (to steal) — Passive construction context (у мене вкрали)
  - травма (injury) — Medical context
  - адреса (address) — Giving location context
  - свідок (witness) — Legal/Police context
  - заява (statement) — Написати заяву, подати заяву в поліцію
activity_hints:
