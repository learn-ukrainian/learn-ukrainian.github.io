module: a1-062
level: A1
sequence: 62
slug: emergencies
version: '2.0'
title: Emergencies
subtitle: Help and Safety
focus: practical
pedagogy: PPP
phase: A1.6 [Real-World Skills]
word_target: 1200
objectives:
- Learner can call for help in emergencies
- Learner can describe basic problems
- Learner can give location information
- Learner can understand emergency instructions
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - 'Екстрені служби в Україні: перехід на єдиний номер 112 як символ євроінтеграції та цифровізації (МВС, 2023-2024), що
    об''єднує 101, 102 та 103.'
  - 'State Standard §1.3.2: Ознайомлення з базовим викликом «Допоможіть!» як фундаментальним комунікативним поняттям для безпеки
    учня.'
  - 'Розмежування функцій служб: коли звертатися до пожежників (101), поліції (102) та швидкої допомоги (103).'
- section: Презентація (Presentation)
  words: 650
  points:
  - 'Граматичний фокус на кличному відмінку (Vocative Case) для екстрених звертань: drill «Лікарю!», «Поліціє!», «Рятувальники!»
    замість називного відмінка.'
  - 'Learner error check: пояснення різниці між «дзвонити» (dialing a number) та правильним «викликати» (summoning help) —
    не «дзвонити поліцію», а «викликати поліцію».'
  - 'Виправлення русизму «визивати»: заміна кальки нормативним українським дієсловом «викликати швидку».'
  - 'Опис проблеми та місця: використання орієнтирів («Я біля метро», «на розі вулиць») та опис стану (будує базу на A1-31).'
- section: Практика (Practice)
  words: 600
  points:
  - 'Сценарій 1: Дзвінок диспетчеру 112 — повідомлення про ДТП (дорожньо-транспортну пригоду) та наявність свідків.'
  - 'Сценарій 2: Втрата чи крадіжка документів — фокус на словосполученнях «пред’явити документи», «подати заяву» та «працівник
    поліції».'
  - 'Використання ввічливих прохань у наказовому способі (§4.2.4.2): «Скажіть, будь ласка, адресу», «Дайте, будь ласка, довідку».'
- section: Виробництво та підсумок (Production & Summary)
  words: 350
  points:
  - 'Рольова гра: діалог у посольстві щодо відновлення втрачених документів та написання простої заяви.'
  - 'Культурний контекст: огляд цифрових інструментів «Дія» та «єДопомога» як прикладів солідарності та технологічності України.'
  - 'Фінальний дрилінг: швидка реакція на запитання диспетчера про локацію та вид небезпеки.'
vocabulary_hints:
  required:
  - допомога (help) — потребувати допомоги, надати допомогу, швидка допомога; висока частотність
  - швидка (ambulance) — викликати швидку (не «визивати»!), чекати на швидку; ключове слово для §1.3.2
  - поліція (police) — викликати поліцію, працівник поліції, патрульна поліція; розмовний та офіційний регістр
  - пожежна (fire service) — номер 101, викликати пожежників
  - небезпека (danger) — бути в небезпеці, попередити про небезпеку
  - аварія (accident) — сталася аварія, ДТП (дорожньо-транспортна пригода)
  - лікарня (hospital) — дитяча лікарня, районна лікарня, лягти в лікарню
  - документи (documents) — перевіряти документи, втратити документи, пред'явити документи
  recommended:
  - загубити (to lose) — я загубив паспорт, загубити документи
  - вкрасти (to steal) — у мене вкрали гаманець (passive construction context)
  - травма (injury) — отримати травму, серйозна травма
  - адреса (address) — назвати адресу, за цією адресою
  - свідок (witness) — бути свідком, знайти свідків
  - заява (statement/application) — написати заяву, подати заяву в поліцію
