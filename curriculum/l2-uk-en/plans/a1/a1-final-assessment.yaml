module: a1-060
level: A1
sequence: 60
slug: a1-final-assessment
version: '1.0'
title: A1 Final Assessment
subtitle: Capstone simulation
focus: assessment
pedagogy: Checkpoint
phase: A1.8 [Past, Future & Graduation]
word_target: 1200
objectives:
- Simulate a full day in a Ukrainian city using only Ukrainian
- Demonstrate A1 proficiency across all skills
- Celebrate completion of the A1 level!
content_outline:
- section: 'Ранок: Сніданок і транспорт (Morning)'
  words: 300
  points:
  - 'Simulation scenario: Ordering breakfast at a cafe, taking a bus/metro to the center.'
  - 'Tests: Food, transport, prices, basic interactions.'
- section: 'День: Місто і покупки (Afternoon)'
  words: 300
  points:
  - 'Simulation scenario: Navigating the city, asking for directions, buying souvenirs/groceries.'
  - 'Tests: Directions, Locative/Accusative, shopping vocabulary.'
- section: 'Вечір: Зустріч з другом (Evening)'
  words: 300
  points:
  - 'Simulation scenario: Meeting a friend, talking about what happened today (past tense), and what you
    will do tomorrow (future tense).'
  - 'Tests: Tenses, social interaction, personal narrative.'
- section: Підсумок рівня A1 (A1 Summary)
  words: 300
  points:
  - A congratulatory note! You can now survive in Ukraine.
  - Preview of what is coming in A2 (more cases, deeper grammar, perfective/imperfective verbs).
