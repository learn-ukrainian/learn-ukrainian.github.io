module: a1-042
level: A1
sequence: 42
slug: adjectives-everywhere
version: '1.0'
title: Adjectives Everywhere
subtitle: Adjective agreement in Nom/Acc/Loc
focus: grammar
pedagogy: PPP
phase: A1.6 [Food & Shopping]
word_target: 1200
objectives:
- Use adjectives to describe objects in different roles (subject, object, location)
- Master basic adjective agreement across Nominative, Accusative, and Locative
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Shopping for clothes. ''Я хочу купити цю чорну футболку.'''
  - 'Dialogue 2: Describing a city. ''Я живу в гарному місті. Я бачу великий парк.'''
- section: Прикметники (Adjectives Review)
  words: 400
  points:
  - Review Nominative adjectives (новий, нова, нове).
- section: Прикметники у відмінках (Adjectives in Cases)
  words: 400
  points:
  - 'Accusative feminine: -а -> -у (нову книгу).'
  - 'Accusative masculine inanimate: same as Nom (новий стіл).'
  - 'Locative masc/neuter: -ому/-ім (у новому місті).'
  - 'Locative feminine: -ій (у новій школі).'
vocabulary_hints:
  required:
  - чорний
  - білий
  - гарний
  - цікавий
  - новий
  - старий
  - великий
  - малий
  - смачний
  recommended:
  - дорогий
  - дешевий
  - одяг
activity_hints:
- type: fill-in
  focus: Provide the correct adjective ending based on case context
  items: 15
- type: matching
  focus: Match noun phrases in Nominative to their Accusative/Locative forms
  items: 8
connects_to:
- a1-043 (Checkpoint Food Shopping)
prerequisites:
- a1-009 (Describing Things)
- a1-030 (Where Is It)
- a1-038 (Eating And Drinking)
grammar:
- Adjective agreement (Nom, Acc, Loc)
register: розмовний
references: []
