module: a1-038
level: A1
sequence: 38
slug: eating-and-drinking
version: '1.0'
title: Eating And Drinking
subtitle: Accusative inanimate objects
focus: grammar
pedagogy: PPP
phase: A1.6 [Food & Shopping]
word_target: 1200
objectives:
- Talk about eating and drinking habits
- Use the Accusative case for inanimate direct objects
- Conjugate verbs їсти and пити
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Roommates discussing what they are eating for lunch. Я їм борщ.'
  - 'Dialogue 2: Offering a drink. Що ти п''єш? Я п''ю каву.'
- section: Їсти і пити (To eat and to drink)
  words: 400
  points:
  - 'Conjugation of irregular verbs: їсти (я їм, ти їси...) and пити (я п''ю, ти п''єш...).'
  - 'Introduce more food verbs: готувати (to cook), купувати (to buy).'
- section: Що ти їш? (Accusative Inanimate)
  words: 400
  points:
  - Introduce Accusative case for direct objects (inanimate).
  - 'Rule: Masculine/Neuter inanimate don''t change (Я їм хліб, я п''ю молоко).'
  - 'Rule: Feminine -а goes to -у, -я goes to -ю (Я п''ю каву, я їм піцу).'
vocabulary_hints:
  required:
  - їсти
  - пити
  - борщ
  - піца
  - салат
  - суп
  - готувати
  - смачно
  recommended:
  - купувати
  - вечеря
  - обід
activity_hints:
- type: conjugation
  focus: Conjugate їсти and пити
  items: 10
- type: fill-in
  focus: Change feminine nouns to Accusative after їсти/пити
  items: 12
connects_to:
- a1-039 (At The Cafe)
prerequisites:
- a1-037 (Food And Drink)
- a1-016 (Daily Verbs Group 1)
grammar:
- Accusative case (inanimate)
- Conjugation of їсти, пити
register: розмовний
references: []
