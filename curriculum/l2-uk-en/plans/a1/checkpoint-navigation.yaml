slug: checkpoint-navigation
version: '2.0'
title: 'Checkpoint: Navigation'
subtitle: Can You Do the A1.2 Skills?
content_outline:
- section: Вступ та самооцінка (Introduction & Self-Assessment)
  words: 400
  points:
  - 'Мета контрольної точки — консолідація навичок блоку А1.2 згідно зі Стандартом
    §4.2.3: перевірка вживання знахідного, місцевого та родового відмінків'
  - 'Стратегії самооцінки перед переходом до рівня A1.3: визначення сильних та слабких
    місць у граматичних конструкціях'
  - 'Огляд очікуваних результатів: здатність орієнтуватися в місті, робити покупки
    та використовувати основні відмінки у типових ситуаціях'
- section: Знахідний та Місцевий відмінки (Accusative & Locative Cases)
  words: 600
  points:
  - Диференціація Куди? (Знахідний) vs Де? (Місцевий) згідно зі Стандартом §4.2.3.2
    та §4.2.3.3
  - 'Типова помилка: змішування кінцевого пункту руху (Acc.) та місця (Loc.), наприклад,
    ''Я йду в парку'' замість ''Я йду в парк'''
  - 'Робота з прийменниками у/в, на: запобігання пропуску прийменників у місцевому
    відмінку (помилка ''Я школі'' замість ''Я у школі'')'
  - 'Культурний гачок: Станція метро ''Арсенальна'' — найглибша у світі (105.5 м),
    ідеальний контекст для практики ''Ми на станції'' (Loc.) проти ''Ми йдемо на станцію''
    (Acc.)'
  - Чергування приголосних при відмінюванні (книга → у книзі) та вживання закінчень
    -і/-ї
- section: Родовий відмінок та займенники (Genitive Case & Pronouns)
  words: 500
  points:
  - 'Конструкція заперечення з ''немає'' (Стандарт §4.2.1.3): виправлення помилки
    вживання називного відмінка замість родового (наприклад, ''Тут немає автобус''
    → ''Тут немає автобуса'')'
  - 'Вираження походження з прийменником ''з'': паттерни ''Я з України'', ''Я з Лондона''
    як лексичні блоки для початкового рівня'
  - Родові форми займенників та числівників згідно зі Стандартом §4.2.2 та §4.2.1.3
    (два студенти, немає мого квитка)
  - Узгодження присвійних займенників (мій/моя/моє, твій/твоя/твоє) та незмінність
    форм його/її/їхній
- section: 'Практика: Навігація та покупки (Practice: Navigation & Shopping)'
  words: 500
  points:
  - 'Орієнтування в місті: використання фраз ''Де знаходиться...?'', ''Як пройти до...?''
    та вказівок напрямку (наліво, направо, прямо)'
  - 'Культурний гачок: ''Золоті Ворота'' — ''підземний палац'' з мозаїками князів
    Київської Русі; орієнтир для діалогів у центрі Києва'
  - 'Ситуація ''У магазині'': питання про ціну ''Скільки коштує?'' та використання
    числівників з іменниками в реальному контексті'
  - 'Інтегроване завдання: Діалог туриста, який шукає кав''ярню біля Золотих Воріт,
    використовуючи знання всіх трьох відмінків та присвійних займенників'
vocabulary_hints:
  required:
  - де (where) — Де знаходиться? Де тут зупинка?; High frequency (Top 100)
  - скільки (how much) — Скільки коштує? Скільки хвилин?; High frequency (Top 200)
  - немає (there is no) — Немає часу, немає грошей; ключовий тригер родового відмінка
  - мій (my) — мій квиток, моя карта, моє місце; узгодження в роді
  - наліво (left) — Поверніть наліво, перший поворот наліво
  - направо (right) — Поверніть направо, це направо від парку
  - кава (coffee) — Я хочу каву (Acc.), кава з молоком
  - гривня (hryvnia) — одна гривня, дві гривні, п'ять гривень; валюта для покупок
  recommended:
  - зупинка (stop) — автобусна зупинка, наступна зупинка; Med frequency
  - рахунок (bill) — Принесіть, будь ласка, рахунок; контекст кафе
  - магазин (store) — продуктовий магазин, піти в магазин
  - кілограм (kilogram) — один кілограм яблук; для кількісних конструкцій
  - прямо (straight) — Ідіть прямо, завжди прямо
