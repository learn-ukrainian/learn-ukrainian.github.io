module: a1-001
level: A1
sequence: 1
slug: the-ukrainian-alphabet
version: '1.0'
title: The Ukrainian Alphabet
subtitle: 33 Letters, Your First Words
focus: phonetics
pedagogy: PPP
phase: A1.1 [Script & First Contact]
word_target: 1200
objectives:
- Read Ukrainian words written in Cyrillic without transliteration
- Match all 33 Ukrainian letters to their sounds
- Spot the false friends — letters that look Latin but sound different
- Read real Ukrainian signs, names, and common words aloud
content_outline:
- section: Знайомі літери (Familiar Letters)
  words: 200
  points:
  - "Six letters that look AND sound like Latin: А [a], О [o], К [k], М [m],
    Т [t], Е [e as in 'met']. With just these, learner reads real words:
    мама, тато, кома, атом, метро, Тома."
  - "Confidence builder: these letters appear in hundreds of Ukrainian words.
    Learner practices reading 10-15 words using only these six letters,
    building the habit of sounding out Cyrillic without English crutches."
- section: Фальшиві друзі (False Friends)
  words: 250
  points:
  - "Six letters that LOOK Latin but SOUND completely different — the biggest
    trap for English speakers: В [v] not 'b', Н [n] not 'h', Р [r] not 'p',
    С [s] not 'c', У [u] not 'y', Х [kh] not 'x'."
  - "Drill through common words: вода (water), ніс (nose), рука (hand),
    сон (dream), хата (house), кухня (kitchen). Learner must break the
    English reflex — when you see В, your mouth says [v]."
  - "Reading challenge: words mixing familiar + false friend letters.
    Сорок (forty), Норма (norm), Мороз (frost), Ворон (raven).
    If learner reads these correctly, the false friend habit is breaking."
- section: Нові літери (New Letters)
  words: 250
  points:
  - "Letters with shapes not found in Latin: Б, Г, Ґ, Д, Ж, З, И, Й, Л, П,
    Ф, Ц, Ч, Ш, Щ. Introduced through high-frequency words — not isolated
    letter drills. Банк (bank), Гарно (nicely), Дім (house), Зима (winter),
    Книга (book), Школа (school)."
  - "Special Ukrainian sounds: Ж [zh] like 'pleasure', Ц [ts] like 'cats',
    Ч [ch] like 'church', Ш [sh] like 'ship', Щ [shch] — unique to
    Ukrainian, as in що (what) and ще (still)."
  - "The unique Ґ: only appears in a handful of native Ukrainian words —
    ґанок (porch), ґудзик (button), ґречний (polite). Different from Г [h]."
- section: Голосні (Vowels)
  words: 200
  points:
  - "Ukraine has 10 vowel letters: А, Е, И, І, Ї, О, У, Ю, Я, Є.
    Six are 'simple' (one sound): А, Е, И, І, О, У.
    Four are 'iotated' (carry a й-sound): Я [ja], Ю [ju], Є [je], Ї [ji]."
  - "The И vs І distinction — both are 'i'-like sounds but different.
    И is between English 'i' in 'bit' and 'ee' in 'feet'.
    І is closer to English 'ee'. Minimal pair: кит (whale) vs кіт (cat) —
    and бик (bull) vs бік (side) shows the contrast."
  - "Preview: Я, Ю, Є, Ї soften the consonant before them. This is key to
    Ukrainian pronunciation and will be explored in M02."
- section: Діалоги (Dialogues)
  words: 300
  points:
  - "Reading practice scene: Two friends walking through Kyiv, reading signs.
    Аптека (pharmacy), Банк (bank), Кафе (café), Метро (metro),
    Пошта (post office), Школа (school), Зупинка (bus stop).
    Each sign uses letters from all three groups — learner practices
    the full alphabet in a real-world context."
  - "Name reading: common Ukrainian names organized by letter groups.
    Masculine: Олег, Тарас, Андрій, Богдан, Михайло.
    Feminine: Олена, Марія, Софія, Катерина, Наталія.
    Cultural note: Ukrainian names have a special vocative form for calling
    someone — Олено! Тарасе! — preview for M44."
  - "Reading Ukrainian city names: Київ, Львів, Одеса, Харків, Дніпро,
    Запоріжжя, Полтава, Чернігів. Geography as reading practice —
    every city name exercises different letter combinations."
vocabulary_hints:
  required:
  - мáма (mother) — first word, uses only familiar letters
  - тáто (father) — familiar letters only
  - водá (water) — false friend В [v], not 'b'
  - рукá (hand) — false friend Р [r], not 'p'
  - хáта (house, traditional) — introduces Х [kh]
  - книга (book) — new letters К, Н, И, Г
  - шкóла (school) — introduces Ш
  - мíсто (city) — introduces І
  - зимá (winter) — introduces З, И
  - дім (house, modern) — introduces Д, І
  recommended:
  - áптека (pharmacy) — sign reading practice
  - банк (bank) — cognate, sign reading
  - кафé (café) — cognate with Ukrainian spelling
  - пóшта (post office) — introduces П, Ш together
  - мéтро (metro) — cognate, familiar letters
  - зупинка (bus stop) — real-world sign
activity_hints:
- type: match-up
  focus: Match Ukrainian letters to their sounds (not English letter equivalents)
  items: 12
- type: quiz
  focus: "Which letter makes this sound? — audio recognition of Ukrainian sounds"
  items: 10
- type: fill-in
  focus: Complete Ukrainian words with missing letters (e.g., _ода → вода)
  items: 8
- type: quiz
  focus: Read a Ukrainian word and choose the correct pronunciation/meaning
  items: 8
connects_to:
- a1-002 (Sounds and Special Signs)
prerequisites: []
grammar:
- Cyrillic letter-sound correspondence
- False friend letters (В, Н, Р, С, У, Х)
- Simple vs iotated vowels (preview)
register: розмовний
