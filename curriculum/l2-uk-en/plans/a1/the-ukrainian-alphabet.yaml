module: a1-001
level: A1
sequence: 1
slug: the-ukrainian-alphabet
version: '2.0'
title: The Ukrainian Alphabet
subtitle: "33 Letters, One System вАФ Your Map to Reading Ukrainian"
focus: grammar
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 1200
objectives:
- Learner sees the full 33-letter Ukrainian alphabet as a coherent system
- "Learner understands letter вЙ† sound (–±—Г–Ї–≤–Є vs –Ј–≤—Г–Ї–Є)"
- Learner distinguishes vowels (–≥–Њ–ї–Њ—Б–љ—Ц) from consonants (–њ—А–Є–≥–Њ–ї–Њ—Б–љ—Ц) as categories
- "Learner can read and write words using 10 practice letters: –Р –Ю –£ –Ж –Ь –Э –Ґ –Ъ –° –Ы"
- Learner recognizes 5+ survival sight words (–њ—А–Є–≤—Ц—В, –і—П–Ї—Г—О, —В–∞–Ї, –љ—Ц, —Ж–µ)
content_outline:
- section: –Т—Б—В—Г–њ вАФ Introduction
  words: 150
  points:
  - "Ukrainian uses Cyrillic script вАФ descended from Greek via the First Bulgarian
    Empire. 33 letters, highly phonetic: each letter usually maps to one sound
    (unlike English where 'ough' can sound 5 different ways)."
  - "Show the full 33-letter alphabet chart as a reference map. Learners don't
    memorize it all now вАФ they'll master each group in M2 (vowels), M3 (consonants),
    M4 (special signs). Today: overview + first 10 practice letters."
  - "Cultural hook: Cyrillic was created by students of Saints Cyril and Methodius.
    It is NOT derived from Latin вАФ it descends from the Greek alphabet."
- section: "–С—Г–Ї–≤–Є —Ц –Ј–≤—Г–Ї–Є вАФ Letters and Sounds"
  words: 200
  points:
  - "Letters (–±—Г–Ї–≤–Є) are written symbols. Sounds (–Ј–≤—Г–Ї–Є) are what you hear and
    pronounce. They are not the same thing вАФ Ukrainian has 38 phonemes but 33 letters."
  - "Key insight: Ukrainian spelling is highly phonetic вАФ one letter almost always
    represents one sound. This makes Ukrainian FAR easier to read than English.
    Once you learn the 33 letters, you can sound out any word."
  - "Some letters do double duty: iotated vowels (–ѓ –Ѓ –Д –З) can represent two sounds.
    The soft sign (–ђ) modifies the consonant before it. Details in M2 and M4."
- section: "–У–Њ–ї–Њ—Б–љ—Ц —В–∞ –њ—А–Є–≥–Њ–ї–Њ—Б–љ—Ц вАФ Vowels and Consonants"
  words: 200
  points:
  - "10 vowel letters: 6 base (–Р –Ю –£ –Х –Ш –Ж) + 4 iotated (–ѓ –Ѓ –Д –З).
    Vowels = voice only, no obstruction. Every Ukrainian syllable has exactly one vowel."
  - "22 consonant letters + the soft sign –ђ (modifier, no sound of its own).
    Consonants = air is obstructed (lips, tongue, teeth)."
  - "Preview chart organized by category. M2 will master vowels, M3 will master
    consonants, M4 will complete special signs and the apostrophe."
- section: "–Я–µ—А—И—Ц 10 –ї—Ц—В–µ—А вАФ First 10 Letters"
  words: 350
  points:
  - "Today's practice set: –Р –Ю –£ –Ж (4 vowels) + –Ь –Э –Ґ –Ъ –° –Ы (6 consonants).
    These 10 high-frequency letters let you read real Ukrainian words immediately."
  - "Letter-by-letter introduction with pronunciation guidance:
    –Р вАФ open 'a' as in 'father'. –Ь вАФ like English M. –Ю вАФ rounded 'o' as in 'more'.
    –Э вАФ like English N (looks like H but is NOT H!). –£ вАФ 'oo' as in 'moon'.
    –Ґ вАФ like English T. –Ж вАФ 'ee' as in 'see'. –Ъ вАФ like English K.
    –° вАФ like English S. –Ы вАФ like English L (tongue position differs slightly)."
  - "Decodable words (use ONLY these 10 letters): –Љ–∞–Љ–∞ (mom), —В–∞—В–Њ (dad),
    –Ї—Ц—В (cat), –Љ–Њ–ї–Њ–Ї–Њ (milk), –Љ–∞—Б–ї–Њ (butter), –Њ–Ї–Њ (eye), –љ—Ц—Б (nose),
    –Љ—Ц—Б—В–Њ (city), –ї—Ц—Б (forest), —Б–Њ–љ (dream), –Љ–∞–Ї (poppy), —Б—Ц–Ї (juice),
    –ї—Г–Ї (onion/bow), —Б—В—Ц–ї (table), —В—Г—В (here), —В–∞–Љ (there)."
  - "Detailed phonetic walkthroughs: how to blend –Ь+–РвЖТ–Ь–Р, then –Ь–Р+–Ь–РвЖТ–Ь–Р–Ь–Р.
    How to read –Ъ+–Ж+–ҐвЖТ–Ъ–Ж–Ґ. Build from letters вЖТ syllables вЖТ words."
- section: "–Я–µ—А—И—Ц —Б–ї–Њ–≤–∞ вАФ First Words in Context"
  words: 200
  points:
  - "Micro-dialogues using decodable words + sight words:
    вАФ –¶–µ –Ї—Ц—В? вАФ –Ґ–∞–Ї, —Ж–µ –Ї—Ц—В. / вАФ –¶–µ –Љ—Ц—Б—В–Њ? вАФ –Э—Ц, —Ж–µ –ї—Ц—Б."
  - "Sight words (recognized as wholes, letters not yet all taught):
    –њ—А–Є–≤—Ц—В (hello), –і—П–Ї—Г—О (thank you), —Ж–µ (this is), —В–∞–Ї (yes), –љ—Ц (no).
    These appear constantly вАФ learn them as whole shapes now, decode them later."
  - "Reading practice: short sentences mixing decodable words and sight words.
    –Ь–∞–Љ–∞ —В—Г—В. –Ъ—Ц—В —В–∞–Љ. –¶–µ –Љ–Њ–ї–Њ–Ї–Њ. –¶–µ –Љ–∞—Б–ї–Њ."
- section: "–Я—Ц–і—Б—Г–Љ–Њ–Ї вАФ Summary"
  words: 100
  points:
  - "33 letters: 10 vowels, 22 consonants, 1 modifier (–ђ). Highly phonetic system."
  - "You mastered 10 letters today. You can read: –Љ–∞–Љ–∞, —В–∞—В–Њ, –Ї—Ц—В, –Љ–Њ–ї–Њ–Ї–Њ, –Љ—Ц—Б—В–Њ, –ї—Ц—Б."
  - "Self-check: Can you find all 10 vowel letters on the chart? Can you read
    –Љ–∞–Љ–∞ and –Ї—Ц—В? What is the difference between –±—Г–Ї–≤–Є and –Ј–≤—Г–Ї–Є?"
  - "Next: M2 deep-dives into the vowel system вАФ all 10 vowel letters."
vocabulary_hints:
  required:
  - "–Љ–∞–Љ–∞ (mom) вАФ decodable (–Ь+–Р+–Ь+–Р); universal first word; Bolshakova p.14"
  - "—В–∞—В–Њ (dad) вАФ decodable (–Ґ+–Р+–Ґ+–Ю); high-frequency family word"
  - "–Ї—Ц—В (cat) вАФ decodable (–Ъ+–Ж+–Ґ); high-frequency; Bolshakova"
  - "–Љ–Њ–ї–Њ–Ї–Њ (milk) вАФ decodable (–Ь+–Ю+–Ы+–Ю+–Ъ+–Ю); Bolshakova p.14"
  - "–Љ–∞—Б–ї–Њ (butter) вАФ decodable (–Ь+–Р+–°+–Ы+–Ю); Bolshakova p.15"
  - "–ї—Ц—Б (forest) вАФ decodable (–Ы+–Ж+–°); high-frequency"
  - "–Љ—Ц—Б—В–Њ (city) вАФ decodable (–Ь+–Ж+–°+–Ґ+–Ю); high-frequency"
  - "–Њ–Ї–Њ (eye) вАФ decodable (–Ю+–Ъ+–Ю); Bolshakova p.13"
  - "—В–∞–Ї (yes) вАФ decodable (–Ґ+–Р+–Ъ); survival word"
  - "–љ—Ц (no) вАФ decodable (–Э+–Ж); survival word"
  recommended:
  - "—Б–Њ–љ (dream/sleep) вАФ decodable (–°+–Ю+–Э); Bolshakova p.22"
  - "—Б–Њ–Љ (catfish) вАФ decodable (–°+–Ю+–Ь); Bolshakova p.22"
  - "–љ—Ц—Б (nose) вАФ decodable (–Э+–Ж+–°); body vocabulary"
  - "–Љ–∞–Ї (poppy) вАФ decodable (–Ь+–Р+–Ъ); Bolshakova"
  - "—Б—Ц–Ї (juice) вАФ decodable (–°+–Ж+–Ъ); everyday food word"
  - "—Б—В—Ц–ї (table) вАФ decodable (–°+–Ґ+–Ж+–Ы); everyday object"
  - "—В—Г—В (here) вАФ decodable (–Ґ+–£+–Ґ); high-frequency adverb"
  - "—В–∞–Љ (there) вАФ decodable (–Ґ+–Р+–Ь); high-frequency adverb"
  - "–ї—Г–Ї (onion/bow) вАФ decodable (–Ы+–£+–Ъ); everyday food"
  - "–Ї—Ц–љ–Њ (cinema) вАФ decodable (–Ъ+–Ж+–Э+–Ю); everyday word"
  sight_words:
  - "–њ—А–Є–≤—Ц—В (hello) вАФ sight word; greeting; uses letters –Я –† –Т –Ж –Ґ"
  - "–і—П–Ї—Г—О (thank you) вАФ sight word; politeness; uses letters –Ф –ѓ –Ъ –£ –Ѓ"
  - "—Ж–µ (this is) вАФ sight word; demonstrative; uses letter –¶"
activity_hints:
- type: watch-and-repeat
  focus: "Letter pronunciation вАФ hear and repeat each of the 10 practice letters"
  items: 10
- type: image-to-letter
  focus: "Match picture to Ukrainian word вАФ –Љ–∞–Љ–∞, –Ї—Ц—В, –Љ–Њ–ї–Њ–Ї–Њ, –Њ–Ї–Њ, –ї—Ц—Б, –Љ—Ц—Б—В–Њ"
  items: 8
- type: classify
  focus: "Sort the 10 practice letters into vowels (–Р –Ю –£ –Ж) vs consonants (–Ь –Э –Ґ –Ъ –° –Ы)"
  items: 10
- type: match-up
  focus: "Match Ukrainian letter to its sound (for false friends: –ЭвЙ†H, –°вЙ†C, –†вЙ†P)"
  items: 10
- type: fill-in
  focus: "Blend letters into syllables and words: –Ь+–РвЖТ–Ь–Р, –Ь–Р+–Ь–РвЖТ?"
  items: 8
- type: quiz
  focus: "Read and identify вАФ which word matches the picture?"
  items: 8
