content_outline:
- section: –£―¹―²―É–Ω βÄî Introduction
  words: 150
  points:
  - "Ukrainian uses Cyrillic script βÄî descended from Greek via the First Bulgarian
    Empire. 33 letters, highly phonetic: each letter usually maps to one sound
    (unlike English where 'ough' can sound 5 different ways)."
  - "Show the full 33-letter alphabet chart as a reference map. Learners don't
    memorize it all now βÄî they'll master each group in M2 (vowels), M3 (consonants),
    M4 (special signs). Today: overview + first 10 practice letters."
  - "Cultural hook: Cyrillic was created by students of Saints Cyril and Methodius.
    It is NOT derived from Latin βÄî it descends from the Greek alphabet."
- section: "–ë―É–Κ–≤–Η ―• –Ζ–≤―É–Κ–Η βÄî Letters and Sounds"
  words: 200
  points:
  - "Letters (–±―É–Κ–≤–Η) are written symbols. Sounds (–Ζ–≤―É–Κ–Η) are what you hear and
    pronounce. They are not the same thing βÄî Ukrainian has 38 phonemes but 33 letters."
  - "Key insight: Ukrainian spelling is highly phonetic βÄî one letter almost always
    represents one sound. This makes Ukrainian FAR easier to read than English.
    Once you learn the 33 letters, you can sound out any word."
  - "Some letters do double duty: iotated vowels (–· –° –³ –΅) can represent two sounds.
    The soft sign (–§) modifies the consonant before it. Details in M2 and M4."
- section: "–™–Ψ–Μ–Ψ―¹–Ϋ―• ―²–Α –Ω―Ä–Η–≥–Ψ–Μ–Ψ―¹–Ϋ―• βÄî Vowels and Consonants"
  words: 200
  points:
  - "10 vowel letters: 6 base (–ê –û –Θ –ï –‰ –Ü) + 4 iotated (–· –° –³ –΅).
    Vowels = voice only, no obstruction. Every Ukrainian syllable has exactly one vowel."
  - "22 consonant letters + the soft sign –§ (modifier, no sound of its own).
    Consonants = air is obstructed (lips, tongue, teeth)."
  - "Preview chart organized by category. M2 will master vowels, M3 will master
    consonants, M4 will complete special signs and the apostrophe."
- section: "–ü–Β―Ä―à―• 10 –Μ―•―²–Β―Ä βÄî First 10 Letters"
  words: 350
  points:
  - "Today's practice set: –ê –û –Θ –Ü (4 vowels) + –€ –ù –Δ –ö –Γ –¦ (6 consonants).
    These 10 high-frequency letters let you read real Ukrainian words immediately."
  - "Letter-by-letter introduction with pronunciation guidance:
    –ê βÄî open 'a' as in 'father'. –€ βÄî like English M. –û βÄî rounded 'o' as in 'more'.
    –ù βÄî like English N (looks like H but is NOT H!). –Θ βÄî 'oo' as in 'moon'.
    –Δ βÄî like English T. –Ü βÄî 'ee' as in 'see'. –ö βÄî like English K.
    –Γ βÄî like English S. –¦ βÄî like English L (tongue position differs slightly)."
  - "Decodable words (use ONLY these 10 letters): –Φ–Α–Φ–Α (mom), ―²–Α―²–Ψ (dad),
    –Κ―•―² (cat), –Φ–Ψ–Μ–Ψ–Κ–Ψ (milk), –Φ–Α―¹–Μ–Ψ (butter), –Ψ–Κ–Ψ (eye), –Ϋ―•―¹ (nose),
    –Φ―•―¹―²–Ψ (city), –Μ―•―¹ (forest), ―¹–Ψ–Ϋ (dream), –Φ–Α–Κ (poppy), ―¹―•–Κ (juice),
    –Μ―É–Κ (onion/bow), ―¹―²―•–Μ (table), ―²―É―² (here), ―²–Α–Φ (there)."
  - "Detailed phonetic walkthroughs: how to blend –€+–êβÜ£–€–ê, then –€–ê+–€–êβÜ£–€–ê–€–ê.
    How to read –ö+–Ü+–ΔβÜ£–ö–Ü–Δ. Build from letters βÜ£ syllables βÜ£ words."
- section: "–ü–Β―Ä―à―• ―¹–Μ–Ψ–≤–Α βÄî First Words in Context"
