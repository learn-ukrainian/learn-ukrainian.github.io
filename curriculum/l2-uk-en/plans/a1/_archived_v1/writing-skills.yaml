module: a1-059
level: A1
sequence: 59
slug: writing-skills
version: '2.0'
title: Writing Skills
subtitle: Pen to Paper
focus: vocabulary
pedagogy: PPP
phase: A1.6 [Real-World Skills]
word_target: 1200
objectives:
- Write a simple postcard in Ukrainian
- Fill in personal information on a form
- Compose a brief self-introduction paragraph
- Address an envelope in Ukrainian format
content_outline:
- section: Поштова листівка (Postcard)
  words: 300
  points:
  - 'Postcard structure: Привіт з Києва! (Greetings from Kyiv!) + 3-4 sentences about what you see/do + Бувай(те)! (Bye!)
    + Підпис (Signature). A fixed template for A1 writing.'
  - 'Useful phrases: Тут дуже гарно (It is very beautiful here). Погода чудова (The weather is wonderful). Я бачу... (I see...).
    Connecting visual experience to simple written sentences.'
  - 'Greeting variations: Привіт з + Genitive (city name). Вітаю з + Genitive (holiday). Practising the з + Genitive construction
    in a natural writing context.'
- section: Анкета (Form filling)
  words: 250
  points:
  - 'Common form fields: Прізвище (surname), Ім''я (first name), По батькові (patronymic), Дата народження (date of birth),
    Стать (gender), Адреса (address), Телефон (phone), Електронна пошта (email).'
  - 'How to fill them: Writing dates in Ukrainian format (day.month.year). Gender options: чоловіча/жіноча. Understanding
    what each field asks for and providing appropriate data.'
- section: Про себе (About yourself)
  words: 250
  points:
  - 'Self-description paragraph template: Мене звати... (My name is...). Мені ... років (I am ... years old). Я з... (I am
    from...). Я працюю/вчуся... (I work/study...). Моє хобі... (My hobby...).'
  - 'Writing a brief self-introduction (30-50 words): Combining previously learned patterns into a coherent written paragraph.
    Focus on logical flow and sentence connection.'
- section: Конверт та адреса (Envelope and address)
  words: 200
  points:
  - 'Ukrainian address format: Кому (To whom — Dative), Від кого (From whom — Genitive), Вулиця (Street), будинок (building
    number), квартира (apartment), місто (city), індекс (postal code).'
  - 'Differences from English format: Traditional Ukrainian postal format goes from general to specific (country → city → street
    → building), the opposite of the English specific-to-general order (name → street → city → country). Modern Ukrainian practice
    increasingly follows the Western order.'
- section: Практика (Practice)
  words: 200
  points:
  - 'Write a postcard: Given a destination and a few visual prompts, compose a short postcard using the template structure.'
  - 'Fill a form: Complete a simulated Ukrainian registration form with personal information. Compose a brief self-introduction
    paragraph (30-50 words).'
vocabulary_hints:
  required:
  - листівка (postcard) — Привіт з Києва!; written communication
  - анкета (form/questionnaire) — заповнити анкету; official document
  - прізвище (surname) — Ваше прізвище?; form field
  - ім'я (first name) — Ваше ім'я?; form field
  - адреса (address) — домашня адреса; form field and envelope
  - місто (city) — Київ, Львів; address component
  - вулиця (street) — вул. Хрещатик; address component
  - будинок (building) — будинок 5; address component
  - квартира (apartment) — квартира 12; address component
  - індекс (postal code) — поштовий індекс; address component
  recommended:
  - по батькові (patronymic) — Іванович/Іванівна; Ukrainian name tradition
  - дата народження (date of birth) — 15.03.1990; form field
  - конверт (envelope) — підписати конверт; postal vocabulary
  - марка (stamp) — поштова марка; postal vocabulary
