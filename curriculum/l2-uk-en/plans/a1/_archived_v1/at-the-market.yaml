module: a1-060
level: A1
sequence: 60
slug: at-the-market
version: '2.0'
title: At the Market
subtitle: Buying Fresh Produce
focus: practical
pedagogy: PPP
phase: A1.6 [Real-World Skills]
word_target: 1200
objectives:
- Learner can buy fresh produce at a market
- Learner can ask about prices and quantities
- Learner can negotiate politely
- Learner can describe what they want
content_outline:
- section: Вступ та культура (Introduction & Culture)
  words: 275
  points:
  - 'Культура українських ринків: Бессарабський ринок (Київ, 1912 р., стиль модерн, перші холодильники, репутація ''найдорожчого'')
    та легендарний Привоз (Одеса, 1827 р., гумор, легенда про слона Мурзу).'
  - 'Традиція «Спробуйте!»: культурна значущість дегустації товару (сир, мед, фрукти) перед покупкою як спосіб встановлення
    довіри між продавцем та покупцем.'
- section: Презентація лексики та граматики (Vocabulary & Grammar Presentation)
  words: 375
  points:
  - 'Одиниці виміру та споживчі товари згідно зі Стандартом §3.8: вивчення слів «кілограм», «грам», «штука», «пучок» у контексті
    овочів та фруктів.'
  - 'Граматична конструкція «кілограм + родовий відмінок»: засвоєння сталих виразів «кілограм яблук», «кілограм картоплі»
    як цілісних лексичних блоків без заглиблення в теорію відмінків.'
  - 'Ввічливі запити та ціна: використання «Дайте, будь ласка» та «Можна...» замість різкого «Я хочу»; питання «Скільки з
    мене?» як фінальний етап транзакції.'
- section: Мовні помилки та практика (Learner Errors & Practice)
  words: 275
  points:
  - 'Типова помилка: відмінювання після числівників 2-4 — вправа на корекцію форми «Два кілограм» на правильну «Два кілограми»
    (Nom.Pl) у порівнянні з «П''ять кілограмів» (Gen.Pl).'
  - 'Лексичний нюанс «Решта» vs «Здача»: закріплення слова «решта» (23× частотніше за «здача» в ГРАК); відпрацювання фраз
    «без решти» та «візьміть решту». Слово «здача» подається як синонім.'
  - 'Помилка вживання називного відмінка замість родового після міри ваги: дриль на заміну «Кілограм картопля» на «Кілограм
    картоплі».'
- section: Діалоги та рольові ігри (Dialogues & Roleplay)
  words: 275
  points:
  - 'Атмосфера одеського Привозу: рольова гра з елементами торгу («А дешевше можна?») та використанням колоритних фразеологізмів,
    як-от «тільки з грядки».'
  - 'Сценарій купівлі на вагу та поштучно: інтеграція всіх вивчених одиниць виміру та ввічливих форм у реалістичний діалог
    на ринку.'
vocabulary_hints:
  required:
  - ринок (market) — на ринку, піти на ринок; розмовний синонім «базар»
  - кілограм (kilogram) — один кілограм, два кілограми (Nom.Pl), п'ять кілограмів (Gen.Pl), пів кілограма
  - штука (piece) — одна штука, п'ять штук; часто використовується для поштучного товару
  - свіжий (fresh) — свіжі овочі, свіже молоко; ідіома «тільки з грядки» (fresh from the garden)
  - овочі (vegetables) — свіжі овочі, купити овочі на вагу
  - фрукти (fruits) — солодкі фрукти, сезонні фрукти
  - скільки (how much) — скільки коштує?, скільки з мене?, скільки це важить?
  - дайте (give me) — дайте, будь ласка; ввічлива форма наказового способу
  recommended:
  - решта (change) — без решти (exact change), візьміть решту; синонім «здача» менш частотний
  - продавець (vendor) — ввічливий продавець, запитати продавця про якість
  - яблука (apples) — кілограм яблук, солодкі яблука
  - картопля (potatoes) — кілограм картоплі, молода картопля
  - помідори (tomatoes) — червоні помідори, два кілограми помідорів
  - огірки (cucumbers) — свіжі огірки, п'ять штук огірків
