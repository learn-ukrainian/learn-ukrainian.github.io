module: a1-018
level: A1
sequence: 18
slug: i-want-i-can
version: 1.1.1
title: I Want, I Can
subtitle: Хочу, можу, мушу — expressing wants and abilities
focus: grammar
pedagogy: PPP
phase: A1.3 [Actions]
word_target: 1200
objectives:
- Use хотіти (want), могти (can), мусити (must) + infinitive
- Express desires, abilities, and obligations in present tense
- Handle irregular conjugation of хотіти and могти
- Build practical sentences for everyday needs
dialogue_situations:
- setting: Deciding which movie to watch or where to walk
  speakers:
  - Оля
  - Денис
  motivation: 'Хочу/можу/мушу + infinitive: Хочу піти в кіно, Не можу, мушу працювати'
content_outline:
- section: Діалоги (Dialogues)
  words: 300
  points:
  - 'Dialogue: Olya and Denys decide on an evening plan (cinema or walk). Use "Я хочу
    піти...", "Я не можу...", "Я мушу...". Focus on natural speech, not abstract descriptions.'
  - 'Dialogue 2 — At a café (preview for A1.6): — Я хочу каву. — Велику чи маленьку?
    — Велику. І ще я хочу їсти. Що ви можете порекомендувати? — Можу порекомендувати
    борщ! Хотіти + noun (no infinitive needed).'
- section: Хотіти (To Want)
  words: 280
  points:
  - 'Хотіти is irregular (Group I): я хочу, ти хочеш, він хоче, ми хочемо, ви хочете,
    вони хочуть. Note the т→ч change and the specific ending for each person. Uses:
    + infinitive or + noun in Accusative (e.g., хочу каву).'
  - 'Negation: Я не хочу їсти. Note that "не" typically precedes the modal, but avoid
    teaching absolute "never" rules as placement can vary for emphasis.'
- section: Могти і мусити (Can and Must)
  words: 300
  points:
  - 'Могти (can/able to) is irregular (Group I): я можу, ти можеш, ми можемо, вони
    можуть (г→ж change). It expresses ability, possibility, or permission (e.g., skills
    or requests).'
  - Мусити (must/have to) is Group II. It expresses obligation or necessity. Clarify
    that it denotes a requirement but not necessarily an "immediate" urgency.
- section: Підсумок — Summary
  words: 300
  points:
  - 'Summary: Compare desire, ability, and obligation with three simple sentences
    from a daily routine. Avoid abstract coaching and meta-narration like "In this
    module".'
vocabulary_hints:
  required:
  - хотіти (to want — irregular!)
  - могти (to be able/can — irregular!)
  - мусити (to must/have to)
  - кава (coffee, f)
  - їсти (to eat)
  recommended:
  - шкода (pity, unfortunately)
  - допомогти (to help)
  - борщ (borscht, m)
  - порекомендувати (to recommend)
  - треба (need to — impersonal, preview)
activity_hints:
- type: fill-in
  focus: 'Conjugate: я хоч__, ти хоч__, він хоч__'
  items: 9
- type: quiz
  focus: Хочу, можу, or мушу? Choose the right modal for the situation.
  items: 8
- type: fill-in
  focus: 'Complete: Я ___ гуляти, але не ___ — ___ працювати.'
  items: 6
- type: quiz
  focus: Regular or irregular? Identify the conjugation pattern.
  items: 6
connects_to:
- a1-019 (Questions)
prerequisites:
- a1-017 (Verbs Group II)
grammar:
- 'Modal verbs: хотіти, могти, мусити + infinitive'
- 'Irregular conjugation: хот-→хоч-, мог-→мож-'
- 'Мусити: regular Group II except я-form (мушу)'
- Хотіти + noun (Я хочу каву) vs хотіти + infinitive (Я хочу їсти)
register: розмовний
references:
- title: Караман Grade 10, p.179
  notes: Хотіти listed as Group I exception (despite -іти infinitive).
- title: Літвінова Grade 7, p.55
  notes: 'Exceptions: хотіти, гудіти, ревіти, іржати — Group I despite -іти.'
