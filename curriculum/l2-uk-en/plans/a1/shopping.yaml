title: Покупки
subtitle: Скільки коштує? — ціни, кількості та покупки в магазині
focus: communication
pedagogy: PPP
phase: A1.6 [Їжа та покупки]
word_target: 1200
objectives:
- Вміти запитувати та розуміти ціни (Скільки коштує?)
- Використовувати українську валюту (гривня) та числівники з цінами
- Купувати речі в магазині чи на ринку, використовуючи ввічливі фрази та мікродіалог на касі
- Висловлювати кількість готовими чанками (`один кілограм яблук`, `два кілограми помідорів`, `літр молока`, `пляшка води`)
- Розуміти короткі репліки про оплату (`З вас ... гривень`, `Можна карткою?`, `Карткою, будь ласка`)
- Впізнавати типові помилки теми покупок (`коштує/коштують`, `один кілограм`, `приміряти`)
dialogue_situations:
- setting: 'У супермаркеті — порівняння цін і завершення покупки: хліб — 25 грн, молоко — 42 грн, сир — 89 грн, яблука — 40 грн за кілограм. Покупець питає ціну, називає кількість і доходить до каси: З вас 107 гривень. Можна карткою?'
  speakers:
  - Мама
  - Дочка
  motivation: Ціни, кількість і оплата зі словами хліб (m), молоко (n), сир (m), яблука (pl), картка (f)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — На ринку: — Скільки коштує кілограм яблук? — Сорок гривень. — А помідори? — Тридцять п''ять гривень за кілограм. — Дайте, будь ласка, два кілограми помідорів і кілограм яблук. — Сімдесят п''ять гривень. — Ось, будь ласка. Ціни, кількості, ввічливе спілкування під час покупки на ринку.'
  - 'Діалог 2 — У супермаркеті: — Вибачте, де тут хліб? — Хліб у третьому ряді. — А молоко? — Молоко в холодильнику, там. — Скільки коштує цей сир? — Сто двадцять гривень. — Дорого! А є дешевший? — Так, ось цей — вісімдесят. Орієнтування, запитання про ціну, порівняння (дорого/дешево), модель `У вас є...?` / `А є дешевший?`.'
  - 'Діалог 3 — На касі: — Ось ваші яблука, молоко і сир. З вас сто сім гривень. — Можна карткою? — Так. — Карткою, будь ласка. — Дякую. Автор не обриває сцену покупки після `Дайте, будь ласка`, а доводить її до природного завершення: ціна за все + спосіб оплати.'
- section: Скільки коштує?
  words: 300
  points:
  - 'Моделі запитань про ціну й наявність: Скільки коштує [предмет]? Скільки коштують [предмети у множині]? У вас є [товар]? А є дешевший / дешевша? Базова вісь теми покупок: наявність → ціна → рішення.'
  - 'Числівники з цінами (повторення з модуля №12): 21 гривня, 32 гривні, 45 гривень, 100 гривень. Валюта: гривня (1), гривні (2-4), гривень (5+). Окремо дати мікродрил на `коштує/коштують`, бо це одна з головних помилок A1 у темі покупок.'
- section: Де купити?
  words: 300
  points:
  - 'Місця для покупок: магазин, супермаркет, ринок, аптека, крамниця. Конкретні відділи: м''ясний відділ, молочний відділ. Автор тримає перший діалог у межах одного місця продажу й не міксує базар, бутік і вокзальну касу в одній вправі.'
  - 'Слова для позначення кількості: один кілограм яблук, два кілограми помідорів, літр молока, пляшка води, пачка чаю, буханка хліба. Для A1 це не формальний урок відмінків, а готові торгові чанки; окремо відпрацювати `один кілограм`, `два кілограми`, `три пляшки`.'
  - 'Каса і завершення покупки: `З вас ... гривень`, `Можна карткою?`, `Карткою, будь ласка`, `Ось ... гривень`. `Карткою` / `готівкою` подавати як готові слова вибору, без окремого граматичного блоку про орудний відмінок.'
- section: Підсумок
  words: 300
  points:
  - 'Набір фраз для покупок: Запитати: У вас є [товар]? Скільки коштує? Де тут [предмет]? Купити: Дайте, будь ласка, [кількість] [предмет]. Реакція: Дорого! / Дешево! / Добре, беру. Оплата: З вас [сума]. Можна карткою? Карткою, будь ласка.'
  - 'Фінальна writer-note: модуль про покупки має повторити не лише слова, а й типові пастки — `коштує/коштують`, `один кілограм яблук`, `два кілограми помідорів`, `приміряти` (для необов''язкового розширення на одяг). Якщо цього немає в activity_hints, розходження між wiki і plan повернеться в учнівський контент.'
