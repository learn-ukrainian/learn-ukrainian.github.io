module: a1-040
level: A1
sequence: 40
slug: shopping
version: '1.0'
title: Shopping
subtitle: Market, prices, and quantities
focus: vocabulary
pedagogy: PPP
phase: A1.6 [Food & Shopping]
word_target: 1200
objectives:
- Ask for prices using 'Скільки коштує?'
- Shop at a market (ринок) or supermarket (супермаркет)
- Use Genitive case for basic quantities
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: At the local market (ринок). Asking ''Скільки коштує цей сир?'''
  - 'Dialogue 2: At the supermarket checkout. Bag (пакет), paying by card or cash.'
- section: Скільки коштує? (How much does it cost?)
  words: 400
  points:
  - Review numbers 1-1000 for prices.
  - Using 'Скільки коштує + Nominative' (singular) and 'Скільки коштують + Nominative' (plural).
- section: 'Трохи граматики: Багато/Мало (Genitive Quantities)'
  words: 400
  points:
  - Introduce Genitive case ending -у/-а (masc), -и/-і (fem) only after words denoting quantity.
  - 'Chunks: кілограм яблук, літр молока, багато води, мало часу.'
vocabulary_hints:
  required:
  - скільки коштує
  - ринок
  - супермаркет
  - гроші
  - картка
  - пакет
  - багато
  - мало
  - кілограм
  - літр
  recommended:
  - готівка
  - ціна
  - купувати
  - продавець
activity_hints:
- type: matching
  focus: Match prices to spoken numbers
  items: 10
- type: fill-in
  focus: Fill in Genitive endings after quantity words
  items: 10
connects_to:
- a1-041 (People Around Me)
prerequisites:
- a1-012 (Numbers And Money)
grammar:
- Genitive with quantities (багато, мало, кілограм)
register: розмовний
references: []
