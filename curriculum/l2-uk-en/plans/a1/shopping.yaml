module: a1-039
level: A1
sequence: 39
slug: shopping
version: '1.2.2'
title: Покупки
subtitle: Скільки коштує? — ціни, кількості та покупка речей
focus: communication
pedagogy: PPP
phase: A1.6 [Їжа та покупки]
word_target: 1200
objectives:
- Вміти запитувати та розуміти ціни (Скільки коштує?)
- Використовувати українську валюту (гривня, копійка) та числівники з цінами
- Купувати речі в магазині чи на ринку, використовуючи ввічливі фрази
- Висловлювати кількість (кілограм, літр, пачка, пляшка)
dialogue_situations:
- setting: 'У супермаркеті — порівняння цін: хліб — 25 грн, молоко — 42 грн, сир — 89 грн, ковбаса — 120 грн, масло — 65 грн. Скільки коштує сир? А молоко?'
  speakers:
  - Мама
  - Дочка
  motivation: Ціни зі словами хліб, молоко, сир, ковбаса, масло
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — На ринку: — Скільки коштує кілограм яблук? — Сорок гривень. — А помідори? — Тридцять п''ять гривень за кілограм. — Дайте, будь ласка, два кілограми помідорів і кілограм яблук. — Сімдесят п''ять гривень. — Ось, будь ласка. Ціни, кількості, ввічливе спілкування під час покупки на ринку.'
  - 'Діалог 2 — У супермаркеті: — Вибачте, де тут хліб? — Хліб у третьому ряді. — А молоко? — Молоко в холодильнику, там. — Скільки коштує цей сир? — Сто двадцять гривень. — Дорого! А є дешевший? — Так, ось цей — вісімдесят. Орієнтування, запитання про ціну, порівняння (дорого/дешево).'
- section: Скільки коштує?
  words: 300
  points:
  - 'Моделі запитань про ціну: Скільки коштує [предмет]? — [число] гривень/гривні/гривня. Скільки коштують [предмети у множині]? — дієслово узгоджується з формою множини. Валюта: гривня (1), гривні (2-4), гривень (5+). Копійка: сота частина гривні (часто округлюється).'
  - 'Числівники з цінами (повторення з модуля №12): 21 гривня, 32 гривні, 45 гривень, 100 гривень. Дорого! Дешево! Нормальна ціна. Є знижка? За все — [сума].'
- section: Де купити?
  words: 300
  points:
  - 'Місця для покупок: магазин, супермаркет, ринок, аптека, крамниця (український синонім до "магазин"). Конкретні відділи: м''ясний відділ, молочний відділ.'
  - 'Слова для позначення кількості: кілограм: кілограм яблук, два кілограми помідорів. літр: літр молока, два літри соку. пачка: пачка масла, пачка чаю. пляшка: пляшка води, пляшка соку. буханка: буханка хліба. Усі вони вимагають родового відмінка після себе — на рівні А1 вивчаються як цілісні фрази.'
- section: Підсумок
  words: 300
  points:
  - 'Набір фраз для покупок: Запитати: Скільки коштує? Де тут [предмет]? Купити: Дайте, будь ласка, [кількість] [предмет]. Реакція: Дорого! / Дешево! / Добре, беру. Оплата: Скільки за все? Можна карткою? Самоперевірка: "Купи" 3 товари на ринку. Запитай ціну, обери кількість, розрахуйся.'
vocabulary_hints:
  required:
  - коштувати (to cost)
  - скільки (how much/many)
  - гривня (hryvnia, f)
  - ціна (price, f)
  - магазин (shop, m)
  - ринок (market, m)
  - купувати (to buy)
  - дорого (expensive — adverb)
  - дешево (cheap — adverb)
  recommended:
  - копійка (kopeck, f)
  - кілограм (kilogram, m)
  - літр (liter, m)
  - пляшка (bottle, f)
  - пачка (pack, f)
  - знижка (discount, f)
  - супермаркет (supermarket, m)
  - гроші (money, pl.)
  - готівка (cash, f)
