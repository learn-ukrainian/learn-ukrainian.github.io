module: a1-22
level: A1
sequence: 22
slug: tomorrow-future-tense
version: '2.0'
title: Tomorrow - Future Tense
subtitle: Talking About What Will Happen
content_outline:
- section: Warm-up
  points:
  - Контраст теперішнього, минулого та майбутнього часу — cross-ref to A1-21 (Yesterday)
- section: Presentation
  points:
  - 'Складений майбутній (буду + інфінітив) — focus heavily on this structure (State
    Standard §4.2.4.1); learner error: aspect clash (e.g., *буду прочитати instead
    of буду читати)'
  - 'Дієвідміна буду (буду, будеш, буде, будемо, будете, будуть) — learner error:
    conjugation drift (mixing 1st/2nd pl endings)'
  - Синтетичний майбутній (-му, -меш, -ме) — згадка — limit to brief 'FYI' to avoid
    overwhelming learner
- section: Presentation 2
  points:
  - 'Вираження планів (Я буду працювати) — cultural hook: «Не кажи ''гоп'', поки не
    перескочиш» (caution with plans)'
  - 'Вираження намірів (Я хочу..., Я збираюся...) — collocations: хочу знати, збиратися
    додому'
- section: Presentation 3
  points:
  - 'Завтра, післязавтра, наступного тижня — collocations: завтра вранці, завтра ввечері;
    grammar note: practice genitive endings for ''наступного'''
  - 'У понеділок, у січні, наступного року — collocations: наступного року'
- section: Presentation 4
  points:
  - 'Скоро, незабаром, потім, пізніше — cultural hook: «Завтра буде новий день» (optimism/resilience)'
- section: Presentation 5
  points:
  - 'Плани на вихідні — collocations: мати плани, складати план'
  - Плани на відпустку
- section: Practice
  points:
  - Діалог про плани на вечір
  - Діалог про плани на канікули
- section: Practice 2
  points:
  - Розповідь про свої плани на завтра
vocabulary_hints:
  required:
  - завтра (tomorrow) — завтра вранці, завтра ввечері
  - 'буду (I will) — я буду там, будемо працювати; learner error: do not use for perfective
    verbs'
  - наступний (next) — наступного тижня, наступного року
  - план (plan) — мати плани, складати план
  - хотіти (to want) — хочу знати, дуже хочемо
  - збиратися (to be going to) — збиратися додому, збиратися в дорогу
  - незабаром (soon) — незабаром весна, незабаром побачимося
  - потім (then, later) — а потім, потім скажу
  recommended:
  - тиждень (week)
  - рік (year)
  - сподіватися (to hope)
  - мріяти (to dream)
  - планувати (to plan)
  - обіцяти (to promise)
activity_hints:
- type: fill-in
  focus: Complete future tense sentences
  items: 20
focus: grammar
pedagogy: PPP
