module: a1-37
level: A1
sequence: 37
slug: tomorrow-future-tense
version: '2.0'
title: Tomorrow - Future Tense
subtitle: Talking About What Will Happen
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - 'Контраст теперішнього, минулого та майбутнього часу — посилання на модуль A1-21
    (Yesterday). Повторення логіки часової лінії: де ми зараз і де ми будемо.'
  - 'Культурний контекст оптимізму: розбір фрази «Завтра буде новий день» як приклад
    використання майбутнього часу для вираження надії та стійкості.'
- section: Презентація граматики (Grammar Presentation)
  words: 600
  points:
  - Складений майбутній час (буду + інфінітив) згідно з Державним стандартом §4.2.4.1.
    Повна таблиця дієвідміни допоміжного дієслова «бути» (буду, будеш, буде, будемо,
    будете, будуть).
  - 'Попередження про помилку (Learner Error): Конфлікт видів. Чітке правило — «буду»
    вживається лише з дієсловами недоконаного виду. Тренування на розрізнення: «буду
    читати» (correct) vs «буду прочитати» (wrong).'
  - Синтетичний майбутній час (працюватиму, працюватимеш) — ознайомчий огляд (FYI)
    для розпізнавання в автентичних текстах без глибокого вивчення на рівні A1.
- section: Лексика та культурний контекст (Vocabulary and Culture)
  words: 600
  points:
  - 'Часові маркери майбутнього: завтра, післязавтра, скоро. Специфіка вживання виразів:
    завтра вранці, завтра вдень, завтра ввечері (висока частотність).'
  - 'Конструкція «наступного тижня/року»: вивчення родового відмінка (Genitive) для
    часових виразів. Learner Error: уникнення прямого перекладу з англійської «next
    week» (Nominative).'
  - 'Вираження планів та намірів: різниця між «буду» (впевненість) та «хочу/збираюся»
    (намір). Культурний аспект: «Не кажи ''гоп'', поки не перескочиш» — обережність
    українців у плануванні (superstition hook).'
- section: Практика та підсумок (Practice and Summary)
  words: 400
  points:
  - 'Відпрацювання розмовних конструкцій: плани на вихідні та вечір. Використання
    словосполучень: мати плани, складати план, плани на майбутнє.'
  - 'Підсумковий діалог: рольова гра «Організатор подій». Планування канікул або робочого
    тижня з фокусом на правильну дієвідміну «бути» та використання родового відмінка
    часу.'
vocabulary_hints:
  required:
  - завтра (tomorrow) — завтра вранці, завтра вдень, завтра ввечері; High frequency
    (Top 100)
  - буду (I will) — я буду там, будемо працювати; граматичний маркер лише для недоконаного
    виду
  - наступний (next) — наступного тижня, наступного року, наступного разу; вимагає
    родового відмінка у часових виразах
  - план (plan) — мати плани, складати план, плани на майбутнє; High frequency
  - хотіти (to want) — хочу знати, хочу сказати, дуже хочу; вираження наміру (High
    frequency)
  - збиратися (to be going to) — збиратися додому, збиратися в дорогу; вираження інтенції
  - скоро (soon) — скоро буду, дуже скоро, як скоро; висока частотність у розмовах
    про плани
  - потім (then, later) — а потім, потім скажу; вживання для послідовності дій
  recommended:
  - тиждень (week) — наступного тижня
  - рік (year) — наступного року
  - сподіватися (to hope) — сподіваюся, що все буде добре
  - мріяти (to dream) — мріяти про відпустку
  - планувати (to plan) — планувати час, планувати подорож
  - пізніше (later) — трохи пізніше
