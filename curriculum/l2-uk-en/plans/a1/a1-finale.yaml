module: a1-055
level: A1
sequence: 55
slug: a1-finale
version: '1.3.1'
title: Фінал А1
subtitle: Один повний день в українському місті — усе, що ви вивчили
focus: review
pedagogy: PPP
phase: А1.8 [Минулий, майбутній час, випуск]
word_target: 1200
objectives:
- Симулювати повний день в українському місті, використовуючи всі навички рівня А1
- Орієнтуватися в реальних ситуаціях: ранкова рутина, транспорт, кафе, покупки, спілкування
- Природно використовувати всі три часи в контексті
- Продемонструвати готовність до рівня А2 через інтегроване спілкування
dialogue_situations:
- setting: Останній день курсу А1 — одногрупники діляться враженнями від навчання і прощаються, обмінюючись контактами, щоб залишатися на зв'язку
  speakers:
  - Студент 1
  - Студент 2
  motivation: 'Прощання + рефлексія: Я вивчив/вивчила стільки! До зустрічі на А2!'
- setting: Учень розповідає своїй українській подрузі про свої плани після завершення курсу А1 — що він хоче робити в Україні далі
  speakers:
  - Учень
  - Українська подруга
  motivation: 'Майбутній час + святкування: Я буду подорожувати! Я хочу побачити Карпати!'
content_outline:
- section: Ранок
  words: 300
  points:
  - 'Ситуація: ви прокидаєтеся в Києві. 7:00 — Ти прокинувся/прокинулася в готелі. (Минулий час — M48) Доброго ранку! Яка сьогодні погода? — Сьогодні тепло і сонячно. (Погода — M24) Ти снідаєш у кафе: Будь ласка, каву з молоком і круасан. (Їжа — M36, кафе — M28) Скільки коштує? — Сто двадцять гривень. (Числа — M10, покупки — M37) Дякую! До побачення! (Привітання — M01-M05)'
  - 'Пересування містом: Вибачте, як дістатися до Хрещатика? — Їдьте на метро, станція Хрещатик. (Транспорт — M34) Ти купуєш квиток. Один квиток, будь ласка. (Числа, ввічливі прохання — M43) В метро ти дивишся на карту. Тобі потрібна зелена лінія. (Кольори — M22) Розповідь у минулому часі + дії в теперішньому часі.'
- section: День
  words: 300
  points:
  - 'Прогулянка містом: Ти гуляєш по Хрещатику. Яка гарна вулиця! (Місто — M30, прикметники — M09) Ти бачиш великий магазин. Ти заходиш і купуєш сувеніри. (Покупки — M37) Скільки коштує ця вишиванка? — Тисяча двісті гривень. Дорого! (Вказівні займенники — M12) А ця? — Ця — вісімсот. — Добре, я беру! (Цей/ця/це — M12)'
  - 'Обід з новим другом/подругою: В кафе ти зустрічаєш Олену. — Привіт! Ти звідки? — Я з Канади. (Звідки — M06) — Що ти робиш тут? — Я вивчаю українську! (Дієслова — M16-17) — Як цікаво! Ходімо обідати! (Наказовий спосіб — M43) Ти замовляєш борщ і вареники. Олена замовляє салат. (Їжа — M36) — Смачно! Ти добре говориш українською! — Дякую!'
- section: Вечір
  words: 300
  points:
  - 'Плани на вечір: — Що будемо робити ввечері? — Ходімо в кіно! (Майбутній час — M50, запрошення — M51) — Добре! О котрій? — О сьомій. (Час — M26) Ви дивитеся український фільм. Ти не все розумієш, але багато! (Сполучники — M44) Після кіно ви йдете в ресторан. (Після — M44, напрямки — M31)'
  - 'Рефлексія про минулий день: Ввечері в готелі ти думаєш про свій день. Сьогодні був чудовий день! Зранку я снідав/снідала у кафе. Потім я гуляв/гуляла по місту і познайомився/познайомилася з Оленою. Ввечері ми ходили в кіно і ресторан. Завтра я буду їздити по Києву. Я хочу побачити Лавру! Усі три часи в природній розповіді — минулий (день), теперішній (почуття), майбутній (завтра).'
- section: Підсумок
  words: 300
  points:
  - 'Чекліст навичок А1 — усе, що ви вмієте: Вітатися, представлятися, говорити, звідки ви (A1.1). Описувати людей, речі, свою родину (A1.2). Говорити про дії, вподобання, звички (A1.3). Називати час, обговорювати погоду, називати дні та місяці (A1.4). Орієнтуватися в місті, пояснювати напрямок, користуватися транспортом (A1.5). Замовляти їжу, робити покупки, поводитися з грошима (A1.6). Ввічливо звертатися до людей, давати вказівки, поєднувати думки (A1.7). Говорити про минуле, будувати плани, розмовляти про здоров''я та екстрені ситуації (A1.8).'
  - 'Що далі — анонс рівня А2: Ви опануєте: відмінки, вид дієслова (доконаний/недоконаний), синтетичний майбутній час (прочитаю), підрядні речення та багато іншого. Але зараз — час святкувати! Ти вивчив/вивчила A1! Вітаю! Ти вже можеш жити в українському місті. Це тільки початок! Самоперевірка: Чи можете ви описати СВІЙ день в українському місті 10 і більше реченнями?'
vocabulary_hints:
  required:
  - готовий (ready, adj m)
  - вітаю (congratulations — chunk)
  - початок (beginning, m)
  - сувенір (souvenir, m)
  - квиток (ticket, m)
  - зустріти (to meet)
  recommended:
  - круасан (croissant, m)
  - карта (map, f)
  - лінія (line, f)
  - фільм (film, m)
  - познайомитися (to get acquainted)
  - подорожувати (to travel)
  - Лавра (Lavra — Kyiv monastery)
  - готель (hotel, m)
activity_hints:
- type: order
  focus: Розташувати події дня в хронологічному порядку.
  items:
  - Зранку я прокинувся в готелі.
  - Потім я снідав у кафе.
  - Після сніданку я їхав на метро в центр.
  - Я гуляв по місту і купив сувеніри.
  - Вдень я обідав з новою подругою Оленою.
  - Ввечері ми ходили в кіно.
  - Потім ми вечеряли в ресторані.
  - Вночі я повернувся в готель і відпочивав.
- type: fill-in
  focus: Доповнити речення, що розповідають про день, використовуючи минулий, теперішній та майбутній часи.
  items:
  - '{Зранку|Завтра|Ввечері} я снідав у кафе.'
  - Зараз я {гуляю|гуляв|буду гуляти} по Хрещатику, тут дуже гарно!
  - Учора я {купив|купую|буду купувати} квиток на поїзд.
  - Завтра я {буду подорожувати|подорожував|подорожую} по Україні.
  - Ввечері ми {ходили|ходимо|будемо ходити} в кіно.
  - Зараз Олена {замовляє|замовляла|замовить} борщ і салат.
  - Учора була гарна погода, і ми {гуляли|гуляємо|будемо гуляти} в парку.
  - Я вже {готовий|готова|впевнений} до рівня А2! Вітаю!
- type: match-up
  focus: З'єднати ситуацію з відповідною фразою для виживання рівня А1.
  items:
  - Замовлення кави == Будь ласка, каву з молоком.
  - Як запитати дорогу == Вибачте, як дістатися до метро?
  - Купівля сувеніра == Скільки коштує ця вишиванка?
  - Знайомство == Привіт! Звідки ти?
  - Екстрена ситуація == Допоможіть! Викличте швидку!
  - В аптеці == Дайте, будь ласка, таблетки від головного болю.
  - Прощання == Дякую! До побачення!
- type: quiz
  focus: Повторення ключової граматики та лексики для виживання рівня А1.
  items:
  - question: Як запитати про ціну квитка?
    options:
    - Скільки коштує квиток?
    - Де тут квиток?
    - Дайте один квиток.
  - question: Ви запрошуєте друга в кафе. Що ви скажете?
    options:
    - Ходімо в кафе!
    - Я був у кафе.
    - Де кафе?
  - question: Як сказати 'My head hurts'?
    options:
    - У мене болить голова.
    - У мене температура.
    - Я хворий.
  - question: Хтось питає 'Де ви?'. Як ви відповісте?
    options:
    - Я на вулиці Хрещатик.
    - Мене звати Адам.
    - Я з Канади.
  - question: Який час у реченні 'Завтра я буду читати книгу'?
    options:
    - Майбутній
    - Минулий
    - Теперішній
connects_to: []
prerequisites:
- a1-054 (Екстрені ситуації)
grammar:
- Повторення: усі три часи (минулий, теперішній, майбутній) в інтегрованому контексті
- Повторення: наказовий спосіб для прохань та запрошень
- Повторення: У мене болить, Мені потрібен — безособові конструкції
- Без нової граматики — інтеграція та закріплення всієї граматики рівня А1
