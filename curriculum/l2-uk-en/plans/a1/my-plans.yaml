module: a1-054
level: A1
sequence: 54
slug: my-plans
version: '1.0'
title: My Plans
subtitle: Weekend and vacation planning
focus: communication
pedagogy: PPP
phase: A1.8 [Past, Future & Graduation]
word_target: 1200
objectives:
- Discuss weekend or vacation plans
- Use future tense in scheduling and making arrangements
- Express intentions using 'планувати' (to plan)
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Planning the weekend. ''Що ми будемо робити в суботу?'''
  - 'Dialogue 2: Booking a hotel or planning a trip for the summer. ''Ми будемо жити в готелі.'''
- section: Мої плани (My plans)
  words: 400
  points:
  - 'Using verbs of intention: Я планую + infinitive, Я хочу + infinitive.'
  - Combining future tense with days of the week (У п'ятницю я буду...).
- section: Відпустка і вихідні (Vacation and weekends)
  words: 400
  points:
  - 'Vocabulary for trips: море (sea), гори (mountains), готель (hotel), квиток (ticket).'
vocabulary_hints:
  required:
  - планувати
  - відпустка
  - вихідні
  - море
  - гори
  - готель
  - квиток
  - їхати
  recommended:
  - подорожувати
  - валіза
  - бронювати
activity_hints:
- type: multiple-choice
  focus: Choose the logical future action based on a scenario
  items: 8
- type: fill-in
  focus: Complete scheduling dialogue
  items: 10
connects_to:
- a1-055 (My Story)
prerequisites:
- a1-053 (What Will Happen Future)
- a1-023 (Days And Weeks)
grammar:
- Future tense practice
- Infinitive after 'планувати'
register: розмовний
references: []
