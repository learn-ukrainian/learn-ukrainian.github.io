module: a1-051
level: A1
sequence: 51
slug: my-plans
version: 1.2.2
title: Мої плани
subtitle: У суботу я буду... — розклад та плани на вихідні
focus: communicative
pedagogy: PPP
phase: A1.8 [Минуле, майбутнє, підсумки]
word_target: 1200
objectives:
- Вміти говорити про плани на вихідні та тиждень, використовуючи складену форму майбутнього часу
- Навчитися складати розклад занять із зазначенням конкретних днів та часу
- Вміти поєднувати майбутній час із виразами часу (у суботу, о третій, ввечері)
- Навчитися запрошувати когось та відповідати на запрошення, використовуючи майбутній час
dialogue_situations:
- setting: Груповий чат плануємо вихідні — У суботу буду прибирати квартиру (f). А я буду бігати в парку (m). Може, ввечері підемо в кіно (n)? Ходімо! О котрій?
  speakers:
  - Група друзів (3 people)
  motivation: Майбутній час + планування зі словами квартира(f), парк(m), кіно(n)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Будуємо плани: — Що ти будеш робити у суботу? — Зранку я буду прибирати квартиру. — А вдень? — Вдень я буду ходити в магазин. А ти? — Я буду відпочивати! Може, підемо в кафе ввечері? — Добре! О котрій? — О шостій. Добре? — Чудово! До зустрічі у суботу! Майбутній час + час доби + запрошення.'
  - 'Діалог 2 — Насичений тиждень: — У тебе є плани на тиждень? — Так, багато! У понеділок я буду працювати допізна. — У вівторок буду вчитися. У середу — зустріч з друзями. — А у четвер? — У четвер я буду готувати на вечірку. — А в п''ятницю? — В п''ятницю — вечірка! Ти будеш? — Звичайно буду! Дні тижня + планування на майбутнє.'
- section: Планування
  words: 300
  points:
  - 'Шаблони планування: У + день: у понеділок, у вівторок, у середу, у четвер, у п''ятницю. У суботу / в неділю. О + час: о дев''ятій, о третій, о шостій. Зранку / вдень / ввечері. Поєднання: У суботу ввечері я буду дивитися фільм.'
  - 'Фрази для запрошення: Ходімо в кафе! (наказовий спосіб із модуля M43). Може, підемо в кіно? Ти будеш вільний/вільна у суботу? Давай зустрінемося о п''ятій! Відповіді: Добре! Чудово! З задоволенням! На жаль, не можу.'
- section: Мій тиждень
  words: 300
  points:
  - 'Зразок плану — Тиждень Тараса: У понеділок я буду працювати. Після роботи буду вчити українську. У вівторок я буду обідати з другом у кафе. У середу ввечері я буду дивитися футбол. У четвер я буду готувати вечерю для родини. У п''ятницю я буду відпочивати — піду в кіно. У суботу зранку буду прибирати, а вдень гуляти в парку. В неділю я буду спати довго! Кожен день = буду + дія.'
  - 'Ваша черга — сплануйте свій тиждень: Шаблон: У [день] я буду [дія]. Додайте деталі: час (о котрій?), місце (де?), з ким (з ким?). У суботу о десятій я буду гуляти в парку з другом. Використовуйте всю лексику рівня A1: місця, їжу, людей, дії.'
- section: Підсумок
  words: 300
  points:
  - 'Інструменти планування: День + час + буду + інфінітив: У суботу о третій я буду готувати обід. Запрошення: Ходімо! Може, підемо? Давай зустрінемося! Відповіді: Добре! З задоволенням! На жаль, не можу. Повторення днів тижня: понеділок, вівторок, середа, четвер, п''ятниця, субота, неділя. Самоперевірка: Сплануйте свої ідеальні вихідні — що ви будете робити в суботу та неділю?'
vocabulary_hints:
  required:
  - план (plan, m)
  - тиждень (week, m)
  - вільний (free, adj)
  - зустріч (meeting, f)
  - відпочивати (to rest)
  - прибирати (to clean)
  - вечірка (party, f)
  recommended:
  - зустрінемося (let's meet — chunk)
  - з задоволенням (with pleasure)
  - на жаль (unfortunately)
  - допізна (until late)
  - звичайно (of course)
  - квартира (apartment, f)
  - кіно (cinema, n)
  - вчити (to study/learn)
activity_hints:
- type: fill-in
  focus: Поєднайте дні тижня, час та майбутній час
  items:
  - У {понеділок|вівторок|середу} я буду працювати.
  - У суботу {зранку|ввечері|вдень} я буду прибирати квартиру.
  - '{О|В|На} шостій ми будемо дивитися кіно.'
  - У {неділю|суботу|п'ятницю} він буде відпочивати.
  - У п'ятницю {ввечері|зранку|вдень} буде вечірка.
- type: matching
  focus: З'єднайте запрошення з природними відповідями
  pairs:
  - Ходімо в кіно!: З задоволенням!
  - Може, підемо в кафе?: Добре! О котрій?
  - Ти будеш вільний у суботу?: На жаль, не можу.
  - Давай зустрінемося о п'ятій!: Чудово! До зустрічі!
- type: fill-in
  focus: Завершіть розклад планів на тиждень
  items:
  - У вівторок я {буду вчити|вчив|вчу} українську.
  - У середу ми {будемо готувати|готували|готуємо} вечерю.
  - У четвер вона {буде працювати|працювала|працює} допізна.
connects_to:
- a1-052 (Моя історія)
prerequisites:
- a1-050 (Що буде?)
grammar:
- 'Складена форма майбутнього часу при плануванні: день + час + буду + інфінітив'
- 'Конструкції для запрошення: Ходімо! Може, підемо? Давай зустрінемося!'
- 'Прийменники з днями тижня: у понеділок, у суботу, в неділю'
register: розмовний
references:
- title: State Standard 2024, §4.2.4.1
  notes: 'Майбутній час застосовується у контексті планування та складання розкладу.'
