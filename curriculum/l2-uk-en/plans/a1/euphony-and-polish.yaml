module: a1-063
level: A1
sequence: 63
slug: euphony-and-polish
version: '2.0'
title: Euphony and Polish
subtitle: Making Ukrainian Sound Natural
focus: grammar
pedagogy: PPP
phase: A1.6 [Real-World Skills]
word_target: 2000
objectives:
- Apply у/в alternation correctly
- Apply і/й alternation correctly
- Apply з/із/зі alternation correctly
- Produce natural-sounding Ukrainian speech
content_outline:
- section: У/В чергування (U/V alternation)
  words: 500
  points:
  - 'Core rule: у after consonant, в after vowel. У мене є книга (after silence/consonant). Я в школі (after vowel я). Preventing
    consonant clusters for smooth phonetic flow.'
  - 'Exceptions and flexibility: Beginning of sentence — both acceptable, but у preferred after pause. В Україні vs У країні.
    Regional variation and modern usage trends.'
  - 'Practice pattern: Identifying correct form in context. Historical and phonological basis — Ukrainian euphony preserves
    vowel-consonant alternation for melodic speech.'
- section: І/Й чергування (I/Y alternation)
  words: 400
  points:
  - 'Core rule: і after consonant, й after vowel. Батько і мати (і after consonant о). Андрій й Олена (й after vowel й/і).
    Preventing vowel hiatus for natural rhythm.'
  - 'Common learner errors: Using і everywhere regardless of context. Drill pairs: брат і сестра (correct) vs *мама і тато
    (should be мама й тато after vowel а).'
  - 'Edge cases: After vowel at word boundary — й preferred. Та as alternative conjunction that avoids the і/й choice entirely.
    Communicative flexibility.'
- section: З/Із/Зі чергування (Z/Iz/Zi alternation)
  words: 400
  points:
  - 'Three-way rule: з before vowels and single consonants (з Києва, з другом). Із before consonant clusters (із Львова).
    Зі before з, с, ш, щ (зі школи, зі мною).'
  - 'Mnemonic: зі for sibilants (з/с/ш/щ), із for clusters, з everywhere else. Examples: з роботи, із стадіону, зі столу.
    Building automatic selection.'
  - 'Preposition vs prefix: з as preposition (з Києва) vs з- as prefix (зробити). Only the preposition follows euphony rules.
    The prefix is fixed.'
- section: Інші правила евфонії (Other euphony rules)
  words: 350
  points:
  - 'Ці/Цей euphonic patterns: ці книги (these books) — demonstrative pronoun. Цей підручник (this textbook). No alternation,
    but awareness of similar-sounding pairs.'
  - 'Prefix/preposition doubling for smooth flow: удень/вдень, увечері/ввечері. Informal vs formal register preferences. Modern
    usage tends toward simplification.'
- section: Практика (Practice)
  words: 350
  points:
  - 'Euphony correction drills: Given sentences with incorrect euphonic forms, identify and fix the errors. Building editorial
    awareness.'
  - 'Reading aloud for flow: Practice sentences designed to test all three alternation rules in sequence. Developing natural-sounding
    Ukrainian speech patterns.'
vocabulary_hints:
  required:
  - у/в (in/at) — У мене / Я в школі; euphonic alternation pair
  - і/й (and) — батько і мати / мама й тато; conjunction alternation
  - з/із/зі (from/with) — з Києва / із Львова / зі школи; preposition alternation
  - мене (me — Genitive) — У мене є...; high-frequency pronoun form
  - школа (school) — у школі / зі школи; common noun for practice
  - Київ (Kyiv) — з Києва, у Києві; proper noun for practice
  - Львів (Lviv) — із Львова, у Львові; proper noun for practice
  - батько (father) — батько і мати; conjunction context
  - мати (mother) — мама й тато; conjunction context
  recommended:
  - евфонія (euphony) — linguistic term; metalanguage for advanced learners
  - чергування (alternation) — linguistic term; pattern description
  - приголосний (consonant) — after consonant → у; phonetic term
  - голосний (vowel) — after vowel → в; phonetic term
