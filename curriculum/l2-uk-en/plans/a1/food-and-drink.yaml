title: Їжа та напої
subtitle: Їжа і напої — що українці їдять і п'ють
focus: vocabulary
pedagogy: PPP
phase: A1.6 [Їжа та покупки]
word_target: 1200
objectives:
- Називати поширені українські страви та напої
- Вживати «кава з молоком», «чай з цукром», «без цукру», «без молока» як завчені фрази (НЕ як формальний урок про відмінки)
- Розповідати про те, що ви їсте і п'єте щодня
- Розпізнавати знакові українські страви (борщ, вареники, сало)
- Розрізняти природні українські харчові формули (`сир`, `смажена`, `Смачного!`, `Я снідаю`) і типові росіянізми / буквальні кальки
dialogue_situations:
- setting: 'Приготування борщу з бабусею — перелік інгредієнтів: буряк, картопля, капуста, м''ясо, морква, цибуля, сметана.'
  speakers:
  - Бабуся (teaching)
  - Онучка (learning)
  motivation: Їжа зі словами буряк (m), картопля (f), капуста (f), м'ясо (n), сметана (f)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Вранці вдома: — Що ти хочеш на сніданок? — Каву з молоком і хліб з маслом. — А я хочу чай з цукром і кашу. Поєднання їжі та напоїв як фрази (з + іменник = завчена фраза).'
  - 'Діалог 2 — Готуємо борщ із бабусею: — Для борщу нам потрібні буряк, картопля, капуста, м''ясо, морква, цибуля і сметана. — Добре, бабусю. Я люблю борщ зі сметаною. Це реалізує плановий setting у `dialogue_situations`: назви інгредієнтів + українська культурна прив''язка без додаткового граматичного навантаження.'
  - 'Діалог 3 — Розмова про щоденні звички: — Що ти зазвичай їси на обід? — Суп і салат. — А що ти їси на вечерю? — Рибу з рисом. Після діалогу автор explicitly models природні дієслова `Я снідаю / Я обідаю / Я вечеряю` і не підсовує буквальний шаблон `Я їм сніданок`; за потреби діалог закривається етикетною формулою `Смачного!`.'
- section: Їжа
  words: 300
  points:
  - 'Основна лексика їжі за категоріями: Хліб і каша: хліб, каша, рис, макарони. М''ясо і риба: м''ясо, курка, риба. Овочі: картопля, морква, цибуля, помідор, огірок. Фрукти: яблуко, банан, апельсин. Молочне: молоко, сир, масло, сметана, йогурт. Інше: яйце, цукор, сіль, олія.'
  - 'Знакові українські страви (культурна довідка): борщ (beet soup — українська національна страва), вареники, сало, галушки, деруни. Ці слова — культурна ідентичність, а не просто лексика; не подавайте борщ як безликий "Eastern European soup".'
  - 'L2-пастки в їжі: `сир` (не `творог`), `смажена картопля` (не `жарена картопля`), `борщ дуже смачний` / `Дуже смачно!` як дві різні моделі. Автор має дати це або як мікротаблицю помилок, або як activity_hints-дрил.'
- section: Напої
  words: 300
  points:
  - 'Основна лексика напоїв: Гарячі: кава, чай. Холодні: вода, сік, компот, лимонад. Молочні: молоко, кефір. Алкогольні: пиво, вино (для розпізнавання). Ключові чанки: `кава з молоком`, `чай з цукром`, `чай з лимоном`, `вода з газом`, `без цукру`, `без молока`.'
  - 'Чому `з + ...` і `без + ...` — це тут фрази, а не граматика: на рівні A1 вивчайте `кава з молоком` і `чай без цукру` як сталі вирази. Закінчення орудного / родового відмінка не розбираємо окремо; автор просить учня повторювати всю фразу як один шматок.'
- section: Підсумок
  words: 300
  points:
  - 'Інструментарій їжі та напоїв: Що ти хочеш? — Каву з молоком. / Хліб з маслом. Що ти їш на сніданок / обід / вечерю? Три прийоми їжі: сніданок, обід, вечеря. Самоперевірка: Назвіть 5 страв і 3 напої, які вам подобаються. Назвіть одну українську страву і поясніть, чому вона важлива.'
  - 'Фінальна writer-note: у підсумку коротко повторити `Я снідаю / Я обідаю / Я вечеряю`, `Смачного!`, `сир`, `смажена картопля`, `без цукру` як мінімальний набір природних форм, які мають переважити буквальний англомовний перенос або росіянізми.'
