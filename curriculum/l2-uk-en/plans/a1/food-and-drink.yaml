grammar:
- з + іменник як завчена фраза (НЕ граматика орудного відмінка)
- без + іменник як завчена фраза (НЕ формальний урок про родовий відмінок)
- узгодження прикметника з іменником у харчовій лексиці через готові пари (`смачна каша`, `смачний борщ`) без формальної парадигми
- Що ти хочеш? — повторення дієслова «хотіти» з М19
- Без нового формального граматичного блоку — модуль орієнтований на лексику та готові патерни
