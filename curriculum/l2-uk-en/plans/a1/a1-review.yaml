content_outline:
- section: 'Граматичний мікс: Часи (Tense Mix)'
  words: 400
  points:
  - 'Comprehensive review of verbs: present, past, and future.'
  - Switching between tenses fluidly in sentences.
- section: 'Граматичний мікс: Відмінки (Case Mix)'
  words: 400
  points:
  - Reviewing location (Де? - Locative), direction (Куди? - Accusative), objects (Що/Кого? - Accusative).
  - Possession (У мене є) vs Absence (У мене немає + Gen preview).
- section: Великий текст (The Big Text)
  words: 400
  points:
  - A long text synthesizing all A1 grammar and vocabulary.
  - A story of a foreigner living in Ukraine, their routine, friends, and plans.
