module: a1-40
level: A1
sequence: 40
slug: shopping-and-market
version: '2.0'
title: Shopping and Market
subtitle: How Much Does It Cost?
content_outline:
- section: Скільки коштує? (How much?)
  words: 500
  points:
  - 'Key question pattern: Скільки коштує...? Скільки це коштує? Forming price questions
    with коштувати (to cost).'
  - 'Price expressions with гривня: одна гривня, дві гривні, п''ять гривень. Number-noun
    agreement review from a1-17 (Numbers and Money).'
  - 'Answering price questions: Це коштує двадцять гривень. Борщ коштує сімдесят
    гривень. Producing full price sentences.'
- section: У магазині (In the Store)
  words: 400
  points:
  - 'Polite request patterns: Дайте, будь ласка... (Give me, please...). Я хочу
    купити... (I want to buy...). Можна...? (May I...?).'
  - 'Checking availability: Є...? (Is there...?) У вас є...? (Do you have...?).
    Learner error: using мати instead of є for store availability.'
  - 'Basic shopping dialogue structure: greeting → asking for item → asking price
    → paying → thanking. Complete transaction flow.'
- section: Кількість та одиниці (Quantities and Units)
  words: 400
  points:
  - 'Units of measurement: кілограм, літр, пачка, пляшка, штука. Gender and typical
    products for each unit.'
  - 'Genitive with quantities: кілограм яблук, літр молока, пачка цукру, пляшка
    води. Reinforcing formulaic Genitive from a1-18.'
  - 'Numbers with units: два кілограми (2-4 + Gen. sg.), п''ять кілограмів (5+ +
    Gen. pl.). Number-noun case agreement patterns.'
- section: Засоби гігієни (Hygiene Products)
  words: 300
  points:
  - 'Essential hygiene vocabulary: мило (soap), зубна паста (toothpaste), шампунь
    (shampoo), рушник (towel), туалетний папір (toilet paper).'
  - 'Asking where to buy items: Де можна купити...? Де тут аптека? Де тут магазин?
    Combining location and shopping skills.'
- section: Практика (Practice)
  words: 400
  points:
  - 'Shopping role-play dialogues: Complete transaction from greeting to payment.
    At the market (ринок) and at the store (магазин).'
  - 'Price asking and answering drills: Скільки коштує...? — Це коштує... гривень.
    Rapid price negotiation practice.'
  - 'Quantity expression practice: Ordering specific amounts with correct case forms.
    Shopping list construction.'
vocabulary_hints:
  required:
  - коштувати (to cost) — Скільки коштує?; core shopping verb
  - купити (to buy, pf.) — Я хочу купити; perfective for single purchase
  - гривня (hryvnia) — одна гривня, дві гривні, п'ять гривень; currency
  - кілограм (kilogram) — кілограм яблук; weight unit + Gen
  - літр (litre) — літр молока; volume unit + Gen
  - пачка (packet) — пачка цукру; container unit + Gen
  - пляшка (bottle) — пляшка води; container unit + Gen
  - магазин (store) — у магазині; shopping location
  - ринок (market) — на ринку; outdoor market location
  - мило (soap) — купити мило; basic hygiene item
  recommended:
  - шампунь (shampoo) — masculine gender; hygiene vocabulary
  - рушник (towel) — masculine gender; cultural embroidered towel
  - решта (change) — Ваша решта; transaction completion
  - картка (card) — банківська картка; modern payment
