module: a1-044
level: A1
sequence: 44
slug: hey-friend-vocative
version: '1.0'
title: Hey Friend Vocative
subtitle: Calling someone
focus: grammar
pedagogy: PPP
phase: A1.7 [People & Communication]
word_target: 1200
objectives:
- Address people using the Vocative case
- Understand that Ukrainian changes names when calling someone
- Learn common Vocative forms for names and family members
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Getting someone''s attention. ''Олено, привіт!'' ''Тарасе, як справи?'''
  - 'Dialogue 2: Family members calling each other. ''Мамо, де мій телефон?'''
- section: Кличний відмінок (Vocative Case)
  words: 400
  points:
  - 'Explain the concept: when you address someone directly, their name changes.'
  - This is a unique and beautiful feature of Ukrainian (and other Slavic languages).
- section: Правила (Rules)
  words: 400
  points:
  - Feminine -а -> -о (Олена -> Олено, мама -> мамо).
  - Feminine -я -> -ю (Марія -> Марію) or -є (Надія -> Надіє).
  - Masculine hard -> -е (Іван -> Іване, Тарас -> Тарасе, брат -> брате).
  - Masculine soft -> -ю (Андрій -> Андрію, Сергій -> Сергію).
vocabulary_hints:
  required:
  - мамо
  - тату
  - брате
  - сестро
  - друже
  - пане
  - пані
  recommended:
