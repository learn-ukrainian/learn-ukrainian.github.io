sequence: 36
module: a1-36
level: A1
slug: at-the-restaurant
version: '2.0'
title: At the Restaurant
subtitle: Dining Out in Ukraine
content_outline:
- section: Warm-up
  points:
  - 'Структура українського меню (перше, друге, десерт) — фокус на традиційному поділі:
    перше (супи), друге (основні страви/гарніри); content writing note: emphasize
    this tripartite structure as standard'
  - 'Етикет у ресторані — cultural hook: різниця між «ресторан» (урочисто/formal)
    та «кафе» (повсякденно/casual); традиційний тост «Будьмо!» ([ˈbudʲmɔ] — "Let us
    be!")'
- section: Presentation
  points:
  - Резервація (Я хотів би замовити столик на...) — використання конструкції «замовити
    столик» (collocation from research)
  - Отримання столика (Столик на двох, будь ласка) — focus on polite requests using
    «будь ласка»
  - 'Читання меню та запитання (Що таке...? / З чого це?) — collocation: «подивитися
    меню», «дати меню»'
  - 'Замовлення страв (Мені перше... і на друге...) — learner error: використання
    називного відмінка замість знахідного (Я буду *кава* ❌ instead of *Я буду каву*
    ✅); focus on polite «Я буду...» structure (Future Tense)'
  - 'Особливі потреби (Без м''яса / Без глютену) — include modern dietary phrases:
    «без м''яса», «без глютену» early for travelers'
  - 'Рахунок та чайові (Скільки з мене?) — learner error: використання русизму «счёт»
    замість «рахунок»; cultural hook: чайові 5-15% (часто готівкою, навіть при оплаті
    карткою)'
- section: Practice
  points:
  - 'Діалог 1: Замовлення повної вечері — використання Future Tense для замовлення
    (Я буду...); learner error: over-formality, prefer natural «Мені, будь ласка...»'
  - 'Діалог 2: Скарга на страву (ввічливо) — use polite markers like «Можна...?»'
  - 'Діалог 3: Розподіл рахунку між друзями — phrase «Ми заплатимо окремо» vs «Разом,
    будь ласка»; collocation: «оплатити рахунок»'
- section: Warm-up 2
  points:
  - 'Наратив про вечерю в українському ресторані — content writing note: include «смачного»
    (Bon appetit) as a frequent polite marker'
  - Типові страви та культурний контекст — reinforce the «перше/друге» structure in
    context
vocabulary_hints:
  required:
  - столик (table) — замовити столик
  - замовити (to order) — замовити страву, замовити столик (High frequency)
  - офіціант (waiter) — polite interaction context
  - меню (menu) — дати меню, подивитися меню
  - страва (dish) — перша страва, смачна страва
  - 'рахунок (bill) — просити рахунок, оплатити рахунок; learner error: avoid ''счёт'''
  - перше (first course) — soups context
  - друге (main course) — mains/sides context
  recommended:
  - десерт (dessert) — part of standard menu structure
  - напій (drink) — builds on A1-35
  - гарнір (side dish) — often part of 'друге'
  - порція (portion) — helpful for ordering
  - чайові (tip) — 5-15% standard, cash preferred
  - резервація (reservation) — context of 'замовити столик'
  - 'бути (to be) — collocations: я буду... (I''ll have...), ви будете...?'
