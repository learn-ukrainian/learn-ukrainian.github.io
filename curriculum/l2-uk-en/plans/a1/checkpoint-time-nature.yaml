module: a1-028
level: A1
sequence: 28
slug: checkpoint-time-nature
version: '1.0'
title: Checkpoint Time & Nature
subtitle: "Reviewing M22-M27"
focus: review
pedagogy: Checkpoint
phase: A1.4 [Time & Nature]
word_target: 1200
objectives:
- Review time expressions, days, months, and seasons
- Discuss weather conditions and nature
- Describe daily routines and free-time hobbies using sequence adverbs
content_outline:
- section: "Listening/Reading Comprehension"
  words: 400
  points:
  - "A comprehensive text/audio about a person planning their week across different seasons."
  - "E.g., 'In summer, the weather is sunny. On Monday at 8:00 I work, but on the weekend I play tennis. First I drink coffee, then I go to the park.'"
  - "Tests integration of all A1.4 concepts."
- section: "Vocabulary Review: Time & Calendar"
  words: 300
  points:
  - "Mix of hours, days of the week, months, and seasons."
  - "Practice using the correct chunks (о котрій, у понеділок, влітку, у травні)."
- section: "Communication: Weather & Hobbies"
  words: 300
  points:
  - "Roleplay scenarios: Asking a friend about the weather today and proposing weekend plans based on it."
  - "Using impersonal weather adverbs and sequence adverbs to narrate actions."
- section: "Self-Assessment"
  words: 200
  points:
  - "Can you tell the time and schedule a meeting?"
  - "Can you name the days, months, and seasons?"
  - "Can you describe the weather today?"
  - "Can you talk about your hobbies and daily sequence?"
vocabulary_hints:
  required: []
  recommended: []
activity_hints:
- type: reading-comprehension
  focus: Read a detailed planner and answer comprehensive questions
  items: 8
- type: fill-in
  focus: Fill in the blanks with correct time, day, month, or sequence adverbs
  items: 15
- type: match-up
  focus: Match weather conditions to appropriate hobbies/clothing
  items: 10
connects_to:
- a1-029 (Euphony Natural Flow)
