module: a1-06
level: A1
sequence: 6
slug: the-living-verb-i
version: '2.0'
title: The Living Verb I
subtitle: First Conjugation (-ати/-яти)
content_outline:
- section: Warm-up
  points:
  - Moving from "this is" to "I do" — action verbs unlock — transition from static
    descriptions to dynamic actions
  - 'First Conjugation (-ати verbs) are everywhere in daily life — aligned with State
    Standard §4.2.4.1 (examples: читати, працювати)'
  - Reading, writing, working, walking, playing — core actions that define daily routine
- section: Presentation
  points:
  - 'Pattern: -ати → -аю, -аєш, -ає, -аємо, -аєте, -ають — visual aid: clear ''Stem
    + Ending'' table (чит + аю)'
  - 'Example paradigm: читати → читаю, читаєш, читає... — standard example for regularity'
  - 'All verbs here are imperfective (ongoing/habitual actions) — learner error: confusing
    process (читати) with result (прочитати)'
  - 'Pro-drop — endings tell who, so pronouns optional (Читаю = I read) — learner
    error: overuse of ''Я'' when ending is sufficient; learner error: using infinitive
    ''Я читати'''
  - Common verbs (писати, працювати, слухати, питати, грати) — focus on high-frequency
    actions
- section: Practice
  points:
  - 'Conjugation drills with multiple -ати verbs — strict constraint: SVO sentences,
    inanimate masculine/neuter objects (журнал, лист, радіо) to avoid case confusion'
  - 'Describing daily activities (Я працюю, Ти читаєш) — context: working at home,
    reading a magazine, listening to music'
- section: Cultural Insight
  points:
  - 'Ukrainians drop pronouns — verb endings are clear — cultural hook: ''Птицю пізнати
    по пір''ю, а людину по мові'' (value of eloquence)'
  - 'Master key metaphor — one pattern unlocks hundreds of verbs — historical context:
    high literacy tradition, ''Apostol'' (1574)'
vocabulary_hints:
  required:
  - читати (to read) — читати журнал, читати вголос
  - писати (to write) — писати лист, писати текст
  - знати (to know) — знати все, не знати
  - працювати (to work) — працювати багато, працювати вдома
  - слухати (to listen) — слухати музику, слухати радіо
  - 'питати (to ask) — питати про це (warning: requires accusative for person)'
  - грати (to play) — грати в ігри
  - чекати (to wait) — чекати на автобус
  recommended:
  - думати (to think) — думати про це
  - розуміти (to understand) — розуміти все
  - вивчати (to study) — вивчати мову
  - відпочивати (to rest) — відпочивати вдома
activity_hints:
