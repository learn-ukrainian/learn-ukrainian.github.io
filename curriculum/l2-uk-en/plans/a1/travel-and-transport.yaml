module: a1-052
level: A1
sequence: 52
slug: travel-and-transport
version: '2.0'
title: Travel and Transport
subtitle: Getting There
focus: vocabulary
pedagogy: PPP
phase: A1.5 [Modals, Commands & Life]
word_target: 2000
objectives:
- Name common types of transport
- Navigate stations and airports with basic phrases
- Give and follow simple directions
- Describe a journey including duration and means
content_outline:
- section: Транспорт (Transport types)
  words: 400
  points:
  - 'Public transport: автобус (bus), тролейбус (trolleybus), маршрутка (minibus), метро (metro), трамвай (tram). Ukrainian
    cities and their transport systems.'
  - 'Long-distance transport: потяг (train), літак (airplane), таксі (taxi). Public vs private transport distinction. Choosing
    transport for different distances.'
- section: Вокзал та аеропорт (Station and airport)
  words: 500
  points:
  - 'Station types: залізничний вокзал (train station), автовокзал (bus station), аеропорт (airport). Key locations inside:
    каса (ticket office), зал очікування (waiting hall), платформа (platform).'
  - 'Essential phrases: Де вокзал? (Where is the station?). Звідки відправляється потяг? (Where does the train depart from?).
    О котрій годині? (At what time?). Building station navigation skills.'
  - 'Ticket vocabulary: квиток (ticket), купити квиток (buy a ticket), у один бік (one way), туди й назад (round trip). Connection
    to a1-56 (Buying Tickets).'
- section: Напрямки (Directions)
  words: 400
  points:
  - 'Direction vocabulary: наліво (left), направо (right), прямо (straight), назад (back). Ordinal turns: перший поворот (first
    turn), другий поворот (second turn).'
  - 'Imperative directions: Поверніть наліво (Turn left). Ідіть прямо (Go straight). Asking: Як дістатися до...? (How to get
    to...?) + Genitive. Скажіть, будь ласка, де...? (Tell me please, where is...?)'
- section: Подорожі (Journeys)
  words: 400
  points:
  - 'Destination: Я їду до Львова (I am going to Lviv). До + Genitive for destination cities. Connection to prepositions modules
    (a1-27, a1-28).'
  - 'Means of transport: Instrumental case without preposition: потягом (by train), автобусом (by bus), літаком (by plane).
    Я їду потягом — a key A1 instrumental usage.'
  - 'Duration: Скільки часу їхати? (How long is the ride?). Я їду 3 години (I travel 3 hours). Connecting numbers and time
    with transport.'
- section: Практика (Practice)
  words: 300
  points:
  - 'Direction-giving dialogues: asking and giving directions to specific locations in a city. Combining imperative forms
    with direction vocabulary.'
  - 'Journey descriptions: Describing a real or imagined trip using transport vocabulary, destination, duration, and means
    of transport.'
vocabulary_hints:
  required:
  - автобус (bus) — їхати автобусом; most common public transport
  - метро (metro) — їхати на метро; indeclinable neuter noun
  - потяг (train) — їхати потягом; long-distance transport
  - літак (airplane) — летіти літаком; air travel
  - вокзал (station) — залізничний вокзал; travel hub
  - аеропорт (airport) — бути в аеропорту; travel hub
  - наліво (left) — Поверніть наліво; direction word
  - направо (right) — Поверніть направо; direction word
  - прямо (straight) — Ідіть прямо; direction word
  recommended:
  - маршрутка (minibus) — їхати маршруткою; uniquely Ukrainian transport
  - трамвай (tram) — їхати трамваєм; city transport
  - зупинка (stop) — автобусна зупинка; where to wait
  - квиток (ticket) — купити квиток; travel essential
  - розклад (schedule) — розклад руху; timetable
