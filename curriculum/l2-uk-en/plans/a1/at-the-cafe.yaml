title: У кафе
subtitle: У кафе — замовлення, оплата та культура кафе
focus: communication
pedagogy: PPP
phase: А1.6 [Їжа та покупки]
word_target: 1200
objectives:
- Замовляти їжу та напої в українському кафе
- Використовувати фрази для ввічливого прохання (Можна...? Дайте, будь ласка...)
- Читати просте українське меню та ставити запитання щодо страв
- Розуміти українську культуру кафе (чайові, оплата)
- Відповідати на запитання про формат замовлення (`Вам тут чи із собою?`) та розмір (`велику / маленьку каву`)
- Впізнавати типові кав'ярні суржикові пари (счёт → рахунок, на винос → із собою, пірожене → тістечко)
dialogue_situations:
- setting: 'Побачення в затишному львівському кафе — замовлення з меню: кава (f), чай (m), тістечко (n), круасан (m), вода (f), сік (m). Мені каву, будь ласка. А мені — чай і тістечко.'
  speakers:
  - Ростик
  - Іванка
  motivation: 'Замовлення зі словами кава(f), чай(m), тістечко(n), круасан(m)'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Замовлення в кафе: — Добрий день! Ось меню. — Дякую. Що ви рекомендуєте? — Борщ дуже смачний. — Добре, мені борщ і хліб, будь ласка. — А що будете пити? — Каву з молоком. — Добре, одну хвилинку. Ввічливе замовлення за допомогою будь ласка, мені + знахідний відмінок.'
  - 'Діалог 2 — Оплата рахунку: — Рахунок, будь ласка. — Ось, будь ласка. Сто двадцять гривень. — Можна карткою? — Так, звичайно. — Дякую, дуже смачно було! — Дякуємо, приходьте ще! Оплата, похвала їжі, чайові.'
  - 'Діалог 3 — Кава із собою: — Доброго ранку! — Доброго ранку. Велику каву, будь ласка. — Вам тут чи із собою? — Із собою, дякую. — Щось іще? — Ні, дякую. — З вас сімдесят п''ять гривень. Конструкція «тут чи із собою» та розміри `велику каву` / `маленьку каву` як неподільні чанки (без пояснення відмінювання прикметника). УВАГА до автора: заголовок «Кава із собою» — нормативний; не використовуйте суржикову форму «Кава на винос».'
- section: Як замовити
  words: 300
  points:
  - 'Шаблони для замовлення: Мені [знахідний відмінок], будь ласка. (Мені каву, будь ласка.) Можна [знахідний відмінок]? (Можна воду?) Дайте, будь ласка, [знахідний відмінок]. (Дайте, будь ласка, борщ.) Я хочу / Я буду [знахідний відмінок]. (Я буду салат.) Всюди використовується знахідний відмінок з модуля №37 — реальне застосування.'
  - 'Запитання щодо меню: Що ви рекомендуєте? Це гостре? Це з м''ясом? А що це? Скільки коштує? Є вегетаріанське меню?'
  - 'Формат і розмір: запитання офіціанта `Вам тут чи із собою?` + відповіді `Тут, будь ласка.` / `Із собою, будь ласка.` Розміри `велику каву` / `маленьку каву` — подавати як фразові чанки в знахідному відмінку; НЕ пояснювати відмінювання прикметника (це не об''єкт цього модуля).'
- section: Культура кафе
  words: 300
  points:
  - 'Українська культура кафе: Кафе проти ресторану: кафе — неформальне, ресторан — формальний. Меню: офіціант приносить його, або воно є на стіні/дошці. Рахунок: просіть рахунок — його не приносять автоматично. Чайові: 10% — це стандарт, але не обов''язково. Карткою чи готівкою? — більшість закладів приймають картки.'
  - 'Корисні фрази для кафе: Вільно? / Тут вільно? Можна меню? Ще одну каву, будь ласка. Без цукру. З лимоном. Все було дуже смачно!'
- section: Підсумок
  words: 300
  points:
  - 'Інструментарій для спілкування в кафе: Замовлення: Мені [знахідний відмінок], будь ласка. Запитання: Скільки коштує? Що рекомендуєте? Оплата: Рахунок, будь ласка. Можна карткою? Похвала: Дуже смачно! Самоперевірка: Замовте повноцінний обід (перше, друге, напій) у кафе. Попросіть рахунок і розрахуйтеся.'
vocabulary_hints:
  required:
  - кафе (cafe, n, indecl.)
  - меню (menu, n, indecl.)
  - рахунок (bill, m)
  - замовляти (to order)
  - офіціант (waiter, m)
  - смачно (delicious — adverb)
  - будь ласка (please)
  - тут (here — adverb, format reply)
  - із собою (to go / takeaway — teach as indivisible chunk)
  recommended:
  - ресторан (restaurant, m)
  - рекомендувати (to recommend)
  - чайові (tip/gratuity, pl.)
  - готівка (cash, f)
  - картка (card, f)
  - гостре (spicy — neuter adj.)
  - вегетаріанський (vegetarian — adj.)
  - велику каву (a large coffee — chunk, acc.f.)
  - маленьку каву (a small coffee — chunk, acc.f.)
  - кав'ярня (coffee shop, f — near-synonym for `кафе`, wiki uses this)
activity_hints:
- type: fill-in
  focus: 'Замовлення в кафе: Мені ___, будь ласка. (виберіть правильний знахідний відмінок)'
  items:
  - Мені {каву|кава|каві}, будь ласка.
  - Мені {воду|вода|водою}, будь ласка.
  - Мені {борщ|борщу|борщем}, будь ласка.
  - Мені {салат|салату|салатом}, будь ласка.
  - Мені {суп|супу|супом}, будь ласка.
  - Дайте, будь ласка, {чай|чаю|чаєм}.
  - Я буду {піцу|піца|піці}.
  - Можна {хліб|хліба|хлібом}?
- type: quiz
  focus: Що ви скажете? З'єднайте ситуацію з фразою (замовлення/оплата/запитання/комплемент)
  items:
  - question: Ви хочете замовити каву. Що ви скажете?
    options:
    - Мені каву, будь ласка.
    - Рахунок, будь ласка.
    - Що ви рекомендуєте?
  - question: Ви хочете розрахуватися. Що ви скажете?
    options:
    - Рахунок, будь ласка.
    - Можна меню?
    - Це гостре?
  - question: Ви хочете дізнатися ціну. Що ви скажете?
    options:
    - Скільки коштує?
    - Це з м'ясом?
    - Тут вільно?
  - question: Ви хочете попросити рекомендацію. Що ви скажете?
    options:
    - Що ви рекомендуєте?
    - Є вегетаріанське меню?
    - Все було дуже смачно!
  - question: Ви хочете похвалити їжу. Що ви скажете?
    options:
    - Все було дуже смачно!
    - Можна карткою?
    - Без цукру.
  - question: Ви хочете дізнатися, чи вільне місце. Що ви скажете?
    options:
    - Тут вільно?
    - Ще одну каву, будь ласка.
    - Рахунок, будь ласка.
  - question: Ви хочете запитати, чи страва гостра. Що ви скажете?
    options:
    - Це гостре?
    - Це з м'ясом?
    - Скільки коштує?
  - question: Ви хочете розрахуватися карткою. Що ви скажете?
    options:
    - Можна карткою?
    - Є вегетаріанське меню?
    - Що ви рекомендуєте?
- type: fill-in
  focus: Доповнити діалог у кафе правильними фразами
  items:
  - — Добрий день! Ось {меню|рахунок|картка}.
  - — Дякую. Що ви {рекомендуєте|коштуєте|платите}?
  - — Борщ дуже {смачний|гострий|вільний}.
  - — Добре, {мені|я|мене} борщ і хліб, будь ласка.
  - — А що будете {пити|їсти|читати}?
  - — Каву з молоком. — Добре, одну {хвилинку|годину|каву}.
- type: match-up
  focus: З'єднати українські фрази для кафе з їхніми функціями
  items:
  - Рахунок, будь ласка.: Прохання принести рахунок
  - Що ви рекомендуєте?: Прохання порадити
  - Мені борщ, будь ласка.: Замовлення їжі
  - Скільки коштує?: Запитання про ціну
  - Можна карткою?: Запитання про спосіб оплати
  - Дуже смачно!: Похвала їжі
  - Тут вільно?: Запитання про вільне місце
  - Можна меню?: Прохання принести меню
  - Вам тут чи із собою?: Запитання офіціанта про формат замовлення
  - Велику каву, будь ласка.: Замовлення з уточненням розміру
- type: fill-in
  focus: Типові кав'ярні суржикові пари — оберіть нормативну форму (див. wiki "Типові помилки L2")
  items:
  - Можна {рахунок|счёт}, будь ласка.
  - Вам тут чи {із собою|на винос}?
  - Дайте, будь ласка, одне {тістечко|пірожене}.
  - Покладіть у {пакетик|кулечок}, будь ласка.
  - Кава дуже {смачна|вкусна}.
  - Я буду пити через {соломинку|трубочку}.
  - Одну {чашку кави|чашку кофе}, будь ласка.
