module: a1-041
level: A1
sequence: 41
slug: at-the-cafe
version: '2.0'
title: At the Café
subtitle: Ordering Food and Drinks in Ukrainian
focus: practical
pedagogy: PPP
phase: A1.4 [Tenses & Daily Life]
word_target: 2000
objectives:
- Learner can order food and drinks at a café
- Learner can ask for recommendations
- Learner can request the bill
- Learner can use polite forms and cases correctly
content_outline:
- section: Вступ (Introduction)
  words: 450
  points:
  - 'Типова кав''ярня в Україні — залучення через культурний контекст: львівська традиція «Піти на каву» як ключовий соціальний
    ритуал, а не просто споживання напою.'
  - 'Легенда про Юрія Кульчицького: український герой Віденської битви, який відкрив одну з перших кав''ярень у Європі; пам''ятник
    у Львові як візуальний символ кавової культури.'
- section: Презентація (Presentation)
  words: 650
  points:
  - 'Привітання та етикет: обов''язкове використання форми «Ви» з персоналом; типові запитання офіціанта «Добрий день! Що
    бажаєте?» та «Що ви замовите?».'
  - 'Ввічливе замовлення: корекція помилки «Я хочу» на більш природні та ввічливі форми «Мені, будь ласка...» або «Я буду...»
    (відповідно до State Standard §4.2.4.2).'
  - 'Граматичний фокус: Знахідний відмінок для об''єктів замовлення (State Standard §4.2.3.2) — трансформація закінчень іменників
    «кава» -> «каву», «вода» -> «воду».'
  - 'Лексичний підхід до складних форм: вивчення конструкцій «з молоком» (Instrumental) та «без цукру» (Genitive) як готових
    фраз-чанків без пояснення відмінків для рівня A1.'
- section: Практика (Practice)
  words: 550
  points:
  - 'Дрилі на вживання Знахідного відмінка: вправи на трансформацію назв напоїв та страв у фразах замовлення; виправлення
    типової помилки «Я буду кава».'
  - 'Форми наказового способу: практика вживання ввічливих команд «дайте, будь ласка» та «принесіть, будь ласка» (State Standard
    §4.2.4.2) у рольових ситуаціях.'
  - 'Розрізнення «рахунок» vs «чек»: фокусована вправа на виправлення помилки, коли учні просять «чек» замість оплати «рахунку»
    в закладі.'
  - 'Уточнення замовлення: відпрацювання діалогів з прикметниками-антонімами (великий чи малий, холодний чи гарячий, з газом
    чи без газу).'
- section: Продукція та Підсумок (Production and Summary)
  words: 350
  points:
  - 'Оплата та розрахунок: вивчення фраз «Можна рахунок?», «Оплата карткою» та «Я заплачу готівкою» відповідно до комунікативних
    інтенцій §4.3.2.'
  - 'Етикет та чайові: обговорення правил поведінки в українських кафе та вивчення фрази «залишати чайові».'
  - 'Підсумкова рольова гра: симуляція повного циклу відвідування кав''ярні (від вітання до оплати рахунку) з використанням
    Persona «Chatty Barista».'
vocabulary_hints:
  required:
  - кава (coffee) — філіжанка кави, міцна кава, кава з молоком; High frequency
  - чай (tea) — чорний чай, зелений чай, чай з лимоном; High frequency
  - меню (menu) — принести меню, подивитися меню, барне меню; High frequency
  - 'рахунок (bill) — просити рахунок, оплатити рахунок; помилка: не плутати з ''чек''!'
  - офіціант (waiter) — покликати офіціанта, ввічливий офіціант; High frequency
  - замовляти (to order) — я замовлю каву, що ви замовите?; High frequency
  - вода (water) — вода з газом, вода без газу, склянка води; High frequency
  - будь ласка (please) — скажіть, будь ласка; Мені, будь ласка...; Very High frequency
  recommended:
  - тістечко (pastry) — смачне тістечко, шоколадне тістечко; Medium frequency
  - картка (card) — оплатити карткою; сучасний спосіб оплати
  - готівка (cash) — платити готівкою; традиційний спосіб оплати
  - чайові (tip) — залишати чайові; культурний етикет
  - принести (to bring) — принесіть, будь ласка; форма наказового способу
  - цукор (sugar) — кава без цукру; лексичний чанк
