module: a1-031
level: A1
sequence: 31
slug: pronoun-declension
version: '2.0'
title: Pronoun Declension
subtitle: Me, You, Us
focus: grammar
pedagogy: PPP
phase: A1.3 [Cases & Navigation]
word_target: 2000
objectives:
- Use personal pronouns correctly in Accusative case
- Use personal pronouns in Locative with prefix н- after prepositions
- Apply Dative pronoun forms in common constructions
- Recognize the Genitive pronoun paradigm and form overlaps
content_outline:
- section: Знахідний відмінок (Accusative pronouns)
  words: 500
  points:
  - 'Форми особових займенників у Знахідному: мене, тебе, його, її, нас, вас, їх. Приклади: Він бачить мене. Я знаю тебе.
    Вона чує нас (§4.2.1.4).'
  - 'Займенники після прийменників: для мене, без тебе, про нього (префікс н- після прийменників для його/її/їх: нього, неї,
    них).'
- section: Місцевий відмінок (Locative pronouns)
  words: 400
  points:
  - 'Форми у Місцевому: (на) мені, (на) тобі, (на) ньому, (на) ній, (на) нас, (на) вас, (на) них. Використання з прийменниками
    в/у, на.'
  - 'Префікс н- після прийменників для 3-ї особи: у нього, на ньому, у ній, на них. Без прийменника — без н-: його книга (не
    *нього книга). Критичне правило.'
- section: Давальний відмінок (Dative pronouns)
  words: 400
  points:
  - 'Форми у Давальному: мені, тобі, йому/їй, нам, вам, їм. Приклади: Мені подобається. Дай мені. Скажи йому. Напиши їй.'
  - 'Зв''язок із раніше вивченою конструкцією «Мені подобається» (a1-19): тепер повна парадигма давального відмінка. Дієслова
    з давальним: давати, говорити, писати, допомагати.'
- section: Родовий відмінок (Genitive pronouns)
  words: 400
  points:
  - 'Форми у Родовому: мене, тебе, його, її, нас, вас, їх. Приклади: У мене є. Немає тебе. Для мене. Без нас.'
  - 'Збіг форм: Знахідний = Родовий для більшості особових займенників (мене, тебе, нас, вас). Виняток: його/її/їх (однакові
    у всіх непрямих відмінках без прийменника).'
- section: Практика (Practice)
  words: 300
  points:
  - 'Вправи на вибір правильної форми займенника залежно від відмінка: трансформаційні та контекстні завдання.'
  - Заповнення пропусків у реченнях із правильними формами. Особлива увага до префікса н- після прийменників.
vocabulary_hints:
  required:
  - мене (me acc./gen.) — бачить мене, для мене, у мене є; Core pronoun form
  - тебе (you acc./gen.) — знаю тебе, без тебе, у тебе є; Core pronoun form
  - його (him/his) — бачу його, у нього є; н-prefix after prepositions
  - її (her) — знаю її, у неї є; н-prefix after prepositions
  - нас (us acc./gen./loc.) — бачить нас, для нас, у нас; Plural pronoun
  - вас (you pl. acc./gen./loc.) — бачить вас, для вас, у вас; Formal/plural
  - мені (me dat./loc.) — мені подобається, на мені; Dative and Locative
  - тобі (you dat./loc.) — тобі подобається, на тобі; Dative and Locative
  - нам (us dat.) — дай нам, скажи нам; Dative plural
  - йому (him dat.) — скажи йому, дай йому; Dative 3rd person masculine
  - їй (her dat.) — напиши їй, дай їй; Dative 3rd person feminine
  recommended:
  - ньому (him loc.) — на ньому, у ньому; Locative with н-prefix
  - нього (him gen./acc. after prep.) — у нього, для нього; Genitive with н-prefix
  - них (them loc./gen. after prep.) — на них, для них, у них; Plural 3rd person
  - їм (them dat.) — скажи їм, дай їм; Dative 3rd person plural
