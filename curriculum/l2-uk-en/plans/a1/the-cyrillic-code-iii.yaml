objectives:
- Learner can recognize and pronounce letters О, П, Р, С, Т, Ф, Х
- Learner can identify Дж and Дз digraphs as single sounds
- Learner can distinguish П (/p/) from Р (/r/) in reading and speech
- Learner can read simple words using all 22 learned letters
grammar:
- Letter recognition (О–Х)
- Sound-letter correspondence
- Digraph recognition (Дж, Дз)
- Consonant cluster reading
