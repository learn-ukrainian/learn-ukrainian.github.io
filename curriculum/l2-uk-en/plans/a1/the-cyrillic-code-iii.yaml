module: a1-03
level: A1
sequence: 3
slug: the-cyrillic-code-iii
version: '2.0'
title: The Cyrillic Code III
subtitle: Letters О to Х
content_outline:
- section: 'Вступ (Review & New Set)'
  words: 300
  points:
  - 'Quick review of the 15 letters mastered in a1-01 and a1-02: a diagnostic mini-drill
    to activate prior knowledge and identify any lingering confusion with False Friends
    (Р, Н, В, С).'
  - 'Introduction to the middle block of the alphabet (О, П, Р, С, Т, Ф, Х) plus two
    uniquely Ukrainian digraphs (Дж, Дз) — framing this set as the ''bridge'' between
    familiar and fully Ukrainian territory.'
- section: 'Нові літери (New Letters О–Х)'
  words: 600
  points:
  - 'О — the easy vowel: identical in shape and sound to English ''O''; heavy overlap
    with internationalisms (опера, олімпіада). Stress-dependent reduction reminder:
    unstressed О stays /o/ in Ukrainian (unlike Russian).'
  - 'П — looks like a Greek Pi, sounds like English P. Critical contrast: П is the true
    /p/ sound, NOT Cyrillic Р (which is /r/). Mnemonic: П has a flat top like a ''Platform''.'
  - 'Р — the ''Roaring Engine'': THIS is the real trap letter. Looks exactly like Latin
    P but produces a rolled /r/. Extended drilling with minimal pairs and tongue-tip
    exercises. Anna Ohoiko pronunciation video reference.'
  - 'С — the ''Snake'' sound: identical to English S in pronunciation. Already introduced
    as a False Friend in a1-01 (looks like Latin C). Reinforcement through new vocabulary.'
  - 'Т — a true friend: same shape, same sound as English T. Reliable anchor letter.
    Practice in clusters: тр-, ст-, -кт.'
  - 'Ф — the rare native letter: appears mostly in borrowings (факт, фото, футбол,
    фонтан). Native Ukrainian words with Ф are extremely few — a cultural note on why.'
  - 'Х — the ''loch'' sound: like German ''ch'' in ''ach'' or Scottish ''loch''. No
    English equivalent — requires explicit articulatory instruction. Key word: хліб (bread),
    the cultural staple.'
- section: 'Дигріфи (Digraphs)'
  words: 400
  points:
  - 'Дж as a single sound (not Д+Ж): the voiced postalveolar affricate /dʒ/ as in English
    ''jungle''. Examples: джерело (spring/source), бджола (bee), джаз (jazz). Position
    in word matters: always one sound at morpheme boundary.'
  - 'Дз as a single sound (not Д+З): the voiced alveolar affricate /dz/ — no English
    equivalent but close to ''dz'' in ''adze''. Examples: дзвінок (bell/call), дзеркало
    (mirror). A uniquely Ukrainian feature absent from Russian.'
  - 'Why digraphs matter: these two sounds are part of what makes Ukrainian phonology
    distinct. They appear in high-frequency everyday vocabulary and must be recognized
    as single phonemes, not consonant clusters.'
- section: 'Практика читання (Reading Practice)'
  words: 500
  points:
  - 'Decoding drills combining all 22 letters learned so far (15 from a1-01/02 + 7 new):
    progressive difficulty from single syllables to full words.'
  - 'Urban vocabulary focus: пошта (post office), ресторан (restaurant), транспорт
    (transport), фото (photo) — internationalism-heavy to build confidence.'
  - 'Food and daily vocabulary: хліб (bread), сорт (sort/variety), порт (port), стоп
    (stop), факт (fact) — drilling consonant clusters with new letters.'
  - 'Pronunciation video playlist reference: Anna Ohoiko alphabet series
    (PLpkSIXDyaJi3mlJlKXWKhdiJZj67fPXQV) for individual letter drilling at home.'
- section: 'Підсумок (Summary)'
  words: 200
  points:
  - 'Production drill: learner reads aloud a paragraph using all 22 letters plus both
    digraphs, with self-assessment checklist for the Р/П distinction.'
  - 'Self-check: can you distinguish П from Р in writing AND pronunciation? Can you hear
    Дж and Дз as single sounds? Progress tracker showing 22/33 letters mastered.'
vocabulary_hints:
  required:
  - 'пошта (post office) — collocations: ''на пошті'' (at the post office), ''іти на
    пошту''; high frequency urban term'
  - 'ресторан (restaurant) — collocations: ''у ресторані'', ''піти в ресторан'';
    internationalism for decoding practice'
  - 'транспорт (transport) — collocations: ''громадський транспорт'' (public transport),
    ''на транспорті''; high frequency urban term'
  - 'фото (photo) — collocations: ''зробити фото'' (take a photo), ''моє фото'';
    internationalism demonstrating Ф usage'
  - 'хліб (bread) — collocations: ''білий хліб'', ''свіжий хліб'', ''купити хліб'';
    core daily vocabulary, cultural staple'
  - 'стоп (stop) — usage: international cognate; demonstrates С+Т+О+П letter combination'
  - 'порт (port) — collocations: ''морський порт'' (sea port); internationalism for П
    and Р contrast practice'
  - 'факт (fact) — collocations: ''це факт'' (it''s a fact), ''цікавий факт'';
    internationalism demonstrating Ф usage'
  recommended:
  - 'джерело (spring/source) — demonstrates Дж digraph in a native Ukrainian word'
  - 'дзвінок (bell/call) — demonstrates Дз digraph; collocations: ''телефонний дзвінок'''
  - 'фонтан (fountain) — internationalism for Ф practice; collocations: ''біля фонтану'''
  - 'футбол (football) — internationalism for Ф practice; high cultural frequency'
activity_hints:
- type: watch-and-repeat
  focus: Pronunciation of 7 new letters (О, П, Р, С, Т, Ф, Х)
  items: 7
- type: classify
  focus: Sort letters into vowels vs consonants
  items: 12
- type: quiz
  focus: Letter identification and sound matching
  items: 20
- type: match-up
  focus: Letter-sound pairs including digraphs
  items: 15
focus: grammar
