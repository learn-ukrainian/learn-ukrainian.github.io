module: a1-003
level: A1
sequence: 3
slug: the-cyrillic-code-iii
version: '3.0'
title: The Cyrillic Code III
subtitle: П Т Г Ґ Е З Ж Ш Х — Voiced and Voiceless Pairs
focus: grammar
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 1200
objectives:
- Learner can recognize and pronounce 9 new letters (П, Т, Г, Ґ, Е, З, Ж, Ш, Х)
- Learner can distinguish voiced from voiceless consonant pairs
- Learner understands the Г vs Ґ distinction (unique to Ukrainian)
- Learner can read common words using all 22 known letters
content_outline:
- section: Вступ
  words: 200
  points:
  - 'Quick review: read 3 words from Code I-II (банан, молоко, кіно) as warm-up.'
  - This module adds 9 letters (8 приголосні + 1 голосний). After this module you know 22 letters — nearly all common Ukrainian
    text becomes readable.
  - 'Key concept: voiced/voiceless consonant pairs — Ukrainian consonants come in matched pairs where one vibrates the throat
    (voiced) and the other doesn''t (voiceless).'
- section: Голосний — Е
  words: 200
  points:
  - Е — екран 📺. Video link. Sounds like 'e' in 'set'. Not like Russian Э. Not like English 'ee'.
  - 'Now all 6 basic vowels are known: А, У (Code I) + И, І, О (Code II) + Е (this module). The 4 iotated vowels come in Code
    IV.'
- section: Приголосні — П, Т
  words: 250
  points:
  - 'П — павук 🕷️. Video link. П is the real /p/ sound. Critical: П (sounds like p) vs Р (sounds like r, learned in Code II).
    This distinction is essential.'
  - Т — тигр 🐯. Video link. Т is a true friend — same shape, same sound as English T.
  - 'Drill: П vs Р minimal pairs — палка (stick) vs ракета (rocket).'
- section: Дзвінкі та глухі — Voiced and Voiceless Pairs
  words: 500
  points:
  - 'Explain the concept: place your hand on your throat. Voiced (дзвінкий) = throat vibrates. Voiceless (глухий) = only air.'
  - 'Г — гора ⛰️. Video link. Г is a soft throaty sound (voiced glottal fricative). NOT a hard ''g'' like English ''go''.
    Cultural note: Г vs Ґ is uniquely Ukrainian.'
  - 'Ґ — ґанок 🚪. Video link. Ґ IS the hard ''g'' sound. Extremely rare in Ukrainian — only ~400 native words. The repressed
    letter: removed 1933, restored 1990.'
  - З — зебра 🦓. Video link. Voiced partner of С (from Code I). З sounds like English 'z'.
  - Ж — жук 🪲. Video link. Voiced sibilant. No English equivalent — like 'zh' in 'measure'. Lips rounded, tongue raised.
  - Ш — шапка 🧢. Video link. Voiceless partner of Ж. Like English 'sh' in 'ship'. Hard articulation — tongue pulled back.
  - Х — хліб 🍞. Video link. Voiceless partner of Г. Like German 'ch' in 'ach' or Scottish 'loch'. No English equivalent —
    explicit articulatory instruction needed.
  - 'Pair summary: Г↔Х (throat), Ж↔Ш (sibilant), З↔С (hissing), Б↔П, Д↔Т, В↔Ф (Code IV).'
- section: Практика читання
  words: 400
  points:
  - 'Words using all 22 letters: парк, хліб, зебра, жити, школа, газета, пошта, транспорт.'
  - 'Voiced/voiceless pair drills: зуб (з-дзвінкий) vs суп (с-глухий), жар (ж-дзвінкий) vs шар (ш-глухий).'
  - 'Reading exercise: short paragraph using all 22 known letters.'
  - 'Urban vocabulary: банк, парк, транспорт — internationalism-heavy for confidence.'
- section: Підсумок
  words: 150
  points:
  - 'Progress: 22 of 33 letters learned (6 голосні + 16 приголосні). Nearly all common text is readable.'
  - 'Key concept mastered: voiced/voiceless pairs.'
  - 'Next module: The Cyrillic Code IV completes the alphabet with 11 remaining characters (Й, Ч, Щ, Я, Ю, Є, Ь, Ї, Ц, Ф)
    plus digraphs (ДЖ, ДЗ) and the apostrophe.'
vocabulary_hints:
  required:
  - 'хліб (bread) — cultural staple; collocations: білий хліб, свіжий хліб'
  - парк (park) — internationalism; demonstrates П
  - школа (school) — top 200 word; demonstrates Ш
  - газета (newspaper) — demonstrates Г and З
  - 'пошта (post office) — demonstrates П and Ш; collocations: на пошті'
  - жити (to live) — top 50 verb; demonstrates Ж
  recommended:
  - ґанок (porch) — demonstrates rare Ґ
  - зуб (tooth) — demonstrates З; useful for pair drill with суп
  - транспорт (transport) — internationalism; demonstrates Т and Р
  - тигр (tiger) — key word for Т; internationalism
