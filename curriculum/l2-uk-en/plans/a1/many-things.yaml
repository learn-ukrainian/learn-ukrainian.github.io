module: a1-013
level: A1
sequence: 13
slug: many-things
version: 1.1.2
title: Багато речей
subtitle: Столи, книги, вікна — від однини до множини
focus: grammar
pedagogy: PPP
phase: A1.2 [Мій світ]
word_target: 1200
objectives:
- Вміти утворювати називний відмінок множини для іменників, вивчених у модулях M08-M12
- Навчитися розпізнавати три основні моделі творення множини (-и, -і, -а/-я)
- Вміти використовувати форму множини прикметників (-і) з іменниками у множині
- Навчитися описувати групи предметів, використовуючи множину іменників, прикметники та кольори
dialogue_situations:
- setting: 'Підготовка класу до уроку української мови — рахуємо та розставляємо предмети. Однина → множина: один стілець → стільці, одна дошка → дошки, одне крісло → крісла. Також: олівці, ручки, підручники, карти.'
  speakers:
  - Вчитель (teacher)
  - Учні (students)
  motivation: 'Утворення множини для шкільного приладдя: стілець→стільці, дошка→дошки, крісло→крісла'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Опис кімнати (Вашуленко, 3 клас, с. 114-115): — Що тут є? — Столи, стільці і вікна. — Які столи? — Столи великі й нові. А стільці — старі. Множина з''являється природно під час опису кімнати з різними речами.'
  - 'Діалог 2 — Покупка кількох речей (розширення M11-M12): — У вас є ручки? — Так! Які ручки? Червоні чи сині? — Сині. І ще зошити. — Скільки? — Три зошити. Прикметники у множині (-і) в реальному контексті.'
- section: Один → багато
  words: 300
  points:
  - 'Большакова, 2 клас, с. 18: «Один предмет → багато предметів». Три основні моделі множини в називному відмінку: Чоловічий рід → зазвичай -и або -і: стіл → столи, стілець → стільці, телефон → телефони, зошит → зошити. Жіночий рід → зазвичай -и або -і: книга → книги, лампа → лампи, ручка → ручки, сумка → сумки. Середній рід → зазвичай -а або -я: вікно → вікна, ліжко → ліжка, крісло → крісла, дзеркало → дзеркала.'
  - 'Орієнтир (але не правило, є винятки): після г, к, х → -и (книга → книги, ручка → ручки). Після більшості інших приголосних → -и або -і (стіл → столи, стілець → стільці). Середній рід на -о → -а (вікно → вікна). Середній рід на -е → -я (поки не вивчаємо). Повні правила відмінювання будуть згодом — наразі вчимо форму множини разом із кожним новим словом.'
- section: Прикметники у множині
  words: 300
  points:
  - 'Большакова, 2 клас, с. 42: який/яка/яке → які, веселий/весела/веселе → веселі. УСІ прикметники у множині мають закінчення -і, незалежно від роду: великий стіл → великі столи, нова книга → нові книги, чисте вікно → чисті вікна. Це простіше, ніж в однині — одне закінчення для всіх родів!'
  - 'Кольори у множині (повторення M10): червоні ручки, сині зошити, білі стіни, чорні стільці. Вказівні займенники також мають форму множини: ці — Ці столи великі. Ці книги нові. ті — Ті вікна чисті. Ті стільці старі.'
- section: Підсумок
  words: 300
  points:
  - 'Коротко про утворення множини: Іменники: вчимо форму множини для кожного слова окремо (столи, книги, вікна). Прикметники: завжди -і (великі, нові, червоні, сині). Вказівні займенники: ці, ті. Присвійні займенники: мої. Самоперевірка: утворіть множину — стіл, книга, вікно. Опишіть свій клас: Які столи? Які стільці? Які вікна?'
vocabulary_hints:
  required:
  - столи (tables — pl of стіл)
  - книги (books — pl of книга)
  - вікна (windows — pl of вікно)
  - стільці (chairs — pl of стілець)
  - ці (these — pl of цей/ця/це)
  - ті (those — pl of той/та/те)
  - мої (my — plural)
  - які (what kind? — plural)
  recommended:
  - ручки (pens — pl of ручка)
  - сумки (bags — pl of сумка)
  - лампи (lamps — pl of лампа)
  - зошити (notebooks — pl of зошит)
  - дзеркала (mirrors — pl of дзеркало)
  - крісла (armchairs — pl of крісло)
  - речі (things — pl of річ)
activity_hints:
- type: fill-in
  focus: 'Утворіть множину: стіл → столи, книга → книги, вікно → вікна'
  items: 10
- type: quiz
  focus: 'Оберіть правильну форму множини: стіл → столи/стола/столів?'
  items: 8
- type: fill-in
  focus: 'Узгодження прикметників у множині: нов__ книги, велик__ столи, чист__ вікна'
  items: 8
- type: group-sort
  focus: Розподіліть слова на однину та множину
  items: 12
connects_to:
- a1-014 (Рубіжний контроль — Мій світ)
prerequisites:
