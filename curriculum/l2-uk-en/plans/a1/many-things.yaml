grammar:
- "Nominative plural of nouns: -и/-і (m/f), -а/-я (n)"
- "Adjective plural: always -і (великі, нові, червоні)"
- "Plural demonstratives: ці (these), ті (those)"
- "Plural possessive: мої (my)"
register: розмовний
