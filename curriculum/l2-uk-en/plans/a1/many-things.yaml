grammar:
- 'Називний відмінок множини іменників: -и/-і (чол./жін. рід), -а/-я (сер. рід)'
- 'Множина прикметників: завжди закінчення -і (великі, нові, червоні)'
- 'Вказівні займенники у множині: ці, ті'
- 'Присвійні займенники у множині: мої'
register: розмовний
references:
- title: Вашуленко Grade 3, p.114-115
  notes: 'Іменники мають два числа: однину і множину. Вправи на перетворення з однини на множину.'
- title: Большакова Grade 2, p.18
  notes: 'Один предмет → багато предметів. Перше ознайомлення з поняттям множини.'
- title: Большакова Grade 2, p.42
  notes: 'Прикметники в однині та множині: який/яка/яке → які, веселий → веселі.'
