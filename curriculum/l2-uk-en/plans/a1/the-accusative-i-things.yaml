module: a1-026
level: A1
sequence: 26
slug: the-accusative-i-things
version: '2.0'
title: 'The Accusative I: Things'
subtitle: Making Direct Objects Work
focus: grammar
pedagogy: PPP
phase: A1.3 [Cases & Navigation]
word_target: 1200
objectives:
- Learner can form accusative case for inanimate nouns
- Learner can use accusative after verbs like бачити, брати, мати
- Learner can distinguish between nominative and accusative forms
- Learner can explain when accusative is required
content_outline:
- section: Вступ (Introduction)
  words: 250
  points:
  - "The base form — називний відмінок (nominative case). Every noun you have
    learned so far is in its називний form — the 'naming' case. It answers
    хто? (who?) or що? (what?). книга, стіл, молоко — these are all називний."
  - "Ukrainian has 7 cases — words change their endings depending on their role
    in the sentence. Today you learn the first case change: знахідний відмінок
    (accusative) — used for the thing you see, take, read, want."
  - 'Warm-up: ''Що я бачу в кімнаті?'' — anchor concrete objects before
    introducing the case change.'
- section: 'Презентація: Знахідний відмінок (Presentation: Accusative Case)'
  words: 350
  points:
  - 'Feminine Singular transformation: -а → -у, -я → -ю (книга → книгу, кава → каву). Emphasize that the change is mandatory
    to avoid the ''Conceptual Nominative'' error common at A1.'
  - 'Masculine and Neuter ''Safe Harbor'': Explain that inanimate masculine and neuter nouns do not change (стіл → стіл, вікно
    → вікно). Explicitly warn against ''Masculine Inanimate Confusion'' (adding -a endings like ''бачу стола'').'
  - 'High-frequency Action Verbs as triggers: Presentation of ''мати'' (мати рацію, мати час), ''хотіти'' (хотіти їсти), ''брати''
    (брати каву/участь), ''чути'', ''бачити'', and ''купувати''.'
- section: Практика та запобігання помилкам (Practice and Error Prevention)
  words: 350
  points:
  - 'Transformation drills: Nominative to Accusative focusing on the contrast between changing Feminine forms and stable Masculine/Neuter
    inanimate nouns.'
  - 'Error Prevention: Targeted drills to correct ''Conceptual Nominative'' (e.g., changing ''Я читаю книга'' to ''Я читаю
    книгу'') and preventing over-application of endings to masculine inanimate things.'
  - 'High-frequency collocations practice using research-backed items: ''бачити проблему'', ''чути голос'', ''брати трубку'',
    and ''мати можливість''.'
- section: Виробництво та культура (Production and Culture)
  words: 250
  points:
  - 'Cultural Hook: The ''Пакет потрібен?'' checkout meme. Discussion of shopping dynamics: the impersonal ''супермаркет''
    vs. the social hub of the ''базар''.'
  - 'Production: Creating a shopping list (''Я хочу купити...'') including staples ''хліб'' and ''гречка''. Describe items
    in a Ukrainian store context using ''Я бачу...'' and ''Я купую...''.'
vocabulary_hints:
  required:
  - бачити (to see) — бачити проблему, я бачу...; High frequency core verb
  - чути (to hear) — чути музику, чути голос; High frequency core verb
  - брати (to take) — брати участь, брати трубку, брати каву; High frequency
  - мати (to have) — мати рацію, мати час, мати можливість; Very High frequency (Core A1)
  - хотіти (to want) — хотіти їсти, хотіти спати, я хочу...; Very High frequency (Core A1)
  - купувати (to buy) — купувати продукти, купувати одяг; High frequency
  - книга (book) — читати цікаву книгу; High frequency; paradigm example for Feminine Accusative
  - кава (coffee) — пити каву, замовляти каву; Feminine -а to -у pattern
  - хліб (bread) — купувати хліб; Masculine inanimate (no change)
  - гречка (buckwheat) — хочу купити гречку; Cultural staple; Feminine pattern
  - пакет (bag/packet) — 'Пакет потрібен?'; Key checkout vocabulary; Masculine inanimate
  recommended:
  - любити (to love) — я люблю каву; triggers Accusative
  - шукати (to look for) — шукати вихід, шукати книгу
  - знаходити (to find) — знаходити час, знаходити відповідь
  - відкривати (to open) — відкривати вікно, відкривати книгу
