module: a1-09
level: A1
sequence: 9
slug: reflexive-verbs
version: '2.0'
title: Reflexive Verbs (-ся)
subtitle: Actions Directed at Oneself
content_outline:
- section: Warm-up
  points:
  - 'Suffix -ся turns action back onto subject (мити → митися) — visual aid: use a
    "mirror" analogy to explain -ся (action reflecting back)'
  - -ся is short for себе (self) — historically a separate word
  - 'Used for daily routine and social interactions — learner error: The "Myself"
    Redundancy (saying "Я мию себе" instead of "Я миюся")'
- section: Presentation
  points:
  - 'Two forms: -ся (after consonants), -сь (after vowels)'
  - 'Conjugation follows same pattern + -ся/-сь at end — State Standard alignment:
    focus on present tense conjugation (дивлюся, дивишся...)'
  - 'Type 1 — True Reflexive: вмиватися, одягатися — collocations: вмиватися холодною
    водою, одягатися тепло'
  - 'Type 2 — Reciprocal: зустрічатися, вітатися, цілуватися'
  - 'Type 3 — Lexicalized: сміятися, дивитися, подобатися — learner error: Wrong Preposition
    with "Laugh" (using *сміятися над* instead of *сміятися з*); collocations: дивитися
    телевізор'
- section: Practice
  points:
  - Conjugating reflexive verbs
  - Choosing -ся vs -сь based on ending
  - Matching transitive ↔ reflexive pairs — explicitly contrast transitive *мити*
    (washing a plate) vs reflexive *митися* (washing face)
- section: Cultural Insight
  points:
  - 'Pronunciation of -ться (long soft buzzing sound) — cultural hook: mastering the
    soft [ц'':а] is a "shibboleth" for sounding natural and differs from Russian hard
    pronunciation'
  - 'Daily routine vocabulary central to Ukrainian life — cultural hook: the "Вибачаюсь"
    vs "Вибачте" debate highlights the logic of -ся returning action to self (you
    cannot forgive yourself)'
vocabulary_hints:
  required:
  - вмиватися (to wash oneself) — вмиватися холодною водою, вмиватися вранці
  - одягатися (to dress oneself) — одягатися тепло, одягатися стильно, швидко одягатися
  - дивитися (to watch/look) — дивитися телевізор, дивитися у вікно, дивитися на мене
  - сміятися (to laugh) — сміятися голосно, сміятися з жарту (laugh at a joke), сміятися
    до сліз
  - називатися (to be called) — як це називається?, вулиця називається...
  - вчитися (to study) — вчитися в школі, вчитися добре, вчитися грати на гітарі
  - займатися (to do/engage in) — займатися спортом, займатися йогою, займатися бізнесом
  - повертатися (to return) — повертатися додому, повертатися з роботи
  recommended:
  - голитися (to shave)
  - зупинятися (to stop)
  - знайомитися (to get acquainted)
  - цікавитися (to be interested)
