module: a1-041
level: A1
sequence: 41
slug: people-around-me
version: '1.0'
title: People Around Me
subtitle: Accusative animate
focus: grammar
pedagogy: PPP
phase: A1.6 [Food & Shopping]
word_target: 1200
objectives:
- Talk about seeing, knowing, and waiting for people
- Use the Accusative case for animate direct objects
- Understand the difference between animate and inanimate Accusative
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Waiting for a friend. ''Я чекаю брата.'''
  - 'Dialogue 2: Recognizing someone. ''Ти знаєш Олену? Так, я бачу її.'''
- section: Дієслова (Verbs for people)
  words: 400
  points:
  - 'Verbs that take direct objects: бачити (to see), знати (to know), чекати (to wait for), любити (to
    love/like).'
- section: 'Знахідний відмінок: Люди (Accusative Animate)'
  words: 400
  points:
  - 'Rule: Feminine animate is same as inanimate: -а -> -у, -я -> -ю (мама -> маму).'
  - 'Rule: Masculine ANIMATE changes! -[hard consonant] -> -а (брат -> брата, студент -> студента), -й/ь
    -> -я (Андрій -> Андрія).'
  - Contrast with inanimate (Я бачу стіл vs Я бачу брата).
vocabulary_hints:
  required:
  - бачити
  - знати
  - чекати
  - друг
  - подруга
  - брат
  - сестра
  - чоловік
  - жінка
  - люди
  recommended:
  - хлопець
  - дівчина
  - зустрічати
activity_hints:
- type: transformation
  focus: Change Nominative animate nouns to Accusative
  items: 12
- type: multiple-choice
  focus: Choose correct Accusative form (animate vs inanimate)
  items: 10
connects_to:
- a1-042 (Adjectives Everywhere)
prerequisites:
- a1-038 (Eating And Drinking)
- a1-006 (My Family)
grammar:
- Accusative animate (masculine and feminine)
register: розмовний
references: []
