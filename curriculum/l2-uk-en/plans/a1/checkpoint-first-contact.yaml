title: 'Підсумок: Перший контакт'
subtitle: Чи вмієте ви читати, вітатися та розповідати про себе?
focus: review
pedagogy: PPP
phase: A1.1 [Звуки, літери та перший контакт]
word_target: 1200
objectives:
- Впевнено читати українською кирилицею
- Підтримувати повноцінну розмову під час знайомства (привітання → знайомство → родина)
- Самостійно оцінювати знання звуків, літер, привітань та фраз для знайомства
- Поєднувати всі навички рівня A1.1 у зв'язному мовленні
dialogue_situations:
- setting: 'Перший день мовних курсів — двоє студентів знайомляться під час перерви: розповідають про себе, родину і майбутню професію (ти-регістр, рівноправний студентський контекст).'
  speakers:
  - Богдан (студент із Дніпра, майбутній інженер)
  - Соломія (студентка з Тернополя, майбутня вчителька)
  motivation: 'Закріплення: ім''я, прізвище, походження, професія, родина — повна розповідь про себе у ти-регістрі. УВАГА до автора: рівноправний студентський контекст обрано навмисно — він природно мотивує і ти-регістр, і розмову про родину (на конференції професіоналів родинна лексика не є доречною темою знайомства).'
content_outline:
- section: Що ми знаємо?
  words: 200
  points:
  - 'Самоперевірка за темами модулів №1–6: Чи вмієте ви прочитати будь-яке українське слово? (модулі №1–2) Чи розумієте ви функцію м''якого знака (Ь) та апострофа? (модуль №3) Чи можете ви правильно ставити наголос? (модуль №4) Чи вмієте ви розповідати про себе? (модуль №5) Чи можете ви розповісти про свою родину? (модуль №6)'
- section: Читання
  words: 250
  points:
  - 'Короткий український текст (8-10 речень) з використанням ТІЛЬКИ лексики з модулів №1–6. Жодних нових слів. Учень читає вголос. Зміст: Людина розповідає про себе, описує родину, згадує професії, каже, звідки вона родом.'
  - 'За зразком оглядового епізоду Анни (ULP, епізод 10) «Я і моя сім''я».'
- section: Граматика
  words: 200
  points:
  - 'Ключові конструкції з A1.1: 1. Це + іменник (ідентифікація) 2. Підмет — Іменник (без дієслова "бути"): Я — студент 3. У мене є + іменник (приналежність) 4. Як тебе/вас звати? (запитання імені) 5. Мій/моя/моє + іменник (присвійні займенники з урахуванням роду) 6. Звідки ти? — Я з... (походження як сталий вираз)'
- section: Діалог
  words: 400
  points:
  - 'Повне знайомство — комплексний діалог, що поєднує ВСЕ з рівня A1.1. Ситуація: зустріч із новою людиною у рівноправному студентському контексті (мовні курси, студентське орієнтування). Повний цикл: привітання → ім''я → прізвище → походження → професія → родина → прощання. Якщо учень розуміє та може відтворити цей діалог, рівень A1.1 пройдено.'
  - 'Зв''язний монолог: власна розповідь учня про себе. Привіт! Мене звати [ім''я]. Моє прізвище [прізвище]. Я з [країна]. Я [національність]. Я — [професія]. Моя мама — [професія]. Мій тато — [професія]. У мене є [родина]. Дуже приємно познайомитися! Це випускна промова рівня A1.1.'
  - 'УВАГА до автора (типові помилки L2 для A1.1 — див. вікі-статтю, розділ «Типові помилки L2»): НЕ використовуйте `папа` у значенні "батько" (нормативне: `тато`); НЕ використовуйте `фамілія` (нормативне: `прізвище`); НЕ використовуйте кальку `Моє ім''я є Іван` (нормативне: `Мене звати Іван`); НЕ використовуйте форсоване `Я є студент` (нормативне: `Я студент`); НЕ використовуйте кальку `Я маю 25 років` (нормативне: `Мені 25 років`); НЕ використовуйте `Здрастуйте` / `Пока` (нормативні привітання та прощання: `Добрий день` / `До побачення`). Тримайте ти-регістр до кінця діалогу — НЕ змішуйте з Ви.'
- section: Підсумок
  words: 150
  points:
  - 'Фінальні запитання для самоперевірки: Скільки літер/звуків в українській мові? Привітайтеся формально та неформально. Розкажіть про себе у 5 реченнях. Назвіть членів своєї родини, використовуючи присвійні займенники.'
vocabulary_hints:
  required:
  - All vocabulary from №1–6 is recycled — no new required words
  recommended:
  - ім'я (first name)
  - прізвище (surname — standard; NOT the Surzhyk `фамілія`)
  - знайомство (acquaintance / introduction)
  - професія (profession / occupation)
  - національність (nationality / ethnicity)
  - походження (origin)
  - Вітаю (hello / greeting — neutral; also "congratulations" in other contexts)
  - Дуже приємно (very nice to meet you — greeting closure)
  - Мені теж (me too — reciprocal acknowledgement after Дуже приємно)
  - тато (dad — standard; NOT the Russianism `папа`)
activity_hints:
- type: quiz
  focus: 'Комплексне повторення: звуки, літери, привітання, родина'
  items: 12
- type: fill-in
  focus: Доповнити повний монолог-розповідь про себе
  items: 8
- type: match-up
  focus: З'єднати запитання з відповідями (Як звати? → Мене звати...)
  items: 8
- type: fill-in
  focus: 'Типові помилки A1.1 — оберіть нормативну форму (див. wiki "Типові помилки L2")'
  items:
  - '{Добрий день|Здрастуйте}! Мене звати Оксана.'
  - Мій {тато|папа} — інженер.
  - '{Мене звати Іван|Моє ім''я є Іван}.'
  - Я {студент|є студент}.
  - '{Мені 25 років|Я маю 25 років}.'
  - Як твоє {прізвище|фамілія}?
  - — Дякую! — Будь ласка. — {До побачення|Пока}!
