module: a1-10
level: A1
sequence: 10
slug: checkpoint-first-contact
version: '2.0'
title: 'Checkpoint: First Contact'
subtitle: Can You Do the A1.1 Skills?
content_outline:
- section: Overview
  points:
  - 'Мета контрольної точки — перевірити навички A1.1 — alignment: консолідація фонології
    (§4.1.1), морфології (§4.2.1.1, §4.2.4.1) та синтаксису (§4.3.1)'
  - Як працювати з цим модулем — practical check-up approach
  - Що робити, якщо щось не вийшло
- section: 'Skill 1: Читання кирилиці'
  points:
  - 'Впізнавання всіх 33 літер — фокус на друковані та писані літери (§4.1.1: Київ,
    Олена, олівець)'
  - Читання слів без транслітерації
  - 'Типові помилки (и/і, е/є, г/ґ) — learner error: плутанина И (bit) та І (bee)'
- section: 'Skill 2: Визначення роду'
  points:
  - Рід за закінченням (-а/-я, приголосний, -о/-е) — §4.2.1.1 (чоловік, жінка, місто)
  - 'Винятки (тато, батько, Михайло) — learner error: ''тато'' often mistaken for
    neuter due to -o ending'
  - Швидка класифікація іменників
- section: 'Skill 3: Дієвідміна'
  points:
  - Перша дієвідміна (-ати → -аю, -аєш) — §4.2.4.1 (читати)
  - Друга дієвідміна (-ити → -лю, -иш)
  - Вибір правильного закінчення
  - 'Типові помилки студентів — learner error: mixing up -уть/-ють (I conj) and -ать/-ять
    (II conj)'
- section: 'Skill 4: Питальні речення'
  points:
  - 'Питання з хто/що/де/коли — §4.3.1; collocations: Хто це? Де ви? Що це? Куди ви
    їдете?'
  - Інтонація питання так/ні
  - Заперечення з не
- section: 'Skill 5: Замовлення їжі'
  points:
  - Фрази для кафе (Можна мені...?, Я хочу...) — §3.9; include phrase 'Смачного!'
    (Bon appetit)
  - Ввічливі форми (будь ласка, дякую)
  - 'Розуміння простого меню — cultural hook: Lviv Coffee Culture and Yuriy Kulchytsky
    (Viennese coffee origin)'
- section: Integration Task
  points:
  - 'Діалог у кафе — застосування всіх навичок — context: ''піти на каву'' implies
    meeting for communication, not just drinking'
  - Самооцінка готовності до A1.2
vocabulary_hints:
  required:
  - читати (to read) — читати меню, читати текст (High Freq)
  - писати (to write) — писати листа, писати вправу (High Freq)
  - говорити (to speak) — говорити українською, говорити повільно (High Freq)
  - знати (to know) — я знаю, хто знає?, знати відповідь (High Freq)
  - хто (who) — Хто це? Хто ви? (Interrogative)
  - що (what) — Що це? Що тобі купити? (Interrogative)
  - де (where) — Де ви? Де кафе? (Interrogative)
  - так/ні (yes/no)
  recommended:
  - розуміти (to understand)
  - питати (to ask)
  - відповідати (to answer)
  - перевіряти (to check)
  - 'кава (coffee) — чорна кава, кава з молоком — cultural hook: Lviv coffee tradition'
  - рахунок (bill/check) — Можна рахунок?, принести рахунок
activity_hints:
- type: quiz
  focus: A1.1 grammar and vocabulary
  items: 30
focus: checkpoint
