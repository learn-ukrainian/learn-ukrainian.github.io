module: a1-014
level: A1
sequence: 14
slug: checkpoint-first-contact
version: '2.0'
title: 'Checkpoint: First Contact'
subtitle: Can You Do the A1.1 Skills?
focus: checkpoint
pedagogy: TTT
phase: A1.1 [First Contact]
word_target: 2000
objectives:
- Demonstrate Cyrillic reading fluency
- Identify noun gender by word ending
- Conjugate First and Second Conjugation verbs correctly
- Form questions and negative statements
content_outline:
- section: Огляд (Overview)
  words: 300
  points:
  - 'Привітання від господаря хостелу (Friendly Hostel Host) — пояснення мети контрольної точки: консолідація фонології (§4.1.1),
    морфології (§4.2.1.1, §4.2.4.1) та синтаксису (§4.3.1) рівня A1.1'
  - Практичний підхід до перевірки знань — стратегія 'Test-Teach-Test' (TTT) для виявлення прогалин перед переходом до знахідного
    відмінка (a1-11)
- section: 'Навичка 1: Читання та Рід (Skill 1: Reading and Gender)'
  words: 500
  points:
  - 'Фонологічний виклик: розрізнення звуків И /ɪ/ (bit) та І /i/ (bee) — вправи на мінімальні пари та читання слів зі стандарту
    (§4.1.1: Київ, київський, Україна, українець, Олена, олівець)'
  - Класифікація іменників за родом (§4.2.1.1) — фокус на 'тато' (чоловічий рід), який часто помилково вважають середнім через
    закінчення -о, на відміну від слова 'місто'
  - Швидка перевірка вміння впізнавати всі 33 літери українського алфавіту без використання транслітерації
- section: 'Навичка 2: Дієслова та Питання (Skill 2: Verbs and Questions)'
  words: 500
  points:
  - 'Дієвідмінювання у теперішньому часі (§4.2.4.1) — drill для подолання типової помилки: плутанина закінчень 3-ї особи множини
    -уть/-ють (I дієвідміна) та -ать/-ять (II дієвідміна)'
  - Конструювання питань з хто/що/де/куди (§4.3.1) — інтонаційні моделі для закритих питань та використання заперечної частки
    'не' у відповідях
  - 'Використання високочастотних дієслів у контексті: читати вголос, писати вправу ручкою, говорити повільно по-українськи'
- section: 'Культурний контекст: Кафе (Cultural Context: Cafe)'
  words: 400
  points:
  - Львівська культура кави — історична довідка про Юрія Кульчицького та віденську кав'ярню «Під синьою пляшкою» (1683), що
    пов'язує Україну з європейською традицією
  - 'Етикет замовлення їжі (§3.9) — обов''язкове вживання фрази «Смачного!» (Bon appetit) та ввічливих форм запиту: «Дайте,
    будь ласка...», «Можна рахунок?»'
- section: Інтеграційне завдання (Integration Task)
  words: 300
  points:
  - 'Рольова гра: Діалог у кафе — інтеграція навичок читання меню, визначення роду (чорна кава) та вживання дієслів (Я хочу
    каву, Я читаю меню)'
  - Самооцінка готовності до переходу на рівень A1.2 — підбиття підсумків засвоєння перших 10 модулів
vocabulary_hints:
  required:
  - читати (to read) — читати меню, читати текст, читати вголос; High Frequency
  - писати (to write) — писати листа, писати вправу, писати ручкою; High Frequency
  - говорити (to speak) — говорити українською, говорити повільно, говорити правду; High Frequency
  - знати (to know) — я знаю, хто знає?, знати відповідь; High Frequency
  - хто (who) — Хто це? Хто ви?; Interrogative focus
  - що (what) — Що це? Що тобі купити?; Interrogative focus
  - де (where) — Де ви? Де кафе?; Interrogative focus
  - так/ні (yes/no) — базові ствердні та заперечні відповіді
  recommended:
  - розуміти (to understand) — я розумію, не розумію; Core A1 communication
  - питати (to ask) — питати дорогу, питати ціну; Verb conjugation practice
  - відповідати (to answer) — відповідати на питання; Verb conjugation practice
  - 'кава (coffee) — чорна кава, кава з молоком, філіжанка кави; Cultural hook: Lviv tradition'
  - рахунок (bill/check) — Можна рахунок?, оплатити рахунок; Essential service vocabulary
  - Смачного! (Bon appetit) — Essential cultural phrase for dining
  - перевіряти (to check) — перевіряти вправу, перевіряти навички; Checkpoint specific
activity_hints:
