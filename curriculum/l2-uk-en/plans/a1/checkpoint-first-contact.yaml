module: a1-007
level: A1
sequence: 7
slug: checkpoint-first-contact
version: '1.0'
title: "Checkpoint: First Contact"
subtitle: "Can You Read, Greet, and Introduce Yourself?"
focus: review
pedagogy: PPP
phase: A1.1 [Script & First Contact]
word_target: 1200
objectives:
- Demonstrate ability to read Ukrainian Cyrillic fluently
- Hold a complete first conversation (greet → introduce → family → goodbye)
- Self-assess knowledge of alphabet, sounds, greetings, introductions, family
- Combine all A1.1 skills in connected speech
content_outline:
- section: "Що ми знáємо? (What Do We Know?)"
  words: 200
  points:
  - "Quick self-check covering M01-M06:
    ✓ Can you read any Ukrainian word in Cyrillic? (M01)
    ✓ Do you know what Ь and ' do to pronunciation? (M02)
    ✓ Can you find the stressed syllable in common words? (M03)
    ✓ Can you greet someone formally and informally? (M04)
    ✓ Can you introduce yourself with name, origin, profession? (M05)
    ✓ Can you talk about your family using У мене є and мій/моя? (M06)"
  - "Review of the Ukrainian sounds that English speakers find hardest:
    И (between 'i' and 'ee'), Г (voiced [ɦ]), Р (rolled), and the soft
    consonants with Ь. Quick pronunciation refresher with word examples."
- section: "Читáння (Reading Practice)"
  words: 200
  points:
  - "A short Ukrainian text (8-10 sentences) using ONLY vocabulary from M01-M06.
    The learner reads it aloud, checking their Cyrillic fluency and stress
    placement. Something like Anna Ohoiko's ULP 1-10 'Я і моя сім'я' text."
  - "Text content: A person introduces themselves, describes their family,
    mentions professions, says where they're from. All vocabulary recycled
    from previous modules — no new words, just fluent combination."
- section: "Грамáтика (Grammar Summary)"
  words: 200
  points:
  - "Key patterns learned so far (not rules — patterns from real speech):
    1. Це + noun (identification): Це мій тато.
    2. Subject — Noun (no 'is'): Я — студент.
    3. У мене є + noun (possession): У мене є сестра.
    4. Як тебе/вас звати? (asking names)
    5. Мій/моя/моє/мої + noun (possession with gender)"
  - "Common mistakes to watch for:
    — Using 'є' as 'is' everywhere (*Він є студент → Він — студент)
    — Forgetting gender on possessives (*мій сестра → моя сестра)
    — Reading В as 'b' instead of [v] — the false friend trap"
- section: "Культýра (Cultural Corner)"
  words: 150
  points:
  - "Ukrainian naming conventions: first name (ім'я), patronymic (по батькові),
    surname (прізвище). Ukrainians use all three in formal settings:
    Тарáс Григóрович Шевчéнко. In daily life, first name is enough among
    friends; пáне/пáні + name for formal address."
  - "The significance of сім'я in Ukrainian culture — family ties are
    traditionally very strong. Multi-generational family gatherings,
    regular visits to grandparents, the tradition of passing down names."
- section: Діалоги (Dialogues)
  words: 450
  points:
  - "FINAL DIALOGUE — The Full Introduction. A comprehensive dialogue that
    combines EVERYTHING from A1.1. Setting: international meetup in Kyiv.
    Two people meet, greet formally, switch to informal, introduce
    themselves fully, show family photos, exchange names and professions,
    say goodbye. This is the capstone — if learner can follow and produce
    this dialogue, A1.1 is complete."
  - "Connected monologue template — learner's own self-introduction.
    Following Anna ULP 1-10 exactly: Привіт! Як справи? У мене — чудово.
    Мене звати [name]. Я [nationality]. Я — [profession].
    Моя мама — [profession]. Її звати [name]. Мій тато — [profession].
    Його звати [name]. У мене є [family]. [Name] живе в [city].
    This is 'Я і моя сім'я' — the A1.1 graduation speech."
  - "Reading Ukrainian social media profiles: Short bios that combine
    all A1.1 vocabulary. Олена, 25. Львів. Журналістка. Люблю каву.
    (Preview of M15 topic.) Learner reads and identifies: name, age, city,
    profession."
vocabulary_hints:
  required:
  - "All vocabulary from M04-M06 is recycled — no new required words"
  recommended:
  - ім'я (first name) — naming convention vocabulary
  - по бáтькові (patronymic) — Ukrainian naming system
  - прíзвище (surname) — Ukrainian naming system
  - пáне (Mr., formal address) — formal address preview
  - пáні (Ms., formal address) — formal address preview
