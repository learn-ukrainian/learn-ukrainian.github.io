module: a1-24
level: A1
sequence: 24
slug: can-must-want-modals
version: '2.0'
title: Can, Must, Want - Modals
subtitle: Expressing Ability, Obligation, and Desire
content_outline:
- section: Warm-up
  points:
  - 'Три типи модальності в повсякденному житті — alignment: State Standard §3 (Thematic
    Areas) ''Мені треба лікаря / ліки'''
- section: Presentation
  points:
  - 'Могти — фізична можливість (Я можу бігати) — collocations: може бути, можу допомогти;
    stress: ensure mark on мо́жу, мо́жеш'
  - 'Вміти — навичка (Я вмію плавати) — collocations: вміти читати, вміти готувати;
    learner error: using могти for learned skills instead of вміти'
  - 'Дієвідміна могти (можу, можеш, може...) — alignment: State Standard §4.2.4.1'
- section: Presentation 2
  points:
  - 'Треба/потрібно + інфінітив (Треба працювати) — collocations: треба йти, потрібно
    терміново; learner error: using треба + noun instead of потрібен; note: impersonal
    nature'
  - 'Повинен узгоджується з родом (Він повинен / Вона повинна) — collocations: він
    повинен, ми повинні; learner error: gender/number mismatch (Вона повинен)'
  - Мусити як сильний обов'язок
- section: Presentation 3
  points:
  - 'Можна + інфінітив (Можна увійти?) — cultural hook: using «Можна?» as a standalone
    polite request (entering a room, asking for items)'
  - Не можна — заборона
- section: Presentation 4
  points:
  - Варто + інфінітив (Варто спробувати)
- section: Presentation 5
  points:
  - Пробувати, намагатися, вдаватися
- section: Presentation 6
  points:
  - Необхідний, обов'язковий, можливий
- section: Presentation 7
  points:
  - Правила в школі/офісі (Не можна курити)
  - 'Плани (Я повинен/повинна закінчити...) — connection: prepares for a1-25 (My Daily
    Routine)'
- section: Practice
  points:
  - Діалог про дозвіл (Можна взяти?) — reinforce etiquette
  - Діалог про обов'язки на роботі
- section: Practice 2
  points:
  - 'Опис своїх обов''язків та можливостей — proverb: «Хто хоче — той може»'
vocabulary_hints:
  required:
  - 'могти (can, to be able) — collocations: може бути (maybe), можу допомогти (I
    can help); stress: мо́жу, мо́жеш'
  - 'вміти (to know how) — collocations: вміти читати (can read), вміти готувати (can
    cook)'
  - 'треба (need to, must) — collocations: треба йти (must go), треба працювати (need
    to work); note: impersonal'
  - 'можна (may, it is allowed) — etiquette: standalone question «Можна?» (May I?)'
  - 'хотіти (to want) — collocations: хочу пити (want to drink), хочу знати (want
    to know); stress: хо́чу, хо́чеш'
  - 'потрібно (it is necessary) — collocations: потрібно терміново (necessary urgently)'
  - 'повинен (must, should) — collocations: він повинен (he must), ми повинні (we
    must)'
  - не можна (forbidden)
  recommended:
  - дозволити (to allow)
  - заборонено (forbidden)
  - обов'язково (obligatory)
  - необхідний (necessary)
activity_hints:
- type: fill-in
