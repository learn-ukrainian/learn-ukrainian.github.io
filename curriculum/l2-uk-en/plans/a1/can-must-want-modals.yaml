module: a1-24
level: A1
sequence: 24
slug: can-must-want-modals
version: '2.0'
title: Can, Must, Want - Modals
subtitle: Expressing Ability, Obligation, and Desire
content_outline:
- section: Вступ та культурний контекст (Introduction and Cultural Context)
  words: 400
  points:
  - Thematic importance of modals in daily life, aligning with State Standard §3 for
    expressing basic needs ('Мені треба лікаря / ліки').
  - 'Cultural hook: The polyfunctional role of «Можна?» as a standalone polite request
    for entering rooms, taking seats, or moving through crowds.'
  - 'Introduction to the three primary types of modality: Ability (вміти/могти), Obligation
    (треба/повинен), and Desire (хотіти).'
- section: 'Можливість: Могти та Вміти (Ability: Can and Know How)'
  words: 600
  points:
  - Comparison of «Могти» vs «Вміти» to prevent the common learner error of using
    «могти» (physical possibility) for learned skills like swimming or reading.
  - 'Full conjugation of «Могти» according to State Standard §4.2.4.1, explicitly
    highlighting the г/ж consonant alternation: можу, можеш, може, можемо, можете,
    можуть.'
  - Drills on physical possibility vs. learned skills using 5 minimal pairs (e.g.,
    'Я не можу плавати, бо холодно' vs 'Я не вмію плавати').
  - 'Collocations for high-frequency usage: «може бути» (maybe), «можу допомогти»
    (I can help), «вміти готувати» (know how to cook).'
- section: Обов'язок та Дозвіл (Obligation and Permission)
  words: 600
  points:
  - Exploring obligation through «Треба», «Потрібно», and «Повинен», emphasizing the
    impersonal nature of «треба» versus the personal agreement of «повинен».
  - 'Learner error focus: Ensuring subject-gender agreement for «Повинен» (він повинен,
    вона повинна, воно повинно, вони повинні).'
  - Addressing the 'Треба + Noun' learner error by introducing the correct construction
    «Мені потрібна ручка» (adjective agreement) versus «Мені треба писати» (infinitive).
  - Expressing permission and prohibition with «Можна» and «Не можна», covering communicative
    intentions for prohibition from §2 (Catalogue A).
- section: Практика та Закріплення (Practice and Consolidation)
  words: 400
  points:
  - 'Interactive roleplay: Asking for permission in professional and social settings
    using appropriate etiquette and the standalone «Можна?» request.'
  - 'Narrative connection: Using modals to describe obligations and possibilities
    in daily routines, bridging the gap between time-telling (a1-23) and routine (a1-25).'
  - 'Cultural synthesis: Analysis of the proverb «Хто хоче — той може» (He who wants
    — can), reflecting the semantic link between desire and ability.'
vocabulary_hints:
  required:
  - 'могти (can, to be able) — collocations: може бути (maybe), можу допомогти (I
    can help), не можу (I cannot); High frequency (Top 50 verbs); stress: мо́жу, мо́жеш'
  - 'вміти (to know how) — collocations: вміти читати/писати (know how to read/write),
    вміти плавати (know how to swim); focuses on learned skills; Medium-High frequency'
  - 'треба (need to, must) — collocations: мені треба (I need), треба йти (must go),
    так треба (it is necessary); Very high frequency impersonal modal'
  - 'можна (may, it is allowed) — etiquette: standalone question «Можна?» (May I?
    / Excuse me); Very high frequency permission marker'
  - 'хотіти (to want) — collocations: хочу їсти/пити (hungry/thirsty), що ти хочеш?
    (what do you want?); High frequency; stress: хо́чу, хо́чеш'
  - 'потрібно (it is necessary) — collocations: потрібно терміново (necessary urgently);
    impersonal requirement'
  - 'повинен (must, should) — collocations: повинен знати (must know), повинна бути
    (must be); personal modal requiring gender/number agreement'
  - 'не можна (forbidden) — usage: «Тут не можна курити» (Smoking is forbidden here);
    prohibition marker'
  recommended:
  - дозволити (to allow) — formal permission
  - заборонено (forbidden) — formal prohibition found in signs
  - обов'язково (obligatory) — emphasizing necessity
  - необхідний (necessary) — formal requirement
