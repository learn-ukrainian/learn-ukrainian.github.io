title: 'Checkpoint: Core Grammar'
subtitle: Confirm Grammar Readiness Before Practical Scenarios
content_outline:
- section: Вступ та огляд (Introduction and Overview)
  words: 400
  points:
  - Фінальна перевірка граматичних основ рівня А1 (морфологія та синтаксис) згідно
    з §4.2 Державного стандарту — огляд ключових компетенцій перед переходом до практичних
    сценаріїв.
  - 'Методологія Test-Teach-Test (TTT): проведення діагностичного тесту для виявлення
    індивідуальних прогалин, цільове пояснення складних моментів та фінальне закріплення
    знань.'
  - 'Культурний гачок: Українська мова як одна з наймилозвучніших у світі (легендарний
    конкурс 1934 року в Парижі) — практичне значення евфонії та правил чергування
    у/в та і/й для мелодійності мовлення.'
- section: Рід та узгодження (Gender and Agreement)
  words: 500
  points:
  - Систематизація визначення роду іменників за закінченнями (§4.2.1 Стандарту) та
    правила узгодження прикметників і присвійних займенників у реченні.
  - 'Аналіз та корекція типової помилки: порівняння неправильного «Гарний книга» (M
    adj + F noun) з правильним «Гарна книга» — впровадження алгоритму ''спочатку перевір
    рід іменника''.'
  - 'Соціальний аспект граматики: вивчення культурної цінності шанобливості через
    граматичну різницю між формами «ти» та «ви» (2-га особа однини vs множини) у дієвідмінюванні.'
- section: Дієслівна система (Verb System)
  words: 600
  points:
  - 'Консолідація дієслівних форм (§4.2.4.1): відмінювання у теперішньому часі (I
    та II дієвідміни), утворення форм минулого часу та складеної форми майбутнього
    часу недоконаного виду.'
  - 'Подолання «пастки дієслова бути»: робота над викоріненням помилки «Я є студент»
    (вплив англійської мови) на користь нормативного «Я студент» у теперішньому часі.'
  - Практика вживання високочастотних модальних дієслів (могти, хотіти) та дієслів
    руху (йти) у повсякденних контекстах з акцентом на правильне керування.
- section: Система відмінків та практика (Case System and Practice)
  words: 500
  points:
  - Огляд функцій чотирьох базових відмінків (Називний, Знахідний, Родовий, Місцевий)
    згідно з §4.2.3 Державного стандарту — від позначення суб'єкта до заперечення
    та місця.
  - 'Розрізнення категорій ''Напрямок'' vs ''Місце'': вправа на виправлення помилки
    «Я йду в магазині» (Locative) на правильну форму «Я йду в магазин» (Accusative).'
  - 'Фінальне інтеграційне завдання: застосування граматичних структур у діалогах
    ''Замовлення в кафе'', ''Покупки'' та ''Запитання про дорогу'' як перепустка до
    практичного блоку А1.4.'
vocabulary_hints:
  required:
  - 'бути (to be) — бути вдома, не бути (absence); Top 10 frequency; learner error:
    redundant ''є'' in present tense'
  - 'мати (to have) — мати час, мати рацію (idiom: to be right), мати можливість;
    Top 20 frequency'
  - хотіти (to want) — хотіти їсти/пити, хотіти спати; modal usage required for basic
    needs
  - могти (can) — я можу допомогти, ви можете сказати?; essential for requests and
    politeness
  - йти (to go) — йти додому, йти в магазин, йти в кіно; motion verb with Accusative
    for direction
  - знати (to know) — я не знаю, знати мову, знати відповідь; cognitive verb for A1
    level check
  - робити (to do) — робити покупки, робити каву, що ти робиш?; high-frequency general
    activity verb
  - говорити (to speak) — говорити українською, говорити про справу; focus on language
    ability
  recommended:
  - читати (to read) — читати книгу, читати вголос; practice for Cyrillic fluency
  - писати (to write) — писати листа, писати вправу; focus on conjugation and case
    agreement
  - їсти (to eat) — їсти сніданок, хотіти їсти; irregular conjugation awareness
  - пити (to drink) — пити воду, пити чай; high-frequency verb for service scenarios
