title: At the Café
subtitle: Ordering Drinks and Snacks
content_outline:
- section: Вступ і культурний контекст (Introduction and Cultural Context)
  words: 400
  points:
  - 'Культура кав’ярень: Львів як кавова столиця України, австрійський вплив та постать
    Юрія Кульчицького (Галичина), який відкрив першу кав’ярню у Відні «Під синьою
    пляшкою».'
  - 'Соціальний ритуал: пояснення фрази «піти на каву» як запрошення до спілкування.
    Різниця між кав''ярнею та рестораном (акцент на атмосфері).'
  - Використання слова «філіжанка» (Lviv flavor) як культурного маркера, що відрізняє
    західноукраїнську традицію від стандартного «чашка».
- section: Мовні конструкції та етикет (Language Structures and Etiquette)
  words: 600
  points:
  - 'Мовна норма та ввічливість (Standard §3.9): вивчення фраз «Можна мені...?» та
    «Мені, будь ласка...». Попередження про помилку буквального перекладу «Can I have...?».'
  - 'Знахідний відмінок об''єкта (Standard §4.2.3.2.1): функція прямого додатка без
    прийменника (Я буду кав**у**, хочу кав**у**). Порівняння з неправильним Називним
    відмінкком («хочу кава»).'
  - 'Порядок слів: позиціонування «будь ласка» в середині або в кінці прохання («Дайте
    мені, будь ласка...») як більш природне порівняно з англійською калькою на початку
    речення.'
- section: Сценарії в кав'ярні (Café Scenarios)
  words: 600
  points:
  - 'Діалог замовлення: вибір напоїв (кава чорна/з молоком, чай з лимоном) та смаколиків
    (круасан, тістечко). Коректні відповіді на питання «тут чи з собою?».'
  - 'Технічні деталі: як ввічливо запитати про пароль до Wi-Fi та наявність вільної
    розетки біля столика.'
  - 'Оплата та розрахунок: введення сталих виразів «готівкою» та «карткою» (Instrumental
    case intro) як фіксованих лексичних блоків для відповіді на питання «Як ви будете
    платити?».'
- section: Наратив та підсумок (Narrative and Summary)
  words: 400
  points:
  - 'Персоналізований наратив: віртуальний візит до львівської кав''ярні, опис інтер''єру
    та замовлення кави у «філіжанці».'
  - 'Закріплення етикетних норм: обов’язкове використання «Дякую» та «Будь ласка»
    у кожній репліці для відповідності комунікативним намірам Standard §3.9.'
  - 'Самоперевірка: вживання правильних закінчень Знахідного відмінка для напоїв (воду,
    каву) та десертів.'
vocabulary_hints:
  required:
  - кава (coffee) — чорна кава, кава з молоком, філіжанка кави, пити каву; High frequency
    (Top 500)
  - чай (tea) — зелений чай, чорний чай, чай з лимоном, чашка чаю; High frequency
    (Top 500)
  - меню (menu) — подивитися меню, попросити меню, що у вас у меню?; Medium frequency
  - рахунок (bill) — можна рахунок?, оплатити рахунок, окремий рахунок; Medium frequency
  - будь ласка (please) — скажіть будь ласка, дайте будь ласка, сідайте будь ласка;
    Very High frequency politeness marker
  - дякую (thank you) — щиро дякую, дякую за каву; mandatory for politeness (Standard
    §3.9)
  - готівка (cash) — платити готівкою; Instrumental case fixed chunk
  - картка (card) — розрахуватися карткою, термінал; Instrumental case fixed chunk
  recommended:
  - філіжанка (cup) — Lviv tradition/dialect; preferred synonym for 'чашка' in Western
    Ukraine
  - круасан (croissant) — популярна випічка до кави
  - тістечко (pastry/cake) — шоколадне тістечко, фруктове тістечко
  - молоко (milk) — кава з молоком, без молока
  - цукор (sugar) — один цукор, без цукру
  - вершки (cream) — кава з вершками
