module: a1-35
level: A1
sequence: 35
slug: at-the-cafe-practical
version: '2.0'
title: At the Café
subtitle: Ordering Drinks and Snacks
content_outline:
- section: Warm-up
  points:
  - 'Культура кав''ярень в Україні (особливо Львів!) — cultural hook: Львів як кавова
    столиця, австрійський вплив та постать Юрія Кульчицького (Галичина), який відкрив
    першу кав''ярню у Відні «Під синьою пляшкою»'
  - Чим відрізняється кав'ярня від ресторану? — акцент на атмосфері та ритуалі споживання
    кави
- section: Presentation
  points:
  - Привітання (Добрий день! / Привіт!) — focus on politeness (State Standard §3.9)
  - 'Запитання про меню (Що ви порадите?) — collocation: «подивитися меню», «що у
    вас у меню?»'
  - 'Замовлення (Мені, будь ласка... / Я візьму...) — learner error: уникнення буквального
    перекладу «May I have» (використовувати «Можна мені...»); learner error: неприродна
    позиція «будь ласка» на початку речення'
  - 'Уточнення (З молоком? Великий чи маленький?) — learner error: використання називного
    відмінка замість знахідного для прямого додатка (хочу кав**у**, а не кав**а**);
    State Standard §4.2.3.2.1'
  - 'Оплата (Можна рахунок? Готівкою / Карткою) — collocations: «оплатити рахунок»,
    «окремий рахунок»; introduction of Instrumental case via fixed phrases «готівкою»/«карткою»'
  - Подяка та прощання — mandatory use of «дякую»
- section: Practice
  points:
  - 'Діалог 1: Замовлення кави та круасана — use «філіжанка» for Lviv flavor'
  - 'Діалог 2: Питання про Wi-Fi та розетку'
  - 'Діалог 3: Оплата рахунку — distinguish between «готівкою» and «карткою»'
- section: Warm-up 2
  points:
  - Наратив про візит до львівської кав'ярні
  - 'Атмосфера та типові фрази в контексті — cultural hook: використання слова «філіжанка»
    замість «чашка» для підкреслення львівської традиції (Lviv coffee legend)'
vocabulary_hints:
  required:
  - кава (coffee) — чорна кава, кава з молоком, філіжанка кави (High frequency)
  - чай (tea) — зелений чай, чорний чай, чай з лимоном
  - меню (menu) — подивитися меню, що у вас у меню?
  - рахунок (bill) — можна рахунок?, оплатити рахунок, окремий рахунок
  - будь ласка (please) — каву, будь ласка; сідайте, будь ласка (Politeness marker)
  - дякую (thank you)
  - готівка (cash) — платити готівкою (Instrumental case intro)
  - картка (card) — розрахуватися карткою (Instrumental case intro)
  recommended:
  - круасан (croissant)
  - тістечко (pastry)
  - молоко (milk)
  - цукор (sugar)
  - філіжанка (cup - dialect) — Lviv tradition, synonym for чашка
