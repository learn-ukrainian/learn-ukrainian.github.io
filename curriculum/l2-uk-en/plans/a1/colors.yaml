- setting: 'WRITER-ONLY metadata (never rendered as prose). Вибір вбрання на вечірку + короткий опис Олі для впізнавання. Objects: чорна сукня (f), білий светр (m), сіре пальто (n), коричневі черевики (pl), карі очі, русяве/сиве волосся.'
