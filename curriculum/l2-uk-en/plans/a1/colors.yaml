content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Вибір букета на квітковому ринку (за мотивами вірша про кольори з підручника Большакової для 2 класу, с. 38): — Які гарні троянди! Якого вони кольору? — Червоні. А ось ці лілії — білі. — Мені подобаються жовті соняшники. — Добре, загорнути букет? Кольори входять через реалістичне запитання `Якого кольору?` і коротку відповідь. Примітка: `Мені подобаються` тут працює як готовий вираз; детальне пояснення давального відмінка відкладаємо.'
  - 'Діалог 2 — Опис кімнати й людини для впізнавання (продовження модуля №8–9): — Якого кольору твоя кімната? — Біла. — А стіл? — Стіл коричневий. А крісло — сіре. — Як я впізнаю Олю? — У неї карі очі й русяве волосся. Повторення: узгодження за родами + нова лексика кольорів + кілька природних словосполучень для зовнішності.'
- section: Кольори
  words: 300
  points:
  - '12 базових кольорів, поділених за типами прикметників: Тверда група (-ий/-а/-е — такий самий патерн, як у модулі №9): червоний/червона/червоне, жовтий/жовта/жовте, зелений/зелена/зелене, чорний/чорна/чорне, білий/біла/біле, сірий/сіра/сіре.'
  - 'М''яка група (-ій/-я/-є — НОВИЙ патерн): синій/синя/синє. Вашуленко, 3 клас, с. 130: прикметники поділяються на тверду групу (-ий) та м''яку групу (-ій). Лише слово "синій" належить до м''якої групи серед базових кольорів — зараз варто вивчити його як окремий виняток. Порівняйте: великий стіл → синій стіл, велика книга → синя книга, велике вікно → синє вікно.'
  - 'Мовленнєва рамка: `Якого кольору...?` + коротка відповідь одним прикметником (`Червоний`, `Червона`, `Червоне`, `Червоні`). Лише потім переходити до повного речення (`Сукня червона`).'
- section: Синій ≠ блакитний
  words: 300
  points:
  - 'В українській мові для A1 активно вчимо пару синій = темно-/глибоко-синій (море, чорнило) і блакитний = світло-/небесно-синій (ясне небо). Прапор України — синьо-жовтий (Кравцова, 2 клас, с. 22: Синє — небо, жовте — жито). Writer note: не називайте `голубий` русизмом; якщо слово трапиться поза модулем, досить пасивного впізнавання як словникового синоніма до `блакитний`.'
  - 'Інші кольори для опису речей: коричневий, рожевий, помаранчевий, фіолетовий. Усі вони належать до твердої групи (-ий/-а/-е). Складні кольори: темно-зелений, світло-синій.'
  - 'Усталені словосполучення для зовнішності: `карі очі`, `русяве волосся`, `сиве волосся`. Їх варто подавати як готові чанки, а не як просте механічне перенесення базової палітри на людину.'
- section: Підсумок
  words: 300
  points:
  - 'Узгодження кольорів за правилами модуль №9: Тверда група: червоний стіл, червона книга, червоне вікно. М''яка група: синій стіл, синя книга, синє вікно. Самоперевірка: поставте 3 запитання з формулою `Якого кольору?`, опишіть 3 речі у вашій кімнаті, а також дайте природний опис `карі очі` / `русяве волосся` / `сиве волосся`. УВАГА до автора: форми `зеленіший`, `синіший` свідомо не вводимо; це межа A2, не ціль цього модуля.'
vocabulary_hints:
  required:
  - червоний (red)
  - жовтий (yellow)
  - зелений (green)
  - синій (dark blue — soft-stem!)
  - блакитний (light blue, sky blue)
  - білий (white)
  - чорний (black)
  - сірий (grey)
  - колір (color, m)
  - якого кольору? (what color?)
  recommended:
  - коричневий (brown)
  - рожевий (pink)
  - помаранчевий (orange)
  - фіолетовий (purple)
  - темний (dark — as prefix: темно-)
  - світлий (light — as prefix: світло-)
  - карий (brown-eyed; mainly for eyes)
  - русявий (fair-haired, light-brown/blondish)
  - сивий (grey-haired)
  - прапор (flag, m)
