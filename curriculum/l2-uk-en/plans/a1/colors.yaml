title: Кольори
subtitle: Синій, жовтий — кольори України та вашого світу
focus: vocabulary
pedagogy: PPP
phase: A1.2 [Мій світ]
word_target: 1200
objectives:
- Називати 12 базових кольорів українською мовою
- Використовувати прикметники кольору з правильним узгодженням за родами (включно зі словом м'якої групи "синій")
- Ставити й розуміти запитання `Якого кольору?`
- Розрізняти слова "синій" (темно-синій) та "блакитний" (світло-синій) у готових контекстах
- Описувати предмети, поєднуючи колір та прикметники з модуля №9
- Використовувати кілька природних словосполучень для зовнішності (`карі очі`, `русяве волосся`, `сиве волосся`)
dialogue_situations:
- setting: 'WRITER-ONLY metadata (never rendered as prose). На відкритому квітковому ринку — вибір букетів. Objects: червоні троянди, білі лілії, жовті соняшники, синя ваза (f), зелене листя (n).'
  speakers:
