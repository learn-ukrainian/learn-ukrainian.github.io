module: a1-015
level: A1
sequence: 15
slug: what-i-like
version: '1.0'
title: What I Like
subtitle: "Я люблю читати — your first verbs"
focus: grammar
pedagogy: PPP
phase: A1.3 [Actions]
word_target: 1200
objectives:
- Use люблю + infinitive to express what you like doing
- Use мені подобається + noun to express what you like (as memorized chunk)
- Recognize Ukrainian infinitive form (-ти ending)
- Talk about hobbies and interests using simple verb phrases
content_outline:
- section: "Діалоги (Dialogues)"
  words: 300
  points:
  - "Dialogue 1 — Meeting someone's interests (ULP Ep14 pattern):
    — Що ти любиш робити? — Я люблю читати і слухати музику.
    — А я люблю готувати. — Правда? Що ти готуєш?
    Infinitives introduced naturally through 'люблю + verb'."
  - "Dialogue 2 — Describing preferences:
    — Тобі подобається ця книга? — Так, мені подобається.
    — А цей фільм? — Ні, мені не подобається. Мені подобається музика.
    'Подобається' as a fixed chunk — dative grammar NOT analyzed."
- section: "Я люблю... (I Like...)"
  words: 300
  points:
  - "Люблю + infinitive (what you enjoy doing):
    Я люблю читати (I like to read). Я люблю гуляти (I like to walk).
    Я люблю готувати (I like to cook). Я люблю слухати музику (I like to listen to music).
    Pattern: subject + люблю + infinitive (-ти ending).
    Infinitive = dictionary form of the verb, always ends in -ти."
  - "Common infinitives for hobbies (new vocabulary):
    читати (to read), гуляти (to walk), готувати (to cook),
    слухати (to listen), дивитися (to watch), грати (to play),
    малювати (to draw), подорожувати (to travel), співати (to sing).
    Pronunciation: the stress in infinitives varies — learn each one."
- section: "Мені подобається... (I Like...)"
  words: 300
  points:
  - "Two ways to say 'I like' — different grammar, same meaning at A1:
    Я люблю + infinitive = I love/like doing something.
    Мені подобається + noun = I like something (a thing).
    Мені подобається музика. Мені подобається ця книга. Мені подобається Київ.
    Note: 'мені подобається' is a chunk — we don't analyze WHY мені (dative). Just use it."
  - "Negative: Я не люблю / Мені не подобається:
    Я не люблю готувати. Мені не подобається цей фільм.
    Question: Ти любиш читати? Тобі подобається?
    Note: люблю changes by person (я люблю, ти любиш) — full conjugation in M16-17."
- section: "Підсумок — Summary"
  words: 300
  points:
  - "Two structures for 'like':
    1. Я люблю + infinitive (-ти) — for activities
    2. Мені подобається + noun — for things
    Negative: не before the verb (не люблю, не подобається).
    Self-check: Name 3 things you like doing (Я люблю...).
    Name 2 things you like (Мені подобається...).
    Name 1 thing you don't like (Я не люблю... / Мені не подобається...)."
vocabulary_hints:
  required:
  - любити (to love/like — verb)
  - подобатися (to be pleasing — used as 'to like')
  - читати (to read)
  - гуляти (to walk)
  - готувати (to cook)
  - слухати (to listen)
  - дивитися (to watch)
  - грати (to play)
  recommended:
  - малювати (to draw)
  - подорожувати (to travel)
  - співати (to sing)
  - музика (music, f)
  - фільм (film, m)
  - книга (book — review from M08)
activity_hints:
- type: fill-in
  focus: "Complete: Я люблю ___. (choose infinitive for the picture)"
  items: 8
- type: quiz
  focus: "Люблю or подобається? Choose the right structure."
  items: 8
- type: match-up
  focus: "Match infinitives to their meanings: читати ↔ to read"
  items: 8
- type: fill-in
  focus: "Make it negative: Я люблю → Я не люблю"
  items: 6
