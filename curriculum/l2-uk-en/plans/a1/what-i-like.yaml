module: a1-015
level: A1
sequence: 15
slug: what-i-like
version: '1.0'
title: What I Like
subtitle: "Я люблю... — Hobbies and Interests"
focus: vocabulary
pedagogy: PPP
phase: A1.3 [Actions & Desires]
word_target: 1200
objectives:
- Talk about hobbies and interests
- Use the verb "любити" (to love/like) + infinitive
- Express preferences using "мені подобається" as a set phrase
- Understand basic infinitive forms of common activity verbs
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - "Dialogue 1: Meeting at a cafe. Two friends discussing what they like to do on weekends. Я люблю читати, а ти? — А я люблю спорт. Natural flow."
  - "Dialogue 2: Expressing strong preferences. Мені дуже подобається ця музика! (I really like this music!). Using 'мені подобається' organically in conversation."
- section: "Я люблю... (I love / I like)"
  words: 250
  points:
  - "Introduce the verb 'любити' (to love). In Ukrainian, 'любити' is used very broadly for both 'love' and 'like' when talking about activities and things."
  - "Я люблю + infinitive. E.g., Я люблю читати (I like to read), Я люблю спати (I like to sleep)."
  - "Basic infinitive endings: Notice that most action verbs end in -ти (читати, слухати, грати)."
- section: "Мені подóбається (It is pleasing to me)"
  words: 250
  points:
  - "Introduce 'мені подобається' as a set phrase. CRITICAL: Do NOT teach Dative mechanics or cases here. Treat it strictly as a lexical chunk meaning 'I like'."
  - "Contrast usage: Use 'Я люблю' for activities (Я люблю читати) and 'Мені подобається' for things, aesthetics, or specific instances (Мені подобається ця кава, Мені подобається Київ)."
  - "Ask questions: Тобі подобається? (Do you like it?)."
- section: "Хобі та інтереси (Hobbies and Interests)"
  words: 300
  points:
  - "Vocabulary for common hobbies: спорт, музика, кіно, література."
  - "Action verbs for these hobbies: грати (to play), слухати (to listen), дивитися (to watch)."
  - "Combining them: Я люблю слухати музику. Я люблю спорт."
vocabulary_hints:
  required:
  - любúти (to love, to like)
  - менí подóбається (I like - set phrase)
  - тобí подóбається? (do you like? - set phrase)
  - читáти (to read)
  - слýхати (to listen)
  - грáти (to play)
  - хобí (hobby)
  - му́зика (music)
  - спóрт (sport)
  recommended:
  - кінó (cinema/movies)
  - літератýра (literature)
  - співáти (to sing)
  - танцювáти (to dance)
  - малювáти (to draw/paint)
activity_hints:
- type: match-up
  focus: Match hobbies with corresponding verbs (музика -> слухати)
  items: 8
- type: fill-in
  focus: Choose between "люблю" and "подобається" in context
  items: 10
- type: quiz
  focus: Identify the correct translation for "I like to read"
  items: 8
connects_to:
- a1-016 (Daily Verbs Group 1)
prerequisites:
- a1-014 (Checkpoint: My World)
grammar:
- Infinitive verbs ending in -ти
- Я люблю + infinitive
- Мені подобається (lexical chunk only)
register: розмовний
references:
- title: "ULP Season 1, Episode 14 — Likes and dislikes in Ukrainian"
  url: https://www.ukrainianlessons.com/episode14/
  notes: "Follows Anna's approach to introducing preferences before formal conjugation."
