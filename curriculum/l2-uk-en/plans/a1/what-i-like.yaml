grammar:
- 'Форма інфінітива: всі дієслова закінчуються на -ти'
- Люблю + інфінітив для позначення дій
- Мені подобається + іменник (стала фраза — без аналізу давального відмінка)
- Заперечення за допомогою частки «не» перед дієсловом
