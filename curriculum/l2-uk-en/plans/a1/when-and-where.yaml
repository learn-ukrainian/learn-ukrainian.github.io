module: a1-045
level: A1
sequence: 45
slug: when-and-where
version: 1.1.1
title: Коли і де
subtitle: Що, де, коли — будуємо перші складні речення
focus: grammar
pedagogy: PPP
phase: A1.7 [Спілкування]
word_target: 1200
objectives:
- Вміти використовувати «що», «де», «коли» як підрядні сполучники у простих складних реченнях
- Будувати речення на кшталт «Я знаю, що...»; «Я не знаю, де...»; «Скажи, коли...»
- Розрізняти слова «що», «де», «коли» як питальні слова та як сполучники
- Природно поєднувати головне і підрядне речення
dialogue_situations:
- setting: 'Пояснюємо другові, який заблукав, як знайти вашу квартиру: Коли побачиш фонтан (m), поверни ліворуч. Де побачиш парк (m), зупинись. Будинок (m), що стоїть біля дерева (n).'
  speakers:
  - Господар
  - Гість
  motivation: 'Складні речення: що, де, коли зі словами фонтан(m), парк(m), будинок(m)'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Домовляємося про зустріч: — Ти знаєш, де нове кафе? — Так, я знаю, де воно. — Скажи, коли ти вільний. — Я вільний, коли закінчу роботу. — Добре. Я думаю, що о шостій буде добре. — Так, я теж думаю, що це гарний час. Підрядні сполучники: де, коли, що.'
  - 'Діалог 2 — Розпитуємо про когось: — Ти знаєш, що Олена вже в Києві? — Ні, я не знав! А де вона живе? — Я не знаю, де саме. Але я знаю, що біля центру. — Скажи їй, коли побачиш, що я хочу зустрітися. — Добре, скажу, коли побачу. Складні речення в природній розмові.'
- section: Складне речення
  words: 300
  points:
  - 'У модулі М44 ви навчилися поєднувати РІВНОЗНАЧНІ думки: Я читаю, і він пише. Тепер ми поєднуємо ГОЛОВНУ думку з ЗАЛЕЖНОЮ. Головне речення + що/де/коли + підрядне речення: Я знаю, + що він тут. Я не знаю, + де він живе. Скажи мені, + коли ти прийдеш. Термінологія 5 класу: складнопідрядне речення.'
  - 'Правило коми — завжди ставиться перед «що», «де», «коли», якщо вони виступають сполучниками: Я думаю, що це правильно. (кома перед «що»). Він не знає, де магазин. (кома перед «де»). Зателефонуй, коли прийдеш. (кома перед «коли»). Це відрізняється від англійської мови — в українській мові кома тут ставиться ЗАВЖДИ.'
- section: Що, де, коли — дві ролі
  words: 300
  points:
  - 'Ці слова виконують дві функції: 1. Питальні слова (вже знайомі з М20): Що це? Де ти? Коли ти прийдеш? 2. Сполучники (НОВЕ — поєднують частини речення): Я знаю, що це книжка. Я знаю, де ти. Скажи, коли прийдеш. Як їх розрізнити? Запитання → на початку речення, зі знаком питання в кінці. Сполучник → у середині речення, з''єднує дві його частини.'
  - 'Поширені конструкції зі словами що, де, коли: Я знаю, що... / Я не знаю, що... Я думаю, що... Він каже, що... Я знаю, де... / Я не знаю, де... Скажи, коли... / Я не знаю, коли... Коли я прийду, ми поговоримо.'
- section: Підсумок
  words: 300
  points:
  - 'Підрядні сполучники на рівні А1: | Сполучник | Значення | Приклад | | що | that | Я знаю, що він тут. | | де | where | Я не знаю, де кафе. | | коли | when | Скажи, коли прийдеш. | Перед сполучником завжди ставиться кома. Разом зі сполучниками з М44 ви тепер можете будувати насичені речення: Я не йду, бо я не знаю, де це. (два сполучники!). Він каже, що прийде, коли закінчить. (два підрядні речення!). Самоперевірка: Побудуйте 3 речення зі словами що, де, коли: Я думаю, що... Я не знаю, де... Скажи мені, коли...'
vocabulary_hints:
  required:
  - що (that — conjunction)
  - де (where — conjunction)
  - коли (when — conjunction)
  - знати (to know)
  - думати (to think)
  - казати (to say/tell)
  recommended:
  - сказати (to say — perfective)
  - бачити (to see)
  - чути (to hear)
  - розуміти (to understand)
  - речення (sentence, n)
  - головне (main — as in main clause)
activity_hints:
- type: fill-in
  focus: 'Доповніть речення: Я знаю, ___ він тут. Я не знаю, ___ вона живе. Скажи, ___ ти прийдеш.'
  items: 8
- type: quiz
  focus: Питальне слово чи сполучник? «Де ти живеш?» проти «Я знаю, де ти живеш.»
  items: 8
- type: fill-in
  focus: 'Побудуйте складні речення: Я думаю, що ___. Він каже, що ___.'
  items: 6
- type: quiz
  focus: Де потрібна кома? Оберіть правильну пунктуацію у складних реченнях.
  items: 8
connects_to:
- a1-046 (Свята)
prerequisites:
