grammar:
- 'Підрядні сполучники: що, де, коли'
- 'Структура складного речення: головне речення + кома + сполучник + підрядне речення'
- 'Подвійна роль слів що/де/коли: питальні слова та сполучники'
register: розмовний
references:
- title: State Standard 2024, §4.3.2
  notes: Базові складні речення — що, де, коли як підрядні сполучники.
- title: Підручник для 5 класу (Заболотний)
  notes: Вступ до вивчення складнопідрядних речень зі сполучниками що, де, коли.
