title: Який він?
subtitle: Великий стіл, нова книга — опис предметів
focus: grammar
pedagogy: PPP
phase: A1.2 [Мій світ]
word_target: 1200
objectives:
- Навчитися узгоджувати прикметники з іменниками в роді (лише в називному відмінку)
- Вміти ставити запитання за допомогою слів який/яка/яке
- Описувати предмети та кімнати, використовуючи поширені пари прикметників
- Будувати описові речення, поєднуючи іменники з попереднього модуля «Речі мають рід» з прикметниками з цього модуля
- Впізнавати типові адʼєктивні суржикові пари (вкусний → смачний, жолтий → жовтий, черний → чорний, красний → червоний, плохий → поганий, вірний → правильний, любий → будь-який, умний → розумний, ленивий → лінивий)
dialogue_situations:
- setting: 'На книжковому ярмарку вихідного дня — розглядаємо книги, карти та плакати. Описуємо предмети: новий атлас (m), цікава книга (f), старе фото (n), великий плакат (m), маленька листівка (f). НЕ сумки чи меблі.'
  speakers:
  - Тарас
  - Софія
  motivation: Запитання Який/яка/яке? зі словами книга(f), атлас(m), фото(n), плакат(m), листівка(f)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Опис кімнати (Вашуленко 3 клас, с.131 «Моя кімната»): — Яка твоя кімната? — Моя кімната велика і світла. — А стіл? — Стіл новий. А ліжко — старе. Узгодження прикметників засвоюється через природний опис предметів.'
  - 'Діалог 2 — Розглядання вітрин: — Яка гарна сумка! — Так, але вона дорога. — А телефон? Який він? — Він великий і дешевий.'
- section: Який? Яка? Яке?
  words: 300
  points:
  - 'Запитання до прикметників змінюється за родами — за тією ж схемою, що й мій/моя/моє: Який стіл? (m) → Великий стіл. Яка книга? (f) → Нова книга. Яке вікно? (n) → Чисте вікно.'
  - 'Пономарова 3 клас, с.98: Прикметник має той самий рід, що й іменник. Чоловічий рід: -ий (великий, новий, чистий). Жіночий рід: -а (велика, нова, чиста). Середній рід: -е (велике, нове, чисте). Прикметники м''якої групи (-ій/-я/-є, як-от «синій») вивчатимуться в наступному модулі «Кольори». Ця закономірність повторюватиметься в кожному відмінку, тому її важливо добре засвоїти вже зараз.'
- section: Прикметники
  words: 300
  points:
  - 'Вивчаються парами (антоніми — так легше запам''ятати): великий ↔ маленький, новий ↔ старий, гарний ↔ поганий, чистий ↔ брудний, дорогий ↔ дешевий, світлий ↔ темний.'
  - 'Побудова описів із предметами з попереднього модуля («Речі мають рід»): У мене є великий стіл. Моя кімната маленька, але гарна. Вікно велике і чисте. Стілець старий, а ліжко — нове. Зверніть увагу: «а» використовується для протиставлення, «і» — для поєднання рівнозначних ознак.'
- section: Підсумок
  words: 300
  points:
  - 'Самоперевірка: Яке закінчення має прикметник чоловічого роду? (-ий/-ій). Жіночого? (-а/-я). Середнього? (-е/-є). Опишіть свою кімнату трьома реченнями, використовуючи прикметники.'
vocabulary_hints:
  required:
  - який, яка, яке (what kind? — m/f/n)
  - великий (big)
  - маленький (small)
  - новий (new)
  - старий (old)
  - гарний (nice, beautiful)
  - чистий (clean)
  - дорогий (expensive)
  - дешевий (cheap)
  recommended:
  - поганий (bad)
  - брудний (dirty)
  - світлий (light, bright)
  - темний (dark)
  - а (and/but — contrast)
  - але (but)
activity_hints:
- type: fill-in
  focus: 'Додайте правильне закінчення прикметника: нов__ книга, велик__ стіл, чист__ вікно'
  items: 10
- type: match-up
  focus: 'З''єднайте прикметники-антоніми: великий ↔ маленький'
  items: 6
- type: quiz
  focus: Який/яка/яке? Оберіть правильне питальне слово.
  items: 6
- type: fill-in
  focus: Опишіть кімнату, використовуючи подані іменники та прикметники
  items: 6
- type: fill-in
  focus: Типові адʼєктивні суржикові пари — оберіть нормативну форму (1:1 mirror of wiki "Типові помилки L2", усі 9 пар)
  items:
  - Цей суп дуже {смачний|вкусний}.
  - У мене є {жовтий|жолтий} олівець.
  - У сусідки {чорний|черний} кіт.
  - Прапор {червоний|красний}, а не білий.
  - Це {поганий|плохий} фільм.
  - Це {правильна|вірна} відповідь на запитання.
  - Дай мені, будь ласка, {будь-який|любий} олівець.
  - Сергій — {розумний|умний} хлопчик.
  - Тарас — {лінивий|ленивий} учень.
connects_to:
- a1-010 (Кольори)
prerequisites:
