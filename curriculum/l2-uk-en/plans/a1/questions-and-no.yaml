module: a1-019
level: A1
sequence: 19
slug: questions-and-no
version: '1.0'
title: Questions and No
subtitle: "Хто? Що? Де? — Asking Questions"
focus: vocabulary
pedagogy: PPP
phase: A1.3 [Actions & Desires]
word_target: 1200
objectives:
- Ask basic information questions (Who, What, Where, When, Why, Where to)
- Form negative sentences using 'не'
- Answer questions negatively using 'ні'
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - "Dialogue: Interrogating a friend. Де ти? Коли ти будеш? Чому ти не відповідаєш? (Where are you? When will you be here? Why aren't you answering?)."
  - "Show question words at the beginning of sentences."
  - "Show negation clearly: Ні, я не знаю."
- section: "Питальні слова (Question Words)"
  words: 500
  points:
  - "Introduce the big six: Хто? (Who?), Що? (What?), Де? (Where?), Куди? (Where to?), Коли? (When?), Чому? (Why?)."
  - "Explain the difference between 'Де' (location) and 'Куди' (direction/destination) briefly, setting up for later modules."
  - "Practice matching answers to question words (e.g., 'В офісі' answers 'Де?')."
- section: "Ні і Не (No and Not)"
  words: 300
  points:
  - "The difference between 'Ні' (the answer 'No') and 'не' (the particle 'not')."
  - "Rule: 'не' goes directly BEFORE the verb. Я не знаю. Він не працює."
  - "Double negation is normal and required: Ні, я не хочу (No, I don't want to)."
vocabulary_hints:
  required:
  - хто (who)
  - де (where - location)
  - куди (where to - direction)
  - колú (when)
  - чомý (why)
  - ні (no)
  - не (not)
  - так (yes)
  recommended:
  - що (what - already taught in M16)
  - як (how)
  - якúй (which/what kind)
activity_hints:
- type: match-up
  focus: Match question words to English equivalents
  items: 8
- type: fill-in
  focus: Insert the correct question word based on the answer
  items: 10
- type: quiz
  focus: Form negative sentences correctly (placing 'не' before the verb)
  items: 8
connects_to:
- a1-020 (My Morning Routine)
prerequisites:
- a1-018 (I Want, I Can, I Must)
grammar:
- Interrogative pronouns/adverbs
- Sentence negation with 'не'
register: розмовний
references:
- title: "ULP Season 1, Episode 35 — Question words + Pronunciation Trainer"
  url: https://www.ukrainianlessons.com/episode35/
  notes: "Follows Anna's strategy of teaching question words explicitly."
