module: a1-026
level: A1
sequence: 26
slug: free-time
version: '1.2.2'
title: Вільний час
subtitle: Хобі, спорт, музика — що ви робите для задоволення
focus: communication
pedagogy: PPP
phase: A1.4 [Час і природа]
word_target: 1200
objectives:
- Розповідати про хобі, спорт і розваги, використовуючи вивчені дієслівні конструкції
- Запрошувати когось до спільної діяльності за допомогою фраз «Ходімо!» / «Давай!»
- Висловлювати частоту дії (часто, іноді, рідко, ніколи)
- Поєднувати всі навички модуля A1.4: час + день + погода + заняття
dialogue_situations:
- setting: Біля дошки оголошень у громадському центрі — обговорення запису на гуртки
  speakers:
  - Вітя
  - Оленка
  motivation: 'Прислівники частоти: Часто ходиш? Іноді. Ходімо разом!'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Плани на вихідні: — Що ти робиш у вихідні? — Зазвичай я гуляю і читаю. — Ходімо в кіно в суботу! — Добре! О котрій? — О п''ятій. — Чудово! Конструкція запрошення + час + день.'
  - 'Діалог 2 — Розмова про хобі: — Ти любиш спорт? — Так, я граю у футбол. — Як часто? — Двічі на тиждень, у вівторок і четвер. — А ще? — Іноді слухаю музику і малюю. Частота + лексика про хобі.'
- section: Хобі і спорт
  words: 300
  points:
  - 'Лексика про хобі (розширення конструкції з М15 люблю + інфінітив): грати у футбол / баскетбол / теніс (to play football/basketball/tennis) грати на гітарі / піаніно (to play guitar/piano — «на» + інструмент як стала фраза) слухати музику (to listen to music) дивитися фільми / серіали (to watch movies/series) малювати (to draw), фотографувати (to take photos)'
  - 'Розваги та культура: ходити в кіно (to go to the cinema) ходити в театр (to go to the theater) ходити на концерт (to go to a concert) ходити в музей (to go to a museum) Зверніть увагу: ходити + в/на — це стала фраза, граматика відмінків вивчатиметься в A1.5.'
- section: Як часто?
  words: 300
  points:
  - 'Прислівники частоти: завжди (always), зазвичай (usually), часто (often), іноді / інколи (sometimes), рідко (rarely), ніколи (never). Порядок слів: прислівник частоти зазвичай стоїть перед дієсловом: Я часто гуляю. Я іноді читаю. Я ніколи не працюю у неділю. «Ніколи» вимагає частки «не» (подвійне заперечення — повторення М19).'
  - 'Вираження частоти з числами: раз на тиждень (once a week), двічі на тиждень (twice a week), тричі на тиждень (three times a week), кожен день (every day). Я граю у футбол двічі на тиждень. Я ходжу в кіно раз на місяць.'
- section: Підсумок
  words: 300
  points:
  - 'Спілкування про вільний час: Хобі: Я люблю + інфінітив. Я граю у/на... Запрошення: Ходімо! Давай! (Let''s go! Let''s!) Частота: завжди, часто, іноді, рідко, ніколи. Самоперевірка: Назвіть 3 хобі. Як часто ви ними займаєтесь? Запросіть друга зробити щось цими вихідними.'
vocabulary_hints:
  required:
  - вихідні (weekend, pl)
  - спорт (sport, m)
  - футбол (football, m)
  - кіно (cinema, n — indeclinable)
  - часто (often)
  - іноді (sometimes)
  - рідко (rarely)
  - ходімо (let's go!)
  recommended:
  - завжди (always)
  - зазвичай (usually)
  - ніколи (never)
  - театр (theater, m)
  - концерт (concert, m)
  - музей (museum, m)
  - давай (let's — informal)
  - раз (once/time)
activity_hints:
- type: match-up
  focus: Зіставте дієслово з логічним іменником (хобі)
  pairs:
  - грати ↔ у футбол
  - грати ↔ на гітарі
  - слухати ↔ музику
  - дивитися ↔ фільми
  - ходити ↔ в кіно
  - ходити ↔ в театр
  - читати ↔ книгу
  - малювати ↔ вдома
- type: fill-in
  focus: Доповніть речення із запрошеннями та вказівками на частоту
  items:
  - Я {ніколи не|завжди|часто} працюю у неділю.
  - Вона грає у теніс двічі {на тиждень|у тиждень|в тиждень}.
  - — {Ходімо|Давай|Ідемо} в кіно у суботу! — Добре!
  - Я люблю спорт, тому {часто|ніколи|рідко} граю у баскетбол.
  - Я не маю часу, тому {рідко|часто|завжди} читаю книги.
  - — Що ти робиш {у вихідні|вихідні|на вихідні}? — Відпочиваю.
- type: fill-in
  focus: Виберіть правильний прийменник для заняття
  items:
  - Він грає {на|у|в} піаніно.
  - Ми граємо {у|на|в} футбол.
  - Я хочу ходити {на|в|у} концерт.
  - Вони ходять {в|на|у} театр раз на місяць.
connects_to:
- a1-027 (Контрольна точка — Час і природа)
prerequisites:
