module: a1-032
level: A1
sequence: 32
slug: going-places
version: '1.0'
title: Going Places
subtitle: "Planning errands (Accusative direction)"
focus: grammar
pedagogy: PPP
phase: A1.5 [Places & Movement]
word_target: 1200
objectives:
- Ask where someone is going using 'Куди?'
- Use the Accusative case to express direction or destination (в банк, на роботу)
- Distinguish clearly between location (Де? - Locative) and direction (Куди? - Accusative)
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - "Dialogue-first: Running errands. 'Куди ти йдеш?' (Where are you going?) 'Я йду в банк, а потім на роботу.' (I am going to the bank, and then to work)."
  - "Highlighting the motion verbs (іти - to go by foot) and the destination prepositions."
- section: "Питання: Куди? (The Question: Whereto/Direction?)"
  words: 250
  points:
  - "Introduce 'Куди?' for direction, contrasting it heavily with 'Де?' (location)."
  - "Explain that when moving TOWARDS a destination, Ukrainian uses the Accusative case (for direction) with 'в/у' or 'на'."
- section: "Знахідний відмінок для напрямку (Accusative for Direction)"
  words: 300
  points:
  - "Crucial rule for inanimate objects (places): The Accusative form is identical to the Nominative form for masculine and neuter nouns (банк -> в банк, місто -> у місто)."
  - "Feminine nouns ending in -а change to -у in Accusative (школа -> у школу, робота -> на роботу)."
  - "Emphasize this pattern: Де? (в банку) vs Куди? (в банк); Де? (на роботі) vs Куди? (на роботу)."
- section: "Дієслова руху: Іти (Verbs of Motion: To go)"
  words: 250
  points:
  - "Introduce the basic present tense of 'іти' (to go by foot): я йду, ти йдеш, він/вона йде, ми йдемо, ви йдете, вони йдуть."
  - "Practice pairing 'іти' with destinations: Я йду в магазин. Вона йде на пошту."
vocabulary_hints:
  required:
  - куди́? (where to? / direction)
  - іти́ (to go by foot) -> я йду, ти йдеш
  - в банк (to the bank)
  - у магазúн (to the shop)
  - на робóту (to work)
  - у шкóлу (to school)
  recommended:
  - спрáви (errands/business)
  - пóтім (then/afterwards)
  - додóму (homewards / to home - special adverb)
activity_hints:
- type: fill-in
  focus: Choose between Locative (Де?) and Accusative (Куди?) based on the verb/context
  items: 12
- type: match-up
  focus: Match destinations with the correct Accusative form (школа -> у школу)
  items: 8
connects_to:
- a1-033 (Transport)
prerequisites:
- a1-031 (My City)
grammar:
- Accusative case for direction/destination
- Contrast: Де? (Locative) vs Куди? (Accusative)
- Basic motion verb: іти
register: розмовний
references:
- title: "Ukrainian Lessons Podcast - Directions and Accusative"
  url: "https://www.ukrainianlessons.com/"
  notes: "Crucial to establish the Accusative for DIRECTION (not yet for direct objects), setting up the Де/Куди contrast."