module: a1-042
level: A1
sequence: 42
slug: hey-friend
version: '1.0'
title: "Hey, Friend!"
subtitle: "Олено! Тарасе! Друже! Мамо! — calling people by name"
focus: grammar
pedagogy: PPP
phase: A1.7 [Communication]
word_target: 1200
objectives:
- Form vocative case for common names and family words (Олено! Тарасе! Мамо!)
- Use vocative in greetings and direct address (Привіт, Андрію!)
- Recognize vocative endings for masculine (-е, -у/-ю) and feminine (-о, -ю, -є) nouns
- Address people naturally using vocative in everyday situations
content_outline:
- section: "Діалоги (Dialogues)"
  words: 300
  points:
  - "Dialogue 1 — Meeting a friend:
    — Олено, привіт! Як справи?
    — Добре, дякую, Тарасе! А в тебе?
    — Теж добре. Олено, ти знаєш мого брата?
    — Ні. — Андрію, ходи сюди! Це Олена. Олено, це Андрій.
    Vocative forms: Олено (Олена), Тарасе (Тарас), Андрію (Андрій)."
  - "Dialogue 2 — At home:
    — Мамо, де мій телефон? — На столі, синку.
    — Тату, а де ключі? — У кишені, дочко.
    — Бабусю, ми йдемо! — Добре, будьте обережні!
    Family vocatives: мамо, тату, синку, дочко, бабусю."
- section: "Кличний відмінок (The Vocative Case)"
  words: 300
  points:
  - "Ukrainian has a special case for calling someone — кличний відмінок.
    In English you just say the name: 'Olena, come here!'
    In Ukrainian the name CHANGES: Олена → Олено, ходи сюди!
    This is not optional — Ukrainians always use vocative when addressing someone.
    Grade 4 helper word: Кл. (!) — the exclamation mark reminds you:
    you're calling someone, so the ending changes."
  - "Why vocative matters:
    Олена прийшла. (Olena came.) — nominative, talking ABOUT her.
    Олено, ходи сюди! (Olena, come here!) — vocative, talking TO her.
    Using nominative to address someone sounds unnatural in Ukrainian.
    It's like saying 'Hey, him!' instead of 'Hey, you!' in English."
- section: "Закінчення кличного (Vocative Endings)"
  words: 300
  points:
  - "Feminine names and nouns (-а → -о):
    Олена → Олено, мама → мамо, сестра → сестро, Оксана → Оксано,
    подруга → подруго, бабуся → бабусю (-ся → -сю).
    Names on -ка: Наталка → Наталко, Ірка → Ірко.
    Names on -ія: Марія → Маріє (not Маріо!).
    Names on -а (long): Катерина → Катерино, Тетяна → Тетяно."
  - "Masculine names and nouns:
    Hard consonant → -е: Тарас → Тарасе, Іван → Іване, брат → брате, пан → пане.
    Soft consonant / -й → -ю: Андрій → Андрію, дідусь → дідусю, вчитель → вчителю.
    Special: друг → друже (г → ж), козак → козаче (к → ч).
    Тато → тату (exceptional -у ending, memorize)."
- section: "Підсумок — Summary"
  words: 300
  points:
  - "Vocative quick reference:
    | Pattern | Nominative → Vocative | Example |
    | Feminine -а | -а → -о | Олена → Олено, мама → мамо |
    | Feminine -ія | -ія → -іє | Марія → Маріє |
    | Feminine -ся | -ся → -сю | бабуся → бабусю |
    | Masculine hard | + -е | Тарас → Тарасе, брат → брате |
    | Masculine -й/soft | + -ю | Андрій → Андрію, вчитель → вчителю |
    | Special (г, к) | г→ж, к→ч + -е | друг → друже |
    Self-check: How do you call your family? мама → ? тато → ? брат → ?"
vocabulary_hints:
  required:
  - друг (friend, m)
  - подруга (friend, f)
  - брат (brother, m)
  - сестра (sister, f)
  - пан (Mr., m)
  - пані (Mrs./Ms., f)
  recommended:
  - синку (son — vocative, from син)
  - дочко (daughter — vocative, from дочка)
  - козак (Cossack, m)
  - вчитель (teacher, m)
  - бабуся (grandmother, f)
  - дідусь (grandfather, m)
