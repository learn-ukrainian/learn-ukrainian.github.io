module: a1-034
level: A1
sequence: 34
slug: where-from
version: 1.2.1
title: Звідки?
subtitle: Звідки ти? Я з України — походження та напрямки
focus: communication
pedagogy: PPP
phase: A1.5 [Місця]
word_target: 1200
objectives:
- Ставити запитання «Звідки?» та відповідати на нього, використовуючи прийменники з/із + країна/місто
- Називати українські міста та поширені країни
- 'Опанувати тріаду запитань про місце: Де? / Куди? / Звідки?'
- Розповідати про своє походження, національність та історію подорожей
dialogue_situations:
- setting: 'Міжнародна зустріч студентів у київському університеті — розповідають про своє походження: Я з Канади, Вона з Японії, Він з Німеччини. А також: З якого міста? З Торонто, з Токіо, з Берліна.'
  speakers:
  - Кілька студентів
  motivation: 'Запитання «Звідки?» + прийменник «з»: Канада(f), Японія(f), Німеччина(f), Торонто(n)'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Знайомство (розширення М05, ULP Ep4): — Звідки ти? — Я з України, з Києва. А ти? — Я з Канади, із Торонто. — Давно тут? — Ні, я приїхав місяць тому. Конструкція «Звідки?» з країнами та містами.'
  - 'Діалог 2 — Повернення звідкись: — Звідки ти йдеш? — Я йду з роботи. — А Олена? — Вона йде зі школи. — Куди вона йде? — Додому. Напрямок ЗВІДКИ (з + форма родового відмінка як стала фраза) та напрямок КУДИ (в/на + знахідний відмінок).'
- section: Звідки?
  words: 300
  points:
  - 'Три запитання про напрямок у повному обсязі: Де ти? — В Україні. (місцевий відмінок — де ви ЗНАХОДИТЕСЯ). Куди ти їдеш? — В Україну. (знахідний відмінок — куди ви РУХАЄТЕСЯ). Звідки ти? — З України. (родовий відмінок — звідки ви РОДОМ АБО ЇДЕТЕ). На рівні А1 ми вивчаємо «з + країна/місто» як сталі фрази. Граматика родового відмінка вивчатиметься на рівні А2.'
  - 'Конструкція: з/із/зі + родовий відмінок (завчені форми): з України, з Києва, зі Львова, з Одеси, з Харкова. з Канади, зі США (зі Штатів), з Англії, з Німеччини, з Польщі. з роботи, зі школи, з магазину, з банку. Зверніть увагу: тут діють правила милозвучності з М28 (з/із/зі).'
- section: Країни і міста
  words: 300
  points:
  - 'Українські міста: Київ, Львів, Одеса, Харків, Дніпро, Запоріжжя. Країни (найпоширеніші для іноземців): Україна, Канада, США, Англія, Німеччина, Польща, Франція, Італія, Японія.'
  - 'Зв''язок національності та мови: Я з України → Я українець/українка → Я говорю українською. Повторення з М05: Мене звати..., Я з..., Я говорю... Нове: Я живу в Києві, але я зі Львова. (теперішнє місце проживання та походження).'
- section: Підсумок
  words: 300
  points:
  - 'Три запитання про місцезнаходження: Де? → в/на + місцевий відмінок (В Україні). Куди? → в/на + знахідний відмінок (В Україну). Звідки? → з/із/зі + форма родового відмінка як стала фраза (З України). Самоперевірка: Звідки ви? Де ви зараз живете? Куди ви підете після цього уроку?'
vocabulary_hints:
  required:
  - звідки (where from)
  - з/із/зі (from — + genitive chunk)
  - Україна (Ukraine)
  - Київ (Kyiv)
  - Львів (Lviv)
  - Канада (Canada)
  recommended:
  - Одеса (Odesa)
  - Харків (Kharkiv)
  - США (USA)
  - Англія (England)
  - Німеччина (Germany)
  - Польща (Poland)
  - додому (home — direction)
activity_hints:
- type: fill-in
  focus: Дайте відповідь на запитання «Звідки?» за допомогою прийменників з/із/зі + завчені фрази у родовому відмінку
  items: 8
  blanks:
  - Звідки ти? — Я {з України}.
  - Вона {з Канади}.
  - Ми {з Києва}, а ви?
  - Джон {зі США}.
  - Мій друг {з Німеччини}.
  - Я {зі Львова}.
  - Вони {з Англії}.
  - Олена {з Одеси}.
- type: group-sort
  focus: 'Розподіліть фрази за запитаннями: Де? (Місцевий), Куди? (Знахідний), Звідки? (Родовий)'
  items: 9
  groups:
  - name: Де?
    items:
    - в Україні
    - в Києві
    - на роботі
  - name: Куди?
    items:
    - в Україну
    - в Київ
    - на роботу
  - name: Звідки?
    items:
    - з України
    - з Києва
    - з роботи
- type: quiz
  focus: Оберіть правильний прийменник (в/на/з) для позначення місця/напрямку
  items: 8
  questions:
  - Я йду... роботи. (з / на / в)
  - Вона йде... школу. (в / на / зі)
  - Ми зараз... Україні. (в / з / на)
  - Я їду... Канаду. (в / з / на)
  - Він... Німеччини. (з / в / на)
  - Вони... Львові. (у / зі / на)
  - Я йду... магазину. (з / в / на)
  - Олена... школи. (зі / в / на)
- type: fill-in
  focus: Протиставлення поточного місцезнаходження (в/на) та походження (з/із)
  items: 6
  blanks:
  - Я живу {в Києві}, але я {зі Львова}.
  - Вона живе {в Канаді}, але вона {з України}.
  - Ми зараз {в Англії}, але ми {з Польщі}.
  - Він живе {в Одесі}, але він {з Харкова}.
  - Я {з Німеччини}, але зараз я {в Україні}.
  - Ти {зі США}, але живеш {у Києві}.
connects_to:
- a1-035 (Контрольна точка — Місця)
prerequisites:
- a1-033 (По місту)
grammar:
- Звідки? + з/із/зі + родовий відмінок (завчені сталі фрази)
- 'Тріада місця: Де? (Місцевий в.) / Куди? (Знахідний в.) / Звідки? (Родовий в. як стала фраза)'
- Назви країн і міст у трьох відмінкових формах
register: розмовний
references:
- title: ULP Season 1, Episode 4
  url: https://www.ukrainianlessons.com/episode4/
  notes: Звідки ви? — національності та країни.
