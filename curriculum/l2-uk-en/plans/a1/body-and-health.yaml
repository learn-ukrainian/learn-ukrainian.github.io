module: a1-31
level: A1
sequence: 31
slug: body-and-health
version: '2.0'
title: Body & Health
subtitle: At the Doctor's
content_outline:
- section: Warm-up
  points:
  - Частини тіла (голова, рука, нога, живіт) — focus on high-frequency items; visual
    aid for singular/plural pairs (очі, вуха)
  - Питання про здоров'я — introduce proverb «У здоровому тілі — здоровий дух» as
    a cultural hook
- section: Presentation
  points:
  - 'Конструкція «У мене болить + частина тіла» — learner error: mismatch «У мене
    болять голова» (must agree with body part); visual table recommended'
  - 'Конструкція «Мені погано/добре» — State Standard §4.2.1.4; learner error: «Я
    погано» instead of «Мені погано»'
  - 'Температура (У мене температура) — collocation: «міряти температуру», «висока
    температура»'
  - Симптоми (кашель, нежить, головний біль) — include «червоне горло», «полоскати
    горло»
- section: Вирази про здоров'я
  points:
  - 'Хворий ↔ здоровий — learner error: confusion between «боліти» (body part hurts)
    vs «хворіти» (person is sick)'
  - Почувати себе добре/погано — emphasize reflexive «себе»
  - 'Мені потрібно до лікаря — collocation: «сімейний лікар», «іти до лікаря»'
- section: Presentation 2
  points:
  - 'Купівля ліків без рецепту — cultural hook: Phytotherapy (траволікування), herbal
    teas (chamomile, raspberry)'
  - 'Запитання про ліки від... — collocation: «ліки від кашлю», «ліки від головного
    болю»'
- section: Presentation 3
  points:
  - 'Розмова з лікарем — structure: greeting -> complaint -> doctor''s question ->
    advice'
  - 'Покупка в аптеці — typical phrases: «Дайте, будь ласка...», «Скільки коштує...»'
- section: Practice
  points:
  - 'Діалог у лікаря (Що вас турбує?) — State Standard §4.3.2: use «бо»/«тому що»
    (e.g., «Я не прийшов, бо хворий»)'
  - Діалог в аптеці (Мені потрібно щось від головного болю) — practice simple requests
  - Діалог з другом про самопочуття — casual register
- section: Practice 2
  points:
  - 'Опис симптомів хвороби — cultural note: mention traditional folk healing (egg
    rolling) as a curiosity, but focus on modern medicine'
vocabulary_hints:
  required:
  - 'голова (head) — collocations: «болить голова», «головний біль»'
  - 'рука (arm/hand) — note: «права/ліва рука», «мити руки»'
  - 'нога (leg/foot) — collocations: «болять ноги», «іти пішки» (on foot)'
  - 'живіт (stomach) — usage: «болить живіт»'
  - 'горло (throat) — collocations: «червоне горло», «полоскати горло»'
  - 'болить (hurts) — grammar: 3rd person singular, agrees with body part (not subject
    «I»)'
  - 'лікар (doctor) — collocations: «сімейний лікар», «іти до лікаря»'
  - 'аптека (pharmacy) — usage: «в аптеці» (Locative case intro)'
  recommended:
  - 'температура (temperature/fever) — collocations: «міряти температуру», «висока
    температура»'
  - 'кашель (cough) — collocations: «сильний кашель», «ліки від кашлю»'
  - 'ліки (medicine) — usage: «пити ліки», «купувати ліки»'
  - 'хворий (sick) — usage: «він хворий» vs «він хворіє» (state vs process)'
  - 'здоровий (healthy) — context: «У здоровому тілі — здоровий дух»'
  - 'рецепт (prescription) — usage: «ліки за рецептом» vs «без рецепту»'
