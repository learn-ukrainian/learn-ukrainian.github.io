module: a1-02
level: A1
sequence: 2
slug: the-cyrillic-code-ii
version: '2.0'
title: The Cyrillic Code II
subtitle: The Final 14 Letters
content_outline:
- section: Вступ (Introduction)
  words: 300
  points:
  - Quick review of the first 19 letters from a1-01 and a reading diagnostic to identify
    retention gaps
  - Introduction to the 'Identity Letters' concept — framing the final 14 letters
    as the keys to Ukrainian distinctness and linguistic sovereignty
- section: Унікальні приголосні (Unique Consonants)
  words: 450
  points:
  - 'The ''Unique Seven'' (Г, Ґ, Ж, Ш, Щ, Ч, Ц): presentation of sounds with specific
    focus on Г vs Ґ distinction as per State Standard §4.1.4'
  - 'Learner error correction: addressing the tendency to use English hard ''g'' for
    both Г and Ґ; Г is a voiced ''h'' (head), while Ґ is the rare hard ''g'' (go)'
  - 'Cultural hook: The repressed letter Ґ — explaining its ban (1933-1990) as an
    attempt to diminish Ukrainian identity and its role today as a shibboleth for
    proper education'
- section: Йотовані голосні та М’який знак (Iotated Vowels and Soft Sign)
  words: 450
  points:
  - Presentation of Iotated Four (Є, Ї, Ю, Я) and their role in euphony (smoothing
    consonant clumps)
  - 'Cultural hook: The letter Ї as a symbol of resistance — referencing its use in
    graffiti in occupied Mariupol (2022) to mark Ukrainian presence and distinctness
    from Russian'
  - 'Soft Sign (Ь) function as per State Standard §4.1.3: correcting the ''silent
    letter'' misconception by explaining palatalization (pressing the tongue flat
    against the roof of the mouth)'
  - 'Drilling §4.1.3 standard examples: Львів, шість, and high-frequency word ''день'''
- section: Голосні та напівголосні (Vowels and Semivowels)
  words: 400
  points:
  - 'Hard I (И) vs Soft I (І) distinction: alignment with State Standard §4.1.4 through
    minimal pairs like Рим – Рівне'
  - 'Visual technique ''Smile vs Grin'': І is a wide smile (dots are eyes), while
    И requires a relaxed jaw/grimace for a lower pitch and harder sound'
  - Introduction to Short Y (Й) and its usage in high-frequency collocations
- section: Практика та вимова (Practice and Pronunciation)
  words: 400
  points:
  - 'Contrast drills focusing on common learner hearing errors: minimal pairs for
    И-І (smile vs grin), Г-Ґ (voiced h vs hard g), and С-СЬ (hard vs soft)'
  - 'Spelling and identity alignment (§4.1.1): practicing the correct Ukrainian spelling
    of Kyiv, Kyivskyi, Ukraina, and ukrainets'
  - Reading practice using high-frequency vocabulary (центр, чай, школа, гарний, жити,
    день) with focus on proper word stress and phonetic accuracy
vocabulary_hints:
  required:
  - 'центр (center) — Top 300 word; collocations: у центрі, центр міста, торговий
    центр'
  - 'чай (tea) — Top 500 word; collocations: пити чай, чорний чай, чашка чаю, чай
    з лимоном'
  - 'школа (school) — Top 200 word; collocations: у школі, нова школа, іти до школи'
  - 'гарний (beautiful/good) — Top 300 word; collocations: гарний день, гарна дівчина,
    дуже гарний'
  - 'жити (to live) — Top 50 word; collocations: жити в Україні, жити добре, довго
    жити'
  - 'день (day) — Top 50 word; collocations: добрий день, кожен день, цілий день,
    робочий день'
  - 'Європа (Europe) — high cultural frequency; collocations: жити в Європі, Західна
    Європа, поїхати до Європи'
  - 'яблуко (apple) — medium frequency; collocations: смачне яблуко, червоне яблуко,
    їсти яблуко; idiom: яблуко розбрату'
  recommended:
  - ще (still/more) — high frequency function word
  - ґанок (porch) — demonstration of the repressed/restored letter Ґ
  - їжа (food) — demonstration of the unique resistance symbol letter Ї
  - юнак (young man) — iotated vowel demonstration
  - ніч (night) — demonstrates soft consonant ending contrast to hard consonants
  - сім'я (family) — common word showing iotated vowel after apostrophe
