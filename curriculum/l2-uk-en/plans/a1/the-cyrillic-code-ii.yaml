module: a1-002
level: A1
sequence: 2
slug: the-cyrillic-code-ii
version: '4.0'
title: The Cyrillic Code II
subtitle: К И І Р В Т Е — Now You Can Read Words
focus: grammar
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 1200
objectives:
- Learner can recognize and pronounce 7 new letters (К, И, І, Р, В, Т, Е)
- Learner can distinguish И (hard i) from І (soft i)
- Learner can identify trap letters (Р looks like P but is /r/, В looks like B but is /v/)
- Learner can read real Ukrainian words using all 14 known letters
content_outline:
- section: Вступ — Introduction
  words: 125
  points:
  - 'Quick review: read 3 words from Code I (мама, сом, масло) as warm-up.'
  - This module adds 7 letters (3 голосні + 4 приголосні). After this module you know 14 letters and can read real Ukrainian
    words like молоко, місто, кіт.
- section: Голосні — Vowels И, І, Е
  words: 275
  points:
  - 'И — uniquely Ukrainian vowel, no exact equivalent in English or most European languages. Key word: риба. Video link. Listen
    carefully to Anna''s pronunciation. Jaw relaxed, lower sound.'
  - 'І — the soft i, European-style, like English ''ee'' in ''see''. Key word: індик. Video link. Cultural note: the dotted
    І as a symbol of Ukrainian identity.'
  - 'Е — sounds like ''e'' in ''set''. Key word: екран. Video link. Not like Russian Э. Not like English ''ee''.'
  - 'The И vs І distinction is critical — they are everywhere. И is lower/harder (jaw relaxed); І is higher/brighter (like
    a smile). Minimal pair preview: they will appear constantly.'
  - 'All 6 basic vowels now known: А, О, У (Code I) + И, І, Е (this module). The 4 iotated vowels come in Code IV.'
- section: Приголосні — Consonants К, Р, В, Т
  words: 300
  points:
  - 'К — key word: кіт. Video link. Additional: кіно, каша, кава.'
  - 'Р — key word: ракета. Video link. Р is the rolled/trilled r. Looks like Latin P but sounds completely different. THE key
    trap letter — practice the tongue-tip trill. Additional: рука, рис.'
  - 'В — key word: вовк. Video link. Looks like Latin B but sounds like English ''v''. Another trap. Additional: вік, вікно.'
  - 'Т — key word: тато. Video link. Т is a true friend — same sound as English T. Additional: стіл, місто, метро.'
  - 'Trap letters recap: Р looks like P (is /r/), В looks like B (is /v/). These two cause the most confusion for English speakers.'
- section: Перші слова — First Real Words
  words: 225
  points:
  - With 14 letters you can now read real Ukrainian words, not just syllables.
  - 'Word drills (all decodable from 14 letters): кіт, тато, рис, сир, місто, море, метро, ліс, вікно, стіл, молоко, кіно,
    око, слово, літо, масло, ніс, він, вона.'
  - 'Reading exercise: short paragraph using only the 14 known letters.'
- section: Практика — Practice
  words: 175
  points:
  - 'Minimal pair drills: И vs І in context — ми (we) vs мі- (in compounds), вік (age) vs вік (same — depends on context).'
  - 'Trap letter practice: Р vs P shape, В vs B shape — recognizing the sound, not the shape.'
  - 'Self-check: can you read молоко? кіт? місто?'
- section: Підсумок — Summary
  words: 100
  points:
  - 'Progress: 14 of 33 letters learned (6 голосні + 8 приголосні).'
  - You can now read real Ukrainian words and simple phrases.
  - 'Next module: The Cyrillic Code III adds 9 more letters (Б, Д, П, З, Г, Х, Ж, Ш, Ч) including voiced/voiceless pairs.'
vocabulary_hints:
  required:
  - 'кіт (cat) — key word for К; collocations: мій кіт, рудий кіт'
  - молоко (milk) — uses М, Л from Code I + О, К from Code II
  - 'рис (rice) — demonstrates Р; readable from known letters'
  - 'сир (cheese) — demonstrates С+И+Р combination'
  - 'тато (dad) — demonstrates Т; high frequency family word'
  - 'місто (city) — high frequency; demonstrates І and Т'
  - 'море (sea) — demonstrates М, О, Р, Е'
  recommended:
  - метро (metro) — internationalism; demonstrates М, Е, Т, Р
  - 'ліс (forest) — demonstrates Л, І, С'
  - вікно (window) — demonstrates В, І, К
  - стіл (table) — demonstrates С, Т, І, Л
  - кіно (cinema) — internationalism; demonstrates К, І
  - 'око (eye) — two-letter word using О and К'
  - 'слово (word) — demonstrates С, Л, О, В'
  - літо (summer) — demonstrates Л, І, Т
