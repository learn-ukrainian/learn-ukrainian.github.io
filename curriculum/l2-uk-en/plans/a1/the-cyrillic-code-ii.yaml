module: a1-002
level: A1
sequence: 2
slug: the-cyrillic-code-ii
version: '3.0'
title: The Cyrillic Code II
subtitle: К И Р Б В Д І — Now You Can Read Words
focus: grammar
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 2000
objectives:
- Learner can recognize and pronounce 7 new letters (К, И, Р, Б, В, Д, І) plus О
- Learner can distinguish И (hard i) from І (soft i)
- Learner can identify trap letters (Р looks like P, В looks like B)
- Learner can read real Ukrainian words using 13 letters
content_outline:
- section: Вступ
  words: 200
  points:
  - 'Quick review: read 3 words from Code I (мама, сума, луна) as warm-up.'
  - This module adds 7 letters (5 приголосні + 2 голосні). After this module you know 13 letters and can read real Ukrainian
    words.
- section: Голосні — И, І, О
  words: 400
  points:
  - И — риба 🐟. Video link. И is a uniquely Ukrainian vowel — no exact equivalent in English or most European languages. Listen
    carefully to Anna's video.
  - 'І — індик 🦃. Video link. І is the soft i — European-style, like English ''ee'' in ''see''. Cultural note: the dotted
    І as a symbol of Ukrainian identity.'
  - О — огірок 🥒. Video link. О sounds like 'o' in 'more'. Unlike Russian, unstressed О stays /o/ in Ukrainian (never reduces
    to /a/).
  - 'The И vs І distinction is critical. И has a lower, harder sound (jaw relaxed); І is higher and brighter (like a smile).
    Minimal pair preview: they will appear everywhere.'
- section: Приголосні — К, Р, Б, В, Д
  words: 500
  points:
  - 'К — кіт 🐱. Video link. Additional: кіно, каша, кава, Київ.'
  - 'Р — ракета 🚀. Video link. Р is the rolled/trilled r. Looks like Latin P but sounds completely different. This is THE
    key trap letter — practice the tongue-tip trill. Additional: рука, ранок, рис.'
  - 'Б — банан 🍌. Video link. Additional: брат, бабуся, більше.'
  - 'В — вовк 🐺. Video link. Looks like Latin B but sounds like English ''v''. Another trap. Additional: вода, вулиця, вечір.'
  - 'Д — дім 🏠. Video link. Д looks unfamiliar but sounds simple — like English ''d''. Additional: добре, друг, день.'
  - 'English sidebar: Trap letters recap — Р looks like P (is /r/), В looks like B (is /v/). These two cause the most confusion
    for English speakers.'
- section: Перші слова — First Real Words
  words: 450
  points:
  - With 13 letters you can now read real Ukrainian words, not just syllables.
  - 'Word drills: банан, рука, вода, молоко, кіно, сила, дірка, міна, лиса, нива, слива.'
  - 'Phrase practice: Банан і слива. Вода і молоко. Дім і вулиця.'
  - 'Reading exercise: short paragraph using only the 13 known letters.'
- section: Практика
  words: 300
  points:
  - 'Minimal pair drills: И vs І in context — ми (we) vs мі- (in compounds).'
  - 'Trap letter practice: Р vs П (next module), В vs Б — recognizing the sound, not the shape.'
  - 'Self-check: can you read банан? молоко? Київ?'
- section: Підсумок
  words: 150
  points:
  - 'Progress: 13 of 33 letters learned (4 голосні + 9 приголосні).'
  - You can now read real Ukrainian words and simple phrases.
  - 'Next module: The Cyrillic Code III adds 9 more letters (П, Т, Г, Ґ, Е, З, Ж, Ш, Х) including voiced/voiceless pairs.'
vocabulary_hints:
  required:
  - 'кіт (cat) — key word for К; collocations: мій кіт, рудий кіт'
  - 'вода (water) — readable from known letters; collocations: пити воду, холодна вода'
  - банан (banana) — internationalism, readable from known letters
  - молоко (milk) — uses М, Л from Code I + О, К from Code II
  - 'рука (hand/arm) — high frequency; collocations: ліва рука, права рука'
  - 'кіно (cinema) — internationalism; collocations: іти в кіно'
  - 'дім (house/home) — high frequency; collocations: мій дім, великий дім'
  recommended:
  - друг (friend) — high frequency; demonstrates Д and Р together
  - брат (brother) — family vocabulary; demonstrates Б and Р
  - слива (plum) — uses С, Л from Code I + В, І from Code II
activity_hints:
- type: watch-and-repeat
  focus: Watch Anna's video for each of the 7 new letters + О
  items: 8
- type: classify
  focus: Sort К И Р Б В Д І О into голосні vs приголосні
  items: 8
- type: image-to-letter
  focus: See emoji (🐱🐟🚀🍌🐺🏠🦃🥒) — which letter?
  items: 8
- type: match-up
  focus: Match letter to key word
  items: 8
- type: quiz
  focus: Which letter makes this sound? (Р looks like P but sounds like...)
  items: 10
