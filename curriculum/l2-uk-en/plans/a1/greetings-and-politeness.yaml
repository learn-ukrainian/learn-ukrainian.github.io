module: a1-004
level: A1
sequence: 4
slug: greetings-and-politeness
version: '1.0'
title: Greetings and Politeness
subtitle: "Привіт! — Your First Conversation"
focus: vocabulary
pedagogy: PPP
phase: A1.1 [Script & First Contact]
word_target: 1200
objectives:
- Greet someone informally and formally in Ukrainian
- Choose correctly between Ти and Ви based on social context
- Say thank you, please, excuse me, and goodbye
- Have a basic first conversation (greeting → how are you → goodbye)
content_outline:
- section: Діалоги (Dialogues)
  words: 450
  points:
  - "Dialogue 1 — INFORMAL: Meeting a friend at Shevchenko Park (following
    Anna's ULP 1-01 setting). Привіт! → Як справи? → Чудово! А у тебе?
    → Добре. → Рада тебе бачити! → Я теж. Full greeting-response cycle
    with natural Ukrainian flow."
  - "Dialogue 2 — FORMAL: Hotel reception (following Anna's ULP 1-02 setting).
    Доброго ранку! → Доброго ранку! У вас все добре? → Так, все чудово.
    → Гарного дня! → Дякую, і вам! → До побачення! Full formal cycle."
  - "Dialogue 3 — ASKING FOR SOMETHING: At a cafe counter.
    Вибачте! → Так? → Каву, будь ласка. → Будь ласка! → Дякую!
    Practices politeness words in a real transaction."
  - "Dialogue 4 — THE TI/VI SWITCH: Two colleagues who've been formal
    decide to switch. Давай на ти? → Давай! Cultural moment — this is a
    significant social event in Ukrainian relationships."
- section: "Привíт! (Informal Greetings)"
  words: 200
  points:
  - "Following Anna Ohoiko's ULP Episode 1 approach — start with a REAL
    situation. Two friends meet in a park. Привíт! is the universal
    informal greeting — use it with friends, family, peers, anyone your age
    where there's no superiority. Just smile and say it: /pryvit/!"
  - "How are you? Two equivalent ways: Як спрáви? and Як ти?
    Answers: Чудóво! (great), Дýже дóбре! (very good), Дóбре (fine),
    Нормáльно (okay), Погáно (bad). And asking back: А у тéбе? А ти як?"
  - "I'm glad to see you — gendered forms! Men say: Рáдий тебé бáчити!
    Women say: Рáда тебé бáчити! This is one of the first places learners
    encounter Ukrainian's gendered past/adjective forms."
- section: "Дóбрий день! (Formal Greetings)"
  words: 200
  points:
  - "Following ULP Episode 2 — hotel reception dialogue. Formal greetings
    change by time of day: Дóброго рáнку! (morning), Дóбрий день! (afternoon,
    also the safe default), Дóбрий вéчір! (evening), Добрáніч! (good night)."
  - "Ви — the formal/plural 'you'. Use with strangers, elders, teachers,
    bosses, anyone you don't know well. The switch to Ти is an explicit
    invitation: 'Давáй на ти?' (Shall we use ти?). When unsure, always Ви."
  - "Formal 'how are you': Як у вас спрáви? Як ви? У вас все дóбре?
    The formal versions mirror the informal but with Ви forms."
- section: "Ввíчливість (Politeness)"
  words: 200
  points:
  - "Дя́кую! (thank you) — one of the first words every learner needs.
    Intensifiers: Дýже дя́кую! (thank you very much), Щúро дя́кую!
    (sincerely thank you)."
  - "Будь лáска — the Swiss army knife of Ukrainian politeness. It means
    BOTH 'please' (when asking) AND 'you're welcome' (when responding to
    thanks). Дáйте, будь лáска, кáву. → Будь лáска! Following Anna's
    Episode 2 exactly: this dual function surprises English speakers."
  - "Вибáчте (excuse me, formal) and Вибáч (informal). Use to get
    attention, apologize for bumping someone, or interrupt politely.
    Перепрóшую is a more sincere formal apology."
- section: "До побáчення! (Goodbye)"
  words: 150
  points:
  - "Formal goodbye: До побáчення! (literally 'until seeing'). The most
    common formal farewell — works everywhere."
  - "Informal goodbyes: Бувáй! (to one person), Бувáйте! (to a group or
    formal). Па-пá! is especially common in western Ukraine (Lviv, Halychyna)
    due to historical Polish/Austro-Hungarian influence. Гáрного дня! (Have a nice day!) — and the response:
    І вам! (formal) / І тобі! (informal)."
  - "і means 'and' (used between parallel things): чоловíк і дружúна
    (husband and wife), Гáрних вихíдних! — І тобí!"
vocabulary_hints:
  required:
  - привíт (hi, informal) — universal casual greeting
  - дóбрий день (good afternoon/hello formal) — safe default
  - дя́кую (thank you) — essential, first-syllable stress
  - будь лáска (please / you're welcome) — dual function
  - до побáчення (goodbye, formal) — literally 'until seeing'
  - як спрáви? (how are you?) — informal
  - чудóво (great, wonderful) — positive response
  - дóбре (fine, good) — neutral response
  - вибáчте (excuse me, formal) — attention/apology
  - рáда тебé бáчити (glad to see you, female) — gendered
  recommended:
  - бувáй (bye, informal) — casual farewell
  - гáрного дня! (have a nice day!) — warm farewell
  - перепрóшую (I apologize) — formal apology
  - нормáльно (okay, normal) — neutral response
  - па-пá (bye-bye) — very casual, central/eastern Ukraine
  - давáй на ти? (shall we use ти?) — social ritual
