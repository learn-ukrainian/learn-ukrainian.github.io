module: a1-047
level: A1
sequence: 47
slug: checkpoint-communication
version: '1.1.2'
title: 'Перевірка: Спілкування'
subtitle: Чи вмієте ви звертатися до людей, давати вказівки та поєднувати думки?
focus: review
pedagogy: PPP
phase: А1.7 [Спілкування]
word_target: 1000
objectives:
- Використовувати кличний відмінок для правильного звертання до людей (Олено! Тарасе! Друже!)
- Давати вказівки та прохання, використовуючи наказовий спосіб (Читай! Дайте!)
- Поєднувати ідеї за допомогою сполучників (і, а, але, бо, тому що)
- Будувати складні речення з що, де, коли
- Використовувати святкові привітання та лексику в контексті
dialogue_situations:
- setting: 'Організація шкільного ярмарку (m) — делегування завдань: Олено, принеси плакати (pl)! Тарасе, постав столи (pl)! Ми маємо квитки (pl) і напої (pl). Нам потрібні стільці, бо людей багато.'
  speakers:
  - Організатор
  - Волонтери
  motivation: 'Кличний відмінок + наказовий спосіб + сполучники зі словами плакат(m), квиток(m), напій(m)'
content_outline:
- section: Що ми знаємо?
  words: 200
  points:
  - 'Самоперевірка за матеріалами модулів №42–46: Чи вмієте ви звертатися до когось на ім''я в кличному відмінку? (модуль №42) Чи можете попросити когось щось зробити? (модуль №43) Чи вмієте ви поєднувати ідеї за допомогою і, а, але, бо? (модуль №44) Чи можете будувати речення зі словами що, де, коли? (модуль №45) Чи можете назвати українські свята та привітати людей? (модуль №46)'
- section: Читання
  words: 250
  points:
  - 'Короткий український текст із використанням усіх навичок A1.7. Зміст: Олена телефонує своєму другу Тарасу, щоб спланувати святкування. Вона використовує кличний відмінок (Тарасе!), наказовий спосіб (Прийди! Принеси!), сполучники (бо ми святкуємо, але я не знаю, коли ти вільний) та святкову лексику (Різдво, кутя, колядки). Поєднує всі комунікативні інструменти A1.7 в одному реалістичному сценарії.'
- section: Граматика
  words: 200
  points:
  - 'Ключові шаблони з A1.7: 1. Кличний відмінок: -а→-о (Олено), твердий приголосний→-е (Тарасе), м''який приголосний→-ю (Андрію) (модуль №42) 2. Наказовий спосіб: ти (читай, дай), ви (читайте, дайте) (модуль №43) 3. Сурядні сполучники: і/та, а (контраст), але, бо (модуль №44) 4. Підрядні сполучники: що, де, коли + кома (модуль №45) 5. Святкові привітання: З + орудний відмінок (З Різдвом!) (модуль №46)'
- section: Діалог
  words: 200
  points:
  - 'Планування святкової вечірки: — Олено, привіт! Ти знаєш, що скоро Різдво? — Так, Тарасе! Я думаю, що ми можемо святкувати разом. — Добре! Скажи, коли ти вільна, бо я хочу запросити друзів. — Я вільна двадцять четвертого. Але я не знаю, де ми будемо. — Ходімо до мене! Принеси кутю, будь ласка. — Добре, принесу! І я знаю, де купити гарні свічки. З Різдвом! Використовує кличний відмінок, наказовий спосіб, сполучники, що/де/коли та свята.'
- section: Підсумок
  words: 150
  points:
  - 'Підсумок досягнень A1.7: Тепер ви вмієте правильно звертатися до людей українською. Ви вмієте просити людей щось зробити — ввічливо і неформально. Ви можете поєднувати свої думки в довші, природні речення. Ви вмієте будувати складні речення з що, де, коли. Ви можете розмовляти про українські свята та вітати людей. Далі: A1.8 — Минулий, майбутній час, випуск.'
