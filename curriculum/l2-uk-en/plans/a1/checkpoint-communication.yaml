module: a1-054
level: A1
sequence: 54
slug: checkpoint-communication
version: '2.0'
title: 'Checkpoint: Communication'
subtitle: Can You Handle Real Life?
focus: checkpoint
pedagogy: TTT
phase: A1.5 [Modals, Commands & Life]
word_target: 1200
objectives:
- Demonstrate modal verb usage in context
- Form correct imperatives and polite requests
- Discuss family, leisure, and travel plans
- Integrate A1.5 skills in practical scenarios
content_outline:
- section: Огляд (Overview)
  words: 180
  points:
  - 'TTT checkpoint consolidating A1.5 skills: modals (могти/вміти/треба/хотіти),
    imperatives (8 required verbs), family/appearance, leisure, travel.'
  - 'Self-assessment strategy: identifying strengths and weaknesses before advancing
    to A1.6 Real-World Skills phase.'
- section: 'Навичка 1: Модальні дієслова (Skill 1: Modal Verbs)'
  words: 300
  points:
  - 'Ability modals review: Могти (circumstantial can) vs вміти (learned skill). Three-way
    negative contrast: не можу / не вмію / не можна.'
  - 'Obligation modals review: Треба/потрібно (impersonal necessity) vs повинен (personal
    duty) vs хотіти (desire). Intensity scale application in varied contexts.'
  - 'Integrated modal choice: Given a scenario, select the correct modal from the
    full set (могти/вміти/можна/треба/повинен/хотіти). Testing discrimination skill.'
- section: 'Навичка 2: Накази та прохання (Skill 2: Commands & Requests)'
  words: 240
  points:
  - 'Imperative formation for 8 required verbs: читай(те), пиши(те), скажи(те), дай(те),
    іди(те), слухай(те), дивись(те), стій(те). Ти-form and Ви-form recall.'
  - 'Polite requests: будь ласка placement, прошу вас + infinitive, Чи не могли б
    ви...? Politeness escalation. Positive and negative command contrast.'
- section: 'Навичка 3: Повсякдення (Skill 3: Everyday Life)'
  words: 240
  points:
  - 'Family and appearance vocabulary recall: family members, physical descriptions,
    age expressions. Combining with possessive pronouns from earlier modules.'
  - 'Hobbies, sports, and leisure: грати в/на, invitation patterns (Ходімо! Давай
    зустрінемось!). Travel and transport: means of transport (Instrumental), directions,
    journey descriptions.'
- section: Інтеграційне завдання (Integration Task)
  words: 240
  points:
  - 'Scenario: Plan a weekend trip with a friend. Use modals (Хочеш поїхати? Треба
    купити квитки. Я повинен повернутися до неділі.), imperatives (Подивись розклад!),
    travel vocabulary, and invitation patterns.'
  - 'Assessment focus: Can the learner combine A1.5 skills fluidly in a realistic
    communicative scenario? Holistic evaluation of modal, imperative, and vocabulary
    integration.'
vocabulary_hints:
  required:
  - могти (can) — можу, можеш; circumstantial ability
  - вміти (know how to) — вмію, вмієш; learned skill
  - треба (it is necessary) — Мені треба; impersonal necessity
  - хотіти (to want) — хочу, хочеш; desire expression
  - читай (read!) — Читайте текст; imperative of required verb
  - скажи (say!) — Скажіть, будь ласка; imperative of required verb
  - дай (give!) — Дайте, будь ласка; imperative of required verb
  - подорож (journey) — Хочеш поїхати в подорож?; integration context
  - автобус (bus) — їхати автобусом; transport recall
  - хобі (hobby) — Яке у тебе хобі?; leisure recall
  recommended:
  - стадіон (stadium) — на стадіоні; sports venue recall
  - запрошувати (to invite) — Я хочу запросити тебе; invitation context
  - наліво (left) — Поверніть наліво; direction recall
  - повинен (must) — Я повинен працювати; obligation recall
activity_hints:
- type: quiz
  focus: A1.5 comprehensive test covering modals, imperatives, vocabulary
  items: 30
connects_to:
- a1-55 (Prohibitions and Signs)
prerequisites:
