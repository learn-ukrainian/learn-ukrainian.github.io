title: Checkpoint Communication
subtitle: Review M44-49
focus: review
pedagogy: Checkpoint
phase: A1.7 [People & Communication]
word_target: 1200
objectives:
- Review Vocative, Imperative, and Dative basics
- Test ability to link sentences and express conditions
- Review holiday vocabulary and greetings
content_outline:
- section: Listening Comprehension
  words: 300
  points:
  - A dialogue involving a phone call to a friend to plan a birthday party.
  - Tests Vocative, Dative pronouns, imperatives, and conjunctions.
- section: Grammar Review
  words: 300
  points:
  - Forming commands.
  - Choosing the right Dative pronoun (мені, тобі, йому...).
  - Linking sentences with відповідні сполучники (а, але, бо, якщо).
- section: Communication
  words: 300
  points:
  - 'Roleplay: Wishing someone a happy holiday and offering a gift.'
  - Asking a favor using imperative and 'будь ласка'.
- section: Self-Assessment
  words: 300
  points:
  - Can you call someone's name naturally in Ukrainian?
  - Can you ask someone to do something politely?
  - Can you say 'I like' and 'Give me'?
  - Can you connect your ideas smoothly?
