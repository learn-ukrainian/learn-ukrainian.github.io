grammar:
- "Syllable rule: count vowels = count syllables"
- "10 vowel letters → 6 vowel sounds mapping"
- "Iotated vowels (Я, Ю, Є as two sounds or softening; Ї always [йі])"
- "All 33 consonant letters with sounds"
- "Ь and apostrophe (preview — detailed in M03)"
register: розмовний
references:
