title: Читаємо українською
subtitle: Від літер до слів та речень
focus: phonetics
pedagogy: PPP
phase: A1.1 [Звуки, літери та перший контакт]
word_target: 1200
objectives:
- Вміти читати будь-яке українське слово, розпізнаючи звуки та об'єднуючи їх у склади
- Розуміти правило складоподілу — рахувати голосні, щоб порахувати склади
- Навчитися впевнено читати багатоскладові слова (не по літерах)
- Розуміти, як 10 голосних літер позначають 6 голосних звуків
content_outline:
- section: Склади
  words: 250
  points:
  - 'Большакова, 1 клас, стор. 25: «У слові стільки складів, скільки голосних звуків.» Порахуй голосні — дізнаєшся кількість складів. Це правило ніколи не порушується. ма-ма (2 голосні = 2 склади), мо-ло-ко (3 голосні = 3 склади), банк (1 голосна = 1 склад).'
  - 'Як українські діти вчаться читати — складові ланцюжки: Починаємо з пари приголосний + голосний: М → ма, мо, му, ми. Потім навпаки: ам, ом, ум. Далі будуємо слова: ма-ма, мо-ло-ко. Це підхід "знизу вгору": звук → склад → слово. (Захарійчук 1 клас, стор. 46; Большакова 1 клас, стор. 25)'
  - 'Звуковий аналіз слова (Большакова стор. 29): 1) Визначаю голосні звуки 2) Ділю слово на склади 3) Ставлю наголос 4) Позначаю приголосні звуки. Тест із підборіддям для підрахунку складів (Кравцова 2 клас, стор. 13): покладіть долоню під підборіддя, скажіть слово — кожен дотик підборіддя = один склад.'
  - 'Українська система позначення звуків (Захарійчук стор. 15): [●] голосний, [—] твердий приголосний, [=] м''який приголосний. Цього вчиться кожна українська дитина в 1 класі.'
- section: Голосні літери
  words: 300
  points:
  - 'Повторення з модуля №1: 6 звуків, 10 літер. Тепер розберемо всі 10 окремо. Прості голосні (один звук кожна): А [а], О [о], У [у], Е [е], И [и], І [і]. Кожна позначає ОДИН стабільний звук — жодних сюрпризів.'
  - 'Йотовані голосні (два звуки або пом''якшення): Я = [йа] на початку слова (яблуко) або після голосного (моя). Після приголосного: пом''якшує його + [а] (пісня — Н пом''якшений). Ю = [йу] або пом''якшення + [у]. Є = [йе] або пом''якшення + [е]. Ї = ЗАВЖДИ [йі] — ніколи не пом''якшує. Лише на початку слова, після голосного або після апострофа. Унікальна для української мови.'
  - 'Критичні мінімальні пари: И проти І: кит проти кіт, дим проти дім. Послухайте відео Анни з правильною вимовою кожного з них — різниця тонка, але вона змінює значення.'
- section: Читання слів
  words: 500
  points:
  - 'Застосовуйте складові ланцюжки до реальних слів. Не читайте по літерах — читайте по складах. Використовуйте звуковий аналіз: спочатку знайдіть голосні, поділіть на склади, потім об''єднайте. Приклад: книга — знайдіть голосні И, А → кни-га → прочитайте.'
  - 'Поступове ускладнення за українською класифікацією: односкладові (1 склад): дім, сон, ліс, дуб, хліб. двоскладові (2 склади): ма-ма, та-то, во-да, ру-ка, ха-та, ка-ша. трискладові (3 склади): ап-те-ка, мо-ло-ко, лю-ди-на, ву-ли-ця. багатоскладові (4+ склади): у-ні-вер-си-тет, біб-лі-о-те-ка, фо-то-гра-фі-я.'
  - 'Назви українських міст як практика читання: Ки-їв, Льві-в, О-де-са, Хар-ків, Дні-про, Пол-та-ва. Зверніть увагу на різну кількість складів та їхню структуру.'
  - 'Особливі буквосполучення, на які слід звернути увагу (анонс для модуля №3): Щ — це завжди [шч] — що, ще. Ь не має звуку — він пом''якшує: день, сіль, кінь. Апостроф розділяє: сім''я, м''ясо, п''ять. Вони будуть детально розібрані у модулі №3.'
- section: Підсумок
  words: 150
  points:
  - 'Самоперевірка: Як порахувати склади в українському слові? Назвіть 6 голосних звуків. Назвіть 4 йотовані голосні літери. Що робить Ь? Що робить апостроф? Прочитайте це слово: бібліотека — скільки в ньому складів?'
vocabulary_hints:
  author_note: >-
    На А1 у цьому модулі всі слова (required + recommended) подаються як
    носії фонетичної практики — склади, наголос, йотовані, `ь`, апостроф,
    ДЖ/ДЗ, Ї, Щ. НЕ вводьте відмінкові парадигми, дієвідміну чи ступені
    порівняння — відмінки починаються з модуля №18 (знахідний). Кожне
    слово тут має одну словоформу, яку учень читає вголос і діагностує
    за таблицею «Типові помилки L2» (див. locked wiki, розділ після
    Словникового мінімуму).
  required:
  - яблуко (apple) — Я at word start = [йа]
  - молоко (milk) — 3 syllables, all simple vowels
  - людина (person) — Л + Ю combination
  - вулиця (street) — Ц sound practice
  - столиця (capital) — Київ — столиця України
  - каша (porridge) — Ш sound practice
  - пісня (song) — softening by Я after consonant
  recommended:
  - університет (university) — long word practice
  - бібліотека (library) — 5 syllables
  - фотографія (photography) — long word with Ф
  - шоколад (chocolate) — Ш + О + К combination
activity_hints:
- type: divide-words
  focus: 'Поділи слова на склади: мо-ло-ко, ап-те-ка, у-ні-вер-си-тет'
  items: 8
- type: count-syllables
  focus: 'Порахуй склади — скільки голосних, стільки й складів'
  items: 8
- type: match-up
  focus: 'З''єднай йотовані голосні з їхніми звуковими компонентами: Я=[й]+[а]'
  items: 6
- type: quiz
  focus: Прочитай слово і вибери його значення
  items: 6
- type: odd-one-out
  focus: 'Яке слово зайве? — за кількістю складів (односкладове серед двоскладових)'
  items: 6
- type: match-up
  focus: 'Типові помилки L2 при читанні (mirror wiki "Типові помилки L2" table). З''єднайте слово з типом помилки, яку воно перевіряє.'
  items:
  - день: 'Ігнорування м''якого знака: [ден] замість [ден′]'
  - сім'я: 'Злиття через апостроф: [сіма] замість [сімйа́]'
  - дякую: 'Йотована після приголосного: [дйакуйу] замість [д''а́куйу]'
  - Україна: '`Ї` → [і]: [Украіна] замість [Украйі́на]'
  - борщ: '`Щ` → [ш]: [борш] замість [боршч]'
  - джміль: '`ДЖ` як два звуки: [д]-[жміль] замість [джміль]'
  - молоко: 'Читання по літерах замість по складах'
  - огірок: 'Сплутування СКЛАДОПОДІЛУ з ПЕРЕНЕСЕННЯМ (складоподіл `о-гі-рок`; перенесення `огі-рок`, бо одна літера `о-` не може стояти окремо в рядку)'
connects_to:
