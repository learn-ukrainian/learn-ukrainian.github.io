module: a1-044
level: A1
sequence: 44
slug: linking-ideas
version: 1.1.2
title: Зв'язок думок
subtitle: І, а, але, бо — як поєднувати свої думки
focus: grammar
pedagogy: PPP
phase: A1.7 [Спілкування]
word_target: 1200
objectives:
- Навчитися використовувати сурядні сполучники «і», «та», «а», «але» для з'єднання частин речення
- Вміти виражати причину за допомогою сполучників «бо» та «тому що»
- Навчитися будувати довші, більш природні речення замість уривчастих фраз
- Вміти розпізнавати сполучники в усному та писемному українському мовленні
dialogue_situations:
- setting: Обговорюємо, куди поїхати у відпустку — порівнюємо Карпати та море. Гори гарні, але далеко. Море тепле, бо літо. Я хочу в гори, а ти — на море. Поїдемо в Карпати, бо там дешевше.
  speakers:
  - Подружжя (couple)
  motivation: Використання сполучників «і», «а», «але», «бо» зі словами Карпати(pl), море(n), гори(pl)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Будуємо плани: — Ти хочеш каву чи чай? — Каву, бо я дуже втомлений. — А я хочу чай, але без цукру. — Ходімо в кафе, і я візьму ще тістечко. — Я теж хочу, але я на дієті! Сполучники: бо, а, але, і.'
  - 'Діалог 2 — Розмова про день: — Що ти робив сьогодні? — Я працював, а потім ходив у магазин. — Я хотів зателефонувати, але ти не відповів. — Вибач, бо телефон був без звуку. — Нічого! — Завтра я вільний, і ми можемо зустрітися. Природне використання сполучників у щоденному спілкуванні.'
- section: Сполучники
  words: 300
  points:
  - 'Що таке сполучники? Вони поєднують слова, словосполучення або цілі речення. Без них: Я люблю каву. Я люблю чай. (уривчасто). З ними: Я люблю каву і чай. (природно). Без них: Я хочу піти. Я втомлений. (незв''язно). З ними: Я хочу піти, бо я втомлений. (зв''язна думка).'
  - 'Підхід 4-5 класів: сполучники сурядності. Вони з''єднують РІВНОПРАВНІ частини: «і» / «та» (додавання, «та» — синонім «і», часто вживається на письмі): мама і тато, хліб та масло, Я читаю і пишу. «а» (зіставлення або перехід): Я люблю каву, а ти? Він працює, а вона відпочиває. «але» (сильніше протиставлення): Я хочу, але не можу. Він молодий, але розумний.'
- section: Бо і тому що
  words: 300
  points:
  - 'Два способи сказати "because": «бо» — коротке, часто в усному мовленні: Я не йду, бо я хворий. «тому що» — довше, частіше на письмі: Я не йду, тому що я хворий. Обидва варіанти правильні і є питомо українськими. Сполучник «бо» НЕ є неформальним чи неправильним. Правило коми: завжди ставимо кому перед «бо» та «тому що». Я втомлений, бо багато працював. Ми не гуляємо, тому що йде дощ.'
  - 'Пояснення причини: Чому? → Бо / Тому що... — Чому ти вчиш українську? — Бо я люблю Україну. — Чому ти не їси? — Тому що я не голодний. — Чому ви тут? — Бо ми чекаємо друга. Сполучник «бо» відповідає на запитання "Чому?" — саме так українці пояснюють причини.'
- section: Підсумок
  words: 300
  points:
  - 'Коротка довідка зі сполучників: | Сполучник | Значення | Приклад | | і / та | додавання | Я їм хліб і п''ю воду. | | а | зіставлення | Я читаю, а він пише. | | але | протиставлення | Я хочу, але не можу. | | бо | причина | Я не йду, бо хворий. | | тому що | причина | Я не йду, тому що хворий. | Правила пунктуації: кома завжди ставиться перед «а», «але», «бо», «тому що». Перед «і» — лише якщо з''єднуються два повноцінні речення. Самоперевірка: поєднайте ці пари речень відповідним сполучником: Я люблю каву. Я не люблю чай. → Я люблю каву, а/але...'
vocabulary_hints:
  required:
  - і (and)
  - та (and — synonym of і)
  - а (and/but — contrast)
  - але (but)
  - бо (because)
  - тому що (because — longer form)
  recommended:
  - чому (why)
  - тому (therefore/that's why)
  - також (also)
  - теж (also — colloquial)
  - або (or)
  - чи (or — in questions)
activity_hints:
- type: fill-in
  focus: 'Оберіть правильний сполучник: і, а, але, бо — Я хочу ___ не можу. Він працює, ___ вона відпочиває.'
  items: 10
- type: quiz
  focus: 'Який сполучник обрати? Я не йду, ___ хворий. (і / а / бо)'
  items: 8
- type: fill-in
  focus: 'З''єднайте речення за допомогою «бо» або «тому що»: Я вчу українську, ___.'
  items: 6
- type: group-sort
  focus: 'Розподіліть сполучники за значенням: і/та (єднальні), а/але (протиставні), бо/тому що (причинові).'
  items: 10
connects_to:
