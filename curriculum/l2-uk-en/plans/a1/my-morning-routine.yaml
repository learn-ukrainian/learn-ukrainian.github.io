module: a1-020
level: A1
sequence: 20
slug: my-morning-routine
version: '1.0'
title: My Morning Routine
subtitle: "Прокидаюся і вмиваюся — Reflexive Verbs"
focus: grammar
pedagogy: PPP
phase: A1.3 [Actions & Desires]
word_target: 1200
objectives:
- Describe a daily morning routine
- Understand and use reflexive verbs ending in -ся / -сь
- Sequence actions using basic time words (спочатку, потім)
content_outline:
- section: Діалоги (Dialogues)
  words: 450
  points:
  - "Dialogue: Complaining about early mornings. Коли ти прокидаєшся? — Я прокидаюся рано. Потім я вмиваюся і одягаюся. (When do you wake up? — I wake up early. Then I wash and dress)."
  - "Introduce reflexive verbs naturally in a sequence of morning actions."
- section: "Зворотні дієслова (-ся / -сь)"
  words: 450
  points:
  - "Explain that some actions we do to ourselves. In Ukrainian, these verbs end in -ся or -сь."
  - "The rule: If the verb form ends in a consonant (e.g., ти прокидаєш), add -ся -> ти прокидаєшся. If it ends in a vowel (e.g., я прокидаю), add -сь -> я прокидаюсь (or -ся: я прокидаюся, both are fine, but -сь is smoother)."
  - "Provide paradigms for common morning verbs: прокидатися (to wake up), вмиватися (to wash one's face), одягатися (to dress oneself)."
- section: "Моя рутина (My Routine)"
  words: 300
  points:
  - "Putting it together. Using 'спочатку' (first/at the beginning) and 'потім' (then/later) to tell a story."
  - "Спочатку я прокидаюся. Потім я вмиваюся. Потім я снідаю. (First I wake up. Then I wash. Then I have breakfast)."
  - "Note that not all routine verbs are reflexive (снідати, працювати)."
vocabulary_hints:
  required:
  - прокидáтися (to wake up)
  - вмивáтися (to wash face/hands)
  - одягáтися (to get dressed)
  - дивúтися (to look/watch - remind it's reflexive)
  - спочáтку (at first, initially)
  - пóтім (then, later)
  recommended:
  - лягáти спáти (to go to bed/sleep)
  - приймáти душ (to take a shower)
activity_hints:
- type: sequencing
  focus: Put morning routine actions in logical order
  items: 6
- type: fill-in
  focus: Choose the correct reflexive ending (-ся or -сь)
  items: 10
- type: translation
  focus: Translate short routine sentences
  items: 6
connects_to:
- a1-021 (Checkpoint Actions)
prerequisites:
- a1-019 (Questions and No)
grammar:
- Reflexive verbs (-ся / -сь)
- Present tense conjugation applied to reflexives
register: розмовний
