module: a1-058
level: A1
sequence: 58
slug: phone-and-writing
version: '1.0'
title: Phone And Writing
subtitle: SMS, emails, written communication
focus: communication
pedagogy: PPP
phase: A1.8 [Past, Future & Graduation]
word_target: 1200
objectives:
- Write basic SMS messages and read text abbreviations
- Structure a simple email or postcard
- Have a basic phone conversation
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: A phone call. ''Алло, це... Я слухаю.'''
  - 'Dialogue 2: Reading text messages arranging a meeting.'
- section: Повідомлення (Messages)
  words: 400
  points:
  - 'Common text phrases: Що робиш? (What are you doing?), Де ти?, Буду о 5 (Will be there at 5).'
  - Emojis and casual tone.
- section: Листи і листівки (Letters and postcards)
  words: 400
  points:
  - 'Structure of a written message: Привіт (Greeting), Як справи? (Opening), Body (past/future plans),
    До зустрічі! (Sign-off).'
vocabulary_hints:
  required:
  - телефон
  - алло
  - повідомлення
  - лист
  - писати
  - читати
  - телефонувати
  - номер
  recommended:
  - інтернет
  - соцмережі
  - пошта
activity_hints:
- type: reading-comprehension
  focus: Read short SMS conversations and answer questions
  items: 6
- type: matching
  focus: Match formal/informal greetings and sign-offs for emails
  items: 6
connects_to:
- a1-059 (A1 Review)
prerequisites:
- a1-047 (Linking Ideas)
- a1-053 (What Will Happen Future)
grammar:
- Review of communication verbs
register: розмовний
references: []
