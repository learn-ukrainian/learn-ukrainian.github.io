module: a1-027
level: A1
sequence: 27
slug: free-time-and-hobbies
version: '1.0'
title: Free Time and Hobbies
subtitle: "What do you do on weekends?"
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Time & Nature]
word_target: 1200
objectives:
- Talk about hobbies, sports, and leisure activities
- Use verbs from M15-M17 in the context of free time
- Express what you like to do during weekends
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Weekend hobbies.
    — Що ти робиш на вихідних?
    — Я люблю грати в теніс і читати книги. А ти?
    — Я слухаю музику і гуляю."
  - "Dialogue 2 — Going to the cinema.
    — Ти любиш кіно?
    — Так, дуже! Ми йдемо в кіно у суботу?
    — Чудова ідея!"
- section: "Хобі та дозвілля (Hobbies and Leisure)"
  words: 350
  points:
  - "Introduce vocabulary: спорт, музика, кіно, книга, гра."
  - "Combine with verbs previously learned: грати (в спорт/ігри), слухати (музику), читати (книгу), дивитися (фільм/кіно)."
  - "Note: Teach 'грати в' + accusative as a fixed chunk for sports (грати в футбол, грати в теніс)."
- section: "Вільний час (Free Time)"
  words: 350
  points:
  - "Using 'Я люблю...' + infinitive to talk about hobbies (Я люблю читати)."
  - "Asking others: Що ти любиш робити? (What do you like to do?)."
  - "Connecting with days/time: У суботу я граю в футбол."
vocabulary_hints:
  required:
  - вільний час (free time)
  - кіно (cinema/movie)
  - фільм (film/movie)
  - грати в футбол (to play football)
  - грати в теніс (to play tennis)
  - слухати музику (to listen to music)
  - дивитися фільм (to watch a movie)
  recommended:
  - хобі (hobby - already taught in M15)
  - спорт (sport - already taught in M15)
  - музика (music - already taught in M15)
  - гра (game)
  - фотографувати (to take photos)
  - малювати (to draw/paint)
activity_hints:
- type: matching
  focus: Match the verb to the appropriate noun (e.g., слухати -> музику)
  items: 10
- type: fill-in
  focus: Complete sentences about hobbies based on picture cues or short text
  items: 12
- type: multiple-choice
  focus: Select the correct hobby based on someone's interests
  items: 8
connects_to:
- a1-028 (Checkpoint Time & Nature)
prerequisites:
- a1-016 (First Conjugation Group - for грати, читати, слухати)
- a1-023 (Days and Weeks - for weekend context)
grammar:
- "Я люблю + infinitive review"
- "Грати в + sport (as a chunk)"
register: розмовний
references:
- title: "ULP Ep3"
  url: "https://www.ukrainianlessons.com/episode3/"
  notes: "Reviewing basic verbs and expanding to hobbies."