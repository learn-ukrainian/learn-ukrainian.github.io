module: a1-053
level: A1
sequence: 53
slug: health
version: '1.0'
title: Health
subtitle: "У мене болить голова — body parts and symptoms"
focus: vocabulary
pedagogy: PPP
phase: A1.8 [Past, Future, Graduation]
word_target: 1200
objectives:
- Name basic body parts in Ukrainian (голова, рука, нога, живіт, горло, спина)
- Describe symptoms using "У мене болить..." as a chunk
- Tell a doctor or pharmacist what hurts
- Use basic health vocabulary in practical situations
content_outline:
- section: "Dialogues"
  words: 300
  points:
  - "Dialogue 1 — At the doctor's:
    — Що у вас болить? — У мене болить голова і горло.
    — Давно? — З учора. І в мене температура.
    — Ви кашляєте? — Так, трохи. І в мене нежить.
    — Зрозуміло. Це застуда. Я випишу ліки. Відпочивайте!
    — Дякую, лікарю!
    Doctor visit: symptoms + basic diagnosis."
  - "Dialogue 2 — At the pharmacy:
    — Добрий день! У мене болить голова. Дайте, будь ласка, таблетки.
    — Від головного болю? — Так. І від кашлю, будь ласка.
    — Ось, будь ласка. Ще щось?
    — А є щось від нежиті? — Так, ось краплі.
    — Дякую! Скільки це коштує?
    Pharmacy: asking for medicine using known polite forms."
- section: "Тіло (The Body)"
  words: 300
  points:
  - "Essential body parts (Grade 1-2 textbooks: частини тіла):
    голова (head, f), горло (throat, n), спина (back, f),
    живіт (stomach, m), рука (hand/arm, f), нога (leg/foot, f),
    око (eye, n), вухо (ear, n), зуб (tooth, m), ніс (nose, m).
    Note: рука = whole arm including hand. нога = whole leg including foot.
    These are the most useful for A1 — not an anatomy lesson."
  - "Body part gender matters for adjectives (review from M09):
    велике око (big eye — neuter), великий ніс (big nose — masc),
    велика рука (big hand — fem).
    But at A1, focus on recognition — you'll use these mainly with болить."
- section: "У мене болить... (It Hurts...)"
  words: 300
  points:
  - "The magic phrase: У мене болить + body part.
    У мене болить голова. (I have a headache. — literally 'at me hurts head')
    У мене болить живіт. (My stomach hurts.)
    У мене болить горло. (My throat hurts.)
    У мене болить спина. (My back hurts.)
    У мене болить зуб. (I have a toothache.)
    Learn this as a CHUNK — don't analyze the grammar (that's dative, A2+)."
  - "Common symptoms (as chunks):
    У мене температура. (I have a fever.)
    У мене кашель. (I have a cough.)
    У мене нежить. (I have a runny nose.)
    Мені холодно. (I'm cold.)
    Мені погано. (I feel bad.)
    Я хворий/хвора. (I'm sick. — masc/fem)
    Note: 'У мене болять зуби' (teeth hurt — plural form болять). Just recognize it."
- section: "Summary"
  words: 300
  points:
  - "Health toolkit:
    Body parts: голова, горло, живіт, спина, рука, нога, око, вухо, зуб, ніс.
    Symptoms: У мене болить [body part]. У мене температура/кашель/нежить.
    State: Я хворий/хвора. Мені погано.
    At the doctor: Що у вас болить? — У мене болить...
    At the pharmacy: Дайте таблетки від [symptom], будь ласка.
    від головного болю (for headache), від кашлю (for cough), від нежиті (for runny nose).
    Self-check: How do you say 'My throat hurts and I have a fever'?"
vocabulary_hints:
  required:
  - голова (head, f)
  - горло (throat, n)
  - живіт (stomach, m)
  - рука (hand/arm, f)
  - нога (leg/foot, f)
  - болить (hurts — chunk: у мене болить)
  - лікар (doctor, m)
  - аптека (pharmacy, f)
  recommended:
  - спина (back, f)
  - око (eye, n)
  - вухо (ear, n)
  - зуб (tooth, m)
  - ніс (nose, m)
  - температура (fever/temperature, f)
  - кашель (cough, m)
  - нежить (runny nose, f)
  - таблетка (pill, f)
  - хворий (sick, adj)
