module: a1-053
level: A1
sequence: 53
slug: health
version: '1.2.2'
title: Здоров'я
subtitle: У мене болить голова — частини тіла та симптоми
focus: vocabulary
pedagogy: PPP
phase: A1.8 [Минуле, майбутнє, завершення]
word_target: 1200
objectives:
- Називати основні частини тіла українською (голова, рука, нога, живіт, горло, спина)
- Описувати симптоми, використовуючи фразу «У мене болить...»
- Пояснювати лікарю чи фармацевту, що болить
- Використовувати базову лексику про здоров'я у практичних ситуаціях
dialogue_situations:
- setting: 'На прийомі у лікаря — опис симптомів: У мене болить голова (f, head). Болить горло (n, throat). Болить живіт (m, stomach). Нежить (m, runny nose). Кашель (m, cough). Температура (f, fever).'
  speakers:
  - Пацієнт
  - Лікар
  motivation: 'Частини тіла: голова (f), горло (n), живіт (m), температура (f)'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — У лікаря: — Що у вас болить? — У мене болить голова і горло. — Давно? — З учора. І в мене температура. — Ви кашляєте? — Так, трохи. І в мене нежить. — Зрозуміло. Це застуда. Я випишу ліки. Відпочивайте! — Дякую, лікарю! Візит до лікаря: симптоми + базовий діагноз.'
  - 'Діалог 2 — В аптеці: — Добрий день! У мене болить голова. Дайте, будь ласка, таблетки. — Від головного болю? — Так. І від кашлю, будь ласка. — Ось, будь ласка. Ще щось? — А є щось від нежиті? — Так, ось краплі. — Дякую! Скільки це коштує? Аптека: як просити ліки, використовуючи знайомі ввічливі форми.'
- section: Тіло
  words: 300
  points:
  - 'Основні частини тіла (Підручники 1-2 класів: частини тіла): голова (head, f), горло (throat, n), спина (back, f), живіт (stomach, m), рука (hand/arm, f), нога (leg/foot, f), око (eye, n), вухо (ear, n), зуб (tooth, m), ніс (nose, m). Зверніть увагу: рука = вся рука разом із кистю. нога = вся нога разом зі стопою. Це найбільш вживані слова для A1 — не урок анатомії.'
  - 'Рід частин тіла важливий для прикметників (повторення з М09): велике око (big eye — середній рід), великий ніс (big nose — чоловічий рід), велика рука (big hand — жіночий рід). Але на рівні A1 зосередьтеся на розпізнаванні — ви будете вживати їх переважно зі словом «болить».'
- section: У мене болить...
  words: 300
  points:
  - 'Чарівна фраза: У мене болить + частина тіла. У мене болить голова. (I have a headache. — дослівно «у мене болить голова») У мене болить живіт. (My stomach hurts.) У мене болить горло. (My throat hurts.) У мене болить спина. (My back hurts.) У мене болить зуб. (I have a toothache.) Вивчіть це як фразу — не аналізуйте граматику (це буде давальний відмінок на рівні A2+).'
  - 'Поширені симптоми (як фрази): У мене температура. (I have a fever.) У мене кашель. (I have a cough.) У мене нежить. (I have a runny nose.) Мені холодно. (I''m cold.) Мені погано. (I feel bad.) Я хворий/хвора. (I''m sick. — чол./жін. рід) Зверніть увагу: «У мене болять зуби» (teeth hurt — множина болять). Просто запам''ятайте це.'
- section: Підсумок
  words: 300
  points:
  - 'Інструментарій здоров''я: Частини тіла: голова, горло, живіт, спина, рука, нога, око, вухо, зуб, ніс. Симптоми: У мене болить [частина тіла]. У мене температура/кашель/нежить. Стан: Я хворий/хвора. Мені погано. У лікаря: Що у вас болить? — У мене болить... В аптеці: Дайте таблетки від [симптом], будь ласка. від головного болю (for headache), від кашлю (for cough), від нежиті (for runny nose). Самоперевірка: Як сказати «My throat hurts and I have a fever»?'
vocabulary_hints:
  required:
  - голова (head, f)
  - горло (throat, n)
  - живіт (stomach, m)
  - рука (hand/arm, f)
  - нога (leg/foot, f)
  - болить (hurts — chunk: у мене болить)
  - лікар (doctor, m)
  - аптека (pharmacy, f)
  recommended:
  - спина (back, f)
  - око (eye, n)
  - вухо (ear, n)
  - зуб (tooth, m)
  - ніс (nose, m)
  - температура (fever/temperature, f)
  - кашель (cough, m)
  - нежить (runny nose, f)
  - таблетка (pill, f)
  - хворий (sick, adj)
activity_hints:
- type: match-up
  focus: Зіставте частини тіла з їх англійським перекладом.
  items:
  - голова == head
  - живіт == stomach
  - горло == throat
  - спина == back
  - рука == hand/arm
  - нога == leg/foot
  - зуб == tooth
  - око == eye
- type: fill-in
  focus: Доповніть речення правильним симптомом або частиною тіла.
  items:
  - У мене болить {голова|рука|нога}. Я хочу спати.
  - У мене болить {живіт|вухо|око}. Я не хочу їсти.
  - У мене болить {горло|спина|ніс} і є температура. Я не можу говорити.
  - У мене {кашель|нежить|зуб}, я постійно кашляю.
  - У мене болить {зуб|голова|нога}, мені потрібен стоматолог.
  - Я {хворий|лікар|аптека}. У мене болить голова і спина.
- type: quiz
  focus: Виберіть логічну відповідь на проблему зі здоров'ям.
  items:
  - question: У мене болить голова.
    options:
    - Ось таблетки від головного болю.
    - Ось краплі від нежиті.
    - Випийте сироп від кашлю.
  - question: У мене сильний кашель.
    options:
    - Вам потрібні таблетки від кашлю.
    - Ось краплі для носа.
    - У мене болить зуб.
  - question: Що у вас болить?
    options:
    - У мене болить горло.
    - Я лікар.
    - Де аптека?
  - question: Добрий день. Дайте, будь ласка, щось від нежиті.
    options:
    - Ось краплі, будь ласка.
    - У мене болить спина.
    - Це таблетки від головного болю.
- type: fill-in
  focus: В аптеці або у лікаря — використання цільових фраз.
  items:
  - Дайте, {будь ласка|добрий день|дякую}, таблетки від головного болю.
  - Що у вас {болить|хворий|лікар}?
  - У мене {температура|аптека|лікар} і болить горло.
  - Мені {погано|хворий|добре}. Викличте лікаря!
  - Де тут найближча {аптека|голова|спина}? Мені потрібні ліки.
connects_to:
- a1-054 (Надзвичайні ситуації)
prerequisites:
- a1-052 (Моя історія)
grammar:
- У мене болить + частина тіла (безособова конструкція — без граматичного аналізу)
- Рід частин тіла для узгодження прикметників (тільки для розпізнавання)
- Я хворий/хвора (узгодження за родом у коротких прикметниках)
register: розмовний
references:
- title: State Standard 2024, §3
  notes: 'Тематика: здоров''я — частини тіла, симптоми, візит до лікаря.'
- title: 'Підручник 1-2 класу: Частини тіла'
  notes: Лексика частин тіла з малюнками.