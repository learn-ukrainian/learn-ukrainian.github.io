module: a1-012
level: A1
sequence: 12
slug: this-and-that
version: '1.1.2'
title: Це і те
subtitle: Цей стіл, та книга — вказуємо на предмети
focus: grammar
pedagogy: PPP
phase: A1.2 [Мій світ]
word_target: 1200
objectives:
- Вживати займенники цей/ця/це та той/та/те з правильним узгодженням у роді
- Вказувати на предмети та називати їх, використовуючи вказівні займенники та іменники з модулів №8–10
- Поєднувати вказівні займенники з прикметниками та кольорами (цей великий червоний стіл)
- Розрізняти займенники цей (близько) та той (далеко)
dialogue_situations:
- setting: У магазині електроніки — порівняння телефонів, ноутбуків і навушників на різних полицях. Цей телефон (поруч) порівняно з той ноутбук (ген там). Ця камера порівняно з та. Це радіо порівняно з те.
  speakers:
  - Ірина
  - Консультант
  motivation: Займенники цей/ця/це та той/та/те зі словами телефон, камера, радіо
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Покупки (розширення кольорів із модуля №10 та цін із модуля №11): — Скільки коштує ця сумка? — Яка? Ця червона? — Ні, та синя. — Та коштує двісті гривень. — А цей рюкзак? — Цей — сто п''ятдесят. Вказівні займенники виникають природно: цей/ця = той, що тут, той/та = той, що там.'
  - 'Діалог 2 — У кімнаті (розширення модуля №8–9): — Що це? — Це мій стіл. — А те? — Те — крісло. — Цей стілець новий, а той — старий. Контраст близько/далеко з уже відомими предметами.'
- section: Цей, ця, це
  words: 300
  points:
  - 'Вказівні займенники мають таку саму модель узгодження в роді, як мій/моя/моє та який/яка/яке: Цей стіл. Ця книга. Це вікно. Заболотний, 6 клас, с. 210: вказівні займенники цей, той змінюються за родами. На рівні A1 ми вивчаємо лише називний відмінок — інші форми будуть пізніше.'
  - 'Поєднання з прикметниками та кольорами: Цей великий червоний стіл. Ця нова синя сумка. Це маленьке біле вікно. Порядок слів: вказівний займенник + прикметник(и) + іменник (як і в англійській!).'
- section: Той, та, те
  words: 300
  points:
  - 'Той/та/те = той, що далі, або згаданий раніше: Той стіл. Та книга. Те вікно. Контраст: Цей стілець новий, а той — старий. Застереження: слово "та" також означає сполучник (як і/й). Контекст робить це зрозумілим: мама та тато порівняно з та книга.'
  - 'Практичне використання — вказування та вибір: Який стіл? — Цей чи той? Яка сумка? — Ця червона чи та синя? Яке вікно? — Це велике чи те маленьке? Зверніть увагу: "Це" як вказівний займенник (це вікно) і "це" як "це є" (Це вікно). Контекст усе прояснює.'
- section: Підсумок
  words: 300
  points:
  - 'Таблиця узгодження в роді — всі моделі з A1.2 разом: | | ч | ж | с | | мій | моя | моє | | який | яка | яке | | цей | ця | це | | той | та | те | Ті самі закінчення, та сама логіка — українська мова послідовна! Самоперевірка: вкажіть на 3 речі поруч із вами (цей/ця/це), потім на 3 речі далеко (той/та/те).'
vocabulary_hints:
  required:
  - цей, ця, це (this — m/f/n)
  - той, та, те (that — m/f/n)
  - чи (or — in questions)
  recommended:
  - ось (here is, look — pointing word)
  - там (there)
  - тут (here)
  - він, вона, воно (review from модуль №8 — used for reference)
activity_hints:
- type: quiz
  focus: Цей, ця чи це? Виберіть правильний вказівний займенник для кожного іменника.
  items: 8
- type: fill-in
  focus: 'Доповніть: ___ книга нова, а ___ — стара. (ця/та)'
  items: 8
- type: match-up
  focus: З'єднайте цей/ця/це з мій/моя/моє та який/яка/яке — рід збігається!
  items: 6
- type: quiz
  focus: Той, та чи те? Вкажіть на предмет, що знаходиться далеко.
  items: 6
connects_to:
- a1-013 (Багато речей)
prerequisites:
- a1-009 (Яке воно?)
grammar:
- Вказівні займенники цей/ця/це та той/та/те — лише називний відмінок
- Модель узгодження в роді збігається із займенниками мій/який
- Порядок слів вказівний займенник + прикметник + іменник
- Займенник та порівняно зі сполучником та — розрізнення за контекстом
register: розмовний
references:
- title: Заболотний Grade 6, p.210
  notes: Вказівні займенники цей, той змінюються за родами, числами, відмінками.
- title: Літвінова Grade 6, p.273
  notes: Повна таблиця відмінювання займенника той — на рівні A1 використовуємо лише називний відмінок.