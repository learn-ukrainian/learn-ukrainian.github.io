module: a1-013
level: A1
sequence: 13
slug: this-and-that
version: '1.0'
title: This and That
subtitle: "Цей чи той? — Pointing and Choosing"
focus: grammar
pedagogy: PPP
phase: A1.2 [My World]
word_target: 1200
objectives:
- Use demonstrative pronouns (цей, ця, це, ці) for objects that are near
- Use demonstrative pronouns (той, та, те, ті) for objects that are far
- Contrast objects using a market/shopping scenario
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — At a market stall choosing items.
    — Добрий день. Скільки коштує цей рюкзак?
    — Цей синій рюкзак? Сорок гривень.
    — А той чорний рюкзак там?
    — Той коштує п'ятдесят гривень.
    — Дайте цей, будь ласка."
  - "Dialogue 2 — Pointing out things in a room.
    — Ця кімната дуже велика.
    — Так, а та кімната маленька.
    — Ці книги нові?
    — Ні, ті книги нові. А ці — старі."
- section: "Цей, Ця, Це, Ці (This / These - Near)"
  words: 350
  points:
  - "Demonstrative pronouns match the gender/number of the noun.
    Masculine: цей (цей стіл - this table here)
    Feminine: ця (ця книга - this book here)
    Neuter: це (це вікно - this window here. Note: distinguish 'Це вікно' - This window vs 'Це — вікно' - This is a window)
    Plural: ці (ці столи - these tables here)"
- section: "Той, Та, Те, Ті (That / Those - Far)"
  words: 350
  points:
  - "For objects further away:
    Masculine: той (той стіл - that table there)
    Feminine: та (та книга - that book there)
    Neuter: те (те вікно - that window there)
    Plural: ті (ті столи - those tables there)"
  - "Use 'тут' (here) with цей, and 'там' (there) with той to reinforce the concept."
vocabulary_hints:
  required:
  - цей, ця, це (this - m, f, n)
  - ці (these - pl)
  - той, та, те (that - m, f, n)
  - ті (those - pl)
  - тут (here)
  - там (there)
  - дайте (give me - formal/plural imperative chunk)
  - будь ласка (please)
activity_hints:
- type: matching
  focus: Match the correct demonstrative pronoun to the noun based on gender/number
  items: 12
- type: fill-in
  focus: "Fill in цей/той based on context clues like тут/там"
  items: 10
- type: multiple-choice
  focus: Differentiate between 'Це' (This is) and 'Цей/Ця/Це' (This [noun])
  items: 8
connects_to:
- a1-014 (Checkpoint - My World)
prerequisites:
- a1-008, a1-009, a1-011
grammar:
- "Demonstrative pronouns: цей/ця/це/ці"
- "Demonstrative pronouns: той/та/те/ті"
- "Agreement in Nominative case"
register: розмовний
