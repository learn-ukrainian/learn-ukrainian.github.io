title: Це і те
subtitle: Цей стіл, та книга — вказуємо на предмети
focus: grammar
pedagogy: PPP
phase: A1.2 [Мій світ]
word_target: 1200
objectives:
- Вживати займенники цей/ця/це та той/та/те з правильним узгодженням у роді
- Вказувати на предмети та називати їх, використовуючи вказівні займенники та іменники з модулів №8–10
- Поєднувати вказівні займенники з прикметниками та кольорами (цей великий червоний стіл)
- Розрізняти займенники цей (близько) та той (далеко)
- Свідомо уникати типових L2-помилок у вживанні вказівних — copula-drop (`Це стіл`, не `Це є стіл`), узгодження роду і відмінка (`цю книгу`, не `цей книгу`), омонімія `та` займ./спол. (перелік через `і`, не `та`); 5-пунктна діагностична міні-вправа дзеркалить wiki «Типові помилки L2»
dialogue_situations:
- setting: >-
    У магазині електроніки — порівняння телефонів, ноутбуків і навушників
    на різних полицях. Учитель показує пари: `цей телефон` (поруч) ↔
    `той ноутбук` (ген там), `ця камера` ↔ `та камера`, `це радіо` ↔
    `те радіо`. Протиставлення «близько–далеко» дає природній контекст
    для вказівних `цей/ця/це ↔ той/та/те` у називному відмінку (без
    непрямих відмінків після прийменника `з` — для них див. Крок 5 wiki).
  speakers:
  - Ірина
  - Консультант
  motivation: Займенники цей/ця/це та той/та/те зі словами телефон, камера, радіо
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Покупки (розширення кольорів із модуля №10 та цін із модуля №11): — Скільки коштує ця сумка? — Яка? Ця червона? — Ні, та синя. — Та коштує двісті гривень. — А цей рюкзак? — Цей — сто п''ятдесят. Вказівні займенники виникають природно: цей/ця = той, що тут, той/та = той, що там.'
  - 'Діалог 2 — У кімнаті (розширення модуля №8–9): — Що це? — Це мій стіл. — А те? — Те — крісло. — Цей стілець новий, а той — старий. Контраст близько/далеко з уже відомими предметами.'
- section: Цей, ця, це
  words: 300
  points:
  - 'Вказівні займенники мають таку саму модель узгодження в роді, як мій/моя/моє та який/яка/яке: Цей стіл. Ця книга. Це вікно. Заболотний, 6 клас, с. 210: вказівні займенники цей, той змінюються за родами. На рівні A1 ми вивчаємо лише називний відмінок — інші форми будуть пізніше.'
  - 'Поєднання з прикметниками та кольорами: Цей великий червоний стіл. Ця нова синя сумка. Це маленьке біле вікно. Порядок слів: вказівний займенник + прикметник(и) + іменник (як і в англійській!).'
- section: Той, та, те
  words: 300
  points:
  - 'Той/та/те = той, що далі, або згаданий раніше: Той стіл. Та книга. Те вікно. Контраст: Цей стілець новий, а той — старий. Застереження: слово "та" також означає сполучник (як і/й). Контекст розрізняє: у «мама та тато» — `та` = сполучник «і/й»; у «та книга» — `та` = вказівний займенник ж.р. Детальніше про двозначність і стилістичний вибір `і` замість другого `та` у переліку див. wiki «Типові помилки L2» row 5.'
  - 'Практичне використання — вказування та вибір: Який стіл? — Цей чи той? Яка сумка? — Ця червона чи та синя? Яке вікно? — Це велике чи те маленьке? Зверніть увагу: "Це" як вказівний займенник (це вікно) і "це" як "це є" (Це вікно). Контекст усе прояснює.'
- section: Підсумок
  words: 300
  points:
  - 'Таблиця узгодження в роді — всі моделі з A1.2 разом: | | ч | ж | с | | мій | моя | моє | | який | яка | яке | | цей | ця | це | | той | та | те | Ті самі закінчення, та сама логіка — українська мова послідовна! Самоперевірка: вкажіть на 3 речі поруч із вами (цей/ця/це), потім на 3 речі далеко (той/та/те).'
vocabulary_hints:
  required:
  - цей, ця, це (this — m/f/n)
  - ці (these — plural, all genders)
  - той, та, те (that — m/f/n)
  - ті (those — plural, all genders)
  - чи (or — in questions)
  recommended:
  - ось (here is, look — pointing word)
  - там (there)
  - тут (here)
  - він, вона, воно (review from модуль №8 — used for reference)
  - оцей, оця, оце (this — emphatic "саме цей"; passive recognition at A1, VESUM-verified)
  - отой, ота, ото (that — emphatic "отой, далі"; passive recognition at A1, VESUM-verified)
# NOTE: `даний` is intentionally NOT in vocabulary_hints. Wiki Декол. #5
# frames `даний` as kancelyarism (СУМ-11 primary sense: "given, provided")
# overused as "this" under рос. `данный` influence. A1 normative = `цей`.
activity_hints:
- type: quiz
  focus: Цей, ця чи це? Виберіть правильний вказівний займенник для кожного іменника.
  items: 8
- type: fill-in
  focus: 'Доповніть: ___ книга нова, а ___ — стара. (ця/та)'
  items: 8
- type: match-up
  focus: З'єднайте цей/ця/це з мій/моя/моє та який/яка/яке — рід збігається!
  items: 6
- type: quiz
  focus: Той, та чи те? Вкажіть на предмет, що знаходиться далеко.
  items: 6
- type: quiz
  focus: >-
    L2-помилки — впізнати та виправити. Дзеркалить п'ять рядків wiki
    «Типові помилки L2» + Приклад 5 один-до-одного (AC-3 drift check).
    Активно відпрацьовуємо перші два (copula-drop + agreement); рядки 3-5
    — пасивні pointer-drill (позначити тип помилки). Усі правильні відповіді
    перевірено у VESUM.
  items:
  - question: 'Copula-drop. Знайти помилку: «Це є цікава книга.»'
    options:
    - 'Це є цікава книга.'
    - 'Це цікава книга.'
    - 'Це цікаве книга.'
    answer: 'Це цікава книга.'
  - question: 'Agreement Зн. в. ж.р. Знайти помилку: «Я хочу купити цей сумку.»'
    options:
    - 'Я хочу купити цей сумку.'
    - 'Я хочу купити цю сумку.'
    - 'Я хочу купити це сумку.'
    answer: 'Я хочу купити цю сумку.'
  - question: >-
      Gender-flip — cross-reference до `things-have-gender`. Знайти помилку:
      «Ця біль у спині сильна.»
    options:
    - 'Ця біль у спині сильна.'
    - 'Цей біль у спині сильний.'
    - 'Це біль у спині сильне.'
    answer: 'Цей біль у спині сильний.'
  - question: 'Code-switching. Знайти помилку: «Что это? — Это стіл.»'
    options:
    - 'Что это? — Это стіл.'
    - 'Що це? — Це стіл.'
    - 'Що этот? — Этот стіл.'
    answer: 'Що це? — Це стіл.'
  - question: >-
      Омонімія `та` (займ. ж.р. vs спол. і/й) — стилістична двозначність,
      НЕ граматична помилка. Виберіть ОДНОЗНАЧНИЙ варіант (такий, що
      допускає лише одне прочитання):
    options:
    - 'У кімнаті є та книга та ручка.'
    - 'У кімнаті є та книга і ручка.'
    - 'У кімнаті є ця книга ця ручка.'
    answer: 'У кімнаті є та книга і ручка.'
connects_to:
- a1-013 (Багато речей)
prerequisites:
- a1-009 (Яке воно?)
grammar:
- Вказівні займенники цей/ця/це та той/та/те — лише називний відмінок
- Модель узгодження в роді збігається із займенниками мій/який
- Порядок слів вказівний займенник + прикметник + іменник
- Займенник та порівняно зі сполучником та — розрізнення за контекстом
- >-
  Вказівний узгоджується з іменником не лише в роді, але й у відмінку
  (чанк `цю книгу` = Зн. в. ж.р.; `цього олівця` = Р. в. ч.р., факультативно
  в Кроці 5 wiki). На A1 подавати саме як фіксовані чанки для пасивного
  впізнання, не як повну парадигму відмінювання — дзеркалить wiki «Типові
  помилки L2» row 2 (agreement failure) та чанк-політику в писарській
  примітці після словникового мінімуму.
register: розмовний
references:
- title: Заболотний Grade 6, p.210
  notes: Вказівні займенники цей, той змінюються за родами, числами, відмінками.
- title: Літвінова Grade 6, p.273
  notes: Повна таблиця відмінювання займенника той — на рівні A1 використовуємо лише називний відмінок.
- title: 'Wiki: pedagogy/a1/this-and-that (LOCKED 2026-04-24)'
  notes: >-
    Authoritative pedagogical brief — see the five-step sequence (Крок 1-5),
    the Словниковий мінімум table (25 entries, VESUM-cited), the new «Типові
    помилки L2» table (5 rows: copula-drop / agreement / gender-flip
    cross-ref / code-switching / омонімія `та`), the decolonization points
    (#4 emphatic `оцей-ряд` / `отой-ряд` — питомо Ukrainian; #5 `цей` over
    `даний` as register choice), the chunk-writer-note pinning `цей стіл /
    ця книга / це вікно / той будинок / та вулиця / те дерево / цю книгу /
    цього олівця` as indivisible chunks, and Приклад 5 (L2-errors drill
    one-to-one with activity_hints[5] items). The writer-note block
    enumerates four NOT-to-teach items (повна парадигма, `той-` root
    alternation, тверда/м'яка adjective group, multi-case plural) — do
    NOT introduce these at A1.
