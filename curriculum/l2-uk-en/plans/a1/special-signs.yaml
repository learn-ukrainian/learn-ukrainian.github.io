grammar:
- 'Йотовані літери як передумова: `я`, `ю`, `є` після приголосного без апострофа зазвичай пом''якшують його; після апострофа читаються роздільно'
- '`Ї` завжди позначає `[йі]`; м''який знак перед нею не ставиться'
- 'М''який знак (`ь`) не має звука й пом''якшує попередній приголосний'
- 'Для автора: повний набір приголосних для `ь` - `д, т, з, с, ц, л, н, р, дз`; для учня на A1 достатньо високочастотних моделей `день`, `кінь`, `сіль`, `вчитель`'
- 'Базова A1-модель апострофа: після `б`, `п`, `в`, `м`, `ф`, `р` перед `я`, `ю`, `є`, `ї`'
- 'Контраст `буряк` / `бур''ян` / `свято` як три окремі сценарії: м''якість без апострофа / апостроф / збіг приголосних без апострофа'
- 'Перенос: `ь` та апостроф не відриваються від попередньої літери; одну букву не залишаємо окремо'
register: розмовний
references:
- title: Захарійчук, 1 клас (НУШ 2025), стор. 97
  notes: 'Базове правило апострофа: після б, п, в, м, ф, р перед я, ю, є, ї.'
- title: Авраменко, 5 клас, стор. 75
  notes: 'М''який знак як показник м''якості приголосного; шкільне узагальнення про набір приголосних.'
- title: Большакова, 2 клас, стор. 58-59
  notes: 'Апостроф і перенос слів: моделі `Мар''-яна`, `дере-в''яний`, `бур''-ян`.'
