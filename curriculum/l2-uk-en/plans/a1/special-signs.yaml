title: Особливі знаки
subtitle: Ь, апостроф і три ключові контрасти - день, сім'я, буряк/бур'ян
focus: phonetics
pedagogy: PPP
phase: A1.1 [Звуки, літери та перший контакт]
word_target: 1200
objectives:
- Розуміти, як `я`, `ю`, `є`, `ї` працюють як передумова для м'якого знака й апострофа
- Читати й писати базові слова з м'яким знаком (`день`, `кінь`, `сіль`, `вчитель`)
- Читати й писати базові слова з апострофом (`сім'я`, `м'ясо`, `п'ять`, `комп'ютер`)
- Розрізняти три сценарії - м'якість без апострофа (`буряк`), апостроф (`бур'ян`) і зону без апострофа після збігу приголосних (`свято`, `цвях`)
- Користуватися готовими моделями переносу (`Мар'-яна`, `дере-в'яний`, `бур'-ян`, `паль-ці`)
- Впізнавати й виправляти типові L2-помилки - пропуск апострофа, механічне вставляння апострофа, пропуск `ь`, механічне `льожка`
content_outline:
- section: Йотовані голосні як передумова
  words: 250
  points:
  - 'Почати з короткого повторення: `я`, `ю`, `є` після приголосного без апострофа зазвичай пом''якшують його, а після апострофа читаються роздільно. `Ї` завжди дає `[йі]`. Без цього контрасту `ь` та апостроф зависають у повітрі як дві окремі "дивні букви".'
  - 'Показати найраніший набір слів-моделей: `буряк`, `люди`, `свято` проти `м''ята`, `сім''я`, `п''ять`. На цьому етапі не вчимо нове велике правило - лише ставимо слуховий маяк: "тут звук м''якшає", "тут чути `[й]`".'
- section: М'який знак
  words: 250
  points:
  - 'М''який знак не має власного звука. Він лише змінює попередній приголосний. Основні A1-слова: `день`, `кінь`, `сіль`, `вчитель`, `маленький`, `сьогодні`.'
  - 'Для контрасту дати 2-3 короткі пари: `стан` - `стань`, `лан` - `лань`, `рис` - `рись`. Саме такі пари показують, що `ь` не "читається", але без нього слово звучить і виглядає інакше.'
  - 'Авторова примітка: коротка шкільна мнемоніка `Де ти з''їси ці лини?` корисна лише як опора для ядра вправ; у повному орфографічному наборі для `ь` автор пам''ятає `д, т, з, с, ц, л, н, р, дз`, але не перевантажує цим учня на першому проході.'
- section: Апостроф
  words: 250
  points:
  - 'Базова A1-модель: апостроф після `б`, `п`, `в`, `м`, `ф`, `р` перед `я`, `ю`, `є`, `ї`. Перші слова: `сім''я`, `м''ясо`, `п''ять`, `дев''ять`, `ім''я`, `комп''ютер`.'
  - 'Найважливіше пояснення - апостроф не робить попередній звук м''яким, а навпаки не дає його пом''якшити: `м''я` = твердий `м` + `[йа]`. Саме це треба почути вголос і повторити кілька разів.'
  - 'Префіксний апостроф (`під''їзд`, `з''їзд`) згадуємо лише як пізнішу тему; не робимо з нього продуктивне правило цього модуля.'
- section: Контраст і типові помилки L2
  words: 250
  points:
  - 'Центральний контраст модуля: `буряк` проти `бур''ян`. У першому слові `р` м''який і немає апострофа; у другому - апостроф утримує `р` твердим і після нього чути `[йа]`.'
  - 'Окремо дати "зону без апострофа": `свято`, `цвях`, `морквяний`. Тут апостроф не пишеться, хоча учень може чекати його механічно. Це готові приклади, а не правило для виведення з нуля.'
  - 'Усі activity_hints цього блоку повинні дзеркалити wiki "Типові помилки L2": пропуск апострофа (`сімя`), механічний апостроф (`св''ято`), пропуск `ь` (`ден`), механічне `льожка`.'
- section: Перенос і підсумок
  words: 200
  points:
  - 'Закріпити, що `ь` та апостроф тримаються попередньої літери при переносі: `Мар''-яна`, `дере-в''яний`, `бур''-ян`, `паль-ці`. Додати правило: одну букву не залишаємо окремо і не переносимо саму.'
  - 'Самоперевірка: учень має вміти пояснити різницю між `день`, `сім''я`, `буряк`, `бур''ян`, `свято`; вставити знак у 4-5 словах; правильно поділити для переносу 2-3 приклади.'
vocabulary_hints:
  author_note: >-
    У цьому модулі слова подаються як орфографічні та фонетичні чанки,
    а не як матеріал для відмінювання чи словотвору. НЕ робіть
    продуктивним префіксне правило апострофа, НЕ перетворюйте
    `буряк/бур'ян/свято` на повний урок з фонології, НЕ виводьте нові
    "аналогії" поза списком нижче без перевірки у VESUM. Мета модуля -
    стабілізувати три контрасти: `день`, `сім'я`, `буряк/бур'ян`.
  required:
  - день (day) - soft sign after Н
  - кінь (horse) - soft sign after Н
  - сіль (salt) - soft sign after Л
  - вчитель (teacher) - soft sign in a common noun
  - сім'я (family) - apostrophe after М
  - м'ясо (meat) - apostrophe after М
  - п'ять (five) - apostrophe after П
  - комп'ютер (computer) - apostrophe in a common loanword
  - буряк (beetroot) - no apostrophe, soft Р before Я
  - бур'ян (weed) - apostrophe after Р
  - свято (holiday) - no apostrophe after consonant cluster
  - цвях (nail) - no apostrophe after consonant cluster
  recommended:
  - дев'ять (nine) - apostrophe after В
  - ім'я (name) - apostrophe after М
  - здоров'я (health) - apostrophe after В
  - маленький (small) - soft sign in a high-frequency adjective
  - сьогодні (today) - soft sign in a frequent adverb
  - Мар'яна (given name) - transfer model `Мар'-яна`
  - дерев'яний (wooden) - transfer model `дере-в'яний`
  - ложка (spoon) - counterexample against mechanical `льожка`
activity_hints:
- type: fill-in
  focus: 'Додай `ь` або апостроф: сім_я, ден_, п_ять, комп_ютер, бур_ян, мален_кий'
  items: 6
- type: group-sort
  focus: 'Розподіли слова на три колонки: є `ь` / є апостроф / немає знака'
  items: 12
- type: match-up
  focus: 'З''єднай слово з поясненням контрасту: `буряк` = м''якість без апострофа, `бур''ян` = апостроф, `свято` = збіг приголосних без апострофа, `цвях` = збіг приголосних без апострофа'
  items: 4
- type: error-correction
  focus: 'Типові помилки L2 - виправте написання: сімя, пят, свято з апострофом, ден, льожка'
  items: 6
- type: divide-words
  focus: 'Поділи слова для переносу: Мар''-яна, дере-в''яний, бур''-ян, паль-ці'
  items: 4
