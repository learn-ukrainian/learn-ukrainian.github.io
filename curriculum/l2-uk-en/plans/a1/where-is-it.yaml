grammar:
- 'Місцевий відмінок: в/у + М.в. (усередині), на + М.в. (на поверхні/події)'
- 'Метод допоміжних слів: М. (на, у) — на/у кому? на/у чому?'
- 'Базові закінчення місцевого відмінка: -і (найпоширеніше), -у (деякі іменники чоловічого роду)'
- В Україні (ніколи «на Україні»)
register: розмовний
references:
- title: Захарійчук Grade 4, p.74
  notes: 'Таблиця відмінків: М.в. = на/у кому? на/у чому?'
