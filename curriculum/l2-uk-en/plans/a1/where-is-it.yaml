module: a1-029
level: A1
sequence: 29
slug: where-is-it
version: 1.1.1
title: Де це?
subtitle: В школі, на роботі — місцевий відмінок
focus: grammar
pedagogy: PPP
phase: A1.5 [Місця]
word_target: 1200
objectives:
- Вміти використовувати прийменники в/у та на + місцевий відмінок для відповіді на запитання «Де?»
- Утворювати базові закінчення місцевого відмінка для знайомих іменників
- Розрізняти використання прийменника в (усередині) та на (на поверхні/події) з назвами місць
- 'Використовувати метод допоміжних слів за 4 клас: М. (на, у) — «на/у кому? на/у чому?»'
dialogue_situations:
- setting: 'Перший тиждень у новому місті — розпитуємо сусіда, де знайти такі місця: аптека (f), банк (m), пошта (f), кафе (n), лікарня (f), парк (m). В аптеці, на пошті, у банку.'
  speakers:
  - Новий мешканець
  - Сусід
  motivation: Прийменники в/на + місцевий відмінок зі словами аптека(f), банк(m), пошта(f), кафе(n)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Де всі? (за зразком ULP Ep17): — Де Олена? — Вона в школі. — А Тарас? — Він на роботі. — А діти? — Вони в парку. — А кішка? — Вона на дивані! Місцевий відмінок з''являється природно як відповідь на запитання «Де?».'
  - 'Діалог 2 — Опис місцезнаходження: — Де ти живеш? — Я живу в Києві, на вулиці Хрещатик. — А де ти працюєш? — В офісі, на другому поверсі. Локації: місто + вулиця + будівля.'
- section: Місцевий відмінок
  words: 300
  points:
  - 'Метод допоміжних слів для відмінків за 4 клас (Захарійчук 4 клас, с.74): М. = місцевий відмінок: на/у кому? на/у чому? Місцевий відмінок ЗАВЖДИ вживається з прийменником — в/у або на. В/у = усередині: в школі, у банку, в магазині, у лікарні. На = на поверхні/події: на роботі, на вулиці, на площі, на уроці.'
  - 'Базові закінчення місцевого відмінка (найпоширеніші моделі): Чоловічий рід: -і або -у — в парку, у банку, в офісі, на уроці. Жіночий рід: -і — в школі, на роботі, у лікарні, на вулиці. Середній рід: -і — в місті, на морі. Зверніть увагу: закінчення залежать від відміни іменника — наразі запам''ятовуйте поширені місця як сталі фрази.'
- section: В чи на?
  words: 300
  points:
  - 'Загальне правило: В/у = закриті простори: в школі, в магазині, у банку, в лікарні, в кафе. На = відкриті простори, поверхні, події: на вулиці, на площі, на роботі, на концерті. Деякі варіанти є традиційними: на пошті (а не «в пошті»), на вокзалі (а не «в вокзалі»). Вивчайте кожне місце разом із його прийменником.'
  - 'Правило щодо країн і міст: В/у + країна/місто: в Україні, у Києві, у Львові, в Одесі. На + деякі винятки: на Хрещатику. Пам''ятайте: НІКОЛИ не кажіть «на Україні» — це ЗАВЖДИ «в Україні». Це не просто граматика — це питання поваги та суверенітету.'
- section: Підсумок
  words: 300
  points:
  - 'Місцевий відмінок = де щось ЗНАХОДИТЬСЯ (статичне розташування). Де? → в/у + місцевий відмінок (усередині) або на + місцевий відмінок (на поверхні/події). Допоміжне слово: М. (на, у) — на/у кому? на/у чому? Поширені місця: в школі, на роботі, у банку, в парку, на вулиці. Самоперевірка: Де ви зараз? Де ви працюєте? Де ви живете?'
vocabulary_hints:
  required:
  - школа → в школі (school)
  - робота → на роботі (work)
  - банк → у банку (bank)
  - магазин → у/в магазині (shop)
  - вулиця → на вулиці (street)
  - місто → у/в місті (city)
  recommended:
  - парк → у/в парку (park)
  - лікарня → у/в лікарні (hospital)
  - кафе → у/в кафе (café — indeclinable)
  - площа → на площі (square)
  - вокзал → на вокзалі (train station)
  - пошта → на пошті (post office)
activity_hints:
- type: quiz
  focus: «В» чи «на»? Оберіть правильний прийменник для кожного місця.
  items: 10
- type: fill-in
  focus: 'Дайте відповідь на запитання «Де?»: Олена ___ (школа). Тарас ___ (робота).'
  items: 8
- type: match-up
  focus: 'З''єднайте називний і місцевий відмінки: школа ↔ в школі'
  items: 8
- type: quiz
  focus: Де це? Оберіть правильну форму місцевого відмінка.
  items: 6
