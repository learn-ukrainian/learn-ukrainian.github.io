grammar:
- 'Locative case: в/у + М.в. (inside), на + М.в. (on/at)'
- 'Helper word method: М. (на, у) — на/у кому? на/у чому?'
- 'Basic locative endings: -і (most common), -у (masculine some)'
- В Україні (never на Україні)
