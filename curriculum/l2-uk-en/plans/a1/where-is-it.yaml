module: a1-029
level: A1
sequence: 29
slug: where-is-it
version: '1.1'
title: Where Is It?
subtitle: В школі, на роботі — the locative case
focus: grammar
pedagogy: PPP
phase: A1.5 [Places]
word_target: 1200
objectives:
- Use в/у and на + locative to answer Де? (Where?)
- Form basic locative endings for familiar nouns
- Distinguish в (inside) from на (on/at) with place vocabulary
- Use the Grade 4 helper word method: М. (на, у) — "на/у кому? на/у чому?"
content_outline:
- section: Діалоги (Dialogues)
  words: 300
  points:
  - 'Dialogue 1 — Where is everyone? (ULP Ep17 pattern): — Де Олена? — Вона в школі. — А Тарас? — Він на роботі. — А діти?
    — Вони в парку. — А кішка? — Вона на дивані! Locative case emerges naturally from answering ''Де?'''
  - 'Dialogue 2 — Describing locations: — Де ти живеш? — Я живу в Києві, на вулиці Хрещатик. — А де ти працюєш? — В офісі,
    на другому поверсі. City + street + building locations.'
- section: Місцевий відмінок (The Locative Case)
  words: 300
  points:
  - 'Grade 4 case system: helper word method (Захарійчук Gr4 p.74): М. = місцевий відмінок: на/у кому? на/у чому? The locative
    ALWAYS needs a preposition — в/у or на. В/у = inside: в школі, у банку, в магазині, у лікарні. На = on/at: на роботі,
    на вулиці, на площі, на уроці.'
  - 'Basic locative endings (most common patterns): Masculine: -і or -у — в парку, у банку, в офісі, на уроці. Feminine: -і
    — в школі, на роботі, у лікарні, на вулиці. Neuter: -і — в місті, на морі. Note: endings depend on the noun''s declension
    — learn the common places as fixed phrases for now.'
- section: В чи на? (В or На?)
  words: 300
  points:
  - 'General guide: В/у = enclosed spaces: в школі, в магазині, у банку, в лікарні, в кафе. На = open spaces, surfaces, events:
    на вулиці, на площі, на роботі, на концерті. Some are conventional: на пошті (not в пошті), на вокзалі (not в вокзалі).
    Learn each place with its preposition — like English ''at school'' vs ''in the office''.'
  - 'Country/city rule: В/у + country/city: в Україні, у Києві, у Львові, в Одесі. На + some special cases: на Хрещатику (on
    Khreshchatyk street). Remember: NEVER ''на Україні'' — it''s ЗАВЖДИ ''в Україні''. This is not just grammar — it''s a
    matter of respect and sovereignty.'
- section: Підсумок — Summary
  words: 300
  points:
  - 'Locative case = where something IS (static location). Де? → в/у + locative (inside) or на + locative (on/at). Helper
    word: М. (на, у) — на/у кому? на/у чому? Common places: в школі, на роботі, у банку, в парку, на вулиці. Self-check: Where
    are you right now? Where do you work? Where do you live?'
vocabulary_hints:
  required:
  - школа → в школі (school)
  - робота → на роботі (work)
  - банк → у банку (bank)
  - магазин → у/в магазині (shop)
  - вулиця → на вулиці (street)
  - місто → у/в місті (city)
  recommended:
  - парк → у/в парку (park)
  - лікарня → у/в лікарні (hospital)
  - кафе → у/в кафе (café — indeclinable)
  - площа → на площі (square)
  - вокзал → на вокзалі (train station)
  - пошта → на пошті (post office)
