module: a1-27
level: A1
sequence: 27
slug: colors-and-clothing
version: '2.0'
title: Colors & Clothing
subtitle: Describing What You Wear
content_outline:
- section: Warm-up
  points:
  - 'Кольори навколо нас — cultural context: color symbolism (red=life/energy, black=soil/wisdom,
    white=purity/divinity)'
  - Улюблені кольори
- section: Presentation
  points:
  - Основні кольори (білий, чорний, червоний, синій, зелений, жовтий)
  - 'Узгодження з родом (червоний светр, червона сукня) — learner error: using masculine
    form for all nouns (e.g., червоний сорочка)'
  - Незмінювані кольори (бордо, беж, хакі)
- section: Presentation 2
  points:
  - 'Одяг (сорочка, штани, плаття, куртка, светр) — collocations: біла сорочка, червона
    сукня'
  - 'Дієслово носити + знахідний (Я ношу джинси) — learner error: failing to change
    feminine endings in Accusative (e.g., ''Я ношу червона сукня''); note: inanimate
    masculine matches nominative (Я ношу светр)'
  - Дієслово одягати/одягатися
- section: Presentation 3
  points:
  - 'Штани, джинси, окуляри (тільки множина!) — learner error: using singular adjectives
    (e.g., синій штани)'
  - Ці штани (не ця штана)
- section: Presentation 4
  points:
  - 'Опис того, що хтось носить — cultural hook: Vyshyvanka as a talisman (оберіг)
    protecting the wearer; patterns on collar/cuffs ''seal'' energy'
  - Покупка одягу в магазині — include price and size inquiries to link back to numbers
- section: Practice
  points:
  - Діалог у магазині одягу
  - Діалог про стиль друга
- section: Practice 2
  points:
  - Опис свого улюбленого вбрання
vocabulary_hints:
  required:
  - 'білий (white) — біла сорочка, білий сніг; cultural: symbol of purity/divinity'
  - 'чорний (black) — чорні штани, чорна кава; cultural: symbol of fertile soil/wisdom'
  - 'червоний (red) — червона сукня, червона ручка; cultural: symbol of energy/life/protection'
  - синій (blue) — сині джинси, синій светр
  - зелений (green) — зелена трава, зелений колір
  - сорочка (shirt) — біла сорочка, носити сорочку
  - штани (pants) — plural-only (pluralia tantum); нові штани, сині штани
  - 'плаття (dress) — synonym: сукня; літнє плаття; червона сукня'
  - сукня (dress) — high frequency synonym for плаття; червона сукня, літня сукня
  recommended:
  - жовтий (yellow)
  - коричневий (brown)
  - куртка (jacket)
  - светр (sweater) — синій светр
  - взуття (footwear)
  - носити (to wear) — носити одяг, носити окуляри; requires Accusative case (Я ношу...)
  - окуляри (glasses) — plural-only; носити окуляри
activity_hints:
- type: match-up
  focus: Color and clothing names
  items: 30
- type: match-up
  focus: Match colors to items
  items: 20
- type: fill-in
  focus: Describe outfits in pictures
  items: 10
- type: fill-in
  focus: Shopping for clothes
  items: 6
focus: vocabulary
pedagogy: PPP
prerequisites:
- a1-26 (Describing Things - Adjectives)
connects_to:
- a1-28 (Description - Adverbs)
- a1-30 (Checkpoint Consolidation)
objectives:
- Learner can name basic colors in Ukrainian
- Learner can use color adjectives with correct gender agreement
- Learner can describe clothing items
- Learner can describe what someone is wearing
grammar:
- Color adjectives with agreement
- Clothing vocabulary
- Носити (to wear) + accusative
register: розмовний
phase: A1.3 [Consolidation]
persona:
  voice: Patient Supportive Tutor
  role: Vyshyvanka Designer
word_target: 2000
