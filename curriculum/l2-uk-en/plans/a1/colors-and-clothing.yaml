module: a1-27
level: A1
sequence: 27
slug: colors-and-clothing
version: '2.0'
title: Colors & Clothing
subtitle: Describing What You Wear
content_outline:
- section: Вступ та культурний контекст (Introduction & Cultural Context)
  words: 400
  points:
  - 'Символізм кольорів в українській традиції: червоний як колір життя та любові,
    чорний як символ родючої землі та мудрості, білий як знак чистоти. Пов''язання
    з фольклорними образами (червона калина, чорний хліб).'
  - 'Вишиванка як оберіг (talisman): функція вишивки на комірі та манжетах як захисного
    кола, що охороняє власника. Концепція ''закриття'' енергетичних зон через візерунок.'
- section: Презентація кольорів та граматика узгодження (Colors & Grammar of Agreement)
  words: 500
  points:
  - 'Презентація основних кольорів згідно з Державним стандартом (§4.2.1.2): білий,
    чорний, червоний, синій, зелений, жовтий.'
  - 'Узгодження прикметників з іменниками в роді: детальне відпрацювання закінчень
    (-ий/-а/-е). Виправлення типової помилки ''червоний сорочка'' через контрастні
    пари: червоний светр (M) vs червона сорочка (F).'
  - Незмінювані кольори-запозичення (бордо, беж, хакі) — пояснення відсутності закінчень
    незалежно від роду іменника.
- section: Одяг та дієслово «носити» (Clothing & the Verb 'To Wear')
  words: 600
  points:
  - 'Лексика теми ''Одяг'': сорочка, штани, сукня, куртка, светр. Стилістична різниця
    між синонімами: ''сукня'' (елегантний/офіційний варіант) та ''плаття'' (загальна
    назва).'
  - 'Граматика: вживання дієслова ''носити'' зі Знахідним відмінком (Accusative).
    Сфокусована практика на жіночому роді: виправлення помилки ''Я ношу червона сукня''
    на правильне ''Я ношу червону сукню'' (закінчення -у/-ю).'
  - 'Особливості Pluralia Tantum: штани, джинси, окуляри. Запобігання помилкам узгодження
    в однині (''цей штани'' -> ''ці штани''); використання займенника ''одні'' замість
    ''один''.'
- section: Практичне застосування та покупки (Practice & Shopping)
  words: 500
  points:
  - 'Ситуативний діалог ''У магазині одягу'': запит розміру, ціни (повторення числівників)
    та примірка. Використання конструкцій ''Мені подобається цей колір'' та ''Ці штани
    мені підходять''.'
  - 'Опис гардероба: створення зв''язного тексту про свій улюблений стиль або опис
    одягу іншої людини, інтегруючи кольори, предмети одягу та правильні відмінкові
    форми.'
vocabulary_hints:
  required:
  - білий (white) — біла сорочка, білий сніг, білий світ; частотне (High Core A1);
    символ чистоти та божественного світу
  - чорний (black) — чорні штани, чорна кава, чорний хліб; символ родючої землі та
    мудрості
  - червоний (red) — червона сукня, червона ручка, червона калина; символ життя, любові
    та енергії
  - синій (blue) — сині джинси, синій светр; частотне вживання для повсякденного одягу
  - зелений (green) — зелена трава, зелений колір
  - сорочка (shirt) — вишита сорочка, біла сорочка, одягати сорочку; частотне (High
    Core A1); основа традиційного вбрання
  - штани (pants) — нові штани, джинсові штани; plural-only (pluralia tantum); завжди
    вживається в множині
  - сукня (dress) — вечірня сукня, нова сукня; частотний та стилістично вишуканий
    синонім до 'плаття'
  - носити (to wear) — носити одяг, носити окуляри; частотне (Verb High); вимагає
    Знахідного відмінка (Accusative)
  recommended:
  - плаття (dress) — розмовний синонім до 'сукня'; літнє плаття
  - жовтий (yellow) — жовте сонце, жовтий лимон
  - куртка (jacket) — тепла куртка, осіння куртка
  - светр (sweater) — вовняний светр, синій светр
  - окуляри (glasses) — носити окуляри; plural-only
  - джинси (jeans) — сині джинси; plural-only; відмінюється як 'штани'
  - одягати (to put on) — одягати куртку, одягати дитину; дія в моменті
