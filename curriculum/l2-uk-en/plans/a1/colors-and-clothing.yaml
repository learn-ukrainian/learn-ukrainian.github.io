module: a1-010
level: A1
sequence: 10
slug: colors-and-clothing
version: '1.0'
title: Colors & Clothing
subtitle: "Getting Dressed — Applying Adjectives"
focus: vocabulary
pedagogy: PPP
phase: A1.2 [My World]
word_target: 1200
objectives:
- Name primary colors in Ukrainian
- Name basic clothing items
- Combine colors (as adjectives) with clothing vocabulary, matching gender
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Packing a suitcase.
    — Де моя біла футболка?
    — Вона там. А де мій синій светр?
    — Твій синій светр тут.
    Applying colors directly to clothing items."
  - "Dialogue 2 — Getting dressed for the day.
    — Це гарна чорна куртка.
    — Дякую! Це моя нова куртка.
    — А це мій червоний шарф.
    Conversing about clothes and colors."
- section: "Кольори (Colors)"
  words: 250
  points:
  - "Teach the main colors as adjectives (Nominative case):
    білий (white), чорний (black), червоний (red), синій (blue - dark), блакитний (blue - light), зелений (green), жовтий (yellow), сірий (grey)."
  - "Note the soft stem for синій (синій, синя, синє) vs hard stem for others (білий, біла, біле)."
- section: "Одяг (Clothing)"
  words: 250
  points:
  - "Basic clothing vocabulary with their genders:
    светр (sweater - m), шарф (scarf - m)
    футболка (t-shirt - f), куртка (jacket - f), шапка (hat - f)
    пальто (coat - n), взуття (shoes/footwear - n)"
- section: "Поєднання кольору і одягу (Combining Color and Clothing)"
  words: 200
  points:
  - "Practice the adjective-noun agreement learned in M09 with the new color vocabulary.
    біла футболка, чорний светр, червона куртка, зелене пальто."
vocabulary_hints:
  required:
  - колір (color)
  - білий (white)
  - чорний (black)
  - червоний (red)
  - синій (dark blue)
  - зелений (green)
  - жовтий (yellow)
  - одяг (clothing)
  - футболка (t-shirt)
  - светр (sweater)
  - куртка (jacket)
  - шапка (hat)
  - пальто (coat)
  recommended:
  - блакитний (light blue)
  - сірий (grey)
  - шарф (scarf)
  - взуття (footwear)
activity_hints:
- type: matching
  focus: Match the color adjective to the correctly gendered clothing item
  items: 12
- type: fill-in
  focus: Fill in the missing color ending (Це чорн__ футболка)
  items: 10
- type: multiple-choice
  focus: Choose the correct clothing item based on a short description
  items: 8
connects_to:
- a1-011 (Many Things - Plurals)
prerequisites:
- a1-009 (Describing Things - for adjective agreement)
grammar:
- "Adjective agreement continued (Colors)"
- "Soft stem adjectives (синій)"
register: розмовний
references:
- title: "ULP 1-25: Colors in Ukrainian + Pronunciation Trainer"
  url: https://www.ukrainianlessons.com/episode25/
  notes: "Follows Anna's introduction of colors. Pay attention to the rolled R pronunciation practice."
- title: "Anna Ohoiko Pronunciation Playlist"
