module: a1-035
level: A1
sequence: 35
slug: around-the-city
version: '1.0'
title: Around The City
subtitle: "Giving directions to a tourist"
focus: vocabulary
pedagogy: PPP
phase: A1.5 [Places & Movement]
word_target: 1200
objectives:
- Give and follow basic directions in a city (left, right, straight)
- Combine the three location questions: де, куди, звідки
- Synthesize Locative, Accusative (direction), and Genitive (origin) in practical scenarios
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - "Dialogue-first: A tourist asking a local for directions. 'Вибачте, де метро?' (Excuse me, where is the metro?). 'Ідіть прямо, потім наліво.' (Go straight, then left)."
  - "Explaining routes: 'Цей автобус їде з центру на вокзал.' (This bus goes from the center to the train station)."
- section: "Навігація: Прямо, Наліво, Направо (Navigation: Straight, Left, Right)"
  words: 300
  points:
  - "Adverbs for directions: прямо (straight), наліво / ліворуч (left), направо / праворуч (right), назад (back)."
  - "Using the imperative 'Ідіть...' (Go...) for giving directions: Ідіть прямо (Go straight)."
  - "Locations relative to the speaker: близько (near), далеко (far)."
- section: "Синтез: Де? Куди? Звідки? (Synthesis: Where? Whereto? Where from?)"
  words: 300
  points:
  - "The core grammar review of the phase. Contrast the three concepts."
  - "Де? (Location/Locative): Я в банку. Банк на вулиці."
  - "Куди? (Direction/Accusative): Я йду в банк. Я їду на вулицю."
  - "Звідки? (Origin/Genitive): Я йду з банку. Я їду з вулиці."
  - "Show how they flow together: Я їду з дому (Звідки?) на роботу (Куди?). Моя робота в центрі (Де?)."
- section: "Практика: Як доїхати? (Practice: How to get there?)"
  words: 200
  points:
  - "Phrases for asking the way: Як доїхати до центру? (How to get to the center? - noting 'до' + Genitive as an alternative to Accusative direction, but keep it light)."
  - "Putting it all into a coherent map-reading exercise narrative."
vocabulary_hints:
  required:
  - пря́мо (straight)
  - налі́во / лівóруч (left)
  - напрáво / правóруч (right)
  - назáд (back)
  - бли́зько (near)
  - далекó (far)
  - як дої́хати...? (how to get to...?)
  recommended:
  - ви́бачте (excuse me)
  - іді́ть (go - imperative formal/plural)
activity_hints:
- type: fill-in
  focus: Choose the correct question word (де/куди/звідки) for the given answer
  items: 12
- type: match-up
  focus: Match direction words with their opposites (left <-> right, near <-> far)
  items: 8
connects_to:
- a1-036 (Checkpoint: Places)
prerequisites:
- a1-034 (Where Are You From?)
grammar:
- Synthesis of Де (Locative), Куди (Accusative), Звідки (Genitive)
- Imperative for directions (Ідіть)
register: розмовний
references:
- title: "Ukrainian Lessons Podcast - Ep 18: Directions"
  url: "https://www.ukrainianlessons.com/episode18/"
  notes: "Focus on combining the spatial cases into a unified mental model for the learner."