module: a1-15
level: A1
sequence: 15
slug: around-the-city
version: '2.0'
title: Around the City
subtitle: Navigating Urban Spaces with Confidence
content_outline:
- section: 'Вступ: Міський простір (Introduction: Urban Space)'
  words: 400
  points:
  - 'Орієнтація в центрі: Розрізнення понять «Майдан» та «Площа»; Майдан як серце
    міста та соціальний хаб, Площа як загальна назва (напр., Майдан Незалежності vs
    Площа Ринок).'
  - 'Запитання про дорогу: Контраст між пошуком об''єкта «Де знаходиться...?» (Location)
    та маршрутом «Як дістатися до...?» (Direction) згідно зі State Standard §4.2.3.2/3.'
- section: 'Презентація: Граматика та напрямки (Presentation: Grammar and Directions)'
  words: 600
  points:
  - 'Інфраструктура та Місцевий відмінок (§4.2.3.3): Використання прийменників «на»
    (зупинці, пошті, площі) та «в» (аптеці); робота над типовою помилкою «в площі»
    та «в зупинці».'
  - 'Словник напрямків: «Прямо», «наліво/направо» та їхні формальні відповідники «ліворуч/праворуч»,
    які часто зустрічаються на офіційних вказівниках.'
  - 'Концепція «Де» vs «Куди»: Диференціація статичного перебування (Locative) та
    руху до цілі (Accusative §4.2.3.2.2); виправлення помилки «Де ти йдеш?» на коректне
    «Куди ти йдеш?».'
  - 'Прийменники-блоки з Родовим відмінком: «Біля» та «Навпроти» як лексичні чанки
    (біля аптеки, навпроти пошти); запобігання помилці вживання Називного відмінка
    («біля аптека»).'
- section: 'Практика: Орієнтування за мапою (Practice: Navigating by Map)'
  words: 600
  points:
  - 'Навігація за орієнтирами: Практика пояснення дороги через впізнавані будівлі
    (landmarks) замість сторін світу, що є домінуючим стилем в українській комунікації.'
  - 'Дріл на відмінки та питання: Вправи на заповнення пропусків «Де?» (Locative)
    vs «Куди?» (Accusative) у контексті діалогу з перехожим на вулиці.'
  - 'Корекція типових помилок: Спеціальні завдання на вибір правильного прийменника
    (в/на) для різних типів міських локацій (аптека vs пошта).'
- section: 'Культура та Продакшн: Життя в місті (Culture and Production: City Life)'
  words: 400
  points:
  - 'Етикет Маршрутки: Культурний аспект — фраза «На зупинці, будь ласка!» як необхідність
    привернути увагу водія; обговорення відсутності автоматичних зупинок.'
  - 'Рольова гра «Загублений турист»: Використання вивчених орієнтирів та напрямків
    для пояснення дороги до власного дому; акцент на «Де знаходиться?» vs «Як дістатися?».'
vocabulary_hints:
  required:
  - прямо (straight) — йти прямо, їхати прямо; висока частотність.
  - 'наліво (left) — розмовний регістр; синонім: ліворуч.'
  - 'направо (right) — розмовний регістр; синонім: праворуч.'
  - 'вулиця (street) — на вулиці (Locative); помилка: «в вулиці»; колокація: переходити
    вулицю.'
  - 'зупинка (stop) — на зупинці (Locative); культурний контекст: прохання водія зупинитися.'
  - аптека (pharmacy) — в аптеці; висока частотність (Top 100 nouns).
  - пошта (post office) — на пошті (Locative).
  - 'площа (square) — на площі; типова помилка: «в площі».'
  - Куди (where to) — питання напрямку руху (§4.2.3.2.2); контраст із «Де» (Location).
  recommended:
  - біля (near) — + Родовий відмінок (біля аптеки); вчити як фіксований лексичний
    блок.
  - навпроти (opposite) — + Родовий відмінок (навпроти парку).
  - ліворуч (left) — формальний синонім до «наліво»; часто використовується на знаках.
  - праворуч (right) — формальний синонім до «направо»; часто використовується на
    знаках.
  - Майдан (square/hub) — центральна площа міста; культурний акцент на Майдан Незалежності.
  - станція (station) — на станції (метро або вокзал).
  - перехрестя (intersection) — на перехресті (Locative).
  - світлофор (traffic light) — на світлофорі (Locative).
