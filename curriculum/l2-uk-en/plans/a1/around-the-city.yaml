module: a1-033
level: A1
sequence: 33
slug: around-the-city
version: '1.0'
title: Around the City
subtitle: "Де/куди + directions — navigating in Ukrainian"
focus: communication
pedagogy: PPP
phase: A1.5 [Places]
word_target: 1200
objectives:
- Combine Де? (locative) and Куди? (accusative) in real navigation
- Give and follow simple directions
- Describe your neighborhood and daily routes
- Synthesize M28-M32 skills in connected urban communication
content_outline:
- section: "Діалоги (Dialogues)"
  words: 300
  points:
  - "Dialogue 1 — Asking for directions:
    — Вибачте, як дістатися до бібліотеки?
    — Ідіть прямо, потім направо. Бібліотека на розі.
    — А музей? — Музей далеко. Їдьте на метро до центру.
    Combines directions + transport + city places."
  - "Dialogue 2 — Describing your route:
    — Як ти дістаєшся на роботу?
    — Спочатку йду на зупинку. Потім їду автобусом до центру.
    — А потім? — Потім іду пішки п'ять хвилин. Робота в офісі на площі.
    Daily route using sequence words + transport + places."
- section: "Де і куди разом (Where and Where To Together)"
  words: 300
  points:
  - "Real navigation uses both cases together:
    Я зараз у парку (де? — locative). Я йду в магазин (куди? — accusative).
    Магазин на вулиці Шевченка (де? — locative). Потім їду на роботу (куди? — accusative).
    The constant switch between де? and куди? is natural Ukrainian."
  - "Preposition patterns (synthesis):
    | Situation | Question | Form |
    | Static | Де ти? | в/на + locative |
    | Direction | Куди йдеш? | в/на + accusative |
    | By transport | Як? Чим? | автобусом / на метро |
    | Distance | Далеко? | далеко / близько / пішки |"
- section: "Мій район (My Neighborhood)"
  words: 300
  points:
  - "Describing where you live:
    Я живу на вулиці Франка. Біля мого дому є парк і магазин.
    Школа далеко — треба їхати автобусом.
    Аптека близько, можна піти пішки.
    У моєму районі є кафе, ресторан і бібліотека."
  - "Useful phrases for city life:
    пішки (on foot), хвилина (minute) — П'ять хвилин пішки.
    далеко/близько від (far/near from — chunk).
    У центрі міста / на околиці (in the center / on the outskirts)."
- section: "Підсумок — Summary"
  words: 300
  points:
  - "Urban communication toolkit:
    Asking: Де...? Як дістатися до...?
    Directions: прямо, направо, наліво.
    Location: в/на + locative, в/на + accusative.
    Transport: автобусом, на метро, пішки.
    Self-check: Describe your route from home to work/school."
vocabulary_hints:
  required:
  - пішки (on foot)
  - хвилина (minute, f)
  - район (neighborhood, m)
  - центр (center, m)
  - вибачте (excuse me)
  recommended:
  - дістатися (to get to)
  - ідіть (go! — imperative, preview)
  - їдьте (go by transport! — imperative, preview)
  - поруч (nearby)
  - навпроти (opposite)
  - між (between)
