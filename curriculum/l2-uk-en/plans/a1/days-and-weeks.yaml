module: a1-023
level: A1
sequence: 23
slug: days-and-weeks
version: '1.0'
title: Days and Weeks
subtitle: "Planning a Busy Week"
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Time & Nature]
word_target: 1200
objectives:
- Name the days of the week in Ukrainian
- Say what happens on a specific day using "у/в" + day
- Plan a weekly schedule
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Planning the week.
    — Що ти робиш у понеділок?
    — У понеділок я працюю. А у вівторок я читаю книгу.
    — Добре, а в середу?"
  - "Dialogue 2 — Weekend plans.
    — Ти працюєш у суботу?
    — Ні, у суботу і в неділю я відпочиваю.
    — Клас! Я теж."
- section: "Дні тижня (Days of the week)"
  words: 350
  points:
  - "Introduce the 7 days of the week: понеділок, вівторок, середа, четвер, п'ятниця, субота, неділя."
  - "Note the genders (m: понеділок, вівторок, четвер; f: середа, п'ятниця, субота, неділя)."
  - "Provide tips for remembering them based on Slavic roots (e.g., середа = middle, п'ятниця = 5th)."
- section: "Коли? (When? — Days as Chunks)"
  words: 350
  points:
  - "Teach how to say 'on Monday', 'on Tuesday', etc., as vocabulary chunks."
  - "У понеділок, у вівторок, у середу (note the 'у' ending), у четвер, у п'ятницю (note the 'ю'), у суботу (note the 'у'), у неділю (note the 'ю')."
  - "Explain that this is the accusative case for days, but present it strictly as fixed phrases to memorize."
vocabulary_hints:
  required:
  - понеділок (Monday)
  - вівторок (Tuesday)
  - середа (Wednesday)
  - четвер (Thursday)
  - п'ятниця (Friday)
  - субота (Saturday)
  - неділя (Sunday)
  - у понеділок (on Monday)
  - у середу (on Wednesday)
  - у п'ятницю (on Friday)
  - у суботу (on Saturday)
  - у неділю (on Sunday)
  recommended:
  - тиждень (week)
  - вихідні (weekend)
  - на вихідних (on the weekend)
activity_hints:
- type: ordering
  focus: Order the days of the week correctly
  items: 7
- type: fill-in
  focus: Provide the correct form of the day with the preposition (у/в)
  items: 12
- type: reading-comprehension
  focus: Read a weekly planner and answer true/false questions
  items: 8
connects_to:
- a1-024 (Months and Seasons)
prerequisites:
- a1-022 (What Time Is It?)
grammar:
- "Days of the week"
- "Accusative expressions of time (у понеділок, у середу)"
register: розмовний
references:
- title: "ULP Ep15: Days of the week and months"
  url: "https://www.ukrainianlessons.com/episode15/"
  notes: "Follows Anna's introduction of days. Pay attention to the pronunciation trainer for soft consonants."