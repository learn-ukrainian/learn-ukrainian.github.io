module: a1-051
level: A1
sequence: 51
slug: what-happened-past
version: '1.0'
title: What Happened Past
subtitle: Past tense basics
focus: grammar
pedagogy: PPP
phase: A1.8 [Past, Future & Graduation]
word_target: 1200
objectives:
- Form the past tense for verbs
- Understand that past tense agrees with gender (masculine, feminine, neuter, plural)
- Talk about simple past actions
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Couple talking. ''Що ти робив? Я читав. А ти що робила?'''
  - 'Dialogue 2: Friends talking about the weekend. ''Ми гуляли і відпочивали.'''
- section: Минулий час (Past Tense)
  words: 400
  points:
  - 'Rule: Drop -ти from infinitive. Add -в (masc), -ла (fem), -ло (neuter), -ли (plural).'
  - 'Example (читати): він читав, вона читала, воно читало, вони/ми/ви читали.'
- section: Бути в минулому (To be in the past)
  words: 400
  points:
  - 'The verb ''бути'' (to be) in the past: був, була, було, були.'
  - Using 'був/була' to say 'I was at [location]' (Я був вдома, вона була на роботі).
vocabulary_hints:
  required:
  - був
  - була
  - було
  - були
  - робив
  - читав
  - працював
  - гуляв
  - вчора
  recommended:
  - раніше
  - минулого року
  - на вихідних
activity_hints:
- type: conjugation
  focus: Conjugate verbs in the past tense based on gender
  items: 15
- type: fill-in
  focus: Complete sentences using був, була, було, були
  items: 8
connects_to:
- a1-052 (Yesterday)
prerequisites:
- a1-016 (Daily Verbs Group 1)
grammar:
- Past tense formation
- Past tense gender agreement
register: розмовний
references: []
