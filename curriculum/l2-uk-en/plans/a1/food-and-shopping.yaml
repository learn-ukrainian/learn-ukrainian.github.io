module: a1-18
level: A1
sequence: 18
slug: food-and-shopping
version: '2.0'
title: Food, Drinks & Shopping
subtitle: Practical Vocabulary for Market and Store
content_outline:
- section: Warm-up
  points:
  - 'Улюблена їжа та напої — State Standard alignment: Focus on Accusative for direct
    objects (e.g., I love pizza)'
  - Категорії продуктів
- section: Presentation
  points:
  - 'Овочі та фрукти (картопля, морква, яблуко, банан) — learner error: Nominative
    overuse (forgetting -а/-я to -у/-ю change in Accusative)'
  - М'ясо та риба (курка, свинина, риба)
  - Молочні продукти (молоко, сир, масло, йогурт)
  - Напої (вода, сік, кава, чай)
  - 'Хлібобулочні вироби (хліб, булка, батон) — cultural hook: Bread is sacred in
    Ukraine; ''Palianytsia'' as a shibboleth/symbol of identity'
  - 'Одиниці виміру (кілограм, літр, пляшка, пачка) — learner error: Missing Genitive
    after quantities (пляшка вода vs пляшка води); Number-case confusion (2-4 vs 5+)'
- section: Practice
  points:
  - 'Складання списку покупок — content note: Use visual shopping lists for authenticity'
  - Діалоги в магазині — State Standard §4.2.3.2.1 (Accusative object) and §4.2.3.2.2
    (Genitive quantity)
- section: Cultural Insight
  points:
  - 'Українська кухня та традиції харчування — cultural hook: Hospitality tradition
    of ''хліб-сіль'' (bread and salt)'
vocabulary_hints:
  required:
  - хліб (bread) — свіжий хліб, купити хліб, батон хліба; sacred cultural symbol
  - молоко (milk) — купувати молоко, пакет молока, склянка молока
  - яблуко (apple) — кілограм яблук (Genitive plural form)
  - м'ясо (meat) — свіже м'ясо
  - кава (coffee) — чорна кава, чашка кави, пити каву
  - вода (water) — питна вода, пляшка води, пити воду
  - кілограм (kilogram) — один кілограм яблук, два кілограми (Nominative plural with
    2-4)
  - пляшка (bottle) — пляшка води (requires Genitive noun after)
  recommended:
  - 'картопля (potato) — learner error: often mistaken in Accusative (картоплю)'
  - помідор (tomato)
  - курка (chicken)
  - сир (cheese)
  - яйце (egg)
  - цукор (sugar)
activity_hints:
- type: match-up
  focus: Food and drink names
  items: 30
- type: match-up
  focus: Sort food by type
  items: 20
- type: fill-in
  focus: Shopping conversations
  items: 8
- type: fill-in
  focus: Complete with quantities
  items: 15
focus: vocabulary
pedagogy: PPP
prerequisites:
- a1-17 (Numbers and Money)
connects_to:
- a1-19 (At the Café)
- a1-37 (At the Market)
objectives:
- Learner can order food items using accusative case
- Learner can request quantities using genitive case
- Learner can ask prices and make purchases
- Learner can distinguish between food and drink categories
grammar:
- Accusative for direct objects (review)
- Genitive for quantities
- Price expressions
register: розмовний
phase: A1.2 [Navigation]
persona:
  voice: Patient Supportive Tutor
  role: Personal Chef
word_target: 2000
