title: Речі мають рід
subtitle: він, вона, воно — кожен іменник має рід
focus: grammar
pedagogy: PPP
phase: A1.2 [Мій світ]
word_target: 1200
objectives:
- Визначати рід іменників за допомогою тесту він/вона/воно
- Розпізнавати рід за закінченнями слів (приголосний = ч, -а/-я = ж, -о/-е = с)
- Називати понад 20 поширених предметів із правильним родом
- Використовувати конструкцію "У мене є" з предметами (розширення теми родини з модуля модуль №6)
- Застосовувати український тест `він/вона/воно` до будь-якого іменника — зокрема там, де інтуїція з іншої мови могла б дати неправильну відповідь (діагностична міні-вправа з 5 пунктів; детальна таблиця у wiki «Типові помилки L2»)
- Використовувати фемінітив як основну форму професії для жінки (`вчителька`, `лікарка`)
dialogue_situations:
- setting: 'Вдома або під час відеодзвінка з демонстрацією кімнати. Учні вказують на повсякденні предмети та вживають із ними слова він/вона/воно: стіл, книга, вікно, лампа, ліжко, телефон, а також кілька знайомих домашніх улюбленців чи речей, як-от кіт та дзеркало.'
  speakers:
  - Марія
  - Оленка
  motivation: Займенники він/вона/воно з іменниками, що позначають кімнату та предмети побуту, такі як стіл, книга, вікно, лампа, ліжко, телефон, а також кілька знайомих живих істот, наприклад, кіт
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Відеодзвінок із демонстрацією кімнати: — Привіт! Дивись, це моя кімната. — Класно! У тебе є стіл? — Так, у мене є стіл і ліжко. Рід виникає природно через словосполучення мій стіл, моя кімната, моє ліжко.'
  - 'Діалог 2 — Що у твоїй сумці? — Що у тебе є? — У мене є книга, телефон і фото. — А у мене є ручка і зошит.'
- section: Він, вона, воно
  words: 300
  points:
  - 'Пономарова, 3 клас, с. 86: Українські іменники мають рід. Тест: чи можете ви замінити іменник на він, вона або воно? Чоловічий рід: стіл — він. Можна додати: мій стіл. Жіночий рід: книга — вона. Можна додати: моя книга. Середній рід: вікно — воно. Можна додати: моє вікно.'
  - 'Вашуленко, 3 клас, с. 112 — закінчення за родами: Чоловічий: зазвичай закінчується на приголосний — стіл, телефон, зошит. Жіночий: зазвичай закінчується на -а або -я — книга, лампа, кімната, ручка. Середній: зазвичай закінчується на -о або -е — вікно, ліжко, крісло, місто. Це охоплює ~90% іменників. Винятки (наприклад, слова на -ь) вивчатимуться пізніше.'
- section: Предмети навколо
  words: 300
  points:
  - 'Лексика кімнати, згрупована за родами: Чоловічий: стіл, стілець, телефон, комп''ютер, зошит, ключ. Жіночий: книга, лампа, сумка, ручка, кімната, стіна. Середній: вікно, ліжко, крісло, дзеркало, фото.'
  - 'Поширення конструкції "У мене є" з модуля модуль №6 (родина) на предмети: У мене є стіл. У мене є книга. У мене є вікно. Та сама модель, нова лексика.'
- section: Підсумок
  words: 300
  points:
  - 'Визначення роду в 3 кроки: 1. Скажіть він/вона/воно з іменником — що підходить? 2. Перевірте закінчення — приголосний? -а/-я? -о/-е? 3. Використовуйте правильний присвійний займенник — мій/моя/моє. Самоперевірка: Якого роду слово "стіл"? Якого роду слово "книга"? А як щодо "вікно"? Скажіть українською, що у вас є стілець.'
  - 'УВАГА до автора: (а) на A1 подавати `мій стіл / моя ручка / моє вікно / велике яблуко / синє море` як неподільні чанки — НЕ пояснювати повну парадигму відмінювання прикметників, тверду/м''яку групу, узгодження у множині чи відмінювання присвійних займенників. (б) Діагностична gender-flip міні-вправа (activity_hints[4], 5 пунктів) — короткий фінальний дрил на 5 хвилин, що дзеркалить п''ять рядків wiki «Типові помилки L2». НЕ робити з неї окрему повноцінну лексичну тему: слова `біль`, `степ`, `розпис`, `літопис`, `путь` — діагностичні опори, не module vocab. (в) Для професій (`вчителька`, `лікарка`) використовувати фемінітив як основну форму, коли мова про жінку, — не «Вона — лікар».'
vocabulary_hints:
  required:
  - стіл (table, m)
  - книга (book, f)
  - вікно (window, n)
  - кімната (room, f)
  - ліжко (bed, n)
  - стілець (chair, m)
  - лампа (lamp, f)
  - телефон (phone, m)
  - комп'ютер (computer, m)
  - він, вона, воно (he, she, it — gender test words)
  recommended:
  - зошит (notebook, m)
  - ручка (pen, f)
  - сумка (bag, f)
  - крісло (armchair, n)
  - дзеркало (mirror, n)
  - ключ (key, m)
  - фото (photo, n)
  - стіна (wall, f)
  - вчителька / учителька (teacher, f — feminitive, VESUM-verified; mirror of вчитель / учитель m)
  - лікарка (doctor, f — feminitive, VESUM-verified; mirror of лікар m)
# NOTE: `біль`, `степ`, `розпис`, `літопис`, `путь` — NOT in vocabulary_hints.
# They are diagnostic props for the gender-flip quiz (activity_hints[4]),
# not A1 module vocab. Wiki "Типові помилки L2" carries the full table.
activity_hints:
- type: group-sort
  focus: Розподіліть предмети за родами (чоловічий/жіночий/середній)
  items: 12
- type: quiz
  focus: Він, вона чи воно? Виберіть для кожного іменника.
  items: 8
- type: fill-in
  focus: мій/моя/моє ___ (доберіть присвійний займенник до іменника)
  items: 8
- type: quiz
  focus: Який рід? Подивіться на закінчення.
  items: 6
- type: quiz
  focus: >-
    Gender-flip diagnostic — оберіть український займенник (він / вона / воно).
    Дзеркалить п'ять рядків wiki "Типові помилки L2" + Приклад 5 один-до-одного
    (AC-3 drift check). Усі правильні відповіді перевірено в VESUM.
  items:
  - question: Який у мене сильний ___ у плечі! (БІЛЬ)
    options: [він, вона, воно]
    answer: він
  - question: Український ___ широкий і вітряний. (СТЕП)
    options: [він, вона, воно]
    answer: він
  - question: Цей ___ на стіні — робота українського художника. (РОЗПИС)
    options: [він, вона, воно]
    answer: він
  - question: Давній ___ «Повість временних літ» розповідає про Київську Русь. (ЛІТОПИС)
    options: [він, вона, воно]
    answer: він
  - question: 'Книжне / урочисте: «У далеку ___» — форма ж.р. (ПУТЬ, зворотний напрям)'
    options: [він, вона, воно]
    answer: вона
