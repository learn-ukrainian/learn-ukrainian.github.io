grammar:
- 'Рід іменників: чоловічий (він, мій), жіночий (вона, моя), середній (воно, моє)'
- 'Визначення роду за закінченням: приголосний=ч, -а/-я=ж, -о/-е=с'
- 'Конструкція "У мене є", розширена на предмети (з теми родини у модулі №6)'
- 'Діагностичний принцип: український рід визначає VESUM-парадигма + тест він/вона/воно. П''ять показових пар (`біль`, `степ`, `розпис`, `літопис`, `путь`) у wiki «Типові помилки L2» + quiz №5 в activity_hints.'
- 'Фемінітиви як основна форма назви професії для жінки: вчителька, лікарка (НЕ «Вона — вчитель»)'
