module: a1-008
level: A1
sequence: 8
slug: things-have-gender
version: '1.1.2'
title: Речі мають рід
subtitle: він, вона, воно — кожен іменник має рід
focus: grammar
pedagogy: PPP
phase: A1.2 [Мій світ]
word_target: 1200
objectives:
- Визначати рід іменників за допомогою тесту він/вона/воно
- Розпізнавати рід за закінченнями слів (приголосний = ч, -а/-я = ж, -о/-е = с)
- Називати понад 20 поширених предметів із правильним родом
- Використовувати конструкцію "У мене є" з предметами (розширення теми родини з модуля M06)
dialogue_situations:
- setting: 'Вдома або під час відеодзвінка з демонстрацією кімнати. Учні вказують на повсякденні предмети та вживають із ними слова він/вона/воно: стіл, книга, вікно, лампа, ліжко, телефон, а також кілька знайомих домашніх улюбленців чи речей, як-от кіт та дзеркало.'
  speakers:
  - Марія
  - Оленка
  motivation: Займенники він/вона/воно з іменниками, що позначають кімнату та предмети побуту, такі як стіл, книга, вікно, лампа, ліжко, телефон, а також кілька знайомих живих істот, наприклад, кіт
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Відеодзвінок із демонстрацією кімнати: — Привіт! Дивись, це моя кімната. — Класно! У тебе є стіл? — Так, у мене є стіл і ліжко. Рід виникає природно через словосполучення мій стіл, моя кімната, моє ліжко.'
  - 'Діалог 2 — Що у твоїй сумці? — Що у тебе є? — У мене є книга, телефон і фото. — А у мене є ручка і зошит.'
- section: Він, вона, воно
  words: 300
  points:
  - 'Пономарова, 3 клас, с. 86: Українські іменники мають рід. Тест: чи можете ви замінити іменник на він, вона або воно? Чоловічий рід: стіл — він. Можна додати: мій стіл. Жіночий рід: книга — вона. Можна додати: моя книга. Середній рід: вікно — воно. Можна додати: моє вікно.'
  - 'Вашуленко, 3 клас, с. 112 — закінчення за родами: Чоловічий: зазвичай закінчується на приголосний — стіл, телефон, зошит. Жіночий: зазвичай закінчується на -а або -я — книга, лампа, кімната, ручка. Середній: зазвичай закінчується на -о або -е — вікно, ліжко, крісло, місто. Це охоплює ~90% іменників. Винятки (наприклад, слова на -ь) вивчатимуться пізніше.'
- section: Предмети навколо
  words: 300
  points:
  - 'Лексика кімнати, згрупована за родами: Чоловічий: стіл, стілець, телефон, комп''ютер, зошит, ключ. Жіночий: книга, лампа, сумка, ручка, кімната, стіна. Середній: вікно, ліжко, крісло, дзеркало, фото.'
  - 'Поширення конструкції "У мене є" з модуля M06 (родина) на предмети: У мене є стіл. У мене є книга. У мене є вікно. Та сама модель, нова лексика.'
- section: Підсумок
  words: 300
  points:
  - 'Визначення роду в 3 кроки: 1. Скажіть він/вона/воно з іменником — що підходить? 2. Перевірте закінчення — приголосний? -а/-я? -о/-е? 3. Використовуйте правильний присвійний займенник — мій/моя/моє. Самоперевірка: Якого роду слово "стіл"? Якого роду слово "книга"? А як щодо "вікно"? Скажіть українською, що у вас є стілець.'
vocabulary_hints:
  required:
  - стіл (table, m)
  - книга (book, f)
  - вікно (window, n)
  - кімната (room, f)
  - ліжко (bed, n)
  - стілець (chair, m)
  - лампа (lamp, f)
  - телефон (phone, m)
  - комп'ютер (computer, m)
  - він, вона, воно (he, she, it — gender test words)
  recommended:
  - зошит (notebook, m)
  - ручка (pen, f)
  - сумка (bag, f)
  - крісло (armchair, n)
  - дзеркало (mirror, n)
  - ключ (key, m)
  - фото (photo, n)
  - стіна (wall, f)
