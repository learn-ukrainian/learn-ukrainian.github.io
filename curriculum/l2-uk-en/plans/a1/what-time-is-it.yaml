module: a1-022
level: A1
sequence: 22
slug: what-time-is-it
version: '1.0'
title: What Time Is It?
subtitle: "Scheduling and Hours"
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Time & Nature]
word_target: 1200
objectives:
- Ask and tell the time on the hour
- Schedule a meeting using "О котрій?"
- Use time expressions as chunks (О першій, О другій)
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Meeting a friend.
    — Привіт! Котра година?
    — Зараз друга година.
    — Дякую!"
  - "Dialogue 2 — Scheduling a meeting.
    — О котрій ми зустрічаємося?
    — О третій годині.
    — Добре, до зустрічі о третій!"
- section: "Котра година? (What time is it?)"
  words: 350
  points:
  - "Learn to ask 'Котра година?' (What time is it? / What hour is it?)"
  - "Answer with 'Зараз...' + ordinal number for the hour (перша, друга, третя, четверта, п'ята... година)."
  - "Note: Ukrainians use ordinal numbers for hours (the first hour, the second hour)."
- section: "О котрій? (At what time?)"
  words: 350
  points:
  - "Learn to ask 'О котрій (годині)?' to schedule events."
  - "Teach the answers as chunks in the locative case without deep grammar explanation: о першій, о другій, о третій, о четвертій, о п'ятій."
  - "Practice scheduling simple actions using verbs from previous modules (працювати, читати, гуляти)."
vocabulary_hints:
  required:
  - котра година (what time is it)
  - зараз (now)
  - година (hour)
  - о котрій (at what time)
  - о першій (at one o'clock)
  - о другій (at two o'clock)
  - о третій (at three o'clock)
  - о четвертій (at four o'clock)
  - о п'ятій (at five o'clock)
  recommended:
  - зустріч (meeting)
  - зустрічатися (to meet)
activity_hints:
- type: matching
  focus: Match the clock time to the written phrase
  items: 12
- type: fill-in
  focus: Choose between 'Котра' and 'О котрій' based on context
  items: 10
- type: multiple-choice
  focus: Answer scheduling questions based on a short schedule
  items: 8
connects_to:
- a1-023 (Days and Weeks)
prerequisites:
- a1-013 (Numbers 1-10 - for base numbers)
- a1-020 (My Morning Routine - for verbs)
grammar:
- "Asking for time: Котра година?"
- "Scheduling time: О котрій? (chunks: о першій, о другій)"
register: розмовний
references:
- title: "ULP Ep9: At the market"
  url: "https://www.ukrainianlessons.com/episode9/"
  notes: "Reference for numbers used in practical contexts (prices/time)."