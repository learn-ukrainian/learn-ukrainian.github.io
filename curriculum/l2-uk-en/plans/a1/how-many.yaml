module: a1-011
level: A1
sequence: 11
slug: how-many
version: '1.2.2'
title: Скільки?
subtitle: Один, два, три — числа через ціни, вік та номери телефонів
focus: vocabulary
pedagogy: PPP
phase: A1.2 [Мій світ]
word_target: 1200
objectives:
- Рахувати від 1 до 100 українською
- Називати ціни, використовуючи слово «гривня» та круглі числа до 1000
- Називати вік за допомогою фрази «Мені ... років» (як завченої фрази — БЕЗ граматики відмінків)
- Читати та називати українські номери телефонів
dialogue_situations:
- setting: 'У пекарні — замовлення хліба, булочок та тістечок для сімейної зустрічі. Рахуємо: один хліб (m, bread), одна булочка (f, bun), одне тістечко (n, pastry). Ціни у гривнях. Запитання: Скільки коштує торт? А три булочки?'
  speakers:
  - Покупець
  - Пекар (baker)
  motivation: 'Скільки коштує? зі словами торт (m), булочка (f), тістечко (n), хліб (m)'
- setting: Рахуємо речі у шкільному рюкзаку перед уроком — ручка (f, pen), олівець (m, pencil), зошит (m, notebook), підручник (m, textbook).
  speakers:
  - Учень (student)
  - Мама
  motivation: 'Числа зі шкільним приладдям: один олівець, дві ручки, п''ять зошитів'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Біля ятки на ринку: — Скільки коштує сумка? — Двісті гривень. — А маленька? — Сто п''ятдесят. — Добре, дякую! Числа засвоюються через реальний контекст покупок. Використовується лише лексика з М08-М10 (рід, прикметники, кольори). Вказівні займенники (ця/та) з''являться у М12.'
  - 'Діалог 2 — Знайомство (розширення М05): — Скільки тобі років? — Мені двадцять п''ять. А тобі? — Мені тридцять два. А твоя сестра? — Їй вісімнадцять. Формула віку як фраза: Мені/тобі/їй + число + років/роки/рік.'
- section: Числа 1-20
  words: 300
  points:
  - '1-10: один, два, три, чотири, п''ять, шість, сім, вісім, дев''ять, десять. Фокус на вимові: п''ять (апостроф!), сім (не «сєм»), дев''ять (апостроф!). Практика: рахуємо предмети з М08 — один стіл, два стільці, три книги. Зверніть увагу: іменник змінюється після чисел, але ми вивчаємо шаблони як фрази, а не граматичне правило.'
  - '11-20: одинадцять, дванадцять, тринадцять, чотирнадцять, п''ятнадцять, шістнадцять, сімнадцять, вісімнадцять, дев''ятнадцять, двадцять. Шаблон: основа + -надцять (як англійське «-teen»). Зверніть увагу на наголос: одинáдцять, дванáдцять — наголос завжди падає на склад «на» в закінченні -надцять.'
- section: Десятки і сотні
  words: 300
  points:
  - 'Десятки: двадцять, тридцять, сорок (!), п''ятдесят, шістдесят, сімдесят, вісімдесят, дев''яносто (!), сто. Два винятки: сорок (40 — не «чотиридесят») і дев''яносто (90 — не «дев''ятдесят»). Комбіновані числа: двадцять один, тридцять п''ять, сорок сім — просто додаємо одиниці.'
  - 'Сотні для цін: сто (100), двісті (200), триста (300), чотириста (400), п''ятсот (500), тисяча (1000). Гривня: одна гривня, дві гривні, п''ять гривень. Ці зміни іменників є завченими шаблонами — граматика буде на рівні A2. ULP Ep9: Анна навчає числам через реальні ціни.'
- section: Підсумок
  words: 300
  points:
  - 'Три практичні способи використання чисел: 1. Ціни: Скільки коштує? — Двісті гривень. Сто п''ятдесят гривень. 2. Вік: Скільки тобі років? — Мені двадцять три (роки). 3. Телефон: Мій номер — нуль дев''яносто сім, три два один, сорок п''ять, шістдесят сім. Самоперевірка: Назвіть свій вік українською. Назвіть ціну (250 hryvnias). Прочитайте номер телефону.'
vocabulary_hints:
  required:
  - один, два, три, чотири, п'ять (1-5)
  - шість, сім, вісім, дев'ять, десять (6-10)
  - двадцять, тридцять, сорок (20, 30, 40)
  - сто, тисяча (100, 1000)
  - '...'
  - копійка (kopek)
  - номер (number — phone/room)
  - нуль (zero)
