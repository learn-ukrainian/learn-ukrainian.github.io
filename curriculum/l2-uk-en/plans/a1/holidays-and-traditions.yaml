module: a1-33
level: A1
sequence: 33
slug: holidays-and-traditions
version: '2.0'
title: Holidays & Traditions
subtitle: Свята і традиції
content_outline:
- section: Warm-up
  points:
  - 'Головні свята (Новий рік, Різдво, Великдень) — cultural hook: 12 страв на Святвечір
    (12 dishes on Christmas Eve), main dish is Kutia'
  - 'Чим відрізняються українські свята — cultural hook: «Щедрик» (Carol of the Bells)
    by Mykola Leontovych'
- section: Presentation
  points:
  - 'Конструкція "З + орудний" (З Новим роком!) — learner error: using З + Nominative
    (e.g., «З Новий рік»); pedagogy note: teach as frozen chunks (Standard §4)'
  - Дієслово вітати + зі святом — distinguish from «бажати» (process of congratulating
    vs expressing wishes)
  - 'Дієслово бажати + родовий (Бажаю щастя!) — learner error: using Accusative instead
    of Genitive (e.g., «Бажаю успіх»)'
- section: Presentation 2
  points:
  - 'Типові побажання (здоров''я, щастя, успіхів, любові) — pronunciation note: IPA
    for щастя /ˈʃtʃɑstʲɐ/ (complex sound) and здоров''я /zdɔˈrɔu̯jɐ/'
  - Відповіді на побажання (Взаємно! / Дякую!)
- section: Presentation 3
  points:
  - 'Питання про дату (Коли твій день народження?) — cross-ref: builds on a1-23'
  - Відповідь (П'ятого травня)
  - 'Святкування дня народження — cultural hook: «Тягнути за вуха» (pulling ears tradition)'
- section: Practice
  points:
  - Привітання з різними святами
  - 'Підписання листівки — practical focus: writing short greeting cards'
- section: Practice 2
  points:
  - Діалог про Новий рік
  - Діалог на дні народження
  - 'Обмін подарунками — collocation: дарувати подарунок'
- section: Practice 3
  points:
  - Написання привітання з днем народження
vocabulary_hints:
  required:
  - свято (holiday) — державне свято, велике свято
  - Новий рік (New Year)
  - Різдво (Christmas) — Різдво Христове, на Різдво
  - день народження (birthday) — вітати з днем народження
  - вітати (to congratulate) — вітати зі святом, вітати з днем народження
  - бажати (to wish) — бажати щастя, бажати успіху
  - подарунок (gift) — дарувати подарунок, гарний подарунок
  - святкувати (to celebrate)
  recommended:
  - Великдень (Easter)
  - 'щастя (happiness) — pronunciation note: /ˈʃtʃɑstʲɐ/ (no ''sh'' sound)'
  - 'здоров''я (health) — pronunciation note: /zdɔˈrɔu̯jɐ/'
  - успіх (success) — бажати успіху
  - торт (cake)
  - свічка (candle)
