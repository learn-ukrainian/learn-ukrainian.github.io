module: a1-33
level: A1
sequence: 33
slug: holidays-and-traditions
version: '2.0'
title: Holidays & Traditions
subtitle: Свята і традиції
content_outline:
- section: Вступ та культура (Introduction & Culture)
  words: 500
  points:
  - 'Огляд основних свят за Державним стандартом §3.12: державні та релігійні свята
    (Новий рік, Різдво, Великдень)'
  - 'Культурний аспект: Традиція 12 пісних страв на Святвечір та центральна роль Куті
    (Kutia)'
  - 'Культурний аспект: Історія всесвітньо відомого «Щедрика» Миколи Леонтовича як
    української обрядової пісні'
- section: 'Презентація: Вітання (Presentation: Greetings)'
  words: 500
  points:
  - 'Конструкція «З + орудний відмінок» як фіксована формула: З Новим роком!, З Різдвом!,
    Зі святом!'
  - 'Типова помилка: використання називного відмінка після «З» (напр., «З Новий рік»
    замість «З Новим роком»)'
  - 'Дієслово «вітати»: вживання з прийменником «з» (вітати з днем народження, вітати
    зі святом)'
  - 'Педагогічна порада: вивчення закінчень -ом/-ом як невід''ємної частини «святкового
    правопису» (лексикалізовані форми)'
- section: 'Презентація: Побажання (Presentation: Wishes)'
  words: 500
  points:
  - 'Конструкція «бажати + родовий відмінок» для абстрактних понять: бажати щастя,
    бажати успіху, бажати здоров''я'
  - 'Типова помилка: використання знахідного відмінка замість родового (напр., «Бажаю
    успіх» замість «Бажаю успіху»)'
  - 'Лексичне розмежування: різниця між «вітати» (процес привітання) та «бажати» (висловлення
    конкретних побажань)'
  - 'Фонетика: опрацювання складних звукосполучень у словах «щастя» /ˈʃtʃɑstʲɐ/ та
    «здоров''я» /zdɔˈrɔu̯jɐ/'
- section: Практика та дні народження (Practice & Birthdays)
  words: 500
  points:
  - 'Традиції святкування дня народження: питання про дату (на основі a1-23) та відповіді
    у родовому відмінку'
  - 'Культурний аспект: Традиція «тягнути за вуха» на день народження («щоб великий
    ріс»)'
  - 'Робота з лексикою: колоквіальні пари «дарувати подарунок» та «отримати подарунок»'
  - 'Продуктивне завдання: написання короткої вітальної листівки (Practical focus:
    greeting card writing)'
vocabulary_hints:
  required:
  - свято (holiday) — державне свято, релігійне свято, велике свято; high frequency
    (top 500)
  - Новий рік (New Year) — З Новим роком! (fixed formula)
  - Різдво (Christmas) — на Різдво, щасливого Різдва, Різдво Христове
  - день народження (birthday) — вітати з днем народження, Коли твій день народження?
  - вітати (to congratulate) — вітати зі святом; act of greeting (distinguish from
    бажати)
  - бажати (to wish) — бажати щастя, бажати успіху, бажати здоров'я; requires Genitive
    case
  - подарунок (gift) — дарувати подарунок, отримати подарунок (high frequency)
  - святкувати (to celebrate) — святкувати вдома, святкувати з родиною
  recommended:
  - Великдень (Easter) — на Великдень; high frequency seasonal term
  - 'щастя (happiness) — бажати щастя (Gen); pronunciation: /ˈʃtʃɑstʲɐ/'
  - 'здоров''я (health) — бажати здоров''я (Gen); pronunciation: /zdɔˈrɔu̯jɐ/'
  - успіх (success) — бажати успіху (Gen); common learner error point
  - торт (cake) — свічки на торті
  - свічка (candle) — задувати свічки
  - 'Кутя (Kutia) — cultural hook: traditional wheat berry pudding for Christmas Eve'
