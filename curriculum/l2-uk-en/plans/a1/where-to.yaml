module: a1-031
level: A1
sequence: 31
slug: where-to
version: 1.1.1
title: Куди?
subtitle: Іду в банк, на роботу — знахідний відмінок для позначення напрямку
focus: grammar
pedagogy: PPP
phase: A1.5 [Місця]
word_target: 1200
objectives:
- Вміти використовувати прийменники в/у та на + знахідний відмінок для відповіді на запитання «Куди?»
- Розрізняти запитання Де? (місцевий відмінок = статика) та Куди? (знахідний відмінок = напрямок)
- Утворювати базові закінчення знахідного відмінка для іменників, що позначають місце
- Розповідати про переміщення між локаціями за допомогою дієслів іти/їхати + напрямок
dialogue_situations:
- setting: 'Разом виконуємо суботні справи та розходимося: Я іду в банк (m), а ти — на пошту (f). Потім зустрінемося в кафе (n). А також: в аптеку, на зупинку, в бібліотеку.'
  speakers:
  - Оксана
  - Степан
  motivation: 'Запитання «Куди?» + знахідний відмінок: банк(m), пошта(f), кафе(n), аптека(f)'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Куди ти йдеш? (ULP Ep18): — Куди ти йдеш? — Я йду в банк. А ти? — Я йду на роботу. — А потім? — Потім іду в магазин. — А потім ходімо в кафе! Напрямок проти місцезнаходження: іду В банк (напрямок) проти я В банку (місцезнаходження).'
  - 'Діалог 2 — Планування поїздки: — Куди ти їдеш у суботу? — Я їду у Львів. — А Олена? — Вона їде в Одесу. Міста як пункти призначення: їхати в/у + місто.'
- section: Куди? Знахідний відмінок
  words: 300
  points:
  - 'Допоміжне слово для відмінка (за 4 клас): Зн. (бачу) — кого? що? Для напрямку: в/у + знахідний відмінок = КУДИ (рух у певному напрямку). Порівняйте з місцевим відмінком: в/у + місцевий відмінок = ДЕ (статична позиція). Де ти? — Я в банку. (місцевий відмінок — ви там ЗНАХОДИТЕСЯ). Куди ти йдеш? — Я йду в банк. (знахідний відмінок — ви туди ЙДЕТЕ).'
  - 'Закінчення знахідного відмінка для місць: Чоловічий рід (неістоти): = називний відмінок (без змін!): банк → в банк, магазин → у магазин, парк → у парк. Жіночий рід: -а/-я → -у/-ю: школа → у школу, робота → на роботу, бібліотека → у бібліотеку. Середній рід: = називний відмінок (без змін): кафе → у кафе, місто → у місто. Хороша новина: іменники чоловічого та середнього роду не змінюються! Змінюється лише жіночий рід.'
- section: Де чи куди?
  words: 300
  points:
  - 'Ключова пара запитань: Де ти? → в/у/на + МІСЦЕВИЙ ВІДМІНОК. Куди ти йдеш? → в/у/на + ЗНАХІДНИЙ ВІДМІНОК. | Місце | Де? (М.в.) | Куди? (Зн.в.) | | школа | в школі | у школу | | робота | на роботі | на роботу | | банк | у банку | у банк | | парк | у парку | у парк |'
  - 'Дієслова руху: іти (пішки): Я йду в магазин. їхати (транспортом): Я їду на вокзал. Зверніть увагу: іти = пішки, їхати = транспортом. Обидва вимагають конструкції в/на + знахідний відмінок.'
- section: Підсумок
  words: 300
  points:
  - 'Два запитання, два відмінки: Де? → місцевий відмінок (в школі, на роботі) = СТАТИКА. Куди? → знахідний відмінок (у школу, на роботу) = НАПРЯМОК. Знахідний відмінок для чоловічого/середнього роду = називний відмінок (без змін). Жіночий рід: -а→-у, -я→-ю (школа→школу, бібліотека→бібліотеку). Самоперевірка: Де ви зараз? (Де?) Куди ви йдете? (Куди?)'
vocabulary_hints:
  required:
  - куди (where to)
  - йти (to go on foot)
  - їхати (to go by transport)
  - школа → у школу (to school)
  - робота → на роботу (to work)
  - банк → у банк (to the bank)
  recommended:
  - магазин → у/в магазин (to the shop)
  - бібліотека → у бібліотеку (to the library)
  - ресторан → у ресторан (to the restaurant)
  - Одеса → в Одесу (to Odesa)
  - повертатися → додому (to return home)
activity_hints:
- type: quiz
  focus: Де чи Куди? Оберіть правильне запитання для кожного речення.
  items: 8
- type: fill-in
  focus: 'Доповніть речення: Я йду ___ (школа). Він у ___ (банк).'
  items: 10
- type: group-sort
  focus: 'Розподіліть фрази: Де? (місцевий відмінок) проти Куди? (знахідний відмінок)'
  items: 10
- type: quiz
  focus: Іти чи їхати? Оберіть правильне дієслово залежно від відстані/транспорту.
  items: 6
connects_to:
- a1-032 (Транспорт)
prerequisites:
