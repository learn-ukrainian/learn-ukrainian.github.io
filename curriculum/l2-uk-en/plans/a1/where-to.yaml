grammar:
- 'Знахідний відмінок для позначення напрямку: в/у/на + Зн.в.'
- Відмінність між Де? (М.в.) та Куди? (Зн.в.)
- 'Закінчення знахідного відмінка: ч.р./с.р. = називний відмінок, ж.р.: -а→-у, -я→-ю'
- 'Дієслова руху: іти (пішки) проти їхати (транспортом)'
register: розмовний
