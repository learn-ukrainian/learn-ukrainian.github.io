module: a1-024
level: A1
sequence: 24
slug: months-and-seasons
version: '1.0'
title: Months and Seasons
subtitle: "Birthdays and Holidays"
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Time & Nature]
word_target: 1200
objectives:
- Name the 12 months and 4 seasons
- Understand the Slavic origins of Ukrainian month names
- State when holidays or birthdays occur using the locative case for months
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Favorite seasons.
    — Яка твоя улюблена пора року?
    — Моя улюблена пора року — літо. А твоя?
    — Я люблю зиму."
  - "Dialogue 2 — Birthdays.
    — Коли твій день народження?
    — Мій день народження у травні.
    — О, а мій у жовтні!"
- section: "Пори року (Seasons)"
  words: 300
  points:
  - "Introduce the 4 seasons: весна, літо, осінь, зима."
  - "Teach how to say 'in spring', 'in summer', etc.: навесні, влітку, восени, взимку. Treat these as adverbs/chunks."
- section: "Місяці (Months)"
  words: 400
  points:
  - "Introduce the 12 months. Group them by season to help memorization."
  - "Provide a preview of ordinal/adjectival nature of months (they act like adjectives)."
  - "Explain the beautiful Slavic origins connected to nature (січень = cutting wood, квітень = flowers, травень = grass, листопад = falling leaves)."
  - "Teach the 'in + month' chunks (у січні, у лютому, у березні... у грудні). Note that they take the locative case (mostly -і ending, but лютий -> у лютому)."
vocabulary_hints:
  required:
  - зима (winter)
  - весна (spring)
  - літо (summer)
  - осінь (autumn)
  - взимку (in winter)
  - навесні (in spring)
  - влітку (in summer)
  - восени (in autumn)
  - січень (January)
  - лютий (February)
  - березень (March)
  - квітень (April)
  - травень (May)
  - червень (June)
  - липень (July)
  - серпень (August)
  - вересень (September)
  - жовтень (October)
  - листопад (November)
  - грудень (December)
  recommended:
  - пора року (season)
  - день народження (birthday)
  - свято (holiday)
activity_hints:
- type: matching
  focus: Match the month to its corresponding season
  items: 12
- type: fill-in
  focus: Fill in the correct chunk for 'in [Month]' (e.g., у травні)
  items: 10
- type: multiple-choice
  focus: Identify the correct season/month based on a description of weather/nature
  items: 8
connects_to:
- a1-025 (Weather and Nature)
prerequisites:
- a1-023 (Days and Weeks)
grammar:
- "Seasons and adverbs of time (взимку, влітку)"
- "Months and locative chunks (у січні, у лютому)"
- "Preview of ordinals"
register: розмовний
references:
- title: "ULP Ep15: Days of the week and months"
  url: "https://www.ukrainianlessons.com/episode15/"
  notes: "Reference for months. Focus on pronunciation of soft consonants in month names."