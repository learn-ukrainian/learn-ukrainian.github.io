  focus: 'Утвори наказовий спосіб: читати → читай / читайте, писати → пиши / пишіть'
  items: 10
- type: quiz
  focus: 'Обери правильний варіант: ___, будь ласка! (дай / даєш / дати)'
  items: 8
- type: group-sort
  focus: 'Розподіли: форми на "ти" та форми на "ви" (читай та читайте, дай та дайте)'
  items: 10
- type: fill-in
  focus: 'Доповни: Олено, ___ книжку! Пане Іване, ___ книжку! (дай/дайте)'
  items: 6
