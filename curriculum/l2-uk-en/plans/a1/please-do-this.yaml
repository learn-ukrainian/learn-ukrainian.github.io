module: a1-043
level: A1
sequence: 43
slug: please-do-this
version: '1.1.1'
title: Будь ласка, зроби це
subtitle: Читай! Скажіть! Дайте! — як просити людей щось зробити
focus: grammar
pedagogy: PPP
phase: A1.7 [Спілкування]
word_target: 1200
objectives:
- Навчитися утворювати наказовий спосіб для 2-ї особи однини (ти) та множини/ввічливої форми (ви)
- Вміти давати вказівки та висловлювати прохання, використовуючи "будь ласка"
- Розпізнавати поширені наказові форми в класі та повсякденному житті
- Розрізняти форми наказового способу для "ти" та "ви"
dialogue_situations:
- setting: 'Тренування з волейболу — тренер дає вказівки для розминки: Принеси м''яч! Розстав конуси! Натягни сітку! Поклади рушники на лавку! Відкрий двері!'
  speakers:
  - Тренер
  - Гравці
  motivation: Наказовий спосіб зі словами м'яч, конуси, сітка, рушники, лавка
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — У класі: — Відкрийте підручники, будь ласка. Читайте текст. — Вибачте, яку сторінку? — Сторінку двадцять три. — Тепер пишіть. Напишіть три речення. — Можна запитати? — Так, запитуйте! Наказові форми в класі: відкрийте, читайте, пишіть, напишіть.'
  - 'Діалог 2 — Між друзями: — Слухай, ходімо в кафе! — Добре, йди, я зараз. — Подивись, яка гарна погода! — Так! Сідай тут. — Дай мені меню, будь ласка. — Ось, дивись. — Скажи, що ти хочеш? — Я хочу каву. Неформальні наказові форми: слухай, подивись, сідай, дай, скажи.'
- section: Наказовий спосіб
  words: 300
  points:
  - 'Термін української школи (5 клас): наказовий спосіб. Використовується для наказів, прохань, інструкцій, запрошень. Дві форми на рівні А1: ти (неформально, одна людина) та ви (формально або множина). Додавання «будь ласка» робить будь-яке прохання ввічливим: Дай! → Дай, будь ласка. Дайте! → Дайте, будь ласка.'
  - 'Це не грубо — це просто прямо: українські форми наказового способу є звичними в щоденному спілкуванні. «Читай!» — це не грубо, саме так говорять вчителі, батьки, друзі. Додавання «будь ласка» = ввічливість. Додавання інтонації + ім''я = дружність: Олено, прочитай, будь ласка.'
- section: Як утворити?
  words: 300
  points:
  - 'Форма на «ти» (неформальна однина): І дієвідміна (-ати): читати → читай, слухати → слухай, писати → пиши. ІІ дієвідміна (-ити): говорити → говори, дивитися → дивись, ходити → ходи. Неправильні (поширені): дати → дай, сказати → скажи, їсти → їж, іти → іди. Модель: основа + закінчення. Більшість із них короткі — один або два склади.'
  - 'Форма на «ви» (формальна або множина): Додайте -те до форми на «ти»: читай → читайте, слухай → слухайте, пиши → пишіть, говори → говоріть, дивись → дивіться, ходи → ходіть, дай → дайте, скажи → скажіть, іди → ідіть. Зверніть увагу: деякі отримують закінчення -іть (а не -ить) — наголос переміщується: пиши → пишіть, сиди → сидіть, дивись → дивіться.'
- section: Підсумок
  words: 300
  points:
  - 'Необхідні наказові форми для повсякденного життя: | Інфінітив | Ти | Ви | Значення | | читати | читай | читайте | read | | писати | пиши | пишіть | write | | слухати | слухай | слухайте | listen | | дивитися | дивись | дивіться | look | | говорити | говори | говоріть | speak | | іти | іди | ідіть | go | | дати | дай | дайте | give | | сказати | скажи | скажіть | say/tell | | сісти | сядь | сядьте | sit down | | відкрити | відкрий | відкрийте | open | Самоперевірка: Як сказати «Please read» своєму вчителю? А другу?'
vocabulary_hints:
  required:
  - читати (to read)
  - писати (to write)
  - слухати (to listen)
  - дивитися (to look/watch)
  - говорити (to speak)
  - дати (to give)
  - сказати (to say/tell)
  - іти (to go)
  recommended:
  - відкрити (to open)
  - сісти (to sit down)
  - показати (to show)
  - запитати (to ask)
  - підручник (textbook, m)
  - сторінка (page, f)
  - речення (sentence, n)
