grammar:
- 'Наказовий спосіб: лише форми 2-ї особи "ти" та "ви" на рівні А1'
- 'Форма на "ти": читай, пиши, дай, скажи, іди'
- 'Форма на "ви": додаємо -те (читайте) або -іть (пишіть, скажіть)'
- 'Будь ласка для ввічливості'
register: розмовний
