grammar:
- 'Imperative mood (наказовий спосіб): 2nd person ти and ви forms only'
- 'Ти-form: читай, пиши, дай, скажи, іди'
- 'Ви-form: add -те (читайте) or -іть (пишіть, скажіть)'
- Будь ласка for politeness
