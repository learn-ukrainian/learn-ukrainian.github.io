module: a1-30
level: A1
sequence: 30
slug: prepositions-direction-origin
version: '2.0'
title: 'Prepositions: Direction & Origin'
subtitle: Direction, Location & Origin
content_outline:
- section: Warm-up
  points:
  - Де ти живеш? (місце)
  - Куди ти йдеш? (напрямок)
  - 'Звідки ти? (походження) — cultural hook: Ukrzaliznytsia icebreaker ''Звідки ти
    приїхав?'''
- section: Presentation
  points:
  - 'Три типи запитань про місце — visual aid: Decision Table for Question/Case/Preposition'
  - 'Прийменники для кожного типу — learner error: Static vs. Dynamic confusion (Де
    vs Куди); writing note: frame case change as a ''signpost'''
- section: 'Місце: Де?'
  points:
  - 'Прийменники у/в + місцевий відмінок — euphony rule: reinforce у/в usage; cultural
    hook: ''Slipper Culture'' and static location (вдома)'
  - 'Прийменник на + місцевий відмінок — learner error: в vs на for functional places
    (на роботі)'
  - Коли в, коли на (у школі vs на роботі)
- section: 'Напрямок: Куди?'
  points:
  - Прийменники у/в + знахідний відмінок
  - 'Прийменник на + знахідний відмінок — standard ref: §4.2.3.2.2 distinguishing
    location/direction'
  - 'Прийменник до + родовий відмінок — learner error: Case Mismatch after ''до''
    (requires Genitive)'
- section: 'Походження: Звідки?'
  points:
  - 'Прийменник з + родовий відмінок — standard ref: §4.1.7 usage of з/із/зі'
  - Прийменник від + родовий відмінок
  - Різниця між з та від
- section: Presentation 2
  points:
  - у школі → до школи / в школу
  - на роботі → на роботу
- section: Presentation 3
  points:
  - Маршрут по місту (з дому в метро)
  - Опис повсякденних переміщень
- section: Practice
  points:
  - Як дістатися до...?
  - Звідки ви приїхали?
  - Де знаходиться...?
- section: Practice 2
  points:
  - Інтеграційні вправи
vocabulary_hints:
  required:
  - де (where) — Де ти? Де це?
  - куди (where to) — Куди ти йдеш?
  - звідки (where from) — Звідки ти?
  - в/у (in, into) — вдома, у школі, в центр
  - на (on, onto) — на роботі, на стіл
  - до (to, toward) — додому, до школи, до Києва
  - з (from) — з України, зі школи
  - від (from)
  recommended:
  - йти (to go) — йти пішки, йти додому
  - їхати (to go by transport) — їхати на метро, їхати в центр
  - приходити (to arrive)
  - повертатися (to return)
activity_hints:
- type: fill-in
  focus: Choose correct preposition
  items: 25
- type: fill-in
  focus: Change location to direction
  items: 20
- type: quiz
  focus: Which question? Де/Куди/Звідки
  items: 15
- type: fill-in
  focus: Asking directions
  items: 6
focus: grammar
pedagogy: PPP
prerequisites:
- a1-13 (The Locative)
- a1-29 (Weather and Nature)
connects_to:
- a1-31 (Body and Health)
- a1-34 (Checkpoint Core Grammar)
objectives:
- Learner can distinguish location from direction questions
- Learner can use в/на for location (Locative)
- Learner can use в/на/до for direction (Accusative/Genitive)
- Learner can use з/від for origin
grammar:
- Location (Де?) vs Direction (Куди?) vs Origin (Звідки?)
- Prepositions with correct cases
- Movement verbs with prepositions
register: розмовний
phase: A1.3 [Consolidation]
persona:
