module: a1-006
level: A1
sequence: 6
slug: my-family
version: '1.0'
title: My Family
subtitle: "У мене є брат — Showing Photos"
focus: vocabulary
pedagogy: PPP
phase: A1.1 [Script & First Contact]
word_target: 1200
objectives:
- Name all close family members in Ukrainian
- Use "У мене є..." to express possession (I have...)
- Use possessive pronouns (мій, моя, моє, мої) with correct gender
- Introduce family members using Це and possessives
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Showing phone photos (following Anna's ULP 1-06/1-07).
    Two friends at a café look at family photos:
    — У тебе є брати чи сестри? — Так, у мене є два брати і одна
    сестра. — Ого! У мене тільки один брат. — Як його звати? — Коля.
    Natural conversation about family with 'У мене є' and numbers."
  - "Dialogue 2 — Introducing family in a photo (ULP 1-07 pattern):
    — Це моя сім'я на фотографії. — Класно! Хто це?
    — Це моя мама Марина. Це мій тато Євген. Це моя сестра Катя
    і мої брати — Іван і Денис. — А це твоя бабуся?
    — Так, її звати Тетяна. А це — дідусь Микола.
    Practices Це + possessives + family vocabulary."
  - "Dialogue 3 — Anna's ULP 1-10 review pattern (Я і моя сім'я):
    Connected speech about one's family — learner tells their family story:
    Привіт! Мене звати... Моя мама — вчителька. Її звати...
    Мій тато — інженер. Його звати... У мене є один брат.
    Він живе в... Combining all A1.1 skills: greeting + name + family +
    possessives + professions + 'У мене є'."
- section: "Сім'я́ = Роди́на (Family)"
  words: 200
  points:
  - "Following Anna Ohoiko ULP Episode 6 exactly — Anna talks to Іванка
    about her family. Two Ukrainian words for 'family': сім'я́ and роди́на
    (both equally used). Core family vocabulary:
    мáма / мáти (mother/mother formal), тáто / бáтько (dad/father formal),
    брат (brother), сестрá (sister), син (son), дочкá = дóнька (daughter)."
  - "Extended family: бабýся = бáба (grandmother), дідýсь = дід (grandfather),
    тíтка (aunt), дя́дько (uncle), двою́рідний брат / двою́рідна сестрá
    (male/female cousin). Note: Ukrainian has NO single word for 'grandparents'
    — you always say бабýся і дідýсь separately."
- section: "У мéне є... (I have...)"
  words: 250
  points:
  - "This is THE most important A1 construction. In Ukrainian, you don't say
    'I have' with a verb. You say 'At me there-is': У мéне є брат.
    Literally: 'At me is brother.' The є means 'there is/exists'."
  - "Full paradigm (following Anna's ULP 1-06 table exactly):
    У мéне є — I have. У тéбе є — You have (informal). У ньóго є — He has.
    У нéї є — She has. У нас є — We have. У вас є — You have (formal/plural).
    У них є — They have."
  - "Making questions — just add rising intonation:
    У тéбе є сестрá? ↗ (Do you have a sister?)
    У вас є брат? ↗ (Do you have a brother? — formal)
    Answers: Так, у мéне є сестрá. / Ні, у мéне немáє сестрú.
    Note: немáє (there isn't) + genitive form — just memorize as a chunk."
  - "Numbers with family (preview from Anna ULP 1-06):
    одúн/однá/однé changes by gender: одúн брат, однá сестрá, однé місто.
    два/дві: два брати́ (masculine), дві сéстри (feminine).
    У мéне є два брати́ і однá сестрá."
- section: "Мій брат — Моя́ сестрá (Possessive Pronouns)"
  words: 250
  points:
  - "Following Anna ULP Episode 7 — showing family photos. Possessive pronouns
    match the GENDER of the thing possessed (not the owner!):
    мій брат (my brother — masculine), моя́ сестрá (my sister — feminine),
    моє́ мíсто (my city — neuter), мої́ батькú (my parents — plural)."
  - "Full possessive pronoun table:
    my: мій / моя́ / моє́ / мої́
    your (informal): твій / твоя́ / твоє́ / твої́
    his: йогó (doesn't change). her: її́ (doesn't change).
    our: наш / нáша / нáше / нáші
    your (formal/plural): ваш / вáша / вáше / вáші
    their: їхній / їхня / їхнє / їхні"
  - "Using Це with possessives for introductions (Anna ULP 1-07 pattern):
    Це — моя́ мáма Мари́на. Це — мій тáто Євгéн.
    Це моя́ сестрá Кáтя і мої́ брати́ — Івáн і Дени́с.
    А це твоя́ бабýся? — Так, її́ звáти Тетя́на."
vocabulary_hints:
  required:
  - сім'я́ = роди́на (family) — both equally used
  - мáма = мáти (mother / mother formal)
  - тáто = бáтько (dad / father formal)
  - брат (brother)
  - сестрá (sister)
  - син (son)
  - дочкá = дóнька (daughter)
  - бабýся = бáба (grandmother)
  - дідýсь = дід (grandfather)
  - мій, моя́, моє́, мої́ (my — m/f/n/pl)
  recommended:
  - батькú (parents)
  - дя́дько (uncle)
  - тíтка (aunt)
  - двою́рідний брат (male cousin)
  - дружи́на = жíнка (wife)
  - чоловíк (man / husband)
  - хлóпець (young man / boyfriend)
  - дíвчина (girl / girlfriend)
