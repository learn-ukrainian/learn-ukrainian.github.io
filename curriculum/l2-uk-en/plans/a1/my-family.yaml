module: a1-49
level: A1
sequence: 49
slug: my-family
version: '2.0'
title: My Family
subtitle: Родина
content_outline:
- section: 'Вступ: Моя сім''я (Introduction: My Family)'
  words: 400
  points:
  - 'Введення базової лексики: мама, тато, брат, сестра (Державний стандарт §3.1).
    Питання «Хто це?» для ідентифікації членів родини.'
  - 'Культурний контекст: Різниця між поняттями «сім''я» (ядерна родина, що живе разом)
    та «родина» (ширше коло родичів, лінія предків та походження).'
- section: 'Презентація: Близька та розширена родина (Presentation: Immediate and
    Extended Family)'
  words: 600
  points:
  - Побудова речень через конструкцію «У мене є...» (Державний стандарт §4.2.1.1).
    Виправлення помилки-кальки з англійської «Я маю...», яка є менш природною для
    рівня А1.
  - 'Розширена родина (дідусь, бабуся, дядько, тітка). Культурний аспект: активна
    роль бабусь та дідусів у вихованні онуків в Україні та традиція проживання кількома
    поколіннями.'
  - 'Узгодження присвійних займенників (мій, моя) з назвами родичів (Державний стандарт
    §4.2.2). Drill: запобігання помилці «мій сестра» через акцент на жіночому роді
    іменника «сестра».'
- section: 'Презентація: Характеристики та стосунки (Presentation: Characteristics
    and Relationships)'
  words: 500
  points:
  - 'Терміни для подружжя: чоловік (husband/man) та дружина (wife). Розрізнення значень
    слова «чоловік» та вибір терміна «дружина» як нейтрального стандарту замість розмовного
    «жінка».'
  - 'Опис зовнішності та характеру родичів з використанням прикметників (добрий, мудрий,
    темне волосся). Вживання форм давального відмінка для віку: «моєму братові...»
    (Державний стандарт §4.2.1.1).'
- section: 'Практика: Звертання та спілкування (Practice: Address and Communication)'
  words: 500
  points:
  - 'Кличний відмінок як основа природного мовлення: навчання форм «мамо», «тату»,
    «бабусю», «дідусю» для звертання до рідних (Державний стандарт §4.2.1.1).'
  - 'Підготовка до теми свят (А1-33): обговорення сімейних зборів та традицій через
    вираз «збиратися всією родиною».'
  - 'Створення та опис сімейного дерева: застосування знань про родинні зв''язки (онук,
    онука) та присвійні форми (батько Олени, мама Остапа).'
vocabulary_hints:
  required:
  - 'мама (mom) — рідна мама, молода мама; найвища частотність, клична форма: мамо!'
  - 'тато (dad) — рідний тато, мій тато; клична форма: тату!'
  - брат (brother) — старший брат, молодший брат, рідний брат
  - сестра (sister) — старша сестра, молодша сестра, рідна сестра
  - 'дідусь (grandfather) — мудрий дідусь, мій дідусь; клична форма: дідусю!'
  - 'бабуся (grandmother) — добра бабуся; клична форма: бабусю!'
  - син (son) — мій син, єдиний син
  - донька (daughter) — моя донька, доросла донька
  recommended:
  - сім'я (family) — велика сім'я, моя сім'я; ядерний підрозділ
  - родина (family) — вся родина, збиратися родиною; ширший контекст роду та зв'язків
  - чоловік (husband) — мій чоловік; важливо розрізняти зі значенням 'man'
  - дружина (wife) — моя дружина; стандартний нейтральний термін
  - дядько (uncle) — добрий дядько
  - тітка (aunt) — рідна тітка
  - онук (grandson) — мій онук
  - онука (granddaughter) — маленька онука
