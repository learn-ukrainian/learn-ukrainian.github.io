title: Моя сім'я
subtitle: У мене є брат — показуємо фотографії
focus: vocabulary
pedagogy: PPP
phase: A1.1 [Звуки, літери та перший контакт]
word_target: 1200
objectives:
- Вміти називати близьких членів родини українською мовою
- Навчитися використовувати конструкцію «У мене є» для вираження власності (як сталий вираз)
- Вміти вживати присвійні займенники мій/моя/моє лише в називному відмінку
- Навчитися представляти членів родини, використовуючи конструкцію «Це» + присвійні займенники
dialogue_situations:
- setting: 'Відеодзвінок: показуємо фотографії на телефоні новому другу'
  speakers:
  - Оля
  - Марк
  motivation: У мене є + члени родини, присвійні займенники мій/моя з фотографіями
- setting: Показуємо сімейні фото новому українському другу в школі — розповідаємо, хто є хто, розпитуємо про сім'ї одне одного
  speakers:
  - Даша
  - Андрій
  motivation: Лексика про сім'ю, запитання «У тебе є брати? Це мій/моя...» у природному підлітковому контексті
content_outline:
- section: Діалоги
  words: 400
  points:
  - 'Діалог 1 — Показуємо фото з телефону (Anna Епізод 6-7): — У тебе є брати чи сестри? — Так, у мене є два брати і одна сестра. — Ого! У мене тільки один брат. Як його звати? — Коля.'
  - 'Діалог 2 — Сім''я на фотографії (Anna Епізод 7): — Це моя сім''я на фотографії. — Класно! Хто це? — Це моя мама Марина. Це мій тато Євген. Це моя сестра Катя і мої брати — Іван і Денис. — А це твоя бабуся? — Так, її звати Тетяна.'
  - 'Діалог 3 — Зв''язне мовлення (Anna Епізод 10, повторення шаблону): Привіт! Мене звати... Моя мама — вчителька. Мій тато — інженер. У мене є один брат. Поєднання всіх навичок з A1.1.'
- section: Сім'я
  words: 200
  points:
  - 'Anna Епізод 6: Два слова для позначення сім''ї: «сім''я» та «родина» (обидва вживаються). Основні: мама/мати, тато/батько, брат, сестра, син, дочка/донька. Додаткові: бабуся/баба, дідусь/дід, тітка, дядько. Зверніть увагу: в українській немає одного слова для «grandparents» — завжди кажемо «бабуся і дідусь».'
  - 'Ім''я + по батькові — ТІЛЬКИ для впізнавання (не для продукції на А1, не окреме `dialogue_situation`): українська модель повного імені — `ім''я + по батькові + прізвище` (наприклад, `Марія Василівна Коваленко`). Суфікси: чоловічі `-ович`/`-йович` (`Іван → Іванович`), жіночі `-івна`/`-ївна` (`Петро → Петрівна`). УВАГА до автора: українська жіноча форма — `-івна`/`-ївна`, НЕ російська `-овна`. Подати ОДИН короткий ілюстративний приклад у секції (напр. у самому тексті «Сім''я» або «Підсумок»): `— Добрий день, Маріє Василівно!` з позначкою «recognition-only; формальний регістр». Дві головні `dialogue_situations[]` залишаються peer/photo-sharing з `ти` — формальний регістр з `по батькові` не вводиться як окремий діалог і не тренується продуктивно. Продукція власних форм по батькові відкладається на А2; А1 = впізнавання + розуміння, що це сигнал формальності.'
- section: У мене є
  words: 250
  points:
  - 'Шаблон з Anna Епізод 6: В українській мові не кажуть "I have" за допомогою дієслова мати. Натомість використовують конструкцію: У мене є брат. Для рівня А1 вивчаємо лише: у мене є, у тебе є, у вас є (ввічлива форма). Інші форми (у нього, у неї, у нас, у них) вимагають використання займенників у родовому відмінку, що є граматикою рівня А2 — вводимо їх поступово через діалоги як сталі фрази, а не як парадигму.'
  - 'Запитання з висхідною інтонацією: У тебе є сестра? ↗ Заперечення: Відкладаємо вивчення "У мене немає" до рівня А2 (коли вивчатимемо родовий відмінок). На рівні А1 учні відповідають: Ні. / Ні, у мене тільки один брат. Це дозволяє уникнути педагогічної пастки використання "немає" + називний відмінок (*немає брат).'
  - 'Ознайомлення з числівниками (Anna Епізод 6): один/одна змінюється за родами: один брат, одна сестра. два/дві: два брати, дві сестри.'
- section: Мій, моя, моє
  words: 200
  points:
  - 'Anna Епізод 7: Присвійні займенники узгоджуються в роді з іменником, якого стосуються. мій брат (m), моя сестра (f), моє місто (n), мої батьки (pl). твій/твоя/твоє/твої (your, informal). його (не змінюється), її (не змінюється). Зауваження згідно з Державним стандартом: повна парадигма (наш, ваш, їхній) — це рівень А2. На рівні А1 вивчаємо мій/твій/його/її лише в називному відмінку.'
- section: Підсумок
  words: 150
  points:
  - 'Самоперевірка: Назвіть 5 членів родини. Скажіть "У мене є сестра". Яка різниця між «мій» та «моя»? Розкажіть про свою сім''ю у 4-5 реченнях.'
vocabulary_hints:
  required:
  - сім'я (family) — apostrophe word
  - мама (mother)
  - тато (father)
  - брат (brother)
  - сестра (sister)
  - бабуся (grandmother)
  - дідусь (grandfather)
  - мій, моя, моє, мої (my — m/f/n/pl)
  - твій, твоя, твоє (your — m/f/n, informal)
  - у мене є (I have)
  - у тебе є (you have, informal)
  recommended:
  - батьки (parents)
  - дядько (uncle)
  - тітка (aunt)
  - дочка (daughter)
  - син (son)
  - дружина (wife)
  - чоловік (man / husband)
  - родичі (relatives, kin — countable plural)
  - його (his — doesn't change)
  - її (her — doesn't change)
  - один, одна (one — m/f)
  - два, дві (two — m/f)
  - чи (or — in questions)
  - тільки (only)
  - ім'я (given name — recognition only at A1, `Мене звати + ім'я`)
  - прізвище (surname — recognition only)
  - по батькові (patronymic — recognition only, paired with formal `Ви`)
activity_hints:
- type: quiz
  focus: '«У тебе є...?» — дайте відповідь Так/Ні. Використовуйте ЛИШЕ сталий вираз «у тебе є». Приклади питань: "У тебе є брат?", "У тебе є сестра?", "У тебе є бабуся?". Варіанти відповідей: "Так, у мене є брат." / "Ні." / "Так, у мене є два брати." НЕ використовуйте імена в родовому відмінку (ніякого "У Оксани є").'
  items: 6
- type: fill-in
  focus: 'Оберіть правильний присвійний займенник. ТОЧНИЙ шаблон: "Це {___} мама." → моя | "Де {___} тато?" → твій | "Ось {___} батьки." → мої. Усе в називному відмінку. Варіанти: мій/моя/моє/мої або твій/твоя/твоє/твої.'
  items: 8
- type: match-up
  focus: 'З''єднайте англійські слова про сім''ю з українськими відповідниками. Пари: parents↔батьки, uncle↔дядько, aunt↔тітка, grandfather↔дідусь, grandmother↔бабуся, brother↔брат, sister↔сестра, mother and father↔мама і тато.'
  items: 8
- type: fill-in
  focus: 'Заповніть пропуски в діалозі про знайомство з сім''єю. Шаблон: "— Привіт! Це {твій} брат?" / "— Так, це мій брат. Ось мій {тато}." Варіанти для пропусків: члени родини або присвійні займенники. ЖОДНИХ форм родового відмінка.'
  items: 4
- type: fill-in
  focus: 'Типові родинні суржикові пари — оберіть нормативну форму (див. wiki "Типові помилки L2"). Мета: нейтралізувати поширені запозичення з рос. (`жена`, `муж`, `бабушка`, `родственники`, `ребьонок`, `младший`, `женатий`) перед тим, як вони закріпляться як «норма». УВАГА: пара `папа/тато` свідомо відсутня — `папа` зафіксоване у VESUM без обмежень і є регістрово-стильовою преференцією, а не словниковою помилкою (автор модулює `тато`, але не маркує `папа` як «неправильно»).'
  items:
  - Моя {дружина|жена} — вчителька.
  - Мій {чоловік|муж} працює в лікарні.
  - Це моя {бабуся|бабушка}. Їй сімдесят років.
  - У нас велика родина — близько десяти {родичів|родственників}.
  - Моя племінниця ще маленька {дитина|ребьонок}.
  - Мій {молодший|младший} брат навчається в школі.
  - Мій старший брат уже {одружений|женатий}. У нього двоє дітей.
connects_to:
