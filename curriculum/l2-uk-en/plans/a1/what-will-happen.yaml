module: a1-050
level: A1
sequence: 50
slug: what-will-happen
version: 1.2.1
title: Що буде?
subtitle: Я буду читати — ваш перший майбутній час
focus: grammar
pedagogy: PPP
phase: A1.8 [Минуле, майбутнє, випускний]
word_target: 1200
objectives:
- Навчитися утворювати складений майбутній час за допомогою конструкції «буду» + інфінітив для всіх осіб
- Вміти відрізняти складений майбутній час від теперішнього
- Використовувати майбутній час для розповіді про плани та наміри
- Ставити запитання «Що ти будеш робити?» та відповідати на них
dialogue_situations:
- setting: 'Ворожка в селі передбачає майбутнє клієнта на кухні — використання складеного майбутнього часу недоконаного виду: Ти будеш багато подорожувати. Будеш зустрічати цікавих людей (m). Будеш отримувати подарунки (pl). Будеш щасливий/щаслива!'
  speakers:
  - Ворожка
  - Клієнт
  motivation: 'Складений майбутній час недоконаного виду (буду + інфінітив): подорожувати, зустрічати, отримувати — тривалі дії або процеси, а не одноразові завершені події.'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Плани на завтра: — Що ти будеш робити завтра? — Завтра я буду працювати. — А ввечері? — Ввечері я буду готувати вечерю. — А що буде робити Олена? — Вона буде читати. — А ви будете гуляти? — Так, ми будемо гуляти в парку! Демонстрація всіх особових форм конструкції «буду + інфінітив».'
  - 'Діалог 2 — Плани на вихідні: — Що ви будете робити на вихідних? — У суботу ми будемо відпочивати. — А в неділю? — У неділю я буду готувати, а чоловік буде гуляти з дітьми. — Звучить добре! А я буду дивитися футбол. — Ти завжди будеш дивитися футбол! Майбутній час у природній розмові про плани.'
- section: Майбутній час
  words: 300
  points:
  - 'Матеріал 3-4 класів: майбутній час. В українській мові є ДВІ форми майбутнього часу. На рівні А1 ми вивчаємо ОДНУ — складений майбутній час: буду + інфінітив. я буду читати, ти будеш читати, він/вона буде читати, ми будемо читати, ви будете читати, вони будуть читати. Інфінітив залишається незмінним — за особами змінюється лише дієслово «бути».'
  - 'Порівняння трьох часів: Минулий: Я читав/читала книжку. Теперішній: Я читаю книжку. Майбутній: Я буду читати книжку. У минулому часі — родові закінчення. У теперішньому — особові закінчення. У майбутньому — буду + інфінітив. Зверніть увагу: проста форма майбутнього часу (наприклад, «прочитаю») існує, але вивчається на рівні А2.'
- section: Практика
  words: 300
  points:
  - 'Базові дієслова в майбутньому часі: читати → буду читати, будеш читати, буде читати... працювати → буду працювати, будеш працювати... готувати → буду готувати, будеш готувати... гуляти → буду гуляти, будеш гуляти... дивитися → буду дивитися, будеш дивитися... говорити → буду говорити, будеш говорити...'
  - 'Побудова речень про майбутнє: Завтра я буду працювати з дев''ятої до п''ятої. Ввечері ми будемо дивитися фільм. У суботу вони будуть гуляти в парку. Що ви будете їсти на вечерю? Слова-маркери часу для майбутнього: завтра, наступного тижня, у суботу, ввечері.'
- section: Підсумок
  words: 300
  points:
  - 'Утворення складеного майбутнього часу: буду / будеш / буде / будемо / будете / будуть + інфінітив. Інфінітив ніколи не змінюється — відмінюється лише допоміжне дієслово. Тепер ми знаємо три часи: Учора я читав. (Минулий — рід). Зараз я читаю. (Теперішній — особа). Завтра я буду читати. (Майбутній — буду + інфінітив). Питання: Що ти будеш робити? Відповідь: Я буду + інфінітив. Самоперевірка: Що ви будете робити завтра вранці, вдень і ввечері?'
vocabulary_hints:
  required:
  - завтра (tomorrow)
  - буду (I will — form of бути)
  - будеш (you will)
  - буде (he/she/it will)
  - будемо (we will)
  - будете (you pl. will)
  - будуть (they will)
  - робити (to do)
  recommended:
  - відпочивати (to rest)
  - наступний (next, adj)
  - тиждень (week, m)
  - план (plan, m)
  - звучати (to sound)
  - футбол (football, m)
  - зараз (now)
activity_hints:
- type: matching
  focus: З'єднайте займенник із правильною формою дієслова «бути» в майбутньому часі
  pairs:
  - 'я: буду'
  - 'ти: будеш'
  - 'він/вона: буде'
  - 'ми: будемо'
  - 'ви: будете'
  - 'вони: будуть'
- type: fill-in
  focus: Утворіть складений майбутній час (бути + інфінітив)
  items:
  - Завтра я {буду|буде|будемо} працювати.
  - Що ти {будеш|буду|будете} робити ввечері?
  - Вона {буде|будуть|будемо} читати книжку.
  - Ми {будемо|буде|буду} дивитися футбол.
  - Ви {будете|будеш|будуть} гуляти в парку?
  - Вони {будуть|будемо|буде} відпочивати.
- type: fill-in
  focus: Розрізняйте минулий, теперішній та майбутній часи
  items:
  - Зараз я {читаю|читав|буду читати}.
  - Учора він {гуляв|гуляє|буде гуляти} у парку.
  - Завтра ми {будемо дивитися|дивилися|дивимося} фільм.
  - Минулого тижня вона {працювала|працює|буде працювати}.
connects_to:
- a1-051 (Мої плани)
prerequisites:
- a1-049 (Учора)
grammar:
- 'Складений майбутній час: буду + інфінітив (лише ця форма на рівні А1)'
- 'Відмінювання дієслова «бути» в майбутньому часі: буду, будеш, буде, будемо, будете, будуть'
- 'Порівняння трьох часів: минулий (зміна за родами), теперішній (зміна за особами), майбутній (буду + інфінітив)'
- 'Запитання: Що ти будеш робити?'
register: розмовний
references:
- title: State Standard 2024, §4.2.4.1
  notes: Майбутній час — складена форма (буду + інфінітив) на рівні А1.
- title: Підручник для 3-4 класів
  notes: 'Утворення майбутнього часу: складений майбутній час.'
