module: a1-053
level: A1
sequence: 53
slug: what-will-happen-future
version: '1.0'
title: What Will Happen Future
subtitle: Future tense
focus: grammar
pedagogy: PPP
phase: A1.8 [Past, Future & Graduation]
word_target: 1200
objectives:
- Form the future tense using 'бути' + infinitive
- Talk about future actions
- Understand basic future time markers (завтра, скоро)
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: ''Що ти будеш робити завтра?'' ''Я буду відпочивати.'''
  - 'Dialogue 2: Making a promise. ''Я буду чекати.'''
- section: Майбутній час (Future Tense)
  words: 400
  points:
  - 'Compound future tense: Conjugate ''бути'' (я буду, ти будеш...) + Infinitive verb.'
  - Я буду читати. Ми будемо працювати.
  - 'Note: This is the imperfective future (the easiest one, perfect for A1).'
- section: Коли? (When?)
  words: 400
  points:
  - 'Time words for future: завтра (tomorrow), післязавтра (day after tomorrow), скоро (soon), потім (later).'
vocabulary_hints:
  required:
  - буду
  - будеш
  - буде
  - будемо
  - будете
  - будуть
  - завтра
  - скоро
  - післязавтра
  recommended:
  - наступного тижня
  - обіцяти
  - чекати
activity_hints:
- type: conjugation
  focus: Conjugate 'бути' in the future + infinitive
  items: 12
- type: transformation
  focus: Change present tense sentences to future tense
  items: 8
connects_to:
- a1-054 (My Plans)
prerequisites:
- a1-016 (Daily Verbs Group 1)
grammar:
- Compound Future Tense (бути + infinitive)
register: розмовний
references: []
