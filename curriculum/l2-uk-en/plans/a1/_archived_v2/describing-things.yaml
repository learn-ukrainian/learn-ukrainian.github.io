module: a1-009
level: A1
sequence: 9
slug: describing-things
version: '1.0'
title: Describing Things
subtitle: "Великий стіл, нова книга — Adjectives"
focus: grammar
pedagogy: PPP
phase: A1.2 [My World]
word_target: 1200
objectives:
- Describe objects using common adjectives (size, age, quality)
- Match adjective gender to noun gender in the Nominative case
- Form simple descriptive sentences (Це великий стіл)
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Room makeover.
    — Це новий стіл?
    — Ні, це старий стіл. Але це нова лампа!
    — Дуже гарна кімната. Вона велика і світла.
    Natural conversation pointing out qualities of objects in a room."
  - "Dialogue 2 — Shopping for a gift.
    — У мене є цікава книга.
    — Це гарна книга. А це новий телефон?
    — Так, це мій новий телефон."
- section: "Який? Яка? Яке? (Which one? / What kind?)"
  words: 250
  points:
  - "Introduce basic opposite adjective pairs:
    великий / маленький (big / small)
    новий / старий (new / old)
    гарний / поганий (good/beautiful / bad)
    цікавий (interesting)"
- section: "Узгодження прикметників (Adjective Agreement)"
  words: 450
  points:
  - "Adjectives must match the noun's gender (Nominative case only).
    Masculine (-ий): великий стіл, новий телефон, гарний рюкзак.
    Feminine (-а): велика кімната, нова книга, гарна лампа.
    Neuter (-е): велике вікно, нове ліжко, гарне місто.
    Note: Focus entirely on recognition and matching, using the objects learned in M08."
  - "Connecting with possessives from M06: мій новий стіл, моя стара книга."
vocabulary_hints:
  required:
  - який (which/what kind - m)
  - яка (which/what kind - f)
  - яке (which/what kind - n)
  - великий (big)
  - маленький (small)
  - новий (new)
  - старий (old)
  - гарний (good, beautiful)
  - поганий (bad)
  - цікавий (interesting)
  recommended:
  - світлий (light/bright)
  - темний (dark)
  - чистий (clean)
activity_hints:
- type: matching
  focus: Match the adjective ending (-ий, -а, -е) to the correct noun
  items: 12
- type: fill-in
  focus: Fill in the correct adjective form (Це ___ книга)
  items: 10
- type: multiple-choice
  focus: Select the correct opposite adjective based on the context
  items: 8
connects_to:
- a1-010 (Colors and Clothing)
prerequisites:
- a1-008 (My Room & Gender - for nouns)
grammar:
- "Adjective-noun agreement in Nominative case (m/f/n)"
- "Interrogatives: який, яка, яке"
register: розмовний
references:
- title: "ULP 1-07: Possessive Pronouns"
  url: https://www.ukrainianlessons.com/episode7/
  notes: "Building on the concept of agreement (мій/моя/моє) applied now to adjectives (-ий/-а/-е)."
- title: "Anna Ohoiko Pronunciation Playlist"
