title: Checkpoint Food Shopping
subtitle: Review M37-42
focus: review
pedagogy: Checkpoint
phase: A1.6 [Food & Shopping]
word_target: 1200
objectives:
- Review food, drink, and shopping vocabulary
- Test Accusative case (animate vs inanimate)
- Test Instrumental 'з' and Genitive quantities
- Confirm adjective agreement in covered cases
content_outline:
- section: Listening Comprehension
  words: 300
  points:
  - A story about someone going to the market, buying food, and meeting a friend at a cafe.
  - Tests comprehension of prices, quantities, and direct objects.
- section: Grammar Review
  words: 300
  points:
  - 'Mixed drill: Accusative (animate/inanimate), Locative, basic Instrumental, basic Genitive.'
  - Learner must choose the correct case based on the verb or preposition.
- section: Communication
  words: 300
  points:
  - 'Roleplay: Ordering at a restaurant.'
  - 'Roleplay: Asking how much something costs at a market.'
- section: Self-Assessment
  words: 300
  points:
  - Can you order food and ask for the bill?
  - Can you say what you see or who you are waiting for?
  - Do you know when to change the ending of a word when it's the object of a sentence?
