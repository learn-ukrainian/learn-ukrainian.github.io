module: a1-012
level: A1
sequence: 12
slug: numbers-and-money
version: '1.0'
title: Numbers & Money
subtitle: "Скільки коштує? — Prices and Ages"
focus: vocabulary
pedagogy: PPP
phase: A1.2 [My World]
word_target: 1200
objectives:
- Count from 1 to 1000 using number patterns
- Ask for prices using "Скільки коштує?"
- State ages and read phone numbers
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — At the market (Prices).
    — Добрий день! Скільки коштує кава?
    — Добрий день. Кава коштує сорок гривень.
    — А чай?
    — Чай коштує двадцять п'ять гривень.
    Using numbers in a realistic transaction."
  - "Dialogue 2 — Giving personal info.
    — Скільки тобі років?
    — Мені двадцять один рік. А тобі?
    — Мені двадцять два. А який твій номер телефону?
    — Нуль шістдесят сім, триста сорок п'ять...
    Using numbers for ages and phone numbers."
- section: "Цифри 1-19 (Numbers 1-19)"
  words: 200
  points:
  - "Review 1-10: один, два, три, чотири, п'ять, шість, сім, вісім, дев'ять, десять."
  - "Teens (base + надцять): одинадцять, дванадцять, тринадцять... двадцять."
  - "Remind about один/одна/одне and два/дві gender agreement."
- section: "Десятки та Сотні (Tens and Hundreds)"
  words: 250
  points:
  - "Tens: двадцять, тридцять, сорок (irregular), п'ятдесят, шістдесят, сімдесят, вісімдесят, дев'яносто (irregular)."
  - "Hundreds: сто, двісті, триста, чотириста, п'ятсот... тисяча."
  - "Focus on combining: сто двадцять п'ять, сорок три. Taught as patterns, not rote memorization of every number."
- section: "Скільки коштує? (How much is it?)"
  words: 250
  points:
  - "Скільки коштує? (How much does it cost?)"
  - "Introduce 'гривня' (hryvnia). Don't focus heavily on the complex genitive plural rules for hryvnia yet, treat common prices as lexical chunks (одна гривня, дві гривні, п'ять гривень) or just teach numbers + 'гривень' as the default plural for prices >4."
  - "Age pattern: Скільки тобі років? Answer uses рік/роки/років depending
    on number: 1 рік, 2-4 роки, 5+ років. Teach as memorized chunks:
    Мені двадцять один. (drop рік in casual speech) or Мені двадцять один рік."
vocabulary_hints:
  required:
  - нуль (zero)
  - один... десять (1-10)
  - одинадцять... двадцять (11-20)
  - тридцять, сорок, п'ятдесят, шістдесят, сімдесят, вісімдесят, дев'яносто (30-90)
  - сто, тисяча (100, 1000)
  - Скільки коштує? (How much does it cost?)
  - гривня (hryvnia)
  - Скільки тобі років? (How old are you?)
  - номер телефону (phone number)
activity_hints:
- type: matching
  focus: Match numerals to their written words (45 -> сорок п'ять)
  items: 12
- type: math-equation
  focus: Simple addition/subtraction to practice numbers (двадцять + п'ять = ___)
  items: 8
- type: fill-in
  focus: "Fill in the correct phrase: Скільки ___ кава?"
  items: 8
connects_to:
- a1-013 (This and That)
prerequisites:
- a1-008, a1-009
grammar:
- "Cardinal numerals (patterns to 1000)"
- "один/одна/одне, два/дві gender agreement review"
- "Lexical chunks for prices and age"
register: розмовний
