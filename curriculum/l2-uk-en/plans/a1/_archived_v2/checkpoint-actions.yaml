module: a1-021
level: A1
sequence: 21
slug: checkpoint-actions
version: '1.0'
title: Checkpoint Actions
subtitle: "What can you do?"
focus: review
pedagogy: Checkpoint
phase: A1.3 [Actions & Desires]
word_target: 1200
objectives:
- Review and test Group 1 and Group 2 verb conjugations
- Express desires and abilities using modals
- Ask and answer information questions
- Describe a daily routine using reflexive verbs
content_outline:
- section: "Listening Comprehension"
  words: 300
  points:
  - "A longer audio/text passage where a person describes their typical busy day: waking up, what they like to do, what they must do for work, and what they do in the evening."
  - "Tests comprehension of reflexive verbs, modals, and both conjugation groups."
- section: "Grammar Review: Conjugation"
  words: 300
  points:
  - "Mix Group 1 (-ати) and Group 2 (-ити) verbs. Learner must choose the correct endings based on the pronoun."
  - "Include reflexive verbs (-ся/-сь)."
- section: "Communication: Asking and Answering"
  words: 300
  points:
  - "Roleplay scenarios: Asking a friend about their weekend plans using question words."
  - "Making excuses using 'не можу' and 'мушу'."
- section: "Self-Assessment"
  words: 300
  points:
  - "Can you say what you like and don't like?"
  - "Can you describe your morning routine?"
  - "Can you ask 'Who, What, Where, When, Why'?"
  - "Can you say 'I want, I can, I must'?"
vocabulary_hints:
  required: []
  recommended: []
activity_hints:
- type: reading-comprehension
  focus: Read a daily routine paragraph and answer true/false questions
  items: 5
- type: fill-in
  focus: Comprehensive verb conjugation test (Group 1, Group 2, Reflexives, Modals)
  items: 15
- type: match-up
  focus: Match questions to appropriate answers
  items: 8
connects_to:
- a1-022 (What Time Is It?)
prerequisites:
- a1-020 (My Morning Routine)
grammar:
- Comprehensive review of A1.3 (Verbs, Modals, Questions)
register: розмовний
