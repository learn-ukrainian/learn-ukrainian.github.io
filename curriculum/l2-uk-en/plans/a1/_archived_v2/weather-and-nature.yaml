module: a1-025
level: A1
sequence: 25
slug: weather-and-nature
version: '1.0'
title: Weather and Nature
subtitle: "Walking in the Park"
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Time & Nature]
word_target: 1200
objectives:
- Describe the weather using impersonal adverbs
- Learn basic nature vocabulary
- Talk about outdoor conditions
content_outline:
- section: Діалоги (Dialogues)
  words: 500
  points:
  - "Dialogue 1 — Checking the weather.
    — Яка сьогодні погода?
    — Сьогодні сонячно і тепло.
    — Чудово! Гуляємо в парку?"
  - "Dialogue 2 — Bad weather.
    — Надворі йде дощ.
    — Так, дуже холодно. Я сиджу вдома."
- section: "Погода (Weather — Impersonal Adverbs)"
  words: 350
  points:
  - "Teach how Ukrainians describe weather using impersonal adverbs (-о endings): холодно, тепло, спекотно, сонячно, хмарно."
  - "Use 'Сьогодні...' (Today it is...)."
  - "Introduce special verb phrases: іде дощ (it rains), іде сніг (it snows)."
- section: "Природа (Nature Vocabulary)"
  words: 350
  points:
  - "Basic nature terms encountered on a walk: дерево, річка, птах, сонце, небо, ліс, парк."
  - "Combine nature vocabulary with adjectives or weather conditions (гарне дерево, синє небо)."
vocabulary_hints:
  required:
  - погода (weather)
  - холодно (cold)
  - тепло (warm)
  - спекотно (hot)
  - сонячно (sunny)
  - хмарно (cloudy)
  - іде дощ (it's raining)
  - іде сніг (it's snowing)
  - надворі (outside)
  - дерево (tree)
  - річка (river)
  - птах (bird)
  - сонце (sun)
  - небо (sky)
  recommended:
  - ліс (forest)
  - парк (park)
  - вітер (wind)
activity_hints:
- type: matching
  focus: Match weather icons/descriptions to the correct Ukrainian adverb
  items: 8
- type: fill-in
  focus: Complete sentences with the correct nature vocabulary or weather phrase
  items: 12
- type: true-false
  focus: Evaluate logical statements about weather and seasons (e.g., Взимку спекотно)
  items: 10
connects_to:
- a1-026 (My Daily Life)
prerequisites:
- a1-024 (Months and Seasons)
grammar:
- "Impersonal adverbs (-о) for weather"
- "Іде дощ / іде сніг expressions"
register: розмовний
references:
- title: "ULP Ep16: Talking about weather in Ukrainian"
  url: "https://www.ukrainianlessons.com/episode16/"
  notes: "Follows Anna's introduction to weather terms and impersonal structures."