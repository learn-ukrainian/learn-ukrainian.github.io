slug: checkpoint-my-world
version: '1.0'
title: Checkpoint — My World
subtitle: "Review of Modules 08-13"
focus: assessment
pedagogy: Testing
phase: A1.2 [My World]
word_target: 1200
objectives:
- Review vocabulary for rooms, clothing, and colors
- Assess mastery of noun gender and adjective agreement (Nominative)
- Evaluate ability to count to 1000 and use prices
- Test usage of plural nouns/adjectives and demonstrative pronouns (цей/той)
content_outline:
- section: "Частина 1: Розуміння (Comprehension)"
  words: 400
  points:
  - "A comprehensive reading text summarizing the skills learned.
    Story: 'Моя нова кімната'. A detailed description of an apartment, mentioning furniture, colors, whether things are old or new, and how much they cost.
    'Привіт! Це моя нова велика кімната. Тут є великий стіл і нове ліжко. Стіл коштує тисячу гривень...'"
  - "A short dialogue at a clothing store: choosing between a red jacket and a blue jacket, asking for prices."
- section: "Частина 2: Лексика та Граматика (Vocabulary & Grammar Review)"
  words: 400
  points:
  - "Review tables and quick summaries of key concepts:
    1. Gender (m/f/n endings)
    2. Adjective agreement (великий/велика/велике/великі)
    3. Plurals (-и/-і)
    4. Numbers (1-1000, Скільки коштує?)
    5. Demonstratives (цей vs той)"
- section: "Частина 3: Перевірка (Assessment)"
  words: 400
  points:
  - "A series of communicative tasks.
    Task 1: Describe your own room using 'У мене є' and adjectives.
    Task 2: Look at an imaginary receipt and read the numbers.
    Task 3: Sort mixed words into Masculine, Feminine, Neuter, and Plural categories."
