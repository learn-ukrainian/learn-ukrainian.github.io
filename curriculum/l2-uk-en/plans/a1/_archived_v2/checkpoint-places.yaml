module: a1-036
level: A1
sequence: 36
slug: checkpoint-places
version: '1.0'
title: Checkpoint Places
subtitle: "Review M29-35"
focus: review
pedagogy: Checkpoint
phase: A1.5 [Places & Movement]
word_target: 1200
objectives:
- Review euphony rules (у/в, і/й)
- Review Locative case (Де?), Accusative direction (Куди?), and Genitive origin (Звідки?)
- Test navigation, directions, and transport vocabulary
- Confirm ability to combine spatial concepts in context
content_outline:
- section: "Listening Comprehension"
  words: 300
  points:
  - "A narrative about a tourist navigating a Ukrainian city, taking transport, getting lost, and asking for directions."
  - "Tests comprehension of direction words, transport vocabulary, and spatial cases."
- section: "Grammar Review: Де, Куди, Звідки"
  words: 300
  points:
  - "Comprehensive drill on the spatial trio."
  - "Learner must choose the correct preposition and case ending based on the verb (іти, бути, їхати)."
  - "Includes checking euphony (в vs у)."
- section: "Communication: Navigation and Origin"
  words: 300
  points:
  - "Roleplay scenarios: Explaining where you are from and where you live."
  - "Giving directions from the train station to a hotel."
- section: "Self-Assessment"
  words: 300
  points:
  - "Can you describe where things are in your city?"
  - "Can you ask for and give directions?"
  - "Can you ask where someone is from and say where you are from?"
  - "Do you understand the difference between Де, Куди, and Звідки?"
