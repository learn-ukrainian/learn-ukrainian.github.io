module: a1-056
level: A1
sequence: 56
slug: body-and-health
version: '1.0'
title: Body And Health
subtitle: Parts of the body and symptoms
focus: vocabulary
pedagogy: PPP
phase: A1.8 [Past, Future & Graduation]
word_target: 1200
objectives:
- Name main body parts in Ukrainian
- Express physical pain using 'У мене болить...'
- Talk about basic symptoms to a doctor or pharmacist
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: At the doctor''s office. ''Що у вас болить?'' ''У мене болить голова.'''
  - 'Dialogue 2: A friend asking why you look bad. ''Я хворий. У мене температура.'''
- section: Тіло людини (The human body)
  words: 400
  points:
  - 'Vocabulary: голова (head), рука (arm/hand), нога (leg/foot), живіт (stomach), горло (throat), спина
    (back).'
- section: Як ти почуваєшся? (How do you feel?)
  words: 400
  points:
  - 'Structure: У мене болить + [Nom. body part]. У мене болять + [Nom. plural].'
  - 'Other symptoms: температура (fever), кашель (cough), нежить (runny nose).'
  - 'Adjectives: хворий/хвора (sick), здоровий/здорова (healthy).'
vocabulary_hints:
  required:
  - голова
  - рука
  - нога
  - живіт
  - горло
  - спина
  - боліти
  - хворий
  - температура
  - лікар
  recommended:
  - кашель
  - нежить
  - здоровий
  - ліки
activity_hints:
- type: matching
  focus: Match body parts vocabulary to pictures
  items: 10
- type: fill-in
  focus: Use болить or болять correctly depending on singular/plural
  items: 8
connects_to:
- a1-057 (Emergencies)
prerequisites:
- a1-008 (My Room Gender)
grammar:
- У мене болить + Nominative
register: розмовний
references: []
