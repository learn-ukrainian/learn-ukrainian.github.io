module: a1-016
level: A1
sequence: 16
slug: daily-verbs-group-1
version: '1.0'
title: Daily Verbs (Group 1)
subtitle: "Працюю і читаю — Type 1 Conjugation"
focus: grammar
pedagogy: PPP
phase: A1.3 [Actions & Desires]
word_target: 1200
objectives:
- Understand and use Type 1 (-ати) verb conjugation in the present tense
- Describe basic daily activities (working, reading, knowing)
- Ask simple questions about daily actions
content_outline:
- section: Діалоги (Dialogues)
  words: 450
  points:
  - "Dialogue: A morning story. Two colleagues talking about their routine. Привіт! Я вже працюю. А ти що робиш? — Я читаю новини. (Hi! I'm already working. And what are you doing? — I'm reading the news)."
  - "Teach conjugation through SITUATION, NOT grammar tables. Use context to show who is doing the action."
  - "Include questions: Ти знаєш? (Do you know?) — Так, я знаю. (Yes, I know)."
- section: "Що ти робиш? (What are you doing?)"
  words: 350
  points:
  - "Focus on common Type 1 verbs: працювати (to work), читати (to read), знати (to know)."
  - "Introduce the 'я' (I) and 'ти' (you) forms first. Я працюю (I work/am working), Ти працюєш (You work/are working). Notice how the ending changes the meaning."
  - "Explain that Ukrainian doesn't differentiate between 'I work' and 'I am working' — it's all present tense."
- section: "Він, Вона, Ми, Ви, Вони"
  words: 400
  points:
  - "Gradually introduce the rest of the forms through examples. Він працює (He works), Ми працюємо (We work), Ви працюєте (You [plural/formal] work), Вони працюють (They work)."
  - "Highlight the pattern: -ю, -єш, -є, -ємо, -єте, -ють. Explain that verbs ending in -ати often follow this pattern (Group 1)."
  - "Practice with 'читати': я читаю, ти читаєш, etc. and 'знати': я знаю, ти знаєш, etc."
vocabulary_hints:
  required:
  - працювáти (to work)
  - знáти (to know)
  - що (what)
  - робúти (to do - introduced as phrase 'що ти робиш?')
  - я (I)
  - ти (you, informal)
  - він (he)
  - вонá (she)
  - ми (we)
  - ви (you, formal/plural)
  - вонú (they)
  recommended:
  - читáти (to read - already taught in M15)
  - відпочивáти (to rest)
  - снідати (to have breakfast)
  - обідати (to have lunch)
  - вечеряти (to have dinner)
activity_hints:
- type: fill-in
  focus: Complete sentences with the correct verb form (e.g., Я ___ (працювати) в офісі)
  items: 10
- type: match-up
  focus: Match pronouns (я, ти, він) with verb endings (-ю, -єш, -є)
  items: 6
- type: quiz
  focus: Choose the correct conjugation based on context
  items: 8
connects_to:
- a1-017 (Speaking and Seeing Group 2)
prerequisites:
- a1-015 (What I Like)
grammar:
- Present tense Group 1 (-ати) conjugation
- Personal pronouns review
register: розмовний
references:
- title: "ULP Season 1, Episode 8 — Professions and jobs in Ukrainian + Verb conjugation"
  url: https://www.ukrainianlessons.com/episode8/
  notes: "Follows Anna's approach of introducing Type 1 conjugation early and through practical situations like talking about work."
