module: a1-049
level: A1
sequence: 49
slug: holidays-and-traditions
version: '1.0'
title: Holidays And Traditions
subtitle: Culture and celebrations
focus: vocabulary
pedagogy: PPP
phase: A1.7 [People & Communication]
word_target: 1200
objectives:
- Learn the names of major Ukrainian holidays
- Say common greetings for holidays (З Різдвом, З днем народження)
- Talk about celebration traditions briefly
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Wishing someone a happy birthday. ''З днем народження!'''
  - 'Dialogue 2: Talking about Christmas traditions. Kutia, family dinner.'
- section: Свята (Holidays)
  words: 400
  points:
  - 'Vocabulary: свято (holiday), Новий рік, Різдво, Великдень, День Незалежності, День народження.'
- section: Привітання (Greetings)
  words: 400
  points:
  - 'How to congratulate: ''Вітаю з...'' (I congratulate you with...) + Instrumental.'
  - 'Chunks: З Новим роком! З Різдвом! З днем народження!'
vocabulary_hints:
  required:
  - свято
  - Новий рік
  - Різдво
  - Великдень
  - День Незалежності
  - День народження
  - вітаю
  - з (with - for greetings)
  recommended:
  - подарунок
  - ялинка
  - родина
  - святкувати
activity_hints:
- type: matching
  focus: Match the greeting to the holiday
  items: 8
- type: reading-comprehension
  focus: Read short text about Ukrainian Christmas
  items: 5
connects_to:
- a1-050 (Checkpoint Communication)
prerequisites:
- a1-024 (Months And Seasons)
- a1-046 (Give Me I Like)
grammar:
- Instrumental in greetings (З Новим роком)
register: розмовний
references: []
