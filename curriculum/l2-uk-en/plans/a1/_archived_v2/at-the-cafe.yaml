module: a1-039
level: A1
sequence: 39
slug: at-the-cafe
version: '1.0'
title: At The Cafe
subtitle: Ordering, menu, and bill
focus: communication
pedagogy: PPP
phase: A1.6 [Food & Shopping]
word_target: 1200
objectives:
- Read a simple menu in Ukrainian
- Order food and drinks at a cafe
- Ask for the bill and understand tipping culture
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Ordering at a coffee shop counter. ''Мені, будь ласка, американо.'''
  - 'Dialogue 2: Sitting at a restaurant, asking the waiter for the menu and the bill.'
- section: Меню (The Menu)
  words: 400
  points:
  - 'How to read categories: Напої (Drinks), Десерти (Desserts), Основні страви (Main courses).'
  - Using 'Мені, будь ласка...' (To me, please...) + Accusative to order.
- section: Рахунок і чайові (Bill and tipping)
  words: 400
  points:
  - Asking 'Можна рахунок?' (Can I have the bill?).
  - 'Cultural note: Tipping (чайові) in Ukraine is usually 10%, often left in cash or added via a terminal.'
vocabulary_hints:
  required:
  - кафе
  - ресторан
  - меню
  - рахунок
  - офіціант
  - будь ласка
  - замовляти
  - напій
  - десерт
  recommended:
  - чайові
  - страва
  - смачного
