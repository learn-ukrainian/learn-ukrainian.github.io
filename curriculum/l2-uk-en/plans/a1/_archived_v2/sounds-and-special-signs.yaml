module: a1-002
level: A1
sequence: 2
slug: sounds-and-special-signs
version: '1.0'
title: Sounds and Special Signs
subtitle: "Soft Sign, Apostrophe, and the Soul of Ukrainian Sounds"
focus: phonetics
pedagogy: PPP
phase: A1.1 [Script & First Contact]
word_target: 1200
objectives:
- Distinguish hard and soft consonants by ear and in writing
- Read words with the soft sign (ь) and apostrophe (') correctly
- Tell voiced from voiceless consonants through minimal pairs
- Pronounce the tricky Ukrainian sounds И, Г, Р correctly
content_outline:
- section: "М'який знак (The Soft Sign — Ь)"
  words: 250
  points:
  - "The soft sign Ь has no sound of its own — it softens the consonant
    before it. Compare: син (son) vs синь (blue, poetic) — the Ь
    makes the Н soft. Сіль (salt), день (day), мідь (copper)."
  - "Where Ь appears: only after consonants, never at the start of a word.
    Common patterns: -нь (день, кінь), -ль (сіль, кіль), -ть (мить, путь).
    Practice reading: учитель (teacher), батько (father), маленький (small)."
  - "The Ь changes meaning: син (son) vs синь (blue colour, poetic).
    But most importantly it changes how the word SOUNDS — Ukrainian ears
    immediately notice if you skip the softening."
- section: "Апостроф (The Apostrophe — ')"
  words: 200
  points:
  - "The apostrophe separates a consonant from a following Я, Ю, Є, Ї.
    Without it, these letters would soften the consonant. With it, the
    consonant stays hard and the vowel gets its full й-sound."
  - "Examples: сім'я [sim-JA] (family) — without apostrophe it would be
    *сімя with a soft М. П'ять [p-JATJ] (five), м'ясо [m-JASO] (meat),
    об'єкт [ob-JEKT] (object), комп'ютер [komp-JUTER] (computer)."
  - "Reading practice with apostrophe words: п'ять, дев'ять, м'який,
    м'ята, м'яч, сім'я, комп'ютер. The apostrophe is one of the most
    distinctive features of Ukrainian spelling."
- section: Дзвінкі і глухі (Voiced and Voiceless)
  words: 200
  points:
  - "Ukrainian consonants come in voiced-voiceless pairs. Put your hand
    on your throat — if it vibrates, the sound is voiced:
    Б-П, Д-Т, Г-Х, Ґ-К, З-С, Ж-Ш, ДЗ-Ц, ДЖ-Ч."
  - "Unlike Russian, Ukrainian does NOT devoice consonants at the end of
    words. Ukrainians say дуб [dub] NOT *[dup], мороз [moroz] NOT *[moros].
    This is an important feature of authentic Ukrainian pronunciation."
  - "Minimal pairs for practice: башта (tower) vs пашта (doesn't exist)
    or балка (beam) vs палка (stick), дім (house) vs тім (shadow, regional),
    коза (goat) vs коса (braid)."
- section: Важкі звуки (Tricky Sounds)
  words: 250
  points:
  - "The Ukrainian И — not like English 'ee' or 'i'. It lives between them.
    Anna Ohoiko's tip from ULP Episode 5: smile as if saying 'ee' but
    pull your tongue slightly back. Practice: бик (bull), лист (letter),
    зима (winter), тихо (quiet), синій (blue)."
  - "The Ukrainian Г — a voiced glottal fricative [ɦ], like saying 'h'
    but with voice. NOT the hard Russian Г [g]. Words: гарно (nice),
    гори (mountains), голова (head), гарячий (hot). The Ґ [g] sound
    exists but only in a few words: ґанок, ґудзик, ґречний."
  - "The Ukrainian Р — rolled/trilled, like Spanish or Italian R.
    English speakers often struggle with this. Practice words: рука (hand),
    робота (work), ранок (morning), риба (fish). Even if your Р isn't
    perfect yet, Ukrainians will understand you."
- section: Діалоги (Dialogues)
  words: 300
  points:
  - "Pronunciation coach scene: a Ukrainian friend helps a foreigner read
    a menu. The menu has words with soft signs (сіль, мідь), apostrophes
    (м'ясо, п'ять), and tricky sounds (горіхи, риба, гарячий чай).
    The friend gently corrects pronunciation — modeling how Ukrainians
    actually help learners."
  - "Sound comparison game within dialogue: friend says pairs of words
    and learner identifies which is which — балка/палка, день/тінь,
    сіль/сил. Building the ear for Ukrainian sound distinctions."
  - "Reading a Ukrainian poem fragment — something short and musical that
    exercises the sounds learned. Тарас Шевченко's words are perfect
    for this: familiar to every Ukrainian, with rich consonant variety."
vocabulary_hints:
  required:
  - сім'я (family) — apostrophe word, essential vocabulary
  - день (day) — soft sign after Н
  - сіль (salt) — soft sign after Л
  - м'ясо (meat) — apostrophe after М
  - п'ять (five) — apostrophe after П, essential number
  - "кішка (cat) — И/І sound contrast practice"
  - гáрно (nicely, beautifully) — Г [ɦ] practice
  - риба (fish) — Р and И practice together
  recommended:
  - бáтько (father, formal) — soft sign in common word
  - учитель (teacher, male) — soft sign at word end
  - дев'ять (nine) — apostrophe word
  - комп'ютер (computer) — apostrophe in cognate
  - м'який (soft) — apostrophe + soft sign in same word
  - горíхи (nuts) — Г + Р practice
activity_hints:
- type: quiz
  focus: "Hear a word — does it have a soft sign or not?"
  items: 10
- type: match-up
  focus: Match voiced-voiceless consonant pairs (Б-П, Д-Т, etc.)
  items: 8
- type: fill-in
  focus: "Add the missing soft sign or apostrophe: сім_я, п_ять, ден_"
  items: 8
- type: quiz
  focus: Choose the correct word based on description (minimal pairs)
  items: 8
