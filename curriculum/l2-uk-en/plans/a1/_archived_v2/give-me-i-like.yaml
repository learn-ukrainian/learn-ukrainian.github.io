module: a1-046
level: A1
sequence: 46
slug: give-me-i-like
version: '1.0'
title: Give Me, I Like
subtitle: Dative basics
focus: grammar
pedagogy: PPP
phase: A1.7 [People & Communication]
word_target: 1200
objectives:
- Use the Dative case for indirect objects (to someone)
- Understand the mechanics behind 'мені подобається'
- Learn Dative pronouns (мені, тобі, йому, їй, нам, вам, їм)
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Gift giving. ''Я даю тобі подарунок.'''
  - 'Dialogue 2: Expressing preferences. ''Тобі подобається Київ? Так, мені дуже подобається.'''
- section: Кому? (To whom?)
  words: 400
  points:
  - 'Introduce Dative pronouns: мені (to me), тобі (to you), йому (to him/it), їй (to her), нам (to us),
    вам (to you pl), їм (to them).'
  - 'Verbs that take Dative: давати (to give), казати/говорити (to say/tell), допомагати (to help).'
- section: Мені подобається (I like it)
  words: 400
  points:
  - 'Deconstruct ''мені подобається''. Literally: ''to me it is pleasing''.'
  - Contrast with 'я люблю' (I love - takes Accusative).
vocabulary_hints:
  required:
  - мені
  - тобі
  - йому
  - їй
  - нам
  - вам
  - їм
  - давати
  - допомагати
  - подобається
  recommended:
  - подарунок
  - казати
  - телефонувати
activity_hints:
- type: fill-in
  focus: Choose the correct Dative pronoun
  items: 10
- type: transformation
  focus: Change Nominative pronouns to Dative
  items: 7
connects_to:
- a1-047 (Linking Ideas)
prerequisites:
