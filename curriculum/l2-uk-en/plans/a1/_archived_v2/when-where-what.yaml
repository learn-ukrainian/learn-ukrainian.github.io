module: a1-048
level: A1
sequence: 48
slug: when-where-what
version: '1.0'
title: When, Where, What
subtitle: Subordinate clauses
focus: grammar
pedagogy: PPP
phase: A1.7 [People & Communication]
word_target: 1200
objectives:
- Build complex sentences using 'що', 'де', 'коли', 'якщо'
- Express thoughts and knowledge (Я думаю, що...)
- Form basic conditional sentences (Якщо... то...)
content_outline:
- section: Діалоги (Dialogues)
  words: 400
  points:
  - 'Dialogue 1: Sharing opinions. ''Я думаю, що це гарна ідея.'''
  - 'Dialogue 2: Planning with conditions. ''Якщо буде дощ, ми будемо вдома.'''
- section: Я знаю, що... (I know that...)
  words: 400
  points:
  - Using 'що' (that) as a connector, not just a question word. 'Я знаю, що ти вдома.'
  - Using 'де' (where) and 'коли' (when) to connect clauses. 'Я не знаю, де мій телефон.'
- section: Якщо (If)
  words: 400
  points:
  - Basic conditions. 'Якщо..., то...' (If..., then...).
  - 'Example: ''Якщо ти хочеш, ми можемо піти в кафе.'''
vocabulary_hints:
  required:
  - що (that)
  - де (where)
  - коли (when)
  - якщо
  - то
  - думати
  - знати
  recommended:
  - ідея
  - розуміти
  - можливо
activity_hints:
- type: fill-in
  focus: Insert the correct connector (що, де, коли, якщо)
  items: 10
- type: sentence-ordering
  focus: Reconstruct complex sentences
  items: 6
