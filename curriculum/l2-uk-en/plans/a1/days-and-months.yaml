module: a1-023
level: A1
sequence: 23
slug: days-and-months
version: '1.0'
title: Days and Months
subtitle: "У понеділок, у січні — the calendar in Ukrainian"
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Time and Nature]
word_target: 1200
objectives:
- Name all 7 days of the week and use "on" (у/в + day as chunk)
- Name all 12 months and 4 seasons
- Say dates using ordinal numbers (as chunks)
- Plan a week using days, times, and activities
content_outline:
- section: "Діалоги (Dialogues)"
  words: 300
  points:
  - "Dialogue 1 — Planning the week (ULP Ep15 pattern):
    — Що ти робиш у понеділок? — Я працюю. А у вівторок?
    — У вівторок я вивчаю українську. — А у суботу?
    — У суботу гуляю. Неділя — вільний день!
    Days of the week in practical scheduling."
  - "Dialogue 2 — When is your birthday?
    — Коли у тебе день народження? — У березні.
    — Якого числа? — П'ятнадцятого березня. А у тебе?
    — У мене в серпні. — О, це літо!
    Months and seasons in personal context."
- section: "Дні тижня (Days of the Week)"
  words: 300
  points:
  - "Seven days — all LOWERCASE in Ukrainian (not capitalized like English):
    понеділок (Monday), вівторок (Tuesday), середа (Wednesday),
    четвер (Thursday), п'ятниця (Friday), субота (Saturday), неділя (Sunday).
    Вашуленко Grade 2 p.83: planning your week activity.
    Note: неділя = Sunday AND 'week' in some dialects. Standard 'week' = тиждень."
  - "'On' a day = у/в + accusative (chunk — no grammar analysis):
    у понеділок, у вівторок, у середу, у четвер,
    у п'ятницю, в суботу, в неділю.
    Note the endings change — just memorize each form."
- section: "Місяці і пори року (Months and Seasons)"
  words: 300
  points:
  - "12 months — also lowercase, organized by season:
    Зима: грудень (Dec), січень (Jan), лютий (Feb).
    Весна: березень (Mar), квітень (Apr), травень (May).
    Літо: червень (Jun), липень (Jul), серпень (Aug).
    Осінь: вересень (Sep), жовтень (Oct), листопад (Nov).
    All months are masculine. Many come from nature words
    (березень ← береза, липень ← липа, листопад ← листя падає)."
  - "4 seasons: зима (winter, f), весна (spring, f), літо (summer, n), осінь (autumn, f).
    'In' a month/season = у/в + locative (chunk):
    у січні, у лютому, в березні... влітку, взимку, восени, навесні.
    Seasonal forms are irregular — memorize as chunks."
- section: "Підсумок — Summary"
  words: 300
  points:
  - "Calendar vocabulary:
    Days: понеділок → неділя (у понеділок, в суботу).
    Months: січень → грудень (у січні, в серпні).
    Seasons: зима, весна, літо, осінь (взимку, навесні, влітку, восени).
    Self-check: What day is today? What month? What season?
    When is your birthday? Plan your next week in Ukrainian."
vocabulary_hints:
  required:
  - понеділок, вівторок, середа (Mon, Tue, Wed)
  - четвер, п'ятниця (Thu, Fri)
  - субота, неділя (Sat, Sun)
  - тиждень (week, m)
  - зима, весна, літо, осінь (winter, spring, summer, autumn)
  recommended:
  - січень, лютий, березень (Jan, Feb, Mar)
  - квітень, травень, червень (Apr, May, Jun)
  - липень, серпень, вересень (Jul, Aug, Sep)
  - жовтень, листопад, грудень (Oct, Nov, Dec)
  - день народження (birthday)
activity_hints:
- type: fill-in
  focus: "Put days in order: понеділок, ___, середа, ___, п'ятниця, ___, ___"
  items: 7
- type: quiz
  focus: "Which season? січень → зима, квітень → весна"
  items: 8
- type: fill-in
  focus: "Plan your week: У понеділок я ___, у вівторок ___..."
  items: 5
- type: match-up
  focus: "Match months to seasons: березень ↔ весна"
  items: 8
connects_to:
