activity_hints:
- description: Розрізнити позиції критиків Андруховича. Чия це теза — апологетів "карнавалу" чи опонентів "ескапізму"?
  focus: Розуміння конфліктної карти
  items: 5
  type: quiz
- description: 'Вставити в речення терміни з модуля: іронія, гротеск, карнавал, деконструкція, кітч.'
  focus: Словник постмодерніста
  items: 5
  type: fill-in
- description: Порівняйте, як іронія працює в «Московіаді» Андруховича та «Ворошиловграді» Жадана. Що спільного й відмінного
    в їхньому способі деконструювати радянську спадщину?
  focus: 'Порівняльний аналіз: Андрухович vs Жадан'
  type: note
- description: Напишіть есе (400-600 слів) на тему "Чи є місце для постмодерної іронії в українській культурі під час повномасштабної
    війни?". Аргументуйте свою позицію, посилаючись на твори Андруховича та сучасний контекст.
  focus: 'Есе: Актуальність постмодерної іронії'
  type: essay-response
