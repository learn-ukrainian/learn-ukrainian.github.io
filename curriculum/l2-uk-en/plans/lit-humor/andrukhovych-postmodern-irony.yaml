content_outline:
- points:
  - 'Провокація: "Імперії треба руйнувати зсередини, а найкращий інструмент для цього — сміх", — писав Андрухович. Чи може
    анекдот бути сильнішим за танк?'
  - 'Цитата-загадка: "Я, Отто фон Ф., прибув сюди з однією, але палкою метою: розвалити цю тюрму народів..." — Хто цей герой
    і яку саме "тюрму" він збирається валити?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Андрухович — визволитель української літератури з лещат соцреалізму, що відкрив їй шлях до європейського постмодерну?
    Чи його "карнавальність" — це лише інтелектуальна гра для обраних, втеча від великих національних тем?'
  - 'Дебат 2: "Станіславський феномен" — це автентичний вибух регіональної енергії, що створив новий літературний центр? Чи
    це успішний маркетинговий проєкт, що канонізував лише вузьке коло "своїх"?'
  - '[!epistemic-humility] Критики досі сперечаються, чи є іронія Андруховича руйнівною силою чи конструктивною деконструкцією.'
  section: 'Конфліктна карта: Карнавал чи ескапізм?'
  words: 900
- points:
  - 'Уривок: Подорож героя-поета лабіринтами московського метро та пивних — метафора блукання в серці вмираючої імперії.'
  - 'Аналіз наративу: Потік свідомості, гротескні образи, колаж із радянських кліше та міфів. Як створюється відчуття абсурдності
    та приреченості "Третього Риму".'
  - 'Система персонажів: "братні народи" як мешканці пекла, що розмовляють дикою сумішшю мов. Образ імперії як велетенського
    Вавилону.'
  - '[!decolonization] «Московіада» — це маніфест прощання з Москвою як культурним центром. Андрухович демонстративно "вбиває"
    в собі "російську культуру" через сміх і огиду, утверджуючи українську суб''єктність.'
  section: 'Читання: Фрагмент з роману «Московіада»'
  words: 1700
- points:
  - 'Техніки комічного: Пародіювання радянського "новоязу", використання суржику та макаронічної мови, гра з літературними
    алюзіями, гіперболізація.'
  - 'Ціль аналізу: Хто є об''єктом сатири? Не лише імперська влада, а й українська провінційність, шароварництво, псевдо-патріотичний
    пафос.'
  - 'Функція гумору: Іронія як спосіб звільнитися від травми, як інструмент десакралізації тоталітарних ідолів. Сміх як територія
    свободи.'
  - '[!myth-buster] Поширений міф, що постмодерна іронія — це цинізм і відсутність цінностей. У випадку Андруховича, це спосіб
    захистити справжні цінності (свободу, індивідуальність, європейськість) від їхньої профанації.'
  section: 'Механіка сміху: Постмодерна іронія як метод'
  words: 1200
- points:
  - 'Повернення до розминки: Чи може сміх зруйнувати імперію? Відповідь після аналізу «Московіади».'
  - 'Історія рецепції: Як сприймали прозу Андруховича в 90-ті (як ковток свободи) і як читають зараз (як історичний документ
    епохи)?'
  - 'Сучасна актуальність: Чи досі працює іронія в часи повномасштабної війни? Чи потрібен літературі новий, "прямий" пафос?'
  - '[!anti-hagiography] Андруховича часто звинувачують у надмірній елітарності та відірваності від "простого народу". Наскільки
    справедливий цей закид? Обговорення ролі інтелектуала в суспільстві.'
  section: Дискусія та підсумок
  words: 700
