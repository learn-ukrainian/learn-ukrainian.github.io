- Аналізувати творчість Юрія Андруховича в контексті українського постмодернізму та деконструкції імперських міфів
- Розрізняти ключові риси поетики автора: іронію, гротеск, карнавальність
- Формулювати власну позицію в літературно-критичних дебатах щодо ролі "станіславського феномену"
- Критично оцінювати функцію та межі іронії як мистецького методу в сучасному українському суспільстві
