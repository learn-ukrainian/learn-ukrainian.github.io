content_outline:
- points:
  - 'Провокація: Що якби поет XVII століття писав про рок-музику? Історія містифікації «Галицька анармія».'
  - Фрагмент «знайденого» вірша, що приписується Анні Любовичівні — без згадки, що це містифікація.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Літературна містифікація — це витончене шахрайство чи високе мистецтво? Позиція Винничука vs обурення академічних
    кіл.'
  - 'Дебат 2: Чи є створення «фейкової» історії деконструкцією імперського наративу, чи його небезпечною імітацією в епоху
    пост-правди?'
  - '[!epistemic-humility] Аргументи критиків, що сприйняли містифікації за правду, та контраргументи тих, хто бачив у цьому
    гру та провокацію.'
  section: 'Конфліктна карта: Містифікація як мистецтво'
  words: 900
- points:
  - Уривки з містифікованого циклу «Плач над градом Глуповом» — аналіз пародіювання стилю бароко.
  - Приклади з «Halytska anarmiia» — як Винничук імітує поетику Розстріляного відродження та додає анахронізми.
  - 'Аналіз мови: використання архаїзмів, діалектизмів та вигаданих слів для створення ефекту «автентичності».'
  - '[!decolonization] Винничук створює альтернативну, «веселу» історію української літератури як противагу до нав''язаного
    імперією образу вічної жертви та страждання.'
  section: 'Читання: Тексти неіснуючих поетів'
  words: 1800
- points:
  - 'Комічні механізми: пародія на академічний стиль, анахронізми, змішування високого і низького.'
  - 'Аналіз цілей: кого/що висміює автор? Радянську цензуру, пихатість літературних критиків, імперські стереотипи про «малоросійську»
    літературу.'
  - 'Культурна специфіка: галицький гумор, батярська традиція як джерело натхнення.'
  - '[!myth-buster] Руйнування міфу про українську літературу як виключно серйозну та «народницьку». Винничук доводить, що
    вона може бути грайливою, міською та еротичною.'
  section: 'Механіка сміху: Іронія, пародія, та гра з каноном'
  words: 1200
- points:
  - 'Повернення до розминки: Чи змінює ваше сприйняття вірша знання про те, що це містифікація? Чому?'
  - 'Історія рецепції: як реагували читачі та критики, коли обман розкривався? Чи змінювалась реакція з часом?'
  - 'Сучасна релевантність: В епоху фейкових новин та deepfakes, що містифікації Винничука говорять нам про природу правди
    та авторитету?'
  - '[!anti-hagiography] Погляд на Винничука не лише як на геніального містифікатора, але і як на культурного провокатора,
    що кидає виклик усталеним нормам.'
  section: Дискусія та підсумок
  words: 700
focus: Yurii Vynnychuk's literary hoaxes, satire as deconstruction, the "Halytska anarmiia" hoax, myth-making and myth-breaking
  in post-Soviet literature
level: LIT-HUMOR
module: lit-humor-012
objectives:
- Аналізувати літературні містифікації як форму мистецтва та інструмент деконструкції канону.
- Пояснювати, як гумор та пародія можуть слугувати деколонізаційним інструментом, що руйнує імперські міфи про українську
  культуру.
- Розрізняти стилістичні риси, що їх Винничук імітує у своїх містифікаціях (бароко, романтизм, соцреалізм).
- Формулювати аргументовану позицію щодо етичних та естетичних аспектів містифікації в сучасному світі.
pedagogy: CBI
persona:
  role: Провокатор, що ставить під сумнів усе, що ви вважали «правдою» про літературу. Допомагає розрізнити факти від вигадки,
    а потім питає, чи це взагалі важливо.
  voice: Postmodern-Trickster
phase: LIT.HUMOR.2
