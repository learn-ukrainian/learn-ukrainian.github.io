    ефекту
  pos: ж.
  word: пародія
- definition: порушення хронологічної точності; свідоме внесення в опис однієї епохи реалій іншої, часто як художній прийом
  pos: ч.
  word: анахронізм
- definition: сукупність творів, визнаних зразковими для певної літератури; у Винничука — об'єкт гри та деконструкції
  pos: ч.
  word: канон
- definition: напрям у мистецтві, для якого характерні іронія, гра з цитатами, фрагментарність та руйнування традиційних авторитетів
  pos: ч.
  word: постмодернізм
- definition: здатність бути активним творцем власної історії та культури, а не пасивним об'єктом зовнішніх впливів
  pos: ж.
  word: суб''єктність
- definition: метод аналізу, що виявляє внутрішні суперечності тексту та руйнує усталені ієрархії смислів, часто застосовується
    до ідеологічних наративів
  pos: ж.
  word: деконструкція
- definition: наука про те, як пишеться історія; сукупність історичних праць на певну тему, яку Винничук часто пародіює
  pos: ж.
  word: історіографія
- definition: розповідь або спосіб викладу подій; система поглядів, що формує розуміння історії та культури
  pos: ч.
  word: наратив
- definition: процес звільнення від колоніальної спадщини в політиці, культурі та свідомості; у літературі — перегляд імперських
