objectives:
- Аналізувати функцію гумору як інструменту культурного опору та деколонізації на прикладі "Енеїди"
- Розрізняти ключові механізми комічного (бурлеск, травестія, іронія, пародія)
- Критично оцінювати місце сатиричних творів в українському літературному каноні
- Формулювати аргументовану позицію щодо тяглості традиції "зброї сміху" від Котляревського до сьогодення
pedagogy: CBI
