activity_hints:
- description: Перевірка розуміння двох дебатів про функцію та статус гумору в літературі. Чия це теза?
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити правильний термін (бурлеск, травестія, іронія, пародія) в речення, що описує приклад з "Енеїди".
  focus: Механізми комічного
  items: 4
  type: fill-in
- description: Наведіть 2-3 приклади з модуля, як Котляревський використовує сміх для деконструкції імперського наративу.
    Поясніть механізм.
  focus: 'Аналіз: Деконструкція імперського наративу'
  type: note
- description: Чи є сучасний український гумор (меми, стендап, сатиричні телеграм-канали) продовженням традиції, яку започаткував
    Котляревський? Аргументуйте свою позицію, спираючись на поняття з модуля (400-600 слів).
  focus: 'Есе: Сучасна зброя сміху'
  type: essay-response
cefr_min: C1
connects_to:
- lit-prose-vyshnya
- lit-poetry-eneida-full
