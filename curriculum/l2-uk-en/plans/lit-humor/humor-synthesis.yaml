content_outline:
- points:
  - 'Провокація: Чому перший твір нової української літератури — це не героїчна поема і не трагедія, а саме бурлескна пародія?'
  - 'Цитата: "Еней був парубок моторний / І хлопець хоть куди козак". Без контексту — що ці рядки говорять про головного героя
    епосу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Функція сміху. Це зброя для зовнішнього ворога (висміювання імперських порядків) чи ліки для себе (збереження
    здорового глузду в умовах поневолення)?'
  - 'Дебат 2: Канонізація гумору. Чи є сатира "низьким" жанром порівняно з "високою" трагедією? Чому критики довго ігнорували
    комічне як серйозний об''єкт аналізу?'
  - '[!epistemic-humility] Немає єдиної "теорії гумору". Фройд, Бергсон, Бахтін пропонують різні, іноді суперечливі, пояснення
    природи комічного.'
  section: 'Конфліктна карта: Навіщо сміються над імперією?'
  words: 900
- points:
  - 'Фрагмент тексту: опис пекла та раю в "Енеїді" — пародіювання соціальної ієрархії та "нагород" за гріхи/чесноти.'
  - 'Аналіз структури: Як Котляревський "українізує" античний сюжет? Переодягання олімпійських богів у козацьку старшину як
    політичний жест.'
  - 'Мова як зброя: використання просторіччя, лайки, макаронізмів для деконструкції високого імперського стилю класицизму.'
  - '[!decolonization] "Енеїда" — не просто "перелицьований" Вергілій, а маніфест культурної окремішності. Доказ, що українська
    мова здатна творити велику літературу, а не є "малоросійським наріччям".'
  section: 'Читання: "Енеїда" Івана Котляревського'
  words: 1700
- points:
  - 'Комічні механізми: бурлеск (високий сюжет низьким стилем), травестія (герої в комічному вигляді), іронія (висміювання
    чиновників, панів).'
  - 'Аналіз цілі: Хто є головною мішенню сатири? Не так троянці чи латиняни, як корумпована бюрократія, пихате панство та
    інститути Російської імперії.'
  - '[!myth-buster] "Енеїда" — не лише "сміховинка". Це глибоко патріотичний твір, що утверджує козацькі цінності та тугу
    за втраченою гетьманською державою.'
  - 'Культурна специфіка: гумор, побудований на українських прислів''ях, обрядах, гастрономічних реаліях, який був зрозумілий
    своїм, але незрозумілий імперському цензору.'
  section: 'Механіка сміху: Як працює сміх Котляревського'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чому саме пародія стала першим твором? Відповідь студента на основі аналізу.'
  - 'Рецепція: Як "Енеїду" читали сучасники (з острахом і захопленням) і як її "причесали" в радянському літературознавстві
    (вилучивши антиімперський заряд).'
  - 'Сучасна релевантність: меми про "русскій воєнний корабль", пісні про Байрактар — чи є це продовженням традиції сміхової
    культури опору, закладеної Котляревським?'
  - '[!anti-hagiography] Котляревський не був радикальним революціонером. Він був офіцером імперської армії, масоном, і його
    твір — це складна гра з цензурою, а не відкритий виклик.'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз сміху як інструменту культурного опору та деколонізації, від "Енеїди" до сучасності
level: LIT.HUMOR
