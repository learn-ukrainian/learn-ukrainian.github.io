objectives:
- Аналізувати інтернет-меми як сучасну форму фольклору та інструмент культурного спротиву.
- Розрізняти ключові механізми комічного (іронія, пародія, сатира, гротеск) на прикладі української інтернет-творчості.
- Формулювати аргументовану позицію в дебатах про статус цифрового мистецтва та його місце в національній культурі.
- Критично оцінювати роль гумору у зміцненні національної стійкості та деконструкції імперських міфів.
