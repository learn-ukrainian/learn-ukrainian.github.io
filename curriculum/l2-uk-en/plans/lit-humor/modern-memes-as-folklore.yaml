content_outline:
- points:
  - 'Провокація: Чи може мем про тракторні війська вважатися новим народним епосом? Занурюємось у світ Modern Memes As Folklore.'
  - 'Цитата (опис мему): Зображення спокійного українського фермера, що тягне трактором новітній російський танк. Підпис:
    "Добрий вечір, ми з України".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є інтернет-меми справжнім фольклором? Позиція "цифрових романтиків" (меми — це нова усна історія) vs позиція
    "культурних пуристів" (меми — це ефемерна розвага, не мистецтво).'
  - 'Дебат 2: MMAF — автентична народна творчість чи продуманий медіапроєкт? Дискусія про анонімність, колективне авторство
    та комерціалізацію в епоху цифрових медіа.'
  - '[!epistemic-humility] Немає єдиної відповіді. Аналізуємо аргументи обох сторін, щоб зрозуміти складність феномену.'
  section: 'Конфліктна карта: Фольклор чи хайп?'
  words: 900
- points:
  - 'Аналіз серії мемів "Тракторні війська": образ українського фермера як трикстера, що перемагає не силою, а хитрістю та
    спокоєм.'
  - 'Аналіз серії мемів "Бойові гуси" та "Привид Києва": творення новітньої міфології та її функція — підняття бойового духу.'
  - 'Структура жарту: як будується розповідь у серії мемів, повторювані персонажі та ситуації, що створюють цілий всесвіт.'
  - '[!decolonization] Меми як зброя проти імперського наративу. Аналіз того, як MMAF висміює "другу армію світу", руйнуючи
    міф про її непереможність.'
  section: 'Читання: Ключові наративи MMAF'
  words: 1800
- points:
  - 'Комічні механізми: аналіз використання іронії, сатири, гротеску та абсурду в мемах MMAF.'
  - 'Ціль сатири: хто є об''єктом висміювання? (російські солдати, командування, пропагандисти, імперські амбіції).'
  - 'Культурна специфіка: аналіз мемів, гумор яких базується на українських культурних кодах, незрозумілих для зовнішнього
    спостерігача.'
  - '[!myth-buster] Розвінчання міфу про "братські народи": як чорний гумор стає способом психологічного розмежування та утвердження
    власної ідентичності.'
  section: 'Механіка сміху: Гумор як спротив'
  words: 1200
- points:
  - 'Повернення до розминки: тож тракторні війська — це епос чи ні? Формулюємо власну аргументовану відповідь.'
  - 'Рецепція: як змінювалась тональність мемів від перших днів повномасштабного вторгнення до сьогодні? Від розгубленості
    до впевненості.'
  - '[!anti-hagiography] Критичний погляд: чи всі меми однаково корисні? Дискусія про межі гумору, ризики дегуманізації та
    мови ворожнечі.'
  - 'Студентське есе: Яку роль відіграє гумор у вашому особистому досвіді переживання війни?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз феномену Modern Memes As Folklore, його роль у деколонізації та механізми сміху як інструменти спротиву та національної
  стійкості.
