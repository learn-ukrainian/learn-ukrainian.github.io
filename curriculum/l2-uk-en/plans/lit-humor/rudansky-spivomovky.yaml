activity_hints:
- description: Кому належить теза? Визначте, яка позиція (народницька чи модерністська) відповідає наведеній цитаті про творчість
    Руданського.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставте назву комічного прийому (іронія, сатира, гротеск, пародія) у речення, що описує уривок зі співомовки.
  focus: Механізми сміху
  items: 5
  type: fill-in
- description: Подано дві співомовки. В одній — добра гумористична ситуація, в іншій — гостра соціальна сатира. Порівняйте
    їхні цілі, об'єкти та мовні засоби. Чому одна просто смішна, а інша — викривальна?
  focus: 'Джерельний аналіз: Сатира vs Гумор'
  type: note
- description: Оберіть одну зі співомовок Руданського та перепишіть її в сучасному форматі (допис у соцмережі, сценарій для
    ТікТок-відео, стендап-монолог). Поясніть, які елементи оригіналу ви зберегли, а які змінили, щоб гумор став зрозумілим
    сучасній аудиторії (300-500 слів).
  focus: 'Есе: Сучасна адаптація "Співомовки"'
  type: note
