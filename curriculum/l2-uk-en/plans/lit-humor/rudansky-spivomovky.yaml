content_outline:
- points:
  - 'Провокація: Чи може звичайний анекдот бути гострішим за шаблю? Розбираємо на прикладі співомовки, де селянин обдурює
    пана.'
  - 'Цитата-загадка: "Дешево та сердито!" — як ця фраза, що стала крилатою, відображає основний принцип гумору Руданського?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Руданський — "поет для народу", що лише записував фольклор, чи свідомий літератор, що використовував фольклорні
    мотиви для складних ідей?'
  - 'Дебат 2: Гумор Руданського — це безневинна розвага чи прихована критика імперії та соціальної несправедливості?'
  - '[!epistemic-humility] Радянське літературознавство бачило в ньому лише "співця селянської долі". Сучасні дослідники вбачають
    елементи екзистенціалізму та постколоніальної критики.'
  section: 'Конфліктна карта: Народний поет чи витончений сатирик?'
  words: 900
- points:
  - Повний текст співомовок з паралельним аналізом
  - 'Наративна структура: як будується комічний ефект від зав''язки до несподіваної розв''язки?'
  - 'Система персонажів: опозиція "пан/піп/шинкар vs мужик/козак/циган". Хто завжди виявляється розумнішим і чому?'
  - '[!decolonization] Руданський утверджує український розум та кмітливість як інструмент виживання в умовах імперського
    тиску. "Маленька людина" перемагає не силою, а інтелектом.'
  section: 'Читання: Співомовки "Пан та Іван в дорозі" і "Добре торгувалось"'
  words: 1800
- points:
  - 'Аналіз комічних прийомів: іронія, сарказм, гротеск, абсурдистська логіка, гра слів.'
  - 'Мова як джерело гумору: використання діалектизмів, макаронічної мови (суржику), створення комічних неологізмів.'
  - 'Ціль сатири: хто є об''єктом висміювання? Імперські чиновники, зажерливе духовенство, зарозуміла шляхта, чи вади самих
    українців?'
  - '[!myth-buster] Руданський не ідеалізує народ. Він висміює і його недоліки: жадібність, заздрість, обмеженість.'
  - '[!decolonization] Висміювання "москаля" чи "ляха" — це не ксенофобія, а спосіб деконструкції імперського міфу про "старшого
    брата".'
  section: 'Механіка сміху: Як Руданський змушує нас сміятися?'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи є сміх Руданського зброєю? Проти кого чи чого вона спрямована?'
  - 'Історія рецепції: чому радянська влада дозволяла Руданського, "каструючи" його сатиру до рівня побутового гумору?'
  - '[!anti-hagiography] Руданський як людина: лікар, що безкоштовно лікував бідних, але водночас мав складний характер і
    конфліктував з оточенням.'
  - 'Сучасна релевантність: чи актуальні "Співомовки" сьогодні в епоху мемів та стендапу? Які теми Руданського резонують з
    сучасною Україною?'
  section: Дискусія та підсумок
  words: 700
