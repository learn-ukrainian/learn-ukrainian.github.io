activity_hints:
- description: Кому належить теза? Розподіліть аргументи між таборами «постмодерністів» та «пуристів».
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: Вставте пропущені слова (суржик, обсценна лексика, філософські терміни) у цитати з «Гамлета».
  focus: Мова Подерв'янського
  items: 8
  type: fill-in
- description: Проаналізуйте поданий уривок з п’єси. Визначте 2-3 ключові комічні механізми (гротеск, іронія, пародія, абсурд)
    та поясніть, як вони працюють і який ефект створюють.
  focus: Аналіз комічних механізмів
  type: note
- description: Напишіть есе (400-600 слів), де ви аргументуєте «за» або «проти» включення «Гамлета» Подерв’янського до оновленого
    шкільного канону української літератури. Використовуйте аргументи з модуля.
  focus: 'Есе: Місце Подерв’янського в каноні'
  type: note
cefr_min: C1
connects_to:
