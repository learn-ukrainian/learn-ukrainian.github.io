content_outline:
- points:
  - 'Провокація: Чому п’єса, що майже повністю складається з нецензурної лексики, вважається класикою сучасної української
    літератури?'
  - 'Цитата-загадка: «В столовой только о политике и говорят. Жульё!» — звідки це і до чого тут Шекспір?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Гамлет» Подерв’янського — це високе мистецтво постмодерну чи низькопробний епатаж? Позиції «за» (деконструкція,
    катарсис) і «проти» (профанація, вульгаризація).'
  - 'Дебат 2: Суржик і мат — це автентичне віддзеркалення мовної реальності чи її деградація? Дискусія між пуристами та антропологами
    від лінгвістики.'
  - '[!epistemic-humility] Не існує «правильної» відповіді. Цінність тексту визначається не консенсусом, а глибиною аргументів,
    які він провокує.'
  section: 'Конфліктна карта: Мистецтво чи непотріб?'
  words: 1000
- points:
  - 'Текстуальний аналіз ключових сцен: монолог Гамлєта, діалог з Офелією, сцена з королем і королевою.'
  - 'Система персонажів: Гамлєт як рефлексуючий інтелігент в оточенні бидла. Офелія як трагічна жертва патріархального цинізму.'
  - 'Пародійна структура: як Подерв’янський бере сюжет Шекспіра і «приземляє» його до реалій радянського НДІ, створюючи комічний
    ефект.'
  - '[!decolonization] Це не просто переклад, а повна культурна апропріація та деконструкція імперського наративу. Шекспір
    перестає бути недоторканним ідолом «високої культури» і стає інструментом для критики власної реальності.'
  section: 'Читання: Гамлєт, або Феномен «хорошого настрою»'
  words: 1700
- points:
  - 'Комічні механізми: гротеск (поєднання високого і низького), абсурдистська логіка, мовна гра, чорний гумор.'
  - 'Аналіз цілі: кого висміює автор? Псевдоінтелігенцію, радянську бюрократію, патріархальні стереотипи, саму ідею «великої
    літератури».'
  - 'Соціальна функція: гумор як зброя проти тоталітарної свідомості та інструмент психологічного виживання в абсурдному світі.'
  - '[!myth-buster] Подерв’янський не «винайшов» використання суржику в літературі, але він першим зробив його не ознакою
    неосвіченості персонажа, а головним художнім засобом.'
  section: 'Механіка сміху: Суржик, мат та абсурд'
  words: 1200
- points:
  - 'Повернення до розминки: то чому ж це класика? Формулювання відповіді на основі аналізу.'
  - 'Історія рецепції: як п’єса з касетних записів 90-х перетворилася на аншлагові вистави та об’єкт академічних досліджень?'
  - 'Сучасна релевантність: чи актуальний «Гамлет» Подерв’янського сьогодні, в умовах повномасштабної війни?'
  - '[!anti-hagiography] Подерв’янський — жива людина зі своїми, часто контроверсійними, поглядами. Важливо розрізняти автора
    та його твір.'
  section: Дискусія та підсумок
  words: 700
focus: The literary and cultural phenomenon of Les Poderviansky's 'Hamlet', analyzing its use of surzhyk, profanity, parody
  of Shakespeare, and role as a post-Soviet cultural critique.
level: LIT-HUMOR
module: lit-humor-010
objectives:
- Аналізувати п’єсу «Гамлет...» як феномен української пост-радянської контркультури
- Визначати роль обсценної лексики та суржику як інструментів пародії та деконструкції імперських культурних кодів
- Розрізняти ключові комічні механізми (гротеск, пародія, абсурд) та їхню функцію в тексті
- Формулювати власну аргументовану позицію в дебаті «мистецтво vs. епатаж» щодо творчості Подерв'янського
