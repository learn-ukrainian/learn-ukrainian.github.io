content_outline:
- points:
  - 'Провокація: "Чому Ви не пишете про кохання?" — запитали якось Вишню. "Нема часу", — відповів він. Про що це свідчить:
    про брак романтизму чи про пріоритети митця в трагічну добу?'
  - 'Загадка: Який український письменник був настільки популярним, що його накладів боялася влада, і настільки небезпечним,
    що його на 10 років викреслили з літератури?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був гумор Вишні після ГУЛАГу формою колаборації? Позиція "ЗА": його твори стали беззубими, він оспівував
    радянські реалії. Позиція "ПРОТИ": це була єдина можлива форма існування в літературі, а між рядками він все одно проносив
    критику.'
  - 'Дебат 2: Чи є "усмішка" повноцінним літературним жанром? Позиція "ЗА": це унікальний український жанр, синтез фейлетону,
    гуморески та новели. Позиція "ПРОТИ": це лише різновид малої прози, газетний жанр, що не претендує на канонічність.'
  - '[!epistemic-humility] Критики досі сперечаються, чи був Вишня свідомим дисидентом, чи щиро намагався "перевиховатися"
    та служити радянській владі після таборів.'
  section: 'Конфліктна карта: Народний улюбленець чи радянський блазень?'
  words: 900
- points:
  - 'Аналіз "Моєї автобіографії": іронічне зображення власного життя як "контрасту" до ідеальних радянських біографій. Мова
    як головний герой.'
  - 'Аналіз "Як ми колись писали": сатира на бюрократичний "новояз" та канцелярит. Боротьба за живу народну мову проти бездушної
    системи.'
  - 'Характерологія: створення архетипних образів "маленької людини", мисливця, рибалки, сільського кореспондента, через яких
    говорить народ.'
  - '[!decolonization] Вишня утверджував українську мову як самодостатню, живу та яскраву в час, коли її намагалися звести
    до статусу "сільського діалекту" російської.'
  section: 'Читання: Уривки з "Моя автобіографія" та "Як ми колись писали"'
  words: 1700
- points:
  - 'Комічні механізми: поєднання ліризму та сатири, гротеск, абсурдизація радянської дійсності, використання суржику та діалектизмів
    для характеристики персонажів.'
  - 'Ціль аналізу: кого висміює Вишня? Не "ворогів народу", а бюрократів, невігласів, пристосуванців, носіїв "комплексу меншовартості".'
  - 'Соціальна функція: сміх як терапія для нації, що пережила геноцид та репресії. Можливість "по-людськи" говорити про трагічне.'
  - '[!myth-buster] Міф про "безконфліктність" пізнього Вишні. Навіть у його "мисливських усмішках" природа та людські стосунки
    протиставляються абсурдному та жорстокому соціуму.'
  section: 'Механіка сміху: Анатомія «усмішки»'
  words: 1200
- points:
  - 'Повернення до розминки: тож чому Вишня "не мав часу" писати про кохання? Формулювання відповіді на основі аналізу його
    творчості як форми служіння народу.'
  - 'Рецепція: як змінювалося сприйняття Вишні — від всенародного улюбленця 20-х до "ворога народу" 30-х, реабілітованого
    класика 50-х і символу "сміху крізь сльози" сьогодні?'
  - '[!anti-hagiography] Чи не ідеалізуємо ми Вишню? Аналіз його вимушених компромісів та спроба зрозуміти ціну, яку він заплатив
    за повернення до літератури.'
  - 'Сучасне значення: чи потрібні Україні нові "Вишні" сьогодні? Які суспільні явища потребують сатиричного осмислення?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз жанру "усмішки" Остапа Вишні як інструменту соціальної критики, національного самоствердження та виживання в
  умовах радянського режиму. Дослідження еволюції його гумору від ранньої сатири до трагічного гумору після ГУЛАГу.
level: LIT-HUMOR
module: lit-humor-005
objectives:
- Аналізувати жанр "усмішки" як унікальне явище української літератури на прикладі творів Остапа Вишні
- Критично оцінювати роль гумору як інструменту соціальної критики та засобу виживання в умовах тоталітарного режиму
- Розрізняти різні види комічного (сатира, іронія, гумор, гротеск) у текстах Вишні
- Формулювати аргументовану позицію щодо суперечливих аспектів біографії та творчості письменника
