activity_hints:
- description: Визначити, якій критичній позиції ("народний улюбленець" vs "радянський блазень") належить кожна з наведених
    тез про творчість Вишні.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: Вставити в речення з усмішок характерні для автора слова та вирази (канцеляризми, діалектизми, неологізми).
  focus: Мова Остапа Вишні
  items: 8
  type: fill-in
- description: Прочитайте коротку усмішку Остапа Вишні. Визначте її тему, головних героїв, об'єкт сатири та ключові прийоми
    комічного, на які спирається автор.
  focus: Аналіз "усмішки"
  type: note
- description: Уявіть, що Остап Вишня живе в наш час. На яку тему він написав би свою "усмішку" сьогодні? Напишіть короткий
    твір (400-600 слів), імітуючи стиль автора, про сучасне українське суспільне чи політичне явище.
  focus: 'Есе: Сучасна "усмішка"'
  type: note
