content_outline:
- points:
  - 'Провокація: "Еней був парубок моторний / І хлопець хоть куди козак". Чому головний епос нації, що століттями боролася
    за незалежність, починається з опису ледачого гульвіси?'
  - 'Загадка: що спільного між римським імператором Августом, російською імператрицею Катериною ІІ та українським письменником
    у Полтаві?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Енеїда" — це висока пародія на Вергілія чи низовий бурлеск для простого народу? Погляд класицистів (Зеров)
    vs культурно-історичний підхід (Єфремов).'
  - 'Дебат 2: Чи справді Котляревський — "зачинатель" нової української літератури? Дискусія про його зв''язок з попередньою
    бароковою традицією мандрівних дяків та інтермедій.'
  - '[!epistemic-humility] Немає "правильної" відповіді. "Енеїда" функціонує на обох рівнях — як витончена гра для освічених
    і як соковитий гумор для всіх.'
  section: 'Конфліктна карта: ''Батько'' чи продовжувач?'
  words: 900
- points:
  - 'Близьке читання уривків: опис пекла, бенкет у Дідони, мандрівка Енея. Аналіз сюжетних відхилень від Вергілія — що вони
    говорять про задум Котляревського?'
  - 'Система персонажів: олімпійські боги як корумповані українські пани. Троянці як козацька ватага. Як така "десакралізація"
    працює на створення національного міфу?'
  - '[!decolonization] "Енеїда" як акт культурного опору. Перевдягання імперського сюжету в український національний одяг
    — це не просто жарт, а утвердження власної суб''єктності всупереч асиміляції.'
  - 'Мова як головний герой: аналіз використання народної мови, діалектизмів, приказок.'
  section: 'Читання: ''Енеїда'' — ключові сцени'
  words: 1700
- points:
  - 'Аналіз комічних прийомів: травестія (високий стиль про низькі предмети), бурлеск (низький стиль про високі предмети),
    іронія, гротеск.'
  - 'Ціль сатири: кого висміює Котляревський? Російську бюрократію, колоніальну адміністрацію, козацьку старшину, що зрадила,
    а також вади самого українського суспільства.'
  - 'Культурна специфіка: чому цей гумор є суто українським? Роль козацького "стебу", барокової "химерності", народної сміхової
    культури.'
  - '[!myth-buster] "Енеїда" — це не просто "смішний" твір. Це політичний памфлет, замаскований під жарт, щоб обійти цензуру.'
  section: 'Механіка сміху: Травестія, бурлеск та іронія'
  words: 1200
- points:
  - 'Повернення до розминки: тож чому Еней — "парубок моторний"? Як цей образ відповідає на виклики, що стояли перед українцями
    наприкінці XVIII ст.?'
  - 'Рецепція твору: як "Енеїду" читали сучасники Котляревського, а як — у ХХ столітті? Чому радянська критика намагалася
    "приручити" цей текст?'
  - '[!anti-hagiography] Котляревський як людина своєї епохи: офіцер російської армії, масон. Як його особиста біографія узгоджується
    з роллю "будителя нації"?'
  - 'Сучасне значення: чи актуальна "Енеїда" сьогодні? Що вона може сказати українцям під час нової війни за незалежність?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз "Енеїди" Івана Котляревського як бурлескної травестії та національного епосу. Розбір комічних механізмів та
  їхньої ролі у формуванні модерної української ідентичності та деколонізації культури.
level: LIT-HUMOR
module: lit-humor-001
objectives:
- Аналізувати "Енеїду" як складний твір, що поєднує риси бурлеску, травестії та героїчного епосу
- Розрізняти та ідентифікувати ключові комічні прийоми в тексті
- Формулювати аргументовану позицію в рамках ключових літературних дебатів навколо твору
- Критично оцінювати роль "Енеїди" в процесі деколонізації та становлення модерної української нації
- Пояснювати, як використання народної мови стало політичним актом
