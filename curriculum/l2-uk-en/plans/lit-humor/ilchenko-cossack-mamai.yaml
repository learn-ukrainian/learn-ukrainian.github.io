content_outline:
- points:
  - 'Провокація: Козак Мамай у XXI столітті — що він робить у сучасному Києві? Загадковий уривок з роману, що руйнує часові
    рамки.'
  - 'Питання до студента: Чи може національний архетип бути героєм анекдоту і водночас — філософського роману?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи є роман Ільченка наругою над національною святинею, чи її осучасненням? Позиція «охоронців канону» vs позиція
    «модернізаторів».'
  - 'Дебат 2: Це історичний роман чи анти-історичний? Дискусія про те, чи можна гратися з фактами та чи є у автора право на
    «вигадану історію».'
  - '[!epistemic-humility] Немає єдиної «правильної» інтерпретації. Текст Ільченка — це дзеркало, що показує рівень нашої
    готовності до самоіронії.'
  section: 'Конфліктна карта: Міф vs Постмодерн'
  words: 900
- points:
  - 'Аналіз ключових сцен: зустріч Мамая з Гоголем, філософські бесіди з Чужою Молодицею, участь у Помаранчевій революції.'
  - 'Прийом «очуднення»: як звичні історичні постаті та події виглядають очима безсмертного козака-характерника.'
  - 'Інтертекстуальність: пошук прихованих цитат та алюзій на українську та світову літературу.'
  - '[!decolonization] Ільченко відвойовує Мамая у російського наративу «малоросійської екзотики», повертаючи йому українську
    філософську глибину, хоч і в іронічній обгортці.'
  section: 'Читання: Фрагменти з роману «Козацькому роду нема переводу»'
  words: 1800
- points:
  - 'Комічні механізми: анахронізми (Мамай з мобільним телефоном), пародіювання жанру «козацького фентезі», мовний гротеск.'
  - 'Ціль сатири: кого висміює автор? Псевдопатріотичний пафос, імперські стереотипи про українців, академічний снобізм.'
  - 'Мова гумору: змішування високого стилю козацьких літописів із сучасним сленгом, створення комічних неологізмів.'
  - '[!myth-buster] Роман руйнує міф про козаків як простих, неосвічених вояків, показуючи Мамая як інтелектуала та філософа.'
  section: 'Механіка сміху: Іронія та гра в романі Ільченка'
  words: 1200
- points:
  - 'Повернення до розминки: то чим є цей роман — знущанням чи розвитком міфу? Студент формулює власну аргументовану відповідь.'
  - 'Рецепція твору: як роман сприйняли критики та читачі у 2000-х? Чому він викликав такі суперечки?'
  - '[!anti-hagiography] Ільченко «олюднює» ікону, показуючи Мамая не бронзовим пам''ятником, а живою людиною зі своїми слабкостями
    та дивацтвами, що кидає виклик традиційній агіографії.'
  - 'Сучасна релевантність: чи потрібні Україні такі «іронічні» герої сьогодні, в епоху екзистенційної боротьби?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз постмодерного роману Олеся Ільченка, його інтертекстуальність, сатиричні механізми та деконструкція національного
  міфу про козака Мамая.
level: LIT.HUMOR
module: lit-humor-008
objectives:
- Аналізувати роман Олеся Ільченка як приклад українського постмодернізму, визначаючи його ключові риси.
- Визначати механізми іронії, пародії та гротеску, які автор використовує для деконструкції національних міфів.
- Критично оцінювати дискусії навколо твору, формулюючи власну аргументовану позицію щодо ролі мистецтва у переосмисленні
  історії.
- Розрізняти поняття історичної правди та художньої вигадки в літературному творі.
