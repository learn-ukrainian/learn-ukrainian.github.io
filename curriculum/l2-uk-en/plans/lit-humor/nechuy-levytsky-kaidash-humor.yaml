content_outline:
- points:
  - 'Провокація: Чи може одна груша зруйнувати родину? Питання, на яке "Кайдашева сім''я" дає трагікомічну відповідь.'
  - 'Цитата без контексту: "Діло з грушею скінчилось несподівано. Груша всохла". Що це — кінець конфлікту чи його метафора?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Кайдашева сім''я" — це етнографічний реалізм чи соціальний гротеск? Народники бачили в повісті точне відтворення
    селянського життя, модерністи — гостру сатиру на національні вади.'
  - 'Дебат 2: Чи є твір "антиукраїнським"? Дискусія між тими, хто бачить у повісті небезпечне висміювання "народу", і тими,
    хто вбачає в цьому акт самокритики, необхідний для одужання нації.'
  - '[!epistemic-humility] Радянське літературознавство нав''язувало марксистську інтерпретацію "класової боротьби в селі",
    повністю ігноруючи психологічний та екзистенційний виміри конфлікту.'
  section: 'Конфліктна карта: Побут чи Буття?'
  words: 900
- points:
  - 'Аналіз ключових сцен: сварка за мотовило, розподіл майна, бійка за грушу. Як побутові предмети стають символами екзистенційного
    конфлікту.'
  - 'Система персонажів: Маруся Кайдашиха vs Мотря Довбиш. Це конфлікт двох характерів чи двох епох? Старий патріархальний
    світ проти нового, індивідуалістичного.'
  - 'Мова як поле бою: аналіз діалогів, де кожна репліка — це одночасно і гумор, і агресія.'
  - '[!decolonization] На відміну від багатьох творів того часу, конфлікт у "Кайдашевій сім''ї" — суто внутрішньоукраїнський.
    Імперія відсутня. Це розповідь про себе для себе, утвердження власної суб''єктності через самоаналіз.'
  section: 'Читання: Анатомія родинної війни'
  words: 1700
- points:
  - 'Комічні механізми: використання просторіччя та діалектизмів, "лайка" як художній прийом, гротескне перебільшення, абсурдність
    ситуацій.'
  - 'Ціль сатири: кого висміює автор? Конкретних персонажів чи універсальні людські вади — жадібність, егоїзм, неспроможність
    домовитись?'
  - 'Культурна специфіка гумору: чи зрозумілий цей гумор поза українським контекстом? Роль приказок, народних вірувань у творенні
    комічного ефекту.'
  - '[!myth-buster] Твір руйнує романтичний міф про "співучий та дружний" український народ. Нечуй-Левицький показує, що під
    вишиванкою ховаються ті самі пристрасті, що й у трагедіях Шекспіра.'
  section: 'Механіка сміху: Від карикатури до трагікомедії'
  words: 1200
- points:
  - 'Повернення до розминки: тож чи в груші справа? Формулювання відповіді на основі аналізу твору.'
  - 'Історія рецепції: як повість сприймали сучасники, і як її читають зараз? Чому "Кайдашева сім''я" стала мемом у сучасному
    українському інфопросторі?'
  - 'Сучасна релевантність: "кайдашизм" як соціальне явище. Чи є в сучасній Україні місце для таких конфліктів? Де ми бачимо
    їх сьогодні?'
  - '[!anti-hagiography] Постать самого Нечуя-Левицького. Він був "законодавцем моди" в літературі, але сам залишився самітним
    і, за спогадами, мав непростий характер. Чи є в "Кайдашах" щось від автора?'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of Nechuy-Levytsky's "Kaidash's Family" as a masterpiece of Ukrainian humorous prose. Focus on comic mechanisms,
  social critique, decolonization of humor, and the work's reception.
level: LIT-HUMOR
module: lit-humor-003
objectives:
- Аналізувати повість 'Кайдашева сім''я' як трагікомедію, що розкриває соціальні та психологічні вади українського суспільства
- Розрізняти етнографічний реалізм та сатиричний гротеск у стилістиці Нечуя-Левицького
- Формулювати позицію в дебаті про твір: це критика національного характеру чи лише побутова комедія?
- Пояснювати, як гумор може слугувати інструментом деколонізації, утверджуючи культурну суб'єктність
