objectives:
- Аналізувати жанрові особливості усмішки як унікального українського літературного явища
- Розрізняти та інтерпретувати ключові мовні засоби гумору в творах Остапа Вишні (іронія, гротеск, мовна гра)
- Формулювати аргументовану позицію щодо ролі гумору як інструменту соціальної критики та виживання в умовах тоталітарного
  режиму
- Критично оцінювати складну біографію митця, уникаючи однозначних оцінок ("зрада" чи "героїзм")
