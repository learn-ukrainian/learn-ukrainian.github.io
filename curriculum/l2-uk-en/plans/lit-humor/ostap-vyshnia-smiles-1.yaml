content_outline:
- points:
  - 'Провокація: Як письменник, розстріляний у 1934, міг писати гуморески у 1950-х? Цитата Вишні: "Щось я погано зробив. Мене
    розстріляли, а я все ходжу й ходжу..."'
  - Фрагмент усмішки без контексту, де головний герой потрапляє в абсурдну ситуацію — завдання студента: передбачити, як він
      викрутиться.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Народний" простак чи модерніст у масці? Дискусія про те, чи був образ Вишні-оповідача свідомим конструктом
    інтелектуала, чи автентичним голосом селянства.'
  - 'Дебат 2: Гумор після ГУЛАГу — зрада чи виживання? Чи були пізні усмішки Вишні вимушеною лояльністю до режиму, чи тонкою,
    "езоповою" сатирою, що ховалася за дозволеними темами (полювання, рибалка)?'
  - '[!epistemic-humility] Літературна критика не має остаточної відповіді. Одні бачать у пізньому Вишні зламану людину, інші
    — майстра подвійного кодування.'
  section: 'Конфліктна карта: Сміх крізь сльози чи сміх для влади?'
  words: 900
- points:
  - Повний текст усмішки з докладним коментарем. Аналіз сюжету: абсурдний, гіперболізований ритуал приготування супу як метафора
      радянської бюрократії.
  - Система персонажів: оповідач-простак, "експерти", мовчазна громада. Хто з них є об''єктом сатири?
  - '[!decolonization] Жанр "усмішки" — унікально український феномен, створений Вишнею. Це НЕ "радянський фельєтон". Його
    корені — у традиції бурлеску та вертепу, а не в соцреалізмі.'
  - 'Порівняння "до" і "після": як змінилася структура усмішки до арешту і після повернення із заслання.'
  section: 'Читання: "Як варити і їсти суп із дикої качки"'
  words: 1700
- points:
  - 'Іронія та самоіронія: оповідач постійно виставляє себе невігласом, щоб висміяти абсурдність ситуації "зсередини".'
  - 'Гротеск і гіпербола: доведення буденної ситуації до абсурду (наприклад, інструкція з полювання, що довша за життя).'
  - 'Мовна гра: використання суржику, діалектизмів, канцелярської мови та неологізмів ("вишневізми") для створення комічного
    ефекту.'
  - '[!myth-buster] Остап Вишня — не просто "гуморист". Він — реформатор літературної мови, що ввів у канон живу, розмовну
    стихію.'
  - 'Ціль сатири: хто головний ворог у світі Вишні? Нездарність, бюрократія, пихатість, безглузді інструкції — безособова
    "система".'
  section: 'Механіка сміху: Мовні прийоми Остапа Вишні'
  words: 1200
- points:
  - Повернення до провокації: то як же "розстріляний" Вишня писав знову? Обговорення феномену "посмертної реабілітації" та
      його впливу на творчість.
  - '[!anti-hagiography] Деконструкція міфу про "доброго дідуся-гумориста". Вишня був складною фігурою, що пройшла через пекло
    репресій і мусила знайти спосіб існувати в системі, яка його знищила.'
  - Рецепція творчості: як змінювалося ставлення до Вишні — від всенародної любові 1920-х до статусу "ворога народу", потім
      "дозволеного радянського сатирика" і до переосмислення в незалежній Україні.
  - Рефлексія: чи може гумор бути зброєю? Ваша думка після аналізу творчості Вишні.
  section: Дискусія та підсумок
  words: 800
focus: Аналіз жанру усмішки, сатира як інструмент критики та виживання, мовні засоби гумору в творах Остапа Вишні.
