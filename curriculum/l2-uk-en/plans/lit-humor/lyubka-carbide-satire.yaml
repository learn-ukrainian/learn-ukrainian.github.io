content_outline:
- points:
  - 'Провокація: Чи може роман про контрабандистів та абсурдні проєкти бути інструкцією з деконструкції імперії?'
  - 'Цитата без контексту: уривок з твору, що ілюструє крайній цинізм або абсурдність ситуації, з питанням "Що тут відбувається?"'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Творчість Карбід — це гостра соціальна сатира, що викриває вади суспільства, чи просто розважальна чорна комедія,
    що експлуатує цинізм?'
  - 'Дебат 2: Чи є ці тексти частиною "високої" української літератури, чи це маргінальний жанровий експеримент, що не заслуговує
    на місце в каноні?'
  - '[!epistemic-humility] Позиції критиків розділилися: від звинувачень у "нарузі над святинями" до проголошення "найчеснішим
    голосом покоління".'
  section: 'Конфліктна карта: Сатира чи Чорнуха?'
  words: 1000
- points:
  - 'Аналіз центрального уривку: розбір стилю, структури сюжету, системи персонажів.'
  - 'Наративна стратегія: як автор використовує ненадійного оповідача для створення комічного та критичного ефекту.'
  - '[!decolonization] Пародіювання "великої російської літератури" та її месіанства. Підрив імперських міфів через доведення
    їх до абсурду в українському контексті.'
  - 'Мова як персонаж: використання суржику, діалектизмів, та професійного жаргону для характеристики персонажів та середовища.'
  section: 'Читання: Уривки з ключових творів'
  words: 1700
- points:
  - 'Комічні механізми: аналіз використання іронії, гротеску, пародії та абсурдистської логіки.'
  - 'Ціль аналізу: Хто або що є об''єктом висміювання? Бюрократія, корупція, імперські амбіції, національні міфи, чи сама
    людина?'
  - '[!myth-buster] Руйнування міфу про "соборну" та "святу" Україну. Показ країни як складного, живого організму з усіма
    його вадами.'
  - '[!decolonization] Гумор як зброя проти імперського погляду, що відмовляє українцям у праві на складність, самоіронію
    та критику.'
  section: 'Механіка сміху: Як це працює?'
  words: 1200
- points:
  - 'Повернення до розминки: тож як саме сатира Карбід допомагає деконструювати імперію?'
  - 'Рецепція творчості: як тексти сприймали в момент публікації і як їх читають зараз, в умовах повномасштабної війни?'
  - '[!anti-hagiography] Критичний погляд на автора: чи не є тотальний цинізм її персонажів небезпечним? Де межа між критикою
    та нігілізмом?'
  - 'Сучасне значення: що сатира Карбід говорить нам про українське суспільство сьогодні?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз сатиричної творчості Любки Карбід. Механізми гротеску, пародії та соціальної критики. Деконструкція імперських
  наративів через абсурд та чорний гумор.
level: LIT-HUMOR
module: lit-humor-011
objectives:
- Аналізувати сатиричні твори через призму їх комічних механізмів (гротеск, іронія, пародія) та соціальної критики.
- Розрізняти та аргументувати різні теоретичні підходи до інтерпретації тексту (соціально-критичний, формалістичний, постколоніальний).
- Пояснювати, як гумор функціонує як інструмент деколонізації та опору імперським наративам.
- Формулювати власну аргументовану позицію щодо рецепції та сучасного значення сатиричної літератури.
