module: c1-hist-027
level: c1-hist
sequence: 27
version: '1.0'
title: 'Документи Січі: Козацьке самоврядування'
focus: history
pedagogy: seminar
objectives:
- 'Analyze the causes and consequences of документи січі: козацьке самоврядування'
- Evaluate the historical significance of січ як держава
content_outline:
- section: Вступ — Січ як держава
  subsections:
  - Запорозька Січ — що це було?
  - Самоврядування — унікальний феномен
  - Документи Січі — що збереглося
  - Чому важливо вивчати
- section: Устрій Січі
  subsections:
  - Козацька рада — верховна влада
  - Кошовий отаман — виконавча
  - Курені і паланки
  - Вибори — як працювали
  - Демократія чи олігархія?
- section: Типи документів
  subsections:
  - Протоколи рад
  - Судові справи
  - Господарські документи
  - Дипломатичне листування
  - Що втрачено
- section: Козацьке право
  subsections:
  - Звичаєве право — не писане
  - Судочинство — як працювало
  - Покарання — жорстокі
  - Захист власності
  - Рівність? — для кого
- section: Фрагмент — Судова справа
  subsections:
  - Текст (з глосами)
  - Процедура суду
  - Аргументи сторін
  - Вирок і виконання
- section: Січ і зовнішній світ
  subsections:
  - Відносини з Гетьманщиною
  - Відносини з Москвою
  - Дипломатія з Кримом і Туреччиною
  - Документальні свідчення
- section: Підсумок
  subsections:
  - Січ — протодержава?
  - Унікальність документів
  - Романтизація vs. реальність
