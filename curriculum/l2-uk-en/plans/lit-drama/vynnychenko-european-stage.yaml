content_outline:
- points:
  - 'Провокація: "Чесність із собою" — це шлях до свободи чи виправдання аморальності? Що, як ваші найпотаємніші бажання руйнують
    інших?'
  - 'Цитата без контексту з п''єси "Чорна Пантера і Білий Ведмідь": "Милий, смішний, непотрібний... білий ведмідь". Хто це
    говорить і про кого?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Чесність з собою" — це глибока етична філософія чи ніцшеанство для інтелігенції? Позиція 1: Винниченко як моральний
    експериментатор. Позиція 2: Винниченко як руйнівник традиційних цінностей.'
  - 'Дебат 2: Винниченко — великий письменник, якого зіпсувала політика, чи політик, що випадково писав п''єси? Його місце
    в каноні.'
  - '[!epistemic-humility] Критики досі сперечаються, чи був Винниченко-політик продовженням його ідей, чи їхнім спростуванням.'
  section: 'Конфліктна карта: Митець vs. Політик'
  words: 900
- points:
  - 'Уривок з п''єси: діалог між Корнієм (художник, "білий ведмідь") та його дружиною Ритою ("чорна пантера") про мистецтво,
    життя та хвору дитину.'
  - 'Аналіз конфлікту: мистецтво vs обов''язок, егоїзм творця vs любов батька. Чи може геній бути "просто людиною"?'
  - 'Характерна система: трикутник Корній-Рита-Сніжинка (дитина) як арена для філософських ідей Винниченка.'
  - '[!decolonization] П''єси Винниченка ставили в Берліні, Празі, Римі. Він — частина європейського модернізму, а не епізод
    в історії "російського театру". Його треба читати поряд з Ібсеном та Стріндбергом, а не Чеховим.'
  section: 'Читання: "Чорна Пантера і Білий Ведмідь"'
  words: 1700
- points:
  - 'Текст vs перформанс: Як зобразити внутрішній світ героя на сцені? Аналіз авторських ремарок Винниченка — це не просто
    вказівки, а повноцінна частина тексту.'
  - 'Діалог як психологічний двобій: мовчання, паузи, недомовки у Винниченка значать більше, ніж слова. Як актори передають
    цей "підтекст"?'
  - 'Історія постановок: від експериментів Леся Курбаса в "Молодому театрі" до сучасних інтерпретацій. Як кожна епоха "читає"
    Винниченка по-своєму?'
  - '[!decolonization] Курбас бачив у Винниченкові матеріал для створення нового, українського, інтелектуального театру, вільного
    від російського побутовізму.'
  section: 'Сцена та текст: Психологізм на сцені'
  words: 1200
- points:
  - 'Повернення до розминки: тож "чесність з собою" — це рецепт щастя чи катастрофи? Відповідь на основі аналізу п''єси.'
  - 'Історія рецепції: Чому Винниченка забороняли в СРСР? Його ідеї про свободу особистості були небезпечнішими за політичні
    погляди.'
  - '[!anti-hagiography] Винниченко був складною, суперечливою фігурою. Його особисте життя часто не відповідало його ж ідеалам.
    Чи це знецінює його твори?'
  - 'Сучасна релевантність: В епоху соцмереж, де всі створюють ідеальний образ, чи не є заклик Винниченка до "чесності з собою"
    знову актуальним?'
  section: Дискусія та підсумок
  words: 700
focus: Драматургія Володимира Винниченка, філософський конфлікт "чесності з собою", психологізм на сцені, модерністська драма,
  європейський контекст
level: LIT-DRAMA
module: lit-drama-002
objectives:
- Аналізувати ключові ідеї та конфлікти в драматургії Володимира Винниченка на прикладі п'єси "Чорна Пантера і Білий Ведмідь".
- Критично оцінювати філософську концепцію "чесності з собою", розглядаючи її з різних боків.
- Розрізняти текст та сценічний підтекст у драматичному творі, аналізуючи роль авторських ремарок.
- Інтегрувати творчість Винниченка в контекст європейського модернізму, проводячи паралелі та виявляючи відмінності.
