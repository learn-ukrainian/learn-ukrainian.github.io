content_outline:
- points:
  - 'Провокація: Чи міг український театр у 1920-х роках бути успішним на Бродвеї? Питання не таке абсурдне, якщо знати про
    "Березіль".'
  - 'Цитата Курбаса: "Театр має бути таким, яким суспільство має бути завтра". Як це розуміти?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: "Березіль" — це формалістична лабораторія для естетів чи інструмент створення "нової радянської людини"? Позиція
    Курбаса vs ідеологічні вимоги партії.'
  - 'Дебат 2: Курбас — геніальний новатор чи "націоналістичний ухильник"? Аналіз звинувачень, що призвели до його арешту та
    страти.'
  - '[!epistemic-humility] Інтерпретація творчості Курбаса коливалася від "буржуазного націоналіста" в радянські часи до "пророка
    європейського театру" сьогодні.'
  section: 'Конфліктна карта: Мистецтво чи політика?'
  words: 900
- points:
  - 'Текст-партитура: як Курбас "читав" п''єси Миколи Куліша ("Народний Малахій", "Мина Мазайло").'
  - 'Аналіз ключової сцени: Розбір режисерського рішення для однієї зі знакових вистав, наприклад, фіналу "Народного Малахія".'
  - 'Система персонажів: як актори "Березоля" втілювали складних, психологічно неоднозначних героїв Куліша.'
  - '[!decolonization] Курбас і Куліш створювали модерний український театр, який полемізував із московським МХАТом, доводячи
    самодостатність української культури.'
  section: 'Читання: П''єси Куліша на сцені "Березоля"'
  words: 1700
- points:
  - 'Текст vs. вистава: Що в п''єсі є лише натяком, а на сцені стає головною подією? Роль жестів, мовчання, ритму.'
  - 'Режисерські нотатки: Аналіз ремарок і вказівок Курбаса як окремого тексту, що розкриває його задум.'
  - '"Розумний арлекін": Концепція актора як свідомого творця, а не просто виконавця волі режисера.'
  - 'Виробнича історія: Від тріумфу на міжнародній виставці в Парижі (1925) до розгрому і знищення (1933-37) — як постановки
    сприймалися глядачами та критикою.'
  section: 'Сцена та текст: Система Курбаса — "перетворення"'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, яким суспільство мало стати "завтра" на думку Курбаса?'
  - 'Рецепція: Чому ідеї Курбаса були "заново відкриті" лише в 1960-х і стали настільки впливовими сьогодні?'
  - '[!anti-hagiography] Чи всі експерименти Курбаса були вдалими? Критика його методу сучасниками (не лише з боку партії).'
  - 'Сучасне значення: Як ідеї "Березоля" про театр як форум для обговорення суспільних проблем живуть у сучасному українському
    театрі?'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз режисерської системи Леся Курбаса, театр "Березіль" як авангардний проєкт, сценічне втілення п'єс Миколи Куліша,
  поняття "перетворення" та "розумний арлекін"
level: LIT-DRAMA
