objectives:
- Аналізувати режисерську систему Леся Курбаса та його ключові теоретичні поняття ("перетворення", "розумний арлекін")
- Критично оцінювати роль театру "Березіль" у культурному та політичному житті України 1920-х років
- Розрізняти текст п'єси та її сценічну інтерпретацію на прикладі співпраці Курбаса і Куліша
- Формулювати аргументовану позицію щодо спадщини "Розстріляного відродження" в сучасному українському мистецтві
