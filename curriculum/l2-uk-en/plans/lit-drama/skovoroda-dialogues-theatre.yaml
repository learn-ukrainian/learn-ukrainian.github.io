slug: skovoroda-dialogues-theatre
title: 'Діалоги як протодрама: Григорій Сковорода і Витоки Театру Ідей'
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Сковорода між філософією і сценою'
    words: 500
    points:
      - Григорій Сковорода (1722–1794) як автор 18 філософських діалогів — жанровий
        вибір як театральний акт.
      - Академічна дискусія щодо «театральності» Сковороди — чи були діалоги призначені
        для виконання?
      - Вплив єзуїтської шкільної драми Києво-Могилянської академії на формування
        діалогічного мислення.
  - section: 'Вступ та контекст: II — Традиція шкільної драми в Україні'
    words: 500
    points:
      - 'Шкільна драма XVII–XVIII ст. як попередник: «Різдвяна драма» Дмитра Туптала (Ростовського) та інші.'
      - Вертеп як синтез народного театру і теологічної дидактики.
      - Сковорода як спадкоємець і реформатор — від теологічної до філософської сцени.
  - section: "Аналіз діалогу «Розмова п'яти подорожніх»: Дорога як сцена"
    words: 700
    points:
      - П'ятеро персонажів як «маски» (dramatis personae) різних філософських позицій.
      - Просторова динаміка діалогу — мандрівка як рух від незнання до істини.
      - Сократівська маєвтика в українському контексті — питання як метод драматичної
        напруги.
  - section: 'Аналіз діалогу «Наркіс»: Самопізнання як внутрішній монолог'
    words: 700
    points:
      - Міф про Нарциса переосмислений — самопізнання (γνῶθι σεαυτόν) як позитивна
        самотність.
      - Двоголосся в «Наркісі» — діалог як зіткнення зовнішнього «я» і внутрішнього
        голосу.
      - Передвіщення монологічної лірики і театру одного актора.
  - section: 'Театральні прийоми: Маска, Сцена, Катарсис'
    words: 600
    points:
      - Концепція «сродної праці» як dramaturgічний принцип — кожен персонаж грає
        свою природну роль.
      - Використання прислів'їв, байок і пісень усередині діалогів — proto-mise en
        scène.
      - Момент «катарсису» у Сковороди — звільнення через самопізнання, а не через
        страх і жаль.
  - section: 'Стилістика та мова: Поліфонія регістрів'
    words: 500
    points:
      - Мовна палітра діалогів — церковнослов'янська, «книжна» народна мова, латина,
        грецькі цитати.
      - Риторичні фігури як театральний ефект — антитеза, парадокс, апострофа.
      - Ритм і музикальність прози — вплив Сковороди-композитора на Сковороду-автора.
  - section: 'Деколонізаційна перспектива: Українська філософська сцена без Москви'
    words: 500
    points:
      - Сковорода у той час, коли освіта переноситься з Києва до Петербурга — збереження
        інтелектуальної незалежності.
      - Мандрівний спосіб життя як відмова від придворної культури імперії.
      - Реабілітація Сковороди від радянського «народного мудреця» до повноцінного
        філософа-драматурга.
  - section: 'Підсумок та спадщина: Від Сковороди до сучасної drama of ideas'
    words: 500
    points:
      - Вплив діалогів на Шевченка, Куліша і пізніше на Лесю Українку як авторів
        «інтелектуальної драми».
      - Сковорода у театральних постановках XX–XXI ст. — Лесь Курбас, сучасні
        режисери.
      - Діалог як вічна форма — від античності через Сковороду до сучасного документального
        театру.
