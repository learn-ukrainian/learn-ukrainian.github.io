vocabulary_hints:
- definition: літературний твір, що містить у собі елементи драми та театральності, але не є драмою в повному розумінні; первинна
    форма драми.
  pos: ж.
  word: протодрама
- definition: театральний жанр, що розвинувся в єзуїтських колегіумах та православних академіях в XVI–XVIII ст., поєднуючи
    релігійні сюжети з дидактикою.
  pos: ж.
  word: шкільна драма
- definition: філософський метод Сократа, за яким учитель за допомогою питань допомагає співрозмовнику «народити» істину,
    приховану в ньому.
  pos: ж.
  word: маєвтика
- definition: ключове поняття філософії Сковороди; діяльність, що відповідає природним нахилам людини і приносить їй щастя.
  pos: ж.
  word: сродна праця
- definition: у Сковороди — духовне очищення та звільнення через самопізнання, на відміну від арістотелівського очищення через
    страх і співчуття.
  pos: ч.
  word: катарсис
- definition: у літературі — співіснування кількох незалежних голосів, точок зору, мовних стилів в одному творі.
  pos: ж.
  word: поліфонія
- definition: у театрі — мистецтво розміщення акторів та декорацій на сцені; у Сковороди — створення уявного сценічного простору
    засобами тексту.
  pos: (фр.)
  word: mise en scène
word_target: 5000
