content_outline:
- points:
  - 'Провокація: Чи можна ставити на сцені філософський діалог? Григорій Сковорода дав відповідь за 200 років до театру абсурду,
    перетворивши розмову на виставу.'
  - 'Жанровий вибір як театральний акт: чому мандрівний філософ обрав саме діалоги, а не трактати?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи були діалоги Сковороди призначені для виконання? Позиція "pro": вплив єзуїтської шкільної драми, персонажі-маски.
    Позиція "contra": тексти для читання, а не гри.'
  - 'Дебат 2: Місце Сковороди в каноні. [!epistemic-humility] Радянська влада бачила в ньому «народного мудреця», замовчуючи
    філософську глибину. Сучасна критика реабілітує його як повноцінного європейського мислителя і драматурга-новатора.'
  - '[!decolonization] Відмова від придворної культури імперії: мандрівний спосіб життя як свідомий вибір інтелектуальної
    незалежності, а не "дивацтво".'
  section: 'Конфліктна карта: Текст чи сцена?'
  words: 900
- points:
  - 'Аналіз діалогу «Розмова п''яти подорожніх»: Дорога як сцена. П''ятеро персонажів як dramatis personae різних філософських
    позицій. Мандрівка як рух від незнання до істини.'
  - 'Аналіз діалогу «Наркіс»: Самопізнання як внутрішній монолог. Міф про Нарциса переосмислений (γνῶθι σεαυτόν). Двоголосся
    — діалог як зіткнення зовнішнього «я» і внутрішнього голосу.'
  - 'Сократівська маєвтика в українському контексті: питання як метод створення драматичної напруги, а не просто філософський
    прийом.'
  - '[!decolonization] Сковорода як спадкоємець і реформатор української барокової традиції (шкільна драма, вертеп), а не
    просто «російський філософ».'
  section: 'Читання: Діалоги "Наркіс" та "Розмова п''яти подорожніх"'
  words: 1800
- points:
  - 'Маска: концепція «сродної праці» як драматургічний принцип — кожен персонаж грає свою природну роль.'
  - 'Сцена: використання прислів''їв, байок і пісень усередині діалогів — proto-mise en scène, створення уявного сценічного
    простору.'
  - 'Катарсис по-українськи: звільнення через самопізнання та прийняття своєї «сродності», а не через страх і жаль, як у Арістотеля.'
  - 'Поліфонія мови: церковнослов''янізми, «книжна» народна мова, латина — як різні регістри мови характеризують персонажів.'
  - '[!decolonization] Вплив на театр Курбаса: ідея «перетворення» та інтелектуальної драми знаходить продовження у постановках
    «Березолю».'
  section: 'Сцена та текст: Прийоми Сковороди-драматурга'
  words: 1300
- points:
  - 'Повернення до розминки: тож чи є діалоги Сковороди театром? Формулювання студентом власної позиції з опорою на текст
    модуля.'
  - 'Рецепція і спадщина: вплив діалогів на інтелектуальну драму Лесі Українки («Лісова пісня», «Кассандра»).'
  - '[!anti-hagiography] Спадщина Сковороди — це не лише цитати для соцмереж, а складна філософська система, що вимагає інтелектуальних
    зусиль для розуміння.'
  - 'Діалог як вічна форма: від античності через Сковороду до сучасного документального театру (напр. Театр Драматургів).'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз філософських діалогів Сковороди як театральних текстів, їх зв'язок зі шкільною драмою, використання театральних
  прийомів та вплив на українську інтелектуальну драму.
level: LIT-DRAMA
module: lit-drama-001
objectives:
- Аналізувати філософські діалоги Григорія Сковороди як зразки протодрами.
- Розрізняти та аргументувати позиції в літературно-критичних дебатах щодо театральності Сковороди.
- Пояснювати, як Сковорода використовує театральні прийоми (маска, сцена, катарсис) у своїх текстах.
- Поміщати творчість Сковороди в деколонізований контекст української та європейської театральної думки.
