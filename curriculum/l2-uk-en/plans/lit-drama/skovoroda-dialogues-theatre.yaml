activity_hints:
- description: Перевірка розуміння дебатів навколо театральності Сковороди. Чия це теза — радянського літературознавства чи
    сучасного?
  focus: Розуміння конфліктної карти
  type: quiz
- description: 'Заповніть пропуски термінами з модуля: протодрама, маєвтика, сродна праця, катарсис, поліфонія.'
  focus: Театральні терміни Сковороди
  type: fill-in
- description: Порівняйте діалог Сковороди (напр., "Розмова п'яти подорожніх") з п'єсою театру абсурду (напр., "Чекаючи на
    Годо"). Що спільного у філософському діалозі та діалозі, що підкреслює безглуздість існування? (400-600 слів).
  focus: 'Аналіз: Сковорода vs. Беккет'
  type: note
