activity_hints:
- description: Визначити термін (вербатім, сіра зона) за його описом. Розрізнити аргументи в дебаті "мистецтво vs журналістика".
  focus: Розуміння ключових термінів та дебатів
  items: 8
  type: quiz
- description: Заповнити пропуски в діалогах з п'єси, вибираючи лексику, що відповідає мовним характеристикам персонажів (суржик,
    професійний жаргон, лайка).
  focus: Мова персонажів
  items: 6
  type: fill-in
- description: Прочитайте уривок зі сцени допиту. Проаналізуйте, як змінюється динаміка влади між персонажами. Які вербальні
    та невербальні засоби вони використовують? (300-400 слів)
  focus: 'Аналіз сцени: Журналістка та полонений'
  type: note
- description: Як змінилося ваше сприйняття п'єси після початку повномасштабного вторгнення? Чи стали якісь теми або персонажі
    більш чи менш релевантними? Аргументуйте свою позицію. (400-600 слів).
  focus: 'Есе: «Погані дороги» після 24.02.2022'
  type: note
