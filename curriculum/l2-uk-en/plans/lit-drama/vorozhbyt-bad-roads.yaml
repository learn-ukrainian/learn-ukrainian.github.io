content_outline:
- points:
  - 'Провокація: Чи має право театр перетворювати реальний біль на виставу? Де межа між свідченням і експлуатацією чужої травми?'
  - Фрагмент діалогу з п'єси (без контексту) про стосунки жінки з українського блокпосту та ополченця — як можлива така розмова?
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Це мистецтво чи журналістика? «Погані дороги» як приклад вербатіму — техніка, що стирає межу між документом
    і фікцією.'
  - 'Дебат 2: Чи є «нова драма» після Майдану достатньо «літературною» для канону? Аргументи «за» (соціальна релевантність)
    і «проти» (естетична вторинність).'
  - '[!epistemic-humility] Немає єдиної відповіді на те, чи є документальний театр «вищим» або «нижчим» за традиційний. Це
    різні інструменти для різних завдань.'
  section: 'Конфліктна карта: Театр на лінії вогню'
  words: 900
- points:
  - 'Аналіз структури: шість новел, не пов''язаних сюжетом, але об''єднаних темою. Чому авторка обирає фрагментарність, а
    не лінійну історію?'
  - 'Близьке читання новели про журналістку: мова як зброя, динаміка влади, етичні дилеми роботи в зоні конфлікту.'
  - 'Система персонажів: відсутність чіткого поділу на «героїв» та «лиходіїв». Всі персонажі — травмовані війною, всі діють
    у «сірій зоні» моралі.'
  - '[!decolonization] «Погані дороги» як відповідь на імперський наратив про «громадянську війну». П''єса показує людський
    вимір війни, яку Росія вела в Україні з 2014 року, руйнуючи стереотипи.'
  section: 'Читання: Фрагменти п''єси «Погані дороги»'
  words: 1800
- points:
  - 'Вербатім-естетика: використання суржику, обсценної лексики, пауз та уривчастих фраз для створення ефекту документальності.'
  - 'Сценічні ремарки: як Ворожбит описує простір? Мінімалізм, що змушує фокусуватися на тексті та акторській грі.'
  - 'Проблема постановки: як показати насилля, не скочуючись у банальність чи порнографію страждань? Аналіз успішних (Royal
    Court) та невдалих постановок.'
  - '[!decolonization] Відмова від патетики та героїзму радянського військового театру. Мова Ворожбит — це мова людей, а не
    пропагандистських плакатів.'
  section: 'Сцена та текст: Мова (не)можливого'
  words: 1200
- points:
  - 'Повернення до розминки: чи дала п''єса відповідь на питання про етичність театру травми? Аргументація студентів.'
  - 'Рецепція: як п''єсу сприйняли в Україні та за кордоном? Чому вона стала одним з найважливіших культурних експортів України
    після 2014 року?'
  - 'Сучасне значення: чи змінилося наше сприйняття «Поганих доріг» після повномасштабного вторгнення 2022 року?'
  - '[!anti-hagiography] Важливо уникнути сакралізації персонажів. П''єса не про «святих жертв», а про складних людей у нелюдських
    обставинах.'
  section: Дискусія та підсумок
  words: 700
focus: Post-Maidan theater, trauma, documentary drama, verbatym, ethics of representation, war in Donbas
level: LIT-DRAMA
module: lit-drama-10
objectives:
- Аналізувати п'єсу в контексті української «нової драми» та документального театру.
- Розрізняти та критично оцінювати техніки вербатіму та їх етичні наслідки.
- Інтерпретувати, як п'єса відображає психологічну травму війни та моральну неоднозначність «сірої зони».
- Формулювати аргументовану позицію щодо ролі театру в документуванні та осмисленні сучасних історичних подій.
- Застосовувати деколонізаційну оптику для аналізу твору, що кидає виклик імперським наративам.
