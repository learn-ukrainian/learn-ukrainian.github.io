content_outline:
- points:
  - 'Провокація: Чому прагнення довести своє «дворянство» може зруйнувати родину, майно та здоровий глузд? Історія Мартина
    Борулі як попередження.'
  - 'Цитата-загадка: «Чую, як мені легше робиться, наче нова душа сюди ввійшла, а стара, дворянська, попелом стала». Хто і
    за яких обставин міг це сказати?'
  section: Розминка
  words: 400
- points:
  - '[!decolonization] Дебат 1: Чи був Театр Корифеїв першим професійним театром України? Боротьба за статус проти імперської
    політики, що зводила українську культуру до аматорських «малоросійських» вистав.'
  - 'Дебат 2: "Мартин Боруля" — це трагедія чи комедія? Критики сперечаються, чи є твір сатирою на «дворянський комплекс»,
    чи трагічною історією про втрату ідентичності.'
  - '[!epistemic-humility] Позиція 1 (трагедія): Герой переживає справжню екзистенційну кризу. Позиція 2 (комедія): Абсурдність
    ситуації та комізм характерів є ключовими. Істина — у синтезі: народження української трагікомедії.'
  section: 'Конфліктна карта: Професійний театр vs. Етнографічний водевіль'
  words: 900
- points:
  - 'Глибокий аналіз уривків з п''єси: діалоги Мартина з родиною та чиновниками, що розкривають його одержимість.'
  - Сатира на провінційний «дворянський комплекс» та зародження капіталістичних відносин на селі.
  - 'Система персонажів: кожен представляє свою позицію щодо «старої» (дворянської) та «нової» (народної/буржуазної) ідентичності.'
  - '[!decolonization] Як Карпенко-Карий створює складних, психологічно достовірних українських персонажів, ламаючи імперський
    стереотип про «простакуватого малороса» з водевілів.'
  section: 'Читання: "Мартин Боруля"'
  words: 1800
- points:
  - 'Аналіз діалогів: як мова персонажів (суміш народної говірки, канцеляризмів, полонізмів) створює комічний та трагічний
    ефекти.'
  - 'Ремарки та сценічні напрямки: що вони говорять про внутрішній стан героїв, який не висловлений у діалозі? Як режисер
    може інтерпретувати мовчазні сцени?'
  - 'Історія постановок: як різні театри знаходили баланс між трагедією і комедією? Роль видатних акторів (Кропивницького,
    самого Карпенка-Карого) у формуванні канонічного образу Борулі.'
  - '[!decolonization] Створення незалежної української драматичної традиції: реалістична постановка, автентичний діалог та
    гостра характеристика персонажів як свідомий розрив з імперським театральним шаблоном.'
  section: 'Сцена та текст: Трагікомедія в дії'
  words: 1200
- points:
  - 'Повернення до розминки: що сучасний українець може побачити в трагедії Мартина Борулі? Чи актуальна сьогодні проблема
    гонитви за формальним статусом?'
  - 'Історія рецепції: як сприймали п''єсу сучасники автора порівняно з нашим часом?'
  - '[!anti-hagiography] "Мартин Боруля" — це не просто критика окремої людини. Це аналіз суспільної хвороби, де персонажі,
    включно з позитивними, є носіями певних вад. Чи є в п''єсі хоч один ідеальний герой?'
  - 'Підсумкове питання для рефлексії: Наскільки ваша початкова оцінка Мартина Борулі змінилася після детального аналізу п''єси?'
  section: Дискусія та підсумок
  words: 700
focus: Analysis of "Martin Borulya" as a tragicomedy, the Theatre of Coryphaei's role in professionalizing Ukrainian drama,
  and its decolonizing break from imperial stereotypes.
level: LIT-DRAMA
module: lit-drama-001
objectives:
- Аналізувати п'єсу "Мартин Боруля" як зразок української трагікомедії.
- Пояснювати історичне значення та деколонізаційну роль Театру Корифеїв у розвитку української культури.
- Розрізняти елементи тексту, призначені для читання, та елементи, що розкриваються лише на сцені (ремарки, діалоги, мовчання).
- Формулювати аргументовану позицію щодо актуальності проблем, порушених у творі, для сучасного суспільства.
