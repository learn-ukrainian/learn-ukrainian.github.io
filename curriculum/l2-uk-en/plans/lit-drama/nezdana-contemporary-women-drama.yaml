activity_hints:
- description: Визначити, яка позиція ("канон" чи "андеграунд") відповідає наведеній цитаті з критики про творчість Нежданої.
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: Вставити пропущені терміни (ремарка, діалог, архетип, алегорія, деконструкція) у речення з аналізом п'єси.
  focus: Термінологія театрального аналізу
  items: 5
  type: fill-in
- description: Наведено уривок п'єси Нежданої з детальними ремарками. Проаналізуйте, як невербальні елементи (жести, паузи,
    простір) створюють сенс, який відсутній у самому діалозі.
  focus: 'Аналіз: "Сцена та текст"'
  type: note
- description: Напишіть есе на тему "Як драматургія Неди Нежданої кидає виклик імперським та патріархальним міфам про українську
    жінку?". Використовуйте приклади з модуля (400-600 слів).
  focus: 'Есе: Деколонізаційний вимір драми'
  type: note
cefr_min: C1
connects_to:
- lit-215
content_outline:
- points:
  - 'Провокація: Чому п''єси Неди Нежданої, написані 20 років тому, звучать гостріше і актуальніше за сьогоднішні новини?'
  - 'Запитання без відповіді: чи може театр, що говорить про жіночу самотність, травму та пошук ідентичності, стати зброєю
    у війні за існування нації?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Неда Неждана — це нішева авторка для європейських фестивалів чи центральна фігура нового українського літературного
    канону?'
  - 'Дебат 2: Її театр — це руйнування класичної української драматургічної традиції (Карпенко-Карий, Котляревський) чи її
    радикальне оновлення у постмодерному ключі?'
  - '[!epistemic-humility] Позиція 1: Неждана "деукраїнізує" театр, роблячи його занадто універсальним. Позиція 2: Неждана
    "європеїзує" українську драму, виводячи її з провінційного гетто.'
  section: 'Конфліктна карта: Канон vs. Андеграунд'
  words: 900
- points:
  - 'Сюжет як алегорія: аналіз подорожі героїні через символічні "кімнати" її пам''яті та страхів.'
  - 'Система персонажів: Він і Вона не як реальні люди, а як архетипи — Аніма та Анімус, жертва і кат, чоловіче та жіноче
    начала.'
  - 'Деконструкція жіночих архетипів: як Неждана перевертає образи "матері", "коханки", "берегині" та показує їхню деструктивну
    природу.'
  - '[!decolonization] Текст як спротив радянській спадщині "безстатевої" жінки-трудівниці. Повернення до тілесності, психологічної
    глибини та індивідуальної, а не колективної, травми.'
  section: 'Читання: Деконструкція міфу в п''єсі "Той, що відчиняє двері"'
  words: 1700
- points:
  - 'Аналіз діалогів: як персонажі Нежданої говорять? Використання сучасної розмовної мови, суржику, жаргону як інструмент
    характеристики.'
  - 'Ремарки як окремий текст: що "промовляють" паузи, мовчання, жести, описані в ремарках? Як вони створюють другий, невербальний,
    шар сенсу?'
  - 'Історія постановок: порівняння класичних та авангардних прочитань п''єс Нежданої. Як різні режисери (напр. в Україні
    та Франції) інтерпретували її тексти?'
  - '[!decolonization] Українська сцена після Курбаса: як театр Нежданої продовжує ідеї "перетвореного театру", де слово є
    лише одним з елементів, а не домінантою.'
  section: 'Сцена та текст: Мова тіла і мова тексту'
  words: 1200
- points:
  - 'Повернення до розминки: чи дає драматургія Нежданої відповідь на питання про роль "жіночого" мистецтва під час війни?'
  - 'Рецепція та критика: чому її п''єси часто викликають гострі дискусії та звинувачення в "надмірному психологізмі" або
    "чорнусі"?'
  - '[!anti-hagiography] Критичний погляд: чи не замикається Неждана у вузькому колі тем? Аналіз звинувачень у "герметичності"
    та відірваності її театру від широких соціальних проблем.'
  - 'Спадщина: вплив Нежданої на молоде покоління драматургів (Н. Ворожбит, П. Ар''є). Що вони запозичили, а з чим сперечаються?'
  section: Дискусія та підсумок
  words: 700
focus: The dramaturgy of Neda Nezhdana, deconstruction of female archetypes, contemporary Ukrainian women's theater, and the
  poetics of modern stage language.
level: LIT-DRAMA
module: lit-drama-016
objectives:
- Аналізувати драматургію Неди Нежданої в контексті сучасного українського та європейського театру
- Розрізняти літературний текст п’єси та її сценічне втілення, аналізуючи роль ремарок, діалогів та мови тіла
- Застосовувати методи деконструкції для аналізу жіночих архетипів у творах авторки
- Формулювати власну позицію в літературно-критичних дебатах щодо місця Нежданої в сучасному каноні
