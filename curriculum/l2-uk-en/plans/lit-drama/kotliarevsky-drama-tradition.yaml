activity_hints:
- description: Кому належить теза? Розподіліть цитати критиків між "імперською", "народницькою" та "модерністською" позиціями
    щодо творчості Котляревського.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: Вставте пропущені слова в репліки Возного та Миколи з «Наталки Полтавки», вибираючи між канцеляризмами та просторіччям.
  focus: Мова персонажів
  items: 8
  type: fill-in
- description: Опишіть, якими засобами (костюми, декорації, мова, пісні) Котляревський утверджує на сцені українську ідентичність
    як самоцінну, а не екзотичну. (300-400 слів).
  focus: 'Аналіз: Сцена як ідеологічний простір'
  type: note
- description: Уявіть, що ви ставите «Наталку Полтавку» сьогодні. Які аспекти ви б підкреслили? Які конфлікти п'єси досі актуальні,
    а які потребують сучасної інтерпретації? (400-600 слів).
  focus: 'Есе: «Наталка Полтавка» у XXI столітті'
  type: note
cefr_min: C1
connects_to:
