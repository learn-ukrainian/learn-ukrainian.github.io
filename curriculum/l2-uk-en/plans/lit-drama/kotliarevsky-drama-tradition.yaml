content_outline:
- points:
  - 'Провокація: Чи була «Наталка Полтавка» простою сентиментальною комедією, чи першим пострілом у війні за культурну незалежність
    України?'
  - 'Свідчення сучасника: "Усі з захопленням аплодували... Нарешті на сцені з''явилася наша власна мова, наші власні люди!"'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Котляревський — демократизатор мистецтва, що вивів на сцену народну мову, чи автор, що закріпив за українською
    літературою образ «простонародної» та смішної?'
  - 'Дебат 2: Місце в каноні. Чи був Котляревський одразу визнаний "батьком" української драми, чи його канонізація — це пізніший
    процес, пов''язаний з національним рухом XIX ст.?'
  - '[!epistemic-humility] Імперська критика бачила в його творах "провінційну забавку", народницька — "енциклопедію народного
    життя", модерністи — застарілий сентименталізм. Де правда?'
  section: 'Конфліктна карта: Народний театр чи «низький» жанр?'
  words: 900
- points:
  - 'Аналіз ключових сцен «Наталки Полтавки»: розмова Наталки з Возним як поєдинок соціальних мовних регістрів.'
  - 'Система персонажів: Наталка як ідеалізований образ української душі, Возний Тетерваковський як пародія на бюрократичний
    "канцелярит", Москаль як втілення імперського солдафона.'
  - '«Москаль-чарівник»: аналіз комічного та прихованого конфлікту. Хто кого обманює і чому це смішно?'
  - '[!decolonization] Котляревський вперше представив українців не як екзотичних "малоросів" для розваги імперської публіки,
    а як суб''єктів із власною гідністю, мовою та мораллю.'
  - 'Жива мова на сцені: використання прислів''їв, приказок, народних пісень як основа художнього стилю.'
  section: 'Читання: «Наталка Полтавка» та «Москаль-чарівник»'
  words: 1800
- points:
  - 'Текст vs. вистава: що означало ПОБАЧИТИ і ПОЧУТИ українську мову та український побут на сцені в умовах імперії?'
  - 'Ремарки та сценічні вказівки: як Котляревський конструює світ вистави, що не передається словами?'
  - 'Діалог як дія: аналіз мовних партій персонажів. Як соціальний статус, характер та наміри розкриваються через синтаксис,
    лексику та інтонацію?'
  - 'Історія постановок: від аматорських труп до професійних театрів. Як кожна епоха "перечитувала" Котляревського, від Карпенка-Карого
    до сучасних режисерів?'
  - '[!decolonization] Створення українського театру було актом культурного суверенітету — відвоюванням символічного простору
    у імперії.'
  section: 'Сцена та текст: Політика української вистави'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, комедія чи культурна декларація? Студенти формулюють власну аргументовану відповідь.'
  - 'Історія рецепції: як змінювалося сприйняття творів Котляревського від його сучасників до наших днів? Чому радянська критика
    наголошувала на "реалізмі", а сучасна — на деколоніальному аспекті?'
  - '[!anti-hagiography] Чи не ідеалізує Котляревський українське село? Наскільки його персонажі — реальні люди, а наскільки
    — архетипічні маски? Дискусія про межі авторського задуму.'
  - 'Сучасне значення: Чи актуальний Котляревський сьогодні, поза шкільною програмою? Які його ідеї та конфлікти резонують
    у сучасній Україні?'
  section: Дискусія та підсумок
  words: 700
focus: The founding role of Ivan Kotliarevsky in modern Ukrainian drama, focusing on "Natalka Poltavka" and "Moskal-Charivnyk"
  as acts of cultural self-assertion and decolonization through the use of vernacular language on stage.
level: LIT-DRAMA
module: lit-drama-001
objectives:
- Аналізувати п'єси Котляревського як вияв національного самоствердження в умовах Російської імперії.
- Розрізняти та критично оцінювати різні підходи до інтерпретації творчості Котляревського (народницький, модерністський,
  постколоніальний).
- Дослідити стилістичні інновації Котляревського, зокрема використання живої народної мови як основи драматичного тексту.
- Формулювати власну аргументовану позицію щодо місця Котляревського в українському літературному каноні та його актуальності
  сьогодні.
