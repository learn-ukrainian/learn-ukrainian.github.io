objectives:
- Аналізувати п'єсу "Народний Малахій" у її сценічному та текстовому вимірах
- Розрізняти та аргументувати різні, часто протилежні, інтерпретації твору
- Пояснювати роль театру Леся Курбаса "Березіль" в українському культурному авангарді
- Критично оцінювати утопічну свідомість та її прояви в українській культурі ХХ та ХХІ століть
