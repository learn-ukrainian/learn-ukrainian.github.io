activity_hints:
- description: 'Розрізнити позиції: хто вважав п''єсу націоналістичною, хто — антирадянською, хто — зразком модернізму? Визначити,
    кому належить теза.'
  focus: Конфліктні інтерпретації п'єси
  items: 4
  type: quiz
- description: 'Вставити пропущені слова в цитати з п''єси, визначаючи, кому належить репліка: Малахію (високий стиль), Куму
    (побутовий) чи чиновнику (канцелярит).'
  focus: Мова персонажів
  items: 5
  type: fill-in
- description: На основі опису вистави Курбаса, запропонуйте власне сценічне рішення для ключової сцени (наприклад, розмова
    Малахія з чиновником). Якою буде сценографія, світло, рухи акторів?
  focus: Аналіз режисерської ідеї
  type: note
- description: Напишіть есе (400-600 слів), де ви порівнюєте пошуки "універсальної правди" Малахія з сучасними суспільними
    дискусіями в Україні. Чи потрібні нам сьогодні "пророки" і яка їхня роль?
  focus: 'Есе: Трагедія Малахія — дзеркало для сучасності?'
  type: note
cefr_min: C1
