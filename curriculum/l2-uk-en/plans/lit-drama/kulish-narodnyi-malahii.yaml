content_outline:
- points:
  - 'Провокація: "Народний Малахій" — це трагедія пророка чи сатира на "народного філософа"?'
  - 'Уривок з п''єси (монолог Малахія про "голу правду") без контексту: хто цей персонаж — святий чи божевільний?'
  - 'Сучасна паралель: чим пошуки Малахія відрізняються від сучасних спроб знайти "національну ідею" в соцмережах?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Малахій — "український Дон Кіхот", трагічний ідеаліст (позиція Леся Курбаса), чи небезпечний фанатик, що веде
    родину до загибелі (радянська критика)?'
  - 'Дебат 2: П''єса — це критика "просвітянського" народництва чи замаскована сатира на більшовицький месіанізм та його утопічні
    проєкти?'
  - '[!epistemic-humility] Інтерпретації п''єси кардинально змінювалися: від звинувачень у "націоналістичному ухилі" в 1930-ті
    до канонізації як антитоталітарного твору в 1990-ті.'
  - 'Місце в каноні: Чому п''єса, заборонена в СРСР, стала центральною для розуміння українського модернізму?'
  section: 'Конфліктна карта: Пророк чи єретик?'
  words: 900
- points:
  - 'Текст: Монологи Малахія про "оновлення людини" та "голу правду" — аналіз його утопічної, месіанської мови.'
  - 'Система персонажів: Малахій (ідея), його донька Люба (тіло, реальність), Агапія (віра), Кум (побутовий здоровий глузд)
    — як вони втілюють різні аспекти українського світу.'
  - 'Структура: Подорож з села до Харкова як рух від ідилії до катастрофи, від утопії до бюрократичного пекла та божевільні.'
  - '[!decolonization] Куліш руйнує імперський міф про "простого", "співочого" українця. Малахій — мислитель, хоч і трагічний.
    Це виклик образу "Малоросії", що здатна лише на побутову культуру.'
  section: 'Читання: Уривки з п''єси "Народний Малахій"'
  words: 1800
- points:
  - 'Текст vs вистава: Аналіз режисерських знахідок Леся Курбаса у виставі театру "Березіль" (1929) — конструктивістська сценографія,
    біомеханіка акторів, "перетворення" персонажів.'
  - 'Ремарки Куліша як окремий текст: що вони говорять про внутрішній стан героїв, чого не можна висловити діалогом? (напр.
    "Малахій зупиняється, наче до чогось прислухаючись у далечіні")'
  - 'Аналіз діалогів: як мова персонажів (високий стиль Малахія, побутова мова Кума, радянський канцелярит чиновників) створює
    конфлікт і трагедію комунікації.'
  - '[!decolonization] Театр Курбаса як український авангард, що творив європейський модерністський театр нарівні з Мейєрхольдом
    і Піскатором. Це не провінційна імітація, а оригінальний внесок у світову культуру.'
  section: 'Сцена та текст: Постановка Курбаса та сценічна мова'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, Малахій — пророк чи божевільний? Студент формулює власну позицію з опорою на текст та історію
    постановок.'
  - 'Історія рецепції: як п''єса була заборонена за "націоналізм" і "містицизм", і як її перевідкрили як глибоко антитоталітарну
    драму.'
  - 'Сучасна релевантність: Пошуки "нової ідеї" для України сьогодні. Чи актуальні застереження Куліша про небезпеку утопічного
    мислення та "пророків" без відповідальності?'
  - '[!anti-hagiography] Куліш — не бездоганний провидець. Його власні комуністичні ілюзії та їхня криза відображені в п''єсі.
    Це драма митця, що намагається осмислити свою роль в тоталітарному суспільстві.'
  section: Дискусія та підсумок
  words: 700
focus: Микола Куліш, "Народний Малахій", театр "Березіль" Леся Курбаса, суперечки про "український шлях", модернізм 1920-х,
  текст і вистава
