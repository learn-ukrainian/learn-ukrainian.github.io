activity_hints:
- description: Кому з персонажів «Мини Мазайла» належить та чи інша цитата? Визначте ідеологічну позицію за висловлюванням.
  focus: Ідеологічні позиції персонажів
  items: 8
  type: quiz
- description: Вставте у речення з п'єси правильні слова, що стосуються мовних суперечок (напр., русизм, архаїзм, неологізм).
  focus: Специфічна лексика п''єси
  items: 10
  type: fill-in
- description: Наведіть приклади з тексту, де комічна ситуація приховує глибоку особисту або національну трагедію. Поясніть,
    як Куліш досягає цього ефекту (400-600 слів).
  focus: 'Аналіз: Трагічне та комічне'
  type: note
- description: Чому, на вашу думку, п'єса, написана майже століття тому, залишається однією з найпопулярніших в українських
    театрах сьогодні? Які паралелі з сучасними суспільними дебатами ви бачите? (500-700 слів).
  focus: 'Есе: Актуальність «Мини Мазайла»'
  type: note
