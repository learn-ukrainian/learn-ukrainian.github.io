content_outline:
- points:
  - 'Провокація: Чи може зміна прізвища змінити долю? А мови? Питання, що лежить в основі трагікомедії Куліша.'
  - 'Цитата без контексту: «Краще бути зґвалтованою, аніж українізованою». Що змушує персонажа сказати таку жахливу фразу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Мина Мазайло» — це комедія про міщанський снобізм чи трагедія національного самозречення?'
  - 'Дебат 2: Чи була п''єса лояльною до радянської політики «українізації», висміюючи її противників, чи це була прихована
    критика самої політики, що призвела до арешту та страти автора?'
  - '[!epistemic-humility] Інтерпретації п''єси кардинально змінювались: від зразкової радянської сатири до маніфесту національної
    гідності.'
  section: 'Конфліктна карта: Сатира на українізацію чи її критика?'
  words: 900
- points:
  - 'Аналіз сюжету: конфлікт між батьком, що прагне стати «Мазєніним», і сином, що захищає українську ідентичність.'
  - 'Система персонажів: Мина (ренегат), Мокій (фанатичний патріот), Уля (вагається), тьотя Мотя (войовничий русифікатор)
    — як уособлення різних позицій у мовному питанні 1920-х.'
  - 'Символізм: прізвище як символ ідентичності, дзеркало як символ самосприйняття.'
  - '[!decolonization] П''єса розкриває механізми комплексу меншовартості, нав''язаного імперським дискурсом, де українська
    мова маркувалася як «селянська» та «непрестижна».'
  section: 'Читання: «Мина Мазайло» як текст'
  words: 1700
- points:
  - 'Аналіз діалогів: як мовні особливості персонажів (суржик, архаїзми, канцеляризми, русизми) створюють комічний ефект і
    характеризують їхні ідеологічні позиції.'
  - 'Сценічні ремарки: Куліш детально прописує невербальну реакцію, інтонації, жести, перетворюючи філологічну дискусію на
    динамічне сценічне дійство.'
  - 'Історія постановок: тріумф у театрі «Березіль» Леся Курбаса (1929), швидка заборона, і повернення на сцену лише в роки
    незалежності. Як різні режисери інтерпретували п''єсу?'
  - '[!decolonization] Театр Курбаса використовував п''єсу для утвердження модерної української театральної мови, кидаючи
    виклик традиції побутового театру та російській психологічній школі.'
  section: 'Сцена та текст: Мова як головна дійова особа'
  words: 1200
- points:
  - 'Повернення до розминки: що п''єса говорить про зв''язок між мовою, прізвищем та ідентичністю в умовах постколоніальної
    реальності?'
  - 'Рецепція: як п''єса, написана в 1920-х, стала надзвичайно актуальною в Україні XXI століття?'
  - '[!anti-hagiography] Куліш як комуніст і водночас як жертва комуністичного режиму. Як його власні ідеологічні переконання
    відображені у творі?'
  - 'Студентська рефлексія: чи змінилося ваше сприйняття мовного питання в Україні після прочитання п''єси?'
  section: Дискусія та підсумок
  words: 800
focus: Микола Куліш, «Мина Мазайло», філологічна комедія, політика українізації 1920-х, мова як ідентичність, конфлікт поколінь,
  текст vs. вистава
