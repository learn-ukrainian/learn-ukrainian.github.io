objectives:
- Аналізувати філологічну комедію «Мина Мазайло» як літературний текст і як сценарій для вистави
- Розрізняти позиції у дебатах щодо політики українізації та її сатиричного зображення у творі
- Пояснювати, як мова функціонує як головний герой та джерело конфлікту в п'єсі
- Формулювати власну позицію щодо актуальності п''єси в контексті сучасних мовних та ідентичнісних дискусій в Україні
