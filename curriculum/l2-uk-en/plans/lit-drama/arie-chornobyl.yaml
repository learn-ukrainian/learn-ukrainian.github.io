content_outline:
- points:
  - 'Провокація: Чи можна поставити на сцені радіацію? Чи театр здатен показати лише її людські наслідки, а не саму загрозу?'
  - Цитата з п’єси (монолог Баби Прісі) про життя в Зоні — без контексту автора чи назви твору.
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Документ проти міфу. Чи є п''єса «Ар''є» спробою задокументувати реальність Чорнобильської зони, чи це свідома
    міфотворчість, що створює новий, постапокаліптичний фольклор?'
  - 'Дебат 2: [!decolonization] Український голос vs. екзотизація. Це повернення українцям права говорити про свою трагедію
    — чи це «експортний продукт», що продає західному глядачеві екзотичний образ «дикого Сходу»?'
  - '[!epistemic-humility] Театральна критика пропонує різні оптики: від постколоніального аналізу до екокритики. Жодна з
    них не є єдино правильною.'
  section: 'Конфліктна карта: Театр Катастрофи'
  words: 900
- points:
  - 'Аналіз ключових сцен: зустріч з Бабою Прісею, радіоактивне молоко, фінальний монолог.'
  - 'Система персонажів: Баба Пріся як хтонічне божество, Вовчик як юродивий, батько як представник радянського минулого.'
  - 'Мова як характеристика: суржик Баби Прісі, наукоподібна лексика журналіста, мовчання природи.'
  - '[!decolonization] Твір протиставляється радянському наративу про «мирний атом» та героїчному, але безликому образу ліквідатора,
    показуючи життя «після».'
  section: 'Читання: П''єса ''Ар''є'''
  words: 1700
- points:
  - 'Аналіз ремарок: як Павло Ар’є описує простір, звук та світло, щоб передати відчуття невидимої загрози.'
  - 'Тілесність актора: як грати персонажа, що живе в радіоактивному середовищі? Як показати вплив радіації через рух, голос,
    пластику?'
  - 'Історія постановок: порівняння ключових сцен у виставах українських та закордонних театрів. Які акценти розставляли різні
    режисери?'
  - '[!decolonization] Зв''язок із традицією українського авангарду (Лесь Курбас) у пошуках нових засобів театральної виразності
    для нетипових тем.'
  section: 'Сцена та текст: Невидиме на сцені'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, чи може театр показати радіацію? Аргументована відповідь на основі аналізу п’єси.'
  - 'Рецепція: як п’єса була сприйнята в Україні та за кордоном? Чому вона стала одним з найвідоміших сучасних українських
    драматичних текстів?'
  - '[!anti-hagiography] Уникнення романтизації Зони. П’єса показує не лише «автентичне життя», а й соціальну деградацію,
    алкоголізм, і злочини.'
  - 'Сучасне значення: як змінилося сприйняття п’єси після повномасштабного вторгнення та окупації Чорнобильської АЕС у 2022
    році?'
  section: Дискусія та підсумок
  words: 800
