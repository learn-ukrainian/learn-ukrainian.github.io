content_outline:
- points:
  - 'Провокація: Чи може театр бути небезпечнішим за армію? У 1937 році НКВС розстріляв Леся Курбаса — театрального режисера.
    Чого вони боялися?'
  - 'Цитата Курбаса: "Театр мусить бути таким, яким має бути життя суспільства". Як ви це розумієте?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Курбас — формаліст-експериментатор чи ідеолог нового українського суспільства? Чи був його театр "мистецтвом
    заради мистецтва", чи політичним проєктом?'
  - 'Дебат 2: Канонізація Курбаса. Чому радянська влада спочатку підтримала авангардний "Березіль" як зразок пролетарського
    мистецтва, а потім знищила його як "націоналістичне кубло"?'
  - '[!epistemic-humility] Позиції критиків: одні бачать у Курбасі лише жертву режиму, інші — складну фігуру, що намагалася
    грати за правилами системи, доки система не змінила правила.'
  section: 'Конфліктна карта: Мистецтво чи політика?'
  words: 900
- points:
  - 'Уривок із п''єси: діалог Малахія з персонажами, що уособлюють стару і нову Україну. Аналіз конфлікту "мрії" та "реальності".'
  - 'Система персонажів: Малахій як трагічний мрійник, його оточення як сатира на міщанство та радянську бюрократію.'
  - 'Сюжетна структура: як Курбас перетворив текст Куліша на філософський диспут про шляхи України.'
  - '[!decolonization] Курбас і Куліш свідомо створювали інтелектуальний український театр, що полемізував із Москвою і доводив
    самодостатність української культури. Це був виклик імперському центру.'
  section: 'Читання: "Народний Малахій" Куліша в постановці Курбаса'
  words: 1700
- points:
  - 'Текст vs вистава: аналіз режисерських ремарок Курбаса. Що вони додають до діалогів Куліша? Як вони створюють "другий
    план" вистави?'
  - 'Діалог і мовчання: як Курбас використовував паузи, ритм та інтонацію для розкриття психології персонажів.'
  - 'Концепція "перетворення актора": це не гра, а "мисленнєва дія в образі". Аналіз вправ та етюдів, які використовували
    в "Березолі".'
  - '[!decolonization] Історія постановок: як перші тріумфальні вистави в Харкові перетворилися на доказ у сфабрикованій справі
    проти "ворогів народу". Театр як доказ і вирок.'
  section: 'Сцена та текст: "Перетворення" як метод і філософія'
  words: 1200
- points:
  - 'Повернення до розминки: то чому ж тоталітарний режим боявся театру Курбаса? Студент формулює відповідь, спираючись на
    аналіз модуля.'
  - 'Рецепція і спадщина: як Курбаса "забули" в СРСР і як "згадали" в незалежній Україні. Його вплив на сучасний український
    театр.'
  - '[!anti-hagiography] Чи був Курбас безкомпромісним борцем? Аналіз його спроб знайти спільну мову з радянською владою на
    ранніх етапах. Де межа між компромісом і колаборацією для митця в тоталітарній державі?'
  - 'Сучасне значення: які уроки з історії "Березоля" актуальні для українських митців сьогодні, в умовах нової війни за незалежність?'
  section: Дискусія та підсумок
  words: 700
focus: Лесь Курбас, театр "Березіль", концепція "перетворення актора", філософський театр, зв'язок із Миколою Кулішем, трагічна
  доля митця Розстріляного Відродження.
level: LIT-DRAMA
module: lit-drama-004
objectives:
- Аналізувати режисерський метод Леся Курбаса ("перетворення") у зв'язку з текстом п'єси та історичним контекстом
- Аргументовано брати участь у дискусії про роль митця в тоталітарному суспільстві
- Розрізняти поняття текстуального аналізу та аналізу сценічного втілення на прикладі театру "Березіль"
- Формулювати деколонізаційне значення творчості Курбаса як виклик імперському культурному домінуванню
