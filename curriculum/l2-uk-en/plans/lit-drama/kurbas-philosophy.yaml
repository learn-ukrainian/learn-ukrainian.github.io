activity_hints:
- description: 'Розрізнити позиції: що є тезою "формалістичного" погляду на Курбаса, а що — "ідеологічного"? Чия це теза —
    радянської критики чи захисників авангарду?'
  focus: Розуміння конфліктної карти
  items: 4
  type: quiz
- description: 'Вставити в речення ключові поняття з модуля: перетворення, мізансцена, жест, ритм, розумний арлекін.'
  focus: Термінологія театру Курбаса
  items: 5
  type: fill-in
- description: На основі матеріалів модуля, порівняйте два методи роботи з актором. У чому їхня фундаментальна різниця? Чому
    протистояння цих систем було не лише мистецьким, а й політичним? (400-600 слів).
  focus: 'Порівняльний аналіз: Курбас vs. Станіславський'
  type: note
- description: Оберіть одну з ідей Курбаса (наприклад, деколонізація сцени, театр як трибуна, актор-інтелектуал) і напишіть
    есе, чому ця ідея є важливою для сучасного українського суспільства та мистецтва. (400-600 слів).
  focus: 'Есе: Актуальність Курбаса сьогодні'
  type: note
