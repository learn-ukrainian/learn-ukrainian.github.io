content_outline:
- points:
  - 'Провокація: Чи був театр Курбаса «мистецтвом для обраних» — елітарною грою формалістів, відірваною від народу? Чи, навпаки,
    найгострішою політичною зброєю свого часу?'
  - 'Цитата Курбаса: "Театр є трибуна. Це добре знав і Шекспір, і Мольєр. Це треба знати і нам". Як це узгоджується з образом
    "формаліста"?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Формалізм vs. Ідеологія. Радянська критика звинувачувала Курбаса у формалізмі та відриві від "соцреалізму".
    Прихильники бачили в його експериментах пошук універсальної мови театру. Чи можливо було творити "чисте мистецтво" в умовах
    тоталітарної держави?'
  - 'Дебат 2: Канон vs. Авангард. Курбас кинув виклик старому етнографічно-побутовому театру. Чи був він руйнівником національної
    традиції (як стверджували опоненти), чи її рятівником, що виводив українську сцену на європейський рівень?'
  - '[!epistemic-humility] Немає простої відповіді. Курбас щиро вірив у комуністичні ідеали на початку, але його мистецтво
    виявилося занадто складним і незалежним для радянської системи.'
  section: 'Конфліктна карта: Мистецтво чи політика?'
  words: 900
- points:
  - Уривки з теоретичних праць Курбаса та його соратників про "перетворення образу" — актор не "переживає" роль (як у Станіславського),
    а свідомо її "конструює".
  - Аналіз концепції "розумного арлекіна" — актора-інтелектуала, що є співавтором вистави.
  - 'Стилістичний розбір мови Курбаса-теоретика: суміш філософських термінів, мистецтвознавчої лексики та яскравих метафор
    ("архітектура натовпу").'
  - '[!decolonization] Розрив із Москвою: Курбас свідомо протиставляв свій метод "системі Станіславського", яку вважав застарілою
    та психологічно примітивною. Це була боротьба за право на власний, український шлях у мистецтві.'
  section: 'Читання: Маніфести "Березоля"'
  words: 1700
- points:
  - 'Від тексту до жесту: Як Курбас "читав" п''єсу? Аналіз його режисерських партитур, де рух, ритм і мізансцена важливіші
    за психологію.'
  - 'Діалог як партитура: Курбас вчив акторів працювати з темпоритмом фрази, мовчанням, інтонацією як музичним матеріалом,
    а не просто текстом.'
  - 'Історія постановок: "Газ" Кайзера, "Джиммі Гіґґінс", "Макбет" — як Курбас переосмислював світову драматургію, перетворюючи
    її на гостре висловлювання про сучасність.'
  - '[!decolonization] Створення українського Шекспіра: Курбас і його команда не просто перекладали, а "націоналізували" світову
    класику, знаходячи в ній українські смисли та паралелі.'
  section: 'Сцена та текст: Перетворення образу на сцені'
  words: 1200
- points:
  - 'Повернення до розминки: Чи був Курбас формалістом? Формулювання власної позиції на основі аналізу його теоретичних праць
    та сценічних методів.'
  - 'Рецепція: Чому ідеї Курбаса, розстріляні в 30-х, були "заново відкриті" у 60-х і стали настільки впливовими для андеграунду
    та сучасного театру?'
  - '[!anti-hagiography] Курбас був генієм, але й авторитарним лідером. Внутрішні конфлікти в "Березолі", розрив із учнями
    (наприклад, з Кулішем) — це теж частина історії.'
  - 'Сучасне значення: Які ідеї Курбаса є актуальними для українського театру сьогодні, в умовах нової війни за ідентичність?'
  section: Дискусія та підсумок
  words: 800
focus: Філософія театру Леся Курбаса, авангардний театр "Березіль", концепція "перетворення образу", розрив зі Станіславським,
  деколонізація сцени, Курбас як теоретик драми в добу Розстріляного відродження.
