activity_hints:
- description: Перевірка дебатів "Розвага чи Політика?" та "Етнографія чи Критика?". Розподіліть аргументи між позиціями.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Вставте в речення правильні терміни: вертеп, корифеї, Емський указ, трагікомедія, водевіль.'
  focus: Ключові терміни генези театру
  items: 5
  type: fill-in
- description: Порівняйте фрагмент п'єси "Мартин Боруля" (текст) з описом гри Марії Заньковецької в іншій виставі (свідчення
    сучасника). Як акторська гра може змінити/доповнити авторський задум?
  focus: 'Аналіз: Текст vs Сцена'
  type: note
- description: Проаналізуйте, як український театр XIX століття функціонував в умовах імперських заборон. Які стратегії виживання
    та боротьби він використовував? (400-600 слів).
  focus: 'Есе: Театр як культурний спротив'
  type: note
