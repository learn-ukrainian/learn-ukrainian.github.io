content_outline:
- points:
  - 'Провокація: Як театр, заборонений імперським указом, став найпотужнішою зброєю української культури XIX століття?'
  - 'Порівняння двох цитат: фрагмент Емського указу 1876 р. про заборону театральних вистав vs афіша трупи Марка Кропивницького
    1882 р.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Театр для народу — це високоякісна розвага чи форма національного самовираження для еліти? Аналіз аудиторії
    "Наталки Полтавки".'
  - 'Дебат 2: Етнографічний музей чи соціальна критика? Еволюція від сентиментальної драми Квітки-Основ''яненка до гострої
    сатири Карпенка-Карого.'
  - '[!epistemic-humility] Театр корифеїв часто ідеалізують. Насправді це був складний бізнес, де комерційний успіх (водевілі)
    фінансував ризиковані соціальні драми.'
  - 'Глобальний контекст: український театр у порівнянні з "національними театрами" інших бездержавних націй (Ірландія, Чехія).'
  section: 'Конфліктна карта: Розвага чи Політика?'
  words: 900
- points:
  - 'Аналіз тексту: "Мартин Боруля" (1886) як перша українська трагікомедія.'
  - 'Характер протагоніста: психологічна складність Мартина, його мрія про дворянство як метафора колоніальної свідомості.'
  - 'Мова як дійова особа: перехід між "мужицькою" мовою та суржиковими спробами говорити "по-панськи".'
  - 'Структура: як Карпенко-Карий використовує класичну комедійну структуру для не-комічного, трагічного ефекту.'
  - '[!decolonization] На відміну від російської драми того часу, що фокусувалась на "зайвих людях" з дворян, українська драма
    аналізувала соціальну мобільність та її ціну.'
  section: 'Читання: "Мартин Боруля" Івана Карпенка-Карого'
  words: 1700
- points:
  - 'Вертеп як текст: аналіз символіки двоярусної сцени (сакральне/профанне), роль постійних персонажів (Дід, Циган, Смерть).'
  - 'Вертеп як перформанс: імпровізація, контакт з аудиторією, музичний супровід — елементи, що перейшли у "великий" театр.'
  - 'Професіоналізація сцени: роль режисера (Марко Кропивницький), система амплуа, гастрольна логістика мандрівних труп.'
  - 'Актор як медіум: феномен Марії Заньковецької. Як її гра перетворювала етнографічні сюжети на високу трагедію.'
  - '[!decolonization] Створення професійного театру було актом політичного самоствердження, що спростовувало імперську тезу
    про "малоросійський" театр як суто аматорський та побутовий.'
  section: 'Сцена та текст: Від вертепної скрині до професійної сцени'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, як театр вижив і переміг? Стратегії обходу заборон (мандрівні трупи, "маскування" під водевіль).'
  - 'Рецепція: як глядачі читали між рядків і бачили національний маніфест у побутовій мелодрамі.'
  - '[!anti-hagiography] Корифеї — не безгрішні титани. Конфлікти, фінансові проблеми, творчі кризи. Це робить їхнє досягнення
    ще більш вражаючим.'
  - 'Спадщина для XX століття: що саме театр Корифеїв передав Лесю Курбасу та "Молодому театру" 1917 р. — репертуар, акторську
    школу, чи ідею театру як інструменту націєтворення?'
  - 'Рефлексія для студента: Які паралелі між роллю театру в XIX ст. та сучасним мистецтвом під час війни?'
  section: Дискусія та підсумок
  words: 700
focus: The evolution of Ukrainian drama from folk puppet shows (Vertep) to the professional Theater of Coryphées, analyzing
  its unique role as a cultural weapon under the Ems Ukaz of 1876.
level: LIT-DRAMA
module: lit-drama-01
objectives:
- Аналізувати унікальну роль українського театру як інструменту культурного спротиву в умовах імперських заборон XIX ст.
- Пояснювати еволюцію української драми від вертепу та шкільної драми до професійного "театру корифеїв"
- Критично оцінювати ключові тексти періоду, зокрема трагікомедію "Мартин Боруля", розрізняючи її соціальний та психологічний
  рівні
- Розрізняти аналіз драматичного тексту та аналіз театральної вистави, розуміючи внесок режисера та актора
- Формулювати аргументовану позицію щодо спадщини театру корифеїв для української культури XX-XXI століть
pedagogy: CBI
