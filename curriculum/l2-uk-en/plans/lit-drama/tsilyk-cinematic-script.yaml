content_outline:
- points:
  - 'Провокація: Коли камера в кімнаті, чи перестають люди бути собою? А якщо ця камера — їхня власна, і вони знімають фільм
    про своє життя на війні?'
  - 'Цитата Ірини Цілик: "Я не вірю в об''єктивність, я вірю в чесність. Моя камера — це моя точка зору".'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Режисер — спостерігач чи учасник? Дилема "мухи на стіні" проти "друга родини" у фільмі "Земля блакитна, ніби
    апельсин".'
  - 'Дебат 2: Чи можна вважати сценарій документального фільму літературою? Аргументи "за" (поетика, структура, авторський
    голос) і "проти" (примат зображення, нефікційність).'
  - '[!epistemic-humility] Позиція: Традиційна документалістика (Дзиґа Вертов) прагнула "схопити життя зненацька". Сучасна
    пост-документалістика (Цілик) визнає, що камера завжди змінює реальність, і робить цю зміну частиною історії.'
  section: 'Конфліктна карта: Етика камери'
  words: 900
- points:
  - 'Розбір ключової сцени за транскриптом: аналіз діалогів, що звучать імпровізовано, та їх прихованої структури.'
  - 'Мета-наратив: як сім’я створює власний фільм про війну, і як цей процес стає центральним сюжетом фільму Цілик, перетворюючи
    героїв з об''єктів на суб''єктів.'
  - 'Поетика назви: аналіз образу "земля блакитна, ніби апельсин" — сюрреалістичний образ як точна метафора абсурдності та
    краси життя під час війни.'
  - '[!decolonization] Зображення війни на Донбасі з української перспективи — не як "внутрішній конфлікт", а як досвід щоденного
    опору культурною працею під час російської агресії.'
  section: 'Читання: Сценарій «Земля блакитна, ніби апельсин»'
  words: 1700
- points:
  - 'Текст vs. зображення: що сценарій говорить, а що показує камера? Аналіз сцен, де візуальний ряд суперечить або іронічно
    коментує діалог.'
  - 'Режисерські "ремарки": монтаж, вибір кадру, саундтрек як інструменти авторського голосу, що не прописані в діалогах,
    але формують сенс.'
  - 'Перформанс реальності: як герої фільму "грають" самих себе. Чи це акторська гра? Аналіз самопрезентації перед камерою.'
  - '[!decolonization] Традиція: зв''язок з українським поетичним кіно (Параджанов, Іллєнко) — увага до образу, метафори,
    нелінійного наративу, що протистоїть радянському соцреалізму.'
  section: 'Сцена та текст: Поетика кіномови'
  words: 1200
- points:
  - 'Повернення до розминки: де проходить межа між документальним та ігровим кіно? Студент формулює відповідь на прикладі
    фільму.'
  - 'Рецепція: Чому фільм отримав нагороду за режисуру на "Санденсі"? Аналіз того, як фільм промовляє до міжнародної аудиторії
    універсальною мовою мистецтва.'
  - '[!myth-buster] Цей фільм не про війну, а про життя під час війни. Виправлення міфу, що мистецтво про Донбас — це лише
    фіксація травми. Це фіксація життєтворчості.'
  - 'Зв''язок із сьогоденням: що означає знімати і дивитись кіно під час повномасштабного вторгнення? Роль мистецтва як інструменту
    виживання.'
  section: Дискусія та підсумок
  words: 800
focus: Аналіз фільму-есе "Земля блакитна, ніби апельсин". Кіносценарій як літературний текст. Етика документалістики.
level: LIT-DRAMA
module: lit-drama-012
objectives:
- Аналізувати кіносценарій як самостійний літературний жанр, що існує на перетині тексту та зображення.
- Формулювати аргументовану позицію щодо етичних дилем документального кіно, зокрема щодо ролі режисера та впливу камери на
  реальність.
- Розрізняти та інтерпретувати базові елементи кіномови (кадр, монтаж, звук) як інструменти авторського голосу.
- Критично оцінювати репрезентацію війни в сучасному українському мистецтві, розрізняючи фіксацію травми та акт життєтворчості.
