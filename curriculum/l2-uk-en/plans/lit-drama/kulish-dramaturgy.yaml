content_outline:
- points:
  - 'Провокація: Чи був Микола Куліш комуністом, що писав українською, чи українським митцем, який намагався використати (і
    обманути) комуністичну ідеологію для створення нового національного театру?'
  - 'Фрагмент з п''єси (без назви): "Закони нової соціології, розумієш, ще не винайдено, а старі вже не діють..." — що це
    означає для героя, який шукає ідеальну реформу світу?'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Драматургія Куліша — це радянська агітка чи прихована критика системи? Позиція 1: Ранні п''єси ("97") слідують
    лінії партії. Позиція 2: Навіть у них видно трагедію, а не тріумф, що є антирадянським.'
  - 'Дебат 2: Український модернізм Куліша — це розрив із традицією чи її оновлення? Позиція 1: Його експресіонізм — це повний
    відхід від етнографічного театру корифеїв. Позиція 2: Це пошук нового способу говорити про вічні українські теми (пошук
    землі, правди, ідеальної громади).'
  - '[!epistemic-humility] Неможливо дати остаточну відповідь про "справжні" погляди Куліша; ми можемо лише аналізувати, як
    його тексти функціонували в певному контексті і як вони читаються сьогодні.'
  - '[!decolonization] Куліш і Курбас свідомо орієнтувалися на європейський авангард (німецький експресіонізм), щоб вирвати
    український театр з-під впливу російського "психологічного реалізму" школи Станіславського.'
  section: 'Конфліктна карта: Ідеологія чи мистецтво?'
  words: 1000
- points:
  - 'Уривок з тексту: знаменитий монолог Малахія про "голубу мрію" — аналіз символіки та мови.'
  - 'Структура п''єси: трагікомедія. Як Куліш поєднує смішне і страшне для критики утопічної свідомості.'
  - 'Система персонажів: Малахій як український Дон Кіхот, його шлях від реформатора до божевільного в очах системи.'
  - 'Мова та стиль: використання суржику, неологізмів та бюрократичної мови для створення сатиричного ефекту.'
  - '[!decolonization] П''єса демонтує імперський міф про "простодушного" українця. Малахій, намагаючись "реформувати" навіть
    Москву, показує інтелектуальну та духовну амбіцію, несумісну з колоніальним статусом.'
  section: 'Читання: Аналіз п''єси "Народний Малахій"'
  words: 1700
- points:
  - 'Текст vs вистава: як режисерські знахідки Леся Курбаса у театрі "Березіль" розкривали або змінювали сенс п''єс Куліша.'
  - 'Аналіз ремарок у "Патетичній сонаті": як Куліш описує не лише дію, а й звук, світло та ритм, створюючи партитуру для
    режисера.'
  - 'Діалог як музика: аналіз мовних партій персонажів, що представляють різні ідеології та соціальні класи. Зіткнення їхніх
    "мелодій".'
  - 'Історія постановок: тріумф "Народного Малахія" у 1928, заборона "Патетичної сонати", розгром Курбаса і Куліша на початку
    1930-х.'
  - '[!decolonization] "Березіль" був не просто театром, а цілою культурною інституцією (режисерські лабораторії, студії,
    журнал), що створювала модерну українську ідентичність. Його знищення було цілеспрямованим актом культурної колонізації.'
  section: 'Сцена та текст: Симбіоз Куліша і Курбаса'
  words: 1200
- points:
  - 'Повернення до розминки: тож ким був Куліш? Студент має сформулювати власну позицію, спираючись на аналіз п''єс та історичний
    контекст.'
  - 'Історія рецепції: як Куліша читали в 1920-х (як сучасного генія), в 1950-х у діаспорі (як мученика), і як його відкрили
    в Україні після 1991 року.'
  - 'Сучасне значення: чому трагедія ідеаліста, який намагається "переробити" світ за своєю утопією, є актуальною і сьогодні?'
  - 'Питання для рефлексії: чи може мистецтво бути повністю вільним від ідеології в часи великих соціальних зламів?'
  section: Дискусія та підсумок
  words: 700
focus: Драматургія Миколи Куліша в контексті співпраці з Лесем Курбасом та театром "Березіль". Аналіз п'єс "Народний Малахій"
  та "Патетична соната" як прикладів українського модернізму, авангарду та експресіонізму. Конфлікт митця з радянською системою.
level: LIT-DRAMA
module: lit-drama-007
objectives:
- Аналізувати драматургію Миколи Куліша в контексті українського авангарду 1920-х років та політики "українізації"
- Розрізняти текст п'єси як літературний твір та як партитуру для театральної вистави, аналізуючи мову, ремарки та структуру
- Оцінювати творчість Куліша як спробу створення модерного українського театру, вільного від імперських та етнографічних канонів
- Формулювати аргументовану позицію щодо трагічного конфлікту митця з тоталітарною системою
