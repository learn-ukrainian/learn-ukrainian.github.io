activity_hints:
- description: Перевірка розуміння дебатів «модернізм vs. народництво» та «жінка в каноні». Визначити, яка позиція кому належить.
  focus: Розуміння конфліктної карти
  items: 6
  type: quiz
- description: 'Заповніть пропуски в реченнях, використовуючи слова з `vocabulary_hints`: канон, дискурс, інтерпретація, рецепція.'
  focus: Ключові терміни літературознавства
  items: 4
  type: fill-in
- description: Порівняйте образи Мавки з «Лісової пісні» та Дон Жуана з «Камінного господаря». Що спільного в їхніх конфліктах
    зі світом «стабільності» та «закону»? Чим вони відрізняються? (300-400 слів)
  focus: 'Порівняльний аналіз: Мавка vs. Дон Жуан'
  type: note
- description: На основі матеріалів модуля напишіть есе на тему «Як драматургія Лесі Українки сприяла культурному опору імперській
    асиміляції?». Використовуйте конкретні приклади з творів. (400-600 слів).
  focus: 'Есе: Деколонізаційне значення драматургії Лесі Українки'
  type: note
cefr_min: C1
connects_to:
