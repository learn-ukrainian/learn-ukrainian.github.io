content_outline:
- points:
  - 'Провокаційне питання: Чому радянська влада так боялася «Лісової пісні», перетворивши її на дитячу казку, і в чому полягає
    її справжня, вибухова сила для України сьогодні?'
  - 'Цитата-загадка: «Я в серці маю те, що не вмирає» — безсмертя душі, мистецтва чи національної ідеї? Розглядаємо центральну
    дилему творчості Лесі Українки.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Леся Українка — європейська модерністка чи вірна учениця українського народництва? Боротьба між «мистецтвом
    для мистецтва» та «мистецтвом як служінням» у її драмах.'
  - 'Дебат 2: Чи було місце для жінки-інтелектуалки в каноні XIX століття? Аналізуємо, як Леся Українка зламала патріархальні
    уявлення про роль жінки в літературі.'
  - '[!epistemic-humility] Інтерпретації її творчості коливалися від національно-патріотичних до феміністичних та екзистенційних.
    Жодна не є вичерпною, але разом вони створюють об''ємний портрет.'
  section: 'Конфліктна карта: Модернізм vs. Народництво'
  words: 900
- points:
  - 'Аналіз «Лісової пісні»: конфлікт між світом природи (свобода, вічність) і світом людей (обмеження, побут). Мавка як символ
    нескореного духу нації.'
  - 'Аналіз «Камінного господаря»: переосмислення образу Дон Жуана. Командор — не просто покарання, а символ кам''яного, застиглого
    закону, що вбиває життя.'
  - 'Система персонажів: як через взаємодію архетипних фігур (митець, воїн, пророк) Леся Українка досліджує долю української
    інтелігенції.'
  - '[!decolonization] Творчість Лесі Українки як акт культурного опору. Вона вписувала Україну в європейський контекст не
    як провінцію, а як рівноправну цивілізацію з античними та християнськими коренями.'
  section: 'Читання: «Лісова пісня» та «Камінний господар»'
  words: 1800
- points:
  - 'Текст vs. вистава: що в «Лісовій пісні» можна передати лише через сценічну дію (пластика, музика, світло), а не через
    слова?'
  - 'Аналіз діалогів: поетична мова драм як самостійна художня цінність. Досліджуємо ритміку, метафорику та підтексти, що
    розкривають психологію героїв.'
  - 'Ремарки як голос автора: як Леся Українка керує режисером та актором, детально прописуючи не тільки дії, а й емоційні
    стани.'
  - '[!decolonization] Сценічна доля творів: як постановки Леся Курбаса розкривали модерністський потенціал драм, і як радянський
    театр намагався «приручити» бунтарський дух Лесі Українки, спрощуючи її образи.'
  section: 'Сцена та текст: Драматургія як синтез мистецтв'
  words: 1200
- points:
  - 'Повернення до розминки: Отже, в чому полягає «вибухова сила» драм Лесі Українки для нас сьогодні? Формулюємо відповідь
    на основі аналізу.'
  - 'Рецепція творчості: як змінювалось сприйняття Лесі Українки — від «хворобливої поетеси» до «бронзового пам''ятника» і,
    нарешті, до живої, радикальної мислительки.'
  - '[!anti-hagiography] Замість ікони — жива людина. Обговорюємо внутрішні конфлікти, сумніви та суперечності в її творчості,
    що роблять її ближчою та зрозумілішою.'
  - 'Сучасні інтерпретації: як сьогоднішній театр і кіно працюють зі спадщиною Лесі Українки? Чи актуальні її конфлікти у
    XXI столітті?'
  section: Дискусія та підсумок
  words: 700
focus: Аналіз ключових драматичних творів Лесі Українки («Лісова пісня», «Камінний господар») як феномену українського модернізму,
  з акцентом на їх деколонізаційному потенціалі, стилістичних інноваціях та подвійності тексту й сценічного втілення.
