objectives:
- Аналізувати драматичні твори Лесі Українки, розрізняючи їх текстовий вимір та перформативний потенціал
- Розпізнавати та пояснювати ключові риси українського модернізму на прикладі її драм
- Формулювати аргументовану позицію щодо деколонізаційного внеску Лесі Українки в українську культуру
- Застосовувати літературознавчу термінологію для аналізу символіки, системи персонажів та стилістичних особливостей тексту
