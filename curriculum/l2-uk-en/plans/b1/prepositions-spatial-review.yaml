module: b1-034
level: B1
sequence: 34
slug: prepositions-spatial-review
version: '3.0.3'
title: 'Просторові прийменники'
subtitle: 'Біля, серед, навпроти, між — просторові відношення перед вивченням дієслів руху'
focus: grammar
pedagogy: PPP
phase: 'B1.3 [Дієслова руху]'
word_target: 4000
objectives:
  - 'Вміти використовувати просторові прийменники біля, серед, навпроти, між, над, під, поруч з, довкола, позаду, попереду з правильним відмінком (родовим або орудним) у контексті'
  - 'Вміти розрізняти синонімічні прийменники (біля/коло/поруч з, серед/посеред, навколо/довкола) та обирати найбільш природний український варіант'
  - 'Вміти описувати просторові відношення між об''єктами та людьми за допомогою складних і складених прийменників (з-під, з-за, з-поміж, посеред)'
  - 'Вміти точно описувати розташування кімнат, об''єктів у місті та їх відносні позиції, використовуючи просторові прийменники'
  - 'Вміти розрізняти пари прийменник-прислівник (навпроти хати vs сидіти навпроти) і правильно вживати кожну з них'
dialogue_situations:
  - setting: 'Переїзд до нового офісу у Київському бізнес-центрі — розставляння меблів: Поставте шафу біля стіни. Комп''ютер — на столі. Принтер — під столом. Квітка — між вікнами.'
    speakers:
      - Офіс-менеджер
      - Вантажники
    motivation: 'Просторові прийменники: біля + Р.в., на + М.в., під + Ор.в., між + Ор.в.'
content_outline:
  - section: 'Простір навколо нас: нащо потрібні просторові прийменники?'
    words: 500
    points:
      - 'Зв''язок зі знаннями рівня А2: учні вже знають базові прийменники (в, на, до, з, біля). Цей модуль розширює просторовий інструментарій для вираження точних відношень: не лише «біля», а й «між», «навпроти», «серед», «позаду», «над», «під». Ця точність є важливою для модулів з дієсловами руху, які будуть далі (модулі №28–36).'
      - 'Чому цей модуль передує дієсловам руху: дієслова руху відповідають на питання КУДИ ви йдете; просторові прийменники — ДЕ знаходяться предмети. Треба знати пункт призначення, перш ніж описувати подорож. Аналогія з підручника Заболотного (7 клас, с.184): прийменник + іменник = одиниця, яка виражає просторові, часові чи причинові відношення.'
      - 'Текст для читання: опис української міської площі з використанням усіх цільових прийменників. Учні стикаються з прийменниками у природному контексті перед їх аналізом.'
  - section: 'Прості просторові прийменники: біля, серед, навпроти'
    words: 700
    points:
      - 'Біля + родовий відмінок. Біля вокзалу є парк. Біля школи зупинка автобуса. Синоніми: коло, поблизу, поруч з (+ орудний!). Зауваження: "біля" — найбільш нейтральний і поширений варіант. "Коло" має дещо книжковий відтінок, "поблизу" підкреслює близькість.'
      - 'Серед + родовий відмінок. Серед людей на площі стояв музикант. Серед лісу — галявина. Складний варіант: посеред. Посеред кімнати стояв стіл. З підручника Авраменка (7 клас, с.163): прийменники виражають просторові відношення між предметами.'
      - 'Навпроти + родовий відмінок. Навпроти нашого дому — аптека. Навпроти церкви — парк. Розрізнення прийменника та прислівника: Він сидів навпроти (прислівник, без іменника). Він сидів навпроти мене (прийменник + Р.в.).'
      - 'Практика: учні описують розташування свого району за допомогою "біля", "серед", "навпроти" з правильними закінченнями відмінків. 8-10 речень-прикладів, що моделюють природні українські просторові описи.'
  - section: 'Між, над, під, за, перед'
    words: 700
    points:
      - 'Між + орудний відмінок. Між будинками — вузька вулиця. Між нами все добре. Складні варіанти: поміж, з-поміж. Примітка: "між" + Р.в. є архаїчним/діалектним; у стандартній українській вживається Ор.в.'
      - 'Над + орудний відмінок. Над містом літав лелека. Над річкою — міст. Складний варіант: понад. Понад берегом — верби.'
      - 'Під + орудний (місцезнаходження) vs під + знахідний (напрямок руху): Кіт сидить під столом (Ор.в. = місцезнаходження). Кіт заліз під стіл (Зн.в. = напрямок/рух). Це розрізнення підготовлює до модуля №28–33. Складний варіант: з-під: Витяг книгу з-під ліжка.'
      - 'За + орудний (місцезнаходження) vs за + знахідний (напрямок руху): За будинком — сад (Ор.в. = місце). Заховався за дерево (Зн.в. = напрямок). Перед + орудний: Перед входом стояла черга. Складний варіант: з-за: Визирнув з-за рогу.'
      - '10-12 речень-прикладів зі змішаними прийменниками в реалістичних сценаріях: опис парку, класу, міського перехрестя.'
  - section: 'Складні та складені просторові прийменники'
    words: 600
    points:
      - 'З підручників Авраменка (7 клас, с.163) та Литвінової (7 клас, с.167): Прості: біля, серед, над, під, між, за, перед. Складні: з-під, з-за, з-поміж, попід, понад, поруч. Складені: поруч з, обабіч, неподалік від, на відміну від.'
      - 'Правила правопису (Литвінова, 7 клас, с.171): Складні прийменники з дефісом: з-під, з-за, з-поміж, з-понад, з-перед. Складні прийменники разом: попід, понад, посеред, поміж. Складені прийменники окремо: поруч з, на відміну від, згідно з.'
      - 'Довкола/навколо + родовий відмінок. Довкола озера ростуть верби. Навколо будинку — паркан. Пара прийменник-прислівник: Навколо тихо (прислівник). Навколо хати (прийменник).'
      - 'Позаду + родовий, попереду + родовий: Позаду колони йшли музиканти. Попереду нас бігла собака. Обабіч + родовий: Обабіч дороги — поля. Неподалік + родовий/від: Неподалік вокзалу є готель.'
  - section: 'Прийменник чи прислівник?'
    words: 500
    points:
      - 'З підручника Заболотного (7 клас, с.184): «Поблизу села було джерело (прийм.) vs Поблизу було джерело (присл.)». Головний тест: якщо після слова йде іменник у відповідному відмінку, це прийменник. Якщо воно стоїть самостійно — це прислівник. Саме так українські підручники вчать розрізняти їх.'
      - 'Пари для практики: навпроти: Навпроти школи — магазин (прийм.) / Він сів навпроти (присл.). поруч: Поруч з ним стояла мати (прийм.) / Мати стояла поруч (присл.). довкола: Довкола хати — квіти (прийм.) / Довкола було тихо (присл.). попереду: Попереду загону йшов командир (прийм.) / Біжи попереду (присл.).'
      - 'Вправа на виправлення помилок: учні визначають, чи є виділені слова прийменниками або прислівниками, і перевіряють узгодження відмінків.'
  - section: 'Просторовий опис: кімната, вулиця, місто'
    words: 600
    points:
      - 'Зразок опису української квартири: зв''язний текст із 10+ просторовими прийменниками у природному потоці мовлення. Учні бачать, як прийменники поєднуються для точного просторового відображення.'
      - 'Текст про орієнтування в місті: опис того, як дістатися від вокзалу до готелю, використовуючи навпроти, повз, за, перед, між, біля. Це підготовка до вивчення лексики подорожей у модулі №36.'
      - 'Самоперевірка українською: Опишіть свою кімнату, вживаючи щонайменше 8 різних просторових прийменників. Для кожного прийменника перевірте відмінок наступного іменника.'
  - section: 'Підсумок: ваш просторовий словник'
    words: 400
    points:
      - 'Повна таблиця прийменників за відмінками: Родовий: біля, серед, посеред, навпроти, довкола, навколо, позаду, попереду, обабіч, неподалік, з-поміж, з-за, з-під. Орудний: між, над, під (місцезнаходження), за (місцезнаходження), перед, поруч з, понад. Знахідний: під (напрямок), за (напрямок). Правопис: дефіс (з-під, з-за), разом (попід, понад, посеред), окремо (поруч з, неподалік від).'
      - 'Анонс до модуля №28 (основи дієслів руху): тепер, коли учні знають, ДЕ знаходяться предмети, наступний модуль навчить їх, ЯК пересуватися між ними. Просторові прийменники поєднуються з дієсловами руху: підійти до, відійти від, перейти через, обійти навколо.'
vocabulary_hints:
  required:
    - "біля (near/beside — + Р.в.)"
    - "серед (among — + Р.в.)"
    - "навпроти (opposite — + Р.в.)"
    - "між (between — + Ор.в.)"
    - "над (above/over — + Ор.в.)"
    - "під (below/under — + Ор.в. location, + Зн.в. direction)"
    - "за (behind — + Ор.в. location, + Зн.в. direction)"
    - "перед (in front of — + Ор.в.)"
    - "довкола (around — + Р.в.)"
    - "навколо (around — + Р.в.)"
    - "поруч з (next to — + Ор.в.)"
    - "позаду (behind — + Р.в.)"
    - "попереду (in front of/ahead of — + Р.в.)"
    - "з-під (from under — compound preposition)"
    - "з-за (from behind — compound preposition)"
  recommended:
    - "посеред (in the very middle of — + Р.в.)"
    - "поміж (between/among — + Ор.в.)"
    - "понад (just above — + Ор.в.)"
    - "попід (along the base of — + Ор.в.)"
    - "обабіч (on both sides of — + Р.в.)"
    - "неподалік (not far from — + Р.в.)"
    - "площа (square — city square)"
    - "перехрестя (intersection/crossroads)"
    - "квартал (city block)"
    - "узбіччя (roadside)"
activity_hints:
  - type: quiz
    focus: 'Обрати правильний відмінок після кожного просторового прийменника (Р.в., Ор.в. або Зн.в.).'
    items: 8
  - type: match-up
    focus: 'З''єднати просторові прийменники з їхніми синонімами (біля/коло/поблизу, серед/посеред).'
    items: 8
  - type: fill-in
    focus: 'Доповнити речення правильним просторовим прийменником за змістом.'
    items: 8
  - type: group-sort
    focus: 'Розподілити прийменники за необхідним відмінком: родовий / орудний / знахідний.'
    items: 12
  - type: error-correction
    focus: 'Знайти і виправити помилки у відмінках після просторових прийменників у реченнях.'
    items: 6
  - type: free-write
    focus: 'Описати кімнату або вулицю, використовуючи принаймні 8 різних просторових прийменників.'
    items: 6
