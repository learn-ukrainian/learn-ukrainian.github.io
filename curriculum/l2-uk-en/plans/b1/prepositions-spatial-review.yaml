grammar:
  - 'Прості просторові прийменники: біля, серед, навпроти + Р.в.'
  - 'Між, над, під, за, перед + Ор.в. (місце) / Зн.в. (напрямок)'
  - 'Складні прийменники: з-під, з-за, з-поміж, попід, понад, посеред'
  - 'Складені прийменники: поруч з, неподалік від, обабіч'
  - 'Розрізнення прийменника та прислівника'
  - 'Правопис: дефіс, разом, окремо для складних та складених прийменників'
register: науково-навчальний
references:
  - title: "Авраменко Grade 7, p.163-166"
    notes: 'Прийменник як службова частина мови, види за будовою, просторові відношення.'
  - title: "Литвінова Grade 7, p.167-189"
    notes: 'Повний розділ про прийменники: прості/складні/складені, написання, вправи.'
  - title: "Заболотний Grade 7, p.182-188"
    notes: 'Прийменник, розрізнення прийменника та прислівника, правопис складних прийменників.'
  - title: "Ворон Grade 9, p.226"
    notes: 'Розбір прийменника як частини мови — модель просторових відношень.'
