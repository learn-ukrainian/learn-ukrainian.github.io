slug: communication-channels
version: '1.0'
title: Канали комунікації
subtitle: Communication Channels — Phone, Email & Formal Letters
focus: practical
pedagogy: PPP
phase: B1.9 [Communication Skills]
word_target: 4000
objectives:
- Learner can make and receive phone calls in Ukrainian
- Learner can write personal emails to Ukrainian friends
- Learner can write formal letters for everyday situations
- Learner can choose appropriate communication channel and register
content_outline:
- section: Вступ — Вибір каналу та культурний контекст (Introduction — Choosing a Channel & Cultural Context)
  words: 700
  points:
  - 'Аналіз українського цифрового ландшафту: домінування Telegram (75% для новин та роботи) порівняно з Viber (сімейні/шкільні
    чати) та Facebook Messenger.'
  - 'Культурна дискусія про привітання: чому «Добрий день!» є нормою за Державним стандартом (§4.5.1), а «Доброго дня!» часто
    вважається помилковою гіперкорекцією.'
  - 'Визначення регістру спілкування: коли доречно переходити з електронної пошти на месенджер (правило «першого контакту»).'
  - 'Дотримання Державного стандарту (§3.1): використання еліпсису в привітаннях та коротких відповідях (наприклад, «Мені
    також!») для природності мовлення.'
- section: Телефонний зв'язок та етикет (Phone Calls & Etiquette)
  words: 900
  points:
  - 'Стандартні формули початку розмови: «Алло», «Слухаю», «Говорить [ім''я]». Офіційне звертання за Державним стандартом
    (Олено Петрівно — Ім''я + По батькові).'
  - 'Проблеми зі зв''язком: оперування поняттями «поганий зв''язок», «зник зв''язок», «переривається», «не чути».'
  - 'Телефонний етикет у різних ситуаціях: запис до лікаря, звернення до служби підтримки, приватна домовленість.'
  - 'Корекція типової помилки: вживання «Вибачте» або «Перепрошую» замість калькованого «Я вибачаюсь» при перериванні розмови
    або проханні почекати.'
- section: Листування в месенджерах та соціальних мережах (Messaging & Social Media Correspondence)
  words: 800
  points:
  - 'Етикет голосових повідомлень (voice messages): аналіз ситуацій, коли це зручно, а коли вважається порушенням приватних
    кордонів.'
  - 'Специфіка «робочого чату»: використання емоджі, скорочень та реакцій. Межа між неформальним та напівформальним стилем.'
  - 'Синтаксис месенджерів: пунктуація (або її відсутність), сегментація повідомлень (одна думка — одне повідомлення).'
  - 'Лексика високої частотності: «писати в месенджер», «бути на зв''язку», «скинути лінк».'
- section: Електронна пошта та ділове листування (Email & Business Correspondence)
  words: 900
  points:
  - 'Структура офіційного листа за Стандартом: «шапка», офіційне привітання («Шановний пане/пані»), основна частина, підпис
    («З повагою», «З найкращими побажаннями»).'
  - Оформлення теми листа (subject line) та робота з прикріпленими файлами (attachment). Фрази «Додаю файл», «Дивіться у вкладенні».
  - 'Корекція помилки ступенів порівняння в бізнес-стилі: використання «детальніше» або «більш детально» замість кальки «більш
    детальніше».'
  - 'Типові жанри ділового листування: лист-запит, лист-подяка, формальне запрошення на зустріч.'
- section: Практикум та аналіз комунікаційних сценаріїв (Workshop & Communication Scenarios Analysis)
  words: 700
  points:
  - 'Рольова гра: вибір каналу комунікації для вирішення критичної проблеми (телефонний дзвінок vs повідомлення).'
  - 'Вправа на трансформацію регістру: перетворення неформального повідомлення з Telegram на офіційний email.'
  - 'Аналіз кейсів: «Виправте помилки» — робота з калькованими фразами «Я вибачаюсь», «Доброго дня» та подвійними ступенями
    порівняння.'
  - 'Фінальний проєкт: написання формальної заяви та неформального запрошення, враховуючи нюанси звертань (Олено Петрівно
    vs Олено/Оленко).'
vocabulary_hints:
  required:
  - телефон (telephone) — мобільний телефон, стаціонарний телефон
  - дзвінок (call) — вхідний дзвінок, пропущений дзвінок
  - електронна пошта (email) — надіслати на пошту, перевірити скриньку
  - лист (letter) — офіційний лист, паперовий лист
  - формальний (formal) — формальний стиль спілкування
  - неформальний (informal) — неформальна зустріч
  - звертання (greeting, salutation) — офіційне звертання, кличний відмінок
  - підпис (signature) — поставити підпис, електронний підпис
  - месенджер (messenger) — писати в месенджер; висока частотність (Telegram/Viber)
  - зв'язок (connection/link) — бути на зв'язку, поганий зв'язок, зник зв'язок
  - листування (correspondence) — ділове листування, вести листування
  - привітання (greeting) — вітальні слова, офіційне привітання
  recommended:
  - слухавка (receiver) — підняти слухавку, покласти слухавку
  - передзвонити (to call back) — я передзвоню пізніше
  - шановний (dear, respected) — Шановний пане директоре (formal)
  - вдячний (grateful) — Буду вдячний за відповідь
  - прикріплений файл (attachment) — дивіться прикріплений файл
  - тема листа (subject line) — обов'язково вкажіть тему листа
  - голосове повідомлення (voice message) — записати голосове повідомлення
  - робочий чат (work chat) — обговорити в робочому чаті
  - перепрошую (excuse me) — ввічлива форма замість «вибачаюсь»
