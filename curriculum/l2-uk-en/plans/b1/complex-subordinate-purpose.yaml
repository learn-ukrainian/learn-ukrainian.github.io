module: b1-079
level: B1
sequence: 79
slug: complex-subordinate-purpose
version: '3.1.3'
title: "Речення мети"
subtitle: "Для чого? Щоб, для того щоб, аби"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Складний синтаксис]"
word_target: 4000
objectives:
  - "Учень вміє будувати підрядні обставинні мети за допомогою сполучників щоб, для того щоб, аби, з тим щоб."
  - "Учень навчиться розрізняти вживання щоб з інфінітивом (однаковий підмет) та щоб з дієсловом у минулому часі (різні підмети): Я прийшов, щоб допомогти проти Я прийшов, щоб ти побачив мене."
  - "Учень вміє відрізняти щоб у реченнях мети від щоб у з'ясувальних реченнях (модуль №67): мета чи бажання."
  - "Учень може використовувати речення мети разом із прийменниками мети з модуля №51 (для, задля, заради) для стилістичної різноманітності."
  - "Учень вміє природно використовувати речення мети в усному та писемному мовленні."
dialogue_situations:
  - setting: 'Батьки допомагають підлітку готуватися до ЗНО — речення мети: Вчи, щоб скласти іспит. Я записала тебе на курси, аби ти підготувався. Для того щоб вступити, потрібен високий бал.'
    speakers:
      - Мама
      - Випускник (graduate)
    motivation: 'Речення мети: щоб, аби, для того щоб — мотивація та цілі'
content_outline:
  - section: "Підрядні обставинні мети"
    words: 700
    points:
      - "Визначення: підрядне обставинне мети вказує на мету, з якою здійснюється дія головної частини. Відповідає на питання для чого? з якою метою? навіщо? Лелека крилатий вернувся до білої хати, аби лише вдома вмирати (М. Ткачук)."
      - "Ключові сполучники за підручником Заболотного (8 клас, с. 112): щоб (найпоширеніший), для того щоб (офіційний, з наголосом на меті), аби (літературний/народний), з тим щоб (офіційно-діловий)."
      - "Позиція: підрядна частина мети зазвичай стоїть ПІСЛЯ головної: Я вивчаю українську, щоб розуміти людей. Але може стояти і перед нею для емфази: Щоб розуміти людей, я вивчаю українську."
  - section: "Щоб + інфінітив vs щоб + особова форма"
    words: 900
    points:
      - "ОДНАКОВИЙ підмет → щоб + інфінітив: Я прийшов, щоб допомогти. Вона вивчає мову, щоб працювати в Україні. Ми зібралися, щоб обговорити плани."
      - "РІЗНІ підмети → щоб + дієслово у минулому часі (форма умовного способу): Я прийшов, щоб ти побачив мене. Мати приготувала вечерю, щоб діти поїли. Учитель пояснив тему ще раз, щоб усі зрозуміли. Примітка: після щоб дієслово вживається у формі минулого часу (не майбутнього!). Це важливе граматичне правило української мови."
      - "Типова помилка: використання майбутнього часу після щоб: *Я прийшов, щоб ти побачиш мене. → НЕПРАВИЛЬНО. Я прийшов, щоб ти побачив мене. → ПРАВИЛЬНО. Форма минулого часу після щоб НЕ позначає минулу дію — вона виражає мету або бажання (значення умовного способу)."
      - "Практика: 12 речень — визначити, чи слід вживати інфінітив або форму минулого часу, залежно від підмета."
  - section: "Щоб у з'ясувальних vs обставинних"
    words: 650
    points:
      - "Відмінність від модуля №67 (з'ясувальні речення із щоб): З'ясувальне: Я хочу, щоб ти прийшов. (бажання — відповідає на питання що хочу?). Мети: Я подзвонив, щоб ти прийшов. (мета — відповідає на питання для чого?). Перевірка: пояснюване слово. У з'ясувальному реченні є специфічне пояснюване слово (хочу, прошу). Підрядне мети стосується всієї дії головного речення."
      - "Більше прикладів: З'ясувальне: Вона попросила, щоб я допоміг. (попросила — пояснюване слово). Мети: Вона приїхала, щоб я допоміг. (приїхала — вся дія, мета якої — щоб я допоміг)."
      - "Практика: класифікувати 8 речень зі сполучником щоб як з'ясувальні або обставинні мети."
  - section: "Варіанти сполучників мети"
    words: 600
    points:
      - "Для того щоб — підкреслює мету, трохи офіційніше: Для того щоб досягти мети, потрібно працювати. З розщепленням: Для того, щоб досягти мети, потрібно працювати."
      - "Аби — літературний, архаїчний або народно-розмовний: Аби лише вдома вмирати (М. Ткачук). Аби здоров'я було, а решта буде. Має більш емоційне та експресивне забарвлення, ніж нейтральне щоб."
      - "З тим щоб — офіційно-діловий, канцелярський: З тим щоб забезпечити виконання, створено комісію. Практика: перефразувати 4 речення мети, використовуючи різні сполучники."
  - section: "Практика: речення мети у мовленні"
    words: 750
    points:
      - "Типові мовленнєві моделі: Я вивчаю..., щоб... / Потрібно..., щоб... / Ми зробили..., для того щоб... Діалог: обговорення мотивації та цілей із використанням речень мети."
      - "Текст для читання: мотиваційний текст про вивчення української мови. Містить органічно вплетені речення мети. Завдання перевіряють вміння відрізняти речення мети від з'ясувальних підрядних."
      - "Зв'язок із прийменниками мети (модуль №51): для + Р.в., задля + Р.в.: Я вивчаю мову для роботи. = Я вивчаю мову, щоб працювати. Обидві конструкції виражають мету, але варіант із підрядним реченням є гнучкішим."
      - "Продукція: написати 6-8 речень про причини та цілі власних дій, використовуючи щоб + інфінітив та щоб + минулий час (при різних підметах)."
  - section: "Підсумок та перехід до модуля №73"
    words: 400
    points:
      - 'Підсумок: речення мети = для чого? навіщо? Щоб + інфінітив (один підмет), щоб + мин. час (різні підмети). Варіанти: для того щоб, аби. Розрізнення: з''ясувальні речення проти обставинних мети з щоб. Самоперевірка: Я правильно вживаю щоб + інфін./мин. час ✓/✗.'
      - "Анонс: модуль №73 — Речення допусту. Всупереч чомусь: хоч, дарма що."
vocabulary_hints:
  required:
    - "підрядне обставинне мети (purpose subordinate clause)"
    - "щоб (in order to/that — purpose conjunction)"
    - "для того щоб (in order to — formal purpose)"
    - "аби (in order to — literary/folk)"
    - "мета (purpose, goal)"
    - "інфінітив (infinitive — used after щоб with same subject)"
  recommended:
    - "з тим щоб (in order to — formal/bureaucratic)"
    - "задля (for the sake of — preposition, review from модуль №51)"
    - "навіщо (what for — question word for purpose)"
    - "для чого (what for — question phrase for purpose)"
