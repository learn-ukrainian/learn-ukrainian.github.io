slug: motion-starting-returning
version: '2.0'
title: 'Рух: початок і повернення'
subtitle: Motion - Starting & Returning
content_outline:
- section: Діагностика
  points:
  - 'Prefix diagnostic — діалог про хаотичний ранок: спроба зайти в переповнену маршрутку,
    забігти в кіоск'
  - Intuition check — перевірка розуміння різниці між «йти» та «піти», «їхати» та
    «поїхати»
- section: Пояснення
  points:
  - по-, за-, роз- prefixes — семантика початку (по-), відвідування/входу (за-) та
    розходження (роз-); State Standard §4.3.8
  - 'Starting, stopping by, dispersing — «поїхати» (start trip), «зайти» (visit/enter),
    «розійтися» (disperse); learner error: плутанина префіксів руху з іншими значеннями'
- section: Поглиблення
  points:
  - 'Extended patterns — розрізнення «зайти за кимось» (пішки) та «заїхати за кимось»
    (транспортом); preposition confusion: «зайти в» vs «зайти за»'
  - 'Nuanced usage — «зайти» (casual) vs «увійти» (formal); cultural hook: традиція
    «На коня» перед тим, як гості розійдуться'
- section: Практика
  points:
  - 'Prefix selection exercises — фокус на виборі між транспортом (їхати) та ходою
    (йти); learner error: «піти до Львова» замість «поїхати»'
- section: Діалоги
  points:
  - 'Movement dialogues — сценарій від''їзду; cultural hook: звичай «Присісти на дорогу»
    перед виходом з дому'
  - 'Natural usage — етикет транспорту: «Спочатку виходять, потім заходять»; colloquial
    usage: «заскочити» (pop in)'
vocabulary_hints:
  required:
  - піти/виходити (to leave on foot/exit) — вийти з дому, вийти на зупинці
  - поїхати/виїжджати (to leave by vehicle/exit) — поїхати у відпустку, виїхати з
    міста
  - зайти/заходити (to stop by on foot) — зайти в гості, зайти в магазин, зайти по
    дорозі
  - заїхати/заїжджати (to stop by in vehicle) — заїхати за кимось, заїхати на заправку
  - розійтися/розходитися (to disperse on foot) — розійтися по домівках, думки розійшлися
  - роз'їхатися/роз'їжджатися (to disperse by vehicle) — гості роз'їхалися
  - 'початок (beginning) — context: початок руху'
  - зупинка (stop) — вийти на зупинці
  - 'розходження (dispersal) — context: шляхи розійшлися'
  - 'напрямок (direction) — context: змінити напрямок руху'
  recommended:
  - побігти (to start running) — побігти на автобус
  - забігти (to run in briefly) — забігти в аптеку
  - розбігтися (to scatter running) — діти розбіглися
  - 'заскочити (to pop in quickly) — colloquial: заскочити на каву'
  - затриматися (to linger) — затриматися на роботі
