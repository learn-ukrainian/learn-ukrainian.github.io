module: b1-033
level: B1
sequence: 33
slug: purpose-shchob-past-form
version: '2.0'
title: 'Підрядні речення мети: щоб + минула форма'
subtitle: Purpose Clauses - Different Subjects
focus: grammar
pedagogy: TTT
phase: B1.3a [Complex Sentences]
word_target: 4000
objectives:
- Learner can explain when to use щоб + past form
- Learner can form different-subject purpose clauses
- Learner can correctly agree verb forms with subjects
- Learner can distinguish same-subject from different-subject patterns
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - Вступне слово про постановку цілей та прагнення (Standard §4.4.3). Використання приказки «Щоб рибу їсти, треба у воду
    лізти» як приклад природного вживання конструкції мети.
  - 'Концептуальний гачок: Коли ми хочемо чогось не від себе, а від інших. Огляд компетенцій рівня B1 щодо складнопідрядних
    речень.'
- section: Граматична презентація (Grammar Presentation)
  words: 1000
  points:
  - 'Контраст суб''єктів: Однойменний суб''єкт (infinitive) проти різнойменних суб''єктів (past tense). Пояснення на парах:
    «Я хочу читати» vs «Я хочу, щоб ти читав».'
  - 'Формування конструкції: сполучник «щоб» + минула форма дієслова. Делікатне введення поняття умовного способу (subjunctive)
    без перевантаження термінологією.'
  - 'Ключові дієслова-тригери волевиявлення: хотіти, просити, вимагати, радити, бажати, чекати. Правило: дієслово в підрядному
    реченні завжди узгоджується з новим підметом у роді та числі.'
  - Аспект та заперечення в конструкціях з «щоб». Як змінюється зміст при використанні доконаного та недоконаного виду («хочу,
    щоб ти робив» vs «хочу, щоб ти зробив»).
- section: Типові помилки та контраст (Common Errors & Contrast)
  words: 800
  points:
  - 'Подолання англійської інтерференції: Чому не можна казати «Я хочу тебе йти» (I want you to go). Пояснення структури «щоб
    + минулий час» як єдино правильної.'
  - 'Проблема узгодження: Аналіз помилок на кшталт «Він хоче, щоб я (жін. рід) написав...» — тренування правильного вживання
    «написала».'
  - 'Відмінкові помилки у головному реченні: Правильне керування дієслів волевиявлення (хотіти чого? — родовий відмінок; чекати
    на що? — знахідний відмінок).'
- section: Культурний контекст та діалоги (Cultural Context & Dialogues)
  words: 1200
  points:
  - 'Культурний аспект: Батьківські очікування та підтримка поколінь. Аналіз фрази «Батьки працюють, щоб діти мали краще майбутнє»
    як відображення українських сімейних цінностей.'
  - 'Діалог 1 (На роботі): Начальник і підлеглий. Використання дієслів «вимагати» та «радити» у формальному контексті (напр.,
    «Директор вимагає, щоб звіт був готовий»).'
  - 'Діалог 2 (У лікаря): Поради фахівця. Конструкція «лікар радить, щоб пацієнт дотримувався режиму».'
  - 'Діалог 3 (Планування): Використання приказки «Під лежачий камінь вода не тече» для стимулювання дії та досягнення мети.'
- section: Практика та підсумок (Practice & Summary)
  words: 500
  points:
  - Комплексні вправи на переклад з англійської на українську з фокусом на зміну суб'єкта.
  - 'Підсумок: Короткий чек-лист для самоперевірки (Різні люди? -> Минулий час? -> Узгодження роду?). Зв''язок з майбутньою
    темою умовного способу (b1-36).'
vocabulary_hints:
  required:
  - щоб (in order to/so that) — основний сполучник мети; використовується з минулим часом для різних суб'єктів
  - бажання (wish) — велике бажання, мати бажання, за власним бажанням (frequent Core B1)
  - прохання (request) — звертатися з проханням, виконати прохання, на прохання (frequent Core B1)
  - вимагати (to demand/require) — вимагати уваги, вимагати пояснень, вимагати, щоб... (high frequency)
  - радити (to advise) — радити другу, я раджу тобі, лікар радить (essential for advice context)
  - узгодження (agreement) — граматичний термін для відповідності роду/числа
  recommended:
  - наказ (command) — віддати наказ, виконати наказ, за наказом (professional context)
  - необхідність (necessity) — гостра необхідність, у разі необхідності (formal register)
  - майбутнє (future) — дбати про майбутнє, мати майбутнє (cultural context of expectations)
  - зусилля (effort) — докладати зусиль, спільними зусиллями
  - підрядне речення (subordinate clause) — структурна одиниця з «щоб»
