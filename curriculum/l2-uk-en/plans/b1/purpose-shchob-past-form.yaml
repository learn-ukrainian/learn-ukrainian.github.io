module: b1-30
level: B1
sequence: 30
slug: purpose-shchob-past-form
version: '2.0'
title: 'Підрядні речення мети: щоб + минула форма'
subtitle: Purpose Clauses - Different Subjects
content_outline:
- section: 'Тест: Перевірте себе'
  points:
  - '[]'
- section: Пояснення
  points:
  - 'Коли використовувати щоб + минулу форму — focus: contrast ''I want to do'' (same
    subject) vs ''I want YOU to do'' (different subject)'
  - 'Структура речення — learner error: usage of infinitive instead of past tense
    (English interference)'
  - 'Дієслова, що вимагають цієї конструкції — keywords: хотіти, вимагати, просити,
    радити'
  - 'Узгодження форми — learner error: gender/number disagreement in subordinate clause'
  - Аспект у конструкції з «щоб»
  - Заперечення в конструкції
  - 'Порівняння: інфінітив чи минула форма? — concept: same subject = infinitive,
    different subject = past tense'
- section: Практика
  points:
  - Як обрати правильну конструкцію?
  - 'Типові помилки та як їх уникнути — learner error: case errors in main clause
    (Nominative vs Accusative/Genitive)'
- section: Діалоги
  points:
  - 'Діалог 1: На роботі — context: boss/employee (command/request/necessity)'
  - 'Діалог 2: Батьки і діти — cultural hook: Paternal Wisdom & Family Expectations
    (''Батьки працюють, щоб діти мали краще майбутнє'')'
  - 'Діалог 3: Лікар і пацієнт — context: advice (радити); usage: лікар радить, щоб...'
  - 'Діалог 4: Вчитель і учні — context: requirement (вимагати); usage: викладач сказав,
    щоб...'
  - 'Діалог 5: Планування подорожі — proverb usage: ''Під лежачий камінь вода не тече''
    (action required for result)'
- section: Потрібно більше практики?
  points:
  - Інтеграція знань
  - Реальне застосування
  - Онлайн-ресурси
vocabulary_hints:
  required:
  - щоб (in order to/so that) — used with past tense for different subjects; distinct
    from infinitive pattern
  - умовний спосіб (subjunctive mood) — avoid heavy jargon, focus on form identity
    with past tense
  - минула форма (past form) — critical component of the structure; must agree with
    subject of subordinate clause
  - підмет (subject) — crucial for agreement check
  - узгодження (agreement) — gender/number match required (Він хоче, щоб я написала...)
  - підрядне речення (subordinate clause) — the 'щоб' clause containing the purpose
  - головне речення (main clause) — contains the volition verb (хотіти, просити)
  - різний (different) — key trigger for this grammar (different subjects)
  recommended:
  - бажання (wish) — велике бажання, мати бажання, придушити бажання, за власним бажанням
  - прохання (request) — на прохання, мати прохання, звертатися з проханням, виконати
    прохання
  - наказ (command) — віддати наказ, виконати наказ, за наказом
  - необхідність (necessity) — гостра необхідність, викликана необхідністю, у разі
    необхідності
  - вимагати (to demand/require) — вимагати уваги, вимагати, щоб...
  - радити (to advise) — радити другу, я раджу тобі, лікар радить
