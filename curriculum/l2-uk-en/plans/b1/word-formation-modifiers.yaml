    items: 20
  - type: quiz
    focus: Identify formation type of adjective
    items: 12
  - type: fill-in
    focus: Form adverbs from adjectives
    items: 15
  - type: match-up
    focus: 'Match suffix to meaning (relational, qualitative, material)'
    items: 12
