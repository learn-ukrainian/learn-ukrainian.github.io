- b1-031 (motion-prefixes-in-out — entering and exiting)
grammar:
- 'Prefix пере- with motion verbs: crossing boundaries'
- 'Prefix про- with motion verbs: passing by and passing through'
- 'Prepositions: через + Зн.в. (crossing), повз + Зн.в. (past), по + Д.в. (along)'
- 'Extended meanings: переїхати (relocate), перенести (reschedule), перевести (translate)'
- 'Extended meanings: пройти (pass — time), проїхати зупинку (miss a stop)'
- 'Aspectual pairs: переходити/перейти, проходити/пройти'
register: науково-навчальний
