module: b1-040
level: B1
sequence: 40
slug: motion-prefixes-transit
version: '3.1.3'
title: 'Перейти, проїхати'
subtitle: 'Префікси пере- (перетинання) та про- (проїжджання повз) з дієсловами руху'
focus: grammar
pedagogy: PPP
phase: 'B1.3 [Світ дієслів руху]'
word_target: 4000
objectives:
  - 'Здобувач освіти вміє пояснювати семантичну різницю між пере- (рух з одного боку на інший) та про- (рух повз або наскрізь) з дієсловами руху'
  - 'Здобувач освіти вміє утворювати та відмінювати префіксальні дієслова руху з пере- та про- (перейти, переїхати, перебігти, перенести; пройти, проїхати, пробігти, пронести)'
  - 'Здобувач освіти вміє використовувати дієслова переміщення з правильними прийменниками та відмінками (перейти через + Зн.в., проїхати повз + Зн.в., пройти по + Д.в.)'
  - 'Здобувач освіти вміє розрізняти пере- (перетинання межі) та про- (проходження повз або наскрізь без зупинки) в усному та писемному українському мовленні'
dialogue_situations:
  - setting: 'Урок водіння в Харкові — інструктор навчає орієнтуватися на маршруті: Перейдіть дорогу на зеленому. Проїдьте два перехрестя. Переїдьте міст і зверніть ліворуч.'
    speakers:
      - Інструктор з водіння
      - Учень
    motivation: 'Транзитні префікси: перейти (пере-), проїхати (про-), переїхати (пере-)'
content_outline:
  - section: 'Перетинати і проходити: рух наскрізь'
    words: 550
    points:
      - 'Місток від модулів №29–31: здобувачі освіти вміють описувати прибуття, відправлення, вхід та вихід. Тепер: як щодо переходу вулиці, проїзду через місто або повз орієнтир? Префікси пере- та про- позначають транзит — рух через або повз без входу чи прибуття.'
      - 'Текст для читання: розповідь про подорож автомобілем — перетинання річок (перетнули річку), проїзд міст (проїхали Житомир), рух крізь ліси (проїхали через ліс). Здобувачі освіти ідентифікують дієслова транзитного руху.'
      - 'За Голубом, 6 клас, с. 31: префікс пере- ілюструється списком прикладів, що демонструють його значення «з одного боку на інший».'
  - section: 'Префікс пере-: перетинання'
    words: 900
    points:
      - 'Префікс пере- означає рух з одного боку на інший, через межу: перейти: Перейдіть вулицю на зелене світло. переїхати: Переїхали міст через Дніпро. перебігти: Дитина перебігла дорогу. перелетіти: Лелеки перелетіли через гори. переплисти: Він переплив річку.'
      - 'Перенесення/переведення/перевезення: перенести: Переніс дитину через калюжу. перевести: Перевела бабусю через дорогу. перевезти: Перевезли меблі на нову квартиру. Повна парадигма відмінювання перейти: перейду, перейдеш, перейде, перейдемо, перейдете, перейдуть. Минулий час: перейшов, перейшла, перейшло, перейшли.'
      - 'Переносні значення пере-: переїхати: Переїхали до нової квартири. перенести: Перенесли зустріч на завтра. перевести: Перевела статтю з англійської. Зверніть увагу: ці фігуративні значення базуються на просторовому значенні перетину.'
      - 'Недоконаний вид: переходити: Переходьте обережно! переїжджати: Щодня переїжджаємо міст. перебігати: Не перебігайте дорогу! 8-10 прикладів у реченнях.'
  - section: 'Префікс про-: проходження повз або наскрізь'
    words: 900
    points:
      - 'Префікс про- у значенні «рух повз» (без зупинки): пройти: Пройшли повз музей, але не зайшли. проїхати: Проїхали свою зупинку! пробігти: Пробіг повз мене i не помітив. пролетіти: Літак пролетів над містом. проплисти: Човен проплив повз берег.'
      - 'Префікс про- у значенні «рух наскрізь» (перетин простору): пройти через парк. проїхати через місто. пройти по вулиці. Розрізнення: повз = поруч, через = наскрізь, по = вздовж.'
      - 'Перенесення/проведення/провезення повз або крізь: пронести: Проніс валізу через натовп. провести: Провела гостей по музею. провезти: Провезли вантаж через кордон. Повна парадигма відмінювання проїхати: проїду, проїдеш, проїде, проїдемо, проїдете, проїдуть. Минулий час: проїхав, проїхала, проїхало, проїхали.'
      - 'Переносні значення про-: пройти: Рік пройшов швидко. проїхати свою зупинку. пробігти очима. Недоконаний вид: проходити, проїжджати, пробігати. 8-10 прикладів у реченнях.'
  - section: 'Пере- чи про-? Різниця у значенні'
    words: 800
    points:
      - 'Основна відмінність: пере- = перетин межі з одного боку на інший: Перейшов дорогу. про- = рух вздовж/повз/крізь без акценту на «перетин»: Пройшов по дорозі.'
      - 'Коли пере- є більш природним: перетин вулиць, річок, кордонів: Перейдіть через міст. Переїзд на нове місце: Ми переїхали до Харкова. Перенесення: Перенесіть файли на інший диск. Коли про- є більш природним: рух без зупинки: Проїхали Вінницю не зупиняючись. Рух крізь простір: Пройдіть через двір. Пропуск зупинки: Ой, проїхали нашу зупинку!'
      - 'Контрастні приклади: Перейшов вулицю. Пройшов вулицю. Переїхав міст. Проїхав міст.'
      - '6-8 практичних сценаріїв: здобувачі освіти обирають пере- або про-.'
  - section: 'Шість префіксів разом: подорож етапами'
    words: 550
    points:
      - 'Поєднання всіх вивчених префіксів (модулі №29–32) в одній подорожі: Вийшов з дому (ви-). Перейшов вулицю (пере-). Зайшов до кав''ярні (за-). Вийшов i пішов до зупинки (ви-, пі-). Поїхав автобусом (по-). Проїхав три зупинки (про-). Доїхав до центру (до-). Приїхав на роботу (при-).'
      - 'Оглядова таблиця системи префіксів: усі 8 вивчених префіксів згруповано за просторовим значенням. ПРИБУТТЯ: при-, до-. ВІДПРАВЛЕННЯ: пі-/по-, від-. ВХІД/ВИХІД: за-, ви-. ТРАНЗИТ: пере-, про-. Здобувачі освіти заповнюють таблицю прикладами речень для кожного префікса, використовуючи базові дієслова їхати/їздити.'
      - 'Діалог: пояснення маршруту з використанням дієслів транзитного руху — «Пройдіть по Хрещатику, перейдіть через Майдан, зайдіть у метро». Здобувачі освіти практикують природне поєднання префіксів у контексті навігації.'
      - 'Продуктивна вправа: здобувачі освіти описують власний щоденний маршрут або пам''ятну подорож, використовуючи якомога більше префіксів. Мінімум: 6 різних префіксів в одній зв''язній розповіді. Взаємоперевірка: партнери перевіряють правильність використання кожного префікса і пропонують альтернативи, де інший префікс пасував би краще.'
  - section: 'Підсумок: пере- і про-'
    words: 350
    points:
      - 'Повна таблиця: пере- та про- з усіма базовими дієсловами. пере-: перейти, переїхати, перебігти, перенести, перевести, перевезти, перелетіти, переплисти. про-: пройти, проїхати, пробігти, пронести, провести, провезти, пролетіти, проплисти.'
      - 'Анонс модуль №33: Об''їхати, підійти — рух навколо та наближення. Ще два інструменти просторової точності.'
vocabulary_hints:
  required:
    - перейти (to cross on foot — perfective)
    - переїхати (to cross by vehicle / to relocate — perfective)
    - перебігти (to run across — perfective)
    - перенести (to carry across / to reschedule — perfective)
    - перевести (to lead across / to translate — perfective)
    - пройти (to walk past/through — perfective)
    - проїхати (to drive past/through — perfective)
    - пробігти (to run past — perfective)
    - переходити (to cross — imperfective)
    - проходити (to pass — imperfective)
    - пішохідний перехід (pedestrian crossing)
    - перехрестя (intersection/crossroads)
  recommended:
    - перевезти (to transport across — perfective)
    - провести (to guide through / lead — perfective)
    - провезти (to transport through — perfective)
    - перелетіти (to fly across — perfective)
    - переплисти (to swim across — perfective)
    - пролетіти (to fly past — perfective)
    - проплисти (to sail past — perfective)
    - повз (past/by — preposition)
    - наскрізь (through — adverb)
    - кордон (border)
activity_hints:
  - type: quiz
    focus: 'Вибір дієслова з пере- або про- залежно від того, чи є рух перетином або проходженням повз'
    items: 8
  - type: fill-in
    focus: 'Доповнення речень з поясненням маршруту транзитними дієсловами та прийменниками'
    items: 8
  - type: match-up
    focus: 'Встановлення відповідності між дієсловами з пере- та їхніми аналогами з про- і визначення зміни значення'
    items: 8
  - type: group-sort
    focus: 'Сортування всіх 6 вивчених груп префіксів: при-/до-/пі-/по-/від-/за-/ви-/пере-/про-'
    items: 14
  - type: error-correction
    focus: 'Виправлення помилкового вибору транзитних префіксів та прийменників у навігаційних реченнях'
    items: 6
  - type: free-write
    focus: 'Написання маршруту від однієї пам''ятки Києва до іншої з використанням дієслів на пере- та про-'
    items: 6
connects_to:
  - 'b1-031 (motion-prefixes-in-out — за-/ви- вхід та вихід)'
  - 'b1-033 (motion-prefixes-around — об-/під- рух навколо та наближення)'
  - 'b1-036 (traveling-ukraine — транзитні дієслова в розповідях про подорожі)'
prerequisites:
  - 'b1-028 (motion-base-review — пари базових дієслів руху)'
  - 'b1-031 (motion-prefixes-in-out — вхід та вихід)'
grammar:
  - 'Префікс пере- з дієсловами руху: перетин меж'
  - 'Префікс про- з дієсловами руху: проходження повз і наскрізь'
  - 'Прийменники: через + Зн.в. (перетин), повз + Зн.в. (повз), по + Д.в. (вздовж)'
  - 'Переносні значення: переїхати, перенести, перевести'
  - 'Переносні значення: пройти, проїхати зупинку'
  - 'Видові пари: переходити/перейти, проходити/пройти'
register: науково-навчальний
references:
  - title: 'Заболотний Grade 5, p.55'
    notes: 'Діаграма префіксів: бігти + пере/про серед варіантів префіксів.'
  - title: 'Голуб Grade 6, p.31'
    notes: 'Префікс пере- ілюструється значенням «з одного боку на інший».'
  - title: 'Авраменко Grade 5, p.63'
    notes: 'Семантика префіксів: пере- = рух через перешкоду.'
