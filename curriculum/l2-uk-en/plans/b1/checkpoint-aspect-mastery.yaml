content_outline:
- section: Вступ та самоаналіз (Introduction and Self-Assessment)
  words: 500
  points:
  - 'Огляд контрольної точки: оцінка знань, здобутих у модулях M06-14, та підготовка до фази дієслів руху (M16).'
  - 'Діагностика за критеріями B1: використання ''Can-do'' тверджень для визначення рівня володіння категорією виду.'
  - 'Вправа на самооцінку: адекватна самооцінка власних досягнень та виявлення слабких місць у граматичній базі.'
- section: 'Навичка 1: Минулий час та народна мудрість (Skill 1: Past Tense and Folk Wisdom)'
  words: 700
  points:
  - 'Закріплення парадигми §4.2.3.1: родові та числові форми дієслів минулого часу обох видів (хотів/побачив).'
  - 'Культурний гачок: аналіз прислів''їв ''Зробив діло — гуляй сміло'' та ''Кінець діло хвалить'' як прикладів результативності
    доконаного виду.'
  - 'Робота над помилками: розрізнення заперечення процесу (не робив — відсутність акту) та заперечення результату (не зробив).'
- section: 'Навичка 2: Майбутній час — синтетика проти аналітики (Skill 2: Future Tense — Synthetic vs Analytic)'
  words: 800
  points:
  - 'Порівняння форм майбутнього часу за стандартом: складена форма (буду боротися) проти синтетичної (боротимуся).'
  - 'Типова помилка: вживання форм теперішнього часу доконаного виду (прочитаю) для опису поточних процесів — контраст із
    ''читаю''.'
  - 'Практикум: вибір правильного виду для вираження наміру, обіцянки або регулярного планування майбутнього.'
- section: 'Навичка 3: Наказовий спосіб та заборони (Skill 3: Imperative Mood and Prohibitions)'
  words: 700
  points:
  - 'Аналіз форм за §4.2.3.2: борися, борімося, боріться — вибір виду залежно від контексту наказу (одноразовий vs повторюваний).'
  - 'Критична помилка: використання доконаного виду в заборонах (''Не зроби!'' — неправильно) проти обов''язкового недоконаного
    (''Не роби!'').'
  - 'Ввічливі прохання: використання недоконаного виду для пом''якшення наказу (Закривайте двері, будь ласка).'
- section: 'Навичка 4: Системність видових пар (Skill 4: System of Aspectual Pairs)'
  words: 650
  points:
  - 'Систематизація 40 базових пар: словотвірні моделі (-ати/-ити, чергування голосних, префіксація).'
  - 'Тестування на автоматизм: швидке розпізнавання видової приналежності дієслова за суфіксальними та префіксальними маркерами.'
  - 'Контекстуальний підбір пари: вправа на заміну виду в реченні залежно від зміни часового акценту (процес -> результат).'
- section: 'Інтеграція: Комплексна перевірка (Integration: Comprehensive Verification)'
  words: 650
  points:
  - 'Письмове завдання: розповідь про ''вчорашній день'' з інтеграцією всіх вивчених знань про вид у минулому часі.'
  - 'Аналіз загальних істин: використання недоконаного виду в прислів''ї ''Хто не робить, той не їсть'' для опису позачасових
    правил.'
  - Підсумковий тест на готовність (readiness) до наступної фази — дієслів руху, де категорія виду є фундаментальною.
vocabulary_hints:
  required:
  - 'опанування (mastery) — collocations: успішне опанування мови, процес опанування навичок; high frequency in educational
    context'
  - 'контрольна точка (checkpoint) — context: пройти контрольну точку, перевірка знань на контрольній точці'
  - 'самооцінка (self-assessment) — collocations: адекватна самооцінка, лист самооцінки для самоперевірки'
  - 'готовність (readiness) — usage: перевірка готовності до нової теми, повна готовність студента'
  - 'повторення (review/repetition) — collocations: інтервальне повторення, повторення — мати навчання'
  - 'закріплення (consolidation) — usage: закріплення матеріалу, вправи на закріплення навичок'
  - 'перевірка (verification/check) — collocations: перевірка результатів, самостійна перевірка'
  - 'прогрес (progress) — context: помітний прогрес у навчанні, відстежувати прогрес'
  - 'слабка сторона (weakness) — usage: працювати над слабкими сторонами граматики'
  - 'сильна сторона (strength) — usage: усвідомлення своїх сильних сторін'
  recommended:
  - 'досягнення (achievement) — collocations: велике досягнення, досягнення мети; high frequency'
  - 'гідний (worthy/decent) — collocations: гідний результат, гідна відповідь на запитання'
  - 'рівень (level) — context: рівень володіння мовою, середній рівень (B1)'
  - 'компетенція (competence) — usage: мовна компетенція, граматична компетенція студента'
  - 'навичка (skill) — collocations: опанування навичок, практична навичка'
  - 'знання (knowledge) — context: глибокі знання, перевірка знань'
