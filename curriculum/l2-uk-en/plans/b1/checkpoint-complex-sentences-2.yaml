title: 'Контрольна точка: складні речення (частина 2)'
subtitle: Checkpoint - Complex Sentences Part 2
focus: checkpoint
pedagogy: TTT
phase: B1.3b [Complex Sentences Checkpoint]
word_target: 4000
objectives:
- Learner can demonstrate mastery of concessive, causal, temporal clauses
- Learner can use reported speech for statements, questions, and commands
- Learner can self-assess readiness for B1.4 phase
- Learner can integrate all B1.3 complex sentence patterns
content_outline:
- section: Огляд та цілі (Review and Objectives)
  words: 400
  points:
  - 'Вступ до контрольної точки: визначення цілей рівня B1.3b та важливості підсумкового оцінювання (assessment) згідно з
    Державним стандартом §4.4.3.'
  - Обговорення поняття «інтеграція» (integration) у контексті поєднання різних типів підрядних речень для побудови складних
    висловлювань.
  - 'Самоаналіз: ідентифікація сильних сторін та прогалин у знаннях синтаксису складного речення.'
- section: Допустові та часові зв'язки (Concessive and Temporal Links)
  words: 1000
  points:
  - 'Допустові речення: використання сполучників «хоча», «дарма що», «незважаючи на те що» (State Standard §4.4.3).'
  - 'Культурний контекст: аналіз прислів''я «Вода камінь точить, хоча й м’яка» як приклад допустового зв''язку та цінності
    наполегливості.'
  - 'Часові речення: сполучне слово «коли» (одночасність) та «поки» (тривалість). Правила вживання видів дієслова в часових
    структурах.'
  - 'Практика: трансформація простих речень з прийменником «незважаючи на» у складнопідрядні з «хоча».'
- section: Причиново-наслідкова логіка (Causal-Result Logic)
  words: 900
  points:
  - 'Аналіз причинових сполучників: «тому що», «бо», та офіційний варіант «через те що» (State Standard alignment).'
  - 'Типова помилка: плутанина між причиною (тому що) та наслідком (тому). Контрастний аналіз: «Він не прийшов, тому що захворів»
    vs. «Він захворів, тому не прийшов».'
  - 'Логіка та мудрість: розбір вислову «Не відкладай на завтра того, що можна зробити сьогодні, тому що завтра може бути
    пізно».'
  - Функціональне вживання «отже» для підбиття підсумків та формулювання висновків.
- section: Трансформація непрямої мови (Reported Speech Transformation)
  words: 1000
  points:
  - 'Твердження в непрямій мові: заміна займенників та вказівних слів. Помилка: збереження займенника першої особи при цитуванні
    іншого («Він сказав, що я хочу...» замість «що він хоче»).'
  - 'Непрямі питання: використання частки «чи» для загальних питань та збереження запитальних слів (де, коли, чому) для спеціальних
    питань.'
  - 'Синтаксична норма: відсутність знака питання та розповідна інтонація в непрямих питаннях («Він запитав, коли прийде поїзд»).'
  - 'Накази та прохання: конструкція «попросив, щоб...» (+ минулий час) та «наказав» + інфінітив. Тренування з метамовою «Перетворіть
    на непряму мову».'
- section: Комплексна практика та самоконтроль (Complex Practice and Self-Check)
  words: 700
  points:
  - 'Integration Challenge: побудова речень з 2-3 підрядними частинами різних типів (напр. часове + причинове).'
  - 'Пунктуаційний практикум: коми в складних реченнях та при непрямій мові.'
  - 'Оцінювання прогресу: перевірка готовності (readiness) до переходу на фазу B1.4. Фінальний Proficiency Check.'
  - Потрібно більше практики? Рекомендації щодо додаткових вправ на основі виявлених помилок.
vocabulary_hints:
  required:
  - контрольна точка (checkpoint) — ключова контрольна точка, проходити контрольну точку; основний етап оцінювання
  - повторення (review) — систематичне повторення матеріалу; підготовка до тесту
  - оцінювання (assessment) — система оцінювання, підсумкове оцінювання; вимірювання прогресу
  - інтеграція (integration) — інтеграція в суспільство, процеси інтеграції; поєднання структур
  - непряма мова (indirect speech) — передача непрямою мовою; трансформація прямої мови
  - допустовий (concessive) — допустове речення; вираження суперечності, незважаючи на обставини
  - причиновий (causal) — причиновий сполучник; вказує на підставу дії
  - часовий (temporal) — часова підрядна частина; позначає час або тривалість
  recommended:
  - трансформація (transformation) — граматична трансформація; зміна структури речення
  - прогрес (progress) — значний прогрес, досягти прогресу; відстеження результатів навчання
  - рівень (level) — досягти рівня B1; відповідність стандартам
  - готовність (readiness) — повна готовність, готовність до змін; підтвердження навичок
