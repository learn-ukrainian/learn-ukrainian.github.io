module: b1-05
level: B1
sequence: 5
slug: ready-for-immersion
version: '2.0'
title: Готові до занурення
subtitle: Metalanguage mastery checkpoint
content_outline:
- section: 'Вступ: Стрибок у занурення (Introduction: The Immersion Leap)'
  words: 400
  points:
  - 'Why This Module Matters — The ''Airlock'' Tone Shift: Explicit warning that the
    ''English safety net'' is being removed in M06. Supportive but firm transition
    to full immersion.'
  - 'Cultural Hook: The Forbidden Letter ''Ґ''. Discuss the 1933 orthography reform
    purge, its restoration in 1990, and its role as a symbol of linguistic resilience
    and identity.'
  - 'Proverb Analysis: «Слово — не горобець, вилетить — не спіймаєш» (A word is not
    a sparrow). Establishing the theme of precision and the permanence of linguistic
    choices.'
- section: Діагностика та дієслівна термінологія (Diagnostic & Verb Terminology)
  words: 600
  points:
  - 'TTT Diagnostic Assessment: Comprehensive test of metalanguage from M01-04 to
    identify specific gaps before the immersion phase.'
  - 'Verb Label Mastery: Focus on dictionary/textbook recognition of ''доконаний''
    (perfective) and ''недоконаний'' (imperfective) labels. Alignment with State Standard
    §4.2.3.1 for independent study skills.'
- section: Дерево частин мови та типові помилки (Tree of Parts of Speech & Common
    Errors)
  words: 700
  points:
  - 'Visual Analogy: ''The Tree of Speech''. Mapping all 10 parts of speech where
    roots represent meaningful (self-standing) parts and branches represent service
    parts.'
  - 'Learner Error Clinic 1: ''Буква'' (Letter) vs ''Звук'' (Sound). Explicitly drilling
    the difference using examples like ''я'' (one letter, two sounds) to ensure phonetic
    precision.'
  - 'Learner Error Clinic 2: Stress shifting meaning. Comparative drill of minimal
    pairs like ''пла́чу'' (I am crying) vs ''плачу́'' (I am paying) to illustrate
    phonetic self-correction.'
- section: Стилістичні реєстри та граматичні тексти (Stylistic Registers & Grammar
    Texts)
  words: 800
  points:
  - 'Register Distinction (State Standard §4.5.1): Comparing ''instructional/formal''
    linguistic register used in grammar rules with the ''conversational'' register
    used in previous modules.'
  - 'Full Grammar Explanation Comprehension: Deep reading of an extended, authentic
    Ukrainian grammar passage. Identifying key instructional verbs and analytical
    markers.'
- section: Синтаксис та мовне право (Syntax & Linguistic Rights)
  words: 500
  points:
  - 'Sentence Parts Identification: Systematic review of підмет (subject), присудок
    (predicate), додаток (object), означення (attribute), and обставина (adverbial).
    Core A competency check.'
  - 'Learner Error Clinic 3: ''Правило'' (Rule) vs ''Право'' (Law/Right). Correcting
    the common false friend error ''У мене є правило'' when the learner means ''I
    have the right''.'
- section: Практичне читання та скорочення (Practical Reading & Abbreviations)
  words: 600
  points:
  - 'Mastering Academic Abbreviations (State Standard §4.1.5): Essential drill for
    reading dictionary entries and grammar notes using див. (see), пор. (compare),
    and напр. (for example).'
  - 'The Real Test: Intensive fill-in-the-blank activity where learners must complete
    a 15+ item technical grammar explanation passage entirely in Ukrainian.'
- section: Підсумок та готовність (Summary & Readiness Confirmation)
  words: 400
  points:
  - 'Final Self-Assessment: Evaluating comfort levels with Ukrainian-only instructions
    and grammatical metalanguage.'
  - 'Readiness Confirmation: Final sign-off for the M06 ''The Airlock'' transition.
    Reviewing the ''gold rules'' of immersion learning.'
vocabulary_hints:
  required:
  - граматичне поняття (grammatical concept) — High frequency in instructional texts
  - мовознавство (linguistics) — Standard academic term for the field
  - морфологія (morphology) — Structural category for parts of speech
  - синтаксис (syntax) — Critical for sentence structure analysis
  - правопис (orthography) — Related to the 'Forbidden Letter Ґ' and 1933 reforms
  - 'наголос (stress/accent) — collocations: поставити наголос, логічний наголос,
    змінний наголос; Error: пла́чу vs плачу́'
  - вимова (pronunciation) — Focus on phonetic precision
  - 'правило (rule) — High frequency; collocations: за правилом, виняток з правила,
    золоте правило; Error: vs право'
  - закономірність (pattern/regularity) — Used for describing systemic language behavior
  - система (system) — Standard term for language as a whole
  - 'частина мови (part of speech) — collocations: самостійна частина мови, службова
    частина мови'
  recommended:
  - категорія (category) — Used for grouping grammatical features
  - ознака (feature/characteristic) — Describing specific qualities of a word or rule
  - властивість (property) — Formal term for linguistic attributes
  - 'значення (meaning) — collocations: лексичне значення, граматичне значення, мати
    значення, переносне значення'
  - функція (function) — Describing the role of words in a sentence
  - 'виняток (exception) — Medium frequency; collocations: без винятку, становити
    виняток, рідкісний виняток'
  - буква (letter) — Contrast with 'звук'; written character
  - звук (sound) — Contrast with 'буква'; phoneme
