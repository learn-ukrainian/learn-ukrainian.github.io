module: b1-61
level: B1
sequence: 61
slug: professional-communication
version: '2.0'
title: Професійна комунікація
subtitle: Professional & Educational Communication
content_outline:
- section: Вступ
  points:
  - Workplace and education communication needs — aligns with State Standard §3.9
    (Work) and §3.8 (Education) covering official employment, contracts, and educational
    processes
  - 'Formal vs informal register — addresses stylistic competence (§4.5.1); cultural
    hook: use of «Ви» and «Пане/Пані» forms versus Soviet-style Name+Patronymic'
  - Professional and academic context
- section: На роботі — Робоча комунікація
  points:
  - 'Workplace vocabulary (колега, керівник, нарада, звіт) — collocations: шановний
    колега, безпосередній керівник, проводити нараду, річний звіт'
  - 'Professional dialogues and scenarios — address register confusion: transition
    to «Ти» must be invited or mutually agreed upon'
  - 'Formal correspondence — learner error: case mismatch in «Дякую Вам» (Dative)
    vs incorrect «Дякую Вас»'
- section: В університеті — Освітня комунікація
  points:
  - 'Education vocabulary (студент, викладач, лекція, семінар) — collocations: звертатися
    до викладача, готуватися до семінару; learner error: distinguish «навчатися» (being
    a student) vs «вивчати» (learning a subject)'
  - 'Academic communication (іспит, залік, курсова робота) — covers organization of
    educational process: consultation, credit, exam, semester'
  - 'University life (гуртожиток, бібліотека, деканат) — cultural hook: «Екватор»
    (Equator) tradition celebrating the midpoint of studies'
- section: Діалоги — Робота та навчання
  points:
  - 'Professional dialogues (at work scenarios) — learner error: usage of «брати участь»
    instead of calque «приймати участь»'
  - Academic dialogues (with professor, classmates)
- section: Практика
  points:
  - Role-play work and education scenarios
  - Written communication practice
vocabulary_hints:
  required:
  - колега (colleague) — шановний колега, звертатися до колеги, нарада з колегами
  - керівник (manager/supervisor) — безпосередній керівник, звіт керівнику, зустріч
    з керівником
  - нарада (meeting) — проводити нараду, бути на нараді, планова нарада
  - звіт (report) — річний звіт, писати звіт, здати звіт
  - договір (contract)
  - співпрацювати (to collaborate)
  - обговорювати (to discuss)
  - відділ (department)
  - студент (student)
  - викладач (lecturer/instructor) — звертатися до викладача, запитати викладача
  - лекція (lecture)
  - семінар (seminar) — готуватися до семінару, виступати на семінарі
  - іспит (exam)
  - залік (credit/pass)
  recommended:
  - презентація (presentation)
  - протокол (minutes/protocol)
  - делегувати (to delegate)
  - координувати (to coordinate)
  - курсова робота (term paper)
  - гуртожиток (dormitory)
  - деканат (dean's office)
  - стипендія (scholarship)
