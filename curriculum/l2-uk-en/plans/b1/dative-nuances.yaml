    focus: "Identify why dative is used in each sentence (state, age, recipient, etc.)"
    items: 8
  - type: fill-in
    focus: "Put pronouns/nouns into correct dative form in impersonal constructions"
    items: 8
  - type: match-up
    focus: "Match impersonal predicate/verb to its dative experiencer sentence"
    items: 8
  - type: sentence-builder
    focus: "Transform personal sentences to impersonal with dative experiencer"
    items: 6
  - type: error-correction
    focus: "Fix case errors: wrong case after verbs governing dative"
    items: 6
  - type: dialogue-completion
    focus: "Complete advice dialogue using Д.в. constructions (тобі варто, тобі потрібно)"
    items: 6
