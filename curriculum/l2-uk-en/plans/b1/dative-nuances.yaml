grammar:
  - "Давальний суб'єкта стану: мені холодно/сумно/не спиться"
  - "Давальний віку: мені двадцять років"
  - "Давальний з безособовими конструкціями: потрібно, варто, вдалося, довелося"
  - "Давальний адресата: допомагати, заважати, радити, дзвонити"
  - "Дієслівне керування: дієслова, що вимагають Д.в."
register: науково-навчальний
references:
