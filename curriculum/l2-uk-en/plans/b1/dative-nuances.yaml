module: b1-053
level: B1
sequence: 53
slug: dative-nuances
version: '3.2'
title: "Давальний відмінок (деталі)"
subtitle: "Суб'єкт стану, вік, потреба — розширені значення давального"
focus: grammar
pedagogy: PPP
phase: "B1.5 [Нюанси відмінків та прийменники]"
word_target: 4000
objectives:
  - "Учень вміє вживати давальний відмінок для вираження того, хто відчуває стан (мені холодно, йому сумно, їй не спиться, нам весело)"
  - "Учень вміє вживати давальний відмінок для вираження віку (мені двадцять років, йому було п'ять років)"
  - "Учень вміє вживати давальний відмінок з безособовими дієсловами та предикативами (мені потрібно, тобі варто, їй вдалося, нам можна)"
  - "Учень вміє вживати давальний відмінок для вираження адресата/отримувача з розширеним колом дієслів (дарувати другові, завдячувати батькам)"
  - "Учень вміє відрізняти давальний відмінок від інших відмінків у неоднозначних конструкціях та пояснювати, чому необхідний саме давальний відмінок"
dialogue_situations:
  - setting: 'Холодний зимовий день у Києві — усі відчувають різні стани: Мені холодно (I''m cold). Дитині нудно. Бабусі (f) важко ходити. Студентам (pl) цікаво на лекції (f).'
    speakers:
      - Родина на прогулянці
    motivation: 'Давальний суб''єкта стану: мені холодно, дитині нудно, бабусі важко, студентам цікаво'
content_outline:
  - section: "Давальний суб'єкта стану"
    words: 800
    points:
      - "Основне поняття: в українській мові фізичні та емоційні стани виражаються за допомогою СУБ'ЄКТА СТАНУ в Д.в. + безособового предикатива/дієслова: Мені холодно. Тобі сумно? Йому погано. Нам весело. Їм страшно. Особа, яка ВІДЧУВАЄ стан, стоїть у давальному відмінку, а не в називному. Це фундаментальний патерн українського мислення."
      - "Фізичні стани: мені тепло/холодно/жарко/гаряче/боляче/запаморочливо. Емоційні стани: мені сумно/весело/страшно/нудно/цікаво/соромно. Ментальні стани: мені зрозуміло/незрозуміло/байдуже/важко/легко. Предикатив незмінний (форма середнього роду)."
      - "З дієсловами: мені (не) спиться, мені (не) працюється, мені (не) хочеться, мені (не) віриться. За Авраменком (Grade 7 p.60): безособові дієслова, що вимагають давального суб'єкта стану. Порівняйте: Я не сплю (активний стан) проти Мені не спиться (стан)."
      - "Читання: персонаж описує свій день за допомогою станів у давальному відмінку. 'Зранку мені було холодно. Потім стало веселіше. Увечері мені не спалося, і я читав книжку.' Учні визначають усі конструкції з давальним відмінком."
  - section: "Давальний у виразах віку"
    words: 500
    points:
      - "Патерн: [особа в Д.в.] + [число] + рік/роки/років: Мені двадцять років. Йому тридцять один рік. Їй було п'ять років. Нам буде тридцять. Минулий: Мені було... Майбутній: Мені буде..."
      - "Як запитати про вік: Скільки тобі/вам років? Відповідь із наближенням: Мені майже тридцять. Йому за сорок. Їй під п'ятдесят."
      - "Практика: сценарій знайомства в класі, де люди діляться своїм віком, використовуючи конструкції з давальним відмінком. Включити минулий час: Коли мені було десять..."
  - section: "Давальний з безособовими конструкціями"
    words: 700
    points:
      - "Безособові предикативи + Д.в.: мені потрібно / треба, тобі варто, йому слід (більш офіційно), їй можна, нам не можна, вам довелося."
      - "Безособові дієслова + Д.в.: мені вдалося, тобі пощастило, йому належить, їм доведеться. Зверніть увагу: вдатися, пощастити, довестися є дієсловами доконаного виду — давальний відмінок позначає, хто отримав результат."
      - "Практика: перетворити особові конструкції на безособові з давальним відмінком. 'Я повинен працювати' → 'Мені потрібно працювати.' 'Вона змогла приїхати' → 'Їй вдалося приїхати.' 10-12 вправ на перетворення."
  - section: "Давальний адресата і зацікавленої особи"
    words: 600
    points:
      - "Розширене коло дієслів адресата (крім відомих з рівня А2 давати/говорити): дарувати подарунок другові, завдячувати батькам, допомагати сусідці, заважати колезі, радити лікарю, відповідати вчительці."
      - "Давальний зацікавленої особи (на чию користь): Мамі це сподобається. Дітям потрібен відпочинок. Нам цього достатньо."
      - "Практика діалогу: надання порад друзям із використанням конструкцій у давальному відмінку. 'Тобі варто відпочити. Тобі потрібно більше спати. Тобі краще зателефонувати лікарю.'"
  - section: "Давальний мети і призначення (§4.2.2.3)"
    words: 500
    points:
      - "Державний стандарт включає МЕТУ як функцію давального відмінка. Давальний мети відповідає на запитання ДЛЯ ЧОГО? у конструкціях без прийменника 'для': Пам'ятник героям. Слава Україні! (давальний присвяти). Присвята вчителям. Гімн волі (але: гімн волі вживається з Р.в., тоді як гімн свободі — з Д.в. у значенні присвяти)."
      - "Давальний відмінок з прийменниками: завдяки + Д.в. (завдяки батькам, завдяки наполегливості). навпроти/навсупроч + Д.в. (навпроти очікуванням). на зло + Д.в. (на зло ворогам). За Заболотним (Grade 7 p.193): прийменники з Д.в."
      - "Практика: 8 речень з використанням давального мети та присвяти. Відрізнити від для + Р.в.: подарунок мамі (Д.в.) проти подарунок для мами (Р.в.). Обидва варіанти правильні; Д.в. є більш особистим і прямим."
  - section: "Давальний проти інших відмінків"
    words: 500
    points:
      - "Типові труднощі: Д.в. проти Р.в.: допомагати другові (Д.в.) проти потребувати друга (Р.в.). Д.в. проти Зн.в.: телефонувати лікарю (Д.в.) проти викликати лікаря (Зн.в.). Д.в. проти Ор.в.: раді(т)и другові (Д.в.) проти захоплюватися другом (Ор.в.)."
      - "Керування дієслів: дієслова, що вимагають Д.в. в українській мові (деякі відрізняються від англійської мови): дзвонити/телефонувати комусь (Д.в., а не Зн.в.), заважати комусь (Д.в.), завдячувати комусь (Д.в.), радити комусь (Д.в.)."
      - "Практика: вибрати правильний відмінок для 12 речень, кожне з яких потребує ретельного аналізу керування дієслова."
  - section: "Підсумок"
    words: 400
    points:
      - "П'ять семантичних ролей Д.в.: 1. Суб'єкт стану (мені холодно). 2. Вік (мені двадцять років). 3. Безособові конструкції (мені потрібно). 4. Адресат (дарувати другові). 5. Мета/призначення (пам'ятник героям, завдяки батькам)."
      - "Ключові дієслова, що вимагають Д.в.: допомагати, заважати, радити, дзвонити, телефонувати, завдячувати, відповідати. Самоперевірка: класифікувати 10 речень із давальним відмінком за семантичною роллю."
      - "Попередній огляд: наступний модуль — орудний відмінок (деталі)."
vocabulary_hints:
  required:
    - "давальний відмінок (dative case)"
    - "суб'єкт стану (experiencer of a state)"
    - "безособовий (impersonal — no grammatical subject)"
    - "адресат (recipient/addressee)"
    - "потрібно (necessary — impersonal predicative + Д.в.)"
    - "варто (it is worth / one should — + Д.в.)"
    - "вдалося (succeeded — impersonal + Д.в.)"
    - "довелося (had to — impersonal + Д.в.)"
    - "байдуже (indifferent — predicate of state + Д.в.)"
    - "соромно (ashamed — predicate of state + Д.в.)"
  recommended:
    - "слід (should — formal, + Д.в.)"
    - "належить (is supposed to — formal, + Д.в.)"
    - "пощастило (was lucky — + Д.в.)"
    - "доведеться (will have to — + Д.в.)"
    - "заважати (to bother/disturb — governs Д.в.)"
    - "завдячувати (to owe gratitude — governs Д.в.)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про давальний суб''єкта стану і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Давальний у виразах віку».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему давальний суб''єкта стану.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему давальний у виразах віку.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Давальний суб''єкта стану».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Давальний у виразах віку» з їхніми визначеннями.'
connects_to:
  - "b1-046 (Родовий відмінок деталі — нюанси родового відмінка)"
  - "b1-048 (Орудний відмінок деталі — нюанси орудного відмінка)"
  - "b1-022 (Зворотні дієслова — зворотні дієслова з безособовим значенням)"
prerequisites:
  - "Завершення рівня A2 (базові форми Д.в., непрямий додаток)"
  - "b1-022 (Зворотні дієслова — не спиться, не працюється)"
grammar:
  - "Давальний суб'єкта стану: мені холодно/сумно/не спиться"
  - "Давальний віку: мені двадцять років"
  - "Давальний з безособовими конструкціями: потрібно, варто, вдалося, довелося"
  - "Давальний адресата: допомагати, заважати, радити, дзвонити"
  - "Дієслівне керування: дієслова, що вимагають Д.в."
register: науково-навчальний
references:
  - title: "Авраменко Grade 7, p.60-63"
    notes: "Безособові дієслова: стан, природа, безособове використання особових дієслів."
  - title: "Заболотний Grade 6, p.93"
    notes: "Таблиця значень відмінків: Д.в. = 'особу чи предмет, для яких відбувається дія.'"
  - title: "Заболотний Grade 8, p.84"
    notes: "Займенникові прийменникові конструкції, включаючи керування давальним відмінком."
