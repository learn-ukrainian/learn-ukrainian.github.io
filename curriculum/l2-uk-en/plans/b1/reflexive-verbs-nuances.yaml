module: b1-028
level: B1
sequence: 28
slug: reflexive-verbs-nuances
version: '3.0.2'
title: 'Зворотні дієслова'
subtitle: 'Нюанси -ся/-сь: взаємність, стан, пасивність'
focus: grammar
pedagogy: PPP
phase: 'B1.2 [Дієслова]'
word_target: 4000
objectives:
  - 'Вміти ідентифікувати зворотні дієслова за суфіксом -ся/-сь та пояснювати їхнє основне значення: дія, спрямована на самого суб''єкта'
  - 'Вміти розрізняти семантичні групи зворотних дієслів: власне зворотні (митися), взаємні (зустрічатися), стану (сердитися), безособові (не спиться), пасивноподібні (будується)'
  - 'Вміти застосовувати правило милозвучності для -ся vs -сь: -сь перед словом, що починається на голосний, -ся перед словом, що починається на приголосний (Заболотний 7 клас, с.51)'
  - 'Вміти правильно вимовляти -шся як [с'':а] та -ться як [ц'':а] і розуміти розбіжність між написанням та вимовою'
  - 'Вміти природно використовувати зворотні дієслова у повсякденному спілкуванні: одягатися, збиратися, хвилюватися, знайомитися'
dialogue_situations:
  - setting: 'Ранковий хаос у студентському гуртожитку в Києві — всі збираються одночасно: Я вмиваюся! Він голиться. Ми збираємося. Вони сміються. Двері не зачиняються!'
    speakers:
      - Сусіди по кімнаті
    motivation: 'Зворотні дієслова: вмиватися, голитися, збиратися, сміятися, зачинятися'
content_outline:
  - section: 'Що таке зворотні дієслова?'
    words: 650
    points:
      - 'Визначення за підручником Заболотного (7 клас, с.176): Дієслова із суфіксом -ся(-сь), які виражають зворотну дію, називаються зворотними: навчатися, закохатися. Сучасний дієслівний суфікс -ся(-сь) — це давня коротка форма зворотного займенника себе в Зн. в. однини: Я не боюся = Я ся не бою (діал.).'
      - 'Як -ся змінює дієслова: мити (щось) → митися (мити себе), бачити (щось) → бачитися (одне з одним / зустрічатися), вчити (когось) → вчитися (навчатися). Не всі дієслова на -ся мають незворотну пару: сміятися, боятися, сподіватися — існують лише зі -ся.'
      - 'Позиція -ся: завжди після закінчення дієслова або суфікса інфінітива. Вмивати → вмиватися, взувати → взуватися. У відмінюваних формах: вмиваюся, вмиваєшся, вмивається. В інфінітиві: вмиватися. У минулому часі: вмивалася, вмивався.'
  - section: 'Семантичні групи зворотних дієслів'
    words: 850
    points:
      - '1. Власне зворотні — дія спрямована на самого виконавця: митися, одягатися, голитися, зачісуватися. Тест: чи можна додати «сам/сама себе»? Якщо так, це власне зворотне дієслово. З підручника Кравцової (4 клас, с.111): «Дієслова на -ся, -сь виражають дію, спрямовану на самого виконавця».'
      - '2. Взаємні — дія між двома або більше особами: зустрічатися, листуватися, обніматися, цілуватися. З підручника Заболотного (8 клас, с.96): зворотні дієслова на позначення дії, «здійснюваної двома й більше особами та взаємно спрямованої: знайомі листуються (між собою)».'
      - '3. Стану та емоцій — суб''єкт переживає певний стан: сердитися, хвилюватися, радіти → радітися, дивуватися. Не всі мають пари: боятися, сподіватися — лише зворотні.'
      - '4. Безособові — суб''єкт відсутній або невизначений: не спиться, не їсться, хочеться, здається. Вони вимагають давального відмінка: Мені не спиться. Йому здається.'
      - '5. Пасивноподібні — підготовка до M23: Дім будується. Книга читається легко. Вони перетинаються з пасивним станом — детальніше у наступному модулі.'
  - section: 'Милозвучність: -ся чи -сь?'
    words: 600
    points:
      - 'Правило з підручника Заболотного (7 клас, с.51): -сь вживаємо, якщо наступне слово починається голосним звуком. -ся вживаємо, якщо наступне слово починається приголосним. милуватись озером — милуватися горами. повернутись о шостій — повернутися додому.'
      - 'Пари для практики (Заболотний, 7 клас, с.51): Повернути(ся/сь) о шостій годині → повернутись о шостій. Зустріти(ся/сь) біля кав''ярні → зустрітися біля кав''ярні. Катати(ся/сь) на скейті → кататися на скейті. Свято закінчило(ся/сь) увечері → закінчилось увечері. Пройти(ся/сь) вулицею → пройтися вулицею.'
      - 'Правила вимови (Кравцова, 4 клас, с.111): -шся вимовляємо як [с'':а]: спиняєшся [спиняйес'':а]. -ться вимовляємо як [ц'':а]: прокидається [прокидайец'':а]. Це послідовна фонетична закономірність української мови, яку учні повинні відпрацювати для природного звучання.'
  - section: 'Зворотні дієслова у повсякденному мовленні'
    words: 750
    points:
      - 'Ранкова рутина — суцільні зворотні дієслова: прокидатися, підводитися, вмиватися, чистити зуби (не зворотне!), одягатися, зачісуватися, збиратися. Міні-текст: Я прокидаюся о сьомій. Підводжуся, вмиваюся, одягаюся й збираюся на роботу.'
      - 'Соціальні взаємодії — взаємні дієслова: знайомитися, зустрічатися, прощатися, спілкуватися, обніматися, віталися. Діалог: знайомство з кимось новим, використання "знайомитися", "спілкуватися".'
      - 'Емоції та стани: хвилюватися, радіти, дивуватися, сердитися, соромитися, сумувати (НЕ зворотне). Зверніть увагу: не всі дієслова емоцій є зворотними. Сумувати, плакати — без -ся. Порівняння: хвилювати (когось) vs хвилюватися (самому).'
      - 'Діалог: друзі планують вихідні, природно використовуючи зворотні дієслова для рутини (збираюся), емоцій (хвилююся), спільних дій (зустрінемося) та безособових станів (мені не хочеться).'
  - section: 'Типові помилки та контрастні пари'
    words: 700
    points:
      - 'Помилка 1: Додавання -ся там, де це не потрібно (вплив русизмів): *Я дякуюся вам → Я дякую вам ("дякувати" не зворотне). *Вибачаюся → Вибачте / Перепрошую ("вибачатися" = вибачати себе, але ввічлива форма — "вибачте", наказовий спосіб від "вибачити"). Уникайте "вибачаюся" як вибачення.'
      - 'Помилка 2: Пропуск -ся там, де воно необхідне: *Я боюю → Я боюся ("боятися" не має незворотної форми). *Вони зустрічали вчора → Вони зустрічалися вчора (взаємна дія). Учні мають запам''ятати, які дієслова завжди є зворотними.'
      - 'Контрастні пари, що демонструють зміну значення: вчити (когось) vs вчитися (навчатися); збирати (речі) vs збиратися (готуватися / мати намір); дивити (архаїзм) vs дивитися (на щось); повертати (щось) vs повертатися (назад). Ці пари показують, як -ся систематично змінює значення.'
  - section: 'Підсумок та перехід до M23'
    words: 500
    points:
      - 'Підсумок: зворотні дієслова = дієслова з суфіксом -ся/-сь. 5 семантичних груп: власне зворотні, взаємні, стану, безособові, пасивноподібні. Милозвучність: -ся/-сь залежить від наступного слова. Вимова: -шся [с'':а], -ться [ц'':а]. Самоперевірка: Я можу визначити тип зворотного дієслова ✓/✗, Я правильно вживаю -ся/-сь ✓/✗, Я знаю, які дієслова завжди зворотні ✓/✗.'
      - 'Анонс: M23 — Пасивний стан (вступ). П''ята категорія (пасивноподібні) розглядається в окремому модулі. Як зворотні дієслова створюють пасивне значення: Дім будується робітниками. А також: специфічні для української мови форми на -но/-то: Дім збудовано.'
vocabulary_hints:
  required:
    - "зворотне дієслово (reflexive verb — verb with -ся/-сь)"
    - "суфікс -ся/-сь (reflexive suffix — from давнє 'себе')"
    - "власне зворотні (truly reflexive — action on self: митися)"
    - "взаємні (reciprocal — action between people: зустрічатися)"
    - "безособовий (impersonal — no subject: не спиться, хочеться)"
    - "митися (to wash oneself)"
    - "одягатися (to dress oneself)"
    - "збиратися (to get ready / to intend)"
    - "зустрічатися (to meet each other)"
    - "хвилюватися (to worry)"
    - "дивуватися (to be surprised, amazed)"
    - "боятися (to be afraid — always reflexive)"
    - "сподіватися (to hope — always reflexive)"
    - "знайомитися (to get acquainted)"
  recommended:
    - "прокидатися (to wake up)"
    - "вмиватися (to wash one's face)"
    - "зачісуватися (to comb one's hair)"
    - "прощатися (to say goodbye)"
    - "соромитися (to be ashamed)"
    - "сердитися (to be angry)"
    - "листуватися (to correspond with each other)"
    - "повертатися (to return — vs повертати: to turn)"
    - "вчитися (to study — vs вчити: to teach)"
    - "здаватися (to seem — impersonal: мені здається)"
activity_hints:
  - type: group-sort
    focus: 'Розподілити зворотні дієслова за семантичними групами: власне зворотні / взаємні / стану / безособові.'
    items: 12
  - type: fill-in
    focus: 'Обрати -ся або -сь залежно від наступного слова (правило милозвучності).'
    items: 8
  - type: match-up
    focus: 'З''єднати перехідні дієслова з їхніми зворотними парами та звернути увагу на зміну значення (вчити → вчитися).'
    items: 10
  - type: quiz
    focus: 'Визначити, чи дієслово завжди зворотне, чи має незворотну пару.'
    items: 8
  - type: error-correction
    focus: 'Виправити помилки: *вибачаюся (→ вибачте), *дякуюся (→ дякую), пропущене -ся, неправильне використання -ся/-сь.'
    items: 6
connects_to:
  - 'b1-021 (Віддієслівні іменники)'
  - 'b1-023 (Пасивний стан)'
  - 'b1-025 (Щоденне життя)'
  - 'b1-010 (Чергування приголосних у дієсловах)'
prerequisites:
  - 'b1-021 (Основи словотворення віддієслівних іменників)'
  - 'Завершення А2 (базові знання зворотних дієслів: митися, одягатися)'
grammar:
  - 'Зворотні дієслова: утворення за допомогою -ся/-сь від зворотного займенника "себе"'
  - '5 семантичних груп: власне зворотні, взаємні, стану, безособові, пасивноподібні'
  - 'Милозвучність: -сь перед словами на голосний, -ся перед словами на приголосний'
  - 'Вимова: -шся [с'':а], -ться [ц'':а]'
  - 'Дієслова, що завжди зворотні: боятися, сміятися, сподіватися'
  - 'Контрастні пари: вчити/вчитися, збирати/збиратися, повертати/повертатися'
register: академічний
references:
  - title: "Заболотний Grade 7, p.176"
    notes: 'Визначення зворотних дієслів; походження від займенника "себе"; -ся(-сь) після суфікса інфінітива або закінчення.'
  - title: "Заболотний Grade 7, p.51"
    notes: 'Правило милозвучності для -ся/-сь; практичні вправи зі словосполученнями: милуватись озером vs милуватися горами.'
  - title: "Заболотний Grade 8, p.96"
    notes: 'Семантичні групи: дія спрямована на самого її носія, в інтересах носія дії, взаємно спрямована. Розрізнення зворотних і пасивних дієслів.'
  - title: "Кравцова Grade 4, p.111"
    notes: 'Базове визначення для молодших школярів; правила вимови: -шся [с'':а], -ться [ц'':а].'
