module: b1-022
level: B1
sequence: 22
slug: reflexive-verbs-nuances
version: '3.0'
title: "Зворотні дієслова"
subtitle: "Нюанси -ся/-сь: взаємність, стан, пасивність"
focus: grammar
pedagogy: PPP
phase: "B1.3 [Verbs]"
word_target: 4000
objectives:
- "Learner can identify зворотні дієслова by the suffix -ся/-сь and
  explain their core meaning: action directed at the subject itself"
- "Learner can distinguish semantic categories of зворотні дієслова:
  власне зворотні (митися), взаємні (зустрічатися), стану (сердитися),
  безособові (не спиться), пасивноподібні (будується)"
- "Learner can apply the euphony rule for -ся vs -сь:
  -сь before a vowel-initial word, -ся before a consonant-initial word
  (Заболотний Grade 7 p.51)"
- "Learner can correctly pronounce -шся as [с':а] and -ться as [ц':а]
  and understands the spelling-pronunciation mismatch"
- "Learner can use зворотні дієслова naturally in daily communication:
  одягатися, збиратися, хвилюватися, знайомитися"
content_outline:
- section: "Що таке зворотні дієслова? (What are reflexive verbs?)"
  words: 600
  points:
  - "Definition from Караман Grade 10 p.176:
    Дієслова із суфіксом -ся(-сь), які виражають зворотну дію,
    називаються зворотними: навчатися, закохатися.
    Сучасний дієслівний суфікс -ся(-сь) — це давня коротка форма
    зворотного займенника себе в Зн. в. однини:
    Я не боюся = Я ся не бою (діал.)."
  - "How -ся transforms verbs:
    мити (to wash something) → митися (to wash oneself)
    бачити (to see) → бачитися (to see each other / to appear)
    вчити (to teach) → вчитися (to study/learn)
    Not all -ся verbs have a non-reflexive pair:
    сміятися, боятися, сподіватися — exist only with -ся."
  - "Position of -ся: always after the verb ending or infinitive suffix.
    Вмивати → вмиватися, взувати → взуватися.
    In conjugated forms: вмиваюся, вмиваєшся, вмивається.
    In infinitive: вмиватися. In past: вмивалася, вмивався."
- section: "Семантичні групи зворотних дієслів (Semantic categories)"
  words: 800
  points:
  - "1. Власне зворотні — дія спрямована на самого виконавця:
    митися (to wash oneself), одягатися (to dress oneself),
    голитися (to shave oneself), зачісуватися (to comb one's hair).
    Test: can you add 'сам/сама себе'? If yes, it's власне зворотне.
    From Кравцова Grade 4 p.111: 'Дієслова на -ся, -сь виражають
    дію, спрямовану на самого виконавця.'"
  - "2. Взаємні — дія між двома або більше особами:
    зустрічатися (to meet each other), листуватися (to correspond),
    обніматися (to hug each other), цілуватися (to kiss each other).
    From Глазова Grade 11 p.96: зворотні дієслова на позначення дії
    'здійснюваної двома й більше особами та взаємно спрямованої:
    знайомі листуються (між собою).'"
  - "3. Стану та емоцій — суб'єкт переживає стан:
    сердитися (to be angry), хвилюватися (to worry),
    радіти → радітися (to rejoice), дивуватися (to be amazed).
    Не всі мають пари: боятися, сподіватися — лише зворотні."
  - "4. Безособові — суб'єкт відсутній або невизначений:
    не спиться (can't sleep — impersonal), не їсться (no appetite),
    хочеться (feels like wanting), здається (it seems).
    These take the давальний відмінок: Мені не спиться. Йому здається."
  - "5. Пасивноподібні — preview for M23:
    Дім будується. (The house is being built.)
    Книга читається легко. (The book reads easily.)
    These overlap with passive voice — detailed in next module."
- section: "Милозвучність: -ся чи -сь? (Euphony: -ся or -сь?)"
  words: 550
  points:
  - "Rule from Заболотний Grade 7 p.51:
    -сь вживаємо, якщо наступне слово починається голосним звуком.
    -ся вживаємо, якщо наступне слово починається приголосним.
    милуватись озером — милуватися горами.
    повернутись о шостій — повернутися додому."
  - "Practice pairs from Заболотний Grade 7 p.51:
    Повернути(ся/сь) о шостій годині → повернутись о шостій.
    Зустріти(ся/сь) біля кав'ярні → зустрітися біля кав'ярні.
    Катати(ся/сь) на скейті → кататися на скейті.
    Свято закінчило(ся/сь) увечері → закінчилось увечері.
    Пройти(ся/сь) вулицею → пройтися вулицею."
  - "Pronunciation rules (Кравцова Grade 4 p.111):
    -шся вимовляємо як [с':а]: спиняєшся [спиняйес':а].
    -ться вимовляємо як [ц':а]: прокидається [прокидайец':а].
    This is a consistent Ukrainian phonetic pattern learners
    should practice for natural-sounding speech."
- section: "Зворотні дієслова у повсякденному мовленні (Reflexives in daily speech)"
  words: 700
  points:
  - "Morning routine — all зворотні:
    прокидатися (to wake up), підводитися (to get up),
    вмиватися (to wash face), чистити зуби (not reflexive!),
    одягатися (to get dressed), зачісуватися (to comb hair),
    збиратися (to get ready, pack up).
    Mini-text: Я прокидаюся о сьомій. Підводжуся, вмиваюся,
    одягаюся й збираюся на роботу."
  - "Social interactions — взаємні:
    знайомитися (to get acquainted), зустрічатися (to meet),
    прощатися (to say goodbye), спілкуватися (to communicate),
    обніматися (to hug), віталися (to greet each other).
    Dialogue: meeting someone new, using знайомитися, спілкуватися."
  - "Emotions and states:
    хвилюватися (to worry), радіти (to rejoice),
    дивуватися (to be surprised), сердитися (to be angry),
    соромитися (to be ashamed), сумувати (to be sad — NOT reflexive).
    Note: not all emotion verbs are reflexive. Сумувати, плакати — no -ся.
    Contrast: хвилювати (to worry someone) vs хвилюватися (to worry oneself)."
  - "Dialogue: friends planning a weekend, naturally using зворотні
    for routines (збираюся), emotions (хвилююся), reciprocal actions
    (зустрінемося), and impersonal states (мені не хочеться)."
- section: "Типові помилки та контрастні пари (Common errors and contrastive pairs)"
  words: 650
  points:
  - "Error 1: Adding -ся where not needed (Russicism influence):
    *Я дякуюся вам → Я дякую вам (дякувати is not reflexive).
    *Вибачаюся → Вибачте / Перепрошую (вибачатися = to excuse oneself,
    but the polite form is вибачте — imperative of вибачити).
    Avoid вибачаюся for apologies — it means 'I'm excusing myself'."
  - "Error 2: Dropping -ся where needed:
    *Я боюю → Я боюся (боятися has no non-reflexive form).
    *Вони зустрічали вчора → Вони зустрічалися вчора (reciprocal).
    Learners must memorize which verbs are ALWAYS reflexive."
  - "Contrastive pairs showing meaning shift:
    вчити (to teach) vs вчитися (to study/learn)
    збирати (to collect) vs збиратися (to get ready / to intend)
    дивити (archaic) vs дивитися (to look at, watch)
    повертати (to turn something) vs повертатися (to return)
    These pairs reveal how -ся systematically shifts meaning."
- section: "Підсумок та перехід до M23 (Summary and transition)"
  words: 450
  points:
  - "Summary: зворотні дієслова = дієслова з суфіксом -ся/-сь.
    5 семантичних груп: власне зворотні, взаємні, стану, безособові,
    пасивноподібні. Милозвучність: -ся/-сь залежить від наступного
    слова. Вимова: -шся [с':а], -ться [ц':а].
    Self-check: Я можу визначити тип зворотного дієслова ✓/✗,
    Я правильно вживаю -ся/-сь ✓/✗,
    Я знаю, які дієслова завжди зворотні ✓/✗."
  - "Preview: M23 — Пасивний стан (вступ). The 5th category
    (пасивноподібні) gets its own module. How зворотні дієслова
    create passive meaning: Дім будується робітниками. Also:
    the Ukrainian-specific -но/-то forms: Дім збудовано."
vocabulary_hints:
  required:
  - "зворотне дієслово (reflexive verb — verb with -ся/-сь)"
  - "суфікс -ся/-сь (reflexive suffix — from давнє 'себе')"
  - "власне зворотні (truly reflexive — action on self: митися)"
  - "взаємні (reciprocal — action between people: зустрічатися)"
  - "безособовий (impersonal — no subject: не спиться, хочеться)"
  - "митися (to wash oneself)"
  - "одягатися (to dress oneself)"
  - "збиратися (to get ready / to intend)"
  - "зустрічатися (to meet each other)"
  - "хвилюватися (to worry)"
  - "дивуватися (to be surprised, amazed)"
  - "боятися (to be afraid — always reflexive)"
  - "сподіватися (to hope — always reflexive)"
  - "знайомитися (to get acquainted)"
  recommended:
  - "прокидатися (to wake up)"
  - "вмиватися (to wash one's face)"
  - "зачісуватися (to comb one's hair)"
  - "прощатися (to say goodbye)"
  - "соромитися (to be ashamed)"
  - "сердитися (to be angry)"
  - "листуватися (to correspond with each other)"
  - "повертатися (to return — vs повертати: to turn)"
  - "вчитися (to study — vs вчити: to teach)"
  - "здаватися (to seem — impersonal: мені здається)"
activity_hints:
- type: group-sort
  focus: "Sort зворотні дієслова into semantic categories: власне зворотні / взаємні / стану / безособові"
  items: 12
- type: fill-in
  focus: "Choose -ся or -сь based on the following word (euphony rule)"
  items: 8
- type: match-up
  focus: "Match transitive verbs to their reflexive pairs and note the meaning shift (вчити→вчитися)"
  items: 10
- type: quiz
  focus: "Identify whether a verb is always reflexive or has a non-reflexive pair"
  items: 8
- type: error-correction
  focus: "Fix errors: *вибачаюся (→ вибачте), *дякуюся (→ дякую), missing -ся, wrong -ся/-сь"
  items: 6
