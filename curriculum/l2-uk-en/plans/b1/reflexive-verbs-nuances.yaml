grammar:
- "Зворотні дієслова: formation with -ся/-сь from зворотний займенник себе"
- "5 semantic categories: власне зворотні, взаємні, стану, безособові, пасивноподібні"
- "Euphony: -сь before vowel-initial word, -ся before consonant-initial word"
- "Pronunciation: -шся [с':а], -ться [ц':а]"
- "Always-reflexive verbs: боятися, сміятися, сподіватися"
