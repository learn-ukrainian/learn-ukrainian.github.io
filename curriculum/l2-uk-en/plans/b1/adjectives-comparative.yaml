grammar:
  - 'Вищий ступінь порівняння: проста форма (суфікси -іш-, -ш-)'
  - 'Вищий ступінь порівняння: складена форма (більш/менш + прикметник)'
  - 'Чергування приголосних при творенні: [г]-[жч], [з]-[жч], [к]-[чч], [с]-[шч]'
  - 'Порівняльні конструкції: за + Зн.в., від + Р.в., ніж'
  - 'Прикметники без ступенів порівняння: абсолютні, складні, з префіксами'
register: науково-навчальний
references:
  - title: "Авраменко Grade 6, p.124-125"
    notes: 'Ступені порівняння якісних прикметників: чергування, суплетивні форми, категорії прикметників, які не утворюють ступенів порівняння.'
  - title: "Литвінова Grade 6, p.198"
    notes: 'Таблиця творення ступенів порівняння: проста (суфікси) та складена (більш/менш), найвищий ступінь (префікс най-).'
  - title: "Заболотний Grade 6, p.137"
    notes: 'Визначення найвищого ступеня, повний перелік прикметників без ступенів порівняння.'
  - title: "Заболотний Grade 8, p.18-21"
    notes: 'Повна таблиця творення для обох ступенів, синонімічні конструкції (дуже, вельми, занадто як альтернатива офіційному порівнянню).'
  - title: "Авраменко Grade 11, p.29"
    notes: 'Стилістичне зауваження: жартівливі форми вищого ступеня від відносних прикметників у рекламі (найкрабовіші).'
  - title: "Заболотний Grade 8, p.28"
    notes: 'Зведена таблиця форм ступенів порівняння прикметників і прислівників поруч.'
