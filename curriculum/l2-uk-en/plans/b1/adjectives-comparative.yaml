module: b1-044
level: B1
sequence: 44
slug: adjectives-comparative
version: '3.1.3'
title: "Вищий ступінь прикметників"
subtitle: "Проста та складена форми вищого ступеня порівняння"
focus: grammar
pedagogy: PPP
phase: "B1.4 [Порівняння та словотворення]"
word_target: 4000
objectives:
  - 'Здобувач навчиться утворювати просту форму вищого ступеня прикметників за допомогою суфіксів -іш- та -ш- (сильніший, молодший) і пояснювати, коли вживається кожен суфікс'
  - 'Здобувач навчиться утворювати складену форму вищого ступеня за допомогою більш/менш + прикметник (більш цікавий, менш складний) і пояснювати, коли цій формі віддається перевага'
  - 'Здобувач навчиться визначати чергування приголосних, які відбуваються при творенні вищого ступеня: [г/з/к] + -ш- = [жч/шч/чч] (дорогий-дорожчий, вузький-вужчий)'
  - 'Здобувач навчиться перелічувати категорії прикметників, які НЕ утворюють ступенів порівняння (абсолютні ознаки, складні прикметники, прикметники з префіксами)'
  - 'Здобувач навчиться використовувати форми вищого ступеня у природних українських реченнях з конструкціями за + Зн.в. (вищий за мене), від + Р.в. (вищий від мене) та ніж (вищий, ніж я)'
dialogue_situations:
  - setting: 'Двоє друзів порівнюють квартири для оренди в Києві — одну на Хрещатику, іншу на Оболоні: Ця квартира (f) більша, але дорожча. Та — тихіша і ближча до метро (n). Кімнати (pl) ширші, але стелі нижчі.'
    speakers:
      - Орендар
      - Друг
    motivation: 'Вищий ступінь прикметників: більший, дорожчий, тихіший, ближчий, ширший, нижчий'
content_outline:
  - section: "Що таке ступені порівняння?"
    words: 550
    points:
      - 'Вступ: здобувачі вже використовують базові прикметники з рівнів А1-А2. Тепер вони вчаться виражати БІЛЬШУ і МЕНШУ міру ознаки. В українській мові є два ступені порівняння: вищий і найвищий. Кожен з них має просту та складену форми.'
      - 'Головна відмінність від англійської: український вищий ступінь є повноцінним прикметником — він відмінюється за родами, числами та відмінками. Наприклад: сильніший (m.), сильніша (f.), сильніше (n.), сильніші (pl.). Відмінюваний вищий ступінь є природним для української мови; конструкція на кшталт "більш сильний" використовується лише для складеної форми.'
      - 'Які прикметники можуть утворювати ступені порівняння? Лише якісні прикметники — ті, що виражають ознаки, які можуть виявлятися більшою чи меншою мірою. За Заболотним (6 клас, с.137): прикметники, що виражають абсолютні ознаки (сліпий, лисий, босий, голий, живий, порожній), не можуть їх утворювати.'
      - 'Контекст Державного стандарту §4.3.1: проста (найкращий) і складена (більш цікавий) форми є нормативними для української мови. Здобувачі повинні опанувати обидві форми, щоб читати офіційні тексти та говорити природно. Цей модуль охоплює вищий ступінь; найвищий розглядатиметься в модулі модуль №35.'
  - section: "Проста форма вищого ступеня"
    words: 900
    points:
      - 'Правило творення за Литвіновою (6 клас, с.198): основа або корінь прикметника + суфікс -іш- або -ш-. Основний суфікс: -іш- (сильний-сильніший, цікавий-цікавіший, красивий-красивіший, розумний-розумніший). Коротший суфікс: -ш- з певними основами (молодий-молодший, старий-старший, тонкий-тонший, довгий-довший).'
      - 'Чергування приголосних при творенні (Авраменко, 6 клас, с.125): [г] + -ш- = [жч]: дорогий-дорожчий, строгий-строжчий. [з] + -ш- = [жч]: вузький-вужчий, близький-ближчий. [к] + -ш- = [чч] (на письмі -щ-): легкий-легший (не *легчий). [с] + -ш- = [шч] (на письмі -щ-): високий-вищий. Практика: надати 10-12 прикметників, щоб здобувачі утворили вищий ступінь, зокрема у випадках із чергуванням.'
      - 'Вищий ступінь відмінюється як звичайний прикметник: Н. сильніший / сильніша / сильніше / сильніші, Р. сильнішого / сильнішої / сильнішого / сильніших. Повна парадигма з практичним використанням відмінюваних форм у реченнях.'
      - 'Практика читання: діалог, у якому порівнюються два міста з активним використанням простої форми. Здобувачі знаходять усі форми вищого ступеня та їхні початкові форми.'
  - section: "Складена форма вищого ступеня"
    words: 750
    points:
      - 'Творення за Литвіновою (6 клас, с.198): більш/менш + початкова форма прикметника. більш цікавий, менш складний, більш яскравий, менш відомий. Прикметник після більш/менш відмінюється за загальними правилами; слова більш/менш є незмінними.'
      - 'Коли вживати складену форму, а коли просту (Заболотний, 8 клас, с.18): Складеній формі віддається перевага в офіційному/науковому стилі, коли проста форма звучить неприродно (більш синій, а не *синіший), а також для підсилення/протиставлення. Проста форма є основною в розмовному мовленні.'
      - 'Типова помилка: змішування форм (*більш сильніший — це ПОМИЛКА). Або сильніший, АБО більш сильний, ніколи разом. За Авраменком (11 клас, с.29): "самий кращий" — це русизм, правильно: найкращий.'
      - 'Стилістична практика (Заболотний, 8 клас, с.21): переписати 6-8 неформальних речень, використовуючи складені форми для офіційного стилю, і навпаки. Наприклад: "Ця задача складніша" → "Ця задача є більш складною" (науковий стиль).'
  - section: "Порівняльні конструкції"
    words: 650
    points:
      - 'Три способи вираження порівняння в українській мові: 1. за + Знахідний відмінок: Петро вищий за Марію. 2. від + Родовий відмінок: Петро вищий від Марії. 3. ніж + Називний відмінок: Петро вищий, ніж Марія. Усі три правильні; конструкція "за + Зн.в." найчастіше вживається в розмовному мовленні.'
      - 'Спеціальні конструкції: чим... тим...: Чим далі, тим цікавіше. набагато + вищий ступінь: набагато сильніший. трохи/дещо/значно + вищий ступінь: трохи молодший, значно кращий.'
      - 'Узгодження відмінків у порівняльних конструкціях (Заболотний, 8 клас, с.19): прикметник вищого ступеня узгоджується з іменником у роді, числі, відмінку — Я бачив кращу книжку (Зн.в., f.). Він розмовляв із старшим братом (Ор.в., m.). Практика: 8-10 речень, що потребують відмінюваних форм вищого ступеня в різних відмінкових контекстах.'
      - 'Текст для практики: огляд товарів із порівнянням позицій на ринку з використанням усіх трьох порівняльних конструкцій та різних модифікаторів міри.'
  - section: "Які прикметники не мають ступенів порівняння?"
    words: 500
    points:
      - 'Повний перелік категорій за Заболотним (6 клас, с.137) та Авраменком (6 клас, с.125): 1. Абсолютні ознаки: сліпий, лисий, босий, голий, мертвий. 2. Складні прикметники: кисло-солодкий, чорноокий, світло-зелений. 3. Прикметники з префіксами пре-, за-, над-, архі-, супер-: предобрий, завеликий, надважливий, суперсучасний. 4. Відносні прикметники: дерев''яний, залізний, міський. 5. Масті тварин: буланий, вороний, гнідий.'
      - 'Зауваження щодо творчого вживання від Авраменка (11 клас, с.29): В рекламі та розмовному мовленні відносні прикметники іноді утворюють жартівливі ступені порівняння: "найкрабовіші палички". Це свідомий стилістичний прийом, а не нормативна граматика.'
  - section: "Порівняння в українських прислів'ях і фразеології"
    words: 200
    points:
      - 'Українські прислів''я з використанням порівняльних конструкцій (Заболотний, 6 клас, с.138): "Що темніша ніч, то ясніші зорі." "Свій хліб смачніший за чужий." "Старший розумом, а не віком." Ці сталі вислови дають здобувачам зразки природного мовлення та розуміння культури, показуючи, як українці сприймають порівняння.'
      - 'Практика: здобувачі з''єднують прислів''я з їхніми значеннями, а потім використовують конструкції чим... тим... та конструкції із "за", щоб створити власні речення за цими зразками.'
  - section: "Підсумок і практика"
    words: 450
    points:
      - 'Підсумкова таблиця: проста (-іш-/-ш-) проти складеної (більш/менш) форми, всі моделі чергування, порівняльні конструкції (за/від/ніж). Візуальна схема з деревом рішень: якісний прикметник → проста (основна) або складена (офіційна/неприродне звучання) форма.'
      - 'Самоперевірка: Утворіть вищий ступінь порівняння: гарячий, близький, широкий, тихий, дешевий, тяжкий, ясний. Для кожного вкажіть відповідний суфікс (-іш- або -ш-) і зазначте, чи відбувається чергування приголосних.'
      - 'Анонс: наступний модуль охоплює найвищий ступінь — як в українській мові додається префікс най- для утворення найвищого ступеня, а також унікальну систему підсилення за допомогою що-/як-, яка не має аналогів в англійській мові.'
vocabulary_hints:
  required:
    - "вищий ступінь (comparative degree)"
    - "порівняння (comparison)"
    - "проста форма (simple/synthetic form)"
    - "складена форма (compound/analytic form)"
    - "суфікс (suffix — word-forming element after the root)"
    - "якісний прикметник (qualitative adjective — can vary in degree)"
    - "відносний прикметник (relative adjective — cannot form comparatives)"
    - "більш (more — used in compound comparative)"
    - "менш (less — used in compound comparative)"
    - "набагато (much, significantly — degree modifier)"
  recommended:
    - "чергування приголосних (consonant alternation during formation)"
    - "початкова форма (base form — nominative singular masculine)"
    - "ніж (than — conjunction in comparison)"
    - "значно (considerably — degree modifier)"
    - "дещо (somewhat — degree modifier)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про те, що таке ступені порівняння, і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Проста форма вищого ступеня».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему ступенів порівняння.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему простої форми вищого ступеня.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Що таке ступені порівняння?».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Проста форма вищого ступеня» з їхніми визначеннями.'
