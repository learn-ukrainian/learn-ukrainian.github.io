activity_hints:
  - type: quiz
    focus: 'Оберіть "якщо" або "якби" та правильний вид для обох частин речення залежно від того, чи є умовне речення реальним, чи нереальним'
    items: 10
  - type: fill-in
    focus: 'Доповніть умовні речення правильною формою дієслова — реальна (майбутній час дійсного способу) проти нереальної (умовний спосіб) та відповідний вид'
    items: 8
  - type: group-sort
    focus: 'Розподіліть умовні речення на реальна умова (якщо) та нереальна умова (якби), а потім визначте модель виду в кожному з них'
    items: 10
  - type: error-correction
    focus: 'Знайдіть і виправте помилки в умовних реченнях (*якщо будеш написати, *якби я знатиму, *якби прочитав би)'
    items: 6
  - type: match-up
    focus: 'З''єднайте гіпотетичні сценарії з правильним типом умовного речення та моделлю виду'
    items: 8
  - type: open-writing
    focus: 'Напишіть 4 реальних умовних речення про ваші плани і 4 нереальних умовних речення про ваші мрії — поясніть вибір виду для кожного'
    items: 8
