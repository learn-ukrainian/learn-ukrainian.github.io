module: b1-011
level: B1
sequence: 11
slug: aspect-in-conditionals
version: '1.0.3'
title: "Вид в умовних реченнях"
subtitle: "Якщо зробиш проти якби робив — реальність і вид"
focus: aspect-conditionals
pedagogy: TTT
phase: "B1.0 [Основи та майстерність виду]"
word_target: 4000
objectives:
  - 'Здобувач навчиться розрізняти реальну умову (якщо + дійсний спосіб) від нереальної умови (якби + умовний спосіб) і пояснювати, як кожен тип взаємодіє з вибором виду'
  - 'Здобувач навчиться будувати реальні умовні речення, де в наслідку зазвичай використовується доконаний вид (конкретний результат), та нереальні умовні речення, де з''являються обидва види залежно від того, чи гіпотетична ситуація фокусується на процесі, чи на результаті'
  - 'Здобувач навчиться пояснювати, чому конструкція якщо + майбутній час доконаного виду (Якщо напишеш — пришлю) є найпоширенішою моделлю реальної умови, і чому якби + минулий час недоконаного виду (Якби я знав...) виражає відкриті гіпотетичні ситуації'
  - 'Здобувач навчиться природно використовувати умовні речення у повсякденному плануванні (реальна умова) та мріях (нереальна умова), обираючи вид залежно від комунікативного наміру'
dialogue_situations:
  - setting: 'Двоє друзів будують плани — один пропонує реальні умови для поїздки (якщо + доконаний вид: якщо знайдемо квитки, поїдемо), інший мріє про нереальні сценарії (якби + недоконаний/доконаний вид: якби я мав більше грошей, подорожував би щоліта): Якщо купимо квитки сьогодні, полетимо у суботу. — А якби ми могли подорожувати безкоштовно, я б об''їздив увесь світ!'
    speakers:
      - Наталія
      - Богдан
    motivation: 'Реальні умови (якщо + доконаний вид, результат) проти нереальних умов (якби + умовний спосіб) — контраст між природним плануванням та мріями'
content_outline:
  - section: "Тест: реальне чи нереальне?"
    words: 850
    points:
      - 'Діагностика: 10 умовних речень — здобувачі класифікують їх як реальна умова (дійсна, можлива) або нереальна умова (нереальна, гіпотетична) і вибирають природну форму дієслова. Приклади: (Якщо / Якби) матимеш час, зателефонуй мені. (Якщо / Якби) я був президентом, змінив би все. (Якщо / Якби) вивчиш цей матеріал, складеш іспит.'
      - 'Самооцінювання: більшість здобувачів інтуїтивно відрізняють "якщо" (реальна можливість) від "якби" (суперечить фактам). Але вибір виду в межах умовних речень менш інтуїтивний — цей модуль робить його очевидним.'
      - 'Ключовий концепт: Два типи умовних речень, дві логіки використання виду. Реальна умова: якщо + майбутній час дійсного способу → результат у майбутньому. Нереальна умова: якби + форма минулого часу + б/би → гіпотетичний результат. Вибір виду НЕ ЗАЛЕЖИТЬ від типу умовного речення — він залежить від того, що ви хочете сказати про дію.'
      - 'Швидкий граматичний огляд: утворення умовного способу. Дієслово минулого часу + би (б після голосної): я знав би / я б знав, вона прочитала б / вона б прочитала, ми зробили б / ми б зробили. Позиція б/би гнучка.'
  - section: "Реальна умова: якщо + вид"
    words: 1050
    points:
      - 'Реальні умовні речення виражають справжні можливості (Заболотний, 7 клас, с.94). Частина з умовою: часто доконаний вид (конкретна завершена умова) — Якщо напишеш лист... Якщо прийдуть гості... Якщо закінчиш роботу... Частина з наслідком: зазвичай доконаний вид (настає конкретний результат) —...я відправлю його....ми приготуємо вечерю....підемо гуляти.'
      - 'Недоконаний вид у реальних умовних реченнях — коли процес має значення: Якщо будеш багато працювати, втомишся. (умова недоконаного виду: процес роботи → результат доконаного виду: втома). Якщо читатимеш щодня, поліпшиш мову. (умова недоконаного виду: тривала звичка → результат доконаного виду: покращення). Умова — це процес; результат — це досягнення.'
      - 'Модель "доконаний + доконаний" (найпоширеніша): Якщо вивчиш — складеш. Якщо приїдеш — покажу. Якщо допоможеш — подякую. Обидві частини зосереджені на конкретних завершених діях — "якщо X буде зроблено, Y буде зроблено". Це основна модель реальних умовних речень в українській мові.'
      - 'Практика: здобувачі доповнюють реальні умовні речення, обираючи вид для обох частин і пояснюючи свій вибір. Якщо (вивчити / вчити) всі правила, ти (скласти / складати) іспит. Якщо мама (приготувати / готувати) обід, ми (пообідати / обідати) разом.'
  - section: "Нереальна умова: якби + вид"
    words: 1100
    points:
      - 'Нереальні умовні речення виражають неможливі або малоймовірні сценарії (Литвінова, 7 клас, с.90). Суперечить фактам у теперішньому часі: Якби я знав українську краще, я б читав Шевченка в оригіналі. (недоконаний вид — тривала гіпотетична дія). Якби в мене були гроші, я б купив цей будинок. (доконаний вид — конкретний гіпотетичний результат).'
      - 'Суперечить фактам у минулому часі: Якби я прочитав ту книжку, я б знав відповідь. (умова доконаного виду: читання завершене в гіпотетичному минулому → наслідок недоконаного виду: тривалі гіпотетичні знання). Якби вона зателефонувала, ми б зустрілися. (доконаний + доконаний: конкретні гіпотетичні дії).'
      - 'Вибір виду в нереальних умовних реченнях — модель ГНУЧКА: Недоконаний + недоконаний: Якби я жив у Львові, щодня ходив би на каву. (обидві дії звичні/тривалі). Доконаний + доконаний: Якби я знайшов ключі, відчинив би двері. (обидві дії конкретні завершені). Недоконаний + доконаний: Якби я знав раніше, подзвонив би. (тривалий стан → конкретна дія). Доконаний + недоконаний: Якби я закінчив цей проєкт, відпочивав би. (завершена подія → тривалий стан). Вибір залежить від того, який аспект гіпотетичної ситуації уявляє мовець.'
      - 'Практика: здобувачі створюють нереальні умовні речення для 6 сценаріїв, свідомо обираючи вид. А) Якби я вмів літати... (фантазія — що б ви РОБИЛИ? недоконаний вид, процес). Б) Якби я виграв у лотерею... (яку конкретну річ ви б ЗРОБИЛИ ПЕРШОЮ? доконаний вид, результат). В) Якби я народився в Україні... (суперечить фактам — тривале гіпотетичне життя, недоконаний вид). Порівняйте відповіді в класі — різний вибір виду відображає різні уявні сценарії.'
  - section: "Підсумок: вид як спосіб бачити можливості"
    words: 1000
    points:
      - 'Синтез: реальні умовні речення пов''язані з плануванням (переважно доконаний вид — конкретні дії та результати). Нереальні умовні речення пов''язані з уявленням (гнучкість — вид залежить від того, який саме гіпотетичний світ уявляє мовець). В обох випадках вид — це ВИБІР, а не механічне правило.'
      - 'Контрастні пари, що демонструють силу виду в умовних реченнях: Якщо вивчиш українську, знатимеш її добре. (реальна умова: якщо ти її вивчиш, ти її знатимеш — обидві частини зосереджені на завершенні + тривалому стані). Якби вивчив українську, знав би її добре. (нереальна умова: якби ти її ВИВЧИВ — гіпотетична завершена подія → тривалі гіпотетичні знання).'
      - 'Типові помилки: *Якщо будеш написати лист... (неможливо — буду + доконаний вид; має бути "якщо напишеш"). *Якби я знатиму... (форма майбутнього часу в нереальній умові — має бути "якби я знав"). *Якби я прочитав би книжку (подвійне "би" — одного б/би достатньо). Змішування якщо/якби — "якщо" для реальної умови, "якби" для нереальної.'
      - 'Підсумковий огляд: повторення блоку "майстерність виду". Від модуль №4 (минулий час) до модуля №5 (майбутній час), модуль №6 (розповідь), модуль №8 (наказовий спосіб), модуль №9 (заперечення) і до модуля №11 (умовні речення) — вид це завжди РІШЕННЯ про те, як подати дію. Мовець обирає, граматика виражає вибір. Анонс: checkpoint-aspect (комплексний тест на вид).'
