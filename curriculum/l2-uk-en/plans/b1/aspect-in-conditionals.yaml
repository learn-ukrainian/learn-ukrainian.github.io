module: b1-011
level: B1
sequence: 11
slug: aspect-in-conditionals
version: '1.0'
title: "Вид в умовних реченнях"
subtitle: "Якщо зробиш vs якби робив — реальність і вид"
focus: aspect-conditionals
pedagogy: TTT
phase: "B1.0 [Baselines & Aspect Mastery]"
word_target: 4000
objectives:
  - "Learner can distinguish реальна умова (якщо + indicative) from нереальна умова
    (якби + conditional mood) and explain how each type interacts with aspect choice"
  - "Learner can produce real conditionals where the result clause typically uses
    доконаний вид (specific outcome) and unreal conditionals where both aspects appear
    based on whether the hypothetical focuses on process or result"
  - "Learner can explain why якщо + perfective future (Якщо напишеш — пришлю) is the
    most common real conditional pattern, and why якби + imperfective past (Якби я
    знав...) expresses open-ended hypotheticals"
  - "Learner can use conditional sentences naturally in everyday planning (real) and
    wishful thinking (unreal), selecting aspect based on communicative intent"
dialogue_situations:
  - setting: "Two friends making plans — one proposes real conditions for a trip
      (якщо + pf: якщо знайдемо квитки, поїдемо), the other daydreams about unreal
      scenarios (якби + impf/pf: якби я мав більше грошей, подорожував би щоліта):
      Якщо купимо квитки сьогодні, полетимо у суботу. — А якби ми могли подорожувати
      безкоштовно, я б об'їздив увесь світ!"
    speakers:
      - Наталія
      - Богдан
    motivation: "Real conditionals (якщо + pf result) vs unreal conditionals (якби +
      conditional mood) — natural planning vs daydreaming contrast"
content_outline:
  - section: "Тест: реальне чи нереальне?"
    words: 850
    points:
      - "Diagnostic: 10 conditional sentences — learners classify as реальна умова
        (real, possible) or нереальна умова (unreal, hypothetical) and choose the
        natural verb form. Examples: (Якщо / Якби) матимеш час, зателефонуй мені.
        (Якщо / Якби) я був президентом, змінив би все. (Якщо / Якби) вивчиш цей
        матеріал, складеш іспит."
      - "Self-assessment: most learners intuitively distinguish якщо (real possibility)
        from якби (contrary to fact). But aspect choice within conditionals is less
        intuitive — this module makes it explicit."
      - "Key framework: Two types of conditionals, two aspect logics. Реальна умова:
        якщо + future indicative → result in future. Нереальна умова: якби + past form
        + б/би → hypothetical result. Aspect choice is INDEPENDENT of the conditional
        type — it depends on what you want to say about the action."
      - "Quick grammar review: conditional mood formation. Дієслово минулого часу + би
        (б після голосної): я знав би / я б знав, вона прочитала б / вона б прочитала,
        ми зробили б / ми б зробили. Position of б/би is flexible."
  - section: "Реальна умова: якщо + вид"
    words: 1050
    points:
      - "Real conditionals express genuine possibilities (Заболотний Grade 7 p.94).
        Condition clause: often доконаний (specific completed condition) — Якщо
        напишеш лист... Якщо прийдуть гості... Якщо закінчиш роботу... Result clause:
        typically доконаний (specific result follows) — ...я відправлю його. ...ми
        приготуємо вечерю. ...підемо гуляти."
      - "Imperfective in real conditionals — when process matters: Якщо будеш багато
        працювати, втомишся. (impf condition: process of working → pf result: getting
        tired). Якщо читатимеш щодня, поліпшиш мову. (impf condition: ongoing habit
        → pf result: improvement). The condition is a process; the result is an
        achievement."
      - "Double-perfective pattern (most common): Якщо вивчиш — складеш. Якщо
        приїдеш — покажу. Якщо допоможеш — подякую. Both clauses focus on specific
        completed actions — 'if X is done, Y will be done.' This is the workhorse
        pattern of Ukrainian real conditionals."
      - "Practice: learners complete real conditional sentences by choosing the aspect
        for both clauses and explaining their choice. Якщо (вивчити / вчити) всі
        правила, ти (скласти / складати) іспит. Якщо мама (приготувати / готувати)
        обід, ми (пообідати / обідати) разом."
  - section: "Нереальна умова: якби + вид"
    words: 1100
    points:
      - "Unreal conditionals express impossible or unlikely scenarios (Литвінова Grade 7
        p.90). Contrary to present fact: Якби я знав українську краще, я б читав
        Шевченка в оригіналі. (impf — ongoing hypothetical activity). Якби в мене
        були гроші, я б купив цей будинок. (pf — specific hypothetical result)."
      - "Contrary to past fact: Якби я прочитав ту книжку, я б знав відповідь.
        (pf condition: reading completed in hypothetical past → impf result: ongoing
        hypothetical knowledge). Якби вона зателефонувала, ми б зустрілися. (pf + pf:
        specific hypothetical actions)."
      - "Aspect choice in unreal conditionals — the pattern is FLEXIBLE: Impf + impf:
        Якби я жив у Львові, щодня ходив би на каву. (both habitual/ongoing). Pf + pf:
        Якби я знайшов ключі, відчинив би двері. (both specific completed). Impf + pf:
        Якби я знав раніше, подзвонив би. (ongoing state → specific action). Pf + impf:
        Якби я закінчив цей проєкт, відпочивав би. (completed event → ongoing state).
        The choice depends on what aspect of the hypothetical the speaker imagines."
      - "Practice: learners produce unreal conditionals for 6 scenarios, choosing aspect
        deliberately. A) Якби я вмів літати... (fantasy — what would you DO? impf
        process). B) Якби я виграв лотерею... (what specific thing would you DO FIRST?
        pf result). C) Якби я народився в Україні... (counterfactual — ongoing
        hypothetical life, impf). Compare class answers — different aspect choices
        reflect different imagined scenarios."
  - section: "Підсумок: вид як спосіб бачити можливості"
    words: 1000
    points:
      - "Synthesis: real conditionals are about planning (mostly pf — specific actions
        and results). Unreal conditionals are about imagining (flexible — aspect depends
        on what kind of hypothetical world the speaker envisions). In both cases, aspect
        is a CHOICE, not a mechanical rule."
      - "Contrastive pairs showing the power of aspect in conditionals: Якщо вивчиш
        українську, знатимеш її добре. (real: if you learn it, you'll know it — both
        focused on completion + ongoing state). Якби вивчив українську, знав би її
        добре. (unreal: if you HAD learned — hypothetical completed event → ongoing
        hypothetical knowledge)."
      - "Common errors: *Якщо будеш написати лист... (impossible — буду + pf; should be
        якщо напишеш). *Якби я знатиму... (future form in unreal conditional — should
        be якби я знав). *Якби я прочитав би книжку (double би — one б/би is enough).
        Mixing якщо/якби — якщо for real, якби for unreal."
      - "Capstone review: aspect mastery block recap. From M04 (past) through M05
        (future), M06 (narration), M08 (imperatives), M09 (negation), to M11
        (conditionals) — aspect is always a DECISION about how to present an action.
        The speaker chooses, the grammar expresses the choice. Preview: checkpoint-aspect
        (comprehensive aspect test)."
vocabulary_hints:
