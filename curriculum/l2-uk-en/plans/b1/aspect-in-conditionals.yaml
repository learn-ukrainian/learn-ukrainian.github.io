    translation: "conditional mood (past form + б/би)"
  - word: "реальна умова"
    pos: "noun phrase"
    translation: "real condition (якщо — genuine possibility)"
  - word: "нереальна умова"
    pos: "noun phrase"
    translation: "unreal condition (якби — contrary to fact)"
  - word: "якщо"
    pos: "conj"
    translation: "if (real conditional)"
  - word: "якби"
    pos: "conj"
    translation: "if (unreal conditional — + б/би)"
  - word: "умова"
    pos: "noun:f"
    translation: "condition (the 'if' clause)"
  - word: "наслідок"
    pos: "noun:m"
    translation: "consequence, result (the 'then' clause)"
  - word: "припущення"
    pos: "noun:n"
    translation: "assumption, hypothesis"
  - word: "можливість"
    pos: "noun:f"
    translation: "possibility (real conditionals express this)"
  - word: "неможливість"
    pos: "noun:f"
    translation: "impossibility (unreal conditionals imply this)"
  - word: "протилежний"
    pos: "adj"
    translation: "opposite, contrary (якби = contrary to fact)"
  - word: "гіпотетичний"
    pos: "adj"
    translation: "hypothetical (unreal scenario)"
  - word: "частка"
    pos: "noun:f"
    translation: "particle (б/би in conditional mood)"
  - word: "вміти"
    pos: "verb:impf"
    translation: "to know how to, to be able to (impf)"
  - word: "змогти"
    pos: "verb:pf"
    translation: "to manage to, to be able (pf — specific occasion)"
  - word: "виграти"
    pos: "verb:pf"
    translation: "to win (pf — Якби я виграв...)"
  - word: "вигравати"
    pos: "verb:impf"
    translation: "to win (impf — habitual or process)"
  - word: "народитися"
    pos: "verb:pf"
    translation: "to be born (pf — Якби я народився...)"
  - word: "уявляти"
    pos: "verb:impf"
    translation: "to imagine (impf — process of imagining)"
  - word: "уявити"
    pos: "verb:pf"
    translation: "to imagine (pf — a specific act of imagining)"
activity_hints:
  - type: quiz
    focus: "Choose якщо or якби and the correct aspect for both clauses based on
      whether the conditional is real or unreal"
    items: 10
  - type: fill-in
    focus: "Complete conditional sentences with the correct verb form — real (future
      indicative) vs unreal (conditional mood) and appropriate aspect"
    items: 8
  - type: group-sort
    focus: "Sort conditional sentences into реальна умова (якщо) and нереальна умова
      (якби), then identify the aspect pattern in each"
    items: 10
  - type: error-correction
    focus: "Find and correct errors in conditional sentences (*якщо будеш написати,
      *якби я знатиму, *якби прочитав би)"
    items: 6
  - type: match-up
    focus: "Match hypothetical scenarios to the correct conditional type and aspect
      pattern"
    items: 8
  - type: open-writing
    focus: "Write 4 real conditionals about your plans and 4 unreal conditionals about
      your dreams — explain your aspect choice for each"
    items: 8
connects_to:
  - "b1-009 (Вид і заперечення — aspect with negation, prerequisite)"
  - "b1-012 (checkpoint-aspect — comprehensive aspect test)"
  - "b1-004 through b1-009 (full aspect mastery block)"
prerequisites:
  - "b1-009 aspect-in-negation (aspect pragmatics with negation)"
