grammar:
  - 'Реальна умова: якщо + дійсний спосіб (часто доконаний майбутній)'
  - 'Нереальна умова: якби + умовний спосіб (минулий час + б/би)'
  - 'Вибір виду в умові і наслідку — незалежний від типу умовного речення'
  - 'Доконаний + доконаний як найпоширеніша модель реальної умови'
  - 'Гнучкість вибору виду в нереальній умові: процес проти результату в гіпотезі'
register: розмовний
references:
  - title: "Заболотний Grade 7, p.92-98"
    notes: 'Умовний спосіб: утворення, вживання, реальна і нереальна умова, вид дієслова в умовних реченнях.'
  - title: "Литвінова Grade 7, p.88-92"
    notes: 'Умовний спосіб дієслова: якщо і якби, частка б/би, вибір виду в умовних конструкціях.'
  - title: "Авраменко Grade 7, p.86-90"
    notes: 'Умовні речення: реальна і нереальна умова, практичні вправи на утворення і вживання умовних конструкцій з різним видом.'
