grammar:
- 'Повна парадигма наказового способу: 2 ос. одн. (-и/-й/-ь), 1 ос. мн. (-мо), 2 ос. мн. (-те/-іть), 3
  ос. одн./мн. (хай/нехай + 3-тя особа)'
- 'М''який знак у наказовому способі: після д, т, з, с, ц, л, н; НЕ пишеться після ж, ч, ш, р, в, п'
- 'Вид дієслова в наказах: доконаний для конкретної дії, недоконаний для загальної; не + недоконаний'
- Хай/нехай + 3-тя особа для непрямих наказів, побажань, дозволу
- 'Ввічливий регістр: будь ласка, давайте, прошу, чи не могли б ви'
- 'Деколонізація: ходімо! (а не *пішли), давай підемо (а не *давай пішли)'
register: академічний
references:
- title: Заболотний, 7 клас, с.72-74
  notes: Парадигма наказового способу; творення хай пам'ятає, хай пам'ятають; вправа на правила поведінки.
- title: Авраменко, 7 клас, с.82-83
  notes: 'Повна парадигма: несу → неси, несімо, несіть, хай несе, хай несуть; правила щодо м''якого знака.'
- title: Литвінова, 7 клас, с.58-62
  notes: Обмеження на вживання м'якого знака; хай малий малому скаже (народна скоромовка); формотворчі
    частки.
- title: Авраменко, 11 клас, с.54-57
  notes: Морфологічна норма наказового способу; давай як помилка; *пішли в кіно → ходімо в кіно; паралельні
    закінчення -іть/-іте.
- title: Заболотний, 8 клас, с.46
  notes: 'Паралельні форми наказового способу; накази І. Франка: Лиш борися, не мирися.'
