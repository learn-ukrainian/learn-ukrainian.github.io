module: b1-020
level: B1
sequence: 20
slug: imperative-nuances
version: '3.0'
title: Наказовий спосіб (деталі)
subtitle: Хай/нехай, ввічливі форми та вид дієслова в наказі
focus: grammar
pedagogy: PPP
phase: B1.3 [Verbs]
word_target: 4000
objectives:
- 'Learner can form all наказовий спосіб paradigm forms: 2nd person singular and plural, 1st person plural (inclusive), and
  3rd person via хай/нехай'
- 'Learner can use хай/нехай + 3rd person to express indirect commands, wishes, and permissions: Хай живе Україна! Нехай він
  почекає.'
- 'Learner can choose the correct aspect in imperatives: недоконаний for general/repeated action vs доконаний for single completed
  action'
- 'Learner can form polite requests using imperative softeners: будь ласка, прошу, чи не могли б ви + інфінітив'
- Learner can correctly write м'який знак in imperative forms after д, т, з, с, ц, л, н (будь, лізь, глянь, занось)
dialogue_situations:
- setting: 'Rehearsal for an amateur theatre play in Чернівці — the director gives
    commands to actors of various groups: Іване, вийди на сцену (f, stage)! Ходімо
    далі! Нехай публіка (f, audience) зачекає! Будьте уважні!'
  speakers:
  - Режисер (director)
  - Актори
  motivation: 'Full imperative: вийди (2sg), ходімо (1pl), нехай зачекає (3sg), будьте
    (2pl)'
content_outline:
- section: Повна парадигма наказового способу (Full imperative paradigm)
  words: 800
  points:
  - 'Review from Заболотний Grade 7 p.72-74: Наказовий спосіб виражає прохання, наказ, пораду, спонукання до дії. Full paradigm
    example (Авраменко Grade 7 p.82): несу → неси, несімо, несіть, хай несе, хай несуть. 6 forms in total: 2sg, 1pl, 2pl +
    хай/нехай for 3sg, 3pl.'
  - 'Formation rules by conjugation: I дієвідміна: stem + -и (неси, пиши) or -й (читай, знай). II дієвідміна: stem + -и (стій)
    or -ь (сядь, будь). Plural: -мо (несімо, читаймо), -те/-іть (несіть, читайте). The -мо form is inclusive ''let''s'': Ходімо!
    Співаймо! Їжмо!'
  - 'М''який знак rules (Авраменко Grade 7 p.82, Литвінова Grade 7 p.58): Пишемо ь у кінці слова та складу після д, т, з,
    с, ц, л, н: лізь, лізьте, будь, будьте, глянь, гляньте, занось, заносьте. Після ж, ч, ш, р, в, п ь НЕ пишемо: поставмо,
    сипмо, їжмо, кличмо, облишмо, вірмо (Литвінова Grade 7 p.58).'
- section: 'Хай/нехай: третя особа (Хай/нехай: 3rd person)'
  words: 750
  points:
  - 'Formation: хай/нехай + дієслово 3-ї особи (теперішній або майбутній час). Хай він зателефонує. Нехай вони вирішують.
    Хай буде так! Нехай живе вільна Україна! From folk tradition (Литвінова Grade 7 p.58): Гей, малий, скажи малому, хай малий
    малому скаже, хай малий коня прив''яже.'
  - 'Semantic range of хай/нехай: Permission: Хай він увійде. (Let him come in.) Wish: Нехай щастить! (May you have good luck!)
    Indirect command: Хай вона мені зателефонує. (Have her call me.) Concession: Хай собі думає, що хоче. (Let him think what
    he wants.) Хай and нехай are interchangeable, but нехай is slightly more formal.'
  - 'Contrast with direct imperative: Зателефонуй мені! (direct, 2sg) vs Хай він мені зателефонує (indirect, 3sg). Iдіть!
    (direct, 2pl) vs Нехай вони ідуть (indirect, 3pl). The хай/нехай forms are the ONLY way to command in 3rd person.'
- section: Вид дієслова в наказовому способі (Aspect in imperatives)
  words: 650
  points:
  - 'Доконаний вид — single, specific action, often a request: Відчини вікно, будь ласка. Запиши адресу. Подзвони мені ввечері.
    The action is expected to be completed once.'
  - 'Недоконаний вид — general instruction, repeated action, or process: Читай голосно. Пишіть акуратно. Відповідайте на запитання.
    Used for ongoing behaviors, classroom instructions, rules.'
  - 'Negative imperatives — ALWAYS недоконаний: Не відчиняй вікна! (not *Не відчини вікна!) Не забувайте ключі! (not *Не забудьте
    ключі — though some speakers accept this, the norm prefers недоконаний after не). This is a key rule: заперечення + наказовий
    → недоконаний вид.'
  - 'Practice: pairs showing aspect contrast in imperatives: Розкажи мені про поїздку (pf — one story) vs Розповідай про подорожі
    (impf — tell about trips in general). Закрий двері (pf — close now) vs Закривай двері, коли входиш (impf — always).'
- section: Ввічливий наказ (Polite imperative)
  words: 600
  points:
  - 'Softening strategies: 1. Будь ласка / прошу: Передайте, будь ласка, сіль. 2. Чи не + умовний: Чи не могли б ви відчинити
    вікно? 3. Infinitive + прошу: Прошу не палити. Прошу тиші. 4. Давай/давайте as invitation: Давайте обговоримо. Note: Давай
    is informal (singular), давайте is formal/plural.'
  - 'Common error: ''давай пішли'' (Авраменко Grade 11 p.54, p.57): *Пішли в кіно — this is Russian-influenced (пошли). Correct:
    Ходімо в кіно! or Давай підемо в кіно! This is a crucial decolonization point: Ukrainian uses імо-forms or давай/давайте
    + доконаний, NOT пішли as imperative.'
  - 'Register scale from direct to most polite: Відчини вікно! (direct command) Відчиніть, будь ласка, вікно. (polite request)
    Чи не могли б ви відчинити вікно? (very polite, conditional) Прошу відчинити вікно. (formal/official) Learners practice
    reformulating at each level.'
- section: Наказовий спосіб у тексті (Imperative in context)
  words: 800
  points:
  - 'Dialogue 1 — at home: Parent giving instructions to a child using imperatives with aspect: Вимий руки (pf), потім сідай
    (impf) до столу. Не забувай (impf) вимикати світло. Natural usage showing aspect alternation within the same conversation.'
  - 'Dialogue 2 — in a group, planning an event: Friends using inclusive -мо forms and хай/нехай: Обговорімо план. Хай Оленка
    купить продукти. Давайте зустрінемося о п''ятій. Нехай кожен принесе щось. Shows хай/нехай distributing tasks in conversation.'
  - 'Reading passage: a Ukrainian recipe or instruction manual. Imperative-heavy text: Наріжте цибулю. Додайте сіль. Перемішайте.
    Не переварюйте! Подавайте гарячим. Comprehension: identify aspect of each imperative and explain why perfective or imperfective
    was chosen.'
  - 'Ukrainian folk sayings and songs with imperatives: Шануймося, єднаймося та будьмо! (I. Франко). Бережімо рідну мову!
    Не зрадь! Тримаймося! Cultural context: imperatives as calls to national solidarity.'
- section: Підсумок та перехід до M21 (Summary and transition)
  words: 500
  points:
  - 'Summary: повна парадигма наказового способу (2sg, 1pl, 2pl, 3sg/3pl via хай/нехай), вид дієслова (доконаний vs недоконаний,
    не + недоконаний), ввічливий наказ (будь ласка, давайте, чи не могли б ви), м''який знак rules. Self-check: Я можу утворити
    всі форми наказового способу ✓/✗, Я можу правильно вибрати вид дієслова ✓/✗, Я можу ввічливо попросити i запросити ✓/✗.'
  - 'Preview: M21 — Віддієслівні іменники. How verbs become nouns: читати → читання, бачити → бачення. This word-formation
    process connects verb mastery from M18-20 to expanding vocabulary.'
vocabulary_hints:
  required:
  - наказовий спосіб (imperative mood — commands, requests, instructions)
  - хай (let — particle for 3rd person commands)
  - нехай (let — slightly more formal variant of хай)
  - будь ласка (please)
  - прошу (I request — formal please)
  - давай / давайте (let's — invitation to joint action)
  - дозвіл (permission — Хай він увійде)
  - спонукання (encouragement, prompting to action)
  - заперечення (negation — не + недоконаний вид in imperatives)
  - доконаний вид (perfective aspect — single completed action)
  - недоконаний вид (imperfective aspect — ongoing/repeated action)
  - 'м''який знак (soft sign — in imperative forms: будь, лізь, глянь)'
  - ходімо (let's go — correct Ukrainian inclusive form)
  - обговорімо (let's discuss — 1pl inclusive imperative)
  recommended:
  - рецепт (recipe — imperative-heavy text type)
  - інструкція (instruction manual)
  - 'нарізати (to cut up — common in recipes: наріжте)'
  - додати (to add — додайте)
  - перемішати (to mix, stir — перемішайте)
  - вимикати (to turn off — не забувай вимикати)
  - шанувати (to honor — шануймося)
  - єднатися (to unite — єднаймося)
  - берегти (to protect — бережімо)
  - тримайся/тримаймося (hold on / let's hold on)
activity_hints:
- type: fill-in
  focus: Form the correct imperative (choose aspect, person, м'який знак) in sentence context
  items: 10
- type: quiz
  focus: Choose доконаний or недоконаний aspect for imperative in given situations
  items: 8
- type: sentence-builder
  focus: Rewrite direct commands as polite requests using будь ласка, давайте, чи не могли б ви
  items: 6
- type: match-up
  focus: Match situations (recipe step, classroom rule, polite request, wish) to correct imperative form
  items: 8
- type: error-correction
  focus: 'Fix imperative errors: *пішли (→ ходімо), missing ь, wrong aspect after не, wrong хай form'
  items: 6
- type: group-sort
  focus: Sort imperative forms into доконаний/недоконаний and direct/polite/хай categories
  items: 10
