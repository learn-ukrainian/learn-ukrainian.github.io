prerequisites:
- b1-019 (Conditionals unreal — completes the conditional system)
- A2 knowledge of basic imperative forms (2sg, 2pl)
grammar:
- 'Full наказовий paradigm: 2sg (-и/-й/-ь), 1pl (-мо), 2pl (-те/-іть), 3sg/3pl (хай/нехай + 3rd person)'
- 'М''який знак in imperatives: after д, т, з, с, ц, л, н; NOT after ж, ч, ш, р, в, п'
- 'Aspect in imperatives: доконаний for specific, недоконаний for general; не + недоконаний'
- Хай/нехай + 3rd person for indirect commands, wishes, permissions
- 'Polite register: будь ласка, давайте, прошу, чи не могли б ви'
- 'Decolonization: ходімо! (not *пішли), давай підемо (not *давай пішли)'
register: академічний
references:
- title: Заболотний Grade 7, p.72-74
  notes: Наказовий спосіб paradigm; хай пам'ятає, хай пам'ятають formation; правила поведінки exercise using imperatives.
- title: Авраменко Grade 7, p.82-83
  notes: 'Full paradigm: несу → неси, несімо, несіть, хай несе, хай несуть; м''який знак rules; §37 творення наказового й
    умовного способів.'
- title: Литвінова Grade 7, p.58-62
  notes: М'який знак restrictions after в, п, ж, ч, ш, р; хай малий малому скаже (folk скоромовка); формотворчі частки.
- title: Авраменко Grade 11, p.54-57
  notes: Наказовий спосіб морфологічна норма; давай as error pattern; *пішли в кіно → ходімо в кіно; parallel endings -іть/-іте.
- title: Глазова Grade 11, p.46
  notes: 'Паралельні форми наказового способу I та II особи множини; I. Франко imperatives: Лиш борися, не мирися.'
