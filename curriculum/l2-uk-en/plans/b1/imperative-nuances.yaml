module: b1-026
level: B1
sequence: 26
slug: imperative-nuances
version: 3.0.2
title: Наказовий спосіб (деталі)
subtitle: Хай/нехай, ввічливі форми та вид дієслова в наказі
focus: grammar
pedagogy: PPP
phase: B1.2 [Дієслова]
word_target: 4000
objectives:
- 'Учень вміє утворювати всі форми наказового способу: 2-га особа однини та множини, 1-ша особа множини
  (інклюзивна) та 3-тя особа за допомогою хай/нехай'
- 'Учень вміє вживати хай/нехай + 3-тя особа для вираження непрямих наказів, побажань та дозволу: Хай
  живе Україна! Нехай він почекає.'
- 'Учень вміє обирати правильний вид дієслова в наказах: недоконаний для загальної/повторюваної дії та
  доконаний для одноразової завершеної дії'
- 'Учень вміє утворювати ввічливі прохання, використовуючи пом''якшувальні слова: будь ласка, прошу, чи
  не могли б ви + інфінітив'
- Учень вміє правильно писати м'який знак у формах наказового способу після д, т, з, с, ц, л, н (будь,
  лізь, глянь, занось)
dialogue_situations:
- setting: 'Репетиція аматорського театру в Чернівцях — режисер дає вказівки акторам різних груп: Іване,
    вийди на сцену (f)! Ходімо далі! Нехай публіка (f) зачекає! Будьте уважні!'
  speakers:
  - Режисер
  - Актори
  motivation: 'Повний наказовий спосіб: вийди (2 ос. одн.), ходімо (1 ос. мн.), нехай зачекає (3 ос. одн.),
    будьте (2 ос. мн.)'
content_outline:
- section: Повна парадигма наказового способу
  words: 800
  points:
  - 'Повторення з підручника Заболотного, 7 клас, с.72-74: Наказовий спосіб виражає прохання, наказ, пораду,
    спонукання до дії. Приклад повної парадигми (Авраменко, 7 клас, с.82): несу → неси, несімо, несіть,
    хай несе, хай несуть. Усього 6 форм: 2 ос. одн., 1 ос. мн., 2 ос. мн. + хай/нехай для 3 ос. одн. та
    мн.'
  - 'Правила творення за дієвідмінами: І дієвідміна: основа + -и (неси, пиши) або -й (читай, знай). ІІ
    дієвідміна: основа + -и (стій) або -ь (сядь, будь). Множина: -мо (несімо, читаймо), -те/-іть (несіть,
    читайте). Форма на -мо є інклюзивною (запрошення до спільної дії): Ходімо! Співаймо! Їжмо!'
  - 'Правила щодо м''якого знака (Авраменко, 7 клас, с.82; Литвінова, 7 клас, с.58): Пишемо ь у кінці
    слова та складу після д, т, з, с, ц, л, н: лізь, лізьте, будь, будьте, глянь, гляньте, занось, заносьте.
    Після ж, ч, ш, р, в, п ь НЕ пишемо: поставмо, сипмо, їжмо, кличмо, облишмо, вірмо.'
- section: 'Хай/нехай: третя особа'
  words: 750
  points:
  - 'Творення: хай/нехай + дієслово 3-ї особи (теперішній або майбутній час). Хай він зателефонує. Нехай
    вони вирішують. Хай буде так! Нехай живе вільна Україна! З народної творчості (Литвінова, 7 клас,
    с.58): Гей, малий, скажи малому, хай малий малому скаже, хай малий коня прив''яже.'
  - 'Семантика хай/нехай: Дозвіл: Хай він увійде. Побажання: Нехай щастить! Непрямий наказ: Хай вона мені
    зателефонує. Допустовість: Хай собі думає, що хоче. Хай та нехай взаємозамінні, але нехай звучить
    трохи офіційніше.'
  - 'Порівняння з прямим наказом: Зателефонуй мені! (прямий, 2 ос. одн.) проти Хай він мені зателефонує
    (непрямий, 3 ос. одн.). Ідіть! (прямий, 2 ос. мн.) проти Нехай вони ідуть (непрямий, 3 ос. мн.). Форми
    з хай/нехай — єдиний спосіб передати наказ для 3-ї особи.'
- section: Вид дієслова в наказовому способі
  words: 650
  points:
  - 'Доконаний вид — одноразова, конкретна дія, часто прохання: Відчини вікно, будь ласка. Запиши адресу.
    Подзвони мені ввечері. Очікується, що дія буде виконана один раз і завершена.'
  - 'Недоконаний вид — загальна вказівка, повторювана дія або процес: Читай голосно. Пишіть акуратно.
    Відповідайте на запитання. Використовується для тривалих дій, інструкцій у класі, правил.'
  - 'Заперечні накази — ЗАВЖДИ недоконаний вид: Не відчиняй вікна! (а не *Не відчини вікна!). Не забувайте
    ключі! (а не *Не забудьте ключі — хоч дехто так каже, норма вимагає недоконаного виду після не). Це
    ключове правило: заперечення + наказовий спосіб → недоконаний вид.'
  - 'Практика: пари, що демонструють різницю видів у наказах: Розкажи мені про поїздку (док. — одна розповідь)
    проти Розповідай про подорожі (недок. — розповідати загалом). Закрий двері (док. — закрити зараз)
    проти Закривай двері, коли входиш (недок. — завжди).'
- section: Ввічливий наказ
  words: 600
  points:
  - 'Стратегії пом''якшення: 1. Будь ласка / прошу: Передайте, будь ласка, сіль. 2. Чи не + умовний спосіб:
    Чи не могли б ви відчинити вікно? 3. Інфінітив + прошу: Прошу не палити. Прошу тиші. 4. Давай/давайте
    як запрошення: Давайте обговоримо. Зверніть увагу: Давай — неформальне (однина), давайте — формальне/множина.'
  - 'Поширена помилка: ''давай пішли'' (Авраменко, 11 клас, с.54, с.57): *Пішли в кіно — це наслідок впливу
    російської мови (пошли). Правильно: Ходімо в кіно! або Давай підемо в кіно! Це важливий момент деколонізації:
    українська використовує форми на -імо або давай/давайте + доконаний вид, А НЕ *пішли як наказ.'
  - 'Шкала регістру від прямого до найввічливішого: Відчини вікно! (прямий наказ). Відчиніть, будь ласка,
    вікно. (ввічливе прохання). Чи не могли б ви відчинити вікно? (дуже ввічливо, умовно). Прошу відчинити
    вікно. (формально/офіційно). Учні тренуються переформульовувати прохання на кожному рівні.'
- section: Наказовий спосіб у тексті
  words: 800
  points:
  - 'Діалог 1 — удома: Батьки дають вказівки дитині, використовуючи наказовий спосіб різного виду: Вимий
    руки (док.), потім сідай (недок.) до столу. Не забувай (недок.) вимикати світло. Природне використання
    чергування видів у межах однієї розмови.'
  - 'Діалог 2 — у групі, планування події: Друзі використовують інклюзивні форми на -мо та хай/нехай:
    Обговорімо план. Хай Оленка купить продукти. Давайте зустрінемося о п''ятій. Нехай кожен принесе щось.'
  - 'Текст для читання: український рецепт або інструкція. Текст, насичений наказами: Наріжте цибулю.
    Додайте сіль. Перемішайте. Не переварюйте! Подавайте гарячим. Завдання: визначити вид кожного дієслова
    в наказовому способі та пояснити вибір.'
  - 'Українські приказки та пісні з наказами: Шануймося, єднаймося та будьмо! (І. Франко). Бережімо рідну
    мову! Не зрадь! Тримаймося! Культурний контекст: накази як заклики до національної солідарності.'
- section: Підсумок та перехід до M21
  words: 500
  points:
  - 'Підсумок: повна парадигма наказового способу (2 ос. одн., 1 ос. мн., 2 ос. мн., 3 ос. одн./мн. через
    хай/нехай), вид дієслова (доконаний проти недоконаного, не + недоконаний), ввічливий наказ (будь ласка,
    давайте, чи не могли б ви), правила вживання м''якого знака. Самоперевірка: Я можу утворити всі форми
    наказового способу ✓/✗, Я можу правильно вибрати вид дієслова ✓/✗, Я можу ввічливо попросити і запросити
    ✓/✗.'
  - 'Анонс: M21 — Віддієслівні іменники. Як дієслова стають іменниками: читати → читання, бачити → бачення.
    Цей процес словотвору поєднує засвоєння дієслів з М18-20 із розширенням словникового запасу.'
vocabulary_hints:
  required:
  - наказовий спосіб (imperative mood — commands, requests, instructions)
  - хай (let — particle for 3rd person commands)
  - нехай (let — slightly more formal variant of хай)
  - будь ласка (please)
  - прошу (I request — formal please)
  - давай / давайте (let's — invitation to joint action)
  - дозвіл (permission — Хай він увійде)
  - спонукання (encouragement, prompting to action)
  - заперечення (negation — не + недоконаний вид in imperatives)
  - доконаний вид (perfective aspect — single completed action)
  - недоконаний вид (imperfective aspect — ongoing/repeated action)
  - 'м''який знак (soft sign — in imperative forms: будь, лізь, глянь)'
  - ходімо (let's go — correct Ukrainian inclusive form)
  - обговорімо (let's discuss — 1pl inclusive imperative)
  recommended:
  - рецепт (recipe — imperative-heavy text type)
  - інструкція (instruction manual)
  - 'нарізати (to cut up — common in recipes: наріжте)'
  - додати (to add — додайте)
  - перемішати (to mix, stir — перемішайте)
  - вимикати (to turn off — не забувай вимикати)
  - шанувати (to honor — шануймося)
  - єднатися (to unite — єднаймося)
  - берегти (to protect — бережімо)
  - тримайся/тримаймося (hold on / let's hold on)
activity_hints:
- type: fill-in
  focus: Утворити правильну форму наказового способу (обрати вид, особу, м'який знак) у контексті речення
  items: 10
- type: quiz
  focus: Обрати доконаний чи недоконаний вид для наказового способу в заданих ситуаціях
  items: 8
- type: sentence-builder
  focus: Переписати прямі накази як ввічливі прохання, використовуючи будь ласка, давайте, чи не могли
    б ви
  items: 6
- type: match-up
  focus: З'єднати ситуації (крок рецепту, правило класу, ввічливе прохання, побажання) з правильною формою
    наказового способу
  items: 8
- type: error-correction
  focus: 'Виправити помилки в наказах: *пішли (→ ходімо), пропущений ь, неправильний вид після не, неправильна
    форма з хай'
  items: 6
- type: group-sort
  focus: 'Відсортувати форми наказового способу за категоріями: доконаний/недоконаний та прямий/ввічливий/з
    хай'
  items: 10
