  - "засіб (means/instrument)"
  - "знаряддя (tool — the physical instrument)"
  - "характеристика (characterisation — predicate role)"
  - "сумісність (accompaniment — doing something together)"
  - "шлях (path/route — movement along)"
  - "захоплюватися (to admire/be passionate about — governs Ор.в.)"
  - "цікавитися (to be interested in — governs Ор.в.)"
  - "пишатися (to be proud of — governs Ор.в.)"
  - "користуватися (to use — governs Ор.в.)"
  recommended:
  - "керувати (to manage/lead — governs Ор.в.)"
  - "володіти (to possess/master — governs Ор.в.)"
  - "задовольнятися (to be satisfied with — governs Ор.в.)"
  - "залишатися (to remain — + Ор.в. for predicate)"
  - "вважатися (to be considered — + Ор.в.)"
  - "агент (agent — the doer in passive constructions)"
