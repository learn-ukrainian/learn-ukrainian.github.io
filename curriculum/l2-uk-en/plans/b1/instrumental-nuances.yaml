objectives:
- "Learner can use the instrumental for predicate characterisation:
  Він працює лікарем. Вона стала вчителькою. Місто є столицею."
- "Learner can use the instrumental for means/instrument:
  писати ручкою, їхати автобусом, говорити українською"
- "Learner can use the instrumental for route/path:
  іти вулицею, їхати дорогою, летіти небом"
- "Learner can use the instrumental for accompaniment and comparison:
  разом з другом, бути задоволеним результатом, захоплюватися мистецтвом"
- "Learner can use the instrumental in passive constructions:
  книжка написана автором, рішення прийняте урядом"
dialogue_situations:
- setting: 'Describing colleagues at a Харківська фірма (f, Kharkiv company) — characterization:
    Вона стала директоркою (f, director) молодою. Він працює перекладачем (m, translator).
    Вона славиться красою (f, beauty). Ходить з розумним виглядом (m, expression).'
  speakers:
  - Нова співробітниця
  - Колега
  motivation: 'Instrumental of characterization: стати + inst, працювати + inst, славитися
