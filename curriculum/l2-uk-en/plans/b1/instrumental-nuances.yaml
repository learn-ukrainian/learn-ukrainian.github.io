module: b1-054
level: B1
sequence: 54
slug: instrumental-nuances
version: '3.1.2'
title: "Орудний відмінок (деталі)"
subtitle: "Характеристика, професія, шлях, сумісність — розширені значення орудного"
focus: grammar
pedagogy: PPP
phase: "B1.5 [Нюанси відмінків та прийменники]"
word_target: 4000
objectives:
  - "Учень вміє використовувати орудний відмінок для характеристики у складеному присудку: Він працює лікарем. Вона стала вчителькою. Місто є столицею."
  - "Учень вміє використовувати орудний відмінок для позначення засобу/знаряддя: писати ручкою, їхати автобусом, говорити українською."
  - "Учень вміє використовувати орудний відмінок для позначення шляху/простору: іти вулицею, їхати дорогою, летіти небом."
  - "Учень вміє використовувати орудний відмінок для позначення сумісності та порівняння: разом з другом, бути задоволеним результатом, захоплюватися мистецтвом."
  - "Учень вміє використовувати орудний відмінок у пасивних конструкціях: книжка написана автором, рішення прийняте урядом."
dialogue_situations:
  - setting: 'Опис колег у харківській фірмі — характеристика: Вона стала директоркою молодою. Він працює перекладачем. Вона славиться красою. Ходить з розумним виглядом.'
    speakers:
      - Нова співробітниця
      - Колега
    motivation: 'Орудний відмінок характеристики: стати + Ор.в., працювати + Ор.в., славитися + Ор.в.'
content_outline:
  - section: "Орудний характеристики"
    words: 800
    points:
      - "Для називання чиєїсь професії, ролі або характеристики українська мова використовує Ор.в. з дієсловами бути, стати, працювати, залишатися: Він є лікарем. Вона стала вчителькою. Він працює інженером. Я залишаюся оптимістом. Примітка: у розмовному мовленні також можливий Н.в.: Він лікар. Але Ор.в. є нормативним з є/стати/працювати."
      - "Часова характеристика: Він був студентом. Вона буде президенткою. Орудний відмінок маркує іменну частину присудка в українській мові — це ключова структурна відмінність від англійської."
      - "Розширені приклади з абстрактними якостями: Це місто є столицею України. Ця подія стала поворотним моментом. Цей фільм вважається шедевром. Його вважають генієм. Практика: 12 речень для опису ролей та якостей людей з використанням Ор.в."
  - section: "Орудний засобу та знаряддя"
    words: 700
    points:
      - "Первісна функція орудного відмінка — називання знаряддя або засобу: писати ручкою/олівцем, різати ножем, їсти виделкою, їхати автобусом/потягом/літаком, платити карткою/готівкою. Прийменник не потрібен — сама форма відмінка передає значення засобу."
      - "Мова як засіб: говорити/розмовляти українською (мовою). Примітка: українською — це Ор.в. від українська (слово мова мається на увазі). Також: писати латиницею/кирилицею, думати українською."
      - "Орудний способу дії: говорити шепотом, іти кроком, бігти підтюпцем, працювати днями і ночами, дивитися здивованими очима. Це розширює поняття засобу до способу виконання дії — питомо українське використання Ор.в. без прийменника."
      - "Практика: опис щоденної рутини з використанням орудного засобу та способу дії: Я їду на роботу автобусом. Потім пишу звіти ручкою. Розмовляю з колегами українською. Ходжу парком повільним кроком."
  - section: "Орудний шляху та простору"
    words: 500
    points:
      - "Українська мова використовує Ор.в. без прийменника для вираження шляху руху: іти вулицею, їхати дорогою, пливти річкою, летіти небом, бігти полем, ходити лісом."
      - "Це питомо українська конструкція — жодного прийменника, лише орудний відмінок маркує рельєф або маршрут. Порівняйте: іти вулицею проти іти на вулицю проти іти по вулиці (з прийменником, також правильно)."
      - "Читання: туристична розповідь, що описує подорож Україною з використанням орудного шляху: Ми їхали степом, потім лісом, і нарешті побачили гори."
  - section: "Орудний сумісності та керування дієслів"
    words: 600
    points:
      - "Дієслова, що керують Ор.в. в українській мові: захоплюватися чимось, цікавитися чимось, користуватися чимось, пишатися чимось, задовольнятися чимось, керувати чимось, володіти чимось."
      - "З прийменником з/із + Ор.в. для сумісності та взаємодії: разом з другом, зустрітися з колегою, познайомитися з людиною, поговорити з мамою, порівняти з минулим."
      - "Практика: опис інтересів, навичок та соціальної активності за допомогою дієслів, що керують орудним відмінком: Я захоплююся музикою. Цікавлюся історією. Пишаюся своєю країною."
  - section: "Орудний у пасивних конструкціях"
    words: 500
    points:
      - "У пасивних конструкціях агент дії має форму Ор.в.: Книжку написано автором. Рішення прийнято урядом. Картину намальовано художницею. Пісню виконано хором. Модель: [об'єкт у Зн.в./Н.в.] + пасивний дієприкметник/дієслово + [агент в Ор.в.]."
      - "Це пов'язано з пасивним станом, введеним у b1-023: орудний відмінок вказує на те, хто виконав дію в пасивному реченні. Практика: перетворення активних речень на пасивні, маркуючи агента за допомогою Ор.в.: Тарас Шевченко написав Кобзар → Кобзар написаний Тарасом Шевченком."
      - "Анонс: пасивні конструкції будуть розширені у Фазі 7 (дієприкметники)."
  - section: "Прийменники з Ор.в. (§4.2.2.5)"
    words: 500
    points:
      - "Державний стандарт вимагає знання 8+ прийменників, що керують Ор.в. Окрім з/із (сумісність): за + Ор.в. (за будинком, за рікою; також: піти за хлібом), між/поміж + Ор.в. (між друзями, поміж деревами), над + Ор.в. (над містом, над річкою), під + Ор.в. (під столом, під дахом), перед + Ор.в. (перед будинком; часове: перед обідом)."
      - "Додатково: поряд з + Ор.в. (поряд з парком), разом з + Ор.в. (разом з батьками), порівняно з + Ор.в. (порівняно з минулим роком), у зв'язку з + Ор.в. (у зв'язку з карантином). За Заболотним, 7 клас, с.193: прийменники з Ор.в."
      - "Порівняння з використанням Ор.в.: порівняно з, у порівнянні з: Порівняно з минулим роком, ціни зросли. Також: Ор.в. порівняння у присудках: Він задоволений результатом. Практика: 12 речень з використанням прийменників з орудним відмінком, розрізнення місця (під, над, за, між) від сумісності (з, разом з) та порівняння (порівняно з)."
  - section: "Підсумок"
    words: 400
    points:
      - "Шість семантичних ролей Ор.в.: 1. Характеристика (працювати лікарем). 2. Засіб (писати ручкою). 3. Шлях (іти вулицею). 4. Сумісність/керування (з другом, цікавитися). 5. Агент пасиву (написано автором). 6. З прийменниками: 8+ прийменників (за, між, над, під, перед, поряд з, порівняно з, у зв'язку з)."
      - "Короткий огляд ключових дієслів, що керують Ор.в.: працювати, бути, стати, захоплюватися, цікавитися, користуватися, пишатися, керувати, володіти. Самоперевірка: 10 речень, що вимагають правильного використання орудного відмінка у всіх шести ролях."
      - "Анонс: наступний модуль — кличний відмінок у формальному контексті."
vocabulary_hints:
  required:
    - "орудний відмінок (instrumental case)"
    - "засіб (means/instrument)"
    - "знаряддя (tool — the physical instrument)"
    - "характеристика (characterisation — predicate role)"
    - "сумісність (accompaniment — doing something together)"
    - "шлях (path/route — movement along)"
    - "захоплюватися (to admire/be passionate about — governs Ор.в.)"
    - "цікавитися (to be interested in — governs Ор.в.)"
    - "пишатися (to be proud of — governs Ор.в.)"
    - "користуватися (to use — governs Ор.в.)"
  recommended:
    - "керувати (to manage/lead — governs Ор.в.)"
    - "володіти (to possess/master — governs Ор.в.)"
    - "задовольнятися (to be satisfied with — governs Ор.в.)"
    - "залишатися (to remain — + Ор.в. for predicate)"
    - "вважатися (to be considered — + Ор.в.)"
    - "агент (agent — the doer in passive constructions)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про орудний характеристики і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Орудний засобу та знаряддя».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему орудний характеристики.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему орудний засобу та знаряддя.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Орудний характеристики».'
  - type: match-up
    focus: "З'єднайте терміни з розділу «Орудний засобу та знаряддя» з їхніми визначеннями."
