content_outline:
- section: "Орудний характеристики (Instrumental of characterisation)"
  words: 800
  points:
  - "When naming someone's profession, role, or characteristic, Ukrainian
    uses Ор.в. with verbs бути, стати, працювати, залишатися:
    Він є лікарем (He is a doctor). Вона стала вчителькою.
    Він працює інженером. Я залишаюся оптимістом.
    Note: in colloquial speech, Н.в. is also possible: Він лікар.
    But Ор.в. is standard with є/стати/працювати."
  - "Temporal characterisation: Він був студентом (He used to be a student).
    Вона буде президенткою (She will be president).
    The instrumental marks the predicate noun in Ukrainian —
    this is a key structural difference from English."
  - "Extended examples with abstract qualities:
    Це місто є столицею України. Ця подія стала поворотним моментом.
    Цей фільм вважається шедевром. Його вважають генієм.
    Practice: 12 sentences describing people's roles and qualities using Ор.в."
- section: "Орудний засобу та знаряддя (Instrumental of means)"
  words: 600
  points:
  - "The original function of the instrumental — naming the TOOL or MEANS:
    писати ручкою/олівцем, різати ножем, їсти виделкою,
    їхати автобусом/потягом/літаком, платити карткою/готівкою.
    No preposition needed — the case form alone conveys 'by means of.'"
  - "Language as means: говорити/розмовляти українською (мовою).
    Note: українською is Ор.в. of українська (мова implied).
    Also: писати латиницею/кирилицею, думати українською."
  - "Practice: describe daily routines using instrumental of means.
    'Я їду на роботу автобусом. Потім пишу звіти ручкою.
    Розмовляю з колегами українською.'"
- section: "Орудний шляху та простору (Instrumental of path)"
  words: 500
  points:
  - "Ukrainian uses Ор.в. without preposition to express the PATH of movement:
    іти вулицею (walk along the street), їхати дорогою (drive along the road),
    пливти річкою (swim along the river), летіти небом (fly through the sky),
    бігти полем (run across the field), ходити лісом (walk through the forest)."
  - "This is a distinctly Ukrainian construction — no preposition,
    just the instrumental case marking the terrain or route.
    Compare: іти вулицею (along the street) vs іти на вулицю (to the street)
    vs іти по вулиці (along the street — with preposition, also correct)."
  - "Reading passage: a travel narrative describing a journey through Ukraine,
    using instrumental of path. 'Ми їхали степом, потім лісом, і нарешті
    побачили гори.'"
- section: "Орудний сумісності та керування дієслів (Instrumental with verbs)"
  words: 600
  points:
  - "Verbs governing Ор.в. in Ukrainian:
    захоплюватися чимось (admire/be passionate about something)
    цікавитися чимось (be interested in something)
    користуватися чимось (use something)
    пишатися чимось (be proud of something)
    задовольнятися чимось (be satisfied with something)
    керувати чимось (manage/steer something)
    володіти чимось (possess/master something)"
  - "With preposition з/із + Ор.в. for accompaniment and interaction:
    разом з другом (together with a friend)
    зустрітися з колегою (meet with a colleague)
    познайомитися з людиною (get to know a person)
    поговорити з мамою (talk with mom)
    порівняти з минулим (compare with the past)"
  - "Practice: describe interests, skills, and social activities
    using instrumental-governing verbs. 'Я захоплююся музикою.
    Цікавлюся історією. Пишаюся своєю країною.'"
- section: "Орудний у пасивних конструкціях (Instrumental in passive)"
  words: 500
  points:
  - "In passive constructions, the AGENT takes Ор.в.:
    Книжку написано автором. Рішення прийнято урядом.
    Картину намальовано художницею. Пісню виконано хором.
    Pattern: [object in Зн.в./Н.в.] + пасивне дієприкметник/дієслово + [agent in Ор.в.]"
  - "This connects to passive voice introduced in b1-023:
    the instrumental marks WHO performed the action in a passive sentence.
    Practice: transform active sentences to passive, marking the agent with Ор.в.
    'Тарас Шевченко написав Кобзар' → 'Кобзар написаний Тарасом Шевченком.'"
  - "Preview: passive constructions will be expanded in Phase 7 (participles)."
- section: "Підсумок (Summary)"
  words: 500
  points:
  - "Five semantic roles of Ор.в.:
    1. Характеристика (працювати лікарем). 2. Засіб (писати ручкою).
    3. Шлях (іти вулицею). 4. Сумісність/керування (з другом, цікавитися).
    5. Агент пасиву (написано автором)."
  - "Key verbs governing Ор.в. summary: працювати, бути, стати,
    захоплюватися, цікавитися, користуватися, пишатися, керувати, володіти.
    Self-check: 10 sentences requiring correct instrumental usage."
  - "Preview: next module — кличний відмінок у формальному контексті."
