module: b1-040
level: B1
sequence: 40
slug: shopping-and-services
version: '3.1'
title: "Покупки і послуги"
subtitle: "На ринку, в магазині, на пошті — порівняння і словотвір у дії"
focus: communication
pedagogy: PPP
phase: "B1.4 [Degrees of Comparison & Word Formation]"
word_target: 4000
objectives:
  - "Learner can navigate shopping situations in Ukrainian: asking about prices, comparing
    products, requesting services, bargaining, and making complaints"
  - "Learner can use comparative and superlative adjectives naturally in shopping
    contexts (дешевший, найкращий, більш якісний)"
  - "Learner can use agent nouns and place nouns from word formation module in real
    contexts (продавець/продавчиня, пекарня, хімчистка)"
  - "Learner can understand and use transactional vocabulary: знижка, чек, готівка,
    картка, повернення, гарантія, розмір, примірка"
  - "Learner can write a simple complaint or review using comparison structures and
    formal register where appropriate"
dialogue_situations:
  - setting: 'Shopping at a Львівський ТРЦ (m, Lviv shopping center) — comparing products:
      Ця сукня (f, dress) гарніша, але дорожча. Чи є дешевша? Найкращий варіант (m,
      option) — зі знижкою (f, discount). Ця крамниця (f, shop) більша за ту.'
    speakers:
      - Покупець
      - Продавець-консультант
    motivation: 'Shopping with comparisons: гарніший, дорожчий, найкращий, дешевший'
content_outline:
  - section: "На ринку"
    words: 750
    points:
      - "Cultural context: Ukrainian markets (базар/ринок) as a living institution
        — Бессарабський ринок, Привоз, Краматорський ринок. Why markets matter culturally:
        direct interaction, bargaining, seasonal products, personal relationships
        with sellers."
      - "Key dialogues at the market: Скільки коштує кілограм яблук? Дайте, будь ласка,
        півкіла. Ці помідори свіжіші за ті? А які найсмачніші? Чи можна дешевше? А
        якщо візьму два кілограми? Using comparatives naturally: дешевший, свіжіший,
        більший, смачніший."
      - "Vocabulary in context: продавець/продавчиня, покупець/покупчиня, ваги, кілограм,
        ціна, знижка, здача, готівка, пакет. Reading passage: a narrative about a
        market visit using Phase 5 grammar."
      - "Bargaining culture: how to negotiate politely in Ukrainian — Чи можна трохи
        дешевше? А якщо візьму більше? Скажіть найнижчу ціну. Contrast with fixed-price
        stores: У магазині ціни фіксовані, а на ринку можна торгуватися."
  - section: "У магазині"
    words: 750
    points:
      - "Types of shops using word formation: книгарня (книга+-арня), взуттєвий магазин,
        продуктовий магазин, аптека, хімчистка, перукарня (перукар+-ня), майстерня
        (майстер+-ня). Practice: derive shop names from base words."
      - "Shopping dialogue: trying on clothes Чи є цей светр у більшому розмірі? Мені
        потрібен менший. Де примірочна? Скільки коштує ця сукня? Ця тканина якісніша,
        але й дорожча. Яка найдешевша? Using comparatives and superlatives from M34-35."
      - "Paying: Ви розраховуєтесь готівкою чи карткою? Дайте, будь ласка, чек. Чи
        є гарантія? Я хочу повернути цю річ. Вона бракована."
      - "Extended dialogue: a full shopping scenario from entering the store to leaving —
        greeting, asking for help, trying on, comparing options, deciding, paying. This
        models how native speakers structure the entire transaction."
  - section: "На пошті і в банку"
    words: 700
    points:
      - "Post office vocabulary and dialogues: Я хочу відправити посилку / листа /
        бандероль. Скільки коштує доставка? Яка найшвидша доставка? Коли посилка дійде?
        Через скільки днів? Using temporal expressions with comparatives: швидше,
        довше."
      - "Bank vocabulary: рахунок, переказ, обмін валют, курс. Який сьогодні курс
        долара? Де найвигідніший обмін? Practice dialogue: exchanging currency and
        comparing rates."
      - "Comparing delivery options: Нова Пошта vs Укрпошта — which is faster, cheaper,
        more reliable? Extended practice using comparatives and superlatives in a
        real-world context Ukrainians navigate daily: Нова Пошта швидша, але дорожча.
        Укрпошта дешевша, але повільніша. Який найкращий варіант?"
  - section: "Послуги"
    words: 650
    points:
      - "Service situations using agent nouns: перукар/перукарка — у перукарні: Мені
        потрібна стрижка. Коротше, будь ласка. майстер — у майстерні: Мій телефон
        зламався. Скільки коштує ремонт? кравець/кравчиня — в ательє: Мені потрібно
        вкоротити штани."
      - "Comparing services: Ця перукарня краща за ту. У тій майстерні ремонт дешевший,
        але довший. Який найкращий сервіс у місті? Practice: writing a review comparing
        two service providers."
      - "Word formation in action: learners analyze how the service vocabulary they
        encounter connects to M39 (word-formation-nouns) — перукар (agent, -ар) →
        перукарня (place, -ня), майстер → майстерня. This reinforces the словотвірний
        ланцюжок concept in a communicative context."
  - section: "Скарга і відгук"
    words: 700
    points:
      - "Polite complaint template: Вибачте, але цей товар бракований. Я купив/купила
        це вчора, і воно вже зламалося. Я хочу повернути товар / обміняти на інший.
        Мені повинні повернути гроші. Register: formal but assertive, using conditional
        for politeness."
      - "Escalation phrases: Я хочу поговорити з менеджером. Це неприйнятно. Відповідно
        до закону про захист прав споживачів... Practice: role-play a complaint
        scenario with varying levels of formality."
      - "Writing a review using comparisons: 'Ця кав'ярня — найкраща в місті. Кава
        тут смачніша, ніж у ... Обслуговування найшвидше. Ціни трохи вищі, але якість
        набагато краща.' Practice: write a 5-7 sentence review of a real or imagined
        place."
  - section: "Підсумок"
    words: 450
    points:
      - "Key transactional phrases organized by situation: ринок, магазин, пошта,
        банк, послуги, скарги. Grammar integration check: comparatives, superlatives,
        word formation."
      - "Transactional phrase card: organized reference for each situation (greeting →
        asking → comparing → deciding → paying → complaining). Each phrase annotated
        with the grammar pattern it uses (comparative, superlative, agent noun, etc.)."
      - "Self-check: can you complete a full shopping interaction from start to finish?
        Can you compare products using three different constructions (за/від/ніж)?
        Can you write a complaint and a review? Preview: контрольна робота 5."
vocabulary_hints:
  required:
    - "знижка (discount)"
    - "готівка (cash)"
    - "картка (card — payment card)"
    - "чек (receipt)"
    - "повернення (return — of a product)"
    - "гарантія (guarantee/warranty)"
    - "розмір (size)"
    - "примірочна (fitting room)"
    - "посилка (parcel)"
    - "обмін валют (currency exchange)"
    - "курс (exchange rate)"
    - "ремонт (repair)"
    - "бракований (defective)"
  recommended:
    - "здача (change — money returned)"
    - "тканина (fabric)"
    - "доставка (delivery)"
    - "переказ (money transfer)"
    - "рахунок (bill/account)"
    - "стрижка (haircut)"
    - "ательє (tailor's shop)"
    - "кав'ярня (coffee shop)"
    - "обслуговування (service — customer service)"
activity_hints:
  - type: quiz
    focus: "Choose correct transactional phrase for given shopping situations"
    items: 12
  - type: fill-in
    focus: "Complete shopping dialogues with comparatives, superlatives, vocabulary"
    items: 12
  - type: match-up
    focus: "Match agent noun to workplace/service location"
    items: 12
  - type: dialogue-completion
    focus: "Complete a market bargaining or shop complaint dialogue"
    items: 12
  - type: sentence-builder
    focus: "Build comparison sentences about products and services"
    items: 12
  - type: free-write
    focus: "Write a review of a shop or service using comparisons"
    items: 12
connects_to:
  - "b1-038 (Вищий ступінь — comparatives used in product comparison)"
  - "b1-039 (Найвищий ступінь — superlatives in reviews)"
  - "b1-043 (Творення іменників — agent and place nouns)"
  - "b1-045 (Контрольна робота 5 — review of Phase 5)"
prerequisites:
  - "b1-038 through b1-043 (Phase 5 grammar modules)"
grammar:
  - "Application of ступені порівняння in real shopping contexts"
  - "Application of словотвір (agent nouns, place nouns) in service contexts"
  - "Transactional register: polite requests, complaints, reviews"
register: розмовно-побутовий
references:
  - title: "Communicative context module"
    notes: "Applies grammar from M38-43 in shopping, services, post office, and bank."
