module: b1-027
level: B1
sequence: 27
slug: shopping-and-services
version: '3.1.2'
title: "Покупки і послуги"
subtitle: "На ринку, в магазині, на пошті — порівняння і словотвір у дії"
focus: communication
pedagogy: PPP
phase: "B1.2 [Система дієслова]"
word_target: 4000
objectives:
  - "Вміти орієнтуватися в ситуаціях покупок українською мовою: запитувати про ціни, порівнювати товари, замовляти послуги, торгуватися та висловлювати скарги."
  - "Вміти природно використовувати вищий і найвищий ступені порівняння прикметників у контексті покупок (дешевший, найкращий, більш якісний)."
  - "Вміти застосовувати назви осіб за родом діяльності та назви місць із модуля про словотвір у реальних ситуаціях (продавець/продавчиня, пекарня, хімчистка)."
  - "Розуміти та використовувати транзакційну лексику: знижка, чек, готівка, картка, повернення, гарантія, розмір, примірка."
  - "Вміти написати просту скаргу або відгук, використовуючи конструкції порівняння та офіційний стиль там, де це доречно."
dialogue_situations:
  - setting: 'Покупки у львівському ТРЦ — порівняння товарів: Ця сукня (f, dress) гарніша, але дорожча. Чи є дешевша? Найкращий варіант (m, option) — зі знижкою (f, discount). Ця крамниця (f, shop) більша за ту.'
    speakers:
      - Покупець
      - Продавець-консультант
    motivation: 'Покупки з використанням порівнянь: гарніший, дорожчий, найкращий, дешевший'
content_outline:
  - section: "На ринку"
    words: 750
    points:
      - "Культурний контекст: українські ринки (базар/ринок) як жива інституція — Бессарабський ринок, Привоз, Краматорський ринок. Чому ринки мають культурне значення: безпосереднє спілкування, торгування, сезонні продукти, особисті стосунки з продавцями."
      - "Ключові діалоги на ринку: Скільки коштує кілограм яблук? Дайте, будь ласка, півкіла. Ці помідори свіжіші за ті? А які найсмачніші? Чи можна дешевше? А якщо візьму два кілограми? Природне використання ступенів порівняння: дешевший, свіжіший, більший, смачніший."
      - "Лексика в контексті: продавець/продавчиня, покупець/покупчиня, ваги, кілограм, ціна, знижка, здача, готівка, пакет. Текст для читання: розповідь про похід на ринок із застосуванням граматики фази 5."
      - "Культура торгування: як ввічливо домовлятися про ціну українською мовою — Чи можна трохи дешевше? А якщо візьму більше? Скажіть найнижчу ціну. Контраст із магазинами з фіксованими цінами: У магазині ціни фіксовані, а на ринку можна торгуватися."
  - section: "У магазині"
    words: 750
    points:
      - "Види магазинів через словотвір: книгарня (книга+-арня), взуттєвий магазин, продуктовий магазин, аптека, хімчистка, перукарня (перукар+-ня), майстерня (майстер+-ня). Практика: утворення назв магазинів від твірних слів."
      - "Діалог у магазині: примірка одягу. Чи є цей светр у більшому розмірі? Мені потрібен менший. Де примірочна? Скільки коштує ця сукня? Ця тканина якісніша, але й дорожча. Яка найдешевша? Використання вищого і найвищого ступенів порівняння з модулів M34-35."
      - "Оплата: Ви розраховуєтесь готівкою чи карткою? Дайте, будь ласка, чек. Чи є гарантія? Я хочу повернути цю річ. Вона бракована."
      - "Розширений діалог: повний сценарій покупок від входу до магазину до виходу — привітання, прохання про допомогу, примірка, порівняння варіантів, прийняття рішення, оплата. Це моделює те, як носії мови структурують увесь процес транзакції."
  - section: "На пошті і в банку"
    words: 700
    points:
      - "Лексика та діалоги на пошті: Я хочу відправити посилку / листа / бандероль. Скільки коштує доставка? Яка найшвидша доставка? Коли посилка дійде? Через скільки днів? Використання часових виразів із вищим ступенем порівняння: швидше, довше."
      - "Банківська лексика: рахунок, переказ, обмін валют, курс. Який сьогодні курс долара? Де найвигідніший обмін? Практичний діалог: обмін валюти та порівняння курсів."
      - "Порівняння варіантів доставки: Нова Пошта vs Укрпошта — що швидше, дешевше, надійніше? Розширена практика використання вищого та найвищого ступенів порівняння в реальних життєвих ситуаціях, у яких українці орієнтуються щодня: Нова Пошта швидша, але дорожча. Укрпошта дешевша, але повільніша. Який найкращий варіант?"
  - section: "Послуги"
    words: 650
    points:
      - "Ситуації надання послуг з використанням назв діячів: перукар/перукарка — у перукарні: Мені потрібна стрижка. Коротше, будь ласка. майстер — у майстерні: Мій телефон зламався. Скільки коштує ремонт? кравець/кравчиня — в ательє: Мені потрібно вкоротити штани."
      - "Порівняння послуг: Ця перукарня краща за ту. У тій майстерні ремонт дешевший, але довший. Який найкращий сервіс у місті? Практика: написання відгуку з порівнянням двох постачальників послуг."
      - "Словотвір у дії: учні аналізують, як лексика сфери послуг, з якою вони стикаються, пов'язується з модулем M39 (словотвір іменників) — перукар (діяч, -ар) → перукарня (місце, -ня), майстер → майстерня. Це закріплює концепцію словотвірного ланцюжка в комунікативному контексті."
  - section: "Скарга і відгук"
    words: 700
    points:
      - "Шаблон ввічливої скарги: Вибачте, але цей товар бракований. Я купив/купила це вчора, і воно вже зламалося. Я хочу повернути товар / обміняти на інший. Мені повинні повернути гроші. Регістр: офіційний, але наполегливий, із використанням умовного способу для ввічливості."
      - "Фрази для ескалації проблеми: Я хочу поговорити з менеджером. Це неприйнятно. Відповідно до закону про захист прав споживачів... Практика: розіграш за ролями ситуації скарги з різними рівнями офіційності."
      - "Написання відгуку з використанням порівнянь: Ця кав'ярня — найкраща в місті. Кава тут смачніша, ніж у ... Обслуговування найшвидше. Ціни трохи вищі, але якість набагато краща. Практика: написати відгук на 5-7 речень про реальне чи вигадане місце."
  - section: "Підсумок"
    words: 450
    points:
      - "Ключові транзакційні фрази, організовані за ситуаціями: ринок, магазин, пошта, банк, послуги, скарги. Перевірка інтеграції граматики: вищий і найвищий ступені порівняння, словотвір."
      - "Картка транзакційних фраз: структурований довідник для кожної ситуації (привітання → запитання → порівняння → рішення → оплата → скарга). Кожна фраза супроводжується поясненням граматичної моделі, яка в ній використана (вищий чи найвищий ступінь порівняння, назва діяча тощо)."
      - "Самоперевірка: чи можете ви провести повну комунікацію в магазині від початку до кінця? Чи можете ви порівняти товари, використовуючи три різні конструкції (за/від/ніж)? Чи можете ви написати скаргу і відгук? Анонс: контрольна робота 5."
vocabulary_hints:
  required:
    - "знижка (discount)"
    - "готівка (cash)"
    - "картка (card — payment card)"
    - "чек (receipt)"
    - "повернення (return — of a product)"
    - "гарантія (guarantee/warranty)"
    - "розмір (size)"
    - "примірочна (fitting room)"
    - "посилка (parcel)"
    - "обмін валют (currency exchange)"
    - "курс (exchange rate)"
    - "ремонт (repair)"
    - "бракований (defective)"
  recommended:
    - "здача (change — money returned)"
    - "тканина (fabric)"
    - "доставка (delivery)"
    - "переказ (money transfer)"
    - "рахунок (bill/account)"
    - "стрижка (haircut)"
    - "ательє (tailor's shop)"
    - "кав'ярня (coffee shop)"
    - "обслуговування (service — customer service)"
activity_hints:
  - type: quiz
    focus: "Вибір правильної транзакційної фрази для різних ситуацій покупок"
    items: 12
  - type: fill-in
    focus: "Доповнення діалогів (покупки) формами ступенів порівняння та відповідною лексикою"
    items: 12
  - type: match-up
    focus: "Зіставлення назви професії з місцем роботи/послуги"
    items: 12
  - type: dialogue-completion
    focus: "Доповнення діалогів (торгування на ринку або скарга в магазині)"
    items: 12
  - type: sentence-builder
    focus: "Побудова речень із порівнянням товарів і послуг"
    items: 12
  - type: free-write
    focus: "Написання відгуку про магазин або послугу з використанням порівнянь"
    items: 12
connects_to:
  - "b1-038 (Вищий ступінь — використання прикметників вищого ступеня для порівняння товарів)"
  - "b1-039 (Найвищий ступінь — використання прикметників найвищого ступеня у відгуках)"
  - "b1-043 (Творення іменників — назви діячів і місць)"
  - "b1-045 (Контрольна робота 5 — підсумок фази 5)"
prerequisites:
  - "b1-038 до b1-043 (Граматичні модулі фази 5)"
grammar:
  - "Застосування ступенів порівняння в реальних контекстах покупок"
  - "Застосування словотвору (назви діячів, назви місць) у сфері послуг"
  - "Транзакційний регістр: ввічливі прохання, скарги, відгуки"
register: розмовно-побутовий
references:
  - title: "Communicative context module"
    notes: "Застосовує граматику з модулів M38-43 у ситуаціях покупок, послуг, на пошті та в банку."