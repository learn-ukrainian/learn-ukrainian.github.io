module: b1-07
level: B1
sequence: 7
slug: aspect-past-single-repeated
version: '2.0'
title: 'Вид у минулому: одного разу vs щодня'
subtitle: 'Aspect in Past: Single vs Repeated Actions'
content_outline:
- section: Тест
  points:
  - Compare two narratives
  - Deduce rule (One vs Many) — use visual timeline (Dots on a line vs One big X)
    per research
- section: Пояснення
  points:
  - 'Single events (markers: once, that time) — cultural hook: «Одного разу...» as
    canonical folk tale opener'
  - 'Repeated actions (markers: always, often) — cultural hook: «щонеділі» associations
    with family rituals'
  - 'Contrast table — explicit contrast: «читав» (process/habit) vs «прочитав» (result)'
  - 'Special cases (once, long ago) — learner error: confusion with English «used
    to» (just past imperfective)'
- section: Практика
  points:
  - Selection algorithm
  - 'Common mistakes — learner error: Perfective for Habitual Actions (Він прочитав
    книгу щодня)'
  - Aspect in daily life
- section: Діалоги
  points:
  - 'School memories — context: habits (used to) vs specific events'
  - Summer stories
  - Work experience
- section: Підсумок
  points:
  - Summary of markers — review frequency adverbs
  - Self-check
vocabulary_hints:
  required:
  - 'одного разу (once) — collocations: одного разу вранці/вночі, одного разу він
    вирішив'
  - 'щодня (every day) — collocations: робити щодня, щодня бачити; synonym: кожного
    дня'
  - 'часто (often) — collocations: дуже часто, досить часто'
  - 'іноді (sometimes) — collocations: тільки іноді, іноді навіть, іноді буває'
  - 'зазвичай (usually) — collocations: як зазвичай, він зазвичай'
  - 'того разу (that time) — collocations: саме того разу, пам''ятаю того разу'
  - того дня (that day)
  - 'завжди (always) — collocations: назавжди (forever), завжди був, завжди казав'
  - ніколи (never)
  - рідко (rarely)
  recommended:
  - регулярно (regularly)
  - постійно (constantly)
  - вперше (for the first time)
  - востаннє (for the last time)
  - неодноразово (repeatedly)
activity_hints:
- type: fill-in
  focus: Time marker → aspect selection
  items: 15+
- type: fill-in
  focus: Single event → habitual (and vice versa)
  items: 10+
- type: quiz
  focus: Which aspect for which context?
  items: 12+
- type: fill-in
  focus: Narrative with aspect choices
  items: 10+
- type: match-up
  focus: Time marker → aspect
  items: 12+
focus: grammar
pedagogy: TTT
prerequisites:
- b1-06 (Aspect complete system)
connects_to:
- b1-08 (Aspect in past - result vs process)
- b1-14 (Aspect integration practice)
objectives:
- Learner can distinguish single from repeated past actions
- Learner can select correct aspect based on time markers
- Learner understands how frequency affects aspect choice
- Learner can transform between single and habitual narratives
grammar:
- Aspect selection with time markers
- Single events vs habitual actions
- Frequency adverbs and aspect
