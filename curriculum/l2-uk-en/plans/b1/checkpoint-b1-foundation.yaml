module: b1-007
level: B1
sequence: 7
slug: checkpoint-b1-foundation
version: '3.0'
title: "Контрольна робота 1"
subtitle: "Перевірка знань: фонетика, морфологія, синтаксис, часи, вид, опис людини"
focus: review
pedagogy: PPP
phase: "B1.1 [Metalanguage Bridge & Foundation]"
word_target: 4000
objectives:
- "Learner can demonstrate mastery of Ukrainian phonetic metalanguage
  (звук/літера, голосний/приголосний, дзвінкий/глухий/сонорний,
  наголос, транскрипція) through targeted exercises"
- "Learner can analyze word structure (корінь, префікс, суфікс, закінчення)
  and identify частини мови using Ukrainian terminology"
- "Learner can correctly use all three future tense forms (проста, складна,
  складена) and choose appropriate aspect (доконаний/недоконаний) in context"
- "Learner can describe a person's appearance, character, and relationships
  using портретна лексика and appropriate register"
- "Learner can identify and correct errors in Ukrainian texts involving
  metalanguage terms, verb forms, and descriptive vocabulary"
dialogue_situations:
- setting: 'Oral exam at a Ukrainian language course — the examiner asks about your
    background, daily life, and plans using all tenses and basic grammar terminology:
    Розкажіть про себе. Що ви робили минулого тижня? Які ваші плани?'
  speakers:
  - Екзаменатор
  - Студент
  motivation: 'Consolidation: past/present/future, aspect, adjective agreement, metalanguage'
content_outline:
- section: "Вступ: як працювати з контрольною"
  words: 350
  points:
  - "Overview of the checkpoint structure: this module tests everything
    from M01-M06 (Phase 1: Metalanguage Bridge & Foundation).
    Six content areas: фонетика (M01), морфологія (M02),
    синтаксис i відмінки (M03), минуле i теперішнє (M04),
    майбутнє i вид дієслова (M05), людина i стосунки (M06)."
  - "Instructions in Ukrainian: 'Виконайте всі завдання по черзі.
    Для кожного завдання є підказка, який модуль повторити, якщо
    відповідь виявиться складною. Не поспішайте — головне розуміння,
    а не швидкість.'"
  - "Self-assessment framework: after each section, learners rate their
    confidence (впевнено / потребую повторення / не розумію) to identify
    areas for review before moving to Phase 2."
- section: "Блок 1: Фонетика та графіка"
  words: 650
  points:
  - "Passage-based assessment: a Ukrainian text (150-200 words) about
    Ukrainian nature or culture, followed by phonetic analysis tasks:
    — Count голосні та приголосні звуки in selected words.
    — Classify приголосні as дзвінкі, глухі, or сонорні.
    — Identify м'які та тверді приголосні and explain why.
    — Mark наголос in 8-10 words from the passage."
  - "Transcription exercises: learners produce фонетична транскрипція
    for 5 words of increasing complexity, applying rules from M01:
    яблуко → [йаблуко], воля → [вол'а], щастя → [шчас'т'а],
    об'їжджати → [обйіж:ати]. Error-check: learners find mistakes
    in provided transcriptions."
  - "Metalanguage definitions: match Ukrainian terms to their meanings:
    фонетика, графіка, орфоепія, фонема, наголос, транскрипція.
    Short-answer: explain the difference between звук and літера."
- section: "Блок 2: Морфологія та будова слова"
  words: 600
  points:
  - "Word structure analysis: learners break down 6-8 words into
    корінь, префікс, суфікс, закінчення, основа.
    Example words selected to test prefix/suffix identification:
    пришкільний (при-школ-н-ий), безхмарний (без-хмар-н-ий),
    перечитати (пере-чит-а-ти)."
  - "Частини мови identification: given a mixed list of 12-15 words,
    learners sort them into самостійні and службові частини мови,
    then identify specific parts of speech: іменник, прикметник,
    дієслово, прислівник, числівник, займенник, прийменник,
    сполучник, частка."
  - "Practical application: learners analyze a short Ukrainian sentence,
    identifying the частина мови and морфемна будова of each word."
- section: "Блок 3: Синтаксис та відмінки"
  words: 600
  points:
  - "Sentence analysis: learners identify члени речення (підмет, присудок,
    додаток, означення, обставина) in 4-5 Ukrainian sentences.
    Sentences designed to test: складні випадки (compound predicates,
    implied subjects, adverbial phrases)."
  - "Case identification and usage: given sentences with highlighted nouns,
    learners determine the відмінок and explain the grammatical role.
    Focus on cases that cause difficulty: родовий vs знахідний for
    animate masculines, місцевий vs давальний with прийменники."
  - "Simple vs compound sentence recognition: learners classify 6 sentences
    as просте or складне речення and identify conjunctions/connectors.
    Practice distinguishing складносурядне from складнопідрядне речення."
- section: "Блок 4: Часи дієслова — минулий, теперішній, майбутній"
  words: 700
  points:
  - "Tense identification: learners sort 15-20 verb forms into three
    columns: минулий час, теперішній час, майбутній час.
    Mixed forms including all three future types.
    Example verb forms: працюватимеш, крикнув, обробиш, упорядковую,
    ламатимуть, існувала, живете, буде шепотіти, перетворюватиме."
  - "Future tense mastery: for 6 verbs, learners produce all possible
    future forms (проста, складна, складена where applicable) and
    identify which are доконаний, which недоконаний.
    Test verbs: читати/прочитати, робити/зробити, бачити/побачити."
  - "Aspect in context: 6 sentences where learners must choose between
    доконаний and недоконаний вид based on whether the action is
    completed or ongoing. One sentence uses a двовидовий verb.
    Error correction: 4 sentences with incorrect aspect/tense usage."
  - "Conjugation exercise: full conjugation of one perfective verb
    (написати) and one imperfective verb (читати) across all persons
    and numbers in the future tense."
- section: "Блок 5: Людина i стосунки"
  words: 650
  points:
  - "Portrait vocabulary: given a literary portrait excerpt (100-150 words),
    learners identify and categorize портретна лексика:
    зовнішність (appearance words), характер (character words),
    художні засоби (artistic devices: епітети, порівняння)."
  - "Character description: learners choose the correct adjective from
    pairs of near-synonyms to complete descriptions:
    щирий/чесний, лагідний/ніжний, кремезний/товстий, стрункий/худий.
    Each pair tests precise semantic knowledge."
  - "Family and relationship vocabulary: fill-in exercises testing
    Ukrainian kinship terms (свекруха vs теща, зять vs невістка)
    and the стосунки/відносини/ставлення distinction."
  - "Introduction role-play: learners write a short dialogue (8-10 lines)
    where they introduce a friend to a colleague using formal register,
    applying кличний відмінок and appropriate formulas."
- section: "Підсумок та самооцінка"
  words: 450
  points:
  - "Integrated reading comprehension: a Ukrainian text (200-250 words)
    combining all tested topics — a narrative about meeting a person,
    describing them, and making future plans. Learners answer 5-6
    comprehension questions that require metalanguage, grammar, and
    vocabulary knowledge."
  - "Self-assessment checklist in Ukrainian:
    Фонетика: Чи можу я зробити фонетичну транскрипцію?
    Морфологія: Чи можу я розібрати слово за будовою?
    Синтаксис: Чи можу я визначити члени речення?
    Часи: Чи можу я правильно вживати три форми майбутнього часу?
    Вид: Чи розумію я різницю між доконаним i недоконаним видом?
    Опис: Чи можу я описати людину українською мовою?"
  - "Recommendations for review: if a learner scored below 70% on any
    block, return to the corresponding module. Phase 2 (Morphophonemics)
    builds directly on metalanguage from Phase 1."
  - "Preview of Phase 2: Чергування голосних (M08) —
    vowel alternations driven by наголос and word structure.
    Success in Phase 2 requires solid Phase 1 foundations."
vocabulary_hints:
  required:
  - "контрольна робота (test/assessment — formal evaluation of knowledge)"
  - "фонетика (phonetics — the study of speech sounds)"
  - "морфологія (morphology — the study of word forms)"
  - "синтаксис (syntax — the study of sentence structure)"
  - "вид дієслова (verbal aspect — perfective vs imperfective)"
  - "доконаний (perfective — completed action)"
  - "недоконаний (imperfective — ongoing action)"
  - "транскрипція (transcription — phonetic notation)"
  - "наголос (stress — emphasized syllable)"
  - "зовнішність (appearance)"
  - "характер (character — personality traits)"
  - "стосунки (relationships)"
  recommended:
  - "самооцінка (self-assessment)"
  - "повторення (review/revision)"
  - "завдання (task/exercise)"
  - "впевнено (confidently)"
  - "складний (difficult/complex)"
  - "виправити (to correct — finding errors)"
  - "проаналізувати (to analyze — breaking down language)"
  - "визначити (to determine/identify)"
  - "підсумок (summary/conclusion)"
  - "оцінювання (evaluation/grading)"
activity_hints:
- type: quiz
  focus: "Mixed metalanguage quiz: phonetic classification, morphological
    terms, aspect identification — questions drawn from all six modules."
  items: 10
- type: fill-in
  focus: "Conjugation and form completion: produce correct verb forms
    (past, present, future) and fill in missing words in descriptions."
  items: 8
- type: match-up
  focus: "Match Ukrainian linguistic terms to their definitions
    across all metalanguage categories (phonetics, morphology, syntax)."
  items: 10
- type: error-correction
  focus: "Find and correct errors in Ukrainian sentences: wrong aspect,
    incorrect transcription, misused descriptive vocabulary."
  items: 8
- type: group-sort
  focus: "Sort verb forms by tense (минулий/теперішній/майбутній) and
    by future form type (проста/складна/складена)."
  items: 12
- type: free-write
  focus: "Integrated writing task: describe a person you will meet next
    week, combining portrait vocabulary, character description, and future
    tense forms in a connected paragraph (10-12 sentences)."
  items: 6
