module: b1-025
level: B1
sequence: 25
slug: conditionals-unreal
version: '3.3'
title: "Умовний спосіб (нереальний)"
subtitle: "Якби-речення та контрфактичні умовні конструкції"
focus: grammar
pedagogy: PPP
phase: "B1.2 [Дієслова]"
word_target: 4000
objectives:
  - "Учень вміє утворювати нереальні умовні речення, використовуючи 'якби' + умовний спосіб в умовній частині та умовний спосіб у частині наслідку"
  - "Учень вміє розрізняти реальні умови ('якщо' + дійсний спосіб) від нереальних умов ('якби' + умовний спосіб) і правильно їх обирати залежно від значення"
  - "Учень вміє виражати контрфактичні твердження про теперішнє та минуле: Якби я знав, я б допоміг"
  - "Учень вміє використовувати нереальні умови для мрій, жалю та гіпотетичних міркувань як в усному, так і в письмовому українському мовленні"
  - "Учень вміє правильно вживати сполучник 'якби' та його варіанти ('коли б', 'як би'), включаючи порядок слів та розміщення часток"
dialogue_situations:
  - setting: 'Пізня розмова у Львівській кнайпі — мрії вголос: Якби я виграв лотерею, купив би хату в Карпатах. Якби я знав раніше, я б вивчив українську ще в школі. Якби ти був поетом, писав би вірші?'
    speakers:
      - Друзі за столом
    motivation: 'Нереальні умови: якби + минулий час + би з іменниками хата, школа, вірші'
content_outline:
  - section: "Реальне проти нереального: два типи умов"
    words: 700
    points:
      - "Контрастна пара з модуля №18: Реальна умова: Якщо пошукаєш у книгах мудрості, то знайдеш велику користь для душі своєї (Нестор) — дійсний спосіб, МОЖЕ статися. Нереальна умова: Якби я мав більше часу, я б прочитав цю книжку — умовний спосіб, КОНТРФАКТИЧНО (я не маю достатньо часу)."
      - "Ключовий маркер: 'якщо' сигналізує про реальну можливість, 'якби' сигналізує про нереальність або контрфактичність. Заболотний Grade 8 p.114: сполучники умови: якщо (якщо б), коли (коли б), як, якби, аби. Форми з 'б' (якщо б, коли б, якби) позначають ірреаліс."
      - "Візуальна схема для учнів: РЕАЛЬНО: Якщо + майбутній/теперішній → майбутній/теперішній. НЕРЕАЛЬНО: Якби + умовний → умовний. Ця логіка подібна до англійського 'if I have' проти 'if I had', але українська використовує спосіб, а не час."
  - section: "Утворення нереальних умовних речень"
    words: 750
    points:
      - "Структура: Якби + підмет + минулий час + б/би, підмет + минулий час + б/би. Якби я знав це раніше, я б вчинив інакше. Якби не дощ, Марина пішла б у перукарню (Заболотний Grade 7 p.75). Якби не вітер, рибалка попливла б. Зверніть увагу: 'якби' вже містить 'б', тому умовна частина часто пропускає друге 'б/би' після дієслова."
      - "Розміщення часток в обох частинах (Литвінова Grade 7 p.62): Коли б я його побачив, я, звичайно, не став би грати, бо при ньому я соромився (Л. Смілянський). Частка 'б/би' може стояти після будь-якого повнозначного слова: Якби я був чародієм, то хмаронько б тебе я напоїв (Лермонтов/ukr)."
      - "Варіанти сполучників: якби, коли б, як би. Якби я міг (але не можу). Коли б мали нагоду (але не маємо). Як би не перешкода. Аби: трохи відрізняється — виражає мету/мінімальну умову: Аби я був чародієм (за Заболотним Grade 8 p.114)."
      - "Вид у нереальних умовах: Можливий як доконаний, так і недоконаний вид, з відмінностями у значенні: Якби я читав цю книжку (недок. — процес, тривала гіпотеза), Якби я прочитав цю книжку (док. — завершений гіпотетичний результат). Вибір підпорядковується тій самій логіці виду, що й скрізь в українській мові."
  - section: "Нереальні умови: теперішнє і минуле"
    words: 700
    points:
      - "Теперішнє контрфактичне (суперечить поточній реальності): Якби я жив у Києві, ходив би на Хрещатик щодня. (Але я не живу в Києві.) Якби я знав українську досконало, читав би Франка в оригіналі. (Але я ще не знаю її досконало.) Зверніть увагу: українська мова використовує ту саму форму для теперішнього і минулого контрфактичного — контекст усуває неоднозначність."
      - "Минуле контрфактичне (суперечить минулій реальності): Якби я тоді послухав батьків, все було б інакше. (Але я їх не послухав.) Якби ми вийшли раніше, встигли б на потяг. (Але ми не вийшли раніше і запізнилися на потяг.) Прислівники типу 'тоді', 'раніше', 'вчора' допомагають вказати на минуле."
      - "Мрії та фантазії (не обов'язково контрфактичні): Якби я міг подорожувати в часі... Якби я виграв мільйон... Вони гіпотетичні, а не контрфактичні. Українська мова розглядає їх ідентично: якби + умовний спосіб."
  - section: "Якби у повсякденному мовленні"
    words: 750
    points:
      - "Поширені сталі вирази з 'якби': Якби не... (усунення причини): Якби не ти, я б не впорався. Якби не дощ, ми б пішли. Якби я знав/знала! Якби ж то! / Якби ж бо! (вираження бажання)."
      - "Діалог: двоє друзів обговорюють втрачену можливість. Природне поєднання 'якби' з емоційним вираженням: — Шкода, що ми не поїхали на фестиваль. — Так, якби я знав раніше, обов'язково б купив квитки. — Якби не робота, я б теж поїхала. — Нічого, якщо наступного року буде, поїдемо разом."
      - "Контраст у діалозі: останній рядок переходить від 'якби' (нереально) до 'якщо' (реально) — мовець змінює жаль за минулим на надію на майбутнє. Учні визначають цю зміну."
      - "Прислів'я та приказки з 'якби': Якби знав, де впадеш, — соломки б підстелив. Якби та якби — в роті виростуть гриби. Вони ілюструють культурну присутність контрфактичного мислення."
  - section: "Комплексні вправи"
    words: 700
    points:
      - "Вправа 1 — Класифікація: учні читають 10 умовних речень і класифікують кожне як реальна (якщо) або нереальна (якби) умова. Змішані приклади, деякі з підступом: Якщо б я міг... — це реальне чи нереальне? (Це нереальне: якщо б = якби за значенням.)"
      - "Вправа 2 — Трансформація: маючи реальну умову, перепишіть її як нереальну. Якщо матиму час, поїду → Якби я мав час, поїхав би. Якщо вивчу граматику, складу іспит → Якби я вивчив граматику, склав би іспит. 6-8 пар для практики."
      - "Вправа 3 — Завершити речення: до поданих якби-частин написати логічні наслідки. Якби я жив у XVII столітті... (творчо). Якби я був президентом... Якби я знав п'ять мов..."
      - "Читання: есе українського студента про мрії. Екстенсивно використовує 'якби'. Запитання на розуміння перевіряють граматику: знайти всі форми умовного способу, знайти частки 'б/би', визначити, які умови є контрфактичними для теперішнього, а які для минулого."
  - section: "Підсумок та перехід до модуля №20"
    words: 400
    points:
      - "Підсумок: реальна проти нереальної умови, утворення нереальних умовних речень (якби + умовний), контрфактичність теперішня і минула, 'якби' у повсякденному мовленні. Самоперевірка: Я можу розрізнити 'якщо' і 'якби' ✓/✗, Я можу утворити нереальну умову ✓/✗, Я можу висловити жаль за допомогою 'якби' ✓/✗."
      - "Попередній огляд: модуль №20 — Наказовий спосіб (деталі). Третій спосіб. Учні вже знають базові наказові форми з рівня A2. модуль №20 додає хай/нехай (команди для 3-ї особи), ввічливі форми наказового способу та взаємодію між доконаним/недоконаним видом у наказах."
vocabulary_hints:
  required:
    - "якби (if — conjunction for unreal conditions, contains б)"
    - "нереальний (unreal — condition contrary to fact)"
    - "нереальна умова (unreal condition)"
    - "жаль (regret, pity — Якби я знав, якщо шкода)"
    - "шкода (a pity — Шкода, що ми не поїхали)"
    - "впоратися (to cope, manage — Якби не ти, я б не впорався)"
    - "інакше (otherwise, differently)"
    - "тоді (then — signals past reference in counterfactuals)"
    - "обов'язково (definitely, certainly)"
    - "знав/знала (knew — base form for common counterfactual)"
    - "міг/могла (could — base form for hypotheticals)"
    - "нагода (opportunity, occasion)"
    - "перешкода (obstacle, hindrance)"
    - "фестиваль (festival)"
  recommended:
    - "аби (in order to / if only — variant conditional conjunction)"
    - "соломка (little straw — from the прислів'я)"
    - "підстелити (to spread underneath — from the прислів'я)"
    - "прислів'я (proverb)"
    - "мрія (dream — a wish for the future)"
    - "фантазія (fantasy, imagination)"
    - "століття (century)"
    - "досконало (perfectly, thoroughly)"
    - "впасти (to fall — Якби знав, де впадеш)"
    - "квиток (ticket)"
activity_hints:
  - type: quiz
    focus: 'Класифікуйте умовні речення як реальні (якщо) або нереальні (якби)'
    items: 10
  - type: fill-in
    focus: 'Доповніть речення з "якби" правильною формою умовного способу (рід, число, б/би)'
    items: 8
  - type: sentence-builder
    focus: 'Перетворіть реальні умовні речення (якщо + дійсний) на нереальні (якби + умовний)'
    items: 8
  - type: match-up
    focus: 'З''єднайте якби-частини з їх логічними наслідками'
    items: 8
  - type: error-correction
    focus: 'Виправте помилки: неправильний сполучник (якщо замість якби), неправильний спосіб, правопис часток'
    items: 6
connects_to:
  - "b1-018 (Умовний спосіб реальний — реальні умови, утворення умовного способу)"
  - "b1-020 (Наказовий спосіб деталі — завершення системи трьох способів)"
  - "b1-070 (Речення умови — складні підрядні речення умови, Фаза 8)"
prerequisites:
  - "b1-018 (Реальні умови — утворення умовного способу та якщо-речень)"
grammar:
  - "Нереальна умова: якби + умовний спосіб... (то) + умовний спосіб"
  - "Якби проти якщо: розрізнення ірреалісу від реалісу"
  - "Варіанти сполучників: якби, коли б, як би, аби"
  - "Теперішнє контрфактичне проти минулого контрфактичного (однакова форма, контекст усуває неоднозначність)"
  - "Вибір виду в нереальних умовах: доконаний проти недоконаного"
  - "Сталі вирази: якби не..., якби ж то!, якби я знав/знала"
register: академічний
references:
  - title: "Заболотний Grade 7, p.72-75"
    notes: "Таблиця способів дієслів; утворення умовного способу; вправи на 'якби', зокрема: Якби не дощ, Марина пішла б у перукарню."
  - title: "Литвінова Grade 7, p.61-62"
    notes: "Визначення умовного способу; утворення з часткою б/би; літературний приклад із 'коли б' (Л. Смілянський)."
  - title: "Авраменко Grade 7, p.77, 83"
    notes: "Умовний і наказовий способи не мають часових форм; правило милозвучності для б/би; вправи на утворення із сортуванням у три стовпчики."
  - title: "Заболотний Grade 8, p.114"
    notes: "Складнопідрядне речення умови: сполучники якщо, якби, коли б, аби; співвідносне слово 'то'; цитата Липинського."
  - title: "Заболотний Grade 7, p.185"
    notes: "Огляд способів дієслів: умовний = дія, можлива за певних умов, або бажана."
