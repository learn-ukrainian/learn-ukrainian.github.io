grammar:
- "Нереальна умова: якби + умовний спосіб... (то) + умовний спосіб"
- "Якби vs якщо: irrealis vs realis distinction"
- "Variant conjunctions: якби, коли б, як би, аби"
- "Present counterfactual vs past counterfactual (same form, context disambiguates)"
- "Aspect choice in unreal conditionals: доконаний vs недоконаний"
- "Fixed expressions: якби не..., якби ж то!, якби я знав/знала"
register: академічний
references:
- title: "Заболотний Grade 7, p.72-75"
  notes: "Способи дієслів table; умовний спосіб formation; якби exercises
    including: Якби не дощ, Марина пішла б у перукарню."
- title: "Литвінова Grade 7, p.61-62"
  notes: "Умовний спосіб definition; particle б/би formation; literary example
    with коли б (Л. Смілянський)."
- title: "Авраменко Grade 7, p.77, 83"
  notes: "Умовний and наказовий have no часові форми; б/би euphony rule;
    formation exercises with three-column sorting."
- title: "Заболотний Grade 9, p.114"
  notes: "Складнопідрядне речення умови: сполучники якщо, якби, коли б, аби;
    співвідносне слово то; Липинський quote."
- title: "Караман Grade 10, p.185"
  notes: "Способи дієслів overview: умовний = дія, можлива за певних умов,
    або бажана."
