module: b1-059
level: B1
sequence: 59
slug: places-and-locations
version: '1.0.2'
title: 'Місця і розташування'
subtitle: 'Географічна лексика, описи міст і країн, відмінки для місця та походження'
focus: thematic-vocabulary
pedagogy: TTT
phase: 'B1.5 [Нюанси відмінків та прийменники]'
word_target: 4000
objectives:
  - 'Учень вміє описувати географічні об''єкти та пам''ятки, використовуючи точну українську лексику: місцевість, околиця, передмістя, набережна, узбережжя, заповідник'
  - 'Учень вміє правильно вживати місцевий відмінок для позначення місця (у/в + місцевий відмінок): у Києві, в Одесі, на Хрещатику, у заповіднику, на площі'
  - 'Учень вміє вживати родовий відмінок для позначення походження та напрямку (з/із + родовий): з Харкова, з України, із Закарпаття'
  - 'Учень вміє написати структурований опис міста чи регіону (5-8 речень), використовуючи відповідні відмінкові форми, прийменники та географічну лексику'
dialogue_situations:
  - setting: 'Туристичний інформаційний центр у Чернівцях — відвідувачка запитує, що подивитися: Що варто відвідати (pf) у Чернівцях (loc)? — Обов''язково побувайте (pf) на площі Філармонії. А ще раджу (impf) прогулятися (pf) набережною Прута.'
    speakers:
      - Туристка
      - Працівник інформаційного центру
    motivation: 'Місцевий відмінок для позначення місця (у Чернівцях, на площі), орудний для маршруту (набережною), родовий для назв об''єктів (Прута). Наказовий спосіб доконаного виду для конкретних рекомендацій.'
  - setting: 'Двоє друзів порівнюють свої рідні міста: Я з Полтави. У нас рівнина, широкі поля. А ти звідки? — Із Закарпаття. Там гори (pl), ліси, і повітря чудове.'
    speakers:
      - Олена
      - Василь
    motivation: 'Родовий відмінок для позначення походження (з Полтави, із Закарпаття). Географічна лексика: рівнина, гори. Природне порівняння регіонів.'
content_outline:
  - section: 'Географічна лексика: рельєф і ландшафт'
    words: 1000
    points:
      - 'Рельєф і ландшафти — систематична лексика (на основі тематичного групування за Заболотним 5 клас, с.69): рівнина, височина, низовина, гора (множина — гори), пагорб, долина, яр, степ. Специфічне для України: Карпати, Кримські гори, Подільська височина.'
      - 'Водні об''єкти: річка, озеро, море, узбережжя, набережна, острів, півострів. Українські річки: Дніпро, Дністер, Південний Буг, Десна. Озера: Світязь, Синевир.'
      - 'Населені пункти та міські об''єкти: місто, село, містечко, передмістя (невідм. pl), околиця, район, площа, вулиця, провулок, набережна.'
      - 'Природа та природоохоронні території: заповідник, національний парк, ліс, парк, сад, краєвид, пам''ятка (архітектурна пам''ятка, природна пам''ятка). Практика: учні розподіляють лексику за категоріями: рельєф, водойми, поселення, природа.'
  - section: 'Місцевий відмінок: де?'
    words: 1000
    points:
      - 'Місцевий відмінок для розташування (Заболотний 6 клас, с.55): Місцевий відмінок відповідає на питання де? і ЗАВЖДИ вживається з прийменником. Два основні прийменники: у/в та на. Правило для міст: у Києві, у Львові, в Одесі, у Харкові, в Ужгороді. Але: на Хрещатику (вулиці з конкретними назвами приймають на).'
      - 'У vs на для географічних об''єктів — правила та закономірності: у + закритий простір: у місті, у селі, у парку, у заповіднику, у долині. на + відкритий простір, поверхні, події: на площі, на вулиці, на узбережжі, на острові, на горі, на рівнині. Особливість: на Україні — це НЕПРАВИЛЬНО (стара форма "на Україні" була русифікованим колоніальним варіантом; сучасний стандарт: в Україні).'
      - 'Огляд закінчень місцевого відмінка в географічному контексті: Чоловічий рід: -і/-ї (у Києві, у заповіднику, на острові). Виняток: -у в деяких словах (на лугу). Жіночий рід: -і (у долині, на площі, в Одесі, на вулиці). Середній рід: -і (у місті, у селі, на морі, на узбережжі). Множина: -ах/-ях (у Карпатах, у горах, на вулицях).'
      - 'Практика: учні описують розташування об''єктів, використовуючи місцевий відмінок. Софійський собор — у Києві, на Софійській площі. Синевир — у Карпатах, на Міжгірщині. Потьомкінські сходи — в Одесі, на узбережжі.'
  - section: 'Родовий відмінок: звідки? і куди?'
    words: 1000
    points:
      - 'Родовий відмінок для походження — з/із + родовий відмінок (Заболотний 6 клас, с.47): з Києва, зі Львова, з Одеси, з Харкова, із Закарпаття, з України. Запитання: звідки?'
      - 'Родовий відмінок у географічних описах — приналежність і зв''язок: центр міста, узбережжя моря, долина Дністра, вершина гори, набережна Дніпра.'
      - 'Напрямок — до + родовий відмінок vs у/на + знахідний відмінок: до Києва / у Київ (до підкреслює напрямок, у/на підкреслює кінцевий пункт призначення). до моря / на море. до лісу / у ліс. Обидва варіанти правильні; відрізняється регістр і акцент. Практика: Ми їдемо до Львова. = Ми їдемо у Львів.'
      - 'Практика: учні пишуть про власне походження та описують українське місто, використовуючи конструкції з родовим відмінком. Я з [місто, gen]. Це місто на березі [річка, gen]. У центрі [місто, gen] є [пам''ятка].'
  - section: 'Підсумок: описуємо місця'
    words: 1000
    points:
      - 'Модель опису міста — структурований текст про українське місто (за зразком із Заболотного 7 клас, с.248): Зачин (де це знаходиться, короткий вступ). Основна частина: географія (на березі чого?), пам''ятки (що варто побачити?), атмосфера (яке це місто?). Кінцівка (чому варто відвідати?). Приклад: Чернівці — місто на Буковині, у передгір''ї Карпат...'
      - 'Зведена таблиця відмінків для географічних назв: Київ — у Києві (loc), з Києва (gen), до Києва (gen), у Київ (acc). Одеса — в Одесі (loc), з Одеси (gen), до Одеси (gen), в Одесу (acc). Карпати — у Карпатах, з Карпат (gen pl), до Карпат (gen pl). Закарпаття — на Закарпатті (loc), із Закарпаття (gen).'
      - 'Підсумковий словник за категоріями: рельєф (рівнина, височина, низовина, гора, долина), водойми (річка, озеро, море, узбережжя), поселення (місто, село, передмістя, околиця), міські об''єкти (площа, вулиця, провулок, набережна), природа (заповідник, ліс, парк, краєвид, пам''ятка).'
      - 'Самоперевірка: 1. Опишіть місто, де ви живете (або хочете відвідати), — 5-8 речень, використовуючи місцевий і родовий відмінки. 2. Поясніть різницю: «у Києві» vs «на Хрещатику». 3. Назвіть 5 географічних об''єктів України і скажіть, де вони розташовані. 4. Яка різниця: «до Києва» і «у Київ»?'
vocabulary_hints:
  required:
    - "місцевість (locality/area — a geographic area)"
    - "околиця (outskirts — the edge of a settlement)"
    - "передмістя (suburb — area around a city, невідм. pl)"
    - "площа (square — public urban space)"
    - "набережна (embankment/waterfront — street along a river)"
    - "узбережжя (coast/shoreline — land along the sea)"
    - "заповідник (nature reserve — protected natural area)"
    - "краєвид (landscape/view — scenery)"
    - "пам'ятка (landmark/monument — notable place or structure)"
    - "рівнина (plain — flat terrain)"
    - "височина (highland/upland — elevated terrain)"
    - "острів (island — land surrounded by water)"
    - "провулок (lane/alley — small street)"
    - "розташування (location — where something is situated)"
    - "орієнтир (landmark/reference point — for navigation)"
  recommended:
    - "низовина (lowland — low-lying terrain)"
    - "півострів (peninsula — land surrounded by water on three sides)"
    - "гірський (mountainous — adjective from гора)"
    - "долина (valley — low area between mountains)"
    - "містечко (small town — diminutive of місто)"
    - "район (district — administrative area)"
    - "берег (bank/shore — edge of water)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про географічну лексику (рельєф і ландшафт) і дайте відповіді на запитання'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Місцевий відмінок: де?»'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему географічна лексика: рельєф і ландшафт'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему місцевий відмінок: де?'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Географічна лексика: рельєф і ландшафт»'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Місцевий відмінок: де?» з їхніми визначеннями'
connects_to:
  - 'b1-054 (Нюанси родового відмінка — розширення функцій родового відмінка)'
  - 'b1-056 (Повторення просторових прийменників — оновлення знань просторових прийменників)'
  - 'b1-058 (Часові прийменники — порівняння часових та просторових прийменників)'
  - 'b1-063 (Контрольна робота з відмінків — перевірка вживання відмінків, включно з місцями)'
  - 'b1-039 (Подорожі Україною — ситуації в подорожах, що використовують цю лексику)'
prerequisites:
  - 'Завершення рівня A2 (базові форми відмінків, прийменники у/в/на)'
  - 'Від b1-054 до b1-058 (нюанси відмінків та повторення прийменників)'
grammar:
  - 'Місцевий відмінок з прийменниками у/в і на для місця: у Києві, на площі'
  - 'Родовий відмінок з прийменником з/із для походження: з Одеси, із Закарпаття'
  - 'Родовий відмінок для географічних описів: узбережжя моря, центр міста'
  - 'Напрямок: до + gen vs у/на + acc: до Києва vs у Київ'
  - 'У/в vs на для географічних назв: у місті, на острові, в Україні'
register: розмовний / науково-навчальний
references:
  - title: "Заболотний Grade 6, p.47-55"
    notes: 'Відмінювання іменників: родовий і місцевий відмінки — закінчення, функції, вживання з прийменниками.'
  - title: "Заболотний Grade 7, p.248"
    notes: 'Опис місця: композиційна структура (зачин, основна частина, кінцівка), мовні засоби.'
  - title: "Заболотний Grade 5, p.69"
    notes: 'Тематичні групи слів: організація лексики за семантичними полями.'
  - title: "Литвінова Grade 6, p.193"
    notes: 'Прийменники місця: у/в, на — правила вживання з відмінками.'
