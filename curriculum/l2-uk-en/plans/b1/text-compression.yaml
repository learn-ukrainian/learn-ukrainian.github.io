references:
  - title: "Заболотний Grade 6, p.71-72"
    notes: "Складноскорочені слова: definition, types, абревіатура as a subtype. Exercises
      on creating abbreviated forms from словосполучення."
  - title: "Голуб Grade 6, p.52-53"
    notes: "Абревіація: what it is, how it works, essential Ukrainian абревіатури
      (ЗСУ, ЗЗСО, ООН, МВФ, ТЮГ, ЦНАП, ЗМІ, СБУ, ПАРЄ). Formation exercises."
  - title: "Глазова Grade 10, p.143"
    notes: "Правила графічних скорочень слів: усічення, відкидання внутрішньої частини,
      позначення дефісом. Одиниці виміру."
  - title: "Авраменко Grade 10, p.148"
    notes: "Написання ні з різними частинами мови — includes абревіатури context for
      заперечні займенники."
