  - "b1-052 (numerals-declension — number agreement rules)"
  - "b1-053 (numerals-agreement — числівник-іменник agreement)"
grammar:
  - "Абревіація: types of abbreviated word formation in Ukrainian"
  - "Граматичний рід абревіатур determined by головне слово"
  - "Відмінювання абревіатур: which decline, which do not"
