module: b1-096
level: B1
sequence: 96
slug: interviu-ta-podkasty
version: '2.0'
title: Інтерв'ю та подкасти
subtitle: Interviews & Podcasts — Introduction to Listening
focus: skills
pedagogy: CBI
phase: B1.8 [Skills & Integration]
word_target: 4000
objectives:
- Learner can apply listening strategies to authentic Ukrainian interviews and podcasts
- Learner can identify main points and key information in spoken discourse
- Learner can take effective notes while listening to Ukrainian audio content
- Learner is prepared for autonomous listening practice at B2
content_outline:
- section: 'Вступ: Феномен українського аудіопростору (Introduction: The Ukrainian Audio Phenomenon)'
  words: 600
  points:
  - 'Українські подкасти після 2022 року як інструмент культурного опору та рефлексії: огляд проектів «The Ukrainians» (історії
    успіху та соціальні зміни) та «Культ: Подкаст» (інтелектуальна деколонізація).'
  - 'Роль подкастів у самоідентифікації: перехід від розваг до глибокого обговорення суспільно-політичних та культурних тем
    як засіб формування сучасної української агентності.'
  - 'Вимоги Держстандарту (§1.1.2.1.3): здатність розуміти публіцистичні аудіотексти про повсякденне життя, суспільні події
    та результати опитувань.'
- section: Стратегії активного слухання (Active Listening Strategies)
  words: 1000
  points:
  - 'Чотири етапи циклу активного слухання: передбачення (prediction на основі назви випуску) → слухання (первинне сприйняття)
    → нотатки (фіксація фактів) → підсумок (summarization головної ідеї).'
  - 'Стратегія ''Глобального розуміння'' (Global Understanding) проти дослівного перекладу: як не панікувати через пропущене
    слово та фокусуватися на ''великій картині'' (big picture) і ключових концептах.'
  - 'Робота з дискурсивними маркерами як «дорожніми знаками»: аналіз функцій слів «власне» (clarification), «до речі» (digression),
    «отже» (conclusion); learner error: ігнорування маркерів як «інформаційного шуму».'
  - 'Аналіз регістрів у подкастах: розрізнення літературної мови ведучого (як еталона для наслідування) та часто спонтанної,
    іноді маркованої суржиком мови гостей; стратегія розпізнавання мовної норми в автентичному потоці.'
- section: Практичний аналіз інтерв'ю (Practical Interview Analysis)
  words: 1200
  points:
  - 'Аналіз структури інтерв''ю: вступ (представлення гостя), основна частина (тематичні блоки), бліц-опитування та підсумки;
    вивчення кліше для переходу між темами.'
  - 'Робота з автентичними уривками про суспільні події: розпізнавання думок, фактів та емоційного забарвлення мовлення співрозмовників;
    фокус на темпі та інтонаційних акцентах.'
  - 'Типові помилки учнів при сприйнятті на слух: спроба перекласти кожне слово (word-for-word translation) замість виділення
    опорних слів (keywords); вправи на подолання мовного бар''єру через контекстуальне вгадування.'
- section: 'Продукція: Створення власного резюме (Production: Creating a Summary)'
  words: 800
  points:
  - 'Мета-завдання: Складання плану-конспекту або стислого резюме (summary) прослуханого подкасту з використанням вивчених
    стратегій та маркерів зв''язності.'
  - 'Практичні поради (Practical Tips): де шукати якісний український контент залежно від зацікавлень (Spotify, YouTube, Apple
    Podcasts) та як перетворити пасивне слухання на активне навчання.'
  - 'Самооцінка прогресу: чек-лист навичок слухання від розуміння загальної теми до вихоплення специфічних деталей та ідентифікації
    ставлення мовця до проблеми.'
- section: 'Підсумок: Слухай щодня (Conclusion: Listen Daily)'
  words: 400
  points:
  - Рефлексія над розвитком навички від B1 (структуровані тексти) до B2 (готовність до швидкого темпу, різних акцентів та
    абстрактних тем).
  - 'Фінальна порада: регулярність як ключ до успіху — рекомендація підписатися на свіжі випуски «Громадського» або «Подкаст
    Підкаст» для постійного занурення в живе мовне середовище.'
vocabulary_hints:
  required:
  - інтерв'ю (interview) — брати інтерв'ю (to interview), давати інтерв'ю (to give an interview), ексклюзивне інтерв'ю; High
    frequency media term
  - подкаст (podcast) — слухати подкаст, записувати подкаст, випуск подкасту, підписатися на подкаст; Modern media staple
  - ведучий / ведуча (host) — ведучий програми, телеведучий, радіоведучий, питання від ведучого; Refers to the standard language
    model
  - гість / гостя (guest) — запрошений гість, спеціальний гість, гість студії; Often represents more colloquial register
  - 'випуск (episode) — новий випуск, свіжий випуск, спецвипуск; Common collocation: ''новий випуск подкасту'''
  - посилання (link) — посилання в описі (link in description), активне посилання; Essential for digital content consumption
  - слухати (to listen) — активне слухання (active listening strategy); Distinguish from 'чути' (to hear)
  recommended:
  - нотатки (notes) — робити нотатки під час слухання; Crucial for B1-B2 listening strategies
  - власне (actually/properly speaking) — discourse marker for clarification or emphasis
  - до речі (by the way) — discourse marker used to introduce a related but tangential point
  - отже (so/therefore) — discourse marker used for summarizing or concluding a thought
  - обговорення (discussion) — живе обговорення, дискусія в студії; High frequency in media contexts
  - тема (topic) — тема випуску, обговорення теми; Central point of a podcast or interview
