register: розмовний
references:
- title: "CEFR B1 global descriptor"
  notes: "Can understand the main points of clear standard input on familiar
    matters regularly encountered in work, school, leisure. Can deal with
    most situations likely to arise while travelling. Can produce simple
    connected text on topics which are familiar or of personal interest.
    Can describe experiences, events, dreams, and ambitions."
- title: "All B1 module references"
  notes: "The capstone project draws on all 91 B1 modules."
