module: b1-060
level: B1
sequence: 60
slug: cases-with-ordinal-numerals
version: '3.2'
title: "Порядкові числівники і відмінки"
subtitle: "Відмінювання порядкових числівників, дати, час, поверхи"
focus: grammar
pedagogy: PPP
phase: "B1.5 [Нюанси відмінків та прийменники]"
word_target: 4000
objectives:
  - "Учень вміє відмінювати порядкові числівники як прикметники (перший-першого-першому) та правильно узгоджувати їх з іменниками в роді, числі та відмінку"
  - "Учень вміє вживати порядкові числівники в датах: Р.в. для подій (п'ятнадцятого березня), Н.в. для називання дати (сьогодні п'ятнадцяте березня)"
  - "Учень вміє вживати порядкові числівники для позначення часу: о третій годині, за десять хвилин четверта, о пів на п'яту"
  - "Учень вміє вживати порядкові числівники в повсякденних ситуаціях: поверхи (на третьому поверсі), порядок (перший раз, другий раз), століття (у двадцять першому столітті)"
  - "Учень вміє відмінювати складені порядкові числівники, де змінюється лише останнє слово (двісті двадцять п'ята — двісті двадцять п'ятої)"
dialogue_situations:
  - setting: 'Купівля квитків на поїзд на Київському вокзалі — уточнення дати та платформи: Квиток (m, ticket) на п''яте березня. З першого вагона (m, car). Третій перон (m, platform). На другому поверсі (m, floor) — каса (f, ticket office).'
    speakers:
      - Пасажир
      - Касир
    motivation: 'Порядкові числівники у відмінках: п''яте березня(Зн.в.), першого вагона(Р.в.), третій перон(Н.в.)'
content_outline:
  - section: "Відмінювання порядкових числівників"
    words: 800
    points:
      - "За Литвіновою (Grade 6 p.237): Порядкові числівники відмінюються як прикметники. Твердий тип: перший, другий, четвертий, п'ятий, шостий... М'який тип: третій, третя, третє, треті. Повна парадигма для 'перший' (ч/ж/с/мн) та 'третій' (ч/ж/с/мн)."
      - "Узгодження: порядковий числівник + іменник мають узгоджуватися в роді, числі, відмінку. перший урок (ч. Н.в.), першу книжку (ж. Зн.в.), першого вересня (с. Р.в.), перших учнів (мн. Р.в.). Практика: провідміняти 'п'ятий клас' за всіма 7 відмінками."
      - "Складені порядкові числівники (Заболотний Grade 6 p.179): ТІЛЬКИ останнє слово відмінюється: двадцять третій день → двадцять третього дня → двадцять третьому дню. Практика: провідміняти 'сто п'ятнадцята сторінка' за всіма відмінками."
      - "Наголос: перший (сталий наголос), другий (сталий), третій (сталий, але м'яка група відмінювання), сьомий (сталий), десятий (сталий). Усі порядкові числівники мають сталий наголос на одному й тому ж складі впродовж усього відмінювання, на відміну від деяких кількісних числівників. Це полегшує запам'ятовування: якщо ви знаєте наголос у називному відмінку, він залишається таким самим."
  - section: "Дати"
    words: 800
    points:
      - "Як сказати 'сьогодні...': Сьогодні + порядковий числівник у Н.в. + місяць у Р.в.: Сьогодні п'яте березня. Сьогодні тридцять перше грудня. Зверніть увагу: порядковий числівник СЕРЕДНЬОГО роду (мається на увазі іменник 'число')."
      - "Як сказати 'якого числа...': порядковий числівник у Р.в. + місяць у Р.в.: п'ятого березня, тридцять першого грудня. Він народився п'ятнадцятого вересня тисяча дев'ятсот дев'яностого року. Рік: тисяча дев'ятсот дев'яностого року (відмінюється лише останнє слово)."
      - "Написання дат цифрами: 15 березня 2024 року. З нарощенням: 15-го березня, 1-ша сторінка, 5-й клас. Але дати в календарному форматі: 15.03.2024 (без нарощення). Правила вживання дефіса: суфікс порядкового числівника приєднується через дефіс після цифр (5-й, 10-та, 3-тє), але НЕ після римських цифр: ХХІ століття (без дефіса)."
      - "Практика: прочитати і записати 10 дат повністю словами українською мовою. Включити історичні дати: 24 серпня 1991 року (двадцять четвертого серпня тисяча дев'ятсот дев'яносто першого року), дні народження та майбутні події."
  - section: "Час"
    words: 700
    points:
      - "За Авраменком (Grade 11 p.42): Повні години: о першій годині, о другій, о третій, о п'ятій. Зверніть увагу: 'годині' в М.в. (о + М.в.). Половини: о пів на п'яту (half past four — дослівно 'половина до п'ятої')."
      - "Хвилини після години: десять хвилин на п'яту (4:10). Хвилини до години: за десять хвилин п'ята (4:50). НЕ *без десяти п'ять (русизм). Правильно: за десять хвилин п'ята або чотири п'ятдесят."
      - "Офіційний та розмовний час: Офіційний: п'ятнадцять хвилин на четверту (3:15). Розмовний: три п'ятнадцять. Обидва правильні; в офіційному вживаються порядкові числівники, в розмовному — кількісні. На письмі цифровий формат (15:30) не використовує порядкових."
      - "Практика: висловити час українською мовою: 3:15, 7:30, 11:45, 1:20, 9:55, 12:00, 6:05. Навести як офіційну (з порядковими), так і розмовну (з кількісними) версії. Потім відповісти на запитання 'Котра година?' для кожної."
  - section: "Поверхи, номери, порядок"
    words: 600
    points:
      - "Поверхи: на першому поверсі (М.в.), з другого поверху (Р.в.), на п'ятий поверх (Зн.в. — напрямок). Маршрути: автобус номер сьомий, тролейбус п'ятнадцятий. Адреси: будинок третій, квартира п'ята, кабінет двісті десятий."
      - "Порядок: перший раз, вдруге (прислівник), утретє, вчетверте. В першу чергу. Століття: у двадцять першому столітті (М.в.), двадцяте століття (Н.в.). По-перше, по-друге, по-третє (прислівники для перерахування)."
      - "Порядкові числівники в назвах документів та офіційних контекстах: стаття перша, пункт третій, параграф п'ятий, розділ восьмий. За Авраменком (Grade 7 p.63): вживання числівників в офіційно-діловому стилі."
      - "Практика: описати свій будинок (на якому поверсі), пояснити дорогу (сісти на автобус номер Х), обговорити історичні періоди (у Y столітті), цитувати статті документів."
  - section: "Порядкові числівники в контексті"
    words: 700
    points:
      - "Читання: розклад або запрошення, що містить багато дат, часу, номерів поверхів та порядкових числівників. Учні вилучають інформацію і дають відповіді на запитання, які вимагають правильного відмінювання. 'Зустріч відбудеться п'ятнадцятого березня о третій годині на четвертому поверсі, у кімнаті двісті двадцять п'ятій.'"
      - "Діалог: призначення зустрічі — узгодження дати, часу, місця. 'Коли вам зручно? Може, двадцять першого? О котрій годині? О пів на другу? Добре, на якому поверсі ваш офіс?'"
      - "Самоперевірка: дати визначних історичних подій України: 24 серпня 1991 (День Незалежності), 28 червня 1996 (Конституція). Записати повністю словами у правильних відмінках."
  - section: "Підсумок"
    words: 400
    points:
      - "Ключові патерни: порядкові числівники відмінюються як прикметники; складені порядкові — відмінюється лише останнє слово; дати в Р.в.; позначення часу використовує порядкові в М.в.; НЕ *без десяти → за десять хвилин."
      - "Самоперевірка: 1. Провідміняти 'двадцять п'ятий' за всіма відмінками. 2. Записати сьогоднішню дату повністю словами (як для події, так і для 'сьогодні...'). 3. Назвати час 3:15, 7:30, 11:45 українською. 4. Сказати свою адресу із зазначенням поверху та квартири. 5. Назвати три століття в М.в. (у ... столітті)."
      - "Попередній огляд: кількісні вирази — узгодження кількісних слів з іменниками."
vocabulary_hints:
  required:
    - "порядковий числівник (ordinal numeral — перший, другий, третій)"
    - "дата (date — uses ordinal in Р.в.)"
    - "котра година (what time is it)"
    - "поверх (floor/storey)"
    - "століття (century)"
    - "половина (half — о пів на п'яту)"
    - "хвилина (minute)"
    - "рік (year — року in Р.в.)"
  recommended:
    - "складений числівник (compound numeral — двадцять п'ятий)"
    - "вдруге (for the second time — adverb)"
    - "утретє (for the third time — adverb)"
    - "в першу чергу (first of all)"
    - "двадцять перше століття (twenty-first century)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про відмінювання порядкових числівників і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Дати».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему відмінювання порядкових числівників.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему дати.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Відмінювання порядкових числівників».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Дати» з їхніми визначеннями.'
