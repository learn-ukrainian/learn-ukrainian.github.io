module: b1-086
level: B1
sequence: 86
slug: practice-exam-writing
version: '3.1'
title: "Екзамен (Письмо і Говоріння)"
subtitle: "Пробний екзамен B1 — продуктивні навички"
focus: review
pedagogy: PPP
phase: "B1.9 [Synthesis & Graduation]"
word_target: 4000
objectives:
  - "Learner can write a structured Ukrainian text of 200+ words on a familiar topic
    (розповідь, опис, есе-міркування) with correct grammar and vocabulary"
  - "Learner can compose a formal Ukrainian document (заява, лист, оголошення) following
    офіційно-діловий стиль conventions"
  - "Learner can produce a sustained monologue in Ukrainian (2-3 minutes) on a familiar
    topic, demonstrating B1 fluency and grammatical range"
  - "Learner can participate in a Ukrainian dialogue on a given topic, responding
    naturally to questions and expressing opinions"
  - "Learner can self-evaluate writing and speaking performance using B1 criteria:
    граматика, лексика, зв'язність, вимова"
dialogue_situations:
  - setting: 'Mock ЗНО writing section — writing a formal лист (m, letter) to a newspaper
      about забруднення (n, pollution) in your місто (n, city): Use formal register.
      Include argumentation. Minimum 150 words.'
    speakers:
      - Кандидат (пише)
      - Екзаменатор (оцінює)
    motivation: 'Writing exam: formal letter with argumentation, register control,
      complex syntax'
content_outline:
  - section: "Вступ: формат екзамену"
    words: 400
    points:
      - "Overview of the B1 practice exam — productive skills: Part 1: Письмо (Writing)
        — 2 writing tasks. Part 2: Говоріння (Speaking) — 2 speaking tasks. Time guidance:
        Writing 45 min, Speaking 15 min."
      - "Assessment criteria: Граматична правильність (grammar accuracy). Лексичне
        багатство (vocabulary range). Зв'язність тексту (coherence and cohesion).
        Відповідність завданню (task fulfillment). For speaking: вимова та інтонація
        (pronunciation and intonation)."
      - "Tips: plan before writing (2-3 min for plan). For speaking, organize thoughts
        before starting. Quality over speed."
      - "Common exam mistakes to avoid: writing too little (under 150 words), ignoring
        the task requirements, using only simple sentences, forgetting вставні слова,
        mixing registers inappropriately. For speaking: reading from notes instead of
        speaking naturally, ignoring the time limit, not answering questions directly."
  - section: "Письмо 1: Творчий текст"
    words: 850
    points:
      - "Task: choose one of three topics and write 200+ words: A. Розповідь: 'Незвичайний
        день' — narrative with зачин, основна частина, кінцівка. Use рухові дієслова,
        вид, художні засоби. B. Опис: 'Місто, яке я люблю' — description with портретна
        лексика, порівняння, епітети. Use прикметники, ступені порівняння. C. Есе-міркування:
        'Чи потрібно всім вивчати іноземні мови?' — аргументація with теза, аргументи,
        висновок."
      - "Writing plan template: 1. Тема i тип тексту (which option?). 2. План: 3-4
        пункти. 3. Ключові слова (vocabulary I will use). 4. Граматичні конструкції
        (which B1 structures will I include?). Practice: learners create a plan before
        writing."
      - "Model response analysis: for each option, a model answer (200 words) is provided
        with annotations showing: — Зв'язкові слова (connecting words). — Граматичні
        конструкції (which B1 structures are used). — Лексика (vocabulary level and
        variety). — Структура (text organization)."
      - "Self-evaluation checklist: Чи є зачин/теза? Чи є основна частина? Чи є кінцівка/висновок?
        Чи використано складні речення? Чи є вставні слова? Чи є різноманітна лексика?
        Чи немає граматичних помилок?"
      - "Grammar showcase strategy: learners deliberately plan which B1 grammar
        structures to demonstrate. Target: at least 1 складнопідрядне речення з причини,
        1 з умови, 1 з допусту, 1 вставне слово, 1 подвійне заперечення, 1 рухове
        дієслово з префіксом. Planning these in advance ensures the text demonstrates
        full B1 range rather than defaulting to simple structures."
  - section: "Письмо 2: Діловий текст"
    words: 750
    points:
      - "Task: write one of the following (100-150 words): A. Заява — requesting leave
        from studies/work. B. Офіційний лист — requesting information about a Ukrainian
        course. C. Оголошення — announcing a community event. All require офіційно-діловий
        стиль with correct formatting."
      - "Evaluation criteria specific to formal writing: Правильне оформлення (correct
        formatting — адресат, адресант, дата). Відповідний стиль (appropriate register
        — no розмовна лексика). Канцеляризми та штампи (correct use of formal expressions).
        Граматична правильність відмінків (case accuracy in formal constructions)."
      - "Model formal text with annotations: заява example showing all required elements.
        Learners compare their text to the model."
      - "Common errors to avoid: Mixing registers (розмовне in formal context). Wrong
        case after згідно з / відповідно до. Missing реквізити (date, signature, addressee).
        Practice: learners write and self-evaluate."
      - "Formal text rubric — detailed scoring: Оформлення (formatting) — 3 points:
        correct адресат/адресант, centered title, дата and підпис. Стиль (register) —
        3 points: no розмовна лексика, appropriate канцеляризми, formal tone. Граматика
        (grammar) — 2 points: correct case government (згідно з + Ор., відповідно до +
        Р.), correct verb forms. Зміст (content) — 2 points: clear прохання/мета,
        logical обґрунтування. Total: 10 points. Learners self-score and identify gaps."
      - "Side-by-side comparison: learners read a formal text with 5 deliberate errors
        (register mixing, wrong case, missing elements) alongside a correct version.
        Tasks: identify all errors, explain why each is wrong, and classify by type."
  - section: "Говоріння 1: Монолог"
    words: 700
    points:
      - "Task: speak for 2-3 minutes on one of three topics: A. 'Моє хобі' — describe
        what you enjoy doing and why. B. 'Подорож, яку я пам'ятаю' — narrate a memorable
        trip. C. 'Людина, яка мене надихає' — describe someone inspiring. Preparation
        time: 1 minute."
      - "Monologue structure guidance: Вступ (introduction): 2-3 sentences. Основна
        частина (body): 6-8 sentences with деталі. Висновок (conclusion): 2-3 sentences.
        Use вставні слова for structure, рухові дієслова for narration, ступені порівняння
        for description."
      - "Pronunciation and intonation focus: Наголос: common words where learners
        make mistakes. Iнтонація: rising for questions, falling for statements, comma
        intonation for вставні слова. Practice: learners record themselves and self-evaluate."
      - "Self-evaluation criteria: Чи говорив/говорила я зв'язно? Чи використав/використала
        різні граматичні конструкції? Чи правильний наголос? Чи був план?"
      - "Fillers and recovery strategies in Ukrainian: what to say when you forget
        a word or lose your train of thought. 'Як це сказати...' (how do you say...),
        'Iншими словами...' (in other words), 'Зачекайте, я згадаю...' (wait, I'll
        remember). These keep the монолог flowing naturally rather than stopping dead."
  - section: "Говоріння 2: Діалог"
    words: 700
    points:
      - "Task: participate in a guided dialogue (3-4 minutes) on one topic: A. 'У
        магазині' — shopping, comparing products, making decisions. B. 'Плануємо вихідний'
        — discussing plans with a friend. C. 'Обговорення новини' — reacting to a
        news item. Preparation time: 1 minute."
      - "Dialogue skills demonstrated: Запитувати (asking questions): Хто? Що? Коли?
        Чому? Як? Відповідати (answering): повні відповіді, not just так/ні. Висловлювати
        думку (expressing opinion): Я вважаю, на мою думку. Погоджуватися/заперечувати:
        формули дискусії from M86. Підтримувати розмову: discourse markers (знаєш,
        до речі, а що як)."
      - "Model dialogue for each scenario: annotated with skill markers. Learners
        practice with a partner or record both sides."
      - "Register awareness: in shopping — semi-formal. Among friends — розмовний.
        About news — публіцистичний елементи. Register flexibility is a B1 skill."
      - "Dialogue repair strategies: what to do when communication breaks down. Asking
        for clarification: 'Перепрошую, чи можете повторити?' Rephrasing: 'Я маю на
        увазі, що...' Checking understanding: 'Ви маєте на увазі, що...?' These
        strategies are assessed as part of communicative competence."
  - section: "Підсумок і оцінювання"
    words: 600
    points:
      - "Scoring guidance: Writing: grammar (25%), vocabulary (25%), coherence (25%),
        task (25%). Speaking: same + pronunciation (20%, other categories adjusted).
        B1 passing: 60%+ overall."
      - "Self-assessment matrix: For each skill area, learners rate: Сильна сторона
        (strength) / Потребує покращення (needs improvement). This feeds into the
        B1 Фінал capstone project planning."
      - "Error journal: learners list their top 5 recurring errors from both writing
        and speaking. These become personal improvement targets."
      - "Productive vs receptive skills comparison: learners compare their M85
        (reading/listening) results with M86 (writing/speaking) results. Typically,
        receptive skills are stronger — this is normal. The gap between receptive and
        productive identifies what learners understand but cannot yet produce. This
        gap is the primary target for B2."
      - "Writing portfolio review: learners collect their best writing from M81 (narrative),
        M82 (argumentation), M83 (media response), and this exam. They read all four
        texts together and observe their own progress. Which texts show the strongest
        grammar? The richest vocabulary? The best structure? This builds metacognitive
        awareness."
      - "Preview: B1 Фінал (M91) — capstone project where all skills come together
        in a final integrated performance."
vocabulary_hints:
  required:
    - "письмо (writing — productive skill)"
    - "говоріння (speaking — productive skill)"
    - "монолог (monologue — sustained individual speech)"
    - "діалог (dialogue — conversation between two people)"
    - "зв'язність (coherence — logical flow and connection)"
    - "граматична правильність (grammatical accuracy)"
    - "лексичне багатство (vocabulary range — variety of words used)"
    - "вимова (pronunciation — how sounds are produced)"
    - "оцінювання (evaluation — judging quality)"
  recommended:
    - "пробний екзамен (practice exam — trial assessment)"
    - "критерій (criterion — standard for evaluation)"
    - "самооцінка (self-evaluation)"
    - "чернетка (draft — preliminary version)"
    - "план (plan — outline before writing/speaking)"
    - "зв'язкові слова (connecting words — cohesion markers)"
activity_hints:
  - type: free-write
    focus: "Complete both writing tasks: creative text (200+ words) and formal document
      (100-150 words) under timed conditions."
    items: 6
  - type: role-play
    focus: "Complete both speaking tasks: monologue (2-3 minutes) and dialogue (3-4
      minutes) on given topics."
    items: 6
  - type: quiz
    focus: "Self-evaluation quiz: assess own writing and speaking against B1 criteria,
      identify strengths and weaknesses."
    items: 8
  - type: error-correction
    focus: "Review and correct errors in own writing: grammar, vocabulary, register,
      coherence."
    items: 6
  - type: match-up
    focus: "Match evaluation criteria to specific features in model texts: which sentences
      demonstrate граматична правильність, which show лексичне багатство."
    items: 8
connects_to:
  - "b1-089 (practice-exam-reading — receptive skills exam)"
  - "b1-088 (comprehensive-b1-review — preparation for exams)"
  - "b1-091 (b1-finale — capstone integrating all skills)"
prerequisites:
  - "b1-088 (comprehensive-b1-review — grammar review)"
  - "b1-089 (practice-exam-reading — receptive skills tested first)"
grammar:
  - "Integration: all B1 grammar demonstrated through writing and speaking"
  - "Register control: switching between офіційний and розмовний in production"
  - "Text structure: розповідь, опис, есе-міркування, ділові папери"
  - "Аргументація in spoken form: формули дискусії"
register: розмовний
references:
  - title: "CEFR B1 writing/speaking descriptors"
    notes: "Can write straightforward connected text on familiar topics. Can reasonably
      fluently sustain a straightforward description or narrative, integrating sub-themes
      and developing particular points."
  - title: "All B1 module references"
    notes: "Writing and speaking tasks draw on all B1 grammar and vocabulary."
