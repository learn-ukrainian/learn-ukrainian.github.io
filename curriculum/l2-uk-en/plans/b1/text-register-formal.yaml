activity_hints:
  - type: reading
    focus: "Прочитайте текст про що таке офіційно-діловий стиль? і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Лексика офіційно-ділового стилю»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему що таке офіційно-діловий стиль?."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему лексика офіційно-ділового стилю."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Що таке офіційно-діловий стиль?»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Лексика офіційно-ділового стилю» з їхніми визначеннями."
