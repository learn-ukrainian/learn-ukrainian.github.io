module: b1-084
level: B1
sequence: 84
slug: text-register-formal
version: '3.1.3'
title: "Офіційний стиль"
subtitle: "Офіційно-діловий стиль мовлення: документи, заяви, ділове листування"
focus: grammar
pedagogy: PPP
phase: "B1.8 [Текст і регістр]"
word_target: 4000
objectives:
  - "Студент вміє визначати та описувати ключові характеристики офіційно-ділового стилю (конкретність, офіційність, стандартизовані структури, відсутність емоційної лексики), використовуючи українську метамову"
  - "Студент вміє розрізняти офіційно-діловий стиль від розмовного, наукового, публіцистичного та художнього стилів в автентичних українських текстах"
  - "Студент вміє складати базові українські ділові папери: заяву, автобіографію, оголошення, дотримуючись стандартних умов оформлення"
  - "Студент вміє вести формальний діалог українською (телефонний дзвінок до установи, офіційний запит, професійне знайомство), використовуючи відповідні маркери регістру"
  - "Студент вміє розпізнавати та уникати типових помилок регістру: використання розмовної лексики у формальних контекстах та канцеляризмів у неформальному спілкуванні"
dialogue_situations:
  - setting: 'Написання офіційної заяви на ім''я ректора університету — офіційний стиль: Шановний пане Ректоре! Прошу надати мені академічну відпустку. У зв''язку з сімейними обставинами. З повагою...'
    speakers:
      - Студент (пише)
      - Секретар (допомагає)
    motivation: 'Офіційний регістр: шановний, прошу, у зв''язку з, з повагою — офіційні документи'
content_outline:
  - section: "Що таке офіційно-діловий стиль?"
    words: 700
    points:
      - "Визначення за Заболотним (8 клас, с. 260): Офіційно-діловий стиль задовольняє потреби суспільства в офіційній сфері спілкування. Існує у двох формах: усній i писемній. Писемна: закони, постанови, накази, заяви, протоколи, контракти. Усна: промови, доповіді, переговори, дискусії, бесіди офіційного характеру."
      - "Ключові характеристики за Заболотним (6 клас, с. 230): Офіційність, конкретність, стислість, точність формулювань, логічна послідовність, використання спеціальної лексики. Тексти цього стилю не допускають двозначності або емоційно забарвленої лексики."
      - "Порівняння з іншими стилями: студенти читають чотири короткі тексти (та сама інформація, подана в офіційно-діловому, науковому, публіцистичному та розмовному стилях) і визначають маркери стилю в кожному. Ключові відмінності: офіційно-діловий використовує канцеляризми та стандартні формулювання; науковий використовує терміни; публіцистичний використовує емоційно забарвлену лексику; розмовний використовує розмовну лексику."
      - "Культурна довідка: важливість офіційно-ділового стилю в українському суспільному житті. Уряд, військові (ЗСУ), освіта та громадянське суспільство функціонують за допомогою офіційних документів. Володіння цим регістром є важливим для інтеграції в україномовне професійне середовище."
      - "Розрізнення регістрів за Державним стандартом 2024 §4.5.1: студенти порівнюють специфічні лексичні маркери (канцеляризми проти розмовної лексики) та синтаксичні маркери (складні іменникові конструкції проти простих речень) у різних регістрах. Практика читання: визначити 5 формальних маркерів у зразку оголошення за Заболотним (6 клас, с. 230)."
  - section: "Лексика офіційно-ділового стилю"
    words: 650
    points:
      - "Характерні лексичні категорії: Канцеляризми: вищезазначений, нижчепідписаний, відповідно до, згідно з, у зв'язку з тим що, з метою, мати на меті. Штампи: доводжу до вашого відома, прошу надати, відповідно до чинного законодавства. Терміни: позивач, відповідач, повноваження, розпорядження."
      - "Граматичні ознаки стилю: Перевага іменникових конструкцій над дієсловами: «здійснення контролю» замість «контролювати». Пасивні та безособові конструкції: «наказ видано», «було розглянуто». Складні прийменники: згідно з (+ орудний), відповідно до (+ родовий), у зв'язку з (+ орудний)."
      - "Типові помилки та росіянізми в офіційній українській: Правильно: згідно з наказом (а не *згідно наказу — російська калька). Правильно: відповідно до закону (а не *відповідно закону). Правильно: по закінченні (а не *по закінченню — вплив російської). Практика: студенти знаходять та виправляють помилки регістру у зразках текстів."
      - "Практика читання: автентична українська заява з аналізом усіх маркерів стилю. Студенти анотують текст, визначаючи канцеляризми, штампи та стандартні формулювання."
  - section: "Ділові папери: заява та автобіографія"
    words: 700
    points:
      - "Заява — структура та оформлення за Заболотним (6 клас, с. 230): 1. Адресат (кому — посада, прізвище, ім'я, по батькові — давальний відмінок). 2. Адресант (від кого — родовий відмінок). 3. Назва документа (ЗАЯВА — по центру). 4. Текст (прохання з обґрунтуванням). 5. Дата i підпис. Зразок заяви з анотаціями, що пояснюють кожен елемент."
      - "Автобіографія — структура за Авраменком (8 клас, с. 124): Хронологічний виклад ключових подій життя в офіційно-діловому стилі. Стандартний вступ: «Я, (прізвище, ім'я, по батькові), народився/народилася...» Ключові розділи: народження, освіта, трудова діяльність, сімейний стан. Практика: студенти пишуть власну автобіографію за зразком."
      - "Оголошення — структура короткого повідомлення: Заголовок, основна частина (що, коли, де, хто), контактна інформація. Практика: скласти оголошення про шкільний захід або збори громади."
      - "Загальні правила оформлення: дата (число, місяць, рік), розміщення підпису, відступи, використання великих літер для посад та назв."
  - section: "Усний діалог в офіційно-діловому стилі"
    words: 750
    points:
      - "Офіційна телефонна розмова за Авраменком (8 клас, с. 80): Зразок діалогу — студент телефонує, щоб повідомити про відсутність: «Добрий день, Мирославо Михайлівно! Перепрошую за дзвінок, але змушений попередити про те, що завтра пропущу навчальні заняття, оскільки мені призначено візит до лікаря.» Аналіз маркерів регістру: формули ввічливості, офіційна лексика."
      - "Шаблони професійної взаємодії: Звернення: «Добрий день! Чи можу я поговорити з...?» Прохання: «Будь ласка, підкажіть...» / «Чи не могли б ви...?» Подяка: «Щиро дякую за інформацію.» Прощання: «Дякую, що приділили час. На все добре!» Практика: розігрування формальних телефонних дзвінків до установ."
      - "Офіційне спілкування проти розмовного: Та сама ситуація у двох регістрах — студенти порівнюють і визначають конкретні лексичні та граматичні зміни. Приклад: «Скажіть, будь ласка, коли прийом?» (розмовний) проти «Перепрошую, чи не могли б ви повідомити про години прийому?» (офіційно-діловий)."
      - "Офіційні знайомства та взаємодія з установами: представлення себе на прийомі, пояснення мети візиту (Мета мого візиту —...), прохання про зустріч — «Чи можна записатися на прийом до...?» Ввічливе продовження: «Будь ласка, повідомте мене, коли буде зручно.» Практика: студенти розігрують візит до ЦНАПу."
  - section: "Писемне повідомлення та ділове листування"
    words: 700
    points:
      - "Повідомлення — письмовий документ в офіційному стилі за Авраменком (8 клас, с. 124): Будова: 1. Вступ (мета). 2. Мотивувальна частина. 3. Заключна частина. Практика: студенти складають повідомлення про шкільну або громадську подію."
      - "Електронне ділове листування — структура сучасного ділового листа: Тема листа, привітання (Шановний/Шановна...), основний текст (офіційний регістр), підпис (З повагою,...). Типові помилки: змішування розмовного та офіційного регістрів у тому самому листі, недоречне використання скорочень або емодзі в офіційних текстах."
      - "Практика: студенти пишуть офіційний лист із запитом про курс української мови, використовуючи всі вивчені умовності. Взаємне оцінювання: знайти порушення регістру в текстах один одного."
      - "Контрольний текст: офіційний український документ (витяг з протоколу або наказ) для комплексного аналізу — студенти визначають усі характерні ознаки офіційно-ділового стилю."
  - section: "Підсумок: офіційна мова в житті"
    words: 500
    points:
      - "Повний лексичний довідник — ключові терміни, згруповані за функціями: канцеляризми, штампи, формули ввічливості, типи ділових паперів. Глосарій з українськими визначеннями."
      - "Самоперевірка українською: 1. Назвіть 5 ознак офіційно-ділового стилю. 2. Яка різниця між заявою та автобіографією? 3. Напишіть формальне звернення до директора школи. 4. Перетворіть розмовне речення на офіційно-ділове."
      - "Огляд системи стилів мовлення: місце офіційно-ділового стилю в системі п'яти стилів (художній, науковий, публіцистичний, розмовний, офіційно-діловий). Кожен стиль має специфічну сферу використання, мовні засоби та жанри. Розуміння системи допомагає студентам вибрати правильний регістр для будь-якої ситуації."
      - "Анонс наступного модуля: Розмовний стиль (модуль №78) — протилежний кінець спектра регістрів. Розуміння обох крайнощів допомагає студентам орієнтуватися у всьому діапазоні українського спілкування."
