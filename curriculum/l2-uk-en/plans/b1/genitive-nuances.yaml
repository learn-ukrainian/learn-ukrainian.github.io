module: b1-052
level: B1
sequence: 52
slug: genitive-nuances
version: 3.1.2
title: Родовий відмінок (деталі)
subtitle: 'Розширені значення родового: частина від цілого, бажання, заперечення, дати'
focus: grammar
pedagogy: PPP
phase: B1.5 [Нюанси відмінків та прийменники]
word_target: 4000
objectives:
- 'Учень вміє вживати родовий відмінок для вираження часткового значення (частина від цілого): склянка
  води, шматок хліба, трохи цукру, багато часу'
- 'Учень вміє вживати родовий відмінок як об''єкт бажання, пошуку або досягнення: бажати щастя, шукати
  правди, досягти мети'
- 'Учень вміє вживати родовий відмінок у заперечних конструкціях: немає часу, не бачив друга (на противагу:
  не бачив друг — Зн.в.)'
- 'Учень вміє вживати родовий відмінок у датах та часових виразах: другого лютого, минулого року, цього
  тижня'
- Учень вміє обирати між закінченнями -а/-я та -у/-ю в родовому відмінку однини чоловічого роду (Р.в.
  ІІ відміни) на основі семантичних категорій
dialogue_situations:
- setting: 'На Одеському ринку Привоз (m) — торгування: Дайте склянку (f) меду. Трохи сиру. Немає свіжого
    молока (n)? Шматок хліба (m), будь ласка.'
  speakers:
  - Покупець
  - Продавець
  motivation: 'Частковий родовий відмінок: меду, сиру, молока, хліба — вираження кількості'
content_outline:
- section: Частковий родовий
  words: 700
  points:
  - 'Основне поняття: коли ви берете ЧАСТИНУ чогось, ціле стоїть у Р.в.: склянка води, чашка чаю, шматок
    хліба, тарілка борщу, пляшка молока, кілограм яблук, літр бензину. «Місткість» або «міра» стоїть у
    Н.в./Зн.в., а речовина — у Р.в.'
  - 'Кількісні слова + Р.в.: багато часу, мало грошей, трохи цукру, чимало зусиль, достатньо води, забагато
    сонця. Вони завжди вимагають родового відмінка в однині чи множині, залежно від того, чи злічуваний
    іменник.'
  - 'Практика: 10-12 речень із частковими конструкціями, де учні утворюють правильну форму Р.в. Слід включити
    складні випадки: сік (соку, а не *сіку — чергування голосних).'
- section: Родовий бажання, пошуку, досягнення
  words: 600
  points:
  - 'Дієслова, які вимагають Р.в. замість Зн.в. для об''єкта: бажати (бажаю щастя), шукати (шукаю правди/правду
    — можливі обидва варіанти), досягти (досяг мети), позбутися (позбувся страху), потребувати (потребую
    допомоги), набути (набув досвіду). З абстрактними іменниками значно частіше вживається Р.в., ніж Зн.в.'
  - 'Вирази з Р.в.: вартий уваги, повний надії, гідний поваги. Такі конструкції прикметник + Р.в. часто
    трапляються в текстах рівня B1+.'
  - 'Практика: доповнити речення, обираючи між Р.в. та Зн.в. залежно від дієслова. Порівняти: шукати книжку
    (Зн.в., конкретний предмет) проти шукати правди (Р.в., абстрактне поняття).'
- section: Родовий при запереченні
  words: 600
  points:
  - 'Головне правило: зі словом немає/нема підмет стоїть у Р.в.: Є час (Н.в.) → Немає часу (Р.в.). Є хліб
    → Немає хліба. Є друзі → Немає друзів. Це системне явище — КОЖНА конструкція з немає використовує
    Р.в.'
  - 'Заперечні перехідні дієслова: Р.в. часто замінює Зн.в. Я бачив друга (Зн.в.) → Я не бачив друга (можливі
    й Р.в., і Зн.в.). З абстрактними іменниками перевага надається Р.в.: не мав змоги, не знайшов відповіді.
    З конкретними іменниками часто вживається Зн.в.: не бачив цю книжку.'
  - 'не було / не буде + Р.в.: Вчора не було дощу. Завтра не буде заняття. Практика: перетворити стверджувальні
    речення на заперечні, змінюючи відмінки.'
- section: Родовий у датах і часових виразах
  words: 600
  points:
  - 'Для дат використовуються порядкові числівники + іменник у Р.в.: Сьогодні друге лютого (Н.в. для «сьогодні»).
    Це сталося другого лютого (Р.в. для позначення дати). Він народився п''ятнадцятого березня тисяча
    дев''ятсот дев''яностого року.'
  - 'Часові вирази з Р.в.: цього тижня, минулого року, наступного місяця, того дня. Такі часові вирази
    із вказівним займенником + Р.в. надзвичайно поширені.'
  - 'Практика: дати відповідь на запитання «Коли це сталося?» за допомогою дат у Р.в. та утворити часові
    вирази із займенниками цей/минулий/наступний.'
- section: Закінчення -а/-я чи -у/-ю?
  words: 700
  points:
  - 'Розрізнення -а/-я та -у/-ю для іменників чоловічого роду ІІ відміни в Р.в. — одне з найскладніших
    правил української мови. Семантичні категорії: -а/-я (конкретні, злічувані, специфічні предмети):
    стола, олівця, брата, коня, вітру (якщо конкретний об''єкт). -у/-ю (абстрактні, збірні, матеріальні,
    незлічувані поняття): снігу, часу, розуму, вітру (як явище), народу, інституту.'
  - 'З підручника Заболотного, 6 клас, с.93-101: -а/-я: назви осіб, тварин, інструментів, конкретних предметів,
    міст (Києва, Львова, але: Донбасу — регіон, а не місто). -у/-ю: абстрактні поняття, збірні іменники,
    матеріали, природні явища, установи, географічні регіони (факультету, піску, дощу).'
  - 'Складні випадки: деякі іменники допускають ОБИДВА закінчення з різницею у значенні: листа (конкретний
    лист, папірець) проти листу (листя, збірне поняття). Практика: для 15 іменників обрати правильне закінчення
    Р.в. та пояснити категорію.'
- section: Родовий з прийменниками (§4.2.2.2)
  words: 600
  points:
  - 'Державний стандарт наводить понад 15 прийменників, що вимагають Р.в. Окрім базових без, від, для,
    до, з/із, після, біля, які вивчалися на рівні A2, рівень B1 додає: замість (замість кави), крім/окрім
    (крім мене), навколо (навколо будинку), серед (серед друзів), щодо (щодо вашого питання), внаслідок
    (внаслідок дощу), поблизу (поблизу школи). З підручника Заболотного, 7 клас, с.193: прийменники, що
    вживаються з Р.в.'
  - 'Складні прийменники + Р.в.: з-за (з-за хмар), з-під (з-під столу), з-поміж (з-поміж учнів). Зверніть
    увагу: вони пишуться через дефіс. Також: за допомогою, у разі, на відміну від. Практика: 10 речень
    із прийменниками рівня B1, що вимагають Р.в., у контексті.'
  - 'Семантичне групування прийменників Р.в.: Місце (біля, навколо, поблизу, серед). Джерело/причина (від,
    з, через, внаслідок). Винятки (без, крім, замість). Напрямок (до, з-за, з-під). Стосунок (щодо,
    стосовно). Час (після, до, протягом — розглядаються в модулі про часові прийменники).'
- section: Підсумок
  words: 400
  points:
  - 'Довідка: шість семантичних ролей Р.в.: 1. Частковий (склянка води). 2. Бажання/пошуку (шукати правди).
    3. Заперечення (немає часу). 4. Дати (другого лютого). 5. Приналежності (повторення з A2: книжка брата).
    6. З прийменниками (понад 15 прийменникових конструкцій).'
  - 'Самоперевірка: 10 речень, що вимагають правильного вживання Р.в. у всіх шести ролях. Для кожного
    випадку визначити семантичну функцію та утворити правильну форму родового відмінка. Включити обидва
    закінчення чоловічого роду: -а/-я та -у/-ю.'
  - 'Анонс: наступний модуль — давальний відмінок (деталі): вираження станів, віку та потреб.'
vocabulary_hints:
  required:
  - родовий відмінок (genitive case)
  - частковий (partitive — expressing part of a whole)
  - заперечення (negation — немає, не)
  - кількість (quantity — governed by genitive)
  - дата (date — uses genitive for 'on a date')
  - закінчення (ending — the grammatical suffix of a declined word)
  - склянка (glass — as a measure word)
  - шматок (piece — as a partitive word)
  - багато (many/much — quantifier governing genitive)
  - немає (there is no — triggers genitive)
  recommended:
  - бажати (to wish/desire — governs genitive)
  - потребувати (to need — governs genitive)
  - досягти (to achieve — governs genitive)
  - позбутися (to get rid of — governs genitive)
  - гідний (worthy of — governs genitive)
  - вартий (worth — governs genitive)
activity_hints:
- type: reading
  focus: Прочитати текст про частковий родовий відмінок і дати відповіді на запитання
- type: essay-response
  focus: Написати 5 речень, використовуючи нову лексику з розділу «Родовий бажання, пошуку, досягнення»
- type: fill-in
  focus: Вставити правильну граматичну форму в реченнях на тему часткового родового відмінка
- type: error-correction
  focus: Знайти й виправити помилки в реченнях на тему родового відмінка бажання, пошуку, досягнення
- type: quiz
  focus: 'Обрати правильний варіант: лексика та граматика з розділу «Частковий родовий»'
- type: match-up
  focus: З'єднати терміни з розділу «Родовий бажання, пошуку, досягнення» з їхніми визначеннями
connects_to:
- 'b1-047 (Давальний відмінок: деталі)'
- 'b1-048 (Орудний відмінок: деталі)'
- b1-052 (Порядкові числівники і відмінки — числівники вимагають родового відмінка в датах)
prerequisites:
- Завершення рівня A2 (базова система відмінків, базові форми Р.в.)
- b1-012 до b1-015 (підкласи іменників та відмінювання з Фази 2)
grammar:
- 'Частковий родовий відмінок: склянка води, кілограм яблук'
- 'Родовий бажання: бажати щастя, шукати правди'
- 'Родовий заперечення: немає часу, не бачив друга'
- 'Родовий у датах: другого лютого, минулого року'
- Закінчення -а/-я проти -у/-ю в ІІ відміні (семантичні категорії)
register: науково-навчальний
references:
- title: Заболотний, 6 клас, с.93-101
  notes: Значення родового відмінка, правила щодо закінчень -а/-я та -у/-ю, форми родового відмінка множини.
- title: Литвінова, 6 клас, с.141
  notes: Родовий відмінок у датах та часових виразах.
- title: Авраменко, 11 клас, с.42
  notes: Часові вирази з прийменниками та родовим відмінком.
