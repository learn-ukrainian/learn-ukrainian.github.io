module: b1-016
level: B1
sequence: 16
slug: work-week-aspect-in-action
version: '2.0'
title: 'Робочий тиждень: вид у дії'
subtitle: Work Week - Aspect in Real-Life Context
focus: grammar
pedagogy: TTT
phase: B1.1 Aspect
word_target: 4000
objectives:
- Learner can describe work routines using correct aspect
- Learner can report completed and ongoing tasks
- Learner can use aspect naturally in professional contexts
sources:
- name: Ukrainian Business Communication
  url: https://uk.wikipedia.org/wiki/Ділове_мовлення
  type: reference
  notes: Work-related vocabulary and contexts
- name: Ukrainian State Standard 2024 - Professional Communication
  url: https://mon.gov.ua/
  type: reference
  notes: Aspect in workplace scenarios
content_outline:
- section: 'Вступ: Робота та вид дієслова (Introduction: Work and Verb Aspect)'
  words: 500
  points:
  - 'Introduction to workplace communication focusing on State Standard §4.2.3.1: mastering aspect in all tenses within the
    ''Job'' (§3.9) thematic context.'
  - 'The visual metaphor for B1 learners: The wavy line for ''Недоконаний вид'' (process) vs. the ''X'' mark for ''Доконаний
    вид'' (result/point in time).'
  - 'Diagnostic contrast check: Workplace scenarios to differentiate between ''робив'' (ongoing/repetitive) and ''зробив''
    (completed task).'
- section: 'Презентація: Робочі завдання та звіти (Presentation: Work Tasks and Reports)'
  words: 900
  points:
  - 'Deep dive into High-Frequency vocabulary: ''завдання'' (technical/urgent) and ''звіт'' (annual/work report) with aspectual
    collocations.'
  - 'Grammar of progress reporting (НДВ): ''складати звіт'', ''подавати звіт'' vs. the result of the action (ДВ): ''склав'',
    ''подав''.'
  - 'Cultural Hook: Standard 40-hour work week vs. modern IT ''гнучкий графік'' (flexible schedule) and ''віддалена робота''
    (remote work).'
  - 'Verb conjugation focus: Using Imperfective Future (складена та синтетична форми) for planning the work week.'
- section: 'Аналіз помилок: Пастки для іноземців (Error Analysis: Traps for Learners)'
  words: 900
  points:
  - 'Learner Error 1: Using Perfective in the Present. Correction of phrases like ''*Я напишу звіт зараз*'' (incorrect for
    current action) to ''Я пишу звіт зараз'' (НДВ).'
  - 'Learner Error 2: Process vs. Result confusion. Drills to differentiate ''Я робив звіт'' (spent time) from ''Я зробив
    звіт'' (it is finished).'
  - 'Linguistic Nuance: The ''Deadline'' gender check. Confirming ''дедлайн'' as masculine and practicing agreement: ''жорсткий
    дедлайн'', ''цей дедлайн''.'
  - 'Register check: Comparing the slangy ''планірка'' with the formal ''нарада'' and practicing the aspectual pair ''проводити/провести
    нараду''.'
- section: Ділові ситуації та діалоги (Business Situations and Dialogues)
  words: 1000
  points:
  - 'Authentic Dialogue scenario: The ''Deadline'' vs ''Реченець'' debate. Explaining the use of ''кінцевий термін'' in official
    documents vs. the purist ''реченець'' vs. common office slang.'
  - 'Situation - Scheduling: Collocations for meetings — ''призначити/скасувати/перенести зустріч'' with aspect shifts based
    on status (planned vs. happened).'
  - 'Situation - Missing the mark: Vocabulary for missed opportunities — ''пропустити дедлайн'' vs. ''вкластися в термін''.'
  - 'Interactive scenario: A progress report meeting where the learner must switch between Past (results) and Present/Future
    (ongoing processes).'
- section: Підсумок та професійна комунікація (Summary and Professional Communication)
  words: 700
  points:
  - 'Synthesis activity: Writing a weekly report narrative that integrates all aspect contexts (past completions, current
    tasks, future plans).'
  - Review of 'Доконаний/Недоконаний вид' pairs essential for professional life, building on b1-12 pairs.
  - Self-correction checklist for workplace aspect usage based on the 'Process vs. Result' framework.
  - Preview of b1-75 (Professional Communication) and the b2-pro business track.
vocabulary_hints:
  required:
  - 'завдання (task) — collocations: виконувати завдання (НДВ), поставити завдання (ДВ), технічне завдання (technical assignment),
    термінове завдання (urgent task)'
  - 'звіт (report) — collocations: складати звіт (process), подавати звіт (submit), річний звіт (annual), звіт про роботу
    (work report)'
  - 'дедлайн (deadline) — High-Frequency business; gender: masculine; collocations: жорсткий дедлайн, вкластися в дедлайн,
    пропустити дедлайн'
  - кінцевий термін (final deadline) — official register synonym for 'дедлайн'
  - 'зустріч (meeting) — collocations: призначити зустріч, скасувати зустріч, перенести зустріч, ділова зустріч'
  - 'нарада (meeting/conference) — formal; collocations: проводити нараду (НДВ), бути на нараді, планірка (colloquial planning
    meeting)'
  - 'результат (result) — context: working for the result (працювати на результат)'
  - 'процес (process) — context: focusing on the process vs. completion'
  - 'колега (colleague) — gender: common (чоловічий/жіночий рід); plural: колеги'
  - 'начальник (boss) — register: formal; context: звітувати перед начальником (report to the boss)'
  recommended:
  - реченець (deadline) — archaic/purist synonym for 'deadline'; used for cultural nuance
  - 'гнучкий графік (flexible schedule) — context: modern IT work culture'
  - 'віддалена робота (remote work) — context: working from home or outside the office'
  - 'презентація (presentation) — collocations: готувати презентацію (НДВ), підготувати презентацію (ДВ)'
  - 'відпустка (vacation/leave) — collocations: йти у відпустку, бути у відпустці'
  - 'план (plan) — collocations: складати план, виконувати план'
