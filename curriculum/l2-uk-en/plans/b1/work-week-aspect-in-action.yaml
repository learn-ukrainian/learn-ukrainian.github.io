module: b1-13
level: B1
sequence: 13
slug: work-week-aspect-in-action
version: '2.0'
title: 'Робочий тиждень: вид у дії'
subtitle: Work Week - Aspect in Real-Life Context
content_outline:
- section: Тест
  points:
  - Diagnostic contrast for workplace aspect usage — focus on Process vs. Result confusion
    (робив vs зробив)
  - Intuition check — check gender agreement with 'дедлайн' (masculine)
- section: Пояснення
  points:
  - Aspect in workplace context — aligned with State Standard §4.2.3.1 (Aspect in
    all tenses, work theme)
  - 'Plans and tasks (ДВ) — collocations: ставити завдання, термінове завдання'
  - 'Progress reports (НДВ) — collocations: складати звіт, подавати звіт'
  - 'Weekly communication patterns — cultural hook: Standard 40h week vs. Flexible
    IT schedules (гнучкий графік)'
- section: Практика
  points:
  - 'Decision-making framework — visual metaphor: Wavy line (process/imperfective)
    vs. X mark (result/perfective)'
  - 'Common mistakes section — learner error: Using Perfective in Present (e.g., *Я
    напишу зараз* instead of *Я пишу зараз*)'
- section: Діалоги
  points:
  - '5-6 authentic dialogues — scenario: The ''Deadline'' vs ''Реченець'' debate (purist
    vs. modern usage)'
  - 'Grammar in natural context — collocations: призначити/скасувати/перенести зустріч'
  - 'Various situations — scenario: Missing a deadline (пропустити дедлайн/кінцевий
    термін)'
vocabulary_hints:
  required:
  - 'завдання (task) — collocations: виконувати завдання, ставити завдання, термінове
    завдання'
  - 'звіт (report) — collocations: складати звіт, подавати звіт, річний звіт'
  - 'зустріч (meeting) — collocations: призначити зустріч, скасувати зустріч, перенести
    зустріч'
  - 'дедлайн (deadline) — collocations: жорсткий дедлайн, пропустити дедлайн, вкластися
    в дедлайн; synonyms: кінцевий термін, реченець'
  - 'проект (project) — context: working on a project (працювати над проектом - НДВ)
    vs finished a project (закінчити проект - ДВ)'
  - 'колега (colleague) — context: discussing tasks with colleagues'
  - 'начальник (boss) — context: reporting to the boss (звітувати перед начальником)'
  - 'офіс (office) — context: working in the office vs remote work (віддалена робота)'
  - робочий день (workday) — standard vs flexible hours
  - робочий тиждень (work week) — 40-hour standard
  recommended:
  - 'презентація (presentation) — collocations: готувати презентацію (process), підготувати
    презентацію (result)'
  - 'нарада (meeting/conference) — collocations: проводити нараду, бути на нараді'
  - 'план (plan) — context: making plans vs realizing plans'
  - 'графік (schedule) — collocations: гнучкий графік (flexible schedule)'
  - 'відпустка (vacation/leave) — context: going on leave (йти у відпустку)'
