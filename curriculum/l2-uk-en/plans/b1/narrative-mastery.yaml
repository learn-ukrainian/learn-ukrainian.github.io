- "b1-057 to b1-062 (participles and gerunds)"
- "b1-073 (reported-speech — пряма мова rules)"
grammar:
- "Tense alternation in narrative: минулий, теперішній історичний, майбутній"
- "Aspect alternation: НДВ for background, ДВ for events"
- "Prefixed motion verbs in sequential narrative"
- "Дієприкметникові/дієприслівникові звороти for descriptive enrichment"
- "Text structure: зачин, зав'язка, кульмінація, розв'язка, кінцівка"
register: розмовний
references:
- title: "Варзацька Grade 4, p.14"
  notes: "Будова тексту: розповідь, опис, міркування, есе —
    basic text structures adapted to B1."
- title: "Заболотний Grade 5, p.134, 223-226"
  notes: "Сюжет: зав'язка, кульмінація, розв'язка. Зачин, основна частина,
