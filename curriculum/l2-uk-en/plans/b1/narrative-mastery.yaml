module: b1-090
level: B1
sequence: 90
slug: narrative-mastery
version: '3.1.3'
title: 'Мистецтво розповіді'
subtitle: 'Поєднання часів, видів, рухових дієслів і дієприкметників у текстах'
focus: communication
pedagogy: PPP
phase: 'B1.9 [Синтез та випуск]'
word_target: 4000
objectives:
  - 'Здобувач освіти вміє будувати зв''язну українську розповідь, поєднуючи минулий, теперішній та майбутній часи з правильним вибором виду'
  - 'Здобувач освіти вміє природно використовувати префіксальні дієслова руху (прийти, вийти, перейти, об''їхати) у розповідях про подорожі та події'
  - 'Здобувач освіти вміє вплітати дієприкметникові та дієприслівникові звороти для додавання описових і часових деталей до історій'
  - 'Здобувач освіти вміє застосовувати структуру тексту (зачин, основна частина, кінцівка) для створення добре організованих українських розповідей обсягом 150-200 слів'
  - 'Здобувач освіти вміє доречно змінювати регістр у межах розповіді (діалог у розмовному стилі, оповідь у нейтральному або художньому стилі)'
dialogue_situations:
  - setting: 'Конкурс творчого письма в Чернівцях — студенти читають свої оповідання вголос: Він, увійшовши в кімнату, зупинився. «Хто тут?» — запитав він. Ніхто не відповів. Хоча серце калатало, він пішов далі.'
    speakers:
      - Автор (reading)
      - Журі (commenting)
    motivation: 'Наративні прийоми: дієприслівники, непряма мова, подвійне заперечення, допустові конструкції в розповіді'
content_outline:
  - section: 'Будова розповіді'
    words: 700
    points:
      - 'Структура тексту за Варзацькою, 4 клас, с. 14 (адаптовано для B1): Розповідь відповідає на запитання «Що сталося?». Структура: Зачин — час i місце події. Основна частина — розгортання події. Кінцівка — завершення події. Розширення для B1: зав''язка, кульмінація, розв''язка за Заболотним, 5 клас, с. 134.'
      - 'Мікротеми i абзаци — організація розповіді в логічні абзаци: Кожен абзац = одна мікротема. Зв''язкові слова: потім, після того, тоді, нарешті, раптом, тим часом, водночас, несподівано, зрештою. Практика: здобувачі освіти складають план розповіді за мікротемами.'
      - 'Зразкова розповідь (200 слів) — добре структурована українська розповідь про подорож або подію. Аналіз: ідентифікувати зачин, основну частину, кінцівку, мікротеми, зв''язкові слова та вибір часу/виду.'
      - 'Планування розповіді: здобувачі освіти створюють план для власної розповіді перед написанням, дотримуючись структури з підручника.'
      - 'Типи текстів за Заболотним, 5 клас, с. 223: розповідь, опис, міркування. Кожен має свою структуру та мету. На рівні B1 здобувачі освіти поєднують усі три в одному тексті — опис місця, розповідь про події, міркування про значення.'
  - section: 'Часи та вид у розповіді'
    words: 800
    points:
      - 'Зміна часів в українських розповідях — коли і чому: Минулий час (базовий для розповідей про минуле): «Ми приїхали о п''ятій». Теперішній історичний (для яскравої оповіді): «Раптом він зупиняється i дивиться на мене». Майбутній (для прогнозів/планів у межах історії): «Завтра ми поїдемо далі». Практика: здобувачі освіти ідентифікують зміни часу в зразковій розповіді.'
      - 'Вибір виду — доконаний чи недоконаний у розповіді: Недоконаний для тла/тривалої дії: «Сонце світило, птахи співали». Доконаний для завершених подій: «Раптом почався дощ». Чергування створює ритм розповіді: «Ми йшли лісом. Раптом побачили лисицю. Вона стояла й дивилася. Потім утекла». Практика: здобувачі освіти доповнюють розповіді, обираючи правильний вид.'
      - 'Послідовність часів і навмисні зміни: Правило: дотримуватися одного базового часу, змінювати лише для ефекту. Помилка: випадкове змішування без мети. Практика: здобувачі освіти редагують розповідь з непослідовним використанням часу.'
      - 'Ефект «раптом»: як одне дієслово доконаного виду після низки дієслів недоконаного виду створює наративну несподіванку. Техніка української оповіді, що має паралелі в народних казках.'
      - 'Передача мовлення в розповіді (зв''язок з модуля №73): вплетення слів персонажів за допомогою прямої мови («Він сказав: "Я прийду."») та непрямої мови («Він сказав, що прийде.»). Практика: здобувачі освіти перетворюють пряму мову на непряму і спостерігають, як працюють часові зсуви в українській непрямій мові в межах розповідей.'
  - section: 'Рухові дієслова у розповіді'
    words: 700
    points:
      - 'Повторення префіксальних дієслів руху (з Фази 4) в наративному контексті: «Ми вийшли з дому, пішли вулицею, зайшли в кав''ярню, перейшли через міст, дійшли до парку». Кожне префіксальне дієслово просуває історію в просторі.'
      - 'Дієслова руху як каркас розповіді — історія подорожі: Розповідь будується навколо послідовності рухів. «Вирушили зранку. Доїхали до Львова о третій. Обійшли старе місто. Зайшли в книгарню. Пішли до ратуші. Повернулися ввечері». Практика: здобувачі освіти пишуть власну розповідь про подорож.'
      - 'Переносне значення дієслів руху для глибини (з модуля №35): «Час летів», «Розмова потекла», «Думки побігли». Ці метафоричні значення збагачують розповіді за межами буквального руху.'
      - 'Практика: здобувачі освіти перетворюють плоску розповідь («Ми поїхали до Києва. Ми бачили Хрещатик») на насичену за допомогою префіксальних дієслів руху, виду та зв''язкових слів.'
      - 'Ланцюги дієслів руху як структура розповіді: «Вирушили — доїхали — зайшли — пішли — повернулися». Кожне префіксальне дієслово маркує новий ритм розповіді. Здобувачі освіти аналізують зразкову українську історію подорожі та визначають її наративну дугу виключно через дієслова руху. Практика: написати розповідь з 5 речень, де кожне речення містить різне префіксальне дієслово руху.'
  - section: 'Дієприкметники та дієприслівники у розповіді'
    words: 700
    points:
      - 'Дієприкметникові звороти для опису в межах розповіді: «Місто, залите вечірнім сонцем, виглядало казковим». «Ми зупинилися біля зруйнованої церкви». Вони додають візуальні деталі, не порушуючи плин оповіді. Практика: здобувачі освіти розширюють прості речення дієприкметниковими зворотами.'
      - 'Дієприслівникові звороти для одночасних/попередніх дій: «Виходячи з дому, я помітив хмари» (одночасно). «Прочитавши листа, вона усміхнулася» (попередньо). Вони плавно з''єднують дії в розповіді. Практика: здобувачі освіти об''єднують пари речень за допомогою дієприслівників.'
      - 'Застереження щодо надмірного використання: занадто багато зворотів роблять текст важким і літературним. У розповіді потрібен баланс: 1-2 дієприкметникових/дієприслівникових звороти на абзац. Практика: здобувачі освіти редагують перевантажений уривок для природності.'
      - 'Регістрова ремарка: дієприкметникові/дієприслівникові звороти підвищують регістр. Доречні для письмових розповідей, менш поширені у повсякденній усній розповіді.'
      - 'Порівняння: одна й та сама сцена, написана з дієприкметниковими/дієприслівниковими зворотами та без них. Без: «Він вийшов з дому. Він побачив хмари. Він повернувся за парасолькою». З: «Вийшовши з дому, він побачив хмари, що набігали з заходу, і повернувся за парасолькою». Практика: здобувачі освіти додають рівно один зворот на речення, щоб збагатити плоский уривок.'
  - section: 'Від плану до тексту: практика'
    words: 650
    points:
      - 'Покрокове написання розповіді: 1. Тема: Моя подорож / Незвичайний день / Зустріч. 2. План: зачин, 3-4 мікротеми, кінцівка. 3. Чернетка: писати вільно, зосередитися на ідеях. 4. Редагування: перевірити час/вид, додати дієслова руху та описові звороти, забезпечити зв''язність. 5. Чистовий варіант: 150-200 слів.'
      - 'Діалог у розповіді: здобувачі освіти вбудовують короткі діалоги в розмовному стилі у свої розповіді, використовуючи правильну пунктуацію (правила прямої мови з модуля №73). Зміна регістру: розповідь нейтральна, діалог розмовний.'
      - 'Взаємоперевірка: здобувачі освіти читають розповіді одне одного і визначають: 1. Чи є зачин, основна частина, кінцівка? 2. Чи правильно вжито часи та вид? 3. Чи є рухові дієслова? 4. Чи є художні засоби?'
      - 'Аналіз зразка: здобувачі освіти порівнюють свою розповідь зі зразком і визначають напрямки для вдосконалення.'
  - section: 'Підсумок: розповідь — це мистецтво'
    words: 450
    points:
      - 'Повний довідник наративного інструментарію: структура, час/вид, дієслова руху, дієприкметникові/дієприслівникові звороти, вбудовування діалогу.'
      - 'Самоперевірка українською: 1. Назвіть три частини розповіді. 2. Коли вживаємо теперішній історичний у розповіді? 3. Напишіть три речення з різними рухівними дієсловами. 4. Напишіть розповідь (10-12 речень) про свій вихідний день.'
      - 'Чекліст для редагування наративних текстів: 1. Чи є зачин, основна частина, кінцівка? 2. Чи чергуються НДВ (тло) i ДВ (подія)? 3. Чи є різні рухові дієслова з префіксами? 4. Чи є хоча б один дієприкметниковий/дієприслівниковий зворот? 5. Чи є зв''язкові слова (раптом, потім, нарешті)? 6. Чи є діалог у розмовному стилі? Здобувачі освіти застосовують цей чекліст до власного тексту перед здачею.'
      - 'Українська наративна традиція: оповідання глибоко цінується в українській культурі — від казок до сучасного оповідання. Написання хорошої розповіді — це не лише мовна вправа, а й участь у культурній традиції.'
      - 'Анонс: Аргументація (модуль №86) — від розповіді до аргументації, де структура слугує переконанню, а не оповіді.'
vocabulary_hints:
  required:
    - "розповідь (narrative/story — text about events)"
    - "зачин (beginning/opening — introduction of a narrative)"
    - "кінцівка (ending — conclusion of a narrative)"
    - "зав'язка (inciting incident — event that starts the conflict)"
    - "кульмінація (climax — peak of narrative tension)"
    - "розв'язка (resolution — conclusion of the conflict)"
    - "мікротема (sub-topic — one aspect within a larger text)"
    - "раптом (suddenly — narrative surprise marker)"
    - "тим часом (meanwhile — temporal connector)"
    - "нарешті (finally — sequential connector)"
    - "несподівано (unexpectedly — narrative surprise)"
    - "чернетка (draft — preliminary version of text)"
    - "редагування (editing — revising text)"
  recommended:
    - "водночас (at the same time — simultaneous events)"
    - "зрештою (after all / in the end — concluding connector)"
    - "теперішній історичний (historical present — vivid narrative tense)"
    - "розгортання події (development of events)"
    - "зв'язність (coherence — logical flow of text)"
    - "чистовий варіант (final version — clean copy)"
    - "пряма мова (direct speech — quoted dialogue)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про будову розповіді і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Часи та вид у розповіді».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у речення на тему будови розповіді.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему часів та виду у розповіді.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Будова розповіді».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Часи та вид у розповіді» з їхніми визначеннями.'
connects_to:
  - 'b1-086 (Аргументація — структуроване письмо, інша мета)'
  - 'b1-073 (reported-speech — вбудовування мовлення в розповідь)'
  - 'b1-035 (figurative-motion — метафоричні дієслова руху)'
  - 'b1-091 (b1-finale — підсумковий модуль використовує навички розповіді)'
prerequisites:
  - 'b1-004 до b1-005 (основи часу та виду)'
  - 'b1-027 до b1-037 (фаза дієслів руху)'
  - 'b1-057 до b1-062 (дієприкметники та дієприслівники)'
  - 'b1-073 (reported-speech — правила прямої мови)'
grammar:
  - 'Чергування часів у розповіді: минулий, теперішній історичний, майбутній'
  - 'Чергування виду: НДВ для тла, ДВ для подій'
  - 'Префіксальні дієслова руху в послідовній розповіді'
  - 'Дієприкметникові/дієприслівникові звороти для описового збагачення'
  - 'Структура тексту: зачин, зав''язка, кульмінація, розв''язка, кінцівка'
register: розмовний
references:
  - title: 'Варзацька Grade 4, p.14'
    notes: 'Будова тексту: розповідь, опис, міркування, есе — базові структури тексту, адаптовані для B1.'
  - title: 'Заболотний Grade 5, p.134, 223-226'
    notes: 'Сюжет: зав''язка, кульмінація, розв''язка. Зачин, основна частина, кінцівка. План тексту.'
  - title: 'Заболотний Grade 7, p.54-65'
    notes: 'Часи дієслова, вид дієслова — час і вид для розповідей.'
  - title: 'Авраменко Grade 8, p.28-30'
    notes: 'Есе — структура тексту-думки, що може бути застосована до організації розповіді.'
