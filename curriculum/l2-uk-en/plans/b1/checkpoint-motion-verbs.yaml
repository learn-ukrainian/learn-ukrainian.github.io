title: 'Контрольна точка: Дієслова руху'
subtitle: 'Checkpoint: Motion Verbs'
focus: checkpoint
pedagogy: Checkpoint
phase: B1.2 Motion Verbs Checkpoint
word_target: 4000
objectives:
- Learner can demonstrate mastery of motion verb pairs
- Learner can use all directional prefixes correctly
- Learner can apply figurative motion expressions
- Learner can integrate motion verbs in complex narratives
content_outline:
- section: Вступ та діагностика (Introduction & Diagnostics)
  words: 400
  points:
  - 'Огляд цілей контрольної точки відповідно до Державного стандарту (§4.3.8): перевірка вміння утворювати та вживати префіксальні
    дієслова руху (іти, їхати та їх похідні).'
  - 'Діагностичний тест на знання 14 основних пар дієслів руху: розрізнення односпрямованих та різноспрямованих форм у базовому
    контексті.'
- section: 'Культурний контекст: Метро та Залізниця (Cultural Context: Metro & Railway)'
  words: 800
  points:
  - 'Київський метрополітен як логістичний тренажер: використання станції ''Арсенальна'' (найглибша у світі, 105.5 м) для
    відпрацювання дієслів ''сходити вниз'' та ''підніматися''.'
  - 'Естетика та рух: опис маршруту через станцію ''Золоті ворота'' з використанням дієслів ''заходити'', ''переходити'' (на
    іншу лінію) та ''виходити''.'
  - 'Укрзалізниця та ''Залізні люди'': контекст евакуаційних рейсів 2022 року — вживання дієслів ''виїжджати'', ''покидати'',
    ''рятуватися'' та ''приїжджати''.'
- section: Аналіз та корекція типових помилок (Analysis & Correction of Common Errors)
  words: 800
  points:
  - 'Помилка 1: Односпрямованість vs Характер дії. Виправлення вживання ''йти'' для регулярних дій (напр., ''Я ходжу в офіс
    щодня'' замість помилкового ''Я йду...'').'
  - 'Помилка 2: Транспорт vs Пішки. Чітке розмежування ''їхати'' та ''йти'' (напр., ''Я їду до Львова поїздом'' замість помилкового
    ''Я йду...'').'
  - 'Помилка 3: Відмінок напрямку. Закріплення знахідного відмінка для позначення цілі руху (§4.2.2.4) проти помилкового використання
    місцевого (''йти в магазин'' vs ''йти в магазині'').'
- section: 'Префіксальна логіка: Простір та Напрямок (Prefix Logic: Space & Direction)'
  words: 800
  points:
  - 'Диференціація префіксів ''Ви-'' та ''Від-'': вихід із приміщення (вийти з дому) проти віддалення від об''єкта (відійти
    від вікна).'
  - 'Просторові відношення: ''Переходити'' (через вулицю/межу) vs ''Обходити'' (навколо перешкоди/калюжі) — вправи на основі
    реальних мап Києва.'
  - 'Динаміка наближення: використання ''Підходити'' та ''Доїжджати'' для опису завершальної фази маршруту.'
- section: Переносні значення та ідіоматика (Figurative Meanings & Idioms)
  words: 800
  points:
  - 'Метафоричне вживання префіксів: ''виходити заміж'', ''виходити на зв''язок'', ''переходити на українську'' (мовна трансформація).'
  - 'Ідіоми часу та успіху: аналіз виразів ''час іде/біжить/летить'', ''справа йде на лад'' та ''далеко піти'' (досягти успіху).'
  - 'Абстрактний рух: вживання ''приходити на думку'' та ''ходити по руках'' (про популярні речі/книги).'
- section: Підсумок та інтеграційний наратив (Summary & Integrated Narrative)
  words: 400
  points:
  - 'Створення комплексного тексту ''Мій маршрут'': опис щоденної подорожі з використанням мінімум 10 різних префіксальних
    дієслів руху.'
  - 'Фінальне оцінювання: здатність інтегрувати граматичні знання (відмінки + аспект + префікси) у зв''язну розповідь про
    подорож або логістику.'
vocabulary_hints:
  required:
  - йти пішки (to walk) — вживається для пересування власними ногами, не транспортом
  - їхати автобусом/поїздом (to go by bus/train) — вимагає орудного відмінка для виду транспорту
  - приходити вчасно (to arrive on time) — ключова професійна колокація
  - переходити вулицю (to cross the street) — прямий додаток у знахідному відмінку
  - виходити з дому (to leave the house) — використання прийменника 'з' + родовий відмінок
  - дощ іде (it is raining) — безособове вживання дієслова руху
  - час іде/біжить (time passes/flies) — поширені метафори
  recommended:
  - виходити на зв'язок (to get in touch) — часто вживається у професійному контексті
  - приходити на думку (to occur to someone) — абстрактне значення руху
  - далеко піти (to go far / achieve success) — ідіома для опису кар'єрного росту
  - сходити вниз (to go down) — контекст метро (ескалатор)
  - переходити на українську (to switch to Ukrainian) — важливий соціолінгвістичний контекст
