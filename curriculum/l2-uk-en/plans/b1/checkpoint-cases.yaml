module: b1-063
level: B1
sequence: 63
slug: checkpoint-cases
version: '3.1.2'
title: "Контрольна робота 5"
subtitle: "Перевірка знань: розширені відмінки, прийменники, числівники, займенники, житло"
focus: review
pedagogy: PPP
phase: "B1.5 [Нюанси відмінків та прийменники]"
word_target: 4000
objectives:
  - "Вміти правильно вживати складні випадки родового (частковий, заперечення, дати, -а/-я чи -у/-ю), давального (суб'єкт стану, вік, безособові) та орудного (характеристика, засіб, шлях, агент пасиву) відмінків."
  - "Навчитися правильно використовувати часові (через, за, перед, після, протягом) та причиново-цільові прийменники (через, завдяки, для, заради, щоб)."
  - "Вміти використовувати кличний відмінок в офіційних контекстах з іменами по батькові та посадами."
  - "Навчитися відмінювати порядкові та кількісні числівники, узгоджувати кількісні вирази з іменниками та доречно вживати збірні числівники."
  - "Вміти використовувати питальні, неозначені, заперечні та зворотні займенники з правильним написанням, формами відмінків і розділенням прийменників."
dialogue_situations:
  - setting: 'Презентація на університетському семінарі — студент розповідає про українські міста, використовуючи всі нюанси відмінків: Для мешканців Києва (Р.в.). Завдяки інвестиціям (Д.в.). Славиться архітектурою (Ор.в.). У центрі міста (М.в.). Пане професоре! (Кл.в.)'
    speakers:
      - Студент
      - Професор
    motivation: 'Закріплення: частковий родовий, давальний суб''єкта стану, орудний характеристики, офіційний кличний'
content_outline:
  - section: "Повторення: відмінки"
    words: 800
    points:
      - 'Повторення родового відмінка — п''ять семантичних ролей: 1. Частковий: склянка води, багато часу. 2. Бажання/пошуку: шукати правди, бажати щастя. 3. Заперечення: немає часу, не бачив друга. 4. Дати: п''ятнадцятого березня, цього тижня. 5. -а/-я чи -у/-ю: стола чи часу (семантичні категорії). Практика: 12 речень, що вимагають правильного вживання Р.в.'
      - 'Повторення давального відмінка — чотири семантичні ролі: 1. Суб''єкт стану: мені холодно, тобі не спиться. 2. Вік: мені двадцять років. 3. Безособові: потрібно, варто, вдалося, довелося. 4. Адресат: допомагати другові, телефонувати лікарю. Практика: 10 речень, що вимагають правильного вживання Д.в.'
      - 'Повторення орудного відмінка — п''ять семантичних ролей: 1. Характеристика: працювати лікарем, стати вчителькою. 2. Засіб: писати ручкою, їхати автобусом. 3. Шлях: іти вулицею, їхати дорогою. 4. Керування: захоплюватися, цікавитися, пишатися. 5. Агент пасиву: написано автором. Практика: 10 речень, що вимагають правильного вживання Ор.в.'
  - section: "Повторення: прийменники"
    words: 700
    points:
      - 'Довідник часових прийменників: через + Зн.в., за + Зн.в., перед + Ор.в., після + Р.в., до + Р.в., під час + Р.в., протягом + Р.в., на + Зн.в.'
      - 'Довідник причиново-цільових прийменників: Причина: через, завдяки, від, з, внаслідок, у зв''язку з. Мета: для, заради, за + Ор.в., щоб + інфінітив. Золоте правило: завдяки = ДОБРЕ, через = ПОГАНО. Складені: через те що, завдяки тому що, для того щоб. Практика: 12 змішаних речень на вибір правильного прийменника та відмінка.'
  - section: "Повторення: кличний, числівники, займенники"
    words: 700
    points:
      - 'Кличний відмінок в офіційних контекстах: ім''я + по батькові: Іване Петровичу, Маріє Степанівно. Посада + прізвище: лікарю Петренко (тільки перше слово в Кл.в.). Практика: утворити правильний кличний відмінок для 8 ситуацій офіційного звертання.'
      - 'Числівники: відмінювання порядкових, узгодження кількісних (1 + Н.в., 2-4 + Н.в.мн., 5+ + Р.в.мн.), збірні числівники (двоє, троє + Р.в.мн.), дати (Р.в.) та час (о + М.в., за десять хвилин). Практика: 10 вправ на використання числівників.'
      - 'Займенники: питально-відносні (хто, який, чий — відмінювання), зворотний (себе/собі/собою), неозначені (хтось, будь-хто, -небудь), заперечні (ніхто, ніщо — розділення прийменників: ні з ким), означальні (кожний, весь/увесь, сам, інший). Дроби: половина, третина, чверть + Р.в., півтора/півтори. Практика: 12 вправ на займенники та числівники з правильним написанням, відмінком та узгодженням.'
  - section: "Комплексні завдання"
    words: 1000
    points:
      - 'Аналіз тексту: стаття з української газети про житло в місті. Завдання: визначити всі випадки вживання відмінків, прийменників, числівників та займенників. Відповісти на питання для розуміння, що вимагають правильної граматики у відповідях.'
      - 'Блок виправлення помилок: 12-15 речень зі змішаними помилками з усіх тем Фази 6 — неправильний відмінок, неправильний прийменник, помилки в узгодженні, написання займенників, помилки в кличному відмінку, росіянізми у виразах часу та причини. Кожну помилку потрібно знайти, класифікувати та виправити.'
      - 'Продуктивне завдання: написати офіційний електронний лист орендодавцеві з описом своїх потреб у житлі, запитати про наявність та обговорити умови. Потрібно включити: звертання в кличному відмінку, відмінкові конструкції, часові прийменники, вирази причини та мети, кількісні вирази. Надається рубрика для самооцінювання.'
      - 'Реконструкція діалогу: впорядкувати репліки переговорів щодо житла, заповнюючи пропущені відмінкові форми, прийменники та узгодження числівників.'
  - section: "Самооцінка та підготовка до Фази 7"
    words: 500
    points:
      - 'Таблиця самоперевірки для всіх тем Фази 6: Чи можу я використовувати Р.в. для частковості, заперечення, дат? ___ Чи можу я використовувати Д.в. для суб''єкта стану, віку, безособових дієслів? ___ Чи можу я використовувати Ор.в. для характеристики, засобу, шляху? ___ Чи можу я утворювати кличний відмінок для офіційного звертання? ___ Чи можу я відмінювати та узгоджувати числівники? ___ Чи можу я використовувати неозначені та заперечні займенники? ___ Чи можу я вибирати правильні часові та причиново-цільові прийменники? ___'
      - 'Аналіз прогалин: які теми потребують більше практики? Огляд Фази 7: дієприкметники і дієприслівники. Перехід від точного ВИКОРИСТАННЯ відмінків до ПОБУДОВИ складних означень.'
      - 'Діагностика: 15 запитань для швидкої перевірки, що охоплюють усі теми Фази 6, з ключем до відповідей та поясненнями.'
  - section: "Підсумок"
    words: 300
    points:
      - 'Підсумок досягнень Фази 6: поглиблене вживання відмінків, офіційний кличний відмінок з іменами по батькові та посада + прізвище, часові та причиново-цільові прийменники, відмінювання порядкових і кількісних числівників із дробами, повна система займенників. Це базові елементи для Фази 7 та Фази 8, де точне знання відмінків стає надзвичайно важливим.'
      - 'Перехід до Фази 7: дієприкметники вимагають точного узгодження відмінків — дієприкметник узгоджується з іменником у роді, числі ТА відмінку. Усі знання про відмінки з Фази 6 стають фундаментом для побудови складних означень.'
