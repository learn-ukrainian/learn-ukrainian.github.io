module: b1-052
level: B1
sequence: 52
slug: checkpoint-cases
version: '3.1'
title: "Контрольна робота 5"
subtitle: "Перевірка знань: розширені відмінки, прийменники, числівники, займенники,
  житло"
focus: review
pedagogy: PPP
phase: "B1.5 [Advanced Case Usages & Prepositions]"
word_target: 4000
objectives:
  - "Learner can demonstrate mastery of advanced genitive (partitive, negation, dates,
    -а/-я vs -у/-ю), dative (experiencer, age, impersonal), and instrumental (characterisation,
    means, path, agent) usage"
  - "Learner can correctly use temporal prepositions (через, за, перед, після, протягом)
    and cause/purpose prepositions (через, завдяки, для, заради, щоб)"
  - "Learner can use vocative in formal contexts with patronymics and titles"
  - "Learner can decline ordinal and cardinal numerals, agree quantity expressions
    with nouns, and use collective numerals appropriately"
  - "Learner can use interrogative, indefinite, negative, and reflexive pronouns with
    correct spelling, case forms, and preposition splitting"
dialogue_situations:
  - setting: 'University seminar presentation — student presents on Ukrainian cities
      using all case nuances: Для мешканців Києва (gen). Завдяки інвестиціям (dat).
      Славиться архітектурою (inst). У центрі міста (loc). Пане професоре! (voc)'
    speakers:
      - Студент (presenting)
      - Професор (questioning)
    motivation: 'Consolidation: partitive gen, experiencer dat, instrumental characterization,
      formal voc'
content_outline:
  - section: "Повторення: відмінки"
    words: 800
    points:
      - "Genitive review — five semantic roles: 1. Частковий: склянка води, багато
        часу. 2. Бажання/пошуку: шукати правди, бажати щастя. 3. Заперечення: немає
        часу, не бачив друга. 4. Дати: п'ятнадцятого березня, цього тижня. 5. -а/-я
        vs -у/-ю: стола vs часу (semantic categories). Drill: 12 sentences requiring
        correct Р.в. usage."
      - "Dative review — four semantic roles: 1. Суб'єкт стану: мені холодно, тобі
        не спиться. 2. Вік: мені двадцять років. 3. Безособові: потрібно, варто, вдалося,
        довелося. 4. Адресат: допомагати другові, телефонувати лікарю. Drill: 10 sentences
        requiring correct Д.в. usage."
      - "Instrumental review — five semantic roles: 1. Характеристика: працювати лікарем,
        стати вчителькою. 2. Засіб: писати ручкою, їхати автобусом. 3. Шлях: іти вулицею,
        їхати дорогою. 4. Керування: захоплюватися, цікавитися, пишатися. 5. Агент
        пасиву: написано автором. Drill: 10 sentences requiring correct Ор.в. usage."
  - section: "Повторення: прийменники"
    words: 700
    points:
      - "Temporal prepositions reference: через + Зн.в. (after period), за + Зн.в.
        (within period), перед + Ор.в. (before), після + Р.в. (after), до + Р.в. (until),
        під час + Р.в. (during), протягом + Р.в. (throughout), на + Зн.в. (for duration)."
      - "Cause/purpose prepositions reference: Cause: через (neg.), завдяки (pos.),
        від (reaction), з (motivation), внаслідок (formal result), у зв'язку з (formal
        connection). Purpose: для, заради, за + Ор.в. (fetch), щоб + inf. Golden rule:
        завдяки = GOOD, через = BAD. Compound: через те що, завдяки тому що, для того
        щоб. Drill: 12 mixed sentences choosing correct preposition + case."
  - section: "Повторення: кличний, числівники, займенники"
    words: 700
    points:
      - "Vocative in formal contexts: ім'я + по батькові: Іване Петровичу, Маріє Степанівно.
        Title + прізвище: лікарю Петренко (тільки перше в Кл.в.). Practice: form correct
        vocative for 8 formal address scenarios."
      - "Numerals: ordinal declension (like adjectives, compound — last word only),
        cardinal agreement (1 + Н.в., 2-4 + Н.в.мн., 5+ + Р.в.мн.), collective numerals
        (двоє, троє + Р.в.мн.), dates (Р.в.) and time (о + М.в., за десять хвилин).
        Drill: 10 numeral usage exercises."
      - "Pronouns: interrogative-relative (хто, який, чий — declension), reflexive
        (себе/собі/собою), indefinite (хтось, будь-хто, -небудь), negative (ніхто,
        ніщо — preposition splits: ні з ким), означальні (кожний, весь/увесь, сам,
        інший). Fractions: половина, третина, чверть + Р.в., півтора/півтори. Drill:
        12 pronoun and numeral exercises with spelling, case, and agreement."
  - section: "Комплексні завдання"
    words: 1000
    points:
      - "Text analysis: a Ukrainian newspaper article about housing in a city. Tasks:
        identify all case usages, prepositions, numerals, and pronouns. Answer comprehension
        questions requiring correct grammar in responses."
      - "Error correction block: 12-15 sentences with mixed errors across ALL Phase
        6 topics — wrong case, wrong preposition, agreement errors, pronoun spelling,
        vocative mistakes, Russicisms in time/cause expressions. Each error must be
        identified, categorised, and corrected."
      - "Production task: write a formal email to a landlord describing your housing
        needs, asking about availability, and negotiating terms. Must include: vocative
        address, case constructions, temporal prepositions, cause/purpose expressions,
        quantity expressions. Self-assessment rubric provided."
      - "Dialogue reconstruction: rearrange lines of a housing negotiation, filling
        in missing case forms, prepositions, and numeral agreements."
  - section: "Самооцінка та підготовка до Фази 7"
    words: 500
    points:
      - "Self-check grid for all Phase 6 topics: Can I use Р.в. for partitive, negation,
        dates? ___ Can I use Д.в. for experiencer, age, impersonal? ___ Can I use
        Ор.в. for characterisation, means, path? ___ Can I form vocative for formal
        address? ___ Can I decline and agree numerals? ___ Can I use indefinite and
        negative pronouns? ___ Can I choose correct temporal and cause/purpose prepositions?
        ___"
      - "Gap analysis: which areas need more practice? Preview of Phase 7: дієприкметники
        і дієприслівники (participles and gerunds). The shift from USING cases precisely
        to BUILDING complex modifiers."
      - "Diagnostic: 15 quick-check questions covering all Phase 6 topics, with answer
        key and explanations."
  - section: "Підсумок"
    words: 300
    points:
      - "Phase 6 achievement summary: advanced case usage (genitive with 15+ prepositions,
        dative of experiencer and purpose, instrumental with 8+ prepositions and manner),
        formal vocative with patronymics and profession + name, temporal and cause/purpose
        prepositions, ordinal and cardinal numeral declension with fractions, complete
        pronoun system (indefinite, negative, definitive, reflexive). These are the
        building blocks for Phase 7 (participles) and Phase 8 (complex syntax), where
        precise case knowledge becomes essential."
      - "Transition to Phase 7: дієприкметники (participles) require precise case
        agreement — a дієприкметник agrees with its noun in gender, number, AND case.
        All the case knowledge from Phase 6 becomes the foundation for building complex
        modifiers."
