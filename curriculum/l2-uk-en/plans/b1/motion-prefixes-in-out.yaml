module: b1-031
level: B1
sequence: 31
slug: motion-prefixes-in-out
version: '3.0'
title: Зайти, вийти
subtitle: Префікси за- (входження/забігання) та ви- (вихід) з дієсловами руху
focus: grammar
pedagogy: PPP
phase: B1.4 [Motion Verb Universe]
word_target: 4000
objectives:
- Learner can explain the semantic difference between за- (entering briefly, dropping by, going behind) and ви- (exiting,
  going out) with motion verbs
- Learner can form and conjugate prefixed motion verbs with за- and ви- (зайти, заїхати, забігти, занести, завести, завезти;
  вийти, виїхати, вибігти, винести, вивести, вивезти)
- Learner can use за-/ви- motion verbs with correct prepositions and cases (зайти в/до + Р.в./Зн.в., вийти з/із + Р.в.)
- 'Learner can distinguish за- in motion verbs (entering/dropping by) from за- in non-motion verbs (beginning an action: заспівати,
  засміятися)'
dialogue_situations:
- setting: 'First day at a Львівський офіс (m, Lviv office) — navigating the building:
    Зайдіть (enter) у кабінет (m, office room) директора. Вийдіть (exit) через бічний
    вхід (m, side entrance). Вона заїхала (drove into) на парковку (f, parking lot).'
  speakers:
  - Секретар
  - Новий працівник
  motivation: 'In/out prefixes: зайти (за-), вийти (ви-), заїхати (за-), виїхати (ви-)'
content_outline:
- section: 'Входити i виходити: за- та ви- (Entering and exiting)'
  words: 550
  points:
  - 'Bridge from M29-M30: learners know arrival (при-/до-) and departure (пі-/по-, від-). Now we zoom in: what happens when
    you go INTO a building or OUT OF a space? The prefixes за- and ви- handle this.'
  - 'Reading passage: a busy morning — someone заходить до кав''ярні, виходить з дому, забігає до магазину, виїжджає з двору.
    Learners encounter both prefixes in natural sequence.'
  - 'Important: за- with motion verbs is not the same as за- meaning ''beginning'' (заспівати = start singing, засміятися
    = start laughing). With motion verbs, за- means entering or briefly dropping by.'
- section: 'Префікс за-: увійти, забігти, заскочити (Prefix за-: entering, dropping by)'
  words: 900
  points:
  - 'За- meaning ''entering'' or ''going into'': зайти (to go in, enter): Зайди в хату, холодно надворі. заїхати (to drive
    in/into): Машина заїхала у двір. забігти (to run in briefly): Забіг до магазину по хліб. залетіти (to fly in): Птах залетів
    у вікно. заплисти (to swim into): Човен заплив у затоку.'
  - 'За- meaning ''dropping by'' (a brief, incidental stop): Зайду до тебе після роботи (I''ll drop by your place after work).
    Заїдемо до заправки по дорозі (We''ll stop by the gas station on the way). Забіжи до аптеки (Pop into the pharmacy quickly).
    This ''dropping by'' meaning is extremely common in everyday speech.'
  - 'Carrying/leading/transporting in: занести (to carry in): Занеси парасолю в дім. завести (to bring someone in): Завів
    гостей до кімнати. завезти (to deliver by vehicle): Завезли меблі на склад. Full conjugation of зайти: зайду, зайдеш,
    зайде, зайдемо, зайдете, зайдуть. Past: зайшов, зайшла, зайшло, зайшли.'
  - 'Imperfective counterparts: заходити (to enter/come in — repeated): Заходьте, будь ласка! заїжджати (to drive in — habitual):
    Вона заїжджає щодня. забігати (to run in — habitual): Сусід забігає ввечері. заносити (to carry in — habitual): Заносьте
    речі в кімнату. 8-10 example sentences.'
- section: 'Префікс ви-: вийти, виїхати, вибігти (Prefix ви-: exiting)'
  words: 900
  points:
  - 'Ви- means going out of, exiting, emerging: вийти (to go out, exit): Вийшла з будинку на вулицю. виїхати (to drive out):
    Машина виїхала з гаража. вибігти (to run out): Діти вибігли з класу на перерву. вилетіти (to fly out): Птах вилетів з
    клітки. виплисти (to swim out): Виплив з печери.'
  - 'Extended meanings of ви-: вийти з ситуації (to get out of a situation). вийти заміж (to get married — for a woman, literally
    ''go out behind''). виїхати з країни (to leave the country). вийти на зв''язок (to get in touch/contact).'
  - 'Carrying/leading/transporting out: винести (to carry out): Виненси сміття, будь ласка. вивести (to lead out): Вивела
    дитину на подвір''я. вивезти (to transport out): Вивезли відходи з міста. Full conjugation of вийти: вийду, вийдеш, вийде,
    вийдемо, вийдете, вийдуть. Past: вийшов, вийшла, вийшло, вийшли.'
  - 'Imperfective counterparts: виходити (to go out — repeated/process): Виходьте по одному! виїжджати (to drive out — habitual):
    Щоранку виїжджаємо о сьомій. вибігати (to run out — habitual): Діти вибігають після дзвінка. виносити (to carry out —
    habitual): Виносьте сміття щодня. 8-10 example sentences.'
- section: За- чи ви-? Пари протилежностей (За- or ви-? Opposite pairs)
  words: 800
  points:
  - 'За- and ви- are spatial opposites: зайти в кімнату (enter) ↔ вийти з кімнати (exit). заїхати у двір (drive in) ↔ виїхати
    з двору (drive out). забігти до магазину (run in) ↔ вибігти з магазину (run out). занести в дім (carry in) ↔ винести з
    дому (carry out).'
  - 'Preposition patterns: за- + в/у + Зн.в.: зайшов у магазин (entered the store). за- + до + Р.в.: зайшов до друга (dropped
    by a friend''s). ви- + з/із + Р.в.: вийшов з магазину (exited the store). ви- + на + Зн.в.: вийшов на вулицю (went out
    to the street).'
  - 'The full prefix system so far (M29-M31): при-/до- (arrival/reaching) → пі-/по- (departure/setting off) → від- (moving
    away) → за- (entering) → ви- (exiting). Learners can now describe complete journey segments: Вийшов з дому → зайшов до
    магазину → вийшов з магазину → пішов до зупинки → поїхав на роботу → приїхав на роботу.'
  - '6-8 practice scenarios: learners choose за- or ви- and supply the correct preposition with case.'
- section: 'Практика: за- i ви- в повсякденному житті (Practice: за- and ви- in daily life)'
  words: 550
  points:
  - 'Dialogue: a phone conversation about errands — ''Де ти?'' ''Зайшов до аптеки.'' ''А потім?'' ''Вийду i зайду ще до пошти.''
    Learners see natural chains of за-/ви- in daily speech.'
  - 'Narrative: describe a sequence of errands using за-/ви- verbs. Model: Вийшла з офісу о п''ятій. Зайшла до супермаркету.
    Вийшла, забігла до хімчистки. Вийшла i пішла додому.'
- section: 'Підсумок: за- i ви- (Summary)'
  words: 350
  points:
  - 'Complete table: за- and ви- with all base verbs. за-: зайти, заїхати, забігти, занести, завести, завезти, залетіти, заплисти.
    ви-: вийти, виїхати, вибігти, винести, вивести, вивезти, вилетіти, виплисти. With imperfective pairs.'
  - 'Preview of M32: Перейти, проїхати — crossing and passing through. The prefix system continues to map more spatial movements.'
vocabulary_hints:
  required:
  - зайти (to enter / drop by — perfective)
  - заїхати (to drive in / stop by — perfective)
  - забігти (to run in briefly — perfective)
  - занести (to carry in — perfective)
  - вийти (to exit / go out — perfective)
  - виїхати (to drive out — perfective)
  - вибігти (to run out — perfective)
  - винести (to carry out — perfective)
  - заходити (to enter — imperfective)
  - виходити (to exit — imperfective)
  - заїжджати (to drive in — imperfective)
  - виїжджати (to drive out — imperfective)
  recommended:
  - завести (to bring someone in — perfective)
  - завезти (to deliver — perfective)
  - вивести (to lead out — perfective)
  - вивезти (to transport out — perfective)
  - залетіти (to fly in — perfective)
  - вилетіти (to fly out — perfective)
  - заносити (to carry in — imperfective)
  - виносити (to carry out — imperfective)
  - кав'ярня (cafe)
  - двір (courtyard/yard)
activity_hints:
- type: quiz
  focus: Choose за- or ви- verb based on whether movement is into or out of a space
  items: 8
- type: fill-in
  focus: Complete errand narrative sentences with correct за-/ви- verbs and prepositions
  items: 8
- type: match-up
  focus: Match за- verbs with their ви- opposites (зайти↔вийти)
  items: 8
- type: group-sort
  focus: 'Sort prefixed verbs: при-/до- (arrival) vs пі-/по-/від- (departure) vs за- (in) vs ви- (out)'
  items: 12
- type: error-correction
  focus: Fix preposition and case errors with за-/ви- motion verbs
  items: 6
- type: free-write
  focus: Describe a morning routine with at least 4 за- and 4 ви- verbs
  items: 1
