grammar:
- 'Prefix за- with motion verbs: entering and dropping by'
- 'Prefix ви- with motion verbs: exiting and going out'
- 'Aspectual pairs: заходити/зайти, виходити/вийти'
- 'Prepositions: за- + в/у + Зн.в. or до + Р.в.; ви- + з/із + Р.в. or на + Зн.в.'
- Distinguishing за- motion (entering) from за- inchoative (beginning)
