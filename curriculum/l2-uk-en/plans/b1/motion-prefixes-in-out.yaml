activity_hints:
  - type: quiz
    focus: 'Виберіть дієслово із за- або ви- залежно від того, чи це рух всередину, чи назовні простору'
    items: 8
  - type: fill-in
    focus: 'Доповніть речення про щоденні справи правильними дієсловами на за-/ви- та прийменниками'
    items: 8
  - type: match-up
    focus: "З'єднайте дієслова із за- з їхніми протилежностями на ви- (зайти↔вийти)"
    items: 8
  - type: group-sort
    focus: 'Відсортуйте префіксальні дієслова: при-/до- (прибуття) проти пі-/по-/від- (відправлення) проти за- (вхід) проти ви- (вихід)'
    items: 12
  - type: error-correction
    focus: 'Виправте помилки з прийменниками та відмінками в дієсловах руху із за-/ви-'
    items: 6
  - type: free-write
    focus: 'Опишіть ранкову рутину, використовуючи щонайменше 4 дієслова із за- та 4 дієслова з ви-'
    items: 6
