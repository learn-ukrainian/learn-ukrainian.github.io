module: b1-038
level: B1
sequence: 38
slug: motion-prefixes-in-out
version: '3.1.3'
title: "Зайти, вийти"
subtitle: "Префікси за- (входження/забігання) та ви- (вихід) з дієсловами руху"
focus: grammar
pedagogy: PPP
phase: "B1.3 [Всесвіт дієслів руху]"
word_target: 4000
objectives:
  - "Учень вміє пояснювати семантичну різницю між за- (входження, забігання) та ви- (вихід) з дієсловами руху."
  - "Учень вміє утворювати та відмінювати префіксальні дієслова руху із за- та ви- (зайти, заїхати, забігти, занести, завести, завезти; вийти, виїхати, вибігти, винести, вивести, вивезти)."
  - "Учень вміє використовувати дієслова руху із за-/ви- з правильними прийменниками та відмінками (зайти в/до + Р.в./Зн.в., вийти з/із + Р.в.)."
  - "Учень вміє розрізняти за- в дієсловах руху (входження/забігання) від за- в інших дієсловах (початок дії: заспівати, засміятися)."
dialogue_situations:
  - setting: 'Перший день у львівському офісі — навігація по будівлі: Зайдіть у кабінет директора. Вийдіть через бічний вхід. Вона заїхала на парковку.'
    speakers:
      - Секретар
      - Новий працівник
    motivation: 'Префікси входу/виходу: зайти (за-), вийти (ви-), заїхати (за-), виїхати (ви-)'
content_outline:
  - section: "Входити і виходити: за- та ви-"
    words: 550
    points:
      - "Перехід від модулів №29–30: учні знають прибуття (при-/до-) та відправлення (пі-/по-, від-). Тепер ми деталізуємо: що відбувається, коли ви заходите В будівлю або виходите З приміщення? За це відповідають префікси за- та ви-."
      - "Читання: насичений ранок — хтось заходить до кав'ярні, виходить з дому, забігає до магазину, виїжджає з двору. Учні стикаються з обома префіксами в природній послідовності."
      - "Важливо: за- з дієсловами руху — це не те саме, що за- зі значенням 'початок' (заспівати = почати співати, засміятися = почати сміятися). З дієсловами руху за- означає вхід або короткочасне забігання кудись."
  - section: "Префікс за-: увійти, забігти, заскочити"
    words: 900
    points:
      - "За- у значенні 'входити' або 'заходити': зайти (увійти): Зайди в хату, холодно надворі. заїхати (заїхати кудись): Машина заїхала у двір. забігти (забігти на короткий час): Забіг до магазину по хліб. залетіти (залетіти всередину): Птах залетів у вікно. заплисти (заплисти кудись): Човен заплив у затоку."
      - "За- у значенні 'заскочити' (коротка, побіжна зупинка): Зайду до тебе після роботи (Я зайду до тебе ненадовго після роботи). Заїдемо до заправки по дорозі (Ми зупинимося на заправці). Забіжи до аптеки (Швидко заскоч до аптеки). Це значення надзвичайно поширене в повсякденній мові."
      - "Перенесення/спрямовування/транспортування всередину: занести (занести всередину): Занеси парасолю в дім. завести (завести когось): Завів гостей до кімнати. завезти (завезти щось): Завезли меблі на склад. Повне відмінювання зайти: зайду, зайдеш, зайде, зайдемо, зайдете, зайдуть. Минулий час: зайшов, зайшла, зайшло, зайшли."
      - "Форми недоконаного виду: заходити (входити — регулярно): Заходьте, будь ласка! заїжджати (заїжджати — регулярно): Вона заїжджає щодня. забігати (забігати — регулярно): Сусід забігає ввечері. заносити (заносити — регулярно): Заносьте речі в кімнату. 8-10 речень-прикладів."
  - section: "Префікс ви-: вийти, виїхати, вибігти"
    words: 900
    points:
      - "Ви- означає вихід звідкись, з'явлення назовні: вийти (вийти назовні): Вийшла з будинку на вулицю. виїхати (виїхати звідкись): Машина виїхала з гаража. вибігти (вибігти геть): Діти вибігли з класу на перерву. вилетіти (вилетіти звідкись): Птах вилетів з клітки. виплисти (виплисти назовні): Виплив з печери."
      - "Розширені значення ви-: вийти з ситуації. вийти заміж (для жінки). виїхати з країни. вийти на зв'язок."
      - "Перенесення/спрямовування/транспортування назовні: винести (винести назовні): Винеси сміття, будь ласка. вивести (вивести когось): Вивела дитину на подвір'я. вивезти (вивезти геть): Вивезли відходи з міста. Повне відмінювання вийти: вийду, вийдеш, вийде, вийдемо, вийдете, вийдуть. Минулий час: вийшов, вийшла, вийшло, вийшли."
      - "Форми недоконаного виду: виходити (виходити — регулярно/процес): Виходьте по одному! виїжджати (виїжджати — регулярно): Щоранку виїжджаємо о сьомій. вибігати (вибігати — регулярно): Діти вибігають після дзвінка. виносити (виносити — регулярно): Виносьте сміття щодня. 8-10 речень-прикладів."
  - section: "За- чи ви-? Пари протилежностей"
    words: 800
    points:
      - "За- та ви- є просторовими протилежностями: зайти в кімнату (вхід) ↔ вийти з кімнати (вихід). заїхати у двір (в'їзд) ↔ виїхати з двору (виїзд). забігти до магазину (вбігти) ↔ вибігти з магазину (вибігти). занести в дім (внесення) ↔ винести з дому (винесення)."
      - "Моделі прийменників: за- + в/у + Зн.в.: зайшов у магазин. за- + до + Р.в.: зайшов до друга. ви- + з/із + Р.в.: вийшов з магазину. ви- + на + Зн.в.: вийшов на вулицю."
      - "Повна система префіксів на цей час (модулі №29–31): при-/до- (прибуття/досягнення) → пі-/по- (відправлення/вирушання) → від- (віддалення) → за- (вхід) → ви- (вихід). Учні тепер можуть описати повні сегменти подорожі: Вийшов з дому → зайшов до магазину → вийшов з магазину → пішов до зупинки → поїхав на роботу → приїхав на роботу."
      - "6-8 практичних сценаріїв: учні вибирають за- або ви- та додають правильний прийменник із відмінком."
  - section: "Практика: за- і ви- в повсякденному житті"
    words: 550
    points:
      - "Діалог: телефонна розмова про справи — 'Де ти?' 'Зайшов до аптеки.' 'А потім?' 'Вийду і зайду ще до пошти.' Учні бачать природні ланцюжки за-/ви- у щоденному мовленні."
      - "Розповідь: описати послідовність справ за допомогою дієслів із за-/ви-. Зразок: Вийшла з офісу о п'ятій. Зайшла до супермаркету. Вийшла, забігла до хімчистки. Вийшла і пішла додому."
      - "Видові пари в дії: зайти (док) / заходити (недок), вийти (док) / виходити (недок). Порівняйте: Я зайшов до магазину (одноразова подія). Я часто заходжу до цього магазину (регулярна подія). Вона вийшла о п'ятій (завершений вихід). Вона зазвичай виходить о шостій (рутина). Учні практикуються у виборі виду на основі контексту: разова подія проти повторюваної дії."
      - "Практика виправлення помилок: поширені помилки з комбінаціями за-/ви- та прийменників. *Зайшов у друга (неправильно — має бути до друга). *Вийшов від магазину (неправильно — має бути з магазину). *Забіг у пошту (має бути до пошти або на пошту). Учні виправляють 6-8 речень і пояснюють кожну помилку."
  - section: "Підсумок: за- і ви-"
    words: 350
    points:
      - "Повна таблиця: за- та ви- з усіма базовими дієсловами. за-: зайти, заїхати, забігти, занести, завести, завезти, залетіти, заплисти. ви-: вийти, виїхати, вибігти, винести, вивести, вивезти, вилетіти, виплисти. З парами недоконаного виду."
      - "Анонс модуль №32: Перейти, проїхати — перетин і проходження повз. Система префіксів продовжує картографувати нові просторові переміщення."
