  - "Префікс ви- з дієсловами руху: вихід і рух назовні"
  - "Видові пари: заходити/зайти, виходити/вийти"
  - "Прийменники: за- + в/у + Зн.в. або до + Р.в.; ви- + з/із + Р.в. або на + Зн.в."
  - "Розрізнення за- як дієслова руху (вхід) від за- як початку дії (початок)"
