module: b1-23
level: B1
sequence: 23
slug: motion-patterns-other-verbs
version: '2.0'
title: Префікси руху в інших дієсловах
subtitle: Motion prefixes in non-motion verbs
content_outline:
- section: Тест
  points: []
- section: Пояснення
  points:
  - '1. Універсальна логіка префіксів — use ''Atomic'' visual metaphor: cutting verbs
    into atoms (e.g., пере-писати = re-write)'
  - '2. ПРИ- : Досягнення результату та приєднання — focus on ''joining'' logic (приєднатися
    to group/conversation)'
  - '3. ВИ- : Результат "назовні" та вичерпність — cultural hook: ''working until
    the end'' (випрацювати, вивчити); implies extracting result'
  - '4. ПЕРЕ- : Зміна, повторення та надмірність — cultural hook: proverb ''Життя
    прожити — не поле перейти'' (overcoming/process)'
  - '5. ЗА- : Початок дії та заглиблення — cultural hook: folk song ''Засвіт встали
    козаченьки'' (sudden start/inchoative); learner error: confusing start point with
    duration'
  - '6. ВІД- : Реакція та скасування — learner error: confusing spatial ''away'' with
    abstract ''response/return'' (відповісти = re-ply)'
  - '7. ПІД- : Підтримка та прихованість — context: professional approach (підійшли
    до вирішення)'
  - 8. Пристосування та Звички (ПРИ- vs З-) — contrast adding to self vs changing
    state
- section: Практика
  points:
  - 'Аналіз слів: Розрізаємо на атоми — visual exercise identifying prefix contribution
    to meaning'
  - 'Полісемія: Коли один префікс має багато облич — contrast physical vs abstract
    meanings'
- section: Діалоги
  points:
  - 'Діалог 1: Співбесіда (Вживання ВИ-, ПІД-, ВІД-) — focus on achievement (виконали
    план) and professional support'
  - 'Діалог 2: Ремонт у квартирі (Вживання ПЕРЕ-, З-) — focus on redoing (переробити)
    and connecting'
  - 'Діалог 3: Емоційна драма (Вживання ЗА-, РОЗ-, ВІД-) — focus on divergence (роз-)
    vs convergence (з-) and emotional reactions'
- section: Потрібно більше практики?
  points:
  - Інтеграція знань
  - Реальне застосування
  - Онлайн-ресурси
  - 📝 Практичне завдання
vocabulary_hints:
  required:
  - приготувати (to prepare) — приготувати вечерю, приготувати сюрприз
  - виробляти (to produce) — виробляти продукцію, виробляти звичку
  - переробляти (to redo, process) — переробити план, все переробити (do everything)
  - заговорити (to start speaking) — заговорити українською, раптом заговорити (inchoative
    aspect)
  - відмовитися (to refuse) — відмовитися від пропозиції, відмовитися допомогти
  - приєднатися (to join) — приєднатися до групи, приєднатися до розмови
  - вивчити (to learn) — вивчити мову, вивчити напам'ять (achievement result)
  - переписати (to rewrite) — переписати майно, переписати твір
  - 'записати (to write down) — записати номер, записати на прийом (fixing info);
    learner error: confusing with ''написати'''
  - відповісти (to answer) — відповісти на запитання, відповісти взаємністю
  recommended:
  - прив'язати (to tie to) — spatial attachment logic
  - виконати (to fulfill) — achievement context
  - переглянути (to review) — re-viewing logic
  - запам'ятати (to remember) — fixing in memory (за-)
  - відкрити (to open) — result of action
