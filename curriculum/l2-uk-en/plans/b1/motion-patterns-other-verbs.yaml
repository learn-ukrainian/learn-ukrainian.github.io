content_outline:
- section: Тест (Test)
  words: 400
  points:
  - Вступне тестування на знання просторової логіки префіксів (база b1-22) — перевірка здатності переносити фізичний рух на
    абстрактні дієслова.
  - 'Передбачення значення: Спроба розкодувати невідомі дієслова (наприклад, ''заспівати'', ''відслужити'') через значення
    префіксів перед основним поясненням.'
- section: Пояснення (Explanation)
  words: 1100
  points:
  - 'Універсальна метафора ''Атомарного аналізу'': Наочне розрізання дієслова на префікс та основу для декодування значення
    (наприклад, ПЕРЕ-ПИСАТИ = re-write).'
  - 'ПЕРЕ-: Стійкість та подолання. Культурний гачок: Прислів''я «Життя прожити — не поле перейти» як символ подолання труднощів
    та тривалості процесу.'
  - 'ЗА-: Момент входу в дію (інхоатив). Культурний гачок: Козацька пісня «Засвіт встали козаченьки» (раптовий початок руху).
    Робота над помилкою: ''заговорити'' як точка входу, а не тривалість дії.'
  - 'ВИ-: Досягнення результату та вичерпність. Культурна установка на роботу ''до кінця'' (випрацювати, вивчити). Логіка
    вилучення результату з процесу.'
  - 'ВІД-: Реакція та повернення. Мапування абстрактного ВІД- на префікс ''re-'' (відповісти = reply). Робота над помилкою:
    Плутанина між просторовим ''away'' та абстрактною реакцією.'
  - 'ПІД- та ПРИ-: Професійний підхід (підійти до вирішення) та логіка приєднання до групи чи розмови (приєднатися).'
- section: Практика (Practice)
  words: 1000
  points:
  - 'Вправа ''Розрізаємо на атоми'': Практичне завдання на ідентифікацію внеску префікса в загальне значення слова (spatial
    vs abstract).'
  - 'Корекція помилки з прийменниками: Розрізнення «написати в зошит» (контакт із поверхнею) та «записати в зошит» (фіксація
    інформації, ''за-'').'
  - 'Дрилі на полісемію: Порівняння фізичного руху (перейти дорогу) та абстрактного стану (переробити план).'
- section: Діалоги (Dialogues)
  words: 1000
  points:
  - 'Діалог 1: Співбесіда на роботу. Акцент на досягненнях (ВИ-): ''виконали план'', ''вивчили ринок'' та професійній підтримці
    (ПІД-): ''підійшли до вирішення''.'
  - 'Діалог 2: Ремонт у квартирі. Вживання ПЕРЕ- (переробити, перефарбувати) та З- (з’єднати деталі) у побутовому контексті.'
  - 'Діалог 3: Емоційна драма. Використання РОЗ- (розходження/руйнування: розійтися, розізлитися) проти З- (зближення) для
    опису динаміки стосунків.'
- section: Потрібно більше практики? (Need More Practice?)
  words: 500
  points:
  - 'Підсумок: Створення власної ментальної карти префіксів на основі ''атомарної'' логіки.'
  - '📝 Практичне завдання: Написати короткий звіт про професійне досягнення, використовуючи мінімум 5 дієслів із префіксами
    ВИ-, ПІД- та ЗА-.'
  - 'Інтеграція з State Standard §4.3.8: Закріплення навичок словотвору через аналіз сучасних текстів.'
vocabulary_hints:
  required:
  - відповісти (to answer) — відповісти на запитання, відповісти взаємністю; висока частотність (Core)
  - приготувати (to prepare) — приготувати вечерю, приготувати сюрприз; висока частотність (Daily)
  - записати (to write down) — записати номер, записати на прийом; фіксація інформації ('за-')
  - вивчити (to learn) — вивчити мову, вивчити напам'ять; логіка завершення та результату (ВИ-)
  - відмовитися (to refuse) — відмовитися від пропозиції, відмовитися допомогти; висока частотність
  - приєднатися (to join) — приєднатися до групи, приєднатися до розмови; логіка приєднання (ПРИ-)
  - заговорити (to start speaking) — заговорити українською, раптом заговорити; інхоатив (початок дії)
  - переробити (to redo, process) — переробити план, все переробити; значення повторності чи зміни (ПЕРЕ-)
  - виробляти (to produce) — виробляти продукцію, виробляти звичку; економічний та соціальний контекст
  - переписати (to rewrite) — переписати майно, переписати твір; адміністративний контекст
  recommended:
  - прив'язати (to tie to) — логіка просторового та абстрактного прикріплення
  - виконати (to fulfill) — контекст досягнення мети або завершення завдання
  - переглянути (to review) — логіка повторного перегляду або ревізії
  - запам'ятати (to remember) — фіксація інформації в пам'яті (префікс ЗА-)
  - відкрити (to open) — результат дії, протилежний до закриття
