module: b1-002
level: B1
sequence: 2
slug: b1-baseline-future-aspect
version: '3.0.2'
title: "Майбутній час і вид дієслова"
subtitle: "Три форми майбутнього часу та видові пари"
focus: review
pedagogy: PPP
phase: "B1.0 [Baselines & Aspect Mastery]"
word_target: 4000
objectives:
  - "Студент уміє розрізняти та утворювати всі три форми українського майбутнього часу: проста (доконаного виду), складна (синтетична: -тиму, -тимеш) та складена (аналітична: буду + інфінітив)"
  - "Студент уміє пояснити концепцію виду дієслова, використовуючи українську метамову, і правильно визначати доконаний та недоконаний вид"
  - "Студент уміє утворювати видові пари для поширених дієслів і вибирати правильний вид у контексті (завершена дія проти тривалої/повторюваної)"
  - "Студент уміє відмінювати дієслова майбутнього часу за всіма особами та числами, включаючи нерегулярні патерни"
  - "Студент уміє використовувати майбутній час і вид разом у зв'язному мовленні для опису планів, прогнозів та намірів"
dialogue_situations:
  - setting: 'Організаційний комітет у Харківському університеті (m, Kharkiv university) — планування благодійного концерту: Ми будемо збирати (недок.) кошти (pl, funds). Оголосимо (док.) дату завтра. Хто напише (док.) афішу (f, poster)?'
    speakers:
      - Голова комітету
      - Волонтери
    motivation: 'Майбутній час + вид: аналітична (будемо збирати) проти синтетичної (оголосимо, напише)'
content_outline:
  - section: "Що таке вид дієслова?"
    words: 650
    points:
      - "Основний концепт за Литвіновою (7 клас, с. 30): Дієслова мають категорію виду. Доконаний вид (від слова доконати, тобто здійснити що-небудь, виконати до кінця) позначає завершену, обмежену в часі дію: що зробити? що зробив? що зробить? Недоконаний вид позначає тривалу, повторювану або незавершену дію: що робити? що робив? що робить? що робитиме?"
      - "Видові пари — пари дієслів, пов'язані за значенням, але різні за завершеністю. Патерни творення за Литвіновою (7 клас, с. 32): — Додавання префікса: писати (недок.) → написати (док.), читати → прочитати, робити → зробити. — Зміна суфікса: відповідати (недок.) → відповісти (док.), показувати → показати. — Суплетивізм: брати (недок.) → взяти (док.), говорити → сказати, класти → покласти."
      - "Особливі категорії за Литвіновою (7 клас, с. 32): Двовидові дієслова: атакувати, веліти, женити, телеграфувати — вид визначається лише контекстом. Одновидові дієслова: тільки доконаний (придбати, схаменутися) або тільки недоконаний (сподіватися, потріскувати)."
      - "Практика читання: короткий український текст про плани на вихідні з використанням обох видів. Студенти ідентифікують кожне дієслово та його вид."
  - section: "Проста форма майбутнього часу"
    words: 600
    points:
      - "За Литвіновою (7 клас, с. 48): Дієслова доконаного виду утворюють просту форму майбутнього часу додаванням відповідних закінчень. Ці закінчення такі самі, як і в дієслів недоконаного виду в теперішньому часі. Таблиця дієвідмінювання: 1-ша: напишу, зроблю / напишемо, зробимо 2-га: напишеш, зробиш / напишете, зробите 3-тя: напише, зробить / напишуть, зроблять."
      - "Ключова ідея для студентів: майбутній час доконаного виду ВИГЛЯДАЄ як дієвідмінювання теперішнього часу, але з дієсловом доконаного виду це автоматично означає майбутній. Порівняйте: я пишу (теперішній час, недок.) проти я напишу (майбутній час, док.). Префікс на- робить його доконаним, а дієслова доконаного виду не можуть мати теперішнього часу."
      - "Практика з поширеними дієсловами доконаного виду: зробити (зроблю, зробиш...), прочитати (прочитаю, прочитаєш...), побачити (побачу, побачиш...), сказати (скажу, скажеш...), приїхати (приїду, приїдеш...), відповісти (відповім, відповіси...). Студенти відмінюють і використовують їх у реченнях про майбутні події."
  - section: "Складна (синтетична) форма майбутнього часу"
    words: 600
    points:
      - "За Литвіновою (7 клас, с. 49): Дієслова недоконаного виду утворюють складну форму майбутнього часу: основа інфінітива + суфікс -м- + особове закінчення. Зверніть увагу: 'проста форма' існує лише для дієслів доконаного виду. Дієвідмінювання: 1-ша: писатиму, робитиму / писатимемо, робитимемо 2-га: писатимеш, робитимеш / писатимете, робитимете 3-тя: писатиме, робитиме / писатимуть, робитимуть."
      - "Морфологічний аналіз: закінчення -тиму/-тимеш історично походять від інфінітива + иму (скорочена форма дієслова мати): писати + иму → писатиму. Це пояснює, чому основа інфінітива зберігається у формі."
      - "Контрастна практика: складна проти простої форми. Я писатиму листа (тривале написання) проти Я напишу листа (завершення дії). Ми працюватимемо (будемо в процесі роботи) проти Ми зробимо (виконаємо/завершимо). Студенти вибирають правильну форму на основі контекстних підказок у реченнях."
  - section: "Складена (аналітична) форма майбутнього часу"
    words: 550
    points:
      - "За Кравцовою (4 клас, с. 108) та Литвіновою (7 клас, с. 49): Дієслово бути в особовій формі + інфінітив основного дієслова. Дієвідмінювання бути: 1-ша: буду / будемо 2-га: будеш / будете 3-тя: буде / будуть. Приклад: буду писати, будеш читати, буде працювати."
      - "Ключова відмінність: форму змінює лише допоміжне дієслово бути, основне дієслово залишається в інфінітиві. Порівняйте зі складною формою, де закінчення несе саме дієслово."
      - "Примітка щодо вживання: складена форма є більш поширеною в розмовній українській мові та в західних діалектах. Складна форма так само правильна й поширена в літературній/письмовій українській мові. Обидві виражають однакове значення — майбутній час недоконаного виду. Студенти повинні розпізнавати та утворювати обидві."
      - "Практика читання: діалог двох друзів, які планують поїздку, використовуючи всі три форми майбутнього часу. Студенти визначають, яка форма використовується і чому."
  - section: "Вид і час — як вони працюють разом"
    words: 650
    points:
      - "Матриця виду і часу за Авраменком (7 клас, с. 54): Недоконаний вид має три часи: минулий (читав), теперішній (читаю), майбутній (читатиму / буду читати). Доконаний вид має лише два: минулий (прочитав), майбутній (прочитаю). Критично важливе розуміння: дієслова доконаного виду НЕ МАЮТЬ теперішнього часу. Усі студенти на рівні B1 повинні засвоїти це правило."
      - "Типові помилки та як їх уникнути: — Вживання доконаного виду з теперішнім часом: *я прочитаю зараз (НЕПРАВИЛЬНО як теперішній). прочитаю = тільки майбутній. Для 'I am reading now' → я читаю. — Плутанина між складною і складеною формами: писатиму (одне слово, синтетична) проти буду писати (два слова, аналітична). Обидві = недоконаний майбутній. — Забування про вид у розповіді: Вчора я *писав листа і *написав його. → Вчора я писав листа і написав його (правильне поєднання видів: процес, потім завершення)."
      - "Розширена практика: студенти переказують українську народну казку, використовуючи правильні комбінації виду і часу. Надається модельний текст із позначеними видами. Фокус на потоці розповіді: тло (недок.) проти завершених подій (док.)."
  - section: "Дієвідмінювання у майбутньому часі"
    words: 550
    points:
      - "За Заболотним (7 клас, с. 65): Три форми поруч для одного кореня дієслова: проста (доконаний): принесу, принесеш, принесе... складна (синтетична недоконаного виду): носитиму, носитимеш, носитиме... складена (аналітична недоконаного виду): буду носити, будеш носити... Тренувальна таблиця з 5 видовими парами для повного дієвідмінювання."
      - "Орфографічні пастки у формах майбутнього часу: — Чергування приголосних у доконаному виді: сидіти → сиджу (не *сидю), водити → воджу, просити → прошу. Ці чергування з рівня A2 застосовуються і в майбутньому часі: я попрошу, ти попросиш. — Форми на -тиму зберігають повну основу інфінітива: малювати → малюватиму (не *малютиму)."
      - "Контекстна практика: студенти завершують лист другу про літні плани, вибираючи між усіма трьома формами майбутнього часу залежно від того, чи є дії завершеними цілями, чи тривалими процесами."
  - section: "Підсумок: вид і майбутнє у дії"
    words: 400
    points:
      - "Дерево рішень для вибору правильної форми майбутнього часу: 1. Дія завершена/одноразова? → доконаний вид → проста форма (зроблю, напишу, прочитаю). 2. Дія тривала/повторювана? → недоконаний вид → виберіть одне: а) складна форма (робитиму, писатиму) — однаково поширена; б) складена форма (буду робити, буду писати) — однаково поширена. Обидві (а) і (б) правильні; жодна не є 'більш формальною' чи 'більш розмовною'."
      - "Питання для самоперевірки українською: 1. Які три форми майбутнього часу є в українській мові? 2. Чому дієслова доконаного виду не мають теперішнього часу? 3. Утворіть видову пару: писати → ? / читати → ? / говорити → ? 4. Відмініть у майбутньому часі: зробити, працювати."
      - "Анонс наступного модуля: Людина і стосунки (M06) — опис людей та стосунків, застосування майбутнього часу в контексті ('Я познайомлю тебе з моєю подругою,' 'Ми будемо зустрічатися щотижня')."
vocabulary_hints:
  required:
    - "вид дієслова (verbal aspect — grammatical category of completion)"
    - "доконаний вид (perfective aspect — completed, bounded action)"
    - "недоконаний вид (imperfective aspect — ongoing, unbounded action)"
    - "видова пара (aspect pair — two verbs differing only in aspect)"
    - "майбутній час (future tense)"
    - "проста форма (simple form — perfective future: напишу)"
    - "складна форма (synthetic/compound form — imperfective future: писатиму)"
    - "складена форма (analytic form — imperfective future: буду писати)"
    - "інфінітив (infinitive — base verb form ending in -ти/-тися)"
    - "дієвідміна (verb conjugation class — I or II)"
    - "особове закінчення (personal ending — verb suffix marking person/number)"
    - "дієвідмінювання (conjugation — changing verb form by person/number)"
    - "двовидовий (biaspectual — verb that can be either aspect: атакувати)"
    - "одновидовий (single-aspect — verb existing in only one aspect)"
  recommended:
    - "тривала дія (ongoing action — characteristic of imperfective)"
    - "завершена дія (completed action — characteristic of perfective)"
    - "допоміжне дієслово (auxiliary verb — бути in analytic future)"
    - "суфікс (suffix — word-building element after the root)"
    - "дійсний спосіб (indicative mood — states facts, has all three tenses)"
    - "основа інфінітива (infinitive stem — base for building future forms)"
    - "часова форма (tense form — specific conjugated form of a verb)"
    - "повторювана дія (repeated action — characteristic of imperfective)"
    - "наголос (stress — emphasized syllable, may shift in conjugation)"
    - "чергування приголосних (consonant alternation — e.g., просити → прошу)"
activity_hints:
  - type: quiz
    focus: "Визначте вид дієслова: доконаний чи недоконаний? За поданими формами дієслів у контексті студент класифікує вид."
    items: 8
  - type: match-up
    focus: "З'єднайте видові пари: поєднайте дієслова недоконаного виду з їхніми доконаними відповідниками (писати↔написати, говорити↔сказати, брати↔взяти)."
    items: 8
  - type: fill-in
    focus: "Заповніть речення правильною формою майбутнього часу (проста, складна або складена) на основі контекстних підказок про завершення чи тривалість дії."
    items: 8
  - type: group-sort
    focus: "Розподіліть дієслівні форми на три групи: проста / складна / складена форма майбутнього часу."
    items: 10
  - type: error-correction
    focus: "Знайдіть і виправте помилки щодо виду/часу в українських реченнях (наприклад, використання доконаного виду як теперішнього, неправильний вибір форми майбутнього)."
    items: 6
  - type: free-write
    focus: "Напишіть 5-7 речень про ваші плани на наступний тиждень, використовуючи всі три форми майбутнього часу та обидва види."
    items: 6
