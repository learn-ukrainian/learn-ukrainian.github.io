references:
  - title: "Литвінова Grade 7, p.30-32"
    notes: "Основний розділ про вид дієслова: визначення, видові пари, двовидові/одновидові."
  - title: "Литвінова Grade 7, p.48-49"
    notes: "Майбутній час: проста (доконаний), складна, складена форми з таблицями дієвідмінювання та правилами утворення."
  - title: "Заболотний Grade 7, p.54-65"
    notes: "Розділ 'Часи дієслова': взаємодія виду і часу, всі три форми майбутнього часу з вправами, літературні приклади з Сосюри та Гончара."
  - title: "Авраменко Grade 7, p.54-68"
    notes: "Вид дієслова та майбутній час: вправи на класифікацію, тестова практика, зауваження, що дієслова теперішнього часу завжди недоконані."
  - title: "Кравцова Grade 4, p.108"
    notes: "Змінювання дієслів у майбутньому часі: раннє введення однослівних і двослівних форм майбутнього часу."
  - title: "Заболотний Grade 7, p.181-183"
    notes: "Часи дієслів, їх творення: систематичний огляд на старшому рівні, приклади двовидових дієслів."