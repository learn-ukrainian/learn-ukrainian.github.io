module: b1-061
level: B1
sequence: 61
slug: cases-with-quantity-expressions
version: '3.2'
title: "Кількісні вирази"
subtitle: "Узгодження числівників з іменниками та неозначено-кількісні слова"
focus: grammar
pedagogy: PPP
phase: "B1.5 [Нюанси відмінків та прийменники]"
word_target: 4000
objectives:
  - "Учень вміє правильно узгоджувати кількісні числівники з іменниками: один стіл (Н.в.), два/три/чотири столи (Н.в. мн.), п'ять столів (Р.в. мн.)"
  - "Учень вміє відмінювати кількісні числівники в непрямих відмінках і зберігати узгодження: двох столів (Р.в.), двом столам (Д.в.), двома столами (Ор.в.)"
  - "Учень вміє вживати неозначено-кількісні слова у правильному відмінку: багато/мало/кілька/декілька/чимало + Р.в."
  - "Учень вміє вживати збірні числівники з відповідними класами іменників: двоє дітей, четверо хлопців, троє дверей"
  - "Учень вміє вживати кількісні вирази в реальних ситуаціях: ціни, статистика, рецепти та описи груп"
dialogue_situations:
  - setting: 'Працівник перепису населення (m) відвідує сільську хату — рахує все: Скільки людей? П''ятеро. Двоє дітей (n, children). Кілька кімнат (f, rooms). Багато землі (f, land). Мало худоби (f, livestock).'
    speakers:
      - Переписувач
      - Господар
    motivation: 'Кількісні вирази: п''ятеро людей, двоє дітей, кілька кімнат, багато землі'
content_outline:
  - section: "Узгодження кількісних числівників з іменниками"
    words: 800
    points:
      - "За Литвіновою (Grade 6 p.240-241): один/одна/одне + Н.в. одн.: один студент, одна книжка, одне вікно. два/дві/три/чотири + Н.в. мн.: два студенти, три книжки, чотири вікна. (Зверніть увагу: 'дві' для жіночого роду: дві книжки, а не *два книжки.) п'ять — двадцять, тридцять + Р.в. мн.: п'ять студентів, десять книжок."
      - "Особливі випадки (Литвінова Grade 6 p.241): Іменники з суфіксом -ин-: два селянина, три громадянина (Р.в. одн.!). Іменники ІV відміни (типу pluralia tantum): не можна вживати два/три/чотири, замість них використовуються збірні числівники: троє дверей, двоє окулярів. тисяча + Р.в. мн.: тисяча гривень. мільйон + Р.в. мн.: мільйон людей."
      - "Складені числівники: ОСТАННІЙ числівник визначає узгодження. двадцять один студент (один → Н.в. одн.) двадцять два студенти (два → Н.в. мн.) двадцять п'ять студентів (п'ять → Р.в. мн.) Практика: 15 пар числівник + іменник на правильне узгодження."
  - section: "Відмінювання кількісних числівників"
    words: 700
    points:
      - "За Авраменком (Grade 11 p.37) та Заболотним (Grade 7 p.171): один: як прикметник (одного, одному, одним, одному). два/дві: двох, двом, двох/два, двома, двох. три: трьох, трьом, трьох/три, трьома, трьох. чотири: чотирьох, чотирьом, чотирьох/чотири, чотирма, чотирьох."
      - "5-20, 30: як іменники ІІІ відміни жіночого роду: п'яти, п'яти, п'ять, п'ятьма, п'яти. 50-80: відмінюються обидві частини: п'ятдесяти, п'ятдесяти, п'ятдесяти, п'ятдесятьма, п'ятдесяти."
      - "У непрямих відмінках УСІ частини складених числівників відмінюються: з двадцятьма п'ятьма студентами (Ор.в.). Проте на практиці багато мовців спрощують це, особливо в усному мовленні. Літературний стандарт вимагає повного відмінювання. Практика: провідміняти 'двадцять три книжки' за всіма відмінками."
  - section: "Збірні числівники"
    words: 600
    points:
      - "Утворення: двоє, троє, четверо, п'ятеро, шестеро, семеро... За Голуб (Grade 6 p.163): Вживаються з: особами чоловічої статі (двоє хлопців), дітьми (троє дітей), іменниками pluralia tantum (четверо дверей, двоє ножиць), іменниками, що існують лише в множині (п'ятеро саней). НЕ вживаються з: особами жіночої статі (*двоє дівчат → дві дівчини) або неістотами (*троє столів → три столи)."
      - "Збірні числівники завжди вимагають Р.в. мн.: двоє друзів, троє братів, четверо дітей. У непрямих відмінках вони відмінюються як кількісний числівник п'ять: двох, двом, двох, двома, двох."
      - "Практика: вибрати кількісний або збірний числівник для 10 груп іменників з поясненням чому."
  - section: "Дроби та змішані кількості (§4.2.1.3)"
    words: 500
    points:
      - "Державний стандарт вимагає знання дробів на рівні B1. Базові дроби: половина (1/2), третина (1/3), чверть/четвертина (1/4), п'ята частина (1/5). Узгодження: половина + Р.в. одн. (половина яблука), третина + Р.в. одн. (третина населення), чверть + Р.в. одн. (чверть години). За Голуб (Grade 6 p.166): дробові числівники."
      - "Десяткові та складені дроби: два з половиною (2.5), три чверті (3/4), одна ціла і дві десятих (1.2). У контексті: півтора (1.5 — чоловічий/середній рід), півтори (1.5 — жіночий рід): півтора кілограма, півтори години. Зверніть увагу: півтора + Р.в. одн. (не множини!)."
      - "Відсотки: десять відсотків (10%), сто відсотків (100%). Узгодження: один відсоток, два відсотки, п'ять відсотків. Практика: висловити кількості за рецептом (півкіло, чверть ложки), статистику (третина населення, 25 відсотків) та час (півтори години, дві з половиною доби)."
  - section: "Неозначено-кількісні слова"
    words: 500
    points:
      - "Слова, що виражають неозначену кількість + Р.в.: багато людей, мало часу, кілька книжок, декілька разів, чимало зусиль, достатньо грошей, забагато роботи. Усі вимагають Р.в. — той самий патерн, що й числівники 5-20."
      - "Приблизність: близько + Р.в. (about/approximately), понад + Зн.в. (more than), до + Р.в. (up to). 'Близько ста людей прийшло.' 'Понад тисячу гривень.' Практика: описати кількості, використовуючи вирази приблизності."
  - section: "Кількісні вирази в контексті"
    words: 700
    points:
      - "Рецепти: Візьміть двісті грамів масла, три яйця, п'ятсот грамів борошна. Додайте чайну ложку солі та дві столові ложки цукру. Практика: прочитати український рецепт і знайти всі кількісні вирази."
      - "Статистика: В Україні живе понад сорок мільйонів людей. Київ має близько трьох мільйонів мешканців. Практика: описати місто або країну, використовуючи кількісні вирази."
      - "Покупки: Дайте, будь ласка, два кілограми картоплі, півкіло помідорів і триста грамів сиру. Скільки коштують п'ять яблук? Самоперевірка: 10 кількісних виразів для правильного утворення."
  - section: "Підсумок"
    words: 400
    points:
      - "Узагальнююча таблиця правил узгодження: 1 + Н.в.одн., 2-4 + Н.в.мн., 5-20 + Р.в.мн., збірні + Р.в.мн., дроби (половина/третина/чверть + Р.в.одн., півтора/півтори + Р.в.одн.). Непрямі відмінки: усі частини складених числівників відмінюються."
      - "Самоперевірка: 1. Узгодити числівники з іменниками: 21 студент, 44 сторінки, 100 гривень. 2. Вибрати кількісний або збірний: (два/двоє) хлопці, (три/троє) двері. 3. Провідміняти 'п'ять книжок' за Р.в., Д.в., Ор.в. 4. Висловити дроби: 2.5 кг, 1/3 населення, 75%. 5. Вжити приблизні кількості: близько, понад, до."
      - "Попередній огляд: складні займенники — останній граматичний модуль перед комунікативним модулем та контрольною роботою."
vocabulary_hints:
  required:
    - "кількісний числівник (cardinal numeral — один, два, сто)"
    - "збірний числівник (collective numeral — двоє, троє, четверо)"
    - "узгодження (agreement — matching numeral with noun form)"
    - "неозначено-кількісний (indefinite-quantitative — багато, кілька)"
    - "кілька (several — governs Р.в.)"
    - "декілька (several — synonym of кілька)"
    - "чимало (quite a lot — governs Р.в.)"
    - "достатньо (enough — governs Р.в.)"
    - "понад (more than — governs Зн.в.)"
    - "близько (about/approximately — governs Р.в.)"
  recommended:
    - "тисяча (thousand — governs Р.в.мн.)"
    - "мільйон (million — governs Р.в.мн.)"
    - "половина (half — + Р.в.)"
    - "чверть (quarter — + Р.в.)"
    - "забагато (too much — governs Р.в.)"
    - "замало (too little — governs Р.в.)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про узгодження кількісних числівників з іменниками і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Відмінювання кількісних числівників».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему узгодження кількісних числівників з іменниками.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему відмінювання кількісних числівників.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Узгодження кількісних числівників з іменниками».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Відмінювання кількісних числівників» з їхніми визначеннями.'
