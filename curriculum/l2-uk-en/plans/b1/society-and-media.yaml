module: b1-071
level: B1
sequence: 71
slug: society-and-media
version: '3.1.3'
title: "Суспільство і медіа"
subtitle: "Новини, ЗМІ, суспільне життя — розуміємо та обговорюємо"
focus: communication
pedagogy: PPP
phase: "B1.6 [Дієприкметники та дієприслівники]"
word_target: 4000
objectives:
  - "Студент вміє читати та розуміти українські новини рівня B1, виділяючи основну думку, деталі та авторську позицію"
  - "Студент вміє розрізняти факт та думку в українських медіатекстах і визначати прийоми маніпулювання"
  - "Студент вміє обговорювати актуальні українські суспільні теми, використовуючи суспільно-політичну лексику та лексику публіцистичного стилю"
  - "Студент вміє використовувати абревіатури (модуль №79), складні речення (Phase 8) та аргументацію (модуль №86) в обговореннях на медіа-теми"
  - "Студент вміє написати короткий підсумок або відгук на українську новину, використовуючи відповідну мову публіцистичного стилю"
dialogue_situations:
  - setting: 'Новинна редакція на київській телестудії — монтаж вечірніх новин: Журналіст повідомив, що рятувальники прибули вчасно. Незважаючи на складні умови, евакуацію завершено. Як стало відомо, уряд виділив кошти.'
    speakers:
      - Головний редактор
      - Журналіст
    motivation: 'Медіа/журналістика: непряма мова, пасивний стан, офіційний стиль у новинах'
content_outline:
  - section: "Що таке медіа?"
    words: 650
    points:
      - "Визначення за Авраменком (7 клас, с. 28): Засоби масової інформації (ЗМІ), або масмедіа — це засоби передавання, зберігання та відтворення інформації для великої кількості людей: радіо, телебачення, кіно, вебсайти; газети, журнали, книжки, буклети; рекламні щити."
      - "Види медіа українською: Друковані: газета, журнал, книжка, буклет. Електронні: вебсайт, соціальна мережа, подкаст, блог. Візуальні: телебачення, кіно, рекламний щит. Аудіо: радіо, подкаст. Практика: класифікувати українські джерела інформації за типами."
      - "Публіцистичний стиль за Авраменком (7 клас, с. 15): Стиль засобів масової інформації. Формує громадську думку. Характеристики: суспільно-політична лексика, емоційно забарвлені слова, фразеологізми, риторичні запитання та звертання."
      - "Культурна довідка: український медіапростір — ключові видання. Українська правда, Новинарня, Суспільне, ТСН. Важливість українськомовних медіа для діаспори та тих, хто вивчає мову."
      - "Соціальні мережі українською: Фейсбук, Інстаграм, Ютуб, ТікТок — українці активно користують ці платформи. Лексика: допис, підписник, стрічка, коментар, поширити. Практика: читання та написання дописів в українських соцмережах як вправа з медіаграмотності."
  - section: "Читання новин"
    words: 800
    points:
      - "Структура новини: Заголовок — короткий, інформативний, часто без дієслів. Лід — перший абзац, що відповідає на запитання хто, що, де, коли, чому. Основна частина — деталі, цитати, передісторія. Практика: студенти читають адаптовану для B1 новину та визначають її елементи."
      - "Лексика новин: подія, повідомлення, заява, прес-конференція, кореспондент, джерело, за словами, як повідомляє. Дієслова: повідомити, оголосити, заявити, підтвердити, спростувати."
      - "Факт проти думки в медіатекстах: Факт: «Температура повітря становить 15 градусів.» Думка: «Це надзвичайно тепла погода для березня.» Практика: студенти позначають факти та думки у новині. Вставні слова вказують на думку: «на думку», «мабуть», «можливо»."
      - "Практика: студенти читають дві короткі українські новини (100-150 слів кожна) на зрозумілі теми та відповідають на запитання на розуміння українською."
      - "Новинні дієслова — специфічна лексика для передачі інформації: повідомити (нейтральне), заявити (офіційне), зізнатися, стверджувати (вказує на сумнів), наголосити, попередити. Вибір дієслова розкриває ставлення журналіста. Практика: студенти визначають, як різні дієслова змінюють тон однієї новини."
  - section: "Медіаманіпулювання"
    words: 700
    points:
      - "Визначення за Авраменком (7 клас, с. 184): Маніпулювання — приховане управління людиною з корисливою метою. Медіаманіпулювання — вид психологічного впливу в ЗМІ, соцмережах. Студенти мають розпізнавати ці техніки для критичного читання."
      - "Поширені техніки маніпулювання: 1. Емоційний вплив — використання страху, гніву чи співчуття замість фактів. 2. Підміна фактів — подання думок як фактів. 3. Вибіркове цитування — виривання цитат із контексту. 4. Навішування ярликів — навішування ярликів на людей замість обговорення ідей. 5. Звернення до авторитету — «експерти кажуть» без зазначення їхніх імен."
      - "Запитання для критичного читання: Хто автор? Яке джерело? Чи є докази? Чи є емоційно забарвлена лексика? Чи подано обидві сторони? Практика: студенти оцінюють зразок тексту на наявність маркерів маніпулювання."
      - "Зв'язок із деколонізацією: російські медіаманіпуляції щодо України використовують усі ці техніки. Вміння критично читати українською — це не лише мовна навичка, а й культурний самозахист."
      - "Лексика та процес фактчекінгу: перевірити, джерело, достовірний, фейк, маніпулятивний. Українські фактчекінгові організації: StopFake, VoxCheck, «Без Брехні». Студенти практикують оцінювання 3 тверджень за структурованим процесом фактчекінгу: Що стверджується? Яке джерело? Чи є докази?"
  - section: "Суспільне життя"
    words: 700
    points:
      - "Суспільно-політична лексика для B1: суспільство, громадянин, держава, уряд, парламент, вибори, демократія, права людини, волонтерство, громадянське суспільство."
      - "Лексика українського громадянського суспільства: волонтер, благодійність, громада, петиція, протест, мітинг. Культурна довідка: український волонтерський рух є надзвичайним — це одне з найсильніших громадянських суспільств у світі, особливо з 2014 року."
      - "Обговорення суспільних питань із використанням граматики B1: «Я вважаю, що волонтерство важливе, тому що воно допомагає тим, хто потребує підтримки.» (теза + аргумент) «На думку експертів, громадянське суспільство — основа демократії.» (вставне слово + складнопідрядне речення) Практика: студенти обговорюють суспільні теми, використовуючи весь інструментарій B1."
      - "Практика читання: адаптована для B1 стаття про волонтерство в Україні, із завданнями на розуміння та лексику."
      - "Лексика української ідентичності: державність, незалежність, самовизначення, суверенітет, євроінтеграція. Тема Державного стандарту 2024 §3 включає суспільні відносини — студенти обговорюють шлях України, використовуючи ці терміни. Практика: висловити думку щодо євроінтеграції, використовуючи структуру аргументації з модуля №82."
  - section: "Медіатекст: аналіз і створення"
    words: 700
    points:
      - "Аналіз українського медіатексту: 1. Визначте стиль (публіцистичний, офіційний, розмовний?). 2. Знайдіть факти та думки. 3. Знайдіть абревіатури — розшифруйте. 4. Знайдіть вставні слова — визначте групу. 5. Визначте позицію автора — за чи проти? Практика на реальному українському медіатексті (адаптованому для B1)."
      - "Написання відгуку на медіатекст: Студенти пишуть коментар або відгук (100-150 слів) на новину, висловлюючи свою думку за допомогою структури аргументації (модуль №86). Вимоги: теза, 2 аргументи, висновок."
      - "Створення короткої новини: Студенти пишуть коротку новину (100-120 слів) про шкільну або громадську подію у публіцистичному стилі: заголовок, лід, основна частина. Включіть принаймні 2 абревіатури."
      - "Усна практика: студенти представляють свою новину класу, а потім відповідають на запитання — застосування всіх навичок B1 в інтегрованому завданні."
      - "Порівняльний аналіз: студенти читають дві новини про одну подію з різних українських джерел та порівнюють: Чим відрізняється лексика? Тон нейтральний чи емоційний? Яка стаття надає більше фактів, а яка більше думок? Практика критичного мислення з використанням усіх аналітичних інструментів B1."
  - section: "Підсумок: медіаграмотність"
    words: 450
    points:
      - "Повний довідник: медійна лексика, структура новинного тексту, техніки маніпулювання, запитання для критичного читання."
      - "Самоперевірка українською: 1. Назвіть 5 типів ЗМІ. 2. Чим факт відрізняється від думки? 3. Назвіть 3 прийоми медіаманіпулювання. 4. Напишіть заголовок i лід до новини про шкільну подію."
      - "План споживання медіа: студенти створюють особистий план споживання українських медіа на рівні B1. Рекомендується: 1 новина на день (Українська правда, Суспільне), 1 українське відео на YouTube на тиждень, підписатися на 3 українські акаунти в соцмережах. Це переносить навчання з класу в реальне використання мови."
      - "Анонс: Загальне повторення B1 (модуль №88) — комплексне повторення всієї граматики та лексики B1 перед підсумковими іспитами."
vocabulary_hints:
  required:
    - "засоби масової інформації (mass media — channels of public communication)"
    - "суспільство (society — organized community of people)"
    - "громадянин (citizen — member of a state)"
    - "публіцистичний стиль (publicistic style — media register)"
    - "новина (news item — report of a recent event)"
    - "заголовок (headline — title of a news article)"
    - "факт (fact — verifiable statement)"
    - "думка (opinion — personal view)"
    - "маніпулювання (manipulation — hidden influence)"
    - "волонтер (volunteer — person working without pay)"
    - "джерело (source — origin of information)"
    - "кореспондент (correspondent — reporter)"
    - "повідомити (to report — to convey news)"
  recommended:
    - "медіаграмотність (media literacy — ability to critically read media)"
    - "лід (lead — opening paragraph of news article)"
    - "ярлик (label — simplistic categorization)"
    - "спростувати (to deny/refute — to reject a claim)"
    - "підтвердити (to confirm — to verify as true)"
    - "благодійність (charity — giving to those in need)"
    - "громада (community — local organized group)"
    - "петиція (petition — formal written request)"
    - "прес-конференція (press conference — media briefing)"
    - "електорат (electorate — body of voters)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про що таке медіа? і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Читання новин»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему що таке медіа?."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему читання новин."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Що таке медіа?»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Читання новин» з їхніми визначеннями."
connects_to:
  - "b1-086 (Аргументація — навички аргументації, застосовані до медіа)"
  - "b1-079 (Абревіатури — абревіатури в новинних текстах)"
  - "b1-077 (Офіційний стиль — контраст із публіцистичним стилем)"
  - "b1-088 (comprehensive-b1-review — повторення перед підсумковими іспитами)"
prerequisites:
  - "b1-077 до b1-084 (Фаза 9 — розуміння регістрів)"
  - "b1-085 до b1-086 (навички розповіді та аргументації)"
  - "b1-065 до b1-072 (складний синтаксис для вираження думок)"
grammar:
  - "Публіцистичний стиль: ознаки, мовні засоби, жанри"
  - "Структура новинного тексту: заголовок, лід, основна частина"
  - "Факт проти думки: мовні маркери кожного"
  - "Суспільно-політична лексика: лексика та її використання"
  - "Інтеграція всієї граматики B1 у контекстах, пов'язаних з медіа"
register: розмовний
references:
  - title: "Авраменко Grade 7, p.15, 28-31"
    notes: "Публіцистичний стиль: визначення, характеристики. ЗМІ/масмедіа: типи, медіатексти, критичне сприйняття інформації."
  - title: "Авраменко Grade 7, p.184-187"
    notes: "Медіаманіпулювання: визначення, типи, тренування обізнаності. Маніпуляція в пресі, на телебаченні, в інтернеті."
  - title: "Заболотний Grade 7, p.24-28"
    notes: "Джерела інформації: оцінка джерел, критичне мислення щодо медіаконтенту."
  - title: "Вашуленко Grade 3, p.28"
    notes: "Медіатексти — раннє знайомство з концепціями медіаграмотності, фундамент для розширення на рівні B1."
