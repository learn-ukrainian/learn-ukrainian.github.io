module: b1-087
level: B1
sequence: 87
slug: society-and-media
version: '3.0'
title: "Суспiльство i медiа"
subtitle: "Новини, ЗМI, суспiльне життя — розумiємо та обговорюємо"
focus: communication
pedagogy: PPP
phase: "B1.10 [Synthesis & Graduation]"
word_target: 4000
objectives:
- "Learner can read and understand B1-level Ukrainian news articles,
  extracting основну думку, деталi, and авторську позицiю"
- "Learner can distinguish факт (fact) from думка (opinion) in Ukrainian
  media texts and identify прийоми манiпулювання"
- "Learner can discuss current Ukrainian social topics using суспiльно-
  полiтична лексика and публiцистичний стиль vocabulary"
- "Learner can use абревiатури (M79), складнi речення (Phase 8), and
  аргументацiя (M86) in media-related discussions"
- "Learner can write a short summary or response to a Ukrainian news article
  using appropriate публiцистичний стиль language"
content_outline:
- section: "Що таке медiа? (What is media?)"
  words: 550
  points:
  - "Definition from Авраменко Grade 7 p.28:
    Засоби масової iнформацiї (ЗМI), або масмедiа — це засоби
    передавання, зберiгання та вiдтворення iнформацiї для великої
    кiлькостi людей: радiо, телебачення, кiно, вебсайти; газети,
    журнали, книжки, буклети; рекламнi щити."
  - "Types of media in Ukrainian:
    Друкованi: газета, журнал, книжка, буклет.
    Електроннi: вебсайт, соцiальна мережа, подкаст, блог.
    Вiзуальнi: телебачення, кiно, рекламний щит.
    Аудiо: радiо, подкаст.
    Practice: classify Ukrainian media sources by type."
  - "Публiцистичний стиль from Авраменко Grade 7 p.15:
    Стиль засобiв масової iнформацiї. Формує громадську думку.
    Characteristics: суспiльно-полiтична лексика, емоцiйно забарвленi
    слова, фразеологiзми, риторичнi запитання та звертання."
  - "Cultural note: Ukrainian media landscape — key outlets.
    Українська правда, Новинарня, Суспiльне, ТСН.
    The importance of Ukrainian-language media for diaspora and learners."
- section: "Читання новин (Reading news)"
  words: 700
  points:
  - "Structure of a news article:
    Заголовок (headline) — short, informative, often without verbs.
    Лiд (lead) — first paragraph answering хто, що, де, коли, чому.
    Основна частина — details, quotes, background.
    Practice: learners read a B1-adapted news article and identify elements."
  - "News vocabulary:
    подiя (event), повiдомлення (report), заява (statement),
    прес-конференцiя (press conference), кореспондент (correspondent),
    джерело (source), за словами (according to), як повiдомляє (as reported by).
    Verbs: повiдомити (to report), оголосити (to announce),
    заявити (to state), пiдтвердити (to confirm), спростувати (to deny)."
  - "Fact vs opinion in media texts:
    Факт: 'Температура повiтря становить 15 градусiв.'
    Думка: 'Це надзвичайно тепла погода для березня.'
    Practice: learners mark facts and opinions in a news article.
    The вставнi слова signal opinions: 'на думку,' 'мабуть,' 'можливо.'"
  - "Practice: learners read two short Ukrainian news articles (100-150 words
    each) on accessible topics and answer comprehension questions in Ukrainian."
- section: "Медiаманiпулювання (Media manipulation)"
  words: 600
  points:
  - "Definition from Авраменко Grade 7 p.184:
    Манiпулювання — приховане управлiння людиною з корисливою метою.
    Медiаманiпулювання — вид психологiчного впливу в ЗМI, соцмережах.
    Learners must recognize these techniques to read critically."
  - "Common manipulation techniques:
    1. Емоцiйний вплив — using fear, anger, or sympathy instead of facts.
    2. Пiдмiна фактiв — presenting opinions as facts.
    3. Вибiркове цитування — quoting out of context.
    4. Навiшування ярликiв — labeling people instead of discussing ideas.
    5. Звернення до авторитету — 'experts say' without naming them."
  - "Critical reading questions:
    Хто автор? Яке джерело? Чи є докази?
    Чи є емоцiйно забарвлена лексика? Чи подано обидвi сторони?
    Practice: learners evaluate a sample text for manipulation markers."
  - "The decolonization connection: Russian media manipulation about Ukraine
    uses all these techniques. Learning to read critically in Ukrainian
    is not just a language skill — it is cultural self-defense."
- section: "Суспiльне життя (Social life)"
  words: 600
  points:
  - "Суспiльно-полiтична лексика for B1:
    суспiльство (society), громадянин (citizen), держава (state),
    уряд (government), парламент (parliament), вибори (elections),
    демократiя (democracy), права людини (human rights),
    волонтерство (volunteering), громадянське суспiльство (civil society)."
  - "Ukrainian civil society vocabulary:
    волонтер (volunteer), благодiйнiсть (charity), громада (community),
    петицiя (petition), протест (protest), мiтинг (rally).
    Cultural note: Ukrainian волонтерський рух is extraordinary —
    one of the strongest civil societies in the world, especially since 2014."
  - "Discussing social issues using B1 grammar:
    'Я вважаю, що волонтерство важливе, тому що воно допомагає
    тим, хто потребує пiдтримки.' (теза + аргумент)
    'На думку експертiв, громадянське суспiльство — основа демократiї.'
    (вставне слово + складнопiдрядне речення)
    Practice: learners discuss social topics using full B1 toolkit."
  - "Reading practice: a B1-adapted article about волонтерство в Українi,
    with comprehension and vocabulary exercises."
- section: "Медiатекст: аналiз i створення (Media text: analysis and creation)"
  words: 600
  points:
  - "Analyzing a Ukrainian media text:
    1. Визначте стиль (публiцистичний, офiцiйний, розмовний?)
    2. Знайдiть факти та думки.
    3. Знайдiть абревiатури — розшифруйте.
    4. Знайдiть вставнi слова — визначте групу.
    5. Визначте позицiю автора — за чи проти?
    Practice with a real Ukrainian media text (adapted to B1)."
  - "Writing a media response:
    Learners write a comment or response (100-150 words) to a news article,
    expressing their opinion using аргументацiя structure (M86).
    Requirements: теза, 2 аргументи, висновок."
  - "Creating a short news report:
    Learners write a short новина (100-120 words) about a school or
    community event using публiцистичний стиль: заголовок, лiд,
    основна частина. Include at least 2 абревiатури."
  - "Oral practice: learners present their new report to the class,
    then answer questions — applying all B1 skills in an integrated task."
- section: "Пiдсумок: медiаграмотнiсть (Summary: media literacy)"
  words: 350
  points:
  - "Complete reference: media vocabulary, news text structure,
    manipulation techniques, критичне читання questions."
  - "Self-check in Ukrainian:
    1. Назвiть 5 типiв ЗМI.
    2. Чим факт вiдрiзняється вiд думки?
    3. Назвiть 3 прийоми медiаманiпулювання.
    4. Напишiть заголовок i лiд до новини про шкiльну подiю."
  - "Preview: Загальне повторення B1 (M88) — comprehensive review
    of all B1 grammar and vocabulary before final exams."
vocabulary_hints:
  required:
  - "засоби масової iнформацiї (mass media — channels of public communication)"
  - "суспiльство (society — organized community of people)"
  - "громадянин (citizen — member of a state)"
  - "публiцистичний стиль (publicistic style — media register)"
  - "новина (news item — report of a recent event)"
  - "заголовок (headline — title of a news article)"
  - "факт (fact — verifiable statement)"
  - "думка (opinion — personal view)"
  - "манiпулювання (manipulation — hidden influence)"
  - "волонтер (volunteer — person working without pay)"
  - "джерело (source — origin of information)"
  - "кореспондент (correspondent — reporter)"
  - "повiдомити (to report — to convey news)"
  recommended:
  - "медiаграмотнiсть (media literacy — ability to critically read media)"
  - "лiд (lead — opening paragraph of news article)"
  - "ярлик (label — simplistic categorization)"
  - "спростувати (to deny/refute — to reject a claim)"
  - "пiдтвердити (to confirm — to verify as true)"
  - "благодiйнiсть (charity — giving to those in need)"
  - "громада (community — local organized group)"
  - "петицiя (petition — formal written request)"
  - "прес-конференцiя (press conference — media briefing)"
  - "електорат (electorate — body of voters)"
activity_hints:
- type: quiz
  focus: "Distinguish facts from opinions in text excerpts. Identify
    manipulation techniques. Match media terms to definitions."
  items: 10
- type: fill-in
  focus: "Complete news article templates with correct vocabulary, стиль
    markers, and абревiатури. Write a лiд paragraph."
  items: 8
- type: match-up
  focus: "Match суспiльно-полiтична лексика to definitions, media types
    to categories, manipulation techniques to examples."
  items: 10
- type: error-correction
  focus: "Identify стиль violations in media texts (розмовна лексика in
    news articles, missing facts, unsubstantiated claims)."
  items: 6
- type: free-write
  focus: "Write a response to a news article (100-150 words) using
    аргументацiя structure and публiцистичний стиль language."
  items: 1
- type: group-sort
  focus: "Sort statements into факти vs думки, and sort vocabulary into
    публiцистичний vs розмовний register."
  items: 10
connects_to:
- "b1-086 (Аргументацiя — argumentation skills applied to media)"
- "b1-079 (Абревiатури — abbreviations in news texts)"
- "b1-077 (Офiцiйний стиль — contrast with публiцистичний стиль)"
- "b1-088 (comprehensive-b1-review — review before final exams)"
prerequisites:
- "b1-077 to b1-084 (Phase 9 — register awareness)"
- "b1-085 to b1-086 (narrative and argumentation skills)"
- "b1-065 to b1-072 (complex syntax for expressing opinions)"
grammar:
- "Публiцистичний стиль: ознаки, мовнi засоби, жанри"
- "News text structure: заголовок, лiд, основна частина"
- "Факт vs думка: linguistic markers of each"
- "Суспiльно-полiтична лексика: vocabulary and usage"
- "Integration of all B1 grammar in media-related contexts"
register: розмовний
