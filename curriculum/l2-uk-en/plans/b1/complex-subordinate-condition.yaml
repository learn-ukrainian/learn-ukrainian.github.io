module: b1-078
level: B1
sequence: 78
slug: complex-subordinate-condition
version: '3.1.3'
title: "Речення умови"
subtitle: "Якщо, коли (=якщо), як: реальні умови у складному реченні"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Складний синтаксис]"
word_target: 4000
objectives:
  - "Учень вміє будувати підрядні обставинні умови, виражаючи умови за допомогою якщо, коли (=якщо), як, за умови що, у випадку якщо."
  - "Учень навчиться поєднувати умовні конструкції з модулів №18–19 (реальні/нереальні) із синтаксисом складнопідрядного речення."
  - "Учень вміє розрізняти часове коли та умовне коли у контексті."
  - "Учень може використовувати співвідносні слова у головній частині: то, тоді (Якщо прийдеш, то зателефонуй)."
  - "Учень вміє будувати як реальні, так і нереальні умови у складнопідрядному реченні."
dialogue_situations:
  - setting: 'Ділові переговори на Дніпровській фабриці — умовні речення: Якщо ви підпишете контракт (m), ми почнемо виробництво. За умови що якість буде відповідною, продовжимо. Якби ціна була нижчою, ми б замовили більше.'
    speakers:
      - Директор фабрики
      - Закордонний партнер
    motivation: 'Умовні речення: якщо, за умови що, якби — реальні та нереальні в бізнесі'
content_outline:
  - section: "Підрядні обставинні умови"
    words: 750
    points:
      - "Визначення із підручника Заболотного (8 клас, с. 112): підрядне обставинне умови вказує на умову, за якої здійснюється дія головної частини. Сполучники: якщо, коли (=якщо), як, за умови що, у випадку якщо. Як не буде птахів, то і людське серце стане черствішим (М. Стельмах)."
      - "Зв'язок із модулів №18–19 (умовний спосіб): У модуль №18 вивчалися реальні умови: Якщо матимеш час, приїжджай. У модуль №19 вивчалися нереальні умови: Якби я знав, я б допоміг. Цей модуль систематизує їх у межах складнопідрядного речення."
      - "Відмінність від причини (модуль №70): Умова: Якщо буде холодно, одягни пальто. (можливо, буде холодно, а можливо, й ні). Причина: Одягни пальто, бо холодно. (холодно — це факт)."
  - section: "Реальна умова"
    words: 800
    points:
      - "Якщо + теперішній/майбутній час для реальних можливостей: Якщо підеш у магазин, купи хліба. Якщо матимеш час, приїжджай у гості. Якщо вона зателефонує, скажи, що мене немає."
      - "Коли = якщо (умовне значення): Коли хочеш знати правду, запитай його. Перевірка: чи можна замінити коли на якщо? Якщо так → умовне речення. Порівняйте: Коли ми прийшли, почався дощ. (часове — замінити не можна)."
      - "Як = якщо (розмовне/народне): Як не буде птахів, то серце стане черствішим. Як хочеш — приходь. Стиль: як має більш народно-розмовний відтінок порівняно з якщо."
      - "Співвідносні слова то, тоді у головній частині: Якщо підеш, то зателефонуй. (то підкреслює наслідок). Якщо хочеш, тоді приходь. Практика: скласти 10 речень із реальними умовами, використовуючи різні сполучники."
  - section: "Нереальна умова"
    words: 700
    points:
      - "Якби + умовний спосіб (повторення модуль №19): Якби я знав, я б допоміг. Якби ти прийшов раніше, ми б встигли. Якби я мав більше часу, подорожував би частіше."
      - "Граматична структура: Якби + минулий час, підмет + б(и) + минулий час. Частка б/би приєднується до першого слова або до дієслова: Я б пішов. / Пішов би я. / Якби я пішов."
      - "Порівняння реальної та нереальної умови: Якщо я знатиму (реальна) → наслідок у майбутньому. Якби я знав (нереальна) → наслідок в умовному способі. Практика: побудувати 6 пар речень, що протиставляють реальні та нереальні умови."
  - section: "Офіційні та формальні конструкції"
    words: 600
    points:
      - "За умови що — офіційний сполучник: За умови що ви подасте документи вчасно, ваша заявка буде розглянута. У випадку якщо — офіційний, позначає непередбачену ситуацію: У випадку якщо виникнуть проблеми, зверніться до адміністратора. Якщо тільки — обмежувальний сполучник: Я прийду, якщо тільки не буде дощу."
      - "Піраміда стилів: як (народно-розмовний) → якщо (нейтральний) → коли (літературний) → за умови що (офіційний) → у випадку якщо (канцелярський). Практика: перефразувати ту саму умову у 3 різних стилях."
  - section: "Практика: умовні речення у контексті"
    words: 750
    points:
      - "Текст для читання: текст, у якому поєднуються підрядні причини, часу та умови. Учні класифікують кожну підрядну частину за типом (причина/час/умова)."
      - 'Діалог: планування дій, що залежать від умов. — Якщо погода буде гарна, поїдемо на море. — А якщо ні? — Тоді залишимося вдома. — Якби у нас був човен, могли б пливти на острів! Поєднання реальних та нереальних умов.'
      - "Продукція: написати 6-8 умовних речень про плани, мрії та гіпотетичні ситуації. Змішати реальні (якщо) та нереальні (якби) умови."
  - section: "Підсумок та перехід до модуля №72"
    words: 400
    points:
      - 'Підсумок: умовні = за якої умови? Якщо/коли/як (реальна), якби (нереальна). Співвідносні слова: то, тоді. Формальні: за умови що. Самоперевірка: Я розрізняю реальну і нереальну умову ✓/✗.'
      - "Анонс: модуль №72 — Речення мети. Мета: щоб, для того щоб."
vocabulary_hints:
  required:
    - "підрядне обставинне умови (conditional subordinate clause)"
    - "якщо (if — neutral conditional conjunction)"
    - "якби (if — unreal conditional conjunction)"
    - "реальна умова (real condition)"
    - "нереальна умова (unreal condition)"
    - "умовний спосіб (conditional mood — review from модулі №18–19)"
  recommended:
    - "за умови що (on the condition that — formal)"
    - "у випадку якщо (in case — formal)"
    - "якщо тільки (if only / provided that)"
    - "то (then — correlative in main clause)"
    - "тоді (then — correlative, emphatic)"
