module: b1-095
level: B1
sequence: 95
slug: winter-sports
version: '2.0'
title: Зимові види спорту
subtitle: Skiing and Snowboarding in Ukraine
focus: culture
pedagogy: CBI
phase: B1.7 [Contemporary Ukraine]
word_target: 4000
objectives:
- Learner can discuss winter sports and ski resorts in Ukrainian
- Learner can understand slope maps and weather conditions
- Learner can use vocabulary for skiing equipment
- Learner can plan a winter vacation to Bukovel or Drahobrat
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - 'Огляд цілей модуля: обговорення дозвілля та спортивних споруд (стадіони, басейни, ковзанки) згідно з державним стандартом
    §3.4'
  - 'Зимовий туризм в Україні: еволюція відпочинку в Карпатах від традиційних санчат до сучасного гірськолижного спорту'
- section: 'Гірськолижні курорти: Буковель та Драгобрат (Ski Resorts: Bukovel and Drahobrat)'
  words: 1100
  points:
  - 'Буковель як найбільший курорт Східної Європи: інфраструктура, 68 км трас та штучне «Озеро Молодості» (920 м)'
  - 'Драгобрат — найвищий курорт України (1300–1700 м) у масиві Свидовець: природний сніг до травня та умови для фрірайду'
  - 'Порівняння локацій: розвинений Буковель проти дикої природи Драгобрату; згадка Славського, Пилипця та Яремче'
  - 'Культурний аспект: «колиба» як специфічний тип гірської ресторації та традиції карпатської гостинності'
- section: Термінологія та типові помилки (Terminology and Common Errors)
  words: 1000
  points:
  - 'Словник гірськолижника: пріоритетне вживання терміна «витяг» (крісельний, бугельний) замість загального «підйомник»'
  - 'Корекція помилок: вживання прийменника «на» з місцевим відмінком («кататися на лижах» замість «з лижами»)'
  - 'Семантична точність: різниця між дієсловами «кататися» (рекреаційний рух) та «їздити» (цілеспрямоване переміщення)'
  - 'Безпека на схилі: правила поведінки на трасах, знаки маркування та основи лавинної безпеки'
- section: 'Практика: Бронювання та спорядження (Practice: Booking and Equipment)'
  words: 800
  points:
  - 'Логістика відпустки: діалоги про бронювання житла, купівлю «ски-пасу» та замовлення трансферу до курорту'
  - 'Оренда та підбір спорядження: лижні черевики, шоломи, палиці та дошки для сноуборду'
  - 'Робота з інструктором: термінологія лижних шкіл та базові команди на навчальному схилі'
- section: Продукція та підсумок (Production and Summary)
  words: 600
  points:
  - 'Рольова гра: планування зимової відпустки з урахуванням бюджету, рівня складності трас та погодних умов'
  - 'Підсумок: ключові вирази для обговорення вражень від відпочинку («Побачимось на схилі!»)'
  - Потрібно більше практики? — аналіз звітів про стан снігу (snow reports) та прогнозів погоди в горах
vocabulary_hints:
  required:
  - лижі (skis) — кататися на лижах, гірські лижі, лижний костюм; висока частотність
  - сноуборд (snowboard) — катання на сноуборді, дошка для сноуборду; сучасний запозичений термін
  - схил (slope) — крутий схил, навчальний схил, північний схил; ключовий елемент рельєфу
  - витяг (ski lift) — крісельний витяг, бугельний витяг; пріоритетний термін над «підйомник»
  - курорт (resort) — гірськолижний курорт, зимовий курорт; висока частотність
  - траса (trail/run) — маркування трас, стан траси; основне місце для катання
  - інструктор (instructor) — послуги інструктора, лижна школа; обов'язково для початківців
  - сніг (snow) — штучний сніг, свіжий пухляк; погодні умови та стан покриття
  recommended:
  - Буковель (Bukovel) — Озеро Молодості, найбільший курорт; культурний символ сучасного туризму
  - Драгобрат (Drahobrat) — фрірайд, масив Свидовець; найвищий курорт України
  - ски-пас (ski pass) — абонемент на витяг; міжнародна термінологія
  - лавина (avalanche) — лавинна безпека, схід лавини; критично для безпеки в горах
  - колиба (mountain hut restaurant) — традиційна карпатська ресторація; культурна особливість
  - черевики (boots) — лижні черевики, черевики для сноуборду; частина спеціального спорядження
