grammar:
  - 'Пряма мова: чотири пунктуаційні схеми з лапками « » та тире'
  - 'Непряма мова: перетворення за допомогою що, щоб, чи, питальних слів'
  - 'Заміна займенників та вказівних слів (я→він, тут→там, зараз→тоді)'
  - 'Наказовий спосіб → щоб + форма минулого часу у непрямій мові'
  - 'Оформлення діалогу за допомогою тире'
register: науково-навчальний
references:
  - title: "Заболотний Grade 5, §50"
    notes: 'Речення з прямою мовою. Пряма мова та слова автора. Пунктуація: А: «П», «П», — а.'
  - title: "Авраменко Grade 5, §79-80"
    notes: 'Пряма мова. Діалог. Розділові знаки для оформлення прямої мови та діалогу.'
  - title: "Заболотний Grade 5, §50"
    notes: 'Заміна прямої мови непрямою. Складнопідрядні речення з непрямою мовою. Вправи та правила перетворення.'
