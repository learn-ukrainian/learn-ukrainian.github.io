grammar:
  - "Пряма мова: four punctuation patterns with « » and тире"
  - "Непряма мова: transformation using що, щоб, чи, question words"
  - "Pronoun and deictic shifts (я→він, тут→там, зараз→тоді)"
  - "Imperative → щоб + past-tense form in indirect speech"
  - "Діалог formatting with тире"
register: науково-навчальний
references:
  - title: "Заболотний Grade 5, §50"
    notes: "Речення з прямою мовою. Пряма мова та слова автора. Пунктуація: А: «П»,
      «П», — а."
  - title: "Авраменко Grade 5, §79-80"
    notes: "Пряма мова. Діалог. Розділові знаки для оформлення прямої мови та діалогу."
  - title: "Заболотний Grade 5, §50"
    notes: "Заміна прямої мови непрямою. Складнопідрядні речення з непрямою мовою.
      Exercises and transformation rules."
