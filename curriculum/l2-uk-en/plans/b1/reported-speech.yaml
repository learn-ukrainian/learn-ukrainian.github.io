module: b1-082
level: B1
sequence: 82
slug: reported-speech
version: '3.1.2'
title: 'Пряма і непряма мова'
subtitle: 'Передача чужого мовлення: пряма мова, непряма мова, діалог'
focus: grammar
pedagogy: PPP
phase: 'B1.7 [Складний синтаксис]'
word_target: 4000
objectives:
  - 'Вміти визначати пряму мову як точне відтворення слів разом зі словами автора та застосовувати правильну пунктуацію (чотири позиційні схеми)'
  - 'Вміти перетворювати пряму мову на непряму за допомогою з''ясувальних речень із сполучниками що, щоб, чи (зв''язок з M67)'
  - 'Вміти правильно замінювати займенники та час при перетворенні: я→він/вона, мій→його/її, тут→там, зараз→тоді'
  - 'Вміти правильно оформлювати діалог за допомогою тире'
  - 'Вміти природно використовувати пряму та непряму мову в розповідях та переказах на рівні B1'
dialogue_situations:
  - setting: 'Журналіст бере інтерв''ю у Київського мера — перетворення прямої мови на непряму: Мер сказав: «Ми побудуємо метро». → Мер сказав, що вони побудують метро. «Чи буде парковка?» → Мене запитали, чи буде парковка.'
    speakers:
      - Журналіст
      - Мер
    motivation: 'Пряма → непряма мова: сказав що, запитав чи, попросив щоб'
content_outline:
  - section: 'Пряма мова: будова і розділові знаки'
    words: 800
    points:
      - 'Визначення з підручника Заболотного (8 клас, с.31): пряма мова — це точно відтворене чуже мовлення. Вона складається з двох частин: слова автора і пряма мова (сама цитата). Чотири пунктуаційні схеми: 1. А: «П». — Тарас сказав: «Я приїду завтра». 2. «П», — а. — «Я приїду завтра», — сказав Тарас. 3. А: «П», — а. — Тарас сказав: «Я приїду», — і вийшов. 4. «П, — а, — п». — «Я приїду, — сказав Тарас, — завтра».'
      - 'Українські лапки: « » (кутові лапки). Тире (—) відокремлює слова автора від прямої мови у схемах 2-4. Слова автора містять дієслово мовлення: сказав, запитав, відповів, крикнув, прошепотів, подумав.'
      - 'Практика: розставити розділові знаки у 8 реченнях з прямою мовою за всіма чотирма схемами.'
  - section: 'Непряма мова: перетворення'
    words: 800
    points:
      - 'Визначення з підручника Заболотного (8 клас, с.31): непряма мова — це чуже мовлення, яке передають не дослівно, а лише зі збереженням змісту. Непряма мова використовує структуру складнопідрядного речення: Тарас сказав, що він приїде завтра. (пряма: «Я приїду завтра» → непряма: що він приїде завтра).'
      - 'Вибір сполучника залежить від типу речення у прямій мові: Розповідне → що: Він сказав: «Я знаю». → Він сказав, що знає. Спонукальне → щоб: Мама сказала: «Помий руки». → Мама сказала, щоб я помив руки. Питальне (з часткою "чи") → чи: Він запитав: «Ти прийдеш?» → Він запитав, чи я прийду. Питальне (із питальним словом) → саме питальне слово: Він запитав: «Де ти живеш?» → Він запитав, де я живу.'
      - 'Заміна займенників і вказівних слів: я → він/вона, ми → вони, мій → його/її/їхній, тут → там, зараз → тоді, сьогодні → того дня, вчора → напередодні, завтра → наступного дня. Ці зміни є систематичними, а не випадковими.'
      - 'Практика: перетворити 10 речень із прямої мови на непряму.'
  - section: 'Складні випадки перетворення'
    words: 650
    points:
      - 'Наказовий спосіб → щоб + минулий час: Вчитель сказав: «Відкрийте підручники». → Вчитель сказав, щоб учні відкрили підручники. Зверніть увагу: після "щоб" наказовий спосіб перетворюється на форму минулого часу (те саме правило, що й у M72).'
      - 'Питання з питальними словами: Мама запитала: «Куди ти йдеш?» → Мама запитала, куди я йду. Він поцікавився: «Скільки це коштує?» → Він поцікавився, скільки це коштує.'
      - 'Оклики та емоційне мовлення — що втрачається: Він крикнув: «Яка краса!» → Він сказав, що це дуже красиво. Вигуки, звертання, частки зникають у непрямій мові. Саме тому пряма мова більш експресивна.'
  - section: 'Діалог: оформлення'
    words: 550
    points:
      - 'Оформлення українського діалогу за допомогою тире: — Привіт! Як справи? — запитала Оксана. — Дякую, добре. А в тебе? — відповів Андрій. — Чудово! Ти вже читав цю книгу? — Ні, ще не читав. А варто? Репліка кожного нового мовця починається з тире з нового рядка.'
      - 'Діалог у розповідному тексті: поєднання авторських ремарок із прямою мовою. Практика: правильно оформити пунктуаційно короткий діалог (6-8 реплік).'
  - section: 'Практика: пряма і непряма мова у тексті'
    words: 800
    points:
      - 'Текст для читання: розповідь, що містить і пряму, і непряму мову. Учні визначають кожну з них і пояснюють, чому автор обрав саме ту чи іншу форму.'
      - 'Вправа на перетворення: перетворити діалог (6 реплік) на непряму мову, а потім перетворити абзац із непрямою мовою назад на пряму мову з правильною пунктуацією.'
      - 'Письмо: написати коротку розповідь (8-10 речень) про свою розмову з кимось. Використати щонайменше 3 приклади прямої мови та 3 непрямої мови з правильною пунктуацією.'
  - section: 'Підсумок та перехід до M75'
    words: 400
    points:
      - 'Підсумок: пряма мова = дослівна передача + лапки + слова автора. Непряма = переказ + складнопідрядне речення (що/щоб/чи). Зміни: займенники, час, місце. Діалог = тире. Самоперевірка: Я правильно оформлюю пряму мову ✓/✗, Я перетворюю пряму на непряму і навпаки ✓/✗.'
      - 'Анонс: M75 — Дозвілля, культура і свята. Комунікативний модуль, що застосовує складний синтаксис Фази 8 на практиці.'
vocabulary_hints:
  required:
    - "пряма мова (direct speech)"
    - "непряма мова (indirect/reported speech)"
    - "слова автора (author's words — reporting clause)"
    - "лапки (quotation marks — « »)"
    - "тире (dash — dialogue marker)"
    - "діалог (dialogue)"
    - "перетворення (transformation — direct to indirect)"
    - "дієслово мовлення (verb of speech — сказати, запитати)"
  recommended:
    - "вигук (exclamation — lost in indirect speech)"
    - "звертання (vocative/address — lost in indirect speech)"
    - "дослівно (verbatim, word for word)"
    - "переказ (retelling)"
    - "авторська ремарка (author's remark in dialogue)"
activity_hints:
  - type: reading
    focus: 'Прочитати текст про пряму мову та її розділові знаки і дати відповіді на запитання.'
  - type: essay-response
    focus: 'Написати 5 речень, використовуючи нову лексику з розділу «Непряма мова: перетворення».'
  - type: fill-in
    focus: 'Вставити правильну граматичну форму у реченнях на тему будови прямої мови.'
  - type: error-correction
    focus: 'Знайти і виправити помилки у реченнях під час перетворення на непряму мову.'
  - type: quiz
    focus: 'Обрати правильний варіант лексики та пунктуації з розділу «Пряма мова: будова і розділові знаки».'
  - type: match-up
    focus: 'З''єднати терміни з розділу «Непряма мова: перетворення» з їхніми визначеннями.'
