    focus: "Punctuate sentences with пряма мова in all four patterns"
    items: 10
  - type: sentence-builder
    focus: "Transform пряма мова to непряма and vice versa"
    items: 10
  - type: reading
    focus: "Choose correct conjunction for indirect speech (що/щоб/чи/question word)"
    items: 8
  - type: error-correction
    focus: "Fix punctuation and pronoun/tense shift errors in reported speech"
    items: 8
  - type: comparative-study
    focus: "Match пряма мова sentences to their непряма мова equivalents"
    items: 8
connects_to:
  - "b1-067 (З'ясувальні речення — непряма мова uses з'ясувальні)"
  - "b1-072 (Речення мети — щоб after imperative in indirect speech)"
  - "b1-075 (Дозвілля — communication applying Phase 8 syntax)"
prerequisites:
