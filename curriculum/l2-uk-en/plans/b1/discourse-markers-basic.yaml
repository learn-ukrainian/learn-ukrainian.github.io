title: 'Дискурсивні маркери: базові конектори'
subtitle: 'Discourse Markers: Basic Connectors'
focus: vocabulary
pedagogy: PPP
phase: B1.5 [Vocabulary Expansion I]
word_target: 4000
objectives:
- Learner can use 25 basic discourse markers in context
- Learner can distinguish between contrasting, causal, and exemplifying connectors
- Learner can produce cohesive text using appropriate connectors
- Learner can improve text flow with discourse markers
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - 'The ''Living Word'' (Живе слово) concept: Exploring Skvoroda''s philosophy where connectors like ''мабуть'' or ''власне''
    are not mere fillers but ''softeners'' that transform informational speech into polite, human connection.'
  - 'State Standard alignment: Systematic overview of §4.4.2 (introductory words/вставні слова like ''мабуть'', ''здається'')
    versus §4.4.3 (complex sentence connectors/сполучники like ''тому що'', ''через те що'').'
  - 'Conceptual hook: Why basic connectors are the ''glue'' of B1 fluency, moving from simple A2 coordination to logical and
    emotional nuance in Ukrainian discourse.'
- section: 'Презентація: Категорії та частотність (Presentation: Categories and Frequency)'
  words: 700
  points:
  - 'Contrastive markers: Analyzing the high-frequency ''але'' versus the formal/written ''однак'' and ''проте''; providing
    specific collocations like ''однак варто зазначити''.'
  - 'Learner error focus: Solving the ''і'' vs ''а'' vs ''але'' confusion — drilling minimal pairs like ''Він студент, а я
    викладач'' (contrastive and) vs ''Він студент, але він не вчиться'' (strong however).'
  - 'Cause and Effect: Usage of ''тому що'' and ''через те що''; highlighting the high frequency of ''саме тому що'' for emphasis
    in spoken and written registers.'
- section: Граматика та пунктуація (Grammar and Punctuation)
  words: 800
  points:
  - 'Punctuation Blindness: Mandatory comma rules for Ukrainian connectors; drilling the requirement of commas before ''але'',
    ''що'', ''бо'', and ''через те що'' which English speakers often omit.'
  - 'Sentence Positioning: Structural rules for ''однак'' (starts clauses) versus the enclitic ''ж'' (must occupy the second
    position for emphasis).'
  - 'Phonetic cues: The role of intonation pauses for introductory words (вставні слова) to signal subjective attitude or
    probability to the listener.'
- section: Регістри та культура мовлення (Registers and Speech Culture)
  words: 700
  points:
  - 'Kyiv-Mohyla Rhetoric: Historical hook on Feofan Prokopovych''s teachings that clear logical markers (''по-перше'', ''отже'')
    are signs of moral and intellectual discipline.'
  - 'Register split: Distinguishing high-frequency spoken markers like ''до речі'' and ''коротше'' from formal academic/logical
    connectors like ''зокрема'' and ''внаслідок''.'
  - 'Refining ''So'': Addressing the ''So'' overload by distinguishing ''отже'' (logical conclusion), ''тому'' (cause-effect),
    and ''ну'' (spoken hesitation filler).'
- section: 'Практика: Читання та аналіз (Practice: Reading and Analysis)'
  words: 600
  points:
  - 'Media Literacy: Analyzing a news report to identify formal contrast markers (''однак'', ''проте'') and their role in
    presenting balanced perspectives.'
  - 'Academic flow: Practicing the use of structured sequence markers ''по-перше'', ''по-друге'', and ''по-третє'' to build
    a persuasive logical argument.'
  - 'Blog analysis: Identifying informal softeners and emotional connectors (''власне кажучи'', ''мені здається'') in modern
    digital Ukrainian prose.'
- section: 'Практика та продукція: Діалоги (Practice and Production: Dialogues)'
  words: 700
  points:
  - 'Workplace scenario: Using ''безумовно'' for emphatic agreement and ''власне кажучи'' for polite correction during a professional
    discussion.'
  - 'Casual socialization: Integrating ''до речі'' and ''ну'' naturally into a conversation about weekend plans to achieve
    a ''living word'' feel.'
  - 'Summary and Recap: Final drill on choosing the correct connector based on the desired emotional softening or logical
    precision required by the context.'
vocabulary_hints:
  required:
  - також (also) — standard addition; High frequency across all registers
  - 'крім того (besides) — adds a new argument; Collocations: ''крім того варто додати'''
  - 'але (but) — strong contrast; Common error vs ''а''; Collocations: ''але ж'', ''але все ж таки'''
  - 'однак (however) — formal contrast; Collocations: ''однак варто зазначити'', ''однак не слід забувати'''
  - 'тому що (because) — high frequency causal; Collocations: ''саме тому що'', ''лише тому що'''
  - 'отже (therefore) — logical conclusion marker; Collocations: ''отже ми можемо'', ''отже висновок'''
  - 'наприклад (for example) — standard exemplification; Collocations: ''як наприклад'', ''наприклад у випадку'''
  - тобто (that is) — clarification marker; high frequency in spoken correction
  recommended:
  - проте (nevertheless) — formal contrast synonym for 'однак'; used mostly in written texts
  - внаслідок (as a result) — formal consequence; common in news and academic registers
  - 'зокрема (in particular) — specific example; Collocations: ''зокрема слід виділити'''
  - іншими словами (in other words) — standard rephrasing marker
  - 'до речі (by the way) — high frequency spoken; Collocations: ''до речі кажучи'', ''і до речі'''
  - 'власне (actually/strictly) — correction/precision; Collocations: ''власне кажучи'', ''власне це'''
  - 'безумовно (certainly) — emphatic agreement; Collocations: ''безумовно це так'', ''я безумовно згоден'''
  - по-перше / по-друге (firstly/secondly) — structuring arguments; Kyiv-Mohyla clarity influence
