module: b1-012
level: B1
sequence: 12
slug: checkpoint-aspect
version: '1.2'
title: "Контрольна робота: вид дієслова"
subtitle: "Діагностична перевірка аспектного вибору в усіх контекстах M01-M11"
focus: checkpoint
pedagogy: TTT
phase: "B1.0 [Основи та опанування виду]"
word_target: 4000
objectives:
  - "Учень вміє правильно обирати між доконаним та недоконаним видом у розповідях про минулий час, розрізняючи тло та послідовність подій"
  - "Учень вміє обирати відповідний вид у контекстах майбутнього часу: планована одноразова дія (док. — напишу) проти регулярної/тривалої дії (недок. — писатиму)"
  - "Учень вміє вживати правильний вид у наказовому способі: загальна інструкція (недок. — читайте!) проти конкретної одноразової команди (док. — прочитайте цю статтю!)"
  - "Учень вміє застосовувати правила виду в запереченні: не читав (недок. — загальне заперечення) проти не прочитав (док. — очікуваний результат не досягнутий)"
  - "Учень вміє обирати вид в умовному способі та умовних реченнях: Якби я знав (недок.)... Якби я дізнався (док.)..."
dialogue_situations:
  - setting: 'Вчитель перевіряє домашнє завдання з учнем — помилки у виборі виду як діагностика: Ти читав цей текст? — Так, я прочитав його вчора ввечері. — Добре. Тепер напиши відповіді на запитання.'
    speakers:
      - Вчитель
      - Учень
    motivation: 'Аспектна діагностика в реальному навчальному середовищі: читав (недок., запитання про процес) проти прочитав (док., підтвердження результату) проти напиши (док. наказ, одноразове завдання).'
content_outline:
  - section: "Вид у минулому: тло і послідовність"
    words: 1000
    points:
      - "Діагностичне повторення виду в минулому часі (на основі Литвінової Grade 7 p.30): Недоконаний вид як тло розповіді — тривалі, одночасні, регулярні дії: Надворі падав сніг. Діти гралися у дворі. Доконаний вид як подієвий ланцюг — послідовні завершені дії: Він встав, одягнувся, вийшов з дому."
      - "Змішаний вид у зв'язній розповіді (Заболотний Grade 7 p.62): Коли ми снідали (недок. — тло), зателефонувала (док. — подія) бабуся. Вона сказала (док.), що приїжджає (недок. — план, що розгортається). Ми зраділи (док.) і почали (док.) готуватися (недок. — початок тривалої дії). Ключовий показник: чи може учень пояснити, ЧОМУ кожне дієслово доконане чи недоконане?"
      - "Діагностична вправа тип 1 — визначення виду: з поданого абзацу учень визначає кожне дієслово як доконане/недоконане та пояснює аспектну функцію (тло, подія, початок дії, результат). Тексти складено за темами M01-M11 (щоденне життя, стосунки, здоров'я, робота)."
      - "Діагностична вправа тип 2 — вибір виду: учень доповнює розповідь, обираючи між парами дієслів: Вчора я [читав/прочитав] книжку цілий вечір. Нарешті [закінчував/закінчив] останній розділ."
  - section: "Вид у майбутньому та наказовому"
    words: 1000
    points:
      - "Вид у майбутньому часі (Литвінова Grade 7 p.44): Доконаний вид — одноразова запланована дія з очікуваним результатом: Завтра я напишу лист. Після обіду подзвоню мамі. Недоконаний вид — регулярне, повторюване або тривале майбутнє: Щодня писатиму щоденник. Цілий тиждень готуватимуся до іспиту."
      - "Три форми майбутнього часу та вид: Синтетичний майбутній (тільки док.): напишу, прочитаю. Аналітичний майбутній (недок.): буду писати, буду читати. Синтетичний із -му (недок.): писатиму, читатиму. Діагностика: учень повинен обрати правильну форму на основі виду та контексту."
      - "Вид у наказовому способі (Авраменко Grade 7 p.78): Недоконаний — загальна, повторювана інструкція, запрошення: Читайте більше! Пишіть щодня! Сідайте, будь ласка! Доконаний — конкретна, одноразова команда з очікуваним завершенням: Прочитайте сторінку 45. Напишіть відповідь. Сядьте на це місце."
      - "Діагностична вправа тип 3 — вид у наказовому способі: Учень обирає між недок. і док. наказовим у контексті. [Читай/Прочитай] цей текст до завтра (док. — конкретне завдання, дедлайн). [Читай/Прочитай] кожен день перед сном (недок. — регулярна порада). Різниця полягає в тому, чи очікується КОНКРЕТНИЙ РЕЗУЛЬТАТ."
  - section: "Вид і заперечення"
    words: 1000
    points:
      - "Вид під час заперечення — ключова українська особливість (Авраменко Grade 7 p.57): Недоконаний вид — загальне заперечення, дія взагалі не відбулася: Я не читав цю книжку. (= ніколи її не читав, загальне твердження.) Доконаний вид — очікуваний результат не досягнуто: Я не прочитав цю книжку. (= не дочитав її до кінця, хоча очікувалося.)"
      - "Патерни заперечення в різних контекстах: Минулий: Він не дзвонив (недок. — взагалі не дзвонив) проти Він не подзвонив (док. — не подзвонив, хоча мав). Майбутній: Не буду читати (недок. — відмовляюся/взагалі не робитиму) проти Не прочитаю (док. — не встигну завершити). Наказовий: Не відчиняйте (недок. — загальна заборона, стандартна форма для негативних наказів) проти Не відчиніть (док. — попередження, 'не відчиніть випадково')."
      - "Критичне правило: заперечний наказовий спосіб у стандартній українській мові сильно тяжіє до недоконаного виду. Не чіпайте! (недок. — загальна заборона). Не бігайте! (недок.). Заперечний наказ доконаного виду (Не впусти!) передбачає випадкову або ненавмисну можливість — це попередження, а не заборона."
      - "Діагностична вправа тип 4 — заперечення і вид: Учень пояснює різницю у значенні між парами. Я не писав листа (недок. — взагалі не писав) проти Я не написав листа (док. — не закінчив). Не забувай! (недок. — загальне нагадування) проти Не забудь! (док. — конкретне попередження про щось одне)."
  - section: "Вид в умовному способі та підсумок"
    words: 1000
    points:
      - "Вид в умовному способі: Недоконаний — гіпотетична тривала або регулярна дія: Якби я жив у Києві, я ходив би в театр щотижня. Доконаний — гіпотетична одноразова завершена дія: Якби я переїхав до Києва, я знайшов би нову роботу."
      - "Умовні речення зі взаємодією видів: Якби вона подзвонила (док. — одноразова подія), я б відповів (док.). Якби вона дзвонила (недок. — регулярно), я б завжди відповідав (недок.). Вид відображає ПРИРОДУ гіпотетичної дії: одноразовий результат проти регулярного процесу."
      - "Комплексне діагностичне повторення — узагальнююча таблиця у всіх контекстах: минулий час (тло проти події), майбутній час (план проти тривалості), наказовий спосіб (конкретна команда проти загальної інструкції), заперечення (загальне проти нереалізованого результату), умовний спосіб (одноразове проти повторюваного). Учень заповнює таблицю власними прикладами з лексики M01-M11."
      - "Самоперевірка: 1. Перекажіть свій минулий тиждень, чергуючи доконаний і недоконаний вид (мінімум 8 дієслів). 2. Складіть 3 пари наказів: загальна інструкція (недок.) проти конкретна команда (док.). 3. Поясніть різницю: 'Я не читав цю книжку' проти 'Я не прочитав цю книжку'. 4. Складіть 2 умовні речення з різним видом дієслова."
vocabulary_hints:
  required:
    - "доконаний вид (perfective aspect — completed, result-oriented action)"
    - "недоконаний вид (imperfective aspect — ongoing, unbounded action)"
    - "видова пара (aspectual pair — e.g., писати/написати)"
    - "тло розповіді (narrative background — imperfective setting/scene)"
    - "послідовність подій (sequence of events — perfective event chain)"
    - "наказовий спосіб (imperative mood — commands and requests)"
    - "заперечення (negation — negative constructions with aspect)"
    - "умовний спосіб (conditional mood — hypothetical actions with би/б)"
    - "результативність (resultativity — focus on outcome, triggers perfective)"
    - "тривалість (duration — focus on process length, triggers imperfective)"
    - "діагностика (diagnostics — self-assessment of aspect mastery)"
    - "повторення (review/repetition — consolidation of learned material)"
    - "контрольна робота (test/assessment — formal diagnostic check)"
    - "минулий час (past tense — time frame for aspect practice)"
    - "майбутній час (future tense — time frame for aspect practice)"
  recommended:
    - "подієвий ланцюг (event chain — sequence of perfective actions)"
    - "загальне заперечення (general negation — imperfective, action didn't occur)"
    - "нереалізований результат (unrealized result — perfective negation, expected outcome not achieved)"
    - "заборона (prohibition — negative imperative, strongly prefers imperfective)"
    - "попередження (warning — perfective negative imperative for accidental actions)"
    - "синтетичний майбутній (synthetic future — perfective: напишу)"
    - "аналітичний майбутній (analytic future — imperfective: буду писати)"
activity_hints:
  - type: quiz
    focus: 'Визначте вид дієслова та поясніть аспектну функцію (тло, подія, результат, тривалість) у реченнях з M01-M11'
    items: 12
  - type: fill-in
    focus: 'Оберіть правильний вид дієслова у контексті: минулий, майбутній, наказовий спосіб, заперечення'
    items: 10
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у вживанні виду в реченнях: неправильний аспект у розповіді, наказі, запереченні'
    items: 8
  - type: group-sort
    focus: 'Розподіліть дієслова за видом і контекстом: тло / подія / загальна інструкція / конкретна команда'
    items: 10
  - type: match-up
    focus: 'З''єднайте видові pairs та вкажіть контекст, де кожен вид доречний'
    items: 8
  - type: open-writing
    focus: 'Напишіть текст із завданнями: 1) розповідь про минулий тиждень (тло + події), 2) три пари наказів, 3) два умовні речення з різним видом'
    items: 8
