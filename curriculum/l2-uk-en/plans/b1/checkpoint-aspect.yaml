  - "b1-001 (Минуле і теперішнє — вид у минулому часі, повторення тут)"
  - "b1-002 (Майбутнє і вид дієслова — вид у майбутньому часі, повторення тут)"
  - "b1-010 (Робота та кар'єра — вид у робочих розповідях, перевіряється тут)"
  - "b1-023 (Контрольна робота: морфонологія — наступна велика контрольна)"
prerequisites:
  - "b1-001 до b1-011 (усі модулі B1.0, що охоплюють вид у різних контекстах)"
grammar:
  - "Вид дієслова в минулому часі: тло (недоконаний) проти послідовності подій (доконаний)"
  - "Вид у майбутньому: синтетичний (док.) проти аналітичний/синтетичний -му (недок.)"
  - "Вид у наказовому способі: загальна інструкція (недок.) проти конкретної команди (док.)"
  - "Вид і заперечення: загальне (недок.) проти нереалізованого результату (док.)"
  - "Вид в умовному способі: повторювана/тривала (недок.) проти одноразової (док.) гіпотетичної дії"
  - "Негативний наказовий спосіб: перевага недоконаного виду для заборон"
register: науково-навчальний
references:
  - title: "Литвінова Grade 7, p.30-47"
    notes: "Вид дієслова: доконаний/недоконаний — повний огляд, зв'язок виду і часу, аспектуальна стратегія в розповіді."
  - title: "Заболотний Grade 7, p.54-65"
    notes: "Дієслово: вид, часи, утворення видових пар, вибір виду в контексті."
  - title: "Авраменко Grade 7, p.57-78"
    notes: "Вид дієслова: таблиці видових пар, наказовий спосіб, особливі форми."
  - title: "Литвінова Grade 7, p.44"
    notes: "Зв'язок виду і часу: доконаний вид не має теперішнього часу, три форми майбутнього часу."