module: b1-008
level: B1
sequence: 8
slug: aspect-in-imperatives
version: '1.0.2'
title: 'Вид у наказовому способі'
subtitle: 'Відкрий! vs Не відкривай! — чому заперечення змінює вид'
focus: aspect-imperatives
pedagogy: TTT
phase: 'B1.0 [Базові концепції та опанування виду]'
word_target: 4000
objectives:
  - 'Учень вміє пояснювати, чому стверджувальні накази часто використовують доконаний вид (запит на конкретний результат), тоді як заперечні накази майже завжди використовують недоконаний вид (загальна заборона) — застосовуючи українську метамову'
  - 'Учень вміє утворювати наказовий спосіб обох видів та обирати правильний залежно від комунікативного наміру: ввічливе прохання (недок.) vs пряма вказівка (док.), загальне попередження (недок.) vs конкретна інструкція (док.)'
  - 'Учень вміє утворювати природні видові пари наказового способу (Відкрий вікно! / Не відкривай вікно!) та пояснювати логіку вибору виду для кожної з них'
  - 'Учень вміє доречно використовувати наказовий спосіб у повсякденних ситуаціях: коли дає пораду, висловлює прохання, виносить заборону та надає інструкції'
dialogue_situations:
  - setting: 'Кулінарний майстер-клас — інструктор дає конкретні вказівки (док.: наріж, поклади, перемішай) та загальні правила (недок.: не додавай забагато солі, завжди мийте руки): Спочатку наріж цибулю. Потім поклади на сковорідку. Але не додавай олії забагато — вона має лише покрити дно.'
    speakers:
      - Інструктор
      - Учениця
    motivation: 'Конкретні послідовні інструкції (док.) проти загальних постійних правил (недок.) — природний контраст виду в наказовому способі у практичній ситуації'
  - setting: 'Мати виряджає сина-підлітка до школи — поєднання конкретних вказівок (док.: візьми парасольку, не забудь ключі) та загальних порад (недок.: будь уважний, не запізнюйся): Візьми парасольку — обіцяють дощ. І не забудь ключі! — Мамо, не хвилюйся. Я все пам''ятаю.'
    speakers:
      - Мама
      - Син
    motivation: 'Конкретні дії (док.) проти загальних порад щодо поведінки (недок.) у звичній повсякденній ситуації'
content_outline:
  - section: 'Тест: який наказ звучить природно?'
    words: 850
    points:
      - 'Діагностика: 10 пар наказів — учні обирають більш природний варіант. Приклади: (Відкрий / Відкривай) вікно, будь ласка — тут душно. Не (відкрий / відкривай) вікно — надворі холодно. (Запиши / Записуй) мій номер телефону. Не (запиши / записуй) нічого — я все скажу усно.'
      - 'Самооцінювання: розпізнавання патернів. Більшість учнів помітить: ствердження = зазвичай док., заперечення = зазвичай недок. Але ЧОМУ? Цей модуль пояснює логіку, яку вже відчуває інтуїція.'
      - 'Головна думка: Саме в наказовому способі вибір виду є НАЙБІЛЬШ значущим у повсякденному мовленні. Відкрий! (зроби це — конкретний результат) vs Відкривай! (давай, починай робити — процес/дозвіл). Не відкривай! (не роби цього — загальна заборона) vs Не відкрий! (дуже рідко — будь обережним, щоб випадково не відкрити).'
      - 'Швидке повторення утворення: наказовий спосіб від основи теперішнього часу. 2 ос. одн.: пиши!, напиши!, читай!, прочитай! 2 ос. мн./ввічл.: пишіть!, напишіть! 1 ос. мн.: пишімо!, напишімо! Заперечення: не + форма наказового способу.'
  - section: 'Позитивний наказ: доконаний чи недоконаний?'
    words: 1050
    points:
      - 'Стверджувальний наказ доконаного виду — стандарт для команд (Заболотний 7 клас, с.84): Запит на конкретний результат: Напиши лист! (напиши і закінчи його). Відчини двері! (відчини їх — результат: двері відчинені). Прочитай цю статтю! (прочитай до кінця — результат: знатимеш зміст). Послідовні інструкції: Спочатку помий руки. Потім наріж хліб. Візьми тарілку.'
      - 'Стверджувальний наказ недоконаного виду — запрошення, дозвіл, процес: Загальне запрошення: Заходьте! Сідайте! (привітність, а не наказ). Дозвіл почати/продовжити: Починайте! Читайте далі! Тривала/повторювана дія: Пишіть акуратно. Говоріть повільніше. Акцент на процесі: Слухай уважно. (тривала увага, а не одноразова дія).'
      - 'Шкала ввічливості: накази недоконаного виду часто відчуваються М''ЯКШИМИ за доконані. Допоможіть, будь ласка (недок. — загальне прохання про допомогу). Допоможіть мені перенести цю валізу (контекст док. — конкретна дія). Розкажіть про себе (недок. — відкрите запрошення). Розкажіть, що сталося (контекст док. — конкретний запит на інформацію). Вид змінює прагматичну силу.'
      - 'Практика: учні отримують 8 ситуацій і мають обрати вид для стверджувального наказу, а потім пояснити свій вибір: Ти просиш друга зачинити вікно. (док. — конкретний результат). Ти кажеш гостям сідати за стіл. (недок. — запрошення). Учитель каже учням писати тест. (недок. — початок процесу).'
  - section: 'Негативний наказ: чому майже завжди недоконаний?'
    words: 1050
    points:
      - 'Правило заперечного наказу (Литвінова 7 клас, с.84): Не + недоконаний вид є стандартною формою для заборон та попереджень. Не відкривай вікно! (загальна заборона). Не торкайся! (попередження). Не запізнюйся! (загальна порада). Не хвилюйся! (заспокоєння).'
      - 'ЧОМУ недоконаний? Заборона спрямована на САМУ ДІЮ — вона означає «ця діяльність заборонена». Недоконаний вид охоплює дію як ціле (процес, загальна категорія). Доконаний вид охоплює конкретний завершений результат — що немає сенсу забороняти (не можна «скасувати» завершене).'
      - 'Рідкісне не + доконаний вид: попередження про випадковий результат. Не впади! (обережно, щоб не впасти! — випадкова подія). Не загуби ключі! (випадковий результат, якому треба запобігти). Не забудь! (випадковий промах). Це не заборони — це ЗАСТЕРЕЖЕННЯ щодо можливих небажаних наслідків. Мовець не забороняє дію; він попереджає про потенційний випадковий результат.'
      - 'Практика: учні класифікують заперечні накази як заборону (недок.) або застереження (попередження — док.), а потім створюють власні приклади. Мінідіалог: батьки дають дитині, яка йде до школи, суміш заборон та застережень.'
  - section: 'Підсумок: вид як прагматичний вибір'
    words: 1050
    points:
      - 'Зведена таблиця: Стверджувальний наказ — док. (конкретна команда/результат), недок. (запрошення/дозвіл/процес). Заперечний наказ — недок. (заборона/порада), док. (попередження про випадковий результат). Вибір ПРАГМАТИЧНИЙ — він залежить від того, що мовець хоче повідомити, а не від механічного правила.'
      - 'Ситуативна практика: учні розігрують 4 сценарії, використовуючи обидва види в наказах. А) Кулінарія: покрокові інструкції (док.) + загальні правила безпеки з їжею (недок.). Б) Порада лікаря: конкретні інструкції (док.: випийте цей чай) + загальні заборони (недок.: не пийте холодну воду). В) Туристичний гід: запрошення (недок.: дивіться! фотографуйте!) + конкретні вказівки (док.: зверніть увагу на цю фреску). Г) Батьки: накази (док.: прибери кімнату) + попередження (док.: не забудь ключі) + загальні правила (недок.: не запізнюйся).'
      - 'Типові помилки: *Не відкрий вікно! (неправильно — загальна заборона = недок.: не відкривай). *Заходь, будь ласка! Сідь! (док. для запрошення звучить різко — тепліше недок. Заходьте! Сідайте!). *Не забувай ключі! (надто узагальнено для конкретного попередження — краще док. Не забудь ключі!).'
      - 'Анонс наступного модуля: Вид і заперечення — як вид взаємодіє із запереченням поза межами наказового способу (не + недок. як загальне, ще не + док. як очікуване завершення).'
