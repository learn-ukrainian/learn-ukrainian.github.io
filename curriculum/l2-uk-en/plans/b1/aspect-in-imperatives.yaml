content_outline:
- section: Вступ та діагностика (Introduction & Diagnostics)
  words: 500
  points:
  - 'Diagnostic contrast based on State Standard §4.2.3.2: use verb pairs like ''кажіть/скажіть'' and ''мрій/мріймо'' to test
    functional usage (process vs. result) beyond mere formation.'
  - 'Introduction to the ''Politeness Paradox'' — pose the question: which sounds more polite to a guest, ''Сядьте'' or ''Сідайте''?
    Use this to engage critical thinking about pragmatic register.'
- section: 'Граматика: Стверджувальні конструкції (Grammar: Affirmative Constructions)'
  words: 900
  points:
  - НДВ commands (process, permission) — Detailed explanation of how Imperfective softens a command into a polite invitation
    ('Сідайте', 'Заходьте', 'Беріть'); contrast with curt military-style Perfective orders.
  - ДВ commands (result, instruction) — Specific usage for one-time results. Address the common learner error of using 'Зачиняй'
    for a single request to 'Close the window' (should be 'Зачини').
  - Collective imperatives and register — Contrast standard synthetic forms like 'робімо', 'ходімо', and 'пиймо' (per §4.2.3.2)
    with the high-frequency colloquial use of 'давай(те)' + future/infinitive.
- section: 'Граматика: Заперечення та застереження (Grammar: Negations & Warnings)'
  words: 900
  points:
  - 'The Negation Flip Logic — Detailed rule: Prohibitions (general ''don''t do it'') almost always use Imperfective aspect
    (''Не роби'', ''Не кажи'').'
  - 'Warnings and Prevention — Usage of Perfective for specific warnings (''Не впади'', ''Гляди, не зроби''). Correction of
    learner error: using Perfective for general prohibitions.'
  - Semantic nuances with 'пам'ятай' (generic advice/ongoing state) vs. 'запам'ятай' (specific instruction to memorize a fact).
- section: Практика та розбір помилок (Practice & Error Analysis)
  words: 1000
  points:
  - 'Decision-making framework — Interactive flowchart exercises: Affirmative? → Result (Pf) or Process/Invitation (Imp);
    Negative? → Prohibition (Imp) or Warning (Pf).'
  - The Politeness Trap drills — Exercises focused on converting curt Perfective commands into polite Imperfective invitations
    to avoid pragmatic failure in social situations.
  - Aspect selection for advice vs. commands — Practice using Imperfective for general lifelong advice vs. Perfective for
    immediate tactical instructions.
- section: Культурний код та діалоги (Cultural Code & Dialogues)
  words: 700
  points:
  - Proverbial wisdom analysis — Deep dive into the proverb 'Вік живи — вік учись'. Explain why НДВ verbs 'живи' and 'учись'
    are mandated for describing a continuous, lifelong process.
  - 5-6 Authentic dialogues — Scenarios contrasting formal invitations using 'будь ласка' and НДВ with urgent, high-stakes
    commands using 'негайно' or 'обов'язково' and ДВ.
  - Summary of functional usage — Final review of how aspect selection defines the tone of a Ukrainian sentence (invitation
    vs. order).
vocabulary_hints:
  required:
  - наказовий спосіб (imperative mood) — утворити наказовий спосіб, форма наказового способу; High frequency in grammatical
    context
  - будь ласка (please) — скажіть будь ласка, дайте будь ласка; Very High frequency; key for softening commands
  - негайно (immediately) — негайно припини, зробити негайно; High frequency for urgent tactical commands
  - обов'язково (definitely/must) — обов'язково зроби, обов'язково прийди; High frequency for emphasis
  - пам'ятай (remember - impf) — пам'ятай про це, завжди пам'ятай; Generic advice or ongoing state
  - запам'ятай (memorize - pf) — specific act of committing to memory
  - перестань (stop - pf) — перестань кричати, перестань плакати; High frequency in spoken language/parenting
  recommended:
  - давай (let's - impf) — давай зробимо, давай підемо; High frequency colloquial usage; contrast with synthetic forms 'робімо/ходімо'
  - припини (stop/cease - pf) — formal synonym for 'перестань'; used in professional or serious registers
  - продовжуй (continue - impf) — used to encourage ongoing action or process
  - зачекай (wait - pf) — wait for a specific result or moment; contrast with 'чекай' (process of waiting)
  - чекай (wait - impf) — used for the duration/process of waiting
