prerequisites:
  - 'b1-006 aspect-in-narration (опанування виду в розповіді)'
  - 'A2 imperative-complete (базове утворення наказового способу)'
grammar:
  - 'Наказовий спосіб: утворення від основи теперішнього часу'
  - 'Стверджувальний наказ: доконаний (команда/результат) vs недоконаний (запрошення/процес)'
  - 'Заперечний наказ: не + недоконаний (заборона) vs не + доконаний (застереження)'
  - 'Прагматична функція вибору виду в наказовому способі'
  - 'Шкала ввічливості: недоконаний м''якший за доконаний'
register: розмовний
references:
  - title: "Заболотний Grade 7, p.82-88"
    notes: 'Наказовий спосіб дієслова: утворення, вживання, вправи на вибір виду в наказовому способі.'
  - title: "Литвінова Grade 7, p.82-86"
    notes: 'Наказовий спосіб: форми 2-ї особи і 1-ї особи множини, заперечні імперативи, вид у наказовому способі.'
  - title: "Авраменко Grade 7, p.80-84"
    notes: 'Наказовий спосіб: утворення, значення, ввічливість і категоричність, практичні вправи.'