activity_hints:
  - type: quiz
    focus: 'Оберіть правильний вид для наказів у контексті — стверджувальні команди, запрошення, заборони та попередження'
    items: 10
  - type: fill-in
    focus: 'Утворіть форму наказового способу правильного виду на основі опису ситуації (заборона vs конкретна команда vs запрошення)'
    items: 8
  - type: group-sort
    focus: 'Розподіліть наказові речення за категоріями: команда (док.), запрошення (недок.), заборона (не + недок.), застереження (не + док.)'
    items: 10
  - type: error-correction
    focus: 'Знайдіть і виправте помилки щодо виду в наказових реченнях (*Не відкрий вікно! → Не відкривай; *Заходь, сідь → Заходьте, сідайте)'
    items: 6
  - type: match-up
    focus: 'З''єднайте ситуації (крок у кулінарії, загальне правило, попередження, запрошення) з відповідним видом наказового способу'
    items: 8
  - type: open-writing
    focus: 'Напишіть інструкції для гостя у вашому домі — поєднайте конкретні накази (док.), запрошення (недок.) та правила дому (не + недок.)'
    items: 6
