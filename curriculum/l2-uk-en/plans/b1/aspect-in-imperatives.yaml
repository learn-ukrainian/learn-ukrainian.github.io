slug: aspect-in-imperatives
version: '2.0'
title: Вид у наказовому способі
subtitle: Aspect in Imperatives
content_outline:
- section: Тест
  points:
  - Diagnostic contrast for вид у наказовому способі — use pairs like *кажіть/скажіть*
    to test semantic distinction beyond formation
  - No explanation, just observation — focus on functional usage (process vs. result,
    politeness vs. command)
  - 'Engage critical thinking — ask: which sounds like a military order, which like
    a polite invitation?'
- section: Пояснення
  points:
  - 'НДВ commands (process, permission) — Politeness Paradox: Imperfective often more
    polite for invitations (*Сідайте* vs *Сядьте*)'
  - 'ДВ commands (result, instruction) — learner error: confusing specific single
    command (*Зачини*) with repeated instruction (*Зачиняй*)'
  - Polite requests — use of *будь ласка* with appropriate aspect; note on *давай(те)*
    vs synthetic forms like *робімо*
  - 'Negative commands — Critical Distinction: Negation flips logic; Prohibitions
    usually Imperfective (*Не роби*), Warnings Perfective (*Гляди, не зроби*)'
- section: Практика
  points:
  - 'Decision-making framework — Flowchart: Affirmative? → Result (Pf)/Process (Imp);
    Negative? → Prohibition (Imp)/Warning (Pf)'
  - 'Comparative examples — cultural hook: Proverbial wisdom *Вік живи — вік учись*
    (continuous process)'
  - Common mistakes section — The Politeness Trap (military *Сядьте* vs polite *Сідайте*);
    Prohibition vs Warning
- section: Діалоги
  points:
  - '5-6 authentic dialogues — scenarios: formal invitation vs. urgent command'
  - 'Grammar in natural context — incorporate collocations: *негайно припини*, *обов''язково
    зроби*'
  - Various situations — standard usage of *будь ласка* and register differences
vocabulary_hints:
  required:
  - наказовий спосіб (imperative mood) — утворити наказовий спосіб, форма наказового
    способу
  - команда (command) — giving orders vs. requests
  - прохання (request) — polite formulations
  - порада (advice) — generic advice often uses Imperfective
  - будь ласка (please) — скажіть будь ласка, дайте будь ласка
  - негайно (immediately) — негайно припини, зробити негайно
  - обов'язково (definitely/must) — обов'язково зроби, обов'язково прийди
  - пам'ятай (remember - impf) — пам'ятай про це, завжди пам'ятай
  - запам'ятай (memorize - pf) — specific act of memorizing
  - перестань (stop - pf) — перестань кричати, перестань плакати
  recommended:
  - припини (stop/cease - pf) — formal synonym for перестань
  - продовжуй (continue - impf) — encourage ongoing action
  - зачекай (wait - pf) — wait for a specific moment
  - чекай (wait - impf) — process of waiting
  - давай (let's - impf) — давай зробимо, давай підемо (colloquial vs synthetic)
