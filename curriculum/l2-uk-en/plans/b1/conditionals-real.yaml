grammar:
  - 'Утворення умовного способу: минулий час + частка би (б)'
  - 'Розміщення частки: б після голосного, би після приголосного, вільна позиція в реченні'
  - 'Реальна умова: якщо + дійсний спосіб... (то) + дійсний спосіб'
  - 'Вибір виду в якщо-реченнях: доконаний (результат) vs недоконаний (процес)'
  - 'Ввічливий регістр: умовний спосіб для прохань, побажань, м''яких порад'
register: академічний
references:
  - title: "Литвінова Grade 7, p.36, 61-62"
    notes: 'Three-way mood system table; умовний спосіб definition and formation exercises; particle б/би placement rules.'
  - title: "Заболотний Grade 7, p.72-75"
    notes: 'Способи дієслів comparison table; умовний спосіб exercises with якби-sentences; formation practice with personal forms.'
  - title: "Авраменко Grade 7, p.77, 83"
    notes: 'Умовний and наказовий have no часові форми; частка б/би spelling rules and placement examples including literary quotes.'
  - title: "Заболотний Grade 8, p.114"
    notes: 'Складнопідрядне речення умови: сполучники якщо, коли, як, якби, аби; співвідносне слово то in main clause.'
  - title: "Заболотний Grade 7, p.185"
    notes: 'Способи дієслів: дійсний = реальна дія, умовний = можлива за умов, наказовий = наказ/прохання.'