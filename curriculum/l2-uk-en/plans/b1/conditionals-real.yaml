module: b1-024
level: B1
sequence: 24
slug: conditionals-real
version: '3.1.2'
title: 'Умовний спосіб (реальний)'
subtitle: 'Якщо-речення та реальні умовні конструкції'
focus: grammar
pedagogy: PPP
phase: 'B1.2 [Система дієслів]'
word_target: 4000
objectives:
  - 'Учень вміє утворювати та використовувати дієслова умовного способу з часткою би/б для вираження побажань, гіпотетичних, але можливих результатів, та ввічливих прохань'
  - 'Учень вміє будувати реальні умовні речення за допомогою якщо... (то)... з правильним часом і видом в обох частинах'
  - 'Учень вміє розрізняти дійсний спосіб та умовний спосіб за значенням і формою, а також пояснювати, коли кожен з них є доречним'
  - 'Учень вміє правильно розташовувати частку б/би (після голосного → б, після приголосного → би) та розуміє, що вона може стояти після будь-якого повнозначного слова'
  - 'Учень вміє використовувати реальні умовні речення у практичному спілкуванні: під час планування, вираження умов для майбутніх дій, ввічливих пропозицій'
dialogue_situations:
  - setting: 'Друзі планують похід у Карпати (pl) — зважують варіанти: Якщо погода буде гарна, піднімемося на Говерлу (f). Якщо підемо рано, встигнемо до обіду. Якщо дощитиме, залишимося в колибі (f).'
    speakers:
      - Олег
      - Наталя
    motivation: 'Реальні умовні конструкції: якщо + майбутній час із Говерла(f), колиба(f), Карпати(pl)'
content_outline:
  - section: 'Що таке спосіб дієслова?'
    words: 550
    points:
      - 'Повторення за Литвіновою 7 клас, с.36 — трикомпонентна система: Дійсний спосіб — реальна дія (відбувалася, відбувається, відбуватиметься). Умовний спосіб — бажана дія, можлива лише за певних умов. Наказовий спосіб — прохання, наказ, спонукання до дії. Дійсний спосіб має часові форми; умовний та наказовий способи НЕ МАЮТЬ часових форм (Авраменко 7 клас, с.77).'
      - 'Чому умовний спосіб є важливим для комунікації на рівні B1: висловлення побажань (я хотів би), ввічливі прохання (чи не могли б ви...?), обговорення планів, що залежать від умов (якщо матиму час, піду на виставку). Цей модуль фокусується на РЕАЛЬНИХ умовах — тому, що МОЖЕ статися.'
      - 'Порівняння зі знаннями рівня A2: на рівні A2 учні використовували виключно дійсний спосіб. Тепер вони додають новий вимір — здатність виражати умови, побажання та невизначеність. Це значний комунікативний крок уперед.'
  - section: 'Утворення умовного способу'
    words: 700
    points:
      - 'Правило утворення за Литвіновою 7 клас, с.61 та Заболотним 7 клас, с.72: Минулий час дієслова + частка би (б). сказав + би = сказав би, сказала + б = сказала б. Частка б/би ЗАВЖДИ пишеться окремо від дієслова. На відміну від англійського "would", українська частка б/би не має фіксованої позиції.'
      - 'Правило милозвучності для б vs. би (Авраменко 7 клас, с.83): Після голосного → б: сказала б, хотіла б, зробило б. Після приголосного → би: сказав би, хотів би, зробив би. Це відображає український принцип милозвучності.'
      - 'Гнучкість розміщення частки (Авраменко 7 клас, с.83): Частку б/би пишемо окремо, вона може стояти після будь-якого повнозначного слова: «Я б навіть сонцю одягнула вінок із житніх колосків» (Л. Рубан). Порівняйте: я зробив би / я б зробив / я зробив це б інакше — усе граматично правильно.'
      - 'Практика повної парадигми: читати: я читав би / я читала б, ти читав би / ти читала б, він читав би, вона читала б, воно читало б, ми читали б, ви читали б, вони читали б. Зверніть увагу: умовний спосіб зберігає рід і число від минулого часу, але НЕ МАЄ власних часових форм.'
  - section: 'Реальна умова з якщо'
    words: 700
    points:
      - 'Структура реальних умовних речень: Якщо + дійсний спосіб (теперішній/майбутній), (то) + дійсний спосіб (майбутній). Якщо пошукаєш у книгах мудрості, то знайдеш велику користь для душі своєї (Нестор) — із Заболотного 8 клас, с.114. Умова є РЕАЛЬНОЮ — вона дійсно може виконатися.'
      - 'Сполучник якщо та його варіанти: якщо, коли (в умовному значенні), як (розмовний). Якщо матимеш час, зателефонуй мені. Коли будеш у Львові, завітай до нас. Як прийдеш рано, встигнемо. Частка то в головному реченні є необов''язковою, але поширеною.'
      - 'Вибір виду в реченнях з якщо: Недоконаний вид наголошує на процесі/повторюваності: Якщо щодня вчитимеш слова, швидко заговориш. Доконаний вид наголошує на завершеному результаті: Якщо вивчиш цей розділ, складеш іспит. Практика: утворення пар із різним видом, спостереження за зміною значення.'
      - 'Поширені комунікативні шаблони з якщо: Якщо хочеш, можемо... (запрошення) Якщо не заперечуєш, я... (ввічлива пропозиція) Якщо все буде гаразд, ми... (плани на майбутнє) Якщо матиму нагоду, обов''язково... (вираження наміру)'
  - section: 'Умовний спосіб для ввічливості'
    words: 600
    points:
      - 'Ввічливі прохання з використанням умовного способу: Чи не могли б ви допомогти? (замість Допоможіть!) Я хотів/хотіла б запитати... (замість Я хочу запитати) Чи не підказали б ви, де аптека? Умовний спосіб пом''якшує прямолінійність прохання — це важливо для українського ввічливого регістру.'
      - 'Вираження побажань і бажань: Я хотів/хотіла б відвідати Карпати. Мені хотілося б дізнатися більше про історію Києва. Було б чудово зустрітися цими вихідними. Добре було б почати рано. Зверніть увагу на безособові конструкції: хотілося б, було б.'
      - 'М''яка порада з умовним способом: На вашому місці я б подзвонив/подзвонила заздалегідь. Варто було б перевірити. Я б порадив/порадила вам...'
  - section: 'Практика: якщо-речення у спілкуванні'
    words: 700
    points:
      - 'Діалог 1 — планування подорожі: Двоє друзів обговорюють поїздку на вихідні. Природне використання якщо з майбутнім часом: Якщо погода буде гарна, поїдемо за місто. Якщо знайдемо дешеві квитки, полетимо до Одеси. Якщо все вийде, проведемо там три дні.'
      - 'Діалог 2 — у мовній школі: Студент запитує про курси. Ввічливі умовні конструкції: Я хотів/хотіла б записатися на курс. Чи не могли б ви розповісти про розклад? Якщо можна, я б хотів/хотіла б почати наступного тижня.'
      - 'Текст для читання: електронний лист другові з природним використанням якщо-конструкцій та ввічливих умовних форм. Завдання на розуміння зосереджені на граматиці: знайти всі форми умовного способу, знайти всі якщо-речення, визначити, чи є умови реальними або гіпотетичними.'
      - 'Вправа на продукування: учні пишуть 5-6 речень про власні плани використовуючи якщо: Якщо вивчу цей розділ, зможу читати українські книжки. Якщо поїду до Києва, відвідаю Лавру.'
  - section: 'Типові помилки'
    words: 400
    points:
      - 'Помилка 1: Використання теперішнього часу замість умовного способу для побажань. *Я хочу вас запитати (прямо) vs Я хотів/хотіла б вас запитати (ввічливо). Помилка 2: Написання б/би разом із дієсловом: *зробивби → зробив би. Помилка 3: Плутанина з розміщенням б/би: після приголосного вживається би, а не б.'
      - 'Помилка 4: Використання якщо з умовним способом у реальних умовах. *Якщо я зробив би це вчасно... (змішування реальної умови з умовним способом). Правильно: Якщо я зроблю це вчасно... (реальна умова → дійсний спосіб). Правило: якщо + дійсний спосіб = реальна умова. якби + умовний спосіб = нереальна умова (наступний модуль).'
      - 'Помилка 5: Калька з надмірного використання англійського "would". Англійська використовує "would" як у ввічливих проханнях, ТАК І в умовних реченнях. Українська розрізняє: ввічливе прохання = хотів би / міг би (умовний). Звичка в минулому = НЕ умовний (*Коли я був маленький, я ходив би в парк — неправильно; правильно: ходив). Учні повинні відучитися від рефлексу "would = б".'
      - 'Стратегія самовиправлення: Перевірка з трьох кроків перед використанням б/би: 1. Це побажання, прохання чи ввічлива пропозиція? → Умовний спосіб правильний. 2. Це реальна умова в майбутньому? → Використовуйте якщо + дійсний спосіб. 3. Це звичка в минулому? → Використовуйте просто минулий час без б/би. Практика: учні класифікують 8-10 речень за типом і обирають правильну форму.'
  - section: 'Підсумок та перехід до M19'
    words: 350
    points:
      - 'Підсумок: три способи дієслова, утворення умовного способу (минулий час + би/б), реальна умова з якщо + дійсний спосіб, ввічливі прохання з умовним способом. Самоперевірка: Я можу утворити форму умовного способу ✓/✗, Я можу побудувати речення з якщо ✓/✗, Я можу ввічливо попросити ✓/✗.'
      - 'Анонс: M19 представить НЕРЕАЛЬНІ умови з якби + умовний спосіб, де дія суперечить фактам або є неможливою. Порівняйте: Якщо матиму час, піду (реально) vs Якби я мав час, пішов би (нереально). Ця пара (M18+M19) дає учням повну систему умовних речень.'
vocabulary_hints:
  required:
    - "умовний спосіб (conditional mood — expresses wished/hypothetical action)"
    - "дійсний спосіб (indicative mood — expresses real action)"
    - "наказовий спосіб (imperative mood — expresses command/request)"
    - "частка (particle — би/б in conditional formation)"
    - "умова (condition — what must be true for action to happen)"
    - "реальний (real — condition that can actually be fulfilled)"
    - "якщо (if — conjunction for real conditions)"
    - "ввічливість (politeness — softening requests with conditional)"
    - "бажання (wish, desire)"
    - "хотів би / хотіла б (would like — polite form of хотіти)"
    - "могли б (could — polite conditional of могти)"
    - "милозвучність (euphony — sound harmony principle)"
    - "повнозначне слово (content word — as opposed to service word)"
    - "сполучник (conjunction — якщо, коли)"
  recommended:
    - "гаразд (fine, okay — Якщо все буде гаразд)"
    - "нагода (opportunity, occasion)"
    - "заперечувати (to object — Якщо не заперечуєте)"
    - "порадити (to advise — я б порадив)"
    - "завітати (to visit, drop by — informal)"
    - "заздалегідь (in advance)"
    - "розклад (schedule, timetable)"
    - "обов'язково (definitely, without fail)"
    - "вихідні (weekend — pluralia tantum)"
    - "встигнути (to make it in time — perfective)"
activity_hints:
  - type: quiz
    focus: 'Розпізнайте форми умовного способу та дійсного способу в реченнях'
    items: 8
  - type: fill-in
    focus: 'Доповніть якщо-речення правильною формою дієслова (дійсний спосіб в обох частинах для реальних умов)'
    items: 8
  - type: match-up
    focus: 'З''єднайте підрядні речення з якщо та головні речення, забезпечуючи логічне та граматичне узгодження'
    items: 8
  - type: error-correction
    focus: 'Виправте помилки в умовних реченнях: неправильна частка б/би, неправильний спосіб у якщо-реченні, орфографія'
    items: 6
  - type: sentence-builder
    focus: 'Перепишіть прямі прохання на ввічливі за допомогою умовного способу (Дайте → Чи не дали б ви...)'
    items: 6
