module: b1-014
level: B1
sequence: 14
slug: conditionals-real
version: '3.1'
title: "Умовний спосіб (реальний)"
subtitle: "Якщо-речення та реальні умовні конструкції"
focus: grammar
pedagogy: PPP
phase: "B1.2 [Verbs]"
word_target: 4000
objectives:
  - "Learner can form and use дієслова умовного способу with the particle би/б to
    express wishes, hypothetical but possible outcomes, and polite requests"
  - "Learner can construct real conditional sentences using якщо... (то)... with correct
    tense and aspect in both clauses"
  - "Learner can distinguish дійсний спосіб from умовний спосіб by meaning and form,
    and explain when each is appropriate"
  - "Learner can place the particle б/би correctly (after голосний → б, after приголосний
    → би) and understands it can follow any повнозначне слово"
  - "Learner can use real conditionals in practical communication: making plans, expressing
    conditions for future actions, polite suggestions"
dialogue_situations:
  - setting: 'Friends planning a hiking trip to Карпати (pl, Carpathians) — weighing
      options: Якщо погода буде гарна, піднімемося на Говерлу (f). Якщо підемо рано,
      встигнемо до обіду. Якщо дощитиме, залишимося в колибі (f, mountain hut).'
    speakers:
      - Олег
      - Наталя
    motivation: 'Real conditionals: якщо + future with Говерла(f), колиба(f), Карпати(pl)'
content_outline:
  - section: "Що таке спосіб дієслова?"
    words: 550
    points:
      - "Review from Литвінова Grade 7 p.36 — three-way system: Дійсний спосіб — реальна
        дія (відбувалася, відбувається, відбуватиметься). Умовний спосіб — бажана
        дія, можлива лише за певних умов. Наказовий спосіб — прохання, наказ, спонукання
        до дії. Дійсний has tense forms; умовний and наказовий do NOT have tense forms
        (Авраменко Grade 7 p.77)."
      - "Why умовний is important for B1 communication: expressing wishes (я хотів
        би), making polite requests (чи не могли б ви...?), talking about plans that
        depend on conditions (якщо матиму час, піду на виставку). This module focuses
        on REAL conditions — things that CAN happen."
      - "Comparison with A2 knowledge: at A2, learners used дійсний спосіб exclusively.
        Now they add a new dimension — the ability to express conditions, wishes,
        and uncertainty. This is a major communicative upgrade."
  - section: "Утворення умовного способу"
    words: 700
    points:
      - "Formation rule from Литвінова Grade 7 p.61, Заболотний Grade 7 p.72: Минулий
        час дієслова + частка би (б). сказав + би = сказав би, сказала + б = сказала
        б. The particle б/би is ALWAYS written separately from the verb. Unlike English
        'would', Ukrainian б/би has no fixed position."
      - "Euphony rule for б vs. би (Авраменко Grade 7 p.83): After a голосний → б:
        сказала б, хотіла б, зробило б. After a приголосний → би: сказав би, хотів
        би, зробив би. This mirrors the Ukrainian principle of милозвучність."
      - "Particle placement flexibility (Авраменко Grade 7 p.83): Частку б/би пишемо
        окремо, вона може стояти після будь-якого повнозначного слова: 'Я б навіть
        сонцю одягнула вінок із житніх колосків' (Л. Рубан). Compare: я зробив би
        / я б зробив / я зробив це б інакше — all grammatically correct."
      - "Full paradigm practice: читати: я читав би / я читала б, ти читав би / ти
        читала б, він читав би, вона читала б, воно читало б, ми читали б, ви читали
        б, вони читали б. Note: умовний спосіб preserves рід and число from минулий
        час but has NO часові форми of its own."
  - section: "Реальна умова з якщо"
    words: 700
    points:
      - "Structure of real conditional sentences: Якщо + дійсний спосіб (present/future),
        (то) + дійсний спосіб (future). Якщо пошукаєш у книгах мудрості, то знайдеш
        велику користь для душі своєї (Нестор) — from Заболотний Grade 8 p.114. The
        condition is REAL — it can actually happen."
      - "Сполучник якщо and its variants: якщо, коли (in conditional meaning), як
        (colloquial). Якщо матимеш час, зателефонуй мені. Коли будеш у Львові, завітай
        до нас. Як прийдеш рано, встигнемо. The particle то is optional but common
        in the main clause."
      - "Aspect choice in якщо-clauses: Недоконаний вид emphasizes process/repetition:
        Якщо щодня вчитимеш слова, швидко заговориш. Доконаний вид emphasizes completed
        result: Якщо вивчиш цей розділ, складеш іспит. Practice: creating pairs with
        different aspect, noting meaning shift."
      - "Common communicative patterns with якщо: Якщо хочеш, можемо... (invitation)
        Якщо не заперечуєш, я... (polite suggestion) Якщо все буде гаразд, ми... (future
        plans) Якщо матиму нагоду, обов'язково... (expressing intention)"
  - section: "Умовний спосіб для ввічливості"
    words: 600
    points:
      - "Polite requests using умовний спосіб: Чи не могли б ви допомогти? (instead
        of Допоможіть!) Я хотів/хотіла б запитати... (instead of Я хочу запитати)
        Чи не підказали б ви, де аптека? The conditional softens the directness of
        the request — this is essential for Ukrainian polite register."
      - "Expressing wishes and desires: Я хотів/хотіла б відвідати Карпати. Мені хотілося
        б дізнатися більше про історію Києва. Було б чудово зустрітися цими вихідними.
        Добре було б почати рано. Note the безособові constructions: хотілося б, було
        б."
      - "Mild advice using умовний: На вашому місці я б подзвонив/подзвонила заздалегідь.
        Варто було б перевірити. Я б порадив/порадила вам..."
  - section: "Практика: якщо-речення у спілкуванні"
    words: 700
    points:
      - "Dialogue 1 — planning a trip: Two friends discussing a weekend trip. Natural
        use of якщо with future tense: Якщо погода буде гарна, поїдемо за місто. Якщо
        знайдемо дешеві квитки, полетимо до Одеси. Якщо все вийде, проведемо там три
        дні."
      - "Dialogue 2 — at a language school: Student asking about courses. Polite conditionals:
        Я хотів/хотіла б записатися на курс. Чи не могли б ви розповісти про розклад?
        Якщо можна, я б хотів/хотіла б почати наступного тижня."
      - "Reading passage: an email to a friend using якщо-constructions and polite
        conditionals naturally. Comprehension tasks focus on grammar: identify all
        умовний спосіб forms, find all якщо-clauses, determine whether conditions
        are real or hypothetical."
      - "Production exercise: learners write 5-6 sentences about their own plans using
        якщо: Якщо вивчу цей розділ, зможу читати українські книжки. Якщо поїду до
        Києва, відвідаю Лавру."
  - section: "Типові помилки"
    words: 400
    points:
      - "Error 1: Using present tense instead of умовний for wishes. *Я хочу вас запитати
        (direct) vs Я хотів/хотіла б вас запитати (polite). Error 2: Writing б/би
        together with the verb: *зробивби → зробив би. Error 3: Confusing б/би placement:
        after приголосний use би, not б."
      - "Error 4: Using якщо з умовним in real conditions. *Якщо я зробив би це вчасно...
        (mixing real condition with conditional). Correct: Якщо я зроблю це вчасно...
        (real condition → дійсний спосіб). Rule: якщо + дійсний спосіб = real condition.
        якби + умовний спосіб = unreal condition (next module)."
      - "Error 5: Calque from English 'would' overuse. English uses 'would' in both
        polite requests AND conditionals. Ukrainian distinguishes: polite request = хотів
        би / міг би (умовний). Habitual past = NOT умовний (*Коли я був маленький, я
        ходив би в парк — wrong; correct: ходив). Learners must unlearn the English
        'would = б' reflex."
      - "Self-correction strategy: Three-step check before using б/би: 1. Is this a wish,
        request, or polite suggestion? → Умовний correct. 2. Is this a real future
        condition? → Use якщо + дійсний спосіб. 3. Is this a past habit? → Use simply
        минулий час without б/би. Practice: learners classify 8-10 sentences by type
        and choose the correct form."
  - section: "Підсумок та перехід до M19"
    words: 350
    points:
      - "Summary: три способи дієслова, утворення умовного способу (минулий час +
        би/б), реальна умова з якщо + дійсний спосіб, увічливі прохання з умовним
        способом. Self-check: Я можу утворити форму умовного способу ✓/✗, Я можу побудувати
        речення з якщо ✓/✗, Я можу ввічливо попросити ✓/✗."
      - "Preview: M19 will introduce UNREAL conditions with якби + умовний, where
        the action is contrary to fact or impossible. Compare: Якщо матиму час, піду
        (real) vs Якби я мав час, пішов би (unreal). This pair (M18+M19) gives learners
        the full conditional system."
vocabulary_hints:
  required:
    - "умовний спосіб (conditional mood — expresses wished/hypothetical action)"
    - "дійсний спосіб (indicative mood — expresses real action)"
    - "наказовий спосіб (imperative mood — expresses command/request)"
    - "частка (particle — би/б in conditional formation)"
    - "умова (condition — what must be true for action to happen)"
    - "реальний (real — condition that can actually be fulfilled)"
    - "якщо (if — conjunction for real conditions)"
    - "ввічливість (politeness — softening requests with conditional)"
    - "бажання (wish, desire)"
    - "хотів би / хотіла б (would like — polite form of хотіти)"
    - "могли б (could — polite conditional of могти)"
    - "милозвучність (euphony — sound harmony principle)"
    - "повнозначне слово (content word — as opposed to service word)"
    - "сполучник (conjunction — якщо, коли)"
  recommended:
    - "гаразд (fine, okay — Якщо все буде гаразд)"
    - "нагода (opportunity, occasion)"
    - "заперечувати (to object — Якщо не заперечуєте)"
    - "порадити (to advise — я б порадив)"
    - "завітати (to visit, drop by — informal)"
    - "заздалегідь (in advance)"
    - "розклад (schedule, timetable)"
    - "обов'язково (definitely, without fail)"
    - "вихідні (weekend — pluralia tantum)"
    - "встигнути (to make it in time — perfective)"
activity_hints:
  - type: quiz
    focus: "Identify умовний спосіб forms vs дійсний спосіб in sentences"
    items: 8
  - type: fill-in
    focus: "Complete якщо-sentences with correct verb form (дійсний спосіб in both
      clauses for real conditions)"
    items: 8
  - type: match-up
    focus: "Match якщо-clauses to their main clauses, ensuring logical and grammatical
      agreement"
    items: 8
  - type: error-correction
    focus: "Fix errors in conditional sentences: wrong particle б/би, wrong mood in
      якщо-clause, spelling"
    items: 6
  - type: sentence-builder
    focus: "Rewrite direct requests as polite ones using умовний спосіб (Дайте → Чи
      не дали б ви...)"
    items: 6
connects_to:
  - "b1-017 (Контрольна робота 2 — Phase 2 review, transition to Phase 3)"
  - "b1-019 (Умовний спосіб нереальний — extends conditional to якби + past)"
  - "b1-010 (Чергування приголосних у дієсловах — alternations in verb conjugation)"
prerequisites:
  - "b1-017 (Checkpoint 2 — all Phase 2 grammar mastered)"
  - "A2 knowledge of минулий час (required for conditional formation)"
grammar:
  - "Умовний спосіб formation: минулий час + частка би (б)"
  - "Particle placement: б after голосний, би after приголосний, free position in
    clause"
  - "Реальна умова: якщо + дійсний спосіб... (то) + дійсний спосіб"
  - "Aspect choice in якщо-clauses: доконаний (result) vs недоконаний (process)"
  - "Polite register: умовний спосіб for requests, wishes, mild advice"
register: академічний
references:
  - title: "Литвінова Grade 7, p.36, 61-62"
    notes: "Three-way mood system table; умовний спосіб definition and formation exercises;
      particle б/би placement rules."
  - title: "Заболотний Grade 7, p.72-75"
    notes: "Способи дієслів comparison table; умовний спосіб exercises with якби-sentences;
      formation practice with personal forms."
  - title: "Авраменко Grade 7, p.77, 83"
    notes: "Умовний and наказовий have no часові форми; частка б/би spelling rules
      and placement examples including literary quotes."
  - title: "Заболотний Grade 8, p.114"
    notes: "Складнопідрядне речення умови: сполучники якщо, коли, як, якби, аби; співвідносне
      слово то in main clause."
  - title: "Заболотний Grade 7, p.185"
    notes: "Способи дієслів: дійсний = реальна дія, умовний = можлива за умов, наказовий
      = наказ/прохання."
