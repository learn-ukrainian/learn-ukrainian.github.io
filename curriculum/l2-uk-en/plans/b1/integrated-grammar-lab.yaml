module: b1-50
level: B1
sequence: 50
slug: integrated-grammar-lab
version: '2.0'
title: Інтегрована граматична лабораторія
subtitle: Integrated Grammar Lab - B1.4 Synthesis
content_outline:
- section: Вступний тест
  points:
  - 'Why integration matters — State Standard 2024: distinction between official and
    unofficial registers'
  - Beyond isolated grammar — focus on stylistic flexibility and active text production
- section: Пояснення
  points:
  - 'Synthesis overview — cultural hook: avoiding "kantseliaryt" (bureaucratese) and
    passive voice overuse'
- section: 'Сценарій 1: Офіційний звіт'
  points:
  - Formal register usage — preference for active constructions (e.g., «Комісія ухвалила»,
    not «Було ухвалено»)
  - 'Statistics and reports — learner error: confusing impersonal sentences with incomplete
    ones'
- section: 'Сценарій 2: Сімейна розмова'
  points:
  - 'Informal register — cultural hook: rich synonymy and diminutives for emotional
    nuance'
  - Emotional tone — using specific vocabulary (e.g., «купити» instead of «здійснити
    покупку»)
- section: 'Сценарій 3: Новини'
  points:
  - News register — one-member sentences for brevity and impact
  - Passive in journalism — limited use for specific stylistic effect
- section: 'Практика: Редагування стилю'
  points:
  - 'Identify style inconsistencies — learner error: register mismatch (e.g., high-style
    words in casual context)'
  - 'Revise for target audience — task: transform one message into 3 styles (official,
    informal, news)'
- section: Діалоги
  points:
  - Multi-feature usage — synthesis of numerals, aspect, and register
  - Register switching — distinguishing «здійснити» vs «купити»
- section: Потрібно більше практики?
  points:
  - Additional exercises
vocabulary_hints:
  required:
  - інтеграція (integration) — інтеграція в суспільство, інтеграція зусиль
  - синтез (synthesis) — синтез мистецтв, аналіз і синтез
  - стиль (style) — офіційно-діловий стиль, розмовний стиль, власний стиль
  - регістр (register) — високий/низький регістр, перемикання регістрів
  - редагування (editing) — літературне редагування, внести правки
  - гнучкість (flexibility) — стилістична гнучкість
  - перемикання (switching) — перемикання кодів/регістрів
  - зв'язність (coherence) — зв'язність тексту
  recommended:
  - послідовність (consistency) — логічна послідовність
  - доречність (appropriateness) — доречність використання
  - текстотворення (text production) — навички текстотворення
  - аудиторія (audience) — цільова аудиторія
