module: b1-50
level: B1
sequence: 50
slug: integrated-grammar-lab
version: '2.0'
title: Інтегрована граматична лабораторія
subtitle: Integrated Grammar Lab - B1.4 Synthesis
content_outline:
- section: 'Вступний тест: Стилістична діагностика (Initial Test: Stylistic Diagnostics)'
  words: 400
  points:
  - 'State Standard 2024 Alignment (§4.5.1): Diagnostic check on the learner''s ability
    to distinguish between official and unofficial registers.'
  - 'Initial register check: Identifying stylistic inconsistencies, such as using
    high-style words (''здійснити'') in casual contexts.'
- section: 'Пояснення: Синтез і стилістична гнучкість (Explanation: Synthesis and
    Stylistic Flexibility)'
  words: 600
  points:
  - 'Cultural hook: The struggle against ''kantseliaryt'' (bureaucratese) and the
    historical preference for active voice over passive constructions (e.g., ''ми
    розглядаємо'' vs ''питання розглядається'').'
  - 'The power of synonymy: How Ukrainian synonymic rows (e.g., ''обрій'', ''небокрай'',
    ''горизонт'') allow for precise calibration of speech registers from poetic to
    scientific.'
- section: 'Сценарій 1: Офіційно-діловий звіт (Scenario 1: Official Business Report)'
  words: 700
  points:
  - 'Formal register mastery: Prioritizing active agency (''Комісія ухвалила'') over
    the passive ambiguity often found in Soviet-era bureaucratic styles.'
  - 'Grammar integration: Synthesizing complex numerals and collective nouns within
    the framework of a formal report or proposal.'
- section: 'Сценарій 2: Неофіційна сімейна розмова (Scenario 2: Informal Family Conversation)'
  words: 700
  points:
  - 'Informal register nuances: Utilizing diminutives and rich synonyms for emotional
    depth without slipping into register mismatch (avoiding ''даний'' or ''здійснити'').'
  - 'Synthesis of diminutives and pronouns: Building natural-sounding dialogue that
    reflects authentic family interactions.'
- section: 'Сценарій 3: Новини та медіа (Scenario 3: News and Media)'
  words: 600
  points:
  - 'News register syntax: Implementing one-member sentences and ellipsis for brevity
    and impact in headlines and bulletins.'
  - 'Synthesizing B1.4 features: Combining aspectual nuances with the concise syntax
    required for modern Ukrainian journalism.'
- section: 'Практика: Лабораторія редагування (Practice: Editing Laboratory)'
  words: 600
  points:
  - 'Register transformation task: Transforming a single content item (e.g., ''Я запізнився'')
    into three styles: an official note, a friend message, and a news headline.'
  - 'Error correction drill: Identifying and fixing passive voice overuse (Learner
    Error: ''Книга читається учнем'' -> ''Учень читає книгу'') and impersonal sentence
    confusion.'
- section: Діалоги та текстотворення (Dialogues and Text Production)
  words: 300
  points:
  - 'Register switching exercise: Rapidly adapting tone and vocabulary in a multi-stage
    dialogue involving different social hierarchies.'
  - 'Advanced synthesis: Integrating numerals, aspect, and stylistic flexibility into
    coherent, paragraph-length text production.'
- section: 'Підсумок: Потрібно більше практики? (Summary: Need More Practice?)'
  words: 100
  points:
  - Final reflection on stylistic appropriateness and communicative effectiveness
    across B1.4 scenarios.
  - Review of core collocations for professional and social integration.
vocabulary_hints:
  required:
  - інтеграція (integration) — інтеграція в суспільство, інтеграція зусиль; середня
    частота, медіа/науковий контекст
  - синтез (synthesis) — синтез мистецтв, аналіз і синтез; низька частота, науковий
    стиль
  - стиль (style) — офіційно-діловий стиль, розмовний стиль, художній стиль; висока
    частота
  - регістр (register) — високий/низький регістр, перемикання регістрів; лінгвістичний
    термін
  - редагування (editing) — літературне редагування, редагування тексту, внести правки;
    середня частота
  - гнучкість (flexibility) — стилістична гнучкість, гнучкість мислення
  - перемикання (switching) — перемикання кодів/регістрів
  - зв'язність (coherence) — зв'язність тексту
  recommended:
  - послідовність (consistency) — логічна послідовність
  - доречність (appropriateness) — доречність використання, доречність стилю
  - текстотворення (text production) — навички текстотворення
  - аудиторія (audience) — цільова аудиторія
  - канцелярит (bureaucratese) — боротьба з канцеляритом; культурно значущий термін
    для критики бюрократичної мови
  - актив (active voice) — перевага активних конструкцій над пасивними
