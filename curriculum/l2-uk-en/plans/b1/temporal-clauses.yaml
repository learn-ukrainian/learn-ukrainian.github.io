module: b1-37
level: B1
sequence: 37
slug: temporal-clauses
version: '2.0'
title: Часові підрядні речення
subtitle: Temporal Clauses Deep Dive
content_outline:
- section: Тест
  points:
  - 'Diagnostic quiz on temporal clauses — focus on learner error: confusing ''коли''
    (point) vs ''поки'' (duration)'
  - Self-assessment questions — test the 'Until' negation trap specifically (поки
    не)
- section: Пояснення
  points:
  - коли - Basic Time Clause — State Standard §4.4.3 alignment; crucial distinction
    between point and duration
  - Sequence Connectors (перш ніж, після того як, як тільки) — visualize with timeline;
    emphasize aspect correctness (Perf for completed sequence)
  - 'Duration Connectors (поки, доки, під час того як) — learner error: ''Until''
    requires negative verb (поки не); contrast with English logic'
  - 'Simultaneous Actions — crucial distinction: Impf + Impf for simultaneous vs Perf
    + Perf for sequential; cultural hook: ''Усьому свій час'' (Everything has its
    time)'
- section: Практика
  points:
  - Sequence events — practice ordering events with 'перш ніж' vs 'після того як'
    using aspect clues
  - Build temporal stories — incorporate idiom 'Чекати з моря погоди' (waiting idly)
    to contrast active vs passive time
- section: Діалоги
  points:
  - Temporal clauses in conversation — model natural use of 'як тільки' and 'тим часом'
  - Narrative scenarios — practice explaining past sequences (storytelling aspect)
vocabulary_hints:
  required:
  - 'коли (when) — high frequency; collocations: коли я був..., коли ми прийшли...'
  - 'поки (while/until) — high frequency; learner error: confusing ''коли'' vs ''поки'';
    collocations: поки не (until), поки я чекав...'
  - 'перш ніж (before) — medium frequency (literary/formal); collocations: перш ніж
    почати, перш ніж сказати'
  - 'після того як (after) — medium frequency; collocations: після того як ми зробили...,
    одразу після того як'
  - 'як тільки (as soon as) — medium frequency; collocations: як тільки зможу, як
    тільки прийдеш'
  - доки (while/as long as) — synonym for поки; focus on duration
  - під час (during) — focus on simultaneous action noun phrases
  - одночасно (simultaneously) — useful adverb for clarification
  recommended:
  - щойно (just as) — emphasis on immediacy
  - відтоді як (since - temporal) — temporal starting point
  - до того як (before) — alternative to перш ніж
  - 'тим часом (meanwhile) — medium frequency; collocations: тим часом як, а тим часом'
