module: b1-031
level: B1
sequence: 31
slug: housing-and-renting
version: 3.2.2
title: Житло і оренда
subtitle: Пошук квартири, оренда, комунальні послуги — відмінки в дії
focus: communication
pedagogy: PPP
phase: B1.2 [Система дієслів]
word_target: 4000
objectives:
- 'Учень вміє описувати квартиру/будинок, використовуючи просторову лексику та відмінкові конструкції:
  кімната з балконом (Ор.в.), вікна на подвір''я (Зн.в.), квартира на третьому поверсі (М.в.)'
- 'Учень вміє читати та відповідати на оголошення про оренду українською мовою, розуміючи скорочення:
  1к, 2к, б/м, ремонт, під ключ'
- 'Учень вміє вести переговори щодо умов оренди: завдаток, договір оренди, термін (на рік, на місяць),
  комунальні послуги'
- 'Учень вміє описувати житлові проблеми та просити про ремонт: протікає кран, не працює опалення, зламалася
  пральна машина'
- 'Учень вміє природно вживати граматику Фази 6 у контексті житла: родовий відмінок для адрес, давальний
  для орендарів, орудний для характеристик житла'
dialogue_situations:
- setting: 'Оренда (f) квартири у Львові — огляд та переговори: Оренда — вісім тисяч на місяць. Комунальні
    (pl) включені? Меблі (pl) є? Коли можна заїхати? Договір (m) — на рік.'
  speakers:
  - Орендар (tenant)
  - Власник (landlord)
  motivation: 'Житлова лексика: оренда, комунальні, меблі, договір'
content_outline:
- section: Опис житла
  words: 800
  points:
  - 'Види житла: квартира, будинок, приватний будинок, гуртожиток, однокімнатна/двокімнатна/трикімнатна
    квартира. Кімнати: вітальня, спальня, кухня, ванна кімната, туалет, коридор, балкон, комора, підвал,
    горище.'
  - 'Опис характеристик за допомогою відмінків: Р.в.: квартира площею сорок квадратних метрів. Ор.в.:
    кімната з великим вікном, квартира з меблями (вмебльована). М.в.: на першому/другому/п''ятому поверсі,
    у новому будинку. Зн.в.: вікна виходять на подвір''я/на вулицю.'
  - 'Меблі та побутова техніка: меблі (мн.), шафа, ліжко, стіл, крісло, диван, плита, холодильник, пральна
    машина, посудомийка. Практика: описати свою ідеальну квартиру, використовуючи 10+ відмінкових конструкцій.'
- section: Оголошення про оренду
  words: 700
  points:
  - 'Читання справжніх українських оголошень про оренду: ''Здається 2к квартира, 55 кв.м, 3/9 поверх,
    євроремонт, вмебльована, поруч метро. 12 000 грн/міс + комунальні.'' Розшифровка скорочень: к = кімнатна,
    кв.м = квадратних метрів, 3/9 = третій поверх із дев''яти, грн/міс = гривень на місяць.'
  - 'Відповідь на оголошення: Добрий день, я телефоную щодо оголошення про оренду квартири. Чи вона ще
    вільна? Коли можна подивитися? Скільки коштує оренда? Чи входять комунальні у вартість?'
  - 'Практика: прочитати 3 оголошення про оренду, виокремити головну інформацію, написати повідомлення-відповідь
    на найкращий варіант.'
- section: Переговори про оренду
  words: 700
  points:
  - 'Ключова лексика оренди: оренда, орендар, орендодавець, договір оренди, завдаток, комунальні послуги,
    опалення, водопостачання, електрика, інтернет, сміття.'
  - 'Діалог-переговори: ''Яка вартість оренди на місяць?'' ''Дванадцять тисяч гривень. Комунальні окремо.''
    ''Який завдаток?'' ''Одна місячна оплата.'' ''На який термін?'' ''Мінімум на рік. Можна продовжити.''
    Використання часових прийменників (на рік, на місяць) та виразів кількості.'
  - 'Права та правила: Хто оплачує ремонт? Чи можна з тваринами? Чи можна замінити меблі? Як повідомити
    про виїзд? Практика: розіграти переговори про оренду, використовуючи офіційний стиль.'
- section: Проблеми з житлом
  words: 700
  points:
  - 'Поширені проблеми та скарги: Протікає кран/дах. Не працює опалення/гаряча вода. Зламалася пральна
    машина. Не працює ліфт. У кімнаті цвіль. Сусіди шумлять. Використання зворотних і пасивних конструкцій
    із попередніх модулів.'
  - 'Запит на ремонт: ''Добрий день, хочу повідомити, що в квартирі не працює опалення. Прошу надіслати
    майстра якнайшвидше. Дякую.'' Використання офіційного стилю з кличним відмінком (Шановний орендодавцю!)
    та конструкціями мети (для ремонту, щоб полагодити).'
  - 'Контакти в екстрених випадках: Аварійна служба (f), сантехнік (m), електрик (m), служба газу (f).
    ''Терміново потрібен сантехнік — протікає труба у ванній.'' Інтеграція з давальним відмінком (мені
    потрібен) та прийменниками причини (через аварію).'
  - 'Практика: написати повідомлення зі скаргою на житлову проблему, використовуючи офіційний стиль, кличний
    відмінок та прийменники причини/мети.'
- section: 'Практика: пошук квартири'
  words: 700
  points:
  - 'Розширена рольова гра: весь процес від оголошення до договору. 1. Прочитати три оголошення, порівняти
    їх (використовуючи ступені порівняння з Фази 5). 2. Подзвонити власнику (з кличним відмінком, в офіційному
    стилі). 3. Оглянути та описати квартиру (з відмінками). 4. Обговорити умови. 5. Повідомити про проблему
    після переїзду.'
  - 'Інтегрований граматичний чек-лист: чи використали ви... Р.в. (площею, без меблів, близько ста метрів)?
    Д.в. (мені потрібна, орендарю)? Ор.в. (з балконом, за адресою)? Кл.в. (Шановний пане)? порівняння
    (ця квартира більша, але дорожча)? числівники (на третьому поверсі, двадцять п''ять тисяч)? займенники
    (якась квартира, нічого підходящого, кожен варіант)?'
- section: Підсумок
  words: 400
  points:
  - 'Ключова житлова лексика за категоріями: типи, кімнати, меблі, умови оренди, проблеми. Інтеграція
    граматики: всі відмінки та прийменники Фази 6 у дії.'
  - 'Культурна нотатка: українська культура оренди відрізняється від західної. Оренда часто неформальна
    (без договору, через знайомих). Терміни на кшталт євроремонт, під ключ, і меблі, і техніка відображають
    місцевий ринок. Їх розуміння є важливим для пошуку житла на таких платформах, як OLX.'
  - 'Анонс: контрольна робота 6 — комплексне повторення Фази 6.'
vocabulary_hints:
  required:
  - квартира (apartment)
  - оренда (rent/rental)
  - орендар (tenant)
  - орендодавець (landlord)
  - договір оренди (lease agreement)
  - завдаток (deposit)
  - комунальні послуги (utilities)
  - опалення (heating)
  - вмебльована (furnished)
  - поверх (floor/storey)
  - площа (area/square footage)
  - ремонт (renovation/repair)
  recommended:
  - гуртожиток (dormitory)
  - водопостачання (water supply)
  - електрика (electricity)
  - цвіль (mould)
  - ліфт (elevator)
  - протікати (to leak)
  - полагодити (to fix/repair)
  - під ключ (turnkey — ready to move in)
  - окремо (separately — for utilities)
