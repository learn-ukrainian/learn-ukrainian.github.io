module: b1-051
level: B1
sequence: 51
slug: housing-and-renting
version: '3.1'
title: "Житло і оренда"
subtitle: "Пошук квартири, оренда, комунальні послуги — відмінки в дії"
focus: communication
pedagogy: PPP
phase: "B1.5 [Advanced Case Usages & Prepositions]"
word_target: 4000
objectives:
  - "Learner can describe an apartment/house using spatial vocabulary and case constructions:
    кімната з балконом (Ор.в.), вікна на подвір'я (Зн.в.), квартира на третьому поверсі
    (М.в.)"
  - "Learner can read and respond to rental advertisements in Ukrainian, understanding
    abbreviations: 1к, 2к, б/м, ремонт, під ключ"
  - "Learner can negotiate rental terms: deposit (завдаток), lease (договір оренди),
    duration (на рік, на місяць), utilities (комунальні послуги)"
  - "Learner can describe housing problems and request repairs: протікає кран, не
    працює опалення, зламалася пральна машина"
  - "Learner can use Phase 6 grammar naturally in housing contexts: genitive for addresses,
    dative for tenants, instrumental for features"
dialogue_situations:
  - setting: 'Renting a квартира (f, apartment) in Львів — viewing and negotiating:
      Оренда (f, rent) — вісім тисяч на місяць. Комунальні (pl, utilities) включені?
      Меблі (pl, furniture) є? Коли можна заїхати? Договір (m, contract) — на рік.'
    speakers:
      - Орендар (tenant)
      - Власник (landlord)
    motivation: 'Housing vocabulary: оренда(f), комунальні(pl), меблі(pl), договір(m)'
content_outline:
  - section: "Опис житла"
    words: 800
    points:
      - "Types of housing: квартира, будинок, приватний будинок, гуртожиток, однокімнатна/двокімнатна/трикімнатна
        квартира. Rooms: вітальня, спальня, кухня, ванна кімната, туалет, коридор,
        балкон, комора, підвал, горище."
      - "Describing features using case constructions: Р.в.: квартира площею сорок
        квадратних метрів. Ор.в.: кімната з великим вікном, квартира з меблями (вмебльована).
        М.в.: на першому/другому/п'ятому поверсі, у новому будинку. Зн.в.: вікна виходять
        на подвір'я/на вулицю."
      - "Furniture and appliances: меблі (pl.), шафа, ліжко, стіл, крісло, диван,
        плита, холодильник, пральна машина, посудомийка. Practice: describe your ideal
        apartment using 10+ case constructions."
  - section: "Оголошення про оренду"
    words: 700
    points:
      - "Reading real-format Ukrainian rental ads: 'Здається 2к квартира, 55 кв.м,
        3/9 поверх, євроремонт, вмебльована, поруч метро. 12 000 грн/міс + комунальні.'
        Abbreviation key: к = кімнатна, кв.м = квадратних метрів, 3/9 = третій поверх
        із дев'яти, грн/міс = гривень на місяць."
      - "Responding to ads: Добрий день, я телефоную щодо оголошення про оренду квартири.
        Чи вона ще вільна? Коли можна подивитися? Скільки коштує оренда? Чи входять
        комунальні у вартість?"
      - "Practice: read 3 rental ads, extract key information, write a response message
        for the one you prefer."
  - section: "Переговори про оренду"
    words: 700
    points:
      - "Key rental vocabulary: оренда (rent), орендар (tenant), орендодавець (landlord),
        договір оренди (lease agreement), завдаток (deposit), комунальні послуги (utilities),
        опалення (heating), водопостачання (water supply), електрика (electricity),
        інтернет, сміття (garbage)."
      - "Negotiation dialogue: 'Яка вартість оренди на місяць?' 'Дванадцять тисяч
        гривень. Комунальні окремо.' 'Який завдаток?' 'Одна місячна оплата.' 'На який
        термін?' 'Мінімум на рік. Можна продовжити.' Using temporal prepositions (на
        рік, на місяць) and quantity expressions."
      - "Rights and rules: Хто оплачує ремонт? Чи можна з тваринами? Чи можна замінити
        меблі? Як повідомити про виїзд? Practice: role-play a lease negotiation using
        formal register."
  - section: "Проблеми з житлом"
    words: 700
    points:
      - "Common problems and complaints: Протікає кран/дах. Не працює опалення/гаряча
        вода. Зламалася пральна машина. Не працює ліфт. У кімнаті цвіль (mould). Сусіди
        шумлять. Using reflexive and passive constructions from earlier modules."
      - "Requesting repairs: 'Добрий день, хочу повідомити, що в квартирі не працює
        опалення. Прошу надіслати майстра якнайшвидше. Дякую.' Using formal register
        with vocative (Шановний орендодавцю!) and purpose constructions (для ремонту,
        щоб полагодити)."
      - "Emergency contacts: In urgent cases: Аварійна служба (f, emergency service),
        сантехнік (m, plumber), електрик (m, electrician), служба газу (f, gas service).
        'Терміново потрібен сантехнік — протікає труба у ванній.' Integration with
        dative (мені потрібен) and cause prepositions (через аварію)."
      - "Practice: write a complaint message about a housing problem, using formal
        register, vocative, and purpose/cause prepositions."
  - section: "Практика: пошук квартири"
    words: 700
    points:
      - "Extended role play: the full process from ad to lease. 1. Read three ads,
        compare (using ступені порівняння from Phase 5). 2. Call the landlord (using
        vocative, formal register). 3. Visit and describe the apartment (using cases
        for features). 4. Negotiate terms (using quantity expressions and temporal
        preps). 5. Report a problem after moving in (using cause/purpose preps)."
      - "Integrated grammar checklist: did you use... Р.в. (площею, без меблів, близько
        ста метрів)? Д.в. (мені потрібна, орендарю)? Ор.в. (з балконом, за адресою)?
        Кл.в. (Шановний пане)? порівняння (ця квартира більша, але дорожча)? числівники
        (на третьому поверсі, двадцять п'ять тисяч)? займенники (якась квартира,
        нічого підходящого, кожен варіант)?"
  - section: "Підсумок"
    words: 400
    points:
      - "Key housing vocabulary organized by category: types, rooms, furniture, rental
        terms, problems. Grammar integration: all Phase 6 cases and prepositions in
        action."
      - "Cultural note: Ukrainian rental culture differs from Western norms. Оренда
        is often informal (без договору, through знайомі). Terms like євроремонт (European-style
        renovation), під ключ (turnkey), і меблі, і техніка (furnished + appliances)
        reflect local market language. Understanding these terms is essential for real-life
        housing searches on Ukrainian platforms like OLX."
      - "Preview: контрольна робота 6 — comprehensive review of Phase 6."
vocabulary_hints:
  required:
    - "квартира (apartment)"
    - "оренда (rent/rental)"
    - "орендар (tenant)"
    - "орендодавець (landlord)"
    - "договір оренди (lease agreement)"
    - "завдаток (deposit)"
    - "комунальні послуги (utilities)"
    - "опалення (heating)"
    - "вмебльована (furnished)"
    - "поверх (floor/storey)"
    - "площа (area/square footage)"
    - "ремонт (renovation/repair)"
  recommended:
    - "гуртожиток (dormitory)"
    - "водопостачання (water supply)"
    - "електрика (electricity)"
    - "цвіль (mould)"
    - "ліфт (elevator)"
    - "протікати (to leak)"
    - "полагодити (to fix/repair)"
    - "під ключ (turnkey — ready to move in)"
    - "окремо (separately — for utilities)"
