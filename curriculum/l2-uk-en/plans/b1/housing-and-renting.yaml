    items: 12
  - type: dialogue-completion
    focus: "Complete apartment viewing and negotiation dialogue"
    items: 12
  - type: free-write
    focus: "Write a rental ad for your apartment or a complaint about a problem"
    items: 12
  - type: sentence-builder
    focus: "Describe apartments using spatial cases and comparisons"
    items: 12
