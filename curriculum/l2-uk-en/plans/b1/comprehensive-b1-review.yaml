module: b1-092
level: B1
sequence: 92
slug: comprehensive-b1-review
version: '3.1'
title: "Загальне повторення B1"
subtitle: "Від фонетики до аргументації — повний огляд граматики B1"
focus: review
pedagogy: PPP
phase: "B1.9 [Synthesis & Graduation]"
word_target: 4000
objectives:
  - "Learner can demonstrate integrated mastery of all B1 grammar: чергування, рухові
    дієслова, ступені порівняння, відмінки, дієприкметники, складні речення"
  - "Learner can identify and correct errors across all B1 grammar areas in a comprehensive
    Ukrainian text"
  - "Learner can use metalanguage from Phase 1 to analyze and explain Ukrainian grammar
    phenomena encountered throughout B1"
  - "Learner can produce coherent Ukrainian texts combining grammar from all 10 phases:
    narratives, descriptions, arguments, formal documents"
  - "Learner can self-diagnose areas of weakness and plan targeted review before the
    B1 practice exams"
dialogue_situations:
  - setting: 'End-of-year oral presentation at a Київський університет — student summarizes
      everything learned in B1: describes their journey through Ukraine, using all
      tenses, moods, subordinate clauses, participles, gerunds, registers.'
    speakers:
      - Студент (presenting)
      - Комісія (examination board)
    motivation: 'Full B1 review: all grammar structures in a coherent autobiographical
      presentation'
content_outline:
  - section: "Фонетика та морфологія"
    words: 650
    points:
      - "Quick review of metalanguage: звук/літера, голосний/приголосний, дзвінкий/глухий/сонорний,
        наголос, транскрипція. Будова слова: корінь, префікс, суфікс, закінчення.
        Частини мови: іменник, прикметник, дієслово, прислівник."
      - "Чергування голосних i приголосних (Phase 2): [о/е] → [i] in closed syllables:
        рік-року, річ-речі. Consonant alternations: друг-друже, сидіти-сиджу. Спрощення:
        щастя-щасливий, тиждень-тижня. Practice: apply чергування in word form generation."
      - "Iменникові субкласи (Phase 2): Masculine: -ар/-яр/-ин (пекар, школяр, киянин).
        Hissing stems (сторож, товариш). Feminine zero-ending (любов, осінь, подорож).
        Pluralia tantum (двері, окуляри, Карпати). Practice: decline іменники from
        each subclass."
      - "Diagnostic: learners complete exercises covering all Phase 1-2 topics, rating
        their confidence per area."
      - "Error hotspot review: the most common Phase 1-2 errors across B1 learners:
        wrong чергування in stem (*рокУ → рОку), wrong gender for abstract nouns (*розмов
        → розмова is feminine), wrong plural for neuter nouns (*місти → міста). Targeted
        practice on these specific pain points."
  - section: "Дієслова та рух"
    words: 700
    points:
      - "Умовний та наказовий способи (Phase 3): Реальна i нереальна умова (якщо vs
        якби). Наказовий з хай/нехай, ввічливі прохання. Зворотні дієслова: -ся/-сь
        нюанси. Пасивний стан introduction."
      - "Рухові дієслова з префіксами (Phase 4): при- (прийти), до- (доїхати), пі-/по-
        (піти), від- (від'їхати), за- (зайти), ви- (вийти), пере- (перейти), про-
        (проїхати), об- (об'їхати), під- (підійти). Figurative uses: час іде, дощ
        іде. Practice: narrate a journey using correct prefixed motion verbs."
      - "Віддієслівні іменники (Phase 3): читання, бачення. Творення дієслів suffixes
        (Phase 3): prefix/suffix meaning changes. Practice: form verbal nouns and
        identify prefix meanings."
      - "Diagnostic: learners produce verb forms in conditional, imperative, reflexive,
        and motion contexts."
  - section: "Порівняння та словотвір"
    words: 600
    points:
      - "Ступені порівняння прикметників: Проста: важчий, найважчий. Складена: більш
        важкий, найбільш важкий. Суплетивні: гарний-кращий, поганий-гірший. Прислівники:
        швидко-швидше-найшвидше."
      - "Словотвір — прикметники та іменники: Від іменників: осінь-осінній. Назви
        осіб: співак, читальня. Practice: form adjectives and nouns from given base
        words."
      - "Diagnostic: comparison exercises and word formation tasks."
  - section: "Відмінки, числівники, займенники"
    words: 700
    points:
      - "Нюанси відмінків: Родовий: частина від цілого, об'єкт бажання, дати. Давальний:
        суб'єкт стану (мені не спиться), вік. Орудний: характеристика за професією,
        шлях. Practice: choose the correct case in context."
      - "Часові та причинні прийменники: через, за, на, перед, після (час). від, з,
        через, для, до (причина/мета). Practice: use прийменники with correct case
        government."
      - "Числівники: відмінювання та узгодження. Займенники: питально-відносні, зворотний
        (себе), неозначені. Practice: decline числівники, use advanced pronouns."
      - "Diagnostic: mixed case/numeral/pronoun exercises."
  - section: "Дієприкметники, синтаксис, стилі"
    words: 700
    points:
      - "Дієприкметники та дієприслівники (Phase 7): Активні i пасивні дієприкметники,
        звороти. Дієприслівники -учи/-ючи (НДВ), -вши/-ши (ДВ). Practice: expand sentences
        with participial/gerund phrases."
      - "Складне речення (Phase 8): Складносурядне: i, а, але, або. Складнопідрядне:
        що, який, коли, тому що, якщо, щоб, хоча. Пряма i непряма мова. Practice:
        construct complex sentences of each type."
      - "Стилі мовлення та заперечення (Phase 9): Офіційно-діловий, розмовний, художній,
        публіцистичний. Подвійне заперечення, вставні слова, абревіатури. Practice:
        register identification and transformation."
      - "Diagnostic: integrated exercises combining syntax, register, and grammar
        from Phases 7-9."
  - section: "Iнтегроване завдання та самодіагностика"
    words: 650
    points:
      - "Comprehensive text analysis: a Ukrainian text (250-300 words) containing
        grammar from all 10 phases. Learners identify: чергування, вид дієслова, рухові
        дієслова, ступені порівняння, відмінкові форми, дієприкметники, складні речення,
        стилі, вставні слова."
      - "Self-diagnostic checklist by phase: Phase 1-2: фонетика, морфологія, чергування
        — впевнено? Phase 3-4: дієслова, рухові — впевнено? Phase 5: порівняння, словотвір
        — впевнено? Phase 6: відмінки, числівники — впевнено? Phase 7-9: дієприкметники,
        синтаксис, стилі — впевнено? Learners create a personalized review plan."
      - "Writing diagnostic: learners write a short text (150 words) on 'Чому я вчу
        українську мову,' without looking at any notes. After writing, they self-analyze:
        which grammar structures did I use? Which did I avoid? The avoided structures
        are the ones needing review. This metacognitive exercise is more revealing than
        any quiz."
      - "Personalized review plan template: learners fill in: Мої сильні сторони:
        ___. Мої слабкі місця: ___. Модулі для повторення: ___. Мій план на тиждень:
        ___. This concrete planning step ensures the review module produces actionable
        outcomes."
      - "Preview: Екзамен (M89-M90) — practice exams testing all B1 skills. Use the
        self-diagnostic to focus review on weak areas."
vocabulary_hints:
  required:
    - "повторення (review/revision — revisiting material)"
    - "самодіагностика (self-diagnosis — identifying own weaknesses)"
    - "інтегрований (integrated — combining multiple elements)"
    - "впевнено (confidently — self-assessment level)"
    - "слабке місце (weak point — area needing improvement)"
  recommended:
    - "систематизувати (to systematize — to organize knowledge)"
    - "закріпити (to reinforce — to strengthen knowledge)"
    - "прогалина (gap — area of missing knowledge)"
    - "готовність (readiness — preparedness for exam)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про фонетика та морфологія і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Дієслова та рух»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему фонетика та морфологія."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему дієслова та рух."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Фонетика та морфологія»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Дієслова та рух» з їхніми визначеннями."
