module: b1-092
level: B1
sequence: 92
slug: comprehensive-b1-review
version: '3.1.2'
title: Загальне повторення B1
subtitle: Від фонетики до аргументації — повний огляд граматики B1
focus: review
pedagogy: PPP
phase: B1.9 [Синтез та завершення]
word_target: 4000
objectives:
  - "Учень може продемонструвати комплексне володіння всією граматикою B1: чергування, рухові дієслова, ступені порівняння, відмінки, дієприкметники, складні речення."
  - "Учень вміє знаходити та виправляти граматичні помилки з усіх тем B1 у зв'язному українському тексті."
  - "Учень може використовувати метамову з першого етапу для аналізу та пояснення граматичних явищ української мови, вивчених на рівні B1."
  - "Учень вміє створювати зв'язні українські тексти, поєднуючи граматику всіх 10 етапів: розповіді, описи, аргументацію, офіційні документи."
  - "Учень може самостійно виявити свої слабкі місця та скласти план цілеспрямованого повторення перед практичними іспитами рівня B1."
dialogue_situations:
  - setting: 'Підсумкова усна презентація в Київському університеті — студент підсумовує все вивчене на рівні B1: описує свою подорож Україною, використовуючи всі часи, способи, підрядні речення, дієприкметники, дієприслівники, стилі.'
    speakers:
      - Студент (presenting)
      - Комісія (examination board)
    motivation: 'Повне повторення B1: усі граматичні конструкції у зв''язній автобіографічній презентації'
content_outline:
  - section: Фонетика та морфологія
    words: 650
    points:
      - 'Швидке повторення метамови: звук/літера, голосний/приголосний, дзвінкий/глухий/сонорний, наголос, транскрипція. Будова слова: корінь, префікс, суфікс, закінчення. Частини мови: іменник, прикметник, дієслово, прислівник.'
      - 'Чергування голосних i приголосних (Етап 2): [о/е] → [i] у закритих складах: рік-року, річ-речі. Чергування приголосних: друг-друже, сидіти-сиджу. Спрощення: щастя-щасливий, тиждень-тижня. Практика: застосування чергувань при словотворенні та словозміні.'
      - 'Iменникові субкласи (Етап 2): Чоловічий рід: -ар/-яр/-ин (пекар, школяр, киянин). Основи на шиплячий (сторож, товариш). Жіночий рід із нульовим закінченням (любов, осінь, подорож). Множинні іменники (двері, окуляри, Карпати). Практика: відмінювання іменників кожного підкласу.'
      - 'Діагностика: учні виконують вправи на всі теми Етапів 1-2, оцінюючи свою впевненість у кожній темі.'
      - 'Аналіз типових помилок: найпоширеніші помилки Етапів 1-2 серед учнів рівня B1: неправильне чергування в основі (*рокУ → рОку), помилки в роді абстрактних іменників (*розмов → розмова — ж.р.), неправильна множина іменників середнього роду (*місти → міста). Цілеспрямована практика на ці проблемні точки.'
  - section: Дієслова та рух
    words: 700
    points:
      - 'Умовний та наказовий способи (Етап 3): Реальна i нереальна умова (якщо проти якби). Наказовий спосіб із хай/нехай, ввічливі прохання. Зворотні дієслова: нюанси використання -ся/-сь. Вступ до пасивного стану.'
      - 'Рухові дієслова з префіксами (Етап 4): при- (прийти), до- (доїхати), пі-/по- (піти), від- (від''їхати), за- (зайти), ви- (вийти), пере- (перейти), про- (проїхати), об- (об''їхати), під- (підійти). Переносне значення: час іде, дощ іде. Практика: розповідь про подорож із правильним використанням префіксальних дієслів руху.'
      - 'Віддієслівні іменники (Етап 3): читання, бачення. Творення дієслів за допомогою суфіксів (Етап 3): зміна значення через префікси та суфікси. Практика: утворення віддієслівних іменників та визначення значень префіксів.'
      - 'Діагностика: учні утворюють дієслівні форми в умовному та наказовому способах, зворотні дієслова та дієслова руху в контексті.'
  - section: Порівняння та словотвір
    words: 600
    points:
      - 'Ступені порівняння прикметників: Проста форма: важчий, найважчий. Складена форма: більш важкий, найбільш важкий. Суплетивні форми: гарний-кращий, поганий-гірший. Прислівники: швидко-швидше-найшвидше.'
      - 'Словотвір — прикметники та іменники: Від іменників: осінь-осінній. Назви осіб та приміщень: співак, читальня. Практика: утворення прикметників та іменників від заданих основ.'
      - 'Діагностика: вправи на порівняння та завдання зі словотвору.'
  - section: Відмінки, числівники, займенники
    words: 700
    points:
      - 'Нюанси відмінків: Родовий: частина від цілого, об''єкт бажання, дати. Давальний: суб''єкт стану (мені не спиться), вік. Орудний: характеристика за професією, шлях. Практика: вибір правильного відмінка в контексті.'
      - 'Часові та причинні прийменники: через, за, на, перед, після (час). від, з, через, для, до (причина/мета). Практика: використання прийменників із правильним відмінковим керуванням.'
      - 'Числівники: відмінювання та узгодження. Займенники: питально-відносні, зворотний (себе), неозначені. Практика: відмінювання числівників, використання просунутих форм займенників.'
      - 'Діагностика: комплексні вправи на відмінки, числівники та займенники.'
  - section: Дієприкметники, синтаксис, стилі
    words: 700
    points:
      - 'Дієприкметники та дієприслівники (Етап 7): Активні i пасивні дієприкметники, звороти. Дієприслівники на -учи/-ючи (НДВ), -вши/-ши (ДВ). Практика: розширення речень за допомогою дієприкметникових та дієприслівникових зворотів.'
      - 'Складне речення (Етап 8): Складносурядне: i, а, але, або. Складнопідрядне: що, який, коли, тому що, якщо, щоб, хоча. Пряма i непряма мова. Практика: побудова складних речень кожного типу.'
      - 'Стилі мовлення та заперечення (Етап 9): Офіційно-діловий, розмовний, художній, публіцистичний. Подвійне заперечення, вставні слова, абревіатури. Практика: розпізнавання регістру та стилістична трансформація.'
      - 'Діагностика: інтегровані вправи, що поєднують синтаксис, стилі та граматику Етапів 7-9.'
  - section: Iнтегроване завдання та самодіагностика
    words: 650
    points:
      - 'Комплексний аналіз тексту: український текст (250-300 слів), що містить граматичні конструкції з усіх 10 етапів. Учні знаходять: чергування, вид дієслова, рухові дієслова, ступені порівняння, відмінкові форми, дієприкметники, складні речення, стилі, вставні слова.'
      - 'Самодіагностика за етапами (чекліст): Етапи 1-2: фонетика, морфологія, чергування — впевнено? Етапи 3-4: дієслова, рухові — впевнено? Етап 5: порівняння, словотвір — впевнено? Етап 6: відмінки, числівники — впевнено? Етапи 7-9: дієприкметники, синтаксис, стилі — впевнено? Учні складають індивідуальний план повторення.'
      - 'Діагностика письма: учні пишуть короткий текст (150 слів) на тему «Чому я вчу українську мову», не зазираючи у конспекти. Після написання вони здійснюють самоаналіз: які граматичні структури я використав? Яких уникав? Уникнені структури — це саме ті, що потребують повторення. Ця метакогнітивна вправа є більш показовою, ніж будь-який тест.'
      - 'Шаблон індивідуального плану повторення: учні заповнюють: Мої сильні сторони: ___. Мої слабкі місця: ___. Модулі для повторення: ___. Мій план на тиждень: ___. Цей конкретний крок планування гарантує, що модуль повторення принесе практичну користь.'
      - 'Анонс: Екзамен (M89-M90) — тренувальні іспити, що перевіряють усі навички B1. Використовуйте самодіагностику, щоб зосередити повторення на слабких місцях.'
  - section: Підсумок — Summary
    words: 300
    points:
      - "Рівень B1 вимагає інтеграції морфологічних систем: чергування (рік-року, друг-друже), порівняння прикметників (гарний-кращий-найкращий), префіксальні дієслова руху (прийти, вийти). Самоперевірка: У чому різниця між 'піти' та 'доїхати'? Утворіть вищий та найвищий ступені порівняння від 'поганий' (гірший, найгірший). Розкажіть про коротку подорож, використавши щонайменше три різні префікси руху."
      - "Просунутий синтаксис збагачує вашу українську: використання дієприкметників і дієприслівників та складнопідрядних речень. Самоперевірка: У чому різниця між 'читаючи' та 'прочитавши'? Напишіть два складних речення про те, чому ви вивчаєте українську мову, використовуючи сполучники 'тому що' або 'щоб'."
      - 'Самодіагностика — це останній крок перед іспитом B1: виявлення уникнених структур є таким самим важливим, як і виправлення активних помилок. Самоперевірка: Подивіться на текст, який ви нещодавно написали. Яких граматичних конструкцій B1 (напр., умовний спосіб, пасивний стан) ви повністю уникнули? Назвіть дві конкретні теми, які потрібно додати до вашого індивідуального плану повторення.'
vocabulary_hints:
  required:
    - повторення (review/revision — revisiting material)
    - самодіагностика (self-diagnosis — identifying own weaknesses)
    - інтегрований (integrated — combining multiple elements)
    - впевнено (confidently — self-assessment level)
    - слабке місце (weak point — area needing improvement)
  recommended:
    - систематизувати (to systematize — to organize knowledge)
    - закріпити (to reinforce — to strengthen knowledge)
    - прогалина (gap — area of missing knowledge)
    - готовність (readiness — preparedness for exam)
activity_hints:
  - type: reading
    focus: "Прочитайте текст про фонетика та морфологія і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Дієслова та рух»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему фонетика та морфологія."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему дієслова та рух."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Фонетика та морфологія»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Дієслова та рух» з їхніми визначеннями."
