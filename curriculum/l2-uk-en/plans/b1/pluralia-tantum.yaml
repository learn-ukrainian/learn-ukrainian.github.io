module: b1-015
level: B1
sequence: 15
slug: pluralia-tantum
version: '3.0'
title: "Іменники у множині"
subtitle: "Двері, окуляри, Карпати — слова без однини"
focus: grammar
pedagogy: PPP
phase: "B1.2 [Morphophonemics & Noun Subclasses]"
word_target: 4000
objectives:
- "Learner can identify nouns that exist only in множина (pluralia tantum)
  and explain why they have no однина form"
- "Learner can correctly decline pluralia tantum nouns, applying the
  correct родовий відмінок ending (-ів/-їв, -ей, or нульове)"
- "Learner can use the special орудний відмінок forms where they exist
  (грішми/грошима, ворітьми/воротами) and explain the stylistic difference"
- "Learner can distinguish pluralia tantum from regular plural forms
  and from singularia tantum (nouns with однина only)"
- "Learner can correctly use pluralia tantum nouns with adjectives and
  verbs (двері відчинені, ножиці гострі — plural agreement)"
content_outline:
- section: "Що таке іменники, які вживаються тільки у множині?"
  words: 550
  points:
  - "Introduction from Литвінова Grade 6 p.134: 'Переважна більшість
    іменників мають форми однини та множини. Але є такі, що вживаються
    у формі тільки одного числа — лише однини чи лише множини.'
    Focus of this module: nouns that have ONLY множина."
  - "From Заболотний Grade 6 p.96: 'До жодної відміни не належать
    незмінювані іменники (таксі, метро) та іменники, що мають форму
    тільки множини (двері, сани).' These nouns cannot be classified
    into I-IV відміна because відміна is defined by однина forms."
  - "Why do these nouns exist? Historical and semantic reasons:
    — Paired objects: окуляри (glasses), ножиці (scissors), сани (sleigh).
    — Collective actions/states: канікули (holidays), іменини (name day).
    — Complex objects: двері (door), ворота (gate), гроші (money).
    — Geographical names: Карпати, Черкаси, Суми, Афіни."
- section: "Семантичні групи (Semantic groups)"
  words: 600
  points:
  - "Group 1 — Парні предмети (paired objects):
    окуляри (glasses), ножиці (scissors), штани (trousers),
    шкарпетки (socks — can also be singular шкарпетка!),
    Note: not all 'pair' words are pluralia tantum. Рукавиці has
    singular рукавиця. Test: can you say одна? If yes, not pluralia tantum."
  - "Group 2 — Збірні та масові поняття (collective/mass concepts):
    гроші (money), дріжджі (yeast), парфуми (perfume), ліки (medicine),
    меблі (furniture), харчі (food/provisions), вершки (cream),
    радощі (joys), хитрощі (tricks).
    From Авраменко Grade 10 p.164: 'Тільки в множині вживаються обидва
    іменники рядка: дріжджі, парфуми.'"
  - "Group 3 — Часові періоди та дії (time periods and events):
    канікули (holidays), роковини (anniversary), заручини (engagement),
    іменини (name day), жнива (harvest), вибори (elections).
    Group 4 — Географічні назви (geographical names):
    Карпати, Черкаси, Суми, Чернівці, Афіни, Гімалаї."
- section: "Відмінювання (Declension of pluralia tantum nouns)"
  words: 700
  points:
  - "Full paradigm from Заболотний Grade 6 p.112:
    Н. окуляри    гроші       ворота
    Р. окулярів   грошей      воріт
    Д. окулярам   грошам      воротам(-ям)
    Зн. окуляри   гроші       ворота
    Ор. окулярами грішми/грошима ворітьми/воротами
    М. на окулярах у грошах    у воротах(-ях)
    Кл. окуляри   гроші       ворота"
  - "Родовий відмінок — three ending patterns:
    From Заболотний Grade 6 p.112:
    -ів (-їв): окулярів, опадів, хитрощів, сходів.
    -ей: саней, грошей, дверей, радощей.
    нульове: воріт, Карпат, штанів (but also штанів with -ів).
    Learners must memorize which pattern each noun follows."
  - "Special орудний forms — archaic/literary variants:
    грішми (older) vs грошима (modern), ворітьми (older) vs воротами
    (modern), дверима (older) vs дверями (modern).
    The -ми forms are characteristic of Ukrainian (not shared with Russian)
    and appear in literature and set phrases. Compare: дітьми (always -ми).
    Practice: recognizing both forms in texts."
- section: "Чергування в pluralia tantum (Alternations)"
  words: 550
  points:
  - "Vowel alternations from M08 apply here:
    ворота — воріт (о → і in закритий склад of родовий).
    гроші — грошей (fleeting vowel).
    двері — дверей (е → е, no alternation here).
    These alternations are predictable from the same rules learned
    in M08, applied to plural-only paradigms."
  - "Consonant alternations in географічні назви:
    Черкаси — у Черкасах (no alternation).
    Карпати — у Карпатах (no alternation).
    Суми — у Сумах (no alternation).
    But some show fleeting vowels or stress shifts.
    Practice: decline geographical pluralia tantum in місцевий відмінок
    (relevant for 'I live in...' / 'I traveled to...' constructions)."
  - "Reading practice: a travel narrative about Карпати featuring pluralia
    tantum nouns (Карпати, гроші, двері, канікули, меблі) in various
    відмінки. Learners identify and classify each form."
- section: "Singularia tantum — протилежна група (Nouns with singular only)"
  words: 550
  points:
  - "For contrast: nouns that exist only in однина (singularia tantum).
    From Литвінова Grade 6 p.134 and Глазова Grade 10 p.185:
    — Власні назви: Говерла, Дунай, Харків, Оксана.
    — Абстрактні поняття: добро, совість, дружба, щастя.
    — Речовини: молоко, залізо, олія, крейда.
    — Збірні: студентство, молодь, птаство, дітвора."
  - "Why this contrast matters: learners must not try to pluralize
    singularia tantum (*дружби, *добра in plural sense) or singularize
    pluralia tantum (*одна двері, *один гроші).
    Stylistic exception: plural forms of abstract nouns exist for
    literary effect (радості життя, красоти природи) — but these are
    marked, not neutral."
  - "Practical exercise: sort nouns into three groups — normal
    (однина + множина), pluralia tantum (тільки множина),
    singularia tantum (тільки однина). Common traps: ліки (тільки мн.),
    молоко (тільки одн.), книга (обидва числа)."
- section: "Узгодження з pluralia tantum (Agreement with pluralia tantum)"
  words: 250
  points:
  - "Since pluralia tantum nouns are always plural, adjectives and verbs
    must agree in plural: великі двері (not *великий двері),
    гострі ножиці (not *гостра ножиця), гроші закінчилися.
    Past tense verbs use plural: двері відчинилися (not *відчинилася)."
  - "Numbers with pluralia tantum: одні двері, одні окуляри, двоє дверей,
    троє ножиць. Use збірні числівники (двоє, троє) or одні for 'one set.'
    *Один двері is ungrammatical."
- section: "Підсумок (Summary)"
  words: 300
  points:
  - "Key takeaways:
    1. Pluralia tantum = nouns with no однина form (двері, гроші, ножиці).
    2. They belong to no відміна (відміна requires однина).
    3. Родовий: -ів/-їв, -ей, or нульове — must be memorized per noun.
    4. Special -ми forms in орудний are distinctly Ukrainian (грішми, дверима).
    5. Agreement is always plural (великі двері відчинилися)."
  - "Self-check: Дайте відповіді на запитання:
    1. Назвіть п'ять іменників, що вживаються тільки у множині.
    2. Чому ці іменники не належать до жодної відміни?
    3. Яке закінчення має родовий: окуляри, гроші, ворота?
    4. Як сказати 'one pair of scissors' українською?
    Preview: M16 — Здоров'я і медицина (ліки — pluralia tantum!)."
