grammar:
  - 'Ідентифікація pluralia tantum: іменники без форми однини'
  - 'Відсутність відміни: класифікація за відмінами вимагає парадигми однини'
  - 'Шаблони родового відмінка множини: -ів/-їв (окулярів), -ей (грошей), нульове (воріт)'
  - 'Спеціальні форми орудного відмінка на -ми: грішми, ворітьми, дверима (специфічні для української мови)'
  - 'Контраст зі singularia tantum: абстрактні, речовинні, збірні, власні назви'
  - 'Узгодження у множині: прикметники та дієслова завжди стоять у множині з pluralia tantum'
  - 'Збірні числівники з pluralia tantum: двоє дверей, троє ножиць'
