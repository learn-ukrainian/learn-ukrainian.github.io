module: b1-022
level: B1
sequence: 22
slug: pluralia-tantum
version: '3.1.3'
title: 'Іменники у множині'
subtitle: 'Двері, окуляри, Карпати — слова без однини'
focus: grammar
pedagogy: PPP
phase: 'B1.1 [Морфофонеміка]'
word_target: 4000
objectives:
  - 'Учень вміє розпізнавати іменники, що існують лише у формі множини (pluralia tantum), і пояснювати, чому вони не мають форми однини'
  - 'Учень вміє правильно відмінювати іменники pluralia tantum, застосовуючи відповідні закінчення родового відмінка (-ів/-їв, -ей або нульове)'
  - 'Учень вміє використовувати спеціальні форми орудного відмінка там, де вони існують (грішми/грошима, ворітьми/воротами), і пояснювати їхні стилістичні відмінності'
  - 'Учень вміє відрізняти pluralia tantum від звичайних форм множини та від singularia tantum (іменників, що мають лише однину)'
  - 'Учень вміє правильно узгоджувати іменники pluralia tantum з прикметниками та дієсловами (двері відчинені, ножиці гострі — узгодження у множині)'
dialogue_situations:
  - setting: 'Пакування речей для переїзду з Одеси до Києва — підписування коробок із речами, що існують лише в множині: Де мої окуляри (pl)? Ножиці (pl) у тій коробці. Гроші (pl) в конверті. Двері (pl) зачинені.'
    speakers:
      - Сусід, що допомагає
      - Мешканець
    motivation: 'Pluralia tantum: окуляри, ножиці, гроші, двері — не мають форми однини'
content_outline:
  - section: 'Що таке іменники, які вживаються тільки у множині?'
    words: 600
    points:
      - 'Вступ за Литвіновою 6 клас, с.134: «Переважна більшість іменників мають форми однини та множини. Але є такі, що вживаються у формі тільки одного числа — лише однини чи лише множини». Фокус цього модуля: іменники, що мають ЛИШЕ множину.'
      - 'За Заболотним 6 клас, с.96: «До жодної відміни не належать незмінювані іменники (таксі, метро) та іменники, що мають форму тільки множини (двері, сани)». Ці іменники неможливо класифікувати до I-IV відміни, оскільки відміна визначається за формами однини.'
      - 'Чому існують такі іменники? Історичні та семантичні причини: — Парні предмети: окуляри, ножиці, сани. — Збірні дії/стани: канікули, іменини. — Складні предмети: двері, ворота, гроші. — Географічні назви: Карпати, Черкаси, Суми, Афіни.'
  - section: 'Семантичні групи'
    words: 700
    points:
      - 'Група 1 — Парні предмети: окуляри, ножиці, штани, шкарпетки (остання може бути в однині — шкарпетка!). Зверніть увагу: не всі слова для "парних" речей є pluralia tantum. Рукавиці має однину рукавиця. Тест: чи можете ви сказати "одна"? Якщо так, це не pluralia tantum.'
      - 'Група 2 — Збірні та масові поняття: гроші, дріжджі, парфуми, ліки, меблі, харчі, вершки, радощі, хитрощі. З Авраменка 10 клас, с.164: «Тільки в множині вживаються обидва іменники рядка: дріжджі, парфуми».'
      - 'Група 3 — Часові періоди та дії: канікули, роковини, заручини, іменини, жнива, вибори. Група 4 — Географічні назви: Карпати, Черкаси, Суми, Чернівці, Афіни, Гімалаї.'
  - section: 'Відмінювання'
    words: 700
    points:
      - 'Повна парадигма за Заболотним 6 клас, с.112: Н. окуляри / гроші / ворота; Р. окулярів / грошей / воріт; Д. окулярам / грошам / воротам(-ям); Зн. окуляри / гроші / ворота; Ор. окулярами / грішми/грошима / ворітьми/воротами; М. на окулярах / у грошах / у воротах(-ях); Кл. окуляри / гроші / ворота.'
      - 'Родовий відмінок — три типи закінчень: За Заболотним 6 клас, с.112: -ів (-їв): окулярів, опадів, хитрощів, сходів. -ей: саней, грошей, дверей, радощей. нульове: воріт, Карпат, штанів (хоча є і варіант штанів з -ів). Учні мають запам''ятати тип закінчення для кожного іменника.'
      - 'Особливі форми орудного відмінка — архаїчні/літературні варіанти: грішми (старіше) vs грошима (сучасне), ворітьми (старіше) vs воротами (сучасне), дверима (старіше) vs дверями (сучасне). Форми на -ми характерні саме для української мови (відсутні в російській) і трапляються в літературі та сталих виразах. Порівняйте: дітьми (завжди -ми). Практика: розпізнавання обох форм у текстах.'
  - section: 'Чергування в pluralia tantum'
    words: 550
    points:
      - 'Чергування голосних з модуля модуль №8 застосовуються й тут: ворота — воріт (о → і в закритому складі родового відмінка). гроші — грошей (випадний голосний). двері — дверей (е → е, тут без чергування). Ці чергування передбачувані за тими ж правилами, що вивчалися у модулі №8, і поширюються на парадигми множинних іменників.'
      - 'Чергування приголосних у географічних назвах: Черкаси — у Черкасах (без чергування). Карпати — у Карпатах (без чергування). Суми — у Сумах (без чергування). Проте деякі слова мають випадні голосні або зміну наголосу. Практика: відмінювання географічних pluralia tantum у місцевому відмінку (важливо для конструкцій "я живу в..." / "я подорожував до...").'
      - 'Практика читання: розповідь про подорож до Карпат із використанням іменників pluralia tantum (Карпати, гроші, двері, канікули, меблі) у різних відмінках. Учні ідентифікують і класифікують кожну форму.'
  - section: 'Singularia tantum — протилежна група'
    words: 550
    points:
      - 'Для контрасту: іменники, що існують лише в однині (singularia tantum). За Литвіновою 6 клас, с.134 та Глазовою 10 клас, с.185: — Власні назви: Говерла, Дунай, Харків, Оксана. — Абстрактні поняття: добро, совість, дружба, щастя. — Речовини: молоко, залізо, олія, крейда. — Збірні: студентство, молодь, птаство, дітвора.'
      - 'Чому цей контраст важливий: учні не повинні намагатися утворити множину від singularia tantum (*дружби, *добра у значенні множини) або утворити однину від pluralia tantum (*одна двері, *один гроші). Стилістичний виняток: множинні форми абстрактних іменників існують для літературного ефекту (радості життя, красоти природи) — але вони є маркованими, а не нейтральними.'
      - 'Практична вправа: розподіліть іменники на три групи — звичайні (однина + множина), pluralia tantum (лише множина), singularia tantum (лише однина). Типові пастки: ліки (лише мн.), молоко (лише одн.), книга (обидва числа).'
  - section: 'Узгодження з pluralia tantum'
    words: 450
    points:
      - 'Оскільки іменники pluralia tantum завжди стоять у множині, прикметники та дієслова повинні узгоджуватися з ними у множині: великі двері (а не *великий двері), гострі ножиці (а не *гостра ножиця), гроші закінчилися. Дієслова минулого часу використовують форму множини: двері відчинилися (а не *відчинилася).'
      - 'Числівники з pluralia tantum: одні двері, одні окуляри, двоє дверей, троє ножиць. Використовуйте збірні числівники (двоє, троє) або «одні» для «одного набору». *Один двері — це неграматично.'
      - 'Узгодження присудка з pluralia tantum: коли присудок стоїть ПЕРЕД іменником, він усе одно приймає форму множини: Стояли великі двері (а не *стояло). Лежали гострі ножиці (а не *лежало). Порівняйте зі singularia tantum: Лежало масло — однина. Статус "tantum" керує узгодженням незалежно від порядку слів.'
      - 'Типові помилки в розмові та на письмі: *Ці гроші коштує дорого (має бути коштують). *Мої окуляри зламався (має бути зламалися). *Нові штани був довгий (має бути були довгі). Кожна помилка свідчить про забування того, що ці іменники граматично є множинними, незважаючи на те, що іноді позначають одиничні предмети.'
  - section: 'Підсумок'
    words: 450
    points:
      - 'Головні висновки: 1. Pluralia tantum = іменники без форми однини (двері, гроші, ножиці). 2. Вони не належать до жодної відміни (відміна вимагає форми однини). 3. Родовий відмінок: -ів/-їв, -ей або нульове закінчення — потрібно запам''ятати для кожного слова. 4. Спеціальні форми на -ми в орудному відмінку притаманні українській мові (грішми, дверима). 5. Узгодження завжди в множині (великі двері відчинилися).'
      - 'Самоперевірка: Дайте відповіді на запитання: 1. Назвіть п''ять іменників, що вживаються тільки у множині. 2. Чому ці іменники не належать до жодної відміни? 3. Яке закінчення має родовий відмінок слів окуляри, гроші, ворота? 4. Як сказати «one pair of scissors» українською? Анонс: модуль №16 — Здоров''я і медицина (ліки — це pluralia tantum!).'
