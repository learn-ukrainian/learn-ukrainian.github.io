module: b1-057
level: B1
sequence: 57
slug: prepositions-temporal
version: '3.1.2'
title: 'Часові прийменники'
subtitle: 'Через, за, на, перед, після, до — точне вираження часу'
focus: grammar
pedagogy: PPP
phase: 'B1.5 [Нюанси відмінків та прийменники]'
word_target: 4000
objectives:
  - 'Вміти використовувати через + Зн.в. для вираження часового проміжку в майбутньому (через годину, через два дні) та розрізняти причинове значення (через хворобу)'
  - 'Вміти використовувати за + Зн.в. для позначення часу, необхідного для виконання дії (зробити за годину), і не плутати з прийменником через'
  - 'Правильно застосовувати часові прийменники перед + Ор.в., після + Р.в., до + Р.в., під час + Р.в.'
  - 'Вміти вживати прийменники на позначення тривалості: протягом + Р.в., впродовж + Р.в., на + Зн.в. (на тиждень, на рік)'
  - 'Вміти розрізняти по + М.в. (після, у часовому значенні) від по + Зн.в. (мета) та уникати русизмів у часових виразах'
dialogue_situations:
  - setting: 'Планування тижня подій у Київському культурному центрі: У понеділок — лекція. О третій годині — репетиція. На вихідних — екскурсія. До п''ятниці треба все підготувати.'
    speakers:
      - Організатор
      - Помічник
    motivation: 'Часові прийменники: у + Зн.в. (день), о + М.в. (час), на + М.в., до + Р.в.'
content_outline:
  - section: 'Через + Зн.в. та за + Зн.в.'
    words: 800
    points:
      - 'через + Зн.в. — дія відбудеться через певний проміжок часу від моменту мовлення: Я прийду через годину. Ми побачимося через два дні. Літо почнеться через місяць. Акцент робиться на часі очікування: подія відбувається ПІСЛЯ цього періоду. Важливо: "через" також може означати "з причини" — розуміємо лише з контексту: через хворобу я не прийшов.'
      - 'за + Зн.в. — означає час, за який виконано або буде виконано дію: Я зробив це за годину. Вона прочитала книжку за два дні. Акцент ставиться на тому, СКІЛЬКИ ЧАСУ забрала дія, а не коли вона відбудеться.'
      - 'Ключова відмінність (Авраменко 11 клас, с.42): через = "після певного часу від зараз" (точка відліку в майбутньому); за = "протягом певного часу" (тривалість дії, будь-який час). Через годину я піду. За годину я все зробив. Практика: 10 речень, які вимагають вибору "через" або "за".'
  - section: 'Перед, після, до, під час'
    words: 800
    points:
      - 'перед + Ор.в. — означає час, що передує події: перед обідом, перед зустріччю, перед екзаменом. Він прийшов перед початком уроку.'
      - 'після + Р.в. — означає час настання чогось за іншою подією: після обіду, після зустрічі, після екзамену. Ми поговоримо після роботи.'
      - 'до + Р.в. — часова межа (дедлайн): до обіду, до п''ятої години, до кінця тижня. Зроби це до завтра.'
      - 'під час + Р.в. — період, у який відбувається дія: під час обіду, під час уроку, під час війни. Синоніми: "впродовж" / "протягом" також виражають тривалість, але підкреслюють її повноту.'
      - 'Текст для читання: розповідь про розпорядок дня з використанням конструкцій "перед/після/під час/до". «Перед сніданком я роблю зарядку. Під час обіду читаю новини. Після роботи гуляю в парку. До вечері намагаюся все зробити.» Учні ідентифікують кожен часовий прийменник і відповідний відмінок.'
  - section: 'Тривалість: протягом, впродовж, на'
    words: 700
    points:
      - 'протягом / упродовж + Р.в. — вказує на весь час тривання дії: протягом дня, упродовж тижня, протягом трьох місяців. Обидва слова є синонімами; "протягом" частіше вживається на письмі. З підручника Литвінової (7 клас, с.187): «Упродовж трьох місяців мій брат готувався до екзамену з фізики».'
      - 'на + Зн.в. — запланований період часу: Я приїхав на тиждень. Вона поїхала на рік. Візьміть це на годину. Період запланований, а не той, що вже минув.'
      - 'Вираження тривалості за допомогою знахідного відмінка: цілий день (Зн.в.), цілу ніч, цілий тиждень. Ці вирази вживаються без прийменника. Також: годинами (Ор.в.), днями, тижнями — орудний відмінок множини для вираження тривалої дії.'
      - 'Уникнення типових помилок (Заболотний 7 клас, с.193): НЕ *на протязі (калька з російської) — правильно "протягом". НЕ *після п''яти (калька) — правильно: "після п''ятої". Практика: 10 речень із правильним використанням прийменників тривалості, включаючи "цілий день" та варіанти на кшталт "годинами".'
  - section: 'Позначення часу доби і пір року'
    words: 600
    points:
      - 'Пори року: взимку, навесні, влітку, восени (прислівники, без прийменників). Але з прикметниками: цієї зими (Р.в.), минулого літа (Р.в.), наступної весни (Р.в.), минулої осені (Р.в.).'
      - 'Час доби: вранці/зранку, вдень/удень, увечері, вночі (прислівники). З точним зазначенням часу: о п''ятій годині, о пів на шосту, за десять шоста (= десять хвилин до шостої). З підручника Авраменка (11 клас, с.42): уникати *без десяти шість (русизм), правильно: за десять хвилин шоста.'
      - 'Дні тижня та дати: у понеділок (Зн.в.), у середу, в п''ятницю. Цього понеділка (Р.в.). Періодичність: щопонеділка, щосереди. Зверніть увагу на різні конструкції: у понеділок (одноразова подія) vs щопонеділка (регулярна). Практика: скласти розклад на тиждень, використовуючи часові вирази, і розрізнити одноразові та регулярні події.'
  - section: 'По + М.в. та інші нюанси'
    words: 600
    points:
      - 'по + М.в. — "після" (офіційно-діловий і літературний стиль): по обіді, по закінченні, по смерті, по завершенні. Це правильна літературна українська норма, а НЕ русизм. З підручника Авраменка (11 клас, с.72): прийменник "по" + М.в. для вираження часового значення "після".'
      - 'Розрізнення значень "по": по + М.в. (після): по обіді; по + Зн.в. (мета): піти по гриби; по + М.в. (місце, розподіл дії): по крамницях. Значення визначається контекстом.'
      - 'Практика: мішана вправа на часові прийменники — обрати правильний прийменник і відмінок у 12 реченнях.'
      - 'Поширені часові вирази без прийменників: цілий день, кожного разу (Р.в.), щодня, щотижня, щомісяця, щороку. Ці прислівникові вирази часу доповнюють прийменникові конструкції. З підручника Литвінової (7 клас): прислівники часу.'
  - section: 'Підсумок'
    words: 500
    points:
      - 'Довідкова таблиця: через + Зн.в. (дія відбудеться після періоду), за + Зн.в. (дія тривала певний період), перед + Ор.в. (передування), після + Р.в. (наслідок), до + Р.в. (часова межа), під час + Р.в. (період дії), протягом/упродовж + Р.в. (увесь час тривання), на + Зн.в. (запланований період), по + М.в. (після — офіційно).'
      - 'Типові русизми, яких слід уникати: *на протязі (вживати протягом), *без десяти шість (вживати за десять хвилин шоста), *у цьому році (вживати цього року — Р.в.). Також: *слідуючий тиждень — правильно: наступний тиждень.'
      - 'Самоперевірка: перекласти українською: "in 3 hours" (через три години), "within 2 days" (за два дні), "before lunch" (перед обідом), "during winter" (взимку / протягом зими), "every Monday" (щопонеділка). Анонс: наступний модуль — прийменники причини і мети.'
vocabulary_hints:
  required:
    - "прийменник (preposition)"
    - "часовий (temporal — relating to time)"
    - "тривалість (duration)"
    - "через (in/after — temporal; because of — causal)"
    - "протягом (throughout/during — governs Р.в.)"
    - "впродовж (throughout — synonym of протягом)"
    - "під час (during — governs Р.в.)"
    - "перед (before — governs Ор.в.)"
    - "після (after — governs Р.в.)"
  recommended:
    - "до (until/by — temporal; to — directional)"
    - "взимку (in winter — temporal adverb)"
    - "навесні (in spring — temporal adverb)"
    - "вранці (in the morning — temporal adverb)"
    - "зранку (from the morning — temporal adverb)"
    - "о (at — clock time: о п'ятій годині)"
activity_hints:
  - type: reading
    focus: 'Прочитати текст про "через + Зн.в." та "за + Зн.в." і дати відповіді на запитання.'
  - type: essay-response
    focus: 'Написати 5 речень, використовуючи нову лексику з розділу «Перед, після, до, під час».'
  - type: fill-in
    focus: 'Вставити правильну граматичну форму у реченнях на тему "через + Зн.в." та "за + Зн.в.".'
  - type: error-correction
    focus: 'Знайти і виправити помилки у реченнях на тему "перед, після, до, під час".'
  - type: quiz
    focus: 'Обрати правильний варіант лексики та граматики з розділу «Через + Зн.в. та за + Зн.в.».'
  - type: match-up
    focus: 'З''єднати терміни з розділу «Перед, після, до, під час» з їхніми визначеннями.'
connects_to:
  - 'b1-051 (Прийменники причини і мети)'
  - 'b1-046 (Нюанси родового відмінка)'
  - 'b1-048 (Нюанси орудного відмінка)'
prerequisites:
  - 'Завершення А2 (базові вирази часу, позначення часу на годиннику)'
  - 'b1-046 до b1-048 (поглиблені знання відмінків для правильного вживання прийменників)'
grammar:
  - 'через + Зн.в. (дія відбудеться після періоду) vs за + Зн.в. (упродовж періоду)'
  - 'перед + Ор.в., після + Р.в., до + Р.в., під час + Р.в.'
  - 'протягом/упродовж + Р.в., на + Зн.в. (тривалість)'
  - 'по + М.в. (після — літературна форма)'
  - 'Часові прислівники: взимку, навесні, вранці, увечері'
register: науково-навчальний
references:
  - title: "Авраменко Grade 11, p.42"
    notes: 'Часові вирази, позначення часу на годиннику, уникнення *без десяти.'
  - title: "Заболотний Grade 7, p.193"
    notes: 'завдяки vs через (причина), НЕ *на протязі.'
  - title: "Литвінова Grade 7, p.187"
    notes: 'Приклади вживання "впродовж/протягом".'
  - title: "Авраменко Grade 11, p.72"
    notes: 'Прийменник "по": часове, цільове та розподільне значення.'
  - title: "Заболотний Grade 8, p.84"
    notes: 'Прийменник "по" з різними відмінками та значеннями.'
