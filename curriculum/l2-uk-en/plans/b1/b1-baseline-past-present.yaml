register: розмовний
references:
- title: "Литвінова Grade 7, p.30-47"
  notes: "Дієслово: вид дієслова, часи дієслова, теперішній час — парадигма,
    мінімальна пара доконаний/недоконаний, зв'язок виду і часу."
- title: "Заболотний Grade 7, p.54-65"
  notes: "Дієслово: вид, часи, теперішній і минулий час — утворення,
    тести на вид, чергування в дієвідмінюванні."
- title: "Авраменко Grade 7, p.63-74"
  notes: "Минулий час: утворення, рід і число, нерегулярні форми,
    тестові завдання на вид і час."
- title: "Караман Grade 10, p.179"
  notes: "Дві основи дієслова, поділ на дієвідміни — систематизований огляд."
- title: "Захарійчук Grade 4, p.108-113"
  notes: "Змінювання дієслів за особами і числами — базові таблиці
    теперішнього і минулого часу для контрастивної опори."
