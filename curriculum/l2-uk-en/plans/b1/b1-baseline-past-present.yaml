module: b1-004
level: B1
sequence: 4
slug: b1-baseline-past-present
version: '3.0'
title: "Минуле і теперішнє"
subtitle: "Повторення дієслівних часів з повним зануренням в українську"
focus: verb-tenses-review
pedagogy: PPP
phase: "B1.1 [Metalanguage Bridge & Foundation]"
word_target: 4000
objectives:
- "Learner can conjugate verbs of both дієвідміни in теперішній час
  and explain the difference between I and II дієвідміна using Ukrainian terms"
- "Learner can form and use дієслова минулого часу correctly, including
  agreement in рід (чоловічий, жіночий, середній) and число"
- "Learner can distinguish доконаний вид from недоконаний вид and explain
  how вид affects which часові форми are available"
- "Learner can narrate past events and describe present routines using
  appropriate tense and aspect choices in connected Ukrainian discourse"
dialogue_situations:
- setting: 'Two friends at a Київська кав''ярня (f, Kyiv café) catching up after summer
    — one stayed in Kyiv, the other traveled: Я працював (past) у видавництві (n,
    publishing house). А зараз що робиш (present)? Пишу статтю (f, article) для журналу
    (m, magazine).'
  speakers:
  - Олексій
  - Дарина
  motivation: 'Present vs past tense review in natural narration: працювати/писати'
content_outline:
- section: "Теперішній час: дієвідміни (Present tense: conjugation classes)"
  words: 800
  points:
  - "Огляд теперішнього часу (Литвінова Grade 7 p.44):
    Форму теперішнього часу мають лише дієслова недоконаного виду,
    адже дія, що відбувається зараз, не може бути завершеною.
    Дієслова теперішнього часу змінюються за особами та числами.
    Повна парадигма:
    1-ша ос. — пишу/робл-ю, пишемо/робимо.
    2-га ос. — пишеш/робиш, пишете/робите.
    3-тя ос. — пише/робить, пишуть/роблять."
  - "Дві дієвідміни (Караман Grade 10 p.179):
    I дієвідміна: закінчення -у(-ю), -еш(-єш), -е(-є), -емо(-ємо),
    -ете(-єте), -уть(-ють). Приклади: писати — пишу, пишеш, пише...
    II дієвідміна: закінчення -у(-ю), -иш(-їш), -ить(-їть), -имо(-їмо),
    -ите(-їте), -ать(-ять). Приклади: робити — роблю, робиш, робить...
    Ключова різниця: тематичний голосний е/є (I) vs и/і (II)."
  - "Чергування приголосних у теперішньому часі:
    При дієвідмінюванні змінюється не лише закінчення,
    а й приголосний перед ним у деяких формах:
    сидіти — сиджу (д→дж), просити — прошу (с→ш),
    водити — воджу (д→дж), любити — люблю (б→бл).
    Ці чергування відбуваються лише в 1-й особі однини."
  - "Практика: монолог або діалог у теперішньому часі —
    опис типового дня, щоденних звичок, регулярних дій.
    Щоранку я встаю о сьомій. Снідаю, п'ю каву, йду на роботу.
    Увечері читаю книжку або дивлюся фільм.
    Learners produce similar texts using both дієвідміни."
- section: "Минулий час: утворення і вживання (Past tense: formation and usage)"
  words: 800
  points:
  - "Утворення минулого часу (Литвінова Grade 7 p.40):
    Форму минулого часу утворюємо від основи інфінітива за допомогою
    суфікса -в/-л-:
    писа-ти → писа-в (чол.р.), писа-л-а (жін.р.),
    писа-л-о (сер.р.), писа-л-и (множина).
    Форми минулого часу мають дієслова і доконаного, і недоконаного виду:
    робив і зробив, грав і зіграв."
  - "Узгодження в роді та числі (Заболотний Grade 7 p.62):
    Дієслова минулого часу НЕ змінюються за особами —
    вони змінюються за родами (в однині) та числами.
    Я/ти/він читав. Я/ти/вона читала. Воно читало.
    Ми/ви/вони читали.
    Це принципова відмінність від теперішнього часу,
    де дієслова змінюються за особами."
  - "Особливі форми (Авраменко Grade 7 p.63):
    Деякі дієслова мають нерегулярні форми минулого часу:
    могти — міг, могла (без суфікса -в-).
    нести — ніс, несла (без суфікса -в-).
    вести — вів, вела.
    померти — помер, померла.
    Ці форми треба запам'ятати."
  - "Практика: переказ минулих подій — оповідання про вчорашній день,
    подорож, спогад з дитинства.
    Минулого літа ми їздили до Львова. Ходили по Старому місту,
    пили каву на Площі Ринок, слухали вуличних музикантів.
    Learners narrate their own past experiences."
- section: "Вид дієслова: доконаний і недоконаний (Verbal aspect: perfective and imperfective)"
  words: 700
  points:
  - "Два види дієслова (Литвінова Grade 7 p.30):
    Доконаний вид (від слова доконати — виконати до кінця) —
    позначає завершену, обмежену в часі дію.
    Відповідає на питання що зробити? що зробив? що зробить?
    Приклади: написати, прочитати, збудувати.
    Недоконаний вид — позначає незавершену, тривалу дію.
    Відповідає на питання що робити? що робив? що робитиме?
    Приклади: писати, читати, будувати."
  - "Вид і час — зв'язок (Литвінова Grade 7 p.44):
    Дієслова недоконаного виду мають три часи:
    теперішній (пишу), минулий (писав), майбутній (писатиму).
    Дієслова доконаного виду мають лише два:
    минулий (написав) і майбутній (напишу).
    Чому? Дія, що відбувається ЗАРАЗ, не може бути завершеною —
    тому доконаний вид не має теперішнього часу."
  - "Видові пари — як вони утворюються:
    Префіксальний спосіб: писати → написати, читати → прочитати.
    Суфіксальний спосіб: вирішити → вирішувати, показати → показувати.
    Змішаний: кидати → кинути (суфікс + зміна кореня).
    Деякі пари суплетивні: брати → взяти, говорити → сказати."
  - "Практичне вживання виду в минулому часі:
    Що ти робив учора? (процес, тривалість) — Я читав книжку.
    Що ти зробив учора? (результат) — Я прочитав книжку.
    Вона писала лист дві години. (тривала дія, недок.)
    Вона написала лист і пішла на пошту. (завершена, док.)
    The choice between вид is about MEANING, not grammar rules."
- section: "Вид у розповіді: послідовність і тло (Aspect in narration: sequence and background)"
  words: 650
  points:
  - "Аспектуальна стратегія в розповіді:
    Доконаний вид for sequential completed events (foreground):
    Він прокинувся, встав, одягнувся і вийшов з дому.
    Недоконаний вид for background, setting, ongoing situations:
    Надворі йшов дощ. Було холодно. Вітер дув із заходу."
  - "Комбінування видів у зв'язному тексті:
    Коли я снідав (недок. — тривала дія як тло),
    зателефонував друг (док. — подія, що перервала тло).
    Я читав газету (тло), коли раптом погасло світло (подія).
    Ми їхали автобусом (тло), і раптом автобус зупинився (подія)."
  - "Типові помилки з видом:
    Вживання доконаного виду для тривалих дій:
    *Вчора я прочитав книжку три години. (неприродно — використовуй читав.)
    Вживання недоконаного виду для одноразових результативних дій:
    *Я вчора писав лист і відправляв його. (краще: написав і відправив.)
    Відчуття виду як вибору між процесом і результатом."
  - "Розширена практика: learners rewrite a passage changing aspect
    to see how it transforms the narrative —
    the same story as a sequence of events (доконаний)
    vs a description of an ongoing scene (недоконаний)."
- section: "Дієслова на -ся: зворотні дієслова в повторенні (Reflexive verbs in review)"
  words: 600
  points:
  - "Повторення зворотних дієслів:
    Постфікс -ся/-сь — not 'reflexive' in English sense, but a Ukrainian
    grammatical category with multiple meanings:
    власне зворотне: митися (мити себе), одягатися (одягати себе).
    взаємне: зустрічатися (один одного), цілуватися.
    стан: радіти → радуватися, дивити → дивуватися.
    безособове: мені не спиться, їй хочеться."
  - "Правопис -ться і -шся (Литвінова Grade 7 p.44):
    Дієслова на -ться пишемо з м'яким знаком: усміхається.
    Дієслова на -шся пишемо без м'якого знака: усміхаєшся.
    Перевірка: якщо можна поставити питання що робить? — пиши -ться.
    Що робиш? — пиши -шся."
  - "Зворотні дієслова в теперішньому та минулому часі:
    Теперішній: я вчуся, ти вчишся, він/вона вчиться, ми вчимося,
    ви вчитеся, вони вчаться.
    Минулий: я вчився/вчилася, ми вчилися.
    Практика: діалог із зворотними дієсловами —
    Як ти почуваєшся? — Добре. А ти? — Я трохи хвилююся."
- section: "Підсумок: від знання до вживання (Summary: from knowledge to usage)"
  words: 450
  points:
  - "Узагальнення часових форм у таблиці:
    Недоконаний вид: теперішній (пишу), минулий (писав),
    майбутній (писатиму / буду писати).
    Доконаний вид: минулий (написав), майбутній (напишу).
    Key insight: вид determines available tenses."
  - "Самоперевірка:
    1. Провідміняйте дієслово бачити в теперішньому часі.
    2. Утворіть форми минулого часу дієслова нести (усі роди).
    3. Визначте вид: гуляв, побачив, шукала, знайшла, працювали.
    4. Перекажіть свій вчорашній день, чергуючи доконаний
       і недоконаний вид."
  - "Попередній перегляд наступного модуля: Майбутнє і вид дієслова —
    three ways to form the future tense in Ukrainian,
    and how вид determines which future construction to use."
vocabulary_hints:
  required:
  - "теперішній час (present tense)"
  - "минулий час (past tense)"
  - "дієвідміна (conjugation class — I or II)"
  - "особа (person — 1st, 2nd, 3rd)"
  - "число (number — однина, множина)"
  - "рід (gender — чоловічий, жіночий, середній)"
  - "доконаний вид (perfective aspect — completed action)"
  - "недоконаний вид (imperfective aspect — ongoing action)"
  - "інфінітив (infinitive — the base form ending in -ти/-тися)"
  - "дієвідмінювання (conjugation — changing verb by person and number)"
  - "зворотний (reflexive — verbs with -ся/-сь)"
  - "видова пара (aspectual pair — e.g., писати/написати)"
  recommended:
  - "суфікс минулого часу (past tense suffix: -в/-л-)"
  - "тематичний голосний (thematic vowel — е/є for I, и/і for II conjugation)"
  - "чергування (alternation — consonant changes in conjugation)"
  - "основа інфінітива (infinitive stem — base for past tense formation)"
  - "основа теперішнього часу (present tense stem — base for present forms)"
  - "послідовність дій (sequence of actions — perfective chain)"
  - "тло розповіді (narrative background — imperfective setting)"
  - "постфікс (postfix — -ся/-сь added after the ending)"
  - "безособовий (impersonal — мені не спиться, хочеться)"
  - "узгодження (agreement — verb agrees with subject in gender/number)"
activity_hints:
- type: quiz
  focus: "Визначте час і вид дієслова: теперішній/минулий, доконаний/недоконаний"
  items: 10
- type: fill-in
  focus: "Поставте дієслово у правильну форму теперішнього або минулого часу"
  items: 8
- type: group-sort
  focus: "Розподіліть дієслова: I дієвідміна vs II дієвідміна"
  items: 10
- type: match-up
  focus: "З'єднайте видові пари: доконаний ↔ недоконаний (писати ↔ написати)"
  items: 8
- type: error-correction
  focus: "Знайдіть і виправте помилки у вживанні виду або часу в реченнях"
  items: 6
- type: open-writing
  focus: "Напишіть короткий текст: 'Мій вчорашній день' — чергуйте доконаний і недоконаний вид"
  items: 1
