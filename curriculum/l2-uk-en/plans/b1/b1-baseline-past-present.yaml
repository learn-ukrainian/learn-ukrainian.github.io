module: b1-001
level: B1
sequence: 1
slug: b1-baseline-past-present
version: '3.2'
title: "Минуле і теперішнє"
subtitle: "Повторення дієслівних часів з повним зануренням в українську"
focus: verb-tenses-review
pedagogy: PPP
phase: "B1.0 [Основи та опанування виду]"
word_target: 4000
objectives:
  - "Учень вміє відмінювати дієслова обох дієвідмін у теперішньому часі та пояснювати різницю між I та II дієвідміною, використовуючи українські терміни"
  - "Учень вміє правильно утворювати та вживати дієслова минулого часу, враховуючи узгодження в роді (чоловічий, жіночий, середній) та числі"
  - "Учень вміє розрізняти доконаний вид та недоконаний вид і пояснювати, як вид впливає на наявні часові форми"
  - "Учень вміє розповідати про минулі події та описувати теперішні звички, використовуючи відповідні часи та види у зв'язному українському мовленні"
dialogue_situations:
  - setting: 'Двоє друзів у Київській кав''ярні (f, Kyiv café) діляться новинами після літа — один залишився в Києві, інший подорожував: Я працював у видавництві (n, publishing house). А зараз що робиш? Пишу статтю (f, article) для журналу (m, magazine).'
    speakers:
      - Олексій
      - Дарина
    motivation: 'Повторення теперішнього та минулого часів у природній розповіді: працювати/писати'
content_outline:
  - section: "Теперішній час: дієвідміни"
    words: 800
    points:
      - "Огляд теперішнього часу (Литвінова Grade 7 p.44): Форму теперішнього часу мають лише дієслова недоконаного виду, адже дія, що відбувається зараз, не може бути завершеною. Дієслова теперішнього часу змінюються за особами та числами. Повна парадигма: 1-ша ос. — пишу/робл-ю, пишемо/робимо. 2-га ос. — пишеш/робиш, пишете/робите. 3-тя ос. — пише/робить, пишуть/роблять."
      - "Дві дієвідміни (Заболотний Grade 7 p.179): I дієвідміна: закінчення -у(-ю), -еш(-єш), -е(-є), -емо(-ємо), -ете(-єте), -уть(-ють). Приклади: писати — пишу, пишеш, пише... II дієвідміна: закінчення -у(-ю), -иш(-їш), -ить(-їть), -имо(-їмо), -ите(-їте), -ать(-ять). Приклади: робити — роблю, робиш, робить... Ключова різниця: тематичний голосний е/є (I) проти и/і (II)."
      - "Чергування приголосних у теперішньому часі: При дієвідмінюванні змінюється не лише закінчення, а й приголосний перед ним у деяких формах: сидіти — сиджу (д→дж), просити — прошу (с→ш), водити — воджу (д→дж), любити — люблю (б→бл). Ці чергування відбуваються лише в 1-й особі однини."
      - "Практика: монолог або діалог у теперішньому часі — опис типового дня, щоденних звичок, регулярних дій. Щоранку я встаю о сьомій. Снідаю, п'ю каву, йду на роботу. Увечері читаю книжку або дивлюся фільм. Учні створюють подібні тексти, використовуючи обидві дієвідміни."
  - section: "Минулий час: утворення і вживання"
    words: 800
    points:
      - "Утворення минулого часу (Литвінова Grade 7 p.40): Форму минулого часу утворюємо від основи інфінітива за допомогою суфікса -в/-л-: писа-ти → писа-в (чол.р.), писа-л-а (жін.р.), писа-л-о (сер.р.), писа-л-и (множина). Форми минулого часу мають дієслова і доконаного, і недоконаного виду: робив і зробив, грав і зіграв."
      - "Узгодження в роді та числі (Заболотний Grade 7 p.62): Дієслова минулого часу НЕ змінюються за особами — вони змінюються за родами (в однині) та числами. Я/ти/він читав. Я/ти/вона читала. Воно читало. Ми/ви/вони читали. Це принципова відмінність від теперішнього часу, де дієслова змінюються за особами."
      - "Особливі форми (Авраменко Grade 7 p.63): Деякі дієслова мають нерегулярні форми минулого часу: могти — міг, могла (без суфікса -в-). нести — ніс, несла (без суфікса -в-). вести — вів, вела. померти — помер, померла. Ці форми треба запам'ятати."
      - "Практика: переказ минулих подій — оповідання про вчорашній день, подорож, спогад з дитинства. Минулого літа ми їздили до Львова. Ходили по Старому місту, пили каву на Площі Ринок, слухали вуличних музикантів. Учні розповідають про власний минулий досвід."
  - section: "Вид дієслова: доконаний і недоконаний"
    words: 700
    points:
      - "Два види дієслова (Литвінова Grade 7 p.30): Доконаний вид (від слова доконати — виконати до кінця) — позначає завершену, обмежену в часі дію. Відповідає на питання що зробити? що зробив? що зробить? Приклади: написати, прочитати, збудувати. Недоконаний вид — позначає незавершену, тривалу дію. Відповідає на питання що робити? що робив? що робитиме? Приклади: писати, читати, будувати."
      - "Вид і час — зв'язок (Литвінова Grade 7 p.44): Дієслова недоконаного виду мають три часи: теперішній (пишу), минулий (писав), майбутній (писатиму). Дієслова доконаного виду мають лише два: минулий (написав) і майбутній (напишу). Чому? Дія, що відбувається ЗАРАЗ, не може бути завершеною — тому доконаний вид не має теперішнього часу."
      - "Видові пари — як вони утворюються: Префіксальний спосіб: писати → написати, читати → прочитати. Суфіксальний спосіб: вирішити → вирішувати, показати → показувати. Змішаний: кидати → кинути (суфікс + зміна кореня). Деякі пари суплетивні: брати → взяти, говорити → сказати."
      - "Практичне вживання виду в минулому часі: Що ти робив учора? (процес, тривалість) — Я читав книжку. Що ти зробив учора? (результат) — Я прочитав книжку. Вона писала лист дві години. (тривала дія, недок.) Вона написала лист і пішла на пошту. (завершена, док.) Вибір виду залежить від значення, а не від граматичних правил."
  - section: "Вид у розповіді: послідовність і тло"
    words: 650
    points:
      - "Аспектуальна стратегія в розповіді: Доконаний вид для послідовних завершених подій (на передньому плані): Він прокинувся, встав, одягнувся і вийшов з дому. Недоконаний вид для тла, обставин, тривалих ситуацій: Надворі йшов дощ. Було холодно. Вітер дув із заходу."
      - "Комбінування видів у зв'язному тексті: Коли я снідав (недок. — тривала дія як тло), зателефонував друг (док. — подія, що перервала тло). Я читав газету (тло), коли раптом погасло світло (подія). Ми їхали автобусом (тло), і раптом автобус зупинився (подія)."
      - "Типові помилки з видом: Вживання доконаного виду для тривалих дій: *Вчора я прочитав книжку три години. (неприродно — використовуй читав.) Вживання недоконаного виду для одноразових результативних дій: *Я вчора писав лист і відправляв його. (краще: написав і відправив.) Відчуття виду як вибору між процесом і результатом."
      - "Розширена практика: учні переписують уривок, змінюючи вид, щоб побачити, як це трансформує розповідь — одна й та сама історія як послідовність подій (доконаний) або як опис тривалої сцени (недоконаний)."
  - section: "Дієслова на -ся: зворотні дієслова в повторенні"
    words: 600
    points:
      - "Повторення зворотних дієслів: Постфікс -ся/-сь — це не лише зворотність, це українська граматична категорія з кількома значеннями: власне зворотне: митися (мити себе), одягатися (одягати себе). взаємне: зустрічатися (один одного), цілуватися. стан: радіти → радуватися, дивити → дивуватися. безособове: мені не спиться, їй хочеться."
      - "Правопис -ться і -шся (Литвінова Grade 7 p.44): Дієслова на -ться пишемо з м'яким знаком: усміхається. Дієслова на -шся пишемо без м'якого знака: усміхаєшся. Перевірка: якщо можна поставити питання що робить? — пиши -ться. Що робиш? — пиши -шся."
      - "Зворотні дієслова в теперішньому та минулому часі: Теперішній: я вчуся, ти вчишся, він/вона вчиться, ми вчимося, ви вчитеся, вони вчаться. Минулий: я вчився/вчилася, ми вчилися. Практика: діалог із зворотними дієсловами — Як ти почуваєшся? — Добре. А ти? — Я трохи хвилююся."
  - section: "Підсумок: від знання до вживання"
    words: 450
    points:
      - "Узагальнення часових форм у таблиці: Недоконаний вид: теперішній (пишу), минулий (писав), майбутній (писатиму / буду писати). Доконаний вид: минулий (написав), майбутній (напишу). Головний висновок: вид визначає доступні часи."
      - "Самоперевірка: 1. Провідміняйте дієслово бачити в теперішньому часі. 2. Утворіть форми минулого часу дієслова нести (усі роди). 3. Визначте вид: гуляв, побачив, шукала, знайшла, працювали. 4. Перекажіть свій вчорашній день, чергуючи доконаний і недоконаний вид."
      - "Попередній огляд наступного модуля: Майбутнє і вид дієслова — три способи утворення майбутнього часу в українській мові, і як вид визначає, яку конструкцію майбутнього часу використовувати."
vocabulary_hints:
  required:
    - "теперішній час (present tense)"
    - "минулий час (past tense)"
    - "дієвідміна (conjugation class — I or II)"
    - "особа (person — 1st, 2nd, 3rd)"
    - "число (number — однина, множина)"
    - "рід (gender — чоловічий, жіночий, середній)"
    - "доконаний вид (perfective aspect — completed action)"
    - "недоконаний вид (imperfective aspect — ongoing action)"
    - "інфінітив (infinitive — the base form ending in -ти/-тися)"
    - "дієвідмінювання (conjugation — changing verb by person and number)"
    - "зворотний (reflexive — verbs with -ся/-сь)"
    - "видова пара (aspectual pair — e.g., писати/написати)"
  recommended:
    - "суфікс минулого часу (past tense suffix: -в/-л-)"
    - "тематичний голосний (thematic vowel — е/є for I, и/і for II conjugation)"
    - "чергування (alternation — consonant changes in conjugation)"
    - "основа інфінітива (infinitive stem — base for past tense formation)"
    - "основа теперішнього часу (present tense stem — base for present forms)"
    - "послідовність дій (sequence of actions — perfective chain)"
    - "тло розповіді (narrative background — imperfective setting)"
    - "постфікс (postfix — -ся/-сь added after the ending)"
    - "безособовий (impersonal — мені не спиться, хочеться)"
    - "узгодження (agreement — verb agrees with subject in gender/number)"
activity_hints:
  - type: quiz
    focus: 'Визначте час і вид дієслова: теперішній/минулий, доконаний/недоконаний'
    items: 10
  - type: fill-in
    focus: 'Поставте дієслово у правильну форму теперішнього або минулого часу'
    items: 8
  - type: group-sort
    focus: 'Розподіліть дієслова: I дієвідміна проти II дієвідміни'
    items: 10
  - type: match-up
    focus: 'З''єднайте видові пари: доконаний ↔ недоконаний (писати ↔ написати)'
    items: 8
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у вживанні виду або часу в реченнях'
    items: 6
  - type: open-writing
    focus: 'Напишіть короткий текст: ''Мій вчорашній день'' — чергуйте доконаний і недоконаний вид'
    items: 6
connects_to:
  - "b1-003 (Синтаксис і відмінки — метамова як передумова)"
  - "b1-005 (Майбутнє і вид дієслова — майбутній час і вид, пряме продовження)"
  - "b1-010 (Чергування приголосних у дієсловах — поглиблює чергування приголосних у дієсловах)"
  - "b1-022 (Зворотні дієслова — розширює нюанси зворотних дієслів)"
prerequisites:
  - "Завершення рівня A2 (учень знає основи теперішнього/минулого часу)"
  - "b1-003 метамова-синтаксис-відмінки (учень вміє називати частини мови та відмінки українською)"
grammar:
  - "Теперішній час: I і II дієвідміна — повна парадигма"
  - "Чергування приголосних у 1-й особі однини (д→дж, с→ш, б→бл)"
  - "Минулий час: утворення від основи інфінітива + суфікс -в/-л-"
  - "Узгодження дієслова минулого часу в роді та числі"
  - "Вид дієслова: доконаний проти недоконаного — значення, утворення, вживання"
  - "Аспектуальна стратегія в розповіді: послідовність (док.) проти тла (недок.)"
  - "Зворотні дієслова: -ся/-сь, правопис -ться/-шся"
register: розмовний
references:
  - title: "Литвінова Grade 7, p.30-47"
    notes: "Дієслово: вид дієслова, часи дієслова, теперішній час — парадигма, мінімальна пара доконаний/недоконаний, зв'язок виду і часу."
  - title: "Заболотний Grade 7, p.54-65"
    notes: "Дієслово: вид, часи, теперішній і минулий час — утворення, тести на вид, чергування в дієвідмінюванні."
  - title: "Авраменко Grade 7, p.63-74"
    notes: "Минулий час: утворення, рід і число, нерегулярні форми, тестові завдання на вид і час."
  - title: "Заболотний Grade 7, p.179"
    notes: "Дві основи дієслова, поділ на дієвідміни — систематизований огляд."
  - title: "Захарійчук Grade 4, p.108-113"
    notes: "Змінювання дієслів за особами і числами — базові таблиці теперішнього і минулого часу для контрастивної опори."