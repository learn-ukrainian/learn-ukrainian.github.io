- b1-063 (Дієприслівниковий зворот та пунктуація)
prerequisites:
- b1-061 (Дієприслівники недоконаного виду — базове поняття дієприслівника)
grammar:
- 'Дієприслівники доконаного виду: попередня дія, різночасність'
- 'Творення: -вши (після голосного), -ши (після приголосного)'
- 'Зворотні дієприслівники: -вшись, -шись'
- 'Зіставлення: одночасність (недок.) проти різночасності (док.)'
- 'Трансформація: дієприслівник ↔ підрядне речення'
register: науково-навчальний
references:
- title: Литвінова, 7 клас, с.118-121
  notes: §21 Вид і час дієприслівників. Творення дієприслівників недоконаного й доконаного виду.
- title: Заболотний, 7 клас, с.131-135
  notes: 'Дієприслівники доконаного і недоконаного виду: порівняння, що роблячи? проти що зробивши?, вправи
    на розподіл.'
- title: Авраменко, 7 клас, с.123-126
  notes: '§55 Вид і час дієприслівників: тестові вправи, визначення суфіксів для обох видів.'
