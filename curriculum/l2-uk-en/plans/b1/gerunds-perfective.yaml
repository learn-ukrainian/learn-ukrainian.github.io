module: b1-070
level: B1
sequence: 70
slug: gerunds-perfective
version: 3.1.3
title: Дієприслівники доконаного виду
subtitle: 'Попередня дія: прочитавши, дізнавшись, повернувшись'
focus: grammar
pedagogy: PPP
phase: B1.6 [Дієприкметники та дієприслівники]
word_target: 4000
objectives:
- Учень вміє утворювати дієприслівники доконаного виду за допомогою суфіксів -вши (після голосних) та
  -ши (після приголосних) від основ дієслів доконаного виду
- 'Учень вміє виражати часову послідовність: дія дієприслівника відбувається ПЕРЕД дією основного дієслова
  (різночасність)'
- 'Учень вміє відрізняти дієприслівники недоконаного виду (одночасність: читаючи) від дієприслівників
  доконаного виду (різночасність: прочитавши)'
- Учень вміє природно вживати дієприслівники доконаного виду в зв'язному мовленні, обираючи між дієприслівником
  та підрядним реченням залежно від стилю
- Учень вміє утворювати та правильно вживати зворотні дієприслівники доконаного виду (повернувшись, дізнавшись,
  зустрівшись)
dialogue_situations:
- setting: 'Детектив переказує події в поліцейському відділку (m) — послідовність завершених дій: Увійшовши
    в кімнату, я побачив сліди (pl). Оглянувши місце, я зателефонував. Дізнавшись правду, ми діяли.'
  speakers:
  - Детектив
  - Колега
  motivation: 'Дієприслівники доконаного виду: увійшовши, оглянувши, дізнавшись — завершені попередні
    дії'
content_outline:
- section: 'Різночасність: дія до основної'
  words: 750
  points:
  - 'Основне поняття з підручника Заболотного, 7 клас, с.131: Дієприслівники доконаного виду відповідають
    на питання що зробивши? Вони виражають дію, ЗАВЕРШЕНУ ПЕРЕД основною дією: Прочитавши книгу, я віддав
    її другу. Дізнавшись новину, мати зателефонувала. Порівняння з М61 (недоконаний вид — одночасність):
    Читаючи книгу, я пив каву. (обидві дії одночасно)'
  - 'Часова логіка: Дієприслівник недок. виду: ЩО РОБЛЯЧИ? → одночасність. Дієприслівник док. виду: ЩО
    ЗРОБИВШИ? → різночасність (попередність). Ця відмінність є вирішальною: їхнє змішування змінює значення
    речення. Відчинивши двері, я побачив кота. (відчинив, потім побачив — послідовність). Відчиняючи двері,
    я побачив кота. (під час відчинення я побачив — одночасність).'
  - 'Практика: 8 пар речень для порівняння -учи/-ючи та -вши/-ши з різними часовими значеннями.'
- section: Творення дієприслівників доконаного виду
  words: 850
  points:
  - 'Творення за підручником Литвінової, 7 клас, с.118: Основа інфінітива доконаного виду: Після голосного
    + -вши: прочитати → прочитавши, написати → написавши, зробити → зробивши, побачити → побачивши, дізнатися
    → дізнавшись. Після приголосного + -ши: принести → принісши, привезти → привізши. Зверніть увагу:
    деякі форми після приголосних мають альтернативи, але краще використовувати підрядні речення.'
  - 'Зворотні дієприслівники доконаного виду: повернутися → повернувшись, зустрітися → зустрівшись, дізнатися
    → дізнавшись, прокинутися → прокинувшись, умитися → умившись, зібратися → зібравшись. Суфікс -ся перетворюється
    на -сь після голосного, і залишається -ся після приголосного.'
  - 'Дієслова, від яких складно утворити дієприслівники доконаного виду: Деякі основи на приголосний утворюють
    незграбні форми: ?знайшовши, ?випекши. Українці часто віддають перевагу підрядному реченню: після
    того як знайшов... Емпіричне правило: якщо форма звучить неприродно, використовуйте підрядне речення.'
  - 'Практика: утворити дієприслівники доконаного виду від 15 дієслів, включаючи зворотні. Позначити всі
    форми, що звучать неприродно.'
- section: Порівняння двох видів дієприслівників
  words: 750
  points:
  - 'Порівняльна таблиця: | Ознака | Недоконаний | Доконаний | | Питання | що роблячи? | що зробивши?
    | | Час | одночасність | різночасність | | Суфікси | -учи/-ючи, -ачи/-ячи | -вши, -ши | | Приклад
    | читаючи | прочитавши |'
  - 'Контекст визначає вибір: Ситуація 1: Дві одночасні дії. Снідаючи, я переглядаю новини. Ситуація 2:
    Послідовні дії. Поснідавши, я вийшов з дому. Практика: 10 контекстів, де учні обирають правильний
    вид.'
  - 'Змішане використання в абзаці: розповідь, що природно використовує обидва типи. Прокинувшись рано,
    Андрій умився й, снідаючи, переглянув пошту. Прочитавши листи, він, усміхаючись, відповів на найважливіший.
    (доконаний для послідовності, недоконаний для способу дії/одночасності).'
- section: Дієприслівник vs підрядне речення
  words: 650
  points:
  - 'Кожен дієприслівник доконаного виду має еквівалент у вигляді підрядного речення: Прочитавши книгу,
    я віддав її. = Після того як я прочитав книгу, я віддав її. = Коли я прочитав книгу, я віддав її.
    Дієприслівник є більш лаконічним; підрядне речення природніше в розмовному мовленні. Українська стилістична
    перевага: підрядні речення в розмовному стилі, дієприслівники — в діловому та художньому.'
  - 'Коли краще вживати дієприслівник: Короткі, чіткі послідовності: Повернувшись додому, я зателефонував.
    Коли дієприслівник НЕ варто вживати: Різні підмети: *Повернувшись, мама приготувала вечерю. (Хто повернувся?
    Якщо хтось інший — використовуйте підрядне речення.) Незграбні форми з основами на приголосний: краще
    підрядне речення.'
  - 'Практика: перетворити 8 речень з дієприслівникових конструкцій на підрядні й навпаки. Оцінити, який
    варіант природніший для кожного контексту.'
- section: Читання та вільне письмо
  words: 600
  points:
  - 'Текст для читання: коротка розповідь (про день із життя), де використовуються дієприслівники обох
    видів. Учні знаходять усі дієприслівники, класифікують їх за видом, перевіряють узгодження логічного
    підмета і пояснюють часовий зв''язок у кожному випадку.'
  - 'Письмо: учні пишуть коротку розповідь (5-7 речень) про свій ранковий розпорядок або нещодавній досвід,
    правильно використавши щонайменше 3 дієприслівники доконаного виду та 2 дієприслівники недоконаного
    виду.'
- section: Підсумок та перехід до модуля №63
  words: 400
  points:
  - 'Підсумок: дієприслівники док. виду = попередня дія. Суфікси: -вши (після голосного), -ши (після приголосного).
    Різночасність проти одночасності — ключова різниця з недок. видом. Самоперевірка: Я розрізняю що роблячи?
    і що зробивши? ✓/✗.'
  - 'Закріплення матеріалу: повна таблиця творення для обох видів. Недоконаний: основа 3-ої ос. мн. теперішнього
    часу + -чи (-учи/-ючи, -ачи/-ячи). Доконаний: основа інфінітива док. виду + -вши/-ши. Зворотні: -сь
    після голосного, -ся після приголосного. 10 модельних пар дієслів: читати → читаючи / прочитати →
    прочитавши.'
  - 'Анонс: модуль №63 — Дієприслівниковий зворот. Дієприслівник із залежними словами: правила пунктуації та
    стилістичне використання.'
vocabulary_hints:
  required:
  - дієприслівник доконаного виду (perfective gerund)
  - різночасність (temporal non-simultaneity — gerund before main action)
  - одночасність (simultaneity — imperfective gerund, review)
  - прочитавши (having read — perfective gerund)
  - дізнавшись (having found out — reflexive perfective gerund)
  - повернувшись (having returned — reflexive perfective gerund)
  - написавши (having written — perfective gerund)
  - побачивши (having seen — perfective gerund)
  - попередність (precedence — action completed before the main one)
  recommended:
  - зробивши (having done — perfective gerund)
  - прокинувшись (having woken up — reflexive perfective gerund)
  - умившись (having washed up — reflexive perfective gerund)
  - зустрівшись (having met — reflexive perfective gerund)
  - зібравшись (having gathered — reflexive perfective gerund)
  - принісши (having brought — consonant-stem gerund)
activity_hints:
- type: reading
  focus: Прочитати текст про різночасність (дію до основної) та дати відповіді на запитання
  items: 12
- type: essay-response
  focus: Написати 5 речень, використовуючи нову лексику з розділу «Творення дієприслівників доконаного
    виду»
  items: 12
- type: fill-in
  focus: Вставити правильну граматичну форму в реченнях на тему різночасності
  items: 12
- type: error-correction
  focus: Знайти й виправити помилки в реченнях на тему творення дієприслівників доконаного виду
  items: 12
- type: quiz
  focus: 'Обрати правильний варіант: лексика та граматика з розділу «Різночасність: дія до основної»'
  items: 12
- type: match-up
  focus: З'єднати терміни з розділу «Творення дієприслівників доконаного виду» з їхніми визначеннями
  items: 12
connects_to:
