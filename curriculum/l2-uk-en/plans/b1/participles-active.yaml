module: b1-064
level: B1
sequence: 64
slug: participles-active
version: '3.1.3'
title: 'Активні дієприкметники'
subtitle: 'Ознака за дією, яку виконує сам предмет'
focus: grammar
pedagogy: PPP
phase: 'B1.6 [Дієприкметники та дієприслівники]'
word_target: 4000
objectives:
  - 'Здобувач освіти вміє визначати дієприкметник як форму дієслова, що виражає ознаку предмета за дією, і відрізняти його від прикметника та дієслова'
  - 'Здобувач освіти вміє утворювати активні дієприкметники теперішнього часу за допомогою суфіксів -уч-/-юч- (I дієвідміна) та -ач-/-яч- (II дієвідміна)'
  - 'Здобувач освіти вміє утворювати активні дієприкметники минулого часу за допомогою суфікса -л- від дієслів доконаного виду (зів''ялий, розквітлий, посивілий)'
  - 'Здобувач освіти вміє розпізнавати, які активні дієприкметники є природними в українській мові, а які є кальками з російської (головуючий, діючий → голова, чинний)'
  - 'Здобувач освіти вміє відмінювати активні дієприкметники як прикметники, узгоджуючи їх у роді, числі та відмінку з іменником, який вони означають'
dialogue_situations:
  - setting: 'Документальний фільм про природу Карпат — опис тварин та пейзажів: Олень, що біжить через поляну. Водоспад, що падає зі скелі. Квітучі луки. Мандруючі хмари.'
    speakers:
      - Оповідач
    motivation: 'Активні дієприкметники: біжучий, падаючий, квітучий, мандруючий'
content_outline:
  - section: 'Що таке дієприкметник?'
    words: 600
    points:
      - 'Визначення за Литвіновою, 7 клас, с. 82: дієприкметник — це особлива форма дієслова, яка означає ознаку предмета за дією або станом. Поєднує ознаки дієслова (час, вид, стан) i прикметника (рід, число, відмінок). Головне розуміння: він відповідає на запитання який? яка? яке? які?, як прикметник, але походить від дієслова.'
      - 'Порівняння з прикметником і дієсловом: красивий (прикметник — постійна ознака), квітучий (дієприкметник — ознака, що виникає з дії: квітнути), квітне (дієслово — сама дія). З Заболотного, 8 клас, с. 51: «Дієприкметник виражає ознаку предмета за дією або станом: сяючий, в''янучий, розквітлий, вишитий».'
      - 'Дві основні категорії: активні (суб''єкт виконує дію: палаючий вогонь — вогонь сам палає) та пасивні (суб''єкт зазнає дії: прочитана книга — книгу хтось прочитав). Цей модуль розглядає активні; модуль №58 розглядає пасивні.'
  - section: 'Активні дієприкметники теперішнього часу (-уч-/-юч-, -ач-/-яч-)'
    words: 800
    points:
      - 'Утворення за Литвіновою, 7 клас, с. 88: I дієвідміна: основа теперішнього часу + -уч-/-юч-: синіти → синіють → синіючий, квітнути → квітнуть → квітнучий. II дієвідміна: основа теперішнього часу + -ач-/-яч-: лежати → лежать → лежачий (але див. обмеження нижче).'
      - 'КРИТИЧНО: Українські обмеження щодо активних дієприкметників теперішнього часу. За Авраменком, 11 клас, с. 58: «Активні дієприкметники виражають ознаку за дією, яку виконує сам предмет». Проте багато форм на -ущий/-ющий є російськими кальками, а не природними українськими словами. ПРИРОДНІ: квітучий, пекучий, лежачий, киплячий (лексикалізовані прикметники). НЕПРИРОДНІ (російські кальки): головуючий → голова, діючий → чинний, домінуючий → панівний, існуючий → наявний, миючий → мийний. Правило за Авраменком, 11 клас, с. 59: якщо дієприкметник можна замінити звичайним прикметником або іменником, перевага надається заміні.'
      - 'Лексикалізовані форми, які стали прикметниками: пекучий біль, киплячий чайник, лежачий камінь (під лежачий камінь вода не тече), палаючий вогонь, квітучий сад. Вони прийнятні, оскільки виражають ПОСТІЙНІ характеристики.'
      - 'Практика: 10-12 прикладів утворення активних дієприкметників теперішнього часу; здобувачі освіти визначають, які з них є природними українськими, а які слід замінити: працюючий → ? (неприродно, використовуйте той, хто працює або робітник), зростаючий → ? (зростальний або що зростає).'
  - section: 'Активні дієприкметники минулого часу (-л-)'
    words: 700
    points:
      - 'Утворення за Заболотним, 7 клас, с. 92: Основа інфінітива доконаного виду + суфікс -л-: розквітнути → розквітлий, зів''яти → зів''ялий, посивіти → посивілий, опасти → опалий, зникнути → зниклий. Вони є БІЛЬШ природними в українській мові, ніж активні дієприкметники теперішнього часу.'
      - 'Семантичний нюанс: активні дієприкметники минулого часу виражають ЗАВЕРШЕНУ зміну стану. Суб''єкт пройшов через дію і тепер носить її результат: зів''ялий листок (листок, що зів''яв — завершений процес), побілілі гори (гори, що стали білими), потерпілий (людина, яка постраждала — також використовується як юридичний іменник).'
      - 'Відмінювання: активні дієприкметники відмінюються так само, як прикметники: зів''ялий, зів''ялого, зів''ялому, зів''ялий/зів''ялого, зів''ялим, зів''ялому. Жіночий рід: зів''яла, зів''ялої... Середній рід: зів''яле, зів''ялого... Множина: зів''ялі, зів''ялих...'
      - 'Практика: утворення активних дієприкметників минулого часу від заданих дієслів та їх використання в реченнях. Наголосіть на природному використанні: опасти → опале листя, змарніти → змарнілий хлопець, зрости → зрослий попит, збанкрутіти → збанкрутіле підприємство.'
  - section: 'Чого уникати: русизми у дієприкметниках'
    words: 600
    points:
      - 'З Авраменка, 7 клас, с. 95 (вправа на редагування): «Відредагуйте та запишіть словосполучення: стоячі місця, перебуваючий за кордоном, лідируюча команда, потопаючий чоловік, пануючий клас, оточуюче середовище, блукаючий сюжет, миючий засіб, знаюча людина, бігуча дівчина, координуючий центр, підростаюче покоління, головуючий на зборах, завідуючий кафедрою». Кожне з них необхідно замінити природним українським варіантом.'
      - 'Стратегії заміни: 1. Описовий зворот: який + дієслово (людина, яка знає). 2. Іменник: головуючий → голова, завідуючий → завідувач. 3. Прикметник: діючий → чинний, існуючий → наявний, миючий → мийний, домінуючий → панівний. 4. Дієприкметник минулого часу: потопаючий → той, хто тоне (але для результату існує потонулий).'
      - 'Практика читання: короткий текст, що містить як природні, так і неприродні активні дієприкметники. Здобувачі освіти знаходять і виправляють кальки.'
  - section: 'Дієприкметник у тексті'
    words: 800
    points:
      - 'Практика читання: літературний опис природи з природним використанням дієприкметників. Приклад із Голуба: «Побілілі від снігу гори виднілися вдалині. Зів''яле листя шелестіло під ногами. Квітучий сад наповнював повітря солодким ароматом». Розуміння тексту: знайти всі дієприкметники, визначити їхній час і стан.'
      - 'Продуктивна вправа: здобувачі освіти пишуть короткий опис природи (5-6 речень), використовуючи щонайменше 4 активні дієприкметники (як теперішнього, так і минулого часу). Обмеження: усі дієприкметники мають бути природними для української мови.'
      - 'Регістрова обізнаність: активні дієприкметники більш поширені в художньому та науковому стилях. У розмовному стилі українці віддають перевагу описовим зворотам: не «квітучий сад», а «сад, що квітне» у повсякденному мовленні.'
      - 'Контрастивний аналіз: порівняння активних дієприкметників із синонімічними конструкціями в контексті. Покажіть, як одна й та сама думка висловлюється по-різному в різних регістрах: квітучий сад (художній) → сад, що квітне (розмовний) → сад у цвіту (нейтральний). Здобувачі освіти добирають до 6 дієприкметникових конструкцій відповідники, доречні для певного регістра.'
  - section: 'Підсумок та перехід до модуля №58'
    words: 500
    points:
      - 'Підсумок: дієприкметник = ознака за дією. Активні = суб''єкт діє сам. Теперішній час: -уч-/-юч-, -ач-/-яч- (обережно з русизмами!). Минулий час: -л- (більш природні для української). Самоперевірка: Я можу утворити активні дієприкметники ✓/✗, Я розрізняю природні й неприродні форми ✓/✗.'
      - 'Узагальнювальна таблиця: підсумок творення з усіма групами суфіксів, базовими умовами та 2-3 типовими прикладами для кожної. Активні теперішнього: -уч-/-юч- (I дієвідміна, квітнути → квітнучий), -ач-/-яч- (II дієвідміна, лежати → лежачий). Активні минулого: -л- (зів''яти → зів''ялий, розквітнути → розквітлий). Короткий довідковий список природних варіантів проти кальок.'
      - 'Анонс: модуль №58 — Пасивні дієприкметники. Інший бік: ознака за дією, якої зазнає предмет: прочитана книга, збудований міст. Вони набагато продуктивніші й природніші в українській мові.'
vocabulary_hints:
  required:
    - "дієприкметник (participle — verb form expressing attribute by action)"
    - "активний дієприкметник (active participle — subject performs the action)"
    - "пасивний дієприкметник (passive participle — subject receives the action)"
    - "квітучий (blooming — natural active participle)"
    - "палаючий (blazing — natural active participle)"
    - "зів'ялий (wilted — past active participle)"
    - "розквітлий (blossomed — past active participle)"
    - "опалий (fallen, shed — past active participle, leaves)"
    - "зниклий (disappeared — past active participle)"
    - "посивілий (gone grey — past active participle)"
    - "чинний (current, valid — replaces Russian calque діючий)"
    - "наявний (existing, available — replaces Russian calque існуючий)"
    - "описовий зворот (descriptive phrase — alternative to participle)"
  recommended:
    - "пекучий (burning, scorching — lexicalized active participle)"
    - "киплячий (boiling — lexicalized active participle)"
    - "лежачий (lying — lexicalized, as in лежачий камінь)"
    - "потерпілий (victim — past active participle used as noun)"
    - "збанкрутілий (bankrupt — past active participle)"
    - "змарнілий (emaciated — past active participle)"
    - "панівний (dominant — replaces Russian calque домінуючий)"
    - "мийний (washing/cleaning — replaces Russian calque миючий)"
    - "завідувач (head/manager — replaces Russian calque завідуючий)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про те, що таке дієприкметник, і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Активні дієприкметники теперішнього часу».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему дієприкметників.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему активних дієприкметників теперішнього часу.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Що таке дієприкметник?»'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Активні дієприкметники теперішнього часу» з їхніми визначеннями.'
connects_to:
  - 'b1-058 (Пасивні дієприкметники — passive participles)'
  - 'b1-059 (Дієприкметниковий зворот — participle phrases)'
  - 'b1-023 (Пасивний стан — вступ до пасивного стану)'
prerequisites:
  - 'b1-056 (Контрольна робота 6 — завершення Фази 6)'
grammar:
  - 'Дієприкметник: визначення, ознаки дієслова і прикметника'
  - 'Активні дієприкметники теперішнього часу: -уч-/-юч- (I), -ач-/-яч- (II)'
  - 'Активні дієприкметники минулого часу: -л- (від дієслів доконаного виду)'
  - 'Відмінювання дієприкметників як прикметників'
  - 'Російські кальки: розпізнавання та природні українські відповідники'
register: науково-навчальний
references:
  - title: 'Литвінова Grade 7, p.82-89'
    notes: 'Розділ «Дієприкметник»: визначення, класифікація активні/пасивні, таблиця творення із суфіксами, вправи на розрізнення типів.'
  - title: 'Заболотний Grade 7, p.92-96'
    notes: '§25 Творення та відмінювання активних дієприкметників: суфіксальний спосіб, суфікси -уч-/-юч-, -ач-/-яч-, -л- з діаграмами творення.'
  - title: 'Авраменко Grade 7, p.95-98'
    notes: '§42 Активні й пасивні дієприкметники: вправа на редагування із заміною російських кальок, тестові завдання, правила творення.'
  - title: 'Авраменко Grade 11, p.58-59'
    notes: '§18 Морфологічна норма: обмеження щодо активних дієприкметників в українській мові, стратегії заміни російських кальок.'
  - title: 'Заболотний Grade 8, p.51'
    notes: 'Визначення дієприкметника, класифікація на активні/пасивні.'
