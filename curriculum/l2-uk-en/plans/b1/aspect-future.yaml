content_outline:
- section: Діагностичний тест (Diagnostic Test)
  words: 600
  points:
  - Діагностика розуміння різниці між доконаним і недоконаним видом у контексті майбутнього часу — перевірка здатності розрізняти
    процес та результат.
  - 'Аналіз типової помилки: вживання допоміжного дієслова «буду» з інфінітивом доконаного виду (наприклад, неправильне «я
    буду прочитати» замість «я буду читати» або «прочитаю»).'
  - Перевірка розуміння концепції «Perfective Non-Past = Future» — як студенти сприймають форми теперішнього часу доконаного
    виду в значенні майбутнього.
- section: Граматичне пояснення (Grammar Explanation)
  words: 1000
  points:
  - 'Аналітична (складена) форма майбутнього часу: структура «буду» + інфінітив недоконаного виду; детальне застереження щодо
    недопустимості змішування видів.'
  - 'Синтетична форма на -тиму, -тимеш, -тиме: представлення як повноправного сучасного стандарту згідно з §4.2.3.1, а не
    лише як застарілого літературного варіанту.'
  - 'Простий майбутній час (доконаний вид): пояснення зміни концепції для англомовних — чому форма «зроблю» не є теперішнім
    часом, попри закінчення.'
  - 'Стилістичний баланс: рекомендації щодо вибору між аналітичною та синтетичною формами для уникнення надмірного вживання
    конструкції «буду робити».'
- section: Культурний та етнолінгвістичний контекст (Cultural & Ethnolinguistic Context)
  words: 800
  points:
  - Аналіз прислів'я «Не кажи гоп, поки не перескочиш» — українська ментальність щодо планів на майбутнє та обережності в
    обіцянках.
  - 'Забобони та мовні ритуали: вивчення фраз «Сплюнь і постучи по дереву» як засобів захисту від «зурочення» запланованого
    успіху.'
  - 'Традиції перед дорогою: обговорення забобону про повернення додому та ритуалу погляду в дзеркало для «перезавантаження»
    удачі плану.'
- section: Практика та корекція помилок (Practice & Error Correction)
  words: 1000
  points:
  - Вправи на трансформацію аналітичної форми в синтетичну (наприклад, «буду боротися» -> «боротимуся») для досягнення природності
    мовлення.
  - Виправлення помилки вживання доконаного виду в значенні поточного моменту (наприклад, чому не можна сказати «я зроблю
    зараз», коли дія вже триває).
  - 'Дрилінг парадигм відмінювання згідно з Державним стандартом 2024: відпрацювання форм «скажу», «закричите», «поборють».'
  - 'Сценарії вибору форми залежно від регістра: офіційні плани (мати намір) проти дружніх зборів (збиратися).'
- section: Продукція та підсумок (Production & Summary)
  words: 600
  points:
  - 'Рольова гра «Новорічні обіцянки»: вживання доконаного виду майбутнього часу з дієсловом «обіцяти» для висловлення зобов''язання
    досягти результату.'
  - 'Складання планів на відпустку: активне використання «сподіватися» та «гадати» (suppose) у розмовному контексті.'
  - 'Підсумкова порівняльна таблиця: фіксація трьох способів вираження майбутнього з акцентом на їхніх стилістичних та видових
    відмінностях.'
vocabulary_hints:
  required:
  - майбутній час (future tense) — у майбутньому, світле майбутнє; High frequency
  - складена форма (compound form) — буду писати; термін згідно з §4.2.3.1
  - синтетична форма (synthetic form) — писатиму; повноправна альтернатива складеній
  - простий майбутній час (simple future) — напишу; форма теперішнього часу доконаного виду
  - збиратися (to be going to) — збиратися зробити, збиратися в дорогу; High frequency spoken
  - мати намір (to intend) — мати серйозний намір, мати намір вступити; Medium frequency formal
  - сподіватися (to hope) — сподіватися на краще, сподіватися, що...; High frequency general
  - обіцяти (to promise) — обіцяти виконати, обіцяти підтримку; вживається з доконаним видом для результату
  recommended:
  - планувати (to plan) — планувати відпустку, планувати зустріч; Medium frequency general
  - гадати (to think/suppose) — гадати, що...; Medium frequency spoken/informal
  - завтра (tomorrow) — завтра вранці, завтра пообіді
  - через (in - time) — через тиждень, через місяць, через рік
  - потім (then/later) — а потім, згодом, пізніше
  - скоро (soon) — зовсім скоро, незабаром
