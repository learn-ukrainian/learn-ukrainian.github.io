  - 'Складні чергування: [зд]->[ждж], [ст]->[шч(щ)]'
  - 'Чергування задньоязикових у дієсловах: [г]->[ж], [к]->[ч], [х]->[ш]'
  - 'Поява [л''] після губних: [б]->[бл''], [п]->[пл''], [в]->[вл''], [м]->[мл'']'
  - 'Чергування при творенні форм недоконаного виду за допомогою суфіксів -ати/-увати'
