module: b1-015
level: B1
sequence: 15
slug: alternation-consonants-verbs
version: '3.0.2'
title: "Чергування приголосних (дієслова)"
subtitle: "Сидіти — сиджу, плакати — плачу: приголосні в дієсловах"
focus: grammar
pedagogy: PPP
phase: "B1.1 [Морфонологія]"
word_target: 4000
objectives:
  - 'Здобувач навчиться передбачати та утворювати чергування приголосних у формі 1-ї особи однини дієслів ІІ дієвідміни: [д]->[дж], [т]->[ч], [з]->[ж], [с]->[ш], [ст]->[шч(щ)] (водити — воджу, крутити — кручу, носити — ношу)'
  - 'Здобувач навчиться передбачати чергування приголосних при творенні дієслів недоконаного виду за допомогою суфіксів -ати/-увати: зарядити — заряджати, погасити — погашати'
  - 'Здобувач навчиться утворювати чергування "губний + [л]" у формі 1-ї особи однини: робити — роблю, купити — куплю, ловити — ловлю'
  - 'Здобувач навчиться правильно дієвідмінювати поширені дієслова ІІ дієвідміни в усіх особах, розуміючи, що чергування відбувається ЛИШЕ у формі 1-ї особи однини'
dialogue_situations:
  - setting: 'Кулінарне шоу на українському телебаченні — ведучий коментує дії, використовуючи чергування приголосних: Я ходжу (д→дж) по кухні. Він просить (с→с), але: прошу (с→ш). Вона возить (з→з), але: я вожу (з→ж).'
    speakers:
      - Ведучий
      - Учасники змагання
    motivation: 'Чергування приголосних у дієсловах: ходити→ходжу, просити→прошу, возити→вожу'
content_outline:
  - section: "Від іменників до дієслів"
    words: 500
    points:
      - 'Зв''язок із M09 (чергування в іменниках): ті самі приголосні [г/к/х], що чергуються в іменниках, чергуються і в дієсловах, але причини тут інші. В іменниках це відмінкові закінчення. У дієсловах — дієвідмінювання (особливо 1-ша особа однини). Заболотний (7 клас, с.52): "Закономірними для української мови стали чергування приголосних звуків, що відбулися перед давнім суфіксом j."'
      - 'Чому саме 1-ша особа однини? Історично закінчення -у/-ю для 1-ї особи містило звук [й], який викликав палаталізацію попереднього приголосного. Саме тому чергування з''являється ЛИШЕ у формах на "я", а не у формах на "ти" чи "він". Сучасний результат: сидіти — сиджу (я), сидиш (ти), сидить (він).'
      - 'Огляд трьох груп чергувань у цьому модулі: 1. Задньоязикові: [г]->[ж], [к]->[ч], [х]->[ш] (так само як в іменниках) 2. Зубні/свистячі: [д]->[дж], [т]->[ч], [з]->[ж], [с]->[ш] 3. Губні + [л]: [б]->[бл], [п]->[пл], [в]->[вл], [м]->[мл], [ф]->[фл]'
  - section: "Чергування зубних і свистячих: [д]->[дж], [т]->[ч], [з]->[ж], [с]->[ш]"
    words: 800
    points:
      - 'За Глазовою (10 клас, с.107): [д] -> [дж]: водити — воджу, сидіти — сиджу, ходити — ходжу, родити — роджу, будити — буджу, садити — саджу. [т] -> [ч]: крутити — кручу, летіти — лечу, світити — свічу, платити — плачу (увага: плакати — плачу — це [к]->[ч], інше чергування!). [з] -> [ж]: возити — вожу, морозити — морожу, гасити — гашу. [с] -> [ш]: носити — ношу, просити — прошу, косити — кошу, місити — мішу.'
      - 'Складні чергування: [зд] -> [ждж]: їздити — їжджу, бороздити — борожджу. [ст] -> [шч] (на письмі щ): мостити — мощу, простити — прощу, чистити — чищу, пустити — пущу. Вони є логічним продовженням базових чергувань.'
      - 'Практика дієвідмінювання: здобувачі відмінюють 8-10 поширених дієслів у теперішньому часі для всіх осіб. Ключове розуміння: чергування стосується ЛИШЕ форми "я". Порівняйте: я воджу, ти водиш, він водить, ми водимо, ви водите, вони водять. Модель: чергування в 1-й особі однини, базовий приголосний у всіх інших.'
      - 'Типові помилки: плутання [д]->[дж] з [д]->[ж] (правильне чергування — [д]->[дж] з африкатою, а не просто [ж]). Написання *сижу замість сиджу. Звук "дж" — це один звук, що позначається сполученням літер.'
  - section: "Чергування задньоязикових у дієсловах: [г]->[ж], [к]->[ч], [х]->[ш]"
    words: 600
    points:
      - 'Ті самі приголосні, що в іменниках, переходять у ті самі звуки: [к] -> [ч]: плакати — плачу, тикати — тичу, пекти — печу. [г] -> [ж]: могти — можу, берегти — бережу, стригти — стрижу. [х] -> [ш]: колихати — колишу, махати — машу. Ці дієслова належать до І дієвідміни (на відміну від групи зубних вище).'
      - 'Порівняння з чергуваннями в іменниках із М09: Іменник: друг -> друже (кличний) — те саме [г]->[ж]. Дієслово: берегти -> бережу (1-ша особа одн.) — те саме [г]->[ж]. Зміна приголосного ідентична; різниця лише у тригері (відмінкове закінчення проти особового закінчення дієслова).'
      - 'Практика: здобувачі визначають, чи певне чергування ([г]->[ж], [к]->[ч]) стосується іменникового, чи дієслівного контексту, що зміцнює розуміння спільної фонологічної системи.'
  - section: "Чергування губних + [л]: робити — роблю"
    words: 600
    points:
      - 'За Заболотним (7 клас, с.52): [б] -> [бл'']: робити — роблю, любити — люблю, губити — гублю. [п] -> [пл'']: ліпити — ліплю, купити — куплю, сипати — сиплю. [в] -> [вл'']: ловити — ловлю, ставити — ставлю, правити — правлю. [м] -> [мл'']: дрімати — дрімлю, ломити — ломлю. [ф] -> [фл'']: графити — графлю (рідко).'
      - 'Це чергування є унікальним: замість заміни приголосного воно ДОДАЄ звук [л''] після губного. Губний приголосний залишається, але отримує сонорного "партнера". Саме тому це впливає лише на 1-шу особу однини — історичний [й] спричинив вставку [л''].'
      - 'Практика: здобувачі відмінюють поширені дієслова з губними основами в усіх особах, переконуючись, що [л''] з''являється лише у формі "я": я ловлю, ти ловиш, він ловить, ми ловимо...'
  - section: "Чергування при утворенні недоконаних дієслів"
    words: 550
    points:
      - 'За Глазовою (10 клас, с.107): При утворенні дієслів недоконаного виду за допомогою суфіксів -ати/-увати від основ доконаного виду застосовуються ті самі чергування: [д] -> [дж]: зарядити — заряджати, засудити — засуджувати. [з] -> [ж]: знизити — знижати, знижувати. [с] -> [ш]: погасити — погашати, погашувати. [т] -> [ч]: скоротити — скорочувати, збагатити — збагачувати.'
      - 'Чому це важливо для словотворення: Коли здобувачі зустрічають незнайоме дієслово недоконаного виду з [ж], [ч], [ш] або [дж] у корені, вони можуть відновити основу доконаного виду: прощати <- простити ([ст]->[шч(щ)]). Це потужна стратегія декодування для читання.'
      - 'Практика: маючи дієслова доконаного виду, здобувачі утворюють форму недоконаного виду із суфіксами -ати/-увати, застосовуючи правильне чергування приголосних.'
  - section: "Повна парадигма: від інфінітива до всіх форм"
    words: 550
    points:
      - 'Підсумовуємо все разом: повне дієвідмінювання типових дієслів, що демонструє, де відбувається і де не відбувається чергування. водити: воджу, водиш, водить, водимо, водите, водять; водив, водила, водило, водили; водитиму; водь! водіть! Чергування ЛИШЕ в теперішньому часі, у формі 1-ї особи однини.'
      - 'Контраст із наказовим способом: У наказовому способі немає чергувань приголосних: носи! просіть! сидь! (не *нош!, *прош!, *сидж!). Це підтверджує, що чергування специфічне лише для контексту 1-ї особи теперішнього/майбутнього часу.'
      - 'Блок-схема для ухвалення рішень: 1. Дієслово належить до ІІ дієвідміни? -> перевірити наявність [д/т/з/с/б/п/в/м]. 2. Це 1-ша особа однини? -> застосувати чергування. 3. Це будь-яка інша форма? -> використати базовий приголосний. 4. Утворюєте форму недоконаного виду на -ати/-увати? -> застосувати чергування.'
  - section: "Підсумок: таблиця дієслівних чергувань"
    words: 400
    points:
      - 'Повна довідкова таблиця: | Основа | Чергування | Приклади | | [д] | [дж] | водити-воджу, сидіти-сиджу | | [т] | [ч] | крутити-кручу, летіти-лечу | | [з] | [ж] | возити-вожу, морозити-морожу | | [с] | [ш] | носити-ношу, просити-прошу | | [зд]| [ждж]| їздити-їжджу | | [ст]| [шч(щ)]| простити-прощу, чистити-чищу | | [б] | [бл''] | робити-роблю, любити-люблю | | [п] | [пл''] | купити-куплю, ліпити-ліплю | | [в] | [вл''] | ловити-ловлю, ставити-ставлю | | [м] | [мл''] | ломити-ломлю |'
      - 'Самоперевірка: Дайте відповіді на запитання: 1. Яке чергування відбувається у формі "я сиджу"? 2. Чому в дієслові "роблю" з''являється звук [л'']? 3. Провідмінюйте дієслово "просити" в теперішньому часі. 4. Утворіть недоконаний вид: простити, зарядити, знизити.'
      - 'Анонс: Спрощення приголосних (M11) — коли скупчення приголосних спрощується через повне випадання звука.'
vocabulary_hints:
  required:
    - "чергування (alternation — systematic sound change)"
    - "дієслово (verb)"
    - "дієвідміна (conjugation class — verb classification)"
    - "особа (grammatical person — я/ти/він)"
    - "теперішній час (present tense)"
    - "інфінітив (infinitive — base verb form)"
    - "зубний (dental — consonant formed at the teeth: д, т)"
    - "свистячий (sibilant — whistling consonant: з, с, ц, дз)"
    - "губний (labial — consonant formed with lips: б, п, в, м, ф)"
    - "задньоязиковий (velar — consonant formed at back of mouth: г, к, х)"
    - "доконаний вид (perfective aspect)"
    - "недоконаний вид (imperfective aspect)"
    - "парадигма (paradigm — full set of inflected forms)"
    - "палаталізація (palatalization — softening of consonant)"
  recommended:
    - "африката (affricate — compound sound: дж, дз)"
    - "наказовий спосіб (imperative mood)"
    - "провідмінювати (to conjugate/decline through all forms)"
    - "основа (stem — word minus its ending)"
    - "суфікс (suffix)"
    - "словотворення (word formation)"
    - "продуктивний (productive — applicable to new words)"
    - "вимова (pronunciation)"
    - "закономірність (regularity — systematic pattern)"
activity_hints:
  - type: fill-in
    focus: 'Напишіть правильну форму 1-ї особи однини дієслів ІІ дієвідміни (наприклад: сидіти -> я сидж___, носити -> я нош___)'
    items: 10
  - type: quiz
    focus: 'Визначте, який тип чергування застосовується до дієслова: зубний, задньоязиковий чи губний + [л]'
    items: 8
  - type: match-up
    focus: 'З''єднайте форми інфінітива з їхніми формами 1-ї особи однини (наприклад: водити <-> воджу, купити <-> куплю)'
    items: 10
  - type: group-sort
    focus: 'Розподіліть дієслова за типом чергування: [д]->[дж], [т]->[ч], [з]->[ж], [с]->[ш], губний+[л]'
    items: 10
  - type: fill-in
    focus: 'Утворіть дієслова недоконаного виду за допомогою суфіксів -ати/-увати від основ доконаного виду (наприклад: простити -> прощ___ти, знизити -> знижув___ти)'
    items: 6
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у дієвідмінюванні в реченнях (наприклад: *я сижу -> я сиджу, *я робю -> я роблю)'
    items: 6
