module: b1-62
level: B1
sequence: 62
slug: environment-ecology
version: '2.0'
title: Довкілля та екологія
subtitle: Environment & Ecology
content_outline:
- section: Вступ
  points:
  - 'Why ecology matters in Ukraine — cultural hook: modern «еко-свідомість» and innovation
    like Rekava (coffee grounds cups)'
  - 'Core environmental concepts — learner error: distinguishing «довкілля» (general)
    vs «навколишнє середовище» (official/bureaucratic)'
  - Vocabulary overview — focus on collocations like «захист довкілля» and «стан довкілля»
- section: Читання
  points:
  - 'Environmental texts — cultural hook: Carpathians as «lungs of Europe» and the
    threat of «вирубка лісів»'
  - 'Ecological challenges in Ukraine — specific stat: landfills occupy ~7% of territory
    (size of Denmark), recycling only ~3%'
- section: Діалоги
  points:
  - 'Discuss ecological issues — grammar integration: explaining causes with «тому
    що», «через те що», «бо»'
  - 'Propose solutions — focus on practical actions: «сортування сміття» and «вторинна
    переробка» (not «ресайклінг»)'
vocabulary_hints:
  required:
  - 'довкілля (environment) — collocations: захист довкілля, стан довкілля, шкода
    довкіллю'
  - 'природа (nature) — context: wild nature vs. human environment'
  - 'забруднення (pollution) — grammar: + Genitive (забруднення повітря, води, ґрунту)'
  - 'клімат (climate) — collocations: зміна клімату, м''який клімат'
  - 'екологія (ecology) — cultural context: popular science vs. academic discipline'
  - 'захист (protection) — collocations: захист довкілля, захист тварин'
  - 'переробка (recycling) — usage: preferred over anglicism «ресайклінг» (or «вторинна
    переробка»)'
  - 'відходи (waste) — collocations: переробка відходів, сортування відходів, побутові
    відходи'
  recommended:
  - 'глобальне потепління (global warming) — collocations: боротьба з глобальним потеплінням,
    наслідки потепління'
  - 'викиди (emissions) — context: industrial pollution, car exhaust'
  - 'відновлювана енергія (renewable energy) — context: solar, wind power trends in
    Ukraine'
  - 'екосистема (ecosystem) — collocations: крихка екосистема, збереження екосистеми;
    example: Lake Synevyr'
activity_hints:
- type: match-up
  focus: Environmental noun phrases
  items: 25
