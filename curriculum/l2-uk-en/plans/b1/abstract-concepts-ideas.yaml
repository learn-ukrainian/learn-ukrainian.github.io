module: b1-52
level: B1
sequence: 52
slug: abstract-concepts-ideas
version: '2.0'
title: 'Абстрактні концепції: ідеї та думки'
subtitle: 'Abstract Concepts: Ideas and Thoughts'
content_outline:
- section: Вступ
  points:
  - Why abstract words matter — transition from concrete A1/A2 descriptions to B1
    intellectual expression
  - Beyond concrete nouns — ability to discuss concepts like 'justice', 'truth', 'theory'
    rather than just objects
  - 'Intellectual discourse — syntactic padding: «Я вважаю, що...», «На мою думку...»,
    «Мені здається, що...»'
- section: Вивчення слів
  points:
  - 'ідея, думка, аргумент, рішення — core distinction: ідея (creative concept) vs
    думка (opinion/process); learner error: ідея used for opinion'
  - 'Six vocabulary groups — grouping by function: mental products (ідея), beliefs
    (переконання), frameworks (теорія), values (цінність)'
  - 'Collocations and usage — learner error: аргумент (logical reason) vs суперечка
    (quarrel/dispute); false friend alert'
- section: Вживання
  points:
  - 'Collocations patterns — high freq: «втілювати ідею в життя», «думки розбігаються»,
    «на перший погляд», «дотримуватися принципів»'
  - 'Register considerations — погляд vs вигляд: learner error confusing opinion (погляд)
    with appearance (вигляд)'
  - 'Cultural aspects — cultural hook: Hryhorii Skovoroda''s «сродна праця» (congenial
    work) as a core value; Shevchenko''s personification of «Думи мої...»'
- section: Читання
  points:
  - 'News article, academic text, blog — contrast styles: opinion piece (blog) vs
    objective analysis (news) vs theoretical framework (academic)'
  - Three registers demonstrated — use «концепція/теорія» in academic context vs «думка/погляд»
    in blog
- section: Діалоги
  points:
  - Work meeting (formal) — proposing a «нова концепція» or «стратегічне бачення»
  - News discussion (informal) — expressing «власна думка» about social issues
  - Friend advice, university seminar — contrasting «на мою думку» (advice) with «теоретично
    обґрунтувати» (seminar)
- section: Підсумок
  points:
  - Key vocabulary recap — summary of 8 core abstract terms and their primary collocations
  - Practice recommendations — using «Я вважаю...» templates for daily journaling
vocabulary_hints:
  required:
  - ідея (idea) — головна/основна ідея, блискуча ідея, висувати ідею, втілювати ідею
    в життя, нав'язлива ідея
  - думка (thought/opinion) — власна думка, на мою думку, висловлювати думку, думки
    розбігаються, громадська думка
  - концепція (concept) — нова концепція, розробити концепцію, концепція розвитку,
    авторська концепція
  - теорія (theory) — теорія ймовірності, теорія змови, підтвердити/спростувати теорію,
    теоретично обґрунтувати
  - погляд (view) — на перший погляд, поділяти погляди, власний погляд на (щось),
    з точки зору
  - переконання (belief/conviction) — глибоке переконання, власні переконання, діяти
    згідно з переконаннями
  - цінність (value) — культурні цінності, сімейні цінності, матеріальні/духовні цінності,
    система цінностей
  - принцип (principle) — піти на принцип, принцип дії, з принципу, порушити принцип,
    дотримуватися принципів
  recommended:
  - гіпотеза (hypothesis) — висунути гіпотезу, підтвердити гіпотезу
  - істина (truth) — шукати істину, гірка істина
  - справедливість (justice) — відновлення справедливості, почуття справедливості
  - ідеал (ideal) — прагнути ідеалу, високі ідеали
