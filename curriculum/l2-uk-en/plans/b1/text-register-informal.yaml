module: b1-085
level: B1
sequence: 85
slug: text-register-informal
version: '3.1.3'
title: "Розмовний стиль"
subtitle: "Розмовне мовлення: побутова мова, діалоги, емоційна лексика"
focus: grammar
pedagogy: PPP
phase: "B1.8 [Текст і регістр]"
word_target: 4000
objectives:
  - "Студент вміє визначати та описувати ключові характеристики розмовного стилю (невимушеність, емоційність, неповні конструкції, прості речення, фразеологізми), використовуючи українську метамову"
  - "Студент вміє розрізняти розмовний стиль від офіційно-ділового, наукового та публіцистичного стилів за допомогою конкретних мовних маркерів"
  - "Студент вміє використовувати відповідну розмовну лексику, фразеологізми та емоційно забарвлені слова в повсякденних українських розмовах"
  - "Студент вміє створювати природні українські діалоги на побутові теми, використовуючи розмовні конструкції, вигуки та частки"
  - "Студент вміє розпізнавати та уникати елементів суржику, зберігаючи при цьому справжній розмовний стиль — відрізняючи природну українську розмовну мову від російськомовних вкраплень"
dialogue_situations:
  - setting: 'Спільний чат друзів, які планують вечірку — невимушена українська: Йо! Будеш сьогодні? Та ясно! Треба взяти щось попоїсти. Лан, я захоплю піцу. Норм, давай!'
    speakers:
      - Компанія друзів (group chat)
    motivation: 'Неформальний регістр: скорочення, сленг, розмовні форми — йо, лан, норм'
content_outline:
  - section: "Що таке розмовний стиль?"
    words: 700
    points:
      - "Визначення за Заболотним (7 клас, с. 234): Розмовне мовлення є найдавнішим стилем будь-якої мови. Ним користуються здебільшого в побуті, але часто i в навчальній, науковій, виробничій, культурній та інших сферах життя. Широко представлене в публіцистиці та художній літературі."
      - "Ключові характеристики розмовного стилю: Невимушеність, емоційність, непідготовленість, діалогічність. Мовні засоби: прості речення, неповні речення, вигуки, частки, фразеологізми, зменшувально-пестливі форми."
      - "Контраст з офіційно-діловим стилем (з модуля №77): Та сама інформація у двох регістрах — студенти аналізують специфічні лексичні та структурні відмінності. Приклад: «Доводжу до вашого відома, що засідання перенесено» (офіційний) проти «Слухай, збори відклали» (розмовний). Контраст поглиблює розуміння обох регістрів."
      - "Культурна довідка: розмовний стиль як жива душа мови. Саме тут живе українська творчість, гумор і тепло. Прислів'я, приказки, фразеологізми — найбагатший пласт української мови знаходиться саме в її розмовному регістрі."
      - "Розрізнення регістрів за Державним стандартом 2024 §4.5.1, застосоване до розмовного: студенти визначають специфічні лексичні маркери (побутова лексика, емоційні вигуки) та синтаксичні маркери (неповні речення, вільний порядок слів), які відрізняють розмовний стиль від офіційно-ділового. Порівняльний аналіз одного й того ж повідомлення в обох регістрах."
  - section: "Лексика розмовного стилю"
    words: 800
    points:
      - "Емоційно забарвлена лексика — слова, що несуть емоційний заряд: Позитивні: чудовий, файний, гарнесенький, любенький. Негативні: бридкий, огидний, нікчемний, нахабний. Нейтральні слова набувають емоційного забарвлення через контекст та інтонацію."
      - "Зменшувально-пестливі форми: хлібчик, водичка, сонечко, донечка, братик, сестричка. Моделі творення: -чик/-чок, -ик, -очк-/-ечк-, -еньк-/-оньк-. Ці форми не просто означають «маленький» — вони виражають тепло, ласку, іронію чи навіть зневагу залежно від контексту."
      - "Фразеологізми в повсякденному мовленні: битися як риба об лід, брати бика за роги, ні пуху ні пера, як мед, водити за ніс. Практика: студенти поєднують фразеологізми з їхніми значеннями та використовують їх у контексті."
      - "Вигуки та частки: Вигуки: ой, ох, ух, ого, гей, овва, ну, отож. Частки: ж, бо, хіба, невже, та, ну. Ці слова мають величезну комунікативну вагу в українській мові і не мають прямих англійських відповідників."
      - "Прислів'я та приказки у щоденному спілкуванні: «Без труда нема плода,» «Краще синиця в руках, ніж журавель у небі,» «Що посієш, те й пожнеш,» «Хто рано встає, тому Бог дає.» Це не архаїзми — українці постійно використовують їх у невимушеній розмові. Практика: студенти добирають прислів'я до ситуацій, де б вони використовувалися."
  - section: "Граматика розмовного мовлення"
    words: 650
    points:
      - "Неповні речення: «— Куди? — Додому.» (повне: Куди ти йдеш? — Я йду додому.) «— Чого? — Та нічого.» Контекст заповнює прогалини. У розмовному стилі неповні речення є природними та очікуваними, тоді як в офіційному стилі вони були б помилками."
      - "Порядок слів — вільніший у розмовному стилі: Нейтральний: «Я вчора купила книжку.» Розмовний акцент: «Книжку я вчора купила!» (об'єкт на початку) «Вчора купила книжку я!» (суб'єкт у кінці — наголос на тому, хто). Інтонація визначає значення більше, ніж порядок слів."
      - "Вставні слова в розмовному мовленні (анонс модуль №81): знаєш, слухай, уяви собі, бачиш, розумієш — вони функціонують як маркери дискурсу, підтримуючи потік діалогу. Практика: студенти визначають маркери дискурсу в діалогах."
      - "Поширені розмовні конструкції: «А що як...», «Хіба що...», «Та ну його!», «Отакої!». Практика: студенти доповнюють діалоги, використовуючи природні конструкції."
  - section: "Суржик vs справжня розмовна мова"
    words: 700
    points:
      - "Визначення суржику: несвідоме змішування слів різних мов i властивих різним мовам мовних форм (за Заболотним, 8 клас, с. 217). Суржик — це НЕ розмовний стиль, це забруднення мови. Розмовна українська має власні багаті, автентичні розмовні форми."
      - "Поширені маркери суржику та їхні українські замінники: шо → що, чого (суржик → українська) короче → коротше кажучи, ну от конечно → звісно, звичайно получається → виходить іменно → саме Практика: студенти розпізнають суржик у діалогах і замінюють його на справжню українську розмовну лексику."
      - "Аспект деколонізації: українська розмовна мова — це не «ламана мова». Вона має власну граматику, лексику та логіку. Зневажливе ставлення до розмовної української як до «несправжньої української» є колоніальною установкою. Мета — чиста розмовна мова: невимушена, але українська."
      - "Практика читання: дві версії одного й того ж діалогу — одна із суржиком, інша зі справжньою розмовною українською. Студенти аналізують відмінності та розуміють, чому автентична розмовна мова є важливою."
      - "Регіональна розмовна лексика: файний (Західна Україна), цікавий (Центральна), гарний (універсальний). Українські діалекти збагачують розмовний стиль, не будучи суржиком. Студенти вчаться розпізнавати регіональний колорит як природне розмаїття, а не як помилку."
  - section: "Діалоги на побутові теми"
    words: 650
    points:
      - "Діалог 1 — На кухні: Розмова про приготування їжі з використанням кулінарної лексики, пестливих форм (картоплинка, цибулинка, олійка) та розмовних конструкцій. Маркери регістру: неповні речення, вигуки, наказовий спосіб."
      - "Діалог 2 — Між друзями: Планування поїздки на вихідні з використанням розмовних конструкцій майбутнього часу, фразеологізмів та емоційної лексики. Маркери регістру: маркери дискурсу (ну, слухай, а що як), вигуки, вільний порядок слів."
      - "Діалог 3 — По телефону: Неформальна телефонна розмова — на противагу формальному телефонному дзвінку з модуля №77. Маркери регістру: скорочені привітання (Привіт! Як справи?), неформальні запитання (Ну що, йдемо?), невимушені прощання (Давай! Бувай!)."
      - "Практика: студенти перетворюють формальні діалоги з модуля №77 на розмовний стиль, роблячи свідомий лексичний та граматичний вибір."
  - section: "Підсумок: живе мовлення"
    words: 500
    points:
      - "Повний лексичний довідник — розмовна українська за категоріями: емоційна лексика, зменшувально-пестливі форми, фразеологізми, вигуки та частки, діалогічні маркери."
      - "Самоперевірка українською: 1. Назвіть 5 ознак розмовного стилю. 2. Чим розмовний стиль відрізняється від офіційно-ділового? 3. Поясніть значення трьох фразеологізмів з цього модуля. 4. Перетворіть офіційне речення на розмовне."
      - "Огляд континууму регістрів: формальний ↔ нейтральний ↔ неформальний не є бінарним — українці плавно змінюють регістри в межах однієї розмови. Практика: студенти визначають зміну регістру в розгорнутому діалозі, де формальна зустріч переходить у дружню бесіду."
      - "Анонс наступного модуля: Абревіатури та скорочення (модуль №79) — як українська мова стискає інформацію через абревіатури та скорочені форми, що актуально як для формального, так і для неформального регістрів."
vocabulary_hints:
  required:
    - "розмовний стиль (colloquial style — informal register for everyday communication)"
    - "невимушеність (spontaneity — unforced, natural quality of speech)"
    - "емоційно забарвлена лексика (emotionally colored vocabulary)"
    - "зменшувально-пестлива форма (diminutive-affectionate form)"
    - "фразеологізм (phraseological unit — fixed expression with figurative meaning)"
    - "вигук (interjection — exclamatory word expressing emotion)"
    - "частка (particle — small word modifying meaning or adding nuance)"
    - "неповне речення (elliptical sentence — sentence with implied elements)"
    - "суржик (surzhyk — unintentional mixing of Ukrainian and Russian)"
    - "побутовий (everyday/domestic — relating to daily life)"
    - "діалогічний (dialogic — relating to dialogue, conversation)"
    - "інтонація (intonation — melodic pattern of speech)"
  recommended:
    - "файний (nice/pretty — Western Ukrainian colloquial)"
    - "бридкий (ugly/disgusting — emotionally strong)"
    - "нахабний (impudent/brazen)"
    - "овва (wow/oh my — Ukrainian interjection)"
    - "отож (exactly/that's right — confirmatory particle)"
    - "невже (really?/is it possible? — particle of surprise)"
    - "хіба (is it really?/surely not — particle of doubt)"
    - "водити за ніс (to deceive — lit. lead by the nose)"
    - "бувай (bye/see you — informal farewell)"
    - "коротше кажучи (in short — Ukrainian replacement for суржик 'короче')"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про що таке розмовний стиль? і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Лексика розмовного стилю»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему що таке розмовний стиль?."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему лексика розмовного стилю."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Що таке розмовний стиль?»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Лексика розмовного стилю» з їхніми визначеннями."
