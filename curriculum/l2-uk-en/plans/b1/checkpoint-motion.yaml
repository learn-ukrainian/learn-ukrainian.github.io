module: b1-043
level: B1
sequence: 43
slug: checkpoint-motion
version: '3.0.3'
title: "Контрольна робота 3"
subtitle: "Перевірка знань: просторові прийменники, дієслова руху, префікси, подорожі"
focus: review
pedagogy: PPP
phase: "B1.3 [Дієслова руху]"
word_target: 4000
objectives:
  - "Вміти правильно використовувати просторові прийменники з відповідним керуванням відмінками (біля + Р.в., між + Ор.в., під + Ор.в./Зн.в.)."
  - "Навчитися доречно обирати односпрямовані чи різноспрямовані дієслова руху залежно від контексту (іти чи ходити, їхати чи їздити)."
  - "Вміти застосовувати всі 10 префіксів дієслів руху (при-, до-, пі-/по-, від-, за-, ви-, пере-, про-, об-, під-) у відповідних контекстах."
  - "Вміти використовувати дієслова руху як у прямому, так і в переносному значенні у зв'язному мовленні про подорожі та повсякденне життя."
  - "Навчитися знаходити та виправляти помилки, пов'язані з дієсловами руху, префіксами, прийменниками та росіянізмами в українських текстах."
dialogue_situations:
  - setting: 'Усний іспит — студент описує подорож, використовуючи всі дієслова руху та префікси: Я вийшов з дому, пішов до зупинки, доїхав до вокзалу, приїхав до Львова, обійшов центр, зайшов у кав''ярню.'
    speakers:
      - Екзаменатор
      - Студент
    motivation: 'Закріплення: усі пари дієслів руху та комбінації префіксів у розповіді'
content_outline:
  - section: "Вступ: як працювати з контрольною"
    words: 350
    points:
      - 'Огляд: ця контрольна перевіряє матеріал модулів №27–36. Десять тем: просторові прийменники (модуль №27), базові пари дієслів руху (модуль №28), групи префіксів при-/до- (модуль №29), пі-/по-/від- (модуль №30), за-/ви- (модуль №31), пере-/про- (модуль №32), об-/під- (модуль №33), повітряний/водний рух (модуль №34), переносне значення (модуль №35), подорожні розповіді (модуль №36).'
      - 'Інструкції: "Виконайте всі завдання по черзі. Для кожного блоку є підказка, який модуль повторити. Головне — розуміння системи, а не механічне запам''ятовування."'
      - 'Система самооцінювання: після кожного блоку оцініть свою впевненість (впевнено / потребую повторення / не розумію).'
  - section: "Блок 1: Просторові прийменники"
    words: 550
    points:
      - 'Вправа на керування відмінками: для 8 речень із просторовими прийменниками вибрати правильне відмінкове закінчення іменника. Перевіряє біля/серед/навпроти + Р.в., між/над/під/за/перед + Ор.в., під/за + Зн.в. (напрямок).'
      - 'Вибір прийменника: 6 речень, у яких учні вибирають між синонімічними прийменниками (біля/коло/поруч з, серед/посеред, навколо/довкола) залежно від контексту та стилю.'
      - 'Прийменник чи прислівник: 4 пари речень, де учні визначають, чи є слово прийменником, чи прислівником (навпроти школи vs сидів навпроти).'
  - section: "Блок 2: Базові пари дієслів руху"
    words: 550
    points:
      - 'Вибір дієслова: 8 речень, у яких учні обирають між односпрямованим і різноспрямованим дієсловом (іти чи ходити, їхати чи їздити, бігти чи бігати, нести чи носити). Контекстні підказки: зараз, щодня, часто, саме цієї хвилини.'
      - 'Відмінювання дієслів: провідміняти 4 базові дієслова руху в теперішньому часі (повна парадигма), включаючи складні форми (біжу, їжджу, ходжу).'
      - 'Прийменники з базовими дієсловами руху: доповнити 4 речення, вибравши правильний прийменник напрямку (до + Р.в., в/на + Зн.в., з + Р.в.).'
  - section: "Блок 3: Префікси при-/до- та пі-/по-/від-"
    words: 550
    points:
      - 'Вибір префікса: 8 речень, у яких учні вибирають правильний префікс (при-, до-, пі-/по-, від-) залежно від того, чи це прибуття, досягнення мети, відправлення чи віддалення.'
      - 'Видові пари: від 6 дієслів руху доконаного виду з префіксами утворити недоконаний вид (прийти→приходити, поїхати→виїжджати, від''їхати→від''їжджати).'
      - 'Порядок етапів подорожі: розташувати 6 речень у логічній послідовності подорожі (відійшов → поїхав → проїхав → доїхав → приїхав).'
  - section: "Блок 4: Префікси за-/ви-, пере-/про-, об-/під-"
    words: 600
    points:
      - 'Вибір префікса: 10 речень для перевірки всіх інших груп префіксів. Учні вибирають між за- (вхід/захід) і ви- (вихід), пере- (перетин) і про- (рух повз), об- (рух навколо) і під- (наближення).'
      - 'Протилежні пари: від 6 префіксальних дієслів утворити просторовий антонім (зайти↔вийти, перейти↔?, обійти↔підійти).'
      - 'Прийменник + відмінок: доповнити 6 речень правильним прийменником після дієслів руху з префіксами (зайти в/до, вийти з, перейти через, проїхати повз, підійти до).'
  - section: "Блок 5: Повітряний і водний рух та переносне значення"
    words: 500
    points:
      - 'Рух у повітрі та на воді: 6 речень для перевірки префіксальних форм дієслів летіти та пливти (прилетіти, вилетіти, переплисти, відпливти). Включає лексику авіації та судноплавства (аеропорт, рейс, причал).'
      - 'Пряме чи переносне: 8 речень, де учні визначають, чи вжито дієслово руху в прямому, чи в переносному значенні. Час іде (переносне). Людина іде (пряме). Літак летить (пряме). Час летить (переносне).'
      - 'Доповнення виразів із переносним значенням: заповнити пропуски в 4 виразах (дощ ___, справи ___ добре, нести ___, вести ___).'
  - section: "Блок 6: Подорожні розповіді"
    words: 500
    points:
      - 'Розуміння прочитаного: текст про подорож Україною (200-250 слів) із 5-6 запитаннями для перевірки розуміння дієслів руху, маршрутів і місць призначення.'
      - 'Діалог у подорожі: доповнити діалог на вокзалі відповідною лексикою та формами дієслів руху (6 обмінів репліками).'
      - 'Продуктивне завдання: написати короткий план подорожі на вихідні в Україні, використавши щонайменше 8 різних префіксальних дієслів руху, 4 просторові прийменники та 5 слів із транспортної лексики.'
  - section: "Підсумок та самооцінка"
    words: 400
    points:
      - 'Інтегрована вправа: текст (200 слів) із 10 пропусками, де учні повинні вписати правильне дієслово руху (вибір між базовим і префіксальним, правильний префікс, правильний вид).'
      - 'Контрольний список самооцінювання: Прийменники: Чи правильно я вживаю відмінки після просторових прийменників? Пари: Чи розумію різницю між іти та ходити? Префікси: Чи можу я вжити всі 10 префіксів правильно? Переносне: Чи вживаю я дієслова руху в переносному значенні? Подорожі: Чи можу я розповісти про подорож українською?'
      - 'Рекомендації: якщо якийсь блок оцінено нижче 70%, поверніться до відповідного модуля. Фаза 5 зміщує фокус із руху на опис — це вже інша сфера граматики.'
