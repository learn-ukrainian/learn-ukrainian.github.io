module: b1-043
level: B1
sequence: 43
slug: checkpoint-motion
version: '3.0'
title: "Контрольна робота 3"
subtitle: "Перевірка знань: просторові прийменники, дієслова руху, префікси, подорожі"
focus: review
pedagogy: PPP
phase: "B1.3 [Motion Verbs]"
word_target: 4000
objectives:
  - "Learner can demonstrate mastery of spatial prepositions with correct case agreement
    (біля + Р.в., між + Ор.в., під + Ор.в./Зн.в.)"
  - "Learner can correctly choose односпрямований or різноспрямований motion verbs
    based on context (іти vs ходити, їхати vs їздити)"
  - "Learner can apply all 10 motion verb prefixes (при-, до-, пі-/по-, від-, за-,
    ви-, пере-, про-, об-, під-) accurately in context"
  - "Learner can use motion verbs both literally and figuratively in connected discourse
    about travel and daily life"
  - "Learner can identify and correct errors involving motion verbs, prefixes, prepositions,
    and Russicisms in Ukrainian text"
dialogue_situations:
  - setting: 'Oral exam — the student describes a journey using all motion verbs and
      prefixes: Я вийшов з дому, пішов до зупинки, доїхав до вокзалу, приїхав до Львова,
      обійшов центр, зайшов у кав''ярню.'
    speakers:
      - Екзаменатор
      - Студент
    motivation: 'Consolidation: all motion verb pairs and prefix combinations in narration'
content_outline:
  - section: "Вступ: як працювати з контрольною"
    words: 350
    points:
      - "Overview: this checkpoint tests everything from M27-M36 (Phase 4: Motion
        Verb Universe). Ten content areas: просторові прийменники (M27), базові пари
        дієслів руху (M28), prefix groups при-/до- (M29), пі-/по-/від- (M30), за-/ви-
        (M31), пере-/про- (M32), об-/під- (M33), повітряний/водний рух (M34), переносне
        значення (M35), подорожні розповіді (M36)."
      - "Instructions in Ukrainian: 'Виконайте всі завдання по черзі. Для кожного
        блоку є підказка, який модуль повторити. Головне — розуміння системи, а не
        механічне запам'ятовування.'"
      - "Self-assessment framework: after each block, rate your confidence (впевнено
        / потребую повторення / не розумію)."
  - section: "Блок 1: Просторові прийменники"
    words: 550
    points:
      - "Case agreement exercise: given 8 sentences with spatial prepositions, learners
        choose the correct case ending for the following noun. Tests біля/серед/навпроти
        + Р.в., між/над/під/за/перед + Ор.в., під/за + Зн.в. (direction)."
      - "Preposition choice: 6 sentences where learners choose between synonymous
        prepositions (біля/коло/поруч з, серед/посеред, навколо/довкола) based on
        context and register."
      - "Preposition vs adverb: 4 sentence pairs where learners identify whether the
        word is a preposition or adverb (навпроти школи vs сидів навпроти)."
  - section: "Блок 2: Базові пари дієслів руху"
    words: 550
    points:
      - "Verb choice: 8 sentences where learners choose between односпрямований and
        різноспрямований verb (іти vs ходити, їхати vs їздити, бігти vs бігати, нести
        vs носити). Context clues: зараз, щодня, часто, саме цієї хвилини."
      - "Conjugation: conjugate 4 base motion verbs in present tense (full paradigm),
        including irregular forms (біжу, їжджу, ходжу)."
      - "Prepositions with base motion verbs: complete 4 sentences choosing correct
        direction preposition (до + Р.в., в/на + Зн.в., з + Р.в.)."
  - section: "Блок 3: Префікси при-/до- та пі-/по-/від-"
    words: 550
    points:
      - "Prefix selection: 8 sentences where learners choose the correct prefix (при-,
        до-, пі-/по-, від-) based on whether the motion is arriving, reaching, departing,
        or moving away."
      - "Aspect pairs: given 6 perfective prefixed verbs, learners produce the imperfective
        counterpart (прийти→приходити, поїхати→виїжджати, від'їхати→від'їжджати)."
      - "Journey stage ordering: arrange 6 sentences in logical journey order (відійшов
        → поїхав → проїхав → доїхав → приїхав)."
  - section: "Блок 4: Префікси за-/ви-, пере-/про-, об-/під-"
    words: 600
    points:
      - "Prefix selection: 10 sentences testing all remaining prefix groups. Learners
        choose between за- (entering/dropping by) and ви- (exiting), пере- (crossing)
        and про- (passing), об- (around) and під- (approaching)."
      - "Opposite pairs: given 6 prefixed verbs, learners produce the spatial opposite
        (зайти↔вийти, перейти↔?, обійти↔підійти)."
      - "Preposition + case: complete 6 sentences with correct preposition after prefixed
        motion verbs (зайти в/до, вийти з, перейти через, проїхати повз, підійти до)."
  - section: "Блок 5: Повітряний і водний рух та переносне значення"
    words: 500
    points:
      - "Air/water motion: 6 sentences testing prefixed forms of летіти and пливти
        (прилетіти, вилетіти, переплисти, відпливти). Includes aviation/maritime vocabulary
        (аеропорт, рейс, причал)."
      - "Literal vs figurative: 8 sentences where learners identify whether the motion
        verb is used literally or figuratively. Час іде (figurative). Людина іде (literal).
        Літак летить (literal). Час летить (figurative)."
      - "Figurative expression completion: fill in 4 expressions (дощ ___, справи
        ___ добре, нести ___, вести ___)."
  - section: "Блок 6: Подорожні розповіді"
    words: 500
    points:
      - "Reading comprehension: a travel passage (200-250 words) about a journey across
        Ukraine, followed by 5-6 comprehension questions testing understanding of
        motion verbs, routes, and destinations."
      - "Travel dialogue: complete a dialogue at a train station with appropriate
        vocabulary and motion verb forms (6 exchanges)."
      - "Production: write a short travel plan for a weekend trip in Ukraine, using
        at least 8 different prefixed motion verbs, 4 spatial prepositions, and 5
        transport vocabulary items."
  - section: "Підсумок та самооцінка"
    words: 400
    points:
      - "Integrated exercise: a passage (200 words) with 10 blanks where learners
        fill in the correct motion verb (choosing base vs prefixed, correct prefix,
        correct aspect)."
      - "Self-assessment checklist: Прийменники: Чи правильно я вживаю відмінки після
        просторових прийменників? Пари: Чи розумію різницю між іти та ходити? Префікси:
        Чи можу я вжити всі 10 префіксів правильно? Переносне: Чи вживаю я дієслова
        руху в переносному значенні? Подорожі: Чи можу я розповісти про подорож українською?"
      - "Recommendations: if any block scores below 70%, return to the corresponding
        module. Phase 5 (Degrees of Comparison) shifts focus from motion to description
        — a different grammar domain."
vocabulary_hints:
  required:
    - "контрольна робота (test/assessment)"
    - "просторовий прийменник (spatial preposition)"
    - "односпрямований (unidirectional)"
    - "різноспрямований (multidirectional)"
    - "префікс (prefix)"
    - "переносне значення (figurative meaning)"
    - "подорож (journey)"
    - "маршрут (route)"
    - "розклад (schedule)"
  recommended:
    - "самооцінка (self-assessment)"
    - "повторення (review/revision)"
    - "завдання (task/exercise)"
    - "впевнено (confidently)"
    - "перевірка (check/verification)"
activity_hints:
  - type: quiz
    focus: "Mixed quiz: prefix selection, base pair choice, preposition-case agreement
      — all M27-M36"
    items: 12
  - type: fill-in
    focus: "Complete travel narrative with correct motion verbs, prefixes, and prepositions"
    items: 10
  - type: match-up
    focus: "Match all 10 motion verb prefixes with their spatial meanings"
    items: 10
  - type: error-correction
    focus: "Find and fix motion verb errors: wrong prefix, wrong base verb, wrong
      case, Russicisms"
    items: 8
  - type: group-sort
    focus: "Sort 20 prefixed verbs by prefix meaning group"
    items: 20
  - type: free-write
    focus: "Write a complete travel story across Ukraine using all prefix groups,
      figurative expressions, and travel vocabulary"
    items: 6
