activity_hints:
  - type: quiz
    focus: 'Змішаний тест: вибір префікса, вибір базової пари, узгодження прийменника з відмінком — усі модулі №27–36.'
    items: 12
  - type: fill-in
    focus: 'Доповніть розповідь про подорож правильними дієсловами руху, префіксами та прийменниками.'
    items: 10
  - type: match-up
    focus: 'З''єднайте всі 10 префіксів дієслів руху з їхніми просторовими значеннями.'
    items: 10
  - type: error-correction
    focus: 'Знайдіть і виправте помилки: неправильний префікс, неправильне базове дієслово, неправильний відмінок, росіянізми.'
    items: 8
  - type: group-sort
    focus: 'Розподіліть 20 префіксальних дієслів за групами значень префіксів.'
    items: 20
  - type: free-write
    focus: 'Напишіть цілісну історію про подорож Україною, використовуючи всі групи префіксів, вирази в переносному значенні та лексику для подорожей.'
    items: 6
