module: b1-021
level: B1
sequence: 21
slug: noun-subclasses-feminine
version: '3.0.3'
title: 'Жіночий рід (нульове закінчення)'
subtitle: 'III відміна — від любові до подорожі'
focus: grammar
pedagogy: PPP
phase: 'B1.1 [Морфофонеміка]'
word_target: 4000
objectives:
  - 'Здобувач освіти вміє розпізнавати іменники III відміни — іменники жіночого роду з нульовим закінченням у називному відмінку (любов, осінь, радість, подорож, ніч)'
  - 'Здобувач освіти вміє правильно відмінювати іменники III відміни в усіх відмінках як в однині, так і в множині, включаючи особливий випадок мати'
  - 'Здобувач освіти вміє застосовувати правило подвоєння в орудному відмінку однини: один кінцевий приголосний → подвоєння (ніч — ніччю, сіль — сіллю), але збіг приголосних або [б/п/в/м/ф/р] → без подвоєння (радість — радістю, кров — кров''ю)'
  - 'Здобувач освіти вміє використовувати паралельні закінчення родового відмінка однини -і/-и для іменників на -ть після приголосного (радості/радости) та для слів кров, любов, осінь, сіль'
  - 'Здобувач освіти вміє відрізняти іменники III відміни від схожих іменників чоловічого роду II відміни (путь є архаїзмом, гість — чоловічий рід II відміни)'
dialogue_situations:
  - setting: 'Під час нічної зміни в Харківській лікарні — обговорення обладнання та умов: Де сіль? Принеси піч для стерилізації. Ця подорож до лікарні була довгою. Яка тиша!'
    speakers:
      - Медсестра
      - Лікар
    motivation: 'Іменники жіночого роду III відміни: сіль, піч, подорож, тиша — слова з нульовим закінченням'
content_outline:
  - section: 'Що таке III відміна?'
    words: 550
    points:
      - 'Визначення за Литвіновою, 6 клас, с. 144: «III відміна — іменники жіночого роду з нульовим закінченням: любов, сіль; іменник мати». Це іменники жіночого роду, які закінчуються на приголосний у називному відмінку — без закінчення -а/-я, як у I відміні (жінка, земля).'
      - 'За Заболотним, 6 клас, с. 96: система чотирьох відмін. III відміна — це виключно жіночий рід + нульове закінчення. Єдиний виняток: мати (яка має унікальну парадигму з нарощенням основи -ер-). Ключові приклади: ніч, піч, сіль, любов, осінь, радість, подорож, молодь, мідь, кров, тінь, річ.'
      - 'Семантичні групи іменників III відміни: — Абстрактні поняття: радість, гордість, мудрість, ніжність, гідність. — Явища природи: осінь, ніч, тінь. — Речовини: сіль, мідь, кров. — Предмети: піч, річ. — Подорожі: подорож. З Авраменка, 6 клас, с. 102: вправа на класифікацію з олень (II відміна, чоловічий рід!) проти осінь (III відміна, жіночий рід).'
  - section: 'Відмінювання III відміни в однині'
    words: 700
    points:
      - 'Повна парадигма однини за Авраменком, 6 клас, с. 102: Н. ніч, любов, радість Р. ночі, любові (любови), радості (радости) Д. ночі, любові (любови), радості (радости) Зн. ніч, любов, радість Ор. ніччю, любов''ю, радістю М. на ночі, у любові, у радості Кл. ноче, любове, радосте'
      - 'Паралельні закінчення родового відмінка -і/-и: З Заболотного, 6 клас, с. 109: «Іменники на -ть після приголосного, а також слова кров, любов, осінь, сіль, Русь, Білорусь у родовому відмінку однини мають закінчення -і або -и». І радості, і радости є правильними. Подібно: любові/любови, осені/осени, крові/крови, солі/соли.'
      - 'Чергування [і] → [о/е] у III відміні: ніч — ночі (і → о), піч — печі (і → е), річ — речі (і → е). Це прямо пов''язано з модуля №8: той самий патерн [о/е] → [і] в закритому складі змінюється на зворотний, коли склад відкривається: ніч [закритий] → но-чі [відкритий].'
  - section: 'Подвоєння в орудному відмінку'
    words: 700
    points:
      - 'Характерна ознака III відміни — подвоєння в орудному відмінку однини. З Авраменка, 10 клас, с. 168: «У формі орудного відмінка однини треба писати подвоєні приголосні, якщо основа закінчується одним приголосним (крім б, п, в, м, ф і р): річ — річчю, розкіш — розкішшю, відповідь — відповіддю, лють — люттю».'
      - 'Коли подвоєння НЕ відбувається: 1. Основа закінчується на збіг приголосних: радість — радістю, гордість — гордістю, жовчність — жовчністю. 2. Основа закінчується на губний (б, п, в, м, ф) або [р]: кров — кров''ю, любов — любов''ю, матір — матір''ю. З Голуба, 6 клас, с. 82: «Чому пишемо річчю, миттю, але радістю, матір''ю, нехворощю?».'
      - 'Практична таблиця — здобувачі освіти утворюють орудний відмінок для: сіль → сіллю (подвоєння), ніч → ніччю (подвоєння), мідь → міддю (подвоєння), тінь → тінню (подвоєння), кров → кров''ю (губний, апостроф), осінь → осінню (подвоєння), подорож → подорожжю (подвоєння), радість → радістю (збіг приголосних).'
  - section: 'Відмінювання у множині'
    words: 550
    points:
      - 'Повна парадигма множини за Авраменком, 6 клас, с. 102: Н. ночі, матері Р. ночей, матерів Д. ночам, матерям Зн. ночі, матерів Ор. ночами, матерями М. на ночах, на матерях Кл. ночі, матері'
      - 'Закінчення родового відмінка множини: -ей: ночей, печей, речей, мишей. -ів: матерів (унікально для мати). Нульове: не типово для III відміни. Більшість іменників III відміни слідують моделі -ей.'
      - 'Мати — унікальна парадигма: мати → матері → матері → матір → матір''ю → на матері. Основа розширюється за допомогою -ер-/-ір-. З Заболотного, 6 клас, с. 109: повна таблиця парадигми для мати як в однині, так і в множині.'
  - section: 'III відміна vs інші відміни'
    words: 500
    points:
      - 'Пастка 1 — іменники чоловічого роду, що виглядають як III відміна: гість, звір, біль, степ, кінь — вони закінчуються на приголосний, але є іменниками ЧОЛОВІЧОГО роду → II відміна. Тест: перевірте рід. Якщо чоловічий → II відміна. З Авраменка, 6 клас, с. 102: олень — чоловічого роду (II відміна), а не жіночого (III відміна).'
      - 'Пастка 2 — іменники жіночого роду із закінченням -а/-я: подруга, земля, пісня — вони жіночого роду, але мають закінчення -а/-я → I відміна (не III). III відміна вимагає нульового закінчення.'
      - 'Діагностичний алгоритм: 1. Це іменник жіночого роду? Якщо ні → не III відміна. 2. Чи має він нульове закінчення в Н.в.? Якщо ні → I відміна. 3. Це слово мати? → III відміна (особлива парадигма). 4. Так і на 1, і на 2 → III відміна. Практика: класифікувати піч, ніч, тінь, день, кість, гість, міць, путь.'
  - section: 'Словотворення іменників III відміни'
    words: 600
    points:
      - 'Продуктивний суфікс -ість/-ність для абстрактних іменників, утворених від прикметників: гордий → гордість, мудрий → мудрість, надійний → надійність, гідний → гідність, щедрий → щедрість. З Голуба, 6 клас, с. 82: вправа на утворення іменників III відміни від прикметників для практики їх відмінювання.'
      - 'Зв''язок із морфофонемікою: коли додається суфікс -ість, утворений іменник завжди має збіг приголосних перед -тю в орудному відмінку → немає подвоєння: гордість — гордістю, мудрість — мудрістю. Але суфікс -ть після одного приголосного → подвоєння: мить — миттю, відповідь — відповіддю.'
      - 'Практика читання україномовного тексту про осінь, що містить іменники III відміни: ніч, тінь, подорож, радість, мудрість. Здобувачі освіти визначають відмінок кожного іменника III відміни в тексті.'
  - section: 'Підсумок'
    words: 400
    points:
      - 'Ключові правила: 1. III відміна = жіночий рід + нульове закінчення + мати. 2. Орудний відмінок: подвоєння після одного приголосного (ніччю, сіллю), БЕЗ подвоєння після збігу приголосних (радістю) або б/п/в/м/ф/р (кров''ю). 3. Родовий відмінок: і -і, і -и є правильними для основ на -ть і кров/любов/осінь/сіль. 4. Чергування [і] → [о/е]: ніч-ночі, піч-печі, річ-речі.'
      - 'Самоперевірка: Дайте відповіді на запитання: 1. Які іменники належать до III відміни? 2. Коли пишемо подвоєння в орудному відмінку? 3. Утворіть орудний відмінок: ніч, кров, радість, сіль, любов. 4. Чому олень — це не III відміна? Анонс: модуль №15 — іменники, що вживаються тільки у множині.'
