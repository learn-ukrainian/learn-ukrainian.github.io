activity_hints:
  - type: quiz
    focus: 'Визначення відміни іменників: III відміна чи ні? (гість проти ніч, день проти тінь)'
    items: 8
  - type: fill-in
    focus: 'Утворення орудного відмінка: застосування або незастосування подвоєння (ніч→ніччю, кров→кров''ю)'
    items: 8
  - type: match-up
    focus: 'Встановлення відповідності між формами називного відмінка та їхніми формами орудного і родового'
    items: 8
  - type: error-correction
    focus: 'Виправлення неправильних форм орудного відмінка (*радіссттю, *кровю, *ніч''ю)'
    items: 6
  - type: group-sort
    focus: 'Сортування іменників за правилом подвоєння: подвоєння чи без подвоєння в орудному відмінку'
    items: 10
  - type: sentence-builder
    focus: 'Побудова речень з іменниками III відміни в різних відмінках'
    items: 6
