grammar:
  - 'Ідентифікація III відміни: жіночий рід + нульове закінчення + мати'
  - 'Паралельні закінчення -і/-и в родовому та давальному відмінках'
  - 'Правило подвоєння в орудному відмінку: один кінцевий приголосний → подвоюється (ніччю, сіллю)'
  - 'Відсутність подвоєння: збіг приголосних (радістю) та губні/[р] (кров''ю, матір''ю)'
  - 'Чергування [і]→[о/е]: ніч-ночі, піч-печі, річ-речі'
  - 'Мати: унікальна парадигма з нарощенням основи -ер-/-ір-'
  - 'Словотворення: прикметник + -ість/-ність → абстрактний іменник III відміни'
register: академічний
references:
  - title: 'Авраменко Grade 6, pp.102-108'
    notes: 'Таблиця парадигм III відміни (однина + множина), вправа на сортування для розрізнення чоловічого роду II та жіночого роду III відміни (олень проти осінь).'
  - title: 'Литвінова Grade 6, pp.144, 162-163'
    notes: 'Класифікація відмін із визначенням III відміни. Повний розділ про відмінювання III відміни з піснею The HARDKISS як контекстом.'
  - title: 'Заболотний Grade 6, pp.96, 109'
    notes: 'Таблиця чотирьох відмін. III відміна: паралельні -і/-и в родовому для основ на -ть і кров/любов/осінь/сіль. Повна парадигма для мати.'
  - title: 'Авраменко Grade 10, p.168'
    notes: 'Правило подвоєння в орудному відмінку: один приголосний → подвоєння; збіг приголосних та б/п/в/м/ф/р → без подвоєння. Приклади з правилами.'
  - title: 'Голуб Grade 6, p.82'
    notes: 'Пряме запитання: «Чому пишемо річчю, миттю, але радістю, матір''ю?» Вправа на утворення іменників III відміни від прикметників.'