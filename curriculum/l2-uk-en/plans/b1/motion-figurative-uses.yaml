slug: motion-figurative-uses
version: '2.0'
title: Переносні значення дієслів руху
subtitle: Figurative uses of motion verbs
content_outline:
- section: Тест
  points: []
- section: Пояснення
  points:
  - 'Логіка переносних значень — фокус на префіксах: «До-» (результат/ліміт: дійти
    висновку), «Ви-» (вихід зі стану: вийти з кризи), «Пере-» (зміна стану: перейти
    до справи); стандарт §4.3.8'
  - 'Детальний розбір ідіом — розрізнення нейтральних метафор (час іде) та фразеологізмів
    (водити за ніс); cultural hook: «Гоголем ходити» (поважно, як птах) та «П''ятами
    накивати» (втекти)'
  - Реальні приклади використання — вийти на новий рівень (маркетинг), зайти в глухий
    кут (новини), перейти до справи (бізнес)
- section: Практика
  points:
  - 'Як розрізняти значення? — контекстний аналіз: буквальний рух vs абстрактний процес'
  - 'Типові помилки та як їх уникнути — learner error: «прийти до висновку» замість
    «дійти» (prefix mismatch); «йти божевільним» замість «зійти з розуму» (literal
    translation); «проблема йде» замість «виникає»'
  - 'Діалог: Культурні плани — використання ідіоми «вискочити як Пилип з конопель»
    у контексті несподіваних змін планів'
- section: 'Читання: Метафори в нашому житті'
  points: []
- section: Потрібно більше практики?
  points:
  - Інтеграція знань — поєднання з матеріалом модулів b1-16–20
  - Реальне застосування — аналіз заголовків новин на наявність метафор руху
  - Онлайн-ресурси — посилання на словники фразеологізмів (Slovnyk.UA)
vocabulary_hints:
  required:
  - виходить, що (it turns out that) — виходить, що так; з цього виходить; як не крути,
    а виходить
  - 'дійти до висновку (reach a conclusion) — дійти до логічного/невтішного висновку;
    learner error: use «прийти» instead of «дійти»'
  - зайти занадто далеко (go too far) — жарт зайшов занадто далеко; ми зайшли занадто
    далеко
  - відійти від теми (digress) — трохи відійти від теми; дозвольте відійти від теми
  - підійти до питання (approach a question) — серйозно підійти до питання; комплексно
    підійти до проблеми
  - обійтися без (do without) — не можу обійтися без кави; обійтися без допомоги
  - перейти до справи (get down to business) — одразу перейти до справи; досить розмов,
    переходьмо до справи
  - пройти через (go through - experience) — пройти через пекло; пройти через випробування
  - вийти з ситуації (get out of a situation) — гідно вийти з ситуації; сухим із води
    вийти (ідіома)
  - зайти в глухий кут (reach a dead end) — переговори/розслідування зайшло в глухий
    кут
  recommended:
  - до мене дійшло (it dawned on me) — нарешті до мене дійшло; тільки зараз дійшло
  - вийти на новий рівень (reach a new level) — вийти на якісно новий рівень; стосунки
    вийшли на новий рівень
  - переносне значення (figurative meaning) — термін для пояснення метафор (стандарт
    §4.5.1.1)
  - буквальний зміст (literal meaning) — протиставлення переносним значенням
  - 'фразеологізм (phraseological unit) — cultural hook: сталі вирази як «накивати
    п''ятами»'
