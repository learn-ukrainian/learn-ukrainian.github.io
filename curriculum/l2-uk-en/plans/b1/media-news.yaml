module: b1-59
level: B1
sequence: 59
slug: media-news
version: '2.0'
title: Медіа та новини
subtitle: Media and News
content_outline:
- section: Вступ
  points:
  - 'Ukrainian media overview — cultural hook: Suspilne (2017) as independent public
    broadcaster'
  - 'Types of media — standard alignment: §3.4 covers press, radio, TV, internet'
  - News vocabulary basics
- section: Вживання
  points:
  - 'Collocations patterns — learner error: confusion between «транслювати» (broadcast)
    and «перекладати» (translate)'
  - Register considerations — distinct formal reporting lexis vs. informal discussion
  - 'Application domains, key expressions — avoid Russianisms: «брати участь» not
    «приймати участь», «порушувати питання» not «піднімати питання»'
- section: Читання
  points:
  - News article
  - 'Ukrainian media overview — cultural hook: «Алло, алло, алло! Говорить Харків!»
    (1924) as start of broadcasting history'
  - 'Blog (informal) — modernity note: include Telegram channels and podcasts as key
    modern sources'
- section: Діалоги
  points:
  - News discussion (informal) — focus on discussing content as leisure/rest activity
  - 'In the editorial office (formal) — case usage note: «повідомляти» + Accusative
    (fact) vs. Dative (person)'
  - Fact-checking, media expert interview — introduce concept of «медіаграмотність»
    (media literacy)
- section: Лексика
  points:
  - Seven vocabulary groups
  - Content types, professionals
  - Media types, structure, sources
- section: Підсумок
  points:
  - Key vocabulary recap
  - Practice recommendations
vocabulary_hints:
  required:
  - новини (news) — свіжі/останні/термінові новини, дивитися/читати новини, стрічка
    новин
  - стаття (article) — писати/публікувати статтю, аналітична/наукова стаття
  - журналіст (journalist) — військовий/спортивний журналіст, журналістське розслідування
  - телебачення (television)
  - газета (newspaper)
  - репортаж (report)
  - 'повідомляти (to report) — grammar: + Accusative (news/fact), + Dative (person)'
  - висвітлювати (to cover/highlight)
  recommended:
  - редакція (editorial office) — працювати в редакції, редакційна політика
  - трансляція (broadcast) — пряма трансляція, вести трансляцію
  - ЗМІ (media) — засоби масової інформації, роль ЗМІ, сучасні ЗМІ
  - 'подкаст (podcast) — modernity: digital news source'
  - оприлюднювати (to publish/release)
activity_hints:
- type: match-up
  focus: Media noun phrases
  items: 25
- type: fill-in
  focus: Complete media sentences
  items: 20
- type: match-up
  focus: Match media terms
  items: 15
- type: quiz
  focus: Discuss current events
  items: 10
focus: vocabulary
pedagogy: PPP
prerequisites:
- b1-58 (Describing Changes)
connects_to:
- b1-60 (Society Politics)
