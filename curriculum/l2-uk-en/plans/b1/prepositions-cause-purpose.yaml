module: b1-058
level: B1
sequence: 58
slug: prepositions-cause-purpose
version: '3.1.2'
title: 'Причина і мета'
subtitle: 'Прийменники і конструкції для вираження причини та мети'
focus: grammar
pedagogy: PPP
phase: 'B1.5 [Нюанси відмінків та прийменники]'
word_target: 4000
objectives:
  - 'Вміти висловлювати причину за допомогою через + Зн.в. (негативна причина), завдяки + Д.в. (позитивна причина), від + Р.в. (емоційна/фізична причина), з + Р.в. (внутрішня причина)'
  - 'Розуміти різницю між завдяки (позитивна) та через (негативна) і ніколи не плутати їх (*завдяки хворобі)'
  - 'Вміти виражати мету за допомогою для + Р.в. (для чогось/заради когось), заради + Р.в. (емоційно забарвлена мета), щоб + інфінітив, за + Ор.в. (піти за чимось)'
  - 'Вміти використовувати конструкції через те що, завдяки тому що, для того щоб у складних реченнях (підготовка до Фази 8: підрядні речення)'
  - 'Вміти розрізняти причину і мету в неоднозначних контекстах та обирати відповідну конструкцію'
dialogue_situations:
  - setting: 'Студент пояснює декану Одеського університету причини пропуску занять: Через хворобу пропустив лекції. Для отримання стипендії треба здати іспити. Завдяки допомозі друзів встиг.'
    speakers:
      - Декан
      - Студент
    motivation: 'Причина та мета: через + Зн.в., для + Р.в., завдяки + Д.в., заради + Р.в.'
content_outline:
  - section: 'Причина: через та завдяки'
    words: 800
    points:
      - 'через + Зн.в. — негативна або нейтральна причина (Заболотний 7 клас, с.193): через хворобу, через неуважність, через погану погоду, через війну. «Прийменник "через" вказує на причину, що заважає здійсненню чогось».'
      - 'завдяки + Д.в. — позитивна причина: завдяки допомозі друзів, завдяки наполегливості, завдяки вчителям. «Прийменник "завдяки" містить вказівку на причину, яка СПРИЯЄ здійсненню». Важливе правило: НІКОЛИ не вживайте "завдяки" для негативних наслідків. *Завдяки хворобі він не прийшов — ПОМИЛКА. Через хворобу він не прийшов — ПРАВИЛЬНО.'
      - 'Практика: 12 речень — учні обирають "через" або "завдяки" залежно від того, позитивна причина чи негативна. «Я запізнився _____ затор на дорозі.» (через) «Ми перемогли _____ вашій підтримці.» (завдяки)'
  - section: 'Причина: від та з'
    words: 700
    points:
      - 'від + Р.в. — фізична або емоційна причина (зовнішній подразник): від радості, від сорому, від болю, від холоду, від страху. «Він почервонів від сорому. Вона тремтіла від холоду.» Ці конструкції виражають мимовільну реакцію на причину.'
      - 'з + Р.в. — внутрішня причина (мотивація, риса характеру): з цікавості, з повагою (спосіб, а не причина), зі страху (близько до "від страху", але більш внутрішнє). «Він зробив це з цікавості». Зверніть увагу: "з + Р.в." часто перетинається з "від + Р.в." для емоцій, але "з" підкреслює МОТИВАЦІЮ, тоді як "від" підкреслює РЕАКЦІЮ.'
      - 'Додаткові прийменники причини: унаслідок/внаслідок + Р.в., у результаті + Р.в., у зв''язку з + Ор.в. Це офіційно-діловий/книжний стиль. З підручника Авраменка (9 клас, с.86): складені прийменники причини.'
      - 'Практика: обрати "від", "з", "внаслідок" або "у зв''язку з" у 10 реченнях, обговорюючи нюанси: зовнішня реакція vs внутрішня мотивація vs офіційна причина.'
  - section: 'Мета: для, заради, за, щоб'
    words: 800
    points:
      - 'для + Р.в. — загальна мета або користь: для друга, для здоров''я, для роботи, для навчання. Це найпоширеніший прийменник мети.'
      - 'заради + Р.в. — підсилена, емоційно забарвлена мета: заради миру, заради дітей, заради справедливості.'
      - 'за + Ор.в. — мета руху (піти/поїхати, щоб щось взяти): піти за хлібом, зайти за другом, поїхати за покупками. З підручника Заболотного (7 клас, с.193): «Зайти за книжкою» означає піти й забрати книгу; «зайти по книжку» — синонімічний варіант (по + Зн.в. для мети).'
      - 'щоб + інфінітив — вираження дії-мети: Я прийшов, щоб допомогти. Вона вивчає українську, щоб розуміти бабусю. Він працює, щоб заробити гроші. Анонс: підрядні речення з "щоб" та умовним способом у Фазі 8.'
      - 'по + Зн.в. — мета руху (розмовний, але нормативний варіант): піти по воду, піти по гриби, піти по хліб. З підручника Авраменка (11 клас, с.72): "по + Зн.в." для мети є синонімом до "за + Ор.в.". Обидва варіанти правильні: піти по хліб = піти за хлібом. Практика: переписати 6 речень з метою, використовуючи обидві конструкції.'
  - section: 'Складні конструкції причини і мети'
    words: 600
    points:
      - 'Складені прийменники причини: через те що + підрядне речення: Через те що він захворів, він не прийшов. завдяки тому що + підрядне речення: Завдяки тому що вона допомогла, ми встигли. у зв''язку з + Ор.в. (офіційно): у зв''язку з карантином.'
      - 'Складені конструкції мети: для того щоб + інфінітив: Для того щоб зрозуміти, треба прочитати. з метою + Р.в. (офіційно): з метою покращення. заради того щоб + інфінітив (підсилена мета).'
      - 'Практика: об''єднати прості речення у складні, використовуючи складені конструкції причини/мети. «Він не прийшов. Він захворів.» → «Він не прийшов через те, що захворів.»'
      - 'Порівняння стилів: розмовне "бо", нейтральне "тому що" та офіційні "через те що" / "у зв''язку з тим що" / "внаслідок того що". Учні переписують одне й те саме речення з причиною у трьох різних регістрах.'
  - section: 'Причина vs мета: розрізнення'
    words: 600
    points:
      - 'Причина відповідає на питання ЧОМУ?: Він запізнився через затор. Мета відповідає на питання НАВІЩО? ДЛЯ ЧОГО?: Він прийшов для зустрічі. Однаковий прийменник, різне значення: Він прийшов через парк (шлях — не причина і не мета!). Він не прийшов через хворобу (причина). Контекст і питальне слово (чому/навіщо) знімають неоднозначність.'
      - 'Практика: класифікувати 12 речень, що виражають причину, мету або шлях. Потім переписати кожне, використовуючи альтернативну конструкцію: «Завдяки вашій допомозі ми перемогли» → «Ми перемогли, бо ви допомогли» (альтернатива з підрядним реченням).'
      - 'Текст для читання: новинна стаття про громадський проєкт, у якій використано конструкції причини та мети. Учні ідентифікують кожен вираз, класифікують його (через/завдяки/від/для/щоб) і пояснюють, чому обрано саме цей прийменник, а не інший.'
  - section: 'Підсумок'
    words: 500
    points:
      - 'Довідкова таблиця: ПРИЧИНА: через + Зн.в. (негативна), завдяки + Д.в. (позитивна), від + Р.в. (реакція), з + Р.в. (мотивація). МЕТА: для + Р.в. (загальна), заради + Р.в. (підсилена), за + Ор.в. (сходити за чимось), щоб + інфінітив.'
      - 'Золоте правило: завдяки = ДОБРА причина, через = ПОГАНА причина. Ніколи не плутати.'
      - 'Самоперевірка: 1. Висловити негативну причину (через + Зн.в.). 2. Висловити позитивну причину (завдяки + Д.в.). 3. Висловити мету за допомогою для + Р.в. та щоб + інф. 4. Використати складені конструкції (через те що, для того щоб). 5. Розрізняти "від" (реакція) і "з" (мотивація). Анонс: порядкові числівники і відмінки.'
vocabulary_hints:
  required:
    - "причина (cause/reason)"
    - "мета (purpose/goal)"
    - "через (because of — negative cause; through — path)"
    - "завдяки (thanks to — positive cause, governs Д.в.)"
    - "від (from — physical/emotional cause, governs Р.в.)"
    - "для (for — purpose, governs Р.в.)"
    - "заради (for the sake of — emphatic purpose, governs Р.в.)"
    - "щоб (in order to — purpose conjunction)"
  recommended:
    - "у зв'язку з (in connection with — formal cause, governs Ор.в.)"
    - "з метою (with the aim of — formal purpose, governs Р.в.)"
    - "з цікавості (out of curiosity — з + Р.в. motivation)"
    - "від сорому (from shame — від + Р.в. reaction)"
    - "навіщо (what for — purpose question word)"
    - "чому (why — cause question word)"
activity_hints:
  - type: reading
    focus: 'Прочитати текст про вираження причини за допомогою "через" та "завдяки" і дати відповіді на запитання.'
  - type: essay-response
    focus: 'Написати 5 речень, використовуючи нову лексику з розділу «Причина: від та з».'
  - type: fill-in
    focus: 'Вставити правильну граматичну форму у реченнях на тему причини ("через" та "завдяки").'
  - type: error-correction
    focus: 'Знайти і виправити помилки у реченнях з прийменниками "від" та "з".'
  - type: quiz
    focus: 'Обрати правильний варіант лексики та граматики з розділу «Причина: через та завдяки».'
  - type: match-up
    focus: 'З''єднати терміни з розділу «Причина: від та з» з їхніми визначеннями.'
connects_to:
  - 'b1-050 (Часові прийменники)'
