module: b1-075
level: B1
sequence: 75
slug: complex-subordinate-relative
version: '3.1.2'
title: "Означальні речення"
subtitle: "Підрядні з який/яка/яке у різних відмінках"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Складний синтаксис]"
word_target: 4000
objectives:
  - "Учень вміє будувати означальні підрядні речення, що характеризують іменник у головній частині, відповідаючи на питання який? яка? яке? які?"
  - "Учень вміє використовувати відносний займенник який/яка/яке/які у всіх відмінках, правильно узгоджуючи його з антецедентом у роді та числі."
  - "Учень може використовувати альтернативні сполучні слова: що, де, куди, коли в означальних реченнях."
  - "Учень навчиться пов'язувати означальні речення з дієприкметниковим зворотом (M59): обидві конструкції виражають ознаку, але підрядне речення є більш природним у мовленні."
  - "Учень вміє правильно ставити коми в означальних реченнях."
dialogue_situations:
  - setting: 'Прогулянка Київським ботанічним садом (m, botanical garden) — вказування на рослини: Дерево (n, tree), яке росте тут уже сто років. Квітка (f), яку подарували з Японії. Місце (n), де можна відпочити.'
    speakers:
      - Ботанік (botanist)
      - Студент
    motivation: 'Означальні речення: який/яка/яке, що, де, куди з іменниками дерево (n), квітка (f), місце (n)'
content_outline:
  - section: "Означальні підрядні речення"
    words: 750
    points:
      - "Визначення із підручника Заболотного (8 клас, с. 84): означальна підрядна частина характеризує іменник (або займенник) у головній частині і відповідає на питання який? яка? яке? які? чий? Місто, яке я відвідав, мене вразило. Людина, яка багато читає, має широкий кругозір."
      - "Означальна підрядна частина стосується КОНКРЕТНОГО іменника (означуваного слова) у головній частині і завжди стоїть ПІСЛЯ цього іменника: Книга, яку я прочитав, лежить на столі. А не: *Яку я прочитав, книга лежить на столі. (граматична помилка)."
      - "Зв'язок із M59 (дієприкметниковий зворот): Книга, прочитана мною, лежить на столі. (дієприкметниковий зворот) = Книга, яку я прочитав, лежить на столі. (означальне речення). В українському розмовному мовленні підрядне речення є НАБАГАТО ПРИРОДНІШИМ."
  - section: "Який у різних відмінках"
    words: 900
    points:
      - "Відносний займенник який відмінюється як прикметник і повинен узгоджуватися зі своїм антецедентом у роді та числі, але його ВІДМІНОК визначається синтаксичною роллю в підрядній частині: Н.в.: Студент, який вивчає українську, живе в Києві. (який = підмет). Р.в.: Студент, якого я знаю, живе в Києві. (якого = додаток). Д.в.: Студент, якому я допоміг, живе в Києві. (якому = непрямий додаток). Зн.в.: Книга, яку я прочитав, лежить на столі. (яку = прямий додаток). Ор.в.: Людина, якою я захоплююсь, живе далеко. (якою = орудний відмінок). М.в.: Місто, в якому я живу, дуже красиве. (в якому = обставина місця)."
      - "Узгодження в роді та числі: Хлопець, який... (ч.р., одн.) Дівчина, яка... (ж.р., одн.) Місто, яке... (с.р., одн.) Люди, які... (мн.). Відмінок слова який залежить від підрядної частини, а не від головного речення: Я знаю людину (Зн.в.), яка (Н.в.) тут працює. (людину у Зн.в. через знаю, яка у Н.в. тому що це підмет)."
      - "Практика: доповнити 12 речень, обравши правильну форму займенника який (правильний рід/число від антецедента, правильний відмінок від синтаксичної функції)."
  - section: "Інші сполучні слова в означальних"
    words: 650
    points:
      - "Що як альтернатива слову який (розмовно/нейтрально): Книга, що лежить на столі... = Книга, яка лежить на столі... Слово що не відмінюється і підходить для всіх родів, чисел і відмінків: Хлопець, що прийшов... Дівчина, що прийшла... Проте що не вживається з прийменниками: НЕ *місто, в що я живу."
      - "Де/куди/коли/звідки для позначення місця та часу: Місто, де я живу... (= в якому я живу) Країна, куди я їду... (= в яку я їду) День, коли ми зустрілися... (= в який ми зустрілися). Ці варіанти часто простіші та природніші, ніж який із прийменником."
      - "Чий для вираження приналежності: Людина, чию книгу я читаю... (= якої книгу я читаю). Практика: обрати між який, що, де, куди, коли у 8 реченнях."
  - section: "Пунктуація та позиція"
    words: 600
    points:
      - "Правило: означальна підрядна частина ЗАВЖДИ виділяється комами: Місто, яке я відвідав, мене вразило. На відміну від дієприкметникового звороту, позиція не змінює пунктуації — означальне речення завжди стоїть у постпозиції до свого іменника."
      - "Кілька означальних частин в одному реченні: Студент, який вивчає мову, яку я викладаю, отримав стипендію. (вкладені: який стосується студент, яку стосується мову)."
      - "Практика: розставити коми у 8 реченнях з означальними частинами."
  - section: "Практика: означальні у мовленні"
    words: 700
    points:
      - 'Високочастотні розмовні моделі: Це людина, яка... / Це місце, де... / Це час, коли... Опис людей, місць та подій за допомогою означальних речень. Діалог із природним використанням у контексті.'
      - "Продукція: учні описують 5 людей/місць/речей, використовуючи означальні речення. У кожному з них слід використати який у різних відмінках."
      - "Вправа на порівняння: перефразувати 5 означальних речень як дієприкметникові звороти (де це можливо) і визначити, який варіант звучить природніше."
  - section: "Підсумок та перехід до M69"
    words: 400
    points:
      - 'Підсумок: означальні = який?/яка?/яке?/які? Займенник який відмінюється за родами і числами (від антецедента) та за відмінками (від функції в підрядній частині). Альтернативи: що (незмінне), де/куди/коли (для місця/часу). Завжди виділяються комами. Самоперевірка: Я правильно вживаю який у відмінках ✓/✗.'
      - "Анонс: M69 — Часові речення. Коли події відбуваються одна відносно одної: коли, поки, доки, щойно."
vocabulary_hints:
  required:
    - "означальне речення (attributive/relative clause)"
    - "який/яка/яке/які (which/that — relative pronoun, declines)"
    - "означуване слово (antecedent — noun the clause describes)"
    - "сполучне слово (connective word — який, що, де, куди, коли)"
    - "відмінок (case — determines the form of який in the clause)"
  recommended:
    - "чий (whose — possessive relative pronoun)"
    - "котрий (which — literary synonym of який)"
    - "антецедент (antecedent — formal term for означуване слово)"
    - "постпозиція (postposition — clause always after the noun)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про означальні підрядні речення і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Який у різних відмінках»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему означальні підрядні речення."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему який у різних відмінках."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Означальні підрядні речення»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Який у різних відмінках» з їхніми визначеннями."
