grammar:
  - "Означальні підрядні речення: відповідають на який? яка? яке? які?"
  - "Який: відмінювання за родом/числом (від антецедента) та відмінком (від ролі в підрядному реченні)"
  - "Альтернативні сполучні слова: що (незмінне), де, куди, коли, чий"
  - "Пунктуація: означальне речення завжди виділяється комами"
  - "Порівняння з дієприкметниковим зворотом"
register: науково-навчальний
references:
  - title: "Заболотний Grade 8, p.84-94"
    notes: "Означальні підрядні речення: визначення, відмінювання займенника який, позиція відносно означуваного слова."
  - title: "Ворон Grade 9, p.57-69"
    notes: "Означальні речення: що як альтернатива, де/куди/коли, вкладені означальні речення."
  - title: "Авраменко Grade 7, p.176"
    notes: "Підрядні означальне, з'ясувальне: повторення класифікації, залежність від конкретних слів у головному реченні."