content_outline:
- section: 'Вступ: Система дієслова (Introduction: The Verb System)'
  words: 400
  points:
  - The transition from 'learning language' to 'learning ABOUT language' at B1 — why mastering Ukrainian grammar terminology
    is necessary for reading independent study guides.
  - 'Alignment with Ukrainian State Standard §4.2.3.1: Introducing ''Дійсний спосіб'' and the three basic tenses (Час) and
    two aspects (Вид).'
  - Concept of 'Metalanguage Bridge' — using high-frequency grammar terms to decode complex rules in Ukrainian textbooks.
- section: Категорія виду та «внутрішній час» (The Category of Aspect and «Internal Time»)
  words: 800
  points:
  - 'Core terminology: вид, доконаний вид, недоконаний вид. Emphasize their role as qualitative markers of action.'
  - 'The philosophy of aspect: Aspect as ''internal time'' (process vs result) rather than linear position. Identifying ''видова
    пара'' (aspectual pair) as a fundamental unit.'
  - 'Learner error: ''Я прочитаю зараз'' — explain that perfective aspect cannot have a present tense form because a ''result''
    cannot exist in the exact moment of speech. Correct to ''Я читаю зараз''.'
- section: 'Поняття дії: Процес та результат (Action Concepts: Process and Result)'
  words: 600
  points:
  - 'Essential keywords in grammar instructions: дія (action), процес (process), результат (result). Visualizing the contrast:
    Process (->) vs Result (.|).'
  - 'Descriptive terminology: тривалість (duration), повторення (repetition), завершеність (completion). Using these terms
    to justify aspect choices.'
  - 'Common collocations used in grammar guides: ''завершена дія'' (completed action), ''тривала дія'' (ongoing action), ''повторювана
    дія'' (repeated action).'
- section: Категорія часу та багатство форм майбутнього (The Category of Tense and Richness of Future Forms)
  words: 900
  points:
  - 'Standard tense names: час, теперішній час, минулий час, майбутній час. Practice using the collocation ''зміна часу''
    (change of tense).'
  - 'Cultural Hook: The unique wealth of the Ukrainian future tense. Contrast ''складена форма'' (буду писати) with the ''синтетична
    форма'' (писатиму). Explain that the synthetic form is ancient and uniquely Ukrainian, adding ''милозвучність'' (melodiousness)
    and stylistic flexibility.'
  - 'Learner error: ''Буду прочитати'' — drilling the categorical rule that the auxiliary ''буду'' is ONLY used with imperfective
    verbs. Contrast with the synthetic perfective future (''прочитаю'').'
- section: Термінологія заперечення та заборони (Negation and Prohibition Terminology)
  words: 600
  points:
  - 'Defining negation: заперечення, загальне заперечення, заперечна частка ''не''.'
  - 'Learner error: ''Не відкрий'' (Don''t open). Explain the ''Prohibition vs Warning'' rule: Prohibition (заборона) strictly
    requires the Imperfective aspect (''Не відкривай'').'
  - The terminology of warning/caution (попередження/застереження) — why 'Не відкрий (випадково)' uses the perfective to emphasize
    the undesired result.
- section: Граматична метамова та читання довідників (Grammatical Metalanguage and Reading Reference Guides)
  words: 400
  points:
  - 'Advanced verb terms: спосіб (mood), дійсний спосіб (indicative), початкова форма (infinitive), особова форма (personal
    form).'
  - 'Navigating instructions: Decoding words like ''дієвідмінювання'' (conjugation) and ''парадигма'' (paradigm) in authentic
    grammar texts.'
  - Identifying the register transition from conversational classroom talk to academic grammatical description.
- section: Практикум та підсумок (Workshop and Summary)
  words: 300
  points:
  - 'Functional integration: Mini-dialogues between students/teachers using terms like ''Який це вид?'' or ''Це правильна
    форма?''.'
  - Summary of action concepts and readiness for M03 (Reading Grammar Rules).
vocabulary_hints:
  required:
  - 'вид (aspect) — high frequency; collocations: доконаний вид, недоконаний вид, видова пара, зміна виду'
  - доконаний вид (perfective aspect) — denotes completion (результат дії, завершена дія)
  - недоконаний вид (imperfective aspect) — denotes process or duration (тривалість, процес, повторення)
  - 'час (tense) — collocations: теперішній час, минулий час, майбутній час, зміна часу'
  - 'форма (form) — collocations: початкова форма (infinitive), особова форма, складена форма, синтетична форма'
  - 'дія (action) — collocations: завершена дія, тривала дія, результат дії, повторювана дія'
  - заперечення (negation) — associated with particle 'не', affects aspect choice in prohibition
  - заборона (prohibition) — a specific speech act requiring the imperfective aspect
  recommended:
  - процес (process) — key keyword for identifying imperfective aspect in Ukrainian grammar guides
  - результат (result) — key keyword for identifying perfective aspect in Ukrainian grammar guides
  - тривалість (duration) — explains why the imperfective aspect is chosen for ongoing states
  - повторення (repetition) — explains why the imperfective aspect is chosen for habits
  - складена форма (compound form) — 'буду писати' (imperfective only, analytic)
  - синтетична форма (synthetic form) — 'писатиму' (imperfective only, uniquely Ukrainian synthetic future)
  - 'спосіб (mood) — collocations: дійсний спосіб, наказова форма (imperative form)'
  - попередження (warning/caution) — context where 'не' can be used with the perfective aspect
