module: b1-02
level: B1
sequence: 2
slug: language-about-verbs
version: '2.0'
title: Мова про дієслова
subtitle: Verb-specific terminology for aspect and tense
content_outline:
- section: Introduction - The Verb System
  points:
  - Why verb terminology matters for B1 — transition to reading grammar guides in
    Ukrainian (words about words)
  - Overview of what we'll learn — aligned with State Standard §4.2.3.1 (Real Mode,
    Tense, Aspect)
  - Connection to aspect mastery in B1.1
- section: Aspect Terms (Вид дієслова)
  points:
  - 'вид, доконаний вид, недоконаний вид — collocations: видова пара, зміна виду'
  - How aspect terms are used in grammar explanations — philosophy of 'Internal Time'
    (quality of action)
  - 'Practice identifying aspect in examples — learner error: ''Я прочитаю зараз''
    (using perfective for present action)'
- section: Action Concepts
  points:
  - 'дія, процес, результат — visual contrast: Process (->) vs Result (.|)'
  - 'тривалість, повторення — collocations: завершена дія, тривала дія, повторювана
    дія'
  - Using these terms to explain aspect choice
- section: Tense Terms (Час дієслова)
  points:
  - 'час, теперішній час, минулий час, майбутній час — collocation: зміна часу'
  - Compound vs simple tense descriptions
  - Reading tense explanations
- section: Negation Terminology
  points:
  - 'заперечення, загальне заперечення — collocation: частка ''не'''
  - 'очікувана дія, попередження, заборона — learner error: ''Не відкрий'' (using
    Perfective for Prohibition instead of Imperfective)'
  - How negation affects aspect choice
- section: Additional Verb Terms
  points:
  - Moods (imperative, conditional) — introduce term 'спосіб' (дійсний, умовний, наказовий)
  - Voice (active, passive) — active as default for B1
  - Infinitive and conjugation basics — term 'початкова форма'
- section: Verb Form Terminology
  points:
  - 'складна форма, синтетична форма — cultural hook: Synthetic future (''писатиму'')
    is ancient and uniquely Ukrainian, adding stylistic flexibility vs Russian'
  - наказова форма, дієвідмінювання, парадигма
  - 'Recognizing these terms in grammar texts — learner error: ''Буду прочитати''
    (attempting compound future with perfective verb)'
- section: Practice Reading Grammar Explanations
  points:
  - Reading real grammar texts — identifying key terms (вид, час, форма) in context
  - Pattern recognition in instructions
- section: Mini-Dialogues
  points:
  - Terminology in conversation — asking 'Який це вид?' or 'Це правильна форма?'
  - Teacher-student interactions
  - Student-student study talk
- section: Summary and Practice
  points:
  - Integration of all verb terminology
  - Readiness for M03
vocabulary_hints:
  required:
  - 'вид (aspect) — collocations: доконаний вид, недоконаний вид, видова пара'
  - доконаний вид (perfective aspect) — denotes result, completion (результат дії)
  - недоконаний вид (imperfective aspect) — denotes process, duration (тривалість,
    процес)
  - 'час (tense) — collocations: теперішній час, минулий час, майбутній час'
  - теперішній час (present tense) — only possible for imperfective aspect
  - минулий час (past tense) — forms for gender and number
  - майбутній час (future tense) — compound (буду...) vs synthetic (...му) forms
  - 'дія (action) — collocations: завершена дія, тривала дія'
  - процес (process) — key keyword for imperfective aspect
  - результат (result) — key keyword for perfective aspect
  - заперечення (negation) — associated with particle 'не', often requires imperfective
  - наказова форма (imperative form) — distinguishing prohibition vs warning
  recommended:
  - тривалість (duration) — explains why imperfective is used
  - повторення (repetition) — explains why imperfective is used
  - загальне заперечення (general negation) — simply stating a fact didn't happen
  - складна форма (compound form) — 'буду писати' (only imperfective)
  - синтетична форма (synthetic form) — 'писатиму' (only imperfective), stylistically
    rich
  - 'форма (form) — collocations: початкова форма, особова форма'
