grammar:
- 'Дієприслівник: незмінювана дієслівна форма, роль обставини'
- 'Творення: -учи/-ючи (I дієвідміна), -ачи/-ячи (II дієвідміна)'
- 'Зворотні дієприслівники: -учись/-ючись, -ачись/-ячись'
- Одночасність дії з основним дієсловом
- 'Правило логічного підмета: дієприслівник і основне дієслово мають спільний підмет'
- 'Синтаксична роль: обставина способу дії, часу, причини, умови'
