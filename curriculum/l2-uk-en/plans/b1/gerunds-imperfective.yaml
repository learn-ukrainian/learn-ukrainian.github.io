grammar:
  - "Дієприслівник: незмінювана дієслівна форма, роль обставини"
  - "Formation: -учи/-ючи (I дієвідміна), -ачи/-ячи (II дієвідміна)"
  - "Зворотні дієприслівники: -учись/-ючись, -ачись/-ячись"
  - "Одночасність дії з основним дієсловом"
  - "Logical subject rule: gerund and main verb share the subject"
  - "Syntactic role: обставина способу дії, часу, причини, умови"
