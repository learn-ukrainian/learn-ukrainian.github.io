module: b1-069
level: B1
sequence: 69
slug: gerunds-imperfective
version: 3.1.2
title: Дієприслівники недоконаного виду
subtitle: 'Додаткова дія, одночасна з основною: читаючи, слухаючи'
focus: grammar
pedagogy: PPP
phase: B1.6 [Дієприкметники та дієприслівники]
word_target: 4000
objectives:
- Учень вміє визначати дієприслівник як незмінювану форму дієслова, що виражає додаткову дію і відповідає
  на питання що роблячи?
- Учень вміє утворювати дієприслівники недоконаного виду за допомогою суфіксів -учи/-ючи (I дієвідміна)
  та -ачи/-ячи (II дієвідміна)
- 'Учень вміє розрізняти дієприслівник та дієприкметник: дієприслівник є обставиною, дієприкметник — означенням'
- 'Учень вміє правильно визначати логічний підмет: дієприслівник та основне дієслово повинні стосуватися
  одного підмета'
- Учень вміє вживати дієприслівники недоконаного виду для вираження одночасних дій в усному та писемному
  українському мовленні
dialogue_situations:
- setting: 'Ранкова пробіжка набережною Дніпра (m) — опис одночасних дій: Біжучи, слухаю музику. Переходячи
    міст (m), бачу схід сонця (m). Дихаючи свіжим повітрям (n), почуваюся живим.'
  speakers:
  - Бігун
  - Друг
  motivation: 'Дієприслівники недоконаного виду: біжучи, переходячи, дихаючи — одночасні дії'
content_outline:
- section: Що таке дієприслівник?
  words: 750
  points:
  - 'Визначення з підручника Литвінової, 7 клас, с.114: дієприслівник — це незмінювана форма дієслова,
    яка означає додаткову дію й відповідає на питання що роблячи? що зробивши? Він поєднує ознаки дієслова
    (вид, час, перехідність) і прислівника (незмінюваність, роль обставини в реченні).'
  - 'Порівняння з дієприкметником: Дієприкметник = ознака предмета за дією → означення (який?): Читаюча
    дівчина... Дієприслівник = додаткова дія → обставина (як? коли? чому?): Читаючи, дівчина усміхалася.
    Ключова відмінність: дієприкметник подібний до прикметника, дієприслівник — до прислівника.'
  - 'Правило логічного підмета: дієприслівник і присудок повинні мати СПІЛЬНИЙ підмет. Той, хто виконує
    додаткову дію, Є ТИМ САМИМ, хто виконує основну дію: Читаючи книгу, Марія усміхалася. (Марія читає
    І усміхається — правильно). *Читаючи книгу, мені стало цікаво. (ніхто не читає — НЕПРАВИЛЬНО, логічний
    підмет слова ''читаючи'' незрозумілий).'
- section: Творення дієприслівників недоконаного виду
  words: 750
  points:
  - 'Творення за підручниками Литвінової (7 клас, с.118) та Заболотного (7 клас, с.131): I дієвідміна:
    основа теперішнього часу + -учи/-ючи: читати → читають → читаючи, нести → несуть → несучи, писати
    → пишуть → пишучи, бігти → біжать → біжучи. II дієвідміна: основа теперішнього часу + -ачи/-ячи: стояти
    → стоять → стоячи, лежати → лежать → лежачи, бачити → бачать → бачачи, говорити → говорять → говорячи.'
  - 'Важливо: дієприслівники недоконаного виду виражають дію, одночасну з основною. Дія дієприслівника
    відбувається ОДНОЧАСНО з дією основного дієслова: Слухаючи музику, я працюю. Гуляючи парком, ми розмовляли.
    Ця одночасність є головною семантичною рисою.'
  - 'Не всі дієслова утворюють дієприслівники. З підручника Авраменка, 7 клас, с.123: дієслова без форм
    теперішнього часу, дієслова на зразок бути (будучи існує, але вживається рідко). Практика: утворити
    дієприслівники від 12-15 дієслів, включаючи дієслова з чергуванням приголосних в основі теперішнього
    часу (писати → пишуть → пишучи, сидіти → сидять → сидячи).'
  - 'Зворотні дієприслівники: частка -ся зберігається після суфікса: усміхатися → усміхаючись, дивитися
    → дивлячись, навчатися → навчаючись. Зверніть увагу: -сь (а не -ся) вживається після голосного.'
- section: Дієприслівник як обставина
  words: 650
  points:
  - 'Синтаксична роль: дієприслівник ЗАВЖДИ є обставиною в реченні. Типи обставин: Обставина способу дії:
    Він ішов усміхаючись. Обставина часу: Снідаючи, я читаю новини. Обставина причини: Хвилюючись за дітей,
    мати не спала. Обставина умови: Працюючи разом, ми досягнемо більшого.'
  - 'Місце в реченні: гнучке, але розташування впливає на акценти. Читаючи газету, батько пив каву. (акцент
    на читанні). Батько, читаючи газету, пив каву. (вставлено всередину — збалансовано). Батько пив каву,
    читаючи газету. (акцент на питті кави). Всі три варіанти граматично правильні.'
  - 'Практика: визначити тип обставини для заданих дієприслівників у реченнях та поекспериментувати з
    їх перестановкою.'
- section: Поширені помилки та практика
  words: 650
  points:
  - 'Дієприслівниковий зворот без логічного підмета (найпоширеніша помилка): *Їдучи в автобусі, мені зателефонували.
    (Хто їде? Незрозуміло.) → Їдучи в автобусі, я отримав дзвінок. *Слухаючи музику, кімната наповнилася
    звуками. → Слухаючи музику, я помітив, як кімната наповнилася звуками.'
  - 'Дієприслівник проти підрядного речення: Читаючи книгу, я думав про автора. = Коли я читав книгу,
    я думав про автора. Дієприслівник більш стислий; підрядне речення природніше в усному мовленні. Учні
    мають опанувати обидва варіанти й обирати їх залежно від стилю.'
  - 'Текст для читання з дієприслівниками: опис розпорядку дня людини з використанням дієприслівників
    для показу одночасних дій. Учні знаходять усі дієприслівники, перевіряють узгодження логічного підмета
    та перетворюють деякі дієприслівники на підрядні речення.'
- section: Дієприслівник у різних стилях мовлення
  words: 500
  points:
  - 'Розподіл за стилями з §4.2.3.1 Державного стандарту: дієприслівники недоконаного виду продуктивні
    в художньому, науковому та публіцистичному стилях, але рідкісні в розмовному. У повсякденному спілкуванні
    українці віддають перевагу підрядним реченням: Коли я йшов додому... (а не Ідучи додому...). Наявність
    дієприслівника є ознакою писемного, освіченого стилю мовлення.'
  - 'Текстові моделі: дієприслівники як засоби зв''язку речень у художній прозі. Вони створюють плавність
    переходу між діями без повторення підмета: Андрій вийшов з дому. Ідучи вулицею, він думав про розмову.
    Наближаючись до парку, почув музику. Кожен дієприслівник плавно розвиває розповідь. Порівняйте з уривчастим
    альтернативним варіантом: Він ішов вулицею. Він думав про розмову.'
  - 'Лексикалізовані форми дієприслівників, які функціонують як прислівники або прийменники: незважаючи
    (на), починаючи (з), включаючи. Вони втратили своє дієслівне значення і НЕ вимагають узгодження з
    логічним підметом: Незважаючи на дощ, концерт відбувся. (немає проблеми з підметом — ця форма є прийменником).'
- section: Читання та розширена практика
  words: 500
  points:
  - 'Розширений текст для читання: український тревелог або есе про природу (8-10 речень) із використанням
    дієприслівників недоконаного виду для опису одночасних подій. Приклад теми: похід у Карпати. Учні:
    1. Знаходять усі дієприслівники. 2. Класифікують їх за типом обставини. 3. Перевіряють узгодження
    логічного підмета. 4. Перетворюють 3 дієприслівники на підрядні речення та оцінюють, який варіант
    звучить краще.'
  - 'Вправа на зіставлення з підручника Авраменка, 7 клас, с.123: пари речень — одне з дієприслівником,
    одне з підрядним реченням. Учні вирішують, що є більш природним для заданого регістру (офіційний лист,
    невимушена розмова, репортаж, художній текст). Розвиває стилістичну чуйність разом із граматичною
    компетентністю.'
  - 'Творче завдання: учні пишуть абзац (6-8 речень), описуючи свою дорогу на роботу або прогулянку містом.
    Вони мають природно використати щонайменше 4 дієприслівники недоконаного виду, урізноманітнюючи типи
    обставин (способу дії, часу, причини). Чек-лист для взаємоперевірки: Чи правильні всі логічні підмети?
    Чи є серед дієприслівників російські кальки? Чи природно звучить текст?'
- section: Підсумок та перехід до M62
  words: 400
  points:
  - 'Підсумок: дієприслівник недоконаного виду = додаткова дія, одночасна з основною. Суфікси: -учи/-ючи
    (I дієвідміна), -ачи/-ячи (II дієвідміна). Незмінювана форма. Виступає в ролі обставини. Логічний
    підмет має бути спільним. Самоперевірка: Я можу утворити дієприслівники ✓/✗, Я перевіряю спільність
    підмета ✓/✗.'
  - 'Узагальнювальна таблиця: алгоритм творення (дієслово → 3-тя особа множини теперішнього часу → відкинути
    -ть → додати -чи; для зворотних → додати -сь). Короткий довідник із 8 зразками дієслів обох дієвідмін,
    включаючи зворотні форми.'
  - 'Анонс: M62 — Дієприслівники доконаного виду. Додаткова дія, що відбувається ПЕРЕД основною дією:
    прочитавши книгу, я віддав її.'
vocabulary_hints:
  required:
  - дієприслівник (adverbial participle/gerund — unchangeable verb form)
  - недоконаний вид (imperfective aspect — ongoing/repeated action)
  - читаючи (while reading — imperfective gerund)
  - слухаючи (while listening — imperfective gerund)
  - пишучи (while writing — imperfective gerund)
  - говорячи (while speaking — imperfective gerund)
  - обставина (adverbial modifier — syntactic role of the gerund)
  - додаткова дія (secondary/additional action)
  - одночасність (simultaneity — actions happening at the same time)
  - логічний підмет (logical subject — must be shared)
  recommended:
  - незмінюваний (invariable — does not decline or conjugate)
  - усміхаючись (while smiling — reflexive gerund)
  - дивлячись (while watching — reflexive gerund)
  - стоячи (while standing — from II дієвідміна)
  - біжучи (while running — from бігти)
  - сидячи (while sitting — from сидіти)
  - хвилюючись (while worrying — reflexive gerund)
