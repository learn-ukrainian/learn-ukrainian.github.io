  - type: fill-in
    focus: "Form imperfective gerunds from given verbs using correct suffixes"
    items: 10
  - type: quiz
    focus: "Is the gerund used correctly? Check logical subject alignment"
    items: 8
  - type: match-up
    focus: "Match gerunds to their base verbs and identify the дієвідміна"
    items: 8
  - type: error-correction
    focus: "Fix dangling gerund errors by aligning logical subjects"
    items: 8
  - type: sentence-builder
    focus: "Combine two actions into one sentence using a gerund for simultaneity"
    items: 6
