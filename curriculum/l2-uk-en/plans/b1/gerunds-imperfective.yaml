module: b1-057
level: B1
sequence: 57
slug: gerunds-imperfective
version: '3.1'
title: "Дієприслівники недоконаного виду"
subtitle: "Додаткова дія, одночасна з основною: читаючи, слухаючи"
focus: grammar
pedagogy: PPP
phase: "B1.6 [Participles & Gerunds]"
word_target: 4000
objectives:
  - "Learner can define дієприслівник as an unchangeable verb form that expresses
    a secondary action and answers the question що роблячи?"
  - "Learner can form imperfective gerunds using суфікси -учи/-ючи (I дієвідміна)
    and -ачи/-ячи (II дієвідміна)"
  - "Learner can distinguish дієприслівник from дієприкметник: дієприслівник is an
    обставина (adverb-like), дієприкметник is an означення"
  - "Learner can correctly identify the logical subject: the дієприслівник and the
    main verb must share the same subject"
  - "Learner can use imperfective gerunds to express simultaneous actions in both
    spoken and written Ukrainian"
dialogue_situations:
  - setting: 'Morning jog along the Дніпро (m) embankment — describing simultaneous
      actions: Біжучи (while running), слухаю музику. Переходячи (while crossing)
      міст (m, bridge), бачу схід сонця (m, sunrise). Дихаючи (breathing) свіжим повітрям
      (n, air), почуваюся живим.'
    speakers:
      - Бігун (runner, narrating)
      - Друг (слухає)
    motivation: 'Imperfective gerunds: біжучи, переходячи, дихаючи — simultaneous
      actions'
content_outline:
  - section: "Що таке дієприслівник?"
    words: 750
    points:
      - "Definition from Литвінова Grade 7 p.114: дієприслівник — це незмінювана форма
        дієслова, яка означає додаткову дію й відповідає на питання що роблячи? що
        зробивши? Combines ознаки дієслова (вид, час, перехідність) i прислівника
        (незмінюваність, роль обставини в реченні)."
      - "Contrast with дієприкметник: Дієприкметник = ознака предмета за дією → означення
        (який?): Читаюча дівчина... (the girl who is reading — describes the noun).
        Дієприслівник = додаткова дія → обставина (як? коли? чому?): Читаючи, дівчина
        усміхалася. (while reading, the girl smiled — describes HOW/WHEN the main
        action happened). Key: дієприкметник → adjective-like, дієприслівник → adverb-like."
      - "The logical subject rule: дієприслівник and the присудок must share the SAME
        subject. The person doing the secondary action IS the person doing the main
        action: Читаючи книгу, Марія усміхалася. (Марія reads AND smiles — correct)
        *Читаючи книгу, мені стало цікаво. (nobody reads — WRONG, the logical subject
        of 'читаючи' is unclear)."
  - section: "Творення дієприслівників недоконаного виду"
    words: 750
    points:
      - "Formation from Литвінова Grade 7 p.118 and Заболотний Grade 7 p.131: I дієвідміна:
        основа теперішнього часу + -учи/-ючи: читати → читають → читаючи, нести →
        несуть → несучи, писати → пишуть → пишучи, бігти → біжать → біжучи. II дієвідміна:
        основа теперішнього часу + -ачи/-ячи: стояти → стоять → стоячи, лежати → лежать
        → лежачи, бачити → бачать → бачачи, говорити → говорять → говорячи."
      - "Important: дієприслівники недоконаного виду виражають дію, одночасну з основною.
        The gerund action happens AT THE SAME TIME as the main verb action: Слухаючи
        музику, я працюю. (I work WHILE listening to music.) Гуляючи парком, ми розмовляли.
        (We talked WHILE walking in the park.) This simultaneity is the key semantic
        feature."
      - "Not all verbs form дієприслівники. From Авраменко Grade 7 p.123: verbs without
        present tense forms, verbs like бути (будучи exists but is rare). Practice:
        form gerunds from 12-15 verbs, including verbs with consonant alternations
        in the present tense stem (писати → пишуть → пишучи, сидіти → сидять → сидячи)."
      - "Reflexive gerunds: -ся remains after the suffix: усміхатися → усміхаючись,
        дивитися → дивлячись, навчатися → навчаючись. Note: -сь (not -ся) after vowel."
  - section: "Дієприслівник як обставина"
    words: 650
    points:
      - "Syntactic role: дієприслівник is ALWAYS an обставина in the sentence. Types
        of circumstance it expresses: Обставина способу дії (manner): Він ішов усміхаючись.
        (How? — smiling.) Обставина часу (time): Снідаючи, я читаю новини. (When?
        — while having breakfast.) Обставина причини (reason): Хвилюючись за дітей,
        мати не спала. (Why? — worrying.) Обставина умови (condition): Працюючи разом,
        ми досягнемо більшого. (Under what condition?)"
      - "Position in the sentence: flexible, but placement affects emphasis. Читаючи
        газету, батько пив каву. (emphasis on reading) Батько, читаючи газету, пив
        каву. (embedded — balanced) Батько пив каву, читаючи газету. (emphasis on
        coffee drinking) All three are grammatically correct."
      - "Practice: determine the type of обставина for given дієприслівники in sentences,
        and experiment with repositioning them."
  - section: "Поширені помилки та практика"
    words: 650
    points:
      - "Dangling gerund (найпоширеніша помилка): *Їдучи в автобусі, мені зателефонували.
        (Who is riding? Not clear.) → Їдучи в автобусі, я отримав дзвінок. (I am riding
        AND receiving.) *Слухаючи музику, кімната наповнилася звуками. → Слухаючи
        музику, я помітив, як кімната наповнилася звуками."
      - "Gerund vs subordinate clause equivalent: Читаючи книгу, я думав про автора.
        = Коли я читав книгу, я думав про автора. The gerund is more concise; the
        clause is more natural in speech. Learners should master both and choose based
        on register."
      - "Reading passage with gerunds: a description of a person's daily routine using
        дієприслівники to show simultaneous actions. Learners identify all gerunds,
        check logical subject alignment, and transform selected gerunds into subordinate
        clauses."
  - section: "Дієприслівник у різних стилях мовлення"
    words: 500
    points:
      - "Register distribution from §4.2.3.1 State Standard: imperfective gerunds are
        productive in художній, науковий, and публіцистичний styles but rare in розмовний.
        In everyday speech, Ukrainians prefer subordinate clauses: Коли я йшов додому...
        (not Ідучи додому...). The gerund form signals written, educated register."
      - "Discourse patterns: gerunds as sentence connectors in narrative prose. They
        create flow between actions without repeating the subject: Андрій вийшов з дому.
        Ідучи вулицею, він думав про розмову. Наближаючись до парку, почув музику. Each
        gerund advances the narrative smoothly. Compare with choppy alternative: Він
        ішов вулицею. Він думав про розмову."
      - "Lexicalized gerund forms that function as prислівники or прийменники: незважаючи
        (на) (despite — from зважати), починаючи (з) (starting from — from починати),
        включаючи (including — from включати). These have lost their verbal force and
        do NOT require logical subject alignment: Незважаючи на дощ, концерт відбувся.
        (no dangling issue — the form is a прийменник)."
  - section: "Читання та розширена практика"
    words: 500
    points:
      - "Extended reading passage: a Ukrainian travelogue or nature essay (8-10 sentences)
        using imperfective gerunds to describe simultaneous experiences. Example theme:
        hiking in the Карпати. Learners: 1. Identify all дієприслівники. 2. Classify
        by type of обставина. 3. Verify logical subject alignment. 4. Transform 3 gerunds
        into subordinate clauses and evaluate which version reads better."
      - "Contrastive exercise from Авраменко Grade 7 p.123: pairs of sentences — one
        with a gerund, one with a clause. Learners decide which is more natural for
        the given register (formal letter, casual conversation, news report, literary
        text). Builds register awareness alongside grammatical competence."
      - "Production task: learners write a paragraph (6-8 sentences) describing their
        commute or a walk through their city. They must use at least 4 imperfective
        gerunds naturally, varying the type of обставина (manner, time, reason). Peer
        review checklist: Are all logical subjects correct? Is any gerund a Russian
        calque? Does the text flow naturally?"
  - section: "Підсумок та перехід до M62"
    words: 400
    points:
      - "Summary: дієприслівник недоконаного виду = додаткова дія, одночасна з основною.
        Суфікси: -учи/-ючи (I), -ачи/-ячи (II). Незмінюваний. Роль обставини. Логічний
        підмет = спільний. Self-check: Я можу утворити дієприслівники ✓/✗, Я перевіряю
        спільність підмета ✓/✗."
      - "Consolidation table: formation algorithm (verb → 3rd person plural present →
        drop -ть → add -чи; for reflexive → add -сь). Quick-reference with 8 model
        verbs across both дієвідміни, including reflexive examples."
      - "Preview: M62 — Дієприслівники доконаного виду. Secondary action that happens
        BEFORE the main action: прочитавши книгу, я віддав її."
vocabulary_hints:
  required:
    - "дієприслівник (adverbial participle/gerund — unchangeable verb form)"
    - "недоконаний вид (imperfective aspect — ongoing/repeated action)"
    - "читаючи (while reading — imperfective gerund)"
    - "слухаючи (while listening — imperfective gerund)"
    - "пишучи (while writing — imperfective gerund)"
    - "говорячи (while speaking — imperfective gerund)"
    - "обставина (adverbial modifier — syntactic role of the gerund)"
    - "додаткова дія (secondary/additional action)"
    - "одночасність (simultaneity — actions happening at the same time)"
    - "логічний підмет (logical subject — must be shared)"
  recommended:
    - "незмінюваний (invariable — does not decline or conjugate)"
    - "усміхаючись (while smiling — reflexive gerund)"
    - "дивлячись (while watching — reflexive gerund)"
    - "стоячи (while standing — from II дієвідміна)"
    - "біжучи (while running — from бігти)"
    - "сидячи (while sitting — from сидіти)"
    - "хвилюючись (while worrying — reflexive gerund)"
