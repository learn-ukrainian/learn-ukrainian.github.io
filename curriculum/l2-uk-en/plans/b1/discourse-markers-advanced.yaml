module: b1-57
level: B1
sequence: 57
slug: discourse-markers-advanced
version: '2.0'
title: 'Дискурсивні маркери II: складна організація'
subtitle: 'Discourse Markers II: Advanced Text Organization'
content_outline:
- section: Вступ
  points:
  - Beyond basic connectors — alignment with State Standard §4.4.2/§4.5.1 regarding
    inserted words and complex sentences
  - 'Academic writing needs — cultural hook: reference the Kyiv-Mohyla Academy rhetoric
    tradition where clear speech was a sign of wisdom'
  - Complex argument structure — moving from simple sentences to organized discourse
- section: Вивчення слів
  points:
  - Six vocabulary groups — covering ordering (по-перше), adding (крім того), contrasting
    (проте), and concluding (отже)
  - Sequence, addition, contrast — emphasis on paired markers like «з одного боку...
    з іншого боку»
  - 'Cause-effect, conclusions, clarification — visualize decision logic (flowchart
    approach: Adding? → крім того; Contrasting? → проте)'
- section: Вживання
  points:
  - Building argumentation — use 'Keynote Speaker' persona to model persuasive structure
  - Formal vs informal register — clearly differentiate formal (таким чином, отже)
    from conversational (ну, до речі, словом)
  - 'Common errors, combining markers — warn against: Register Mismatch (slang ''короче''
    in formal contexts), Punctuation Omission (missing commas), Russian Interference
    (''во-пєрвих''), and Broken Pairs'
- section: Читання
  points:
  - Analytical article — framed as 'How to win a debate' or 'Structuring a winning
    presentation'
  - Conference presentation — utilizing modern parliamentary debate markers (шановне
    товариство, дозвольте зауважити)
- section: Діалоги
  points:
  - Project presentation (formal) — practicing authority markers
  - Discussing plans (informal) — contrasting with formal register
  - Academic discussion, interview — using summary markers like «підсумовуючи» and
    «нарешті»
- section: Підсумок
  points:
  - Key markers recap
  - Practice recommendations
vocabulary_hints:
  required:
  - по-перше (firstly) — по-перше, хочу зазначити
  - по-друге (secondly) — по-друге, варто наголосити
  - нарешті (finally) — нарешті ми дійшли згоди; і, нарешті, останній пункт
  - підсумовуючи (summarizing) — підсумовуючи вищесказане; підсумовуючи результати
  - таким чином (thus) — таким чином, ми бачимо; діяти таким чином
  - особливо (especially)
  - передусім (above all) — передусім потрібно; це стосується передусім
  - загалом (in general) — загалом кажучи; загалом це вірно
  recommended:
  - насамкінець (in conclusion)
  - головне (the main thing)
  - з одного боку (on one hand) — paired with з іншого боку
  - з іншого боку (on the other hand) — paired with з одного боку
