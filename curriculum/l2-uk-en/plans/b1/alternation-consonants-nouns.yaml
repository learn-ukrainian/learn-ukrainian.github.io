module: b1-014
level: B1
sequence: 14
slug: alternation-consonants-nouns
version: '3.0.3'
title: "Чергування приголосних (іменники)"
subtitle: "Друг — друже — друзі: як змінюються приголосні в іменниках"
focus: grammar
pedagogy: PPP
phase: "B1.1 [Морфонологія]"
word_target: 4000
objectives:
  - 'Здобувач навчиться передбачати та утворювати першу палаталізацію [г/к/х] -> [ж/ч/ш] у кличному відмінку та при словотворенні (друг — друже, козак — козаче, пастух — пастуше)'
  - 'Здобувач навчиться передбачати та утворювати другу палаталізацію [г/к/х] -> [з''/ц''/с''] у давальному та місцевому відмінках (нога — на нозі, рука — на руці, Ольга — Ользі)'
  - 'Здобувач навчиться визначати, який відмінок або словотвірний контекст викликає певний тип чергування (перша чи друга палаталізація)'
  - 'Здобувач навчиться застосовувати правила чергування приголосних до незнайомих іменників та власних назв, уникаючи типових помилок у відмінкових формах'
dialogue_situations:
  - setting: 'У львівській книгарні — обговорення авторів та назв книг, де помітні чергування приголосних: книга→у книжці (г→ж), рука→у руці (к→ц), друг→друже (г→ж, кличний), вухо→у вусі (х→с).'
    speakers:
      - Книгар
      - Покупець
    motivation: 'Чергування приголосних в іменниках: г→ж, к→ц, х→с у місцевому та кличному відмінках'
content_outline:
  - section: "Що таке чергування приголосних?"
    words: 500
    points:
      - 'Зв''язок із модуля №8 (чергування голосних): здобувачі вже розуміють, що звуки в українській мові закономірно змінюються у формах слів. Чергування голосних стосується голосного звука в корені; чергування приголосних стосується кінцевого приголосного кореня або основи. За Авраменком (5 клас, с.114): "Найпоширенішими є такі чергування приголосних: [г] — [з] — [ж], [к] — [ц] — [ч], [х] — [с] — [ш]."'
      - 'Потрійна модель: кожен задньоязиковий приголосний [г], [к], [х] має ДВА можливі варіанти чергування залежно від фонетичного оточення. Цей модуль навчає здобувачів передбачати, який із них з''являється і де. Система є регулярною та продуктивною.'
      - 'Історичний контекст (коротко): ці чергування беруть початок у давньоукраїнській мові через вплив голосних переднього ряду на задньоязикові приголосні. Розуміння історії не є обов''язковим, але допомагає здобувачам побачити логіку, а не просто заучувати правила.'
  - section: "Перша палаталізація: [г/к/х] -> [ж/ч/ш]"
    words: 750
    points:
      - 'Правило за Заболотним (5 клас, с.116, §28): [г] -> [ж]: друг — дружити, нога — ніжка, ворог — вороже. [к] -> [ч]: рука — ручка, молоко — молочний, козак — козаче. [х] -> [ш]: кожух — кожушок, вухо — вушко, пастух — пастуше. Це чергування відбувається у словотворенні (суфікси -к-, -н-) та в кличному відмінку.'
      - 'Кличний відмінок із першою палаталізацією (Глазова, 10 клас, с.209): друг — друже, козак — козаче, чоловік — чоловіче, хлопець — хлопче (також [ц''] -> [ч]), юнак — юначе, вітязь — вітязю (м''яка група — чергування відсутнє). Правило: ІІ відміна, тверда група, закінчення -е викликають чергування. М''яка група має закінчення -ю без чергування.'
      - 'Словотворення з першою палаталізацією: нога — ніжка — ніженька, рука — ручка — рученька, книга — книжка — книжковий, молоко — молочний — молочар. Прикметникові суфікси -н-, -ськ- також спричиняють його: Прага — празький, Норвегія — норвезький.'
      - 'Практика читання: українські народні приказки та прислів''я, що природно використовують кличний відмінок. Здобувачі визначають чергування в кожному: "Терпи, козаче, отаманом будеш" (козак -> козаче).'
  - section: "Друга палаталізація: [г/к/х] -> [з'/ц'/с']"
    words: 750
    points:
      - 'Правило за Авраменком (5 клас, с.114): [г] -> [з'']: нога — на нозі, Ольга — Ользі, дорога — на дорозі. [к] -> [ц'']: рука — на руці, ріка — на ріці, дочка — дочці. [х] -> [с'']: муха — мусі, свекруха — свекрусі, стріха — на стрісі. Це чергування відбувається в давальному та місцевому відмінках однини І відміни (іменники жіночого роду на -а/-я).'
      - 'Чому давальний і місцевий? Закінчення -і спричиняє це чергування перед собою. Порівняйте: Н.в. нога, Р.в. ноги, Д.в. нозі, Зн.в. ногу, Ор.в. ногою, М.в. (на) нозі, Кл.в. ного! Чергування з''являється ЛИШЕ перед -і в Д.в. та М.в.'
      - 'Власні назви дотримуються тієї ж моделі: Ольга — Ользі, Палажка — Палажці, Одарка — Одарці. Географічні назви: Прага — у Празі, Рига — у Ризі, Америка — в Америці (але: Африка — в Африці). Практика: здобувачі відмінюють власні назви в давальному та місцевому відмінках.'
      - 'Типові помилки: змішування двох палаталізацій: *на нозі є правильним (друга), але *на ножі буде неправильним (це перша палаталізація, інший контекст). Кличний відмінок використовує першу ([ж/ч/ш]), тоді як давальний/місцевий — другу ([з''/ц''/с'']).'
  - section: "Чергування [ц'] -> [ч] та інші"
    words: 500
    points:
      - 'За Глазовою (10 клас, с.209): хлопець — хлопче, швець — шевче, молодець — молодче. М''який звук [ц''] чергується з [ч] у кличному відмінку. Це окреме чергування, що відрізняється від моделі [к]->[ч].'
      - 'Менш поширені чергування в іменниках: [с] -> [ш]: колесо — на колішні (рідко, здебільшого у сталих формах); [з] -> [ж]: князь — княже (кличний відмінок). Вони менш продуктивні, але трапляються у загальновживаних словах.'
      - 'Практика: здобувачі будують повну таблицю типів чергування, контекстів та прикладів. Ця таблиця стане довідником для наступних модулів щодо дієслівних чергувань (модуль №10).'
  - section: "Чергування у відмінюванні іменників II відміни"
    words: 550
    points:
      - 'Систематичний підхід: як чергування приголосних взаємодіє з повною парадигмою відмінювання іменників чоловічого роду ІІ відміни. На прикладі слова "друг": Н.в. друг, Р.в. друга, Д.в. другу/другові, Зн.в. друга, Ор.в. другом, М.в. (на) другу/другові, Кл.в. друже. Лише кличний відмінок має чергування в іменниках чоловічого роду.'
      - 'Порівняння з іменниками жіночого роду І відміни: нога: чергування у Д.в. (нозі) та М.в. (на нозі). Цей контраст допомагає здобувачам зрозуміти, ДЕ очікувати зміну: іменники чоловічого роду — кличний; іменники жіночого роду — давальний/місцевий.'
      - 'Литвінова (6 клас, с.159): закінчення іменників ІІ відміни у кличному відмінку однини — систематична таблиця закінчень за групами (тверда, м''яка, мішана) з правилами чергування.'
  - section: "Чергування у власних назвах і географічних іменах"
    words: 500
    points:
      - 'Українські географічні та власні назви підпорядковуються тим самим правилам: Прага — у Празі, Рига — у Ризі, Одарка — Одарці. Але деякі іншомовні назви уникають чергування: Пенелопа — Пенелопі (без чергування, бо це іншомовне ім''я). Здобувачі мають знати, які назви дотримуються українських моделей.'
      - 'Культурний контекст: кличний відмінок у повсякденному спілкуванні українців. Звертання до людей: Олеже! Марічко! Ігоре! Тарасе! Розуміння чергування = правильні форми звертання. Типова помилка іноземців: *Олего! (неправильно — має бути Олеже).'
      - 'Практика: здобувачі пишуть короткі діалоги, застосовуючи кличний відмінок із власними назвами та використовуючи правильне чергування.'
  - section: "Підсумок: таблиця чергувань"
    words: 450
    points:
      - 'Повна довідкова таблиця: | Приголосний | Перша палаталізація (Кл.в., словотвір) | Друга палаталізація (Д.в./М.в.) | | [г] | [ж] | [з''] | | [к] | [ч] | [ц''] | | [х] | [ш] | [с''] | | [ц''] | [ч] (тільки Кл.в.) | — |'
      - 'Самоперевірка: Дайте відповіді на запитання: 1. Які приголосні чергуються у кличному відмінку слова "друг"? 2. Яке чергування відбувається у слові "на нозі"? 3. Утворіть кличний відмінок: козак, юнак, хлопець. 4. Поставте у давальний відмінок: Ольга, книга, рука.'
      - 'Анонс наступного модуля: Чергування приголосних (дієслова) — ті самі приголосні чергуються при дієвідмінюванні, але з іншими тригерами та моделями.'
vocabulary_hints:
  required:
    - "чергування (alternation — systematic sound change between forms)"
    - "приголосний (consonant — sound made with obstruction)"
    - "палаталізація (palatalization — softening of a consonant)"
    - "кличний відмінок (vocative case — used for direct address)"
    - "давальний відмінок (dative case)"
    - "місцевий відмінок (locative case)"
    - "задньоязиковий (velar — consonant formed at the back of the mouth)"
    - "відміна (declension class — noun classification by ending pattern)"
    - "тверда група (hard group — nouns with hard stem-final consonant)"
    - "м'яка група (soft group — nouns with soft stem-final consonant)"
    - "мішана група (mixed group — nouns with шиплячий stem-final)"
    - "закінчення (ending — inflectional morpheme)"
    - "звертання (form of address — using кличний відмінок)"
    - "корінь (root — core morpheme of a word)"
  recommended:
    - "шиплячий (hushing consonant — ж, ч, ш, дж)"
    - "свистячий (sibilant — з, ц, с, дз)"
    - "словотворення (word formation — creating new words from roots)"
    - "прислів'я (proverb — traditional folk saying)"
    - "орфограма (orthographic rule — spelling pattern)"
    - "спільнокореневий (cognate — sharing the same root)"
    - "однина (singular number)"
    - "множина (plural number)"
    - "продуктивний (productive — pattern applicable to new words)"
    - "непродуктивний (unproductive — pattern limited to existing words)"
activity_hints:
  - type: quiz
    focus: 'Визначте, який тип палаталізації наявний: перша ([ж/ч/ш]) чи друга ([з''/ц''/с'']), для даної пари слів (друг-друже проти нога-нозі)'
    items: 8
  - type: fill-in
    focus: 'Напишіть правильну форму кличного відмінка іменників чоловічого роду (наприклад: козак -> козач___, друг -> друж___)'
    items: 8
  - type: fill-in
    focus: 'Напишіть правильну форму давального/місцевого відмінка іменників жіночого роду (наприклад: нога -> на ноз___, рука -> руц___)'
    items: 6
  - type: match-up
    focus: 'З''єднайте початкові форми з їхніми відмінковими формами з чергуванням (наприклад: Ольга <-> Ользі, козак <-> козаче)'
    items: 8
  - type: error-correction
    focus: 'Знайдіть і виправте помилки на чергування приголосних у реченнях (наприклад: *на ножі -> на нозі, *козаже -> козаче)'
    items: 6
