grammar:
  - 'Перша палаталізація: [г/к/х] -> [ж/ч/ш] у кличному відмінку та словотворенні'
  - 'Друга палаталізація: [г/к/х] -> [з''/ц''/с''] у давальному/місцевому відмінках'
  - 'Чергування [ц''] -> [ч] у кличному відмінку'
  - 'Взаємодія чергувань з парадигмами відмінювання (І та ІІ відміни)'
  - 'Застосування до власних та географічних назв'
register: академічний
references:
  - title: "Авраменко Grade 5, p.114-115"
    notes: 'Чергування приголосних звуків (§50): потрійна модель [г]-[з]-[ж], [к]-[ц]-[ч], [х]-[с]-[ш] з прикладами та вправами.'
  - title: "Заболотний Grade 5, p.116-119"
    notes: 'Чергування приголосних звуків (§28): систематичний виклад із прикладами друг-друзі-дружити, молоко-молоці-молочний.'
  - title: "Глазова Grade 10, p.209"
    notes: 'Особливості кличного відмінка: повна таблиця чергувань приголосних перед -е у кличному відмінку, зокрема [ц'']->[ч].'
  - title: "Литвінова Grade 6, p.159"
    notes: 'Закінчення іменників ІІ відміни у кличному відмінку однини: систематизовано за групами (тверда, м''яка, мішана).'
  - title: "Авраменко Grade 10, p.175"
    notes: 'Особливості кличного відмінка: представлення у формі діалогу, відмінності закінчень на прикладі Валеріє / Валерію.'