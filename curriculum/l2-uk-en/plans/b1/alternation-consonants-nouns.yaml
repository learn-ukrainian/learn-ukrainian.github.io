module: b1-009
level: B1
sequence: 9
slug: alternation-consonants-nouns
version: '3.0'
title: "Чергування приголосних (іменники)"
subtitle: "Друг — друже — друзі: як змінюються приголосні в іменниках"
focus: grammar
pedagogy: PPP
phase: "B1.2 [Morphophonemics & Noun Subclasses]"
word_target: 4000
objectives:
- "Learner can predict and produce the first palatalization
  [г/к/х] -> [ж/ч/ш] in кличний відмінок and word formation
  (друг — друже, козак — козаче, пастух — пастуше)"
- "Learner can predict and produce the second palatalization
  [г/к/х] -> [з'/ц'/с'] in давальний and місцевий відмінки
  (нога — на нозі, рука — на руці, Ольга — Ользі)"
- "Learner can identify which case or word-formation context
  triggers which alternation type (first vs. second palatalization)"
- "Learner can apply consonant alternation rules to unfamiliar
  nouns and proper names, avoiding common errors in case forms"
dialogue_situations:
- setting: 'At a Львівська книгарня (f, Lviv bookshop) — discussing authors and book
    titles, noticing consonant changes: книга→у книжці (г→ж), рука→у руці (к→ц), друг→друже
    (г→ж, vocative), вухо→у вусі (х→с).'
  speakers:
  - Книгар (bookseller)
  - Покупець
  motivation: 'Consonant alternation in nouns: г→ж, к→ц, х→с in locative and vocative'
content_outline:
- section: "Що таке чергування приголосних?"
  words: 500
  points:
  - "Bridge from M08 (alternation-vowels): learners now understand
    that sounds change systematically in Ukrainian word forms.
    Vowel alternations affect the root vowel; consonant alternations
    affect the final consonant of the root or stem.
    Авраменко Grade 5 p.114: 'Найпоширенішими є такі чергування
    приголосних: [г] — [з] — [ж], [к] — [ц] — [ч], [х] — [с] — [ш].'"
  - "The three-way pattern: each задньоязиковий consonant [г], [к], [х]
    has TWO possible alternation targets depending on the phonetic
    environment. This module teaches learners to predict which one
    appears where. The system is regular and productive."
  - "Historical context (brief): these alternations trace back to
    давньоукраїнська мова and the effect of front vowels on
    back consonants. Understanding the history is optional but
    helps learners see the logic, not just memorize."
- section: "Перша палаталізація: [г/к/х] -> [ж/ч/ш]"
  words: 750
  points:
  - "The pattern from Заболотний Grade 5 p.116 (section 28):
    [г] -> [ж]: друг — дружити, нога — ніжка, ворог — вороже
    [к] -> [ч]: рука — ручка, молоко — молочний, козак — козаче
    [х] -> [ш]: кожух — кожушок, вухо — вушко, пастух — пастуше
    This alternation appears in word formation (suffixes -к-, -н-)
    and in кличний відмінок."
  - "Кличний відмінок with first palatalization
    (Глазова Grade 10 p.209):
    друг — друже, козак — козаче, чоловік — чоловіче,
    хлопець — хлопче (also [ц'] -> [ч]),
    юнак — юначе, вітязь — вітязю (м'яка група — no alternation).
    Rule: II відміна, тверда група, закінчення -е triggers the
    alternation. М'яка група takes -ю with no alternation."
  - "Word formation with first palatalization:
    нога — ніжка — ніженька, рука — ручка — рученька,
    книга — книжка — книжковий, молоко — молочний — молочар.
    Adjective suffixes -н-, -ськ- also trigger it:
    Прага — празький, Норвегія — норвезький."
  - "Reading practice: Ukrainian folk sayings and прислів'я that
    use кличний відмінок naturally. Learners identify the alternation
    in each: 'Терпи, козаче, отаманом будеш' (козак -> козаче)."
- section: "Друга палаталізація: [г/к/х] -> [з'/ц'/с']"
  words: 750
  points:
  - "The pattern from Авраменко Grade 5 p.114:
    [г] -> [з']: нога — на нозі, Ольга — Ользі, дорога — на дорозі
    [к] -> [ц']: рука — на руці, ріка — на ріці, дочка — дочці
    [х] -> [с']: муха — мусі, свекруха — свекрусі, стріха — на стрісі
    This alternation appears in давальний and місцевий однини
    of I відміна (feminine nouns ending in -а/-я)."
  - "Why давальний and місцевий? The endings -i trigger this
    alternation before them. Compare:
    нога: Н.в. нога, Р.в. ноги, Д.в. нозі, Зн.в. ногу, Ор.в. ногою,
    М.в. (на) нозі, Кл.в. ного!
    The alternation ONLY appears before -i in Д.в. and М.в."
  - "Proper names follow the same pattern:
    Ольга — Ользі, Палажка — Палажці, Одарка — Одарці.
    Geographic names: Прага — у Празі, Рига — у Ризі,
    Америка — в Америці (but: Африка — в Африці).
    Practice: learners decline proper names in давальний and місцевий."
  - "Common errors to avoid:
    Mixing up the two palatalizations: *на нозі is correct (second),
    but *на ножі would be wrong (that is first palatalization, wrong
    context). The кличний uses first ([ж/ч/ш]), while давальний/місцевий
    use second ([з'/ц'/с'])."
- section: "Чергування [ц'] -> [ч] та інші"
  words: 500
  points:
  - "From Глазова Grade 10 p.209:
    хлопець — хлопче, швець — шевче, молодець — молодче.
    The soft [ц'] alternates with [ч] in кличний відмінок.
    This is a separate alternation from the [к]->[ч] pattern."
  - "Minor alternations in nouns:
    [с] -> [ш]: колесо — на колішні (rare, mostly in fixed forms)
    [з] -> [ж]: князь — княже (кличний відмінок)
    These are less productive but appear in common words."
  - "Practice: learners build a complete table of alternation types,
    contexts, and examples. The table becomes a reference for
    future modules on verb alternations (M10)."
- section: "Чергування у відмінюванні іменників II відміни"
  words: 550
  points:
  - "Systematic view: how consonant alternations interact with
    the full declension paradigm of II відміна masculine nouns.
    Using друг as a model: Н.в. друг, Р.в. друга, Д.в. другу/другові,
    Зн.в. друга, Ор.в. другом, М.в. (на) другу/другові, Кл.в. друже.
    Only the кличний shows alternation in masculine nouns."
  - "Comparison with I відміна feminine nouns:
    нога: alternation in Д.в. (нозі) and М.в. (на нозі).
    This contrast helps learners predict WHERE to expect the change:
    masculine nouns — кличний; feminine nouns — давальний/місцевий."
  - "Литвінова Grade 6 p.159: закінчення іменників II відміни
    в кличному відмінку однини — systematic table of endings
    by group (тверда, м'яка, мішана) with alternation rules."
- section: "Чергування у власних назвах i географічних іменах"
  words: 500
  points:
  - "Ukrainian place names and personal names follow the same rules:
    Прага — у Празі, Рига — у Ризі, Одарка — Одарці.
    But some foreign names resist alternation:
    Пенелопа — Пенелопі (no alternation — foreign name).
    Learners need to know which names follow Ukrainian patterns."
  - "Cultural context: кличний відмінок in everyday Ukrainian.
    Addressing people: Олеже! Марічко! Iгоре! Тарасе!
    Understanding alternation = correct forms of address.
    Common mistakes by L2 speakers: *Олего! (wrong — should be Олеже)."
  - "Practice: learners write short dialogues using кличний відмінок
    with proper names, applying the correct alternation."
- section: "Підсумок: таблиця чергувань"
  words: 450
  points:
  - "Complete reference table:
    | Consonant | First (Кл.в., word formation) | Second (Д.в./М.в.) |
    | [г] | [ж] | [з'] |
    | [к] | [ч] | [ц'] |
    | [х] | [ш] | [с'] |
    | [ц'] | [ч] (Кл.в. only) | — |"
  - "Self-check in Ukrainian: Дайте відповіді на запитання:
    1. Які приголосні чергуються у кличному відмінку слова 'друг'?
    2. Яке чергування відбувається у слові 'на нозі'?
    3. Утворіть кличний відмінок: козак, юнак, хлопець.
    4. Поставте у давальний відмінок: Ольга, книга, рука."
  - "Preview of next module: Чергування приголосних (дієслова) —
    the same consonants alternate in verb conjugation,
    but with different triggers and patterns."
vocabulary_hints:
  required:
  - "чергування (alternation — systematic sound change between forms)"
  - "приголосний (consonant — sound made with obstruction)"
  - "палаталізація (palatalization — softening of a consonant)"
  - "кличний відмінок (vocative case — used for direct address)"
  - "давальний відмінок (dative case)"
  - "місцевий відмінок (locative case)"
  - "задньоязиковий (velar — consonant formed at the back of the mouth)"
  - "відміна (declension class — noun classification by ending pattern)"
  - "тверда група (hard group — nouns with hard stem-final consonant)"
  - "м'яка група (soft group — nouns with soft stem-final consonant)"
  - "мішана група (mixed group — nouns with шиплячий stem-final)"
  - "закінчення (ending — inflectional morpheme)"
  - "звертання (form of address — using кличний відмінок)"
  - "корінь (root — core morpheme of a word)"
  recommended:
  - "шиплячий (hushing consonant — ж, ч, ш, дж)"
  - "свистячий (sibilant — з, ц, с, дз)"
  - "словотворення (word formation — creating new words from roots)"
  - "прислів'я (proverb — traditional folk saying)"
  - "орфограма (orthographic rule — spelling pattern)"
  - "спільнокореневий (cognate — sharing the same root)"
  - "однина (singular number)"
  - "множина (plural number)"
  - "продуктивний (productive — pattern applicable to new words)"
  - "непродуктивний (unproductive — pattern limited to existing words)"
activity_hints:
- type: quiz
  focus: "Identify which palatalization type is present: first ([ж/ч/ш])
    or second ([з'/ц'/с']), given a word pair (друг-друже vs. нога-нозі)"
  items: 8
- type: fill-in
  focus: "Write the correct кличний відмінок form of masculine nouns
    (e.g., козак -> козач___, друг -> друж___)"
  items: 8
- type: fill-in
  focus: "Write the correct давальний/місцевий form of feminine nouns
    (e.g., нога -> на ноз___, рука -> руц___)"
  items: 6
- type: match-up
  focus: "Match base forms with their alternated case forms
    (e.g., Ольга <-> Ользі, козак <-> козаче)"
  items: 8
- type: error-correction
  focus: "Find and fix consonant alternation errors in sentences
    (e.g., *на ножі -> на нозі, *козаже -> козаче)"
  items: 6
connects_to:
- "b1-008 (alternation-vowels — vowel alternations as the first morphophonemic rule)"
- "b1-010 (alternation-consonants-verbs — same consonants alternate in verbs)"
- "b1-012 (noun-subclasses-masculine — declension of -ар/-яр/-ин nouns)"
prerequisites:
- "A2 completion (learner knows noun declension basics, all 7 cases)"
- "b1-001 (metalanguage-phonetics — приголосний classification)"
- "b1-008 (alternation-vowels — concept of чергування)"
grammar:
- "First palatalization: [г/к/х] -> [ж/ч/ш] in кличний and word formation"
- "Second palatalization: [г/к/х] -> [з'/ц'/с'] in давальний/місцевий"
- "Alternation [ц'] -> [ч] in кличний відмінок"
- "Interaction of alternations with declension paradigms (I and II відміна)"
- "Application to proper names and geographic names"
register: академічний
references:
- title: "Авраменко Grade 5, p.114-115"
  notes: "Чергування приголосних звуків (section 50): three-way pattern
    [г]-[з]-[ж], [к]-[ц]-[ч], [х]-[с]-[ш] with examples and exercises."
- title: "Заболотний Grade 5, p.116-119"
  notes: "Чергування приголосних звуків (section 28): systematic
    presentation with друг-друзі-дружити, молоко-молоці-молочний."
- title: "Глазова Grade 10, p.209"
  notes: "Особливості кличного відмінка: complete table of consonant
    alternations before -е in кличний, including [ц']->[ч]."
- title: "Литвінова Grade 6, p.159"
  notes: "Закінчення іменників II відміни в кличному відмінку однини:
    systematic by group (тверда, м'яка, мішана)."
- title: "Авраменко Grade 10, p.175"
  notes: "Особливості кличного відмінка: dialogue-based presentation,
    Валеріє vs. Валерію gender distinction."
