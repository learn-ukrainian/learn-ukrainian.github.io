content_outline:
- section: 'Вступ: Перевірка та мотивація (Introduction: Testing and Motivation)'
  words: 400
  points:
  - 'Діагностичний тест: перевірка навичок використання префіксальних дієслів руху та прийменників за §4.3.8 Державного стандарту.'
  - 'Огляд цілей модуля: перехід від базового орієнтування до складних наративів про подорожі (Theme §3.5 Подорожі).'
- section: 'Пояснення: Матриця навігації та прийменників (Explanation: Navigation and Preposition Matrix)'
  words: 1000
  points:
  - Комплексний аналіз систем 'іти/прийти' та 'їхати/приїхати' у поєднанні з прийменниками в, на, до, через (§4.2.2.4).
  - 'Усунення типових помилок: контраст між Знахідним (куди?) та Місцевим (де?) відмінками — моделі «йти в парк» vs «бути
    в парку».'
  - 'Лексичні пастки: розрізнення локацій, що вимагають прийменника ''на'' (вокзал, пошта, вулиця) проти стандартного ''в''
    (парк, театр).'
  - 'Подолання кальок з англійської: заміна помилкового ''брати автобус'' на нормативні ''сісти на автобус'' або ''їхати автобусом''.'
- section: 'Культурний контекст: Шляхи та ідіоми (Cultural Context: Ways and Idioms)'
  words: 800
  points:
  - 'Історія та легенди: ''Чумацький Шлях'' як історичний маршрут соляних торговців до Криму та небесний орієнтир для навігації.'
  - 'Ідіоматика руху: освоєння метафор ''на роздоріжжі'' (життєвий вибір) та ''глухий кут'' (безвихідна ситуація, тупик).'
  - 'Мовленнєвий етикет: як ввічливо запитувати дорогу, використовуючи конструкції з дієсловами ''дійти'', ''піднятися'',
    ''пройти''.'
- section: 'Практика: Київська Одіссея (Practice: Kyiv Odyssey)'
  words: 1200
  points:
  - 'Текстова симуляція: маршрут від Подолу до Верхнього міста через Андріївський узвіз — акцент на дієслова ''піднятися''
    та ''спуститися''.'
  - 'Аналіз логістики: використання фунікулера як специфічного транспорту для подолання вертикальної географії Києва.'
  - 'Діалоговий тренажер: симуляція взаємодії ''таксист — пасажир'' з використанням орієнтирів ''на розі'', ''на перехресті'',
    ''світлофор''.'
- section: Підсумок та застосування (Summary and Application)
  words: 600
  points:
  - 'Побудова власної траєкторії: опис складного маршруту з використанням маркерів послідовності ''спочатку'', ''потім'',
    ''нарешті''.'
  - 'Творче завдання: ''Моя Одіссея'' — написання розповіді про власну значущу поїздку з інтеграцією вивчених префіксальних
    дієслів.'
vocabulary_hints:
  required:
  - спочатку (at first) — спочатку... а потім; спочатку поверніть; High frequency marker
  - потім (then) — і потім; а потім; High frequency sequence marker
  - нарешті (finally) — ну нарешті; і нарешті ми прийшли; High frequency result marker
  - напрямок (direction) — у напрямку до; змінити напрямок; High frequency
  - маршрут (route) — прокласти маршрут; туристичний маршрут; Medium frequency
  - повернути (to turn) — повернути праворуч/ліворуч; повернути за ріг; High frequency action
  - траєкторія (trajectory) — траєкторія руху; зміна траєкторії; Medium frequency (scientific/tech)
  - прямо (straight) — йдіть прямо; прямо і направо; High frequency direction
  recommended:
  - на розі (at the corner) — usage in city navigation
  - на перехресті (at the intersection) — usage in complex directions
  - піднятися (to go up / ascend) — crucial for hilly terrain like Kyiv
  - спуститися (to go down / descend) — antonym to 'піднятися'
  - на роздоріжжі (at a crossroads) — idiom for a life-changing choice
  - глухий кут (dead end) — idiom for an impasse or hopeless situation
  - фунікулер (funicular) — specific transport for vertical geography
