    notes: "Full II відміна paradigms including мішана група, паралельні закінчення,
      кличний відмінок rules, родовий множини patterns."
  - title: "Заболотний Grade 6, pp.96-106"
    notes: "Відміни classification table, II відміна declension with мішана група
      examples (товариш, читач), орудний endings."
  - title: "Захарійчук Grade 4, p.62"
    notes: "Foundational rule: орудний -ем for stems ending in м'який приголосний
      and [ж], [ч], [ш]. Includes сторож and слухач in exercises."
  - title: "Глазова Grade 10, p.209"
    notes: "Кличний відмінок чергування in II відміна: [г]-[ж], [к]-[ч], [х]-[ш].
      Орудний множини: -ами for тверда and мішана груп."
  - title: "Голуб Grade 6, p.75"
    notes: "Three-group classification of I and II відміна nouns by stem-final consonant:
      тверда, м'яка, мішана."
