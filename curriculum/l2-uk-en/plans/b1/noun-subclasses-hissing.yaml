    items: 8
  - type: fill-in
    focus: 'Вставлення правильного відмінкового закінчення для іменників мішаної групи в реченнях'
    items: 8
  - type: match-up
    focus: 'Встановлення відповідності між формами називного відмінка та їхніми формами орудного і кличного відмінків'
    items: 8
  - type: error-correction
    focus: 'Пошук та виправлення русизмів у закінченнях іменників мішаної групи (*сторожом → сторожем)'
    items: 6
  - type: group-sort
    focus: 'Сортування іменників за твердою, м''якою та мішаною групами'
    items: 10
