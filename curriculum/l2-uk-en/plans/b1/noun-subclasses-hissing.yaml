module: b1-019
level: B1
sequence: 19
slug: noun-subclasses-hissing
version: '3.0.2'
title: 'Іменники на ж, ч, ш, щ'
subtitle: 'Мішана група II відміни — від сторожа до товариша'
focus: grammar
pedagogy: PPP
phase: 'B1.1 [Морфофонеміка]'
word_target: 4000
objectives:
  - 'Здобувач освіти вміє класифікувати іменники з основою на шиплячий приголосний (ж, ч, ш, щ) як такі, що належать до мішаної групи II відміни'
  - 'Здобувач освіти вміє правильно відмінювати іменники чоловічого роду мішаної групи в усіх семи відмінках однини та множини'
  - 'Здобувач освіти вміє застосовувати правильне закінчення орудного відмінка (-ем для однини, -ами для множини) і пояснювати, чому воно відрізняється від твердої групи (-ом)'
  - 'Здобувач освіти вміє утворювати форми кличного відмінка для іменників мішаної групи (стороже, товаришу, слухачу) та розуміти закономірність'
  - 'Здобувач освіти вміє розрізняти іменники мішаної групи з формою знахідного відмінка для істот і неістот (бачу сторожа проти бачу ніж)'
dialogue_situations:
  - setting: 'У музеї українського народного мистецтва — екскурсовод вказує на предмети, що закінчуються на шиплячі звуки: Подивіться на цей ніж. А цей ключ — старовинний. Тут є товариш директора. Бачите плащ?'
    speakers:
      - Екскурсовод
      - Відвідувачі
    motivation: 'Іменники на шиплячий приголосний: ніж, ключ, товариш, плащ — типи відмінювання'
content_outline:
  - section: 'Що таке мішана група?'
    words: 550
    points:
      - 'Повторення матеріалу Фази 1: II відміна має три групи залежно від кінцевого приголосного основи — тверда (батько, завод), м''яка (вчитель, край) та мішана (сторож, товариш). З Голуба, 6 клас, с. 75: «Іменники I та II відмін за кінцевим приголосним основи поділяють на три групи: тверду, м''яку і мішану (основа закінчується шиплячим)».'
      - 'Шиплячі приголосні: [ж], [ч], [ш], [дж] — вони не є ані повністю твердими, ані повністю м''якими. В одних формах вони поводяться як тверді, в інших — як м''які. Саме тому група називається мішаною. Ключові приклади: сторож, слухач, товариш, борщ, ніж, плащ, читач.'
      - 'Чому мішана група є важливою: закінчення є гібридом моделей твердої та м''якої груп. Помилки в цьому аспекті звучать виразно неприродно. Порівняння: завод-ом (тверда) проти вчител-ем (м''яка) проти сторож-ем (мішана — тут наслідує м''яку).'
  - section: 'Відмінювання в однині'
    words: 750
    points:
      - 'Повна парадигма за Литвіновою, 6 клас, с. 153 та Заболотним, 6 клас, с. 102: Н. товариш, сторож, слухач Р. товариша, сторожа, слухача Д. товаришу(еві), сторожу(еві), слухачу(еві) Зн. товариша (істота) / ніж (неістота) Ор. товаришем, сторожем, слухачем М. (на) товаришу(еві), (на) сторожу(еві), (на) слухачу(еві) Кл. товаришу, стороже, слухачу'
      - 'Ключова закономірність: орудний відмінок завжди має закінчення -ем (не -ом!). З Захарійчука, 4 клас, с. 62: «Закінчення -ем мають іменники з основою на м''який приголосний і [ж], [ч], [ш]». Практика: ніж — ножем, читач — читачем, виграш — виграшем. Типова помилка: *сторожом — це русизм. Українською: сторожем.'
      - 'Давальний та місцевий відмінки мають паралельні закінчення для істот: -у/-еві. Обидва варіанти є правильними: товаришу = товаришеві. З Литвінової, 6 клас, с. 153: «У давальному й місцевому відмінках назви істот мають паралельні закінчення».'
      - 'Кличний відмінок — дві моделі: Безсуфіксні іменники мають закінчення -е з чергуванням: сторож — стороже. Іменники із суфіксами -ач, -ар мають закінчення -у: слухач — слухачу, товариш — товаришу. З Литвінової, 6 клас, с. 159: «Мішана група: закінчення -е для більшості іменників: стороже, Довбуше, пісняре».'
  - section: 'Відмінювання у множині'
    words: 600
    points:
      - 'Повна парадигма множини: Н. товариші, сторожі, слухачі Р. товаришів, сторожів, слухачів Д. товаришам, сторожам, слухачам Зн. товаришів (істоти) / ножі (неістоти) Ор. товаришами, сторожами, слухачами М. (на) товаришах, (на) сторожах, (на) слухачах Кл. товариші, сторожі, слухачі'
      - 'З Глазової, 10 клас, с. 209: «В орудному відмінку множини іменники чоловічого роду II відміни твердої і мішаної груп мають закінчення -ами: вагонами, товаришами». Зверніть увагу на різницю: в однині -ем (наслідує м''яку групу), а в множині -ами (наслідує тверду). Ось чому група є мішаною!'
      - 'Практика читання: український текст з іменниками мішаної групи в різних відмінках. Здобувачі освіти визначають відмінок та пояснюють закінчення. Приклад: уривок про нічного сторожа, який зустрічає товариша.'
  - section: 'Середній рід мішаної групи'
    words: 550
    points:
      - 'Іменники середнього роду, що закінчуються на шиплячий + -е, також належать до мішаної групи: плече, прізвище, серце (зверніть увагу: [ц''] — це свистячий, а не шиплячий, але серце належить до IV відміни, wait, серце is II declension soft actually? Let us preserve the original pedagogical note translated: серце (серце — зверніть увагу: [ц''] є свистячим, а не шиплячим, але серце є... wait original says "серце is IV відміна" which is grammatically dubious, but I will translate exactly: але серце є IV відміною). Парадигма для плече: Н. плече — Р. плеча — Д. плечу — Зн. плече — Ор. плечем — М. на плечі.'
      - 'Закінчення орудного відмінка для середнього роду мішаної групи: -ем (як і для чоловічого). Порівняйте: озер-ом (тверда) проти пол-ем (м''яка) проти плеч-ем (мішана). У Литвінової, 6 клас, с. 153, слово плечем наведено в парадигмі мішаної групи.'
      - 'Поширені іменники середнього роду мішаної групи в щоденному вжитку: плече, прізвище, видовище, кладовище, вогнище. Практика: відмінювання цих іменників у реченнях із широким контекстом.'
  - section: 'Чергування в мішаній групі'
    words: 600
    points:
      - 'Зв''язок із M09-M11: шиплячі приголосні самі по собі є РЕЗУЛЬТАТОМ історичного чергування. [г] → [ж]: друг — дружити — у дрУжбі. [к] → [ч]: рука — ручний. [х] → [ш]: горох — горошина. Ось чому існує так багато іменників мішаної групи — вони походять від продуктивних словотвірних моделей.'
      - 'Чергування [о], [е] → [і] в іменниках мішаної групи: ніж — ножа — на ножі (о→і в закритому складі). сторож — на сторожі. ковш — ковша — у ковші. З M08 (Чергування голосних): це та сама модель [о] → [і], тепер застосована безпосередньо до іменників мішаної групи.'
      - 'Випадні голосні в мішаній групі: вівчар — вівчаря (тут немає випадного голосного, на відміну від учень — учня). Але: хлопець — хлопця демонструє цю модель у свистячих. Здобувачі освіти практикують розпізнавання, які іменники мішаної групи мають стабільну основу, а які — чергування.'
  - section: 'Типові помилки та практика'
    words: 600
    points:
      - 'Помилка 1 — русизм в орудному відмінку: *сторожом, *ножом замість сторожем, ножем. Правило: мішана група завжди має -ем в орудному відмінку однини. Помилка 2 — неправильний кличний відмінок: *товарише замість товаришу. Помилка 3 — плутанина між мішаною та твердою групами: написання *товаришом.'
      - 'Діагностична вправа: для заданого іменника визначити його групу (тверда/м''яка/мішана) і передбачити форми орудного та кличного відмінків. Набір для практики: борщ, меч, плащ, грач, м''яч, ніж, товариш, сторож, вояж, монтаж, масаж, пейзаж.'
      - 'Завдання на розуміння прочитаного: розповідь про товаришів на війні, що містить іменники мішаної групи в усіх відмінках. Здобувачі освіти виокремлюють та класифікують форми іменників.'
  - section: 'Підсумок'
    words: 350
    points:
      - 'Стислий огляд ключових правил: 1. Мішана група = основа закінчується на шиплячий (ж, ч, ш, щ/дж). 2. Орудний відмінок однини: -ем (ніколи -ом). 3. Кличний відмінок: -е для безсуфіксних (стороже), -у для суфіксальних (слухачу). 4. Орудний відмінок множини: -ами (як у твердій групі). 5. Чергування [о/е] → [і] застосовується як завжди (ніж — ножі — на ножі).'
      - 'Самоперевірка: Дайте відповіді на запитання: 1. Які приголосні називаються шиплячими? 2. Чому мішану групу називають саме «мішаною»? 3. Яке закінчення має орудний відмінок однини? 4. Провідміняйте: товариш, ніж, плече. Анонс: M14 — жіночий рід з нульовим закінченням (III відміна).'
vocabulary_hints:
  required:
    - "сторож (watchman — мішана група, masculine II відміна)"
    - "слухач (listener — мішана група, suffix -ач)"
    - "товариш (companion — мішана група)"
    - "мішана група (mixed group — nouns with шиплячий stem)"
    - "шиплячий (hissing consonant — ж, ч, ш, дж)"
    - "закінчення (ending — grammatical suffix in a word form)"
    - "відмінок (grammatical case)"
    - "орудний відмінок (instrumental case)"
    - "кличний відмінок (vocative case)"
    - "однина (singular number)"
    - "множина (plural number)"
    - "ніж (knife — мішана група, inanimate)"
    - "читач (reader — мішана група, suffix -ач)"
    - "плече (shoulder — neuter мішана група)"
    - "борщ (borscht — мішана група)"
    - "плащ (raincoat — мішана група, inanimate)"
  recommended:
    - "паралельні закінчення (parallel endings — давальний and місцевий)"
    - "безсуфіксний (without suffix — affects кличний form)"
    - "істота (animate being — affects знахідний)"
    - "неістота (inanimate — affects знахідний)"
    - "пейзаж (landscape — мішана група)"
    - "монтаж (montage/editing — мішана група)"
    - "м'яч (ball — мішана група)"
    - "грач (rook/player — мішана група)"
    - "видовище (spectacle — neuter мішана група)"
    - "прізвище (surname — neuter мішана група)"
