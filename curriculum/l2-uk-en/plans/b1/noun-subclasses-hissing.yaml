  - "b1-009 (Чергування приголосних в іменниках — understanding of шиплячі origins)"
grammar:
  - "Мішана група identification: stem-final шиплячий (ж, ч, ш, щ/дж)"
  - "Singular declension: орудний -ем, давальний/місцевий -у/-еві, кличний -е/-у"
  - "Plural declension: орудний -ами (switches to тверда pattern)"
  - "Neuter мішана група: плече, прізвище — same -ем in орудний"
  - "Animate vs inanimate знахідний: сторожа (= Р.в.) vs ніж (= Н.в.)"
  - "Чергування [о/е] → [і] in мішана група: ніж — ножа — на ножі"
register: академічний
