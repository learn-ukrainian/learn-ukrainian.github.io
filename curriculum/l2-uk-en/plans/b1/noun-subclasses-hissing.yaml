prerequisites:
  - 'b1-012 (Підкласи іменників: чоловічий рід на -ар, -яр, -ин — основи II відміни)'
  - 'b1-009 (Чергування приголосних в іменниках — розуміння походження шиплячих)'
grammar:
  - 'Ідентифікація мішаної групи: кінцевий шиплячий основи (ж, ч, ш, щ/дж)'
  - 'Відмінювання в однині: орудний -ем, давальний/місцевий -у/-еві, кличний -е/-у'
  - 'Відмінювання у множині: орудний -ами (перехід до моделі твердої групи)'
  - 'Середній рід мішаної групи: плече, прізвище — таке ж закінчення -ем в орудному'
  - 'Знахідний відмінок істот і неістот: сторожа (= Р.в.) проти ніж (= Н.в.)'
  - 'Чергування [о/е] → [і] в мішаній групі: ніж — ножа — на ножі'
register: академічний
references:
  - title: 'Литвінова Grade 6, pp.152-160'
    notes: 'Повні парадигми II відміни, включно з мішаною групою, паралельні закінчення, правила кличного відмінка, моделі родового відмінка множини.'
  - title: 'Заболотний Grade 6, pp.96-106'
    notes: 'Таблиця класифікації відмін, відмінювання II відміни з прикладами мішаної групи (товариш, читач), закінчення орудного відмінка.'
  - title: 'Захарійчук Grade 4, p.62'
    notes: 'Фундаментальне правило: орудний відмінок на -ем для основ на м''який приголосний та [ж], [ч], [ш]. Включає слова сторож та слухач у вправах.'
  - title: 'Глазова Grade 10, p.209'
    notes: 'Чергування в кличному відмінку II відміни: [г]-[ж], [к]-[ч], [х]-[ш]. Орудний відмінок множини: -ами для твердої та мішаної груп.'
  - title: 'Голуб Grade 6, p.75'
    notes: 'Класифікація іменників I та II відмін на три групи за кінцевим приголосним основи: тверда, м''яка, мішана.'