  items: 12
connects_to:
- b1-034 (рух-політ-плавання — дієслова летіти/пливти в прямому значенні, які тут набувають переносного)
- b1-036 (подорож-україною — поєднання прямого та переносного руху в розповідях)
- b1-077 (лексична-стилістика — ширше дослідження переносного значення слів)
prerequisites:
- b1-028 (рух-базовий-огляд — усі базові пари дієслів руху)
- b1-034 (рух-політ-плавання — дієслова руху в повітрі та воді)
grammar:
- Переносне значення дієслів руху
- 'Іти/ходити в переносному значенні: погода, час, процеси, події, абстрактні поняття'
- 'Летіти в переносному значенні: швидкість, стрімкі зміни'
- 'Пливти в переносному значенні: плавність, повільність'
- 'Префіксальні форми в переносному значенні: вийти, підійти, обійтися'
- 'Моделі уникнення калькування: дощ іде (а не *дощ падає)'
register: науково-навчальний
references:
- title: Авраменко, 5 клас, с.27
  notes: Діалог про фразу 'Піде дощ' — вступ до переносного значення.
- title: Авраменко, 10 клас, с.19
  notes: 'Летіти як багатозначне слово: пряме (пташка летить) проти переносного (час летить).'
- title: Вашуленко, 2 клас, с.80
  notes: Іде катер, іде поїзд, іде зима, іде час — рання вправа на розуміння багатозначності.
- title: Глазова, 10 клас, с.39
  notes: 'Лексичні синоніми: набігати, накотити — синонімія дієслів руху.'
