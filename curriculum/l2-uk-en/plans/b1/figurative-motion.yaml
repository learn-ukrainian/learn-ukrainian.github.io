module: b1-042
level: B1
sequence: 42
slug: figurative-motion
version: 3.0.2
title: Час іде, дощ іде
subtitle: Переносне вживання дієслів руху в українській мові
focus: communication
pedagogy: PPP
phase: B1.3 [Світ дієслів руху]
word_target: 4000
objectives:
- 'Учень вміє розпізнавати та вживати переносні вирази з іти/ходити: час іде, дощ іде, фільм іде, справи
  йдуть, мова йде про'
- Учень вміє розпізнавати та вживати переносні вирази з їхати/їздити, бігти, летіти, пливти та їхніми
  префіксальними формами
- Учень вміє розрізняти пряме та переносне значення дієслів руху в українському тексті та обирати правильне
  під час мовлення
- 'Учень вміє використовувати українські вирази з дієсловами руху в переносному значенні, уникаючи калькування
  з англійської (українською: дощ іде, а не *дощ падає)'
dialogue_situations:
- setting: 'Філософська розмова в Київському парку (m) дощового дня — обговорення життєвих метафор: Час
    іде. Дощ іде. Справи йдуть добре. Мова йде про майбутнє.'
  speakers:
  - Подруги на прогулянці
  motivation: 'Дієслова руху в переносному значенні: час іде, дощ іде, справи йдуть, мова йде'
content_outline:
- section: Дієслова руху в переносному значенні
  words: 600
  points:
  - 'Перехід від М28-М34: учні вже опанували систему дієслів руху в прямому значенні. Проте українці щодня
    вживають дієслова руху в переносному значенні — для опису часу, погоди, процесів, емоцій. Цей модуль
    вивчає переносний пласт лексики, що робить мовлення природним.'
  - 'З підручника Авраменка, 5 клас, с.27: діалог між братом і сестрою про фразу ''Піде дощ'' — ''А хіба
    дощ може ходити?''. Саме так українські підручники вводять поняття переносного значення. Лексичне
    значення може бути прямим або переносним.'
  - 'З підручника Авраменка, 10 клас, с.19: летіти — це багатозначне слово: пташка летить (пряме значення)
    проти час летить (переносне). Розуміння багатозначності є суттєвим для природної української мови.'
- section: 'Іти / ходити: найширший спектр'
  words: 900
  points:
  - 'Погода: дощ іде, сніг іде. НЕ *дощ падає (калька з англійської). Українською дощ ''іде''. Надворі
    йде сильний дощ. Вчора йшов сніг цілий день. З підручника Вашуленка, 2 клас, с.80: вправа на заміну
    слова ''іде'' синонімами: Іде катер → Пливе катер. Іде зима → Настає зима.'
  - 'Час: час іде, роки йдуть, літо йде до кінця. Ідуть дні, тижні, місяці... Рік іде за роком. Зверніть
    увагу: для позначення швидкого плину часу використовуйте летіти (Час летить!) — див. нижче.'
  - 'Процеси та події: фільм іде, урок іде, концерт іде, ремонт іде, переговори йдуть, справи йдуть добре.'
  - 'Абстрактні вирази: мова йде про: Мова йде про реформи. йти на компроміс: Уряд пішов на компроміс.
    йти на ризик: Він пішов на великий ризик. йти назустріч: Пішли нам назустріч. йтися (безособове дієслово):
    Йдеться про безпеку.'
  - 'Префіксальні форми в переносному значенні: вийти: Вийшов гарний пиріг. Нічого не вийшло. підійти:
    Це мені не підходить. дійти: Дійшов до висновку. прийти: Мені прийшла ідея. Прийшов час діяти. зайти:
    Зайшов надто далеко. обійтися: Обійдемося без цього.'
- section: 'Летіти: швидкість'
  words: 500
  points:
  - 'Летіти в переносному значенні означає рухатися дуже швидко, стрімко минати: Час летить! Дні летять.
    Новина облетіла все місто. Ціни злетіли.'
  - 'Префіксальні форми в переносному значенні: злетіти: Ціни злетіли вгору. вилетіти (розмовне): Вилетів
    з роботи. пролетіти: Канікули пролетіли непомітно. налетіти: Раптом налетів вітер.'
  - 'Практика: 6-8 речень, у яких учні визначають пряме та переносне значення дієслова летіти та його
    префіксальних форм.'
- section: 'Пливти: плавність і повільність'
  words: 400
  points:
  - 'Пливти в переносному значенні означає рухатися плавно, повільно: Хмари пливуть. Мелодія пливе. Місяць
    пливе по небу. Думки пливуть. Туман пливе над річкою.'
  - 'Порівняння з летіти: Час летить (швидко) проти Час пливе (повільно, плавно). Обидва дієслова описують
    плин часу, але з протилежними відтінками швидкості.'
  - 'Практика: 4-6 речень із використанням дієслова пливти в переносному значенні.'
- section: Бігти, їхати, нести та інші
  words: 600
  points:
  - 'Бігти в переносному значенні означає поспішати, бути зайнятим: Час біжить (швидше, ніж іде, але повільніше,
    ніж летить). Вода біжить у річці. Мурашки біжать по шкірі.'
  - 'Їхати в переносному значенні (розмовне): Дах їде. Їхати на чомусь (бути одержимим чимось, розмовне).'
  - 'Нести/носити в переносному значенні: нести відповідальність. носити ім''я: Вулиця носить ім''я Шевченка.
    виносити рішення (офіційно-ділове). Річка несе води (поетичне).'
  - 'Вести/водити в переносному значенні: вести переговори. вести себе: Ведіть себе пристойно! вести блог/щоденник.
    водити за ніс.'
- section: Українські вирази vs англійські кальки
  words: 600
  points:
  - 'Деколонізоване вживання — питомі українські вирази: дощ іде (НЕ *дощ падає — калька). час іде/летить/біжить
    (НЕ *час пробігає). фільм іде (НЕ *фільм показують — хоч і існують обидва варіанти, іде є більш природним).
    справи йдуть (НЕ *справи є).'
  - 'Попередження щодо русизмів: *мова іде — ПРАВИЛЬНО мова йде або йдеться (безособова форма йдеться
    є найприроднішою: Йдеться про важливі питання). *діло йде — може бути русизмом; краще вживати справа
    стоїть / річ у тому. Завжди перевіряйте: чи існує цей вираз в українській мові, чи це переклад з російської/англійської?'
  - 'Практика: учні перефразовують англійські речення, використовуючи природні українські дієслова руху
    в переносному значенні. 6-8 вправ на уникнення калькування.'
- section: 'Підсумок: буквальне і переносне'
  words: 400
  points:
  - 'Підсумкова таблиця основних переносних значень: іти: погода, час, процеси, події. летіти: швидкість,
    стрімкі зміни. пливти: плавність, повільність. бігти: поспіх, плин. нести/носити: відповідальність,
    імена. вести/водити: переговори, поведінка.'
  - 'Анонс М36: Подорож Україною — розповіді про подорожі, що поєднують дієслова руху в прямому значенні
    з культурною лексикою українських мандрівок.'
vocabulary_hints:
  required:
  - переносне значення (figurative meaning)
  - пряме значення (literal meaning)
  - дощ іде (it's raining — figurative use of іти)
  - час іде (time passes)
  - час летить (time flies)
  - справи йдуть (things are going — about progress)
  - мова йде про (it's about / the topic is)
  - 'йтися (impersonal — to be about: йдеться про)'
  - нести відповідальність (to bear responsibility)
  - вести переговори (to conduct negotiations)
  - вести себе (to behave)
  recommended:
  - 'злетіти (to soar — figurative: prices soar)'
  - водити за ніс (to deceive — idiom)
  - вийти (to turn out / result)
  - підійти (to suit — figurative)
  - дійти до висновку (to reach a conclusion)
  - обійтися (to get by without)
  - хмари пливуть (clouds drift)
  - мурашки біжать (goosebumps)
  - багатозначне слово (polysemous word)
  - фразеологізм (phraseological unit / idiom)
