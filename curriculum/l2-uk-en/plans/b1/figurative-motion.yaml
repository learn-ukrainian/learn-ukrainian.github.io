module: b1-035
level: B1
sequence: 35
slug: figurative-motion
version: '3.0'
title: Час іде, дощ іде
subtitle: Переносне вживання дієслів руху в українській мові
focus: communication
pedagogy: PPP
phase: B1.4 [Motion Verb Universe]
word_target: 4000
objectives:
- 'Learner can identify and use figurative expressions with іти/ходити: час іде, дощ іде, фільм іде, справи йдуть, мова йде
  про'
- Learner can identify and use figurative expressions with їхати/їздити, бігти, летіти, пливти and their prefixed forms
- Learner can distinguish literal from figurative uses of motion verbs in Ukrainian text and choose the correct one in production
- 'Learner can use Ukrainian figurative motion expressions instead of calquing from English (Ukrainian: дощ іде, not *дощ
  падає as a calque)'
dialogue_situations:
- setting: 'Philosophical conversation at a Київський парк (m, Kyiv park) on a rainy
    day — discussing life metaphors: Час іде (time passes). Дощ іде (it''s raining).
    Справи йдуть (things are going) добре. Мова йде (we''re talking about) про майбутнє.'
  speakers:
  - Подруги на прогулянці
  motivation: 'Figurative motion: час іде, дощ іде, справи йдуть, мова йде'
content_outline:
- section: Дієслова руху в переносному значенні (Motion verbs in figurative meaning)
  words: 600
  points:
  - 'Bridge from M28-M34: learners have mastered the literal motion verb system. But Ukrainians use motion verbs figuratively
    every day — for time, weather, processes, emotions. This module teaches the figurative layer that makes speech natural.'
  - 'From Авраменко Grade 5 p.27: a dialogue between siblings about ''Піде дощ'' — ''А хіба дощ може ходити?'' This is how
    Ukrainian textbooks introduce the concept of переносне значення (figurative meaning). Лексичне значення can be пряме (literal)
    or переносне.'
  - 'From Авраменко Grade 10 p.19: летіти is багатозначне — пташка летить (literal) vs час летить (figurative, = fast). Understanding
    polysemy is essential for natural Ukrainian.'
- section: 'Iти / ходити: найширший спектр (Iти/ходити: the broadest range)'
  words: 900
  points:
  - 'Weather: дощ іде (it''s raining), сніг іде (it''s snowing). NOT *дощ падає (English calque ''rain falls''). In Ukrainian,
    rain ''goes.'' Надворі йде сильний дощ. Вчора йшов сніг цілий день. From Вашуленко Grade 2 p.80: textbook exercise replacing
    ''іде'' with synonyms: Iде катер → Пливе катер. Iде зима → Настає зима.'
  - 'Time: час іде (time passes), роки йдуть (years go by), літо йде до кінця (summer is ending). Iдуть дні, тижні, місяці...
    Рік іде за роком. Note: for fast time, use летить (Час летить!) — see below.'
  - 'Processes and events: фільм іде (a film is showing/playing), урок іде (class is in session), концерт іде (concert is
    on), ремонт іде (renovations are underway), переговори йдуть (negotiations are in progress), справи йдуть добре (things
    are going well).'
  - 'Abstract expressions: мова йде про (it''s about / we''re talking about): Мова йде про реформи. йти на компроміс (to compromise):
    Уряд пішов на компроміс. йти на ризик (to take a risk): Він пішов на великий ризик. йти назустріч (to accommodate/meet
    halfway): Пішли нам назустріч. йтися (impersonal — to be about): Йдеться про безпеку.'
  - 'Prefixed figurative forms: вийти (to turn out/result): Вийшов гарний пиріг. Нічого не вийшло. підійти (to suit): Це мені
    не підходить (This doesn''t suit me). дійти (to reach understanding): Дійшов до висновку (reached a conclusion). прийти
    (to come to mind): Мені прийшла ідея. Прийшов час діяти. зайти (to go too far): Зайшов надто далеко (went too far). обійтися
    (to get by): Обійдемося без цього (we''ll manage without it).'
- section: 'Летіти: швидкість (Летіти: speed)'
  words: 500
  points:
  - 'Летіти figuratively = moving very fast, passing quickly: Час летить! (Time flies!). Дні летять (Days fly by). Новина
    облетіла все місто (News spread around the whole city). Ціни злетіли (Prices skyrocketed — злетіти = take off/soar).'
  - 'Prefixed figurative forms: злетіти (to soar): Ціни злетіли вгору. вилетіти (to get fired/expelled, colloquial): Вилетів
    з роботи. пролетіти (to fly by): Канікули пролетіли непомітно. налетіти (to swoop in/rush at): Раптом налетів вітер.'
  - 'Practice: 6-8 sentences where learners identify literal vs figurative uses of летіти and its prefixed forms.'
- section: 'Пливти: плавність i повільність (Пливти: smoothness and slowness)'
  words: 400
  points:
  - 'Пливти figuratively = moving smoothly, drifting, flowing: Хмари пливуть (Clouds drift). Мелодія пливе (The melody flows).
    Місяць пливе по небу (The moon floats across the sky). Думки пливуть (Thoughts drift). Туман пливе над річкою (Fog drifts
    over the river).'
  - 'Contrast with летіти: Час летить (fast) vs Час пливе (slow/smooth). Both describe time passing, but with opposite speed
    connotations.'
  - 'Practice: 4-6 sentences using пливти figuratively.'
- section: Бігти, їхати, нести та інші (Running, riding, carrying — other figurative uses)
  words: 600
  points:
  - 'Бігти figuratively = hurrying, being busy: Час біжить (Time runs — faster than іде, slower than летить). Вода біжить
    у річці (Water flows in the river). Мурашки біжать по шкірі (Goosebumps — literally ''ants run on skin'').'
  - 'Їхати figuratively (colloquial): Дах їде (going crazy — literally ''the roof is going''). Їхати на чомусь (to be obsessed
    with something, colloquial).'
  - 'Нести/носити figuratively: нести відповідальність (to bear responsibility). носити ім''я (to bear a name): Вулиця носить
    ім''я Шевченка. виносити рішення (to make a decision — formal/legal). Річка несе води (The river carries its waters —
    poetic).'
  - 'Вести/водити figuratively: вести переговори (to conduct negotiations). вести себе (to behave): Ведіть себе пристойно!
    вести блог/щоденник (to keep a blog/diary). водити за ніс (to deceive — literally ''lead by the nose'').'
- section: Українські вирази vs англійські кальки (Ukrainian expressions vs English calques)
  words: 600
  points:
  - 'Decolonized usage — genuine Ukrainian expressions: дощ іде (NOT *дощ падає — English calque ''rain falls''). час іде/летить/біжить
    (NOT *час пробігає — awkward). фільм іде (NOT *фільм показують — though both exist, іде is natural). справи йдуть (NOT
    *справи є — English ''things are'').'
  - 'Russicism warnings for figurative motion: *мова іде — CORRECT is мова йде or йдеться (the impersonal form йтися is most
    natural: Йдеться про важливі питання). *діло йде — can be a Russicism; prefer справа стоїть/річ у тому. Always check:
    does this expression exist in Ukrainian, or am I translating from Russian/English?'
  - 'Practice: learners rephrase English sentences using natural Ukrainian figurative motion verbs. 6-8 translation-avoidance
    exercises.'
- section: 'Підсумок: буквальне i переносне (Summary: literal and figurative)'
  words: 400
  points:
  - 'Summary table of key figurative uses: іти: weather, time, processes, events. летіти: speed, rapid change. пливти: smoothness,
    drifting. бігти: hurrying, flowing. нести/носити: responsibility, names. вести/водити: negotiations, behavior.'
  - 'Preview of M36: Подорож Україною — travel narratives combining literal motion verbs with the cultural vocabulary of Ukrainian
    travel.'
vocabulary_hints:
  required:
  - переносне значення (figurative meaning)
  - пряме значення (literal meaning)
  - дощ іде (it's raining — figurative use of іти)
  - час іде (time passes)
  - час летить (time flies)
  - справи йдуть (things are going — about progress)
  - мова йде про (it's about / the topic is)
  - 'йтися (impersonal — to be about: йдеться про)'
  - нести відповідальність (to bear responsibility)
  - вести переговори (to conduct negotiations)
  - вести себе (to behave)
  recommended:
  - 'злетіти (to soar — figurative: prices soar)'
  - водити за ніс (to deceive — idiom)
  - вийти (to turn out / result)
  - підійти (to suit — figurative)
  - дійти до висновку (to reach a conclusion)
  - обійтися (to get by without)
  - хмари пливуть (clouds drift)
  - мурашки біжать (goosebumps)
  - багатозначне слово (polysemous word)
  - фразеологізм (phraseological unit / idiom)
