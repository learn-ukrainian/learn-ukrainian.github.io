slug: synonymy-speaking-verbs
version: '2.0'
title: 'Синоніми II: дієслова мовлення'
subtitle: 'Synonymy II: Speaking Verbs'
focus: vocabulary
pedagogy: PPP
phase: B1.6 [Vocabulary Expansion II]
word_target: 4000
objectives:
- Learner can distinguish between казати/говорити/розповідати/повідомляти
- Learner can use 20 speaking verbs with appropriate collocations
- Learner can select verbs by register (formal vs informal)
- Learner can report speech using varied verbs
content_outline:
- section: Вступ (Introduction)
  words: 600
  points:
  - Lexical synonymy importance per Standard §4.5.1.1 to move beyond overused generic verbs like 'казати' and 'говорити'.
  - 'Register awareness: identifying the spectrum from formal ''повідомляти'' (to inform) to informal ''балакати'' (to chat/babble).'
  - 'Categorization of verbs by interaction type: monologue-focused (говорити) vs. interactive dialogue (розмовляти, спілкуватися).'
- section: Культурний контекст (Cultural Context)
  words: 800
  points:
  - 'The Kobzar Tradition: Exploring the oral historian role where history was ''told'' (розповідали) via ''dumy'' rather
    than read from books.'
  - 'Solov''ina Mova (Nightingale Language): Cultural value of bird metaphors like ''щебетати'' (to chirp) and ''воркувати''
    (to coo) for melodic speech.'
  - Taras Shevchenko as 'The Great Kobzar' and the cultural weight of the verb 'розповідати' in preserving national memory.
- section: Лексичні нюанси та граматика (Lexical Nuances and Grammar)
  words: 1000
  points:
  - 'Semantic differentiation: when to use ''розповідати'' for narratives vs. ''казати'' for discrete content or simple reporting.'
  - 'Standard §4.4.3 implementation: Constructing indirect speech using ''що'' clauses to report statements with varied introductory
    verbs.'
  - 'Manner of speech verbs: Introducing ''шепотіти'' (whisper) and ''кричати'' (shout) to enhance descriptive depth in storytelling.'
  - 'Aspect nuance drill: ''казати'' (process/habitual) vs. ''сказати'' (result/single instance) in reporting contexts.'
- section: Робота над помилками (Addressing Learner Errors)
  words: 800
  points:
  - 'Learner error: ''говорити на українській мові'' (wrong preposition) vs. correct instrumental ''говорити українською мовою''.'
  - 'Learner error: using ''казати'' for ''to tell a story'' (must be ''розповідати'') — drill with narrative contexts.'
  - 'Learner error: using generic ''говорити'' for interactive conversations where ''розмовляти'' is more natural and precise.'
  - 'Aspect error: using ''казати'' (impf) for a single completed info point instead of ''сказати'' (pf).'
- section: Практика та застосування (Practice and Application)
  words: 800
  points:
  - 'Theater Actor role-play: expressing different emotions through manner of speech verbs (whispering secrets, shouting joy).'
  - 'Professional simulation: writing a formal update using ''повідомляти'' and ''заявляти'' vs. a casual coffee chat using
    ''балакати''.'
  - 'Reporting task: summarizing a conversation using ''він стверджував, що...'' and ''вона пояснювала, що...'' to master
    indirect speech.'
vocabulary_hints:
  required:
  - говорити (to speak) — High frequency; denotes general ability or serious tone (говорити українською, говорити про справу).
  - казати (to say) — High frequency; focus on content of speech (казати правду, як кажуть, казати «дякую»).
  - розповідати (to tell) — Medium frequency; narrative focus (розповідати історію, розповідати казки).
  - повідомляти (to inform) — Medium frequency; formal/official register (повідомляти новини, офіційно повідомляти).
  - розмовляти (to converse) — Medium frequency; interactive dialogue (розмовляти з другом, розмовляти по телефону).
  - спілкуватися (to communicate) — Medium frequency; broad interaction (спілкуватися з колегами, спілкуватися в інтернеті).
  - пояснювати (to explain) — focus on clarity (пояснювати правила, пояснювати причину).
  - запитувати (to ask) — requesting information (запитувати дорогу, запитувати про здоров'я).
  recommended:
  - балакати (to chat) — Low frequency; informal/oral (балакати про дурниці, просто балакати).
  - заявляти (to declare) — Formal/Public (офіційно заявляти).
  - стверджувати (to claim) — Logical/Formal (стверджувати, що це правда).
  - шепотіти (to whisper) — Manner of speech (шепотіти на вухо).
  - кричати (to shout) — Manner of speech (кричати від радості).
  - щебетати (to chirp) — Cultural metaphor for melodic/birds-like speech (щебетати українською).
  - описувати (to describe) — (описувати ситуацію, описувати зовнішність).
