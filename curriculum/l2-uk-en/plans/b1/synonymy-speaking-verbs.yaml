module: b1-69
level: B1
sequence: 69
slug: synonymy-speaking-verbs
version: '2.0'
title: 'Синоніми II: дієслова мовлення'
subtitle: 'Synonymy II: Speaking Verbs'
content_outline:
- section: Вступ
  points:
  - 'Beyond казати and говорити — expressiveness focus per Standard §4.5.1.1; learner
    error: overuse of generic verbs'
  - 'Verb categories — distinction between monologue (говорити, розповідати) and dialogue
    (розмовляти, спілкуватися); learner error: using ''говорити'' for interactive
    conversation'
  - Register awareness — from formal 'повідомляти' (to inform) to informal 'балакати'
    (to chat/babble)
- section: Читання
  points:
  - 'Speaking verb texts — cultural hook: The Kobzar Tradition (telling history, not
    reading) and ''Solov''ina Mova'' (bird metaphors like ''щебетати'')'
  - 'Semantic differences — learner error: using ''казати'' for storytelling (must
    be ''розповідати''); aspect nuance: ''казати'' (process) vs ''сказати'' (result)'
- section: Діалоги
  points:
  - Use varied speaking verbs — introduce manner of speech verbs like 'шепотіти' (whisper)
    and 'кричати' (shout)
  - 'Report conversations — reinforce indirect speech structure (§4.4.3) with ''що''
    clauses; learner error: ''говорити на'' instead of instrumental case'
vocabulary_hints:
  required:
  - казати (to say) — казати правду, казати «дякую», як кажуть
  - говорити (to speak) — говорити українською (instrumental case!), говорити про
    справу
  - розповідати (to tell) — розповідати історію, розповідати про себе
  - повідомляти (to inform) — повідомляти новини, офіційно повідомляти
  - розмовляти (to converse) — розмовляти з другом, розмовляти по телефону
  - обговорювати (to discuss) — обговорювати плани, обговорювати проблему
  - пояснювати (to explain) — пояснювати правила, пояснювати причину
  - запитувати (to ask) — запитувати дорогу, запитувати про здоров'я
  recommended:
  - заявляти (to declare) — офіційно заявляти
  - стверджувати (to claim) — стверджувати, що це правда
  - описувати (to describe) — описувати ситуацію
  - спілкуватися (to communicate) — спілкуватися з колегами, спілкуватися в інтернеті
  - балакати (to chat) — балакати про дурниці (informal)
  - шепотіти (to whisper) — шепотіти на вухо
  - кричати (to shout) — кричати від радості
