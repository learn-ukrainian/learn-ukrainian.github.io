module: b1-077
level: B1
sequence: 77
slug: complex-subordinate-reason
version: '3.1.2'
title: "Речення причини"
subtitle: "Чому? Бо, тому що, через те що, оскільки"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Складний синтаксис]"
word_target: 4000
objectives:
  - "Учень вміє будувати підрядні обставинні причини для пояснення причини дії головного речення, використовуючи бо, тому що, через те що, оскільки, у зв'язку з тим що."
  - "Учень вміє розрізняти сполучники причини за стилем: бо (нейтральний/розмовний), тому що (нейтральний), оскільки (офіційний), через те що (наголос на причині)."
  - "Учень може правильно ставити коми: перед бо, перед що у тому що/через те що, та використовувати розщеплену конструкцію тому..., що."
  - "Учень навчиться поєднувати причинні речення з іншими типами підрядних для побудови складних багатокомпонентних конструкцій."
  - "Учень вміє природно виражати причину в усному та писемному українському мовленні."
dialogue_situations:
  - setting: 'Студент пояснює професору, чому затримав есе — причинні речення: Я запізнився, бо хворів (was ill). Оскільки бібліотека (f, library) була зачинена, не зміг знайти джерела (pl, sources). Через те що інтернет (m) не працював, не надіслав вчасно.'
    speakers:
      - Студент
      - Професор
    motivation: 'Причинні речення: бо, оскільки, через те що, тому що — офіційний та неформальний стилі'
content_outline:
  - section: "Підрядні обставинні причини"
    words: 700
    points:
      - "Визначення із підручника Авраменка (8 клас, с. 86): складнопідрядне речення з підрядним причини — таке, в якому підрядна частина вказує на причину дії, про яку йдеться в головній частині. Одягай пальто, бо буде холодно."
      - "Підрядна частина причини стосується ВСІЄЇ головної частини (а не окремого слова): Ми не пішли на прогулянку, бо пішов дощ. Тому що він запізнився, ми почали без нього. Вони відповідають на питання чому? через що? з якої причини?"
      - "Позиція: зазвичай ПІСЛЯ головної частини (природний порядок слів), але може стояти перед нею для логічного наголосу: Оскільки погода погіршилася, ми вирішили залишитися вдома."
  - section: "Сполучники причини"
    words: 850
    points:
      - "Бо — найпоширеніший, нейтральний або злегка розмовний сполучник: Я не прийшов, бо був хворий. Вона усміхається, бо рада. Завжди стоїть МІЖ частинами речення (після головної). Цей варіант найчастіше використовується у повсякденному спілкуванні."
      - "Тому що — нейтральний, трохи офіційніший за бо: Я не прийшов, тому що був хворий. Важливо: розташування коми залежить від логічного наголосу. Стандартне: Я не прийшов, тому що був хворий. (кома перед тому що). Розщеплене: Я не прийшов тому, що був хворий. (кома розділяє тому...що, акцентуючи увагу на причині)."
      - "Оскільки — офіційний сполучник, часто розпочинає речення: Оскільки погода погіршилася, ми вирішили залишитися. У зв'язку з тим що — дуже офіційний, типовий для ділових документів: У зв'язку з тим що проєкт завершено, пропонуємо звіт."
      - "Через те що — підкреслює причину як перешкоду: Через те що йшов дощ, матч перенесли. Завдяки тому що — позитивна причина: Завдяки тому що він допоміг, ми встигли."
      - "Стилістичні нюанси та практика: 8 речень — обрати найбільш відповідний сполучник на основі стилю та контексту."
  - section: "Причина vs умова"
    words: 600
    points:
      - "Зіставлення з умовними реченнями (M71): Причина: Одягай пальто, бо буде холодно. (буде холодно — це факт). Умова: Одягай пальто, якщо буде холодно. (ЯКЩО буде холодно — гіпотетична ситуація). З підручника Авраменка (8 клас, с. 86): «Чи однакові за змістом речення?» Учні повинні розуміти реальну різницю: причина = відомий факт, умова = можливість."
      - "Практика: класифікувати 6 пар речень як причинні або умовні."
  - section: "Пунктуація причинних речень"
    words: 650
    points:
      - "Правила: Бо: кома завжди перед бо. Він не прийшов, бо захворів. Тому що: кома перед тому що (як єдиним цілим) або тому, що (з розщепленням). Оскільки: кома після підрядної частини, якщо вона передує головній. Через те що / у зв'язку з тим що: кома перед усім сполучником або розщеплення: через те, що."
      - "Нерозщеплені та розщеплені конструкції: Нерозщеплена (весь сполучник як єдине ціле): Я не прийшов, тому що захворів. Розщеплена (емфатична): Я не прийшов тому, що захворів. У розщепленій конструкції тому переходить у головну частину як співвідносне слово."
      - "Практика: розставити розділові знаки у 10 реченнях із причинними підрядними."
  - section: "Причинні речення у мовленні"
    words: 800
    points:
      - "Текст для читання: текст, що пояснює причини подій із використанням різних причинних сполучників. Учні знаходять усі причинні підрядні та визначають стиль кожного сполучника."
      - "Діалог: пояснення причин та обґрунтування рішень. Природне використання бо (розмовно) та тому що (трохи офіційніше)."
      - "Продукція: написати 6-8 речень із поясненням причин подій з власного життя, використавши щонайменше 3 різні причинні сполучники. Потім перефразувати 2 з них, використовуючи дієприслівникові звороти: Бо він запізнився, ми почали без нього. → Запізнившись, він пропустив початок."
  - section: "Підсумок та перехід до M71"
    words: 400
    points:
      - 'Підсумок: причинні = чому? через що? Сполучники: бо (розмовний), тому що (нейтральний), оскільки (офіційний), через те що (перешкода). Пунктуація: кома перед сполучником або розщеплення тому...що. Самоперевірка: Я розрізняю причинні сполучники за стилем ✓/✗.'
      - "Анонс: M71 — Речення умови. Умова: якщо, коли (=якщо), як."
vocabulary_hints:
  required:
    - "підрядне обставинне причини (causal subordinate clause)"
    - "бо (because — neutral/colloquial)"
    - "тому що (because — neutral)"
    - "оскільки (since, because — formal)"
    - "через те що (because of the fact that — obstacle emphasis)"
    - "причина (cause, reason)"
  recommended:
    - "у зв'язку з тим що (in connection with the fact that — very formal)"
    - "завдяки тому що (thanks to the fact that — positive cause)"
    - "з тієї причини що (for the reason that)"
    - "кореляція (correlation — тому in main clause)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про підрядні обставинні причини і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Сполучники причини»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему підрядні обставинні причини."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему сполучники причини."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Підрядні обставинні причини»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Сполучники причини» з їхніми визначеннями."
