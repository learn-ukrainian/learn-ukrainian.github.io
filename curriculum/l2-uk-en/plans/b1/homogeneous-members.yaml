module: b1-081
level: B1
sequence: 81
slug: homogeneous-members
version: 1.0.2
title: Однорідні члени речення
subtitle: Пунктуація, сполучники та узагальнювальне слово
focus: grammar
pedagogy: TTT
phase: B1.7 [Складний синтаксис]
word_target: 4000
objectives:
- 'Учень вміє визначати однорідні члени речення та пояснювати їхні визначальні ознаки: відповідають на
  те саме питання, залежать від того самого слова, виконують однакову синтаксичну роль'
- 'Учень вміє правильно розставляти розділові знаки в реченнях з однорідними членами: кома перед а, але,
  проте; кома при повторюваних сполучниках (і...і, то...то); відсутність коми при одиничних і, та, або,
  чи'
- 'Учень вміє вживати узагальнювальне слово при однорідних членах і застосовувати правильну пунктуацію:
  двокрапка після узагальнювального слова перед переліком, тире після переліку перед узагальнювальним
  словом'
- Учень вміє будувати природні українські речення з однорідними членами, використовуючи різні сполучники
  (єднальні, протиставні, розділові) та відповідні інтонаційні моделі
dialogue_situations:
- setting: 'Друзі планують поїздку на вихідні — перелік занять та місць: Можемо поїхати і на Синевир (m),
    і до Мукачева (n), і в Ужгород (m). — А мені хочеться або в гори (pl), або на узбережжя (n). Треба
    вибрати!'
  speakers:
  - Ірина
  - Дмитро
  motivation: Повторюваний єднальний сполучник і...і (кома перед кожним). Розділовий сполучник або...або
    (кома перед другим). Природний перелік у контексті планування.
content_outline:
- section: 'Однорідні члени: визначення і розпізнавання'
  words: 1000
  points:
  - 'Визначення (Заболотний, 5 клас, с.178): Однорідними називають члени речення, які залежать від того
    самого слова в реченні, відповідають на те саме питання і виконують однакову синтаксичну роль. Приклад:
    Фермер засіяв поля пшеницею, вівсом і ячменем. (Три однорідні додатки — чим? — залежать від засіяв.)'
  - 'Будь-який член речення може бути однорідним (Глазова, 11 клас, с.126): Однорідні підмети: Діти і
    дорослі зібралися на свято. Однорідні присудки: Вона читала, писала і малювала. Однорідні додатки:
    Купив хліб, молоко та масло. Однорідні означення: Високе, стрункий, зелене дерево. Однорідні обставини:
    Він працював швидко, точно і сумлінно.'
  - 'Як розпізнати — три перевірки: 1. Чи відповідають на те саме питання? 2. Чи залежать від того самого
    слова? 3. Чи виконують однакову синтаксичну роль? Якщо всі три відповіді ТАК → це однорідні члени.'
  - 'Інтонація однорідних членів: Перелічувальна інтонація — кожен член отримує однаковий наголос із легким
    підвищенням тону: Яблука↗, груші↗, сливи↘. Ця інтонація сигналізує слухачеві, що йде перелік. Практика:
    учні читають речення вголос із правильною перелічувальною інтонацією.'
- section: Сполучники при однорідних членах
  words: 1000
  points:
  - 'Три типи сполучників (Авраменко, 7 клас, с.173): Єднальні: і (й), та (= і), також. Протиставні: а,
    але, проте, та (= але), зате, однак. Розділові: або, чи, то...то, хоч...хоч.'
  - 'Правила пунктуації при єднальних сполучниках (Глазова, 11 клас, с.126): Одиничний і/й/та (= і) —
    БЕЗ коми: Поезія — безмежний степ і лебединий легіт. Повторювані і...і / та...та — КОМА перед кожним
    повторюваним сполучником: Душа і трудиться, і мріє. І яблука, і груші, і сливи — все дозріло.'
  - 'Пунктуація при протиставних сполучниках: ЗАВЖДИ ставиться кома перед а, але, проте, зате, однак:
    Підніматися вгору важко, але радісно. Він не великий, а середній. Слово маленьке, проте важливе. Без
    винятків — протиставні сполучники завжди вимагають коми.'
  - 'Пунктуація при розділових сполучниках: Одиничні або/чи — БЕЗ коми: Приходь сьогодні або завтра. Повторювані
    або...або / чи...чи / то...то — КОМА: Або ти підеш, або я піду. То дощ, то сонце. Чи він, чи вона
    — хтось мусить поїхати.'
- section: Узагальнювальне слово
  words: 1000
  points:
  - 'Визначення (Заболотний, 8 клас, с.25): Узагальнювальне слово — слово, що узагальнює весь перелік
    однорідних членів. Поширені узагальнювальні слова: все, всі, скрізь, завжди, ніхто, ніщо, ніколи,
    кожен, усюди.'
  - 'Правило пунктуації 1 — узагальнювальне слово ПЕРЕД переліком → двокрапка: Усе зраділо стрічаючи день:
    і трави, і квіти, і птахи. Він побував скрізь: у Києві, Львові, Одесі й Харкові. Модель: [узагальнювальне]:
    [однорідний 1], [однорідний 2], [однорідний 3].'
  - 'Правило пунктуації 2 — однорідні члени ПЕРЕД узагальнювальним словом → тире: І трави, і квіти, і
    птахи — усе зраділо. У Києві, Львові, Одесі — скрізь він побував. Модель: [однорідний 1], [однорідний
    2], [однорідний 3] — [узагальнювальне].'
  - 'Правило пунктуації 3 — узагальнювальне слово стоїть перед переліком, але речення продовжується після
    нього → двокрапка + тире: Усе: і трави, і квіти, і птахи — зраділо цього ранку. Практика: учні переписують
    речення, змінюючи місце узагальнювального слова та відповідну пунктуацію.'
- section: 'Підсумок: однорідні члени в тексті'
  words: 1000
  points:
  - 'Підсумкова таблиця пунктуації: Одиничні і/й/та(=і)/або/чи → без коми. Повторювані і...і/та...та/або...або/чи...чи/то...то
    → кома. а/але/проте/зате/однак → завжди кома. Узагальнювальне перед переліком → двокрапка. Перелік
    перед узагальнювальним → тире. Обидва випадки в середині речення → двокрапка...тире.'
  - 'Стилістичне використання однорідних членів: Перелік створює ритм і акцент. Асиндетон (безсполучниковий
    зв''язок) прискорює темп: Прийшов, побачив, переміг. Полісиндетон (багатосполучниковий зв''язок) уповільнює,
    додає ваги: І прийшов, і побачив, і переміг. Учні аналізують приклади з української літератури.'
  - 'Поширені помилки: *Я люблю читати, і малювати (кома перед одиничним і — НЕПРАВИЛЬНО). *Він не великий
    але сильний (немає коми перед але — НЕПРАВИЛЬНО). *Усе зраділо, і трави, і квіти (відсутня двокрапка
    після узагальнювального слова — НЕПРАВИЛЬНО, має бути: Усе зраділо: і трави, і квіти).'
  - 'Самоперевірка: 1. Знайдіть однорідні члени і визначте їхню синтаксичну роль у 3 реченнях. 2. Розставте
    розділові знаки: ''І яблука і груші і сливи все дозріло в саду.'' 3. Складіть 2 речення з узагальнювальним
    словом (одне з двокрапкою, одне з тире). 4. Поясніть різницю: ''Він любить читати і малювати'' проти
    ''Він любить і читати, і малювати.'''
vocabulary_hints:
  required:
  - однорідний (homogeneous — members that are equal in syntactic function)
  - сполучник (conjunction — word connecting sentence parts)
  - 'єднальний (coordinating/additive — conjunction type: і, та)'
  - 'протиставний (adversative — conjunction type: а, але, проте)'
  - 'розділовий (disjunctive — conjunction type: або, чи)'
  - узагальнювальний (generalizing — a word that summarizes a list)
  - двокрапка (colon — punctuation mark after узагальнювальне слово)
  - тире (dash — punctuation mark before узагальнювальне слово)
  - кома (comma — basic punctuation between однорідні члени)
  - пунктуація (punctuation — system of розділові знаки)
  - перелік (enumeration/list — a series of однорідні члени)
  - інтонація (intonation — voice pattern for listing)
  - підмет (subject — sentence member that can be однорідний)
  - присудок (predicate — sentence member that can be однорідний)
  - додаток (object — sentence member that can be однорідний)
  recommended:
  - означення (attribute/modifier — sentence member that can be однорідний)
  - обставина (adverbial — sentence member that can be однорідний)
  - речення (sentence — syntactic unit containing однорідні члени)
  - синтаксичний (syntactic — relating to sentence structure)
  - перелічувальний (enumerative — type of intonation for lists)
  - відокремлений (detached/parenthetical — contrasted with однорідний)
  - асиндетон (asyndeton — listing without conjunctions)
activity_hints:
- type: reading
  focus: Прочитати текст про однорідні члени речення та дати відповіді на запитання
- type: essay-response
  focus: Написати 5 речень, використовуючи нові правила з розділу «Сполучники при однорідних членах»
- type: fill-in
  focus: Вставити правильні розділові знаки або сполучники в реченнях з однорідними членами
- type: error-correction
  focus: Знайти й виправити пунктуаційні помилки в реченнях з однорідними членами
- type: quiz
  focus: Обрати правильний варіант пунктуації для речень з однорідними членами
- type: match-up
  focus: З'єднати типи сполучників (єднальні, протиставні, розділові) з їхніми прикладами та правилами
connects_to:
- b1-073 (складносурядне речення — розширює вживання сполучників)
- b1-074 (складнопідрядне речення — порівняння з однорідними)
- b1-083 (контрольна робота з синтаксису — перевірка синтаксису, включаючи однорідні члени)
- b1-079 (вставні слова — інше ускладнення простого речення)
prerequisites:
- Завершення рівня A2 (базова структура речення, знання сполучників і, а, але)
- b1-073 до b1-080 (основи складного речення)
