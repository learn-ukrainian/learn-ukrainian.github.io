module: b1-082
level: B1
sequence: 82
slug: emotional-intelligence
version: '2.0'
title: Емоційний інтелект та міжособистісні навички
subtitle: Emotional Intelligence & Interpersonal Skills
focus: vocabulary
pedagogy: TTT
phase: B1.6 [Vocabulary Expansion II]
word_target: 4000
objectives:
- Learner can use 30+ emotional and interpersonal vocabulary words in context
- Learner can distinguish between similar concepts like співчуття/емпатія
- Learner can form natural collocations with interpersonal nouns and verbs
- Learner can discuss emotional intelligence concepts
content_outline:
- section: 'Вступ: Що таке емоційний інтелект? (Introduction: What is Emotional Intelligence?)'
  words: 500
  points:
  - 'Визначення EQ (емоційного інтелекту) — collocations: розвивати емоційний інтелект, високий/низький рівень EQ, складові
    інтелекту; modern usage in professional and personal contexts.'
  - 'Філософія серця або Кордоцентризм — cultural hook: Exploring the ideas of Hryhorii Skovoroda and Pamfil Yurkevych; why
    the ''heart'' (серце) is the center of emotional life and cognition in Ukrainian culture vs. the Western focus on the
    ''mind''.'
- section: 'Емпатія та співчуття: Розуміння серцем (Empathy and Sympathy: Understanding with the Heart)'
  words: 800
  points:
  - 'Різниця між емпатією і співчуттям — learner error: distinguishing between ''емпатія'' (sharing the emotion, feeling *with*)
    and ''співчуття'' (compassion/pity from outside, feeling *for*); drill with situational contexts.'
  - 'Українські ідіоми про серце — immersion: using phrases like ''брати до серця'' (take to heart), ''від щирого серця''
    (from the bottom of one''s heart), ''серце не на місці'' (to be worried); connecting linguistic anchors to the cordocentric
    worldview.'
  - 'Сила розділених почуттів — cultural hook: Proverb ''Поділена радість — подвійна, а поділене горе — вдвічі менше'' (Shared
    joy is double, shared grief is half) as a basis for practicing empathy expressions.'
- section: Підтримка та турбота в міжособистісних навичках (Support and Care in Interpersonal Skills)
  words: 700
  points:
  - 'Висловлення турботи та занепокоєння — State Standard competence: forms for expressing hope (надія), care (турбота), and
    concern (занепокоєння); collocations like ''виражати занепокоєння'' and ''проявляти турботу''.'
  - 'Мистецтво надання підтримки — collocations: надавати моральну підтримку, шукати взаємну підтримку, щира підтримка; using
    the ''Conflict Mediator'' tone to offer help delicately without being intrusive.'
- section: Культура вибачення та подолання конфліктів (Culture of Apology and Overcoming Conflicts)
  words: 800
  points:
  - 'Як правильно просити вибачення — learner error: correcting the reflexive mistake ''Я вибачаюся'' (which technically means
    ''I forgive myself'') to the proper ''Я перепрошую'' or ''Прошу вибачення''.'
  - 'Боротьба з мовними кальками — learner error: identifying and avoiding the Russian calque ''приносити вибачення''; practicing
    the natural ''просити вибачення'' and ''приймати вибачення''.'
  - 'Етика примирення та надійність — cultural hook: Proverb ''Добрий чоловік — надійніше кам’яного мосту'' (A kind man is
    more reliable than a stone bridge); phrases for reconciliation and restoring trust.'
- section: 'Діалоги: Підтримка та делікатні розмови (Dialogues: Support and Delicate Conversations)'
  words: 600
  points:
  - 'Розмова з другом у скруті — practice: implementing ''висловлювати співчуття'' in active listening scenarios; using modal
    hedging and supportive collocations in high-stakes emotional situations.'
  - 'Навички активного слухання — vocabulary: Phrases to show engagement without interrupting; practicing the ''Conflict Mediator''
    persona to de-escalate tension and provide feedback.'
- section: Саморефлексія та підсумок (Self-Reflection and Summary)
  words: 600
  points:
  - Самоаналіз та зворотний зв’язок — vocabulary for self-reflection (саморефлексія) and feedback (зворотний зв’язок); preparation
    for b1-91 (Feedback) through describing one's own emotional state and reactions.
  - 'Міні-чекпоінт: Лексика B1.5-B1.6 — assessment: self-evaluation of 30+ keywords from modules M52-71; testing the ability
    to form natural collocations with abstract interpersonal nouns.'
vocabulary_hints:
  required:
  - емоційний інтелект (emotional intelligence) — розвивати ~, високий/низький рівень ~, складові ~; high-frequency modern
    usage.
  - емпатія (empathy) — проявляти ~, розвинута ~, здатність до ~; implies feeling *with* someone (sharing the emotion).
  - співчуття (sympathy/compassion) — висловлювати ~, щире ~, глибоке ~; implies feeling *for* someone (pity/concern); State
    Standard requirement.
  - підтримка (support) — надавати ~, шукати ~, моральна ~, взаємна ~; high-frequency usage in crisis and daily life.
  - вибачення (apology) — просити ~, приймати ~, щирі ~; avoid calque 'приносити вибачення'.
  - турбота (care/concern) — проявляти ~, виявляти ~, оточувати ~; key for interpersonal skills.
  - занепокоєння (concern/worry) — виражати ~, глибоке ~, викликати ~; State Standard requirement for B1.
  - пробачення (forgiveness) — просити ~, отримати ~, дарувати ~; core for reconciliation.
  recommended:
  - саморефлексія (self-reflection) — здатність до ~, займатися ~; essential for EQ growth.
  - зворотний зв’язок (feedback) — давати ~, приймати ~, конструктивний ~; prepares for professional modules.
  - кордоцентризм (cordocentrism) — філософський термін; understanding the 'heart-centered' nature of Ukrainian culture.
  - перепрошувати (to apologize/pardon) — я перепрошую; polite and correct alternative to the reflexive 'вибачаюся'.
  - примирення (reconciliation) — шлях до ~, шукати ~; process of resolving conflict.
  - активне слухання (active listening) — навички ~; interpersonal technique.
