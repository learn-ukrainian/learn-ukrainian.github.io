module: b1-71
level: B1
sequence: 71
slug: emotional-intelligence
version: '2.0'
title: Емоційний інтелект та міжособистісні навички
subtitle: Emotional Intelligence & Interpersonal Skills
content_outline:
- section: Вступ — Що таке емоційний інтелект?
  points:
  - 'Визначення EQ та чому це важливо — collocations: розвивати ~, високий/низький
    рівень ~, складові ~'
  - 'Емоційний інтелект в українській культурі — cultural hook: Cordocentrism (Philosophy
    of the Heart), emphasizing ''heart'' (кордоцентризм) over ''mind'''
- section: Емпатія та співчуття — Чути серцем
  points:
  - 'Різниця між емпатією і співчуттям — learner error: confusion between feeling
    *with* (емпатія) vs *for* (співчуття)'
  - 'Як висловити підтримку українською — collocations: надавати ~, шукати ~, моральна
    ~, взаємна ~'
  - 'Активне слухання як навичка — cultural hook: Proverb ''Поділена радість — подвійна,
    а поділене горе — вдвічі менше.'''
- section: Конфлікти та примирення
  points:
  - 'Як вибачатися і пробачати — learner error: ''Я вибачаюся'' (I forgive myself)
    vs correct ''Я перепрошую'' or ''Я прошу вибачення'''
  - 'Фрази для вирішення конфліктів — collocations: просити ~, приймати ~, щирі ~;
    avoid calque ''приносити вибачення'''
  - 'Культура примирення в Україні — cultural hook: Proverb ''Добрий чоловік — надійніше
    кам''яного мосту.'''
- section: Діалоги — Підтримка друга
  points:
  - 'Розмова з другом у скруті — tone: Conflict Mediator persona guides through delicate
    situations'
  - Як давати поради делікатно — use phrase 'висловлювати співчуття'
- section: Зворотний зв'язок та саморефлексія
  points:
  - Як приймати і давати фідбек — prepares for b1-91 (Feedback)
  - Слова для самоаналізу
- section: Підсумок — EQ у повсякденному житті
  points:
  - Практичні поради для розвитку EQ
- section: 'Міні-чекпоінт: Лексика B1.5-B1.6'
  points:
  - Самооцінка словникового запасу M52-71
  - Тест на 20 ключових слів з абстрактної лексики
  - Тест на 20 ключових слів з професійної/емоційної лексики
- section: Потрібно більше практики?
  points: []
vocabulary_hints:
  required:
  - емоційний інтелект (emotional intelligence) — розвивати ~, високий/низький рівень
    ~, складові ~
  - емпатія (empathy) — проявляти ~, розвинута ~, здатність до ~; implies feeling
    *with*
  - співчуття (sympathy) — висловлювати ~, щире ~, глибоке ~; implies feeling *for*
  - підтримка (support) — надавати ~, шукати ~, моральна ~, взаємна ~
  - розуміння (understanding)
  - вибачення (apology) — просити ~, приймати ~, щирі ~; avoid 'приносити вибачення'
    (calque)
  - пробачення (forgiveness)
  - конфлікт (conflict)
  recommended:
  - саморефлексія (self-reflection)
  - зворотний зв'язок (feedback)
  - примирення (reconciliation)
  - активне слухання (active listening)
