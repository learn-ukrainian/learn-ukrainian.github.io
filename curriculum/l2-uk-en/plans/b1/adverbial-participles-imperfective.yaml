module: b1-051
level: B1
sequence: 51
slug: adverbial-participles-imperfective
version: '2.0'
title: Дієприслівники недоконаного виду
subtitle: Adverbial Participles - Imperfective (-ючи/-ачи)
focus: grammar
pedagogy: TTT
phase: B1.4a [Participles]
word_target: 4000
objectives:
- Learner can form imperfective adverbial participles using -ючи/-ачи suffixes
- Learner can use adverbial participles to express simultaneous actions
- Learner can explain when imperfective participles are preferred
- Learner can replace subordinate clauses with adverbial participles
content_outline:
- section: Вступ (Introduction)
  words: 600
  points:
  - 'Alignment with State Standard §4.4.2: Introduction of adverbial participle phrases (дієприслівникові звороти) as a tool
    for expressing simultaneous actions in simple complicated sentences.'
  - 'Pedagogical hook: ''Sentence Compression'' technique — demonstrating how to transform clunky subordinate clauses from
    module b1-41 (''Коли я йшов...'') into elegant, streamlined participle phrases (''Йдучи...'').'
  - 'Cultural hook: ''Юлій Цезар по-українськи'' — exploring the cultural concept of the multitasking ''Caesar'' as a motivator
    for learning how to describe multiple simultaneous actions using imperfective participles.'
- section: 'Граматичне пояснення: Творення та вживання (Grammar: Formation and Usage)'
  words: 1000
  points:
  - 'Suffix formation rules for -ючи/-ачи: Mapping the connection to the 3rd person plural present tense, emphasizing the
    distinction between I (-учи/-ючи) and II (-ачи/-ячи) conjugations.'
  - 'Critical Error Prevention: Addressing suffix confusion to avoid mistakes like ''писачи'' (wrong) vs ''пишучи'' (correct,
    from пишуть) and ''бачачи'' (correct, from бачать) vs ''бачучи'' (wrong).'
  - 'Visualizing Simultaneity: Using a parallel timeline model to show the main verb action and the adverbial participle action
    running concurrently, reinforcing the ''doing while doing'' logic.'
  - 'High-frequency discourse markers: Practical focus on ''fixed'' conversational forms essential for B1 fluency, such as
    ''чесно кажучи'', ''інакше кажучи'', and ''м’яко кажучи''.'
- section: Синтаксичні пастки та помилки (Syntactic Traps and Errors)
  words: 800
  points:
  - 'The ''Dangling Participle'' (Дисбаланс підметів): Detailed analysis of the error ''Йдучи додому, почався дощ'' and drills
    on ensuring the subject of the main verb is also the performer of the participle action.'
  - 'Impersonal Sentence Restriction: Explaining why constructions like ''Читаючи цей текст, мені стало сумно'' are grammatically
    forbidden and practicing transformations into personal sentences (''Читаючи... я засмутився'').'
  - 'Semantic Distinction: Differentiating between the literal adverbial use of ''не дивлячись'' (not looking) and the abstract
    prepositional use ''не дивлячись на'' (despite/regardless of).'
- section: Практика та культурний контекст (Practice and Cultural Context)
  words: 900
  points:
  - 'Cultural Deep Dive: ''За двома зайцями'' — using the iconic Ukrainian proverb and play/film to illustrate the chaos of
    trying to do too many things simultaneously through narrative exercises.'
  - 'Contextual Collocations: Vocabulary-building drills using high-frequency clusters from research, such as ''читаючи новини'',
    ''йдучи вулицею'', and ''знаючи правду''.'
  - 'Transformational Dialogue: Roleplay scenarios (e.g., multitasking at work or home) requiring learners to compress complex
    descriptions into professional-sounding B1-level participle phrases.'
- section: Підсумок та самоконтроль (Summary and Self-Control)
  words: 700
  points:
  - Synthesized review of simultaneity (одночасність) as the hallmark of the imperfective adverbial participle, setting the
    stage for the contrast with perfective forms in b1-43.
  - 'Self-correction checklist: A ''Screenwriter’s Checklist'' for learners to verify subject alignment and suffix accuracy
    in their own writing and speech.'
  - 'Final production task: Describing a chaotic or multitasking scene from a film using at least five different imperfective
    adverbial participles.'
vocabulary_hints:
  required:
  - дієприслівник (adverbial participle) — grammar term for verbal adverbs
  - недоконаний вид (imperfective aspect) — signals ongoing or simultaneous action
  - одночасність (simultaneity) — State Standard §4.4.2 concept; two actions happening at once
  - суфікс (suffix) — -ючи/-ачи (I vs II conjugation markers)
  - 'читаючи (while reading) — High frequency: читаючи книгу, читаючи новини, читаючи вголос'
  - 'дивлячись (looking/while looking) — High frequency: дивлячись у вікно, дивлячись в очі; note ''не дивлячись на'' (despite)'
  - 'йдучи (while walking/going) — High frequency motion: йдучи вулицею, йдучи додому, йдучи на роботу'
  - 'знаючи (knowing/while knowing) — Cognitive usage: знаючи правду, не знаючи дороги'
  - 'кажучи (saying/speaking) — Discourse markers: чесно кажучи, інакше кажучи, м''яко кажучи'
  recommended:
  - підмет (subject) — essential for the 'Same Subject' rule in syntax
  - 'трансформація (transformation) — pedagogy: sentence compression from clauses to phrases'
  - підрядне речення (subordinate clause) — the 'uncompressed' version of the sentence
  - замінювати (to replace) — for swapping clauses with participles
  - роблячи (while doing) — general action participle
  - слухаючи (while listening) — слухаючи музику, слухаючи лекцію
  - бачачи (while seeing) — бачачи результат, бачачи проблему
  - дисбаланс підметів (dangling participle) — label for the most common learner syntax error
