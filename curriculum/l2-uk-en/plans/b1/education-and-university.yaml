activity_hints:
  - type: reading
    focus: 'Прочитайте текст про система освіти в україні і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Навчальні дисципліни та спеціальності».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему система освіти в україні.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему навчальні дисципліни та спеціальності.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Система освіти в Україні».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Навчальні дисципліни та спеціальності» з їхніми визначеннями.'
