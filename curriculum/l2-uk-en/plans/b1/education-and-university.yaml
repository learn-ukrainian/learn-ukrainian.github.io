module: b1-055
level: B1
sequence: 55
slug: education-and-university
version: '3.2'
title: "Освіта і навчання"
subtitle: "Академічна лексика, дисципліни та дієприкметники в науковому стилі"
focus: communication
pedagogy: PPP
phase: "B1.5 [Нюанси відмінків та прийменники]"
word_target: 4000
objectives:
  - "Учень вміє обговорювати освіту, університетське життя та академічні дисципліни, використовуючи відповідну лексику (факультет, спеціальність, залік, іспит)"
  - "Учень вміє вживати дієприкметники та дієприслівники з M57-M63 в академічному стилі: написана дипломна робота, захищаючи проєкт, прочитавши статтю"
  - "Учень вміє описувати освітні процеси за допомогою віддієслівних іменників та пасивних дієприкметників: вивчення, дослідження, опублікований"
  - "Учень вміє брати участь в академічних бесідах: обговорювати курси, розклади, іспити та навчальні плани на рівні складності B1"
  - "Учень вміє написати короткий абзац на академічну тему, використовуючи офіційний стиль з дієприкметниковими зворотами та дієприслівниковими конструкціями"
dialogue_situations:
  - setting: 'Перший тиждень у Київському національному університеті — орієнтація в системі: Де деканат (m, dean''s office)? Записавшись на курс, отримаєш залікову книжку (f, grade book). Стипендія (f, scholarship) виплачується щомісяця. Захистивши курсову (f, coursework), здаси сесію (f, exam period).'
    speakers:
      - Старшокурсник
      - Першокурсник
    motivation: 'Інтеграція в тему освіти: дієприслівники + дієприкметники + пасивний стан в університетському контексті'
content_outline:
  - section: "Система освіти в Україні"
    words: 800
    points:
      - "Огляд рівнів освіти в Україні: початкова школа (1-4 класи), середня школа (5-9 класи), старша школа (10-11/12 класи), університет/інститут. Ступені вищої освіти: бакалавр, магістр, доктор філософії. Типи закладів: університет, інститут, академія, коледж."
      - "Кластер академічної лексики: факультет, кафедра, спеціальність, курс, семестр, залікова книжка, залік, іспит, диплом. Діалог 1: двоє студентів обговорюють свої спеціальності."
      - "Культурний контекст: порівняння української академічної системи із західними моделями. ЗНО/НМТ (стандартизоване тестування для вступу до університету). Поняття 'державне замовлення' (бюджетні місця) проти 'контрактна форма' (самооплатна)."
  - section: "Навчальні дисципліни та спеціальності"
    words: 750
    points:
      - "Лексика з предметів з використанням дієприкметників та дієприслівників: Вивчаючи фізику, студенти проводять досліди. Написана професором монографія отримала премію. Захищена минулого року дисертація стосувалась... Природна інтеграція граматики Фази 7 в академічному контексті."
      - "Назви дисциплін: математика, фізика, хімія, біологія, філологія, історія, юриспруденція, медицина, інженерія, інформатика, економіка, філософія, психологія, мистецтво. Моделі утворення: багато з них є міжнародними словами, адаптованими до української мови."
      - "Діалог 2: студент розповідає другу про своє навчання. Використовує дієприслівники для одночасних/послідовних дій: Готуючись до іспиту, я прочитав три підручники. Закінчивши бакалаврат, планую вступити до магістратури."
  - section: "Академічне середовище"
    words: 700
    points:
      - "Лексика університетського життя: лекція, семінар, практика, лабораторна робота, курсова робота, дипломна робота, конференція, стипендія, гуртожиток, бібліотека, читальний зал."
      - "Пасивні дієприкметники в академічних описах: Опублікована стаття, рекомендована література, запланована конференція, затверджений розклад, проведене дослідження, отримані результати. Ці конструкції є природними і високочастотними в українській академічній мові."
      - "Діалог 3: студент і професор обговорюють дослідницький проєкт. Вживає дієприкметникові звороти: Дослідження, проведене нашою групою, показало цікаві результати. Прочитавши вашу роботу, я маю кілька зауважень."
  - section: "Навчальний процес: дієприкметники і дієприслівники"
    words: 750
    points:
      - "Опис академічної діяльності за допомогою граматики Фази 7: Студент, який пише курсову → студент, що пише курсову (переважно замість 'працюючий студент' — русизм). Прочитавши статтю, зробіть конспект. (дієприслівник доконаного виду — послідовність дій) Готуючись до семінару, перегляньте матеріали. (недоконаний вид — процес)."
      - "Академічний стиль: дієприслівникові звороти є БІЛЬШ прийнятними в академічній українській мові, ніж в усному мовленні. Вони створюють лаконічну, офіційну прозу: Використовуючи новий метод, дослідники отримали точніші дані. Проаналізувавши результати, автор дійшов висновку."
      - "Практика: перепишіть 6 неформальних речень про навчання в офіційний академічний стиль, використовуючи дієприкметникові та дієприслівникові звороти."
  - section: "Порівняння систем освіти"
    words: 550
    points:
      - "Читання: порівняння української та міжнародних систем освіти. Вживаються складні речення з підрядними частинами (огляд Фази 8) та природне використання граматики Фази 7. Запитання на розуміння перевіряють МОВУ, а не факти: — Знайдіть усі дієприкметникові звороти в тексті. — Яку роль виконують дієприслівники в другому абзаці?"
      - "Теми для обговорення: учні описують свій власний досвід навчання, використовуючи граматичні структури Фази 7."
  - section: "Підсумок фази 7 та перехід до M65"
    words: 450
    points:
      - "Підсумок граматики Фази 7, застосованої в академічному контексті: M57-58: дієприкметники (активні/пасивні) — для академічних описів. M59: дієприкметниковий зворот — для лаконічних офіційних означень. M60: короткі прикметники — 'потрібен' (незамінний в академічному стилі). M61-62: дієприслівники (недок./док.) — для часових відношень у процесі. M63: дієприслівниковий зворот — для конструкцій офіційної прози."
      - "Самоперевірка: Я можу говорити про навчання українською ✓/✗, Я вживаю дієприкметники в академічному стилі ✓/✗. Попередній огляд: M65 — Контрольна робота 7, повторення Фази 7."
