module: b1-098
level: B1
sequence: 98
slug: novyny-yak-chytaty
version: '2.0'
title: 'Новини: як читати'
subtitle: News Reading Strategies for Ukrainian Media
focus: skills
pedagogy: CBI
phase: B1.8 [Skills & Integration]
word_target: 4000
objectives:
- Learner can apply news reading strategies to authentic Ukrainian texts
- Learner can identify headlines, leads, and main points in news articles
- Learner can distinguish fact from opinion in Ukrainian news
- Learner is prepared for autonomous news reading at B2
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - 'Медіа як інструмент вивчення мови — State Standard §3.4: навігація в інтернеті та пресі як ключова компетенція рівня
    B1 для інтеграції в інформаційний простір.'
  - 'Еволюція незалежних медіа в Україні: від заснування ''Української правди'' Георгієм Гонгадзе у 2000 році до створення
    ''Суспільного'' (Public Broadcasting) з рейтингом довіри 87%.'
- section: 'Стратегії читання: Заголовки та ліди (Reading Strategies: Headlines and Leads)'
  words: 1100
  points:
  - 'Аналіз граматики заголовків: робота з номінативними реченнями та пропущеними дієсловами — подолання труднощів при читанні
    ''Headlinese'' (напр., ''Візит президента на фронт'').'
  - 'Структура новинного ліду: фокус на розпізнаванні активних дієприкметників та складних синтаксичних конструкцій — стратегія
    пошуку підмета та присудка для швидкого розуміння суті.'
  - 'Візуальна грамотність: розпізнавання елементів сайту — шапка (header), стрічка новин (news feed) та бічна панель (sidebar)
    як орієнтири для пошуку інформації.'
- section: 'Медіаграмотність: Факти та маніпуляції (Media Literacy: Facts and Manipulations)'
  words: 1000
  points:
  - 'Факти проти думок: розрізнення об''єктивних новин та авторських колонок (op-eds) — аналіз маркерів суб''єктивності за
    вимогами Стандарту §4.5.1.'
  - 'Критичне сприйняття: поняття ''джинси'' (paid political advertising) як специфічного явища в українському медіапросторі
    — ідентифікація ознак замовних матеріалів.'
  - 'Алгоритм перевірки: правило ''трьох джерел'' (three sources rule) як золотий стандарт журналістики та практичний інструмент
    для фактчекінгу (fact-checking).'
- section: Лексичні пастки та автентичний контекст (Lexical Traps and Authentic Context)
  words: 900
  points:
  - 'Хибні друзі перекладача: робота над типовими помилками — розрізнення ''актуальний'' (current/relevant) від англ. ''actual'',
    та ''оперативний'' (prompt) від ''operative''.'
  - 'Читання автентичних текстів: тематика суспільно-політичних подій, війни та миру згідно зі Стандартом §3.6 — засвоєння
    високої лексики офіційного стилю.'
  - 'Джерела інформації: робота з термінологією цитування — офіційні, анонімні та перевірені джерела (надійне джерело, посилатися
    на джерело).'
- section: Продукція та підсумок (Production and Summary)
  words: 500
  points:
  - 'Дискусія про новини: офіційне спілкування щодо суспільних проблем — практика висловлення власної думки на основі прочитаних
    матеріалів (Стандарт §4.5.1).'
  - 'Підсумок ''Читай, думай, перевіряй'': рекомендації щодо незалежних ЗМІ та розуміння ролі телемарафону ''Єдині новини''
    в сучасному контексті.'
vocabulary_hints:
  required:
  - новини (news) — свіжі/останні новини (breaking news), стрічка новин (news feed), головні новини (top stories)
  - стаття (article) — публіцистична стаття (op-ed), редакційна стаття (editorial), опублікувати статтю
  - заголовок (headline) — гучний заголовок (clickbait), винести в заголовок, читати лише заголовки
  - джерело (source) — надійне/перевірене джерело, посилатися на джерело (cite a source), анонімне джерело
  - ЗМІ (mass media) — засоби масової інформації, незалежні ЗМІ, офіційні ЗМІ
  - факт (fact) — перевірка фактів (fact-checking), незаперечний факт
  - думка (opinion) — авторська думка, суб'єктивна позиція, розбіжність у думках
  - актуальний (current/relevant) — актуальні події, актуальне питання; хибний когнат до англ. 'actual'
  recommended:
  - джинса (paid news) — розпізнати джинсу; сленговий термін для прихованої реклами
  - редакція (editorial office) — редакційна політика, звернутися до редакції
  - кореспондент (correspondent) — власний кореспондент, військовий кореспондент
  - огляд (review) — аналітичний огляд, огляд преси
  - оперативний (prompt/rapid) — оперативна інформація, оперативно реагувати; не плутати з медичним терміном
  - шапка (header) — шапка сайту; елемент візуальної структури медіа
