module: b1-032
level: B1
sequence: 32
slug: verb-formation-suffixes
version: '3.1'
title: Творення дієслів
subtitle: Префікси, суфікси та способи дієслівного словотворення
focus: grammar
pedagogy: PPP
phase: B1.2 [Verbs]
word_target: 4000
objectives:
  - 'Learner can identify the three main ways Ukrainian forms new verbs: префіксальний
    (писати → написати), суфіксальний (білий → біліти), and префіксально-суфіксальний
    (земля → заземлити)'
  - 'Learner can recognize how prefixes systematically change verb meaning: на- (accumulation),
    пере- (re-doing), роз- (dispersal), за- (beginning), до- (completion), від- (separation),
    при- (approach/attachment)'
  - 'Learner can form verbs from adjectives and nouns using productive suffixes: -ити/-іти
    (білити, синіти), -увати/-ювати (будувати, малювати), -нути (штовхнути — single
    quick action)'
  - Learner can use prefix knowledge to decode unfamiliar verbs by decomposing 
    them into prefix + root + suffix
  - 'Learner understands how prefixation creates видові пари (aspectual pairs): писати
    (impf) → написати (pf)'
dialogue_situations:
  - setting: 'Ukrainian language course in Одеса — the teacher shows how verbs are
      formed from other parts of speech: білий→біліти (to become white), робота→робітничати,
      крик→кричати, зима→зимувати. Students create new verbs from given words.'
    speakers:
      - Викладач
      - Слухачі курсу (course attendees)
    motivation: 'Verb formation: біліти (-іти), кричати (-ати), зимувати (-увати)
      from nouns/adjectives'
content_outline:
  - section: Способи творення дієслів
    words: 700
    points:
      - 'Overview from Ворон Grade 9 p.174, Литвінова Grade 6 p.80: Три основні способи
        словотворення для дієслів: 1. Префіксальний: читати → прочитати, перечитати,
        вичитати. 2. Суфіксальний: білий → білити, крик → кричати. 3. Префіксально-суфіксальний:
        земля → заземлити, зброя → озброїти.'
      - 'Prefix-based formation is the MOST productive for verbs. A single root verb
        can generate 10+ prefixed forms: ходити → виходити, входити, приходити, відходити,
        заходити, обходити, переходити, підходити, проходити. Each prefix adds specific
        meaning — this is systematic, not arbitrary.'
      - 'Connection to aspect (вид): adding a prefix to an imperfective verb often
        creates a perfective: писати (impf) → написати (pf). But adding a prefix can
        also change the lexical meaning: писати → переписати (to rewrite) — different
        action, not just aspect.'
  - section: 'Префікси: системний огляд'
    words: 850
    points:
      - 'Group 1 — Spatial prefixes (largely covered in M29-33 for motion verbs, reviewed
        here for ALL verbs): в-/у- (into): вписати (to inscribe), увімкнути (to turn
        on) ви- (out of): вимкнути (to turn off), вирізати (to cut out) при- (toward/to):
        приєднати (to attach), прикріпити (to fasten) від- (away from): відрізати
        (to cut off), відключити (to disconnect) пере- (across/re-): переписати (to
        rewrite), перевірити (to verify)'
      - 'Group 2 — Resultative/Aktionsart prefixes: на- (accumulation): наготувати
        (to cook a lot), набрати (to gather) за- (beginning of action): заспівати
        (to start singing), заплакати по- (beginning/brief): побігти (to start running),
        почекати (to wait a bit) роз- (dispersal/undoing): розрізати (to cut apart),
        розповісти (to tell) до- (completion up to): дочитати (to finish reading),
        добудувати з-/с- (completion): зробити (to do/make), спекти (to bake)'
      - 'Group 3 — Modificational prefixes: недо- (insufficient): недоїсти (to not
        eat enough), недобачати пере- (excess): перевтомитися (to overtire), переоцінити
        під- (slightly/secretly): підробити (to forge), підмінити (to replace secretly)
        об-/обі- (around/comprehensive): обговорити (to discuss), обдумати (to think
        over)'
      - 'Practice: given a root verb, generate 4-5 prefixed forms and explain the
        meaning shift. Example: бити → вибити, забити, добити, перебити, розбити.
        Learners see the system: prefix = predictable meaning modification.'
  - section: Суфіксальне творення дієслів
    words: 700
    points:
      - 'From adjectives with -ити/-іти: білий → білити (to whiten/whitewash), синій
        → синіти (to turn blue), червоний → червоніти (to redden), чорний → чорніти
        (to turn black). Pattern: adjective stem + -ити (causative) or -іти (inchoative).
        білити = to MAKE white, синіти = to BECOME blue.'
      - 'From nouns with -увати/-ювати: малюнок → малювати (to draw/paint), танець
        → танцювати (to dance), будова → будувати (to build), інтерес → цікавити (irregular).
        -увати/-ювати is very productive, especially for borrowed words: програма
        → програмувати, фільтр → фільтрувати.'
      - 'Suffix -нути for single instantaneous action: штовхати (impf, repeated pushing)
        → штовхнути (pf, one push), стукати → стукнути, кричати → крикнути, свистіти
        → свиснути. This suffix is aspectually significant: it always creates доконаний
        вид with the meaning of a single brief action.'
      - 'From Заболотний Grade 7 p.179: дієвідміна clues from infinitive suffixes.
        I дієвідміна: infinitive stems with -а-, -i- (non-dropping), -ува-, -ну-.
        II дієвідміна: stems with -и-, -i- (dropping in conjugation). This helps learners
        predict conjugation from the infinitive suffix.'
  - section: Префіксально-суфіксальний спосіб
    words: 650
    points:
      - 'Simultaneous addition of prefix AND suffix: земля → за-земл-ити (to ground/earth),
        зброя → о-зброї-ти (to arm), зброя → роз-зброї-ти (to disarm), світло → о-світл-ити
        (to illuminate). From Заболотний Grade 6 p.57: the word is formed by adding
        BOTH parts at once, not sequentially.'
      - 'Common patterns: о-/об- + noun + -ити: оцінити (from ціна), описати (from
        опис... wait, this is actually prefix-only). True prefix-suffix: обезводнити
        (вода), знешкодити (шкода), знебарвити (барва). з-/зне- + noun + -ити is a
        productive pattern for removal/negation.'
      - 'Practice: identify the formation method for given verbs. спекти (prefix з-
        + пекти → с-пекти = prefixal) заземлити (за- + земл- + -ити = prefix-suffix)
        будувати (буд- + -увати = suffixal) Learners classify 8-10 verbs.'
  - section: Розкладання незнайомих дієслів
    words: 700
    points:
      - 'Strategy: when encountering an unknown verb, decompose it: перевстановити
        = пере- (re-) + в- (in) + становити (to place) = ''to reinstall''. Learners
        can decode meaning from morphemes.'
      - 'Exercise: decode 8-10 complex verbs by prefix + root analysis: розповсюдити
        (роз- + поширити — to spread/distribute) перенавантажити (пере- + навантажити
        — to overload) відтворити (від- + творити — to reproduce) підсилити (під-
        + сила + -ити — to reinforce) недооцінити (недо- + оцінити — to underestimate)'
      - 'Reading passage: a short text with several prefixed verbs. Learners decompose
        each one, explain the prefix meaning, and determine the aspect (most prefixed
        verbs are доконаний). Then they form the imperfective pair where it exists:
        переписати → переписувати, розповісти → розповідати.'
  - section: Підсумок та перехід до модуля №25
    words: 450
    points:
      - 'Summary: три способи творення дієслів, системний огляд префіксів (просторові,
        результативні, модифікаційні), суфікси (-ити, -увати, -нути), префіксально-суфіксальний
        спосіб. Self-check: Я можу визначити спосіб творення дієслова ✓/✗, Я розумію,
        як префікси змінюють значення ✓/✗, Я можу розкласти незнайоме дієслово ✓/✗.'
      - 'Preview: модуль №25 — Щоденне життя. Communication module that puts all Phase 3
        verb grammar into practice: conditionals for planning, imperatives for instructions,
        reflexive verbs for routines, prefixed verbs for describing daily actions.'
vocabulary_hints:
  required:
    - префіксальний спосіб (prefixal word formation — adding a prefix)
    - суфіксальний спосіб (suffixal word formation — adding a suffix)
    - префіксально-суфіксальний (prefix-suffix word formation)
    - 'видова пара (aspectual pair — impf/pf: писати/написати)'
    - основа інфінітива (infinitive stem — base for suffix attachment)
    - переписати (to rewrite — prefix пере- = again)
    - вимкнути (to turn off — prefix ви- = out)
    - увімкнути (to turn on — prefix у-/в- = in)
    - заспівати (to start singing — prefix за- = beginning)
    - дочитати (to finish reading — prefix до- = completion)
    - штовхнути (to push once — suffix -нути = single action)
    - будувати (to build — suffix -увати from будова)
    - білити (to whiten — suffix -ити from білий)
    - заземлити (to ground — prefix-suffix from земля)
  recommended:
    - розповсюдити (to distribute — роз- = dispersal)
    - недооцінити (to underestimate — недо- = insufficient)
    - перевтомитися (to overtire — пере- = excess)
    - обговорити (to discuss — об- = comprehensive)
    - знешкодити (to neutralize — зне- + шкода + -ити)
    - програмувати (to program — -увати from borrowed word)
    - синіти (to turn blue — inchoative -іти)
    - червоніти (to redden — inchoative -іти)
    - крикнути (to shout once — -нути instantaneous)
    - розрізати (to cut apart — роз- = dispersal)
activity_hints:
  - type: group-sort
    focus: 'Sort verbs by formation method: префіксальний / суфіксальний / префіксально-суфіксальний'
    items: 12
  - type: fill-in
    focus: Add the correct prefix to change verb meaning as described (re-do, 
      start, finish, turn off)
    items: 10
  - type: match-up
    focus: Match prefixed verbs to their meanings based on prefix analysis
    items: 10
  - type: quiz
    focus: Choose the correct prefixed verb for the given context (вимкнути vs 
      увімкнути vs перемкнути)
    items: 8
  - type: sentence-builder
    focus: Form verbs from given adjectives/nouns using appropriate suffixes 
      (-ити, -увати, -нути)
    items: 6
connects_to:
  - b1-023 (Пасивний стан — passive, completing voice system)
  - b1-025 (Щоденне життя — communication module applying all Phase 3 grammar)
  - b1-029 to b1-033 (Motion verb prefixes — spatial prefixes in detail)
  - b1-043 (Творення прикметників — adjective word formation parallel)
  - b1-044 (Творення назв осіб i місць — noun word formation parallel)
prerequisites:
  - b1-023 (Passive voice — completes voice system before word formation)
  - b1-010 (Чергування приголосних у дієсловах — consonant changes in verb 
    stems)
grammar:
  - 'Префіксальне творення: в-/у-, ви-, при-, від-, пере-, на-, за-, по-, роз-, до-,
    з-/с-'
  - 'Суфіксальне творення: -ити/-іти (from adj), -увати/-ювати (from noun), -нути
    (instantaneous)'
  - 'Префіксально-суфіксальне: за-земл-ити, о-зброї-ти, з-не-шкод-ити'
  - 'Prefix → aspect: adding prefix to imperfective often creates perfective'
  - 'Decomposition strategy: prefix + root + suffix = predicted meaning'
register: академічний
references:
  - title: Ворон Grade 9, p.174
    notes: 'Способи словотворення table: префіксальний, суфіксальний, префіксально-суфіксальний
      with examples for all word classes.'
  - title: Литвінова Grade 6, p.80-83
    notes: '§15 Основні способи словотворення: prefix, suffix, prefix-suffix. Безафіксний
      спосіб: пошук ← пошукати.'
  - title: Заболотний Grade 6, p.57-58
    notes: Способи словотворення with exercises; словотвірний ланцюжок; 
      identifying formation method for given words.
  - title: Заболотний Grade 7, p.179
    notes: 'Дієвідміна determination from infinitive suffixes: -а-, -ува-, -ну- (I
      дієвідміна) vs -и- (II дієвідміна).'
