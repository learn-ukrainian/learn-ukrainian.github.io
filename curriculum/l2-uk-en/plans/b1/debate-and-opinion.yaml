grammar:
  - "Структура аргументу: теза → аргумент → приклад → висновок"
  - "Складнопідрядні речення в аргументації: причини, мети, умови, допусту"
  - "Вставні слова як організатори аргументу: по-перше, по-друге, отже"
  - "Формули дискусії: погодження, заперечення, підсумок"
  - "Есе-міркування: структура та мовні особливості"
register: розмовний
references:
  - title: "Авраменко Grade 8, p.8-9"
    notes: "Дискусія: визначення, структура дискусійного висловлення, правила конструктивної дискусії."
  - title: "Авраменко Grade 10, p.190-191"
    notes: "Теза й аргументи: різниця між аргументами (об'єктивні) та доказами (суб'єктивні/емоційні). Практична риторика."
  - title: "Заболотний Grade 10, p.177"
    notes: "Помилки в аргументації: нечітко сформульовані, хибні, аргумент до особи, підміна тези."
  - title: "Заболотний Grade 10, p.97"
    notes: "Есе на актуальну тему — структура, вимоги, зразок."
  - title: "Авраменко Grade 8, p.28-30"
    notes: "Есе: визначення, вільна будова, поєднання художнього та публіцистичного стилів."