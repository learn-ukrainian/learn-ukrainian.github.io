module: b1-091
level: B1
sequence: 91
slug: debate-and-opinion
version: '3.1.2'
title: "Аргументація"
subtitle: "Теза, аргументи, дискусія — переконуємо українською"
focus: communication
pedagogy: PPP
phase: "B1.9 [Синтез і випуск]"
word_target: 4000
objectives:
  - "Вміти будувати структурований аргумент українською мовою за моделлю теза → аргумент → приклад → висновок."
  - "Вміти брати участь в українській дискусії, захищаючи позицію за допомогою логічних доказів і відповідаючи на контраргументи."
  - "Вміти використовувати складнопідрядні речення (причини, мети, умови, допусту) для висловлення складних міркувань в аргументації."
  - "Вміти застосовувати вставні слова для структурування аргументів (по-перше, по-друге, отже) та вираження різного ступеня впевненості."
  - "Вміти написати коротке есе-міркування (понад 200 слів) на задану тему, презентуючи тезу, підтверджувальні аргументи та висновок."
dialogue_situations:
  - setting: 'Дебати в учнівській раді Харківського ліцею — суперечка щодо шкільної форми: По-перше, форма обмежує свободу (f, freedom). На мою думку, це застаріло. Навпаки, форма виховує дисципліну (f, discipline). Хоча аргументи (pl) сильні, я не погоджуюся.'
    speakers:
      - Учасники дебатів (за і проти)
    motivation: 'Аргументація: по-перше, на мою думку, навпаки, хоча, я не погоджуюся'
content_outline:
  - section: "Що таке аргументація?"
    words: 700
    points:
      - "Визначення за Авраменком (8 клас, с. 8-9): Дискусія — обговорення певного суперечливого питання з метою дійти згоди. В основі словесного змагання — відстоювання власної позиції. Будова дискусійного висловлення: 1. Теза (позиція): Вважаю, що... 2. Аргумент (доведення): ...бо; ...тому, що. 3. Приклади: Яскравим прикладом цього є... 4. Висновок: Отже, ..."
      - "Теза, аргумент і приклад (за Авраменком, 10 клас, с. 190): Теза — основне твердження, яке потрібно довести. Аргумент — доведене твердження на підтримку тези (логічні закони, факти, статистика). Приклад — конкретний випадок, що ілюструє аргумент. Практика: учні ідентифікують тезу, аргумент і приклад у тексті."
      - "Правила дискусії за Авраменком (8 клас, с. 9): Суть дискусії полягає не в перемозі, а в пошуку істини. Правила: вислуховувати опонента, аргументувати свою думку, не переходити на особистості, поважати іншу точку зору."
      - "Практика: учні читають короткий дискусійний текст і знаходять тезу, аргументи та приклади."
      - "Міркування, розповідь і опис: порівняння типів текстів за Авраменком (8 клас, с. 28). Міркування відповідає на питання «Чому?» і йде за схемою теза → аргументи → висновок. Розповідь відповідає на питання «Що сталося?» Опис відповідає на питання «Який?» Розуміння цих трьох типів текстів запобігає плутанині під час письмових завдань. Практика: класифікувати 4 уривки тексту за типами."
  - section: "Мовні засоби аргументації"
    words: 800
    points:
      - "Складнопідрядні речення для вираження міркувань (застосування фази 8): Причина: Це важливо, тому що / бо / через те що... Мета: Це потрібно, щоб... Умова: Якщо ми не зробимо..., то... Допуст: Хоча це складно, проте... Практика: учні будують аргументи, використовуючи кожен тип речення."
      - "Вставні слова для структурування аргументів (застосування M81): Порядок: по-перше, по-друге, нарешті, отже. Впевненість: безумовно, безперечно, без сумніву. Невпевненість: мабуть, можливо (для визнання невизначеності). Джерело: за даними, на думку, як відомо. Протиставлення: навпаки, проте, однак, натомість. Практика: учні структурують абзац за допомогою цих маркерів."
      - "Формули для дискусії — корисні фрази: Висловлення думки: Я вважаю, що..., На мою думку,..., Мені здається, що... Погодження: Я з вами згоден/згодна, Ви маєте рацію, Це цікава думка. Заперечення: Не можу погодитися з тим, що..., Дозвольте не погодитися, Навпаки, я вважаю... Підсумок: Отже,..., Підсумовуючи,..., Таким чином,..."
      - "Практика: учні доповнюють діалог, використовуючи формули для дискусії."
      - "Граматичні засоби аргументації — поєднання всього синтаксису рівня B1: Причина (тому що, бо, оскільки, через те що) для формулювання причин. Мета (щоб, для того щоб) для висловлення цілей. Умова (якщо... то, за умови що) для гіпотетичних ситуацій. Допуст (хоча, незважаючи на те що, проте) для поступок. Наслідок (тому, отже, внаслідок чого) для висновків. Практика: написати по одному аргументу з використанням кожного типу сполучників."
  - section: "Помилки в аргументації"
    words: 650
    points:
      - "Поширені логічні помилки за Заболотним (10 клас, с. 177): 1. Нечітко сформульовані аргументи — надто складні або розпливчасті. 2. Хибні аргументи — частково або повністю неправдиві передумови. 3. Аргумент до особи — атака на людину, а не на її аргумент. 4. Підміна тези — зміна теми під час дискусії."
      - "Практика: учні ідентифікують логічні помилки в наведених аргументах. Із 6 аргументів визначити, який з них валідний, а який містить логічну помилку. Переписати помилкові аргументи правильно."
      - "Емоційний та логічний вплив: Аргументи — об'єктивний вплив (факти, логіка, статистика). Докази — суб'єктивний, емоційний вплив (авторитет, обіцянки). За Авраменком (10 клас, с. 191): аргументи переконують за допомогою розуму, докази — за допомогою емоцій. Обидва методи є дійсними, але мають різні цілі."
      - "Особливість українського контексту: в українській культурі дискусії цитування прислів'їв та народної мудрості вважається легітимним способом аргументації. «Як кажуть у народі,...» — це не логічна помилка, а використання культурного авторитету."
      - "Зв'язок із медіаграмотністю: розпізнавання логічних помилок у новинах і соціальних мережах (зв'язок із M83). Учні аналізують 3 твердження в медійному стилі та визначають, яку помилку аргументації містить кожне з них. Це поєднує теорію аргументації з практичною медіаграмотністю."
  - section: "Есе-міркування"
    words: 750
    points:
      - "Структура есе за Заболотним (10 клас, с. 97) і Авраменком (8 клас, с. 28): Есе — невеликий прозовий твір із довільною будовою, що виражає індивідуальні думки та враження. В есе поєднано жанрові особливості художнього та публіцистичного стилів. Структура для міркування: 1. Теза. 2. Аргументи. 3. Висновок."
      - "Зразкове есе (200 слів) на доступну для рівня B1 тему (наприклад, «Чи важливо знати іноземні мови?» або «Чи впливають соціальні мережі на наше життя?»). Аналіз: визначити структуру, аргументи, мовні засоби, вставні слова, складні речення."
      - "Письмова практика: учні вибирають одну з 3 тем і пишуть есе-міркування (150-200 слів) за такою структурою: 1. Вступ: формулювання тези (2-3 речення). 2. Основна частина: 2-3 аргументи з прикладами (8-10 речень). 3. Висновок: підсумок (2-3 речення). Використати: вставні слова, складнопідрядні речення, формули аргументації."
      - "Чекліст для перевірки: учні перевіряють власне есе: чи є чітка теза? чи є аргументи? чи є висновок? чи правильно вжито вставні слова? чи є різні типи речень?"
      - "Техніка створення контраргументів: учні відпрацьовують конструкцію «Хоча + допуст, проте + контраргумент». Приклад: Хоча соціальні мережі допомагають спілкуватися, проте вони можуть шкодити психічному здоров'ю. Ця єдина конструкція дозволяє створювати збалансовану, зрілу аргументацію. Практика: написати 5 контраргументів за цим шаблоном на задані теми."
  - section: "Дискусія на практиці"
    words: 650
    points:
      - "Керований формат дискусії: Презентація теми → індивідуальна підготовка (теза + 2 аргументи) → обмін думками в парах → групова дискусія → загальнокласний висновок. Теми для практики: технології в освіті, життя в місті проти життя в селі, екологічна відповідальність."
      - "Погодження та заперечення з нюансами: Повне погодження: Абсолютно погоджуюся. Часткове погодження: Загалом ви маєте рацію, але... М'яке заперечення: Мені здається, що це не зовсім так. Різке заперечення: Категорично не згоден/не згодна. Практика: учні відповідають на твердження з різним ступенем погодження/заперечення."
      - "Фрази активного слухання: Якщо я правильно зрозумів/зрозуміла, ви вважаєте, що... Ви маєте на увазі, що...? Чи правильно я розумію, що...? Це демонструє залученість і запобігає непорозумінням."
      - "Культурна примітка: українська дискусійна культура цінує прямоту, але також ввічливість. Балансування між ними — це вміння бути чесним, не будучи грубим."
      - "Структурована практика дебатів: дві команди (або дві позиції для окремих учнів) обговорюють тему у три раунди. Раунд 1: формулювання тези (по 1 хв). Раунд 2: представлення аргументів і відповідь іншій стороні (по 2 хв). Раунд 3: підсумок і висновки (по 1 хв). Оцінювання: використання формул дискусії, складних речень, вставних слів."
  - section: "Підсумок: мистецтво переконання"
    words: 450
    points:
      - "Повний довідник: структура аргументу, мовні засоби, формули дискусії, логічні помилки."
      - "Самоперевірка українською: 1. Назвіть чотири частини дискусійного висловлення. 2. Побудуйте аргумент «за» і «проти» на тему «Інтернет і навчання». 3. Знайдіть логічну помилку в аргументі. 4. Напишіть короткий висновок до дискусії."
      - "Аргументація проти маніпулювання: етичний вимір. Аргументація шукає істину через докази і логіку. Маніпулювання намагається ввести в оману через емоції та хибні твердження. Учні обговорюють різницю та її значення для громадянського суспільства. Це напряму пов'язується з модулем з медіаграмотності (M83)."
      - "Анонс: Суспільство і медіа (M87) — застосування навичок аргументації до реальних медійних текстів і соціальних проблем."
vocabulary_hints:
  required:
    - "аргументація (argumentation — process of presenting arguments)"
    - "теза (thesis — main claim to be proven)"
    - "аргумент (argument — logical support for a thesis)"
    - "дискусія (discussion/debate — structured exchange of opinions)"
    - "висновок (conclusion — final summary of reasoning)"
    - "переконувати (to persuade — to make someone agree)"
    - "погоджуватися (to agree — to accept another's position)"
    - "заперечувати (to object/deny — to disagree with a claim)"
    - "доведення (proof — demonstration of truth)"
    - "позиція (position — one's stance on an issue)"
    - "опонент (opponent — person holding the opposing view)"
    - "міркування (reasoning/reflection — logical thinking)"
  recommended:
    - "помилка в аргументації (logical fallacy)"
    - "підміна тези (topic substitution — shifting the argument)"
    - "аргумент до особи (ad hominem — attacking the person)"
    - "натомість (instead — contrast connector)"
    - "категорично (categorically — emphatic disagreement)"
    - "прямота (directness — open communication style)"
    - "погодження (agreement — act of agreeing)"
    - "підсумовуючи (summarizing — concluding marker)"
    - "істина (truth — goal of discussion)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст на тему визначення аргументації і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу про мовні засоби аргументації."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему аргументації."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях про засоби аргументації."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу про аргументацію."
  - type: match-up
    focus: "З'єднайте терміни з розділу про мовні засоби з їхніми визначеннями."
