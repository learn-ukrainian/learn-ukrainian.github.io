module: b1-080
level: B1
sequence: 80
slug: complex-subordinate-concess
version: '3.1.3'
title: "Речення допусту"
subtitle: "Хоча, дарма що, незважаючи на те що"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Складний синтаксис]"
word_target: 4000
objectives:
  - "Учень вміє будувати підрядні обставинні допусту за допомогою сполучників хоч/хоча, дарма що, незважаючи на те що, попри те що."
  - "Учень розуміє допустову логіку: незважаючи на обставину X, дія Y все одно відбувається."
  - "Учень вміє розрізняти допустові, причинні та умовні підрядні частини."
  - "Учень навчиться природно використовувати допустові речення в аргументації та висловленні власної думки на рівні B1."
  - "Учень вміє правильно ставити розділові знаки у допустових реченнях."
dialogue_situations:
  - setting: 'Дебатний клуб у Харківському ліцеї — допустові речення: Хоча це складно, варто спробувати. Незважаючи на те що час (m) обмежений, ми встигнемо. Дарма що вона молодша, вона розумніша.'
    speakers:
      - Учасники дебатного клубу
    motivation: 'Допустові речення: хоча, незважаючи на те що, дарма що — аргументація'
content_outline:
  - section: "Підрядні обставинні допусту"
    words: 700
    points:
      - "Визначення із підручника Заболотного (8 клас, с. 112): підрядне обставинне допусту називає умову, всупереч якій відбувається дія головної частини. Відповідає на питання незважаючи на що? попри що? Хоч було холодно, ми пішли на прогулянку."
      - "Логіка допусту: підрядна частина описує обставину, яка МАЛА Б перешкодити головній дії, але НЕ ПЕРЕШКОДИЛА. Очікування: холодно → залишитися вдома. Реальність: холодно → все одно пішли гуляти. Цей зв'язок «всупереч» є основою допусту."
      - "Основні сполучники: хоч/хоча, дарма що, незважаючи на те що, попри те що, хай/нехай."
  - section: "Хоч/хоча — основний сполучник"
    words: 800
    points:
      - "Хоч/хоча — найпоширеніші та найуніверсальніші сполучники: Хоча він запізнився, ми почекали на нього. Ми пішли на прогулянку, хоч було холодно. Позиція: гнучка — перед або після головної частини."
      - "Співвідносні слова у головній частині: але, проте, однак, та, зате, все ж: Хоча він запізнився, але ми почекали на нього. Хоч було холодно, проте ми пішли на прогулянку. Хоча вона хворіла, та все ж прийшла на роботу. Співвідносне слово ПІДСИЛЮЄ протиставлення."
      - "Хоч та хоча: обидва варіанти є нормативними в українській мові. Хоч має трохи розмовніший відтінок, хоча — дещо офіційніший. Обидва правильні в будь-якому контексті."
      - "Практика: побудувати 8 допустових речень зі сполучниками хоч/хоча, з використанням співвідносних слів та без них."
  - section: "Інші допустові сполучники"
    words: 700
    points:
      - "Дарма що — підкреслює марність обставини: Дарма що він старався, нічого не вийшло."
      - "Незважаючи на те що — офіційний сполучник, скалькований, але узвичаєний: Незважаючи на те що погода погіршилася, захід відбувся. Попри те що — питомо український відповідник, трохи менш офіційний: Попри те що погода погіршилася, захід відбувся."
      - "Хай/нехай — літературний/народний варіант: Хай лютує зима, а весна все одно прийде. Нехай дорога важка, ми дійдемо. Вони додають емоційного та літературного забарвлення."
      - "Піраміда стилів: хоч (нейтральний) → дарма що (емоційний) → незважаючи на те що (офіційний) → попри те що (офіційний український)."
  - section: "Допуст vs причина vs умова"
    words: 650
    points:
      - "Потрійне зіставлення: Причина: Ми не пішли, бо було холодно. Умова: Ми не підемо, якщо буде холодно. Допуст: Хоч було холодно, ми пішли. Допуст ОБЕРТАЄ очікуваний причиново-наслідковий зв'язок."
      - "Допуст та протиставне складносурядне речення (модуль №66): Допуст: Хоча він хворів, він прийшов. (підрядне) Протиставне: Він хворів, але прийшов. (сурядне) Обидва виражають протиставлення, але синтаксична структура різна. Практика: перетворити 4 допустові речення на протиставні і навпаки."
      - "Практика: визначити тип 8 речень (причинні, умовні чи допустові)."
  - section: "Практика: допустові речення у мовленні"
    words: 750
    points:
      - 'Моделі аргументації (корисні для модуля №87 — дебати): Хоча деякі люди вважають, що..., проте я переконаний, що... Дарма що цей аргумент здається переконливим, він має слабкі місця. Незважаючи на те що дослідження показують..., ситуація складніша.'
      - "Текст для читання: публіцистичний текст з допустовими реченнями. Учні знаходять усі допустові частини, виписують сполучники та пояснюють логіку допусту."
      - "Продукція: написати 6 допустових речень про власні думки, досвід або поточні події. Використати щонайменше 3 різні сполучники."
  - section: "Підсумок та перехід до модуля №74"
    words: 400
    points:
      - 'Підсумок: допустові = незважаючи на що? попри що? Хоч/хоча (нейтральний), дарма що (емоційний), незважаючи на те що (офіційний). Логіка: перешкода не заважає дії. Самоперевірка: Я розрізняю допуст, причину і умову ✓/✗.'
      - "Анонс: модуль №74 — Пряма і непряма мова. Цитування та передача чужого мовлення."
vocabulary_hints:
  required:
    - "підрядне обставинне допусту (concessive subordinate clause)"
    - "хоч/хоча (although)"
    - "дарма що (even though — futile circumstance)"
    - "незважаючи на те що (despite the fact that)"
    - "попри те що (despite the fact that — Ukrainian alternative)"
    - "допуст (concession)"
    - "всупереч (despite, contrary to)"
  recommended:
    - "однак (however — correlative)"
    - "проте (nevertheless — correlative)"
    - "все ж (still, nevertheless)"
    - "хай/нехай (even if — literary concessive)"
    - "зате (but on the other hand — correlative)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про підрядні обставинні допусту і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Хоч/хоча — основний сполучник»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему підрядні обставинні допусту."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему хоч/хоча — основний сполучник."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Підрядні обставинні допусту»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Хоч/хоча — основний сполучник» з їхніми визначеннями."
