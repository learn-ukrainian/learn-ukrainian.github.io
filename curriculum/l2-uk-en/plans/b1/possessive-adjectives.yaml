grammar:
- 'Творення присвійних прикметників: -ів/-їв від II відміни, -ин/-ін/-їн від I відміни'
- 'Чергування приголосних у -ин формах: г→ж, к→ч, х→ш'
- 'Змішане відмінювання: коротка форма в називному, повна в непрямих відмінках'
- 'Розрізнення присвійних і відносних прикметників: чий? vs який?'
- 'Стилістичний вибір: батьків дім vs дім батька'
register: науково-навчальний / розмовний
references:
- title: Заболотний Grade 6, p.147
  notes: 'Групи прикметників за значенням: якісні, відносні, присвійні — визначення,
    таблиця суфіксів, вправи на розрізнення.'
- title: Литвінова Grade 6, p.193
  notes: 'Присвійні прикметники: творення від I і II відміни, суфікси -ів/-їв та -ин/-ін,
    повна парадигма відмінювання.'
- title: Голуб Grade 6, p.124
  notes: Правопис суфіксів -ин та -ін (-їн) у присвійних прикметниках, правило 
    розподілу.
- title: Авраменко Grade 6, p.137
  notes: 'Творення прикметників: чергування приголосних г→ж, к→ч, х→ш при додаванні
    суфікса -ин.'
- title: Литвінова Grade 6, p.193 (вправа 384)
  notes: 'Написання великої/малої літери у присвійних прикметниках від власних назв:
    Шевченкові твори vs шевченківські дні.'
