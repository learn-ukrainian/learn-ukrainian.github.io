module: b1-010
level: B1
sequence: 10
slug: work-and-career
version: '1.0'
title: "Робота і кар'єра"
subtitle: "Професійна лексика, працевлаштування та розповідь про досвід"
focus: thematic-vocabulary
pedagogy: TTT
phase: "B1.0 [Baselines & Aspect Mastery]"
word_target: 4000
objectives:
  - "Learner can name professions, workplace roles, and employment concepts using
    precise Ukrainian vocabulary (посада, фах, професія, вакансія, працевлаштування)"
  - "Learner can describe their work experience and career path in Ukrainian, correctly
    choosing aspect to distinguish ongoing processes from completed achievements:
    працювала (impf, тривалість) vs змінила роботу (pf, результат)"
  - "Learner can navigate a job interview situation in Ukrainian using appropriate
    register: formal self-presentation, describing обов'язки, and asking about умови
    праці"
  - "Learner can write a short professional self-description (5-8 sentences) narrating
    career history with correct aspect alternation between тло (background) and
    послідовність подій (event chain)"
dialogue_situations:
  - setting: 'Співбесіда (f, job interview) at a Львів IT company — candidate describes
      previous experience and asks about the position: Я працювала (impf) три роки
      в маркетингу. Потім вирішила (pf) змінити напрямок. Які обов''язки (pl) на
      цій посаді (f)?'
    speakers:
      - Кандидатка
      - Керівник відділу
    motivation: 'Aspect alternation in career narratives: працювала (impf, background
      duration) vs вирішила (pf, completed decision). Formal register for workplace.'
  - setting: 'Two colleagues at lunch discussing career plans: Я вже п''ять років
      працюю (impf, present) тут. Хочу подати (pf) на підвищення (n). А ти не думаєш
      змінити (pf) роботу?'
    speakers:
      - Олександр
      - Тетяна
    motivation: 'Present tense (impf) for current state vs infinitive (pf) for planned
      single actions. Semi-formal register between colleagues.'
content_outline:
  - section: "Професія і фах: базова лексика"
    words: 1000
    points:
      - "Core vocabulary field: професія (profession as a concept), фах (specialty,
        field of expertise), спеціальність (specific qualification), посада (position/role
        in a company). Semantic distinctions grounded in Заболотний Grade 5 p.69
        vocabulary development model: organize by semantic field, distinguish near-synonyms."
      - "Workplace vocabulary: підприємство (enterprise), компанія (company), офіс
        (office), відділ (department), колега (colleague, common gender), керівник
        (manager/supervisor), працівник (employee), роботодавець (employer). Note:
        колега is спільного роду — мій колега, моя колега."
      - "Employment process: вакансія (vacancy), резюме (CV, невідмінюване), співбесіда
        (interview), працевлаштування (employment/getting hired), стажування (internship/
        training period), випробувальний термін (probation period)."
      - "Career trajectory: досвід (experience), обов'язок (duty/responsibility, pl
        обов'язки), зарплата (salary, розм. — formal: заробітна плата), підвищення
        (promotion/raise), звільнення (dismissal/resignation), кар'єра (career path).
        Practice: learners categorize vocabulary into groups — люди, місця, процеси,
        документи."
  - section: "Вид дієслова у розповіді про роботу"
    words: 1000
    points:
      - "Review of aspect choice (Литвінова Grade 7 p.30): доконаний вид for completed,
        result-oriented actions — влаштувалася на роботу, отримала підвищення, звільнилася.
        Недоконаний вид for ongoing, habitual, or background actions — працювала в
        компанії, виконувала обов'язки, вела проєкти."
      - "Aspect in career narratives — the pattern: Недоконаний as background/duration:
        Я працювала (impf) в банку п'ять років. Доконаний as chain of events: Закінчила
        (pf) університет, подала (pf) резюме, пройшла (pf) співбесіду і влаштувалася
        (pf) на роботу. Combined: Коли я працювала (impf, тло) у Львові, мені
        запропонували (pf, подія) нову посаду."
      - "Common aspect errors in work context: *Я працювала три роки і звільнялася
        (impf — wrong, result expected) → Я працювала три роки і звільнилася (pf).
        *Я влаштувалася на роботу і виконувала обов'язки (impf — correct as habitual).
        The key: is the speaker emphasizing RESULT or PROCESS?"
      - "Practice: learners write a 5-sentence career mini-narrative using both aspects.
        Template: Після [чого?] я [pf — single event]. [X] років я [impf — duration].
        Потім [pf — next event]. Зараз я [impf present — current state]."
  - section: "На співбесіді: ситуативне мовлення"
    words: 1000
    points:
      - "Job interview structure in Ukrainian (grounded in Литвінова Grade 7 p.205
        situational speech model): 1. Привітання і представлення: Доброго дня, мене
        звати... Я подавала резюме на посаду... 2. Розповідь про досвід: Я закінчила...
        Працювала в... Моїми обов'язками були... 3. Запитання: Які умови праці? Який
        графік роботи? 4. Завершення: Дякую за можливість."
      - "Register: formal workplace Ukrainian. Key patterns: Дозвольте розповісти
        про мій досвід. Моєю спеціальністю є... На попередній посаді я відповідала
        за... Маю досвід роботи у сфері... Contrast with informal: Я працювала в... →
        formal: Мій попередній досвід пов'язаний із..."
      - "Describing обов'язки (duties) — instrumental case review: відповідати за +
        accusative (відповідала за проєкт), займатися + instrumental (займалася маркетингом),
        працювати з + instrumental (працювала з клієнтами), керувати + instrumental
        (керувала командою)."
      - "Practice dialogue: full job interview role-play. Learners take turns as
        кандидат and керівник. Each must use at least 3 perfective and 3 imperfective
        verbs in their career narrative."
  - section: "Підсумок: робота і вид дієслова"
    words: 1000
    points:
      - "Vocabulary summary organized by category: люди на роботі (колега, керівник,
        працівник, роботодавець), процес працевлаштування (вакансія, резюме, співбесіда,
        стажування), кар'єра (посада, підвищення, звільнення, досвід, обов'язок)."
      - "Aspect summary table applied to work verbs: працювати (impf) — no pf pair
        (process verb). влаштуватися (pf) / влаштовуватися (impf). звільнитися (pf)
        / звільнятися (impf). отримати (pf) / отримувати (impf). подати (pf) /
        подавати (impf). Complete table with example sentences for each pair."
      - "Самоперевірка: 1. Назвіть 5 професій і 5 слів, пов'язаних із працевлаштуванням.
        2. Розкажіть про свій (реальний або вигаданий) досвід роботи, чергуючи доконаний
        і недоконаний вид. 3. Яка різниця між словами професія, фах, спеціальність,
        посада? 4. Як розповісти на співбесіді про свої обов'язки? Складіть 3 речення
        з дієсловами відповідати за, займатися, керувати."
      - "Preview: checkpoint-aspect (M12) — діагностична робота з усіх аспектних
        контекстів, вивчених у M01-M11."
vocabulary_hints:
  required:
    - "робота (work/job — general term for employment)"
    - "професія (profession — a trained occupation)"
    - "фах (specialty/field — area of expertise)"
    - "посада (position/role — specific job title in a company)"
    - "вакансія (vacancy — an open job position)"
    - "співбесіда (job interview — formal meeting with employer)"
    - "працевлаштування (employment — the process of getting hired)"
    - "резюме (CV/resume — невідмінюване, written job application)"
    - "обов'язок (duty/responsibility — pl. обов'язки)"
    - "досвід (experience — professional background)"
    - "підвищення (promotion/raise — career advancement)"
    - "зарплата (salary — розм. form of заробітна плата)"
    - "колега (colleague — спільного роду: мій/моя колега)"
    - "керівник (manager/supervisor — head of a team or department)"
    - "звільнення (dismissal/resignation — leaving a job)"
  recommended:
    - "роботодавець (employer — the hiring party)"
    - "працівник (employee/worker)"
    - "стажування (internship/training period)"
    - "кар'єра (career — long-term professional path)"
    - "підприємство (enterprise/company — formal)"
    - "відповідати за (to be responsible for + acc.)"
    - "займатися (to engage in + instr.)"
activity_hints:
  - type: match-up
    focus: "З'єднайте слова з їхніми визначеннями: професія, фах, посада, спеціальність"
    items: 10
  - type: fill-in
    focus: "Доповніть речення правильною формою дієслова (доконаний чи недоконаний
      вид) у контексті розповіді про роботу"
    items: 10
  - type: quiz
    focus: "Визначте вид дієслова у реченнях про кар'єру та поясніть вибір"
    items: 10
  - type: group-sort
    focus: "Розподіліть лексику: люди, місця, процеси, документи"
    items: 10
  - type: role-play
    focus: "Розіграйте співбесіду: кандидат розповідає про досвід, керівник ставить
      запитання"
    items: 10
  - type: open-writing
    focus: "Напишіть коротку кар'єрну біографію (5-8 речень), чергуючи доконаний
      і недоконаний вид"
    items: 8
connects_to:
  - "b1-001 (b1-baseline-past-present — aspect review, foundation for work narratives)"
  - "b1-002 (b1-baseline-future-aspect — future plans about career)"
  - "b1-012 (checkpoint-aspect — diagnostic testing aspect mastery including work contexts)"
  - "b1-003 (people-and-relationships — social vocabulary, character descriptions of
    colleagues)"
prerequisites:
  - "A2 completion (learner knows basic past/present tense, simple aspect distinctions)"
  - "b1-001 and b1-002 (baseline verb tense and aspect review)"
grammar:
  - "Вид дієслова у розповіді: доконаний для послідовності подій, недоконаний для
    тла та тривалості"
  - "Видові пари робочих дієслів: влаштуватися/влаштовуватися, звільнитися/звільнятися"
  - "Instrumental case with work verbs: займатися + Oр., керувати + Oр., працювати
    з + Oр."
  - "Колега as спільного роду noun: мій колега / моя колега"
register: розмовно-діловий
references:
  - title: "Литвінова Grade 7, p.30-44"
    notes: "Вид дієслова: доконаний/недоконаний — значення, утворення видових пар,
      вживання у минулому та майбутньому часі."
  - title: "Заболотний Grade 7, p.54-65"
    notes: "Дієслово: вид, часи — утворення, тести на вид. Видові пари і їх
      утворення різними способами."
  - title: "Литвінова Grade 7, p.205"
    notes: "Ситуативне мовлення: формули представлення, етикет ділового спілкування."
  - title: "Заболотний Grade 5, p.69"
    notes: "Лексикологія: тематичні групи слів, семантичні поля, розрізнення
      синонімів."
