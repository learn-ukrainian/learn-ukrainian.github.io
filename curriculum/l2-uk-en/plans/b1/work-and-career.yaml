module: b1-010
level: B1
sequence: 10
slug: work-and-career
version: '1.0.2'
title: "Робота і кар'єра"
subtitle: "Професійна лексика, працевлаштування та розповідь про досвід"
focus: thematic-vocabulary
pedagogy: TTT
phase: "B1.0 [Основи та опанування виду]"
word_target: 4000
objectives:
  - "Студент вміє називати професії, ролі на робочому місці та поняття працевлаштування, використовуючи точну українську лексику (посада, фах, професія, вакансія, працевлаштування)"
  - "Студент вміє описувати свій досвід роботи та кар'єрний шлях українською, правильно обираючи вид дієслова для розрізнення тривалих процесів та завершених результатів: працювала (недоконаний, тривалість) проти змінила роботу (доконаний, результат)"
  - "Студент вміє орієнтуватися в ситуації співбесіди українською мовою з використанням відповідного регістру: формальне представлення себе, опис обов'язків та запитання про умови праці"
  - "Студент вміє написати короткий професійний опис себе (5-8 речень), розповідаючи про свій кар'єрний шлях із правильним чергуванням виду дієслова між тлом та послідовністю подій"
dialogue_situations:
  - setting: 'Співбесіда (f, job interview) у львівській IT-компанії — кандидатка описує попередній досвід і розпитує про посаду: Я працювала (impf) три роки в маркетингу. Потім вирішила (pf) змінити напрямок. Які обов''язки (pl) на цій посаді (f)?'
    speakers:
      - Кандидатка
      - Керівник відділу
    motivation: 'Чергування виду в розповідях про кар''єру: працювала (недоконаний, тривалість тла) проти вирішила (доконаний, завершене рішення). Формальний регістр для робочого місця.'
  - setting: 'Двоє колег під час обіду обговорюють плани на кар''єру: Я вже п''ять років працюю (impf, present) тут. Хочу подати (pf) на підвищення (n). А ти не думаєш змінити (pf) роботу?'
    speakers:
      - Олександр
      - Тетяна
    motivation: 'Теперішній час (недоконаний) для поточного стану проти інфінітива (доконаний) для запланованих одноразових дій. Напівформальний регістр між колегами.'
content_outline:
  - section: "Професія і фах: базова лексика"
    words: 1000
    points:
      - "Основне лексичне поле: професія (як поняття), фах (галузь, сфера експертизи), спеціальність (конкретна кваліфікація), посада (роль у компанії). Семантичні відмінності за Заболотним (5 клас, с. 69) модель розвитку словникового запасу: систематизація за семантичним полем, розрізнення синонімів."
      - "Лексика робочого місця: підприємство, компанія, офіс, відділ, колега (спільний рід), керівник, працівник, роботодавець. Примітка: колега є словом спільного роду — мій колега, моя колега."
      - "Процес працевлаштування: вакансія, резюме (невідмінюване), співбесіда, працевлаштування, стажування, випробувальний термін."
      - "Кар'єрний шлях: досвід, обов'язок (у множині — обов'язки), зарплата (розм. — формально: заробітна плата), підвищення, звільнення, кар'єра. Практика: студенти розподіляють лексику за групами — люди, місця, процеси, документи."
  - section: "Вид дієслова у розповіді про роботу"
    words: 1000
    points:
      - "Повторення вибору виду дієслова (Литвінова, 7 клас, с. 30): доконаний вид для завершених, результативних дій — влаштувалася на роботу, отримала підвищення, звільнилася. Недоконаний вид для тривалих, звичних або фонових дій — працювала в компанії, виконувала обов'язки, вела проєкти."
      - "Вид дієслова в розповідях про кар'єру — модель: Недоконаний як тло/тривалість: Я працювала в банку п'ять років. Доконаний як послідовність подій: Закінчила університет, подала резюме, пройшла співбесіду і влаштувалася на роботу. Комбіновано: Коли я працювала (тло) у Львові, мені запропонували (подія) нову посаду."
      - "Типові помилки у виборі виду в робочому контексті: *Я працювала три роки і звільнялася (недоконаний — неправильно, очікується результат) → Я працювала три роки і звільнилася (доконаний). *Я влаштувалася на роботу і виконувала обов'язки (недоконаний — правильно як звична дія). Головне питання: мовець наголошує на РЕЗУЛЬТАТI чи ПРОЦЕСI?"
      - "Практика: студенти пишуть міні-розповідь про кар'єру з 5 речень, використовуючи обидва види. Шаблон: Після [чого?] я [доконаний — одноразова подія]. [X] років я [недоконаний — тривалість]. Потім [доконаний — наступна подія]. Зараз я [недоконаний теп. час — поточний стан]."
  - section: "На співбесіді: ситуативне мовлення"
    words: 1000
    points:
      - "Структура співбесіди українською (на основі моделі ситуативного мовлення з Литвінової, 7 клас, с. 205): 1. Привітання і представлення: Доброго дня, мене звати... Я подавала резюме на посаду... 2. Розповідь про досвід: Я закінчила... Працювала в... Моїми обов'язками були... 3. Запитання: Які умови праці? Який графік роботи? 4. Завершення: Дякую за можливість."
      - "Регістр: формальна українська мова на робочому місці. Ключові шаблони: Дозвольте розповісти про мій досвід. Моєю спеціальністю є... На попередній посаді я відповідала за... Маю досвід роботи у сфері... Контраст із неформальним: Я працювала в... → формальний: Мій попередній досвід пов'язаний із..."
      - "Опис обов'язків — повторення орудного відмінка: відповідати за + знахідний (відповідала за проєкт), займатися + орудний (займалася маркетингом), працювати з + орудний (працювала з клієнтами), керувати + орудний (керувала командою)."
      - "Практика діалогу: повноцінна рольова гра — співбесіда. Студенти по черзі виступають у ролі кандидата та керівника. Кожен повинен використати щонайменше 3 дієслова доконаного та 3 дієслова недоконаного виду у своїй розповіді про кар'єру."
  - section: "Підсумок: робота і вид дієслова"
    words: 1000
    points:
      - "Зведення лексики за категоріями: люди на роботі (колега, керівник, працівник, роботодавець), процес працевлаштування (вакансія, резюме, співбесіда, стажування), кар'єра (посада, підвищення, звільнення, досвід, обов'язок)."
      - "Зведена таблиця видів дієслів у робочому контексті: працювати (недок.) — немає доконаної пари (дієслово процесу). влаштуватися (док.) / влаштовуватися (недок.). звільнитися (док.) / звільнятися (недок.). отримати (док.) / отримувати (недок.). подати (док.) / подавати (недок.). Доповніть таблицю прикладами речень для кожної пари."
      - "Самоперевірка: 1. Назвіть 5 професій і 5 слів, пов'язаних із працевлаштуванням. 2. Розкажіть про свій (реальний або вигаданий) досвід роботи, чергуючи доконаний і недоконаний вид. 3. Яка різниця між словами професія, фах, спеціальність, посада? 4. Як розповісти на співбесіді про свої обов'язки? Складіть 3 речення з дієсловами відповідати за, займатися, керувати."
      - "Анонс: checkpoint-aspect (M12) — діагностична робота з усіх аспектних контекстів, вивчених у M01-M11."
vocabulary_hints:
  required:
    - "робота (work/job — general term for employment)"
    - "професія (profession — a trained occupation)"
    - "фах (specialty/field — area of expertise)"
    - "посада (position/role — specific job title in a company)"
    - "вакансія (vacancy — an open job position)"
    - "співбесіда (job interview — formal meeting with employer)"
    - "працевлаштування (employment — the process of getting hired)"
    - "резюме (CV/resume — невідмінюване, written job application)"
    - "обов'язок (duty/responsibility — pl. обов'язки)"
    - "досвід (experience — professional background)"
    - "підвищення (promotion/raise — career advancement)"
    - "зарплата (salary — розм. form of заробітна плата)"
    - "колега (colleague — спільного роду: мій/моя колега)"
    - "керівник (manager/supervisor — head of a team or department)"
    - "звільнення (dismissal/resignation — leaving a job)"
  recommended:
    - "роботодавець (employer — the hiring party)"
    - "працівник (employee/worker)"
    - "стажування (internship/training period)"
    - "кар'єра (career — long-term professional path)"
    - "підприємство (enterprise/company — formal)"
    - "відповідати за (to be responsible for + acc.)"
    - "займатися (to engage in + instr.)"
activity_hints:
  - type: match-up
    focus: "З'єднайте слова з їхніми визначеннями: професія, фах, посада, спеціальність"
    items: 10
  - type: fill-in
    focus: "Доповніть речення правильною формою дієслова (доконаний чи недоконаний вид) у контексті розповіді про роботу"
    items: 10
  - type: quiz
    focus: "Визначте вид дієслова у реченнях про кар'єру та поясніть вибір"
    items: 10
  - type: group-sort
    focus: "Розподіліть лексику: люди, місця, процеси, документи"
    items: 10
  - type: role-play
    focus: "Розіграйте співбесіду: кандидат розповідає про досвід, керівник ставить запитання"
    items: 10
  - type: open-writing
    focus: "Напишіть коротку кар'єрну біографію (5-8 речень), чергуючи доконаний і недоконаний вид"
    items: 8
connects_to:
  - "b1-001 (b1-baseline-past-present — повторення виду дієслова, основа для розповідей про роботу)"
  - "b1-002 (b1-baseline-future-aspect — майбутні плани щодо кар'єри)"
  - "b1-012 (checkpoint-aspect — діагностичне тестування засвоєння виду дієслова, включаючи робочі контексти)"
  - "b1-003 (people-and-relationships — соціальна лексика, опис характеру колег)"
prerequisites:
  - "Завершення рівня A2 (студент знає базові форми минулого/теперішнього часу, прості розрізнення видів дієслова)"
  - "b1-001 та b1-002 (базове повторення часів та видів дієслів)"
grammar:
  - "Вид дієслова у розповіді: доконаний для послідовності подій, недоконаний для тла та тривалості"
  - "Видові пари робочих дієслів: влаштуватися/влаштовуватися, звільнитися/звільнятися"
  - "Орудний відмінок з робочими дієсловами: займатися + Oр., керувати + Oр., працювати з + Oр."
  - "Слово «колега» як іменник спільного роду: мій колега / моя колега"
register: розмовно-діловий
references:
  - title: "Литвінова Grade 7, p.30-44"
    notes: "Вид дієслова: доконаний/недоконаний — значення, утворення видових пар, вживання у минулому та майбутньому часі."
  - title: "Заболотний Grade 7, p.54-65"
    notes: "Дієслово: вид, часи — утворення, тести на вид. Видові пари і їх утворення різними способами."
  - title: "Литвінова Grade 7, p.205"
    notes: "Ситуативне мовлення: формули представлення, етикет ділового спілкування."
  - title: "Заболотний Grade 5, p.69"
    notes: "Лексикологія: тематичні групи слів, семантичні поля, розрізнення синонімів."