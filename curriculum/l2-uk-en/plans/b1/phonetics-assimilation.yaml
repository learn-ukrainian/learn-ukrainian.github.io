module: b1-94
level: B1
sequence: 94
slug: phonetics-assimilation
version: '2.0'
title: 'Фонетика: асиміляція та спрощення'
subtitle: 'Phonetics: Assimilation & Simplification'
content_outline:
- section: Вступ — Чому вимова змінюється
  points:
  - State Standard §4.1.1 alignment — consonant clusters, assimilation, simplification,
    alternations — focuses on mastering alternations [о], [е] with [і] and phonetic
    zero
  - 'Why this matters for B1: understanding fast native speech requires knowing these
    rules — essential for fluidity and avoiding ''choppy'' foreigner speech'
  - 'Cultural hook: the "singing" quality of Ukrainian — euphony (милозвучність) as
    a design principle of the language — differentiates Ukrainian from West Slavic
    languages which tolerate heavier clusters'
- section: Асиміляція за дзвінкістю (Voicing assimilation)
  points:
  - 'Progressive assimilation: voiced + voiceless → both voiceless (вокзал: [вогзал])
    — learner error: Missing Regressive Assimilation (pronouncing [вокзал] instead
    of [вогзал])'
  - 'Regressive assimilation: voiceless + voiced → both voiced (боротьба: [бород''ба])
    — use simple equations for visuals (e.g., т + б = [дб])'
  - 'Key pairs: з/с before voiced/voiceless (зберегти vs списати) — focus on proper
    articulation'
  - 'Contrast with Russian: Ukrainian preserves final voiced consonants (хліб = [хл''іб],
    not [хл''іп]) — learner error: Devoicing Final Consonants (Russian/German interference)'
- section: Асиміляція за м'якістю (Softness assimilation)
  points:
  - 'Consonant softening before soft consonants: [с''в''іт], [з''н''ім]'
  - '-ться pronunciation: [ц''ц''а] — the most common assimilation in everyday speech'
  - 'Learner error: pronouncing -ться as two separate sounds [т''-с''а]'
- section: Спрощення груп приголосних (Cluster simplification)
  points:
  - 'стн → сн: чесний (not *честний in pronunciation) — learner error: Cluster Literalism
    (pronouncing silent letters)'
  - 'здн → зн: пізно (not *піздно) — keep rhythm smooth'
  - 'стл → сл: щасливий (not *щастливий) — connect to ''щастя'' (happiness)'
  - 'Common words where simplification applies: серце, сонце, проїзний — focus on
    high-frequency vocabulary'
- section: Чергування (Alternations)
  points:
  - 'Consonant alternations: г/ж/з, к/ч/ц, х/ш/с (нога → ніжка, рука → ручка) — fundamental
    for case endings'
  - 'Vowel alternations: о/і, е/і in closed syllables (стіл — столи, ніч — ночі) —
    strictly avoiding open syllable [і] errors'
  - 'Why alternations happen: historical sound changes preserved in modern Ukrainian
    — alternations (у/в, і/й) exist specifically to avoid difficult consonant clusters'
- section: Практика — Слухання та вимова
  points:
  - 'Minimal pairs: distinguish words that differ only by assimilation — focus on
    voiced/voiceless pairs at word ends'
  - 'Dictation practice: write what you hear with correct spelling despite pronunciation
    — address ''pronunciation-influenced spelling errors'''
  - 'Read-aloud exercise: practice -ться, cluster simplification in connected speech
    — use tongue twisters (скоромовки)'
  - Tongue twisters (скоромовки) for practice — specific focus on clusters
- section: Підсумок
  points:
  - Summary of assimilation rules — frame as 'tools for harmony' rather than restrictions
  - Quick reference for spelling vs pronunciation mismatches — reinforce 'write explicitly,
    pronounce smoothly'
vocabulary_hints:
  required:
  - вимова (pronunciation) — правильна вимова, чітка вимова, особливості вимови
  - звук (sound) — голосний звук, приголосний звук, твердий звук, м'який звук
  - приголосний (consonant) — твердий/м'який приголосний
  - голосний (vowel) — чергування голосних
  - наголос (stress/accent) — ставити наголос
  - чергування (alternation) — чергування звуків, історичне чергування
  - спрощення (simplification) — спрощення приголосних, спрощення в групах
  - асиміляція (assimilation) — асиміляція за дзвінкістю, уподібнення звуків
  recommended:
  - дзвінкий (voiced) — дзвінкий приголосний
  - глухий (voiceless) — глухий приголосний
  - м'який (soft) — м'який приголосний
  - скоромовка (tongue twister) — тренувати скоромовки
  - милозвучність (euphony) — принцип милозвучності, краса і милозвучність
