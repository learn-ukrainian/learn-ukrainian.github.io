  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Блок 1: Стилі мовлення».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему вступ: як працювати з контрольною.'
  - type: error-correction
