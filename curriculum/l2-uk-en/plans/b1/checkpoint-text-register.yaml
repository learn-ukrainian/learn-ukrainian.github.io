module: b1-089
level: B1
sequence: 89
slug: checkpoint-text-register
version: '3.1.2'
title: "Контрольна робота 8"
subtitle: "Перевірка знань: стилі мовлення, заперечення, вставні слова, природа, читання"
focus: review
pedagogy: PPP
phase: "B1.8 [Текст і стиль]"
word_target: 4000
objectives:
  - "Вміти визначати маркери стилю та створювати тексти в офіційно-діловому й розмовному стилях."
  - "Навчитися правильно використовувати абревіатури, графічні скорочення, а також правила запису чисел і дат українською мовою."
  - "Вміти правильно вживати подвійне заперечення, включно з правилами написання не/ні разом і окремо."
  - "Вміти розпізнавати та використовувати вставні слова з правильною пунктуацією, відрізняючи їх від членів речення."
  - "Навчитися читати й аналізувати українські тексти рівня B1 (художні та нехудожні), визначаючи стиль, художні засоби та ключову лексику."
dialogue_situations:
  - setting: 'Письмовий практикум — студенти переписують те саме повідомлення в трьох стилях: Офіційний: ''Шановний пане директоре, прошу надати...'' Нейтральний: ''Добрий день, я хотів би попросити...'' Неформальний: ''Привіт! Слухай, мені треба...'''
    speakers:
      - Викладач стилістики
      - Студенти
    motivation: 'Закріплення: офіційний/неформальний стиль, абревіатури, подвійне заперечення, вставні слова'
content_outline:
  - section: "Вступ: як працювати з контрольною"
    words: 350
    points:
      - 'Огляд: ця контрольна робота перевіряє матеріал модулів 77-83. Сім тем: офіційно-діловий стиль (M77), розмовний стиль (M78), абревіатури (M79), подвійне заперечення (M80), вставні слова (M81), природа i довкілля (M82), читання літератури (M83).'
      - 'Інструкції: "Виконайте всі завдання по черзі. Якщо завдання здається складним, поверніться до відповідного модуля для повторення."'
      - 'Система самооцінювання: впевнено / потребую повторення / не розумію. Діагностичний підхід: виконати всі завдання, потім проаналізувати помилки за блоками, щоб визначити, які модулі потрібно повторити.'
  - section: "Блок 1: Стилі мовлення"
    words: 700
    points:
      - 'Визначення стилю: чотири уривки текстів (по 100-120 слів) — учні визначають, чи це офіційно-діловий, розмовний, науковий, публіцистичний, чи художній стиль. Навести конкретні мовні маркери.'
      - 'Стилістична трансформація: переробити поданий розмовний діалог на текст в офіційно-діловому стилі (та навпаки). Перевірка розуміння стилістичної лексики, граматики та тону.'
      - 'Створення документа: написати коротку заяву або оголошення, демонструючи розуміння норм офіційно-ділового стилю. Критерії оцінювання: правильне оформлення, канцеляризми, керування відмінками.'
      - 'Визначення суржику: знайти та виправити елементи суржику в діалозі, замінивши їх на питому українську розмовну лексику.'
      - 'Завдання на стилістичний континуум: розташувати 5 поданих речень від найбільш офіційного (офіційно-діловий) до найбільш неформального (розмовний), пояснюючи конкретні маркери, що визначають рівень стилю.'
  - section: "Блок 2: Абревіатури та скорочення"
    words: 550
    points:
      - 'Розшифрування: розшифрувати 10 абревіатур (ЗСУ, ООН, ЗМI, ЄС тощо) та визначити граматичний рід кожної з них.'
      - 'Узгодження: доповнити речення з абревіатурами, забезпечуючи правильне узгодження дієслова/прикметника (ООН ухвалила, ЗСУ звільнили).'
      - 'Графічні скорочення: написати українську адресу, використовуючи стандартні скорочення, написати дату прописом, виправити помилки у використанні скорочень.'
      - 'Змішане завдання на абревіатури: короткий новинний абзац, де учні розшифровують усі абревіатури, застосовують правильне узгодження та визначають стиль мовлення.'
  - section: "Блок 3: Подвійне заперечення"
    words: 600
    points:
      - 'Вправи на переклад: негативні речення з англійської → українською з правильним подвійним/потрійним запереченням.'
      - 'Правопис: разом чи окремо — правильно написати не/ні із заперечними займенниками (у всіх відмінках, з прийменниками і без) та заперечними прислівниками.'
      - 'Виправлення помилок: знайти та виправити помилки в запереченні в 6-8 реченнях (пропущене не, неправильне написання, англійська модель одинарного заперечення).'
      - 'Наголос: розрізняти нікого немає та нікого й спитати в контексті.'
  - section: "Блок 4: Вставні слова"
    words: 600
    points:
      - 'Класифікація: знайти вставні слова в тексті та розподілити їх за семантичними групами (впевненість, невпевненість, емоції, джерело, порядок).'
      - 'Пунктуація: додати або прибрати коми в реченнях зі вставними словами. Включає складні випадки: слова, які бувають вставними лише іноді (здається, можливо), та слова, які ніколи не бувають вставними (адже, навіть).'
      - 'Тест на вилучення: визначити, чи виділені слова є вставними, чи членами речення, перевіривши, чи зберігається зміст речення без них.'
      - 'Продуктивне завдання: вставити доречні вставні слова для вираження певного ставлення у поданих реченнях.'
      - 'Комбіноване завдання "вставне слово + заперечення": написати речення, що поєднують вставні слова з подвійним запереченням: "На жаль, ніхто нічого не зробив." Перевіряє здатність одночасно застосовувати кілька граматичних явищ.'
  - section: "Блок 5: Природа і читання"
    words: 750
    points:
      - 'Лексика природи: розподілити подані слова за категоріями погода, рослини, тварини, екологія. Доповнити описи правильною лексикою.'
      - 'Літературне читання: український текст рівня B1 (200-250 слів) про природу чи довкілля. Запитання на розуміння перевіряють: основну думку, деталі, художні засоби, стиль мовлення.'
      - 'Визначення художніх засобів: знайти та назвати епітети, метафори, порівняння, персоніфікації в уривку.'
      - 'Письмовий відгук: структурована відповідь на літературний текст із використанням вставних слів та лексики для вираження думки (8-10 речень).'
      - 'Екологічне есе: написати короткий аргумент (5-7 речень) щодо екологічної проблеми, використовуючи структуру аргументації (теза + аргумент), вставні слова, подвійне заперечення та лексику природи. Це інтегрує всі навички Фази 9 в одному продуктивному завданні.'
  - section: "Підсумок та самооцінка"
    words: 450
    points:
      - 'Інтегрована вправа: текст із різними стилями (новинна стаття з абревіатурами, цитований діалог у розмовному стилі, художній опис). Учні знаходять усі зміни стилю та мовні особливості.'
      - 'Контрольний список самооцінювання українською: Стилі: Чи розрізняю я офіційно-діловий i розмовний стилі? Абревіатури: Чи знаю я основні українські абревіатури? Заперечення: Чи правильно вживаю подвійне заперечення? Вставні слова: Чи вмію я їх використовувати та виділяти комами? Природа: Чи знаю я лексику природи i довкілля? Читання: Чи розумію я художні тексти рівня B1?'
      - 'Рекомендації для цілеспрямованого повторення: якщо Блок 1 < 70% → повторити M77-M78. Якщо Блок 2 < 70% → повторити M79. Якщо Блок 3 < 70% → повторити M80. Якщо Блок 4 < 70% → повторити M81. Якщо Блок 5 < 70% → повторити M82-M83. Конкретні посилання на модулі для кожної слабкої зони.'
      - 'Огляд Фази 10: Синтез рівня B1 — об''єднання всього матеріалу для завершення рівня B1.'
