module: b1-084
level: B1
sequence: 84
slug: checkpoint-text-register
version: '3.0'
title: "Контрольна робота 9"
subtitle: "Перевірка знань: стилі мовлення, заперечення, вставні слова, природа, читання"
focus: review
pedagogy: PPP
phase: "B1.9 [Text and Register]"
word_target: 4000
objectives:
- "Learner can demonstrate mastery of офіційно-діловий and розмовний стилі
  by identifying register markers and producing texts in both registers"
- "Learner can correctly use абревіатури, графічні скорочення, and
  number/date conventions in Ukrainian"
- "Learner can apply подвійне заперечення correctly, including правопис
  не/ні разом and окремо"
- "Learner can identify and use вставні слова with correct punctuation,
  distinguishing them from sentence members"
- "Learner can read and analyze B1-level Ukrainian texts (literary and
  non-literary), identifying стиль, художні засоби, and key vocabulary"
content_outline:
- section: "Вступ: як працювати з контрольною (Introduction)"
  words: 300
  points:
  - "Overview: this checkpoint tests M77-M83 (Phase 9: Text and Register).
    Seven content areas: офіційно-діловий стиль (M77), розмовний стиль (M78),
    абревіатури (M79), подвійне заперечення (M80), вставні слова (M81),
    природа i довкілля (M82), читання літератури (M83)."
  - "Instructions: 'Виконайте всі завдання по черзі. Якщо завдання
    здається складним, поверніться до відповідного модуля для повторення.'"
  - "Self-assessment framework: впевнено / потребую повторення / не розумію."
- section: "Блок 1: Стилі мовлення (Block 1: Speech styles — M77-M78)"
  words: 650
  points:
  - "Style identification: four text excerpts (100-120 words each) —
    learners identify each as офіційно-діловий, розмовний, науковий,
    публіцистичний, or художній. Cite specific linguistic markers."
  - "Register transformation: given a розмовний dialogue, learners rewrite
    it in офіційно-діловий стиль (and vice versa). Tests understanding of
    register-specific vocabulary, grammar, and tone."
  - "Document composition: learners write a short заява or оголошення,
    demonstrating mastery of офіційно-діловий стиль conventions.
    Evaluation criteria: correct formatting, канцеляризми, case government."
  - "Суржик identification: learners find and correct суржик elements
    in a dialogue, replacing with genuine розмовна українська."
- section: "Блок 2: Абревіатури та скорочення (Block 2: Abbreviations — M79)"
  words: 500
  points:
  - "Decoding: learners expand 10 абревіатури (ЗСУ, ООН, ЗМI, ЄС, etc.)
    and determine граматичний рід of each."
  - "Agreement: complete sentences with абревіатури, ensuring correct
    verb/adjective agreement (ООН ухвалила, ЗСУ звільнили)."
  - "Графічні скорочення: write a Ukrainian address using standard
    скорочення, write a date прописом, correct errors in скорочення usage."
- section: "Блок 3: Подвійне заперечення (Block 3: Double negation — M80)"
  words: 550
  points:
  - "Translation exercises: English negative sentences → Ukrainian with
    correct подвійне/потрійне заперечення."
  - "Правопис: разом чи окремо — learners write не/ні correctly with
    заперечні займенники (in all cases, with and without прийменники)
    and заперечні прислівники."
  - "Error correction: find and fix negation errors in 6-8 sentences
    (missing не, wrong написання, English-pattern single negation)."
  - "Наголос: distinguish нікого немає vs нікого й спитати in context."
- section: "Блок 4: Вставні слова (Block 4: Parenthetical words — M81)"
  words: 550
  points:
  - "Classification: identify вставні слова in a text and sort them by
    semantic group (впевненість, невпевненість, емоції, джерело, порядок)."
  - "Punctuation: add or remove commas in sentences with вставні слова.
    Include tricky cases: words that are sometimes вставні (здається,
    можливо) and words that are never вставні (адже, навіть)."
  - "Removal test: determine whether highlighted words are вставні or
    sentence members by testing if the sentence works without them."
  - "Production: insert appropriate вставні слова to express specified
    attitudes in given sentences."
- section: "Блок 5: Природа i читання (Block 5: Nature and reading — M82-M83)"
  words: 700
  points:
  - "Nature vocabulary: classify given words into погода, рослини, тварини,
    екологія categories. Fill in descriptions with correct vocabulary."
  - "Literary reading: a B1-level Ukrainian text (200-250 words) about
    nature or environment. Comprehension questions testing:
    основна думка, деталі, художні засоби, стиль мовлення."
  - "Художні засоби identification: find and name епітети, метафори,
    порівняння, персоніфікації in the passage."
  - "Opinion writing: structured response to the literary text using
    вставні слова and opinion vocabulary (8-10 sentences)."
- section: "Підсумок та самооцінка (Summary and self-assessment)"
  words: 400
  points:
  - "Integrated exercise: a multi-register text (news article containing
    абревіатури, a quoted dialogue in розмовний стиль, a literary
    description). Learners identify all register shifts and language features."
  - "Self-assessment checklist in Ukrainian:
    Стилі: Чи розрізняю я офіційно-діловий i розмовний стилі?
    Абревіатури: Чи знаю я основні українські абревіатури?
    Заперечення: Чи правильно вживаю подвійне заперечення?
    Вставні слова: Чи вмію я їх використовувати та виділяти комами?
    Природа: Чи знаю я лексику природи i довкілля?
    Читання: Чи розумію я художні тексти рівня B1?"
  - "Preview of Phase 10: B1 Synthesis & Graduation —
    putting everything together for B1 completion."
