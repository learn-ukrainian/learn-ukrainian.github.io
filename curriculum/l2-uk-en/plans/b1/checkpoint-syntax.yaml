module: b1-083
level: B1
sequence: 83
slug: checkpoint-syntax
version: '3.1.2'
title: "Контрольна робота 7"
subtitle: "Перевірка знань: складні речення, пряма і непряма мова, дозвілля і культура"
focus: review
pedagogy: PPP
phase: "B1.7 [Синтаксис складного речення]"
word_target: 4000
objectives:
  - "Вміти правильно будувати складносурядні речення, доречно обираючи сполучник і розставляючи розділові знаки."
  - "Навчитися конструювати всі типи складнопідрядних речень: з'ясувальні, означальні та обставинні (часу, причини, умови, мети, допусту)."
  - "Вміти перетворювати пряму мову на непряму та правильно оформлювати діалог."
  - "Навчитися класифікувати складні речення за типами та визначати сполучники."
  - "Вміти використовувати синтаксис складного речення в комунікативних ситуаціях про дозвілля, культуру та свята."
dialogue_situations:
  - setting: 'Пробне ЗНО з української мови — аналіз складного речення: Визначте тип речення: ''Хоча було холодно, ми пішли на прогулянку.'' Переробіть пряму мову на непряму. Складіть речення з підрядним мети.'
    speakers:
      - Екзаменатор
      - Учень
    motivation: 'Закріплення: складносурядне речення, всі типи підрядних, непряма мова у форматі іспиту'
content_outline:
  - section: "Вступ: як працювати з контрольною"
    words: 400
    points:
      - 'Огляд: ця контрольна робота перевіряє матеріал модулів 66-75. Складносурядне речення (M66), з''ясувальні (M67), означальні (M68), часу (M69), причини (M70), умови (M71), мети (M72), допусту (M73), пряма і непряма мова (M74), дозвілля (M75).'
      - 'Система самооцінювання: після кожного блоку оцініть свою впевненість.'
  - section: "Блок 1: Складносурядне речення"
    words: 550
    points:
      - 'Класифікація сполучників: для 8 складносурядних речень класифікувати сполучники як єднальні, протиставні або розділові.'
      - 'Пунктуація: розставити коми, крапки з комою та тире в 6 складносурядних реченнях, враховуючи виняток зі спільним членом.'
      - 'Конструювання: поєднати 4 пари простих речень за допомогою доречних сурядних сполучників.'
  - section: "Блок 2: Складнопідрядні речення"
    words: 800
    points:
      - 'Класифікація: визначити тип підрядного для 10 складнопідрядних речень: з''ясувальне, означальне, часу, причини, умови, мети, допусту.'
      - 'Вибір сполучника: вставити правильний сполучник у 8 реченнях (що/який/коли/бо/якщо/щоб/хоча). Перевірка стилістичної доречності.'
      - 'Відмінювання слова "який": доповнити 6 речень правильною формою сполучного слова "який" (узгодження в роді та числі з головним словом, відмінок залежить від ролі в підрядному реченні).'
      - 'Конструювання: побудувати 4 складнопідрядні речення заданих типів за поданою інформацією.'
  - section: "Блок 3: Пряма і непряма мова"
    words: 600
    points:
      - 'Пунктуація: правильно розставити розділові знаки в 6 реченнях із прямою мовою в різних позиціях (слова автора перед, після або всередині прямої мови).'
      - 'Трансформація: переробити 6 речень із прямої мови на непряму, застосовуючи правильний вибір сполучника та заміну займенників/часу.'
      - 'Зворотна трансформація: переробити 4 речення з непрямої мови на пряму.'
  - section: "Блок 4: Дозвілля, культура і свята"
    words: 550
    points:
      - 'Лексика: з''єднати 10 культурних і святкових термінів з їхніми описами.'
      - 'Розуміння прочитаного: короткий текст про українське свято з використанням складного синтаксису. Запитання перевіряють граматичні навички: класифікувати кожне складне речення в тексті.'
      - 'Продуктивне завдання: написати 4-6 речень про культурну подію або свято, використавши щонайменше 3 типи складних речень.'
  - section: "Блок 5: Інтегроване завдання"
    words: 600
    points:
      - 'Заповнення пропусків: розповідний текст із 12 пропусками, де учні вставляють правильні сполучники, форми слова "який", розділові знаки та перетворення непрямої мови.'
      - 'Завдання на класифікацію: для 8 змішаних складних речень визначити, чи це складносурядне, чи складнопідрядне речення, а потім вказати конкретний підтип.'
      - 'Продуктивне завдання: написати абзац-роздум (6-8 речень) про те, чи важливі традиційні свята, використавши складносурядне, з''ясувальне, означальне, причинне та допустове речення.'
  - section: "Підсумок та самооцінка"
    words: 500
    points:
      - 'Контрольний список самооцінювання: Складносурядне: Чи розрізняю єднальні, протиставні та розділові сполучники? Складнопідрядне: Чи визначаю тип підрядного? Який: Чи правильно вживаю сполучне слово "який" у відмінках? Пряма і непряма мова: Чи правильно перетворюю? Комунікація: Чи можу висловити думку складними реченнями?'
      - 'Рекомендації: якщо будь-який блок оцінено нижче 70%, поверніться до відповідного модуля. Фаза 9 (Текст і стиль) базується на майстерності синтаксису для вдосконалення української стилістики.'
