module: b1-041
level: B1
sequence: 41
slug: checkpoint-comparison
version: '3.1'
title: "Контрольна робота 5"
subtitle: "Перевірка знань: ступені порівняння, словотвір, покупки і послуги"
focus: review
pedagogy: PPP
phase: "B1.4 [Degrees of Comparison & Word Formation]"
word_target: 4000
objectives:
  - "Learner can demonstrate mastery of comparative and superlative formation for
    both adjectives and adverbs, including all alternation patterns"
  - "Learner can correctly use suppletive comparison forms (гарний-кращий-найкращий,
    добре-краще-найкраще) in context"
  - "Learner can form adjectives and nouns using the full range of word formation
    methods (suffixal, prefixal, prefixal-suffixal, compound, zero-derivation)"
  - "Learner can apply comparison structures and word formation vocabulary in transactional
    contexts (shopping, services, reviews)"
  - "Learner can identify and correct common errors: *більш кращий, *самий великий,
    incorrect -н-/-нн- spelling, wrong suffix choice"
dialogue_situations:
  - setting: 'Panel discussion at a Київській конференції (f, Kyiv conference) — comparing
      Ukrainian cities for investment: Львів — найпривабливіший для туризму. Харків
      розвивається швидше. Одеса — веселіша. Дніпро — наймолодше ІТ-місто.'
    speakers:
      - Модератор
      - Експерти
    motivation: 'Consolidation: comparative/superlative adjectives and adverbs, word
      formation'
content_outline:
  - section: "Повторення: ступені порівняння"
    words: 800
    points:
      - "Systematic review of all comparison forms: Вищий ступінь: проста (-іш-/-ш-)
        + складена (більш/менш). Найвищий ступінь: проста (най-) + складена (найбільш/найменш).
        Підсилені форми: що-/як- + найвищий. Full formation table with examples for
        each pattern."
      - "Consonant alternation review for comparison: [г]+[ш]=[жч]: дорогий-дорожчий,
        дорого-дорожче [з]+[ш]=[жч]: вузький-вужчий, вузько-вужче [к]+[ш]=[чч/щ]:
        легкий-легший, високий-вищий [с]+[ш]=[шч/щ]: високий-вищий, високо-вище Practice:
        15 adjectives and adverbs to transform."
      - "Suppletive forms review: гарний-кращий-найкращий (добре-краще-найкраще) поганий-гірший-найгірший
        (погано-гірше-найгірше) великий-більший-найбільший (багато-більше-найбільше)
        малий-менший-найменший (мало-менше-найменше) Drill: sentences requiring correct
        form selection."
  - section: "Повторення: словотвір"
    words: 750
    points:
      - "Adjective formation methods review: Суфіксальний: -н-, -ськ-/-зьк-/-цьк-,
        -ів-, -уват-, -еньк- Префіксальний: пре-, без-, над-, анти- Складання: чорноокий,
        темно-зелений -Н-/-НН- spelling rule: основа на -н- + суфікс -н- = -нн-."
      - "Noun formation methods review: Agent nouns: -ач, -ець, -ник, -тель, -ар,
        -ист (m. → f. counterparts) Place nouns: -ня, -ниця, -ище; prefix-suffix:
        при-...-я, за-...-я Verbal nouns: -ння, -ття; безафіксний: підписати → підпис
        Словотвірний ланцюжок: вода → водний → водник → підводник."
      - "Adverb formation review: суфіксальний (-о, -е: швидко, гарно), префіксально-
        суфіксальний (по-доброму, по-українськи). Adverb comparison: -іше/-ше (тихіше,
        швидше), най- (найтихіше). Parallel adjective/adverb forms: тихіший (adj.)
        vs тихіше (adv.)."
  - section: "Повторення: покупки і послуги"
    words: 500
    points:
      - "Key transactional vocabulary and phrases from M40: На ринку: ціна, знижка,
        готівка, здача, ваги. У магазині: розмір, примірочна, чек, гарантія, бракований.
        На пошті: посилка, бандероль, доставка. У банку: рахунок, переказ, обмін валют,
        курс."
      - "Review of comparison in transactional contexts: product comparison, service
        reviews, complaint register."
  - section: "Комплексні завдання"
    words: 1000
    points:
      - "Text analysis: a Ukrainian consumer magazine article comparing products.
        Tasks: identify all comparatives/superlatives, analyze word formation of agent
        and place nouns, answer comprehension questions."
      - "Error correction block: 10-12 sentences with mixed errors — comparison formation,
        -н-/-нн- spelling, suffix choice, Russicisms. Each error must be identified,
        explained, and corrected."
      - "Production task: write a 10-sentence product/service comparison using at
        least 5 comparatives, 3 superlatives, and 4 derived nouns. Self-assessment
        rubric provided."
      - "Dialogue reconstruction: arrange jumbled dialogue lines from a shopping scenario
        into correct conversational order, filling in missing comparative forms and
        transactional vocabulary."
  - section: "Самооцінка і підготовка до Фази 6"
    words: 550
    points:
      - "Self-check grid: can I form comparatives? superlatives? suppletive forms?
        Can I form adjectives from nouns? Nouns from verbs? Agent nouns (m./f.)? Can
        I shop, complain, and write reviews in Ukrainian? Rate each skill 1-5."
      - "Gap analysis: which areas need more practice before Phase 6? Preview of Phase
        6: advanced case usages, prepositions, numerals, pronouns. The shift: from
        FORMING words to USING cases precisely."
      - "Diagnostic: 10 quick-check questions covering all Phase 5 topics, with answer
        key and explanations."
      - "Remediation guide: for each skill rated below 3, specific exercises to revisit
        from M34-M40. Cross-references to the relevant sections in each module so
        learners can self-direct their review."
  - section: "Підсумок"
    words: 400
    points:
      - "Phase 5 achievement summary: comparison forms (проста, складена, підсилена),
        suppletive pairs, word formation methods (suffixal, prefixal, compound,
        zero-derivation), adverb formation and comparison, and practical application
        in shopping/service contexts."
      - "Key patterns to carry forward: the relationship between adjective and adverb
        comparison (parallel suffixes, same alternations), word formation chains as
        vocabulary expansion strategy, and register awareness (проста for speech,
        складена for formal texts)."
      - "Transition to Phase 6: mastering the nuances of Ukrainian cases — Родовий
        відмінок у деталях, прийменники з відмінками, числівники. The focus shifts
        from forming words to using them precisely in syntactic structures."
