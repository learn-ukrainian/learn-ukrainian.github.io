slug: checkpoint-comparison
version: '3.1.2'
title: "Контрольна робота 4"
subtitle: "Перевірка знань: ступені порівняння, словотвір, покупки і послуги"
focus: review
pedagogy: PPP
phase: "B1.4 [Порівняння та словотвір]"
word_target: 4000
objectives:
  - "Вміти утворювати вищий і найвищий ступені порівняння прикметників і прислівників, розуміючи всі моделі чергування."
  - "Навчитися правильно використовувати суплетивні форми порівняння (гарний-кращий-найкращий, добре-краще-найкраще) в контексті."
  - "Вміти утворювати прикметники та іменники, використовуючи всі способи словотвору (суфіксальний, префіксальний, префіксально-суфіксальний, складання, безафіксний)."
  - "Вміти застосовувати конструкції порівняння та лексику словотвору в комунікативних ситуаціях (покупки, послуги, відгуки)."
  - "Навчитися знаходити та виправляти типові помилки: *більш кращий, *самий великий, неправильне написання -н-/-нн-, неправильний вибір суфікса."
dialogue_situations:
  - setting: 'Панельна дискусія на Київській конференції — порівняння українських міст для інвестицій: Львів — найпривабливіший для туризму. Харків розвивається швидше. Одеса — веселіша. Дніпро — наймолодше ІТ-місто.'
    speakers:
      - Модератор
      - Експерти
    motivation: 'Закріплення: вищий і найвищий ступені порівняння прикметників і прислівників, словотвір'
content_outline:
  - section: "Повторення: ступені порівняння"
    words: 800
    points:
      - 'Систематичний огляд усіх форм порівняння: Вищий ступінь: проста (-іш-/-ш-) + складена (більш/менш). Найвищий ступінь: проста (най-) + складена (найбільш/найменш). Підсилені форми: що-/як- + найвищий. Повна таблиця утворення з прикладами для кожної моделі.'
      - 'Огляд чергування приголосних при порівнянні: [г]+[ш]=[жч]: дорогий-дорожчий, дорого-дорожче; [з]+[ш]=[жч]: вузький-вужчий, вузько-вужче; [к]+[ш]=[чч/щ]: легкий-легший, високий-вищий; [с]+[ш]=[шч/щ]: високий-вищий, високо-вище. Практика: 15 прикметників і прислівників для перетворення.'
      - 'Огляд суплетивних форм: гарний-кращий-найкращий (добре-краще-найкраще), поганий-гірший-найгірший (погано-гірше-найгірше), великий-більший-найбільший (багато-більше-найбільше), малий-менший-найменший (мало-менше-найменше). Практика: речення, що вимагають вибору правильної форми.'
  - section: "Повторення: словотвір"
    words: 750
    points:
      - 'Огляд способів творення прикметників: Суфіксальний: -н-, -ськ-/-зьк-/-цьк-, -ів-, -уват-, -еньк-. Префіксальний: пре-, без-, над-, анти-. Складання: чорноокий, темно-зелений. Правило написання -Н-/-НН-: основа на -н- + суфікс -н- = -нн-.'
      - 'Огляд способів творення іменників: Назви діячів: -ач, -ець, -ник, -тель, -ар, -ист (чоловічий та жіночий рід). Назви місць: -ня, -ниця, -ище; префіксально-суфіксальний: при-...-я, за-...-я. Віддієслівні іменники: -ння, -ття; безафіксний: підписати → підпис. Словотвірний ланцюжок: вода → водний → водник → підводник.'
      - 'Огляд творення прислівників: суфіксальний (-о, -е: швидко, гарно), префіксально-суфіксальний (по-доброму, по-українськи). Ступені порівняння прислівників: -іше/-ше (тихіше, швидше), най- (найтихіше). Паралельні форми прикметників та прислівників: тихіший vs тихіше.'
  - section: "Повторення: покупки і послуги"
    words: 500
    points:
      - 'Ключова лексика для спілкування: На ринку: ціна, знижка, готівка, здача, ваги. У магазині: розмір, примірочна, чек, гарантія, бракований. На пошті: посилка, бандероль, доставка. У банку: рахунок, переказ, обмін валют, курс.'
      - 'Повторення порівняння в контексті послуг: порівняння товарів, відгуки про послуги, скарги.'
  - section: "Комплексні завдання"
    words: 1000
    points:
      - 'Аналіз тексту: стаття з українського журналу для споживачів, що порівнює товари. Завдання: знайти всі ступені порівняння, проаналізувати словотвір назв діячів і місць, відповісти на запитання для розуміння.'
      - 'Блок виправлення помилок: 10-12 речень зі змішаними помилками — утворення ступенів порівняння, написання -н-/-нн-, вибір суфікса, росіянізми. Кожну помилку потрібно знайти, пояснити та виправити.'
      - 'Продуктивне завдання: написати порівняння товарів/послуг із 10 речень, використовуючи щонайменше 5 вищих ступенів, 3 найвищих та 4 похідних іменники. Надається рубрика для самооцінювання.'
      - 'Реконструкція діалогу: впорядкувати репліки з ситуації покупки у правильному порядку, заповнюючи пропущені форми порівняння та лексику.'
  - section: "Самооцінка і підготовка до Фази 6"
    words: 550
    points:
      - 'Таблиця самоперевірки: Чи можу я утворювати вищий ступінь? найвищий ступінь? суплетивні форми? Чи можу я утворювати прикметники від іменників? Іменники від дієслів? Назви діячів? Чи можу я робити покупки, скаржитися та писати відгуки українською? Оцініть кожну навичку від 1 до 5.'
      - 'Аналіз прогалин: які теми потребують більше практики перед Фазою 6? Огляд Фази 6: розширене вживання відмінків, прийменники, числівники, займенники. Перехід: від ТВОРЕННЯ слів до точного ВИКОРИСТАННЯ відмінків.'
      - 'Діагностика: 10 запитань для швидкої перевірки, що охоплюють усі теми Фази 5, з ключем до відповідей та поясненнями.'
      - 'Керівництво для повторення: для кожної навички, оціненої нижче 3, вказані конкретні вправи з відповідних розділів модулів, щоб учні могли самостійно спрямувати своє повторення.'
  - section: "Підсумок"
    words: 400
    points:
      - 'Підсумок досягнень Фази 5: форми порівняння (проста, складена, підсилена), суплетивні пари, способи словотвору, творення та порівняння прислівників, практичне застосування в ситуаціях покупок і послуг.'
      - 'Ключові моделі для запам''ятовування: зв''язок між порівнянням прикметників і прислівників (паралельні суфікси, однакові чергування), словотвірні ланцюжки як стратегія розширення словникового запасу, усвідомлення стилю (проста форма для розмови, складена для офіційних текстів).'
      - 'Перехід до Фази 6: опанування нюансів українських відмінків — родовий відмінок у деталях, прийменники з відмінками, числівники. Фокус зміщується з творення слів на їхнє точне використання в синтаксичних структурах.'
