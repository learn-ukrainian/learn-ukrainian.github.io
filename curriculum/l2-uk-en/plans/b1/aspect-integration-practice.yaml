title: 'Інтеграція виду: практика'
subtitle: Aspect Integration Practice
content_outline:
- section: Тест
  points:
  - Integration diagnostic — check understanding of the 'Logic Switch' (during vs.
    after)
  - All aspect contexts check — focus on distinguishing simultaneity (Imperfective)
    vs sequentiality (Perfective) per State Standard §4.4.3
- section: Пояснення
  points:
  - Temporal connectors with aspect — cover коли, поки, доки, як тільки; note strict
    limit nuance of доки (until)
  - Complex narrative patterns — alignment with State Standard §4.4.3 on temporal
    clauses (коли + Imp vs коли + Perf)
  - 'Integration strategies — use visual flowchart metaphor for ''Logic Switch'';
    learner error: future tense mixing (буду + Perfective)'
- section: Застосування на практиці
  points:
  - Practice scenarios — incorporate folk wisdom context like «Доки грім не гряне...»
  - 'Combined contexts — learner error: using Perfective for habitual actions instead
    of Imperfective'
- section: Діалоги
  points:
  - Extended dialogues — use high-frequency discourse markers like врешті-решт and
    зрештою
  - Natural aspect mixing — demonstrate instantaneous change with як тільки... так
    зразу
vocabulary_hints:
  required:
  - коли (when) — State Standard focus for temporal clauses
  - після того як (after) — sequentiality marker
  - перед тим як (before) — strict sequencing
  - 'доки (while/until) — collocations: доки не (until), folk wisdom: «Доки грім не
    гряне, рак не свисне»'
  - 'поки (while) — synonyms: поки не, поки що (for now)'
  - 'як тільки (as soon as) — collocations: як тільки... так зразу (instantaneous)'
  - одночасно (simultaneously) — Imperfective context
  - послідовно (sequentially) — Perfective context
  - спочатку (first) — narrative sequencing
  - потім (then) — narrative sequencing
  recommended:
  - 'тим часом (meanwhile) — collocations: тим часом як'
  - нарешті (finally) — sequential conclusion
  - раптом (suddenly) — Perfective aspect trigger
  - врешті-решт (eventually) — synonym for нарешті, зрештою; preferred over 'в кінці
    кінців'
  - зрештою (after all) — high-frequency discourse marker
