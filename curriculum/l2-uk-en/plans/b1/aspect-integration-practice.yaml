content_outline:
- section: Вступ та діагностика (Introduction and Diagnostic)
  words: 600
  points:
  - Review of aspect foundations (M06-13) and diagnostic test focusing on the 'Logic Switch' metaphor — identifying if actions
    are simultaneous or sequential.
  - 'Learner error check: addressing the confusion between habitual actions and one-time events, such as ''Кожного дня він
    прочитав новини'' (error) vs ''читав'' (correct).'
- section: 'Поглиблення: Часові сполучники (Deep Dive: Temporal Connectors)'
  words: 1000
  points:
  - Detailed breakdown of коли, поки, доки, як тільки per State Standard §4.4.3 for expressing simultaneity (одночасність)
    and sequentiality (різночасовість).
  - Semantic nuances of доки/поки не as markers of a strict limit (until), contrasting with тим часом як for continuous background
    actions.
- section: 'Логічний перемикач: Послідовність vs Одночасність (Logic Switch: Sequence vs Simultaneity)'
  words: 900
  points:
  - 'Visual flowchart metaphor for narrative planning: ''Did B start after A finished?'' (Sequential = Perf + Perf) vs ''Did
    B happen while A was in progress?'' (Simultaneous = Imp + Imp/Perf).'
  - Analysis of complex narrative patterns where aspect mixing signals shifts in focus or sudden interruptions using triggers
    like раптом (Perfective trigger).
- section: Культурний контекст та типові помилки (Cultural Context and Common Errors)
  words: 800
  points:
  - 'Integration of folk wisdom: ''Поки грім не вдарить, мужик не перехреститься'' — analyzing the use of поки/доки with Perfective
    aspect to signify a boundary event.'
  - 'Correction of ''Future Tense Mixing'' error: drill to eliminate the common mistake of using буду with Perfective infinitives
    (e.g., ''я буду написати'' vs correct ''я напишу'').'
- section: Практичне застосування та діалоги (Practice Application and Dialogues)
  words: 700
  points:
  - Extended dialogues incorporating high-frequency discourse markers врешті-решт and зрештою, reinforcing their use over
    the incorrect phrase 'в кінці кінців'.
  - 'Production task: narrative sequencing using спочатку, потім, and нарешті to synthesize aspect integration skills in a
    cohesive workday story (building on b1-13).'
vocabulary_hints:
  required:
  - коли (when) — State Standard focus for temporal clauses; signals simultaneity (Imp) or sequentiality (Perf)
  - після того як (after) — sequentiality marker for linking two Perfective events
  - перед тим як (before) — strict sequencing marker for chronological narrative order
  - 'доки (while/until) — collocations: доки не (until); cultural hook: «Доки грім не гряне, рак не свисне»'
  - 'поки (while) — synonyms: поки не (until), поки що (for now); indicates duration or a specific time limit'
  - 'як тільки (as soon as) — collocation: як тільки... так зразу (instantaneous change)'
  - одночасно (simultaneously) — anchor word for Imperfective aspect in complex sentences
  - послідовно (sequentially) — anchor word for Perfective aspect in narrative chains
  - спочатку (first) — essential narrative sequencing marker for the starting point
  - потім (then) — essential narrative sequencing marker for subsequent events
  recommended:
  - 'тим часом (meanwhile) — collocation: тим часом як; used for simultaneous background actions'
  - нарешті (finally) — sequential conclusion marker; high frequency in spoken and written narratives
  - раптом (suddenly) — Perfective aspect trigger used to signal sudden shifts or interruptions
  - врешті-решт (eventually) — high-frequency synonym for нарешті; preferred over the calque 'в кінці кінців'
  - зрештою (after all) — high-frequency discourse marker and common parenthetical word
