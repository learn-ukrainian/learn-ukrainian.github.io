module: b1-016
level: B1
sequence: 16
slug: health-at-the-doctor
version: 3.0.2
title: Здоров'я і медицина
subtitle: У лікаря — від скарг до рецепта
focus: communication
pedagogy: PPP
phase: B1.1 [Морфонологія]
word_target: 4000
objectives:
- Учень вміє описувати симптоми та скарги на здоров'я українською мовою, використовуючи відповідну медичну
  лексику (біль, кашель, нежить, температура)
- 'Учень вміє вести базовий діалог між лікарем та пацієнтом українською мовою: описувати симптоми, відповідати
  на запитання, розуміти діагноз'
- 'Учень вміє спілкуватися в аптеці: просити ліки, розуміти рецепт і дозування, описувати алергію'
- 'Учень вміє застосовувати знання з морфонології (модулі М08-М15) до медичної лексики: біль-безболісний
  (чергування), ліки (множинні іменники), здоров''я-здоровий (словотвір)'
- 'Учень вміє правильно вживати відмінки з медичними дієсловами: скаржитися на (+ Зн.в.), хворіти на (+
  Зн.в.), лікуватися від (+ Р.в.)'
dialogue_situations:
- setting: 'У поліклініці (f) в Києві — детальна медична консультація: У мене болить голова (f) вже тиждень.
    Температура тіла (n) — 37.5. Виписую вам рецепт (m) на ліки (pl). Зверніться до хірурга (m).'
  speakers:
  - Пацієнт
  - Терапевт (GP)
  motivation: 'Медична лексика та відмінки: болить голова, рецепт на ліки, до хірурга'
content_outline:
- section: Здоров'я і самопочуття
  words: 650
  points:
  - 'Вступ до основної лексики: Здоров''я — найважливіше, що є в людини. Коли ми здорові, ми не думаємо
    про лікарів. Але коли хворіємо, нам потрібна допомога. Ключове лексичне гніздо: здоров''я (іменник)
    → здоровий (прикметник) → одужати (дієслово, доконаний вид) → одужувати (дієслово, недоконаний вид).
    Морфонологічний зв''язок: у слові здоров''я пишеться апостроф після губного [в] перед [й] — той самий
    патерн, що й правила вживання м''якого знака з Фази 1.'
  - 'Опис самопочуття — ключові конструкції: Я добре почуваюся. / Мені погано. / У мене болить голова.
    Мені нудить. / Я кашляю. / У мене температура. Відмінкові моделі: у мене + називний відмінок (приналежність),
    мені + теперішній час (давальний відмінок стану), болить + називний відмінок (що саме болить). Зв''язок
    із М08 (чергування): біль — болить — безболісний (чергування і→о у відкритому складі).'
  - 'Повторення лексики частин тіла на рівні B1 з акцентом на морфонологію: голова — головний (о→о, без
    чергування, наголос стабільний), ніс — носа (чергування і→о в закритому/відкритому складах), вухо
    — у вусі (чергування х→с з М09), око — в оці (чергування к→ц з М09). Це ті самі патерни чергування,
    застосовані до лексики про тіло.'
- section: 'У лікаря: діалог'
  words: 800
  points:
  - 'Модельний діалог 1 — Прийом у терапевта: Повноцінний український діалог, що демонструє хід консультації:
    реєстрація → скарги → огляд → діагноз → призначення. Лікар: На що скаржитесь? Пацієнт: У мене болить
    горло і є температура. Лікар: Як давно? Пацієнт: Три дні. Лікар: Відкрийте рота. Скажіть ''а''. Дихайте
    глибоко.'
  - 'Модельний діалог 2 — У стоматолога: Спеціалізована лексика: зуб, ясна, пломба, знеболювальне. Граматичний
    фокус: наказовий спосіб у медичних вказівках (відкрийте, покажіть, не рухайтеся). Морфонологічний
    зв''язок: зуб — зуби (без чергування) проти зуб — зубний (словотвір із суфіксом -н-).'
  - 'Ключові медичні дієслова та керування: скаржитися на + Зн.в.: скаржуся на головний біль. хворіти
    на + Зн.в.: хворіти на грип. лікуватися від + Р.в.: лікуватися від застуди. оглянути + Зн.в.: лікар
    оглянув пацієнта. призначити + Зн.в.: лікар призначив ліки. одужати від + Р.в.: одужати від хвороби.'
- section: Спеціалісти та обстеження
  words: 650
  points:
  - 'Медичні спеціалісти: терапевт, хірург, стоматолог, окуліст, педіатр, лікар. Зв''язок зі словотвором
    з М12: лікар належить до групи суфіксів -ар (ІІ відміна, м''яка група). Морфологічна паралель: пекар,
    школяр, лікар — усі іменники-діячі на -ар.'
  - 'Типи обстежень: аналіз крові (крові — Р.в. III відміни з М14), рентген, УЗД (абревіатура), вимірювання
    тиску, вимірювання температури. Граматичний фокус: родовий відмінок у медичних контекстах (аналіз
    чого? крові, сечі; вимірювання чого? тиску, температури).'
  - 'Практика читання: резюме медичного висновку українською. Учні виокремлюють ключову інформацію: діагноз,
    симптоми, призначення. Фокус на розумінні прочитаного в медичному стилі.'
- section: В аптеці
  words: 700
  points:
  - 'Діалог в аптеці: Пацієнт: Доброго дня. У мене рецепт від лікаря. Аптекар: Покажіть, будь ласка. Ось
    ваші ліки. Пацієнт: Скільки разів на день приймати? Аптекар: Тричі на день після їжі. Ключова лексика:
    рецепт, ліки (множинний іменник із М15!), таблетка, мазь, укол, ін''єкція, щеплення, краплі (теж множинний
    іменник), дозування.'
  - 'Ліки — граматичний приклад із М15: ліки є множинним іменником: ці ліки (а не *цей лік), ліків (Р.в.),
    лікам (Д.в.), ліками (Ор.в.). Інші множинні іменники в медицині: краплі, вершки, парфуми.'
  - 'Морфонологічні зв''язки в медичній лексиці: біль → безболісний (префікс без- + чергування), хвороба
    → хворіти → хворий, здоров''я → здоровий → оздоровлення, лікар → лікувати → лікування → ліки. Ці лексичні
    гнізда закріплюють словотвірні моделі з М12 та М44.'
- section: Хвороби та симптоми
  words: 700
  points:
  - 'Поширені захворювання: застуда, грип, алергія, запалення, нежить, кашель. Опис симптомів українською:
    У мене нежить і кашель. Мені боляче ковтати. Я чхаю. У мене висока температура — тридцять вісім і
    п''ять.'
  - 'Граматичний фокус — нежить та кашель як іменники чоловічого роду ІІ відміни: нежить — нежитю (Д.в.,
    м''яка група: як учитель), кашель — кашлю (Д.в., м''яка група). Порівняння з ІІІ відміною: хвороба
    — це І відміна (жіночий рід на -а), але біль — ІІ відміна чоловічого роду (не ІІІ!). Це закріплює
    навички визначення відмін із М13-М14.'
  - 'Лексика профілактики: щеплення, імунітет, профілактика, обстеження. Конструкції для порад: Вам треба
    зробити щеплення. Потрібно здати аналізи. Раджу більше відпочивати. Не забувайте пити воду.'
- section: 'Підсумок: здоров''я українською'
  words: 500
  points:
  - 'Перевірка комунікативної компетентності — чи може учень: 1. Описати симптоми лікарю? 2. Зрозуміти
    діагноз і призначення? 3. Спілкуватися в аптеці? 4. Правильно вживати відмінки з медичними дієсловами?
    Перевірка морфонологічної інтеграції — чи може учень: 1. Визначати чергування в медичних словах (біль-болить)?
    2. Розпізнавати множинні іменники (ліки, краплі)? 3. Застосовувати словотвірні моделі (лікар-лікувати-лікування)?'
  - 'Самоперевірка: Дайте відповіді українською: 1. На що ви скаржитеся? 2. Які спеціалісти працюють у
    поліклініці? 3. Що каже аптекар, коли дає ліки? 4. Утворіть слова від кореня ''здоров-''. Анонс: М17
    — Контрольна робота 2.'
vocabulary_hints:
  required:
  - здоров'я (health — noun, III відміна pattern with апостроф)
  - лікар (doctor — II відміна, -ар agent suffix)
  - хвороба (disease — I відміна feminine)
  - 'біль (pain — II відміна masculine, чергування: біль-болить)'
  - температура (temperature — I відміна)
  - кашель (cough — II відміна masculine, м'яка група)
  - нежить (runny nose — II відміна masculine)
  - ліки (medicine — pluralia tantum)
  - рецепт (prescription)
  - аптека (pharmacy — I відміна)
  - діагноз (diagnosis — II відміна)
  - симптом (symptom — II відміна)
  - скаржитися (to complain — на + Зн.)
  - лікувати (to treat — imperfective)
  - одужати (to recover — perfective)
  - призначити (to prescribe — perfective)
  recommended:
  - пацієнт (patient — II відміна)
  - лікарня (hospital — I відміна)
  - поліклініка (clinic — I відміна)
  - терапевт (GP/therapist — II відміна)
  - хірург (surgeon — II відміна)
  - стоматолог (dentist — II відміна)
  - застуда (cold — I відміна)
  - грип (flu — II відміна)
  - алергія (allergy — I відміна)
  - щеплення (vaccination — neuter, -ення suffix)
  - обстеження (examination — neuter, -ення suffix)
  - таблетка (pill/tablet — I відміна)
