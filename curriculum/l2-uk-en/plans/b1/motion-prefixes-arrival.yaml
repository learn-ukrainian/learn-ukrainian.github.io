grammar:
- 'Prefix при- with motion verbs: arrival semantics'
- 'Prefix до- with motion verbs: reaching/completing journey semantics'
- 'Aspectual pairs: при-/до- perfectives with imperfective counterparts from різноспрямовані bases'
- 'Prepositions with при- verbs: до + Р.в., в/на + Зн.в.'
- 'Preposition with до- verbs: до + Р.в.'
- 'Conjugation of irregular prefixed forms: прийду, дійду'
register: науково-навчальний
references:
- title: Заболотний Grade 5, p.55
  notes: 'Prefix diagram: бігти + при/за/до/по/на/в/з/від/ви/пере/об/під.'
- title: Литвінова Grade 6, p.54
  notes: Написання префіксів пре-, при-, прі- — spelling rules for при- prefix.
- title: Заболотний Grade 5, p.65
  notes: Приїхати, прибігти, приклеїти — prefix при- means наближення (approach/arrival).
