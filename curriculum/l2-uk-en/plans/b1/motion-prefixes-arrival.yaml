module: b1-029
level: B1
sequence: 29
slug: motion-prefixes-arrival
version: '3.0'
title: Прийти, доїхати
subtitle: Префікси при- (прибуття) та до- (досягнення мети) з дієсловами руху
focus: grammar
pedagogy: PPP
phase: B1.4 [Motion Verb Universe]
word_target: 4000
objectives:
- Learner can explain the semantic difference between при- (arrival at a destination) and до- (reaching a destination/endpoint)
  with motion verbs
- Learner can form and conjugate prefixed motion verbs with при- and до- (прийти, приїхати, прибігти, принести, привести,
  привезти, прилетіти, припливти; дійти, доїхати, добігти, донести, довести, довезти)
- Learner can use при-/до- motion verbs with correct prepositions and cases (прийти до + Р.в., приїхати в/на + Зн.в., дійти
  до + Р.в.)
- Learner can distinguish при- (focus on arriving) from до- (focus on reaching/completing the journey) in context
dialogue_situations:
- setting: 'Visitors arriving at a сільська садиба (f, rural estate) in Закарпаття
    — everyone arrives differently: Ми прийшли (arrived on foot) з вокзалу. Тато доїхав
    (reached by car) за дві години. Поїзд прибув (arrived, formal) о десятій.'
  speakers:
  - Господарі садиби
  - Гості
  motivation: 'Arrival prefixes: прийти (при-), доїхати (до-), прибути (при-)'
content_outline:
- section: Як префікси змінюють дієслова руху
  words: 600
  points:
  - 'Bridge from M28: learners now know 8 base motion verb pairs. This module begins the prefix system — the most productive
    word-formation mechanism for motion verbs. From Заболотний Grade 5 p.55: adding a prefix to бігти creates прибігти, добігти,
    забігти, вибігти, перебігти — each with a distinct spatial meaning.'
  - 'Key principle: when a prefix is added to a motion verb, the result is almost always доконаний вид (perfective). The односпрямований
    base becomes the perfective stem: іти → прийти (pf.), їхати → приїхати (pf.). The різноспрямований base becomes the new
    imperfective: ходити → приходити (impf.), їздити → приїздити (impf.).'
  - 'This module focuses on при- and до- — the ''arrival'' prefixes. Reading passage: a family reunion scene where relatives
    прийшли, приїхали, прилетіли from different cities.'
- section: 'Префікс при-: прибуття'
  words: 850
  points:
  - 'При- means arriving at a destination, showing up, appearing: прийти (to come/arrive on foot): Друзі прийшли о шостій.
    приїхати (to arrive by vehicle): Поїзд приїхав вчасно. прибігти (to come running): Дитина прибігла з вулиці. прилетіти
    (to arrive by air): Літак прилетів з Варшави. припливти (to arrive by water): Корабель припливши до порту.'
  - 'Carrying/leading/transporting arrivals: принести (to bring on foot): Принеси мені воду, будь ласка. привести (to bring
    someone): Мати привела дитину до лікаря. привезти (to deliver by vehicle): Курієр привіз посилку. Full conjugation of
    прийти: прийду, прийдеш, прийде, прийдемо, прийдете, прийдуть. Past: прийшов, прийшла, прийшло, прийшли.'
  - 'Imperfective counterparts (from різноспрямовані bases): приходити (to come regularly): Вона приходить щодня о дев''ятій.
    приїздити (to visit regularly): Бабуся приїздить на літо. прибігати (to come running repeatedly): Кіт прибігає, коли чує
    їжу. приносити (to bring regularly): Листоноша приносить пошту щоранку.'
  - 'Prepositions with при-: прийти до + Р.в. (прийти до лікаря), прийти в/у + Зн.в. (прийти в магазин), прийти на + Зн.в.
    (прийти на роботу). 8-10 example sentences in realistic contexts.'
- section: 'Префікс до-: досягнення мети'
  words: 850
  points:
  - 'До- means reaching a point, getting all the way to the destination, often emphasizing the effort or distance of reaching:
    дійти (to walk all the way to): Ми дійшли до вершини гори. доїхати (to ride/drive all the way to): Доїхали до Одеси за
    6 годин. добігти (to run all the way to): Добіг до зупинки i встиг на автобус. долетіти (to fly all the way to): Літак
    долетів за дві години. доплисти (to swim all the way to): Він доплив до берега.'
  - 'Carrying/leading/transporting to destination: донести (to carry all the way): Доніс валізу до кімнати. довести (to lead
    all the way): Провідник довів групу до табору. довезти (to transport all the way): Таксі довезло нас до готелю. Full conjugation
    of доїхати: доїду, доїдеш, доїде, доїдемо, доїдете, доїдуть. Past: доїхав, доїхала, доїхало, доїхали.'
  - 'Imperfective counterparts: доходити (to walk to regularly/manage to reach): Дорога доходить до річки. доїздити (less
    common but valid): not typically used as imperfective — learners should note that not every prefixed verb has a natural
    imperfective pair in everyday speech.'
  - 'Do- always requires до + Р.в. (direction toward): дійти до школи, доїхати до міста, добігти до фінішу. The preposition
    до echoes the prefix до-, reinforcing the meaning. 8-10 example sentences.'
- section: При- чи до-? Різниця у значенні
  words: 700
  points:
  - 'Core distinction: при- focuses on ARRIVAL (appearing at the destination): Ми приїхали до Києва = We arrived in Kyiv (focus:
    we are now here). до- focuses on REACHING (completing the journey to the endpoint): Ми доїхали до Києва = We made it to
    Kyiv (focus: we covered the distance). Both can describe the same event, but with different emphasis.'
  - 'When при- is more natural: Guests arriving: Гості прийшли (not дійшли — guests ''arrived''). Vehicles arriving on schedule:
    Поїзд приїхав о третій. Deliveries: Посилка прийшла (the package arrived). When до- is more natural: Emphasis on distance/difficulty:
    Нарешті ми дійшли до табору! Reaching a deadline/point: Дорога доходить до лісу. ''Getting as far as'': Ми доїхали лише
    до Вінниці.'
  - 'Contrastive examples with the same verb: Я прийшов до тебе (I came to you — visiting you). Я дійшов до тебе (I walked
    all the way to you — emphasis on journey). Він приїхав до Львова (He arrived in Lviv — he is now there). Він доїхав до
    Львова (He made it to Lviv — covering the distance).'
  - '6-8 practice scenarios: learners choose при- or до- based on context.'
- section: 'Практика: прибуття та досягнення'
  words: 700
  points:
  - 'Dialogue: two friends discuss travel plans and arrivals — incorporating при- and до- verbs naturally in conversation.
    8-10 exchanges demonstrating both prefixes in context.'
  - 'Narrative exercise: a travel story from Kyiv to Carpathians — using при- and до- verbs at each stage of the journey.
    Model text (150-200 words) followed by comprehension questions.'
  - 'Production exercise: learners describe their own journey (real or imagined), using at least 5 different при-/до- motion
    verbs with correct prepositions and cases.'
- section: 'Підсумок: при- i до-'
  words: 300
  points:
  - 'Complete table: при- and до- with all 8 base verbs. при-: прийти, приїхати, прибігти, принести, привести, привезти, прилетіти,
    припливти. до-: дійти, доїхати, добігти, донести, довести, довезти, долетіти, доплисти. With imperfective pairs where
    applicable.'
  - 'Preview of M30: Піти, від''їхати — the departure prefixes. If при-/до- bring you TO a place, пі-/по- and від- take you
    AWAY.'
vocabulary_hints:
  required:
  - прийти (to come/arrive on foot — perfective)
  - приїхати (to arrive by vehicle — perfective)
  - прибігти (to come running — perfective)
  - принести (to bring — perfective)
  - привести (to bring someone — perfective)
  - привезти (to deliver by vehicle — perfective)
  - дійти (to walk to / reach on foot — perfective)
  - доїхати (to reach by vehicle — perfective)
  - добігти (to run to / reach running — perfective)
  - донести (to carry to / deliver on foot — perfective)
  - приходити (to come — imperfective)
  - приїздити (to visit / come by vehicle — imperfective)
  - приносити (to bring — imperfective)
  recommended:
  - прилетіти (to arrive by air — perfective)
  - припливти (to arrive by water — perfective)
  - долетіти (to fly all the way to — perfective)
  - доплисти (to swim all the way to — perfective)
  - довести (to lead all the way to — perfective)
  - довезти (to transport all the way to — perfective)
  - кур'єр (courier)
  - посилка (package/parcel)
  - листоноша (mail carrier)
  - вершина (summit/peak)
activity_hints:
- type: quiz
  focus: Choose при- or до- verb based on context (arrival vs reaching)
  items: 8
- type: fill-in
  focus: Conjugate при-/до- motion verbs to complete travel sentences
  items: 8
- type: match-up
  focus: Match perfective при-/до- verbs with their imperfective counterparts
  items: 8
- type: group-sort
  focus: Sort prefixed motion verbs into при- (arrival) / до- (reaching) groups
  items: 10
- type: error-correction
  focus: Fix incorrect prefix or preposition choices in sentences about arriving
  items: 6
- type: free-write
  focus: Write a short travel narrative using at least 4 при- and 3 до- verbs
  items: 6
