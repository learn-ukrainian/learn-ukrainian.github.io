module: b1-036
level: B1
sequence: 36
slug: motion-prefixes-arrival
version: '3.0.3'
title: "Прийти, доїхати"
subtitle: "Префікси при- (прибуття) та до- (досягнення мети) з дієсловами руху"
focus: grammar
pedagogy: PPP
phase: "B1.3 [Всесвіт дієслів руху]"
word_target: 4000
objectives:
  - "Учень вміє пояснювати семантичну різницю між при- (прибуття до місця призначення) та до- (досягнення місця призначення/кінцевої точки) з дієсловами руху."
  - "Учень вміє утворювати та відмінювати префіксальні дієслова руху з при- та до- (прийти, приїхати, прибігти, принести, привести, привезти, прилетіти, припливти; дійти, доїхати, добігти, донести, довести, довезти)."
  - "Учень вміє використовувати дієслова руху з при-/до- з правильними прийменниками та відмінками (прийти до + Р.в., приїхати в/на + Зн.в., дійти до + Р.в.)."
  - "Учень вміє розрізняти при- (акцент на прибутті) від до- (акцент на досягненні/завершенні подорожі) в контексті."
dialogue_situations:
  - setting: 'Гості прибувають до сільської садиби на Закарпатті — кожен прибуває по-різному: Ми прийшли (arrived on foot) з вокзалу. Тато доїхав (reached by car) за дві години. Поїзд прибув (arrived, formal) о десятій.'
    speakers:
      - Господарі садиби
      - Гості
    motivation: 'Префікси прибуття: прийти (при-), доїхати (до-), прибути (при-)'
content_outline:
  - section: "Як префікси змінюють дієслова руху"
    words: 600
    points:
      - "Перехід від модуля №28: учні вже знають 8 базових пар дієслів руху. Цей модуль розпочинає вивчення системи префіксів — найпродуктивнішого механізму словотворення для дієслів руху. За Заболотним, 5 клас, с.55: додавання префікса до бігти утворює прибігти, добігти, забігти, вибігти, перебігти — кожне з чітким просторовим значенням."
      - "Ключовий принцип: коли префікс додається до дієслова руху, результат майже завжди має доконаний вид. Односпрямована база стає основою доконаного виду: іти → прийти (док.), їхати → приїхати (док.). Різноспрямована база стає новим дієсловом недоконаного виду: ходити → приходити (недок.), їздити → приїздити (недок.)."
      - "Цей модуль фокусується на при- та до- — префіксах «прибуття». Читання: сцена родинної зустрічі, де родичі прийшли, приїхали, прилетіли з різних міст."
  - section: "Префікс при-: прибуття"
    words: 850
    points:
      - "При- означає прибуття до місця призначення, з'явлення на місці: прийти (прибути пішки): Друзі прийшли о шостій. приїхати (прибути транспортом): Поїзд приїхав вчасно. прибігти (прибігти кудись): Дитина прибігла з вулиці. прилетіти (прибути літаком): Літак прилетів з Варшави. припливти (прибути по воді): Корабель приплив до порту."
      - "Перенесення/спрямовування/транспортування з прибуттям: принести (принести пішки): Принеси мені воду, будь ласка. привести (привести когось): Мати привела дитину до лікаря. привезти (доставити транспортом): Кур'єр привіз посилку. Повне відмінювання прийти: прийду, прийдеш, прийде, прийдемо, прийдете, прийдуть. Минулий час: прийшов, прийшла, прийшло, прийшли."
      - "Форми недоконаного виду (від різноспрямованих основ): приходити (приходити регулярно): Вона приходить щодня о дев'ятій. приїздити (приїжджати регулярно): Бабуся приїздить на літо. прибігати (прибігати постійно): Кіт прибігає, коли чує їжу. приносити (приносити регулярно): Листоноша приносить пошту щоранку."
      - "Прийменники з при-: прийти до + Р.в. (прийти до лікаря), прийти в/у + Зн.в. (прийти в магазин), прийти на + Зн.в. (прийти на роботу). 8-10 речень-прикладів у реалістичних контекстах."
  - section: "Префікс до-: досягнення мети"
    words: 850
    points:
      - "До- означає досягнення точки, прибуття аж до самого місця призначення, часто підкреслюючи зусилля або відстань досягнення: дійти (дійти до кінця пішки): Ми дійшли до вершини гори. доїхати (доїхати до кінця транспортом): Доїхали до Одеси за 6 годин. добігти (добігти до кінця): Добіг до зупинки і встиг на автобус. долетіти (долетіти до кінця): Літак долетів за дві години. доплисти (доплисти до кінця): Він доплив до берега."
      - "Перенесення/спрямовування/транспортування до пункту призначення: донести (донести до кінця): Доніс валізу до кімнати. довести (довести до кінця): Провідник довів групу до табору. довезти (довезти до кінця): Таксі довезло нас до готелю. Повне відмінювання доїхати: доїду, доїдеш, доїде, доїдемо, доїдете, доїдуть. Минулий час: доїхав, доїхала, доїхало, доїхали."
      - "Форми недоконаного виду: доходити (регулярно доходити до/спромогтися дійти): Дорога доходить до річки. доїздити (менш поширене, але правильне): зазвичай не використовується як пара недоконаного виду в повсякденному мовленні — учні мають зауважити, що не кожне префіксальне дієслово має природну пару недоконаного виду в живій мові."
      - "До- завжди вимагає до + Р.в. (напрямок до): дійти до школи, доїхати до міста, добігти до фінішу. Прийменник до перегукується з префіксом до-, підсилюючи значення. 8-10 речень-прикладів."
  - section: "При- чи до-? Різниця у значенні"
    words: 700
    points:
      - "Ключова відмінність: при- акцентує на ПРИБУТТІ (з'явленні в пункті призначення): Ми приїхали до Києва (фокус: ми зараз тут). до- акцентує на ДОСЯГНЕННІ (завершенні подорожі до кінцевої точки): Ми доїхали до Києва (фокус: ми подолали відстань). Обидва дієслова можуть описувати ту саму подію, але з різними акцентами."
      - "Коли при- більш природне: Гості прибувають: Гості прийшли (не дійшли — гості 'прибули'). Транспорт прибуває за розкладом: Поїзд приїхав о третій. Доставки: Посилка прийшла. Коли до- більш природне: Акцент на відстані/складності: Нарешті ми дійшли до табору! Досягнення межі/дедлайну: Дорога доходить до лісу. Означає 'дістатися аж до': Ми доїхали лише до Вінниці."
      - "Контрастні приклади з тим самим дієсловом: Я прийшов до тебе (Я прийшов тебе провідати). Я дійшов до тебе (Я подолав відстань пішки до тебе — акцент на подорожі). Він приїхав до Львова (Він прибув до Львова — він зараз там). Він доїхав до Львова (Він дістався Львова — подолав шлях)."
      - "Практика: 6-8 сценаріїв, де учні вибирають при- або до- залежно від контексту."
  - section: "Практика: прибуття та досягнення"
    words: 700
    points:
      - "Діалог: двоє друзів обговорюють плани подорожі та прибуття — природне використання дієслів із при- та до- у розмові. 8-10 реплік, що демонструють обидва префікси в контексті."
      - "Розповідь: туристична історія від Києва до Карпат — використання дієслів із при- та до- на кожному етапі подорожі. Зразок тексту (150-200 слів) та питання на розуміння."
      - "Продукція: учні описують власну подорож (реальну чи уявну), використовуючи щонайменше 5 різних дієслів руху з при-/до-, а також правильні прийменники та відмінки."
  - section: "Підсумок: при- і до-"
    words: 300
    points:
      - "Повна таблиця: при- та до- з усіма 8 базовими дієсловами. при-: прийти, приїхати, прибігти, принести, привести, привезти, прилетіти, припливти. до-: дійти, доїхати, добігти, донести, довести, довезти, долетіти, доплисти. Включаючи пари недоконаного виду, де це застосовно."
      - "Анонс модуль №30: Піти, від'їхати — префікси відправлення. Якщо при-/до- приносять вас ДО якогось місця, пі-/по- та від- забирають вас ГЕТЬ."
vocabulary_hints:
  required:
    - "прийти (to come/arrive on foot — perfective)"
    - "приїхати (to arrive by vehicle — perfective)"
    - "прибігти (to come running — perfective)"
    - "принести (to bring — perfective)"
    - "привести (to bring someone — perfective)"
    - "привезти (to deliver by vehicle — perfective)"
    - "дійти (to walk to / reach on foot — perfective)"
    - "доїхати (to reach by vehicle — perfective)"
    - "добігти (to run to / reach running — perfective)"
    - "донести (to carry to / deliver on foot — perfective)"
    - "приходити (to come — imperfective)"
    - "приїздити (to visit / come by vehicle — imperfective)"
    - "приносити (to bring — imperfective)"
  recommended:
    - "прилетіти (to arrive by air — perfective)"
    - "припливти (to arrive by water — perfective)"
    - "долетіти (to fly all the way to — perfective)"
    - "доплисти (to swim all the way to — perfective)"
    - "довести (to lead all the way to — perfective)"
    - "довезти (to transport all the way to — perfective)"
    - "кур'єр (courier)"
    - "посилка (package/parcel)"
    - "листоноша (mail carrier)"
    - "вершина (summit/peak)"
