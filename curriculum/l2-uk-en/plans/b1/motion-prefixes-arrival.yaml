    items: 8
  - type: fill-in
    focus: 'Відміняйте дієслова руху з при-/до-, щоб завершити речення про подорожі'
    items: 8
  - type: match-up
    focus: "З'єднайте дієслова доконаного виду з при-/до- з їхніми відповідниками недоконаного виду"
    items: 8
  - type: group-sort
    focus: 'Відсортуйте префіксальні дієслова руху на групи при- (прибуття) та до- (досягнення)'
    items: 10
  - type: error-correction
    focus: 'Виправте неправильний вибір префікса або прийменника в реченнях про прибуття'
