module: b1-100
level: B1
sequence: 100
slug: b1-final-exam
version: '1.0'
title: Фінальний іспит B1
subtitle: B1 Level Final Assessment
focus: checkpoint
pedagogy: TTT
phase: B1.9 [Communication Skills]
word_target: 4000
objectives:
- Learner demonstrates B1 reading comprehension
- Learner demonstrates B1 listening comprehension
- Learner demonstrates B1 grammar and vocabulary mastery
- Learner demonstrates B1 writing ability
- Learner demonstrates B1 speaking ability
content_outline:
- section: 'Вступ: Структура іспиту та оцінювання (Introduction: Exam Structure and Grading)'
  words: 500
  points:
  - 'Пояснення 12-бальної шкали оцінювання в Україні: деталізація рівнів від початкового (1-3 бали) до високого (10-12 балів)
    та культурний контекст відмінності від 5-бальної системи.'
  - 'Огляд державних стандартів рівня B1 (§1): здатність до тематично широкого спілкування та готовність до комунікації з
    елементами непередбачуваності.'
- section: 'Читання та аудіювання: Академічний контекст (Reading and Listening: Academic Context)'
  words: 800
  points:
  - 'Контекст НМТ (Національний мультипредметний тест): опис формату комп''ютерного тестування як заміни ЗНО під час війни;
    термінологія вступної кампанії.'
  - 'Студентський фольклор та забобони: розповідь про «кликання Шари» (Freebie) та підручник під подушкою як частина завдань
    на розуміння культурного контексту.'
- section: 'Граматика та лексика: Аналіз типових помилок (Grammar and Vocabulary: Common Error Analysis)'
  words: 1000
  points:
  - 'Аналіз видів дієслів у контексті результатів: виправлення помилки «я здавав іспит» (процес) на «я склав іспит» (успішний
    результат) з акцентом на доконаний вид.'
  - 'Диференціація дієслів руху: drill на використання різноспрямованого дієслова «ходити в університет» для регулярних дій
    замість помилкового «йти щодня».'
  - 'Помилкові друзі перекладача: розрізнення значень «здавати» (процес або здача паперів) та «скласти» (успішне проходження
    іспиту) згідно зі стандартами.'
- section: 'Продуктивні навички: Письмо та говоріння (Productive Skills: Writing and Speaking)'
  words: 1000
  points:
  - 'Письмове завдання: написання есе про плани на майбутнє та «вступ до університету», інтеграція лексики щодо «умов вступу»
    та «прохідного бала».'
  - 'Усне мовлення: симуляція діалогу з екзаменатором (Certification Examiner) про підготовку до тестів з використанням складних
    підрядних речень для аргументації.'
- section: Результати та перехід до рівня B2 (Results and Transition to B2)
  words: 700
  points:
  - 'Інтерпретація результатів: роз''яснення поняття «середній бал» та «позитивний результат» у межах фінального оцінювання
    рівня B1.'
  - 'Підготовка до B2: огляд переходу від загальних тем до академічного та професійного мовлення, що базується на засвоєній
    граматиці (вид, рух, синтаксис).'
vocabulary_hints:
  required:
  - іспит (exam) — складати/скласти іспит (take/pass), провалити іспит (fail), вступний іспит (entrance exam); висока частотність
  - оцінка (grade, assessment) — отримати оцінку, висока/низька оцінка, 12-бальна шкала; висока частотність
  - результат (result) — оголосити результати, результат тесту, позитивний результат; висока частотність
  - бал (point, score) — прохідний бал (passing score), набрати бали, середній бал; ключовий термін оцінювання
  - вступ (admission) — вступ до університету, умови вступу, вступна кампанія; контекст академічної мобільності
  - завдання (task) — тестове завдання, виконувати завдання, частина тесту
  recommended:
  - оцінювання (evaluation) — критерії оцінювання, система оцінювання знань
  - проходити (to pass/undergo) — проходити тестування, пройти відбір
  - готовність (readiness) — перевірка готовності, рівень володіння мовою
  - забобони (superstitions) — студентські забобони, вірити в прикмети
  - складання (taking/passing) — термін для позначення процесу складання іспиту
