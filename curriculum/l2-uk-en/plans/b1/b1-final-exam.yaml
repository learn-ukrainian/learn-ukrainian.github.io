module: b1-95
level: B1
sequence: 95
slug: b1-final-exam
version: '1.0'
title: Фінальний іспит B1
subtitle: B1 Level Final Assessment
content_outline:
- section: Огляд
  points:
  - 'Список навичок — кумулятивні компетенції рівня B1: читання, аудіювання, письмо,
    говоріння та лінгвістична компетенція згідно з державним стандартом'
- section: Про іспит
  points:
  - Структура іспиту — симуляція реального тестування (на зразок НМТ/ЗНО) з освітнім
    скафолдингом
  - 'Оцінювання — пояснення української 12-бальної шкали: 1-3 (початковий), 4-6 (середній/достатній),
    7-9 (достатній/високий), 10-12 (високий); cultural hook: відмінність від 5-бальної
    системи'
- section: 'Навичка 1: Читання'
  points:
  - 'Читання текстів — тексти про вступну кампанію та університетське життя; cultural
    hook: НМТ (Національний мультипредметний тест) як заміна ЗНО під час війни'
- section: 'Навичка 2: Аудіювання'
  points:
  - Аудіювання — діалоги студентів про підготовку до іспитів та інструкції екзаменатора
- section: 'Навичка 3: Граматика — Вид дієслова'
  points:
  - 'Вид дієслова — розрізнення доконаного/недоконаного виду в контексті результатів;
    learner error: «я здавав» (процес) vs «я склав» (успішний результат)'
- section: 'Навичка 4: Дієслова руху'
  points:
  - 'Дієслова руху — односпрямовані vs різноспрямовані рухи в контексті відвідування
    навчального закладу; learner error: «я йду в університет щодня» замість «я ходжу»'
- section: 'Навичка 5: Складні речення'
  points:
  - Складні речення — використання підрядних речень для аргументації думки в академічному
    контексті
- section: 'Навичка 6: Лексика B1'
  points:
  - 'Лексика B1 — термінологія іспитів та навчання; learner error: плутанина між «здавати»
    (процес/hand in) та «скласти» (pass successfully)'
- section: Частина 4 — Письмо
  points:
  - Письмові завдання — написання есе про плани на майбутнє та вступ до університету,
    використання лексики «вступна кампанія»
- section: Частина 5 — Говоріння
  points:
  - 'Усні завдання — обговорення підготовки до іспитів та студентських забобонів;
    cultural hook: «кликати Шару» та підручник під подушкою'
- section: Результати та рекомендації
  points:
  - Таблиця результатів — інтерпретація балів (прохідний бал, середній бал) та рекомендації
    щодо переходу на рівень B2
vocabulary_hints:
  required:
  - іспит (exam) — складати/скласти іспит (take/pass), провалити іспит (fail), вступний
    іспит (entrance exam)
  - оцінка (grade, assessment) — отримати оцінку, 12-бальна шкала (12-point scale)
  - результат (result) — оголосити результати (announce results), позитивний результат
  - частина (part, section) — частина тесту
  - завдання (task) — тестове завдання, виконувати завдання
  - читання (reading) — розуміння прочитаного
  - аудіювання (listening) — розуміння на слух
  - письмо (writing) — письмове завдання
  recommended:
  - говоріння (speaking) — усне мовлення
  - бал (point, score) — прохідний бал (passing score), набрати бали, середній бал
  - проходити (to pass/undergo) — проходити тестування (undergo testing)
  - готовність (readiness) — перевірка готовності
  - рівень (level) — рівень володіння мовою
  - критерій (criterion) — критерії оцінювання
