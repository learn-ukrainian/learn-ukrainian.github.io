module: b1-096
level: B1
sequence: 96
slug: ukrainian-cuisine
version: '3.0'
title: Українська кухня
subtitle: Ukrainian Cuisine and Food Culture
focus: culture
pedagogy: CBI
phase: B1.7 [Contemporary Ukraine]
word_target: 4000
objectives:
- Learner can discuss Ukrainian regional cuisines in context
- Learner can understand authentic texts about Ukrainian food traditions
- Learner can use food-related vocabulary to describe dishes and cooking methods
- Learner can compare Ukrainian cuisine with their own food culture
content_outline:
- section: 'Вступ: Кулінарна ДНК України (Introduction: Ukraine''s Culinary DNA)'
  words: 500
  points:
  - 'Огляд цілей модуля: обговорення регіональних особливостей та розуміння автентичних текстів про їжу (Standard §3.11, §3.15)'
  - 'Українська кухня як нематеріальна культурна спадщина ЮНЕСКО: кейс борщу та понад 300 автентичних рецептів'
  - 'Концепція ''Нової української кухні'': як сучасні шеф-кухарі (Клопотенко) змінюють сприйняття традиційних страв'
- section: Регіональна гастрономічна мапа (Regional Gastronomic Map)
  words: 1000
  points:
  - 'Полтавщина: культ полтавських галушок та символізм пам''ятника Галушці у Полтаві'
  - 'Галичина та Львів: культура кави (жіночий рід!) та вплив європейської кухні на грибну юшку та бограч'
  - 'Одеса: морська фузія — історія форшмаку та смажених бичків як мультикультурної спадщини'
  - 'Наративна арка: подорож героя від затишних кав''ярень Львова через Полтаву до рибних ресторанів Одеси'
- section: Символізм та ритуальна кухня (Symbolism and Ritual Cuisine)
  words: 800
  points:
  - 'Вареники як символ місяця: прадавні ритуали, техніка ліплення та різноманіття начинок (вишня, картопля, сир)'
  - 'Кутя на Святвечір: ритуальне значення інгредієнтів (пшениця, мак, мед) як зв''язок з предками'
  - 'Великодній стіл: Паска та крашанки — кулінарна репрезентація головного свята весни'
  - 'Сало як культурний код: козацькі традиції, шкварки та вживання сала з часником'
- section: Граматика смаку та етикет (Grammar of Taste and Etiquette)
  words: 900
  points:
  - 'Реєстр спілкування: розмовний стиль вдома проти офіційного замовлення в ресторані (Standard §4.5.1)'
  - 'Learner Error: вживання називного відмінка замість родового часткового (Я хочу борщу — Genitive vs Я хочу борщ — Accusative)'
  - 'Learner Error: помилки в роді іменників (Смачна кава — Feminine, а не Masculine) — вправи на узгодження'
  - 'Культурний етикет: ввічливі форми відмови від частування (''Дякую, я вже не голодний''), щоб не образити господаря'
- section: Практика та Продукція (Practice and Production)
  words: 800
  points:
  - 'Аналіз автентичного рецепта: використання дієслів наказового способу для опису процесу готування'
  - 'Діалог у ресторані: як замовляти страви, розпитувати про інгредієнти та використовувати вираз ''Смачного!'''
  - 'Критичне порівняння: обговорення смакових вподобань та паралелі між українською та власною кухнею'
  - 'Підсумок: Смачного! Закріплення ключових концепцій модуля та стратегій спілкування за столом'
vocabulary_hints:
  required:
  - борщ (borscht) — варити борщ, червоний/пісний борщ, статус ЮНЕСКО
  - вареники (varenyky) — ліпити вареники, начинка, мастити сметаною/маслом
  - сало (salo) — свіже/солоне сало, їсти з часником, шкварки
  - смачний (tasty) — дуже смачний; вираз 'Смачного!' (Bon appetit); на смак
  - готувати (to cook) — готувати вечерю, смачно готувати, готувати за рецептом
  - страва (dish) — фірмова страва, традиційна українська страва, перша страва
  recommended:
  - кутя (kutia) — пшениця, мак, мед; ритуальна страва на Святвечір
  - паска (paska) — великодній хліб, пекти паску
  - галушки (halushky) — полтавські галушки, символ Полтави
  - кава (coffee) — жіночий рід (смачна кава!), львівська кава
  - бограч (bograch) — закарпатська м'ясна юшка, гострий смак
  - борщу (some borscht) — родовий відмінок (partitive genitive) після дієслова 'хотіти'
  - рецепт (recipe) — сімейний рецепт, готувати за рецептом
