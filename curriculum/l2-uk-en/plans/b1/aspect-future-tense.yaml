activity_hints:
  - type: quiz
    focus: 'Оберіть правильну конструкцію майбутнього часу (складений, синтетичний або простий доконаний) на основі контексту та комунікативного наміру'
    items: 10
  - type: fill-in
    focus: 'Утворіть майбутній час заданих дієслів — спочатку визначте вид, а потім оберіть відповідну конструкцію'
    items: 8
  - type: group-sort
    focus: 'Розподіліть форми майбутнього часу на три конструкції та поясніть, чому кожне дієслово використовує саме цю конструкцію'
    items: 10
  - type: error-correction
    focus: 'Знайдіть і виправте неможливі або неприродні конструкції майбутнього часу (*буду написати, *прочитаю цілий день)'
    items: 6
  - type: match-up
    focus: 'З''єднайте комунікативні ситуації (обіцянка, план, передбачення) з найбільш природною конструкцією майбутнього часу'
    items: 8
  - type: open-writing
    focus: 'Напишіть "Мій план на завтра", поєднуючи майбутній час доконаного та недоконаного виду — позначте та обґрунтуйте вибір виду для кожного дієслова'
    items: 6
