module: b1-005
level: B1
sequence: 5
slug: aspect-future-tense
version: '1.0.2'
title: "Вид у майбутньому часі"
subtitle: "Три способи сказати 'я буду' — і чому їх саме три"
focus: aspect-future
pedagogy: TTT
phase: "B1.0 [Основи та майстерність виду]"
word_target: 4000
objectives:
  - 'Здобувач навчиться утворювати та розрізняти три конструкції українського майбутнього часу: складений майбутній час (буду + інфінітив), синтетичний недоконаний (-тиму/-тимеш) і простий доконаний (напишу, зроблю) — і пояснювати, якого виду вимагає кожна з них'
  - 'Здобувач навчиться обирати правильну конструкцію майбутнього часу залежно від комунікативного наміру: запланований процес (буду писати / писатиму) проти гарантованого результату (напишу)'
  - 'Здобувач навчиться пояснювати, чому доконаний вид має лише ОДНУ форму майбутнього часу (просту), тоді як недоконаний вид має ДВІ (складену і синтетичну) — пов''язуючи це з природою виду'
  - 'Здобувач навчиться природно використовувати майбутній час при плануванні, обіцянках та передбаченнях, обираючи вид залежно від того, чи зосереджено увагу на самій дії, чи на її завершенні'
dialogue_situations:
  - setting: 'Двоє друзів планують поїздку в Карпати на вихідні — один хоче спланувати кожну деталь (доконаний вид: забронюю, купимо, приїдемо), інший більш розслаблений щодо процесу (недоконаний вид: будемо гуляти, відпочиватимемо): Я завтра забронюю готель. — А я буду просто насолоджуватися природою.'
    speakers:
      - Марина
      - Андрій
    motivation: 'Запланований результат (майбутній час доконаного виду) проти тривалої насолоди (майбутній час недоконаного виду) у природному плануванні поїздки'
  - setting: 'Мати й підліток домовляються про домашнє завдання — мати хоче результатів (зробиш уроки, напишеш твір), підліток описує процес (буду робити, писатиму): Коли ти зробиш домашнє завдання? — Я буду робити після обіду. Спочатку писатиму математику, потім напишу твір.'
    speakers:
      - Мама
      - Дмитро
    motivation: 'Питання, орієнтовані на результат (доконаний вид), проти відповідей, орієнтованих на процес (недоконаний вид) — обидві форми майбутнього часу для недоконаного виду показані природно'
content_outline:
  - section: "Тест: яке майбутнє ви оберете?"
    words: 800
    points:
      - 'Діагностика: здобувачам пропонується 10 ситуацій у майбутньому часі, і вони мають обрати між буду + інфінітив, формою на -тиму або простою формою доконаного виду. Без правил — лише інтуїція. Приклади: Завтра я ... цю книжку (читатиму / буду читати / прочитаю). Я обіцяю, що ... до вечора (писатиму / буду писати / напишу).'
      - 'Самооцінювання: здобувачі відзначають, яка форма здалася найприроднішою в кожному контексті. Обговорення: чи відчули ви різницю між "буду читати" та "читатиму"? Між будь-якою з них та "прочитаю"? Це відчуття реальне — цей модуль робить його очевидним.'
      - 'Ключове питання: В українській мові є ТРИ конструкції майбутнього часу. В англійській мові є "will" + варіації. Чому три? Тому що вид розділяє майбутнє на майбутнє процесу та майбутнє результату, і майбутнє процесу має дві форми.'
      - 'Швидкий огляд утворення майбутнього часу з базового рівня A2/B1: складений (буду + інфінітив), синтетичний (-тиму/-тимеш/-тиме/-тимемо/-тимете/-тимуть), простий доконаний (напишу, зроблю — такі самі закінчення, як і в теперішньому часі дієслів доконаного виду).'
  - section: "Три конструкції: форма і значення"
    words: 1100
    points:
      - 'Конструкція 1 — складений майбутній час (Литвінова, 7 клас, с.44): буду + інфінітив недоконаного виду. Парадигма: буду писати, будеш писати, буде писати, будемо писати, будете писати, будуть писати. Значення: запланований майбутній процес, тривала дія в майбутньому, нейтральне твердження про майбутнє. Сприймається як дещо більш розмовний, поширений у щоденному мовленні.'
      - 'Конструкція 2 — синтетичний недоконаний (Заболотний, 7 клас, с.73): інфінітив + -му/-меш/-ме/-мемо/-мете/-муть (злиття з "буду"). Парадигма: писатиму, писатимеш, писатиме, писатимемо, писатимете, писатимуть. Має те саме значення, що й складений час, але сприймається як дещо більш літературний, офіційний або підкреслений. Обидва варіанти є абсолютно правильними; стилістична перевага варіюється залежно від регіону та стилю.'
      - 'Конструкція 3 — простий доконаний майбутній (Литвінова, 7 клас, с.46): Дієслова доконаного виду утворюють форми майбутнього часу як теперішній час — ті самі особові закінчення. напишу, напишеш, напише, напишемо, напишете, напишуть. Значення: завершена дія в майбутньому з результатом. Я напишу лист = лист БУДЕ ГОТОВИЙ.'
      - 'Чому не буває *буду написати? Тому що доконаний вид + складений майбутній час = логічна суперечність. Складений час передбачає процес; доконаний вид передбачає завершеність. Українська граматика відкидає цю невідповідність. Це не "правило для запам''ятовування" — це логічний наслідок значення виду.'
  - section: "Коли який? Вибір конструкції"
    words: 1100
    points:
      - 'Схема вибору: Що ви хочете сказати про майбутнє? Акцент на ПРОЦЕСІ → недоконаний вид (буду + інфінітив або -тиму): Завтра я буду працювати. Увечері читатиму книжку. Акцент на РЕЗУЛЬТАТІ → доконаний вид (простий): Завтра я закінчу проєкт. Увечері прочитаю цю статтю.'
      - 'Обіцянки та зобов''язання: зазвичай доконаний вид (результат має значення). Я напишу тобі. Ми приїдемо вчасно. Вона зробить усе, що обіцяла. Але існують обіцянки, що стосуються процесу: Я буду старатися. Ми будемо чекати на тебе. — зобов''язання стосується тривалих зусиль, а не конкретного результату.'
      - 'Плани та графіки: часто поєднують обидва види. Завтра я встану о сьомій (доконаний — єдина завершена дія), потім снідатиму (недоконаний — тривала дія), о дев''ятій поїду на роботу (доконаний — відправлення), там працюватиму до шостої (недоконаний — тривалість), а ввечері приготую вечерю (доконаний — результат: вечеря готова).'
      - 'Практика: здобувачі створюють план на завтра, поєднуючи обидва види. План повинен містити: 3+ дії доконаного виду (завершені етапи), 3+ дії недоконаного виду (тривалі заняття), принаймні одну пару з тим самим дієсловом в обох видах (читатиму газету... прочитаю статтю). Обговорення: чому ви обрали саме цей вид?'
  - section: "Підсумок: три майбутні як система"
    words: 1000
    points:
      - 'Синтез: система трьох конструкцій — це не ускладнення, а точність. Англійське "I will write" є неоднозначним між процесом та результатом. Українські слова "писатиму" (процес) і "напишу" (результат) змушують мовця обрати конкретне значення. Це перевага, а не недолік.'
      - 'Складений проти синтетичного — це вибір стилю, а не значення. Обидва означають те саме (майбутній час недоконаного виду). Регіональні та стилістичні відмінності: складений час більш поширений у розмовному стилі, синтетичний — у писемному. Обидва варіанти повністю нормативні (Правопис 2019). Здобувачі можуть надавати перевагу тому варіанту, який їм здається природнішим.'
      - 'Типові помилки та їх виправлення: *Я буду написати цей лист (неможливо — доконаний вид + складена форма). *Завтра я прочитаю книжку цілий день (маркер тривалості суперечить доконаному виду — слід використовувати "читатиму"). *Вона завтра зробить уроки і робитиме (надмірність — виберіть один вид для кожної події).'
      - 'Анонс наступного модуля: Вид у розповіді — як вплести обидва види у зв''язний наратив, використовуючи фонові (недоконаний вид) та основні події (доконаний вид).'
