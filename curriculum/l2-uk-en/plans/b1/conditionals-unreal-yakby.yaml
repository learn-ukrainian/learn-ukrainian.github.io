module: b1-32
level: B1
sequence: 32
slug: conditionals-unreal-yakby
version: '2.0'
title: 'Умовні речення: нереальна умова (якби)'
subtitle: Unreal Conditionals - Hypothetical Situations
content_outline:
- section: 'Тест: Перевірте себе'
  points:
  - Diagnostic quiz on unreal conditionals — check for confusion between «якщо» (real)
    and «якби» (unreal)
  - Self-assessment questions
- section: Пояснення
  points:
  - What are unreal conditionals — definition per State Standard §4.4.3 (complex sentences
    with «якби»)
  - якби as unreal marker — note emphatic forms «якби тільки», «якби ж то»
  - 'якби + Past Form structure — learner error: using Present/Future tense instead
    of Past (e.g., «Якби я маю» vs «Якби я мав»)'
  - Conditional Mood Formation (past + би) — per State Standard §4.2.3.3 (говорив
    би, випила б)
  - Present vs Past Hypotheticals
  - 'Real vs Unreal Comparison (якщо vs якби) — pedagogy: use «Reality Check» table
    (Реальність vs Фантазія); learner error: «Якщо б» calque instead of «Якби»'
- section: Практика
  points:
  - 'Form hypothetical sentences — cultural hook: Taras Shevchenko quote «Якби ви
    вчились так, як треба...»'
  - Express wishes and dreams — use verbs «мріяти», «уявляти»
- section: Діалоги
  points:
  - Unreal conditionals in conversation — use collocations «якби не», «шкодувати про»
  - Hypothetical scenarios — discuss «гіпотетична ситуація»
vocabulary_hints:
  required:
  - якби (if - unreal) — якби тільки, якби ж то, якби не
  - би (would - particle) — marker of conditional mood
  - нереальний (unreal) — нереальна умова
  - гіпотетичний (hypothetical) — гіпотетична ситуація
  - умовний спосіб (conditional mood) — grammar term
  - бажання (wish) — загадувати бажання
  - мрія (dream) — мріяти про (щось)
  - уявлення (imagination) — уявляти собі
  recommended:
  - якби тільки (if only) — emphatic wish
  - хотілося б (would like) — polite wish
  - було б краще (it would be better) — suggestion/regret
  - на жаль (unfortunately) — often starts a regret clause
  - шкодувати (to regret) — шкодувати про втрачене
  - мріяти (to dream) — давно мріяти
  - уявляти (to imagine) — важко уявити
