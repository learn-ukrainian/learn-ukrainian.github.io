slug: conditionals-unreal-yakby
version: '2.0'
title: 'Умовні речення: нереальна умова (якби)'
subtitle: Unreal Conditionals - Hypothetical Situations
focus: grammar
pedagogy: TTT
phase: B1.3a [Complex Sentences]
word_target: 4000
objectives:
- Learner understands unreal conditional constructions
- Learner can form hypothetical sentences with якби
- Learner can distinguish real and unreal conditionals
- Learner can express wishes and hypotheticals
content_outline:
- section: Вступ (Introduction)
  words: 600
  points:
  - 'Діагностичний квіз: перевірка навичок розрізнення реальної умови («якщо») та нереальної («якби»)'
  - Введення концепції «Reality Check» (Реальність vs Фантазія/Мрія) для маркування модальності
  - Визначення ірреальної умови згідно з Державним стандартом §4.4.3 (складнопідрядні речення)
- section: Граматика та правила (Grammar and Rules)
  words: 1200
  points:
  - 'Утворення форм умовного способу: поєднання дієслова у формі минулого часу з часткою «би/б» (§4.2.3.3)'
  - Функціонування сполучника «якби» як основного маркера нереальності; аналіз емфатичних форм «якби тільки», «якби ж то»
  - 'Контрастивна таблиця: порівняння «якщо» (реальність) та «якби» (ірреальність) — акцент на часових обмеженнях'
  - 'Пояснення структури: обов''язковість минулого часу після «якби» (уникнення кальок з англійської чи інших мов)'
- section: Культурний контекст (Cultural Context)
  words: 800
  points:
  - 'Аналіз класичної цитати Тараса Шевченка: «Якби ви вчились так, як треба...» як взірця вживання «якби»'
  - 'Контекст послання «І мертвим, і живим...»: як граматична конструкція передає глибокий жаль та докір'
  - Роль умовного способу в українській афористиці та народній мудрості
- section: Практика та типові помилки (Practice and Common Errors)
  words: 900
  points:
  - 'Виправлення кальки «якщо б»: обґрунтування вживання синтетичної форми «якби»'
  - 'Вправи на подолання часової невідповідності: корекція помилкових структур типу «якби я маю» або «якби я знатиму»'
  - 'Трансформаційні дрилі: перетворення реальних планів на гіпотетичні сценарії та мрії'
  - Автоматизація вживання часток «би» та «б» залежно від фонетичного контексту (милозвучність)
- section: Діалоги та застосування (Dialogues and Application)
  words: 500
  points:
  - 'Сценарії «Якби не...»: обговорення альтернативної історії та особистих рішень з використанням конструкції «якби не»'
  - 'Мовленнєві моделі для висловлення мрій та сподівань: використання дієслів «мріяти», «уявляти», «шкодувати»'
  - 'Колокації для повсякденного спілкування: «було б краще», «на жаль», «гіпотетична ситуація»'
vocabulary_hints:
  required:
  - 'якби (if - unreal) — сполучник нереальної умови; сталі форми: якби тільки, якби ж то, якби не'
  - би/б (would) — частка умовного способу; вибір форми би чи б залежить від попереднього звука
  - мріяти (to dream) — висока частотність; мріяти про (щось), давно мріяти
  - уявляти (to imagine) — уявляти собі (to imagine to oneself), важко уявити (hard to imagine)
  - нереальний (unreal) — нереальна умова; ключовий термін для опису граматичної категорії
  recommended:
  - шкодувати (to regret) — шкодувати про втрачене (regret what is lost), не шкодувати ні про що
  - гіпотетичний (hypothetical) — гіпотетична ситуація, гіпотетичне питання; книжний реєстр
  - якби тільки (if only) — емфатичне висловлення бажання або жалю
  - було б краще (it would be better) — конструкція для порад та гіпотетичних пропозицій
  - на жаль (unfortunately) — часто вводиться перед висловленням нереалізованої умови
