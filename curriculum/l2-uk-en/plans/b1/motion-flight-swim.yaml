module: b1-041
level: B1
sequence: 41
slug: motion-flight-swim
version: '3.1.3'
title: "Летіти, пливти"
subtitle: "Дієслова руху в повітрі та на воді — з усіма префіксами"
focus: grammar
pedagogy: PPP
phase: "B1.3 [Всесвіт дієслів руху]"
word_target: 4000
objectives:
  - "Учень вміє відмінювати дієслова руху в повітрі (летіти/літати) та дієслова руху на воді (пливти/плавати) у теперішньому та минулому часі."
  - "Учень вміє додавати всі 10 префіксів руху до летіти та пливти, утворюючи правильні префіксальні форми (прилетіти, відлетіти, перелетіти, підлетіти, пролетіти, облетіти; припливти, відпливти, переплисти, підплисти, проплисти, обплисти)."
  - "Учень вміє розрізняти летіти/літати та пливти/плавати як односпрямовані/різноспрямовані пари та правильно обирати їх у контексті."
  - "Учень вміє використовувати дієслова руху в повітрі та на воді з відповідною лексикою (аеропорт, літак, рейс, порт, корабель, човен, берег)."
dialogue_situations:
  - setting: 'На Чорному морі біля Одеси — літній день на пляжі: Чайки летять над морем. Діти пливуть до буйка. Літак пролетів над нами. Човен попливе на острів.'
    speakers:
      - Батьки
      - Діти
    motivation: 'Дієслова польоту/плавання: летіти/літати, пливти/плавати з море(n), літак(m), човен(m)'
content_outline:
  - section: "У повітрі та на воді: два особливі домени руху"
    words: 550
    points:
      - "Перехід від модуля №28: учні ознайомилися з летіти/літати та пливти/плавати як останніми двома парами. Тепер, після опанування всіх 10 префіксів (модулі №29–33), цей модуль застосовує повну систему префіксів до руху в повітрі та на воді."
      - "Чому окремий модуль: рух у повітрі та на воді має унікальну лексику (аеропорт, термінал, реєстрація, посадка; порт, причал, палуба, каюта) та деякі неправильні префіксальні форми (переплисти, а не *перепливти)."
      - "Читання: подорож літаком та поромом — від аеропорту Бориспіль до Стамбула, потім поромом через Босфор. Учні зустрічають усі префіксальні дієслова повітряного/водного руху в контексті."
  - section: "Летіти / літати: рух у повітрі"
    words: 900
    points:
      - "Базова пара: летіти (односпрямоване — політ прямо зараз, в одному напрямку): Літак летить до Відня. Птахи летять на південь. Відмінювання: лечу, летиш, летить, летимо, летите, летять. Минулий час: летів, летіла, летіло, летіли."
      - "Літати (різноспрямоване — звичний політ, у різних напрямках): Цей пілот літає щодня. Ластівки літають над річкою. Ми літали до Варшави двічі. Відмінювання: літаю, літаєш, літає, літаємо, літаєте, літають."
      - "Усі 10 префіксів із летіти: прилетіти (прибути повітрям): Літак прилетів з Лондона. долетіти (долетіти до пункту призначення): Долетіли за три години. полетіти (злетіти/вирушити): Полетіли о шостій ранку. відлетіти (полетіти геть): Птах відлетів від вікна. залетіти (влетіти всередину): Метелик залетів у кімнату. вилетіти (вилетіти звідкись/вирушити): Вилетіли за розкладом. перелетіти (перелетіти через): Лелеки перелетіли через море. пролетіти (пролетіти повз): Літак пролетів над містом. облетіти (облетіти навколо): Облетів усю країну. підлетіти (підлетіти ближче): Пташка підлетіла до годівниці."
      - "Недоконаний вид: прилітати, долітати, відлітати, залітати, вилітати, перелітати, пролітати, облітати, підлітати. 6-8 контекстних прикладів."
  - section: "Пливти / плавати: рух на воді"
    words: 900
    points:
      - "Базова пара: пливти (односпрямоване — плавання прямо зараз, в одному напрямку): Човен пливе по Дніпру. Він пливе до берега. Відмінювання: пливу, пливеш, пливе, пливемо, пливете, пливуть. Минулий час: плив, пливла, пливло, пливли."
      - "Плавати (різноспрямоване — звичне плавання, у різних напрямках): Вона чудово плаває. Качки плавають на озері. Ми плавали на Кіпр минулого року (подорож туди й назад). Відмінювання: плаваю, плаваєш, плаває, плаваємо, плаваєте, плавають."
      - "Усі 10 префіксів із пливти: припливти (прибути по воді): Корабель приплив до порту. доплисти (доплисти до пункту призначення): Доплив до острова. поплисти (вирушити по воді/почати плавати): Поплили о світанку. відпливти (відплисти геть): Корабель відплив від причалу. заплисти (заплисти всередину): Човен заплив у затоку. виплисти (виплисти звідкись): Виплив з печери. переплисти (переплисти на інший берег): Переплив річку. проплисти (проплисти повз): Проплили повз острів. обплисти (обплисти навколо): Обпливли острів за день. підплисти (підплисти ближче): Підплив до човна."
      - "Примітка щодо неправильних форм: переплисти (не *перепливти), доплисти, обплисти — основа змінюється з плив- на плис- у деяких префіксальних формах. 6-8 контекстних прикладів."
  - section: "Авіаційна та морська лексика"
    words: 800
    points:
      - "Лексика аеропорту: аеропорт, термінал, рейс, посадковий талон, реєстрація на рейс, зал очікування, злітна смуга, посадка, зліт, пересадка, прямий рейс, стикувальний рейс. Приклад: Рейс на Відень вилітає о п'ятнадцятій двадцять."
      - "Морська лексика: порт, причал, пристань, пором, корабель, човен, яхта, палуба, каюта, капітан, матрос, берег, острів, затока. Приклад: Пором відплив від причалу і поплив до острова."
      - "Практичні діалоги: В аеропорту: реєстрація, посадка, оголошення. У порту: купівля квитка на пором, запитання про відправлення. 6-8 прикладів діалогів природною українською мовою."
  - section: "Переносні значення: час летить, думки пливуть"
    words: 550
    points:
      - "Короткий анонс модуль №35 (переносне значення руху): летіти в переносному значенні = рухатися дуже швидко: Час летить! Дні летять! пливти в переносному значенні = рухатися плавно/повільно: Хмари пливуть. Мелодія пливе. Ці переносні значення настільки поширені, що учні будуть постійно з ними стикатися. модуль №35 розглядає це детально."
      - "Короткі контрастні приклади: Літак летить (пряме — літак перебуває в польоті). Час летить (переносне — час минає швидко). Корабель пливе (пряме — корабель іде по воді). Думки пливуть (переносне — думки плинуть плавно)."
      - "Українські фразеологізми та сталі вирази з летіти/пливти: Гроші летять (гроші швидко зникають). Все пливе перед очима (все розмите/крутиться). Пливти за течією (йти за обставинами). Це високочастотні вирази, з якими учні зустрінуться в повсякденній українській мові. Порівняння з англійськими еквівалентами для демонстрації того, де метафори збігаються, а де різняться."
      - "Практика: учні сортують 10-12 речень на категорії прямого і переносного значення, потім пояснюють переносне значення в кожному випадку. Розширення: написати 3-4 оригінальних речення, використовуючи летіти або пливти в переносному значенні в контексті власного життя — Мої канікули летять! Дні до іспиту пливуть повільно."
  - section: "Підсумок: повітряний та водний рух"
    words: 300
    points:
      - "Повна таблиця: летіти/літати та пливти/плавати з усіма 10 префіксами. Усі базові пари тепер опановано: іти/ходити, їхати/їздити, бігти/бігати, нести/носити, вести/водити, везти/возити, летіти/літати, пливти/плавати."
      - "Анонс модуль №35: Час іде, дощ іде — переносні значення ВСІХ дієслів руху. Система прямого значення тепер повністю вивчена; далі йде переносне розширення."
