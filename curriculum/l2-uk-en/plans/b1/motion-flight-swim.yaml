- 'Летіти/літати pair: односпрямований/різноспрямований'
- 'Пливти/плавати pair: односпрямований/різноспрямований'
- All 10 prefixes applied to летіти and пливти
- 'Irregular stems: пливти → переплисти, доплисти (плив- → плис-)'
- Aviation and maritime terminology
register: науково-навчальний
references:
- title: Авраменко Grade 10, p.19
  notes: 'Летіти — багатозначне слово: літак летить (literal), час летить (figurative).'
- title: Вашуленко Grade 2, p.80
  notes: Iде катер → Пливе катер — early distinction of motion verb polysemy.
- title: Авраменко Grade 7, p.74
  notes: Літаєш (I дієвідміна) vs полетять (II дієвідміна) — conjugation class.
