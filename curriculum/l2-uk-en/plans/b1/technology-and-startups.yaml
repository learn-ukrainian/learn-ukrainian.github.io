module: b1-78
level: B1
sequence: 78
slug: technology-and-startups
version: '2.0'
title: Технології та стартапи
subtitle: Ukraine's Tech Industry and Startup Ecosystem
content_outline:
- section: Вступ та історія українського IT (Introduction and History of Ukrainian
    IT)
  words: 600
  points:
  - 'Еволюція галузі: від радянських ЕОМ (Київський інститут кібернетики) до незалежності
    та статусу глобального хабу аутсорсингу.'
  - 'Термінологічна база та рід іменників: правильне вживання слова «комп''ютер» (чоловічий
    рід) та базові поняття індустрії.'
- section: Українські єдинороги та історії успіху (Ukrainian Unicorns and Success
    Stories)
  words: 1000
  points:
  - 'Кейс Grammarly: історія заснування Максимом Литвином та Олексієм Шевченком у
    2009 році; шлях від стартапу до статусу «декакорна» ($13B+).'
  - 'GitLab та Дмитро Запорожець: історія першої версії коду, написаної в Харкові,
    та розвиток глобальної компанії з моделлю all-remote.'
  - 'Ajax Systems: український лідер у виробництві систем безпеки; поєднання локального
    R&D центру в Києві зі світовими амбіціями.'
- section: Дія — держава в смартфоні (Diia — State in a Smartphone)
  words: 800
  points:
  - 'Цифрова трансформація України: концепція «держава у смартфоні» та світове лідерство
    у прирівнюванні цифрових паспортів до паперових (2021).'
  - 'Лексичний фокус: вживання терміна «застосунок» (mobile app) як офіційної назви
    замість кальки «додаток» або англіцизму «аплікація».'
- section: Словотворення та назви професій (Word Formation and Profession Names)
  words: 800
  points:
  - 'Дотримання Державного стандарту (§4.3.3): утворення назв діячів за допомогою
    суфіксів -ник (розробник, тестувальник) та -іст (програміст).'
  - 'Дотримання Державного стандарту (§4.3.4): утворення віддієслівних іменників для
    опису процесів (програмування, кодування, тестування).'
- section: Практика та типові помилки (Practice and Common Errors)
  words: 400
  points:
  - 'Аналіз аспектів дієслова: розрізнення тривалого процесу («писав код цілий день»)
    та завершеного результату («написав новий застосунок»).'
  - 'Відмінювання запозичень: правильне вживання слова «стартап» у відмінкових формах
    (наприклад, місцевий відмінок: «працювати в стартапі»).'
- section: 'Підсумок: Технології під час війни та майбутнє (Summary: Tech during War
    and the Future)'
  words: 400
  points:
  - 'IT-фронт: роль волонтерських технологічних проектів, кіберзахисту та підтримки
    економіки України в умовах повномасштабної війни.'
  - 'Перспективи: Україна як інтелектуальний центр Європи та розвиток напрямків штучного
    інтелекту та MilTech.'
vocabulary_hints:
  required:
  - стартап (startup) — заснувати стартап, інвестувати в стартап; висока частотність
    у медіа
  - програміст (programmer) — працювати програмістом; утворено за допомогою суфікса
    -іст
  - розробник (developer) — розробник програмного забезпечення; утворено за допомогою
    суфікса -ник
  - застосунок (app) — мобільний застосунок; рекомендований термін замість кальки
    «додаток»
  - інвестиція (investment) — залучати інвестиції (to raise investment); ключове слово
    для бізнес-контексту
  - технологія (technology) — інноваційна технологія; базова назва галузі
  - інновація (innovation) — впроваджувати інновації; частотне слово у сфері модернізації
  recommended:
  - єдиноріг (unicorn) — український стартап-єдиноріг (компанія вартістю понад $1
    млрд)
  - програмування (programming) — займатися програмуванням; віддієслівний іменник
    на позначення процесу
  - завантажити (to download/install) — завантажити застосунок; основна дія в контексті
    ПЗ
  - штучний інтелект (artificial intelligence) — розвиток штучного інтелекту; сучасний
    тренд
  - кіберзахист (cybersecurity) — сфера кіберзахисту; актуально в контексті IT та
    війни
