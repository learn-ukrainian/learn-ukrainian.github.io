module: b1-39
level: B1
sequence: 39
slug: reported-statements
version: '2.0'
title: 'Непряма мова: твердження'
subtitle: Reported Statements
content_outline:
- section: Тест
  points:
  - Diagnostic quiz on reported speech — focus on identifying direct vs indirect speech
    structures
  - Self-assessment questions
- section: Пояснення
  points:
  - 'Direct vs indirect speech — cultural hook: Oral History (Усна історія) and the
    concept of «Люди кажуть» as a shared truth'
  - 'Basic Reported Statements (Він сказав, що...) — learner error: Missing mandatory
    conjunction «що»'
  - 'Tense Changes — content writing note: use Time Travel metaphor (Ukrainian keeps
    the original tense frozen); learner error: applying English Tense Backshift'
  - 'Pronoun and Reference Changes — learner error: failing to shift 1st person pronouns
    to 3rd person'
  - 'Reporting Verbs (сказати, розповісти, стверджувати) — distinguish register: сказати
    (neutral) vs заявити (formal/assertive)'
- section: Практика
  points:
  - Transform direct to indirect
  - 'Use various reporting verbs — content writing note: ensure variety beyond just
    «сказати» (e.g., відповісти, пояснити)'
- section: Діалоги
  points:
  - Reported speech in conversation
  - 'Storytelling scenarios — cultural hook: Citation Culture (Як казав Шевченко...)'
vocabulary_hints:
  required:
  - непряма мова (indirect speech)
  - пряма мова (direct speech)
  - сказати (to say) — сказати правду, сказати «так», як то кажуть
  - розповісти (to tell) — розповісти історію, розповісти про себе
  - твердження (statement)
  - що (that - conjunction)
  - стверджувати (to claim) — стверджувати, що; вчені стверджують
  - повідомити (to report) — повідомити новину, повідомити про зміни
  recommended:
  - заявити (to declare) — офіційно заявити, заявити про наміри
  - пояснити (to explain)
  - зазначити (to note)
  - підтвердити (to confirm)
  - говорити (to speak) — говорити про, говорити, що...
  - додати (to add) — додати, що...
activity_hints:
- type: fill-in
  focus: Direct to indirect conversion
  items: 25
- type: fill-in
  focus: Complete reported statements
  items: 20
- type: error-correction
  focus: Fix reported speech errors
