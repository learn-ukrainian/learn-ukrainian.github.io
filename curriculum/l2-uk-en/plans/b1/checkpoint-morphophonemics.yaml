module: b1-023
level: B1
sequence: 23
slug: checkpoint-morphophonemics
version: '3.1.3'
title: "Контрольна робота 1"
subtitle: "Базовий рівень та морфонеміка — перевірка модулі №1–12"
focus: review
pedagogy: PPP
phase: "B1.1 [Морфонеміка]"
word_target: 4000
objectives:
  - "Вміти правильно використовувати всі три форми майбутнього часу, минулий і теперішній час, а також доречно обирати вид (доконаний/недоконаний)."
  - "Навчитися описувати зовнішність, характер і стосунки людини, використовуючи портретну лексику."
  - "Вміти розпізнавати та відтворювати чергування голосних у контексті: [о/е] → [і] (рік-року), [о/е] → нуль (учень-учня)."
  - "Вміти розпізнавати та відтворювати чергування приголосних в іменниках та дієсловах: [г]→[ж], [к]→[ч], [х]→[ш], [д]→[дж]."
  - "Навчитися застосовувати правила спрощення приголосних: тижня (а не *тиждня), щасливий (а не *щастливий), чесний (а не *честний)."
  - "Вміти відмінювати іменники мішаної групи (сторожем, а не *сторожом), іменники III відміни (ніччю, радістю) та іменники pluralia tantum (грошей, воріт)."
  - "Вміти використовувати медичну лексику з правильним керуванням відмінками та врахуванням морфонеміки (скаржитися на біль, лікуватися від застуди)."
dialogue_situations:
  - setting: 'Граматична вікторина на українському телебаченні — учасники відповідають на запитання про чергування та відмінювання іменників: Як буде ''стіл'' у місцевому? На столі! Утворіть множину від ''око''. Очі! А ''сіль'' — якого роду?'
    speakers:
      - Ведучий вікторини
      - Учасники
    motivation: 'Закріплення: чергування голосних/приголосних, підкласи іменників, pluralia tantum'
content_outline:
  - section: "Огляд базових часів та лексики"
    words: 550
    points:
      - 'Огляд минулого, теперішнього та майбутнього часів: визначення часу та виду в контексті. Практика: вибір між доконаним та недоконаним видом на основі завершеної чи тривалої дії.'
      - 'Огляд лексики портрета та стосунків: ідентифікація рис характеру та зовнішності. Практика: доповнення описів людей та їхніх взаємин.'
  - section: "Огляд чергувань"
    words: 550
    points:
      - 'Огляд чергування голосних: [о/е] → [і] в закритому складі: рік — року, ніч — ночі, кінь — коня, піч — печі, осінь — осені. Правило: коли склад закривається (відкритий → закритий), [о/е] переходить в [і]. [о/е] → нуль (випадні голосні): учень — учня, пісок — піску, вітер — вітру. Практика: визначення правильної моделі.'
      - 'Огляд чергування приголосних: В іменниках: [г]→[ж] (друг-друже), [к]→[ч] (козак-козаче), [г/к/х]→[з''/ц''/с''] (Ольга-Ользі, рука-руці, горох-у горосі). У дієсловах: [д]→[дж] (сидіти-сиджу), [с]→[ш] (писати-пишу), [к]→[ч] (плакати-плачу), [т]→[ч] (хотіти-хочу). Практика: утворити форму з чергуванням від основи.'
      - 'Огляд спрощення: Групи приголосних спрощуються у вимові та на письмі: тиждень — тижня (жд→ж), щастя — щасливий (ст→с), честь — чесний (ст→с), серце — сердечний (рц→рд). Мнемоніка: "зайвий" приголосний випадає при додаванні суфікса. Діагностика: який приголосний випадає і чому?'
  - section: "Огляд підкласів іменників"
    words: 550
    points:
      - 'Мішана група: Ідентифікація: основа закінчується на шиплячий (ж, ч, ш, щ). Ключове правило: орудний відмінок однини -ем (не -ом): ножем, сторожем, товаришем. Кличний: -е для безсуфіксних (стороже), -у для суфіксних (слухачу). Орудний множини: -ами (переходить у тверду групу: товаришами). Практика: від поданого іменника мішаної групи утворити всі відмінки.'
      - 'III відміна: Ідентифікація: жіночий рід + нульове закінчення (+ мати). Ключове правило: подвоєння в орудному відмінку після одного кінцевого приголосного: ніч → ніччю, сіль → сіллю, річ → річчю. Без подвоєння після збігу приголосних або б/п/в/м/ф/р: радістю, кров''ю, матір''ю. Паралельні закінчення -і/-и в родовому: радості/радости, любові/любови.'
      - 'Pluralia tantum: Ідентифікація: немає форми однини (двері, гроші, ножиці, ліки, Карпати). Відсутність класифікації за відмінами. Родовий: -ів (окулярів), -ей (грошей), нульове (воріт). Специфічне закінчення -ми в орудному відмінку: грішми, ворітьми. Узгодження: завжди множина (великі двері, ліки закінчилися).'
  - section: "Медична лексика та морфонеміка"
    words: 500
    points:
      - 'Інтегрована вправа: медична лексика як середовище для перевірки граматики Фаз 1-2. Спільнокореневі слова з чергуванням: біль — болить — безболісний (і→о), здоров''я — здоровий — оздоровлення (апостроф + словотвір), лікар — лікувати — лікування — ліки (назва діяча + дієслово + pl. tantum). Повторення керування відмінками: скаржитися на + Зн., хворіти на + Зн., лікуватися від + Р., одужати від + Р.'
      - 'Чергування в назвах частин тіла як повторення морфонеміки: ніс — носа (і→о), вухо — у вусі (х→с), око — в оці (к→ц). III відміна в медицині: кров — крові — кров''ю (без подвоєння, губний), мазь — маззю (подвоєння після одного приголосного). Pluralia tantum в медицині: ліки, краплі.'
      - 'Розуміння прочитаного: український текст про візит до лікаря, який природно включає чергування, форми підкласів іменників та медичну лексику. Відповіді на запитання для перевірки граматики: "У якому відмінку вжито слово ліків?", "Яке чергування відбувається у слові болить?"'
  - section: "Комплексні вправи: чергування"
    words: 500
    points:
      - 'Вправа 1 — Визначення чергування голосних: Для поданих пар (рік-року, ніч-ночі, учень-учня, кінь-коня) визначити тип: [о/е]→[і], [о/е]→нуль, або без чергування. З пастками: деякі пари не мають чергування (стіл-столу? Ні, стіл-столу має: і→о).'
      - 'Вправа 2 — Утворення чергування приголосних: За основою: друг (кличний) → ? (друже). сидіти (1 особа) → ? (сиджу). рука (місцевий) → ? (на руці). Змішані іменникові та дієслівні чергування для перевірки засвоєння.'
      - 'Вправа 3 — Визначення спрощення: Знайти, де відбулося спрощення: тиждень → тижня (жд→ж), щастя → щасливий (ст→с), серце → сердечний (рц→рд? Насправді рц→рд це історичне чергування, а не спрощення — це запитання-пастка). Учні повинні відрізняти спрощення від інших змін.'
  - section: "Комплексні вправи: відмінювання"
    words: 500
    points:
      - 'Вправа 4 — Відмінювання мішаної групи: Провідміняти в контексті: "Я бачив (сторож) біля (ворота)." → Я бачив сторожа біля воріт. "Ми розмовляли з (товариш) про (подорож)." → Ми розмовляли з товаришем про подорож. Перевіряє взаємодію з іншими відмінами.'
      - 'Вправа 5 — III відміна орудний відмінок: Утворити орудний відмінок: ніч → ніччю, кров → кров''ю, радість → радістю, подорож → подорожжю, мати → матір''ю, сіль → сіллю. Застосування правила подвоєння.'
      - 'Вправа 6 — Pluralia tantum у контексті: Заповнити правильну форму: "У мене немає (гроші)." → грошей. "Зачиніть (двері)." → двері (Зн. = Н. для неістот). "Ми поїхали на (канікули) до (Карпати)." → на канікули до Карпат.'
  - section: "Діалог-синтез"
    words: 500
    points:
      - 'Розширений діалог українською, що об''єднує граматику Фаз 1-2: Розмова між друзями про здоров''я, подорож до Карпат і щоденне життя. Діалог природно включає: — чергування (болить, ночі, сиджу, на руці), — мішану групу (ножем, товаришу), — III відміну (з радістю, любов''ю, вночі), — pluralia tantum (гроші, ліки, двері, канікули), — медичну лексику (лікар, рецепт, аптека).'
      - 'Запитання для розуміння: — Знайдіть у діалозі іменники мішаної групи. — У якому відмінку вжито слово "сторожем"? — Яке чергування голосних бачите у слові "болить"? — Чому "ліки" не належать до жодної відміни? — Утворіть орудний відмінок: ніч, товариш, радість.'
      - 'Контрольний список самооцінювання українською: Я можу: визначити тип чергування ✓/✗, правильно відміняти іменники мішаної групи ✓/✗, утворити орудний III відміни (з подвоєнням/без) ✓/✗, визначити pluralia tantum і вжити їх у правильній формі ✓/✗, вести діалог у лікаря з правильним керуванням ✓/✗.'
  - section: "Підсумок та перехід до Фази 3"
    words: 350
    points:
      - 'Підсумок Фаз 1-2: 1. Чергування голосних: [о/е]→[і], [о/е]→нуль. 2. Чергування приголосних в іменниках та дієсловах. 3. Спрощення приголосних. 4. Підкласи іменників: мішана група, III відміна, pluralia tantum. 5. Медичне спілкування з морфонемікою.'
      - 'Огляд Фази 3: Знання з морфонеміки та словотвору з Фаз 1-2 переходять безпосередньо в морфологію дієслова. Умовний спосіб, наказовий спосіб, зворотні дієслова, пасивний стан. Морфонеміка буде з''являтися й надалі: дієслівні чергування розширяться на умовний та наказовий способи.'
vocabulary_hints:
  required:
    - "чергування (alternation — sound change in related word forms)"
    - "спрощення (simplification — consonant cluster reduction)"
    - "мішана група (mixed group — nouns with шиплячий stem ending)"
    - "відміна (declension type — I through IV)"
    - "подвоєння (doubling — in орудний of III відміна)"
    - "однина (singular number)"
    - "множина (plural number)"
    - "відмінок (grammatical case)"
    - "орудний відмінок (instrumental case)"
    - "родовий відмінок (genitive case)"
    - "здоров'я (health)"
    - "біль (pain — чергування і→о: болить)"
    - "ліки (medicine — pluralia tantum)"
    - "лікар (doctor — II відміна, -ар suffix)"
    - "скаржитися (to complain — на + Зн.)"
  recommended:
    - "нульове закінчення (zero ending)"
    - "шиплячий (hissing consonant)"
    - "губний (labial consonant — б, п, в, м, ф)"
    - "закритий склад (closed syllable)"
    - "відкритий склад (open syllable)"
    - "сонорний (sonorant consonant)"
    - "кличний відмінок (vocative case)"
    - "рецепт (prescription)"
    - "діагноз (diagnosis)"
    - "температура (temperature)"
activity_hints:
  - type: quiz
    focus: 'Визначте тип чергування у поданих парах слів (голосних/приголосних/спрощення).'
    items: 10
  - type: fill-in
    focus: 'Провідміняйте іменники мішаної групи, III відміни та pluralia tantum у реченнях.'
    items: 10
  - type: error-correction
    focus: 'Виправте помилки в морфонеміці та відмінюванні (*сторожом, *радіссттю, *один двері).'
    items: 8
  - type: match-up
    focus: 'З''єднайте початкові форми з чергованими формами.'
    items: 10
  - type: group-sort
    focus: 'Відсортуйте іменники за підкласами: мішана група / III відміна / pluralia tantum / звичайні.'
    items: 12
  - type: reading-comprehension
    focus: 'Прочитайте медичний діалог і дайте відповіді на граматичні запитання (відмінки, чергування).'
    items: 6
