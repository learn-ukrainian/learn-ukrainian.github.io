module: b1-013
level: B1
sequence: 13
slug: checkpoint-morphophonemics
version: '3.0'
title: "Контрольна робота 2"
subtitle: "Базовий рівень та морфонеміка — перевірка M01-M12"
focus: review
pedagogy: PPP
phase: "B1.1 [Baselines & Morphophonemics]"
word_target: 4000
objectives:
  - Learner can correctly use all three future tense forms, past and present 
    tenses, and choose appropriate aspect (доконаний/недоконаний).
  - Learner can describe a person's appearance, character, and relationships 
    using портретна лексика.
  - "Learner can identify and produce чергування голосних in context: [о/е] → [і]
    (рік-року), [о/е] → zero (учень-учня)"
  - "Learner can identify and produce чергування приголосних in both noun and verb
    contexts: [г]→[ж], [к]→[ч], [х]→[ш], [д]→[дж]"
  - "Learner can apply спрощення приголосних rules: тижня (not *тиждня), щасливий
    (not *щастливий), чесний (not *честний)"
  - "Learner can decline мішана група nouns (сторожем, not *сторожом), III відміна
    nouns (ніччю, радістю), and pluralia tantum nouns (грошей, воріт)"
  - "Learner can use medical vocabulary with correct case government and morphophonemic
    awareness (скаржитися на біль, лікуватися від застуди)"
dialogue_situations:
  - setting: 'Grammar quiz show on Ukrainian television — contestants answer questions
      about alternations and noun declensions: Як буде ''стіл'' у місцевому? На столі!
      Утворіть множину від ''око''. Очі! А ''сіль'' — якого роду?'
    speakers:
      - Ведучий вікторини (quiz host)
      - Учасники
    motivation: 'Consolidation: vowel/consonant alternation, noun subclasses, pluralia
      tantum'
content_outline:
  - section: Огляд базових часів та лексики (M01-M03)
    words: 600
    points:
      - 'Review of past, present, and future tenses from M01-M02: identifying tense
        and aspect in context. Practice: choosing between доконаний/недоконаний based
        on completion vs ongoing action.'
      - 'Review of portrait and relationship vocabulary from M03: identifying character
        and appearance traits. Practice: completing descriptions of people and their
        relationships.'
  - section: "Огляд чергувань"
    words: 650
    points:
      - "Review of vowel alternations from M04: [о/е] → [і] in закритий склад: рік
        — року, ніч — ночі, кінь — коня, піч — печі, осінь — осені. The rule: when
        a syllable closes (open → closed), [о/е] becomes [і]. [о/е] → zero (fleeting
        vowels): учень — учня, пісок — піску, вітер — вітру. Practice identifying
        which pattern applies."
      - "Review of consonant alternations from M05-M06: In nouns: [г]→[ж] (друг-друже),
        [к]→[ч] (козак-козаче), [г/к/х]→[з'/ц'/с'] (Ольга-Ользі, рука-руці, горох-у
        горосі). In verbs: [д]→[дж] (сидіти-сиджу), [с]→[ш] (писати-пишу), [к]→[ч]
        (плакати-плачу), [т]→[ч] (хотіти-хочу). Practice: given a base form, produce
        the alternated form."
      - "Review of спрощення from M07: Consonant clusters simplify in pronunciation
        and spelling: тиждень — тижня (жд→ж), щастя — щасливий (ст→с), честь — чесний
        (ст→с), серце — сердечний (рц→рд). Mnemonic: the 'extra' consonant drops when
        a suffix is added. Diagnostic: which consonant drops and why?"
  - section: "Огляд підкласів іменників"
    words: 650
    points:
      - "Мішана група (M09): Identification: stem ends in шиплячий (ж, ч, ш, щ). Key
        rule: орудний однини -ем (not -ом): ножем, сторожем, товаришем. Кличний: -е
        for безсуфіксні (стороже), -у for суфіксні (слухачу). Plural орудний: -ами
        (shifts to тверда pattern: товаришами). Diagnostic practice: given a мішана
        група noun, produce all відмінки."
      - "III відміна (M10): Identification: жіночий рід + нульове закінчення (+ мати).
        Key rule: подвоєння in орудний if single final consonant: ніч → ніччю, сіль
        → сіллю, річ → річчю. No подвоєння if cluster or б/п/в/м/ф/р: радістю, кров'ю,
        матір'ю. Parallel -і/-и in родовий: радості/радости, любові/любови."
      - "Pluralia tantum (M11): Identification: no однина form (двері, гроші, ножиці,
        ліки, Карпати). No відміна classification possible. Родовий: -ів (окулярів),
        -ей (грошей), нульове (воріт). Special -ми in орудний: грішми, ворітьми (Ukrainian-specific).
        Agreement: always plural (великі двері, ліки закінчилися)."
  - section: "Медична лексика та морфонеміка"
    words: 550
    points:
      - "Integration exercise: medical vocabulary as a testbed for all Phases 1-2
        grammar. Word families with alternations: біль — болить — безболісний (і→о),
        здоров'я — здоровий — оздоровлення (апостроф + word formation), лікар — лікувати
        — лікування — ліки (agent noun + verb + pl. tantum). Case government review:
        скаржитися на + Зн., хворіти на + Зн., лікуватися від + Р., одужати від +
        Р."
      - "Body part alternations as morphophonemic review: ніс — носа (і→о), вухо —
        у вусі (х→с alternation from M09), око — в оці (к→ц alternation from M09).
        III відміна in medicine: кров — крові — кров'ю (no подвоєння, губний), мазь
        — маззю (подвоєння after single consonant). Pluralia tantum in medicine: ліки,
        краплі."
      - "Reading comprehension: a Ukrainian text about a visit to the doctor that
        naturally includes чергування, noun subclass forms, and medical vocabulary.
        Learners answer questions that test grammar, not content recall (per rule
        10a): 'У якому відмінку вжито слово ліків?', 'Яке чергування відбувається
        у слові болить?'"
  - section: "Комплексні вправи: чергування"
    words: 550
    points:
      - "Exercise block 1 — Vowel alternation identification: Given pairs (рік-року,
        ніч-ночі, учень-учня, кінь-коня), learners identify the type: [о/е]→[і], [о/е]→zero,
        or none. Mixed with трaps: деякі пари не мають чергування (стіл-столу? Ні,
        стіл-столу має: і→о)."
      - "Exercise block 2 — Consonant alternation production: Given the base: друг
        (кличний) → ? (друже). сидіти (1st person) → ? (сиджу). рука (місцевий) →
        ? (на руці). Mixed noun and verb alternations to test transfer across word
        classes."
      - "Exercise block 3 — Спрощення identification: Given word pairs, identify where
        спрощення occurred: тиждень → тижня (жд→ж), щастя → щасливий (ст→с), серце
        → сердечний (рц→рд? Actually рц→рд is NOT спрощення, it is historical alternation
        — this is a trap question). Learners must distinguish спрощення from other
        changes."
  - section: "Комплексні вправи: відмінювання"
    words: 600
    points:
      - "Exercise block 4 — Мішана група declension: Decline in context: 'Я бачив
        (сторож) біля (ворота).' → Я бачив сторожа біля воріт. 'Ми розмовляли з (товариш)
        про (подорож).' → Ми розмовляли з товаришем про подорож. Tests both мішана
        група and interaction with other відміни."
      - "Exercise block 5 — III відміна орудний: Form the орудний: ніч → ніччю, кров
        → кров'ю, радість → радістю, подорож → подорожжю, мати → матір'ю, сіль → сіллю.
        Learners must apply the подвоєння vs no-подвоєння rule correctly."
      - "Exercise block 6 — Pluralia tantum in context: Fill in the correct form:
        'У мене немає (гроші).' → грошей. 'Зачиніть (двері).' → двері (Зн. = Н. for
        inanimate). 'Ми поїхали на (канікули) до (Карпати).' → на канікули до Карпат.
        Tests родовий, знахідний, and preposition usage."
  - section: "Діалог-синтез"
    words: 600
    points:
      - "Extended dialogue in Ukrainian combining all Phases 1-2 grammar: A conversation
        between friends about health, travel to Карпати, and daily life. The dialogue
        naturally includes: — чергування (болить, ночі, сиджу, на руці), — мішана
        група (ножем, товаришу), — III відміна (з радістю, любов'ю, вночі), — pluralia
        tantum (гроші, ліки, двері, канікули), — medical vocabulary (лікар, рецепт,
        аптека)."
      - "Comprehension questions that test LANGUAGE, not content: — Знайдіть у діалозі
        іменники мішаної групи. — У якому відмінку вжито слово 'сторожем'? — Яке чергування
        голосних бачите у слові 'болить'? — Чому 'ліки' не належать до жодної відміни?
        — Утворіть орудний відмінок: ніч, товариш, радість."
      - "Self-assessment checklist in Ukrainian: Я можу: визначити тип чергування
        ✓/✗, правильно відміняти іменники мішаної групи ✓/✗, утворити орудний III
        відміни (подвоєння/без) ✓/✗, визначити pluralia tantum і вжити їх у правильній
        формі ✓/✗, вести діалог у лікаря з правильним керуванням ✓/✗."
  - section: "Підсумок та перехід до Фази 3"
    words: 400
    points:
      - "Phases 1-2 summary — what the learner has mastered: 1. Чергування голосних:
        [о/е]→[і], [о/е]→zero (M04). 2. Чергування приголосних: in nouns (M09) and
        verbs (M10). 3. Спрощення приголосних (M07). 4. Noun subclasses: -ар/-яр/-ин
        (M12), мішана група (M09), III відміна (M10), pluralia tantum (M11). 5. Medical
        communication with morphophonemic integration (M12)."
      - "Preview of Phase 3 — Verbs: The alternation and word-formation knowledge
        from Phases 1-2 feeds directly into verb morphology. Conditionals (якщо/якби),
        imperative nuances (хай/нехай), reflexive verbs (-ся/-сь), passive voice.
        Morphophonemics will continue appearing: дієслівні чергування already seen
        in M10 will expand to conditional and imperative forms."
vocabulary_hints:
  required:
    - "чергування (alternation — sound change in related word forms)"
    - "спрощення (simplification — consonant cluster reduction)"
    - "мішана група (mixed group — nouns with шиплячий stem ending)"
    - "відміна (declension type — I through IV)"
    - "подвоєння (doubling — in орудний of III відміна)"
    - "однина (singular number)"
    - "множина (plural number)"
    - "відмінок (grammatical case)"
    - "орудний відмінок (instrumental case)"
    - "родовий відмінок (genitive case)"
    - "здоров'я (health)"
    - "біль (pain — чергування і→о: болить)"
    - "ліки (medicine — pluralia tantum)"
    - "лікар (doctor — II відміна, -ар suffix)"
    - "скаржитися (to complain — на + Зн.)"
  recommended:
    - "нульове закінчення (zero ending)"
    - "шиплячий (hissing consonant)"
    - "губний (labial consonant — б, п, в, м, ф)"
    - "закритий склад (closed syllable)"
    - "відкритий склад (open syllable)"
    - "сонорний (sonorant consonant)"
    - "кличний відмінок (vocative case)"
    - "рецепт (prescription)"
    - "діагноз (diagnosis)"
    - "температура (temperature)"
activity_hints:
  - type: quiz
    focus: "Identify the type of alternation in given word pairs (чергування голосних/приголосних/спрощення)"
    items: 10
  - type: fill-in
    focus: "Decline мішана група, III відміна, and pluralia tantum nouns in sentence
      context"
    items: 10
  - type: error-correction
    focus: "Fix morphophonemic and declension errors (*сторожом, *радіссттю, *один
      двері)"
    items: 8
  - type: match-up
    focus: "Match base forms to alternated forms across M01-M07 patterns"
    items: 10
  - type: group-sort
    focus: "Sort nouns by subclass: мішана група / III відміна / pluralia tantum /
      regular"
    items: 12
  - type: reading-comprehension
    focus: "Read a medical dialogue and answer grammar-focused questions (відмінок
      identification, чергування)"
    items: 6
