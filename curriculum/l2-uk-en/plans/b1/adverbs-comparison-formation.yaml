module: b1-046
level: B1
sequence: 46
slug: adverbs-comparison-formation
version: '3.1.2'
title: "Ступені порівняння та творення прислівників"
subtitle: "Як прислівники утворюються і порівнюються в українській мові"
focus: grammar
pedagogy: PPP
phase: "B1.4 [Порівняння та словотворення]"
word_target: 4000
objectives:
  - 'Здобувач навчиться утворювати прислівники від прикметників за допомогою суфіксів -о, -е, -и (швидкий-швидко, гарячий-гаряче, по-дружньому, по-українськи)'
  - 'Здобувач навчиться утворювати просту форму вищого ступеня порівняння прислівників за допомогою суфіксів -іш(е), -ш(е) (швидше, тихіше), враховуючи чергування приголосних (дорого-дорожче)'
  - 'Здобувач навчиться утворювати просту форму найвищого ступеня за допомогою префікса най- + вищий ступінь (найшвидше, найтихіше), а також підсилені форми (якнайшвидше, щонайкраще)'
  - 'Здобувач навчиться утворювати складені форми вищого та найвищого ступенів прислівників (більш весело, найбільш цікаво) і знатиме, коли їх вживати'
  - 'Здобувач навчиться розрізняти основні способи творення прислівників: суфіксальний, префіксальний, суфіксально-префіксальний, складання'
dialogue_situations:
  - setting: 'Біговий клуб у Київському парку Шевченка — порівняння результатів: Ти бігаєш швидше за мене! Він тренується найчастіше. Вона стрибає вище. Ми прийшли раніше за всіх.'
    speakers:
      - Тренер
      - Бігуни
    motivation: 'Ступені порівняння прислівників: швидше, найчастіше, вище, раніше — творення і вживання'
content_outline:
  - section: "Як утворюються прислівники?"
    words: 800
    points:
      - 'Основні моделі творення за Литвіновою (7 клас, с.143): 1. Суфіксальний: від прикметників за допомогою суфіксів -о, -е: швидкий → швидко, тихий → тихо, гарячий → гаряче. 2. Префіксально-суфіксальний: по- + прикметник + -ому/-ськи/-и: по-доброму, по-українськи, по-козацьки, по-новому. 3. Від іменників: зранку (ранок), вночі (ніч), додому (дім). 4. Складання: мимоволі, самохіть, праворуч.'
      - 'Контекст Державного стандарту §4.3.7: утворення прислівників від прикметників за допомогою суфіксів -о, -е (добре, гарно) є базовою компетенцією рівня B1. Здобувачі повинні розпізнавати цю модель і вільно утворювати прислівники від будь-якого якісного прикметника.'
      - 'Правила правопису для прислівників із часткою по-: по-українськи, по-братерськи, по-доброму, по-новому — завжди пишуться через дефіс. Але: помалу, потроху, позавчора — пишуться разом (це префіксальні утворення, а не модель по-...-ому). Правило за Правописом 2019: по- з прислівниками на -ому, -ему, -ськи, -зьки, -цьки пишеться через дефіс.'
      - 'Практика: утворити прислівники від 15 прикметників та визначити спосіб творення. Деякі прикметники мають кілька форм прислівників: добрий → добре (суф.) / по-доброму (преф.-суф.). Обговорити, як змінюється значення між формами.'
  - section: "Ступені порівняння прислівників"
    words: 850
    points:
      - 'Ступені порівняння можуть утворювати ЛИШЕ прислівники на -о, -е, утворені від якісних прикметників (Заболотний, 7 клас, с.151). Не можуть: прислівники з префіксами пре-, над-, за-, супер- (превисоко, надшвидко — вони вже виражають найвищу міру).'
      - 'Проста форма вищого ступеня за Литвіновою (7 клас, с.141): суфікс -іш(е): тихо-тихіше, повільно-повільніше. суфікс -ш(е): швидко-швидше, довго-довше. З чергуванням приголосних: дорого-дорожче ([г]+[ш]=[жч]), вузько-вужче, високо-вище ([с]+[ш]=[шч]).'
      - 'Проста форма найвищого ступеня: префікс най- + вищий ступінь. найтихіше, найшвидше, найдорожче. Підсилені форми: щонайшвидше, якнайтихіше.'
      - 'Складені форми (Заболотний, 8 клас, с.28): Вищий ступінь: більш/менш + прислівник (більш весело, менш часто). Найвищий ступінь: найбільш/найменш + прислівник (найбільш весело). Помилка: *більш веселіше — НІКОЛИ не поєднуйте.'
      - 'Систематична вправа: надати 12 прислівників; здобувачі мають утворити всі чотири форми (проста порівняльна, складена порівняльна, проста найвища, складена найвища), зазначаючи ті, де відбувається чергування приголосних.'
  - section: "Прислівник проти прикметника: паралельні форми"
    words: 600
    points:
      - 'Критична відмінність: форми вищого ступеня прикметників закінчуються на -ший (-ша, -ше, -ші), форми вищого ступеня прислівників закінчуються на -ше (-іше, -че). тихіший (прикм., відмінюється) проти тихіше (присл., незмінний). Вона тихіша за нього (прикм.). Вона говорить тихіше за нього (присл.).'
      - 'Суплетивні форми прислівників (повторення з b1-040): добре → краще → найкраще, погано → гірше → найгірше, багато → більше → найбільше, мало → менше → найменше.'
      - 'Практика: речення, у яких здобувачі повинні обрати форму порівняння прикметника або прислівника. Розрізняти означення до іменника та обставину до дієслова.'
  - section: "Прислівники без ступенів порівняння"
    words: 400
    points:
      - 'За Заболотним (7 клас, с.151): Прислівники з префіксами пре-, над-, за-, супер- (превисоко, надшвидко). Прислівники способу дії, утворені не від якісних прикметників (пішки, навмисно). Прислівники часу і місця (вчора, тут, завжди). Прислівники, утворені за допомогою по-...-ськи (по-українськи).'
      - 'Практика: розподілити список із 15 прислівників на "утворюють ступені порівняння" та "не утворюють ступенів порівняння", пояснюючи причину.'
  - section: "Прислівники в контексті"
    words: 700
    points:
      - 'Практика читання: спортивний коментар або репортаж зі змагань із широким використанням ступенів порівняння прислівників. "Спортсменка пробігла швидше за суперницю. Вона стрибнула найвище серед усіх учасниць. Тренувалася найбільше."'
      - 'Практика діалогу: двоє друзів порівнюють, як вони щось роблять — "Хто швидше читає? Хто краще готує? Хто найчастіше подорожує?" Використання чим... тим... із прислівниками: Чим більше читаєш, тим краще пишеш.'
      - 'Самоперевірка: утворити всі форми ступенів порівняння для 8 прислівників, зокрема принаймні 2 суплетивні форми та 2 із чергуванням приголосних.'
  - section: "Типові помилки з прислівниками"
    words: 200
    points:
      - 'Каталог помилок за Авраменком (7 клас, с.140): 1. *більш швидше (змішування форм). 2. *по українськи (пропущений дефіс). 3. *самий добре (русизм — правильно: найкраще). 4. *тихо → *тихше (неправильний суфікс — правильно: тихіше). 5. Плутання -ше (прислівник) із -ший (прикметник): *Він біжить швидший.'
      - 'Діагностична вправа: 8 речень із помилками у вживанні прислівників. Здобувачі знаходять і виправляють кожну, класифікуючи за типом помилки.'
  - section: "Підсумок"
    words: 450
    points:
      - 'Довідкова таблиця: порівняння прикметників та прислівників поруч (формат Заболотного, 8 клас, с.28). Способи творення: суфіксальний, преф.-суф., складання. Порівняння: проста (-іше/-ше), складена (більш/менш), найвища (най-).'
      - 'Підсумкове дерево рішень: Слово описує дієслово/прикметник/прислівник? → використовувати форму прислівника (-ше/-іше). Описує іменник? → використовувати форму прикметника (-ший). Візуальна схема паралельних шляхів.'
      - 'Анонс: словотворення — наступні модулі досліджують, як українська мова утворює нові прикметники (b1-042) та іменники (b1-043) з наявних слів. Засвоєні тут способи творення (суфіксальний, префіксальний) застосовуються до всіх частин мови.'
vocabulary_hints:
  required:
    - "прислівник (adverb — invariable part of speech)"
    - "творення (formation — the process of creating new words)"
    - "суфіксальний (suffixal — formed by adding a suffix)"
    - "префіксальний (prefixal — formed by adding a prefix)"
    - "суфіксально-префіксальний (prefixal-suffixal — formed by both)"
    - "складання (compounding — joining two stems)"
    - "незмінний (invariable — does not decline or conjugate)"
    - "швидше (faster — adverb comparative of швидко)"
    - "тихіше (more quietly — adverb comparative of тихо)"
  recommended:
    - "якісний прикметник (qualitative adjective — source for comparable adverbs)"
    - "по-українськи (in the Ukrainian way — prefixal-suffixal adverb)"
    - "мимоволі (involuntarily — compound adverb)"
    - "самохіть (of one's own will — compound adverb)"
    - "праворуч (to the right — compound adverb)"
    - "помалу (slowly, gradually — prefixed adverb, no hyphen)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про те, як утворюються прислівники, і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Ступені порівняння прислівників».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему утворення прислівників.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему ступенів порівняння прислівників.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Як утворюються прислівники?».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Ступені порівняння прислівників» з їхніми визначеннями.'
