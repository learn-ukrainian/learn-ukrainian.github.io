  - 'Ступені порівняння прислівників: проста (-іше/-ше), складена (більш/менш)'
  - 'Найвищий ступінь: най- + порівняльна форма; підсилена: що-/як-'
  - 'Чергування: дорого-дорожче, високо-вище, вузько-вужче'
  - 'Прислівник проти прикметника: тихіше (присл.) проти тихіший (прикм.)'
