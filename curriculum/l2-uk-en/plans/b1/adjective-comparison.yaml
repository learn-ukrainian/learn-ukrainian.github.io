module: b1-060
level: B1
sequence: 60
slug: adjective-comparison
version: '3.0'
title: 'Ступені порівняння прикметників'
subtitle: 'Adjective Comparison: Comparative & Superlative'
focus: grammar
pedagogy: PPP
phase: B1.7 [Word Formation and Lexicology]
word_target: 4000
objectives:
- Learner can form synthetic comparative adjectives using -ший and superlatives using най-
- Learner can form analytic comparatives with більш/менш and superlatives with найбільш/найменш
- Learner can use irregular comparison forms correctly (кращий, гірший, менший, більший)
- Learner can choose between synthetic and analytic comparison based on register and adjective type
content_outline:
- section: 'Вступ: Порівняння в українській мові (Introduction: Comparison in Ukrainian)'
  words: 400
  points:
  - 'Why comparison matters: expressing preferences, evaluations, and rankings in everyday communication'
  - 'Three degrees: звичайний (positive), вищий (comparative), найвищий (superlative) — the full system overview'
  - 'Preview: synthetic forms dominate in speech, analytic forms serve formal/academic registers'
- section: Вищий ступінь порівняння (Comparative Degree)
  words: 900
  points:
  - 'Synthetic formation: adjective stem + -ший/-іший — сильний→сильніший, розумний→розумніший, високий→вищий'
  - 'Stem alternations in comparatives: г→ж (дорогий→дорожчий), к→ч (легкий→легший), ск→щ (вузький→вужчий)'
  - 'Analytic formation: більш/менш + positive — більш детальний, менш важливий — used with relational and compound adjectives'
  - 'When to use which: synthetic for qualitative adjectives (кращий), analytic for relational/compound (більш сільськогосподарський)'
  - 'Comparison constructions: за + accusative (старший за мене) and ніж + nominative (старший, ніж я) — both patterns with
    examples'
- section: Найвищий ступінь порівняння (Superlative Degree)
  words: 800
  points:
  - 'Synthetic formation: най- + comparative — найсильніший, найрозумніший, найкращий'
  - 'Analytic formation: найбільш/найменш + positive — найбільш детальний, найменш важливий'
  - 'Emphatic superlative: якнай-/щонай- + comparative — якнайшвидший (as fast as possible), щонайменший (the very least)'
  - 'Usage patterns: найкращий друг, найбільше місто — superlatives in attributive and predicative positions'
  - 'Learner error: double marking *найбільш найкращий — only one superlative marker allowed'
- section: Неправильні форми порівняння (Irregular Comparison Forms)
  words: 800
  points:
  - 'Core irregulars: добрий→кращий/ліпший→найкращий/найліпший, поганий→гірший→найгірший'
  - 'Size irregulars: великий→більший→найбільший, малий→менший→найменший'
  - 'Other irregulars: гарний→кращий/гарніший (both acceptable), високий→вищий, низький→нижчий'
  - 'кращий vs ліпший: both mean "better" — кращий is standard/neutral, ліпший is western/literary variant'
  - 'Suppletive vs regular: why these forms replaced the expected *добріший — historical explanation'
  - 'Drill: memorize the 10 most common irregular comparatives as a closed set'
- section: 'Порівняння у контексті: стиль і прагматика (Comparison in Context: Style and Pragmatics)'
  words: 600
  points:
  - 'Register differences: synthetic (conversational) vs analytic (formal/academic) — Це кращий варіант vs Це більш оптимальний
    варіант'
  - 'Comparison in advertising and media: найкращий, найсмачніший — superlative inflation in Ukrainian marketing'
  - 'Hedging with comparatives: трохи кращий, значно гірший — degree modifiers with comparatives'
  - 'Common collocations: кращий за все, гірше за все, більше того, тим більше'
- section: 'Практика: Порівняння в дії (Practice: Comparison in Action)'
  words: 500
  points:
  - 'Formation drills: given positive form, produce comparative and superlative (both synthetic and analytic)'
  - 'Error correction: fix common comparison mistakes (double marking, wrong stem alternation)'
  - 'Contextual choice: select synthetic vs analytic form based on register and adjective type'
  - 'Creative practice: compare cities, people, or objects using full range of comparison forms'
vocabulary_hints:
  required:
  - ступінь порівняння (degree of comparison) — вищий/найвищий ступінь; core grammatical term
  - вищий (comparative) — вищий ступінь порівняння; comparative degree
  - найвищий (superlative) — найвищий ступінь порівняння; superlative degree
  - кращий (better) — неправильна форма від добрий; irregular comparative
  - гірший (worse) — неправильна форма від поганий; irregular comparative
  recommended:
  - більший (bigger) — неправильна форма від великий
  - менший (smaller) — неправильна форма від малий
  - ліпший (better — variant) — західноукраїнський/літературний варіант
  - якнайкращий (the best possible) — емфатичний найвищий ступінь
  - більш (more — analytic) — більш детальний; analytic comparative marker
activity_hints:
- type: fill-in
  focus: Form comparative and superlative from positive adjectives
  items: 15
- type: error-correction
  focus: Fix comparison form errors (double marking, wrong alternation, incorrect irregular)
  items: 10
- type: quiz
  focus: Choose between synthetic and analytic comparison based on context
  items: 10
- type: match-up
  focus: Match positive → comparative → superlative for irregular adjectives
  items: 12
prerequisites:
- 'b1-58 (Word Formation: Modifiers)'
connects_to:
- 'b1-61 (Synonymy: Thinking Verbs)'
grammar:
- Synthetic comparative (-ший/-іший) with stem alternations
- Analytic comparative (більш/менш + positive)
- Synthetic superlative (най- + comparative)
- Analytic superlative (найбільш/найменш + positive)
- Emphatic superlative (якнай-/щонай-)
- Irregular comparison forms (кращий, гірший, більший, менший)
register: нейтральний
references: []
