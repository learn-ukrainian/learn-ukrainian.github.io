module: b1-084
level: B1
sequence: 84
slug: regions-east
version: '2.0'
title: 'Українські регіони: Схід'
subtitle: Eastern Ukraine - Industrial Heritage and Academic Excellence
focus: culture
pedagogy: CBI
phase: B1.7 [Contemporary Ukraine]
word_target: 4000
objectives:
- Learner can discuss Eastern Ukraine's industrial heritage and academic centers
- Learner can understand authentic texts about Kharkiv, Slobozhanshchyna, and Donbas
- Learner can use regional vocabulary to describe Eastern Ukrainian culture and identity
- Learner can compare Eastern Ukrainian traditions with other regions
content_outline:
- section: 'Вступ (Introduction: The Industrial and Intellectual Core)'
  words: 600
  points:
  - Географія та ландшафт східних областей України (Харківська, Донецька, Луганська) відповідно до Державного стандарту §3.13.
  - 'Трансформація від дикого степу до потужних індустріальних мегаполісів: баланс природи та індустрії.'
  - Визначення понять 'східний регіон' та 'східні області' як нейтральних географічних термінів.
- section: 'Харків: Місто студентів, науки та архітектури (Kharkiv: City of Students, Science, and Architecture)'
  words: 900
  points:
  - 'Харків як радянська столиця (1919–1934): історичний контекст, архітектурний ансамбль Держпрому та розвиток конструктивізму.'
  - 'Харківський національний університет імені В. Н. Каразіна (заснований 1804): статус найстарішого освітнього центру та
    ''студентської столиці''.'
  - 'Інтелектуальний та культурний осередок: будинок ''Слово'', сучасний IT-сектор та літературні традиції міста.'
  - Сучасний Харків як символ незламності та стійкості під постійними обстрілами.
- section: Історія Слобожанщини та Донбасу (History of Slobozhanshchyna and Donbas)
  words: 1000
  points:
  - 'Слобожанщина: етимологія слова ''слобода'' (свобода від податків) та історія заселення козацькими полками (Харківський,
    Сумський, Ізюмський).'
  - 'Європейське коріння Донбасу: роль британського підприємця Джона Юза (Юзівка/Донецьк) у заснуванні промислового центру
    в 1869 році.'
  - 'Робітнича культура та ідентичність: формування особливого характеру регіону через важку працю та індустріальну спадщину.'
  - Спростування радянських міфів про ізольований розвиток Сходу; наголос на його органічному зв'язку з рештою України.
- section: Мовна практика та типові помилки (Language Practice and Common Errors)
  words: 800
  points:
  - 'Прийменникове керування: виправлення помилки ''в Донбасі'' (калька) на нормативне ''на Донбасі'' (відповідно до назв
    регіонів).'
  - 'Граматика власних назв: родовий відмінок назви міста — ''Харкова'' (не ''Харківа'') через чергування голосних і/о.'
  - 'Словникова робота: вживання термінів ''промисловість'' (важка/легка), ''галузь'' та ''спадщина'' у професійному та культурному
    контекстах.'
  - Дискусія про національну та мовну ідентичність мешканців Сходу в умовах деколонізації.
- section: 'Підсумок: Стійкість та єдність Сходу (Summary: Resilience and Unity of the East)'
  words: 700
  points:
  - 'Схід — це невід''ємна частина України: спільні традиції, звичаї та свята відповідно до стандарту §3.15.'
  - Концепція стійкості (resilience) як ключова характеристика сучасного українського Сходу.
  - 'Майбутнє регіону: відновлення, деокупація та збереження культурної спадщини.'
vocabulary_hints:
  required:
  - 'Харків (Kharkiv) — родовий відмінок: Харкова; перша столиця УРСР, студентське місто'
  - Слобожанщина (Slobozhanshchyna) — походить від 'слобода' (пільга); земля вільних козаків
  - 'Донбас (Donbas) — прийменник: на Донбасі; індустріальне серце країни'
  - 'промисловість (industry) — колок.: важка/легка промисловість, провідна галузь; висока частотність'
  - 'спадщина (heritage) — колок.: культурна, історична, нематеріальна спадщина; збереження спадщини'
  - 'університет (university) — академічне середовище, вища освіта; приклад: університет Каразіна'
  - 'ідентичність (identity) — колок.: національна, мовна ідентичність; формування ідентичності'
  - 'регіон (region) — колок.: східний регіон, індустріальний регіон; географічне поняття'
  recommended:
  - академічний (academic) — академічний центр, академічна спільнота; стосується вищої освіти
  - робітничий (working-class) — робітнича династія, робітнича культура; коріння Донбасу
  - переселенці (displaced persons) — люди, що змушені були змінити місце проживання через війну
  - стійкість (resilience) — символ стійкості, проявляти стійкість; ключове слово сучасних медіа
  - слобода (sloboda) — історичне поселення з пільгами; етимологічний зв'язок зі словом 'свобода'
  - 'Держпром (Derzhprom) — скорочення: Будинок державної промисловості; пам''ятка конструктивізму'
