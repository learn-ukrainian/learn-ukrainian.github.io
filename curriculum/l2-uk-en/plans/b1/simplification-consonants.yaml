module: b1-017
level: B1
sequence: 17
slug: simplification-consonants
version: '3.1.2'
title: 'Спрощення приголосних'
subtitle: 'Щастя — щасливий: коли приголосний випадає'
focus: grammar
pedagogy: PPP
phase: 'B1.1 [Морфонологія]'
word_target: 4000
objectives:
  - 'Вміти ідентифікувати спрощення приголосних в українських словах та пояснювати, ЧОМУ випадає приголосний: збіг трьох приголосних спрощується до двох для легкості вимови (милозвучність)'
  - 'Вміти застосовувати правила правопису для спрощення, яке закріплене на письмі: тижневий (не *тижденевий), щасливий (не *щастливий), корисний (не *користний)'
  - 'Вміти визначати винятки, коли спрощення відбувається у вимові, але НЕ на письмі: шістнадцять, зап''ястний, контрастний'
  - 'Вміти розрізняти спрощення та чергування: спрощення = приголосний ВИПАДАЄ; чергування = приголосний ЗМІНЮЄТЬСЯ'
dialogue_situations:
  - setting: 'Диктант у класі у Дніпрі — вчитель читає слова вголос, а студенти обговорюють, які літери зникають: серце, тижневий, чесний, щасливий.'
    speakers:
      - Вчитель
      - Студенти
    motivation: 'Спрощення приголосних: серДце→серце, чесТний→чесний, щасТливий→щасливий'
content_outline:
  - section: 'Що таке спрощення?'
    words: 600
    points:
      - 'Зв''язок із M08-M10: учні вже розуміють чергування — звуки, що ЗМІНЮЮТЬСЯ на інші. Спрощення — це інше: звук повністю ЗНИКАЄ зі збігу приголосних. Литвінова (5 клас, с.180): «Одним із засобів милозвучності української мови є спрощення приголосних. Якщо в процесі словотворення виникає група з трьох приголосних, один із них може випадати».'
      - 'Демонстрація з підручника Литвінової (5 клас, с.180, вправа 296): проїЗД + Н = проїЗДНий -> проїзний. Звук [д] випадає, оскільки збіг [здн] незручно вимовляти. Українська мова віддає перевагу збігам із двох приголосних перед трьома.'
      - 'Ключова відмінність: чергування = звук А стає звуком Б; спрощення = звук А зникає. Обидва явища — морфонологічні, але працюють по-різному. чергування: друг -> друже ([г] -> [ж]); спрощення: щастя -> щасливий ([т] випадає).'
  - section: 'Спрощення, закріплене на письмі'
    words: 850
    points:
      - 'Повна таблиця за підручником Заболотного (5 клас, с.110): [ждн] -> [жн]: тиждень — тижневий. [здн] -> [зн]: проїзд — проїзний, виїзд — виїзний. [стл] -> [сл]: щастя — щасливий, лестощі — улесливий. [стн] -> [сн]: радість — радісний, якість — якісний, честь — чесний, користь — корисний, вість — вісник. [скн] -> [сн]: бризки — бризнути, тиск — тиснути. [слн] -> [сн]: масло — масний.'
      - 'З підручника Литвінової (5 клас, с.181): додаткові приклади, згруповані за типом збігу. Наголос: у цих словах спрощений приголосний НЕ пишеться. Ви пишете "тижневий", а не *"тиждневий". Написання відображає вимову.'
      - 'Як розпізнати спрощення на практиці: Якщо у похідному слові ніби "не вистачає" приголосного порівняно з основою, це, ймовірно, спрощення. Основа: тиждень (є [д]). Похідне: тижневий (немає [д]). Основа: щастя (є [т]). Похідне: щасливий (немає [т]). Практика: учні знаходять "зниклий" приголосний у 10+ парах слів.'
      - 'Авраменко (5 клас, с.109): орфограма «спрощення в групах приголосних» — учні вчаться розпізнавати це як конкретну орфограму, що вимагає знання правил, а не лише запам''ятовування.'
  - section: 'Винятки: спрощення у вимові, але не на письмі'
    words: 650
    points:
      - 'З підручника Заболотного (5 клас, с.110): Група 1 — взагалі немає спрощення (ні у вимові, ні на письмі): пестливий, хвастливий, кістлявий — вимовляємо і пишемо [стл]. Це ВИНЯТКИ з правила [стл]->[сл].'
      - 'Група 2 — спрощення лише у вимові (приголосний пишеться): шістнадцять [шіс:нац'':ат''], зап''ястний [зап''ас:ний], контрастний [контрасний], баластний [баласний]. Авраменко (5 клас, с.109): «У словах "невістці", "шістсот" i подібних літеру "т" пишемо, але звук [т] не вимовляємо».'
      - 'Як запам''ятати, де яке: Винятки, що ЗБЕРІГАЮТЬ літеру на письмі, здебільшого є словами, де базова форма чітко відчувається: шість -> шістнадцять (зв''язок із "шість" очевидний, тому "т" залишається на письмі). Слова, де спрощення ВІДБУВАЄТЬСЯ на письмі, більше віддалилися від своєї бази: щастя -> щасливий (зв''язок відчувається менш прямо).'
  - section: 'Спрощення [сонце], [серце] та інші особливі випадки'
    words: 600
    points:
      - 'Слова, де спрощення є настільки давнім, що його не завжди розпізнають: сонце [сонце] — але чи є "зникле" [л]? (порівняйте: сонячний, але російське "солнце"). серце [серце] — чи є "зникле" [д]? (порівняйте: сердитий, сердечний). Ці етимологічні спрощення вивчаються як орфограми: у "серце" [д] історично випало, але з''являється у спільнокореневих словах.'
      - 'Голуб (5 клас, с.93, вправа 234): зв''язок спрощення з концепцією милозвучності. Учням ставлять запитання: «Чи можна вважати спрощення засобом милозвучності? Чому?» Відповідь: так — українська мова уникає важких збігів приголосних як частини свого фонетичного характеру.'
      - 'Практика: учні працюють з родинами слів, визначаючи, де відбувається спрощення, а де — ні: тиждень: тижневий (спрощення), тижня (біглий голосний з M08), щотижня (спрощення). Кілька морфонологічних процесів в одній родині слів.'
  - section: 'Спрощення у дієслівних формах та прикметниках'
    words: 600
    points:
      - 'Спрощення у творенні прикметників від іменників: якість — якісний ([стн]->[сн]), совість — совісний ([стн]->[сн]), ненависть — ненависний ([стн]->[сн]), область — обласний ([стн]->[сн]). Вони підпорядковуються регулярному патерну [стн]->[сн].'
      - 'Спрощення у дієслівних формах: виїзд — виїзний ([здн]->[зн]), тиск — тиснути ([скн]->[сн]), блиск — блиснути ([скн]->[сн]). Це показує, що спрощення стосується різних частин мови.'
      - 'Зв''язок з попередніми модулями: тепер учень має три морфонологічні інструменти: чергування голосних (M08), чергування приголосних (M09-10) та спрощення (цей модуль). Разом вони пояснюють більшість орфографічних "нерегулярностей" української мови.'
  - section: 'Спрощення vs. чергування: порівняння'
    words: 400
    points:
      - 'Паралельне порівняння: Чергування — Звук А -> Звук Б (друг -> друже), тригер: морфологічний (відмінок, особа), зворотне: так (друже -> друг). Спрощення — Звук А -> нуль (щастя -> щасливий), тригер: збіг 3+ приголосних, зворотне: так (щасливий -> щастя). Обидва явища є регулярними, передбачуваними та важливими для української орфографії.'
      - 'Діагностичний алгоритм для учнів: 1. Чи має похідне слово МЕНШЕ приголосних, ніж основа? → спрощення. 2. Чи має похідне слово ІНШИЙ приголосний? → чергування. 3. Застосування: сонце vs сонячний ("зникле" [л]? спрощення). друг vs друже ([г]→[ж] чергування).'
      - 'Практика: мішані вправи, де учні визначають, ЧИ є дана зміна чергуванням або спрощенням, і ЯКИЙ саме це тип. Це інтегрує знання з M08-M11.'
      - 'Перехресне посилання на реальний текст: уривок з новинної статті або літературного твору, що містить обидва процеси. Учні анотують кожну морфонологічну зміну, позначаючи її як чергування (тип) або спрощення (збіг).'
  - section: 'Підсумок і практика'
    words: 300
    points:
      - 'Короткий довідник: усі патерни спрощення з одним прикладом на кожен. Самоперевірка: Дайте відповіді на запитання: 1. Чому у слові "щасливий" немає літери "т"? 2. Чому у слові "шістнадцять" літера "т" пишеться? 3. Яка різниця між спрощенням і чергуванням? 4. Утворіть прикметники: радість, якість, тиждень.'
      - 'Анонс наступного модуля: Іменники на -ар, -яр, -ин (M12) — перехід від фонетики до морфології, застосування всіх морфонологічних знань до конкретних підкласів іменників.'
vocabulary_hints:
  required:
    - "спрощення (simplification — dropping of a consonant from a cluster)"
    - "група приголосних (consonant cluster — sequence of consonants)"
    - "милозвучність (euphony — pleasant sound quality of speech)"
    - "випадати (to drop out — of a sound disappearing)"
    - "вимова (pronunciation — how words are spoken)"
    - "правопис (orthography — correct spelling)"
    - "закріплений (fixed — reflected in standard spelling)"
    - "виняток (exception — case that does not follow the rule)"
    - "словотворення (word formation — creating new words)"
    - "прикметник (adjective)"
    - "іменник (noun)"
    - "основа (stem — the word minus its ending)"
    - "орфограма (orthographic rule — spelling pattern requiring knowledge)"
    - "морфонологія (morphophonology — sound changes in morphology)"
  recommended:
    - "чергування (alternation — for comparison)"
    - "корінь (root)"
    - "суфікс (suffix)"
    - "прислівник (adverb)"
    - "транскрипція (phonetic transcription)"
    - "відмінювання (declension — changing word forms)"
    - "дієприкметник (participle)"
    - "похідний (derived — formed from another word)"
    - "непохідний (underived — base form)"
activity_hints:
  - type: fill-in
    focus: 'Утворити прикметники або прислівники від іменників, застосовуючи спрощення (наприклад, щастя -> щасл___вий, тиждень -> тижн___вий).'
  - type: quiz
    focus: 'Визначити: чи зберігає, чи втрачає приголосний похідне слово? (наприклад, шість + -надцять = шістнадцять [зберігає] vs. радість + -ний = радісний [втрачає]).'
  - type: group-sort
    focus: 'Розподілити слова на дві групи: спрощення, закріплене на письмі, vs спрощення тільки у вимові.'
  - type: match-up
    focus: 'З''єднати базові слова з їхніми похідними зі спрощенням (наприклад, проїзд <-> проїзний, щастя <-> щасливий).'
  - type: error-correction
    focus: 'Знайти орфографічні помилки: слова, неправильно написані зі збереженим або пропущеним приголосним (наприклад, *щастливий -> щасливий, *радісний -> правильно).'
connects_to:
  - 'b1-008 (Чергування голосних)'
  - 'b1-009 (Чергування приголосних в іменниках)'
  - 'b1-010 (Чергування приголосних у дієсловах)'
  - 'b1-012 (Підкласи іменників чоловічого роду)'
prerequisites:
  - 'Завершення А2 (учень може утворювати базові прикметники та читати збіги приголосних)'
  - 'b1-001 (Метамова: фонетика — приголосний, група приголосних)'
grammar:
  - 'Спрощення, закріплене на письмі: [ждн]->[жн], [здн]->[зн], [стл]->[сл], [стн]->[сн], [скн]->[сн], [слн]->[сн]'
  - 'Винятки: пестливий, хвастливий, кістлявий (без спрощення)'
  - 'Спрощення у вимові, але не на письмі: шістнадцять, зап''ястний, контрастний'
  - 'Розрізнення між спрощенням (звук зникає) та чергуванням (звук змінюється)'
  - 'Застосування в різних частинах мови: іменники, прикметники, дієслова'
register: академічний
references:
  - title: "Заболотний Grade 5, p.109-112"
    notes: 'Спрощення в групах приголосних (розділ 26): повна таблиця, винятки (пестливий, хвастливий, кістлявий), випадки лише у вимові.'
  - title: "Литвінова Grade 5, p.180-183"
    notes: 'Спрощення в групах приголосних: візуальна демонстрація з проїЗДНий, таблиці закріплених та незакріплених спрощень.'
  - title: "Авраменко Grade 5, p.109"
    notes: 'Спрощення в групах приголосних: представлення орфограми, винятки невістці/шістсот, вправи.'
  - title: "Голуб Grade 5, p.93"
    notes: 'Спрощення як засіб милозвучності: концептуальне оформлення, вправа на формування правил на основі таблиці.'
