module: b1-43
level: B1
sequence: 43
slug: adverbial-participles-perfective
version: '2.0'
title: Дієприслівники доконаного виду
subtitle: Adverbial Participles - Perfective (-вши/-ши)
content_outline:
- section: Вступ
  points:
  - 'Perfective vs imperfective participles — learner error: using imperfective -ючи
    for completed actions (e.g., Читаючи vs Прочитавши)'
  - Temporal relationship — completed action occurs BEFORE the main action (попередність)
- section: Теоретичне пояснення
  points:
  - Formation -вши/-ши suffixes — emphasize -вши for vowel stems (overwhelmingly common)
    vs -ши for consonant stems
  - 'Expressing sequence — use timeline visual: dot before main action (прочитавши)
    vs simultaneous line (читаючи)'
  - 'Common perfective participles — examples: прочитавши, написавши, зробивши (High
    Frequency)'
- section: Практика
  points:
  - Form perfective participles — focus on high-frequency verbs first (прочитати,
    написати, зробити)
  - 'Build sequential narratives — cultural hook: Proverb «Далеко сховавши, близько
    не знайдеш» (prudence)'
- section: Діалоги
  points:
  - 'Participles in conversation — learner error: Dangling Participle (subject mismatch
    like «Прийшовши додому, почався дощ»)'
  - 'Real-world usage — context: narrative sequence (прийшовши додому, дізнавшись
    новину)'
- section: Потрібно більше практики?
  points:
  - 'Additional exercises — learner error: Impersonal Sentence Usage (cannot use with
    logical Dative subjects like «мені стало сумно»)'
vocabulary_hints:
  required:
  - доконаний вид (perfective aspect) — contrast with недоконаний
  - попередність (priority/sequence) — grammar term
  - 'прочитавши (having read) — collocations: книгу, листа, уважно'
  - 'написавши (having written) — collocations: заяву, роман'
  - 'зробивши (having done) — collocations: крок, висновок, помилку'
  - 'прийшовши (having arrived) — collocations: додому, до тями, на допомогу'
  - 'побачивши (having seen) — collocations: світло, її, вперше'
  - 'дізнавшись (having learned) — collocations: правду, про трагедію, новину'
  recommended:
  - послідовність (sequence) — logic of events
  - минулий час (past tense) — base form for derivation
  - основа (stem) — grammatical basis
  - закінчення (ending) — morphological part
