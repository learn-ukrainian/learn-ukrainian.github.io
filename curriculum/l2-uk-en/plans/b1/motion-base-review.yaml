register: науково-навчальний
references:
- title: Заболотний Grade 5, p.55
  notes: Prefix diagram with бігти — all prefixes radiating from base verb. Foundation for prefix modules.
- title: Вашуленко Grade 2, p.80
  notes: Iде катер, іде поїзд, іде зима, іде час — early motion verb polysemy.
- title: Караман Grade 10, p.188
  notes: 'Russicism alert: відправлятися vs відбувати/виїжджати — decolonized motion vocabulary.'
- title: Авраменко Grade 7, p.74
  notes: 'Дієвідміна determination for motion verbs: літаєш (I) vs полетять (II).'
