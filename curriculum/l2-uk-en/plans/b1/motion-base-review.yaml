activity_hints:
  - type: quiz
    focus: 'Виберіть односпрямоване чи різноспрямоване дієслово на основі підказок контексту (зараз, щодня, туди-сюди)'
    items: 8
  - type: fill-in
    focus: 'Відміняйте дієслова руху в теперішньому часі, щоб завершити речення'
    items: 8
  - type: match-up
    focus: "З'єднайте односпрямовані дієслова з їхніми різноспрямованими парами"
    items: 8
  - type: group-sort
    focus: 'Відсортуйте форми дієслів руху на односпрямовані та різноспрямовані'
    items: 10
  - type: error-correction
    focus: 'Виправте неправильний вибір дієслова руху в реченнях (ходжу проти іду, їздили проти їхали)'
    items: 6
  - type: free-write
    focus: 'Опишіть рухи вашого типового дня, використовуючи щонайменше 4 різні пари дієслів руху'
    items: 6
