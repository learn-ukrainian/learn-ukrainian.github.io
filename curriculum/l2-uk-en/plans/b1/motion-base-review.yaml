references:
  - title: "Заболотний Grade 5, p.55"
    notes: "Схема префіксів із дієсловом бігти — всі префікси, що відходять від базового дієслова. Основа для модулів про префікси."
  - title: "Вашуленко Grade 2, p.80"
    notes: "Іде катер, іде поїзд, іде зима, іде час — рання багатозначність дієслів руху."
  - title: "Заболотний Grade 7, p.188"
    notes: "Увага до русизмів: відправлятися проти відбувати/виїжджати — деколонізована лексика руху."
  - title: "Авраменко Grade 7, p.74"
    notes: "Визначення дієвідміни для дієслів руху: літаєш (І) проти полетять (ІІ)."
