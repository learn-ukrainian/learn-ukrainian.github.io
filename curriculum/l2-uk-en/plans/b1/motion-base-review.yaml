module: b1-035
level: B1
sequence: 35
slug: motion-base-review
version: '3.0.3'
title: "Рух: іти, їхати, бігти"
subtitle: "Базові пари дієслів руху — односпрямовані та різноспрямовані"
focus: review
pedagogy: PPP
phase: "B1.3 [Всесвіт дієслів руху]"
word_target: 4000
objectives:
  - "Учень вміє пояснювати українську систему парних дієслів руху: односпрямовані (іти, їхати, бігти, нести, вести, везти, летіти, пливти) проти різноспрямованих (ходити, їздити, бігати, носити, водити, возити, літати, плавати)."
  - "Учень вміє вибирати правильне дієслово з кожної пари на основі того, чи є рух одностороннім/у процесі, чи звичним/в обидва боки/у різних напрямках."
  - "Учень вміє безпомилково відмінювати всі базові дієслова руху в теперішньому та минулому часі, включаючи неправильні форми (іду, їду, біжу)."
  - "Учень вміє використовувати базові дієслова руху з правильними прийменниками та відмінками (іти до + Р.в., їхати в/на + Зн.в., бігти через + Зн.в.)."
dialogue_situations:
  - setting: 'Ранок вихідного дня в Києві — пара вирішує, як дістатися: Я йду (on foot) до ринку (m, market). Ти їдеш (by transport) на Поділ? Діти біжать (running) у парк (m). А бабуся їде трамваєм.'
    speakers:
      - Чоловік
      - Дружина
    motivation: 'Пари дієслів руху: іти/ходити, їхати/їздити, бігти/бігати'
content_outline:
  - section: "Світ руху: чому дієслова руху — особлива група?"
    words: 500
    points:
      - "Вступ: Українська мова має багату систему парних дієслів руху, якої не існує в англійській. Там, де англійська використовує «go» майже для всього, українська розрізняє, ЯК ви рухаєтеся (пішки, транспортом, бігом, літаком, у воді), ЧИ це односторонній рух, чи звична дія, а згодом (модулі №29–33) додає префікси, щоб вказати КУДИ саме (прибуття, відправлення, вхід, перетин)."
      - "Основний принцип за Заболотним, 5 клас, с.55 (схема префіксів із дієсловом бігти): одне базове дієслово + різні префікси = різні значення. Але перед префіксами учні повинні опанувати базові безпрефіксні пари."
      - "Читання: день із життя киянина — використання 6+ різних дієслів руху у природному контексті. Учні визначають, які дієслова описують одноразові поїздки, а які — звичні дії."
  - section: "Односпрямовані дієслова: іти, їхати, бігти"
    words: 800
    points:
      - "Іти — рух пішки, в одному напрямку, прямо зараз або в конкретному випадку: Я іду до школи. Вчора я йшов додому і зустрів друга. Повне відмінювання: іду, ідеш, іде, ідемо, ідете, ідуть. Минулий час: йшов, йшла, йшло, йшли."
      - "Їхати — рух транспортом, в одному напрямку, прямо зараз або в конкретному випадку: Ми їдемо до Львова. Поїзд їхав усю ніч. Повне відмінювання: їду, їдеш, їде, їдемо, їдете, їдуть. Минулий час: їхав, їхала, їхало, їхали."
      - "Бігти — біг, в одному напрямку, прямо зараз: Дитина біжить до мами. Спортсмен біг до фінішу. Повне відмінювання: біжу, біжиш, біжить, біжимо, біжите, біжать. Минулий час: біг, бігла, бігло, бігли."
      - "Ключова модель: односпрямовані дієслова описують рух, що відбувається ПРЯМО ЗАРАЗ в ОДНОМУ напрямку, або конкретну одноразову подорож. Вони відповідають на запитання: Куди ти зараз ідеш?"
  - section: "Різноспрямовані дієслова: ходити, їздити, бігати"
    words: 800
    points:
      - "Ходити — рух пішки, звичний/в обидва боки/у різних напрямках: Я ходжу до школи щодня. Він ходить по кімнаті. Ми ходили в театр. Повне відмінювання: ходжу, ходиш, ходить, ходимо, ходите, ходять. Зверніть увагу на чергування: д → дж у 1-й особі (ходити → ходжу)."
      - "Їздити — рух транспортом, звичний/в обидва боки: Вона їздить на роботу автобусом. Влітку ми їздили до моря. Повне відмінювання: їжджу, їздиш, їздить, їздимо, їздите, їздять. Зверніть увагу на чергування: зд → ждж у 1-й особі (їздити → їжджу)."
      - "Бігати — біг, звичний/фізичні вправи/у різних напрямках: Я бігаю щоранку. Діти бігають у дворі. Повне відмінювання: бігаю, бігаєш, бігає, бігаємо, бігаєте, бігають."
      - "Ключова модель: різноспрямовані дієслова описують повторюваний, звичний рух, рух в обидва боки або рух у різних напрямках. Вони відповідають на запитання: Ти часто туди ходиш?"
  - section: "Повний набір: нести/носити, вести/водити, везти/возити"
    words: 700
    points:
      - "Нести (односпрямоване) проти носити (різноспрямоване) — перенесення пішки: Він несе валізу до вокзалу. Вона носить окуляри. Нести: несу, несеш, несе, несемо, несете, несуть. Носити: ношу, носиш, носить, носимо, носите, носять."
      - "Вести (односпрямоване) проти водити (різноспрямоване) — спрямовування/керування: Мати веде дитину до лікаря. Він водить екскурсії по місту. Вести: веду, ведеш, веде, ведемо, ведете, ведуть. Водити: воджу, водиш, водить, водимо, водите, водять."
      - "Везти (односпрямоване) проти возити (різноспрямоване) — транспортування транспортом: Таксі везе нас до аеропорту. Він возить товари по всій країні. Везти: везу, везеш, везе, веземо, везете, везуть. Возити: вожу, возиш, возить, возимо, возите, возять."
  - section: "Прийменники з дієсловами руху"
    words: 600
    points:
      - "Напрямок ДО: іти/їхати до + Р.в. (Іду до школи), в/у + Зн.в. (Їду в місто), на + Зн.в. (Біжу на стадіон). Вибір: до для конкретних місць/людей, в для входження всередину, на для відкритих/названих просторів і подій."
      - "Напрямок ВІД: іти/їхати з/із + Р.в. (Іду з роботи), від + Р.в. (Біжу від собаки). Напрямок ЧЕРЕЗ: іти через + Зн.в. (Іду через парк), їхати повз + Зн.в. (Їдемо повз станцію)."
      - "Зв'язок із просторовими прийменниками модуль №27: прийменники місця описують ДЕ; прийменники напрямку описують КУДИ/ЗВІДКИ. під столом (місце, Ор.в.) → під стіл (напрямок, Зн.в.). за будинком (місце, Ор.в.) → за будинок (напрямок, Зн.в.)."
      - "8-10 практичних речень, що поєднують дієслова руху з прийменниками в реалістичних сценаріях (поїздки, подорожі, щоденні справи)."
  - section: "Практика: односпрямований чи різноспрямований?"
    words: 350
    points:
      - "Алгоритм вибору правильного дієслова: Рух відбувається прямо зараз, в одному напрямку? → Односпрямований. Рух звичний, в обидва боки або в різних напрямках? → Різноспрямований. Практичні приклади з 6-8 сценаріями."
      - "Поширені помилки, яких слід уникати: *Я ходжу до школи зараз (неправильно — якщо ви йдете ПРЯМО ЗАРАЗ, використовуйте іду). Я ходжу до школи щодня (правильно — звична дія). *Вчора ми їхали до Львова і залишилися там (неправильно — якщо ви залишилися, ви поїхали в один кінець, використовуйте поїхали; їздили означає повернення)."
  - section: "Підсумок: система дієслів руху"
    words: 250
    points:
      - "Повна таблиця 8 базових пар: односпрямовані: іти, їхати, бігти, нести, вести, везти, летіти, пливти. різноспрямовані: ходити, їздити, бігати, носити, водити, возити, літати, плавати. З дієсловами летіти/літати та пливти/плавати як анонс для модуля №34."
      - "Анонс модуль №29: Прийти, доїхати — що відбувається, коли ви додаєте префікси до цих базових дієслів. Система префіксів перетворює дієслова руху на точний інструмент для опису того, як, куди і коли саме відбувається рух."
