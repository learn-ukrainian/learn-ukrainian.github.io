module: b1-028
level: B1
sequence: 28
slug: motion-base-review
version: '3.0'
title: 'Рух: іти, їхати, бігти'
subtitle: Базові пари дієслів руху — односпрямовані та різноспрямовані
focus: review
pedagogy: PPP
phase: B1.4 [Motion Verb Universe]
word_target: 4000
objectives:
- 'Learner can explain the Ukrainian system of paired motion verbs: односпрямовані (unidirectional: іти, їхати, бігти, нести,
  вести, везти, летіти, пливти) vs різноспрямовані (multidirectional: ходити, їздити, бігати, носити, водити, возити, літати,
  плавати)'
- Learner can choose the correct verb from each pair based on whether motion is one-way/in-progress or habitual/round-trip/multiple-direction
- Learner can conjugate all base motion verbs in present and past tense without errors, including irregular forms (іду, їду,
  біжу)
- Learner can use base motion verbs with correct prepositions and cases (іти до + Р.в., їхати в/на + Зн.в., бігти через +
  Зн.в.)
content_outline:
- section: 'Світ руху: чому дієслова руху — особлива група? (The world of motion: why motion verbs are special)'
  words: 500
  points:
  - 'Introduction: Ukrainian has a rich system of paired motion verbs that does not exist in English. Where English uses ''go''
    for nearly everything, Ukrainian distinguishes HOW you move (on foot, by vehicle, running, flying, swimming), WHETHER
    it is one-way or habitual, and later (M29-M33) adds prefixes for WHERE exactly (arriving, departing, entering, crossing).'
  - 'The core principle from Заболотний Grade 5 p.55 (prefix diagram with бігти): one base verb + different prefixes = different
    meanings. But before prefixes, learners must master the unprefixed base pairs.'
  - 'Reading passage: a day in the life of a Kyivite — using 6+ different motion verbs in natural context. Learners identify
    which verbs describe one-time journeys vs habitual actions.'
- section: 'Односпрямовані дієслова: іти, їхати, бігти (Unidirectional verbs)'
  words: 800
  points:
  - 'Iти — going on foot, one direction, right now or specific occasion: Я іду до школи (I am walking to school right now).
    Вчора я йшов додому i зустрів друга (I was walking home and met a friend). Full conjugation: іду, ідеш, іде, ідемо, ідете,
    ідуть. Past: йшов, йшла, йшло, йшли.'
  - 'Їхати — going by vehicle, one direction, right now or specific occasion: Ми їдемо до Львова (We are driving/riding to
    Lviv). Поїзд їхав усю ніч (The train traveled all night). Full conjugation: їду, їдеш, їде, їдемо, їдете, їдуть. Past:
    їхав, їхала, їхало, їхали.'
  - 'Бігти — running, one direction, right now: Дитина біжить до мами (The child is running to mom). Спортсмен біг до фінішу
    (The athlete was running to the finish line). Full conjugation: біжу, біжиш, біжить, біжимо, біжите, біжать. Past: біг,
    бігла, бігло, бігли.'
  - 'Key pattern: односпрямовані verbs describe motion happening RIGHT NOW in ONE direction, or a specific single journey.
    They answer: ''Where are you going right now?'' — Куди ти зараз ідеш?'
- section: 'Різноспрямовані дієслова: ходити, їздити, бігати (Multidirectional verbs)'
  words: 800
  points:
  - 'Ходити — going on foot, habitual/round-trip/multiple directions: Я ходжу до школи щодня (I go to school every day — habitual).
    Він ходить по кімнаті (He walks around the room — multiple directions). Ми ходили в театр (We went to the theater — round
    trip, returned). Full conjugation: ходжу, ходиш, ходить, ходимо, ходите, ходять. Note the alternation: д → дж in 1st person
    (ходити → ходжу).'
  - 'Їздити — going by vehicle, habitual/round-trip: Вона їздить на роботу автобусом (She commutes to work by bus). Влітку
    ми їздили до моря (In summer we went to the sea — round trip). Full conjugation: їжджу, їздиш, їздить, їздимо, їздите,
    їздять. Note the alternation: зд → ждж in 1st person (їздити → їжджу).'
  - 'Бігати — running, habitual/exercise/multiple directions: Я бігаю щоранку (I jog every morning — habitual exercise). Діти
    бігають у дворі (Children run around in the yard — multiple directions). Full conjugation: бігаю, бігаєш, бігає, бігаємо,
    бігаєте, бігають.'
  - 'Key pattern: різноспрямовані verbs describe repeated, habitual, round-trip, or multidirectional motion. They answer:
    ''Do you regularly go there?'' — Ти часто туди ходиш?'
- section: 'Повний набір: нести/носити, вести/водити, везти/возити (Complete set: carrying, leading, transporting)'
  words: 700
  points:
  - 'Нести (one-way) vs носити (habitual) — carrying on foot: Він несе валізу до вокзалу (He is carrying a suitcase to the
    station). Вона носить окуляри (She wears glasses — habitual). Нести: несу, несеш, несе, несемо, несете, несуть. Носити:
    ношу, носиш, носить, носимо, носите, носять.'
  - 'Вести (one-way) vs водити (habitual) — leading/guiding: Мати веде дитину до лікаря (Mother is leading the child to the
    doctor). Він водить екскурсії по місту (He leads city tours — habitual). Вести: веду, ведеш, веде, ведемо, ведете, ведуть.
    Водити: воджу, водиш, водить, водимо, водите, водять.'
  - 'Везти (one-way) vs возити (habitual) — transporting by vehicle: Таксі везе нас до аеропорту (The taxi is taking us to
    the airport). Він возить товари по всій країні (He transports goods across the country). Везти: везу, везеш, везе, веземо,
    везете, везуть. Возити: вожу, возиш, возить, возимо, возите, возять.'
- section: Прийменники з дієсловами руху (Prepositions with motion verbs)
  words: 600
  points:
  - 'Direction TO: іти/їхати до + Р.в. (Iду до школи), в/у + Зн.в. (Їду в місто), на + Зн.в. (Біжу на стадіон). Choice: до
    for specific places/people, в for ''into,'' на for open/named places and events.'
  - 'Direction FROM: іти/їхати з/із + Р.в. (Iду з роботи), від + Р.в. (Біжу від собаки). Direction THROUGH: іти через + Зн.в.
    (Iду через парк), їхати повз + Зн.в. (Їдемо повз станцію).'
  - 'Connection to M27 spatial prepositions: prepositions of location describe WHERE; prepositions of direction describe WHERE
    TO/FROM. під столом (location, Ор.в.) → під стіл (direction, Зн.в.). за будинком (location, Ор.в.) → за будинок (direction,
    Зн.в.).'
  - 8-10 practice sentences combining motion verbs with prepositions in realistic scenarios (commuting, traveling, daily errands).
- section: 'Практика: односпрямований чи різноспрямований? (Practice: unidirectional or multidirectional?)'
  words: 350
  points:
  - 'Decision tree for choosing the correct verb: Is the motion happening right now, in one direction? → Односпрямований.
    Is the motion habitual, round-trip, or in many directions? → Різноспрямований. Worked examples with 6-8 scenarios.'
  - 'Common mistakes to avoid: *Я ходжу до школи зараз (wrong — if you are on your way RIGHT NOW, use іду). Я ходжу до школи
    щодня (correct — habitual). *Вчора ми їхали до Львова i залишилися там (wrong — if you stayed, you went one way, use поїхали;
    їздили implies return).'
- section: 'Підсумок: система дієслів руху (Summary: motion verb system)'
  words: 250
  points:
  - 'Complete table of 8 base pairs: односпрямовані: іти, їхати, бігти, нести, вести, везти, летіти, пливти. різноспрямовані:
    ходити, їздити, бігати, носити, водити, возити, літати, плавати. With летіти/літати and пливти/плавати previewing M34.'
  - 'Preview of M29: Прийти, доїхати — what happens when you add prefixes to these base verbs. The prefix system transforms
    motion verbs into a precise tool for describing exactly how, where, and when movement happens.'
vocabulary_hints:
  required:
  - іти (to go on foot — unidirectional)
  - ходити (to go on foot — multidirectional/habitual)
  - їхати (to go by vehicle — unidirectional)
  - їздити (to go by vehicle — multidirectional/habitual)
  - бігти (to run — unidirectional)
  - бігати (to run — multidirectional/habitual)
  - нести (to carry — unidirectional)
  - носити (to carry — multidirectional/habitual)
  - вести (to lead — unidirectional)
  - водити (to lead — multidirectional/habitual)
  - везти (to transport — unidirectional)
  - возити (to transport — multidirectional/habitual)
  - односпрямований (unidirectional — motion in one direction)
  - різноспрямований (multidirectional — motion in various directions)
  recommended:
  - летіти (to fly — unidirectional, preview for M34)
  - літати (to fly — multidirectional, preview for M34)
  - пливти (to swim/sail — unidirectional, preview for M34)
  - плавати (to swim/sail — multidirectional, preview for M34)
  - щодня (every day — adverb for habitual actions)
  - зараз (right now — adverb for current action)
  - валіза (suitcase)
  - пішки (on foot)
activity_hints:
- type: quiz
  focus: Choose односпрямований or різноспрямований verb based on context clues (зараз, щодня, туди-сюди)
  items: 8
- type: fill-in
  focus: Conjugate motion verbs in present tense to complete sentences
  items: 8
- type: match-up
  focus: Match односпрямовані verbs with their різноспрямовані pairs
  items: 8
- type: group-sort
  focus: Sort motion verb forms into односпрямовані / різноспрямовані
  items: 10
- type: error-correction
  focus: Fix incorrect motion verb choices in sentences (ходжу vs іду, їздили vs їхали)
  items: 6
- type: free-write
  focus: Describe your typical day's movements using at least 4 different motion verb pairs
  items: 1
