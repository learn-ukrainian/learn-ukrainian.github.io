module: b1-93
level: B1
sequence: 93
slug: indefinite-negative-pronouns
version: '2.0'
title: Невизначені та заперечні займенники
subtitle: Indefinite & Negative Pronouns
content_outline:
- section: Вступ — Світ невизначеності
  points:
  - Why Ukrainian has three "someone" words — хтось, хто-небудь, дехто each express
    a different shade of indefiniteness
  - State Standard §4.2.1.4 alignment — expanded pronoun system at B1
  - 'Cultural hook: the Ukrainian love of precision — unlike English "someone", Ukrainian
    distinguishes known-but-unspecified (хтось) from truly random (хто-небудь)'
- section: Невизначені займенники з -сь (Known but unspecified)
  points:
  - хтось, щось, якийсь, чийсь, десь, колись, кудись — the speaker knows or assumes
    existence
  - 'Formation: pronoun + -сь (invariable particle)'
  - 'Usage: Хтось подзвонив. (Someone called — I heard the phone.)'
  - 'Declension: хтось declines like хто (когось, комусь, кимось)'
- section: Невизначені займенники з -небудь (Truly indefinite)
  points:
  - хто-небудь, що-небудь, який-небудь, де-небудь, коли-небудь
  - 'Usage: questions, future, hypothetical — Чи хто-небудь бачив мої ключі?'
  - 'Learner error: using -небудь for past events (wrong — use -сь for known existence)'
  - Hyphen spelling rule — always hyphenated
- section: Невизначені займенники з де- (Some, a few)
  points:
  - дехто, дещо, деякий, десь, деколи — partial quantity, "some of many"
  - 'Usage: Дехто вважає, що... (Some people think that...)'
  - 'Contrast: дехто (some people) vs хтось (someone specific but unnamed)'
- section: Заперечні займенники з ні- (Negative pronouns)
  points:
  - ніхто, ніщо, ніякий, нічий, ніде, ніколи, нікуди, ніскільки
  - 'Double negation rule — MANDATORY in Ukrainian: Ніхто не прийшов (Nobody came)'
  - 'Learner error: omitting не with ні- pronouns (English transfer — *Ніхто прийшов)'
  - 'Preposition splits: ні з ким, ні до кого, ні про що — preposition goes between
    ні- and pronoun'
- section: Практика — Контрастні вправи
  points:
  - 'Three-way contrast: хтось vs хто-небудь vs дехто in context'
  - 'Negative vs indefinite: ніхто vs хтось in paired sentences'
  - 'Error correction: common mistakes with double negation and -небудь/-сь confusion'
  - 'Text analysis: find and classify pronouns in authentic Ukrainian text'
- section: Підсумок
  points:
  - Summary table of all indefinite/negative pronoun forms
  - Decision flowchart for choosing the right pronoun
vocabulary_hints:
  required:
  - хтось (someone — known/assumed to exist)
  - хто-небудь (anyone — truly indefinite, in questions/future)
  - дехто (some people — partial from a group)
  - ніхто (nobody) — ніхто не знає, ні з ким
  - щось (something) — щось трапилось
  - що-небудь (anything) — дай мені що-небудь
  - ніщо (nothing) — ніщо не допомагає
  - ніколи (never) — я ніколи не забуду
  recommended:
  - деякий (some, certain) — деякі люди, деякі питання
  - нічий (nobody's) — нічия земля
  - ніде (nowhere) — ніде не можу знайти
  - будь-який (any at all) — будь-яка допомога
activity_hints:
- type: quiz
  focus: Choose correct indefinite pronoun (-сь vs -небудь vs де-)
  items: 15
- type: fill-in
  focus: Complete sentences with negative pronouns + не
  items: 15
- type: error-correction
  focus: Fix double negation and pronoun choice errors
  items: 10
- type: match-up
  focus: Match pronoun to context description
  items: 12
focus: grammar
pedagogy: PPP
prerequisites:
- b1-91 (Feedback, Negotiation & Complaints)
connects_to:
- b1-94 (Phonetics & Assimilation)
- b1-95 (B1 Final Exam)
objectives:
- Learner can distinguish хтось, хто-небудь, and дехто in context
- Learner can form and use negative pronouns with obligatory double negation
- Learner can split negative pronouns with prepositions (ні з ким, ні до кого)
- Learner can choose the correct indefinite pronoun series for the communicative situation
grammar:
- Indefinite pronouns (-сь, -небудь, де-)
- Negative pronouns (ні-) with double negation
- Preposition insertion in negative pronouns
- Declension of indefinite/negative pronouns
register: нейтральний
immersion: 75-100% Ukrainian
phase: B1.9 [Communication Skills]
