  - "b1-028 до b1-035 (усі модулі про дієслова руху)"
  - "b1-027 (Повторення просторових прийменників — просторові прийменники)"
grammar:
  - "Синтез: усі 10 префіксів дієслів руху у зв'язному мовленні про подорожі"
  - "Орудний відмінок з географічними назвами: подорож Україною, їхати Карпатами"
  - "Транспортна лексика та спілкування на вокзалі/в аеропорту"
  - "Вказування напрямку за допомогою дієслів руху та просторових прийменників"
  - "Структура розповіді з використанням дієслів руху"
  - "Деколонізована транспортна лексика: виїжджати, відходити (а не *відправлятися)"
register: науково-навчальний
references:
  - title: "Кравцова 3 клас, с.83"
    notes: "Діалог на автовокзалі: купівля квитків, запитання про маршрути та розклади."
  - title: "Заболотний 7 клас, с.188"
    notes: "Деколонізація: відправлятися → відбувати/виїжджати для відправлення транспорту."
  - title: "Авраменко 8 клас, с.182"
    notes: "Туристична лексика: туристський, узвіз, а також пов'язані з подорожами визначення."
