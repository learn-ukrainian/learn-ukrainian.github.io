module: b1-039
level: B1
sequence: 39
slug: traveling-ukraine
version: '3.0.3'
title: "Подорож Україною"
subtitle: "Подорожні розповіді — транспорт, маршрути, пам'ятки"
focus: communication
pedagogy: PPP
phase: "B1.3 [Всесвіт дієслів руху]"
word_target: 4000
objectives:
  - "Студент вміє планувати та описувати подорож Україною, використовуючи префіксальні дієслова руху, просторові прийменники та транспортну лексику"
  - "Студент вміє орієнтуватися в реальних ситуаціях під час подорожі: купувати квитки, запитувати дорогу, перевіряти розклад, перетинати кордони"
  - "Студент вміє розповідати про подорож у зв'язному мовленні, використовуючи різні дієслова руху з усіма 10 префіксами"
  - "Студент вміє використовувати орудний відмінок з назвами країн та регіонів для позначення маршрутів (Подорож Україною, їхати Закарпаттям)"
dialogue_situations:
  - setting: 'Планування двотижневої автомобільної поїздки Україною — зі Львова через Карпати до Одеси, потім Київ і Харків: Спочатку поїдемо до Львова. Потім заїдемо в Карпати. Доїдемо до Одеси за два дні. Перелетимо до Харкова.'
    speakers:
      - Пара мандрівників
    motivation: 'Синтез подорожі: усі префікси руху з реальними українськими містами та маршрутами'
content_outline:
  - section: "Подорож починається: планування та транспорт"
    words: 750
    points:
      - "Перехід від модулів №27–35: цей модуль є комунікативним підсумком теми дієслів руху. Студенти застосовують УСІ знання про дієслова руху — базові пари, 10 префіксів, переносне значення — до реальних ситуацій подорожей в Україні."
      - "Транспортна лексика: потяг/поїзд, автобус, маршрутка, літак, пором, таксі, метро, тролейбус, трамвай. Купе, плацкарт, сидячий вагон. Квиток, зворотний квиток, разовий квиток. Розклад руху, платформа/перон, зал очікування."
      - "Орудний відмінок із географічними назвами — українська специфіка: подорож Україною (Ор.в.), їхати Закарпаттям, мандрувати Карпатами. Це характерна українська конструкція: орудний відмінок виражає маршрут або територію подорожі. За Кравцовою (3 клас, с. 83): діалог на автовокзалі про купівлю квитків — природний зразок для спілкування під час подорожі."
  - section: "На вокзалі та в аеропорту"
    words: 800
    points:
      - "Діалог на залізничному вокзалі: Купівля квитка: «Скільки коштує квиток до Львова?» «Один квиток у купейний вагон, будь ласка.» «О котрій відходить поїзд?» «Поїзд відходить о двадцять першій.» «З якої платформи?» «З третьої платформи.» Студенти практикують 8-10 реплік."
      - "Діалог в аеропорту: «Де реєстрація на рейс до Відня?» «Ваші речі для здачі в багаж?» «О котрій посадка?» «Посадка починається о чотирнадцятій тридцять.» «Рейс затримується на годину.» Дієслова руху в контексті: виліт, приліт, вилетіти, прилетіти, пересісти."
      - "Примітка щодо деколонізації: обережно використовуйте слова «відходити/відправлятися» для поїздів — природна українська віддає перевагу «відходити» або «виїжджати». Автобус виїжджає (а НЕ *відправляється)."
  - section: "Маршрут: від Києва до Карпат"
    words: 900
    points:
      - "Зразок розповіді про подорож (250-300 слів): подорож з Києва до Карпат поїздом та автобусом з використанням усіх груп префіксів: Виїхали з Києва ввечері (ви-). Поїзд відійшов від перону (від-). Проїхали Вінницю, Хмельницький (про-). Переїхали через міст (пере-). Приїхали до Івано-Франківська вранці (при-). Пересіли на автобус. Доїхали до Яремче (до-). Зайшли до готелю (за-). Вийшли на прогулянку (ви-). Обійшли центр містечка (об-). Підійшли до водоспаду Пробій (під-)."
      - "Українські пам'ятки як місця призначення: Київ (Хрещатик, Софійський собор, Лавра). Львів (площа Ринок, Високий Замок, кав'ярні). Одеса (Потьомкінські сходи, Дерибасівська, море). Карпати (Говерла, Яремче, Буковель). Чернігів, Кам'янець-Подільський, Ужгород."
      - "Студенти бачать, як дієслова руху + просторові прийменники + визначні пам'ятки створюють яскраві українські розповіді про подорожі. 8-10 речень, що моделюють різні маршрути."
  - section: "Орієнтування в місті: як дістатися?"
    words: 750
    points:
      - "Запитування дороги: «Як дістатися до центру?» «Як доїхати до вокзалу?» «Де найближча зупинка метро?» «Скільки їхати до аеропорту?» Вказування дороги: «Пройдіть прямо, поверніть ліворуч, перейдіть дорогу, i побачите музей навпроти.»"
      - "Навігаційна лексика: прямо, ліворуч, праворуч, на розі, на перехресті, повернути, зупинка, станція, квартал, провулок."
      - "Практика: студенти пояснюють дорогу від однієї пам'ятки до іншої, використовуючи дієслова руху та просторові прийменники з модуля №27. 6-8 діалогів-вказівок."
  - section: "Подорожні історії: розповідь про поїздку"
    words: 800
    points:
      - "Модель зв'язного мовлення: повна історія про подорож (200-250 слів) з використанням минулого часу, префіксальних дієслів руху, просторових прийменників та транспортної лексики. Кілька абзаців, що демонструють зв'язність тексту."
      - "Структура історії: Абзац 1: Планування (куди, як, коли). Абзац 2: Подорож (виїхали, проїхали, доїхали). Абзац 3: Місце призначення (прийшли, обійшли, зайшли). Абзац 4: Повернення (поїхали назад, повернулися). Студенти бачать, як дієслова руху створюють структуру розповіді."
      - "Продуктивне завдання: студенти пишуть власну розповідь про реальну або вигадану подорож Україною, використовуючи принаймні 10 різних префіксальних дієслів руху, 5 просторових прийменників і 5 транспортних термінів."
  - section: "Підсумок"
    words: 300
    points:
      - "Опанування дієслів руху: вміння розповідати про складні подорожі з використанням усіх 10 префіксів, транспортної лексики, а також природне називання маршрутів за допомогою орудного відмінка (подорож Україною, мандрувати Карпатами)."
      - "Самоперевірка: Яка різниця між словами «квиток» і «зворотний квиток»? Опишіть короткий маршрут від вокзалу до готелю, використовуючи принаймні 4 різних префіксальних дієслова руху."
      - "Самоперевірка: Як запитати дорогу англійською? Вкажіть дорогу, використовуючи слова «прямо», «ліворуч» та «на розі». Чому для автобуса краще використовувати слово «виїжджає», а не «відправляється»?"
vocabulary_hints:
  required:
    - "подорож (journey/trip)"
    - "мандрівка (travel/journey — slightly more literary)"
    - "подорожувати (to travel)"
    - "мандрувати (to travel/wander)"
    - "квиток (ticket)"
    - "зворотний квиток (return ticket)"
    - "розклад руху (schedule/timetable)"
    - "вокзал (station)"
    - "платформа (platform)"
    - "перон (platform — for trains)"
    - "зупинка (stop — bus/tram)"
    - "маршрут (route)"
    - "пересадка (transfer/connection)"
    - "дістатися (to get to / to reach)"
  recommended:
    - "маршрутка (minibus — common Ukrainian transport)"
    - "купе (compartment — on a train)"
    - "плацкарт (open sleeping car)"
    - "провідник (conductor — on a train)"
    - "пасажир (passenger)"
    - "рейс (route/flight/service)"
    - "затримка (delay)"
    - "пам'ятка (landmark/monument)"
    - "екскурсія (excursion/guided tour)"
    - "готель (hotel)"
    - "хостел (hostel)"
activity_hints:
  - type: quiz
    focus: "Виберіть правильні дієслова руху та прийменники в контекстах подорожі"
    items: 12
  - type: fill-in
    focus: "Доповніть діалоги про подорожі транспортною лексикою та дієсловами руху"
    items: 12
  - type: match-up
    focus: "З'єднайте українські пам'ятки з їхніми містами/регіонами"
    items: 12
  - type: group-sort
    focus: "Розподіліть транспортну лексику: залізничний / автомобільний / повітряний / водний"
    items: 12
  - type: error-correction
    focus: "Виправте росіянізми та кальки у реченнях про подорожі (відправлятися → виїжджати)"
    items: 12
  - type: free-write
    focus: "Напишіть розповідь про поїздку до українського міста з використанням 10+ дієслів руху"
    items: 12
connects_to:
