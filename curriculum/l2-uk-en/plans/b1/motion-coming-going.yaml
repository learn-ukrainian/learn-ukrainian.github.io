module: b1-17
level: B1
sequence: 17
slug: motion-coming-going
version: '2.0'
title: 'Рух: Прибуття та вихід'
subtitle: Motion - Coming & Going
content_outline:
- section: Тест
  points:
  - Prefix diagnostic — focus on confusing *при-* (arrival) and *по-* (departure)
  - Intuition check
- section: Пояснення
  points:
  - при-, ви-, в-/у- prefixes — visualize arrows pointing *into* (в-/у-), *out of*
    (ви-), and *reaching* (при-); align with State Standard §4.3.8
  - 'Arrival, exit, entry patterns — cultural hook: «Зустріч з хлібом-сіллю» for arrival
    and «Посидіти на дорогу» before exit; preposition drill: *в/на* (destination)
    vs *з* (origin)'
- section: Практика
  points:
  - 'Prefix selection exercises — address aspect confusion: *приходив* (process) vs
    *прийшов* (result)'
  - Context practice — emphasize *result achieved* context (being at the destination
    now)
- section: Діалоги
  points:
  - 'Movement dialogues — cultural hook: «На коня» (toast before leaving)'
  - 'Natural prefix usage — include idioms: «вийти заміж» (to marry) or «прийти до
    тями» (to regain senses)'
vocabulary_hints:
  required:
  - прийти/приходити (to arrive on foot) — вчасно, додому, на допомогу
  - приїхати/приїжджати (to arrive by vehicle) — поїздом, в гості, з-за кордону
  - вийти/виходити (to exit on foot) — на вулицю, заміж (idiom)
  - виїхати/виїжджати (to exit by vehicle)
  - увійти/входити (to enter on foot) — в історію, в кімнату
  - в'їхати/в'їжджати (to enter by vehicle)
  - прибуття (arrival)
  - вихід (exit) — запасний вихід, безвихідна ситуація
  - вхід (entrance)
  - напрямок (direction)
  recommended:
  - прибігти/прибігати (to arrive running)
  - вибігти/вибігати (to run out)
  - убігти/убігати (to run in)
  - прилетіти/прилітати (to arrive flying)
  - вилетіти/вилітати (to fly out)
