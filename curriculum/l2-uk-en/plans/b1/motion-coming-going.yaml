content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - 'Setting the pedagogical stage: The conceptual significance of arrival and departure in Ukrainian life, aligning with
    State Standard §4.3.8 requirements.'
  - 'Initial immersion: A short narrative centered on the arrival at a railway station (прибуття), priming the use of ''при-''
    for reaching a destination.'
- section: Тест та діагностика (Diagnostic Test)
  words: 600
  points:
  - 'Prefix diagnostic: Identifying the high-frequency confusion between ''при-'' (arrival) and ''по-'' (departure/start of
    motion), as identified in research on common learner errors.'
  - 'Preposition intuition check: Drill focusing on the destination/origin pairs ''в/на'' vs ''з/із'' to correct the ''приїхати
    з'' (with destination) mismatch error.'
- section: 'Граматична концепція: Префікси при-, ви-, в- (Grammar Concept: Prefixes)'
  words: 1300
  points:
  - 'Visual semantics of prefixes: Detailed explanation of §4.3.8 using arrow diagrams — ''при-'' (reaching a goal/point),
    ''ви-'' (out of a container/space), and ''в-/у-'' (entry into a space).'
  - 'The ''Result'' focus of ''при-'': Explaining why ''Я приїхав'' implies being at the destination now, contrasted with
    the error of using it for ''I set off'' (поїхав).'
  - 'Aspectual nuances: Addressing the ''приходив'' (process/repetition) vs ''прийшов'' (completed result) confusion with
    5 minimal pair examples from everyday scenarios.'
- section: Практика та усунення помилок (Practice & Error Correction)
  words: 900
  points:
  - 'Contextual application: Exercises where learners must choose between ''при-'', ''ви-'', and ''в-'' based on the desired
    physical result (entry vs exit vs arrival).'
  - 'Error correction lab: Targeted drills for the ''приїхати в'' vs ''приїхати з'' preposition mismatch and the ''при-''
    vs ''по-'' lexical confusion.'
  - 'Production task: Hotel Concierge persona simulation managing arrivals (прибуття), guest check-ins (вхід), and departures
    (виїзд).'
- section: Культурний код та ідіоматика (Cultural Code & Idioms)
  words: 800
  points:
  - 'Cultural hooks: Explaining the rituals of ''Посидіти на дорогу'' (for departure) and ''Зустріч з хлібом-сіллю'' (for
    arrival); introducing the ''На коня'' farewell toast.'
  - 'Lexical enrichment: High-frequency idioms including ''вийти заміж'' (to marry), ''прийти до тями'' (to regain senses),
    ''увійти в історію'', and ''вийти з ладу'' (to break down).'
vocabulary_hints:
  required:
  - прийти (to arrive on foot) — High frequency (Top 100); прийти вчасно, прийти додому, прийти до тями (idiom)
  - приїхати (to arrive by vehicle) — приїхати поїздом, приїхати в гості, приїхати з-за кордону
  - вийти (to exit on foot) — High frequency; вийти на вулицю, вийти заміж (idiom), вийти з ладу (idiom), вийти з себе (idiom)
  - виїхати (to exit by vehicle) — виїхати з гаража, виїхати за кордон
  - увійти/зайти (to enter on foot) — High frequency; увійти в історію, увійти в кімнату, увійти в систему (login)
  - в'їхати (to enter by vehicle) — в'їхати в місто, в'їхати в двір
  - прибуття (arrival) — час прибуття, перон прибуття
  - вихід (exit/way out) — High frequency; запасний вихід, вихідний день, безвихідна ситуація
  - вхід (entrance) — вхід вільний, парадний вхід
  recommended:
  - прибігти (to arrive running) — прибігти першим
  - вилетіти (to fly out/be expelled) — вилетіти з голови (idiom), вилетіти з університету
  - прилетіти (to arrive by air) — літак прилетів вчасно
  - напрямок (direction) — в протилежному напрямку
