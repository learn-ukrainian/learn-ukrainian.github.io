module: b1-029
level: B1
sequence: 29
slug: passive-voice-intro
version: '3.0.3'
title: 'Пасивний стан (вступ)'
subtitle: 'Пасивні конструкції через зворотні дієслова та форми на -но/-то'
focus: grammar
pedagogy: PPP
phase: 'B1.2 [Система дієслів]'
word_target: 4000
objectives:
  - 'Учень вміє розпізнавати пасивні конструкції в українській мові та відрізняти їх від активного стану: Робітники будують дім (актив) vs Дім будується робітниками (пасив)'
  - 'Учень вміє утворювати пасивні конструкції за допомогою зворотних дієслів на -ся: будується, читається, продається, передається'
  - 'Учень вміє використовувати унікальні для української мови безособові пасивні форми на -но/-то: Дім збудовано. Книгу прочитано. Роботу виконано.'
  - 'Учень розуміє, що українська мова УНИКАЄ пасивних конструкцій і віддає перевагу активному стану — це ключова стилістична відмінність від англійської'
  - 'Учень вміє перетворювати пасивні речення на активні і навпаки, обираючи більш природний український варіант залежно від контексту'
dialogue_situations:
  - setting: 'Екскурсія щойно відремонтованим Палацом культури (m) у Дніпрі — опис того, що було зроблено: Цей зал (m) був побудований у 1960-х. Стіни (pl) були пофарбовані минулого місяця. Вхід (m) буде відкрито для публіки завтра.'
    speakers:
      - Архітектор
      - Журналіст
    motivation: 'Пасивний стан: був побудований, були пофарбовані, буде відкрито'
content_outline:
  - section: 'Активний і пасивний стан'
    words: 750
    points:
      - 'Ключовий концепт: стан дієслова описує відношення між підметом і дією. Активний стан: підмет виконує дію. Студенти читають книгу. Пасивний стан: підмет зазнає дії. Книга читається студентами. Значення однакове, але фокус зміщується.'
      - 'Українська мова рішуче віддає перевагу активному стану (Заболотний 8 клас, с.95): «Українська мова уникає пасивних конструкцій. Тому перевагу, де це можливо, слід надавати дієсловам активного стану». Це НЕ так, як в англійській, де пасив поширений в академічному письмі. В українській мові надмірний пасив = канцелярит.'
      - 'Коли пасив Є доречним в українській мові: 1. Виконавець невідомий: Місто було засновано у X столітті. 2. Результат важливіший за виконавця: Завдання виконано. 3. Наукові/технічні описи: Елемент було відкрито у 1898 році. 4. Офіційні документи: Закон ухвалено Верховною Радою.'
  - section: 'Пасив через зворотні дієслова'
    words: 700
    points:
      - 'Утворення за Заболотним 8 клас, с.95: «Засобом вираження пасивного стану є формотворчий афікс -ся, що додається до перехідних дієслів: будується, передається, продовжується». Підмет зазнає дії: Добре слово дім будує. (актив) → Поганим словом все руйнується. (пасив із -ся)'
      - 'Вираження виконавця дії орудним відмінком: Книга читається учнями уважно. Рецепт готується нами вправно. Але зверніть увагу: Авраменко 11 клас, с.81 зазначає, що для українськомовних виконавець дії в пасивних конструкціях на -ся часто звучить незграбно: «Речення якої колонки звучать більш природно?» — виграють активні варіанти. Використовуйте активний стан, де це можливо.'
      - 'Відрізнення пасивного -ся від інших зворотних (категорії модуль №22): Він миється. (зворотне — миє себе) Цей товар продається у кожному магазині. (пасивне — його продають) Тест: якщо підмет неістота і не виконує дію над собою, це, ймовірно, пасив.'
      - 'Поширені пасивні дієслова на -ся: будуватися, використовуватися, вважатися, називатися, вироблятися, знаходитися. Зверніть увагу: знаходитися настільки поширене, що його пасивне походження вже забуте.'
  - section: 'Форми на -но/-то: українська спеціальність'
    words: 850
    points:
      - 'За Авраменком 11 клас, с.81: «Синтаксичні конструкції з формами на -но, -то». Усі інгредієнти придбано. Роботу виконано. Книжку прочитано. Двері зачинено.'
      - 'Утворення: основа пасивного дієприкметника + -о: зроблений → зроблено, прочитаний → прочитано, відкритий → відкрито, забутий → забуто. Це БЕЗОСОБОВІ форми — тут немає підмета в називному відмінку. Додаток залишається у знахідному відмінку: Зроблено роботу (а не *робота).'
      - 'Чому це унікально для української мови (Заболотний 8 клас, с.97): «Пасивні конструкції з дієслівними формами на -но, -то в українській мові використовують обмежено» — але вони є БІЛЬШ ПРИРОДНИМИ, ніж пасив на -ся. Це пріоритетний український пасив: Засідання проведено. (природно) vs *Засідання проводиться. (незграбний канцелярит) vs Провели засідання. (актив — також природно).'
      - 'Практика: перетворіть активні речення на пасивні з -но/-то: Учні написали диктант. → Диктант написано. Архітектор спроєктував будівлю. → Будівлю спроєктовано. Зверніть увагу, як зникає виконавець — у цьому й полягає суть.'
  - section: 'Порівняння трьох конструкцій'
    words: 600
    points:
      - 'Три способи сказати те саме: АКТИВ: Робітники збудували дім. ПАСИВ -ся: Дім збудований робітниками. / Дім будувався робітниками. ПАСИВ -но: Дім збудовано. Рейтинг природності в українській мові: Актив > -но/-то > пасив на -ся.'
      - 'Посібник для учнів із прийняття рішень: 1. За замовчуванням: використовуйте АКТИВНИЙ стан. 2. Якщо виконавець невідомий/неважливий: використовуйте -но/-то. 3. Для процесів/станів неістот: -ся є прийнятним (магазин знаходиться, квиток продається). 4. Уникайте пасиву на -ся з явним виконавцем (орудний відмінок) — це звучить неприродно.'
      - 'Контрастна вправа: дано 8-10 речень, оберіть найбільш природний український варіант. Більшість із них мають бути в активному стані або з -но/-то. В одному або двох можна правомірно використати -ся (знаходиться, називається).'
  - section: 'Практика: пасив у контексті'
    words: 750
    points:
      - 'Текст для читання: український репортаж про культурну подію чи будівельний проєкт. Містить природне використання пасиву: Фестиваль проведено у Львові. Новий міст збудовано. Виставку відкрито. Книгу видано. Запитання на розуміння перевіряють МОВУ: — Знайдіть усі конструкції на -но/-то. — Перетворіть їх на активні речення. — Чому автор обрав пасив у цих випадках?'
      - 'Вправи на трансформацію: Актив → -но/-то: Уряд ухвалив закон. → Закон ухвалено. Пасив на -ся → актив: Місто засновувалося козаками. → Козаки заснували місто. -но/-то → актив: Листа надіслано. → Хтось надіслав листа.'
      - 'Продукування: учні пишуть короткий звіт (5-6 речень) про досягнення, використовуючи форми на -но/-то: Проєкт завершено. Результати опубліковано. Звіт подано вчасно. Усі завдання виконано.'
  - section: 'Підсумок та перехід до модуля №24'
    words: 450
    points:
      - 'Підсумок: пасивний стан — підмет зазнає дії. Два способи: -ся (будується) і -но/-то (збудовано). Українська мова віддає перевагу активному стану. -но/-то — суто українська конструкція, більш природна, ніж пасив на -ся. Самоперевірка: Я можу розрізнити активний і пасивний стан ✓/✗, Я можу утворити форму на -но/-то ✓/✗, Я знаю, коли пасив є доречним ✓/✗.'
      - 'Анонс: модуль №24 — Творення дієслів. Як префікси та суфікси утворюють нові дієслова з існуючих: писати → написати → переписати. Це завершує картину утворення дієслів перед комунікативним модулем модуль №25, який застосовує всі ці навички на практиці.'
vocabulary_hints:
  required:
    - пасивний стан (passive voice — subject receives the action)
    - активний стан (active voice — subject performs the action)
    - будуватися (to be built — passive -ся)
    - називатися (to be called — passive -ся, very common)
    - знаходитися (to be located — passive -ся, lexicalized)
    - використовуватися (to be used — passive -ся)
    - збудовано (has been built — -но/-то form)
    - виконано (has been completed — -но/-то form)
    - прочитано (has been read — -но/-то form)
    - ухвалено (has been adopted/passed — -но/-то form, laws)
    - канцелярит (bureaucratese — overuse of passive/nominal style)
    - перехідне дієслово (transitive verb — takes a direct object)
    - неперехідне дієслово (intransitive verb — no direct object)
    - орудний відмінок (instrumental case — agent in passive)
  recommended:
    - вважатися (to be considered)
    - продаватися (to be sold)
    - вироблятися (to be produced)
    - видано (has been published — -но/-то)
    - засновано (has been founded — -но/-то)
    - спроєктовано (has been designed — -но/-то)
    - опубліковано (has been published — -но/-то)
    - надіслано (has been sent — -но/-то)
    - природний (natural — as opposed to forced/awkward)
activity_hints:
  - type: quiz
    focus: 'Визначте стан: активний стан, пасивний -ся, або пасивний -но/-то'
    items: 10
  - type: sentence-builder
    focus: 'Перетворіть активні речення на пасивні на -но/-то та навпаки'
    items: 8
  - type: fill-in
    focus: 'Доповніть речення правильною формою на -но/-то поданого дієслова'
    items: 8
  - type: error-correction
    focus: 'Виправте неприродні пасивні конструкції, переписавши їх в активному стані'
    items: 6
  - type: match-up
    focus: 'З''єднайте активні речення з їхніми еквівалентами на -но/-то'
    items: 8
connects_to:
  - 'b1-022 (Зворотні дієслова — категорія пасивноподібних розширюється тут)'
  - 'b1-024 (Творення дієслів — словотворення дієслів завершує граматику Фази 3)'
  - 'b1-058 (Пасивні дієприкметники — пасив на основі дієприкметників, Фаза 7)'
prerequisites:
  - 'b1-022 (Зворотні дієслова — утворення на -ся та семантичні категорії)'
grammar:
  - 'Активний vs пасивний стан: підмет виконує дію vs зазнає її'
  - 'Пасив через -ся: будується, використовується (від перехідних дієслів)'
  - 'Українські форми на -но/-то: збудовано, виконано, прочитано (безособовий пасив)'
  - 'Утворення на -но/-то: основа пасивного дієприкметника + -о, додаток залишається у Зн.в.'
  - 'Стилістична перевага: актив > -но/-то > пасив на -ся'
  - 'Розрізнення пасивного -ся та зворотного -ся (за контекстом та істотністю)'
register: академічний
references:
  - title: Заболотний Grade 7, §30
    notes: 'Дієслівні форми на -но, -то: творення від пасивних дієприкметників (створений -> створено), значення результату дії.'
  - title: Авраменко Grade 7, §51
    notes: 'Безособові форми на -но, -то. "В українській мові з орудним відмінком виконавця ці форми не вживаємо".'
  - title: Заболотний Grade 7, §30
    notes: 'Пасивні конструкції з дієсловами на -ся. Stylistic preference: Active > -но/-то > -ся passive.'