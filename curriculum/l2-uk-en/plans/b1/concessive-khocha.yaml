module: b1-038
level: B1
sequence: 38
slug: concessive-khocha
version: '2.0'
title: 'Допустові речення: хоча, незважаючи на'
subtitle: Concessive Clauses - Although, Despite
focus: grammar
pedagogy: TTT
phase: B1.3b [Complex Sentences]
word_target: 4000
objectives:
- Learner understands concessive clause constructions
- Learner can express contrast and unexpected outcomes
- Learner can use various concessive connectors
- Learner can distinguish concessive from adversative clauses
content_outline:
- section: Вступ та діагностика (Introduction & Diagnostics)
  words: 600
  points:
  - Diagnostic quiz (Test phase of TTT) on concessive clauses to identify existing knowledge of 'хоча' and 'незважаючи на'
  - 'Hook with the proverb «Хоч бачить око, та зуб не йме»: analysis of the ''tantalus-like'' situation where reality contrasts
    with desire'
  - 'Identification task: scanning high-frequency collocations like ''хоча б'' and ''хоча й'' in a short introductory text
    about a debate'
- section: Граматичні основи та державний стандарт (Grammar Foundations & State Standard)
  words: 1000
  points:
  - 'State Standard §4.4.3 alignment: defining complex sentences with concessive subordinate clauses using ''хоча/хоч'' and
    ''незважаючи на те що'''
  - 'Syntactic distinction: ''хоча'' as a conjunction leading a clause vs. ''незважаючи на'' as a preposition leading a noun
    phrase'
  - 'Formal academic constructions: transition from simple ''але'' (adversative) to the more sophisticated ''хоча... проте''
    (concessive-adversative pair)'
  - 'Structural variations of ''хоча'': exploring ''хоча б'' (at least) and ''хоча й'' (even though) in context of expressing
    minimal requirements'
- section: 'Стилістичні нюанси: попри та дарма що (Stylistic Nuances: Despite & Although)'
  words: 800
  points:
  - Introducing 'попри' as a stylish, medium-frequency media alternative to 'незважаючи на'; drill with 'попри все' and 'попри
    очікування'
  - 'Literary immersion with Lina Kostenko: «Не бійся правди, хоч яка гірка...» — analyzing the use of ''хоч'' as a concessive
    marker for adjectives'
  - 'Register awareness: identifying archaic/literary ''дарма що'' (State Standard §4.4.3) and warning against its use in
    business contexts vs. literature'
  - 'Emphatic concession with ''хоч би'': how to use ''хоч би як'' (no matter how) to add emotional weight to a statement'
- section: 'Практичний практикум: Робота над помилками (Practical Workshop: Error Correction)'
  words: 800
  points:
  - 'Debunking the Russian calque ''не дивлячись на'': drill to replace it with ''незважаючи на'' or ''попри'' (e.g., ''незважаючи
    на дощ'' vs. literal gerund ''не дивлячись у вікно'')'
  - 'Spelling precision: distinguishing ''незважаючи'' (one word, preposition) from ''не зважаючи'' (two words, gerund meaning
    ''ignoring'' or ''not paying attention to'')'
  - 'Register mismatch workshop: practice selecting between ''але'', ''хоча'', and ''проте'' based on formal vs. casual situational
    prompts'
  - 'Transformation exercise: converting simple adversative sentences into complex concessive clauses to increase sentence
    variety'
- section: Культурна інтеграція та дебати (Cultural Integration & Debates)
  words: 800
  points:
  - 'Folk wisdom analysis: «Хоч не з красою, аби з головою» — discussion on the value of intellect over appearance using concessive
    structures'
  - 'Debate Champion Challenge: drafting a 200-word argument on a social issue using ''попри'', ''хоча... проте'', and ''незважаючи
    на'' to handle counter-arguments'
  - 'Final self-assessment: correcting 10 sentences containing calques and spelling errors identified in research findings'
vocabulary_hints:
  required:
  - 'хоча (although) — High frequency (Top 300 conjunctions); collocations: хоча б (at least), хоча й (even though), хоча...
    але/проте'
  - 'незважаючи на (despite) — High frequency preposition; collocations: незважаючи на те що, незважаючи на труднощі, незважаючи
    ні на що'
  - 'попри (despite - literary) — Medium frequency, stylish media alternative; collocations: попри все, попри очікування,
    попри те що'
  - 'проте (however) — High frequency academic/formal; collocations: однак проте, хоча... проте'
  - хоч (although/even) — Common short form of 'хоча', often used in proverbs and literature
  - неочікуваний (unexpected) — Key for describing the result of concessive clauses
  - результат (result) — Used to discuss outcomes that occur 'despite' circumstances
  - допустовий (concessive) — Linguistic term for the clause type (B1 level terminology)
  recommended:
  - дарма що (although) — State Standard §4.4.3; archaic/literary usage note, avoid in business
  - 'хоч би (even if/if only) — Emphatic concession; usage: ''хоч би як'' (no matter how)'
  - все одно (anyway) — Conversational marker of outcome regardless of concession
  - тим не менш (nevertheless) — Formal/academic connector for contrasting results
  - не дивлячись на (ERROR) — Russian calque; strictly avoid for 'despite', use only for 'not looking'
