activity_hints:
  - type: quiz
    focus: 'Оберіть доконаний або недоконаний вид у реченнях минулого часу на основі контексту та часових маркерів'
    items: 10
  - type: fill-in
    focus: 'Вставте правильну форму минулого часу (вибір виду) заданої пари дієслів у речення з контекстними підказками'
    items: 8
  - type: match-up
    focus: 'З''єднайте часові маркери (щодня, одного разу, часто, нарешті) з вибором виду та поясніть чому'
    items: 8
  - type: error-correction
    focus: 'Знайдіть і виправте помилки щодо виду в реченнях минулого часу (напр., *щодня приготувала → готувала)'
    items: 6
  - type: group-sort
    focus: 'Розподіліть речення минулого часу на категорії результат/процес та однократність/повторюваність'
    items: 10
  - type: open-writing
    focus: 'Напишіть текст «Мій минулий тиждень» — використайте обидва види, включіть звичні та поодинокі події, позначте свій вибір виду'
    items: 6
connects_to:
  - 'b1-001 (Минуле і теперішнє — базове повторення часів і видів)'
  - 'b1-005 (Вид у майбутньому часі — вибір виду в майбутньому часі)'
  - 'b1-006 (Вид у розповіді — поєднання видів у наративі)'
prerequisites:
  - 'b1-001 b1-baseline-past-present (форми минулого/теперішнього часу та базова концепція виду)'
  - 'b1-003 metalanguage-syntax-cases (українська граматична метамова)'
grammar:
  - 'Доконаний вид у минулому часі: одноразова завершена дія з результатом'
  - 'Недоконаний вид у минулому часі: тривала, повторювана або фактична дія'
  - 'Часові маркери як сигнали вибору виду (щодня → недок., одного разу → док.)'
  - 'Мінімальні пари видових дієслів у минулому часі'
  - 'Два виміри вибору: результат/процес і однократність/повторюваність'
register: розмовний
references:
  - title: "Заболотний Grade 7, p.54-58"
    notes: 'Вид дієслова: доконаний і недоконаний — визначення, тести на вид, мінімальні пари. Вправи на вибір виду в минулому часі.'
  - title: "Литвінова Grade 7, p.30-40"
    notes: 'Вид дієслова: зв''язок виду і часу, часові маркери, вибір виду за контекстом. Практичні вправи на розрізнення виду.'
  - title: "Авраменко Grade 7, p.63-68"
    notes: 'Минулий час: утворення, вид у минулому часі, вправи на вибір між доконаним і недоконаним у минулому.'