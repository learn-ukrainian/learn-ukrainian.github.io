module: b1-004
level: B1
sequence: 4
slug: aspect-past-tense
version: '1.0.2'
title: 'Вид у минулому часі'
subtitle: 'Одного разу vs щодня — як вид змінює значення минулого'
focus: aspect-past
pedagogy: TTT
phase: 'B1.0 [Базові концепції та опанування виду]'
word_target: 4000
objectives:
  - 'Учень вміє розрізняти одноразову завершену дію в минулому (доконаний вид) від повторюваної або тривалої дії (недоконаний вид) та пояснювати різницю за допомогою української метамови'
  - 'Учень вміє обирати правильний вид у минулому часі на основі часових маркерів (одного разу, щодня, завжди, часто, іноді) та пояснювати свій вибір'
  - 'Учень вміє визначати, на чому акцентує увагу речення в минулому часі — на результаті (доконаний) чи процесі (недоконаний) — та утворювати мінімальні пари для демонстрації контрасту'
  - 'Учень вміє правильно використовувати 8-10 базових видових пар у контексті минулого часу, обираючи вид на основі комунікативного наміру, а не механічних правил'
dialogue_situations:
  - setting: 'Двоє колег за обідом обговорюють, що сталося вчора — в одного був продуктивний день (завершені завдання, результати), в іншого день розчарувань (намагався, але не завершив справи): Я вчора написав три листи і відправив звіт. А ти? — А я цілий день писав звіт, але так і не закінчив...'
    speakers:
      - Тарас
      - Оксана
    motivation: 'Природний контраст: завершені дії (док.) проти незавершених процесів (недок.) в одній розмові'
  - setting: 'Дідусь розповідає онукові про звички з дитинства та окремі пам''ятні події: Коли я був маленький, щоліта ми їздили до бабусі. А одного літа ми поїхали на море — уперше в житті!'
    speakers:
      - Дідусь
      - Онук
    motivation: 'Повторювані дії в минулому (недок.) проти одноразової події (док.) — часові маркери зумовлюють вибір виду'
content_outline:
  - section: 'Тест на інтуїцію: що ви вже відчуваєте?'
    words: 800
    points:
      - 'Діагностичний тест: 10 пар речень, де учні обирають між доконаним і недоконаним видом у минулому часі на основі контексту. Правил ще не дано — лише інтуїція з рівня A2. Приклади: Вчора я (читав / прочитав) цю книжку — до останньої сторінки. Вчора я (читав / прочитав) увечері — мені було нудно.'
      - 'Негайне самооцінювання: які пари здавалися очевидними, а які неоднозначними? Учні позначають рівень впевненості. Це показує, чого рівень A2 навчив їх неявно, а що потребує детального пояснення на B1.'
      - 'Мінідіалог із видовою неоднозначністю: двоє людей описують однаковий вечір по-різному — Я дивився фільм (процес, отримав задоволення) vs Я подивився фільм (закінчив, готовий обговорювати). Обговорення: обидва варіанти "правильні" — вибір залежить від того, ЩО ви хочете повідомити.'
      - 'Вступ до ключового питання: Вид — це не граматичне правило, а спосіб мислення. Мовець вирішує, що має значення — процес чи результат — і вид виражає це рішення.'
  - section: 'Результат чи процес? Основний вибір'
    words: 1100
    points:
      - 'Основний принцип (Заболотний 7 клас, с.54): Доконаний вид у минулому часі позначає завершену дію з результатом. Недоконаний вид позначає тривалу дію, процес, або факт без акценту на результаті. Мінімальні пари: писав лист (процес, тривалість) / написав лист (результат, лист готовий). читав книжку (процес) / прочитав книжку (результат, закінчив).'
      - 'Система прийняття рішень на основі 8 ключових видових пар у минулому часі: писати/написати, читати/прочитати, робити/зробити, говорити/сказати, брати/взяти, вчити/вивчити, готувати/приготувати, відповідати/відповісти. Кожна пара демонструється в контексті результату та процесу.'
      - 'Часові маркери як сигнали (Литвінова 7 клас, с.38): Недоконаний → щодня, завжди, часто, іноді, зазвичай, довго, три години, цілий день. Доконаний → одного разу, вчора ввечері (одноразова подія), нарешті, за годину, раптом. Попередження: маркери є сигналами, а не правилами — контекст має перевагу.'
      - 'Практика: учні отримують речення з часовими маркерами і обирають вид, після чого пояснюють свій вибір, використовуючи українські терміни (результат, процес, тривалість, завершеність). Приклад: Він (вчив / вивчив) українську три роки → вчив (процес, тривалість). Він (вчив / вивчив) усі нові слова → вивчив (результат, завершеність).'
  - section: 'Повторюваність і однократність'
    words: 1100
    points:
      - 'Другий вимір виду: повторювана дія проти одноразової (Заболотний 7 клас, с.56). Повторювана дія в минулому = недоконаний вид: Щоранку він снідав о восьмій. Вона часто телефонувала мамі. Ми завжди гуляли після обіду. Одноразова подія в минулому = доконаний вид: Одного разу він не поснідав. Вона зателефонувала о п''ятій. Ми погуляли в парку.'
      - 'Звичне минуле як наративний прийом: Коли я жив у Львові, щовечора ходив на прогулянку. Зазвичай купував каву на Площі Ринок і сідав на лавку біля фонтану. Весь уривок використовує недоконаний вид, оскільки описує повторювану ситуацію — а не тому, що якась окрема дія була "незавершеною".'
      - 'Контраст із одноразовим перериванням: ...Але одного вечора я побачив старого друга. Ми зупинилися, поговорили. Він запросив мене на вечерю. Доконаний вид порушує звичний шаблон — він сигналізує про конкретну, унікальну подію.'
      - 'Практика: учні переписують абзац про минулі звички (весь у недоконаному виді), вставляючи одну подію, що порушує рутину. Вони повинні перемкнутися на доконаний вид для переривання та повернутися до недоконаного для відновленої рутини. Обговорення: як зміна виду впливає на відчуття розповіді?'
  - section: 'Підсумок: вид як інструмент мислення'
    words: 1000
    points:
      - 'Зведена таблиця: дві осі вибору виду в минулому часі. Вісь 1: результат (доконаний) vs процес (недоконаний). Вісь 2: одноразова подія (доконаний) vs повторювана (недоконаний). Обидві осі вказують в одному напрямку — але логіка відрізняється, і учні повинні визначити, ЯКА саме вісь керує їхнім вибором.'
      - 'Типові помилки та виправлення: *Я вчора прочитав книжку три години (неприродно — процес + тривалість = читав). *Вона щодня приготувала обід (повторювана дія = готувала). *Він одного разу писав лист бабусі (одноразова завершена подія = написав). Аналіз ЧОМУ кожна помилка відчувається неправильною для носія мови.'
      - 'Розширена практика: учні розповідають історію про «Мій минулий тиждень», використовуючи обидва види. Обов''язкові елементи: 3+ звичні дії (недок.), 3+ завершені події (док.), 1+ контраст в одному реченні (Коли я читав, зателефонував друг). Взаємоперевірка фокусується на виборі виду, а не на граматичній формі.'
      - 'Анонс наступного модуля: Вид у майбутньому часі — три конструкції для майбутнього часу в українській мові, і як вид визначає, яку з них використовувати.'
