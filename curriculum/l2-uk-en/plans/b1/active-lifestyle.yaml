module: b1-088
level: B1
sequence: 88
slug: active-lifestyle
version: '2.0'
title: Активний відпочинок
subtitle: Active Lifestyle and Outdoor Recreation
focus: culture
pedagogy: CBI
phase: B1.7 [Contemporary Ukraine]
word_target: 4000
objectives:
- Learner can discuss active lifestyle habits in Ukrainian
- Learner can understand texts about fitness and outdoor activities
- Learner can use vocabulary for diverse physical activities
- Learner can compare active leisure traditions in Ukraine and abroad
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - Культура активного відпочинку в Україні згідно з Державним стандартом (§3.4, §3.12) — розвиток від традиційної 'фізкультури'
    до сучасного фітнесу та 'wellness' концепцій.
  - Активний відпочинок як спосіб покращення самопочуття (§3.7) та вибору хобі — вступне слово від імені 'Wellness Coach'
    про переваги руху.
- section: Історія та культура (History and Culture)
  words: 1000
  points:
  - Феномен народної 'Качалки' в Гідропарку (Київ) — унікальний тренажерний зал просто неба, створений у 1970-х із металобрухту
    та танкових ланцюгів; символ винахідливості.
  - Традиції карпатського туризму — піші походи (хайкінг) маршрутами Чорногори та Ґорґан як невід'ємна частина української
    культури дозвілля.
  - Поєднання спорту із зануренням у гуцульські традиції та історію — залучення до активного способу життя через культурний
    контекст.
- section: Сучасний активний стиль життя (Modern Active Lifestyle)
  words: 1000
  points:
  - 'Доступність спорту для всіх: від сучасних фітнес-центрів до вуличних ''воркаут-майданчиків'' — акцент на державні спортивні
    споруди (стадіон, басейн, корт).'
  - Активний туризм та велоінфраструктура — розвиток паркових зон, велодоріжок та вибір необхідного спорядження для гірських
    походів.
  - Регулярність та здоровий спосіб життя (ЗОЖ) — концепція малих кроків та фокус на довготривалому результаті для здоров'я.
- section: Граматика та типові помилки (Grammar and Common Errors)
  words: 800
  points:
  - Керування дієслова 'займатися' — виправлення типової помилки вживання Accusative (*займатися спорт*) на правильний Instrumental
    (займатися спортом, йогою, бігом).
  - Дієслова руху для спортивних занять — розрізнення односпрямованого 'йти' (зараз) та багатоспрямованого 'ходити' (регулярно)
    у контексті тренувань.
  - 'Прийменниковий контраст за Державним стандартом: використання ''в'' (в спортзал, в басейн, в похід) проти ''на'' (на
    стадіон, на майданчик, на корт, на ковзанку).'
- section: Практичні сценарії (Practical Scenarios)
  words: 600
  points:
  - Діалог 'У спортзалі' — обговорення абонемента, персональних тренувань та вибору індивідуального плану занять.
  - Опис власного спортивного режиму — розповідь про ранкові тренування, плавання та підготовку до походу в Карпати.
- section: Підсумок (Summary)
  words: 200
  points:
  - 'Підсумок: як зробити активний відпочинок частиною повсякденного життя та важливість перебування на свіжому повітрі.'
  - Заключна порада від Wellness Coach щодо підтримки гарного самопочуття та мотивації.
vocabulary_hints:
  required:
  - активний відпочинок (active recreation) — форми активного відпочинку, обирати активний відпочинок, переваги активного
    відпочинку; висока частотність
  - тренування (training) — ранкове тренування, інтенсивне тренування, йти на тренування, персональне тренування; вживається
    частіше за 'воркаут'
  - займатися (to do/practice) — займатися спортом, займатися йогою, займатися фітнесом; обов'язковий Орудний відмінок
  - спортзал (gym) — ходити в спортзал, абонемент у спортзал; вживання прийменника 'в' (not 'на')
  - похід (hike) — йти в похід, гірський похід, спорядження для походу; контекст карпатського туризму
  recommended:
  - самопочуття (well-being) — покращувати самопочуття, гарне самопочуття; Державний стандарт §3.7
  - майданчик (playground/station) — воркаут-майданчик, спортивний майданчик; вживання прийменника 'на'
  - регулярність (consistency) — регулярність тренувань, принцип регулярності; ключова концепція ЗОЖ
  - абонемент (subscription/membership) — абонемент у спортзал, абонемент у басейн
  - на свіжому повітрі (outdoors) — тренування на свіжому повітрі, активне дозвілля
