module: b1-090
level: B1
sequence: 90
slug: sports-in-ukraine
version: '2.0'
title: Спорт в Україні
subtitle: Spectator Sports and Ukrainian Athletes
focus: culture
pedagogy: CBI
phase: B1.7 [Contemporary Ukraine]
word_target: 4000
objectives:
- Learner can discuss Ukrainian sports culture in Ukrainian
- Learner can understand authentic texts about Ukrainian athletes and teams
- Learner can use sports-related vocabulary in context
- Learner can compare Ukrainian sports achievements with global trends
content_outline:
- section: Вступ — Спортивна нація (Introduction — A Sporting Nation)
  words: 400
  points:
  - 'Спорт як елемент національної гордість та ідентичності; огляд популярних видів згідно зі Стандартом §3.4 (спортивні споруди:
    стадіон, басейн, корт, ковзанка).'
  - Засвоєння конструкції «займатися спортом» (Орудний відмінок) для уникнення кальки «робити спорт».
- section: Футбол — Релігія мільйонів (Football — The Religion of Millions)
  words: 1000
  points:
  - 'Історія успіху: Андрій Шевченко та його «Золотий м’яч» (2004) як символ визнання українського футболу у світі.'
  - 'Протистояння грандів: «Динамо» (Київ) та «Шахтар» (Донецьк); виступи національної збірної на Євро та Мундіалі.'
  - 'Мовна практика: керування дієслова «грати у футбол» (в/у + Знахідний відмінок) на противагу грі на інструментах; використання
    термінів «воротар» (голкіпер) та «нападник» (форвард).'
  - 'Культура вболівання: розбір конструкції «вболівати за команду» (Accusative) для виправлення помилки «вболівати для команди».'
- section: Бокс — Сила та незламність (Boxing — Strength and Resilience)
  words: 800
  points:
  - 'Епоха братів Кличків: Віталій і Володимир як світові рекордсмени (всі пояси у важкій вазі одночасно); їхня роль як амбасадорів
    України.'
  - 'Сучасні герої: Олександр Усик — абсолютний чемпіон світу; Василь Ломаченко та майстерність на професійному рингу.'
  - 'Словникова робота: терміни «важка вага», «боксерські рукавиці», «нокаут», «здобути перемогу».'
- section: Олімпійська та паралімпійська слава (Olympic and Paralympic Glory)
  words: 800
  points:
  - 'Легендарний Сергій Бубка: 35 світових рекордів у стрибках з жердиною («людина-птах»).'
  - 'Історичний момент: Оксана Баюл та перше олімпійське золото незалежної України (1994) у фігурному катанні.'
  - 'Стрибки у висоту та гімнастика: успіхи Ярослави Магучіх та сучасних олімпійців; феноменальні досягнення українських паралімпійців
    на світовій арені.'
- section: Спорт під час війни та дипломатія (Sport During War and Diplomacy)
  words: 600
  points:
  - 'Спортсмени на захисті країни: участь атлетів у бойових діях та волонтерстві; матчі на порожніх стадіонах як символ незламності.'
  - 'Спортивна дипломатія: як успіхи Усика чи Магучіх стають платформою для просування інтересів України за кордоном.'
  - 'Контекстуальний словник: «воля до перемоги», «міжнародні змагання», «дипломатична місія».'
- section: Підсумок — Мовна норма та здобутки (Summary — Language Norms and Achievements)
  words: 400
  points:
  - 'Систематизація вивченого: вживання дієслів «грати у», «займатися», «вболівати за».'
  - 'Фінальна дискусія: спорт як інструмент об’єднання нації та джерело оптимізму; перемога як національна звичка.'
vocabulary_hints:
  required:
  - спорт (sport) — займатися спортом (to do sports/exercise); спортивні споруди
  - футбол (football) — грати у футбол (to play football); футбольний матч
  - бокс (boxing) — боксерські рукавиці; вийти на ринг
  - перемога (victory) — здобути перемогу; святкувати перемогу; воля до перемоги
  - змагання (competition) — брати участь у змаганнях; міжнародні змагання
  - чемпіон (champion) — абсолютний чемпіон; стати чемпіоном світу
  - команда (team) — вболівати за команду (to cheer for a team); збірна України
  - спортсмен (athlete) — видатний спортсмен; професійний атлет
  recommended:
  - вболівальник (fan) — палкий вболівальник; сектор для вболівальників
  - тренування (training/workout) — щоденні тренування; іти на тренування
  - тренер (coach) — спортивний тренер; головний тренер збірної
  - стадіон (stadium) — порожній стадіон; заповнені трибуни
  - Олімпійські ігри (Olympic Games) — літні/зимові Олімпійські ігри
  - забити гол (to score a goal) — нападник забив вирішальний гол
  - воротар (goalkeeper) — надійний воротар (syn. голкіпер)
