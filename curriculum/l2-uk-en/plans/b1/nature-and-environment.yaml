module: b1-047
level: B1
sequence: 47
slug: nature-and-environment
version: '3.1.3'
title: 'Природа і довкілля'
subtitle: 'Погода, рослини, тварини, екологія — природа українською'
focus: communication
pedagogy: PPP
phase: 'B1.4 [Порівняння та словотворення]'
word_target: 4000
objectives:
  - 'Здобувач освіти вміє описувати погоду, пори року та природні явища українською мовою, використовуючи точну метеорологічну лексику (температура, опади, хмарно, мряка)'
  - 'Здобувач освіти вміє називати поширені українські рослини (дерева, квіти, культури) та тварин (свійські, дикі, птахи, комахи), використовуючи автентичні українські назви'
  - 'Здобувач освіти вміє обговорювати екологічні проблеми (забруднення, переробка, збереження), використовуючи відповідну лексику та складні синтаксичні конструкції з Фази 8'
  - 'Здобувач освіти вміє читати й розуміти описи української природи в художньому стилі, розпізнаючи образні засоби (епітети, порівняння, метафори)'
  - 'Здобувач освіти вміє висловлювати думки щодо захисту довкілля, використовуючи структури аргументації та вставні слова з попередніх модулів'
dialogue_situations:
  - setting: 'Урок екології в Карпатському біосферному заповіднику — екскурсія: На жаль, забруднення зростає. Хоча ліси захищені, є загрози. Щоб зберегти природу, треба діяти. Безумовно, це наш обов''язок.'
    speakers:
      - Еколог
      - Студенти-біологи
    motivation: 'Тема довкілля: забруднення, ліс, природа + усі синтаксичні структури B1'
content_outline:
  - section: 'Погода та пори року'
    words: 750
    points:
      - 'Метеорологічна лексика — точні українські терміни: Температура: спека, мороз, відлига. Опади: дощ, злива, мряка, сніг, град, крига. Небо: хмарно, безхмарно, похмуро. Вітер: вітряно, штиль, шторм, буря. Атмосферні явища: туман, роса, іній, веселка.'
      - 'Пори року — описи сезонів: Весна: бруньки розпускаються, пташки повертаються, тане сніг. Літо: палюче сонце, грози, цвітіння, урожай. Осінь: листопад, зливи, перші заморозки, бабине літо. Зима: морози, снігопади, завірюха, ожеледиця. Практика: здобувачі освіти описують свою улюблену пору року з використанням лексики B1.'
      - 'Прогноз погоди — регістр метеорологічних прогнозів: «Завтра очікується хмарна погода з проясненнями. Температура повітря — 5-8 градусів тепла. Можливі короткочасні дощі». Це публіцистичний стиль, застосований до погоди. Практика: здобувачі освіти читають та складають прості прогнози погоди.'
      - 'Культурна довідка: українські народні погодні прикмети: «Ластівки низько літають — на дощ». «Соняшники опускають голівки — до негоди». Вони поєднують лексику природи з українською народною мудрістю.'
      - 'Кліматичні зони України — географічна лексика: степ, лісостеп, Полісся, Карпати, Крим. Кожна зона має свої погодні особливості. Практика: описати клімат українського регіону з використанням погодної лексики та складнопідрядних речень причини (тому що, оскільки).'
  - section: 'Рослинний світ'
    words: 700
    points:
      - 'Дерева: дуб, береза, верба, тополя, калина, сосна, ялина, каштан, липа, клен, яблуня, вишня. Калина — культурний символ України. Практика: встановити відповідність між деревами та їхніми описами.'
      - 'Квіти та рослини: ромашка, соняшник, чорнобривці, барвінок, маки, волошки, конвалії. Соняшник i чорнобривці — українські культурні символи. Практика: описати український сад або луг.'
      - 'Сільськогосподарські культури: пшениця, жито, кукурудза, ячмінь, соняшник, буряк. Україна як житниця Європи — культурний контекст. Лексика збирання врожаю: урожай, жнива, сіяти, збирати.'
      - 'Літературні описи природи з підручників: Здобувачі освіти читають поетичний уривок про українську природу (Шевченко, Коцюбинський або адаптований текст) та ідентифікують образні засоби: епітети, порівняння, персоніфікації.'
      - 'Гриби та ягоди — лексика, важлива для української культури: білий гриб, лисичка, мухомор, суниця, малина, ожина, чорниця. Збирання грибів — важливий вид українського культурного дозвілля. Практика: описати похід до лісу з використанням цієї лексики.'
  - section: 'Тваринний світ'
    words: 700
    points:
      - 'Свійські тварини: кіт, собака, кінь, корова, свиня, вівця, коза, курка, качка, гуска, кролик. Обережно: кіт/кітка (а не кот — це русизм). Практика: описати українське село та його тварин.'
      - 'Дикі тварини: лисиця, заєць, вовк, ведмідь, олень, їжак, білка, борсук, видра, козуля. Зубр — символ української природи.'
      - 'Птахи: лелека, ластівка, горобець, ворона, сорока, синиця, дятел, жайворонок, соловейко, журавель. Лелека — символ щастя в українській культурі.'
      - 'Комахи та інші: бджола, метелик, мурашка, жук, коник, павук. Практика: здобувачі освіти описують екосистему українського лісу або поля, використовуючи лексику з усіх трьох категорій.'
      - 'Тварини в українській мові та культурі: вовк (символ свободи й небезпеки), лисиця (символ хитрості), заєць (символ боягузтва). Українські казки та прислів''я використовують тварин як персонажів із фіксованими символічними ролями. Практика: встановити відповідність між тваринами та їхніми символічними значеннями в українській культурі.'
  - section: 'Екологія та довкілля'
    words: 750
    points:
      - 'Екологічна лексика: довкілля, екологія, забруднення, відходи, сортування, переробка, збереження, вимирання, заповідник. Практика: здобувачі освіти обговорюють екологічні проблеми, використовуючи цю лексику.'
      - 'Екологічні проблеми в Україні: Забруднення повітря i води, вирубка лісів, наслідки Чорнобиля, наслідки війни для довкілля (мінування, забруднення, знищення екосистем). Чорнобильська зона — парадокс відновлення дикої природи. Практика: читання україномовного тексту рівня B1 про екологічні виклики.'
      - 'Захист довкілля — що можна зробити: сортувати відходи, зменшувати споживання, берегти воду, садити дерева, підтримувати заповідники. Українські заповідники: Асканія-Нова, Карпатський, Поліський. Практика: здобувачі освіти висловлюють думки, використовуючи вставні слова (модуль №81) та структури аргументації.'
      - 'Діалог: двоє українців обговорюють екологічні проблеми, природно використовуючи складнопідрядні речення (модулі №65–72), вставні слова (модуль №81) та подвійне заперечення (модуль №80). Практика: здобувачі освіти беруть участь у керованій дискусії.'
      - 'Екологічні наслідки війни в Україні: мінування, забруднення ґрунтів, знищення лісів, загибель тварин. Держстандарт 2024, тема §3 включає здоров''я та суспільні відносини — екологічна безпека перетинається з обома. Практика: розуміння прочитаного з адаптованого тексту B1 про екологічні наслідки війни.'
  - section: 'Природа в літературі'
    words: 650
    points:
      - 'Описи української природи як мистецька традиція: Краєвид як жанр — за Заболотним, 7 клас. Українські письменники відомі своїми описами природи. Літературні засоби: епітет (сонячний промінь), метафора (вітер співає), порівняння (білий, наче сніг), персоніфікація (ліс шепоче).'
      - 'Адаптований літературний уривок — опис природи з української літератури (150-200 слів). Здобувачі освіти ідентифікують: пору року, настрій, образні засоби, лексику природи. Аналіз пов''язаний з модуля №83 (Читання художніх текстів).'
      - 'Народні приказки про природу: «Де горобці купаються, там дощ збирається». «Без верби i калини нема України». «Природа — найкращий учитель». Це пов''язує лексику з культурною ідентичністю.'
      - 'Практика письма: здобувачі освіти складають короткий опис природи (8-10 речень) про знайоме місце, використовуючи лексику на тему погоди, рослин і тварин із принаймні двома образними засобами.'
      - 'Порівняння природи в різних регіонах: здобувачі освіти порівнюють описи Карпат, степу та узбережжя Чорного моря за допомогою ступенів порівняння (Фаза 5) та складнопідрядних речень порівняння. Це інтегрує лексику природи з раніше вивченою граматикою в комунікативному завданні.'
  - section: 'Підсумок: природа — це Україна'
    words: 450
    points:
      - 'Повний лексичний довідник, організований за категоріями: погода, рослини, тварини, екологія, літературні засоби.'
      - 'Самоперевірка українською: 1. Опишіть погоду сьогодні (5 речень). 2. Назвіть 5 дерев, 5 квітів, 5 тварин українською. 3. Які екологічні проблеми є в Україні? 4. Напишіть короткий прогноз погоди на завтра.'
      - 'Інтегроване повторення граматики через теми природи: утворення ступенів порівняння прикметників для опису природи (глибший, найглибший), використання числівників для статистики (площа заповідника — 33 000 гектарів), застосування подвійного заперечення (нічого не зробили для захисту) та вставних слів (на жаль, безумовно). Природа як інструмент для повторення всієї граматики B1.'
      - 'Анонс: Читання художніх текстів (модуль №83) — перехід від описів природи до ширшого розуміння літературних текстів.'
