activity_hints:
  - type: reading
    focus: 'Прочитайте текст про погоду та пори року і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Рослинний світ».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у речення на тему погоди та пір року.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему рослинного світу.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Погода та пори року».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Рослинний світ» з їхніми визначеннями.'
connects_to:
  - 'b1-081 (Вставні слова — вираження думок про природу та екологію)'
  - 'b1-083 (Читання художніх текстів — літературні описи природи)'
  - 'b1-078 (Розмовний стиль — повсякденні розмови про погоду)'
  - 'b1-084 (Контрольна робота 9 — перевірка тематичної лексики)'
prerequisites:
  - 'b1-077 до b1-081 (розуміння стилів і граматичні засоби для вираження)'
  - 'b1-039 до b1-041 (ступені порівняння прикметників — опис природи потребує порівнянь)'
  - 'b1-065 до b1-072 (складний синтаксис — обговорення екології потребує складних речень)'
grammar:
  - 'Повторення: прикметники для описів (температура + узгодження в роді)'
  - 'Повторення: складнопідрядні речення для висловлення екологічних аргументів'
  - 'Вставні слова для оцінки природних явищ (на жаль, безумовно)'
  - 'Подвійне заперечення в екологічному дискурсі (нічого не зробили)'
  - 'Публіцистичний стиль для прогнозів погоди'
register: розмовний
references:
  - title: 'Авраменко Grade 7, p.28-31'
    notes: 'Засоби масової інформації, медіатексти — медійний контекст для прогнозів погоди та екологічних новин.'
  - title: 'Заболотний Grade 7, p.24-28'
    notes: 'Джерела інформації — пошук і оцінювання інформації, застосовується до екологічних даних.'
  - title: 'Болшакова Grade 2, p.63'
    notes: 'Опис природи — базова українська лексика про природу з молодших класів, основа для розширення B1.'
  - title: 'Авраменко Grade 7, p.137'
    notes: 'Текст з описом природи: осінній уривок з образними засобами, модель для художнього читання на рівні B1.'
