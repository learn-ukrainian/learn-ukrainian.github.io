module: b1-031
level: B1
sequence: 31
slug: relative-clauses-de-kudy-zvidky
version: '2.0'
title: 'Підрядні означальні: де, куди, звідки'
subtitle: Place Relative Clauses
focus: grammar
pedagogy: TTT
phase: B1.3a [Complex Sentences]
word_target: 4000
objectives:
- Learner can explain difference between де, куди, звідки
- Learner can form relative clauses describing places
- Learner can choose correct place relative for context
- Learner can combine location and direction in clauses
content_outline:
- section: Вступ та діагностика (Introduction and Diagnostics)
  words: 500
  points:
  - 'Вступ до підрядних означальних речень місця: функціональний еквівалент за Державним стандартом §4.4.3 («місце, де...»)'
  - 'Діагностичний тест: перевірка розрізнення статичної локації (де) та напрямку (куди/звідки) на базових прикладах'
  - 'Постановка цілей: навчитися описувати географічні об''єкти та маршрути з використанням сполучних слів'
- section: 'Теорія: Тріада просторових відношень (Theory: The Spatial Triad)'
  words: 900
  points:
  - 'Концепція трьох типів простору: Статика (📍 де), Напрямок (➡️ куди), Джерело (⬅️ звідки) з візуальними маркерами'
  - 'Частотний аналіз: де (Top 100), куди (Top 200), звідки — використання з підсилювальним словом «саме» (де саме, куди саме)'
  - 'Синтаксична роль сполучних слів: як вони замінюють іменник головної частини та поєднують речення'
  - 'Корелятивні пари: «там, де», «туди, куди», «звідти, звідки» — правила побудови та вживання'
- section: Поглиблення та робота над помилками (Deep Dive and Error Correction)
  words: 1200
  points:
  - 'Аналіз типової помилки: плутанина між де та куди через вплив англійської (drill: «Куди ти йдеш?» vs «Де ти зараз?»)'
  - 'Помилка подвійного прийменника: чому не можна казати «місце, в де я живу» та як правильно прибирати зайві прийменники'
  - 'Реєстрові відмінності: використання «де» у нейтральному мовленні (B1) проти офіційного «в якому»'
  - 'Семантичний контраст: «місто, де я народився» (місце) проти «місто, яке мені подобається» (опис якості)'
  - Вживання невизначених форм (десь, кудись, звідкись) у підрядних структурах
- section: Культурна географія України (Cultural Geography of Ukraine)
  words: 800
  points:
  - 'Київський метрополітен: Станція Арсенальна як «місце, де починається найглибше метро у світі (105.5 м)»'
  - 'Закарпаття: Рахів як «місто, поблизу якого знаходиться географічний центр Європи» — відпрацювання означальних конструкцій'
  - 'Спелеологія: Печера Оптимістична як «джерело пригод, куди приїжджають дослідники з усього світу»'
  - Аналіз українського прислів'я про дім та чужину з використанням просторових сполучних слів
- section: Практика та інтеграція (Practice and Integration)
  words: 600
  points:
  - 'Серія діалогів: переїзд у нове місто, планування подорожі до печер, обговорення походження колег'
  - 'Вправа на переклад: трансформація складних англійських речень з ''where'' у специфічні українські ''де/куди/звідки'''
  - 'Творче завдання: опис улюбленого місця в Україні, використовуючи вивчені граматичні структури'
  - 'Підсумковий чек-ліст: перевірка навичок опису напрямку та походження без калькованих помилок'
vocabulary_hints:
  required:
  - 'де (where - location) — High frequency (Top 100); collocations: де саме, там де, місце де'
  - 'куди (where - direction to) — High frequency (Top 200); collocations: куди саме, туди куди, напрямок куди'
  - 'звідки (where - from) — Medium frequency; collocations: звідки саме, звідти звідки, джерело звідки'
  - місце (place) — core noun for relative clauses
  - напрямок (direction) — used with 'куди'
  - розташування (location) — used with 'де'
  - походження (origin) — used with 'звідки'
  - рух (movement) — triggers the use of 'куди' or 'звідки'
  recommended:
  - статичний (static) — grammatical meta-language for 'де'
  - динамічний (dynamic) — grammatical meta-language for 'куди/звідки'
  - призначення (destination) — target point of movement
  - джерело (source) — point of origin
  - саме (exactly/specifically) — particle used for clarification (куди саме?)
