module: b1-06
level: B1
sequence: 6
slug: aspect-complete-system
version: '2.0'
title: 'Вид дієслова: повна система'
subtitle: Perfective vs Imperfective - The complete picture
content_outline:
- section: Розминка
  points:
  - 'Порівняння НДВ/ДВ: "Я писав листа" vs "Я написав листа" — ensure diagnostic test
    traps the "General Factual" error early'
  - 'Метафора режисера: вид як вибір об''єктива (відео vs фото) — "Video mode" (Imperfective/Process)
    vs "Photo mode" (Perfective/Result)'
  - 'Тест на інтуїцію: "Ти пекла торт?" vs "Ти спекла торт?"'
  - Філософія сприйняття реальності через вид — distinction between *being* in a state
    (Impf) and *changing* reality (Perf)
- section: Граматика
  points:
  - 'НДВ функції: процес, тривалість, повторення, звичка, загальне твердження — focus
    on "General Factual" usage (e.g., «Ти читав "Кобзар"?» as experience)'
  - 'ДВ функції: результат, завершеність, одноразовість, послідовність — cultural
    hook: "Зробив діло — гуляй сміло" (Result leads to freedom)'
  - 'Нюанси: спроба vs успіх (здавати/здати), стукати vs стукнути'
  - 'Початок дії (Ingressive): любити → полюбити, бігти → побігти — clarify prefix
    `по-` marks start of state/action, not just generic perfective'
  - 'Культурний контекст: Параджанов "Тіні забутих предків", Шевченко — contrast static
    painting-like frames (Perf) vs swirling dynamic camera (Impf)'
- section: Практика
  points:
  - 'Алгоритм вибору виду: 4 ключові питання'
  - 'Порівняння у ситуаціях: домашнє завдання, книга, зустріч'
  - 'Маркери часу: тривалість → НДВ, завершення → ДВ'
  - 'Типові помилки: ДВ для звичок, НДВ для результату — learner error: Analytic Future
    with Perfective («буду написати»); learner error: using Perfective for simple
    denial of fact'
- section: Діалоги
  points:
  - Діалоги з чергуванням НДВ/ДВ у розповіді
  - 'Фон (НДВ): "Я йшов, думав..." — cultural hook: "Вік живи — вік учись" (Impf)'
  - 'Ключові події (ДВ): "побачив, зупинився, привітався"'
vocabulary_hints:
  required:
  - доконаний вид (perfective aspect)
  - недоконаний вид (imperfective aspect)
  - процес (process) — *у процесі*, *навчальний процес*, *тривалий процес*, *контролювати
    процес*
  - результат (result) — *досягти результату*, *кінцевий результат*, *позитивний результат*,
    *у результаті*
  - тривалість (duration) — *тривалість дії*, *середня тривалість*, *тривалість життя*
  - повторення (repetition)
  - контекст (context)
  - маркер (marker)
  - завершення (completion) — *після завершення*, *успішне завершення*, *стадія завершення*
  - одноразова дія (single action)
  recommended:
  - фокус (focus)
  - намір (intention) — *мати намір*, *серйозні наміри*, *з наміром*
  - послідовність (sequence)
  - обмежений час (bounded time)
  - загальне твердження (general statement)
