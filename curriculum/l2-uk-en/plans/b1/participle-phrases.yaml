module: b1-066
level: B1
sequence: 66
slug: participle-phrases
version: '3.2'
title: 'Дієприкметниковий зворот'
subtitle: 'Дієприкметник із залежними словами та правила відокремлення'
focus: grammar
pedagogy: PPP
phase: 'B1.6 [Дієприкметники та дієприслівники]'
word_target: 4000
objectives:
  - 'Здобувач освіти вміє ідентифікувати дієприкметниковий зворот як дієприкметник із залежними словами, що функціонує як єдине означення в реченні'
  - 'Здобувач освіти вміє застосовувати правила коми: дієприкметниковий зворот після означуваного слова відокремлюється комами; перед — не відокремлюється'
  - 'Здобувач освіти вміє перетворювати дієприкметникові звороти на підрядні речення зі словами який/яка/яке та навпаки'
  - 'Здобувач освіти вміє використовувати дієприкметникові звороти для створення стислого літературного українського тексту, уникаючи надмірного їх вживання, яке звучить неприродно'
  - 'Здобувач освіти вміє правильно розставляти розділові знаки в реченнях з кількома дієприкметниковими зворотами та відрізняти їх від інших відокремлених означень'
dialogue_situations:
  - setting: 'Новинний репортаж про повінь на Закарпатті — офіційний публіцистичний стиль: Річка, що вийшла з берегів, затопила поля. Будинки, пошкоджені повінню, потребують ремонту. Рятувальники, викликані вранці, прибули за годину.'
    speakers:
      - Журналіст
      - Рятувальник
    motivation: 'Дієприкметникові звороти: що вийшла з берегів, пошкоджені повінню, викликані вранці'
content_outline:
  - section: 'Що таке дієприкметниковий зворот?'
    words: 650
    points:
      - 'Визначення за Литвіновою, 7 клас, с. 82: дієприкметник із залежними словами утворює дієприкметниковий зворот. Він функціонує як розширене означення в реченні. Фільм, знятий в Україні, отримав найвищу нагороду. Тут «знятий в Україні» є зворотом: знятий (дієприкметник) + в Україні (залежні слова).'
      - 'Порівняння: одиничний дієприкметник проти звороту: Ми подивились обговорюваний фільм. (одиничний дієприкметник — без ком) Фільм, знятий в Україні, отримав нагороду. (зворот — коми) Зворот містить більше інформації та має іншу пунктуацію.'
      - 'Синтаксична роль: увесь зворот виступає як означення. Він відповідає на питання який? яка? яке? які? стосовно іменника. Книга (яка?), прочитана всіма учнями, лежала на столі.'
  - section: 'Правила відокремлення'
    words: 800
    points:
      - 'Ключове правило за Авраменком, 7 клас, с. 104-108: ПІСЛЯ іменника (постпозиція): КОМИ обов''язкові. Фільм, знятий в Україні, отримав нагороду. Стіна, побілена вапном, сяяла чистотою. Земля, припорошена першим снігом, нагадує білий килим. ПЕРЕД іменником (препозиція): БЕЗ ком. Знятий в Україні фільм отримав нагороду. Побілена вапном стіна сяяла чистотою. Припорошена першим снігом земля нагадує білий килим.'
      - 'Особливий випадок: дієприкметниковий зворот стосується особового займенника — ЗАВЖДИ відокремлюється комами незалежно від позиції: Стомлений дорогою, я заснув одразу. Я, стомлений дорогою, заснув одразу. В обох випадках коми потрібні, оскільки означуване слово — я (займенник).'
      - 'За Заболотним, 8 клас, с. 205: дієприкметникові звороти, що мають додаткове обставинне значення (причини, умови), завжди відокремлюються: Схвильований новиною, батько негайно зателефонував. (Зворот пояснює ЧОМУ зателефонував батько — відтінок причини).'
      - 'Практика: 10-12 речень, де здобувачі освіти правильно розставляють коми залежно від позиції звороту відносно іменника.'
  - section: 'Трансформація: зворот ↔ підрядне речення'
    words: 700
    points:
      - 'Кожен дієприкметниковий зворот можна перефразувати як підрядне речення зі словами який/яка/яке/які: Книга, прочитана всіма учнями, лежала на столі. → Книга, яку прочитали всі учні, лежала на столі. Збудований у XVIII столітті палац зберігся до сьогодні. → Палац, який збудували у XVIII столітті, зберігся до сьогодні.'
      - 'Коли чому надавати перевагу: Дієприкметниковий зворот: більш стислий, літературний, офіційний. Підрядне речення з який: більш природне в усному мовленні, легше для сприйняття. Українська стилістична перевага: підрядне речення з який загалом звучить природніше. Дієприкметникові звороти є ознакою письмової/літературної української мови.'
      - 'Практика: трансформувати 8 речень в обох напрямках (зворот → підрядне речення і підрядне речення → зворот). Здобувачі освіти відзначають, який варіант звучить природніше.'
  - section: 'Складні випадки та помилки'
    words: 600
    points:
      - 'Кілька дієприкметникових зворотів в одному реченні: Доповідь, написана студентом, перевірена професором, була відмінна. (два звороти в постпозиції — обидва виділяються комами) Написана студентом i перевірена професором доповідь була відмінна. (два звороти в препозиції, з''єднані через i — коми не потрібні).'
      - 'Типові помилки: 1. Забуті коми після звороту в постпозиції, якщо він не в кінці речення. 2. Зайві коми при звороті в препозиції (неправильно: *Знятий в Україні, фільм...). 3. Відірваний дієприкметник: дієприкметник має стосуватися іменника, який він означає. *Прочитана всіма, бібліотекар забрала книгу. (неправильне узгодження) → Прочитану всіма книгу бібліотекар забрала.'
      - 'Застереження щодо надмірного використання: нагромадження дієприкметникових зворотів робить текст важким і бюрократичним. Надавайте перевагу різноманітності: комбінуйте звороти з підрядними реченнями на який та простими реченнями.'
  - section: 'Читання та практика'
    words: 850
    points:
      - 'Практика читання: новинний репортаж або стаття з природним використанням дієприкметникових зворотів. Здобувачі освіти знаходять усі звороти, відзначають коми і визначають, чи можна перетворити кожен з них на підрядне речення з який.'
      - 'Вправа на виправлення помилок: текст із навмисними пунктуаційними помилками в дієприкметникових зворотах. Здобувачі освіти виправляють усі помилки та пояснюють правила.'
      - 'Продуктивна вправа: здобувачі освіти переписують 5 простих речень, використовуючи дієприкметникові звороти для їх ущільнення: Міст, який збудували минулого року, з''єднує два береги. → Збудований минулого року міст з''єднує два береги.'
      - 'Розширене читання: український текст в енциклопедичному стилі Вікіпедії про історичну будівлю чи пам''ятник (наприклад, Софійський собор), багатий на дієприкметникові звороти. Здобувачі освіти аналізують, як звороти створюють стислу, інформативно насичену прозу. Порівнюють оригінал із версією, де використані підрядні речення з який, щоб побачити стилістичну різницю.'
  - section: 'Підсумок та перехід до M60'
    words: 400
    points:
      - 'Підсумок: дієприкметниковий зворот = дієприкметник + залежні слова. Після означуваного слова → коми. Перед означуваним словом → без ком. Після займенника → завжди коми. Трансформація ↔ підрядне з який. Самоперевірка: Я правильно ставлю коми ✓/✗, Я можу перетворити зворот на підрядне речення ✓/✗.'
      - 'Анонс: M60 — Короткі прикметники. Інша морфологічна форма: зелен, молод, потрібен — виразна та поетична.'
vocabulary_hints:
  required:
    - "дієприкметниковий зворот (participle phrase)"
    - "означуване слово (modified word — the noun the participle refers to)"
    - "означення (attribute — syntactic role of the participle phrase)"
    - "відокремлення (setting off — punctuation with commas)"
    - "постпозиція (postposition — phrase after the noun)"
    - "препозиція (preposition — phrase before the noun)"
    - "підрядне речення (subordinate clause)"
    - "залежні слова (dependent words)"
  recommended:
    - "пунктограма (punctuation rule)"
    - "обставинне значення (adverbial shade — causal/conditional)"
    - "трансформація (transformation — converting between structures)"
    - "стилістика (stylistics — choice between phrase and clause)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про те, що таке дієприкметниковий зворот, і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Правила відокремлення».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему дієприкметникових зворотів.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему правил відокремлення.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Що таке дієприкметниковий зворот?»'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Правила відокремлення» з їхніми визначеннями.'
