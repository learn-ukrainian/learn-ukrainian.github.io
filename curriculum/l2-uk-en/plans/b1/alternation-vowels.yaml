references:
  - title: "Авраменко Grade 5, p.111-113"
    notes: 'Основний розділ "Чергування голосних": визначення, приклади з сіль-соляний, корінь-кореня, систематичне подання моделей.'
  - title: "Заболотний Grade 5, p.113-115"
    notes: 'Чергування голосних звуків (§27): пари дієслів летіти-літати, практичні вправи з аналізом відкритих/закритих складів.'
  - title: "Литвінова Grade 5, p.118"
    notes: 'Правопис ненаголошених [е] та [и]: стратегія перевірки за допомогою зміни форми слова, зв''язок із чергуванням з [і].'
  - title: "Глазова Grade 10, p.103"
    notes: 'Зріле подання матеріалу: [о],[е]~[і] як визначальна риса української мови, систематичні приклади шко-ла — шкіл, дво-ри — двір.'
  - title: "Заболотний Grade 7, p.55-56"
    notes: 'Чергування [о] з [е] після шиплячих: формулювання правила, винятки, практичні вправи.'