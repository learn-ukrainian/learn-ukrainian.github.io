module: b1-013
level: B1
sequence: 13
slug: alternation-vowels
version: '3.0.2'
title: "Чергування голосних"
subtitle: "Коли о та е стають і — і коли зникають зовсім"
focus: grammar
pedagogy: PPP
phase: "B1.1 [Морфонологія]"
word_target: 4000
objectives:
  - 'Здобувач навчиться передбачати, коли [о] або [е] в корені переходитиме в [і] в іншій формі слова, використовуючи правило відкритого/закритого складу (рік — року, сіль — солі, двір — двори)'
  - 'Здобувач навчиться розпізнавати та утворювати чергування [о]/[е] з нулем звука в парадигмах іменників та прикметників (учень — учня, вітер — вітру, день — дня)'
  - 'Здобувач навчиться пояснювати зв''язок між зміною наголосу та чергуванням голосних у парах дієслів (летіти — літати, нести — ніс)'
  - 'Здобувач навчиться застосовувати ці правила для правильного написання незнайомих слів, розуміючи, що це чергування є визначальною рисою української фонології, яка відрізняє її від інших слов''янських мов'
dialogue_situations:
  - setting: 'Вчитель української мови пояснює студентам, чому в деяких словах змінюються голосні — на прикладі списку продуктів: Я купив коня (m, horse), але: коні (pl). Вона живе в селі (n), але: село. Він поставив стіл (m), але: на столі.'
    speakers:
      - Вчитель
      - Студенти
    motivation: 'Чергування голосних о/е→і: кінь→коня, село→селі, стіл→столі'
content_outline:
  - section: "Що таке чергування голосних?"
    words: 550
    points:
      - 'Зв''язок із M01 (метамова: фонетика): здобувачі вже знають терміни голосний, приголосний, наголос, відкритий/закритий склад. Цей модуль показує, як ці концепції зумовлюють систематичні орфографічні зміни. Ключове визначення за Авраменком (5 клас, с.111): "Іноді, коли утворюємо нове слово або його форму, звук може змінюватися на інший: сіль — соляний, солі; корінь — кореня. Це мовне явище називають чергуванням звуків."'
      - 'Чому це важливо: чергування голосних є визначальною рисою української мови, що відрізняє її від російської та польської. Глазова (10 клас, с.103): "Таке чергування характерне для української мови й вирізняє її серед інших східнослов''янських мов." Здобувачі, які опанують це правило, розблокують правильне написання тисяч українських слів.'
      - 'Огляд трьох основних типів, що розглядаються в цьому модулі: 1. [о], [е] чергуються з [і] (правило відкритого/закритого складу). 2. [о], [е] чергуються з нулем звука (біглі голосні). 3. [о] чергується з [е] після шиплячих та [й]. Кожен тип має власну логіку; у цьому розділі робиться огляд усіх трьох.'
  - section: "Чергування [о], [е] з [і]"
    words: 900
    points:
      - 'Основне правило за Заболотним (5 клас, с.113-114): Коли склад змінюється з відкритого на закритий (або навпаки), [о] чи [е] в корені може чергуватися з [і]. Відкритий склад (закінчується на голосний): дво-ри, ко-ні, ро-ку. Закритий склад (закінчується на приголосний): двір, кінь, рік. Модель: [о]/[е] у відкритому складі <-> [і] в закритому складі.'
      - 'Систематизовані приклади за частинами мови: Іменники: стіл — столу, двір — двору, сіль — солі, віз — воза, ніс — носа, рік — року, річ — речі. Прикметники: осінній — осені, вечірній — вечора. Дієслова: нести — ніс, везти — віз. Глазова (10 клас, с.103): "шко-ла — шкіл; дво-ри — двір; по-со-ли — сіль; у мо[йе]му — у мо[йі]м."'
      - 'Винятки та особливі випадки: Не кожен закритий склад викликає зміну. Запозичені слова зазвичай не підлягають чергуванню: мотор — мотору (не *мотіру). Деякі питомі слова мають скам''янілі форми. Практика: здобувачі передбачають називний відмінок від непрямого відмінка і навпаки.'
      - 'Практика читання: короткий текст із використанням слів із чергуванням [о]/[е] ~ [і] в природному контексті (наприклад, опис українського села: двір, стіл, піч, вікна, ріг тощо). Здобувачі визначають усі пари, що чергуються, у тексті.'
  - section: "Чергування [о], [е] з нулем звука"
    words: 650
    points:
      - 'Визначення за Заболотним (5 клас, с.114): У деяких словах [о] або [е] повністю зникає під час зміни форми слова. Це називається "чергування з нулем звука" або "біглі голосні". Голосний звук наявний в одній формі, але відсутній в іншій.'
      - 'Поширені моделі: Іменники чоловічого роду: учень — учня, день — дня, вітер — вітру, камінь — каменя, хлопець — хлопця, пень — пня. Голосний [е] або [о] в останньому складі називного відмінка зникає в непрямих відмінках при додаванні закінчення. Суфікси: -ець/-ця (молодець — молодця), -ок/-ка (замок — замка, гурток — гуртка), -ень/-ня (корінь — кореня).'
      - 'Як відрізнити біглі голосні від сталих: Якщо видалення голосного створює неможливий збіг приголосних, голосний може бути сталим (але не завжди — українська мова допускає збіги на кшталт -дня, -тру). Практика з мінімальними парами: сон — сну (біглий) проти стон — стону (сталий).'
  - section: "Чергування [о] з [е] після шиплячих та [й]"
    words: 550
    points:
      - 'Правило за Заболотним (7 клас, с.56): Після [ж], [ч], [ш], [дж], [й]: — пишемо е перед м''яким приголосним або перед складами з [е], [и]: вечеря, вишень, джерело, женити. — пишемо о перед твердим приголосним або перед складами з [а], [о], [у]: бджола, будиночок, пшоно, знайомий.'
      - 'Винятки, які потрібно запам''ятати: чепурний, шепіт, жебоніти, щедрий, черствий, чекати (е всупереч правилу), а також чоло, бджола (о всупереч правилу). Вони явно перераховані в підручнику Заболотного (7 клас, с.56).'
      - 'Практика: здобувачі застосовують правило для заповнення пропущених літер у словах після шиплячих. Контраст із російською мовою, де цієї відмінності не існує — здобувачі української мови повинні розвинути чутливість до твердості/м''якості наступного приголосного.'
  - section: "Чергування голосних у дієслівних коренях"
    words: 550
    points:
      - 'За Заболотним (5 клас, с.113, вправа 275): Чергування у дієслівних коренях зумовлено наголосом і суфіксом: летіти — літати, котити — катати, терти — стирати. Модель: [е] ~ [і] ~ [и] залежно від позиції наголосу та суфікса (-а-, -и-, -іти-).'
      - 'Додаткові приклади за Заболотним (5 клас, с.114, вправа 276): захопити — хапати ([о] ~ [а]), сплести — сплітати ([е] ~ [і]), завмерти — завмирати ([е] ~ [и]), заберу — забирати ([е] ~ [и]). Чергування можна передбачити: перед наголошеним суфіксом -а- голосний у корені змінюється.'
      - 'Зв''язок зі знаннями рівня A2: здобувачі вже знають ці дієслова з повсякденного вжитку. Тепер вони бачать систему. Це перетворює завчені пари на продуктивне правило.'
  - section: "Чергування і наголос: як вони пов'язані"
    words: 500
    points:
      - 'Ключове розуміння: наголос зумовлює багато чергувань голосних. Коли наголос переміщується з кореневого голосного, голосний може змінитися: рік (наголос на [і]) — років (наголос на [і] в суфіксі, корінь має [о]). За Авраменком (5 клас, с.111): чергування часто виявляє початковий голосний, який існував до переходу в [і].'
      - 'Практика: для слова з [і] в закритому складі здобувачі знаходять форму з [о] або [е] шляхом зміни форми слова. Це саме та орфографічна стратегія, якої навчають в українських школах: Литвінова (5 клас, с.118): "Якщо під час зміни слова сумнівний звук чергується з [і] в закритому складі — пишемо и: осені (бо осінь)."'
      - 'Підсумкова таблиця: усі три типи чергувань із прикладами, тригерами та винятками — довідкова картка для здобувачів.'
  - section: "Підсумок: правила і практика"
    words: 300
    points:
      - 'Повний підсумок чергувань із деревом рішень: Крок 1: Склад відкритий чи закритий? -> [о]/[е] ~ [і]. Крок 2: Голосний зникає? -> біглий голосний. Крок 3: Після шиплячого? -> правило [о] ~ [е]. Крок 4: Це дієслівний корінь зі зміною суфікса? -> дієслівне чергування.'
      - 'Самоперевірка українською мовою: Дайте відповіді на запитання: 1. Чому в слові "двір" пишемо і, а в слові "двори" — о? 2. Яке чергування відбувається у словах "день — дня"? 3. Після яких приголосних чергуються [о] з [е]? 4. Запишіть три пари слів із чергуванням [о] ~ [і].'
      - 'Анонс наступного модуля: Чергування приголосних (іменники) — чергування приголосних у парадигмах іменників, побудоване на тій самій морфонологічній логіці.'
vocabulary_hints:
  required:
    - "чергування (alternation — systematic sound change between word forms)"
    - "голосний (vowel — sound produced without obstruction)"
    - "відкритий склад (open syllable — ending in a vowel sound)"
    - "закритий склад (closed syllable — ending in a consonant sound)"
    - "корінь (root — the core meaning-bearing part of a word)"
    - "наголос (stress — emphasized pronunciation of a syllable)"
    - "біглий голосний (fleeting vowel — vowel that disappears in some forms)"
    - "нуль звука (zero sound — absence of a vowel in an alternation)"
    - "суфікс (suffix — morpheme added after the root)"
    - "закінчення (ending — inflectional morpheme at the end of a word)"
    - "шиплячий (hushing consonant — ж, ч, ш, дж)"
    - "орфограма (orthographic rule — a spelling pattern requiring a rule)"
    - "відмінок (grammatical case)"
    - "форма слова (word form — a specific inflected variant of a word)"
  recommended:
    - "милозвучність (euphony — pleasant sound quality of speech)"
    - "ненаголошений (unstressed — syllable without stress)"
    - "відкритий (open — ending in a vowel)"
    - "закритий (closed — ending in a consonant)"
    - "морфонологія (morphophonology — study of sound alternations in morphology)"
    - "твердий (hard — non-palatalized consonant)"
    - "м'який (soft — palatalized consonant)"
    - "спільнокореневий (cognate — sharing the same root)"
    - "правопис (orthography — correct spelling rules)"
    - "перевірне слово (checking word — word used to verify spelling)"
activity_hints:
  - type: quiz
    focus: 'Визначте, який тип чергування голосних наявний у парах слів (наприклад, рік-року = [о]~[і]; день-дня = біглий голосний)'
    items: 8
  - type: fill-in
    focus: 'Доповніть форми слів, застосовуючи правило відкритого/закритого складу (наприклад, двір — двор___, стіл — стол___)'
    items: 8
  - type: match-up
    focus: 'З''єднайте форми називного відмінка з відповідними формами непрямих відмінків (наприклад, рік <-> року, кінь <-> коня, день <-> дня)'
    items: 8
  - type: group-sort
    focus: 'Розподіліть пари слів за категоріями: чергування [о]~[і], чергування [е]~[і], біглий голосний, без чергування'
    items: 10
  - type: error-correction
    focus: 'Знайдіть і виправте орфографічні помилки у реченнях, спричинені неправильним застосуванням правил чергування голосних'
    items: 6
