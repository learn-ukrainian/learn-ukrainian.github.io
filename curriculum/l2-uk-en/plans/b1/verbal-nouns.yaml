module: b1-030
level: B1
sequence: 30
slug: verbal-nouns
version: '3.0.3'
title: "Віддієслівні іменники"
subtitle: "Читання, бачення, відкриття — як дієслова стають іменниками"
focus: grammar
pedagogy: PPP
phase: "B1.2 [Система дієслів]"
word_target: 4000
objectives:
  - "Студент вміє утворювати віддієслівні іменники за допомогою продуктивних суфіксів -ння, -ття, -іння та розуміє правила їх творення"
  - "Студент вміє розрізняти суфіксальний та безафіксний способи творення іменників від дієслів (читання проти пошук)"
  - "Студент вміє правильно писати іменники на -ння, -ття, -іння (подвоєння: читання, знання; -ття: відкриття, забуття)"
  - "Студент вміє використовувати віддієслівні іменники у формальному та академічному регістрах замість багатослівних дієслівних конструкцій (здійснювати перевірку → перевірка)"
  - "Студент вміє визначати відмінність у регістрах: віддієслівні іменники на -ння/-ття є книжними/формальними, тоді як безафіксні є нейтральними"
dialogue_situations:
  - setting: 'В українській ІТ-компанії — обговорення процесів проєкту: Тестування (n, testing) триватиме два дні. Після написання (n, writing) коду — перевірка. Навчання (n, training) нових працівників — наш пріоритет. Читання (n, reading) документації обов''язкове.'
    speakers:
      - Менеджер проєкту
      - Розробник (developer)
    motivation: 'Віддієслівні іменники: тестування, написання, навчання, читання — утворення за допомогою -ння/-ття'
content_outline:
  - section: "Що таке віддієслівні іменники?"
    words: 550
    points:
      - "Визначення за Вашуленком (3 клас, с. 107): Іменники можуть утворюватися від дієслів i називати дії: зустріч, плавання. Вони називають саму ДІЮ як предмет. читати → читання, бачити → бачення, відкрити → відкриття"
      - "Чому це важливо на рівні B1: віддієслівні іменники є необхідними для академічної та формальної української мови. Вони дозволяють студентам номіналізувати дії: замість «ми досліджували» → «наше дослідження показало». Це мова новин, науки та офіційних документів."
      - "Категорії: іменники, що називають дію (процес) проти результату: навчання = процес здобуття знань АБО сама освіта. відкриття = процес відкривання АБО зроблене відкриття. Контекст визначає, яке саме значення мається на увазі."
  - section: "Суфікс -ння (-ання, -яння) — найпродуктивніший"
    words: 700
    points:
      - "Правило утворення: основа інфінітива + -ння. читати → читання, писати → писання, малювати → малювання, вивчати → вивчання (процес) проти вивчення (результат). За Заболотним (7 клас, с. 136): віддієслівні іменники на -ння, -ття є продуктивними в офіційно-діловому, науковому та публіцистичному стилях."
      - "Правило орфографії: подвоєння н → -нн-: суфікс -нн- + закінчення -я, що дає -ння. знати → знання [знан':а], читати → читання [читан':а]. Це подвоєння є послідовним у всіх формах на -ння. За Голубом (6 клас, с. 107): суфікси -инн(я), -інн(я), -енн(я)."
      - "Варіант -іння від дієслів II дієвідміни: говорити → говоріння, ходити → ходіння, бачити → бачення. Голосний звук перед -ння залежить від дієвідміни: I дієвідміна: -а- → -ання (читання), -ува- → -ування (малювання). II дієвідміна: -и- → -іння (ходіння) або -ення (бачення). Деякі дієслова мають паралельні форми: вивчання / вивчення (процес / результат)."
      - "Практика: утворити іменники на -ння від 10-12 поширених дієслів, звертаючи увагу на те, яка дієвідміна визначає голосний звук. Перевірити за VESUM складні випадки."
  - section: "Суфікс -ття та безафіксний спосіб"
    words: 650
    points:
      - "Утворення за допомогою -ття: від дієслів з основами, що закінчуються на збіг приголосних: відкрити → відкриття, забути → забуття, життя ← жити. пізнати → пізнання, але здобути → здобуття. За Заболотним (7 клас, с. 136): становлення, забуття — книжне забарвлення."
      - "Безафіксний спосіб за Литвіновою (6 клас, с. 83): пошукати → пошук, підписати → підпис, раній → рань. «Нові слова можна утворити також усіканням частин слова (префіксів i суфіксів). Цей спосіб словотворення має назву безафіксний.» Багато поширених слів утворено саме так: біг (← бігти), хід (← ходити), лет (← летіти), спів (← співати), крик (← кричати)."
      - "Відмінність регістрів: форми на -ння/-ття є книжними/формальними: дослідження, навчання, спілкування. Безафіксні форми є нейтральними/розмовними: біг, хід, крик, спів. Порівняйте: вивчення цього питання (формальне) проти пошук відповіді (нейтральне). Студенти практикуються у виборі правильного регістру для відповідного контексту."
  - section: "Віддієслівні іменники у реченні"
    words: 600
    points:
      - "Синтаксичні ролі: віддієслівні іменники функціонують як звичайні іменники — вони відмінюються, вживаються з прикметниками і виступають у ролі підмета/додатка. Вивчення мови потребує часу. (підмет) Я люблю читання. (додаток) Після закінчення курсу... (після прийменника). Вони вимагають такого ж відмінкового керування, як і дієслово, від якого вони утворені: досліджувати проблему (Зн.) → дослідження проблеми (Р.)."
      - "Розширення іменникових словосполучень: навчання → навчання дітей → навчання дітей у школі. Віддієслівний іменник є головним словом у словосполученні, яке відображає аргументи дієслова: вчити дітей у школі → навчання дітей у школі. Саме так в українській мові будуються складні академічні конструкції."
      - "Уникнення зловживання — стилістична проблема: Занадто багато форм на -ння роблять текст важким і бюрократичним. *Здійснення забезпечення виконання... — мовний канцелярит. Краще: Забезпечити виконання... (використовуйте дієслово, коли це можливо). Принцип Антоненка-Давидовича: використовуйте іменники для понять, а дієслова для дій."
  - section: "Практика: від дієслова до іменника"
    words: 550
    points:
      - "Блок вправ 1 — Утворення: З 12-15 поданих дієслів утворіть віддієслівний іменник: говорити → говоріння, створити → створення, жити → життя, будувати → будування/будівництво, мислити → мислення. Деякі дієслова мають дві форми: зверніть увагу на семантичну різницю."
      - "Блок вправ 2 — У контексті: Замініть багатослівні конструкції на віддієслівні іменники: «Коли ми вивчали цю тему...» → «Під час вивчення цієї теми...» «Те, що він приїхав, здивувало нас» → «Його приїзд здивував нас.» 6-8 трансформацій з розмовного у формальний регістр."
      - "Блок вправ 3 — Визначення регістру: З поданих пар (читання / крик, дослідження / пошук, спілкування / розмова) визначте кожне слово як формальне або нейтральне. Поставте їх у відповідні речення: наукове _____ (дослідження) проти щоденний _____ (пошук)."
  - section: "Читання: віддієслівні іменники у новинах"
    words: 600
    points:
      - "Коротка стаття з українських новин (адаптована до рівня B1), що містить багато віддієслівних іменників: будівництво, забезпечення, відновлення, виробництво, навчання, дослідження. Тема: освіта або технології в Україні."
      - "Завдання на розуміння, які перевіряють МОВУ, а не зміст: — Знайдіть у тексті всі віддієслівні іменники. — Від яких дієслів вони утворені? — Яким способом утворено: суфіксальним чи безафіксним? — Замініть два віддієслівні іменники на дієслівні конструкції."
      - "Продукція: студенти пишуть 3-4 речення про своє місто/країну, використовуючи щонайменше 3 віддієслівні іменники. Зразок: Будівництво нових шкіл — це важливе завдання. Навчання української мови потребує практики. Відкриття нового музею відбудеться наступного місяця."
  - section: "Підсумок та перехід до модуля №22"
    words: 350
    points:
      - "Підсумок: віддієслівні іменники — іменники, утворені від дієслів, що називають дії як предмети. Суфікси -ння, -ття, -іння. Безафіксний спосіб. Регістрові відмінності. Самоперевірка: Я можу утворити іменник від дієслова ✓/✗, Я знаю правопис -ння, -ття ✓/✗, Я можу перетворити дієслівну конструкцію на іменникову ✓/✗."
      - "Анонс: модуль №22 — Зворотні дієслова. Суфікс -ся/-сь, який перетворює перехідні дієслова на зворотні: мити → митися, бачити → бачитися. Це ще один продуктивний спосіб, за допомогою якого українська мова змінює значення дієслів."
vocabulary_hints:
  required:
    - "віддієслівний іменник (verbal noun — noun derived from a verb)"
    - "читання (reading — verbal noun from читати)"
    - "бачення (vision, seeing — verbal noun from бачити)"
    - "відкриття (discovery, opening — verbal noun from відкрити)"
    - "навчання (learning, education — verbal noun from навчати)"
    - "дослідження (research, study — verbal noun from досліджувати)"
    - "знання (knowledge — verbal noun from знати)"
    - "спілкування (communication — verbal noun from спілкуватися)"
    - "створення (creation — verbal noun from створити)"
    - "забуття (oblivion, forgetting — verbal noun from забути)"
    - "пошук (search — zero-derivation from пошукати)"
    - "підпис (signature — zero-derivation from підписати)"
    - "суфіксальний (suffixal — word formation method)"
    - "безафіксний (zero-derivation — word formation without affixes)"
  recommended:
    - "становлення (formation, establishment — bookish)"
    - "будівництво (construction — from будувати)"
    - "виробництво (production, manufacturing)"
    - "забезпечення (provision, ensuring)"
    - "відновлення (restoration, renewal)"
    - "мислення (thinking, thought process)"
    - "приїзд (arrival — zero-derivation from приїхати)"
    - "канцелярит (bureaucratese — overuse of nominal style)"
    - "продуктивний (productive — in word formation sense)"
    - "основа інфінітива (infinitive stem — base for formation)"
activity_hints:
  - type: fill-in
    focus: "Утворіть правильний віддієслівний іменник від поданого дієслова у контексті речення"
    items: 10
  - type: match-up
    focus: "З'єднайте дієслова з утвореними від них іменниками (читати→читання, відкрити→відкриття, бігти→біг)"
    items: 10
  - type: group-sort
    focus: "Розподіліть віддієслівні іменники за типом творення: суфіксальний (-ння/-ття) проти безафіксного"
    items: 10
  - type: sentence-builder
    focus: "Перетворіть дієслівні словосполучення на іменникові (Ми вивчали → Вивчення...)"
    items: 6
  - type: quiz
    focus: "Визначте регістр: який віддієслівний іменник є формальним, а який нейтральним? Виберіть правильну форму для контексту"
    items: 8
connects_to:
  - "b1-020 (Наказовий спосіб — опанування способів дієслів, перехід від дієслова до іменника)"
  - "b1-022 (Зворотні дієслова — ще одна модифікація дієслів: -ся/-сь)"
  - "b1-024 (Творення дієслів — завершує картину творення дієслів)"
  - "b1-044 (Творення назв осіб i місць — розширює тему творення іменників)"
prerequisites:
  - "b1-020 (Нюанси наказового способу — завершення системи способів перед вивченням словотвору)"
grammar:
  - "Суфіксальне творення: -ння (читання), -ття (відкриття), -іння (ходіння), -ення (бачення)"
  - "Безафіксний спосіб: пошук, підпис, біг, хід, крик, спів"
  - "Подвоєння у формах на -ння: читання [читан':а], знання [знан':а]"
  - "Регістр: -ння/-ття = книжний/формальний; безафіксні = нейтральний"
  - "Перенесення відмінкового керування: досліджувати проблему → дослідження проблеми"
  - "Уникнення канцеляриту: дієслова для дій, іменники для понять"
register: академічний
references:
  - title: "Вашуленко 3 клас, с.107"
    notes: "Іменники утворюються від дієслів i називають дії: зустріч, плавання. Базовий вступ до поняття віддієслівного іменника."
  - title: "Голуб 6 клас, с.107"
    notes: "Написання іменників із суфіксами -инн(я), -інн(я), -енн(я), -ен(я). Таблиця орфографічних правил із прикладами."
  - title: "Литвінова 6 клас, с.83"
    notes: "Безафіксний спосіб словотворення: пошук ← пошукати, підпис ← підписати. Визначення та приклади безафіксного творення."
  - title: "Заболотний 7 клас, с.136"
    notes: "Віддієслівні іменники на -ння, -ття: становлення, забуття. Книжне забарвлення; продуктивні в офіційно-діловому i науковому стилях."
