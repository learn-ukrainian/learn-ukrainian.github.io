module: b1-094
level: B1
sequence: 94
slug: cycling-water
version: '2.0'
title: Велосипед та водні види
subtitle: Cycling and Water Sports
focus: culture
pedagogy: CBI
phase: B1.7 [Contemporary Ukraine]
word_target: 4000
objectives:
- Learner can discuss cycling and water sports in Ukrainian
- Learner can understand rules and rental information
- Learner can use vocabulary for bikes, boats, and swimming
- Learner can describe a summer active holiday
content_outline:
- section: Вступ та цілі (Introduction and Objectives)
  words: 400
  points:
  - 'Цілі модуля: освоєння лексики для обговорення активного літнього відпочинку згідно з Держстандартом (§3.4, §3.14)'
  - 'Вступне слово від персонажа (Dnipro Kayak Guide): занурення в атмосферу річкового та велосипедного дозвілля'
  - Огляд природних об’єктів (річка, море, озеро) та спортивних споруд (басейн, велотрек) як контексту навчання
- section: Велосипедна культура та інфраструктура (Cycling Culture and Infrastructure)
  words: 1000
  points:
  - 'Культурний гачок: історія київського Велотреку та щорічного свята «Велодень» (Veloden) як символу спільноти'
  - 'Сучасна оренда: практичне використання мобільних додатків Bikenow та Nextbike для пересування містом'
  - 'Інфраструктура: Труханів острів та Оболонська набережна як головні локації для безпечного катання'
  - 'Велотуризм: огляд популярних українських маршрутів та необхідного спорядження для тривалих поїздок'
  - 'Learner error: використання орудного відмінка «їду велосипедом» замість більш природного місцевого «їду на велосипеді»'
- section: 'Водні види спорту: від Дніпра до Карпат (Water Sports: From Dnipro to Carpathians)'
  words: 1000
  points:
  - 'Каякінг у Києві: маршрути Гідропарку та Оболоні, унікальний вид на монумент «Батьківщина-Мати» з русла Дніпра'
  - 'SUP-серфінг: особливості нового тренду та техніка безпеки на відкритій воді від досвідченого гіда'
  - 'Карпатський рафтинг: сплави річками Черемош та Чорна Тиса як поєднання адреналіну та традиційного кемпінгу'
  - 'Триатлон в Україні: популяризація комплексного спорту та підготовка до змагань на відкритій воді'
  - 'Learner error: плутанина між напрямком «їдемо на море» (to the seaside) та місцем дії «купаємося в морі» (in the water)'
- section: 'Практика: тонкощі дієслів руху (Practice: Nuances of Motion Verbs)'
  words: 800
  points:
  - 'Ключова концепція: розмежування «плавати» (багатоспрямовано/звичка) та «плисти» (односпрямовано/процес)'
  - 'Drill: виправлення помилки «Я пливу в басейні щосуботи» на правильне «Я плаваю в басейні щосуботи»'
  - 'Моделювання ситуацій: качка «пливе» до берега (unidirectional) vs професійний плавець «плаває» щодня (habitual)'
  - 'Інструктаж з безпеки: вживання лексики «рятівний жилет» (life jacket) та «шолом» (helmet) у реальних ситуаціях'
- section: 'Продукція: планування активного відпочинку (Production: Planning Active Leisure)'
  words: 800
  points:
  - 'Ситуативний діалог: оренда каяка або велосипеда в пункті прокату, обговорення погодинної оплати та застави'
  - 'Творче завдання: розробка власного плану «Активного літа» в Україні з інтеграцією велотуризму та водних видів'
  - 'Підсумок: огляд лексичних надбань модуля та порад щодо вибору спорядження для початківців'
vocabulary_hints:
  required:
  - велосипед (bicycle) — їхати на велосипеді, кататися на велосипеді, гірський велосипед; High frequency
  - плавання (swimming) — займатися плаванням, спортивне плавання, уроки плавання; High frequency
  - каяк (kayak) — орендувати каяк, сплав на каяках, надувний каяк, прогулянка на каяку; Medium frequency
  - пляж (beach) — піщаний пляж, міський пляж, відпочивати на пляжі, засмагати на пляжі; High frequency
  - оренда (rental) — пункт оренди, оренда спорядження, взяти в оренду, погодинна оренда; High frequency
  - річка (river) — сплав річкою, течія річки, берег річки; Standard reference
  - шлем/шолом (helmet) — одягати шолом, захисний шолом; Essential for safety tips
  - рятівний жилет (life jacket) — обов'язковий на воді; Essential for safety tips
  recommended:
  - триатлон (triathlon) — займатися триатлоном, змагання з триатлону
  - велодоріжка (bike path) — міська інфраструктура, їхати велодоріжкою
  - SUP (stand-up paddleboard) — дошка для SUP, прогулянка на SUP; Popular leisure
  - басейн (pool) — плавати в басейні, критий басейн; Common location
  - сплав (rafting/drifting) — річковий сплав, екстремальний сплав
