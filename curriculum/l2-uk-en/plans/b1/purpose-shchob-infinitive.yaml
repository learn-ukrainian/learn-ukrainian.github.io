module: b1-032
level: B1
sequence: 32
slug: purpose-shchob-infinitive
version: '2.0'
title: 'Підрядні речення мети: щоб + інфінітив'
subtitle: Purpose Clauses - Same Subject
focus: grammar
pedagogy: TTT
phase: B1.3a [Complex Sentences]
word_target: 4000
objectives:
- Learner understands when to use щоб + infinitive
- Learner can form same-subject purpose clauses
- Learner can use alternative purpose expressions
- Learner can distinguish purpose from other clause types
content_outline:
- section: Вступ та діагностичний тест (Introduction & Diagnostic Test)
  words: 600
  points:
  - Початковий тест на розрізнення сполучників що та щоб, а також перевірка знання інфінітивних конструкцій у простих реченнях.
  - 'Аналіз прикладу зі Державного стандарту (§4.4.3): «Ми ходимо в музеї Львова, щоб краще знати історію цього старовинного
    міста» — розбір структури.'
  - 'Постановка цілей модуля: навчитися висловлювати намір та мету за умови однакового підмета в обох частинах речення.'
- section: 'Граматика: Конструкція «щоб + інфінітив» (Grammar: The ''shchob + infinitive'' Construction)'
  words: 1000
  points:
  - 'Правило однакового підмета: детальне пояснення вживання інфінітива недоконаного та доконаного виду після сполучника «щоб».'
  - 'Синоніміка сполучників мети: нейтральний «щоб» (найвища частотність), літературно-розмовний «аби» та офіційно-діловий
    «для того, щоб».'
  - 'Позиція підрядного речення: правила вживання конструкції на початку, в середині та в кінці складного речення.'
  - 'Інтеграція з дієсловами руху (b1-16): вираження мети поїздки чи походу («Я йду в магазин, щоб купити...»).'
- section: Культурний контекст та стійкість (Cultural Context & Resilience)
  words: 800
  points:
  - 'Леся Українка та філософія стоїцизму: розбір відомого рядка «Щоб не плакать, я сміялась» як прикладу заперечної конструкції
    мети.'
  - 'Народна мудрість про працю: аналіз прислів''я «Щоб рибу їсти, треба у воду лізти» — граматична структура та культурне
    значення етики праці.'
  - 'Віртуальна подорож музеями Львова (Національний музей, Арсенал): побудова речень про мету збереження культурної спадщини.'
- section: Аналіз помилок та Практика (Error Analysis & Practice)
  words: 1000
  points:
  - 'Помилка №1: Уникнення надлишкової кон''югації (Learner error: ''щоб я допоміг'' замість коректного ''щоб допомогти''
    при одному підметі).'
  - 'Помилка №2: Невідповідність підметів (Subject mismatch) — пояснення, чому інфінітив не можна вживати у реченні ''Я хочу,
    щоб ти читати''.'
  - 'Практичні ситуативні діалоги: ''На роботі'' (використання ціль/мета), ''Про навчання'' (літературне ''аби'') та ''Спорт''
    (досягнення мети).'
  - 'Вправи на трансформацію: перетворення складних конструкцій з ''для того, щоб'' у лаконічні форми, характерні для розмовної
    мови.'
- section: Підсумок та застосування (Summary & Production)
  words: 600
  points:
  - 'Систематизація знань: підсумкова таблиця вибору форми (інфінітив vs особова форма) залежно від підмета.'
  - 'Творче завдання: написання короткого есе про власну мету вивчення української мови, використовуючи різні сполучники мети.'
  - 'Огляд додаткових ресурсів: посилання на автентичні тексти Лесі Українки та добірку українських прислів''їв про мету та
    намір.'
vocabulary_hints:
  required:
  - щоб (in order to) — зробити все, щоб...; для того, щоб...; найвища частотність (Top 50)
  - для того щоб (in order to) — офіційно-діловий стиль; вживається для логічного наголошення мети
  - аби (in order to) — літературний та розмовний варіант; часто вживається у значенні «тільки б»
  - мета (purpose/goal) — головна мета; досягти мети; з метою (канцеляризм)
  - ціль (aim/target) — поставити ціль; йти до цілі; частіше вживається у спорті та військовій справі
  - намір (intention) — мати намір; серйозні наміри; виявляти намір
  - інфінітив (infinitive) — неозначена форма дієслова, ключовий компонент конструкції
  - причина (reason) — для розрізнення підрядних речень мети та причини
  recommended:
  - задля (for the sake of) — вживається з родовим відмінком іменника
  - заради (for / for the sake of) — виражає високу самопожертву або присвяту
  - цілеспрямований (purposeful) — людина, яка чітко знає свою мету
  - навмисно (intentionally) — зробити щось із заздалегідь визначеною метою
