    - "іменник (noun)"
    - "відміна (declension class)"
    - "відмінювання (declension — changing a word through cases)"
    - "однина (singular number)"
    - "множина (plural number)"
    - "кличний відмінок (vocative case)"
    - "родовий відмінок (genitive case)"
    - "походження (origin — where someone is from)"
    - "професія (profession)"
    - "пекар (baker — person who bakes)"
    - "лікар (doctor)"
    - "школяр (student — person who attends school)"
    - "кобзар (kobza player — traditional Ukrainian musician)"
    - "киянин (Kyivan — resident of Kyiv)"
    - "громадянин (citizen)"
  recommended:
    - "каменяр (stonecutter — also Франко's epithet)"
    - "бондар (cooper — barrel maker)"
    - "гончар (potter)"
    - "селянин (peasant/villager)"
    - "міщанин (townsperson)"
    - "козар (goatherd)"
    - "вівчар (shepherd)"
    - "токар (turner/lathe operator)"
    - "тверда група (hard group — declension subtype)"
    - "м'яка група (soft group — declension subtype)"
    - "словотворення (word formation)"
    - "нульове закінчення (zero ending)"
activity_hints:
  - type: fill-in
    focus: 'Відмінювання іменників на -ар/-яр у заданих відмінках'
    items: 8
  - type: quiz
    focus: 'Вибір правильної форми множини іменників на -ин (напр., киянин → кияни/киянини/киянині)'
    items: 8
  - type: fill-in
    focus: 'Написання родового відмінка множини іменників на -ин'
    items: 6
  - type: match-up
    focus: 'Встановлення відповідності між професіями/походженням та їхніми базовими словами (напр., пекар ↔ пекти, школяр ↔ школа, киянин ↔ Київ)'
    items: 8
  - type: group-sort
    focus: 'Сортування іменників за типом суфікса: -ар, -яр, -ин/-янин'
    items: 10
  - type: error-correction
    focus: 'Пошук та виправлення помилок у відмінюванні іменників на -ар/-яр/-ин (напр., *багато киянинів → багато киян)'
    items: 6
