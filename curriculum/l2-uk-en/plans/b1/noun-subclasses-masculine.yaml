grammar:
- "Word formation with suffixes -ар, -яр (person by trade/activity)"
- "Word formation with suffix -ин/-янин (person by origin/group)"
- "Declension of -ар/-яр nouns (II відміна, тверда/м'яка група)"
- "Declension of -ин nouns: -ин drops in plural, zero ending in Р.в. мн."
- "Кличний відмінок for -ар/-яр/-ин nouns"
- "Exceptions: грузинів, осетинів (keep -ів in Р.в. мн.)"
register: академічний
references:
- title: "Авраменко Grade 10, p.167"
  notes: "Складні випадки відмінювання іменника: -ин suffix drop
    in plural, нульове закінчення in Р.в. мн., exceptions грузинів."
- title: "Литвінова Grade 6, p.159-160"
  notes: "Закінчення іменників II відміни в кличному відмінку:
    -ю for м'яка група (лікарю, кобзарю), -е for мішана (пісняре).
    Родовий множини: -ів vs. нульове закінчення for -ин nouns."
- title: "Заболотний Grade 5, p.145-148"
  notes: "II відміна: загальний огляд відмінювання іменників
    чоловічого роду, закінчення в різних відмінках."
- title: "Литвінова Grade 6, p.160"
  notes: "Закінчення іменників II відміни в родовому множини:
    -ів/-їв vs. нульове for nouns losing -ин suffix."
