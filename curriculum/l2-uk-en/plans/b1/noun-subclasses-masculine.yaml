module: b1-012
level: B1
sequence: 12
slug: noun-subclasses-masculine
version: '3.0'
title: "Iменники на -ар, -яр, -ин"
subtitle: "Пекар, школяр, киянин — хто вони i як їх відмінювати"
focus: grammar
pedagogy: PPP
phase: "B1.2 [Morphophonemics & Noun Subclasses]"
word_target: 4000
objectives:
- "Learner can identify masculine nouns with suffixes -ар, -яр and
  explain their word-formation pattern (root + suffix indicating
  a person by trade, activity, or characteristic: пекар, лікар,
  школяр, кобзар)"
- "Learner can decline -ар/-яр nouns correctly across all 7 cases
  in singular and plural, applying the correct case endings for
  II відміна м'яка група"
- "Learner can identify nouns with suffix -ин/-янин that denote
  people by origin or group membership (киянин, громадянин, селянин)
  and produce their plural forms where -ин drops"
- "Learner can use кличний відмінок correctly for -ар/-яр/-ин nouns,
  applying consonant alternation rules from M09 where needed"
dialogue_situations:
- setting: 'Visit to a село (n, village) in Полтавщина — meeting local craftspeople:
    Ось наш столяр (m, carpenter). А де бондар (m, cooper)? Цей киянин (m, Kyiv resident)
    приїхав учитися. А полтавчанин (m) — наш майстер.'
  speakers:
  - Сільський голова (village head)
  - Гість
  motivation: 'Masculine noun subclasses: столяр, бондар (-ар), киянин, полтавчанин
    (-ин)'
content_outline:
- section: "Суфікси -ар, -яр: хто що робить (Suffixes -ar, -iar)"
  words: 650
  points:
  - "Word formation: суфікси -ар, -яр create nouns denoting people
    by their trade, profession, or habitual activity.
    -ар (тверда група): пекар (пекти + -ар), лікар (лікувати + -ар),
    козар (коза + -ар), бондар (бондарити + -ар), гончар (гончарити).
    -яр (м'яка група): школяр (школа + -яр), кобзар (кобза + -яр),
    пісняр (пісня + -яр), каменяр (камінь + -яр)."
  - "Semantic patterns:
    By trade: пекар (baker), лікар (doctor), гончар (potter),
    бондар (cooper), токар (turner), слюсар (locksmith).
    By instrument/object: кобзар (kobza player), пісняр (singer),
    каменяр (stonecutter — also Франко's famous poem title).
    By animal: козар (goatherd), вівчар (shepherd).
    Cultural note: Кобзар is both a word and THE title of Шевченко's
    poetry collection — the most iconic book in Ukrainian literature."
  - "Comparison with other person-denoting suffixes:
    -ець (борець, співець), -ник (працівник, учасник),
    -тель (вчитель, письменник — rare productive suffix).
    Why distinguish them? Different suffixes -> different declension
    patterns and кличний forms."
- section: "Відмінювання іменників на -ар (Declining -ar nouns)"
  words: 750
  points:
  - "Iменники на -ар belong to II відміна, and may be тверда or
    м'яка група depending on the specific word.
    Тверда група (-ар with hard stem): пекар, лікар, козар.
    Declension paradigm (singular):
    Н.в. пекар, Р.в. пекаря, Д.в. пекарю/пекареві,
    Зн.в. пекаря, Ор.в. пекарем, М.в. (на) пекареві/пекарю,
    Кл.в. пекарю."
  - "Plural declension:
    Н.в. пекарі, Р.в. пекарів, Д.в. пекарям,
    Зн.в. пекарів, Ор.в. пекарями, М.в. (на) пекарях,
    Кл.в. пекарі.
    Note: родовий множини = -ів (not zero ending)."
  - "Кличний відмінок for -ар nouns:
    Литвінова Grade 6 p.159: м'яка група takes -ю:
    лікарю! пекарю! кобзарю! школярю!
    No consonant alternation occurs (the stem ends in [р],
    which is not subject to the [г/к/х] alternations from M09).
    Мішана група (stem on шиплячий) takes -е: пісняре!"
- section: "Відмінювання іменників на -яр (Declining -iar nouns)"
  words: 600
  points:
  - "Iменники на -яр belong to II відміна, м'яка група.
    Declension paradigm (singular):
    Н.в. школяр, Р.в. школяра, Д.в. школяру/школяреві,
    Зн.в. школяра, Ор.в. школярем, М.в. (на) школяреві/школяру,
    Кл.в. школяру."
  - "Comparison -ар vs. -яр: the declension is largely identical
    (both II відміна), but stress patterns may differ.
    лікар — stress on last syllable: лікаря, лікарю.
    школяр — stress on last syllable: школяра, школяру.
    The key difference is in the softness of the stem before -яр:
    школ-яр has a soft connection (школа + -яр -> школяр)."
  - "Practice: learners decline 4-5 nouns on -ар/-яр in all cases,
    then use them in sentences: 'Я хочу стати лікарем.'
    'Тарас Шевченко — найвідоміший кобзар України.'"
- section: "Суфікс -ин/-янин: люди за походженням (Suffix -in/-ianyn)"
  words: 750
  points:
  - "Word formation: суфікс -ин/-їн/-янин creates nouns denoting
    people by their origin, citizenship, or group membership.
    By city: Київ -> киянин, Львів -> львів'янин,
    Одеса -> одесит (different suffix — not all cities use -ин).
    By country: Англія -> англійця (different pattern).
    By group: громада -> громадянин, місто -> міщанин,
    село -> селянин, козацтво -> козак (not -ин)."
  - "The crucial plural rule from Авраменко Grade 10 p.167:
    In the plural, the suffix -ин/-янин DROPS:
    киянин -> кияни (not *киянини)
    громадянин -> громадяни (not *громадянини)
    селянин -> селяни
    болгарин -> болгари
    This affects BOTH the nominative plural and all other plural cases."
  - "Родовий множини for -ин nouns has ZERO ending:
    киянин -> киян (not *киянів)
    громадянин -> громадян (not *громадянів)
    селянин -> селян
    болгарин -> болгар
    АЛЕ (exceptions): грузинів, осетинів — these KEEP -ів.
    Авраменко Grade 10 p.167: 'Нульове закінчення мають іменники,
    що втрачають суфікс -ин у множині.'"
  - "Full plural paradigm:
    Н.в. кияни, Р.в. киян, Д.в. киянам,
    Зн.в. киян, Ор.в. киянами, М.в. (на) киянах,
    Кл.в. кияни.
    Compare with regular II відміна: друг -> друзі, друзів, друзям..."
- section: "Відмінювання іменників на -ин в однині"
  words: 600
  points:
  - "Singular declension of -ин nouns (II відміна):
    Н.в. киянин, Р.в. киянина, Д.в. киянину/киянинoві,
    Зн.в. киянина, Ор.в. киянином, М.в. (на) киянинoві/киянину,
    Кл.в. киянине.
    In singular, the suffix -ин is PRESENT in all forms.
    It only drops in plural."
  - "Кличний відмінок: киянине! громадянине! селянине!
    Тверда група -> закінчення -е.
    No consonant alternation (stem ends in [н], not [г/к/х])."
  - "Practice: learners work with pairs (singular + plural) to
    internalize the -ин drop: один киянин, два кияни;
    один громадянин, багато громадян."
- section: "Культурний контекст: -ар/-яр у літературі та історії"
  words: 350
  points:
  - "Cultural significance of these word-formation patterns:
    Кобзар — Шевченко's collection; кобзарі were itinerant
    Ukrainian musicians who preserved national memory.
    Каменяр — Iван Франко's epithet ('Каменярі' — his famous poem
    about breaking stones to build a path to freedom).
    Гончар — Олесь Гончар, one of Ukraine's greatest novelists
    (his surname IS the word for 'potter')."
  - "Modern usage: школяр (student), лікар (doctor), пекар (baker)
    are everyday words. Recognizing the -ар/-яр suffix helps
    learners decode unfamiliar profession words instantly."
- section: "Підсумок i практика (Summary and practice)"
  words: 300
  points:
  - "Quick reference table:
    | Suffix | Meaning | Singular pattern | Plural pattern |
    | -ар | person by trade | regular II відм. | regular |
    | -яр | person by trade | regular II відм. м'яка | regular |
    | -ин | person by origin | -ин in all sing. | -ин drops |"
  - "Self-check: Дайте відповіді на запитання:
    1. Утворіть множину: киянин, громадянин, селянин.
    2. Поставте в родовий множини: кияни, громадяни.
    3. Утворіть кличний відмінок: лікар, школяр, киянин.
    4. Яке слово є назвою збірки Шевченка?
    Preview: M13 — Iменники на ж, ч, ш, щ (мішана група)."
vocabulary_hints:
  required:
  - "суфікс (suffix — word-formation morpheme after the root)"
  - "іменник (noun)"
  - "відміна (declension class)"
  - "відмінювання (declension — changing a word through cases)"
  - "однина (singular number)"
  - "множина (plural number)"
  - "кличний відмінок (vocative case)"
  - "родовий відмінок (genitive case)"
  - "походження (origin — where someone is from)"
  - "професія (profession)"
  - "пекар (baker — person who bakes)"
  - "лікар (doctor)"
  - "школяр (student — person who attends school)"
  - "кобзар (kobza player — traditional Ukrainian musician)"
  - "киянин (Kyivan — resident of Kyiv)"
  - "громадянин (citizen)"
  recommended:
  - "каменяр (stonecutter — also Франко's epithet)"
  - "бондар (cooper — barrel maker)"
  - "гончар (potter)"
  - "селянин (peasant/villager)"
  - "міщанин (townsperson)"
  - "козар (goatherd)"
  - "вівчар (shepherd)"
  - "токар (turner/lathe operator)"
  - "тверда група (hard group — declension subtype)"
  - "м'яка група (soft group — declension subtype)"
  - "словотворення (word formation)"
  - "нульове закінчення (zero ending)"
activity_hints:
- type: fill-in
  focus: "Decline -ар/-яр nouns in specified cases
    (e.g., лікар -> Ор.в. лікар___, Кл.в. лікар___)"
  items: 8
- type: quiz
  focus: "Choose the correct plural form of -ин nouns
    (e.g., киянин -> кияни/киянини/киянині)"
  items: 8
- type: fill-in
  focus: "Write the родовий множини of -ин nouns
    (e.g., громадянин -> багато громадян___)"
  items: 6
- type: match-up
  focus: "Match professions/origins with their base words
    (e.g., пекар <-> пекти, школяр <-> школа, киянин <-> Київ)"
  items: 8
- type: group-sort
  focus: "Sort nouns by suffix type: -ар, -яр, -ин/-янин"
  items: 10
- type: error-correction
  focus: "Find and fix declension errors in -ар/-яр/-ин nouns
    (e.g., *багато киянинів -> багато киян)"
  items: 6
