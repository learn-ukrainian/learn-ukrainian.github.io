  - 'b1-013 (noun-subclasses-hissing — іменники мішаної групи)'
  - 'b1-014 (noun-subclasses-feminine — іменники жіночого роду з нульовим закінченням)'
prerequisites:
  - 'Завершення рівня A2 (здобувач освіти знає базове відмінювання іменників, усі 7 відмінків)'
  - 'b1-002 (metalanguage-morphology — поняття відміна, суфікс, закінчення)'
  - 'b1-009 (alternation-consonants-nouns — правила кличного відмінка)'
grammar:
  - 'Словотворення із суфіксами -ар, -яр (особа за професією/діяльністю)'
  - 'Словотворення із суфіксом -ин/-янин (особа за походженням/групою)'
  - 'Відмінювання іменників на -ар/-яр (II відміна, тверда/м''яка група)'
  - 'Відмінювання іменників на -ин: -ин випадає в множині, нульове закінчення в Р.в. мн.'
  - 'Кличний відмінок для іменників на -ар/-яр/-ин'
  - 'Винятки: грузинів, осетинів (зберігають -ів у Р.в. мн.)'
register: академічний
references:
  - title: 'Авраменко Grade 10, p.167'
    notes: 'Складні випадки відмінювання іменника: випадання суфікса -ин у множині, нульове закінчення в Р.в. мн., винятки грузинів.'
  - title: 'Литвінова Grade 6, p.159-160'
    notes: 'Закінчення іменників II відміни в кличному відмінку: -ю для м''якої групи (лікарю, кобзарю), -е для мішаної (пісняре). Родовий множини: -ів проти нульового закінчення для іменників, що втрачають -ин.'
  - title: 'Заболотний Grade 5, p.145-148'
    notes: 'II відміна: загальний огляд відмінювання іменників чоловічого роду, закінчення в різних відмінках.'
  - title: 'Литвінова Grade 6, p.160'
    notes: 'Закінчення іменників II відміни в родовому множини: -ів/-їв проти нульового закінчення для іменників, що втрачають -ин.'
