module: b1-018
level: B1
sequence: 18
slug: noun-subclasses-masculine
version: '3.0.2'
title: 'Іменники на -ар, -яр, -ин'
subtitle: 'Пекар, школяр, киянин — хто вони і як їх відмінювати'
focus: grammar
pedagogy: PPP
phase: 'B1.1 [Морфофонеміка]'
word_target: 4000
objectives:
  - 'Здобувач освіти вміє розпізнавати іменники чоловічого роду із суфіксами -ар, -яр і пояснювати їхню словотвірну модель (корінь + суфікс, що вказує на особу за фахом, діяльністю або характеристикою: пекар, лікар, школяр, кобзар)'
  - 'Здобувач освіти вміє правильно відмінювати іменники на -ар/-яр в усіх 7 відмінках однини та множини, застосовуючи правильні відмінкові закінчення для II відміни м''якої групи'
  - 'Здобувач освіти вміє розпізнавати іменники із суфіксом -ин/-янин, що позначають людей за походженням або належністю до групи (киянин, громадянин, селянин), та утворювати їхні форми множини з випаданням -ин'
  - 'Здобувач освіти вміє правильно утворювати кличний відмінок для іменників на -ар/-яр/-ин, застосовуючи правила чергування приголосних з M09, де це необхідно'
dialogue_situations:
  - setting: 'Візит до села на Полтавщині — зустріч із місцевими ремісниками: Ось наш столяр. А де бондар? Цей киянин приїхав учитися. А полтавчанин — наш майстер.'
    speakers:
      - Сільський голова
      - Гість
    motivation: 'Підкласи іменників чоловічого роду: столяр, бондар (-ар), киянин, полтавчанин (-ин)'
content_outline:
  - section: 'Суфікси -ар, -яр: хто що робить'
    words: 650
    points:
      - 'Словотворення: суфікси -ар, -яр утворюють іменники, що позначають людей за професією, фахом або звичною діяльністю. -ар (тверда група): пекар (пекти + -ар), лікар (лікувати + -ар), козар (коза + -ар), бондар (бондарити + -ар), гончар (гончарити). -яр (м''яка група): школяр (школа + -яр), кобзар (кобза + -яр), пісняр (пісня + -яр), каменяр (камінь + -яр).'
      - 'Семантичні моделі: За професією: пекар, лікар, гончар, бондар, токар, слюсар. За інструментом/предметом: кобзар, пісняр, каменяр. За твариною: козар, вівчар. Культурна довідка: Кобзар — це і слово, і назва збірки поезій Шевченка, найвідомішої книги в українській літературі.'
      - 'Порівняння з іншими суфіксами на позначення осіб: -ець (борець, співець), -ник (працівник, учасник), -тель (вчитель, письменник — рідковживаний продуктивний суфікс). Чому їх розрізняють? Різні суфікси → різні моделі відмінювання та форми кличного відмінка.'
  - section: 'Відмінювання іменників на -ар'
    words: 750
    points:
      - 'Іменники на -ар належать до II відміни і можуть належати до твердої або м''якої групи залежно від конкретного слова. Тверда група (-ар із твердою основою): пекар, лікар, козар. Парадигма відмінювання (однина): Н.в. пекар, Р.в. пекаря, Д.в. пекарю/пекареві, Зн.в. пекаря, Ор.в. пекарем, М.в. (на) пекареві/пекарю, Кл.в. пекарю.'
      - 'Відмінювання у множині: Н.в. пекарі, Р.в. пекарів, Д.в. пекарям, Зн.в. пекарів, Ор.в. пекарями, М.в. (на) пекарях, Кл.в. пекарі. Зверніть увагу: родовий відмінок множини = -ів (не нульове закінчення).'
      - 'Кличний відмінок для іменників на -ар: Литвінова, 6 клас, с. 159: м''яка група має закінчення -ю: лікарю! пекарю! кобзарю! школярю! Чергування приголосних не відбувається (основа закінчується на [р], яке не підпадає під чергування [г/к/х] з M09). Мішана група (основа на шиплячий) має закінчення -е: пісняре!'
  - section: 'Відмінювання іменників на -яр'
    words: 600
    points:
      - 'Іменники на -яр належать до II відміни, м''якої групи. Парадигма відмінювання (однина): Н.в. школяр, Р.в. школяра, Д.в. школяру/школяреві, Зн.в. школяра, Ор.в. школярем, М.в. (на) школяреві/школяру, Кл.в. школяру.'
      - 'Порівняння -ар та -яр: відмінювання здебільшого однакове (обидва належать до II відміни), але моделі наголосу можуть відрізнятися. лікар — наголос на останньому складі: лікаря, лікарю. школяр — наголос на останньому складі: школяра, школяру. Ключова різниця полягає в м''якості основи перед -яр: школ-яр має м''яке з''єднання (школа + -яр → школяр).'
      - 'Практика: здобувачі освіти відмінюють 4-5 іменників на -ар/-яр в усіх відмінках, а потім використовують їх у реченнях: «Я хочу стати лікарем». «Тарас Шевченко — найвідоміший кобзар України».'
  - section: 'Суфікс -ин/-янин: люди за походженням'
    words: 750
    points:
      - 'Словотворення: суфікс -ин/-їн/-янин утворює іменники, що позначають людей за їхнім походженням, громадянством або належністю до групи. За містом: Київ → киянин, Львів → львів''янин, Одеса → одесит (інший суфікс — не всі міста використовують -ин). За країною: Англія → англієць (інша модель). За групою: громада → громадянин, місто → міщанин, село → селянин, козацтво → козак (не -ин).'
      - 'Ключове правило множини за Авраменком, 10 клас, с. 167: у множині суфікс -ин/-янин ВИПАДАЄ: киянин → кияни (а не *киянини), громадянин → громадяни (а не *громадянини), селянин → селяни, болгарин → болгари. Це стосується ЯК називного відмінка множини, ТАК І всіх інших відмінків множини.'
      - 'Родовий відмінок множини для іменників на -ин має НУЛЬОВЕ закінчення: киянин → киян (а не *киянів), громадянин → громадян (а не *громадянів), селянин → селян, болгарин → болгар. АЛЕ (винятки): грузинів, осетинів — вони ЗБЕРІГАЮТЬ -ів. Авраменко, 10 клас, с. 167: «Нульове закінчення мають іменники, що втрачають суфікс -ин у множині».'
      - 'Повна парадигма множини: Н.в. кияни, Р.в. киян, Д.в. киянам, Зн.в. киян, Ор.в. киянами, М.в. (на) киянах, Кл.в. кияни. Порівняйте з регулярною II відміною: друг → друзі, друзів, друзям...'
  - section: 'Відмінювання іменників на -ин в однині'
    words: 600
    points:
      - 'Відмінювання іменників на -ин в однині (II відміна): Н.в. киянин, Р.в. киянина, Д.в. киянину/киянинові, Зн.в. киянина, Ор.в. киянином, М.в. (на) киянинові/киянину, Кл.в. киянине. В однині суфікс -ин ПРИСУТНІЙ у всіх формах. Він випадає лише у множині.'
      - 'Кличний відмінок: киянине! громадянине! селянине! Тверда група → закінчення -е. Немає чергування приголосних (основа закінчується на [н], а не на [г/к/х]).'
      - 'Практика: здобувачі освіти працюють з парами (однина + множина) для засвоєння випадання -ин: один киянин, два кияни; один громадянин, багато громадян.'
  - section: 'Культурний контекст: -ар/-яр у літературі та історії'
    words: 350
    points:
      - 'Культурне значення цих словотвірних моделей: Кобзар — збірка Шевченка; кобзарі були мандрівними українськими музикантами, які зберігали національну пам''ять. Каменяр — епітет Івана Франка («Каменярі» — його відомий вірш про розбивання скель для прокладання шляху до свободи). Гончар — Олесь Гончар, один із найвидатніших українських романістів (його прізвище — це слово, що означає "гончар").'
      - 'Сучасне використання: школяр, лікар, пекар — це слова повсякденного вжитку. Розпізнавання суфікса -ар/-яр допомагає здобувачам освіти миттєво розшифровувати незнайомі назви професій.'
  - section: 'Підсумок і практика'
    words: 300
    points:
      - 'Коротка довідкова таблиця: | Суфікс | Значення | Модель в однині | Модель у множині | | -ар | особа за професією | регулярна II відм. | регулярна | | -яр | особа за професією | регулярна II відм. м''яка | регулярна | | -ин | особа за походженням | -ин в усій однині | -ин випадає |'
      - 'Самоперевірка: Дайте відповіді на запитання: 1. Утворіть множину: киянин, громадянин, селянин. 2. Поставте в родовий множини: кияни, громадяни. 3. Утворіть кличний відмінок: лікар, школяр, киянин. 4. Яке слово є назвою збірки Шевченка? Анонс: M13 — Iменники на ж, ч, ш, щ (мішана група).'
vocabulary_hints:
