module: b1-012
level: B1
sequence: 12
slug: noun-subclasses-masculine
version: '3.0'
title: "Iменники на -ар, -яр, -ин"
subtitle: "Пекар, школяр, киянин — хто вони i як їх вiдмiнювати"
focus: grammar
pedagogy: PPP
phase: "B1.2 [Morphophonemics & Noun Subclasses]"
word_target: 4000
objectives:
- "Learner can identify masculine nouns with suffixes -ар, -яр and
  explain their word-formation pattern (root + suffix indicating
  a person by trade, activity, or characteristic: пекар, лiкар,
  школяр, кобзар)"
- "Learner can decline -ар/-яр nouns correctly across all 7 cases
  in singular and plural, applying the correct case endings for
  II вiдмiна м'яка група"
- "Learner can identify nouns with suffix -ин/-янин that denote
  people by origin or group membership (киянин, громадянин, селянин)
  and produce their plural forms where -ин drops"
- "Learner can use кличний вiдмiнок correctly for -ар/-яр/-ин nouns,
  applying consonant alternation rules from M09 where needed"
content_outline:
- section: "Суфiкси -ар, -яр: хто що робить (Suffixes -ar, -iar)"
  words: 650
  points:
  - "Word formation: суфiкси -ар, -яр create nouns denoting people
    by their trade, profession, or habitual activity.
    -ар (тверда група): пекар (пекти + -ар), лiкар (лiкувати + -ар),
    козар (коза + -ар), бондар (бондарити + -ар), гончар (гончарити).
    -яр (м'яка група): школяр (школа + -яр), кобзар (кобза + -яр),
    пiсняр (пiсня + -яр), каменяр (камiнь + -яр)."
  - "Semantic patterns:
    By trade: пекар (baker), лiкар (doctor), гончар (potter),
    бондар (cooper), токар (turner), слюсар (locksmith).
    By instrument/object: кобзар (kobza player), пiсняр (singer),
    каменяр (stonecutter — also Франко's famous poem title).
    By animal: козар (goatherd), вiвчар (shepherd).
    Cultural note: Кобзар is both a word and THE title of Шевченко's
    poetry collection — the most iconic book in Ukrainian literature."
  - "Comparison with other person-denoting suffixes:
    -ець (борець, спiвець), -ник (працiвник, учасник),
    -тель (вчитель, письменник — rare productive suffix).
    Why distinguish them? Different suffixes -> different declension
    patterns and кличний forms."
- section: "Вiдмiнювання iменникiв на -ар (Declining -ar nouns)"
  words: 750
  points:
  - "Iменники на -ар belong to II вiдмiна, and may be тверда or
    м'яка група depending on the specific word.
    Тверда група (-ар with hard stem): пекар, лiкар, козар.
    Declension paradigm (singular):
    Н.в. пекар, Р.в. пекаря, Д.в. пекарю/пекаревi,
    Зн.в. пекаря, Ор.в. пекарем, М.в. (на) пекаревi/пекарю,
    Кл.в. пекарю."
  - "Plural declension:
    Н.в. пекарi, Р.в. пекарiв, Д.в. пекарям,
    Зн.в. пекарiв, Ор.в. пекарями, М.в. (на) пекарях,
    Кл.в. пекарi.
    Note: родовий множини = -iв (not zero ending)."
  - "Кличний вiдмiнок for -ар nouns:
    Литвiнова Grade 6 p.159: м'яка група takes -ю:
    лiкарю! пекарю! кобзарю! школярю!
    No consonant alternation occurs (the stem ends in [р],
    which is not subject to the [г/к/х] alternations from M09).
    Мiшана група (stem on шиплячий) takes -е: пiсняре!"
- section: "Вiдмiнювання iменникiв на -яр (Declining -iar nouns)"
  words: 600
  points:
  - "Iменники на -яр belong to II вiдмiна, м'яка група.
    Declension paradigm (singular):
    Н.в. школяр, Р.в. школяра, Д.в. школяру/школяревi,
    Зн.в. школяра, Ор.в. школярем, М.в. (на) школяревi/школяру,
    Кл.в. школяру."
  - "Comparison -ар vs. -яр: the declension is largely identical
    (both II вiдмiна), but stress patterns may differ.
    лiкар — stress on last syllable: лiкаря, лiкарю.
    школяр — stress on last syllable: школяра, школяру.
    The key difference is in the softness of the stem before -яр:
    школ-яр has a soft connection (школа + -яр -> школяр)."
  - "Practice: learners decline 4-5 nouns on -ар/-яр in all cases,
    then use them in sentences: 'Я хочу стати лiкарем.'
    'Тарас Шевченко — найвiдомiший кобзар України.'"
- section: "Суфiкс -ин/-янин: люди за походженням (Suffix -in/-ianyn)"
  words: 750
  points:
  - "Word formation: суфiкс -ин/-їн/-янин creates nouns denoting
    people by their origin, citizenship, or group membership.
    By city: Київ -> киянин, Львiв -> львiв'янин,
    Одеса -> одесит (different suffix — not all cities use -ин).
    By country: Англiя -> англiйця (different pattern).
    By group: громада -> громадянин, мiсто -> мiщанин,
    село -> селянин, козацтво -> козак (not -ин)."
  - "The crucial plural rule from Авраменко Grade 10 p.167:
    In the plural, the suffix -ин/-янин DROPS:
    киянин -> кияни (not *киянини)
    громадянин -> громадяни (not *громадянини)
    селянин -> селяни
    болгарин -> болгари
    This affects BOTH the nominative plural and all other plural cases."
  - "Родовий множини for -ин nouns has ZERO ending:
    киянин -> киян (not *киянiв)
    громадянин -> громадян (not *громадянiв)
    селянин -> селян
    болгарин -> болгар
    АЛЕ (exceptions): грузинiв, осетинiв — these KEEP -iв.
    Авраменко Grade 10 p.167: 'Нульове закiнчення мають iменники,
    що втрачають суфiкс -ин у множинi.'"
  - "Full plural paradigm:
    Н.в. кияни, Р.в. киян, Д.в. киянам,
    Зн.в. киян, Ор.в. киянами, М.в. (на) киянах,
    Кл.в. кияни.
    Compare with regular II вiдмiна: друг -> друзi, друзiв, друзям..."
- section: "Вiдмiнювання iменникiв на -ин в однинi"
  words: 600
  points:
  - "Singular declension of -ин nouns (II вiдмiна):
    Н.в. киянин, Р.в. киянина, Д.в. киянину/киянинoвi,
    Зн.в. киянина, Ор.в. киянином, М.в. (на) киянинoвi/киянину,
    Кл.в. киянине.
    In singular, the suffix -ин is PRESENT in all forms.
    It only drops in plural."
  - "Кличний вiдмiнок: киянине! громадянине! селянине!
    Тверда група -> закiнчення -е.
    No consonant alternation (stem ends in [н], not [г/к/х])."
  - "Practice: learners work with pairs (singular + plural) to
    internalize the -ин drop: один киянин, два кияни;
    один громадянин, багато громадян."
- section: "Культурний контекст: -ар/-яр у лiтературi та iсторiї"
  words: 350
  points:
  - "Cultural significance of these word-formation patterns:
    Кобзар — Шевченко's collection; кобзарi were itinerant
    Ukrainian musicians who preserved national memory.
    Каменяр — Iван Франко's epithet ('Каменярi' — his famous poem
    about breaking stones to build a path to freedom).
    Гончар — Олесь Гончар, one of Ukraine's greatest novelists
    (his surname IS the word for 'potter')."
  - "Modern usage: школяр (student), лiкар (doctor), пекар (baker)
    are everyday words. Recognizing the -ар/-яр suffix helps
    learners decode unfamiliar profession words instantly."
- section: "Пiдсумок i практика (Summary and practice)"
  words: 300
  points:
  - "Quick reference table:
    | Suffix | Meaning | Singular pattern | Plural pattern |
    | -ар | person by trade | regular II вiдм. | regular |
    | -яр | person by trade | regular II вiдм. м'яка | regular |
    | -ин | person by origin | -ин in all sing. | -ин drops |"
  - "Self-check: Дайте вiдповiдi на запитання:
    1. Утворiть множину: киянин, громадянин, селянин.
    2. Поставте в родовий множини: кияни, громадяни.
    3. Утворiть кличний вiдмiнок: лiкар, школяр, киянин.
    4. Яке слово є назвою збiрки Шевченка?
    Preview: M13 — Iменники на ж, ч, ш, щ (мiшана група)."
