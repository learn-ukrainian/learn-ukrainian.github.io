module: b1-076
level: B1
sequence: 76
slug: complex-subordinate-time
version: '3.1.3'
title: "Часові речення"
subtitle: "Одночасність і різночасність: коли, поки, доки, щойно"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Складний синтаксис]"
word_target: 4000
objectives:
  - "Учень вміє будувати підрядні обставинні часу, що вказують, коли відбувається дія головної частини, використовуючи сполучники коли, поки, доки, щойно, як тільки, перш ніж."
  - "Учень навчиться виражати одночасність та різночасність подій за допомогою видових форм дієслів і відповідних сполучників."
  - "Учень вміє узгоджувати часові форми: теперішній-теперішній, минулий-минулий, минулий недоконаний - минулий доконаний для вираження послідовності, поєднуючи вид та синтаксис."
  - "Учень вміє пов'язувати часові речення з дієприслівниками (модулі №61–62) як альтернативними засобами вираження часових відношень."
  - "Учень може правильно ставити розділові знаки у часових реченнях у будь-якій позиції."
dialogue_situations:
  - setting: 'Дідусь розповідає історію свого життя на сімейній вечері — часові речення: Коли я був молодим, жив у Полтаві. Після того як закінчив інститут (m), переїхав до Києва. Поки працював, побудував хату.'
    speakers:
      - Дідусь
      - Онуки
    motivation: 'Часові речення: коли, після того як, поки, щойно у біографічній розповіді'
content_outline:
  - section: "Підрядні обставинні часу"
    words: 750
    points:
      - "Визначення: підрядні обставинні часу відповідають на питання коли? відколи? доки? як довго? Вони стосуються головної частини В ЦІЛОМУ (а не конкретного слова, на відміну від означальних та з'ясувальних речень). Коли ми прийшли додому, почався дощ. Поки я готував вечерю, діти робили уроки."
      - "Ключові сполучники із підручника Заболотного (8 клас, с. 112): коли, поки/доки, щойно/як тільки, перш ніж/перед тим як, після того як, з тих пір як, доти...доки."
      - "Гнучкість позиції: часові підрядні можуть стояти перед або після головної частини: Коли пішов дощ, ми сховалися. (спершу встановлюється часова рамка). Ми сховалися, коли пішов дощ. (спершу результат, потім пояснення часу)."
  - section: "Одночасність: коли, поки"
    words: 750
    points:
      - "Коли для одночасності (дієслова недоконаного виду в обох частинах): Коли ми йшли парком, ми розмовляли. (обидві дії тривають одночасно). Коли сонце заходить, небо стає червоним. (регулярна дія — теперішній час)."
      - "Поки/доки для значення тривалості: Поки я читав, вона готувала вечерю. (протягом усього часу). Доки батьки на роботі, діти в школі. Поки + дієслово недоконаного виду = у той час як."
      - "Зв'язок із дієприслівниками (модуль №61): те саме значення, виражене інакше: Коли ми йшли парком, ми розмовляли. = Ідучи парком, ми розмовляли. (дієприслівник — лаконічніше). Підрядне речення обов'язкове, коли суб'єкти дії різні: Коли мама готувала, тато прибирав."
  - section: "Різночасність: коли, щойно, після того як, перш ніж"
    words: 750
    points:
      - "Коли для послідовності (дієслово доконаного виду в підрядній частині): Коли ми прийшли додому, почався дощ. (прийшли → потім пішов дощ). Коли він закінчив роботу, пішов додому. (закінчив → потім пішов). Правило: доконаний вид у підрядній частині = дія завершилася до початку дії головної частини."
      - "Щойно/як тільки (безпосередня послідовність): Щойно він зайшов, усі замовкли. Як тільки вона побачила його, усміхнулася. Ці сполучники підкреслюють миттєвість дії."
      - "Після того як та перш ніж/перед тим як: Після того як ми пообідали, пішли на прогулянку. Перш ніж виходити, перевір, чи взяв ключі. Перед тим як почати, прочитайте інструкцію."
      - "Зв'язок із дієприслівниками (модуль №62): Після того як прочитав книгу, я віддав її. = Прочитавши книгу, я віддав її. Практика: 8 речень — висловити ті самі часові відношення за допомогою часового речення та дієприслівника."
  - section: "Дієвидові та часові кореляції"
    words: 650
    points:
      - "Вид визначає часові відношення: Одночасність: недок. + недок. — Коли я читав, вона спала. Послідовність: док. + док. — Коли я прочитав, я заснув. Змішаний тип: док. + недок. — Коли пішов дощ, ми ще гуляли. (дощ почався під час нашої прогулянки)."
      - "Узгодження часів: Минулий: Коли сонце зайшло, стало темно. Теперішній (регулярний): Коли я приходжу додому, завжди п'ю чай. Майбутній: Коли приїдеш, зателефонуй. (наказовий спосіб у головній частині)."
      - "Практика: обрати правильний вид і час дієслова у 8 часових конструкціях."
  - section: "Практика: часові речення в контексті"
    words: 650
    points:
      - "Текст для читання: розповідь із щільною часовою структурою. Учні знаходять усі часові підрядні, визначають одночасність чи різночасність та звертають увагу на вибір сполучника."
      - "Діалог з часовими реченнями: планування графіка, обговорення послідовності подій. Природне вживання коли, поки, щойно."
      - "Продукція: написати 6-8 речень про свій день, використовуючи різні часові сполучники. Щонайменше 2 речення на одночасність, 2 — на різночасність."
  - section: "Підсумок та перехід до модуля №70"
    words: 450
    points:
      - 'Підсумок: часові = коли? відколи? доки? Одночасність (поки, коли + недок. вид) та різночасність (щойно, після того як, перш ніж, коли + док. вид). Самоперевірка: Я розрізняю одночасність і різночасність ✓/✗.'
      - "Анонс: модуль №70 — Речення причини. Чому відбуваються події: бо, тому що."
vocabulary_hints:
  required:
    - "підрядне обставинне часу (temporal subordinate clause)"
    - "коли (when — main temporal conjunction)"
    - "поки/доки (while, until — duration)"
    - "щойно (as soon as — immediate sequence)"
    - "як тільки (as soon as — synonym of щойно)"
    - "перш ніж (before)"
    - "після того як (after)"
    - "одночасність (simultaneity)"
    - "різночасність (non-simultaneity)"
    - "послідовність (sequence)"
  recommended:
    - "перед тим як (before — synonym of перш ніж)"
    - "з тих пір як (since — from the time that)"
    - "доти...доки (until)"
    - "відколи (since when)"
    - "кореляція (correlation — aspect/tense matching)"
