  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему підрядні обставинні часу."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему одночасність: коли, поки."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Підрядні обставинні часу»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Одночасність: коли, поки» з їхніми визначеннями."
