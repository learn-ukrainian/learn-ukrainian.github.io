module: b1-006
level: B1
sequence: 6
slug: people-and-relationships
version: '3.0'
title: "Людина i стосунки"
subtitle: "Зовнiшнiсть, характер, родина та знайомство"
focus: communication
pedagogy: PPP
phase: "B1.1 [Metalanguage Bridge & Foundation]"
word_target: 4000
objectives:
- "Learner can describe a person's appearance in Ukrainian using портретна
  лексика: зрiст, постава, статура, обличчя, волосся, очi"
- "Learner can characterize a person's personality using Ukrainian adjectives
  for character traits (щирий, лагiдний, кмiтливий, вередливий, чуйний)"
- "Learner can name family members and relationship types using precise
  Ukrainian vocabulary, distinguishing близькi/далекi родичi"
- "Learner can introduce people, describe relationships, and navigate
  social situations using appropriate Ukrainian formulas (знайомство,
  вiдрекомендувати, представити)"
- "Learner can write a structured опис зовнiшностi людини following
  the Ukrainian school composition model (зачин — основна частина — кiнцiвка)"
content_outline:
- section: "Зовнiшнiсть людини: портретна лексика (Appearance: portrait vocabulary)"
  words: 700
  points:
  - "Introduction grounded in Авраменко Grade 7 p.100:
    Опис зовнiшностi людини — вiдтворення її iндивiдуального вигляду
    за допомогою засобiв мови. Зазвичай опис зовнiшностi є частиною
    розповiдi. У ньому називають: 1) частини тiла; 2) риси обличчя;
    3) одяг та його елементи."
  - "Systematic vocabulary from Авраменко Grade 7 p.101 — портретна лексика:
    Вiк: молодий, зрiлий, юний, лiтнiй, пiдлiтковий.
    Постава/статура: повний, худий, кремезний, тендiтний, стрункий,
    широкоплечий, приземкуватий.
    Зрiст: високий, середнього зросту, невисокий.
    Волосся: кучеряве, пряме, русяве, каштанове, свiтле, темне.
    Обличчя: вродливе, виразне, нiжне, повне, худорляве, рум'яне,
    смагляве, блiде."
  - "Practice: learners read a literary portrait excerpt and identify
    портретна лексика by categories. Then describe a classmate, friend,
    or family member using the same structure."
  - "Cultural note: Ukrainian approach to description emphasizes внутрiшнiй
    свiт through зовнiшнiсть. Заболотний Grade 7 p.248: 'У художньому
    текстi через елементи зовнiшньої характеристики письменник показує
    внутрiшнiй свiт персонажа, його характер, життя.'"
- section: "Характер людини: риси i оцiнка (Character: traits and evaluation)"
  words: 700
  points:
  - "Positive character traits (with VESUM-verified adjectives):
    щирий (sincere), лагiдний (gentle), чуйний (sensitive/responsive),
    привiтний (welcoming), кмiтливий (quick-witted), стриманий (reserved),
    товариський (sociable), вiдповiдальний (responsible), працьовитий
    (hardworking), наполегливий (persistent), справедливий (fair)."
  - "Negative/neutral character traits:
    вередливий (capricious), впертий (stubborn), замкнутий (withdrawn),
    нетерплячий (impatient), балакучий (talkative), лiнивий (lazy),
    заздрiсний (envious), самовпевнений (self-confident/arrogant).
    Note: some traits are context-dependent — впертий can be positive
    (persistent) or negative (obstinate)."
  - "Describing character in context: common patterns.
    Вiн/вона — людина + adjective: 'Вона — людина чуйна i щира.'
    За характером: 'За характером вiн стриманий, але товариський.'
    Йому/їй властиво + infinitive: 'Їй властиво допомагати iншим.'
    Practice: learners describe character traits of Ukrainian literary
    or historical figures using these patterns."
  - "Distinguishing synonyms and near-synonyms:
    щирий vs чесний (sincere vs honest — overlap but different emphasis).
    лагiдний vs нiжний vs м'який (gentle vs tender vs soft — register).
    Learners choose the most appropriate adjective in context."
- section: "Родина i родичi (Family and relatives)"
  words: 600
  points:
  - "Core family vocabulary (B1 expansion beyond A1-A2 basics):
    Близькi родичi: батько, мати (мама), син, дочка (донька), брат,
    сестра, чоловiк (husband), дружина (wife), подружжя (married couple).
    Далекi родичi: дядько, тiтка, племiнник, племiнниця, двоюрiдний
    брат/сестра, свекруха, теща, зять, невiстка."
  - "Ukrainian kinship precision — terms that English lacks:
    свекруха (husband's mother) vs теща (wife's mother) — English uses
    'mother-in-law' for both. Similarly: свекор vs тесть (father-in-law),
    зять (son-in-law or sister's/daughter's husband),
    невiстка (daughter-in-law or brother's wife).
    This precision reflects the importance of родиннi зв'язки
    in Ukrainian culture."
  - "Родина as a cultural concept: Ukrainian sayings about family.
    'У родинi — сила.' 'Де злагода в сiмействi — там i добро.'
    The word рiд connects to родина, Батькiвщина, народ —
    a semantic field that links family to nation."
  - "Practice: learners draw and label a family tree using Ukrainian terms,
    then describe relationships using genitive constructions:
    'Оксана — дочка мого дядька' (Оксана is my uncle's daughter)."
- section: "Стосунки мiж людьми (Relationships between people)"
  words: 500
  points:
  - "Types of relationships — precise Ukrainian vocabulary
    (from Ворон Grade 9 p.22 — semantic distinctions):
    стосунки (interpersonal relations, how people interact),
    вiдносини (formal/official relations, ratio),
    ставлення (attitude toward someone/something),
    взаємини (mutual relations, reciprocal).
    Common error: using вiдносини for personal relationships
    (correct: стосунки)."
  - "Relationship vocabulary:
    дружба (friendship), знайомство (acquaintance),
    кохання (romantic love), повага (respect),
    довiра (trust), пiдтримка (support),
    суперечка (argument/dispute), примирення (reconciliation).
    Verbs: дружити, товаришувати, кохати, поважати, довiряти,
    пiдтримувати, сваритися, миритися."
  - "Practice dialogue: two friends discussing their relationships
    with family and colleagues, using the vocabulary above."
- section: "Знайомство i представлення (Meeting and introducing people)"
  words: 550
  points:
  - "Formulas of introduction from Литвiнова Grade 7 p.205:
    Formal: 'Дозвольте вiдрекомендуватися — мене звати...'
    'Дозвольте представити вам мого колегу...'
    'Дуже приємно з вами познайомитися.'
    Semi-formal: 'Познайомтеся, будь ласка, — це мiй друг...'
    Informal: 'Це Андрiй, мiй однокласник.' 'Привiт, я Марiя.'"
  - "Cultural protocol from Литвiнова Grade 7 p.205:
    Younger person is introduced to the older person first.
    A man is introduced to a woman. If there is no intermediary,
    one can introduce oneself. After the introduction, appropriate
    responses: 'Дуже приємно,' 'Радий/рада з вами познайомитися.'
    At the end of the conversation: 'Дякую, що придiлили час.'"
  - "Кличний вiдмiнок in introductions and address:
    Review: Андрiю! Марiє! Тетяно Iванiвно!
    B1 expansion: formal address patterns with iм'я по батьковi.
    Practice: learners role-play introductions in formal and informal
    settings."
  - "Practice dialogue: introducing a Ukrainian friend to your family,
    switching between formal and informal register as appropriate."
- section: "Опис людини: як писати портрет (Writing a character portrait)"
  words: 600
  points:
  - "Composition structure from Заболотний Grade 7 p.251 — план
    твору-опису зовнiшностi людини:
    I. Зачин (хто ця людина — who is this person).
    II. Основна частина:
      1. Що найперше впадає в очi в її зовнiшностi.
      2. Зрiст, постава, хода, мiмiка, жести.
      3. Риси обличчя, вираз обличчя, погляд, очi, волосся.
      4. Одяг.
    III. Кiнцiвка (загальне враження — general impression)."
  - "Художнi засоби in portrait writing from Заболотний Grade 7 p.251:
    Епiтети: 'сивий, як голуб, увесь бiлий-бiлий, чистий, аж свiтиться.'
    Порiвняння: 'очi, як волошки,' 'стрункий, наче тополя.'
    Зменшувально-пестливi слова: 'оченята, рученьки, кучерики.'
    Портретна деталь — one vivid detail that defines the person:
    from Авраменко Grade 5 p.259: 'зображення лише однiєї, але
    прикметної, дуже яскравої риси зовнiшностi.'"
  - "Model portrait in Ukrainian (adapted literary excerpt) with
    analysis of structure and artistic devices. Learners then write
    their own 8-10 sentence portrait of someone they know."
- section: "Пiдсумок: людина у словах (Summary: describing people)"
  words: 350
  points:
  - "Complete vocabulary reference — all terms organized by category:
    зовнiшнiсть (appearance), характер (character),
    родина (family), стосунки (relationships), знайомство (meeting).
    Glossary with Ukrainian definitions for self-study."
  - "Self-check in Ukrainian:
    1. Опишiть зовнiшнiсть вашого друга/подруги (5-7 речень).
    2. Назвiть 5 позитивних i 3 негативних рис характеру.
    3. Яка рiзниця мiж словами стосунки, ставлення, вiдносини?
    4. Представте свого друга колезi (формально i неформально)."
  - "Preview of checkpoint module: Контрольна робота 1 (M07) —
    testing metalanguage, verb tenses, aspect, and descriptions."
vocabulary_hints:
  required:
  - "зовнiшнiсть (appearance — a person's outward look)"
  - "характер (character — a person's inner qualities)"
  - "стосунки (interpersonal relationships — how people interact)"
  - "родичi (relatives — people connected by family)"
  - "знайомство (acquaintance / the act of meeting someone)"
  - "вродливий (beautiful/handsome — describing a person)"
  - "кремезний (stocky/sturdy — of strong build)"
  - "тендiтний (slender/delicate — of light build)"
  - "щирий (sincere — genuine in feelings)"
  - "лагiдний (gentle — soft in manner)"
  - "кмiтливий (quick-witted — mentally sharp)"
  - "чуйний (sensitive/responsive — attentive to others)"
  - "подружжя (married couple — husband and wife together)"
  - "вiдрекомендуватися (to introduce oneself — formal register)"
  - "портретна деталь (portrait detail — one defining visual feature)"
  - "постава (posture/bearing — how a person holds their body)"
  recommended:
  - "статура (build/stature — body type)"
  - "смаглявий (swarthy/dark-skinned)"
  - "кучерявий (curly-haired)"
  - "стриманий (reserved/restrained — in behavior)"
  - "привiтний (welcoming/friendly)"
  - "вередливий (capricious/picky)"
  - "товариський (sociable/companionable)"
  - "дружба (friendship)"
  - "кохання (romantic love)"
  - "довiра (trust)"
  - "примирення (reconciliation)"
  - "кличний вiдмiнок (vocative case — used in direct address)"
