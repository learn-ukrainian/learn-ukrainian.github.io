  items: 10
- type: quiz
  focus: "Identify character traits as позитивнi чи негативнi, and choose
    the correct adjective for a given description."
  items: 8
- type: fill-in
  focus: "Complete a portrait description: fill in missing adjectives
    and relationship terms in a Ukrainian text about a family."
  items: 8
- type: free-write
  focus: "Write a structured portrait (зачин — основна частина — кiнцiвка)
