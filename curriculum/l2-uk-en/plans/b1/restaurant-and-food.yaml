module: b1-020
level: B1
sequence: 20
slug: restaurant-and-food
version: '1.0.2'
title: 'Ресторан і їжа'
subtitle: 'Українська кухня, замовлення у ресторані та відмінювання іменників у контексті їжі'
focus: thematic-vocabulary
pedagogy: TTT
phase: 'B1.1 [Морфонологія]'
word_target: 4000
objectives:
  - 'Вміти називати українські страви, інгредієнти та категорії їжі, використовуючи автентичну лексику: борщ, вареники, деруни, галушки, пампушки, узвар, сало'
  - 'Вміти замовляти їжу в ресторані за допомогою природних українських фраз: Я б хотів/хотіла..., Принесіть, будь ласка..., Що ви порадите?'
  - 'Вміти використовувати правильні форми відмінків у харчових контекстах, зокрема родовий частковий (тарілка борщу, склянка узвару, шматок сала) та знахідний для замовлення (Замовлю вареники, візьму салат)'
  - 'Вміти описувати смак, текстуру та способи приготування за допомогою українських прикметників і дієприкметників: смачний, гострий, солоний, варений, смажений, запечений'
dialogue_situations:
  - setting: 'Ресторан в Одесі — пара замовляє вечерю, обговорюючи меню: Що порадите на перше? — Спробуйте наш борщ із пампушками. А на друге? — Рекомендую вареники з картоплею. Ще склянку узвару, будь ласка.'
    speakers:
      - Офіціант
      - Гостя
    motivation: 'Сценарій замовлення в ресторані: порадити/спробувати, родовий частковий (борщу, узвару), з + орудний (з пампушками, з картоплею).'
  - setting: 'Друзі у Карпатській колибі обговорюють українську кухню: Ти вже куштував бануш? — Ні, але чув, що це гуцульська страва. Треба спробувати! А деруни тут неймовірні.'
    speakers:
      - Максим
      - Юлія
    motivation: 'Обговорення їжі: куштувати (досвід) vs спробувати (одноразова дія). Лексика регіональної кухні. Узгодження прикметників: гуцульська страва.'
content_outline:
  - section: 'Українська кухня: страви і продукти'
    words: 1000
    points:
      - 'Традиційні українські страви — систематична лексика: Перші страви: борщ (найголовніший український суп; різновиди: червоний, зелений, холодний), юшка (рибний або легкий бульйон), капусняк, розсольник. Другі страви: вареники (з картоплею, з сиром, з вишнями), деруни (картопляні оладки), голубці, галушки (подаються в бульйоні або із соусом).'
      - 'Більше страв і гарнірів: пампушки (булочки з часником, подаються до борщу), млинці (тонкі млинці — з м''ясом, з сиром, з варенням), каша (гречана, пшенична, вівсяна), сало (іконічний український продукт). Напої: узвар (компот із сухофруктів — традиційний різдвяний напій), компот (фруктовий напій), кисіль.'
      - 'Категорії їжі та інгредієнти: м''ясо, риба, овочі, фрукти, крупи, молочне, спеції. Ключові інгредієнти: картопля, цибуля, часник, буряк, капуста, сметана (обов''язковий додаток).'
      - 'Прикметники смаку і текстури: смачний, гострий, солоний, кислий, солодкий, гіркий, свіжий, ніжний. Способи приготування як прикметники: варений, смажений, запечений, тушкований, копчений.'
  - section: 'У ресторані: замовлення і спілкування'
    words: 1000
    points:
      - 'Лексика ресторану: ресторан, кафе (невідм.), їдальня, меню (невідм.), офіціант/офіціантка, замовлення, рахунок, чайові (множина), порція, гарнір, закуска.'
      - 'Патерни замовлення — природна українська (на основі моделі ситуативного мовлення Литвінової, 7 клас, с.205): Ввічливе прохання: Принесіть, будь ласка, борщ із пампушками. Умовний спосіб: Я б хотів/хотіла замовити... Запитання: Що ви порадите? Що є сьогодні на перше/друге/десерт? Уточнення: Мені, будь ласка, вареники з картоплею та сметаною.'
      - 'Родовий частковий у контексті їжі (Заболотний, 8 клас, с.22 — функції родового відмінка): Після слів, що означають кількість: тарілка борщу (Р.в.), склянка узвару (Р.в.), шматок хліба (Р.в.), ложка меду (Р.в.), порція вареників (Р.в. множини). Часткове значення родового відмінка: Дайте хліба. Покладіть сметани. Налийте узвару. Це природна українська мова — родовий відмінок виражає значення "певна частина чогось".'
      - 'Практичний діалог: повний сценарій у ресторані від входу до оплати. Учні відпрацьовують: привітання (Добрий вечір, у вас є вільний столик?), замовлення (Мені, будь ласка...), запитання (А це з чим подається?), прохання рахунку (Можна рахунок?), оплату та чайові.'
  - section: 'Відмінки в контексті їжі'
    words: 1000
    points:
      - 'Форми підкласів іменників у харчовій лексиці — морфонологічний огляд: Чоловічий рід у родовому відмінку: борщу (не *борща — часткове закінчення -у для незлічуваних/речовинних іменників), узвару, хліба, меду, сиру. Але: вареника (Р.в. одн., злічуваний), деруна (Р.в. одн., злічуваний). Огляд правил: -у/-ю для абстрактних, речовинних, незлічуваних; -а/-я для злічуваних, конкретних (Заболотний, 6 клас, с.47).'
      - 'Орудний відмінок з їжею: з + орудний для додатків та інгредієнтів: борщ із пампушками (Ор.в. мн.), вареники з картоплею (Ор.в. одн.), млинці з м''ясом (Ор.в. одн.), кава з молоком (Ор.в. одн.), чай із цукром (Ор.в. одн.). Зверніть увагу на чергування із/з залежно від наступного приголосного.'
      - 'Знахідний відмінок для замовлення (прямий додаток): Замовлю борщ (Зн.в. = Н.в.), візьму каву (Зн.в.), принесіть салат (Зн.в. = Н.в.). Для іменників жіночого роду: замовити каву (Зн.в. -у), порцію (Зн.в. -ю), закуску (Зн.в. -у). Практика розрізнення знахідного та родового часткового: Дайте каву (Зн.в., конкретну порцію) vs Дайте кави (Р.в., часткове значення — трохи кави).'
      - 'Практика: учні пишуть відгук про ресторан, природно використовуючи всі відмінки. Описують, що замовили (Зн.в.), з чим це подавалося (Ор.в.), скільки чогось дали (Р.в. частковий) та загальне враження.'
  - section: 'Підсумок: їжа і мова'
    words: 1000
    points:
      - 'Словниковий підсумок за категоріями: страви (борщ, вареники, деруни, галушки, голубці, пампушки, млинці), продукти (м''ясо, риба, овочі, крупи, молочне), смак (смачний, гострий, солоний, кислий, солодкий), приготування (варений, смажений, запечений, тушкований), ресторан (меню, офіціант, замовлення, рахунок, чайові).'
      - 'Культурна довідка: Українська культура харчування — їжа глибоко пов''язана з ідентичністю. Борщ внесено до списку Нематеріальної культурної спадщини ЮНЕСКО. Вареники, пампушки і деруни є маркерами регіонів. Їжа об''єднує людей: фраза «Просимо до столу!» є запрошенням до спільноти.'
      - 'Таблиця відмінків для "їстівних" іменників: борщ — борщу (Р.в. частк.), борщ (Зн.в.), борщем (Ор.в.). вареники — вареників (Р.в. мн.), вареники (Зн.в. мн.), з варениками (Ор.в. мн.). кава — кави (Р.в. частк.), каву (Зн.в.), з кавою (Ор.в.). сметана — сметани (Р.в. частк.), сметану (Зн.в.), зі сметаною (Ор.в.).'
      - 'Самоперевірка: 1. Назвати 5 традиційних українських страв і описати їх. 2. Замовити обід у ресторані: перше, друге, напій (з правильними відмінками). 3. Пояснити різницю: «Дайте каву» vs «Дайте кави». 4. Написати відгук про ресторан (5-8 речень), вживаючи знахідний, родовий та орудний відмінки.'
vocabulary_hints:
  required:
    - "страва (dish/course — a prepared food item)"
    - "борщ (borscht — quintessential Ukrainian beet soup)"
    - "вареники (varenyky — filled dumplings, pl of вареник)"
    - "деруни (potato pancakes — pl of дерун)"
    - "пампушки (garlic bread rolls — served with борщ, pl of пампушка)"
    - "сало (cured pork fat — iconic Ukrainian product)"
    - "узвар (dried fruit compote — traditional Ukrainian drink)"
    - "меню (menu — невідмінюване noun)"
    - "замовлення (order — the act of ordering food)"
    - "офіціант (waiter — masc; fem: офіціантка)"
    - "рахунок (bill/check — restaurant bill)"
    - "гарнір (side dish — served with a main course)"
    - "закуска (appetizer/starter — first course before soup)"
    - "кухня (cuisine/kitchen — both meanings in Ukrainian)"
    - "порція (portion — a serving of food)"
  recommended:
    - "чайові (tip — plural noun, від чай)"
    - "смачний (tasty/delicious)"
    - "гострий (spicy/sharp — taste)"
    - "смажений (fried — cooking method)"
    - "запечений (baked — cooking method)"
    - "тушкований (stewed — cooking method)"
    - "сметана (sour cream — essential Ukrainian condiment)"
activity_hints:
  - type: match-up
    focus: 'З''єднати українські страви з їхніми описами: інгредієнти, спосіб приготування.'
  - type: fill-in
    focus: 'Доповнити діалог у ресторані: правильні відмінкові форми іменників (родовий частковий, знахідний, орудний).'
  - type: quiz
    focus: 'Визначити правильну форму: борщу чи борща? кави чи каву? Пояснити вибір відмінка.'
  - type: group-sort
    focus: 'Розподілити лексику: перші страви, другі страви, напої, десерти, прибори.'
  - type: role-play
    focus: 'Розіграти сцену в ресторані: замовлення, запитання офіціанту, прохання принести рахунок.'
  - type: open-writing
    focus: 'Написати відгук про ресторан: що замовили, як було приготовано, загальне враження (5-8 речень).'
connects_to:
  - 'b1-016 (Підкласи іменників чоловічого роду — поглиблення розрізнення -у/-а у родовому відмінку)'
  - 'b1-018 (Підкласи іменників жіночого роду — практика орудного відмінка жіночого роду)'
  - 'b1-003 (Соціальна лексика для ситуацій харчування)'
  - 'b1-051 (Ступені порівняння — для опису їжі)'
prerequisites:
  - 'Завершення А2 (базова лексика про їжу, базові форми відмінків)'
  - 'b1-013 до b1-019 (основи морфонології, підкласи іменників)'
grammar:
  - 'Родовий частковий відмінок: тарілка борщу, склянка узвару, шматок хліба'
  - 'Родовий відмінок -у/-ю vs -а/-я в чоловічому роді: борщу (речовинний) vs вареника (злічуваний)'
  - 'Орудний відмінок із з/із для додатків до їжі: з пампушками, з картоплею'
  - 'Знахідний відмінок vs родовий частковий: Дайте каву (конкретну) vs Дайте кави (трохи)'
  - 'Невідмінювані іменники: меню, кафе'
register: розмовно-побутовий
