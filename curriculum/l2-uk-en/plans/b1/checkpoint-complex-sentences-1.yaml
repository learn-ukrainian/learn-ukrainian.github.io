slug: checkpoint-complex-sentences-1
version: '2.0'
title: 'Контрольна точка: складні речення (частина 1)'
subtitle: Checkpoint - Complex Sentences Part 1
content_outline:
- section: Огляд
  points:
  - Review learning objectives — focus on learner autonomy and self-assessment terms
    (оцінювання, результат)
  - Set checkpoint goals — use term «контрольна точка» (фінальна/ключова) to frame
    the milestone
- section: 'Skill 1: Відносні речення'
  points:
  - 'який in all cases — learner error: failure to agree «який» in gender/number/case
    (e.g., дівчина, який...); learner error: preposition stranding (дім, який я живу
    в...)'
  - 'Place relatives (де, куди, звідки) — aligns with Standard §4.4.3: relative clauses
    with explanatory subordinate parts'
  - 'Time/fact relatives (коли, що) — cultural hook: the «Symphonic Syntax» of Ukrainian
    literature (Gogol, Ukrainka) weaving multiple thoughts'
- section: 'Skill 2: Підрядні речення мети'
  points:
  - щоб + infinitive (same subject) — mastery checkpoint for purpose clauses defined
    in Standard
  - щоб + past form (different subjects) — verify correct usage of past tense forms
    in subordinate purpose clauses
- section: 'Skill 3: Умовні речення'
  points:
  - 'Real conditionals (якщо) — learner error: The «Якби vs Якщо» Trap (using якщо
    for unreal situations)'
  - 'Unreal conditionals (якби) — Standard §4.4.3 distinction: real vs. unreal/hypothetical
    conditions'
  - Mixed conditionals — strict distinction between real possibility and hypothetical
    scenarios
- section: Integration Challenge
  points:
  - Comprehensive test — apply criteria for «критерії оцінювання» and «формувальне
    оцінювання»
  - Mixed sentence types — combining relative, purpose, and conditional clauses to
    create «panoramic» views of reality
- section: Практика
  points:
  - Error analysis — focus on relative pronoun agreement and preposition placement
    errors
  - Identify areas for review — emphasize «самооцінювання» (self-assessment) to foster
    autonomy
vocabulary_hints:
  required:
  - контрольна точка (checkpoint) — пройти контрольну точку, фінальна контрольна точка,
    ключова точка
  - повторення (review) — інтервальне повторення, повторення вивченого, мати вигляд
    повторення
  - оцінювання (assessment) — критерії оцінювання, формувальне оцінювання, самооцінювання,
    система оцінювання
  - інтеграція (integration) — процес інтеграції, інтеграція знань, європейська інтеграція,
    повна інтеграція
  - речення (sentence) — складне речення, просте речення, головне/підрядне речення,
    будувати речення
  - правильний (correct) — context of accuracy in grammar checks
  - помилка (error) — identifying specific syntactic errors
  - результат (result) — outcome of the checkpoint assessment
  recommended:
  - самооцінка (self-assessment) — critical for checkpoint modules
  - прогрес (progress) — tracking learning over the module arc
  - рівень (level) — defining proficiency
  - готовність (readiness) — readiness for next phase
