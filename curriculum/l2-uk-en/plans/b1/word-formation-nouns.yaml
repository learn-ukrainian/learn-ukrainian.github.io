module: b1-043
level: B1
sequence: 43
slug: word-formation-nouns
version: '3.0'
title: "Творення назв осіб і місць"
subtitle: "Суфікси для назв людей за діяльністю та назв приміщень і місць"
focus: grammar
pedagogy: PPP
phase: "B1.5 [Degrees of Comparison & Word Formation]"
word_target: 4000
objectives:
- "Learner can form agent nouns (назви осіб за діяльністю) using productive
  suffixes: -ач/-ач(к)а, -ець/-иця, -ник/-ниця, -тель/-телька, -ар/-ярка,
  -ист/-істка, -ант/-антка"
- "Learner can form place nouns (назви місць і приміщень) using suffixes
  -ня, -ість, -ство, and prefixal-suffixal patterns (при-...-я, за-...-я)"
- "Learner can form feminine counterparts of masculine agent nouns correctly,
  knowing which suffixes change and which do not"
- "Learner can form nouns from verbs (віддієслівні іменники) using suffixes
  -ння/-ття/-ство and the безафіксний method (підпис ← підписати)"
- "Learner can identify the word formation method (суфіксальний, префіксальний,
  префіксально-суфіксальний, безафіксний) for any given derived noun"
content_outline:
- section: "Назви осіб за діяльністю (Agent nouns)"
  words: 900
  points:
  - "Core suffixes for agent nouns from Заболотний Grade 6 p.57:
    -ач: читач, слухач, викладач (from verbs: читати, слухати, викладати)
    -ець: борець, плавець, творець (from verbs: боротися, плавати, творити)
    -ник: працівник, помічник, захисник (from nouns/adj: праця, поміч, захист)
    -тель: вчитель, вихователь, мислитель (from verbs: вчити, виховувати)
    -ар/-яр: пекар, школяр, лікар (from nouns: піч/пекти, школа, лік/лікувати)
    -ист: журналіст, піаніст, оптиміст (from nouns: журнал, піано, оптимізм)"
  - "Feminine counterparts — systematic formation:
    -ач → -ачка: читач → читачка, слухач → слухачка
    -ець → -иця: борець → борчиня (note: irregular), плавець → плавчиня
    -ник → -ниця: працівник → працівниця, захисник → захисниця
    -тель → -телька: вчитель → вчителька
    -ар → -ярка: пекар → пекарка, школяр → школярка
    -ист → -істка: журналіст → журналістка, піаніст → піаністка
    Cultural note: Ukrainian naturally forms feminine agent nouns —
    using them is standard, not a feminist neologism."
  - "Suffixes for назви осіб за національністю, місцем проживання:
    -ець: українець, одесець, львів'янин → львів'янець
    -ин: киянин, львів'янин, селянин (with plural -и truncated: кияни)
    -ак/-як: поляк, словак
    Feminine: -ка: українка, полька; -иня: киянка (not *киянинка)"
- section: "Творення назв місць і приміщень (Place nouns)"
  words: 700
  points:
  - "Suffixes for назви приміщень:
    -ня: пекарня (де печуть), читальня (де читають), бібліотека (borrowed)
    -ниця: лікарня (archaic: лічниця), робітниця (workshop, archaic)
    -тека: бібліотека, фонотека, відеотека (Greek-origin suffix)"
  - "Prefixal-suffixal formation for geographic/spatial nouns:
    при- + -я: Прикарпаття (при Карпатах), Придніпров'я (при Дніпрі)
    за- + -я: Закарпаття (за Карпатами), Запоріжжя (за порогами)
    під- + -я: Поділля (під горами — etymological)
    над- + -я: Наддніпрянщина (over the Dnieper region)"
  - "Abstract nouns with -ість, -ство, -ота:
    -ість: молодість, радість, мудрість (from adjectives)
    -ство: козацтво, студентство, людство (collective/abstract)
    -ота: краса → красота, висота, доброта
    Practice: form place and abstract nouns from 12 base words."
- section: "Віддієслівні іменники (Nouns from verbs)"
  words: 600
  points:
  - "Suffixes -ння/-ття from Литвінова Grade 6 p.83:
    читати → читання, вивчати → вивчення, писати → писання
    жити → життя, прибути → прибуття, відкрити → відкриття
    These are verbal nouns — they name the process or result of an action."
  - "Безафіксний спосіб (Литвінова Grade 6 p.83):
    підписати → підпис, переходити → перехід, бігти → біг
    The noun is formed by removing the verb suffix and ending.
    This method is productive in Ukrainian and creates many common nouns."
  - "Spelling rules: -інн(я) vs -енн(я) vs -інн(я):
    -інн(я): кипіння, горіння (from verbs on -іти)
    -енн(я): здійснення, вивчення (from verbs on -ити with е)
    Practice: form verbal nouns from 10 verbs and determine the correct suffix."
- section: "Словотвірний ланцюжок (Word formation chains)"
  words: 500
  points:
  - "From Заболотний Grade 6 p.57: words form derivational chains:
    вода → водний → водник → підводник
    ліс → лісовий → лісник → лісництво
    школа → школяр → школярка → школярство
    Each link adds one morpheme. The chain shows how Ukrainian builds
    vocabulary systematically."
  - "Practice: build derivational chains of 4-5 links from base words:
    море, писати, вчити, друг, місто.
    Then reverse: given a derived word, trace back to the base."
- section: "Практика в контексті (Practice in context)"
  words: 600
  points:
  - "Reading passage: a newspaper article about a new community centre,
    using agent nouns (працівники, вчителі, читачі) and place nouns
    (читальня, спортзал, пекарня) naturally. Learners identify all
    derived nouns and analyze their formation."
  - "Dialogue: two people discussing professions and workplaces.
    'Де працює пекар? У пекарні. А лікар? У лікарні.
    А де працює викладач? В університеті.' Learners extend the pattern."
  - "Self-check: form agent nouns (m. and f.) for 8 activities,
    form place nouns for 6 locations, build 3 word formation chains."
- section: "Підсумок (Summary)"
  words: 200
  points:
  - "Reference tables: agent noun suffixes (m. → f.), place noun suffixes,
    verbal noun suffixes, word formation methods.
    Preview: next module applies word formation in a shopping/services context."
vocabulary_hints:
  required:
  - "словотвір (word formation)"
  - "назва особи (agent noun — noun naming a person by activity)"
  - "назва місця (place noun — noun naming a location)"
  - "віддієслівний (deverbal — derived from a verb)"
  - "безафіксний (zero-derivation — formed by dropping affixes)"
  - "словотвірний ланцюжок (derivational chain — sequence of derived words)"
  - "пекарня (bakery — place noun from пекар)"
  - "читальня (reading room — place noun from читати)"
  - "читач (reader — agent noun from читати)"
  - "працівник (worker — agent noun from праця)"
  recommended:
  - "продуктивний суфікс (productive suffix — actively used in new formations)"
  - "непродуктивний (unproductive — no longer used for new words)"
  - "збірний іменник (collective noun — козацтво, студентство)"
  - "віддієслівний іменник (verbal noun — читання, життя)"
  - "основа (stem — the part of a word without the ending)"
  - "мотивувальне слово (motivating word — base of derivation)"
