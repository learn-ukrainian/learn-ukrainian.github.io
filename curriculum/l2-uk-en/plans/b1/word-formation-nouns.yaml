  - "Творення жіночих форм: -ачка, -иця, -ниця, -телька, -ярка, -істка"
  - "Суфікси назв місць: -ня, -ниця, -тека"
  - "Префіксально-суфіксальне творення: при-...-я, за-...-я, під-...-я"
  - "Віддієслівні іменники: -ння, -ття; безафіксний спосіб"
  - "Словотвірний ланцюжок: послідовне утворення слів"
register: науково-навчальний
