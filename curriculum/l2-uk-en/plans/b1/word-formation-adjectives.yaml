module: b1-048
level: B1
sequence: 48
slug: word-formation-adjectives
version: '3.0'
title: "Творення прикметників"
subtitle: "Як утворюються прикметники від іменників, дієслів і прикметників"
focus: grammar
pedagogy: PPP
phase: "B1.4 [Comparison & Word Formation]"
word_target: 4000
objectives:
  - "Learner can form adjectives from nouns using productive suffixes (-н-, -ськ-/-зьк-/-цьк-,
    -ів-/-їв-, -ичн-/-ічн-, -уват-/-юват-)"
  - "Learner can apply the -н- vs -нн- spelling rule: one -н- in most adjective suffixes,
    double -нн- in -енн(ий)/-анн(ий) (from verbal nouns) and -нн- from stems ending
    in -н- (осінній, денний)"
  - "Learner can form adjectives using prefixes (пре-, без-, над-, анти-, перед-,
    після-) and the prefixal-suffixal method (безхмарний, прибережний)"
  - "Learner can identify consonant alternations in adjective formation (нога-ніжка-ніжний,
    козак-козацький, Париж-паризький)"
  - "Learner can distinguish якісні from відносні прикметники formed by the same suffix
    and understand how context shifts meaning"
  - Learner can form and decline possessive adjectives (присвійні прикметники) 
    like батьків, материн, сестрин, братів
dialogue_situations:
  - setting: 'Art critique at a Київська галерея (f, Kyiv gallery) — describing artwork:
      Ця картина (f) — лісова (from ліс, forest). Ось міський (from місто) пейзаж
      (m, landscape). Синюватий (bluish) колір (m, color). Золотистий (golden) відтінок
      (m, shade).'
    speakers:
      - Мистецтвознавець (art critic)
      - Відвідувач
    motivation: 'Adjective formation: лісовий (-ов-), міський (-ськ-), синюватий (-уват-),
      золотистий (-ист-)'
content_outline:
  - section: "Суфіксальне творення прикметників"
    words: 900
    points:
      - "Most productive method from Литвінова Grade 6 p.208: 'Найбільше прикметників
        утворено за допомогою суфіксів.' Core suffixes for відносні прикметники: -н-:
        зима → зимний, телефон → телефонний -ськ-/-зьк-/-цьк-: Київ → київський, Париж
        → паризький, козак → козацький, Бахмач → бахмацький (Заболотний Grade 7 p.132)"
      - "Suffixes for якісні прикметники (Авраменко Grade 6 p.136): -еньк-/-есеньк-:
        чистенький, малесенький (diminutive quality) -юч-/-ющ-: смачнюча, здоровенюча
        (augmentative quality) -уват-/-юват-: білуватий, синюватий (approximate quality
        — 'somewhat') -ив-/-лив-: вигадливий, кмітливий (characteristic quality)"
      - "The -ськ-/-зьк-/-цьк- alternation rule (Заболотний Grade 7 p.132): Base ending
        in [к] → -цьк-: козак-козацький Base ending in [ж], [з], [с] → -зьк-: Париж-паризький,
        француз-французький Base ending in other consonants → -ськ-: Київ-київський,
        студент-студентський Practice: form adjectives from 12 geographic and social
        nouns."
  - section: Присвійні прикметники
    words: 600
    points:
      - Formation of possessive adjectives from nouns denoting people (and 
        sometimes animals).
      - 'Suffixes: -ів/-їв (батько -> батьків, Сергій -> Сергіїв) and -ин/-їн (мама
        -> материн, Марія -> Маріїн).'
      - 'Declension: they decline like hard-stem adjectives but have short forms in
        Nominative/Accusative singular masculine (батьків дім, not батьківий).'
      - 'Practice: forming possessive adjectives from family members and names.'
  - section: "Написання -Н- і -НН- у прикметниках"
    words: 700
    points:
      - "From Литвінова Grade 6 p.208 and Заболотний Grade 6 p.155: One -н-: суфікс
        -н- added to stem NOT ending in -н-: зима → зимний, лимон → лимонний (wait
        — лимон ends in -н-!). Rule clarification: -нн- appears when stem already
        ends in -н- + suffix -н-: осінь → осінній, день → денний, кінь → кінний, лимон
        → лимонний."
      - "Suffixes -енн(ий)/-анн(ий)/-янн(ий): these come from verbal nouns and always
        have -нн-: здійсненний, нездоланний, незабутенній (archaic). But standard
        adjective suffixes: -ан(ий)/-ян(ий) have one -н-: скляний, дерев'яний, піщаний,
        гречаний."
      - "Practice: complete a table of noun → adjective pairs, marking -н- or -нн-,
        and explain why. Include tricky cases: туманний (туман+н), глиняний (глина+ян)."
  - section: "Префіксальне та префіксально-суфіксальне творення"
    words: 600
    points:
      - "Prefix formation (Авраменко Grade 6 p.136): пре-: прегарний, предобрий (emphatic
        quality) без-/бес-: безмежний, безхмарний (absence of quality) над-: надзвичайний,
        надважливий (excessive degree) анти-: антивоєнний, антинауковий (opposition)
        ультра-: ультрамодний, ультрасучасний (extreme)"
      - "Prefixal-suffixal (simultaneous prefix + suffix): при- + -н-: прибережний
        (при березі), прикордонний (при кордоні) без- + -н-: безхмарний (без хмар),
        безсонний (без сну) під- + -н-: підземний (під землею), підводний (під водою)
        Practice: deduce the base noun from the adjective, identify the method."
  - section: "Чергування при творенні"
    words: 500
    points:
      - "Consonant alternations when adding suffixes: [г] → [з']: книга-книжний, нога-ніжний
        (but also ніжка via diminutive) [к] → [ц']: рука-ручний, козак-козацький [х]
        → [с']: муха-мушиний, горох-горошковий These follow the second palatalisation
        patterns from Phase 2."
      - "Vowel alternations: [о/е] → [і] in closed syllables: осінь-осінній (already
        known), ніч-нічний, сіль-сільський. Practice: predict alternations before
        forming adjectives."
  - section: "Складне творення прикметників"
    words: 500
    points:
      - "Compound adjectives formed by joining two stems: With connecting vowel -о-/-е-:
        чорноокий, синьоокий, правобережний. From two adjectives: кисло-солодкий,
        темно-зелений, ніжно-блакитний. Hyphen rule: colour + colour or quality +
        quality = hyphen. Stem + stem with connecting vowel = no hyphen."
      - "Practice: form compound adjectives from word pairs and determine whether
        they need a hyphen. Include geographic compounds: західноукраїнський (but:
        Західна Україна with capital)."
  - section: "Підсумок"
    words: 300
    points:
      - "Formation method summary table: суфіксальний: -н-, -ськ-, -ів-, -уват-, -еньк-
        префіксальний: пре-, без-, над-, анти- пр.-суф.: при-...-н-, без-...-н-, під-...-н-
        складання: stem+о/е+stem"
      - "Preview: next module — how Ukrainian forms nouns for people and places (словотвір
        іменників)."
vocabulary_hints:
  required:
    - "словотвір (word formation — the study of how new words are created)"
    - "суфікс (suffix — morpheme added after the root)"
    - "префікс (prefix — morpheme added before the root)"
    - "префіксально-суфіксальний (prefixal-suffixal — formed by both)"
    - "складний прикметник (compound adjective — formed from two stems)"
    - "сполучна голосна (connecting vowel — -о- or -е- in compounds)"
    - "подвоєння (doubling — as in -нн- in adjectives)"
    - "продуктивний (productive — actively used to form new words)"
    - присвійний прикметник (possessive adjective)
    - батьків (father's)
    - материн (mother's)
  recommended:
    - "зменшувальний (diminutive — -еньк- suffix quality)"
    - "збільшувальний (augmentative — -юч- suffix quality)"
    - "наближений (approximate — -уват- suffix meaning)"
    - "твірна основа (derivational base — the stem from which a word is formed)"
    - "похідне слово (derived word — the newly formed word)"
    - "мотивувальне слово (motivating word — the word from which another is derived)"
