module: b1-048
level: B1
sequence: 48
slug: word-formation-adjectives
version: '3.0.2'
title: "Творення прикметників"
subtitle: "Як утворюються прикметники від іменників, дієслів і прикметників"
focus: grammar
pedagogy: PPP
phase: "B1.4 [Ступені порівняння та словотвір]"
word_target: 4000
objectives:
  - "Студент вміє утворювати прикметники від іменників за допомогою продуктивних суфіксів (-н-, -ськ-/-зьк-/-цьк-, -ів-/-їв-, -ичн-/-ічн-, -уват-/-юват-)"
  - "Студент вміє застосовувати правило написання -н- та -нн-: одне -н- у більшості прикметникових суфіксів, подвоєне -нн- у -енн(ий)/-анн(ий) (від віддієслівних іменників) та -нн- від основ, що закінчуються на -н- (осінній, денний)"
  - "Студент вміє утворювати прикметники за допомогою префіксів (пре-, без-, над-, анти-, перед-, після-) та префіксально-суфіксальним способом (безхмарний, прибережний)"
  - "Студент вміє визначати чергування приголосних при творенні прикметників (нога-ніжка-ніжний, козак-козацький, Париж-паризький)"
  - "Студент вміє розрізняти якісні та відносні прикметники, утворені за допомогою того самого суфікса, і розуміє, як контекст змінює значення"
  - "Студент вміє утворювати та відмінювати присвійні прикметники, такі як батьків, материн, сестрин, братів"
dialogue_situations:
  - setting: 'Мистецька критика в Київській галереї — опис твору мистецтва: Ця картина (f) — лісова. Ось міський пейзаж. Синюватий колір. Золотистий відтінок.'
    speakers:
      - Мистецтвознавець
      - Відвідувач
    motivation: 'Творення прикметників: лісовий (-ов-), міський (-ськ-), синюватий (-уват-), золотистий (-ист-)'
content_outline:
  - section: "Суфіксальне творення прикметників"
    words: 900
    points:
      - "Найпродуктивніший спосіб за Литвіновою (6 клас, с. 208): «Найбільше прикметників утворено за допомогою суфіксів.» Основні суфікси для відносних прикметників: -н-: зима → зимний, телефон → телефонний. -ськ-/-зьк-/-цьк-: Київ → київський, Париж → паризький, козак → козацький, Бахмач → бахмацький (Заболотний, 7 клас, с. 132)."
      - "Суфікси для якісних прикметників (Авраменко, 6 клас, с. 136): -еньк-/-есеньк-: чистенький, малесенький (зменшувально-пестлива якість). -юч-/-ющ-: смачнюча, здоровенюча (збільшувальна якість). -уват-/-юват-: білуватий, синюватий (приблизна якість — «дещо»). -ив-/-лив-: вигадливий, кмітливий (характерна ознака)."
      - "Правило чергування перед -ськ-/-зьк-/-цьк- (Заболотний, 7 клас, с. 132): Основа на [к], [ч], [ц] → -цьк-: козак-козацький. Основа на [ж], [з], [с] → -зьк-: Париж-паризький, француз-французький. Основа на інші приголосні → -ськ-: Київ-київський, студент-студентський. Практика: утворити прикметники від 12 географічних та соціальних іменників."
  - section: "Присвійні прикметники"
    words: 600
    points:
      - "Утворення присвійних прикметників від іменників, що позначають людей (іноді тварин)."
      - "Суфікси: -ів/-їв (батько → батьків, Сергій → Сергіїв) та -ин/-їн (мама → материн, Марія → Маріїн)."
      - "Відмінювання: вони відмінюються як прикметники твердої групи, але мають короткі форми в називному/знахідному відмінках однини чоловічого роду (батьків дім, а не батьківий)."
      - "Практика: утворення присвійних прикметників від назв членів родини та імен."
  - section: "Написання -Н- і -НН- у прикметниках"
    words: 700
    points:
      - "За Литвіновою (6 клас, с. 208) та Заболотним (6 клас, с. 155): Одне -н-: суфікс -н- додається до основи, що НЕ закінчується на -н-: зима → зимний, лимон → лимонний (чекайте — лимон закінчується на -н-!). Уточнення правила: -нн- з'являється, коли основа вже закінчується на -н- + суфікс -н-: осінь → осінній, день → денний, кінь → кінний, лимон → лимонний."
      - "Суфікси -енн(ий)/-анн(ий)/-янн(ий): вони походять від віддієслівних іменників і завжди мають -нн-: здійсненний, нездоланний, незабутенний (архаїчне). Але стандартні прикметникові суфікси -ан(ий)/-ян(ий) мають одне -н-: скляний, дерев'яний, піщаний, гречаний."
      - "Практика: заповнити таблицю пар «іменник → прикметник», позначаючи -н- або -нн- та пояснюючи чому. Включити складні випадки: туманний (туман+н), глиняний (глина+ян)."
  - section: "Префіксальне та префіксально-суфіксальне творення"
    words: 600
    points:
      - "Префіксальне творення (Авраменко, 6 клас, с. 136): пре-: прегарний, предобрий (підсилена якість). без-/бес-: безмежний, безхмарний (відсутність якості). над-: надзвичайний, надважливий (надмірний ступінь). анти-: антивоєнний, антинауковий (протилежність). ультра-: ультрамодний, ультрасучасний (екстремальний)."
      - "Префіксально-суфіксальне (одночасне додавання префікса і суфікса): при- + -н-: прибережний (при березі), прикордонний (при кордоні). без- + -н-: безхмарний (без хмар), безсонний (без сну). під- + -н-: підземний (під землею), підводний (під водою). Практика: визначити базовий іменник від прикметника, назвати спосіб творення."
  - section: "Чергування при творенні"
    words: 500
    points:
      - "Чергування приголосних при додаванні суфіксів: [г] → [з']: книга-книжний, нога-ніжний (але також ніжка через зменшувальну форму). [к] → [ц']: рука-ручний, козак-козацький. [х] → [с']: муха-мушиний, горох-горошковий. Вони відповідають моделям другої палаталізації з Фази 2."
      - "Чергування голосних: [о/е] → [і] в закритих складах: осінь-осінній (вже відомо), ніч-нічний, сіль-сільський. Практика: спрогнозувати чергування перед утворенням прикметників."
  - section: "Складне творення прикметників"
    words: 500
    points:
      - "Складні прикметники, утворені злиттям двох основ: Зі сполучною голосною -о-/-е-: чорноокий, синьоокий, правобережний. Від двох прикметників: кисло-солодкий, темно-зелений, ніжно-блакитний. Правило дефіса: колір + колір або якість + якість = дефіс. Основа + основа зі сполучною голосною = разом (без дефіса)."
      - "Практика: утворити складні прикметники з пар слів і визначити, чи потрібен дефіс. Включити географічні складні слова: західноукраїнський (але: Західна Україна з великої літери)."
  - section: "Підсумок"
    words: 300
    points:
      - "Зведена таблиця способів творення: суфіксальний: -н-, -ськ-, -ів-, -уват-, -еньк-. префіксальний: пре-, без-, над-, анти-. пр.-суф.: при-...-н-, без-...-н-, під-...-н-. складання: основа+о/е+основа."
      - "Анонс: наступний модуль — як українська мова утворює іменники для позначення людей і місць (словотвір іменників)."
vocabulary_hints:
  required:
    - "словотвір (word formation — the study of how new words are created)"
    - "суфікс (suffix — morpheme added after the root)"
    - "префікс (prefix — morpheme added before the root)"
    - "префіксально-суфіксальний (prefixal-suffixal — formed by both)"
    - "складний прикметник (compound adjective — formed from two stems)"
    - "сполучна голосна (connecting vowel — -о- or -е- in compounds)"
    - "подвоєння (doubling — as in -нн- in adjectives)"
    - "продуктивний (productive — actively used to form new words)"
    - "присвійний прикметник (possessive adjective)"
    - "батьків (father's)"
    - "материн (mother's)"
  recommended:
    - "зменшувальний (diminutive — -еньк- suffix quality)"
    - "збільшувальний (augmentative — -юч- suffix quality)"
    - "наближений (approximate — -уват- suffix meaning)"
    - "твірна основа (derivational base — the stem from which a word is formed)"
    - "похідне слово (derived word — the newly formed word)"
    - "мотивувальне слово (motivating word — the word from which another is derived)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про суфіксальне творення прикметників і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Присвійні прикметники»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему суфіксальне творення прикметників."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему присвійні прикметники."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Суфіксальне творення прикметників»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Присвійні прикметники» з їхніми визначеннями."
