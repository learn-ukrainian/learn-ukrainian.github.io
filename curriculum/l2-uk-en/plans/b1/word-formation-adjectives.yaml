  - "b1-038 (Вищий ступінь — ступені порівняння використовують суфікси на основах прикметників)"
  - "b1-009 (Чергування приголосних — моделі чергування знову з'являються у словотворі)"
prerequisites:
  - "b1-002 (Морфологія — будова слова: корінь, суфікс, префікс)"
  - "b1-009 (Чергування приголосних — моделі чергування приголосних)"
grammar:
  - "Суфіксальне творення: -н-, -ськ-/-зьк-/-цьк-, -ів-, -уват-, -еньк-, -юч-"
  - "Написання -Н- і -НН-: основа на -н- + суфікс -н- = -нн-"
  - "Префіксальне творення: пре-, без-, над-, анти-, ультра-"
  - "Префіксально-суфіксальне творення: при-...-н-, без-...-н-, під-...-н-"
  - "Складання: з'єднувальна голосна -о-/-е-, написання через дефіс"
register: науково-навчальний
references:
  - title: "Литвінова Grade 6, p.208"
    notes: "Огляд творення прикметників: суфіксальний спосіб як найпродуктивніший."
  - title: "Авраменко Grade 6, p.136"
    notes: "Префіксальне та суфіксальне творення прикметників із прикладами."
  - title: "Заболотний Grade 7, p.132"
    notes: "Творення географічних прикметників: правило розподілу -ськ-/-зьк-/-цьк-."
  - title: "Заболотний Grade 6, p.155"
    notes: "Практика з -н-/-нн- у прикметниках, вправи на суфікси."
  - title: "Голуб Grade 6, p.35"
    notes: "Огляд способів словотворення: суфіксальний, префіксальний, складання."
