module: b1-056
level: B1
sequence: 56
slug: vocative-formal
version: '3.1.2'
title: "Кличний відмінок (офіційний)"
subtitle: "Звертання у формальному, діловому та офіційному контексті"
focus: grammar
pedagogy: PPP
phase: "B1.5 [Нюанси відмінків та прийменники]"
word_target: 4000
objectives:
  - "Студент вміє правильно утворювати кличний відмінок для всіх відмін іменників, включаючи імена по батькові (Іване Вікторовичу, Тамаро Іванівно)"
  - "Студент вміє використовувати формули офіційного звертання: пане Євгене, пані Оксано, добродію, добродійко, шановний(-а)"
  - "Студент вміє застосовувати правила кличного відмінка у складених звертаннях: обидва слова в кличному для ім'я + по батькові (Маріє Степанівно), перше слово в кличному + друге в називному для посада/звання + прізвище (кореспонденте Левчук)"
  - "Студент вміє використовувати кличний відмінок в офіційному листуванні: ділових листах, офіційних електронних листах, запрошеннях"
  - "Студент вміє розрізняти рівні використання кличного відмінка: неформальний (Оксано!), нейтральний (пані Оксано), формальний (шановна Оксано Петрівно)"
dialogue_situations:
  - setting: 'Офіційна церемонія у Верховній Раді — формальні звертання: Шановний пане Президенте! Вельмишановна пані Міністре! Панове депутати! Пане Голово!'
    speakers:
      - Спікер
      - Депутати
    motivation: 'Формальний кличний відмінок: пане Президенте, пані Міністре, панове депутати'
content_outline:
  - section: "Повторення: кличний відмінок"
    words: 600
    points:
      - "Швидке повторення утворення кличного відмінка з рівня A2 (Авраменко, 6 клас, с. 106): І відміна тверда група: -о (мамо, Миколо, Галино). І відміна м'яка група: -е, -є (Надіє, Анастасіє, подрузе). ІІ відміна тверда група: -е (Іване, Денисе, Олександре). ІІ відміна м'яка група: -ю (Ігорю, Сергію, Андрію). Чоловічі імена на -а: -о (Микито, Сашо, Ілько)."
      - "Важливі моделі, які студенти могли пропустити: закінчення -ко: Тарасику, братику (пестливі). Іменники на -ець: -цю (хлопцю, молодцю). Імена на -ій: -ію (Василію, Дмитрію) або -іє (Василіє — архаїчне)."
      - "ІІІ відміна: -е (радосте, любове, молоде). Множина кличного відмінка = множина називного відмінка для більшості іменників (друзі!, колеги!, студенти!). Практика: утворити кличний відмінок для 15 імен, що охоплюють усі відміни."
  - section: "Офіційні звертання"
    words: 900
    points:
      - "За Литвіновою (6 клас, с. 141): пан + ім'я: пане Євгене, пане Миколо. пані + ім'я: пані Оксано (але також: пані Оксана — Н.в. допускається). добродій → добродію, добродійка → добродійко. Це стандартні українські форми офіційного звертання."
      - "Ім'я + по батькові — обидва слова в Кл.в. (Заболотний, 11 клас, с. 98): Іване Вікторовичу, Маріє Степанівно, Олексію Миколайовичу. Чоловічі імена по батькові: -овичу (Петровичу, Івановичу). Жіночі імена по батькові: -івно (Петрівно, Іванівно)."
      - "Загальна назва + прізвище — ТІЛЬКИ перше слово в Кл.в. (Заболотний, 11 клас, с. 98): кореспонденте Левчук (а не *кореспонденте Левчуку), професоре Ковальчук, лікарю Петренко. Але: друже Іване (обидва в кличному, коли обидва слова є загальними або власними іменами)."
      - "шановний/шановна: шановний Іване Петровичу, шановна Маріє Степанівно. У листах: Шановний пане Директоре! Примітка: «шановний» набуває форми Н.в. (а не *шановному). Звертання «Професія + ім'я» (§4.2.2.7): професоре Олександре, лікарю Петре, вчителько Ганно — коли обидва слова є загальними або власними іменами, обидва ставляться в кличний. Порівняйте: лікарю Петренко (посада + прізвище — тільки перше в кличному)."
  - section: "Кличний відмінок у діловому листуванні"
    words: 800
    points:
      - "Вступні фрази в діловому листі: Шановний пане Директоре! Шановна пані Голово! Шановні колеги! (множина — Н.в. і Кл.в. збігаються) Вельмишановний добродію! (дуже офіційно)."
      - "Формат електронного листа: Добрий день, Олександре Миколайовичу! Вітаю, пане Петре! Шановна Маріє Степанівно, пишу з приводу... Кличний відмінок є ОБОВ'ЯЗКОВИМ в українському офіційному звертанні — використання Н.в. (*Олександр Миколайович!) звучить неприродно."
      - "Завершальні формули з відлунням кличного відмінка: «З повагою, Олександр Петренко» (офіційне завершення — без кличного). Але: «Чекаю на Вашу відповідь, Іване Олексійовичу.» (кличний відмінок у завершальному реченні — пряме звертання). Також: «Дякую Вам, шановна Маріє Степанівно, за допомогу.»"
      - "Практика: написати три варіанти початку електронного листа для різних ситуацій: до вчителя, до ділового партнера, до державного службовця. У кожному має бути використана правильна форма кличного відмінка."
  - section: "Звертання до груп і титулів"
    words: 500
    points:
      - "Звертання у множині: Шановні депутати! Дорогі друзі! Панове! Множина кличного = множина називного для більшості іменників. Виняток: панове (кличний відмінок від «пани» в контексті звертання)."
      - "Релігійні та військові звання: отче (отець), владико (владика), генерале (генерал). Історичні: козаче (козак), гетьмане (гетьман). Сучасні: пане Президенте, пані Міністре (або: пані Міністерко)."
      - "Культурна довідка: український кличний відмінок ЖИВИЙ і продуктивний, на відміну від багатьох європейських мов. Його правильне використання свідчить про повагу та культурну компетентність. НЕ використання його (заміна на Н.в.) звучить як іноземний акцент або грубо у формальних ситуаціях."
  - section: "Практика в контексті"
    words: 800
    points:
      - "Рольова гра: офіційна зустріч. Студенти звертаються один до одного, використовуючи повне офіційне звертання: ім'я + по батькові в кличному відмінку. «Шановний Андрію Олексійовичу, дозвольте представити вам нашу колегу, Олену Вікторівну. Олено Вікторівно, це Андрій Олексійович.»"
      - "Написання листа: напишіть офіційну скаргу в компанію, лист-подяку вчителю або запрошення на захід. Кожен з них має починатися з правильного звертання в кличному відмінку."
      - "Аналіз помилок: типові помилки тих, хто вивчає мову як другу: *Шановний Іван Петрович! (має бути: Іване Петровичу). *Пані Оксано Петрівно! (правильно — обидва в кличному). *Докторе Ковальчуку! (має бути: Ковальчук — прізвище залишається в Н.в.)."
      - "Порівняння неформального та формального регістрів: Неформальний: Оксано, допоможи! Нейтральний: Пані Оксано, чи можете допомогти? Формальний: Шановна Оксано Петрівно, звертаюся до Вас з проханням... Студенти переписують одне й те саме прохання у трьох регістрах, звертаючи увагу на те, що форма кличного відмінка залишається тією самою, але мова навколо неї змінюється."
  - section: "Підсумок"
    words: 400
    points:
      - "Алгоритм вибору кличного відмінка: Неформальний: Оксано! Андрію! Нейтральний: пане/пані + ім'я в Кл.в. Формальний: Шановний(-а) + пане/пані + посада/ім'я + по батькові в Кл.в. Посада/звання + прізвище: тільки перше слово в Кл.в."
      - "Пунктуація при звертанні (Авраменко, 8 клас, с. 133): Звертання виділяється комою (або комами): Оксано, підійди сюди. Шановний Іване Петровичу, дозвольте звернутися до Вас. Якщо звертання стоїть на початку зі знаком оклику — наступне слово пишеться з великої літери: Друзі! Сьогодні важливий день. Якщо звертання емоційно підсилене за допомогою О: О Україно! О рідний краю!"
      - "Анонс: наступні модулі — часові прийменники, причина і мета."
vocabulary_hints:
  required:
    - "кличний відмінок (vocative case)"
    - "звертання (address/salutation)"
    - "по батькові (patronymic)"
    - "пан/пані (Mr./Ms. — formal address)"
    - "добродій/добродійка (Sir/Madam — very formal)"
    - "шановний/шановна (respected/dear — formal letter opening)"
    - "вельмишановний (most respected — very formal)"
    - "колега (colleague — common address in workplace)"
  recommended:
    - "прізвище (surname)"
    - "посада (position/title)"
    - "офіційний (official/formal)"
    - "діловий (business-related)"
    - "листування (correspondence)"
    - "панове (gentlemen — plural formal address)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про повторення: кличний відмінок і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Офіційні звертання»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему повторення: кличний відмінок."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему офіційні звертання."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Повторення: кличний відмінок»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Офіційні звертання» з їхніми визначеннями."
