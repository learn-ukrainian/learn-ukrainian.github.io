module: b1-062
level: B1
sequence: 62
slug: advanced-pronouns
version: '3.1.2'
title: "Займенники (деталі)"
subtitle: "Питально-відносні, зворотний себе, неозначені та заперечні займенники"
focus: grammar
pedagogy: PPP
phase: "B1.5 [Нюанси відмінків і прийменники]"
word_target: 4000
objectives:
  - 'Здобувач навчиться вживати питально-відносні займенники (хто, що, який, чий, котрий) у питаннях та підрядних означальних реченнях, відмінюючи їх за всіма відмінками'
  - 'Здобувач навчиться правильно використовувати зворотний займенник себе в усіх відмінках (себе, собі, собою) та відрізняти його від присвійного свій'
  - 'Здобувач навчиться утворювати і використовувати неозначені займенники: хтось, щось, будь-хто, хто-небудь, дехто, дещо, якийсь — застосовуючи правила правопису (через дефіс, разом)'
  - 'Здобувач навчиться утворювати і використовувати заперечні займенники: ніхто, ніщо, нічий, ніякий — враховуючи їхню поведінку з прийменниками (ні з ким, ні в чому)'
  - 'Здобувач навчиться розрізняти значення заперечних займенників залежно від наголосу: нікого (немає нікого поруч) проти нікого (немає до кого звернутися)'
dialogue_situations:
  - setting: 'Семінар з філософії у Київському університеті імені Шевченка — обговорення ідентичності: Кожен має право. Ніхто не заперечує. Дехто з нас вірить. Будь-яка відповідь правильна. Ті, хто думає інакше, нехай скажуть.'
    speakers:
      - Професор
      - Студенти
    motivation: 'Складні займенники: кожен, ніхто, дехто, будь-який, ті хто — в абстрактному дискурсі'
content_outline:
  - section: "Питально-відносні займенники"
    words: 700
    points:
      - 'Основні займенники: хто, що, який (яка, яке, які), чий (чия, чиє, чиї), котрий. Як питальні: Хто це? Що ти робиш? Який фільм? Як відносні (для з''єднання частин складного речення): Людина, яка прийшла... Те, що ти сказав...'
      - 'Відмінювання хто і що: хто: кого, кому, кого, ким, (на) кому. що: чого, чому, що, чим, (на) чому. Практика: використання в питаннях та відносних реченнях у всіх відмінках. "Кого ти бачив? Людина, кого я бачив..." "Чим ти цікавишся? Те, чим я цікавлюся..."'
      - 'Займенник який відмінюється як прикметник (за всіма родами і відмінками). Займенник котрий є синонімом до який у відносних реченнях, більш літературний. Займенник чий відмінюється: чийого, чийому, чиїм тощо. Практика: доповнити 10 речень правильною формою який/чий.'
  - section: "Зворотний займенник себе"
    words: 600
    points:
      - 'Займенник себе НЕ МАЄ форми називного відмінка і не розрізняється за родами чи числами. Р.в. себе, Д.в. собі, Зн.в. себе, Ор.в. собою, М.в. (на) собі. Він вказує на підмет, незалежно від особи: Я бачу себе. Ти бачиш себе. Вони бачать себе.'
      - 'Поширені вирази із себе/собі/собою: почуватися/почувати себе, уявити собі, бути задоволеним собою, сам по собі, так собі, від себе.'
      - 'Відмінність: себе (займенник, відмінюється) проти свій (присвійний, відмінюється як прикметник): Я бачу себе проти Я бачу свою книжку. Обидва є зворотними, але функціонують по-різному.'
  - section: "Неозначені займенники"
    words: 700
    points:
      - 'Творення за Заболотним (6 клас, с.203): Від питальних займенників + частки: хтось, щось, якийсь, чийсь (суфікс -сь: відоме мовцю, але невідоме слухачу). будь-хто, будь-що, будь-який (префікс будь-: будь-яка особа чи предмет). хто-небудь, що-небудь, який-небудь (суфікс -небудь: не має значення хто чи що). дехто, дещо, деякий (префікс де-: хтось конкретний або певна кількість).'
      - 'Правила правопису: -сь: завжди пишеться разом: хтось, щось, якийсь. будь-: завжди через дефіс: будь-хто, будь-що, будь-який. -небудь: завжди через дефіс: хто-небудь, що-небудь. де-: завжди пишеться разом: дехто, дещо, деякий. абияк: разом: абиякий, абихто.'
      - 'Смислові відмінності: хтось = хтось конкретний (мовець знає або здогадується хто): Хтось стукає у двері. будь-хто = взагалі будь-яка людина: Будь-хто може це зробити. хто-небудь = хтось (у питаннях/гіпотетичних ситуаціях): Чи є тут хто-небудь? Практика: обрати правильний неозначений займенник для 10 контекстів.'
  - section: "Заперечні займенники"
    words: 700
    points:
      - 'Творення за Заболотним (6 клас, с.203): ні- + питальний займенник: ніхто, ніщо, нічий, ніякий. Відмінювання збігається з відмінюванням базового питального займенника: ніхто: нікого, нікому, нікого, ніким, ні на кому. ніщо: нічого, нічому, ніщо, нічим, ні на чому.'
      - 'Прийменники РОЗРИВАЮТЬ заперечний займенник (Заболотний, 6 клас, с.204): ні з ким (не *нізким), ні в чому (не *нівчому), ні до кого, ні від чого, ні з чим. Це визначальна риса української мови — прийменник ставиться МІЖ ні та основою займенника.'
      - 'Смислове розрізнення за наголосом (Литвінова, 6 клас, с.269): нікóго (наголос на корені) = нікого немає поруч: Нікого немає. нíкого (наголос на префіксі) = немає до кого звернутися: Нікого й спитати. нічóго (наголос на корені) = нічого не видно: Нічого не видно. нíчого (наголос на префіксі) = немає чого: Нічого їсти. Практика: розрізнити значення у 8 реченнях.'
  - section: "Займенники в контексті"
    words: 600
    points:
      - 'Практика читання: уривок з детективу з використанням усіх типів займенників. "Хтось стукає. Відкриваю двері — нікого. Дивлюся навколо — ніщо не змінилося. Але щось не так. Чиясь тінь зникла за рогом. Я запитав себе: хто це міг бути? Яка людина ходить так тихо?" Здобувачі визначають і класифікують кожен займенник.'
      - 'Практика діалогу: розмова про загадкову подію з природним використанням неозначених та заперечних займенників. "Хтось тобі дзвонив?" "Ні, мені ніхто не дзвонив." "Може, хто-небудь із сусідів?" "Ні, ні з ким я не розмовляв."'
      - 'Самоперевірка: класифікувати 15 займенників за типом (питальні, неозначені, заперечні, зворотні), утворити правильний відмінок для кожного в контексті.'
  - section: "Означальні займенники (§4.2.1.4)"
    words: 500
    points:
      - 'Державний стандарт передбачає вивчення означальних займенників на рівні B1. Основний набір: кожний/кожен, весь/увесь, сам, самий (той самий, у тій самій кімнаті), інший, будь-який.'
      - 'Відмінювання: кожний відмінюється як прикметник: кожного дня, кожному, кожним. весь/увесь має неправильну парадигму: всього/усього, всьому/усьому, всім/усім, всіма/усіма. сам відмінюється: самого, самому, самим. Зверніть увагу: сам (без допомоги) проти самий (підсилення ідентичності — той самий). За Заболотним (6 клас, с.201): означальні займенники.'
      - 'Використання в контексті: Кожен має право на освіту. Вся країна святкувала День Незалежності. Він сам зробив це — ніхто не допомагав. Це той самий фільм, який ми дивилися. Інші студенти вже пішли. Практика: 8 речень із використанням означальних займенників у правильному відмінку.'
  - section: "Підсумок"
    words: 400
    points:
      - 'Підсумок щодо типів займенників: питально-відносні (хто, який), зворотний (себе), неозначені (хтось, будь-хто), заперечні (ніхто, ніщо), означальні (кожний, весь, сам, інший). Шість категорій займенників, засвоєних на рівні B1.'
      - 'Ключові правила: написання часток (-сь разом, будь- через дефіс, -небудь через дефіс, де- разом), розривання заперечних займенників прийменниками (ні з ким), залежність значення від наголосу (нікого), особливості відмінювання весь/увесь.'
      - 'Анонс: наступний модуль — житло і оренда (комунікативний модуль, що застосовує всю граматику Фази 6 у практичному контексті).'
vocabulary_hints:
  required:
    - "займенник (pronoun)"
    - "питально-відносний (interrogative-relative)"
    - "зворотний (reflexive — себе)"
    - "неозначений (indefinite — хтось, будь-хто)"
    - "заперечний (negative — ніхто, ніщо)"
    - "себе (oneself — reflexive pronoun, no Н.в.)"
    - "хтось (someone — known to speaker)"
    - "будь-хто (anyone — no specificity)"
    - "ніхто (nobody)"
    - "ніщо (nothing)"
  recommended:
    - "хто-небудь (anyone — in questions/hypotheticals)"
    - "дехто (some people — де- prefix)"
    - "абиякий (any old — casual/dismissive indefinite)"
    - "котрий (which — literary synonym of який)"
    - "собою (with oneself — Ор.в. of себе)"
    - "свій (one's own — reflexive possessive)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про питально-відносні займенники і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Зворотний займенник себе».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему питально-відносних займенників.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему зворотного займенника себе.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Питально-відносні займенники».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Зворотний займенник себе» з їхніми визначеннями.'
connects_to:
  - 'b1-067 (Означальні речення)'
  - 'b1-066 (З''ясувальні речення)'
  - 'b1-055 (Житло і оренда)'
prerequisites:
  - 'Завершення рівня А2 (особові займенники, базові форми який/чий)'
  - 'b1-046 до b1-048 (поглиблене знання відмінків для відмінювання займенників)'
grammar:
  - 'Питально-відносні: хто, що, який, чий, котрий — відмінювання'
  - 'Зворотний себе: немає Н.в., себе/собі/собою'
  - 'Неозначені: хтось (-сь), будь-хто (будь-), хто-небудь (-небудь), дехто (де-)'
  - 'Заперечні: ніхто, ніщо — прийменник розриває (ні з ким)'
  - 'Наголос заперечних: нікóго (відсутність) проти нíкого (неможливість)'
register: науково-навчальний
references:
  - title: "Заболотний Grade 6, p.203-204"
    notes: 'Творення, правопис та відмінювання заперечних і неозначених займенників.'
  - title: "Литвінова Grade 6, p.269"
    notes: 'Залежність значення від наголосу в заперечних займенниках нікого/нічого.'
  - title: "Заболотний Grade 8, p.84"
    notes: 'Використання відносних займенників у складних реченнях.'
  - title: "Авраменко Grade 6, p.106"
    notes: 'Класифікація займенників та приклади в контексті.'
