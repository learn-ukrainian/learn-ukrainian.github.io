module: b1-006
level: B1
sequence: 6
slug: aspect-in-narration
version: '1.0.3'
title: "Вид у розповіді"
subtitle: "Як недоконаний і доконаний вид працюють у короткій розповіді"
focus: aspect-narration
pedagogy: TTT
phase: "B1.0 [Baselines & Aspect Mastery]"
word_target: 4000
objectives:
  - "Студент уміє пояснювати, чи дієслово в українському розповідному тексті описує процес, стан або обставину чи називає завершений крок, після якого ситуація змінилася"
  - "Студент уміє вплітати обидва види у зв'язну розповідь: недоконаний для обстановки, атмосфери та одночасних дій; доконаний для послідовних кроків і розвитку сюжету"
  - "Студент уміє правильно використовувати часові конектори (спочатку, потім, тим часом, раптом, нарешті) з відповідним видом"
  - "Студент уміє переписати розповідний уривок, змінюючи розподіл видів, щоб показати більше опису або чіткішу послідовність подій"
dialogue_situations:
  - setting: 'Дві подруги розповідають про драматичний вечір: одна описує атмосферу й тривалі дії, інша додає завершені кроки, після яких ситуація змінюється: Було тихо. Ми сиділи в кав''ярні, пили каву... — І раптом зайшов Максим! Він кинув сумку на стіл і сказав: "Я знайшов роботу!"'
    speakers:
      - Юлія
      - Катерина
    motivation: "Природна спільна розповідь: один мовець описує ситуацію недоконаними формами, інший передає зміни доконаними формами"
content_outline:
  - section: "Що робить дієслово в розповіді"
    words: 850
    points:
      - "Діагностика: студенти читають коротку українську розповідь (8-10 речень) і пояснюють роль кожного дієслова: воно описує процес, стан або обставину чи називає завершений крок. Жодних жорстких ярликів не надається — лише питання «що робить це дієслово в історії?»."
      - "Самооцінювання: які дієслова відкривають тривання, а які закривають крок сюжету? Обговорення: недоконані форми часто описують ситуацію, доконані форми часто називають зміну або результат."
      - "Введення ключового концепту: розповідь відповідає на питання «що сталося?», опис — на питання «який?». У реальному абзаці ці режими переплітаються, тому учень має пояснювати функцію форми в контексті."
      - "Контраст без механічних коробок: Дув вітер описує погоду; Подув вітер називає зміну. Він читав лист показує процес; Він прочитав лист називає завершений крок."
  - section: "Недоконаний вид: процес, стан і обставини"
    words: 1050
    points:
      - "Функції недоконаного виду в розповіді: обстановка, погода, атмосфера, тривалі дії, одночасні дії, емоційні та ментальні стани. Приклади: Надворі було холодно. Дув сильний вітер. Діти гралися у дворі. Поки мама готувала вечерю, тато читав газету."
      - "Часові конектори тривалості та одночасності: тим часом, у цей час, поки, доки, увесь час, зазвичай. Кожен конектор природно поєднується з недоконаним видом, оскільки він сигналізує про відкриту в часі дію."
      - "Розширена практика з описовим уривком: студенти пишуть абзац із 5 речень для створення обстановки, використовуючи недоконаний вид. Тема: Опишіть вечір у маленькому українському містечку."
      - "Контраст: що відбувається, коли доконаний вид випадково називає зміну? Надворі було холодно. Подув сильний вітер. — «Подув» означає, що вітер щойно почався або різко змінив ситуацію."
  - section: "Доконаний вид: завершений крок і зміна"
    words: 1050
    points:
      - "Функції доконаного виду в розповіді: Послідовні події (сюжет): Він встав, одягнувся, вийшов із дому. Поворотні моменти: Раптом двері відчинилися. Завершені результати: Вона написала лист і відправила його. Одиничні рішучі дії: Він прийняв рішення."
      - "Часові конектори послідовності й повороту: спочатку, потім, після цього, раптом, нарешті, тоді. Ці конектори сигналізують, що одна дія йде за іншою: Спочатку я подзвонив. Потім написав листа. Нарешті отримав відповідь."
      - "Взаємодія — сплетіння обох шарів: Ми сиділи (недок.) в парку. Було (недок.) тихо. Раптом хтось закричав (док.). Ми підвелися (док.) і побігли (док.) до виходу. Серце калатало (недок.). Ми вибігли (док.) на вулицю."
      - "Практика: студенти отримують голий ланцюжок подій (6 дієслів доконаного виду) і додають речення з обставинами між подіями, використовуючи недоконаний вид. Потім вони отримують описовий уривок і вставляють події."
  - section: "Підсумок: вид як інструмент редагування"
    words: 1050
    points:
      - "Синтез: вид у розповіді стосується не окремих речень, а того, що дієслово робить у цілому абзаці: описує тривання, стан чи звичку або називає крок, після якого щось змінилося."
      - "Вправа на трансформацію: студенти отримують короткий текст і переписують його двічі. Версія А: додати обставини, описи, стани й одночасні дії. Версія Б: підсилити послідовність завершених кроків. Порівняйте обидві версії: де читач краще бачить ситуацію, а де чіткіше розуміє, що сталося далі?"
      - "Типові помилки: доконаний вид там, де треба описати тривалу ситуацію; недоконаний вид для чіткої одноразової послідовності (*Він вставав, одягався, виходив з дому — звучить як звичка, не як один епізод); надмірне використання одного виду."
      - "Анонс наступного модуля: після тематичної перерви (повсякденне життя та рутина), Вид у наказовому способі — як вид змінює значення команд (Не відкривай! проти Відкрий!)."
