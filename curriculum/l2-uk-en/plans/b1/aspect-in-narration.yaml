activity_hints:
  - type: quiz
    focus: "Поясніть, чи дієслово описує процес/стан/обставину або називає завершений крок"
    items: 10
  - type: fill-in
    focus: "Виберіть правильний вид (недок. чи док.) для дієслів у розповідному уривку на основі їхньої наративної функції"
    items: 8
  - type: group-sort
    focus: "Розподіліть часові конектори на тривалість/одночасність і послідовність/поворот"
    items: 8
  - type: error-correction
    focus: "Знайдіть помилки виду в розповідних уривках: описові дії мають бути недок., а завершені кроки мають бути док."
    items: 6
  - type: match-up
    focus: "Установіть відповідність між наративними функціями (обстановка, поворотний момент, одночасна дія, послідовний ланцюжок) та правильним видом"
    items: 8
  - type: open-writing
    focus: "Напишіть коротку історію (8-10 речень) про несподівану подію — свідомо поєднуйте обставини, процеси й завершені кроки"
    items: 6
