  - word: "тоді"
    pos: "adv"
    translation: "then, at that time"
activity_hints:
  - type: quiz
    focus: "Identify each verb in a narrative as тло (background/impf) or подія
      (foreground/pf) and explain why"
    items: 10
  - type: fill-in
    focus: "Choose the correct aspect (impf or pf) for verbs in a narrative passage
      based on their narrative function"
    items: 8
  - type: group-sort
    focus: "Sort temporal connectors into background-connectors (тим часом, поки) and
      foreground-connectors (потім, раптом, нарешті)"
    items: 8
  - type: error-correction
    focus: "Find aspect errors in narrative passages — background verbs that should be
      impf, event verbs that should be pf"
    items: 6
  - type: match-up
    focus: "Match narrative functions (setting, turning point, simultaneous action,
      sequential chain) to the correct aspect"
    items: 8
  - type: open-writing
    focus: "Write a short story (8-10 sentences) about an unexpected event — weave
      background (impf) and foreground (pf) deliberately"
    items: 6
connects_to:
  - "b1-004 (Вид у минулому часі — aspect in past, prerequisite)"
  - "b1-005 (Вид у майбутньому часі — aspect in future)"
  - "b1-008 (Вид у наказовому способі — aspect in imperatives, after thematic break)"
prerequisites:
  - "b1-004 aspect-past-tense (result vs process in past)"
  - "b1-005 aspect-future-tense (three future constructions)"
grammar:
  - "Тло розповіді: недоконаний вид для опису, стану, тривалих дій"
  - "Передній план: доконаний вид для подій, послідовності, поворотних моментів"
  - "Часові конектори: спочатку, потім, раптом, тим часом, нарешті"
  - "Чергування видів у зв'язному тексті як наративна стратегія"
  - "Типові помилки: зміщення аспекту в блоці тла або переднього плану"
register: розмовний
references:
  - title: "Заболотний Grade 7, p.54-60"
    notes: "Вид дієслова у розповіді: тло і передній план, вправи на вживання виду
      в оповіданні, аналіз текстів."
  - title: "Литвінова Grade 7, p.30-40"
    notes: "Вид дієслова: зв'язок виду і наративної функції, часові конектори,
      практичні вправи на розповідь."
  - title: "Авраменко Grade 7, p.63-68"
    notes: "Вид у тексті: аналіз оповідань, визначення наративних функцій доконаного
      і недоконаного виду."
