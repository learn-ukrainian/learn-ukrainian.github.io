module: b1-006
level: B1
sequence: 6
slug: aspect-in-narration
version: '1.0.2'
title: "Вид у розповіді"
subtitle: "Тло і передній план — як аспект створює наратив"
focus: aspect-narration
pedagogy: TTT
phase: "B1.0 [Baselines & Aspect Mastery]"
word_target: 4000
objectives:
  - "Студент уміє ідентифікувати тло (недоконаний) та події переднього плану (доконаний) в українському розповідному тексті й пояснювати видову логіку, використовуючи українську метамову"
  - "Студент уміє вплітати обидва види у зв'язну розповідь: недоконаний для обстановки, атмосфери та одночасних дій; доконаний для послідовних подій і розвитку сюжету"
  - "Студент уміє правильно використовувати часові конектори (спочатку, потім, тим часом, раптом, нарешті) з відповідним видом"
  - "Студент уміє переписати розповідний уривок, змінюючи розподіл видів, щоб продемонструвати, як вид змінює фокус і темп розповіді"
dialogue_situations:
  - setting: 'Дві подруги розповідають про драматичний вечір: одна описує атмосферу (недок. тло), інша втручається з ключовими подіями (док. передній план): Було тихо. Ми сиділи в кав''ярні, пили каву... — І раптом зайшов Максим! Він кинув сумку на стіл і сказав: "Я знайшов роботу!"'
    speakers:
      - Юлія
      - Катерина
    motivation: "Природна спільна розповідь: один мовець надає тло (недок.), інший передає події (док.)"
content_outline:
  - section: "Тест: тло чи подія?"
    words: 850
    points:
      - "Діагностика: студенти читають коротку українську розповідь (10-12 речень) і позначають кожне дієслово як тло або подію. Жодних правил не надається — чиста інтуїція. Приклад тексту: Був теплий вечір. Сонце сідало за обрій. Ми сиділи на терасі й розмовляли. Раптом задзвонив телефон. Я підвівся і відповів. Це був Андрій — він повернувся з Америки."
      - "Самооцінювання: скільки дієслів ви класифікували правильно? Обговорення: які патерни ви помітили? (Дієслова тла = недок., дієслова подій = док.). Цей модуль робить патерн явним і вчить вас ВИКОРИСТОВУВАТИ його у власному письмі."
      - "Введення ключового концепту: кожна розповідь має два шари. Тло — обстановка, погода, тривалі ситуації, емоції, описи. Використовує недоконаний вид. Передній план — події, що рухають історію вперед, зміни, поворотні моменти. Використовує доконаний вид."
      - "Візуальна метафора: тло — це декорації на сцені (статичні, неперервні), передній план — це дії акторів (динамічні, послідовні). Історія, де є лише передній план, — це голий перелік подій. Історія, де є лише тло, — це опис без сюжету."
  - section: "Тло: недоконаний вид у наративі"
    words: 1050
    points:
      - "Функції недоконаного виду в розповіді (Заболотний 7 клас, с. 54): Обстановка: Надворі було холодно. Дув сильний вітер. Опис тривалих дій: Діти гралися у дворі. Бабуся сиділа біля вікна і в'язала. Одночасні дії: Поки мама готувала вечерю, тато читав газету. Емоційні/ментальні стани: Він хвилювався. Вона не знала, що робити."
      - "Часові конектори з недоконаним тлом: тим часом, у цей час, поки, доки, увесь час, зазвичай. Кожен конектор природно поєднується з недоконаним видом, оскільки він сигналізує про тривалість або одночасність."
      - "Розширена практика з уривком тла: студенти пишуть абзац із 5 речень для створення обстановки, використовуючи лише недоконаний вид. Тема: Опишіть вечір у маленькому українському містечку. Кожне дієслово має бути недоконаного виду. Обговорення: яку атмосферу створює суто тло? (Спокійну, статичну, позачасову)."
      - "Контраст: що відбувається, коли ви випадково використовуєте доконаний вид у тлі? *Надворі було холодно. Подув сильний вітер. — «Подув» перетворює вітер на ПОДІЮ, а не на елемент обстановки. Це означає, що вітер щойно почався, змінюючи історію. Вибір виду змінює значення, а не просто «правильність»."
  - section: "Передній план: доконаний вид у наративі"
    words: 1050
    points:
      - "Функції доконаного виду в розповіді: Послідовні події (сюжет): Він встав, одягнувся, вийшов із дому. Поворотні моменти: Раптом двері відчинилися. Завершені результати: Вона написала лист і відправила його. Одиничні рішучі дії: Він прийняв рішення."
      - "Часові конектори з доконаним переднім планом: спочатку, потім, після цього, раптом, нарешті, тоді. Ці конектори сигналізують про послідовність — одна дія йде за іншою. Послідовні ланцюжки природно є доконаними: Спочатку я подзвонив. Потім написав листа. Нарешті отримав відповідь."
      - "Взаємодія — сплетіння обох шарів: Ми сиділи (недок.) в парку. Було (недок.) тихо. Раптом хтось закричав (док.). Ми підвелися (док.) і побігли (док.) до виходу. Серце калатало (недок.). Ми вибігли (док.) на вулицю."
      - "Практика: студенти отримують голий ланцюжок подій (6 дієслів доконаного виду) і повинні додати речення тла між подіями, використовуючи недоконаний вид. Потім вони отримують суто опис тла і повинні вставити події. Обидві вправи демонструють, що вид створює наративний РИТМ."
  - section: "Підсумок: аспект як наративний інструмент"
    words: 1050
    points:
      - "Синтез: вид у розповіді стосується не окремих речень — він стосується ПЕРЕХОДУ між тлом і переднім планом. Носії мови змінюють види інстинктивно. Студентам рівня B1 потрібно робити цю зміну свідомо, поки вона не стане автоматичною."
      - "Вправа на наративну трансформацію: студенти отримують короткий текст і переписують його двічі. Версія А: підкреслити тло (розширити описи, додати деталі недоконаного виду, уповільнити темп). Версія Б: підкреслити передній план (скоротити описи, прискорити події, зробити текст динамічнішим). Порівняйте обидві версії: як розподіл видів змінює ВІДЧУТТЯ історії?"
      - "Типові помилки: Змішування видів у блоці тла (*Надворі йшов дощ. Загриміло. Було сиро. — «загриміло» розриває тло). Використання недоконаного виду для чітко послідовних подій (*Він вставав, одягався, виходив з дому — звучить як звичка, а не розповідь). Надмірне використання одного виду — або суто доконаного (читається як поліцейський звіт), або суто недоконаного (читається як опис без подій)."
      - "Анонс наступного модуля: після тематичної перерви (повсякденне життя та рутина), Вид у наказовому способі — як вид змінює значення команд (Не відкривай! проти Відкрий!)."
