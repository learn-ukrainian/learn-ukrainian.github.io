activity_hints:
  - type: quiz
    focus: "Ідентифікуйте кожне дієслово в розповіді як тло або подію й поясніть чому"
    items: 10
  - type: fill-in
    focus: "Виберіть правильний вид (недок. чи док.) для дієслів у розповідному уривку на основі їхньої наративної функції"
    items: 8
  - type: group-sort
    focus: "Розподіліть часові конектори на конектори тла (тим часом, поки) та конектори переднього плану (потім, раптом, нарешті)"
    items: 8
  - type: error-correction
    focus: "Знайдіть помилки виду в розповідних уривках: дієслова тла, які мають бути недок., і дієслова подій, які мають бути док."
    items: 6
  - type: match-up
    focus: "Установіть відповідність між наративними функціями (обстановка, поворотний момент, одночасна дія, послідовний ланцюжок) та правильним видом"
    items: 8
  - type: open-writing
    focus: "Напишіть коротку історію (8-10 речень) про несподівану подію — свідомо поєднуйте тло (недок.) і передній план (док.)"
    items: 6
