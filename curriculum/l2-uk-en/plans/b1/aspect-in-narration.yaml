module: b1-006
level: B1
sequence: 6
slug: aspect-in-narration
version: '1.0'
title: "Вид у розповіді"
subtitle: "Тло і передній план — як аспект створює наратив"
focus: aspect-narration
pedagogy: TTT
phase: "B1.0 [Baselines & Aspect Mastery]"
word_target: 4000
objectives:
  - "Learner can identify background (тло — imperfective) and foreground events
    (передній план — perfective) in a Ukrainian narrative text and explain the
    aspect logic using Ukrainian metalanguage"
  - "Learner can weave both aspects into connected storytelling: imperfective for
    setting, atmosphere, and simultaneous actions; perfective for sequential events
    and plot advancement"
  - "Learner can use temporal connectors (спочатку, потім, тим часом, раптом, нарешті)
    correctly with the appropriate aspect"
  - "Learner can rewrite a narrative passage changing the aspect distribution to
    demonstrate how aspect transforms the story's focus and pacing"
dialogue_situations:
  - setting: "Two friends recounting a dramatic evening — one describes the atmosphere
      (impf background), the other jumps in with the key events (pf foreground): Було
      тихо. Ми сиділи в кав'ярні, пили каву... — І раптом зайшов Максим! Він кинув
      сумку на стіл і сказав: 'Я знайшов роботу!'"
    speakers:
      - Юлія
      - Катерина
    motivation: "Natural collaborative storytelling — one speaker provides background
      (impf), the other delivers events (pf)"
content_outline:
  - section: "Тест: тло чи подія?"
    words: 850
    points:
      - "Diagnostic: learners read a short Ukrainian narrative (10-12 sentences) and
        mark each verb as тло (background) or подія (foreground event). No rules given —
        pure intuition. Text example: Був теплий вечір. Сонце сідало за обрій. Ми
        сиділи на терасі й розмовляли. Раптом задзвонив телефон. Я підвів і відповів.
        Це був Андрій — він повернувся з Америки."
      - "Self-assessment: how many verbs did you classify correctly? Discussion: what
        patterns did you notice? (Background verbs = impf, event verbs = pf.) This
        module makes the pattern explicit and teaches you to USE it in your own writing."
      - "Key concept introduced: every narrative has two layers. Тло (background) —
        setting, weather, ongoing situations, emotions, descriptions. Uses недоконаний
        вид. Передній план (foreground) — events that move the story forward, changes,
        turning points. Uses доконаний вид."
      - "Visual metaphor: тло is the stage set (static, continuous), передній план is
        the actors' actions (dynamic, sequential). A story with only foreground is a
        bare list of events. A story with only background is a description with no plot."
  - section: "Тло: недоконаний вид у наративі"
    words: 1050
    points:
      - "Functions of imperfective in narration (Заболотний Grade 7 p.54): Setting the
        scene: Надворі було холодно. Дув сильний вітер. Describing ongoing actions:
        Діти гралися у дворі. Бабуся сиділа біля вікна і в'язала. Simultaneous actions:
        Поки мама готувала вечерю, тато читав газету. Emotional/mental states: Він
        хвилювався. Вона не знала, що робити."
      - "Temporal connectors with imperfective background: тим часом (meanwhile),
        у цей час (at that time), поки (while), доки (while/until), увесь час
        (all the time), зазвичай (usually — for habitual background). Each connector
        naturally pairs with imperfective because it signals duration or simultaneity."
      - "Extended background passage practice: learners write a 5-sentence scene-setting
        paragraph using only недоконаний вид. Topic: Опишіть вечір у маленькому
        українському містечку. Every verb must be imperfective. Discussion: what kind
        of atmosphere does pure background create? (Calm, static, timeless.)"
      - "Contrast: what happens when you accidentally use perfective in background?
        *Надворі було холодно. Подув сильний вітер. — 'Подув' (pf) turns the wind into
        an EVENT, not a setting element. It implies the wind just started, changing the
        story. Aspect choice changes meaning, not just 'correctness.'"
  - section: "Передній план: доконаний вид у наративі"
    words: 1050
    points:
      - "Functions of perfective in narration: Sequential events (plot): Він встав,
        одягнувся, вийшов із дому. Turning points: Раптом двері відчинилися. Completed
        results: Вона написала лист і відправила його. Single decisive actions: Він
        прийняв рішення."
      - "Temporal connectors with perfective foreground: спочатку (first), потім (then),
        після цього (after that), раптом (suddenly), нарешті (finally), тоді (then).
        These connectors signal sequence — one action follows another. Sequential chains
        are naturally perfective: Спочатку я подзвонив. Потім написав листа. Нарешті
        отримав відповідь."
      - "The interplay — weaving both layers: Ми сиділи (impf — background) в парку.
        Було (impf — setting) тихо. Раптом хтось закричав (pf — event). Ми підвелися
        (pf — reaction) і побігли (pf — action) до виходу. Серце калатало (impf — state
        during events). Ми вибігли (pf — completed escape) на вулицю."
      - "Practice: learners receive a bare event chain (6 perfective verbs) and must
        add background sentences between events using imperfective. Then they receive
        a pure background description and must insert events. Both exercises demonstrate
        that aspect creates narrative RHYTHM."
  - section: "Підсумок: аспект як наративний інструмент"
    words: 1050
    points:
      - "Synthesis: aspect in narration is not about individual sentences — it's about
        the FLOW between background and foreground. Native speakers shift between aspects
        instinctively. B1 learners need to make this shift consciously until it becomes
        automatic."
      - "Narrative transformation exercise: learners receive a short text and rewrite
        it twice. Version A: emphasize background (expand descriptions, add imperfective
        detail, slow the pacing). Version B: emphasize foreground (cut descriptions,
        accelerate events, make it punchy). Compare both versions — how does aspect
        distribution change the FEEL of the story?"
      - "Common errors in aspect narration: Mixing aspects within a background block
        (*Надворі йшов дощ. Загриміло. Було сиро. — 'загриміло' is pf, breaking the
        background). Using imperfective for clearly sequential events (*Він вставав,
        одягався, виходив з дому — sounds habitual, not narrative). Over-using one
        aspect — either all-pf (reads like a police report) or all-impf (reads like
        a description with no events)."
      - "Preview of next module: after daily-life-and-routines thematic break,
        aspect-in-imperatives — how aspect changes the meaning of commands (Не відкривай!
        vs Відкрий!)."
vocabulary_hints:
