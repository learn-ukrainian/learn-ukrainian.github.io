module: b1-009
level: B1
sequence: 9
slug: aspect-in-negation
version: '1.0.2'
title: 'Вид і заперечення'
subtitle: 'Не робив vs ще не зробив — заперечення факту чи очікування'
focus: aspect-negation
pedagogy: TTT
phase: 'B1.0 [Базові концепції та опанування виду]'
word_target: 4000
objectives:
  - 'Учень вміє розрізняти не + недоконаний вид (загальне заперечення — дія взагалі не відбулася) та ще не + доконаний вид (очікуване завершення — дія ЩЕ не відбулася) і природно використовувати обидві форми'
  - 'Учень вміє пояснювати, як вибір виду в запереченні змінює прагматичне значення речення, використовуючи українську метамову (загальне заперечення vs незавершене очікування)'
  - 'Учень вміє застосовувати шаблон заперечення з видом у всіх трьох часах (минулому, теперішньому, майбутньому) та в питаннях (Ти не читав? vs Ти ще не прочитав?)'
  - 'Учень вміє використовувати заперечні видові пари у природній розмові для вираження фактичного заперечення, незавершених очікувань та загальних тверджень про відсутність дії'
dialogue_situations:
  - setting: 'Двоє сусідів по кімнаті — один питає про хатні справи. Інший розмежовує те, що взагалі не робив, і те, що ще не закінчив: Ти прибрав кімнату? — Ні, я не прибирав. А посуд? — Посуд я мив, але ще не домив — залишилося трохи.'
    speakers:
      - Ольга
      - Михайло
    motivation: 'Природний контраст: не + недок. (взагалі не робив / загальне заперечення) vs ще не + док. (ще не закінчив / очікуване завершення)'
  - setting: 'Студент і професор обговорюють терміни здачі роботи — професор запитує про прогрес, студент пояснює, що ще не зроблено: Ви вже написали вступ? — Ще не написав, але я працюю над ним. А літературу ви читали? — Ні, ще не читав — не знаю, з чого почати.'
    speakers:
      - Професор
      - Студент
    motivation: 'ще не + док. (очікуваний прогрес ще не досягнутий) vs не + недок. (до діяльності взагалі не приступали)'
content_outline:
  - section: 'Тест: що ви заперечуєте?'
    words: 850
    points:
      - 'Діагностика: 10 пар речень із запереченням — учні обирають природний варіант. Приклади: — Ти читав цю книжку? — Ні, (не читав / ще не прочитав). [Обидва правильні — але означають різне. Який підходить за контекстом?] — Ти написав звіт? — (Не писав / Ще не написав). — Чому ти не їв? / Чому ти ще не поїв?'
      - 'Самооцінювання: учні помічають, що граматично часто підходять обидва варіанти, але ЗНАЧЕННЯ змінюється. Цей модуль навчає, як свідомо керувати цією зміною.'
      - 'Головний концепт: заперечення + вид = ДВА різні мовленнєві акти. Не + недоконаний: «Ця дія не відбулася. Я констатую факт». Ще не + доконаний: «Цей результат ще не досягнутий, але він очікується». Ставлення мовця до дії (нейтральний факт vs очікування в процесі) визначає вид.'
      - 'Мінідіалог, що ілюструє різницю: — Ти вже обідав? — Ні, не обідав. (Фактично: я не обідав.) vs — Ти вже пообідав? — Ще не пообідав. (Очікувано: я ЩЕ не обідав — але збираюся.)'
  - section: 'Не + недоконаний: загальне заперечення'
    words: 1050
    points:
      - 'Основний шаблон: не + недоконаний вид = дія заперечується як загальний факт (Заболотний 7 клас, с.57). Я не читав цю книжку. (Ніколи не читав — констатація факту.) Вона не телефонувала. (Вона не телефонувала — дзвінка не було.) Ми не обговорювали це питання. (Ми не обговорювали — тему не порушували.) Він не вчив українську. (Він не вчив українську — загальне твердження.)'
      - 'У теперішньому часі: не робить чогось зараз/загалом. Я не розумію. (Я не розумію — тривалий стан.) Він не працює сьогодні. (Він сьогодні не працює.) Вона не їсть м''ясо. (Вона не їсть м''ясо — загальна звичка.) Усі форми природно недоконані, оскільки сам теперішній час є недоконаним.'
      - 'У питаннях: Ти не бачив моїх ключів? (загальне — чи бачив ти мої ключі взагалі?) Ви не знаєте, де бібліотека? (ввічливе питання — недок. природний). Чому ви не відповідали на листи? (чому ви не відповідали — загальна відсутність дії).'
      - 'Практика: учні відповідають на запитання, використовуючи не + недок., щоб виразити загальне заперечення. — Ти дивився цей фільм? — Ні, не дивився. — Вона вчила іспанську? — Ні, не вчила. Фокус: мовець не робить жодних коментарів щодо того, чи ПОВИННІ вони були це робити.'
  - section: 'Ще не + доконаний: очікуване завершення'
    words: 1050
    points:
      - 'Основний шаблон: ще не + доконаний вид = очікуваний результат ЩЕ не досягнутий (Литвінова 7 клас, с.38). Я ще не прочитав цю книжку. (Я ще не прочитав її — але маю намір / від мене очікують.) Вона ще не зателефонувала. (Вона ще не зателефонувала — але повинна.) Ми ще не вирішили. (Ми ще не вирішили — рішення очікується).'
      - 'Слово «ще» є ключовим маркером: воно сигналізує про очікування того, що дія зрештою БУДЕ завершена. Без «ще» заперечення доконаного виду зустрічається рідко і є маркованим: Він не прочитав книжку (незвично — вказує на конкретний провал). З «ще»: Він ще не прочитав книжку (природно — очікування завершення).'
      - 'У майбутньому: Я ще не зроблю це до п''ятниці. (Я не встигну зробити це до п''ятниці — результат очікується пізніше.) Вона ще не закінчить до вечора. (Вона ще не закінчить до вечора.) Вони виражають неповний прогрес до очікуваного кінцевого моменту.'
      - 'Контрастні пари — одне й те саме речення, різний вид, різна прагматика: Він не писав лист. (Загальне: він взагалі не писав листа.) Він ще не написав лист. (Конкретне: лист існує як очікування, але ще не готовий.) Я не вчила цей матеріал. (Я взагалі не вчила цей матеріал.) Я ще не вивчила цей матеріал. (Я ще не опанувала його — але працюю над цим.) Практика: учні утворюють обидва варіанти і пояснюють прагматичну різницю.'
  - section: 'Підсумок: заперечення як прагматичний вибір'
    words: 1050
    points:
      - 'Синтез: заперечення + вид — це про СТАВЛЕННЯ мовця, а не про об''єктивну реальність. Ту саму фактичну ситуацію (лист не написано) можна висловити як не писав (нейтральний факт) або ще не написав (очікування завершення). Мовець ОБИРАЄ, як подати відсутність дії.'
      - 'Розширена діалогова практика: учні розігрують сценарій, де керівник запитує про хід проєкту. Співробітник використовує не + недок. для завдань, які йому не доручали (Ні, я не працював над цим — це не моє завдання) та ще не + док. для завдань у процесі (Ще не закінчив, але закінчу до п''ятниці). Вид розкриває ставлення працівника до кожного завдання.'
      - 'Типові помилки: *Я ще не читав цю книжку (поєднання ще не з недок. — звучить незграбно; оберіть або не читав, або ще не прочитав). *Він не написав лист (без ще заперечення доконаного виду звучить як звинувачення або скарга — неприродно для нейтрального твердження). Надмірне використання ще не — не кожне заперечення передбачає очікування завершення.'
      - 'Анонс наступного модуля: після тематичної паузи про роботу та кар''єру, вид в умовних реченнях — як вид поводиться в конструкціях з якщо/якби.'
