activity_hints:
  - type: quiz
    focus: 'Оберіть не + недок. або ще не + док. залежно від контексту — констатація факту vs очікування завершення'
    items: 10
  - type: fill-in
    focus: 'Доповніть заперечні речення правильною видовою формою залежно від ставлення мовця (нейтральний факт vs «ще ні»)'
    items: 8
  - type: group-sort
    focus: 'Розподіліть заперечні речення на загальне заперечення (не + недок.) та незавершене очікування (ще не + док.)'
    items: 10
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у виборі виду в заперечних реченнях (*ще не читав → ще не прочитав; *не написав без контексту → не писав)'
    items: 6
  - type: match-up
    focus: 'З''єднайте прагматичні ситуації (керівник запитує про завдання, друг питає про книжки, вчитель перевіряє домашнє завдання) із правильним шаблоном заперечення'
    items: 8
  - type: open-writing
    focus: 'Напишіть діалог, у якому одна особа розпитує про виконання кількох завдань — використовуйте не + недок. для нерозпочатих завдань і ще не + док. для завдань у процесі виконання'
    items: 6
connects_to:
  - 'b1-008 (Вид у наказовому способі — передумова)'
  - 'b1-011 (Вид в умовних реченнях)'
  - 'b1-004 (Вид у минулому часі — заперечні пари будуються на виді минулого часу)'
prerequisites:
  - 'b1-008 aspect-in-imperatives (прагматика виду в наказах)'
  - 'b1-004 aspect-past-tense (вибір виду в минулому часі)'
grammar:
  - 'Не + недоконаний вид: загальне заперечення — факт ненастання дії'
  - 'Ще не + доконаний вид: очікуване, але незавершене — результат ще попереду'
  - 'Прагматична різниця: нейтральний факт vs незавершене очікування'
  - 'Заперечення у всіх часах: минулий, теперішній, майбутній'
  - 'Дієслова з префіксом до- (домити, дочитати, доробити) у контексті ще не'
register: розмовний
references:
  - title: "Заболотний Grade 7, p.54-60"
    notes: 'Вид дієслова: заперечення і вид, вибір виду в заперечних конструкціях, вправи на мінімальні пари з запереченням.'
  - title: "Литвінова Grade 7, p.36-40"
    notes: 'Вид і заперечення: ще не + доконаний як маркер очікуваного завершення, не + недоконаний як загальне заперечення.'
  - title: "Авраменко Grade 7, p.63-70"
    notes: 'Заперечні конструкції з видом: вправи на розрізнення загального заперечення і незавершеного очікування.'