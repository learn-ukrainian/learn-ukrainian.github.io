module: b1-022
level: B1
sequence: 22
slug: checkpoint-verbs
version: '3.0'
title: Контрольна робота 3
subtitle: Дієслівна фаза — перевірка M18-M25
focus: review
pedagogy: PPP
phase: B1.2 [Verbs]
word_target: 4000
objectives:
  - 'Learner can form and use умовний спосіб: реальні умови (якщо + дійсний) and нереальні
    умови (якби + умовний), including polite forms (хотів би)'
  - Learner can form all наказовий спосіб paradigm forms including хай/нехай for
    3rd person, with correct aspect and м'який знак
  - Learner can form віддієслівні іменники with -ння/-ття and distinguish 
    суфіксальний from безафіксний word formation
  - Learner can identify and use all semantic categories of зворотні дієслова 
    with correct -ся/-сь euphony and pronunciation
  - Learner can form and choose between passive constructions (-ся vs -но/-то) 
    and prefers active voice when appropriate
  - Learner can decompose prefixed verbs and identify formation methods
dialogue_situations:
  - setting: 'Job interview at a Київська IT-компанія — demonstrating full verb mastery:
      Якби я мав більше часу, вивчив би Python. Тестування проводиться щодня. Напишіть
      тестове завдання (n, test task). Програма була розроблена нашою командою.'
    speakers:
      - HR-менеджер
      - Кандидат
    motivation: 'Consolidation: conditionals, imperatives, verbal nouns, reflexives,
      passive'
content_outline:
  - section: Огляд умовного способу
    words: 800
    points:
      - 'Review of M18 — real conditions: Formation: минулий час + би/б. Placement
        rules. Якщо-sentences: якщо + дійсний спосіб → дійсний спосіб. Polite forms:
        Я хотів/хотіла б... Чи не могли б ви...? Practice: complete 5-6 якщо-sentences
        with correct forms.'
      - 'Review of M19 — unreal conditions: Якби + умовний спосіб → умовний спосіб.
        Present and past counterfactuals. Fixed expressions: Якби не ти... Якби я
        знав/знала! Practice: classify 6-8 sentences as реальна or нереальна умова.
        Transform: real → unreal and vice versa.'
      - 'Integrated exercise: dialogue with mixed real/unreal conditionals. Learners
        identify each conditional type and explain their choice. — Якщо завтра буде
        сонце, поїдемо на пляж. — Якби я мав відпустку, поїхав би на тиждень! — Ну,
        якщо візьмеш вихідні, може встигнемо.'
  - section: Огляд наказового способу
    words: 650
    points:
      - 'Review of M20 — full paradigm: 2sg: неси, читай, будь, сядь. 1pl: несімо,
        читаймо, ходімо (inclusive ''let''s''). 2pl: несіть, читайте, будьте. 3sg/3pl:
        хай несе, нехай читають. М''який знак: будь, лізь, глянь (after д, т, з, с,
        ц, л, н) but NOT: поставмо, сипмо, їжмо (after ж, ч, ш, р, в, п).'
      - 'Aspect in imperatives review: Доконаний for specific single actions: Відчини
        вікно. Недоконаний for general/repeated: Відчиняй вікно щоранку. Заперечення
        + наказовий → недоконаний: Не забувай! (not *Не забудь). Practice: choose
        aspect for 6-8 imperative situations.'
      - 'Polite register review: Передайте, будь ласка. Давайте обговоримо. Чи не
        могли б ви допомогти? Прошу не палити. Decolonization check: Ходімо! (not
        *Пішли!)'
  - section: Огляд віддієслівних іменників та творення дієслів
    words: 600
    points:
      - 'Review of M21 — віддієслівні іменники: Суфіксальне: -ння (читання), -ття
        (відкриття), -іння (ходіння). Безафіксне: пошук, підпис, біг, крик. Register:
        -ння/-ття = formal/bookish, безафіксні = neutral. Practice: form verbal nouns
        from 8-10 verbs, identify formation type.'
      - 'Review of M24 — verb formation: Префіксальний: писати → написати, переписати,
        вписати. Суфіксальний: білий → білити, крик → кричати, штовх → штовхнути.
        Префіксально-суфіксальний: земля → заземлити. Practice: decompose 6-8 complex
        verbs into morphemes.'
      - 'Integration exercise: given a root, build a word family: писати → написати
        (pf), переписати (rewrite), писання (writing), підпис (signature), записати
        (to write down), записка (note). Learners see how one root generates a whole
        vocabulary cluster.'
  - section: Огляд зворотних дієслів та пасивного стану
    words: 600
    points:
      - 'Review of M22 — зворотні дієслова: 5 categories: власне зворотні (митися),
        взаємні (зустрічатися), стану (хвилюватися), безособові (не спиться), пасивноподібні
        (будується). Euphony: -ся before consonant, -сь before vowel. Pronunciation:
        -шся [с'':а], -ться [ц'':а]. Practice: classify 8-10 зворотні дієслова by
        semantic category.'
      - 'Review of M23 — passive voice: -ся passive: Дім будується. Товар продається.
        -но/-то passive: Дім збудовано. Товар продано. Active preference: Робітники
        збудували дім (most natural). Practice: rank 3 versions of the same sentence
        by naturalness.'
      - 'Error correction: fix mixed errors across M22-M23. *Вибачаюся (→ Вибачте),
        *стирати білизну (→ прати), *Книга читалася мною (→ Я прочитав книгу or Книгу
        прочитано), *Мені не спитися (→ Мені не спиться).'
  - section: 'Комплексні вправи: дієслівна фаза'
    words: 650
    points:
      - 'Exercise block 1 — Grammar identification: A Ukrainian text (8-10 sentences)
        about daily life and planning. Learners identify and label: умовний спосіб,
        наказовий спосіб, зворотні дієслова (by category), пасивні конструкції, віддієслівні
        іменники, prefixed verbs (identify prefix and meaning).'
      - 'Exercise block 2 — Transformation: Given active sentences, form passives
        (-но/-то). Given direct commands, form polite requests. Given real conditions,
        form unreal ones. Given verbs, form verbal nouns. 8-10 transformations testing
        all Phase 3 skills.'
      - 'Exercise block 3 — Production: Write a paragraph (6-8 sentences) describing
        your ideal day, using at least: one якщо-sentence, one якби-sentence, three
        reflexive verbs, one -но/-то passive, two imperatives. This tests integrated
        use of all Phase 3 grammar.'
  - section: Діалог-синтез та перехід до Фази 4
    words: 700
    points:
      - 'Extended dialogue combining all Phase 3 grammar: Two friends discussing their
        day, making plans, distributing tasks. Natural integration of: — умовний (Якщо
        встигну, зайду. Якби мала час, поїхала б.) — наказовий (Ходімо! Не забудь!
        Хай Сашко купить хліб.) — зворотні (прокинулася, збираюся, зустрінемося) —
        пасив (Вечерю приготовлено. Посуд помито.) — віддієслівні іменники (Після
        прибирання відпочинемо.) — префіксні дієслова (перевірити, допрацювати, вимкнути)'
      - 'Comprehension questions testing LANGUAGE, not content: — Знайдіть усі форми
        умовного способу. Які з них реальні, які ні? — Визначте вид кожного дієслова
        наказового способу. — Які зворотні дієслова вжито? До якої категорії вони
        належать? — Знайдіть конструкцію на -но/-то. Перетворіть її на активну.'
      - 'Self-assessment and Phase 4 preview: Я можу: утворити умовний спосіб ✓/✗,
        побудувати речення з якщо/якби ✓/✗, утворити всі форми наказового способу
        ✓/✗, розрізнити 5 типів зворотних дієслів ✓/✗, утворити пасив на -но/-то ✓/✗,
        розкласти дієслово на морфеми ✓/✗. Phase 4 preview: The Motion Verb Universe
        — spatial prepositions, base motion verbs, and the prefix system for movement.'
vocabulary_hints:
  required:
    - умовний спосіб (conditional mood)
    - наказовий спосіб (imperative mood)
    - реальна умова (real condition — якщо)
    - нереальна умова (unreal condition — якби)
    - зворотне дієслово (reflexive verb — -ся/-сь)
    - пасивний стан (passive voice)
    - віддієслівний іменник (verbal noun)
    - префіксальний спосіб (prefixal word formation)
    - суфіксальний спосіб (suffixal word formation)
    - видова пара (aspectual pair)
    - милозвучність (euphony — -ся/-сь, б/би rules)
    - хай / нехай (let — 3rd person imperative)
    - будь ласка (please)
    - ходімо (let's go — inclusive imperative)
  recommended:
    - нереальний (unreal)
    - безафіксний (zero-derivation)
    - канцелярит (bureaucratese)
    - перехідне дієслово (transitive verb)
    - формотворча частка (form-creating particle — би/б)
    - давальний відмінок (dative — for impersonal reflexives)
    - безособовий (impersonal)
    - знахідний відмінок (accusative — object in -но/-то constructions)
activity_hints:
  - type: quiz
    focus: 'Identify grammar structures in context: умовний/наказовий/зворотний/пасивний/віддієслівний'
    items: 12
  - type: fill-in
    focus: Complete a mixed text with correct Phase 3 verb forms (conditional, 
      imperative, reflexive, passive)
    items: 10
  - type: error-correction
    focus: 'Fix errors across all Phase 3 topics: *Пішли (→ Ходімо), wrong conditional,
      spelling, Russianisms'
    items: 8
  - type: match-up
    focus: 'Match sentence pairs: active↔passive, real↔unreal conditional, verb↔verbal
      noun'
    items: 10
  - type: group-sort
    focus: 'Sort verbs/constructions by Phase 3 category: умовний/наказовий/зворотний/пасивний/словотвір'
    items: 12
  - type: reading-comprehension
    focus: Read a daily-life dialogue and answer grammar-focused questions about
      all Phase 3 topics
    items: 8
