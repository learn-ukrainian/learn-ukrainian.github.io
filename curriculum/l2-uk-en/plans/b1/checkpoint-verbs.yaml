grammar:
  - 'Умовний спосіб: реальні (якщо + дійсний) i нереальні (якби + умовний) умови'
  - 'Наказовий спосіб: повна парадигма, хай/нехай, вид, ввічливість'
  - 'Віддієслівні іменники: -ння, -ття, безафіксний спосіб'
  - 'Зворотні дієслова: 5 категорій, -ся/-сь, вимова -шся/-ться'
  - 'Пасивний стан: -ся пасив, -но/-то, перевага активного стану'
  - 'Творення дієслів: префіксальний, суфіксальний, префіксально-суфіксальний'
register: розмовний
references:
