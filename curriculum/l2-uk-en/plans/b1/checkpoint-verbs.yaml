- type: error-correction
  focus: 'Виправте помилки з усіх тем Фази 3: *Пішли (→ Ходімо), неправильна умова, орфографія, росіянізми'
  items: 8
- type: match-up
  focus: 'З''єднайте пари речень: актив↔пасив, реальна↔нереальна умова, дієслово↔віддієслівний іменник'
  items: 10
- type: group-sort
  focus: 'Відсортуйте дієслова/конструкції за категоріями Фази 3: умовний/наказовий/зворотний/пасив/словотвір'
  items: 12
- type: reading-comprehension
  focus: 'Прочитайте діалог про щоденне життя і дайте відповіді на запитання щодо граматики Фази 3'
  items: 8
