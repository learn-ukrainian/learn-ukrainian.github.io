module: b1-033
level: B1
sequence: 33
slug: checkpoint-verbs
version: '3.0.4'
title: Контрольна робота 2
subtitle: Дієслівна фаза — перевірка модулі №18–25
focus: review
pedagogy: PPP
phase: B1.2 [Дієслова]
word_target: 4000
objectives:
  - 'Вміти утворювати та вживати умовний спосіб: реальні умови (якщо + дійсний) і нереальні умови (якби + умовний), включно з формами ввічливості (хотів би).'
  - 'Навчитися утворювати всі форми наказового способу, включно з хай/нехай для третьої особи, правильно обираючи вид та використовуючи м''який знак.'
  - 'Вміти утворювати віддієслівні іменники за допомогою суфіксів -ння/-ття та розрізняти суфіксальний і безафіксний способи словотвору.'
  - 'Вміти розпізнавати та вживати всі семантичні категорії зворотних дієслів, дотримуючись правил милозвучності (-ся/-сь) і правильної вимови.'
  - 'Вміти утворювати пасивні конструкції (-ся та -но/-то), вибирати доречний варіант і віддавати перевагу активному стану там, де це доцільно.'
  - 'Вміти робити морфемний розбір префіксальних дієслів і визначати спосіб словотвору.'
dialogue_situations:
  - setting: 'Співбесіда в Київській ІТ-компанії — демонстрація повного володіння дієсловом: Якби я мав більше часу, вивчив би Python. Тестування проводиться щодня. Напишіть тестове завдання. Програма була розроблена нашою командою.'
    speakers:
      - HR-менеджер
      - Кандидат
    motivation: 'Закріплення: умовний та наказовий способи, віддієслівні іменники, зворотні дієслова, пасивний стан'
content_outline:
  - section: Огляд умовного способу
    words: 800
    points:
      - 'Повторення: реальні умови. Утворення: минулий час + би/б. Правила розташування. Речення з "якщо": якщо + дійсний спосіб → дійсний спосіб. Форми ввічливості: Я хотів/хотіла б... Чи не могли б ви...? Практика: доповнити 5-6 речень з "якщо" правильними формами.'
      - 'Повторення: нереальні умови. Якби + умовний спосіб → умовний спосіб. Теперішній та минулий час нереальних умов. Сталі вирази: Якби не ти... Якби я знав/знала! Практика: класифікувати 6-8 речень як реальні чи нереальні умови. Трансформація: реальні → нереальні та навпаки.'
      - 'Інтегрована вправа: діалог зі змішаними реальними та нереальними умовами. Учні визначають тип кожної умови і пояснюють свій вибір. — Якщо завтра буде сонце, поїдемо на пляж. — Якби я мав відпустку, поїхав би на тиждень! — Ну, якщо візьмеш вихідні, може встигнемо.'
  - section: Огляд наказового способу
    words: 650
    points:
      - 'Повторення: повна парадигма. 2 особа однини: неси, читай, будь, сядь. 1 особа множини: несімо, читаймо, ходімо. 2 особа множини: несіть, читайте, будьте. 3 особа одн./мн.: хай несе, нехай читають. М''який знак: будь, лізь, глянь (після д, т, з, с, ц, л, н), але БЕЗ НЬОГО: поставмо, сипмо, їжмо (після ж, ч, ш, р, в, п).'
      - 'Вид дієслова в наказовому способі: Доконаний для конкретної одноразової дії: Відчини вікно. Недоконаний для загальної/повторюваної: Відчиняй вікно щоранку. Заперечення + наказовий → недоконаний: Не забувай! (а не *Не забудь). Практика: обрати вид для 6-8 ситуацій.'
      - 'Ввічливі форми: Передайте, будь ласка. Давайте обговоримо. Чи не могли б ви допомогти? Прошу не палити. Перевірка на деколонізацію: Ходімо! (а не *Пішли!)'
  - section: Огляд віддієслівних іменників та творення дієслів
    words: 600
    points:
      - 'Повторення: віддієслівні іменники. Суфіксальний спосіб: -ння (читання), -ття (відкриття), -іння (ходіння). Безафіксний: пошук, підпис, біг, крик. Стиль: -ння/-ття = офіційний/книжний, безафіксні = нейтральний. Практика: утворити віддієслівні іменники від 8-10 дієслів, визначити спосіб словотвору.'
      - 'Повторення: творення дієслів. Префіксальний: писати → написати, переписати, вписати. Суфіксальний: білий → білити, крик → кричати, штовх → штовхнути. Префіксально-суфіксальний: земля → заземлити. Практика: зробити морфемний розбір 6-8 похідних дієслів.'
      - 'Інтегрована вправа: на основі кореня побудувати словотвірне гніздо: писати → написати, переписати, писання, підпис, записати, записка. Учні бачать, як один корінь генерує цілу групу слів.'
  - section: Огляд зворотних дієслів та пасивного стану
    words: 600
    points:
      - 'Повторення: зворотні дієслова. 5 категорій: власне зворотні (митися), взаємні (зустрічатися), стану (хвилюватися), безособові (не спиться), пасивноподібні (будується). Милозвучність: -ся перед приголосним, -сь перед голосним. Вимова: -шся [с'':а], -ться [ц'':а]. Практика: класифікувати 8-10 зворотних дієслів за категоріями.'
      - 'Повторення: пасивний стан. Пасив на -ся: Дім будується. Товар продається. Пасив на -но/-то: Дім збудовано. Товар продано. Перевага активного стану: Робітники збудували дім (найприродніше). Практика: ранжувати 3 варіанти одного речення за рівнем природності.'
      - 'Виправлення помилок: виправити змішані помилки. *Вибачаюся (→ Вибачте), *стирати білизну (→ прати), *Книга читалася мною (→ Я прочитав книгу або Книгу прочитано), *Мені не спитися (→ Мені не спиться).'
  - section: 'Комплексні вправи: дієслівна фаза'
    words: 650
    points:
      - 'Вправа 1 — Ідентифікація граматики: український текст (8-10 речень) про повсякденне життя та планування. Учні знаходять і позначають: умовний спосіб, наказовий спосіб, зворотні дієслова (за категорією), пасивні конструкції, віддієслівні іменники, префіксальні дієслова.'
      - 'Вправа 2 — Трансформація: з речень активного стану утворити пасив на -но/-то. З прямих наказів утворити ввічливі прохання. З реальних умов утворити нереальні. З дієслів утворити віддієслівні іменники. 8-10 трансформацій на всі теми Фази 3.'
      - 'Вправа 3 — Продуктивне завдання: написати абзац (6-8 речень) з описом свого ідеального дня, використовуючи принаймні: одне речення з "якщо", одне з "якби", три зворотні дієслова, один пасив на -но/-то, два дієслова в наказовому способі.'
  - section: Діалог-синтез та перехід до Фази 4
    words: 700
    points:
      - 'Розширений діалог, що поєднує всю граматику Фази 3: двоє друзів обговорюють свій день, будують плани, розподіляють завдання. Природна інтеграція: — умовний (Якщо встигну, зайду. Якби мала час, поїхала б.) — наказовий (Ходімо! Не забудь! Хай Сашко купить хліб.) — зворотні (прокинулася, збираюся, зустрінемося) — пасив (Вечерю приготовлено. Посуд помито.) — віддієслівні іменники (Після прибирання відпочинемо.) — префіксальні дієслова (перевірити, допрацювати, вимкнути).'
      - 'Запитання для розуміння: — Знайдіть усі форми умовного способу. Які з них реальні, які ні? — Визначте вид кожного дієслова наказового способу. — Які зворотні дієслова вжито? До якої категорії вони належать? — Знайдіть конструкцію на -но/-то. Перетворіть її на активну.'
      - 'Самооцінка та огляд Фази 4: Я можу: утворити умовний спосіб ✓/✗, побудувати речення з якщо/якби ✓/✗, утворити всі форми наказового способу ✓/✗, розрізнити 5 типів зворотних дієслів ✓/✗, утворити пасив на -но/-то ✓/✗, розкласти дієслово на морфеми ✓/✗. Огляд Фази 4: Всесвіт дієслів руху — просторові прийменники, базові дієслова руху та система префіксів.'
  - section: Підсумок
    words: 300
    points:
      - 'Дієслівні способи та стан вимагають специфічних форм: умовний спосіб використовує минулий час + би/б (якщо для реальної умови, якби для нереальної). Наказовий спосіб має окремі форми для всіх осіб (читай, читаймо, читайте, хай читає). Пасивні конструкції використовують -ся або -но/-то, хоча часто віддається перевага активному стану.'
      - 'Словотвір та зворотні дієслова розширюють словниковий запас: віддієслівні іменники утворюються за допомогою суфіксів (-ння, -ття) або без них (пошук). Зворотні дієслова поділяються на 5 семантичних категорій і вживаються з -ся/-сь за правилами милозвучності.'
      - 'Самоперевірка: У чому різниця між "якщо" та "якби"? Опишіть свій ранковий розпорядок, використавши 3 зворотні дієслова та 1 наказ.'
vocabulary_hints:
  required:
  - умовний спосіб (conditional mood)
  - наказовий спосіб (imperative mood)
  - реальна умова (real condition — якщо)
  - нереальна умова (unreal condition — якби)
  - зворотне дієслово (reflexive verb — -ся/-сь)
  - пасивний стан (passive voice)
  - віддієслівний іменник (verbal noun)
  - префіксальний спосіб (prefixal word formation)
  - суфіксальний спосіб (suffixal word formation)
  - видова пара (aspectual pair)
  - милозвучність (euphony — -ся/-сь, б/би rules)
  - хай / нехай (let — 3rd person imperative)
  - будь ласка (please)
  - ходімо (let's go — inclusive imperative)
  recommended:
  - нереальний (unreal)
  - безафіксний (zero-derivation)
  - канцелярит (bureaucratese)
  - перехідне дієслово (transitive verb)
  - формотворча частка (form-creating particle — би/б)
  - давальний відмінок (dative — for impersonal reflexives)
  - безособовий (impersonal)
  - знахідний відмінок (accusative — object in -но/-то constructions)
