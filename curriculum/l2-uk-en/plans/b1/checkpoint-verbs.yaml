    notes: 'This checkpoint synthesizes content from all Phase 3 modules. Primary
      textbook sources: Литвінова Grade 7, Заболотний Grade 7, Авраменко Grade 7 and
      Grade 11, Заболотний Grade 8, Заболотний Grade 7, Голуб Grade 6, Вашуленко Grade
      3.'
