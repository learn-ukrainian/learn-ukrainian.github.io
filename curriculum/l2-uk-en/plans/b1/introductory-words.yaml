module: b1-088
level: B1
sequence: 88
slug: introductory-words
version: '3.0.2'
title: "Вставні слова та Однорідні члени речення"
subtitle: "Мабуть, можливо, здається, на жаль — слова, що виражають ставлення мовця"
focus: grammar
pedagogy: PPP
phase: "B1.8 [Текст та регістр]"
word_target: 4000
objectives:
  - "Учень вміє пояснювати, що таке вставні конструкції (виражають ставлення мовця, НЕ є членами речення, можуть бути вилучені без зміни основного змісту) та відрізняти їх від членів речення."
  - "Учень вміє класифікувати вставні слова за їхніми семантичними групами: впевненість, невпевненість, емоції, джерело інформації, порядок думок, привернення уваги."
  - "Учень вміє правильно ставити розділові знаки в реченнях зі вставними словами, використовуючи коми та тире згідно з правилами української пунктуації."
  - "Учень вміє розпізнавати слова, які ЗАВЖДИ є вставними (отже, мабуть, по-перше), та слова, які НІКОЛИ ними не бувають (адже, навіть, принаймні, нібито)."
  - "Учень вміє природно використовувати вставні слова як у писемному, так і в усному українському мовленні для вираження ставлення, організації дискурсу та залучення слухача."
  - "Учень вміє використовувати однорідні члени речення та застосовувати правильну пунктуацію, зокрема при узагальнювальних словах."
dialogue_situations:
  - setting: 'Академічна презентація на Київській конференції — використання вставних слів: По-перше, це важливо. По-друге, дослідження (n, research) підтверджує. На жаль, даних (pl, data) замало. Очевидно, потрібен новий підхід (m, approach). Безумовно, це крок уперед.'
    speakers:
      - Доповідач (presenter)
      - Аудиторія
    motivation: 'Вставні слова: по-перше, по-друге, на жаль, очевидно, безумовно'
content_outline:
  - section: "Однорідні члени речення"
    words: 700
    points:
      - "Визначення: Кілька слів, що відповідають на одне й те саме питання і відносяться до одного й того самого слова в реченні."
      - "Правила пунктуації: коми між ними, якщо вони не з'єднані і/та, або якщо з'єднані протиставними сполучниками а, але."
      - "Узагальнювальні слова: пунктуація перед (двокрапка) та після (тире) однорідних членів."
      - "Практика: об'єднання простих речень в одне з однорідними членами та правильна пунктуація."
  - section: "Що таке вставні слова?"
    words: 600
    points:
      - "Визначення за Заболотним, 8 клас, с.178: Вставні слова (сполучення слів, речення) виражають ставлення мовця до висловленого. Вони НЕ є членами речення і можуть бути вилучені без зміни граматичної структури. Порівняння: Земля щороку, на жаль, утрачає лісові масиви проти Земля щороку утрачає лісові масиви — однаковий основний зміст."
      - "За Авраменком, 11 клас, с.109: Вставні конструкції (слова, словосполучення та речення) виражають ставлення мовця до сказаного й не несуть нової інформації. Вони додають модальність — перспективу мовця."
      - "Ключова перевірка: чи можна вилучити слово так, щоб речення залишилося граматично правильним? Якщо так — це вставне слово. Якщо ні — це член речення. Здається, дощ уже йде (вставне — можна забрати). Мені здається, що дощ уже йде (присудок — не можна забрати). Практика: учні перевіряють речення за допомогою цього методу."
      - "Позиція в реченні: вставні слова можуть стояти на початку, в середині або в кінці: Мабуть, дощ уже йде. Дощ, мабуть, уже йде. Дощ уже йде, мабуть. Позиція впливає на емфазу та ритм."
  - section: "Групи вставних слів за значенням"
    words: 800
    points:
      - "1. Впевненість: звичайно, безумовно, безперечно, справді, без сумніву, певна річ. Приклад: Безумовно, це правильне рішення. 2. Невпевненість: мабуть, можливо, здається, певно, либонь, нібито. Приклад: Мабуть, дощ уже йде."
      - "3. Емоції: на жаль, на щастя, на диво, на сором, як на зло. Приклад: На жаль, я не зможу прийти. 4. Джерело інформації: за даними, на думку, як відомо, за словами, кажуть, мовляв. Приклад: За даними екологів, ситуація погіршується."
      - "5. Порядок думок: по-перше, по-друге, отже, нарешті, навпаки, зрештою, до речі, наприклад. Приклад: По-перше, це дорого. По-друге, це непотрібно. 6. Привернення уваги: бачиш, знаєш, уяви собі, розумієш, послухай, майте на увазі. Приклад: Уяви собі, він таки прийшов!"
      - "Практика: учні читають український текст і класифікують усі вставні слова за семантичними групами. Потім складають речення, використовуючи по одному слову з кожної групи."
  - section: "Завжди вставні vs ніколи не вставні"
    words: 550
    points:
      - "Слова, які ЗАВЖДИ є вставними (за Авраменком, 8 клас, с.13): отже, мабуть, по-перше, по-друге, щоправда, а втім. Вони ЗАВЖДИ виділяються комами."
      - "Слова, які НІКОЛИ не бувають вставними (за Авраменком, 8 клас, с.13): адже, навіть, принаймні, усе-таки, начебто, нібито (деякі джерела допускають його як вставне, але Авраменко наводить його тут). З ними НІКОЛИ не ставляться коми."
      - "Складні випадки — слова, які можуть бути або вставними, або членами речення: Здається, дощ іде (вставне) проти Він здається розумним (присудок). Можливо, він правий (вставне) проти Це можливо (присудок). Правда, я запізнився (вставне) проти Це правда (підмет). Практика: учні визначають, чи є виділене слово вставним, застосовуючи перевірку вилученням."
      - "Поширена помилка: використання навіть, адже, принаймні як вставних слів і додавання зайвих ком. Практика: учні прибирають зайві коми з речень."
  - section: "Пунктуація вставних слів"
    words: 600
    points:
      - "Базове правило: вставні слова виділяються комами: На початку речення: Мабуть, завтра буде дощ. У середині: Завтра, мабуть, буде дощ. У кінці: Завтра буде дощ, мабуть. Вставні словосполучення: За словами лікаря, все добре. Вставні речення: Дощ, як мені здається, уже йде."
      - "Дужки та тире для вставних речень: Коли вставна конструкція довша або додає суттєвий коментар, використовуйте тире або дужки: Цей фільм — я бачив його тричі — справді чудовий. Цей фільм (я бачив його тричі) справді чудовий. Практика: учні ставлять розділові знаки в реченнях зі вставними конструкціями."
      - "Вставні слова проти сполучників: Отже, підемо далі (вставне — кома після отже). I, власне, це все (вставне — коми навколо власне). Але: I навіть не подумав (навіть НЕ є вставним — коми немає). Практика: вправи на пунктуацію зі змішаними вставними та невставними словами."
      - "Читання: уривок з української газети зі вставними словами. Учні знаходять усі вставні конструкції, класифікують їх за групами та перевіряють пунктуацію."
  - section: "Вставні слова у мовленні та на письмі"
    words: 550
    points:
      - "Вставні слова у розмовному стилі — дискурсивні маркери: Знаєш, я тут подумав... Слухай, а може... Бачиш, як воно... Розумієш, проблема в тому, що... Вони підтримують плин діалогу та виражають залученість. Практика: учні використовують дискурсивні маркери в діалогах."
      - "Вставні слова у публіцистичному стилі — структурування аргументів: По-перше, ... По-друге, ... Отже, ... На думку експертів, ... За даними дослідження, ... Практика: учні пишуть короткий абзац-аргументацію, використовуючи вставні слова для організації своїх думок."
      - "Вставні слова для вираження невпевненості та ввічливості: Мабуть, варто зачекати (пом'якшення пропозиції). Може, підемо? (ввічлива пропозиція). Здається, тут помилка (дипломатичне виправлення). Ця прагматична функція є важливою для природної української мови."
      - "Попередження про надмірне використання: забагато вставних слів обтяжують текст. Порівняйте: Мабуть, можливо, здається, це, на мою думку, правильно (перевантажено) проти Мабуть, це правильно (природно). Практика: учні редагують тексти, щоб зменшити надмірне використання вставних слів."
  - section: "Підсумок: слова-компаси"
    words: 300
    points:
      - "Повний довідник: усі семантичні групи з прикладами, правила пунктуації, списки слів, що ЗАВЖДИ/НІКОЛИ не є вставними."
      - "Самоперевірка українською мовою: 1. Що таке вставні слова? Чим вони відрізняються від членів речення? 2. Назвіть шість груп вставних слів за значенням. 3. Які слова завжди вставні? Які ніколи не бувають вставними? 4. Розставте розділові знаки: Мабуть завтра на жаль буде дощ."
      - "Анонс: Природа і довкілля (M82) — лексика природи та довкілля, де вставні слова допоможуть учням висловлювати думки про екологію."
vocabulary_hints:
  required:
    - "вставне слово (parenthetical word — expresses speaker's attitude)"
    - "вставна конструкція (parenthetical construction — word, phrase, or clause)"
    - "мабуть (probably — uncertainty)"
    - "можливо (possibly — uncertainty)"
    - "здається (it seems — uncertainty)"
    - "на жаль (unfortunately — negative emotion)"
    - "на щастя (fortunately — positive emotion)"
    - "отже (therefore — ordering thoughts)"
    - "по-перше (firstly — ordering thoughts)"
    - "наприклад (for example — illustration)"
    - "безумовно (undoubtedly — certainty)"
    - "до речі (by the way — connecting thoughts)"
    - "за даними (according to data — source of information)"
    - "на думку (in the opinion of — source of information)"
    - "однорідні члени речення (homogeneous members)"
    - "узагальнювальне слово (generalizing word)"
  recommended:
    - "безперечно (certainly — strong certainty)"
    - "справді (indeed — confirmation)"
    - "либонь (perhaps — literary uncertainty)"
    - "на диво (surprisingly — unexpected emotion)"
    - "зрештою (after all — concluding thoughts)"
    - "власне (actually/in fact — clarification)"
    - "мовляв (reportedly — reported speech marker)"
    - "щоправда (to be fair — concession)"
    - "навпаки (on the contrary — contrast)"
    - "уяви собі (imagine — attention-drawing)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про однорідні члени речення і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Що таке вставні слова?».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему однорідні члени речення.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему що таке вставні слова?.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Однорідні члени речення».'
  - type: match-up
    focus: "З'єднайте терміни з розділу «Що таке вставні слова?» з їхніми визначеннями."
