module: b1-031
level: B1
sequence: 31
slug: relative-clauses-koly-shcho
version: '2.0'
title: 'Підрядні означальні: коли, що'
subtitle: Time and Fact Relative Clauses
focus: grammar
pedagogy: TTT
phase: B1.3a [Complex Sentences]
word_target: 4000
objectives:
- Learner can form time relative clauses with коли
- Learner can use що as a relative pronoun for facts
- Learner can distinguish relative що from conjunction що
- Learner can combine time expressions with relative clauses
content_outline:
- section: Вступ та Культурний контекст (Introduction and Cultural Context)
  words: 400
  points:
  - Огляд підрядних означальних речень згідно зі стандартом §4.4.3 для вираження часових та фактологічних зв'язків.
  - 'Культурний гачок: Метафора «Час пливе, як вода» — зв''язок із темою дієслів руху та поетичним сприйняттям часу в українському
    фольклорі.'
- section: 'Часові підрядні: Коли (Temporal Clauses: Koly)'
  words: 900
  points:
  - Вживання сполучного слова «коли» для вираження одночасності та різночасовості дій у складнопідрядному реченні.
  - 'Філософія часу: Розгляд прислів''я «Час — не кінь: не підженеш та й не зупиниш» як прикладу використання «коли» у контексті
    невідворотності подій.'
  - 'Колокації: Опрацювання сталих виразів «з того часу, коли» та «на час, коли» для структурування спогадів.'
- section: 'З''ясувальні та означальні речення: Що (Explanatory and Relative Clauses: Shcho)'
  words: 1100
  points:
  - 'Критична межа B1: Розрізнення «що» як сполучника (explanatory: я знаю, що...) та «що» як відносного займенника (relative:
    книга, що лежить...).'
  - Вживання «що» з абстрактними іменниками та вказівними словами (те, що...; все, що...), аналіз конструкції «дарма, що».
  - 'Стилістика та евфонія: Вибір між «що» та «який» для уникнення тавтології та накопичення приголосних («k-heavy» речення).'
- section: Порівняльний аналіз та типові помилки (Comparative Analysis and Common Errors)
  words: 800
  points:
  - 'Помилка 1: Плутанина «коли» (час) vs «якщо» (умова) — розмежування часових («зроблю, коли прийдеш») та умовних відносин
    («зроблю, якщо допоможеш»).'
  - 'Помилка 2: Неправильне узгодження відносного займенника «який» за родом і числом (наприклад, «дівчина, який...» замість
    «яка...»).'
  - 'Практичне відпрацювання: Чергування «що» та «який» для створення милозвучного тексту та специфікації гендеру.'
- section: 'Практичне застосування: Діалоги (Practical Application: Dialogues)'
  words: 800
  points:
  - 'Діалог про спогади та історію: Використання часових підрядних для опису вирішальних та слушних моментів минулого з використанням
    «коли».'
  - 'Діалог про роботу та майбутнє: Застосування фактологічного «що» для обговорення планів, ідей та незаперечних фактів.'
vocabulary_hints:
  required:
  - 'коли (when) — сполучне слово; колокація: «з того часу, коли»; частота: висока'
  - 'що (that/what/which) — відносний займенник vs сполучник; колокація: «те, що», «дарма, що»'
  - 'час (time) — іменник; фразеологізми: «час минає», «час від часу», «з часом»'
  - 'момент (moment) — іменник; колокації: «вирішальний момент», «слушний момент»'
  - 'факт (fact) — іменник; колокації: «історичний факт», «ставити перед фактом»'
  - те (that - neuter) — вказівне слово для підрядних конструкцій
  - все (everything) — часто вживається перед відносним займенником «що»
  recommended:
  - до того як (before) — часовий сполучник для позначення послідовності
  - після того як (after) — часовий сполучник для позначення послідовності
  - поки (while/until) — часовий сполучник для тривалих дій
  - одночасно (simultaneously) — прислівник для вираження часової відповідності
  - коли завгодно (whenever) — сталий вираз для вільного вибору часу
