module: b1-059
level: B1
sequence: 59
slug: gerund-phrases
version: '3.1'
title: "Дієприслівниковий зворот"
subtitle: "Дієприслівник із залежними словами: відокремлення та стилістика"
focus: grammar
pedagogy: PPP
phase: "B1.6 [Participles & Gerunds]"
word_target: 4000
objectives:
  - "Learner can identify дієприслівниковий зворот as a gerund with its dependent
    words, functioning as an обставина in the sentence"
  - "Learner can apply the main punctuation rule: дієприслівниковий зворот and одиничний
    дієприслівник are ALWAYS set off by commas"
  - "Learner can recognize exceptions: фразеологічні звороти (не покладаючи рук, затамувавши
    подих) and manner-adverb gerunds are NOT set off"
  - "Learner can compare дієприкметниковий зворот (M59) with дієприслівниковий зворот:
    means vs attribute, different comma rules"
  - "Learner can avoid the dangling gerund error and use gerund phrases to create
    varied, expressive Ukrainian prose"
dialogue_situations:
  - setting: 'Life coach podcast recorded in a Київська студія (f, Kyiv studio) —
      giving advice with gerund phrases: Працюючи над собою щодня, ви змінитесь. Прочитавши
      цю книгу (f), ви зрозумієте. Не зробивши першого кроку (m, step), нічого не
      досягнете.'
    speakers:
      - Коуч (coach)
      - Ведучий подкасту
    motivation: 'Gerund phrases: працюючи над собою, прочитавши книгу, не зробивши
      кроку'
content_outline:
  - section: "Дієприслівниковий зворот: будова"
    words: 700
    points:
      - "Definition from Заболотний Grade 7 p.127: дієприслівниковий зворот — це дієприслівник
        із залежними від нього словами. The зворот functions as an обставина (circumstantial
        modifier): Край річки, ставши на плотину, рибалка вудочку закинув (Л. Боровиковський).
        'Ставши на плотину' = зворот: ставши (дієприслівник) + на плотину (залежні
        слова)."
      - "Syntactic role: the entire phrase answers як? коли? чому? Спілкуючись із
        журналістами, спортсмен подякував тренеру. (як?) Випередивши суперника, плавець
        здобув медаль. (коли? що зробивши?) Скориставшись помилкою захисника, нападник
        забив гол. (чому? за яких умов?)"
      - "Comparison with одиничний дієприслівник (single gerund without dependent
        words): Усміхаючись, вона підійшла. Both the phrase and the single gerund
        follow the same comma rule."
  - section: "Правила відокремлення"
    words: 900
    points:
      - "Main rule from Литвінова Grade 7 p.114 and Заболотний Grade 8 p.205: Дієприслівниковий
        зворот i одиничний дієприслівник ЗАВЖДИ відокремлюються комами, незалежно
        від позиції: На початку: Прочитавши листа, Оленка задумалася. У середині:
        Оленка, прочитавши листа, задумалася. В кінці: Оленка задумалася, прочитавши
        листа. This is SIMPLER than дієприкметниковий зворот rules (M59)!"
      - "Two or more gerund phrases: each set off separately: Дізнавшись правду, зрозумівши
        все, він вирішив діяти. Homogeneous gerund phrases joined by i: Відчинивши
        двері i ввімкнувши світло, він оглянув кімнату. (single comma pair, not between
        the two phrases joined by i)"
      - "EXCEPTIONS — NO commas (from Заболотний Grade 8 p.205 and Авраменко Grade
        7 p.152): 1. Фразеологічні звороти: працює не покладаючи рук, слухали затамувавши
        подих, бігли не чуючи ніг. 2. Дієприслівник приєднано сполучником i як однорідний
        до невідокремленої обставини: борілися мужньо й не шкодуючи свого життя. 3.
        Підсилювальна частка i перед дієприслівниковим зворотом: Це можна виконати
        й не знаючи правил. 4. Single gerund that has become an adverb of manner and
        stands after the verb: стояв похилившись, сидів задумавшись."
      - "Practice: 12 sentences — learners place commas correctly, including exception
        cases."
  - section: "Порівняння зворотів: дієприкметниковий vs дієприслівниковий"
    words: 650
    points:
      - "Key differences: | Feature | Дієприкметниковий | Дієприслівниковий | | Role
        | означення (який?) | обставина (як? коли?) | | Modifies | іменник | дієслово-присудок
        | | Comma rule | depends on position | ALWAYS commas | | Can transform to
        | який-clause | коли/після того як clause |"
      - "Side-by-side: Студент, прочитавши книгу, написав есе. (дієприслівниковий
        — коли?) Книга, прочитана студентом, лежала на столі. (дієприкметниковий —
        яка?) The first describes WHEN the student wrote; the second describes WHICH
        book was on the table."
      - "Practice: classify phrases in sentences as дієприкметникові or дієприслівникові
        звороти and apply correct punctuation."
  - section: "Помилки та стилістика"
    words: 650
    points:
      - "Dangling gerund (рeview from M61-62, now with full phrases): *Перейшовши
        дорогу, мені стало легше. (Who crossed? → dangling) → Перейшовши дорогу, я
        відчув полегшення. *Готуючи вечерю, кіт забіг на кухню. → Коли я готував вечерю,
        кіт забіг на кухню. (different subjects → clause)"
      - "Stylistic overuse: too many gerund phrases make prose heavy. Ukrainian literary
        style prefers variety: Overloaded: *Проснувшись рано, умившись, поснідавши,
        зібравшись, вийшовши з дому, дійшовши до зупинки, сівши в автобус... Better:
        Прокинувшись рано, я швидко зібрався. Поснідав i вийшов з дому. На зупинці
        сів в автобус."
      - "Register awareness: gerund phrases are more common in художній, науковий,
        and публіцистичний styles. In розмовний style, Ukrainians prefer clauses or
        simple sentences."
  - section: "Iнтегрована практика"
    words: 700
    points:
      - "Reading passage: a literary excerpt or news article using both дієприкметникові
        and дієприслівникові звороти. Learners: 1. Identify and classify all звороти.
        2. Add commas where needed. 3. Transform selected phrases into clauses. 4.
        Evaluate stylistic appropriateness."
      - "Production: learners write a short narrative (6-8 sentences) about a journey
        or event, using at least 3 дієприслівникові звороти (mix of imperfective and
        perfective) and 2 дієприкметникові звороти. Correct punctuation throughout."
  - section: "Підсумок та перехід до M64"
    words: 400
    points:
      - "Summary: дієприслівниковий зворот = дієприслівник + залежні слова. Завжди
        відокремлюється комами (винятки: фразеологізми, підсилювальна i). Self-check:
        Я правильно ставлю коми при дієприслівниковому звороті ✓/✗, Я розрізняю дієприкметниковий
        i дієприслівниковий звороти ✓/✗."
      - "Consolidation: side-by-side punctuation reference for both phrase types.
        Дієприкметниковий зворот: після означуваного слова → коми, перед → без ком,
        після займенника → завжди коми. Дієприслівниковий зворот: ЗАВЖДИ коми (винятки:
        фразеологізми, підсилювальна i, прислівниковий дієприслівник після дієслова).
        Quick-test: 6 mixed sentences for learners to punctuate."
      - "Preview: M64 — Освіта та навчання. Communication module applying Phase 7
        grammar in academic contexts."
vocabulary_hints:
  required:
    - "дієприслівниковий зворот (gerund phrase)"
    - "відокремлення (setting off with commas)"
    - "фразеологічний зворот (phraseological expression — exception to comma rule)"
    - "не покладаючи рук (without rest — phraseological, no commas)"
    - "затамувавши подих (holding one's breath — phraseological, no commas)"
    - "обставина (adverbial modifier — syntactic role)"
    - "означення (attribute — syntactic role of дієприкметниковий зворот)"
  recommended:
    - "однорідні обставини (homogeneous adverbial modifiers)"
    - "підсилювальна частка (intensifying particle — i/й before gerund)"
    - "стилістика (stylistics — appropriate register usage)"
    - "канцелярит (bureaucratese — overuse of participial/gerund phrases)"
