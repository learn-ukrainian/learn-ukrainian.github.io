module: b1-059
level: B1
sequence: 59
slug: gerund-phrases
version: '3.1.3'
title: "Дієприслівниковий зворот"
subtitle: "Дієприслівник із залежними словами: відокремлення та стилістика"
focus: grammar
pedagogy: PPP
phase: "B1.6 [Дієприкметники та дієприслівники]"
word_target: 4000
objectives:
  - "Вміти визначати дієприслівниковий зворот як дієприслівник із залежними словами, що виконує роль обставини в реченні."
  - "Вміти застосовувати головне правило пунктуації: дієприслівниковий зворот та одиничний дієприслівник завжди відокремлюються комами."
  - "Вміти розпізнавати винятки: фразеологічні звороти (не покладаючи рук, затамувавши подих) та дієприслівники зі значенням способу дії не відокремлюються."
  - "Вміти порівнювати дієприкметниковий зворот (модуль №59) із дієприслівниковим зворотом: обставина порівняно з означенням, різні правила відокремлення."
  - "Вміти уникати помилок із неправильним узгодженням суб'єкта дії (dangling gerund) і використовувати дієприслівникові звороти для створення різноманітного, виразного українського тексту."
dialogue_situations:
  - setting: 'Подкаст лайфкоуча, записаний у київській студії — поради з використанням дієприслівникових зворотів: Працюючи над собою щодня, ви змінитесь. Прочитавши цю книгу (f), ви зрозумієте. Не зробивши першого кроку, нічого не досягнете.'
    speakers:
      - Коуч
      - Ведучий подкасту
    motivation: 'Дієприслівникові звороти: працюючи над собою, прочитавши книгу, не зробивши кроку'
content_outline:
  - section: "Дієприслівниковий зворот: будова"
    words: 700
    points:
      - "Визначення за Заболотним (7 клас, с. 127): дієприслівниковий зворот — це дієприслівник із залежними від нього словами. Зворот виконує роль обставини: Край річки, ставши на плотину, рибалка вудочку закинув (Л. Боровиковський). Ставши на плотину = зворот: ставши (дієприслівник) + на плотину (залежні слова)."
      - "Синтаксична роль: весь зворот відповідає на питання як? коли? чому? Спілкуючись із журналістами, спортсмен подякував тренеру. (як?) Випередивши суперника, плавець здобув медаль. (коли? що зробивши?) Скориставшись помилкою захисника, нападник забив гол. (чому? за яких умов?)"
      - "Порівняння з одиничним дієприслівником (без залежних слів): Усміхаючись, вона підійшла. І зворот, і одиничний дієприслівник підпорядковуються одному правилу пунктуації."
  - section: "Правила відокремлення"
    words: 900
    points:
      - "Головне правило за Литвіновою (7 клас, с. 114) та Заболотним (8 клас, с. 205): дієприслівниковий зворот і одиничний дієприслівник ЗАВЖДИ відокремлюються комами, незалежно від позиції. На початку: Прочитавши листа, Оленка задумалася. У середині: Оленка, прочитавши листа, задумалася. В кінці: Оленка задумалася, прочитавши листа. Це ПРОСТІШЕ, ніж правила для дієприкметникового звороту (модуль №59)!"
      - "Два або більше дієприслівникових зворотів: кожен відокремлюється окремо: Дізнавшись правду, зрозумівши все, він вирішив діяти. Однорідні дієприслівникові звороти, з'єднані сполучником і: Відчинивши двері і ввімкнувши світло, він оглянув кімнату. (виділяються однією парою ком, а між зворотами кома не ставиться)."
      - "ВИНЯТКИ — БЕЗ ком (за Заболотним (8 клас, с. 205) та Авраменком (7 клас, с. 152)): 1. Фразеологічні звороти: працює не покладаючи рук, слухали затамувавши подих, бігли не чуючи ніг. 2. Дієприслівник приєднано сполучником і як однорідний член до невідокремленої обставини: борілися мужньо й не шкодуючи свого життя. 3. Підсилювальна частка і перед дієприслівниковим зворотом: Це можна виконати й не знаючи правил. 4. Одиничний дієприслівник, що перейшов у прислівник способу дії та стоїть після дієслова: стояв похилившись, сидів задумавшись."
      - "Практика: 12 речень — учні правильно розставляють коми, враховуючи винятки."
  - section: "Порівняння зворотів: дієприкметниковий vs дієприслівниковий"
    words: 650
    points:
      - "Ключові відмінності: | Ознака | Дієприкметниковий | Дієприслівниковий | | Роль | означення (який?) | обставина (як? коли?) | | Пояснює | іменник | дієслово-присудок | | Пунктуація | залежить від позиції | ЗАВЖДИ коми | | Заміна на | підрядне з 'який' | підрядне з 'коли/після того як' |"
      - "Паралельне порівняння: Студент, прочитавши книгу, написав есе. (дієприслівниковий — коли?) Книга, прочитана студентом, лежала на столі. (дієприкметниковий — яка?) Перше речення описує, КОЛИ студент писав; друге описує, ЯКА саме книга лежала на столі."
      - "Практика: класифікувати звороти в реченнях як дієприкметникові або дієприслівникові та застосувати правильну пунктуацію."
  - section: "Помилки та стилістика"
    words: 650
    points:
      - "Порушення синтаксичного зв'язку (повторення матеріалу модулі №61–62, тепер із розширеними зворотами): *Перейшовши дорогу, мені стало легше. (Хто перейшов? → порушення зв'язку) → Перейшовши дорогу, я відчув полегшення. *Готуючи вечерю, кіт забіг на кухню. → Коли я готував вечерю, кіт забіг на кухню. (різні суб'єкти → підрядне речення)."
      - "Стилістичне перевантаження: забагато дієприслівникових зворотів обважнюють текст. Український літературний стиль надає перевагу різноманітності: Перевантажено: *Проснувшись рано, умившись, поснідавши, зібравшись, вийшовши з дому, дійшовши до зупинки, сівши в автобус... Краще: Прокинувшись рано, я швидко зібрався. Поснідав і вийшов з дому. На зупинці сів в автобус."
      - "Розуміння регістру: дієприслівникові звороти частіше зустрічаються в художньому, науковому та публіцистичному стилях. У розмовному стилі українці віддають перевагу підрядним або простим реченням."
  - section: "Інтегрована практика"
    words: 700
    points:
      - "Читання тексту: уривок з художнього тексту або новинної статті, що містить дієприкметникові та дієприслівникові звороти. Завдання: 1. Знайти і класифікувати всі звороти. 2. Додати необхідні коми. 3. Трансформувати вибрані звороти у підрядні речення. 4. Оцінити стилістичну доцільність."
      - "Продукування тексту: учні пишуть коротку розповідь (6-8 речень) про подорож чи подію, використовуючи щонайменше 3 дієприслівникові звороти (недоконаного і доконаного виду) та 2 дієприкметникові звороти. Правильно розставити всі коми."
  - section: "Підсумок та перехід до модуля №64"
    words: 400
    points:
      - "Підсумок: дієприслівниковий зворот = дієприслівник + залежні слова. Завжди відокремлюється комами (винятки: фразеологізми, підсилювальна частка і). Самоперевірка: Я правильно ставлю коми при дієприслівниковому звороті ✓/✗, Я розрізняю дієприкметниковий і дієприслівниковий звороти ✓/✗."
      - "Закріплення: порівняльна таблиця пунктуації для обох типів зворотів. Дієприкметниковий зворот: після означуваного слова → коми, перед → без ком, після займенника → завжди коми. Дієприслівниковий зворот: ЗАВЖДИ коми (винятки: фразеологізми, підсилювальна і, одиничний дієприслівник після дієслова зі значенням способу дії). Експрес-тест: 6 речень змішаного типу для розставлення розділових знаків."
      - "Анонс: модуль №64 — Освіта та навчання. Комунікативний модуль із застосуванням граматики фази 7 в академічних контекстах."
vocabulary_hints:
  required:
    - "дієприслівниковий зворот (gerund phrase)"
    - "відокремлення (setting off with commas)"
    - "фразеологічний зворот (phraseological expression — exception to comma rule)"
    - "не покладаючи рук (without rest — phraseological, no commas)"
    - "затамувавши подих (holding one's breath — phraseological, no commas)"
    - "обставина (adverbial modifier — syntactic role)"
    - "означення (attribute — syntactic role of дієприкметниковий зворот)"
  recommended:
    - "однорідні обставини (homogeneous adverbial modifiers)"
    - "підсилювальна частка (intensifying particle — i/й before gerund)"
    - "стилістика (stylistics — appropriate register usage)"
    - "канцелярит (bureaucratese — overuse of participial/gerund phrases)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про будову дієприслівникового звороту і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу про правила відокремлення."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему будови дієприслівникового звороту."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему відокремлення."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу про будову дієприслівникового звороту."
  - type: match-up
    focus: "З'єднайте терміни з розділу про правила відокремлення з їхніми визначеннями."
