grammar:
  - "Дієприслівниковий зворот: дієприслівник + залежні слова = обставина"
  - "Comma rule: ALWAYS set off (unlike дієприкметниковий зворот)"
  - "Exceptions: фразеологізми, підсилювальна i, manner-adverb gerund"
  - "Comparison: дієприкметниковий (означення) vs дієприслівниковий (обставина)"
  - "Dangling gerund prevention"
register: науково-навчальний
