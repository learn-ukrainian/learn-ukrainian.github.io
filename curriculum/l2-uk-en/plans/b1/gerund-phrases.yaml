grammar:
  - "Дієприслівниковий зворот: дієприслівник + залежні слова = обставина"
  - "Правило відокремлення: ЗАВЖДИ виділяється комами (на відміну від дієприкметникового звороту)"
  - "Винятки: фразеологізми, підсилювальна частка і, одиничний дієприслівник зі значенням способу дії"
  - "Порівняння: дієприкметниковий зворот (означення) проти дієприслівникового звороту (обставина)"
  - "Запобігання порушенню синтаксичного зв'язку"
register: науково-навчальний
references:
  - title: "Заболотний Grade 7, p.127-131"
    notes: "Дієприслівниковий зворот: пунктограма, вправи на розставлення ком, літературні приклади з Боровиковського."
  - title: "Заболотний Grade 8, p.205"
    notes: "Відокремлення обставин: повний перелік винятків, коли дієприслівникові звороти НЕ виділяються комами."
  - title: "Авраменко Grade 7, p.152"
    notes: "Не відокремлюються комами обставини: фразеологічні звороти, підсилювальна частка і, одиничні дієприслівники способу дії."
  - title: "Литвінова Grade 7, p.114-117"
    notes: "Розділ 3 Дієприслівник: визначення звороту, синтаксична роль, вправи з військовими та спортивними текстами."
