module: b1-072
level: B1
sequence: 72
slug: checkpoint-participles
version: '3.0.2'
title: "Контрольна робота 6"
subtitle: "Перевірка знань: дієприкметники, короткі прикметники, дієприслівники, освіта"
focus: review
pedagogy: PPP
phase: "B1.6 [Дієприкметники та дієприслівники]"
word_target: 4000
objectives:
  - "Вміти утворювати активні та пасивні дієприкметники, обираючи правильні суфікси та застосовуючи чергування приголосних."
  - "Навчитися правильно ставити розділові знаки в реченнях із дієприкметниковими та дієприслівниковими зворотами, зважаючи на винятки."
  - "Вміти відрізняти питомі українські дієприкметники від російських кальок і застосовувати доречні стратегії заміни."
  - "Навчитися утворювати та вживати дієприслівники недоконаного та доконаного виду, правильно обираючи форму на основі часової логіки (одночасність чи різночасність)."
  - "Вміти застосовувати всю граматику Фази 7 в академічному та літературному контекстах."
dialogue_situations:
  - setting: 'Літературознавчий семінар — студенти обговорюють вірш Шевченка, використовуючи дієприкметники та дієприслівники: Написаний Шевченком вірш... Читаючи ці рядки, розумієш... Прочитавши ''Кобзар'', неможливо залишитися байдужим.'
    speakers:
      - Викладач літератури
      - Студенти
    motivation: 'Закріплення: активні й пасивні дієприкметники, дієприслівники недоконаного й доконаного виду в літературному аналізі'
content_outline:
  - section: "Вступ: як працювати з контрольною"
    words: 350
    points:
      - 'Огляд: ця контрольна перевіряє матеріал модулів 57-64. Активні дієприкметники (M57), пасивні дієприкметники (M58), дієприкметниковий зворот (M59), короткі прикметники (M60), дієприслівники недоконаного виду (M61), дієприслівники доконаного виду (M62), дієприслівниковий зворот (M63), освіта (M64).'
      - 'Система самооцінювання: після кожного блоку оцініть свою впевненість: впевнено / потребую повторення / не розумію.'
  - section: "Блок 1: Дієприкметники"
    words: 600
    points:
      - 'Утворення форм: утворити активні та пасивні дієприкметники від 12 дієслів. Учні повинні вибрати правильний суфікс і застосувати чергування приголосних: квітнути → ?, носити → ?, прочитати → ?, зів''яти → ?, побачити → ?, мити → ?, закрутити → ?, робити → ?'
      - 'Класифікація: класифікувати 10 дієприкметників як активні теперішнього часу, активні минулого часу або пасивні. Далі визначити, чи кожен активний дієприкметник теперішнього часу є природним для української мови, чи російською калькою.'
      - 'Редагування російських кальок: переписати 6 словосполучень, замінивши неприродні дієприкметники питомими українськими відповідниками (описовими конструкціями, прикметниками, підрядними означальними реченнями).'
  - section: "Блок 2: Звороти і пунктуація"
    words: 600
    points:
      - 'Вправа на пунктуацію: 10 речень із дієприкметниковими та дієприслівниковими зворотами — розставити всі коми. Включає особливі випадки: препозитивні дієприкметникові звороти, особові займенники, фразеологізовані дієприслівникові звороти.'
      - 'Класифікація: визначити, чи є зворот дієприкметниковим (означення), чи дієприслівниковим (обставина), і сформулювати правило, що визначає постановку ком.'
      - 'Трансформація: переробити 6 зворотів на підрядні речення зі словами який/коли/після того як і навпаки.'
  - section: "Блок 3: Дієприслівники"
    words: 550
    points:
      - 'Утворення: утворити дієприслівники недоконаного і доконаного виду від 10 дієслів. Включає зворотні дієслова. Потрібно правильно вибрати суфікс (-учи/-ючи/-ачи/-ячи або -вши/-ши).'
      - 'Часова логіка: для 8 речень вибрати дієприслівник недоконаного (одночасність) або доконаного (різночасність) виду.'
      - 'Перевірка логічного суб''єкта: знайти та виправити 4 помилки з неправильним уживанням дієприслівникового звороту (коли дія звороту і присудка стосуються різних підметів).'
  - section: "Блок 4: Короткі прикметники"
    words: 400
    points:
      - 'Ідентифікація: знайти короткі прикметники в 5 літературних/фольклорних уривках і записати їхні повні форми.'
      - 'Сучасне використання: доповнити 6 речень правильним коротким прикметником (потрібен/певен/годен/ладен/варт/рад) у предикативній позиції.'
  - section: "Блок 5: Освіта та академічний стиль"
    words: 550
    points:
      - 'Академічна лексика: з''єднати 10 академічних термінів з їхніми визначеннями.'
      - 'Стилістична трансформація: переписати 5 неформальних речень про університетське життя в академічному стилі, використовуючи дієприкметникові звороти та дієприслівникові конструкції.'
      - 'Розуміння прочитаного: короткий академічний текст із використанням граматики Фази 7. Запитання перевіряють мовні навички: знайти всі дієприкметники, звороти, визначити стиль.'
  - section: "Блок 6: Інтегроване завдання"
    words: 550
    points:
      - 'Заповнення пропусків: академічний текст із 10 пропусками. Учні вписують правильні форми дієприкметників та дієприслівників, обираючи між активними і пасивними, недоконаним і доконаним видом, забезпечуючи правильне узгодження та пунктуацію.'
      - 'Продуктивне завдання: написати невеликий абзац (5-7 речень) з описом дослідницького проєкту або досвіду навчання, використавши щонайменше 2 дієприкметникові звороти, 2 дієприслівникові звороти та 1 короткий прикметник.'
  - section: "Підсумок та самооцінка"
    words: 400
    points:
      - 'Контрольний список самооцінювання: Дієприкметники: Чи правильно я утворюю активні й пасивні форми? Звороти: Чи правильно я ставлю розділові знаки? Дієприслівники: Чи розрізняю одночасність і різночасність? Короткі прикметники: Чи вживаю потрібен/певен/годен правильно? Освіта: Чи можу я говорити про навчання науковим стилем?'
      - 'Рекомендації: якщо будь-який блок оцінено нижче 70%, поверніться до відповідного модуля. Фаза 8 (Синтаксис складного речення) будується на цій базі для конструювання багатокомпонентних речень.'
