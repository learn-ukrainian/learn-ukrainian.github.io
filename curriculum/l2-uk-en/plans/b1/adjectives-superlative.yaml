  - "b1-041 (Ступені порівняння прислівників — adverb superlatives)"
prerequisites:
  - "b1-038 (Вищий ступінь прикметників — comparative formation and alternations)"
grammar:
  - "Найвищий ступінь: проста форма (най- + вищий ступінь)"
  - "Найвищий ступінь: складена форма (найбільш/найменш + прикметник)"
  - "Підсилені форми: що- + найвищий, як- + найвищий"
  - "Синонімічні засоби: дуже, вельми, пре-, -ісіньк-, повтор"
  - "Типові помилки: *самий кращий, *найбільш найкращий"
register: науково-навчальний
