module: b1-045
level: B1
sequence: 45
slug: adjectives-superlative
version: '3.1.2'
title: "Найвищий ступінь прикметників"
subtitle: "Проста та складена форми найвищого ступеня порівняння"
focus: grammar
pedagogy: PPP
phase: "B1.4 [Порівняння та словотворення]"
word_target: 4000
objectives:
  - 'Здобувач навчиться утворювати просту форму найвищого ступеня за допомогою префікса най-, який додається до вищого ступеня (найсильніший, найдорожчий, найвищий)'
  - 'Здобувач навчиться утворювати складену форму найвищого ступеня за допомогою найбільш/найменш + початкова форма прикметника (найбільш цікавий, найменш складний)'
  - 'Здобувач навчиться використовувати підсилені форми найвищого ступеня з префіксами що- та як- (щонайкращий, якнайшвидший) і пояснювати їхній стилістичний ефект'
  - 'Здобувач навчиться відрізняти правильне вживання найвищого ступеня від типових помилок (*самий кращий, *найбільш найкращий)'
  - 'Здобувач навчиться природно використовувати найвищий ступінь в описових та аргументативних контекстах (оглядах, рекомендаціях, дискусіях)'
dialogue_situations:
  - setting: 'Урок географії України — обговорення рекордів: Говерла — найвища (f) гора (f) в Україні. Дніпро — найдовша (f) річка (f). Київ — найбільше (n) місто (n). Одеса — найвеселіше місто на узбережжі.'
    speakers:
      - Вчитель географії
      - Учні
    motivation: 'Найвищий ступінь: найвищий, найдовший, найбільший зі словами гора(f), річка(f), місто(n)'
content_outline:
  - section: "Проста форма найвищого ступеня"
    words: 800
    points:
      - 'Правило творення за Литвіновою (6 клас, с.198): префікс най- + проста форма вищого ступеня. сильніший → найсильніший, молодший → наймолодший, дорожчий → найдорожчий, вищий → найвищий. Найвищий ступінь зберігає всі чергування вищого ступеня.'
      - 'Проста форма найвищого ступеня відмінюється як звичайний прикметник: Н. найсильніший / найсильніша / найсильніше / найсильніші Р. найсильнішого / найсильнішої / найсильнішого / найсильніших Практика з відмінюваними формами в реченнях: Це найцікавіша книжка, яку я читав. Ми живемо в найгарнішому місті.'
      - 'Поширені моделі творення — практичний блок: дорогий → дорожчий → найдорожчий, високий → вищий → найвищий, широкий → ширший → найширший, тихий → тихіший → найтихіший. 10-12 прикметників для утворення повних ланцюжків здобувачами.'
      - 'Практика читання: блог про подорожі з рейтингом українських міст та пам''яток, із широким використанням простої форми найвищого ступеня.'
  - section: "Складена форма найвищого ступеня"
    words: 650
    points:
      - 'Творення за Заболотним (8 клас, с.18): найбільш/найменш + початкова форма прикметника. найбільш цікавий, найменш відомий, найбільш поширений. Прикметник відмінюється; найбільш/найменш є незмінними.'
      - 'Стилістична відмінність: складена форма належить до офіційного, наукового, ділового стилю. "найбільш поширена хвороба" (медичний текст) проти "найпоширеніша хвороба" (повсякденне мовлення). Практика: переписування офіційних речень у неформальні та навпаки.'
      - 'Запобігання критичним помилкам: НІКОЛИ не поєднуйте най- із більш (*найбільш найкращий). НІКОЛИ не використовуйте "самий" (*самий кращий — це русизм). Правильно: найкращий АБО найбільш добрий.'
      - 'Практика на зіставлення (Авраменко, 6 клас, с.125): надати 8 пар прикметників, щоб здобувачі утворили і просту, і складену форми найвищого ступеня, а потім обрали ту, яка звучить природніше в певному контексті (наукова стаття проти невимушеної розмови).'
  - section: "Підсилені форми: що- та як-"
    words: 650
    points:
      - 'В українській мові є унікальний механізм підсилення: що- + найвищий ступінь: щонайкращий, щонайшвидший, щонайвищий. як- + найвищий ступінь: якнайкращий, якнайшвидший, якнайвищий.'
      - 'Контекст вживання: форми на що- виражають абсолютний максимум/мінімум; форми на як- виражають бажання або зусилля для досягнення максимуму. Зроби це якнайшвидше (мається на увазі зусилля). Це щонайкращий варіант (абсолютно найкращий варіант — констатація факту).'
      - 'Практика використання в контексті: інструкції, поради, оцінки. Приходьте якнайскоріше. Це щонайменша ціна. Він обрав якнайпростіший шлях.'
      - 'Орфографічне правило: що- та як- пишуться разом із найвищим ступенем (без дефіса): щонайкращий, якнайбільший. Типова помилка: *що-найкращий, *як найшвидший. Ці форми відмінюються як звичайні прикметники: щонайкращого, якнайбільшій.'
  - section: "Синонімічні засоби"
    words: 550
    points:
      - 'За Заболотним (8 клас, с.21): альтернативи, які виражають ідею найвищого ступеня без його формальних ознак: дуже, вельми, занадто, вкрай, особливо, надзвичайно + прикметник. вельми чемний, особливо уважний, вкрай виважений.'
      - 'Емоційне повторення та префікси (Заболотний, 8 клас, с.21): гарний-прегарний, білий-білісінький, синій-синій. Префікс пре-: предобрий, прегарний, прекрасний. Вони стилістично багатші за формальні найвищі ступені.'
      - 'Практика: переписати речення, використовуючи різні синонімічні засоби. "Це найкращий фільм" → "Цей фільм надзвичайно гарний." Обговорення: який варіант звучить природніше в якому контексті?'
  - section: "Ступені порівняння в контексті"
    words: 650
    points:
      - 'Комбінована практика з використанням вищого та найвищого ступенів разом: текст із порівнянням товарів (вибір телефону, ноутбука чи авто), де автор систематично порівнює варіанти та підсумовує рекомендацією в найвищому ступені.'
      - 'Культурна замітка: українські прислів''я та народні приказки з використанням порівнянь: "Що темніша ніч, то ясніші зорі." (Заболотний, 6 клас, с.138) "Свій хліб більш ситний." "З усіх скарбів найбільш цінним є молодість." Обговорення порівняння як риторичного прийому в українській культурі.'
      - 'Питання для самоперевірки: 1. Утворіть найвищий ступінь: тихий, широкий, близький, дешевий. 2. Чим відрізняється щонайкращий від найкращий? 3. Чому *самий кращий — помилка?'
  - section: "Типові помилки з найвищим ступенем"
    words: 250
    points:
      - 'Систематичний каталог помилок за Авраменком (11 клас, с.29) та Заболотним (8 клас, с.21): 1. Русизм *самий кращий (→ найкращий). 2. Подвійне вираження міри *найбільш найкращий (→ найкращий АБО найбільш добрий). 3. Неправильна основа *найдорогіший (→ найдорожчий — спочатку застосовується чергування, потім най-). 4. Написання через дефіс *най-кращий (→ найкращий — префікс пишеться разом).'
      - 'Діагностична вправа: 8-10 речень, кожне з яких містить одну помилку з каталогу. Здобувачі знаходять, класифікують (русизм / подвійне вираження / неправильна основа / орфографія) та виправляють кожну помилку.'
  - section: "Підсумок"
    words: 450
    points:
      - 'Схема повного ланцюжка порівняння: початкова форма → вищий ступінь → найвищий ступінь. проста: гарний → гарніший → найгарніший. складена: — → більш гарний → найбільш гарний. підсилена: — → — → щонайгарніший / якнайгарніший.'
      - 'Підсумкова таблиця, що консолідує всі моделі творення: проста (най- + вищий ступінь), складена (найбільш/найменш + початкова форма), підсилена (що-/як- + найвищий ступінь), синонімічні (дуже, вельми, пре-, повторення). Включає стилістичні вказівки для кожної.'
      - 'Анонс: наступний модуль охоплює суплетивні форми порівняння, де вищий ступінь утворюється від зовсім іншого кореня (гарний-кращий, поганий-гірший).'
vocabulary_hints:
  required:
    - "найвищий ступінь (superlative degree)"
    - "префікс (prefix — word-forming element before the root)"
    - "найбільш (most — used in compound superlative)"
    - "найменш (least — used in compound superlative)"
    - "щонайкращий (the very best — intensified superlative with що-)"
    - "якнайшвидший (as fast as possible — intensified superlative with як-)"
    - "вельми (very, exceedingly — formal synonym of дуже)"
    - "вкрай (extremely — degree intensifier)"
    - "надзвичайно (extraordinarily — degree intensifier)"
  recommended:
    - "підсилений (intensified — describing що-/як- forms)"
    - "синонімічний (synonymic — alternative way of expressing the same idea)"
    - "стилістичний (stylistic — relating to register and style choices)"
    - "прегарний (very beautiful — emphatic prefix пре-)"
    - "білісінький (absolutely white — emphatic suffix -ісіньк-)"
    - "занадто (too much — degree word showing excess)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про просту форму найвищого ступеня і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Складена форма найвищого ступеня».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему простої форми найвищого ступеня.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему складеної форми найвищого ступеня.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Проста форма найвищого ступеня».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Складена форма найвищого ступеня» з їхніми визначеннями.'
