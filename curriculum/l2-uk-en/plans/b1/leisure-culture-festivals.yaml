activity_hints:
  - type: reading
    focus: 'Прочитайте текст про дозвілля і захоплення і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Культура і мистецтво».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему дозвілля і захоплення.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему культура і мистецтво.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Дозвілля і захоплення».'
  - type: match-up
    focus: "З'єднайте терміни з розділу «Культура і мистецтво» з їхніми визначеннями."
