module: b1-067
level: B1
sequence: 67
slug: leisure-culture-festivals
version: '3.1.3'
title: "Дозвілля, культура і свята"
subtitle: "Вільний час, мистецтво, традиції та святкування"
focus: communication
pedagogy: PPP
phase: "B1.6 [Дієприкметники та дієприслівники]"
word_target: 4000
objectives:
  - "Учень вміє обговорювати дозвілля, хобі, спорт та розваги, використовуючи складний синтаксис Фази 8 (складносурядні та складнопідрядні речення)."
  - "Учень вміє описувати українські культурні заходи, музеї, театр та музику, природно використовуючи означальні, причинні та допустові підрядні речення."
  - "Учень вміє розповідати про українські свята та традиції: Різдво, Великдень, Івана Купала, День Незалежності, використовуючи непряму мову."
  - "Учень вміє висловлювати думки про культурні заходи, використовуючи моделі аргументації: Хоча..., проте... / Я вважаю, що... тому що..."
  - "Учень вміє використовувати всі синтаксичні конструкції Фази 8 у зв'язному комунікативному дискурсі."
  - "Учень вміє обговорювати відвідування ресторанів, досвід харчування та регіональну кухню."
dialogue_situations:
  - setting: 'Великдень в українському селі — повноцінне святкування: Ми святкуємо Великдень, хоча погода холодна. Мама сказала, що паска готова. Якщо встанемо рано, встигнемо на службу. Коли повернемося, будемо бити писанки.'
    speakers:
      - Родина
    motivation: 'Інтеграція культури: всі типи підрядних речень у контексті святкування Великодня'
content_outline:
  - section: "Дозвілля і захоплення"
    words: 750
    points:
      - "Лексичний кластер про дозвілля: дозвілля, захоплення/хобі, спорт, кіно, театр, концерт, музей, виставка, подорож, настільні ігри. Інтеграція зі складним синтаксисом: Мій друг, який захоплюється фотографією, показав мені свої роботи. (означальне — модуль №68)"
      - "Діалог 1: обговорення хобі та планів на вихідні. Природно використовуються складнопідрядні речення: — Чим ти зазвичай займаєшся у вільний час? — Я люблю читати, хоча останнім часом більше дивлюся серіали. — А я вважаю, що найкраще дозвілля — це спорт, тому що... Інтеграція допустового (хоча), з'ясувального (що) та причинного (тому що)."
      - "Спортивна лексика: футбол, баскетбол, плавання, біг, йога, тренування, змагання, перемога. Використання непрямої мови: Тренер сказав, що завтра буде тренування."
  - section: "Культура і мистецтво"
    words: 700
    points:
      - "Культурна лексика: мистецтво, живопис, скульптура, музика, пісня, танець, вистава, фільм, книга, поезія, художник. Визначні українські культурні пам'ятки: Львівська опера, Софійський собор, Мистецький арсенал, Олеський замок."
      - "Опис культурних подій складними реченнями: Виставка, яку ми відвідали, була присвячена сучасному мистецтву. Хоча квитки були дорогі, вистава того варта. Ми пішли в музей, щоб побачити нову експозицію. (означальне, допустове, мети)"
      - "Діалог 2: обговорення культурного заходу — що ви бачили, ваша думка. Використовується пряма і непряма мова (модуль №74): Критик написав, що ця виставка — «найважливіша подія року». Подруга сказала: «Тобі обов'язково треба це побачити!»"
  - section: "Українські свята і традиції"
    words: 750
    points:
      - "Головні українські свята: Різдво, Великдень, Івана Купала, День Незалежності, День Конституції, День захисників і захисниць. Культурний контекст: українські святкові традиції у порівнянні із західними еквівалентами."
      - "Лексика святкових традицій: колядки, кутя, писанки, вінок, купальська ніч, вишиванка, рушник. Опис традицій складним синтаксисом: Коли настає Різдво, родина збирається разом, щоб святкувати. Дарма що ця традиція дуже давня, вона не втрачає популярності."
      - "Читання: текст про одне з українських свят із насиченим складним синтаксисом. Питання на розуміння перевіряють знання МОВИ: Знайдіть усі складнопідрядні речення і визначте їх тип. Перетворіть пряму мову в тексті на непряму."
  - section: "Гастрономія і ресторанна культура"
    words: 650
    points:
      - "Лексика ресторанів і харчування: ресторан, кафе, меню, замовлення, страва, напій, рахунок, чайові, шеф-кухар, офіціант. Регіональна кухня: борщ, вареники, голубці, деруни, банош, сало. Використання складного синтаксису: Ресторан, який ми відвідали, славиться варениками. (означальне)"
      - "Діалог 3: замовлення в одеському ресторані — використання синтаксису Фази 8: — Що ви порадите? Я чув, що тут найкращі деруни. (з'ясувальне) — Хоча деруни смачні, раджу спробувати також банош, бо він — фірмова страва. (допустове + причинне) — Якщо ви любите рибу, замовте чорноморського бичка. (умовне)"
      - "Читання: короткий текст про українські регіональні кухні. Питання на розуміння перевіряють знання мови: Знайдіть складнопідрядні речення і визначте тип. Перетворіть пряму мову кухаря на непряму."
  - section: "Вираження думок і аргументація"
    words: 700
    points:
      - "Моделі вираження думок з використанням синтаксису Фази 8: Я вважаю, що... (з'ясувальне) тому що... (причинне). Хоча деякі люди думають, що..., я переконаний, що... (допустове + з'ясувальне). Якщо порівняти X і Y, то... (умовне). За словами експертів, ... (непряма мова)."
      - "Діалог 4: дебати про те, які свята важливіші — традиційні чи сучасні. Використовується аргументація зі структурами Фази 8."
      - "Продукція: написати абзац-аргументацію (6-8 речень) про культурний захід або свято, використовуючи щонайменше 4 різні типи складних речень."
  - section: "Підсумок фази 8 та перехід до модуля №76"
    words: 450
    points:
      - "Підсумок граматики Фази 8 у комунікативних контекстах: модуль №66: складносурядне (і, але, або) — з'єднання рівноправних думок. модуль №67: з'ясувальне (що, щоб, чи) — передача думок/мови. модуль №68: означальне (який) — опис іменників. модулі №69–73: обставинні (коли, бо, якщо, щоб, хоча) — час/причина/умова/мета/допустовість. модуль №74: пряма і непряма мова — цитування та переказування."
      - "Самоперевірка: Я можу розповісти про свято ✓/✗, Я вживаю різні складні речення ✓/✗. Анонс: модуль №76 — Контрольна робота 8, повторення всієї Фази 8."
