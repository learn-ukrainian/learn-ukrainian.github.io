module: b1-67
level: B1
sequence: 67
slug: travel-geography
version: '2.0'
title: Подорожі та географія
subtitle: Travel & Geography
content_outline:
- section: Вступ
  points:
  - 'Types of travel — розрізнення понять «подорож» (general), «поїздка» (short/specific),
    «мандрівка» (adventure); learner error: using ''подорож'' for a daily commute'
  - 'Ukrainian geography basics — superlatives: Україна як найбільша країна Європи,
    гора Говерла (2061 м), річка Дніпро (Right/Left Bank division)'
  - 'Vocabulary overview — focus on high-frequency collocations: «вирушити в подорож»,
    «незабутня мандрівка»'
- section: Читання
  points:
  - 'Travel texts — context differentiation: «відпустка» (work leave) vs «канікули»
    (student break)'
  - 'Ukrainian geography — cultural hooks: 7 Natural Wonders (Синевир, Асканія-Нова,
    Дністровський каньйон) and the Geometric Center of Europe (Dilove)'
- section: Діалоги
  points:
  - 'Discuss travel experiences — learner error: preposition usage «у горах» (correct)
    vs «на горах» (wrong), «на курорті» (correct) vs «в курорті» (wrong)'
  - Plan trips — usage of «бронювати» (tickets, hotels) and transport vocabulary alignment
    with State Standard §3.5
vocabulary_hints:
  required:
  - подорож (journey) — далека подорож, вирушити в подорож, морська подорож, подорож
    мрії
  - мандрівка (travel/trip) — піша мандрівка, незабутня мандрівка, віртуальна мандрівка
  - географія (geography) — вивчати географію, фізична географія, географія України
  - регіон (region) — гірський регіон, південний регіон, розвиток регіону
  - гори (mountains) — Карпатські гори, піднятися в гори, відпочинок у горах
  - море (sea) — Чорне море, тепле море, їхати на море, відпочивати на морі
  - аеропорт (airport) — міжнародний аеропорт, їхати в аеропорт, чекати в аеропорту
  - бронювати (to book) — бронювати готель, бронювати квитки, бронювати столик
  recommended:
  - курорт (resort) — морський курорт, гірськолижний курорт, лікувальний курорт
  - туризм (tourism) — зелений туризм, міжнародний туризм
  - відпустка (vacation) — щорічна відпустка, йти у відпустку, бути у відпустці
  - екскурсія (excursion) — цікава екскурсія, замовляти екскурсію
