title: 'Контрольна точка: Просунута граматика'
subtitle: Advanced Grammar Phase Checkpoint
content_outline:
- section: Вступ та огляд компетенцій (Introduction and Competency Overview)
  words: 400
  points:
  - 'Огляд цілей рівня B1.4 та відповідність Державному стандарту §4.2.3.1 (Морфологія:
    дієприкметник, дієприслівник).'
  - 'Самодіагностика: виявлення прогалин у вживанні складних граматичних форм перед
    переходом до фази розширення словникового запасу.'
  - 'Встановлення цілей контрольної точки: перевірка здатності будувати ''просте ускладнене
    речення'' згідно з §4.4.2 стандарту.'
- section: 'Дієприслівники: Динаміка та помилки (Adverbial Participles: Dynamics and
    Errors)'
  words: 650
  points:
  - Диференціація недоконаного (-ючи, -ачи) та доконаного (-вши, -ши) видів для вираження
    одночасності чи послідовності дій.
  - 'Аналіз типової помилки (Dangling Participle): чому конструкція «Йдучи додому,
    почався дощ» є граматично хибною та як її виправити.'
  - Практика узгодження дієприслівникового звороту з підметом основного речення для
    забезпечення природності мовлення.
- section: 'Дієприкметники: Активні форми та запозичення (Participles: Active Forms
    and Calques)'
  words: 650
  points:
  - 'Виправлення кальок з російської мови: заміна ''сидячих студентів'' та ''читаючих
    дівчат'' на природні конструкції з відносним займенником (''який сидить'', ''що
    читає'').'
  - Вживання активних дієприкметників минулого часу на -лий (пожовкле листя, зблідле
    обличчя) як стилістично правильної альтернативи.
  - Узгодження дієприкметників з іменниками у роді, числі та відмінку в структурі
    дієприкметникового звороту.
- section: Пасивні конструкції та безособові форми (Passive Constructions and Impersonal
    Forms)
  words: 650
  points:
  - 'Філософія ''активної'' української мови: чому конструкція «Депутати прийняли
    закон» є кращою за пасивну «Закон був прийнятий депутатами».'
  - 'Специфіка безособових форм на -но, -то (Зроблено в Україні): фокус на результаті
    без зазначення виконавця.'
  - 'Граматична помилка clashed agents: чому не можна вживати орудний відмінок дійової
    особи з формами на -но/-то (уникнення конструкцій типу «Мною зроблено»).'
- section: Демінутиви та мовна ментальність (Diminutives and Linguistic Mentality)
  words: 600
  points:
  - 'Концепція кордоцентризму: демінутиви як відображення ''мови серця'' та емоційної
    близькості зі світом.'
  - 'Аналіз суфіксів (-ик, -ок, -очок, -еньк-) та їхнього прагматичного значення:
    від пестливості до тонкої іронії.'
  - 'Вихід за межі іменників: вживання демінутивних дієслів (їстоньки, спатоньки)
    як унікальної особливості українського розмовного стилю.'
- section: 'Числівники: Збірні та дробові (Numerals: Collective and Fractions)'
  words: 600
  points:
  - 'Суворі обмеження збірних числівників (двоє, троє): чому вони вживаються з чоловічим
    родом, дітьми чи pluralia tantum, але ніколи з жінками (*двоє студенток — помилка).'
  - 'Математична точність: робота з дробами (одна друга, три чверті) та відсотками
    у контексті статистичних даних.'
  - Узгодження збірних числівників у непрямих відмінках (нас було п'ятеро, зустрів
    двох друзів).
- section: Інтеграція та підсумок фази (Integration and Phase Summary)
  words: 450
  points:
  - 'Інтеграційне завдання: редагування офіційно-ділового тексту (канцеляризмів) та
    перетворення його на природну, динамічну українську мову.'
  - Комплексний тест на знання синтаксису складного простого речення та морфологічних
    трансформацій.
  - 'Підбиття підсумків: оцінка прогресу та планування переходу до модуля B1.5 ''Абстрактні
    поняття та ідеї''.'
vocabulary_hints:
  required:
  - дієприслівник (adverbial participle) — вживати дієприслівник, дієприслівниковий
    зворот; часто помилковий у вживанні
  - дієприкметник (participle) — узгодження дієприкметника, активний vs пасивний стан
  - пасивний стан (passive voice) — пасивна конструкція, уникати пасиву на користь
    активу
  - безособова форма (impersonal form) — форми на -но/-то (зроблено, написано); фокус
    на результаті
  - збірний числівник (collective numeral) — двоє дітей, троє дверей; обмеження за
    родом
  - демінутив (diminutive) — пестлива форма, зменшувальний суфікс; емоційне забарвлення
  - контрольна точка (checkpoint) — оцінювання знань, проміжний підсумок
  - кордоцентризм (cordocentrism) — філософія серця, емоційність української мови
  recommended:
  - калька (calque/loan translation) — уникати кальок, виправлення помилок
  - пестливий (affectionate/tender) — пестливі слова, інтимність мовлення
  - одночасність (simultaneity) — вираження одночасних дій дієприслівником
  - послідовність (sequence) — вираження послідовних дій
  - спатоньки (to sleep - diminutive verb) — приклад дієслівного демінутива
  - сонечко (sun - diminutive) — типовий приклад пестливої форми
