module: b1-073
level: B1
sequence: 73
slug: complex-compound
version: '3.1.3'
title: "Складносурядне речення"
subtitle: "Єднальні, протиставні та розділові сполучники"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Синтаксис складного речення]"
word_target: 4000
objectives:
  - "Вміти визначати складносурядне речення як речення з двома або більше рівноправними частинами, з'єднаними сурядними сполучниками."
  - "Навчитися класифікувати сурядні сполучники на три групи: єднальні (і, й, та, ні...ні), протиставні (але, а, зате, проте), розділові (або, чи, то...то)."
  - "Вміти розрізняти смислові зв'язки між частинами речення: одночасність, послідовність, протиставлення, зіставлення, чергування, взаємовиключення."
  - "Вміти правильно ставити розділові знаки у складносурядних реченнях: кома перед сполучником, винятки (спільний другорядний член), крапка з комою, тире."
  - "Навчитися конструювати складносурядні речення для вираження зв'язаних, протиставлених або розділових думок."
dialogue_situations:
  - setting: 'Двоє друзів у львівській кав''ярні обговорюють плани на вихідні — використання складносурядних речень: Я хочу в кіно, а ти — в театр. Або ми підемо на виставку, або залишимося вдома. Погода гарна, і ми могли б погуляти.'
    speakers:
      - Софія
      - Андрій
    motivation: 'Складносурядні речення зі сполучниками і, а, але, або, проте; використання лексики: кіно, театр, виставка'
content_outline:
  - section: "Що таке складносурядне речення?"
    words: 700
    points:
      - 'Визначення: складносурядним називають складне речення, частини якого рівноправні за змістом і поєднані за допомогою сполучників сурядності. Головна ідея: рівноправність — жодна частина граматично не залежить від іншої. "А квітці пахне літа теплий день, і я спиняюсь у задумі" (О. Довгоп''ят).'
      - 'Порівняння зі складнопідрядним реченням: Складносурядне: Сонце зайшло, і стало темно. (рівноправні частини) Складнопідрядне: Коли сонце зайшло, стало темно. (головна і підрядна частини). Також порівняння з простим реченням з однорідними членами: Вітер дув і свистів. (один підмет, два присудки — просте речення). Вітер дув, і дерева хилилися. (два підмети, два присудки — складне).'
      - 'Спираючись на рівень А2: учні вже використовують "і", "але", "або" в мовленні. Цей модуль систематизує їхні знання та додає глибини.'
  - section: "Єднальні сполучники"
    words: 750
    points:
      - 'Єднальні сполучники: і (й), та (= і), ні...ні, як...так і, не тільки...але й. Смислові зв''язки: одночасність, послідовність. Одночасність: Сонце світить, і вітер віє. (дії відбуваються одночасно). Послідовність: Пролунав дзвінок, і учні вийшли з класу. (одна дія за іншою).'
      - 'Приклади з української літератури: "Темно-зеленії садки дрімають вже без плоду, і тихо гріються хатки, і верби гнуться в воду" (І. Франко). "Ні вітер не шумить, ні хвиля не плюскоче" (ні...ні — негативний паралелізм). "Як сонце світило, так і місяць сяяв" (як...так і — паралельний наголос).'
      - 'Практика: об''єднати пари простих речень у складносурядні, використовуючи єднальні сполучники. Учні вибирають між і/й/та на основі милозвучності та контексту.'
  - section: "Протиставні та розділові сполучники"
    words: 700
    points:
      - 'Протиставні сполучники: але, а (= але), та (= але), зате, проте, однак, а втім. Смислові зв''язки: протиставлення, зіставлення. Протиставлення: Усе іде, але не все минає (Л. Костенко). Зіставлення: Людина створила культуру, а культура — людину (О. Довженко).'
      - 'Розділові сполучники: або, чи, або...або, чи...чи, то...то, хоч...хоч. Смислові зв''язки: чергування, взаємовиключення. Чергування: То сонце усміхнеться нам крізь хмари, то дощик рясно землю полива (Г. Чубач). Взаємовиключення: Або рибку з''їсти, або на дно сісти (Народна творчість).'
      - 'Тонка різниця між "а" та "але": а = зіставлення (порівняння): Сестра читає, а брат малює. але = протиставлення (суперечність): Я хотів прийти, але не зміг. Практика: вибір між "а" та "але" в 6 контекстах.'
  - section: "Розділові знаки"
    words: 650
    points:
      - 'Основне правило: Між частинами складносурядного речення ставимо КОМУ: Джмелями літаки собі гудуть, і джміль до них гуде собі спросоння (І. Драч). Або рибку з''їсти, або на дно сісти.'
      - 'Крапка з комою: ставиться, якщо частини значно віддалені за змістом, великі за обсягом або мають свої розділові знаки: Земля чорніла, ніби вугілля; і тільки десь-не-десь виблискувала кригою калюжа (І. Нечуй-Левицький).'
      - 'Тире: ставиться, якщо друга частина виражає несподіваний наслідок або висновок: Один стріл — і заєць ліг (Народна творчість). Тире створює драматичний ефект.'
      - 'Виняток: Кома НЕ ставиться, якщо частини мають спільний другорядний член або спільну вставну конструкцію: Уночі вітер стих і дощ перестав. (спільна обставина — уночі). Практика: 10 речень на правильну розстановку розділових знаків, включно з винятками.'
  - section: "Побудова складносурядних речень"
    words: 700
    points:
      - 'Побудова речень від простого до складного: Крок 1. Два прості речення зі зв''язаними ідеями. Крок 2. Вибір сполучника на основі смислового зв''язку. Крок 3. Застосування правила пунктуації. Приклад: Ми приїхали. Почався дощ. → Ми приїхали, і почався дощ. (послідовність, єднальний).'
      - 'Текст для читання: розповідь із використанням складносурядних речень. Учні знаходять усі складносурядні речення, класифікують сполучники та визначають смислові зв''язки між частинами.'
      - 'Продуктивне завдання: написати 6-8 складносурядних речень про нещодавню подію, використавши щонайменше 2 єднальні, 2 протиставні та 2 розділові сполучники з правильними розділовими знаками.'
  - section: "Підсумок та перехід до модуля №67"
    words: 500
    points:
      - 'Підсумок: складносурядне речення = рівноправні частини + сурядні сполучники. Три групи сполучників: єднальні (і, та), протиставні (але, а), розділові (або, то...то). Пунктуація: кома (основний знак), крапка з комою, тире. Виняток: наявність спільного другорядного члена. Самоперевірка: Я розрізняю три групи сполучників ✓/✗, Я правильно ставлю розділові знаки ✓/✗.'
      - 'Огляд наступного модуля: модуль №67 — З''ясувальні речення. Перший тип складнопідрядних речень, підрядні частини яких відповідають на питання ХТО? ЩО? або ДЕ?'
vocabulary_hints:
  required:
    - "складносурядне речення (compound sentence)"
    - "сполучник сурядності (coordinating conjunction)"
    - "єднальний (copulative — і, й, та)"
    - "протиставний (adversative — але, а, зате, проте)"
    - "розділовий (disjunctive — або, чи, то...то)"
    - "рівноправний (equal, coordinate — parts of equal status)"
    - "одночасність (simultaneity)"
    - "послідовність (sequence)"
    - "протиставлення (opposition/contrast)"
    - "зіставлення (comparison/juxtaposition)"
  recommended:
    - "чергування (alternation — то...то events)"
    - "взаємовиключення (mutual exclusion — або...або)"
    - "спільний другорядний член (shared secondary member — exception)"
    - "крапка з комою (semicolon)"
    - "тире (dash — unexpected result)"
    - "однак (however)"
    - "а втім (but then again)"
    - "зате (but on the other hand)"
activity_hints:
  - type: reading
    focus: 'Прочитайте текст про що таке складносурядне речення? і дайте відповіді на запитання.'
  - type: essay-response
    focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Єднальні сполучники».'
  - type: fill-in
    focus: 'Вставте правильну граматичну форму у реченнях на тему що таке складносурядне речення?.'
  - type: error-correction
    focus: 'Знайдіть і виправте помилки у реченнях на тему єднальні сполучники.'
  - type: quiz
    focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Що таке складносурядне речення?».'
  - type: match-up
    focus: 'З''єднайте терміни з розділу «Єднальні сполучники» з їхніми визначеннями.'
