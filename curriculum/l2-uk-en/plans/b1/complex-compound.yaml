module: b1-073
level: B1
sequence: 73
slug: complex-compound
version: '3.1'
title: "Складносурядне речення"
subtitle: "Єднальні, протиставні та розділові сполучники"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Complex Syntax]"
word_target: 4000
objectives:
  - "Learner can define складносурядне речення as a sentence with two or more рівноправні
    (equal) parts joined by сурядні сполучники"
  - "Learner can classify сполучники сурядності into three groups: єднальні (і, й,
    та, ні...ні), протиставні (але, а, зате, проте), розділові (або, чи, то...то)"
  - "Learner can identify смислові зв'язки between parts: одночасність, послідовність,
    протиставлення, зіставлення, чергування, взаємовиключення"
  - "Learner can correctly punctuate складносурядні речення: comma before сполучник,
    exceptions (спільний другорядний член), крапка з комою, тире"
  - "Learner can construct складносурядні речення to express connected, contrasted,
    and alternating ideas"
dialogue_situations:
  - setting: 'Two friends at a Львівська кав''ярня discussing weekend plans — compound
      sentences: Я хочу в кіно, а ти — в театр (m). Або ми підемо на виставку (f,
      exhibition), або залишимося вдома. Погода гарна, і ми могли б погуляти.'
    speakers:
      - Софія
      - Андрій
    motivation: 'Compound sentences: і, а, але, або, проте with кіно(n), театр(m),
      виставка(f)'
content_outline:
  - section: "Що таке складносурядне речення?"
    words: 700
    points:
      - "Definition from Заболотний Grade 8 p.54: складносурядним називають складне
        речення, частини якого рівноправні за змістом і поєднані за допомогою сполучників
        сурядності. Key concept: рівноправність — neither part depends on the other
        grammatically. А квітці пахне літа теплий день, і я спиняюсь у задумі (О.
        Довгоп'ят)."
      - "Contrast with складнопідрядне (upcoming in M67-73): Складносурядне: Сонце
        зайшло, і стало темно. (equal parts) Складнопідрядне: Коли сонце зайшло, стало
        темно. (main + subordinate) Also contrast with просте речення з однорідними
        членами: Вітер дув і свистів. (one subject, two predicates — simple sentence)
        Вітер дув, і дерева хилилися. (two subjects, two predicates — compound)"
      - "Building on A2: learners already use і, але, або in speech. This module systematizes
        what they know and adds complexity."
  - section: "Єднальні сполучники"
    words: 750
    points:
      - "From Заболотний Grade 8 p.54: Єднальні сполучники: і (й), та (= і), ні...ні,
        як...так і, не тільки...але й. Смислові зв'язки: одночасність, послідовність.
        Одночасність: Сонце світить, і вітер віє. (both happen at once) Послідовність:
        Пролунав дзвінок, і учні вийшли з класу. (one after another)"
      - "Examples from Ukrainian literature: Темно-зеленії садки дрімають вже без
        плоду, і тихо гріються хатки, і верби гнуться в воду (І. Франко). Ні вітер
        не шумить, ні хвиля не плюскоче. (ні...ні — negative parallel) Як сонце світило,
        так і місяць сяяв. (як...так і — parallel emphasis)"
      - "Practice: combine pairs of прості речення into складносурядні using єднальні
        сполучники. Learners choose between і/й/та based on euphony and context."
  - section: "Протиставні та розділові сполучники"
    words: 700
    points:
      - "Протиставні from Заболотний Grade 8 p.55: але, а (= але), та (= але), зате,
        проте, однак, а втім. Смислові зв'язки: протиставлення, зіставлення. Протиставлення:
        Усе іде, але не все минає (Л. Костенко). Зіставлення: Людина створила культуру,
        а культура — людину (О. Довженко)."
      - "Розділові from Заболотний Grade 8 p.55: або, чи, або...або, чи...чи, то...то,
        хоч...хоч. Смислові зв'язки: чергування, взаємовиключення. Чергування: То
        сонце усміхнеться нам крізь хмари, то дощик рясно землю полива (Г. Чубач).
        Взаємовиключення: Або рибку з'їсти, або на дно сісти (Нар. творчість)."
      - "The subtle difference between а and але: а = зіставлення (comparison): Сестра
        читає, а брат малює. (different activities) але = протиставлення (contradiction):
        Я хотів прийти, але не зміг. Practice: choose between а and але in 6 contexts."
  - section: "Розділові знаки"
    words: 650
    points:
      - "Main rule from Заболотний Grade 8 p.60: Між частинами складносурядного речення
        ставимо КОМУ: Джмелями літаки собі гудуть, і джміль до них гуде собі спросоння
        (І. Драч). Або рибку з'їсти, або на дно сісти."
      - "Крапка з комою: if parts are distant in meaning, large, or contain internal
        punctuation: Земля чорніла, ніби вугілля; і тільки десь-не-десь виблискувала
        кригою калюжа (І. Нечуй-Левицький)."
      - "Тире: if the second part expresses unexpected result or consequence: Один
        стріл — і заєць ліг (Нар. творчість). The dash creates dramatic effect."
      - "Exception: NO comma when parts share a спільний другорядний член or спільна
        вставна конструкція: Уночі вітер стих і дощ перестав. (спільне обставинне
        — уночі) Practice: 10 sentences — place correct punctuation, including exceptions."
  - section: "Побудова складносурядних речень"
    words: 700
    points:
      - "Sentence building from simple to complex: Step 1: Two прості речення with
        connected ideas. Step 2: Choose сполучник based on смисловий зв'язок. Step
        3: Apply punctuation rule. Example: Ми приїхали. Почався дощ. → Ми приїхали,
        і почався дощ. (послідовність, єднальний)"
      - "Reading passage: a narrative text using складносурядні речення. Learners
        identify all compound sentences, classify сполучники, and determine смислові
        зв'язки between parts."
      - "Production: learners write 6-8 compound sentences about a recent event, using
        at least 2 єднальні, 2 протиставні, and 2 розділові сполучники with correct
        punctuation."
  - section: "Підсумок та перехід до M67"
    words: 500
    points:
      - "Summary: складносурядне = рівноправні частини + сурядні сполучники. Три групи:
        єднальні (і, та), протиставні (але, а), розділові (або, то...то). Пунктуація:
        кома (основне), крапка з комою, тире. Виняток: спільний член. Self-check:
        Я розрізняю три групи сполучників ✓/✗, Я правильно ставлю розділові знаки
        ✓/✗."
      - "Preview: M67 — З'ясувальні речення. The first type of складнопідрядне речення:
        subordinate clauses that explain WHAT, WHO, WHERE."
vocabulary_hints:
  required:
    - "складносурядне речення (compound sentence)"
    - "сполучник сурядності (coordinating conjunction)"
    - "єднальний (copulative — і, й, та)"
    - "протиставний (adversative — але, а, зате, проте)"
    - "розділовий (disjunctive — або, чи, то...то)"
    - "рівноправний (equal, coordinate — parts of equal status)"
    - "одночасність (simultaneity)"
    - "послідовність (sequence)"
    - "протиставлення (opposition/contrast)"
    - "зіставлення (comparison/juxtaposition)"
  recommended:
    - "чергування (alternation — то...то events)"
    - "взаємовиключення (mutual exclusion — або...або)"
    - "спільний другорядний член (shared secondary member — exception)"
    - "крапка з комою (semicolon)"
    - "тире (dash — unexpected result)"
    - "однак (however)"
    - "а втім (but then again)"
    - "зате (but on the other hand)"
