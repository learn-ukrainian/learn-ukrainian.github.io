module: b1-074
level: B1
sequence: 74
slug: complex-subordinate-object
version: '3.1.3'
title: "З'ясувальні речення"
subtitle: "Підрядні речення з що, щоб, чи, хто, куди"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Складний синтаксис]"
word_target: 4000
objectives:
  - "Учень знає визначення складнопідрядного речення як конструкції з головною частиною та однією або кількома підрядними, з'єднаними сполучниками підрядності."
  - "Учень вміє будувати з'ясувальні підрядні частини, що відповідають на питання непрямих відмінків: що? хто? кого? чого? кому? чому?"
  - "Учень навчиться використовувати ключові сполучники та сполучні слова: що, щоб, чи, хто, який, де, куди, коли, як."
  - "Учень вміє розрізняти сполучник та сполучне слово: що (сполучник, не є членом речення) проти що (займенник, є членом підрядної частини)."
  - "Учень може правильно ставити коми перед підрядним сполучником."
dialogue_situations:
  - setting: 'Телефонна розмова матері та студента в Одесі — обмін новинами: Кажу тобі, що все добре. Знаю, що ти хвилюєшся. Думаю, що здам іспит (m). Не вірю, що вже зима (f).'
    speakers:
      - Мама
      - Студент
    motivation: 'З''ясувальні речення: що + дійсний спосіб при передачі чужого мовлення: кажу що, знаю що, думаю що'
content_outline:
  - section: "Складнопідрядне речення: вступ"
    words: 700
    points:
      - "Визначення із підручника Заболотного (8 клас, с. 84): складнопідрядне речення складається з головної частини і однієї або кількох підрядних частин. Підрядна частина залежить від головної і відповідає на питання. Головна відмінність від складносурядного (модуль №66): частини НЕ є рівноправними."
      - "Як розпізнати: чи можна поставити питання від головної частини до підрядної? Я знаю, (що?) що він прийде. → з'ясувальне (відповідає на питання що?). Книга, (яка?) яку я прочитав, була цікава. → означальне (відповідає на питання яка?). Коли пішов дощ, (коли?) ми сховались. → обставинне часу (відповідає на питання коли?)."
      - "Три основні типи за Вороном (9 клас, с. 57): означальні (модуль №68), з'ясувальні (цей модуль), обставинні (модулі №69–73). Цей модуль фокусується на з'ясувальних реченнях — найпоширеніших у мовленні."
  - section: "З'ясувальні підрядні частини"
    words: 850
    points:
      - "Із підручника Заболотного (8 клас, с. 94): з'ясувальна підрядна частина відповідає на питання непрямих відмінків (кого? чого? кому? чому? кого? що? ким? чим?) і приєднується: Сполучниками: що, щоб, аби, мов, як, чи, ніби, наче, неначе. Сполучними словами: хто, який, чий, котрий, де, куди, звідки, коли, чому, скільки, як."
      - "З'ясувальна частина зазвичай стоїть ПІСЛЯ пояснюваного слова у головній частині. Пояснюваними словами зазвичай виступають: Дієслова мовлення: сказати, запитати, відповісти, повідомити. Дієслова мислення: знати, думати, вважати, розуміти, пам'ятати. Дієслова сприйняття та почуттів: відчувати, бачити, чути, помітити. Дієслова волевиявлення: хотіти, бажати, наказати, просити."
      - "Приклади: Він сказав, що приїде завтра. (що — сполучник) Запитай, чи він прийде. (чи — сполучник) Я хочу, щоб ти допоміг. (щоб — сполучник мети/бажання) Ніхто не знає, де він живе. (де — сполучне слово) Розкажи, хто тобі це сказав. (хто — сполучне слово)"
  - section: "Сполучник vs сполучне слово"
    words: 600
    points:
      - "Ключова відмінність за Заболотним (8 клас, с. 84): Сполучник що НЕ має синтаксичної ролі в підрядному реченні. Я знаю, що він прийде. Сполучне слово що Є членом підрядної частини. Я знаю, що ти читаєш. Перевірка: чи можна замінити що на те, що? Якщо так → сполучне слово. Чи можна вилучити що і речення залишиться граматично правильним? → сполучник."
      - "Інші сполучні слова, що виступають членами речення: хто: Я не знаю, хто це зробив. (хто = підмет) де: Скажи, де ти був. (де = обставина місця) куди: Я не пам'ятаю, куди поклав ключі. (куди = напрямок) коли: Він запитав, коли ми приїдемо. (коли = час) скільки: Вона не знає, скільки це коштує. (скільки = обставина міри/кількості)"
      - "Практика: у 8 реченнях визначити, чим є слова що/як/хто — сполучником чи сполучним словом."
  - section: "Пунктуація та побудова"
    words: 650
    points:
      - "Основне правило: перед сполучником чи сполучним словом ставиться кома: Я думаю, що це правильно. Він не знає, де я живу. Кома не ставиться після підрядної частини, коли вона передує головній: Що він приїде, я дізнався вчора. (застарілий порядок слів, рідко вживається у мовленні)"
      - "Позиція: з'ясувальна частина зазвичай стоїть ПІСЛЯ головної частини (на відміну від обставинних, які гнучкіші): ПРИРОДНО: Я знаю, що він тут. РІДКО: Що він тут, я знаю. (емфатично, літературно)"
      - "Практика: побудувати 8 з'ясувальних речень за підказками. Дано: головна частина + інформація для вираження. Учень додає правильний сполучник та підрядну частину."
  - section: "З'ясувальні речення у мовленні"
    words: 750
    points:
      - 'Високочастотні конструкції в повсякденному мовленні: Я думаю, що... / Я вважаю, що... (висловлення власної думки) Він сказав, що... / Вона повідомила, що... (передача чужого мовлення) Я не знаю, чи... / Запитай, чи... (питання/роздуми) Я хочу, щоб... (висловлення побажань щодо чужих дій) Вони побачили, як... (опис побаченого)'
      - "Діалог з використанням з'ясувальних речень: розмова про плани, де співрозмовники передають слова інших, висловлюють думки та розмірковують про результати. 6-8 реплік."
      - "Текст для читання із з'ясувальними реченнями. Завдання на розуміння: — Знайдіть усі з'ясувальні підрядні частини. — Визначте пояснюване слово для кожної. — З'ясуйте: це сполучник чи сполучне слово?"
  - section: "Підсумок та перехід до модуля №68"
    words: 450
    points:
      - 'Підсумок: з''ясувальні = підрядні частини, що відповідають на питання непрямих відмінків. Сполучники: що, щоб, чи. Сполучні слова: хто, де, куди, коли, як, скільки. Кома ставиться перед підрядним сполучником/словом. Самоперевірка: Я будую з''ясувальні речення ✓/✗.'
      - "Анонс: модуль №68 — Означальні речення. Підрядні частини, що описують іменник: який/яка/яке у різних відмінках."
vocabulary_hints:
  required:
    - "складнопідрядне речення (complex sentence with subordination)"
    - "головна частина (main clause)"
    - "підрядна частина (subordinate clause)"
    - "з'ясувальне речення (explanatory/object clause)"
    - "сполучник підрядності (subordinating conjunction)"
    - "сполучне слово (relative/connective word)"
    - "пояснюване слово (explained word — verb in main clause)"
    - "що (that — conjunction or relative word)"
    - "щоб (in order to/that — conjunction of desire/purpose)"
    - "чи (whether — conjunction for questions)"
  recommended:
    - "аби (synonym of щоб — less formal)"
    - "ніби (as if — conjunction of manner)"
    - "наче (as though — conjunction of comparison)"
    - "непрямі відмінки (indirect cases — all except називний)"
    - "дієслово мовлення (verb of speech — сказати, запитати)"
    - "дієслово мислення (verb of thought — думати, знати)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про складнопідрядне речення і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «З'ясувальні підрядні частини»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему складнопідрядне речення."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему з'ясувальні підрядні частини."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Складнопідрядне речення: вступ»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «З'ясувальні підрядні частини» з їхніми визначеннями."
