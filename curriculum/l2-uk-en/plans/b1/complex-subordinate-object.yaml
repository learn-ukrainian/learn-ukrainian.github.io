module: b1-074
level: B1
sequence: 74
slug: complex-subordinate-object
version: '3.1'
title: "З'ясувальні речення"
subtitle: "Підрядні речення з що, щоб, чи, хто, куди"
focus: grammar
pedagogy: PPP
phase: "B1.7 [Complex Syntax]"
word_target: 4000
objectives:
  - "Learner can define складнопідрядне речення as a sentence with a головна частина
    and one or more підрядні частини connected by сполучники підрядності"
  - "Learner can construct з'ясувальні (explanatory/object) clauses answering indirect
    case questions: що? хто? кого? чого? кому? чому?"
  - "Learner can use key conjunctions and connectors: що (that), щоб (in order to),
    чи (whether), and сполучні слова хто, який, де, куди, коли, як"
  - "Learner can distinguish сполучник from сполучне слово: що (conjunction, no syntactic
    role) vs що (relative pronoun, is a member of the clause)"
  - "Learner can place commas correctly before the subordinate conjunction"
dialogue_situations:
  - setting: 'Phone call between mother and university student in Одесі — reporting
      news: Кажу тобі, що все добре. Знаю, що ти хвилюєшся. Думаю, що здам іспит (m).
      Не вірю, що вже зима (f).'
    speakers:
      - Мама
      - Студент
    motivation: 'Object clauses: що + indicative in reported speech: кажу що, знаю
      що, думаю що'
content_outline:
  - section: "Складнопідрядне речення: вступ"
    words: 700
    points:
      - "Definition from Заболотний Grade 8 p.84: складнопідрядне речення складається
        з головної частини і однієї або кількох підрядних частин. Підрядна частина
        залежить від головної і відповідає на питання. The key difference from складносурядне
        (M66): parts are NOT equal."
      - "How to identify: can you ask a question from the main clause to the subordinate
        clause? Я знаю, (що?) що він прийде. → з'ясувальне (answers що?). Книга, (яка?)
        яку я прочитав, була цікава. → означальне (answers яка?). Коли пішов дощ,
        (коли?) ми сховались. → обставинне часу (answers коли?)."
      - "Three main types from Ворон Grade 9 p.57: означальні (M68), з'ясувальні (this
        module), обставинні (M69-73). This module focuses on з'ясувальні — the most
        common in speech."
  - section: "З'ясувальні підрядні частини"
    words: 850
    points:
      - "From Заболотний Grade 8 p.94: з'ясувальна підрядна частина відповідає на
        питання непрямих відмінків (кого? чого? кому? чому? кого? що? ким? чим?) and
        is joined by: Сполучники: що, щоб, аби, мов, як, чи, ніби, наче, неначе. Сполучні
        слова: хто, який, чий, котрий, де, куди, звідки, коли, чому, скільки, як."
      - "The з'ясувальна part stands AFTER the пояснюване слово (explained word) in
        the main clause. Пояснювані слова are typically: Verbs of speech: сказати,
        запитати, відповісти, повідомити. Verbs of thought: знати, думати, вважати,
        розуміти, пам'ятати. Verbs of feeling: відчувати, бачити, чути, помітити.
        Verbs of desire: хотіти, бажати, наказати, просити."
      - "Examples: Він сказав, що приїде завтра. (що — conjunction) Запитай, чи він
        прийде. (чи — whether) Я хочу, щоб ти допоміг. (щоб — purpose/desire) Ніхто
        не знає, де він живе. (де — relative word) Розкажи, хто тобі це сказав. (хто
        — relative word)"
  - section: "Сполучник vs сполучне слово"
    words: 600
    points:
      - "Critical distinction from Заболотний Grade 8 p.84: Сполучник що: has NO syntactic
        role in the subordinate clause. Я знаю, що він прийде. (що just connects;
        він — subject, прийде — predicate) Сполучне слово що: IS a member of the subordinate
        clause. Я знаю, що ти читаєш. (що = those things/what → direct object of читаєш)
        Test: can you replace що with те, що? If yes → relative word. Can you remove
        що and the clause still makes grammatical sense? → conjunction."
      - "Other relative words that function as clause members: хто: Я не знаю, хто
        це зробив. (хто = subject) де: Скажи, де ти був. (де = adverbial of place)
        куди: Я не пам'ятаю, куди поклав ключі. (куди = direction) коли: Він запитав,
        коли ми приїдемо. (коли = time) скільки: Вона не знає, скільки це коштує.
        (скільки = quantity)"
      - "Practice: in 8 sentences, determine whether що/як/хто is a conjunction or
        relative word."
  - section: "Пунктуація та побудова"
    words: 650
    points:
      - "Main rule: comma before the conjunction/relative word: Я думаю, що це правильно.
        Він не знає, де я живу. No comma after the subordinate clause when it precedes
        main: Що він приїде, я дізнався вчора. (archaic order, rare in speech)"
      - "Position: з'ясувальна typically comes AFTER the main clause (unlike обставинні,
        which are flexible): NATURAL: Я знаю, що він тут. RARE: Що він тут, я знаю.
        (emphatic, literary)"
      - "Practice: construct 8 з'ясувальні речення from prompts. Given: main clause
        + information to express. Learner adds correct conjunction and subordinate
        clause."
  - section: "З'ясувальні речення у мовленні"
    words: 750
    points:
      - "High-frequency patterns in daily speech: Я думаю, що... / Я вважаю, що...
        (expressing opinions) Він сказав, що... / Вона повідомила, що... (reporting
        speech) Я не знаю, чи... / Запитай, чи... (asking/wondering) Я хочу, щоб...
        (expressing desires about others' actions) Вони побачили, як... (describing
        witnessed events)"
      - "Dialogue using з'ясувальні: a conversation about plans, where speakers report
        what others said, express opinions, and wonder about outcomes. 6-8 exchanges."
      - "Reading passage with з'ясувальні речення. Comprehension questions: — Знайдіть
        усі з'ясувальні підрядні частини. — Визначте пояснюване слово для кожної.
        — Визначте: сполучник чи сполучне слово?"
  - section: "Підсумок та перехід до M68"
    words: 450
    points:
      - "Summary: з'ясувальні = підрядні, що відповідають на питання непрямих відмінків.
        Сполучники: що, щоб, чи. Сполучні слова: хто, де, куди, коли, як, скільки.
        Кома перед сполучником. Self-check: Я будую з'ясувальні речення ✓/✗."
      - "Preview: M68 — Означальні речення. Subordinate clauses that describe a noun:
        який/яка/яке у різних відмінках."
vocabulary_hints:
  required:
    - "складнопідрядне речення (complex sentence with subordination)"
    - "головна частина (main clause)"
    - "підрядна частина (subordinate clause)"
    - "з'ясувальне речення (explanatory/object clause)"
    - "сполучник підрядності (subordinating conjunction)"
    - "сполучне слово (relative/connective word)"
    - "пояснюване слово (explained word — verb in main clause)"
    - "що (that — conjunction or relative word)"
    - "щоб (in order to/that — conjunction of desire/purpose)"
    - "чи (whether — conjunction for questions)"
  recommended:
    - "аби (synonym of щоб — less formal)"
    - "ніби (as if — conjunction of manner)"
    - "наче (as though — conjunction of comparison)"
    - "непрямі відмінки (indirect cases — all except називний)"
    - "дієслово мовлення (verb of speech — сказати, запитати)"
    - "дієслово мислення (verb of thought — думати, знати)"
activity_hints:
  - type: reading
    focus: "Прочитайте текст про складнопідрядне речення: вступ і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «З'ясувальні підрядні частини»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему складнопідрядне речення: вступ."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему з'ясувальні підрядні частини."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Складнопідрядне речення: вступ»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «З'ясувальні підрядні частини» з їхніми визначеннями."
