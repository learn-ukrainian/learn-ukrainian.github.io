module: b1-037
level: B1
sequence: 37
slug: motion-prefixes-departure
version: '3.1.3'
title: "Піти, від'їхати"
subtitle: "Префікси пі-/по- (вирушання) та від- (віддалення) з дієсловами руху"
focus: grammar
pedagogy: PPP
phase: "B1.3 [Всесвіт дієслів руху]"
word_target: 4000
objectives:
  - "Учень вміє пояснювати семантичну різницю між пі-/по- (вирушання, відправлення) та від- (віддалення від точки) з дієсловами руху."
  - "Учень вміє утворювати та відмінювати префіксальні дієслова руху з пі-/по- та від- (піти, поїхати, побігти, понести, повести, повезти; відійти, від'їхати, відбігти, віднести, відвести, відвезти)."
  - "Учень вміє використовувати дієслова відправлення з правильними прийменниками та відмінками (піти з + Р.в., відійти від + Р.в.)."
  - "Учень вміє розрізняти пі-/по- (початок подорожі) від від- (створення дистанції від точки) в усному та писемному українському мовленні."
dialogue_situations:
  - setting: 'Сцена прощання на Київському вокзалі — проводи друзів: Поїзд відходить (departs) о шостій. Вони вже пішли (left) на перон (m, platform). Ми від''їжджаємо (driving away) завтра вранці.'
    speakers:
      - Проводжаючі (those seeing off)
      - Мандрівники (travelers)
    motivation: 'Префікси відправлення: піти (пі-), від''їхати (від-), відходити (від-)'
content_outline:
  - section: "Від прибуття до відправлення"
    words: 550
    points:
      - "Перехід від модуля №29: при-/до- привели нас ДО місця призначення. Тепер ми вивчаємо протилежне — залишення місця та віддалення від нього. Дві групи префіксів виконують цю функцію: пі-/по- (вирушання в дорогу, відправлення) та від- (віддалення від певної точки)."
      - "Читання: сцена прощання на вокзалі — родичі пішли, поїхали, відійшли, від'їхали. Учні визначають дієслова відправлення та їх просторові значення."
      - "Важлива примітка щодо деколонізації від Заболотного, 7 клас, с.188: Українська мова використовує відбувати/виїжджати, а не русизм *відправлятися для позначення відправлення транспорту. Автобус відбуває/виїжджає о восьмій."
  - section: "Префікси пі-/по-: вирушання в дорогу"
    words: 900
    points:
      - "Пі- (виключно з іти → піти) — вирушання пішки: Він пішов на роботу. Пішли додому! (заклик до руху). Повне відмінювання: піду, підеш, піде, підемо, підете, підуть. Минулий час: пішов, пішла, пішло, пішли. Примітка: пі- комбінується лише з іти. Усі інші дієслова використовують по-."
      - "По- (вирушання транспортом, бігом, перенесення тощо): поїхати (вирушити транспортом): Поїзд поїхав о третій. побігти (побігти кудись): Дитина побігла до мами. понести (почати нести): Поніс валізу на другий поверх. повести (повести когось кудись): Повів дитину до парку. повезти (почати транспортувати): Повіз товар до складу. полетіти (злетіти/полетіти геть): Літак полетів до Відня. поплисти (поплисти/вирушити водою): Човен поплив за течією."
      - "Форми недоконаного виду: піти → (немає стандартного недоконаного виду — використовуйте йти або відходити в контексті). поїхати → (використовуйте виїжджати або від'їжджати для повторюваних відправлень). Примітка: піти та поїхати є суто подіями доконаного виду."
      - "Прийменники: піти з/із + Р.в. (Пішов з дому), піти до + Р.в. (Пішов до друга), поїхати в/на + Зн.в. (Поїхав у Львів). 8-10 речень-прикладів."
  - section: "Префікс від-: віддалення"
    words: 900
    points:
      - "Від- означає віддалення від певної точки, створення відстані: відійти (відступити): Відійди від дверей, будь ласка. від'їхати (від'їхати від чогось): Автобус від'їхав від зупинки. відбігти (відбігти геть): Собака відбіг від хазяїна. відлетіти (полетіти геть): Птахи відлетіли на південь. відпливти (відплисти геть): Човен відплив від берега."
      - "Перенесення/спрямовування/транспортування геть: віднести (віднести геть): Віднеси цей лист на пошту. відвести (відвести когось геть): Відвів дитину до бабусі. відвезти (відвезти геть транспортом): Відвіз старі меблі на дачу. Повне відмінювання відійти: відійду, відійдеш, відійде, відійдемо, відійдете, відійдуть. Минулий час: відійшов, відійшла, відійшло, відійшли."
      - "Форми недоконаного виду: відходити (відходити/відправлятися — регулярно): Поїзд відходить о п'ятій. від'їжджати (від'їжджати геть — регулярно): Автобуси від'їжджають щогодини. відбігати (відбігати постійно): не поширене — учні повинні знати, що деякі форми недоконаного виду рідко зустрічаються в живій мові."
      - "Прийменники: дієслова з від- вимагають від + Р.в.: відійти від вікна, від'їхати від станції, відбігти від небезпеки. Прийменник від перегукується з префіксом від-, підсилюючи значення. 8-10 речень-прикладів."
  - section: "Пі-/по- чи від-? Різниця у значенні"
    words: 800
    points:
      - "Ключова відмінність: пі-/по- акцентує на ПОЧАТКУ ПОДОРОЖІ (відправленні до місця призначення): Він пішов на роботу (фокус: він вирушив). від- акцентує на ВІДДАЛЕННІ ВІД точки (створенні дистанції): Він відійшов від столу (фокус: дистанція)."
      - "Коли пі-/по- більш природне: Початок подорожі: Ми поїхали у відпустку. Залишення назавжди: Вона пішла і більше не повернулася. Вирушання: Давай підемо! Коли від- більш природне: Відступ/відхід назад: Відійди, мені тісно. Транспорт рушає з місця: Потяг відійшов від перону. Відхід від небезпеки: Відбіг від вогню."
      - "Контрастні приклади: Поїзд поїхав (Потяг вирушив — почав свій рух). Поїзд відійшов від перону (Потяг від'їхав від платформи). Вона пішла додому (Вона вирушила додому — фокус на пункті призначення). Вона відійшла від нас (Вона віддалилася від нас — фокус на дистанції)."
      - "6-8 практичних сценаріїв: учні вибирають пі-/по- або від-."
  - section: "При- та до- проти пі-/по- та від-"
    words: 550
    points:
      - "Порівняльна таблиця чотирьох префіксів: при- = прибуття (Друзі прийшли). до- = досягнення (Дійшли до вершини). пі-/по- = вирушання (Пішли додому). від- = віддалення (Відійшов від дверей). Етапи подорожі: відійшов → поїхав → доїхав → приїхав."
      - "Семантична мапа: прибуття і відправлення як дзеркальні відображення. при- (прибуття до пункту призначення) віддзеркалює пі-/по- (вирушання до пункту призначення). до- (досягнення точки) віддзеркалює від- (віддалення від точки). Ця симетрія допомагає учням засвоїти систему: при-/від- стосуються ПРОСТОРОВОЇ БЛИЗЬКОСТІ, до-/по- стосуються КІНЦЕВИХ ТОЧОК ПОДОРОЖІ."
      - "Діалог: телефонна розмова, що відстежує чиюсь подорож із використанням усіх чотирьох груп префіксів. 'Вже від'їхали?' 'Так, доїхали до Білої Церкви.' 'Коли приїдете?' — природний контекст для всіх префіксів."
      - "Практика продукування: учні розповідають про поїздку друга, використовуючи всі чотири типи префіксів у правильній послідовності. Зразок: Від'їхав із Харкова о шостій (від-). Поїхав через Полтаву (по-). Доїхав до Києва за п'ять годин (до-). Приїхав на вокзал об одинадцятій (при-). Учні пишуть власні розповіді про подорожі на 6-8 речень."
  - section: "Підсумок: префікси від'їзду"
    words: 350
    points:
      - "Повна таблиця: пі-/по- та від- з усіма базовими дієсловами. пі-/по-: піти, поїхати, побігти, понести, повести, повезти, полетіти, поплисти. від-: відійти, від'їхати, відбігти, віднести, відвести, відвезти, відлетіти, відпливти."
      - "Анонс модуль №31: Зайти, вийти — вхід та вихід. Система префіксів дієслів руху продовжує відображати більше просторових переміщень."
