  - title: "Заболотний Grade 7, p.188"
    notes: "Деколонізація: відправлятися — це русизм; використовуйте відбувати, виїжджати."
  - title: "Авраменко Grade 5, p.63"
    notes: "Семантика префіксів: при- = наближення, по- = початок руху."
