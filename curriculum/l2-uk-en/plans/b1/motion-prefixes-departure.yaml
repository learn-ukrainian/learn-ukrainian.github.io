  - type: quiz
    focus: 'Виберіть дієслово з пі-/по- або від- на основі контексту (вирушання чи віддалення)'
    items: 8
  - type: fill-in
    focus: 'Відміняйте дієслова відправлення, щоб завершити речення про подорожі та прощання'
    items: 8
  - type: match-up
    focus: "З'єднайте дієслова відправлення з їхніми відповідниками прибуття (прийти↔піти, приїхати↔поїхати)"
    items: 8
  - type: group-sort
    focus: 'Відсортуйте префіксальні дієслова на при-/до- (прибуття) та пі-/по-/від- (відправлення)'
    items: 12
  - type: error-correction
    focus: 'Виправте неправильний вибір префікса в контекстах відправлення/прибуття'
    items: 6
  - type: free-write
    focus: 'Напишіть сцену прощання на вокзалі, використовуючи 5+ дієслів відправлення'
    items: 6
