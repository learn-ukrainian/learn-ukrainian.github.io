grammar:
  - "Префікс пі- лише з іти: піти (вирушання пішки)"
  - "Префікс по- з іншими дієсловами руху: поїхати, побігти, понести тощо"
  - "Префікс від- з дієсловами руху: семантика віддалення"
  - "Апостроф у від'їхати, від'їзд, від'їжджати"
  - "Видові пари: відходити/відійти, від'їжджати/від'їхати"
  - "Прийменники: з + Р.в. (вирушання з), від + Р.в. (віддалення від)"
  - "Деколонізована лексика: відбувати, виїжджати (а не *відправлятися)"
register: науково-навчальний
references:
