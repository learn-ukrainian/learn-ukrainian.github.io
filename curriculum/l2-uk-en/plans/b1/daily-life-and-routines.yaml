module: b1-007
level: B1
sequence: 7
slug: daily-life-and-routines
version: '3.3'
title: "Щоденне життя"
subtitle: "Розпорядок дня, побут та повсякденне спілкування"
focus: communication
pedagogy: PPP
phase: "B1.2 [Дієслова]"
word_target: 4000
objectives:
  - "Учень вміє детально описувати свій розпорядок дня, використовуючи зворотні дієслова (прокидатися, вмиватися, одягатися, збиратися) та часові вирази"
  - "Учень вміє обговорювати хатні справи та обов'язки, використовуючи наказовий та умовний способи, а також зворотні дієслова з модулів №18–24"
  - "Учень вміє будувати плани та домовлятися про розклад, використовуючи якщо-умови та ввічливі форми (Якщо матимеш час... Чи не могли б ви...?)"
  - "Учень вміє описувати звички та розпорядок дня за допомогою видового контрасту: недоконаний для регулярних звичок проти доконаного для конкретних завершених дій"
  - "Учень вміє брати участь у повсякденних розмовах про розклад, справи та управління часом на рівні складності B1"
  - "Учень вміє обговорювати робоче середовище, пошук роботи та професійні обов'язки."
dialogue_situations:
  - setting: 'Український влог — киянин знімає відео ''мій день'': Прокидаюся о сьомій. Снідаю кашу з ягодами (pl). Їду на роботу трамваєм. Обідаю в їдальні. Ввечері гуляю набережною Дніпра.'
    speakers:
      - Влогер
      - Колеги / перехожі
    motivation: 'Інтеграція в щоденне життя: зворотні дієслова, орудний відмінок, часові вирази'
content_outline:
  - section: "Мій день: ранок"
    words: 750
    points:
      - "Розширений опис ранкового розпорядку з використанням зворотних дієслів з модуля №22: Я прокидаюся о пів на сьому. Встаю, вмиваюся холодною водою, чищу зуби. Потім одягаюся й снідаю. Зазвичай п'ю каву i їм бутерброди або кашу. Збираюся i виходжу з дому о восьмій. Багате використання зворотних дієслів, інтегрованих із часовими виразами."
      - "Діалог 1 — співмешканці планують ранок: Вживає наказовий спосіб (модуль №20): Прокидайся! Не забувай снідати! Вживає умовний спосіб (модуль №18): Якщо встанеш раніше, встигнемо разом поснідати. Природно вживає зворотні дієслова: Я збираюся довше, бо зачісуюся. Показує вид: встаю (регулярна дія, недок.) проти встану завтра раніше (запланована дія, док.)."
      - "Лексичний кластер: ранок, будильник, прокидатися, підводитися, вмиватися, чистити зуби, снідати, сніданок, каша, кава, бутерброд, збиратися, виходити з дому, поспішати."
  - section: "Робочий день та навчання"
    words: 750
    points:
      - "Опис робочого/навчального дня з використанням префіксальних дієслів з модуля №24: Приїжджаю на роботу о дев'ятій. Перевіряю електронну пошту. Обговорюємо план з колегами. Працюю до обіду. Значення префіксів у дії: пере- (перевіряю), об- (обговорюємо), до- (допрацьовую), при- (приїжджаю)."
      - "Опис навчання з використанням віддієслівних іменників з модуля №21: Навчання починається о дев'ятій. Вивчення нового матеріалу займає дві години. Після виконання домашнього завдання... Демонструє офіційний/академічний регістр віддієслівних іменників на противагу розмовним дієслівним еквівалентам."
      - "Діалог 2 — колеги на роботі: Чи не могли б ви допомогти з цим звітом? (ввічлива умова). Якщо закінчу раніше, допоможу. (реальна умова). Давайте обговоримо це після обіду. (наказовий спосіб до спільної дії). Інтегрує модуль №18 (умовний спосіб) та модуль №20 (ввічливі форми)."
  - section: "Хатні справи та побут"
    words: 700
    points:
      - "Побутова лексика з дієслівними формами з Фази 3: прибирати — недок. регулярна дія: Я прибираю щосуботи. помити посуд — док.: Помий, будь ласка, посуд. прати білизну, прасувати, пилососити, витирати пил, виносити сміття, готувати їжу."
      - "Діалог 3 — сім'я розподіляє обов'язки: Форми наказового способу: Вимий посуд. Винеси сміття. Не забувай прибирати. Хай/нехай: Хай Марко пилососить. Нехай діти витирають пил. Умовний спосіб: Якщо будеш вільний, допоможи зготувати вечерю. Якби я мав більше часу, готував би щодня (нереальна умова — модуль №19)."
      - "Пасивний стан (модуль №23) для завершених справ: Посуд помито. Білизну випрано. Вечерю приготовлено. Форми на -но/-то природно вживаються для звітування про виконані завдання. Контраст: Я помив посуд (активний) проти Посуд помито (пасивний)."
      - "Культурна примітка: відмінності української побутової лексики від англійської. Пилосос (не *пилесос), прати (не *стирати, що є русизмом). Деколонізаційний момент: уникати русизмів у повсякденній лексиці."
  - section: "Вільний час та вихідні"
    words: 750
    points:
      - "Розмова про дозвілля з використанням усієї граматики Фази 3: Умовний спосіб: Якщо погода буде гарна, підемо на прогулянку. Якби я мав більше вільного часу, займався б спортом. Зворотні дієслова: займатися спортом, розважатися, відпочивати (не зворотне!). Наказовий спосіб: Ходімо в кіно! Давайте зустрінемося!"
      - "Діалог 4 — планування вихідних: — Що плануєш на вихідні? — Якщо не буде дощу, хочу поїхати за місто. — А якби тобі запропонували квитки на концерт? — О, я б із задоволенням пішов/пішла! — Тоді давай я подивлюся, чи є ще квитки. — Було б чудово! Подивись, будь ласка. Природне поєднання реальних/нереальних умов та ввічливих форм."
      - "Лексика хобі: читати книжки, дивитися серіали, гуляти парком, кататися на велосипеді, малювати, грати на гітарі, вирощувати квіти, мандрувати. Віддієслівні іменники для хобі: читання, малювання, мандрування."
  - section: "Розпорядок дня: планування та поради"
    words: 650
    points:
      - "Лексика та структури управління часом: розклад, план на день, встигати, запізнюватися, планувати, відкладати. З Вашуленка Grade 2 p.81: 'Як планувати свій день так, щоб успішно навчатися, цікаво відпочивати i досягати поставлених цілей?'"
      - "Надання порад за допомогою умовного та наказового способів: На вашому місці я б вставав/вставала раніше. (порада в умовному способі) Старайся не відкладати справи. (порада в наказовому способі) Якщо хочеш встигати все, плануй заздалегідь. (умова) Хай кожен запише свій розклад. (наказ із хай)"
      - "Читання: стаття про управління часом для студентів. Природно вживає всю граматику Фази 3. Запитання на розуміння перевіряють МОВУ: знайти всі умовні речення, визначити зворотні дієслова, позначити форми наказового способу та визначити їхній вид."
  - section: "Підсумок фази 3 та перехід до модуля №26"
    words: 400
    points:
      - "Підсумок граматики Фази 3, застосованої в цьому модулі: модулі №18–19: умовний спосіб (якщо/якби) — для планів і гіпотез. модуль №20: наказовий спосіб (деталі) — для хатніх справ і порад. модуль №21: віддієслівні іменники — для офіційних описів дій. модуль №22: зворотні дієслова — для щоденних звичок. модуль №23: пасивний стан — для звітування про завершені завдання (-но/-то). модуль №24: творення дієслів — для розуміння щоденних дієслів із префіксами."
      - "Самоперевірка: Я можу описати свій день детально ✓/✗, Я можу домовитися про план на вихідні ✓/✗, Я можу розподілити хатні обов'язки ✓/✗, Я можу дати пораду щодо планування часу ✓/✗. Попередній огляд: модуль №26 — Контрольна робота 3, повторення всієї Фази 3."
vocabulary_hints:
  required:
    - "розпорядок дня (daily routine/schedule)"
    - "прокидатися (to wake up — reflexive)"
    - "снідати / обідати / вечеряти (to have breakfast / lunch / dinner)"
    - "прибирати (to clean up, tidy)"
    - "пилососити (to vacuum)"
    - "прати білизну (to do laundry — NOT *стирати)"
    - "прасувати (to iron)"
    - "виносити сміття (to take out the trash)"
    - "готувати їжу (to cook food)"
    - "займатися (to engage in, do — reflexive: займатися спортом)"
    - "запізнюватися (to be late — reflexive)"
    - "встигати (to manage in time)"
    - "відкладати (to postpone)"
    - "вихідні (weekend — pluralia tantum)"
    - "будильник (alarm clock)"
    - "хатні справи (household chores)"
    - "пошук роботи (job search)"
    - "співбесіда (interview)"
    - "робоче місце (workplace)"
    - "колега (colleague)"
    - "обов'язки (duties)"
  recommended:
    - "помити посуд (to wash dishes)"
    - "витирати пил (to dust)"
    - "поспішати (to hurry)"
    - "мандрувати (to travel, wander)"
    - "розважатися (to entertain oneself, have fun)"
    - "вирощувати (to grow — plants)"
    - "бутерброд (sandwich)"
    - "каша (porridge)"
    - "електронна пошта (email)"
    - "звіт (report)"
    - "серіал (TV series)"
    - "велосипед (bicycle)"
activity_hints:
  - type: fill-in
    focus: 'Доповніть текст про розпорядок дня правильними формами дієслів (зворотні, префіксальні, вид)'
    items: 12
  - type: quiz
    focus: 'Виберіть правильну граматичну конструкцію Фази 3 для ситуацій щоденного життя (умовна, наказова, пасивна)'
    items: 12
  - type: match-up
    focus: 'З''єднайте хатні справи з їхніми описами, використовуючи правильні дієслівні форми'
    items: 12
  - type: sentence-builder
    focus: 'Напишіть плани/розклади за допомогою якщо-умов та часових виразів'
    items: 12
  - type: error-correction
    focus: 'Виправте помилки в побутовій лексиці: *стирати (→ прати), *пилесос (→ пилосос), неправильний вид'
    items: 12
