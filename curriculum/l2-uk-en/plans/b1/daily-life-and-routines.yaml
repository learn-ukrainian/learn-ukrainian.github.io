references:
  - title: "Вашуленко Grade 2, p.81"
    notes: "Планування дня: назви днів тижня, складання планів на день, ефективне планування часу."
  - title: "Голуб Grade 5, p.100-101"
    notes: "Мої плани: планування, мета, спроба. Лексика для щоденного планування та встановлення цілей."
  - title: "Голуб Grade 6, p.197"
    notes: "§76 Упорядковуй своє життя: формування звичок, самооцінка, структура тексту для опису розпорядку."
  - title: "Авраменко Grade 7, p.82-83"
    notes: "Наказовий спосіб у діалозі: Марино, пішли сьогодні... → Ходімо! Правильне вживання для планування і запрошень."
