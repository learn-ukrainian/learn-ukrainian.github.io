module: b1-025
level: B1
sequence: 25
slug: daily-life-and-routines
version: '3.0'
title: Щоденне життя
subtitle: Розпорядок дня, побут та повсякденне спілкування
focus: communication
pedagogy: PPP
phase: B1.3 [Verbs]
word_target: 4000
objectives:
- Learner can describe their daily routine in detail using зворотні дієслова (прокидатися, вмиватися, одягатися, збиратися)
  and temporal expressions
- Learner can discuss household chores and responsibilities using imperatives, conditionals, and reflexive verbs from M18-24
- Learner can make plans and negotiate schedules using якщо-conditionals and polite forms (Якщо матимеш час... Чи не могли
  б ви...?)
- 'Learner can describe habits and routines using aspectual contrast: недоконаний for regular habits vs доконаний for specific
  completed actions'
- Learner can participate in everyday conversations about scheduling, errands, and time management at B1 complexity
content_outline:
- section: 'Мій день: ранок (My day: morning)'
  words: 750
  points:
  - 'Extended morning routine description using зворотні дієслова from M22: Я прокидаюся о пів на сьому. Встаю, вмиваюся холодною
    водою, чищу зуби. Потім одягаюся й снідаю. Зазвичай п''ю каву i їм бутерброди або кашу. Збираюся i виходжу з дому о восьмій.
    Rich use of reflexive verbs integrated with time expressions.'
  - 'Dialogue 1 — roommates planning morning: Uses imperatives (M20): Прокидайся! Не забувай снідати! Uses conditionals (M18):
    Якщо встанеш раніше, встигнемо разом поснідати. Uses reflexives naturally: Я збираюся довше, бо зачісуюся. Shows aspect:
    встаю (habitual, impf) vs встану завтра раніше (planned, pf).'
  - 'Vocabulary cluster: ранок, будильник, прокидатися, підводитися, вмиватися, чистити зуби, снідати, сніданок, каша, кава,
    бутерброд, збиратися, виходити з дому, поспішати.'
- section: Робочий день та навчання (Work day and studies)
  words: 750
  points:
  - 'Describing a work/study day using prefixed verbs from M24: Приїжджаю на роботу о дев''ятій. Перевіряю електронну пошту.
    Обговорюємо план з колегами. Працюю до обіду. Prefix meanings in action: пере- (перевіряю), об- (обговорюємо), до- (допрацьовую),
    при- (приїжджаю).'
  - 'Describing studies using віддієслівні іменники from M21: Навчання починається о дев''ятій. Вивчення нового матеріалу
    займає дві години. Після виконання домашнього завдання... Shows the formal/academic register of віддієслівні іменники
    in contrast with the colloquial verb equivalents.'
  - 'Dialogue 2 — colleagues at work: Чи не могли б ви допомогти з цим звітом? (polite conditional) Якщо закінчу раніше, допоможу.
    (real conditional) Давайте обговоримо це після обіду. (inclusive imperative) Integrates M18 (conditionals) and M20 (polite
    forms).'
- section: Хатні справи та побут (Household chores and daily life)
  words: 700
  points:
  - 'Household vocabulary with verb forms from Phase 3: прибирати (to clean up) — impf habitual: Я прибираю щосуботи. помити
    посуд (to wash dishes) — pf: Помий, будь ласка, посуд. прати білизну (to do laundry), прасувати (to iron), пилососити
    (to vacuum), витирати пил (to dust), виносити сміття (to take out trash), готувати їжу (to cook).'
  - 'Dialogue 3 — family distributing chores: Imperative forms: Вимий посуд. Винеси сміття. Не забувай прибирати. Хай/нехай:
    Хай Марко пилососить. Нехай діти витирають пил. Conditionals: Якщо будеш вільний, допоможи зготувати вечерю. Якби я мав
    більше часу, готував би щодня (unreal — M19).'
  - 'Passive voice (M23) for completed chores: Посуд помито. Білизну випрано. Вечерю приготовлено. -но/-то forms used naturally
    for reporting done tasks. Contrast: Я помив посуд (active) vs Посуд помито (passive).'
  - 'Cultural note: Ukrainian household vocabulary differences from English. Пилосос (vacuum cleaner — not *пилесос), прати
    (to wash clothes, not *стирати which is a Russicism). Decolonization point: Avoid Russianisms in daily vocabulary.'
- section: Вільний час та вихідні (Free time and weekends)
  words: 750
  points:
  - 'Talking about leisure using all Phase 3 grammar: Conditionals: Якщо погода буде гарна, підемо на прогулянку. Якби я мав
    більше вільного часу, займався б спортом. Reflexives: займатися спортом, розважатися, відпочивати (not reflexive!). Imperatives:
    Ходімо в кіно! Давайте зустрінемося!'
  - 'Dialogue 4 — weekend planning: — Що плануєш на вихідні? — Якщо не буде дощу, хочу поїхати за місто. — А якби тобі запропонували
    квитки на концерт? — О, я б із задоволенням пішов/пішла! — Тоді давай я подивлюся, чи є ще квитки. — Було б чудово! Подивись,
    будь ласка. Natural mix of real/unreal conditionals and polite forms.'
  - 'Hobby vocabulary: читати книжки, дивитися серіали, гуляти парком, кататися на велосипеді, малювати, грати на гітарі,
    вирощувати квіти, мандрувати. Verbal nouns for hobbies: читання, малювання, мандрування.'
- section: 'Розпорядок дня: планування та поради (Daily schedule: planning and advice)'
  words: 650
  points:
  - 'Time management vocabulary and structures: розклад (schedule), план на день (day plan), встигати (to manage in time),
    запізнюватися (to be late), планувати (to plan), відкладати (to postpone). From Вашуленко Grade 2 p.81: ''Як планувати
    свій день так, щоб успішно навчатися, цікаво відпочивати i досягати поставлених цілей?'''
  - 'Giving advice using conditional and imperative: На вашому місці я б вставав/вставала раніше. (conditional advice) Старайся
    не відкладати справи. (imperative advice) Якщо хочеш встигати все, плануй заздалегідь. (conditional) Хай кожен запише
    свій розклад. (хай imperative)'
  - 'Reading passage: an article about time management for students. Uses all Phase 3 grammar naturally. Comprehension questions
    test LANGUAGE: find all conditionals, identify reflexive verbs, mark imperative forms and determine their aspect.'
- section: Підсумок фази 3 та перехід до M26 (Phase 3 summary and transition)
  words: 400
  points:
  - 'Summary of Phase 3 grammar applied in this module: M18-19: умовний спосіб (якщо/якби) — for plans and hypotheticals.
    M20: наказовий спосіб (деталі) — for chores and advice. M21: віддієслівні іменники — for formal descriptions of activities.
    M22: зворотні дієслова — for daily routines. M23: пасивний стан — for reporting completed tasks (-но/-то). M24: творення
    дієслів — for understanding prefixed daily verbs.'
  - 'Self-check: Я можу описати свій день детально ✓/✗, Я можу домовитися про план на вихідні ✓/✗, Я можу розподілити хатні
    обов''язки ✓/✗, Я можу дати пораду щодо планування часу ✓/✗. Preview: M26 — Контрольна робота 3, reviewing all of Phase
    3.'
vocabulary_hints:
  required:
  - розпорядок дня (daily routine/schedule)
  - прокидатися (to wake up — reflexive)
  - снідати / обідати / вечеряти (to have breakfast / lunch / dinner)
  - прибирати (to clean up, tidy)
  - пилососити (to vacuum)
  - прати білизну (to do laundry — NOT *стирати)
  - прасувати (to iron)
  - виносити сміття (to take out the trash)
  - готувати їжу (to cook food)
  - 'займатися (to engage in, do — reflexive: займатися спортом)'
  - запізнюватися (to be late — reflexive)
  - встигати (to manage in time)
  - відкладати (to postpone)
  - вихідні (weekend — pluralia tantum)
  - будильник (alarm clock)
  - хатні справи (household chores)
  recommended:
  - помити посуд (to wash dishes)
  - витирати пил (to dust)
  - поспішати (to hurry)
  - мандрувати (to travel, wander)
  - розважатися (to entertain oneself, have fun)
  - вирощувати (to grow — plants)
  - бутерброд (sandwich)
  - каша (porridge)
  - електронна пошта (email)
  - звіт (report)
  - серіал (TV series)
  - велосипед (bicycle)
activity_hints:
- type: fill-in
  focus: Complete a daily routine text with correct verb forms (reflexive, prefixed, aspect)
  items: 10
- type: quiz
  focus: Choose the correct Phase 3 grammar structure for daily life situations (conditional, imperative, passive)
  items: 8
- type: match-up
  focus: Match household chores to their descriptions using correct verb forms
  items: 8
- type: sentence-builder
  focus: Write plans/schedules using якщо-conditionals and temporal expressions
  items: 6
- type: error-correction
  focus: 'Fix daily-life vocabulary errors: *стирати (→ прати), *пилесос (→ пилосос), wrong aspect'
  items: 6
connects_to:
- b1-022 (Зворотні дієслова — reflexive verbs for routines)
- b1-018 (Умовний спосіб реальний — conditionals for planning)
- b1-020 (Наказовий спосіб — imperatives for chores/advice)
- b1-023 (Пасивний стан — -но/-то for completed tasks)
- b1-026 (Контрольна робота 3 — tests all of Phase 3)
prerequisites:
- b1-024 (Verb formation — all Phase 3 grammar complete)
grammar:
- Integration of M18-24 grammar in communicative context
- Зворотні дієслова for daily routines (прокидатися, вмиватися)
- 'Aspect in daily descriptions: недоконаний for habits, доконаний for specific actions'
- Conditionals for planning (якщо + future, якби + conditional)
- Imperatives for chores and advice (aspect choice, хай/нехай)
- Пасивні конструкції -но/-то for completed tasks (Посуд помито)
- Віддієслівні іменники for formal descriptions of activities
register: розмовний
references:
- title: Вашуленко Grade 2, p.81
  notes: 'Планування дня: naming days of the week, making daily plans, planning one''s time effectively.'
- title: Голуб Grade 5, p.100-101
  notes: 'Мої плани: планування, мета, спроба. Vocabulary for daily planning and goal-setting.'
- title: Голуб Grade 6, p.197
  notes: '§76 Упорядковуй своє життя: forming habits, self-assessment, text structure for describing routines.'
- title: Авраменко Grade 7, p.82-83
  notes: 'Imperatives in dialogue: Марино, пішли сьогодні... → Ходімо! Correct usage for planning and invitations.'
