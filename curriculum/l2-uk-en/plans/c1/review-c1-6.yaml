module: c1-089
level: C1
sequence: 89
slug: review-c1-6
version: 1.0.2
title: 'Підсумкове повторення: C1.6 — Література, стилістика, граматика'
subtitle: 'Огляд C1.6: література, стилістичні фігури, граматичні системи'
focus: review
pedagogy: review
word_target: 4000
objectives:
- Систематизувати знання про українську літературу від давньої до сучасної.
- Узагальнити вивчені стилістичні фігури, фонетичні та синтаксичні засоби.
- 'Закріпити граматичні теми C1.3-C1.6: складні речення, відмінкові системи, умовний
  спосіб, девербативи.'
- Підготуватися до блоку народної культури.
reading_situations:
- source_type: літературознавча стаття
  topic: 'Огляд розвитку української літератури: ключові постаті та напрями.'
  key_elements:
  - літературні напрями
  - ключові твори
  - літературознавча термінологія
  motivation: Повторення літературознавчого матеріалу C1.6.
- source_type: текст для стилістичного аналізу
  topic: Уривок з художнього або публіцистичного тексту для комплексного 
    стилістичного розбору.
  key_elements:
  - тропи
  - фігури
  - стилістична норма
  - експресивність
  motivation: Повторення стилістичних засобів на конкретному тексті.
listening_situations:
- media_type: лекція
  setting: Узагальнювальна лекція про зв'язок літератури, мовознавства та 
    стилістики.
  focus_points:
  - інтеграція знань
  - термінологія
  - аналітичне мислення
  motivation: Сприйняття синтетичного академічного дискурсу.
writing_tasks:
- task_type: комплексне завдання
  prompt: 'Виберіть уривок із вивченого літературного твору та проведіть комплексний
    аналіз (300-350 слів): лексичні, граматичні, стилістичні особливості.'
  requirements:
  - літературознавча термінологія
  - стилістичний аналіз
  - граматичний розбір складних конструкцій
  motivation: Інтеграція всіх вивчених навичок C1.6 в одному завданні.
  model_answer: 'Текст має демонструвати вміння аналізувати текст на всіх рівнях:
    лексика, граматика, стилістика, ідейний зміст.'
discussion_topics:
- context: Підсумкова рефлексія за результатами C1.6.
  questions:
  - Як знання граматики та стилістики змінило ваше сприйняття українських 
    текстів?
  - Які теми C1.6 виявилися найскладнішими і потребують додаткової практики?
  motivation: Самооцінка та планування подальшого навчання.
content_outline:
- section: 'Література: підсумковий огляд'
  words: 1000
  subsections:
  - 'Історія української літератури: від Нестора до Жадана'
  - 'Літературознавча термінологія: жанри, напрями, поетика'
  - 'Аналіз поезії: від формального до інтерпретативного рівня'
  key_concepts:
  - літературознавство
  - жанр
  - поетика
- section: 'Стилістичні засоби: інтеграція'
  words: 1000
  subsections:
  - 'Фонетичні засоби: милозвучність, звукопис, ритм'
  - 'Синтаксичні фігури: період, антитеза, хіазм, асиндетон'
  - Морфологічні та фразеологічні засоби стилістики
  key_concepts:
  - стилістика
  - тропи
  - фігури
- section: 'Граматичні системи C1: синтез'
  words: 1000
  subsections:
  - 'Відмінкові функції: називний, родовий, давальний — усі значення'
  - 'Складні речення: сурядність, підрядність, безсполучниковість'
  - Умовний спосіб та девербативні іменники
  key_concepts:
  - відмінок
  - синтаксис
  - морфологія
- section: Комплексний аналіз тексту
  words: 1000
  subsections:
  - 'Методика комплексного аналізу: лексичний, граматичний, стилістичний рівні'
  - 'Практикум: аналіз уривків із різних стилів'
  - Самооцінка та підготовка до блоку народної культури
  key_concepts:
  - комплексний аналіз
  - рефлексія
  - інтеграція
- section: Підсумок — Summary
  words: 300
  points:
  - 'Literary and stylistic analysis integrates phonetic, morphological, and syntactic
    devices (тропи, фігури). Self-check: What is the difference between антитеза and
    хіазм? Describe the evolution of Ukrainian literature from Nestor to Zhadan in
    three sentences.'
  - 'Advanced grammar synthesis combines all case functions, complex sentence structures,
    and conditional moods. Self-check: What distinguishes сурядність from підрядність
    in complex sentences? Create one sentence that uses both a deverbative noun and
    the умовний спосіб.'
