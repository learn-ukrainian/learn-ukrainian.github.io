module: balet-i-tanets
level: C1
sequence: 104
slug: balet-i-tanets
version: '1.1'
title: "Балет і танець: Від класики до сучасного перформансу"
subtitle: "Ballet and Dance: From Classics to Contemporary Performance"
focus: culture
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати становлення та розвиток професійного балетного мистецтва в Україні."
  - "Дослідити творчий шлях Сержа Лифаря як реформатора світового балету та його зв'язок з Україною."
  - "Вивчити феномен українського народного танцю у професійній інтерпретації (ансамбль П. Вірського)."
  - "Ознайомитися з сучасними тенденціями контемпорарі та модерн-балету (творчість Раду Поклітару)."

reading_situations:
  - source_type: "мистецтвознавчий нарис"
    topic: "Серж Лифар: 'Бог танцю' з київським корінням. Реформа неокласичного балету."
    key_elements: ["неокласика", "хореографія", "Паризька опера", "імпровізація", "естетика руху"]
    motivation: "Робота з біографічним та теоретичним текстом про світову зірку балету."
  - source_type: "програмна стаття"
    topic: "Еволюція українського народного танцю: від обряду до професійної сцени. Спадщина Павла Вірського."
    key_elements: ["стилізація", "техніка", "фольклорна основа", "костюм", "сценічний простір"]
    motivation: "Аналіз трансформації народної традиції у професійне мистецтво."

listening_situations:
  - media_type: "відео"
    setting: "Перегляд фрагментів балету 'Лісова пісня' (музика М. Скорульського) та обговорення втілення фольклорних мотивів у класичній хореографії."
    focus_points: ["хореографічна лексика", "музична драматургія", "символізм образів", "дуетний танець"]
    motivation: "Розвиток навичок візуального та музичного аналізу балетної вистави."

writing_tasks:
  - task_type: "есе"
    prompt: "Як сучасний балет (на прикладі 'Київ Модерн-Балету') переосмислює класичні сюжети? Проаналізуйте доцільність та художню цінність радикальних інтерпретацій класики."
    requirements: ["мінімум 350 слів", "використання термінів: контемпорарі, лібрето, хореограф, метафора, пластика", "аргументовані приклади"]
    motivation: "Вдосконалення навичок критичного аналізу сучасних мистецьких процесів."
    model_answer: "Текст повинен фокусуватися на творчості Раду Поклітару та його підходах до деконструкції відомих сюжетів (напр., 'Лускунчик', 'Кармен.TV'). Автор має обґрунтувати, як зміна пластичної мови та контексту допомагає розкрити нові грані класичних творів у XXI столітті."

discussion_topics:
  - context: "Український танець (зокрема гопак) часто сприймається за кордоном як візитівка національної культури, але іноді це призводить до стереотипізації ('шароварщини')."
    questions:
      - "Де проходить межа між популяризацією традицій та створенням спрощених культурних стереотипів?"
      - "Яку роль відіграє танець у сучасній культурній дипломатії України?"
    motivation: "Тренування навичок дискусії про складні питання культурної репрезентації."

content_outline:
  - section: "Становлення української балетної школи"
    words: 1000
    subsections:
      - "Перші кроки: балет у театрах Києва, Одеси та Львова наприкінці XIX століття"
      - "Вацлав Ніжинський та Серж Лифар: київська школа на світовій арені"
      - "Створення національного репертуару: 'Лісова пісня', 'Лілея'"
    key_concepts: ["пуанти", "хореографія", "па-де-де", "класичний канон"]
  - section: "Серж Лифар — реформатор балету"
    words: 1000
    subsections:
      - "Від навчання у Броніслави Ніжинської до Паризької опери"
      - "Теорія танцю за Лифарем: танець як самостійне мистецтво"
      - "Повернення імені: Лифар і Україна в сучасному культурному дискурсі"
    key_concepts: ["неокласицизм", "експресія", "академізм", "естетика"]
  - section: "Магія українського народного танцю"
    words: 1000
    subsections:
      - "Василь Авраменко: популяризація українського танцю у світі (діаспорний контекст)"
      - "Павло Вірський: створення унікальної академічної системи народного танцю"
      - "Ансамбль імені Вірського як культурний бренд: технічна досконалість та артистизм"
    key_concepts: ["стилізація", "віртуозність", "фольклор", "синхронність"]
  - section: "Сучасний танець та контемпорарі в Україні"
    words: 1000
    subsections:
      - "Поява перших модерн-груп у 1990-х роках: пошук нової тілесності"
      - "Раду Поклітару та 'Київ Модерн-Балет': інтелектуальний та емоційний танець"
      - "Незалежна танцювальна сцена: перформанс, імпровізація, мультидисциплінарність"
    key_concepts: ["контемпорарі", "пластика", "перформанс", "деконструкція"]

