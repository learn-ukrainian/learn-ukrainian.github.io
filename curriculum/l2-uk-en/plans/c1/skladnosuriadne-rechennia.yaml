module: c1-046
level: C1
sequence: 46
slug: skladnosuriadne-rechennia
version: '1.1'
title: "Складносурядне речення: смислові зв'язки та пунктуація"
subtitle: "Складносурядні речення: семантика і пунктуація"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Глибоко вивчити типи смислових зв'язків між частинами складносурядного речення
    (ССР)."
  - "Опанувати складні випадки пунктуації в ССР, включаючи вживання тире та коми."
  - "Навчитися використовувати ССР для створення ритмічно збалансованих текстів в
    академічному стилі."
  - "Розуміти стилістичні функції сполучників сурядності в художньому та публіцистичному
    мовленні."

reading_situations:
  - source_type: "художній уривок"
    topic: "Описи природи в прозі Михайла Коцюбинського: аналіз ССР з одночасністю
      подій."
    key_elements: ["імпресіонізм", "паралелізм", "єднальні сполучники"]
    motivation: "Вивчення естетичної ролі ССР у художньому тексті."
  - source_type: "публіцистична стаття"
    topic: "Аналіз сучасних викликів демократії: використання протиставних ССР."
    key_elements: ["теза-антитеза", "протиставлення", "зіставлення"]
    motivation: "Практика вживання ССР для вираження логічних суперечностей."

listening_situations:
  - media_type: "лекція"
    setting: "Фрагмент лекції з історії української філософії про ідеї Григорія Сковороди."
    focus_points: ["використання складних синтаксичних конструкцій у мовленні лектора",
      "єднальні та розділові зв'язки в аргументації"]
    motivation: "Сприйняття ССР у науково-навчальному дискурсі."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть есе-роздум на тему 'Свобода та відповідальність: дві сторони
      однієї медалі', використовуючи щонайменше 5 різних типів ССР."
    requirements: ["мінімум 250 слів", "правильне вживання розділових знаків", "різноманітність
          сполучників сурядності"]
    motivation: "Закріплення граматичних навичок у зв'язному аналітичному тексті."
    model_answer: "Текст має демонструвати вміння будувати речення з єднальними, протиставними
      та розділовими зв'язками, а також правильне вживання тире при різкій зміні подій."

discussion_topics:
  - context: "Чи може технологічний прогрес повністю замінити людську творчість?"
    questions:
      - "Які переваги має штучний інтелект, а в чому людина залишається незамінною?"
      - "Як ці дві сфери взаємодіють у сучасному світі?"
    motivation: "Використання ССР для зіставлення фактів та думок під час дискусії."

content_outline:
  - section: "Поняття про складносурядне речення (ССР)"
    words: 1000
    subsections:
      - "Засоби зв'язку в ССР: інтонація та сполучники сурядності"
      - "Класифікація сполучників: єднальні, протиставні, розділові"
      - "ССР з спільним другорядним членом речення"
    key_concepts:
      - "координація"
      - "рівноправність"
      - "сполучник"
  - section: "Смислові зв'язки між частинами ССР"
    words: 1000
    subsections:
      - "Одночасність, послідовність та причинно-наслідкові зв'язки"
      - "Протиставлення та зіставлення подій і явищ"
      - "Взаємовиключення та чергування подій"
    key_concepts:
      - "семантика"
      - "хронологія"
      - "антитеза"
  - section: "Пунктуація у складносурядному реченні"
    words: 1000
    subsections:
      - "Основні правила вживання коми в ССР"
      - "Випадки, коли кома між частинами ССР не ставиться"
      - "Вживання тире та крапки з комою для підсилення експресивності"
    key_concepts:
      - "пунктограма"
      - "інтонація"
      - "експресія"
  - section: "Стилістичне використання ССР"
    words: 1000
    subsections:
      - "ССР у науковому стилі: логічність та послідовність"
      - "Художні можливості ССР: ритміка та динамізм"
      - "ССР в офіційно-діловому мовленні: чіткість формулювань"
    key_concepts:
      - "стилістика"
      - "ритм"
      - "лаконізм"

vocabulary:
  required:
    - сурядність
    - сполучник
    - єднальний
    - протиставний
    - розділовий
    - інтонація
    - рівноправність
    - пунктуація
  recommended:
    - альтернатива
    - зіставлення
    - градація
    - сегментація
    - конструкція

activity_hints:
  - type: fill-in
    description: "Complete compound sentences with appropriate coordinating conjunctions
      (єднальні, протиставні, розділові) based on semantic context."
  - type: error-correction
    description: "Fix punctuation errors in compound sentences — missing commas, incorrect
      semicolons, wrong dash placement."
  - type: match-up
    description: "Match types of semantic relations in compound sentences (одночасність,
      послідовність, протиставлення) with example sentences."
  - type: critical-analysis
    description: "Analyze a literary passage by Коцюбинський and identify all compound
      sentences, classifying their semantic and stylistic functions."
  - type: select
    description: "Identify cases where commas are NOT required between parts of compound
      sentences (shared secondary member, common adverbial clause)."

activities:
  types_required:
    - error-correction
    - unjumble
    - fill-in
    - match-up
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 25

references:
