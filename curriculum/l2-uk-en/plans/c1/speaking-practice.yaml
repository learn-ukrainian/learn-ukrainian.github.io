module: c1-052
level: C1
sequence: 52
slug: speaking-practice
version: 1.1.2
title: 'Практикум з усного мовлення: дискусії та дебати'
subtitle: 'Практикум з усного мовлення: дискусії та дебати'
focus: integration
pedagogy: seminar
word_target: 4000
objectives:
- Розвинути навички ведення аргументованої дискусії на абстрактні та професійні 
  теми.
- Опанувати стратегії переконання та використання риторичних прийомів.
- Навчитися швидко реагувати на контраргументи опонента українською мовою.
- Вдосконалити вимову та інтонаційне оформлення публічного виступу.
reading_situations:
- source_type: офіційний лист
  topic: Відкрите звернення діячів культури щодо захисту української мови в 
    медійному просторі.
  key_elements:
  - мовна квота
  - державна політика
  - суспільний консенсус
  motivation: Вивчення лексики для вираження громадської позиції.
- source_type: художній уривок
  topic: Полеміка між персонажами у драмі Лесі Українки 'Кассандра' як приклад 
    майстерної риторики.
  key_elements:
  - пророцтво
  - істина
  - переконання
  - метафора
  motivation: Аналіз класичних зразків української полемічної майстерності.
listening_situations:
- media_type: відео
  setting: Запис телевізійних дебатів про доцільність впровадження штучного 
    інтелекту в освіту.
  focus_points:
  - тези сторін
  - способи маніпуляції увагою
  - мовні кліше для вираження незгоди
  motivation: Навчання критичному сприйняттю та аналізу аргументів у реальному 
    часі.
writing_tasks:
- task_type: відгук
  prompt: Напишіть критичний відгук на публічний виступ відомого політика чи 
    громадського діяча, аналізуючи його риторичну майстерність.
  requirements:
  - мінімум 200 слів
  - аналіз логіки побудови промови
  - оцінка лексичного багатства
  motivation: Перехід від усного сприйняття до письмового аналізу дискурсу.
  model_answer: Відгук має містити вступ з описом події, аналіз структури 
    виступу (вступ, основна частина, висновок) та висновки про ефективність 
    аргументації.
discussion_topics:
- context: Чи є глобалізація загрозою для збереження національних культурних 
    особливостей?
  questions:
  - Як знайти баланс між інтеграцією у світову спільноту та збереженням коріння?
  - Яку роль відіграє мова у процесі глобальної уніфікації?
  motivation: Стимулювання глибокої філософської дискусії з використанням 
    складної лексики.
content_outline:
- section: Основи риторики та ораторського мистецтва
  words: 1000
  subsections:
  - Побудова логічної структури публічного виступу
  - 'Риторичні фігури: анафора, антитеза, градація'
  - Мистецтво паузи та інтонаційні акценти
  key_concepts:
  - риторика
  - елокуція
  - переконливість
- section: Стратегії ведення дебатів
  words: 1000
  subsections:
  - Формулювання сильної тези та підбір доказів
  - Методи спростування аргументів суперника
  - Етика та правила ведення академічної дискусії
  key_concepts:
  - теза
  - контраргумент
  - репліка
- section: Психологія мовленнєвої взаємодії
  words: 1000
  subsections:
  - Подолання страху публічного виступу
  - 'Невербальна комунікація: жести та міміка'
  - Адаптація мовлення під аудиторію
  key_concepts:
  - емпатія
  - харизма
  - аудиторія
- section: 'Практикум: Дебати на актуальні теми'
  words: 1000
  subsections:
  - Роль соціальних мереж у сучасному політичному житті
  - 'Екологічна свідомість: мода чи необхідність?'
  - 'Українська культура у світовому контексті: від екзотики до суб''єктності'
  key_concepts:
  - ідентичність
  - суб'єктність
  - м'яка сила
- section: Підсумок — Summary
  words: 300
  points:
  - Effective public speaking relies on strong logical structure and the use of 
    rhetorical figures such as анафора, антитеза, and градація.
  - Debate strategies require formulating a clear теза and quickly responding 
    with a strong контраргумент while maintaining academic ethics.
  - 'Self-check: What is the difference between a теза and a контраргумент? Name 3
    rhetorical figures you can use in a speech. How does non-verbal communication
    affect your переконливість?'
vocabulary:
  required:
  - оратор
  - промова
  - переконання
  - доказ
  - спростування
  - аудиторія
  - риторика
  - дискусія
  recommended:
  - красномовство
  - полеміка
  - маніпуляція
  - регламент
  - лаконічність
activity_hints:
- type: reading
  focus: Прочитайте текст про основи риторики та ораторського мистецтва і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про стратегії ведення дебатів, 
    використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Основи риторики та
    ораторського мистецтва». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    основи риторики та ораторського мистецтва.
- type: comparative-study
  focus: 'Порівняйте різні підходи до основи риторики та ораторського мистецтва: Побудова
    логічної структури публічного виступу. Визначте спільне та відмінне.'
activities:
  types_required:
  - critical-analysis
  - error-correction
  - match-up
  - unjumble
  - essay-response
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка'
- 'Заболотний, 11 клас (2019): с. 10-14 — Риторичні фігури, культура дискусії'
- 'Авраменко, 11 клас (2019): Стилістична норма — риторичні засоби'
