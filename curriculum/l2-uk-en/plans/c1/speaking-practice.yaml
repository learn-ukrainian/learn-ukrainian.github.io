module: c1-035
level: C1
sequence: 35
slug: speaking-practice
version: '2.0'
title: Мовний практикум
content_outline:
- section: Огляд та самооцінка (Review and Self-Assessment)
  words: 400
  points:
  - 'Підсумок ключових компетенцій фази C1.2: аналіз прогресу в професійній комунікації
    (§3.13) та медіаграмотності (§3.20)'
  - 'Критерії оцінювання за стандартами CEFR для рівня C1: плавність мовлення, точність
    висловлювань та лексичне розмаїття'
  - 'Робота з рубрикою оцінювання: самоаналіз результатів та підготовка до переходу
    до фази C1.3 (Стилістика)'
- section: 'Професійна комунікація: Етикет та документи (Professional Communication:
    Etiquette and Documents)'
  words: 1000
  points:
  - 'Складання професійного резюме (CV): розрізнення термінів «стаж роботи» та «досвід»
    (уникнення кальки з англійської)'
  - 'Стратегії успішної співбесіди: використання офіційного стилю (§4.4.1.1) та дотримання
    етикету з використанням форми «Ви»'
  - 'Типові помилки у діловому спілкуванні: уникнення розмовних часток («ну», «давай»)
    та змішування регістрів'
  - 'Ділові переговори та угоди: лексика для обговорення контрактів та укладання домовленостей
    згідно з державним стандартом (§3.13)'
- section: Політика, медіа та критичне мислення (Politics, Media, and Critical Thinking)
  words: 900
  points:
  - 'Публіцистичний стиль мовлення (§4.4.1.1): аналіз політичного дискурсу на прикладі
    українських ток-шоу, як-от «Свобода слова»'
  - 'Медіаграмотність у C1.2: виявлення пропаганди, фейкових новин та маніпуляцій
    у сучасному інформаційному просторі'
  - 'Дискусія про свободу слова та незалежність медіа: культурний контекст українського
    демократичного процесу'
  - 'Міжнародний контекст: представлення інтересів України та ведення публічних дебатів
    на глобальні теми'
- section: Соціолінгвістичний ландшафт (Sociolinguistic Landscape)
  words: 800
  points:
  - 'Територіальні діалекти: культурний маркер на прикладі кавової традиції «Філіжанка
    vs Чашка» (Львів проти Києва)'
  - 'Суржик як соціолінгвістичне явище: стратегії подолання гіперкорекції та розрізнення
    стилістичних нюансів'
  - 'Історія та діаспора: вплив історичного розвитку на сучасну норму та особливості
    мовлення українських громад за кордоном'
  - 'Реєстри мовлення: науковий, офіційний та публіцистичний стилі як основа академічної
    грамотності C1'
- section: 'Мовний практикум: Від теорії до практики (Language Workshop: From Theory
    to Practice)'
  words: 900
  points:
  - 'Спонтанне мовлення: рольові ігри «Співбесіда з роботодавцем» та «Кризові переговори
    з партнерами»'
  - 'Аналіз діалектних зразків: розпізнавання регіональних особливостей вимови та
    лексичного складу'
  - 'Письмовий екзамен: підготовка офіційного запиту або відповіді на ділову пропозицію
    з дотриманням формального стилю'
  - 'Підсумковий контроль: комплексна перевірка навичок аудіювання та продуктивного
    мовлення перед початком фази C1.3'
vocabulary_hints:
  required:
  - оцінювання (assessment) — критерії оцінювання, незалежне оцінювання; висока частотність
    в академічному дискурсі
  - компетенція (competency) — фахова компетенція, сфера компетенції; ключовий термін
    професійної сфери
  - співбесіда (job interview) — проходити співбесіду, запросити на співбесіду; офіційний
    регістр
  - резюме (CV/resume) — складати резюме, надсилати резюме; акцент на «стаж роботи»
    замість загального «досвід»
  - діалект (dialect) — територіальний діалект, особливості діалекту; середній рівень
    вжитку в лінгвістичному контексті
  - суржик (surzhyk) — спілкуватися суржиком, явище суржику; соціокультурне поняття
  - екзамен (exam) — складати екзамен, результати екзамену; формальна перевірка знань
  - критерій (criterion) — відповідність критеріям, основний критерій; науково-офіційний
    стиль
  - результат (result) — очікуваний результат, досягти результату; універсальне вживання
  - контроль (check/control) — вихідний контроль, здійснювати контроль; процес перевірки
    компетенцій
  recommended:
  - дискурс (discourse) — публіцистичний дискурс, політичний дискурс; науковий стиль
  - спонтанність (spontaneity) — спонтанність мовлення; психолінгвістичний аспект
    вільного володіння
  - плавність (fluency) — плавність викладу думок; ключовий критерій оцінювання C1
  - точність (accuracy) — точність висловлювання; лексико-граматичний показник якості
  - стаж (years of service) — стаж роботи, загальний стаж; професійний термін для
    формальних документів
