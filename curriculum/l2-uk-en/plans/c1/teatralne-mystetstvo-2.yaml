title: Театральне мистецтво II
subtitle: Theater Arts II — Contemporary Stage
content_outline:
- section: Вступ — Сучасний театральний ландшафт (Introduction — Contemporary Theater Landscape)
  words: 500
  points:
  - 'Огляд провідних театрів України: Національний академічний драматичний театр імені Івана Франка, Київський академічний
    Молодий театр та театр на Лівому березі.'
  - 'Зміна парадигми: перехід від консервативного ''академічного'' театру до ''живого'', актуального мистецтва, що реагує
    на запити суспільства.'
  - 'Усунення лексичних помилок: розмежування нормативного терміну ''вистава'' та застарілого росіянізму ''спектакль'', вживання
    терміну ''глядацька зала''.'
- section: Культурний феномен — «Конотопська відьма» (Cultural Phenomenon — 'The Witch of Konotop')
  words: 1000
  points:
  - 'Аналіз театрального блокбастера Івана Уривського: як класика Квітки-Основ''яненка стала символом сучасного культурного
    спротиву.'
  - 'Театр як інструмент боротьби: мільйонні збори на ЗСУ та феномен квитків, що розкуповуються за лічені хвилини.'
  - 'Робота з професійною лексикою: обговорення ''режисерського задуму'', ''сміливої режисури'' та ''лаконічної сценографії''
    постановки.'
  - 'Корекція типових помилок: вживання словосполучення ''виконувати роль'' (або ''грати Гамлета'') замість калькованого ''грати
    роль''.'
- section: Експериментальна сцена — Dakh Daughters та фрік-кабаре (Experimental Stage — Dakh Daughters and Freak Cabaret)
  words: 800
  points:
  - 'Дослідження жанру фрік-кабаре: поєднання театру, живої музики та високої літератури (тексти Шекспіра, Українки, Шевченка).'
  - 'Аналіз вистави ''Danse Macabre'': мистецька рефлексія на тему війни, втрати та вигнання в європейському контексті.'
  - 'Перформанс vs Класична вистава: визначення термінологічних меж та обговорення нових форм взаємодії з глядачем.'
- section: Театральне закулісся та професійна етика (Behind the Scenes and Professional Ethics)
  words: 700
  points:
  - 'За лаштунками театру (виправлення помилки ''куліси''): розгляд технічних аспектів підготовки вистави та роботи сценографа.'
  - 'Творче закулісся: обговорення акторського ''майстерного перевтілення'' та внутрішньої дисципліни театрального колективу.'
  - 'Етикет та традиції: повний аншлаг, вихід на біс, театральні забобони та специфіка роботи при аншлагах.'
- section: Практика — Мистецтво театральної критики (Practice — The Art of Theater Criticism)
  words: 1000
  points:
  - 'Створення тексту в публіцистичному стилі згідно з Держстандартом (§4.4.1.1): написання розгорнутої рецензії на виставу.'
  - 'Структура рецензії: від аналізу акторської гри та ''режисерського задуму'' до оцінки звукового оформлення та освітлення.'
  - 'Використання оцінної лексики: написання ''схвальної'' або ''розгромної'' рецензії, аргументація власної позиції.'
  - 'Порівняльний аналіз: український театральний процес у системі координат європейського мистецького простору.'
focus: fine-arts
pedagogy: CBI
objectives:
- Learner explores the contemporary Ukrainian theater scene (Franko, Left Bank).
- Learner can explain the phenomenon of Dakh Daughters and experimental theater.
- Learner analyzes the role of theater during the war.
grammar:
- Theater criticism terminology
- Reviewing a performance
phase: C1.7 [Fine Arts & High Culture]
persona:
  voice: Senior Specialist
  role: Драматург
word_target: 4000
vocabulary_hints:
  required:
  - рецензія (review) — схвальна/розгромна рецензія, писати рецензію на виставу; ключовий жанр публіцистичного стилю
  - аншлаг (sold-out) — повний аншлаг, збирати аншлаги, грати при аншлагах; ознака успіху вистави
  - сценографія (scenography) — лаконічна сценографія, задум сценографа, візуальне рішення вистави
  - закулісся (backstage) — інтриги закулісся, творче закулісся; часто вживається метафорично
  - перевтілення (transformation/metamorphosis) — майстерне перевтілення, здатність до перевтілення; основа акторської майстерності
  - режисура (directing) — смілива режисура, режисерський задум, новаторська режисура; концептуальне рішення
  recommended:
  - вистава (performance/play) — нормативне позначення театрального твору, уникати 'спектакль'
  - лаштунки (wings/backstage) — за лаштунками; нормативний термін замість росіянізму 'куліси'
  - виконувати роль (to perform a role) — нормативна конструкція замість кальки 'грати роль'
  - глядацька зала (auditorium) — точний термін для позначення місця перегляду вистави
