module: c1-107
level: C1
sequence: 107
slug: teatralne-mystetstvo-2
version: '1.2'
title: "Театральне мистецтво II: Авангард, модерн та сучасна сцена"
subtitle: "Theater Art II: Avant-Garde, Modern, and Contemporary Scene"
focus: culture
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати театральну реформу Леся Курбаса та діяльність театру 'Березіль'."
  - "Дослідити творчу співпрацю Л. Курбаса та М. Куліша як вершину українського театрального модернізму."
  - "Вивчити розвиток українського театру в другій половині XX століття (театр Б. Ступки, С. Данченка)."
  - "Ознайомитися з сучасним незалежним театром та новими формами театральної мови (ДАХ, постдрама)."

reading_situations:
  - source_type: "театральний маніфест"
    topic: "Лесь Курбас: 'Розумний Арлекін' та концепція перетворення. Відмова від побутовізму."
    key_elements: ["експресіонізм", "перетворення", "філософський театр", "ритм", "жест"]
    motivation: "Аналіз теоретичних засад авангардного театру."
  - source_type: "аналітична стаття"
    topic: "Феномен театру 'ДАХ' та Владислава Троїцького: мультидисциплінарність та пошук архетипів."
    key_elements: ["етно-хаос", "перформанс", "незалежний театр", "синтез", "інтелектуальна провокація"]
    motivation: "Робота з текстами про сучасні експериментальні театральні практики."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Перегляд інтерв'ю з Богданом Ступкою про роль актора в сучасному світі та специфіку роботи над шекспірівськими образами (Король Лір)."
    focus_points: ["акторська етика", "інтонація", "пауза", "психологізм", "сценічна присутність"]
    motivation: "Розвиток навичок розуміння професійного акторського дискурсу."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте п'єсу М. Куліша 'Мина Мазайло' як приклад інтелектуальної комедії. Які засоби театральної виразності використовував Л. Курбас для втілення мовного питання на сцені?"
    requirements: ["мінімум 400 слів", "використання термінів: гротеск, метафора, сценографія, філологічний конфлікт, модернізм", "критичний аналіз"]
    motivation: "Глибоке осмислення класики українського театрального модерну."
    model_answer: "Текст має фокусуватися на новаторстві Куліша у поєднанні комедійного та трагічного. Автор повинен описати, як Курбас у постановці 'Березоля' використовував сценографічні метафори для візуалізації ідеологічного розколу суспільства та висміювання міщанства."

discussion_topics:
  - context: "Сьогодні український театр переживає справжній бум: квитки на вистави Івана Уривського чи Давида Петросяна розкуповують за лічені хвилини."
    questions:
      - "Чим зумовлений такий сплеск інтересу до театру під час війни?"
      - "Як змінилися функції театру в епоху Netflix та TikTok: чи став він елітарним притулком чи місцем спільної рефлексії?"
    motivation: "Тренування навичок дискусії про соціокультурну роль театру."

content_outline:
  - section: "Лесь Курбас та театр 'Березіль'"
    words: 1000
    subsections:
      - "Реформаторський дух: від 'Молодого театру' до харківського 'Березоля'"
      - "Система Курбаса: актор як інтелектуал та майстер руху"
      - "Європейський контекст: зв'язок з експресіонізмом та конструктивізмом"
    key_concepts: ["експресіонізм", "конструктивізм", "реформа", "перетворення"]
  - section: "Золота доба модерну: Курбас — Куліш"
    words: 1000
    subsections:
      - "Творчий тандем: 'Народний Малахій', 'Мина Мазайло', 'Маклена Граса'"
      - "Конфлікт із владою та трагедія Сандармоху"
      - "Спадщина 'Березоля' у світовому театральному контексті"
    key_concepts: ["інтелектуальна драма", "гротеск", "цензура", "резистентність"]
  - section: "Театр другої половини XX століття"
    words: 1000
    subsections:
      - "Епоха Сергія Данченка у театрі Франка: повернення до психологізму"
      - "Богдан Ступка: обличчя українського театру та кіно"
      - "Львівська театральна школа: театр імені Марії Заньковецької та театр Леся Курбаса (В. Кучинський)"
    key_concepts: ["психологічний театр", "акторська школа", "академізм", "традиція"]
  - section: "Сучасний театральний ландшафт XXI століття"
    words: 1000
    subsections:
      - "Незалежний театр: 'ДАХ', 'Дикий театр', 'PostPlay театр'"
      - "Нова драма та документальний театр (Наталя Ворожбит)"
      - "Сучасна режисура: Іван Уривський, Стас Жирков, Тамара Трунова"
    key_concepts: ["постдрама", "документальний театр", "незалежна сцена", "актуальність"]

vocabulary:
  required:
    - експресіонізм
    - конструктивізм
    - гротеск
    - метафора
    - сценографія
    - перформанс
    - мізансцена
    - драматургія
    - авангард
    - інтерпретація
  recommended:
    - катарсис
    - дієгезис
    - підтекст
    - умовність
    - інсталяція
    - імпровізація

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте театральний маніфест Курбаса. Визначте теоретичні засади його реформи та ключову термінологію авангардного театру."
  - type: critical-analysis
    focus: "Проаналізуйте статтю про театр 'ДАХ'. Визначте, як автор оцінює мультидисциплінарність та знайдіть аргументи."
  - type: match-up
    focus: "Зіставте театральні напрями та терміни (експресіонізм, конструктивізм, постдрама, документальний театр) з їхніми характеристиками."
  - type: fill-in
    focus: "Доповніть текст про розвиток українського театру XX-XXI ст. відповідними термінами (гротеск, метафора, сценографія, перформанс, інсталяція)."
  - type: essay-response
    focus: "Напишіть аналітичний текст про п'єсу Куліша 'Мина Мазайло'. Проаналізуйте засоби театральної виразності."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
  - "Авраменко, 11 клас (Укр. літ.) — Курбас, Куліш, Розстріляне відродження"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"

