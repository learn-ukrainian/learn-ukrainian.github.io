activity_hints:
- type: reading
  focus: Прочитайте текст про лесь курбас та театр 'березіль' і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про золота доба модерну: курбас — куліш, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Лесь Курбас та театр 'Березіль'». Обґрунтуйте свою позицію прикладами
    з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему лесь курбас та театр 'березіль'.
- type: comparative-study
  focus: 'Порівняйте різні підходи до лесь курбас та театр ''березіль'': Реформаторський дух: від ''Молодого театру'' до харківського
    ''Березоля''. Визначте спільне та відмінне.'
