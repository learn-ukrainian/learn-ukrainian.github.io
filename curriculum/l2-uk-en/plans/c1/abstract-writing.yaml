module: c1-013
level: C1
sequence: 13
slug: abstract-writing
version: '2.0'
title: Жанр — Анотація та реферат
content_outline:
- section: Вступ — Роль анотації в науці (Introduction — The Role of the Abstract)
  words: 600
  points:
  - Визначення анотації як стислої характеристики змісту наукової праці (статті, монографії)
    згідно з державним стандартом C1 (§1.3.1)
  - 'Культурний контекст: «Вернадська традиція» в українському академічному письмі
    — поєднання термінологічної точності з логічною плинністю викладу'
  - 'Функції анотації: орієнтовна (допомога читачеві) та пошукова (забезпечення індексації
    в наукометричних базах даних)'
- section: Типологія та структура анотації (Typology and Structure of the Abstract)
  words: 900
  points:
  - 'Класифікація анотацій: описова (descriptive), інформативна (informative) та структурована;
    вимоги Міністерства освіти і науки (МОН) до фахових видань'
  - 'Обов''язкові структурні елементи: актуальність дослідження (relevance), мета
    роботи, використані методи, отримані результати та загальні висновки'
  - 'Культурний гачок: концепція «сухого стилю» (dry style) в українській науці —
    відмова від емоційних «гачків» на користь максимальної інформативності'
- section: Стилістичні норми та безособовість (Stylistic Norms and Impersonality)
  words: 900
  points:
  - 'Граматична домінанта: використання пасивних конструкцій («розглянуто», «визначено»,
    «встановлено») як відображення культурної традиції наукової скромності'
  - 'Виправлення типової помилки суб’єктивності: заміна фраз «Я думаю» чи «Мені здається»
    на об’єктивні «Автор вважає», «На думку автора» або безособові форми'
  - 'Правило часової узгодженості: вживання теперішнього часу для опису змісту статті
    («стаття розглядає») та минулого для результатів дослідження («було виявлено»)'
- section: Реферат як розширена форма та термінологія (The Summary as an Expanded
    Form and Terminology)
  words: 700
  points:
  - 'Порівняльний аналіз: анотація (стислий огляд) vs реферат (детальний виклад змісту,
    аргументації та методики дослідження)'
  - 'Подолання лексичної інтерференції: виправлення кальки «папір» (paper) на академічно
    правильні терміни «стаття», «робота», «дослідження» або «праця»'
  - 'Нормативні вимоги до реферату: структура та обсяг згідно з державними стандартами
    (ДКС) для різних типів повідомлень'
- section: Практика написання та типові конструкції (Writing Practice and Typical
    Phrases)
  words: 900
  points:
  - 'Засвоєння мовних кліше для кожного розділу: «У статті досліджується...», «Метою
    роботи є...», «Встановлено, що...», «Результати можуть бути використані...»'
  - 'Практична вправа на трансформацію: перетворення суб’єктивного тексту з активним
    станом у стислу академічну анотацію з використанням пасиву'
  - 'Редагування та шліфування: уникнення надмірної деталізації та прикладів, які
    переобтяжують текст анотації та знижують її лаконічність'
vocabulary_hints:
  required:
  - анотація (abstract) — коротка анотація, анотація до статті; висока частотність
    в академічному стилі
  - реферат (summary/review) — підготувати реферат, захист реферату; розширена форма
    звіту
  - актуальність (relevance) — обґрунтувати актуальність дослідження, втратити актуальність;
    ключовий елемент вступу
  - мета (goal/purpose) — мета роботи, основна мета; обов'язковий структурний компонент
  - методи (methods) — застосувати методи аналізу, експериментальні методи; інструментарій
    дослідження
  - результати (results) — отримані результати, аналіз результатів; змістовне ядро
    анотації
  - висновки (conclusions) — зробити висновки, загальні висновки; підсумок наукового
    пошуку
  - встановлено (established) — було встановлено, експериментально встановлено; безособова
    форма
  - досліджено (researched) — детально досліджено проблему, у роботі досліджено; пасивна
    конструкція
  - проаналізовано (analyzed) — критично проаналізовано дані, у статті проаналізовано;
    акцент на процесі
  recommended:
  - лаконічність (conciseness) — вимога лаконічності, лаконічність викладу; головна
    стилістична ознака
  - інформативність (informativeness) — підвищити інформативність тексту; вимога до
    якості змісту
  - структурований (structured) — структурована анотація; чітко структурований виклад
  - здобутки (achievements) — основні наукові здобутки, вагомі здобутки; результати
    діяльності
  - застосування (application) — практичне застосування результатів; сфера впровадження
