module: c1-013
level: C1
sequence: 13
slug: abstract-writing
version: '1.1'
title: "Написання анотацій та тез"
subtitle: "Abstract and Thesis Writing"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Зрозуміти різницю між розширеною анотацією, тезами та рефератом."
  - "Навчитися створювати лаконічні та інформативні анотації до наукових робіт."
  - "Опанувати кліше для опису об'єкта, предмета та мети дослідження."
  - "Вивчити вимоги до оформлення тез конференцій в Україні."

reading_situations:
  - source_type: "анотація"
    topic: "Дослідження фольклорних мотивів у сучасній українській прозі."
    key_elements: ["мета", "методи", "наукова новизна", "практичне значення"]
    motivation: "Аналіз зразкової анотації для виокремлення ключових структурних елементів."
  - source_type: "тези конференції"
    topic: "Розвиток відновлюваної енергетики в Карпатському регіоні."
    key_elements: ["постановка проблеми", "аналіз останніх досліджень", "висновки"]
    motivation: "Вивчення специфіки стислого викладу наукових ідей для участі у фахових заходах."

listening_situations:
  - media_type: "аудіо"
    setting: "Інструктаж для молодих науковців щодо підготовки матеріалів до міжнародної конференції в Україні."
    focus_points: ["технічні вимоги до оформлення", "типові помилки в анотаціях", "вибір ключових слів"]
    motivation: "Розвиток вміння сприймати на слух та фіксувати формальні вимоги до наукових текстів."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть анотацію (100-150 слів) до уявної статті про роль Лесі Українки в європейському модернізмі. Використайте стандартні вступні конструкції."
    requirements: ["наявність усіх структурних частин анотації", "вживання наукових кліше", "стислість"]
    motivation: "Закріплення навичок лаконічного та логічного викладу основних ідей дослідження."
    model_answer: "Анотація повинна починатися з фрази 'У статті розкрито...', містити опис об'єкта та завершуватися висновком про наукову новизну."

content_outline:
  - section: "Жанрові особливості анотації"
    words: 1000
    subsections:
      - "Функції анотації: пошукова, ознайомча та рекламна"
      - "Структура 'розширеної' анотації згідно з міжнародними стандартами"
      - "Мова анотації: відмова від оцінних суджень та зайвої деталізації"
    key_concepts:
      - "інформативність"
      - "лаконізм"
      - "ключові слова"
  - section: "Мовні кліше наукового викладу"
    words: 1000
    subsections:
      - "Кліше для опису мети: 'проаналізувати', 'виявити', 'систематизувати'"
      - "Опис новизни: 'вперше доведено', 'дістало подальший розвиток'"
      - "Формулювання результатів: 'встановлено, що...', 'обґрунтовано доцільність'"
    key_concepts:
      - "стандартизовані вислови"
      - "наукова фразеологія"
      - "об'єктивність"
  - section: "Мистецтво написання тез"
    words: 1000
    subsections:
      - "Композиція тез: від постановки завдання до підсумків"
      - "Особливості аргументації в умовах обмеженого обсягу"
      - "Вибір заголовка: інформативність та влучність"
    key_concepts:
      - "тези"
      - "лаконічність"
      - "логічна послідовність"
  - section: "Редагування та коректура стислих текстів"
    words: 1000
    subsections:
      - "Уникнення тавтології та багатослів'я"
      - "Вибір оптимальних дієслівних форм"
      - "Перевірка відповідності ключових слів змісту тексту"
    key_concepts:
      - "стилістична правка"
      - "термінологічний контроль"
      - "цілісність"

vocabulary:
  required:
    - анотація
    - тези
    - об'єкт
    - предмет
    - новизна
    - кліше
    - ключове слово
    - обґрунтовувати
  recommended:
    - систематизувати
    - узагальнювати
    - доцільність
    - специфіка
    - лаконізм

activity_hints:
  - type: critical-analysis
    description: "Evaluate a Ukrainian conference abstract — assess completeness of structural elements (мета, методи, новизна, практичне значення)."
  - type: select
    description: "Choose the most appropriate academic cliché for describing research purpose, novelty, and results in an abstract."
  - type: fill-in
    description: "Complete abstract sentences with standardized Ukrainian academic formulas (У статті розкрито..., встановлено що..., обґрунтовано доцільність...)."
  - type: match-up
    description: "Match abstract components (мета, об'єкт, предмет, новизна) with example formulations."
  - type: error-correction
    description: "Fix wordiness, tautology, and non-standard formulations in a draft Ukrainian abstract."

activities:
  types_required:
    - critical-analysis
    - select
    - fill-in
    - translate
    - match-up
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Ворон, 11 клас (2019): с. 207 — Наукова доповідь"
  - "Глазова, 11 клас (2019): §1-10 — Культура мовлення"
  - "Заболотний, 11 клас (2019): Мовленнєві жанри наукового стилю"

connects_to:
  previous: "research-article"
  next: "literature-review"
