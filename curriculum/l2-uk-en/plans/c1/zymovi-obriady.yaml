module: c1-080
level: C1
sequence: 80
slug: zymovi-obriady
version: '2.0'
title: Зимові обряди
subtitle: Winter Calendar Rituals
content_outline:
- section: 'Вступ: Зимовий цикл та синкретизм (Introduction: Winter Cycle and Syncretism)'
  words: 600
  points:
  - 'Аналіз зимового циклу свят згідно з Державним стандартом (§3.21): від Різдва (25 грудня) до Водохреща (6 січня), враховуючи
    перехід на новоюліанський календар.'
  - 'Поняття синкретизму: глибоке дослідження поєднання дохристиянської аграрної магії (культ предків, солярні символи) з
    християнською догматикою.'
  - 'Дискусія про календарну реформу: обговорення статусу ПЦУ/УГКЦ та вибору громад між новими датами та історичним контекстом
    старого стилю.'
- section: 'Різдво: Святий вечір та Дідух (Christmas: Holy Evening and the Didukh)'
  words: 1000
  points:
  - 'Семантика Святвечора: аналіз 12 обрядових страв з фокусом на кутю (багата, голодна) та узвар; символіка запрошення предків
    до столу.'
  - 'Деконструкція помилки: Дідух як ''Дерево Роду'' та сакральний об''єкт перебування духів предків, а не просто декоративна
    ''українська ялинка''.'
  - 'Традиції колядування: розбір структури колядок (прославлення народження) та вертепу; аналіз персонажів різдвяної драми
    (Коза, Смерть, Мошко).'
- section: Новорічно-йорданська обрядовість (New Year and Jordan Rituals)
  words: 1000
  points:
  - 'Щедрий вечір та Маланка: розмежування колядок (Різдво) та щедрівок (Новий рік) для усунення типової помилки змішування
    цих жанрів.'
  - 'Обряд посівання та ґендерні ролі: пояснення ролі ''полазника'' (чому посівати дозволено лише хлопцям/чоловікам) та аграрної
    магії зерна.'
  - 'Йордан (Водохреще): ритуали освячення води, семантика ''виганяння куті'' та символічне завершення зимового обрядового
    кола.'
- section: Символіка, магія та побут (Symbolism, Magic, and Daily Life)
  words: 800
  points:
  - 'Етнографічна термінологія: використання пасивної лексики на позначення традиційних страв (книш, шулики) та предметів
    побуту.'
  - 'Магія слова та дії: аналіз віншувань як перформативного жанру; роль ворожінь на майбутній врожай, здоров''я та шлюб.'
  - 'Маскування та перевдягання: семантика ритуального сміху та карнавальності під час маланкування та вертепної дії.'
- section: 'Практика: Аналіз та трансформація (Practice: Analysis and Transformation)'
  words: 600
  points:
  - 'Лінгвістичний аналіз тексту колядки/щедрівки: виявлення архаїчних символів, метафор та специфічного обрядового регістру
    мовлення.'
  - 'Порівняльна культурологія: зіставлення українських різдвяних традицій з європейськими відповідниками, акцент на унікальності
    дідуха та вертепу.'
  - 'Продуктивне завдання: написання есе про трансформацію зимових свят у сучасному урбаністичному середовищі та збереження
    ідентичності.'
focus: culture
pedagogy: Immersion & Analysis
objectives:
- Learner can describe the cycle of winter holidays in Ukraine
- Learner understands the symbolism of ritual foods and actions
- Learner can analyze the blend of pagan and Christian elements in winter rituals
grammar:
- Ethnographic terminology
- Narrative and ritual registers
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Берегиня
word_target: 4000
vocabulary_hints:
  required:
  - Колядка (Christmas carol) — співати колядки, стародавні колядки; виконується виключно на Різдво для прославлення народження
    Христа.
  - Щедрівка (New Year carol) — щедрий вечір, виконувати щедрівки; містить аграрні побажання добробуту, виконується напередодні
    Нового року.
  - Дідух (Ritual wheat sheaf) — символ роду, дух дідів, ставити дідух; сакральний сніп, місце перебування духів предків під
    час свят.
  - Кутя (Ritual grain dish) — багата кутя, голодна кутя, нести кутю; головна обрядова страва з пшениці, маку та меду.
  - Вертеп (Nativity play/scene) — живий вертеп, ляльковий вертеп, учасники вертепу; традиційний мандрівний театр або різдвяна
    драма.
  - Посівання (Ritual sowing) — обряд посівання, посівати зерном, віншувати; обряд на Новий рік, що символізує родючість і
    багатство.
  recommended:
  - Синкретизм (Syncretism) — поєднання християнських та язичницьких елементів в обрядах.
  - Полазник (First footing/Guest) — перша людина (зазвичай хлопець), яка заходить у хату на свято, приносячи щастя.
  - Віншувати (To wish/To congratulate) — урочисто вітати зі святами поетичною формою.
  - Дерево Роду (Tree of Life/Ancestry) — міфологічний символ зв'язку поколінь, втілений у дідухові.
  - Книш/Шулики (Traditional ritual breads) — етнографічні назви специфічної обрядової випічки.
