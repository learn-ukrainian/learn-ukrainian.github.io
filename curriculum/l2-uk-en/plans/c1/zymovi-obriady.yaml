module: c1-103
level: C1
sequence: 103
slug: zymovi-obriady
version: 1.1.2
title: 'Зимовий обрядовий цикл: від Різдва до Стрітення'
subtitle: Зимовий обрядовий цикл
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
- Систематизувати знання про структуру та семантику зимового календарного циклу 
  українців.
- Дослідити архаїчні витоки та християнські нашарування у святкуванні Різдва, 
  Маланки та Водохреща.
- Ознайомитися з атрибутикою зимових свят (дідух, кутя, зірка, маски) та їхнім 
  магічним значенням.
- Проаналізувати регіональні відмінності у виконанні колядок, щедрівок та 
  вертепних драм.
reading_situations:
- source_type: етнографічний опис
  topic: 'Сакральна трапеза: символіка дванадцяти страв на Святвечір.'
  key_elements:
  - кутя
  - дідух
  - культ предків
  - аграрна магія
  motivation: Аналіз описового тексту з великою кількістю етнографічних реалій.
- source_type: мистецтвознавча стаття
  topic: 'Український вертеп: історія лялькового та живого театру від бароко до сьогодення.'
  key_elements:
  - вертепна скриня
  - інтермедія
  - канонічні персонажі
  motivation: Вивчення термінології народного театру та сценічного мистецтва.
listening_situations:
- media_type: аудіо
  setting: Запис автентичної щедрівки у виконанні фольклорного гурту з Полісся з
    коментарями про діалектні форми.
  focus_points:
  - багатоголосся
  - архаїзми
  - побажальна формула
  motivation: Розвиток навичок розрізнення мовних та музичних нюансів фольклору.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть репортаж про святкування Маланки в одному з сіл Буковини 
    (напр. Красноїльськ). Опишіть атмосферу, костюми та емоції учасників.
  requirements:
  - мінімум 300 слів
  - використання художніх засобів
  - 'вживання термінів: переберія, маланкарі, віншування'
  motivation: Вміння описувати динамічні народні дійства у публіцистичному 
    стилі.
  model_answer: Текст повинен передавати карнавальну природу свята, детально 
    описувати маски (ведмедів, циган) та підкреслювати єдність громади.
content_outline:
- section: 'Космогонія зими: Святвечір та Різдво'
  words: 1000
  subsections:
  - Світоглядне значення зимового сонцестояння у давніх українців
  - Дідух як символ урожаю та міст між світами живих і мертвих
  - 'Різдвяна кутя: інгредієнти та їхня есхатологічна символіка'
  key_concepts:
  - сонцестояння
  - дідух
  - сакральність
- section: 'Магія слова та дії: Коляда та Щедрий вечір'
  words: 1000
  subsections:
  - Колядування як обряд благопожелання та соціальної комунікації
  - 'Маланка та Василь: карнавальна культура, перевдягання та ритуальне бешкетування'
  - 'Щедрівки: поетика та зв''язок із дохристиянським новим роком'
  key_concepts:
  - віншування
  - переберія
  - колядники
- section: Вертеп та народна драма
  words: 1000
  subsections:
  - Вертеп як унікальне явище українського бароко
  - 'Дворівнева структура вертепної скрині: небо та земля'
  - 'Комічні та трагічні персонажі вертепу: від Царя Ірода до Козака та Баби'
  key_concepts:
  - інтермедія
  - вертеп
  - сценографія
- section: 'Завершення циклу: Водохреще та Стрітення'
  words: 1000
  subsections:
  - Освячення води (Йордань) та вірування про очисну силу стихії
  - Стрітенська свічка (громниця) як оберіг від природних лих
  - 'Зима зустрічається з Літом: народні прикмети та прогнозування врожаю'
  key_concepts:
  - водохреще
  - громниця
  - прогнозування
- section: Підсумок — Summary
  words: 300
  points:
  - The Ukrainian winter holiday cycle merges archaic agricultural magic with 
    Christian traditions, using powerful symbols like дідух (connection to 
    ancestors/harvest), кутя (sacred eschatological meal), and громниця 
    (protection).
  - 'Self-check: What is the main difference between колядки and щедрівки? Describe
    the two-level structure of a traditional вертеп and name 3 of its characters.
    What is the symbolic purpose of переберія (dressing up) during Malanka?'
vocabulary:
  required:
  - різдво
  - дідух
  - вертеп
  - колядка
  - щедрівка
  - віншування
  - кутя
  - обряд
  recommended:
  - есхатологія
  - сакральний
  - карнавалізація
  - архаїка
  - атрибутика
activities:
  types_required:
  - critical-analysis
  - match-up
  - translate
  - fill-in
  - select
  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: reading
  focus: 'Прочитайте текст про космогонія зими: святвечір та різдво і дайте відповіді
    на запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про магія слова та дії: коляда та
    щедрий вечір, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Космогонія зими: Святвечір
    та Різдво». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему космогонія
    зими: святвечір та різдво.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до космогонія зими: святвечір та різдво: Світоглядне
    значення зимового сонцестояння у давніх українців. Визначте спільне та відмінне.'
references:
- 'Державний стандарт 2024: C1 — тематична область ''Традиції та свята'''
