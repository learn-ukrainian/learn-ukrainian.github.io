module: c1-091
level: C1
sequence: 91
slug: c1-5-checkpoint
version: '2.0'
title: C1.5 Контрольна точка
subtitle: C1.5 Checkpoint
content_outline:
- section: 'Вступ: Методологія культурного аналізу (Introduction: Methodology of Cultural
    Analysis)'
  words: 600
  points:
  - 'Огляд цілей контрольної точки: перевірка знань про народну та високу культуру
    згідно зі стандартами §3.4 та §3.21 (дозвілля, традиції, свята)'
  - Впровадження концепту 'ідентичність' (national identity) як ключової рамки для
    аналізу мистецьких явищ
  - 'Настанови щодо академічного регістру: пояснення ''стилістичного дисонансу'' та
    заміна розмовних маркерів (класний, супер) на фахові терміни (визначний, багатогранний)'
- section: 'Народна культура: Від міфології до кобзарства (Folk Culture: From Mythology
    to Kobzarship)'
  words: 1000
  points:
  - 'Аналіз музичного фольклору через призму ''міфологічного світогляду'': сакральне
    значення колискових та дум'
  - 'Культурний гачок: кобзарі як ''живий інтернет'' — розгляд їхньої цехової організації,
    ''лебійської мови'' та ролі у безцензурній передачі історії'
  - Танці та ремесла (гопак, писанкарство) як елементи збереження 'автентичності'
    в умовах глобалізації
  - 'Практичне завдання: тест на розуміння календарних обрядів та символіки автентичної
    вишивки'
- section: 'Високе мистецтво: Сакральність та авангард (Fine Arts: Sacrality and Avant-garde)'
  words: 1000
  points:
  - 'Еволюція образотворчого мистецтва: від сакрального іконопису до радикального
    авангарду'
  - 'Культурний гачок: Казимир Малевич та київська школа — зв''язок кольорової гами
    авангарду з традиційною вишивкою'
  - 'Музична класика: від Бортнянського до Сильвестрова — розгляд поняття ''жанровий
    синкретизм'''
  - 'Робота над помилками: диференціація прикметників ''музичний'' (інструмент, слух)
    та ''музикальний'' (обдарований) у контексті описів митців'
- section: 'Синтетичні мистецтва: Театр та Поетичне кіно (Synthetic Arts: Theatre
    and Poetic Cinema)'
  words: 800
  points:
  - Театральні реформи Леся Курбаса та розвиток філармонійного життя згідно з §3.4
    стандарту
  - 'Культурний гачок: ''Тіні забутих предків'' Параджанова як етнографічна енциклопедія
    та приклад візуального синкретизму'
  - 'Лексична вправа: виправлення кальки ''приймати участь'' на нормативне ''брати
    участь у фестивалях/виставках'''
- section: 'Підсумок: Порівняльне есе та стилістика (Summary: Comparative Essay and
    Stylistics)'
  words: 600
  points:
  - 'Методика написання порівняльного есе: народне vs високе мистецтво — акцент на
    структуруванні тексту за §4.4.4 (по-перше, отже, насамкінець)'
  - Використання стилістичних засобів синтаксису (порівняння, вставні конструкції)
    для висловлення власної позиції щодо ролі мистецтва в ідентичності
  - 'Фінальний чек-лист: самоперевірка на предмет академічної точності термінології
    та відсутності суржику'
focus: checkpoint
pedagogy: Assessment
objectives:
- Assess knowledge of Ukrainian folk culture and fine arts
- Evaluate ability to analyze cultural phenomena at C1 level
- Verify mastery of cultural and artistic terminology
grammar:
- Comprehensive Review
phase: C1.5 Folk Culture & Fine Arts
persona:
  voice: Senior Specialist
  role: Культуролог-екзаменатор
word_target: 4000
vocabulary_hints:
  required:
  - сакральний (sacral) — сакральне мистецтво, сакральний простір; висока частота
    в академічних текстах про культуру
  - автентичний (authentic) — автентичний спів, автентична вишивка; акцент на збереженні
    первісності
  - світогляд (worldview) — міфологічний світогляд, світоглядні орієнтири; абстрактний
    іменник для аналізу культури
  - синкретизм (syncretism) — жанровий синкретизм, релігійний синкретизм; академічний
    термін для поєднання елементів
  - ідентичність (identity) — національна ідентичність, пошук ідентичності; ключове
    поняття соціокультурного аналізу
  recommended:
  - музикальний (musical/talented) — вживається для характеристики людини; порівняти
    з 'музичний' (інструмент)
  - брати участь (to participate) — нормативний замінник кальки 'приймати участь'
  - багатогранний (multifaceted) — рекомендований епітет для високого стилю есе
  - визначальний (decisive/defining) — для опису впливу культурних явищ
