module: c1-091
level: C1
sequence: 91
slug: ritual-songs
version: 1.1.1
title: 'Українська обрядова пісність: магія слова та ритму'
subtitle: 'Обрядові пісні: магія слова й ритму'
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
- Систематизувати знання про календарно-обрядовий цикл українців (зимовий, весняний, літній, осінній).
- Дослідити архаїчні пласти обрядової поезії та їхній зв'язок із дохристиянськими віруваннями.
- Проаналізувати художню специфіку обрядових пісень (магічне спрямування, величальність, символізм).
- Вивчити регіональні особливості виконання та збереження обрядового фольклору в сучасному контексті.
reading_situations:
- source_type: етнографічний нарис
  topic: Символіка купальського обрядодійства у записах Лесі Українки на Волині.
  key_elements:
  - дерево-Купайло
  - ворожіння на вінках
  - очисне багаття
  motivation: Аналіз фахового етнографічного тексту та вивчення термінології обрядових дій.
- source_type: наукова стаття
  topic: 'Магічна функція слова в українських колядках та щедрівках: від замовляння до побажання.'
  key_elements:
  - персоніфікація
  - гіперболізація
  - рефрен
  motivation: Дослідження філологічного аспекту фольклорних текстів.
listening_situations:
- media_type: аудіо
  setting: Польовий запис автентичного виконання веснянок (гаївок) на Західному Поліссі.
  focus_points:
  - багатоголосся
  - ритмічна структура
  - діалектні особливості
  motivation: Розвиток вміння розрізняти автентичне та сценічне виконання народної пісні.
writing_tasks:
- task_type: есе
  prompt: 'Поміркуйте над тезою: ''Трансформація обрядових пісень у сучасному поп-дискурсі: збереження традиції чи профанація?'''
  requirements:
  - мінімум 300 слів
  - використання прикладів сучасних гуртів (наприклад, Go_A, Onuka)
  - аргументована власна позиція
  motivation: Вміння поєднувати глибокі культурні знання з аналізом сучасних медіа-явищ.
  model_answer: 'Текст повинен висвітлювати як позитивні аспекти популяризації фольклору (re-thinking), так і ризики втрати
    первинних смислів. Важливо вжити терміни: етно-модернізм, автентика, стилізація.'
content_outline:
- section: 'Зимовий цикл: космогонія та благопожелання'
  words: 1000
  subsections:
  - 'Колядки та щедрівки: відмінності в генезисі та часі виконання'
  - Образи господаря, господині та світового дерева у величальних піснях
  - Християнські нашарування на архаїчну основу
  key_concepts:
  - величання
  - добробут
  - астрономічний цикл
- section: 'Весняний цикл: закликання весни та пробудження природи'
  words: 1000
  subsections:
  - 'Веснянки та гаївки: магічні ігри та хороводи'
  - Образ Весни-діви та птахів-вісників тепла
  - Специфіка весняної обрядовості на Великдень
  key_concepts:
  - рекреація
  - символіка птахів
  - хоровод
- section: 'Літній цикл: магія води та вогню'
  words: 1000
  subsections:
  - 'Русальні пісні: повір''я про душі померлих та задобрювання стихій'
  - 'Купальські обряди: солярна символіка та шлюбні мотиви'
  - 'Жниварські пісні: апофеоз селянської праці та прославляння врожаю'
  key_concepts:
  - міфологема
  - жнива
  - культ природи
- section: Символічний код та поетика фольклору
  words: 1000
  subsections:
  - Паралелізм як основний художній засіб обрядової поезії
  - Традиційна символіка (калина, барвінок, зозуля, сокіл)
  - Ритмомелодика та музичний супровід обрядових дій
  key_concepts:
  - художній паралелізм
  - символ
  - фольклорна традиція
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
  - колядка
  - щедрівка
  - веснянка
  - гаївка
  - жнива
  - обряд
  - традиція
  - величальний
  recommended:
  - архаїчний
  - сакральний
  - космогонічний
  - автентика
  - рефрен
activity_hints:
- type: reading
  focus: 'Прочитайте текст про зимовий цикл: космогонія та благопожелання і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про весняний цикл: закликання весни та пробудження природи, використовуючи
    нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Зимовий цикл: космогонія та благопожелання». Обґрунтуйте свою
    позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему зимовий цикл: космогонія та благопожелання.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до зимовий цикл: космогонія та благопожелання: Колядки та щедрівки: відмінності в генезисі
    та часі виконання. Визначте спільне та відмінне.'
activities:
  types_required:
  - critical-analysis
  - comparative-study
  - match-up
  - fill-in
  - select
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Караман, 10 клас (2018): §19 — Милозвучність, ритміка народної пісні'
- 'Авраменко, 11 клас (Укр. літ.): Фольклор, обрядова поезія'
- 'Борзенко, 11 клас (Укр. літ.): Народна культура, обрядовий фольклор'
connects_to:
