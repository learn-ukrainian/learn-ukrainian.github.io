module: c1-001
level: C1
sequence: 1
slug: b2-review-bridge
version: 1.1.2
title: Повторення та перехід до рівня С1
subtitle: Повторення B2 та перехід до C1
focus: integration
pedagogy: review
word_target: 4000
objectives:
- Систематизувати складні граматичні конструкції рівня B2 для впевненого 
  переходу до C1.
- Проаналізувати нюанси використання відмінків у науковому та офіційному 
  дискурсі.
- Відновити навички аналізу складних синтаксичних структур у текстах класичної 
  літератури.
- Підготувати лексичну базу для сприйняття абстрактних та професійних тем 
  академічного спрямування.
reading_situations:
- source_type: літературно-критичний нарис
  topic: 'Спадщина Розстріляного відродження: естетичні пошуки та трагічна доля.'
  key_elements:
  - модернізм
  - ідеологічний тиск
  - експериментальна проза
  - синтаксична інверсія
  motivation: Перевірка здатності розуміти складні авторські метафори та 
    історичний контекст через призму складного синтаксису.
- source_type: наукова стаття з історії
  topic: 'Державотворчі процеси в Україні 1917-1921 років: виклики та уроки.'
  key_elements:
  - суверенітет
  - дипломатичні зусилля
  - соціальна трансформація
  - безособові конструкції
  motivation: Аналіз академічного викладу історичних фактів з використанням 
    пасивних станів та термінології.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Напишіть роздум (250-300 слів) на тему: ''Чи може мова бути інструментом
    деокупації свідомості?''. Використовуйте досвід української історії та літератури.'
  requirements:
  - аргументація з посиланням на культурний контекст
  - використання складних підрядних речень
  - точність слововживання
  motivation: Оцінка готовності студента до аргументованого викладу думок на 
    абстрактні суспільно-політичні теми.
  model_answer: Текст повинен демонструвати впевнене володіння абстрактною 
    лексикою, логічну зв'язність та вміння інтегрувати історичні паралелі в 
    сучасний контекст.
discussion_topics:
- context: Сучасна дискусія про роль академічного стандарту в умовах 
    глобалізації та діджиталізації української мови.
  questions:
  - Чи варто спрощувати граматичні норми для полегшення комунікації?
  - Як зберегти автентичність української мови в умовах масових запозичень?
  - Роль літературної норми у формуванні національної ідентичності.
  motivation: Розвиток навичок спонтанного монологічного та діалогічного 
    мовлення на високому регістрі.
content_outline:
- section: Синтаксичний міст
  words: 1000
  subsections:
  - Ревізія складних речень із кількома підрядними
  - Відокремлені члени речення як засіб стилістичного увиразнення
  - Специфіка вживання дієприкметникових та дієприслівникових зворотів у 
    високому стилі
  key_concepts:
  - ієрархія підрядності
  - стилістична фігура
  - синтаксична синонімія
- section: Лексична ретроспектива та перспектива
  words: 1000
  subsections:
  - Синонімічні ряди абстрактних понять
  - Фразеологія в історичному та літературному контексті
  - Пароніми та їх диференціація в професійному мовленні
  key_concepts:
  - когнітивна семантика
  - лексична сполучуваність
  - етнолінгвістика
- section: Текст як об'єкт аналізу
  words: 1000
  subsections:
  - Когезція та когерентність наукового та художнього текстів
  - Засоби логічного зв'язку на рівні абзацу
  - 'Інтертекстуальність: відлуння класики в сучасному дискурсі'
  key_concepts:
  - текстотворення
  - дискурсивні маркери
  - алюзія
- section: Граматична витонченість
  words: 1000
  subsections:
  - Складні випадки керування та узгодження
  - Варіантність норм у сучасній українській мові (за правописом 2019 року)
  - 'Експресивний синтаксис: інверсія, парцеляція, еліпсис'
  key_concepts:
  - нормотворчість
  - граматична категорія
  - стилістична норма
- section: Підсумок — Summary
  words: 300
  points:
  - 'Review complex syntactic structures (дієприкметникові та дієприслівникові звороти)
    and expressive syntax (інверсія, парцеляція, еліпсис) used in high-style texts.
    Self-check: Rewrite two simple sentences into one complex academic sentence using
    a дієприслівниковий зворот. What is the stylistic difference between прямий порядок
    слів and інверсія?'
  - "Review lexical precision and text cohesion, focusing on abstract synonyms, paronyms,
    and discourse markers for professional and literary discourse. Self-check: What
    is the semantic difference between the paronyms 'громадський' and 'громадянський'?
    List 3 discourse markers you would use to logically connect paragraphs in a formal
    essay."
  - "Review grammar nuances including complex cases of agreement/government and modern
    orthography variants (Правопис 2019). Self-check: What is the difference between
    the endings in 'радості' and 'радости' under the new spelling rules? Provide 2
    examples of verbs that require complex case government in formal Ukrainian."
vocabulary:
  required:
  - ідентичність
  - спадкоємність
  - парадигма
  - дискурс
  - інтерпретація
  - контекст
  - автентичність
  - ментальність
  recommended:
  - самобутність
  - інтелектуалізація
  - трансформація
  - рефлексія
  - верифікація
activity_hints:
- type: reading
  focus: Прочитайте текст про синтаксичний міст і дайте відповіді на запитання 
    щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про лексична ретроспектива та 
    перспектива, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Синтаксичний 
    міст». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    синтаксичний міст.
- type: comparative-study
  focus: 'Порівняйте різні підходи до синтаксичний міст: Ревізія складних речень із
    кількома підрядними. Визначте спільне та відмінне.'
activities:
  types_required:
  - critical-analysis
  - error-correction
  - essay-response
  - fill-in
  - match-up
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Глазова, 11 клас (2019): §1-10 — Культура мовлення, стилістичні норми'
- 'Авраменко, 11 клас (2019): Стилістична норма, с. 164'
- 'Ворон, 11 клас (2019): с. 207 — Науковий стиль та наукова доповідь'
connects_to:
  previous: b2-final-exam
  next: academic-style-markers
phase: C1.1 [Academic Foundation]
