module: c1-001
level: C1
sequence: 1
slug: b2-review-bridge
version: '2.0'
title: Огляд B2 та міст до C1
subtitle: 'Introduction: From B2 to C1'
content_outline:
- section: 'Вступ: Від B2 до C1 (Introduction: From B2 to C1)'
  words: 500
  points:
  - Ключові відмінності між рівнями B2 і C1 — перехід від базового володіння до усвідомленого
    вибору регістру та стилістичної доречності (appropriateness).
  - 'Очікувані компетенції на рівні C1 згідно з Держстандартом (§4.4.1.1): систематизація
    знань про 7 функціональних стилів, включаючи релігійний та епістолярний.'
  - Впровадження концепції 'Agency Pass' як критерію якості академічного тексту —
    зміщення фокусу з граматичної правильності на ефективність комунікації та дієвість
    суб'єкта.
- section: Пасивний стан та деколонізація синтаксису (Passive Voice and Syntax Decolonization)
  words: 850
  points:
  - 'Усі 4 форми пасиву та вибір регістру: безособові речення на -но, -то (Держстандарт
    §4.3.3.1), пасивні дієприкметники та форми на -ся.'
  - 'Learner error: вживання форми на -ся з агентом дії (Книга читається студентом)
    — відпрацювання пріоритетної активної конструкції ''Студент читає книгу''.'
  - 'Cultural hook: Деколонізація синтаксису — аналіз радянської політики 1930-х років
    щодо штучного нав''язування пасивних конструкцій для наближення української мови
    до російських стандартів.'
  - Безособові речення («Там усе правильно записано») як інструмент об'єктивності
    в науковому стилі без втрати природності звучання.
- section: Дієприкметники та наукова термінологія (Participles and Scientific Terminology)
  words: 750
  points:
  - 'Активні дієприкметники: корекція помилок калькування суфіксів -уч/-юч (бажаючі
    → охочі, подорожуючі → подорожні) та їх заміна дієприкметниковими зворотами або
    підрядними реченнями.'
  - Пасивні дієприкметники з суфіксами -ний/-тий та їх функціонування в офіційно-діловому
    стилі.
  - 'Cultural hook: Роль Наукового товариства імені Шевченка (1873) та внесок Грушевського
    і Франка у формування української наукової термінології на основі живої народної
    мови.'
- section: Складнопідрядні речення в академічному письмі (Complex Sentences in Academic
    Writing)
  words: 800
  points:
  - 'Багатокомпонентні речення згідно з вимогами Держстандарту (§4.3.4.1): типи підрядних
    зв''язків (означальні, з''ясувальні, обставинні) для структурування аргументації.'
  - Пунктуаційна складність та оформлення підрядних частин у науковому викладі.
  - 'Підготовка до модуля C1-05 (Logical Connectors): використання сполучників як
    інструментів логічного зв''язку між складними думками.'
- section: Функціональні стилі та доречність (Functional Styles and Appropriateness)
  words: 650
  points:
  - Систематизація п'яти основних стилів (науковий, офіційно-діловий, публіцистичний,
    художній, розмовний) та поняття стилістичного дисонансу.
  - 'Learner error: вживання розмовної лексики в академічному контексті або надмірне
    використання канцеляризмів («здійснити перехід») у повсякденному спілкуванні.'
  - 'Поняття доречності (appropriateness) як маркер рівня C1: здатність змінювати
    мовний інструментарій залежно від ситуації.'
- section: Фразеологія та підсумок (Phraseology and Summary)
  words: 450
  points:
  - 'Стилістичне використання фразеологізмів: ідіоми та сталі вирази як засоби виразності
    в публіцистичному стилі.'
  - 'Самооцінка готовності до переходу в C1 Academic: аналіз структури наступних 106
    модулів та закріплення цільового вокабуляру.'
vocabulary_hints:
  required:
  - регістр (register) — високий/низький регістр, зміна регістру, офіційний регістр;
    частотний в академічному контексті
  - стиль (style) — науковий стиль, художній стиль, офіційно-діловий стиль, змішування
    стилів; базова термінологія рівня
  - пасивний стан (passive voice) — форми пасивного стану, уникати пасивного стану;
    граматична категорія
  - компетенція (competency) — мовна компетенція, набути компетенції, сфера компетенції;
    частотний у професійному дискурсі
  - доречність (appropriateness) — доречність вживання, стилістична доречність; ключовий
    критерій оцінки на C1
  - безособове речення (impersonal sentence) — використання в науковому стилі, безособові
    форми на -но, -то
  recommended:
  - дієприкметник (participle) — активний/пасивний дієприкметник, дієприкметниковий
    зворот
  - складнопідрядне речення (complex sentence) — з'ясувальні, означальні, обставинні
    зв'язки
  - сталий вираз (set expression) — вживати сталі вирази, фразеологічна одиниця
  - консолідація (consolidation) — консолідація знань, системний підхід
  - самооцінка (self-assessment) — інструмент рефлексії навчального поступу
  - інтеграція (integration) — інтеграція нових конструкцій у мовлення
