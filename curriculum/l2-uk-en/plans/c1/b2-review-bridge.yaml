module: c1-001
level: C1
sequence: 1
slug: b2-review-bridge
version: '1.0'
title: "Повторення та перехід до рівня С1"
subtitle: "B2 Review and C1 Bridge"
focus: integration
pedagogy: review
word_target: 4000
objectives:
  - "Систематизувати складні граматичні конструкції рівня B2 для впевненого переходу до C1."
  - "Проаналізувати нюанси використання відмінків у науковому та офіційному дискурсі."
  - "Відновити навички аналізу складних синтаксичних структур у текстах класичної літератури."
  - "Підготувати лексичну базу для сприйняття абстрактних та професійних тем академічного спрямування."

reading_situations:
  - source_type: "літературно-критичний нарис"
    topic: "Спадщина Розстріляного відродження: естетичні пошуки та трагічна доля."
    key_elements: ["модернізм", "ідеологічний тиск", "експериментальна проза", "синтаксична інверсія"]
    motivation: "Перевірка здатності розуміти складні авторські метафори та історичний контекст через призму складного синтаксису."
  - source_type: "наукова стаття з історії"
    topic: "Державотворчі процеси в Україні 1917-1921 років: виклики та уроки."
    key_elements: ["суверенітет", "дипломатичні зусилля", "соціальна трансформація", "безособові конструкції"]
    motivation: "Аналіз академічного викладу історичних фактів з використанням пасивних станів та термінології."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть роздум (250-300 слів) на тему: 'Чи може мова бути інструментом деокупації свідомості?'. Використовуйте досвід української історії та літератури."
    requirements: ["аргументація з посиланням на культурний контекст", "використання складних підрядних речень", "точність слововживання"]
    motivation: "Оцінка готовності студента до аргументованого викладу думок на абстрактні суспільно-політичні теми."
    model_answer: "Текст повинен демонструвати впевнене володіння абстрактною лексикою, логічну зв'язність та вміння інтегрувати історичні паралелі в сучасний контекст."

discussion_topics:
  - context: "Сучасна дискусія про роль академічного стандарту в умовах глобалізації та діджиталізації української мови."
    questions:
      - "Чи варто спрощувати граматичні норми для полегшення комунікації?"
      - "Як зберегти автентичність української мови в умовах масових запозичень?"
      - "Роль літературної норми у формуванні національної ідентичності."
    motivation: "Розвиток навичок спонтанного монологічного та діалогічного мовлення на високому регістрі."

content_outline:
  - section: "Синтаксичний міст: від B2 до C1"
    words: 1000
    subsections:
      - "Ревізія складних речень із кількома підрядними"
      - "Відокремлені члени речення як засіб стилістичного увиразнення"
      - "Специфіка вживання дієприкметникових та дієприслівникових зворотів у високому стилі"
    key_concepts:
      - "ієрархія підрядності"
      - "стилістична фігура"
      - "синтаксична синонімія"
  - section: "Лексична ретроспектива та перспектива"
    words: 1000
    subsections:
      - "Синонімічні ряди абстрактних понять"
      - "Фразеологія в історичному та літературному контексті"
      - "Пароніми та їх диференціація в професійному мовленні"
    key_concepts:
      - "когнітивна семантика"
      - "лексична сполучуваність"
      - "етнолінгвістика"
  - section: "Текст як об'єкт аналізу"
    words: 1000
    subsections:
      - "Когезція та когерентність наукового та художнього текстів"
      - "Засоби логічного зв'язку на рівні абзацу"
      - "Інтертекстуальність: відлуння класики в сучасному дискурсі"
    key_concepts:
      - "текстотворення"
      - "дискурсивні маркери"
      - "алюзія"
  - section: "Граматична витонченість"
    words: 1000
    subsections:
      - "Складні випадки керування та узгодження"
      - "Варіантність норм у сучасній українській мові (за правописом 2019 року)"
      - "Експресивний синтаксис: інверсія, парцеляція, еліпсис"
    key_concepts:
      - "нормотворчість"
      - "граматична категорія"
      - "стилістична норма"

vocabulary:
  required:
    - ідентичність
    - спадкоємність
    - парадигма
    - дискурс
    - інтерпретація
    - контекст
    - автентичність
    - ментальність
  recommended:
    - самобутність
    - інтелектуалізація
    - трансформація
    - рефлексія
    - верифікація

activities:
  types_required:
    - critical-analysis
    - error-correction
    - essay-response
    - fill-in
    - match-up
  min_items_per_type: 5
  total_min_items: 25

