title: 'Суржик: Феномен змішування'
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - Визначення суржику як хаотичного змішування української та російської мовних систем;
    відмінність від сталих територіальних діалектів (builds on c1-28).
  - 'Відповідність Державному стандарту (§4.4.1.1): розгляд суржику в контексті розмовного
    стилю та його неприпустимість в офіційному чи науковому мовленні.'
  - 'Історичні передумови: вплив політики русифікації на формування ''гібридної мови''
    та соціолінгвістичний контекст виникнення.'
- section: 'Соціолінгвістичний вимір: Суржик як феномен (Sociolinguistic Dimension:
    Surzhyk as a Phenomenon)'
  words: 800
  points:
  - 'Поняття мовної інтерференції та мовної стійкості: аналіз факторів, що сприяють
    змішуванню кодів.'
  - 'Код-свічинг vs Суржик: відмінність між усвідомленим перемиканням кодів у білінгвальному
    середовищі та несвідомим використанням суржику.'
  - 'Соціальне сприйняття та стигматизація: дискусія про мовний престиж без категоричного
    засудження носіїв, фокус на освітній дестигматизації.'
- section: Фонетична та граматична інтерференція (Phonetic and Grammatical Interference)
  words: 900
  points:
  - 'Типові фонетичні помилки: вплив російської вимови та редукції голосних (напр.,
    ''чєловек'' замість ''людина'', ''канєшно'' замість ''звісно'').'
  - 'Граматичне керування: виправлення помилки ''дякую вас'' (вплив російської) на
    нормативне ''дякую вам'' (Dative) — розбір на мінімальних парах.'
  - 'Дієслівні форми та зворотні конструкції: трансформація суржикового ''вибачаюся''
    (I apologize to myself) на літературне ''вибачте'' або ''перепрошую''.'
- section: Лексичні кальки та «Анти-суржик» (Lexical Calques and 'Anti-Surzhyk')
  words: 900
  points:
  - 'Аналіз типових кальок: заміна ''приймати участь'' (take part) на ''брати участь''
    та ''вірне рішення'' на ''правильне рішення'' (correct decision).'
  - 'Практичний інструментарій: створення таблиці ''Неправильно — Правильно'' для
    частотних слів (кажеться -> здається, єслі -> якщо, понімаю -> розумію).'
  - Вправи на деконструкцію суржикових речень та їх переклад літературною нормою з
    поясненням етимології запозичень.
- section: Суржик у культурі та медіа (Surzhyk in Culture and Media)
  words: 500
  points:
  - 'Культурний хук — Вєрка Сердючка (Андрій Данилко): аналіз використання суржику
    як засобу створення комічного образу ''простої людини''.'
  - 'Літературна сатира Леся Подерв''янського: гротескне відображення радянської та
    пострадянської дійсності через мовне змішування.'
  - 'Кінематографічний приклад: фільм «Мої думки тихі» (Антоніо Лукіч) як джерело
    для аналізу реалістичної мовної ситуації в Україні.'
- section: Практичне застосування та підсумок (Practical Application and Summary)
  words: 400
  points:
  - 'Відповідність Державному стандарту (§4.4.5): створення короткого тексту офіційного
    стилю з уникненням будь-якої інтерференції.'
  - 'Дискусія: суржик як тимчасовий етап переходу до повної україномовності та роль
    мовної гігієни у професійному житті.'
  - Підсумковий тест на ідентифікацію прихованих русизмів та граматичних кальок у
    складних реченнях.
vocabulary_hints:
  required:
  - суржик (surzhyk) — говорити суржиком, переходити на суржик; висока частотність
    у соціолінгвістиці
  - інтерференція (interference) — мовна інтерференція, фонетична інтерференція; академічний
    термін
  - русизм (Russicism) — уникати русизмів, типовий русизм; ключовий термін для освітнього
    контексту
  - код-свічинг (code-switching) — перемикання кодів; часто використовується в контексті
    білінгвізму
  - калька (calque) — лексична калька, калька з російської; дослівний переклад структури
  - стигматизація (stigmatization) — соціальна стигматизація; середній рівень частотності
  - мовна стійкість (linguistic resilience) — здатність опиратися впливу іншої мовної
    системи
  recommended:
  - білінгвізм (bilingualism) — двомовність; часто є підґрунтям для появи суржику
  - соціолект (sociolect) — мова певної соціальної групи
  - девіація (deviation) — відхилення від літературної норми
  - мовний престиж (linguistic prestige) — соціальний статус мовного варіанту в суспільстві
  - викорінювати (to eradicate) — активно позбуватися суржику або помилок
