module: c1-037
level: C1
sequence: 37
slug: surzhyk
version: 1.1.2
title: 'Суржик: Соціолінгвістичний феномен, історія та сучасність'
subtitle: 'Суржик: соціолінгвістичний аналіз'
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
- Дослідити витоки суржику як наслідку тривалого українсько-російського 
  білінгвізму.
- Аналізувати структурні особливості суржику на різних рівнях (фонетичному, 
  лексичному, граматичному).
- Розуміти соціолінгвістичні функції суржику в сучасній Україні.
- Вивчити погляди науковців (Л. Масенко, В. Труб) на природу та майбутнє цього 
  явища.
reading_situations:
- source_type: наукове есе
  topic: Суржик як маркер постколоніальної ідентичності в працях Лариси Масенко.
  key_elements:
  - мовно-культурна маргіналізація
  - гібридність
  - диглосія
  motivation: Глибоке розуміння політичних та соціальних причин виникнення 
    змішаного мовлення.
- source_type: художній текст
  topic: Стилістичне використання суржику в сучасній літературі (Лесь 
    Подерв'янський, Сергій Жадан).
  key_elements:
  - комічний ефект
  - характеристика персонажа
  - модальність
  motivation: Аналіз суржику як інструмента художньої виразності та соціальної 
    критики.
listening_situations:
- media_type: лекція
  setting: Дискусія лінгвістів про те, чи є суржик самостійним піджаргоном чи 
    лише сукупністю індивідуальних помилок.
  focus_points:
  - мовна компетенція
  - інтерференція
  - престижність мовлення
  motivation: Формування навичок розрізнення діалекту, просторіччя та суржику.
writing_tasks:
- task_type: власне висловлення
  prompt: Суржик — це хвороба мови чи природний етап її розвитку в умовах 
    двомовності? Наведіть аргументи, спираючись на соціолінгвістичний контекст.
  requirements:
  - мінімум 350 слів
  - використання наукового стилю
  - критичний аналіз аргументів 'за' і 'проти'
  motivation: Розвиток здатності до наукової аргументації та синтезу знань.
  model_answer: Відповідь має містити розмежування між територіальним діалектом 
    та суржиком, аналіз колоніальної спадщини та розгляд суржику як перехідного 
    стану до україномовного середовища.
discussion_topics:
- context: 'Суржик у медіа: реклама, серіали та соціальні мережі. Популяризація чи
    відображення реальності?'
  questions:
  - Чи допомагає суржик у медіа швидшому переходу на українську мову?
  - Чому суржик часто використовується для створення комічних образів?
  - Яка роль школи у подоланні суржику?
  motivation: Розвиток навичок ведення публічної дискусії на актуальні мовні 
    теми.
content_outline:
- section: Походження та генезис суржику
  words: 1000
  subsections:
  - Етимологія терміна та історичні умови виникнення явища
  - 'Україна як простір мовних контактів: від Російської імперії до сучасності'
  - 'Психологічні аспекти вживання змішаного мовлення: мовна стійкість'
  key_concepts:
  - двомовність
  - інтерференція
  - субстрат
- section: Структурний аналіз змішаного мовлення
  words: 1000
  subsections:
  - 'Фонетичні деформації: змішування звукових систем'
  - 'Лексичний суржик: запозичення коренів та суфіксів (кальки)'
  - 'Граматичний рівень: порушення синтаксичних та морфологічних норм'
  key_concepts:
  - калька
  - морфема
  - синтаксис
- section: Суржик як соціокультурний маркер
  words: 1000
  subsections:
  - 'Типологія носіїв суржику: від сільського до міського середовища'
  - 'Суржик у літературі та мистецтві: від Котляревського до сьогодення'
  - 'Мода на суржик: ''стьоб'' як форма соціального протесту'
  key_concepts:
  - соціолект
  - диглосія
  - культурний код
- section: Мовна політика та культура мовлення
  words: 1000
  subsections:
  - 'Шляхи очищення мови від кальок та русизмів: практичні поради'
  - Роль держави та громадських ініціатив у мовній деколонізації
  - 'Майбутнє суржику: зникнення чи трансформація у нову міську говірку?'
  key_concepts:
  - пуризм
  - нормативність
  - деколонізація
- section: Підсумок — Summary
  words: 300
  points:
  - "Review the structural levels of Surzhyk (phonetic, lexical, grammatical) and
    key concepts like interference and calques. Self-check: What is the etymological
    origin of the term 'surzhyk'? Can you identify 3 common lexical calques in everyday
    speech?"
  - 'Understand the sociolinguistic functions of mixed speech in modern Ukraine, from
    historical bilingualism to modern cultural expressions. Self-check: What is the
    difference between diglossia and bilingualism? Describe 3 social environments
    where Surzhyk is typically used today.'
vocabulary:
  required:
  - інтерференція
  - маргіналізація
  - гібридність
  - калькування
  - диглосія
  - соціолект
  - нормативність
  - деколонізація
  recommended:
  - контамінація
  - акультурація
  - ідентичність
  - престижність
  - просторіччя
activity_hints:
- type: reading
  focus: Прочитайте текст про походження та генезис суржику і дайте відповіді на
    запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про структурний аналіз змішаного
    мовлення, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Походження та 
    генезис суржику». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    походження та генезис суржику.
- type: comparative-study
  focus: 'Порівняйте різні підходи до походження та генезис суржику: Етимологія терміна
    та історичні умови виникнення явища. Визначте спільне та відмінне.'
activities:
  types_required:
  - error-correction
  - critical-analysis
  - match-up
  - true-false
  - select
  min_items_per_type: 5
  total_min_items: 25
references:
