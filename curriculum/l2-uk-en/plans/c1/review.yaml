module: c1-051
level: C1
sequence: 51
slug: review
version: '1.1'
title: "Підсумкове повторення та узагальнення"
subtitle: "Фінальний огляд і синтез"
focus: review
pedagogy: review
word_target: 4000
objectives:
  - "Систематизувати знання з морфології та синтаксису, здобуті на рівні C1."
  - "Усунути типові помилки у використанні складної лексики та термінології."
  - "Закріпити навички написання текстів різних академічних стилів."
  - "Підготуватися до фінального оцінювання мовних компетенцій."

reading_situations:
  - source_type: "художній уривок"
    topic: "Інтертекстуальність у прозі Валер'яна Підмогильного: аналіз складних образів."
    key_elements: ["екзистенціалізм", "міський дискурс", "психологізм"]
    motivation: "Повторення засобів художньої виразності та складного синтаксису."
  - source_type: "наукова стаття"
    topic: "Розвиток української наукової термінології у XX столітті."
    key_elements: ["термінотворення", "пуризм", "інтернаціоналізм"]
    motivation: "Узагальнення знань про функціональні стилі мови."

listening_situations:
  - media_type: "лекція"
    setting: "Публічна лекція про вплив української діаспори на збереження мовної
      ідентичності."
    focus_points: ["історичні етапи еміграції", "мовні особливості діаспорного мовлення",
      "культурна спадщина"]
    motivation: "Розвиток навичок синтезу інформації з тривалого аудіопотоку."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Висловіть свою думку щодо тези: 'Мова — це не лише засіб спілкування,
      а й інструмент формування світогляду'."
    requirements: ["мінімум 250 слів", "використання тез, аргументів та прикладів
          з літератури", "логічність та послідовність"]
    motivation: "Підготовка до формату іспитів та закріплення навичок аргументації."
    model_answer: "Твір має містити чітку тезу, два аргументи, приклад з української
      історії або літератури (наприклад, роль Василя Стуса) та висновок."

discussion_topics:
  - context: "Дискусія про майбутнє паперових книг в епоху тотальної цифровізації."
    questions:
      - "Чи зникне друковане слово як матеріальний об'єкт?"
      - "Як зміниться процес сприйняття тексту при читанні з екрана?"
    motivation: "Практика спонтанного мовлення з використанням вивчених модальних
      конструкцій."

content_outline:
  - section: "Систематизація морфологічних норм"
    words: 1000
    subsections:
      - "Складні випадки відмінювання іменників та числівників"
      - "Вживання дієприкметників та дієприслівників: уникнення кальок"
      - "Правопис складних слів та прислівників"
    key_concepts:
      - "флексія"
      - "парадигма"
      - "нормативність"
  - section: "Синтаксичний практикум"
    words: 1000
    subsections:
      - "Пунктуація у реченнях зі вставними конструкціями та цитатами"
      - "Трансформація простих речень у складні та навпаки"
      - "Аналіз типових синтаксичних помилок у наукових текстах"
    key_concepts:
      - "когерентність"
      - "пунктограма"
      - "предикативність"
  - section: "Лексикологія та стилістика: робота над помилками"
    words: 1000
    subsections:
      - "Пароніми та омоніми в професійному мовленні"
      - "Стилістичне використання синонімів та антонімів"
      - "Очищення мовлення від суржику та невиправданих запозичень"
    key_concepts:
      - "лексема"
      - "конотація"
      - "стилістична забарвленість"
  - section: "Підготовка до підсумкового проекту"
    words: 1000
    subsections:
      - "Вимоги до академічного есе рівня C1"
      - "Техніки ефективного публічного виступу"
      - "Саморефлексія: оцінка власного прогресу в опануванні мови"
    key_concepts:
      - "реферат"
      - "тези"
      - "презентація"

vocabulary:
  required:
    - узагальнення
    - систематизація
    - норма
    - варіант
    - виняток
    - контекст
    - інтерпретація
    - аргумент
  recommended:
    - автентичність
    - уніфікація
    - кодифікація
    - рефлексія
    - синтез

activity_hints:
  - type: error-correction
    description: "Fix morphological, syntactic, and stylistic errors in a mixed-style
      text — including surzhyk forms, calques, and incorrect participial phrases."
  - type: comparative-study
    description: "Match linguistic terms from C1.1-C1.4 modules (парадигма, когерентність,
      предикативність) with correct definitions and example sentences."
  - type: critical-analysis
    description: "Analyze a student essay and provide structured feedback — identify
      3 strengths and 3 areas for improvement with specific textual evidence."
  - type: essay-response
    description: "Write a synthesis paragraph connecting language, identity, and culture
      using at least 5 complex sentence types studied in C1."
  - type: essay-response
    description: "Complete a review exercise with correct morphological forms — numeral
      declension, participial phrases, and complex punctuation."

activities:
  types_required:
    - error-correction
    - match-up
    - translate
    - critical-analysis
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §1-25 — Загальний огляд мовних норм"
  - "Авраменко, 11 клас (2019): Стилістична норма, культура мовлення"
  - "Заболотний, 11 клас (2019): с. 10-14 — Мовна норма та мовна культура"

connects_to:
  previous: "case-studies"
  next: "speaking-practice"
phase: C1.2 [Professional & Social Context]
