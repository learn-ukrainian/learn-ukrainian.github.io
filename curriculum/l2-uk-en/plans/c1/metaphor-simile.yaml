module: c1-036
level: C1
sequence: 36
slug: metaphor-simile
version: '2.0'
title: 'Метафора та порівняння: Образна мова'
subtitle: 'Metaphor & Simile: Figurative Language'
content_outline:
- section: Вступ — Образність та магія слова (Introduction — Figurative Language and
    Word Magic)
  words: 600
  points:
  - 'Роль образності в літературі та повсякденному мовленні: чому ми не можемо говорити
    лише фактами (C1 Standard ref §4.4.3)'
  - 'Аналіз вірша Ліни Костенко «Страшні слова, коли вони мовчать»: як уособлення
    («слова мовчать», «причаїлись») створює емоційну напругу'
  - Метафора vs порівняння — фундаментальна різниця між прямою ідентифікацією («Він
    — лев») та зіставленням («Він, як лев»)
- section: 'Порівняння: Граматика та Стилістика (Simile: Grammar & Stylistics)'
  words: 800
  points:
  - 'Синтаксичні засоби порівняння за Держстандартом (§4.4.4): конструкції «краще
    за мене», «холодний, як лід», «стрибає, мов м’яч»'
  - 'Маркери порівняння: функціональна різниця між логічним «як» та поетичними «мов,
    наче, ніби, немов» для створення нюансів'
  - 'Типова помилка: надмірне вживання «як» (Overuse of ''як'') — заміна його на стилістично
    багатші аналоги для поетичного забарвлення'
  - 'Контрастивний аналіз: чому не можна перекладати «it''s raining cats and dogs»
    дослівно (помилка калькування) — використання відповідника «ллє як з відра»'
- section: Глибина метафори — від слова до образу (Depth of Metaphor — From Word to
    Image)
  words: 900
  points:
  - 'Лексичні засоби метафоризації (§4.4.3): «тепла атмосфера», «сонце заходить» —
    як буденні слова стають художніми засобами'
  - 'Розгорнута метафора (Extended metaphor): побудова тривалого метафоричного наративу
    на основі одного центрального образу'
  - 'Григорій Сковорода та «сродність»: аналіз алегорії світу як фонтану — історичний
    корінь глибокого метафоричного мислення в українській культурі'
- section: Персоніфікація та Уособлення (Personification and Embodiment)
  words: 700
  points:
  - 'Персоніфікація як засіб оживлення природи: «Сонце сміється», «степ дихає» — техніка
    створення динамічного художнього простору'
  - 'Уособлення (Embodiment) в абстрактних поняттях: надання людських якостей ідеям
    (доля, воля, слово)'
  - 'Практична вправа: перетворення нейтрального опису природи на образну картину
    за допомогою 5+ засобів персоніфікації'
- section: Творча практика та аналіз (Creative Practice and Analysis)
  words: 1000
  points:
  - 'Аналіз поетичних текстів Т. Шевченка та І. Франка: пошук та класифікація «постійних
    епітетів» та метафор'
  - 'Вправа на розрізнення: ідентифікація прямої метафори, розгорнутої метафори та
    порівняння в складних літературних контекстах'
  - 'Стилістичне редагування: заміна нейтральних речень на образні (наприклад, перетворення
    «Він боявся» на «Його серце стислося від крижаного подиху страху»)'
  - 'Продуктивне завдання: написання есе на тему «Мистецтво мовчання», використовуючи
    метафоричну спадщину Л. Костенко та Сковороди'
focus: style
pedagogy: Immersion
objectives:
- Distinguish between direct and extended metaphors
- Use simile markers correctly in context
- Identify and analyze personification in literary texts
grammar:
- Direct and extended metaphors
- Simile markers (як, мов, наче, ніби)
- Personification
phase: C1.4 Advanced Stylistics & Rhetoric
persona:
  voice: Senior Specialist
  role: Поет-символіст
word_target: 4000
vocabulary_hints:
  required:
  - метафора (metaphor) — влучна метафора, розгорнута метафора, мислити метафорами;
    High frequency in academic/literary discourse
  - порівняння (simile/comparison) — яскраве порівняння, за допомогою порівняння,
    ступені порівняння; High frequency general vocabulary
  - уособлення (personification) — художнє уособлення, прийом уособлення; Medium frequency
    literary term
  - образність (figurative nature) — багатство образності, образність мови; Essential
    for stylistic analysis
  - епітет (epithet) — постійний епітет, народнопоетичний епітет; Traditional literary
    terminology
  recommended:
  - персоніфікація (personification) — Synonym for 'уособлення', often used in technical
    literary criticism
  - алегорія (allegory) — Specific to extended metaphorical narratives (like Skovoroda's
    fables)
  - 'калькування (calquing) — Note: used to describe the error of literal translation
    of metaphors from English'
  - мов (as if/like) — Poetic marker of simile, alternative to 'як'
  - наче (as if/like) — Marker of simile implying uncertainty or poetic comparison
