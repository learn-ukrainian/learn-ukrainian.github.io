module: c1-064
level: C1
sequence: 64
slug: metaphor-simile
version: '1.1'
title: "Метафора та порівняння: когнітивний та стилістичний аспекти"
subtitle: "Метафора і порівняння: когнітивний і стилістичний аспекти"
focus: literature
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити механізми метафоризації як засобу пізнання світу в українській мові."
  - "Диференціювати художнє порівняння та метафору за структурою та функцією."
  - "Аналізувати індивідуально-авторські метафори у творах українських модерністів."
  - "Застосовувати метафоричні моделі у професійному дискурсі (бізнес-метафори, політичні
    метафори)."

reading_situations:
  - source_type: "літературознавча стаття"
    topic: "Метафоричний світ Богдана-Ігоря Антонича: синтез природи та космосу."
    key_elements: ["персоніфікація", "метафора-епітет", "асоціативне поле"]
    motivation: "Глибоке занурення у складні метафоричні системи української поезії."
  - source_type: "аналітичний огляд"
    topic: "Метафоричне моделювання політичного дискурсу в сучасних українських ЗМІ."
    key_elements: ["метафора війни", "спортивна метафора", "фрейм"]
    motivation: "Вивчення маніпулятивного та концептуального потенціалу метафори в
      публіцистиці."

listening_situations:
  - media_type: "подкаст"
    setting: "Бесіда філологів про 'теорію концептуальної метафори' Лакоффа і Джонсона
      на українському грунті."
    focus_points: ["когнітивна база метафори", "культурні коди", "приклади з повсякдення"]
    motivation: "Розуміння метафори не як прикраси, а як способу мислення."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть порівняльний аналіз метафорики двох українських авторів (на
      вибір), використовуючи термінологію когнітивної лінгвістики."
    requirements: ["мінімум 350 слів", "використання понять 'донорська зона', 'реципієнтна
          зона'", "академічний стиль"]
    motivation: "Розвиток навичок наукового аналізу художніх засобів."
    model_answer: "Текст має демонструвати здатність автора виокремлювати ядерні та
      периферійні компоненти метафоричного перенесення."

discussion_topics:
  - context: "Чи може метафора бути доказом у науковому чи юридичному дискурсі?"
    questions:
      - "Де межа між науковою точністю та метафоричною образністю?"
      - "Як перекласти національно-марковану метафору без втрати змісту?"
      - "Чи збіднюється мова при відмові від метафор у діловому спілкуванні?"
    motivation: "Обговорення функціональних меж художніх засобів у різних стилях мовлення."

content_outline:
  - section: "Метафора як фундаментальна когнітивна категорія"
    words: 1000
    subsections:
      - "Теорія метафоричного перенесення: подібність та суміжність"
      - "Класифікація метафор: мовні, мовленнєві, індивідуальні"
      - "Метафора як інструмент концептуалізації дійсності"
    key_concepts:
      - "метафоризація"
      - "концептуальна метафора"
      - "когнітивна лінгвістика"
  - section: "Порівняння: від структури до художнього образу"
    words: 1000
    subsections:
      - "Граматичні форми вираження порівняння в українській мові"
      - "Розгорнуте порівняння та його роль у створенні епічного полотна"
      - "Заперечне порівняння як особливість українського фольклору"
    key_concepts:
      - "компаративістика"
      - "порівняльний зворот"
      - "образність"
  - section: "Стилістичні трансформації та суміжні явища"
    words: 1000
    subsections:
      - "Метонімія та синекдоха: відмінності від метафори"
      - "Персоніфікація та уособлення як види метафоричного бачення"
      - "Катахреза: 'мертва' метафора та її ревіталізація"
    key_concepts:
      - "метонімія"
      - "персоніфікація"
      - "фразеологізація"
  - section: "Метафора в професійному та публічному дискурсах"
    words: 1000
    subsections:
      - "Бізнес-метафорика: стратегія, конкуренція, ріст"
      - "Метафора в політичній риториці: інструмент впливу та маніпуляції"
      - "Наукова метафора як шлях до пояснення складних явищ"
    key_concepts:
      - "дискурс"
      - "прагматика"
      - "риторичний прийом"

vocabulary:
  required:
    - концептуалізація
    - перенесення
    - асоціація
    - образність
    - персоніфікація
    - суміжність
    - аналогія
    - втілення
  recommended:
    - експліцитність
    - імпліцитність
    - амбівалентність
    - парадигма
    - репрезентація

activity_hints:
  - type: critical-analysis
    description: "Analyze metaphorical systems in a poem by Богдан-Ігор Антонич —
      identify donor and recipient domains, classify metaphor types (мовна, мовленнєва,
      авторська)."
  - type: match-up
    description: "Match stylistic devices (метафора, метонімія, синекдоха, персоніфікація,
      катахреза) with their definitions and literary examples."
  - type: select
    description: "Identify the type of figurative language in excerpts from Ukrainian
      literature and media — distinguish metaphor from simile, metonymy, and personification."
  - type: essay-response
    description: "Write a comparative analysis (150-200 words) of metaphor use in
      two different registers — literary and political/business discourse."
  - type: mark-the-words
    description: "Identify all metaphors and similes in a literary passage, classifying
      each as розгорнуте порівняння, заперечне порівняння, or метафора-епітет."

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - select
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §38 — Лексичні засоби стилістики, тропи"
  - "Глазова, 11 клас (2019): §40 — Стилістичне забарвлення лексики"
  - "Авраменко, 11 клас (Укр. літ.): Літературознавчі терміни — тропи та фігури"

connects_to:
