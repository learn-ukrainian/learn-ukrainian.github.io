module: c1-099
level: C1
sequence: 99
slug: lesya-ukrainka-liryka
version: '2.0'
title: 'Леся Українка: Лірична поезія'
subtitle: Lesya Ukrainka's Lyric Poetry
content_outline:
- section: 'Вступ: Леся Українка як модерністка (Introduction: Lesya Ukrainka as a
    Modernist)'
  words: 600
  points:
  - 'Еволюція творчості: перехід від етнографічного реалізму до європейського інтелектуалізму
    та неоромантизму.'
  - 'Культурний гачок: вплив дитинства в Колодяжному (Волинь і Полісся) на формування
    унікальної міфопоетики та пейзажних образів.'
- section: 'Маніфест незламності: Contra Spem Spero (Manifesto of Resilience)'
  words: 1000
  points:
  - 'Глибокий аналіз «Contra Spem Spero!»: написання твору в 19 років як життєвого
    кредо під час загострення хвороби.'
  - 'Learner error check: Тон вірша — це не скарга, а маніфест вітальності та стоїчної
    витримки; тренування правильної інтонації риторичних запитань (§4.4.4 Стандарту).'
  - 'Стилістична компетенція (§4.4.6): використання складних метафор для передачі
    духу прометеїзму та незламності ліричного героя.'
- section: 'Музикальність та цикли: Сім струн (Musicality and Cycles)'
  words: 800
  points:
  - 'Цикл «Сім струн»: музикальність українського слова крізь назви нот (Do, Re, Mi...)
    та зв''язок із Михайлом Драгомановим.'
  - 'Патріотичні мотиви в циклах «Невільничі пісні»: роль митця як пророка та борця
    за свободу.'
- section: Філософські та феміністичні візії (Philosophical and Feminist Visions)
  words: 800
  points:
  - 'Прометеївський вогонь у ліриці: аналіз образу слова як «твердої криці» у боротьбі
    за національне та особисте визволення.'
  - 'Жіноча суб''єктність: феміністичний дискурс у поезії Лесі Українки крізь призму
    образу сильної жінки та боротьби зі стереотипами.'
- section: 'Підсумок: Поетична спадщина та неоромантизм (Summary: Poetic Legacy and
    Neo-romanticism)'
  words: 800
  points:
  - 'Жанрова чистота: усунення плутанини між ліричною поезією та драматичними творами;
    підбиття підсумків неоромантичного синтезу.'
  - 'Творче завдання: Написання есе про стоїцизм як інструмент деколонізації мислення
    та формування сучасної української ідентичності.'
focus: literature
pedagogy: Literary Analysis
objectives:
- Learner can analyze the philosophy of stoicism in "Contra Spem Spero".
- Learner can interpret the patriotic and feminist motifs in Lesya Ukrainka’s lyric
  cycles.
- Learner can discuss the role of nature and the artist in Lesya Ukrainka’s poetry.
grammar:
- Rhetorical questions
- Complex metaphors
phase: C1.6 Literature
persona:
  voice: Senior Specialist
  role: Дослідниця листів
word_target: 4000
vocabulary_hints:
  required:
  - Стоїцизм (stoicism) — філософія стоїцизму, стоїчна витримка; життєва позиція незламності
    та внутрішньої сили.
  - Неоромантизм (neo-romanticism) — український неоромантизм, представник неоромантизму;
    ключовий модерністський напрям.
  - Прометеїзм (prometheism) — мотиви прометеїзму, прометеївський вогонь; символ жертовної
    боротьби за свободу.
  - Ліричний герой (lyrical hero) — образ ліричного героя, позиція ліричного героя;
    суб'єкт переживань у поезії.
  - Кредо (credo) — життєве кредо, мистецьке кредо; чітко сформульовані принципи та
    переконання.
  recommended:
  - Вітальність (vitality) — дух вітальності; життєствердна енергія твору.
  - Міфопоетика (mythopoetics) — поліська міфопоетика; поєднання міфологічних елементів
    із поетичним текстом.
  - Метафорика (metaphorics) — складна метафорика; система метафор у стилістиці автора.
