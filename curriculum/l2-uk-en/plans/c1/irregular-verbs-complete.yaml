module: c1-017
level: C1
sequence: 17
slug: irregular-verbs-complete
version: '1.1'
title: "Складна дієслівна парадигма та нетипові форми"
subtitle: "Складна парадигма дієслова та нестандартні форми"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Вивчити особливості відмінювання дієслів з нетиповим чергуванням основ (їсти,
    дати, бути, іти)."
  - "Опанувати складні випадки творення наказового та умовного способів."
  - "Вивчити стилістичне використання застарілих та рідковживаних дієслівних форм."
  - "Навчитися правильно вживати безособові форми на -но, -то в офіційно-діловому
    та науковому стилях."

reading_situations:
  - source_type: "художній уривок"
    topic: "Архаїзми та діалектизми у прозі Василя Стефаника: аналіз дієслівних форм."
    key_elements: ["діалектне дієслово", "архаїчна форма", "експресивність"]
    motivation: "Дослідження нетипових дієслівних форм у художньому тексті для підсилення
      емоційного впливу."
  - source_type: "офіційний документ"
    topic: "Укази гетьманів України XVII століття: мовний аналіз дієслівних конструкцій."
    key_elements: ["безособові форми", "наказовий спосіб", "староукраїнська мова"]
    motivation: "Вивчення еволюції дієслівних форм в офіційно-діловому стилі."

listening_situations:
  - media_type: "аудіо"
    setting: "Запис радіовистави за мотивами драми Лесі Українки: аналіз високого
      стилю мовлення."
    focus_points: ["вживання рідковживаних дієслів", "інтонаційне вираження способу
          дієслова", "чергування в основах"]
    motivation: "Розпізнавання складних морфологічних форм у живому мовленні."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть коротку розповідь (150-200 слів) про подорож у часі, використовуючи
      якомога більше дієслів з нетиповим відмінюванням (їсти, відповісти, бігти, хотіти)."
    requirements: ["використання щонайменше 5 різних 'неправильних' дієслів", "правильне
          творення форм наказового способу"]
    motivation: "Закріплення навичок вживання складних дієслівних парадигм у творчому
      контексті."
    model_answer: "Текст має демонструвати правильні форми типу 'даси', 'їжте', 'хочуть',
      'розповіси'."

content_outline:
  - section: "Дієслова з нетиповою парадигмою відмінювання"
    words: 1000
    subsections:
      - "Особливості відмінювання дієслів 'дати', 'їсти', 'вісти' та їхніх похідних"
      - "Чергування приголосних та голосних в основах теперішнього часу"
      - "Дієслова 'бути' та 'іти': історичний корінь та сучасні форми"
    key_concepts:
      - "архаїчне відмінювання"
      - "тематичний голосний"
      - "чергування"
  - section: "Складні випадки творення способів дієслова"
    words: 1000
    subsections:
      - "Наказовий спосіб: варіантні форми та стилістичні нюанси"
      - "Умовний спосіб: частка 'би/б' та її місце в реченні"
      - "Вираження спонукання через форми теперішнього та майбутнього часу"
    key_concepts:
      - "імператив"
      - "кон'юнктив"
      - "модальність"
  - section: "Безособові дієслівні форми та їх функціонування"
    words: 1000
    subsections:
      - "Форми на -но, -то в офіційно-діловому та науковому стилях"
      - "Відмінність між пасивними дієприкметниками та безособовими формами"
      - "Специфіка вживання безособових дієслів на -ся (смеркається, не спиться)"
    key_concepts:
      - "безособовість"
      - "пасивний стан"
      - "номіналізація дії"
  - section: "Стилістичне використання дієслівних форм"
    words: 1000
    subsections:
      - "Інфінітивні конструкції в науковому та юридичному дискурсах"
      - "Рідковживані форми минулого часу (давноминулий час) у літературі"
      - "Дієприкметникові та дієприслівникові звороти як засіб лаконічності"
    key_concepts:
      - "інфінітив"
      - "плюсквамперфект"
      - "дієприслівник"

vocabulary:
  required:
    - відмінювання
    - парадигма
    - чергування
    - інфінітив
    - спосіб
    - безособовий
    - архаїчний
    - похідний
  recommended:
    - варіативність
    - трансформація
    - стилістичний
    - контекстуальний
    - морфологія

activity_hints:
  - type: fill-in
    description: "Complete sentences with correct forms of irregular verbs (дати→даси,
      їсти→їжте, бути→буде) in various tenses and moods."
  - type: match-up
    description: "Match irregular verb infinitives with their conjugation patterns
      and identify the type of stem alternation."
  - type: error-correction
    description: "Fix incorrect conjugation forms of irregular verbs in academic and
      literary contexts."
  - type: select
    description: "Choose the correct imperative form for irregular verbs in different
      registers (formal, informal, inclusive)."
  - type: critical-analysis
    description: "Analyze verb forms in excerpts from Stefanyk and Lesya Ukrainka
      — identify archaic, dialectal, and stylistically marked forms."

activities:
  types_required:
    - fill-in
    - match-up
    - error-correction
    - translate
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §71-74 — Дієслово"
  - "Глазова, 11 клас (2019): §17-20 — Морфологічна стилістика"
  - "Авраменко, 11 клас (2019): §15-20 — Морфологічна норма"

connects_to:
  previous: "advanced-punctuation"
  next: "essay-writing-practice"
phase: C1.1 [Academic Foundation]
