module: c1-002
level: C1
sequence: 2
slug: academic-style-markers
version: '2.0'
title: Маркери академічного стилю
content_outline:
- section: Вступ — Що таке академічний стиль? (Introduction — What is Academic Style?)
  words: 450
  points:
  - 'Визначення наукового стилю згідно з ДСТУ §4.4.1.1 та його ключові характеристики:
    точність, логічність, об''єктивність.'
  - Сфери використання та відмінності від офіційно-ділового та розмовного стилів.
  - 'Культурний гачок: Агатангел Кримський як взірець академічного мовлення та його
    внесок у формування наукової мови.'
- section: Безособовість та об'єктивність (Impersonality and Objectivity)
  words: 700
  points:
  - 'Типові безособові конструкції (ДСТУ §4.3.3.1): «Вважається, що...», «Зазначається,
    що...», «Було встановлено...».'
  - 'Уникнення надмірного вживання займенника «Я» (Learner Error: «Я думаю...» vs
    «На нашу думку» або безособова форма).'
  - 'Уникнення калькування англійських структур: позбавлення від зайвої дієслова-зв''язки
    «є» («Це важливо» замість «Це є важливим»).'
- section: Номіналізація та термінотворення (Nominalization and Term Formation)
  words: 750
  points:
  - 'Процес номіналізації згідно з ДСТУ §4.2.4: перетворення дієслів на іменники за
    допомогою суфіксів -нн-, -енн-, -інн- (публікувати — публікування).'
  - 'Аналіз переваг номіналізації для стислості тексту: «дослідження» vs «досліджувати»,
    «аналіз» vs «аналізувати».'
  - Києво-Могилянська академія як історичний центр формування ранньої української
    наукової термінології.
- section: Пасивні конструкції та дієслівні форми (Passive Constructions and Verbal
    Forms)
  words: 650
  points:
  - 'Використання пасивних конструкцій на -но, -то: «встановлено», «доведено», «з''ясовано»,
    «зазначено», «констатовано».'
  - Баланс між активним та пасивним станом для підтримки динаміки наукового тексту.
  - 'Типові колокації: «експериментально доведено», «в ході дослідження встановлено».'
- section: Структурування тексту та зв'язки (Text Structuring and Connectors)
  words: 700
  points:
  - 'Логічна організація за допомогою формальних сполучників (ДСТУ §4.4.4): «отже»,
    «таким чином», «внаслідок», «водночас».'
  - 'Вставні слова для переліку та узагальнення: «по-перше», «по-друге», «нарешті».'
  - 'Виправлення розмовних вставних слів: перехід від «коротше кажучи» до «узагальнюючи»
    та від «до речі» до «принагідно зауважимо».'
- section: Хеджінг — академічна обережність (Hedging — Academic Caution)
  words: 750
  points:
  - 'Концепція хеджінгу як засобу пом''якшення категоричності: «можливо», «ймовірно»,
    «певною мірою».'
  - 'Модальні конструкції: «є підстави вважати», «можна припустити», «як видається».'
  - 'Практика трансформації: перетворення категоричних тверджень на гіпотетичні академічні
    висновки.'
vocabulary_hints:
  required:
  - безособова конструкція (impersonal construction) — основа об'єктивності наукового
    тексту
  - номіналізація (nominalization) — процес утворення іменників від дієслів згідно
    з ДСТУ
  - хеджінг (hedging) — інструмент висловлення академічної обережності та припущення
  - категоричність (categoricalness) — властивість, якої слід уникати в наукових дискусіях
  - формальний сполучник (formal connector) — засіб логічного зв'язку частин тексту
  - 'встановлено (established) — High Frequency; колокація: «було встановлено»'
  - з'ясовано (clarified) — вживається для опису результатів аналізу
  - 'доведено (proven) — High Frequency; колокації: «наукою доведено», «переконливо
    доведено»'
  - зазначено (noted) — стандартний маркер посилання на джерело або факт
  - констатовано (stated) — офіційний маркер фіксації стану чи явища
  recommended:
  - об'єктивність (objectivity) — ключова вимога до наукового стилю
  - неупередженість (impartiality) — відсутність суб'єктивного впливу в дослідженні
  - аргументованість (argumentativeness) — наявність логічних доказів
  - логічність (logicality) — послідовність викладу думок
  - послідовність (consistency) — впорядкованість структури тексту
  - 'водночас (simultaneously/at the same time) — Medium Frequency; колокація: «водночас
    слід зазначити»'
  - 'отже (therefore/consequently) — High Frequency; колокація: «отже, можна зробити
    висновок»'
