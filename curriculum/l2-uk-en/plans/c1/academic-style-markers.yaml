module: c1-002
level: C1
sequence: 2
slug: academic-style-markers
version: '1.1'
title: "Маркери академічного стилю та науковий дискурс"
subtitle: "Маркери академічного стилю та науковий дискурс"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Диференціювати мовні засоби нейтрального та академічного стилів."
  - "Опанувати процеси номіналізації як інструмент наукової лаконічності та об'єктивності."
  - "Навчитися використовувати складні терміносполуки для опису наукових феноменів."
  - "Розуміти роль авторської позиції у науковому тексті через використання специфічних
    маркерів."

reading_situations:
  - source_type: "фрагмент дисертації"
    topic: "Вплив філософії Григорія Сковороди на формування сучасного українського
      кордоцентризму."
    key_elements: ["теоретична база", "термінологічна парадигма", "номіналізовані
          структури"]
    motivation: "Вивчення прикладів високого академічного стилю з опорою на класичну
      українську філософію."
  - source_type: "науковий огляд"
    topic: "Еволюція мовної норми в українській лексикографії XX-XXI століть."
    key_elements: ["експліцитність", "об'єктивність", "дискурсивні слова"]
    motivation: "Аналіз мовних засобів, що забезпечують точність та неупередженість
      наукового викладу."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть звіт про наукову конференцію (200-250 слів), використовуючи
      виключно академічну лексику та конструкції. Тема конференції: 'Україна в європейському
      культурному просторі'."
    requirements: ["використання відіменних прикметників", "номіналізація дієслівних
          понять", "відсутність емоційно-забарвленої лексики"]
    motivation: "Відпрацювання трансформації інформації з офіційного в суто академічний
      формат."
    model_answer: "Текст має демонструвати вміння оперувати поняттями 'інтеграція',
      'детермінація', 'ретроспектива' та уникати суб'єктивних оцінок."

discussion_topics:
  - context: "Проблема 'канцеляриту' та надмірної складності наукової мови в українському
      гуманітарному просторі."
    questions:
      - "Де проходить межа між академічною точністю та незрозумілістю?"
      - "Як номіналізація впливає на сприйняття тексту читачем?"
      - "Чи варто популяризувати науку через спрощення мовного стандарту?"
    motivation: "Обговорення функціональних меж наукового стилю та його взаємодії
      з публіцистикою."

content_outline:
  - section: "Феноменологія академічного слова"
    words: 1000
    subsections:
      - "Лексичні маркери науковості: терміни, дефініції, професіоналізми"
      - "Абстрактна лексика як фундамент академічного дискурсу"
      - "Запозичення vs питома лексика в сучасній українській науці"
    key_concepts:
      - "детермінологізація"
      - "когнітивний концепт"
      - "лексичний реєстр"
  - section: "Граматика об'єктивності: Номіналізація"
    words: 1000
    subsections:
      - "Трансформація дієслівних конструкцій у віддієслівні іменники"
      - "Переваги та ризики номіналізації: лаконічність vs статичність"
      - "Складні випадки керування при віддієслівних іменниках"
    key_concepts:
      - "номіналізація"
      - "семантична конденсація"
      - "субстантивація"
  - section: "Синтаксис наукового викладу"
    words: 1000
    subsections:
      - "Безособовість та узагальненість як ознаки об'єктивності"
      - "Роль пасивних конструкцій у зміщенні фокусу з суб'єкта на процес"
      - "Логічна архітектоніка речення: від тези до аргументу"
    key_concepts:
      - "безособовість"
      - "пасивний стан"
      - "логічний наголос"
  - section: "Стилістичні маркери та авторська модальність"
    words: 1000
    subsections:
      - "Вираження впевненості та сумніву: модальні слова в науці"
      - "Етикетні формули наукової дискусії"
      - "Цитування як маркер академічної легітимності"
    key_concepts:
      - "епістемічна модальність"
      - "академічний етикет"
      - "верифікація"

vocabulary:
  required:
    - об'єктивність
    - аргументація
    - методологія
    - понятійний
    - закономірність
    - системність
    - фактор
    - аспект
  recommended:
    - доцільність
    - обґрунтування
    - специфікація
    - концептуалізація
    - адекватність

activity_hints:
  - type: critical-analysis
    description: "Analyze a fragment of a Ukrainian dissertation — identify nominalization
      patterns, impersonal constructions, and evaluate objectivity markers."
  - type: error-correction
    description: "Rewrite colloquial/journalistic sentences into proper academic register,
      fixing non-academic vocabulary and emotional markers."
  - type: match-up
    description: "Match academic style markers (номіналізація, безособовість, термін)
      with examples from scientific Ukrainian texts."
  - type: select
    description: "Choose the most appropriate academic formulation from multiple options
      for expressing the same idea."
  - type: fill-in
    description: "Complete academic sentences with nominalized verb forms and appropriate
      terminological collocations."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - select
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Ворон, 11 клас (2019): с. 218 — Науковий стиль мовлення"
  - "Глазова, 11 клас (2019): §45 — Синтаксичні одиниці в різних стилях"
  - "Авраменко, 11 клас (2019): Стилістична норма, с. 164"

connects_to:
  previous: "b2-review-bridge"
  next: "research-verbs"
phase: C1.1 [Academic Foundation]
