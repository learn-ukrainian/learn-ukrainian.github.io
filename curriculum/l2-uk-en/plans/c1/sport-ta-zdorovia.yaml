module: c1-031
level: C1
sequence: 31
slug: sport-ta-zdorovia
version: '1.0'
title: "Спорт, здоров'я та людське тіло"
subtitle: "Спорт, здоров'я, фізична культура"
focus: thematic
pedagogy: TTT
word_target: 4000
objectives:
  - "Опанувати розширену лексику спорту, фізичної культури та здорового способу
    життя на рівні C1."
  - "Вивчити медичну та анатомічну термінологію для опису людського тіла, травм
    та реабілітації."
  - "Навчитися обговорювати етичні проблеми спорту (допінг, комерціалізація)
    та сучасні тенденції фітнесу."
  - "Розвинути навички аргументації у дискусіях про роль спорту в суспільстві."

reading_situations:
  - source_type: "публіцистична стаття"
    topic: "Український спорт на міжнародній арені: від Бубки до Магучіх."
    key_elements: ["досягнення", "змагання", "олімпійський рух", "рекорд"]
    motivation: "Вивчення спортивної лексики та публіцистичного стилю."
  - source_type: "науково-популярний текст"
    topic: "Фізична активність та ментальне здоров'я: що говорить наука?"
    key_elements: ["профілактика", "реабілітація", "стрес", "ендорфіни"]
    motivation: "Поєднання спортивної та медичної термінології."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Інтерв'ю з українським тренером про підготовку спортсменів в умовах
      війни."
    focus_points: ["мотивація", "режим тренувань", "психологічна стійкість"]
    motivation: "Сприйняття розмовного стилю зі спортивною термінологією."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть аналітичне есе 'Спорт — це здоров'я чи бізнес?' (250-300 слів),
      аналізуючи комерціалізацію спорту та її вплив на здоров'я спортсменів."
    requirements: ["збалансована аргументація", "спортивна та медична лексика",
      "приклади з українського спорту"]
    motivation: "Відпрацювання аналітичного стилю у спортивній тематиці."
    model_answer: "Текст має містити тезу, антитезу та синтез із конкретними прикладами."

discussion_topics:
  - context: "Спорт в Україні під час війни: розкіш чи необхідність?"
    questions:
      - "Чи повинні українські спортсмени змагатися з росіянами на міжнародних
        аренах?"
      - "Як фізична активність допомагає у реабілітації ветеранів?"
    motivation: "Обговорення актуальних етичних та соціальних питань спорту."

content_outline:
  - section: "Спортивний лексикон рівня C1"
    words: 1000
    subsections:
      - "Види спорту та дисципліни: від легкої атлетики до єдиноборств"
      - "Змагання, турніри, кваліфікація: структура спортивного світу"
      - "Спортивна інфраструктура: стадіон, манеж, басейн, корт"
    key_concepts:
      - "змагання"
      - "дисципліна"
      - "тренування"
  - section: "Людське тіло та фізична культура"
    words: 1000
    subsections:
      - "Анатомічна лексика: частини тіла, м'язи, суглоби, органи"
      - "Фізичне навантаження: витривалість, гнучкість, координація"
      - "Загартування, режим дня, збалансоване харчування"
    key_concepts:
      - "витривалість"
      - "загартування"
      - "харчування"
  - section: "Здоров'я та медицина спорту"
    words: 1000
    subsections:
      - "Спортивні травми: розтягнення, перелом, вивих, забій"
      - "Реабілітація та відновлення: фізіотерапія, масаж, ЛФК"
      - "Профілактика захворювань через фізичну активність"
    key_concepts:
      - "реабілітація"
      - "профілактика"
      - "травма"
  - section: "Спорт і суспільство"
    words: 1000
    subsections:
      - "Олімпійський рух та Україна: історія та сучасність"
      - "Допінг, фейр-плей та етика спорту"
      - "Спорт як інструмент м'якої сили та національної ідентичності"
    key_concepts:
      - "олімпійський"
      - "етика"
      - "ідентичність"

vocabulary:
  required:
    - змагання
    - тренування
    - витривалість
    - реабілітація
    - профілактика
    - загартування
    - харчування
    - травма
  recommended:
    - суглоб
    - гнучкість
    - кваліфікація
    - допінг
    - фізіотерапія

activity_hints:
  - type: comparative-study
    description: "Match sports terminology (types of competitions, training methods,
      body parts, injuries) with definitions and example contexts."
  - type: essay-response
    description: "Complete sentences about sports, health, and fitness with appropriate
      C1-level vocabulary — anatomical terms, training concepts, medical procedures."
  - type: select
    description: "Choose the correct Ukrainian sports term over anglicisms where native
      equivalents exist (e.g., вболівальник vs фанат)."
  - type: critical-analysis
    description: "Analyze a journalistic article about Ukrainian athletes — evaluate
      the use of sports terminology, argumentative structure, and register."
  - type: error-correction
    description: "Fix anglicisms, Russianisms, and stylistic errors in a sports
      commentary text."

activities:
  types_required:
    - match-up
    - fill-in
    - select
    - critical-analysis
    - error-correction
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §1-5 — Культура мовлення: тематична лексика"
  - "Авраменко, 11 клас (2019): Публіцистичний стиль — спортивна тематика"
  - "State Standard 2024: C1 — тематичне поле 'спорт і людина'"

connects_to:
