  - гнучкість
  - кваліфікація
  - допінг
  - фізіотерапія
activity_hints:
- type: reading
  focus: Прочитайте текст про спортивний лексикон рівня c1 і дайте відповіді на 
    запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про людське тіло та фізична 
    культура, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Спортивний 
    лексикон рівня C1». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    спортивний лексикон рівня c1.
- type: comparative-study
  focus: 'Порівняйте різні підходи до спортивний лексикон рівня c1: Види спорту та
    дисципліни: від легкої атлетики до єдиноборств. Визначте спільне та відмінне.'
activities:
  types_required:
