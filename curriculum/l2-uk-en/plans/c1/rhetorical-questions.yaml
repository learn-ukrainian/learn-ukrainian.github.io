slug: rhetorical-questions
version: '2.0'
title: 'Риторичні питання: Мистецтво переконання'
subtitle: 'Rhetorical Questions: The Art of Persuasion'
content_outline:
- section: Вступ та теоретичне підґрунтя (Introduction and Theoretical Foundation)
  words: 600
  points:
  - 'Стандарт §4.4.4: Визначення риторичного запитання як засобу стилістичного синтаксису, де відповідь є очевидною або не
    очікується; огляд функцій наголосу та емоційного залучення.'
  - 'Аналіз природи ''питання без відповіді'': як риторичне питання трансформує твердження в емоційну тезу, що не потребує
    вербальної реакції, але спонукає до роздумів.'
- section: Культурний код та літературна спадщина (Cultural Code and Literary Heritage)
  words: 900
  points:
  - 'Аналіз назви роману Панаса Мирного «Хіба ревуть воли, як ясла повні?»: походження з Книги Йова (6:5), біблійний підтекст
    та роль цього питання як символу соціального протесту.'
  - 'Риторичні питання в поезії Тараса Шевченка: аналіз вірша «Чи ми ще зійдемося знову?» як інструмента національної мобілізації
    та вираження колективної долі.'
  - 'Трансформація літературних запитань у народні афоризми та прислів''я: як класична література формує мовний етикет та
    риторичний арсенал сучасної української мови.'
- section: Морфологічні та синтаксичні особливості (Morphological and Syntactic Features)
  words: 900
  points:
  - 'Семантична диференціація часток: вживання «Хіба» для вираження сумніву або прихованого заперечення проти «Невже» для
    вираження чистого здивування.'
  - 'Стилістичний потенціал архаїзмів: використання частки «Доколе» (Доколе нам терпіти?) як маркера патетичного, високого
    стилю для підсилення громадянського пафосу.'
  - 'Інтонаційний малюнок: відпрацювання специфічної спадної або рівної інтонації риторичного твердження, що відрізняє його
    від власне запитального речення з висхідним тоном.'
- section: Прагматика та стилістичне використання (Pragmatics and Stylistic Usage)
  words: 1000
  points:
  - 'Спектр прагматичних ефектів: використання риторичних запитань для створення іронії, вираження відчаю, сарказму або заклику
    до дії в публіцистичному дискурсі.'
  - 'Поняття діатриби: техніка ведення удаваного діалогу із самим собою або уявною аудиторією через систему послідовних риторичних
    запитань для посилення динаміки тексту.'
  - 'Регістри мовлення: доречність риторичних фігур у політичних промовах та есеїстиці проти суворих обмежень на їх використання
    в академічному та офіційно-діловому стилях.'
- section: Практичне застосування та корекція помилок (Practical Application and Error Correction)
  words: 600
  points:
  - 'Корекція типових помилок: розрізнення семантики «Невже ти не розумієш?» (здивування) та «Хіба ти не розумієш?» (ствердження
    очевидності — ''You should understand'').'
  - 'Практикум з трансформації: вправи на перетворення прямих декларативних тверджень у риторичні питання для підсилення аргументації
    в переконуючому письмі.'
  - 'Творче завдання: аналіз сучасної політичної промови на предмет функцій риторичних питань та написання власного параграфу-маніфесту
    з використанням 3+ риторичних фігур.'
focus: style
pedagogy: Immersion
objectives:
- Identify rhetorical questions in various registers
- Use rhetorical questions for emphasis and persuasion
- Distinguish between genuine and rhetorical questions
grammar:
- Rhetorical question markers (хіба, невже, чи ж)
- Questions as statements
- Intonation in rhetorical questions
phase: C1.5 [Stylistics & Rhetoric]
persona:
  voice: Senior Specialist
  role: Спічрайтер
word_target: 4000
vocabulary_hints:
  required:
  - хіба (is it really / unless) — Хіба це можливо? Хіба ж я знав? Виражає сумнів або приховане заперечення; висока частотність.
  - невже (is it possible / really) — Невже це правда? Невже ти не розумієш? Виражає сильне здивування або недовіру до факту.
  - доколе (how long / until when) — Доколе нам терпіти? Архаїчний маркер високого стилю; вживається для патетичного вираження
    обурення.
  - чи ж (isn't it so / is it truly) — Чи ж ми не єдині? Підсилена форма частки для акцентування риторичного наголосу.
  recommended:
  - діатриба (diatribe) — Стилістичний прийом, побудований на удаваному діалозі з уявним опонентом.
  - риторичне запитання (rhetorical question) — Синтаксична конструкція, що має форму питання, але за змістом є ствердженням.
  - пафос (pathos/passion) — Емоційне піднесення, що часто супроводжується використанням риторичних фігур у високому стилі.
  - переконуюче мовлення (persuasive speech) — Тип дискурсу, спрямований на зміну або формування думки аудиторії за допомогою
    риторичних засобів.
