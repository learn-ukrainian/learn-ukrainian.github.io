module: c1-057
level: C1
sequence: 57
slug: rhetorical-questions
version: '1.0'
title: "Риторичне питання та оклик: синтаксис переконання"
subtitle: "Rhetorical Question and Exclamation: The Syntax of Persuasion"
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити прагматичну функцію риторичних фігур у публічному мовленні та літературі."
  - "Аналізувати структурні особливості риторичних питань, окликів та звертань."
  - "Використовувати риторичні конструкції для посилення емоційного та логічного впливу на аудиторію."
  - "Відрізняти щиру патетику від маніпулятивної риторики в сучасному медіадискурсі."

reading_situations:
  - source_type: "політична промова"
    topic: "Звернення видатного діяча до народу в часи національних випробувань."
    key_elements: ["риторичне питання", "анафора", "градація"]
    motivation: "Вивчення класичних канонів української риторики."
  - source_type: "публіцистична стаття"
    topic: "Майбутнє штучного інтелекту: чи залишиться місце для людини?"
    key_elements: ["питально-відповідна форма", "інтонація сумніву", "діалогізація мовлення"]
    motivation: "Аналіз сучасних методів залучення читача до дискусії через риторичні засоби."

listening_situations:
  - media_type: "відео"
    setting: "Виступ на конференції TEDxUA про роль критичного мислення в епоху постправди."
    focus_points: ["використання пауз", "риторичні оклики як маркери важливих тез", "контакт з аудиторією"]
    motivation: "Аналіз живої ораторської майстерності та її синтаксичного інструментарію."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть маніфест (300-400 слів) на захист української культури, активно використовуючи риторичні питання та оклики для створення високого стилю."
    requirements: ["мінімум 5 риторичних питань", "логічна завершеність кожної тези", "емоційна насиченість"]
    motivation: "Відпрацювання навичок переконливого письма."
    model_answer: "Текст має бути пристрасним, але логічно вибудованим, де кожне риторичне питання слугує містком до наступного вагомого аргументу."

discussion_topics:
  - context: "Чи не знецінилися риторичні фігури через їх надмірне використання в рекламі та соцмережах?"
    questions:
      - "Чому риторичне питання не потребує відповіді, але змушує про неї думати?"
      - "У яких професійних ситуаціях риторичний оклик може бути недоречним?"
      - "Як риторика допомагає маніпулювати емоціями під час виборчих кампаній?"
    motivation: "Дискусія про етику та ефективність ораторського мистецтва."

content_outline:
  - section: "Риторичне питання: семантична інверсія"
    words: 1000
    subsections:
      - "Граматична природа риторичного питання: від форми до змісту"
      - "Класифікація риторичних питань за інтенцією: ствердження, заперечення, сумнів"
      - "Роль риторичного питання у створенні ефекту діалогу з читачем"
    key_concepts:
      - "риторична фігура"
      - "ствердження через питання"
      - "діалогічність"
  - section: "Риторичний оклик та звертання: модальність почуттів"
    words: 1000
    subsections:
      - "Синтаксис емоційної напруги: від вигуку до розгорнутого окличного речення"
      - "Риторичне звертання до абстрактних понять, неживих предметів та відсутніх осіб"
      - "Пунктуаційне оформлення експресивного синтаксису"
    key_concepts:
      - "риторичний оклик"
      - "апострофа (фігура звертання)"
      - "експресія"
  - section: "Риторика в українській інтелектуальній традиції"
    words: 1000
    subsections:
      - "Барокова проповідь як джерело української риторичної майстерності"
      - "Риторичний арсенал Т. Шевченка, І. Франка, Лесі Українки"
      - "Специфіка національного ораторського стилю: щирість vs патетика"
    key_concepts:
      - "ораторство"
      - "патетика"
      - "дискурсивна стратегія"
  - section: "Прагматика риторичних фігур у сучасному світі"
    words: 1000
    subsections:
      - "Риторика в бізнес-презентаціях та пітчингах"
      - "Маніпулятивні техніки в заголовках медіа: 'Хто, як не ми?'"
      - "Деконструкція риторичного впливу: як не піддатися магії слів"
    key_concepts:
      - "пітчинг"
      - "деконструкція"
      - "критичне сприйняття"

vocabulary:
  required:
    - переконання
    - риторика
    - маніфест
    - маніпуляція
    - діалогізація
    - патетика
    - акцентування
    - звернення
  recommended:
    - ораторство
    - красномовство
    - імпульсивність
    - аргументація
    - легітимізація

