module: c1-012
level: C1
sequence: 12
slug: research-article
version: '1.0'
title: "Наукова стаття: структура та мова"
subtitle: "Research Article: Structure and Language"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Вивчити композиційні елементи наукової статті (IMRAD: вступ, методи, результати, обговорення)."
  - "Опанувати лексичні маркери різних розділів статті."
  - "Навчитися формулювати наукову новизну та практичне значення дослідження."
  - "Розвинути навички вживання термінологічної лексики в контексті українського наукового дискурсу."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Вплив цифрових технологій на збереження української діалектної спадщини."
    key_elements: ["методологія дослідження", "статистичні дані", "вибірка", "наукова гіпотеза"]
    motivation: "Ознайомлення зі стандартною структурою та формальною мовою сучасного наукового дослідження."
  - source_type: "рецензія"
    topic: "Аналіз монографії з історії українського права середньовічної доби."
    key_elements: ["аргументація", "джерельна база", "критичний погляд"]
    motivation: "Вивчення способів оцінки наукового доробку та використання фахової термінології."

listening_situations:
  - media_type: "лекція"
    setting: "Відкрита лекція професора про академічне письмо та етику публікацій в Україні."
    focus_points: ["структура статті", "критерії якості наукового тексту", "процес рецензування"]
    motivation: "Сприйняття на слух складних інструкцій щодо підготовки наукових матеріалів."

discussion_topics:
  - context: "Чи повинна українська наука повністю перейти на англійську мову для публікацій, щоб стати частиною глобального дискурсу?"
    questions: ["Які переваги та ризики мовної уніфікації в науці?", "Як зберегти українську наукову термінологію?", "Яка роль національної мови у гуманітарних дослідженнях?"]
    motivation: "Обговорення актуальних проблем академічної спільноти з використанням відповідної лексики."

content_outline:
  - section: "Композиція наукової статті"
    words: 1000
    subsections:
      - "Заголовок, анотація та ключові слова: як привернути увагу читача"
      - "Вступ та огляд літератури: окреслення контексту"
      - "Опис методів та результатів: точність та об'єктивність"
    key_concepts:
      - "структура IMRAD"
      - "актуальність теми"
      - "науковий апарат"
  - section: "Мовні особливості академічного стилю"
    words: 1000
    subsections:
      - "Безособовість та об'єктивність як визначальні риси"
      - "Використання дієслівних форм для опису процесу дослідження"
      - "Логічні переходи між розділами статті"
    key_concepts:
      - "безособові конструкції"
      - "термінологічна точність"
      - "дискурсивні маркери"
  - section: "Аргументація та представлення результатів"
    words: 1000
    subsections:
      - "Формулювання висновків та пропозицій"
      - "Оформлення графічного матеріалу та посилання на нього в тексті"
      - "Дискусія: інтерпретація отриманих даних"
    key_concepts:
      - "верифікація гіпотез"
      - "кореляція"
      - "релевантність"
  - section: "Етика та стандарти наукового письма"
    words: 1000
    subsections:
      - "Академічна доброчесність та запобігання плагіату"
      - "Оформлення списку використаних джерел за стандартами ДСТУ та APA"
      - "Культура наукової полеміки в письмовій формі"
    key_concepts:
      - "бібліографічний опис"
      - "цитування"
      - "авторське право"

