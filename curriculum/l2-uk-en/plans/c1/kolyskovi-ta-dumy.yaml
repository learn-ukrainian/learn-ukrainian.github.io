module: c1-070
level: C1
sequence: 70
slug: kolyskovi-ta-dumy
version: '2.0'
title: 'Колискові та думи: Від колиски до вічності'
subtitle: 'Lullabies and Dumas: From Cradle to Eternity'
content_outline:
- section: 'Вступ: Від колиски до вічності (Introduction: From Cradle to Eternity)'
  words: 600
  points:
  - 'Порівняння двох полюсів народного життя: інтимного світу дитинства та героїчного світу козацтва'
  - 'Культурний зв''язок: вплив української колискової «Ой ходить сон коло вікон» на арію Джорджа Гершвіна «Summertime»'
  - Обговорення ролі фольклору як засобу передачі національних цінностей та ідентичності
- section: Колискові пісні — магія першого слова (Lullabies — Magic of the First Word)
  words: 900
  points:
  - 'Аналіз структури колискової: специфічний ритм, рефрени та заспокійлива інтонація'
  - 'Стилістичні засоби (§4.4.3): активне використання зменшувально-пестливих форм (кіточок, спатоньки) для створення атмосфери
    ніжності'
  - 'Традиційні образи: міфологічні Сон та Дрімота, коти та голуби як охоронці дитячого спокою'
  - 'Функції жанру: від гіпнотичного заспокоєння до першої мовної соціалізації дитини'
- section: Думи — жива пам'ять народу (Dumas — Living Memory of the People)
  words: 1000
  points:
  - 'Історія кобзарства: незрячі співці як «жива преса», що розносила звістки про повстання та напади'
  - 'Поетичний синтаксис (§4.4.4): використання паралелізмів та заперечних порівнянь (не ясний сокіл...)'
  - 'Аналіз епічної структури: зачин (заспів), розгортання сюжету та величальний фінал'
  - 'Приклади класичних дум: Маруся Богуславка як символ патріотизму та Козак Голота як зразок мужності'
- section: Лінгвістичні тонкощі та типові помилки (Linguistic Nuances and Common Errors)
  words: 700
  points:
  - 'Розрізнення паронімів: жанр «дума» (епос) vs. іменник «думка» (thought) — правильні контексти вживання'
  - 'Акцентологічний практикум: наголос у слові кобзАр (на останньому складі) та відпрацювання вимови'
  - 'Стилістичний регістр: виправлення помилки вживання офіційно-ділової лексики при описі фольклору (уникнення слів «функціонує»,
    «оптимізація»)'
  - 'Речитативний стиль виконання: особливості протяжної вимови та ритмічної організації тексту'
- section: Практика та синтез (Practice and Synthesis)
  words: 800
  points:
  - 'Аналітичне завдання: знайти епітети та метафори в тексті думи та порівняти їх із образами колискової'
  - 'Творча стилізація: написання власної колискової або фрагмента думи з дотриманням жанрових канонів'
  - Дискусія про сучасне переосмислення кобзарської традиції та роль народної пісні в деколонізації культури
  - 'Підсумок: як фольклорні жанри формують наративні історичні регістри сучасної мови'
focus: history
pedagogy: CBI
objectives:
- Understand the role of lullabies in early linguistic development and enculturation
- Analyze the structure and historical significance of Ukrainian Dumas
- Compare the intimate register of lullabies with the epic register of dumas
grammar:
- Narrative historical registers
- Poetic syntax
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Кобзар
word_target: 4000
vocabulary_hints:
  required:
  - Колискова (lullaby) — співати колискову, мотив колискової; середня частотність, інтимний регістр
  - Дума (duma/epic song) — козацька дума, виконувати думу; жанрово-специфічне, не плутати з «думка»
  - Кобзар (kobzar/itinerant bard) — мандрівний співець, кобзарська традиція; висока символічність, наголос на -Ар
  - Речитатив (recitative) — протяжний речитатив, виконувати речитативом; низька частотність, музикознавчий термін
  - Епос (epic) — героїчний епос, народний епос; науковий стиль, літературознавча назва жанру
  recommended:
  - Зменшувально-пестливі форми (diminutives) — морфологічний засіб (§4.4.3) для вираження пестливості
  - Паралелізм (parallelism) — характерна синтаксична фігура (§4.4.4) українських дум
  - Бандура/Кобза (bandura/kobza) — традиційні музичні інструменти, супровід кобзарів
  - Зачин (opening) — початкова частина думи або казки
  - Стилізація (stylization) — імітація стилю певного жанру або автора
prerequisites:
- ritual-songs
connects_to:
- hopak-i-kozachok
