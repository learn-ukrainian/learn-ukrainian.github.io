activity_hints:
- type: reading
  focus: 'Прочитайте текст про світ колискової: антропологія ніжності і дайте відповіді
    на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про поетика та лінгвістика 
    'сонного' тексту, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Світ колискової: антропологія
    ніжності». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему світ
    колискової: антропологія ніжності.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до світ колискової: антропологія ніжності: Магічна
    функція присипляння: відвернення зла та прикликання долі. Визначте спільне та
    відмінне.'
