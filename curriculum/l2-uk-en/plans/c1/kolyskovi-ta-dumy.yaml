module: c1-092
level: C1
sequence: 92
slug: kolyskovi-ta-dumy
version: 1.1.2
title: 'Колискові та думи: від родинного кола до епічної величі'
subtitle: 'Колискові та думи: від родинного кола до епічної величі'
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
- Проаналізувати жанрову специфіку та психологічну роль колискових пісень в 
  українській культурі.
- Дослідити систему образів-символів у колисанках (Сон, Дрімота, Котик, птахи, 
  трави).
- Зіставити камерний світ колискової з монументальним світом народної думи як 
  формантами національного характеру.
- Вивчити лексико-стилістичні засоби творення 'соного' настрою (пестливі слова, 
  алітерація) та епічної урочистості.
reading_situations:
- source_type: психологічне дослідження
  topic: Вплив ритмомелодики української колискової на формування емоційного 
    інтелекту дитини.
  key_elements:
  - архетип матері
  - терапевтична функція
  - ритмічна повторюваність
  motivation: Вивчення науково-популярного стилю та психологічної термінології.
- source_type: літературно-критичний нарис
  topic: 'Жіночі образи в українському епосі: від плачу Ярославни до думи про Марусю
    Богуславку.'
  key_elements:
  - інтертекстуальність
  - генотип
  - історична тяглість
  motivation: Порівняльний аналіз жіночих архетипів у різних жанрах фольклору.
listening_situations:
- media_type: аудіо
  setting: 'Мистецький проект ''Колискові для дорослих'': сучасна інтерпретація архаїчних
    текстів.'
  focus_points:
  - використання автентичних інструментів
  - зміна темпоритму
  - емоційне навантаження
  motivation: Аналіз сучасних мистецьких експериментів з фольклорною основою.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Порівняйте дві моделі виховання в українській традиції: через лагідну колискову
    та через героїчну думу. Як вони доповнюють одна одну?'
  requirements:
  - мінімум 300 слів
  - вживання пестливих слів та епічних епітетів
  - логічний синтез ідей
  motivation: Розвиток навичок порівняльного аналізу та використання стилістично
    маркованої лексики.
  model_answer: Текст повинен розкривати колискову як простір безпеки та любові,
    а думу — як школу мужності та історичної пам'яті. Важливо згадати образи 
    'котика-воркотика' та 'козака-невтяги'.
content_outline:
- section: 'Світ колискової: антропологія ніжності'
  words: 1000
  subsections:
  - 'Магічна функція присипляння: відвернення зла та прикликання долі'
  - 'Персоніфікація природних явищ: Сон і Дрімота як дійові особи'
  - 'Тваринний світ колисанок: чому саме котик став головним героєм?'
  key_concepts:
  - пестливість
  - заспокоєння
  - архетип
- section: Поетика та лінгвістика 'сонного' тексту
  words: 1000
  subsections:
  - 'Фонетичні засоби: алітерація на [с], [л], [н] та монотонність ритму'
  - 'Лексичний склад: зменшувально-пестливі суфікси як маркер любові'
  - 'Флористична символіка: рута, м''ята, барвінок та їхні властивості'
  key_concepts:
  - алітерація
  - суфіксація
  - фітосимволіка
- section: 'Думи: героїчний вимір буття'
  words: 1000
  subsections:
  - 'Виконавська традиція: від незрячих кобзарів до сучасних реконструкторів'
  - Дума як засіб збереження історичної істини в бездержавний період
  - Естетика страждання та визволення у невільницьких плачах
  key_concepts:
  - епос
  - історизм
  - катарсис
- section: Діалог жанрів у національній свідомості
  words: 1000
  subsections:
  - Вплив фольклорних мотивів на професійну поезію (Леся Українка, Т. Шевченко)
  - Колискова як перша школа мови та культурної ідентичності
  - 'Сучасна доля народної пісні: від етнографічного музею до стрімінгових платформ'
  key_concepts:
  - ідентичність
  - спадкоємність
  - ревіталізація
- section: Підсумок — Summary
  words: 300
  points:
  - "Ukrainian lullabies (колискові) rely heavily on diminutive suffixes (зменшувально-пестливі
    суфікси) and phonetic alliteration to create a soothing atmosphere, often personifying
    Сон and Дрімота. Self-check: Why is 'котик' (cat) a central figure in these songs?
    Identify the diminutive suffixes in the words 'котик' and 'соночок'."
  - 'Historical epics (думи) contrast the intimate world of lullabies by preserving
    national memory and heroic narratives through the tradition of kobzars. Self-check:
    What is the main difference in tone and purpose between a lullaby and a duma?
    Name two plants used as floral symbols (фітосимволіка) in Ukrainian folklore.'
