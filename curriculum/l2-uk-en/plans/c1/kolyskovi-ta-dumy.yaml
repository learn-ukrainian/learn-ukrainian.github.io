module: c1-092
level: C1
sequence: 92
slug: kolyskovi-ta-dumy
version: '1.1'
title: "Колискові та думи: від родинного кола до епічної величі"
subtitle: "Колискові та думи: від родинного кола до епічної величі"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати жанрову специфіку та психологічну роль колискових пісень в українській
    культурі."
  - "Дослідити систему образів-символів у колисанках (Сон, Дрімота, Котик, птахи,
    трави)."
  - "Зіставити камерний світ колискової з монументальним світом народної думи як формантами
    національного характеру."
  - "Вивчити лексико-стилістичні засоби творення 'соного' настрою (пестливі слова,
    алітерація) та епічної урочистості."

reading_situations:
  - source_type: "психологічне дослідження"
    topic: "Вплив ритмомелодики української колискової на формування емоційного інтелекту
      дитини."
    key_elements: ["архетип матері", "терапевтична функція", "ритмічна повторюваність"]
    motivation: "Вивчення науково-популярного стилю та психологічної термінології."
  - source_type: "літературно-критичний нарис"
    topic: "Жіночі образи в українському епосі: від плачу Ярославни до думи про Марусю
      Богуславку."
    key_elements: ["інтертекстуальність", "генотип", "історична тяглість"]
    motivation: "Порівняльний аналіз жіночих архетипів у різних жанрах фольклору."

listening_situations:
  - media_type: "аудіо"
    setting: "Мистецький проект 'Колискові для дорослих': сучасна інтерпретація архаїчних
      текстів."
    focus_points: ["використання автентичних інструментів", "зміна темпоритму", "емоційне
          навантаження"]
    motivation: "Аналіз сучасних мистецьких експериментів з фольклорною основою."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Порівняйте дві моделі виховання в українській традиції: через лагідну
      колискову та через героїчну думу. Як вони доповнюють одна одну?"
    requirements: ["мінімум 300 слів", "вживання пестливих слів та епічних епітетів",
      "логічний синтез ідей"]
    motivation: "Розвиток навичок порівняльного аналізу та використання стилістично
      маркованої лексики."
    model_answer: "Текст повинен розкривати колискову як простір безпеки та любові,
      а думу — як школу мужності та історичної пам'яті. Важливо згадати образи 'котика-воркотика'
      та 'козака-невтяги'."

content_outline:
  - section: "Світ колискової: антропологія ніжності"
    words: 1000
    subsections:
      - "Магічна функція присипляння: відвернення зла та прикликання долі"
      - "Персоніфікація природних явищ: Сон і Дрімота як дійові особи"
      - "Тваринний світ колисанок: чому саме котик став головним героєм?"
    key_concepts:
      - "пестливість"
      - "заспокоєння"
      - "архетип"
  - section: "Поетика та лінгвістика 'сонного' тексту"
    words: 1000
    subsections:
      - "Фонетичні засоби: алітерація на [с], [л], [н] та монотонність ритму"
      - "Лексичний склад: зменшувально-пестливі суфікси як маркер любові"
      - "Флористична символіка: рута, м'ята, барвінок та їхні властивості"
    key_concepts:
      - "алітерація"
      - "суфіксація"
      - "фітосимволіка"
  - section: "Думи: героїчний вимір буття"
    words: 1000
    subsections:
      - "Виконавська традиція: від незрячих кобзарів до сучасних реконструкторів"
      - "Дума як засіб збереження історичної істини в бездержавний період"
      - "Естетика страждання та визволення у невільницьких плачах"
    key_concepts:
      - "епос"
      - "історизм"
      - "катарсис"
  - section: "Діалог жанрів у національній свідомості"
    words: 1000
    subsections:
      - "Вплив фольклорних мотивів на професійну поезію (Леся Українка, Т. Шевченко)"
      - "Колискова як перша школа мови та культурної ідентичності"
      - "Сучасна доля народної пісні: від етнографічного музею до стрімінгових платформ"
    key_concepts:
      - "ідентичність"
      - "спадкоємність"
      - "ревіталізація"

vocabulary:
  required:
    - колискова
    - пестливий
    - дрімота
    - архетип
    - героїзм
    - епічний
    - спадкоємність
    - ідентичність
  recommended:
    - автентичність
    - психоаналіз
    - ритмомелодика
    - рефлексія
    - ментальність

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - fill-in
    - authorial-intent
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте уривок із психологічного дослідження про вплив колискової на
      дитину. Знайдіть у тексті терміни, що описують емоційний стан, та поясніть їхнє
      значення своїми словами."
  - type: essay-response
    focus: "Напишіть аналітичний текст (300+ слів) про роль колискової як першої школи
      мови та культури. Використовуйте порівняльні конструкції та стилістично марковану
      лексику."
  - type: critical-analysis
    focus: "Проаналізуйте текст про народні думи. Визначте авторську позицію щодо
      ролі кобзарів та знайдіть приклади епічних епітетів і метафор."
  - type: match-up
    focus: "Зіставте терміни (алітерація, суфіксація, речитатив, архетип) з їхніми
      українськими визначеннями. Мета — засвоєння фахової термінології."
  - type: fill-in
    focus: "Доповніть текст про поетику колискової відповідними стилістичними та літературознавчими
      термінами (пестливий, алітерація, ритмомелодика)."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Традиції та культурна спадщина'"
  - "Авраменко, 11 клас (Укр. літ.) — усна народна творчість, думи та історичні пісні"
  - "Караман, 10 клас (2018), §38 — Стилістично забарвлена лексика"
  - "Грушевський М. Історія української літератури, т. 1 — народна словесність (загальна
    довідка)"

connects_to:
  previous: "ritual-songs"
  next: "hopak-i-kozachok"
phase: C1.3 [Advanced Stylistics & Rhetoric]
