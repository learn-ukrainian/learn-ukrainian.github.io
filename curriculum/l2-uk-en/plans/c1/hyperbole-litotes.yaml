module: c1-056
level: C1
sequence: 56
slug: hyperbole-litotes
version: '1.1'
title: "Гіпербола та літота: мистецтво кількісної трансформації образу"
subtitle: "Hyperbole and Litotes: The Art of Quantitative Image Transformation"
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити механізми перебільшення (гіпербола) та применшення (літота) у художньому та публіцистичному текстах."
  - "Аналізувати експресивну функцію гіперболізації в українському фольклорі та бароковій літературі."
  - "Опанувати техніку літоти як засобу ввічливості, скромності та іронії в професійному дискурсі."
  - "Використовувати кількісні трансформації для посилення переконливості аргументації."

reading_situations:
  - source_type: "фрагмент козацького літопису"
    topic: "Опис битви під Хотином: гіперболізація героїчного чину."
    key_elements: ["козацьке бароко", "епічний розмах", "метафоричне перебільшення"]
    motivation: "Аналіз історичних коренів гіперболи в українській мілітарній прозі."
  - source_type: "аналітичний звіт"
    topic: "Свідоме применшення ризиків у корпоративній звітності: лінгвістичний аспект."
    key_elements: ["літота", "евфемізація", "маніпуляція"]
    motivation: "Виявлення прихованих смислів через аналіз літоти в офіційному тексті."

listening_situations:
  - media_type: "лекція"
    setting: "Мистецтвознавча лекція про 'естетику надмірності' у творчості українських художників-наївістів."
    focus_points: ["візуальна гіпербола", "емоційний вплив", "символіка"]
    motivation: "Розуміння міждисциплінарного характеру гіперболи як засобу виразності."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть футурологічне есе про Україну 2050 року, використовуючи гіперболу для опису технологічних досягнень та літоту для опису колишніх проблем."
    requirements: ["мінімум 350 слів", "виразне використання контрасту", "багата образна мова"]
    motivation: "Практичне відпрацювання навичок художнього моделювання майбутнього через кількісні тропи."
    model_answer: "Текст має бути футуристичним маніфестом, де масштабні звершення підкреслюються через гіперболічні образи 'міст-садів' та 'цифрового безсмертя'."

discussion_topics:
  - context: "Чи є гіпербола в рекламі обманом чи необхідним засобом привернення уваги?"
    questions:
      - "Чому український фольклор так любить гіперболу?"
      - "У яких ситуаціях літота (применшення власної ролі) є ефективнішою за самопрезентацію?"
      - "Як відрізнити щиру емоційність від маніпулятивної гіперболізації в медіа?"
    motivation: "Дискусія про психологічну та етичну межу використання тропів."

content_outline:
  - section: "Гіпербола: від епічної величі до гротеску"
    words: 1000
    subsections:
      - "Генезис гіперболи в міфологічному мисленні та фольклорі"
      - "Види гіпербол: лексичні, фразеологічні, розгорнуті"
      - "Гіпербола як фундамент сатири та гумору"
    key_concepts:
      - "гіперболізація"
      - "експресія"
      - "масштабність"
  - section: "Літота: сила применшення"
    words: 1000
    subsections:
      - "Літота як зворотна гіпербола: семантичні механізми"
      - "Функції літоти: пом'якшення, іронія, ввічливість (мейозис)"
      - "Літота в дипломатичному та академічному мовленні"
    key_concepts:
      - "літота"
      - "мейозис"
      - "стриманість"
  - section: "Стилістичні взаємодії кількісних тропів"
    words: 1000
    subsections:
      - "Контраст гіперболи та літоти як засіб створення динамічного образу"
      - "Градація як спосіб розгортання гіперболічного змісту"
      - "Роль кількісних трансформацій у створенні гротескного світу"
    key_concepts:
      - "градація"
      - "гротеск"
      - "антитеза"
  - section: "Гіпербола та літота в сучасному медіадискурсі"
    words: 1000
    subsections:
      - "Заголовки-клікбейти: гіпербола на службі трафіку"
      - "Політичний популізм та маніпулятивна гіперболізація"
      - "Лінгвістична скромність у наукових текстах як форма літоти"
    key_concepts:
      - "клікбейт"
      - "популізм"
      - "наукова етика"

vocabulary:
  required:
    - перебільшення
    - применшення
    - масштабність
    - грандіозність
    - виразність
    - інтенсифікація
    - мінімізація
    - ефект
  recommended:
    - монументальність
    - мізерність
    - іронічність
    - радикалізація
    - акцентування

activity_hints:
  - type: critical-analysis
    description: "Analyze a Cossack chronicle excerpt — identify all hyperboles, explain their function in heroic narrative, and compare with modern media hyperbole."
  - type: select
    description: "Identify whether excerpts use гіпербола, літота, мейозис, or градація — and classify their pragmatic function (persuasion, humor, politeness)."
  - type: match-up
    description: "Match examples of hyperbole and litotes from different registers (folklore, academic, diplomatic, media) with their stylistic function."
  - type: essay-response
    description: "Rewrite a neutral news report using hyperbole for dramatic effect, then rewrite the same report using litotes for diplomatic understatement."
  - type: mark-the-words
    description: "Identify all instances of quantitative tropes (гіпербола, літота, градація) in a literary and a journalistic text."

activities:
  types_required:
    - critical-analysis
    - select
    - match-up
    - essay-response
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §38 — Лексичні засоби стилістики"
  - "Глазова, 11 клас (2019): §40 — Стилістичне забарвлення лексики"
  - "Авраменко, 11 клас (2019): Стилістична норма — тропи"

connects_to:
  previous: "irony-sarcasm"
  next: "euphemism-taboo"
