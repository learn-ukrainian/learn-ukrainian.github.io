slug: hyperbole-litotes
version: '2.0'
title: 'Гіпербола та літота: Гра масштабів'
subtitle: 'Hyperbole & Litotes: Playing with Scale'
content_outline:
- section: Розминка та основи масштабу (Warm-up & Basics of Scale)
  words: 500
  points:
  - 'Вступ до стилістичних засобів лексики за стандартом §4.4.3: роль перебільшення та применшення в емоційному мовленні'
  - 'Розрізнення граматичної гіперболи (морфологічні засоби: суфікси -ищ-, -енн-) та лексичної гіперболи (фразеологізми та
    образи)'
  - 'Емоційний вплив: як свідоме викривлення масштабу допомагає виразити суб''єктивну істину'
- section: 'Гіпербола: Сила, епос та традиція (Hyperbole: Power, Epic & Tradition)'
  words: 1000
  points:
  - 'Культурний код: Аналіз козацьких дум та епосу, де герой ''однією рукою побиває полк ворогів'' як приклад національної
    гіперболи'
  - 'Енциклопедія народної гіперболи: Вивчення засобів виразності в ''Енеїді'' Котляревського (художня та явна гіпербола)'
  - 'Регістрова специфіка: Чому книжні гіперболи типу ''море сліз'' звучать пафосно в побуті, та як використовувати розмовні
    відповідники'
  - 'Функції гіперболи: акцентування, гумор та вираження граничних емоцій через фразеологію (''чекати цілу вічність'')'
- section: 'Літота: Стриманість, ввічливість та іронія (Litotes: Restraint, Politeness & Irony)'
  words: 1000
  points:
  - 'Мистецтво применшення: Використання літоти для етикетної стриманості та скромності в українському мовленні (''не без
    того'', ''зовсім не зле'')'
  - 'Семантика подвійного заперечення: Пояснення, чому ''Він не позбавлений таланту'' може означати вищий ступінь похвали,
    ніж пряме твердження'
  - 'Літота як інструмент іронії: Тонкі засоби вираження скепсису або сарказму, критично важливі для рівня C1'
  - Практичні приклади літоти в офіційному дискурсі для пом'якшення оцінок ('непоганий результат')
- section: Аналіз помилок та мовна практика (Error Analysis & Practice)
  words: 800
  points:
  - 'Виправлення калькованих гіпербол: Заміна англійського ''I''m starving'' (неприродне ''Я вмираю'') на ідіоматичне ''Я
    голодний як вовк'' або ''Кишка кишці кулешу варить'''
  - 'Вправа на розпізнавання: Відрізнення літоти від слабкої похвали в контексті ділового та особистого спілкування'
  - 'Стилістичний експеримент: Перетворення нейтрального тексту на емоційно-насичене оповідання за допомогою зміни масштабів'
  - 'Порівняльний аналіз: Як масштаб у мові корелює з українським менталітетом (емоційність vs ввічлива стриманість)'
- section: Творча продукція та риторика тексту (Creative Production & Rhetoric)
  words: 700
  points:
  - 'Застосування елементів риторики в композиції тексту за стандартом §4.4.6: написання сатиричного нарису з використанням
    гіпербол'
  - 'Створення діалогу-суперечки: Використання літоти як засобу витонченої іронії та контраргументації'
  - 'Підсумкова рефлексія: Вплив вибору масштабу на сприйняття образу автора та його переконливість'
focus: style
pedagogy: Immersion
objectives:
- Identify and use hyperbole for emotional impact
- Master litotes for polite understatement and irony
- Analyze the use of scale in literary and daily communication
grammar:
- Hyperbole (exaggeration)
- Litotes (understatement via double negation)
- Emphasis and modesty strategies
phase: C1.5 [Stylistics & Rhetoric]
persona:
  voice: Senior Specialist
  role: Майстер риторики
word_target: 4000
vocabulary_hints:
  required:
  - гіпербола (hyperbole) — вдатися до гіперболи, художня гіпербола, явна гіпербола; середня частота (академічний регістр)
  - літота (litotes) — вживати літоту, іронічна літота; низька частота (академічний регістр)
  - перебільшення (exaggeration) — явне перебільшення, без перебільшення, схильність до перебільшень; висока частота
  - применшення (understatement) — свідоме применшення, з метою применшення; середня частота
  - вічність (eternity) — чекати цілу вічність, здаватися вічністю; висока частота, гіперболічне значення
  - непоганий (not bad / quite good) — зовсім непоганий, результат непоганий; висока частота, часто вживається як літота для
    'добрий'
  recommended:
  - кишка кишці кулешу варить (starving) — ідіоматична гіпербола для сильного голоду
  - не без того (not without it) — етикетна літота, що підтверджує наявність чогось
  - море сліз (sea of tears) — книжна гіпербола, потребує обережного вживання в розмові
  - не такий уже й дурний (not that stupid) — літота, що насправді вказує на розум людини
