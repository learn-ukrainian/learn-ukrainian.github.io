activity_hints:
- type: reading
  focus: Прочитайте текст про генезис та філософія вишитої сорочки і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про алфавіт орнаменту: знаки та кольори,
    використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Генезис та 
    філософія вишитої сорочки». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    генезис та філософія вишитої сорочки.
- type: comparative-study
  focus: 'Порівняйте різні підходи до генезис та філософія вишитої сорочки: Витоки
    вишивки на території України: від скіфського золота до козацького бароко. Визначте
    спільне та відмінне.'
