module: c1-079
level: C1
sequence: 79
slug: vyshyvanka
version: '2.0'
title: 'Вишиванка: Зашифрована доля'
subtitle: 'Vyshyvanka: Encoded Destiny'
content_outline:
- section: 'Вступ: Сакральний код та оберіг (Introduction: Sacred Code and Amulet)'
  words: 700
  points:
  - 'Вишиванка як ''генетичний код'' нації: концепція одягу як зашифрованої інформації про власника та його рід'
  - 'Магічна та ритуальна функція: вишивка як сакральний оберіг від пристріту та злих сил (символіка на комірі, манжетах і
    подолі)'
  - 'Метафора ''етнічного QR-коду'': сприйняття архаїчних орнаментів крізь призму сучасної ідентичності та дешифрування сенсів'
  - 'Лексична диференціація: розрізнення понять ''вишиванка'' (сорочка) та ''вишивка'' (процес, орнамент або оздоблення)'
- section: 'Регіональний калейдоскоп: Від Полтави до Борщева (Regional Kaleidoscope: From Poltava to Borshchiv)'
  words: 1000
  points:
  - 'Полтавська вишивка: техніка ''білим по білому'' (Решетилівка) як об’єкт нематеріальної культурної спадщини та символ
    високої естетики'
  - 'Борщівська сорочка: легенда про трагічну обітницю жінок XVII ст. та використання чорної нитки як символу пам''яті та
    жалоби'
  - 'Подільська та гуцульська традиції: багатобарвність, використання металевих ниток та складна геометрія ''низинки'''
  - 'Граматичний фокус: узгодження роду топонімів (Поділля славне своїм... vs Полтавщина славна своєю...) та вживання прикметників'
- section: Мова символів та розмаїття технік (Language of Symbols and Variety of Techniques)
  words: 900
  points:
  - 'Символіка флори та фауни: калина як символ невмирущості роду, дуб як чоловіча енергія, виноград як радість сімейного
    життя'
  - 'Аналіз технік: порівняння ''хрестика'', художньої ''гладі'', прозорої ''мережки'' та архаїчної ''низинки'''
  - 'Матеріалознавство: домоткане полотно з конопель та льону як основа традиційного строю; значення ''вибілювання'' тканини'
  - 'Соціальна семіотика: як візерунок вказував на вік, сімейний стан та соціальний статус людини в громаді'
- section: 'Еволюція вишиванки: Від магії до світового флешмобу (Evolution of Vyshyvanka: From Magic to Global Flashmob)'
  words: 700
  points:
  - 'Трансформація смислів: від селянського обрядового одягу до елемента високої моди та дипломатичного протоколу'
  - 'Історія Дня вишиванки: від студентської ініціативи в Чернівцях до глобальної акції солідарності українців усього світу'
  - 'Сучасна інтерпретація: використання традиційних мотивів у сучасному дизайні (streetwear, цифрове мистецтво, татуювання)'
  - 'Культурна дипломатія: роль вишиванки у просуванні українського бренду за кордоном та деколонізації візуальної культури'
- section: 'Практикум: Мистецтво дешифрування та стилістики (Workshop: The Art of Decoding and Stylistics)'
  words: 700
  points:
  - 'Стилістична точність: використання дієслів ''вбиратися у вишиванку'', ''носити вишиванку'' замість помилкового ''надівати
    вишиванку на сукню'''
  - 'Аналітична вправа: ідентифікація регіону походження сорочки за колористикою та типом орнаменту (кейс-стаді Полтавщини
    vs Поділля)'
  - 'Дискусійна панель: обговорення етичних аспектів використання сакральних символів у комерційних мас-маркет продуктах'
  - 'Творче письмо: написання есе на тему ''Мій код: що каже моя вишиванка світові'' з використанням спеціальної термінології'
focus: history
pedagogy: CBI
objectives:
- Analyze the spiritual and social functions of the Ukrainian embroidered shirt
- 'Identify regional embroidery styles: Poltava, Hutsul, Borshchiv, and Podillia'
- Understand the technique and symbolism of various embroidery stitches
grammar:
- Symbolic narrative registers
- Terminology of embroidery
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Майстриня вишивки
word_target: 4000
vocabulary_hints:
  required:
  - вишиванка (embroidered shirt) — традиційна вишиванка, одягати вишиванку; розрізняти з 'вишивка' (процес/орнамент)
  - оберіг (amulet/talisman) — сакральний оберіг, функція оберега, вишивати на захист
  - мережка (openwork embroidery/hemstitch) — прозора мережка, техніка мережки; низька частотність, термін
  - низинка (low-stitch/nyzynka) — архаїчна техніка низинки, геометричний орнамент; етнографічний термін
  - коноплі (hemp) — домоткане полотно з конопель, вибілені коноплі; історичний контекст матеріалу
  - гладь (satin stitch) — художня гладь, полтавська біла гладь; техніка заповнення площини
  vocabulary_hints: null
  recommended:
  - код нації (code of the nation) — часто вживана метафора в сучасному дискурсі
  - генетичний код (genetic code) — стійка колокація щодо вишиванки як спадщини
  - білим по білому (white-on-white) — специфічна назва полтавської техніки
  - вбиратися (to dress up/don) — стилістично вишуканий синонім до 'одягатися'
  - домотканий (homespun) — про полотно ручної роботи
  - орнаменталістика (ornamental art) — науковий термін для опису системи візерунків
