module: c1-096
level: C1
sequence: 96
slug: vyshyvanka
version: '1.1'
title: "Українська вишиванка: генетичний код та мода"
subtitle: "Українська вишиванка: генетичний код і мода"
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити історію вишитої сорочки як невід'ємного елемента українського національного
    вбрання та оберега."
  - "Ознайомитися з розмаїттям технік української вишивки (низинка, занизування, настилування,
    мережка, хрестик)."
  - "Проаналізувати семантику кольорів (білий, чорний, червоний, синій) та символіку
    орнаментів (геометричні, рослинні, зооморфні)."
  - "Оцінити феномен Всесвітнього дня вишиванки та інтеграцію українських етно-мотивів
    у світову індустрію моди."

reading_situations:
  - source_type: "культурологічне есе"
    topic: "Вишиванка як засіб ідентифікації: від селянського побуту до політичного
      маніфесту."
    key_elements: ["культурна дипломатія", "самоідентифікація", "традиціоналізм"]
    motivation: "Аналіз публіцистичного тексту з високим рівнем абстракції та соціально-політичною
      термінологією."
  - source_type: "мистецтвознавчий каталог"
    topic: "Регіональні особливості вишивки: чорно-біла борщівська сорочка vs багатобарвна
      полтавська гладь."
    key_elements: ["колористика", "композиція", "регіональний канон"]
    motivation: "Вивчення описів творів декоративно-прикладного мистецтва."

listening_situations:
  - media_type: "подкаст"
    setting: "Розмова з дизайнеркою сучасного етно-одягу про переосмислення старовинних
      технік у форматі ready-to-wear."
    focus_points: ["використання натуральних тканин", "збереження автентики", "глобальні
          тренди"]
    motivation: "Сприйняття на слух фахової дискусії про перетин традиції та інновації."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Проаналізуйте вислів: 'Вишиванка — це не просто одяг, це молитва без
      слів'. Як ви розумієте сакральне значення вишивки?"
    requirements: ["мінімум 300 слів", "використання термінів: оберіг, семантика,
          сакральність", "наведення прикладів з літератури"]
    motivation: "Розвиток вміння філософськи осмислювати культурні артефакти."
    model_answer: "Текст повинен розкривати магічну функцію вишивки як захисту, пояснювати
      значення основних знаків (наприклад, восьмикутної зірки) та підсумовувати роль
      вишиванки як символу стійкості."

content_outline:
  - section: "Генезис та філософія вишитої сорочки"
    words: 1000
    subsections:
      - "Витоки вишивки на території України: від скіфського золота до козацького
        бароко"
      - "Сорочка як друга шкіра: обрядові функції (родини, весілля, поховання)"
      - "Магія нитки: як думки та стан майстрині впливали на силу оберега"
    key_concepts:
      - "генетичний код"
      - "оберіг"
      - "духовна спадщина"
  - section: "Алфавіт орнаменту: знаки та кольори"
    words: 1000
    subsections:
      - "Геометрична архаїка: ромб із гачками, меандр, безкінечник"
      - "Рослинна символіка: дерево життя, калина, дуб, мак та їхні приховані смисли"
      - "Колірна палітра регіонів: чому білим по білому вишивали на Полтавщині, а
        чорним — на Тернопільщині?"
    key_concepts:
      - "семантика"
      - "стилізація"
      - "колірна гама"
  - section: "Технологічне розмаїття: понад 200 швів"
    words: 1000
    subsections:
      - "Гладь та хрестик: історія поширення та міфи"
      - "Складні техніки: солов'їні вічка, вирізування, виколювання"
      - "Матеріали: конопляне та лляне полотно, вовняні та шовкові нитки"
    key_concepts:
      - "технологія"
      - "фактура"
      - "майстерність"
  - section: "Вишиванка у XXI столітті"
    words: 1000
    subsections:
      - "Всесвітній день вишиванки: від студентського флешмобу до глобальної події"
      - "Вишиванка на подіумах Парижа та Нью-Йорка: Dolce & Gabbana, Valentino, Vita
        Kin"
      - "Етика копіювання та захист інтелектуальної власності в народному мистецтві"
    key_concepts:
      - "культурна дипломатія"
      - "етно-футуризм"
      - "бренд"

vocabulary:
  required:
    - вишиванка
    - орнамент
    - оберіг
    - мережка
    - гладь
    - полотно
    - семантика
    - ідентичність
  recommended:
    - автентичний
    - сакральний
    - ренесанс
    - стилізація
    - дипломатія

activities:
  types_required:
    - critical-analysis
    - match-up
    - error-correction
    - highlight-morphemes
    - translate
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте культурологічне есе про вишиванку як засіб ідентифікації. Знайдіть
      у тексті аргументи на користь символічного значення вишивки."
  - type: critical-analysis
    focus: "Проаналізуйте текст про комерціалізацію вишивки у світовій моді. Визначте
      авторську позицію щодо етики використання народних мотивів."
  - type: comparative-study
    focus: "Зіставте техніки вишивки (низинка, занизування, мережка, гладь, хрестик)
      з їхніми описами та регіональним поширенням."
  - type: error-correction
    focus: "Знайдіть і виправте помилки в тексті про українську вишивку: русизми,
      неточні терміни, невідповідний регістр."
  - type: essay-response
    focus: "Доповніть опис семантики кольорів вишивки відповідними характеристиками
      (червоний — життя, білий — чистота, чорний — земля)."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та ремесла'"
  - "Караман, 10 клас (2018), §38 — Стилістично забарвлена лексика"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"

