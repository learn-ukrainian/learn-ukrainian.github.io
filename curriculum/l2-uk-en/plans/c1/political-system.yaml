module: c1-025
level: C1
sequence: 25
slug: political-system
version: '1.1'
title: "Політична система України: Інституції, виклики та державотворення"
subtitle: "Політична система та державні інституції"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Глибоко розуміти структуру державної влади та конституційні основи України."
  - "Аналізувати політичний дискурс, виборчі процеси та роль партій у суспільстві."
  - "Оцінювати вплив громадянського суспільства на прийняття державних рішень."
  - "Вивчати історію українського парламентаризму від козацьких рад до сучасної Верховної
    Ради."

reading_situations:
  - source_type: "офіційний документ"
    topic: "Аналіз ключових положень Конституції України про повноваження Президента
      та Парламенту."
    key_elements: ["суверенітет", "законодавча ініціатива", "стримування та противаги"]
    motivation: "Вивчення юридичної термінології та офіційного стилю."
  - source_type: "історичне джерело"
    topic: "Конституція Пилипа Орлика 1710 року як перша європейська конституція."
    key_elements: ["договір", "права козацтва", "поділ влад"]
    motivation: "Зв'язок сучасної демократії з українськими правовими традиціями."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Бесіда з політологом про реформу децентралізації та її вплив на місцеве
      самоврядування."
    focus_points: ["субсидіарність", "громади", "бюджетна автономія"]
    motivation: "Розуміння складних соціально-політичних термінів у контексті реформ."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте роль електронної демократії (петиції, додаток 'Дія') у
      сучасному політичному житті України. Чи змінює це баланс сил?"
    requirements: ["мінімум 300 слів", "використання вставних слів для аргументації",
      "приклади конкретних ініціатив"]
    motivation: "Відпрацювання аналітичного письма на актуальну суспільну тематику."
    model_answer: "Текст має містити тезу про трансформацію взаємодії держави та громадянина,
      аргументи щодо інклюзивності та ризиків цифровізації, висновок про зміцнення
      демократії. Використання понять 'прозорість', 'підзвітність', 'цифровий розрив'."

discussion_topics:
  - context: "Парламентська vs Президентська республіка: який формат є оптимальним
      для повоєнної відбудови України?"
    questions:
      - "Які ризики несе концентрація влади в руках однієї особи?"
      - "Як забезпечити ефективність колегіальних рішень у кризові періоди?"
      - "Яку роль відіграє політична культура населення в стабільності системи?"
    motivation: "Розвиток навичок ведення дебатів на державотворчі теми."

content_outline:
  - section: "Державна архітектура України"
    words: 1000
    subsections:
      - "Законодавча, виконавча та судова гілки влади: взаємодія та контроль"
      - "Інститут Президента: функції, повноваження та відповідальність"
      - "Місцеве самоврядування та результати децентралізації"
    key_concepts:
      - "розподіл влад"
      - "легітимність"
      - "суверенітет"
  - section: "Політичний процес та виборче право"
    words: 1000
    subsections:
      - "Типи виборчих систем та їх реалізація в Україні"
      - "Роль політичних партій у формуванні порядку денного"
      - "Маніпуляції у виборчому дискурсі: популізм та чорний піар"
    key_concepts:
      - "електорат"
      - "пропорційна система"
      - "адмінресурс"
  - section: "Громадянське суспільство як суб'єкт політики"
    words: 1000
    subsections:
      - "Громадські організації, волонтерський рух та групи інтересів"
      - "Лобіювання інтересів: від корупційних схем до цивілізованих практик"
      - "Медіа як 'четверта влада' та їх вплив на політичний рейтинг"
    key_concepts:
      - "адвокація"
      - "активізм"
      - "публічний дискурс"
  - section: "Зовнішня політика та геополітичний вектор"
    words: 1000
    subsections:
      - "Курс на членство в ЄС та НАТО: виклики та законодавчі зміни"
      - "Регіональне лідерство України в Центральній та Східній Європі"
      - "Дипломатична боротьба за відновлення територіальної цілісності"
    key_concepts:
      - "інтеграція"
      - "безпека"
      - "суб'єктність"

vocabulary:
  required:
    - демократія
    - суверенітет
    - конституція
    - парламент
    - інститут
    - повноваження
    - реформа
    - корупція
  recommended:
    - підзвітність
    - прозорість
    - децентралізація
    - самоврядування
    - ініціатива

activity_hints:
  - type: critical-analysis
    description: "Analyze constitutional provisions about presidential and parliamentary
      powers — evaluate legal terminology and argumentation structure."
  - type: error-correction
    description: "Fix imprecise political terminology and register violations in a
      political analysis text."
  - type: match-up
    description: "Match Ukrainian state institutions (Верховна Рада, Кабінет Міністрів,
      Конституційний Суд) with their constitutional functions and terminology."
  - type: select
    description: "Choose correct legal and political terms in context — distinguish
      between similar concepts (суверенітет vs незалежність, легітимність vs законність)."
  - type: essay-response
    description: "Write an analytical essay (300+ words) about the role of electronic
      democracy (Дія, e-petitions) in Ukrainian political life."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - select
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка"
  - "Глазова, 11 клас (2019): §45 — Синтаксичні одиниці в різних стилях"
  - "State Standard 2024: C1 section on sociolinguistics and civic discourse"

