module: c1-059
level: C1
sequence: 59
slug: fonetychni-stylistychni-zasoby
version: '1.1'
title: "Фонетичні стилістичні засоби та милозвучність"
subtitle: "Фонетичні стилістичні засоби та милозвучність"
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити закони української милозвучності та їх порушення в різних стилях мовлення."
  - "Аналізувати звукопис (алітерацію, асонанс) як засіб створення художнього образу."
  - "Опанувати техніку звукового інструментування тексту для посилення його емоційного
    впливу."
  - "Застосовувати знання про фоностилістику при підготовці текстів для публічних
    виступів та аудіоконтенту."

reading_situations:
  - source_type: "художній уривок"
    topic: "Симфонія звуків у прозі Михайла Коцюбинського: аналіз звукопису."
    key_elements: ["алітерація", "асонанс", "звуконаслідування"]
    motivation: "Вивчення майстерності відтворення природних шумів через мовні звуки."
  - source_type: "лінгвістична стаття"
    topic: "Милозвучність як конститутивна ознака української мови: міфи та реальність."
    key_elements: ["чергування у-в, і-й", "евфонія", "фонотактика"]
    motivation: "Науковий погляд на естетичні параметри української фонетичної системи."

listening_situations:
  - media_type: "аудіо"
    setting: "Декламація поезій Павла Тичини з циклу 'Сонячні кларнети' професійним
      актором."
    focus_points: ["ритміка", "музикальність слова", "інтонаційні акценти"]
    motivation: "Аналіз звукової архітектоніки поетичного тексту."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть сценарій аудіорепортажу (250-300 слів) про весняний ліс або
      бурхливе місто, використовуючи алітерацію та асонанс для створення звукового
      фону."
    requirements: ["використання щонайменше 3 прикладів алітерації", "дотримання норм
          милозвучності", "виразний ритм"]
    motivation: "Практичне застосування фоностилістичних засобів у креативному письмі."
    model_answer: "Текст має бути 'чутним' для слухача, де накопичення свистячих чи
      шиплячих звуків допомагає передати атмосферу місця."

discussion_topics:
  - context: "Чи може милозвучність заважати точності та лаконічності наукового тексту?"
    questions:
      - "Чому українську мову називають 'солов'їною' і як це відображено у її фонетиці?"
      - "Як звукові повтори допомагають запам'ятовувати рекламні слогани?"
      - "Чи варто свідомо порушувати закони евфонії для досягнення стилістичного ефекту
        'дисонансу'?"
    motivation: "Обговорення функціональних меж фонетичної естетики."

content_outline:
  - section: "Естетика звуку: милозвучність (евфонія)"
    words: 1000
    subsections:
      - "Закони милозвучності: чергування голосних та приголосних"
      - "Уникнення збігу приголосних та голосних як фундаментальна норма"
      - "Фонотактичні особливості української мови порівняно з іншими слов'янськими
        мовами"
    key_concepts:
      - "евфонія"
      - "чергування"
      - "милозвучність"
  - section: "Звукопис: алітерація та асонанс"
    words: 1000
    subsections:
      - "Алітерація: магія приголосних звуків у поезії та прозі"
      - "Асонанс: накопичення голосних як засіб створення настрою"
      - "Звуконаслідування (ономатопея) та його стилістичні функції"
    key_concepts:
      - "алітерація"
      - "асонанс"
      - "ономатопея"
  - section: "Фоностилістика публічного виступу"
    words: 1000
    subsections:
      - "Ритмічна організація прози: від фрази до періоду"
      - "Інтонація як фоностилістичний засіб вираження модальності"
      - "Логічний наголос та паузація в ораторському мистецтві"
    key_concepts:
      - "ритм"
      - "інтонація"
      - "пауза"
  - section: "Звукові маніпуляції та психоакустика слова"
    words: 1000
    subsections:
      - "Звуковий символізм: як звуки впливають на підсвідомість"
      - "Фонетичний брендинг: створення назв та слоганів з певною звуковою аурою"
      - "Дисонанс та какофонія як свідомі засоби експресивного синтаксису"
    key_concepts:
      - "звуковий символізм"
      - "какофонія"
      - "аудіомаркетинг"

vocabulary:
  required:
    - милозвучність
    - евфонія
    - алітерація
    - асонанс
    - звукопис
    - ритміка
    - інтонація
    - милозвучність
  recommended:
    - ономатопея
    - какофонія
    - дисонанс
    - гармонія
    - звуконаслідування

activity_hints:
  - type: critical-analysis
    description: "Analyze a poem by Павло Тичина — identify all instances of alliteration,
      assonance, and onomatopoeia, explaining their contribution to the poem's mood."
  - type: select
    description: "Identify which euphony rule (чергування у/в, і/й, з/із/зі) is violated
      in given sentences and choose the correct variant."
  - type: error-correction
    description: "Fix euphony violations in a text — restore proper consonant/vowel
      alternation patterns according to Ukrainian phonotactic rules."
  - type: match-up
    description: "Match phonetic stylistic devices (алітерація, асонанс, ономатопея,
      какофонія) with their definitions and examples from Ukrainian poetry."
  - type: essay-response
    description: "Write a short descriptive passage (100-150 words) about a natural
      scene, deliberately using alliteration and assonance to create a sound landscape."

activities:
  types_required:
    - critical-analysis
    - select
    - error-correction
    - match-up
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §19 — Милозвучність української мови"
  - "Глазова, 11 клас (2019): §40 — Стилістичне забарвлення лексики, фоностилістика"
  - "Авраменко, 11 клас (2019): Стилістична норма — фонетичні засоби"

connects_to:
  previous: "rhetorical-questions"
  next: "morfolohichni-stylistychni-zasoby"
