module: c1-070
level: C1
sequence: 70
slug: fonetychni-stylistychni-zasoby
version: 1.1.2
title: Фонетичні стилістичні засоби та милозвучність
subtitle: Фонетичні стилістичні засоби та милозвучність
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
- Дослідити закони української милозвучності та їх порушення в різних стилях 
  мовлення.
- Аналізувати звукопис (алітерацію, асонанс) як засіб створення художнього 
  образу.
- Опанувати техніку звукового інструментування тексту для посилення його 
  емоційного впливу.
- Застосовувати знання про фоностилістику при підготовці текстів для публічних 
  виступів та аудіоконтенту.
reading_situations:
- source_type: художній уривок
  topic: 'Симфонія звуків у прозі Михайла Коцюбинського: аналіз звукопису.'
  key_elements:
  - алітерація
  - асонанс
  - звуконаслідування
  motivation: Вивчення майстерності відтворення природних шумів через мовні 
    звуки.
- source_type: лінгвістична стаття
  topic: 'Милозвучність як конститутивна ознака української мови: міфи та реальність.'
  key_elements:
  - чергування у-в, і-й
  - евфонія
  - фонотактика
  motivation: Науковий погляд на естетичні параметри української фонетичної 
    системи.
listening_situations:
- media_type: аудіо
  setting: Декламація поезій Павла Тичини з циклу 'Сонячні кларнети' професійним
    актором.
  focus_points:
  - ритміка
  - музикальність слова
  - інтонаційні акценти
  motivation: Аналіз звукової архітектоніки поетичного тексту.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть сценарій аудіорепортажу (250-300 слів) про весняний ліс або 
    бурхливе місто, використовуючи алітерацію та асонанс для створення звукового
    фону.
  requirements:
  - використання щонайменше 3 прикладів алітерації
  - дотримання норм милозвучності
  - виразний ритм
  motivation: Практичне застосування фоностилістичних засобів у креативному 
    письмі.
  model_answer: Текст має бути 'чутним' для слухача, де накопичення свистячих чи
    шиплячих звуків допомагає передати атмосферу місця.
discussion_topics:
- context: Чи може милозвучність заважати точності та лаконічності наукового 
    тексту?
  questions:
  - Чому українську мову називають 'солов'їною' і як це відображено у її 
    фонетиці?
  - Як звукові повтори допомагають запам'ятовувати рекламні слогани?
  - Чи варто свідомо порушувати закони евфонії для досягнення стилістичного 
    ефекту 'дисонансу'?
  motivation: Обговорення функціональних меж фонетичної естетики.
content_outline:
- section: 'Естетика звуку: милозвучність (евфонія)'
  words: 1000
  subsections:
  - 'Закони милозвучності: чергування голосних та приголосних'
  - Уникнення збігу приголосних та голосних як фундаментальна норма
  - Фонотактичні особливості української мови порівняно з іншими слов'янськими 
    мовами
  key_concepts:
  - евфонія
  - чергування
  - милозвучність
- section: 'Звукопис: алітерація та асонанс'
  words: 1000
  subsections:
  - 'Алітерація: магія приголосних звуків у поезії та прозі'
  - 'Асонанс: накопичення голосних як засіб створення настрою'
  - Звуконаслідування (ономатопея) та його стилістичні функції
  key_concepts:
  - алітерація
  - асонанс
  - ономатопея
- section: Фоностилістика публічного виступу
  words: 1000
  subsections:
  - 'Ритмічна організація прози: від фрази до періоду'
  - Інтонація як фоностилістичний засіб вираження модальності
  - Логічний наголос та паузація в ораторському мистецтві
  key_concepts:
  - ритм
  - інтонація
  - пауза
- section: Звукові маніпуляції та психоакустика слова
  words: 1000
  subsections:
  - 'Звуковий символізм: як звуки впливають на підсвідомість'
  - 'Фонетичний брендинг: створення назв та слоганів з певною звуковою аурою'
  - Дисонанс та какофонія як свідомі засоби експресивного синтаксису
  key_concepts:
  - звуковий символізм
  - какофонія
  - аудіомаркетинг
- section: Підсумок — Summary
  words: 300
  points:
  - 'Ukrainian euphony (милозвучність) relies on the alternation of vowels and consonants.
    Literary sound painting uses алітерація (consonant repetition) and асонанс (vowel
    repetition). Self-check: What is the difference between алітерація and асонанс?
    Give an example of ономатопея (sound imitation) in Ukrainian.'
  - 'Phonostylistics in public speaking uses rhythm, intonation, and logical stress
    (логічний наголос) to express modality, while sound symbolism influences perception.
    Self-check: How can you use a pause to change the meaning of a sentence? Contrast
    евфонія with какофонія and explain when you might intentionally use the latter.'
