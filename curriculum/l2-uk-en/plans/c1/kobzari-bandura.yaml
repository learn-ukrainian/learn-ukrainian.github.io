module: c1-068
level: C1
sequence: 68
slug: kobzari-bandura
version: '1.0'
title: 'Кобзарі та бандура: Душа України'
subtitle: 'Kobzari and Bandura: The Soul of Ukraine'
focus: cultural
pedagogy: CBI
phase: C1.6 [Folk Culture & Traditions]
word_target: 4000
objectives:
- Learner can describe the history and significance of kobzari tradition
- Learner can identify parts of the bandura and playing techniques
- Learner can discuss the tragic history of kobzari persecution
content_outline:
- section: 'Мистецтво кобзарства: Вступ (The Art of Kobzarship: Introduction)'
  words: 600
  points:
  - Поняття кобзарства як духовної місії та охоронця національної пам'яті, а не просто як музичного жанру
  - 'Подолання типової термінологічної помилки: розмежування понять «кобзар» (сліпий мандрівний співець-епік) та «бандурист»
    (сучасний професійний виконавець)'
  - 'Вступ до стилістичних засобів лексики: роль епітетів та метафор у створенні піднесеного академічного регістру (відповідно
    до стандарту §4.4.3)'
- section: 'Кобзарські цехи: Братства та таємниці (Kobzar Guilds: Brotherhoods and Secrets)'
  words: 1000
  points:
  - 'Детальний розгляд професійної організації кобзарів: структура цеху, ролі цехмайстра, братищиків та учнів, суворі іспити
    та устав'
  - 'Феномен «лебійської мови» (таємного арго): історія виникнення та функція секретного коду для захисту спільноти від зовнішнього
    втручання'
  - Роль кобзарських братств у збереженні козацького епосу та морально-етичного кодексу українського лицарства
- section: 'Поетика Думи: Стилістика епічного жанру (Poetics of the Duma: Stylistics of the Epic Genre)'
  words: 800
  points:
  - 'Аналіз мови дум: використання «постійних епітетів» як формулатичних блоків («сизий орел», «буйний вітер», «червона калина»)'
  - 'Стилістичні засоби синтаксису за стандартом §4.4.4: роль синтаксичного паралелізму та риторичних запитань у створенні
    ритму думи'
  - Аналіз метафорики («сонце заходить» як символ загибелі героя) та її вплив на емоційне сприйняття епічного тексту
- section: 'Еволюція інструмента: Від старосвітської до академічної бандури (Instrument Evolution: From Old World to Academic
    Bandura)'
  words: 800
  points:
  - Порівняння старосвітської (діатонічної) бандури та сучасного хроматичного інструмента (київського та харківського типів)
  - 'Практикум з граматики: правила відмінювання прізвищ видатних кобзарів (Остап Вересай, Гнат Гнатюк) за типом іменників
    чоловічого роду'
  - 'Техніки гри та музичний супровід: як зміна інструмента вплинула на характер виконання від інтимного співу до оркестрового
    звучання'
- section: 'Трагічна сторінка: Репресії 1930-х та відродження (Tragic Page: 1930s Repressions and Revival)'
  words: 800
  points:
  - 'Трагедія 1930-х років: радянські репресії проти носіїв традиції, обговорення міфу та реальності «Харківського з''їзду
    кобзарів»'
  - 'Символізм кобзарства у процесі деколонізації: як спроба знищення живої традиції стала символом боротьби за українську
    ідентичність'
  - 'Сучасне кобзарство та його роль у культурному відродженні: від автентичного відтворення до модерних інтерпретацій'
vocabulary_hints:
  required:
  - Кобзар (kobzar) — мандрівний кобзар, кобзарська традиція; традиційний співець-епік
  - Бандура (bandura) — грати на бандурі, чернігівська бандура; часто використовується у супроводі співу
  - Дума (duma) — епічна дума, виконувати думу; героїчний жанр українського фольклору
  - Цех (guild) — кобзарський цех, устав цеху; професійне об'єднання з суворою ієрархією
  - Епітет (epithet) — постійний епітет, художній епітет; ключовий засіб стандарту §4.4.3
  - Супровід (accompaniment) — музичний супровід, у супроводі бандури; часто використовується у дюмах
  recommended:
  - Лебійська мова (Lebiyska language) — таємне арго кобзарів для внутрішнього спілкування
  - Цехмайстер (cekhmeister) — голова кобзарського об'єднання; вищий ступінь в ієрархії
  - Постійний епітет (constant epithet) — традиційна художня формула («сизий орел», «буйний вітер»)
  - Синтаксичний паралелізм (syntactic parallelism) — повтор структур для підсилення ритміки (§4.4.4)
  - Братищик (bratishchyk) — повноправний член кобзарського цеху
  - Мандрівний (wandering) — мандрівний співець; кочовий спосіб життя носіїв традиції
