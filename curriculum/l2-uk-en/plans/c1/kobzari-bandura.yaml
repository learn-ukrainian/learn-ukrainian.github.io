module: c1-090
level: C1
sequence: 90
slug: kobzari-bandura
version: '1.1'
title: "Кобзарство та бандурне мистецтво: жива традиція"
subtitle: "Кобзарі та бандурне мистецтво: жива традиція"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити генезис та еволюцію кобзарства як унікального соціокультурного інституту
    України."
  - "Опанувати термінологію, пов'язану з будовою бандури та технікою гри (харківський
    та київський способи)."
  - "Проаналізувати поетику та структуру народних дум (заспів, речитатив, славословія)."
  - "Оцінити роль кобзарів у збереженні національної ідентичності в часи репресій
    (зокрема, Трагедія кобзарів 1930-х років)."

reading_situations:
  - source_type: "наукова розвідка"
    topic: "Еволюція кобзарського інструментарію: від кобзи Остапа Вересая до сучасної
      концертної бандури."
    key_elements: ["діатонічний стрій", "хроматизація", "конструктивні особливості"]
    motivation: "Вивчення спеціалізованої мистецтвознавчої лексики та технічних описів."
  - source_type: "художній репортаж"
    topic: "Спогади про Гната Гончаренка та його вплив на розвиток бандурного виконавства."
    key_elements: ["віртуозність", "традиційна школа", "автентичність"]
    motivation: "Аналіз описових засобів у текстах про видатних діячів культури."

listening_situations:
  - media_type: "лекція"
    setting: "Мистецтвознавча лекція про структуру народної думи на прикладі 'Думи
      про Марусю Богуславку'."
    focus_points: ["ритмомелодика речитативу", "функція зачину-заплачки", "символіка
          образів"]
    motivation: "Розвиток навичок аналізу музично-поетичних творів на слух."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Проаналізуйте роль фільму 'Поводир' (реж. Олесь Санін) у актуалізації
      кобзарської спадщини для сучасного глядача."
    requirements: ["використання мистецтвознавчих термінів", "аргументація на основі
          історичних фактів", "обсяг 300-350 слів"]
    motivation: "Формування вміння вести культурну дискусію з опорою на аудіовізуальні
      джерела."
    model_answer: "Текст повинен висвітлювати трагічні сторінки історії кобзарства
      1930-х років, пояснювати символічне значення образу сліпого співця та оцінювати
      художні засоби фільму."

content_outline:
  - section: "Історичні витоки та філософія кобзарства"
    words: 1000
    subsections:
      - "Кобзарські братства: статут, звичаї та таємна мова (лебійська)"
      - "Сліпі співці як духовні провідники та новинарі минулого"
      - "Образ кобзаря в українській літературі (Т. Шевченко, П. Куліш)"
    key_concepts:
      - "традиція"
      - "епічна спадщина"
      - "духовне лідерство"
  - section: "Морфологія бандури: інструмент та техніка"
    words: 1000
    subsections:
      - "Будова бандури: корпус, гриф, приструнки та баси"
      - "Порівняльний аналіз київського та харківського типів інструментів"
      - "Сучасні експерименти: електробандура та синтез жанрів"
    key_concepts:
      - "акомпанемент"
      - "майстерність"
      - "інновація"
  - section: "Поетика української думи"
    words: 1000
    subsections:
      - "Жанрові ознаки думи: нерівноскладовість рядків та дієслівне римування"
      - "Композиція: від заплачки до славословія"
      - "Аналіз провідних мотивів: козацька воля, полон, материнське благословення"
    key_concepts:
      - "речитатив"
      - "героїчний епос"
      - "імпровізація"
  - section: "Трагічна доля та відродження"
    words: 1000
    subsections:
      - "З'їзд кобзарів у Харкові та радянські репресії"
      - "Національна заслужена академічна капела бандуристів України ім. Г. Майбороди"
      - "Кобзарська школа в Стрітівці та сучасні виконавці (Василь Нечепа, Тарас Компаніченко)"
    key_concepts:
      - "репресії"
      - "відродження"
      - "культурна спадкоємність"

vocabulary:
  required:
    - бандурист
    - кобзар
    - лірник
    - речитатив
    - думи
    - приструнки
    - братство
    - імпровізувати
  recommended:
    - віртуозний
    - автентичний
    - епічний
    - репресований
    - архаїка

activities:
  types_required:
    - critical-analysis
    - select
    - fill-in
    - match-up
    - authorial-intent
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте мистецтвознавчу розвідку про еволюцію бандури. Визначте ключові
      технічні терміни та поясніть їхнє значення в контексті інструментобудування."
  - type: critical-analysis
    focus: "Проаналізуйте текст про Трагедію кобзарів 1930-х. Знайдіть авторські оцінки,
      аргументи та засоби переконання. Перекажіть основну тезу своїми словами."
  - type: match-up
    focus: "Зіставте терміни кобзарської традиції (заспів, речитатив, славословія,
      лебійська мова) з їхніми визначеннями українською."
  - type: fill-in
    focus: "Доповніть опис будови бандури відповідними термінами (приструнки, баси,
      гриф, корпус)."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у тексті про кобзарство: русизми, неточні
      терміни, стилістичні недоречності."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
  - "Авраменко, 11 клас (Укр. літ.) — усна народна творчість, народні думи"
  - "Караман, 10 клас (2018), §38 — Стилістично забарвлена лексика"
  - "Грушевський М. Історія української літератури — народний епос (загальна довідка)"

connects_to:
