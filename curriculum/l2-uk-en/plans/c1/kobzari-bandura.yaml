  required: '[]'
  recommended: '[]'
  forbidden: '[]'
persona:
  voice: Senior Specialist
  role: Цехмайстер
word_target: 4000
vocabulary_hints:
  required:
  - Кобзар (kobzar) — мандрівний кобзар, кобзарська традиція; традиційний співець-епік
  - Бандура (bandura) — грати на бандурі, чернігівська бандура; часто використовується
    у супроводі співу
  - Дума (duma) — епічна дума, виконувати думу; героїчний жанр українського фольклору
  - Цех (guild) — кобзарський цех, устав цеху; професійне об'єднання з суворою ієрархією
  - Епітет (epithet) — постійний епітет, художній епітет; ключовий засіб стандарту
    §4.4.3
  - Супровід (accompaniment) — музичний супровід, у супроводі бандури; часто використовується
    у дюмах
  recommended:
  - Лебійська мова (Lebiyska language) — таємне арго кобзарів для внутрішнього спілкування
  - Цехмайстер (cekhmeister) — голова кобзарського об'єднання; вищий ступінь в ієрархії
  - Постійний епітет (constant epithet) — традиційна художня формула («сизий орел»,
    «буйний вітер»)
  - Синтаксичний паралелізм (syntactic parallelism) — повтор структур для підсилення
    ритміки (§4.4.4)
  - Братищик (bratishchyk) — повноправний член кобзарського цеху
  - Мандрівний (wandering) — мандрівний співець; кочовий спосіб життя носіїв традиції
