module: c1-096
level: C1
sequence: 96
slug: vokalne-mystetstvo
version: '2.0'
title: Вокальне мистецтво
subtitle: Vocal Art
content_outline:
- section: 'Вступ: Голос як дзеркало душі (Introduction: Voice as a Mirror of the
    Soul)'
  words: 500
  points:
  - Поняття «кордоцентризму» (сердечності) як філософської основи української музичної
    культури
  - Огляд багатоголосої традиції від козацьких дум до сучасних хорових полотен
  - 'Естетичний опис вокалу: використання епітетів (оксамитовий, проникливий, дзвінкий)
    та метафор (тепла атмосфера) згідно з вимогами С1 (§4.4.3)'
- section: Хорова спадщина та «Золотий вік» (Choral Heritage and the 'Golden Age')
  words: 900
  points:
  - 'Тріумвірат «Золотого віку»: духовний вимір творчості Максима Березовського, Артема
    Веделя та Дмитра Бортнянського'
  - 'Національна капела «ДУМКА»: історія абревіатури (Державна українська мандрівна
    капела, 1919) та її просвітницька місія'
  - 'Сучасні хорові інституції: Капела Ревуцького та розвиток чоловічого хорового
    співу'
- section: 'Камерно-вокальний жанр: Романс (Chamber Vocal Genre: Art Song/Romance)'
  words: 800
  points:
  - 'Еволюція українського романсу: від засновника Миколи Лисенка та Якова Степового
    до сучасних інтерпретацій'
  - Аналіз взаємодії поетичного слова та музичної тканини в класичному романсі
  - 'Лексичний фокус: професійна термінологія для опису виконання (діапазон, тембр,
    колоратура, мелізматика)'
- section: Етно-хаос та фольк-ф’южн (Ethno-Chaos and Folk Fusion)
  words: 900
  points:
  - 'Гурт «ДахаБраха»: філософія стилю «етно-хаос» та глобальний прорив (NPR Tiny
    Desk Concert)'
  - 'Електронний фольклор: ONUKA — поєднання архаїчних інструментів та сучасного саунду'
  - 'Традиційна мелізматика в сучасному контексті: як автентичний спів стає частиною
    світової музичної сцени'
- section: Аналіз та вокальна школа (Analysis and Vocal School)
  words: 900
  points:
  - 'Типові помилки: розмежування значень «голос» (voice) та «голосування» (vote);
    правильне вживання «виконувати партію» замість калькованого «грати»'
  - 'Робота над стилістичним багатством: заміна примітивних оцінок (гарний, добрий)
    на професійні дескриптори (насичений, віртуозний)'
  - 'Творче завдання: написання есе-критики про розвиток української вокальної школи
    та її міжнародне значення'
focus: fine-arts
pedagogy: CBI
objectives:
- Learner explores the rich tradition of Ukrainian choral music.
- Learner understands the genre of art song (romance) in Ukraine.
- Learner can discuss contemporary vocal fusion projects.
grammar:
- Professional music terminology
- Descriptive aesthetics
phase: C1.7 [Fine Arts & High Culture]
persona:
  voice: Senior Specialist
  role: Оперний критик
word_target: 4000
vocabulary_hints:
  required:
  - тембр (timbre) — оксамитовий тембр, унікальний тембр; висока частотність у мистецькому
    дискурсі
  - діапазон (range) — широкий діапазон, голосовий діапазон; опис вокальних можливостей
  - акапела (a cappella) — співати акапела, акапельний спів; ключовий термін хорової
    традиції
  - колоратура (coloratura) — колоратурне сопрано, віртуозна колоратура; технічна
    складність вокалу
  - мелізматика (melismatics) — багата мелізматика, народна мелізматика; орнаментика
    співу
  - капела (chapel/choir) — хорова капела, Національна капела «Думка»; інституційне
    позначення колективу
  - виконувати (to perform) — виконувати партію, виконувати романс; вживання замість
    помилкового «грати» щодо вокалу
  - проникливий (penetrating/soulful) — проникливий спів, проникливе виконання; естетичний
    епітет С1
  recommended:
  - оксамитовий (velvety) — оксамитовий голос; метафоричний епітет для опису тембру
  - кордоцентризм (cordocentrism) — музичний кордоцентризм; філософський термін для
    опису «сердечності» культури
  - етно-хаос (ethno-chaos) — стиль етно-хаос; самоназва жанру гурту «ДахаБраха»
  - просвітницька місія (enlightenment mission) — виконувати просвітницьку місію;
    контекст історії капели «ДУМКА»
