module: c1-121
level: C1
sequence: 121
slug: vokalne-mystetstvo
version: '1.2'
title: "Вокальне мистецтво та камерно-інструментальна музика"
subtitle: "Вокальне мистецтво та камерно-інструментальна музика"
focus: culture
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити розвиток української вокальної школи та камерної музики."
  - "Ознайомитися з творчістю видатних українських співаків, що здобули світове визнання."
  - "Проаналізувати жанр солоспіву (романсу) в українській музичній культурі."
  - "Вивчити традиції українського хорового мистецтва та його сучасний стан."

reading_situations:
  - source_type: "біографічний нарис"
    topic: "Соломія Крушельницька: тріумф на світових сценах та вірність українській
      пісні."
    key_elements: ["bel canto", "Вагнерівська сопрано", "Чіо-Чіо-сан", "світова слава",
      "педагогічна спадщина"]
    motivation: "Робота з текстом про видатну особистість у контексті світової опери."
  - source_type: "музикознавча стаття"
    topic: "Український солоспів XIX-XX століть: поезія Шевченка та Франка в музичних
      інтерпретаціях."
    key_elements: ["інтимна лірика", "камерність", "вокальний цикл", "фортепіанний
          супровід", "гармонія"]
    motivation: "Аналіз взаємодії літератури та музики."

listening_situations:
  - media_type: "аудіо"
    setting: "Порівняльне прослуховування виконання народних пісень та романсів Борисом
      Гмирею та Оксаною Петрусенко."
    focus_points: ["тембр", "артикуляція", "емоційна наповненість", "техніка дихання"]
    motivation: "Розвиток слухового аналізу вокальної майстерності."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте феномен українського хорового співу як засобу збереження
      національної ідентичності. Яку роль відігравали хорові товариства ('Боян', 'Просвіта')
      у розвитку професійного мистецтва?"
    requirements: ["мінімум 350 слів", "використання термінів: акапела, партесний
          спів, диригент, партитура, хормейстер", "історичні приклади"]
    motivation: "Вдосконалення навичок письмової аргументації на історико-культурну
      тематику."
    model_answer: "Текст повинен висвітлювати шлях від давнього партесного співу до
      хорових шедеврів Леонтовича та Стеценка. Слід згадати про значення хорових колективів
      як осередків культурного життя та їхню роль у популяризації української музики
      за кордоном (напр., Капела Олександра Кошиця)."

discussion_topics:
  - context: "Сьогодні українська вокальна школа продовжує розвиватися, інтегруючи
      елементи джазу, естради та академічного вокалу (наприклад, творчість Квітки
      Цісик або сучасні етно-проєкти)."
    questions:
      - "У чому полягає унікальність тембрового забарвлення українського голосу?"
      - "Як популяризувати українську камерну музику серед сучасної молоді?"
    motivation: "Тренування навичок дискусії про естетичні аспекти мистецтва."

content_outline:
  - section: "Золоті голоси України"
    words: 1000
    subsections:
      - "Соломія Крушельницька: 'Вагнерівська примадонна' та рятівниця опери 'Мадам
        Баттерфляй'"
      - "Борис Гмиря та Оксана Петрусенко: еталони академічного вокалу радянської
        доби"
      - "Квітка Цісик: американське коріння та відродження українського романсу"
    key_concepts: ["bel canto", "тембр", "інтерпретація", "світова сцена"]
  - section: "Жанр солоспіву: поезія, що стала музикою"
    words: 1000
    subsections:
      - "Витоки українського романсу: від аматорського музикування до високого мистецтва"
      - "Камерно-вокальна творчість М. Лисенка, К. Стеценка, Я. Степового"
      - "Вплив поезії 'Розстріляного відродження' на вокальну музику 1920-х років"
    key_concepts: ["солоспів", "романс", "ліризм", "синтез мистецтв"]
  - section: "Хорова культура: від партесу до авангарду"
    words: 1000
    subsections:
      - "Партесний концерт як унікальне явище українського бароко (М. Дилецький)"
      - "Микола Леонтович: архітектор української хорової мініатюри"
      - "Сучасні хорові колективи ('Дударик', 'Київ', 'Щедрик') та їхня місія"
    key_concepts: ["акапела", "поліфонія", "хорова обробка", "духовна музика"]
  - section: "Камерно-інструментальне виконавство"
    words: 1000
    subsections:
      - "Становлення фортепіанної та скрипкової шкіл в Україні"
      - "Квартетне мистецтво: Квартет імені Лятошинського як еталон професіоналізму"
      - "Сучасні фестивалі камерної музики (LvivMozArt, Bouquet Kyiv Stage)"
    key_concepts: ["ансамбль", "квартет", "віртуозність", "просвітництво"]

vocabulary:
  required:
    - сопрано
    - альт
    - тенор
    - бас
    - тембр
    - акапела
    - романс
    - солоспів
    - партитура
    - камерний
  recommended:
    - кантилена
    - дикція
    - діапазон
    - вібрато
    - мелізм
    - супровід

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте текст про золоті голоси україни і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про жанр солоспіву: поезія, що стала музикою, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Золоті голоси України». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему золоті голоси україни."
  - type: comparative-study
    focus: "Порівняйте різні підходи до золоті голоси україни: Соломія Крушельницька: 'Вагнерівська примадонна' та рятівниця опери 'Мадам Батте. Визначте спільне та відмінне."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
  - "Авраменко, 11 клас (Укр. літ.) — музична культура, Леонтович"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"

connects_to:
