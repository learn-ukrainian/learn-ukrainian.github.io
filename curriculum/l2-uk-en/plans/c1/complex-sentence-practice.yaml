module: c1-051
level: C1
sequence: 51
slug: complex-sentence-practice
version: '1.1'
title: "Практикум зі складного синтаксису"
subtitle: "Complex Syntax Workshop"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Закріпити практичні навички вживання всіх типів складних речей у власному мовленні."
  - "Вдосконалити вміння пунктуаційного оформлення складних синтаксичних конструкцій."
  - "Навчитися стилістично обґрунтовано вибирати тип складного речення залежно від мети комунікації."
  - "Підготуватися до фінального тестування зі складного синтаксису української мови."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Методологія лінгвістичного аналізу тексту: використання складного синтаксису для точності формулювань."
    key_elements: ["верифікація", "дедукція", "емпіричні дані"]
    motivation: "Аналіз ролі синтаксису в забезпеченні наукової об'єктивності."
  - source_type: "художній уривок"
    topic: "Психологічна проза Миколи Хвильового: складний синтаксис як дзеркало внутрішнього хаосу та пошуку."
    key_elements: ["модернізм", "потік свідомості", "ритмізована проза"]
    motivation: "Вивчення експресивних можливостей синтаксису в літературі."

listening_situations:
  - media_type: "відео"
    setting: "Виступ українського інтелектуала на конференції TEDx про майбутнє освіти."
    focus_points: ["використання складних речей у публічній промові", "паузація та інтонація як засоби структурування думки"]
    motivation: "Сприйняття та аналіз складних конструкцій у сучасному ораторському мистецтві."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть підсумкове есе на тему 'Сила слова в епоху цифрових технологій', інтегруючи різні типи складних речей (ССР, СПР, БСР, змішані)."
    requirements: ["мінімум 350 слів", "використання принаймні по два речення кожного вивченого типу", "бездоганна пунктуація"]
    motivation: "Фінальна демонстрація володіння складним синтаксисом."
    model_answer: "Есе має бути зразком академічного стилю з багатим лексичним наповненням та досконалою синтаксичною структурою."

discussion_topics:
  - context: "Чи може мова бути інструментом маніпуляції свідомістю мас?"
    questions:
      - "Яку роль відіграє складний синтаксис у пропаганді та рекламі?"
      - "Як критичне ставлення до структури тексту допомагає розпізнавати маніпуляції?"
    motivation: "Розвиток критичного мислення через аналіз синтаксичних структур."

content_outline:
  - section: "Комплексне повторення типів складних речей"
    words: 1000
    subsections:
      - "Диференціація сполучникового та безсполучникового зв'язку"
      - "Типологія підрядних речень: від означальних до обставинних"
      - "Специфіка багатокомпонентних конструкцій"
    key_concepts:
      - "синтаксична система"
      - "функціональність"
      - "когерентність"
  - section: "Пунктуаційний інтенсив"
    words: 1000
    subsections:
      - "Складні випадки вживання розділових знаків: тире проти двокрапки"
      - "Кома при збігу сполучників та в реченнях з різними видами зв'язку"
      - "Пунктуація при цитуванні та оформленні непрямої мови"
    key_concepts:
      - "пунктограма"
      - "авторський знак"
      - "нормативність"
  - section: "Стилістичний вибір синтаксичних конструкцій"
    words: 1000
    subsections:
      - "Синтаксис наукового стилю: об'єктивність та логіка"
      - "Публіцистичний синтаксис: експресія та заклик"
      - "Синтаксичні особливості офіційно-ділового мовлення: стандартизація"
    key_concepts:
      - "стилістична норма"
      - "функціональний стиль"
      - "прагматика"
  - section: "Редагування та вдосконалення текстів"
    words: 1000
    subsections:
      - "Аналіз типових помилок у складних реченнях"
      - "Методики спрощення складних конструкцій без втрати змісту"
      - "Вимоги до академічного письма рівня C1"
    key_concepts:
      - "редагування"
      - "лаконізм"
      - "досконалість"

vocabulary:
  required:
    - синтаксис
    - конструкція
    - зв'язок
    - пунктуація
    - стилістика
    - речення
    - складний
    - аналіз
  recommended:
    - варіативність
    - експресивність
    - гармонійність
    - переконливість
    - інтелектуальність

activity_hints:
  - type: error-correction
    description: "Fix all types of syntactic and punctuation errors in a complex academic text — including nested clauses, conjunction clashes, and run-on sentences."
  - type: critical-analysis
    description: "Compare two versions of the same text — one using simple sentences and one using complex syntax — and analyze how complexity affects persuasiveness and register."
  - type: essay-response
    description: "Write a structured academic paragraph (150-200 words) using at least one example of each complex sentence type (ССР, СПР, БСР, змішане)."
  - type: match-up
    description: "Match sentence types with their most common functional contexts (науковий стиль, публіцистика, офіційно-діловий)."
  - type: select
    description: "Choose the most stylistically appropriate sentence structure for given communicative situations (academic paper, news article, official letter)."

activities:
  types_required:
    - error-correction
    - critical-analysis
    - essay-response
    - translate
    - match-up
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Заболотний, 9 клас (2017): §25-40 — Складне речення (повний огляд)"
  - "Авраменко, 9 клас (2017): §14-28 — Складне речення (повний огляд)"
  - "Глазова, 11 клас (2019): §25 — Правила будови складних речень"

