module: c1-061
level: C1
sequence: 61
slug: complex-sentence-practice
version: 1.1.1
title: Практикум зі складного синтаксису
subtitle: Практикум зі складного синтаксису
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
- Закріпити практичні навички вживання всіх типів складних речей у власному мовленні.
- Вдосконалити вміння пунктуаційного оформлення складних синтаксичних конструкцій.
- Навчитися стилістично обґрунтовано вибирати тип складного речення залежно від мети комунікації.
- Підготуватися до фінального тестування зі складного синтаксису української мови.
reading_situations:
- source_type: наукова стаття
  topic: 'Методологія лінгвістичного аналізу тексту: використання складного синтаксису для точності формулювань.'
  key_elements:
  - верифікація
  - дедукція
  - емпіричні дані
  motivation: Аналіз ролі синтаксису в забезпеченні наукової об'єктивності.
- source_type: художній уривок
  topic: 'Психологічна проза Миколи Хвильового: складний синтаксис як дзеркало внутрішнього хаосу та пошуку.'
  key_elements:
  - модернізм
  - потік свідомості
  - ритмізована проза
  motivation: Вивчення експресивних можливостей синтаксису в літературі.
listening_situations:
- media_type: відео
  setting: Виступ українського інтелектуала на конференції TEDx про майбутнє освіти.
  focus_points:
  - використання складних речей у публічній промові
  - паузація та інтонація як засоби структурування думки
  motivation: Сприйняття та аналіз складних конструкцій у сучасному ораторському мистецтві.
writing_tasks:
- task_type: есе
  prompt: Напишіть підсумкове есе на тему 'Сила слова в епоху цифрових технологій', інтегруючи різні типи складних речей (ССР,
    СПР, БСР, змішані).
  requirements:
  - мінімум 350 слів
  - використання принаймні по два речення кожного вивченого типу
  - бездоганна пунктуація
  motivation: Фінальна демонстрація володіння складним синтаксисом.
  model_answer: Есе має бути зразком академічного стилю з багатим лексичним наповненням та досконалою синтаксичною структурою.
discussion_topics:
- context: Чи може мова бути інструментом маніпуляції свідомістю мас?
  questions:
  - Яку роль відіграє складний синтаксис у пропаганді та рекламі?
  - Як критичне ставлення до структури тексту допомагає розпізнавати маніпуляції?
  motivation: Розвиток критичного мислення через аналіз синтаксичних структур.
content_outline:
- section: Комплексне повторення типів складних речей
  words: 1000
  subsections:
  - Диференціація сполучникового та безсполучникового зв'язку
  - 'Типологія підрядних речень: від означальних до обставинних'
  - Специфіка багатокомпонентних конструкцій
  key_concepts:
  - синтаксична система
  - функціональність
  - когерентність
- section: Пунктуаційний інтенсив
  words: 1000
  subsections:
  - 'Складні випадки вживання розділових знаків: тире проти двокрапки'
  - Кома при збігу сполучників та в реченнях з різними видами зв'язку
  - Пунктуація при цитуванні та оформленні непрямої мови
  key_concepts:
  - пунктограма
  - авторський знак
  - нормативність
- section: Стилістичний вибір синтаксичних конструкцій
  words: 1000
  subsections:
  - 'Синтаксис наукового стилю: об''єктивність та логіка'
  - 'Публіцистичний синтаксис: експресія та заклик'
  - 'Синтаксичні особливості офіційно-ділового мовлення: стандартизація'
  key_concepts:
  - стилістична норма
  - функціональний стиль
  - прагматика
- section: Редагування та вдосконалення текстів
  words: 1000
  subsections:
  - Аналіз типових помилок у складних реченнях
  - Методики спрощення складних конструкцій без втрати змісту
  - Вимоги до академічного письма рівня C1
  key_concepts:
  - редагування
  - лаконізм
  - досконалість
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
  - синтаксис
  - конструкція
  - зв'язок
  - пунктуація
  - стилістика
  - речення
  - складний
  - аналіз
  recommended:
  - варіативність
  - експресивність
  - гармонійність
  - переконливість
  - інтелектуальність
activity_hints:
- type: reading
  focus: Прочитайте текст про комплексне повторення типів складних речей і дайте відповіді на запитання.
- type: essay-response
  focus: Напишіть 5 речень, використовуючи нову лексику з розділу «Пунктуаційний інтенсив».
- type: fill-in
  focus: Вставте правильну граматичну форму у реченнях на тему комплексне повторення типів складних речей.
- type: error-correction
  focus: Знайдіть і виправте помилки у реченнях на тему пунктуаційний інтенсив.
- type: quiz
  focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Комплексне повторення типів складних речей».'
- type: match-up
  focus: З'єднайте терміни з розділу «Пунктуаційний інтенсив» з їхніми визначеннями.
activities:
