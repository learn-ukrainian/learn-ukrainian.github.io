module: c1-026
level: C1
sequence: 26
slug: media-landscape
version: '2.0'
title: 'Медіаландшафт: Як не потонути в інформації'
content_outline:
- section: 'Вступ: Роль медіа в сучасному суспільстві (Introduction: The Role of Media
    in Modern Society)'
  words: 450
  points:
  - 'Огляд українського медіаландшафту згідно з державним стандартом §3.20: вплив
    ЗМІ на суспільну думку.'
  - Поняття інформаційної гігієни та медіаграмотності як ключових компетенцій рівня
    C1.
  - 'Learner error: Узгодження слова «медіа» — виправлення кальки з англійської (медіа
    повідомляють/інформують) та вживання ЗМІ як множини.'
- section: Структура власності та типи медіа (Ownership Structure and Media Types)
  words: 650
  points:
  - 'Державні vs Суспільні медіа: роз''яснення різниці між «державним» та «суспільним»
    (Suspilne) мовленням для уникнення типових помилок.'
  - 'Приватні та олігархічні медіа: аналіз впливу власників на редакційну політику
    та виникнення політичної упередженості.'
  - 'Cultural Hook: Феномен телемарафону «Єдині новини» під час повномасштабного вторгнення
    — дискусія про централізацію vs свободу слова.'
- section: Журналістські стандарти та медіаграмотність (Journalistic Standards and
    Media Literacy)
  words: 750
  points:
  - 'Базові професійні стандарти: баланс думок, достовірність, відокремлення фактів
    від коментарів та повнота інформації.'
  - 'Оцінка джерел: робота з першоджерелами, верифікованими та сумнівними джерелами
    інформації (§4.4.1.1 — публіцистичний стиль).'
  - Виявлення прихованої та явної упередженості в текстах новинних видань та соціальних
    мережах.
- section: Протидія дезінформації та маніпуляціям (Countering Disinformation and Manipulation)
  words: 800
  points:
  - 'Cultural Hook: Роль StopFake як одного з перших у світі центрів фактчекінгу,
    заснованого в Україні для боротьби з пропагандою.'
  - 'Методи пропаганди та маніпуляції свідомістю: емоційна лексика, клікбейтні заголовки
    та викривлення контексту.'
  - 'Learner error: Розрізнення синонімів «фейковий» (для новин/акаунтів) та «фальшивий»
    (для грошей/документів) — дрилі на контекстуальне вживання.'
- section: Критичний аналіз медіатекстів (Critical Analysis of Media Texts)
  words: 800
  points:
  - 'Практичний аналіз новинних статей за структурою тексту (§4.4.4): заголовки, ліди,
    бекграунд та цитування.'
  - 'Верифікація інформації: алгоритм перевірки достовірності новини перед поширенням
    (фактчекінг).'
  - Порівняльний аналіз висвітлення однієї події різними медіа-ресурсами для виявлення
    маніпулятивних прийомів.
- section: Свобода слова в умовах війни (Freedom of Speech in Wartime Conditions)
  words: 550
  points:
  - 'Права та безпека журналістів у зонах конфлікту: виклики для професійної діяльності
    та цензура.'
  - 'Баланс між національною безпекою та правом на інформацію: міжнародні стандарти
    та український досвід.'
  - 'Підсумкова дискусія: як медіаграмотність допомагає зберігати критичне мислення
    в умовах інформаційної війни.'
vocabulary_hints:
  required:
  - ЗМІ (mass media) — засоби масової інформації; вживається як множина (ЗМІ повідомили);
    high-frequency.
  - джерело (source) — першоджерело, сумнівне джерело, верифіковане джерело; посилатися
    на джерело.
  - упередженість (bias) — явна/прихована упередженість, політична упередженість;
    уникнути упередженості.
  - дезінформація (disinformation) — поширювати дезінформацію, кампанія з дезінформації,
    боротьба з дезінформацією.
  - маніпуляція (manipulation) — маніпуляція свідомістю, медійна маніпуляція, піддаватися
    маніпуляції.
  - достовірність (reliability) — перевірка достовірності, сумніватися в достовірності;
    mid-frequency academic.
  - фейковий (fake) — фейкова новина, фейковий акаунт; не плутати з «фальшивий» (fake/forged
    objects).
  - фактчекінг (fact-checking) — інструменти фактчекінгу, займатися фактчекінгом;
    modern media terminology.
  - суспільне мовлення (public broadcasting) — незалежне від держави медіа; ключове
    для українського контексту.
  - свобода слова (freedom of speech) — загроза свободі слова, обмеження свободи слова
    в умовах війни.
  recommended:
  - інформаційна гігієна (information hygiene) — дотримання правил споживання інформації;
    high-frequency context.
  - олігархічні медіа (oligarch-owned media) — медіа, що належать великому бізнесу;
    політичний контекст.
  - баланс думок (balance of opinions) — журналістський стандарт, що передбачає висвітлення
    різних точок зору.
  - клікбейт (clickbait) — маніпулятивний заголовок для залучення уваги; лексика соцмереж.
  - верифікація (verification) — процес перевірки даних на відповідність дійсності.
  - першоджерело (primary source) — оригінальний документ або пряме свідчення події.
