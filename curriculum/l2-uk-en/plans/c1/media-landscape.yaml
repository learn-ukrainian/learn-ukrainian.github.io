module: c1-030
level: C1
sequence: 30
slug: media-landscape
version: '1.1'
title: "Медіаландшафт України: Інформаційна гігієна та критичний аналіз"
subtitle: "Медіаландшафт та інформаційна гігієна"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Аналізувати структуру, власність та жанрову специфіку сучасних українських медіа."
  - "Опанувати методи деконструкції маніпуляцій, фейків та пропаганди."
  - "Розвинути навички критичного споживання контенту в різних форматах (ТБ, преса,
    соцмережі)."
  - "Розуміти роль журналістської етики та свободи слова в демократичному суспільстві."

reading_situations:
  - source_type: "новина"
    topic: "Порівняльний аналіз висвітлення резонансної події в різних медіа (державних,
      олігархічних, незалежних)."
    key_elements: ["фреймінг", "емоційне забарвлення", "баланс думок"]
    motivation: "Виявлення прихованих підтекстів та журналістської упередженості."
  - source_type: "художній уривок"
    topic: "Сатира на медійне середовище у сучасній українській літературі (напр.,
      Сергій Жадан)."
    key_elements: ["іронія", "гротеск", "симулякр"]
    motivation: "Розуміння культурної рефлексії на медійну реальність."

listening_situations:
  - media_type: "відео"
    setting: "Випуск проекту 'StopFake' про викриття чергової дезінформаційної кампанії
      проти України."
    focus_points: ["першоджерела", "маніпуляція зображеннями", "логічні помилки"]
    motivation: "Формування навичок перевірки фактів (fact-checking) на слух."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть аналітичну записку про стан свободи слова в Україні в умовах
      воєнного стану. Де межа між безпекою та цензурою?"
    requirements: ["мінімум 250 слів", "використання термінів 'акредитація', 'дискредитація',
          'плюралізм'", "об'єктивність"]
    motivation: "Відпрацювання навичок публіцистичного письма на складні теми."
    model_answer: "Текст має збалансовано висвітлювати аргументи на користь інформаційної
      безпеки та необхідності громадського контролю. Використання складних синтаксичних
      конструкцій з підрядним причини та наслідку."

discussion_topics:
  - context: "Соціальні мережі як замінник традиційних ЗМІ: переваги оперативності
      vs ризики 'ехо-камер'."
    questions:
      - "Чи несе Telegram загрозу національній безпеці через анонімність?"
      - "Як алгоритми Facebook впливають на поляризацію українського суспільства?"
      - "Чи має держава регулювати діяльність блогерів як засобів масової інформації?"
    motivation: "Розвиток дискусійних навичок у сфері медіаправа та соціології."

content_outline:
  - section: "Структура медіаринку України"
    words: 1000
    subsections:
      - "Суспільне мовлення vs приватні медіахолдинги: моделі фінансування та впливу"
      - "Регіональні медіа: виклики виживання та локальний контекст"
      - "Цифрові медіа та конвергенція: нові формати подачі інформації"
    key_concepts:
      - "медіавласність"
      - "плюралізм"
      - "конвергенція"
  - section: "Психологія сприйняття та маніпуляції"
    words: 1000
    subsections:
      - "Механізми впливу на емоції: страх, гнів, надія в заголовках"
      - "Стереотипізація та 'мова ворожнечі' в інформаційному просторі"
      - "Інформаційні операції та методи протидії психологічному тиску (ІПСО)"
    key_concepts:
      - "клікбейт"
      - "дискредитація"
      - "інформаційна бульбашка"
  - section: "Інструментарій фактчекінгу та гігієни"
    words: 1000
    subsections:
      - "Алгоритм перевірки джерел та автентичності візуального контенту"
      - "Робота з відкритими даними (OSINT) як метод сучасної журналістики"
      - "Етика журналістики: стандарти ВВС та український Кодекс етики"
    key_concepts:
      - "верифікація"
      - "першоджерело"
      - "джинса"
  - section: "Сторітелінг та вплив на суспільство"
    words: 1000
    subsections:
      - "Як медіа формують героїв та антигероїв національного наративу"
      - "Роль документального кіно та розслідувань у боротьбі з корупцією"
      - "Медіаграмотність як ключова навичка сучасного громадянина"
    key_concepts:
      - "наратив"
      - "адвокація"
      - "громадянська позиція"

vocabulary:
  required:
    - маніпуляція
    - цензура
    - пропаганда
    - верифікація
    - репутація
    - контекст
    - плюралізм
    - дискурс
  recommended:
    - неупередженість
    - об'єктивність
    - резонанс
    - транспарентність
    - акредитація

activity_hints:
  - type: critical-analysis
    description: "Compare coverage of the same event across different Ukrainian media
      (state, oligarchic, independent) — identify framing, bias, and manipulation
      techniques."
  - type: error-correction
    description: "Identify and correct manipulative language techniques in news headlines
      — replace clickbait and emotional markers with neutral formulations."
  - type: match-up
    description: "Match media manipulation techniques (фреймінг, клікбейт, дискредитація)
      with real-world examples and countermeasures."
  - type: select
    description: "Choose the correct fact-checking approach for different types of
      misinformation (фейк, маніпуляція, ІПСО)."
  - type: essay-response
    description: "Write an analytical note (250+ words) about freedom of speech during
      martial law — balance security concerns with democratic principles."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - select
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Авраменко, 11 клас (2019): Діалекти, суржик, мовна політика"
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка"
  - "State Standard 2024: C1 section on media literacy and critical analysis"

connects_to:
  previous: "political-system"
  next: "global-context"
phase: C1.2 [Professional & Social Context]
