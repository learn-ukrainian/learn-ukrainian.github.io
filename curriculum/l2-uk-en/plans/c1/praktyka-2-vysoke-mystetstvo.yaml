module: c1-131
level: C1
sequence: 131
slug: praktyka-2-vysoke-mystetstvo
version: 1.1.1
title: 'Практика II: Високе мистецтво та культурна дипломатія'
subtitle: 'Практика II: високе мистецтво та культурна дипломатія'
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
- Опанувати професійну лексику та стилістичні конструкції, необхідні для критичного аналізу сучасного мистецтва.
- Розвинути навички кураторського планування та написання концептуальних текстів для мистецьких проектів.
- Дослідити роль мистецтва як інструменту культурної дипломатії та 'м'якої сили' України на міжнародній арені.
- Проаналізувати етичні та економічні аспекти функціонування сучасного арт-ринку в умовах цифровізації.
reading_situations:
- source_type: кураторський маніфест
  topic: 'Концепція національного павільйону України на Венеційській бієнале: від рефлексії минулого до візії майбутнього.'
  key_elements:
  - дискурс
  - експозиція
  - інсталяція
  - кураторський задум
  - співтворчість
  motivation: Робота з високопрофесійним концептуальним текстом, що вимагає глибокого розуміння контексту.
- source_type: теоретичне есе
  topic: 'Мистецтво після 2022: як війна змінює оптику сприйняття та функцію художнього образу.'
  key_elements:
  - травма
  - документальність
  - етика репрезентації
  - деколонізація мистецтва
  motivation: Аналіз складних філософських та етичних проблем через призму мистецтвознавчої термінології.
listening_situations:
- media_type: подкаст
  setting: Дискусія між директором музею та арт-критиком про стратегії виживання та розвитку культурних інституцій під час
    глобальних криз.
  focus_points:
  - інституційна стійкість
  - цифровізація колекцій
  - взаємодія з локальною громадою
  - фандрейзинг
  motivation: Розвиток навичок розуміння фахової дискусії з елементами стратегічного планування.
- media_type: лекція
  setting: Фрагмент виступу експерта з культурної дипломатії про успішні кейси просування українського мистецтва за кордоном.
  focus_points:
  - культурна суб'єктність
  - наративи в мистецтві
  - міжнародні партнерства
  - подолання стереотипів
  motivation: Ознайомлення з термінологією у сфері міжнародних культурних відносин.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть аналітичний репортаж з відкриття уявної виставки сучасного українського авангарду в одній із провідних
    галерей світу. Опишіть реакцію публіки, ключові роботи та загальну атмосферу.
  requirements:
  - мінімум 400 слів
  - використання художніх засобів (епітети, метафори)
  - аналіз зв'язку між експозицією та сучасним політичним контекстом
  motivation: Вдосконалення навичок поєднання описового та аналітичного стилів письма.
  model_answer: Репортаж має включати опис візуальних характеристик вибраних творів, цитати (уявні) відвідувачів та куратора,
    а також глибокий аналіз того, як виставка сприяє зміні сприйняття України в очах іноземного глядача.
discussion_topics:
- context: Сьогодні точиться дискусія щодо 'скасування' російської культури в контексті деколонізації. Дехто вважає це необхідним
    кроком для звільнення простору для українського голосу, інші вбачають у цьому загрозу свободі мистецтва.
  questions:
  - Чи може мистецтво бути поза політикою, коли воно використовується як інструмент імперського впливу?
  - Як збалансувати процес деколонізації власного культурного канону з відкритістю до глобального світу?
  motivation: Практика ведення складної полеміки на межі мистецтвознавства, політології та етики.
