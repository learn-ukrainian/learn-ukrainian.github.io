activity_hints:
- type: reading
  focus: Прочитайте текст про мова мистецтвознавчої критики та теорії і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про кураторство як інтелектуальний проект, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Мова мистецтвознавчої критики та теорії». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему мова мистецтвознавчої критики та теорії.
- type: comparative-study
  focus: 'Порівняйте різні підходи до мова мистецтвознавчої критики та теорії: Аналітичний апарат: від формалізму до постструктуралізму.
    Визначте спільне та відмінне.'
