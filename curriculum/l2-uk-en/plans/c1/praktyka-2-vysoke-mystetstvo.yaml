module: c1-090
level: C1
sequence: 90
slug: praktyka-2-vysoke-mystetstvo
version: '2.0'
title: Практика II — Високе мистецтво
subtitle: Practice II — Fine Arts
content_outline:
- section: 'Вступ: Культурна спадкоємність (Introduction: Cultural Continuity)'
  words: 500
  points:
  - 'Вступ до поняття культурної спадкоємності: огляд еволюції від ікони до авангарду
    та музичного шляху від Бортнянського до Сильвестрова'
  - Обговорення ролі меценатства в українській історії як фундаменту для розвитку
    високого мистецтва та збереження національної ідентичності
- section: Український бренд у світовому контексті (The Ukrainian Brand in World Context)
  words: 900
  points:
  - 'Феномен Марії Примаченко: аналіз «наївного мистецтва» через призму цитати Пабло
    Пікассо про «художнє диво» та світове визнання її фантастичних звірів'
  - 'Постать Сержа Лифаря як реформатора французького балету: аналіз його ідентичності
    («Serge Lifar de Kiev») та свідомого вибору на користь українського походження'
  - 'Внесок Архипенка та Малевича у світовий авангард: розгляд українського коріння
    глобальних модерністських течій та їхнього впливу на сучасне мистецтво'
- section: 'Театр та музика: Синтез мистецтв (Theater and Music: Synthesis of Arts)'
  words: 900
  points:
  - 'Лесь Курбас і театр «Березіль»: вивчення методу «перетворення» та синтезу філософії
    з театральною традицією у співпраці з Миколою Кулішем'
  - 'Музична еволюція: порівняльний аналіз творчості Лисенка та Бортнянського як представників
    різних епох, що заклали основи української класики'
  - 'Мистецька синергія: огляд того, як музика, опера та візуальне мистецтво взаємодіяли
    в межах українського театрального модернізму'
- section: Мистецтвознавчий аналіз та критика (Art History Analysis and Criticism)
  words: 900
  points:
  - 'Стилістичний аналіз: практичне застосування художнього та наукового стилів (згідно
    з §4.4.1.1 Держстандарту) для опису високого мистецтва'
  - 'Написання мистецтвознавчої рецензії: використання термінології (новаторство,
    авангард, перформанс) для професійного аналізу театральної чи оперної вистави'
  - 'Аналіз символіки: детальне обговорення стилістичних засобів та художніх образів
    у творах класичного та сучасного живопису'
- section: 'Практикум: Культура мовлення та стилістика (Workshop: Speech Culture and
    Stylistics)'
  words: 800
  points:
  - 'Робота над лексичними помилками: розрізнення понять «артист» (виконавець), «художник»
    (живописець) та «митець» (творець) для уникнення калькування'
  - 'Стилістичний практикум: заміна розмовної лексики («круто», «прикольно») на академічні
    епітети («вражаюче полотно», «майстерне виконання», «глибина задуму»)'
  - 'Граматичний тренінг: корекція керування прийменника «завдяки» (використання давального
    відмінка «завдяки таланту» замість помилкового родового)'
focus: practice
pedagogy: Immersion & Analysis
objectives:
- Review and integrate knowledge of Ukrainian fine arts
- Analyze the contribution of Ukrainian artists to world culture
- Master high-register arts vocabulary
grammar:
- Integrated Stylistic Analysis
- Comparative Art Register
phase: C1.5 Folk Culture & Fine Arts
persona:
  voice: Senior Specialist
  role: Меценат
word_target: 4000
vocabulary_hints:
  required:
  - Спадкоємність (continuity) — культурна спадкоємність, збереження спадкоємності;
    високий регістр, ключове для C1
  - Новаторство (innovation) — мистецьке новаторство, сміливе новаторство, традиції
    та новаторство; термін мистецтвознавчого аналізу
  - Авангард (avant-garde) — український авангард, представники авангарду; часто в
    контексті Malevich/Archipenko
  - Меценат (patron) — роль меценатства, підтримка меценатів; вживається в історичному
    та культурному контекстах
  - Перформанс (performance) — мистецький перформанс, учасник перформансу; термін
    сучасного інтерактивного мистецтва
  recommended:
  - Митець (artist/creator) — загальна назва для творця; коректний замінник калькованого
    'артист'
  - Художник (painter) — вузьке значення (живописець); вживати для авторів картин
  - Полотно (canvas) — синонім до 'картина' у високому стилі та мистецтвознавстві
  - Рецензія (review) — основний жанр для критичного аналізу творів мистецтва
  - Наївне мистецтво (naive art) — стиль Марії Примаченко; характеризується простотою
    та щирістю
