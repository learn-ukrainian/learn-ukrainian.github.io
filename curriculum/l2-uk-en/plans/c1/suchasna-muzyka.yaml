module: c1-109
level: C1
sequence: 109
slug: suchasna-muzyka
version: '1.2'
title: "Сучасна українська музика: Від ВІА до світових чартів"
subtitle: "Contemporary Ukrainian Music: From VIA to Global Charts"
focus: culture
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати еволюцію української популярної музики від 1960-х років до сьогодні."
  - "Дослідити феномен українських ВІА та роль Володимира Івасюка у відродженні національної пісні."
  - "Вивчити розвиток українського року, хіп-хопу та електронної музики в умовах незалежності."
  - "Ознайомитися з успішними прикладами українського музичного експорту (Jamala, ONUKA, DakhaBrakha)."

reading_situations:
  - source_type: "культурологічне есе"
    topic: "Феномен 'Червоної рути' 1989 року: музичний вибух як передвісник незалежності."
    key_elements: ["фестиваль", "альтернатива", "протест", "національне відродження", "хіт"]
    motivation: "Робота з текстом про вплив музики на суспільно-політичні процеси."
  - source_type: "музична рецензія"
    topic: "Етно-хаос гурту DakhaBrakha: як локальний фольклор став світовим трендом."
    key_elements: ["автентика", "кросовер", "світова музика (World Music)", "перформанс", "ідентичність"]
    motivation: "Аналіз сучасних музичних стратегій та жанрових змішувань."

listening_situations:
  - media_type: "аудіо-добірка"
    setting: "Прослуховування та аналіз трансформації пісні 'Червона рута': від оригіналу В. Івасюка до сучасних реміксів та каверів."
    focus_points: ["аранжування", "ритміка", "вокальна подача", "емоційний меседж"]
    motivation: "Розвиток навичок порівняльного аналізу музичних інтерпретацій."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте роль української мови в сучасній музичній індустрії України. Як змінилося ставлення виконавців та слухачів до україномовного контенту після 2014 та 2022 років?"
    requirements: ["мінімум 400 слів", "використання термінів: ротація, квоти, стрімінг, чарт, автентичність, шоу-бізнес", "аргументована позиція"]
    motivation: "Синтез соціолінгвістичних та культурних знань."
    model_answer: "Текст має висвітлювати шлях від домінування російськомовного продукту до повного переходу на українську мову. Автор повинен згадати про вплив законодавчих квот на радіо, а також про те, як війна стала каталізатором пошуку нових смислів та автентичного звучання у всіх жанрах — від попу до металу."

discussion_topics:
  - context: "Українські виконавці все частіше перемагають на міжнародних конкурсах (Євробачення) та виступають на найбільших фестивалях світу (Glastonbury, Coachella)."
    questions:
      - "У чому секрет успіху сучасної української музики на міжнародній арені: екзотика чи висока якість продукту?"
      - "Чи повинна держава підтримувати музичний експорт, і якщо так, то якими методами?"
    motivation: "Тренування навичок дискусії про культурну політику та шоу-бізнес."

content_outline:
  - section: "Епоха ВІА та Володимир Івасюк"
    words: 1000
    subsections:
      - "Золота доба української естради 1970-х: 'Смерічка', 'Водограй'"
      - "Володимир Івасюк: геній національного мелодизму та його трагічна доля"
      - "Вплив фольклору на формування стилю українських вокально-інструментальних ансамблів"
    key_concepts: ["ВІА", "естрада", "фольк-рок", "мелодизм"]
  - section: "Музична революція 1990-х"
    words: 1000
    subsections:
      - "Фестиваль 'Червона рута' та поява нової музичної хвилі"
      - "Становлення українського року: Океан Ельзи, ВВ, Плач Єремії"
      - "Територія А та перші кроки українського шоу-бізнесу"
    key_concepts: ["альтернатива", "хіт-парад", "незалежність", "культовий"]
  - section: "Різноманіття жанрів у XXI столітті"
    words: 1000
    subsections:
      - "Український хіп-хоп: від ТНМК до alyona alyona"
      - "Інді-сцена та електроніка: ONUKA, The Hardkiss, Go_A"
      - "Джаз та експериментальна музика в Україні"
    key_concepts: ["хіп-хоп", "інді", "електроніка", "синті-поп"]
  - section: "Українська музика у глобальному контексті"
    words: 1000
    subsections:
      - "Феномен Євробачення: Руслана, Джамала, Kalush Orchestra"
      - "Культурна дипломатія через музику під час війни"
      - "Стрімінгові платформи як засіб популяризації українського контенту у світі"
    key_concepts: ["євробачення", "стримінг", "глобалізація", "резистентність"]

vocabulary:
  required:
    - аранжування
    - фонограма
    - продюсер
    - альбом
    - сингл
    - чарт
    - ротація
    - фестиваль
    - вокал
    - кліп
  recommended:
    - саунд-продюсер
    - реліз
    - фіт
    - кавер
    - ремікс
    - бек-вокал

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте культурологічне есе про фестиваль 'Червона рута'. Визначте, як автор аргументує зв'язок між музикою та суспільними змінами."
  - type: critical-analysis
    focus: "Проаналізуйте музичну рецензію на гурт DakhaBrakha. Визначте авторську оцінку жанрового кросоверу та знайдіть стилістичні прийоми."
  - type: match-up
    focus: "Зіставте музичні терміни (аранжування, продюсер, ротація, сингл, чарт, кавер) з їхніми визначеннями."
  - type: fill-in
    focus: "Доповніть текст про розвиток української популярної музики відповідними термінами (естрада, хіп-хоп, інді, стрімінг, фестиваль)."
  - type: essay-response
    focus: "Напишіть аналітичний текст про роль української мови в сучасній музичній індустрії. Аргументуйте змінами після 2014 та 2022 років."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"
  - "Сучасні медійні джерела — українська музична індустрія (загальна довідка)"

connects_to:
