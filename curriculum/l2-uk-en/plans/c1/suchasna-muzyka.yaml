slug: suchasna-muzyka
version: '2.0'
title: Сучасна музика
subtitle: Contemporary Music — The Sound of Freedom
content_outline:
- section: 'Вступ: Революція звуку (Introduction: Sound Revolution)'
  words: 600
  points:
  - 'Аналіз поворотного моменту 1989 року: фестиваль «Червона Рута» як політична маніфестація та народження сучасної музичної
    сцени (відповідно до стандарту §3.4).'
  - 'Культурний гачок: обговорення символізму першого публічного виконання гімну України на великій сцені в Чернівцях, що
    активувало рух за незалежність.'
  - 'Роль фестивалів у формуванні молодіжних субкультур (§3.7): від андерграундних гуртів 80-х до сучасних опен-ейрів як простору
    свободи.'
- section: Легенди українського року (Legends of Ukrainian Rock)
  words: 900
  points:
  - 'Творчий шлях гуртів ВВ (Воплі Відоплясова) та Океан Ельзи: як український рок став головним символом покоління незалежності
    та культурного спротиву.'
  - 'Стилістичний аналіз текстів Святослава Вакарчука: робота з метафорами та філософським підтекстом для вираження національної
    ідентичності на рівні C1.'
  - 'Феномен ''Music of the underground'': аналіз акустичних концертів у метро під час вторгнення 2022 року як символу духовної
    незламності.'
- section: Експерименти та фольк-ф’южн (Experiments and Folk-Fusion)
  words: 900
  points:
  - Перемоги на Євробаченні (Руслана, Джамала, Kalush Orchestra) як інструмент культурної дипломатії та деколонізації («1944»,
    «Stefania»).
  - 'Аналіз тренду фольк-ф’южн: інтеграція архаїчних елементів (сопілка, ''білий голос'') в електроніку на прикладі творчості
    ONUKA та Go_A.'
  - 'Обговорення феномену ДахаБраха: як локальний фольклор перетворюється на світовий бренд через експерименти зі звучанням
    та переосмислення спадщини.'
- section: 'Мовна лабораторія: Стилістика та граматика (Language Lab: Stylistics and Grammar)'
  words: 800
  points:
  - 'Корекція типової помилки: вживання «грати на гітарі» (Locative) замість неправильної форми «грати гітару» (Accusative)
    для позначення гри на інструменті.'
  - 'Усунення лексичної інтерференції: правильне вживання «слухати музику» (Accusative) без прийменника ''до'', а також використання
    слова «музика» лише в однині.'
  - 'Стилістика музичної критики: аналіз лексики рецензій (фронтмен, звучання, аранжування, хіт) для формування навичок професійного
    опису мистецтва.'
- section: 'Практика: Музичний дискурс (Practice: Musical Discourse)'
  words: 800
  points:
  - Написання критичної рецензії на сучасний альбом з використанням публіцистичного стилю та оцінної лексики (на основі зразків
    музичних оглядів).
  - 'Порівняльний аналіз української та польської рок-сцен: виявлення спільних рис у розвитку альтернативної музики Центральної
    Європи.'
  - 'Дискусія про вплив війни на музичні тексти: трансформація патріотичного відродження в глибоку рефлексію національної
    травми.'
focus: fine-arts
pedagogy: CBI
objectives:
- Learner explores the history of Ukrainian rock (VV, Okean Elzy).
- Learner can explain the phenomenon of Ukrainian Eurovision victories.
- Learner analyzes the explosion of new music during the war.
grammar:
- Music genres terminology
- Expressing musical preferences
phase: C1.7 [Fine Arts & High Culture]
persona:
  voice: Senior Specialist
  role: Музичний продюсер
word_target: 4000
vocabulary_hints:
  required:
  - гурт (band) — легендарний гурт, рок-гурт, фронтмен гурту, заснувати гурт; висока частотність у медіа
  - виконавець (performer) — відомий виконавець, молодий виконавець, вуличний виконавець; частотне слово для сольних артистів
  - сцена (stage/scene) — українська музична сцена, андерграундна сцена, вийти на сцену; вживається для середовища та простору
  - звучання (sound) — сучасне звучання, автентичне звучання, експериментувати зі звучанням; ключове слово для музичного аналізу
  - хіт (hit) — очолити чарти, вірусний хіт, написати хіт; висока частотність у поп-культурі
  - спадщина (legacy/heritage) — музична спадщина, переосмислення спадщини; вживається в академічному та культурному дискурсах
  recommended:
  - 'грати на гітарі (to play guitar) — вживання Locative: грати на + [інструмент]'
  - слухати музику (to listen to music) — вживання Accusative без прийменника 'до'
  - аранжування (arrangement) — створення музичної інтерпретації твору
  - фольк-ф’южн (folk-fusion) — жанр, що поєднує автентику з модерними стилями
