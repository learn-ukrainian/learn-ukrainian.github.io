module: c1-027
level: C1
sequence: 27
slug: davalnyi-vidminok-systema
version: 1.0.2
title: 'Давальний відмінок: адресат, бенефіціар, етичний давальний'
subtitle: 'Давальний відмінок: усі значення'
focus: grammar
pedagogy: TTT
word_target: 4000
objectives:
- 'Систематизувати всі значення давального відмінка: адресат, бенефіціар, експерієнцер,
  присвійний, цільовий.'
- Опанувати етичний давальний (dativus ethicus) та давальний зацікавленості.
- Вивчити конструкцію 'мені болить / мені холодно' як безособову модель із 
  давальним.
- Аналізувати стилістичні функції давального відмінка в різних регістрах 
  мовлення.
reading_situations:
- source_type: художній уривок
  topic: 'Давальний відмінок у прозі Івана Франка: етичний давальний та адресат.'
  key_elements:
  - давальний зацікавленості
  - безособові конструкції
  - емоційність
  motivation: Аналіз стилістичної ролі давального відмінка в художньому тексті.
- source_type: побутовий діалог
  topic: 'Давальний відмінок у щоденному спілкуванні: поради, прохання, нарікання.'
  key_elements:
  - дати комусь
  - допомогти комусь
  - мені здається
  motivation: Розпізнавання давального відмінка в розмовному регістрі.
listening_situations:
- media_type: лекція
  setting: Фрагмент лекції з функціональної граматики про безособові конструкції
    з давальним відмінком.
  focus_points:
  - безособовість
  - експерієнцер
  - давальний стану
  motivation: Сприйняття граматичної термінології та класифікації на слух.
writing_tasks:
- task_type: есе
  prompt: Напишіть текст-пораду (250-300 слів) на тему 'Як підтримати друга у 
    скрутну хвилину', максимально використовуючи давальний відмінок у різних 
    функціях.
  requirements:
  - щонайменше 6 різних функцій давального відмінка
  - наявність етичного давального
  - безособові конструкції з давальним
  motivation: Практичне закріплення всіх функцій давального відмінка.
  model_answer: Текст має демонструвати адресатну, бенефактивну, присвійну 
    функції та безособові конструкції типу 'йому стане легше'.
discussion_topics:
- context: Чому в українській мові стан людини виражається через давальний 
    відмінок?
  questions:
  - 'Порівняйте ''я хворію'' та ''мені зле'': яка різниця у сприйнятті суб''єкта?'
  - Чому етичний давальний 'ти мені не вигадуй' не має точного еквівалента в 
    англійській мові?
  motivation: Розуміння давального відмінка як специфічної риси слов'янського 
    мовного мислення.
content_outline:
- section: Давальний адресата та бенефіціара
  words: 1000
  subsections:
  - 'Давальний адресата: дати, сказати, написати комусь'
  - 'Давальний бенефіціара (вигоди): купити мамі квіти, побудувати дітям майданчик'
  - 'Давальний зі значенням шкоди: нашкодити, завадити, зіпсувати комусь'
  key_concepts:
  - адресат
  - бенефіціар
  - непрямий об'єкт
- section: Безособові конструкції з давальним
  words: 1000
  subsections:
  - 'Давальний стану: мені холодно, тобі сумно, їй весело'
  - 'Давальний із модальними предикативами: треба, можна, не варто + давальний'
  - 'Давальний у конструкціях із ''болить'': мені болить голова, їй болить серце'
  key_concepts:
  - безособовість
  - предикатив
  - модальність
- section: Етичний давальний та давальний зацікавленості
  words: 1000
  subsections:
  - 'Етичний давальний (dativus ethicus): ''Ти мені не вередуй!'''
  - 'Давальний зацікавленості: ''Він мені такий розумний!'''
  - 'Присвійний давальний: ''Дитині три роки'', ''Місту сто років'''
  key_concepts:
  - етичний
  - зацікавленість
  - присвійний
- section: Давальний у складних конструкціях та стилістика
  words: 1000
  subsections:
  - 'Давальний мети: сприяти розвиткові, служити прикладом'
  - 'Давальний у фразеологізмах: йти назустріч, не до жартів'
  - 'Стилістичне вживання давального в різних регістрах: розмовний, офіційний, художній'
  key_concepts:
  - фразеологізм
  - регістр
  - стилістика
- section: Підсумок — Summary
  words: 300
  points:
  - 'The dative case serves multiple functions beyond the indirect object: addressee
    and beneficiary (купити мамі), impersonal states and modals (мені холодно, треба),
    and stylistic nuances like the ethical dative (Ти мені не вередуй!).'
  - "Self-check: What is the difference between the dative of addressee and the ethical
    dative? Describe your current physical or emotional state using 3 impersonal dative
    constructions. How would you say 'My head hurts' and 'The city is 100 years old'
    using the dative case?"
vocabulary:
