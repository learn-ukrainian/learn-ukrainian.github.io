  - експерієнцер
  - фразеологізм
  - валентність
activity_hints:
- type: reading
  focus: Прочитайте текст про давальний адресата та бенефіціара і дайте 
    відповіді на запитання.
- type: essay-response
  focus: Напишіть 5 речень, використовуючи нову лексику з розділу «Безособові 
    конструкції з давальним».
- type: fill-in
  focus: Вставте правильну граматичну форму у реченнях на тему давальний 
    адресата та бенефіціара.
- type: error-correction
  focus: Знайдіть і виправте помилки у реченнях на тему безособові конструкції з
    давальним.
- type: quiz
  focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Давальний адресата
    та бенефіціара».'
- type: match-up
  focus: З'єднайте терміни з розділу «Безособові конструкції з давальним» з 
    їхніми визначеннями.
activities:
