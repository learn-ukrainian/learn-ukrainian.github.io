module: c1-089
level: C1
sequence: 89
slug: pomynalni-obriady
version: '1.1'
title: "Поминальна обрядовість: культ предків та етика пам'яті"
subtitle: "Commemorative Rituals: Cult of Ancestors and Ethics of Memory"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати світоглядні засади української поминальної обрядовості та культу предків."
  - "Дослідити структуру та символіку поховального ритуалу (прощання, голоссіння, поминальна трапеза)."
  - "Ознайомитися з календарем поминальних днів (Радуниця, Дідівські суботи) та їхніми регіональними особливостями."
  - "Вивчити етичні норми та лексику, пов'язану з висловленням співчуття, пам'яттю та вшануванням померлих."

reading_situations:
  - source_type: "філософсько-релігійна стаття"
    topic: "Концепція переходу та вічного життя в українській народній есхатології."
    key_elements: ["есхатологія", "сакральний перехід", "дуалізм", "вічне життя"]
    motivation: "Вивчення абстрактної лексики та філософського аналізу народних вірувань."
  - source_type: "художній уривок"
    topic: "Жанр голоссінь в українському фольклорі: поетика та емоційна структура (на прикладі записів Л. Українки)."
    key_elements: ["голосіння", "імпровізація", "метафорика", "тужба"]
    motivation: "Аналіз художньої специфіки та мовної експресії поминальної поезії."

listening_situations:
  - media_type: "подкаст"
    setting: "Бесіда з істориком про меморіальну культуру України: від козацьких курганів до сучасних пантеонів."
    focus_points: ["місця пам'яті", "культура поховання", "державна політика вшанування"]
    motivation: "Розвиток вміння сприймати на слух інформацію про формування історичної пам'яті."

discussion_topics:
  - context: "У сучасному урбанізованому світі традиційні поминальні обряди часто спрощуються або зникають."
    questions:
      - "Яку психологічну роль відіграє ритуал прощання для людини, що переживає втрату?"
      - "Чи варто зберігати архаїчні елементи поминання (напр. трапези на цвинтарі) у XXI столітті?"
      - "Як цифрові технології (віртуальні меморіали) змінюють культуру пам'яті?"
    motivation: "Вміння вести делікатну дискусію на складні етичні та соціальні теми."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Проаналізуйте мовні формули висловлення співчуття в українській культурі. Порівняйте традиційні та сучасні способи підтримки людини, що переживає втрату."
    requirements: ['мінімум 300 слів', "використання термінів: етика, співчуття, ритуал, пам'ять, меморіал", 'приклади мовних формул']
    motivation: "Розвиток навичок аналізу мовного етикету та культурних норм."
    model_answer: "Текст повинен містити аналіз традиційних формул ('Нехай земля буде пухом', 'Вічна пам'ять') та сучасних підходів, а також рефлексію над психологічною роллю ритуалу прощання."

content_outline:
  - section: "Світогляд і смерть: український контекст"
    words: 1000
    subsections:
      - "Смерть як 'сон' або 'перехід': філологічний та етнографічний аналіз термінів"
      - "Культ предків (Дідів) як основа родинної та громадної стабільності"
      - "Християнська догматика та народні уявлення про потойбіччя"
    key_concepts:
      - "есхатологія"
      - "родовід"
      - "потойбіччя"
  - section: "Структура поховального ритуалу"
    words: 1000
    subsections:
      - "Обряди-обереги для живих та 'дорога' для померлого"
      - "Голосіння як архаїчна форма колективної психотерапії та мистецтва"
      - "Поминальна трапеза: канун, коливо та символіка спільної страви"
    key_concepts:
      - "голосіння"
      - "ритуал"
      - "трапеза"
  - section: "Календарна пам'ять: Радуниця та Проводи"
    words: 1000
    subsections:
      - "Радуниця (Гробки) як свято радості та єднання з предками"
      - "Сезонні поминальні дні: осінні та зимові Діди"
      - "Традиції впорядкування могил та роль цвинтарів як культурних ландшафтів"
    key_concepts:
      - "радуниця"
      - "проводи"
      - "меморіал"
  - section: "Етика та культура пам'яті в сучасності"
    words: 1000
    subsections:
      - "Сучасний етикет висловлення співчуття: мовні формули та поведінкові норми"
      - "Вшанування героїв: від козацьких могил до Стіни пам'яті полеглих за Україну"
      - "Меморіальна архітектура та її роль у збереженні національної ідентичності"
    key_concepts:
      - "співчуття"
      - "пантеон"
      - "ідентичність"

vocabulary:
  required:
    - поминання
    - ритуал
    - предки
    - голосіння
    - співчуття
    - пам'ять
    - етика
    - сакральний
  recommended:
    - есхатологія
    - меморіал
    - психотерапія
    - імпровізація
    - пантеон

activities:
  types_required:
    - critical-analysis
    - essay-response
    - match-up
    - fill-in
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте філософсько-релігійну статтю про концепцію вічного життя. Визначте абстрактну лексику та поясніть значення ключових понять."
  - type: critical-analysis
    focus: "Проаналізуйте поетику голосінь. Знайдіть метафори, порівняння та ритмічні прийоми. Визначте емоційну структуру тексту."
  - type: match-up
    focus: "Зіставте поминальні терміни (Радуниця, Проводи, голосіння, коливо, канун) з їхніми визначеннями та функціями."
  - type: fill-in
    focus: "Доповніть текст про структуру поховального ритуалу відповідними термінами (прощання, поминальна трапеза, есхатологія, потойбіччя)."
  - type: essay-response
    focus: "Напишіть аналітичний текст про трансформацію культури пам'яті в цифрову епоху. Аргументуйте, порівнюючи традиційні та сучасні форми вшанування."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Традиції та культурна спадщина'"
  - "Авраменко, 11 клас (Укр. літ.) — обрядова поезія, голосіння"
  - "Караман, 10 клас (2018), §38 — Стилістично забарвлена лексика"
  - "Борисенко В. Етнографія українців — родинна обрядовість (загальна довідка)"

