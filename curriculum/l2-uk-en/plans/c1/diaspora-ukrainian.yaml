module: c1-040
level: C1
sequence: 40
slug: diaspora-ukrainian
version: 1.1.2
title: 'Українська мова в діаспорі: Збереження, трансформація та архаїзми'
subtitle: Українська мова діаспори
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
- Дослідити мовні особливості різних хвиль української еміграції (від кінця ХІХ 
  ст. до сьогодення).
- Проаналізувати вплив мовного оточення (англійської, португальської, польської)
  на діаспорне мовлення.
- Вивчити феномен збереження архаїчних рис та правописних традицій (Харківський 
  правопис) у діаспорі.
- Зрозуміти роль діаспори у збереженні української ідентичності в періоди 
  репресій на материковій Україні.
reading_situations:
- source_type: наукова стаття
  topic: 'Канадський варіант української мови: лексичні запозичення та синтаксичні
    зміни.'
  key_elements:
  - англіцизм
  - мовна інтерференція
  - культурне збереження
  motivation: Аналіз механізмів адаптації мови до іншомовного середовища.
- source_type: мемуари
  topic: Спогади представників 'третьої хвилі' еміграції про створення 
    українських шкіл та видавництв у США.
  key_elements:
  - ідентичність
  - мовна стійкість
  - націєтворення
  motivation: Розуміння соціокультурної місії діаспори.
listening_situations:
- media_type: інтерв'ю
  setting: Розмова з представником української громади в Бразилії або Аргентині 
    про збереження мови в умовах ізоляції.
  focus_points:
  - архаїчна лексика
  - фонетичні особливості
  - родинні традиції
  motivation: Порівняння різних моделей мовного збереження в світі.
writing_tasks:
- task_type: репортаж
  prompt: 'Напишіть репортаж про уявну конференцію ''Українська мова у світі: виклики
    ХХІ століття''. Висвітліть позиції представників з Канади, Європи та Австралії.'
  requirements:
  - мінімум 350 слів
  - використання публіцистичного стилю
  - акцент на проблемах асиміляції та диглосії
  motivation: Розвиток навичок написання складних журналістських текстів з 
    акцентом на глобальний контекст.
  model_answer: Текст має містити цитати (уявні) експертів, опис дискусій про 
    роль цифрових технологій у єднанні діаспори та важливість стандартної 
    української мови.
discussion_topics:
- context: 'Харківський правопис (''скрипниківка'') в діаспорі: традиція vs сучасна
    норма.'
  questions:
  - Чому діаспора так довго трималася за правопис 1928 року?
  - Як повернення деяких норм 'скрипниківки' у правописі 2019 року вплинуло на 
    діалог з діаспорою?
  - Чи має бути єдиний мовний стандарт для українців у всьому світі?
  motivation: Дискусія про мовні норми та їх значення для національної єдності.
content_outline:
- section: Історія та хвилі української еміграції
  words: 1000
  subsections:
  - 'Перша хвиля (кінець XIX – поч. XX ст.): соціально-економічні причини та збереження
    говірок'
  - 'Політична еміграція (після 1920-х та 1945 р.): інтелектуальний центр мовознавства'
  - 'Сучасні міграційні процеси: цифрова діаспора та нові виклики'
  key_concepts:
  - еміграція
  - діаспора
  - асиміляція
- section: Лінгвістичний портрет діаспорного мовлення
  words: 1000
  subsections:
  - 'Лексичний склад: архаїзми (вплив скрипниківки) та неологізми-кальки'
  - Фонетичні та граматичні трансформації під впливом домінуючих мов
  - Мовна ситуація в українських поселеннях Латинської Америки
  key_concepts:
  - архаїзм
  - неологізм
  - мовний контакт
- section: Інституції та збереження мови
  words: 1000
  subsections:
  - 'Рідна школа та Пласт: виховання україномовних поколінь'
  - Наукове товариство ім. Шевченка (НТШ) та УВАН як осередки лінгвістики
  - 'Діаспорна преса та книговидання: роль у стандартизації мови поза межами України'
  key_concepts:
  - ідентичність
  - освіта
  - науковий осередок
- section: 'Взаємодія: Діаспора — Україна'
  words: 1000
  subsections:
  - Вплив діаспорного мовознавства на сучасний український правопис
  - Мовна конвергенція в умовах глобалізації та інтернету
  - 'Українська мова як світова мова: роль діаспори у культурній дипломатії'
  key_concepts:
  - конвергенція
  - дипломатія
  - стандартизація
- section: Підсумок — Summary
  words: 300
  points:
  - 'Diaspora speech is characterized by a unique blend of архаїзми (archaisms) preserved
    from early orthographies like скрипниківка, and неологізми-кальки (calques) formed
    through мовний контакт (language contact). Self-check: What is the difference
    between an archaism and a calque? Describe 3 ways a dominant local language can
    transform diaspora Ukrainian.'
  - 'Language preservation abroad relies heavily on cultural institutions and education
    to counter the forces of асиміляція (assimilation). Self-check: Name 3 key institutions
    (like Пласт or НТШ) that helped maintain Ukrainian identity abroad. How did diaspora
    linguistics influence the modern Ukrainian Правопис (orthography)?'
vocabulary:
  required:
  - діаспора
  - еміграція
  - асиміляція
  - архаїзм
  - ідентичність
  - конвергенція
  - правопис
  - інтеграція
  recommended:
  - скрипниківка
  - іншомовний
  - тяглість
  - осередок
  - рееміграція
activity_hints:
- type: reading
  focus: Прочитайте текст про історія та хвилі української еміграції і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про лінгвістичний портрет 
    діаспорного мовлення, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Історія та хвилі 
    української еміграції». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    історія та хвилі української еміграції.
- type: comparative-study
  focus: 'Порівняйте різні підходи до історія та хвилі української еміграції: Перша
    хвиля (кінець XIX – поч. XX ст.): соціально-економічні причини та збережен. Визначте
    спільне та відмінне.'
activities:
  types_required:
  - critical-analysis
  - comparative-study
  - match-up
  - true-false
  - select
  min_items_per_type: 5
  total_min_items: 25
references:
