slug: kotsiubynskyi
version: '2.0'
title: 'Імпресіонізм: Коцюбинський'
subtitle: 'Impressionism: Kotsiubynsky'
content_outline:
- section: Розминка та концепція (Warm-up and Concept)
  words: 500
  points:
  - Вступ до українського імпресіонізму як мистецтва миттєвих вражень та психологічної
    глибини.
  - 'Аналіз назви «Тіні забутих предків»: розрізнення значень «тіні» (метафоричний
    слід) та «привиди» (духи), виправлення типової помилки.'
  - 'Сенсорна образність: обговорення здатності «бачити звук» та «чути колір» (синестезія)
    згідно з вимогами стандарту §4.4.3.'
- section: Біографія та інтелектуальний контекст (Biography and Intellectual Context)
  words: 700
  points:
  - 'Михайло Коцюбинський: шлях від Вінниці до європейських подорожей (Італія, Капрі)
    та їх вплив на естетику автора.'
  - 'Культурний гачок: Криворівня як «Українські Афіни», місце зустрічі з Франком
    та Грушевським, де вивчався гуцульський побут.'
  - 'Зв''язок із сучасниками: паралелі з інтелектуальним середовищем того часу (контекст
    до модуля BIO-48 про Івана Пулюя).'
- section: Психологічний імпресіонізм в «Intermezzo» (Psychological Impressionism
    in 'Intermezzo')
  words: 1000
  points:
  - 'Аналіз новели «Intermezzo»: втома інтелектуала, конфлікт між «суспільним обов''язком»
    та «спокоєм природи».'
  - 'Техніка «потоку свідомості» (stream of consciousness): пояснення асоціативності
    думок на противагу структурованому монологу.'
  - 'Стилістичний синтаксис за стандартом §4.4.4: роль еліпсису, повторів та риторичних
    запитань у відтворенні внутрішнього стану героя.'
- section: Етнографічний модернізм «Тіней забутих предків» (Ethnographic Modernism
    of 'Shadows of Forgotten Ancestors')
  words: 1000
  points:
  - 'Гуцульський світ: поєднання християнства та язичництва, кохання Івана та Марічки
    як вічний сюжет у модерному прочитанні.'
  - 'Лексичні засоби стандарту §4.4.3: використання епітетів, метафор та звуконаслідування
    (наприклад, «дзень-дзень»).'
  - 'Робота з діалектизмами та фольклорною лексикою: значення слів «ватру», «флояра»,
    «нявка» та «забобон».'
- section: Кінематографічний резонанс та спадщина (Cinematic Resonance and Legacy)
  words: 800
  points:
  - 'Сергій Параджанов та «візуальна поезія»: як імпресіоністична проза трансформувалася
    у світовий кіношедевр.'
  - 'Культурний гачок: прем''єра фільму в 1965 році як акт політичного протесту (виступи
    Стуса та Дзюби) проти арештів інтелігенції.'
  - 'Практика: аналіз регістрів — доречність вживання слова «ватра» (марковане) замість
    «вогнище» (нейтральне) у формальному мовленні.'
focus: literature
pedagogy: Literary Analysis
objectives:
- Learner can analyze the features of impressionism in "Shadows of Forgotten Ancestors".
- Learner can interpret the psychological depth of "Intermezzo".
- Learner can discuss the role of nature and color in Kotsiubynsky’s prose.
grammar:
- Sensory imagery
- Stream of consciousness
phase: C1.6 Literature
persona:
  voice: Senior Specialist
  role: Дослідник модернізму
word_target: 4000
vocabulary_hints:
  required:
  - імпресіонізм (impressionism) — літературний імпресіонізм, риси імпресіонізму;
    High Academic frequency
  - свідомість (consciousness) — потік свідомості, роздвоєння свідомості, підсвідоме;
    High General frequency
  - забобон (superstition) — гуцульські забобони, вірити в забобони; Med frequency,
    cultural context
  - ватра (ritual fire/bonfire) — розкласти ватру, жива ватра; Med frequency, Hutsul/Western
    dialect marker
  - синестезія (synesthesia) — змішування сенсорних відчуттів; Academic/State Standard
    term
  recommended:
  - нявка (forest nymph/mavka) — міфологічна істота з «Тіней»; Low frequency, folk
    context
  - флояра (hutsul flute) — грати на флоярі; Low frequency, dialectism
  - потік свідомості (stream of consciousness) — техніка зображення психічного життя;
    Key literary term
  - тінь (shadow) — на противагу 'привид' (ghost) у контексті назви твору
