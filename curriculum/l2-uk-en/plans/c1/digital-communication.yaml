module: c1-028
level: C1
sequence: 28
slug: digital-communication
version: 1.1.1
title: Цифрова комунікація та мережевий етикет у професійній сфері
subtitle: Цифрова комунікація та нетикет
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
- Ефективно використовувати інструменти цифрової комунікації для професійної взаємодії.
- Володіти правилами мережевого етикету (netiquette) в різних каналах (email, Slack, Telegram).
- Критично оцінювати та управляти своєю цифровою репутацією та особистим брендом.
- Розрізняти маніпулятивні техніки та токсичність у мережевому дискурсі.
reading_situations:
- source_type: блог
  topic: 'Аналіз публічного конфлікту в українському Facebook: причини, динаміка та мовні засоби.'
  key_elements:
  - мобільна агресія
  - риторика ненависті
  - кризовий піар
  motivation: Вивчення розмовного стилю в цифровому середовищі та його впливу на професійне життя.
- source_type: наукова стаття
  topic: 'Вплив диджиталізації на трансформацію української мови: нові лексеми та синтаксичні моделі.'
  key_elements:
  - англіцизми
  - компресія мовлення
  - гіпертекст
  motivation: Розуміння лінгвістичних змін, зумовлених технологіями.
listening_situations:
- media_type: подкаст
  setting: Дискусія експертів про майбутнє віддаленої роботи та культуру онлайн-зустрічей.
  focus_points:
  - втома від Zoom
  - асинхронний зв'язок
  - межі робочого часу
  motivation: Тренування слуху на швидкий темп мовлення з професійним жаргоном.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть звіт (Post-mortem) про невдалу комунікаційну кампанію бренду в соціальних мережах, проаналізувавши помилки
    в тоні голосу (tone of voice).
  requirements:
  - мінімум 250 слів
  - використання аналітичної лексики
  - конкретні рекомендації
  motivation: Розвиток аналітичного письма в контексті цифрового маркетингу.
  model_answer: Текст має демонструвати вміння оперувати поняттями 'цільова аудиторія', 'репутаційні ризики', 'комунікаційний
    провал' та пропонувати стратегію відновлення довіри.
discussion_topics:
- context: Право на забуття (Right to be forgotten) vs прозорість цифрового сліду.
  questions:
  - Чи має роботодавець право оцінювати кандидата за його особистими дописами 10-річної давнини?
  - Де проходить межа між публічним та приватним в епоху соціальних мереж?
  - Як цифрова гігієна впливає на психічне здоров'я та продуктивність?
  motivation: Обговорення етичних та правових викликів сучасного світу.
content_outline:
- section: 'Епістолярний жанр: електронна пошта та месенджери'
  words: 1000
  subsections:
  - 'Структура ділового листа в цифрову епоху: від теми до підпису'
  - 'Telegram, Slack, Discord: особливості мовлення в різних середовищах'
  - Культура голосових повідомлень та швидких відповідей
  key_concepts:
  - лаконічність
  - інформативність
  - синхронність
- section: Тон голосу та особистий бренд
  words: 1000
  subsections:
  - Формування Tone of Voice для фахівця та компанії
  - Сторітелінг у LinkedIn як інструмент професійного зростання
  - Візуальна та текстова ідентичність у мережі
  key_concepts:
  - автентичність
  - консистентність
  - експертність
- section: Кризи та токсичність у цифровому дискурсі
  words: 1000
  subsections:
  - 'Анатомія хейту: як розпізнати тролінг та ботів'
  - Техніки деескалації конфліктів у коментарях
  - 'Кенселінг (Cancel culture) в українському соціумі: за і проти'
  key_concepts:
  - медіаграмотність
  - фактчекінг
  - емпатія
- section: 'Майбутнє комунікації: ШІ та метавсесвіти'
  words: 1000
  subsections:
  - Роль великих мовних моделей (LLM) у написанні текстів
  - Етика використання штучного інтелекту в професійній переписці
  - Віртуальна присутність та нові форми соціалізації
  key_concepts:
  - автоматизація
  - персоналізація
  - алгоритмізація
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
