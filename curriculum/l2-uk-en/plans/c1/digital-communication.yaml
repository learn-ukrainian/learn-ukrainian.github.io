activity_hints:
- type: reading
  focus: 'Прочитайте текст про епістолярний жанр: електронна пошта та месенджери і дайте відповіді на запитання щодо ключових
    понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про тон голосу та особистий бренд, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Епістолярний жанр: електронна пошта та месенджери». Обґрунтуйте
    свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему епістолярний жанр: електронна пошта та месенджери.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до епістолярний жанр: електронна пошта та месенджери: Структура ділового листа в цифрову
    епоху: від теми до підпису. Визначте спільне та відмінне.'
