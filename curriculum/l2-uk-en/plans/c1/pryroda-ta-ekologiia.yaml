module: c1-083
level: C1
sequence: 83
slug: pryroda-ta-ekologiia
version: '1.0'
title: "Природа та екологія: від заповідників до сталого розвитку"
subtitle: "Природа, екологія, довкілля"
focus: thematic
pedagogy: TTT
word_target: 4000
objectives:
  - "Опанувати розширену екологічну лексику та термінологію охорони довкілля
    на рівні C1."
  - "Вивчити лексику опису природи: ландшафти, флора, фауна, кліматичні явища."
  - "Навчитися обговорювати екологічні проблеми: забруднення, зміна клімату,
    втрата біорізноманіття."
  - "Аналізувати екологічну ситуацію в Україні: наслідки війни, заповідники,
    сталий розвиток."

reading_situations:
  - source_type: "науково-популярний текст"
    topic: "Екологічні наслідки війни для довкілля України: забруднення, мінування,
      руйнування екосистем."
    key_elements: ["екоцид", "забруднення", "екосистема", "відновлення"]
    motivation: "Вивчення екологічної термінології в актуальному контексті."
  - source_type: "художній уривок"
    topic: "Опис природи в українській прозі: від Коцюбинського до Андруховича."
    key_elements: ["пейзаж", "метафора", "описова лексика"]
    motivation: "Аналіз художніх засобів опису природи."

listening_situations:
  - media_type: "доповідь"
    setting: "Виступ українського еколога про стан заповідників та біосферних
      резерватів."
    focus_points: ["екологічна термінологія", "статистика", "аргументація"]
    motivation: "Сприйняття наукового дискурсу про довкілля."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть есе (250-300 слів) 'Війна проти довкілля: як відновити
      екосистеми України після перемоги?'"
    requirements: ["екологічна термінологія", "конкретні приклади",
      "пропозиції щодо відновлення"]
    motivation: "Відпрацювання аналітичного есе на екологічну тематику."
    model_answer: "Текст має містити опис конкретних екологічних збитків від війни,
      приклади зруйнованих екосистем та аргументовану програму відновлення."

discussion_topics:
  - context: "Чи може Україна стати європейським лідером зеленої енергетики?"
    questions:
      - "Які природні ресурси України найбільш перспективні для відновлюваної
        енергетики?"
      - "Як поєднати економічний розвиток та збереження довкілля?"
    motivation: "Обговорення перспектив екологічної трансформації."

content_outline:
  - section: "Природа України: ландшафти та біорізноманіття"
    words: 1000
    subsections:
      - "Природні зони: Полісся, Лісостеп, Степ, Карпати, Крим"
      - "Флора: ліси, луки, степові рослини, ендеміки"
      - "Фауна: ссавці, птахи, комахи, водний світ"
    key_concepts:
      - "біорізноманіття"
      - "ендемік"
      - "екосистема"
  - section: "Екологічні проблеми"
    words: 1000
    subsections:
      - "Забруднення повітря, води, ґрунту: джерела та наслідки"
      - "Зміна клімату: глобальне потепління та його прояви в Україні"
      - "Втрата біорізноманіття: зникаючі види, Червона книга України"
    key_concepts:
      - "забруднення"
      - "клімат"
      - "зникаючий"
  - section: "Охорона довкілля та заповідна справа"
    words: 1000
    subsections:
      - "Заповідники та національні парки України: Асканія-Нова, Карпатський,
        Шацький"
      - "Біосферні резервати та об'єкти ЮНЕСКО"
      - "Екологічне законодавство та міжнародні конвенції"
    key_concepts:
      - "заповідник"
      - "резерват"
      - "охорона"
  - section: "Сталий розвиток та зелена економіка"
    words: 1000
    subsections:
      - "Сталий розвиток: 17 Цілей ООН та їх реалізація в Україні"
      - "Відновлювана енергетика: сонячна, вітрова, гідро"
      - "Екологія війни: екоцид, мінування, відновлення"
    key_concepts:
      - "сталий"
      - "розвиток"
      - "екологія"

vocabulary:
  required:
    - екологія
    - біорізноманіття
    - забруднення
    - заповідник
    - сталий
    - екосистема
    - довкілля
    - відновлення
  recommended:
    - ендемік
    - екоцид
    - резерват
    - декарбонізація
    - відновлюваний

activity_hints:
  - type: reading
    focus: "Прочитайте текст про природа україни: ландшафти та біорізноманіття і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про екологічні проблеми, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Природа України: ландшафти та біорізноманіття». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему природа україни: ландшафти та біорізноманіття."
  - type: comparative-study
    focus: "Порівняйте різні підходи до природа україни: ландшафти та біорізноманіття: Природні зони: Полісся, Лісостеп, Степ, Карпати, Крим. Визначте спільне та відмінне."

activities:
  types_required:
    - fill-in
    - match-up
    - critical-analysis
    - select
    - error-correction
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §1-5 — Культура мовлення: екологічна лексика"
  - "Авраменко, 11 клас (2019): Науково-популярний стиль"
  - "State Standard 2024: C1 — тематичне поле 'природа та екологія'"

connects_to:
