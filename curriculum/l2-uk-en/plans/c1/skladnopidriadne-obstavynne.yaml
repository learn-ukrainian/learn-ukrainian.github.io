module: c1-057
level: C1
sequence: 57
slug: skladnopidriadne-obstavynne
version: 1.1.2
title: 'Складнопідрядні обставинні речення: види та вживання'
subtitle: Складнопідрядні обставинні речення
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
- Систематизувати знання про всі види складнопідрядних обставинних речень.
- Навчитися правильно використовувати сполучники умови, мети, причини та 
  наслідку.
- Опанувати нюанси вживання підрядних допустових та порівняльних речень.
- Розвинути вміння будувати складні логічні конструкції для наукового та 
  офіційного дискурсу.
reading_situations:
- source_type: наукова стаття
  topic: 'Причинно-наслідкові зв''язки в історичних процесах: аналіз підрядних причини
    та наслідку.'
  key_elements:
  - детермінізм
  - передумова
  - чинник
  - результат
  motivation: Вивчення засобів вираження логіки історичного розвитку.
- source_type: офіційний лист
  topic: 'Умови надання грантової підтримки для культурних проектів: підрядні умови
    та мети.'
  key_elements:
  - критерій
  - вимога
  - цільове призначення
  motivation: Робота з нормативними текстами та формальними вимогами.
listening_situations:
- media_type: інтерв'ю
  setting: Розмова з екологом про наслідки глобального потепління для України.
  focus_points:
  - підрядні умови ('якщо...'), наслідку ('так що...'), допустові ('хоча...')
  motivation: Сприйняття складної аргументації в науково-популярному контексті.
writing_tasks:
- task_type: офіційний лист
  prompt: Напишіть мотиваційний лист для участі в освітній програмі, 
    використовуючи різні види обставинних підрядних речень (мети, умови, 
    причини).
  requirements:
  - мінімум 200 слів
  - вживання сполучників 'аби', 'якби', 'оскільки', 'незважаючи на те що'
  - дотримання офіційно-ділового стилю
  motivation: Застосування граматичних знань у професійній комунікації.
  model_answer: Лист має чітко формулювати мету кандидата, умови його успішної 
    участі та обґрунтування вибору саме цієї програми.
discussion_topics:
- context: Чи виправдовує мета засоби її досягнення?
  questions:
  - У яких ситуаціях етичні норми можуть бути порушені заради вищої мети?
  - Які наслідки має нехтування мораллю в політиці чи бізнесі?
  motivation: Використання підрядних мети, умови та допустових для ведення 
    етичної дискусії.
content_outline:
- section: Підрядні речення місця та часу
  words: 1000
  subsections:
  - Засоби зв'язку та смислові відтінки підрядних місця
  - Часові відношення (одночасність, послідовність) у підрядних реченнях
  - Специфіка вживання сполучників 'поки', 'доки', 'ледве'
  key_concepts:
  - локативність
  - темпоральність
  - дистанція
- section: Підрядні причини, мети, умови та наслідку
  words: 1000
  subsections:
  - Логічне обґрунтування дій через підрядні причини та мети
  - 'Реальна та ірреальна умова: вживання часток ''би'', ''б'''
  - Підрядні наслідку як засіб підбиття підсумків
  key_concepts:
  - казуальність
  - фінальність
  - кондиційність
- section: Підрядні допустові, порівняльні та способу дії
  words: 1000
  subsections:
  - Вираження суперечності через підрядні допустові ('хоча', 'хай як')
  - Порівняльні конструкції та їхня роль у художньому мовленні
  - 'Підрядні способу дії та ступеня: кількісна та якісна характеристика'
  key_concepts:
  - концесивність
  - компаративність
  - модальність
- section: Синтаксична синонімія та пунктуація
  words: 1000
  subsections:
  - Заміна підрядних речень дієприслівниковими зворотами
  - Складні сполучники та особливості вживання коми при них
  - Інтонаційне виділення обставинних частин у мовленні
  key_concepts:
  - трансформація
  - еквівалентність
  - пунктограма
- section: Підсумок — Summary
  words: 300
  points:
  - "Adverbial clauses (обставинні речення) define logical relationships like time,
    cause, condition, and concession. Self-check: What is the difference between a
    real and unreal condition? (Unreal conditions use the particle 'би'/'б'). Describe
    a sequence of events using the conjunctions 'поки', 'доки', and 'ледве'."
  - "Syntactic synonymy provides stylistic flexibility by allowing the replacement
    of subordinate clauses with adverbial participle phrases (дієприслівникові звороти).
    Self-check: When is a comma required with complex conjunctions? Write two sentences
    expressing concession: one with 'хоча' and one with 'хай як'."
vocabulary:
  required:
  - обставинний
  - умова
  - мета
  - причина
  - наслідок
  - допустовий
  - порівняльний
  - оскільки
  recommended:
  - внаслідок
  - за умови
  - незважаючи на
  - відповідно до
  - аналогічно
activity_hints:
- type: reading
  focus: Прочитайте текст про підрядні речення місця та часу і дайте відповіді 
    на запитання.
- type: essay-response
  focus: Напишіть 5 речень, використовуючи нову лексику з розділу «Підрядні 
    причини, мети, умови та наслідку».
- type: fill-in
  focus: Вставте правильну граматичну форму у реченнях на тему підрядні речення 
    місця та часу.
- type: error-correction
  focus: Знайдіть і виправте помилки у реченнях на тему підрядні причини, мети, 
    умови та наслідку.
- type: quiz
  focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Підрядні речення
    місця та часу».'
- type: match-up
  focus: З'єднайте терміни з розділу «Підрядні причини, мети, умови та наслідку»
    з їхніми визначеннями.
activities:
  types_required:
  - fill-in
  - translate
  - error-correction
  - match-up
  - comparative-study
  min_items_per_type: 5
  total_min_items: 25
references:
