- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про наука та дослідження, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Система освіти в Україні». Обґрунтуйте свою позицію прикладами
    з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему система освіти в україні.
- type: comparative-study
  focus: 'Порівняйте різні підходи до система освіти в україні: Структура: дошкільна, шкільна, фахова передвища, вища освіта.
    Визначте спільне та відмінне.'
