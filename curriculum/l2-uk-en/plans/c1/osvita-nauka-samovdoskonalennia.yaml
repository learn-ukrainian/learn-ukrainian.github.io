title: Освіта, наука та самовдосконалення
subtitle: Освіта, наука, саморозвиток
focus: thematic
pedagogy: TTT
word_target: 4000
objectives:
- Опанувати лексику вищої освіти, наукової діяльності та самовдосконалення на рівні C1.
- 'Вивчити структуру українського освітнього дискурсу: від вступної кампанії до захисту дисертації.'
- 'Навчитися обговорювати проблеми сучасної освіти: реформи, онлайн-навчання, академічна доброчесність.'
- Розвинути навички аргументації у дискусіях про освітню політику.
reading_situations:
- source_type: аналітичний текст
  topic: 'Реформа вищої освіти в Україні: від Болонського процесу до автономії університетів.'
  key_elements:
  - реформа
  - курикулум
  - академічна свобода
  - рейтинг
  motivation: Вивчення освітньої термінології в аналітичному контексті.
- source_type: есе
  topic: 'Самоосвіта в цифрову епоху: чи може MOOC замінити університет?'
  key_elements:
  - самоосвіта
  - дистанційний
  - компетентність
  - мотивація
  motivation: Аналіз сучасних тенденцій освіти.
listening_situations:
- media_type: лекція
  setting: Виступ ректора українського університету про виклики повоєнної освіти.
  focus_points:
  - академічна лексика
  - стратегічне планування
  - аргументація
  motivation: Сприйняття складного академічного дискурсу на слух.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть есе (250-300 слів) на тему ''Найкращі інвестиції — це інвестиції в освіту'': аргументуйте або спростуйте
    цю тезу.'
  requirements:
  - академічний стиль
  - використання освітньої термінології
  - конкретні приклади з України
  motivation: Відпрацювання академічного есе на освітню тематику.
  model_answer: Текст має містити аналіз ролі освіти в економічному розвитку, порівняння інвестицій в освіту з іншими сферами,
    висновок.
discussion_topics:
- context: Як відбудувати українську науку після війни?
  questions:
  - 'Які пріоритети має мати Україна: фундаментальна наука чи прикладні розробки?'
  - Як зупинити 'відтік мізків' та повернути науковців?
  motivation: Обговорення стратегічних питань освіти та науки.
