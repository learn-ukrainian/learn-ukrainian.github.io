  - продуктивність
  - читабельність
  - деривація
activity_hints:
- type: reading
  focus: Прочитайте текст про словотвірні моделі девербативів і дайте відповіді на запитання.
- type: essay-response
  focus: Напишіть 5 речень, використовуючи нову лексику з розділу «Суфікси -ок-, -к- та інші моделі».
- type: fill-in
  focus: Вставте правильну граматичну форму у реченнях на тему словотвірні моделі девербативів.
- type: error-correction
  focus: Знайдіть і виправте помилки у реченнях на тему суфікси -ок-, -к- та інші моделі.
- type: quiz
  focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Словотвірні моделі девербативів».'
- type: match-up
  focus: З'єднайте терміни з розділу «Суфікси -ок-, -к- та інші моделі» з їхніми визначеннями.
activities:
  types_required:
