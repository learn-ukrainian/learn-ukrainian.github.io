module: c1-088
level: C1
sequence: 88
slug: deverbatyvni-imennyky
version: '1.0'
title: "Девербативні іменники: номіналізація дії"
subtitle: "Віддієслівні іменники: -ння/-ення, нульовий суфікс, -ок-"
focus: grammar
pedagogy: TTT
word_target: 4000
objectives:
  - "Систематизувати словотвірні моделі віддієслівних іменників в українській мові:
    суфікси -ння/-ення, -ття, нульова суфіксація, -ок-/-к-."
  - "Опанувати семантичні відтінки девербативів: процес, результат, одноразова дія."
  - "Навчитися уникати надмірної номіналізації (канцеляриту) та свідомо обирати між
    дієслівними та іменниковими конструкціями."
  - "Аналізувати стилістичну роль девербативів у різних функціональних стилях."

reading_situations:
  - source_type: "офіційний документ"
    topic: "Номіналізація в офіційно-діловому стилі: аналіз наказу або розпорядження."
    key_elements: ["канцелярит", "віддієслівні іменники", "номіналізація"]
    motivation: "Вивчення типових моделей номіналізації в офіційних текстах."
  - source_type: "лінгвістична стаття"
    topic: "Боротьба з канцеляритом: коли віддієслівний іменник доречний, а коли —
      зайвий."
    key_elements: ["стилістична норма", "динамічність", "редагування"]
    motivation: "Усвідомлення меж допустимої номіналізації."

listening_situations:
  - media_type: "лекція"
    setting: "Фрагмент лекції зі словотвору про продуктивність суфіксів -ння/-ення
      в сучасній українській мові."
    focus_points: ["словотвірна модель", "продуктивність", "семантична деривація"]
    motivation: "Сприйняття лінгвістичної термінології словотвору."

writing_tasks:
  - task_type: "редагування"
    prompt: "Відредагуйте офіційний текст (200-250 слів), замінивши надмірні
      віддієслівні іменники на дієслівні конструкції, де це покращує читабельність."
    requirements: ["щонайменше 5 замін", "збереження офіційного стилю де потрібно",
      "обґрунтування кожної заміни"]
    motivation: "Практика балансування між номіналізацією та дієслівністю."
    model_answer: "Текст має демонструвати вміння розрізняти доречну номіналізацію
      (в офіційному стилі) від зайвої (канцеляриту)."

discussion_topics:
  - context: "Номіналізація як ознака 'дорослого' мовлення: благо чи проклаття?"
    questions:
      - "Чому наукові тексти тяжіють до номіналізації, а художні — до дієслівності?"
      - "Як відрізнити стилістично виправдану номіналізацію від канцеляриту?"
    motivation: "Критичне осмислення ролі девербативів у різних стилях."

content_outline:
  - section: "Словотвірні моделі девербативів"
    words: 1000
    subsections:
      - "Суфікс -ння/-ення: читання, навчання, забезпечення (процес і результат)"
      - "Суфікс -ття: життя, буття, відкриття"
      - "Нульова суфіксація: біг, крик, вхід, вибір"
    key_concepts:
      - "девербатив"
      - "суфікс"
      - "віддієслівний"
  - section: "Суфікси -ок-, -к- та інші моделі"
    words: 1000
    subsections:
      - "Суфікс -ок-: кидок, стрибок, поштовх (одноразова дія)"
      - "Суфікс -к-: перевірка, оцінка, покупка"
      - "Суфікс -ач/-ець (агентивні): шукач, борець, мовець"
    key_concepts:
      - "безсуфіксний"
      - "одноразовість"
      - "агентивний"
  - section: "Семантика девербативів: процес, результат, дія"
    words: 1000
    subsections:
      - "Полісемія девербативів: 'навчання' як процес і як система"
      - "Номіналізація та збереження дієслівних валентностей: забезпечення чим? кого?"
      - "Конкуренція девербатива з інфінітивом: 'проведення реформ' vs 'провести реформи'"
    key_concepts:
      - "номіналізація"
      - "полісемія"
      - "валентність"
  - section: "Стилістика номіналізації"
    words: 1000
    subsections:
      - "Номіналізація в науковому та офіційному стилях: доречність"
      - "Канцелярит: 'здійснення поліпшення' замість 'поліпшити'"
      - "Редагування: заміна зайвих девербативів на дієслова та інфінітиви"
    key_concepts:
      - "канцелярит"
      - "редагування"
      - "читабельність"

vocabulary:
  required:
    - девербатив
    - віддієслівний
    - суфікс
    - номіналізація
    - безсуфіксний
    - канцелярит
    - валентність
    - словотвір
  recommended:
    - агентивний
    - полісемія
    - продуктивність
    - читабельність
    - деривація

activity_hints:
  - type: match-up
    description: "Match deverbal nouns with their formation model: -ння/-ення (process),
      -ття, zero suffix (result), -ок- (single action), -к- (action/result)."
  - type: error-correction
    description: "Fix канцелярит in an official text — replace excessive deverbal nouns
      with verbal constructions where appropriate."
  - type: fill-in
    description: "Form deverbal nouns from given verbs using the correct suffix,
      then use them in sentences preserving the verb's valency."
  - type: select
    description: "Choose whether a deverbal noun or a verbal construction is more
      appropriate in each context: scientific, official, journalistic, literary."
  - type: critical-analysis
    description: "Analyze an official document — count deverbal nouns, classify by
      formation model, and evaluate whether each is stylistically justified."

activities:
  types_required:
    - match-up
    - error-correction
    - fill-in
    - select
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Заболотний, 6 клас (2014): §30-32 — Способи словотворення іменників"
  - "Глазова, 11 клас (2019): §15-17 — Словотвір: суфіксальний спосіб"
  - "Караман, 10 клас (2018): §20-21 — Стилістичні засоби словотвору"
  - "State Standard 2024: §4.2.4-4.2.6 — Девербативні іменники"

