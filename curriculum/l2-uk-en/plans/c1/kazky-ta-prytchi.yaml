module: c1-084
level: C1
sequence: 84
slug: kazky-ta-prytchi
version: '1.0'
title: "Українські казки та притчі: народна мудрість та мораль"
subtitle: "Ukrainian Fairy Tales and Parables: Folk Wisdom and Morality"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Систематизувати знання про жанрову своєрідність українських народних казок (про тварин, побутові, чарівні)."
  - "Дослідити етичні та філософські засади народної притчі як засобу дидактики та виховання."
  - "Проаналізувати архетипні образи (Котигорошко, Баба-Яга, хитрий лис) та їхні національні особливості."
  - "Опанувати засоби художньої виразності казкового тексту: алегорія, гіпербола, сталі епітети."

reading_situations:
  - source_type: "культурологічне есе"
    topic: "Символіка боротьби добра і зла в українській чарівній казці: від змієборства до перемоги кмітливості."
    key_elements: ["архетип", "ініціація", "магічне число", "інваріант"]
    motivation: "Аналіз структурних елементів казки з погляду антропології та філології."
  - source_type: "літературний твір"
    topic: "Філософські притчі Григорія Сковороди: алегорія 'байки харківські'."
    key_elements: ["споріднена праця", "сила молитви", "іносказання"]
    motivation: "Вивчення стилістики барокової притчі та її морально-етичного змісту."

listening_situations:
  - media_type: "подкаст"
    setting: "Розмова з дитячим психологом про терапевтичну функцію народної казки в сучасних умовах."
    focus_points: ["казкотерапія", "подолання страхів", "формування цінностей"]
    motivation: "Розвиток вміння сприймати на слух психологічний аналіз фольклорних текстів."

discussion_topics:
  - context: "Деякі критики вважають, що архаїчні сюжети народних казок містять забагато жорстокості для сучасної дитини."
    questions:
      - "Чи потрібно адаптувати класичні казки під сучасні норми етики?"
      - "У чому полягає відмінність між українською казкою та казками інших народів (напр. німецькими чи французькими)?"
      - "Як казкові образи впливають на формування гендерних стереотипів?"
    motivation: "Вміння вести полеміку про актуалізацію культурної спадщини."

content_outline:
  - section: "Генезис та морфологія народної казки"
    words: 1000
    subsections:
      - "Класифікація казок: від архаїчних міфів про тварин до соціально-побоювальних сюжетів"
      - "Структурні константи чарівної казки: заборона, порушення, мандрівка, нагорода"
      - "Образ героя в українському фольклорі: козак-мамай, мудра дівчина, бідний брат"
    key_concepts:
      - "фольклор"
      - "морфологія"
      - "дидактика"
  - section: "Мова казки: поетика та стилістика"
    words: 1000
    subsections:
      - "Магія слова: традиційні зачини, кінцівки та формули повторів"
      - "Використання зменшувально-пестливих форм та художнього паралелізму"
      - "Алегорія та іронія в побутовій казці та байці"
    key_concepts:
      - "алегорія"
      - "пестливість"
      - "іронія"
  - section: "Притча як філософський жанр"
    words: 1000
    subsections:
      - "Християнські витоки народної притчі: моральний імператив та смирення"
      - "Літературна притча Івана Франка та Григорія Сковороди: інтелектуалізація жанру"
      - "Притчевість у сучасному українському кіно та прозі"
    key_concepts:
      - "притча"
      - "моральність"
      - "аскетизм"
  - section: "Казка у XXI столітті: від фольклору до фентезі"
    words: 1000
    subsections:
      - "Трансформація казкових сюжетів у сучасній українській літературі (Д. Дерманський, О. Деркачова)"
      - "Екранізація казок та створення національного анімаційного продукту"
      - "Роль казки в цифрову епоху: інтерактивні книги та аудіоказки"
    key_concepts:
      - "адаптація"
      - "трансформація"
      - "інтертекстуальність"

