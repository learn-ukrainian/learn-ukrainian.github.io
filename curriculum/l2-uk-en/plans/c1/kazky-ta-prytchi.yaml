module: c1-079
level: C1
sequence: 79
slug: kazky-ta-prytchi
version: '2.0'
title: Казки та притчі
subtitle: Ukrainian Folk Tales and Parables
content_outline:
- section: 'Вступ: Світ української казки та притчі (Introduction: The World of Ukrainian
    Fairy Tales and Parables)'
  words: 600
  points:
  - 'Визначення казки як універсального жанру та притчі як повчального тексту (§3.21
    State Standard: традиції та звичаї)'
  - 'Архетип Котигорошка: аналіз ''українського супергероя'' як символу прихованої
    сили простого народу (Cultural Hook)'
  - Застосування стилю 'Казкар' (Storyteller) для занурення в атмосферу тексту при
    збереженні академічного рівня аналізу
- section: Класифікація та структура народної казки (Classification and Structure
    of Folk Tales)
  words: 900
  points:
  - 'Типологія казок: чарівні (Івасик-Телесик), про тварин (Лисичка-сестричка) та
    соціально-побутові (про бідного та багатого)'
  - 'Традиційна структура: зачин, розгортання дії, кінцівка. Використання інверсії
    ''Жив-був...'' (Learner Error: Word Order)'
  - 'Стилістичні засоби фольклору (§4.4.3): роль постійних епітетів та метафор у створенні
    магічного простору'
- section: Притчі, байки та літературні трансформації (Parables, Fables, and Literary
    Transformations)
  words: 900
  points:
  - 'Філософські притчі Григорія Сковороди: алегоризм та повчальність як основа української
    літературної традиції'
  - 'Байки Леоніда Глібова: жанрові особливості та роль моралі. Диференціація казки
    та байки (Learner Error: Fairy tale vs Fable)'
  - 'Сатира в казці ''Пан Коцький'': іронія над сліпою покорою авторитетам та ''страхом,
    що має великі очі'' (Cultural Hook)'
- section: Лінгвістичний аналіз та типові труднощі (Linguistic Analysis and Common
    Difficulties)
  words: 800
  points:
  - 'Аналіз переносного значення та алегорії в текстах притч: від буквального до філософського
    трактування'
  - 'Фразеологізми в казковому контексті: розуміння ідіом на кшталт ''піймати облизня''
    (Learner Error: Literal Translation)'
  - 'Казкові формули та кліше: ''стали жити-поживати'', ''і я там був, мед-пиво пив''
    як інструменти побудови наративу'
- section: Творча практика та дискусія (Creative Practice and Discussion)
  words: 800
  points:
  - 'Порівняльний аналіз: український Котигорошко vs європейські аналоги (аналіз схожих
    сюжетів та локальної специфіки)'
  - Написання сучасної притчі на задану тему з використанням алегоричних персонажів
    та моралі
  - Обговорення казки як інструменту сучасного виховання та деколонізації фольклорних
    наративів
focus: vocabulary
pedagogy: Immersion & Analysis
objectives:
- Learner can categorize Ukrainian folk tales into magic, animal, and social types
- Learner can analyze the moral and philosophical layers of Ukrainian parables
- Learner can use traditional storytelling formulas in their own narratives
grammar:
- Narrative structures
- Moral and allegorical registers
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Казкар
word_target: 4000
vocabulary_hints:
  required:
  - казка (fairy tale) — народна казка, чарівна казка, розказувати казку; high frequency
  - притча (parable) — біблійна притча, філософська притча, мова притч; medium frequency
    (literary)
  - байка (fable) — писати байки, мораль байки, персонажі байки; medium frequency
    (literary)
  - алегорія (allegory) — вдаватися до алегорії, прозора алегорія; academic register/medium
    frequency
  - мораль (moral) — мораль цієї історії, читати мораль, подвійна мораль; high frequency
  recommended:
  - зачин (opening/prologue) — традиційний зачин, казковий зачин; low frequency (literary/structural)
  - піймати облизня (to fail/be rebuffed) — ідіоматичний вираз; correction for literal
    translation errors
  - жив-був (once upon a time) — традиційна інверсія; usage marker for storytelling
    register
  - епітет (epithet) — постійний епітет, влучний епітет; academic register/stylistic
    analysis
