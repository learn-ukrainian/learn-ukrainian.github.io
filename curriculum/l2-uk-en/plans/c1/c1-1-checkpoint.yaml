content_outline:
- section: 'Вступ: Академічні основи C1.1 (Introduction: C1.1 Academic Foundations)'
  words: 500
  points:
  - Систематизація знань про функціональні стилі української мови (науковий, офіційний, публіцистичний) згідно з §4.4.1.1
    Державного стандарту.
  - 'Культурний контекст: Традиції української академічної риторики від Києво-Могилянської академії (1632) до Наукового товариства
    імені Шевченка (1873) як центрів інтелектуальної самоорганізації.'
- section: Граматика та синтаксис наукового викладу (Grammar and Syntax of Scientific Exposition)
  words: 700
  points:
  - 'Аналіз синтаксису складного речення: коректне вживання дієприкметникових та дієприслівникових зворотів у науковому тексті
    без калькування.'
  - 'Трансформаційна практика: подолання надуживання пасивним станом (Passive Voice Overuse) шляхом переходу до активних конструкцій
    («ми дійшли висновку») або безособових форм на -но, -то.'
- section: Академічний лексикон та стратегії хеджування (Academic Lexicon and Hedging Strategies)
  words: 800
  points:
  - 'Лексичний аудит та дебілізація канцеляризмів: заміна кальки «дана проблема» на «ця/зазначена/розглядувана проблема» та
    «приймати участь» на «брати участь».'
  - 'Опанування стратегій хеджування (пом''якшення категоричності): використання маркерів «ймовірно», «можна припустити»,
    «видається доцільним» для дотримання наукової етики.'
- section: Наукове письмо та критичне рецензування (Scientific Writing and Critical Reviewing)
  words: 900
  points:
  - 'Корекція типових помилок слововживання: диференціація дієслів «вважати» (для висловлення думки) та «рахувати» (для лічби
    чисел) у структурі аргументації.'
  - 'Алгоритм написання академічної рецензії: від аналізу методології дослідження до формулювання конструктивної критики та
    висновків.'
- section: Усна презентація та самооцінка (Oral Presentation and Self-Assessment)
  words: 1100
  points:
  - 'Риторичні маркери усної доповіді: структурування виступу, використання перехідних фраз та мовна взаємодія з аудиторією
    в офіційному регістрі.'
  - 'Фінальна контрольна точка: комплексна перевірка засвоєння академічної бази (консолідація знань, номіналізація, фахова
    компетенція) за дескрипторами CEFR C1.'
