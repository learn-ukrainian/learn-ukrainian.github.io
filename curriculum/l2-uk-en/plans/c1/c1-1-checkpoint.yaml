vocabulary_hints:
  required:
  - консолідація (consolidation) — консолідація знань, зусиль; висока частотність у науковому та публіцистичному стилях
  - компетенція (competency) — фахова/мовна компетенція, набути компетенції; базовий термін офіційного спілкування
  - номіналізація (nominalization) — процес номіналізації, засіб номіналізації; спеціальний термін для опису віддієслівних
    іменників
  - хеджування (hedging) — стратегії хеджування, засоби хеджування; ключова концепція для пом'якшення категоричності в науці
  - рецензія (review) — критична рецензія на статтю, написати рецензію; обов'язковий жанр академічного письма
  - здобувач (candidate/seeker) — здобувач наукового ступеня; використовувати замість калькованого «співшукач»
  recommended:
  - ймовірно (probably/likely) — ключовий маркер хеджування для вираження припущення
  - вважати (to consider/believe) — вживати для висловлення власної думки («я вважаю»), уникаючи помилкового «я рахую»
  - розглядуваний (under consideration) — заміна канцеляризму «даний» («розглядуване питання»)
  - брати участь (to participate) — єдино правильний варіант замість помилкового «приймати участь»
prerequisites:
- practice-ii-article-critique
