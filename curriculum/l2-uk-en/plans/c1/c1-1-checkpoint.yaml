title: Контрольна точка — Академічна база
focus: checkpoint
phase: C1.1 [Academic Writing & Research]
objectives:
- Демонструвати засвоєння академічного стилю мовлення
- Застосовувати навички наукового письма у практичних завданнях
- Оцінювати власний рівень володіння академічною українською
