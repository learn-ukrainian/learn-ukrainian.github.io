module: c1-023
level: C1
sequence: 23
slug: c1-1-checkpoint
version: '1.1'
title: "Підсумковий контроль: рівень C1.1"
subtitle: "Підсумковий контроль: C1.1"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Перевірити рівень засвоєння академічної лексики та термінології."
  - "Оцінити навички створення складних академічних текстів (есе, анотація, огляд)."
  - "Підтвердити вміння вести фахову дискусію та аргументувати власну позицію."
  - "Виявити зони для подальшого вдосконалення на рівні C1."

reading_situations:
  - source_type: "науково-популярний текст"
    topic: "Комплексний огляд стану сучасної української культури в умовах глобалізації."
    key_elements: ["синтез ідей", "складна пунктуація", "термінологія"]
    motivation: "Контрольне читання для перевірки розуміння глибоких змістових зв'язків
      та авторської позиції."

listening_situations:
  - media_type: "аудіо"
    setting: "Компіляція фрагментів різних наукових дискусій та доповідей."
    focus_points: ["ключові тези", "риторичні прийоми", "ставлення мовця до проблеми"]
    motivation: "Підсумкова перевірка навичок аудіювання в академічному контексті."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть підсумкове академічне есе (500-600 слів) на одну з обраних тем:
      'Мова як інструмент м'якої сили' або 'Майбутнє університетської освіти в цифрову
      епоху'."
    requirements: ["використання всіх вивчених граматичних та лексичних тем", "логічна
          бездоганність", "стилістична єдність"]
    motivation: "Фінальна оцінка письмової компетенції студента на рівні C1.1."
    model_answer: "Текст має бути зразком академічного письма з використанням складної
      пунктуації, пасивних конструкцій, хеджування та багатої термінології."

discussion_topics:
  - context: "Презентація та захист власного проєкту (або результатів навчання) перед
      аудиторією."
    questions: ["Які ваші найбільші досягнення в опануванні української мови на цьому
          рівні?", "З якими труднощами ви стикалися при роботі з науковими текстами?",
      "Як ви плануєте використовувати здобуті знання у професійній діяльності?"]
    motivation: "Підсумкова усна перевірка навичок самопрезентації та рефлексії."

content_outline:
  - section: "Повторення та систематизація лексики"
    words: 1000
    subsections:
      - "Академічний вокабуляр: від абстрактних понять до вузької термінології"
      - "Фразеологія наукової мови та ділового етикету"
      - "Пароніми та складні випадки слововживання в професійному дискурсі"
    key_concepts:
      - "терміносистема"
      - "стилістична диференціація"
      - "мовна норма"
  - section: "Синтаксис та пунктуація: фінальний огляд"
    words: 1000
    subsections:
      - "Складні речення з різними видами зв'язку в науковому тексті"
      - "Пунктуаційний аналіз складних фрагментів (цитати, вставні конструкції)"
      - "Редагування речень з порушенням синтаксичних норм"
    key_concepts:
      - "синтаксична складність"
      - "пунктуаційна вправність"
      - "граматична правильність"
  - section: "Жанрова палітра академічного письма"
    words: 1000
    subsections:
      - "Зіставлення структури анотації, тез та есе"
      - "Методи компресії та розгортання інформації"
      - "Специфіка офіційно-ділового стилю в Україні"
    key_concepts:
      - "жанрова специфіка"
      - "текстотворення"
      - "функціональний стиль"
  - section: "Комунікативні стратегії рівня C1"
    words: 1000
    subsections:
      - "Техніки ведення переконливої полеміки"
      - "Мистецтво наукової презентації та публічного захисту"
      - "Етика та культура академічного спілкування"
    key_concepts:
      - "комунікативна впевненість"
      - "риторична майстерність"
      - "академічна ідентичність"

vocabulary:
  required:
    - підсумовувати
    - узагальнювати
    - компетенція
    - досягнення
    - рефлексія
    - адекватність
    - відповідність
    - прогрес
  recommended:
    - фундаментальний
    - комплексний
    - цілісність
    - трансформація
    - досконалість

activity_hints:
  - type: reading
    focus: "Прочитайте текст про повторення та систематизація лексики і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про синтаксис та пунктуація: фінальний огляд, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Повторення та систематизація лексики». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему повторення та систематизація лексики."
  - type: comparative-study
    focus: "Порівняйте різні підходи до повторення та систематизація лексики: Академічний вокабуляр: від абстрактних понять до вузької термінології. Визначте спільне та відмінне."

activities:
  types_required:
    - essay-response
    - critical-analysis
    - error-correction
    - translate
    - true-false
  min_items_per_type: 10
  total_min_items: 50

references:
  - "Глазова, 11 клас (2019): §1-10, §45 — Повний курс"
  - "Авраменко, 11 клас (2019): Стилістична норма, с. 164"
  - "Ворон, 11 клас (2019): с. 207-218 — Науковий стиль, наукова доповідь"
  - "State Standard 2024: C1 competencies — academic writing and discourse"

