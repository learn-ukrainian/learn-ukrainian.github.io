module: c1-094
level: C1
sequence: 94
slug: rehionalni-tantsi
version: '1.1'
title: "Регіональні танці України: від Карпат до Полісся"
subtitle: "Регіональні танці України"
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити етнографічне розмаїття української народної хореографії в різних історико-етнографічних
    регіонах."
  - "Ознайомитися з особливостями гуцульських (Аркан, Коломийка), буковинських, закарпатських
    та поліських танців."
  - "Проаналізувати взаємозв'язок між музичним ритмом, вокальним супроводом (коломийковий
    вірш) та танцювальним малюнком."
  - "Вивчити специфічну лексику та діалектизми, пов'язані з регіональною танцювальною
    культурою (легінь, файно, в'язанка)."

reading_situations:
  - source_type: "етнографічне дослідження"
    topic: "Аркан як ініціальний ритуал гуцульських леґінів: символіка кола та солярні
      мотиви."
    key_elements: ["ініціація", "солярний культ", "ритуальний танець"]
    motivation: "Вивчення наукового стилю в галузі етнології та засвоєння архаїчної
      символіки."
  - source_type: "мистецтвознавчий нарис"
    topic: "Стилістичні відмінності поліської польки та подільського козачка: порівняльний
      аналіз."
    key_elements: ["дріботіння", "темпоральність", "етнографічний костюм"]
    motivation: "Розвиток навичок порівняльного опису хореографічних технік."

listening_situations:
  - media_type: "лекція"
    setting: "Вебінар про структуру коломийкового вірша та його втілення в танці."
    focus_points: ["14-складовий рядок", "цезура", "зв'язок слова та руху"]
    motivation: "Розуміння ритмічної єдності тексту та хореографії в українському
      фольклорі."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть відгук (300-350 слів) на виступ фольклорного колективу, що презентує
      танці вашого улюбленого регіону України."
    requirements: ["використання назв специфічних рухів", "опис регіональних особливостей
          костюма", "аналіз емоційної напруги"]
    motivation: "Практика написання критичного тексту з використанням вузькоспеціалізованої
      лексики."
    model_answer: "Текст повинен містити опис характерних рис обраного регіону (наприклад,
      гуцульського Аркана), згадку про музичні інструменти (цимбали, трембіта) та
      оцінку майстерності виконавців."

content_outline:
  - section: "Гуцульщина: магія гір та ритм Аркана"
    words: 1000
    subsections:
      - "Аркан: чоловічий танець-випробування та його міфологічні корені"
      - "Коломийка: універсальність жанру (співанка, танець, гра)"
      - "Гуцулка та тропотянка: швидкість, дріботіння та віртуозність"
    key_concepts:
      - "леґінь"
      - "ініціація"
      - "карпатський драйв"
  - section: "Буковина та Закарпаття: перехрестя культур"
    words: 1000
    subsections:
      - "Буковинські танці: витонченість, грація та вплив сусідніх народів"
      - "Закарпатський чардаш та березнянка: специфіка кроку та пози"
      - "Роль інструментального супроводу (троїсті музики)"
    key_concepts:
      - "транскордонність"
      - "пластичність"
      - "темперамент"
  - section: "Полісся та Центральна Україна: традиція рівнини"
    words: 1000
    subsections:
      - "Поліська полька: простота, гумор та активне тупотіння"
      - "Дівочі хороводи Центральної України: плавність та ліризм"
      - "Побутові танці: 'Ойра', 'Краков'як' та їхня адаптація в українському середовищі"
    key_concepts:
      - "побут"
      - "хоровод"
      - "народний гумор"
  - section: "Естетика народного костюма в русі"
    words: 1000
    subsections:
      - "Як ландшафт вплинув на хореографію (гірське взуття vs рівнинне)"
      - "Функціональність регіонального вбрання для танцюриста"
      - "Збереження автентичного танцю в сучасних етно-проектах"
    key_concepts:
      - "етнодизайн"
      - "автентика"
      - "культурний ландшафт"

vocabulary:
  required:
    - аркан
    - коломийка
    - леґінь
    - троїсті музики
    - хореографія
    - регіональний
    - орнамент
    - автентичний
  recommended:
    - ініціація
    - архітектоніка
    - еволюція
    - колорит
    - майстерність

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - select
    - fill-in
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте етнографічне дослідження про Аркан. Визначте символіку ритуального
      танцю та архаїчну лексику."
  - type: critical-analysis
    focus: "Проаналізуйте порівняльний опис поліської польки та подільського козачка.
      Визначте критерії порівняння та авторські оцінки."
  - type: match-up
    focus: "Зіставте регіональні танці (Аркан, коломийка, гуцулка, чардаш, полька)
      з їхніми характеристиками та регіонами."
  - type: fill-in
    focus: "Доповніть текст про хореографічне розмаїття відповідними термінами (леґінь,
      дріботіння, троїсті музики, хоровод, етнодизайн)."
  - type: essay-response
    focus: "Напишіть відгук на виступ фольклорного колективу. Опишіть регіональні
      особливості танцю, костюма та музики."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
  - "Караман, 10 клас (2018), §38 — Стилістично забарвлена лексика"
  - "Борисенко В. Етнографія українців — народна хореографія (загальна довідка)"

connects_to:
  previous: "hopak-i-kozachok"
  next: "pysanky"
phase: C1.3 [Advanced Stylistics & Rhetoric]
