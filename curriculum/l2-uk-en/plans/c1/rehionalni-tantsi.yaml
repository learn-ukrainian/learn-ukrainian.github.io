module: c1-052
level: C1
sequence: 52
slug: rehionalni-tantsi
version: '2.0'
title: 'Регіональні танці: Від Аркана до Коломийки'
subtitle: 'Regional Dances: From Arkan to Kolomyika'
content_outline:
- section: 'Вступ: Танцювальна мапа та етнографічний стиль (Introduction: Dance Map
    and Ethnographic Style)'
  words: 600
  points:
  - 'Регіональні особливості танцювальної культури: географічний та історичний детермінізм
    стилів'
  - 'Стилістичне розмежування: науковий (етнографічний) та художній описи культурних
    явищ згідно з §4.4.1.1'
  - 'Термінологічна точність: розрізнення лексем «танець», «танок», «пляс» та «хоровод»
    залежно від контексту та регіону'
  - 'Подолання культурних стереотипів: чому Гопак не є єдиним репрезентантом української
    хореографії'
- section: 'Гуцульський Аркан: Ритуал ініціації та магія кола (Hutsul Arkan: Initiation
    Ritual and Circle Magic)'
  words: 1000
  points:
  - 'Аркан як сакральний танець-ініціація: перехід двадцятирічного юнака у статус
    «легіня» (молодого воїна)'
  - 'Культурний гачок: символіка «замкнутого кола» та соціальні наслідки для того,
    хто розірвав ритм або коло'
  - 'Хореографічні особливості: приземленість, стриманість та «чоловіча енергія» гірського
    танцю на противагу степовим'
  - 'Музичний супровід: роль трембіти, цимбалів та сопілки у створенні ритуальної
    атмосфери'
- section: 'Коломийка: Жива газета Карпат (Kolomyika: The Living Newspaper of the
    Carpathians)'
  words: 800
  points:
  - 'Коломийка як синтетичний жанр: нерозривний зв''язок танцю, музики та імпровізованої
    поезії'
  - 'Функція «соціальних мереж»: використання танцювальних куплетів для поширення
    новин, сатири та пліток'
  - 'Структура та ритміка: аналіз коротких куплетів та їхнього впливу на динаміку
    та темп виконання'
  - 'Регіональні варіації: бойківські та лемківські особливості народної хореографії
    Західної України'
- section: 'Степова та Подільська традиції: Від козацького плясу до лірики (Steppe
    and Podillia Traditions: From Cossack Dance to Lyrics)'
  words: 800
  points:
  - 'Контраст енергій: порівняння «вертикальної/войовничої» енергії Гопака та «кругової/общинної»
    енергії Аркана'
  - 'Полтавські та Подільські танці: грація, ліричність жіночих партій та роль гумору
    в хореографії'
  - 'Степові танці: прямий зв''язок із козацькою муштрою, бойовими мистецтвами та
    демонстрацією індивідуальної вправності'
  - 'Етнічні взаємовпливи: кримськотатарські та балканські елементи в танцювальній
    пластиці Півдня України'
- section: 'Практикум: Мистецтво етнографічного опису та дискусія (Workshop: Art of
    Ethnographic Description and Discussion)'
  words: 800
  points:
  - 'Стилістична вправа: опис танцювального перформансу з використанням конструкції
    «танцювати під музики» (фольклорний стиль)'
  - 'Порівняльний аналіз: Аркан vs Гопак як етнічні та територіальні маркери різних
    ландшафтних зон'
  - 'Літературні паралелі: аналіз описів народних танців у творах М. Коцюбинського
    як засіб створення автентичності'
  - 'Дискусія та есе: «Танець як інструмент збереження ідентичності та форма культурного
    опору»'
focus: history
pedagogy: CBI
objectives:
- Analyze the ritual significance of the Arkan for the Hutsul community
- Identify the musical and choreographic features of the Kolomyika
- Distinguish regional dance styles from Central, Western, and Southern Ukraine
grammar:
- Comparative registers
- Descriptive ethnography
phase: C1.5 Folk Culture & Fine Arts
persona:
  voice: Senior Specialist
  role: Хореограф ансамблю
word_target: 4000
vocabulary_hints:
  required:
  - 'Аркан (Arkan) — гуцульський чоловічий ритуальний танець; collocations: танцювати
    аркан, замкнуте коло, тримати ритм'
  - 'Коломийка (Kolomyika) — жанр танцю-пісні; collocations: співати коломийки, імпровізовані
    куплети, ритм коломийки'
  - Легінь (Legin) — юнак, молодий воїна (гуцульський діалект); ключовий термін для
    контексту ініціації в Аркані
  - 'Викрутас (Vykrutas) — хитромудрий танцювальний рух; collocations: робити викрутаси,
    техніка викрутасів'
  - 'Присядка (Prisyadka) — характерний елемент чоловічого танцю; collocations: робити
    глибоку присядку, техніка присядки'
  recommended:
  - 'Пляс (Plyas) — фольклорна/архаїчна назва танцю; register: використовується в
    етнографічному та художньому стилях'
  - 'Трембіта (Trembita) — гуцульський духовий інструмент; usage: звук трембіти як
    сигнал до початку ритуалу'
  - 'Під музики (To the musicians) — стилістична фольклорна конструкція; usage: танцювати
    під музики (замість стандартного ''під музику'')'
  - 'Хореографія (Choreography) — академічний термін; usage: народна хореографія,
    постановка хореографії'
