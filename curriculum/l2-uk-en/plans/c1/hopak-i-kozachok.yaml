module: c1-077
level: C1
sequence: 77
slug: hopak-i-kozachok
version: '1.1'
title: "Гопак та козачок: енергія козацького духу"
subtitle: "Hopak and Kozachok: Energy of the Cossack Spirit"
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити генезис гопака як синтезу танцювального мистецтва та бойової підготовки козацтва."
  - "Ознайомитися з історією відродження бойового гопака як сучасного національного одноборства."
  - "Проаналізувати музично-ритмічну структуру гопака та козачка (розмір 2/4, наростання темпу)."
  - "Вивчити лексику, що описує танцювальні рухи (навприсядки, повзунець, розніжка, пірует)."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Бойовий гопак: від козацьких січей до всесвітніх фестивалів бойових мистецтв."
    key_elements: ["рівні майстерності", "характерник", "філософія воїна"]
    motivation: "Засвоєння термінології бойових мистецтв та історичного контексту козацької культури."
  - source_type: "рецензія на виставу"
    topic: "Тріумф ансамблю імені Павла Вірського: гопак як візитівка України на світовій сцені."
    key_elements: ["хореографічний малюнок", "віртуозність", "сценічна інтерпретація"]
    motivation: "Вивчення мистецтвознавчої лексики та засобів опису динамічних сцен."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з Володимиром Пилатом про заснування школи бойового гопака у Львові."
    focus_points: ["історія створення", "система ступенів (Жовтяк, Сокіл, Волхв)", "виховна роль"]
    motivation: "Тренування сприйняття розповідного мовлення про розвиток сучасних спортивних течій."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Уявіть, що ви відвідали виступ Національного ансамблю танцю України. Напишіть репортаж (350-400 слів), фокусуючись на фінальному гопаку."
    requirements: ["використання дієслів руху", "опис емоційного стану глядачів", "вживання професійної термінології"]
    motivation: "Практика створення динамічного описового тексту в публіцистичному стилі."
    model_answer: "Текст повинен передавати атмосферу залу, описувати технічну складність трюків (наприклад, 'шпагат на льоту') та підкреслювати символічне значення танцю як вияву національної сили."

content_outline:
  - section: "Гопак: від бойової розминки до національного символу"
    words: 1000
    subsections:
      - "Козацькі забави: як фізичні вправи перетворилися на танець"
      - "Чоловічий та жіночий гопак: різниця в характерах та рухах"
      - "Символіка козацького строю у танці (шаровари, пояс, вишиванка)"
    key_concepts:
      - "лицарство"
      - "шляхетність"
      - "спритність"
  - section: "Бойовий гопак: шлях воїна"
    words: 1000
    subsections:
      - "Володимир Пилат та реконструкція козацького герцю"
      - "Сім рівнів майстерності: від 'Жовтяка' до 'Волхва'"
      - "Асгарда: специфіка жіночого бойового мистецтва на основі гопака"
    key_concepts:
      - "одноборство"
      - "характерництво"
      - "духовний гарт"
  - section: "Музична та хореографічна архітектоніка"
    words: 1000
    subsections:
      - "Ритміка гопака: дводольний розмір та поступове прискорення"
      - "Класичні фігури: повзунець, млинок, розніжка, голубці"
      - "Козачок як швидший та легший варіант народного танцю"
    key_concepts:
      - "темпоритм"
      - "акробатика"
      - "хореографія"
  - section: "Гопак у світовому культурному просторі"
    words: 1000
    subsections:
      - "Спадщина Павла Вірського: створення академічного канону"
      - "Гопак в операх та симфонічній музиці (М. Мусоргський, С. Гулак-Артемовський)"
      - "Сучасна популяризація танцю: від флешмобів до Олімпійських ігор"
    key_concepts:
      - "канон"
      - "візитівка"
      - "світове визнання"

vocabulary:
  required:
    - гопак
    - козачок
    - навприсядки
    - віртуозність
    - лицарство
    - майстерність
    - ансамбль
    - акробатичний
  recommended:
    - характерник
    - автентичний
    - хореографічний
    - динаміка
    - патріотизм

activities:
  types_required:
    - critical-analysis
    - match-up
    - fill-in
    - select
    - error-correction
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте наукову статтю про бойовий гопак. Визначте термінологію бойових мистецтв та поясніть систему рівнів майстерності."
  - type: critical-analysis
    focus: "Проаналізуйте рецензію на виступ ансамблю Вірського. Визначте мистецтвознавчу лексику та критерії оцінки хореографії."
  - type: match-up
    focus: "Зіставте танцювальні рухи (навприсядки, повзунець, розніжка, млинок, голубці) з їхніми описами."
  - type: fill-in
    focus: "Доповніть текст про музично-ритмічну структуру гопака відповідними термінами (темпоритм, акробатика, хореографія, канон, віртуозність)."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у тексті про гопак: русизми, неточні терміни, стилістичні невідповідності."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
  - "Караман, 10 клас (2018), §38 — Стилістично забарвлена лексика"
  - "Хореографічні довідники — Вірський, бойовий гопак (загальна довідка)"

connects_to:
