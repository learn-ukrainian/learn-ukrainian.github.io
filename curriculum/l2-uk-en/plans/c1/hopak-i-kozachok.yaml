vocabulary_hints:
  required:
  - присядка (prysidka) — виконувати присядку; technical noun, avoid the calque 'вприсядку'
  - розніжка (rozmizhka) — висока розніжка; technical term for a split-jump in the air
  - повзунець (povzunets) — фігура 'повзунець'; signature low-squat movement popularized by Virsky
  - вихиляс (vykhylias) — робити вихиляси; a flirtatious or boastful twisting movement
  - бойовий вишкіл (combat training) — елемент бойового вишколу; historical/martial context of the dance
  - імпровізація (improvisation) — повна імпровізація; a core element of traditional Cossack dance aesthetics
  recommended:
  - відбивати такт (to beat the rhythm) — sophisticated synonym for keeping time or dancing vigorously
  - виконувати па (to perform steps) — professional/academic register for choreographic movements
  - кружляти вихором (to whirl like a vortex) — dynamic C1-level description for high-speed rotation
  - злітати (to soar/fly up) — used to describe high acrobatic jumps in Hopak
  - зухвалість (audacity/boldness) — characterizing the spirit of the Cossack dancers
