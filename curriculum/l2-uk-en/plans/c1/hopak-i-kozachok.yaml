module: c1-071
level: C1
sequence: 71
slug: hopak-i-kozachok
version: '2.0'
title: 'Гопак і козачок: Танці волі та сили'
subtitle: 'Hopak and Kozachok: Dances of Freedom and Power'
content_outline:
- section: 'Вступ: Танець як генетичний код волі (Introduction: Dance as a Genetic
    Code of Freedom)'
  words: 500
  points:
  - Analyze the historical origins of Hopak as a martial art, emphasizing its evolution
    from Zaporozhian Cossack military training (§3.21 State Standard).
  - Introduce the concept of 'Combat Hopak' (Бойовий гопак), revived by Volodymyr
    Pylat in 1985, as a modern proof of the dance's martial roots.
  - 'Discuss the ''Letter to the Sultan'' legend: how the energy of Hopak fueled the
    Cossacks'' defiance and creative audacity.'
- section: 'Гопак: Акробатика сили та бойовий вишкіл (Hopak: Acrobatics of Power and
    Combat Training)'
  words: 1000
  points:
  - 'Deep dive into the terminology of movement: technical definitions and execution
    of ''присядка'', ''розніжка'', ''повзунець'', and ''пістолет''.'
  - Explain the transformation of folk dance into high art by Pavlo Virsky, focusing
    on how 'povzunets' became a global signature of Ukrainian choreography.
  - 'Linguistic focus: Using dynamic narrative registers and verbs of motion (''злітати'',
    ''присідати'', ''крутитися вихором'') to convey performance energy (§4.4.1.1).'
- section: 'Козачок: Грація, темп та соціальна взаємодія (Kozachok: Grace, Tempo,
    and Social Interaction)'
  words: 800
  points:
  - 'Correction of learner error: Distinguish Kozachok as an independent genre with
    a 2/4 musical signature, not merely a ''small Hopak''.'
  - Analyze the role of the female partner in Kozachok, highlighting her leading role
    and the 'вихиляс' as a movement of flirtatious grace.
  - Contrast the lyrical and social nature of the pair-based Kozachok with the competitive,
    soloistic nature of the male Hopak.
- section: Лінгвістична точність та стилістика (Linguistic Precision and Stylistics)
  words: 700
  points:
  - 'Targeting calques: Drill the use of the noun ''присядка'' (e.g., ''виконувати
    присядку'') to replace the common Russian-influenced error ''вприсядку''.'
  - 'Synonym expansion for ''танцювати'': Integrate C1-level alternatives such as
    ''виконувати па'', ''кружляти'', ''іти в танок'', and ''відбивати такт''.'
  - Identify markers of journalistic vs. artistic styles in dance criticism, focusing
    on professional terminology and emotive adjectives.
- section: 'Практика: Опис, аналіз та рефлексія (Practice: Description, Analysis,
    and Reflection)'
  words: 1000
  points:
  - 'Detailed analysis of a dance performance: students describe technical figures
    using ''повзунець'' and ''розніжка'' in a formal choreographic register.'
  - 'Critical essay: Evaluate the role of traditional dance in constructing national
    identity and decolonizing Ukrainian cultural narratives.'
  - 'Comparative discussion: The evolution from village improvisation to the ''combat''
    revival and academic stage versions of the 21st century.'
focus: history
pedagogy: CBI
objectives:
- Analyze the historical origins of Hopak as a martial art and a dance
- Distinguish between the ritual, social, and stage versions of Ukrainian dances
- Understand the cultural significance of the Kozachok and its regional variations
grammar:
- Dynamic narrative registers
- Terminology of movement
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Отаман
word_target: 4000
vocabulary_hints:
  required:
  - присядка (prysidka) — виконувати присядку; technical noun, avoid the calque 'вприсядку'
  - розніжка (rozmizhka) — висока розніжка; technical term for a split-jump in the
    air
  - повзунець (povzunets) — фігура 'повзунець'; signature low-squat movement popularized
    by Virsky
  - вихиляс (vykhylias) — робити вихиляси; a flirtatious or boastful twisting movement
  - бойовий вишкіл (combat training) — елемент бойового вишколу; historical/martial
    context of the dance
  - імпровізація (improvisation) — повна імпровізація; a core element of traditional
    Cossack dance aesthetics
  recommended:
  - відбивати такт (to beat the rhythm) — sophisticated synonym for keeping time or
    dancing vigorously
  - виконувати па (to perform steps) — professional/academic register for choreographic
    movements
  - кружляти вихором (to whirl like a vortex) — dynamic C1-level description for high-speed
    rotation
  - злітати (to soar/fly up) — used to describe high acrobatic jumps in Hopak
  - зухвалість (audacity/boldness) — characterizing the spirit of the Cossack dancers
