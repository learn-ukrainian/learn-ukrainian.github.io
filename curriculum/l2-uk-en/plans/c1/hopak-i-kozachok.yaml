- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про бойовий гопак: шлях воїна, використовуючи
    нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Гопак: від бойової
