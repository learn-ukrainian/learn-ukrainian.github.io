vocabulary_hints:
  required:
  - модернізм (modernism) — український модернізм, епоха модернізму; High (Academic) register
  - авангард (avant-garde) — київський авангард, музичний авангард; specifically the 'Sixtiers' (шістдесятники) generation
  - 'симфонія (symphony) — третя симфонія, симфонічний оркестр; note: use «частина» for movements'
  - партитура (score) — читати партитуру, оркестрова партитура; professional music terminology
  - дисонанс (dissonance) — звуковий дисонанс, розв'язати дисонанс; also used figuratively for cognitive dissonance
  - неофольклоризм (neofolklorism) — хвиля неофольклоризму, риси неофольклоризму; specialized art-history term
  recommended:
  - частина (movement) — used for symphonies/concertos; avoids the error of using «рух»
  - враження від (impression of/from) — mandatory prepositional phrase; avoids the error «враження про»
  - сучасна (contemporary) — relating to living composers; distinct from «модерна» (Modernist era)
  - шістдесятники (Sixtiers) — cultural generation of the 1960s who revitalized Ukrainian art
