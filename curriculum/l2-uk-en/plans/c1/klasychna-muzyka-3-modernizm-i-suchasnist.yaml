module: c1-119
level: C1
sequence: 119
slug: klasychna-muzyka-3-modernizm-i-suchasnist
version: '1.2'
title: "Класична музика III: Модернізм, постмодернізм та сучасні течії"
subtitle: "Класична музика III: модернізм, постмодернізм та сучасність"
focus: history
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати розвиток української академічної музики XX-XXI століть у контексті
    світових мистецьких течій."
  - "Дослідити творчість Бориса Лятошинського як основоположника сучасного українського
    симфонізму."
  - "Вивчити феномен 'Київського авангарду' 1960-х років (В. Сильвестров, Л. Грабовський)."
  - "Ознайомитися з постмодерними шуканнями та сучасною академічною сценою України
    (М. Скорик, Є. Станкович, В. Польова)."

reading_situations:
  - source_type: "культурологічне есе"
    topic: "Київський авангард 1960-х: інтелектуальний спротив та пошук нової музичної
      мови."
    key_elements: ["додекафонія", "алеаторика", "сонористика", "дисидентство", "герметичність"]
    motivation: "Робота з текстом про складні мистецькі явища та їхній соціополітичний
      контекст."
  - source_type: "наукова стаття"
    topic: "Симфонізм Бориса Лятошинського: між експресіонізмом та національною традицією."
    key_elements: ["драматургія циклу", "філософська концепція", "оркестровка", "модерн"]
    motivation: "Вивчення академічного стилю аналізу великих музичних форм."

listening_situations:
  - media_type: "аудіо"
    setting: "Прослуховування 'Мелодії' Мирослава Скорика та 'Тихих пісень' Валентина
      Сильвестрова з аналізом стилю мета-музики."
    focus_points: ["емоційна стриманість", "постмодерна цитатність", "зв'язок із традицією
          крізь призму сучасності"]
    motivation: "Розвиток навичок розрізнення індивідуальних композиторських стилів
      XX століття."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте трансформацію поняття 'національне' в українській класичній
      музиці від Лятошинського до Сильвестрова. Як змінилися способи вираження ідентичності
      в епоху модерну та постмодерну?"
    requirements: ["мінімум 350 слів", "використання термінів: авангард, постмодернізм,
          стилізація, мета-музика", "аргументація на прикладах конкретних творів"]
    motivation: "Синтез знань про еволюцію мистецьких форм та ідей."
    model_answer: "Текст повинен висвітлювати перехід від прямого використання фольклорних
      цитат до глибинних структурних та філософських зв'язків із національною культурою.
      Слід згадати роль Лятошинського у створенні сучасної симфонічної мови та Сильвестрова
      — у переосмисленні тиші та пам'яті."

discussion_topics:
  - context: "Сучасна українська академічна музика активно інтегрує нові медіа, електроніку
      та мультидисциплінарні підходи (наприклад, опера 'Чорнобильдорф')."
    questions:
      - "Чи залишається класична музика 'елітарним' мистецтвом у цифрову епоху?"
      - "Яку роль відіграє сучасна академічна музика у культурній дипломатії України
        під час війни?"
    motivation: "Тренування навичок дискусії про актуальні процеси в сучасному мистецтві."

content_outline:
  - section: "Борис Лятошинський: на зламі епох"
    words: 1000
    subsections:
      - "Становлення майстра: вплив експресіонізму та пізнього романтизму"
      - "Третя симфонія як маніфест українського модернізму"
      - "Школа Лятошинського: виховання цілого покоління митців"
    key_concepts: ["симфонізм", "експресіонізм", "філософічність", "спадкоємність"]
  - section: "Київський авангард: шістдесятництво в музиці"
    words: 1000
    subsections:
      - "Група 'Київський авангард': Сильвестров, Грабовський, Годзяцький, Загоцев"
      - "Засвоєння новітніх технік: додекафонія, серіалізм, алеаторика"
      - "Конфлікт із радянським офіціозом та 'підпільна' слава"
    key_concepts: ["авангард", "додекафонія", "нова музична мова", "резистентність"]
  - section: "Постмодернізм та 'нова щирість'"
    words: 1000
    subsections:
      - "Мирослав Скорик: неостилістика та синтез класики з джазом і фольклором"
      - "Валентин Сильвестров: шлях до 'мета-музики' та тихих пісень"
      - "Євген Станкович: монументалізм та фольк-опера 'Цвіт папороті'"
    key_concepts: ["постмодернізм", "цитатність", "мета-музика", "стильовий синтез"]
  - section: "Сучасна музична панорама"
    words: 1000
    subsections:
      - "Жіноче обличчя української музики: Вікторія Польова, Алла Загайкевич, Ганна
        Гаврилець"
      - "Електроакустичні експерименти та мультимедійні проєкти"
      - "Українська музика на світових фестивалях: стратегії успіху та виклики"
    key_concepts: ["електроакустика", "мультидисциплінарність", "культурна дипломатія",
      "інноваційність"]

