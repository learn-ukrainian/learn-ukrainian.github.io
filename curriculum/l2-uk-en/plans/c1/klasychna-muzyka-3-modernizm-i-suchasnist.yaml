  required:
    - модернізм
    - постмодернізм
    - авангард
    - додекафонія
    - алеаторика
    - сонористика
    - симфонізм
    - експресіонізм
    - мета-музика
    - електроакустика
  recommended:
    - серіалізм
    - цитатність
    - неостилістика
    - деконструкція
    - дисидентство

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте текст про борис лятошинський: на зламі епох і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про київський авангард: шістдесятництво в музиці, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Борис Лятошинський: на зламі епох». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему борис лятошинський: на зламі епох."
  - type: comparative-study
    focus: "Порівняйте різні підходи до борис лятошинський: на зламі епох: Становлення майстра: вплив експресіонізму та пізнього романтизму. Визначте спільне та відмінне."

references:
