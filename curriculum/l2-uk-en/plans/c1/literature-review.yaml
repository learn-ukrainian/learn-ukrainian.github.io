slug: literature-review
version: '2.0'
title: Жанр — Огляд літератури
content_outline:
- section: 'Вступ: Жанр огляду літератури (Introduction: The Genre of Literature Review)'
  words: 500
  points:
  - Визначення огляду літератури як академічного жанру згідно з Державним стандартом
    §1.3.1.1 (Письмо), що вимагає вміння представляти проблему за допомогою ефективної
    логічної структури.
  - Чітке розмежування між оглядом літератури як частиною дисертації та самостійною
    оглядовою статтею (review article); відмінність від анотованої бібліографії.
- section: Інтелектуальна традиція та постаті (Intellectual Tradition and Figures)
  words: 600
  points:
  - Розвиток української інтелектуальної думки через жанр огляду в часописах «Основа»,
    «Киевская старина», а також сучасних виданнях «Критика» та «ЛітАкцент».
  - Аналіз наукового стилю Соломії Павличко та Віри Агеєвої як прикладів майстерного
    наукового синтезу та деколонізаційного переосмислення літературного канону.
- section: Пошук та критичний відбір джерел (Search and Critical Selection of Sources)
  words: 500
  points:
  - Стратегії пошуку авторитетних першоджерел та вторинних джерел; критерії оцінки
    якості та актуальності наукових публікацій.
  - Використання академічних баз даних та бібліотечних ресурсів для формування репрезентативної
    вибірки досліджень.
- section: Мова наукового синтезу (The Language of Scholarly Synthesis)
  words: 800
  points:
  - 'Граматичне ядро модуля: використання складних речень з підрядним з''ясувальним
    та вставних конструкцій для вираження наукового консенсусу («Дослідники сходяться
    на думці, що...»).'
  - 'Робота з дієсловами цитування: заміна надмірних «каже» та «пише» на прецизійні
    «стверджує», «наголошує», «заперечує», «обґрунтовує».'
- section: 'Подолання помилок: Синтез проти Переліку (Overcoming Errors: Synthesis
    vs. List)'
  words: 600
  points:
  - Аналіз типової помилки «списку» (List vs. Synthesis) та стратегії побудови наукової
    бесіди між авторами («На відміну від X, Y стверджує...»).
  - 'Практика парафразування: перехід від зловживання прямими цитатами до ефективного
    перефразування змісту для підтримки власної аргументації.'
- section: Виявлення прогалин та суперечностей (Identifying Gaps and Contradictions)
  words: 500
  points:
  - Методика виявлення внутрішніх суперечностей у літературі та визначення того, що
    ще не досліджено («заповнити прогалину в дослідженнях»).
  - Обґрунтування актуальності власного дослідження на основі критичної оцінки методологічних
    обмежень попередників.
- section: Практика написання та рецензування (Writing Practice and Peer Review)
  words: 500
  points:
  - Написання міні-огляду, що синтезує 3-5 джерел, з акцентом на логічній послідовності
    (тематичний vs хронологічний підхід).
  - 'Взаємне рецензування за чеклистом компетенцій С1: оцінка глибини аналізу, коректності
    цитування та багатства академічної лексики.'
vocabulary_hints:
  required:
  - огляд літератури (literature review) — робити огляд, критичний огляд, систематичний
    огляд; ключовий академічний термін
  - джерело (source) — першоджерело, авторитетне джерело, вторинне джерело; основа
    наукового пошуку
  - синтез (synthesis) — синтез ідей, на основі синтезу, метод синтезу; процес об'єднання
    думок різних авторів
  - прогалина (gap) — заповнити прогалину, виявити прогалину в дослідженнях; те, що
    залишилося поза увагою науковців
  - суперечність (contradiction) — містити суперечність, усунути суперечність, внутрішня
    суперечність; розбіжність у поглядах чи даних
  - стверджувати (to claim/state) — автор стверджує, як стверджують дослідники; високочастотне
    академічне дієслово цитування
  - наголошувати (to emphasize) — наголошувати на важливості, акцентувати увагу; для
    підкреслення ключових моментів
  - обґрунтовувати (to justify/substantiate) — обґрунтовувати актуальність, надавати
    аргументи; доведення логічності позиції
  recommended:
  - первинні джерела (primary sources) — оригінальні документи або дослідження
  - вторинні джерела (secondary sources) — праці, що аналізують або інтерпретують
    першоджерела
  - наукова дискусія (scholarly discourse) — контекст, у якому відбувається обмін
    ідеями
  - консенсус (consensus) — згода більшості дослідників з певного питання
  - парафраз (paraphrase) — переказ чужих думок власними словами зі збереженням сенсу
