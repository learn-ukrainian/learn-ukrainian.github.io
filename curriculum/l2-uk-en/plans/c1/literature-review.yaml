module: c1-016
level: C1
sequence: 16
slug: literature-review
version: '1.1'
title: "Огляд літератури: синтез та аналіз"
subtitle: "Огляд літератури: синтез та аналіз"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Навчитися групувати джерела за темами, підходами або хронологією."
  - "Опанувати мовні засоби для порівняння поглядів різних авторів."
  - "Вивчити стратегії критичного аналізу попередніх досліджень."
  - "Навчитися виявляти 'прогалини' (research gaps) у наявній літературі."

reading_situations:
  - source_type: "фрагмент дисертації"
    topic: "Історіографія питання про походження козацтва в українській науці XIX-XX
      століть."
    key_elements: ["першоджерела", "концептуальні розбіжності", "еволюція поглядів"]
    motivation: "Аналіз прикладів професійного синтезу різних наукових шкіл та підходів."
  - source_type: "науковий огляд"
    topic: "Сучасні напрями в українському мовознавстві: від описовості до когнітивістики."
    key_elements: ["синтез думок", "критична оцінка", "перспективні напрямки"]
    motivation: "Вивчення структури аналітичного огляду та способів зіставлення наукових
      парадигм."

listening_situations:
  - media_type: "лекція"
    setting: "Вебінар для аспірантів: 'Як написати якісний Literature Review'."
    focus_points: ["вимоги до джерельної бази", "техніки синтезу інформації", "виокремлення
          недосліджених аспектів"]
    motivation: "Розвиток навичок аудіювання фахових рекомендацій щодо академічного
      письма."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть фрагмент огляду літератури (200-250 слів), у якому зіставте
      погляди двох-трьох українських науковців на певну проблему. Виявіть розбіжності
      та спільні позиції."
    requirements: ["використання конструкцій порівняння", "критична оцінка", "виокремлення
          'research gap'"]
    motivation: "Практика синтезу наукових джерел як найвищого рівня аналітичної роботи."
    model_answer: "Текст має демонструвати вміння групувати авторів за підходами,
      використовуючи конструкції 'на противагу позиції X, Y вважає...', 'якщо X наголошує
      на..., то Y зосереджується на...'."

discussion_topics:
  - context: "Яка роль національної традиції в огляді світової літератури з певної
      проблеми?"
    questions: ["Як збалансувати вітчизняні та зарубіжні джерела?", "Чому важливо
          уникати надмірної цитованості на користь аналізу?", "Як ідентифікувати упередженість
          у наукових працях минулого?"]
    motivation: "Обговорення стратегій критичного відбору та інтерпретації наукових
      джерел."

content_outline:
  - section: "Принципи організації огляду літератури"
    words: 1000
    subsections:
      - "Хронологічний, тематичний та методологічний підходи"
      - "Від бібліографічного опису до критичного аналізу"
      - "Визначення 'research gap' як мета огляду"
    key_concepts:
      - "історіографія"
      - "систематизація"
      - "наукова лакуна"
  - section: "Мова порівняння та зіставлення"
    words: 1000
    subsections:
      - "Конструкції для вираження згоди та підтримки ідей"
      - "Засоби введення альтернативних точок зору"
      - "Мистецтво наукової дистанції: використання модальних слів"
    key_concepts:
      - "компаративний аналіз"
      - "дискурс"
      - "концептуальна єдність"
  - section: "Синтез як найвищий рівень аналізу"
    words: 1000
    subsections:
      - "Групування авторів за спільними ознаками"
      - "Виявлення суперечностей у наявних дослідженнях"
      - "Формулювання проміжного підсумку огляду"
    key_concepts:
      - "синтез даних"
      - "узагальнення"
      - "логічна тяглість"
  - section: "Академічна доброчесність в огляді"
    words: 1000
    subsections:
      - "Правильне цитування без втрати авторського голосу"
      - "Уникнення 'клаптикового' цитування (patchwriting)"
      - "Етика критичних зауважень на адресу попередників"
    key_concepts:
      - "самоцитування"
      - "вторинні джерела"
      - "науковий етикет"

vocabulary:
  required:
    - джерелознавство
    - парадигма
    - суперечність
    - концепція
    - переважати
    - поєднувати
    - зіставляти
    - наголошувати
  recommended:
    - інтегрувати
    - релевантний
    - полемічний
    - розбіжність
    - трансформація

activity_hints:
  - type: critical-analysis
    description: "Analyze a Ukrainian historiographical literature review about Kozak
      origins — evaluate source grouping, critical analysis quality, and research
      gap identification."
  - type: comparative-study
    description: "Match literature review organizational strategies (хронологічний,
      тематичний, методологічний) with example text structures."
  - type: error-correction
    description: "Fix 'patchwriting' and excessive citation in a literature review
      draft — improve synthesis and critical voice."
  - type: essay-response
    description: "Write a synthesis paragraph (150-200 words) comparing views of different
      Ukrainian scholars on a linguistic topic."
  - type: essay-response
    description: "Complete comparison sentences with appropriate phrases for agreement,
      disagreement, and alternative viewpoints."

activities:
  types_required:
    - critical-analysis
    - match-up
    - error-correction
    - translate
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Ворон, 11 клас (2019): с. 218 — Науковий стиль мовлення"
  - "Глазова, 11 клас (2019): §1-10 — Культура мовлення"
  - "Авраменко, 11 клас (2019): с. 164 — Стилістична норма"

connects_to:
  previous: "abstract-writing"
  next: "oral-presentations"
phase: C1.1 [Academic Foundation]
