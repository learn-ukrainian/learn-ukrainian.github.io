module: c1-011
level: C1
sequence: 11
slug: summary-paraphrase
version: '1.0'
title: "Реферування та перефразування"
subtitle: "Summary and Paraphrase"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Навчитися виокремлювати головну та другорядну інформацію у складних текстах."
  - "Опанувати техніки компресії тексту без втрати змістової повноти."
  - "Вивчити методи перефразування академічних тверджень з використанням синонімії та граматичних трансформацій."
  - "Засвоїти правила академічної доброчесності та способи уникнення плагіату при реферуванні."

reading_situations:
  - source_type: "науково-популярна стаття"
    topic: "Філософія 'сродної праці' Григорія Сковороди в сучасному контексті."
    key_elements: ["антропоцентризм", "самопізнання", "щастя", "суспільне благо"]
    motivation: "Аналіз складних філософських ідей для подальшого стислого переказу (реферування)."
  - source_type: "історичний нарис"
    topic: "Культурний ренесанс 1920-х років в Україні: здобутки та трагедія."
    key_elements: ["модернізація", "літературна дискусія", "українізація"]
    motivation: "Практика перефразування історичних фактів та оцінок без спотворення змісту."

listening_situations:
  - media_type: "подкаст"
    setting: "Обговорення ролі перекладу у формуванні української наукової термінології."
    focus_points: ["ключові етапи розвитку мови", "вплив іншомовних запозичень", "стратегії термінотворення"]
    motivation: "Розвиток навичок нотування головних тез під час прослуховування для створення короткого звіту."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть стислий огляд (150-200 слів) запропонованого тексту про розвиток кібернетики в Україні, використовуючи техніки перефразування."
    requirements: ["мінімум 3 різні методи перефразування", "академічний стиль", "відсутність дослівного копіювання"]
    motivation: "Відпрацювання навичок синтезу інформації та уникнення плагіату."
    model_answer: "Текст має демонструвати заміну активних конструкцій пасивними, використання контекстуальних синонімів та зміну структури речень."

content_outline:
  - section: "Основи наукового реферування"
    words: 1000
    subsections:
      - "Види рефератів: інформативні, індикативні та критичні"
      - "Алгоритм роботи з першоджерелом: від ознайомлення до синтезу"
      - "Принципи логічного згортання інформації"
    key_concepts:
      - "компресія тексту"
      - "інформативність"
      - "об'єктивність викладу"
  - section: "Техніки ефективного перефразування"
    words: 1000
    subsections:
      - "Лексичні трансформації: робота з синонімами та гіпонімами"
      - "Граматичні трансформації: зміна частин мови та синтаксичної структури"
      - "Семантичний переказ: передача ідеї власними словами"
    key_concepts:
      - "синонімічний ряд"
      - "номіналізація"
      - "контекстуальна заміна"
  - section: "Академічна доброчесність та цитування"
    words: 1000
    subsections:
      - "Межа між перефразуванням та плагіатом"
      - "Правила оформлення непрямих цитат"
      - "Використання вступних фраз для покликання на авторів"
    key_concepts:
      - "інтелектуальна власність"
      - "парафраз"
      - "атрибуція джерел"
  - section: "Практикум з редагування реферованих текстів"
    words: 1000
    subsections:
      - "Усунення надлишковості та мовних штампів"
      - "Перевірка точності передачі авторської позиції"
      - "Стилістична єдність академічного тексту"
    key_concepts:
      - "лаконічність"
      - "когерентність"
      - "стилістична правка"

vocabulary:
  required:
    - реферувати
    - перефразувати
    - узагальнювати
    - першоджерело
    - достовірний
    - надлишковість
    - тлумачити
    - запозичення
  recommended:
    - виокремлювати
    - інтерпретувати
    - лаконічний
    - тотожний
    - переконливо

activities:
  types_required:
    - critical-analysis
    - match-up
    - error-correction
    - essay-response
    - translate
  min_items_per_type: 5
  total_min_items: 25

connects_to:
  previous: "counterarguments"
  next: "research-article"
