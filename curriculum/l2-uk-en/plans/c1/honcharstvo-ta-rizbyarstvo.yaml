vocabulary_hints:
  required:
  - гончарство (pottery) — традиційне гончарство, центр гончарства; висока частота
  - різьбярство (woodcarving) — художнє різьбярство по дереву, гуцульське різьбярство
  - полива / глазур (glaze) — вкривати поливою, свинцева полива; термін для кераміки
  - ритування (sgraffito/engraving) — техніка видряпування орнаменту по сирій глині (Косів)
  - інкрустація (incrustation/inlay) — інкрустація бісером (пацьорками), багатство інкрустації
  - макітра (makitra) — глиняна макітра, терти мак у макітрі; етнографічний маркер
  - куманець (traditional vessel) — святковий розписаний куманець, зооморфний посуд
  - скриня (chest) — різьблена скриня, посаг у скрині; лексика традиційного побуту
  recommended:
  - ліпити (to mold/sculpt) — процес створення форми з глини
  - випалювати (to fire/burn) — термічна обробка керамічних виробів
  - автентичний (authentic) — заміна загальним прикметникам для опису традицій
  - зооморфний (zoomorphic) — опис орнаментів із зображенням тварин
  - шароварщина (sharovarshchyna/kitsch) — термін для опису поверхневого, псевдонародного мистецтва
  - пацьорки (beads) — діалектна/етнографічна назва бісеру для інкрустації
