slug: honcharstvo-ta-rizbyarstvo
version: '2.0'
title: Гончарство та різьбярство
subtitle: Pottery and Woodcarving Traditions
content_outline:
- section: 'Вступ: Ремесло як дзеркало ідентичності (Introduction: Craft as a Mirror of Identity)'
  words: 500
  points:
  - Гончарство та різьбярство як ключові елементи української ідентичності та культурної традиції (Держстандарт §3.21)
  - 'Лексичне розмежування: ''кераміка'' (матеріал або виріб) проти ''гончарства'' (процес або вид ремесла) — усунення типової
    лексичної плутанини'
  - 'Зв''язок ремесла з побутом та сакральними ритуалами українців: від повсякденного вжитку до обрядових предметів'
- section: 'Українське гончарство: Технологія та центри (Ukrainian Pottery: Technology and Centers)'
  words: 1000
  points:
  - 'Технологічний цикл виготовлення: робота з пластичною глиною, формування на гончарному крузі, випалювання та глазурування
    (поливання)'
  - 'Косівська мальована кераміка (ЮНЕСКО): унікальна триколірна гама та складна техніка ''ритування'' (видряпування по сирій
    глині)'
  - 'Опішнянський зооморфний посуд: традиція виготовлення керамічних баранців, левів та биків (куманців) як візитівка Полтавщини'
  - 'Етнографічна лексика: макітра (символічне значення), глечик, дзбанок та святковий розписаний куманець'
- section: 'Українське різьбярство: Від скрині до іконостаса (Ukrainian Woodcarving: From Chests to Iconostases)'
  words: 900
  points:
  - 'Гуцульське різьбярство та династія Шкрібляків із села Яворів: основи класичного стилю ''сухої'' різьби'
  - 'Матеріали та техніки: використання липи, бука та самшиту; поєднання плоскої, рельєфної та ажурної різьби'
  - 'Мистецтво інкрустації: оздоблення виробів бісером (пацьорками), металом та деревом інших порід'
  - 'Предмети побуту та культу: різьблена скриня (символіка посагу), табакерки, люльки та церковне різьблення (іконостаси)'
- section: 'Лінгвістичний аналіз: Опис витворів мистецтва (Linguistic Analysis: Describing Artworks)'
  words: 700
  points:
  - 'Корекція граматичного реєстру: уникнення пасивних конструкцій (''посуд був зроблений'') на користь активних дієслів дії
    (''майстер виготовив/виліпив'')'
  - 'Синонімічний ряд та точність прикметників: заміна загальних слів ''гарний'' або ''старий'' на ''автентичний'', ''старовинний'',
    ''витончений'', ''глазурований'''
  - 'Класифікація орнаментів: лексика для опису рослинних, геометричних та зооморфних мотивів у народному мистецтві'
- section: 'Практика та синтез: Сучасна доля ремесел (Practice and Synthesis: Modern Fate of Crafts)'
  words: 900
  points:
  - 'Порівняльний аналіз стилів: Опішня проти Косова (розвиток аналітичного мислення та використання спеціалізованої термінології)'
  - 'Дискусія: ''шароварщина'' (кітч) проти справжньої традиції — роль ремесла в сучасному дизайні та збереженні спадщини'
  - Написання критичного есе про важливість підтримки народних майстрів в умовах глобалізації
  - 'Підготовка до тем C1.5: підґрунтя для вивчення біографій Катерини Білокур та Марії Примаченко'
focus: vocabulary
