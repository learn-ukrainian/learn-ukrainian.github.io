module: c1-097
level: C1
sequence: 97
slug: honcharstvo-ta-rizbyarstvo
version: '1.1'
title: "Українське гончарство та різьбярство: майстерність глини та дерева"
subtitle: "Гончарство та різьбярство: майстерність глини й дерева"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити історію розвитку українського гончарства від Трипілля до сучасних осередків
    (Опішня, Косів)."
  - "Ознайомитися з технологічними процесами та символікою орнаментики традиційної
    кераміки."
  - "Вивчити особливості художнього різьблення по дереву, зокрема гуцульське різьбярство
    та церковну пластику."
  - "Проаналізувати роль декоративно-прикладного мистецтва у формуванні національної
    ідентичності та побуту."

reading_situations:
  - source_type: "мистецтвознавчий нарис"
    topic: "Феномен опішнянської кераміки: зооморфний посуд та декоративна скульптура."
    key_elements: ["теракота", "полива", "ангоб", "пластика"]
    motivation: "Вивчення професійної термінології керамічного виробництва."
  - source_type: "етнографічна розвідка"
    topic: "Гуцульське різьблення: семантика геометричних знаків на предметах побуту."
    key_elements: ["інкрустація", "інтарсія", "різець", "баклага"]
    motivation: "Аналіз складних описів технік обробки дерева та символічного значення
      візерунків."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з майстром сучасного різьбярства про спадкоємність традицій
      школи Юрія Шкрібляка."
    focus_points: ["інструментарій", "вибір деревини", "композиційна цілісність"]
    motivation: "Сприйняття фахової бесіди про традиційне ремесло в сучасному контексті."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Як ви розумієте вислів Михайла Коцюбинського: 'Усе життя гуцула — це
      творчість'? Обґрунтуйте роль прикладного мистецтва в житті гірського народу."
    requirements: ["мінімум 300 слів", "використання прикладів із літератури (наприклад,
          'Тіні забутих предків')", "аргументація зв'язку між природою та мистецтвом"]
    motivation: "Розвиток вміння філософського осмислення культурних традицій через
      літературний контекст."
    model_answer: "Текст повинен розкривати цілісність світогляду гуцула, де кожна
      річ (від коновки до скрині) є витвором мистецтва. Слід наголосити на гармонії
      людини та довкілля."

content_outline:
  - section: "Магія глини: українське гончарство"
    words: 1000
    subsections:
      - "Від трипільського глечика до козацького кахля: історичний екскурс"
      - "Технологія творення: гончарне коло, випал та глазурування"
      - "Локальні школи: Опішня (Полтавщина) та Косів (Гуцульщина) як об'єкти спадщини
        ЮНЕСКО"
    key_concepts:
      - "глина"
      - "кераміка"
      - "гончарне коло"
  - section: "Символіка та декор керамічних виробів"
    words: 1000
    subsections:
      - "Колірна палітра: вохристі, зелені та коричневі барви косівського розпису"
      - "Сюжетні мотиви: побут, полювання, релігійні свята на косівських кахлях"
      - "Зооморфні та антропоморфні форми в народній скульптурі"
    key_concepts:
      - "орнаментика"
      - "сюжетність"
      - "самобутність"
  - section: "Душа дерева: традиційне різьбярство"
    words: 1000
    subsections:
      - "Різьблення як основний спосіб декорування сільської оселі та церкви"
      - "Техніки різьби: сухе, плоске, кругле та рельєфне різьблення"
      - "Деревина як матеріал: липа, вільха, дуб та їхні властивості"
    key_concepts:
      - "різьблення"
      - "фактура"
      - "декор"
  - section: "Майстри та спадкоємність ремесла"
    words: 1000
    subsections:
      - "Видатні династії різьбярів: родина Шкрібляків"
      - "Інтеграція народного ремесла в сучасний дизайн та архітектуру"
      - "Проблема збереження автентичних технологій в умовах масового виробництва"
    key_concepts:
      - "спадкоємність"
      - "майстерня"
      - "автентичність"

vocabulary:
  required:
    - гончарство
    - різьбярство
    - кераміка
    - глина
    - полива
    - кахлі
    - різець
    - орнамент
  recommended:
    - автентичний
    - теракота
    - інкрустація
    - самобутність
    - пластика

activities:
  types_required:
    - critical-analysis
    - match-up
    - fill-in
    - select
    - translate
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте текст про магія глини: українське гончарство і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про символіка та декор керамічних виробів, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Магія глини: українське гончарство». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему магія глини: українське гончарство."
  - type: comparative-study
    focus: "Порівняйте різні підходи до магія глини: українське гончарство: Від трипільського глечика до козацького кахля: історичний екскурс. Визначте спільне та відмінне."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та ремесла'"
