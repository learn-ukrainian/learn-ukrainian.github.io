module: c1-019
level: C1
sequence: 19
slug: advanced-punctuation
version: '1.1'
title: "Складна пунктуація в академічному письмі"
subtitle: "Просунута пунктуація в академічному письмі"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Поглибити знання про вживання розділових знаків у складних синтаксичних конструкціях."
  - "Вивчити особливості пунктуації при цитуванні та оформленні покликань."
  - "Навчитися розрізняти складні випадки вживання тире та двокрапки в наукових текстах."
  - "Опанувати правила виділення вставних слів, словосполучень та речень у науковому
    дискурсі."

reading_situations:
  - source_type: "художній уривок"
    topic: "Аналіз синтаксису в поезії Миколи Вінграновського: роль авторської пунктуації."
    key_elements: ["авторський знак", "експресивний синтаксис", "багатокрапку", "тире"]
    motivation: "Дослідження того, як розділові знаки впливають на ритм та зміст художнього
      тексту."
  - source_type: "наукова стаття"
    topic: "Юридична термінологія в Конституції Пилипа Орлика: складні випадки узгодження
      та пунктуації."
    key_elements: ["відокремлені члени речення", "складнопідрядне речення", "цитування"]
    motivation: "Вивчення пунктуаційних норм у текстах офіційного та історичного характеру."

listening_situations:
  - media_type: "подкаст"
    setting: "Радіопередача 'Слово про слово': обговорення змін у правописі та пунктуації
      2019 року."
    focus_points: ["новації в пунктуації", "дискусійні моменти", "типові помилки"]
    motivation: "Актуалізація знань про сучасні норми української пунктуації через
      аудіальний канал."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть коротке есе (200-250 слів) на тему 'Чи замінять емодзі розділові
      знаки у майбутньому?'. Обов'язково використайте речення зі складним синтаксичним
      зв'язком."
    requirements: ["вживання тире між підметом і присудком", "відокремлені обставини",
      "складна цитата"]
    motivation: "Практика вживання розділових знаків у текстах різних стилів з елементами
      аргументації."
    model_answer: "Текст повинен демонструвати правильне вживання двокрапки при однорідних
      членах, тире в безсполучникових реченнях та знаків при вставних конструкціях."

content_outline:
  - section: "Пунктуація у складному реченні"
    words: 1000
    subsections:
      - "Розділові знаки на межі частин складносурядного та складнопідрядного речень"
      - "Складні випадки вживання коми при збігу сполучників"
      - "Тире та двокрапка в безсполучникових конструкціях наукового стилю"
    key_concepts:
      - "синтаксична одиниця"
      - "пунктограма"
      - "інтонаційно-смисловий зв'язок"
  - section: "Відокремлені та уточнювальні члени речення"
    words: 1000
    subsections:
      - "Пунктуація при дієприкметникових та дієприслівникових зворотах"
      - "Виділення вставних та вставлених конструкцій в академічному тексті"
      - "Уточнювальні додатки та обставини: коли ставити коми, а коли тире"
    key_concepts:
      - "відокремлення"
      - "вставність"
      - "парантеза"
  - section: "Оформлення цитат та діалогічного мовлення"
    words: 1000
    subsections:
      - "Розділові знаки при прямій та непрямій мові"
      - "Цитування віршованих уривків та великих фрагментів прози"
      - "Використання дужок, лапок та багатокрапки при скороченні цитат"
    key_concepts:
      - "цитата"
      - "покликання"
      - "авторське право"
  - section: "Стилістична роль розділових знаків"
    words: 1000
    subsections:
      - "Авторська пунктуація: межа між нормою та творчістю"
      - "Використання тире для підсилення логічного наголосу"
      - "Еліпсис та його графічне вираження в різних стилях"
    key_concepts:
      - "експресивність"
      - "риторична фігура"
      - "еліпсис"

vocabulary:
  required:
    - пунктуація
    - розділовий знак
    - відокремлення
    - вставна конструкція
    - цитування
    - правопис
    - тире
    - двокрапка
  recommended:
    - експресивний
    - автентичний
    - варіативність
    - синтаксис
    - пунктограма

activity_hints:
  - type: error-correction
    description: "Fix punctuation errors in complex Ukrainian sentences — commas at
      conjunction boundaries, dashes in asyndetic constructions, parenthetical expressions."
  - type: critical-analysis
    description: "Analyze authorial punctuation in Vinhranovsky's poetry — evaluate
      how punctuation marks affect rhythm and meaning."
  - type: essay-response
    description: "Insert correct punctuation marks in complex academic sentences with
      embedded clauses, citations, and parenthetical constructions."
  - type: comparative-study
    description: "Match punctuation rules (відокремлення, вставність, парантеза) with
      sentence examples requiring specific punctuation."
  - type: select
    description: "Choose the correct punctuation variant for ambiguous cases (тире
      vs двокрапка, кома vs крапка з комою)."

activities:
  types_required:
    - error-correction
    - critical-analysis
    - fill-in
    - match-up
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §17-20 — Пунктуація"
  - "Правопис 2019: Розділові знаки у складному реченні"
  - "Заболотний, 11 клас (2019): Стилістичні норми"

connects_to:
  previous: "oral-presentations"
  next: "irregular-verbs-complete"
phase: C1.1 [Academic Foundation]
