module: c1-016
level: C1
sequence: 16
slug: advanced-punctuation
version: '2.0'
title: Поглиблена пунктуація
content_outline:
- section: Вступ — Пунктуація як інструмент (Introduction — Punctuation as a Tool)
  words: 400
  points:
  - 'Роль пунктуації в науковому та публіцистичному текстах: відмінність між граматичною
    та інтонаційною функціями'
  - Пунктуаційна норма як засіб усунення двозначності в академічному письмі
  - 'Аналіз тексту: як розділові знаки структурують логіку викладу (builds on c1-05
    Logical Connectors)'
- section: Складні речення та відокремлення (Complex Sentences and Separation)
  words: 900
  points:
  - 'Кома в складнопідрядних реченнях (§4.3.4.1): вживання перед сполучниками (і,
    а, але, що, який) та обставинними сполучними словами'
  - Пунктуація у складносурядних реченнях з протиставними відношеннями
  - 'Відокремлені члени речення (означення, обставини, додатки): правила та умови
    обов''язкового відокремлення'
  - 'Типова помилка: ''Кома-зрощення'' (Comma Splice) — аналіз вживання коми між граматичними
    основами без сполучника та методи виправлення через крапку з комою'
- section: 'Тире та двокрапка: смислова глибина (Dash and Colon: Semantic Depth)'
  words: 950
  points:
  - 'Тире між підметом і присудком (§4.3.4.2): випадки обов''язкового вживання (іменник-іменник,
    інфінітив-інфінітив)'
  - 'Двокрапка та тире у безсполучникових реченнях: вираження причиново-наслідкових
    та пояснювальних зв''язків (prepares for c1-107)'
  - Тире для підкреслення та авторське (інтонаційне) тире у публіцистиці
  - 'Learner error: графічна плутанина тире (пунктограма) та дефіса (орфограма) —
    правила розрізнення та написання'
  - Усунення зайвої коми через інтонаційну паузу між підметом і присудком (напр.,
    'Моя родина — це...')
- section: Цитування та допоміжні знаки (Citations and Auxiliary Marks)
  words: 650
  points:
  - 'Типи лапок в українській мові: традиційні «лапки-ялинки» для основного тексту
    та „лапки-лапки“ для внутрішніх цитат'
  - 'Пунктуація при цитуванні: оформлення прямої мови, квадратні дужки для кон''єктур
    та три крапки (еліпсис) для пропусків'
  - 'Круглі дужки для пояснень та ремарок: стилістичне використання в науковому апараті'
  - 'Вживання лапок для іронії та умовності: межа між стилістичним прийомом та надмірністю'
- section: Історичний контекст та стандартизація (Historical Context and Standardization)
  words: 500
  points:
  - 'Культурний гачок: еволюція знаків у давньоруських рукописах (XI–XIII ст.) — від
    довільних хрестиків і змійок до системності Альда Мануція'
  - Значення 'Харківського правопису' (1928 р.) у стандартизації української пунктуації
    та її відмежуванні від зовнішніх кальок
  - 'Реформи пунктуації у правописі 2019 року: актуалізація правил для сучасних медіа-текстів'
- section: Практика редагування (Editing Practice)
  words: 600
  points:
  - 'Алгоритм самоперевірки: розрізнення факультативних (авторських) та обов''язкових
    розділових знаків'
  - 'Трансформація речень: заміна безсполучникових конструкцій на сполучникові зі
    зміною пунктуації'
  - 'Редагування академічного есе: виправлення пунктуаційних огріхів у складних синтаксичних
    конструкціях (prepares for c1-18)'
vocabulary_hints:
  required:
  - пунктуація (punctuation) — правила пунктуації, пунктуаційна помилка; висока частотність
    у науковому стилі
  - кома (comma) — кома-зрощення (comma splice), ставити кому; базовий знак відокремлення
  - тире (dash) — інтонаційне тире, авторське тире, тире між підметом і присудком
  - двокрапка (colon) — після узагальнювального слова, перед переліком
  - лапки (quotation marks) — брати в лапки, іронічні лапки; розрізнення «ялинок»
    та „лапок“
  - відокремлення (separation) — відокремлені члени речення (appositives/modifiers);
    граматичний термін С1
  - підрядне речення (subordinate clause) — пунктуація на межі частин складного речення
  - еліпсис (ellipsis) — три крапки на місці пропущеного слова або частини цитати
  recommended:
  - пунктограма (punctuation rule/unit) — одиниця пунктуаційного правила
  - орфограма (spelling rule/unit) — для контрасту при вивченні тире/дефіса
  - факультативний (optional) — про авторські знаки, що не є обов'язковими за правописом
  - інтонаційний (intonational) — опис паузи, що зумовлює вибір знака
  - калька (calque) — у контексті уникнення чужорідних пунктуаційних моделей
