module: c1-078
level: C1
sequence: 78
slug: pysanky
version: '1.0'
title: "Українська писанка: космічний символ буття"
subtitle: "Ukrainian Pysanka: Cosmic Symbol of Being"
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити сакральне значення писанки в українській дохристиянській та християнській традиціях."
  - "Опанувати термінологію та технологію воскового розпису (батикова техніка, використання писачка)."
  - "Дешифрувати основні орнаментальні символи (сонце, зоря, дерево життя, безкінечник, грабельки)."
  - "Ознайомитися з регіональними стилями писанкарства (Космач, Поділля, Полісся) та діяльністю Музею писанкового розпису в Коломиї."

reading_situations:
  - source_type: "науково-популярна стаття"
    topic: "Геометрія Всесвіту на шкаралупі: семантика архаїчних знаків української писанки."
    key_elements: ["космогонія", "ідеограма", "семантичне поле"]
    motivation: "Вивчення мистецтвознавчого аналізу та розширення лексичного запасу в галузі символіки."
  - source_type: "технічна інструкція"
    topic: "Покрокове керівництво з виготовлення традиційної воскової писанки: від підготовки яйця до зняття воску."
    key_elements: ["оцтування", "травильне фарбування", "писачок"]
    motivation: "Засвоєння лексики, що описує послідовність технологічних процесів."

listening_situations:
  - media_type: "відео"
    setting: "Екскурсія залами Музею писанки у Коломиї: розповідь про унікальні експонати."
    focus_points: ["архітектурна особливість будівлі", "географія писанкарства", "методи реставрації"]
    motivation: "Розвиток навичок аудіювання в контексті музейної педагогіки та мистецтвознавства."

writing_tasks:
  - task_type: "опис"
    prompt: "Опишіть писанку певного регіону (наприклад, космацьку), детально аналізуючи її кольорову гаму та орнамент."
    requirements: ["мінімум 250 слів", "використання термінів: тло, розпис, символіка", "порівняння з писанками інших регіонів"]
    motivation: "Вміння створювати детальні описові тексти з елементами аналізу."
    model_answer: "Текст повинен виділяти особливості космацької писанки (жовто-гарячі кольори, дрібний геометричний орнамент) та пояснювати значення ключових елементів (наприклад, 'сонечка' як джерела життя)."

content_outline:
  - section: "Писанка як міфологема: яйце-райце"
    words: 1000
    subsections:
      - "Космогонічні уявлення про походження світу з яйця"
      - "Магічна сила писанки: оберіг, ліки, дар"
      - "Писанка, крашанка, дряпанка, мальованка: жанрова диференціація"
    key_concepts:
      - "міфологема"
      - "сакральність"
      - "оберіг"
  - section: "Мова символів: дешифрування коду"
    words: 1000
    subsections:
      - "Солярні та астральні знаки (сварга, ружа, зірка)"
      - "Рослинні та тваринні мотиви (сосонка, дубовий лист, оленячі роги)"
      - "Геометричні сітки та їхнє значення (трикутник як символ трійці)"
    key_concepts:
      - "семантика"
      - "орнаментика"
      - "традиція"
  - section: "Технологія та інструментарій писанкарства"
    words: 1000
    subsections:
      - "Будова писачка та вибір воску для розпису"
      - "Натуральні та анілінові барвники: історія та сучасність"
      - "Ритуальний аспект процесу: чисті думки та молитва"
    key_concepts:
      - "писачок"
      - "технологія"
      - "медитативність"
  - section: "Географія писанкарства та сучасне відродження"
    words: 1000
    subsections:
      - "Карпатська писанка: ювелірна дрібність та вогняні кольори"
      - "Подільські та поліські традиції: архаїка та лаконізм"
      - "Писанка в діаспорі та як об'єкт сучасного дизайну"
    key_concepts:
      - "регіоналізм"
      - "спадщина"
      - "ревіталізація"

vocabulary:
  required:
    - писанка
    - писачок
    - орнамент
    - символіка
    - оберіг
    - сакральний
    - розпис
    - віск
  recommended:
    - космогонія
    - ідеограма
    - дешифрувати
    - автентичність
    - колорит

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - authorial-intent
    - fill-in
  min_items_per_type: 5
  total_min_items: 25

