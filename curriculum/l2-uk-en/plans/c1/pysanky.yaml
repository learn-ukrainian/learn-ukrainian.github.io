module: c1-078
level: C1
sequence: 78
slug: pysanky
version: '2.0'
title: 'Писанки: Космос на долоні'
subtitle: 'Pysankas: Cosmos in the Palm of Your Hand'
content_outline:
- section: Вступ — Яйце як першооснова всесвіту (Introduction — The Egg as the Primeval Basis of the Universe)
  words: 600
  points:
  - 'Дохристиянське походження писанкарства: яйце як космічний символ (небо, земля, вода, вогонь)'
  - Синкретизм язичництва та християнства в українській обрядовості
  - 'Критична культурна відмінність: Писанка (сире яйце, ''живий'' оберіг) проти Крашанки (варене яйце, їжа)'
  - 'Етимологія та сакральна дія: Чому писанку саме ''пишуть'', а не ''малюють'' — концепція листа до Бога'
- section: Семантика та символіка орнаментів (Semantics and Symbology of Ornaments)
  words: 1000
  points:
  - 'Перехід від декору до знаку: Розуміння орнаменту як ''коду нації'' та знакової системи (State Standard §4.4.3)'
  - 'Геометричні та солярні символи: зірки, хрести, спіралі, меандри як архаїчні образи сонця та вічності'
  - 'Рослинні мотиви: калина (дівоча краса), дуб (чоловіча сила), пшениця (добробут)'
  - 'Зооморфні символи: кінь та олень як провідники сонячного світла та енергії'
  - 'Кольорова мова писанки: червоний (радість життя), чорний (плодючість землі та пам''ять предків)'
- section: Технологія та регіональний поділ (Technology and Regional Division)
  words: 800
  points:
  - 'Традиційна техніка батику: процес воскової резервації та послідовного занурення у фарби'
  - 'Інструментарій майстра: писачок, бджолиний віск, натуральні барвники'
  - 'Концепція ''живого вогню'': сакральне значення джерела тепла для розігріву воску'
  - 'Етнографічне мапування: філігранна геометрія Гуцульщини, квіткові розписи Полтавщини та контрасти Буковини'
- section: Сакральний вимір та легенди (Sacred Dimension and Legends)
  words: 800
  points:
  - 'Легенда про Зло (Пеккуна): концепція писанки як сили, що тримає закованим дух руйнування'
  - 'Ритуальне використання: функція писанки як родинного оберега та синкретичний символ Великодня'
  - 'Народна етика: чому розбити писанку вважалося гріхом; традиція дарування на щастя та здоров''я'
- section: Практичний аналіз та стилістика (Practical Analysis and Stylistics)
  words: 800
  points:
  - 'Лінгвістична стилістика: використання метафор та епітетів для опису сакральних об''єктів (State Standard §4.4.3)'
  - 'Виправлення помилок: дрил на вживання дієслова ''писати'' (to write) замість помилкового ''малювати'' (to paint)'
  - 'Морфологічний фокус: абстрактні іменники на -ння, -ість для опису процесів (освячення, тяглість)'
  - 'Творче завдання: есе про писанку як шедевр нематеріальної спадщини ЮНЕСКО'
focus: history
pedagogy: CBI
objectives:
- Analyze the archaic symbology of Ukrainian Pysanka patterns
- Identify regional differences in pysanka design and color palettes
- Understand the ritual technology of wax-resist egg decorating
grammar:
- Symbolic narrative registers
- Terminology of craftsmanship
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Писанкарка
word_target: 4000
vocabulary_hints:
  required:
  - Писанка (Pysanka) — писати писанки (not малювати), святити писанки, розшифровувати знаки
  - Оберіг (Talisman/Amulet) — сильний оберіг, родинний оберіг, захисна функція
  - Писачок (Stylus for egg decorating) — тримати писачок, розігрівати віск, тонкі лінії
  - Живий вогонь (Sacred/Living fire) — топити віск на живому вогні, символ очищення
  - Солярна символіка (Solar symbology) — архаїчні знаки, сонячне коло, культ сонця
  recommended:
  - Крашанка (Easter egg - dyed, boiled) — distinction from pysanka (raw, ritual)
  - Батик (Batik/Wax-resist) — воскова резервація, багатошарове фарбування
  - Код нації (Code of the nation) — ідентичність, культурна спадщина, тяглість традиції
  - Меандр (Meander pattern) — нескінченність, геометричний орнамент
  - Семантика (Semantics) — значеннєве наповнення, символічне значення
