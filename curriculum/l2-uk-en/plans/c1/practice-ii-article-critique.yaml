module: c1-019
level: C1
sequence: 19
slug: practice-ii-article-critique
version: '1.1'
title: "Практикум ІІ: критичний розбір наукової статті"
subtitle: "Практикум II: критика наукової статті"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Навчитися оцінювати методологію та доказову базу наукових досліджень."
  - "Опанувати лексику для висловлення обґрунтованої критики та незгоди."
  - "Вивчити структуру рецензії (відгуку) на наукову роботу."
  - "Розвинути навички виявлення логічних помилок та маніпуляцій у текстах."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Аналіз демографічних процесів в Україні: критичний погляд на методи збору
      даних."
    key_elements: ["статистична похибка", "валідація", "репрезентативність вибірки"]
    motivation: "Практика виявлення слабких місць у науковій аргументації."
  - source_type: "рецензія"
    topic: "Відгук на монографію про вплив візантійської традиції на культуру Київської
      Русі."
    key_elements: ["наукова дискусія", "контраргументація", "стиль рецензування"]
    motivation: "Вивчення етичних та мовних норм наукової критики."

listening_situations:
  - media_type: "відео"
    setting: "Запис засідання спеціалізованої вченої ради: обговорення результатів
      дисертаційного дослідження."
    focus_points: ["питання опонентів", "захист основних положень", "формулювання
          зауважень"]
    motivation: "Сприйняття на слух та аналіз живої наукової полеміки."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть критичний відгук (250-300 слів) на статтю про доцільність запровадження
      ШІ в початковій школі. Оцініть логіку автора та переконливість наведених прикладів."
    requirements: ["використання фраз для висловлення незгоди", "обґрунтованість критики",
      "академічний етикет"]
    motivation: "Розвиток навичок написання рецензій на наукові праці."
    model_answer: "Текст повинен містити збалансовану оцінку: визнання позитивних
      сторін та аргументоване вказування на недоліки з використанням кліше 'водночас
      варто зауважити...', 'автор залишає поза увагою...'."

content_outline:
  - section: "Методологія критичного аналізу"
    words: 1000
    subsections:
      - "Критерії оцінювання наукового тексту: новизна, актуальність, доказовість"
      - "Аналіз логічної структури та внутрішньої несуперечності"
      - "Перевірка джерельної бази та коректності цитування"
    key_concepts:
      - "критичне мислення"
      - "верифікація"
      - "валідація"
  - section: "Мова наукової критики та полеміки"
    words: 1000
    subsections:
      - "Конструкції для ввічливого спростування та висловлення сумніву"
      - "Вживання модальних слів для пом'якшення критичних зауважень"
      - "Лексика для опису логічних помилок та прогалин у дослідженні"
    key_concepts:
      - "мітигація"
      - "дискурс"
      - "аргумент до справи"
  - section: "Жанр наукової рецензії (відгуку)"
    words: 1000
    subsections:
      - "Структура рецензії: від анотування до підсумкової оцінки"
      - "Розрізнення 'дружньої' та 'суворої' критики: стилістичні засоби"
      - "Вимоги до оформлення офіційних відгуків в Україні"
    key_concepts:
      - "рецензування"
      - "апробація"
      - "експертна оцінка"
  - section: "Логічні помилки та маніпуляції"
    words: 1000
    subsections:
      - "Типові помилки в аргументації: підміна понять, поспішні узагальнення"
      - "Виявлення прихованої упередженості та суб'єктивізму"
      - "Етичні межі критики: уникнення персональних випадів"
    key_concepts:
      - "логічна помилка"
      - "упередженість"
      - "академічна етика"

vocabulary:
  required:
    - рецензія
    - критика
    - обґрунтованість
    - суперечність
    - недолік
    - перевага
    - дискусійний
    - зауваження
  recommended:
    - упередженість
    - маніпуляція
    - переконливість
    - методологічний
    - об'єктивність

activity_hints:
  - type: critical-analysis
    description: "Evaluate methodology and evidence in a Ukrainian research article
      about demographics — identify logical errors, sampling issues, and argumentation
      gaps."
  - type: error-correction
    description: "Fix inappropriate tone in a draft review — replace aggressive criticism
      with mitigated academic formulations."
  - type: match-up
    description: "Match types of logical fallacies (підміна понять, поспішне узагальнення,
      ad hominem) with examples from academic texts."
  - type: essay-response
    description: "Write a critical review (250-300 words) evaluating an article about
      AI in education — balance positive assessment with substantiated criticism."
  - type: fill-in
    description: "Complete review sentences with diplomatic criticism phrases (водночас
      варто зауважити..., автор залишає поза увагою...)."

activities:
  types_required:
    - critical-analysis
    - true-false
    - error-correction
    - match-up
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка"
  - "Глазова, 11 клас (2019): §1-10 — Культура мовлення"
  - "Авраменко, 11 клас (2019): с. 164 — Стилістична норма"

connects_to:
  previous: "essay-writing-practice"
  next: "c1-1-checkpoint"
phase: C1.1 [Academic Foundation]
