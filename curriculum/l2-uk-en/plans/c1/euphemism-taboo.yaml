module: c1-057
level: C1
sequence: 57
slug: euphemism-taboo
version: '1.1'
title: "Евфемізми та табу: мовна етика та стратегії ввічливості"
subtitle: "Euphemisms and Taboos: Language Ethics and Politeness Strategies"
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
  - "Розуміти соціолінгвістичну природу табу та механізми виникнення евфемізмів."
  - "Опанувати мистецтво використання евфемізмів у дипломатичному, діловому та академічному мовленні."
  - "Аналізувати роль політичної коректності у формуванні сучасної української лексичної норми."
  - "Розрізняти конструктивну евфемізацію та маніпулятивну підміну понять у медіадискурсі."

reading_situations:
  - source_type: "офіційне комюніке"
    topic: "Дипломатичні переговори щодо врегулювання військового конфлікту: мова компромісів."
    key_elements: ["дипломатичний протокол", "стриманість", "евфемічні замінники"]
    motivation: "Аналіз 'мови напівнатяків' у високій політиці для уникнення ескалації."
  - source_type: "соціологічне дослідження"
    topic: "Зміна ставлення до табуйованих тем (смерть, хвороби, інклюзія) в українському суспільстві."
    key_elements: ["коректність", "інклюзивна лексика", "соціальна норма"]
    motivation: "Вивчення динаміки мовної норми під впливом соціальних змін."

listening_situations:
  - media_type: "подкаст"
    setting: "Дискусія лінгвістів про 'мовну гігієну' та доцільність запозичення західних стандартів політкоректності."
    focus_points: ["аргументи за і проти", "мовна ідентичність", "специфіка українського контексту"]
    motivation: "Формування власної позиції щодо етичних аспектів слововживання."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть лист-відмову бізнес-партнеру щодо продовження співпраці, використовуючи евфемізми для пом'якшення негативної інформації."
    requirements: ["мінімум 200 слів", "високий рівень ввічливості", "збереження професійної дистанції"]
    motivation: "Відпрацювання практичних навичок 'м'якої комунікації' у кризових ситуаціях."
    model_answer: "Текст має демонструвати вміння замінювати прямі негативні оцінки ('ми не хочемо', 'ви погано працюєте') на конструктивні евфемізми ('реорганізація стратегії', 'оптимізація партнерства')."

discussion_topics:
  - context: "Політкоректність: чи звільняє вона мову від дискримінації чи обмежує свободу слова?"
    questions:
      - "Чи існують теми, які назавжди залишаться табуйованими?"
      - "Як евфемізми в медіа можуть спотворювати сприйняття реальності (наприклад, у новинах про війну)?"
      - "Яка роль обсценної лексики в умовах екстремального стресу та чи стає вона новою 'нормою'?"
    motivation: "Критичний аналіз етичних меж мовної поведінки."

content_outline:
  - section: "Табу як культурний та мовний феномен"
    words: 1000
    subsections:
      - "Природа табу: від магічного захисту до соціальної норми"
      - "Історична трансформація табу в українській культурі"
      - "Релігійні, побутові та професійні табу: лінгвістичний аспект"
    key_concepts:
      - "табу"
      - "сакралізація"
      - "мовна заборона"
  - section: "Евфемізація як стратегія гармонізації спілкування"
    words: 1000
    subsections:
      - "Типологія евфемізмів: за сферами вживання (війна, медицина, соціум)"
      - "Лінгвістичні засоби творення евфемізмів: метафори, перифрази, запозичення"
      - "Евфемізм vs Дисфемізм: свідоме огрублення мовлення"
    key_concepts:
      - "евфемізм"
      - "дисфемізм"
      - "перифраз"
  - section: "Політична коректність та інклюзивна мова"
    words: 1000
    subsections:
      - "Концепція 'м'якої сили' через призму мовної коректності"
      - "Фемінітиви та гендерно-нейтральна лексика в сучасному українському правописі"
      - "Мовні стандарти опису людей з інвалідністю та вразливих груп"
    key_concepts:
      - "політкоректність"
      - "інклюзивність"
      - "гендерна чутливість"
  - section: "Евфемізми в медіадискурсі та маніпуляції"
    words: 1000
    subsections:
      - "Double Speak: приховування правди за благозвучними словами"
      - "Евфемізми у військових репортажах: 'хлопок', 'негативне зростання' та ін."
      - "Критичний аналіз текстів на наявність маніпулятивної евфемізації"
    key_concepts:
      - "маніпуляція"
      - "пропаганда"
      - "мовна стійкість"

vocabulary:
  required:
    - коректність
    - евфемізм
    - замінник
    - табуювання
    - інклюзивність
    - маніпуляція
    - благозвучність
    - етичність
  recommended:
    - пом'якшення
    - вуалювання
    - перифраза
    - нейтралізація
    - контекстуальність

activity_hints:
  - type: critical-analysis
    description: "Analyze a diplomatic communique and identify all euphemisms — explain what each replaces and evaluate whether it serves transparency or concealment."
  - type: select
    description: "Choose the appropriate euphemism for professional contexts — identify which euphemisms are constructive (ввічливість) and which are manipulative (вуалювання правди)."
  - type: error-correction
    description: "Fix register violations in a professional text — replace inappropriate direct language with euphemisms, and remove manipulative euphemisms that obscure facts."
  - type: match-up
    description: "Match euphemistic expressions with their direct equivalents and classify by sphere (дипломатія, медицина, військова справа, бізнес)."
  - type: essay-response
    description: "Write a professional rejection letter (100-150 words) using appropriate euphemisms, then analyze how the euphemisms soften the negative message."

activities:
  types_required:
    - critical-analysis
    - select
    - error-correction
    - match-up
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §38 — Лексичні засоби стилістики"
  - "Глазова, 11 клас (2019): §40-42 — Стилістичне забарвлення лексики"
  - "Авраменко, 11 клас (2019): Стилістична норма — евфемізми, синоніміка"

