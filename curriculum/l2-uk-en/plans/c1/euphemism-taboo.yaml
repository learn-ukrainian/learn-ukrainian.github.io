slug: euphemism-taboo
version: '2.0'
title: 'Евфемізми та табу: Мова делікатності'
subtitle: 'Euphemisms & Taboo: The Language of Delicacy'
content_outline:
- section: 'Вступ: Чому ми не говоримо прямо (Introduction: Why We Don''t Speak Directly)'
  words: 500
  points:
  - 'Евфемізм як стилістичний засіб (§4.4.3): використання метафори, синонімії та
    перифразу для пом''якшення мовлення.'
  - 'Соціальна функція евфемізмів: ввічливість, тактовність та збереження ''обличчя''
    співрозмовника в різних регістрах (§4.4.1.1).'
  - Різниця між евфемізмом (пом'якшення) та дисфемізмом (навмисне згрубіння або деградація
    сенсу).
- section: Давні та сучасні табу в українській культурі (Ancient and Modern Taboos
    in Ukrainian Culture)
  words: 800
  points:
  - 'Етимологічні евфемізми: як слово «ведмідь» (той, що їсть мед) замінило первісну
    назву тварини; табу на назви хижаків (вовк — «сірий»).'
  - 'Сучасне табу на слово «останній»: аналіз вживання «крайній» серед військових
    та авіаторів як засобу уникнення притягування смерті.'
  - 'Соціолінгвістична напруга: прескриптивна норма (останній день) проти культурного
    забобону (крайній раз) — де доречна кожна форма.'
- section: 'Сфери делікатності: Смерть, Хвороба та Тіло (Spheres of Delicacy: Death,
    Illness, and Body)'
  words: 900
  points:
  - 'Евфемізми смерті: градація від нейтрального «померти» до офіційно-трагічного
    «загинути» та високого/релігійного «відійти у вічність» чи «спочити в Бозі».'
  - 'Медичний та побутовий дискурс: заміна прямих назв хвороб на «недуга» або «нездужання»;
    етика опису фізичного стану.'
  - 'Політкоректність (PC) в офіційному стилі: перехід від застарілих форм до інклюзивної
    лексики, як-от «особа з інвалідністю».'
- section: Корпоративний новояз та соціальні теми (Corporate Newspeak and Social Topics)
  words: 700
  points:
  - 'Бізнес-евфемізми: аналіз терміну «оптимізація» (звільнення) та «зони росту» (проблеми)
    як засобів маскування негативу в корпоративній культурі.'
  - 'Соціальна евфемізація: опис бідності, безробіття та соціальних конфліктів через
    пом''якшувальні конструкції.'
  - 'Політичні евфемізми: використання абстрактних іменників для деперсоналізації
    відповідальності.'
- section: Практика та типові помилки (Practice and Common Errors)
  words: 800
  points:
  - 'Аналіз некрологів та меморіальних дописів: вибір доречного ступеня делікатності
    залежно від контексту (військовий, релігійний, приватний).'
  - 'Помилка надмірної ввічливості: недоречне вживання архаїзмів «упокоївся» або «спочив»
    у побутових ситуаціях.'
  - 'Помилка прямого перекладу: чому англійське «sleeping together» не завжди тотожне
    українському «спати разом» (використання «переспати»).'
  - 'Тренінг з трансформації прямих висловів: заміна грубих або надто прямих реплік
    на тактовні відповідники.'
- section: 'Підсумок: Мистецтво вибору регістра (Summary: The Art of Register Selection)'
  words: 300
  points:
  - 'Мистецтво мовної делікатності як ознака рівня C1: баланс між прямотою та ввічливістю.'
  - 'Фінальна перевірка розуміння: доречність евфемізмів у публіцистичному та розмовному
    стилях.'
