vocabulary_hints:
  required:
  - відійти у вічність (to pass away into eternity) — високий стиль, часто в некрологах
    або релігійному контексті.
  - загинути (to perish/die tragically) — вживається у контексті війни, катастроф
    або героїчної смерті (загинути героєм).
  - оптимізація (optimization) — у значенні корпоративного скорочення штату або витрат;
    типовий бізнес-евфемізм.
  - крайній (extreme/last in a row) — вживається замість «останній» у професійному
    сленгу через забобони; помилка при вживанні в нейтральних контекстах.
  - особа з інвалідністю (person with a disability) — сучасна офіційна норма, що фокусується
    на людині, а не на її обмеженнях.
  recommended:
  - спочити (to rest/pass away) — поетичний або релігійний евфемізм (спочити в Бозі).
  - недуга (ailment/illness) — літературне слово для пом'якшення назви хвороби.
  - нездужання (indisposition) — легка форма хвороби, часто використовується як евфемізм
    для небажання пояснювати деталі стану.
  - переспати (to sleep with) — евфемізм/дисфемізм для інтимних стосунків (на відміну
    від буквального «спати разом»).
  - відійти до Господа (to go to the Lord) — специфічний релігійний евфемізм.
