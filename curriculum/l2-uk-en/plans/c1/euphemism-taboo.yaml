activity_hints:
- type: reading
  focus: Прочитайте текст про табу як культурний та мовний феномен і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про евфемізація як стратегія гармонізації спілкування, використовуючи нову
    лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Табу як культурний та мовний феномен». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему табу як культурний та мовний феномен.
- type: comparative-study
  focus: 'Порівняйте різні підходи до табу як культурний та мовний феномен: Природа табу: від магічного захисту до соціальної
    норми. Визначте спільне та відмінне.'
