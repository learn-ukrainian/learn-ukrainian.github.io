module: c1-066
slug: review-c1-5
level: C1
sequence: 66
phase: C1.5 [Stylistics & Rhetoric]
version: '1.0'
title: 'Огляд етапу C1.4: Стилістика та регістри'
subtitle: 'Stage C1.4 Review: Stylistics and Registers'
focus: style
pedagogy: Review
objectives:
- Learner can flexibly switch between formal, intimate, and slang registers
- Learner can express degrees of certainty and politeness appropriate to the context
- Learner can identify and correct stylistic errors
content_outline:
- section: 'Вступ: Доцільність як найвищий критерій (Introduction: Appropriateness as the Highest Criterion)'
  words: 400
  points:
  - 'Вступне слово від Мовного інспектора: пояснення концепції «стилістичної доцільності» як ключової компетенції рівня C1
    згідно з державним стандартом (§4.4.1.1).'
  - 'Огляд основних цілей етапу C1.4: від розрізнення функціональних стилів до майстерного володіння регістрами спілкування.'
- section: Класифікація стилів та реєстрів (Classification of Styles and Registers)
  words: 800
  points:
  - 'Детальний огляд семи стилів української мови за стандартом: розмовний, офіційний, науковий, публіцистичний, художній,
    релігійний та епістолярний.'
  - 'Регістри спілкування: від офіційної дистанції до неприпустимого в певних контекстах «панібратства».'
  - 'Аналіз типової помилки «Register Clashing»: чому використання «привіт» або «давай» у діловому листуванні замість «вітаю»
    чи «прошу» є стилістичним злочином.'
- section: Боротьба з канцеляритом та суржиком (Combating Kanselyaryt and Surzhyk)
  words: 1000
  points:
  - 'Культурний контекст: Максим Рильський та метафора мови як виноградної лози («Як парость виноградної лози...») у боротьбі
    за чистоту слова.'
  - 'Феномен канцеляриту: ідентифікація бюрократичних штампів, як-от «зробити прибирання» замість природного «прибрати».'
  - 'Диференціація мовних явищ: розрізнення «побутового суржику», який підлягає викоріненню, та художнього використання «просторіччя».'
  - 'Практикум: виправлення надмірного вживання пасиву (наприклад, «питання було вирішене») на питомі активні конструкції
    («ми вирішили питання»).'
- section: Етикет та культури звертання (Etiquette and Cultures of Address)
  words: 900
  points:
  - 'Трансформація етикетних норм: нюанси вживання «Ви» vs «ти» та перехід від радянських до сучасних європейських стандартів
    спілкування.'
  - 'Форми звертання в офіційному листуванні: вибір між «Пан/Пані» та «Шановний/Шановна» залежно від контексту.'
  - 'Клініка помилок: аналіз етикетних кальок, зокрема заміна помилкового «вибачаюсь» на нормативні «перепрошую» або «вибачте».'
- section: Стилістичне редагування та фінальний контроль (Stylistic Editing and Final Control)
  words: 900
  points:
  - 'Рольова гра «Інспекція тексту»: пошук та виправлення тавтологій, плеоназмів та стилістичних дисонансів у змішаних текстах.'
  - 'Гнучкість у висловленні ступеня впевненості та ввічливості: добір мовних засобів для співбесіди, наукової дискусії та
    дружньої бесіди.'
  - 'Підсумок етапу: оцінка готовності до переходу до риторики рівня C2 та вивчення індивідуальних авторських стилів у літературі.'
