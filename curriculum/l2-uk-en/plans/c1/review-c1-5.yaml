module: c1-071
level: C1
sequence: 71
slug: review-c1-5
version: '1.0'
title: "Підсумкове повторення: Стилістична норма та складний синтаксис"
subtitle: "Review C1.5: Stylistic Norms and Complex Syntax"
focus: review
pedagogy: review
word_target: 4000
objectives:
  - "Систематизувати знання про стилістичну диференціацію української мови на рівні C1."
  - "Узагальнити правила вживання складних синтаксичних конструкцій у наукових та офіційних текстах."
  - "Усунути типові помилки в оформленні цитування та посилань."
  - "Закріпити навички аргументації у письмовому та усному мовленні."

reading_situations:
  - source_type: "критична стаття"
    topic: "Аналіз мовностилістичних особливостей творів 'Розстріляного відродження'."
    key_elements: ["авторська неографія", "експресивний синтаксис", "метафоричність"]
    motivation: "Повторення засобів мовної виразності в історико-літературному контексті."
  - source_type: "офіційний звіт"
    topic: "Дотримання мовної норми в державному секторі: виклики та тенденції."
    key_elements: ["канцеляризми", "термінологічна точність", "логічна послідовність"]
    motivation: "Узагальнення знань про офіційно-діловий стиль та його норми."

listening_situations:
  - media_type: "лекція"
    setting: "Вебінар для аспірантів щодо підготовки наукових публікацій у міжнародних виданнях."
    focus_points: ["структура IMRAD", "академічна доброчесність", "кліше наукового мовлення"]
    motivation: "Тренування сприйняття складної фахової інформації та виокремлення ключових тез."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Обґрунтуйте роль мовної політики у формуванні національної ідентичності України. Використайте складні речення різних типів."
    requirements: ["обсяг від 300 слів", "використання вставних конструкцій", "чітка тричастинна структура"]
    motivation: "Демонстрація володіння високим рівнем мовної компетенції та навичками переконування."
    model_answer: "Текст повинен містити вступ з тезою про взаємозв'язок мови та нації, аргументи з посиланням на історичні факти (наприклад, Валуєвський циркуляр) та висновок про сучасний стан мовної ситуації."

content_outline:
  - section: "Стилістичне багатство української мови"
    words: 1000
    subsections:
      - "Функціональні стилі: межі та взаємопроникнення"
      - "Стилістичне використання синонімії та антонімії"
      - "Емоційно-експресивна лексика в різних регістрах"
    key_concepts:
      - "експресивність"
      - "нейтральність"
      - "функціональний стиль"
  - section: "Складні випадки синтаксису"
    words: 1000
    subsections:
      - "Речення зі змішаним типом зв'язку: пунктуація та логіка"
      - "Вставні та вставлені конструкції як засоби хеджингу"
      - "Трансформація прямої мови в непряму в офіційному контексті"
    key_concepts:
      - "хеджинг"
      - "цитування"
      - "синтаксична синонімія"
  - section: "Академічна та професійна комунікація"
    words: 1000
    subsections:
      - "Культура наукового мовлення: від терміна до дефініції"
      - "Специфіка ділового листування: етикет та структура"
      - "Публічний виступ: засоби привернення уваги та аргументації"
    key_concepts:
      - "дискурс"
      - "кодифікація"
      - "риторика"
  - section: "Практикум з редагування"
    words: 1000
    subsections:
      - "Аналіз та виправлення типових лексичних кальок"
      - "Оптимізація складних речень для покращення читабельності"
      - "Робота над логічними помилками в аргументативних текстах"
    key_concepts:
      - "коректура"
      - "пуризм"
      - "мовна стійкість"

