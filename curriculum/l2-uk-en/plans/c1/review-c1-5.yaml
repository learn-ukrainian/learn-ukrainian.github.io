word_target: 4000
vocabulary_hints:
  required:
  - доцільність (expediency/appropriateness) — стилістична доцільність, доцільність використання; висока частотність в академічному
    контексті
  - канцелярит (officialese/bureaucratese) — уникати канцеляриту, бюрократичний канцелярит; публіцистичний термін для штампів
  - просторіччя (vernacular/colloquialism) — вживати просторіччя, елементи просторіччя; лінгвістичний термін
  - панібратство (inappropriate familiarity) — неприпустиме панібратство, переходити на панібратство; літературне слово
  - суржик (surzhyk/macaronic language) — побутовий суржик, викорінювати суржик; загальновживаний термін
  - доречність (appropriacy) — ключове поняття для вибору регістра залежно від ситуації
  recommended:
  - перепрошую (I beg your pardon) — правильна форма замість кальки «вибачаюсь»
  - вітаю (greetings/I welcome) — офіційне вітання замість «привіт»
  - епістолярний (epistolary) — епістолярний стиль, епістолярна спадщина
  - публіцистичний (publicistic) — стиль медіа та суспільного життя
  - плеоназм (pleonasm) — мовна надмірність, яку слід виправляти
