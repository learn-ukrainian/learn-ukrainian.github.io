module: c1-072
level: C1
sequence: 72
slug: review-c1-5
version: '1.1'
title: "Підсумкове повторення: Стилістична норма та складний синтаксис"
subtitle: "Огляд C1.5: стилістичні норми та складний синтаксис"
focus: review
pedagogy: review
word_target: 4000
objectives:
  - "Систематизувати знання про стилістичну диференціацію української мови на рівні
    C1."
  - "Узагальнити правила вживання складних синтаксичних конструкцій у наукових та
    офіційних текстах."
  - "Усунути типові помилки в оформленні цитування та посилань."
  - "Закріпити навички аргументації у письмовому та усному мовленні."

reading_situations:
  - source_type: "критична стаття"
    topic: "Аналіз мовностилістичних особливостей творів 'Розстріляного відродження'."
    key_elements: ["авторська неографія", "експресивний синтаксис", "метафоричність"]
    motivation: "Повторення засобів мовної виразності в історико-літературному контексті."
  - source_type: "офіційний звіт"
    topic: "Дотримання мовної норми в державному секторі: виклики та тенденції."
    key_elements: ["канцеляризми", "термінологічна точність", "логічна послідовність"]
    motivation: "Узагальнення знань про офіційно-діловий стиль та його норми."

listening_situations:
  - media_type: "лекція"
    setting: "Вебінар для аспірантів щодо підготовки наукових публікацій у міжнародних
      виданнях."
    focus_points: ["структура IMRAD", "академічна доброчесність", "кліше наукового
          мовлення"]
    motivation: "Тренування сприйняття складної фахової інформації та виокремлення
      ключових тез."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Обґрунтуйте роль мовної політики у формуванні національної ідентичності
      України. Використайте складні речення різних типів."
    requirements: ["обсяг від 300 слів", "використання вставних конструкцій", "чітка
          тричастинна структура"]
    motivation: "Демонстрація володіння високим рівнем мовної компетенції та навичками
      переконування."
    model_answer: "Текст повинен містити вступ з тезою про взаємозв'язок мови та нації,
      аргументи з посиланням на історичні факти (наприклад, Валуєвський циркуляр)
      та висновок про сучасний стан мовної ситуації."

content_outline:
  - section: "Стилістичне багатство української мови"
    words: 1000
    subsections:
      - "Функціональні стилі: межі та взаємопроникнення"
      - "Стилістичне використання синонімії та антонімії"
      - "Емоційно-експресивна лексика в різних регістрах"
    key_concepts:
      - "експресивність"
      - "нейтральність"
      - "функціональний стиль"
  - section: "Складні випадки синтаксису"
    words: 1000
    subsections:
      - "Речення зі змішаним типом зв'язку: пунктуація та логіка"
      - "Вставні та вставлені конструкції як засоби хеджингу"
      - "Трансформація прямої мови в непряму в офіційному контексті"
    key_concepts:
      - "хеджинг"
      - "цитування"
      - "синтаксична синонімія"
  - section: "Академічна та професійна комунікація"
    words: 1000
    subsections:
      - "Культура наукового мовлення: від терміна до дефініції"
      - "Специфіка ділового листування: етикет та структура"
      - "Публічний виступ: засоби привернення уваги та аргументації"
    key_concepts:
      - "дискурс"
      - "кодифікація"
      - "риторика"
  - section: "Практикум з редагування"
    words: 1000
    subsections:
      - "Аналіз та виправлення типових лексичних кальок"
      - "Оптимізація складних речень для покращення читабельності"
      - "Робота над логічними помилками в аргументативних текстах"
    key_concepts:
      - "коректура"
      - "пуризм"
      - "мовна стійкість"

vocabulary:
  required:
    - ідентичність
    - аргументація
    - доброчесність
    - концепція
    - структура
    - синтаксис
    - стилістика
    - аналіз
  recommended:
    - автентичний
    - когерентний
    - релевантний
    - верифікація
    - синтез

activity_hints:
  - type: critical-analysis
    description: "Analyze a literary criticism article about Розстріляне відродження
      — identify stylistic devices, register markers, and evaluate the text's argumentative
      structure."
  - type: error-correction
    description: "Fix lexical calques, surzhyk forms, and stylistic errors in a professional
      text — apply knowledge from all C1.5 modules."
  - type: comparative-study
    description: "Match C1.5 key concepts (хеджинг, когерентність, експресивний синтаксис,
      стилістична норма) with definitions and textual examples."
  - type: essay-response
    description: "Write a structured paragraph (150-200 words) on the role of language
      policy in national identity, using complex syntax and appropriate hedging."
  - type: essay-response
    description: "Complete sentences with appropriate discourse markers, connectors,
      and hedging expressions from academic Ukrainian register."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - essay-response
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
