module: c1-059
level: C1
sequence: 59
slug: combined-complex-sentences
version: '1.1'
title: "Складні речення з різними видами зв'язку"
subtitle: "Складні речення зі змішаними типами зв'язку"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Вивчити структуру багатокомпонентних складних речень з комбінованим зв'язком
    (сурядним, підрядним, безсполучниковим)."
  - "Опанувати правила пунктуації на межі різних типів зв'язку в одному реченні."
  - "Навчитися аналізувати та будувати складні логічні конструкції, характерні для
    наукового та філософського дискурсів."
  - "Розвинути навички редагування громіздких речень для покращення їхньої читабельності
    без втрати змісту."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Філософські роздуми про час і вічність у працях Дмитра Чижевського."
    key_elements: ["інтелектуальна історія", "світогляд", "синтез ідей"]
    motivation: "Аналіз складних речень у текстах з високим рівнем абстракції."
  - source_type: "художній уривок"
    topic: "Пейзажна експозиція у романі Олеся Гончара 'Собор': поєднання різних видів
      синтаксичного зв'язку."
    key_elements: ["символізм", "панорамність", "синтетизм"]
    motivation: "Дослідження художньої майстерності в побудові складних синтаксичних
      полотен."

listening_situations:
  - media_type: "лекція"
    setting: "Фрагмент лекції професора про конституційні права людини та громадянина."
    focus_points: ["багатокомпонентні речення в юридичному дискурсі", "чіткість ієрархії
          підпорядкування в реченні"]
    motivation: "Розуміння складних логічних зв'язків у професійному мовленні."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть академічне есе на тему 'Вплив глобалізації на національну ідентичність',
      використовуючи складні речення з різними видами зв'язку для аргументації складних
      процесів."
    requirements: ["мінімум 300 слів", "використання речень з 3-4 частинами", "демонстрація
          сурядного та підрядного зв'язку в одній конструкції"]
    motivation: "Відпрацювання навичок побудови інтелектуально насиченого тексту."
    model_answer: "Есе має демонструвати вільне володіння складним синтаксисом, де
      кожна частина речення логічно доповнює іншу, створюючи цілісну картину аргументації."

discussion_topics:
  - context: "Чи може одна людина змінити хід історії?"
    questions:
      - "Які приклади з української історії підтверджують чи спростовують роль особистості?"
      - "Як поєднуються об'єктивні обставини та суб'єктивна воля лідера?"
    motivation: "Стимулювання використання багатокомпонентних речень для опису багатогранних
      історичних процесів."

content_outline:
  - section: "Типологія речень з різними видами зв'язку"
    words: 1000
    subsections:
      - "Речення з сурядним та підрядним зв'язком"
      - "Речення з сурядним та безсполучниковим зв'язком"
      - "Багатокомпонентні конструкції з усіма видами зв'язку"
    key_concepts:
      - "полісиндетон"
      - "ієрархія"
      - "блокова структура"
  - section: "Пунктуація у складних синтаксичних конструкціях"
    words: 1000
    subsections:
      - "Розділові знаки на межі сурядності та підрядності"
      - "Вживання коми при збігу сполучників"
      - "Пунктуація в реченнях з безсполучниковим та сполучниковим зв'язком"
    key_concepts:
      - "пунктограма"
      - "синтаксичний вузол"
      - "інтонаційна єдність"
  - section: "Логіко-синтаксичний аналіз тексту"
    words: 1000
    subsections:
      - "Визначення смислових блоків у складному реченні"
      - "Побудова структурних схем багатокомпонентних речей"
      - "Відношення між частинами: причинові, часові, наслідкові"
    key_concepts:
      - "декомпозиція"
      - "схема"
      - "логічний наголос"
  - section: "Стилістичне редагування та культура мовлення"
    words: 1000
    subsections:
      - "Уникнення надмірної громіздкості речень"
      - "Трансформація складних конструкцій для полегшення сприйняття"
      - "Типові помилки у побудові речей з різними видами зв'язку"
    key_concepts:
      - "ясність"
      - "стилістична правка"
      - "варіативність"

vocabulary:
  required:
    - багатокомпонентний
    - комбінований
    - ієрархія
    - блок
    - структура
    - схема
    - підпорядкування
    - узгодження
  recommended:
    - розлогий
    - комплексний
    - багатогранний
    - інтегрований
    - системність

activity_hints:
  - type: critical-analysis
    description: "Build a structural diagram of a multi-clause sentence from a philosophical
      text, identifying all types of connections (сурядний, підрядний, безсполучниковий)."
  - type: error-correction
    description: "Fix punctuation and structural errors in multi-clause sentences
      — missing commas at conjunction boundaries, dangling subordinate clauses."
  - type: fill-in
    description: "Complete multi-clause sentences with appropriate conjunctions at
      the boundaries between different connection types."
  - type: match-up
    description: "Match structural diagrams of complex sentences with their written
      forms and identify the type of connection in each block."
  - type: select
    description: "Identify the hierarchical structure of multi-clause sentences —
      which clauses are at the same level and which are subordinated."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - unjumble
    - fill-in
    - match-up
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Заболотний, 9 клас (2017): §40 — Складне речення з різними видами зв'язку"
  - "Авраменко, 9 клас (2017): §28 — Складні синтаксичні конструкції"
  - "Глазова, 11 клас (2019): §25 — Правила будови складних речень"

connects_to:
  previous: "asyndetic-semantics"
  next: "complex-sentence-practice"
