module: c1-049
level: C1
sequence: 49
slug: combined-complex-sentences
version: '2.0'
title: Складне речення з різними видами зв'язку
subtitle: Multi-Type Complex Sentences
content_outline:
- section: 'Вступ: три типи зв''язку в одному реченні'
  words: 600
  points:
  - Поєднання сурядного, підрядного та безсполучникового зв'язку в межах одного висловлювання.
  - 'Структурний аналіз багатокомпонентних речень: виділення головних і залежних частин.'
  - Критерії визначення провідного типу зв'язку в комбінованому реченні.
- section: Моделі комбінованих речень
  words: 900
  points:
  - 'Модель «сурядний + підрядний»: головні частини, з''єднані сполучниками сурядності, з підрядними при кожній.'
  - 'Модель «підрядний + безсполучниковий»: підрядні конструкції з безсполучниковими фрагментами.'
  - 'Трикомпонентні моделі: речення з усіма трьома типами зв''язку одночасно.'
  - Деревоподібні діаграми для візуалізації синтаксичних рівнів.
- section: Пунктуація складних конструкцій
  words: 800
  points:
  - Правила пунктуації при багаторівневому вкладенні підрядних речень.
  - Нагромадження ком у складних конструкціях та засоби уникнення двозначності.
  - Вживання крапки з комою в довгих складносурядних реченнях.
  - 'Тире та двокрапка у змішаних структурах: розмежування безсполучникових і підрядних частин.'
- section: Стилістичне використання
  words: 700
  points:
  - 'Довгі комбіновані речення в академічному та юридичному стилях: функція точності й повноти.'
  - 'Короткі безсполучникові ланцюги в публіцистиці: функція динамічності.'
  - 'Реєстрова доречність: коли довге речення є нормою, а коли — завадою.'
- section: Перетворення та спрощення
  words: 500
  points:
  - Трансформація комбінованих речень у простіші структури без втрати змісту.
  - 'Уникнення «речень-монстрів»: критерії надмірної складності.'
  - Стратегії розбивання довгих речень для різних стилів.
- section: Практика
  words: 500
  points:
  - Комплексне конструювання речень із заданими типами зв'язку.
  - 'Аналіз автентичних текстів: визначення моделей комбінованих речень.'
focus: grammar
pedagogy: PPP
objectives:
- Розрізняти та аналізувати комбіновані складні речення з різними видами зв'язку.
- Правильно розставляти розділові знаки в багатокомпонентних реченнях.
- Трансформувати складні конструкції відповідно до стилістичних вимог.
grammar:
- 'Комбіноване складне речення: сурядний + підрядний + безсполучниковий зв''язок'
- 'Пунктуація багаторівневих конструкцій: кома, крапка з комою, тире, двокрапка'
- Трансформація складних речень у простіші структури
phase: C1.4 [Complex Sentences]
persona:
  voice: Senior Specialist
  role: Синтаксист-методист
word_target: 4000
vocabulary_hints:
  required:
  - складне речення (complex sentence) — базовий термін синтаксису; High Frequency
  - комбінований (combined) — визначення речення з різними типами зв'язку
  - сурядний зв'язок (coordinating connection) — зв'язок рівноправних частин
  - підрядний зв'язок (subordinating connection) — зв'язок головної і залежної частин
  - безсполучниковий зв'язок (asyndetic connection) — зв'язок без сполучників
  recommended:
  - багатокомпонентне (multi-component) — речення з трьома і більше частинами
  - рівень вкладеності (nesting level) — глибина підрядності в реченні
  - крапка з комою (semicolon) — розділовий знак у довгих складних реченнях
activity_hints:
