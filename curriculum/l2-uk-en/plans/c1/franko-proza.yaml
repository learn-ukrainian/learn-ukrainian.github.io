slug: franko-proza
version: '2.0'
title: 'Франко: Проза'
subtitle: Franko's Prose
content_outline:
- section: 'Вступ: Франко — титан праці (Introduction: Franko — Titan of Labor)'
  words: 600
  points:
  - 'Огляд постаті Івана Франка як «Титана праці»: масштаб спадщини (понад 6000 творів)
    та світове визнання (номінація на Нобелівську премію з літератури у 1916 році).'
  - 'Франко як новатор: перехід від етнографічного опису до глибокого соціально-психологічного
    реалізму та філософського осмислення буття.'
- section: 'Історична проза: Громада проти навали (Historical Prose: Community vs.
    Invasion)'
  words: 900
  points:
  - 'Аналіз повісті «Захар Беркут»: синтез історичного факту (село Тухля на Львівщині)
    та романтичної легенди; концепція непереможності згуртованої громади.'
  - Стилістичне використання діалектизмів та архаїзмів (§4.4.3) для відтворення духу
    минувшини; аналіз віче громади як символу народовладдя.
  - 'Культурний контекст: легенда про Тухольську скелю та її зв''язок із сучасною
    географією Карпат; роль старійшин у збереженні традицій тухольців.'
- section: 'Соціальний реалізм: Нафтова лихоманка (Social Realism: Oil Fever)'
  words: 900
  points:
  - «Борислав сміється» як один із перших творів у світовій літературі, що зображує
    організований страйк робітників та конфлікт між працею і капіталом.
  - 'Специфічна лексика індустріального циклу: життя бориславських ріпників, важка
    праця кайлом; зіставлення бюрократичної мови урядовців із живою мовою народу.'
  - Порівняння засад соціального реалізму Франка з європейськими зразками (Золя, Діккенс)
    у контексті критичного осмислення дійсності.
- section: Психологізм та мовна палітра (Psychologism and Language Palette)
  words: 800
  points:
  - 'Мала проза Франка: майстерність психологічного портрету та використання художнього
    стилю (§4.4.1.1) для відтворення внутрішнього світу героїв.'
  - 'Стилістичні засоби лексики (§4.4.3): роль епітетів, метафор та омонімів у створенні
    емоційної напруги; опис полонини як сакрального простору селянина.'
  - 'Подолання лексичних помилок: розмежування діалектних форм (легінь, ґазда) та
    літературного стандарту (юнак, господар) у нейтральному мовленні.'
- section: Стилістичний практикум та аналіз (Stylistic Workshop and Analysis)
  words: 800
  points:
  - 'Граматичний практикум Agency Pass: трансформація пасивних конструкцій («було
    написано Франком») на активні («Франко написав») задля підкреслення агентності.'
  - 'Жанрова точність: розрізнення художньої історичної повісті («Захар Беркут») та
    документалістики; критичний розбір фрагментів тексту на автентичність.'
  - 'Підсумкове творче завдання: написання есе про актуальність соціальної критики
    Франка та його роль у формуванні сучасної української ідентичності.'
focus: literature
pedagogy: Literary Analysis
objectives:
- Learner can analyze the historical and social aspects of Franko’s major novels.
- Learner can interpret the psychological depth of Franko’s short stories.
- Learner can discuss Franko’s role as a pioneer of social realism in Ukrainian literature.
grammar:
- Narrative registers
- Dialectal elements
phase: C1.6 Literature
persona:
  voice: Senior Specialist
  role: Франкознавець
word_target: 4000
vocabulary_hints:
  required:
  - полонина (high-mountain pasture) — вийти на полонину, зелена полонина; ключовий
    географічний маркер Карпат
  - громада (community) — сільська громада, інтереси громади, віче громади; засадничий
    термін соціального устрою у Франка
  - ріпник (oil worker) — бориславський ріпник, праця ріпника; історизм, специфічний
    для нафтової прози Франка
  - кайло (pickaxe) — важке кайло, працювати кайлом, стукіт кайла; символ виснажливої
    промислової праці
  - повістяр (novelist/storyteller) — талант повістяра, Франко-повістяр; літературознавчий
    термін для характеристики прозаїка
  - реалізм (realism) — соціальний реалізм, засади реалізму, критичний реалізм; літературний
    метод Франка
  recommended:
  - тухольці (Tukhlians) — громада тухольців, старійшина тухольців; мешканці Тухлі
    в повісті «Захар Беркут»
  - легінь (lad) — діалектизм (замінювати на «юнак» у нейтральному стилі); вживається
    для характеристики молодих гуцулів
  - ґазда (master/host) — діалектизм (стандарт — «господар»); маркер поважного статусу
    селянина-власника
  - нафтова лихоманка (oil fever) — період бурхливого розвитку нафтовидобутку в Бориславі,
    що став основою творів Франка
