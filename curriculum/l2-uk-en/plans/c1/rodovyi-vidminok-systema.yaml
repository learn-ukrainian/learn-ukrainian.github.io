slug: rodovyi-vidminok-systema
version: 1.0.2
title: 'Родовий відмінок: повна система значень і керування'
subtitle: 'Родовий відмінок: суб''єктне, об''єктне, партитивне, прийменникове'
focus: grammar
pedagogy: TTT
word_target: 4000
objectives:
- 'Систематизувати всі значення родового відмінка: суб''єктне, об''єктне, партитивне,
  присвійне, означальне, кількісне.'
- Опанувати родовий заперечення та його конкуренцію зі знахідним.
- Вивчити керування 20+ прийменників із родовим відмінком.
- Аналізувати стилістичні функції родового відмінка в різних регістрах.
reading_situations:
- source_type: юридичний текст
  topic: 'Фрагмент Конституції України: аналіз використання родового відмінка в офіційно-діловому
    стилі.'
  key_elements:
  - керування
  - прийменники
  - присвійний родовий
  motivation: Вивчення високочастотних моделей родового відмінка в правничому 
    дискурсі.
- source_type: художній уривок
  topic: 'Родовий відмінок у поезії Ліни Костенко: партитивність та означальність.'
  key_elements:
  - партитивний родовий
  - генітивна метафора
  - стилістика
  motivation: Аналіз експресивних можливостей родового відмінка в поетичному 
    мовленні.
listening_situations:
- media_type: лекція
  setting: Фрагмент лекції з граматики про семантичну карту родового відмінка в 
    українській мові.
  focus_points:
  - класифікація значень
  - конкуренція відмінків
  - прийменникові конструкції
  motivation: Сприйняття складної граматичної класифікації в академічному 
    контексті.
writing_tasks:
- task_type: аналітичний текст
  prompt: 'Проаналізуйте використання родового відмінка в одному абзаці Конституції
    України: визначте типи значень (присвійне, об''єктне, означальне) та прийменникове
    керування.'
  requirements:
  - мінімум 250 слів
  - використання граматичної термінології
  - щонайменше 5 прикладів із тексту
  motivation: Відпрацювання навичок граматичного аналізу на автентичному 
    матеріалі.
  model_answer: Текст має містити систематичну класифікацію прикладів родового 
    відмінка з поясненнями кожного типу значення.
discussion_topics:
- context: Чому родовий — 'найбагатший' відмінок у системі української мови?
  questions:
  - Як вибір між родовим і знахідним при запереченні впливає на стиль 
    висловлення?
  - Чому прийменники 'без', 'для', 'після', 'замість' вимагають саме родового 
    відмінка?
  motivation: Поглиблене розуміння семантичної мотивації відмінкового керування.
content_outline:
- section: Суб'єктне та присвійне значення родового
  words: 1000
  subsections:
  - 'Родовий суб''єкта: приїзд батька, спів птахів'
  - 'Родовий присвійний: будинок сестри, столиця України'
  - 'Родовий означальний: людина честі, питання совісті'
  key_concepts:
  - суб'єктний
  - присвійний
  - означальний
- section: Об'єктне та партитивне значення
  words: 1000
  subsections:
  - 'Родовий прямого об''єкта при запереченні: не бачити лісу / не бачити ліс'
  - 'Партитивний родовий: випити води, додати солі'
  - 'Родовий при словах із кількісним значенням: багато, мало, кілька'
  key_concepts:
  - партитивний
  - заперечення
  - кількісний
- section: Прийменникове керування з родовим
  words: 1000
  subsections:
  - 'Просторові прийменники: від, до, з, із, біля, поруч з, навпроти'
  - 'Часові прийменники: після, до, від... до, під час, напередодні'
  - 'Логічні та цільові прийменники: для, заради, замість, через, без, щодо'
  key_concepts:
  - керування
  - прийменник
  - валентність
- section: Стилістичні функції родового відмінка
  words: 1000
  subsections:
  - 'Нанизування родових відмінків: проблема та її розв''язання'
  - 'Родовий відмінок у генітивних метафорах: ''золото пшениці'', ''срібло роси'''
  - Варіативність -а/-у в родовому однини чоловічого роду
  key_concepts:
  - нанизування
  - генітивна метафора
  - варіативність
- section: Підсумок — Summary
  words: 300
  points:
  - "The Genitive case expresses a diverse range of meanings including subjective
    (спів птахів), partitive (додати солі), and quantitative (багато часу) functions.
    Self-check: Describe 3 ingredients in your favorite recipe using the partitive
    genitive. What is the semantic difference between 'не бачити ліс' and 'не бачити
    лісу'?"
  - 'Prepositional governance requires the Genitive case for spatial (біля, навпроти),
    temporal (після, до), and logical (заради, замість) relationships. Self-check:
    Describe the location of 3 buildings in your city using spatial Genitive prepositions.'
  - "Advanced Genitive usage involves navigating the masculine singular -а/-у variation
    and utilizing stylistic devices like genitive metaphors ('золото пшениці'). Self-check:
    Can you explain the general rule for choosing the -а or -у ending for an inanimate
    masculine noun?"
