    - генітивний

activity_hints:
  - type: select
    description: "Classify the meaning of genitive case in each sentence: subjective,
      objective, partitive, possessive, attributive, or quantitative."
  - type: fill-in
    description: "Complete sentences with the correct preposition + genitive form,
      choosing from spatial, temporal, and logical prepositions."
  - type: error-correction
    description: "Fix errors in genitive case usage — wrong ending (-а/-у choice),
      stacking of genitives, incorrect preposition government."
  - type: critical-analysis
    description: "Analyze genitive case usage in a fragment of the Ukrainian Constitution,
      classifying each instance by semantic type."
  - type: match-up
    description: "Match prepositions (від, для, без, після, замість, щодо) with their
      semantic groups and example phrases in genitive."

activities:
  types_required:
    - select
    - fill-in
    - error-correction
    - critical-analysis
    - match-up
  min_items_per_type: 5
  total_min_items: 25

