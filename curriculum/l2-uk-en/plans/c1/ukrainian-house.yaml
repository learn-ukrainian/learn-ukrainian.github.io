activity_hints:
- type: reading
  focus: 'Прочитайте текст про космогонія житла: структура та матеріали і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про внутрішній світ хати: сакральна географія, використовуючи нову лексику
    модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Космогонія житла: структура та матеріали». Обґрунтуйте свою
    позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему космогонія житла: структура та матеріали.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до космогонія житла: структура та матеріали: Від вибору місця до зведення стін: ритуали
    та технології. Визначте спільне та відмінне.'
