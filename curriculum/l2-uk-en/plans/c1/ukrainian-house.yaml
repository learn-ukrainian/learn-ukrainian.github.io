module: c1-068
level: C1
sequence: 68
slug: ukrainian-house
version: '2.0'
title: Українська хата - архітектура та побут
subtitle: Ukrainian House - Architecture and Daily Life
content_outline:
- section: Розминка — Хата як світ
  points:
  - Хата — не просто житло, а мікрокосм
  - Символічний простір (покуть, піч, поріг)
  - Зв'язок архітектури з віруваннями та побутом
- section: Будова та елементи хати
  points:
  - 'Конструкція: мазанка vs зруб'
  - 'Покрівля: солома, очерет, ґонти'
  - 'Інтер''єр: покуть, полиці, скрині'
  - 'Піч: серце дому, готування, опалення, спання'
- section: Символіка простору
  points:
  - Покуть — священне місце (ікони, рушники)
  - Поріг — межа між світами
  - Вікна та двері — захисні символи
  - Регіональні варіанти (білі хати Поділля, дерев'яні гуцульські)
- section: Практика — опис житла
  points:
  - Описати традиційну хату за зображенням
  - Пояснити символіку елементів інтер'єру
  - Порівняти українську хату з європейським житлом
  - Написати есе про хату як культурний код
focus: cultural
pedagogy: CBI
objectives:
- Learner can describe the structure and layout of a traditional Ukrainian house
- Learner can explain the symbolic meaning of the "red corner" (pokut') and the stove
- Learner can distinguish regional architectural styles (clay-walled vs. wooden)
- Learner can discuss the role of the house in family rituals
grammar:
- architectural terminology
- spatial descriptions
phase: C1.5 Folk Culture & Arts
persona:
  voice: Senior Specialist
  role: Етно-архітектор
