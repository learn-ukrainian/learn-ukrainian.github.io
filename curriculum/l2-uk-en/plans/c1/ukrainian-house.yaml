module: c1-111
level: C1
sequence: 111
slug: ukrainian-house
version: 1.2.1
title: 'Українська хата: архітектура, інтер''єр та сакральний простір'
subtitle: 'Українська хата: архітектура та сакральний простір'
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
- Дослідити конструктивні особливості та архітектурні типи українського народного житла.
- Проаналізувати семантику внутрішнього простору хати (покуть, піч, поріг) як відображення світогляду українців.
- Вивчити регіональні відмінності в народному будівництві (глинобитна хата півдня, зрубна хата Карпат та Полісся).
- Оцінити значення хати як центрального образу в українській літературі та мистецтві.
reading_situations:
- source_type: архітектурне дослідження
  topic: 'Феномен української білої хати: поєднання екологічності, естетики та функціональності.'
  key_elements:
  - саман
  - тинькування
  - солом'яна стріха
  - антропоморфність
  - вертикальне зонування
  motivation: Вивчення професійної архітектурної термінології та описів конструктивних рішень.
- source_type: художній уривок
  topic: 'Опис хати як живої істоти у прозі Олександра Довженка: поетизація побутового простору.'
  key_elements:
  - рушники
  - сволок
  - мисник
  - магія щоденності
  motivation: Аналіз епітетів та метафор у художньому описі інтер'єру.
listening_situations:
- media_type: лекція
  setting: Виступ етнографа в Музеї просто неба (Пирогово) про обряди, пов'язані із закладанням та будівництвом хати.
  focus_points:
  - вибір місця для будівництва
  - жертовні предмети під поріг
  - роль сволока як опори дому
  motivation: Розуміння складних етнографічних концепцій та сакральних значень у народному побуті.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Проаналізуйте вислів: ''Хата моя, біла хата, рідна моя сторона''. Чому образ хати став одним із найсильніших символів
    української ідентичності та ностальгії?'
  requirements:
  - мінімум 300 слів
  - 'використання понять: мікрокосмос, сакральність, спадкоємність'
  - приклади з літератури чи історії
  motivation: Вміння аргументовано пояснювати культурні концепти.
  model_answer: Текст має розкривати хату не лише як будівлю, а як сакральний простір, де людина перебуває у гармонії з природою
    та родом. Слід згадати про роль печі як 'домашнього вівтаря' та покуті як духовного центру.
discussion_topics:
- context: У багатьох селах України старовинні хати руйнуються або перебудовуються з використанням сучасних матеріалів, що
    знищує автентичний ландшафт.
  questions:
  - Чи варто зберігати старі хати як пам'ятки архітектури, якщо вони не відповідають сучасним стандартам комфорту?
  - Як можна інтегрувати елементи традиційної архітектури в сучасне будівництво, щоб зберегти національний колорит?
  motivation: Розвиток навичок ведення дискусії про охорону культурної спадщини та урбаністику.
content_outline:
