  words: 1000
  subsections:
  - 'Від вибору місця до зведення стін: ритуали та технології'
  - 'Природні матеріали: глина, дерево, солома як основа еко-архітектури'
  - 'Зовнішнє оздоблення: побілка та розпис як спосіб захисту та прикраси'
  key_concepts:
  - саман
  - тинькування
  - стріха
  - оберегові ритуали
- section: 'Внутрішній світ хати: сакральна географія'
  words: 1000
  subsections:
  - 'Піч — душа дому: господарські та магічні функції'
  - 'Покуть: місце для ікон, хліба та пам''яті предків'
  - 'Сволок як символ неба: значення надписів та знаків на центральній балці'
  key_concepts:
  - мисник
  - покуть
  - сволок
  - сакральний центр
- section: Регіональне обличчя української оселі
  words: 1000
  subsections:
  - 'Карпатські ґражди: хати-фортеці у суворому кліматі'
  - 'Поліська зрубна хата: дерево як головний архітектор'
  - 'Південна мазанка: камінь та глина в степовому ландшафті'
  key_concepts:
  - ґражда
  - зруб
  - мазанка
  - адаптація до середовища
- section: Хата в українському культурному коді
  words: 1000
  subsections:
  - 'Літературна хата: від Шевченка до сучасних романів'
  - 'Музеї просто неба: збереження архітектурної пам''яті'
  - Сучасна ревіталізація етно-дизайну в інтер'єрі
  key_concepts:
  - ревіталізація
  - етно-стиль
  - культурна спадщина
  - образ-символ
- section: Підсумок — Summary
