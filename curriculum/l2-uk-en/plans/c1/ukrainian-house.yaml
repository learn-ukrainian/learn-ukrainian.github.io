slug: ukrainian-house
version: '2.0'
title: Українська хата - архітектура та побут
subtitle: Ukrainian House - Architecture and Daily Life
content_outline:
- section: 'Вступ: Хата як мікрокосм (Introduction: The House as a Microcosm)'
  words: 600
  points:
  - 'Хата як модель всесвіту: пояснення філософського концепту житла, де дах — небо, долівка — земля, а стіни — межа між світами'
  - 'Символічний простір: огляд ключових зон (покуть, піч, поріг) як елементів духовного хребта дому'
  - 'Зв''язок архітектури з народною космогонією: чому будівництво дому вважалося священнодійством'
- section: Архітектура та конструктивні елементи (Architecture and Structural Elements)
  words: 900
  points:
  - 'Регіональне розмаїття: детальний опис мазанки (Степова Україна/Поділля) та зрубу/ґражди (Карпати), спростування стереотипу
    про однотипність житла'
  - 'Конструкційні особливості: стріха (солом’яна чи очеретяна), призьба (земляний насип навколо стін) та їхні практичні й
    соціальні функції'
  - 'Культурний гачок — Сволок: розгляд головної балки як ''паспорта хати'', де вирізьблювали дату побудови, імена господарів
    та захисні солярні символи'
- section: Інтер’єр та сакральна геометрія (Interior and Sacred Geometry)
  words: 1000
  points:
  - 'Геометрія простору: розподіл на ''жіночу'' частину (біля печі) та ''чоловічу'' (біля покуті), функціональна наповненість
    кожного кута'
  - 'Діагональ ''Піч — Покуть'': протиставлення земного вогню (піч) та небесного світла (ікони), їхня роль у щоденній навігації
    мешканців'
  - 'Елементи умеблювання: скриня (як символ достатку), полиці, піл (місце для спання) та їхній зв''язок із сімейною ієрархією'
- section: Ритуали та мовна динаміка побуту (Rituals and the Linguistic Dynamics of Daily Life)
  words: 800
  points:
  - 'Дії та процеси: використання дієслів ''мазати долівку'', ''білити стіни'' (щорічне оновлення простору) та їхня сакральна
    роль у гігієні й естетиці'
  - 'Поріг та вікна як межі: пояснення заборон та ритуалів (чому не вітаються через поріг), вікна як захисні символи з орнаментами'
  - 'Піч як серце дому: метафоричне значення (''Піч годує''), готування їжі, опалення та спання як комплексний досвід виживання'
- section: Практика та лексична точність (Practice and Lexical Accuracy)
  words: 700
  points:
  - 'Корекція помилок №1: розрізнення понять ''Хата'' (традиційне одноповерхове), ''Будинок'' (багатоповерхівка/city building)
    та ''Дім'' (Home/Abstract)'
  - 'Корекція помилок №2: відпрацювання вживання ''Відчиняти'' (двері, вікна, стулки) замість ''Відкривати'' (пляшки, очі,
    америки)'
  - 'Корекція помилок №3: просторові прийменники — специфічне вживання ''на покуті'' (sacred space) проти ''у кутку'' (ordinary
    corner)'
  - 'Творче завдання: написання есе на основі цитат із класичної літератури про хату як культурний код українства'
focus: cultural
pedagogy: CBI
objectives:
- Learner can describe the structure and layout of a traditional Ukrainian house
- Learner can explain the symbolic meaning of the "red corner" (pokut') and the stove
- Learner can distinguish regional architectural styles (clay-walled vs. wooden)
- Learner can discuss the role of the house in family rituals
grammar:
- architectural terminology
- spatial descriptions
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Етно-архітектор
word_target: 4000
vocabulary_hints:
  required:
  - Стріха (thatch) — солом'яна стріха, під стріхою; часто вживається у фольклорі як символ рідного дому
  - Мазанка (clay-walled house) — біла мазанка, стара мазанка; специфічний термін для хат із глини, соломи й дерева
  - Сволок (main ceiling beam) — вирізьблений сволок, духовний хребет хати; на сволоку записували історію роду
  - Покуть (red/sacred corner) — на покуті (Prep), сісти на покуть; найчесніше місце в хаті навпроти печі
  - Призьба (earthen bench) — сидіти на призьбі, земляна призьба; місце для соціалізації біля стін хати
  - Піч (stove/hearth) — варити в печі, на печі; головна вісь хати, джерело життя й тепла
  - Ґражда (hutsul enclosed farmstead) — замкнена гуцульська садиба; символ оборонного типу житла в Карпатах
  recommended:
  - Мазати (to plaster with clay) — мазати долівку; традиційна жіноча робота з оновлення підлоги
  - Білити (to whitewash) — білити стіни вапном; ритуал очищення простору перед великими святами
  - Долівка (earthen floor) — глиняна долівка; специфічний тип підлоги в традиційній хаті
  - Відчиняти (to open shuttered objects) — відчиняти вікно/двері; ключовий дієслівний диференціатор на рівні С1
