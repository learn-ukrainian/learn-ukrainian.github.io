module: c1-026
level: C1
sequence: 26
slug: business-etiquette
version: '1.1'
title: "Діловий етикет та корпоративна культура в Україні"
subtitle: "Бізнес-етикет і корпоративна культура"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Досконало володіти формами ввічливості та етикетом звертань у діловому середовищі."
  - "Розуміти особливості протоколу ділових зустрічей, нарад та презентацій."
  - "Опанувати культуру ведення дискусій та конструктивного вирішення конфліктів."
  - "Аналізувати еволюцію українського ділового етикету від козацького протоколу до
    сучасності."

reading_situations:
  - source_type: "кодекс етики"
    topic: "Аналіз корпоративних цінностей сучасної української компанії (напр., SoftServe
      або Нова Пошта)."
    key_elements: ["інклюзивність", "сталий розвиток", "соціальна відповідальність"]
    motivation: "Вивчення офіційно-ділового стилю через призму корпоративної культури."
  - source_type: "історичний нарис"
    topic: "Дипломатичний етикет та протокол у Гетьманщині XVIII століття."
    key_elements: ["церемоніал", "ранги", "риторичні прикраси"]
    motivation: "Зв'язок сучасної ділової мови з історичними традиціями українського
      державотворення."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ експерта з етикету про тонкощі мережевого та реального спілкування
      в бізнесі."
    focus_points: ["дистанція", "табуйовані теми", "дрес-код"]
    motivation: "Розвиток здатності сприймати нюанси соціальної взаємодії через мовлення."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть офіційного листа-запрошення міжнародним партнерам на відкриття
      нового філіалу, дотримуючись суворого дипломатичного протоколу."
    requirements: ["мінімум 200 слів", "використання застиглих етикетних формул",
      "безособові конструкції"]
    motivation: "Формування навичок високого стилю ділового листування."
    model_answer: "Лист має містити формальне звертання, мету заходу, логістичні деталі
      та формулу ввічливого прощання. Використання виразів 'маємо честь запросити',
      'будемо вельми вдячні за підтвердження'."

discussion_topics:
  - context: "Проблема 'ти-кання' vs 'ви-кання' у молодих українських стартапах."
    questions:
      - "Чи сприяє демократизація мовлення ефективності бізнесу?"
      - "Де проходить межа між дружньою атмосферою та панібратством?"
      - "Як культура звертання відображає ієрархію в колективі?"
    motivation: "Обговорення змін у мовних нормах під впливом глобалізації та ІТ-сектору."

content_outline:
  - section: "Мовна формула ввічливості: теорія та практика"
    words: 1000
    subsections:
      - "Етикетні парадигми: від 'Пане/Пані' до сучасних форм"
      - "Мистецтво компліменту та подяки в діловому контексті"
      - "Речевий акт вибачення та відмови: як зберегти обличчя"
    key_concepts:
      - "дистанціювання"
      - "шанобливість"
      - "риторична етика"
  - section: "Протокол ділової взаємодії"
    words: 1000
    subsections:
      - "Знайомство, представлення та обмін візитівками"
      - "Організація та ведення нарад: регламент та фасилітація"
      - "Специфіка ділових обідів та неформального спілкування (small talk)"
    key_concepts:
      - "субординація"
      - "тайм-менеджмент"
      - "модерація"
  - section: "Управління конфліктами та медіація"
    words: 1000
    subsections:
      - "Мовні стратегії в конфліктних ситуаціях: від конфронтації до діалогу"
      - "Критика без образ: техніка 'сендвіча' та я-повідомлення"
      - "Роль посередника (медіатора) у вирішенні корпоративних спорів"
    key_concepts:
      - "толерантність"
      - "компроміс"
      - "асертивність"
  - section: "Культурний код українського бізнесу"
    words: 1000
    subsections:
      - "Специфіка українського гостеприїмства в діловому контексті"
      - "Гендерний аспект в українському бізнес-етикеті"
      - "Вплив національних традицій на сучасний корпоративний стиль"
    key_concepts:
      - "ментальність"
      - "ідентичність"
      - "ціннісний орієнтир"

vocabulary:
  required:
    - етикет
    - протокол
    - ввічливість
    - партнерство
    - репутація
    - компроміс
    - дискусія
    - авторитет
  recommended:
    - лояльність
    - дипломатичність
    - компетентність
    - тактовність
    - конструктивність

activity_hints:
  - type: critical-analysis
    description: "Analyze corporate ethics codes from Ukrainian companies — evaluate
      formality level, inclusivity language, and cultural sensitivity."
  - type: error-correction
    description: "Fix etiquette violations in business communication examples — correct
      forms of address, inappropriate familiarity, and protocol breaches."
  - type: comparative-study
    description: "Match business situations (знайомство, нарада, конфлікт) with appropriate
      Ukrainian etiquette formulas and register choices."
  - type: select
    description: "Choose the most appropriate etiquette formula for various business
      contexts — formal invitations, polite refusals, diplomatic apologies."
  - type: essay-response
    description: "Write a formal invitation letter to international partners for a
      company event — demonstrate diplomatic protocol in Ukrainian."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - select
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): с. 172-173 — Діалогічні жанри, листування"
  - "Авраменко, 11 клас (2019): с. 195 — Ділове листування"
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка"

connects_to:
  previous: "job-interview"
  next: "digital-communication"
phase: C1.2 [Professional & Social Context]
