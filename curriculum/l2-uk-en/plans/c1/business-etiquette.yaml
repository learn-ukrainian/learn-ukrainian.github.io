module: c1-023
level: C1
sequence: 23
slug: business-etiquette
version: '2.0'
title: Діловий етикет в Україні
subtitle: 'Introduction: Business Culture'
content_outline:
- section: 'Вступ: Ділова культура (Introduction: Business Culture)'
  words: 500
  points:
  - 'Аналіз сучасного стану українського бізнес-середовища відповідно до Державного стандарту (§3.13): особливості ведення
    переговорів та укладання угод.'
  - 'Трансформація етикету: відхід від радянських ієрархічних моделей до європейських стандартів при збереженні локальної
    специфіки.'
  - Важливість офіційно-ділового стилю спілкування (§4.4.1.1) для створення образу надійного партнера та професіонала.
- section: Етикет звертань та субординація (Etiquette of Address and Subordination)
  words: 700
  points:
  - Використання формули 'Пане/Пані + ім’я' як сучасного стандарту; аналіз випадків використання імені та по батькові в державних
    структурах.
  - 'Дотримання службової субординації: повага до посад та академічних ступенів партнера під час офіційної комунікації.'
  - 'Типова помилка: передчасний перехід на ''ти'' — методика дотримання дистанції ''Ви'' до офіційної пропозиції змінити
    стиль спілкування.'
- section: Протокол зустрічей та невербальна комунікація (Meeting Protocol and Non-verbal Communication)
  words: 800
  points:
  - 'Ритуал вітання: правила рукостискання та обміну візитними картками (вручення візитки як знак уваги).'
  - 'Культурний гачок: заборона дій ''через поріг'' (рукостискання, передача документів) як стійкий бізнес-забобон щодо успіху
    угоди.'
  - Роль зорового контакту та відкритої жестикуляції в побудові довіри під час ділових раундів переговорів.
- section: Гостинність та культура дарування (Hospitality and Gift Culture)
  words: 700
  points:
  - 'Українська гостинність як обов’язковий елемент протоколу: чому відмова від запропонованої кави чи чаю сприймається як
    ознака холодності.'
  - 'Мистецтво Small talk: обов’язкові теми перед переходом до ділової частини зустрічі для налагодження емоційного контакту.'
  - 'Розмежування понять ''сувенір'' та ''хабар'': аналіз прийнятних ділових подарунків та ситуацій, коли коштовні речі трактуються
    двозначно.'
- section: Дисципліна та професійний імідж (Discipline and Professional Image)
  words: 700
  points:
  - 'Ставлення до часу та пунктуальності: плавання зустрічей та допустимі межі запізнень в українському контексті.'
  - 'Дотримання дрес-коду: розбір стилів ''Business formal'' для офіційних зустрічей та ''Business casual'' для регіональних
    чи неформальних переговорів.'
  - 'Офіційно-діловий стиль мовлення: нейтральність тону та уникнення емоційної лексики чи сленгу в офіційному листуванні.'
- section: 'Практикум: Робота над помилками (Workshop: Error Correction)'
  words: 600
  points:
  - 'Симуляція ділових переговорів: відпрацювання сценаріїв представлення колег та обміну контактами.'
  - 'Аналіз та виправлення помилок: змішування стилів, використання недоречних емоційних маркерів та порушення мовного етикету.'
  - 'Кейс-стаді: вирішення конфліктних ситуацій, пов''язаних із неправильним звертанням або порушенням субординації.'
vocabulary_hints:
  required:
  - етикет (etiquette) — діловий етикет, мовний етикет; дотримуватися норм етикету (high frequency)
  - звертання (form of address) — офіційне звертання, шанобливе звертання; форма звертання на «Ви»
  - субординація (subordination) — службова субординація; дотримуватися або порушувати субординацію
  - переговори (negotiations) — вести переговори, успішні переговори, раунд переговорів
  - візитка (business card) — обмінятися візитками, вручити візитну картку (essential tool)
  - дрес-код (dress code) — суворий дрес-код, дотримуватися дрес-коду; бізнес-формал
  - рукостискання (handshake) — міцне рукостискання; уникати рукостискання через поріг
  - пунктуальність (punctuality) — вимога пунктуальності; повага до часу партнерів
  - хабар (bribe) — розмежування між подарунком та хабарем; антикорупційні норми
  - протокол (protocol) — дипломатичний протокол, протокольна зустріч; згідно з протоколом
  recommended:
  - корпоративна культура (corporate culture) — цінності та етика компанії
  - професіоналізм (professionalism) — демонструвати високий рівень професіоналізму
  - тактовність (tact) — виявляти тактовність у спілкуванні з керівництвом
  - дипломатичність (diplomacy) — дипломатичний підхід до вирішення конфліктів
  - 'поріг (threshold) — бізнес-забобон: не передавати документи через поріг'
  - гостинність (hospitality) — традиційна українська гостинність у бізнесі
