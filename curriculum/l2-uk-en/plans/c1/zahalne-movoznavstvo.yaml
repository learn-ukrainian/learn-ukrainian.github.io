module: c1-030
level: C1
sequence: 30
slug: zahalne-movoznavstvo
version: '2.0'
title: 'Загальне мовознавство: Мова як система'
subtitle: 'General Linguistics: Language as a System'
content_outline:
- section: Мовознавство як наука
  words: 600
  points:
  - 'Розділи мовознавства: фонетика, лексикологія, граматика (морфологія + синтаксис), стилістика — їхні об''єкти дослідження
    та взаємозв''язок'
  - 'Синхронія vs діахронія: дослідження мови на одному часовому зрізі проти вивчення її історичного розвитку (Соссюр)'
  - 'Langue vs parole (мова vs мовлення): абстрактна система проти конкретної реалізації в щоденному спілкуванні'
- section: Мова і мовлення
  words: 700
  points:
  - 'Мова як система знаків: довільність мовного знаку, зв''язок між формою (означник) та змістом (означуване)'
  - 'Функції мови: комунікативна (спілкування), мислетворча (оформлення думки), естетична (художній вплив), номінативна (називання
    предметів і явищ)'
  - 'Мова vs мовлення: мова — суспільне явище, мовлення — індивідуальне; мова — абстрактна, мовлення — конкретне'
- section: Українська мова серед мов світу
  words: 800
  points:
  - 'Індоєвропейська мовна сім''я та слов''янська гілка: східнослов''янська, західнослов''янська, південнослов''янська підгрупи'
  - 'Типологічна класифікація: українська як флективна (синтетична) мова з елементами аналітизму'
  - 'Українська у порівнянні з близькими мовами: спільне та відмінне з польською, білоруською, російською на фонетичному,
    лексичному та граматичному рівнях'
- section: Мовна норма
  words: 700
  points:
  - 'Типи мовних норм: орфоепічна (вимова), лексична (слововживання), граматична (форми та конструкції), стилістична (доречність),
    правописна (написання)'
  - 'Кодифікація: фіксація норми в словниках, граматиках, правописних довідниках — роль Українського правопису 2019'
  - 'Літературна мова vs діалект: нормативний стандарт проти територіальних варіантів, суржик як соціолінгвістичне явище'
- section: Відмінювання складених числівників
  words: 700
  points:
  - 'SS 4.1.1.3: повне відмінювання складених кількісних числівників (двісті тридцять п''ять) у всіх 7 відмінках — кожна частина
    змінюється'
  - 'Порядкові числівники: утворення та узгодження з іменником (двісті тридцять п''ятий — змінюється лише останнє слово)'
  - 'Дробові числівники: структура (дві третіх, п''ять цілих і три десятих) та вживання в науковому й побутовому стилях'
- section: Практика
  words: 500
  points:
  - Тестові завдання на класифікацію мовних одиниць та визначення мовознавчих понять
  - Вправи на визначення типу мовної норми за прикладами помилок
  - Практичні завдання на відмінювання складених числівників у реченнях
focus: grammar
pedagogy: CBI
objectives:
- Learner can identify and produce correct Мова і мовлення forms
- Learner can analyze Українська мова серед мов світу in authentic texts
- Learner can produce written text demonstrating mastery of Мовознавство як наука
grammar:
- Branches of linguistics and metalinguistic terminology
- Compound numeral declension in all cases
- Language norm types and codification
phase: C1.3 [Movoznavstvo & Sociolinguistics]
persona:
  voice: Senior Specialist
  role: Мовознавець-теоретик
word_target: 4000
vocabulary_hints:
  required:
  - мовознавство (linguistics) — загальне мовознавство, порівняльне мовознавство; High frequency academic term
  - лінгвістика (linguistics) — прикладна лінгвістика, корпусна лінгвістика; International synonym for мовознавство
  - мовна норма (language norm) — порушення мовної норми, дотримання мовної норми; Essential for normative grammar
  - кодифікація (codification) — кодифікація норми, кодифікована мова; Academic term for norm fixation
  - мовлення (speech/parole) — усне мовлення, писемне мовлення, культура мовлення; Contrasts with мова (langue)
  recommended:
  - синхронія (synchrony) — synchronic study of language at one time point
  - діахронія (diachrony) — diachronic study of language change over time
  - типологія (typology) — мовна типологія, classification of languages by structure
  - правопис (orthography) — Український правопис 2019, normative spelling reference
