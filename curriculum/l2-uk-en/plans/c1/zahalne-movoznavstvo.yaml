module: c1-035
level: C1
sequence: 35
slug: zahalne-movoznavstvo
version: '1.1'
title: "Загальне мовознавство: Теорія, історія та філософія мови"
subtitle: "Загальне мовознавство"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Розуміти мову як складну знакову систему та об'єкт наукового дослідження."
  - "Ознайомитися з основними лінгвістичними школами та історією українського мовознавства."
  - "Аналізувати взаємозв'язок мови, мислення та культури (гіпотеза Сепіра-Ворфа)."
  - "Вивчати праці видатних українських лінгвістів: Олександра Потебні, Юрія Шевельова,
    Агатангела Кримського."

reading_situations:
  - source_type: "науковий уривок"
    topic: "Концепція внутрішньої форми слова в працях Олександра Потебні."
    key_elements: ["етнопсихологія", "аперцепція", "словоформа"]
    motivation: "Глибоке занурення в класичну українську лінгвофілософію."
  - source_type: "наукова стаття"
    topic: "Юрій Шевельов та його внесок у дослідження історичного фонології української
      мови."
    key_elements: ["діалектологія", "мовна еволюція", "політогенез"]
    motivation: "Розуміння деколонізаційного підходу до історії української мови."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ сучасного мовознавця про роль мови у формуванні національної
      ідентичності та державну мовну політику."
    focus_points: ["мовний закон", "мовний код", "престиж мови"]
    motivation: "Аналіз соціолінгвістичних аспектів функціонування мови."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте вислів 'Мова — це дім буття' (М. Гайдеґґер) крізь призму
      боротьби за українську мову. Як мова структурує наш світ?"
    requirements: ["мінімум 300 слів", "використання філософської термінології", "інтертекстуальність"]
    motivation: "Розвиток навичок високої академічної рефлексії та гуманітарного письма."
    model_answer: "Текст має містити роздуми про онтологічне значення мови, її роль
      як захисного механізму культури та інструменту пізнання. Використання понять
      'концептосфера', 'мовна картина світу', 'дискурс'."

discussion_topics:
  - context: "Універсалії vs Унікальність: чи всі мови світу мають однакову глибинну
      структуру?"
    questions:
      - "Чи існують думки, які неможливо висловити певною мовою?"
      - "Як зникнення мов впливає на інтелектуальну різноманітність людства?"
      - "Яка роль української мови у формуванні європейського лінгвістичного простору?"
    motivation: "Розвиток навичок теоретичного абстрагування та філософської дискусії."

content_outline:
  - section: "Мовознавство як система наук"
    words: 1000
    subsections:
      - "Предмет і завдання загального мовознавства: рівні мовної структури"
      - "Взаємодія лінгвістики з іншими науками: психологією, соціологією, ІТ"
      - "Методи лінгвістичних досліджень: від описового до порівняльно-історичного"
    key_concepts:
      - "парадигма"
      - "структуралізм"
      - "семантика"
  - section: "Мова як знакова система та когнітивний інструмент"
    words: 1000
    subsections:
      - "Природа мовного знака: довільність та мотивованість"
      - "Мова і мислення: як граматичні категорії впливають на сприйняття часу та
        простору"
      - "Комунікативна функція мови та типи речевих актів"
    key_concepts:
      - "семіотика"
      - "когнітивістика"
      - "прагматика"
  - section: "Українська лінгвістична думка в іменах"
    words: 1000
    subsections:
      - "Олександр Потебня: мова, міф та поетичне мислення"
      - "Агатангел Кримський: орієнталістика та порівняльне мовознавство"
      - "Сучасні школи української лінгвістики: від граматики до дискурсології"
    key_concepts:
      - "лінгвокультурологія"
      - "етимологія"
      - "герменевтика"
  - section: "Соціолінгвістика та мовна політика"
    words: 1000
    subsections:
      - "Мовна ситуація в Україні: білінгвізм, диглосія, мовна стійкість"
      - "Мовна політика як інструмент націєтворення та безпеки"
      - "Екологія мови: захист від кальок, суржику та запозичень"
    key_concepts:
      - "ідентичність"
      - "нормативність"
      - "пуризм"

vocabulary:
  required:
    - система
    - дискурс
    - концепт
    - категорія
    - ідентичність
    - еволюція
    - парадигма
    - семантика
  recommended:
    - когнітивний
    - прагматичний
    - герменевтика
    - онтологія
    - універсалія

activity_hints:
  - type: critical-analysis
    description: "Analyze Potebnia's concept of 'inner form of the word' — evaluate
      philosophical terminology and argumentation in Ukrainian linguistic tradition."
  - type: match-up
    description: "Match linguistic schools and scholars (структуралізм, когнітивістика,
      Потебня, Шевельов) with their key concepts and contributions."
  - type: select
    description: "Identify the correct sociolinguistic phenomenon (білінгвізм, диглосія,
      мовна стійкість) described in different Ukrainian language situations."
  - type: error-correction
    description: "Fix terminological imprecision in a linguistics essay — ensure correct
      usage of terms like семіотика, прагматика, когнітивістика."
  - type: essay-response
    description: "Write an essay (300+ words) on 'Language as the house of being'
      through the lens of the Ukrainian language struggle."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - select
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §1-5 — Загальне мовознавство, мова і суспільство"
  - "Авраменко, 11 клас (2019): Діалекти, суржик, мовна політика"
  - "State Standard 2024: C1 section on sociolinguistics"

