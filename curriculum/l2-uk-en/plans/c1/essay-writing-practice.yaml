module: c1-018
level: C1
sequence: 18
slug: essay-writing-practice
version: '2.0'
title: Практикум — Написання есе
subtitle: Introduction — Skills Integration
content_outline:
- section: Вступ — Інтеграція навичок (Introduction — Skills Integration)
  words: 500
  points:
  - Ретроспективний огляд академічного письма M01-M17 як фундаменту для написання есе на рівні C1
  - 'Відповідність Державному стандарту (§4.4.5): розвиток уміння створювати цілісний текст за планом у публіцистичному та
    науковому стилях'
  - Огляд чек-листа есеїста та рубрик оцінювання з акцентом на риторичні елементи (§4.4.6)
- section: Традиції та планування (Tradition and Planning)
  words: 800
  points:
  - 'Культурний контекст: українська традиція памфлету (Микола Хвильовий) та сучасна інтелектуальна есеїстика (Оксана Забужко,
    Юрій Андрухович)'
  - 'Порівняльний аналіз: англосаксонська лінійна структура проти традиційної української «спіральної» думки; адаптація до
    універсальних стандартів'
  - 'Етап планування: стратегії мозкового штурму та чітке структурування думок для логіки викладу'
- section: Побудова аргументації (Building Argumentation)
  words: 1000
  points:
  - 'Формулювання тези: перехід від робочого варіанту до остаточного захисту головної тези та використання антитез'
  - 'Логіка аргументації: наведення вагомих доказів та уникнення стилістичного міксу (використання розмовних «класно» чи «супер»
    в академічному тексті)'
  - 'Методика «розтину» тексту: деконструкція взірцевого есе для виявлення «скелета» аргументації та уникнення «лиття води»'
- section: Робота над текстом та когерентність (Drafting and Coherence)
  words: 800
  points:
  - 'Написання чернетки (чорнового варіанту): робота над змістовою зв''язністю та терміном «когерентність тексту»'
  - 'Learner error: виправлення калькування англійських конекторів — практика вживання «проте» та «однак» усередині речення
    замість постійного «However» на початку'
  - 'Інтеграція цитат і доказів: дотримання балансу між власною думкою та авторитетними джерелами'
- section: Редагування та практика (Editing and Practice)
  words: 900
  points:
  - 'Стилістичне та граматичне редагування: перевірка пунктуації, логічних переходів та точності формулювань'
  - 'Практичне завдання: написання повного академічного есе на задану тему з використанням поетапних інструкцій'
  - 'Рубрика самооцінки: аналіз власного тексту на відповідність стилістичним нормам та логічній послідовності'
vocabulary_hints:
  required:
  - чернетка (draft) — писати чернетку, чорновий варіант, робоча чернетка; ключовий термін академічного циклу
  - теза (thesis) — формулювати тезу, головна теза, захист тези, антитеза; основа аргументованого тексту
  - аргументація (argumentation) — переконлива аргументація, логіка аргументації, навести аргументи; вимога стандарту §4.4.6
  - когерентність (coherence) — когерентність тексту, змістова зв'язність; спеціалізований лінгвістичний термін
  - структурування (structuring) — чітке структурування, структурування думок, логіка викладу
  - редагування (editing) — стилістичне редагування, фінальна вичитка чернетки
  - планування (planning) — етап планування, стратегія викладу, складання плану
  - логічний перехід (logical transition) — гнучкі переходи, зв'язки між абзацами, використання конекторів
  - доказ (evidence) — вагомі докази, фактична база, підкріплення аргументів
  - рубрика (rubric) — рубрика самооцінки, критерії відповідності, шкала оцінювання
  - самооцінка (self-assessment) — інструменти самоконтролю, рефлексія над текстом
  recommended:
  - мозковий штурм (brainstorming) — генерація ідей, пошук креативних рішень
  - чек-лист (checklist) — фінальний чек-лист есеїста, перевірка за списком
  - критерій (criterion) — відповідність критеріям Державного стандарту, вимога до якості
  - відповідність (compliance) — стилістична відповідність нормам, дотримання регістру
  - деконструкція (deconstruction) — «розтин» тексту для аналізу його структури
