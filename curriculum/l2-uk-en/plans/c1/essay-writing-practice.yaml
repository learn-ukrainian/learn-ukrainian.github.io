module: c1-021
level: C1
sequence: 21
slug: essay-writing-practice
version: 1.1.1
title: 'Практикум: написання академічного есе'
subtitle: 'Практикум: написання академічного есе'
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
- Закріпити навички побудови логічної та переконливої аргументації.
- Навчитися інтегрувати цитати та парафрази в структуру власного есе.
- Опанувати методи саморедагування та перевірки тексту на відповідність академічним стандартам.
- Розвинути індивідуальний академічний стиль письма.
reading_situations:
- source_type: есе
  topic: 'Юрій Шевельов: ''Москва, Маросейка'' — зразок інтелектуального есеїзму.'
  key_elements:
  - теза
  - аргумент
  - історичний контекст
  - риторичне запитання
  motivation: Аналіз структури та мови класичного українського інтелектуального есе.
- source_type: наукова стаття
  topic: Методи аргументації в сучасних соціально-гуманітарних дослідженнях.
  key_elements:
  - логічна послідовність
  - доказова база
  - висновки
  motivation: Вивчення теоретичних засад побудови переконливого тексту.
listening_situations:
- media_type: інтерв'ю
  setting: Розмова з відомим українським публіцистом про культуру письма та відповідальність автора.
  focus_points:
  - етапи роботи над текстом
  - пошук власного стилю
  - критерії якості есе
  motivation: Отримання практичних порад від майстра слова щодо написання есе.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть академічне есе (400-500 слів) на тему: ''Чи може цифрова гуманітаристика змінити наше розуміння історії
    України?''. Використайте щонайменше три аргументи та два спростування.'
  requirements:
  - чітка структура (вступ, основна частина, висновки)
  - використання академічної лексики
  - коректне цитування
  motivation: Комплексна перевірка навичок написання академічного тексту.
  model_answer: Есе повинно демонструвати володіння темою, логічну зв'язність, багатий словниковий запас та дотримання норм
    правопису.
content_outline:
- section: Архітектура академічного есе
  words: 1000
  subsections:
  - 'Формулювання сильної тези: від задуму до речення'
  - 'Структура абзацу: тематичне речення, розвиток думки, перехід'
  - 'Взаємозв''язок між частинами тексту: логічна когезія'
  key_concepts:
  - теза
  - аргумент
  - когезія
- section: Робота з джерелами та доказовою базою
  words: 1000
  subsections:
  - 'Інтеграція цитат: техніка ''сендвіча'''
  - Синтез власних думок та ідей інших авторів
  - Використання статистичних даних та прикладів для підкріплення тези
  key_concepts:
  - цитування
  - парафраз
  - емпіричні дані
- section: Стиль та голос автора
  words: 1000
  subsections:
  - Академічна дистанція проти особистої позиції
  - Вживання хеджування (обережності) в твердженнях
  - 'Вибір тональності: від об''єктивного аналізу до інтелектуальної провокації'
  key_concepts:
  - хеджування
  - тональність
  - авторський голос
- section: Редагування та вдосконалення тексту
  words: 1000
  subsections:
  - 'Методи самоконтролю: перевірка логіки та аргументації'
  - 'Робота над мовним оформленням: лексика, граматика, пунктуація'
  - Критерії оцінювання академічного есе в українських університетах
  key_concepts:
  - редагування
  - коректура
  - академічний стандарт
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
  - есеїстика
  - аргументація
  - теза
  - спростування
  - когерентність
  - послідовність
  - обґрунтований
  - підсумовувати
  recommended:
  - переконливий
  - релевантний
  - інноваційний
  - перспектива
  - інтелектуальний
activity_hints:
- type: reading
  focus: Прочитайте текст про архітектура академічного есе і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про робота з джерелами та доказовою базою, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Архітектура академічного есе». Обґрунтуйте свою позицію прикладами
    з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему архітектура академічного есе.
- type: comparative-study
  focus: 'Порівняйте різні підходи до архітектура академічного есе: Формулювання сильної тези: від задуму до речення. Визначте
    спільне та відмінне.'
activities:
  types_required:
  - essay-response
  - critical-analysis
  - error-correction
  - match-up
  - unjumble
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Авраменко, 11 клас (2019): Стилістична норма, с. 164'
- 'Ворон, 11 клас (2019): с. 218 — Науковий стиль'
- 'Глазова, 11 клас (2019): §45 — Синтаксичні одиниці в різних стилях'
connects_to:
