module: c1-081
level: C1
sequence: 81
slug: slang-youth
version: 1.1.2
title: Молодіжний сленг та соціолекти
subtitle: Молодіжний сленг і соціолекти
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
- Дослідити джерела формування та функції сучасного українського молодіжного 
  сленгу.
- Аналізувати вплив англіцизмів, геймінгу та соціальних мереж на лексичний склад
  мови молоді.
- Розуміти соціолінгвістичну роль сленгу як маркера приналежності до певної 
  групи (інсайдери vs аутсайдери).
- Диференціювати сленг, жаргон та арго в системі українських соціолектів.
reading_situations:
- source_type: журнальна стаття
  topic: 'Аналіз лексичних інновацій у сучасних українських блогах та онлайн-ЗМІ:
    як молодіжний сленг проникає в публіцистику.'
  key_elements:
  - неологізм
  - метафоризація
  - стилістична адаптація
  motivation: Вивчення механізмів проникнення сленгу в літературну мову.
- source_type: наукова стаття
  topic: Соціолінгвістичне дослідження мовних практик українських підлітків у 
    соціальних мережах.
  key_elements:
  - кодове перемикання
  - англіцизми
  - мовна ідентичність
  motivation: Розуміння наукового підходу до вивчення молодіжного мовлення.
listening_situations:
- media_type: подкаст
  setting: Двоє молодих контент-мейкерів обговорюють тренди в TikTok та YouTube 
    українською мовою.
  focus_points:
  - використання неологізмів
  - швидкість мовлення
  - емоційне забарвлення сленгізмів
  motivation: Розвиток навичок сприйняття надсучасного розмовного мовлення в 
    динамічному середовищі.
- media_type: інтерв'ю
  setting: Мовознавець відповідає на запитання про те, чи 'псує' сленг 
    українську мову.
  focus_points:
  - наукова аргументація
  - приклади запозичень
  - прогноз розвитку мови
  motivation: Аналіз академічного погляду на неформальні мовні процеси.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть статтю до молодіжного онлайн-журналу (250-300 слів) про 
    сучасний музичний фестиваль або арт-подію, використовуючи доречні сленгізми.
    Завдання — зробити текст привабливим для цільової аудиторії, але зрозумілим.
  requirements:
  - використання лексики з ІТ/геймінгу/соцмереж
  - динамічний стиль
  - креативність
  motivation: Відпрацювання навичок стилізації тексту під конкретну соціальну 
    групу.
  model_answer: Текст має демонструвати органічне вживання слів 'вайб', 'кринж',
    'засейвити', 'хайп' у відповідному контексті.
discussion_topics:
- context: 'Сленг як засіб боротьби за культурну ідентичність: формування українського
    сленгу замість колишнього домінування російськомовних жаргонів.'
  questions:
  - Чому молоді важливо мати власну, специфічну мову?
  - Як україномовний сленг впливає на популярність української мови серед 
    підлітків?
  - Чи варто включати найпоширеніші сленгізми до академічних словників?
  motivation: Дискусія про мову як інструмент соціального самоствердження та 
    національного відродження.
- context: 'Проблема ''батьків і дітей'' у мовному плані: чи повинні дорослі використовувати
    сленг, щоб бути ''на одній хвилі'' з молоддю?'
  questions:
  - Коли вживання сленгу дорослими виглядає доречним, а коли — смішним?
  - Чи є сленг перепоною для порозуміння між поколіннями?
  motivation: Аналіз прагматичних аспектів використання сленгу поза межами 
    цільової групи.
content_outline:
- section: Феноменологія сленгу в лінгвістиці
  words: 1000
  subsections:
  - Визначення сленгу та його місце в системі національної мови
  - 'Класифікація соціолектів: жаргон, арго, сленг'
  - 'Функції сленгу: емотивна, номінативна, езотерична (таємна)'
  key_concepts:
  - соціолект
  - субкультура
  - експресивна лексика
- section: Джерела та механізми творення українського сленгу
  words: 1000
  subsections:
  - Англіцизми та їх адаптація до української фонетики та граматики
  - Комп'ютерний та ігровий жаргон як база для загального сленгу
  - Метафоризація та переосмислення загальновживаних слів
  key_concepts:
  - транслітерація
  - деривація
  - семантичний зсув
- section: Сленг в епоху соціальних мереж та мемів
  words: 1000
  subsections:
  - Візуальний сленг та емодзі як невід'ємна частина мережевого дискурсу
  - Вплив мем-культури на формування стійких мовних зворотів
  - 'Проблема тривалості життя сленгізмів: від хайпу до забуття'
  key_concepts:
  - віральність
  - нетикет
  - мовна мода
- section: 'Сленг та літературна норма: конфлікт чи взаємодія?'
  words: 1000
  subsections:
  - Проникнення сленгу в сучасну українську літературу та кіно
  - Стилістичні функції сленгізмів у публіцистиці
  - Ставлення суспільства до 'засмічення' мови vs сприйняття її динамізму
  key_concepts:
  - суржик
  - стилізація
  - динамічна норма
- section: Підсумок — Summary
  words: 300
  points:
  - 'Ukrainian youth slang functions as a dynamic sociolect and identity marker, primarily
    driven by the adaptation of Anglicisms, gaming terminology, and semantic shifts.
    Self-check: What is the primary difference between сленг, жаргон, and арго? Name
    3 modern Ukrainian slang terms derived from internet culture and explain their
    meanings.'
  - 'Slang constantly interacts with the literary norm, penetrating contemporary literature
    and media while challenging traditional views on language purity. Self-check:
    How does meme culture affect the lifespan of a viral slang term? Give an example
    of how an English word adapts to Ukrainian phonetics and grammar to become slang.'
vocabulary:
  required:
  - соціолект
  - жаргон
  - арго
  - неологізм
  - запозичення
  - вайб
  - кринж
  - хайп
  recommended:
  - англіцизм
  - субкультура
  - контамінація
  - абревіація
  - мейнстрим
activity_hints:
- type: reading
  focus: Прочитайте текст про феноменологія сленгу в лінгвістиці і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про джерела та механізми 
    творення українського сленгу, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Феноменологія 
    сленгу в лінгвістиці». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    феноменологія сленгу в лінгвістиці.
- type: comparative-study
  focus: 'Порівняйте різні підходи до феноменологія сленгу в лінгвістиці: Визначення
    сленгу та його місце в системі національної мови. Визначте спільне та відмінне.'
activities:
  types_required:
  - critical-analysis
  - match-up
  - translate
  - select
  - essay-response
  min_items_per_type: 5
  total_min_items: 25
