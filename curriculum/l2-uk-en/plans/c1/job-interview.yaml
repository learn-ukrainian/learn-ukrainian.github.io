module: c1-022
level: C1
sequence: 22
slug: job-interview
version: '2.0'
title: 'Співбесіда: стратегії успіху'
content_outline:
- section: Вступ — Аналіз ринку та підготовка (Introduction — Market Analysis & Preparation)
  words: 500
  points:
  - Аналіз ринку праці (Державний стандарт §3.13) та вимог роботодавця до кваліфікації
    кандидата.
  - 'Дослідження компанії та підготовка портфоліо документів: правильне використання
    терміна «релевантний досвід».'
  - 'Психологічне налаштування на офіційно-діловий стиль спілкування: перехід від
    теорії до практики працевлаштування.'
- section: Етикет та культурні особливості комунікації (Etiquette & Cultural Communication)
  words: 850
  points:
  - 'Культурний гачок: Суворе дотримання звертання «Ви» в українській бізнес-культурі
    та етикет переходу на «ти».'
  - Дипломатичне реагування на питання про особисте життя (сімейний стан) — стратегії
    ввічливого окреслення професійних кордонів.
  - 'Невербальна комунікація: зоровий контакт та діловий дрес-код як складники першого
    враження (persona: Рекрутер).'
  - Використання безособових конструкцій («вимагається», «цінується», «очікується»)
    для опису робочих процесів.
- section: Ефективні відповіді та метод STAR (Effective Answers & STAR Method)
  words: 1100
  points:
  - 'Презентація сильних сторін та професійних компетенцій: розрізнення «м''яких»
    (soft skills) та «твердих» (hard skills) навичок.'
  - 'Метод STAR (Ситуація, Завдання, Дія, Результат) через призму українських реалій:
    волонтерство та проєктна робота.'
  - 'Обґрунтування мотивації: відповідь на питання «Чому ви хочете працювати в нашій
    компанії?» з використанням офіційного стилю.'
  - Аналіз складних запитань про причини звільнення та конфліктні ситуації на попередніх
    місцях роботи.
- section: Мовна коректність та подолання кальок (Linguistic Correctness & Anti-Calque)
  words: 700
  points:
  - 'Learner error: Виправлення кальки «подавати на роботу» — тренінг вживання «претендувати
    на посаду» та «відгукнутися на вакансію».'
  - 'Граматичний фокус: Керування дієслів «дякувати вам» (Давальний відмінок) та «вибачте
    мені» замість «вибачаюсь».'
  - 'Лексичний нюанс: Розрізнення «ринок праці» vs «ринок роботи» та контекстуальне
    вживання слів «робота» і «праця».'
  - 'Вживання термінології: «офіційне працевлаштування», «робота за контрактом», «випробувальний
    термін».'
- section: Переговори про умови та укладання угод (Negotiations & Agreement)
  words: 850
  points:
  - 'Мистецтво ведення переговорів про зарплату: використання фрази «претендувати
    на винагороду» та обговорення очікувань.'
  - Обговорення додаткових пільг, робочого графіка та умов контракту згідно з діловими
    стандартами.
  - 'Завершення співбесіди та follow-up: професійна подяка за приділений час та уточнення
    термінів зворотного зв''язку.'
  - 'Підсумок: Симуляція співбесіди (Практичне завдання) з оцінкою за критеріями офіційно-ділового
    стилю.'
vocabulary_hints:
  required:
  - співбесіда (job interview) — проходити співбесіду, запросити на співбесіду, етапи
    співбесіди
  - роботодавець (employer) — вимоги роботодавця, потенційний роботодавець
  - претендувати (to apply/claim) — претендувати на посаду/вакансію; correction for
    «подавати на роботу»
  - досвід (experience) — релевантний досвід, професійний досвід, досвід роботи
  - відгукнутися (to respond/apply) — відгукнутися на вакансію (to apply for an opening)
  - випробувальний термін (probation period) — призначити випробувальний термін, успішно
    пройти термін
  - зарплата (salary) — очікування щодо зарплати, переговори про зарплату, гідна оплата
    праці
  - посада (position) — вакантна посада, претендувати на керівну посаду
  - навичка (skill) — м'які навички (soft skills), тверді навички (hard skills), ключові
    навички
  - дякувати (to thank) — дякувати вам/тобі (requires Dative case); usage in closing
  recommended:
  - ринок праці (labor market) — тенденції на ринку праці, сучасний ринок праці
  - переговори (negotiations) — вести переговори, успішні переговори, ділові переговори
  - компетенція (competence) — професійні компетенції, сфера компетенцій
  - працевлаштування (employment) — офіційне працевлаштування, умови працевлаштування
  - стресостійкість (stress resistance) — виявляти стресостійкість, вимога щодо стресостійкості
  - самовдосконалення (self-improvement) — прагнення до самовдосконалення
