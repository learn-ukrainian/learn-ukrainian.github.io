module: c1-025
level: C1
sequence: 25
slug: job-interview
version: 1.1.1
title: 'Стратегії професійної комунікації: Співбесіда та самопрезентація'
subtitle: Співбесіда та самопрезентація
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
- Опанувати техніки вербальної та невербальної комунікації під час професійного інтерв'ю.
- Навчитися структурувати відповіді на складні та поведінкові запитання.
- Розвинути навички ведення переговорів про умови праці та винагороду.
- Аналізувати етичні аспекти та корпоративні очікування в українському контексті.
reading_situations:
- source_type: стаття-гайд
  topic: Аналіз сучасних технік інтерв'ювання в Україні (STAR, PAR, ціннісний підхід).
  key_elements:
  - ситуативний аналіз
  - професійна етика
  - саморефлексія
  motivation: Вивчення професійної лексики, необхідної для структурування досвіду.
- source_type: художній уривок
  topic: Опис випробувань героя при вступі на службу в історичному романі (напр., 'Чорна рада' Пантелеймона Куліша або сучасна
    історична проза).
  key_elements:
  - випробування гідності
  - риторична вправність
  - честь
  motivation: Порівняння історичних та сучасних концепцій професійної придатності та честі.
listening_situations:
- media_type: відео
  setting: Запис реальної співбесіди на позицію менеджера з комунікацій в інноваційний парк UNIT.City.
  focus_points:
  - аргументація
  - робота з запереченнями
  - тон голосу
  motivation: Аналіз живого мовлення та адаптивності кандидата.
writing_tasks:
- task_type: відгук
  prompt: Напишіть лист-подяку (Follow-up Email) після співбесіди, де ви резюмуєте свої сильні сторони та підкреслюєте зацікавленість
    у проекті.
  requirements:
  - мінімум 200 слів
  - використання ввічливих форм звертання
  - лаконічність
  motivation: Відпрацювання етикетних норм професійного листування.
  model_answer: 'Текст має бути структурованим: подяка за час, коротке нагадування про ключову компетенцію, що обговорювалася,
    та готовність до наступних етапів. Використання виразів ''вдячний за конструктивну бесіду'', ''спільне бачення розвитку''.'
discussion_topics:
- context: 'Етика запитань на співбесіді: баланс між професійним інтересом та приватним життям.'
  questions:
  - Які запитання роботодавця можна вважати неетичними в Україні?
  - Як коректно відмовити у відповіді на провокаційне запитання?
  - Чи має кандидат право ставити гострі запитання роботодавцю?
  motivation: Розвиток навичок захисту власних кордонів у професійній комунікації.
content_outline:
- section: Психолінгвістика успішного інтерв'ю
  words: 1000
  subsections:
  - 'Перше враження: лінгвістичні маркери впевненості'
  - Узгодженість вербальних та невербальних сигналів
  - Активне слухання як інструмент діалогу
  key_concepts:
  - емпатія
  - автентичність
  - інтонаційний малюнок
- section: 'Алгоритми відповідей: від кейсів до досягнень'
  words: 1000
  subsections:
  - 'Метод STAR: Ситуація, Завдання, Дія, Результат'
  - Мистецтво розповідати про невдачі як про досвід
  - 'Синтаксис результативності: акцент на дієсловах завершеної дії'
  key_concepts:
  - результатоорієнтованість
  - кризовий менеджмент
  - самоаналіз
- section: 'Діалог про умови: переговори та оффер'
  words: 1000
  subsections:
  - Обговорення фінансової винагороди та соціального пакета
  - 'Контрпропозиції: як торгуватися гідно'
  - Аналіз трудового договору (офферу) крізь призму законодавства
  key_concepts:
  - бенефіти
  - компенсація
  - дедлайн
- section: Дистанційні інтерв'ю та нові формати
  words: 1000
  subsections:
  - Технічний та візуальний етикет відеодзвінків (Zoom, Teams)
  - Особливості асинхронних інтерв'ю та відеовізиток
  - Виклики штучного інтелекту в процесі відбору кандидатів
  key_concepts:
  - віддалена робота
  - цифровий етикет
  - автоматизація
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
  - вакансія
  - кваліфікований
  - співбесіда
  - очікування
  - стратегія
  - пріоритети
  - конкуренція
  - корпоративний
  recommended:
  - репутація
  - гнучкість
  - інноваційність
  - конструктивний
  - лояльність
activity_hints:
- type: reading
  focus: Прочитайте текст про психолінгвістика успішного інтерв'ю і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про алгоритми відповідей: від кейсів до досягнень, використовуючи нову лексику
    модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Психолінгвістика успішного інтерв'ю». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему психолінгвістика успішного інтерв'ю.
- type: comparative-study
  focus: 'Порівняйте різні підходи до психолінгвістика успішного інтерв''ю: Перше враження: лінгвістичні маркери впевненості.
    Визначте спільне та відмінне.'
activities:
  types_required:
  - critical-analysis
  - error-correction
  - match-up
  - select
  - translate
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Глазова, 11 клас (2019): с. 172-173 — Діалогічні жанри'
- 'Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка'
- 'Заболотний, 11 клас (2019): с. 209 — Ділове листування'
connects_to:
  previous: cv-resume-writing
  next: business-etiquette
phase: C1.2 [Professional & Social Context]
