module: c1-008
level: C1
sequence: 8
slug: essay-structure
version: '1.1'
title: "Структура академічного есе та аргументація"
subtitle: "Структура академічного есе та аргументація"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Детально вивчити архітектоніку академічного есе: від вступу до висновків."
  - "Навчитися будувати логічну ієрархію аргументів для переконливого викладу думок."
  - "Опанувати засоби створення текстової когезії між абзацами та розділами."
  - "Розвинути вміння формулювати чіткі тези та підкріплювати їх доказами в українському
    культурному контексті."

reading_situations:
  - source_type: "зразкове академічне есе"
    topic: "Феномен шістдесятництва в Україні: боротьба за культурну суб'єктність."
    key_elements: ["структура абзацу", "тезисне речення", "логічні переходи"]
    motivation: "Аналіз класичної структури есе на прикладі актуальної теми з історії
      української культури."
  - source_type: "фрагмент філософського трактату"
    topic: "Діалогічність у творчості Лесі Українки."
    key_elements: ["аргументація", "контраргументація", "синтез думок"]
    motivation: "Вивчення способів побудови складної аргументації в літературознавчому
      есе."

listening_situations:
  - media_type: "подкаст"
    setting: "Подкаст про культуру академічного письма в українських ЗВО."
    focus_points: ["типові помилки у структурі есе", "важливість вступної частини",
      "функції висновків"]
    motivation: "Розвиток здатності критично оцінювати структуру почутого тексту та
      виокремлювати його ключові вузли."

writing_tasks:
  - task_type: "есе"
    prompt: "Складіть детальний план-проспект есе (100-150 слів) на тему: 'Трансформація
      українського міського простору: виклики деколонізації'. Визначте основну тезу
      та три ключові аргументи."
    requirements: ["логічна послідовність", "чіткість тези", "використання термінології
          аналізу"]
    motivation: "Підготовка до написання повноформатного есе через фокусування на
      його структурі."
    model_answer: "План має включати вступ з проблематизацією, основну частину з аргументами
      та висновки, що підтверджують початкову тезу."

content_outline:
  - section: "Вступна частина: Проблематизація та теза"
    words: 1000
    subsections:
      - "Функції вступу: контекстуалізація, актуалізація, фокусування"
      - "Мистецтво формулювання тези (thesis statement) українською мовою"
      - "Типи вступів: від історичної довідки до цитати-провокації"
    key_concepts:
      - "проблематизація"
      - "тезис"
      - "експозиція"
  - section: "Аргументація: Структура абзацу"
    words: 1000
    subsections:
      - "Модель абзацу: тематичне речення, розвиток думки, приклад, висновок"
      - "Типи аргументів: раціональні, ілюстративні, авторитетні"
      - "Способи поєднання доказів та аналізу всередині абзацу"
    key_concepts:
      - "тематичне речення"
      - "доказова база"
      - "мікровисновок"
  - section: "Зв'язність та переходи між частинами"
    words: 1000
    subsections:
      - "Лексичні засоби переходу: 'з одного боку', 'враховуючи вищесказане', 'на
        противагу цьому'"
      - "Логічна когерентність: збереження фокусу протягом усього тексту"
      - "Синтаксичні паралелізми як засіб посилення переконливості"
    key_concepts:
      - "когерентність"
      - "транзитивність"
      - "структурна єдність"
  - section: "Висновки: Синтез та перспективи"
    words: 1000
    subsections:
      - "Функція висновку: резюмування, відповідь на тезу, ширший контекст"
      - "Типові мовні кліше для завершення есе ('отже', 'таким чином', 'підсумовуючи')"
      - "Формулювання практичних рекомендацій або подальших напрямків дослідження"
    key_concepts:
      - "резюмування"
      - "синтез"
      - "прогностика"

vocabulary:
  required:
    - структура
    - аргумент
    - теза
    - вступ
    - висновок
    - доказ
    - обґрунтування
    - перехід
  recommended:
    - проблематика
    - релевантний
    - послідовність
    - цілісність
    - концептуальний

activity_hints:
  - type: critical-analysis
    description: "Analyze the structure of a model Ukrainian academic essay about
      Шістдесятництво — evaluate thesis, argument hierarchy, and transitions."
  - type: essay-response
    description: "Write a detailed essay outline (100-150 words) with thesis, three
      key arguments, and conclusion on a Ukrainian cultural topic."
  - type: essay-response
    description: "Complete transition sentences between essay paragraphs with appropriate
      cohesion devices."
  - type: comparative-study
    description: "Match essay components (вступ, теза, аргумент, висновок) with their
      functions and example sentences."
  - type: reading
    description: "Fill in missing structural elements and transition phrases in a
      partially written essay about urban decolonization."

activities:
  types_required:
    - critical-analysis
    - essay-response
    - fill-in
    - match-up
    - unjumble
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §45 — Синтаксичні одиниці в різних стилях"
  - "Авраменко, 11 клас (2019): с. 164 — Стилістична норма"
  - "Заболотний, 11 клас (2019): Стилістичні норми, мовленнєві жанри"

connects_to:
  previous: "citation-reference"
  next: "thesis-development"
phase: C1.1 [Academic Foundation]
