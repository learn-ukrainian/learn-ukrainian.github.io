title: Структура академічного есе
subtitle: 'Introduction: Architecture and Tradition'
content_outline:
- section: 'Вступ: Архітектура та традиція (Introduction: Architecture and Tradition)'
  words: 600
  points:
  - Значення структури для академічного письма рівня C1 та роль головного редактора
    в контролі логіки тексту.
  - 'Культурний контекст: Майстри української есеїстики — Оксана Забужко («Notre Dame
    d’Ukraine») та Юрій Андрухович як приклади інтелектуальної форми.'
  - 'Порівняльний аналіз традицій: Прямота англійської академічної традиції проти
    розлогої, але чітко структурованої української традиції на рівні C1.'
- section: Композиція та формулювання тези (Composition and Thesis Development)
  words: 700
  points:
  - 'Загальна тричастинна будова: Вступ, основна частина, висновки та вимоги Держстандарту
    §4.4.5 щодо створення тексту за планом.'
  - 'Мистецтво вступної частини: Привертання уваги (hook), контекст і точне формулювання
    тези (thesis statement).'
  - 'Диференціація понять: Чітке розмежування між головною ''тезою'' всього есе та
    ''тематичним реченням'' окремого абзацу.'
- section: Анатомія абзацу — Модель TEEL (Paragraph Anatomy — The TEEL Model)
  words: 1000
  points:
  - 'Детальний розбір моделі TEEL: Topic sentence (тематичне речення), Explanation
    (пояснення), Evidence (докази), Link (зв''язок).'
  - 'Корекція типової помилки 1: Слабке тематичне речення — перехід від викладу фактів
    до формулювання тверджень, які потребують доведення.'
  - 'Корекція типової помилки 2: Відсутність ''Link'' (зв''язку) — техніка повернення
    до головної тези в кінці кожного абзацу.'
  - 'Історичний зразок: ''Вісниківська'' есеїстика Євгена Маланюка («Книга спостережень»)
    як приклад гострої та бездоганно структурованої думки.'
- section: Логіка та засоби зв’язності (Logic and Cohesion Markers)
  words: 800
  points:
  - Забезпечення когерентності (логічної цілісності) та зв'язності (граматичного та
    лексичного поєднання) тексту.
  - 'Стилістичні засоби синтаксису за Держстандартом §4.4.4: Використання вставних
    слів ''по-перше'', ''по-друге'', ''по-третє'', ''отже''.'
  - 'Логічні переходи між абзацами: Забезпечення плавного руху думки та балансу аргументів
    у науковому дискурсі.'
- section: Академічний регістр та висновки (Academic Register and Conclusions)
  words: 900
  points:
  - 'Контроль регістру: Усунення неформальних виразів (я думаю, класно) та вживання
    академічних кліше (на моє переконання, вагомим є, варто зауважити).'
  - 'Синтаксис висновків: Підсумок основних тез, перерахування ширших імплікацій (соціальних,
    наукових) та створення сильного заключного речення.'
  - Використання елементів риторики (Держстандарт §4.4.6) у композиції заключної частини
    для посилення впливу на читача.
vocabulary_hints:
  required:
  - теза (thesis) — формулювати тезу, підтверджувати тезу, ключова теза; висока частотність
  - аргумент (argument) — наводити вагомий аргумент, спростовувати аргумент; ключова
    одиниця логіки
  - когерентність (coherence) — логічна когерентність тексту; термін для опису смислової
    цілісності
  - зв'язність (cohesion) — лексична та граматична зв'язність; стосується формальних
    засобів поєднання
  - імплікація (implication) — ширші імплікації, мати соціальні імплікації; для розділу
    висновків
  - абзац (paragraph) — структурувати на абзаци, тематичне речення абзацу; одиниця
    композиції
  - вступ (introduction) — архітектура вступу, контекст та передумови
  - доказ (evidence) — наводити переконливі докази; елемент 'E' у моделі TEEL
  - перехід (transition) — логічний перехід, забезпечувати плавність викладу
  - резюмувати (to summarize) — підбивати підсумки, резюмуючи вищесказане
  recommended:
  - гіпотеза (hypothesis) — висувати гіпотезу, перевірка гіпотези
  - постановка проблеми (problem statement) — чітка постановка проблеми у вступі
  - структурування (structuring) — логічне структурування думок
  - на моє переконання (in my conviction) — академічний замінник неформального 'я
    думаю'
  - вагомим є (it is significant) — конструкція для введення аргументів
  - по-перше, по-друге, отже (firstly, secondly, therefore) — структурні маркери згідно
    з Держстандартом
