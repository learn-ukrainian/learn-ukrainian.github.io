module: c1-040
level: C1
sequence: 40
slug: professional-scenarios
version: '2.0'
title: Професійні сценарії
subtitle: Introduction
content_outline:
- section: Вступ (Introduction)
  words: 300
  points:
  - Огляд інтеграції професійних навичок за результатами модулів M21-M31 та цілі фінального практикуму.
  - Визначення особливостей офіційно-ділового та епістолярного стилів згідно зі стандартом §4.4.1.1 для професійного контексту.
- section: Сценарій 1 — Працевлаштування (Employment Scenario)
  words: 900
  points:
  - 'Створення резюме та супровідного листа: розбір структури та виправлення кальки «аплікуватися» на нормативне «подаватися
    на вакансію».'
  - 'Симуляція етапів співбесіди: відпрацювання професійних навичок (soft skills) та стратегій самопрезентації.'
  - 'Словотвір назв осіб та посад: використання суфікса -лог (технолог, менеджер-аналітик) згідно з §4.2.2 Державного стандарту.'
  - 'Дриль на розрізнення прикметників: вживання «робочий день / графік» проти застарілого або помилкового «робітничий» у
    професійному контексті.'
- section: Сценарій 2 — Ділова комунікація та етикет (Business Communication and Etiquette)
  words: 900
  points:
  - 'Форми звертання в українському бізнес-середовищі: баланс між традиційним використанням імені по батькові та сучасним
    форматом «Ви + Ім''я».'
  - 'Етикет ділових нарад: підготовка порядку денного та ведення протоколу зустрічі з використанням кліше офіційного стилю.'
  - 'Культура прямоти та щирості: особливості надання зворотного зв''язку та критики в українській корпоративній культурі.'
  - 'Мовний дриль: керування дієслова «телефонувати клієнту» (давальний відмінок) замість помилкового «дзвонити до клієнта».'
- section: Сценарій 3 — Документація та листування (Documentation and Correspondence)
  words: 800
  points:
  - 'Утворення процесуальних іменників: використання суфікса -ння для опису процесів (планування, впровадження, керування)
    за §4.2.4 стандарту.'
  - 'Складання ланцюжка електронних листів: від офіційного запиту до вирішення конфліктних ситуацій у листуванні.'
  - 'Виправлення синтаксичних помилок у діловій мові: заміна конструкції «говорити за проект» на нормативну «говорити про
    проект».'
- section: Сценарій 4 — Публічний виступ та презентація (Public Speaking and Presentation)
  words: 800
  points:
  - 'Підготовка аналітичного звіту та доповіді: структурування аргументації та візуалізація даних для аудиторії.'
  - 'Абстрактні поняття у професійній мові: активне вживання іменників із суфіксом -ість (відповідальність, компетентність)
    згідно з §4.2.7 стандарту.'
  - 'Відповіді на запитання аудиторії: стратегії конструктивної відповіді та підтримання офіційної дистанції.'
- section: Підсумок та самооцінка (Summary and Self-Assessment)
  words: 300
  points:
  - Аналіз сильних сторін та визначення зон для покращення на основі критеріїв офіційно-ділової компетентності.
  - Розробка плану подальшого впровадження (implementation) здобутих навичок у реальну професійну діяльність.
vocabulary_hints:
  required:
  - резюме (resume) — надсилати резюме, оновлене резюме; висока частотність у бізнес-контексті
  - співбесіда (interview) — проходити співбесіду, запросити на співбесіду; етапи співбесіди
  - переговори (negotiations) — вести переговори, успішні переговори; іменник вживається лише у множині
  - навичка (skill) — професійні навички, м'які навички; ключове поняття для компетентнісного підходу
  - відповідальність (responsibility) — брати на себе відповідальність, зона відповідальності; суфікс -ість
  - впровадження (implementation) — план впровадження, стратегія впровадження; суфікс -ння
  - офіційно-діловий стиль (official-business style) — норми стилю, епістолярний жанр; стандарт §4.4.1.1
  recommended:
  - подаватися на вакансію (to apply for a job) — замість кальки «аплікуватися»
  - телефонувати клієнту (to call a client) — дриль на давальний відмінок без прийменника
  - робочий день (working day) — відрізняти від «робітничий» (клас, рух)
  - компетентність (competence) — професійна компетентність; абстрактний іменник
  - керування (management/governing) — керування проектами; віддієслівний іменник на -ння
  - супровідний лист (cover letter) — обов'язковий додаток до резюме
