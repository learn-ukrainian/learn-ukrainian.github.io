module: c1-049
level: C1
sequence: 49
slug: professional-scenarios
version: '1.1'
title: "Професійні сценарії: Мистецтво високої комунікації в бізнесі та медіа"
subtitle: "Професійні сценарії"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати стратегії переконливої аргументації та контраргументації в ділових
    перемовинах."
  - "Розвинути навички публічного виступу з використанням складних риторичних фігур
    та методів утримання уваги."
  - "Навчитися керувати комунікацією в кризових ситуаціях, зокрема під час інтерв'ю
    та прес-конференцій."
  - "Засвоїти тонкощі дипломатичного етикету та особливості міжкультурної ділової
    взаємодії."

reading_situations:
  - source_type: "кейс-стаді"
    topic: "Аналіз успішної PR-кампанії українського бренду на міжнародному ринку:
      мовні стратегії позиціонування."
    key_elements: ["брендинг", "меседж", "цільова аудиторія"]
    motivation: "Розуміння прагматики ділового тексту."
  - source_type: "дипломатична нота"
    topic: "Структура та мовні особливості офіційної дипломатичної кореспонденції."
    key_elements: ["протокол", "ввічливість", "дипломатичний обтічний вислів"]
    motivation: "Вивчення найвищого рівня офіційно-ділового стилю."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Політичне ток-шоу: аналіз того, як гості відповідають на 'гострі' запитання,
      використовують техніки ухилення та перехоплення ініціативи."
    focus_points: ["риторичні маніпуляції", "логічні пастки", "невербальна комунікація"]
    motivation: "Розвиток критичного сприйняття публічного дискурсу."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть аналітичну записку щодо стратегії виходу компанії на новий ринок
      в умовах високої конкуренції. Обґрунтуйте вибір комунікаційних каналів та мовних
      засобів."
    requirements: ["мінімум 350 слів", "використання професійної лексики (маркетинг,
          менеджмент)", "чітка аргументація за моделлю Тулміна"]
    motivation: "Відпрацювання навичок стратегічного планування та ділового письма."
    model_answer: "Текст має містити SWOT-аналіз (українською), опис ключових повідомлень
      та прогнозовані результати. Важливо дотримуватися стриманого, але переконливого
      тону."

discussion_topics:
  - context: "Етика в бізнес-комунікації: де межа між переконанням та маніпуляцією?"
    questions:
      - "Чи припустиме використання емоційного тиску в перемовинах?"
      - "Як змінюється ділова етика в умовах віддаленої роботи та відеодзвінків?"
      - "Яка роль корпоративної культури у формуванні мовного обличчя компанії?"
    motivation: "Розвиток навичок етичного аналізу та професійної дискусії."

content_outline:
  - section: "Психологія та лінгвістика перемовин"
    words: 1000
    subsections:
      - "Стратегії перемовин: 'Win-Win', жорсткий стиль, компроміс"
      - "Мовні засоби переконання: аргументація до факту, до авторитету, до емоції"
      - "Техніки активного слухання та перефразування в професійному діалозі"
    key_concepts:
      - "аргументація"
      - "контраргумент"
      - "верифікація"
  - section: "Публічний виступ та ораторське мистецтво"
    words: 1000
    subsections:
      - "Структура промови: вступ (гачок), основна частина (теза), фінал (заклик)"
      - "Риторичні фігури: антитеза, градація, риторичне питання, метафора"
      - "Робота зі складними запитаннями та запереченнями аудиторії"
    key_concepts:
      - "риторика"
      - "оратор"
      - "елокуція"
  - section: "Кризові комунікації та медіа-менеджмент"
    words: 1000
    subsections:
      - "Алгоритм дій під час репутаційної кризи: швидкість, чесність, єдина позиція"
      - "Підготовка до прес-конференції: розробка Q&A (питання та відповіді)"
      - "Специфіка спілкування з журналістами: 'off the record', коментар, спростування"
    key_concepts:
      - "репутація"
      - "прес-реліз"
      - "спростування"
  - section: "Дипломатія та крос-культурна взаємодія"
    words: 1000
    subsections:
      - "Основи дипломатичного протоколу: звертання, черговість, подарунки"
      - "Мовні бар'єри та культурні фільтри в міжнародному бізнесі"
      - "Українська мова в міжнародних організаціях: статус та перспективи"
    key_concepts:
      - "протокол"
      - "етикет"
      - "інклюзивність"

vocabulary:
  required:
    - аргументація
    - репутація
    - перемовини
    - стратегія
    - протокол
    - риторика
    - криза
    - маніпуляція
  recommended:
    - контраргумент
    - прецедент
    - верифікація
    - елокуція
    - консенсус

activity_hints:
  - type: reading
    focus: "Прочитайте текст про психологія та лінгвістика перемовин і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про публічний виступ та ораторське мистецтво, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Психологія та лінгвістика перемовин». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему психологія та лінгвістика перемовин."
  - type: comparative-study
    focus: "Порівняйте різні підходи до психологія та лінгвістика перемовин: Стратегії перемовин: 'Win-Win', жорсткий стиль, компроміс. Визначте спільне та відмінне."

activities:
  types_required:
    - critical-analysis
    - select
    - match-up
    - error-correction
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §40-42 — Стилістичне забарвлення лексики, ділове мовлення"
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка, ділові перемовини"
  - "Караман, 10 клас (2018): §53-55 — Офіційно-діловий стиль, мовний етикет"

