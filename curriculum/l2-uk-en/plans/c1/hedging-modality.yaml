module: c1-006
level: C1
sequence: 6
slug: hedging-modality
version: '1.2'
title: "Хеджування, модальність та умовний спосіб у науковому мовленні"
subtitle: "Модальність та умовні конструкції в академічному дискурсі"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати стратегії хеджування для коректного вираження ступеня впевненості у
    наукових твердженнях."
  - "Навчитися використовувати модальні дієслова, прислівники та вставні конструкції
    для пом'якшення категоричності."
  - "Розвинути вміння розрізняти епістемічну та деонтичну модальність у професійному
    дискурсі."
  - "Проаналізувати роль модальності в українській науковій етиці та культурі дискусії."
  - "Опанувати умовний спосіб (якби...то б) для вираження контрфактичних та гіпотетичних
    тверджень в академічному дискурсі."
  - "Розрізняти реальну умову (якщо...то) та ірреальну (якби...то б) у науковій аргументації
    та літературному аналізі."

reading_situations:
  - source_type: "фрагмент наукової дискусії"
    topic: "Спірні питання походження праслов'янської мови: гіпотези та заперечення."
    key_elements: ["модальні прислівники", "гіпотетичні конструкції", "формули хеджування"]
    motivation: "Аналіз того, як науковці використовують модальність для уникнення
      надмірної категоричності при обговоренні недоведених фактів."
  - source_type: "рецензія на монографію"
    topic: "Оцінка нового дослідження з етнопсихології українців."
    key_elements: ["ввічливе незгоди", "припущення", "дискурсивні маркери сумніву"]
    motivation: "Вивчення етикетних аспектів наукової критики через засоби модальності."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Інтерв'ю з провідним українським вірусологом про перспективи подолання
      нових пандемій."
    focus_points: ["вираження ймовірності", "наукова обережність у прогнозах", "використання
          дієслів 'здаватися', 'вважати'"]
    motivation: "Розпізнавання стратегій хеджування у спонтанному науковому мовленні."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть критичний відгук (200-250 слів) на статтю (реальну або вигадану),
      використовуючи стратегії хеджування. Уникайте прямої критики, натомість висловлюйте
      сумніви та пропонуйте альтернативні інтерпретації."
    requirements: ["використання модальних дієслів", "вживання вставних конструкцій",
      "науковий етикет"]
    motivation: "Відпрацювання навичок 'м'якої' аргументації та професійної етики."
    model_answer: "Текст повинен містити такі конструкції, як 'можна припустити',
      'на нашу думку', 'видається доцільним', 'імовірно'."

content_outline:
  - section: "Поняття хеджування в академічному дискурсі"
    words: 1000
    subsections:
      - "Функції хеджування: уникнення ризику, точність, повага до опонента"
      - "Мовні засоби хеджування: від прислівників до складних синтаксичних структур"
      - "Культурна специфіка українського наукового хеджування"
    key_concepts:
      - "хеджування"
      - "мітигація"
      - "наукова обережність"
  - section: "Граматичні засоби модальності та умовний спосіб"
    words: 1000
    subsections:
      - "Модальні дієслова та їх роль у формулюванні гіпотез (могти, мусити, мати)"
      - "Безособові предикативи як засіб дистанціювання (видається, вбачається, вважається)"
      - "Умовний спосіб в академічному дискурсі: контрфактичні твердження (якби дослідження
        підтвердило...то б можна було стверджувати)"
      - "Реальна умова (якщо...то) vs ірреальна (якби...то б): стилістична різниця
        в науковому тексті"
      - "Гіпотетичні конструкції в літературному аналізі (якби автор обрав інший прийом...)"
    key_concepts:
      - "епістемічна модальність"
      - "умовний спосіб"
      - "контрфактичність"
      - "ірреаліс"
  - section: "Лексичні маркери ступеня впевненості"
    words: 1000
    subsections:
      - "Прислівники ймовірності: мабуть, очевидно, вірогідно, можливо"
      - "Дієслова ментальної діяльності: припускати, вважати, схилятися до думки"
      - "Прикметники зі значенням сумніву або впевненості (сумнівний, безперечний,
        імовірний)"
    key_concepts:
      - "адвербіальна модальність"
      - "ступінь достовірності"
      - "вербалізація сумніву"
  - section: "Стратегії ввічливої незгоди та дискусії"
    words: 1000
    subsections:
      - "Формули часткової згоди: 'певною мірою можна погодитися, але...'"
      - "Засоби пом'якшення критики у рецензіях та відгуках"
      - "Роль авторського 'ми' у розподілі відповідальності за твердження"
    key_concepts:
      - "академічний етикет"
      - "авторське 'ми'"
      - "коректність"

vocabulary:
  required:
    - імовірно
    - припускати
    - очевидно
    - видаватися
    - певною мірою
    - здебільшого
    - практично
    - загалом
  recommended:
    - вірогідно
    - схилятися
    - припустимо
    - суперечливий
    - безсумнівно

activity_hints:
  - type: critical-analysis
    description: "Analyze hedging strategies in a Ukrainian scientific debate about
      Proto-Slavic origins — identify epistemic modality markers."
  - type: error-correction
    description: "Transform overly categorical academic statements into appropriately
      hedged formulations using modal verbs and adverbs."
  - type: select
    description: "Choose the most appropriate hedging expression for different levels
      of certainty in scientific claims."
  - type: essay-response
    description: "Write a critical review (200-250 words) using hedging strategies
      — express doubt and alternative interpretations without direct criticism."
  - type: essay-response
    description: "Complete scientific sentences with appropriate modal markers of
      probability (імовірно, видається, можна припустити)."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - select
    - essay-response
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §1-10 — Культура мовлення"
  - "Авраменко, 11 клас (2019): Стилістична норма, с. 164"
  - "Ворон, 11 клас (2019): с. 207 — Наукова доповідь"

