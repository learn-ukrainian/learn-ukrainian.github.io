title: Козацькі легенди
subtitle: Cossack Legends and Myths
content_outline:
- section: 'Вступ: Козаки в народній уяві (Introduction: Cossacks in Folk Imagination)'
  words: 600
  points:
  - Аналіз козацтва як історичного феномену та центрального міфологічного пласта національної ідентичності.
  - Розмежування понять «міф» (сакральна розповідь про світоустрій) та «легенда» (оповідь про героїв з елементами фантастики)
    для усунення помилок у вживанні.
  - 'Морфологічний акцент на слові «Січ»: виправлення помилок у визначенні роду (іменник жіночого роду III відміни, як «ніч»).'
  - Роль легенд у збереженні «народної правди» порівняно з академічною історією.
- section: Героїчні постаті та легендарні звитяги (Heroic Figures and Legendary Exploits)
  words: 1000
  points:
  - 'Дмитро «Байда» Вишневецький: аналіз пісні «В Царграді на риночку» та легенди про смерть на гаку (висміювання султана
    як прояв козацького духу).'
  - 'Іван Сірко (Урус-Шайтан): легенда про народження із зубами та магічну силу правої руки, яка допомагала козакам перемагати
    протягом 7 років після смерті отамана.'
  - 'Поняття «побратимство»: козацька етика взаємодопомоги та сакральний статус вірного побратима у фольклорних текстах.'
  - 'Топонімічні міфи: походження назв Чигирин та Батурин через призму козацької слави.'
- section: Феномен характерництва та епічна стилістика (The Phenomenon of Kharakternytstvo and Epic Stylistics)
  words: 1000
  points:
  - 'Козак-характерник: дослідження надприродних здібностей (вміння «наводити ману», ловити кулі руками, перетворюватися на
    вовка-перевертня).'
  - 'Опанування епічного регістра мовлення: використання сталих епітетів (ясний сокіл, буйний вітер) та тавтологій (думу думати,
    кличе-закликає).'
  - 'Стилістичні засоби лексики: вживання згрубілих форм та аугментативів (шаблюка, ручище, козачище) для підсилення образу
    сили.'
  - 'Диференціація лексики: попередження помилок при вживанні високого стилю (звитяга, рать) у побутовому контексті.'
- section: Козак Мамай — сакральний архетип-оберіг (Cossack Mamay — Sacred Archetype-Talisman)
  words: 800
  points:
  - 'Семантичний розбір картини «Козак Мамай» як народного оберега: аналіз символіки кобзи (душа), коня (воля), дуба (сила
    роду) та списа (готовність до смерті).'
  - Топонімічні легенди про Хортицю, байраки та козацькі могили-кургани як місця пам’яті.
  - Практичне вживання слова «байрак» у поетичному та фольклорному контекстах (козацька могила в глибокому байраку).
- section: 'Аналіз та продукція: Козацький міф сьогодні (Analysis and Production: Cossack Myth Today)'
  words: 600
  points:
  - 'Дискусія: «Історична правда vs народна легенда» — порівняльний аналіз історичних фактів про Дмитра Вишневецького та його
    легендарного образу.'
  - 'Написання есе: функція козацьких архетипів у сучасній культурі (кіно, література, відеоігри).'
  - 'Вправи на закріплення епічної стилістики: переказ легенди про характерника з використанням метафор та аугментативів.'
focus: vocabulary
pedagogy: Immersion & Analysis
objectives:
- Learner can analyze Cossack mythological archetypes (e.g., kharakternyky)
- Learner can describe the role of Cossack myths in national identity construction
- Learner can use epic and heroic vocabulary in analytical contexts
grammar:
- Heroic narrative register
- Epic stylistics
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Характерник
word_target: 4000
vocabulary_hints:
  required:
  - характерник (sorcerer-cossack) — козак-характерник, надприродні здібності, наводити ману; фольклорний термін для воїна-мага
  - Січ (Sich) — Запорозька Січ, закони Січі, руйнування Січі; жіночий рід (ця Січ), відмінюється як «ніч»
  - отаман (ataman/chieftain) — кошовий отаман, батько-отаман, обирати отамана; історичний військовий чин
  - байрак (wooded ravine) — у глибокому байраку, за байраком; часто зустрічається в думах та поезії Шевченка
  - побратим (sworn brother) — вірний побратим, козацьке побратимство; високий культурний статус
  - перевертень (shapeshifter/werewolf) — вовкулака-перевертень, обернутися перевертнем; пов'язано з легендами про Івана Сірка
  recommended:
  - звитяга (valor/victory) — козацька звитяга; високий регістр, не використовувати в побуті
  - мана (illusion/spell) — наводити ману (to cast a spell/delusion); ключове для характерників
  - оберіг (talisman/amulet) — сакральна картина-оберіг; роль Козака Мамая в українській хаті
  - шаблюка (huge saber) — гостра шаблюка; аугментатив (згрубіла форма) для епічної стилістики
  - вус (mustache) — козацький вус, підкручувати вуса; важливий елемент козацького антропотипу
