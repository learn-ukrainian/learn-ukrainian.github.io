module: c1-101
level: C1
sequence: 101
slug: kozatski-lehendy
version: 1.1.2
title: 'Козацькі легенди: між історією та міфом'
subtitle: 'Козацькі легенди: між історією та міфом'
focus: history
pedagogy: seminar
word_target: 4000
objectives:
- Дослідити генезис та структуру козацьких легенд як важливої складової 
  національної пам'яті.
- Ознайомитися з постатями козаків-характерників та магічними здібностями, які 
  їм приписували.
- Проаналізувати історичне підґрунтя найвідоміших леґенд про заснування Січі та 
  героїчні походи.
- Вивчити лексику, пов'язану з військовим побутом, фортифікацією та фольклорною 
  епікою козацтва.
reading_situations:
- source_type: фольклористична розвідка
  topic: 'Феномен козака-характерника: історичні прототипи та міфологічні нашарування.'
  key_elements:
  - характерство
  - замовляння куль
  - гіпноз
  - левітація
  motivation: Аналіз складного тексту про паранормальні здібності козаків у 
    народних уявленнях.
- source_type: історичний документ
  topic: Уривок із літопису Григорія Граб'янки про козацьку звитягу та виховання
    воїнів.
  key_elements:
  - лицарство
  - честь
  - запорозькі вольності
  - курінь
  motivation: Вивчення стилістики козацьких літописів та архаїчної лексики.
listening_situations:
- media_type: відео
  setting: Науково-популярний фільм про підводні човни козаків та інші військові
    інновації через призму легенд.
  focus_points:
  - інженерна думка
  - стелс-технології минулого
  - спростування міфів
  motivation: Розвиток вміння критично оцінювати історичні гіпотези.
writing_tasks:
- task_type: есе
  prompt: Проаналізуйте роль козацького міфу у формуванні сучасної української 
    ідентичності. Чи допомагають легенди будувати націю сьогодні?
  requirements:
  - мінімум 300 слів
  - 'використання понять: національний міф, тяглість, героїзація'
  - наведення прикладів із літератури або кіно
  motivation: Вміння синтезувати історичні знання та сучасний соціокультурний 
    контекст.
  model_answer: Текст повинен розкривати козацтво як архетип свободи та 
    державотворення, пояснюючи, як легендарні образи надихають сучасних 
    захисників України.
content_outline:
- section: 'Лицарі степу: ідеологія та побут'
  words: 1000
  subsections:
  - Запорозька Січ як демократичне утворення та військовий орден
  - Козацький кодекс честі та виховання молодиків (джур)
  - 'Легендарні засновники та гетьмани: Байда-Вишневецький, Сагайдачний, Сірко'
  key_concepts:
  - козацтво
  - побратимство
  - демократія
- section: 'Характерники: магія козацького війська'
  words: 1000
  subsections:
  - 'Хто такі характерники: етимологія та народні повір''я'
  - 'Магічні вміння: навіювання ''мороку'', знання трав та зцілення ран'
  - 'Іван Сірко як найвідоміший характерник: факти та містифікації'
  key_concepts:
  - характерник
  - містика
  - замовляння
- section: Легендарна географія та скарби Січі
  words: 1000
  subsections:
  - Дніпрові пороги як сакральне місце козацької сили
  - Легенди про заховані козацькі скарби та прокляття золота
  - Образ Великого Лугу в народній поезії та історичній пам'яті
  key_concepts:
  - пороги
  - скарб
  - топоніміка
- section: Козацький міф у літературі та мистецтві
  words: 1000
  subsections:
  - 'Козацтво у творах Миколи Гоголя та Тараса Шевченка: героїчне vs трагічне'
  - Думи та історичні пісні як джерело козацьких легенд
  - Сучасна рефлексія козацтва в українському фентезі та коміксах
  key_concepts:
  - романтизація
  - епіка
  - спадкоємність
- section: Підсумок — Summary
  words: 300
  points:
  - 'Review key vocabulary of Cossack legends and mysticism: характерник, побратимство,
    містика. Self-check: What is the difference between a regular Cossack and a характерник?'
  - 'The geography of the Zaporozhian Sich (Дніпрові пороги, Великий Луг) is central
    to the Cossack myth. Self-check: Name 3 magical abilities attributed to legendary
    figures like Ivan Sirko, and describe their role in folklore or literature.'
