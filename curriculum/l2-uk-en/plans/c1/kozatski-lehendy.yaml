activity_hints:
- type: reading
  focus: 'Прочитайте текст про лицарі степу: ідеологія та побут і дайте відповіді
    на запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про характерники: магія козацького
    війська, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Лицарі степу: ідеологія
    та побут». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему лицарі
    степу: ідеологія та побут.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до лицарі степу: ідеологія та побут: Запорозька
    Січ як демократичне утворення та військовий орден. Визначте спільне та відмінне.'
