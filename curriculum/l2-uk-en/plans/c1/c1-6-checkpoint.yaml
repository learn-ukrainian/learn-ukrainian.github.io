title: 'C1.6 Контрольна точка: Літературний канон'
subtitle: 'C1.6 Checkpoint: Literary Canon'
content_outline:
- section: 'Вступ: Формування літературного канону (Introduction: Formation of the
    Literary Canon)'
  words: 500
  points:
  - 'Визначення поняття «літературний канон» та механізмів його формування в українському
    контексті (на основі термінів: формувати канон, увійти до канону)'
  - 'Огляд цілей контрольної точки: перевірка володіння художнім стилем та здатність
    до глибокої інтерпретації текстів згідно з вимогами стандарту §4.4.1.1'
  - 'Встановлення академічного тону модуля: перехід від побутової лексики до літературознавчого
    дискурсу'
- section: 'Історико-літературний контекст: Епохи та постаті (Historical-Literary
    Context: Epochs and Figures)'
  words: 900
  points:
  - Систематизація знань про романтизм, реалізм та модернізм; розбір маркерів стилю
    для уникнення плутанини (напр. розмежування Нечуя-Левицького та модерністів)
  - 'Культурний фокус: «Розстріляне відродження» (Хвильовий, Підмогильний, Куліш)
    як феномен перерваного модернізму 1920-30-х років'
  - 'Порівняння українського модернізму (Леся Українка, Коцюбинський) із європейським
    контекстом: неоромантизм та імпресіонізм'
- section: 'Стилістичний аналіз: Художній інструментарій (Stylistic Analysis: Artistic
    Toolkit)'
  words: 1000
  points:
  - 'Практичне застосування стилістичних засобів синтаксису (§4.4.4): еліпсис, повтор,
    риторичні запитання як засоби виразності'
  - 'Аналіз лексичних засобів (§4.4.3): епітети, метафори, алюзії; виправлення термінологічних
    неточностей (використання термінів «ліричний герой», «пафос», «мотив»)'
  - 'Версифікація та звукопис: визначення систем версифікації (силабо-тонічна) та
    їхнього впливу на емоційне сприйняття тексту'
- section: 'Практикум: Глибока інтерпретація тексту (Practicum: Deep Text Interpretation)'
  words: 900
  points:
  - 'Методика аналізу «як зроблено текст»: подолання помилки зведення аналізу до переказу
    сюжету; фокус на рефлексії ліричного героя'
  - 'Комплексний аналіз уривків знайомих творів через призму нових завдань: інтерпретація
    образності та наративної структури'
  - 'Тренінг з написання академічного есе: техніка порівняння двох авторів різних
    епох із використанням аргументації та цитування'
- section: 'Підсумок: Національний наратив у світовому вимірі (Summary: National Narrative
    in a Global Dimension)'
  words: 700
  points:
  - Дискусія про значення українського канону в глобальному літературному процесі
    та зміну національного наративу на зламі епох
  - 'Фінальний тест на атрибуцію текстів та володіння термінологією: відтворення чіткої
    хронології літературного процесу'
  - Рефлексія над роллю інтелектуальної спадщини для сучасної ідентичності (висновок
    від особи Голови екзаменаційної комісії)
