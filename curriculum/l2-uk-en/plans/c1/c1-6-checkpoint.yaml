vocabulary_hints:
  required:
  - 'літературний канон (literary canon) — сукупність текстів, що вважаються зразковими;
    collocations: формувати канон, увійти до канону'
  - Розстріляне відродження (Executed Renaissance) — культурно-мистецьке покоління
    1920-х — початку 1930-х років в УСРР; historical context
  - 'версифікація (versification) — система побудови вірша; collocations: силабо-тонічна
    версифікація'
  - 'національний наратив (national narrative) — спосіб викладу історії та культури
    народу; collocations: будувати наратив, зміна наративу'
  - ліричний герой (lyric hero) — образ, що виникає в уяві читача під враженням висловлених
    у творі почуттів; academic register
  recommended:
  - дискурс (discourse) — мовленнєве спілкування в певній інтелектуальній сфері; літературний
    дискурс
  - епоха (epoch) — великий період часу з характерними ознаками; зламі епох, дух епохи
  - рефлексувати (to reflect) — здійснювати процес самопізнання; ліричний герой рефлексує
  - пафос (pathos) — основний емоційний тон твору; academic terminology
  - алюзія (allusion) — відсилання до іншого твору або історичної події
