title: Театральне мистецтво I
subtitle: Theater Arts I — From Origins to Kurbas
content_outline:
- section: 'Вступ: Витоки та бароковий Вертеп (Introduction: Origins and Baroque Vertep)'
  words: 700
  points:
  - Еволюція українського театру від народних обрядових ігор до барокового явища вертепу — аналіз тяглості традицій.
  - 'Культурний гачок: Двоповерховий Всесвіт — розбір унікальної двоярусної будови вертепу, що відображала модель світу (Верхній
    поверх — ''небо'' для сакральних сюжетів, Нижній — ''земля'' для комедійних народних сценок).'
  - 'Лексична база: Використання термінології ''вертепна драма'' та ''ляльковий вертеп'' у контексті аналізу культурного дозвілля
    (§3.4 Державного стандарту).'
- section: 'Театр Корифеїв: Боротьба за професійну сцену (Theater of the Coryphaei: Struggle for the Professional Stage)'
  words: 900
  points:
  - 'Фундатори національного театру: Внесок Івана Котляревського, Марка Кропивницького та Марії Заньковецької у становлення
    професійної трупи.'
  - 'Культурний гачок: Тримовний примус — аналіз впливу Емського указу та цензури, що змушували акторів чергувати мови або
    ставити вистави трьома мовами за один вечір для легалізації української мови.'
  - 'Типова помилка студента: Розрізнення понять ''Вистава'' (дійство, яке ми дивимося) та ''П''єса'' (літературний текст,
    який ми читаємо) — вправи на контекстуальне вживання.'
- section: 'Лесь Курбас: Театральний авангард та ''Березіль'' (Les Kurbas: Theater Avant-Garde and Berezil)'
  words: 1100
  points:
  - 'Лесь Курбас як реформатор світового рівня: перехід від етнографічного реалізму до естетики театральної ''умовності''
    та експресіонізму.'
  - 'Культурний гачок: ''Куля в серці'' — біографічний факт про Леся Курбаса (спроба самогубства через Катерину Рубчакову)
    як метафора його трагічного та напруженого творчого шляху.'
  - 'Театр ''Березіль'' як філософська лабораторія: розбір концепції акторського ''перевтілення'' та побудови складної ''мізансцени''
    як інструментів інтелектуального впливу.'
- section: 'Практика: Мистецтвознавчий аналіз та корекція (Practice: Arts Criticism and Correction)'
  words: 700
  points:
  - 'Аналітична вправа: Описати структуру вертепу та персонажів, використовуючи професійну лексику (лаштунки, умовність, сюжет).'
  - 'Корекція лексичних кальок: Відмова від русизму ''спектакль'' на користь ''вистави'', а також виправлення кальки ''роль
    грає значення'' на правильне ''відіграє роль''.'
  - 'Дискусія про спадкоємність: Як Курбас переосмислював барокову естетику вертепу в авангардному контексті 1920-х років.'
- section: 'Підсумок: Розстріляне відродження та сучасна сцена (Summary: Executed Renaissance and the Modern Stage)'
  words: 600
  points:
  - 'Трагічний фінал: Обговорення розстрілу Леся Курбаса та знищення театру ''Березіль'' як акту репресій проти української
    еліти (Розстріляне відродження).'
  - 'Вплив спадщини на сучасне культурне дозвілля: Як досвід корифеїв та експерименти Курбаса формують обличчя сучасного українського
    театру.'
  - 'Фінальна рефлексія: Театр як простір боротьби за національну ідентичність та високе мистецтво.'
focus: fine-arts
pedagogy: CBI
objectives:
- Learner explores the origins of Ukrainian theater (Vertep, School Drama).
- Learner can describe the role of the Coryphaei Theater.
- Learner analyzes the revolutionary impact of Les Kurbas and Berezil.
grammar:
- Dramatic terminology
- Analysis of staging
phase: C1.7 [Fine Arts & High Culture]
persona:
  voice: Senior Specialist
  role: Театральний режисер
word_target: 4000
vocabulary_hints:
  required:
  - Вертеп (Vertep/Puppet theater) — ходити з вертепом, двоповерховий вертеп, вертепна драма; ключове барокове поняття.
  - Корифеї (Coryphaei/Pioneers) — театр корифеїв, плеяда корифеїв; фундатори професійного театру.
  - Вистава (Performance) — дивитися виставу, театральна вистава; вживається для опису дійства, часто плутається з 'п'єсою'.
  - Мізансцена (Mise-en-scène) — будувати мізансцену, продумана мізансцена; розташування акторів на сцені.
  - Умовність (Convention/Artificiality) — театральна умовність, сценічна умовність; відхід від побутового реалізму.
  required_grammar:
  - Відігравати роль (To play a role/matter) — вживається у значенні 'мати значення', на відміну від акторського 'грати роль'.
  recommended:
  - Лаштунки (Backstage) — за лаштунками, відкрити лаштунки; прихована частина сцени.
  - Перевтілення (Transformation) — мистецтво перевтілення, акторське перевтілення; здатність актора змінювати образ.
  - П'єса (Play/Script) — читати п'єсу, драматична п'єса; літературна основа для театру.
  - Культурне дозвілля (Cultural leisure) — організовувати дозвілля, змістовне дозвілля; термін з Державного стандарту.
  - Березіль (Berezil) — назва театру Курбаса; символ революційного експерименту.
