module: teatralne-mystetstvo-1
level: C1
sequence: 105
slug: teatralne-mystetstvo-1
version: '1.1'
title: "Театральне мистецтво І: Від вертепу до театру корифеїв"
subtitle: "Theater Art I: From Vertep to the Theater of Coryphaei"
focus: culture
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати витоки українського театрального мистецтва (обрядові ігри, вертеп, шкільна драма)."
  - "Дослідити роль І. Котляревського у становленні професійного національного театру."
  - "Вивчити феномен Театру корифеїв як першої професійної театральної трупи в Україні."
  - "Ознайомитися з творчістю видатних драматургів та акторів XIX століття (Карпенко-Карий, Кропивницький, Заньковецька)."

reading_situations:
  - source_type: "історико-мистецтвознавчий нарис"
    topic: "Український вертеп: архітектоніка лялькової вистави та символіка рівнів."
    key_elements: ["вертепна скриня", "інтермедія", "сакральне і профанне", "традиційні персонажі", "бароко"]
    motivation: "Вивчення народних витоків професійного театру."
  - source_type: "театральна рецензія (архівна)"
    topic: "Тріумф Марії Заньковецької в ролі Наталки Полтавки: психологізм та народна стихія."
    key_elements: ["сценічний образ", "амплуа", "перевтілення", "драматизм", "народна артистка"]
    motivation: "Аналіз акторської майстерності крізь призму тогочасної критики."

listening_situations:
  - media_type: "аудіовистава"
    setting: "Прослуховування фрагментів п'єси І. Карпенка-Карого 'Сто тисяч' або 'Хазяїн' з аналізом засобів творення комічного та сатиричного."
    focus_points: ["мовна характеристика героїв", "інтонація", "динаміка діалогу", "соціальна проблематика"]
    motivation: "Розвиток навичок аудіального аналізу драматичного тексту."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте значення Театру корифеїв для формування національної свідомості українців наприкінці XIX століття. Чому театр став головною трибуною нації в умовах заборон української мови?"
    requirements: ["мінімум 400 слів", "використання термінів: драматургія, режисура, меценатство, антреприза, етнографізм", "історичні факти (Емський указ)"]
    motivation: "Синтез історичних та мистецтвознавчих знань на високому рівні."
    model_answer: "Текст повинен висвітлювати діяльність родини Тобілевичів, М. Кропивницького та М. Старицького. Слід пояснити, як попри цензурні обмеження (заборона перекладів, вимога ставити російські п'єси в той же вечір), український театр зумів стати потужним інструментом культурного спротиву та професійної консолідації митців."

discussion_topics:
  - context: "Традиційний український театр XIX століття часто називають 'побутовим' або 'етнографічним'."
    questions:
      - "Чи є такий підхід обмеженням для розвитку театру, чи він був необхідним етапом становлення?"
      - "Як сучасні режисери переосмислюють класику Театру корифеїв: відхід від етнографізму чи його модернізація?"
    motivation: "Тренування навичок дискусії про еволюцію мистецьких канонів."

content_outline:
  - section: "Витоки: від обряду до барокової драми"
    words: 1000
    subsections:
      - "Народні ігри та обряди як першооснова театральності"
      - "Шкільна драма та інтермедії в Києво-Могилянській академії"
      - "Вертеп: ляльковий та живий план вистави"
    key_concepts: ["інтермедія", "мистецтво бароко", "вертеп", "шкільна драма"]
  - section: "Початок професійного театру: Доба Котляревського"
    words: 1000
    subsections:
      - "Полтавський вільний театр та роль І. Котляревського"
      - "'Наталка Полтавка' та 'Москаль-чарівник' як фундамент національного репертуару"
      - "Михайло Щепкін та розвиток акторської майстерності"
    key_concepts: ["професійний театр", "комедія", "водевіль", "народна мова"]
  - section: "Театр корифеїв: героїчна епоха"
    words: 1000
    subsections:
      - "Заснування трупи 1882 року: Кропивницький, Старицький, Тобілевичі"
      - "Драматургія І. Карпенка-Карого: від побутової драми до соціальної комедії"
      - "Марія Заньковецька — зірка української сцени"
    key_concepts: ["корифеї", "антреприза", "режисура", "драматургія"]
  - section: "Сценічне оформлення та музика"
    words: 1000
    subsections:
      - "Роль музики в українській виставі (співпраця з М. Лисенком)"
      - "Етнографічна точність декорацій та костюмів як засіб ідентифікації"
      - "Гастрольна діяльність та визнання українського театру за межами України"
    key_concepts: ["музична драма", "декорація", "костюм", "культурна ідентичність"]

