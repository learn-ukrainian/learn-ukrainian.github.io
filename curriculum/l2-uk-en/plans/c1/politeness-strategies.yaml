slug: politeness-strategies
version: '2.0'
title: 'Стратегії ввічливості: Прагматика спілкування'
subtitle: 'Politeness Strategies: Communication Pragmatics'
content_outline:
- section: 'Вступ: Мистецтво ввічливості та прагматика (Introduction: The Art of Politeness and Pragmatics)'
  words: 600
  points:
  - 'Теоретичне підґрунтя: Позитивне обличчя (прагнення схвалення) та негативне обличчя (потреба в автономії) в українському
    контексті'
  - 'Дотримання Державного стандарту C1: Огляд комунікативних намірів (Каталог А) — від подяки до публічного звернення та
    відмови'
  - 'Стилістичний діапазон: Як стратегії ввічливості змінюються залежно від регістру — від офіційно-ділового до розмовного
    (§4.4.1.1)'
- section: Стратегії позитивної ввічливості та культурні коди (Positive Politeness Strategies and Cultural Codes)
  words: 900
  points:
  - 'Культурний гачок: Використання пестливих форм (хвилинка, кавуся) як засіб пом''якшення прохань та створення теплої атмосфери
    навіть у напівофіційному спілкуванні'
  - 'Мистецтво компліменту та солідарності: Формули ''Ми з вами розуміємо...'' та ''Приємно зворушений вашою увагою'' для
    зближення позицій'
  - 'Ренесанс ''Пан/Пані'': Відродження європейської традиції звертання як інструменту відновлення гідності та поваги до особистості'
- section: 'Негативна ввічливість: Пом''якшення та автономія (Negative Politeness: Mitigation and Autonomy)'
  words: 900
  points:
  - 'Граматика ввічливості: Глибоке вивчення умовного способу (conditional mood) як основного інструменту хеджування та непрямих
    прохань'
  - 'Типова помилка: Аналіз та виправлення неграмотного ''я вибачаюся'' (reflexive error) на користь нормативних ''Вибачте
    мені'' або ''Прошу вибачення'''
  - 'Мінімізація втручання: Використання конструкцій ''На превеликий жаль...'', ''Вагаюся, чи варто...'' та ''Перепрошую за
    турботу'' для захисту автономії співрозмовника'
- section: 'Соціальна дистанція: Кличний відмінок та займенники (Social Distance: Vocative Case and Pronouns)'
  words: 800
  points:
  - 'Кличний відмінок (§4.1.2.7): Застосування повних форм кличного відмінка в усіх стилістичних регістрах — від літературного
    до риторичного'
  - 'Поріг ''Ти/Ви'': Соціолінгвістичний аналіз переходу на ''ти'' та етикет написання ''Ви'' з великої літери в офіційному
    та особистому листуванні'
  - 'Помилки порядку слів: Корекція калькованого розміщення ''будь ласка'' в кінці речення; відпрацювання природних позицій
    у спонукальних конструкціях'
- section: 'Практикум: Майстерність комунікативних намірів (Workshop: Mastery of Communicative Intentions)'
  words: 800
  points:
  - 'Трансформація дискурсу: Переписування прямих імперативів на делікатні непрямі мовленнєві акти з використанням модальних
    маркерів'
  - 'Прагматика відмови (FTA mitigation): Написання офіційної відмови та публічного звернення до доповідача без порушення
    комунікативної рівноваги'
  - 'Кроскультурний аналіз: Порівняння українських стратегій ввічливості з англійськими еквівалентами — пошук функціональних
    відповідників замість кальок'
focus: style
pedagogy: Sociolinguistics
objectives:
- Learner can apply complex politeness strategies in varied social contexts
- Learner can analyze cultural nuances of Ukrainian etiquette
- Learner can mitigate face-threatening acts using linguistic markers
grammar:
- Indirect speech acts
- Honorifics and address forms
- Modality of requests
- Euphemisms in social contexts
immersion: 100
phase: C1.5 [Stylistics & Rhetoric]
persona:
  voice: Senior Specialist
  role: Експерт з етикету
word_target: 4000
vocabulary_hints:
  required:
  - ввічливість (politeness) — виявляти ввічливість, надмірна ввічливість, правила ввічливості; основний концепт модуля
  - перепрошувати (to apologize/excuse) — я перепрошую (вживається перед перериванням чи вступом у розмову), перепрошую за
    турботу
  - вибачати (to forgive/excuse) — вибачте мені (Imperative), прошу вибачення (більш офіційна форма); уникати 'вибачаюся'
  - шановний (respected/dear) — шановний пане, шановна громадо, вельмишановний (високий стиль/архаїка)
  - зворушений (touched/moved) — приємно зворушений, зворушений вашою увагою; для позитивної ввічливості
  - на жаль (unfortunately) — на жаль, не можу; на превеликий жаль; для пом'якшення відмови (mitigation)
  - вагатися (to hesitate) — я вагаюся, чи варто; без вагань; маркер невпевненості як стратегія ввічливості
  recommended:
  - 'пане/пані (Mr/Ms) — кличний відмінок: пане директоре, пані професорко; відновлення європейської традиції'
  - будь ласка (please) — акцент на мобільності в реченні та уникненні фінальної позиції як кальки з англійської
  - 'умовний спосіб (conditional mood) — граматичний інструмент ввічливості: ''чи не могли б ви...'''
  - хвилинка (a minute/diminutive) — приклад димінутива як стратегії Positive Politeness для пом'якшення прохання
