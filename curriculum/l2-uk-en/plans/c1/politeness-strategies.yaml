module: c1-078
level: C1
sequence: 78
slug: politeness-strategies
version: '1.1'
title: "Стратегії ввічливості в українському дискурсі"
subtitle: "Стратегії ввічливості в українському дискурсі"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Розрізняти позитивну та негативну стратегії ввічливості в різних ситуаціях спілкування."
  - "Ефективно використовувати засоби мовленнєвого етикету для пом'якшення потенційно
    конфліктних актів."
  - "Розуміти соціолінгвістичні чинники вибору форми звертання в сучасному українському
    суспільстві."
  - "Аналізувати вплив цифрової комунікації на традиційні норми ввічливості."

reading_situations:
  - source_type: "корпоративна політика"
    topic: "Етика ділового листування у великій українській IT-компанії."
    key_elements: ["ієрархія", "неформальність", "дистанція"]
    motivation: "Дослідження сучасних трансформацій ділового етикету під впливом глобалізації."
  - source_type: "етнографічне дослідження"
    topic: "Традиційні українські форми ввічливості: від сільської громади до шляхетського
      етикету."
    key_elements: ["звертання на 'Ви' до батьків", "панування", "гостинність"]
    motivation: "Розуміння історичного коріння української ввічливості та її культурних
      кодів."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Ток-шоу, де ведучий намагається поставити незручні запитання відомому
      дипломату."
    focus_points: ["збереження обличчя", "дипломатичний протокол", "ухильні відповіді
          як стратегія ввічливості"]
    motivation: "Вивчення майстерності ведення складної розмови зі збереженням професійної
      дистанції."
  - media_type: "подкаст"
    setting: "Психолог та лінгвіст обговорюють феномен 'токсичної ввічливості' та
      пасивної агресії в мові."
    focus_points: ["підтекст", "іронія", "мовленнєві маркери маніпуляції"]
    motivation: "Розвиток критичного сприйняття мовленнєвих стратегій у міжособистісному
      спілкуванні."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть лист-відмову від участі в конференції, адресований організатору,
      з яким ви раніше мали позитивний досвід співпраці. Збалансуйте щирість відмови
      зі збереженням добрих стосунків."
    requirements: ["мінімум 200 слів", "використання засобів пом'якшення та хеджингу",
      "дотримання формул ввічливості"]
    motivation: "Відпрацювання навичок коректної відмови зі збереженням позитивного
      обличчя."
    model_answer: "Текст повинен містити подяку за запрошення, обґрунтовану причину
      відмови (без надмірних виправдань), пропозицію альтернативної форми участі та
      вираження надії на подальшу співпрацю."

discussion_topics:
  - context: "Суперечка навколо звертання 'Пан/Пані' vs 'Товариш' vs відсутність звертання
      в пострадянському просторі."
    questions:
      - "Чому звертання 'Пан/Пані' повернулося в українську мову і як воно сприймається
        сьогодні?"
      - "Чи є звертання на 'Ти' в офіційному середовищі ознакою прогресивності чи
        неповаги?"
      - "Як мовна ввічливість відображає соціальну ієрархію?"
    motivation: "Аналіз соціальних змін через призму мовних знаків пошани."
  - context: "Ввічливість в інтернеті: чи потрібні смайли в офіційних повідомленнях
      у месенджерах?"
    questions:
      - "Як змінюються межі ввічливості в асинхронній комунікації?"
      - "Чи вважається 'капслок' криком і порушенням етикету?"
      - "Роль візуальних засобів у вираженні ввічливості онлайн."
    motivation: "Обговорення нетикету та його специфіки в українськомовному сегменті
      мережі."

content_outline:
  - section: "Теоретичні засади лінгвістичної ввічливості"
    words: 1000
    subsections:
      - "Принцип кооперації Грайса та максими ввічливості Ліча"
      - "Теорія 'обличчя' Брауна і Левінсона: збереження та загроза"
      - "Культурно-специфічні домінанти української ввічливості"
    key_concepts:
      - "позитивне обличчя"
      - "негативне обличчя"
      - "соціальна дистанція"
  - section: "Засоби вираження ввічливості в українській мові"
    words: 1000
    subsections:
      - "Система звертань: від офіційного 'Вельмишановний' до дружнього 'Друже'"
      - "Використання кличного відмінка як вияв поваги та близькості"
      - "Роль прагматичних часток та модальних конструкцій у пом'якшенні прохань"
    key_concepts:
      - "вокатив"
      - "евфемізація"
      - "директивний акт"
  - section: "Професійний етикет та дипломатичний протокол"
    words: 1000
    subsections:
      - "Структура офіційного листа: вступна формула, основна частина, завершення"
      - "Ввічливість під час дебатів та переговорів: як не погоджуватися коректно"
      - "Гендерні аспекти ввічливості в професійному середовищі"
    key_concepts:
      - "корпоративна культура"
      - "мовний протокол"
      - "толерантність"
  - section: "Ввічливість як інструмент вирішення конфліктів"
    words: 1000
    subsections:
      - "Стратегії деескалації напруги через мовні засоби"
      - "Вибачення як мовленнєвий акт: типи та ефективність"
      - "Роль мовчання та невербальних засобів у контексті ввічливості"
    key_concepts:
      - "конфліктологія"
      - "емпатія"
      - "метакомунікація"

vocabulary:
  required:
    - ввічливість
    - етикет
    - звертання
    - пошана
    - дистанція
    - компроміс
    - тактовність
    - протокол
  recommended:
    - бенефактивність
    - імплікатура
    - фатична функція
    - галантність
    - коректність

activity_hints:
  - type: select
    description: "Choose the appropriate politeness strategy (позитивна/негативна
      ввічливість, хеджування, евфемізація) for given professional and personal scenarios."
  - type: error-correction
    description: "Fix politeness violations in professional texts — inappropriate
      Ти/Ви usage, missing courtesy formulas, passive-aggressive phrasing."
  - type: critical-analysis
    description: "Analyze a TV interview where a diplomat navigates uncomfortable
      questions — identify all face-saving strategies and evasion techniques."
  - type: essay-response
    description: "Write a polite disagreement (100-150 words) in a professional meeting
      context, using appropriate hedging and face-saving formulas."
  - type: critical-analysis
    description: "Classify Ukrainian address forms (Вельмишановний, Пане, Друже, колего,
      хлопці) by formality level and appropriate usage context."

activities:
  types_required:
    - reading
    - error-correction
    - critical-analysis
    - essay-response
    - select
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §40 — Стилістичне забарвлення лексики (книжна/розмовна)"
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка, ділове спілкування"
  - "Караман, 10 клас (2018): §53-55 — Офіційно-діловий стиль, мовний етикет"

