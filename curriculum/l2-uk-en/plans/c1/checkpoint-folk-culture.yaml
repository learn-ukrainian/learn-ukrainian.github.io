module: c1-115
level: C1
sequence: 115
slug: checkpoint-folk-culture
version: 1.2.2
title: 'Контрольна точка: Традиційна українська культура та побут'
subtitle: 'Підсумковий контроль: традиційна українська культура'
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
- Перевірити та систематизувати знання про основні компоненти матеріальної та 
  духовної культури України.
- Продемонструвати вміння аналізувати складні етнографічні тексти та артефакти.
- Підтвердити навички порівняльного аналізу регіональних особливостей 
  традиційного побуту.
- Висловити аргументовану позицію щодо актуальності народної спадщини в 
  сучасному світі.
reading_situations:
- source_type: комплексний текст
  topic: 'Синтетичний огляд традиційної культури України: від архаїки до сучасної
    інтерпретації.'
  key_elements:
  - семантика
  - ревіталізація
  - етногенез
  - ізоморфізм
  - культурна матриця
  motivation: Підсумкова перевірка розуміння ключової термінології та складних 
    концептуальних зв'язків.
- source_type: текст для редагування
  topic: Опис народного свята з навмисними фактичними та стилістичними помилками
    (змішування регіональних традицій).
  key_elements:
  - автентичність
  - анахронізм
  - стилістична норма
  motivation: Перевірка уважності до деталей та знання конкретних етнографічних 
    фактів.
listening_situations:
- media_type: аудіо
  setting: Добірка фрагментів інтерв'ю з представниками різних етнографічних 
    груп (гуцули, поліщуки, подоляни).
  focus_points:
  - ідентифікація регіону за говіркою
  - визначення специфічних реалій побуту за описом
  - розуміння загального змісту та емоційного тону
  motivation: Підсумкова перевірка навичок сприйняття на слух автентичного 
    мовлення з регіональними особливостями.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Сформулюйте та обґрунтуйте свою відповідь на запитання: ''Чи може традиційна
    культура бути фундаментом для модернізації сучасної нації, чи вона є лише експонатом
    у музеї пам''яті?'''
  requirements:
  - мінімум 350 слів
  - аргументація з посиланнями на вивчені модулі
  - використання академічного стилю
  motivation: Синтез отриманих знань та розвиток критичного мислення.
  model_answer: Текст повинен демонструвати глибоке розуміння функцій традиції, 
    наводити приклади успішної інтеграції етно-елементів у сучасне життя 
    (дизайн, дипломатія, ідентичність) та робити висновок про динамічну природу 
    культури.
discussion_topics:
- context: Завершальна дискусія за результатами блоку 'Народна культура'.
  questions:
  - Який аспект української традиції (костюм, кухня, архітектура, фольклор) 
    видається вам найстійкішим до змін часу? Чому?
  - Як знання народної культури допомагає краще розуміти сучасне українське 
    суспільство та його цінності?
  motivation: Рефлексія над вивченим матеріалом та розвиток навичок підсумкового
    узагальнення.
content_outline:
- section: 'Матеріальний світ: підсумковий огляд'
  words: 1000
  subsections:
  - 'Архітектура та інтер''єр: сакральна геометрія хати'
  - 'Народний костюм: семіотика вбрання та прикрас'
  - 'Гастрономічні коди: обрядові та повсякденні страви'
  key_concepts:
  - цілісність
  - матеріальна культура
  - семіотика
  - регіональність
- section: 'Духовна вертикаль: фольклор та обряди'
  words: 1000
  subsections:
  - 'Календарний та родинний цикли: ключові ритуали'
  - 'Усна народна творчість: жанрове розмаїття та символіка'
  - 'Музичний фольклор: архаїка та інструментальна традиція'
  key_concepts:
  - ритуал
  - архетип
  - міфологема
  - спадкоємність
- section: 'Регіональна карта: синтез відмінностей'
  words: 1000
  subsections:
  - 'Західні регіони (Галичина, Волинь, Закарпаття): європейські контексти'
  - 'Центральна та Східна Україна: козацький пласт та землеробська архаїка'
  - 'Південь та Крим: мультикультурний діалог та степовий ландшафт'
  key_concepts:
  - етнографічна зона
  - дифузія
  - самобутність
  - синтез
- section: Традиція в сучасному дискурсі
  words: 1000
  subsections:
  - Поняття 'національного бренду' та роль етно-культури
  - 'Кітч, шароварщина та автентика: боротьба за якість репрезентації'
  - 'Майбутнє спадщини: від консервації до живої практики'
  key_concepts:
  - актуалізація
  - брендинг
  - кітч
  - культурна політика
- section: Підсумок — Summary
  words: 300
  points:
  - 'Material and spiritual culture form a holistic system (цілісність) where architecture,
    clothing, and rituals share common archetypes. Regional differences (Захід, Центр,
    Схід, Південь) highlight ethnographic diversity while maintaining a unified cultural
    code. Self-check: Name 3 key rituals from the calendar or family cycle. Describe
    the symbolic meaning (семіотика) of 2 elements of a traditional Ukrainian costume.'
  - 'Modern cultural discourse focuses on the transition from preservation to living
    practice, distinguishing between authentic heritage and superficial imitation.
    Self-check: What is the difference between authentic culture (автентика) and kitsch
    (шароварщина)? Explain how traditional culture can be integrated into a modern
    national brand without losing its depth.'
