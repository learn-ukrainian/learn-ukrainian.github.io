module: c1-090
level: C1
sequence: 90
slug: checkpoint-folk-culture
version: '2.0'
title: 'Контрольна точка: Народна культура і традиції'
subtitle: 'Checkpoint: Folk Culture and Traditions'
content_outline:
- section: 'Вступ: Методологія культурного аналізу (Introduction: Methodology of Cultural Analysis)'
  words: 400
  points:
  - 'Огляд цілей контрольної точки: перевірка знань про народну культуру та традиції згідно зі стандартами §3.4 та §3.21 (дозвілля,
    традиції, свята)'
  - 'Настанови щодо академічного регістру: заміна розмовних маркерів (класний, супер) на фахові терміни (визначний, багатогранний)'
- section: 'Народна культура: Від міфології до кобзарства (Folk Culture: From Mythology to Kobzarship)'
  words: 800
  points:
  - 'Аналіз музичного фольклору через призму ''міфологічного світогляду'': сакральне значення колискових та дум'
  - 'Культурний гачок: кобзарі як ''живий інтернет'' — розгляд їхньої цехової організації, ''лебійської мови'' та ролі у безцензурній
    передачі історії'
  - Танці та ремесла (гопак, писанкарство) як елементи збереження 'автентичності' в умовах глобалізації
  - 'Практичне завдання: тест на розуміння календарних обрядів та символіки автентичної вишивки'
- section: Обрядовість та календарний цикл (Rituals and Calendar Cycle)
  words: 900
  points:
  - 'Перевірка знань про зимовий, весняний та літній цикли: символіка Дідуха, Колядки, Купала, Спаси'
  - 'Родинні обряди: хрестини, весілля, поминальні — ролі кумів, свашки, плакальниці'
  - 'Практичне завдання: визначення обрядового контексту за описом (зимовий vs весняний vs родинний)'
- section: Ремесла, кухня та побут (Crafts, Cuisine and Everyday Life)
  words: 800
  points:
  - 'Писанкарство, вишивка, гончарство: символіка орнаментів та регіональні особливості'
  - 'Українська кухня як культурний код: паляниця, борщ, вареники; регіональні варіації'
  - 'Українська хата: просторова організація (покуть, піч), символіка порогу'
- section: Регіональна культура та мовлення (Regional Culture and Speech)
  words: 500
  points:
  - 'Культурні особливості Галичини, Поділля та Волині: діалектні маркери в текстах про народну культуру'
  - 'Лексична вправа: виправлення кальки ''приймати участь'' на нормативне ''брати участь у фестивалях/виставках'''
  - 'Робота над помилками: диференціація ''традиційний'' (усталений) та ''традиціоналістський'' (консервативний за ідеологією)'
- section: 'Підсумок: Аналітичне есе (Summary: Analytical Essay)'
  words: 600
  points:
  - 'Написання есе: роль народної культури у збереженні національної ідентичності'
  - Використання стилістичних засобів синтаксису (порівняння, вставні конструкції) для висловлення власної позиції
  - 'Фінальний чек-лист: самоперевірка на предмет академічної точності термінології та відсутності суржику'
focus: checkpoint
pedagogy: Assessment
objectives:
- Assess knowledge of Ukrainian folk culture, traditions, and rituals
- Evaluate ability to analyze folk cultural phenomena at C1 level
- Verify mastery of ethnographic and folk culture terminology
grammar:
- Comprehensive Review
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Культуролог-екзаменатор
word_target: 4000
vocabulary_hints:
  required:
  - сакральний (sacral) — сакральне мистецтво, сакральний простір; висока частота в академічних текстах про культуру
  - автентичний (authentic) — автентичний спів, автентична вишивка; акцент на збереженні первісності
  - світогляд (worldview) — міфологічний світогляд, світоглядні орієнтири; абстрактний іменник для аналізу культури
  - синкретизм (syncretism) — жанровий синкретизм, релігійний синкретизм; академічний термін для поєднання елементів
  - ідентичність (identity) — національна ідентичність, пошук ідентичності; ключове поняття соціокультурного аналізу
  recommended:
  - музикальний (musical/talented) — вживається для характеристики людини; порівняти з 'музичний' (інструмент)
  - брати участь (to participate) — нормативний замінник кальки 'приймати участь'
  - багатогранний (multifaceted) — рекомендований епітет для високого стилю есе
  - визначальний (decisive/defining) — для опису впливу культурних явищ
