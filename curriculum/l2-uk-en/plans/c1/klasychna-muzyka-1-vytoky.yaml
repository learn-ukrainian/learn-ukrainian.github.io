activity_hints:
  - type: reading
    focus: "Прочитайте музикознавче дослідження про партесний спів. Визначте фахову термінологію та поясніть еволюцію від монодії до багатоголосся."
  - type: critical-analysis
    focus: "Проаналізуйте біографічний нарис про Березовського. Визначте авторську позицію щодо 'викачування' українських талантів та знайдіть аргументи."
  - type: match-up
    focus: "Зіставте композиторів (Березовський, Бортнянський, Ведель) з характеристиками їхнього стилю та ключовими творами."
  - type: fill-in
    focus: "Доповніть текст про історію української духовної музики відповідними термінами (монодія, партес, контрапункт, класицизм, мелос)."
  - type: error-correction
    focus: "Знайдіть і виправте помилки в тексті про українську класичну музику: русизми, неточні атрибуції, невідповідний регістр."

