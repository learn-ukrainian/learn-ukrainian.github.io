module: c1-098
level: C1
sequence: 98
slug: klasychna-muzyka-1-vytoky
version: '1.2'
title: "Класична музика I: Витоки та становлення професійного мистецтва"
subtitle: "Classical Music I: Origins and Development of Professional Art"
focus: history
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити витоки української професійної музичної культури від знаменного розспіву до барокових партесних концертів."
  - "Проаналізувати творчість 'золотої трійці' українського класицизму: Максима Березовського, Дмитра Бортнянського та Артемія Веделя."
  - "Вивчити специфіку жанру хорового духовного концерту та його значення для європейського контексту."
  - "Осмислити роль Глухівської співацької школи у підготовці професійних кадрів для імперії."

reading_situations:
  - source_type: "музикознавче дослідження"
    topic: "Феномен партесного співу в Україні XVII століття: перехід від монодії до багатоголосся."
    key_elements: ["монодія", "поліфонія", "партес", "контрапункт", "ірмос"]
    motivation: "Вивчення фахової термінології та розуміння еволюції музичних форм."
  - source_type: "біографічний нарис"
    topic: "Трагічна доля Максима Березовського: шлях від Глухова до італійських академій та забуття."
    key_elements: ["академізм", "італійська школа", "партітура", "геній"]
    motivation: "Робота з текстами про взаємодію особистості митця та імперського середовища."

listening_situations:
  - media_type: "аудіо"
    setting: "Запис хорового концерту Дмитра Бортнянського з музикознавчим коментарем про структуру та гармонію."
    focus_points: ["чергування темпів", "гармонічна мова", "зв'язок тексту та музики"]
    motivation: "Розвиток навичок аналітичного прослуховування хорової класики."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте роль українських композиторів XVIII століття у формуванні європейського музичного класицизму. Чи можна вважати їхню творчість суто 'імперським продуктом', чи вони зберегли національний мелос?"
    requirements: ["мінімум 300 слів", "використання понять: мелос, канон, ідентичність, стилістика", "наведення прикладів конкретних творів"]
    motivation: "Вміння будувати критичне висловлювання на межі історії музики та культурології."
    model_answer: "Текст має висвітлювати високий рівень підготовки українських митців, пояснювати використання народнопісенних інтонацій у духовних творах та обґрунтовувати внесок Бортнянського у світову хорову культуру."

discussion_topics:
  - context: "Довгий час українська класика XVIII століття подавалася у світі як частина виключно російської культури."
    questions:
      - "Які ознаки музичної мови Бортнянського чи Веделя свідчать про їхнє українське коріння?"
      - "Як сучасна Україна має популяризувати свою класичну спадщину на міжнародній арені?"
    motivation: "Тренування навичок дискусії про культурну суб'єктність та спадщину."

content_outline:
  - section: "Від знаменного розспіву до барокового багатоголосся"
    words: 1000
    subsections:
      - "Давньоруська монодія: знаменний розспів та літургійна традиція"
      - "Епоха партесів: Микола Дилецький та перша музична граматика"
      - "Києво-Могилянська академія як центр музичного виховання"
    key_concepts: ["монодія", "багатоголосся", "партес", "літургіка"]
  - section: "Глухівська школа — кузня талантів"
    words: 1000
    subsections:
      - "Специфіка музичної освіти в Глухові: від сопілки до вокальної майстерності"
      - "Шлях до Петербурга та Італії: механізм 'викачування' українських талантів"
      - "Взаємозв'язок народної пісні та академічного навчання"
    key_concepts: ["освіта", "школа", "традиція", "культурна дифузія"]
  - section: "Золотий класицизм: Березовський, Бортнянський, Ведель"
    words: 1000
    subsections:
      - "Максим Березовський: європейське визнання та трагедія повернення"
      - "Дмитро Бортнянський: реформатор хорового співу та 'Орфей Неви'"
      - "Артемій Ведель: містицизм та глибокий національний мелос у хоровому концерті"
    key_concepts: ["класицизм", "хоровий концерт", "мелос", "геній"]
  - section: "Спадщина та контекст"
    words: 1000
    subsections:
      - "Вплив італійської опери на українську духовну музику"
      - "Світське музикування: поширення клавесина, скрипки та флейти в маєтках"
      - "Збереження класичної традиції: від рукописів до сучасних виконань"
    key_concepts: ["світська музика", "інструменталізм", "спадкоємність", "канон"]

