module: c1-076
level: C1
sequence: 76
slug: klasychna-muzyka-1-vytoky
version: '2.0'
title: Класична музика I — Витоки
subtitle: Classical Music I — Origins (1745-1863)
content_outline:
- section: 'Вступ: Український внесок у європейську класику (Introduction: Ukrainian
    Contribution to European Classics)'
  words: 600
  points:
  - Огляд ролі українських композиторів XVIII-XIX ст. на європейській сцені, що закладає
    фундамент для розуміння національної ідентичності (CBI approach)
  - 'Деколонізаційний дискурс: повернення імен Березовського та Бортнянського в український
    контекст, спростування імперського наративу про «російських композиторів»'
  - 'Лексичний фокус: розмежування понять «духовна музика» (sacred) та «світська музика»
    (secular) у контексті епохи'
- section: Максим Березовський — «Український Моцарт» (Maksym Berezovsky — 'The Ukrainian
    Mozart')
  words: 900
  points:
  - 'Творчий шлях до Болоньї: аналіз успіху Березовського, чиє ім''я викарбуване золотими
    літерами в Болонській філармонічній академії поруч з Моцартом'
  - 'Опера «Демофонт»: перша опера українського композитора, аналіз музичної мови
    (арія, речитатив) та італійського впливу'
  - 'Трагічна доля та міфи: обговорення загадкової смерті композитора та сучасних
    досліджень, що піддають сумніву версію про самогубство'
  - 'Граматика в дії: вживання дієприкметникових зворотів для опису партитур та біографічних
    фактів (наприклад, «талант, визнаний сучасниками»)'
- section: Дмитро Бортнянський та хорова спадщина (Dmytro Bortnyansky and the Choral
    Heritage)
  words: 900
  points:
  - Постать Бортнянського як реформатора духовної музики та керівника придворної співацької
    капели, виховання українських голосів у Петербурзі
  - 'Хорові концерти: аналіз поліфонії та гармонії, що поєднують українську традицію
    з класичними канонами європейського стилю'
  - 'Музикознавчий реєстр: робота з термінами «партитура», «хорова капела», «a cappella»
    та їх застосування в аналітичному тексті'
- section: 'Семен Гулак-Артемовський: народження національної опери (Semen Gulak-Artemovsky:
    The Birth of National Opera)'
  words: 1000
  points:
  - Аналіз опери «Запорожець за Дунаєм» (1863) як першого твору на лібрето українською
    мовою, що легітимізував культуру на великій сцені
  - Використання народного гумору та козацького міфу для формування національного
    самосприйняття в умовах імперських обмежень
  - 'Синтаксична складність: активне вживання дієприслівникових зворотів («Слухаючи
    музику Гулака-Артемовського...») для опису динаміки сценічної дії'
- section: 'Практика: Мистецтвознавчий аналіз та корекція помилок (Practice: Art Analysis
    and Error Correction)'
  words: 600
  points:
  - Порівняльний аналіз фрагментів «Демофонта» та хорового стилю Бортнянського з використанням
    вивченого музикознавчого реєстру
  - 'Подолання типових лексичних помилок: розмежування значень «музичний» (інструмент,
    слух) та «музикальний» (талант, людина), а також уточнення понять «увертюра» vs
    «опера»'
  - Тренінг з узгодження дієприкметникових зворотів (Participial Agreement) на основі
    описів музичних творів, виправлення помилок кшталту «опера написаний»
  - 'Підсумкове есе: аргументація значення «Запорожця за Дунаєм» для сучасної української
    культури через призму деколонізації'
focus: fine-arts
pedagogy: CBI
objectives:
- Learner understands the role of Ukrainian composers in European Baroque and Classical
  eras
- Learner can describe the significance of Berezovsky, Bortnyansky, and Vedel
- Learner analyzes the birth of national opera with Gulak-Artemovsky
grammar:
- Musicology register
- Complex participial constructions
phase: C1.5 Folk Culture & Arts
persona:
  voice: Senior Specialist
  role: Історик музики
word_target: 4000
vocabulary_hints:
  required:
  - композитор (composer) — видатний композитор, творчість композитора; High frequency
    in art register
  - партитура (score) — диригентська партитура, читати партитуру; Essential for musicology
  - духовна музика (sacred music) — духовний концерт, духовне відродження; Contrast
    with 'світська'
  - світська музика (secular music) — світське життя, світський захід; Key historical
    distinction
  - хорова капела (choral chapel/choir) — придворна капела, співати в капелі; Historical
    context of Berezovsky/Bortnyansky
  recommended:
  - арія (aria) — сольна частина в опері
  - речитатив (recitative) — вокальна форма, що імітує мовлення
  - поліфонія (polyphony) — багатоголосся
  - a cappella (a cappella) — хоровий спів без інструментального супроводу
  - музикальний (musical/talented) — вживається про людину з хистом; Contrast with
    'музичний' (instrument, sound)
  - лібрето (libretto) — текст опери
  - увертюра (overture) — інструментальний вступ до опери
