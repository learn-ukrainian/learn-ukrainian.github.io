module: c1-116
level: C1
sequence: 116
slug: ukrainian-avant-garde
version: '1.2'
title: "Український авангард: феномен мистецького прориву"
subtitle: "Український авангард: феномен мистецького прориву"
focus: history
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити феномен українського авангарду як частину світового модерністського
    руху початку XX століття."
  - "Вивчити творчість знакових постатей (К. Малевич, О. Богомазов, О. Архипенко,
    М. Бойчук) та їхній внесок у світове мистецтво."
  - "Проаналізувати стилістичні особливості кубофутуризму, конструктивізму та спектралізму
    в українському контексті."
  - "Оцінити вплив українського авангарду на театр, архітектуру та дизайн, а також
    трагічну долю його представників."

reading_situations:
  - source_type: "мистецтвознавчий нарис"
    topic: "Київська школа авангарду: чому Україна стала епіцентром радикальних мистецьких
      експериментів."
    key_elements: ["футуризм", "безпредметність", "динамізм", "панестетизм", "синтез"]
    motivation: "Робота з фаховим текстом про історію мистецтва та складну термінологію
      модернізму."
  - source_type: "маніфест"
    topic: "Уривки з маніфестів Михайля Семенка та Олександра Богомазова: радикальне
      оновлення художньої мови."
    key_elements: ["деструкція", "новітність", "ритм", "енергія кольору"]
    motivation: "Аналіз специфічного стилю програмних текстів авангардистів."

listening_situations:
  - media_type: "відео"
    setting: "Лекція відомого мистецтвознавця про 'український період' Казимира Малевича
      та вплив народного мистецтва на супрематизм."
    focus_points: ["зв'язок супрематичних форм із вишивкою та розписом", "викладацька
          діяльність Малевича в Києві", "проблема національної ідентифікації митця"]
    motivation: "Сприйняття наукової дискусії про деколонізацію історії мистецтва."

writing_tasks:
  - task_type: "відгук"
    prompt: "Оберіть один твір українського авангарду (наприклад, 'Правка пил' О.
      Богомазова чи скульптури О. Архипенка) та напишіть мистецтвознавчу рецензію.
      Проаналізуйте форму, колір та ідейне наповнення роботи."
    requirements: ["мінімум 300 слів", "використання термінів: композиція, динаміка,
          фактура, абстракція", "висловлення особистого враження через призму знань
          про епоху"]
    motivation: "Розвиток навичок критичного аналізу візуальних об'єктів."
    model_answer: "Рецензія має містити опис технічних прийомів митця (наприклад,
      використання гострих кутів для передачі швидкості), аналіз новаторства твору
      для свого часу та пояснення його значення в контексті української культури."

discussion_topics:
  - context: "Багато митців українського авангарду в світових музеях досі підписані
      як 'російські'. Зараз триває процес їхньої 'репатріації' в український культурний
      контекст."
    questions:
      - "Які критерії мають визначати національну приналежність митця: місце народження,
        мова, тематика творів чи особистий вибір?"
      - "Чому для України важливо повернути імена авангардистів у власний канон?"
    motivation: "Формування навичок аргументованого захисту національних культурних
      інтересів."

content_outline:
  - section: "Генезис та філософія українського прориву"
    words: 1000
    subsections:
      - "Київ як 'Париж Сходу': художні об'єднання та виставки ('Кільце', 'Ланка')"
      - "Теоретична база: 'Живопис та елементи' Олександра Богомазова"
      - "Зв'язок із народним мистецтвом: від автентичного орнаменту до супрематичного
        квадрата"
    key_concepts: ["модернізм", "маніфест", "теоретичне обґрунтування", "самобутність"]
  - section: "Титани форми та кольору: Малевич, Богомазов, Архипенко"
    words: 1000
    subsections:
      - "Казимир Малевич: супрематизм як філософія та київські витоки"
      - "Олександр Богомазов: геній ліній та енергії кольору"
      - "Олександр Архипенко: революція в скульптурі та 'моделювання порожнечі'"
    key_concepts: ["супрематизм", "кубофутуризм", "скульптоживопис", "динамізм"]
  - section: "Синтетичне мистецтво: театр, кіно, дизайн"
    words: 1000
    subsections:
      - "Лесь Курбас та 'Березіль': психологічне перевтілення та конструктивізм на
        сцені"
      - "Анатоль Петрицький: сценографія як самостійний вид авангардного мистецтва"
      - "Українське кіно 1920-х: експерименти Довженка та Кавалерідзе"
    key_concepts: ["сценографія", "експресіонізм", "конструктивізм", "візуальна мова"]
  - section: "Бойчукізм та трагедія 'Розстріляного відродження'"
    words: 1000
    subsections:
      - "Михайло Бойчук та його школа: неовізантизм та монументальне мистецтво"
      - "Утопія та реальність: ідеологія авангарду в радянському проекті"
      - "Нищення еліти та культурна амнезія: як світ 'забув' про український авангард"
    key_concepts: ["бойчукізм", "монументалізм", "ідеологічний тиск", "культурна пам'ять"]

vocabulary:
  required:
    - авангард
    - модернізм
    - супрематизм
    - кубофутуризм
    - конструктивізм
    - безпредметність
    - сценографія
    - маніфест
    - репатріація
    - канон
  recommended:
    - спектралізм
    - деконструкція
    - синкретизм
    - деколонізація
    - візіонерство

activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - comparative-study
    - match-up
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте текст про генезис та філософія українського прориву і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про титани форми та кольору: малевич, богомазов, архипенко, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Генезис та філософія українського прориву». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему генезис та філософія українського прориву."
  - type: comparative-study
    focus: "Порівняйте різні підходи до генезис та філософія українського прориву: Київ як 'Париж Сходу': художні об'єднання та виставки ('Кільце', 'Ланка'). Визначте спільне та відмінне."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
