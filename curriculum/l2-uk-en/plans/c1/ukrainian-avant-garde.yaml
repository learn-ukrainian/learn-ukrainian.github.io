title: Український авангард
subtitle: Ukrainian Avant-Garde
content_outline:
- section: 'Вступ: Поняття та контекст (Introduction: Concept and Context)'
  words: 500
  points:
  - Introduce the Ukrainian Avant-Garde (1910-1930s) as a radical synthesis of global modernism and local folk traditions,
    aligning with State Standard §3.4 on museum and gallery culture.
  - 'Learner error correction: distinguish «модерн» (Art Nouveau/Secession style) from «модернізм» (the broader 20th-century
    movement) to ensure stylistic precision at the C1 level.'
- section: Київське коріння світового авангарду (Kyiv Roots of the World Avant-Garde)
  words: 900
  points:
  - Detailed study of Kazimir Malevich’s «Kyiv period» (1928-1930) and his claims that folk embroidery and «pysankarstvo»
    shaped his suprematist color vision.
  - Pedagogical correction of the «Russian-only» label for Malevich and Archipenko by highlighting their Kyiv roots, self-identification,
    and the «Ukrainian text» in their art.
  - 'Alexandra Exter’s cubofuturism: exploring the bridge between folk theatricality, peasant embroidery patterns, and radical
    stage design.'
- section: 'Напрямки та школи: Бурлюк, Архипенко, Бойчук (Movements and Schools: Burlyuk, Archipenko, Boychuk)'
  words: 1000
  points:
  - David Burlyuk as the «father of Ukrainian futurism» and Alexander Archipenko’s revolutionary sculptural cubism that changed
    world aesthetics.
  - 'Mykhailo Boychuk and the phenomenon of «Boychukism»: blending Neo-Byzantinism with folk monumentalism to create a unique
    national artistic language.'
  - 'Drill: Using descriptive C1 vocabulary such as «динамічний» (dynamic), «експресивний» (expressive), and «лаконічний»
    (laconic) instead of generic adjectives like «гарний».'
- section: Трагедія «Спецфонду» та Розстріляне відродження (The Tragedy of the 'Special Fund' and Executed Renaissance)
  words: 1000
  points:
  - 'The tragic narrative of the «Executed Renaissance»: the systemic destruction of avant-garde artists during Stalinist
    repressions (Cross-ref: HIST).'
  - 'The «Special Fund» (Спецфонд) of the National Art Museum: how courageous museum workers hid «formalist» art to save it
    for future generations.'
  - Historical analysis of the term «репресоване мистецтво» (repressed art) and the process of its contemporary 're-discovery'
    and rehabilitation.
- section: 'Практика: Мистецтвознавчий аналіз (Practice: Art History Analysis)'
  words: 600
  points:
  - 'Guided visual analysis of a suprematist composition: focus on «безпредметність» (objectlessness), «колористика» (coloristics),
    and geometric rhythm.'
  - 'Creative production: Write a comparative essay on the distinctive features of Ukrainian avant-garde (color, folk ties)
    vs. the broader international movement.'
  - 'State Standard §4.4.1.1 practice: employ the «artistic style» of language (epithets, metaphors) to describe the emotional
    and aesthetic impact of a specific artwork.'
focus: cultural
pedagogy: CBI
objectives:
- Learner can discuss the Ukrainian Avant-Garde movement and its key figures
- Learner can analyze avant-garde artworks using appropriate terminology
- Learner can explain the impact of Ukrainian artists on world modernism
- Learner can describe the connection between folk art and avant-garde
grammar:
- art analysis vocabulary
- stylistic descriptions
phase: C1.7 [Fine Arts & High Culture]
persona:
  voice: Senior Specialist
  role: Футурист
word_target: 4000
vocabulary_hints:
  required:
  - авангард (avant-garde) — український авангард, представник авангарду; high frequency in art discourse
  - безпредметний (non-objective/abstract) — безпредметне мистецтво, світ безпредметності; key term for abstract philosophy
  - супрематизм (suprematism) — засновник супрематизму, супрематична композиція; Malevich-specific terminology
  - кубофутуризм (cubo-futurism) — естетика кубофутуризму, синтез мистецтв; specialized register for 1920s experiments
  - монументалізм (monumentalism) — школа монументалізму, бойчукісти-монументалісти; refers to grand-scale public art
  - колористика (coloristics) — народна колористика, локальні кольори; high frequency for analytical descriptions
  - репресований (repressed) — репресоване мистецтво, репресовані митці; critical historical and political register
  recommended:
  - формалізм (formalism) — ідеологічне звинувачення в СРСР; used in the context of state censorship
  - динаміка (dynamics) — внутрішня динаміка твору; used for describing visual movement
  - лаконічність (laconicism/brevity) — лаконічність форми; indicator of C1-level stylistic description
