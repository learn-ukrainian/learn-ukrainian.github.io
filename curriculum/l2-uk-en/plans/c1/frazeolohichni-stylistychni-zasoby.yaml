module: c1-062
level: C1
sequence: 62
slug: frazeolohichni-stylistychni-zasoby
version: '1.1'
title: "Фразеологічні стилістичні засоби"
subtitle: "Фразеологічні стилістичні засоби"
focus: vocabulary
pedagogy: seminar
word_target: 4000
objectives:
  - "Аналізувати стилістичні функції фразеологізмів у різних типах дискурсу."
  - "Диференціювати книжну, розмовну та нейтральну фразеологію."
  - "Використовувати фразеологічні одиниці для посилення експресивності та переконуваності
    мовлення."
  - "Розуміти культурно-історичний підтекст українських фразеологізмів."

reading_situations:
  - source_type: "публіцистичне есе"
    topic: "Роль метафоричної фразеології в сучасному українському політичному дискурсі."
    key_elements: ["ідеогеми", "експресивне забарвлення", "трансформація значень"]
    motivation: "Дослідження того, як стійкі сполуки слів формують суспільну думку
      та емоційне ставлення."
  - source_type: "художній уривок"
    topic: "Використання народної фразеології у творах Івана Нечуя-Левицького."
    key_elements: ["ідіоми", "приказки", "етнографізми"]
    motivation: "Вивчення джерел народної мудрості та їхньої стилізації в класичній
      літературі."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть критичний відгук на сучасну статтю (250-300 слів), інтегруючи
      щонайменше п'ять фразеологізмів книжного стилю для аргументації своєї позиції."
    requirements: ["використання термінологічної фразеології", "логічність викладу",
      "дотримання академічної норми"]
    motivation: "Практичне застосування фразеологічних засобів у професійній письмовій
      комунікації."
    model_answer: "Текст повинен демонструвати глибоке розуміння контекстуального
      вживання фразеологізмів на кшталт 'наріжний камінь', 'альфа і омега', 'грати
      першу скрипку'."

discussion_topics:
  - context: "Проблема 'вторинності' або 'калькування' фразеологізмів з інших мов
      (зокрема російської) у сучасному медійному просторі."
    questions:
      - "Чому важливо зберігати автентичну українську фразеологію?"
      - "Як фразеологізми впливають на національну ідентичність мовця?"
      - "Чи можливо створити нові фразеологізми в епоху цифрової комунікації?"
    motivation: "Дискусія про чистоту мови та динаміку фразеологічного складу."

content_outline:
  - section: "Класифікація фразеологізмів за стилістичним забарвленням"
    words: 1000
    subsections:
      - "Нейтральна фразеологія: основа комунікації"
      - "Книжна фразеологія: науковий, офіційно-діловий та публіцистичний стилі"
      - "Розмовно-просторічна фразеологія та її емоційний спектр"
    key_concepts:
      - "стилістична диференціація"
      - "експресивність"
      - "когнітивна метафора"
  - section: "Джерела та походження української фразеології"
    words: 1000
    subsections:
      - "Біблеїзми та античні ремінісценції в українській мові"
      - "Народні джерела: фольклор, побут, обрядовість"
      - "Крилаті вислови українських класиків (Шевченко, Франко, Українка)"
    key_concepts:
      - "прецедентний текст"
      - "етнолінгвістика"
      - "інтертекстуальність"
  - section: "Трансформація фразеологізмів у медіа-текстах"
    words: 1000
    subsections:
      - "Авторське переосмислення стійких сполук: деструкція та контамінація"
      - "Фразеологія як засіб іронії та сатири"
      - "Заголовки-фразеологізми та їхня маніпулятивна потужність"
    key_concepts:
      - "мовна гра"
      - "конотація"
      - "прагматика тексту"
  - section: "Лексикографічна опрацьованість та культура вживання"
    words: 1000
    subsections:
      - "Фразеологічні словники: типи та принципи побудови"
      - "Типові помилки у вживанні фразеологізмів: кальки та плеоназми"
      - "Практичні поради щодо збагачення індивідуального фразеологічного фонду"
    key_concepts:
      - "нормативність"
      - "калькування"
      - "ідіоматичність"

vocabulary:
  required:
    - фразеологізм
    - ідіома
    - крилатий вислів
    - експресивність
    - конотація
    - контекст
    - стилізація
    - автентичність
  recommended:
    - фразеологічне зрощення
    - фразеологічна єдність
    - перифраз
    - евфемізм
    - дисфемізм

activity_hints:
  - type: critical-analysis
    description: "Analyze a newspaper article — identify all phraseological units,
      classify their stylistic register (книжна, розмовна, нейтральна), and evaluate
      their effectiveness."
  - type: select
    description: "Identify whether a given phraseological unit is authentic Ukrainian
      or a calque from Russian — choose the correct Ukrainian equivalent."
  - type: match-up
    description: "Match phraseological units with their sources (біблеїзми, античні
      ремінісценції, козацький фольклор, крилаті вислови класиків)."
  - type: error-correction
    description: "Fix phraseological errors in texts — contaminated idioms, pleonastic
      combinations, calqued expressions from Russian."
  - type: essay-response
    description: "Write a critical review paragraph (100-150 words) integrating at
      least 5 Ukrainian book-style phraseological units naturally."

activities:
  types_required:
    - critical-analysis
    - select
    - match-up
    - error-correction
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §38 — Лексичні засоби стилістики, фразеологізми"
  - "Глазова, 11 клас (2019): §42 — Стилістичне забарвлення фразеологізмів"
  - "Авраменко, 11 клас (2019): Стилістична норма — фразеологічні засоби"

