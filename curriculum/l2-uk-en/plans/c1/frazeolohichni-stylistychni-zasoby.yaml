module: c1-061
level: C1
sequence: 61
slug: frazeolohichni-stylistychni-zasoby
version: '2.0'
title: Фразеологічні стилістичні засоби
subtitle: Phraseological Stylistic Resources
content_outline:
- section: Фразеологія як стилістичний ресурс
  words: 700
  points:
  - Різниця між фразеологією як лексичним запасом (рівень B2) та фразеологією як СТИЛІСТИЧНИМ ПРИЙОМОМ.
  - Як автори й оратори обирають та розгортають ідіоми для стилістичного ефекту.
  - 'Функції фразеологізмів у тексті: образність, лаконічність, емоційність.'
- section: Типи фразеологізмів за стилістичним забарвленням
  words: 800
  points:
  - 'Книжні фразеологізми (покласти край, набути чинності): офіційний та науковий стилі.'
  - 'Розмовні фразеологізми (водити за ніс, сісти в калюжу): побутова комунікація.'
  - 'Нейтральні фразеологізми (мати рацію, брати участь): універсальне вживання.'
  - Просторічні фразеологізми та ефект змішування регістрів.
- section: Прислів'я та приказки як стилістичний засіб
  words: 700
  points:
  - Вживання прислів'їв для надання авторитетності висловлюванню.
  - 'Іронічне цитування та підрив очікувань: гра з відомими прислів''ями.'
  - 'Українські паремійні традиції: відмежування від російських кальок.'
- section: Авторська фразеотворчість
  words: 700
  points:
  - 'Індивідуальні фразеологізми у творчості Шевченка, Франка: крилаті вислови.'
  - 'Журналістські неологізми-ідіоми: механізми створення та поширення.'
  - 'Рекламні слогани як квазіфразеологізми: межі фразеотворчості.'
- section: Трансформація фразеологізмів
  words: 600
  points:
  - Свідома модифікація ідіом для гумору, іронії, емфази.
  - 'Типи трансформацій: розширення, скорочення, заміна компонента.'
  - Антономазія та каламбур на основі фразеологізмів.
- section: Практика стилістичного аналізу фразеології
  words: 500
  points:
  - Визначення регістру, функції та стилістичного ефекту фразеологізмів в автентичних текстах.
  - Добір фразеологізмів відповідно до стилю та комунікативної ситуації.
focus: style
pedagogy: CBI
objectives:
- Розрізняти фразеологізми за стилістичним забарвленням та регістром.
- Аналізувати авторську фразеотворчість та трансформацію ідіом.
- Використовувати фразеологічні засоби відповідно до комунікативної ситуації.
grammar:
- 'Стилістичне забарвлення фразеологізмів: книжне, розмовне, нейтральне, просторічне'
- 'Трансформація фразеологізмів: розширення, скорочення, заміна компонента'
- Авторська фразеотворчість та крилаті вислови
phase: C1.5 [Stylistics & Rhetoric]
persona:
  voice: Senior Specialist
  role: Фразеолог-стиліст
word_target: 4000
vocabulary_hints:
  required:
  - фразеологізм (phraseological unit) — стійке словосполучення з цілісним значенням; High Frequency
  - стилістичне забарвлення (stylistic coloring) — емоційно-оцінний відтінок одиниці
  - прислів'я (proverb) — народний вислів повчального характеру
  - приказка (saying) — образний вислів без повчального характеру
  - крилатий вислів (winged word) — влучний вислів, що набув широкого вжитку
  recommended:
  - фразеотворчість (phraseological creativity) — індивідуальне творення ідіом
  - антономазія (antonomasia) — заміна власного імені на загальну назву чи навпаки
  - каламбур (pun) — гра слів, що використовує багатозначність або омонімію
  - контамінація (contamination) — змішування елементів двох фразеологізмів
  - трансформація (transformation) — свідома зміна складу чи структури фразеологізму
