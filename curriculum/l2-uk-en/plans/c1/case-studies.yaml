module: c1-037
level: C1
sequence: 37
slug: case-studies
version: '2.0'
title: Практичні кейси
content_outline:
- section: 'Вступ: Методологія аналізу кейсів (Introduction: Case Analysis Methodology)'
  words: 400
  points:
  - Визначення кейс-методу як інструменту розвитку професійної компетенції та аналітичного мислення (Standard §4.4.1.1).
  - 'Алгоритм комплексного аналізу: від дескриптивного опису ситуації до теоретичного обґрунтування пропонованих рішень.'
- section: 'Кейс 1: Мовна політика та «мовний закон» (Case 1: Language Policy and the ''Language Law'')'
  words: 800
  points:
  - 'Аналіз Закону про державну мову (2019) як реального кейсу: баланс між державним будівництвом та правами меншин.'
  - Дослідження зовнішніх та внутрішніх чинників (факторів), що впливають на мовну стійкість суспільства; поняття 'людський
    чинник'.
- section: 'Кейс 2: Медіааналіз та феномен «джинси» (Case 2: Media Analysis and the ''Dzhynsa'' Phenomenon)'
  words: 700
  points:
  - 'Кейс про «джинсу» в українських медіа: виявлення маркерів прихованої реклами та технік маніпуляції у новинних матеріалах.'
  - Виявлення когнітивних упереджень під час аналізу джерел інформації; стратегії критичного оцінювання суперечливих даних.
- section: 'Кейс 3: Лінгвістична дилема — діалект чи суржик? (Case 3: Linguistic Dilemma — Dialect or Surzhyk?)'
  words: 800
  points:
  - 'Соціолінгвістичний аналіз суржику та автентичних діалектів (гуцульського, бойківського): спільне та відмінне.'
  - Подолання помилкового сприйняття нормативних діалектизмів (напр. 'файний', 'ґаздиня') як 'нечистої мови' або суржику.
- section: 'Кейс 4: Риторика та композиція політичного дискурсу (Case 4: Rhetoric and Composition of Political Discourse)'
  words: 700
  points:
  - Аналіз публічних промов з використанням елементів риторики в композиції тексту (Standard §4.4.6).
  - Оцінка причинно-наслідкових зв'язків у політичній аргументації та прогнозування незворотних наслідків ухвалених рішень.
- section: 'Практикум: Культура ухвалення рішень (Workshop: Decision-Making Culture)'
  words: 400
  points:
  - 'Дриль на подолання калькування: вживання офіційного ''ухвалювати рішення'' замість розмовного ''приймати рішення''.'
  - 'Розвиток мовної агентності: заміна пасивних конструкцій (''Ситуацію було проаналізовано'') на активні форми (''Ми проаналізували
    ситуацію'').'
- section: Підсумок та групова презентація (Summary and Group Presentation)
  words: 200
  points:
  - Командна підготовка презентації за результатами аналізу обраного кейсу та надання конструктивного зворотного зв'язку.
  - Узагальнення здобутих аналітичних навичок та їх застосування у професійних сценаріях.
vocabulary_hints:
  required:
  - чинник (factor) — ключовий чинник, вплив чинників; висока частотність в офіційно-діловому та науковому стилях
  - наслідок (consequence) — причинно-наслідковий зв'язок, незворотні наслідки; часто вживається у формі 'унаслідок'
  - ухвалювати рішення (to make a decision) — ухвалити рішення; офіційний стандарт, заміна кальки 'приймати рішення'
  - обґрунтування (justification) — теоретичне обґрунтування, надати обґрунтування; базовий термін для кейс-методу
  - суперечливий (controversial) — суперечлива теза, суперечливе питання; характерно для публіцистичного дискурсу
  - упередження (bias) — когнітивне упередження, без упереджень; ключове поняття для аналізу маніпуляцій
  - аналіз (analysis) — здійснювати аналіз, системний аналіз; основна діяльність у професійних кейсах
  - контекст (context) — соціолінгвістичний контекст, враховувати контекст; необхідна умова аналізу
  - ситуація (situation) — опис ситуації, типова ситуація; об'єкт дослідження
  - висновок (conclusion) — робити висновок, логічний висновок; підсумок аналітичної роботи
  recommended:
  - маніпуляція (manipulation) — виявлення маніпуляцій; медіаграмотність
  - джинса (paid news/plug) — феномен «джинси»; специфічний термін українського медіапростору
  - оцінка (evaluation) — критична оцінка, критерії оцінювання
  - критика (critique) — конструктивна критика; дискусійний компонент
  - узагальнення (generalization) — теоретичне узагальнення, робити узагальнення
  - рекомендація (recommendation) — надати рекомендації за результатами аналізу
