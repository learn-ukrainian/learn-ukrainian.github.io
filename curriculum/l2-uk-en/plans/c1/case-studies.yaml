module: c1-050
level: C1
sequence: 50
slug: case-studies
version: '1.1'
title: "Аналіз практичних ситуацій"
subtitle: "Практичний аналіз ситуацій"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Навчитися аналізувати складні професійні та історичні ситуації українською мовою."
  - "Опанувати лексику для опису стратегічних рішень та їхніх наслідків."
  - "Вміти формулювати аргументовані висновки на основі наданих даних."
  - "Розвинути навички критичного оцінювання альтернативних сценаріїв розвитку подій."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Економічна стратегія гетьмана Івана Мазепи: спроба модернізації Гетьманщини."
    key_elements: ["протекціонізм", "меркантилізм", "фільварок", "експорт"]
    motivation: "Аналіз історичного кейсу з використанням академічної лексики."
  - source_type: "офіційний звіт"
    topic: "Релокація українського бізнесу в умовах повномасштабного вторгнення: виклики
      та рішення."
    key_elements: ["логістичний ланцюг", "кризовий менеджмент", "адаптивність", "інституційна
          підтримка"]
    motivation: "Робота з сучасним професійним контекстом та термінологією."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з СЕО успішного українського ІТ-стартапу про вихід на міжнародні
      ринки."
    focus_points: ["стратегія масштабування", "культурні бар'єри", "залучення інвестицій"]
    motivation: "Розуміння живої професійної мови та бізнес-дискурсу."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Підготуйте аналітичний звіт (кейс-стаді) про успішний досвід відновлення
      культурної пам'ятки у вашому регіоні."
    requirements: ["мінімум 300 слів", "використання термінів стратегічного планування",
      "чітка структура: проблема-рішення-результат"]
    motivation: "Практика написання структурованих аналітичних текстів."
    model_answer: "Звіт має містити вступ з описом проблеми, аналіз вжитих заходів
      (з використанням складних синтаксичних конструкцій) та оцінку ефективності."

discussion_topics:
  - context: "Вибір між збереженням історичної автентичності та необхідністю сучасної
      модернізації міського простору."
    questions:
      - "Які критерії мають бути пріоритетними при реставрації пам'яток?"
      - "Чи можливо досягти балансу між комерційною вигодою та культурною цінністю?"
    motivation: "Розвиток навичок ведення професійної дискусії на складні теми."

content_outline:
  - section: "Методологія аналізу кейсів"
    words: 1000
    subsections:
      - "Структура кейс-методу в академічному середовищі"
      - "Ключові показники ефективності (KPI) в аналізі ситуацій"
      - "Мовні засоби для вираження причинно-наслідкових зв'язків"
    key_concepts:
      - "гіпотеза"
      - "верифікація"
      - "релевантність"
  - section: "Історичні кейси: Державотворення та економіка"
    words: 1000
    subsections:
      - "Аналіз реформ Петра Могили як кейс культурної трансформації"
      - "Економічна політика УНР: причини невдач та уроки для сучасності"
      - "Діяльність 'Просвіти' як приклад успішного соціального менеджменту"
    key_concepts:
      - "меценатство"
      - "соборність"
      - "самовизначення"
  - section: "Сучасні бізнес-кейси в Україні"
    words: 1000
    subsections:
      - "Цифрова трансформація державних послуг: досвід Дії"
      - "Агропромисловий комплекс: перехід від сировинної моделі до переробки"
      - "Креативні індустрії як драйвер експорту послуг"
    key_concepts:
      - "діджиталізація"
      - "додана вартість"
      - "конкурентоспроможність"
  - section: "Стратегічне планування та комунікація"
    words: 1000
    subsections:
      - "Формулювання місії та бачення організації українською мовою"
      - "Мистецтво презентації результатів аналізу"
      - "Етика професійної дискусії та аргументації"
    key_concepts:
      - "візія"
      - "стейкголдери"
      - "синергія"

vocabulary:
  required:
    - стратегія
    - аналіз
    - впровадження
    - ефективність
    - контекст
    - альтернатива
    - наслідок
    - потенціал
  recommended:
    - оптимізація
    - сталість
    - ініціатива
    - ресурс
    - дедлайн

activity_hints:
  - type: reading
    focus: "Прочитайте текст про методологія аналізу кейсів і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про історичні кейси: державотворення та економіка, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Методологія аналізу кейсів». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему методологія аналізу кейсів."
  - type: comparative-study
    focus: "Порівняйте різні підходи до методологія аналізу кейсів: Структура кейс-методу в академічному середовищі. Визначте спільне та відмінне."

activities:
  types_required:
    - critical-analysis
    - essay-response
    - error-correction
    - match-up
    - fill-in
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §40 — Стилістичне забарвлення лексики"
  - "Караман, 10 клас (2018): §53 — Офіційно-діловий стиль"
  - "Ворон, 11 клас (2019): с. 207 — Науковий стиль та наукова доповідь"

connects_to:
  previous: "professional-scenarios"
  next: "review"
phase: C1.2 [Professional & Social Context]
