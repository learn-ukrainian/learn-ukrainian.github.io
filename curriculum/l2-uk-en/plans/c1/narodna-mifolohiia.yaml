vocabulary_hints:
  required:
  - Забобон (superstition) — вірити в забобони, народний забобон, безглуздий забобон; висока частотність у побутовому мовленні.
  - Повір'я (folk belief) — давнє повір'я, згідно з повір'ям, існує повір'я; книжний та літературний регістр.
  - Домовик (brownie/house spirit) — задобрити домовика, охоронець домашнього вогнища; ключовий персонаж нижчої міфології.
  - Мавка (forest nymph) — лісова мавка, чари мавки, мавка-невидимка; культурний гук до творчості Лесі Українки.
  - Синкретизм (syncretism) — релігійний синкретизм, поєднання вірувань; академічний термін для опису двовір'я.
  - Оберіг (amulet/talisman) — носити оберіг, вишитий оберіг, захисний оберіг; широке культурне вживання.
  recommended:
  - Двовір'я (dual faith) — феномен співіснування християнства та язичництва.
  - Анімізм (animism) — віра в одухотвореність природи.
  - Відьма (witch) — етимологічний зв'язок із дієсловом 'відати' (знати).
  - Міф (myth) — сакральна оповідь, на противагу художній казці.
  - Мольфар (molfar/sorcerer) — гуцульський маг, персонаж повісті 'Тіні забутих предків'.
  - Шезник (evil spirit) — персонаж карпатської демонології, дух, що зникає.
