module: c1-099
level: C1
sequence: 99
slug: narodna-mifolohiia
version: '1.1'
title: "Українська народна міфологія: світ богів, духів та демонів"
subtitle: "Народна міфологія: світ богів, духів та демонів"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Систематизувати уявлення про пантеон слов'янських богів та нижчу міфологію (духів
    природи та дому)."
  - "Проаналізувати трансформацію язичницьких образів у народному християнстві."
  - "Дослідити відображення міфологічних персонажів в українській класичній літературі
    (Леся Українка, М. Коцюбинський)."
  - "Вивчити лексику, пов'язану з магічними діями, повір'ями та народною демонологією."

reading_situations:
  - source_type: "наукове дослідження"
    topic: "Нижча міфологія українців: від мавки до домовика — функціональний аспект."
    key_elements: ["персоніфікація", "анімізм", "демонологія", "оберіг"]
    motivation: "Вивчення академічного стилю в етнології та міфології."
  - source_type: "літературний аналіз"
    topic: "Рецепція міфологічного образу лісової мавки у драмі-феєрії 'Лісова пісня'."
    key_elements: ["архетип", "міфологема", "антропоморфізм"]
    motivation: "Аналіз художнього переосмислення фольклорних образів."

listening_situations:
  - media_type: "лекція"
    setting: "Публічна лекція етнолога про дохристиянські витоки українських календарних
      свят та їхніх міфічних патронів."
    focus_points: ["символіка сонця", "культ предків", "магічне мислення"]
    motivation: "Сприйняття складної культурологічної інформації на слух."

writing_tasks:
  - task_type: "есе"
    prompt: "Порівняйте трансформацію образу мавки у драмі-феєрії Лесі Українки 'Лісова
      пісня' та в сучасному анімаційному фільмі 'Мавка'. Як змінюється інтерпретація
      міфологічного образу в різних контекстах?"
    requirements: ['мінімум 300 слів', 'використання термінів: архетип, міфологема,
          антропоморфізм, інтерпретація', 'порівняльний аналіз']
    motivation: "Розвиток навичок порівняльного аналізу літературних та медійних текстів."
    model_answer: "Текст повинен розкривати трансформацію від фольклорного образу
      небезпечного духа природи через поетичну ідеалізацію Лесі Українки до сучасної
      масової культури."

discussion_topics:
  - context: "Сучасна масова культура часто спрощує міфологічних персонажів до рівня
      фентезійних монстрів."
    questions:
      - "Чим відрізняється фольклорний домовик чи водяник від подібних персонажів
        у сучасному кіно?"
      - "Чи сприяє гейміфікація міфології збереженню національної культури чи її руйнуванню?"
      - "Які міфологічні архетипи досі впливають на поведінку та забобони сучасних
        українців?"
    motivation: "Розвиток навичок ведення дискусії на абстрактні та культурологічні
      теми."

content_outline:
  - section: "Космогонія та вищий пантеон"
    words: 1000
    subsections:
      - "Світове дерево: тричасна модель всесвіту в уявленнях українців"
      - "Перун, Дажбог, Велес: функції та атрибути головних божеств"
      - "Жіночі божества: Лада, Макош та їхній зв'язок із родючістю"
    key_concepts:
      - "пантеон"
      - "космогонія"
      - "язичництво"
  - section: "Духи природи: ліс, вода та поле"
    words: 1000
    subsections:
      - "Лісовики та мавки: господарі лісу та їхні взаємини з людиною"
      - "Водяники, русалки та потерчата: небезпека та магія водойм"
      - "Польовий дух та духи жнив: сакралізація аграрної праці"
    key_concepts:
      - "духи"
      - "міфологізація"
      - "задобрювання"
  - section: "Домашній простір та демонологія"
    words: 1000
    subsections:
      - "Домовик як охоронець роду: культ печі та предків"
      - "Нечиста сила: відьми, вовкулаки та упирі в народних переказах"
      - "Магічні предмети та замовляння як захист від пристріту"
    key_concepts:
      - "домовик"
      - "забобони"
      - "обереги"
  - section: "Міфологія в мистецтві та сучасності"
    words: 1000
    subsections:
      - "Літературний міфологізм: 'Тіні забутих предків' та 'Лісова пісня'"
      - "Наївне мистецтво та народна ікона як джерело міфологічних образів"
      - "Сучасна інтерпретація міфу в українському геймдеві та анімації (напр., 'Мавка.
        Лісова пісня')"
    key_concepts:
      - "інтерпретація"
      - "архетип"
      - "культурний код"

vocabulary:
  required:
    - міфологія
    - язичництво
    - домовик
    - мавка
    - русалка
    - оберіг
    - замовляння
    - персонаж
  recommended:
    - архетип
    - антропоморфний
    - сакральний
    - пантеон
    - анімізм

activities:
  types_required:
    - critical-analysis
    - essay-response
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте наукове дослідження про нижчу міфологію українців. Знайдіть
      у тексті класифікацію духів за функціями та середовищем існування."
  - type: critical-analysis
    focus: "Проаналізуйте текст про трансформацію язичницьких образів у народному
      християнстві. Визначте авторську позицію та знайдіть приклади синкретизму."
  - type: comparative-study
    focus: "Зіставте назви міфологічних істот (домовик, мавка, русалка, водяник, лісовик)
      з їхніми функціями та місцем перебування."
  - type: essay-response
    focus: "Доповніть текст про слов'янський пантеон відповідними іменами божеств
      та їхніми атрибутами (Перун — блискавка, Дажбог — сонце)."
  - type: essay-response
    focus: "Напишіть аналітичний текст про вплив міфологічних архетипів на сучасну
      масову культуру (ігри, анімація, література). Аргументуйте прикладами."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Традиції та культурна спадщина'"
  - "Авраменко, 11 клас (Укр. літ.) — Леся Українка 'Лісова пісня', міфологічні образи"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"
  - "Борисенко В. Етнографія українців — народна демонологія (загальна довідка)"

