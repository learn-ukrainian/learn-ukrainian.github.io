title: Народна міфологія
subtitle: Ukrainian Folk Mythology
content_outline:
- section: 'Вступ: Світ українських духів та феномен двовір’я (Introduction: The World of Ukrainian Spirits and Dual Faith)'
  words: 600
  points:
  - 'Пояснення концепції релігійного синкретизму (двовір’я) в українській культурі: як язичницькі ритуали (напр. Івана Купала)
    органічно поєдналися з християнськими святами.'
  - Розрізнення 'нижчої міфології' (духи природи та дому) та 'вищого пантеону' (Перун, Дажбог); акцент на тому, чому нижча
    міфологія краще збереглася у фольклорі.
  - Обговорення ролі міфології у формуванні національної ідентичності та деколонізаційний погляд на народні вірування як на
    автентичну світоглядну систему.
- section: Демонологія дому та природи (Demonology of Home and Nature)
  words: 900
  points:
  - 'Домашні духи: детальний аналіз образу домовика як охоронця домашнього вогнища. Практика вживання колокції ''задобрити
    домовика'' та вивчення ролі ''хатнього''.'
  - 'Природні духи: лісовик, водяник, польовик. Специфіка образу мавки (лісової німфи) на основі ''Лісової пісні'' Лесі Українки
    та її зв''язок з волинською міфологією.'
  - 'Аналіз образу русалки: виправлення хибних уявлень (Disney-style mermaid) — українська русалка як небезпечний дух потопленої
    дівчини, часто без риб''ячого хвоста.'
- section: Демонічні та долеподібні істоти (Demonic and Fate-like Beings)
  words: 900
  points:
  - 'Демонічні істоти: упир, вовкулака, чорт. Етимологічне дослідження слова ''відьма'' (від давньослов’янського ''відати''
    — знати); переосмислення образу відьми як мудрої, хоча й грізної жінки.'
  - 'Долеподібні істоти: доля, недоля, смерть як персоніфіковані сили, що керують життям людини. Анімізм та віра в присутність
    душі в кожному елементі природи.'
  - 'Культ предків та захисні практики: роль ''дідових днів'' (поминальних обрядів) та функція оберегів (вишиванка, лялька-мотанка)
    як засобів ритуального захисту.'
- section: Міфологічні мотиви в літературі та мистецтві (Mythological Motifs in Literature and Arts)
  words: 900
  points:
  - Глибокий аналіз гуцульської демонології (мольфари, щезники, чугайстри) у повісті М. Коцюбинського «Тіні забутих предків»
    та її візуалізація у фільмі С. Параджанова.
  - 'Порівняльний аналіз: українські міфологічні істоти проти європейських аналогів (напр. русалка vs німфа). Робота з текстом
    ''Лісової пісні'' як енциклопедією міфів.'
  - 'Лексичний практикум: розмежування термінів «міф» (сакральна історія про устрій світу) та «казка» (вигадка). Корекція
    помилки ''Це просто стара казка'' на ''Це давній народний міф''.'
- section: 'Практика: Аналіз та сучасна рецепція (Practice: Analysis and Modern Reception)'
  words: 700
  points:
  - 'Аналітична дискусія про сучасні забобони та повір’я у повсякденному житті українців: що є пережитком минулого, а що —
    частиною культурного коду.'
  - 'Творче завдання: написання есе про трансформацію міфологічних образів у сучасному українському фентезі, музиці (напр.
    Go_A) чи дизайні.'
  - 'Підсумкове обговорення: міфологія як інструмент збереження народної мудрості та її роль у сучасному процесі деколонізації
    культури.'
