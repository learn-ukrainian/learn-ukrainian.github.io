module: c1-013
level: C1
sequence: 13
slug: nominatyvnyi-vidminok-funktsiyi
version: 1.0.2
title: 'Називний відмінок: синтаксичні функції та стилістична інверсія'
subtitle: 'Називний відмінок: усі функції'
focus: grammar
pedagogy: TTT
word_target: 4000
objectives:
- 'Систематизувати всі синтаксичні функції називного відмінка: підмет, іменна частина
  складеного присудка, прикладка, звертання, називний уявлення.'
- Опанувати стилістичну інверсію як засіб експресивного синтаксису з називним 
  відмінком.
- Аналізувати роль називного відмінка в номінативних реченнях та їх стилістичну 
  функцію.
- Навчитися розрізняти називний теми (номінативний вигук) та називний у ролі 
  підмета.
reading_situations:
- source_type: художній уривок
  topic: 'Номінативні речення у прозі Олеся Гончара: відтворення образу степу.'
  key_elements:
  - номінативне речення
  - стилістична інверсія
  - називний теми
  motivation: Аналіз майстерності вживання називного відмінка для створення 
    художнього образу.
- source_type: публіцистичний текст
  topic: Використання називного відмінка в заголовках та слоганах сучасних 
    медіа.
  key_elements:
  - лаконізм
  - номінативність
  - прагматика
  motivation: Вивчення функцій називного відмінка поза художнім стилем.
listening_situations:
- media_type: лекція
  setting: Фрагмент лекції з синтаксису про називний відмінок у системі 
    відмінкових форм.
  focus_points:
  - термінологія
  - класифікація функцій
  - інверсійні моделі
  motivation: Сприйняття лінгвістичного аналізу на слух.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть есе-роздум ''Україна — це...'', використовуючи називний відмінок
    у різних синтаксичних функціях: підмет, присудок, прикладка, номінативне речення.'
  requirements:
  - мінімум 250 слів
  - щонайменше 4 різні функції називного відмінка
  - стилістична інверсія
  motivation: Закріплення всіх функцій називного відмінка у зв'язному тексті.
  model_answer: Текст має демонструвати розуміння семантичних і стилістичних 
    відтінків називного відмінка в різних позиціях.
discussion_topics:
- context: Чому називний відмінок — найбільш 'незалежний' у системі українських 
    відмінків?
  questions:
  - Як інверсія підмета і присудка змінює стилістичне забарвлення речення?
  - Чому номінативні речення типові для поезії та публіцистики, але не для 
    наукового стилю?
  motivation: Розвиток навичок лінгвістичної рефлексії про функції називного 
    відмінка.
content_outline:
- section: Називний відмінок у системі відмінків
  words: 1000
  subsections:
  - 'Місце називного відмінка серед семи відмінків: незалежна форма'
  - 'Називний як словникова форма іменника: цитатна та номінативна функції'
  - 'Опозиція називний — непрямі відмінки: синтаксична автономність'
  key_concepts:
  - називний
  - номінація
  - словникова форма
- section: Синтаксичні функції називного відмінка
  words: 1000
  subsections:
  - 'Підмет: називний як граматичний суб''єкт дії'
  - 'Іменна частина складеного присудка: Київ — столиця України'
  - Прикладка, звертання та називний уявлення (теми)
  key_concepts:
  - підмет
  - присудок
  - прикладка
- section: Стилістична інверсія з називним відмінком
  words: 1000
  subsections:
  - 'Порядок слів і називний: пряма та інверсована позиції підмета'
  - Інверсія в художньому та публіцистичному стилях
  - 'Емфатичний називний: фокусування уваги на суб''єкті'
  key_concepts:
  - інверсія
  - порядок слів
  - емфаза
- section: Номінативні речення та стилістика
  words: 1000
  subsections:
  - 'Номінативне речення як односкладне: структура та функції'
  - Називний теми (сегментована конструкція) у публіцистиці
  - Ланцюжки номінативних речень як засіб динаміки та ритму
  key_concepts:
  - номінативне речення
  - сегментація
  - ритм
- section: Підсумок — Summary
  words: 300
  points:
  - The nominative case (називний відмінок) extends beyond the subject (підмет) 
    to function as a nominal predicate (Київ — столиця України), apposition 
    (прикладка), and nominative of representation (називний теми/уявлення).
  - "Stylistic inversion and nominal sentences (номінативні речення) are key expressive
    tools for emphasis and rhythm. Self-check: What is the syntactic role of both
    nouns in 'Київ — столиця України'? Write 3 nominal sentences describing your current
    surroundings. What is the difference between a regular subject and a nominative
    of representation?"
