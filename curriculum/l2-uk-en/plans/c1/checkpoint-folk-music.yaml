module: c1-098
level: C1
sequence: 98
slug: checkpoint-folk-music
version: 1.0.2
title: 'Контрольна точка: Музичний фольклор та народне мистецтво'
subtitle: 'Підсумковий контроль: музика, танці, декоративне мистецтво'
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
- 'Перевірити та систематизувати знання про музичний фольклор України: кобзарська
  традиція, обрядові пісні, думи.'
- Оцінити розуміння народного танцю та його регіональних форм.
- 'Підтвердити навички аналізу декоративного мистецтва: писанка, вишиванка, гончарство.'
- Продемонструвати вміння обговорювати народне мистецтво в академічному та 
  публіцистичному регістрах.
reading_situations:
- source_type: комплексний текст
  topic: 'Синтетичний огляд українського музичного фольклору: від архаїчних обрядових
    пісень до думового епосу.'
  key_elements:
  - кобзарство
  - обрядовість
  - ладова система
  - мелодика
  motivation: Контрольне читання для перевірки засвоєння музикознавчої 
    термінології.
- source_type: текст для редагування
  topic: 'Опис народного мистецтва з навмисними помилками: плутанина між регіональними
    стилями, хронологічні помилки.'
  key_elements:
  - точність
  - атрибуція
  - хронологія
  motivation: Перевірка знання конкретних фактів і вміння редагувати текст.
listening_situations:
- media_type: аудіо
  setting: 'Добірка фрагментів: кобзарська дума, обрядова пісня, народний інструментал.'
  focus_points:
  - ідентифікація жанру
  - розпізнавання інструментів
  - визначення регіону
  motivation: Контрольне аудіювання автентичного фольклорного матеріалу.
writing_tasks:
- task_type: аналітичне есе
  prompt: Проаналізуйте роль кобзарської традиції у формуванні національної 
    пам'яті та ідентичності (300-350 слів). Чому радянська влада знищувала 
    кобзарів?
  requirements:
  - академічний стиль
  - конкретні приклади
  - аналіз причин і наслідків
  motivation: Синтез знань про музичний фольклор у критичному контексті.
  model_answer: Текст має пов'язати знищення кобзарів із радянською культурною 
    політикою та показати значення традиції для збереження пам'яті.
discussion_topics:
- context: Народне мистецтво між музеєм та повсякденням.
  questions:
  - Чи потрібно зберігати народне мистецтво 'як воно було', чи воно має 
    еволюціонувати?
  - Як сучасні українські музиканти переосмислюють фольклорну спадщину?
  motivation: Підсумкова дискусія про місце народного мистецтва в сучасності.
content_outline:
- section: 'Музичний фольклор: підсумковий огляд'
  words: 1000
  subsections:
  - 'Кобзарство та бандуристика: традиція, знищення, відродження'
  - 'Обрядові пісні: колядки, щедрівки, веснянки, жниварські'
  - 'Думи як епічний жанр: структура, мелодика, зміст'
  key_concepts:
  - кобзарство
  - обрядовість
  - дума
- section: Народний танець та інструментальна музика
  words: 1000
  subsections:
  - 'Гопак і козачок: символіка та хореографія'
  - 'Регіональні танці: коломийка, аркан, метелиця'
  - 'Народні інструменти: бандура, сопілка, цимбали, трембіта'
  key_concepts:
  - хореографія
  - інструмент
  - регіональність
- section: 'Декоративне мистецтво: синтез форм'
  words: 1000
  subsections:
  - 'Писанка: символіка орнаменту, техніка, регіональні відмінності'
  - 'Вишиванка: семіотика візерунків, кольорів, регіональних стилів'
  - 'Гончарство та різьбярство: від утилітарного до мистецького'
  key_concepts:
  - орнамент
  - символіка
  - семіотика
- section: Народне мистецтво в сучасному контексті
  words: 1000
  subsections:
  - 'Фольклор як бренд: етнофестивалі, дизайн, мода'
  - 'Загрози автентичності: комерціалізація, стилізація, кітч'
  - 'Цифрове збереження: архіви, бази даних, онлайн-музеї'
  key_concepts:
  - автентичність
  - збереження
  - комерціалізація
- section: Підсумок — Summary
  words: 300
  points:
  - 'Review the core elements of Ukrainian folklore: musical traditions (kobzarstvo,
    dumas, ritual songs), choreographic forms (hopak, arkan), and decorative arts
    (pysanka, vyshyvanka). Self-check: What is the primary difference between a duma
    and an obriadova pisnia (обрядова пісня)?'
  - 'Analyze the semiotics of traditional ornaments and their transition into modern
    cultural contexts. Self-check: Describe 3 traditional Ukrainian instruments. What
    is the difference between authentic preservation (автентичність) and commercial
    kitsch (кітч)?'
