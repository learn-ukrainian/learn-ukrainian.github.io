  - стилізація
  - архівація
activity_hints:
- type: reading
  focus: 'Прочитайте текст про музичний фольклор: підсумковий огляд і дайте відповіді
    на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про народний танець та 
    інструментальна музика, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Музичний фольклор:
    підсумковий огляд». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему музичний
    фольклор: підсумковий огляд.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до музичний фольклор: підсумковий огляд: Кобзарство
    та бандуристика: традиція, знищення, відродження. Визначте спільне та відмінне.'
