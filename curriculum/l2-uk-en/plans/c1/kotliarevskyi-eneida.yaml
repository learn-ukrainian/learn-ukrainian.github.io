vocabulary_hints:
  required:
  - бурлеск (burlesque) — жанр бурлеску, елементи бурлеску; академічний реєстр
  - травестія (travesty) — перелицьована Енеїда, бурлескно-травестійний; важливо відрізняти
    від пародії
  - Еней (Aeneas) — парубок моторний, ватажок троянців; культурний архетип козака
  - побратим (brother-in-arms) — вірний побратим, козацьке побратимство; історико-літературний
    контекст
  - свитка (svytka) — традиційний одяг, носили свитку; архаїчний та етнографічний
    пласт
  - сивуха (syvukha) — кварта сивухи, пили сивуху; етнографічний реєстр
  - вертеп (vertep) — вертепна драма, стиль вертепу; зв'язок із бароковою традицією
  recommended:
  - перелицювати (to remake/refashion) — перелицьований сюжет; ключовий термін для
    опису травестії
  - пафос (pathos/passion) — патріотичний пафос; вживається для опису високого стилю
    в поемі
  - говірка (dialect/vernacular) — полтавська говірка, соковита мова; контекст розмовного
    стилю
