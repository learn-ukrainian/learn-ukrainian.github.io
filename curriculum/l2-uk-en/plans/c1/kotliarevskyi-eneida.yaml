title: 'Котляревський: Енеїда'
subtitle: 'Kotlyarevsky: Eneida'
content_outline:
- section: 'Вступ: 1798 рік — точка відліку (Introduction: 1798 as the Starting Point)'
  words: 600
  points:
  - Аналіз значення 1798 року як офіційної дати народження нової української літератури
    через вихід перших трьох частин «Енеїди».
  - Роль Тараса Шевченка у канонізації Котляревського як «батька» української літератури
    (розбір цитати «Будеш, батьку, панувати...»).
  - Порівняння переходу від архаїчної книжної мови до живого народного мовлення згідно
    з Державним стандартом (§4.4.1.1).
- section: 'Постать автора: Полтавський козак та митець (The Author: Poltava Cossack
    and Artist)'
  words: 700
  points:
  - 'Біографія Івана Котляревського: життя в Полтаві, військова служба та формування
    козацької ідентичності.'
  - 'Філософський аспект: «сміх крізь сльози» та життєствердна вітальність українців
    після ліквідації Запорозької Січі.'
  - 'Котляревський як зачинатель нових стилістичних регістрів: поєднання низького
    бурлеску з високим патріотичним пафосом.'
- section: 'Жанрові особливості: Травестія чи Пародія? (Genre Features: Travesty or
    Parody?)'
  words: 900
  points:
  - 'Визначення жанру бурлескно-травестійної поеми: як Котляревський «перелицював»
    класичний твір Вергілія.'
  - 'Типова помилка студента: розрізнення травестії (переодягання героїв у «низькі»
    шати) та пародії (висміювання чужого стилю).'
  - Порівняння античного Олімпу з українським панством та чиновництвом через призму
    гострої соціальної сатири.
- section: Енеїда як енциклопедія народознавства (Eneida as an Encyclopedia of Ethnography)
  words: 1000
  points:
  - 'Аналіз побутових описів: назви традиційних українських страв, напоїв (сивуха),
    одягу (свитка) та народних ігор.'
  - 'Образ Енея: деконструкція персонажа від гульвіси до ідеалу козацького ватажка
    та вірного побратима.'
  - 'Соціальна критика в описі пекла: відображення реалій тогочасного суду, хабарництва
    та моральних вад суспільства.'
- section: Мовне новаторство та практичний аналіз (Linguistic Innovation and Practical
    Analysis)
  words: 800
  points:
  - 'Дослідження «соковитої» полтавської говірки: робота з оригінальними цитатами
    («Еней був парубок моторний...»).'
  - 'Практичне завдання: аналіз бурлескних прийомів та засобів травестії у вибраних
    фрагментах тексту.'
  - 'Творча робота: есе на тему козацького побратимства як фундаменту національної
    ідентичності в творі.'
