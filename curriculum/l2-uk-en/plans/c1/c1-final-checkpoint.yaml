module: c1-106
level: C1
sequence: 106
slug: c1-final-checkpoint
version: '2.0'
title: Підсумковий контроль C1
subtitle: C1 Final Checkpoint
content_outline:
- section: Мовленнєва компетентність
  words: 800
  points:
  - 'Комплексний тест на перемикання між регістрами: науковий, публіцистичний, офіційний,
    розмовний.'
  - 'Визначення функціонального стилю тексту за формальними ознаками.'
  - 'Створення текстів у кількох стилях на одну тему.'
- section: Граматична точність
  words: 700
  points:
  - 'Побудова складних речень усіх типів: сурядних, підрядних, безсполучникових, комбінованих.'
  - 'Перевірка засвоєння морфологічних норм: відмінювання, дієвідмінювання, узгодження.'
  - 'Пунктуація в складних конструкціях: кома, тире, двокрапка, крапка з комою.'
- section: Лексична компетентність
  words: 700
  points:
  - 'Точність добору синонімів: розрізнення семантичних відтінків.'
  - 'Розрізнення паронімів: адрес/адреса, ефектний/ефективний, дільниця/ділянка.'
  - 'Фразеологічна обізнаність: вживання та трансформація ідіом.'
- section: Стилістичний аналіз
  words: 700
  points:
  - 'Визначення фонетичних стилістичних засобів: алітерація, асонанс, звуконаслідування.'
  - 'Визначення морфологічних та синтаксичних засобів: паралелізм, інверсія, градація.'
  - 'Визначення лексичних засобів: метафора, метонімія, оксюморон у текстах.'
- section: Культурна обізнаність
  words: 600
  points:
  - 'Українські народні традиції: обрядовість, свята, символіка.'
  - 'Образотворче мистецтво, музика, театр: базові знання української культурної спадщини.'
  - 'Культурні реалії в мовленні: лінгвокраїнознавчі одиниці.'
- section: 'Інтегроване завдання'
  words: 500
  points:
  - 'Комплексне завдання на поєднання всіх компетентностей C1: письмо + аналіз + культурні
    знання.'
  - 'Написання аналітичного тексту з використанням стилістичних засобів та культурних
    реалій.'
focus: cultural
pedagogy: TTT
objectives:
- 'Продемонструвати вільне перемикання між функціональними стилями.'
- 'Показати граматичну точність на рівні C1 у складних конструкціях.'
- 'Продемонструвати стилістичну та культурну компетентність.'
grammar:
- 'Усі типи складних речень та їхня пунктуація'
- 'Морфологічні норми: відмінювання, дієвідмінювання, узгодження'
- 'Стилістичні засоби: фонетичні, морфологічні, синтаксичні, лексичні'
phase: C1.7 [Fine Arts & High Culture]
persona:
  voice: Senior Specialist
  role: Головний екзаменатор
word_target: 4000
vocabulary_hints:
  required:
  - 'компетентність (competence) — здатність застосовувати знання та вміння; High Frequency'
  - 'діагностика (diagnostics) — визначення рівня знань та вмінь'
  - 'інтеграція (integration) — поєднання різних компонентів у цілісність'
  - 'підсумковий (final/summative) — такий, що підбиває підсумки'
activity_hints:
- type: quiz
  focus: 'Комплексна перевірка граматичних, лексичних та стилістичних знань'
  items: 20
- type: reading
  focus: 'Аналіз автентичних текстів із визначенням стилю та засобів виразності'
  items: 4
- type: essay-response
  focus: 'Інтегроване письмове завдання на всі компетентності C1'
  items: 2
- type: error-correction
  focus: 'Виправлення граматичних, пунктуаційних та стилістичних помилок'
  items: 15
