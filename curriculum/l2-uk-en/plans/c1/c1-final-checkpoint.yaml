title: 'Фінальний етап: Системний огляд та синтез знань'
subtitle: 'Фінальний етап: систематичний огляд та синтез знань'
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
- Систематизувати знання з граматики та стилістики української мови на рівні С1, зосередивши увагу на складних випадках синтаксису.
- Продемонструвати вільне володіння академічним, офіційно-діловим та публіцистичним регістрами в різноманітних контекстах.
- Здійснити підсумковий синтез культурно-історичних знань, отриманих протягом усього курсу.
- Підготувати базу для переходу до рівня С2 (Mastery) через практику критичного мислення та аналізу першоджерел.
reading_situations:
- source_type: наукова стаття
  topic: 'Стан та перспективи розвитку української мови в епоху глобалізації: соціолінгвістичний аналіз.'
  key_elements:
  - мовна стійкість
  - дифузія
  - пуризм
  - інтернаціоналізація
  - мовна політика
  motivation: Підсумкова перевірка навичок роботи з найскладнішим типом академічного тексту.
- source_type: політичний огляд
  topic: 'Україна в геополітичному контексті XXI століття: виклики, загрози та стратегічні пріоритети.'
  key_elements:
  - суверенітет
  - інтеграція
  - безпековий ландшафт
  - суб'єктність
  - національні інтереси
  motivation: Аналіз складних суспільно-політичних текстів з використанням абстрактної лексики.
listening_situations:
- media_type: лекція
  setting: Фрагмент виступу провідного історика про тяглість української державної традиції від Русі до сьогодення.
  focus_points:
  - історична пам'ять
  - етапи державотворення
  - міфи та факти
  - європейський вектор
  motivation: Перевірка здатності сприймати тривалі логічні побудови в усному науковому мовленні.
- media_type: інтерв'ю
  setting: Панельна дискусія експертів з різних галузей про майбутнє України після війни.
  focus_points:
  - відбудова
  - соціальна згуртованість
  - інноваційний розвиток
  - роль діаспори
  motivation: Сприйняття багатофігурної дискусії з різними темпами мовлення та акцентами.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Напишіть розгорнуте есе на тему: ''Культура як фундамент національної безпеки: уроки минулого та візія майбутнього''.
    Спирайтеся на вивчений матеріал про літературу, мистецтво та історію України.'
  requirements:
  - мінімум 500 слів
  - використання безсполучникових речень та складних синтаксичних конструкцій
  - наведення принаймні трьох аргументів з різних сфер (історія, література, сучасність)
  motivation: Фінальна перевірка здатності створювати складні, логічно вибудувані тексти з високим рівнем мовної вправності.
  model_answer: Висловлення має демонструвати глибоке розуміння взаємозв'язку між культурною ідентичністю та політичною стабільністю,
    містити посилання на конкретні історичні події (наприклад, Розстріляне відродження) та сучасні культурні процеси, а також
    бути бездоганним з точки зору пунктуації та стилістики.
discussion_topics:
- context: Рівень С1 передбачає здатність розуміти прихований зміст та іронію. Обговорімо, як змінилася роль українського
    гумору та сатири від Івана Котляревського до сучасних медіа.
  questions:
  - Чому сміх часто стає формою спротиву в українській культурі?
  - Як трансформувалася мова сатири в цифрову епоху (від фейлетонів до мемів)?
  motivation: Практика використання стилістично маркованої лексики та розуміння культурних кодів.
