module: c1-084
level: C1
sequence: 84
slug: checkpoint-c1-5
version: '1.1'
title: "Підсумковий контроль: рівень C1.5"
subtitle: "Підсумковий контроль: C1.5"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Оцінити рівень засвоєння складних граматичних та лексичних конструкцій блоку
    C1.5."
  - "Перевірити навички критичного аналізу текстів різних функціональних стилів."
  - "Проконтролювати вміння створювати розгорнуті аргументативні тексти з дотриманням
    стилістичних норм."
  - "Підтвердити готовність до переходу на наступний етап вивчення мови (C1+ / C2)."

reading_situations:
  - source_type: "науково-теоретична стаття"
    topic: "Специфіка українського наукового дискурсу в умовах постколоніальної трансформації."
    key_elements: ["дискурсивні практики", "деколонізація", "термінологічна уніфікація"]
    motivation: "Перевірка розуміння глибоких концептуальних зв'язків та вміння виокремлювати
      авторську позицію."

listening_situations:
  - media_type: "відео"
    setting: "Круглий стіл експертів з питань мовної політики та національної безпеки
      України."
    focus_points: ["аргументація сторін", "використання риторичних фігур", "підсумовування
          дискусії"]
    motivation: "Оцінка навичок сприйняття на слух спонтанного фахового мовлення з
      високим темпом."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть академічне есе (450-500 слів) на тему: 'Вплив цифрових технологій
      на розвиток та трансформацію сучасної літературної мови'."
    requirements: ["використання складного синтаксису", "вживання термінології", "логічна
          послідовність аргументів"]
    motivation: "Підсумкова перевірка письмової компетенції та здатності до синтезу
      ідей."
    model_answer: "Твір має містити чітке формулювання тези, два-три розгорнуті аргументи
      з прикладами та висновок. Важливо використати засоби хеджингу та складну пунктуацію."

discussion_topics:
  - context: "Дебати на тему: 'Чи є пуризм необхідним заходом для захисту української
      мови від суржику та запозичень?'"
    questions: ["Які аргументи 'за' та 'проти' радикального очищення мови ви можете
          навести?", "Як знайти баланс між збереженням традиції та природним розвитком
          мови?", "Яка роль індивіда у формуванні мовної культури суспільства?"]
    motivation: "Оцінка навичок ведення полеміки, швидкості реакції та багатства вокабуляру."

content_outline:
  - section: "Контроль лексико-фразеологічної компетенції"
    words: 1000
    subsections:
      - "Вживання паронімів та омонімів у науковому стилі"
      - "Фразеологізми в офіційно-діловому та публіцистичному регістрах"
      - "Аналіз та виправлення складних лексичних помилок"
    key_concepts:
      - "семантична точність"
      - "фразеологічна норма"
      - "слововживання"
  - section: "Синтаксичний та пунктуаційний практикум"
    words: 1000
    subsections:
      - "Складні речення з різними видами зв'язку: аналіз структури"
      - "Пунктуація у конструкціях з відокремленими членами та вставними одиницями"
      - "Редагування синтаксичних конструкцій з порушенням логічних зв'язків"
    key_concepts:
      - "пунктограма"
      - "синтаксична цілісність"
      - "логічна послідовність"
  - section: "Стилістичний аналіз та редагування"
    words: 1000
    subsections:
      - "Визначення функціональних стилів та їх маркерів у запропонованих текстах"
      - "Трансформація тексту з одного стилю в інший (наприклад, з публіцистичного
        в науковий)"
      - "Критика стилістичних помилок та кальок у професійних текстах"
    key_concepts:
      - "стилістична адекватність"
      - "жанрова форма"
      - "редагування"
  - section: "Стратегії академічного письма та виступу"
    words: 1000
    subsections:
      - "Компресія інформації: написання анотації до великого наукового тексту"
      - "Побудова логічної структури аргументативного виступу"
      - "Аналіз прийомів переконування у промовах відомих діячів"
    key_concepts:
      - "аргументація"
      - "компресія тексту"
      - "риторична майстерність"

vocabulary:
  required:
    - автентичність
    - детермінованість
    - інтерпретація
    - методологія
    - парадигма
    - рефлексія
    - синтез
    - трансформація
  recommended:
    - апробація
    - верифікація
    - когнітивний
    - концептуальний
    - системність

activity_hints:
  - type: essay-response
    description: "Write an academic essay (200-250 words) synthesizing knowledge from
      C1.5 modules — stylistics, syntax, register — on a given topic about language
      and technology."
  - type: critical-analysis
    description: "Analyze a complex text and perform full linguistic evaluation —
      identify register, stylistic devices, syntactic patterns, and evaluate argumentation
      quality."
  - type: error-correction
    description: "Fix all types of errors in a deliberately flawed academic text —
      lexical calques, register mixing, syntactic errors, punctuation mistakes."
  - type: essay-response
    description: "Complete a cloze passage from a scientific article with missing
      modal markers, connectors, and complex syntactic constructions."
  - type: select
    description: "Choose the most appropriate stylistic variant for given communicative
      situations — from high formal to intimate register."

activities:
  types_required:
    - essay-response
    - critical-analysis
    - error-correction
    - translate
    - cloze
  min_items_per_type: 10
  total_min_items: 50

references:
  - "Глазова, 11 клас (2019): §1-45 — Загальний огляд мовних та стилістичних норм"
  - "Авраменко, 11 клас (2019): Стилістична норма — підсумковий огляд"
  - "Заболотний, 11 клас (2019): Культура мовлення, мовна норма"

