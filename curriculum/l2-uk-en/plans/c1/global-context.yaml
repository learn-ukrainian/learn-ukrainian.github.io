module: c1-027
level: C1
sequence: 27
slug: global-context
version: '1.0'
title: "Україна в глобальному контексті: Дипломатія та геополітика"
subtitle: "Global Context and International Diplomacy"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Аналізувати роль України в сучасних міжнародних відносинах та глобальних інституціях."
  - "Володіти лексикою та етикетом дипломатичного листування та переговорів."
  - "Оцінювати вплив геополітичних змін на національну безпеку та економіку України."
  - "Досліджувати історію української дипломатії: від княжих союзів до сучасної зовнішньої політики."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Аналіз Будапештського меморандуму та викликів міжнародного права в XXI столітті."
    key_elements: ["гарантії безпеки", "територіальна цілісність", "прецедент"]
    motivation: "Вивчення юридичної термінології в контексті глобальної безпеки."
  - source_type: "історичне джерело"
    topic: "Дипломатичне листування Івана Мазепи з європейськими монархами."
    key_elements: ["протокол", "союз", "протекторат"]
    motivation: "Зв'язок історичної суб'єктності України з сучасним дипломатичним дискурсом."

listening_situations:
  - media_type: "відео"
    setting: "Виступ Міністра закордонних справ України на Генеральній Асамблеї ООН."
    focus_points: ["риторичні прийоми", "ключові меседжі", "аргументація"]
    motivation: "Аналіз високого ораторського стилю в міжнародній дипломатії."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Складіть дипломатичну ноту або звернення до міжнародної організації з проханням про підтримку культурних проектів з відновлення спадщини в Україні."
    requirements: ["мінімум 250 слів", "використання сталих дипломатичних виразів", "логічна структура"]
    motivation: "Відпрацювання навичок офіційного письма на міжнародному рівні."
    model_answer: "Текст має містити формальне звертання, опис проблеми, конкретну пропозицію та запевнення у повазі. Використання термінів 'співробітництво', 'міжнародна підтримка', 'декларація'."

discussion_topics:
  - context: "Глобалізація vs Національна ідентичність: як Україні зберегти унікальність у відкритому світі?"
    questions:
      - "Чи загрожує поширення англійської мови статусу української в бізнесі та науці?"
      - "Якою має бути стратегія 'м'якої сили' (soft power) України за кордоном?"
      - "Як глобальні кліматичні зміни впливають на геополітичну вагу України як експортера продовольства?"
    motivation: "Розвиток навичок системного аналізу глобальних процесів."

content_outline:
  - section: "Основи міжнародного права та інституцій"
    words: 1000
    subsections:
      - "Україна в ООН, Раді Європи та ОБСЄ: досвід та перспективи"
      - "Шлях до ЄС та НАТО: адаптація законодавства та стандартів"
      - "Міжнародне гуманітарне право та захист прав людини"
    key_concepts:
      - "ратифікація"
      - "резолюція"
      - "колективна безпека"
  - section: "Дипломатичний протокол та етикет"
    words: 1000
    subsections:
      - "Мова дипломатичних документів: ноти, меморандуми, угоди"
      - "Етикет офіційних візитів та міжнародних конференцій"
      - "Мистецтво переговорів та досягнення консенсусу"
    key_concepts:
      - "компроміс"
      - "акредитація"
      - "декларація"
  - section: "Публічна дипломатія та культурний вплив"
    words: 1000
    subsections:
      - "Формування бренду 'Україна' у світі: від культури до технологій"
      - "Роль діаспори у просуванні національних інтересів"
      - "Протидія дезінформації на міжнародній арені"
    key_concepts:
      - "суб'єктність"
      - "м'яка сила"
      - "іміджмейкінг"
  - section: "Глобальні виклики та роль України"
    words: 1000
    subsections:
      - "Продовольча безпека та Україна як 'житниця світу'"
      - "Екологічна дипломатія та повоєнне відновлення довкілля"
      - "Енергетична незалежність у геополітичному вимірі"
    key_concepts:
      - "експорт"
      - "сталий розвиток"
      - "ресурсний потенціал"

vocabulary:
  required:
    - дипломатія
    - геополітика
    - суверенітет
    - інтеграція
    - безпека
    - партнерство
    - договір
    - прецедент
  recommended:
    - багатовекторність
    - консолідація
    - суб'єктність
    - солідарність
    - пріоритет

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - select
    - translate
  min_items_per_type: 5
  total_min_items: 25

