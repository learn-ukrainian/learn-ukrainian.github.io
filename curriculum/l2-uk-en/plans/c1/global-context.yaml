module: c1-027
level: C1
sequence: 27
slug: global-context
version: '2.0'
title: 'Глобальний контекст: Україна, ЄС та НАТО'
content_outline:
- section: Вступ — Україна у світовому контексті (Introduction — Ukraine in Global
    Context)
  words: 500
  points:
  - 'Геополітичне положення та суб''єктність України: акцент на ролі держави як активного
    суб''єкта («виборює/інтегрується»), а не просто об''єкта міжнародної політики
    згідно з вимогами стандарту §3.9.'
  - 'Зовнішня політика та Конституційне закріплення: аналіз змін до Конституції 2019
    року, що закріпили стратегічний курс на ЄС та НАТО як незворотний екзистенційний
    вибір.'
  - 'Дипломатична культура мовлення: розрізнення понять «відносини» (diplomatic relations)
    та «відношення» (attitude/math) — виправлення типової помилки у професійному контексті.'
- section: Європейський Союз (European Union)
  words: 700
  points:
  - 'Структура ЄС та статус України: чітке розмежування категорій «кандидат» та «член»,
    аналіз Копенгагенських критеріїв та етапів набуття членства.'
  - 'Історичний вибір: Революція Гідності (Євромайдан) 2013 року як відправна точка
    сучасної інтеграції через відмову від підписання Угоди про асоціацію.'
  - 'Угода про асоціацію та імплементація законодавства: процес приведення українських
    норм у відповідність до європейських стандартів.'
- section: НАТО — Північноатлантичний Альянс (NATO — North Atlantic Alliance)
  words: 700
  points:
  - 'Структура НАТО та євроатлантичний курс: обговорення стандартів взаємосумісності
    та процедури набуття повноправного членства в Альянсі.'
  - 'Шлях України до Альянсу: еволюція від партнерства до конституційно закріпленої
    мети, аналіз безпекових гарантій.'
  - 'Співробітництво та модернізація: спільні навчання, реформування сектору безпеки
    та поглиблення міжнародного співробітництва у сфері оборони.'
- section: Міжнародні організації та норми дипломатії (International Organizations
    and Diplomatic Norms)
  words: 600
  points:
  - 'Взаємодія з ООН, МВФ, Світовим банком та Радою Європи: роль міжнародних інституцій
    у підтримці українських реформ та демократії.'
  - 'Юридичний вимір: процес ратифікації міжнародних угод парламентом та набуття ними
    чинності у внутрішньому правовому полі.'
  - 'Культура професійного спілкування: правильне вживання нормативного вислову «брати
    участь» замість поширеної помилки «приймати участь».'
- section: Дипломатичний регістр (Diplomatic Register)
  words: 600
  points:
  - 'Офіційно-діловий стиль: використання пасивних конструкцій та безособових речень
    для забезпечення об''єктивності, характерної для дипломатичних документів.'
  - 'Дипломатичні кліше та термінологія: опрацювання сталих виразів «курс на євроінтеграцію»,
    «гармонізація стандартів», «висловити глибоке занепокоєння».'
  - 'Граматика офіційних звернень: правильне вживання прийменника «до» у формальних
    контекстах (наприклад, «вступати до ЄС»).'
- section: Виклики, реформи та перспективи (Challenges, Reforms, and Perspectives)
  words: 500
  points:
  - 'Умови членства та реформи: аналіз необхідних кроків для повної інтеграції — від
    антикорупційних заходів до судової реформи.'
  - 'Геополітичні виклики: роль України у новій архітектурі безпеки Європи та протидія
    зовнішній агресії як чинник прискорення інтеграції.'
  - 'Динаміка євроінтеграційних процесів: перспективи розширення та стратегічне значення
    України для європейської спільноти.'
- section: Практичне завдання та аналіз (Practical Task and Analysis)
  words: 400
  points:
  - 'Аналіз офіційних комюніке МЗС України та ресурсів «Європейської правди»: виявлення
    ключових термінів та синтаксичних структур дипломатичного стилю.'
  - 'Моделювання дипломатичної дискусії: аргументація позиції України щодо євроатлантичного
    курсу з використанням вивченої лексики.'
  - Написання фрагмента аналітичної записки щодо імплементації конкретної угоди з
    використанням пасивних конструкцій.
vocabulary_hints:
  required:
  - євроінтеграція (European integration) — курс на євроінтеграцію, поглиблення євроінтеграції;
    High frequency in political discourse
  - набуття членства (acquiring membership) — набуття членства в ЄС/НАТО, перспектива
    набуття членства; Formal/Legal usage
  - ратифікація (ratification) — ратифікація угоди, процес ратифікації парламентом;
    Specific to legislative approval
  - імплементація (implementation) — імплементація законодавства, план імплементації
    реформ; Formal register
  - співробітництво (cooperation) — міжнародне співробітництво, поглиблення співробітництва;
    Preferred in formal documents over «співпраця»
  - брати участь (to participate) — standard form; avoid the common Russian calque
    «приймати участь»
  - відносини (relations) — дипломатичні відносини, міжнародні відносини; always plural,
    distinguish from «відношення» (attitude)
  - курс на (course towards) — стратегічний курс на інтеграцію; collocation
  recommended:
  - євроатлантичний (Euro-Atlantic) — євроатлантичний вектор, євроатлантичні прагнення
  - гармонізація (harmonization) — гармонізація стандартів, гармонізація законодавства
  - ратифікувати (to ratify) — Верховна Рада ратифікувала документ
  - безвіз (visa-free regime) — high cultural relevance, shorthand for travel facilitation
  - суб'єктність (agency/subjectivity) — міжнародна суб'єктність України; focus on
    active role
  - вступати до (to join/enter) — correctly used with preposition «до» for organizations
