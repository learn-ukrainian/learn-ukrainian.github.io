module: c1-068
level: C1
sequence: 68
slug: kharchuvannia-ta-kulinariia
version: '1.0'
title: "Харчування та кулінарія: від рецептів до гастрокультури"
subtitle: "Харчування, кулінарія, гастрономічна культура"
focus: thematic
pedagogy: TTT
word_target: 4000
objectives:
  - "Опанувати розширену кулінарну та гастрономічну лексику на рівні C1."
  - "Вивчити мову рецептів, кулінарних описів та ресторанних оглядів."
  - "Навчитися обговорювати проблеми харчування: здорове харчування, харчова
    безпека, гастрономічний туризм."
  - "Аналізувати українську гастрономічну культуру як частину національної ідентичності."

reading_situations:
  - source_type: "кулінарний нарис"
    topic: "Борщ як код: гастрономічна ідентичність українців."
    key_elements: ["рецептура", "регіональні варіанти", "культурний символ"]
    motivation: "Вивчення кулінарної лексики в культурологічному контексті."
  - source_type: "науково-популярний текст"
    topic: "Здорове харчування: міфи та наука."
    key_elements: ["нутрієнти", "дієтологія", "баланс", "калорійність"]
    motivation: "Поєднання кулінарної та наукової лексики."

listening_situations:
  - media_type: "відеорецепт"
    setting: "Кулінарний блогер готує традиційні вареники з вишнями, коментуючи
      кожен крок."
    focus_points: ["імперативи", "кулінарна лексика", "описи консистенції та смаку"]
    motivation: "Сприйняття кулінарних інструкцій на слух."

writing_tasks:
  - task_type: "ресторанний огляд"
    prompt: "Напишіть огляд українського ресторану (250-300 слів): опис страв,
      атмосфери, обслуговування. Використайте багату описову та оціночну лексику."
    requirements: ["C1-рівнева описова лексика", "оціночні конструкції",
      "культурний контекст страв"]
    motivation: "Розвиток навичок описового та оціночного письма."
    model_answer: "Текст має містити опис смаків, текстур, презентації страв та
      загальної атмосфери з використанням метафор та порівнянь."

discussion_topics:
  - context: "Борщ — український чи 'спільний'? Гастродипломатія та культурна війна."
    questions:
      - "Чому визнання борщу частиною українського нематеріального спадку ЮНЕСКО
        було важливим?"
      - "Як гастрономічний туризм може допомогти економіці України?"
    motivation: "Обговорення ролі гастрономії в культурній ідентичності."

content_outline:
  - section: "Кулінарна лексика рівня C1"
    words: 1000
    subsections:
      - "Продукти та інгредієнти: від базових до екзотичних"
      - "Способи приготування: варити, смажити, тушкувати, запікати, маринувати"
      - "Приправи, спеції та соуси: ароматичний лексикон"
    key_concepts:
      - "кулінарія"
      - "приправа"
      - "рецептура"
  - section: "Мова рецептів та кулінарних текстів"
    words: 1000
    subsections:
      - "Структура рецепту: інгредієнти, інструкція, поради"
      - "Імперативи та інфінітиви в кулінарних текстах"
      - "Описи смаку, текстури, аромату: синестезія в гастрономічному дискурсі"
    key_concepts:
      - "рецепт"
      - "імператив"
      - "синестезія"
  - section: "Здорове харчування та дієтологія"
    words: 1000
    subsections:
      - "Нутрієнти: білки, жири, вуглеводи, вітаміни, мінерали"
      - "Дієти та харчові обмеження: вегетаріанство, безглютенова, кетодієта"
      - "Харчова безпека: маркування, термін придатності, алергени"
    key_concepts:
      - "харчування"
      - "дієтологія"
      - "безпека"
  - section: "Гастрономічна культура України"
    words: 1000
    subsections:
      - "Регіональні кухні: галицька, полтавська, одеська, козацька"
      - "Борщ, вареники, пампушки: символи та їх регіональна варіативність"
      - "Сучасна українська ресторанна культура та гастрономічний туризм"
    key_concepts:
      - "гастрономія"
      - "ідентичність"
      - "спадщина"

vocabulary:
  required:
    - харчування
    - кулінарія
    - приправа
    - рецептура
    - дієтологія
    - інгредієнт
    - гастрономія
    - маринувати
  recommended:
    - синестезія
    - варіативність
    - нутрієнт
    - калорійність
    - автентичний

activity_hints:
  - type: reading
    focus: "Прочитайте текст про кулінарна лексика рівня c1 і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про мова рецептів та кулінарних текстів, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Кулінарна лексика рівня C1». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему кулінарна лексика рівня c1."
  - type: comparative-study
    focus: "Порівняйте різні підходи до кулінарна лексика рівня c1: Продукти та інгредієнти: від базових до екзотичних. Визначте спільне та відмінне."

activities:
  types_required:
    - fill-in
    - match-up
    - critical-analysis
    - select
    - error-correction
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §1-5 — Культура мовлення: побутова лексика"
  - "Авраменко, 11 клас (2019): Описовий стиль"
  - "State Standard 2024: C1 — тематичне поле 'харчування'"

