module: c1-071
level: C1
sequence: 71
slug: summer-holidays
version: '2.0'
title: Українські свята - літній цикл
subtitle: Ukrainian Holidays - Summer Cycle
content_outline:
- section: 'Вступ: Календарно-обрядовий цикл (Introduction: Calendar Ritual Cycle)'
  words: 600
  points:
  - Огляд літнього циклу як кульмінації сонячного культу та найактивнішої фази аграрного
    року за Державним стандартом (§3.21)
  - 'Релігійний синкретизм: аналіз того, як дохристиянські свята (Купало, Спас) інтегрувалися
    з церковним календарем (Різдво Івана Хрестителя, Преображення)'
  - 'Граматична помилка учня: розрізнення прийменників ''на свято'' (для святкування/подія)
    та ''у свято'' (конкретний день) на прикладі ''Ми йдемо до лісу на свято Івана
    Купала'''
- section: 'Купальська ніч: Магія вогню та води (Kupala Night: Magic of Fire and Water)'
  words: 1000
  points:
  - 'Купальське вогнище як ритуал очищення: стрибання через вогонь парами як тест
    на майбутнє весілля (якщо руки не розійдуться)'
  - 'Лексична точність: розмежування термінів ''купальське вогнище'' (ритуальне),
    ''багаття'' (загальне) та ''ватра'' (пастуше або західноукраїнське)'
  - 'Водна стихія: обряд плетіння вінків та їх пускання на воду як спосіб гадання
    на дівочу долю'
  - 'Культурний гачок: Легенда про цвіт папороті як символ пошуку абсолютного знання,
    здатності розуміти мову тварин та бачити скарби'
- section: Міфологія та народні забобони (Mythology and Folk Superstitions)
  words: 800
  points:
  - 'Русальний тиждень: народні забобони про ''небезпечний час'' та міфічних істот
    лісу й води (Марена, русалки)'
  - 'Помилка учня: змішування символіки Коляди (зима) та Купала (літо) через схожі
    дохристиянські корені — фокус на елементах вогню та природи'
  - Аналіз ролі народних вірувань у формуванні національної ідентичності та їх відображення
    в етнографічних записах
- section: Цикл Спаса та обряди врожаю (Spas Cycle and Harvest Rituals)
  words: 900
  points:
  - 'Три Спаси: Медовий (Маковій — освячення води та маковейчиків), Яблучний (освячення
    плодів) та Горіховий/Хлібний (завершення жнив)'
  - 'Свято врожаю: обряд обжинок, роль останнього снопа та традиційні жниварські пісні
    як подяка природі'
  - 'Перехідні точки: свято Петра і Павла як кінець весняно-літнього циклу та підготовка
    до осінньої Покрови'
- section: Етнографічний аналіз та синтез (Ethnographic Analysis and Synthesis)
  words: 700
  points:
  - 'Практичний аналіз символіки купальської пісні: інтерпретація образів вогню, води
    та рослинності з позиції етнографа'
  - 'Творче завдання: написання есе про аграрну магію літнього циклу та її зв''язок
    із сучасними культурними практиками'
  - 'Міжпредметні зв''язки: підготовка до вивчення творів Лесі Українки (''Лісова
    пісня'') та М. Коцюбинського через міфологічний контекст'
focus: cultural
pedagogy: CBI
objectives:
- Learner can describe the rituals of Ivan Kupala (fire, water, fern flower)
- Learner can explain the symbolism of Green Week (Troitsia)
- Learner can distinguish between the three Spas holidays (Honey, Apple, Nut)
- Learner can discuss the pre-Christian roots of summer traditions
grammar:
- nature vocabulary
- mythical descriptions
phase: C1.5 Folk Culture & Arts
persona:
  voice: Senior Specialist
  role: Етнограф
word_target: 4000
vocabulary_hints:
  required:
  - Купала (Kupala) — святкувати Купала, купальська ніч, купальське вогнище; висока
    частотність
  - Папороть (Fern) — цвіт папороті, шукати папороть; ключовий міфологічний символ
  - Вінок (Wreath) — плести вінок, пускати вінок на воду, дівочий вінок; центральний
    обрядовий предмет
  - Жнива (Harvest) — початок жнив, обжинки, жниварські пісні; сільськогосподарський
    цикл
  - Спас (Spas/Savior) — Яблучний Спас, Медовий Спас, святити яблука; релігійно-народне
    свято
  - Забобон (Superstition) — народні забобони, вірити в забобони; за Держстандартом
    C1
  - Обряд (Ritual) — календарно-обрядовий цикл, язичницький обряд; високий регістр
  recommended:
  - Вогнище (Bonfire/Hearth) — ритуальний вогонь; не плутати з 'ватра'
  - Синкретизм (Syncretism) — поєднання релігійних та язичницьких традицій
  - Очищення (Purification) — духовне та фізичне очищення через вогонь/воду
  - Покрова (Pokrova/Protection) — свято переходу до осені та весільного сезону
