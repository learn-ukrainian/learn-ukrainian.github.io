module: c1-068
level: C1
sequence: 68
slug: persuasive-speech
version: '1.1'
title: "Риторська майстерність та переконувальне мовлення"
subtitle: "Риторична майстерність і переконливе мовлення"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Опанувати основні риторичні фігури та прийоми переконування в українській мові."
  - "Аналізувати структуру та логічну послідовність успішної публічної промови."
  - "Розрізняти етос, пафос та логос як фундамент ефективної аргументації."
  - "Розвивати навички розпізнавання маніпулятивних технік та логічних помилок у дискурсі."

reading_situations:
  - source_type: "політична промова"
    topic: "Аналіз виступу українського державного діяча на засіданні ООН."
    key_elements: ["риторичні запитання", "градація", "апеляція до цінностей"]
    motivation: "Вивчення засобів міжнародного переконування та дипломатичної риторики."
  - source_type: "наукове есе"
    topic: "Аристотелівська традиція в українській риториці XVII-XVIII століть."
    key_elements: ["бароковий стиль", "алегорія", "доказовість"]
    motivation: "Розуміння історичного підґрунтя українського ораторського мистецтва."

listening_situations:
  - media_type: "відео"
    setting: "Презентація інноваційного проекту (pitch deck) перед інвесторами українською
      мовою."
    focus_points: ["структура 'проблема-рішення'", "використання метафор", "впевненість
          інтонації"]
    motivation: "Розвиток навичок переконувального мовлення в бізнес-середовищі."
  - media_type: "лекція"
    setting: "Майстер-клас із публічних виступів: як подолати страх та завоювати увагу
      аудиторії."
    focus_points: ["контакт із залом", "паузи", "риторична етика"]
    motivation: "Отримання практичних порад щодо вдосконалення власного ораторського
      стилю."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть текст публічної промови (300-400 слів) на тему захисту екології
      або соціальної справедливості в Україні. Використовуйте щонайменше п'ять різних
      риторичних фігур."
    requirements: ["наявність яскравого вступу та сильного фіналу", "логічна аргументація",
      "використання засобів емоційного впливу"]
    motivation: "Практичне застосування риторичного інструментарію для створення впливового
      тексту."
    model_answer: "Промова повинна містити антитезу, анафору, риторичні вигуки та
      чіткий заклик до дії."

content_outline:
  - section: "Класична риторика та сучасний контекст"
    words: 1000
    subsections:
      - "Три кити риторики: Етос (авторитет), Пафос (емоції), Логос (логіка)"
      - "П'ять етапів створення промови: від інвенції до акції"
      - "Українська ораторська школа: від Феофана Прокоповича до сучасності"
    key_concepts:
      - "аргументація"
      - "оратор"
      - "дискурс"
  - section: "Риторичний інструментарій: Фігури та тропи"
    words: 1000
    subsections:
      - "Фігури думки: риторичне запитання, заперечення, іронія"
      - "Фігури слова: анафора, епіфора, паралелізм, антитеза"
      - "Використання метафор та порівнянь для візуалізації аргументів"
    key_concepts:
      - "стилістична фігура"
      - "експресія"
      - "риторичний ефект"
  - section: "Структура та композиція переконувального тексту"
    words: 1000
    subsections:
      - "Екзордіум (вступ): як захопити увагу з перших секунд"
      - "Аргументація та контраргументація: робота з запереченнями"
      - "Перорація (висновок): мобілізація аудиторії та фінальний акорд"
    key_concepts:
      - "композиція"
      - "теза"
      - "антитеза"
  - section: "Психологія переконування та етика мовлення"
    words: 1000
    subsections:
      - "Невербальні компоненти ораторської майстерності: жест, погляд, голос"
      - "Маніпулятивні технології vs етичне переконування"
      - "Адаптація промови до різних типів аудиторії"
    key_concepts:
      - "персуазивність"
      - "сугестія"
      - "комунікативна стратегія"

vocabulary:
  required:
    - риторика
    - переконування
    - аргумент
    - теза
    - оратор
    - маніпуляція
    - красномовство
    - аудиторія
  recommended:
    - персуазивність
    - софістика
    - елоквенція
    - анафора
    - епіфора

activity_hints:
  - type: critical-analysis
    description: "Analyze a UN speech by a Ukrainian official — identify ethos, pathos,
      and logos elements, rhetorical figures, and their persuasive effectiveness."
  - type: error-correction
    description: "Fix a poorly structured persuasive speech — weak thesis, missing
      call to action, logical fallacies, ineffective rhetorical devices."
  - type: essay-response
    description: "Write a persuasive speech opening (100-150 words) on environmental
      or social justice in Ukraine, using at least 5 different rhetorical figures."
  - type: reading
    description: "Read an excerpt from Ukrainian Baroque oratory (Феофан Прокопович)
      and identify the classical rhetorical structure (inventio, dispositio, elocutio)."
  - type: match-up
    description: "Match rhetorical concepts (етос, пафос, логос, інвенція, елокуція)
      with their definitions, functions, and examples from Ukrainian speeches."

activities:
  types_required:
    - critical-analysis
    - authorial-intent
    - error-correction
    - essay-response
    - reading
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Заболотний, 11 клас (2019): с. 10-14 — Риторичні фігури"
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка, публічний виступ"
  - "Караман, 10 клас (2018): §38 — Лексичні засоби стилістики, риторика"

connects_to:
  previous: "slang-youth"
  next: "istoriia-ukrainskoi-literatury"
