module: c1-104
level: C1
sequence: 104
slug: obrazotvorche-mystetstvo-2
version: '1.2'
title: "Образотворче мистецтво II: Авангард, модернізм та сучасні практики"
subtitle: "Образотворче мистецтво II: авангард, модернізм і сучасність"
focus: culture
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати внесок українських художників у світовий авангард (Малевич, Богомазов,
    Екстер)."
  - "Дослідити феномен 'бойчукізму' як спробу створення національного монументального
    стилю."
  - "Вивчити мистецтво 'андеграунду' та шістдесятників як форму інтелектуального спротиву."
  - "Ознайомитися з основними напрямами сучасного українського мистецтва кінця XX
    — початку XXI століття."

reading_situations:
  - source_type: "мистецтвознавча монографія"
    topic: "Олександр Богомазов: теоретик та практик кубофутуризму."
    key_elements: ["динамізм", "лінія як сила", "спектралізм", "теоретичний трактат",
      "ритм"]
    motivation: "Аналіз складних мистецьких концепцій та маніфестів авангарду."
  - source_type: "критична стаття"
    topic: "Українська Нова Хвиля 1980-90-х: відхід від канонів та народження постмодернізму."
    key_elements: ["трансавангард", "іронія", "цитатність", "необароко", "перформанс"]
    motivation: "Робота з текстами про переломні моменти в історії сучасного мистецтва."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з сучасним українським художником (напр., Іваном Марчуком або
      Тіберієм Сільваші) про філософію кольору та техніку 'пльонтанізму'."
    focus_points: ["авторська техніка", "джерела натхнення", "місце митця в соціумі",
      "медитативність мистецтва"]
    motivation: "Розвиток навичок розуміння живої мови професіоналів галузі."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте трагедію 'бойчукістів' крізь призму знищення національної
      школи монументального мистецтва. Чому їхня естетика була визнана небезпечною
      для радянської системи?"
    requirements: ["мінімум 400 слів", "використання термінів: монументалізм, фреска,
          візантизм, формалізм, репресії", "аргументація на прикладах"]
    motivation: "Глибока рефлексія на тему зв'язку політики та мистецтва."
    model_answer: "Текст повинен розкривати концепцію Михайла Бойчука про синтез візантійських
      традицій, італійського Проторенесансу та українського фольклору. Автор має пояснити
      конфлікт між ідеологією соцреалізму та пошуками 'бойчукістів', а також описати
      наслідки їхнього фізичного знищення для української культури."

discussion_topics:
  - context: "Сучасне українське мистецтво часто звертається до теми війни та травми,
      використовуючи нові медіа, інсталяції та цифрові технології."
    questions:
      - "Чи може мистецтво бути ефективним засобом терапії для суспільства під час
        кризи?"
      - "Як змінюється роль музею в епоху тотальної цифровізації та соціальних мереж?"
    motivation: "Тренування навичок дискусії про актуальні виклики сучасної культури."

content_outline:
  - section: "Український авангард: світовий вимір"
    words: 1000
    subsections:
      - "Казимир Малевич та його зв'язок з українською традицією (супрематизм)"
      - "Олександр Богомазов: київський кубофутуризм та теорія живопису"
      - "Олександра Екстер та авангардна сценографія"
    key_concepts: ["супрематизм", "кубофутуризм", "безпредметність", "експеримент"]
  - section: "Школа Михайла Бойчука: втрачений ренесанс"
    words: 1000
    subsections:
      - "Концепція 'монументалізму': від фресок до плаката"
      - "Бойчукізм як синтез візантійського стилю та народного мистецтва"
      - "Розстріляне відродження в образотворчому мистецтві: доля учнів Бойчука"
    key_concepts: ["монументалізм", "фреска", "візантизм", "трагедія"]
  - section: "Мистецтво супротиву: шістдесятники та андеграунд"
    words: 1000
    subsections:
      - "Алла Горська та Віктор Зарецький: мозаїка та боротьба за правду"
      - "Київська школа неформального мистецтва 1960-70-х років"
      - "Марія Примаченко та наївне мистецтво як оаза щирості"
    key_concepts: ["андеграунд", "дисидентство", "мозаїка", "наїв"]
  - section: "Сучасна панорама: від Нової Хвилі до сьогодні"
    words: 1000
    subsections:
      - "Український постмодернізм: Арсен Савадов, Олександр Ройтбурд"
      - "Філософія тиші Тіберія Сільваші та космізм Івана Марчука"
      - "Contemporary Art в Україні: інсталяція, відеоарт та акціонізм"
    key_concepts: ["постмодернізм", "концептуалізм", "інсталяція", "відеоарт"]

vocabulary:
  required:
    - авангард
    - супрематизм
    - кубофутуризм
    - монументалізм
    - фреска
    - мозаїка
    - андеграунд
    - інсталяція
    - концептуалізм
    - перформанс
  recommended:
    - безпредметність
    - конструктивізм
    - колаж
    - асамбляж
    - куратор
    - ретроспектива

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте мистецтвознавчу монографію про Богомазова. Визначте теоретичні
      концепції авангарду та поясніть їхнє значення."
  - type: critical-analysis
    focus: "Проаналізуйте критичну статтю про Нову Хвилю 1980-90-х. Визначте, як автор
      оцінює перехід від канонів до постмодернізму."
  - type: match-up
    focus: "Зіставте мистецькі напрями (супрематизм, бойчукізм, андеграунд, постмодернізм,
      концептуалізм) з їхніми характеристиками."
  - type: fill-in
    focus: "Доповніть текст про трагедію бойчукістів відповідними термінами (монументалізм,
      фреска, візантизм, формалізм, репресії)."
  - type: essay-response
    focus: "Напишіть аналітичний текст про знищення бойчукістів як приклад зв'язку
      між ідеологією та мистецтвом."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
  - "Авраменко, 11 клас (Укр. літ.) — Розстріляне відродження, культурний контекст"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"

