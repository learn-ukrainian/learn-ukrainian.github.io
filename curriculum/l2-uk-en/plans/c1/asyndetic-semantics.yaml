module: c1-049
level: C1
sequence: 49
slug: asyndetic-semantics
version: '1.1'
title: "Безсполучникове складне речення: семантика та розділові знаки"
subtitle: "Безсполучникові складні речення: семантика та пунктуація"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Розуміти семантичні відношення між частинами безсполучникового складного речення
    (БСР)."
  - "Майстерно володіти пунктуацією в БСР: кома, крапка з комою, двокрапка, тире."
  - "Вивчити стилістичні переваги БСР у художньому, розмовному та публіцистичному
    стилях."
  - "Навчитися перетворювати сполучникові речення на безсполучникові для досягнення
    лаконічності та динамізму."

reading_situations:
  - source_type: "художній уривок"
    topic: "Динамізм оповіді в новелах Григорія Косинки: роль БСР."
    key_elements: ["експресія", "ритміка", "лаконізм"]
    motivation: "Дослідження того, як відсутність сполучників посилює емоційну напругу."
  - source_type: "публіцистична стаття"
    topic: "Заголовки сучасних медіа як приклад використання БСР для привернення уваги."
    key_elements: ["інтрига", "стислість", "акцент"]
    motivation: "Аналіз прагматичної функції БСР у медіа-дискурсі."

listening_situations:
  - media_type: "аудіо"
    setting: "Читання поезії Ліни Костенко професійним актором."
    focus_points: ["інтонаційне оформлення безсполучникових зв'язків", "пауза як замінник
          сполучника"]
    motivation: "Розвиток інтонаційного слуху та розуміння смислових пауз."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть міні-есе (150-200 слів) на тему 'Мить, що змінила все', використовуючи
      переважно безсполучникові конструкції для передачі динаміки подій."
    requirements: ["використання двокрапки та тире в БСР", "мінімум 3 різних семантичних
          типи БСР", "високий рівень емоційності тексту"]
    motivation: "Практика створення експресивного тексту за допомогою синтаксичних
      засобів."
    model_answer: "Текст має демонструвати вміння використовувати БСР для вираження
      причини (двокрапка), наслідку чи різкої зміни подій (тире)."

discussion_topics:
  - context: "Афоризми та крилаті вислови часто мають форму БСР. Чому?"
    questions:
      - "Як відсутність сполучників впливає на запам'ятовуваність вислову?"
      - "Чи завжди БСР є однозначним для розуміння?"
    motivation: "Аналіз когнітивних та лінгвістичних аспектів стислості мовлення."

content_outline:
  - section: "Природа безсполучникового зв'язку"
    words: 1000
    subsections:
      - "Інтонація як основний засіб зв'язку в БСР"
      - "Класифікація БСР за характером смислових відношень"
      - "БСР з однорідними та неоднорідними частинами"
    key_concepts:
      - "асиндетон"
      - "інтонація"
      - "предикативність"
  - section: "Смислові відношення та пунктуація: Кома та крапка з комою"
    words: 1000
    subsections:
      - "ССР з відношеннями переліку, одночасності та послідовності"
      - "Умови вживання крапки з комою в розлогих БСР"
      - "Розрізнення БСР та простих речень з однорідними членами"
    key_concepts:
      - "перелік"
      - "автономність"
      - "структура"
  - section: "Вживання двокрапки та тире в БСР"
    words: 1000
    subsections:
      - "Двокрапка при пояснювальних, причинних та доповнювальних відношеннях"
      - "Тире при протиставленні, часових, умовних та наслідкових зв'язках"
      - "Алгоритм вибору розділового знака в БСР"
    key_concepts:
      - "експлікація"
      - "опозиція"
      - "детермінація"
  - section: "Стилістика БСР: від лаконізму до патетики"
    words: 1000
    subsections:
      - "БСР у народних прислів'ях та приказках"
      - "Використання БСР в офіційно-діловому стилі (інструкції, протоколи)"
      - "Ритмомелодика безсполучникових речень у поезії"
    key_concepts:
      - "афористичність"
      - "прагматика"
      - "мелодика"

vocabulary:
  required:
    - безсполучниковий
    - семантика
    - інтонація
    - перелік
    - пояснення
    - наслідок
    - протиставлення
    - лаконізм
  recommended:
    - асиндетон
    - динамізм
    - експресивність
    - пауза
    - редукція

activity_hints:
  - type: fill-in
    description: "Insert the correct punctuation mark (comma, semicolon, colon, or
      dash) in asyndetic complex sentences based on semantic relations."
  - type: error-correction
    description: "Fix punctuation errors in asyndetic sentences — wrong choice between
      colon and dash, missing semicolons in extended constructions."
  - type: match-up
    description: "Match punctuation marks in asyndetic sentences with the semantic
      relations they signal (пояснення → двокрапка, наслідок → тире)."
  - type: critical-analysis
    description: "Analyze proverbs and aphorisms as examples of asyndetic sentences
      — identify the semantic relation and explain the stylistic effect."
  - type: select
    description: "Choose the correct interpretation of ambiguous asyndetic sentences
      where the semantic relation could be causal, conditional, or contrastive."

activities:
  types_required:
    - error-correction
    - match-up
    - unjumble
    - fill-in
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Заболотний, 9 клас (2017): §39-40 — Безсполучникове складне речення"
  - "Авраменко, 9 клас (2017): §26-28 — Безсполучникове складне речення, розділові
    знаки"
  - "Глазова, 11 клас (2019): §25 — Правила будови складних речень, пунктуація"

