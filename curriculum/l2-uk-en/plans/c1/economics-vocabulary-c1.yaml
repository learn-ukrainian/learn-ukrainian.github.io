module: c1-033
level: C1
sequence: 33
slug: economics-vocabulary-c1
version: '1.1'
title: "Економічний дискурс: Ризики, інновації та макроекономіка"
subtitle: "Економічна лексика та аналіз ринку"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати термінологію макро- та мікроекономіки для професійного аналізу ринків."
  - "Розуміти принципи функціонування банківської системи та інвестиційного клімату
    в Україні."
  - "Навчитися аналізувати фінансову звітність та бізнес-плани в офіційному стилі."
  - "Вивчати історію української економічної думки: від Михайла Туган-Барановського
    до сучасності."

reading_situations:
  - source_type: "науковий огляд"
    topic: "Еволюція економічної теорії циклів у працях Михайла Туган-Барановського."
    key_elements: ["конь'юнктура", "інвестиції", "ринкова рівновага"]
    motivation: "Вивчення наукового економічного дискурсу з опорою на класичну українську
      школу."
  - source_type: "наукова стаття"
    topic: "Аналіз впливу цифровізації на банківський сектор України: кейс необанків."
    key_elements: ["диджиталізація", "ліквідність", "фінтех"]
    motivation: "Ознайомлення з сучасною термінологією фінансових технологій."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Бесіда з головою Національного банку України про монетарну політику
      та інфляційне таргетування."
    focus_points: ["облікова ставка", "валютні резерви", "дефіцит бюджету"]
    motivation: "Розвиток здатності сприймати складну економічну аргументацію."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть звіт про інвестиційну привабливість конкретного регіону України
      для іноземного інвестора (напр., Львівщина або Київщина)."
    requirements: ["мінімум 250 слів", "використання статистичних даних", "аналіз
          SWOT"]
    motivation: "Відпрацювання навичок бізнес-аналітики та економічного прогнозування."
    model_answer: "Текст має містити аналіз інфраструктури, трудових ресурсів та податкових
      пільг. Використання термінів 'рентабельність', 'активи', 'інвестиційний клімат'."

discussion_topics:
  - context: "Повоєнна відбудова України: план Маршалла 2.0 чи опора на власні ресурси?"
    questions:
      - "Які галузі економіки мають стати локомотивами зростання?"
      - "Як збалансувати соціальну підтримку населення та економічну лібералізацію?"
      - "Чи допоможе вступ до ЄС подолати проблему корупції в економіці?"
    motivation: "Розвиток навичок ведення стратегічних економічних дискусій."

content_outline:
  - section: "Макроекономіка та державне регулювання"
    words: 1000
    subsections:
      - "ВВП, інфляція та безробіття: як читати статистику"
      - "Бюджетна та податкова система України: виклики та реформи"
      - "Монетарна політика та роль центрального банку в стабільності"
    key_concepts:
      - "інфляція"
      - "профіцит"
      - "монетизація"
  - section: "Банківська система та фінансові ринки"
    words: 1000
    subsections:
      - "Структура банківського сектору: державні банки vs приватний капітал"
      - "Фондовий ринок та інструменти інвестування в Україні"
      - "Криптовалюти та блокчейн: правове регулювання та перспективи"
    key_concepts:
      - "капіталізація"
      - "депозит"
      - "транзакція"
  - section: "Корпоративні фінанси та стартап-культура"
    words: 1000
    subsections:
      - "Управління активами та пасивами компанії: фінансова грамотність"
      - "Венчурний капітал та розвиток ІТ-екосистеми України"
      - "Аудит та міжнародні стандарти фінансової звітності (МСФЗ)"
    key_concepts:
      - "маржинальність"
      - "дивіденди"
      - "стартап"
  - section: "Глобальна економіка та зовнішня торгівля"
    words: 1000
    subsections:
      - "Експортний потенціал України: агросектор, металургія, сервіси"
      - "Вплив глобальних ланцюгів постачання на вітчизняного виробника"
      - "Економічна дипломатія та залучення прямих іноземних інвестицій"
    key_concepts:
      - "диверсифікація"
      - "сальдо"
      - "конкурентоспроможність"

vocabulary:
  required:
    - економіка
    - інвестиції
    - бюджет
    - капітал
    - ринок
    - рентабельність
    - актив
    - дефіцит
  recommended:
    - ліквідність
    - прибуток
    - амортизація
    - кон'юнктура
    - стагнація

activity_hints:
  - type: reading
    focus: "Прочитайте текст про макроекономіка та державне регулювання і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про банківська система та фінансові ринки, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Макроекономіка та державне регулювання». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему макроекономіка та державне регулювання."
  - type: comparative-study
    focus: "Порівняйте різні підходи до макроекономіка та державне регулювання: ВВП, інфляція та безробіття: як читати статистику. Визначте спільне та відмінне."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - select
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §45 — Синтаксичні одиниці в різних стилях"
  - "Авраменко, 11 клас (2019): с. 164 — Стилістична норма"
  - "Ворон, 11 клас (2019): с. 218 — Науковий стиль мовлення"

