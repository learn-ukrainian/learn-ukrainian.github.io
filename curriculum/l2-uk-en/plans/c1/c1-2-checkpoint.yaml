module: c1-034
level: C1
sequence: 34
slug: c1-2-checkpoint
version: '1.0'
title: "Підсумковий контроль: C1.2 — Професійна комунікація та суспільство"
subtitle: "Контрольна точка C1.2"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Перевірити засвоєння лексики та комунікативних навичок у професійній та
    суспільно-політичній сферах."
  - "Оцінити вміння вести ділові переговори, писати офіційні листи та аналізувати
    медіатексти."
  - "Підтвердити здатність обговорювати суспільні проблеми (політика, економіка,
    медіа) на рівні C1."
  - "Діагностувати слабкі місця перед переходом до мовознавчого блоку."

reading_situations:
  - source_type: "комплексний текст"
    topic: "Аналітична стаття на перетині політики, економіки та медіа:
      'Інформаційна безпека як виклик для демократії'."
    key_elements: ["суспільно-політична лексика", "аргументація", "аналітичний стиль"]
    motivation: "Контрольне читання на суспільну тематику."
  - source_type: "діловий лист"
    topic: "Зразок офіційного листування з аналізом стилістичних помилок."
    key_elements: ["офіційно-діловий стиль", "етикет", "формулювання"]
    motivation: "Перевірка знання ділового мовлення."

listening_situations:
  - media_type: "дискусія"
    setting: "Фрагмент телевізійної дискусії про роль ЗМІ у формуванні громадської
      думки."
    focus_points: ["аргументація", "риторичні прийоми", "суспільна лексика"]
    motivation: "Контрольне аудіювання публіцистичного дискурсу."

writing_tasks:
  - task_type: "діловий лист"
    prompt: "Напишіть офіційний лист-пропозицію (300 слів) потенційному партнеру
      щодо співпраці в освітньому проєкті: обґрунтування, умови, очікувані результати."
    requirements: ["офіційно-діловий стиль", "чітка структура", "аргументоване
      обґрунтування"]
    motivation: "Контрольна перевірка навичок ділового листування."
    model_answer: "Текст має демонструвати бездоганний офіційно-діловий стиль з
      логічною структурою: вступ, суть пропозиції, умови, висновок."

discussion_topics:
  - context: "Підсумкова дискусія за результатами блоків C1.1-C1.2."
    questions:
      - "Які професійні комунікативні навички ви вважаєте найважливішими для роботи
        в Україні?"
      - "Як медіаграмотність допомагає протистояти дезінформації?"
    motivation: "Рефлексія над засвоєним матеріалом."

content_outline:
  - section: "Професійна комунікація: підсумок"
    words: 1000
    subsections:
      - "Ділове листування: від резюме до пропозиції про співпрацю"
      - "Етикет ділового спілкування: звертання, формули ввічливості, протокол"
      - "Цифрова комунікація: електронні листи, месенджери, відеозв'язок"
    key_concepts:
      - "протокол"
      - "ділове мовлення"
      - "етикет"
  - section: "Суспільно-політична лексика"
    words: 1000
    subsections:
      - "Політична система: демократія, парламент, вибори, громадянське суспільство"
      - "Медіаландшафт: ЗМІ, соціальні мережі, дезінформація"
      - "Економіка: ВВП, інфляція, інвестиції, ринок"
    key_concepts:
      - "демократія"
      - "медіаграмотність"
      - "інфляція"
  - section: "Тематичні поля C1.2: спорт, здоров'я, економіка"
    words: 1000
    subsections:
      - "Спортивна лексика: змагання, тренування, реабілітація"
      - "Лексика здоров'я: профілактика, діагностика, лікування"
      - "Економічна термінологія: інвестиції, податки, бюджет"
    key_concepts:
      - "тематичне поле"
      - "лексична компетенція"
      - "термінологія"
  - section: "Практикум з аналізу та редагування"
    words: 1000
    subsections:
      - "Аналіз медіатексту: виявлення маніпуляцій та порушень стилю"
      - "Редагування офіційного тексту: канцеляризми, кальки, помилки"
      - "Підготовка до мовознавчого блоку: вступ до лінгвістичної термінології"
    key_concepts:
      - "медіааналіз"
      - "редагування"
      - "лінгвістика"

vocabulary:
  required:
    - протокол
    - медіаграмотність
    - демократія
    - інфляція
    - редагування
    - компетенція
    - лінгвістика
    - аналітика
  recommended:
    - дезінформація
    - канцеляризм
    - маніпуляція
    - медіаландшафт
    - рефлексія

activity_hints:
  - type: essay-response
    description: "Write a formal business proposal letter (300 words) for an educational
      partnership — demonstrate official register and argumentation."
  - type: critical-analysis
    description: "Analyze a media text — identify manipulation techniques, evaluate
      arguments, and assess compliance with journalistic standards."
  - type: error-correction
    description: "Fix канцеляризми, calques, and register inconsistencies in a
      mixed professional/journalistic text."
  - type: fill-in
    description: "Complete sentences across C1.2 thematic fields (politics, economics,
      media, sports, health) with appropriate terminology."
  - type: match-up
    description: "Match C1.2 key concepts (медіаграмотність, діловий етикет, суспільний
      дискурс) with definitions and contextual examples."

activities:
  types_required:
    - essay-response
    - critical-analysis
    - error-correction
    - fill-in
    - match-up
  min_items_per_type: 10
  total_min_items: 50

references:
  - "Глазова, 11 клас (2019): §25-35 — Ділове мовлення, публіцистика"
  - "Авраменко, 11 клас (2019): Стилістична норма — офіційний і публіцистичний стилі"
  - "State Standard 2024: C1.2 competencies — professional and public communication"

connects_to:
