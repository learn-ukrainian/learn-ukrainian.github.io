module: c1-101
level: C1
sequence: 101
slug: operne-mystetstvo
version: '1.2'
title: "Українське оперне мистецтво: від класики до авангарду"
subtitle: "Ukrainian Opera Art: From Classics to Avant-Garde"
focus: culture
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати історичний шлях розвитку української опери від перших спроб до сучасних постановок."
  - "Дослідити творчість С. Гулака-Артемовського та М. Лисенка як фундаторів національної опери."
  - "Вивчити особливості оперної драматургії радянського періоду та феномен 'соцреалістичної опери'."
  - "Ознайомитися з експериментальними формами сучасної української опери (проєкти Nova Opera)."

reading_situations:
  - source_type: "мистецтвознавча розвідка"
    topic: "Феномен 'Запорожця за Дунаєм' С. Гулака-Артемовського: перша національна опера чи італійська традиція на українському ґрунті?"
    key_elements: ["комічна опера", "зингшпіль", "національні типи", "музична мова", "історичний контекст"]
    motivation: "Аналіз академічного дискурсу щодо витоків національного музичного театру."
  - source_type: "рецензія на виставу"
    topic: "Археологічна опера 'Chornobyldorf': деконструкція антропоцену та пошук нових сенсів."
    key_elements: ["мультидисциплінарність", "постапокаліпсис", "інструментальний театр", "деконструкція", "міф"]
    motivation: "Робота з текстами про сучасне експериментальне мистецтво."

listening_situations:
  - media_type: "відео"
    setting: "Перегляд фрагментів опери М. Лисенка 'Тарас Бульба' (сцена облоги Дубна) з подальшим обговоренням героїко-патріотичного пафосу."
    focus_points: ["лейтмотивна система", "фольклорна основа", "симфонізація опери", "вокальні партії"]
    motivation: "Розвиток навичок критичного сприйняття класичного оперного спадку."

writing_tasks:
  - task_type: "есе"
    prompt: "Чи може оперне мистецтво в Україні сьогодні бути інструментом соціальної рефлексії та деколонізації? Проаналізуйте на прикладах класичних творів (через призму сучасного прочитання) та новітніх опер."
    requirements: ["мінімум 400 слів", "використання термінів: лібрето, арія, лейтмотив, авангард, інтерпретація", "аргументована позиція"]
    motivation: "Синтез культурних та соціальних знань на високому мовному рівні."
    model_answer: "Текст має демонструвати глибоке розуміння ролі опери як синтетичного мистецтва, що здатне переосмислювати національні міфи. Автор повинен згадати як традиційні постанови (Лисенко), так і сучасні експерименти (Hryhoriv/Razumeiko), акцентуючи на трансформації музичної мови та сценічного простору."

discussion_topics:
  - context: "Сучасні оперні театри в Україні часто стикаються з дилемою: зберігати традиційний 'академічний' репертуар чи ставати майданчиками для сміливих експериментів."
    questions:
      - "Яка роль опери в сучасному українському суспільстві: це музейне мистецтво чи живий процес?"
      - "Як цифровізація та нові медіа впливають на сприйняття класичної опери молодою аудиторією?"
    motivation: "Тренування навичок дискусії в академічному та професійному регістрах."

content_outline:
  - section: "Фундатори української опери"
    words: 1000
    subsections:
      - "Семен Гулак-Артемовський: 'Запорожець за Дунаєм' як маніфест національного характеру"
      - "Микола Лисенко: створення національної оперної школи ('Різдвяна ніч', 'Утоплена', 'Тарас Бульба')"
      - "Проблема лібрето та пошук української ідентичності в умовах імперської цензури"
    key_concepts: ["національна школа", "лібрето", "комічна опера", "драматургія"]
  - section: "Опера XX століття: між ідеологією та модерном"
    words: 1000
    subsections:
      - "Оперне мистецтво 1920-х років: пошуки нової естетики (Харківська опера)"
      - "Борис Лятошинський ('Золотий обруч') та Костянтин Данькевич ('Богдан Хмельницький'): монументальність та трагізм"
      - "Радянська цензура та її вплив на розвиток оперного жанру"
    key_concepts: ["модернізм", "соцреалізм", "історична опера", "епічність"]
  - section: "Сучасна українська опера: Nova Opera та інші проєкти"
    words: 1000
    subsections:
      - "Роман Григорів та Ілля Разумейко: революція в оперному жанрі ('Йов', 'Газ', 'Чорнобильдорф')"
      - "Інструментальний театр та синтез мистецтв: опера як перформанс"
      - "Оперні фестивалі (напр., OperaFest Tulchyn) як засіб популяризації високого мистецтва"
    key_concepts: ["авангард", "перформанс", "деконструкція", "фестивальна культура"]
  - section: "Провідні оперні сцени України"
    words: 1000
    subsections:
      - "Київська, Львівська та Одеська опери: архітектура, традиції та сучасний менеджмент"
      - "Українські оперні голоси на світовій сцені: Соломія Крушельницька, Людмила Монастирська та інші"
      - "Майбутнє опери: виклики воєнного часу та стратегії розвитку"
    key_concepts: ["культурний менеджмент", "спадщина", "світовий контекст", "резистентність"]

vocabulary:
  required:
    - лібрето
    - арія
    - речитатив
    - увертюра
    - партитура
    - лейтмотив
    - симфонізація
    - колоратура
    - тенор
    - баритон
  recommended:
    - сопрано
    - мецо-сопрано
    - капельмейстер
    - імпресаріо
    - мізансцена
    - сценографія

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте мистецтвознавчу розвідку про першу національну оперу. Визначте оперну термінологію та поясніть її в контексті."
  - type: critical-analysis
    focus: "Проаналізуйте рецензію на сучасну оперу 'Chornobyldorf'. Визначте, як автор оцінює експериментальні форми та аргументує свою позицію."
  - type: match-up
    focus: "Зіставте оперні терміни (арія, речитатив, увертюра, лібрето, лейтмотив, колоратура) з їхніми визначеннями."
  - type: fill-in
    focus: "Доповніть текст про еволюцію українського оперного мистецтва відповідними термінами (комічна опера, національна школа, симфонізація, драматургія)."
  - type: essay-response
    focus: "Напишіть аналітичний текст про те, чи може оперне мистецтво бути інструментом деколонізації. Аргументуйте прикладами."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
  - "Авраменко, 11 клас (Укр. літ.) — музично-драматичний театр, Лисенко"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"

connects_to:
