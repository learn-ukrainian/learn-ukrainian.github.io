module: c1-112
level: C1
sequence: 112
slug: podillia-ta-volyn
version: 1.2.1
title: 'Поділля та Волинь: історико-етнографічні особливості та фольклор'
subtitle: 'Поділля і Волинь: історико-етнографічні особливості'
focus: history
pedagogy: seminar
word_target: 4000
objectives:
- Дослідити історичне минуле Волині та Поділля як ключових регіонів формування української державності.
- Проаналізувати специфіку народної культури, архітектури та побуту цих етнографічних зон.
- 'Вивчити фольклорне багатство регіонів: від волинських веснянок до подільських балад.'
- Осмислити складні сторінки спільної історії з сусідніми народами та процеси примирення.
reading_situations:
- source_type: історичний нарис
  topic: 'Волинь у складі Великого князівства Литовського: автономія, право та культурний розквіт.'
  key_elements:
  - статут
  - магдебурзьке право
  - удільність
  - шляхетська демократія
  motivation: Робота з академічним текстом про державно-правові традиції середньовічної України.
- source_type: культурологічне есе
  topic: 'Замки Поділля як оборонна лінія Європи: архітектура Кам''янця та Хотина в контексті протистояння Сходу та Заходу.'
  key_elements:
  - бастион
  - фортифікація
  - мультикультуралізм
  - ландшафт
  motivation: Аналіз публіцистичного тексту про військову архітектуру та історичну роль регіону.
listening_situations:
- media_type: аудіо
  setting: 'Запис експедиції етномузикологів Волинським Поліссям: виконання автентичних обрядових пісень із коментарями фахівців.'
  focus_points:
  - архаїчні лади
  - діалектні особливості
  - зв'язок пісні з календарним циклом
  motivation: Розвиток навичок розрізнення регіональних говірок та розуміння культурного контексту музики.
writing_tasks:
- task_type: репортаж
  prompt: Уявіть, що ви журналіст, який подорожує історичними містами Поділля чи Волині (Луцьк, Острог, Кам'янець-Подільський).
    Напишіть репортаж, де поєднайте опис пам'яток із роздумами про сучасне життя цих міст.
  requirements:
  - мінімум 300 слів
  - використання ефектної назви
  - поєднання фактів та суб'єктивних вражень
  motivation: Опанування жанру подорожніх нотаток та репортажної стилістики.
  model_answer: Текст має містити динамічний опис локацій (наприклад, Замок Любарта чи Острозька академія), згадку про історичних
    постатей та передавати атмосферу місця через деталі.
discussion_topics:
- context: Питання історичної пам'яті на Волині часто стають предметом гострих дискусій між Україною та Польщею, зокрема щодо
    подій Другої світової війни.
  questions:
  - Як знайти баланс між вшануванням національних героїв та необхідністю діалогу про трагічні сторінки минулого?
  - Яку роль відіграє культура та спільні мистецькі проєкти у подоланні історичних травм?
  motivation: Формування навичок тактовного ведення дискусії на складні історико-політичні теми.
content_outline:
