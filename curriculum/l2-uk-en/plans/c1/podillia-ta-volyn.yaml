  words: 1000
  subsections:
  - 'Волинська пісенна традиція: від веснянок до повстанських пісень'
  - Легенди Поділля про козаків, скарби та підземні ходи
  - 'Народне мистецтво: подільська вишивка низинкою та волинське ткацтво'
  key_concepts:
  - архаїка
  - низинка
  - усна народна творчість
  - ідентичність
- section: Регіональна ідентичність у сучасному вимірі
  words: 1000
  subsections:
  - 'Збереження спадщини: реставрація замків та створення заповідників'
  - Туристичний потенціал 'Волинського кільця' та 'Подільських товтр'
  - 'Діалог культур: міжнародні фестивалі та спільні ініціативи примирення'
  key_concepts:
