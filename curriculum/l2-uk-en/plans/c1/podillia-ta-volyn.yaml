slug: podillia-ta-volyn
version: '2.0'
title: Поділля та Волинь
subtitle: Podillia and Volyn
content_outline:
- section: 'Вступ: Серце України та історичні перехрестя (Introduction: The Heart
    of Ukraine and Historical Crossroads)'
  words: 500
  points:
  - Поділля та Волинь як стратегічні центральні регіони; історичний вплив Речі Посполитої
    та Великого князівства Литовського у контексті Держстандарту (§3.17).
  - 'Культурний гачок: З’їзд європейських монархів у Луцькому замку (1429) як свідчення
    геополітичної ваги регіону та приклад саміту середньовічної Європи.'
  - 'Лінгвістична диференціація: розмежування понять Поділля (від «долина») та Полісся
    (від «ліс») для запобігання типовій помилці змішування регіонів.'
- section: 'Поділля: Між каньйонами та білими мазанками (Podillia: Between Canyons
    and White Mazankas)'
  words: 1000
  points:
  - 'Географічна унікальність: Подільські Товтри як бар''єрний риф Сарматського моря;
    граматичний акцент на вживанні назви як pluralia tantum.'
  - 'Етнографічна архітектура: традиційна хата-мазанка, поняття «обійстя» та «садиба»
    як заміна суржиковому «дом» у професійному мовленні.'
  - 'Мистецький код: подільська вишивка (техніка низь, чорно-червоні рослинні мотиви)
    та її сприйняття як «коду нації».'
  - 'Оборонна спадщина: Кам''янець-Подільська та Хотинська фортеці як пам’ятки культури
    та неприступні оборонні мури (§3.17).'
- section: 'Волинь: Озерний край та сакральна спадщина (Volyn: Land of Lakes and Sacred
    Heritage)'
  words: 900
  points:
  - Культурний ландшафт Луцька та Рівного; літературні паралелі з творчістю Лесі Українки
    та волинською ідентичністю.
  - 'Сакральне мистецтво: Волинська іконописна школа (§3.21), специфіка чудотворних
    ікон та розвиток іконопису як високого мистецтва.'
  - 'Історична пам''ять: Волинські трагедії XX століття через призму «місць пам’яті»;
    делікатне обговорення історичної складності за стандартами C1.'
  - 'Народні промисли: волинська різьба по дереву та ткацтво як невід’ємні складники
    регіонального побуту.'
- section: 'Лінгвістичний ландшафт: Говори та діалекти (Linguistic Landscape: Dialects
    and Vernaculars)'
  words: 700
  points:
  - 'Аналіз подільського говору та волинського діалекту: фонетичні особливості та
    архаїзми як об’єкт соціолінгвістичного вивчення на рівні C1.'
  - 'Етнографічна термінологія та регіоналізми: назви страв (вареники, галушки) та
    предметів побуту в автентичному контексті.'
- section: 'Практика та синтез: Порівняльна етнологія (Practice and Synthesis: Comparative
    Ethnology)'
  words: 900
  points:
  - Порівняльний аналіз традицій, звичаїв та весільних обрядів Поділля та Волині згідно
    з вимогами Держстандарту (§3.21).
  - Написання есе про регіональну ідентичність та вплив прикордонного статусу на формування
    культури регіонів.
  - 'Дискусія на тему збереження архітектурної спадщини: від фортець до традиційних
    мазанок.'
focus: culture
pedagogy: CBI
objectives:
- Learner understands the unique cultural identities of Podillia and Volyn
- Learner can describe regional embroidery and architecture
- Learner can compare wedding traditions of Central-Western Ukraine
grammar:
- Folk terminology
- Regional dialect markers
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Краєзнавець
word_target: 4000
vocabulary_hints:
  required:
  - вишивка (embroidery) — орнаментальні мотиви, код нації, вишивати гладдю; ключовий
    етнографічний термін
  - мазанка (cob house/mazanka) — білена мазанка, традиційне житло; протиставляти
    суржиковому «дом»
  - фортеця (fortress) — неприступна фортеця, оборонні мури; вживати з назвами Кам'янецька
    та Хотинська
  - ікона (icon) — сакральне мистецтво, іконописна школа, чудотворна ікона; специфіка
    волинського мистецтва
  - діалект (dialect) — подільський говір, волинський діалект, фонетичні особливості;
    для соціолінгвістичного аналізу
  recommended:
  - обійстя (farmstead/estate) — синонім до садиба; високий етнографічний регістр
  - Товтри (Tovtry) — гірський кряж; вживати лише у формі множини (pluralia tantum)
  - низь (nyz/low-stitch) — специфічна техніка вишивки, характерна для Поділля
  - архаїзм (archaism) — використання застарілих слів для відтворення колориту
  - місце пам’яті (place of memory) — термін для опису історичних локацій за §3.17
