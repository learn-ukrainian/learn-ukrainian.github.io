  - 'Острог як центр українського Просвітництва: академія та першодруки'
  - 'Природа Волині: ліси, озера та їхнє відображення в міфології (Леся Українка)'
  key_concepts:
  - просвітництво
  - автономія
  - міфологія
  - княжа доба
- section: 'Поділля: земля замків та степових кордонів'
  words: 1000
  subsections:
  - 'Поділля як арена боротьби: між Литвою, Польщею та Османською імперією'
  - 'Архітектурний феномен Кам''янця-Подільського: місто-острів'
  - 'Етнографія Поділля: розписні хати, кераміка та традиційні килими'
  key_concepts:
  - фортифікація
  - мультикультурність
  - декоративність
