module: c1-086
level: C1
sequence: 86
slug: literaturoznavcha-terminolohiia
version: 1.1.1
title: Теорія літератури та науковий інструментарій
subtitle: Літературознавча термінологія та науковий інструментарій
focus: literature
pedagogy: workshop
word_target: 4000
objectives:
- Опанувати професійний термінологічний апарат для аналізу художніх творів різних родів та жанрів.
- Розуміти різницю між традиційними та сучасними (постструктуралістськими) методами літературного аналізу.
- Застосовувати поняття сюжету, композиції, хронотопу та нарації в практичному дослідженні тексту.
- Аналізувати систему художніх засобів (тропів та фігур) на рівні професійного літературознавця.
reading_situations:
- source_type: наукова стаття
  topic: Концепція хронотопу Михайла Бахтіна у прочитанні сучасних українських дослідників.
  key_elements:
  - часопростір
  - діалогізм
  - жанрова специфіка
  motivation: Вивчення фундаментальних категорій літературознавства на рівні високої академічної дискусії.
- source_type: рецензія
  topic: Критичний аналіз структури роману Софії Андрухович 'Амадока'.
  key_elements:
  - багатошаровість
  - інтертекстуальність
  - наратор
  motivation: Приклад використання термінології для опису складних сучасних літературних форм.
writing_tasks:
- task_type: відгук
  prompt: 'Напишіть розгорнутий літературознавчий відгук (250-300 слів) на будь-який прочитаний український твір, використовуючи
    щонайменше 10 термінів із теорії літератури (наприклад: експозиція, кульмінація, метафора, алюзія, архетип).'
  requirements:
  - науковий стиль
  - точність дефініцій
  - обґрунтованість оцінок
  motivation: Тренування навичок професійного письма в галузі гуманітарних наук.
  model_answer: Текст повинен демонструвати вміння аналізувати твір не на рівні 'подобається-не подобається', а через призму
    його поетики та структури.
discussion_topics:
- context: 'Смерть автора: чи має значення біографія та намір письменника для розуміння твору?'
  questions:
  - Як концепція Ролана Барта змінила сучасне літературознавство?
  - Чи може читач бути співавтором тексту?
  - Роль інтертекстуальності в сучасному українському романі.
  motivation: Дискусія про зміну парадигми сприйняття літературного твору в XX-XXI століттях.
- context: 'Жанрові трансформації: чому старі жанри (ода, елегія, трагедія) зникають або перетворюються на щось нове?'
  questions:
  - Чи живий роман як жанр у цифрову епоху?
  - Феномен 'автофікшн' та його популярність.
  motivation: Аналіз динаміки літературних родів та жанрів у контексті часу.
content_outline:
- section: Поняття про літературознавство як науку
  words: 1000
  subsections:
  - 'Основні галузі: теорія літератури, історія літератури, літературна критика'
  - 'Методологічні підходи: від біографічного методу до деконструкції'
  - Зв'язок літературознавства з філософією, психологією та соціологією
  key_concepts:
  - літературознавство
  - герменевтика
  - поетика
- section: Архітектоніка художнього твору
  words: 1000
  subsections:
  - 'Зміст і форма: проблема їхньої нерозривності'
  - 'Сюжет і фабула: відмінності та функції'
  - 'Композиція та її елементи: від експозиції до епілогу'
  key_concepts:
  - архітектоніка
  - конфлікт
  - перипетія
- section: Вчення про художній образ та стиль
  words: 1000
