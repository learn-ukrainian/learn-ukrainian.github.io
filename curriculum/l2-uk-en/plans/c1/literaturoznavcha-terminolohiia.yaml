activity_hints:
- type: reading
  focus: Прочитайте текст про поняття про літературознавство як науку і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про архітектоніка художнього твору, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Поняття про літературознавство як науку». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему поняття про літературознавство як науку.
- type: comparative-study
  focus: 'Порівняйте різні підходи до поняття про літературознавство як науку: Основні галузі: теорія літератури, історія
    літератури, літературна критика. Визначте спільне та відмінне.'
