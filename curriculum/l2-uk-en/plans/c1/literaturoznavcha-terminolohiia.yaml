module: c1-064
level: C1
sequence: 64
slug: literaturoznavcha-terminolohiia
version: '2.0'
title: Літературознавча термінологія
subtitle: Literary Analysis Terminology
content_outline:
- section: 'Вступ: Метамова літературознавства (Introduction: The Metalanguage of Literary Criticism)'
  words: 500
  points:
  - Обґрунтування термінології як інструменту для розуміння імпліцитної інформації (натяків, іронії) згідно з Державним стандартом
    §1.2.1.1.
  - 'Persona Setup: Роль укладача енциклопедії у систематизації літературознавчих понять для академічного аналізу.'
  - 'Learner Error: Розмежування понять ''тема'' (про що твір) та ''ідея'' (головна думка/посил автора) для уникнення логічних
    помилок в аналізі.'
- section: 'Наратологія: Сюжет, фабула та стратегії оповіді (Narratology: Plot, Fabula, and Narrative Strategies)'
  words: 1000
  points:
  - 'Глибокий аналіз опозиції ''сюжет'' vs ''фабула'': хронологічна послідовність подій проти їх художнього розташування в
    тексті.'
  - 'Cultural Hook: Теорія ''зробленості'' тексту українських формалістів 1920-х років (Майк Йогансен) та розгортання сюжетних
    ліній.'
  - 'Наративна піраміда: категорії ''автор'', ''наратор'' (наративна стратегія) та ''оповідач''; визначення внутрішньої та
    зовнішньої фокалізації.'
  - 'Learner Error: Уточнення значення терміна ''Роман'' (Novel) як великої форми, що часто плутається з англійським ''Romance''.'
- section: 'Тропіка та образність: Від метафори до алегорії (Tropes and Imagery: From Metaphor to Allegory)'
  words: 900
  points:
  - 'Механізм метафори (схожість) проти метонімії (суміжність): аналіз прикладів ''золото волосся'' та ''читати Шевченка''.'
  - Функціонування алегорії як розгорнутого символічного образу з прозорим змістом в академічному контексті.
  - 'Cultural Hook: Іронія та бурлеск як структуротворчі елементи в ''Енеїді'' І. Котляревського; використання гротеску в
    українському модернізмі.'
  - 'Стилістичні прийоми: парадокс та підтекст як засоби вираження авторської позиції згідно зі стандартом §4.4.3.'
- section: Жанрова типологія в українському контексті (Genre Typology in the Ukrainian Context)
  words: 800
  points:
  - 'Класифікація прозових жанрів за стандартом §1.2.2: відмінності між романом (велика форма) та повістю (середня форма,
    домінантна в УкрЛит).'
  - 'Специфіка жанру ''Новела'': лаконізм, психологізм та обов''язковий сюжетний поворот (пуант) на прикладі експресіонізму
    Василя Стефаника.'
  - 'Академічна дискусія: трансформація класичних жанрів у сучасній літературі та зміна наративних парадигм.'
- section: 'Синтез: Методологія академічного аналізу (Synthesis: Methodology of Academic Analysis)'
  words: 800
  points:
  - 'Практичний алгоритм аналізу художнього тексту: від виявлення мотивів до формулювання цілісної ідеї твору.'
  - 'Адаптація академічного регістру: використання абстрактних іменників та специфічного синтаксису для літературної критики.'
  - 'Production: Підготовка критичного відгуку на уривок тексту з коректним вживанням термінів ''фабула'', ''фокалізація''
    та ''підтекст''.'
focus: analysis
pedagogy: Academic
objectives:
- Learner can define and use key literary terms (сюжет, фабула, метафора, алегорія).
- Learner can distinguish between narrative modes and focalization.
- Learner can apply academic register in literary criticism.
grammar:
- Academic register syntax
- Abstract noun derivation
phase: C1.5 [Stylistics & Rhetoric]
persona:
  voice: Senior Specialist
  role: Укладач енциклопедії
word_target: 4000
vocabulary_hints:
  required:
  - сюжет (plot) — розгортання сюжету, динамічний сюжет, сюжетна лінія; High frequency
  - фабула (fabula/story) — фабульна основа, відмінність від сюжету, хронологічна фабула; Medium frequency, Specialized
  - метафора (metaphor) — розгорнута метафора, метафоричне мислення, вживання метафори; High frequency
  - наратив (narrative) — наративна стратегія, зміна наративу, домінантний наратив; High Academic
  - роман (novel) — історичний роман, жанрова специфіка роману; False friend alert (not Romance)
  - повість (novella/long short story) — пригодницька повість; Central genre in Ukrainian literature
  - новела (short story/novella) — психологічна новела, жанрові ознаки новели; Specific short form with a twist
  recommended:
  - метонімія (metonymy) — метонімічне перенесення, вживання метонімії; Academic register
  - алегорія (allegory) — алегоричний образ, прозора алегорія; Specialized
  - фокалізація (focalization) — внутрішня фокалізація, зміна фокалізації; Low frequency, highly specialized
  - наратор (narrator) — ненадійний наратор, позиція наратора; Academic term
  - бурлеск (burlesque) — бурлескний стиль, традиції бурлеску; Cultural reference (Kotlyarevsky)
  - травестія (travesty) — комічна травестія; Linked to Eneida
  - гротеск (grotesque) — елементи гротеску, гротескний образ; Medium frequency
  - підтекст (subtext/undercurrent) — глибокий підтекст, розуміння підтексту; Key for C1 analysis
prerequisites:
- istoriia-ukrainskoi-literatury
