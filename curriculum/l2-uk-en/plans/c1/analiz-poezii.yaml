module: c1-070
level: C1
sequence: 70
slug: analiz-poezii
version: '1.0'
title: "Аналіз поетичного тексту: версифікація та семантика"
subtitle: "Analysis of Poetic Text: Versification and Semantics"
focus: literature
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити систему українського віршування: силабо-тоніку, силабіку та верлібр."
  - "Аналізувати фоніку, ритміку та метрику поетичного твору."
  - "Розкривати багаторівневу семантику поетичного образу через аналіз тропів."
  - "Навчитися інтерпретувати поезію в контексті філософських та культурних ідей епохи."

reading_situations:
  - source_type: "художній уривок"
    topic: "Філософська лірика Василя Стуса: поетика 'Палімпсестів'."
    key_elements: ["екзистенційна напруга", "алітерація", "складна метафора"]
    motivation: "Вивчення зразків найвищої герметичної поезії в українській літературі."
  - source_type: "літературна критика"
    topic: "Аналіз ритмічної структури 'Кобзаря' Тараса Шевченка та його зв'язок із народною піснею."
    key_elements: ["коломийковий вірш", "цезура", "ритмомелодика"]
    motivation: "Розуміння витоків та національної специфіки української версифікації."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Проведіть цілісний аналіз поетичного твору (на вибір: Ліна Костенко, Василь Симоненко або Сергій Жадан) (300-350 слів). Зверніть увагу на єдність форми та змісту."
    requirements: ["визначення віршового розміру", "аналіз системи римування", "інтерпретація центральної метафори"]
    motivation: "Відпрацювання навичок комплексного філологічного аналізу лірики."
    model_answer: "Аналіз повинен містити висновки про те, як ритм та звукопис допомагають розкрити ліричний сюжет та емоційний стан героя."

discussion_topics:
  - context: "Верлібр (вільний вірш) проти традиційного римованого вірша: чи є майбутнє у класичної силабо-тоніки?"
    questions:
      - "Чому сучасні поети все частіше відмовляються від рими?"
      - "Чи зберігається 'магія' поезії у верлібрі?"
      - "Українська традиція білого вірша: від Лесі Українки до сьогодні."
    motivation: "Дискусія про еволюцію поетичних форм та смаків аудиторії."
  - context: "Поезія як засіб опору: роль вірша в часи історичних потрясінь та воєн."
    questions:
      - "Чому під час війни поезія стає найбільш затребуваним жанром?"
      - "Чи може поезія бути зброєю?"
    motivation: "Аналіз прагматичної та мобілізаційної функції лірики."

content_outline:
  - section: "Основи версифікації (віршознавства)"
    words: 1000
    subsections:
      - "Системи віршування: народна, силабічна, силабо-тонічна"
      - "Основні віршові розміри: ямб, хорей, дактиль, амфібрахій, анапест"
      - "Поняття про стопу, цезуру та клаузулу"
    key_concepts:
      - "метрика"
      - "ритм"
      - "силабо-тоніка"
  - section: "Звукова та строфічна організація поезії"
    words: 1000
    subsections:
      - "Фоніка: алітерація, асонанс, звукопис"
      - "Рима: види рим (чоловіча, жіноча, точна, неточна) та способи римування"
      - "Строфіка: двовірш, катрен, сонет, октава"
    key_concepts:
      - "евфонія"
      - "римування"
      - "строфа"
  - section: "Семантика поетичного образу"
    words: 1000
    subsections:
      - "Поетична лексика: архаїзми, неологізми, епітети"
      - "Складні тропи: символ, алегорія, оксиморон, літота"
      - "Поетичний синтаксис: інверсія, риторичне питання, паралелізм"
    key_concepts:
      - "ліричний герой"
      - "метафоризація"
      - "підтекст"
  - section: "Методика інтерпретації ліричного твору"
    words: 1000
    subsections:
      - "Види лірики: інтимна, пейзажна, громадянська, філософська, релігійна"
      - "Алгоритм комплексного аналізу поетичного тексту"
      - "Герменевтичне коло: від слова до смислу цілого"
    key_concepts:
      - "інтерпретація"
      - "мотив"
      - "пафос"

vocabulary:
  required:
    - віршування
    - розмір
    - рима
    - строфа
    - метафора
    - ритм
    - лірика
    - образ
  recommended:
    - силабо-тоніка
    - верлібр
    - алітерація
    - асонанс
    - катарсис

activities:
  types_required:
    - reading
    - critical-analysis
    - authorial-intent
    - select
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

