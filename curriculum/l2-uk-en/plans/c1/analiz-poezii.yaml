  - верлібр
  - алітерація
  - асонанс
  - катарсис
activity_hints:
- type: reading
  focus: Прочитайте текст про основи версифікації (віршознавства) і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про звукова та строфічна 
    організація поезії, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Основи 
    версифікації (віршознавства)». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    основи версифікації (віршознавства).
- type: comparative-study
  focus: 'Порівняйте різні підходи до основи версифікації (віршознавства): Системи
    віршування: народна, силабічна, силабо-тонічна. Визначте спільне та відмінне.'
activities:
  types_required:
