module: c1-105
level: C1
sequence: 105
slug: c1-6-review
version: '2.0'
title: 'C1.6 Література: Огляд та рефлексія'
subtitle: 'C1.6 Literature: Review and Reflection'
content_outline:
- section: 'Вступ: Формування українського літературного канону (Introduction: Formation
    of the Ukrainian Literary Canon)'
  words: 600
  points:
  - 'Обговорення поняття «літературний канон»: від Котляревського до Коцюбинського
    — еволюція від бурлеску до імпресіонізму.'
  - 'Три стовпи національної літератури: Шевченко, Франко, Леся Українка як фундамент
    ідентичності.'
  - 'Культурний гачок: Вплив Валуєвського циркуляра (1863) та Емського указу (1876)
    на жанрове обмеження та «кордоцентричну» природу літератури ХІХ ст.'
- section: 'Огляд течій: Від Романтизму до Модернізму (Review of Movements: From Romanticism
    to Modernism)'
  words: 1000
  points:
  - 'Аналіз переходу від Романтизму до Реалізму: ключові автори, теми та стилістичні
    особливості художнього стилю (§4.4.1.1).'
  - 'Трагедія «Розстріляного відродження»: Хвильовий та Підмогильний — штучне переривання
    модерністської течії та сучасне зцілення канону.'
  - 'Аналітичний розбір: Використання епітетів та метафор як засобів виразності в
    поетиці Шевченка та інтелектуальній прозі Франка (§4.4.3).'
- section: 'Практика: Аналіз та подолання типових помилок (Practice: Analysis and
    Overcoming Common Errors)'
  words: 800
  points:
  - 'Робота над помилками: Розрізнення понять «руський» (доба Київської Русі, напр.
    «Руська правда») та «російський» (імперський/етнічний контекст).'
  - 'Стилістичний практикум: Заміна примітивного калькування «автор каже» на аналітичні
    дієслова: «автор стверджує», «наголошує», «підкреслює», «зображує».'
  - 'Термінологічна точність: Розрізнення жанрів — чому не можна називати новелу (short
    story with a twist) романом (novel).'
- section: 'Інтеграційний аналіз: Порівняльна поетика (Integration Analysis: Comparative
    Poetics)'
  words: 1000
  points:
  - 'Порівняння поетики та ідеології Шевченка і Франка: народництво проти інтелектуалізму
    та модернізації.'
  - 'Еволюція жіночих образів у літературі: від романтичних героїнь до сильних модерністських
    постатей у творчості Лесі Українки та Кобилянської.'
  - 'Вплив історичного контексту на творчість: як цензура та бездержавність формували
    специфіку українського тексту.'
- section: 'Підсумок: Актуальність класики та рефлексія (Summary: Relevance of Classics
    and Reflection)'
  words: 600
  points:
  - 'Дискусія про актуальність класичної спадщини в сучасній Україні: переосмислення
    канону крізь призму деколонізації.'
  - 'Світоглядна позиція: Як українська література сформувала національний світогляд
    на зламі епох.'
  - 'Рефлексія: Огляд пройденого етапу C1.5 та підготовка до фінального іспиту (M106).'
focus: review
pedagogy: Integration
objectives:
- Learner can synthesize knowledge of the Ukrainian literary canon from classics to
  contemporary.
- Learner can compare different literary eras and movements.
- Learner can apply advanced literary terminology to various texts.
grammar:
- Synthesis of stylistic devices
- Comparative literary analysis
phase: C1.6 Literature
persona:
  voice: Senior Specialist
  role: Літературний оглядач
word_target: 4000
vocabulary_hints:
  required:
  - канон (canon) — літературний канон, формування канону, увійти до канону; Academic
    register
  - течія (movement/current) — літературна течія, мистецька течія, модерністська течія;
    High frequency in literary analysis
  - спадщина (heritage/legacy) — творча спадщина, культурна спадщина, літературна
    спадщина; Essential for discussing authors
  - епоха (era/epoch) — ціла епоха, епоха романтизму, дух епохи, на зламі епох; Formal
    register
  - світогляд (worldview) — сформувати світогляд, національний світогляд, світоглядна
    позиція; Abstract academic term
  recommended:
  - Розстріляне відродження (Executed Renaissance) — The tragic generation of the
    1930s; crucial cultural hook
  - кордоцентризм (cordocentrism) — heart-centeredness; specific feature of Ukrainian
    19th-century philosophy/literature
  - новела (novella/short story) — short story with a twist; do not confuse with 'roman'
    (novel)
  - стверджувати (to assert/claim) — use instead of simple 'казати' in literary analysis
  - підкреслювати (to emphasize/underline) — analytical verb for highlighting themes
