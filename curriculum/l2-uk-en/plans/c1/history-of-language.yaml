module: c1-033
level: C1
sequence: 33
slug: history-of-language
version: '1.1'
title: "Історія української мови: Еволюція, тяглість та періодизація"
subtitle: "Історія мови"
focus: history
pedagogy: seminar
word_target: 4000
objectives:
  - "Вивчити основні етапи розвитку української мови за періодизацією Юрія Шевельова."
  - "Зрозуміти процеси формування фонетичної та морфологічної систем української мови."
  - "Аналізувати роль старослов'янської мови та її взаємодію з живим народним мовленням."
  - "Оцінити вплив історичних подій на статус та розвиток української мови (Валуєвський
    циркуляр, Емський указ, українізація)."

reading_situations:
  - source_type: "науковий уривок"
    topic: "Концепція 'праукраїнських діалектів' у дослідженнях Юрія Шевельова."
    key_elements: ["фонологічна система", "палаталізація", "редукція голосних"]
    motivation: "Розуміння наукової дискусії про походження української мови та критику
      теорії 'колиски трьох братніх народів'."
  - source_type: "першоджерело"
    topic: "Аналіз мови 'Руської правди' або козацьких літописів."
    key_elements: ["лексична спадщина", "церковнослов'янізм", "канцелярит"]
    motivation: "Розвиток навичок роботи з історичними текстами та розрізнення мовних
      пластів."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ історика мови про Пересопницьке Євангеліє як пам'ятку перехідного
      періоду."
    focus_points: ["народна мова в богослужінні", "орфографія", "графіка"]
    motivation: "Усвідомлення важливості писемних пам'яток для реконструкції історії
      мови."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте роль української мови як фактора державотворення в різні
      історичні епохи. Як змінювався статус мови від Київської Русі до сучасності?"
    requirements: ["мінімум 400 слів", "використання історико-лінгвістичної термінології",
      "аргументація на основі фактів лінгвоциду"]
    motivation: "Синтез історичних та лінгвістичних знань для формування цілісної
      картини розвитку мови."
    model_answer: "Текст має висвітлювати етапи від протоукраїнських діалектів до
      сучасної норми, акцентуючи на моментах найбільшого піднесення та репресій. Використання
      термінів 'руська мова', 'староукраїнська мова', 'українізація'."

discussion_topics:
  - context: "Міфи про походження української мови: від 'штучності' до 'найдавнішої
      мови світу'. Як протидіяти псевдонауковим теоріям?"
    questions:
      - "Чому питання походження мови є таким політизованим?"
      - "Які лінгвістичні докази свідчать про самобутність української мови вже в
        Х-ХІ ст.?"
      - "Яке значення має вивчення історії мови для сучасного громадянина?"
    motivation: "Розвиток навичок наукового спростування міфів та критичного мислення."

content_outline:
  - section: "Джерела та витоки української мови"
    words: 1000
    subsections:
      - "Проблема походження слов'ян: мовний аспект"
      - "Праукраїнські діалекти в надрах праслов'янської мови (V–IX ст.)"
      - "Становлення фонетичних особливостей: доля редукованих та перехідні процеси"
    key_concepts:
      - "редукція"
      - "палаталізація"
      - "диференціація"
  - section: "Писемна мова Київської Русі та Великого Князівства Литовського"
    words: 1000
    subsections:
      - "Диглосія в Київській Русі: церковнослов'янська vs народна мова"
      - "Староукраїнська літературно-писемна мова (XIV–XVII ст.): статус офіційної
        мови"
      - "Граматики та словники Мелетія Смотрицького та Лаврентія Зизанія"
    key_concepts:
      - "церковнослов'янізм"
      - "грамота"
      - "канцелярська мова"
  - section: "Становлення сучасної літературної мови"
    words: 1000
    subsections:
      - "Іван Котляревський та 'Енеїда': початок нової доби"
      - "Роль Тараса Шевченка у синтезі діалектів у загальнонаціональну норму"
      - "Лінгвоцид: заборони українського слова в Російській та Австро-Угорській імперіях"
    key_concepts:
      - "народнорозмовна основа"
      - "лінгвоцид"
      - "мовно-культурне відродження"
  - section: "Українська мова у XX-XXI століттях"
    words: 1000
    subsections:
      - "Період українізації 1920-х: розвиток наукової та технічної термінології"
      - "Харківський правопис (1928) та подальші репресії проти мовознавців"
      - "Сучасний стан: мова як інструмент спротиву та євроінтеграції"
    key_concepts:
      - "термінологія"
      - "правопис"
      - "мовна політика"

vocabulary:
  required:
    - еволюція
    - періодизація
    - диглосія
    - редукція
    - пам'ятка
    - правопис
    - самобутність
    - лінгвоцид
  recommended:
    - палаталізація
    - морфологія
    - етимологія
    - континуїтет
    - субстрат

activity_hints:
  - type: critical-analysis
    description: "Analyze Shevelov's periodization of Ukrainian language development
      — evaluate evidence for proto-Ukrainian dialects and critique 'cradle of three
      brotherly nations' theory."
  - type: match-up
    description: "Match historical periods (праслов'янська доба, Київська Русь, ВКЛ,
      козацька доба) with key linguistic developments and written monuments."
  - type: reading
    description: "Read excerpts from historical Ukrainian texts (Руська правда, Пересопницьке
      Євангеліє) and identify language evolution markers."
  - type: essay-response
    description: "Write an essay (400+ words) on the role of Ukrainian language as
      a state-building factor across historical epochs."
  - type: select
    description: "Identify the correct historical period for specific linguistic phenomena
      (палаталізація, редукція голосних, поява ї)."

activities:
  types_required:
    - critical-analysis
    - match-up
    - true-false
    - reading
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §1-5 — Загальне мовознавство"
  - "Авраменко, 11 клас (2019): Діалекти, суржик, мовна політика"
  - "State Standard 2024: C1 section on history of Ukrainian language"

