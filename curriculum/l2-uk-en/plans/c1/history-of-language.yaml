title: 'Історія мови: Від Русі до сьогодення'
content_outline:
- section: Витоки та давньоруський період (Origins and Old East Slavic Period)
  words: 600
  points:
  - 'Праслов''янська спадщина: розгляд спільних коренів та незалежного розвитку української
    мови від протослов''янської бази.'
  - 'Культурний гачок: Графіті Софії Київської (XI-XII ст.) як доказ живої мови —
    аналіз давального відмінка на -ові/-еві (Петрові, Павлові).'
  - 'Типова помилка: розмежування історичного терміна «руський» (Kyivan Rus'') та
    «російський» (Muscovite) — вправа на корекцію «давньоросійська мова».'
- section: Середньоукраїнська доба та Козаччина (Ruthenian Era and Cossack Period)
  words: 700
  points:
  - Формування староукраїнської (середньоукраїнської) мови в XIV-XVIII ст. та її функціонування
    в офіційних документах.
  - 'Культурний гачок: Пересопницьке Євангеліє (1556-1561) як символ «простої мови»
    та фундамент державної ідентичності.'
  - 'Взаємодія з церковнослов''янською: аналіз лексичного та граматичного впливу на
    високий стиль літератури.'
- section: Епоха заборон та лінгвоциду (Era of Bans and Linguicide)
  words: 800
  points:
  - Аналіз Валуєвського циркуляра (1863) та Емського указу (1876) як інструментів
    імперського лінгвоциду.
  - 'Мова як опір: розгляд того, як заборони стали каталізатором для інтелектуалів
    щодо збереження та розвитку культури.'
  - 'Термінологія репресій: опрацювання концептів «лінгвоцид», «глотоцид» та «зросійщення»
    через призму історичних документів.'
- section: Відродження та кодифікація (Revival and Codification)
  words: 700
  points:
  - 'Іван Котляревський та «Енеїда»: легітимізація живої народної мови як літературного
    стандарту.'
  - Роль Тараса Шевченка у створенні сучасної мови — аналіз фонологічних та морфологічних
    стандартів у його творах.
  - 'Процеси кодифікації: розвиток правописних норм та наукової термінології на зламі
    XIX-XX століть.'
- section: 'Радянський період: Українізація та репресії (Soviet Period: Ukrainization
    and Repressions)'
  words: 700
  points:
  - 'Політика коренізації 1920-х років: короткий розквіт «червоної українізації» та
    культурний вибух.'
  - 'Трагедія 1930-х: репресії проти мовознавців (Розстріляне відродження) та штучне
    наближення української до російської.'
  - 'Механізми русифікації у повоєнний час: витіснення мови з освіти, науки та офіційного
    вжитку.'
- section: Сучасна мовна політика (Modern Language Policy)
  words: 500
  points:
  - 'Мова як чинник нацбезпеки: аналіз Мовного закону 2019 року та його впливу на
    публічну сферу.'
  - 'Державний стандарт (§3.8, §4.4.1.1): розвиток функціональних стилів (науковий,
    публіцистичний) у сучасній державі.'
  - 'Практикум: аналіз соціолінгвістичного феномену «лагідної українізації» та зміцнення
    мовної ідентичності сьогодні.'
vocabulary_hints:
  required:
  - давньоруський (Old East Slavic) — давньоруська мова, спадщина; academic register,
    distinguish from modern Russian.
  - праслов'янський (Proto-Slavic) — праслов'янські корені, єдність; used in scientific
    diachronic analysis.
  - церковнослов'янський (Church Slavonic) — вплив на богослужіння, книжна мова; indicates
    religious/historical register.
  - лінгвоцид (linguicide) — політика лінгвоциду, жертви лінгвоциду; high frequency
    in historical/political texts.
  - русифікація (Russification) — тотальна русифікація, зросійщення, опір; core term
    for Soviet/Imperial periods.
  - українізація (Ukrainization) — політика українізації, коренізація, лагідна українізація;
    historical and modern context.
  - кодифікація (codification) — кодифікація норм, правописна кодифікація; linguistic
    register for standard setting.
  - староукраїнська мова (Ruthenian/Middle Ukrainian) — terminology for XIV-XVIII
    centuries development.
  recommended:
  - глотоцид (glottocide) — formal synonym for linguicide, used in academic discussions.
  - літературна мова (literary language) — modern standard language since Kotlyarevsky.
  - діахронія (diachrony) — linguistic term for historical development over time.
  - етимологія (etymology) — study of word origins, crucial for Proto-Slavic links.
  - коренізація (indigenization) — specific Soviet policy of the 1920s favoring local
    languages.
