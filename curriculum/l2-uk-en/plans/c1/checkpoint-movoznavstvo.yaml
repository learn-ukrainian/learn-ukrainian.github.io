module: c1-040
level: C1
sequence: 40
slug: checkpoint-movoznavstvo
version: '2.0'
title: Контрольна точка C1.3
subtitle: Checkpoint - Linguistics & Sociolinguistics
content_outline:
- section: 'Діагностичний тест: мовознавчі поняття'
  words: 600
  points:
  - 'Перевірка знання основних розділів мовознавства, їхніх об''єктів та методів дослідження'
  - 'Класифікація мов: визначення місця української мови в індоєвропейській сім''ї та
    серед слов''янських мов'
  - 'Мовна норма та кодифікація: визначення типів норм за прикладами порушень'
- section: Лексикологічна компетентність
  words: 800
  points:
  - 'Точність синонімічного добору: вибір найточнішого синоніма для конкретного контексту
    та стилю'
  - 'Розпізнавання паронімічних помилок: ефектний/ефективний, адрес/адреса, компанія/кампанія
    та виправлення у реченнях'
  - 'Стилістична обізнаність: визначення ролі неологізмів, архаїзмів та історизмів у текстах
    різних функціональних стилів'
- section: Морфологічна грамотність
  words: 800
  points:
  - 'Відмінювання складених числівників у контексті: правильне вживання в реченнях ділового,
    наукового та розмовного стилів'
  - 'Повна парадигма займенників: правопис та семантика неозначених, заперечних та означальних
    займенників'
  - 'Узгодження в складних випадках: іменники спільного роду, невідмінювані іменники, pluralia
    tantum'
- section: Текстознавчий аналіз
  words: 700
  points:
  - 'Визначення типу тексту (розповідь, опис, роздум) за структурними та мовними ознаками'
  - 'Аналіз когезії: виявлення засобів зв''язності (лексичних, граматичних, логічних) у
    текстовому фрагменті'
  - 'Оцінка стилю та регістру: визначення функціонального стилю, адресата, комунікативної
    мети тексту'
- section: Соціолінгвістична обізнаність
  words: 600
  points:
  - 'Діалектна свідомість: розпізнавання діалектних рис у мовленні та їхня відмінність
    від літературної норми'
  - 'Суржик: ідентифікація суржикових елементів (фонетичних, лексичних, граматичних) та
    їхня заміна нормативними відповідниками'
  - 'Мовні ставлення: розуміння соціолінгвістичної ситуації в Україні — білінгвізм, мовна
    політика, престиж мов'
- section: Комплексне завдання
  words: 500
  points:
  - 'Інтегроване завдання: аналіз автентичного тексту з позицій мовознавства, лексикології,
    морфології та текстознавства одночасно'
  - 'Написання аналітичного коментаря: визначення стилю, типу, засобів зв''язності, морфологічних
    особливостей обраного тексту'
focus: grammar
pedagogy: TTT
objectives:
- Demonstrate mastery of linguistics terminology and classification
- Apply lexicological knowledge to identify and correct paronym errors
- Decline compound numerals and use full pronoun paradigm accurately
- Analyze text structure, cohesion, and style in authentic materials
grammar:
- Comprehensive review of C1.3 grammar topics
- Compound numeral declension in context
- Text cohesion and stylistic analysis
phase: C1.3 [Movoznavstvo & Sociolinguistics]
