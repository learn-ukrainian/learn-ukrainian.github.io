module: c1-053
level: C1
sequence: 53
slug: checkpoint-movoznavstvo
version: '1.1'
title: "Контрольна точка: загальне мовознавство та норми"
subtitle: "Підсумковий контроль: загальне мовознавство та норми"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Перевірити рівень засвоєння основних понять загального мовознавства."
  - "Оцінити знання сучасних орфографічних та пунктуаційних норм української мови."
  - "Підтвердити вміння аналізувати мовні явища в історичному та соціальному контекстах."
  - "Виявити прогалини у володінні академічним та професійним лексиконом."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Генеалогічна класифікація мов: місце української мови серед слов'янських."
    key_elements: ["індоєвропейська сім'я", "праслов'янська мова", "діалектний континуум"]
    motivation: "Перевірка здатності розуміти фундаментальні лінгвістичні тексти."
  - source_type: "офіційний документ"
    topic: "Постанова Кабінету Міністрів України про затвердження нової редакції Українського
      правопису."
    key_elements: ["варіантність", "фемінітиви", "транслітерація"]
    motivation: "Оцінка знання нормативної бази сучасної мови."

listening_situations:
  - media_type: "подкаст"
    setting: "Дискусія лінгвістів про майбутнє мовних норм в епоху інтернету."
    focus_points: ["демократизація мови", "вплив англіцизмів", "межа між помилкою
          та інновацією"]
    motivation: "Перевірка розуміння складних наукових дебатів на слух."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть коротке аналітичне есе на тему 'Чому знання історії мови є важливим
      для сучасного фахівця?'."
    requirements: ["мінімум 300 слів", "використання лінгвістичної термінології",
      "посилання на історичні факти"]
    motivation: "Синтез знань з мовознавства та навичок академічного письма."
    model_answer: "Есе має демонструвати глибоке розуміння зв'язку між розвитком суспільства
      та мовними змінами, використовуючи терміни 'архаїзм', 'неологізм', 'мовна норма'."

discussion_topics:
  - context: "Чи повинен правопис бути консервативним, чи він має швидко адаптуватися
      до змін у розмовній мові?"
    questions:
      - "Яка основна функція літературної норми?"
      - "Як мовні зміни впливають на національну ідентичність?"
    motivation: "Перевірка здатності аргументувати позицію з лінгвістичних питань."

content_outline:
  - section: "Вступ до загального мовознавства"
    words: 1000
    subsections:
      - "Об'єкт і предмет мовознавства. Основні розділи лінгвістики"
      - "Мова як знакова система. Рівні мовної структури"
      - "Зв'язок мовознавства з іншими науками (історією, соціологією, психологією)"
    key_concepts:
      - "лінгвістика"
      - "семіотика"
      - "дихотомія"
  - section: "Історія та походження української мови"
    words: 1000
    subsections:
      - "Основні теорії походження української мови"
      - "Етапи формування української літературної мови"
      - "Роль видатних постатей (Котляревського, Шевченка) у становленні норми"
    key_concepts:
      - "етногенез"
      - "староукраїнська мова"
      - "традиція"
  - section: "Сучасна мовна норма та культура мовлення"
    words: 1000
    subsections:
      - "Актуальні зміни в Українському правописі 2019 року"
      - "Лексичні та граматичні норми в офіційному спілкуванні"
      - "Типові порушення норм у сучасних медіа"
    key_concepts:
      - "кодифікація"
      - "нормативність"
      - "пуризм"
  - section: "Мовна політика та соціолінгвістика"
    words: 1000
    subsections:
      - "Мовна ситуація в Україні: державна мова та мови меншин"
      - "Функціонування мови в різних сферах суспільного життя"
      - "Мова як чинник національної безпеки"
    key_concepts:
      - "білінгвізм"
      - "диглосія"
      - "мовне середовище"

vocabulary:
  required:
    - мовознавство
    - термінологія
    - орфографія
    - пунктуація
    - стилістика
    - лексикографія
    - діалектологія
    - етимологія
  recommended:
    - парадигма
    - субстрат
    - запозичення
    - канонізація
    - мовленнєвий акт

activity_hints:
  - type: reading
    description: "Test knowledge of key linguistics concepts — language as a sign
      system, levels of language structure, Ukrainian language family classification."
  - type: error-correction
    description: "Fix orthographic and punctuation errors based on Правопис 2019 rules
      — варіантність, фемінітиви, compound words."
  - type: critical-analysis
    description: "Analyze a media text for violations of lexical and grammatical norms
      — identify surzhyk, calques, and unjustified borrowings."
  - type: essay-response
    description: "Complete sentences about the history of Ukrainian literary language
      with correct dates, names, and terminology."
  - type: comparative-study
    description: "Match linguistic branches (фонетика, морфологія, синтаксис, лексикологія)
      with their objects of study and key terminology."

activities:
  types_required:
    - quiz
    - error-correction
    - critical-analysis
    - fill-in
    - match-up
  min_items_per_type: 5
  total_min_items: 25

references:
