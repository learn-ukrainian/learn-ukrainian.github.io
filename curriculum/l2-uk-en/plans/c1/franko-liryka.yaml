module: c1-097
level: C1
sequence: 97
slug: franko-liryka
version: '2.0'
title: 'Франко: Громадянська та філософська лірика'
subtitle: Franko's Civic and Philosophical Lyric
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - Контекстуалізація творчості Франка в межах художнього стилю (§4.4.1.1) та його
    ролі як інтелектуального лідера нації.
  - 'Культурний гачок: Порівняння образів ''Кобзаря'' (Шевченка) та ''Каменяра'' (Франка)
    як перехід від романтизму до реалізму.'
- section: 'Постать Франка: Реалізм проти Романтизму (The Figure of Franko: Realism
    vs. Romanticism)'
  words: 800
  points:
  - Визначення 'наукового реалізму' як методу Франка, що поєднує раціональний аналіз
    із художньою емоцією.
  - 'Подолання помилки студента: розрізнення епох романтизму та модернізму/реалізму
    через призму раціоналізму Франка.'
  - 'Фонетичний практикум: фіксація правильного наголосу в слові ''каменЯр'' за аналогією
    до слів ''вугляр'' та ''школяр''.'
- section: 'Громадянська лірика: Дух, що тіло рве до бою (Civic Lyric: The Spirit
    that Tears the Body to Battle)'
  words: 1000
  points:
  - 'Аналіз алегорії ''Каменярів'' як символу важкої колективної праці задля майбутнього
    поступу (collocation: ''лупати скалу'').'
  - 'Переосмислення образу ''Вічного революціонера'': перехід від політичного гасла
    до гімну інтелектуальному та духовному розвитку.'
  - 'Відповідність стандарту §3.7: Обговорення тем рівності, справедливості та суспільних
    обов''язків у поезії Франка.'
- section: 'Інтимна лірика: ''Зів''яле листя'' як лірична драма (Intimate Lyric: ''Withered
    Leaves'' as Lyrical Drama)'
  words: 800
  points:
  - Аналіз збірки 'Зів'яле листя' як вершини інтимної лірики та причини авторського
    визначення 'лірична драма'.
  - 'Філософське осмислення нерозділеного кохання: трансформація особистої трагедії
    в екзистенційні роздуми про буття.'
  - 'Робота з поетичними метафорами: ''зів''яле листя'', ''зів''ялі надії'' як символи
    емоційного стану героя.'
- section: Філософська поема 'Мойсей' (Philosophical Poem 'Moses')
  words: 1000
  points:
  - Глибокий аналіз проблеми лідера і мас, актуальність Франкового бачення ролі пророка
    в сучасному контексті.
  - Дослідження конфлікту між пророком та лжепророком у поемі як відображення внутрішньої
    боротьби нації.
  - 'Синтез: Підсумок внеску Франка у розвиток українського модернізму та його вплив
    на наступні покоління літераторів.'
focus: literature
pedagogy: Literary Analysis
objectives:
- Learner can analyze the imagery and revolutionary spirit of "Kameniari".
- Learner can interpret the philosophical themes of "Moisei".
- Learner can discuss Franko’s contribution to the development of Ukrainian modernist
  poetry.
grammar:
- Literary syntax
- Rhetorical figures
phase: C1.6 Literature
persona:
  voice: Senior Specialist
  role: Філософ
word_target: 4000
vocabulary_hints:
  required:
  - 'каменЯр (stone-breaker) — наголос на останньому складі; символ невтомної праці;
    collocations: лупати скалу, невтомний каменяр'
  - 'пОступ (progress) — висока частота в публіцистиці; collocations: суспільний поступ,
    шлях поступу, віра в поступ'
  - 'прорОк (prophet) — книжний реєстр; collocations: лжепророк, пророк свого народу,
    місія пророка'
  - 'зів''ялий (withered/faded) — поетичний реєстр; collocations: зів''яле листя,
    зів''ялі надії, зів''ялі квіти'
  recommended:
  - науковий реалізм (scientific realism) — термін для опису методу Франка; поєднання
    науки та мистецтва
  - лірична драма (lyrical drama) — жанрове визначення Франком збірки інтимної поезії
  - вічний революціонер (eternal revolutionary) — символ незламного духу та інтелектуального
    розвитку
