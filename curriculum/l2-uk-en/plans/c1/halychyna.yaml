module: c1-090
level: C1
sequence: 90
slug: halychyna
version: '1.1'
title: "Галичина: історія, культура та ідентичність західного регіону"
subtitle: "Галичина: історія, культура та ідентичність західного регіону"
focus: history
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити історичний розвиток Галичини як частини Австро-Угорщини та її роль
    у національному відродженні України."
  - "Проаналізувати специфіку галицького міського середовища та інтелектуальної еліти
    (Львів як 'Український П'ємонт')."
  - "Вивчити особливості галицької мовної традиції, діалектні нашарування та вплив
    європейської культури на побут."
  - "Ознайомитися з творчістю знакових постатей Галичини (І. Франко, В. Стефаник,
    родина Шептицьких)."

reading_situations:
  - source_type: "історичний нарис"
    topic: "Королівство Галичини та Володимирії: адміністративна структура та соціальна
      динаміка в XIX столітті."
    key_elements: ["автономія", "конституціоналізм", "просвітництво", "сецесія"]
    motivation: "Аналіз академічного тексту про складні політичні та соціальні процеси
      в регіоні."
  - source_type: "мемуарна література"
    topic: "Львівська кавова культура та міське життя Галичини на зламі століть."
    key_elements: ["міщани", "каварня", "флюгер", "культурна мозаїка"]
    motivation: "Вивчення побутової лексики та описів міського ландшафту минулого."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з сучасним істориком про феномен галицької ідентичності та її
      вплив на загальноукраїнський контекст."
    focus_points: ["локальна пам'ять", "міжнаціональний діалог", "міф Галичини"]
    motivation: "Сприйняття фахової дискусії про складні питання регіональної самобутності."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Проаналізуйте роль Львова як 'Українського П'ємонту' у XIX столітті.
      Чому саме цей регіон став центром націєтворення?"
    requirements: ["мінімум 300 слів", "використання історичних фактів", "аргументація
          з погляду культурології"]
    motivation: "Вміння будувати логічно обґрунтовану відповідь на історико-політичну
      тему."
    model_answer: "Текст повинен висвітлювати умови відносної свободи в Австрійській
      імперії, діяльність НТШ та роль духовенства у просвітництві селянства."

content_outline:
  - section: "Галичина під скіпетром Габсбургів"
    words: 1000
    subsections:
      - "Входження Галичини до складу Австрійської імперії: реформи та зміни"
      - "Революція 1848 року ('Весна народів') та перші кроки до політичної суб'єктності"
      - "Львів як адміністративний, науковий та релігійний центр Галичини"
    key_concepts:
      - "монархія"
      - "суб'єктність"
      - "реформи"
  - section: "Золота доба галицької інтелігенції"
    words: 1000
    subsections:
      - "Руська Трійця: Шашкевич, Вагилевич, Головацький та початок літературного
        відродження"
      - "Іван Франко як інтелектуальний лідер: від радикалізму до європейського модернізму"
      - "Наукове товариство імені Шевченка (НТШ) як неформальна Академія наук"
    key_concepts:
      - "інтелігенція"
      - "відродження"
      - "модернізм"
  - section: "Культурна мозаїка та міське життя"
    words: 1000
    subsections:
      - "Співіснування українців, поляків, євреїв та вірмен у галицьких містах"
      - "Архітектура львівської сецесії та європейські мистецькі впливи"
      - "Галицька кухня та побутові традиції як синтез східних та західних елементів"
    key_concepts:
      - "мультикультуралізм"
      - "сецесія"
      - "побут"
  - section: "Боротьба за волю: XX століття та сучасність"
    words: 1000
    subsections:
      - "Листопадовий чин та проголошення ЗУНР: коротка історія незалежності"
      - "Галичина як осередок опору в міжвоєнний період та часи Другої світової війни"
      - "Сучасна Галичина: збереження спадщини та роль у євроінтеграції України"
    key_concepts:
      - "соборність"
      - "спротив"
      - "спадщина"

vocabulary:
  required:
    - галичина
    - автономія
    - відродження
    - інтелігенція
    - сецесія
    - соборність
    - діалект
    - ідентичність
  recommended:
    - п'ємонт
    - конституціоналізм
    - каварня
    - консенсус
    - суб'єктність

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - fill-in
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте історичний нарис про Галичину в XIX столітті. Визначте ключову
      суспільно-політичну лексику та поясніть її в контексті епохи."
  - type: critical-analysis
    focus: "Проаналізуйте текст про діяльність НТШ. Визначте авторську оцінку ролі
      наукового товариства та знайдіть аргументи на її підтримку."
  - type: match-up
    focus: "Зіставте постаті галицької інтелігенції (Франко, Шашкевич, Шептицький)
      з їхніми внесками у національне відродження."
  - type: fill-in
    focus: "Доповніть текст про Галичину в складі Австро-Угорщини відповідними суспільно-політичними
      термінами (автономія, конституціоналізм, просвітництво, суб'єктність)."
  - type: essay-response
    focus: "Напишіть аналітичний текст про роль Львова як 'Українського П'ємонту'.
      Аргументуйте з погляду культурології та історії."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Історія та культура регіонів'"
  - "Авраменко, 11 клас (Укр. літ.) — І. Франко, В. Стефаник"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"

