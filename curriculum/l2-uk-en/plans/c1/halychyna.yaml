module: c1-084
level: C1
sequence: 84
slug: halychyna
version: '2.0'
title: Галичина
subtitle: Galician Folk Traditions
content_outline:
- section: 'Вступ: Галичина як соціокультурний феномен (Introduction: Galicia as a Socio-Cultural Phenomenon)'
  words: 600
  points:
  - 'Галичина як історико-географічний регіон: межі, адміністративний поділ та роль «Українського П''ємонту» в національному
    відродженні'
  - 'Подолання узагальнень: розрізнення Галичини, Волині, Буковини та Закарпаття (виправлення помилки щодо ототожнення всієї
    Західної України з Галичиною)'
  - Греко-католицька церква як ключовий ідентичнісний маркер та фактор збереження національної самобутності під іноземним
    впливом
- section: Історична пам'ять та міфологія (Historical Memory and Mythology)
  words: 1000
  points:
  - 'Міф про «Бабцю Австрію»: ностальгія за австро-угорським періодом як «золотим віком» порядку, європейськості та архітектурної
    естетики'
  - 'Боротьба за державність: проголошення ЗУНР, роль галицького уряду та тяглість державницької традиції'
  - 'Львів як культурна столиця: поєднання польських, австрійських та українських впливів у формуванні міського простору'
  - 'Культ кави: постать Юрія Кульчицького та традиція «піти на каву» як основний формат соціалізації та маркер міської культури'
- section: 'Мовний ландшафт: Галицька ґвара (Linguistic Landscape: Galician Gwara)'
  words: 800
  points:
  - 'Стилістично маркована лексика: поняття львівської ґвари, її походження (германізми, полонізми) та роль у розмовному стилі'
  - 'Аналіз тексту за вимогами С1 (§1.1.1.1): розуміння розмовних висловів, ідіом та регіональних варіантів мови без втрати
    загального змісту'
  - 'Попередження стилістичного дисонансу: обмеження використання діалектизмів (файно, кобіта) в академічному та офіційному
    регістрах'
  - 'Уникнення лексичних пасток: пояснення архаїчності та регіональності слів «склеп» (магазин) та «диван» (килим) для запобігання
    калькуванню'
- section: Традиції, побут та сакральне (Traditions, Daily Life, and the Sacred)
  words: 800
  points:
  - 'Гастрономічна спадщина: традиція випікання галицьких пляцків, приготування бігосу, маківника та перечок'
  - 'Народне мистецтво та етнографічні групи: порівняльна характеристика гуцульської, бойківської та лемківської традицій'
  - 'Різдвяна обрядовість: сакральне значення дідуха, особливості храмової архітектури Галичини та релігійна етика'
- section: 'Практика: аналіз та продукція (Practice: Analysis and Production)'
  words: 800
  points:
  - 'Компаративний аналіз: порівняння галицької та наддніпрянської культурних традицій (ментальність, побут, архітектура)'
  - 'Підготовка до читання класики: аналіз уривків з творів Івана Франка та Василя Стефаника з фокусом на діалектну лексику'
  - 'Продуктивне завдання: написання есе на тему «Галицька ідентичність: між міфом про минуле та викликами модерності»'
focus: culture
pedagogy: Immersion & Analysis
objectives:
- Learner can identify the unique cultural markers of the Halychyna region
- Learner understands the historical and religious factors shaping Galician identity
- Learner can use specific Galician vocabulary in appropriate contexts
grammar:
- Regional and dialectal terminology
- Descriptive and historical registers
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Галицький інтелігент
word_target: 4000
vocabulary_hints:
  required:
  - ґвара (regional dialect/slang) — львівська ґвара, балакати ґварою; розмовний регістральний маркер
  - філіжанка (cup) — філіжанка кави, запашна філіжанка; часто вживається у контексті соціалізації
  - коліжанка (female friend/colleague) — моя коліжанка, зустрітися з коліжанкою; галицький відповідник до 'подруга'
  - пляцок (traditional cake/pie) — пекти пляцки, галицький пляцок, сирний пляцок; специфічний кондитерський термін
  - дідух (sheaf of grain, Christmas symbol) — ставити дідух, різдвяний дідух; сакральний фольклорний термін
  - ЗУНР (WUPR - West Ukrainian People's Republic) — проголошення ЗУНР, уряд ЗУНР; історична абревіатура
  recommended:
  - П'ємонт (Piedmont) — Український П'ємонт; метафора ролі Галичини в національному відродженні
  - полонізм (Polonism) — запозичення з польської мови; лінгвістичний термін
  - греко-католицизм (Greek Catholicism) — віросповідання, що є ідентичнісним маркером регіону
  - «Бабця Австрія» (Grandma Austria) — іронічно-ностальгійна назва періоду Австро-Угорщини
  - балакати (to talk/chat) — вживається замість 'розмовляти' в ґварі
  - файно (fine/well) — типовий діалектизм для вираження позитивної оцінки
prerequisites:
- pomynalni-obriady
connects_to:
- traditional-clothing
