module: c1-096
level: C1
sequence: 96
slug: shevchenko-spadshchyna
version: '2.0'
title: 'Шевченко: Спадщина'
subtitle: Shevchenko's Legacy
content_outline:
- section: 'Вступ: Шевченко як живий символ (Introduction: Shevchenko as a Living
    Symbol)'
  words: 500
  points:
  - Деконструкція радянського міфу про «бронзового діда» в шапці та повернення до
    образу молодого, модерного інтелектуала та академіка.
  - Шевченко не як застиглий монумент, а як динамічний чинник формування національної
    ідентичності, що змінюється разом з нацією.
- section: Глобальна Шевченкіана та діаспора (Global Shevchenkiana and Diaspora)
  words: 900
  points:
  - 'Історія пам''ятника у Вашингтоні (1964): перемога української діаспори над радянською
    дипломатією та визнання Ейзенхауером Шевченка як «героя людства».'
  - Роль Шевченка у збереженні української ідентичності за кордоном та його сприйняття
    як глобального символу свободи.
  - 'Культурний гачок: виставка «Квантовий стрибок Шевченка» (2019) Олександра Грехова
    та дискусія про межі «святості» образу в поп-культурі.'
- section: 'Інтерпретації: Від радянського атеїста до національного пророка (Interpretations:
    From Soviet Atheist to National Prophet)'
  words: 1000
  points:
  - 'Порівняльний аналіз: радянська інтерпретація (революціонер-демократ, атеїст)
    проти сучасного прочитання (віруючий естет, академік, мислитель).'
  - Вплив на літературний канон та погляди сучасних інтелектуалів (Оксана Забужко,
    Сергій Жадан) на постать Кобзаря.
  - 'Державний стандарт (§4.4.4): Стилістичне вживання уточнення на прикладі постаті
    Василя Шкляра, лауреата Шевченківської премії, у сучасному каноні.'
- section: Спадщина під час війни та спротиву (Legacy during War and Resistance)
  words: 900
  points:
  - Прострілений бюст у Бородянці (2022) як новий символ стійкості української культури
    та ідентичності під час російського вторгнення.
  - 'Актуалізація поезії Шевченка в контексті сучасної війни: аналіз текстів через
    призму спротиву та деколонізації.'
  - 'Типова помилка: розмежування понять «пам’ятка» (cultural heritage site/object)
    та «пам’ятник» (statue) на прикладах об''єктів Шевченкіани.'
- section: Практичний аналіз та мовна корекція (Practical Analysis and Language Correction)
  words: 700
  points:
  - 'Робота над лексичними помилками: усунення русизму «насліддя» на користь терміна
    «спадщина» та правильне вживання колокацій.'
  - Аналіз цитат сучасних письменників про Шевченка з використанням засобів академічного
    регістру та складного синтаксису.
  - 'Підсумкове есе: Шевченко як символ ідентичності в ХХІ столітті — від «бронзового
    канону» до живого спротиву.'
focus: literature
pedagogy: Literary Analysis
objectives:
- Learner can analyze Shevchenko’s influence on subsequent generations of writers.
- Learner can distinguish between Soviet and national interpretations of Shevchenko’s
  work.
- Learner can discuss the contemporary significance of Shevchenko in the context of
  resistance and identity.
grammar:
- Academic register
- Complex syntax
phase: C1.6 Literature
persona:
  voice: Senior Specialist
  role: Музейний хранитель
word_target: 4000
vocabulary_hints:
  required:
  - Спадщина (Heritage) — літературна спадщина, духовна спадщина, переосмислення спадщини;
    усунення русизму «насліддя»
  - Вплив (Influence) — могутній вплив, зазнати впливу, вплив на покоління; висока
    частотність в академічних текстах
  - Канон (Canon) — літературний канон, канонізація, руйнування канону; літературознавчий
    термін
  - Інтерпретація (Interpretation) — радянська інтерпретація, хибна інтерпретація,
    сучасне прочитання; академічний регістр
  - Ідентичність (Identity) — національна ідентичність, формування ідентичності, символ
    ідентичності; соціополітичний контекст
  recommended:
  - Пам'ятник (Statue) — споруда на честь особи; не плутати з «пам'ятка» (heritage
    object)
  - Переосмислення (Reimagining) — критичний перегляд попередніх поглядів
  - Спротив (Resistance) — акт боротьби проти загарбника чи ідеології
  - Уточнення (Clarification/Specification) — граматична категорія згідно зі стандартом
    §4.4.4
