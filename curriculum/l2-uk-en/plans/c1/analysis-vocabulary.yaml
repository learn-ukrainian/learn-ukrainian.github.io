module: c1-004
level: C1
sequence: 4
slug: analysis-vocabulary
version: 1.1.2
title: Словник аналітичного мислення та синтезу
subtitle: Лексика аналізу та синтезу
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
- Опанувати термінологію для глибокого аналізу та оцінки наукових і культурних 
  явищ.
- Вивчити синонімічні ряди прикметників та іменників, що описують складні 
  когнітивні процеси.
- Розвинути вміння здійснювати концептуальний синтез інформації за допомогою 
  специфічної лексики.
- Навчитися диференціювати відтінки значень слів, що позначають структуру та 
  елементи цілого.
reading_situations:
- source_type: філософське есе
  topic: Аналіз категорій буття та небуття в поезії Василя Стуса.
  key_elements:
  - екзистенційний вимір
  - когнітивний дисонанс
  - семантична глибина
  motivation: Вивчення лексики аналізу та синтезу на прикладі високої 
    літературної критики.
- source_type: стаття з культурології
  topic: Синтез західноєвропейських та візантійських традицій в архітектурі 
    Києва.
  key_elements:
  - культурна дифузія
  - стилістична еклектика
  - архітектонічна цілісність
  motivation: Аналіз термінів, що описують процеси поєднання та 
    взаємопроникнення елементів.
writing_tasks:
- task_type: власне висловлення
  prompt: Проаналізуйте вплив цифрових технологій на трансформацію української 
    ідентичності (250-300 слів). Використовуйте терміни для аналізу та синтезу.
  requirements:
  - визначення ключових чинників
  - структурування аргументів
  - використання абстрактних іменників
  motivation: Перевірка здатності студента синтезувати розрізнені факти в 
    цілісну аналітичну картину.
  model_answer: Текст повинен демонструвати використання таких понять, як 
    'детермінованість', 'реконтекстуалізація', 'цілісність', 'диференціація'.
discussion_topics:
- context: 'Сучасна українська література: процес аналізу канону vs необхідність створення
    нових сенсів.'
  questions:
  - Які елементи класичної літератури потребують переосмислення (деконструкції)?
  - Як здійснити синтез традиції та новаторства в сучасній культурі?
  - Роль критичного мислення у формуванні національного наративу.
  motivation: Розвиток дискусійних навичок з використанням високого академічного
    регістру.
content_outline:
- section: Структура та декомпозиція явища
  words: 1000
  subsections:
  - 'Аналіз компонентів: складник, елемент, сегмент, фрагмент'
  - 'Прикметники аналітичної точності: релевантний, валідний, автентичний'
  - 'Діагностика зв''язків: взаємозалежність, кореляція, каузальність'
  key_concepts:
  - декомпозиція
  - релевантність
  - каузальність
- section: Оцінка та верифікація інформації
  words: 1000
  subsections:
  - 'Критерії оцінювання: фундаментальність, поверховість, об''єктивність'
  - 'Ступені достовірності: гіпотетичний, верифікований, аксіоматичний'
  - 'Лексика критичного розбору: недолік, перевага, суперечність'
  key_concepts:
  - аксіоматичність
  - достовірність
  - критерій
- section: Процеси синтезу та узагальнення
  words: 1000
  subsections:
  - 'Створення цілого: інтеграція, конвергенція, конгломерація'
  - 'Узагальнюючі поняття: парадигма, концепт, масив'
  - 'Лексика фіналізації: висновок, підсумок, результативна частина'
  key_concepts:
  - конвергенція
  - інтеграція
  - парадигмальність
- section: Абстрагування та теоретизація
  words: 1000
  subsections:
  - 'Від конкретного до загального: індукція, дедукція, абстракція'
  - 'Моделювання процесів: алгоритм, схема, конструкт'
  - 'Метамова аналізу: дискурс, наратив, герменевтика'
  key_concepts:
  - індукція
  - дедукція
  - герменевтика
- section: Підсумок — Summary
  words: 300
  points:
  - 'Review the core terminology of structural analysis and evaluation: релевантний,
    валідний, каузальність, аксіоматичний. Self-check: What is the difference between
    індукція and дедукція? Describe 3 components of a complex system using words like
    елемент, сегмент, or фрагмент.'
  - "Synthesis and abstraction processes require specific conceptual vocabulary: парадигма,
    дискурс, інтеграція. Self-check: What's the difference between гіпотетичний and
    верифікований? Name 3 criteria you would use to evaluate the objectivity of a
    scientific article."
vocabulary:
  required:
  - цілісність
  - суперечність
  - релевантний
  - складник
  - кореляція
  - чинник
  - ознака
  - критерій
  recommended:
  - автентичність
  - концептуальний
  - валідність
  - детермінованість
  - верифікація
activity_hints:
- type: reading
  focus: Прочитайте текст про структура та декомпозиція явища і дайте відповіді 
    на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про оцінка та верифікація 
    інформації, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Структура та 
    декомпозиція явища». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    структура та декомпозиція явища.
- type: comparative-study
  focus: 'Порівняйте різні підходи до структура та декомпозиція явища: Аналіз компонентів:
    складник, елемент, сегмент, фрагмент. Визначте спільне та відмінне.'
activities:
  types_required:
  - critical-analysis
  - match-up
  - error-correction
  - essay-response
  - fill-in
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Ворон, 11 клас (2019): с. 218 — Науковий стиль'
- 'Глазова, 11 клас (2019): §45 — Синтаксичні одиниці в різних стилях'
- 'Авраменко, 11 клас (2019): с. 164 — Стилістична норма'
connects_to:
  previous: research-verbs
  next: logical-connectors
phase: C1.1 [Academic Foundation]
