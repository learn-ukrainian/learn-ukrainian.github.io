module: c1-004
level: C1
sequence: 4
slug: analysis-vocabulary
version: '2.0'
title: Словник аналізу та критики
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - Роль аналітичної лексики в науці та публіцистиці згідно з вимогами рівня C1 та
    державним стандартом §4.4.1.1.
  - 'Зв''язок мови з критичним мисленням: шлях від простого опису до глибокої інтерпретації
    та синтезу.'
  - 'Огляд категорій аналітичних термінів: іменники аналізу, прикметники оцінки та
    засоби структурування думки.'
- section: 'Презентація: Аналітична лексика та культурний контекст (Presentation:
    Analytical Vocabulary and Cultural Context)'
  words: 800
  points:
  - 'Основні поняття: аналіз, синтез, оцінка, інтерпретація, класифікація, узагальнення;
    частотність використання в академічному середовищі.'
  - 'Культурний взірець 1: Іван Дзюба «Інтернаціоналізм чи русифікація?» як приклад
    перетворення аналітичної лексики на інтелектуальну зброю.'
  - 'Культурний взірець 2: Українська полемічна література (Іван Вишенський) як історичне
    коріння традиції критичної аргументації.'
  - 'Багатозначність терміна «критика»: розрізнення наукової оцінки (criticism/review)
    та побутового засудження (blame).'
- section: 'Характеристика та оцінка: Прикметники та словосполучення (Characterization
    and Evaluation: Adjectives and Collocations)'
  words: 800
  points:
  - 'Прикметники для характеристики процесу: детальний, ґрунтовний, всебічний, системний;
    конотації та контексти.'
  - 'Прикметники для оцінки результату: переконливий, вагомий, достовірний, релевантний;
    частота в сучасному професійному дискурсі.'
  - 'Стійкі колокації: «глибокий аналіз», «науково обґрунтований», «всебічний огляд»,
    «піддавати аналізу».'
  - 'Розрізнення відтінків значень у складних випадках оцінки: суперечливий, неоднозначний,
    спірний.'
- section: 'Культура мовлення: Виправлення типових помилок (Speech Culture: Correcting
    Common Errors)'
  words: 900
  points:
  - 'Помилка калькування: уникнення небажаного «робити аналіз» (make an analysis)
    на користь нормативного «проводити аналіз» або дієслова «аналізувати».'
  - 'Семантична норма: виправлення кальки «вірний висновок» (loyal) на «правильний
    / слушний / обґрунтований висновок».'
  - 'Стилістична трансформація: відмова від пасивних конструкцій («мною було проаналізовано»)
    на користь активних («Я проаналізував», «Дослідження показує»).'
  - 'Елементи структурування тексту за стандартом §4.4.4: вставні слова «по-перше»,
    «отже», «таким чином» для логічного зв''язку.'
- section: 'Практика: Побудова аналітичного тексту та рецензування (Practice: Constructing
    Analytical Text and Reviewing)'
  words: 1000
  points:
  - 'Методи побудови складних аналітичних речень: дотримання точності формулювань
    та варіювання синонімічного ряду.'
  - 'Написання критичного параграфа: практичне застосування принципу Agency Pass для
    посилення авторської позиції.'
  - 'Аналіз адаптованих текстів реальних рецензій: ідентифікація засобів створення
    об''єктивного та системного тону.'
  - Фінальне оцінювання тексту на відповідність критеріям релевантності, достовірності
    та обґрунтованості.
vocabulary_hints:
  required:
  - аналіз (analysis) — глибокий аналіз, проводити аналіз; висока частотність у науковому
    та публіцистичному стилях
  - синтез (synthesis) — аналіз і синтез, органічний синтез; ключовий термін для академічного
    викладу
  - інтерпретація (interpretation) — суб'єктивна інтерпретація, пропонувати інтерпретацію;
    оцінна лексика
  - класифікація (classification) — детальна класифікація, піддавати класифікації;
    термін для структурування даних
  - систематизація (systematization) — систематизація даних, потребувати систематизації;
    логічне впорядкування
  - детальний (detailed) — детальний огляд, детальний аналіз; характеристика глибини
    дослідження
  - ґрунтовний (thorough) — ґрунтовне дослідження, ґрунтовна відповідь; позитивна
    оцінка якості
  - всебічний (comprehensive) — всебічний розгляд, всебічне висвітлення; системна
    характеристика об'єкта
  - критичний (critical) — критичний підхід, критичне мислення; ключовий прикметник
    для аналізу
  - обґрунтований (substantiated) — науково обґрунтований, цілком обґрунтований сумнів;
    нормативна заміна кальки «вірний»
  recommended:
  - зіставлення (comparison) — порівняння та зіставлення; засіб виявлення спільних
    та відмінних рис
  - узагальнення (generalization) — теоретичне узагальнення, робити узагальнення;
    фінальний етап аналізу
  - комплексний (complex) — комплексний підхід, комплексне розв'язання; системне охоплення
    проблеми
  - системний (systematic) — системний погляд, системна критика; характеристика методології
  - релевантний (relevant) — релевантна інформація, суспільно релевантний; актуальність
    та відповідність контексту
  - правильний / слушний (correct/apt) — правильний висновок; нормативна лексика (уникати
    кальки «вірний»)
  - проводити (to conduct) — проводити аналіз, проводити дослідження; стилістично
    виправдане вживання замість «робити»
  - отже / по-перше (therefore / firstly) — елементи структурування тексту згідно
    зі стандартом §4.4.4
