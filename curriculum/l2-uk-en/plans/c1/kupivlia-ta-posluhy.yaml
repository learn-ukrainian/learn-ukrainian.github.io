module: c1-060
level: C1
sequence: 60
slug: kupivlia-ta-posluhy
version: '1.0'
title: "Купівля та послуги: від споживача до правового захисту"
subtitle: "Купівля, послуги, права споживача"
focus: thematic
pedagogy: TTT
word_target: 4000
objectives:
  - "Опанувати розширену лексику купівлі, торгівлі та послуг на рівні C1."
  - "Вивчити мовні засоби для формулювання скарг, рекламацій та відгуків."
  - "Навчитися обговорювати права споживачів, маркетингові стратегії та етичне
    споживання."
  - "Аналізувати мову реклами: маніпулятивні прийоми та мовні стандарти."

reading_situations:
  - source_type: "юридичний текст"
    topic: "Витяг із Закону України 'Про захист прав споживачів': аналіз термінології."
    key_elements: ["гарантія", "рекламація", "повернення", "компенсація"]
    motivation: "Вивчення юридичної лексики у сфері споживчих прав."
  - source_type: "рекламний текст"
    topic: "Аналіз мовних маніпуляцій у рекламі: 'до -70%', 'від виробника',
      'натуральний склад'."
    key_elements: ["маніпуляція", "евфемізм", "пресупозиція"]
    motivation: "Критичний аналіз рекламного дискурсу."

listening_situations:
  - media_type: "діалог"
    setting: "Розмова з менеджером магазину про повернення бракованого товару."
    focus_points: ["аргументація", "ввічлива наполегливість", "юридична лексика"]
    motivation: "Сприйняття комунікативних стратегій у конфліктній ситуації."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть рекламацію (250 слів) на ім'я директора магазину електроніки
      щодо бракованого ноутбука: опис дефекту, посилання на гарантію, вимоги."
    requirements: ["офіційно-діловий стиль", "юридична аргументація",
      "чітке формулювання вимог"]
    motivation: "Практика офіційного листування у споживчій сфері."
    model_answer: "Текст має містити дату покупки, опис дефекту, посилання на закон
      та чітко сформульовану вимогу (заміна або повернення коштів)."

discussion_topics:
  - context: "Етичне споживання: мода чи відповідальність?"
    questions:
      - "Як мова реклами маніпулює споживачем? Які прийоми найефективніші?"
      - "Чи змінило онлайн-шопінг культуру купівлі в Україні?"
    motivation: "Критичний аналіз споживчої культури та мови торгівлі."

content_outline:
  - section: "Купівля та торгівля: лексичний арсенал"
    words: 1000
    subsections:
      - "Типи магазинів та торгових платформ: від базару до маркетплейсу"
      - "Процес купівлі: вибір, оплата, доставка, повернення"
      - "Знижки, акції, розстрочка: фінансова лексика торгівлі"
    key_concepts:
      - "купівля"
      - "знижка"
      - "доставка"
  - section: "Сфера послуг"
    words: 1000
    subsections:
      - "Побутові послуги: ремонт, хімчистка, кравецька майстерня"
      - "Фінансові послуги: банк, страхування, кредит"
      - "Цифрові послуги: підписка, клауд, техпідтримка"
    key_concepts:
      - "послуга"
      - "страхування"
      - "підписка"
  - section: "Права споживача та рекламація"
    words: 1000
    subsections:
      - "Закон 'Про захист прав споживачів': ключові положення"
      - "Гарантія, рекламація, повернення: процедура та термінологія"
      - "Як скласти скаргу та відгук: структура та мовні засоби"
    key_concepts:
      - "гарантія"
      - "рекламація"
      - "споживач"
  - section: "Мова реклами та маніпуляція"
    words: 1000
    subsections:
      - "Рекламний дискурс: слогани, евфемізми, пресупозиції"
      - "Маніпулятивні прийоми: 'безкоштовно', 'тільки сьогодні', 'лідер ринку'"
      - "Критичний аналіз реклами: від розпізнавання до деконструкції"
    key_concepts:
      - "реклама"
      - "маніпуляція"
      - "евфемізм"

vocabulary:
  required:
    - купівля
    - послуга
    - знижка
    - гарантія
    - рекламація
    - споживач
    - страхування
    - маніпуляція
  recommended:
    - розстрочка
    - маркетплейс
    - підписка
    - пресупозиція
    - деконструкція

activity_hints:
  - type: reading
    focus: "Прочитайте текст про купівля та торгівля: лексичний арсенал і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про сфера послуг, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Купівля та торгівля: лексичний арсенал». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему купівля та торгівля: лексичний арсенал."
  - type: comparative-study
    focus: "Порівняйте різні підходи до купівля та торгівля: лексичний арсенал: Типи магазинів та торгових платформ: від базару до маркетплейсу. Визначте спільне та відмінне."

activities:
  types_required:
    - fill-in
    - critical-analysis
    - error-correction
    - match-up
    - select
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §1-5 — Культура мовлення: ділова лексика"
  - "Авраменко, 11 клас (2019): Офіційно-діловий стиль — листування"
  - "State Standard 2024: C1 — тематичне поле 'купівля та послуги'"

connects_to:
  previous: "combined-complex-sentences"
  next: "complex-sentence-practice"
