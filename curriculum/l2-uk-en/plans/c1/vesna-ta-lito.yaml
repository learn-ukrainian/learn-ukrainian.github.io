- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Весна: закликання
    життя та пам''ять роду». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему весна:
    закликання життя та пам''ять роду.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до весна: закликання життя та пам''ять роду: Благовіщення
    та Великодні свята: символіка воскресіння природи. Визначте спільне та відмінне.'
