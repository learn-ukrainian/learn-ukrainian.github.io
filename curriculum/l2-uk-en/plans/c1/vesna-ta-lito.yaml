module: c1-081
level: C1
sequence: 81
slug: vesna-ta-lito
version: '2.0'
title: Весна та літо
subtitle: Spring and Summer Calendar Rituals
content_outline:
- section: 'Вступ: Календарно-обрядовий цикл (Introduction: Calendar-Ritual Cycle)'
  words: 600
  points:
  - Аналіз поняття 'календарна обрядовість' відповідно до Державного стандарту §3.21 (релігійні та народні звичаї)
  - 'Релігійний синкретизм: дослідження нашарування християнських традицій на давній солярний культ та аграрну магію'
  - Роль антропоморфізму в уособленні сил природи (Весна як жива істота, яку закликають)
- section: 'Весняний цикл: Пробудження та вербобиття (Spring Cycle: Awakening and Willow Rituals)'
  words: 1000
  points:
  - 'Веснянки та гаївки: обрядові пісні та хороводи як засіб закликання весни та соціальної ініціації молоді'
  - 'Культурний хук: обряд ''Вербобиття'' — магічне значення фрази ''Не я б''ю — верба б''є'' як передачі життєвої сили дерева
    людині'
  - 'Великдень: писанкарство як сакральне мистецтво та символіка аграрної плодючості в обрядовому хлібі'
  - 'Поминальні дні (Проводи/Гробки): культ предків та етикет спілкування з померлими в українській традиції'
- section: Зелені свята та Трійця (Green Holidays and Pentecost)
  words: 800
  points:
  - 'Традиція ''клечання'': прикрашання осель зеленню як захист від злих сил та символ торжества життя'
  - 'Русальний тиждень: міфологічні уявлення про водних духів та обряди їхнього ''проводу'''
  - 'Типова помилка: розрізнення понять Pentecost та Трійця (Зелені свята) через специфічний фольклорний контекст'
- section: 'Купала: Кульмінація сонячного циклу (Kupala: Culmination of the Solar Cycle)'
  words: 900
  points:
  - 'Стихії вогню та води в купальську ніч: магічні засоби очищення (purification) та ініціації'
  - 'Культурний хук: легенда про квітку папороті як символ піку природної енергії та здатності розуміти мову природи'
  - 'Символіка купальського вінка: плетіння, пускання на воду та ворожіння на долю'
- section: 'Літній фінал: Жнива та Спаса (Summer Finale: Harvest and Spas)'
  words: 700
  points:
  - 'Обжинки: ритуальне завершення жнив, шанування ''останнього снопа'' та обжинкового вінка'
  - 'Спас (Маковія, Яблучний): благословення дарів природи як синтез праці людини та божественної сили'
  - 'Типова помилка: узгодження прикметників з назвами свят, що мають форму лише множини (pluralia tantum: ''Зелені свята
    прийшли'')'
  - 'Лексичний нюанс: доречність вживання ''свято'' замість розмовного ''празник'' у формальних описах традицій'
focus: culture
pedagogy: Immersion & Analysis
objectives:
- Learner can describe the cycle of spring and summer holidays in Ukraine
- Learner understands the symbolism of fire, water, and vegetation in rituals
- Learner can analyze the agrarian and solar motifs in Ukrainian folklore
grammar:
- Ethnographic terminology
- Narrative and ritual registers
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Календарник
word_target: 4000
vocabulary_hints:
  required:
  - Обрядовість (ritualism) — календарна обрядовість, язичницька обрядовість; ключовий академічний термін
  - Синкретизм (syncretism) — релігійний синкретизм, поєднання вірувань; для опису злиття язичництва з християнством
  - Веснянка (spring ritual song) — водити веснянки, закликати весну; фольклорний жанр
  - Клечання (ritual greenery) — зелене клечання, прикрашати клечанням; специфічний термін для Трійці
  - Купальський (Kupala-related) — купальське вогнище, купальська ніч, купальська пісня
  - Обжинки (harvest-end festival) — святкувати обжинки, обжинковий вінок; завершення польових робіт
  - Спас (Feast of the Savior) — Яблучний Спас, на Спаса; релігійно-народне свято
  recommended:
  - Солярний (solar) — солярний культ, солярна символіка; науковий реєстр
  - Антропоморфізм (anthropomorphism) — надання природним явищам людських рис
  - Вербобиття (willow beating) — обряд Вербної неділі
  - Квітка папороті (fern flower) — міфологічний образ піку літа
  - Празник (holiday/feast) — діалектне/розмовне, уникати в наукових есе
prerequisites:
- zymovi-obriady
