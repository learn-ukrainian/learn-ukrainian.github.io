module: c1-104
level: C1
sequence: 104
slug: vesna-ta-lito
version: '1.1'
title: "Весняно-літній обрядовий цикл: пробудження природи та культ предків"
subtitle: "Весняно-літній обрядовий цикл"
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити етапність та внутрішню логіку весняного (від Благовіщення до Трійці)
    та літнього (Купало, жнива) обрядових циклів."
  - "Проаналізувати архаїчні символи та ритуали, спрямовані на забезпечення родючості
    та добробуту громади."
  - "Вивчити специфіку народних гулянь та ігор (гаївки, хороводи, купальські ворожіння)."
  - "Опанувати лексику, що описує природні явища, польові роботи та обрядові артефакти."

reading_situations:
  - source_type: "етнографічне дослідження"
    topic: "Культ рослинності в українському фольклорі: від травневого дерева до зажинкового
      снопа."
    key_elements: ["анімізм", "вегетативна магія", "троїцьке клечання"]
    motivation: "Вивчення наукового аналізу аграрної магії та її термінології."
  - source_type: "художній опис"
    topic: "Свято Івана Купала у творах українських класиків: магія вогню, води та
      папороті."
    key_elements: ["купальське вогнище", "ворожіння", "містична ніч"]
    motivation: "Аналіз емоційно забарвлених текстів, що описують народні святкування."

listening_situations:
  - media_type: "аудіо"
    setting: "Лекція етномузиколога про ритміку та мелодику гаївок у різних регіонах
      України."
    focus_points: ["хороводна структура", "заклична інтонація", "регіональні варіанти"]
    motivation: "Розвиток вміння сприймати на слух фахову інформацію про музичну фольклористику."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть репортаж про святкування Івана Купала в сучасній Україні. Опишіть
      атмосферу, ритуали та емоції учасників, поєднуючи описовість із аналітичним
      поглядом."
    requirements: ['мінімум 300 слів', 'використання художніх засобів', 'вживання
          термінів: купальське вогнище, ворожіння, вінок, папороть']
    motivation: "Вміння описувати культурні дійства в публіцистичному стилі."
    model_answer: "Текст повинен передавати магічну атмосферу купальської ночі, описувати
      стрибки через вогнище та пускання вінків, а також рефлексувати над трансформацією
      архаїчного обряду в сучасне свято."

discussion_topics:
  - context: "Сьогодні народні обряди часто перетворюються на розважальні шоу для
      туристів."
    questions:
      - "Чи можливо зберегти первинний сакральний зміст обряду в умовах масового туризму?"
      - "Яка роль молодіжних фольклорних гуртів у відродженні автентичних традицій?"
      - "Які елементи весняно-літніх обрядів залишаються актуальними для міського
        жителя XXI століття?"
    motivation: "Вміння обговорювати проблеми збереження та трансформації культурної
      спадщини."

content_outline:
  - section: "Весна: закликання життя та пам'ять роду"
    words: 1000
    subsections:
      - "Благовіщення та Великодні свята: символіка воскресіння природи"
      - "Гаївки та веснянки як магічний інструмент пробудження землі"
      - "Радуниця та Проводи: поминання померлих предків як частина весняного циклу"
    key_concepts:
      - "воскресіння"
      - "хоровод"
      - "проводи"
  - section: "Зелені свята та Русалії"
    words: 1000
    subsections:
      - "Трійця: клечання оселі та вшанування духів рослинності"
      - "Повір'я про русалок та ритуали їхнього 'проводжання'"
      - "Роль водіння 'Куста' на Поліссі як унікального архаїчного обряду"
    key_concepts:
      - "клечання"
      - "русалія"
      - "архаїка"
  - section: "Літо: Купальська містерія та апогей сонця"
    words: 1000
    subsections:
      - "Купайло та Марена: антропоморфні символи вогню та води"
      - "Очисні ритуали: стрибки через вогнище та купання в росі"
      - "Ботанічна міфологія: квітка папороті та збір чарівного зілля"
    key_concepts:
      - "містерія"
      - "солярність"
      - "очищення"
  - section: "Жнива: вінець хліборобського року"
    words: 1000
    subsections:
      - "Зажинки та обжинки: ритуальна пошана першому та останньому снопу"
      - "Образ 'Спасової бороди' та подяка за врожай"
      - "Жниварські пісні як супровід важкої колективної праці"
    key_concepts:
      - "жнива"
      - "сніп"
      - "добробут"

vocabulary:
  required:
    - веснянка
    - гаївка
    - трійця
    - купало
    - жнива
    - обряд
    - хоровод
    - врожай
  recommended:
    - вегетативний
    - анімізм
    - сакралізація
    - автентичний
    - антропоморфний

activities:
  types_required:
    - critical-analysis
    - match-up
    - translate
    - fill-in
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте етнографічне дослідження про культ рослинності. Визначте ключову
      термінологію аграрної магії та поясніть її функцію."
  - type: critical-analysis
    focus: "Проаналізуйте художній опис купальської ночі в українській літературі.
      Знайдіть метафори, порівняння та символи."
  - type: comparative-study
    focus: "Зіставте весняно-літні обряди (гаївки, Трійця, Купало, жнива) з їхніми
      датами, символами та функціями."
  - type: essay-response
    focus: "Доповніть текст про весняний обрядовий цикл відповідними термінами (веснянка,
      хоровод, клечання, русалія, зажинки)."
  - type: essay-response
    focus: "Напишіть аналітичний текст про збереження автентичного змісту народних
      обрядів в умовах масового туризму. Аргументуйте прикладами."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Традиції та свята'"
