module: c1-007
level: C1
sequence: 7
slug: citation-reference
version: '1.0'
title: "Культура цитування та академічна доброчесність"
subtitle: "Citation Culture and Academic Integrity"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати правила оформлення прямих та непрямих цитат в українському академічному просторі."
  - "Зрозуміти принципи академічної доброчесності та навчитися уникати плагіату за допомогою парафразу."
  - "Вивчити специфіку використання вступних фраз для введення цитат та посилань на авторитетні джерела."
  - "Навчитися розрізняти первинні та вторинні джерела інформації та коректно на них посилатися."

reading_situations:
  - source_type: "фрагмент академічної статті"
    topic: "Аналіз методології в роботах українських істориків-державників (М. Грушевський, В. Липинський)."
    key_elements: ["цитування класиків", "бібліографічні виноски", "критичний аналіз джерел"]
    motivation: "Вивчення способів інтеграції ідей попередників у власний науковий текст через систему посилань."
  - source_type: "положення про академічну доброчесність"
    topic: "Етичні стандарти написання наукових робіт в університетах України."
    key_elements: ["самоплагіат", "коректне запозичення", "наукова етика"]
    motivation: "Ознайомлення з офіційною термінологією та правилами академічного письма."

listening_situations:
  - media_type: "лекція"
    setting: "Вебінар на тему: 'Як уникнути плагіату: інструменти парафразу та реферирования'."
    focus_points: ["техніки парафразу", "вступні конструкції для цитування", "алгоритм перевірки тексту"]
    motivation: "Розвиток навичок трансформації чужої думки у власну без втрати сенсу та порушення авторських прав."

writing_tasks:
  - task_type: "есе"
    prompt: "Виберіть уривок із класичного твору української літератури та напишіть короткий аналіз (150-200 слів), інтегруючи в нього дві прямі цитати та одну парафразу. Використовуйте різноманітні вступні конструкції."
    requirements: ["коректність цитування", "точність парафрази", "відповідність стилістичним нормам"]
    motivation: "Практичне застосування правил цитування в аналітичному тексті."
    model_answer: "Текст повинен демонструвати вміння органічно вплітати цитати в речення, використовуючи слова 'як зазначає', 'за словами', 'згідно з позицією'."

content_outline:
  - section: "Феномен цитування та його функції"
    words: 1000
    subsections:
      - "Функції цитування: аргументація, ілюстрація, полеміка"
      - "Види цитат: пряма цитата vs непряма мова (парафраза)"
      - "Обсяг та доцільність цитування в науковому тексті"
    key_concepts:
      - "першоджерело"
      - "авторитетність"
      - "релевантність"
  - section: "Мовні засоби введення посилань"
    words: 1000
    subsections:
      - "Вступні фрази з іменем автора: 'X наголошує, що...', 'За визначенням X...'"
      - "Безособові конструкції для посилання: 'Встановлено, що...', 'У науковій літературі зазначається...'"
      - "Синоніми до дієслів мовлення в науковому контексті (стверджувати, зауважувати, акцентувати)"
    key_concepts:
      - "атрибуція"
      - "дискурсивна формула"
      - "дієслова декларації"
  - section: "Парафраза як альтернатива цитуванню"
    words: 1000
    subsections:
      - "Алгоритм створення якісної парафрази: зміна синтаксису, лексична заміна"
      - "Уникнення 'мозаїчного плагіату' (змішування своїх та чужих слів без лапок)"
      - "Збереження точності змісту при зміні форми вираження"
    key_concepts:
      - "парафраза"
      - "інтерпретація"
      - "лексична синонімія"
  - section: "Академічна доброчесність в українському контексті"
    words: 1000
    subsections:
      - "Поняття плагіату та його види в сучасній українській освіті"
      - "Етика використання штучного інтелекту в наукових роботах"
      - "ДСТУ 8302:2015: короткий огляд правил оформлення бібліографічних посилань"
    key_concepts:
      - "доброчесність"
      - "авторське право"
      - "бібліографічний опис"

vocabulary:
  required:
    - джерело
    - посилання
    - цитата
    - плагіат
    - запозичення
    - інтерпретація
    - парафраза
    - авторитетний
  recommended:
    - автентичний
    - бібліографія
    - виноска
    - узагальнення
    - верифікація

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - essay-response
    - translate
  min_items_per_type: 5
  total_min_items: 25

connects_to:
  previous: "hedging-modality"
  next: "essay-structure"
