module: c1-007
level: C1
sequence: 7
slug: citation-reference
version: '2.0'
title: Цитація та посилання
content_outline:
- section: Академічна доброчесність та етика (Academic Integrity and Ethics)
  words: 500
  points:
  - 'Етика цитування в академічному світі: роль Національного агентства із забезпечення
    якості вищої освіти (НАЗЯВО) у формуванні культури доброчесності'
  - Відхід від радянських практик 'списування' до європейських норм інтелектуальної
    власності та наслідки академічного плагіату
  - Роль посилань у науковому тексті як інструменту верифікації та наукового діалогу
- section: 'Лексика цитування: дієслова та терміни (Citation Lexis: Verbs and Terms)'
  words: 700
  points:
  - Розрізнення термінів 'цитування' (дослівне) та 'посилання' (вказівка на джерело);
    розгляд синонімів 'посилання' та 'покликання'
  - 'Дієслова для введення джерел: цитувати, покликатися на, згадувати, зазначати
    (автор зазначає), наводити (наводити дані/аргументи)'
  - 'Типова помилка керування: правильне вживання ''посилатися на статтю'' або ''цитувати
    статтю'' замість помилкового калькування ''цитувати на статтю'''
- section: Синтаксичні структури посилань (Syntactic Reference Structures)
  words: 700
  points:
  - 'Вступні конструкції для атрибуції: ''За словами Х...'', ''Як зазначає дослідник...'',
    ''Згідно з висновками Х...'''
  - 'Авторська позиція та структури ствердження: ''Х наголошує, що...'', ''У праці
    Х обґрунтовано...'''
  - 'Інтеграція з категорією Hedging (C1-06): використання модальних маркерів ''можливо'',
    ''ймовірно'' при коментуванні чужих думок'
- section: Техніки передачі чужого мовлення (Techniques of Reporting Speech)
  words: 700
  points:
  - 'Трансформація прямої мови в непряму та невласне пряму (згідно зі стандартом §1.3.1.1):
    лексичні та графічні засоби'
  - Засоби перефразування (іномовлення) для уникнення надмірного цитування та збереження
    авторського стилю
  - 'Пунктуаційна норма: вимога використовувати українські лапки «ялинки» замість
    англійських “лапок” у науковому тексті'
- section: Національний стандарт бібліографії (National Bibliography Standard)
  words: 600
  points:
  - 'ДСТУ 8302:2015: ключові вимоги чинного національного стандарту оформлення посилань
    та його відмінність від застарілих ГОСТів'
  - 'Структура бібліографічного запису: посилання в тексті (внутрішньотекстові, підрядкові)
    та список використаних джерел'
  - 'Термінологічна нюансировка: ''References'' (Список використаних джерел) vs ''Bibliography''
    (Бібліографія) в українському контексті'
- section: 'Практикум: уникнення помилок та інтеграція (Workshop: Error Avoidance
    and Integration)'
  words: 800
  points:
  - 'Виправлення лексичної помилки: ''посилання'' як бібліографічний термін vs ''ссилка''
    як каторжне заслання (в Сибір)'
  - 'Плавне введення цитат у текст: стратегії уникнення ''цитатного клаптика'' (уникнення
    надмірного накопичення чужих думок без коментаря)'
  - 'Робота з реальними текстами: атрибуція першоджерел vs вторинних джерел та техніка
    перевірки цитат на точність'
vocabulary_hints:
  required:
  - цитата (quotation) — наводити цитату, вирвати з контексту; висока частотність
    у науковому стилі
  - посилання (reference) — робити посилання, бібліографічне посилання; уникати кальки
    'ссилка'
  - джерело (source) — першоджерело, надійне джерело, посилатися на джерело
  - плагіат (plagiarism) — академічний плагіат, уникнення плагіату, перевірка на плагіат
  - покликатися (to cite/refer) — покликатися на авторитет, покликатися на статтю;
    книжний синонім до 'посилатися'
  - зазначати (to state/note) — як зазначає автор, варто зазначити; ключове дієслово
    академічного реєстру
  - наводити (to cite/provide) — наводити приклад, наводити дані, наводити аргументи
  - перефразування (paraphrasing) — засоби іномовлення (за стандартом С1)
  - бібліографія (bibliography) — список використаних джерел, оформлення бібліографії
  - атрибуція (attribution) — вказівка на авторство цитованого фрагмента
  recommended:
  - антиплагіат (anti-plagiarism) — сервіси перевірки тексту на оригінальність
  - самоцитування (self-citation) — використання власних попередніх праць (етичний
    аспект)
  - цитатний індекс (citation index) — показник наукової активності та впливовості
  - ялинки (guillemets) — українські лапки «...» для друкованих текстів
  - доброчесність (integrity) — академічна доброчесність як стандарт наукової діяльності
