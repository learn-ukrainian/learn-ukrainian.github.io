module: c1-037
level: C1
sequence: 37
slug: irony-sarcasm
version: '2.0'
title: 'Іронія та сарказм: Тонкощі змісту'
subtitle: 'Irony & Sarcasm: Nuances of Meaning'
content_outline:
- section: Розминка — Коли слова означають протилежне
  points:
  - Іронія — невідповідність між словами та значенням
  - Сарказм — їдка, зла іронія
  - Культурний контекст — українська традиція іронії (Котляревський, Вишня)
- section: Irony Markers
  points:
  - Intonation (in speech)
  - Context contradiction
  - Exaggeration signals
  - Quotation marks for "scare quotes"
- section: Types
  points:
  - 'Вербальна іронія: Saying opposite of meaning'
  - 'Ситуативна іронія: Unexpected outcomes'
  - 'Сарказм: Bitter, cutting irony'
- section: Практика — розпізнавання іронії
  points:
  - Визначити іронію в публіцистичному тексті
  - Аналіз гумористичного тексту (Остап Вишня)
  - Написати іронічний коментар на актуальну тему
  - Розрізнити вербальну та ситуативну іронію в контексті
focus: style
pedagogy: Immersion
objectives:
- Distinguish between verbal irony, situational irony, and sarcasm
- Identify markers of irony in written and spoken texts
- Use irony appropriately in different registers
grammar:
- Verbal vs. situational irony
- Markers of sarcasm (intonation, context)
- Punctuation in ironic statements
phase: C1.4 Advanced Stylistics & Rhetoric
persona:
  voice: Senior Specialist
  role: Сатирик
