vocabulary_hints:
  required:
  - іронія (irony) — тонка іронія, доля іронії, гірка іронія; High frequency in literary and publicist styles.
  - сарказм (sarcasm) — їдкий сарказм, неприхований сарказм, вдаватися до сарказму; used for bitter, cutting mockery.
  - підтекст (subtext) — читати між рядків, глибокий підтекст, іронічний підтекст; essential for C1 reading comprehension.
  - кепкування (teasing) — доброзичливе кепкування, об’єкт кепкування; implies a friendly or mild joke.
  - глузування (mockery) — зле глузування, піддавати глузуванню; has a more negative, often destructive connotation than irony.
  - дотепність (wittiness) — блискуча дотепність, виявляти дотепність; a positive trait of intellectual humor.
  recommended:
  - самоіронія (self-irony) — a highly valued trait in Ukrainian cultural context, signaling resilience.
  - бурлеск (burlesque) — reference to Kotlyarevsky's style of low-register irony.
  - усмішка (smile/humoresque) — the specific genre created by Ostap Vyshnya.
  - авжеж (of course/surely) — particle used as an ironic marker to signal 'the opposite is true'.
  - ще б пак (and how/you bet) — colloquial ironic marker used to emphasize obvious sarcasm.
