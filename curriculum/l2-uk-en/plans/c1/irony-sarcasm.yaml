module: c1-055
level: C1
sequence: 55
slug: irony-sarcasm
version: '1.1'
title: "Іронія та сарказм як інструменти інтелектуальної комунікації"
subtitle: "Irony and Sarcasm as Tools of Intellectual Communication"
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
  - "Розрізняти відтінки комічного: від м'якого гумору та іронії до гострого сарказму."
  - "Аналізувати мовні засоби вираження іронічного змісту в публіцистиці та художній літературі."
  - "Опанувати стратегії розпізнавання прихованої іронії в академічній дискусії та офіційному листуванні."
  - "Використовувати іронію як засіб інтелектуального захисту та аргументації."

reading_situations:
  - source_type: "публіцистичне есе"
    topic: "Феномен української іронії: від 'Енеїди' Котляревського до сучасних соціальних мереж."
    key_elements: ["підтекст", "антифразис", "культурний контекст"]
    motivation: "Розуміння історичних коренів та національної специфіки українського гумору."
  - source_type: "критичний огляд"
    topic: "Сарказм як зброя в політичній риториці: аналіз виступів та памфлетів."
    key_elements: ["гіпербола", "інтонація", "парадокс"]
    motivation: "Вивчення прагматичного впливу гострого слова на аудиторію."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з відомим українським стендап-коміком про межу між самоіронією та приниженням."
    focus_points: ["мовленнєві маркери іронії", "паузи", "реакція слухачів"]
    motivation: "Аналіз живої іронічної комунікації та її соціальних функцій."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть іронічний репортаж (300-400 слів) про абсурдну бюрократичну ситуацію, використовуючи засоби прихованої насмішки."
    requirements: ["використання евфемізмів для створення контрасту", "наявність інтелектуального підтексту", "відсутність прямої образи"]
    motivation: "Розвиток майстерності володіння тонкою іронією в письмі."
    model_answer: "Текст має бути витриманий у стилі 'серйозного абсурду', де за офіційними формулами ховається гостра критика."

discussion_topics:
  - context: "Чи є іронія ознакою інтелектуальної зрілості чи вона заважає щирості в суспільстві?"
    questions:
      - "Чому сарказм вважають 'нижчою' формою іронії?"
      - "Як уникнути конфліктів при використанні іронії в кроскультурному спілкуванні?"
      - "Чи можлива 'позитивна' іронія в науковому тексті?"
    motivation: "Етичний та психологічний аналіз іронічної поведінки."

content_outline:
  - section: "Категорії комічного: семантика та прагматика"
    words: 1000
    subsections:
      - "Іронія як інтелектуальна гра: невідповідність форми і змісту"
      - "Сарказм як гранична форма іронії: агресія через заперечення"
      - "Самоіронія як маркер психологічної стійкості"
    key_concepts:
      - "підтекст"
      - "антифразис"
      - "дискурс"
  - section: "Мовні механізми створення іронічного ефекту"
    words: 1000
    subsections:
      - "Лексичні засоби: слова з переносним значенням, неологізми, оказіоналізми"
      - "Синтаксичні засоби: інверсія, риторичне питання, паралелізм"
      - "Стилістичні фігури: оксиморон, літота, гіпербола в службі іронії"
    key_concepts:
      - "оксиморон"
      - "інтонація"
      - "контраст"
  - section: "Іронія в українському літературному процесі"
    words: 1000
    subsections:
      - "Традиції Котляревського та 'сміхова культура' українців"
      - "Сарказм у творчості Тараса Шевченка та Лесі Українки: соціальний контекст"
      - "Постмодерна іронія в сучасній українській прозі (Бу-Ба-Бу та ін.)"
    key_concepts:
      - "традиція"
      - "пародія"
      - "трагікомізм"
  - section: "Іронія в професійній комунікації та медіа"
    words: 1000
    subsections:
      - "Іронічне хеджування в академічному дискурсі"
      - "Маніпулятивний потенціал сарказму в соціальних мережах"
      - "Етика іронії: де закінчується дотеп і починається булінг"
    key_concepts:
      - "етика"
      - "маніпуляція"
      - "соціальна мережа"

vocabulary:
  required:
    - підтекст
    - сарказм
    - двозначність
    - глум
    - насмішка
    - інтелектуальний
    - амбівалентність
    - дотепність
  recommended:
    - цинізм
    - скептицизм
    - парадокс
    - нігілізм
    - рефлексія

activity_hints:
  - type: critical-analysis
    description: "Analyze an ironic newspaper column — identify all markers of irony (antiphrase, context mismatch, hyperbole in service of irony) and explain their effect."
  - type: essay-response
    description: "Write a short ironic commentary (100-150 words) on a given absurd situation, using subtle linguistic irony without direct insults."
  - type: select
    description: "Identify whether excerpts use гумор, іронія, сарказм, or самоіронія — and explain the linguistic markers that distinguish them."
  - type: error-correction
    description: "Rewrite sentences where intended irony fails — fix cases where the ironic meaning is unclear or the tone shifts to unintended aggression."
  - type: match-up
    description: "Match literary examples of irony (from Котляревський, Шевченко, Бу-Ба-Бу) with the type of comic effect and the social target."

activities:
  types_required:
    - critical-analysis
    - essay-response
    - select
    - error-correction
    - match-up
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §38 — Лексичні засоби стилістики"
  - "Глазова, 11 клас (2019): §40-42 — Стилістичне забарвлення лексики, фразеологізмів"
  - "Авраменко, 11 клас (Укр. літ.): Літературознавчі терміни — іронія, сатира, гротеск"

connects_to:
  previous: "metaphor-simile"
  next: "hyperbole-litotes"
