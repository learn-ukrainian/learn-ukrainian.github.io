module: c1-065
level: C1
sequence: 65
slug: irony-sarcasm
version: 1.1.2
title: Іронія та сарказм як інструменти інтелектуальної комунікації
subtitle: Іронія і сарказм як інструменти інтелектуальної комунікації
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
- 'Розрізняти відтінки комічного: від м''якого гумору та іронії до гострого сарказму.'
- Аналізувати мовні засоби вираження іронічного змісту в публіцистиці та 
  художній літературі.
- Опанувати стратегії розпізнавання прихованої іронії в академічній дискусії та 
  офіційному листуванні.
- Використовувати іронію як засіб інтелектуального захисту та аргументації.
reading_situations:
- source_type: публіцистичне есе
  topic: 'Феномен української іронії: від ''Енеїди'' Котляревського до сучасних соціальних
    мереж.'
  key_elements:
  - підтекст
  - антифразис
  - культурний контекст
  motivation: Розуміння історичних коренів та національної специфіки 
    українського гумору.
- source_type: критичний огляд
  topic: 'Сарказм як зброя в політичній риториці: аналіз виступів та памфлетів.'
  key_elements:
  - гіпербола
  - інтонація
  - парадокс
  motivation: Вивчення прагматичного впливу гострого слова на аудиторію.
listening_situations:
- media_type: інтерв'ю
  setting: Розмова з відомим українським стендап-коміком про межу між 
    самоіронією та приниженням.
  focus_points:
  - мовленнєві маркери іронії
  - паузи
  - реакція слухачів
  motivation: Аналіз живої іронічної комунікації та її соціальних функцій.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть іронічний репортаж (300-400 слів) про абсурдну бюрократичну 
    ситуацію, використовуючи засоби прихованої насмішки.
  requirements:
  - використання евфемізмів для створення контрасту
  - наявність інтелектуального підтексту
  - відсутність прямої образи
  motivation: Розвиток майстерності володіння тонкою іронією в письмі.
  model_answer: Текст має бути витриманий у стилі 'серйозного абсурду', де за 
    офіційними формулами ховається гостра критика.
discussion_topics:
- context: Чи є іронія ознакою інтелектуальної зрілості чи вона заважає щирості 
    в суспільстві?
  questions:
  - Чому сарказм вважають 'нижчою' формою іронії?
  - Як уникнути конфліктів при використанні іронії в кроскультурному 
    спілкуванні?
  - Чи можлива 'позитивна' іронія в науковому тексті?
  motivation: Етичний та психологічний аналіз іронічної поведінки.
content_outline:
- section: 'Категорії комічного: семантика та прагматика'
  words: 1000
  subsections:
  - 'Іронія як інтелектуальна гра: невідповідність форми і змісту'
  - 'Сарказм як гранична форма іронії: агресія через заперечення'
  - Самоіронія як маркер психологічної стійкості
  key_concepts:
  - підтекст
  - антифразис
  - дискурс
- section: Мовні механізми створення іронічного ефекту
  words: 1000
  subsections:
  - 'Лексичні засоби: слова з переносним значенням, неологізми, оказіоналізми'
  - 'Синтаксичні засоби: інверсія, риторичне питання, паралелізм'
  - 'Стилістичні фігури: оксиморон, літота, гіпербола в службі іронії'
  key_concepts:
  - оксиморон
  - інтонація
  - контраст
- section: Іронія в українському літературному процесі
  words: 1000
  subsections:
  - Традиції Котляревського та 'сміхова культура' українців
  - 'Сарказм у творчості Тараса Шевченка та Лесі Українки: соціальний контекст'
  - Постмодерна іронія в сучасній українській прозі (Бу-Ба-Бу та ін.)
  key_concepts:
  - традиція
  - пародія
  - трагікомізм
- section: Іронія в професійній комунікації та медіа
  words: 1000
  subsections:
  - Іронічне хеджування в академічному дискурсі
  - Маніпулятивний потенціал сарказму в соціальних мережах
  - 'Етика іронії: де закінчується дотеп і починається булінг'
  key_concepts:
  - етика
  - маніпуляція
  - соціальна мережа
- section: Підсумок — Summary
  words: 300
  points:
  - 'The comic spectrum ranges from mild humor to sharp sarcasm, utilizing stylistic
    devices like оксиморон, літота, гіпербола, and інверсія to create a disconnect
    between form and meaning (підтекст). Self-check: What is the difference between
    іронія and сарказм? Give an example of an оксиморон in Ukrainian.'
  - "Irony serves different functions across contexts, from the traditional 'laugh
    culture' of Kotliarevsky to hedging in academic discourse and manipulation in
    modern media. Self-check: Describe 3 situations where you would use самоіронія
    as a psychological defense. How does irony differ from bullying (булінг) in social
    networks?"
vocabulary:
  required:
  - підтекст
  - сарказм
  - двозначність
  - глум
  - насмішка
  - інтелектуальний
  - амбівалентність
  - дотепність
  recommended:
  - цинізм
  - скептицизм
  - парадокс
  - нігілізм
  - рефлексія
activity_hints:
- type: reading
  focus: 'Прочитайте текст про категорії комічного: семантика та прагматика і дайте
    відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про мовні механізми створення 
    іронічного ефекту, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Категорії комічного:
    семантика та прагматика». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему категорії
    комічного: семантика та прагматика.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до категорії комічного: семантика та прагматика:
    Іронія як інтелектуальна гра: невідповідність форми і змісту. Визначте спільне
    та відмінне.'
activities:
  types_required:
  - critical-analysis
  - essay-response
  - select
  - error-correction
  - match-up
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Караман, 10 клас (2018): §38 — Лексичні засоби стилістики'
- 'Глазова, 11 клас (2019): §40-42 — Стилістичне забарвлення лексики, фразеологізмів'
- 'Авраменко, 11 клас (Укр. літ.): Літературознавчі терміни — іронія, сатира, гротеск'
