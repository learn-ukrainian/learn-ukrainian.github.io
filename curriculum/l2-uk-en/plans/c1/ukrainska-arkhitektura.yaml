module: c1-128
level: C1
sequence: 128
slug: ukrainska-arkhitektura
version: '1.2'
title: "Українська архітектура: Від візантійських витоків до сучасного урбанізму"
subtitle: "Українська архітектура: від витоків до урбанізму"
focus: culture
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити еволюцію архітектурних стилів в Україні (Русь, Бароко, Модерн, Конструктивізм)."
  - "Проаналізувати феномен 'українського бароко' (мазепинського) як унікального національного
    стилю."
  - "Вивчити внесок видатних архітекторів (Городецький, Кричевський, Растреллі) у
    формування обличчя українських міст."
  - "Ознайомитися з проблемами збереження архітектурної спадщини та сучасними містобудівними
    тенденціями."

reading_situations:
  - source_type: "архітектурний путівник"
    topic: "Шедеври Владислава Городецького в Києві: Будинок з химерами та костел
      св. Миколая."
    key_elements: ["модерн", "неоготика", "бетон", "еклектика", "декор"]
    motivation: "Робота з описами архітектурних пам'яток та технічними термінами."
  - source_type: "урбаністичне дослідження"
    topic: "Харківський Держпром: маніфест конструктивізму та символ індустріальної
      епохи."
    key_elements: ["конструктивізм", "функціональність", "залізобетон", "ансамбль",
      "авангард"]
    motivation: "Аналіз впливу ідеології на архітектурну форму."

listening_situations:
  - media_type: "відео-лекція"
    setting: "Лекція про особливості дерев'яної архітектури Карпат (церкви, занесені
      до списку ЮНЕСКО) з аналізом конструктивних особливостей."
    focus_points: ["зруб", "опасання", "ґонт", "пропорції", "сакральний простір"]
    motivation: "Розвиток навичок розуміння описів традиційних технологій будівництва."

writing_tasks:
  - task_type: "есе"
    prompt: "Порівняйте естетику українського бароко та класицизму. Як ці стилі відображали
      різні етапи державотворення та культурної орієнтації України?"
    requirements: ["мінімум 400 слів", "використання термінів: ордер, фасад, купол,
          декор, меценатство, ансамбль", "порівняльний аналіз"]
    motivation: "Глибоке осмислення зв'язку архітектури з історичним контекстом."
    model_answer: "Текст має розкривати пишність та динамізм мазепинського бароко
      як вираження козацької ідентичності та амбіцій. Слід протиставити його суворості
      та раціональності класицизму, що прийшов разом із імперським адмініструванням.
      Автор повинен згадати конкретні пам'ятки (напр., Софійський собор після перебудови
      та Палац Розумовського в Батурині)."

discussion_topics:
  - context: "Сьогодні багато історичних пам'яток в Україні перебувають під загрозою
      знищення через забудову або бойові дії."
    questions:
      - "Що важливіше для сучасного міста: збереження автентичного вигляду чи розвиток
        нової інфраструктури?"
      - "Як цифрові технології (3D-сканування) можуть допомогти у збереженні та відновленні
        архітектурної спадщини?"
    motivation: "Тренування навичок дискусії про збереження культури в умовах глобалізації."

content_outline:
  - section: "Архітектура Київської Русі та Середньовіччя"
    words: 1000
    subsections:
      - "Візантійська спадщина та її трансформація на українському ґрунті (Софія Київська)"
      - "Оборонна архітектура: замки та фортеці Західної України (Кам'янець-Подільський,
        Хотин)"
      - "Дерев'яна архітектура: унікальність народних традицій"
    key_concepts: ["фреска", "апсида", "зруб", "фортифікація"]
  - section: "Українське бароко: Золота доба"
    words: 1000
    subsections:
      - "Меценатство Івана Мазепи та розквіт козацького бароко"
      - "Архітектура Києво-Печерської Лаври та перебудова давніх храмів"
      - "Бароко у Львові: собор св. Юра (Бернард Меретин, Іоан Пінзель)"
    key_concepts: ["бароко", "рококо", "декор", "символізм"]
  - section: "Модерн та пошук національного стилю"
    words: 1000
    subsections:
      - "Василь Кричевський та будинок Полтавського земства: народні мотиви в архітектурі"
      - "Київський модерн Владислава Городецького: екзотика та інновації"
      - "Харківська школа конструктивізму: Держпром та ідеї майбутнього"
    key_concepts: ["модерн", "еклектика", "конструктивізм", "функціоналізм"]
  - section: "Радянська спадщина та сучасність"
    words: 1000
    subsections:
      - "Сталінський ампір та повоєнна відбудова Хрещатика"
      - "Радянський модернізм та бруталізм 1960-80-х років"
      - "Сучасна архітектура України: виклики відбудови та європейські стандарти"
    key_concepts: ["ампір", "бруталізм", "ревіталізація", "урбаністика"]

vocabulary:
  required:
    - фасад
    - колона
    - купол
    - апсида
    - ордер
    - декор
    - реставрація
    - ансамбль
    - екстер'єр
    - планування
  recommended:
    - ліпнина
    - вітраж
    - портал
    - карниз
    - арка
    - портик

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте текст про архітектура київської русі та середньовіччя і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про українське бароко: золота доба, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Архітектура Київської Русі та Середньовіччя». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему архітектура київської русі та середньовіччя."
  - type: comparative-study
    focus: "Порівняйте різні підходи до архітектура київської русі та середньовіччя: Візантійська спадщина та її трансформація на українському ґрунті (Софія Київська. Визначте спільне та відмінне."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та архітектура'"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"
  - "Архітектурні довідники — козацьке бароко, Городецький, Кричевський (загальна
    довідка)"

