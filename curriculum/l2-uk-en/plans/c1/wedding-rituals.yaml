module: c1-072
level: C1
sequence: 72
slug: wedding-rituals
version: '2.0'
title: Родинні обряди - весілля
subtitle: Family Rituals - Wedding
content_outline:
- section: 'Вступ: Весілля як сакральний обряд переходу (Introduction: Wedding as
    a Sacred Rite of Passage)'
  words: 500
  points:
  - 'Весілля як найважливіший обряд переходу в життєвому циклі людини (State Standard
    §3.21: сімейні свята)'
  - 'Структура традиційного весілля: передвесільний, весільний та післявесільний цикли'
  - 'Сакральна символіка шлюбу: створення нової родини як соціальний та духовний акт'
- section: 'Передвесільний цикл: Від сватання до короваю (Pre-wedding Cycle: From
    Matchmaking to Korovai)'
  words: 1000
  points:
  - 'Сватання (matchmaking): ролі старостів, обряд перев''язування рушниками та культурний
    код ''дати гарбуза'' як ввічлива відмова'
  - 'Заручини (engagement): обмін обручками, благословення батьків та офіційне закріплення
    статусу наречених'
  - 'Ритуал ''бгання короваю'': коровай як модель всесвіту, участь щасливих у шлюбі
    жінок (коровайниць) та магічне оздоблення'
  - 'Дівич-вечір та парубоцький вечір: прощання з молодіжним станом, плетіння вінків
    та ритуальні пісні'
- section: 'Весільна драма: Від посаду до перезви (The Wedding Drama: From Posad to
    Perezhva)'
  words: 1100
  points:
  - 'Посад та розплітання коси: символіка переходу дівчини до статусу заміжньої жінки,
    заміна вінка на хустку'
  - 'Вінчання (church wedding): таїнство шлюбу та народна прикмета ''ставати на рушник''
    (хто перший стане — той голова в домі)'
  - 'Викуп нареченої: ігровий елемент весілля, роль дружбів та світилок у подоланні
    символічних перешкод'
  - 'Розподіл короваю: порядок обдаровування родичів та символіка спільного споживання
    освяченого хліба'
  - 'Післявесілля: ''перезва'' (гостювання) та закріплення зв''язків між двома родами'
- section: 'Лінгвістичні нюанси: Шлюб, весілля та граматика стосунків (Linguistic
    Nuances: Marriage, Wedding, and Relationship Grammar)'
  words: 700
  points:
  - 'Learner error check: розмежування понять ''весілля'' (celebration/party) та ''шлюб''
    (institution/status) — приклади ''щасливий шлюб'' vs ''гучне весілля'''
  - 'Стилістичні відмінності: ''вінчатися'' (церковний обряд) vs ''розписуватися/реєструвати
    шлюб'' (юридична процедура) vs ''одружуватися'' (нейтрально)'
  - 'Граматичний фокус: уникнення кальки ''одружитися на'' — тренування конструкції
    ''одружитися з кимось'' (Instrumental case)'
  - 'Фразеологія весільного обряду: аналіз виразів ''ставати на рушник'', ''дати гарбуза'',
    ''засилати старостів'''
- section: 'Практика та творчість: Весільна атрибутика та тости (Practice and Creativity:
    Wedding Attributes and Toasts)'
  words: 700
  points:
  - 'Аналіз символіки весільної атрибутики: роль рушника як життєвої дороги та короваю
    як символу достатку'
  - 'Порівняльний аналіз: українські традиції vs сучасні європейські весільні тренди
    (Agency Pass: наречені як творці свята)'
  - 'Продуктивне завдання: написання весільного тосту у традиційному стилі з використанням
    умовного способу (конструкції ''щоб'', ''якби'', ''бажав би'')'
  - 'Інтеграція забобонів у сучасний контекст: як традиційні уявлення впливають на
    сучасні весільні сценарії'
focus: cultural
pedagogy: CBI
objectives:
- Learner can describe the stages of a traditional Ukrainian wedding
- Learner can explain the symbolism of the korovai and rushnyk
- Learner can distinguish between matchmaking (svatannia) and engagement (zaruchyny)
- Learner can recite a traditional wedding toast
grammar:
- ritual actions description
- conditional mood in toasts
phase: C1.5 Folk Culture & Arts
persona:
  voice: Senior Specialist
  role: Фольклорист-обрядовець
word_target: 4000
vocabulary_hints:
  required:
  - весілля (wedding) — справляти весілля, гуляти весілля, запрошувати на весілля;
    high frequency
  - шлюб (marriage) — вступати в шлюб, розірвання шлюбу, церковний/громадянський шлюб;
    formal/legal register
  - вінчання (church wedding ceremony) — таїнство вінчання, йти до вінчання, вінчальні
    ікони; religious context
  - коровай (ritual wedding bread) — бгати коровай, ділити коровай, оздоблення короваю;
    cultural key term
  - рушник (ritual embroidered towel) — весільний рушник, ставати на рушник (to get
    married), вишивати рушник
  - староста (matchmaker/master of ceremonies) — засилати старостів, перев'язувати
    старостів рушниками
  - гарбуз (pumpkin/symbol of refusal) — дати гарбуза (to refuse a proposal), отримати
    гарбуза; cultural idiom
  recommended:
  - сватання (matchmaking ritual) — засилати сватів, іти в свати
  - заручини (engagement ceremony) — обмінюватися обручками, благословення
  - бгати (to knead/shape ritual bread) — бгати коровай; specific ritual verb
  - одружуватися (to get married) — одружуватися з кимось (Instrumental); neutral
    register
  - розписуватися (to sign/register marriage) — розписуватися в РАЦСі; colloquial/informal
    register for civil ceremony
  - перезва (post-wedding visiting) — іти на перезву; traditional term
