title: 'Леся Українка: Драма'
subtitle: Lesya Ukrainka's Drama
content_outline:
- section: 'Вступ: Український неоромантизм та художній стиль (Introduction: Ukrainian
    Neoromanticism and Artistic Style)'
  words: 600
  points:
  - Аналіз художнього стилю драматургії Лесі Українки відповідно до Державного стандарту
    (§4.4.1.1), фокус на епітетах, метафорах та символах (§4.4.3).
  - 'Визначення неоромантизму як літературного напряму: емоційна напруженість, культ
    свободи духу та прагнення до ідеалу.'
  - 'Огляд драматичних технік: віршована драма, символізм та використання міфологічних
    і історичних декорацій.'
- section: '«Лісова пісня»: Драма-феєрія душі та ностальгія (The Forest Song: Drama-Extravaganza
    of the Soul and Nostalgia)'
  words: 1000
  points:
  - 'Історія написання: культурний хук про створення шедевра за 10-12 днів у Грузії
    через «ностальгію за волинськими лісами».'
  - 'Філософський конфлікт: протистояння духовного (Мавка як «душа лісу») та матеріального
    (Килина як втілення приземленого прагматизму).'
  - 'Аналіз образів Мавки та Лукаша: символічне значення зради власній природі та
    пошуку гармонії.'
  - 'Корекція типової помилки: розрізнення фольклорних образів Мавки (лісовий дух)
    та Русалки (водяний дух) у тексті драми.'
- section: '«Кассандра»: Трагедія пророцтва та одержимість ідеєю (Cassandra: The Tragedy
    of Prophecy and Obsession with an Idea)'
  words: 800
  points:
  - 'Інтерпретація грецької міфології: Кассандра як образ пророка, якого не чує натовп,
    та психологія «зловісного пророцтва».'
  - 'Лексичний аналіз поняття «одержимість»: від духовної самопожертви до фатальної
    відданості ідеї правди.'
  - 'Робота з текстом: виявлення засобів художньої виразності, що передають трагізм
    античного сюжету в українському неоромантичному контексті.'
- section: '«Камінний господар»: Переосмислення світового архетипу (The Stone Host:
    Reimagining a Global Archetype)'
  words: 800
  points:
  - 'Унікальний внесок Лесі Українки: перша у світовій літературі жіноча спроба деконструювати
    образ Дон Жуана.'
  - 'Символізм Камінного господаря: Дон Жуан не як спокусник, а як жертва суспільних
    умовностей та деспотизму влади.'
  - 'Конфлікт волі та обов''язку: аналіз образу Анни як сильної особистості, що прагне
    влади через чоловіка.'
- section: 'Практика: Стилістична вправність та філософський аналіз (Practice: Stylistic
    Proficiency and Philosophical Analysis)'
  words: 800
  points:
  - 'Стилістична корекція: виправлення русизму «спіктакль» на нормативне «вистава»
    у професійному театрознавчому дискурсі.'
  - 'Граматичний тренінг: керування дієслова «зрадити» (кого/що — зрадити ідеали)
    на противагу «змінити» (кому/чому — змінити дружині).'
  - 'Дискусійна панель: обговорення «Лісової пісні» як драми-феєрії та її актуальності
    для сучасного екологічного та філософського мислення.'
  - 'Творче завдання: написання есе про роль символів (вогонь, верба, камінь) у драматургічній
    спадщині Лесі Українки.'
focus: literature
pedagogy: Literary Analysis
objectives:
- Learner can analyze the conflict between spiritual and material worlds in "The Forest
  Song".
- Learner can interpret the symbolic meaning of characters like Mavka and Lukash.
- Learner can discuss the features of neo-romantic drama.
grammar:
- Dramatic syntax
- Symbolic imagery
phase: C1.6 Literature
persona:
  voice: Senior Specialist
  role: Театрознавець
word_target: 4000
vocabulary_hints:
  required:
  - мавка (forest spirit/nymph) — лісова мавка, закохана мавка, душа мавки; high frequency
    in folklore/literature context
  - пророцтво (prophecy) — зловісне пророцтво, дар пророцтва, вірити у пророцтво;
    medium frequency, academic register
  - одержимість (obsession/possession) — одержимість ідеєю, духовна одержимість; key
    term for analyzing Lesya Ukrainka's characters
  - неоромантизм (neo-romanticism) — український неоромантизм, риси неоромантизму;
    academic literary term
  - драма-феєрія (extravaganza drama) — жанр драми-феєрії; специфічне жанрове визначення
    «Лісової пісні»
  recommended:
  - вистава (performance/play) — театральна вистава; замість неправильного «спіктакль»
  - зрадити (to betray) — зрадити ідеали, зрадити друга; вимагає знахідного відмінка
    (Acc)
  - символізм (symbolism) — глибинний символізм, художній символізм; основа неоромантичного
    стилю
  - ностальгія (nostalgia) — ностальгія за Волинню, почуття ностальгії; контекст написання
    «Лісової пісні»
  - деспотизм (despotism) — символ деспотизму, владний деспотизм; у контексті «Камінного
    господаря»
