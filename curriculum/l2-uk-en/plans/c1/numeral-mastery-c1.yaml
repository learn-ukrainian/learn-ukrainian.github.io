module: c1-039
level: C1
sequence: 39
slug: numeral-mastery-c1
version: '1.1'
title: "Майстерність числівників: Складні випадки в діловому та науковому мовленні"
subtitle: "Майстерність числівників C1"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Досконало опанувати відмінювання складних та складених числівників, зокрема на
    позначення великих сум та дат."
  - "Навчитися безпомилково узгоджувати числівники з іменниками в усіх відмінкових
    формах."
  - "Правильно використовувати збірні, дробові та порядкові числівники в офіційно-діловому
    стилі."
  - "Розуміти особливості запису та читання числових даних у професійних контекстах
    (фінанси, статистика, право)."

reading_situations:
  - source_type: "фінансовий звіт"
    topic: "Аналіз банківського звіту або економічного огляду: коректність написання
      числівників словами."
    key_elements: ["складений числівник", "узгодження в родовому відмінку", "валютні
          одиниці"]
    motivation: "Запобігання помилкам у професійній документації."
  - source_type: "історична стаття"
    topic: "Хронологія ключових подій української історії: відмінювання порядкових
      числівників на позначення століть та років."
    key_elements: ["порядковий числівник", "узгодження", "римські цифри"]
    motivation: "Розвиток точності в історичному наративі."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ соціолога про демографічні зміни в Україні: сприйняття великих
      чисел та відсотків на слух."
    focus_points: ["дробові числівники", "відсотки", "приблизна кількість"]
    motivation: "Тренування сприйняття та відтворення складної цифрової інформації."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Складіть проект бюджету для міжнародного гранту. Опишіть витрати, використовуючи
      складені числівники словами (суми в гривнях та євро), вкажіть терміни та обсяги
      робіт."
    requirements: ["мінімум 250 слів", "правильне відмінювання всіх частин складених
          числівників", "вживання збірних числівників де це доречно"]
    motivation: "Практичне відпрацювання найскладнішої теми української морфології."
    model_answer: "Текст має продемонструвати знання того, що в складених кількісних
      числівниках відмінюються всі складники (наприклад, 'семисот п'ятдесяти чотирьох')."

discussion_topics:
  - context: "Цифрова грамотність: чи потрібно вміти писати числівники словами в епоху
      автоматизації?"
    questions:
      - "Чому юридичні документи вимагають дублювання сум словами?"
      - "Які числівники найчастіше спотворюються в усному мовленні (наприклад, 'п'ятидесяти'
        замість 'п'ятдесяти')?"
      - "Чи варто спрощувати граматику числівників для полегшення вивчення мови?"
    motivation: "Обговорення ролі традиційної грамотності в сучасному світі."

content_outline:
  - section: "Морфологія кількісних числівників"
    words: 1000
    subsections:
      - "Відмінювання числівників на позначення десятків та сотень (особливості -десят
        та -сот)"
      - "Складені кількісні числівники: відмінювання кожного слова"
      - "Числівники 'півтора', 'півтори', 'півтораста' в системі відмінювання"
    key_concepts:
      - "кількісний числівник"
      - "парадигма відмінювання"
      - "складений числівник"
  - section: "Дробові та збірні числівники"
    words: 1000
    subsections:
      - "Специфіка відмінювання дробових числівників: поєднання кількісного та порядкового"
      - "Збірні числівники (двоє, обоє, п'ятеро): обмеження у вживанні з іменниками"
      - "Числівники з іменниками, що мають лише форму множини (pluralia tantum)"
    key_concepts:
      - "дробовий числівник"
      - "збірний числівник"
      - "узгодження"
  - section: "Числівники в контексті часу та дати"
    words: 1000
    subsections:
      - "Позначення часу: 'чверть на десяту' vs 'десять п'ятнадцять' (нормативні варіанти)"
      - "Дати: відмінювання назв місяців у поєднанні з числівниками"
      - "Позначення віку та періодів у наукових текстах"
    key_concepts:
      - "порядковий числівник"
      - "хронологія"
      - "мовна норма"
  - section: "Синтаксис та стилістика числівників"
    words: 1000
    subsections:
      - "Керування іменниками при числівниках 2, 3, 4 та 5 і далі"
      - "Числівники у фразеологізмах та пареміях: культурне значення"
      - "Типові помилки у вживанні числівників у ЗМІ та шляхи їх виправлення"
    key_concepts:
      - "керування"
      - "синтаксична помилка"
      - "стилістична фігура"

vocabulary:
  required:
    - числівник
    - відмінювання
    - узгодження
    - дробовий
    - збірний
    - складений
    - кількісний
    - порядковий
  recommended:
    - парадигма
    - нормативність
    - флексія
    - керування
    - варіантність

activity_hints:
  - type: fill-in
    description: "Complete financial/statistical sentences with correctly declined
      compound numerals (e.g., 'семисот п'ятдесяти чотирьох гривень')."
  - type: error-correction
    description: "Fix incorrect numeral declension in official documents and media
      excerpts (e.g., 'п'ятидесяти' → 'п'ятдесяти')."
  - type: select
    description: "Choose the correct case form of numerals in context — instrumental,
      genitive, or dative in date/time expressions."
  - type: match-up
    description: "Match numeral types (збірний, дробовий, порядковий, кількісний)
      with their usage rules and example sentences."
  - type: critical-analysis
    description: "Analyze a financial report excerpt and identify all numeral agreement
      patterns, explaining why each case form is used."

activities:
  types_required:
    - error-correction
    - fill-in
    - match-up
    - select
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Заболотний, 6 клас (2014): §36-38 — Числівник як частина мови, відмінювання числівників"
  - "Глазова, 11 клас (2019): §18 — Числівник у діловому мовленні"
  - "Авраменко, 6 клас (2023): §30-32 — Числівник, узгодження з іменниками"

connects_to:
