module: c1-079
level: C1
sequence: 79
slug: high-formal-register
version: '1.1'
title: "Високий офіційний регістр та протокольне мовлення"
subtitle: "Високий офіційний регістр та протокольне мовлення"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Опанувати мовні стандарти високого офіційного регістру для написання державних
    актів та дипломатичних документів."
  - "Розуміти специфіку синтаксису офіційно-ділового стилю: довгі речення, дієприкметникові
    та дієприслівникові звороти."
  - "Використовувати термінологію міжнародного права та дипломатичного протоколу."
  - "Відрізняти високу офіційність від надмірного канцеляриту."

reading_situations:
  - source_type: "державний акт"
    topic: "Текст Указу Президента України про нагородження державними нагородами."
    key_elements: ["преамбула", "уніфікованість", "мовна усталеність"]
    motivation: "Вивчення структури та мовних кліше найвищого рівня державного документообігу."
  - source_type: "дипломатична нота"
    topic: "Офіційне повідомлення Міністерства закордонних справ щодо встановлення
      дипломатичних відносин."
    key_elements: ["третя особа", "умовність", "сувора регламентованість"]
    motivation: "Аналіз специфічних формул ввічливості та стриманості в міжнародному
      спілкуванні."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Складіть офіційне звернення від імені керівника наукової установи до
      закордонного партнера з пропозицією про стратегічне співробітництво (250-300
      слів). Використовуйте термінологію високого офіційного регістру."
    requirements: ["дотримання структури", "використання пасивних конструкцій", "відсутність
          розмовної лексики"]
    motivation: "Тренування навичок професійної комунікації на рівні керівництва."
    model_answer: "Лист має містити звороти 'маємо честь запропонувати', 'висловлюємо
      щиру зацікавленість', 'сподіваємося на плідну співпрацю'."

discussion_topics:
  - context: "Проблема архаїзації та консервативності офіційної мови: чи варто спрощувати
      мову законів?"
    questions:
      - "Чи має мова законів бути зрозумілою кожному громадянину без юриста?"
      - "Яка роль традиції у збереженні високого офіційного регістру?"
      - "Як уникнути 'мертвої мови' в офіційних документах?"
    motivation: "Обговорення балансу між точністю юридичної норми та доступністю мови."
  - context: "Цифрова трансформація держави: як високий регістр адаптується до форматів
      державних послуг онлайн (наприклад, застосунок Дія)."
    questions:
      - "Чи зберігається офіційність у лаконічних push-повідомленнях?"
      - "Як змінюється тон спілкування держави з громадянином у цифровому середовищі?"
    motivation: "Аналіз еволюції офіційного стилю в епоху цифровізації."

content_outline:
  - section: "Стилістичні домінанти офіційно-ділового стилю"
    words: 1000
    subsections:
      - "Лексична одноманітність та точність як гарантія однозначності"
      - "Канцеляризми: коли вони є необхідними, а коли — шкідливими"
      - "Безособовість та об'єктивність викладу"
    key_concepts:
      - "мовний штамп"
      - "стандарт"
      - "уніфікація"
  - section: "Синтаксис офіційного документа"
    words: 1000
    subsections:
      - "Складні речення з великою кількістю відокремлених членів"
      - "Використання віддієслівних іменників та інфінітивних конструкцій"
      - "Логічна послідовність та рубрикація тексту"
    key_concepts:
      - "директивність"
      - "регламентація"
      - "логічна зв'язність"
  - section: "Дипломатичний дискурс та міжнародна комунікація"
    words: 1000
    subsections:
      - "Особливості перекладу міжнародних договорів: еквівалентність та точність"
      - "Етикетні формули в дипломатичному листуванні"
      - "Мова переговорів: як висловити незгоду на високому рівні"
    key_concepts:
      - "ратифікація"
      - "комюніке"
      - "декларація"
  - section: "Юридична лінгвістика та мова законодавства"
    words: 1000
    subsections:
      - "Нормотворча техніка: як пишуться закони України"
      - "Термінологія права: питома vs запозичена"
      - "Право на зрозумілу мову: сучасні тенденції реформування офіційного стилю"
    key_concepts:
      - "законодавча база"
      - "правочин"
      - "юридична сила"

vocabulary:
  required:
    - регламент
    - компетенція
    - повноваження
    - детермінація
    - чинність
    - резолюція
    - конвенція
    - протокол
  recommended:
    - імператив
    - легітимність
    - преамбула
    - преференція
    - юрисдикція

activity_hints:
  - type: error-correction
    description: "Fix register violations in official documents — replace colloquial
      language with formal equivalents, fix канцелярит where it obscures meaning."
  - type: critical-analysis
    description: "Analyze a Presidential Decree and a diplomatic note — compare their
      syntactic structures, courtesy formulas, and degree of formality."
  - type: match-up
    description: "Match official document types (указ, комюніке, конвенція, резолюція,
      нота) with their structural features and characteristic language."
  - type: essay-response
    description: "Write a formal letter (150-200 words) from an institutional head
      proposing international cooperation, using appropriate protocol language."
  - type: select
    description: "Choose the appropriate formality level for given professional situations
      — distinguish high official (дипломатичний протокол) from standard business
      (ділове листування)."

activities:
  types_required:
    - error-correction
    - critical-analysis
    - match-up
    - essay-response
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §40 — Стилістичне забарвлення лексики (книжна/розмовна)"
  - "Караман, 10 клас (2018): §53-55 — Офіційно-діловий стиль, мовний етикет"
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка, ділове листування"

connects_to:
  previous: "politeness-strategies"
  next: "intimate-register"
phase: C1.3 [Advanced Stylistics & Rhetoric]
