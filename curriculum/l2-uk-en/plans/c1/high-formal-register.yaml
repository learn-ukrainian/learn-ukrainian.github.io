module: c1-043
level: c1
sequence: 43
slug: high-formal-register
version: '2.0'
title: 'Офіційно-діловий стиль: Мова документів'
subtitle: 'High Formal Register: Language of Documents'
content_outline:
- section: Вступ — Світ офіційних документів
  points:
  - 'State Standard §4.4.1.1 alignment — official style and its substyles'
  - 'Why officialese exists: precision, unambiguity, legal force'
  - 'Cultural hook: Ukrainian bureaucratic tradition — from Cossack universals
    to modern legislation'
- section: 'Підстилі офіційно-ділового стилю (Substyles)'
  points:
  - 'Законодавчий (legislative): закони, постанови, укази'
  - 'Дипломатичний (diplomatic): ноти, меморандуми, конвенції'
  - 'Адміністративно-канцелярський (administrative): накази, інструкції, протоколи'
  - 'Діловий (business): договори, акти, довідки, заяви'
- section: 'Синтаксис канцеляриту (Bureaucratic Syntax)'
  points:
  - 'Passive chains: було прийнято рішення, має бути забезпечено'
  - 'Nominalization: з метою покращення, у зв''язку з необхідністю'
  - 'Impersonal constructions: слід зазначити, необхідно підкреслити'
  - 'Standardized word order: subject → predicate → object with minimal inversion'
  - 'Learner error: mixing officialese with conversational style in formal documents'
- section: 'Кліше та стандартні формули (Clichés & Standard Formulas)'
  points:
  - 'Opening formulas: Відповідно до..., На підставі..., Згідно з..., З огляду на...'
  - 'Body formulas: Вважати за доцільне..., Покласти відповідальність на...,
    Довести до відома...'
  - 'Closing formulas: У разі невиконання..., Контроль покласти на...'
  - 'Learner error: confusing згідно з (+ Instrumental) vs відповідно до (+ Genitive)'
- section: 'Типи документів (Document Types)'
  points:
  - 'Закон (Law): структура — преамбула, статті, пункти, прикінцеві положення'
  - 'Постанова (Decree/Resolution): рішення колегіального органу'
  - 'Протокол (Minutes/Protocol): фіксація засідання'
  - 'Наказ (Order): розпорядчий документ керівника'
  - 'Заява (Application): особисте звернення — structure and register'
  - 'Довідка (Certificate): інформаційний документ'
- section: 'Практика — Від канцеляриту до людської мови'
  points:
  - 'Read and analyze authentic Ukrainian legislative text'
  - 'Write a formal заява (application) following standard template'
  - 'Transform bureaucratic text into neutral style (deoffficialize)'
  - 'Transform neutral text into official style (officialize)'
- section: Підсумок
  points:
  - Summary of key formulas by document type
  - When to use officialese vs when it becomes канцелярит (bureaucratese abuse)
focus: style
pedagogy: Academic
objectives:
- Learner can analyze the structure and language of official documents (laws, decrees,
  contracts)
- Learner can identify and use standard bureaucratic clichés
- Learner can transform neutral text into official-business style
- Learner can write a formal application (заява) following Ukrainian conventions
grammar:
- Passive chains in official style
- Nominalization patterns
- Impersonal constructions
- Standard formulas with correct case government
vocabulary_hints:
  required:
  - закон (law) — приймати закон, набути чинності
  - постанова (decree/resolution) — постанова уряду, винести постанову
  - протокол (minutes/protocol) — вести протокол, підписати протокол
  - наказ (order) — видати наказ, на виконання наказу
  - заява (application) — подати заяву, написати заяву
  - відповідно до (in accordance with) — відповідно до закону (+ Gen)
  - згідно з (according to) — згідно з наказом (+ Instr)
  - на підставі (on the basis of) — на підставі рішення (+ Gen)
  recommended:
  - довідка (certificate) — видати довідку
  - преамбула (preamble) — преамбула закону
  - канцелярит (bureaucratese) — уникати канцеляриту
  - чинний (valid/in force) — чинне законодавство
activity_hints:
- type: reading
  focus: Analyze authentic legislative text
  items: 4
- type: fill-in
  focus: Complete official formulas with correct case
  items: 15
- type: essay-response
  focus: Write a formal заява
- type: match-up
  focus: Match formula to document type
  items: 12
register: офіційно-діловий
immersion: 100% Ukrainian
phase: C1.3 [Advanced Stylistics & Rhetoric]
persona:
  voice: Senior Specialist
  role: Державний службовець
