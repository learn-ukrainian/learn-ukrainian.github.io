module: c1-069
level: C1
sequence: 69
slug: winter-holidays
version: '2.0'
title: Українські свята - зимовий цикл
subtitle: Ukrainian Holidays - Winter Cycle
content_outline:
- section: 'Вступ: Сакральність зимового циклу (Introduction: Sacrality of the Winter
    Cycle)'
  words: 600
  points:
  - 'Огляд великого зимового кола: від святого Миколая (6 грудня) до Стрітення (2
    лютого) за новоюліанським календарем згідно зі Стандартом §3.21'
  - 'Філософський синкретизм: глибоке поєднання дохристиянської аграрної магії (культ
    предків, закликання врожаю) із християнськими канонами'
  - 'Стилістичний регістр опису: використання ''високої'' лексики (предковичний, урочистий,
    сакральний) для передачі духовної значущості обрядів (§4.4.3)'
- section: 'Різдвяна обрядовість: Символи та сенси (Christmas Rituals: Symbols and
    Meanings)'
  words: 950
  points:
  - 'Святвечір: концепція ''Багатої куті'', традиція 12 пісних страв та ієрархія родинної
    вечері'
  - 'Культурний гачок: ''Дідух проти Ялинки'' — аналіз дідуха як снопа-оберега, що
    уособлює дух роду, на противагу пізнішій західній традиції ялинки'
  - 'Етнографічний декор: символіка солом''яного ''павука'' як моделі всесвіту та
    оберега оселі'
  - 'Мовленнєвий етикет: практичне застосування Кличного відмінка у різдвяних вітаннях
    ''Христос рождається! — Славімо Його!'' (§4.1.2.7)'
- section: 'Музичний код: Колядки та Щедрівки (Musical Code: Koliadky and Shchedrivky)'
  words: 900
  points:
  - 'Жанрова диференціація: розмежування колядок (Різдво, народження світу) та щедрівок
    (Новий рік, побажання добробуту) для уникнення помилок у вживанні'
  - 'Феномен Леонтовича: історія ''Щедрика'' як архаїчної язичницької пісні про ластівку,
    що стала світовим гімном Різдва (Carol of the Bells)'
  - 'Вертепна драма: структура лялькового та живого вертепу, символіка персонажів
    та роль релігійної інтерлюдії у народному театрі'
- section: 'Маланка та Водохреще: Магія переходу (Malanka and Epiphany: Magic of Transition)'
  words: 750
  points:
  - 'Щедрий вечір (Маланка): обряд ''водіння кози'' як стародавня метафора вмирання
    та воскресіння природи (прихід весни взимку)'
  - 'Традиції карнавалу: маскування на Маланку, роль імпровізації та сатири у народних
    гуляннях'
  - 'Йордан: освячення води та концепція ''Голодної куті'' як завершального етапу
    очищення в зимовому циклі'
- section: 'Практика: Мовна автентичність (Practice: Linguistic Authenticity)'
  words: 800
  points:
  - 'Корекція типових помилок: вживання Орудного відмінка у вітанні ''З Новим роком!''
    на противагу калькованому ''З Нового року'''
  - 'Аналіз художніх засобів: виявлення епітетів та метафор у текстах обрядових пісень
    згідно з компетенціями Стандарту §4.4.3'
  - 'Творче завдання: написання різдвяного віншування (вітання господарям) з дотриманням
    стилістики сакрального тексту та правил Кличного відмінка'
  - 'Дискусія: сучасна трансформація зимових свят в Україні — відродження дідуха та
    перехід на новий календарний стиль'
focus: cultural
pedagogy: CBI
objectives:
- Learner can describe the main holidays of the winter cycle (St. Nicholas, Christmas,
  Malanka, Epiphany)
- Learner can explain the difference between koliadky and shchedrivky
- Learner can discuss the symbolism of vertep and Malanka characters
- Learner can recite a traditional holiday greeting
grammar:
- holiday greetings
- ritual descriptions
phase: C1.5 Folk Culture & Arts
persona:
  voice: Senior Specialist
  role: Колядник
word_target: 4000
vocabulary_hints:
  required:
  - святвечір (Christmas Eve) — сідати до святвечора, пісний святвечір; центральний
    момент різдвяного циклу
  - дідух (didukh) — ставити дідуха, плести дідуха; символ духу предків та врожаю
    (Didukh vs Christmas tree)
  - колядка (koliadka) — співати колядки, різдвяна колядка; пов'язана виключно з Різдвом
  - щедрівка (shchedrivka) — виконувати щедрівки, щедрувати; виконується на Щедрий
    вечір (Маланку)
  - вертеп (vertep) — живий вертеп, ляльковий вертеп; пересувний ляльковий театр або
    жива вистава
  - кутя (kutia) — багата кутя, голодна кутя, носити кутю; ритуальна страва з пшениці,
    маку та меду
  recommended:
  - павук (straw spider) — солом'яний павук як традиційний різдвяний оберіг оселі
  - віншування (holiday greeting/toast) — традиційне побажання, що виголошується після
    колядування
  - новоюліанський календар (Revised Julian calendar) — контекст переходу на святкування
    25 грудня
  - синкретизм (syncretism) — поєднання язичницьких та християнських елементів в обряді
  - предковичний (ancestral/immemorial) — книжний прикметник високого стилю для опису
    традицій
