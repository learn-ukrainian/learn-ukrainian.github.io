activity_hints:
  - type: fill-in
    description: "Complete complex sentences with appropriate relative pronouns (який,
      що, чий, котрий) and conjunctions (що, як, щоб, чи)."
  - type: error-correction
    description: "Fix errors in attributive and object clauses — wrong conjunction/relative
      pronoun choice, misplaced subordinate clause, punctuation."
  - type: match-up
    description: "Match the function of 'що' in different sentences — as a conjunction
      (сполучник) vs. as a relative pronoun (сполучне слово)."
  - type: critical-analysis
    description: "Transform a passage of direct speech into indirect speech using
      object clauses, then analyze how meaning shifts."
  - type: select
    description: "Identify the type of subordinate clause (означальне vs з'ясувальне)
      in complex sentences from academic and literary texts."

activities:
  types_required:
    - translate
    - fill-in
    - match-up
    - error-correction
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 25

references:
