module: c1-055
level: C1
sequence: 55
slug: skladnopidriadne-oznachalne-zyasuvalne
version: 1.1.2
title: Складнопідрядні означальні та з'ясувальні речення
subtitle: Означальні та з'ясувальні складнопідрядні речення
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
- Детально вивчити структуру та функції складнопідрядних означальних речей.
- Опанувати складнопідрядні з'ясувальні речення як засіб передачі непрямої мови 
  та думок.
- Навчитися розрізняти сполучники та сполучні слова у підрядних конструкціях.
- Вміти використовувати ці типи речень для уточнення та деталізації інформації в
  академічних текстах.
reading_situations:
- source_type: наукова стаття
  topic: 'Опис психологічних характеристик особистості: використання означальних підрядних.'
  key_elements:
  - термінологічне визначення
  - характеристика
  - деталізація
  motivation: Розуміння ролі означальних речей у науковому описі.
- source_type: художній уривок
  topic: 'Внутрішній монолог героя у прозі Ольги Кобилянської: роль з''ясувальних
    речень.'
  key_elements:
  - рефлексія
  - непряма мова
  - емоційний стан
  motivation: Аналіз способів передачі думок та почуттів через з'ясувальні 
    конструкції.
listening_situations:
- media_type: подкаст
  setting: Обговорення літературним критиком нових тенденцій в українській 
    прозі.
  focus_points:
  - вживання з'ясувальних речень для цитування думок авторів
  - означальні конструкції в описах персонажів
  motivation: Тренування розпізнавання складних синтаксичних структур у потоці 
    мовлення.
writing_tasks:
- task_type: відгук
  prompt: Напишіть розгорнутий відгук на прочитану книгу або переглянутий фільм,
    акцентуючи увагу на детальних описах (використовуйте означальні речення) та 
    власних роздумах (використовуйте з'ясувальні речення).
  requirements:
  - мінімум 250 слів
  - використання сполучних слів 'який', 'що', 'чий'
  - вживання сполучників 'що', 'як', 'щоб'
  motivation: Практика функціонального використання вивчених типів речень.
  model_answer: Відгук має бути структурованим, містити опис сюжету з 
    використанням означальних речень та аналіз ідей автора з використанням 
    з'ясувальних речень.
discussion_topics:
- context: Важливість критичного мислення у сучасному інформаційному 
    суспільстві.
  questions:
  - Які джерела інформації ви вважаєте надійними і чому?
  - Як ви ставитеся до того, що алгоритми соцмереж формують наш світогляд?
  motivation: Використання з'ясувальних речень для вираження ставлення та думок 
    ('я вважаю, що...', 'мене турбує, що...').
content_outline:
- section: Складнопідрядне означальне речення
  words: 1000
  subsections:
  - 'Засоби зв''язку: сполучні слова ''який'', ''чий'', ''котрий'', ''що'''
  - Місце підрядної частини стосовно головної
  - Означальні речення, що пояснюють іменник або займенник
  key_concepts:
  - атрибутивність
  - сполучне слово
  - антецедент
- section: Складнопідрядне з'ясувальне речення
  words: 1000
  subsections:
  - 'Семантика з''ясування: передача повідомлення, думки, відчуття'
  - Сполучники та частки у з'ясувальних реченнях ('що', 'як', 'щоб', 'чи')
  - Трансформація прямої мови в непряму за допомогою з'ясувальних речей
  key_concepts:
  - об'єктність
  - непряма мова
  - перцепція
- section: Порівняльний аналіз сполучників та сполучних слів
  words: 1000
  subsections:
  - Функціональна відмінність 'що' як сполучника та 'що' як сполучного слова
  - Синтаксична роль сполучних слів у підрядній частині
  - Типові помилки у виборі засобів зв'язку
  key_concepts:
  - морфологія
  - синтаксис
  - диференціація
- section: Стилістичні функції та пунктуація
  words: 1000
  subsections:
  - Пунктуаційні норми у складнопідрядних реченнях
  - Використання означальних речей у наукових дефініціях
  - Експресивність з'ясувальних речей у публіцистиці
  key_concepts:
  - дефініція
  - пунктограма
  - експресивність
- section: Підсумок — Summary
  words: 300
  points:
  - "Attributive clauses (означальні) define nouns using conjunctive words like який,
    чий, котрий, while objective clauses (з'ясувальні) express indirect speech and
    thoughts using conjunctions like що, як, щоб, чи. Self-check: What is the functional
    difference between що as a conjunction (сполучник) and що as a conjunctive word
    (сполучне слово)?"
  - "Objective clauses are essential for reporting indirect speech, while attributive
    clauses provide precise academic definitions. Self-check: Transform the direct
    speech 'Він запитав: Де ти?' into indirect speech. Define your profession using
    an attributive clause with який."
