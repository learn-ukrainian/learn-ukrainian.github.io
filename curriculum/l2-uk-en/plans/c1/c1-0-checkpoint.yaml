activity_hints:
- type: reading
  focus: 'Прочитайте текст про академічна лексика: повторення та систематизація і дайте відповіді на запитання щодо ключових
    понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про структура академічного тексту, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Академічна лексика: повторення та систематизація». Обґрунтуйте
    свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему академічна лексика: повторення та систематизація.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до академічна лексика: повторення та систематизація: Ключова академічна термінологія C1.0:
    від абстрактних понять до фахових термінів. Визначте спільне та відмінне.'
