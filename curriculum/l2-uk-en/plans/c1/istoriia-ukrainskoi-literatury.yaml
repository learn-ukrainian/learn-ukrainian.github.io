activity_hints:
- type: reading
  focus: Прочитайте текст про витоки та давня література і дайте відповіді на 
    запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про xix століття: від котляревського
    до франка, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Витоки та давня 
    література». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    витоки та давня література.
- type: comparative-study
  focus: 'Порівняйте різні підходи до витоки та давня література: Києворуська спадщина:
    літописи та ''Слово о полку Ігоревім''. Визначте спільне та відмінне.'
