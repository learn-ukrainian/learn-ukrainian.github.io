module: c1-068
level: C1
sequence: 68
slug: istoriia-ukrainskoi-literatury
version: '1.0'
title: "Панорама історії української літератури"
subtitle: "Panorama of the History of Ukrainian Literature"
focus: literature
pedagogy: seminar
word_target: 4000
objectives:
  - "Систематизувати знання про основні періоди розвитку української літератури від давнини до сьогодення."
  - "Аналізувати ідейно-естетичні парадигми різних епох (бароко, романтизм, реалізм, модернізм)."
  - "Оцінювати роль літератури у формуванні української національної ідентичності."
  - "Ознайомитися з ключовими постатями та програмними творами кожної епохи."

reading_situations:
  - source_type: "літературний маніфест"
    topic: "Маніфест українських модерністів початку XX століття (група 'Молода Муза' або 'Українська хата')."
    key_elements: ["естетизм", "європеїзація", "соціальна роль мистецтва"]
    motivation: "Дослідження переломних моментів у зміні літературних канонів."
  - source_type: "науковий огляд"
    topic: "Феномен 'Розстріляного відродження' та його трагічна доля в 1930-х роках."
    key_elements: ["експериментаторство", "урбанізм", "ідеологічний тиск"]
    motivation: "Розуміння найвищого злету та штучного переривання модерних процесів в українській культурі."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть порівняльний аналіз (300-350 слів) двох літературних епох (наприклад, Бароко та Романтизму) на прикладі конкретних творів. Як кожна епоха трактувала образ людини та її місце у світі?"
    requirements: ["використання літературознавчих термінів", "цитування ключових ідей", "логічна порівняльна структура"]
    motivation: "Розвиток навичок синтезу історико-літературної інформації та критичного мислення."
    model_answer: "Текст повинен висвітлити перехід від теоцентризму бароко до антропоцентризму та культу почуттів романтизму."

discussion_topics:
  - context: "Проблема 'канону': хто з сучасних письменників заслуговує стати 'класиком' і увійти до шкільної програми через 50 років?"
    questions:
      - "Які критерії визначають 'класичність' твору?"
      - "Чи має література сьогодні виконувати націєтворчу функцію, чи бути 'чистим мистецтвом'?"
      - "Вплив війни на зміну літературного канону в Україні."
    motivation: "Дискусія про динаміку літературного процесу та сучасні культурні цінності."
  - context: "Українська література у світовому контексті: чому ми досі маловідомі за кордоном (до останнього часу)?"
    questions:
      - "Брак перекладів чи 'провінційність' тем?"
      - "Які автори найкраще репрезентують Україну світу?"
    motivation: "Аналіз причин та перспектив інтеграції української літератури у глобальний простір."

content_outline:
  - section: "Витоки та Давня література (XI–XVIII ст.)"
    words: 1000
    subsections:
      - "Києворуська спадщина: літописи та 'Слово о полку Ігоревім'"
      - "Українське бароко: синтез візантійських та ренесансних традицій"
      - "Григорій Сковорода як філософська вершина давньої епохи"
    key_concepts:
      - "теоцентризм"
      - "полемічна література"
      - "козацьке бароко"
    primary_sources:
      - "Повість минулих літ"
      - "Сад божественних пісень"
  - section: "XIX століття: Від Котляревського до Франка"
    words: 1000
    subsections:
      - "Котляревський та народження нової літературної мови"
      - "Троїсте сузір'я романтизму: Шевченко, Куліш, Костомаров"
      - "Реалістичний напрям та інтелектуальна проза кінця століття"
    key_concepts:
      - "народність"
      - "месіанізм"
      - "позитивізм"
    primary_sources:
      - "Енеїда"
      - "Кобзар"
  - section: "Модернізм та 'Розстріляне відродження' (1900–1930)"
    words: 1000
    subsections:
      - "Модерна драма Лесі Українки та психологізм Коцюбинського"
      - "Хвильовий та дискусія 'Геть від Москви!'"
      - "Микола Куліш, Підмогильний, Йогансен: розквіт інтелектуального модерну"
    key_concepts:
      - "вілсонство"
      - "імпресіонізм"
      - "екзистенціалізм"
    primary_sources:
      - "Лісова пісня"
      - "Місто"
  - section: "Друга половина XX ст. та Сучасність"
    words: 1000
    subsections:
      - "Шістдесятництво як опір системі: Стус, Костенко, Симоненко"
      - "Постмодернізм 1990-х: Бу-Ба-Бу, Андрухович, Забужко"
      - "Сучасна література в умовах війни: репортаж, щоденник, нова поезія"
    key_concepts:
      - "дисидентство"
      - "деконструкція"
      - "метамодернізм"
    primary_sources:
      - "Стус, Палімпсести"
      - "Забужко, Польові дослідження з українського сексу"

