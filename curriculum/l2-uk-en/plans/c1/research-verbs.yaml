module: c1-003
level: C1
sequence: 3
slug: research-verbs
version: 1.1.1
title: Дієслова наукового дослідження та верифікації
subtitle: Дієслова дослідження та перевірки
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
- Розширити дієслівний інвентар для точного опису етапів наукового пошуку.
- Опанувати семантичні відтінки дієслів верифікації, апробації та спростування.
- Навчитися коректно вживати дієслова у пасивних та безособових конструкціях наукового стилю.
- Вивчити специфіку керування наукових дієслів для уникнення типових мовних помилок.
reading_situations:
- source_type: науковий звіт
  topic: Методи верифікації історичних джерел періоду Гетьманщини.
  key_elements:
  - підтвердження автентичності
  - зіставлення фактів
  - спростування міфів
  motivation: Аналіз дієслів, що описують процес критичного аналізу історичних документів.
- source_type: методологічний розділ статті
  topic: Алгоритм проведення лінгвістичного експерименту.
  key_elements:
  - планування
  - здійснення
  - коригування
  - узагальнення
  motivation: Вивчення процесуальних дієслів, що структурують хід наукового дослідження.
listening_situations:
- media_type: лекція
  setting: Університетська лекція про сучасні методи соціологічних досліджень в Україні.
  focus_points:
  - термінологічні дієслова
  - етапи верифікації гіпотез
  - мовні кліше викладача
  motivation: Розвиток навичок розпізнавання академічної лексики на слух у швидкому темпі.
writing_tasks:
- task_type: есе
  prompt: Опишіть методологію вашого (реального або уявного) дослідження в галузі гуманітарних наук (150-200 слів). Використайте
    щонайменше 10 нових дієслів наукового пошуку.
  requirements:
  - логічність викладу
  - використання дієслів верифікації
  - науковий регістр
  motivation: Практичне застосування нової лексики для побудови професійного тексту.
  model_answer: Текст повинен містити такі дієслова, як 'з'ясувати', 'обґрунтувати', 'систематизувати', 'проаналізувати',
    'актуалізувати'.
content_outline:
- section: Дієслова ініціації та планування
  words: 1000
  subsections:
  - 'Формулювання проблеми: окреслити, визначити, актуалізувати'
  - 'Висунення гіпотез: припускати, постулювати, гіпотезувати'
  - 'Визначення мети та завдань: прагнути, передбачати, констатувати'
  key_concepts:
  - актуалізація
  - постулювання
  - цілепокладання
- section: Аналітичний та операційний інструментарій
  words: 1000
  subsections:
  - 'Процес аналізу: диференціювати, класифікувати, структурувати'
  - 'Методи дослідження: застосовувати, впроваджувати, модифікувати'
  - 'Взаємодія з даними: інтерпретувати, екстраполювати, синтезувати'
  key_concepts:
  - інтерпретація
  - синтез
  - екстраполяція
- section: Верифікація та апробація результатів
  words: 1000
  subsections:
  - 'Підтвердження даних: верифікувати, доводити, аргументувати'
  - 'Критика та спростування: заперечувати, деконструювати, анулювати'
  - 'Презентація висновків: підсумовувати, узагальнювати, формулювати'
  key_concepts:
  - верифікація
  - деконструкція
  - апробація
- section: Складні випадки керування наукових дієслів
  words: 1000
  subsections:
  - 'Типові помилки: опанувати (що?) vs володіти (чим?)'
  - Дієслова, що потребують прийменникового керування (зосереджуватися на, полягати в)
  - Трансформація активних дієслів у пасивні форми (досліджувати - досліджується)
  key_concepts:
  - синтаксичне керування
  - лексична норма
  - граматична трансформація
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
  - обґрунтовувати
  - з'ясовувати
  - систематизувати
  - підтверджувати
  - спростовувати
  - впроваджувати
  - інтерпретувати
  - актуалізувати
  recommended:
  - постулювати
  - класифікувати
  - верифікувати
  - апробувати
  - деконструювати
activity_hints:
- type: reading
  focus: Прочитайте текст про дієслова ініціації та планування і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про аналітичний та операційний інструментарій, використовуючи нову лексику
    модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Дієслова ініціації та планування». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему дієслова ініціації та планування.
- type: comparative-study
  focus: 'Порівняйте різні підходи до дієслова ініціації та планування: Формулювання проблеми: окреслити, визначити, актуалізувати.
    Визначте спільне та відмінне.'
activities:
  types_required:
  - error-correction
  - fill-in
  - match-up
  - select
  - unjumble
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Ворон, 11 клас (2019): с. 207 — Наукова доповідь'
- 'Глазова, 11 клас (2019): §1-10 — Культура мовлення'
- 'Заболотний, 11 клас (2019): Мовленнєві жанри наукового стилю'
connects_to:
  previous: academic-style-markers
  next: analysis-vocabulary
phase: C1.1 [Academic Foundation]
