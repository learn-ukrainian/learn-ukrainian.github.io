module: c1-003
level: C1
sequence: 3
slug: research-verbs
version: '2.0'
title: Дієслова наукового дослідження
content_outline:
- section: 'Вступ: Дієслова як фундамент наукового стилю (Introduction: Verbs as the
    Foundation of Scientific Style)'
  words: 500
  points:
  - 'Аналіз наукового стилю мовлення згідно з Державним стандартом §4.4.1.1: вимоги
    до точності та абстрактності дієслівної лексики на рівні С1.'
  - Роль дієслів у забезпеченні логічності та послідовності наукового дискурсу.
  - 'Категоризація наукових дієслів за комунікативними функціями: від гіпотези до
    підсумків.'
- section: Історико-культурний контекст наукової термінології (Historical and Cultural
    Context of Scientific Terminology)
  words: 700
  points:
  - 'Спадщина Наукового товариства імені Шевченка (НТШ): роль М. Грушевського, І.
    Франка та І. Пулюя у становленні української академічної традиції та чистоти термінів.'
  - 'Агатангел Кримський як взірець академічного письма: боротьба з канцеляризмами
    та багатство синонімічного ряду в наукових працях.'
  - Важливість термінологічної самобутності та деколонізації наукової лексики в сучасних
    дослідженнях.
- section: Дієслова дослідження та семантичні нюанси (Verbs of Research and Semantic
    Nuances)
  words: 1000
  points:
  - Аналіз високої частотності дієслів «досліджувати», «вивчати» та «аналізувати»
    на основі даних Українського академічного корпусу.
  - 'Розмежування наукового пошуку («досліджувати») та кримінального чи службового
    дізнання («розслідувати»): аналіз реєстрових помилок.'
  - 'Вплив виду дієслова (доконаний/недоконаний) на сприйняття результативності дослідження:
    опис процесу методології проти опису досягнутих результатів.'
  - 'Вивчення стійких колокацій: досліджувати явище/процес vs. аналізувати дані/джерела.'
- section: Дієслова аргументації, презентації та висновку (Verbs of Argumentation,
    Presentation, and Conclusion)
  words: 900
  points:
  - 'Дієслова для доведення гіпотез: використання «стверджувати», «доводити» та «обґрунтовувати»
    (обґрунтування вибору, позиції, актуальності).'
  - 'Стратегії спростування: коректне використання дієслова «спростовувати» (теорію,
    міф, аргументи) в академічній дискусії.'
  - 'Презентація та зіставлення: семантика дієслів «характеризувати», «демонструвати»
    та «зіставляти» (пошук спільних рис).'
  - 'Формулювання висновків: використання «підсумовувати сказане», «констатувати факт»
    та «узагальнювати результати».'
- section: Практична стилістика та подолання типових помилок (Practical Stylistics
    and Overcoming Common Errors)
  words: 900
  points:
  - 'Виправлення калькованих конструкцій: заміна росіянізму «Ми рахуємо, що...» на
    нормативне «Ми вважаємо, що...» (We believe/consider).'
  - 'Термінологічна точність: розрізнення «правильно/слушно зроблений висновок» та
    ненормативного використання «вірно» в науковому тексті.'
  - 'Тенденція «Agency Pass»: перехід від безособових форм («було досліджено») до
    активних конструкцій («ми дослідили») згідно з сучасними рекомендаціями mon.gov.ua.'
  - Методи варіювання дієслів для уникнення тавтології та забезпечення лексичного
    багатства наукового тексту.
vocabulary_hints:
  required:
  - 'досліджувати (to research) — колокації: явище, проблему, питання, процес; High
    frequency (Academic Corpus)'
  - 'аналізувати (to analyze) — колокації: дані, результати, джерела, текст; High
    frequency'
  - стверджувати (to assert) — вживається у формі «стверджувати, що...»; висловлення
    авторської позиції
  - 'доводити (to prove) — колокації: гіпотезу, теорему, слушність думки; фокус на
    результаті'
  - 'обґрунтовувати (to substantiate) — колокації: вибір, актуальність, доцільність,
    позицію'
  - 'спростовувати (to refute) — колокації: міф, теорію, твердження, аргументи'
  - 'підсумовувати (to summarize) — колокації: сказане, результати, дискусію'
  - вважати (to consider) — правильний варіант для висловлення думки; заміна помилкового
    «рахувати»
  - 'з''ясовувати (to clarify/ascertain) — колокації: причини, обставини, суть справи'
  - 'констатувати (to state/ascertain) — колокації: факти, стан справ, наявність змін'
  recommended:
  - 'випробовувати (to test) — колокації: методику, модель, теорію на практиці'
  - зіставляти (to compare) — порівняння об'єктів для виявлення спільних і відмінних
    рис
  - правильно (correctly) — наукова норма; заміна ненормативного в цьому контексті
    «вірно»
  - 'розглядати (to examine/consider) — колокації: об''єкт під певним кутом зору,
    проблему'
  - узагальнювати (to generalize) — перехід від конкретних фактів до загальних висновків
  - 'формулювати (to formulate) — колокації: визначення, завдання, тези, закони'
