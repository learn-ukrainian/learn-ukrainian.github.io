module: c1-073
level: C1
sequence: 73
slug: mistsia-ta-urbanistyka
version: 1.0.2
title: 'Місця та урбаністика: місто, простір, планування'
subtitle: Місця, урбаністика, міське планування
focus: thematic
pedagogy: TTT
word_target: 4000
objectives:
- Опанувати лексику урбаністики, міського планування та архітектури на рівні C1.
- Навчитися описувати міський простір, його функції та проблеми розгорнутою 
  українською мовою.
- Вивчити мовні засоби для обговорення благоустрою, транспортної інфраструктури 
  та зеленого міста.
- 'Аналізувати урбаністичні виклики українських міст: відбудова, декомунізація, інклюзивність.'
reading_situations:
- source_type: аналітична стаття
  topic: 'Відбудова українських міст: між модернізацією та збереженням ідентичності.'
  key_elements:
  - урбаністика
  - реконструкція
  - ідентичність
  - зонування
  motivation: Вивчення урбаністичної термінології в контексті повоєнної 
    відбудови.
- source_type: архітектурний огляд
  topic: 'Архітектура Києва: від Софії до Маріїнського — стильове розмаїття.'
  key_elements:
  - бароко
  - класицизм
  - модернізм
  - ландшафт
  motivation: Поєднання архітектурної та урбаністичної лексики.
listening_situations:
- media_type: подкаст
  setting: 'Розмова з урбаністом про ідеальне місто: зелені зони, велоінфраструктура,
    громадський транспорт.'
  focus_points:
  - урбаністична термінологія
  - аргументація
  - порівняння
  motivation: Сприйняття фахового дискурсу про міський простір.
writing_tasks:
- task_type: аналітичний текст
  prompt: 'Опишіть ідеальне українське місто майбутнього (250-300 слів): транспорт,
    архітектура, зелені зони, громадський простір. Обґрунтуйте вибір.'
  requirements:
  - урбаністична термінологія
  - аргументація
  - порівняння з реальними прикладами
  motivation: Розвиток навичок описового та аргументативного письма.
  model_answer: Текст має містити бачення з конкретними прикладами, порівняння з
    існуючими українськими містами та обґрунтування пріоритетів.
discussion_topics:
- context: 'Як відбудувати зруйновані міста: копія минулого чи місто майбутнього?'
  questions:
  - Чи потрібно відновлювати зруйновані будівлі в оригінальному вигляді?
  - Як забезпечити інклюзивність міського простору для всіх жителів?
  motivation: Обговорення актуальних урбаністичних питань.
content_outline:
- section: 'Місто як простір: базова урбаністична лексика'
  words: 1000
  subsections:
  - 'Структура міста: центр, мікрорайон, передмістя, промзона'
  - 'Громадський простір: площа, парк, набережна, пішохідна зона'
  - 'Інфраструктура: дороги, мости, тунелі, мережі'
  key_concepts:
  - інфраструктура
  - зонування
  - мікрорайон
- section: Транспорт та мобільність
  words: 1000
  subsections:
  - 'Громадський транспорт: метро, трамвай, тролейбус, автобус'
  - Велоінфраструктура та мікромобільність
  - 'Логістика міста: транспортні розв''язки, пробки, паркування'
  key_concepts:
  - мобільність
  - логістика
  - транспорт
- section: Архітектура та забудова
  words: 1000
  subsections:
  - 'Архітектурні стилі в українських містах: від Русі до сучасності'
  - 'Забудовник, генплан, дозвіл на будівництво: мова будівельної галузі'
  - Збереження архітектурної спадщини vs модернізація
  key_concepts:
  - забудовник
  - спадщина
  - генплан
- section: Урбаністичні виклики України
  words: 1000
  subsections:
  - 'Повоєнна відбудова: Маріуполь, Харків, Чернігів'
  - 'Декомунізація простору: перейменування, демонтаж, нові символи'
  - 'Зелене місто: екологія, енергоефективність, якість повітря'
  key_concepts:
  - урбаністика
  - відбудова
  - декомунізація
- section: Підсумок — Summary
  words: 300
  points:
  - 'Urban vocabulary focuses on city structure and mobility: інфраструктура, зонування,
    мікрорайон. Self-check: Describe 3 public spaces in your city using advanced urban
    planning terms. What is the difference between мікрорайон and передмістя?'
  - "Architectural and post-war challenges require precise terminology: генплан, спадщина,
    забудовник, відбудова. Self-check: Explain the concept of decommunization (декомунізація)
    in urban spaces. What are 3 key factors for a 'green city' (зелене місто)?"
vocabulary:
  required:
  - урбаністика
  - інфраструктура
  - зонування
  - забудовник
  - мобільність
  - генплан
  - відбудова
  - декомунізація
  recommended:
  - мікрорайон
  - логістика
  - інклюзивність
  - енергоефективність
  - набережна
activity_hints:
- type: reading
  focus: 'Прочитайте текст про місто як простір: базова урбаністична лексика і дайте
    відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про транспорт та мобільність, 
    використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Місто як простір:
    базова урбаністична лексика». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему місто
    як простір: базова урбаністична лексика.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до місто як простір: базова урбаністична лексика:
    Структура міста: центр, мікрорайон, передмістя, промзона. Визначте спільне та
    відмінне.'
activities:
  types_required:
  - fill-in
  - match-up
  - critical-analysis
  - select
  - error-correction
  min_items_per_type: 5
  total_min_items: 25
references:
