module: c1-005
level: C1
sequence: 5
slug: logical-connectors
version: '1.1'
title: "Логічні конектори та зв'язність тексту"
subtitle: "Логічні конектори та зв'язність тексту"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Систематизувати знання про логічні конектори для створення зв'язного та переконливого
    тексту."
  - "Навчитися використовувати засоби вираження причини, наслідку, протиставлення
    та допустовості на рівні C1."
  - "Опанувати використання вставних слів та конструкцій для структурування академічної
    аргументації."
  - "Розуміти різницю між когезією (граматичним зв'язком) та когерентністю (смисловою
    цілісністю) тексту."

reading_situations:
  - source_type: "політологічний аналіз"
    topic: "Причинно-наслідкові зв'язки у процесах євроінтеграції України."
    key_elements: ["дискурсивні маркери", "конектори причини", "наслідкові конструкції"]
    motivation: "Аналіз логічної структури тексту, де кожне твердження випливає з
      попереднього за допомогою спеціальних засобів зв'язку."
  - source_type: "фрагмент історичної монографії"
    topic: "Контрфактичний аналіз подій Української революції 1917-1921 років."
    key_elements: ["допустові підрядні", "умовні конструкції", "логічне протиставлення"]
    motivation: "Вивчення засобів вираження складних логічних умов та протиставлень
      в історичному контексті."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть коротку аналітичну замітку (200-250 слів) про виклики сучасної
      української освіти. Обов'язково використайте конектори протиставлення (незважаючи
      на, натомість), причини (зважаючи на те що) та наслідку (як результат, отже)."
    requirements: ["логічність переходу між абзацами", "різноманітність засобів зв'язку",
      "академічний стиль"]
    motivation: "Тренування навичок побудови логічно довершеного та аргументованого
      тексту."
    model_answer: "Текст повинен демонструвати вміння не просто перелічувати факти,
      а встановлювати між ними логічну ієрархію."

discussion_topics:
  - context: "Логіка публічного дискурсу в Україні: емоції vs раціональна аргументація."
    questions:
      - "Чому використання логічних конекторів є важливим для політичної дискусії?"
      - "Як маніпуляції з логічними зв'язками можуть змінювати сприйняття інформації?"
      - "Роль структурованого мовлення у формуванні довіри до спікера."
    motivation: "Розвиток критичного ставлення до структури почутого та мовленого
      тексту."

content_outline:
  - section: "Конектори причини та наслідку"
    words: 1000
    subsections:
      - "Складні прийменники причини: з огляду на, з огляду на те що, за умови"
      - "Засоби вираження результативності: відповідно до цього, у зв'язку з цим,
        що призводить до"
      - "Логічне підсумовування: таким чином, отже, виходячи з вищевикладеного"
    key_concepts:
      - "каузальність"
      - "детермінація"
      - "логічний висновок"
  - section: "Протиставлення, допустовість та градація"
    words: 1000
    subsections:
      - "Вираження заперечення та контрасту: попри те що, незважаючи на, на противагу"
      - "Допустові конструкції як засіб пом'якшення аргументації: хоча, як би там
        не було, припустимо що"
      - "Градаційні сполучники: не тільки... а й, ба більше, не стільки... скільки"
    key_concepts:
      - "концесивність"
      - "контрастивність"
      - "градація"
  - section: "Структурування тексту та вставні конструкції"
    words: 1000
    subsections:
      - "Впорядкування думок: по-перше, по-друге, нарешті, передусім"
      - "Доповнення та уточнення інформації: крім того, зокрема, власне кажучи, інакше
        кажучи"
      - "Оцінка вірогідності: безсумнівно, очевидно, імовірно, як видається"
    key_concepts:
      - "текстова архітектоніка"
      - "вставність"
      - "метатекст"
  - section: "Когезія та когерентність на рівні C1"
    words: 1000
    subsections:
      - "Лексичні засоби зв'язку: повтори, синоніми, займенникова заміна"
      - "Паралелізм структур як засіб риторичного впливу"
      - "Уникнення логічних помилок при використанні конекторів"
    key_concepts:
      - "когезія"
      - "когерентність"
      - "синтаксичний паралелізм"

vocabulary:
  required:
    - відповідно
    - зокрема
    - попри
    - отже
    - внаслідок
    - натомість
    - враховуючи
    - оскільки
  recommended:
    - безумовно
    - ба більше
    - з огляду на
    - зважаючи на
    - відповідно до

activity_hints:
  - type: error-correction
    description: "Fix misused logical connectors in academic paragraphs — replace
      inappropriate cause/effect/concession markers."
  - type: fill-in
    description: "Complete academic texts with appropriate connectors of cause (зважаючи
      на), result (отже), and concession (попри те що)."
  - type: select
    description: "Choose the correct logical connector from multiple options to maintain
      coherence in an argumentative text."
  - type: essay-response
    description: "Write an analytical note (200-250 words) about challenges in Ukrainian
      education using at least 8 different logical connectors."
  - type: cloze
    description: "Fill in missing discourse markers in a political analysis text about
      European integration."

activities:
  types_required:
    - error-correction
    - fill-in
    - select
    - unjumble
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §45 — Синтаксичні одиниці в різних стилях"
  - "Заболотний, 11 клас (2019): Стилістичні норми, мовленнєві жанри"
  - "Ворон, 11 клас (2019): с. 218 — Науковий стиль мовлення"

connects_to:
  previous: "analysis-vocabulary"
  next: "hedging-modality"
phase: C1.1 [Academic Foundation]
