module: c1-130
level: C1
sequence: 130
slug: ukrainske-kino
version: 1.1.2
title: 'Українське кіно: від німого шедевра до світового визнання'
subtitle: 'Українське кіно: від німих шедеврів до світового визнання'
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
- Простежити еволюцію українського кінематографа від епохи ВУФКУ до сучасних 
  міжнародних успіхів.
- Проаналізувати естетичні та філософські засади 'українського поетичного кіно' 
  як унікального мистецького явища.
- Вивчити вплив радянської цензури на розвиток кіномистецтва та способи 
  ідеологічного спротиву митців.
- Оцінити здобутки сучасного українського кіно в контексті світових фестивальних
  трендів та деколонізаційного дискурсу.
reading_situations:
- source_type: мистецтвознавча стаття
  topic: 'Феномен Олександра Довженка: чому ''Земля'' увійшла до списку найкращих
    фільмів усіх часів і народів.'
  key_elements:
  - пантеїзм
  - монтаж
  - експресіонізм
  - філософська притча
  - ВУФКУ
  motivation: Аналіз академічного тексту про становлення національної кіношколи 
    та її світове значення.
- source_type: критичний огляд
  topic: 'Світло і тіні ''Тіней забутих предків'': як Сергій Параджанов переосмислив
    гуцульську міфологію.'
  key_elements:
  - етнографічна автентичність
  - колір як метафора
  - поетичне кіно
  - ритуальність
  motivation: Робота з текстом, що описує візуальну мову та символіку шедевра 
    світового кіно.
listening_situations:
- media_type: інтерв'ю
  setting: Розмова з сучасним українським режисером (наприклад, Антоніо Лукічем)
    про особливості нової хвилі українського кіно та виклики жанрового кіно.
  focus_points:
  - самоіронія в українському контексті
  - пошук кіномови для сучасної реальності
  - баланс між локальною темою та глобальним глядачем
  motivation: Сприйняття живої професійної мови, наповненої сучасною 
    термінологією та сленгом кіноіндустрії.
- media_type: лекція
  setting: Фрагмент лекції про історію цензури в українському кіно 1970-х років 
    та долю 'покладених на полицю' фільмів.
  focus_points:
  - ідеологічний тиск
  - езопова мова в кіно
  - трагедія покоління шістдесятників у кінематографі
  motivation: Розуміння історичного контексту та його впливу на мистецькі 
    процеси.
writing_tasks:
- task_type: есе
  prompt: Порівняйте повість Михайла Коцюбинського 'Тіні забутих предків' та її 
    екранізацію Сергієм Параджановим. Проаналізуйте, як література 
    трансформується у візуальні образи.
  requirements:
  - мінімум 350 слів
  - 'використання термінів: інтерпретація, візуальна метафора, звукова партитура,
    колорит'
  - аргументація щодо успішності адаптації
  motivation: Розвиток навичок компаративного аналізу літературного твору та 
    кінофільму.
  model_answer: Есе має містити порівняльний аналіз імпресіоністичного стилю 
    Коцюбинського та експресивного візуального стилю Параджанова, обговорення 
    ролі музики та кольору як засобів передачі внутрішнього стану героїв, а 
    також висновок про те, як фільм розширив межі літературного першоджерела.
discussion_topics:
- context: Сучасне українське кіно часто звинувачують у надмірному фокусі на 
    темах війни та страждань. Водночас саме ці фільми отримують нагороди на 
    престижних фестивалях (Канни, Берлінале, Венеція).
  questions:
  - Чи має мистецтво бути дзеркалом актуальної трагедії, чи воно повинно давати 
    глядачеві простір для ескапізму?
  - Яку роль відіграє українське кіно у процесі культурної дипломатії та 
    деколонізації сьогодні?
  motivation: Практика ведення дискусії на гострі соціокультурні теми з 
    використанням складної аргументації.
content_outline:
- section: 'Золотий вік німого кіно: ВУФКУ та Олександр Довженко'
  words: 1000
  subsections:
  - Всеукраїнське фотокіноуправління (ВУФКУ) як епіцентр модернізму 1920-х
  - 'Трилогія Довженка: ''Звенигора'', ''Арсенал'', ''Земля'' — світовий канон'
  - Монтажний інтелектуалізм та пантеїстичний світогляд
  key_concepts:
  - авангард
  - німе кіно
  - пантеїзм
  - інтелектуальний монтаж
- section: 'Українське поетичне кіно: естетика спротиву'
  words: 1000
  subsections:
  - 'Сергій Параджанов та ''Тіні забутих предків'': тріумф візуальної культури'
  - 'Юрій Іллєнко та Іван Миколайчук: філософія образу та народна традиція'
  - 'Кіра Муратова: унікальна кіномова та деструкція стереотипів'
  key_concepts:
  - поетичний реалізм
  - міфологізм
  - дисидентство
  - авторський стиль
- section: 'Кіно часів Незалежності: від кризи до відродження'
  words: 1000
  subsections:
  - Занепад 1990-х та перші спроби осмислення нової реальності
  - 'Олесь Санін та ''Мамай'': повернення до великої форми'
  - Внесок документалістики в утвердження національної ідентичності
  key_concepts:
  - постколоніалізм
  - самоідентифікація
  - документалістика
  - жанровий пошук
- section: Сучасна 'нова хвиля' та світовий контекст
  words: 1000
  subsections:
  - 'Успіхи на А-фестивалях: Слабошпицький, Лозниця, Ер Горбач'
  - 'Нова комедія та молоде кіно (Лукіч, Цілик): зміна парадигми'
  - 'Кіно як інструмент боротьби: від ''Кіборгів'' до ''20 днів у Маріуполі'''
  key_concepts:
  - фестивальний успіх
  - нова хвиля
  - деколонізація
  - культурна дипломатія
- section: Підсумок — Summary
  words: 300
  points:
  - 'Key cinematic concepts to review: the avant-garde (авангард) and intellectual
    montage (інтелектуальний монтаж) of ВУФКУ, and the aesthetic resistance of Ukrainian
    poetic cinema (українське поетичне кіно). Self-check: What is the difference between
    intellectual montage and poetic realism? Name 3 iconic Ukrainian directors and
    their most famous films.'
  - "Modern cinema and decolonization: the transition from the post-colonial era (постколоніалізм)
    to the modern new wave (нова хвиля) and festival success (фестивальний успіх).
    Self-check: How did Soviet censorship impact directors like Parajanov? Describe
    the role of modern documentary (документалістика) in today's cultural diplomacy."
