vocabulary_hints:
  required:
  - кріпацтво (serfdom) — скасування кріпацтва, тягар кріпацтва, кріпацька неволя;
    High frequency in 19th-century historical and literary contexts.
  - панщина (corvée) — відробляти панщину, тяжка панщина; essential for understanding
    the social dynamics of the period.
  - знедолений (downtrodden) — знедолений народ, голос знедолених; high-register literary
    term used for social critique.
  - бунт (rebellion/riot) — селянський бунт, стихійний бунт, придушити бунт; describes
    the movement from passive suffering to active resistance.
  - типовість (typicality) — типові обставини, типовий характер, принцип типовості;
    core terminological concept for literary realism.
  - народність (folk character) — дух народності, принцип народності, глибока народність;
    used to describe the authenticity and source of the literary voice.
  recommended:
  - визискувач (exploiter) — жорстокий визискувач, пани-визискувачі; low frequency,
    specific to social critique and archaic registers.
  - соціально-психологічний роман (socio-psychological novel) — precise genre definition
    to avoid confusion with crime fiction.
  - 'сказ (skaz narration) — usage: folk-style narration found in Marko Vovchok''s
    prose.'
