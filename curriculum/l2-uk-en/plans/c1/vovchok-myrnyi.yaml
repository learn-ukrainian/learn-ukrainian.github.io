slug: vovchok-myrnyi
version: '2.0'
title: Вовчок та Мирний
subtitle: 'Vovchok and Myrny: Social Realism'
content_outline:
- section: 'Вступ: Постаті та маски (Introduction: Figures and Masks)'
  words: 600
  points:
  - 'Дослідження постаті Марії Вілінської: пояснити походження чоловічого псевдоніма
    «Марко Вовчок» та виправити типову помилку студентів (вживання займенника «він»
    замість «вона», «письменниця»).'
  - 'Культурний контекст: обговорити визначення Куліша «Моцарт кохання» та аналіз
    вірша Шевченка «Марку Вовчку», де він називає її своєю «донею» та наступницею.'
  - Встановлення зв'язку з попередніми темами (B2 History/C1.5 Literature) щодо скасування
    кріпацтва та переходу від романтизму до реалізму.
- section: 'Марко Вовчок: Голос знедолених (Marko Vovchok: The Voice of the Downtrodden)'
  words: 900
  points:
  - 'Аналіз повісті «Інститутка»: висвітлення теми кріпацтва (кріпацтво) та панщини
    (панщина) крізь призму жіночого погляду.'
  - 'Техніка оповіді «сказ»: згідно з Держстандартом (§4.4.1.1), проаналізувати особливості
    художнього стилю, що імітує народну говірку, та використання діалектизмів для
    створення автентичності.'
  - 'Стилістичні засоби (§4.4.3): дослідити використання зменшувально-пестливих та
    згрубілих форм як засобу соціальної характеристики героїв (кріпаки проти визискувачів).'
- section: 'Панас Мирний: Психологізм та епічність (Panas Myrny: Psychologism and
    Epicity)'
  words: 1000
  points:
  - 'Генеза роману «Хіба ревуть воли...»: від реального прототипу розбійника Василя
    Гнидки до створення «будинку з багатьма прибудовами» (соціально-психологічного
    роману).'
  - 'Виправлення помилки: чітке розмежування жанру «соціально-психологічний роман»
    від простого кримінального нарису чи детективу.'
  - 'Аналіз образу Чіпки: як соціальні умови та «тягар кріпацтва» формують психологічну
    мотивацію героя та призводять до стихійного бунту.'
- section: 'Теорія: Принципи соціального реалізму (Theory: Principles of Social Realism)'
  words: 800
  points:
  - Детальний розгляд принципів «типовості» та «народності» у реалістичній літературі
    XIX століття.
  - 'Запобігання термінологічній плутанині: розмежування класичного «соціально-побутового
    реалізму» та радянського «соціалістичного реалізму» (соцреалізму).'
  - 'Лексичні засоби створення образу (§4.4.3): роль епітетів та метафор у творенні
    «типових характерів у типових обставинах» сільського життя.'
- section: Практика та синтез (Practice and Synthesis)
  words: 700
  points:
  - 'Порівняльна характеристика оповідних манер: інтимний голос Вовчок проти епічного,
    аналітичного голосу Мирного.'
  - 'Творче завдання: написати есе про «психологію знедоленого», використовуючи засвоєні
    колокції (знедолений народ, придушити бунт, жорстокий визискувач).'
  - 'Підсумок: як соціальний реалізм підготував ґрунт для українського модернізму
    (Коцюбинського, Стефаника) — перехід до наступної фази C1.6.'
focus: literature
pedagogy: Literary Analysis
objectives:
- Learner can analyze the social critique in Marko Vovchok’s "Instytutka".
- Learner can interpret the psychological motivation of characters in Panas Myrny’s
  work.
- Learner can discuss the features of Ukrainian social realism.
