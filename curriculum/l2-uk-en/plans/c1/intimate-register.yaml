module: c1-065
level: C1
sequence: 65
slug: intimate-register
version: '1.0'
title: "Інтимний регістр та мова приватних стосунків"
subtitle: "Intimate Register and the Language of Private Relationships"
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити лінгвістичні засоби вираження близькості, ніжності та довіри в українській мові."
  - "Опанувати систему демінутивів (пестливих форм) та правила їх доречного використання."
  - "Аналізувати епістолярну спадщину українських класиків як взірець інтимного стилю."
  - "Розуміти психолінгвістичні аспекти переходу з офіційного на інтимний регістр."

reading_situations:
  - source_type: "епістолярій"
    topic: "Листування Лесі Українки з родиною та близькими друзями: мова почуттів."
    key_elements: ["індивідуальний стиль", "пестливі імена", "емоційна відвертість"]
    motivation: "Вивчення найвищого рівня інтимної культури мовлення в українській літературі."
  - source_type: "художній твір"
    topic: "Внутрішній монолог героя у творах Михайла Коцюбинського: відображення інтимних переживань."
    key_elements: ["імпресіонізм", "сенсорна лексика", "суб'єктивність"]
    motivation: "Аналіз мовних засобів передачі найтонших відтінків людської психіки."

listening_situations:
  - media_type: "аудіо"
    setting: "Запис родинної вечері, де представники трьох поколінь спілкуються в неофіційній обстановці."
    focus_points: ["використання демінутивів", "неповні речення", "спільний код значень (сімейний лексикон)"]
    motivation: "Розвиток навичок розпізнавання природного розмовного мовлення в інтимному колі."
  - media_type: "відео"
    setting: "Фрагмент сучасного українського кіно, що демонструє сцену освідчення або глибокої приватної розмови."
    focus_points: ["паралінгвістичні засоби", "пауза як засіб вираження", "вибір лексики для передачі близькості"]
    motivation: "Аналіз взаємодії вербальних та невербальних засобів у приватному спілкуванні."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть особистого листа уявному близькому другу (200-250 слів), розповідаючи про свої внутрішні зміни після переїзду або подорожі. Використовуйте багатство української демінутивної системи."
    requirements: ["використання щирих звертань", "емоційна забарвленість", "природність вираження почуттів"]
    motivation: "Відпрацювання навичок щирого та автентичного самовираження українською мовою."
    model_answer: "Текст має містити слова 'сонечко', 'серденько', 'рідненький', 'затишно' та відображати глибоку довіру."

content_outline:
  - section: "Морфологія ніжності: демінутиви в українській мові"
    words: 1000
    subsections:
      - "Специфіка українського словотвору: багатство суфіксів суб'єктивної оцінки"
      - "Демінутиви як маркер інтимності vs надмірне сюсюкання"
      - "Гендерні особливості вживання пестливих форм"
    key_concepts:
      - "суфіксація"
      - "пестливість"
      - "емотивність"
  - section: "Епістолярна культура та приватний простір"
    words: 1000
    subsections:
      - "Традиції українського приватного листування: від козацьких листів до інтелігенції XIX ст."
      - "Мова кохання: лексико-фразеологічний фонд інтимних почуттів"
      - "Формування 'таємної мови' в колі близьких друзів"
    key_concepts:
      - "епістолярій"
      - "інтимізація"
      - "адресант і адресат"
  - section: "Психолінгвістика інтимного спілкування"
    words: 1000
    subsections:
      - "Перехід з 'Ви' на 'Ти': соціокультурні бар'єри та мовні маркери"
      - "Роль метафори та натяку в інтимному дискурсі"
      - "Табуйовані теми та способи їх делікатного обговорення"
    key_concepts:
      - "солідарність"
      - "мовна дистанція"
      - "саморозкриття"
  - section: "Інтимність у цифрову епоху"
    words: 1000
    subsections:
      - "Трансформація мови близькості в месенджерах та соціальних мережах"
      - "Смайли та емодзі як замінники традиційних епітетів"
      - "Проблема збереження приватності в публічному онлайн-просторі"
    key_concepts:
      - "цифрова близькість"
      - "нетикет"
      - "візуалізація емоцій"

vocabulary:
  required:
    - ніжність
    - близькість
    - щирість
    - довіра
    - пестливий
    - заповітний
    - відвертість
    - затишок
  recommended:
    - демінутив
    - емпатія
    - душевність
    - сокровенний
    - інтимність

activities:
