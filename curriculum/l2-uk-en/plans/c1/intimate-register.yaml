module: c1-080
level: C1
sequence: 80
slug: intimate-register
version: 1.1.2
title: Інтимний регістр та мова приватних стосунків
subtitle: Інтимний регістр і мова приватних стосунків
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
- Дослідити лінгвістичні засоби вираження близькості, ніжності та довіри в 
  українській мові.
- Опанувати систему демінутивів (пестливих форм) та правила їх доречного 
  використання.
- Аналізувати епістолярну спадщину українських класиків як взірець інтимного 
  стилю.
- Розуміти психолінгвістичні аспекти переходу з офіційного на інтимний регістр.
reading_situations:
- source_type: епістолярій
  topic: 'Листування Лесі Українки з родиною та близькими друзями: мова почуттів.'
  key_elements:
  - індивідуальний стиль
  - пестливі імена
  - емоційна відвертість
  motivation: Вивчення найвищого рівня інтимної культури мовлення в українській 
    літературі.
- source_type: художній твір
  topic: 'Внутрішній монолог героя у творах Михайла Коцюбинського: відображення інтимних
    переживань.'
  key_elements:
  - імпресіонізм
  - сенсорна лексика
  - суб'єктивність
  motivation: Аналіз мовних засобів передачі найтонших відтінків людської 
    психіки.
listening_situations:
- media_type: аудіо
  setting: Запис родинної вечері, де представники трьох поколінь спілкуються в 
    неофіційній обстановці.
  focus_points:
  - використання демінутивів
  - неповні речення
  - спільний код значень (сімейний лексикон)
  motivation: Розвиток навичок розпізнавання природного розмовного мовлення в 
    інтимному колі.
- media_type: відео
  setting: Фрагмент сучасного українського кіно, що демонструє сцену освідчення 
    або глибокої приватної розмови.
  focus_points:
  - паралінгвістичні засоби
  - пауза як засіб вираження
  - вибір лексики для передачі близькості
  motivation: Аналіз взаємодії вербальних та невербальних засобів у приватному 
    спілкуванні.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть особистого листа уявному близькому другу (200-250 слів), 
    розповідаючи про свої внутрішні зміни після переїзду або подорожі. 
    Використовуйте багатство української демінутивної системи.
  requirements:
  - використання щирих звертань
  - емоційна забарвленість
  - природність вираження почуттів
  motivation: Відпрацювання навичок щирого та автентичного самовираження 
    українською мовою.
  model_answer: Текст має містити слова 'сонечко', 'серденько', 'рідненький', 
    'затишно' та відображати глибоку довіру.
content_outline:
- section: 'Морфологія ніжності: демінутиви в українській мові'
  words: 1000
  subsections:
  - 'Специфіка українського словотвору: багатство суфіксів суб''єктивної оцінки'
  - Демінутиви як маркер інтимності vs надмірне сюсюкання
  - Гендерні особливості вживання пестливих форм
  key_concepts:
  - суфіксація
  - пестливість
  - емотивність
- section: Епістолярна культура та приватний простір
  words: 1000
  subsections:
  - 'Традиції українського приватного листування: від козацьких листів до інтелігенції
    XIX ст.'
  - 'Мова кохання: лексико-фразеологічний фонд інтимних почуттів'
  - Формування 'таємної мови' в колі близьких друзів
  key_concepts:
  - епістолярій
  - інтимізація
  - адресант і адресат
- section: Психолінгвістика інтимного спілкування
  words: 1000
  subsections:
  - 'Перехід з ''Ви'' на ''Ти'': соціокультурні бар''єри та мовні маркери'
  - Роль метафори та натяку в інтимному дискурсі
  - Табуйовані теми та способи їх делікатного обговорення
  key_concepts:
  - солідарність
  - мовна дистанція
  - саморозкриття
- section: Інтимність у цифрову епоху
  words: 1000
  subsections:
  - Трансформація мови близькості в месенджерах та соціальних мережах
  - Смайли та емодзі як замінники традиційних епітетів
  - Проблема збереження приватності в публічному онлайн-просторі
  key_concepts:
  - цифрова близькість
  - нетикет
  - візуалізація емоцій
- section: Підсумок — Summary
  words: 300
  points:
  - "Intimate communication in Ukrainian relies heavily on the system of diminutives
    (пестливі форми) and specific emotive suffixes. Self-check: What is the difference
    between using diminutives as an appropriate marker of intimacy and excessive 'сюсюкання'?"
  - "The transition from formal to intimate register involves overcoming sociocultural
    barriers and shifting from 'Ви' to 'ти'. Self-check: Describe 3 linguistic markers
    that signal a shift to a more intimate discourse. How do modern emojis replace
    traditional epistolary epithets?"
vocabulary:
  required:
  - ніжність
  - близькість
  - щирість
  - довіра
  - пестливий
  - заповітний
  - відвертість
  - затишок
  recommended:
  - демінутив
  - емпатія
  - душевність
  - сокровенний
  - інтимність
activity_hints:
- type: reading
  focus: 'Прочитайте текст про морфологія ніжності: демінутиви в українській мові
    і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про епістолярна культура та 
    приватний простір, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Морфологія ніжності:
    демінутиви в українській мові». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему морфологія
    ніжності: демінутиви в українській мові.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до морфологія ніжності: демінутиви в українській
    мові: Специфіка українського словотвору: багатство суфіксів суб''єктивної оцінки.
    Визначте спільне та відмінне.'
activities:
  types_required:
  - authorial-intent
  - reading
  - match-up
  - essay-response
  - select
  min_items_per_type: 5
  total_min_items: 25
references:
