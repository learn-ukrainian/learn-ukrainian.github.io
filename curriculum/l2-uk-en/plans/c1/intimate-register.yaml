module: c1-044
level: c1
sequence: 44
version: '1.0'
title: 'Інтимно-ласкавий стиль: Мова близьких стосунків'
subtitle: 'Intimate Register: Language of Close Relationships'
focus: style
pedagogy: Sociolinguistics
objectives:
- Learner can identify and use diminutive forms to express affection
- Learner can distinguish between neutral and intimate registers
- Learner can express deep emotions (love, care, longing) in Ukrainian
content_outline:
- section: 'Вступ: Природа інтимно-ласкавого стилю (Introduction: Nature of the Intimate
    Register)'
  words: 500
  points:
  - 'Визначення інтимного регістру через призму Державного стандарту (§4.4.3): роль
    зменшувально-пестливих форм у розмовному та епістолярному стилях'
  - 'Класифікація інтимності: розрізнення романтичного (партнери), сімейного (батьки-діти)
    та дружнього (близькі друзі) контекстів'
- section: 'Морфологія ніжності: Суфіксальна магія (Morphology of Tenderness: Suffixal
    Magic)'
  words: 1000
  points:
  - 'Механізми творення пестливості: практичне застосування суфіксів -оньк-, -еньк-,
    -ус-, -яс- для трансформації нейтральних іменників (дощ – дощик, донька – донечка)'
  - 'Аналіз емоційного забарвлення: як вибір суфікса змінює інтенсивність почуття
    (наприклад, мама — матуся — мамуся — мамочка)'
  - 'Типова помилка: недоречне вживання демінутивів у нейтральних контекстах (наприклад,
    звертання ''водієчку'' чи ''продавчине''), що створює ефект фамільярності або
    зверхності'
- section: 'Культурні коди інтимності: Франко та Українка (Cultural Codes of Intimacy:
    Franko and Ukrainka)'
  words: 1000
  points:
  - 'Аналіз поетичного звертання на прикладі Івана Франка «Ой ти, дівчино, з горіха
    зерня»: використання порівнянь, епітетів та інтимного вокативу як засобів адресації
    (§4.1.2.7)'
  - 'Епістолярний етикет Лесі Українки: техніка інтимізації через вживання займенників
    третьої особи («Хтось біленький», «Хтось чорненький») замість прямого ''Я/Ти'''
  - 'Метафоричний світ інтимності: використання назв птахів та небесних світил (зіронька,
    сонечко, пташина) у літературній та народній традиції'
- section: Лексичні пастки та синтаксис близькості (Lexical Traps and Syntax of Closeness)
  words: 800
  points:
  - 'Корекція помилки вживання ''любий'' vs ''улюблений'': розрізнення ''мій любий
    чоловік'' (dear/beloved) та помилкового ''мій улюблений чоловік'' (favorite -
    що передбачає список)'
  - 'Синтаксичні зсуви в інтимному мовленні: використання еліпсису (неповних речень)
    як ознаки глибокого розуміння ''з пів слова'''
  - 'Позиція присвійних займенників: емоційне наголошення через постпозицію слова
    ''мій/моя'' (наприклад, ''Гарна ти моя'' замість нейтрального ''Ти моя гарна'')'
- section: 'Практика та підсумок: Мова серця (Practice and Summary: Language of the
    Heart)'
  words: 700
  points:
  - 'Трансформаційна вправа: переклад нейтрального діалогу в інтимно-ласкавий регістр
    з використанням вивчених суфіксів та вокативів'
  - 'Продуктивне завдання: написання короткого листа близькій людині, інтегруючи лексику
    ''рідна душа'', ''серденько'' та прийоми високої епістолярної інтимності Лесі
    Українки'
vocabulary:
  required: '[]'
  recommended: '[]'
  forbidden: '[]'
persona:
  voice: Senior Specialist
  role: Психолог стосунків
word_target: 4000
vocabulary_hints:
  required:
  - коханий / кохана (beloved) — мій коханий, єдиний коханий, кохана дружина; основне
    слово для романтичних стосунків
  - любий / люба (dear / beloved) — любий мій, моя люба, найлюбіший; висока частотність
    в епістолярії; уникати плутанини з 'улюблений'
  - рідний / рідна (dear / blood-related) — найрідніший, рідна душа, рідненький; виражає
    найглибший емоційний зв'язок
  - серденько (dear heart) — моє серденько, від усього серденька; класичний демінутив
    для вираження ласки
  recommended:
  - сонечко (sunshine / little sun) — моє сонечко, ясне сонечко; універсальне пестливе
    звертання
  - зіронька (little star) — ясна зіронька, вечірня зіронька; поетичний та фольклорний
    реєстр
  - пташка / пташина (little bird) — моя пташка, пташеня; метафоричне звертання до
    коханих або дітей
  - вокатив (vocative forms) — дівчино, кохана, рідненький; обов'язкова форма адресації
    в інтимному стилі
