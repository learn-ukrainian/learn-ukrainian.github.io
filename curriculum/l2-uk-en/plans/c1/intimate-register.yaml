module: c1-080
level: C1
sequence: 80
slug: intimate-register
version: '1.1'
title: "Інтимний регістр та мова приватних стосунків"
subtitle: "Інтимний регістр і мова приватних стосунків"
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити лінгвістичні засоби вираження близькості, ніжності та довіри в українській
    мові."
  - "Опанувати систему демінутивів (пестливих форм) та правила їх доречного використання."
  - "Аналізувати епістолярну спадщину українських класиків як взірець інтимного стилю."
  - "Розуміти психолінгвістичні аспекти переходу з офіційного на інтимний регістр."

reading_situations:
  - source_type: "епістолярій"
    topic: "Листування Лесі Українки з родиною та близькими друзями: мова почуттів."
    key_elements: ["індивідуальний стиль", "пестливі імена", "емоційна відвертість"]
    motivation: "Вивчення найвищого рівня інтимної культури мовлення в українській
      літературі."
  - source_type: "художній твір"
    topic: "Внутрішній монолог героя у творах Михайла Коцюбинського: відображення
      інтимних переживань."
    key_elements: ["імпресіонізм", "сенсорна лексика", "суб'єктивність"]
    motivation: "Аналіз мовних засобів передачі найтонших відтінків людської психіки."

listening_situations:
  - media_type: "аудіо"
    setting: "Запис родинної вечері, де представники трьох поколінь спілкуються в
      неофіційній обстановці."
    focus_points: ["використання демінутивів", "неповні речення", "спільний код значень
          (сімейний лексикон)"]
    motivation: "Розвиток навичок розпізнавання природного розмовного мовлення в інтимному
      колі."
  - media_type: "відео"
    setting: "Фрагмент сучасного українського кіно, що демонструє сцену освідчення
      або глибокої приватної розмови."
    focus_points: ["паралінгвістичні засоби", "пауза як засіб вираження", "вибір лексики
          для передачі близькості"]
    motivation: "Аналіз взаємодії вербальних та невербальних засобів у приватному
      спілкуванні."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть особистого листа уявному близькому другу (200-250 слів), розповідаючи
      про свої внутрішні зміни після переїзду або подорожі. Використовуйте багатство
      української демінутивної системи."
    requirements: ["використання щирих звертань", "емоційна забарвленість", "природність
          вираження почуттів"]
    motivation: "Відпрацювання навичок щирого та автентичного самовираження українською
      мовою."
    model_answer: "Текст має містити слова 'сонечко', 'серденько', 'рідненький', 'затишно'
      та відображати глибоку довіру."

content_outline:
  - section: "Морфологія ніжності: демінутиви в українській мові"
    words: 1000
    subsections:
      - "Специфіка українського словотвору: багатство суфіксів суб'єктивної оцінки"
      - "Демінутиви як маркер інтимності vs надмірне сюсюкання"
      - "Гендерні особливості вживання пестливих форм"
    key_concepts:
      - "суфіксація"
      - "пестливість"
      - "емотивність"
  - section: "Епістолярна культура та приватний простір"
    words: 1000
    subsections:
      - "Традиції українського приватного листування: від козацьких листів до інтелігенції
        XIX ст."
      - "Мова кохання: лексико-фразеологічний фонд інтимних почуттів"
      - "Формування 'таємної мови' в колі близьких друзів"
    key_concepts:
      - "епістолярій"
      - "інтимізація"
      - "адресант і адресат"
  - section: "Психолінгвістика інтимного спілкування"
    words: 1000
    subsections:
      - "Перехід з 'Ви' на 'Ти': соціокультурні бар'єри та мовні маркери"
      - "Роль метафори та натяку в інтимному дискурсі"
      - "Табуйовані теми та способи їх делікатного обговорення"
    key_concepts:
      - "солідарність"
      - "мовна дистанція"
      - "саморозкриття"
  - section: "Інтимність у цифрову епоху"
    words: 1000
    subsections:
      - "Трансформація мови близькості в месенджерах та соціальних мережах"
      - "Смайли та емодзі як замінники традиційних епітетів"
      - "Проблема збереження приватності в публічному онлайн-просторі"
    key_concepts:
      - "цифрова близькість"
      - "нетикет"
      - "візуалізація емоцій"

vocabulary:
  required:
    - ніжність
    - близькість
    - щирість
    - довіра
    - пестливий
    - заповітний
    - відвертість
    - затишок
  recommended:
    - демінутив
    - емпатія
    - душевність
    - сокровенний
    - інтимність

activity_hints:
  - type: select
    description: "Identify the register level (офіційний, розмовний, інтимний) of
      given text excerpts and explain the linguistic markers that signal each level."
  - type: comparative-study
    description: "Match types of diminutive suffixes (-очк-, -ечк-, -еньк-, -ісіньк-)
      with their emotional coloring and usage contexts (ніжність, іронія, зменшення)."
  - type: critical-analysis
    description: "Analyze an excerpt from Леся Українка's personal letters — identify
      intimate register markers (пестливі форми, неповні речення, сімейний лексикон)."
  - type: essay-response
    description: "Write a personal letter (100-150 words) to a close friend about
      a life change, using the full range of Ukrainian diminutive forms and intimate
      vocabulary."
  - type: error-correction
    description: "Fix inappropriate register mixing — identify where intimate language
      intrudes into professional contexts and vice versa."

activities:
  types_required:
    - authorial-intent
    - reading
    - match-up
    - essay-response
    - select
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §40 — Стилістичне забарвлення лексики (книжна/розмовна)"
  - "Караман, 10 клас (2018): §38 — Лексичні засоби стилістики, емоційна лексика"
  - "Авраменко, 11 клас (2019): Стилістична норма — розмовний стиль, емоційність"

connects_to:
  previous: "high-formal-register"
  next: "slang-youth"
phase: C1.3 [Advanced Stylistics & Rhetoric]
