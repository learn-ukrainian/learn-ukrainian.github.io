module: c1-077
level: C1
sequence: 77
slug: narodna-medytsyna
version: '2.0'
title: Народна медицина
subtitle: Ukrainian Traditional Healing
content_outline:
- section: 'Вступ: Зцілення словом та травою (Introduction: Healing by Word and Herb)'
  words: 600
  points:
  - Народна медицина як тисячолітні знання та соціокультурний інститут українського
    села (Alignment with §3.11/§3.21)
  - 'Лексична диференціація: лікар (дипломований фахівець) vs. знахар/цілитель (носій
    традицій) — розбір семантичних меж'
  - 'Зв''язок лікування з магією та релігією: концепція ''своєї'' та ''чужої'' хвороби'
- section: 'Знахарі та їхні методи: Феномен мольфарства (Healers and Their Methods:
    The Molfar Phenomenon)'
  words: 900
  points:
  - 'Типологія народних спеціалістів: шептуни (вербальна магія), баби-повитухи, костоправи
    (фізична терапія)'
  - 'Культурний гачок: Мольфари Карпат (Михайло Нечай) та літературний контекст ''Тіней
    забутих предків'' М. Коцюбинського'
  - 'Вербальна магія: структура замовляння як магічного тексту — аналіз формул ''Хай/Нехай''
    (3rd person) проти прямого наказового способу ''Іди геть'''
  - 'Ритуали очищення та захисту: обливання, окурювання, примовляння; соціальний статус
    цілителя в громаді'
- section: 'Народна фармакопея: Трави та символіка (Folk Pharmacopeia: Herbs and Symbolism)'
  words: 1000
  points:
  - 'Цілюще зілля: звіробій, ромашка, материнка, чебрець — магічні та лікувальні властивості'
  - 'Символізм рослин: полин як оберіг від наврочення, калина як символ вічного життя
    та крові'
  - 'Календар збору: магічна сила Івана Купала та дня святого Симона Зілота; легенда
    про цвіт папороті'
  - 'Протиставлення: народна медицина vs. доказова медицина (evidence-based medicine);
    етика та безпека'
- section: 'Практичний аналіз: Мова та помилки (Practical Analysis: Language and Errors)'
  words: 800
  points:
  - 'Корекція типових помилок: ''Лікуватися від чогось'' (напр. від застуди) та орудний
    відмінок засобу ''Вона лікує травами'''
  - 'Робота з текстом замовляння: виділення архаїзмів, метафор та ритмічної структури
    ''зцілення словом'''
  - 'Лексичні дріль: розрізнення понять ''відвар'', ''настоянка'' та ''цілюще зілля''
    в контексті приготування ліків'
  - 'Запобігання суржику: використання питомої термінології замість запозичень з російської
    (напр. знахарка замість ''гадалка'')'
- section: 'Дискусія та Підсумок: Знахарство сьогодні (Discussion and Summary: Healing
    Today)'
  words: 700
  points:
  - 'Етичні аспекти: межа між психотерапевтичною роллю традиції та небезпекою псевдонауки'
  - 'Еволюція знахарства в сучасній Україні: від сільської хати до міських центрів
    нетрадиційної медицини'
  - 'Написання есе: ''Народна медицина — архаїзм чи втрачена мудрість?'' з використанням
    модальних маркерів (імовірно, водночас)'
  - 'Зв''язок із майбутніми модулями: перехід до теми забобонів (C1-058) та лісової
    міфології Лесі Українки (C1-080)'
focus: vocabulary
pedagogy: Immersion & Analysis
objectives:
- Learner understands the social role of healers (знахарі) in traditional Ukrainian
  society
- Learner can identify common medicinal plants and their symbolic meanings
- Learner can analyze the structure of healing incantations (замовляння)
grammar:
- Medical and herbal terminology
- Descriptive and instructive registers
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Травник
word_target: 4000
vocabulary_hints:
  required:
  - знахар / знахарка (healer) — звертатися до знахаря, потомствена знахарка; high
    frequency in folk context
  - замовляння (incantation/spell) — шепотіти замовляння, текст замовляння; key genre
    of verbal magic
  - зілля (herbs/potion) — цілюще зілля, варити зілля, приворотне зілля; often used
    in poetic/folk registers
  - відвар (decoction/tea) — відвар ромашки, пити відвар; specific method of preparation
  - наврочити (to hex/jinx) — щоб не наврочити, наврочили дитині; key term for folk
    etiology of illness
  - цілитель (healer/practitioner) — народний цілитель, духовний цілитель; more formal
    than 'знахар'
  recommended:
  - мольфар (Carpathian shaman) — мольфар Нечай; specific cultural term for Hutsul
    healers
  - доказова медицина (evidence-based medicine) — принципи доказової медицини; modern
    counterpoint
  - чебрець (thyme) — запашний чебрець; one of the 'holy' herbs
  - материнка (oregano/marjoram) — лікувальна материнка; common in folk medicine
  - костоправ (bone-setter) — досвідчений костоправ; folk orthopedic specialist
  - повитуха (midwife) — баба-повитуха; traditional birth assistant
