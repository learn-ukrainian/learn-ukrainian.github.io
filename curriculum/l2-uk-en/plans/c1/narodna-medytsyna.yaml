module: c1-083
level: C1
sequence: 83
slug: narodna-medytsyna
version: '1.1'
title: "Українська народна медицина: традиції фітотерапії та магії"
subtitle: "Народна медицина: традиції фітотерапії"
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
  - "Систематизувати знання про розвиток народних методів лікування в Україні: від
    монастирських лікарень до знахарства."
  - "Вивчити основні лікарські рослини української флори та їхню роль у традиційному
    оздоровленні."
  - "Дослідити психосоматичні та магічні аспекти народного цілительства (замовляння,
    обрядові дії)."
  - "Опанувати лексику для опису стану здоров'я, лікувальних властивостей та народних
    рецептур."

reading_situations:
  - source_type: "науково-популярна стаття"
    topic: "Золотий фонд української фітотерапії: звіробій, полин та материнка в етномедицині."
    key_elements: ["цілющі властивості", "відвар", "настоянка", "протипоказання"]
    motivation: "Вивчення біологічної та медичної термінології в контексті традиції."
  - source_type: "історичний нарис"
    topic: "Києво-Печерська лавра як осередок середньовічної медицини на Русі."
    key_elements: ["ченці-лічці", "травники", "шпиталі", "агапіт печерський"]
    motivation: "Аналіз історичного розвитку медичної справи в Україні."

listening_situations:
  - media_type: "подкаст"
    setting: "Інтерв'ю з сучасним етноботаніком про збереження знань про лікарські
      трави в Карпатах."
    focus_points: ["час збору трав", "традиційні суміші", "екологія та автентичність"]
    motivation: "Розвиток вміння виокремлювати практичні поради з наукового дискурсу."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть відгук на статтю про доцільність використання методів народної
      медицини поруч із доказовою. Аргументуйте переваги та ризики."
    requirements: ["мінімум 250 слів", "використання професійної лексики", "структурованість
          викладу"]
    motivation: "Вміння критично оцінювати дискусійні питання на перетині традиції
      та науки."
    model_answer: "Текст повинен демонструвати зважений підхід: визнання ролі фітотерапії
      як допоміжного засобу та критику небезпечних шарлатанських методів."

content_outline:
  - section: "Витоки українського цілительства"
    words: 1000
    subsections:
      - "Магічна медицина давніх слов'ян: культ води, вогню та землі"
      - "Лікарська справа княжої доби: перші писемні травники та монастирські шпиталі"
      - "Козацька медицина: методи польової хірургії та засоби реабілітації"
    key_concepts:
      - "цілительство"
      - "знахарство"
      - "лічці"
  - section: "Трави-обереги та ліки"
    words: 1000
    subsections:
      - "Символічне та практичне значення рослин: калина, барвінок, полин, чебрець"
      - "Календар збирача: святкування Івана Купала як кульмінація заготівлі зілля"
      - "Способи приготування ліків у народному побуті: напари, купелі, мазі"
    key_concepts:
      - "фітотерапія"
      - "зілля"
      - "антисептик"
  - section: "Слово як ліки: психологія замовлянь"
    words: 1000
    subsections:
      - "Структура та поетика народних замовлянь: ритм, метафора, воля"
      - "Ефект плацебо та народна психотерапія: викачування яйця, зливання переляку"
      - "Етика народного цілителя: передача знань та моральний кодекс"
    key_concepts:
      - "замовляння"
      - "сугестія"
      - "психосоматика"
  - section: "Народна медицина в сучасному світі"
    words: 1000
    subsections:
      - "Інтегративна медицина: де закінчується традиція і починається наука"
      - "Популярність етно-спа та народних оздоровчих практик сьогодні"
      - "Збереження біокультурного різноманіття та охорона рідкісних лікарських рослин"
    key_concepts:
      - "інтеграція"
      - "біоетика"
      - "оздоровлення"

vocabulary:
  required:
    - цілитель
    - фітотерапія
    - зілля
    - відвар
    - настоянка
    - замовляння
    - симптом
    - цілющий
  recommended:
    - психосоматика
    - антисептик
    - сугестія
    - травник
    - регенерація

activities:
  types_required:
    - critical-analysis
    - match-up
    - error-correction
    - translate
    - cloze
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте науково-популярну статтю про фітотерапію. Визначте лексику,
      що описує лікувальні властивості рослин, та згрупуйте її за тематикою."
  - type: critical-analysis
    focus: "Проаналізуйте текст про народне цілительство. Визначте, які твердження
      ґрунтуються на наукових даних, а які — на народних повір'ях."
  - type: match-up
    focus: "Зіставте назви лікарських рослин (звіробій, полин, материнка, чебрець)
      з описами їхніх цілющих властивостей українською."
  - type: error-correction
    focus: "Знайдіть у тексті про народну медицину русизми та стилістичні невідповідності
      (наприклад, калька 'приймати ліки' замість 'вживати ліки')."
  - type: fill-in
    focus: "Доповніть текст про способи приготування народних ліків відповідними термінами
      (відвар, настоянка, мазь, купіль, напар)."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Традиції та культурна спадщина'"
  - "Караман, 10 клас (2018), §38 — Стилістично забарвлена лексика"
  - "Борисенко В. Етнографія українців — народна медицина та знахарство (загальна
    довідка)"

connects_to:
  previous: "narodna-mifolohiia"
  next: "kozatski-lehendy"
