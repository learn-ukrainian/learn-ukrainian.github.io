module: c1-075
level: C1
sequence: 75
slug: stylistic-syntax-figures
version: '1.0'
title: "Стилістичний синтаксис: риторичні фігури"
subtitle: "Риторичні фігури: період, антитеза, хіазм, асиндетон, полісиндетон"
focus: integration
pedagogy: TTT
word_target: 4000
objectives:
  - "Систематизувати основні синтаксичні стилістичні фігури: період, антитеза,
    хіазм, анафора, епіфора."
  - "Опанувати безсполучниковість (асиндетон) та багатосполучниковість (полісиндетон)
    як засоби ритмічної організації тексту."
  - "Навчитися аналізувати та використовувати інверсію, паралелізм та градацію
    в публіцистичних і художніх текстах."
  - "Розвинути навички риторичного конструювання: побудова переконливого періоду."

reading_situations:
  - source_type: "ораторський текст"
    topic: "Промови Івана Франка та Лесі Українки: аналіз риторичних фігур."
    key_elements: ["період", "градація", "антитеза", "анафора"]
    motivation: "Вивчення класичних зразків української риторики."
  - source_type: "публіцистичний текст"
    topic: "Синтаксичні фігури в сучасній українській публіцистиці: колонки та есе."
    key_elements: ["асиндетон", "полісиндетон", "паралелізм", "хіазм"]
    motivation: "Аналіз стилістичного синтаксису в сучасних медіатекстах."

listening_situations:
  - media_type: "промова"
    setting: "Фрагмент публічної промови: аналіз риторичних фігур у живому мовленні."
    focus_points: ["інтонаційне оформлення періоду", "паузи між частинами антитези",
      "ритмічний ефект полісиндетону"]
    motivation: "Сприйняття синтаксичних фігур як акустичних явищ."

writing_tasks:
  - task_type: "риторичне завдання"
    prompt: "Напишіть короткий промовний текст (250-300 слів) на тему 'Мова — це
      більше, ніж слова', використовуючи щонайменше 5 різних синтаксичних фігур."
    requirements: ["наявність періоду з протасисом та аподосисом", "антитеза або хіазм",
      "анафора або епіфора", "асиндетон або полісиндетон", "маркування кожної фігури
      в дужках"]
    motivation: "Практика побудови риторично виразного тексту."
    model_answer: "Текст має бути ритмічно організований, з чіткою кульмінацією
      в періоді та емоційним наростанням через градацію."

discussion_topics:
  - context: "Риторичні фігури — мистецтво переконання чи маніпуляція?"
    questions:
      - "Як антитеза та хіазм створюють ілюзію логічності навіть за відсутності
        аргументів?"
      - "Чому полісиндетон уповільнює текст, а асиндетон — прискорює?"
    motivation: "Критичний аналіз впливу синтаксичних фігур на реципієнта."

content_outline:
  - section: "Період: архітектоніка складного висловлення"
    words: 1000
    subsections:
      - "Структура періоду: протасис (наростання) та аподосис (спадання)"
      - "Типи періодів: умовний, причиновий, зіставний, часовий"
      - "Період у промовах, есе та академічному письмі"
    key_concepts:
      - "період"
      - "протасис"
      - "аподосис"
  - section: "Антитеза та хіазм"
    words: 1000
    subsections:
      - "Антитеза як зіставлення протилежностей: 'Не вмирай, а борись!'"
      - "Хіазм як дзеркальне розташування елементів: 'Народ для мови, мова для народу'"
      - "Оксиморон як крайня форма антитези: 'гірка радість', 'жива смерть'"
    key_concepts:
      - "антитеза"
      - "хіазм"
      - "оксиморон"
  - section: "Повтор і ритм: анафора, епіфора, паралелізм"
    words: 1000
    subsections:
      - "Анафора: повтор на початку синтаксичних одиниць"
      - "Епіфора: повтор у кінці; симплока: комбінація анафори та епіфори"
      - "Синтаксичний паралелізм та градація як засоби наростання"
    key_concepts:
      - "анафора"
      - "епіфора"
      - "градація"
  - section: "Асиндетон, полісиндетон та еліпсис"
    words: 1000
    subsections:
      - "Асиндетон (безсполучниковість): динаміка, лаконізм, драматизм"
      - "Полісиндетон (багатосполучниковість): сповільнення, урочистість, перелік"
      - "Еліпсис та замовчування: незавершеність як стилістичний прийом"
    key_concepts:
      - "асиндетон"
      - "полісиндетон"
      - "еліпсис"

vocabulary:
  required:
    - антитеза
    - хіазм
    - асиндетон
    - полісиндетон
    - анафора
    - епіфора
    - період
    - паралелізм
  recommended:
    - градація
    - оксиморон
    - еліпсис
    - риторичний
    - інверсія

activity_hints:
  - type: select
    description: "Identify the syntactic figure in each excerpt: period, antithesis,
      chiasmus, anaphora, epiphora, asyndeton, or polysyndeton."
  - type: match-up
    description: "Match definitions of syntactic figures with examples from Ukrainian
      literature and public speeches."
  - type: critical-analysis
    description: "Analyze a speech by Іван Франко — identify all syntactic figures,
      explain their persuasive function, and evaluate their effectiveness."
  - type: unjumble
    description: "Reorder sentence elements to create specific syntactic figures:
      chiasmus from parallel structure, antithesis from neutral statements."
  - type: essay-response
    description: "Write a short rhetorical text (150-200 words) using at least 4
      different syntactic figures, marking each one."

activities:
  types_required:
    - select
    - match-up
    - critical-analysis
    - unjumble
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §38-42 — Стилістичні фігури та тропи"
  - "Глазова, 11 клас (2019): §45 — Стилістичне забарвлення синтаксичних одиниць"
  - "Авраменко, 11 клас (2019): Стилістична норма — синтаксичні засоби"
  - "State Standard 2024: §4.4.4 — Стилістичний синтаксис: фігури"

connects_to:
  previous: "syntaksychni-stylistychni-zasoby"
  next: "frazeolohichni-stylistychni-zasoby"
