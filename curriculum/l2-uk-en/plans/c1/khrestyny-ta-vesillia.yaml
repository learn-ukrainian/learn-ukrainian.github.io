title: Хрестини та весілля
subtitle: Birth and Marriage Rituals
content_outline:
- section: Розминка — Перехідні обряди
  words: 933
  points:
  - Обряди переходу (народження, весілля) в житті
  - Соціальна та сакральна функція ритуалів
  - Синкретизм народних та церковних традицій
- section: Родильні обряди та хрестини
  words: 1333
  points:
  - Очікування дитини (заборони, прикмети)
  - Повивальна бабка та її роль
  - 'Хрестини: куми, подарунки, каша'
  - Охоронна магія для немовляти
- section: Весільні обряди
  words: 1067
  points:
  - 'Сватання: старости, рушники, гарбуз'
  - 'Заручини: обручки, благословення'
  - 'Весілля: коровай, вінок, посад, розплітання коси'
  - 'Ритуальні предмети: рушник, хліб, весільне дерево'
- section: Практика — аналіз обрядів
  words: 667
  points:
  - Описати етапи традиційного весілля
  - Пояснити символіку весільного коровая
  - Порівняти українське та європейське весілля
  - Написати есе про трансформацію весільних традицій
