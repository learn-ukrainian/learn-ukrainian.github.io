activity_hints:
- type: reading
  focus: 'Прочитайте текст про поява нової душі: родини та хрестини і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про підготовка до шлюбу: від запитів до заручин, використовуючи нову лексику
    модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Поява нової душі: родини та хрестини». Обґрунтуйте свою позицію
    прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему поява нової душі: родини та хрестини.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до поява нової душі: родини та хрестини: Магія народження: обряди оберігання матері та
    немовляти. Визначте спільне та відмінне.'
