title: Хрестини та весілля
subtitle: Birth and Marriage Rituals
content_outline:
- section: Вступ — Антропологія перехідних обрядів (Introduction — Anthropology of Rites of Passage)
  words: 600
  points:
  - Обряди переходу (rites de passage) як засіб соціальної та сакральної зміни статусу індивіда в громаді.
  - 'Феномен синкретизму (двовір''я): поєднання церковних таїнств з дохристиянською охоронною магією (червона нитка, вузли,
    залізо) для захисту немовляти та наречених.'
  - Соціальна функція ритуалів у контексті збереження ідентичності та тяглості роду (згідно з вимогами Держстандарту §3.21).
- section: Родильні обряди та таїнство хрещення (Birth Rituals and the Sacrament of Baptism)
  words: 800
  points:
  - 'Народна етика та охоронний аспект: очікування дитини, заборони та прикмети для вагітної як спосіб регуляції поведінки
    громади.'
  - Повивальна бабка як сакральна фігура; ритуал 'бабиної каші' та розбивання горщика як магія майбутнього добробуту та родючості.
  - 'Хрестини та інститут кумівства: термінологічне розрізнення ''хрещених батьків'' (для дитини) та ''кумів'' (для біологічних
    батьків).'
  - 'Символіка білої крижми: ритуальне використання під час хрещення та подальше зберігання полотна як особистого оберега
    на все життя.'
- section: Весілля — Від сватання до заручин (Wedding — From Matchmaking to Betrothal)
  words: 850
  points:
  - 'Сватання: ролі старостів та сватові; культурна ідіома ''отримати гарбуза'' як символ публічної відмови у сватанні.'
  - Обряд перев'язування старостів рушниками та 'взяття хліба' як акт згоди та юридична фіксація шлюбного наміру.
  - 'Заручини (рукобиття): благословення батьків хлібом-сіллю та сакралізація майбутнього подружнього союзу перед громадою.'
  - 'Лексичний фокус: наголос на агентності учасників обряду через активний стан (''коровайниці печуть'', а не ''печеться
    коровай'') для підкреслення ритуальної дії.'
- section: Вінчання та весільне гуляння (Wedding Sacrament and Celebration)
  words: 950
  points:
  - 'Вінчання vs Весілля: розрізнення церковного таїнства шлюбу (вінчання) та всього комплексу народних святкувань і обрядів
    (весілля).'
  - 'Весільний коровай: обряд випікання коровайницями, символіка оздоблення (гільце, пташки) та ритуал розподілу як ''ділення
    долі''.'
  - 'Ритуал ''ставання на рушник'': семантика весільної вишивки та сакральне значення рушника як символічного фундаменту нової
    сім''ї.'
  - 'Кульмінаційні моменти: розплітання коси та покривання голови хусткою/наміткою як остаточна зміна соціального статусу
    жінки з дівчини на молодицю.'
- section: Практика — Аналіз та трансформація традицій (Practice — Analysis and Transformation of Traditions)
  words: 800
  points:
  - 'Аналітична вправа: порівняння функціональної та магічної ролі українського короваю та західноєвропейського весільного
    торта.'
  - 'Корекція типових помилок: розмежування термінів ''хрещений'' та ''кум''; правильне вживання релігійного та соціального
    регістрів.'
  - Аналіз символіки ритуальних предметів (весільне дерево, хліб, рушник) та їхнє місце в сучасному українському весільному
    ритуалі.
  - 'Творче завдання: написання есе-роздуму про трансформацію та життєздатність народних традицій у сучасному урбанізованому
    та глобалізованому світі.'
focus: culture
pedagogy: Immersion & Analysis
objectives:
- Learner can describe the stages of traditional Ukrainian wedding and christening rituals
- Learner can explain the social and legal functions of folk rituals in the past
- Learner can analyze the symbolism of ritual objects like the korovay and rushnyk
grammar:
- Life-cycle ritual terminology
- Ceremonial and social registers
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Весільний староста
word_target: 4000
vocabulary_hints:
  required:
  - Коровай (Wedding bread) — пекти коровай, ділити коровай, благословляти короваєм; сакральний символ долі та родючості
  - Рушник (Ritual towel) — стати на рушник (одружитися), вишивати рушник; ключовий оберіг та символ юридичного переходу
  - Старости (Matchmakers/Witnesses) — засилати старостів, перев'язувати старостів рушниками; офіційні представники сторін
    у обряді сватання
  - Куми (Godparents in relation to parents) — брати за кумів; термін для позначення духовного споріднення між біологічними
    та хрещеними батьками
  - Крижма (Christening cloth) — біла крижма; нове біле полотно для хрещення, символ чистоти та нового статусу немовляти
  - Вінчання (Church wedding) — таїнство вінчання, церковний шлюб; специфічний релігійний термін, на відміну від світського
    'весілля'
  - Гарбуз (Pumpkin) — піднести гарбуза, отримати гарбуза; культурна ідіома для позначення відмови у сватанні
  recommended:
  - Двовір'я (Syncretism) — релігійне двовір'я; поєднання християнських традицій із дохристиянською магією та віруваннями
  - Бабина каша (Midwife's porridge) — обрядова страва на хрестинах; символ родючості, здоров'я та майбутнього успіху дитини
  - Розплітання коси (Unbraiding the hair) — драматичний весільний обряд переходу дівчини у статус заміжньої жінки
  - Благословення (Blessing) — батьківське благословення хлібом; сакральний дозвіл на створення сім'ї або початок нового життєвого
    етапу
  - Повивальна бабка (Midwife) — сакральна постать у родильних обрядах, що відповідала за фізичне та духовне здоров'я немовляти
