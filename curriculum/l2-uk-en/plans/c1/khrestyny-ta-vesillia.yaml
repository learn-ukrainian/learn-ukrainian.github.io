module: c1-105
level: C1
sequence: 105
slug: khrestyny-ta-vesillia
version: 1.1.1
title: 'Сімейна обрядовість: родини, хрестини та весілля'
subtitle: 'Родинна обрядовість: народження, хрестини, весілля'
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
- Систематизувати знання про етапи традиційного українського весілля (сватання, заручини, весільний поїзд, обряд короваю).
- Дослідити магічно-обрядову сторону народження дитини та хрестин (очищення, вибір кумів, роль баби-повитухи).
- 'Проаналізувати символіку обрядових предметів: рушник, коровай, вінкоплетіння, гільце.'
- Вивчити весільний фольклор (пісні, приповідки) та його роль у структуруванні обрядового дійства.
reading_situations:
- source_type: етнографічний орис
  topic: 'Символіка короваю в українському весіллі: від замішування тіста до розподілу громаді.'
  key_elements:
  - коровай
  - гільце
  - благословення
  - ритуальний хліб
  motivation: Вивчення описового тексту з глибоким символічним змістом.
- source_type: художній твір
  topic: 'Опис весілля у творі Івана Нечуя-Левицького ''Кайдашева сім''я'': традиція та конфлікт.'
  key_elements:
  - сватання
  - заручини
  - хустка
  - посад
  motivation: Аналіз реалістичного зображення обрядів у класичній літературі.
listening_situations:
- media_type: аудіо
  setting: Інтерв'ю з фольклористом про інститут кумівства в Україні та його соціальну функцію.
  focus_points:
  - духовне споріднення
  - вибір кумів
  - обрядові подарунки
  motivation: Сприйняття на слух культурологічного аналізу родинних стосунків.
writing_tasks:
- task_type: есе
  prompt: Проаналізуйте трансформацію весільних традицій у сучасному українському місті. Що зберігається, а що безповоротно
    втрачається?
  requirements:
  - мінімум 300 слів
  - використання прикладів сучасних весіль
  - 'вживання термінів: автентика, стилізація, глобалізація'
  motivation: Вміння аналізувати соціокультурні зміни через призму народної традиції.
  model_answer: Текст має висвітлювати як повернення до етно-елементів (вишиванки, рушники), так і вплив західних стандартів,
    роблячи висновок про стійкість національного коду.
content_outline:
- section: 'Поява нової душі: родини та хрестини'
  words: 1000
  subsections:
  - 'Магія народження: обряди оберігання матері та немовляти'
  - Хрестини як акт залучення до громади та церкви
  - 'Інститут кумівства: права, обов''язки та духовний зв''язок'
  key_concepts:
  - родини
  - хрестини
  - кумівство
- section: 'Підготовка до шлюбу: від запитів до заручин'
  words: 1000
  subsections:
  - 'Сватання: дипломатія, гарбузи та рушники'
  - Оглядини та заручини як юридичне підтвердження угоди
  - 'Дівич-вечір та прощання з дівоцтвом: вінкоплетіння та прощальні пісні'
  key_concepts:
  - сватання
  - заручини
  - рушник
- section: 'Весільна містерія: основні обряди'
  words: 1000
  subsections:
  - 'Весільний хліб: коровай, шишки та калачі — магія спільної їжі'
  - Весільний поїзд та подолання символічних перешкод (викуп)
  - Покривання голови молодої як перехід у статус заміжньої жінки
  key_concepts:
  - коровай
  - гільце
  - містерія
- section: Поетика та музика українського весілля
  words: 1000
  subsections:
  - 'Весільні пісні (ладовиці): жанрова специфіка та емоційний діапазон'
  - Приповідки, жарти та частушки як елемент народної сміхової культури
  - Регіональне розмаїття весільних мелодій та інструментального супроводу
  key_concepts:
  - ладовиці
  - фольклор
  - етномузикологія
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
