module: c1-073
level: C1
sequence: 73
slug: birth-rituals
version: '2.0'
title: Родинні обряди - народження
subtitle: Family Rituals - Birth and Christening
content_outline:
- section: 'Вступ: Народження як сакральний перехід (Introduction: Birth as a Sacred
    Transition)'
  words: 600
  points:
  - Народження як перший і найважливіший обряд переходу (rite of passage) у житті
    людини
  - 'Роль баби-повитухи як ''жриці'' та акушерки: ритуальне перерізання пуповини на
    сокирі (для хлопчика) або гребені (для дівчинки) для передачі відповідних якостей'
  - Поняття 'прилучення' дитини до роду та громади через систему магічних дій
- section: Охоронна магія та дохристиянські вірування (Protective Magic and Pre-Christian
    Beliefs)
  words: 800
  points:
  - 'Вагітність: система заборон, прикмет та оберегів (червона нитка, часник) для
    захисту матері та плоду від ''злого ока'''
  - Ритуальне 'ліплення' форми голови немовляти повитухою та символіка першого купання
  - 'Охорона дитини від нечистої сили в перші дні життя: роль оберегів у колисці'
- section: Хрестини та інститут духовного кумівства (Christening and the Institution
    of Spiritual Kinship)
  words: 900
  points:
  - 'Вибір кумів: чітке розрізнення між кровною спорідненістю (дідусь, бабуся) та
    духовною (кум, кума, хрещені батьки)'
  - 'Символіка крижми: магічна сила нової білої тканини та її використання як засобу
    лікування дитини в майбутньому'
  - 'Церковне хрещення: вибір імені за святцями та значення хрестика як особистого
    оберега'
  - 'Граматичний нюанс: розрізнення дієслівного виду — ''хрестити'' (факт/процес)
    та ''охрестити'' (результат дії)'
- section: 'Кульмінація свята — Бабина каша (The Climax of the Feast: Babina Kasha)'
  words: 900
  points:
  - 'Ритуал ''Бабиної каші'': приготування ритуальної страви повитухою як символ плодючості'
  - Обряд розбиття горщика з кашею на щастя та 'викуп' каші гостями (найвища ціна
    від кума)
  - 'Соціальна функція застілля: зміцнення зв''язків між родиною та громадою через
    спільну трапезу'
- section: 'Практика: Побажання та обрядова лінгвістика (Practice: Wishes and Ritual
    Linguistics)'
  words: 800
  points:
  - 'Вживання кличного відмінка (Vocative) у хрестинних тостах та зверненнях (наприклад:
    ''Дорогий Іване!'', ''Кумо Маріє!'')'
  - Формулювання віншувань та благословень з використанням наказового способу (рости,
    будь, май)
  - Порівняльний аналіз українських та європейських хрестинних традицій (моделі соціалізації)
  - Складання тексту традиційного побажання немовляті на основі етнографічних джерел
focus: cultural
pedagogy: CBI
objectives:
- Learner can describe the rituals surrounding birth and christening (khrestyny)
- Learner can explain the role of godparents (kumy) in Ukrainian culture
- Learner can discuss the symbolism of the cradle and protective amulets
- Learner can use vocabulary related to infancy and parenting
grammar:
- naming conventions
- wishes and blessings
phase: C1.5 Folk Culture & Arts
persona:
  voice: Senior Specialist
  role: Повитуха
word_target: 4000
vocabulary_hints:
  required:
  - Повитуха (midwife) — баба-повитуха, кликати повитуху; роль жриці в обряді
  - Крижма (christening cloth) — біла крижма, загорнути в крижму; магічний оберіг
  - Куми (godparents) — брати за кумів, йти в куми; духовна спорідненість (non-blood)
  - Бабина каша (ritual porridge) — розбити горщик з кашею, викуповувати кашу; символ
    плодючості
  - Оберіг (amulet/talisman) — оберіг від злого ока, червона нитка; захисна функція
  - Прилучення (initiation/integration) — обряд прилучення до роду; соціалізація немовляти
  recommended:
  - Хрещені батьки (godparents) — офіційний термін для кумів
  - Віншування (congratulation/blessing) — традиційні побажання на хрестини
  - Кличний відмінок (Vocative case) — необхідний для церемоніальних звернень
  - Охрестити (to christen/baptize) — доконаний вид (perfective), результат обряду
