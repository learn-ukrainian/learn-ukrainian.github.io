slug: shevchenko-poeziia
version: '2.0'
title: 'Шевченко: Поезія та її форми'
content_outline:
- section: 'Вступ: Поетичний універсум Кобзаря (Introduction: The Poetic Universe
    of the Kobzar)'
  words: 600
  points:
  - 'Жанрова система Шевченка: розрізнення балади, думи та лірики згідно з літературознавчою
    термінологією рівня C1.'
  - 'Попередження типової помилки: нерозрізнення жанрів (думи vs балади) — аналіз
    структурних відмінностей та епічного розмаху.'
  - 'Шевченко і народна пісенна традиція: трансформація фольклорних мотивів у високу
    літературу.'
- section: Жіноча доля та концепція ідилії (Female Fate and the Concept of Idyll)
  words: 900
  points:
  - 'Трагічний образ жінки в поемах «Катерина» та «Наймичка»: порівняльний аналіз
    через призму кріпацтва та соціальних реалій XIX ст.'
  - 'Попередження помилки: ігнорування історичного контексту — пояснення реалій кріпацтва
    для розуміння глибини трагедії героїнь.'
  - '«Садок вишневий коло хати»: аналіз жанру ідилії та створення ідеалізованого образу
    України (§4.4.3).'
- section: Політична лірика та пророчий голос (Political Lyrics and the Prophetic
    Voice)
  words: 900
  points:
  - 'Аналіз творів «Кавказ», «І мертвим, і живим...»: викриття імперської політики
    та національне пророцтво.'
  - 'Деколонізаційний підхід: відмова від радянського штампу «революціонер-демократ»,
    акцент на екзистенційному та національному вимірах постаті Пророка.'
  - '«Заповіт» як духовний гімн: історія написання (Переяслав, 1845), світове значення
    (переклади 150 мовами) та культурний вплив.'
- section: 'Історичний епос: Колективна пам''ять (Historical Epic: Collective Memory)'
  words: 800
  points:
  - 'Поема «Гайдамаки»: інтерпретація подій Коліївщини та формування національного
    міфу.'
  - Висвітлення української агентності (agency) у боротьбі за свободу та осмислення
    трагізму історичного протистояння.
  - 'Стилістичні засоби лексики (§4.4.3): роль символів та епітетів у створенні героїчного
    та емоційного фону епосу.'
- section: Стилістичний аналіз та сучасна рецепція (Stylistic Analysis and Modern
    Reception)
  words: 800
  points:
  - 'Фонетика та милозвучність (§4.4.2): аналіз ритміки, алітерації та асонансу на
    прикладі «Заповіту».'
  - 'Попередження помилки: перехід від поверхневого переказу сюжету до глибокого аналізу
    художніх засобів (метафор, синекдох).'
  - 'Шевченко в сучасному медіапросторі: аналіз рок- та реп-інтерпретацій (гурти «Кому
    Вниз», «Скрябін», проєкт «Апокриф»).'
focus: literature
pedagogy: CBI
objectives:
- Learner can analyze various poetic genres used by Shevchenko.
- Learner understands the political and social significance of Shevchenko''s major
  poems.
- Learner masters literary terms for verse analysis.
grammar:
- Poetic syntax and archaisms
- Analysis of metaphor and allegory
phase: C1.6 Literature
persona:
  voice: Senior Specialist
  role: Шевченкознавець
word_target: 4000
vocabulary_hints:
  required:
  - Заповіт (Will/Testament) — написати заповіт, виконувати заповіт, духовний заповіт;
    ключове поняття культурного коду
  - Кобзар (Kobzar/Bard) — Великий Кобзар, слово Кобзаря, читати Кобзаря; символ національного
    відродження
  - Пророк (Prophet) — національний пророк, слова пророка, місія пророка; високий
    стиль, месіанська роль поета
  recommended:
  - Дума (Duma/Epic thought) — козацька дума, співати думи, епічна дума; специфічний
    український ліро-епічний жанр
  - Балада (Ballad) — романтична балада, сюжет балади, фольклорна балада; літературний
    термін C1
  - Ідилія (Idyll) — сільська ідилія, порушена ідилія, жанр ідилії; термін для аналізу
    пейзажної та філософської лірики
  - Алітерація (Alliteration) — майстерна алітерація, ефект алітерації; термін для
    фонетичного аналізу за стандартом §4.4.2
