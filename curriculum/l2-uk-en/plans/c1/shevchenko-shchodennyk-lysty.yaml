title: 'Шевченко: Щоденник та листи'
subtitle: 'Shevchenko: Diary and Letters'
content_outline:
- section: 'Вступ: Інтимний Шевченко (Introduction: Intimate Shevchenko)'
  words: 500
  points:
  - 'Вступ до епістолярного стилю згідно з Державним стандартом (§4.4.1.1): вивчення
    приватних записів як джерела біографічних інсайтів та стилістичного багатства.'
  - 'Психологічний портрет поета поза канонічним образом: щоденник як терапія та спосіб
    збереження ідентичності під час десятирічного заслання.'
- section: 'Щоденник: Мовний парадокс та внутрішня свобода (Diary: Language Paradox
    and Inner Freedom)'
  words: 1000
  points:
  - 'Аналіз мовного феномену: чому Шевченко писав свій «Журнал» (щоденник) російською
    мовою (соціолінгвістичний тиск імперії, звичка середовища та орієнтація на інтелігенцію).'
  - 'Корекція типової помилки: розрізнення значень термінів «щоденник» та «журнал»
    (у значенні щоденних записів Шевченка, а не періодичного видання).'
  - Описи солдатської муштри та побуту в укріпленні Новопетровському як приклад «живої»
    мови XIX століття з елементами архаїзмів, що додають колориту.
- section: 'Епістолярна спадщина: Коди братерства (Epistolary Heritage: Brotherhood
    Codes)'
  words: 1000
  points:
  - 'Аналіз листів до Кирило-Мефодіївців (Костомарова, Куліша): використання специфічних
    звертань та «внутрішнього коду» як свідчення емоційної близькості.'
  - 'Перемикання кодів (code-switching): дослідження випадків переходу з української
    на російську в межах одного листа залежно від теми (побут vs творчість) та адресата.'
  - Обговорення повісті «Художник» як автобіографічного твору, що розкриває внутрішній
    світ митця в умовах несвободи.
- section: 'Аналіз стилю: Офіційне vs Приватне (Style Analysis: Official vs Private)'
  words: 800
  points:
  - 'Диференціація епістолярних регістрів: робота над помилкою змішування офіційних
    формул (листи до чиновників про звільнення) та дружньої інтимної лексики.'
  - 'Практика датування листів: вивчення традиційної форми «року 1857-го» замість
    сучасного або калькованого написання дати («в 1857 році»).'
  - 'Вплив цензури: як «цензурні заборони» та намагання «обійти цензуру» формували
    специфічну мову приватної кореспонденції та щоденника.'
- section: 'Практика та Підсумок: Створення тексту (Practice and Summary: Text Creation)'
  words: 700
  points:
  - Написання есе про внутрішнє життя Шевченка, інтегруючи поняття «туга за батьківщиною»
    та психологічний аналіз щоденникових записів.
  - 'Продуктивне завдання: написання стилізованого листа до однодумця, дотримуючись
    епістолярних норм XIX століття та відповідного реєстру.'
