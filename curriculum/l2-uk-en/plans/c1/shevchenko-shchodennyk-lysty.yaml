vocabulary_hints:
  required:
  - заслання (exile) — перебувати на засланні, десятирічне заслання, повернутися із
    заслання; ключовий історичний контекст життя поета.
  - муштра (drill) — солдатська муштра, виснажлива муштра, тікати від муштри; опис
    військового побуту та тиску в армії.
  - щоденник (diary) — вести щоденник, інтимний щоденник, записи в щоденнику; зверніть
    увагу на авторську назву «Журнал».
  - епістолярний (epistolary) — епістолярний стиль, епістолярна спадщина, епістолярний
    жанр; академічний термін згідно з §4.4.1.1.
  - цензура (censorship) — жорстка цензура, обійти цензуру, цензурні заборони; критичний
    аспект для розуміння обмежень заслання.
  - туга (longing/sorrow) — туга за батьківщиною, невимовна туга, розвіяти тугу; домінантна
    емоція приватних текстів Шевченка.
  recommended:
  - перемикання кодів (code-switching) — зміна мови залежно від контексту спілкування.
  - внутрішній код (internal code) — мовні знаки, зрозумілі лише вузькому колу осіб
    (братчикам).
  - архаїзм (archaism) — застаріле слово, що використовується для передачі духу епохи.
