module: c1-103
level: C1
sequence: 103
slug: obrazotvorche-mystetstvo-1
version: '1.2'
title: "Образотворче мистецтво І: Від академізму до імпресіонізму"
subtitle: "Образотворче мистецтво I: від академізму до імпресіонізму"
focus: culture
pedagogy: seminar
word_target: 4000
objectives:
  - "Проаналізувати еволюцію українського малярства XIX — початку XX століть."
  - "Дослідити художню спадщину Тараса Шевченка та його роль у становленні національної
    школи."
  - "Вивчити особливості українського реалізму та побутового жанру (Пимоненко, Труш)."
  - "Ознайомитися з впливом європейського модерну та імпресіонізму на українське мистецтво
    (Мурашко, Кричевський)."

reading_situations:
  - source_type: "мистецтвознавчий аналіз"
    topic: "Світло і колір у творчості Олександра Мурашка: європейський контекст та
      національний колорит."
    key_elements: ["імпресіонізм", "пленер", "психологізм портрета", "Сецесія", "світлотінь"]
    motivation: "Робота з професійною термінологією в описі живопису."
  - source_type: "архівний документ (уривок)"
    topic: "Статут Товариства південноросійських художників: організаційні засади
      та художні цілі."
    key_elements: ["художнє об'єднання", "виставкова діяльність", "академізм", "реалізм",
      "меценатство"]
    motivation: "Вивчення інституційної історії українського мистецтва."

listening_situations:
  - media_type: "відео-екскурсія"
    setting: "Віртуальна прогулянка залами Національного художнього музею України
      (NAMU) з акцентом на шедеврах XIX століття."
    focus_points: ["композиція", "сюжет", "техніка виконання", "історичний контекст
          створення"]
    motivation: "Розвиток візуальної грамотності та навичок опису мистецьких об'єктів."

writing_tasks:
  - task_type: "есе"
    prompt: "Порівняйте підходи до відображення народного життя в роботах Миколи Пимоненка
      та Костянтина Трутовського. Як мистецтво XIX століття формувало візуальний образ
      України?"
    requirements: ["мінімум 400 слів", "використання термінів: жанровий живопис, колорит,
          етнографізм, перспектива, композиція", "критичний аналіз"]
    motivation: "Синтез культурологічних та мистецтвознавчих знань."
    model_answer: "Текст має демонструвати перехід від етнографічної описовості до
      глибокої психологічної та соціальної рефлексії. Автор повинен проаналізувати
      техніку Пимоненка (пленерність, світло) та її значення для розвитку українського
      реалізму, а також згадати роль художників у створенні 'іконічних' образів українського
      села."

discussion_topics:
  - context: "Багато творів українських художників XIX століття довгий час маркувалися
      як 'російське мистецтво' у світових музеях."
    questions:
      - "Які критерії визначають національну приналежність художника: місце народження,
        тематика творів чи самоідентифікація?"
      - "Як процес деколонізації змінює сприйняття класичної художньої спадщини України?"
    motivation: "Тренування навичок дискусії про ідентичність та культурну політику."

content_outline:
  - section: "Тарас Шевченко — художник"
    words: 1000
    subsections:
      - "Академічна освіта та ранні спроби: від класицизму до романтизму"
      - "Серія офортів 'Живописна Україна' як просвітницький проєкт"
      - "Психологізм портретів та майстерність акварелі"
    key_concepts: ["офорт", "академізм", "романтизм", "графіка"]
  - section: "Реалізм та жанрове малярство"
    words: 1000
    subsections:
      - "Микола Пимоненко: майстер побутового жанру та пленерного живопису"
      - "Костянтин Трутовський та Володимир Орловський: пейзаж як національний символ"
      - "Іван Труш: мандрівна естетика та 'поезія кольору'"
    key_concepts: ["реалізм", "пленер", "пейзаж", "жанровість"]
  - section: "Український модерн та імпресіонізм"
    words: 1000
    subsections:
      - "Олександр Мурашко: паризька школа та київські традиції"
      - "Федір Кричевський: монументалізм та декоративність ('Триптих: Життя')"
      - "Вплив Віденської сецесії на українську графіку та живопис"
    key_concepts: ["імпресіонізм", "сецесія", "модерн", "декоративність"]
  - section: "Художні інституції та меценатство"
    words: 1000
    subsections:
      - "Київська рисувальна школа Миколи Мурашка"
      - "Роль родин Терещенків та Ханенків у формуванні музейних колекцій"
      - "Виставковий рух та перші кроки художнього ринку"
    key_concepts: ["просвітництво", "меценатство", "музейна справа", "школа"]

vocabulary:
  required:
    - полотно
    - пензель
    - колорит
    - композиція
    - перспектива
    - офорт
    - акварель
    - натюрморт
    - пейзаж
    - портрет
  recommended:
    - пастель
    - графіка
    - штрих
    - світлотінь
    - фактура
    - мазок

activities:
  types_required:
    - critical-analysis
    - comparative-study
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте мистецтвознавчий аналіз творчості Мурашка. Визначте термінологію
      живопису та поясніть стилістичні прийоми."
  - type: critical-analysis
    focus: "Проаналізуйте текст про деколонізацію історії мистецтва. Визначте авторську
      позицію щодо національної атрибуції художників."
  - type: match-up
    focus: "Зіставте мистецькі терміни (офорт, акварель, пленер, колорит, перспектива,
      композиція) з їхніми визначеннями."
  - type: fill-in
    focus: "Доповніть текст про еволюцію українського живопису відповідними термінами
      (академізм, реалізм, імпресіонізм, сецесія, модерн)."
  - type: essay-response
    focus: "Порівняйте підходи до зображення народного життя в роботах Пимоненка та
      Трутовського. Використовуйте мистецтвознавчу лексику."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Мистецтво та культура'"
  - "Авраменко, 11 клас (Укр. літ.) — Шевченко-художник"
  - "Глазова, 11 клас (2019), §40 — Стилістичне забарвлення"

connects_to:
  previous: "vokalne-mystetstvo"
  next: "obrazotvorche-mystetstvo-2"
phase: C1.4 [Folk Culture & Fine Arts]
