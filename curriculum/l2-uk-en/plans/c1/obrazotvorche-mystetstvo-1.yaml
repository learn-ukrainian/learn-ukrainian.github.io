slug: obrazotvorche-mystetstvo-1
version: '2.0'
title: Образотворче мистецтво I
subtitle: Visual Arts I — From Icon to Avant-garde
content_outline:
- section: 'Вступ: Від витоків до канону (Introduction: From Origins to Canon)'
  words: 600
  points:
  - 'Голос Реставратора: Вступ до концепції нашарувань в українському мистецтві — від сакрального до радикального'
  - 'Культурний гачок: Алімпій Печерський (XI ст.) — легендарний чернець-іконописець та роль ангелів у сакральному процесі'
  - Визначення 'Київської школи' іконопису та її значення для християнського світу Східної Європи
- section: Сакральне мистецтво та іконописний канон (Sacred Art and Iconographic Canon)
  words: 800
  points:
  - 'Лінгвістична особливість: Розмежування понять ''писати ікону'' та ''малювати картину'' (етимологія від грецького grapho)'
  - 'Лексика для опису канону: чудотворна ікона, іконописний канон, зворотна перспектива, світлотіньове моделювання'
  - 'Володимир Боровиковський: Перехід від іконопису до світського портрета та збереження традиційного духовного колориту'
  - 'Аналіз засобів виразності: використання епітетів та метафор для опису святості в художньому стилі (Стандарт §4.4.3)'
- section: 'Шевченко-художник: Реалізм та національне пробудження (Shevchenko the Artist: Realism and National Awakening)'
  words: 900
  points:
  - 'Тарас Шевченко як Академік гравюри: Аналіз серії офортів ''Живописна Україна'' (1844) як зразка критичного реалізму'
  - 'Порівняльний аналіз: Як візуальний колорит картин Шевченка перегукується з його поетичною метафорикою (на прикладі пейзажів)'
  - 'Термінологія графіки: офорт, графіка, акварель, олійна картина (виправлення кальки ''картина маслами'')'
  - 'Роль мистецтва у національному відродженні XIX століття: від фіксації побуту до формування ідентичності'
- section: 'Український авангард: Світовий вимір (Ukrainian Avant-garde: Global Dimension)'
  words: 800
  points:
  - 'Київський авангард: Феномен Олександри Екстер та Олександра Богомазова — світовий внесок у кубофутуризм'
  - 'Олександр Архипенко: Революція у скульптурі та введення від''ємного простору (порожнечі) як художнього елемента'
  - 'Лексика арт-критики: динамічна композиція, врівноважена композиція, центр композиції, новаторський підхід'
  - 'Зв''язок із попередніми темами (B2 M98): Доля авангардистів у часи Розстріляного відродження'
- section: 'Казимир Малевич та супрематизм: Українське коріння (Kazimir Malevich and Suprematism: Ukrainian Roots)'
  words: 500
  points:
  - 'Культурний гачок: Вплив українського народного мистецтва (вишивки, писанкарства, розпису) на генезис супрематизму Малевича'
  - 'Аналіз ''Чорного квадрата'': безпредметне мистецтво, геометризм та філософія ''нуля форм'''
  - 'Термінологія супрематизму: супрематичний колорит, геометризація, безпредметність, візіонерство'
- section: 'Практика: Мистецтвознавчий аналіз та корекція (Practice: Art History Analysis and Correction)'
  words: 400
  points:
  - 'Лабораторія реставратора: Типові помилки — заміна описовості (''тут є дерево'') на аналіз композиційних засобів'
  - 'Практичний дрил: виправлення калькованих термінів та вживання правильних прийменникових конструкцій (картина олією)'
  - 'Творче завдання: Написання есе-відгуку про виставку українського авангарду з використанням епітетів та термінів арт-критики'
focus: fine-arts
pedagogy: CBI
objectives:
- Learner explores the evolution of Ukrainian art from sacred icons to global avant-garde.
- Learner can explain the significance of Shevchenko as an artist.
- Learner analyzes the contribution of Malevich and Archipenko to world art.
grammar:
- Art criticism terminology
- Describing visual composition
phase: C1.7 [Fine Arts & High Culture]
persona:
  voice: Senior Specialist
  role: Реставратор
word_target: 4000
vocabulary_hints:
  required:
  - іконопис (icon painting) — писати ікону (high frequency), іконописний канон, київська школа
  - колорит (color palette/coloration) — багатий колорит, національний колорит, теплий/холодний колорит
  - світлотінь (chiaroscuro) — гра світлотіні, світлотіньове моделювання; ключовий термін для аналізу техніки
  - авангард (avant-garde) — представник авангарду, український авангард; світовий контекст
  - композиція (composition) — динамічна композиція, врівноважена композиція, центр композиції
  - супрематизм (suprematism) — безпредметне мистецтво, геометричні форми; термін Малевича
  recommended:
  - олійна картина (oil painting) — вживання замість калькованого 'картина маслами'
  - офорт (etching) — специфічний термін для графіки Шевченка
  - безпредметність (non-objectivity) — ключове поняття авангарду
  - мистецтвознавство (art history/criticism) — фаховий термін для C1
  - перспектива (perspective) — пряма та зворотна перспектива в іконописі
