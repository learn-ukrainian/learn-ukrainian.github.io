module: c1-072
level: C1
sequence: 72
slug: morfolohichni-stylistychni-zasoby
version: 1.1.1
title: Стилістичні ресурси морфології
subtitle: Стилістичні ресурси морфології
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
- Вивчити стилістичний потенціал частин мови та їх категоріальних значень.
- Аналізувати використання варіантних форм (іменникових закінчень, дієслівних синонімів) для досягнення стилістичного ефекту.
- Опанувати мистецтво морфологічної експресії в художньому та публіцистичному текстах.
- Використовувати граматичну синоніміку для уникнення тавтології та посилення точності викладу.
reading_situations:
- source_type: фрагмент роману
  topic: 'Світ речей та світ дій: аналіз домінування іменників vs дієслів у прозі Ольги Кобилянської.'
  key_elements:
  - субстантивація
  - дієслівна енергія
  - прикметникова палітра
  motivation: Розуміння ролі морфологічного складу тексту у формуванні авторського ідіостилю.
- source_type: публіцистична стаття
  topic: 'Займенникова політика: як вибір між ''ми'', ''ви'' та ''вони'' формує ідеологічний підтекст.'
  key_elements:
  - інклюзивне ми
  - дистанціювання
  - персоніфікація
  motivation: Вивчення прагматики займенників у маніпулятивних та агітаційних текстах.
listening_situations:
- media_type: лекція
  setting: 'Мовознавча лекція про ''силу дієслова'' в українській мові: від праслов''янських коренів до сучасного сленгу.'
  focus_points:
  - видо-часові форми
  - способи дії
  - експресивні суфікси
  motivation: Глибоке розуміння дієслівної динаміки як основи українського синтаксису.
writing_tasks:
- task_type: есе
  prompt: Напишіть опис зимового вечора (300 слів), використовуючи виключно іменники та прикметники (номінативний стиль),
    а потім перепишіть його, додавши динамічні дієслова.
  requirements:
  - мінімум 2 варіанти тексту
  - аналіз зміни сприйняття
  - високий рівень образності
  motivation: Відпрацювання навичок свідомого вибору морфологічних засобів для керування увагою читача.
  model_answer: Текст має продемонструвати перехід від статичного споглядання до активного руху через зміну морфологічного
    домінанта.
discussion_topics:
- context: Чи може неправильний вибір граматичної форми зруйнувати професійну репутацію?
  questions:
  - Чому українська мова надає перевагу дієслівним конструкціям над іменниковими (номіналізацією)?
  - Які стилістичні відтінки мають варіантні закінчення (наприклад, -у/-а в родовому відмінку)?
  - Як зменшувально-пестливі суфікси в офіційному мовленні впливають на імідж установи?
  motivation: Обговорення морфологічної норми як компонента професійного етикету.
content_outline:
- section: Стилістика іменних частин мови
  words: 1000
  subsections:
  - Експресивні можливості категорії роду та числа іменників
  - 'Стилістична функція прикметника: епітет, оксюморон, порівняння'
  - Займенник як засіб встановлення контакту та вираження суб'єктивності
  key_concepts:
  - субстантивація
  - епітет
  - референція
- section: 'Дієслово: енергія та динаміка тексту'
  words: 1000
  subsections:
  - Стилістичне використання часових та способових форм (теперішній історичний та ін.)
  - 'Дієприкметник та дієприслівник: лаконізація vs обтяження синтаксису'
  - Синоніміка дієслівних префіксів як засіб передачі тонких нюансів дії
  key_concepts:
  - динамізм
  - інтерпретація часу
  - префіксація
- section: Граматична синоніміка та варіативність
  words: 1000
  subsections:
  - Вибір відмінкових форм як маркер стилю (офіційний vs розмовний)
  - Стилістична роль ступенів порівняння прикметників та прислівників
  - Морфологічні архаїзми та неологізми у художньому мовленні
  key_concepts:
  - варіативність
  - морфологічна норма
  - архаїзація
- section: Службові частини мови та частки
  words: 1000
  subsections:
  - Сполучники та прийменники як логічні конектори академічного тексту
  - Частки як засіб вираження авторської модальності та оцінки
  - Вигук у системі експресивного мовлення
  key_concepts:
  - модальність
  - когезія
  - емоційність
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
