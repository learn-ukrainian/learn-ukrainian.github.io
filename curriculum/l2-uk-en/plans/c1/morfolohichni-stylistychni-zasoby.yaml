activity_hints:
- type: reading
  focus: Прочитайте текст про стилістика іменних частин мови і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про дієслово: енергія та динаміка тексту, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Стилістика іменних частин мови». Обґрунтуйте свою позицію прикладами
    з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему стилістика іменних частин мови.
- type: comparative-study
  focus: 'Порівняйте різні підходи до стилістика іменних частин мови: Експресивні можливості категорії роду та числа іменників.
    Визначте спільне та відмінне.'
activities:
