module: c1-041
level: C1
sequence: 41
slug: leksykolohiia-c1
version: '1.1'
title: "Лексикологія C1: Синонімічне багатство та точність слововживання"
subtitle: "Лексикологія C1"
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
  - "Вдосконалити навички добору контекстуально доречних синонімів для уникнення тавтології."
  - "Навчитися розрізняти відтінки значень паронімів у науковому та офіційно-діловому
    стилях."
  - "Опанувати активний словник фразеологізмів для підсилення експресивності мовлення."
  - "Аналізувати процеси неологізації та доцільність використання іншомовних запозичень."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Стилістичні функції синонімів у текстах сучасних українських публіцистів."
    key_elements: ["домінанта", "коннотація", "евфемізм"]
    motivation: "Розуміння того, як вибір слова впливає на прагматику тексту."
  - source_type: "словникова стаття"
    topic: "Аналіз складних гнізд паронімів (наприклад, 'дільниця' — 'ділянка', 'ефектний'
      — 'ефективний')."
    key_elements: ["семантичне поле", "диференційна ознака", "словосполучуваність"]
    motivation: "Запобігання типовим лексичним помилкам на високому рівні володіння
      мовою."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ мовознавця (наприклад, Олександра Авраменка або Святослава Караванського)
      про культуру мовлення та боротьбу з мовним сміттям."
    focus_points: ["мовна норма", "лексичний пуризм", "точність вислову"]
    motivation: "Формування естетичного смаку та відповідального ставлення до слова."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте роль англіцизмів у сучасній ІТ-термінології. Чи є цей процес
      неминучим, чи українська мова має достатній ресурс для творення власних відповідників?"
    requirements: ["мінімум 300 слів", "використання термінів: 'деривація', 'пуризм',
          'адаптація'", "наведення прикладів успішного словотвору"]
    motivation: "Розвиток навичок критичного аналізу лексичних процесів."
    model_answer: "Текст має збалансовано оцінювати переваги (уніфікація) та недоліки
      (втрата самобутності) запозичень. Важливо згадати про досвід інших мов та традицію
      українського термінотворення 1920-х років."

discussion_topics:
  - context: "Фразеологія в офіційному мовленні: ознака майстерності чи недоречна
      надмірність?"
    questions:
      - "Які фразеологізми є припустимими в дипломатичному листуванні?"
      - "Як знання крилатих висловів допомагає розумінню культурного коду?"
      - "Чи можуть фразеологізми ставати застарілими?"
    motivation: "Стимулювання використання сталих висловів у власному мовленні."

content_outline:
  - section: "Синонімія та її функції"
    words: 1000
    subsections:
      - "Типи синонімів: абсолютні, семантичні, стилістичні"
      - "Синонімічний ряд та домінанта: принципи побудови"
      - "Перифраза та евфемізм як засоби мовної ввічливості та дипломатії"
    key_concepts:
      - "домінанта"
      - "евфемізм"
      - "перифраза"
  - section: "Паронімія та омонімія"
    words: 1000
    subsections:
      - "Причини виникнення паронімів та типи помилок у їх вживанні"
      - "Омоніми, омографи та омофони: розрізнення в контексті"
      - "Міжмовна омонімія ('фальшиві друзі перекладача') в українсько-англійських
        парах"
    key_concepts:
      - "паронім"
      - "омограф"
      - "контекст"
  - section: "Фразеологія в академічному та професійному дискурсі"
    words: 1000
    subsections:
      - "Класифікація фразеологізмів: ідіоми, єдности, сполучення"
      - "Джерела української фразеології: фольклор, Біблія, античність, література"
      - "Трансформація фразеологізмів у публіцистичному стилі"
    key_concepts:
      - "ідіома"
      - "сталий вираз"
      - "експресивність"
  - section: "Динамічні процеси в лексиці"
    words: 1000
    subsections:
      - "Шляхи поповнення словникового складу: словотвір та запозичення"
      - "Активний та пасивний запас мови: історизми, неологізми, оказioналізми"
      - "Мовна мода та проблема канцеляриту в сучасному мовленні"
    key_concepts:
      - "неологізм"
      - "архаїзм"
      - "канцелярит"

vocabulary:
  required:
    - синонім
    - паронім
    - омонім
    - фразеологізм
    - неологізм
    - коннотація
    - семантика
    - тавтологія
  recommended:
    - евфемізм
    - оказioналізм
    - деривація
    - прагматика
    - пуризм

activity_hints:
  - type: error-correction
    description: "Fix paronym confusion (дільниця↔ділянка, ефектний↔ефективний) and
      tautology in academic and professional Ukrainian texts."
  - type: comparative-study
    description: "Match synonymic rows with their dominant word and differentiate
      by connotation, register, and context."
  - type: critical-analysis
    description: "Analyze anglicisms in Ukrainian IT terminology — evaluate necessity
      of borrowings vs potential for native word formation (деривація)."
  - type: select
    description: "Choose the contextually appropriate synonym from a synonymic row
      for academic, journalistic, and colloquial registers."
  - type: essay-response
    description: "Complete sentences with correct paronyms, avoiding common confusion
      in scientific and official texts."

activities:
  types_required:
    - error-correction
    - match-up
    - critical-analysis
    - select
    - fill-in
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §17-20 — Лексична стилістика"
  - "Авраменко, 11 клас (2019): §15-20 — Лексична норма"
  - "Караман, 10 клас (2018): §1-5 — Загальне мовознавство"

connects_to:
  previous: "diaspora-ukrainian"
  next: "morfolohichna-norma-c1"
