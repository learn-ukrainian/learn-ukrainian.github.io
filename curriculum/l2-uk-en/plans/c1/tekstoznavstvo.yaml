module: c1-048
level: C1
sequence: 48
slug: tekstoznavstvo
version: '1.1'
title: "Текстознавство: Структура, зв'язність та стилістична цілісність"
subtitle: "Текстознавство"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Розуміти текст як складну семантико-синтаксичну цілісність та основну одиницю
    комунікації."
  - "Опанувати засоби міжфразового зв'язку (когезії) та смислової єдності (когерентності)."
  - "Аналізувати актуальне членування речення (тема-рематична структура) для побудови
    логічного викладу."
  - "Вдосконалити навички редагування текстів різних функціональних стилів, забезпечуючи
    їх композиційну завершеність."

reading_situations:
  - source_type: "науковий трактат"
    topic: "Аналіз вступу до філософської чи лінгвістичної праці: як автор вибудовує
      аргументацію та зв'язки між абзацами."
    key_elements: ["когезія", "дискурс", "архітектоніка"]
    motivation: "Розвиток здатності бачити структурний скелет складного тексту."
  - source_type: "публіцистична колонка"
    topic: "Інтертекстуальність у сучасному есеї: використання алюзій та ремінісценцій
      для створення додаткових смислів."
    key_elements: ["алюзія", "підтекст", "прецедентний текст"]
    motivation: "Вивчення способів збагачення тексту культурними кодами."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ редактора про найтиповіші помилки в композиції тексту: 'розрив
      логіки', 'зайва деталізація', 'невідповідність заголовку'."
    focus_points: ["композиція", "тема", "ідея"]
    motivation: "Формування критичного погляду на власні та чужі тексти."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте концепцію 'смерті автора' (за Р. Бартом) крізь призму українського
      літературного контексту. Як читач стає співавтором тексту?"
    requirements: ["мінімум 400 слів", "використання термінів: 'дискурс', 'герменевтика',
          'семіотика'", "чітка тричастинна структура"]
    motivation: "Розвиток навичок високого академічного синтезу та текстотворення."
    model_answer: "Текст повинен демонструвати глибоке розуміння того, що текст —
      це не лише слова, а мережа смислів. Важливо використати засоби логічного зв'язку
      (отже, по-перше, натомість)."

discussion_topics:
  - context: "Гіпертекст та кліпове мислення: чи втрачає сучасна людина здатність
      сприймати довгі лінійні тексти?"
    questions:
      - "Чим структура тексту в соцмережах відрізняється від класичного есею?"
      - "Чи може штучний інтелект створити текст із глибокою когерентністю?"
      - "Яка роль заголовка в епоху 'клікбейту'?"
    motivation: "Обговорення трансформації тексту в цифрову добу."

content_outline:
  - section: "Категорії та ознаки тексту"
    words: 1000
    subsections:
      - "Текст як система: цілісність, завершеність, контентність"
      - "Тема та рема: актуальне членування як інструмент логіки тексту"
      - "Заголовок як сильний компонент тексту: типи та функції"
    key_concepts:
      - "актуальне членування"
      - "цілісність"
      - "модальність"
  - section: "Механізми текстової зв'язності"
    words: 1000
    subsections:
      - "Граматична когезія: займенники, сполучники, часові форми дієслів"
      - "Лексична когезія: повтори, синонімічні заміни, родо-видові відношення"
      - "Когерентність: смислова та прагматична єдність тексту"
    key_concepts:
      - "когезія"
      - "когерентність"
      - "референція"
  - section: "Композиція та архітектоніка"
    words: 1000
    subsections:
      - "Логічні моделі побудови абзаців: дедукція та індукція"
      - "Складне синтаксичне ціле (надфразна єдність) як структурна одиниця"
      - "Ритм та інтонація прозового тексту: стилістичний аспект"
    key_concepts:
      - "архітектоніка"
      - "абзац"
      - "надфразна єдність"
  - section: "Типологія та деконструкція текстів"
    words: 1000
    subsections:
      - "Функціонально-стильові різновиди текстів (науковий, офіційний, художній)"
      - "Інтертекстуальність та цитатність у сучасному дискурсі"
      - "Методика редагування тексту: від макроструктури до мікрокорекції"
    key_concepts:
      - "інтертекстуальність"
      - "дискурс"
      - "редагування"

vocabulary:
  required:
    - когезія
    - когерентність
    - дискурс
    - архітектоніка
    - алюзія
    - композиція
    - контекст
    - референція
  recommended:
    - герменевтика
    - семіотика
    - актуальне членування
    - підтекст
    - прецедентність

activity_hints:
  - type: critical-analysis
    description: "Analyze the cohesion mechanisms in a Ukrainian academic paragraph
      — identify all referential chains, lexical repetitions, and logical connectors."
  - type: reading
    description: "Read a complex Ukrainian essay and map its theme-rheme progression
      across paragraphs, identifying breaks in coherence."
  - type: error-correction
    description: "Fix coherence and cohesion errors in a poorly structured text —
      misplaced paragraphs, broken referential chains, missing connectors."
  - type: comparative-study
    description: "Match text-linguistics terms (когезія, когерентність, архітектоніка,
      актуальне членування) with definitions and textual examples."
  - type: essay-response
    description: "Rewrite a given text excerpt to improve its thematic unity and logical
      flow, using at least 5 different cohesion devices."

activities:
  types_required:
    - critical-analysis
    - reading
    - error-correction
    - match-up
    - true-false
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §5-8 — Текст, його ознаки, будова тексту"
  - "Глазова, 11 клас (2019): §25 — Правила будови складних речень, текстова когерентність"
  - "Авраменко, 11 клас (2019): Текстознавство, с. 180-190"

connects_to:
  previous: "numeral-mastery-c1"
  next: "professional-scenarios"
