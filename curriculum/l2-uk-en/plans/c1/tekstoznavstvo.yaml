slug: tekstoznavstvo
version: '3.0'
title: 'Текстознавство: Будова та типи текстів'
subtitle: 'Text Linguistics: Structure and Text Types'
content_outline:
- section: Текст як одиниця спілкування
  words: 700
  points:
  - 'Визначення тексту: завершене висловлювання, об''єднане темою та комунікативною метою'
  - 'Критерії текстуальності: зв''язність (когезія), цілісність (когерентність), інформативність, інтенціональність, ситуативність'
  - 'Текст vs дискурс: текст як продукт, дискурс як процес мовленнєвої взаємодії в контексті'
- section: Типи текстів
  words: 800
  points:
  - 'Розповідь (наратив): структура (зав''язка, розвиток дії, кульмінація, розв''язка), часова послідовність, дієслова руху
    та дії'
  - 'Опис: статичність, прикметники та обставини місця, просторова організація (від загального до деталі або навпаки)'
  - 'Роздум (аргументація): теза — аргументи — висновок, логічні зв''язки, засоби переконання'
  - 'Змішані типи та жанрові конвенції: поєднання розповіді з описом, роздуму з розповіддю в різних функціональних стилях'
- section: Складне синтаксичне ціле (ССЦ)
  words: 700
  points:
  - 'ССЦ як структурна одиниця тексту: група речень, об''єднаних мікротемою, з чіткими межами'
  - 'Тематична прогресія: ланцюговий зв''язок (кожне наступне речення розвиває попереднє) vs паралельний зв''язок (речення
    розкривають спільну тему незалежно)'
  - 'Мікротема та макротема: ієрархічна організація змісту від абзацу до цілого тексту'
- section: Засоби зв''язності тексту
  words: 800
  points:
  - 'Лексична когезія: повтор ключових слів, синонімічна заміна, гіперо-гіпонімія (тварина → собака), антонімічний контраст'
  - 'Граматична когезія: займенникова заміна, сполучники, єдність видо-часових форм дієслова, порядок слів'
  - 'Логічні конектори: причинові (отже, тому), протиставні (проте, однак), додаткові (крім того, до того ж), підсумкові (загалом,
    отже)'
- section: Стилістичний аналіз тексту
  words: 500
  points:
  - 'Визначення стилю, регістру та адресата в автентичних українських текстах: газетна стаття, наукова праця, художній уривок'
  - 'Аналіз мовних засобів: лексичний рівень (терміни, розмовна лексика), синтаксичний рівень (довжина речень, тип зв''язку),
    стилістичний рівень (тропи, фігури)'
- section: 'Займенники як засоби когезії: повна парадигма'
  words: 300
  points:
  - 'Неозначені займенники у тексті: будь-хто, хто-небудь, казна-хто, абихто, дехто — семантичні відтінки та роль у побудові невизначеної
    референції'
  - 'Заперечні займенники у когезії: жодний, ніхто, ніщо, ніякий — подвійне заперечення та вплив на зв''язність тексту'
  - 'Означальні займенники: кожний/кожен, весь/увесь, інший, сам/самий — розмежування значень (сам = alone, самий = the very) та
    вживання як анафоричних засобів'
  - 'Займенникова заміна як засіб когезії: повтор vs займенник, межі допустимої дистанції між антецедентом і займенником у тексті'
- section: Практика текстотворення
  words: 500
  points:
  - Побудова зв'язного тексту за заданою мікротемою з використанням різних типів тематичної прогресії
  - 'Трансформація тексту: зміна типу (розповідь → опис), стилю (науковий → публіцистичний), регістру (офіційний → розмовний)'
  - 'Редагування тексту: виявлення та виправлення порушень когезії та когерентності'
focus: grammar
pedagogy: CBI
objectives:
- Apply textuality criteria to evaluate text quality
- Identify text types (розповідь, опис, роздум) and their structural features
- Analyze thematic progression and cohesion devices in authentic texts
- Use indefinite, negative, and definitive pronouns as cohesion devices in text construction
- Construct coherent texts using appropriate cohesion strategies
grammar:
- Text cohesion devices (lexical and grammatical)
- Thematic progression types
- Logical connectors and their semantic roles
- Pronoun paradigm as cohesion device (indefinite, negative, definitive pronouns)
phase: C1.3 [Movoznavstvo & Sociolinguistics]
persona:
  voice: Senior Specialist
  role: Текстолог-аналітик
word_target: 4300
vocabulary_hints:
  required:
  - текстознавство (text linguistics) — лінгвістика тексту, аналіз тексту; Core discipline term
  - зв'язність (cohesion) — текстова зв'язність, засоби зв'язності; Essential textuality criterion
  - цілісність (coherence) — змістова цілісність, когерентність тексту; Complements cohesion in text analysis
  - складне синтаксичне ціле (complex syntactic whole) — ССЦ, структурна одиниця тексту; Key text-level concept
  - мікротема (micro-theme) — мікротема абзацу, виділення мікротеми; Analytical tool for text structure
  recommended:
  - когезія (cohesion) — International synonym for зв'язність, used in academic discourse
  - дискурс (discourse) — текст у контексті, дискурсивний аналіз; Broader than text
  - тематична прогресія (thematic progression) — ланцюговий, паралельний зв'язок; Text organization principle
  - абзац (paragraph) — структура абзацу, абзацне членування; Basic text segmentation unit
