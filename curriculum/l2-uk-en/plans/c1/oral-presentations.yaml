module: c1-015
level: C1
sequence: 15
slug: oral-presentations
version: '1.0'
title: "Мистецтво наукової та професійної презентації"
subtitle: "The Art of Scientific and Professional Presentation"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати структуру публічного виступу: привернення уваги, основна частина, висновки."
  - "Вивчити фрази-маркери для переходу між слайдами та частинами презентації."
  - "Навчитися відповідати на складні запитання аудиторії в академічному стилі."
  - "Розвинути навички візуалізації даних та їх коментування українською мовою."

listening_situations:
  - media_type: "відео"
    setting: "Виступ українського вченого на міжнародному симпозіумі з питань кібербезпеки."
    focus_points: ["структура доповіді", "використання риторичних запитань", "взаємодія з аудиторією"]
    motivation: "Аналіз реального прикладу успішної професійної презентації українською мовою."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Складіть план-конспект (тези) вашої майбутньої доповіді на тему 'Вплив творчості шістдесятників на сучасну українську культуру'. Обсяг — 300 слів."
    requirements: ["використання фраз-переходів", "логічна послідовність", "наявність вступу та висновків"]
    motivation: "Тренування навичок підготовки до усного виступу в письмовій формі."
    model_answer: "Текст повинен містити фрази на кшталт 'Перейдемо до наступного аспекту...', 'Як ілюструє цей графік...', 'Підбиваючи підсумки, варто зазначити...'"

discussion_topics:
  - context: "Чи є візуальний супровід (слайди) обов'язковим для якісної наукової доповіді?"
    questions: ["Як не перетворити презентацію на читання зі слайдів?", "Які культурні особливості публічного виступу в Україні?", "Як впоратися з хвилюванням перед великою аудиторією?"]
    motivation: "Обговорення практичних аспектів та етики публічних виступів."

content_outline:
  - section: "Підготовка та структура виступу"
    words: 1000
    subsections:
      - "Аналіз аудиторії та адаптація змісту"
      - "Композиція доповіді: правило 'трьох частин'"
      - "Створення ефективного вступу: 'гачки' для аудиторії"
    key_concepts:
      - "регламент"
      - "адресат"
      - "теза виступу"
  - section: "Мовні засоби презентації"
    words: 1000
    subsections:
      - "Фрази для керування увагою: 'зверніть увагу на...', 'варто наголосити...'"
      - "Маркери структури та переходів"
      - "Коментування візуальних матеріалів: опис графіків, схем, таблиць"
    key_concepts:
      - "дискурсивні слова"
      - "риторичні прийоми"
      - "інтонаційне виділення"
  - section: "Робота з аудиторією та Q&A сесія"
    words: 1000
    subsections:
      - "Техніки відповідей на уточнювальні та критичні запитання"
      - "Ввічлива незгода та захист власної позиції"
      - "Мистецтво імпровізації та підтримка зорового контакту"
    key_concepts:
      - "полеміка"
      - "зворотний зв'язок"
      - "комунікативна стратегія"
  - section: "Невербальна комунікація та технічні аспекти"
    words: 1000
    subsections:
      - "Мова тіла та жестикуляція в професійному контексті"
      - "Вимоги до оформлення слайдів: текст, шрифти, кольорова гама"
      - "Використання допоміжних засобів (вказівки, мікрофон)"
    key_concepts:
      - "паралінгвістика"
      - "візуалізація"
      - "технічний супровід"

vocabulary:
  required:
    - доповідь
    - виступ
    - аудиторія
    - ілюструвати
    - акцентувати
    - регламент
    - наочність
    - підсумовувати
  recommended:
    - харизматичний
    - переконливий
    - лаконічність
    - дискусійний
    - маніпуляція

activities:
  types_required:
    - critical-analysis
    - unjumble
    - fill-in
    - true-false
    - translate
  min_items_per_type: 5
  total_min_items: 25

connects_to:
  previous: "literature-review"
  next: "advanced-punctuation"
