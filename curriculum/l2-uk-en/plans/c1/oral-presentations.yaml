module: c1-015
level: C1
sequence: 15
slug: oral-presentations
version: '2.0'
title: Доповідь та презентація
content_outline:
- section: 'Вступ: Історія та стандарти риторики (Introduction: History and Standards
    of Rhetoric)'
  words: 500
  points:
  - Традиція риторики від Києво-Могилянської академії (Феофан Прокопович) до сучасних
    майданчиків TEDxKyiv та IT Arena
  - 'Вимоги Держстандарту §1.4.2.1: виступ щодо проблемної теми з обґрунтуванням власної
    позиції та риторична компетенція'
- section: Композиція та типи доповідей (Composition and Types of Reports)
  words: 800
  points:
  - Різниця між академічною 'доповіддю' та бізнесовою 'презентацією'; вживання сталого
    виразу 'виголосити доповідь'
  - 'Композиція тексту за §4.4.6: використання риторичних засобів (анафора, антитеза)
    для структурування основної частини виступу'
- section: Мовні маркери та ораторський синтаксис (Signposting and Oral Syntax)
  words: 1000
  points:
  - 'Функціональні мовний маркери: ''Перейдімо до наступної тези'', ''Варто звернути
    увагу на...'', ''Як ми бачимо з попереднього розділу'''
  - 'Ораторський синтаксис: спрощення довгих речень (oral syntax) порівняно з письмовим
    стилем для кращого сприйняття аудиторією'
- section: Візуалізація та технічний супровід (Visualization and Technical Support)
  words: 600
  points:
  - 'Граматика коментування слайдів: виправлення кальки ''на слідуючому слайді'' на
    нормативне ''на наступному слайді'''
  - 'Мова графіків та діаграм: використання виразів ''згідно з даними'', ''динаміка
    демонструє'', ''секторна діаграма ілюструє'''
- section: Робота з аудиторією та стратегії Q&A (Audience Interaction and Q&A Strategies)
  words: 700
  points:
  - 'Культура дискусії: заміна калькованого ''Я маю питання'' на етикетні форми ''Дозвольте
    запитати'' або ''У мене є запитання'''
  - 'Реагування на складні питання: кліше ''Дякую за запитання'', ''Це слушне зауваження'',
    ''Дозвольте уточнити вашу думку'''
- section: Практика та корекція кальок (Practice and Error Correction)
  words: 400
  points:
  - 'Корекція керування: вживання дієслова ''презентувати [що?]'' без прийменника
    (уникнення помилки ''презентувати про...'')'
  - 'Симуляція конференції: підготовка виступу з урахуванням вивчених мовних маркерів
    та отримання зворотного зв''язку'
vocabulary_hints:
  required:
  - доповідь (report) — виголосити доповідь, підготувати доповідь, наукова доповідь;
    висока частотність в академічному середовищі
  - презентація (presentation) — провести презентацію, слайди презентації, мультимедійна
    презентація; частотність у бізнес-контексті
  - виступ (speech/presentation) — публічний виступ, виступ на конференції, час виступу
  - аудиторія (audience) — цільова аудиторія, утримувати увагу аудиторії, контакт
    з аудиторією
  - слайд (slide) — на наступному слайді (не слідуючому), перемикати слайди, коментувати
    слайд
  - теза (thesis/point) — основна теза, аргументувати тезу, висунути тезу; ключовий
    термін академічної риторики
  - перехід (transition) — плавний перехід між частинами, фраза-перехід
  - підсумок (summary) — підбити підсумки, у підсумку, короткий підсумок
  - маркер (marker/signpost) — мовний маркер, маркер структурування тексту
  - візуалізація (visualization) — засоби візуалізації, візуалізація даних
  recommended:
  - риторика (rhetoric) — академічна риторика, канони риторики, мистецтво красномовства
  - сторітелінг (storytelling) — поєднання академічності та сторітелінгу (TEDxKyiv
    style)
  - невербальний (nonverbal) — невербальні засоби комунікації, жестикуляція
  - імпровізація (improvisation) — імпровізація під час виступу, володіння темою
  - переконливість (persuasiveness) — логічна переконливість, аргументованість позиції
