module: c1-018
level: C1
sequence: 18
slug: oral-presentations
version: '1.1'
title: "Мистецтво наукової та професійної презентації"
subtitle: "Мистецтво наукової та професійної презентації"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати структуру публічного виступу: привернення уваги, основна частина, висновки."
  - "Вивчити фрази-маркери для переходу між слайдами та частинами презентації."
  - "Навчитися відповідати на складні запитання аудиторії в академічному стилі."
  - "Розвинути навички візуалізації даних та їх коментування українською мовою."

reading_situations:
  - source_type: "тези доповіді"
    topic: "Аналіз структури та мови тез наукової доповіді на конференції з кібербезпеки."
    key_elements: ["логічна архітектоніка", "маркери переходу", "академічна лаконічність"]
    motivation: "Вивчення письмової підготовки до публічного виступу як основи для
      усної презентації."

listening_situations:
  - media_type: "відео"
    setting: "Виступ українського вченого на міжнародному симпозіумі з питань кібербезпеки."
    focus_points: ["структура доповіді", "використання риторичних запитань", "взаємодія
          з аудиторією"]
    motivation: "Аналіз реального прикладу успішної професійної презентації українською
      мовою."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Складіть план-конспект (тези) вашої майбутньої доповіді на тему 'Вплив
      творчості шістдесятників на сучасну українську культуру'. Обсяг — 300 слів."
    requirements: ["використання фраз-переходів", "логічна послідовність", "наявність
          вступу та висновків"]
    motivation: "Тренування навичок підготовки до усного виступу в письмовій формі."
    model_answer: "Текст повинен містити фрази на кшталт 'Перейдемо до наступного
      аспекту...', 'Як ілюструє цей графік...', 'Підбиваючи підсумки, варто зазначити...'"

discussion_topics:
  - context: "Чи є візуальний супровід (слайди) обов'язковим для якісної наукової
      доповіді?"
    questions: ["Як не перетворити презентацію на читання зі слайдів?", "Які культурні
          особливості публічного виступу в Україні?", "Як впоратися з хвилюванням
          перед великою аудиторією?"]
    motivation: "Обговорення практичних аспектів та етики публічних виступів."

content_outline:
  - section: "Підготовка та структура виступу"
    words: 1000
    subsections:
      - "Аналіз аудиторії та адаптація змісту"
      - "Композиція доповіді: правило 'трьох частин'"
      - "Створення ефективного вступу: 'гачки' для аудиторії"
    key_concepts:
      - "регламент"
      - "адресат"
      - "теза виступу"
  - section: "Мовні засоби презентації"
    words: 1000
    subsections:
      - "Фрази для керування увагою: 'зверніть увагу на...', 'варто наголосити...'"
      - "Маркери структури та переходів"
      - "Коментування візуальних матеріалів: опис графіків, схем, таблиць"
    key_concepts:
      - "дискурсивні слова"
      - "риторичні прийоми"
      - "інтонаційне виділення"
  - section: "Робота з аудиторією"
    words: 1000
    subsections:
      - "Техніки відповідей на уточнювальні та критичні запитання"
      - "Ввічлива незгода та захист власної позиції"
      - "Мистецтво імпровізації та підтримка зорового контакту"
    key_concepts:
      - "полеміка"
      - "зворотний зв'язок"
      - "комунікативна стратегія"
  - section: "Невербальна комунікація та технічні аспекти"
    words: 1000
    subsections:
      - "Мова тіла та жестикуляція в професійному контексті"
      - "Вимоги до оформлення слайдів: текст, шрифти, кольорова гама"
      - "Використання допоміжних засобів (вказівки, мікрофон)"
    key_concepts:
      - "паралінгвістика"
      - "візуалізація"
      - "технічний супровід"

vocabulary:
  required:
    - доповідь
    - виступ
    - аудиторія
    - ілюструвати
    - акцентувати
    - регламент
    - наочність
    - підсумовувати
  recommended:
    - харизматичний
    - переконливий
    - лаконічність
    - дискусійний
    - маніпуляція

activity_hints:
  - type: critical-analysis
    description: "Evaluate a Ukrainian academic presentation transcript — assess structure,
      audience engagement techniques, and Q&A handling."
  - type: fill-in
    description: "Complete presentation scripts with appropriate transition phrases
      (Перейдемо до..., Як ілюструє цей графік..., Підбиваючи підсумки...)."
  - type: match-up
    description: "Match presentation sections (вступ, основна частина, висновки, Q&A)
      with their characteristic discourse markers."
  - type: error-correction
    description: "Fix register errors in a presentation script — replace informal
      language with appropriate professional Ukrainian."
  - type: select
    description: "Choose the most effective rhetorical technique for different presentation
      situations (opening hook, data commentary, audience question)."

activities:
  types_required:
    - critical-analysis
    - unjumble
    - fill-in
    - true-false
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка"
  - "Глазова, 11 клас (2019): с. 172-173 — Діалогічні жанри"
  - "Заболотний, 11 клас (2019): Мовленнєві жанри"

connects_to:
  previous: "literature-review"
  next: "advanced-punctuation"
phase: C1.1 [Academic Foundation]
