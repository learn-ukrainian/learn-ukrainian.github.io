module: c1-047
level: C1
sequence: 47
slug: umovnyi-sposib-irrealis
version: '1.0'
title: "Умовний спосіб: ірреальність та гіпотетичне мислення"
subtitle: "Умовний спосіб: ірреаліс та контрфактуальність"
focus: grammar
pedagogy: TTT
word_target: 4000
objectives:
  - "Систематизувати утворення та вживання умовного способу дієслова
    (кондиціональний спосіб) в українській мові."
  - "Опанувати вираження гіпотетичних та ірреальних ситуацій: реальна умова,
    нереальна умова теперішнього та минулого часу."
  - "Вивчити позицію частки 'би'/'б' у реченні та її взаємодію з порядком слів."
  - "Розвинути навички гіпотетичного мислення та аргументації українською мовою."

reading_situations:
  - source_type: "філософський есей"
    topic: "Альтернативна історія: 'Якби Мазепа переміг під Полтавою' — гіпотетичний
      аналіз."
    key_elements: ["умовний спосіб", "гіпотетичне міркування", "аргументація"]
    motivation: "Вивчення умовного способу у тексті з розвиненою гіпотетичною аргументацією."
  - source_type: "художній уривок"
    topic: "Монологи героїв Лесі Українки: мрії та нездійсненні бажання."
    key_elements: ["ірреальність", "бажання", "емоційна модальність"]
    motivation: "Аналіз умовного способу як засобу характеристики персонажа."

listening_situations:
  - media_type: "дискусія"
    setting: "Фрагмент телевізійної дискусії про майбутнє освіти: 'Що б ви змінили
      в системі освіти?'"
    focus_points: ["умовні конструкції", "припущення", "обґрунтування пропозицій"]
    motivation: "Розпізнавання умовного способу в усному дискурсі та його комунікативних
      функцій."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть есе 'Якби я міг(ла) змінити одну річ у світі...' (250-300 слів),
      використовуючи різні типи умовних конструкцій: реальні, нереальні, ретроспективні."
    requirements: ["щонайменше 3 типи умовних конструкцій", "правильна позиція частки
      'би'", "логічна аргументація"]
    motivation: "Практика побудови гіпотетичних міркувань різного ступеня ірреальності."
    model_answer: "Текст має демонструвати вільне володіння умовним способом у реальних
      ('якщо матиму час — зроблю'), нереальних ('якби мав крила — полетів би') та
      ретроспективних ('якби я тоді знав — вчинив би інакше') конструкціях."

discussion_topics:
  - context: "Гіпотетичне мислення як інструмент критичного аналізу."
    questions:
      - "Чим відрізняються 'якщо' (реальна умова) та 'якби' (нереальна умова) за
        комунікативним навантаженням?"
      - "Як ви висловили б гіпотетичну пораду: 'На вашому місці я б...'?"
    motivation: "Розвиток навичок гіпотетичного мислення в дискусії."

content_outline:
  - section: "Умовний спосіб: утворення та місце в системі"
    words: 1000
    subsections:
      - "Дієслівні способи в українській мові: дійсний, наказовий, умовний"
      - "Утворення умовного способу: минулий час + частка 'би'/'б'"
      - "Позиція частки 'би'/'б' у реченні: після першого наголошеного слова"
    key_concepts:
      - "умовний"
      - "частка"
      - "спосіб"
  - section: "Типи умовних конструкцій"
    words: 1000
    subsections:
      - "Реальна умова: якщо/коли + дійсний спосіб (майбутній час)"
      - "Нереальна умова теперішнього/майбутнього: якби + умовний спосіб"
      - "Нереальна умова минулого: якби + умовний спосіб (ретроспективна)"
    key_concepts:
      - "ірреальність"
      - "гіпотетичний"
      - "умовність"
  - section: "Ірреальна модальність за межами умовних речень"
    words: 1000
    subsections:
      - "Бажальне значення: 'Хоч би вже прийшла весна!'"
      - "Ввічливе прохання: 'Чи не могли б ви допомогти?'"
      - "Допустове значення: 'Хай би що трапилось — я не відступлю'"
    key_concepts:
      - "бажальність"
      - "ввічливість"
      - "допустовий"
  - section: "Умовний спосіб у дискурсі"
    words: 1000
    subsections:
      - "Гіпотетична аргументація: 'На вашому місці я б...'"
      - "Альтернативна історія та мисленнєвий експеримент"
      - "Умовний спосіб у науковому стилі: 'Це дало б змогу припустити...'"
    key_concepts:
      - "аргументація"
      - "припущення"
      - "дискурс"

vocabulary:
  required:
    - умовний
    - ірреальний
    - гіпотетичний
    - частка
    - припущення
    - ірреальність
    - допустовий
    - кондиціональний
  recommended:
    - ретроспективний
    - бажальність
    - ввічливість
    - модальність
    - умовність

activity_hints:
  - type: fill-in
    description: "Complete conditional sentences by choosing the correct verb form:
      real condition (якщо + future) vs unreal (якби + conditional mood)."
  - type: error-correction
    description: "Fix errors in conditional constructions — wrong particle position,
      confusion between якщо/якби, tense mismatch in condition and result clauses."
  - type: select
    description: "Identify the type of conditional construction in each sentence:
      real, unreal present, unreal past, concessive, polite request."
  - type: unjumble
    description: "Reorder words in conditional sentences — practice correct placement
      of particle 'би'/'б' after the first stressed word."
  - type: critical-analysis
    description: "Analyze Леся Українка's monologues — identify all instances of
      conditional mood and explain what each reveals about the character's desires
      and regrets."

activities:
  types_required:
    - fill-in
    - error-correction
    - select
    - unjumble
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Заболотний, 7 клас (2015): §28-29 — Способи дієслова, умовний спосіб"
  - "Глазова, 11 клас (2019): §22 — Дієслово: морфологічна норма"
  - "Авраменко, 9 клас (2017): §10-11 — Складнопідрядні речення умови"
  - "State Standard 2024: §4.1.3.3 — Умовний спосіб: ірреаліс та гіпотетичне мислення"

