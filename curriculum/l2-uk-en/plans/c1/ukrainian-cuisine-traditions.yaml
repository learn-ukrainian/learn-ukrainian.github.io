module: c1-086
level: C1
sequence: 86
slug: ukrainian-cuisine-traditions
version: '2.0'
title: Українська кухня - традиції та символи
subtitle: Ukrainian Cuisine - Traditions and Symbols
content_outline:
- section: 'Вступ: Кухня як гастрономічний код нації (Introduction: Cuisine as a Nation''s Gastronomic Code)'
  words: 500
  points:
  - 'Українська кухня як відображення історії, клімату та географії: взаємозв''язок продуктів та ландшафту'
  - 'Статус ЮНЕСКО: культура приготування українського борщу як об''єкт нематеріальної культурної спадщини (2022)'
  - 'Роль шеф-кухаря як хранителя традицій: вступне слово про автентичність та деколонізацію кулінарних міфів'
- section: 'Хлібна культура: Сакральність та символізм (Bread Culture: Sacredness and Symbolism)'
  words: 900
  points:
  - 'Філософія «Хліб — усьому голова»: святість хліба в побуті, заборона викидати залишки та ритуал цілування шматка, що впав'
  - 'Паляниця як культурний шиболет: фонетична складність та символічне значення свіжовипеченого хліба'
  - 'Ритуальна випічка: весільний коровай (зустріч молодят), калач та пампушки — символіка форми та інгредієнтів'
  - 'Мистецтво замішування тіста на дріжджах: лексика процесу та поради від шефа щодо ''відпочинку'' тіста'
- section: 'Повсякденна трапеза: Борщ, вареники та голубці (Daily Feast: Borscht, Varenyky, and Holubtsi)'
  words: 900
  points:
  - 'Енциклопедія борщу: червоний, зелений, пісний; регіональні особливості (Полтавщина vs Західна Україна)'
  - 'Технологія смаку: специфічні дієслова приготування — шаткувати капусту, тушкувати овочі до готовності'
  - 'Вареники як символ достатку: різноманіття начинок (вишні, сир, картопля) та традиція ''мастити'' вареники маслом чи сметаною'
  - 'Традиційне начиння та методи: використання печі, глиняних горщиків та чавунних казанів для тушкування'
- section: 'Духовність через їжу: Обрядові традиції (Spirituality through Food: Ritual Traditions)'
  words: 900
  points:
  - 'Святвечір: магія 12 пісних страв; символіка куті (зерно як життя, мак як зорі, мед як солодке життя)'
  - 'Ритуал із кутею: підкидання ложки каші до стелі для прогнозування врожаю та удачі'
  - Дідух як символ духів предків (покуття) та узвар із сухофруктів як обов'язковий напій Різдва
  - 'Великодній кошик: символіка паски, писанок та гострого хрону як нагадування про міцність віри'
- section: Кулінарний практикум та мовна точність (Culinary Practicum and Linguistic Accuracy)
  words: 800
  points:
  - 'Типова помилка: використання прийменника ''з'' з інструментами — відпрацювання Орудного відмінка (різати ножем, а не
    ''з ножем'')'
  - 'Лексична диференціація: розрізнення дієслів ''варити'' (суп, узвар) та ''пекти'' (торт, паску, паляницю)'
  - 'Фонетична адаптація прийменників: правила вживання ''з'', ''зі'', ''із'' (наприклад, ''Борщ зі сметаною'' через збіг
    приголосних)'
  - 'Творче завдання: написання есе-порівняння української та польської кухонь або опис приготування фамільної страви'
focus: cultural
pedagogy: CBI
objectives:
- Learner can explain the symbolic meaning of ritual foods (kutia, korovai)
- Learner can describe traditional cooking methods (stove, clay pot)
- Learner can distinguish regional cuisines (Poltava dumplings vs. Hutsul banosh)
- Learner can discuss the role of bread in Ukrainian culture
grammar:
- culinary terminology
- process descriptions
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Шеф-кухар
word_target: 4000
vocabulary_hints:
  required:
  - паляниця (palianytsia/round bread) — свіжа паляниця, пекти паляницю; культурний шиболет
  - кутя (kutia/ritual grain dish) — багата, щедра, голодна кутя; варити кутю на Святвечір
  - узвар (uzvar/dried fruit compote) — узвар із сухофруктів; солодкий та наваристий узвар
  - коровай (korovai/wedding bread) — весільний коровай; зустрічати гостей із короваєм
  - борщ (borscht) — український червоний борщ; пісний борщ; об'єкт спадщини ЮНЕСКО
  - вареники (dumplings) — ліпити вареники; вареники з вишнями/сиром; мастити вареники маслом
  recommended:
  - шаткувати (to shred/grate) — шаткувати капусту для борщу; дрібно шаткувати
  - тушкувати (to stew/braise) — тушкувати м'ясо в горщику; тушкувати овочі до м'якості
  - замішувати (to knead/mix dough) — замішувати тісто на дріжджах; довго замішувати
  - покуття (honorary corner) — ставити Дідуха на покутті; сакральне місце в хаті
prerequisites:
- traditional-clothing
connects_to:
- ukrainian-house
