module: c1-110
level: C1
sequence: 110
slug: ukrainian-cuisine-traditions
version: '1.2'
title: "Українська кухня: гастрономічні традиції та культура харчування"
subtitle: "Українська кухня: гастрономічні традиції"
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити історію формування української кухні як синтезу землеробських та скотарських
    традицій."
  - "Проаналізувати семантику обрядових страв у календарному та родинному циклах (кутя,
    коровай, паска)."
  - "Вивчити регіональні особливості гастрономії України (кримськотатарська кухня,
    гуцульські страви, подільська кухня)."
  - "Обговорити сучасний стан української гастрономії та її визнання на міжнародному
    рівні (UNESCO)."

reading_situations:
  - source_type: "культурологічна стаття"
    topic: "Філософія печі: як традиційне вогнище визначило способи приготування та
      смакову палітру українських страв."
    key_elements: ["томління", "ферментація", "гастрономічний код", "автохтонність"]
    motivation: "Робота з науково-популярним текстом про зв'язок побуту та кулінарії."
  - source_type: "репортаж"
    topic: "Фестиваль борщу в Полтаві: змагання рецептів та секрети локальних громад."
    key_elements: ["інгредієнти", "автентичність", "нематеріальна спадщина", "рецептура"]
    motivation: "Вивчення описової лексики та емоційно забарвлених конструкцій у журналістському
      тексті."

listening_situations:
  - media_type: "подкаст"
    setting: "Дискусія між шеф-кухарем сучасного етно-ресторану та істориком їжі про
      'нову українську кухню'."
    focus_points: ["переосмислення забутих продуктів (пастернак, ріпа)", "техніки
          молекулярної кухні в традиційних стравах", "гастрономічна дипломатія"]
    motivation: "Сприйняття на слух аргументованого діалогу про розвиток національної
      культури."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть критичний відгук на відвідування закладу, що позиціонує себе
      як ресторан традиційної української кухні. Оцініть автентичність страв, атмосферу
      та подачу."
    requirements: ["мінімум 250 слів", "використання лексики на позначення смаку та
          текстури", "обґрунтування власної думки"]
    motivation: "Розвиток навичок написання оцінних текстів у публіцистичному стилі."
    model_answer: "Текст має містити аналіз меню (наявність локальних продуктів),
      опис смакових характеристик страв (наприклад, баланс кислого та солодкого в
      борщі) та висновок щодо відповідності закладу заявленій концепції."

discussion_topics:
  - context: "У 2022 році ЮНЕСКО внесла культуру приготування українського борщу до
      Списку нематеріальної культурної спадщини, що потребує негайної охорони."
    questions:
      - "Чому питання приналежності певної страви до національної кухні може набувати
        політичного значення?"
      - "Як статус ЮНЕСКО може допомогти у збереженні та популяризації українських
        традицій у світі?"
    motivation: "Тренування навичок дискусії на теми культурної політики та міжнародного
      права."

content_outline:
  - section: "Генезис та філософія українського столу"
    words: 1000
    subsections:
      - "Землеробська основа: роль злаків та хліба в житті українців"
      - "Магія печі: технологія томління та запікання як основа смаку"
      - "Обрядовість харчування: страви-символи у святах та ритуалах"
    key_concepts: ["культ хліба", "обрядовість", "автохтонність", "гастрономічний
          код"]
  - section: "Золотий фонд: борщ, вареники та не тільки"
    words: 1000
    subsections:
      - "Борщ як культурний феномен: понад 50 регіональних різновидів"
      - "Вареники: символіка місяця та розмаїття начинок"
      - "Галушки, книші, пампушки: борошняні вироби в щоденному раціоні"
    key_concepts: ["варіативність", "символізм", "традиційна рецептура", "локальність"]
  - section: "Регіональні гастрономічні ландшафти"
    words: 1000
    subsections:
      - "Карпатський бануш та бринза: культура вівчарства в тарілці"
      - "Кримськотатарські чебуреки та янтики: спадщина південних степів"
      - "Подільські голубці та слобожанські юшки: специфіка лісостепу"
    key_concepts: ["етнорегіон", "спеції", "скотарство", "культурний обмін"]
  - section: "Українська кухня в глобальному контексті"
    words: 1000
    subsections:
      - "Гастрономічна дипломатія: як їжа стає 'м'якою силою' держави"
      - "Відродження забутих рецептів: Клопотенко та інші амбасадори смаку"
      - "Майбутнє традиції: поєднання автентики та інноваційних технологій"
    key_concepts: ["м'яка сила", "популярність", "ренесанс", "інноваційність"]

vocabulary:
  required:
    - автентичність
    - інгредієнт
    - нематеріальна спадщина
    - томління
    - ферментація
    - гастрономія
    - рецептура
    - обрядовість
    - бануш
    - кутя
  recommended:
    - автохтонний
    - концепція
    - амбасадор
    - палітра
    - ідентифікація

activities:
  types_required:
    - critical-analysis
    - match-up
    - true-false
    - unjumble
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте культурологічну статтю про філософію печі. Визначте гастрономічну
      лексику та поясніть значення кулінарних термінів."
  - type: critical-analysis
    focus: "Проаналізуйте репортаж із фестивалю борщу. Визначте емоційно забарвлену
      лексику та стилістичні прийоми журналістського тексту."
  - type: comparative-study
    focus: "Зіставте обрядові страви (кутя, коровай, паска, бануш) з їхнім символічним
      значенням та святами."
  - type: essay-response
    focus: "Доповніть текст про кулінарні традиції відповідними термінами (томління,
      ферментація, автохтонність, рецептура, інгредієнт)."
  - type: error-correction
    focus: "Знайдіть і виправте русизми та кальки в тексті про українську кухню (наприклад,
      'готувати їжу' замість 'варити їсти' для певних контекстів)."

references:
  - "Державний стандарт 2024: C1 — тематична область 'Традиції та гастрономія'"
  - "Караман, 10 клас (2018), §38 — Стилістично забарвлена лексика"
  - "Борисенко В. Етнографія українців — матеріальна культура та харчування (загальна
    довідка)"

connects_to:
