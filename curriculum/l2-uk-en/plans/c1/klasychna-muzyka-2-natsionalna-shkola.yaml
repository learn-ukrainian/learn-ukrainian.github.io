module: c1-118
level: C1
sequence: 118
slug: klasychna-muzyka-2-natsionalna-shkola
version: 1.2.1
title: 'Класична музика II: Українська національна композиторська школа'
subtitle: 'Класична музика II: українська національна композиторська школа'
focus: history
pedagogy: seminar
word_target: 4000
objectives:
- Дослідити роль Миколи Лисенка у закладенні підвалин професійної національної музичної школи.
- Проаналізувати розвиток українського оперного мистецтва (С. Гулак-Артемовський, М. Лисенко).
- Вивчити творчість майстрів хорової мініатюри та обробок народної пісні (М. Леонтович, К. Стеценко).
- Ознайомитися з музичною культурою Галичини та діяльністю С. Людкевича і В. Барвінського.
reading_situations:
- source_type: мистецтвознавчий нарис
  topic: 'Микола Лисенко та його концепція національної опери: від фольклорних експедицій до ''Тараса Бульби''.'
  key_elements:
  - етнографізм
  - драматургія
  - лейтмотив
  - національний стиль
  motivation: Аналіз тексту про теоретичні та практичні засади створення національної музики.
- source_type: архівний документ
  topic: 'Статут Музично-драматичної школи Миколи Лисенка: боротьба за професійну освіту українською мовою.'
  key_elements:
  - меценатство
  - педагогіка
  - освітній ценз
  - громадська діяльність
  motivation: Ознайомлення з офіційно-діловим стилем минулого та історією інституціалізації культури.
listening_situations:
- media_type: відео
  setting: Програма 'Лекторій' про феномен Миколи Леонтовича та аналіз структури 'Щедрика'.
  focus_points:
  - варіаційність
  - ритмічне зерно
  - світове поширення (Carol of the Bells)
  motivation: Розуміння механізмів перетворення народної мелодії на шедевр світової класики.
writing_tasks:
- task_type: відгук
  prompt: Напишіть критичний відгук на оперу Миколи Лисенка 'Наталка Полтавка' або 'Тарас Бульба'. Оцініть поєднання народних
    джерел із класичними оперними формами.
  requirements:
  - мінімум 300 слів
  - 'використання музичної термінології: арія, увертюра, речитатив, лібрето'
  - аргументована оцінка актуальності твору сьогодні
  motivation: Вдосконалення навичок аналізу музично-драматичних творів.
  model_answer: Текст має містити опис музичних характеристик головних героїв, аналіз ролі оркестру та висновок про значення
    опери для становлення українського театру.
discussion_topics:
- context: Микола Лисенко свідомо відмовився від кар'єри в імперських театрах, щоб розвивати саме українську музику, що довгий
    час вважалося 'провінційним' вибором.
  questions:
  - У чому полягав героїзм вибору Лисенка в умовах Валуєвського та Емського указів?
  - Як концепція 'національної школи' Лисенка вплинула на наступні покоління композиторів?
  motivation: Розвиток навичок історико-культурного аналізу та дебатів про роль особистості в історії.
