title: Класична музика II — Національна школа
subtitle: Classical Music II — National School
content_outline:
- section: 'Вступ: Від фольклору до професійної сцени (Introduction: From Folklore to the Professional Stage)'
  words: 500
  points:
  - 'Микола Лисенко як фундатор національної музичної школи: роль збирача фольклору та місток між народною творчістю і професійним
    мистецтвом.'
  - 'Інтелектуальна глибина еліти: Лисенко як науковець (природничі науки) та музика як свідомий вибір служіння нації, а не
    просто кар''єра.'
- section: Микола Лисенко та становлення опери (Mykola Lysenko and the Formation of Opera)
  words: 1000
  points:
  - 'Аналіз фундаменту української опери: «Тарас Бульба», «Наталка Полтавка», «Різдвяна ніч» через призму музикознавчого аналізу.'
  - 'Порівняльний аналіз: оперні традиції С. Гулака-Артемовського та інновації Лисенка в контексті професіоналізації національної
    музики.'
  - 'Застосування академічного регістру: використання термінів «мелос», «гармонійна мова», «кантата» (§4.4.1.1).'
- section: Микола Леонтович та феномен «Щедрика» (Mykola Leontovych and the Phenomenon of Shchedryk)
  words: 1000
  points:
  - 'Музикознавчий розбір «Щедрика» (1916): структура, поліфонія та жанр хорової обробки народної пісні.'
  - 'Культурна дипломатія УНР: місія Української республіканської капели (1919) Симона Петлюри як засіб утвердження суб''єктності
    та протидії пропаганді.'
  - 'Помилка учня: Аналіз відмінностей між українським оригіналом про ластівку та американською адаптацією «Carol of the Bells»
    (Пітер Вільговський).'
- section: Майстри хорового та романсового жанрів (Masters of Choral and Art Song Genres)
  words: 800
  points:
  - 'Кирило Стеценко та хорова традиція: аналіз твору «Іфігенія в Тавриді» та ролі капели в українській музичній культурі.'
  - 'Яків Степовий: розвиток українського романсу як камерно-вокального жанру (art song) та еволюція лірики.'
  - 'Термінологічна корекція: вживання термінів «обробка» та «аранжування» замість помилкового «переклад» стосовно музичних
    творів.'
- section: Трагедія національної школи та сучасна рецепція (Tragedy of the National School and Modern Reception)
  words: 700
  points:
  - 'Доля митців: вбивство Леонтовича чекістами як приклад нищення української еліти («Розстріляне відродження» в музиці).'
  - 'Помилка учня (§3.21): розрізнення колядок (Різдво, прославлення Христа) та щедрівок (Новий рік, побажання добробуту)
    за тематикою та часом виконання.'
  - 'Культурне дозвілля (§3.4): роль філармоній та музичних фестивалів у сучасній популяризації класичної спадщини національної
    школи.'
focus: fine-arts
pedagogy: CBI
objectives:
- Learner can describe the role of Mykola Lysenko in founding the national music school.
- Learner can analyze the structure and global impact of "Shchedryk" by Leontovych.
- Learner masters professional terminology related to composition and vocal art.
