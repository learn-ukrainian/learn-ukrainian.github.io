  role: Музикознавець
word_target: 4000
vocabulary_hints:
  required:
  - Щедрівка (Shchedrivka) — обрядова пісня; стародавня щедрівка, співати щедрівки; виконується на Щедрий вечір.
  - Колядка (Kolyadka) — різдвяна пісня; різдвяна колядка, вертеп і колядки; прославлення народження Христа.
  - Обробка (Arrangement/Processing) — хорова обробка, авторська обробка народної пісні; не плутати з «перекладом».
  - Капела (Capella/Choir) — хорова капела, Українська республіканська капела, диригент капели.
  - Популяризація (Popularization) — популяризація української культури, засіб популяризації.
  - Партитура (Score) — оркестрова партитура, читати партитуру; високий музикознавчий регістр.
  recommended:
  - Мелос (Melos) — музичне втілення мелодії, ладовий склад; С1 музикознавчий термін.
  - Поліфонія (Polyphony) — багатоголосся; ключова характеристика хорової мови Леонтовича.
  - Суб'єктність (Agency/Subjectivity) — культурна суб'єктність; здатність бути активним учасником світового процесу.
  - Кантата (Cantata) — великий вокально-інструментальний твір.
  - Гармонійна мова (Harmonic language) — індивідуальна система гармонійних засобів композитора.
