module: c1-070
level: C1
sequence: 70
slug: spring-holidays
version: '2.0'
title: Українські свята - весняний цикл
subtitle: Ukrainian Holidays - Spring Cycle
content_outline:
- section: 'Вступ: Феномен Великдня (Introduction: The Phenomenon of Easter)'
  words: 500
  points:
  - Етимологія назви «Великдень» (Великий день) та міфологічне повір’я про те, що
    сонце «грає» на сході.
  - 'Поняття релігійного синкретизму весняного циклу: як християнські канони наклалися
    на давні аграрні обряди.'
- section: Весняне пробудження та закликання (Spring Awakening and Invocations)
  words: 800
  points:
  - 'Закликання весни: аналіз структури веснянок та гаївок як магічних текстів перемоги
    життя над зимою.'
  - 'Вербна неділя: логіка використання верби замість пальмових гілок та ритуал «Не
    я б’ю — верба б’є».'
  - Символічне значення верби як першого квітучого дерева, що передає життєву енергію
    людині.
- section: 'Великодній цикл: обряди та символи (Easter Cycle: Rituals and Symbols)'
  words: 1000
  points:
  - 'Страсний тиждень: занурення у термінологію (Плащаниця, Всеношна, Чистий четвер)
    без перекладу для C1.'
  - 'Learner error: розрізнення «Великдень» (свято) проти помилкового «Пасха»; вживання
    слова «паска» виключно для хліба.'
  - 'Писанка vs Крашанка: диференціація сирого ритуального талісмана (писанки) та
    вареного яйця для споживання (крашанки).'
  - 'Символіка великоднього кошика: сакральне значення паски, яєць, хрону та солі.'
- section: Поминальні традиції та духи предків (Memorial Traditions and Ancestral
    Spirits)
  words: 700
  points:
  - 'Проводи (Гробки): феномен «пікніка з померлими» як дохристиянське вшанування
    предків та обмін новиною про воскресіння.'
  - 'Вознесіння Господнє: традиції 40-го дня після Великодня та обрядове завершення
    весни.'
- section: Зелені свята та магія природи (Green Holidays and the Magic of Nature)
  words: 600
  points:
  - 'Трійця (П’ятидесятниця): синкретизм з язичницьким Русальним тижнем (Rosalia)
    та вшанування рослинності.'
  - 'Традиція клечання: магічне значення прикрашання оселі зеленню для захисту від
    злих сил.'
- section: 'Практика: фольклорний та синтетичний аналіз (Practice: Folk and Synthetic
    Analysis)'
  words: 400
  points:
  - 'Лінгвістичний аналіз тексту веснянки: використання імператива у закликаннях та
    образність «пробудження».'
  - 'Аналітичне порівняння: календарні розбіжності між українською та західною Пасхою
    та спільні риси синкретизму.'
focus: cultural
pedagogy: CBI
objectives:
- Learner can describe the rituals of the spring cycle (Stritennia, Easter)
- Learner can explain the symbolism of pysanka and paska
- Learner can analyze the lyrics of vesnianky (spring songs)
- Learner can discuss the concept of "summoning spring"
grammar:
- ritual songs analysis
- imperative in invocations
phase: C1.5 Folk Culture & Arts
persona:
  voice: Senior Specialist
  role: Зазивальник весни
word_target: 4000
vocabulary_hints:
  required:
  - Великдень (Easter) — святкувати Великдень, готуватися до Великодня; основна назва
    свята
  - Паска (Easter bread) — спекти паску, освятити паску; не плутати з назвою свята
  - Писанка (Pysanka) — розписувати писанку, символіка писанки; ритуальне яйце-оберіг
  - Веснянка (Spring song) — співати веснянки, закликати весну; фольклорний жанр
  - Освячувати (To consecrate) — освячувати вербу, освячувати кошик; релігійний контекст
  - Синкретизм (Syncretism) — релігійний синкретизм, поєднання традицій; академічний
    термін C1
  - Проводи / Гробки (Memorial week) — відвідувати могили, вшанування предків; поминальні
    дні
  - Клечання (Greenery decoration) — прикрашати зеленню, Зелені свята; обрядове гілля
  recommended:
  - Крашанка (Boiled colored egg) — їсти крашанки, битися крашанками; на відміну від
    писанки
  - Верба (Pussy willow) — освячена верба, «верба б'є»; символ життєвої сили
  - Гаївка (Spring song/game) — водити гаївки; західноукраїнський варіант веснянки
  - Плащаниця (Shroud) — виносити плащаницю, прикладатися до плащаниці; термін Страсної
    п'ятниці
  - Всеношна (Vigil) — стояти всеношну, йти на всеношну; нічна служба
  - Русалії (Rosalia) — Русальний тиждень; дохристиянський пласт Зелених свят
