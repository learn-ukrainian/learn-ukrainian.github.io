module: c1-029
level: C1
sequence: 29
slug: science-technology-c1
version: '1.0'
title: "Наука та технології: Від фундаментальних досліджень до ШІ"
subtitle: "Science and Technology"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Досконало володіти науковою термінологією для опису інновацій та технологічних процесів."
  - "Аналізувати вплив штучного інтелекту та автоматизації на суспільство та ринок праці."
  - "Опанувати стандарти академічного письма в галузі природничих та технічних наук."
  - "Вивчати внесок українських вчених (Сікорський, Корольов, Пулюй) у світову науку."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Перспективи розвитку квантових обчислень в українських наукових інститутах."
    key_elements: ["суперпозиція", "алгоритм", "обчислювальна потужність"]
    motivation: "Вивчення сучасної фізико-математичної термінології."
  - source_type: "художній уривок"
    topic: "Елементи наукової фантастики у сучасній українській прозі (напр., Макс Кідрук)."
    key_elements: ["техногенна катастрофа", "екзопланета", "біотехнології"]
    motivation: "Розуміння наукового дискурсу в художній інтерпретації."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ розробника ШІ про етичні виклики використання нейромереж у медицині та освіті."
    focus_points: ["алгоритмічна упередженість", "конфіденційність даних", "сингулярність"]
    motivation: "Розвиток навичок критичного сприйняття футурологічних прогнозів."

writing_tasks:
  - task_type: "есе"
    prompt: "Чи може штучний інтелект повністю замінити людину в творчих професіях? Проаналізуйте на прикладі перекладу та копірайтингу."
    requirements: ["мінімум 300 слів", "використання наукової аргументації", "структура 'Теза-Антитеза-Синтез'"]
    motivation: "Відпрацювання навичок дискурсивного есе на межі технологій та гуманітаристики."
    model_answer: "Текст має містити аналіз когнітивних обмежень ШІ та переваг людської інтуїції. Використання термінів 'нейронна мережа', 'семантичний аналіз', 'креативність'."

discussion_topics:
  - context: "Мілітарі-тек (MilTech) як рушій інновацій в Україні: чи стане це фундаментом для цивільної науки?"
    questions:
      - "Які технології подвійного призначення є найбільш перспективними?"
      - "Як запобігти 'відтоку мізків' (brain drain) після війни?"
      - "Чи варто Україні зосереджуватися на фундаментальних дослідженнях чи на прикладних розробках?"
    motivation: "Обговорення стратегії науково-технічного розвитку держави."

content_outline:
  - section: "Новітня технологічна парадигма"
    words: 1000
    subsections:
      - "Штучний інтелект та машинне навчання: від теорії до імплементації"
      - "Інтернет речей (IoT) та розумні міста: трансформація життєвого простору"
      - "Кібербезпека та захист критичної інфраструктури"
    key_concepts:
      - "алгоритм"
      - "автоматизація"
      - "дані"
  - section: "Біомедицина та генетична інженерія"
    words: 1000
    subsections:
      - "Редагування геному та етичні межі біотехнологій"
      - "Телемедицина та персоналізоване лікування"
      - "Розробка вакцин та боротьба з глобальними пандеміями"
    key_concepts:
      - "геном"
      - "регенерація"
      - "інновація"
  - section: "Екологічні технології та енергетика"
    words: 1000
    subsections:
      - "Відновлювана енергетика: сонце, вітер, водень"
      - "Технології декарбонізації та кругова економіка"
      - "Екологічний моніторинг та космічні технології в агросекторі"
    key_concepts:
      - "енергоефективність"
      - "утилізація"
      - "моніторинг"
  - section: "Україна на науковій карті світу"
    words: 1000
    subsections:
      - "Космічна галузь України: від КБ 'Південне' до участі в програмі Artemis"
      - "ІТ-аутсорсинг vs продуктові компанії: трансформація сектору"
      - "Наукові парки та інтеграція науки з бізнесом"
    key_concepts:
      - "космонавтика"
      - "інфраструктура"
      - "потенціал"

vocabulary:
  required:
    - інновація
    - алгоритм
    - технологія
    - дослідження
    - інтелект
    - потенціал
    - розробка
    - гіпотеза
  recommended:
    - конвергенція
    - диджиталізація
    - ефективність
    - модернізація
    - автентичність

activities:
  types_required:
