module: c1-041
level: C1
sequence: 41
slug: degrees-of-certainty
version: '2.0'
title: 'Ступені впевненості: Модальність та хеджування'
subtitle: 'Degrees of Certainty: Modality & Hedging'
content_outline:
- section: Вступ та культурний контекст (Introduction and Cultural Context)
  words: 600
  points:
  - Дилема «рубати правду» vs. академічна обережність — розбір культурного сприйняття
    прямоти та перехід до концепції хеджування як ознаки професіоналізму.
  - Філософія «може бути» в українській ментальності — аналіз прислів'я «Може, дощ,
    а може, сніг» як способу уникати конфліктів та залишати простір для маневру.
  - Введення персони Аналітика ризиків — обговорення небезпеки «голослівності» та
    важливості градуювання тверджень у науковому середовищі.
- section: Шкала впевненості та хеджування (Certainty Scale and Hedging)
  words: 1000
  points:
  - 'Повна впевненість (100%): вживання маркерів «безперечно», «безсумнівно», «напевно»
    та їхня роль у створенні переконливості тексту.'
  - 'Градуювання ймовірності (75%-25%): семантичні відтінки між «ймовірно», «скоріш
    за все», «мабуть» та «сумнівно» згідно з вимогами стандарту §4.4.4.'
  - Хеджування як стратегія — як пом'якшувати категоричні твердження в науковому дискурсі,
    щоб відповідати критеріям академічної доброчесності.
- section: 'Граматика: Вставні слова vs. модальні частки (Grammar: Parentheticals
    vs. Particles)'
  words: 900
  points:
  - 'Критичне розрізнення для рівня C1: вставні слова (з комами) проти модальних часток
    «навряд чи», «все-таки», «майже» (без ком).'
  - Аналіз вставних конструкцій згідно зі стандартом §4.3.2 — від простого вираження
    ставлення до складного структурування аргументації.
  - 'Пунктуаційний тренінг: робота з часткою «навряд чи» та правописом виразу «на
    жаль» (завжди окремо) для усунення типових помилок.'
- section: Стилістична точність та авторська позиція (Stylistic Precision and Authorial
    Stance)
  words: 800
  points:
  - 'Подолання калькування «я думаю» — розширення репертуару вступних фраз: «на мою
    думку», «припускаю», «переконаний», «вважаю».'
  - 'Випадки з «однак»: розрізнення сполучника на початку речення (без коми) та вставного
    слова в середині (з комами) для точності висловлювання.'
  - Суб'єктивна vs. об'єктивна модальність — як вибір маркерів впевненості змінює
    сприйняття об'єктивності дослідження.
- section: Практикум аналітика та синтез (Practicum and Synthesis)
  words: 700
  points:
  - Трансформація категоричних тверджень — вправа на переписування «аматорських» тез
    у професійні гіпотези з використанням хеджування.
  - Аналіз автентичного наукового тексту — ідентифікація ступенів впевненості автора
    та обґрунтування вибору модальних засобів.
  - 'Підсумкова рефлексія: створення параграфу наукового стилю на тему ризиків, інтегруючи
    вивчені вставні слова та частки.'
focus: style
pedagogy: Academic
objectives:
- Learner can express precise degrees of certainty using academic markers
- Learner can analyze authorial stance and hedging in authentic texts
- Learner can adjust the force of claims in academic production
grammar:
- Epistemic modality markers
- Hedging strategies in academic discourse
- Scale of certainty (probability)
- Subjective vs. objective modality
immersion: 100
phase: C1.4 Advanced Stylistics & Rhetoric
persona:
  voice: Senior Specialist
  role: Аналітик ризиків
word_target: 4000
vocabulary_hints:
  required:
  - 'безперечно (undoubtedly) — вживається в науковому та публіцистичному стилях;
    кол.: безперечно свідчить, безперечно важливий'
  - 'ймовірно (probably) — висока частотність у наукових текстах; кол.: цілком ймовірно,
    менш ймовірно'
  - 'навряд чи (unlikely) — модальна частка, що НЕ виділяється комами; кол.: навряд
    чи можливо, навряд чи варто'
  - мабуть (perhaps/probably) — універсальний маркер середнього ступеня впевненості,
    вставне слово
  - 'очевидно (obviously) — вживається для підкреслення логічного висновку; кол.:
    цілком очевидно, стає очевидно'
  recommended:
  - безсумнівно (undoubtedly) — формальний синонім до 'безперечно'
  - скоріш за все (most likely) — загальновживаний маркер високої ймовірності
  - припускати (to assume) — академічна альтернатива конструкції 'я думаю'
  - виключено (ruled out) — маркер нульової ймовірності (0% certainty)
  - на мою думку (in my opinion) — стандартна вставна конструкція для вираження авторської
    позиції
