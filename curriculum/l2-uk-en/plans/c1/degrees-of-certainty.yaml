  focus: Прочитайте текст про система засобів вираження модальності в українській мові і дайте відповіді на запитання.
- type: essay-response
  focus: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Градація впевненості: від категоричності до сумніву».'
- type: fill-in
  focus: Вставте правильну граматичну форму у реченнях на тему система засобів вираження модальності в українській мові.
- type: error-correction
  focus: 'Знайдіть і виправте помилки у реченнях на тему градація впевненості: від категоричності до сумніву.'
- type: quiz
  focus: 'Оберіть правильний варіант: лексика та граматика з розділу «Система засобів вираження модальності в українській
    мові».'
- type: match-up
  focus: 'З''єднайте терміни з розділу «Градація впевненості: від категоричності до сумніву» з їхніми визначеннями.'
