module: c1-077
level: C1
sequence: 77
slug: degrees-of-certainty
version: 1.1.1
title: Ступені впевненості та епістемічна модальність
subtitle: Ступені впевненості та епістемічна модальність
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
- Використовувати широкий спектр модальних засобів для вираження різних ступенів впевненості.
- Розуміти прагматичну різницю між засобами хеджування в академічному та професійному дискурсах.
- Аналізувати вплив модальності на стратегію ввічливості та переконуваності.
- Опанувати синтаксичні конструкції, що виражають припущення, ймовірність та достовірність.
reading_situations:
- source_type: аналітичний звіт
  topic: Прогноз розвитку відновлюваної енергетики в Україні на наступне десятиліття.
  key_elements:
  - гіпотеза
  - експертна оцінка
  - ступінь імовірності
  motivation: Вивчення засобів вираження обґрунтованого припущення у науково-технічному тексті.
- source_type: юридичний коментар
  topic: Трактування поняття 'обґрунтована підозра' у кримінальному процесуальному праві.
  key_elements:
  - доказовість
  - презумпція
  - модальні маркери достовірності
  motivation: Аналіз мовних засобів, що розмежовують факт та припущення в правовому полі.
listening_situations:
- media_type: інтерв'ю
  setting: Політичний оглядач дискутує з економістом про можливі наслідки зміни податкового законодавства.
  focus_points:
  - інтонаційні маркери сумніву
  - використання засобів хеджування
  - градація впевненості у відповідях
  motivation: Розвиток навичок розпізнавання прихованої невпевненості або категоричності в усному мовленні.
- media_type: лекція
  setting: Професор філософії пояснює концепцію 'скептицизму' та роль модальності у формуванні знання.
  focus_points:
  - термінологічна модальність
  - структура логічного виводу
  - риторичні фігури припущення
  motivation: Розуміння філософського підґрунтя епістемічної модальності в українській інтелектуальній традиції.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть науково-публіцистичне есе (300-350 слів) на тему: ''Чи може штучний інтелект повністю замінити людину
    в креативних індустріях?''. Використовуйте щонайменше 10 різних модальних маркерів для вираження градації своїх думок.'
  requirements:
  - використання засобів хеджування
  - структурованість аргументації
  - різноманітність вставних конструкцій
  motivation: Відпрацювання навичок вираження власної позиції через призму ймовірності та припущення.
  model_answer: Текст має містити конструкції типу 'цілком імовірно', 'за певних умов', 'є підстави вважати', 'не підлягає
    сумніву'.
content_outline:
- section: Система засобів вираження модальності в українській мові
  words: 1000
  subsections:
  - 'Морфологічні засоби: частки та модальні дієслова'
  - 'Лексичні маркери: вставні слова та словосполучення'
  - 'Синтаксичні структури: складнопідрядні речення з підрядними з''ясувальними'
  key_concepts:
  - епістемічна модальність
  - ассертивність
  - перцептивність
- section: 'Градація впевненості: від категоричності до сумніву'
  words: 1000
  subsections:
  - 'Маркери високого ступеня впевненості: ''безперечно'', ''очевидно'', ''безумовно'''
  - 'Засоби вираження ймовірності: ''мабуть'', ''напевно'', ''імовірно'''
  - 'Конструкції, що позначають невпевненість та припущення: ''навряд чи'', ''здається'', ''можливо'''
  key_concepts:
  - семантична градація
  - суб'єктивність
  - модальна рамка
- section: Хеджування як стратегія академічного письма
  words: 1000
  subsections:
  - 'Функції хеджування: уникнення надмірної категоричності та захист тези'
  - 'Типові помилки: надмірне вживання модальних слів (плеоназм)'
  - Культурна специфіка українського хеджування порівняно з англомовним дискурсом
  key_concepts:
  - хеджування
  - академічна чесність
  - прагматична компетенція
- section: Модальність у професійній та міжособистісній комунікації
  words: 1000
  subsections:
  - Використання модальності для пом'якшення відмови або критики
  - Маніпулятивний потенціал модальних засобів у рекламі та пропаганді
  - 'Модальність та етикет: як бути впевненим, але не грубим'
  key_concepts:
  - мовленнєвий акт
  - комунікативна стратегія
  - дискурс-маркер
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
