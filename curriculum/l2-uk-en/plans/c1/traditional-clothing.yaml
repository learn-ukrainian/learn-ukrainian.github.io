  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: reading
  focus: 'Прочитайте текст про анатомія традиційного строю: від полотна до орнаменту
    і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про регіональне розмаїття: карта
    українського вбрання, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Анатомія традиційного
    строю: від полотна до орнаменту». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему анатомія
    традиційного строю: від полотна до орнаменту.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до анатомія традиційного строю: від полотна до
    орнаменту: Матеріали та техніки: льон, коноплі, вовна, домашнє сукно. Визначте
    спільне та відмінне.'
references:
