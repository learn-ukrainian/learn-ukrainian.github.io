module: c1-109
level: C1
sequence: 109
slug: traditional-clothing
version: 1.2.2
title: 'Український народний костюм: регіональна специфіка та символіка'
subtitle: 'Традиційний костюм: регіональна специфіка'
focus: cultural
pedagogy: workshop
word_target: 4000
objectives:
- Дослідити цілісну структуру українського народного строю як системи 
  взаємопов'язаних елементів.
- Проаналізувати регіональні відмінності вбрання основних етнографічних зон 
  (Полісся, Поділля, Гуцульщина, Полтавщина, Слобожанщина).
- Вивчити термінологію, що стосується поясного, нагрудного та плечового одягу, а
  також головних уборів та взуття.
- Осмислити роль народного костюма у формуванні національної ідентичності та 
  його трансформацію в сучасному культурному контексті.
reading_situations:
- source_type: етнографічне дослідження
  topic: 'Архаїка та новації в українському вбранні: вплив ландшафту та історичних
    процесів на формування регіональних типів.'
  key_elements:
  - поліфункціональність
  - локальна специфіка
  - антропометрія
  - етнокультурний ландшафт
  motivation: Ознайомлення з науковим стилем опису матеріальної культури та 
    специфічною термінологією.
- source_type: художній нарис
  topic: 'Опис святкового вбрання гуцулів у творах Михайла Коцюбинського: естетика
    та магія кольору.'
  key_elements:
  - кептар
  - кресаня
  - топірець
  - черес
  - метафорика
  motivation: Аналіз художніх засобів опису народного побуту та зв'язок 
    літератури з етнографією.
listening_situations:
- media_type: інтерв'ю
  setting: Бесіда з куратором виставки 'Спадщина' у Національному музеї 
    народного декоративного мистецтва.
  focus_points:
  - процес реставрації старовинних речей
  - збереження автентичних технік крою
  - проблема 'шароварщини' в сучасному сприйнятті
  motivation: Розвиток навичок критичного слухання та розуміння фахових дискусій
    про культурну спадщину.
writing_tasks:
- task_type: есе
  prompt: Проаналізуйте шлях українського народного костюма від обов'язкового 
    повсякденного атрибута до символу національного опору та високої моди. Як 
    змінювалися смисли вбрання протягом століть?
  requirements:
  - мінімум 350 слів
  - 'використання термінів: ідентифікація, стилізація, автентика'
  - аргументація з посиланнями на історичний контекст
  motivation: Вміння будувати розгорнуте аналітичне висловлювання на 
    культурологічну тематику.
  model_answer: Текст повинен висвітлювати еволюцію костюма від практичного 
    одягу селян до 'генетичного коду', згадувати роль інтелігенції у збереженні 
    традицій та сучасне переосмислення етно-елементів у світовій моді.
discussion_topics:
- context: У сучасному світі часто виникають дискусії щодо 'культурного 
    привласнення' елементів народного вбрання модними брендами без належного 
    розуміння їхнього значення.
  questions:
  - Чи сприяє комерціалізація народних мотивів популяризації української 
    культури, чи, навпаки, знецінює її сакральний зміст?
  - Де межа між творчим переосмисленням (стилізацією) та несмаком (кітчем)?
  motivation: Розвиток навичок аргументації та ведення дебатів на теми етики в 
    мистецтві та культурі.
content_outline:
- section: 'Анатомія традиційного строю: від полотна до орнаменту'
  words: 1000
  subsections:
  - 'Матеріали та техніки: льон, коноплі, вовна, домашнє сукно'
  - 'Крій та силует: магія прямокутника та функціональність швів'
  - 'Поясний одяг: обгортки, запаски, плахти, спідниці-літописи'
  key_concepts:
  - домоткане полотно
  - прямокутний крій
  - силует
  - фактура
- section: 'Регіональне розмаїття: карта українського вбрання'
  words: 1000
  subsections:
  - 'Стримана архаїка Полісся: геометризм та переважання білого з червоним'
  - 'Полтавщина та Слобожанщина: вишукана біла гладь та багатство парчі'
  - 'Буковинське та Подільське багатобарв''я: бісер, вовна та складні квіткові композиції'
  key_concepts:
  - колористика
  - регіональний канон
  - композиція
  - орнаментика
- section: Чоловічий костюм та військова естетика
  words: 1000
  subsections:
  - 'Козацький вплив: шаровари, жупани, кунтуші як символи статусу'
  - 'Селянське чоловіче вбрання: сорочки, гачі, свити та сіряки'
  - 'Акценти мужності: пояси-череси, шапки-кучми та зброя як елемент строю'
  key_concepts:
  - статусність
  - мілітарний стиль
  - практичність
  - автентичність
- section: 'Сакральна геометрія образу: голови, руки, ноги'
  words: 1000
  subsections:
  - 'Магія жіночого головного убору: намітки, очіпки, хустки та вінкові традиції'
  - 'Світ прикрас: дукачі, коралі, зґарди, гердани як соціальні маркери'
  - 'Взуття: від личаків до сап''янців — що взуття розповідало про господаря?'
  key_concepts:
  - семіотика
  - аксесуари
  - соціальний статус
  - сакральність
- section: Підсумок — Summary
  words: 300
  points:
  - Review the key vocabulary for traditional Ukrainian clothing (стрій), 
    including materials (домоткане полотно, льон, вовна), garment types (плахта,
    шаровари, жупан), and accessories (дукачі, зґарди).
  - "Self-check: What is the main visual difference between the clothing styles of
    Polissya and Podillya? Describe 3 traditional accessories and explain what they
    reveal about a person's social status. What's the difference between a намітка
    and an очіпок?"
vocabulary:
  required:
  - плахта
  - кersetка
  - запаска
  - очіпок
  - намітка
  - жупан
  - черес
  - зґарди
  - дукач
  - автентичність
  recommended:
  - поліфункціональність
  - антропометрія
  - стилізація
  - архаїка
  - сакральність
activities:
  types_required:
  - critical-analysis
  - match-up
  - error-correction
  - highlight-morphemes
