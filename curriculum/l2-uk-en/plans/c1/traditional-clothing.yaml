slug: traditional-clothing
version: '2.0'
title: Традиційний український одяг
subtitle: Traditional Ukrainian Clothing
content_outline:
- section: 'Вступ: Одяг як етнічний маркер та «паспорт» особистості (Introduction:
    Clothing as Ethnic Marker and Personal Passport)'
  words: 600
  points:
  - Традиційний український стрій як складна система соціальних та етнічних кодів,
    що відображає статус, вік та регіональну приналежність.
  - 'Концепція вишивки як «паспорта»: розшифрування орнаментів Полтавщини (техніка
    «білим по білому») та Борщівщини (густа чорна вишивка як символ жалоби).'
  - 'Практичність та логіка народного вбрання: аналіз функціональності елементів та
    відсутності зайвого декору в автентичному костюмі.'
- section: 'Жіночий стрій: Від дівочого вінка до жіночої намітки (Women''s Costume:
    From Maiden Wreath to Woman''s Headdress)'
  words: 1000
  points:
  - 'Основні компоненти: сорочка, спідниця, плахта (картата, шовкова) та запаска.
    Розрізнення понять «вишивка» (результат) та «вишиванка» (виріб).'
  - 'Магія головного убору: ритуал «покривання» та перехід від вінка до очіпка та
    намітки. Табу на «світіння волоссям» для заміжньої жінки.'
  - 'Прикраси як обереги та показник достатку: коралове намисто, дукачі, згарди, низки
    коштовного намиста та сережки.'
  - 'Регіональні особливості жіночого вбрання: порівняння силуетів та декору Полтавщини,
    Поділля та Гуцульщини.'
- section: 'Чоловічий стрій: Міфи та реальність козацького одягу (Men''s Costume:
    Myths and Reality of Cossack Clothing)'
  words: 900
  points:
  - 'Елементи чоловічого вбрання: сорочка, вузькі полотняні штани (гачі, порти) проти
    статусних козацьких шароварів. Розвінчання міфу про «тотальну шароваризацію» селянства.'
  - 'Верхній та обрядовий одяг: жупан, свита, козацький оселедець та кресаня. Роль
    одягу у військовому та весільному контекстах.'
  - 'Символізм пояса: пояс як магічна межа, що розмежовує «верх» (духовне) і «низ»
    (матеріальне). Аналіз поняття «розпоясатися» (втратити сором).'
- section: Аналіз типових помилок та стилістичні тонкощі (Analysis of Common Errors
    and Stylistic Nuances)
  words: 700
  points:
  - 'Корекція лексичних русизмів: використання літературних назв «спідниця» замість
    «юбка» та «сорочка» замість «рубашка».'
  - 'Стилістичне збагачення: вживання терміна «стрій» як синоніма до «костюм» для
    опису цілісного етнографічного ансамблю.'
  - 'Вправа на розрізнення регіональних варіантів: опис костюма за зображенням з використанням
    вивченої термінології та етнографічних маркерів.'
- section: Сучасне відродження та культурний контекст (Modern Revival and Cultural
    Context)
  words: 800
  points:
  - Вишиванка як сучасний символ національної ідентичності та «код нації». Значення
    Всесвітнього дня вишиванки для деколонізації образу українця.
  - 'Традиційні елементи у високій моді та повсякденному житті: від автентичних технік
    до сучасних стилізацій.'
  - Написання есе про роль традиційного одягу у збереженні історичної пам'яті та його
    трансформацію у світовій культурі.
focus: cultural
pedagogy: CBI
objectives:
- Learner can describe the elements of traditional Ukrainian costume
- Learner can explain the symbolism of embroidery and accessories
- Learner can distinguish regional variations (Poltava vs. Hutsul vs. Podillia)
- Learner can discuss the modern interpretation of traditional clothing
grammar:
- ethnographic terminology
- descriptions of appearance
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Реконструктор одягу
word_target: 4000
vocabulary_hints:
  required:
  - вишиванка (vyshyvanka) — одягнути вишиванку, орнамент вишиванки, код нації; висока
    частотність
  - плахта (plakhta) — картата плахта, шовкова плахта, підперезатися плахтою; середньочастотне,
    етнографічне
  - очіпок (ochipok) — одягнути очіпок, заміжня жінка в очіпку; історичне, головний
    убір
  - намисто (namysto) — коралове намисто, низка намиста, дукачі; середньочастотне,
    прикраси
  - шаровари (sharovary) — козацькі шаровари, широкі шаровари; висока частотність,
    враховувати контекст «шароварщини»
  - крайка (kraika) — ткана крайка, барвиста крайка; низька частотність, діалектне/специфічне
  recommended:
  - стрій (costume/outfit) — традиційний стрій, повний стрій; стилістично вишуканий
    синонім до «костюм»
  - намітка (namitka) — біла намітка, покрити голову наміткою; історичний жіночий
    головний убір
  - згарди (zhardy) — гуцульські згарди; специфічна назва обрядових прикрас
  - свита (svyta) — довга свита, сіра свита; традиційний верхній одяг
  - розпоясатися (to lose self-control) — фразеологізм, що походить від важливості
    пояса в одязі
