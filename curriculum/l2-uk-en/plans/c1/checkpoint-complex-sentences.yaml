module: c1-052
level: C1
sequence: 52
slug: checkpoint-complex-sentences
version: '1.0'
title: "Контроль знань: Складне речення в академічному дискурсі"
subtitle: "Checkpoint: Complex Sentences in Academic Discourse"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Систематизувати знання про типи складних речень та їх функціонування у наукових текстах."
  - "Перевірити вміння будувати складні синтаксичні конструкції з різними видами зв'язку."
  - "Оцінити навички редагування текстів з порушенням синтаксичних норм."
  - "Підтвердити здатність використовувати складні речення для вираження причиново-наслідкових зв'язків у аргументації."

reading_situations:
  - source_type: "наукова доповідь"
    topic: "Аналіз соціолінгвістичної ситуації в Україні початку XXI століття."
    key_elements: ["складні речення з сурядністю та підрядністю", "когерентність", "логічні конектори"]
    motivation: "Перевірка розуміння складної архітектоніки наукового тексту."

listening_situations:
  - media_type: "лекція"
    setting: "Фрагмент лекції Юрія Шевельова про історичний синтаксис української мови."
    focus_points: ["структурні особливості речень", "аргументація", "термінологія"]
    motivation: "Оцінка здатності сприймати на слух складні інтелектуальні конструкції."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть критичний відгук на наукову статтю, присвячену питанням європейської інтеграції України, використовуючи складні речення для деталізації аргументів."
    requirements: ["мінімум 400 слів", "використання щонайменше 10 складних речень різних типів", "дотримання академічного етикету"]
    motivation: "Фінальна перевірка продуктивних навичок володіння складним синтаксисом."
    model_answer: "Текст має бути структурно досконалим, з чітким вираженням умови, мети та допустовості через відповідні сполучні засоби."

discussion_topics:
  - context: "Чи є складний синтаксис ознакою інтелектуальної елітарності мови?"
    questions:
      - "Чому академічний стиль уникає простих речень?"
      - "Як надмірна складність синтаксису впливає на комунікативну ефективність?"
      - "Чи може штучний інтелект адекватно відтворювати складні українські синтагми?"
    motivation: "Рефлексія над роллю синтаксичної складності у професійному спілкуванні."

content_outline:
  - section: "Складне речення: структура та семантична цілісність"
    words: 1000
    subsections:
      - "Систематизація сполучникових та безсполучникових зв'язків"
      - "Семантико-синтаксичні відношення у складнопідрядному реченні"
      - "Ієрархія предикативних частин у багатокомпонентних конструкціях"
    key_concepts:
      - "предикативність"
      - "ієрархія"
      - "семантична валентність"
  - section: "Синтаксис аргументації та доведення"
    words: 1000
    subsections:
      - "Речення причини та наслідку як база наукового висновку"
      - "Умовні та допустові конструкції в гіпотетичному дискурсі"
      - "Використання пояснювальних речень для уточнення понять"
    key_concepts:
      - "казуальність"
      - "гіпотетичність"
      - "експлікація"
  - section: "Культура синтаксису: редагування та норма"
    words: 1000
    subsections:
      - "Типові помилки у побудові складних речень (нанизування підрядних, розрив зв'язку)"
      - "Пунктуаційна норма у реченнях з різними видами зв'язку"
      - "Стилістичне редагування: перетворення складного на просте і навпаки"
    key_concepts:
      - "синтаксична помилка"
      - "пунктограма"
      - "трансформація"
  - section: "Текстотвірна функція складного синтаксису"
    words: 1000
    subsections:
      - "Складне речення як засіб логічного переходу між абзацами"
      - "Ритмомелодика наукового періоду"
      - "Конденсація смислу через складні синтаксичні фігури"
    key_concepts:
      - "когезія"
      - "період"
      - "інтонаційний малюнок"

vocabulary:
  required:
    - ієрархія
    - зумовленість
    - наслідок
    - кореляція
    - трансформація
    - ідентифікація
    - інтерпретація
    - аргумент
  recommended:
    - дедукція
    - індукція
    - верифікованість
    - концептуальність
    - стратегія

activities:
