module: c1-047
level: C1
sequence: 47
slug: checkpoint-complex-sentences
version: '2.0'
title: Контрольна точка C1.4
subtitle: Checkpoint - Complex Sentences
content_outline:
- section: 'Тест: класифікація складних речень'
  words: 800
  points:
  - 'Визначення типу складного речення за прикладами: сурядне, підрядне, безсполучникове,
    комбіноване.'
  - 'Визначення підтипів підрядних речень: з''ясувальне, означальне, обставинне.'
  - 'Класифікація безсполучникових речень за семантичними відношеннями.'
- section: 'Тест: пунктуація'
  words: 800
  points:
  - 'Розставити розділові знаки в складних реченнях різних типів.'
  - 'Пунктуація при збігу сполучників, при однорідних підрядних.'
  - 'Крапка з комою, тире та двокрапка в складних реченнях.'
- section: 'Тест: підрядні речення'
  words: 700
  points:
  - 'Визначення типу підрядного речення за сполучниковим засобом.'
  - 'Доповнення складнопідрядних речень підрядними частинами.'
  - 'Послідовне та паралельне підпорядкування.'
- section: 'Тест: безсполучникове та комбіноване'
  words: 700
  points:
  - 'Визначення семантичних відношень у безсполучникових реченнях.'
  - 'Аналіз структури комбінованих речень: типи зв''язку між частинами.'
  - 'Побудова схем комбінованих речень.'
- section: 'Тест: стилістичне вживання'
  words: 500
  points:
  - 'Добір реєстрово доречного типу складного речення для заданого стилю.'
  - 'Стилістична мотивація вибору між сурядністю, підрядністю та безсполучниковістю.'
- section: 'Комплексне завдання: аналіз та створення тексту'
  words: 500
  points:
  - 'Аналіз складних речень в автентичному тексті: класифікація, пунктуація, стилістика.'
  - 'Написання оригінального тексту з використанням усіх типів складних речень.'
focus: grammar
pedagogy: TTT
objectives:
- 'Продемонструвати здатність класифікувати всі типи складних речень.'
- 'Безпомилково розставляти розділові знаки в складних конструкціях.'
- 'Аналізувати стилістичну роль різних типів складних речень.'
grammar:
- 'Класифікація складних речень: усі типи та підтипи'
- 'Пунктуація складних речень: кома, тире, двокрапка, крапка з комою'
- 'Стилістичне використання складних речень у різних регістрах'
phase: C1.4 [Complex Sentences]
persona:
  voice: Senior Specialist
  role: Екзаменатор-синтаксист
word_target: 4000
vocabulary_hints:
  required:
  - 'контрольна точка (checkpoint) — підсумкова перевірка засвоєних знань'
  - 'синтаксис (syntax) — розділ граматики про будову речення'
  - 'класифікація (classification) — розподіл за типами'
  - 'аналіз (analysis) — детальний розбір мовних явищ'
activity_hints:
