module: c1-063
level: C1
sequence: 63
slug: checkpoint-complex-sentences
version: 1.1.1
title: 'Контроль знань: Складне речення в академічному дискурсі'
subtitle: 'Підсумковий контроль: складні речення в академічному дискурсі'
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
- Систематизувати знання про типи складних речень та їх функціонування у наукових текстах.
- Перевірити вміння будувати складні синтаксичні конструкції з різними видами зв'язку.
- Оцінити навички редагування текстів з порушенням синтаксичних норм.
- Підтвердити здатність використовувати складні речення для вираження причиново-наслідкових зв'язків у аргументації.
reading_situations:
- source_type: наукова доповідь
  topic: Аналіз соціолінгвістичної ситуації в Україні початку XXI століття.
  key_elements:
  - складні речення з сурядністю та підрядністю
  - когерентність
  - логічні конектори
  motivation: Перевірка розуміння складної архітектоніки наукового тексту.
listening_situations:
- media_type: лекція
  setting: Фрагмент лекції Юрія Шевельова про історичний синтаксис української мови.
  focus_points:
  - структурні особливості речень
  - аргументація
  - термінологія
  motivation: Оцінка здатності сприймати на слух складні інтелектуальні конструкції.
writing_tasks:
- task_type: відгук
  prompt: Напишіть критичний відгук на наукову статтю, присвячену питанням європейської інтеграції України, використовуючи
    складні речення для деталізації аргументів.
  requirements:
  - мінімум 400 слів
  - використання щонайменше 10 складних речень різних типів
  - дотримання академічного етикету
  motivation: Фінальна перевірка продуктивних навичок володіння складним синтаксисом.
  model_answer: Текст має бути структурно досконалим, з чітким вираженням умови, мети та допустовості через відповідні сполучні
    засоби.
discussion_topics:
- context: Чи є складний синтаксис ознакою інтелектуальної елітарності мови?
  questions:
  - Чому академічний стиль уникає простих речень?
  - Як надмірна складність синтаксису впливає на комунікативну ефективність?
  - Чи може штучний інтелект адекватно відтворювати складні українські синтагми?
  motivation: Рефлексія над роллю синтаксичної складності у професійному спілкуванні.
content_outline:
- section: 'Складне речення: структура та семантична цілісність'
  words: 1000
  subsections:
  - Систематизація сполучникових та безсполучникових зв'язків
  - Семантико-синтаксичні відношення у складнопідрядному реченні
  - Ієрархія предикативних частин у багатокомпонентних конструкціях
  key_concepts:
  - предикативність
  - ієрархія
  - семантична валентність
- section: Синтаксис аргументації та доведення
  words: 1000
  subsections:
  - Речення причини та наслідку як база наукового висновку
  - Умовні та допустові конструкції в гіпотетичному дискурсі
  - Використання пояснювальних речень для уточнення понять
  key_concepts:
  - казуальність
  - гіпотетичність
  - експлікація
- section: 'Культура синтаксису: редагування та норма'
  words: 1000
  subsections:
  - Типові помилки у побудові складних речень (нанизування підрядних, розрив зв'язку)
  - Пунктуаційна норма у реченнях з різними видами зв'язку
  - 'Стилістичне редагування: перетворення складного на просте і навпаки'
  key_concepts:
  - синтаксична помилка
  - пунктограма
  - трансформація
- section: Текстотвірна функція складного синтаксису
  words: 1000
  subsections:
  - Складне речення як засіб логічного переходу між абзацами
  - Ритмомелодика наукового періоду
  - Конденсація смислу через складні синтаксичні фігури
  key_concepts:
  - когезія
  - період
  - інтонаційний малюнок
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
  - ієрархія
  - зумовленість
  - наслідок
  - кореляція
  - трансформація
  - ідентифікація
  - інтерпретація
  - аргумент
  recommended:
  - дедукція
  - індукція
  - верифікованість
  - концептуальність
  - стратегія
activity_hints:
- type: reading
  focus: 'Прочитайте текст про складне речення: структура та семантична цілісність і дайте відповіді на запитання щодо ключових
    понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про синтаксис аргументації та доведення, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Складне речення: структура та семантична цілісність». Обґрунтуйте
    свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему складне речення: структура та семантична цілісність.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до складне речення: структура та семантична цілісність: Систематизація сполучникових та
    безсполучникових зв''язків. Визначте спільне та відмінне.'
