module: c1-011
level: C1
sequence: 11
slug: counterarguments
version: '1.1'
title: "Робота з контраргументами та спростування"
subtitle: "Контраргументи та спростування"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Навчитися ідентифікувати та аналізувати контраргументи в складних академічних
    текстах."
  - "Опанувати стратегії 'ввічливого спростування' та визнання слушності аргументів
    опонента (концесія)."
  - "Вивчити специфічні мовні конструкції для введення протилежної точки зору та її
    нейтралізації."
  - "Розвинути культуру ведення наукової полеміки на засадах взаємоповаги та логічної
    доказовості."

reading_situations:
  - source_type: "фрагмент наукової полеміки"
    topic: "Дискусія про доцільність переходу української мови на латиницю: аргументи
      'за' і 'проти'."
    key_elements: ["теза опонента", "логічне спростування", "дискурсивні маркери допустовості"]
    motivation: "Аналіз реальної полеміки в українському інтелектуальному просторі
      з використанням засобів аргументації та спростування."
  - source_type: "літературна критика"
    topic: "Різні інтерпретації образу Мазепи в українській та європейській літературах."
    key_elements: ["зіставлення поглядів", "критика джерел", "синтез позицій"]
    motivation: "Вивчення способів роботи з альтернативними історичними та літературними
      наративами."

listening_situations:
  - media_type: "відео"
    setting: "Запис телевізійних дебатів на тему культурної політики України."
    focus_points: ["техніки реагування на критику", "використання допустових конструкцій",
      "інтонаційні маркери ввічливої незгоди"]
    motivation: "Розпізнавання стратегій роботи з контраргументами в динамічному усному
      дискурсі."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть відповідь на критичну статтю (200-250 слів), яка заперечує важливість
      вивчення класичної літератури в школі. Використайте стратегію концесії (визнання
      частини правди опонента) та наступного спростування."
    requirements: ["використання фразеології полеміки", "логічна переконливість",
      "академічний етикет"]
    motivation: "Тренування навичок цивілізованої та ефективної полеміки в письмовому
      форматі."
    model_answer: "Текст повинен демонструвати вживання таких конструкцій, як 'хоча
      не можна не погодитися з...', 'водночас варто зауважити...', 'на противагу цьому
      твердженню...'."

content_outline:
  - section: "Структура полемічного тексту"
    words: 1000
    subsections:
      - "Передбачення заперечень: чому важливо знати позицію опонента"
      - "Модель полемічного абзацу: введення контраргументу - оцінка - спростування"
      - "Логічні помилки у спростуванні та як їх уникати"
    key_concepts:
      - "полеміка"
      - "антитеза"
      - "спростування"
  - section: "Мова допустовості"
    words: 1000
    subsections:
      - "Визнання слушності аргументів опонента: 'певною мірою', 'безумовно', 'слід
        визнати'"
      - "Часткова згода як риторичний прийом: 'незважаючи на слушність зауваження,
        все ж...'"
      - "Перехід від згоди до заперечення: 'проте', 'водночас', 'з іншого боку'"
    key_concepts:
      - "концесія"
      - "мітигація"
      - "риторична стратегія"
  - section: "Техніки та мовні засоби спростування"
    words: 1000
    subsections:
      - "Пряме спростування: заперечення фактів, вказування на суперечності"
      - "Непряме спростування: доведення до абсурду, пропонування альтернативи"
      - "Лексика спростування: 'спростовувати', 'заперечувати', 'викликати сумнів',
        'бути безпідставним'"
    key_concepts:
      - "верифікація"
      - "аргумент до логіки"
      - "деконструкція"
  - section: "Етика наукової та публічної дискусії"
    words: 1000
    subsections:
      - "Принципи академічного етикету в полеміці"
      - "Уникнення персональних випадів (ad hominem) та фокус на змісті"
      - "Формули ввічливої незгоди в українській мовленнєвій культурі"
    key_concepts:
      - "академічний етикет"
      - "толерантність"
      - "культура мовлення"

vocabulary:
  required:
    - спростовувати
    - заперечувати
    - незважаючи на
    - суперечливий
    - безпідставний
    - аргументація
    - попри
    - водночас
  recommended:
    - альтернативний
    - переконливий
    - дискусійний
    - визнавати
    - правомірний

activity_hints:
  - type: reading
    focus: "Прочитайте текст про структура полемічного тексту і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про мова допустовості, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Структура полемічного тексту». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему структура полемічного тексту."
  - type: comparative-study
    focus: "Порівняйте різні підходи до структура полемічного тексту: Передбачення заперечень: чому важливо знати позицію опонента. Визначте спільне та відмінне."

activities:
  types_required:
    - critical-analysis
    - error-correction
    - match-up
    - essay-response
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Ворон, 11 клас (2019): с. 58-60 — Дискусія, полеміка"
  - "Глазова, 11 клас (2019): §1-10 — Культура мовлення"
  - "Заболотний, 11 клас (2019): Мовленнєві жанри"

connects_to:
  previous: "thesis-development"
  next:
phase: C1.1 [Academic Foundation]
