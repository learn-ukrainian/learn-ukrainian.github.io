module: c1-010
level: C1
sequence: 10
slug: counterarguments
version: '2.0'
title: Контраргументи та спростування
content_outline:
- section: Вступ — Мистецтво інтелектуальної дискусії (Introduction — The Art of Intellectual
    Discussion)
  words: 500
  points:
  - Чому контраргумент є ознакою критичного мислення та академічної зрілості згідно
    з Держстандартом (§4.4.6)
  - 'Концепція «інтелектуальної доброчесності» (intellectual charity): представлення
    аргументу опонента в його найсильнішій формі перед спростуванням'
  - 'Етичні межі наукової полеміки: як уникнути переходу на особистості (Ad hominem)
    та підтримувати повагу до опонента'
- section: 'Традиція української полеміки: від Вишенського до Хвильового (Tradition
    of Ukrainian Polemics: From Vyshenskyi to Khvylovyi)'
  words: 800
  points:
  - 'Історичний екскурс: вогненна риторика Івана Вишенського в релігійних полеміках
    XVI-XVII століть як фундамент української традиції переконання'
  - 'Літературна дискусія 1925-1928 років: як контраргументи Миколи Хвильового («Геть
    від Москви!») змінили вектор національного розвитку'
  - 'Аналіз риторичних стратегій у протистоянні Хвильового та Пилипенка: від заперечення
    релевантності до викриття ідеологічних маніпуляцій'
- section: Мовні конструкції визнання та поступки (Linguistic Structures of Acknowledgment
    and Concession)
  words: 900
  points:
  - Складнопідрядні речення з допустовими відношеннями (хоча..., проте...; незважаючи
    на те що...) згідно з Держстандартом (§4.3.4.1)
  - 'Моделі часткового визнання правоти опонента: «Справді, не можна заперечувати,
    що...», «Ваша позиція має раціональне зерно, однак...»'
  - 'Корекція «голого заперечення»: перехід від категоричного «Я не згоден» до конструкцій
    «Я розумію вашу думку, але...»'
- section: Техніки спростування та логічні пастки (Refutation Techniques and Logical
    Traps)
  words: 900
  points:
  - 'Класифікація спростувань: заперечення факту (хибне твердження), заперечення релевантності
    та виявлення недостатності доказів'
  - 'Детальний розбір логічної помилки «Опудало» (Straw Man): як спотворення позиції
    опонента руйнує конструктивність дискусії'
  - 'Урізноманітнення вставних слів (§4.4.4): подолання кальки з англійської «however»
    через використання «Водночас», «З іншого боку», «Попри це»'
- section: 'Практика академічних дебатів: етика та переконання (Academic Debate Practice:
    Ethics and Persuasion)'
  words: 900
  points:
  - 'Алгоритм побудови комплексного аргументу: Теза — Доказ — Контраргумент — Спростування
    — Резюме'
  - 'Регістрова відповідність у дебатах: заміна розмовного «брехня» на академічні
    «хибне твердження», «маніпуляція» або «невідповідність фактам»'
  - 'Фінальна вправа: написання параграфу з інтеграцією протилежної думки та її етичним
    спростуванням для наукової статті'
vocabulary_hints:
  required:
  - контраргумент (counterargument) — вагомий, сильний контраргумент; навести контраргумент
  - спростування (refutation) — переконливе спростування; офіційне спростування міфів;
    спростування фактів
  - визнання (acknowledgment) — визнання правоти, часткове визнання, визнання факту
  - заперечення (objection) — категоричне заперечення; не викликає заперечень; висловити
    заперечення
  - релевантність (relevance) — втратити релевантність; сумнівна релевантність; довести
    релевантність
  - достатність (sufficiency) — достатність доказів; перевірка на достатність
  - логічна помилка (logical fallacy) — припуститися помилки; виявити логічну помилку
  - опонент (opponent) — гідний опонент; повага до опонента
  - позиція (position) — обґрунтована позиція; непохитна позиція; змінити позицію
  - переконливість (persuasiveness) — сила переконливості; бракує переконливості
  recommended:
  - хибне твердження (false statement) — академічний еквівалент слова «брехня» у дискусії
  - Опудало (Straw Man) — назва логічної помилки, що полягає у викривленні аргументів
    опонента
  - інтелектуальна доброчесність (intellectual charity) — принцип максимально чесного
    тлумачення поглядів опонента
  - полеміка (polemics) — гостра полеміка; вступати в полеміку
  - допустова конструкція (concessive construction) — граматична структура для вираження
    поступки (хоча..., проте...)
  - софізм (sophism) — використання хибних аргументів для навмисного введення в оману
  - демагогія (demagoguery) — використання маніпулятивних технік замість логічної
    аргументації
