title: 'Контрольна точка: Образотворче мистецтво, музика, балет'
subtitle: 'Підсумковий контроль: образотворче мистецтво та виконавські мистецтва'
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
- 'Перевірити та систематизувати знання про українське образотворче мистецтво: від ікони до авангарду.'
- Оцінити розуміння класичної та сучасної музики, балету та виконавських мистецтв.
- 'Підтвердити навички мистецтвознавчого аналізу: опис, інтерпретація, оцінка.'
- Продемонструвати вміння обговорювати мистецтво на високому академічному рівні.
reading_situations:
- source_type: мистецтвознавча стаття
  topic: 'Українське мистецтво ХХ століття: від авангарду через соцреалізм до постмодернізму.'
  key_elements:
  - авангард
  - соцреалізм
  - андеграунд
  - постмодернізм
  motivation: Контрольне читання для перевірки мистецтвознавчої термінології.
- source_type: рецензія
  topic: 'Рецензія на виставу чи концерт: аналіз структури та мовних засобів.'
  key_elements:
  - критичний аналіз
  - оціночна лексика
  - фахова термінологія
  motivation: Перевірка навичок аналітичного читання мистецького дискурсу.
listening_situations:
- media_type: аудіогід
  setting: Фрагмент аудіоекскурсії по Національному художньому музеї України.
  focus_points:
  - мистецтвознавча термінологія
  - описова лексика
  - хронологія
  motivation: Контрольне аудіювання мистецького дискурсу.
writing_tasks:
- task_type: мистецтвознавче есе
  prompt: Оберіть одного українського митця (художник, композитор, хореограф) і напишіть есе (300-350 слів) про його внесок
    у світове мистецтво.
  requirements:
  - фахова термінологія
  - конкретні приклади творів
  - аргументована оцінка значення
  motivation: Синтез знань про українське мистецтво.
  model_answer: Текст має демонструвати знання біографічного контексту, вміння описувати та аналізувати конкретні твори, оцінювати
    їх значення.
discussion_topics:
- context: 'Українське мистецтво: між національною традицією та світовим контекстом.'
  questions:
  - Чому український авангард (Малевич, Архипенко, Екстер) так мало відомий як саме український?
  - Як війна впливає на сучасне українське мистецтво?
  motivation: Підсумкова дискусія про місце українського мистецтва у світі.
