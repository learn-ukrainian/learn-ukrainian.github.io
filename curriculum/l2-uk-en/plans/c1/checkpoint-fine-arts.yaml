activity_hints:
- type: reading
  focus: 'Прочитайте текст про образотворче мистецтво: підсумковий огляд і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про класична та сучасна музика, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Образотворче мистецтво: підсумковий огляд». Обґрунтуйте свою
    позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему образотворче мистецтво: підсумковий огляд.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до образотворче мистецтво: підсумковий огляд: Від ікони до станкового живопису: еволюція
    українського мистецтва. Визначте спільне та відмінне.'
