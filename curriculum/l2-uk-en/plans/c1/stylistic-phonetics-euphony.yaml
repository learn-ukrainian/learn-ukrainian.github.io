module: c1-071
level: C1
sequence: 71
slug: stylistic-phonetics-euphony
version: '1.0'
title: "Стилістична фонетика: милозвучність, ритм, звуковий символізм"
subtitle: "Стилістична фонетика: евфонія та звуковий символізм"
focus: integration
pedagogy: TTT
word_target: 4000
objectives:
  - "Поглибити знання про українську милозвучність (евфонію) як системне явище:
    чергування у/в, і/й, з/із/зі та їх стилістичні ефекти."
  - "Опанувати поняття ритму прозового тексту та його зв'язок із фонетичною
    організацією."
  - "Дослідити звуковий символізм (фоносемантику) та його роль у поезії, рекламі,
    ораторстві."
  - "Навчитися свідомо використовувати фонетичні засоби для підвищення виразності
    власних текстів."

reading_situations:
  - source_type: "поетичний текст"
    topic: "Звуковий символізм у поезії Тичини та Стуса: порівняльний аналіз."
    key_elements: ["фоносемантика", "алітерація", "асонанс", "дисонанс"]
    motivation: "Аналіз звукової архітектоніки поетичних текстів різних епох."
  - source_type: "лінгвістична стаття"
    topic: "Фонотактичні закономірності української мови та їх стилістичне значення."
    key_elements: ["евфонія", "фонотактика", "дистрибуція звуків"]
    motivation: "Науковий погляд на фонетичні закономірності."

listening_situations:
  - media_type: "аудіо"
    setting: "Декламація поезій з яскравим звукописом: порівняння Тичини
      ('Сонячні кларнети') та Стуса ('Палімпсести')."
    focus_points: ["інтонація", "звукові повтори", "ритм", "паузація"]
    motivation: "Вивчення звукової організації тексту через аудіосприйняття."

writing_tasks:
  - task_type: "творче завдання"
    prompt: "Напишіть два мініатюрні тексти (по 100-150 слів): один — з навмисним
      використанням алітерації та евфонії (гармонія), другий — зі свідомим порушенням
      милозвучності (дисонанс). Поясніть стилістичний ефект."
    requirements: ["контраст між текстами", "не менше 3 прикладів алітерації в
      першому тексті", "пояснення ефекту"]
    motivation: "Практичне застосування фоностилістичних засобів."
    model_answer: "Перший текст має звучати мелодійно (чергування голосних і приголосних),
      другий — різко і некомфортно (збіги приголосних, каркаючі звуки)."

discussion_topics:
  - context: "Милозвучність: об'єктивна властивість мови чи суб'єктивне сприйняття?"
    questions:
      - "Чи справді українська мова об'єктивно 'милозвучніша' за інші? Які лінгвістичні
        факти підтримують чи спростовують цю тезу?"
      - "Як рекламісти використовують звуковий символізм для створення назв брендів?"
    motivation: "Критичний аналіз уявлень про фонетичну естетику."

content_outline:
  - section: "Евфонія як система: закони милозвучності"
    words: 1000
    subsections:
      - "Чергування у/в, і/й, з/із/зі: правила та стилістичні порушення"
      - "Уникнення збігу голосних (зяяння) та збігу приголосних"
      - "Милозвучність як типологічна ознака української фонотактики"
    key_concepts:
      - "евфонія"
      - "чергування"
      - "фонотактика"
  - section: "Ритм прозового тексту"
    words: 1000
    subsections:
      - "Поняття прозового ритму: чергування наголошених і ненаголошених складів"
      - "Синтаксичний ритм: довжина фраз, паралелізм, період"
      - "Ритм як засіб організації ораторського тексту"
    key_concepts:
      - "ритм"
      - "період"
      - "паралелізм"
  - section: "Звукопис: алітерація, асонанс, ономатопея"
    words: 1000
    subsections:
      - "Алітерація як повтор приголосних: функції в поезії та прозі"
      - "Асонанс як повтор голосних: створення настрою"
      - "Ономатопея та звуконаслідування в українській мові"
    key_concepts:
      - "алітерація"
      - "асонанс"
      - "звукопис"
  - section: "Звуковий символізм та фоносемантика"
    words: 1000
    subsections:
      - "Зв'язок між звучанням та значенням: 'світлі' та 'темні' голосні"
      - "Звуковий символізм у поезії: Тичина, Стус, Костенко"
      - "Прикладна фоносемантика: нейміг, реклама, ораторське мистецтво"
    key_concepts:
      - "символізм"
      - "фоносемантика"
      - "ономатопея"

vocabulary:
  required:
    - милозвучність
    - евфонія
    - алітерація
    - асонанс
    - звукопис
    - ритм
    - символізм
    - фонотактика
  recommended:
    - ономатопея
    - дисонанс
    - паралелізм
    - фоносемантика
    - зяяння

activity_hints:
  - type: error-correction
    description: "Fix euphony violations in sentences — restore correct alternations
      у/в, і/й, з/із/зі according to Ukrainian phonotactic rules."
  - type: select
    description: "Identify the phonetic stylistic device in each example: alliteration,
      assonance, onomatopoeia, or deliberate cacophony."
  - type: critical-analysis
    description: "Compare sound organization in poems by Тичина and Стус — analyze
      how each poet uses phonetic devices to create contrasting moods."
  - type: comparative-study
    description: "Match types of euphony rules (чергування у/в, і/й, з/із/зі, уникнення
      збігу голосних) with example sentences and corrections."
  - type: essay-response
    description: "Write a short prose miniature (100-150 words) on a given theme,
      deliberately employing alliteration and euphony for stylistic effect."

activities:
  types_required:
    - error-correction
    - select
    - critical-analysis
    - match-up
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §19 — Милозвучність української мови"
  - "Глазова, 11 клас (2019): §40 — Стилістичне забарвлення: фоностилістика"
  - "Авраменко, 11 клас (2019): Стилістична норма — фонетичні засоби"
  - "State Standard 2024: §4.4.2 — Стилістична фонетика: евфонія, ритм, звуковий символізм"

connects_to:
  previous: "fonetychni-stylistychni-zasoby"
  next: "morfolohichni-stylistychni-zasoby"
