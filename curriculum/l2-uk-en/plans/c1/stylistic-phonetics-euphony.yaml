module: c1-071
level: C1
sequence: 71
slug: stylistic-phonetics-euphony
version: 1.0.2
title: 'Стилістична фонетика: милозвучність, ритм, звуковий символізм'
subtitle: 'Стилістична фонетика: евфонія та звуковий символізм'
focus: integration
pedagogy: TTT
word_target: 4000
objectives:
- 'Поглибити знання про українську милозвучність (евфонію) як системне явище: чергування
  у/в, і/й, з/із/зі та їх стилістичні ефекти.'
- Опанувати поняття ритму прозового тексту та його зв'язок із фонетичною 
  організацією.
- Дослідити звуковий символізм (фоносемантику) та його роль у поезії, рекламі, 
  ораторстві.
- Навчитися свідомо використовувати фонетичні засоби для підвищення виразності 
  власних текстів.
reading_situations:
- source_type: поетичний текст
  topic: 'Звуковий символізм у поезії Тичини та Стуса: порівняльний аналіз.'
  key_elements:
  - фоносемантика
  - алітерація
  - асонанс
  - дисонанс
  motivation: Аналіз звукової архітектоніки поетичних текстів різних епох.
- source_type: лінгвістична стаття
  topic: Фонотактичні закономірності української мови та їх стилістичне 
    значення.
  key_elements:
  - евфонія
  - фонотактика
  - дистрибуція звуків
  motivation: Науковий погляд на фонетичні закономірності.
listening_situations:
- media_type: аудіо
  setting: 'Декламація поезій з яскравим звукописом: порівняння Тичини (''Сонячні
    кларнети'') та Стуса (''Палімпсести'').'
  focus_points:
  - інтонація
  - звукові повтори
  - ритм
  - паузація
  motivation: Вивчення звукової організації тексту через аудіосприйняття.
writing_tasks:
- task_type: творче завдання
  prompt: 'Напишіть два мініатюрні тексти (по 100-150 слів): один — з навмисним використанням
    алітерації та евфонії (гармонія), другий — зі свідомим порушенням милозвучності
    (дисонанс). Поясніть стилістичний ефект.'
  requirements:
  - контраст між текстами
  - не менше 3 прикладів алітерації в першому тексті
  - пояснення ефекту
  motivation: Практичне застосування фоностилістичних засобів.
  model_answer: Перший текст має звучати мелодійно (чергування голосних і 
    приголосних), другий — різко і некомфортно (збіги приголосних, каркаючі 
    звуки).
discussion_topics:
- context: 'Милозвучність: об''єктивна властивість мови чи суб''єктивне сприйняття?'
  questions:
  - Чи справді українська мова об'єктивно 'милозвучніша' за інші? Які 
    лінгвістичні факти підтримують чи спростовують цю тезу?
  - Як рекламісти використовують звуковий символізм для створення назв брендів?
  motivation: Критичний аналіз уявлень про фонетичну естетику.
content_outline:
- section: 'Евфонія як система: закони милозвучності'
  words: 1000
  subsections:
  - 'Чергування у/в, і/й, з/із/зі: правила та стилістичні порушення'
  - Уникнення збігу голосних (зяяння) та збігу приголосних
  - Милозвучність як типологічна ознака української фонотактики
  key_concepts:
  - евфонія
  - чергування
  - фонотактика
- section: Ритм прозового тексту
  words: 1000
  subsections:
  - 'Поняття прозового ритму: чергування наголошених і ненаголошених складів'
  - 'Синтаксичний ритм: довжина фраз, паралелізм, період'
  - Ритм як засіб організації ораторського тексту
  key_concepts:
  - ритм
  - період
  - паралелізм
- section: 'Звукопис: алітерація, асонанс, ономатопея'
  words: 1000
  subsections:
  - 'Алітерація як повтор приголосних: функції в поезії та прозі'
  - 'Асонанс як повтор голосних: створення настрою'
  - Ономатопея та звуконаслідування в українській мові
  key_concepts:
  - алітерація
  - асонанс
  - звукопис
- section: Звуковий символізм та фоносемантика
  words: 1000
  subsections:
  - 'Зв''язок між звучанням та значенням: ''світлі'' та ''темні'' голосні'
  - 'Звуковий символізм у поезії: Тичина, Стус, Костенко'
  - 'Прикладна фоносемантика: нейміг, реклама, ораторське мистецтво'
  key_concepts:
  - символізм
  - фоносемантика
  - ономатопея
- section: Підсумок — Summary
  words: 300
  points:
  - "Ukrainian euphony (милозвучність) relies on strict alternation rules to prevent
    vowel and consonant clashes: у/в, і/й, з/із/зі. Self-check: When must you use
    'у' instead of 'в'? Correct the euphony error in the phrase 'Він пішов в школу'."
  - 'Sound writing (звукопис) uses alliteration (repeating consonants) and assonance
    (repeating vowels) to create rhythm and mood, while phonosemantics links sound
    to meaning. Self-check: What is the difference between alliteration and assonance?
    Identify the phonetic devices used in 3 lines of your favorite Ukrainian poem.'
vocabulary:
  required:
  - милозвучність
  - евфонія
  - алітерація
  - асонанс
  - звукопис
  - ритм
  - символізм
  - фонотактика
  recommended:
  - ономатопея
  - дисонанс
  - паралелізм
  - фоносемантика
  - зяяння
activity_hints:
- type: reading
  focus: 'Прочитайте текст про евфонія як система: закони милозвучності і дайте відповіді
    на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про ритм прозового тексту, 
    використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Евфонія як система:
    закони милозвучності». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему евфонія
    як система: закони милозвучності.'
- type: comparative-study
  focus: 'Порівняйте різні підходи до евфонія як система: закони милозвучності: Чергування
    у/в, і/й, з/із/зі: правила та стилістичні порушення. Визначте спільне та відмінне.'
activities:
  types_required:
  - error-correction
  - select
  - critical-analysis
  - match-up
  - essay-response
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Караман, 10 клас (2018): §19 — Милозвучність української мови'
- 'Глазова, 11 клас (2019): §40 — Стилістичне забарвлення: фоностилістика'
- 'Авраменко, 11 клас (2019): Стилістична норма — фонетичні засоби'
