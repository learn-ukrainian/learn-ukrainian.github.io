module: c1-009
level: C1
sequence: 9
slug: thesis-development
version: '1.0'
title: "Формулювання тези та розвиток думки"
subtitle: "Thesis Development and Argument Expansion"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Досягти досконалості у формулюванні аналітичних тез для наукових та публіцистичних робіт."
  - "Навчитися розгортати абстрактну тезу в систему конкретних, взаємопов'язаних аргументів."
  - "Опанувати техніки поглиблення аргументації через використання історичних аналогій та статистичних даних."
  - "Розвинути вміння витримувати логічну лінію доказування від початку до кінця академічного тексту."

reading_situations:
  - source_type: "фрагмент історичного нарису"
    topic: "Еволюція ідеї соборності України: від декларації до реалізації."
    key_elements: ["ідеологічна теза", "історичні докази", "етапність розвитку думки"]
    motivation: "Аналіз того, як широка політична теза розгортається у багатогранне історичне дослідження."
  - source_type: "наукова стаття з філології"
    topic: "Концепт 'волі' в українській народній пісні та професійній поезії."
    key_elements: ["компаративний аналіз", "лінгвістична аргументація", "узагальнення"]
    motivation: "Вивчення способів розвитку думки через зіставлення різних типів текстів."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Сформулюйте складну тезу щодо ролі української мови у формуванні єдиного інформаційного простору України (250-300 слів). Розгорніть цю тезу, використовуючи два різні типи аргументації (наприклад, соціокультурну та політичну)."
    requirements: ["використання дієслів верифікації", "логічна зв'язність", "глибина аналізу"]
    motivation: "Відпрацювання навичок самостійної побудови складної ієрархічної структури тексту."
    model_answer: "Текст повинен містити чітку тезу у вступі, яка послідовно розвивається в основній частині за допомогою специфічної лексики розвитку ('ба більше', 'варто також зазначити', 'це зумовлює')."

discussion_topics:
  - context: "Проблема 'вузького' та 'широкого' розуміння національної культури в сучасній Україні."
    questions:
      - "Яка теза щодо майбутнього української культури видається вам найбільш переконливою?"
      - "Як уникнути логічних пасток при розгортанні власної думки в дискусії?"
      - "Роль критичного аналізу чужої тези у формуванні власної позиції."
    motivation: "Розвиток навичок швидкого формулювання та аргументованого захисту тези в усному мовленні."

content_outline:
  - section: "Анатомія успішної тези"
    words: 1000
    subsections:
      - "Характеристики тези на рівні C1: фокус, спірність, глибина"
      - "Трансформація описової тези в аналітичну та аргументаційну"
      - "Мовні маркери тези: 'стверджуємо, що...', 'нашою метою є доведення...', 'видається очевидним, що...'"
    key_concepts:
      - "аналітичність"
      - "аргументованість"
      - "спірність"
  - section: "Стратегії розгортання аргументів"
    words: 1000
    subsections:
      - "Лінійний та розгалужений розвиток думки: вибір стратегії залежно від мети"
      - "Використання дедукції та індукції для підкріплення тези"
      - "Інтеграція прикладів з української історії та культури як доказової бази"
    key_concepts:
      - "дедукція"
      - "індукція"
      - "ілюстративність"
  - section: "Поглиблення аргументації: Аналіз причин та наслідків"
    words: 1000
    subsections:
      - "Виявлення прихованих закономірностей за допомогою лексики каузальності"
      - "Ступінчаста аргументація: від факту до теоретичного узагальнення"
      - "Використання порівняння (компаративістики) для посилення тези"
    key_concepts:
      - "каузальність"
      - "компаративістика"
      - "теоретизація"
  - section: "Редагування та шліфування думки"
    words: 1000
    subsections:
      - "Усунення логічних прогалин між тезою та аргументами"
      - "Використання лексики уточнення: 'зокрема', 'тобто', 'інакше кажучи', 'власне'"
      - "Перевірка тексту на відповідність початковій тезі у висновках"
    key_concepts:
      - "логічна послідовність"
      - "прецизійність"
      - "саморедагування"

vocabulary:
  required:
    - твердження
    - закономірність
    - розгортати
    - поглиблювати
    - взаємозв'язок
    - концептуальний
    - постулювати
    - обґрунтований
  recommended:
    - іманентний
    - детермінований
    - суперечливий
    - фундаментальний
    - переконливий

activities:
  types_required:
    - critical-analysis
    - essay-response
    - fill-in
    - match-up
    - unjumble
  min_items_per_type: 5
  total_min_items: 25

connects_to:
  previous: "essay-structure"
  next: "counterarguments"
