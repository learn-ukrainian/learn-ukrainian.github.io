module: c1-009
level: C1
sequence: 9
slug: thesis-development
version: '2.0'
title: Розвиток наукової тези
content_outline:
- section: 'Вступ: Природа наукової тези (Introduction: The Nature of a Scientific
    Thesis)'
  words: 500
  points:
  - 'Визначення наукової тези згідно з державним стандартом §4.4.1.1: теза як смисловий
    центр та інструмент композиції наукового тексту.'
  - 'Розмежування факту та тези на прикладах: перехід від констатації («Тарас Шевченко
    — поет») до наукового твердження («Поезія Шевченка стала каталізатором формування
    модерної української нації»).'
  - 'Роль тези в академічному дискурсі: від постановки проблеми до логічного висновку.'
- section: 'Теоретичний фундамент: Теза vs Гіпотеза (Theoretical Foundation: Thesis
    vs Hypothesis)'
  words: 800
  points:
  - 'Чітке розмежування понять: гіпотеза як робоче припущення (нульова, альтернативна)
    та теза як доведене або таке, що потребує доведення, твердження.'
  - 'Методологія висунення тези: зв''язок із метою дослідження та обґрунтуванням актуальності
    теми.'
  - 'Лінгвістичні маркери висунення тези: «ми стверджуємо», «на наш погляд», «доцільно
    припустити».'
- section: Типологія та критерії сильної тези (Typology and Criteria of a Strong Thesis)
  words: 900
  points:
  - 'Аналіз трьох основних типів: констатувальна теза (опис стану), аргументативна
    теза (з використанням сполучника «оскільки») та аналітична теза (структурування
    об''єкта).'
  - 'Критерії якості за стандартом §4.4.6: конкретність, чіткість, дискусійність (уникнення
    банальностей) та доказовість.'
  - 'Риторична майстерність у формулюванні: використання переконуючих конструкцій
    без надмірної емоційності.'
- section: Практичний інструментарій та аналіз помилок (Practical Tools and Error
    Analysis)
  words: 900
  points:
  - Застосування тесту «І що з того?» (So what? test) для перевірки значущості та
    новизни тези.
  - 'Корекція типових помилок: перетворення «тези-анонсу» («Я розповім про...») на
    змістовну тезу («...вимагає дій через...»).'
  - 'Уникнення логічних пасток: виявлення та усунення циклічної аргументації (тавтології)
    та підміни понять.'
- section: Історичний контекст та академічна етика (Historical Context and Academic
    Ethics)
  words: 900
  points:
  - 'Культурний гачок: Києво-Могилянська академія як центр європейської риторики XVII-XVIII
    ст. та традиція публічних диспутів (theses).'
  - 'Мова як спротив: розвиток української наукової термінології у 1920-х (Інститут
    української наукової мови) та сучасна деколонізація академічного письма.'
  - 'Етика доказовості: відповідальність науковця за обґрунтування тези та повага
    до контраргументів.'
vocabulary_hints:
  required:
  - теза (thesis) — висунути тезу, захищати тезу, ключова теза; основа наукової роботи
  - гіпотеза (hypothesis) — робоча гіпотеза, нульова гіпотеза, підтвердити/спростувати
    гіпотезу
  - аргумент (argument) — вагомий аргумент, навести переконливий аргумент, контраргумент
  - обґрунтування (substantiation) — теоретичне обґрунтування, наукове підґрунтя,
    надати докази
  - доказ (proof) — неспростовний доказ, логічний доказ, прямий доказ
  - твердження (statement) — дискусійне твердження, категоричне твердження
  - дискусійний (debatable) — питання, що потребує обговорення; не самоочевидний
  - конкретний (specific) — чітко окреслений, позбавлений надмірних узагальнень
  - доказовий (provable) — такий, що може бути верифікований фактами
  - значущий (significant) — вагомий для розвитку певної галузі знань
  recommended:
  - постулат (postulate) — твердження, що приймається без доказів як вихідне
  - припущення (assumption) — попередній висновок, що потребує перевірки
  - верифікація (verification) — процес підтвердження істинності тези
  - фальсифікація (falsification) — принцип спростовуваності наукового знання
  - валідність (validity) — обґрунтованість та адекватність методів дослідження
