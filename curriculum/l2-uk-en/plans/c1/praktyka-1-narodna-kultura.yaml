title: C1.5 Практика I — Народна культура
subtitle: Practice I — Folk Culture Review
content_outline:
- section: 'Вступ: Фольклор як національний код (Introduction: Folklore as a National
    Code)'
  words: 600
  points:
  - 'Фольклор як основа національної ідентичності: аналіз усної народної творчості
    згідно з вимогами §3.21 Державного стандарту.'
  - 'Корекція типових помилок: уникнення плеоназму «народний фольклор» та розрізнення
    понять «фольклор» (мудрість) та «етнографія» (опис).'
  - 'Синкретизм в українському світогляді: дослідження феномену поєднання дохристиянських
    вірувань із православною традицією (календарний цикл).'
- section: 'Танець та ініціація: феномен Аркану (Dance and Initiation: The Arkan Phenomenon)'
  words: 800
  points:
  - 'Культурний гачок: Гуцульський «Аркан» як давній обряд чоловічої ініціації; роль
    бартки (топірця) та череса (пояса) у статусі леґеня.'
  - 'Хореографічна спадщина: порівняльний аналіз гопака та аркана як структурних кодів
    національної ідентичності та військової підготовки.'
  - 'Робота над помилками: розрізнення понять «обряд» (сакральна дія) та «звичай»
    (побутова традиція) для точного опису ритуалів.'
- section: 'Матеріальна культура: мова символів (Material Culture: The Language of
    Symbols)'
  words: 800
  points:
  - 'Писанка як «лист до Бога»: семантичний аналіз народнопоетичних символів (безкінечник,
    сосонка, грабельки) відповідно до §4.4.3.'
  - 'Символіка матеріальної спадщини: від вишиванки до побутового начиння; корекція
    суржику (вживання «рушник» замість «полотенце»).'
  - 'Сакральний простір української хати: значення рушника та покуті в народному світогляді.'
- section: 'Міфологія: від казки до архетипів (Mythology: From Fairytale to Archetypes)'
  words: 900
  points:
  - 'Український демонологічний пантеон: специфіка персонажів Чугайстра та Перелесника
    як унікальних карпатських архетипів.'
  - 'Жанрова диференціація: лінгвістичне розрізнення «казки» (вигадка) та «легенди»
    (претензія на історичність) для розвитку критичного мислення.'
  - 'Аналіз архетипів: виявлення національних образів Матері та Захисника в усній
    народній творчості крізь призму юнгівських теорій.'
- section: 'Практика: Народна медицина та сучасність (Practice: Folk Medicine and
    Modernity)'
  words: 900
  points:
  - 'Етика та культура народної медицини: критичний аналіз травознавства та замовлянь
    у порівнянні з доказовою медициною.'
  - 'Ортоепічний тренінг: правильне наголошення слів (коля́дки) та уникнення росіянізмів
    («празник» vs «свято»).'
  - 'Трансформація традицій: есе про роль народних ремесел у сучасному дизайні та
    уникнення помилки «пам''ятний сувенір».'
focus: fine-arts
pedagogy: CBI
objectives:
- Learner reviews key concepts of Ukrainian folk culture (music, dance, crafts).
- Learner practices describing regional traditions.
- Learner consolidates vocabulary related to rituals and beliefs.
grammar:
- Review of folk terminology
- Describing rituals
phase: C1.6 [Folk Culture & Traditions]
persona:
  voice: Senior Specialist
  role: Організатор етно-фестивалю
word_target: 4000
vocabulary_hints:
  required:
  - Обряд (Ritual) — проводити обряд, весільний обряд; ключовий термін для сакральних
    дій, висока частотність
  - Сакральний (Sacred) — сакральне значення, сакральне мистецтво; вживається в академічному
    та мистецтвознавчому регістрах
  - Ініціація (Initiation) — обряд ініціації, вікова ініціація; термін для опису переходу
    в новий статус у народній культурі
  - Архетип (Archetype) — національний архетип, архетип матері; використовується для
    аналізу глибинних структур фольклору
  - Світогляд (Worldview) — міфологічний світогляд, дохристиянський світогляд; основа
    соціокультурної компетентності
  - Забобон (Superstition) — вірити в забобони, народні забобони; розрізнення з народними
    віруваннями та знаннями
  recommended:
  - Синкретизм (Syncretism) — поєднання християнства і язичництва в українському обрядовому
    циклі
  - Леґінь (Youth/Groom) — діалектний термін для юнака, що пройшов ініціацію в карпатському
    регіоні
  - Бартка (Small axe) — ритуальний гуцульський топірець, символ чоловічої сили
  - Черес (Wide belt) — широкий шкіряний пояс, важливий елемент традиційного чоловічого
    одягу
  - Марновірство (Superstition) — книжний синонім до слова «забобон», вживається в
    інтелектуальних дискусіях
  - Обрядодійство (Ritual action) — термін для позначення комплексу магічних та обрядових
    дій
