  - comparative-study
  - essay-response
  - match-up
  - select
  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: reading
  focus: Прочитайте текст про методологія етнографічного дослідження і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про синтез знань: культура як текст,
    використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Методологія 
    етнографічного дослідження». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    методологія етнографічного дослідження.
- type: comparative-study
  focus: 'Порівняйте різні підходи до методологія етнографічного дослідження: Класифікація
    джерел: речові, усні, письмові та візуальні. Визначте спільне та відмінне.'
