module: c1-114
level: C1
sequence: 114
slug: praktyka-1-narodna-kultura
version: 1.2.2
title: 'Практика: Аналіз та інтерпретація народної культури'
subtitle: 'Практика: аналіз та інтерпретація народної культури'
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
- Інтегрувати знання про різні аспекти української народної культури (костюм, 
  їжа, архітектура, фольклор) у цілісну систему.
- Опанувати методику наукового аналізу етнографічних джерел та артефактів.
- Розвинути навички порівняльного дослідження регіональних особливостей 
  традиційної культури.
- Вдосконалити вміння презентувати результати власних культурологічних розвідок.
reading_situations:
- source_type: наукова стаття
  topic: 'Методологія семіотичного аналізу традиційного побуту: речі як тексти.'
  key_elements:
  - дихотомія
  - семантичне поле
  - структуралізм
  - когнітивна етнографія
  motivation: Ознайомлення з високим академічним рівнем аналізу культури.
- source_type: мистецтвознавча рецензія
  topic: 'Аналіз сучасної етно-виставки: між автентикою та деконструкцією.'
  key_elements:
  - експозиція
  - концептуалізм
  - інтерпретація
  - дискурс
  motivation: Робота з текстами, що критично оцінюють репрезентацію традиції в 
    сучасному просторі.
listening_situations:
- media_type: лекція
  setting: Семінар для аспірантів-культурологів про взаємозв'язок матеріальної 
    та духовної культури в українській традиції.
  focus_points:
  - синкретизм народного мистецтва
  - трансформація символів у часі
  - вплив глобалізації на локальні традиції
  motivation: Сприйняття складної теоретичної інформації та виділення ключових 
    тез.
writing_tasks:
- task_type: есе
  prompt: Проведіть порівняльний аналіз традиційної культури двох обраних 
    етнографічних регіонів України (наприклад, Гуцульщини та Лівобережної 
    Полтавщини). Які спільні риси та принципові відмінності ви можете виділити в
    їхньому побуті та мистецтві?
  requirements:
  - мінімум 400 слів
  - використання порівняльних конструкцій
  - 'чітка структура: вступ, аргументи, висновок'
  motivation: Розвиток навичок порівняльного аналізу (comparative study) на 
    високому рівні володіння мовою.
  model_answer: 'Текст повинен містити порівняння за конкретними критеріями: матеріали
    будівництва, кольорова гама вбрання, домінуючі страви, музичний фольклор. Висновок
    має підсумовувати причини такої різноманітності (географія, історія).'
discussion_topics:
- context: Сучасна масова культура часто спрощує складні народні символи до 
    рівня сувенірної продукції.
  questions:
  - Чи є популяризація через спрощення (кітч) неминучим етапом виживання 
    традиції в глобальному світі?
  - Як можна навчити широку аудиторію розрізняти автентичне мистецтво та 
    підробку?
  motivation: Тренування навичок аргументації в дискусіях про елітарну та масову
    культуру.
content_outline:
- section: Методологія етнографічного дослідження
  words: 1000
  subsections:
  - 'Класифікація джерел: речові, усні, письмові та візуальні'
  - 'Польові дослідження: як працювати з носіями традиції'
  - 'Етика дослідника: збереження та повага до живої спадщини'
  key_concepts:
  - джерелознавство
  - верифікація
  - польові записи
  - етичний кодекс
- section: 'Синтез знань: культура як текст'
  words: 1000
  subsections:
  - 'Взаємодія елементів: як костюм узгоджується з архітектурою та ландшафтом'
  - 'Спільні коди: повторюваність символів у вишивці, кераміці та фольклорі'
  - 'Регіональний синтез: формування цілісного образу локальної культури'
  key_concepts:
  - синкретизм
  - ізоморфізм
  - культурний ландшафт
  - цілісність
- section: Практикум з інтерпретації символіки
  words: 1000
  subsections:
  - 'Дешифрування орнаментів: від геометрії до смислів'
  - 'Колір як висловлювання: психологічні та соціальні аспекти народної колористики'
  - 'Обрядова дія як мова: жести, страви та предмети в ритуалі'
  key_concepts:
  - герменевтика
  - семіотика
  - дешифрування
  - соціальний маркер
- section: Репрезентація традиції у XXI столітті
  words: 1000
  subsections:
  - 'Музейні практики: від консервації до інтерактивності'
  - 'Діджиталізація спадщини: віртуальні музеї та архіви'
  - 'Проєктування майбутнього: використання народних знань у сталому розвитку'
  key_concepts:
  - діджиталізація
  - ревіталізація
  - сталий розвиток
  - актуалізація
- section: Підсумок — Summary
  words: 300
  points:
  - 'Ethnographic research and cultural synthesis rely on analyzing culture as a cohesive
    text using key concepts like джерелознавство, синкретизм, and герменевтика. Self-check:
    What is the difference between ревіталізація and діджиталізація?'
  - 'Interpreting cultural codes involves deciphering ornaments, colors, and ritual
    actions as a language (семіотика). Self-check: Describe 3 types of ethnographic
    sources (речові, усні, письмові) you could use to analyze a regional tradition.
    How do they interact to form a цілісний культурний ландшафт?'
vocabulary:
  required:
  - методологія
  - семіотика
  - синкретизм
