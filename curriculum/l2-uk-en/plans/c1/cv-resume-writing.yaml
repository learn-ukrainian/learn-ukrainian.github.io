module: c1-024
level: C1
sequence: 24
slug: cv-resume-writing
version: 1.1.1
title: 'Мистецтво самопрезентації: Складання резюме та супровідних листів'
subtitle: Написання резюме та CV
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
- Опанувати лексико-граматичні стандарти сучасного українського резюме (CV).
- Навчитися формулювати професійні досягнення за допомогою активних дієслів та метрик.
- Створювати переконливі супровідні листи, дотримуючись ділового етикету.
- Аналізувати специфіку самопрезентації в українському бізнес-середовищі.
reading_situations:
- source_type: офіційний зразок
  topic: Аналіз структури CV топ-менеджера в ІТ-секторі.
  key_elements:
  - професійний досвід
  - ключові компетенції
  - віддієслівні іменники
  motivation: Вивчення лаконічного та змістовного стилю викладу інформації.
- source_type: художній уривок
  topic: Опис кар'єрного шляху героя в сучасній українській прозі (напр., Артем Чех).
  key_elements:
  - професійна ідентичність
  - метафори успіху
  - літературний портрет
  motivation: Розуміння культурного контексту ставлення до праці та кар'єри в Україні.
writing_tasks:
- task_type: офіційний лист
  prompt: Напишіть супровідний лист (Cover Letter) на вакансію керівника проекту в міжнародну гуманітарну місію в Україні.
  requirements:
  - мінімум 250 слів
  - використання дієприкметникових зворотів
  - акцент на соціокультурній важливості
  motivation: Відпрацювання навичок переконливої аргументації в офіційному стилі.
  model_answer: 'Текст має містити чітку структуру: вступ (мотивація), основна частина (релевантність досвіду), підсумок (заклик
    до дії). Використання термінів ''співпраця'', ''реалізація стратегії'', ''фасилітація''.'
discussion_topics:
- context: Проблема 'м'яких навичок' (soft skills) vs 'твердих навичок' (hard skills) на сучасному ринку праці.
  questions:
  - Що є пріоритетним для українського роботодавця сьогодні?
  - Як збалансувати скромність та впевненість у самопрезентації?
  - Чи впливає знання історії України на професійну привабливість кандидата?
  motivation: Розвиток дискусійних навичок у професійній сфері.
content_outline:
- section: Архітектоніка професійного портфоліо
  words: 1000
  subsections:
  - 'Хронологічне vs функціональне резюме: вибір стратегії'
  - 'Розділ ''Ключові навички'': термінологічна точність'
  - Дизайн та візуальна грамотність професійного документа
  key_concepts:
  - релевантність
  - адаптивність
  - професійний профіль
- section: 'Граматика успіху: Дієслова дії'
  words: 1000
  subsections:
  - Використання доконаного виду дієслів для опису результатів
  - Метрики та кількісні показники в українській діловій мові
  - Уникнення пасивних конструкцій при описі особистого внеску
  key_concepts:
  - перформанс
  - оптимізація
  - імплементація
- section: Психологія супровідного листа
  words: 1000
  subsections:
  - Персоналізація звернення та етикетні формули
  - 'Структура аргументації: Чому саме ви? Чому саме ця компанія?'
  - Стилістичні помилки та канцелярит у супровідних листах
  key_concepts:
  - унікальна торгова пропозиція (USP)
  - корпоративні цінності
  - лояльність
- section: Цифровий бренд та професійна комунікація
  words: 1000
  subsections:
  - Написання заголовка (Headline) та розділу 'Про себе' (Summary)
  - 'Мережевий етикет: як писати ''холодні'' повідомлення рекрутерам'
  - Культурні особливості професійного нетворкінгу в Україні
  key_concepts:
  - нетворкінг
  - особистий бренд
  - диджиталізація
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
  - кваліфікація
  - досвід
  - досягнення
  - компетенції
  - відповідальність
  - ініціативність
  - результативність
  - потенціал
  recommended:
  - креативність
  - комунікабельність
  - стресостійкість
  - багатозадачність
  - клієнтоорієнтованість
activity_hints:
- type: reading
  focus: Прочитайте текст про архітектоніка професійного портфоліо і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про граматика успіху: дієслова дії, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Архітектоніка професійного портфоліо». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему архітектоніка професійного портфоліо.
- type: comparative-study
  focus: 'Порівняйте різні підходи до архітектоніка професійного портфоліо: Хронологічне vs функціональне резюме: вибір стратегії.
    Визначте спільне та відмінне.'
activities:
  types_required:
  - critical-analysis
  - error-correction
  - match-up
  - select
  - translate
  min_items_per_type: 5
  total_min_items: 25
references:
- 'Глазова, 11 клас (2019): с. 172-173 — Діалогічні жанри, листування'
- 'Авраменко, 11 клас (2019): с. 195 — Ділове листування'
- 'Заболотний, 11 клас (2019): с. 209 — Види офіційних листів'
connects_to:
  previous: c1-1-checkpoint
  next: job-interview
phase: C1.2 [Professional & Social Context]
