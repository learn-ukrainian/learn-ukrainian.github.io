module: c1-021
level: C1
sequence: 21
slug: cv-resume-writing
version: '2.0'
title: Написання резюме та CV
subtitle: 'Introduction: Resume vs CV and State Standards'
content_outline:
- section: 'Вступ: Резюме vs CV та державні стандарти (Introduction: Resume vs CV and State Standards)'
  words: 500
  points:
  - 'Аналіз відмінностей між резюме та CV в українському контексті: коли використовувати короткий формат, а коли розгорнутий.'
  - 'Відповідність вимогам Державного стандарту С1 (§3.13 та §4.4.1.1): опанування офіційно-ділового стилю для професійного
    працевлаштування.'
  - 'Культурний контекст: еволюція від радянської розлогої «Автобіографії» до сучасного лаконічного формату за стандартами
    Europass.'
- section: Структура та оформлення українського CV (Structure and Formatting of a Ukrainian CV)
  words: 700
  points:
  - 'Обов''язкові блоки: особисті дані, освіта, досвід роботи, навички та рекомендації.'
  - 'Культурна особливість: питання професійного фото в українському CV як ознака відкритості та професіоналізму (порівняння
    з практиками США/Великої Британії).'
  - Оформлення контактної інформації та посилань на професійні мережі (LinkedIn, портфоліо).
- section: 'Мовна стратегія: Дієслова дії та уникнення займенників (Language Strategy: Action Verbs and Avoiding Pronouns)'
  words: 850
  points:
  - 'Стратегія «Action Verbs»: перехід від пасивного опису обов''язків до орієнтованого на результат викладу досягнень.'
  - 'Типова помилка: надмірне вживання займенника «Я» (Я робив, Я керував) — відпрацювання вживання активних дієслів без підмета
    (Керував відділом, Розробив стратегію).'
  - 'Використання дієслів вищого регістру: впроваджував, координував, оптимізував, досягав, аналізував.'
- section: Професійна лексика та боротьба з англіцизмами (Professional Vocabulary and Countering Anglicisms)
  words: 750
  points:
  - 'Помилка «калькування» з англійської: розбір суржикових форм («аплікуватися», «подавати на роботу») та засвоєння нормативних
    еквівалентів («відгукнутися на вакансію», «претендувати на посаду»).'
  - 'Стилістична відповідність: заміна розмовних прикметників (класний, крутий) на професійні відповідники (відповідальний
    фахівець, вмотивований до професійного зростання).'
  - 'Робота з термінологією: ключові навички (hard skills) проти м''яких навичок (soft skills) в офіційному контексті.'
- section: 'Супровідний лист: Структура та аргументація (Cover Letter: Structure and Argumentation)'
  words: 600
  points:
  - Мистецтво написання супровідного листа (Cover Letter) як критичного елемента відгуку на вакансію.
  - 'Офіційні звертання та формули ввічливості: як почати та завершити лист у діловому стилі.'
  - 'Аргументація мотивації: як описати релевантний досвід та кваліфікацію без використання емоційної лексики.'
- section: Практичний аудит та редагування (Practical Audit and Editing)
  words: 600
  points:
  - 'Аналіз та виправлення типових помилок: усунення зайвої інформації, неформального стилю та граматичних неточностей.'
  - 'Трансформація опису досвіду: перетворення «Я займався продажами» на «Збільшив обсяги продажів на 20% через впровадження
    нової стратегії».'
  - 'Фінальне завдання: написання власного CV та супровідного листа для HR-директора за заданою вакансією.'
vocabulary_hints:
  required:
  - резюме (resume) — складати резюме, розглядати резюме; основний документ для працевлаштування
  - вакансія (vacancy/job opening) — відкрита вакансія, відгукнутися на вакансію; офіційний термін
  - досвід (experience) — досвід роботи, професійний досвід, релевантний досвід; High Frequency
  - навичка (skill) — ключові навички, технічні навички; вживається замість 'вміння' у професійному контексті
  - роботодавець (employer) — потенційний роботодавець, вимоги роботодавця; офіційно-діловий стиль
  - супровідний (cover/accompanying) — супровідний лист, супровідні документи; часто ігнорується учнями
  - претендувати (to apply/claim) — претендувати на посаду, претендувати на вакансію; формальне дієслово
  - досягнення (achievements) — професійні досягнення; фокус на результатах, а не процесі
  recommended:
  - вмотивований (motivated) — вмотивований до професійного зростання; професійна характеристика
  - фахівець (specialist/expert) — відповідальний фахівець; заміна розмовного 'працівник'
  - кваліфікація (qualification) — підтвердити кваліфікацію; вимога Держстандарту
  - стажування (internship) — проходити стажування; важливо для початкового етапу кар'єри
  - релевантний (relevant) — релевантний досвід; книжна лексика
