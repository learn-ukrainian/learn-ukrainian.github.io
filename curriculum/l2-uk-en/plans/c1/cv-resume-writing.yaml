module: c1-021
level: C1
sequence: 21
slug: cv-resume-writing
version: '2.0'
title: Написання резюме та CV
content_outline:
- section: Вступ — Резюме vs CV
  points:
  - Різниця між резюме та CV
  - Коли використовувати який формат
  - Українські vs міжнародні стандарти
- section: Структура українського CV
  points:
  - Особисті дані (Personal data)
  - Освіта (Education)
  - Досвід роботи (Work experience)
  - Навички (Skills)
  - Мови (Languages)
  - Рекомендації (References)
- section: Дієслова дії для досвіду
  points:
  - Розробляв, впроваджував, координував
  - Керував, організовував, планував
  - Аналізував, оптимізував, досягав
- section: Формальний стиль опису
  points:
  - Безособові конструкції
  - Формальна лексика
  - Уникнення займенників
- section: Супровідний лист
  points:
  - Структура листа
  - Звертання і прощання
  - Мотивація та цілі
- section: Типові помилки
  points:
  - Зайва інформація
  - Неформальний стиль
  - Граматичні помилки
- section: Практичне завдання
  points:
  - Написання власного CV
  - Редагування чужого CV
  - Трансформація стилю
vocabulary_hints:
  required:
  - резюме (resume)
  - CV (curriculum vitae)
  - досвід роботи (work experience)
  - освіта (education)
  - навички (skills)
  - компетенція (competency)
  - посада (position)
  - обов'язки (responsibilities)
  - досягнення (achievements)
  - рекомендація (reference)
  recommended:
  - кар'єрний шлях (career path)
  - професійний розвиток (professional development)
  - кваліфікація (qualification)
  - сертифікат (certificate)
  - стажування (internship)
activity_hints:
- type: fill-in
  focus: CV section phrases
  items: 15+
- type: quiz
  focus: CV structure and format
  items: 15+
- type: match-up
  focus: Informal → formal descriptions
  items: 12+
- type: cloze
  focus: Action verbs in work experience
  items: 12+
- type: error-correction
  focus: Fix CV mistakes
  items: 10+
- type: essay-response
  focus: Write cover letter
focus: style
prerequisites:
- c1-01 to c1-20 (Complete C1.1)
- Academic writing foundation
connects_to:
- c1-22 (Job Interview)
- c1-23 (Business Etiquette)
- c1-32 (Professional Scenarios)
module_type: skills
sources:
- name: Ukrainian CV Standards
  url: https://mon.gov.ua/
  type: reference
  notes: Official guidelines for Ukrainian CV format
- name: Ukrainian State Standard C1 (2024)
  url: https://mon.gov.ua/
  type: reference
  notes: C1 professional writing requirements
immersion: 100% Ukrainian
phase: C1.2 Professional Communication
objectives:
- Understand and apply написання резюме та cv
- Analyze and evaluate резюме vs cv
- Identify key concepts of практичне завдання
persona:
  voice: Senior Specialist
  role: HR-директор
