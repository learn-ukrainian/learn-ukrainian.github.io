module: c1-043
level: C1
sequence: 43
slug: aspect-pairs-mastery-c1
version: 1.0.1
title: 'Видові пари дієслів: продуктивне вживання в академічному та літературному дискурсі'
subtitle: 'Майстерність видових пар: стратегічне використання'
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Систематизувати знання про способи творення видових пар (префіксальний, суфіксальний, суплетивний) та вільно оперувати ними
  у власному мовленні.
- 'Навчитися стратегічно обирати вид дієслова в академічному письмі: огляд літератури, методологія, виклад результатів.'
- Аналізувати наративну функцію видових зсувів у художній літературі — як зміна виду передає темп, завершеність та емоційне
  забарвлення.
- Засвоїти правила вживання виду дієслова з модальними словами, у заперечних конструкціях та в інфінітивних зворотах.
- 'Подолати типові помилки міжмовної інтерференції: хибний вибір виду під впливом англійської системи часів.'
reading_situations:
- source_type: наукова стаття
  topic: Аналіз вживання видових форм дієслів у вступі, методології та висновках наукової статті з мовознавства.
  key_elements:
  - недоконаний вид в оглядових конструкціях
  - доконаний вид у формулюванні результатів
  - двовидові дієслова
  motivation: Розвиток навичок стратегічного вибору виду для побудови логічного наукового тексту.
- source_type: художній уривок
  topic: 'Видові зсуви у прозі Юрія Андруховича: аналіз фрагменту з роману ''Рекреації''.'
  key_elements:
  - перехід недоконаний→доконаний для кульмінації
  - ітеративний недоконаний
  - раптовість доконаного
  motivation: Усвідомлення наративної ролі виду дієслова як інструменту художньої виразності.
writing_tasks:
- task_type: академічний текст
  prompt: 'Напишіть вступ до наукової статті (200–250 слів) на тему ''Особливості словотвору в сучасній українській публіцистиці''.
    Свідомо оберіть вид дієслова для кожної функції: огляд досліджень (недоконаний), формулювання мети (доконаний), опис методу
    (недоконаний).'
  requirements:
  - мінімум 200 слів
  - щонайменше 10 дієслів з усвідомленим вибором виду
  - коментар до 5 обраних форм із поясненням вибору виду
  motivation: Практичне закріплення стратегічного вибору виду в академічному контексті.
  model_answer: 'Текст повинен демонструвати послідовний розподіл: ''дослідники вивчали'' (НВ — процесуальність), ''ми поставили
    за мету з''ясувати'' (ДВ — результат), ''аналіз проводився'' (НВ — методологія), ''було встановлено'' (ДВ — висновок).'
- task_type: творче письмо
  prompt: 'Перепишіть короткий нарис (150–200 слів), змінюючи вид ключових дієслів для створення іншого наративного ефекту:
    уповільнення через недоконаний вид або прискорення через доконаний.'
  requirements:
  - дві версії одного тексту
  - підкреслити змінені дієслова
  - пояснити наративний ефект кожної заміни
  motivation: Розвиток відчуття виду як стилістичного інструменту.
  model_answer: 'Версія 1 (уповільнення): ''Він ішов, озирався, шукав...'' — ітеративність, невизначеність. Версія 2 (прискорення):
    ''Він пішов, озирнувся, знайшов...'' — послідовність завершених дій.'
listening_situations:
- media_type: лекція
  setting: 'Фрагмент лекції з курсу стилістики: як вид дієслова працює в журналістському тексті (заголовки, ліди, репортажі).'
  focus_points:
  - доконаний вид у заголовках для факту
  - недоконаний вид у репортажах для процесу
  - маніпулятивний потенціал вибору виду
  motivation: Розширення розуміння функцій виду за межі граматики — у сферу медіаграмотності.
discussion_topics:
- context: 'Вид дієслова як інструмент маніпуляції: чи може вибір виду змінити сприйняття події?'
  questions:
  - 'Порівняйте: ''Президент підписав закон'' (ДВ) і ''Президент підписував закон'' (НВ). Яке повідомлення створює кожна форма?'
  - Чому в українських новинних заголовках переважає доконаний вид? Як це впливає на читача?
  - Як англомовний мовець може навчитися 'відчувати' вид, а не перекладати з Present/Past Continuous?
  motivation: Розвиток критичного мислення через аналіз мовних засобів впливу.
content_outline:
- section: 'Система видових пар: типи творення та продуктивні моделі'
  words: 1000
  subsections:
  - 'Префіксальне творення: чисті видові пари vs пари зі зміною значення (писати→написати vs писати→переписати)'
  - 'Суфіксальне творення: кидати→кинути, відчиняти→відчинити — модель на -нути та -ити'
  - 'Суплетивні пари: брати→взяти, класти→покласти, говорити→сказати, ловити→піймати — закритий список'
  - 'Двовидові та одновидові дієслова: атакувати, телефонувати, мріяти, натерпітися'
  key_concepts:
  - видова пара
  - перфективація
  - імперфективація
  - суплетивізм
- section: Вибір виду в академічному та науковому письмі
  words: 1000
  subsections:
  - 'Огляд літератури: недоконаний вид для позначення процесів дослідження (вивчали, аналізували, досліджували)'
  - 'Формулювання мети та гіпотези: доконаний вид для позначення результату (з''ясувати, довести, встановити)'
  - 'Методологія: недоконаний вид для опису процедур, доконаний — для одноразових дій'
  - 'Виклад результатів та висновки: взаємодія видів для передачі логічного ланцюга'
  key_concepts:
  - процесуальність
  - результативність
  - аспектуальна стратегія
- section: Наративна функція виду в художній літературі
  words: 1000
  subsections:
  - 'Видовий зсув як маркер кульмінації: перехід від недоконаного до доконаного виду'
  - Ітеративний недоконаний для створення фону та атмосфери (ходив, думав, чекав)
  - Раптовість доконаного виду для несподіваного повороту (раптом побачив, зрозумів, вирішив)
  - Аналіз видових стратегій у текстах Коцюбинського, Андруховича, Забужко
  key_concepts:
  - наративний темп
  - завершеність
  - тривалість
  - повторюваність
- section: Складні випадки та типові помилки у вживанні виду
  words: 1000
  subsections:
  - 'Вид з модальними словами: хотіти/могти/треба + інфінітив — коли недоконаний, коли доконаний'
  - 'Вид у заперечних конструкціях: не робив (заперечення процесу) vs не зробив (заперечення результату)'
  - 'Подвійна префіксація та її обмеження: *перевиконати, *перевиписати — межі продуктивності'
  - 'Міжмовна інтерференція: чому англійське ''I was writing'' ≠ автоматично недоконаний вид'
  key_concepts:
  - модальність
  - заперечення
  - інтерференція
  - продуктивність моделі
