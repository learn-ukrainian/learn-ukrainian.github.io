module: c1-061
level: C1
sequence: 61
slug: syntaksychni-stylistychni-zasoby
version: '1.1'
title: "Експресивний синтаксис та фігури мовлення"
subtitle: "Expressive Syntax and Figures of Speech"
focus: integration
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити синтаксичні засоби виразності: інверсію, еліпсис, паралелізм."
  - "Опанувати складні риторичні фігури (анафору, епіфору, градацію) для посилення логічного та емоційного впливу."
  - "Аналізувати роль синтаксичного ритму у створенні переконливого тексту."
  - "Застосовувати експресивні синтаксичні конструкції у власному професійному та художньому мовленні."

reading_situations:
  - source_type: "фрагмент промови"
    topic: "Філософія свободи у виступах українських інтелектуалів: синтаксис переконання."
    key_elements: ["період", "антитеза", "риторичне накопичення"]
    motivation: "Вивчення архітектоніки високого ораторського стилю."
  - source_type: "художній текст"
    topic: "Потік свідомості в модерній українській прозі: синтаксичний хаос як художній засіб."
    key_elements: ["асиндетон", "полісиндетон", "еліпсис"]
    motivation: "Аналіз руйнування стандартних синтаксичних зв'язків для передачі внутрішнього стану героя."

listening_situations:
  - media_type: "відео"
    setting: "Декламація класичної української поезії з коментарями філолога щодо синтаксичних фігур."
    focus_points: ["ритмічні паузи", "логічні наголоси при інверсії", "емоційна градація"]
    motivation: "Розуміння живого звучання експресивного синтаксису."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишите програмний маніфест (350-400 слів) на тему 'Україна майбутнього', використовуючи анафору, градацію та антитезу."
    requirements: ["використання щонайменше 5 різних синтаксичних фігур", "чітка логічна структура", "висока емоційна напруга"]
    motivation: "Відпрацювання навичок побудови складних переконливих текстів."
    model_answer: "Текст має бути зразком інтелектуальної пристрасті, де кожна синтаксична фігура працює на розкриття головної ідеї."

discussion_topics:
  - context: "Чи не заважає експресивний синтаксис чіткості передачі інформації в епоху швидкого споживання контенту?"
    questions:
      - "Чому інверсія (зміна порядку слів) є такою популярною в українській поезії?"
      - "Яка різниця між безсполучниковістю (асиндетон) та багатосполучниковістю (полісиндетон) у плані емоційного впливу?"
      - "Чи може синтаксис бути 'національним'?"
    motivation: "Рефлексія над естетичною та прагматичною цінністю складних мовних форм."

content_outline:
  - section: "Порядок слів та логічний наголос"
    words: 1000
    subsections:
      - "Прямий та зворотний порядок слів (інверсія) в українській мові"
      - "Стилістичні функції інверсії: акцентування, ритмізація, архаїзація"
      - "Дистантне розташування пов'язаних слів як засіб створення напруги"
    key_concepts:
      - "інверсія"
      - "логічний наголос"
      - "акцентування"
  - section: "Фігури зменшення та збільшення синтаксичного обсягу"
    words: 1000
    subsections:
      - "Еліпсис (пропуск слова) як засіб лаконічності та динамізму"
      - "Асиндетон (безсполучниковість) vs Полісиндетон (багатосполучниковість)"
      - "Умовчання (апозіопеза) як засіб передачі хвилювання або прихованого змісту"
    key_concepts:
      - "еліпсис"
      - "асиндетон"
      - "полісиндетон"
  - section: "Риторичні фігури повтору та розташування"
    words: 1000
    subsections:
      - "Анафора та епіфора: магія повтору на початку та в кінці фраз"
      - "Синтаксичний паралелізм як основа поетичного мислення"
      - "Градація (вигук) та її роль у наростанні чи спаданні емоційної напруги"
    key_concepts:
      - "анафора"
      - "паралелізм"
      - "градація"
  - section: "Архітектоніка складного синтаксису"
    words: 1000
    subsections:
      - "Період як вища форма синтаксичної організації думки"
      - "Антитеза та оксиморон: синтаксис контрасту"
      - "Хіазм (перехресне розташування) та його естетична роль"
    key_concepts:
      - "період"
      - "антитеза"
      - "хіазм"

vocabulary:
  required:
    - інверсія
    - паралелізм
    - градація
    - антитеза
    - еліпсис
    - анафора
    - архітектоніка
    - експресія
  recommended:
    - асиндетон
    - полісиндетон
    - хіазм
    - оксиморон
    - модальність

activity_hints:
  - type: critical-analysis
    description: "Analyze a Ukrainian literary manifesto — identify all syntactic figures (anaphora, epiphora, parallelism, chiasmus, antithesis) and their persuasive function."
  - type: select
    description: "Identify the syntactic figure used in given sentences from Ukrainian poetry and oratory — distinguish градація from паралелізм, еліпсис from апозіопеза."
  - type: match-up
    description: "Match syntactic figures (інверсія, еліпсис, асиндетон, полісиндетон, анафора, градація) with definitions, examples, and emotional effects."
  - type: essay-response
    description: "Write a programmatic paragraph (100-150 words) on 'Україна майбутнього' using at least 4 different syntactic figures."
  - type: error-correction
    description: "Fix texts where syntactic figures are misused — ineffective parallelism, broken anaphora patterns, anticlimax where gradation was intended."

activities:
  types_required:
    - critical-analysis
    - select
    - match-up
    - essay-response
    - translate
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §38 — Лексичні засоби стилістики, синтаксичні фігури"
  - "Глазова, 11 клас (2019): §45 — Стилістичне використання синтаксичних одиниць"
  - "Авраменко, 11 клас (2019): Стилістична норма — синтаксичні засоби"

connects_to:
