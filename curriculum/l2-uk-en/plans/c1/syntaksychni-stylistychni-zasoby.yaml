module: c1-055
level: C1
sequence: 55
slug: syntaksychni-stylistychni-zasoby
version: '2.0'
title: Синтаксичні стилістичні засоби
subtitle: Syntactic Stylistic Resources
content_outline:
- section: Паралелізм та градація
  words: 700
  points:
  - 'Синтаксичний паралелізм для ритму та емфази: повтор однакових синтаксичних конструкцій.'
  - 'Висхідна та низхідна градація як засоби підсилення або послаблення.'
  - 'Хіазм (перехресний паралелізм): інверсія паралельних конструкцій для ефекту.'
- section: Інверсія та антитеза
  words: 700
  points:
  - 'Відхилення від прямого порядку слів для створення емфази.'
  - 'Антитеза як прийом контрасту: протиставлення понять, образів, явищ.'
  - 'Використання інверсії та антитези в ораторському мистецтві та публіцистиці.'
- section: 'Анафора, епіфора та інші повтори'
  words: 700
  points:
  - 'Анафора (єдинопочаток) та епіфора (єдинозакінчення): емоційне підсилення через
    повтор.'
  - 'Симплока: поєднання анафори та епіфори в одній конструкції.'
  - 'Анадиплозис (підхоплення): повтор кінця попередньої фрази на початку наступної.'
- section: Стилістика односкладних речень
  words: 700
  points:
  - 'Називні речення для створення атмосфери в публіцистиці та художній прозі (ДСТУ
    §4.3.3).'
  - 'Безособові речення для знеособленого наукового та юридичного стилю.'
  - 'Інфінітивні речення для категоричних інструкцій і заборон.'
  - 'Узагальнено-особові речення у приказках та прислів''ях: стилістична майстерність
    за межами впізнавання.'
- section: 'Еліпсис, замовчування, риторичне запитання'
  words: 600
  points:
  - 'Еліпсис (пропуск) для динамічності та лаконічності тексту.'
  - 'Апосіопеза (замовчування) для створення драматичного ефекту.'
  - 'Риторичне запитання як засіб залучення (перехресне посилання на модуль rhetorical-questions).'
- section: Практика синтаксичного стилістичного аналізу
  words: 600
  points:
  - 'Визначення синтаксичних стилістичних засобів у текстах різних регістрів.'
  - 'Використання синтаксичних засобів для створення текстів різних стилів.'
focus: style
pedagogy: Immersion
objectives:
- 'Розпізнавати синтаксичні стилістичні засоби в текстах різних регістрів.'
- 'Використовувати паралелізм, інверсію, повтори та еліпсис як засоби виразності.'
- 'Розуміти стилістичну роль односкладних речень за межами їх формального розпізнавання.'
grammar:
- 'Синтаксичний паралелізм, градація, хіазм'
- 'Інверсія та антитеза як синтаксичні засоби'
- 'Анафора, епіфора, симплока, анадиплозис'
- 'Стилістика односкладних речень (називні, безособові, інфінітивні, узагальнено-особові)'
phase: C1.5 [Stylistics & Rhetoric]
persona:
  voice: Senior Specialist
  role: Стиліст-синтаксист
word_target: 4000
vocabulary_hints:
  required:
  - 'паралелізм (parallelism) — повтор синтаксичних конструкцій; High Frequency'
  - 'градація (gradation) — послідовне підсилення або послаблення'
  - 'інверсія (inversion) — зміна прямого порядку слів'
  - 'антитеза (antithesis) — протиставлення понять або образів'
  - 'анафора (anaphora) — повтор на початку речень або рядків'
  - 'епіфора (epiphora) — повтор на кінці речень або рядків'
  recommended:
  - 'хіазм (chiasmus) — перехресний паралелізм'
  - 'симплока (symploce) — поєднання анафори та епіфори'
  - 'анадиплозис (anadiplosis) — підхоплення кінця попередньої фрази'
  - 'еліпсис (ellipsis) — пропуск слова, зрозумілого з контексту'
  - 'апосіопеза (aposiopesis) — раптовий обрив мовлення'
activity_hints:
- type: reading
  focus: 'Аналіз синтаксичних стилістичних засобів у поезії, прозі, публіцистиці'
  items: 4
- type: quiz
  focus: 'Визначення типу синтаксичного засобу та його функції'
  items: 15
- type: error-correction
  focus: 'Виправлення стилістично невмотивованих синтаксичних конструкцій'
  items: 12
- type: essay-response
  focus: 'Створення тексту з використанням синтаксичних стилістичних засобів'
  items: 2
