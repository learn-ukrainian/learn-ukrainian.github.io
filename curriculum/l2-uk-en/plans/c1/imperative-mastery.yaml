slug: imperative-mastery
version: '2.0'
title: 'Спонукальні конструкції: Прагматика та стилістика'
subtitle: 'Imperative Constructions: Pragmatics and Stylistics'
content_outline:
- section: 'Спонукальні конструкції в офіційному стилі (Exhortative Constructions in Official Register)'
  words: 700
  points:
  - 'Офіційно-діловий наказовий: формули наказів, розпоряджень, інструкцій (Наказую... Зобов''язую... Пропоную...) — синтаксис та прагматика офіційного спонукання'
  - 'Імперативні конструкції в законодавчих текстах: інфінітивне спонукання (Заборонити... Забезпечити... Затвердити...) vs особові форми — стилістичне розмежування'
  - 'Канцелярський імператив: «Прошу надати...», «Просимо повідомити...», «Пропонується розглянути...» — пом''якшення категоричності через граматичні засоби'
  - 'Регістрова ієрархія спонукання: від категоричного наказу (Виконати!) через нейтральне прохання (Прошу виконати) до ввічливої пропозиції (Чи не могли б Ви...) — градація засобів'
- section: 'Непрямий наказовий: дозвольте, прохання, пропозиція (Indirect Imperative: Permission, Request, Suggestion)'
  words: 800
  points:
  - 'Конструкція «дозвольте/дозволь + інфінітив» у публічному мовленні: дозвольте зауважити, дозвольте не погодитися, дозвольте запропонувати — прагматика академічної дискусії'
  - 'Стратегії пом''якшення: «Чи не могли б Ви...», «Чи не варто було б...», «Якщо дозволите...» — умовний спосіб як інструмент ввічливості'
  - 'Перформативні дієслова: прошу, вимагаю, раджу, рекомендую, наполягаю — градація іллокутивної сили та вибір конструкції залежно від контексту'
  - 'Контрастивний аналіз: англ. «Would you mind...» / «I was wondering if...» vs укр. «Чи не міг би ти...» / «Я хотів би попросити...» — розбіжності у стратегіях ввічливості'
- section: 'Гортатив і колективне спонукання (Hortative and Collective Exhortation)'
  words: 700
  points:
  - 'Гортатив у публіцистиці та політичному дискурсі: «Збережімо мову!», «Підтримаймо армію!», «Боронімо свободу!» — аналіз риторичних прийомів у реальних текстах'
  - 'Стилістична маркованість -ймо/-імо: нейтральне «ходімо» vs піднесене «творімо» — вибір форми залежно від жанру та аудиторії'
  - 'Колективне спонукання без гортативу: «Давайте обговоримо» vs «Обговорімо» vs «Пропоную обговорити» — три стратегії, три регістри'
  - 'Гортатив у гаслах та слоганах: аналіз реальних зразків від воєнного часу, волонтерських кампаній та громадських ініціатив — прагматична функція єднання'
- section: 'Хай/нехай: стилістичні та прагматичні відтінки (Хай/нехай: Stylistic and Pragmatic Nuances)'
  words: 700
  points:
  - 'Хай у ритуальних та перформативних контекстах: побажання (Хай щастить!), прокляття (Хай йому грець!), благословення (Хай Бог благословить!) — жанрова прив''язка'
  - 'Нехай у літературному та публіцистичному стилях: «Нехай знає весь світ!», «Нехай пам''ятають нащадки!» — емоційна інтенсивність та патетика'
  - 'Хай/нехай у складному реченні: «Хай він приходить, а ми подивимося» — конструкція з допустовим значенням, наближення до «навіть якщо»'
  - 'Стилістична диференціація: хай (нейтральне, розмовне) vs нехай (книжне, урочисте) — контекстний вибір у різних функціональних стилях'
- section: 'Прагматика наказових конструкцій у професійних контекстах (Pragmatics of Imperative Constructions in Professional Contexts)'
  words: 700
  points:
  - 'Академічна дискусія: «Розглянемо...», «Зверніть увагу...», «Порівняймо...» — імперативні конструкції у науковому стилі як засіб структурування тексту'
  - 'Медичний дискурс: «Прийміть ліки...», «Зверніться до лікаря...», «Уникайте фізичних навантажень...» — категоричність vs ввічливість у медичних рекомендаціях'
  - 'Юридичний дискурс: «Суд постановляє...», «Зобов''язати відповідача...» — імператив у процесуальних документах'
  - 'Типові помилки: калькування англійських конструкцій (*«Будьте вільні зайти» замість «Заходьте будь ласка»), неадекватний регістр (надто категоричний чи надто м''який для ситуації)'
- section: 'Підсумок: системна інтеграція (Summary: Systemic Integration)'
  words: 400
  points:
  - 'Зведена матриця спонукальних засобів: прямий наказовий, гортатив, хай/нехай, непрямий, перформативний — ситуативний вибір'
  - 'Регістрова шкала: від фамільярного «Давай!» через нейтральне «Будь ласка, зробіть» до офіційного «Прошу Вас забезпечити» — практична навігація'
  - 'Прагматичні невдачі: аналіз реальних ситуацій, де неадекватний вибір спонукальної конструкції призводить до комунікативного збою'
focus: grammar
pedagogy: PPP
objectives:
- Deploy indirect imperative strategies (дозвольте, прошу, чи не могли б) appropriate to register and professional context
- Analyze and produce hortative constructions in public discourse, campaign slogans, and academic writing
- Differentiate stylistic and pragmatic functions of хай/нехай in ritual, literary, and colloquial contexts
- Navigate the full register scale of Ukrainian exhortation from informal to official-legal
grammar:
- Indirect imperative constructions (дозвольте, прошу, пропоную)
- Hortative -ймо/-імо in public discourse and rhetoric
- Stylistic differentiation of хай/нехай
- Imperative in official, academic, medical, and legal registers
- Performative verbs as imperative strategy
phase: C1.3 [Movoznavstvo & Sociolinguistics]
persona:
  voice: Senior Specialist
  role: Граматист-нормативіст
