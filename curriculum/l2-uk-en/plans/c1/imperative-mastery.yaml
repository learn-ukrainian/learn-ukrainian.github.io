vocabulary_hints:
  required:
  - спонукання (exhortation) — спонукальна конструкція, засоби спонукання, пряме/непряме спонукання; Core pragmatic concept
  - гортатив (hortative) — гортативна форма, гортативне значення, гортатив у публіцистиці; Linguistic term for collective imperative
  - перформатив (performative) — перформативне дієслово, перформативний акт; Speech act theory term
  - іллокутивний (illocutionary) — іллокутивна сила, іллокутивний акт; Pragmatic linguistics term
  - регістр (register) — офіційний регістр, розмовний регістр, зміна регістру; Sociolinguistic term
  recommended:
  - дозвольте (allow me/permit) — дозвольте зауважити, дозвольте не погодитися; Formal indirect imperative
  - наполягаю (I insist) — наполягаю на перегляді, наполягаю на виконанні; Strong illocutionary force
  - пропоную (I suggest) — пропоную розглянути, пропоную обговорити; Moderate illocutionary force
  - постановляти (to decree) — суд постановляє, рада постановляє; Legal performative
