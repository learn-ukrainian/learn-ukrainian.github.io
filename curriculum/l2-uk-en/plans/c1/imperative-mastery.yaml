module: c1-045
level: C1
sequence: 45
slug: imperative-mastery
version: '1.1'
title: "Майстерність імператива: Тонкощі спонукання та етикет"
subtitle: "Майстерність наказового способу"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Досконало опанувати систему творення форм наказового способу (1-ша, 2-га та 3-тя
    особи)."
  - "Навчитися використовувати альтернативні засоби вираження спонукання (інфінітив,
    майбутній час, модальні слова)."
  - "Розуміти прагматичні відтінки різних форм наказу залежно від соціальної дистанції
    та контексту."
  - "Застосовувати стратегії ввічливого прохання та пом'якшеного наказу в професійному
    середовищі."

reading_situations:
  - source_type: "художній уривок"
    topic: "Аналіз діалогів у творах Івана Франка чи Лесі Українки: як соціальний
      статус персонажів впливає на вибір форми наказового способу."
    key_elements: ["модальність", "перформатив", "кличний відмінок"]
    motivation: "Розуміння історичної тяглості етикетних норм спонукання."
  - source_type: "рекламний маніфест"
    topic: "Імператив як інструмент заклику до дії (call to action) у сучасних маркетингових
      текстах."
    key_elements: ["сугестія", "прямий наказ", "інклюзивна форма (на -мо)"]
    motivation: "Вивчення маніпулятивного потенціалу граматичних форм."

listening_situations:
  - media_type: "аудіо"
    setting: "Записи виступів політичних лідерів під час кризових ситуацій: як балансувати
      між рішучістю та повагою через форми спонукання."
    focus_points: ["інтонація", "частки 'хай', 'нехай'", "майбутній час як наказ"]
    motivation: "Аналіз риторичних стратегій лідерства."

writing_tasks:
  - task_type: "есе"
    prompt: "Проаналізуйте еволюцію форм ввічливості в українській мові. Як змінилося
      сприйняття наказових конструкцій у ХХІ столітті у зв'язку з демократизацією
      суспільства?"
    requirements: ["мінімум 300 слів", "використання лінгвістичних термінів", "порівняння
          українських та англійських стратегій ввічливості"]
    motivation: "Розвиток соціолінгвістичної компетенції."
    model_answer: "Текст має містити роздуми про перехід від вертикальних до горизонтальних
      моделей комунікації, роль часток 'будь ласка', 'прошу' та використання форм
      1-ї особи множини ('ходімо', 'працюймо')."

discussion_topics:
  - context: "Цифрова етикетка: чи сприймається імператив у месенджерах як агресія?"
    questions:
      - "Чому коротке 'зроби це' може образити колегу?"
      - "Які засоби пом'якшення наказу ви використовуєте у листуванні?"
      - "Чи замінюють емодзі граматичні форми модальності?"
    motivation: "Стимулювання усвідомленого вибору мовних засобів у сучасній комунікації."

content_outline:
  - section: "Система форм наказового способу"
    words: 1000
    subsections:
      - "Творення форм 2-ї особи однини та множини: типові чергування та наголос"
      - "Специфіка 1-ї особи множини: заклик до спільної дії (-мо, -імо)"
      - "Аналітичні форми 3-ї особи з частками 'хай' та 'нехай'"
    key_concepts:
      - "наказовий спосіб"
      - "інклюзивність"
      - "аналітична форма"
  - section: "Функціональні аналоги імператива"
    words: 1000
    subsections:
      - "Інфінітив у ролі категоричного наказу (військові статути, інструкції)"
      - "Майбутній час із відтінком спонукання: 'Ти підеш і зробиш'"
      - "Концепція 'перформативів': дієслова, що самі по собі є дією ('Прошу', 'Наказую')"
    key_concepts:
      - "перформатив"
      - "модальність"
      - "категоричність"
  - section: "Стратегії ввічливості та етикету"
    words: 1000
    subsections:
      - "Пом'якшення спонукання за допомогою питань та модальних часток"
      - "Різниця між 'прошу' та 'будь ласка' в діловому контексті"
      - "Використання умовного способу для вираження побажання"
    key_concepts:
      - "етикет"
      - "прагматика"
      - "евфемізм"
  - section: "Імператив у публічному дискурсі"
    words: 1000
    subsections:
      - "Риторика заклику в політичних промовах та гаслах"
      - "Психологія наказу в рекламі та пропаганді"
      - "Стилістичні фігури: анафора та паралелізм з використанням імперативів"
    key_concepts:
      - "риторика"
      - "сугестія"
      - "дискурс"

vocabulary:
  required:
    - спонукання
    - модальність
    - перформатив
    - етикет
    - інклюзивний
    - прагматика
    - інфінітив
    - чергування
  recommended:
    - сугестія
    - імператив
    - аналітизм
    - парадигма
    - дискурс

activity_hints:
  - type: reading
    focus: "Прочитайте текст про система форм наказового способу і дайте відповіді на запитання."
  - type: essay-response
    focus: "Напишіть 5 речень, використовуючи нову лексику з розділу «Функціональні аналоги імператива»."
  - type: fill-in
    focus: "Вставте правильну граматичну форму у реченнях на тему система форм наказового способу."
  - type: error-correction
    focus: "Знайдіть і виправте помилки у реченнях на тему функціональні аналоги імператива."
  - type: quiz
    focus: "Оберіть правильний варіант: лексика та граматика з розділу «Система форм наказового способу»."
  - type: match-up
    focus: "З'єднайте терміни з розділу «Функціональні аналоги імператива» з їхніми визначеннями."

activities:
  types_required:
    - error-correction
    - critical-analysis
    - select
    - match-up
    - true-false
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §71-74 — Дієслово"
  - "Глазова, 11 клас (2019): §17-20 — Морфологічна стилістика"
  - "Авраменко, 11 клас (2019): §15-20 — Морфологічна норма"

connects_to:
