module: c1-038
level: C1
sequence: 38
slug: podorozhi-ta-turyzm
version: '1.0'
title: "Подорожі та туризм: від планування до вражень"
subtitle: "Подорожі, туризм, мандрівки"
focus: thematic
pedagogy: TTT
word_target: 4000
objectives:
  - "Опанувати розширену лексику подорожей, туризму та транспорту на рівні C1."
  - "Навчитися описувати враження від подорожей, місцевості та культурні відкриття
    розгорнутою українською мовою."
  - "Вивчити специфіку ділового мовлення у сфері туризму: бронювання, скарги,
    відгуки."
  - "Аналізувати туристичний потенціал України та роль внутрішнього туризму."

reading_situations:
  - source_type: "подорожній нарис"
    topic: "Мандрівка Карпатами: від Верховини до Рахова очима сучасного мандрівника."
    key_elements: ["опис пейзажу", "культурні реалії", "етнографічні спостереження"]
    motivation: "Вивчення жанру подорожнього нарису та описової лексики."
  - source_type: "аналітичний огляд"
    topic: "Розвиток туристичної інфраструктури в Україні: перспективи та виклики."
    key_elements: ["інфраструктура", "маркетинг", "сталий туризм"]
    motivation: "Поєднання туристичної лексики з аналітичним стилем."

listening_situations:
  - media_type: "подкаст"
    setting: "Розповідь мандрівника про маловідомі куточки України: Поділля,
      Буковина, Слобожанщина."
    focus_points: ["географічна лексика", "опис вражень", "порівняння регіонів"]
    motivation: "Сприйняття розгорнутого опису місцевості на слух."

writing_tasks:
  - task_type: "подорожній нарис"
    prompt: "Напишіть подорожній нарис (250-300 слів) про реальну чи уявну мандрівку
      Україною, включаючи опис маршруту, вражень та культурних відкриттів."
    requirements: ["описова лексика", "використання складних речень", "емоційна
      оцінка", "географічна точність"]
    motivation: "Розвиток навичок описового та оціночного письма."
    model_answer: "Текст має містити детальні описи пейзажу, культурних об'єктів та
      особистих вражень з використанням C1-рівневої лексики."

discussion_topics:
  - context: "Внутрішній туризм в Україні: як підтримати відновлення?"
    questions:
      - "Які регіони України мають найбільший туристичний потенціал і чому?"
      - "Як розвивати сталий туризм, не руйнуючи природу та автентичність?"
    motivation: "Обговорення стратегій розвитку українського туризму."

content_outline:
  - section: "Планування подорожі"
    words: 1000
    subsections:
      - "Вибір маршруту, транспорту та проживання"
      - "Бронювання, страхування, візовий режим"
      - "Типи туризму: зелений, екстремальний, культурний, гастрономічний"
    key_concepts:
      - "маршрут"
      - "бронювання"
      - "страхування"
  - section: "Транспорт та інфраструктура"
    words: 1000
    subsections:
      - "Залізничний, авіа- та автобусний транспорт в Україні"
      - "Готелі, хостели, агросадиби: специфіка проживання"
      - "Навігація, картографія, цифрові сервіси для мандрівників"
    key_concepts:
      - "подорож"
      - "інфраструктура"
      - "навігація"
  - section: "Опис вражень та культурні відкриття"
    words: 1000
    subsections:
      - "Описова лексика: пейзаж, архітектура, атмосфера"
      - "Культурний шок та адаптація: порівняння звичаїв"
      - "Мистецтво розповіді: як цікаво описати подорож"
    key_concepts:
      - "мандрівка"
      - "враження"
      - "атмосфера"
  - section: "Туристичний потенціал України"
    words: 1000
    subsections:
      - "Об'єкти ЮНЕСКО в Україні: Софія Київська, Херсонес, Карпатські бучини"
      - "Маловідомі туристичні перлини: Кам'янець-Подільський, Тунель кохання, Буки"
      - "Розвиток сталого туризму: відповідальність мандрівника"
    key_concepts:
      - "спадщина"
      - "сталий"
      - "потенціал"

vocabulary:
  required:
    - подорож
    - мандрівка
    - екскурсія
    - маршрут
    - бронювання
    - інфраструктура
    - враження
    - спадщина
  recommended:
    - агросадиба
    - навігація
    - адаптація
    - автентичність
    - гастрономічний

activity_hints:
  - type: fill-in
    description: "Complete travel planning dialogues and descriptions with appropriate
      C1-level vocabulary — booking, complaints, impressions, recommendations."
  - type: match-up
    description: "Match types of tourism (зелений, культурний, екстремальний,
      гастрономічний) with their characteristics, activities, and Ukrainian destinations."
  - type: critical-analysis
    description: "Analyze a travel essay about Ukraine — evaluate descriptive techniques,
      vocabulary richness, and cultural sensitivity."
  - type: select
    description: "Choose correct Ukrainian travel terminology over anglicisms and
      Russianisms (e.g., мандрівка vs тур, проживання vs розміщення)."
  - type: error-correction
    description: "Fix stylistic and lexical errors in a tourist brochure text —
      Russianisms, calques, register inconsistencies."

activities:
  types_required:
    - fill-in
    - match-up
    - critical-analysis
    - select
    - error-correction
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Глазова, 11 клас (2019): §1-5 — Культура мовлення: тематична лексика"
  - "Авраменко, 11 клас (2019): Описовий та публіцистичний стилі"
  - "State Standard 2024: C1 — тематичне поле 'подорожі'"

