module: c1-036
level: C1
sequence: 36
slug: morfolohichna-norma-c1
version: '1.0'
title: "Морфологічна норма C1: Складні випадки відмінювання та узгодження"
subtitle: "Morphological Norm C1"
focus: grammar
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати правила вживання варіантних закінчень іменників чоловічого роду в родовому відмінку (а/я vs у/ю)."
  - "Навчитися правильно відмінювати власні назви, прізвища та абревіатури в офіційних текстах."
  - "Засвоїти норми вживання ступенів порівняння прикметників та уникнення типових помилок (найбільш кращий тощо)."
  - "Вдосконалити навички використання дієслівних форм, зокрема обмежень у вживанні активних дієприкметників."

reading_situations:
  - source_type: "офіційний документ"
    topic: "Аналіз юридичного тексту на предмет дотримання морфологічних норм (відмінювання прізвищ, посад, установ)."
    key_elements: ["кличний відмінок", "узгодження", "паралельні форми"]
    motivation: "Розвиток професійної пильності до граматичних деталей."
  - source_type: "наукова стаття"
    topic: "Проблема заміни активних дієприкметників на -учий/-ячий описовими конструкціями в українській науковій мові."
    key_elements: ["дієприкметник", "трансформація", "ад'єктивація"]
    motivation: "Формування навичок автентичного академічного письма без кальок."

listening_situations:
  - media_type: "лекція"
    setting: "Вебінар для редакторів про типові морфологічні помилки в сучасних медіа."
    focus_points: ["рід невідмінюваних іменників", "числові форми", "чергування голосних"]
    motivation: "Орієнтація на професійні стандарти літредагування."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть звернення до Міністерства освіти від імені наукової спільноти. Використайте правильні форми кличного відмінка, відмінювання складних прізвищ та назв інституцій."
    requirements: ["мінімум 250 слів", "дотримання офіційно-ділового стилю", "використання щонайменше 5 невідмінюваних іменників іншомовного походження"]
    motivation: "Практичне застосування складних правил морфології в реальному контексті."
    model_answer: "Лист повинен містити коректні форми: 'пане Міністре', 'високошановний колего', правильні закінчення родового відмінка (університету, інституту) та узгодження абревіатур."

discussion_topics:
  - context: "Варіантність у морфології: свобода вибору чи загроза нормативності?"
    questions:
      - "Чому деякі форми мають паралельні закінчення (наприклад, 'в авті' — 'в авто')?"
      - "Як ви ставитеся до фемінітивів як морфологічного нововведення?"
      - "Чи варто спрощувати правила відмінювання числівників?"
    motivation: "Обговорення динаміки мовних норм."

content_outline:
  - section: "Складні випадки іменникових форм"
    words: 1000
    subsections:
      - "Родовий відмінок однини іменників чоловічого роду: -а/-я vs -у/-ю (системний підхід)"
      - "Рід невідмінюваних іменників (географічні назви, назви тварин, абревіатури)"
      - "Специфіка кличного відмінка в офіційному та приватному спілкуванні"
    key_concepts:
      - "флексія"
      - "парадигма"
      - "категорія роду"
  - section: "Прикметники та займенники: норма та узус"
    words: 1000
    subsections:
      - "Творення та вживання ступенів порівняння: синтаксичні обмеження"
      - "Відмінювання та правопис складних прикметників"
      - "Специфіка вживання займенників 'себе', 'свій', 'їхній' у науковому тексті"
    key_concepts:
      - "ступені порівняння"
      - "узгодження"
      - "аналітична форма"
  - section: "Дієслівна система в академічному дискурсі"
    words: 1000
    subsections:
      - "Проблема пасивних конструкцій: активний стан vs пасивний"
      - "Дієприкметники та дієприслівники: типові помилки та способи їх усунення"
      - "Безособові форми на -но, -то: історичний контекст та сучасне вживання"
    key_concepts:
      - "дієприкметник"
      - "дієприслівник"
      - "безособова форма"
  - section: "Морфологія службових частин мови"
    words: 1000
    subsections:
      - "Складні випадки вживання прийменників: 'по' vs 'за', 'в' vs 'на'"
      - "Синонімія сполучників у складних реченнях різних типів"
      - "Частки в науковому тексті: логічне наголошення та модальність"
    key_concepts:
      - "службові слова"
      - "модальність"
      - "когерентність"

vocabulary:
  required:
    - відмінювання
    - узгодження
    - парадигма
    - флексія
    - дієприкметник
    - дієприслівник
    - фемінітив
    - абревіатура
  recommended:
    - ад'єктивація
    - субстантивація
    - варіантність
    - аналітизм
    - морфема

activities:
  types_required:
    - error-correction
    - highlight-morphemes
    - fill-in
    - select
    - match-up
  min_items_per_type: 5
  total_min_items: 25

