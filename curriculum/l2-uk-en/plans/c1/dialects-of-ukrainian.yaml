module: c1-031
level: C1
sequence: 31
slug: dialects-of-ukrainian
version: '1.1'
title: "Діалекти української мови: Територіальні різновиди та мовна стійкість"
subtitle: "Діалекти української мови"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Розуміти структуру діалектного членування української мови (наріччя, діалекти,
    говори)."
  - "Визначати фонетичні, морфологічні та лексичні особливості північного, південно-західного
    та південно-східного наріч."
  - "Аналізувати роль діалектів у збагаченні літературної мови та художнього стилю."
  - "Ознайомитися з працями видатних діалектологів (І. Матвіяс, Й. Дзендзелівський)."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Атлас української мови: історія створення та методологія картографування."
    key_elements: ["ізоглоса", "ареал", "континіум"]
    motivation: "Ознайомлення з академічним інструментарієм дослідження територіальних
      діалектів."
  - source_type: "художній уривок"
    topic: "Гуцульський говір у творах Михайла Коцюбинського ('Тіні забутих предків')."
    key_elements: ["діалектизм", "архаїзм", "екзотизм"]
    motivation: "Аналіз стилістичного використання діалектної лексики для створення
      колориту."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ філолога про загрозу нівелювання діалектів під впливом урбанізації
      та засобів масової інформації."
    focus_points: ["архаїчні риси", "мовна інтерференція", "регіональна ідентичність"]
    motivation: "Обговорення сучасної долі територіальних говорів."

writing_tasks:
  - task_type: "есе"
    prompt: "Чи є діалекти загрозою для літературної мови, чи її невичерпним джерелом?
      Обґрунтуйте свою думку на прикладі одного з наріч."
    requirements: ["мінімум 350 слів", "використання термінів: 'етнолект', 'мовна
          норма', 'субстрат'", "посилання на культурний контекст"]
    motivation: "Розвиток навичок критичного аналізу соціолінгвістичних процесів."
    model_answer: "Текст повинен демонструвати розуміння діалекту як органічної складової
      національної мови. Важливо згадати про те, як діалектизми збагачують синоніміку
      та емоційну палітру мовлення."

discussion_topics:
  - context: "Використання діалектів у сучасному медіапросторі: від подкастів до реклами."
    questions:
      - "Чому останнім часом зріс інтерес до регіональних говірок?"
      - "Чи варто вводити вивчення діалектів у шкільну програму?"
      - "Як діалекти допомагають зберігати культурну пам'ять?"
    motivation: "Стимулювання дискусії про престиж та функціонування народних говорів."

content_outline:
  - section: "Основи української діалектології"
    words: 1000
    subsections:
      - "Предмет діалектології та основні поняття: територіальний та соціальний діалект"
      - "Наріччя як найбільша одиниця територіального членування"
      - "Український лінгвістичний атлас: принципи класифікації говорів"
    key_concepts:
      - "ізоглоса"
      - "наріччя"
      - "мовний атлас"
  - section: "Північне та Південно-західне наріччя"
    words: 1000
    subsections:
      - "Поліські говори: архаїзми у фонетиці та лексиці (дифтонги, наголос)"
      - "Південно-західне наріччя: специфіка галицьких, волинських та закарпатських
        говорів"
      - "Вплив іншомовних запозичень (германізми, мадяризми) на західні діалекти"
    key_concepts:
      - "дифтонг"
      - "архаїзм"
      - "мовна запозика"
  - section: "Південно-східне наріччя — основа літературної мови"
    words: 1000
    subsections:
      - "Середньонаддніпрянський говір як база для формування сучасної норми"
      - "Фонетичні та граматичні особливості південно-східних говорів"
      - "Степові говори: формування в умовах інтенсивних міграційних процесів"
    key_concepts:
      - "літературна норма"
      - "койне"
      - "мовна уніфікація"
  - section: "Діалекти та сучасність"
    words: 1000
    subsections:
      - "Діалектизми в художньому та публіцистичному стилях"
      - "Процес нівелювання діалектних рис: причини та наслідки"
      - "Регіональне мовлення та формування локальної ідентичності"
    key_concepts:
      - "стилізація"
      - "ідіолект"
      - "мовна стійкість"

vocabulary:
  required:
    - наріччя
    - говір
    - ізоглоса
    - ареал
    - архаїзм
    - лексема
    - фонема
    - субстрат
  recommended:
    - етнолект
    - диференціація
    - інтерференція
    - картографування
    - континіум

activity_hints:
  - type: critical-analysis
    description: "Analyze dialect features in Kotsyubynsky's 'Shadows of Forgotten
      Ancestors' — identify Hutsul lexical, phonetic, and morphological markers."
  - type: match-up
    description: "Match Ukrainian dialect groups (північне, південно-західне, південно-східне
      наріччя) with their characteristic features and geographic areas."
  - type: select
    description: "Identify the dialect origin of specific linguistic features — distinguish
      between Polisian archaic forms, Galician influences, and Steppe innovations."
  - type: error-correction
    description: "Identify dialectal forms in a text and provide their literary Ukrainian
      equivalents with linguistic explanation."
  - type: reading
    description: "Read a passage containing dialectal features and answer comprehension
      questions about the linguistic phenomena present."

activities:
  types_required:
    - critical-analysis
    - match-up
    - select
    - error-correction
    - reading
  min_items_per_type: 5
  total_min_items: 25

references:
  - "Караман, 10 клас (2018): §1-5 — Загальне мовознавство"
  - "Авраменко, 11 клас (2019): Діалекти, суржик, мовна політика"
  - "State Standard 2024: C1 section on dialectology and sociolinguistics"

connects_to:
  previous: "zahalne-movoznavstvo"
  next: "surzhyk"
