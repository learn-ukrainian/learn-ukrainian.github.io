module: c1-031
level: C1
sequence: 31
slug: dialects-of-ukrainian
version: '1.0'
title: "Діалекти української мови: Територіальні різновиди та мовна стійкість"
subtitle: "Dialects of Ukrainian"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Розуміти структуру діалектного членування української мови (наріччя, діалекти, говори)."
  - "Визначати фонетичні, морфологічні та лексичні особливості північного, південно-західного та південно-східного наріч."
  - "Аналізувати роль діалектів у збагаченні літературної мови та художнього стилю."
  - "Ознайомитися з працями видатних діалектологів (І. Матвіяс, Й. Дзендзелівський)."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Атлас української мови: історія створення та методологія картографування."
    key_elements: ["ізоглоса", "ареал", "континіум"]
    motivation: "Ознайомлення з академічним інструментарієм дослідження територіальних діалектів."
  - source_type: "художній уривок"
    topic: "Гуцульський говір у творах Михайла Коцюбинського ('Тіні забутих предків')."
    key_elements: ["діалектизм", "архаїзм", "екзотизм"]
    motivation: "Аналіз стилістичного використання діалектної лексики для створення колориту."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ філолога про загрозу нівелювання діалектів під впливом урбанізації та засобів масової інформації."
    focus_points: ["архаїчні риси", "мовна інтерференція", "регіональна ідентичність"]
    motivation: "Обговорення сучасної долі територіальних говорів."

writing_tasks:
  - task_type: "есе"
    prompt: "Чи є діалекти загрозою для літературної мови, чи її невичерпним джерелом? Обґрунтуйте свою думку на прикладі одного з наріч."
    requirements: ["мінімум 350 слів", "використання термінів: 'етнолект', 'мовна норма', 'субстрат'", "посилання на культурний контекст"]
    motivation: "Розвиток навичок критичного аналізу соціолінгвістичних процесів."
    model_answer: "Текст повинен демонструвати розуміння діалекту як органічної складової національної мови. Важливо згадати про те, як діалектизми збагачують синоніміку та емоційну палітру мовлення."

discussion_topics:
  - context: "Використання діалектів у сучасному медіапросторі: від подкастів до реклами."
    questions:
      - "Чому останнім часом зріс інтерес до регіональних говірок?"
      - "Чи варто вводити вивчення діалектів у шкільну програму?"
      - "Як діалекти допомагають зберігати культурну пам'ять?"
    motivation: "Стимулювання дискусії про престиж та функціонування народних говорів."

content_outline:
  - section: "Основи української діалектології"
    words: 1000
    subsections:
      - "Предмет діалектології та основні поняття: територіальний та соціальний діалект"
      - "Наріччя як найбільша одиниця територіального членування"
      - "Український лінгвістичний атлас: принципи класифікації говорів"
    key_concepts:
      - "ізоглоса"
      - "наріччя"
      - "мовний атлас"
  - section: "Північне та Південно-західне наріччя"
    words: 1000
    subsections:
      - "Поліські говори: архаїзми у фонетиці та лексиці (дифтонги, наголос)"
      - "Південно-західне наріччя: специфіка галицьких, волинських та закарпатських говорів"
      - "Вплив іншомовних запозичень (германізми, мадяризми) на західні діалекти"
    key_concepts:
      - "дифтонг"
      - "архаїзм"
      - "мовна запозика"
  - section: "Південно-східне наріччя — основа літературної мови"
    words: 1000
    subsections:
      - "Середньонаддніпрянський говір як база для формування сучасної норми"
      - "Фонетичні та граматичні особливості південно-східних говорів"
      - "Степові говори: формування в умовах інтенсивних міграційних процесів"
    key_concepts:
      - "літературна норма"
      - "койне"
      - "мовна уніфікація"
  - section: "Діалекти та сучасність"
    words: 1000
    subsections:
      - "Діалектизми в художньому та публіцистичному стилях"
      - "Процес нівелювання діалектних рис: причини та наслідки"
      - "Регіональне мовлення та формування локальної ідентичності"
    key_concepts:
      - "стилізація"
      - "ідіолект"
      - "мовна стійкість"

vocabulary:
  required:
    - наріччя
    - говір
    - ізоглоса
    - ареал
    - архаїзм
    - лексема
    - фонема
    - субстрат
  recommended:
    - етнолект
    - диференціація
    - інтерференція
    - картографування
    - континіум

activities:
