module: c1-074
level: C1
sequence: 74
slug: funeral-rituals
version: '2.0'
title: Родинні обряди - похорон
subtitle: Family Rituals - Funeral and Memorial
content_outline:
- section: 'Вступ: Смерть як перехід в українському світогляді (Introduction: Death
    as a Transition)'
  words: 600
  points:
  - Концепція циклічності життя «народження-смерть-відродження» та смерть як перехід
    до іншого стану, а не кінець існування
  - Культ предків та етичні аспекти зв'язку між живими і померлими в українській традиційній
    громаді
  - 'Етикет співчуття та стандартизовані вирази згідно з §3.21: правильне вживання
    фрази «Висловлювати щире співчуття» та доречні мовні кліше'
- section: Похоронні ритуали та лексична стилістика (Funeral Rituals and Lexical Stylistics)
  words: 1000
  points:
  - 'Підготовка до смерті: ритуали сповіді, причастя та останнього прощання з родиною
    і домом'
  - 'Символіка винесення тіла: ритуал триразового стукання домовиною об поріг як знак
    останнього прощання з оселею та розділення світів живих і мертвих'
  - 'Робота з термінологією: «домовина» як літературно-ритуальний синонім до слова
    «труна» та лексичні особливості опису похоронної процесії'
  - 'Використання евфемізмів та метафор для пом''якшення теми смерті (на основі §4.4.3):
    аналіз виразів «відійшов у вічність», «заснув навіки», «покинув нас»'
- section: Голосіння та граматика ритуального звертання (Lamentations and Grammar
    of Ritual Address)
  words: 800
  points:
  - 'Голосіння як унікальний фольклорний жанр: структура, емоційне навантаження та
    функція ритуального плачу в обряді'
  - 'Функціонування кличного відмінка (§4.1.2.7) як засобу ідентифікації адресата
    в текстах голосінь: форми «сину мій», «доле нещасна», «мати рідна»'
  - 'Аналіз поетичних фігур у голосіннях: паралелізм, гіперболізація горя та традиційні
    формули запитування «на кого ти нас покинув?»'
- section: Поминальний цикл та обрядова їжа (Memorial Cycle and Ritual Food)
  words: 800
  points:
  - 'Структура поминальних днів: третини, дев''ятини, сороковини та значення річниці
    (роковин) для вшанування пам''яті'
  - 'Символіка колива (кануну): значення зерна пшениці як символу воскресіння та меду
    як солодощі вічного життя; правила споживання першої страви на обіді'
  - 'Аналіз типової помилки: розрізнення понять «пам''ятник» (матеріальна споруда)
    та «пам''ять» (духовна категорія); корекція виразу «залишити по собі добру пам''ять»'
- section: Провід та мовна практика вшанування (Provody and Language Practice of Remembrance)
  words: 800
  points:
  - 'Проводи (Гробки, Дарна неділя): концепція «радісної зустрічі» з предками після
    Великодня; специфіка поведінки на цвинтарі та обмін звістками'
  - 'Корекція типових помилок: правильне вживання прийменника з дієсловом «сумувати
    за кимось» та морфологічні особливості слова «похорон» (вживання в однині)'
  - 'Дискусійна частина: порівняння української поминальної культури з європейськими
    традиціями; написання есе на тему ставлення до смерті в сучасному світі'
focus: cultural
pedagogy: CBI
objectives:
- Learner can describe the traditional funeral rites (vigil, burial, meal)
- Learner can explain the concept of "holosinnya" (ritual lamentation)
- Learner can use respectful vocabulary to talk about death and memory
- Learner can discuss the significance of memorial days (Provody)
grammar:
- euphemisms for death
- memorial phrases
phase: C1.5 Folk Culture & Arts
persona:
  voice: Senior Specialist
  role: Етнограф обрядів
word_target: 4000
vocabulary_hints:
  required:
  - голосіння (lamentation) — ритуальне голосіння, плач і голосіння; жанр обрядового
    фольклору
  - коливо (funeral dish) — варити коливо, подавати коливо; обрядова їжа з пшениці
    (символ воскресіння) та меду (солодке життя)
  - домовина (coffin) — опускати домовину, стояти біля домовини; піднесений синонім
    до слова «труна»
  - Проводи (memorial days) — ходити на Проводи, Гробки, Дарна неділя; період вшанування
    померлих після Великодня
  - співчуття (condolence) — висловлювати щире співчуття, прийміть мої глибокі співчуття;
    етикет §3.21
  recommended:
  - пам'ять (memory) — залишити добру пам'ять; духовна категорія, не плутати з 'пам'ятником'
    (monument)
  - сумувати за (to miss/yearn for) — вимагає прийменника 'за' (за кимось), уникати
    помилкового 'по комусь'
  - похорон (funeral) — іменник чол. роду однини; стандарт для опису однієї церемонії
  - роковини (anniversary of death) — поминальні обряди через рік після смерті
  - евфемізм (euphemism) — стилістичний засіб пом'якшення (напр. 'заснути навіки');
    §4.4.3
  - кличний відмінок (vocative case) — засіб адресації в голосіннях; §4.1.2.7
