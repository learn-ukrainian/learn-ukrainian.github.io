module: b2-013
level: B2
sequence: 13
slug: zdorovya-i-medytsyna
version: 1.0.1
title: Здоров'я і медицина
subtitle: Здоров'я і медицина
focus: thematic
pedagogy: TTT
word_target: 4000
phase: B2.1 [Participles & Sentence Structure]
objectives:
- Описувати симптоми, скарги та стан здоров'я на прийомі у лікаря.
- 'Розуміти медичні тексти: інструкції до ліків, рецепти, виписки.'
- Обговорювати систему охорони здоров'я в Україні та актуальні медичні теми.
- Інтегрувати дієприкметникові конструкції (діючий лікар, призначене лікування) у медичному контексті.
reading_situations:
- source_type: інструкція до лікарського засобу
  topic: 'Аналіз інструкції: показання, протипоказання, дозування, побічні ефекти.'
  key_elements:
  - медична термінологія
  - модальність (слід, необхідно)
  - безособові конструкції
  motivation: Практика розуміння фармацевтичних текстів.
listening_situations:
- media_type: відео
  setting: 'Консультація лікаря загальної практики: пацієнт описує симптоми, лікар дає рекомендації.'
  focus_points:
  - медична лексика
  - формули ввічливого розпитування
  - інструкції лікаря
  motivation: Розвиток навичок розуміння медичного діалогу.
writing_tasks:
- task_type: опис
  prompt: 'Напишіть лист другові, в якому розповідаєте про нещодавній візит до лікаря: що турбувало, які аналізи здали, що
    призначили.'
  requirements:
  - мінімум 250 слів
  - використання медичної лексики (симптом, діагноз, аналіз, рецепт)
  - дієприкметники (призначене лікування, рекомендовані аналізи)
  motivation: Практика опису медичного досвіду в неформальному стилі.
  model_answer: 'Лист має природно поєднувати медичну термінологію з розмовним тоном: ''Уявляєш, нарешті пішов до лікаря.
    Виявилося, що у мене підвищений тиск. Призначили аналіз крові та кардіограму...'''
discussion_topics:
- context: 'Медична реформа в Україні: переваги та проблеми.'
  questions:
  - Чи змінилася якість медичних послуг після реформи?
  - Що таке 'е-лікарня' та як нею користуватися?
  motivation: Обговорення актуальної соціальної теми з медичною лексикою.
dialogue_situations:
- setting: Пацієнт записується до лікаря через реєстратуру поліклініки.
  roles:
  - пацієнт
  - реєстратор
  key_phrases:
  - я хотів би записатися до терапевта
  - на який день вам зручно?
  - візьміть із собою паспорт і направлення
- setting: Лікар оглядає пацієнта та пояснює результати аналізів.
  roles:
  - лікар
  - пацієнт
  key_phrases:
  - на що скаржитесь?
  - аналізи в нормі
  - я вам призначу
content_outline:
- section: 'На прийомі у лікаря: діалог та лексика'
  words: 1000
  subsections:
  - 'Опис симптомів та скарг: біль, температура, запаморочення'
  - 'Частини тіла та внутрішні органи: розширений словник'
  - 'Лікарські спеціальності: терапевт, кардіолог, хірург, стоматолог'
  - 'Формули лікарського прийому: ''На що скаржитесь?'', ''Де саме болить?'''
  key_concepts:
  - симптом
  - скарга
  - огляд
- section: Діагностика та лікування
  words: 1000
  subsections:
  - 'Аналізи та обстеження: аналіз крові, рентген, УЗД, кардіограма'
  - 'Діагноз та призначення: рецепт, дозування, курс лікування'
  - 'Інструкції до ліків: показання, протипоказання, побічні ефекти'
  - Дієприкметники в медичному контексті (діючий, призначений, рекомендований)
  key_concepts:
  - діагностика
  - лікування
  - рецепт
- section: Система охорони здоров'я в Україні
  words: 1000
  subsections:
  - 'Поліклініка, лікарня, приватна клініка: де лікуватися'
  - 'Медична реформа: сімейний лікар, е-лікарня, декларація'
  - 'Швидка допомога: коли та як викликати'
  - Медичне страхування та безоплатні послуги
  key_concepts:
  - реформа
  - страхування
  - первинна допомога
- section: Профілактика та здоровий спосіб життя
  words: 1000
  subsections:
  - Щеплення, профілактичні огляди, диспансеризація
  - Здорове харчування та фізична активність як профілактика
  - 'Психічне здоров''я: стрес, виснаження, допомога психолога'
  - 'Народна медицина vs доказова медицина: дискусія'
  key_concepts:
  - профілактика
  - щеплення
  - психічне здоров'я
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary_hints:
- word: здоров'я
  translation: health
  context: Здоров'я — найцінніше, що є в людини.
- word: лікар
  translation: doctor
  context: Сімейний лікар — перший, до кого звертатися.
- word: симптом
  translation: symptom
  context: Які симптоми вас турбують?
- word: діагноз
  translation: diagnosis
  context: Лікар поставив діагноз після обстеження.
- word: рецепт
  translation: prescription
  context: Ліки продаються лише за рецептом.
- word: щеплення
  translation: vaccination
  context: Щеплення від грипу роблять восени.
- word: профілактика
  translation: prevention
  context: Профілактика хвороб — це краще, ніж лікування.
- word: медицина
  translation: medicine
  context: Доказова медицина спирається на наукові дані.
- word: скарга
  translation: complaint (medical)
  context: Основна скарга пацієнта — біль у спині.
- word: обстеження
  translation: examination, checkup
  context: Лікар призначив повне обстеження.
- word: дозування
  translation: dosage
  context: Дозування ліків залежить від віку пацієнта.
- word: побічний
  translation: side (effect)
  context: Побічні ефекти ліків описані в інструкції.
- word: поліклініка
  translation: outpatient clinic
  context: Я записався до поліклініки на завтра.
- word: страхування
  translation: insurance
  context: Медичне страхування покриває основні послуги.
- word: запаморочення
  translation: dizziness
  context: Після травми в мене було запаморочення.
- word: виснаження
  translation: exhaustion, burnout
  context: Емоційне виснаження — серйозна проблема.
- word: направлення
  translation: referral
  context: Для вузького спеціаліста потрібне направлення.
- word: декларація
  translation: declaration (with family doctor)
  context: Підписати декларацію з лікарем можна онлайн.
activities:
  types_required:
  - fill-in
  - error-correction
  - select
  - reading
  min_items_per_type: 5
  total_min_items: 25
