- type: reading
  focus: 'Прочитайте текст про на прийомі у лікаря: діалог та лексика і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про діагностика та лікування, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «На прийомі у лікаря: діалог та лексика». Обґрунтуйте свою
    позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему на прийомі у лікаря: діалог та лексика.'
