module: b2-011
level: B2
sequence: 11
version: 1.3.2
title: Активні дієприкметники минулого часу
subtitle: 'Активні дієприкметники минулого часу: творення, використання та лексикалізація'
focus: grammar
pedagogy: PPP
objectives:
- Засвоєння правил творення активних дієприкметників минулого часу від 
  неперехідних дієслів за допомогою суфікса -л-.
- Розуміння стилістичної ролі цих форм у художньому та науковому текстах.
- Вміння розрізняти активні дієприкметники минулого часу та прикметники 
  дієслівного походження.
- Застосування навичок трансформації дієприкметникових зворотів у підрядні 
  речення там, де це вимагає контекст.
- Аналіз типових помилок при використанні застарілих форм на -вш- та їх заміна 
  нормативними відповідниками.
reading_situations:
- source_type: художній твір
  topic: Опис природи після грози (з використанням дієприкметників)
  key_elements:
  - пожовкле (yellowed) листя
  - почорніле (blackened) небо
  - дозрілий (ripened) колос
  - зблідле (paled) обличчя
  motivation: Цей текст демонструє багату палітру описів стану через дію, що 
    завершилася. Студенти аналізують естетичну функцію дієприкметників.
- source_type: науковий опис
  topic: 'Фізико-хімічні процеси: кристалізація та випадання осаду'
  key_elements:
  - охолола (cooled) рідина
  - застигла (frozen) лава
  - посинілий (turned blue) метал
  motivation: Вивчення використання активних дієприкметників для опису фізичних 
    змін у науковій термінології.
listening_situations:
- media_type: подкаст
  setting: 'Бесіда про історію мови: чому в українській мові зникли форми на -вший?'
  focus_points:
  - архаїчні форми
  - порівняння з іншими слов'янськими мовами
  - сучасні норми творення
  motivation: Розуміння еволюції мовної норми допомагає студентам уникати 
    архаїзмів та кальок у власному мовленні.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть короткий репортаж з місця події (наприклад, відкриття 
    виставки або наслідки природного явища), використовуючи активні 
    дієприкметники минулого часу для опису стану об'єктів.
  requirements:
  - мінімум 220 слів
  - використати щонайменше 4 різні активні дієприкметники на -л-
  - використати конструкції з 'який' для порівняння стилів
  motivation: Завдання вчить балансувати між описовістю дієприкметників та 
    динамікою підрядних речень у публіцистичному стилі.
  model_answer: 'Репортаж має містити описи на кшталт: «Почорніле від часу дерево...»,
    «Присутні побачили зблідлі обличчя героїв...». Студент демонструє вміння доречно
    вплітати дієприкметники в оповідну структуру.'
discussion_topics:
- context: 'Стилістика описів: дієприкметник чи підрядне речення?'
  questions:
  - У яких випадках слово 'згорілий' звучить краще, ніж 'той, що згорів'?
  - Як ви гадаєте, чому в поезії дієприкметники на -л- зустрічаються частіше, 
    ніж у діловому листуванні?
  - Чи допомагають ці форми зробити мовлення більш лаконічним?
  motivation: Дискусія стимулює усвідомлений вибір граматичних засобів залежно 
    від мети спілкування.
content_outline:
- section: Механізм творення активних дієприкметників минулого часу
  words: 800
  subsections:
  - Використання основи інфінітива неперехідних дієслів
  - Суфікс -л- та особливості його приєднання
  - Обмеженість творення від перехідних дієслів (чому не можна сказати 
    'прочитавший')
  key_concepts:
  - основа інфінітива
  - неперехідність
  - суфіксальний спосіб
- section: 'Морфологічна омонімія: дієприкметник чи прикметник?'
  words: 800
  subsections:
  - 'Процес ад''єктивації: коли дієприкметник стає постійною ознакою (стиглий, сталий)'
  - 'Граматичні відмінності: наявність пояснювальних слів як маркер дієприкметника'
  - 'Семантичні нюанси: дія в минулому vs якість предмета'
  key_concepts:
  - ад'єктивація
  - ознака за дією
  - синтаксична роль
- section: Стилістичні функції в різних реєстрах
  words: 800
  subsections:
  - 'Художній стиль: створення образності та емоційного забарвлення'
  - 'Науковий стиль: фіксація результатів фізичних чи хімічних процесів'
  - 'Уникнення перевантаження: чому офіційна мова надає перевагу підрядним реченням'
  key_concepts:
  - образність
  - термінологізація
  - стилістична диференціація
- section: 'Норма та антинорма: боротьба з формами на -вш-'
  words: 800
  subsections:
  - Чому форми типу 'посинівший', 'початівший' є грубим порушенням норми
  - Історія виникнення цих кальок та методи їх викорінення
  - 'Таблиця відповідностей: Калька -> Норма (на -л- або підрядне речення)'
  key_concepts:
  - мовна помилка
  - пуризм
  - літературна норма
- section: 'Синтаксичний практикум: трансформація та інтеграція'
  words: 800
  subsections:
  - Заміна дієприкметникових зворотів підрядними означальними реченнями
  - 'Вправа на розширення: від окремого слова до розгорнутого опису стану'
  - 'Аналіз тексту: пошук та виправлення недоречно вжитих форм'
  key_concepts:
  - синтаксична синоніміка
  - трансформаційні вправи
  - контекстуальний аналіз
- section: Підсумок — Summary
  words: 300
  points:
  - "Active past participles are formed from the infinitive stem of intransitive verbs
    using the suffix -л- (змарніти → змарнілий). Forms ending in -вш- or -ш- are incorrect
    Russian calques (incorrect: посинівший). Self-check: How would you correct the
    ungrammatical form 'заснувший'?"
  - 'These forms describe a state resulting from a past action and often become permanent
    adjectives (стиглий, сталий). For transitive verbs, you must use relative clauses
    instead of participles. Self-check: What is the difference between a participle
    and a verbal adjective? Describe 3 things in nature using valid -л- participles
    (e.g., пожовкле листя).'
word_target: 4000
vocabulary:
  required:
  - пожовклий
  - зблідлий
  - змарнілий
  - застарілий
  - здичавілий
  - охололий
  - дозрілий
  - вицвілий
  recommended:
  - ад'єктивація
  - неперехідність
  - архаїзм
  - експресивність
  - лаконічність
activities:
  types_required:
  - fill-in
  - select
  - error-correction
  - highlight-morphemes
  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: fill-in
  focus: Утворити активний дієприкметник минулого часу з суфіксом -л- від основи
    інфінітива
- type: error-correction
  focus: Виправити ненормативні форми на -вший/-ший (посинівший→посинілий, 
    прочитавший→який прочитав)
- type: select
  focus: Визначити, коли дієприкметник на -л- є нормативним, а коли потрібне 
    підрядне речення
- type: group-sort
  focus: Розмежувати прикметники дієслівного походження (сталий, стиглий) та 
    активні дієприкметники (пожовклий, зблідлий)
references:
