slug: active-participles-past
version: '2.0'
title: Активні дієприкметники минулого часу (-лий)
content_outline:
- section: Вступ та теоретичний контекст (Introduction and Theoretical Context)
  words: 500
  points:
  - Визначення активних дієприкметників минулого часу з суфіксом -лий та їх місце
    в морфології.
  - 'Контекст Державного стандарту §4.3.2: пояснення, чому активні дієприкметники
    рідко вживаються в сучасній мові порівняно з пасивними.'
  - 'Культурний аспект: роль концепції ''милозвучності'' (euphony) у відмові від важких
    прикметникових форм на користь підрядних речень.'
- section: Нормативні форми на -лий (Normative Forms in -лий)
  words: 800
  points:
  - Правила утворення від основ неперехідних дієслів доконаного виду (пожовтіти →
    пожовтілий).
  - 'Аналіз частотної лексики за дослідженням: пожовтілий, зів''ялий, застарілий,
    посивілий.'
  - 'Використання в художньому стилі: опис природи та стану предметів (напр., пожовтіле
    листя, зів''яла краса).'
  - Відмежування нормативних форм від штучних калькованих утворень.
- section: Боротьба з русизмами та канцеляритом (Fighting Russisms and Bureaucratic
    Jargon)
  words: 1000
  points:
  - 'Культурний гачок: рух ''Антисуржик'' та боротьба за чистоту мови проти радянського
    бюрократичного стилю (канцеляриту).'
  - 'Типова помилка учня: пастка ''Who Did'' — вживання «читавший» замість нормативного
    «який читав».'
  - 'Історичний контекст: чому форми на -вший вважаються неприродними для української
    мови (вплив церковнослов''янської та російської мов).'
  - 'Практикум з трансформації: перетворення ненормативних форм на підрядні речення
    (той, хто... / який...).'
- section: Лексикалізація та статус 'колишнього' (Lexicalization and 'Former' Status)
  words: 600
  points:
  - 'Розв''язання плутанини: заміна суржикового «бувший» на нормативне «колишній»
    (колишній президент, колишній вчитель).'
  - 'Вживання повноцінних прикметників: минулий (past), майбутній (future), колишній
    (former) та їхні сталі колокації.'
  - Семантична різниця між «минулий» (стосовно часу) та «колишній» (стосовно статусу
    чи ролі).
- section: Синтетичний майбутній час (Synthetic Future Tense)
  words: 800
  points:
  - 'Контекст Державного стандарту §4.1.3.1: утворення форм типу ''боротимуся'', ''питимеш''
    як елегантної альтернативи до аналітичної форми.'
  - 'Педагогічний підхід: презентація форм на -тиму як ознаки високого стилю та компактності
    мовлення, а не архаїзму.'
  - 'Порівняння регістрів: вживання синтетичного майбутнього часу в літературній мові
    порівняно з розмовним ''буду + інфінітив''.'
  - Вправа на стилістичну трансформацію речень для досягнення лаконічності.
- section: Підсумок та практичні поради (Summary and Practical Tips)
  words: 300
  points:
  - 'Золоте правило: перевірка наявності шиплячих суфіксів (-ш-, -щ-) як індикатор
    потреби в заміні на підрядне речення.'
  - Фінальний огляд легітимних форм для опису змін стану природи та людини.
  - 'Підготовка до модуля 09: перехід до поглибленого синтаксису дієприкметникових
    зворотів.'
vocabulary_hints:
  required:
  - минулий (past) — минулий рік, минулий час; висока частотність
  - колишній (former) — колишній президент, колишній чоловік; вживається замість 'бувший'
  - майбутній (future) — майбутній час, майбутнє покоління; висока частотність
  - пожовтілий (yellowed) — пожовтіле листя, пожовтілий папір; літературна норма
  - зів'ялий (withered) — зів'ялі квіти, зів'яла краса; опис стану
  - русизм (russism) — ненормативне запозичення з російської мови
  - нормативний (normative) — той, що відповідає мовним нормам
  - синтетичний (synthetic) — про форму майбутнього часу на -тиму
  recommended:
  - антисуржик (anti-surzhyk) — культурний рух за очищення мови
  - канцелярит (bureaucratic jargon) — важкий, неприродний стиль мовлення
  - милозвучність (euphony) — основний принцип української фонетики
  - той, хто / який (the one who) — конструкції-замінники активних дієприкметників
  - застарілий (outdated) — той, що вийшов з ужитку
