module: b2-078
level: B2
sequence: 78
slug: presentation-skills-basics
version: '1.1'
title: "Мистецтво презентації: Структура та основи виступу"
subtitle: "Навички презентації: структура та основи"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Навчитися планувати та структурувати публічний виступ українською мовою."
  - "Опанувати техніки ефективного початку та завершення презентації."
  - "Вивчити лексику для зв'язного викладу думок та переходу між слайдами."
  - "Розвинути навички роботи з візуальними матеріалами та їхнього коментування."

reading_situations:
  - source_type: "методичні рекомендації"
    topic: "Як підготувати ефективну презентацію: покроковий алгоритм для професіоналів."
    key_elements: ["аналіз аудиторії", "структура виступу", "фрази-переходи", "візуалізація"]
    motivation: "Ознайомлення зі структурою інструктивного тексту та лексикою презентаційних
      навичок."

writing_tasks:
  - task_type: "план виступу"
    prompt: "Складіть детальний план 5-хвилинної презентації на тему 'Моє хобі' або
      'Чому варто вивчати українську мову', вказавши для кожного слайда ключову думку
      та фрази-переходи."
    requirements: ["мінімум 200 слів", "5-7 слайдів із описом змісту кожного", "використання
          фраз-переходів: 'перейдемо до...', 'звертаю вашу увагу на...'"]
    motivation: "Відпрацювання навичок планування та структурування публічного виступу."
    model_answer: "План має демонструвати логічну послідовність, наявність гачка на
      початку, чітку аргументацію та заклик до дії наприкінці."

listening_situations:
  - media_type: "відео"
    setting: "Виступ на конференції TEDxKyiv про інновації в освіті."
    focus_points: ["структура промови", "використання історій (storytelling)", "взаємодія
          з аудиторією"]
    motivation: "Аналіз успішних прикладів публічних виступів."

discussion_topics:
  - context: "Підготовка до першої великої презентації перед керівництвом."
    questions:
      - "Як подолати страх публічного виступу?"
      - "Яка оптимальна кількість слайдів для 10-хвилинної промови?"
      - "Як реагувати, якщо техніка підвела під час виступу?"
    motivation: "Обмін досвідом та розробка стратегій психологічної підготовки."

content_outline:
  - section: "Планування та архітектоніка виступу"
    words: 1000
    subsections:
      - "Визначення мети: інформувати, переконати чи розважити?"
      - "Аналіз аудиторії: як підлаштувати мову та зміст під слухача"
      - "Композиція презентації: вступ, основна частина, кульмінація, висновки"
    key_concepts:
      - "структурування"
      - "цільова аудиторія"
      - "тези"
      - "таймінг"
  - section: "Ефективний вступ та завершення"
    words: 1000
    subsections:
      - "Як 'захопити' аудиторію з перших секунд: типи гачків (hooks)"
      - "Представлення теми та плану виступу (Signposting)"
      - "Сильний фінал: Call to Action (заклик до дії) та резюмування"
    key_concepts:
      - "самопрезентація"
      - "актуалізація"
      - "підсумок"
      - "заклик до дії"
  - section: "Мовні засоби для зв'язності виступу"
    words: 1000
    subsections:
      - "Фрази-переходи між слайдами та логічними блоками"
      - "Слова-маркери для акцентування уваги на головному"
      - "Використання риторичних запитань для залучення аудиторії"
    key_concepts:
      - "конектори"
      - "акцентування"
      - "риторика"
      - "взаємодія"
  - section: "Візуалізація та коментування даних"
    words: 1000
    subsections:
      - "Правила оформлення слайдів: текст vs візуальні образи"
      - "Лексика для опису графіків, діаграм та таблиць у реальному часі"
      - "Утримання уваги: як не читати зі слайдів"
    key_concepts:
      - "візуалізація"
      - "лаконічність"
      - "інфографіка"
      - "демонстрація"

vocabulary:
  required:
    - презентація
    - структура
    - аудиторія
    - слайд
    - вступ
    - висновок
    - аргумент
    - доповідь
  recommended:
    - переконливий
    - наочний
    - інтерактивний
    - лаконічний
    - промовистий

activities:
  types_required:
    - unjumble
    - fill-in
    - match-up
    - essay-response
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: unjumble
    focus: "Відновити правильний порядок елементів плану презентації (вступ, основна
      частина, висновок, Q&A)."
  - type: fill-in
    focus: "Доповнити тексти слайдів фразами-переходами між логічними блоками."
  - type: match-up
    focus: "Зіставити слайд із його функцією (титульний, вступний, аргументаційний,
      підсумковий)."
  - type: select
    focus: "Обрати найефективніший візуальний засіб (графік, діаграма, фото) для конкретного
      типу інформації."

references:
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Публічний виступ"
  - "Ворон А. А. Українська мова. 11 клас (2019) — Академічне красномовство"
  - "Глазова О. П. Українська мова. 11 клас (2019), §1-10 — Культура мовлення"
  - "State Standard 2024: B2 SS 3 — Professional communication, oral skills"

connects_to:
  previous: "news-analysis-advanced"
  next: "presentation-skills-advanced"
phase: B2.4 [Communication Skills]
