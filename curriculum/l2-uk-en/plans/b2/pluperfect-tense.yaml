module: b2-045
level: B2
sequence: 45
slug: pluperfect-tense
version: '1.0'
title: "Давньоминулий час"
subtitle: "Pluperfect Tense"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Зрозуміти функцію давньоминулого часу як засобу вираження дії, що відбулася раніше іншої минулої дії."
  - "Засвоїти морфологічну структуру: минулий час основного дієслова + минулий час допоміжного дієслова 'бути'."
  - "Навчитися узгоджувати допоміжне дієслово 'був/була/було/були' за родом та числом із підметом."
  - "Вивчити стилістичні особливості вживання давньоминулого часу в художній літературі та розмовному мовленні (ретроспекція)."
  - "Відрізняти давньоминулий час від звичайного минулого в контексті складнопідрядних речень."

reading_situations:
  - source_type: "художній уривок (класична проза)"
    topic: "Аналіз спогадів персонажа, де автор використовує давньоминулий час для створення часової глибини."
    key_elements: ["форми був ходив / була читала", "часові маркери 'раніше', 'колись'", "дистанціювання подій"]
    motivation: "Розуміння ролі давньоминулого часу у побудові ретроспективної розповіді."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть коротку історію про сімейну реліквію або легенду. Використовуйте давньоминулий час для опису подій, що передували основній розповіді (щонайменше 5 прикладів)."
    requirements:
      - "правильне узгодження допоміжного дієслова"
      - "логічний зв'язок між минулим та давньоминулим часом"
      - "використання лексики на позначення часу та пам'яті"
      - "мінімум 200 слів"
    motivation: "Розвиток навичок оперування складними часовими планами в оповіді."
    model_answer: "Текст має чітко розділяти два пласти минулого. Наприклад: 'Ми приїхали в село, де колись була жила моя прабабуся'. Очікується вживання форм типу 'знав був', 'бачили були'. Модельний варіант демонструє, як давньоминулий час додає тексту відтінку автентичності та історичності."

discussion_topics:
  - context: "Чи є давньоминулий час архаїзмом, чи він необхідний для сучасної української мови?"
    questions:
      - "Чому, на вашу думку, цей час частіше зустрічається в літературі, ніж у повсякденному мовленні?"
      - "Як би ви передали значення передминулості, не використовуючи спеціальну часову форму?"
      - "Чи існують подібні часові форми у вашій рідній мові?"
    motivation: "Обговорення динаміки мовних норм та стилістичного багатства мови."

content_outline:
  - section: "Поняття та функція давньоминулого часу"
    words: 800
    subsections:
      - "Генезис форми в українській мові"
      - "Основна функція: віддаленість дії у часі"
      - "Співвідношення з англійським Past Perfect та аналогами в інших мовах"
      - "Випадки вживання для позначення перерваної дії ('хотів був сказати')"
    key_concepts:
      - "ретроспекція"
      - "передминулість"
      - "часова дистанція"
      - "акцентування минулого"
  - section: "Творення та граматичне узгодження"
    words: 1000
    subsections:
      - "Алгоритм поєднання основного дієслова та частки 'був'"
      - "Парадигма дієвідмінювання: род та число (ходив був, ходила була, ходило було, ходили були)"
      - "Варіативність порядку слів: 'був ходив' проти 'ходив був'"
      - "Специфіка вживання з дієсловами доконаного та недоконаного виду"
    key_concepts:
      - "допоміжне дієслово"
      - "граматичне узгодження"
      - "морфологічна структура"
      - "варіантність"
  - section: "Стилістика та контексти використання"
    words: 1200
    subsections:
      - "Давньоминулий час у фольклорі та класичній літературі"
      - "Використання в сучасному публіцистичному стилі для підкреслення історичних паралелей"
      - "Розмовні нюанси: вираження марності або нездійсненості дії ('думав був, але передумав')"
      - "Порівняння з описовими конструкціями ('раніше', 'до того як')"
    key_concepts:
      - "мовна стилізація"
      - "нереалізована дія"
      - "історичний пласт"
      - "експресивність"
  - section: "Синтаксичні особливості речень із давньоминулим часом"
    words: 1000
    subsections:
      - "Побудова складнопідрядних речень із часовою послідовністю"
      - "Використання сполучників 'перед тим як', 'до того як', 'поки'"
      - "Пунктуаційні норми в розлогих оповідних конструкціях"
      - "Аналіз логічних помилок при змішуванні часових форм"
    key_concepts:
      - "часова ієрархія"
      - "логіка викладу"
      - "синтаксичний зв'язок"
      - "оповідна структура"

