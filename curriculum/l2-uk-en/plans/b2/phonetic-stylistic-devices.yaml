module: b2-025
level: B2
sequence: 25
slug: phonetic-stylistic-devices
version: '1.2'
title: "Фонетичні стилістичні засоби"
subtitle: "Phonetic Stylistic Devices"
focus: grammar
pedagogy: PPP
phase: "B2.1b [Advanced Syntax]"
word_target: 4000
objectives:
  - "Розуміти природу та функції фонетичних засобів виразності: алітерації, асонансу та ономатопеї."
  - "Аналізувати роль звукопису у створенні художніх образів та емоційної атмосфери тексту."
  - "Використовувати фонетичні засоби для підсилення виразності власного мовлення та письма."
  - "Розрізняти милозвучність (евфонію) як загальну норму української мови та свідомий вибір стилістичного прийому."
  - "Досліджувати взаємозв'язок між звуковим складом слова та його лексичним значенням."

reading_situations:
  - source_type: "поетичний текст"
    topic: "Пейзажна лірика сучасного українського поета."
    key_elements:
      - "алітерація на глухі приголосні для створення ефекту тиші"
      - "асонанс на голосні 'о', 'у' для передачі настрою суму або глибини"
      - "звуконаслідування (ономатопея) природних явищ (шум дощу, шелест листя)"
    motivation: "Вивчення того, як звуковий малюнок вірша доповнює його візуальну та смислову образність."

listening_situations:
  - media_type: "аудіо"
    setting: "Виконання української народної пісні або сучасної етно-музики."
    focus_points:
      - "Сприйняття ритмомелодики тексту через звукові повтори."
      - "Виявлення зв'язку між фонікою та емоційним станом виконавця."
      - "Аналіз милозвучності українського слова в контексті співу."
    motivation: "Розвиток чутливості до звукової форми мови як важливого складника культурного коду."

writing_tasks:
  - task_type: "творчий опис"
    prompt: "Опишіть бурхливу природну стихію (шторм, грозу, завірюху), використовуючи фонетичні засоби виразності. Обов'язково застосуйте алітерацію та ономатопею."
    requirements:
      - "мінімум 200 слів"
      - "використати мінімум 3 приклади алітерації (повтор однакових приголосних)"
      - "включити щонайменше 4 слова-звуконаслідування"
      - "простежити за збереженням евфонічної норми української мови (чергування у-в, і-й)"
    motivation: "Практичне засвоєння інструментів звукопису для створення експресивного прозового тексту."
    model_answer: "Текст має бути 'чутним': читач повинен відчути звуки стихії через саму структуру слів та їхню комбінацію."

discussion_topics:
  - context: "Чи є українська мова справді однією з наймилозвучніших у світі, чи це гарний міф?"
    questions:
      - "Які звуки української мови здаються вам найбільш приємними, а які - складними?"
      - "Як фонетичні засоби допомагають у рекламі та брендингу (наприклад, назви продуктів)?"
      - "Чи може звук передавати колір або запах (явище синестезії)?"
    motivation: "Стимулювання роздумів про естетичний вимір мови та його вплив на комунікацію."

content_outline:
  - section: "Основи фоніки та евфонії"
    words: 1000
    subsections:
      - "Поняття про милозвучність української мови: закони чергування"
      - "Уникнення збігу приголосних та голосних як вимога стилю"
      - "Роль наголосу в ритмічній організації фрази"
      - "Милозвучність як інструмент ораторського мистецтва"
    key_concepts:
      - "евфонія"
      - "милозвучність"
      - "ритміка"
  - section: "Алітерація та асонанс: звукові повтори"
    words: 1000
    subsections:
      - "Алітерація: повтор приголосних для імітації звуків природи або створення настрою"
      - "Асонанс: повтор голосних як засіб емоційної забарвленості"
      - "Комбіноване використання звукових повторів у художній прозі"
      - "Психоакустичний вплив різних типів звуків на слухача"
    key_concepts:
      - "алітерація"
      - "асонанс"
      - "звукопис"
  - section: "Ономатопея та звуконаслідування"
    words: 1000
    subsections:
      - "Пряме та непряме звуконаслідування"
      - "Специфіка української ономатопеї у порівнянні з іншими мовами"
      - "Використання звуконаслідувальних слів у дитячій літературі та коміксах"
      - "Фонетичний символізм: зв'язок форми звука зі значенням слова"
    key_concepts:
      - "ономатопея"
      - "звуконаслідування"
      - "фонетичний символізм"
  - section: "Стилістичний аналіз та практика письма"
    words: 1000
    subsections:
      - "Аналіз фоніки класичних творів української літератури (Тичина, Антонич)"
      - "Створення звукових ефектів у копірайтингу та публіцистиці"
      - "Редагування тексту з метою покращення його милозвучності"
      - "Типові помилки: надмірне накопичення шиплячих або сонорних звуків (какофонія)"

vocabulary:
  required:
    - фоніка
    - алітерація
    - асонанс
    - ономатопея
    - евфонія
    - звукопис
    - милозвучність
  recommended:
    - синестезія
    - какофонія
    - тембр
    - інтонація
    - експресивність

activities:
  types_required:
    - highlight-morphemes
    - reading
    - essay-response
    - select
    - matching
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: mark-the-words
    focus: "Знайти приклади алітерації та асонансу в поетичному тексті (Тичина, Антонич)"
  - type: match-up
    focus: "Зіставити фонетичний засіб (алітерація / асонанс / ономатопея) з конкретним літературним прикладом"
  - type: select
    focus: "Визначити тип фонетичного засобу виразності у запропонованому рядку"
  - type: fill-in
    focus: "Доповнити речення словом-звуконаслідуванням або створити приклад із заданим типом звукопису"
  - type: error-correction
    focus: "Знайти порушення милозвучності (збіг приголосних, відсутність чергування у/в, і/й) та виправити"

references:
  - source: "Караман, 10 клас (2018)"
    pages: "Стилістика — фонетичні стилістичні засоби"
    topic: "Алітерація, асонанс, ономатопея, евфонія"
  - source: "Глазова, 11 клас (2019)"
    pages: "§1–10"
    topic: "Культура мовлення: стилістичні норми, милозвучність"
  - source: "Державний стандарт 2024"
    pages: "SS 4.4"
    topic: "Стилістика (B2)"

connects_to:
