module: b2-22
level: B2
sequence: 22
slug: register-literary-ukrainian
version: '2.0'
title: Регістр — Літературна українська
subtitle: Мова художньої літератури
content_outline:
- section: 'Вступ: Поняття художнього стилю (Introduction: Concept of Literary Style)'
  words: 600
  points:
  - 'Де зустрічається (проза, поезія, драматургія, есеїстика) та головна мета — естетичний
    вплив та емоційна образність через використання метамови: аналіз, синтез, процес'
  - 'Авторська індивідуальність vs стандартизація інших регістрів: як стиль письменника
    формує унікальне сприйняття художнього світу'
  - Визначення літературознавчих термінів та понять як інструментарію для дослідження
    та інтерпретації тексту
- section: Історичні витоки та зачинателі (Historical Origins and Pioneers)
  words: 800
  points:
  - 'Іван Котляревський та ''Енеїда'' (1798): революційне поєднання високого класичного
    сюжету з живою народною мовою (бурлеск) як фундамент сучасної літературної мови'
  - 'Тарас Шевченко та ''Кобзар'': остаточне утвердження літературного стандарту через
    синтез книжної традиції, фольклору та живої говірки'
  - Майстерність Шевченка у використанні кличного відмінка для персоніфікації абстрактних
    понять та явищ («Думи мої!», «Україно!»)
- section: Лексичні засоби та конотації (Lexical Means and Connotations)
  words: 900
  points:
  - Архаїзми та історизми для створення історичного колориту та піднесеності (отож,
    воістину, мовив, чоло, десниця)
  - Поетична лексика та поетизми (гай, криниця, обрій, зоря) та їх функція у створенні
    ліричного настрою
  - 'Аналіз та запобігання помилці стилістичного дисонансу: чому канцеляризм ''сонце
    здійснило захід'' руйнує художність на відміну від ''сонце сіло за обрій'''
  - Діалектизми як засіб мовної характеристики персонажів та надання тексту автентичності
- section: Тропи, фігури та персоніфікація (Tropes, Figures, and Personification)
  words: 900
  points:
  - Метафора, метонімія та епітети як ключові засоби створення образу (серце каменіє,
    срібний місяць, перо Шевченка)
  - 'Персоніфікація та роль кличного відмінка: виправлення типової помилки ігнорування
    вокатива (правильно: ''О, ноче!'', а не ''О, ніч!'')'
  - 'Гіпербола та літота: емоційне масштабування як метод посилення художньої виразності
    тексту'
- section: Синтаксис та запобігання помилкам (Syntax and Error Prevention)
  words: 800
  points:
  - Стилістична інверсія — зміна порядку слів для логічного акценту та створення особливого
    ритму ('прийшла весна красна')
  - Риторичні фігури (запитання, оклики) та синтаксичні повтори (анафори) для динамізації
    розповіді
  - 'Корекція калькованих конструкцій під впливом іноземних мов: вживання ''брати
    участь у виставі'' замість помилкового ''приймати участь'''
  - 'Практичне застосування: трансформація нейтрального повідомлення про подію у художній
    опис із використанням фігур та тропів'
focus: grammar
pedagogy: TTT
objectives:
- Учень може розпізнавати характерні ознаки літературного стилю
- Учень може аналізувати стилістичні засоби в художніх текстах
- Учень може трансформувати нейтральний текст у літературний стиль
grammar:
- literary-register
- figurative-language
- archaic-vocabulary
- inverted-word-order
phase: B2
vocabulary_hints:
  required:
  - термін (term) — літературознавчий термін, визначення терміна; базовий інструмент
    аналізу
  - поняття (concept) — ключове поняття, абстрактне поняття; вживається для опису
    ідейного змісту
  - процес (process) — творчий процес, літературний процес; описує динаміку створення
    твору
  - метод (method) — творчий метод, художній метод; вказує на спосіб відображення
    дійсності автором
  recommended:
  - аналіз (analysis) — стилістичний аналіз, глибокий аналіз твору; дія по розбору
    художніх засобів
  - синтез (synthesis) — гармонійний синтез, синтез мистецтв; поєднання елементів
    у цілісний образ
  - дослідження (research) — літературне дослідження, результати дослідження; науковий
    підхід до тексту
