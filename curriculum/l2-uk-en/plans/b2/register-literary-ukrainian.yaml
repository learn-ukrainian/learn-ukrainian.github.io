module: b2-040
level: B2
sequence: 40
version: 1.2.1
title: Художній (літературний) стиль
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Визначити ключові особливості художнього стилю (образність, емоційність, естетична функція).
- Дослідити використання тропів та стилістичних фігур у прозових та поетичних текстах.
- Зрозуміти роль індивідуального авторського стилю та відхилень від мовної норми як засобів виразності.
- Навчитися аналізувати підтекст, символіку та метафоричність літературного твору.
- Практикувати опис почуттів, природи та станів людини, використовуючи багатий словниковий запас.
reading_situations:
- source_type: художній уривок
  topic: Глибокий філологічний аналіз опису природи (пейзаж) або психологічного стану героя у творах Михайла Коцюбинського
    ('Intermezzo') або Оксани Забужко.
  key_elements:
  - індивідуально-авторські епітети
  - розгорнуті метаформи
  - синтаксичний паралелізм
  - ритміка прози
  motivation: Розвиток естетичного сприйняття мови, здатності розкодовувати авторські інтенсії та розуміти глибинні сенси
    тексту.
listening_situations:
- media_type: аудіо
  setting: Декламація поезії Ліни Костенко або Василя Стуса у виконанні професійних акторів з аналізом інтонаційних акцентів.
  focus_points:
  - Інтонаційне забарвлення та роль паузи в поетичному тексті.
  - Сприйняття звукопису (алітерація, асонанс).
  - Виявлення ключових образів-символів.
  motivation: Відчуття музикальності та експресивності українського слова, а також розвиток емоційного інтелекту через аудіальний
    канал.
writing_tasks:
- task_type: власне висловлення
  prompt: Створіть власний художній опис 'Київського вечора' або 'Степового світанку', використовуючи широкий набір тропів
    та стилістичних фігур для передачі настрою та атмосфери.
  requirements:
  - мінімум 300 слів
  - використання щонайменше 3 різних типів метафор
  - наявність індивідуальних епітетів та уособлень
  - застосування інверсії для створення емоційного акценту
  motivation: Практика творчого використання мовних ресурсів для вираження складних емоцій, образів та власного бачення світу.
  model_answer: 'Текст має бути образним та емоційним. Наприклад: ''Вечірній Київ повільно занурювався у сині сутінки, ніби
    старий корабель у глибоку воду (порівняння). Золоті бані соборів ще тримали на собі останні промені сонця, що згасало
    (персоніфікація). Місто дихало тишею, перебитою далеким гуркотом трамваїв. Саме тут, на цих вулицях, оживали тіні минулого
    (інверсія).'''
discussion_topics:
- context: Дискусія про те, чи може переклад художнього твору повністю передати дух та стиль оригіналу.
  questions:
  - Які елементи авторського стилю найважче піддаються перекладу?
  - Чи варто адаптувати культурні метафори під реалії іншої мови?
  - Яку роль відіграє звукопис у сприйнятті перекладної поезії?
  motivation: Розвиток навичок літературознавчого аналізу та здатності обговорювати складні питання художнього перекладу.
content_outline:
- section: Естетична функція та природа художнього образу
  words: 1000
  subsections:
  - Художній образ як специфічний спосіб відображення дійсності в літературі
  - 'Домінування естетичної функції: мова як інструмент мистецтва, а не лише комунікації'
  - Поєднання всіх функціональних стилів у межах художнього тексту (стилізація)
  - 'Поняття підтексту та імпліцитного змісту: що ховається між рядками'
  key_concepts:
  - образність
  - катарсис
  - індивідуальний стиль
- section: Багатство тропів та стилістичних фігур у літературі
  words: 1100
  subsections:
  - 'Метафора, метонімія та синекдоха: когнітивні та художні механізми перенесення значень'
  - 'Епітет як засіб індивідуалізації образу: від постійних до метафоричних означень'
  - 'Гіпербола, літота та оксюморон: створення контрасту та експресивної напруги'
  - 'Перифраз та алегорія: способи непрямого іменування та втілення абстрактних ідей'
  key_concepts:
  - метафоризація
  - експресивність
  - художня деталь
- section: Синтаксис та фоносемантика художнього тексту
  words: 1000
  subsections:
  - 'Стилістичне використання риторичних фігур: звертань, вигуків та запитань'
  - Інверсія та еліпсис як засоби ритмізації та акцентуації в прозі та поезії
  - 'Звукова організація мовлення: алітерація, асонанс, ономатопея (звуконаслідування)'
  - 'Ритмічна та строфічна організація віршованого тексту: метр, розмір, рима'
  key_concepts:
  - інверсія
  - звукопис
  - ритмомелодика
- section: Стратегії аналізу та інтерпретації підтексту
  words: 900
  subsections:
  - Визначення теми, ідеї та основної проблематики літературного твору
  - 'Символіка в українській літературі: від етнографічних до філософських символів'
  - 'Авторська позиція та способи її вираження в тексті: пряма та опосередкована оцінка'
  - 'Інтертекстуальність: алюзії, ремінісценції та діалог з іншими творами'
  key_concepts:
  - символізм
  - інтерпретація
  - алюзія
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
