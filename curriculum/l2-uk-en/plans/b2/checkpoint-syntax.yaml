module: b2-024
level: B2
sequence: 24
slug: checkpoint-syntax
version: '1.1'
title: "Підсумковий модуль: Синтаксис та пунктуація"
subtitle: "Checkpoint: Syntax and Punctuation"
focus: checkpoint
pedagogy: review
phase: "B2.1b [Advanced Syntax]"
word_target: 4000
objectives:
  - "Систематизувати знання про складні синтаксичні конструкції, вивчені в попередніх модулях."
  - "Продемонструвати високий рівень пунктуаційної грамотності у текстах різних стилів."
  - "Ефективно використовувати засоби емфази, відокремлення та вставні конструкції для створення переконливого дискурсу."
  - "Аналізувати та виправляти складні синтаксичні та пунктуаційні помилки у текстах."
  - "Застосовувати синтаксичну синоніміку для покращення стилістики власних творчих та аналітичних робіт."

reading_situations:
  - source_type: "комбінований текст"
    topic: "Аналітичний огляд культурного ландшафту України останнього десятиліття."
    key_elements:
      - "поєднання всіх видів підрядного та безсполучникового зв'язку"
      - "відокремлені члени речення для деталізації фактів"
      - "вставні одиниці для вираження авторської позиції"
    motivation: "Перевірка здатності студента сприймати цілісний складний текст та аналізувати його синтаксичну структуру."

listening_situations:
  - media_type: "відео"
    setting: "Запис панельної дискусії на тему майбутнього української мови у цифровому просторі."
    focus_points:
      - "Розпізнавання складних синтаксичних структур в усному мовленні експертів."
      - "Аналіз логічних пауз та інтонаційних акцентів."
      - "Визначення головних та підрядних частин у багатокомпонентних реченнях."
    motivation: "Оцінка навичок слухового аналізу складного синтаксису в реальному часі."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть розгорнуте есе на тему: «Свобода слова як фундамент демократії». Продемонструйте вживання вставних слів, відокремлених членів, різних типів складних речень та засобів емфази."
    requirements:
      - "мінімум 400 слів"
      - "використати не менше 10 складних граматичних структур, вивчених у розділі B2.1b"
      - "забезпечити бездоганну пунктуацію"
      - "застосувати стилістичні конектори для зв'язку абзаців"
    motivation: "Фінальна перевірка продуктивних навичок володіння складним синтаксисом."
    model_answer: "Текст має бути зразком інтелектуальної прози з багатим синтаксисом, чіткою аргументацією та доречним використанням стилістичних фігур."

discussion_topics:
  - context: "Підбиття підсумків вивчення синтаксису: які конструкції виявилися найбільш корисними для вас?"
    questions:
      - "Яка тема синтаксису була найскладнішою для засвоєння?"
      - "Чи змінився ваш стиль письма після вивчення засобів відокремлення та парцеляції?"
      - "Як ви оцінюєте роль пунктуації у передачі нюансів змісту?"
    motivation: "Рефлексія над навчальним прогресом та практичним застосуванням знань."

content_outline:
  - section: "Комплексний огляд складного речення"
    words: 1000
    subsections:
      - "Систематизація типів зв'язку: сурядність, підрядність, безсполучниковість"
      - "Речення з різними видами зв'язку: ієрархія та логічні блоки"
      - "Пунктуаційний практикум: коми, тире, крапка з комою у багатокомпонентних структурах"
      - "Алгоритм синтаксичного розбору складного речення"
    key_concepts:
      - "синтаксична система"
      - "пунктуаційна норма"
      - "логічна структура"
  - section: "Практикум з відокремлення та парантези"
    words: 1000
    subsections:
      - "Відокремлені члени речення: від означень до уточнень"
      - "Вставні слова та речення як засоби модальності"
      - "Розмежування омонімічних структур у контексті"
      - "Стилістичне навантаження відокремлених одиниць"
    key_concepts:
      - "відокремлення"
      - "модальність"
      - "вставна конструкція"
  - section: "Експресивний синтаксис та текстотворення"
    words: 1000
    subsections:
      - "Інверсія та емфатичні частки: практика наголошування"
      - "Еліпсис та парцеляція як засоби динамізації тексту"
      - "Стилістичні конектори та забезпечення когезії"
      - "Трансформація тексту: зміна синтаксичного малюнка залежно від регістру"
    key_concepts:
      - "експресія"
      - "когезія"
      - "синтаксична трансформація"
  - section: "Діагностика та редагування помилок"
    words: 1000
    subsections:
      - "Типові синтаксичні помилки рівня B2 та методи їх усунення"
      - "Аналіз пунктуаційних 'пасток' у складних контекстах"
      - "Редагування авторського тексту: шлях до ясності та вправності"
      - "Підготовка до фінального тестування: ключові аспекти"

