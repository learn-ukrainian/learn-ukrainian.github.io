module: b2-024
level: B2
sequence: 24
slug: checkpoint-syntax
version: '2.0'
title: 'Контрольна точка: синтаксис'
subtitle: 'Checkpoint: Syntax Mastery'
focus: checkpoint
pedagogy: assessment
phase: B2.2 [Syntax Mastery]
word_target: 4000
objectives:
- Learner can perform comprehensive syntactic analysis of sentences of varying complexity
- Learner can correctly apply punctuation rules across all studied constructions
- Learner can transform syntactic structures for stylistic and register-appropriate effects
- Learner can identify and correct common syntactic and punctuation errors in authentic texts
content_outline:
- section: Діагностичний огляд синтаксичної системи (Diagnostic Review of the Syntactic System)
  words: 800
  points:
  - 'Систематизація синтаксичних знань модулів b2-11 — b2-23: від словосполучень до прямої та непрямої мови'
  - 'Огляд ключових понять: словосполучення, типи присудків, другорядні члени, однорідні члени, відокремлені конструкції,
    вставні слова'
  - 'Рефлексія над типовими помилками: самодіагностика прогалин у пунктуації та синтаксичному аналізі'
  - Критерії оцінювання за Державним стандартом 2024 (§4.3.2 — §4.3.4) та дескрипторами CEFR B2
- section: Завдання на аналіз речень (Sentence Analysis Tasks)
  words: 1000
  points:
  - 'Комплексний синтаксичний розбір: визначення головних та другорядних членів, типу присудка, виду словосполучень у текстах
    різних стилів'
  - 'Ідентифікація синтаксичних конструкцій: розпізнавання однорідних членів, узагальнюючих слів, відокремлених означень,
    обставин, прикладок'
  - 'Класифікація речень: прості, складносурядні, складнопідрядні, безсполучникові — визначення типу за структурою'
  - 'Аналіз засобів зв''язку: сполучники, сполучні слова, інтонація — їхня роль у побудові складних синтаксичних структур'
- section: Трансформаційні вправи (Transformation Exercises)
  words: 1200
  points:
  - 'Трансформація прямої мови в непряму та навпаки: повний цикл граматичних змін (займенники, дієслівні форми, сполучники)'
  - 'Перетворення типів присудків: простий → складений дієслівний → складений іменний для зміни стилістичного ефекту'
  - 'Перебудова речень із відокремленими членами: включення та виключення дієприкметникових та дієприслівникових зворотів'
  - 'Зміна типу зв''язку у словосполученнях: узгодження → керування (напр., «шовкова сукня» → «сукня з шовку»)'
  - 'Стилістична трансформація: переведення тексту з розмовного регістру в науковий із використанням складних синтаксичних
    конструкцій'
- section: Комплексне оцінювання (Comprehensive Assessment)
  words: 1000
  points:
  - 'Пунктуаційний диктант: розстановка розділових знаків у тексті з усіма вивченими конструкціями (однорідні члени, відокремлені
    означення, вставні слова, пряма мова)'
  - 'Редагування тексту: виправлення синтаксичних та пунктуаційних помилок у автентичному тексті наукового стилю'
  - 'Написання структурованого тексту: створення аналітичного тексту з використанням різноманітних синтаксичних конструкцій'
  - 'Самооцінка та план подальшого навчання: виявлення прогалин та побудова плану переходу до фази B2.3 (Register & Communication)'
vocabulary_hints:
  required:
  - синтаксис (syntax) — розділ мовознавства, що вивчає будову речень та словосполучень
  - синтаксичний розбір (syntactic analysis) — процедура повного аналізу будови речення
  - пунктуація (punctuation) — система правил уживання розділових знаків
  - трансформація (transformation) — перетворення синтаксичних конструкцій
  - діагностика (diagnostics) — процес виявлення прогалин у знаннях
  - самооцінка (self-assessment) — оцінювання власних знань та вмінь
  - оцінювання (assessment) — система перевірки засвоєного матеріалу
  recommended:
  - систематизація (systematization) — упорядкування вивченого граматичного матеріалу
  - прогалина (gap) — виявлена слабка ланка у знаннях або вміннях
  - рефлексія (reflection) — осмислення власного навчального досвіду
  - компетенція (competence) — здатність застосовувати знання на практиці
  - регістр (register) — стилістичний рівень мовлення
