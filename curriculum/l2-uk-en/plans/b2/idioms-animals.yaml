module: b2-075
level: B2
sequence: 75
slug: idioms-animals
version: '1.1'
title: "Зооморфні ідіоми: Тваринний світ у мові"
subtitle: "Зооморфні фразеологізми: тваринний світ у мові"
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити систему зооморфних ідіом (зоонімів) та їхній вплив на образність мовлення."
  - "Проаналізувати стереотипні характеристики людей, що базуються на назвах тварин."
  - "Вивчити культурне підґрунтя вживання назв конкретних тварин в українських фразеологізмах."
  - "Відпрацювати навички використання зооморфних метафор у різних стилях мовлення."

reading_situations:
  - source_type: "етнолінгвістична стаття"
    topic: "Символіка коня та вола в українській традиційній картині світу."
    key_elements: ["культ праці", "сила та витривалість", "аграрна метафора", "етнічна
          ідентичність"]
    motivation: "Розуміння історичних коренів найпоширеніших українських зооморфізмів."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть іронічний репортаж про збори мешканців будинку, використовуючи
      зооморфні ідіоми для характеристики учасників."
    motivation: "Розвиток креативного письма та навички створення яскравих мовних
      портретів."
    requirements: ["мінімум 250 слів", "використання щонайменше 7 зоонімів", "іронічний
          стиль"]
    model_answer: "Текст має містити вирази на зразок 'мов як риба у воді', 'крутитися
      як білка в колесі', 'впертий як осел', що допомагають візуалізувати характери
      персонажів."

discussion_topics:
  - context: "Культурна специфіка зооморфних метафор"
    questions:
      - "Чому одна й та сама тварина може мати протилежні конотації в різних культурах?"
      - "Які зооморфні ідіоми ви вважаєте найбільш влучними для опису сучасного суспільства?"
    motivation: "Розвиток міжкультурної свідомості через порівняння зооморфної фразеології
      різних народів."

content_outline:
  - section: "Домашні тварини: дзеркало людських чеснот та вад"
    words: 1000
    subsections:
      - "Собака та кіт: вірність проти підступності ('жити як кіт із собакою', 'як
        собака на сіні')"
      - "Свійська худоба як символ працьовитості, впертості чи покірності ('як віл
        у ярмі', 'як баран на нові ворота')"
      - "Курка та свиня у фразеології побуту та соціального статусу"
    key_concepts:
      - "зоонімічна метафора"
      - "стереотипізація"
      - "антропоцентризм"
      - "побутова лексика"
  - section: "Дика природа та птахи: сила, воля та хитрість"
    words: 1000
    subsections:
      - "Вовк, лисиця та ведмідь: класичні архетипи у фразеології ('хоч вовком вий',
        'лисицею підшитий')"
      - "Птахи як символи волі, самотності чи легкодумства ('як вільний птах', 'біла
        ворона', 'як з гуски вода')"
      - "Метафорика хижацтва та виживання у мовному дискурсі"
    key_concepts:
      - "архетип"
      - "орнітонім"
      - "дихотомія волі-неволі"
      - "хижацька метафора"
  - section: "Комахи, плазуни та земноводні"
    words: 1000
    subsections:
      - "Бджола та мураха: етос працелюбства ('трудитися як бджілка')"
      - "Муха, павук та черв'як: метафори настирливості та нікчемності ('робити з
        мухи слона', 'заморити черв'ячка')"
      - "Змії та жаби у фразеології підступності та заздрощів ('пригріти змію на грудях',
        'жаба давить')"
    key_concepts:
      - "ентомонім"
      - "символіка праці"
      - "негативна конотація"
      - "масштабність метафори"
  - section: "Національний колорит та екзотизми у зооморфній фразеології"
    words: 1000
    subsections:
      - "Специфічно українські зооморфізми: роль лелеки, солов'я та зозулі"
      - "Запозичені та інтернаціональні зооморфні ідіоми ('троянський кінь', 'крокодилячі
        сльози')"
      - "Сучасна трансформація тваринних метафор у медіа та рекламі"
    key_concepts:
      - "етномаркер"
      - "інтернаціоналізм"
      - "фразеологічна трансформація"
      - "культурний код"

vocabulary:
  required:
    - зооморфізм
    - архетип
    - конотація
    - стереотип
    - алегорія
    - працелюбність
    - підступність
    - впертість
  recommended:
    - витривалість
    - підступний
    - кмітливий
    - безпорадний
    - завзятий

activities:
  types_required:
    - group-sort
    - match-up
    - fill-in
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: comparative-study
    focus: "Зіставити зооморфний фразеологізм із його тлумаченням (значенням)."
  - type: essay-response
    focus: "Доповнити ідіому пропущеною назвою тварини."
  - type: critical-analysis
    focus: "Розподілити зооморфні ідіоми за конотацією: позитивні (працелюбність,
      мудрість) та негативні (лінощі, підступність)."
  - type: select
    focus: "Обрати правильну зооморфну ідіому для характеристики персонажа або ситуації."

references:
  - "Караман С. О. Українська мова. 10 клас (2018), §42-45 — Фразеологія"
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Фразеологізми"
  - "State Standard 2024: B2 SS 4.4 — Lexicology, phraseology"

connects_to:
  previous: "idioms-somatic"
  next: "idioms-nature"
