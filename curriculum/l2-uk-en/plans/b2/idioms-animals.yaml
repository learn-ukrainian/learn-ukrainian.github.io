module: b2-065
level: B2
sequence: 65
slug: idioms-animals
version: '1.0'
title: "Зооморфні ідіоми: Тваринний світ у мові"
subtitle: "Zoomorphic Idioms: Animal World in Language"
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити систему зооморфних ідіом (зоонімів) та їхній вплив на образність мовлення."
  - "Проаналізувати стереотипні характеристики людей, що базуються на назвах тварин."
  - "Вивчити культурне підґрунтя вживання назв конкретних тварин в українських фразеологізмах."
  - "Відпрацювати навички використання зооморфних метафор у різних стилях мовлення."

reading_situations:
  - source_type: "етнолінгвістична стаття"
    topic: "Символіка коня та вола в українській традиційній картині світу."
    key_elements: ["культ праці", "сила та витривалість", "аграрна метафора", "етнічна ідентичність"]
    motivation: "Розуміння історичних коренів найпоширеніших українських зооморфізмів."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть іронічний репортаж про збори мешканців будинку, використовуючи зооморфні ідіоми для характеристики учасників."
    motivation: "Розвиток креативного письма та навички створення яскравих мовних портретів."
    requirements: ["мінімум 250 слів", "використання щонайменше 7 зоонімів", "іронічний стиль"]
    model_answer: "Текст має містити вирази на зразок 'мов як риба у воді', 'крутитися як білка в колесі', 'впертий як осел', що допомагають візуалізувати характери персонажів."

content_outline:
  - section: "Домашні тварини: дзеркало людських чеснот та вад"
    words: 1000
    subsections:
      - "Собака та кіт: вірність проти підступності ('жити як кіт із собакою', 'як собака на сіні')"
      - "Свійська худоба як символ працьовитості, впертості чи покірності ('як віл у ярмі', 'як баран на нові ворота')"
      - "Курка та свиня у фразеології побуту та соціального статусу"
    key_concepts:
      - "зоонімічна метафора"
      - "стереотипізація"
      - "антропоцентризм"
      - "побутова лексика"
  - section: "Дика природа та птахи: сила, воля та хитрість"
    words: 1000
    subsections:
      - "Вовк, лисиця та ведмідь: класичні архетипи у фразеології ('хоч вовком вий', 'лисицею підшитий')"
      - "Птахи як символи волі, самотності чи легкодумства ('як вільний птах', 'біла ворона', 'як з гуски вода')"
      - "Метафорика хижацтва та виживання у мовному дискурсі"
    key_concepts:
      - "архетип"
      - "орнітонім"
      - "дихотомія волі-неволі"
      - "хижацька метафора"
  - section: "Комахи, плазуни та земноводні"
    words: 1000
    subsections:
      - "Бджола та мураха: етос працелюбства ('трудитися як бджілка')"
      - "Муха, павук та черв'як: метафори настирливості та нікчемності ('робити з мухи слона', 'заморити черв'ячка')"
      - "Змії та жаби у фразеології підступності та заздрощів ('пригріти змію на грудях', 'жаба давить')"
    key_concepts:
      - "ентомонім"
      - "символіка праці"
      - "негативна конотація"
      - "масштабність метафори"
  - section: "Національний колорит та екзотизми у зооморфній фразеології"
    words: 1000
    subsections:
      - "Специфічно українські зооморфізми: роль лелеки, солов'я та зозулі"
      - "Запозичені та інтернаціональні зооморфні ідіоми ('троянський кінь', 'крокодилячі сльози')"
      - "Сучасна трансформація тваринних метафор у медіа та рекламі"
    key_concepts:
      - "етномаркер"
      - "інтернаціоналізм"
      - "фразеологічна трансформація"
      - "культурний код"

vocabulary:
  required:
    - зооморфізм
    - архетип
    - конотація
    - стереотип
    - алегорія
    - працелюбність
    - підступність
    - впертість
  recommended:
    - витривалість
    - підступний
    - кмітливий
    - безпорадний
    - завзятий

activities:
  types_required:
    - group-sort
    - match-up
    - fill-in
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "idioms-somatic"
  next: "idioms-nature"
