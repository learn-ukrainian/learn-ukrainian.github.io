module: b2-035
level: B2
sequence: 35
slug: mistsia-i-oriientyry
version: '1.0'
title: "Місця й орієнтири"
subtitle: "Місця й орієнтири"
focus: thematic
pedagogy: TTT
word_target: 4000
phase: "B2.3 [Stylistic Devices & Register]"
objectives:
  - "Описувати міські та природні ландшафти з багатою лексикою та стилістичними засобами."
  - "Давати та розуміти складні вказівки щодо маршруту та орієнтації в просторі."
  - "Обговорювати урбаністику, архітектуру та збереження пам'яток."
  - "Інтегрувати стилістичні засоби (епітети, метафори, порівняння) в описах місць."

reading_situations:
  - source_type: "путівник"
    topic: "Опис маловідомих туристичних маршрутів Закарпаття: замки, гірські
      стежки, термальні джерела."
    key_elements: ["описова лексика", "географічні назви", "прикметники від
          топонімів"]
    motivation: "Розуміння літературного опису місцевості."

listening_situations:
  - media_type: "відео"
    setting: "Екскурсовод розповідає про історію та архітектуру Андріївського
      узвозу в Києві."
    focus_points: ["стилістичні засоби в усному описі", "архітектурна лексика",
      "історичні факти"]
    motivation: "Розвиток навичок сприйняття описового мовлення."

writing_tasks:
  - task_type: "есе"
    prompt: "Опишіть своє улюблене місце в Україні (або місце, яке мрієте відвідати)
      так, щоб читач захотів туди поїхати. Використовуйте стилістичні засоби."
    requirements:
      - "мінімум 300 слів"
      - "щонайменше 5 стилістичних засобів (епітети, метафори, порівняння)"
      - "прикметники від географічних назв"
    motivation: "Практика описового стилю з використанням стилістичних засобів."
    model_answer: "Текст має бути образним: 'Карпати зустрічають тебе тишею, яка
      обіймає. Прохолодне повітря, що пахне ялиною, наповнює легені. Верховинські
      полонини розстеляються зеленим килимом до самого горизонту...'"

discussion_topics:
  - context: "Зруйновані та відновлені міста: Маріуполь, Ірпінь, Бородянка."
    questions:
      - "Як відновити зруйноване місто, зберігши його історичну пам'ять?"
      - "Що робить місто затишним для життя?"
    motivation: "Обговорення урбаністики та відновлення в контексті війни."

dialogue_situations:
  - setting: "Турист запитує дорогу до музею, перехожий пояснює складний маршрут."
    roles: ["турист", "перехожий"]
    key_phrases: ["як дістатися до музею?", "ідіть прямо до перехрестя",
      "поверніть ліворуч біля церкви"]
  - setting: "Друзі планують подорож Україною та обговорюють маршрут."
    roles: ["друг 1", "друг 2"]
    key_phrases: ["пропоную почати з Львова", "звідти можна доїхати потягом",
      "обов'язково зупинимося в Чернівцях"]

content_outline:
  - section: "Міський ландшафт та орієнтація"
    words: 1000
    subsections:
      - "Частини міста: центр, передмістя, район, мікрорайон, околиця"
      - "Орієнтири: площа, перехрестя, набережна, парк, пам'ятник"
      - "Вказівки напрямку: прямо, ліворуч, праворуч, навпроти, поруч"
      - "Транспортна лексика: маршрут, пересадка, зупинка, кінцева"
    key_concepts:
      - "орієнтація"
      - "маршрут"
      - "міський простір"
  - section: "Архітектура та пам'ятки"
    words: 1000
    subsections:
      - "Архітектурні стилі: бароко, модерн, конструктивізм, сучасна архітектура"
      - "Знакові пам'ятки: Софійський собор, Львівська опера, Хотинська фортеця"
      - "Збереження культурної спадщини під час війни"
      - "Прикметники від географічних назв: київський, одеський, харківський"
    key_concepts:
      - "архітектура"
      - "спадщина"
      - "збереження"
  - section: "Природні ландшафти та екотуризм"
    words: 1000
    subsections:
      - "Карпати: полонини, потоки, ліси, заповідники"
      - "Степ, лісостеп, Полісся: природні зони України"
      - "Водойми: Дніпро, Південний Буг, Чорне море, озера"
      - "Стилістичні засоби для опису природи: епітети, метафори, порівняння"
    key_concepts:
      - "ландшафт"
      - "екотуризм"
      - "заповідник"
  - section: "Подорожі Україною"
    words: 1000
    subsections:
      - "Планування подорожі: маршрут, бронювання, бюджет"
      - "Типи туризму: культурний, зелений, гастрономічний, військовий"
      - "Безпека подорожей під час війни: поради та обмеження"
      - "Враження від подорожі: як описати та рекомендувати"
    key_concepts:
      - "подорож"
      - "туризм"
      - "враження"

vocabulary_hints:
  - word: "орієнтир"
    translation: "landmark"
    context: "Головний орієнтир — це дзвіниця собору."
  - word: "пам'ятка"
    translation: "monument, heritage site"
    context: "Софійський собор — пам'ятка світового значення."
  - word: "район"
    translation: "district, area"
    context: "Подільський район — один із найстаріших у Києві."
  - word: "околиця"
    translation: "outskirts"
    context: "На околиці міста є гарний ліс."
  - word: "забудова"
    translation: "development, built environment"
    context: "Нова забудова змінює обличчя міста."
  - word: "архітектура"
    translation: "architecture"
    context: "Львів славиться своєю архітектурою."
  - word: "набережна"
    translation: "embankment, waterfront"
    context: "Набережна Дніпра — улюблене місце прогулянок."
  - word: "перехрестя"
    translation: "intersection, crossroads"
    context: "На перехресті поверніть праворуч."
  - word: "заповідник"
    translation: "nature reserve"
    context: "Карпатський біосферний заповідник — унікальне місце."
  - word: "полонина"
    translation: "high mountain meadow (Carpathians)"
    context: "Полонини вкриті квітами влітку."
  - word: "фортеця"
    translation: "fortress"
    context: "Хотинська фортеця стоїть над Дністром."
  - word: "собор"
    translation: "cathedral"
    context: "Софійський собор збудовано в XI столітті."
  - word: "маршрут"
    translation: "route"
    context: "Маршрут проходить через три області."
  - word: "пересадка"
    translation: "transfer (transport)"
    context: "Пересадка на станції 'Золоті ворота'."
  - word: "бронювання"
    translation: "booking, reservation"
    context: "Бронювання готелю можна зробити онлайн."
  - word: "передмістя"
    translation: "suburb"
    context: "Ірпінь — передмістя Києва."
  - word: "спадщина"
    translation: "heritage"
    context: "Культурна спадщина потребує захисту."
  - word: "узвіз"
    translation: "steep street (Kyiv term)"
    context: "Андріївський узвіз — найвідоміша вулиця Києва."

