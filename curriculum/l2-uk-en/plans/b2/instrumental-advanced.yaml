module: b2-049
level: B2
sequence: 49
slug: instrumental-advanced
version: 1.0.2
title: 'Орудний відмінок: поглиблений рівень'
subtitle: 'Орудний відмінок: поглиблений рівень'
focus: grammar
pedagogy: TTT
word_target: 4000
phase: B2.4 [Domain Vocabulary & Advanced Cases]
objectives:
- 'Опанувати складні семантичні функції орудного відмінка: порівняння, супровід, допустовість.'
- 'Засвоїти всі прийменники з орудним: з/із, за, між, над, під, перед, поза, поряд
  з.'
- Розрізняти орудний знаряддя дії та орудний діяча (і чому орудний діяча — не 
  норма в безособових на -но/-то).
- Вживати орудний у складеному іменному присудку (стати лікарем, бути другом).
reading_situations:
- source_type: художній текст
  topic: 'Уривок з оповідання сучасного автора: опис природи та емоцій з багатим використанням
    орудного відмінка.'
  key_elements:
  - орудний порівняння (летіти стрілою)
  - орудний часу (вечорами)
  - орудний засобу (писати олівцем)
  motivation: Аналіз стилістичних функцій орудного в художній прозі.
listening_situations:
- media_type: подкаст
  setting: 'Розмова про професії: чим займаються перекладачі, архітектори та програмісти.'
  focus_points:
  - орудний у присудку (стати перекладачем)
  - орудний засобу (працювати комп'ютером)
  - орудний супроводу (з ентузіазмом)
  motivation: Сприйняття різних функцій орудного в усному мовленні.
writing_tasks:
- task_type: есе
  prompt: Напишіть есе 'Ким я мріяв стати в дитинстві та ким став'. Використайте
    орудний відмінок у різних функціях.
  requirements:
  - мінімум 300 слів
  - орудний у присудку (бути, стати, працювати)
  - орудний порівняння (літати орлом, бігти вітром)
  - орудний засобу та супроводу
  motivation: Практика різноманітних функцій орудного в автобіографічному 
    тексті.
  model_answer: 'Есе має демонструвати різноманіття: ''У дитинстві я мріяв стати космонавтом.
    Літав уявою серед зірок. А став програмістом — працюю комп''ютером, але мрію залишається
    зі мною...'''
discussion_topics:
- context: 'Професія та покликання: чи завжди вони збігаються?'
  questions:
  - Чи важливо працювати за покликанням, чи головне — заробіток?
  - Як знайти баланс між мрією та реальністю?
  motivation: Дискусія з вживанням орудного у присудку та засобі.
dialogue_situations:
- setting: Колишні однокласники зустрічаються та розповідають, ким стали.
  roles:
  - однокласник 1
  - однокласник 2
  key_phrases:
  - я став архітектором
  - працюю з великим задоволенням
  - між нами кажучи
- setting: Майстер пояснює учневі, яким інструментом працювати.
  roles:
  - майстер
  - учень
  key_phrases:
  - ріжте ножицями, а не ножем
  - працюйте обома руками
  - під ногами не плутайтесь
content_outline:
- section: Семантичні ролі орудного відмінка
  words: 1000
  subsections:
  - 'Орудний знаряддя дії: писати ручкою, їхати потягом'
  - 'Орудний засобу: передати електронною поштою, оплатити карткою'
  - 'Орудний порівняння: летіти стрілою, литися рікою, стояти стіною'
  - 'Орудний часу та місця: ранками, вечорами; дорогою, полем'
  key_concepts:
  - орудний знаряддя
  - орудний порівняння
  - орудний часу
- section: Орудний у присудку та дієслівних конструкціях
  words: 1000
  subsections:
  - 'Складений іменний присудок: бути/стати/працювати + орудний (стати лікарем)'
  - 'Орудний із дієсловами стану: здаватися, виявитися, лишитися'
  - 'Орудний дійової особи: обмеження в безособових на -но/-то (не ''зроблено робітниками'',
    а ''робітники зробили'')'
  - 'Орудний супроводу: йти з другом, працювати з натхненням'
  key_concepts:
  - присудок
  - дієслово стану
  - обмеження орудного
- section: Прийменники з орудним відмінком
  words: 1000
  subsections:
  - 'З/із + орудний: супровід, спосіб, матеріал (з радістю, з молоком)'
  - 'За + орудний: послідовність, мета (слідувати за, бігти за)'
  - 'Між, над, під, перед, поза, поряд з: просторові та абстрактні значення'
  - 'Допустові конструкції: попри, незважаючи на (+ порівняння з давальним)'
  key_concepts:
  - просторове значення
  - абстрактне значення
  - допустовість
- section: Орудний у різних стилях та регістрах
  words: 1000
  subsections:
  - 'Художній стиль: орудний порівняння як стилістичний засіб'
  - 'Науковий стиль: орудний засобу та методу (дослідити методом, виміряти приладом)'
  - 'Офіційний стиль: орудний у формулах (затверджено наказом, підписано директором)'
  - 'Типові помилки: змішування орудного знаряддя з орудним діяча'
  key_concepts:
  - стилістична функція
  - формула
  - типова помилка
- section: Підсумок — Summary
  words: 300
  points:
  - 'The Instrumental case expresses complex semantic roles: instrument (писати ручкою),
    comparison (летіти стрілою), time/place (вечорами), and is required in compound
    nominal predicates (стати лікарем, бути другом).'
  - Prepositions like з/із, за, між, над, під, перед, and поза govern the 
    Instrumental case for spatial, abstract, and accompaniment meanings.
  - 'Self-check: What is the difference between the Instrumental of instrument and
    the Instrumental of agent? Why is the agentive Instrumental incorrect in -но/-то
    constructions? Describe your future profession and how you travel to work using
    the Instrumental case.'
vocabulary_hints:
- word: орудний
  translation: instrumental (case)
  context: Орудний відмінок відповідає на питання 'ким? чим?'
- word: порівняння
  translation: comparison
  context: 'Орудний порівняння: голос лився рікою.'
- word: супровід
  translation: accompaniment
  context: 'Орудний супроводу: прийшов із другом.'
- word: допустовість
  translation: concession
  context: Попри труднощі (допустовість), він продовжив.
- word: знаряддя
  translation: instrument, tool
  context: 'Орудний знаряддя: писати олівцем.'
- word: присудок
  translation: predicate
  context: 'У складеному присудку: стати вчителем.'
- word: засіб
  translation: means, method
  context: Передати повідомлення різними засобами.
- word: натхнення
  translation: inspiration
  context: Працювати з натхненням — це щастя.
- word: покликання
  translation: vocation, calling
  context: Медицина — його покликання.
- word: ентузіазм
  translation: enthusiasm
  context: Він взявся за роботу з ентузіазмом.
- word: обмеження
  translation: limitation, restriction
  context: Обмеження на орудний діяча в -но/-то.
- word: метод
  translation: method
  context: Дослідити проблему науковим методом.
- word: послідовність
  translation: sequence
  context: За вступом слідує основна частина.
- word: формула
  translation: formula
  context: 'Офіційна формула: ''затверджено наказом''.'
- word: затвердити
  translation: to approve, ratify
  context: Рішення затверджено наказом директора.
- word: прилад
  translation: device, instrument
  context: Виміряти температуру приладом.
- word: ножиці
  translation: scissors
  context: Ріжте папір ножицями.
- word: стіна
  translation: wall
  context: Захисники стояли стіною.
