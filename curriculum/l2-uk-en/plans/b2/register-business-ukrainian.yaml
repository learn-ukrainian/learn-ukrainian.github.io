module: b2-037
level: B2
sequence: 37
version: 1.2.2
title: Ділова українська мова
focus: professional
pedagogy: PPP
word_target: 4000
objectives:
- Опанувати основні принципи ділового листування (імейли, офіційні листи).
- Вивчити стандартні мовні формули та кліше для проведення переговорів та 
  презентацій.
- Зрозуміти особливості ділового етикету в українському культурному контексті.
- Навчитися складати базову ділову документацію (протоколи, звіти, резюме).
- Засвоїти актуальну термінологію у сферах менеджменту, фінансів та 
  корпоративної культури.
reading_situations:
- source_type: ділова документація / корпоративні сайти
  topic: Аналіз структури та мови комерційної пропозиції (commercial proposal) 
    відомої української IT-компанії.
  key_elements:
  - формальний тон
  - використання термінології
  - переконливі конструкції
  - структура ціннісної пропозиції
  motivation: Розуміння того, як мова сприяє досягненню бізнес-цілей та 
    формуванню професійного іміджу компанії.
listening_situations:
- media_type: інтерв'ю
  setting: Інтерв'ю з HR-директором великої корпорації про вимоги до кандидатів 
    та корпоративну культуру спілкування.
  focus_points:
  - Виявлення ключових soft skills за мовними маркерами.
  - Розпізнавання стратегій ввічливої відмови.
  - Ідентифікація сучасної корпоративної термінології.
  motivation: Розвиток здатності розуміти професійне мовлення в динамічному 
    середовищі та підготовка до проходження співбесід.
writing_tasks:
- task_type: офіційний лист
  prompt: Напишіть офіційний лист-запит до потенційного партнера про можливість 
    встановлення довгострокової співпраці. Включіть короткий опис вашої 
    діяльності, конкретні пропозиції та прохання про зустріч.
  requirements:
  - чітка структура (тема, вітання, основна частина, підпис)
  - використання мінімум 5 стандартних бізнес-кліше
  - дотримання офіційно-ділового стилю без надмірної емоційності
  - мінімум 250 слів
  motivation: Практика написання найбільш затребуваного типу ділового тексту в 
    професійному середовищі.
  model_answer: 'Лист має бути конкретним та професійним. Наприклад: ''Шановні колеги!
    Звертаємося до Вас із пропозицією розглянути можливість партнерства в галузі відновлюваної
    енергетики. Наша компанія має багаторічний досвід реалізації інноваційних проектів.
    Сподіваємося на плідну та взаємовигідну співпрацю. Будемо вдячні за зворотний
    зв''язок.'''
discussion_topics:
- context: 'Дискусія про вплив англіцизмів на сучасну українську ділову мову: за і
    проти.'
  questions:
  - Чи варто замінювати слова типу 'фідбек' або 'мітинг' українськими 
    відповідниками?
  - Як надмірне використання термінології впливає на зрозумілість комунікації з 
    клієнтами?
  - Які особливості українського ділового етикету відрізняють його від західних 
    моделей?
  motivation: Розвиток критичного мислення щодо мовних процесів у професійній 
    сфері та навичок аргументації.
content_outline:
- section: Етикет та стратегії ділової комунікації
  words: 1000
  subsections:
  - 'Принципи ділового етикету: повага, точність, відповідальність та конфіденційність'
  - 'Культура телефонних розмов та відеодзвінків: специфіка вербальних та невербальних
    засобів'
  - 'Міжкультурні аспекти ділового спілкування: як уникати непорозумінь з партнерами'
  - Стратегії переконування та аргументації в професійному середовищі
  key_concepts:
  - діловий етикет
  - професійна етика
  - адресат
- section: Структура та мова ділового листування
  words: 1000
  subsections:
  - 'Типологія ділових листів: супровідні, інформаційні, листи-запити, листи-відповіді,
    претензії'
  - 'Стандартні мовні формули (кліше) для різних частин листа: вступ, аргументація,
    висновки'
  - 'Особливості електронного ділового листування (e-mail): тема листа, лаконічність,
    нетикет'
  - 'Редагування та коректура ділових текстів: уникнення тавтології та канцеляризмів'
  key_concepts:
  - мовне кліше
  - стандартизація
  - лаконічність
- section: Мова переговорів та публічних виступів у бізнесі
  words: 1000
  subsections:
  - 'Етапи ділових переговорів та відповідні мовні стратегії: від small talk до підписання
    угоди'
  - 'Мистецтво презентації: структура виступу, візуалізація та взаємодія з аудиторією'
  - Техніки активного слухання та перефразування для уточнення позицій сторін
  - 'Ввічлива відмова та робота із запереченнями: збереження партнерських стосунків'
  key_concepts:
  - переговори
  - презентація
  - компроміс
- section: Корпоративна термінологія та офіційна документація
  words: 1000
  subsections:
  - 'Галузева термінологія: менеджмент, маркетинг, логістика, IT та фінанси'
  - Складання професійного резюме (CV) та мотиваційного листа українською мовою
  - 'Документування управлінської діяльності: накази, протоколи, звіти, доповідні
    записки'
  - 'Юридичні аспекти ділової мови: точність формулювань у договорах та угодах'
  key_concepts:
  - терміносистема
  - резюме
  - протоколювання
- section: Підсумок — Summary
  words: 300
  points:
  - 'Business communication relies on specific etiquette, standard phrases (кліше),
    and concise structures. Key concepts to review: email etiquette (нетикет), active
    listening, and corporate terminology (терміносистема). Self-check: What are 3
    standard phrases used to start and end a formal Ukrainian business email?'
  - 'Negotiations and official documentation require accuracy and polite phrasing.
    Key concepts to review: meeting protocols, professional CVs, and handling objections.
    Self-check: What is the difference between a резюме (CV) and a мотиваційний лист?
    Describe 3 strategies for polite refusal during business negotiations.'
vocabulary:
  required:
  - співпраця
  - пропозиція
  - переговори
  - партнерство
  - відповідальність
  - договір
  - термін
  - запит
  recommended:
  - комерційний
  - ефективність
  - рентабельність
  - порядок денний
  - кліше
  - з повагою
activities:
  types_required:
  - reading
  - essay-response
  - select
  - fill-in
  min_items_per_type: 5
  total_min_items: 20
activity_hints:
- type: reading
  focus: Прочитайте текст про етикет та стратегії ділової комунікації і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про структура та мова ділового 
    листування, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Етикет та 
    стратегії ділової комунікації». Обґрунтуйте свою позицію прикладами з 
    тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    етикет та стратегії ділової комунікації.
