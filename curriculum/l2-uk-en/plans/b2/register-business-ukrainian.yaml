title: Ділова українська мова
content_outline:
- section: 'Вступ: Поняття ділового стилю (Introduction: Business Style Concept)'
  words: 500
  points:
  - 'Визначення ділового стилю згідно з Держстандартом §4.4.1: розмежування офіційно-ділового
    та напівофіційного спілкування.'
  - '«Фактор кави» в сучасній комунікації: як IT та креативні індустрії зміщують акценти,
    зберігаючи при цьому офіційну мовну базу.'
  - 'Relationship-First культура: чому встановлення особистого контакту та small talk
    є критично важливими ритуалами перед початком переговорів.'
- section: Ділове та електронне листування (Business and Electronic Correspondence)
  words: 900
  points:
  - 'Структура ділового листа: від чіткої теми (Subject line) до професійного підпису
    та контактної інформації.'
  - 'Ієрархія та звертання: використання «Пане/Пані» + прізвище як золотий стандарт
    до моменту офіційного переходу на «Ти».'
  - 'Візуальне порівняння «Bad vs. Good»: аналіз листів із використанням суржику та
    кальок порівняно зі зразковою діловою мовою.'
  - 'Формулювання прохань та комерційних пропозицій: етикетні рамки та мовні кліше
    для успішного першого контакту.'
- section: Переговори та укладання угод (Negotiations and Contracting)
  words: 900
  points:
  - 'Лексика переговорів за стандартом §3.11: активне використання фраз «вести переговори»,
    «іти на переговори» та «досягти домовленості».'
  - 'Мистецтво компромісу: мовні конструкції для вираження згоди, незгоди та пошуку
    спільних рішень («піти на компроміс»).'
  - 'Етикет ділових подарунків: як використовувати символічні жести уваги (брендована
    продукція, солодощі) як інструмент довіри, а не хабаря.'
  - 'Термінологія угод: правильне вживання дієслів «укласти угоду», «підписати контракт»
    та процедура «розірвання угоди».'
- section: Корпоративна комунікація та етика (Corporate Communication and Ethics)
  words: 700
  points:
  - 'Внутрішня vs зовнішня комунікація: специфіка підготовки річних та фінансових
    звітів, а також проведення презентацій.'
  - 'Стратегічне партнерство: мовні засоби для опису «плідної співпраці» та «взаємовигідних
    умов» довгострокових відносин.'
  - 'Корпоративна культура: уникнення помилок першого контакту, таких як використання
    «привіт» або «ти» без попереднього узгодження.'
- section: Типові помилки та мовна норма (Typical Errors and Language Norms)
  words: 600
  points:
  - 'Боротьба з кальками: виправлення типової помилки «робити рішення» (make a decision)
    на нормативне «приймати/ухвалювати рішення».'
  - 'Фальшиві друзі перекладача: розмежування значень слова «актуальний» (relevant/timely)
    та англійського «actual» (дійсний/справжній).'
  - 'Реєстрова чистота: аналіз випадків Register Confusion, коли розмовні елементи
    руйнують професійний імідж у письмовому спілкуванні.'
- section: Практика та підсумок модуля (Practice and Module Summary)
  words: 400
  points:
  - 'Рольова ситуація: проведення переговорів про співпрацю, що включає етап small
    talk та презентацію вигідної пропозиції.'
  - 'Продуктивне завдання: написання відповіді на складний діловий запит із дотриманням
    усіх ієрархічних та етикетних норм.'
vocabulary_hints:
  required:
  - ділове листування (business correspondence) — вести ділове листування, культура
    листування; базовий термін професійної комунікації
  - переговори (negotiations) — вести переговори, іти на переговори, складні переговори;
    слово року за частотою вжитку
  - угода (contract/agreement) — укласти угоду, підписати угоду, розірвати угоду;
    основна юридична одиниця бізнесу
  - пропозиція (proposal/offer) — комерційна пропозиція, вигідна пропозиція, пристати
    на пропозицію; ключовий елемент продажів
  - співпраця (cooperation) — плідна співпраця, взаємовигідна співпраця; фокус на
    довгострокове партнерство
  - домовленість (agreement) — досягти домовленості; результат успішних переговорів
  - компроміс (compromise) — піти на компроміс, шукати компроміс; маркер гнучкості
    в бізнесі
  - звіт (report) — річний звіт, фінансовий звіт, подати звіт; вимога корпоративної
    звітності
  - презентація (presentation) — провести презентацію; навичка публічного виступу
  - корпоративний (corporate) — корпоративна культура, корпоративний стиль; приналежність
    до компанії
  - партнерство (partnership) — стратегічне партнерство; найвищий рівень ділової взаємодії
  recommended:
  - укласти угоду (to conclude an agreement) — офіційний термін, уникати кальки «зробити
    угоду»
  - умови (terms/conditions) — вигідні умови, згідно з умовами; деталі контракту
  - дедлайн (deadline) — жорсткий дедлайн, зірвати дедлайн; запозичення, що стало
    нормою в IT
  - бюджет (budget) — затвердити бюджет, вийти за межі бюджету; фінансове планування
  - результат (result) — досягти результату; орієнтованість на успіх
  - актуальний (relevant/timely) — актуальне питання; НЕ означає «справжній» (false
    friend)
