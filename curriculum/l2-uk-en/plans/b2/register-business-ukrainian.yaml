title: Ділова українська мова
content_outline:
- section: Вступ — Ділове спілкування
  points:
  - Що таке діловий стиль
  - Відмінність від офіційно-ділового — згідно з Держстандартом §4.4.1 (офіційне й
    неофіційне спілкування)
  - 'Сучасні тенденції в діловій комунікації — «фактор кави»: зміщення IT/креативу
    до напівофіційного стилю, але збереження бази'
- section: Ділове листування
  points:
  - Структура ділового листа
  - 'Формули вітання та прощання — культурний аспект: ієрархія та звертання «Пане/Пані»
    до переходу на «Ти»'
  - Формулювання прохань
  - Формулювання пропозицій
- section: Електронне листування
  points:
  - Специфіка електронних листів — візуальне порівняння «поганий/хороший» лист (Surzhyk
    vs Standard)
  - Тема листа (Subject line)
  - Лаконічність і чіткість — баланс між стислістю та побудовою довіри (Relationship-First
    culture)
  - Підпис та контактна інформація
- section: Переговори та зустрічі
  points:
  - Лексика переговорів — слово року «переговори», важливість small talk для встановлення
    контакту
  - Фрази для вираження згоди/незгоди
  - Компроміс та домовленості — етикет ділових подарунків як частина ритуалу
  - Підсумовування результатів
- section: Корпоративна комунікація
  points:
  - Внутрішня комунікація
  - Звіти та доповіді
  - Презентації
  - Корпоративна культура
- section: Типові помилки та русизми
  points:
  - 'Калькування з російської — типова помилка: «робити рішення» замість «приймати/ухвалювати
    рішення»'
  - 'Англіцизми у діловій мові — фальшиві друзі: «актуальний» (relevant) vs «actual»
    (дійсний)'
  - Правильні українські еквіваленти
  - Сучасна норма — уникнення «привіт»/«ти» у першому контакті (Register Confusion)
- section: Практика і підсумок
  points:
  - Написання ділових листів
  - Рольові ділові ситуації — переговори про «плідну співпрацю» та «вигідні пропозиції»
  - Підготовка до модуля 18
vocabulary_hints:
  required:
  - ділове листування (business correspondence) — вести ділове листування, правила
    ділового листування
  - переговори (negotiations) — вести переговори, іти на переговори, складні переговори
  - пропозиція (proposal/offer) — комерційна пропозиція, вигідна пропозиція, розглянути
    пропозицію
  - домовленість (agreement) — досягти домовленості
  - компроміс (compromise) — піти на компроміс, шукати компроміс
  - звіт (report) — річний звіт, фінансовий звіт
  - презентація (presentation) — провести презентацію
  - корпоративний (corporate) — корпоративна культура, корпоративний стиль
  - співпраця (cooperation) — плідна співпраця, взаємовигідна співпраця, домовитися
    про співпрацю
  - партнерство (partnership) — стратегічне партнерство
  recommended:
  - угода (contract/agreement) — укласти угоду, підписати угоду, розірвати угоду
  - умови (terms/conditions) — вигідні умови, згідно з умовами
  - дедлайн (deadline) — жорсткий дедлайн, зірвати дедлайн
  - бюджет (budget) — затвердити бюджет
  - результат (result) — досягти результату
  - актуальний (relevant/timely) — актуальне питання (NOT real/actual)
