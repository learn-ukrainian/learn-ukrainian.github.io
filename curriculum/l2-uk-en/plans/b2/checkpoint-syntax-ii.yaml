module: b2-031
level: B2
sequence: 31
slug: checkpoint-syntax-ii
version: 1.0.1
title: 'Контрольний модуль: Синтаксис II (складне речення)'
subtitle: 'Підсумковий контроль: складне речення та експресивний синтаксис'
focus: checkpoint
pedagogy: review
word_target: 4000
phase: B2.2 [Advanced Syntax & Stylistics]
objectives:
- Систематизувати знання про складносурядні, складнопідрядні та безсполучникові речення.
- Перевірити вміння використовувати стилістичні конектори, емфазу та інверсію.
- Оцінити навички роботи з прямою та непрямою мовою.
- Продемонструвати пунктуаційну грамотність у складних синтаксичних контекстах.
reading_situations:
- source_type: комбінований текст
  topic: Аналітичний огляд культурного ландшафту України з усіма типами складних речень.
  key_elements:
  - підрядні різних типів
  - безсполучниковий зв'язок
  - вставні речення
  - пряма мова
  motivation: Комплексна перевірка розуміння складного синтаксису.
listening_situations:
- media_type: відео
  setting: Панельна дискусія з багатокомпонентними реченнями та цитуванням.
  focus_points:
  - логічні паузи
  - інтонаційні акценти
  - розпізнавання типів зв'язку
  motivation: Оцінка навичок слухового аналізу складного синтаксису.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть есе: ''Свобода слова як фундамент демократії.'' Використайте всі типи складних речень, засоби емфази та
    цитування.'
  requirements:
  - мінімум 400 слів
  - щонайменше 10 складних синтаксичних конструкцій
  - пряма та непряма мова
  - бездоганна пунктуація
  motivation: Фінальна перевірка продуктивних навичок складного синтаксису.
  model_answer: Текст має бути зразком інтелектуальної прози з багатим синтаксисом та чіткою аргументацією.
discussion_topics:
- context: 'Підбиття підсумків: як синтаксичне багатство змінило ваше письмо.'
  questions:
  - Чи змінився ваш стиль після вивчення емфази та парцеляції?
  - Яка пунктуаційна 'пастка' виявилася найпідступнішою?
  motivation: Рефлексія та самооцінка.
content_outline:
- section: 'Складне речення: систематизація типів зв''язку'
  words: 1000
  subsections:
  - 'Складносурядне: сполучники і, а, але, проте, зате, або'
  - 'Складнопідрядне: означальне, з''ясувальне, обставинне'
  - 'Безсполучникове: семантичні відношення та пунктуація'
  - 'Речення з різними видами зв''язку: ієрархія та блоки'
  key_concepts:
  - сурядність
  - підрядність
  - безсполучниковість
- section: Стилістичні конектори та когезія
  words: 1000
  subsections:
  - Конектори причини, наслідку, протиставлення, доповнення
  - 'Кореляти та парні сполучники: не тільки...а й, як...так і'
  - Забезпечення когезії на рівні абзацу та тексту
  - Стилістична варіативність конекторів у різних регістрах
  key_concepts:
  - когезія
  - конектор
  - стилістична варіативність
- section: Експресивний синтаксис
  words: 1000
  subsections:
  - 'Інверсія та емфатичні частки: саме, навіть, лише, якраз'
  - 'Еліпсис та парцеляція: динамізація тексту'
  - 'Пряма, непряма та невласне пряма мова: трансформація та пунктуація'
  - Риторичні запитання та вигуки як стилістичні засоби
  key_concepts:
  - емфаза
  - парцеляція
  - пряма мова
- section: Діагностика та пунктуаційний практикум
  words: 1000
  subsections:
  - 'Пунктуація у складних контекстах: коми, тире, крапка з комою'
  - 'Типові помилки рівня B2: змішування типів зв''язку'
  - 'Трансформація тексту: зміна синтаксичного малюнка за регістром'
  - 'Фінальний практикум: комплексне редагування'
  key_concepts:
  - пунктуаційна норма
  - трансформація
  - редагування
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary_hints:
- word: складносурядний
  translation: compound (sentence)
  context: Складносурядне речення з'єднує рівноправні частини.
- word: складнопідрядний
  translation: complex (sentence)
  context: Складнопідрядне речення має головну та підрядну частини.
- word: безсполучниковий
  translation: asyndetic
  context: Безсполучникове речення не має сполучника.
- word: конектор
  translation: connector
  context: Конектори забезпечують зв'язність тексту.
- word: когезія
  translation: cohesion
  context: Когезія — це зв'язність на рівні тексту.
- word: інверсія
  translation: inversion
  context: Інверсія змінює порядок слів для наголосу.
- word: емфаза
  translation: emphasis
  context: Емфаза підсилює значення слова.
- word: парцеляція
  translation: parcellation
  context: Парцеляція динамізує текст.
- word: еліпсис
  translation: ellipsis
  context: Еліпсис — пропуск частини речення.
- word: цитування
  translation: quotation
  context: Цитування вимагає правильної пунктуації.
- word: трансформація
  translation: transformation
  context: Трансформація прямої мови в непряму.
- word: варіативність
  translation: variability
  context: Синтаксична варіативність збагачує текст.
- word: систематизація
  translation: systematization
  context: Систематизація знань перед контролем.
- word: структура
  translation: structure
  context: Структура складного речення визначає зміст.
- word: саморефлексія
  translation: self-reflection
  context: Саморефлексія допомагає оцінити прогрес.
activities:
  types_required:
  - error-correction
  - fill-in
  - reading
  - essay-response
  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: reading
  focus: 'Прочитайте текст про складне речення: систематизація типів зв''язку і дайте відповіді на запитання щодо ключових
    понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про стилістичні конектори та когезія, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Складне речення: систематизація типів зв''язку». Обґрунтуйте
    свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему складне речення: систематизація типів зв''язку.'
