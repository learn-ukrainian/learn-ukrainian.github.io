slug: set-expressions-combined
version: '2.0'
title: 'Сталі вирази: Тіло, тварини, предмети та абстракції'
subtitle: 'Set Expressions: Body, Animals, Objects & Abstract (merged)'
focus: phraseology
pedagogy: CBI
phase: B2.6 [Lexicology]
word_target: 4000
objectives:
- Learner can recognize and interpret 16 core Ukrainian idioms with body parts and animals
- Learner can use somatic and zoomorphic idioms appropriately in context
- Learner can explain the cultural symbolism of body parts and animals in Ukrainian phraseology
content_outline:
- section: 'Вступ: Роль фразеологізмів у мовній компетенції (Introduction: Role of Phraseology)'
  words: 500
  points:
  - Визначення фразеологічних одиниць згідно з Державним стандартом §1.4.1.2.1 — важливість доречного вживання ідіом для досягнення
    рівня B2.
  - 'Поняття внутрішньої форми фразеологізму: чому «золоті руки» сприймаються як метафора майстерності, а не матеріал.'
  - Класифікація ідіом на соматичні (частини тіла) та зооморфні (назви тварин) як базовий шар української мовної картини світу.
- section: 'Соматизми: Коли тіло стає метафорою (Somatic Idioms: When the Body Becomes a Metaphor)'
  words: 1000
  points:
  - Аналіз високочастотного виразу «морочити голову» (плутати) — розгляд типових розмовних конструкцій «не мороч мені голову»
    та «годі морочити голову».
  - Дослідження виразу «тримати язик за зубами» як приклад соматичного фразеологізму, що регулює комунікативну поведінку (мовчати/зберігати
    таємницю).
  - Вивчення виразу «не бачити далі свого носа» для опису обмеженості світогляду — контраст між буквальним та переносним сприйняттям.
  - 'Фразеологізми руху: «брати ноги в руки» (поспішати/тікати) та «махнути рукою» (відмовитися/зневіритися) — семантичні
    нюанси.'
- section: Зоофразеологія та культурні коди (Zoomorphic Idioms & Cultural Codes)
  words: 1000
  points:
  - 'Культурний гачок: Походження виразу «собаку з''їв» — зв''язок із козацьким побутом та екстремальним досвідом, що перетворює
    людину на експерта.'
  - 'Символіка хліба: Вираз «На чужий коровай очей не поривай» — коріння у весільних обрядах, де коровай символізував долю
    та багатство пари.'
  - 'Метафора перебільшення: «робити з мухи слона» — порівняння частотності в українській мові та загальноєвропейського контексту.'
  - 'Кількісні оцінки: «як кіт наплакав» (дуже мало) — типові колоквіальні сполучення: «грошей як кіт наплакав», «користі
    як кіт наплакав».'
  - 'Ризиковані дії: «купувати кота в мішку» та поведінкова стратегія «сидіти як миша під віником».'
- section: Аналіз типових помилок та інтерференції (Analysis of Typical Errors & Interference)
  words: 800
  points:
  - 'Помилка калькування: Аналіз недоречного перекладу англійського ''it''s raining cats and dogs'' як *«дощ падає котами
    і собаками»* — заміна на український відповідник «ллє як з відра».'
  - 'Проблема лексичної підміни: Типова помилка «продавати усмішки» замість правильного «продавати витрішки» (gap idly) —
    акцент на унікальності компонентів.'
  - 'Явище контамінації: Розбір помилкового виразу *«грати значення»* (змішування «грати роль» та «мати значення») — вправи
    на розмежування.'
  - 'Міжмовна інтерференція: Чому англійське ''pulling one''s leg'' не перекладається як «тягнути за ногу», а вимагає вживання
    «морочити голову» або «жартувати».'
- section: Практичне застосування та синтез (Practical Application & Synthesis)
  words: 700
  points:
  - 'Регістри мовлення: Розрізнення розмовних (informal) виразів типу «морочити голову» та більш нейтральних фразеологізмів.'
  - 'Методика візуального контрасту: Створення образів, що протиставляють буквальне значення (слон із мухи) переносному для
    кращого запам''ятовування.'
  - 'Творче завдання: Написання розповіді від імені «Казкаря» (persona) з використанням щонайменше 6 вивчених ідіом у правильному
    контексті.'
  - 'Пошук еквівалентів: Співвіднесення українських соматизмів з англійськими аналогами без втрати стилістичного забарвлення.'
vocabulary_hints:
  required:
  - аналіз (analysis) — розклад на компоненти
  - синтез (synthesis) — поєднання частин у ціле
  - дослідження (research) — науковий пошук
  - витрішки (gape) — вживається у фразеологізмі «продавати витрішки»
  - морочити голову (to confuse/bother) — розмовне; колок.: «не мороч мені голову»
  - тримати язик за зубами (to keep a secret) — висока частотність; нейтральне
  - робити з мухи слона (to exaggerate) — загальновживане; частотне
  recommended:
  - аналіз (analysis) — розклад на компоненти
  - синтез (synthesis) — поєднання частин у ціле
  - дослідження (research) — науковий пошук
  - собаку з'їв (to be an expert) — експресивне; колок.: «він у цьому справжню собаку з'їв»
  - як кіт наплакав (very little) — розмовне; колок.: «грошей як кіт наплакав»
  - витрішки (gape) — вживається у фразеологізмі «продавати витрішки»
  - коровай (wedding bread) — культурний символ долі та добробуту
