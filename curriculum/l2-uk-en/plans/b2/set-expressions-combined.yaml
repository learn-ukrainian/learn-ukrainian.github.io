module: b2-063
level: B2
sequence: 63
slug: set-expressions-combined
version: '1.0'
title: "Сталі словосполучення: Комбінований огляд"
subtitle: "Set Expressions: Combined Overview"
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
  - "Систематизувати знання про види сталих словосполучень: фразеологізми, ідіоми, колаборації та штампи."
  - "Дослідити механізми лексичної сполучуваності та обмеження у вживанні сталих одиниць."
  - "Навчитися розрізняти нейтральні та стилістично марковані сталі вирази в різних регістрах мовлення."
  - "Відпрацювати навички адекватного перекладу та підбору еквівалентів для сталих словосполучень."

reading_situations:
  - source_type: "лінгвістичне есе"
    topic: "Межа між вільним та сталим словосполученням: семантичний розрив."
    key_elements: ["цілісність значення", "неможливість заміни компонента", "емоційне забарвлення", "метафоричність"]
    motivation: "Розвиток чуття мови для ідентифікації прихованих сталих одиниць у тексті."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть критичний відгук на статтю про сучасний стан української мови, використовуючи принаймні 10 сталих виразів різних типів."
    motivation: "Тренування навичок використання експресивної лексики у публіцистичному дискурсі."
    requirements: ["мінімум 200 слів", "дотримання публіцистичного стилю", "правильне синтаксичне оформлення фразеологізмів"]
    model_answer: "Текст має містити органічно вплетені вирази (наприклад, 'грати першу скрипку', 'ставити крапки над і', 'підливати масла у вогонь') для підсилення аргументації та створення авторського стилю."

content_outline:
  - section: "Класифікація сталих словосполучень"
    words: 1000
    subsections:
      - "Фразеологічні зрощення (ідіоми) та їхня семантична непрозорість"
      - "Фразеологічні єдності: переносне значення на основі реального образу"
      - "Фразеологічні сполучення та вирази (крилаті вислови, афоризми)"
    key_concepts:
      - "фразеологічна одиниця"
      - "ідіоматичність"
      - "семантична неподільність"
      - "сталість складу"
  - section: "Лексична сполучуваність та семантична цілісність"
    words: 1000
    subsections:
      - "Правила поєднання слів: чому не можна сказати 'міцний кава' (лексичні обмеження)"
      - "Колокації: типові партнерства слів у діловій та розмовній мові"
      - "Порушення лексичної сполучуваності як стилістичний прийом та як помилка"
    key_concepts:
      - "колокація"
      - "валентність"
      - "дистрибуція"
      - "мовна норма"
  - section: "Стилістичні функції фразеологічних одиниць"
    words: 1000
    subsections:
      - "Експресивність та образність у художньому мовленні"
      - "Кліше та штампи в офіційно-діловому стилі: доцільність вживання"
      - "Жаргонізми та просторічні фразеологізми як маркери соціальної ідентичності"
    key_concepts:
      - "мовне кліше"
      - "експресема"
      - "реєстрова варіативність"
      - "стилістична конотація"
  - section: "Труднощі перекладу та міжмовні паралелі"
    words: 1000
    subsections:
      - "Пошук функціональних еквівалентів при перекладі ідіом"
      - "Безеквівалентна фразеологія та способи її передачі (описовий переклад, калькування)"
      - "Хибні друзі перекладача у сфері сталих виразів"
    key_concepts:
      - "функціональний еквівалент"
      - "описовий переклад"
      - "калькування"
      - "міжмовна асиметрія"

vocabulary:
  required:
    - словосполучення
    - еквівалент
    - сполучуваність
    - штамп
    - кліше
    - ідіома
    - конотація
    - калькування
  recommended:
    - фразеологізм
    - лексема
    - прозорість
    - влучність
    - розмитість

activities:
  types_required:
    - select
    - fill-in
    - match-up
    - error-correction
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "proverbs-nature-time-caution"
  next: "idioms-somatic"
