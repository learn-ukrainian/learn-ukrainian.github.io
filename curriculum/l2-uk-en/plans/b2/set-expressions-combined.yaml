module: b2-064
level: B2
sequence: 64
slug: set-expressions-combined
version: '1.1'
title: "Сталі словосполучення: Комбінований огляд"
subtitle: "Стійкі вислови: загальний огляд"
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
  - "Систематизувати знання про види сталих словосполучень: фразеологізми, ідіоми,
    колаборації та штампи."
  - "Дослідити механізми лексичної сполучуваності та обмеження у вживанні сталих одиниць."
  - "Навчитися розрізняти нейтральні та стилістично марковані сталі вирази в різних
    регістрах мовлення."
  - "Відпрацювати навички адекватного перекладу та підбору еквівалентів для сталих
    словосполучень."

reading_situations:
  - source_type: "лінгвістичне есе"
    topic: "Межа між вільним та сталим словосполученням: семантичний розрив."
    key_elements: ["цілісність значення", "неможливість заміни компонента", "емоційне
          забарвлення", "метафоричність"]
    motivation: "Розвиток чуття мови для ідентифікації прихованих сталих одиниць у
      тексті."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть критичний відгук на статтю про сучасний стан української мови,
      використовуючи принаймні 10 сталих виразів різних типів."
    motivation: "Тренування навичок використання експресивної лексики у публіцистичному
      дискурсі."
    requirements: ["мінімум 200 слів", "дотримання публіцистичного стилю", "правильне
          синтаксичне оформлення фразеологізмів"]
    model_answer: "Текст має містити органічно вплетені вирази (наприклад, 'грати
      першу скрипку', 'ставити крапки над і', 'підливати масла у вогонь') для підсилення
      аргументації та створення авторського стилю."

discussion_topics:
  - context: "Роль сталих виразів у формуванні мовної особистості"
    questions:
      - "Чому переклад ідіом слово в слово зазвичай не працює?"
      - "Які сталі вирази ви найчастіше чуєте від носіїв мови і в яких ситуаціях?"
    motivation: "Усвідомлення ролі фразеології у природному мовленні та розвиток чуття
      ідіоматичності."

content_outline:
  - section: "Класифікація сталих словосполучень"
    words: 1000
    subsections:
      - "Фразеологічні зрощення (ідіоми) та їхня семантична непрозорість"
      - "Фразеологічні єдності: переносне значення на основі реального образу"
      - "Фразеологічні сполучення та вирази (крилаті вислови, афоризми)"
    key_concepts:
      - "фразеологічна одиниця"
      - "ідіоматичність"
      - "семантична неподільність"
      - "сталість складу"
  - section: "Лексична сполучуваність та семантична цілісність"
    words: 1000
    subsections:
      - "Правила поєднання слів: чому не можна сказати 'міцний кава' (лексичні обмеження)"
      - "Колокації: типові партнерства слів у діловій та розмовній мові"
      - "Порушення лексичної сполучуваності як стилістичний прийом та як помилка"
    key_concepts:
      - "колокація"
      - "валентність"
      - "дистрибуція"
      - "мовна норма"
  - section: "Стилістичні функції фразеологічних одиниць"
    words: 1000
    subsections:
      - "Експресивність та образність у художньому мовленні"
      - "Кліше та штампи в офіційно-діловому стилі: доцільність вживання"
      - "Жаргонізми та просторічні фразеологізми як маркери соціальної ідентичності"
    key_concepts:
      - "мовне кліше"
      - "експресема"
      - "реєстрова варіативність"
      - "стилістична конотація"
  - section: "Труднощі перекладу та міжмовні паралелі"
    words: 1000
    subsections:
      - "Пошук функціональних еквівалентів при перекладі ідіом"
      - "Безеквівалентна фразеологія та способи її передачі (описовий переклад, калькування)"
      - "Хибні друзі перекладача у сфері сталих виразів"
    key_concepts:
      - "функціональний еквівалент"
      - "описовий переклад"
      - "калькування"
      - "міжмовна асиметрія"

vocabulary:
  required:
    - словосполучення
    - еквівалент
    - сполучуваність
    - штамп
    - кліше
    - ідіома
    - конотація
    - калькування
  recommended:
    - фразеологізм
    - лексема
    - прозорість
    - влучність
    - розмитість

activities:
  types_required:
    - select
    - fill-in
    - match-up
    - error-correction
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: match-up
    focus: "Зіставити сталий вираз із його значенням (фразеологізм → тлумачення)."
  - type: fill-in
    focus: "Вставити правильний сталий вираз у контекст речення."
  - type: error-correction
    focus: "Виправити спотворені сталі вирази (перекручений компонент або русизм)."
  - type: group-sort
    focus: "Класифікувати вирази за семантичним полем: праця, емоції, характер, стосунки."

references:
  - "Караман С. О. Українська мова. 10 клас (2018), §42-45 — Фразеологія, сталі словосполучення"
  - "Глазова О. П. Українська мова. 11 клас (2019), §14 — Фразеологічна норма"
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Фразеологізми"
  - "State Standard 2024: B2 SS 4.4 — Lexicology, phraseology"

connects_to:
  previous: "proverbs-nature-time-caution"
  next: "idioms-somatic"
