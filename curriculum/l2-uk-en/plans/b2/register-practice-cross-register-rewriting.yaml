module: b2-043
level: B2
sequence: 43
slug: register-practice-cross-register-rewriting
version: '1.2'
title: "Практикум: Стилістична трансформація та перекодування"
subtitle: "Практика: переписування між регістрами"
focus: synthesis and style-switching
pedagogy: workshop
phase: "B2.1b [Participles & Register Intro]"
word_target: 4000
objectives:
  - "Систематизувати знання про всі функціональні стилі української мови."
  - "Розвинути навичку перекодування інформації з одного стилю в інший (стилістична
    трансформація)."
  - "Навчитися обирати доречний регістр залежно від ситуації спілкування, адресата
    та мети."
  - "Дослідити явища стилістичного дисонансу та способи його уникнення."
  - "Закріпити вміння редагувати тексти, виправляючи змішування стилів (недоречне
    вживання канцеляризмів, сленгу тощо)."

reading_situations:
  - source_type: "мультирегістрові тексти"
    topic: "Порівняльний аналіз однієї і тієї ж новини, поданої в офіційному повідомленні,
      газетній статті та приватному пості."
    key_elements: ["зміна лексики", "структурні трансформації", "зміна модальності"]
    motivation: "Розуміння того, як форма вираження впливає на сприйняття змісту."

listening_situations:
  - media_type: "інтерв'ю / рольова гра"
    setting: "Прослуховування або участь у ситуації, де одну подію (наприклад, інцидент
      у транспорті) потрібно пояснити офіційній особі та близькому другу."
    focus_points: ["Миттєве перемикання між реєстрами.", "Використання специфічних
          маркерів стилю.", "Дотримання відповідної інтонації."]
    motivation: "Розвиток мовної гнучкості та адаптивності."

writing_tasks:
  - task_type: "есе"
    prompt: "Візьміть фрагмент наукової статті про зміну клімату та перепишіть його
      як пост для соціальних мереж, орієнтований на підлітків. Використовуйте сучасний
      сленг та емоційні маркери, зберігаючи суть проблеми."
    requirements:
      - "повна заміна термінології на розмовні аналоги"
      - "зміна структури речень (спрощення)"
      - "використання засобів залучення уваги"
      - "мінімум 150 слів"
    motivation: "Демонстрація здатності до адаптації складного контенту для широкої
      аудиторії."
    model_answer: "Текст має перетворити 'антропогенний вплив' на 'те, що ми робимо
      з планетою', 'деградацію екосистем' на 'повний капець із природою'. Замість
      пасивних конструкцій очікуються заклики до дії, вигуки та риторичні запитання.
      Модельний варіант містить хештеги, емодзі (описані текстом) та пряме звернення
      до аудиторії ('Чуваки, ви бачили, що коїться?')."

discussion_topics:
  - context: "Чи існує 'чистий' стиль у сучасному світі, чи ми живемо в епоху стилістичного
      міксу?"
    questions:
      - "Коли змішування стилів є творчим прийомом, а коли — помилкою?"
      - "Чи може офіційна особа використовувати сленг у публічних виступах?"
      - "Як переклад фільмів впливає на нашу здатність перемикати регістри?"
    motivation: "Критичне осмислення динаміки мовних норм."

content_outline:
  - section: "Стилістична парадигма: Синтез та взаємодія"
    words: 800
    subsections:
      - "Функціональні стилі як гнучка система засобів вираження"
      - "Поняття стилістичної домінанти та її роль у тексті"
      - "Адресат та комунікативний намір як головні чинники вибору регістру"
      - "Вплив дигіталізації на розмивання меж між стилями"
    key_concepts:
      - "стилістична парадигма"
      - "перекодування"
      - "доречність"
      - "прагматика"
  - section: "Алгоритм трансформації тексту"
    words: 1200
    subsections:
      - "Лексична заміна: від терміна до метафори чи жаргону (і навпаки)"
      - "Синтаксична перебудова: номіналізація vs діалогізація"
      - "Зміна суб'єкта мовлення: від безособовості до персоналізації"
      - "Робота з модальністю та емоційним забарвленням при зміні стилю"
      - "Адаптація композиційної структури під новий жанр"
    key_concepts:
      - "номіналізація"
      - "персоналізація"
      - "адаптація"
      - "еквівалентність"
  - section: "Стилістичні помилки та дисонанс"
    words: 1000
    subsections:
      - "Канцеляризми як 'хвороба' сучасного мовлення: де вони недоречні"
      - "Недоречне вживання сленгу та просторіччя в офіційному контексті"
      - "Суміш стилів як інструмент іронії, сатири та пародії"
      - "Стилістична правка: методика виявлення та усунення 'чужорідних' елементів"
    key_concepts:
      - "стилістичний дисонанс"
      - "мовне захаращення"
      - "канцеляризм"
      - "редагування"
  - section: "Практикум професійного редагування"
    words: 1000
    subsections:
      - "Аналіз тексту з погляду його функціональної цілісності"
      - "Створення індивідуальної 'стилістичної карти' для різних сценаріїв спілкування"
      - "Робота з синонімічними рядами для точного попадання в регістр"
      - "Критерії якості стилістично трансформованого тексту"
    key_concepts:
      - "коректура"
      - "стилістична виразність"
      - "синоніміка"
      - "мовна вправність"

vocabulary:
  required:
    - трансформація
    - контекст
    - адресат
    - доречність
    - еквівалент
    - синоніміка
    - регістр
    - нейтральний
  recommended:
    - перефразувати
    - лаконічність
    - надмірність
    - адаптація
    - відповідність
    - гнучкість
    - перекодування
    - дисонанс

activities:
  types_required:
    - essay-response
    - error-correction
    - match-up
    - translate
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: essay-response
    focus: "Переписати один текст у трьох різних регістрах (науковий → публіцистичний
      → розмовний)"
  - type: error-correction
    focus: "Знайти змішування стилів у тексті (канцеляризми в розмові, сленг у науковому
      тексті) та виправити"
  - type: critical-analysis
    focus: "Розподілити уривки текстів за функціональним стилем"
  - type: critical-analysis
    focus: "Порівняти дві стилістичні трансформації одного тексту та оцінити їхню
      доречність"

references:
  - source: "Глазова, 11 клас (2019)"
    pages: "§1–15"
    topic: "Функціональні стилі, культура мовлення, стилістичні норми"
  - source: "Заболотний, 11 клас (2019)"
    pages: "§47–50"
    topic: "Стилістичні норми, функціональні стилі"
  - source: "Караман, 10 клас (2018)"
    pages: "Стилістика"
    topic: "Стилістична трансформація, всі функціональні стилі"
  - source: "Авраменко, 11 клас (2019)"
    pages: "Стилістика"
    topic: "Культура мовлення, стилістичне перекодування"
  - source: "Державний стандарт 2024"
    pages: "SS 4.4"
    topic: "Стилістика (B2)"

