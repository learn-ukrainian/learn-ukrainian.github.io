module: register-formal-informal
level: B2
sequence: 29
version: '1.2'
title: "Офіційний та неофіційний регістри"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Досконало розрізняти мовні особливості офіційного та неофіційного спілкування."
  - "Навчитися правильно використовувати форми звертання (ти vs. Ви) залежно від соціальної
    дистанції та контексту."
  - "Вивчити специфічну лексику та фразеологію, притаманну неформальному мовленню
    (розмовна лексика, сленг, скорочення)."
  - "Опанувати засоби пом'якшення (hedging) та ввічливості в офіційному контексті."
  - "Вміти перефразувати повідомлення з одного регістру в інший без втрати змісту."

reading_situations:
  - source_type: "електронне листування / повідомлення в месенджерах"
    topic: "Порівняння стилю ділового імейлу та неформального чату в Telegram на одну
      й ту саму тему (наприклад, перенесення дедлайну)."
    key_elements: ["вітальні та прощальні формули", "пунктуація та емодзі", "вибір
          лексики", "ступінь прямоти"]
    motivation: "Розуміння сучасного цифрового етикету та стилістичних нюансів письмової
      комунікації в різних середовищах."

listening_situations:
  - media_type: "відео"
    setting: "Порівняння виступів одного й того самого оратора (наприклад, відомого
      підприємця) на офіційній конференції та в неформальному інтерв'ю на YouTube."
    focus_points: ["Використання пауз та слів-заповнювачів.", "Рівень експресивності
          та емоційності.", "Інтонаційні відмінності та темп мовлення."]
    motivation: "Розвиток слухових навичок розпізнавання соціального контексту за
      акустичними та лексичними ознаками мовлення."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Ви отримали дуже неформальне повідомлення від колеги про серйозну технічну
      проблему в проекті. Перетворіть цю інформацію на офіційну доповідну записку
      для керівництва відділу."
    requirements:
      - "зміна форми звертання з неформальної на офіційну"
      - "використання офіційних кліше та термінології"
      - "логічна та структурована подача інформації без зайвих емоцій"
      - "мінімум 250 слів"
    motivation: "Практика адаптації тексту під вимоги офіційного середовища та розвиток
      навичок ділового письма."
    model_answer: "Текст має бути структурованим та стриманим. Наприклад: 'Шановний
      Павле Петровичу! Доводжу до Вашого відома, що в ході реалізації проекту виникли
      непередбачувані технічні складнощі. Відповідно до попереднього аналізу, ситуація
      потребує негайного втручання фахівців. Просимо розглянути можливість виділення
      додаткових ресурсів для усунення виявлених недоліків.'"

discussion_topics:
  - context: "Дискусія про розмивання меж між формальним та неформальним спілкуванням
      у сучасному корпоративному середовищі."
    questions:
      - "Чи доречно використовувати емодзі в діловому листуванні з іноземними партнерами?"
      - "Як перехід на 'ти' впливає на продуктивність команди та авторитет керівника?"
      - "У яких ситуаціях використання сленгу може бути корисним для встановлення
        довіри в бізнесі?"
    motivation: "Розвиток навичок критичного аналізу сучасних тенденцій у комунікації
      та здатності аргументувати свою позицію."

content_outline:
  - section: "Динаміка офіційного та неофіційного спілкування"
    words: 1000
    subsections:
      - "Соціальний контекст та його вплив на вибір мовного регістру"
      - "Поняття дистанції (вертикальна та горизонтальна) у комунікації"
      - "Ситуативна зміна регістрів: від офіційної промови до дружньої розмови"
      - "Наслідки стилістичної недоречності: від непорозуміння до репутаційних ризиків"
    key_concepts:
      - "соціальна роль"
      - "комунікативна ситуація"
      - "дистанція"
  - section: "Форми звертання та соціальний дейксис"
    words: 1000
    subsections:
      - "Етикет використання 'ти' та 'Ви' в сучасній Україні: вік, статус, особисте
        знайомство"
      - "Граматика ввічливості: кличний відмінок у різних регістрах"
      - "Почесні титули, професійні звертання та формули ввічливого прохання"
      - "Використання займенників для маркування близькості або поваги"
    key_concepts:
      - "ейфонія ввічливості"
      - "кличний відмінок"
      - "субординація"
  - section: "Лексичний склад та синонімічний вибір"
    words: 1000
    subsections:
      - "Нейтральна лексика як фундамент обох регістрів"
      - "Маркери офіційності: канцеляризми, термінологія, стандартизовані словосполучення"
      - "Маркери неформальності: розмовні слова, сленг, діалектизми, вигуки"
      - "Синонімічна трансформація: як одне й те саме поняття звучить у різних регістрах"
    key_concepts:
      - "синонімічний ряд"
      - "сленг"
      - "канцеляризм"
  - section: "Граматичні та синтаксичні особливості регістрів"
    words: 1000
    subsections:
      - "Складні речення та логічні зв'язки в офіційному мовленні"
      - "Еліптичність (неповні речення) та ситуативність неформальної розмови"
      - "Пасивні конструкції та безособові речення як засіб об'єктивізації в офіційному
        стилі"
      - "Засоби модальності та пом'якшення (hedging) для вираження ввічливості та
        сумніву"
    key_concepts:
      - "еліпсис"
      - "пасивний стан"
      - "синтаксична складність"

vocabulary:
  required:
    - ввічливість
    - звертання
    - повага
    - субординація
    - перефразування
    - сленг
    - суто
    - шановний
  recommended:
    - просторіччя
    - еліпсис
    - неформальний
    - офіційний
    - етикет
    - колега

activities:
  types_required:
    - reading
    - essay-response
    - select
    - fill-in
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: select
    focus: "Обрати офіційний або неофіційний варіант одного й того самого висловлювання"
  - type: fill-in
    focus: "Переписати неформальне повідомлення в офіційному стилі (або навпаки)"
  - type: error-correction
    focus: "Знайти невідповідність регістру (сленг у діловому листі / канцеляризм
      у дружній розмові) та виправити"
  - type: group-sort
    focus: "Розподілити слова та вирази на пари: офіційний / неофіційний варіант"

references:
  - source: "Глазова, 11 клас (2019)"
    pages: "§1–10"
    topic: "Формальне та неформальне мовлення, культура мовлення"
  - source: "Авраменко, 11 клас (2019)"
    pages: "Стилістика"
    topic: "Формальне та неформальне мовлення"
  - source: "Державний стандарт 2024"
    pages: "SS 4.4"
    topic: "Стилістика (B2)"

connects_to:
  previous: "register-introduction"
  next: "register-business-ukrainian"
phase: B2.1b [Participles & Register Intro]
