content_outline:
- section: Вступ — Формальність у спілкуванні (Introduction — Formality in Communication)
  words: 500
  points:
  - 'Поняття мовленнєвого етикету та соціолінгвістичної компетенції на рівні B2: аналіз контексту, статусу та віку співрозмовника'
  - 'Культурний контекст: Ренесанс форми «пан/пані» як відновлення української ідентичності та гідності вільної людини (протиставлення
    радянському «товариш»)'
  - 'Огляд Державного стандарту (§4.4.1.3): стилістичні засоби синтаксису та елементи структурування тексту (по-перше, водночас)'
- section: Займенники та граматичне узгодження (Pronouns and Grammatical Agreement)
  words: 800
  points:
  - 'Типологія вживання «ти» та «Ви»: від сімейного кола до офіційного прийому'
  - 'Культурна пастка: Граматичне узгодження дієслів з ввічливим «Ви» — обов''язкове вживання множини («Ви знали?», а не «Ви
    знав?»)'
  - 'Синтаксичні нюанси: Узгодження прикметників-предикатів у вигуках («Яка Ви красива!» vs «Ви сьогодні дуже заклопотані»)'
  - 'Типова помилка: Гіперкорекція з великою літерою — пояснення, що «Ви» пишеться з великої лише в офіційному індивідуальному
    листуванні, а в чатах та коментарях це помилка'
- section: Етикетні форми звертання (Etiquette Forms of Address)
  words: 900
  points:
  - 'Система звертань за Державним стандартом (§4.5.1): використання кличного відмінка (Вікторе, Олено Петрівно)'
  - 'Моделі звертання: «Пан + ім’я» (Пане Андрію) як сучасний стандарт vs «Ім’я + по батькові» у консервативних інституціях'
  - 'Уникнення помилок: Чому «Пан + по батькові» вважається надлишковим та як уникнути «Pan mismatch»'
  - 'Табуйовані та застарілі форми: Чому звертання «жіночко/чоловіче» до незнайомих людей є грубим і як правильно використовувати
    нейтральне «Перепрошую...»'
  - 'Градація офіційності: від «Шановний пане» до «Вельмишановний» (Most Respected) — випадки використання в офіційному протоколі'
- section: Формальна та неформальна лексика (Formal and Informal Lexis)
  words: 700
  points:
  - 'Лексичні синоніми: аналіз пар «друг — приятель — товариш — колега» згідно з контекстом спілкування'
  - 'Еліпсис у неформальному мовленні за Держстандартом: приклади на кшталт «Смачного! – Дякую, і тобі», «Привіт! – Навзаєм!»'
  - 'Трансформація регістру: як перетворити розмовні фразеологізми на книжні конструкції без втрати змісту'
- section: Соціальні сценарії та перехід між регістрами (Social Scenarios and Register Transition)
  words: 700
  points:
  - 'Робоче середовище: спілкування з керівником та колегами; межа між субординацією та колегіальністю'
  - 'Етикет переходу з «Ви» на «ти»: хто має ініціювати зміну та як зробити це ввічливо в українській культурі'
  - 'Університетське та офіційне середовище: звертання до викладачів та посадових осіб («Пане Директоре», «Пане Професоре»)'
- section: Практика, корекція та підсумок (Practice, Correction, and Summary)
  words: 400
  points:
  - 'Аналіз кейсів: виправлення помилок у граматичному узгодженні та формах звертання (Adversarial Error Correction)'
  - 'Рольова гра: подання одного і того ж прохання офіційно (email) та неофіційно (messenger)'
  - 'Підготовка до Модуля 17: введення в термінологію ділової української мови'
vocabulary_hints:
  required:
  - формальний (formal) — офіційний стиль спілкування
  - неформальний (informal) — невимушений, розмовний стиль
  - звертання (form of address) — офіційне звертання; форма звертання
  - пан / пані (Mr. / Mrs.) — шановний пане, пані та панове; універсальна ввічлива форма
  - шановний (respected / dear) — шановна громадо, вельмишановний (найвищий ступінь формальності)
  - по батькові (patronymic) — специфічна форма ідентифікації; вживається без слова «пан»
  - етикет (etiquette) — мовленнєвий етикет; правила ввічливості
  - ввічливість (politeness) — соціолінгвістична ввічливість
  - офіційний (official) — офіційний візит; офіційний документ
  - розмовний (colloquial) — розмовний стиль; побутова лексика
  recommended:
  - колегіальний (collegial) — рівноправний стиль між колегами
  - субординація (subordination) — дотримання ієрархії у спілкуванні
  - соціальна дистанція (social distance) — межа між офіційністю та близькістю
  - тон (tone) — нейтральний тон; офіційно-діловий тон
  - доречність (appropriateness) — вживання мовних засобів відповідно до ситуації
  - переходити на «ви» (to address as 'Vy') — встановлювати офіційну дистанцію
  - звертатися на «ти» (to address as 'Ty') — спілкуватися неформально
