module: b2-40
level: B2
sequence: 40
slug: aspect-nuances-secondary-imperfectivization
version: '2.0'
title: 'Видові нюанси I: Вторинна імперфективація'
subtitle: Secondary Imperfectivization - Deriving Imperfective from Perfective
content_outline:
- section: 'Вступ: Метафора Палімпсесту (Introduction: The Palimpsest Metaphor)'
  words: 600
  points:
  - 'Поняття палімпсесту як культурна метафора вторинної імперфективації: від завершеного
    тексту (ДВ) до процесу повторного переписування (вторинний НДВ) на прикладі творчості
    Василя Стуса.'
  - 'Чому мові мало базових пар? Порівняння видових тріад: писати (процес) → написати
    (результат) → записувати (регулярний процес або звичка).'
  - Функціональна роль вторинних імперфективів для вираження повторюваної дії (iterative)
    та процесу в минулому (durative).
- section: 'Механіка творення: Суфікси та чергування (Mechanics: Suffixes and Alternations)'
  words: 1000
  points:
  - 'Продуктивний суфікс -ува-/-юва-: аналіз механізму (записати → записувати) та
    застереження щодо помилкових форм на кшталт «переписовувати» замість нормативного
    «переписувати».'
  - 'Чергування голосних у корені як ключовий маркер виду: детальне вивчення пар допомагати
    (I) — допомогти (P) з чергуванням [о/а] та [е/і] згідно зі стандартами B2.'
  - Функціонування суфікса -ва- (додати → додавати, забити → забивати) та розрізнення
    цих форм від первинних недоконаних дієслів.
- section: Наголос як змістовий маркер (Stress as a Semantic Marker)
  words: 700
  points:
  - 'Аналіз видових пар, що розрізняються лише наголосом: ви́різати (P) vs виріза́ти
    (I) — фонетичні дрилі для уникнення типової помилки змішування видів.'
  - 'Вплив наголосу на семантику речення: як неправильне акцентування змінює сприйняття
    завершеності дії.'
- section: 'Контексти вживання: Деколонізація та процеси (Usage Contexts: Decolonization
    and Processes)'
  words: 1000
  points:
  - 'Кейс-стаді: Деколонізація топонімів. Розрізнення доконаного факту (вулицю перейменували)
    та тривалого суспільного процесу (вулиці перейменовують) через використання вторинної
    імперфективації.'
  - Вживання академічної лексики (процес, метод, термін) у контексті опису наукових
    досліджень та повторюваних експериментів.
  - 'Відмінність між ітеративним значенням (повторюваність у минулому: «Я часто перечитував
    ці поняття») та дуративним (тривалість процесу: «У процесі аналізу він перечитував
    статтю»).'
- section: Практика та закріплення (Practice and Consolidation)
  words: 700
  points:
  - 'Корекція типових помилок: вправа на розпізнавання штучно створених форм (надуживання
    суфіксом -овува-) та вибір правильного наголосу в контексті.'
  - 'Трансформація академічного тексту: перетворення описів результатів на описи методів
    та процесів за допомогою вторинних імперфективів.'
  - Аналіз тексту про палімпсести з ідентифікацією вторинних НДВ та поясненням їхньої
    видової специфіки.
focus: grammar
pedagogy: TTT
objectives:
- Learner can identify secondary imperfective forms derived from perfective verbs
- Learner can apply correct suffixation patterns for imperfectivization
- Learner can distinguish iterative and process meanings of secondary imperfectives
- Learner can use secondary imperfectives appropriately in context
grammar:
- Secondary imperfectivization (вторинна імперфективація)
- 'Suffix patterns: -ува-/-юва-, -ва-, -а-/-я-'
- Vowel alternation in roots
- Aspectual pairs with prefixes
phase: B2.5
vocabulary_hints:
  required:
  - процес (process) — навчальний процес, процес творення, у процесі; висока частотність
    в академічному стилі
  - метод (method) — науковий метод, метод дослідження, дієвий метод; вживається для
    опису способів дії
  - поняття (concept) — ключове поняття, розширити поняття, підміна понять; базовий
    термін для теорії
  - термін (term) — науковий термін, технічний термін, визначення терміна; маркер
    професійного мовлення
  recommended:
  - аналіз (analysis) — системний аналіз процесу
  - синтез (synthesis) — синтез досліджень
  - дослідження (research) — об'єкт дослідження, проводити дослідження
  - палімпсест (palimpsest) — культурна метафора переписування та імперфективації
  - перейменовування (renaming) — приклад вторинної імперфективації в контексті деколонізації
