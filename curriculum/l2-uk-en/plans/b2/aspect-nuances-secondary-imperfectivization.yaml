module: b2-043
level: B2
sequence: 43
slug: aspect-nuances-secondary-imperfectivization
version: '1.1'
title: "Нюанси виду: Вторинна імперфективація"
subtitle: "Aspect Nuances: Secondary Imperfectivization"
focus: grammar
pedagogy: PPP
phase: "B2.3a [Advanced Morphology]"
word_target: 4000
objectives:
  - "Зрозуміти механізм вторинної імперфективації як спосіб утворення недоконаного виду від доконаного."
  - "Засвоїти основні суфікси імперфективації: -ува-, -юва-, -ва-, -а-."
  - "Вивчити чергування голосних у корені при імперфективації (о/а, е/і)."
  - "Навчитися розрізняти відтінки значень дієслівних пар, утворених за допомогою вторинної імперфективації."
  - "Правильно використовувати новоутворені форми недоконаного виду в контексті тривалих або повторюваних дій."

reading_situations:
  - source_type: "фрагмент художнього тексту"
    topic: "Аналіз дієслівних форм недоконаного виду, утворених від префіксальних дієслів доконаного виду, у творі сучасної української прози."
    key_elements: ["суфіксальні маркери", "кореневі чергування", "контекст тривалості"]
    motivation: "Розуміння того, як мова адаптує дієслова для передачі різних часових нюансів."

listening_situations:
  - media_type: "аудіо"
    setting: "Інструкція з виконання складного технологічного процесу, де оратор використовує багато дієслів недоконаного виду на позначення повторюваності."
    focus_points: ["Виявлення дієслів на -увати / -ати.", "Сприйняття ритміки мовлення.", "Розуміння послідовності дій."]
    motivation: "Тренування здатності розрізняти вид дієслова за морфологічними ознаками на слух."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Опишіть процес вашого професійного або особистісного зростання протягом останнього року. Використовуйте щонайменше 10 дієслів, утворених шляхом вторинної імперфективації (наприклад: опановувати, вдосконалювати, налагоджувати)."
    requirements:
      - "правильне вживання суфіксів та чергувань"
      - "логічна послідовність викладу"
      - "використання обставин часу для підкреслення тривалості"
      - "мінімум 200 слів"
    motivation: "Розвиток граматичної точності у вираженні тривалих процесів."
    model_answer: "Текст має бути зосереджений на описі дій у розвитку. Очікується вживання таких форм: 'вивчати' (від вивчити), 'опрацьовувати' (від опрацювати), 'допомагати' (від допомогти). Автор повинен правильно застосувати чергування [о] -> [а] та [е] -> [і]. Модельний варіант демонструє впевнене використання префіксально-суфіксальних форм для створення динамічного опису досвіду."

discussion_topics:
  - context: "Чи може мова бути занадто складною? Вторинна імперфективація як приклад граматичної витонченості української мови."
    questions:
      - "Навіщо мові так багато способів вираження тривалості дії?"
      - "Як би змінилося наше сприйняття часу, якби в мові був лише один вид дієслова?"
      - "Які труднощі виникають у вас найчастіше при утворенні видових пар?"
    motivation: "Філософське осмислення граматичних категорій мови."

content_outline:
  - section: "Природа вторинної імперфективації"
    words: 800
    subsections:
      - "Видові пари: відмінність між первинними та вторинними парами"
      - "Семантична потреба в імперфективації префіксальних дієслів"
      - "Роль суфікса як домінантного інструмента зміни видового значення"
      - "Історичний контекст формування системи видових опозицій"
    key_concepts:
      - "префіксально-суфіксальний спосіб"
      - "тривалість дії"
      - "повторюваність"
      - "видова опозиція"
  - section: "Морфологічні моделі та суфікси"
    words: 1200
    subsections:
      - "Модель із суфіксами -ува-, -юва-: універсальність та продуктивність (записати -> записувати)"
      - "Специфіка суфікса -ва-: особливості вживання з односкладовими коренями (дати -> давати)"
      - "Модель із суфіксом -а-: творення від дієслів із префіксами (вирішити -> вирішувати)"
      - "Нерегулярні моделі та випадки суплетивізму в системі виду"
      - "Вплив наголосу на розрізнення видових форм при імперфективації"
    key_concepts:
      - "словотвірна модель"
      - "основа дієслова"
      - "морфемний аналіз"
      - "суплетивізм"
  - section: "Фонетичні чергування при зміні виду"
    words: 1000
    subsections:
      - "Чергування [о] з [а]: закономірності та винятки (допомогти -> допомагати)"
      - "Чергування [е] з [і]: морфонологічні умови (затерти -> затирати, вимести -> вимітати)"
      - "Інші типи чергувань та їхня роль у забезпеченні милозвучності"
      - "Аналіз типових помилок, пов'язаних із неправильним застосуванням чергувань"
    key_concepts:
      - "фонетичні зміни"
      - "історичні чергування"
      - "акцентологія"
      - "морфонологія"
  - section: "Синтаксична функція та стилістичне використання"
    words: 1000
    subsections:
      - "Вживання вторинних недоконаних дієслів у різних часових планах"
      - "Сполучуваність із фазовими дієсловами (почати, продовжувати, закінчувати)"
      - "Стилістичні нюанси: використання вторинної імперфективації в науковому та художньому стилях"
      - "Експресивні можливості повторюваних дій у розмовному мовленні"
    key_concepts:
      - "видова часова система"
      - "синтаксична сполучуваність"
      - "фазові дієслова"
      - "мовна вправність"

vocabulary:
  required:
