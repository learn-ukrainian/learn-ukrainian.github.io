module: b2-13
level: B2
sequence: 13
slug: secondary-sentence-members
version: '2.0'
title: Другорядні члени речення
subtitle: 'Secondary Sentence Members: Object, Attribute, Adverbial, Apposition'
content_outline:
- section: 'Вступ: Другорядні члени та їхня роль у реченні (Introduction: Secondary
    Members and Their Role in the Sentence)'
  words: 400
  points:
  - 'Визначення другорядних членів речення згідно з Держстандартом §4.3.2: члени речення,
    що пояснюють, уточнюють або доповнюють головні та інші другорядні члени'
  - 'Система другорядних членів: додаток, означення, обставина, прикладка — принципи
    класифікації за синтаксичною функцією'
  - 'Зв''язок із модулем b2-11: роль типів зв''язку (керування, узгодження, прилягання)
    у визначенні другорядних членів'
- section: 'Додаток: прямий і непрямий (Object: Direct and Indirect)'
  words: 800
  points:
  - 'Прямий додаток: виражений іменником у знахідному відмінку без прийменника (напр.,
    «читаю книгу», «бачу друга»); родовий відмінок при запереченні (напр., «не бачу
    друга»)'
  - 'Непрямий додаток: виражений іменником в інших непрямих відмінках або з прийменником
    (напр., «допомагати другу» — Д.в., «захоплюватися мистецтвом» — Ор.в.)'
  - 'Типові помилки керування: «дякувати кого» → «дякувати кому», «пробачити кого» →
    «пробачити кому» — вплив російськомовної інтерференції'
  - 'Додаток, виражений інфінітивом: розмежування з складеним присудком (напр., «Батько
    навчив мене плавати» — «плавати» є додатком, не частиною присудка)'
- section: Означення та прикладка (Attribute and Apposition)
  words: 900
  points:
  - 'Узгоджене означення: прикметник, займенник, порядковий числівник, дієприкметник у
    формі головного слова (напр., «зелений ліс», «наша школа», «перший крок»)'
  - 'Неузгоджене означення: іменник в непрямому відмінку, інфінітив, прислівник (напр.,
    «книга з бібліотеки», «бажання вчитися», «кава по-турецьки»)'
  - 'Прикладка як різновид означення: іменник, що дає іншу назву предмету (напр., «ріка
    Дніпро», «місто Київ», «лікар Петренко»)'
  - 'Правопис прикладок: дефіс при прикладках-прізвищах та назвах (напр., «Дніпро-ріка»,
    «інженер-конструктор»); відсутність дефіса при родових та видових поняттях'
- section: 'Обставини: вісім типів (Adverbials: Eight Types)'
  words: 900
  points:
  - 'Обставини місця (де? куди? звідки?): «жити в місті», «їхати до Львова», «повернутися
    з подорожі»'
  - 'Обставини часу (коли? з якого часу? до якого часу?): «працювати вранці», «навчатися
    з дитинства»'
  - 'Обставини способу дії (як? яким чином?): «читати голосно», «працювати наполегливо»'
  - 'Обставини причини (чому? через що?): «запізнитися через затори», «радіти з перемоги»;
    обставини мети (для чого? навіщо?): «поїхати на навчання»; обставини умови, допусту,
    міри та ступеня'
- section: Комплексний аналіз та практика (Complex Analysis and Practice)
  words: 1000
  points:
  - 'Алгоритм визначення другорядного члена: від постановки питання до класифікації —
    покрокова інструкція'
  - 'Проблемні випадки: розмежування додатка та неузгодженого означення (напр., «склянка
    молока» — означення чи додаток? Залежить від контексту)'
  - 'Синтаксичний розбір речень: повний аналіз із визначенням головних та другорядних
    членів у текстах наукового та художнього стилів'
  - 'Стилістичний аспект: як вибір другорядних членів впливає на інформативність та виразність
    речення'
  - 'Підготовка до модуля b2-15: однорідні другорядні члени та їхня пунктуація'
focus: grammar
pedagogy: TTT
prerequisites:
- b2-12 (Predicate Types)
connects_to:
- b2-14 (One-Member Sentences)
objectives:
- Learner can identify and classify secondary sentence members (object, attribute,
  adverbial, apposition)
- Learner can distinguish direct from indirect objects and correct common government
  errors
- Learner can differentiate agreed from non-agreed attributes and recognize appositions
- Learner can classify adverbials by their eight semantic types
grammar:
- Додаток (прямий і непрямий)
- Означення (узгоджене і неузгоджене)
- Прикладка як різновид означення
- Обставина (вісім типів)
register: науковий
phase: B2.2 [Syntax Mastery]
vocabulary_hints:
  required:
  - додаток (object/complement) — другорядний член речення, що означає предмет дії
  - означення (attribute) — другорядний член, що характеризує ознаку предмета
  - обставина (adverbial) — другорядний член, що характеризує умови дії
  - прикладка (apposition) — різновид означення, виражений іменником
  - узгоджене означення (agreed attribute) — означення, що узгоджується з головним словом
    у роді, числі, відмінку
  - неузгоджене означення (non-agreed attribute) — означення, що зв'язується з головним
    словом керуванням або приляганням
  - прямий додаток (direct object) — додаток у знахідному відмінку без прийменника
  - непрямий додаток (indirect object) — додаток в інших непрямих відмінках або з прийменником
  recommended:
  - синтаксична функція (syntactic function) — роль слова в реченні як члена речення
  - керування (government) — тип зв'язку, при якому головне слово вимагає певного відмінка
  - поширене речення (extended sentence) — речення з другорядними членами
  - непоширене речення (non-extended sentence) — речення лише з головними членами
  - родовий при запереченні (genitive of negation) — родовий відмінок замість знахідного
    при запереченні
