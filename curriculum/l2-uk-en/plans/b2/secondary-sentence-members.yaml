module: b2-016
level: B2
sequence: 16
version: '1.3'
title: "Другорядні члени речення"
subtitle: "Другорядні члени речення: означення, додатки, обставини"
focus: grammar
pedagogy: PPP
objectives:
  - "Глибоке розуміння системи другорядних членів речення та їхньої ролі в поширенні
    думки."
  - "Класифікація та вживання означень (узгоджені, неузгоджені) та прикладок."
  - "Аналіз видів додатків (прямий, непрямий) та їхнього морфологічного вираження."
  - "Систематизація обставин за значенням (місця, часу, причини, мети, способу дії
    тощо)."
  - "Уміння правильно розставляти розділові знаки при прикладках та неузгоджених означеннях."

reading_situations:
  - source_type: "художній опис"
    topic: "Інтер'єр старовинного українського маєтку"
    key_elements: ["різьблені (carved) меблі", "стіни (pl) в картинах", "бажання (n)
          побачити", "тихо (quietly) зайти"]
    motivation: "Описові тексти є ідеальним майданчиком для вивчення означень та обставин,
      що створюють атмосферу та деталізацію."
  - source_type: "репортаж"
    topic: "Подорож до історичного центру Чернівців"
    key_elements: ["місто (n) Чернівці", "будувати (v) з каменю", "приїхати (v) вранці",
      "захоплюватися (v) архітектурою"]
    motivation: "Аналіз використання прикладки (місто Чернівці) та обставин місця
      і часу в розповідному тексті."

listening_situations:
  - media_type: "аудіо"
    setting: "Екскурсія художнім музеєм: опис експонатів"
    focus_points: ["використання неузгоджених означень", "уточнюючі обставини", "роль
          додатків у поясненні технік живопису"]
    motivation: "Розвиток здатності вихоплювати деталізовану інформацію, виражену
      другорядними членами речення."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть репортаж про відвідування культурного заходу (фестивалю, виставки),
      використовуючи багатий арсенал другорядних членів речення для створення яскравого
      образу події."
    requirements:
      - "мінімум 250 слів"
      - "використати щонайменше 2 неузгоджені означення"
      - "використати щонайменше 2 прикладки"
      - "використати обставини різних типів (мети, причини, способу дії)"
    motivation: "Стимулювання студентів до розширення простих речень за допомогою
      змістовних другорядних членів."
    model_answer: "Текст має бути насиченим: «Фестиваль 'Країна мрій' зустрів нас...»,
      «Люди в національному вбранні...», «Співали заради задоволення...». Оцінюється
      точність вживання та пунктуація."

discussion_topics:
  - context: "Інформативність vs лаконічність: чи потрібні другорядні члени?"
    questions:
      - "Як змінюється сприйняття тексту, якщо вилучити з нього всі означення?"
      - "Чому юридичні тексти часто перевантажені додатками та обставинами?"
      - "Чи допомагає неузгоджене означення зробити опис більш витонченим?"
    motivation: "Дискусія про функціональне навантаження другорядних членів речення
      в різних стилях."

content_outline:
  - section: "Означення: від простого епітета до складної характеристики"
    words: 800
    subsections:
      - "Узгоджені означення: морфологічне вираження та роль у реченні"
      - "Неузгоджені означення: способи вираження (іменники, інфінітиви) та стилістичні
        переваги"
      - "Прикладка як особливий вид означення: правила узгодження та написання (лапки,
        дефіс)"
    key_concepts:
      - "атрибут"
      - "неузгодженість"
      - "прикладка"
  - section: "Об'єктна сфера речення: Додатки"
    words: 800
    subsections:
      - "Прямий додаток: знахідний відмінок без прийменника та родовий при запереченні"
      - "Непрямий додаток: вираження різними відмінково-прийменниковими формами"
      - "Додатки, виражені інфінітивом та їхнє відмежування від присудків"
    key_concepts:
      - "об'єкт"
      - "керований додаток"
      - "інфінітив у ролі додатка"
  - section: "Обставини: логіка простору, часу та причини"
    words: 800
    subsections:
      - "Класифікація обставин за значенням: повний огляд"
      - "Способи вираження обставин (прислівники, дієприслівникові звороти, іменники
        з прийменниками)"
      - "Обставини порівняння та міри ступеня: нюанси вживання"
    key_concepts:
      - "адвербіал"
      - "обставинне значення"
      - "спосіб дії"
  - section: "Синтаксична роль інфінітива"
    words: 800
    subsections:
      - "Розрізнення інфінітива-присудка, інфінітива-додатка та інфінітива-означення"
      - "Інфінітив як обставина мети: умови вживання"
      - "Аналіз складних речень з кількома інфінітивами в різних ролях"
    key_concepts:
      - "багатофункціональність інфінітива"
      - "синтаксичний аналіз"
      - "семантична диференціація"
  - section: "Стилістичне навантаження та культура поширення речення"
    words: 800
    subsections:
      - "Поширення речення як засіб деталізації в науковому та художньому стилях"
      - "Типові помилки: неправильне керування додатками та неясність означень"
      - "Практикум: трансформація речень шляхом додавання та вилучення другорядних
        членів"
    key_concepts:
      - "поширене речення"
      - "деталізація"
      - "стилістична точність"

word_target: 4000

vocabulary:
  required:
    - означення
    - додаток
    - обставина
    - прикладка
    - узгоджене означення
    - неузгоджене означення
    - прямий додаток
    - обставина мети
  recommended:
    - епітет
    - деталізація
    - поширення
    - контекст
    - пунктуація

activities:
  types_required:
    - select
    - highlight-morphemes
    - fill-in
    - error-correction
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: mark-the-words
    focus: "Визначити означення, додатки та обставини в тексті (виділити та класифікувати)"
  - type: fill-in
    focus: "Розширити речення вказаним типом другорядного члена (означення, додаток,
      обставина)"
  - type: match-up
    focus: "Зіставити виділені другорядні члени з їхнім типом та способом вираження"
  - type: select
    focus: "Визначити синтаксичну роль інфінітива в реченні (присудок, додаток, означення,
      обставина)"

references:
  - source: "Заболотний, 9 клас (2017)"
    pages: "§7–9"
    topic: "Другорядні члени речення: означення, додаток, обставина"
  - source: "Авраменко, 9 клас (2017)"
    pages: "§7–10"
    topic: "Другорядні члени речення, прикладки"
  - source: "State Standard 2024"
    pages: "B2, SS 4.3"
    topic: "Syntax — secondary sentence members"

connects_to:
  previous: "predicate-types"
  next: "b2-one-member-sentences"

