title: 'Сталі вирази I: Частини тіла та тварини'
subtitle: 'Set Expressions I: Body & Animals'
content_outline:
- section: 'Вступ: Роль фразеологізмів у мовній компетенції (Introduction: Role of
    Phraseology)'
  words: 500
  points:
  - Визначення фразеологічних одиниць згідно з Державним стандартом §1.4.1.2.1 — важливість
    доречного вживання ідіом для досягнення рівня B2.
  - 'Поняття внутрішньої форми фразеологізму: чому «золоті руки» сприймаються як метафора
    майстерності, а не матеріал.'
  - Класифікація ідіом на соматичні (частини тіла) та зооморфні (назви тварин) як
    базовий шар української мовної картини світу.
- section: 'Соматизми: Коли тіло стає метафорою (Somatic Idioms: When the Body Becomes
    a Metaphor)'
  words: 1000
  points:
  - Аналіз високочастотного виразу «морочити голову» (плутати) — розгляд типових розмовних
    конструкцій «не мороч мені голову» та «годі морочити голову».
  - Дослідження виразу «тримати язик за зубами» як приклад соматичного фразеологізму,
    що регулює комунікативну поведінку (мовчати/зберігати таємницю).
  - Вивчення виразу «не бачити далі свого носа» для опису обмеженості світогляду —
    контраст між буквальним та переносним сприйняттям.
  - 'Фразеологізми руху: «брати ноги в руки» (поспішати/тікати) та «махнути рукою»
    (відмовитися/зневіритися) — семантичні нюанси.'
- section: Зоофразеологія та культурні коди (Zoomorphic Idioms & Cultural Codes)
  words: 1000
  points:
  - 'Культурний гачок: Походження виразу «собаку з''їв» — зв''язок із козацьким побутом
    та екстремальним досвідом, що перетворює людину на експерта.'
  - 'Символіка хліба: Вираз «На чужий коровай очей не поривай» — коріння у весільних
    обрядах, де коровай символізував долю та багатство пари.'
  - 'Метафора перебільшення: «робити з мухи слона» — порівняння частотності в українській
    мові та загальноєвропейського контексту.'
  - 'Кількісні оцінки: «як кіт наплакав» (дуже мало) — типові колоквіальні сполучення:
    «грошей як кіт наплакав», «користі як кіт наплакав».'
  - 'Ризиковані дії: «купувати кота в мішку» та поведінкова стратегія «сидіти як миша
    під віником».'
- section: Аналіз типових помилок та інтерференції (Analysis of Typical Errors & Interference)
  words: 800
  points:
  - 'Помилка калькування: Аналіз недоречного перекладу англійського ''it''s raining
    cats and dogs'' як *«дощ падає котами і собаками»* — заміна на український відповідник
    «ллє як з відра».'
  - 'Проблема лексичної підміни: Типова помилка «продавати усмішки» замість правильного
    «продавати витрішки» (gap idly) — акцент на унікальності компонентів.'
  - 'Явище контамінації: Розбір помилкового виразу *«грати значення»* (змішування
    «грати роль» та «мати значення») — вправи на розмежування.'
  - 'Міжмовна інтерференція: Чому англійське ''pulling one''s leg'' не перекладається
    як «тягнути за ногу», а вимагає вживання «морочити голову» або «жартувати».'
- section: Практичне застосування та синтез (Practical Application & Synthesis)
  words: 700
  points:
  - 'Регістри мовлення: Розрізнення розмовних (informal) виразів типу «морочити голову»
    та більш нейтральних фразеологізмів.'
  - 'Методика візуального контрасту: Створення образів, що протиставляють буквальне
    значення (слон із мухи) переносному для кращого запам''ятовування.'
  - 'Творче завдання: Написання розповіді від імені «Казкаря» (persona) з використанням
    щонайменше 6 вивчених ідіом у правильному контексті.'
  - 'Пошук еквівалентів: Співвіднесення українських соматизмів з англійськими аналогами
    без втрати стилістичного забарвлення.'
