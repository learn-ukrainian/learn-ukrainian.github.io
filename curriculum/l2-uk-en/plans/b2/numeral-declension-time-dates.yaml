module: b2-31
level: B2
sequence: 31
slug: numeral-declension-time-dates
version: '2.0'
title: 'Відмінювання числівників І: Час і дати'
subtitle: 'Numeral Declension I: Time & Dates'
content_outline:
- section: 'Вступ: Культурний код і циклічність часу (Introduction: Cultural Code
    and Time Cyclicity)'
  words: 600
  points:
  - 'Аграрна традиція та цінність моменту: аналіз прислів''їв «Згаяного часу і конем
    не доженеш» та «Всякому овочеві свій час» для розуміння українського сприйняття
    часу'
  - 'Етимологія місяців: розгляд назв (січень, лютий, березень) як відображення природних
    явищ, використання прозорої етимології як мнемонічного прийому для запам''ятовування'
  - 'Чому числівники — це виклик: огляд складності відмінювання всіх частин складених
    числівників у повсякденних ситуаціях (розклад, новини)'
- section: 'Час: від теорії до живого мовлення (Time: From Theory to Natural Speech)'
  words: 1000
  points:
  - 'Подолання кальки: розрізнення питання «Котра година?» (порядкове поняття) та
    помилкового «Скільки годин?», що походить від російського впливу'
  - 'Системна диференціація: розмежування тривалості (скільки часу? — дві години)
    та точки в часі (котра година? — друга година) для уникнення типових помилок'
  - 'Прийменникові конструкції за Стандартом (§4.1.1.3): вживання конструкцій «пів
    на першу», «двадцять по вісімнадцятій», «за п''ятнадцять четверта»'
  - 'Відмінювання порядкових числівників у часових виразах: зміна форми від «о другій»
    до «після дванадцятої», особливості складених числівників'
- section: 'Датування: точність у днях та роках (Dating: Precision in Days and Years)'
  words: 900
  points:
  - 'Граматика дати: вживання називного відмінка для констатації (Сьогодні перше січня)
    та обов''язковий родовий відмінок для відповіді на «коли?» (першого вересня)'
  - 'Корекція помилок: розгляд помилки «народився перше травня» (знахідний) та відпрацювання
    правильної форми в родовому часовому відмінку'
  - 'Часові межі: використання прийменників з датами (з, по, до, після) та відмінювання
    складених порядкових числівників у роках (у дві тисячі двадцять шостому році)'
- section: 'Офіційно-діловий контекст: терміни та строки (Official Business Context:
    Terms and Deadlines)'
  words: 900
  points:
  - 'Професійна термінологія: розмежування понять «термін виконання» (deadline) та
    «строк» (period/duration) в офіційних документах та угодах'
  - 'Регістр мовлення: перехід від розмовного «пів на третю» до офіційного формату
    «чотирнадцята тридцять» у протоколах, постановах та новинах'
  - 'Стандарти документації: правильне написання дат народження та термінів (протягом
    трьох днів) з дотриманням норм відмінювання числівників'
- section: Практичний практикум та синтез (Practical Workshop and Synthesis)
  words: 600
  points:
  - 'Аналіз типових помилок: інтерактивне виправлення конструкцій на кшталт «без десяти
    сьома» на нормативні «за десять сьома» або «десять до сьомої»'
  - 'Симуляція логіста: складання графіків та розкладів (метод дослідження ефективності)
    з використанням високої частотності слів «процес» та «метод»'
  - 'Диктант та заповнення форм: перевірка навичок запису складних дат та часових
    проміжків на слух у професійному контексті'
focus: grammar
pedagogy: TTT
objectives:
- Learner can tell the time using formal and informal expressions
- Learner can state and understand dates in all required cases
- Learner can use months in genitive and prepositional cases correctly
grammar:
- Порядкові числівники в часових виразах
- Відмінювання числівників при датах
- Родовий відмінок місяців
immersion: 100
register: нейтральний
phase: B2.1c
vocabulary_hints:
  required:
  - термін (term) — визначення терміна, термін виконання, у короткий термін; висока
    частотність в офіційному стилі
  - поняття (concept) — ключове поняття, розмежування понять, вводити поняття; вживається
    для абстрактних категорій
  - процес (process) — навчальний процес, процес формування, у процесі; загальновживане
    в академічному контексті
  - метод (method) — ефективний метод, метод дослідження, застосовувати метод; часто
    вживається в науковому та практичному дискурсі
  recommended:
  - аналіз (analysis) — проводити аналіз, результати аналізу, глибокий аналіз; ключове
    слово для аналітичного мислення
  - синтез (synthesis) — аналіз і синтез, синтез мистецтв; спеціалізована термінологія
  - дослідження (research) — наукове дослідження, об'єкт дослідження, проводити дослідження;
    висока частотність у науковій сфері
