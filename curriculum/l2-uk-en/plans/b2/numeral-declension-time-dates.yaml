module: b2-058
level: B2
sequence: 58
slug: numeral-declension-time-dates
version: 1.1.1
title: 'Відмінювання числівників: Час та дати'
subtitle: 'Відмінювання числівників: час і дати'
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Досконало вивчити відмінювання порядкових числівників у назвах дат (число, місяць, рік).
- Опанувати правила вживання прийменників та відмінків для вираження точного часу ('о котрій годині?').
- Навчитися розрізняти офіційний та розмовний способи позначення часу ('п'ятнадцята тридцять' vs 'пів на четверту').
- Засвоїти особливості відмінювання складних числівників у контексті історичних дат.
- Правильно використовувати числівники для позначення часових інтервалів та періодичності.
reading_situations:
- source_type: офіційний документ (наказ або програма конференції)
  topic: Аналіз розкладу подій, де дати та час вказані у різних відмінкових формах.
  key_elements:
  - дати у родовому відмінку
  - часові межі
  - порядкові числівники
  motivation: Розуміння офіційних стандартів запису та читання хронологічної інформації.
listening_situations:
- media_type: інтерв'ю
  setting: Радіопередача, де ведучий оголошує точний час, дати історичних подій та плани на майбутнє.
  focus_points:
  - Сприйняття на слух закінчень числівників.
  - Різниця між 'чверть на' та 'за чверть'.
  - Узгодження року з місяцем.
  motivation: Розвиток навичок миттєвого розкодування числових даних у мовленні.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть звіт про важливу історичну подію або культурний фестиваль. Вкажіть точні дати (день, місяць, рік) та детальний
    розклад за годинами. Використовуйте щонайменше 10 різних форм числівників у непрямих відмінках.
  requirements:
  - правильне відмінювання року (відмінюється лише останнє слово)
  - використання різних конструкцій для позначення часу
  - відповідність стилю репортажу
  - мінімум 250 слів
  motivation: Закріплення навичок грамотного написання дат та часових показників.
  model_answer: 'Текст має містити фрази типу: ''Подія розпочалася о десятій годині тридцять хвилин'', ''Завершення планується
    двадцять восьмого жовтня дві тисячі двадцять четвертого року''. Слід уникати русизмів у позначенні часу. Модельний варіант
    демонструє точне дотримання відмінкових закінчень.'
discussion_topics:
- context: Пунктуальність у різних культурах та способи її вираження в мові.
  questions:
  - 'Який спосіб позначення часу вам здається логічнішим: офіційний (24-годинний) чи розмовний?'
  - Чому правильне відмінювання дат є критично важливим для офіційного спілкування?
  - Чи складно вам запам'ятовувати назви місяців у родовому відмінку при вказуванні дат?
  motivation: Обговорення практичного значення точності числівників.
content_outline:
- section: Синтаксис та морфологія дат
  words: 1000
  subsections:
  - 'Відмінювання порядкових числівників у датах: число та місяць (родовий відмінок)'
  - 'Особливості відмінювання року: відмінювання останнього компонента'
  - Вживання прийменників 'у', 'в', 'на' з роками та століттями
  - 'Назви місяців: перехід до родового відмінка в датах'
  key_concepts:
  - порядковий числівник
  - родовий відмінок
  - хронологія
  - узгодження
- section: 'Позначення часу: Офіційний та розмовний стилі'
  words: 1000
  subsections:
  - Питання 'котра година?' проти 'яка година?' (норми та помилки)
  - 'Офіційний стиль: години та хвилини в називному відмінку'
  - 'Розмовний стиль: прийменники ''на'', ''по'', ''за'', ''пів на'''
  - 'Синтаксичні моделі: ''о п''ятій'', ''чверть на восьму'', ''за десять шоста'''
  key_concepts:
  - година
  - хвилина
  - прийменникові конструкції
  - мовна норма
- section: Відмінювання складних числівників у часових контекстах
  words: 1000
  subsections:
  - Складні та складені числівники (від 20 до 1000) у датах
  - Особливості відмінювання числівників 'двісті', 'триста' тощо в історичних текстах
  - Поєднання числівників із іменниками 'рік', 'година', 'хвилина'
  - Правопис та вимова великих чисел у датах
  key_concepts:
  - складений числівник
  - кількісний числівник
  - флексія
  - акцентологія числівників
- section: Періодичність та часові інтервали
  words: 1000
  subsections:
  - 'Вираження періодичності: ''щодня'', ''щодва тижні'', ''раз на місяць'''
  - Конструкції 'з... по...', 'від... до...' з числівниками
  - 'Приблизний час та дати: вживання часток ''близько'', ''десь'''
  - Аналіз типових калькованих конструкцій у позначенні часу
  key_concepts:
  - інтервал
  - періодичність
  - дистрибутивність
  - антикалька
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
