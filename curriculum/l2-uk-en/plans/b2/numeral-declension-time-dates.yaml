activity_hints:
- type: fill-in
  description: Write out dates and times in words with correct case (e.g., 'двадцять восьмого жовтня дві тисячі двадцять четвертого
    року')
- type: error-correction
  description: Fix numeral case agreement errors in date expressions
- type: select
  description: Choose the correct declined form of a numeral in a date/time context
- type: match-up
  description: Match numeral phrase to its correct case form (e.g., 'о котрій?'→'о п'ятій годині')
