module: b2-019
level: B2
sequence: 19
slug: correlative-constructions
version: '1.1'
title: "Складні речення з корелятами (вказівними словами)"
subtitle: "Complex Sentences with Correlative Words"
focus: grammar
pedagogy: PPP
phase: "B2.1b [Advanced Syntax]"
word_target: 4000
objectives:
  - "Розуміти роль вказівних слів (той, такий, стільки) як корелятів у головній частині складного речення."
  - "Правильно узгоджувати кореляти з підрядними сполучниками та сполучними словами (той... хто, такий... як, стільки... скільки)."
  - "Досконало володіти пунктуацією при вживанні корелятивних пар, особливо у випадках інверсії."
  - "Використовувати корелятивні конструкції для логічного акцентування та підсилення виразності мовлення."
  - "Розрізняти обов'язкові та факультативні вказівні слова у складних підрядних реченнях."

reading_situations:
  - source_type: "правовий документ"
    topic: "Умови надання грантів для наукових досліджень."
    key_elements:
      - "корелятивні пари: 'той, хто...', 'такий, що...'"
      - "вказівні слова в ролі засобів однозначності (наприклад, 'у такий спосіб, щоб...')"
      - "складні підрядні речення з кількома рівнями кореляції"
    motivation: "Вивчення того, як кореляти забезпечують юридичну точність та логічну строгість тексту."

listening_situations:
  - media_type: "відео"
    setting: "Мотиваційна промова успішного українського підприємця на форумі."
    focus_points:
      - "Акцентування уваги за допомогою конструкцій 'саме той, хто...', 'саме такий, як...'"
      - "Експресивна роль вказівних слів у поєднанні з частками."
      - "Інтонаційне виділення корелятів для підсилення риторичного ефекту."
    motivation: "Аналіз риторичного потенціалу вказівних слів у публічному виступі."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть звернення до міської ради з пропозицією щодо покращення екологічного стану вашого району. Використовуйте корелятивні конструкції для точного формулювання вимог та очікувань."
    requirements:
      - "мінімум 250 слів"
      - "використати щонайменше 5 різних корелятивних пар"
      - "продемонструвати вживання конструкцій типу 'доти... поки', 'там... де', 'так... щоб'"
      - "дотримуватися офіційно-ділового стилю"
    motivation: "Практичне відпрацювання точності висловлювання через синтаксичну кореляцію."
    model_answer: "Лист має містити чіткі логічні переходи, де вказівні слова в головній частині готують читача до конкретних деталей у підрядній."

discussion_topics:
  - context: "Чи завжди вказівні слова є необхідними, чи це лише 'стилістичний баласт'?"
    questions:
      - "У яких випадках вилучення корелята (наприклад, 'того') змінює зміст речення?"
      - "Як кореляти допомагають уникати двозначності у складних текстах?"
      - "Які корелятивні конструкції ви найчастіше зустрічаєте в українських новинах?"
    motivation: "Стимулювання аналітичного підходу до вибору синтаксичних засобів мови."

content_outline:
  - section: "Функціональна природа корелятів"
    words: 1000
    subsections:
      - "Вказівні слова як структурні елементи головної частини речення"
      - "Морфологічне вираження корелятів: займенники та займенникові прислівники"
      - "Семантична відповідність між корелятом та підрядним сполучником"
      - "Обов'язкові та факультативні вказівні слова: умови вживання"
    key_concepts:
      - "корелят"
      - "вказівне слово"
      - "структурна єдність"
  - section: "Типологія корелятивних пар"
    words: 1000
    subsections:
      - "Означальні кореляти: той... який, такий... що"
      - "Обставинні кореляти місця та часу: там... де, туди... куди, тоді... коли"
      - "Кореляти міри та ступеня: стільки... скільки, настільки... що"
      - "Способу дії та мети: так... як, для того... щоб"
    key_concepts:
      - "семантична пара"
      - "співвідносність"
      - "синтаксичний зв'язок"
  - section: "Пунктуація та інверсія в корелятивних реченнях"
    words: 1000
    subsections:
      - "Місце коми у реченнях з розчленованими сполучниками (тому, що; для того, щоб)"
      - "Вплив логічного наголосу на розчленування складеного сполучника"
      - "Інверсія частин речення та зміна позиції корелята"
      - "Пунктуаційні особливості при вживанні часток 'саме', 'тільки' перед корелятом"
    key_concepts:
      - "розчленування сполучника"
      - "логічний наголос"
      - "пунктуаційна норма"
  - section: "Стилістичні функції кореляції"
    words: 1000
    subsections:
      - "Використання корелятів для створення риторичних фігур"
      - "Роль вказівних слів у науковій дефініції та юридичному формулюванні"
      - "Кореляція як засіб зв'язку речень у тексті (дискурсивна роль)"
      - "Аналіз типових помилок: зайве вживання 'те, що' (плеонастичність)"

vocabulary:
  required:
    - корелят
    - вказівне слово
    - співвідносність
    - підрядна частина
    - сполучний засіб
    - акцентування
    - логічна єдність
  recommended:
    - однозначність
    - юридична точність
    - риторичний ефект
    - синтаксична парадигма
    - плеоназм

activities:
  types_required:
    - matching
    - sentence-expansion
    - error-correction
    - select
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

connects_to:
  previous: "multi-clause-sentences"
  next: "emphasis-and-inversion"
