module: b2-19
level: B2
sequence: 19
slug: correlative-constructions
version: '2.0'
title: Співвідносні конструкції
subtitle: Paired Demonstrative and Relative Words
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - 'Визначення корелятивів як синтаксичних пар: концепція ''Вказівник + Зв''язка''
    (Pointer + Link) для структурування логічних зв''язків у реченні.'
  - 'Відповідність Державному стандарту (§4.3.4.2): опанування складнопідрядних речень
    з означальною частиною (який, котрий, що) через вказівні слова.'
  - 'Культурний контекст: аналіз фольклорних паремій (''Не все те золото, що блищить'')
    як фундаменту для розуміння парних конструкцій.'
- section: 'Граматичний фундамент: Основні пари (Grammatical Foundation: Common Pairs)'
  words: 1000
  points:
  - Детальний розбір частотних пар 'той... хто' та 'те... що' з акцентом на їхню роль
    у науковому регістрі та академічному письмі.
  - 'Критична важливість відмінювання вказівного слова: тренінг на формах ''про те,
    що'', ''з тим, що'', ''того, що'' для уникнення статичного вживання називного
    відмінка.'
  - 'Виправлення типової помилки: диференціація нормативного ''за те, що'' (Accusative)
    проти інтерференційного російського кальку ''за то, що''.'
  - 'Специфіка узгодження у числі: порівняльний аналіз структур ''Ті, хто знають''
    та ''Той, хто знає'' для забезпечення граматичної точності.'
- section: Просторові, часові та кількісні зв'язки (Spatial, Temporal, and Quantitative
    Links)
  words: 800
  points:
  - Застосування просторових корелятивів ('там... де', 'туди... куди', 'звідти...
    звідки') у наукових описах та географічних контекстах.
  - 'Часові маркери ''тоді... коли'' та ''доти... поки'': розгортання логічної послідовності
    та часових меж у дослідницьких текстах.'
  - 'Кількісні корелятиви ''стільки... скільки'' та ''настільки... наскільки'': інструменти
    для точного вимірювання, порівняння та градації ознак.'
- section: Стилістика та запобігання калькам (Stylistics and Calque Prevention)
  words: 900
  points:
  - 'Подолання впливу англійської мови: заміна прямої кальки ''The one who'' (Той,
    хто...) на природніші для української мови іменникові конструкції.'
  - 'Функціональне розрізнення: суворий розподіл вживання ''той, хто'' для осіб та
    ''те, що'' для абстрактних понять або неживих предметів.'
  - 'Літературний вимір: розбір емоційного навантаження корелятивів у тропах про час
    та незворотність подій (напр., ''Того, що було, не вернеш'').'
- section: Практичне застосування та синтез (Practical Application and Synthesis)
  words: 800
  points:
  - 'Трансформаційні вправи: синтез двох простих речень у складну конструкцію з використанням
    правильного корелятивного зв''язку.'
  - 'Написання академічного параграфа: інтеграція термінів ''аналіз'', ''синтез''
    та ''дослідження'' у речення з вказівними словами.'
  - 'Пунктуаційний контроль: правила відокремлення підрядних частин у корелятивних
    парах згідно з нормами офіційного стилю.'
focus: grammar
pedagogy: TTT
objectives:
- Learner can construct complex sentences using correlative pairs
- Learner can distinguish between different types of correlative constructions
- Learner can correctly punctuate sentences with correlative words
- Learner can combine simple sentences using appropriate correlative pairs
grammar:
- Співвідносні (корелятивні) конструкції з вказівними та відносними словами
- 'Парні конструкції: той...хто, те...що, такий...який'
- 'Просторові корелятиви: там...де, туди...куди, звідти...звідки'
- 'Часові корелятиви: тоді...коли, доти...поки'
- 'Кількісні корелятиви: стільки...скільки, настільки...наскільки'
register: науковий
phase: B2.2
vocabulary_hints:
  required:
  - термін (term) — вживається у конструкціях 'той термін, який...'; частотний елемент
    наукового опису
  - поняття (concept) — абстрактне 'те поняття, що...'; основа для побудови наукових
    визначень
  - процес (process) — 'той процес, під час якого...'; для деталізації процедурних
    етапів
  - метод (method) — 'такий метод, що дозволяє...'; специфікація інструментарію дослідження
  - те, що (that... which) — найвища частотність; вимагає уваги до відмінювання (про
    те, з тим, того)
  - той, хто (the one who) — висока частотність для опису суб'єктів; узгодження в
    числі ('ті, хто знають')
  recommended:
  - аналіз (analysis) — 'аналіз того, що виявлено'; ключова когнітивна операція в
    академічному письмі
  - синтез (synthesis) — 'синтез тих даних, які отримано'; поєднання елементів у цілісну
    структуру
  - дослідження (research) — 'саме те дослідження, яке...'; фокусування уваги на конкретному
    об'єкті
  - там, де (there... where) — маркер локалізації; часто вживається для опису середовища
    або умов
