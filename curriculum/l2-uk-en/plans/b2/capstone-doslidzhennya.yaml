vocabulary_hints:
  required:
  - дослідження (research) — проводити дослідження, наукове ~, об'єкт/предмет ~, мета
    ~, результати ~
  - джерело (source) — першоджерело, надійне ~, посилання на ~, список використаних
    джерел
  - аналіз (analysis) — критичний ~, порівняльний ~, глибокий ~, піддати аналізу,
    на основі аналізу
  - висновок (conclusion) — дійти висновку (not прийти до), зробити ~, головний ~,
    логічний ~, підсумовуючи
  recommended:
  - теза (thesis/proposition) — формулювати тезу, аргументувати ~у, захищати ~у, основна
    теза
  - аргумент (argument) — переконливий ~, наводити аргументи, вагомий ~, контраргумент
  - термін (term) — визначати ~, ключовий ~, вузькоспеціальний ~
  - поняття (concept) — апарат понять, базове ~, розмежування понять
  - актуальність (relevance) — обґрунтувати ~, наукова ~, соціальна ~
