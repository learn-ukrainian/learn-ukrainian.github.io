title: 'Capstone: Дослідження'
subtitle: 'Capstone: Research'
content_outline:
- section: 'Огляд: Етап написання (Overview: The Writing Phase)'
  words: 600
  points:
  - 'Перехід від плану-проспекту (М79) до повного тексту: стратегії розгортання аргументації
    згідно з вимогами Держстандарту §1.3.1.1.'
  - 'Історичний контекст: Іван Пулюй (Ivan Puluj) та важливість публікації результатів
    — як конструктор катодної трубки втратив пріоритет у відкритті рентгенівських
    променів через зволікання.'
  - 'Управління часом та етапність: від чернетки до фінального редагування.'
- section: Написання вступу (Writing the Introduction)
  words: 600
  points:
  - 'Формулювання проблеми та актуальності: як обґрунтувати вибір теми науковим стилем.'
  - 'Чітка теза (thesis) та визначення ключових термінів: сучасний приклад Марини
    В''язовської (Fields Medal 2022) та її прориву в математичних дослідженнях.'
  - 'Огляд структури роботи: логічна карта майбутнього дослідження.'
- section: Основна частина (The Main Body)
  words: 1000
  points:
  - 'Інтеграція джерел: використання вставних конструкцій для цитування та парафразу
    («За словами...», «Як зазначає...», «На думку...»).'
  - 'Спадщина дослідника: Агапіт Печерський як перший лікар-дослідник Київської Русі
    — поєднання спостереження та ранньої емпіричної медицини.'
  - 'Мовна агентивність: перевага активних конструкцій («Ми проаналізували») або безособових
    форм на -но/-то над пасивними («Було зроблено аналіз»).'
- section: Висновки (Conclusions)
  words: 600
  points:
  - Узагальнення основних тверджень та відповідь на дослідницьке питання.
  - 'Культура мовлення: типова помилка «прийти до висновку» (калька) та вживання нормативного
    «дійти висновку».'
  - 'Ширші імплікації: як висновки впливають на подальші перспективи дослідження.'
- section: Редагування та оформлення (Editing and Formatting)
  words: 800
  points:
  - 'Академічна точність: усунення плеоназмів (напр. «головний пріоритет», «перша
    прем''єра») та канцеляриту.'
  - 'Синтаксична норма: виправлення помилок із дієприслівниковими зворотами (неправильно:
    «Читаючи статтю, виникло питання»).'
  - 'Оформлення списку використаних джерел та посилань: точність бібліографічного
    опису.'
- section: Підготовка до здачі (Preparation for Submission)
  words: 400
  points:
  - 'Контрольний список готовності тексту: логіка, повнота та відповідність тезі.'
  - 'Практичний дриль: заміна кальки «в якості прикладу» на правильні форми «як приклад»
    або «наприклад».'
  - 'Зв''язок із майбутнім: підготовка написаного звіту до усної презентації проєкту
    (М82).'
focus: project
pedagogy: CBI
