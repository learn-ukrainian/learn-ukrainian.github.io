module: b2-87
level: B2
sequence: 87
slug: professional-reports-basics
version: '2.0'
title: 'Професійні звіти: Основи'
subtitle: Basic report structure and writing
content_outline:
- section: Вступ (Introduction)
  words: 600
  points:
  - 'Historical roots of Ukrainian statecraft: The General Military Chancellery (Генеральна
    військова канцелярія) of the Cossack Hetmanate as a precursor to modern administrative
    reporting and record-keeping.'
  - 'State Standard §3.11: Defining the Official-Business Style (Офіційно-діловий
    стиль) and its specific role in modern professional agreements, contracts, and
    internal reporting.'
  - Transitioning from short-form professional communication (M85-86 Professional
    Emails) to the structured, analytical requirements of long-form reports.
  - 'The modern shift: Moving away from wordy Soviet ''kantseliaryzm'' (bureaucratese)
    toward concise, action-oriented global standards while maintaining Ukrainian grammatical
    integrity.'
- section: 'Імерсивна розповідь: Структура та компоненти (Narrative: Structure and
    Components)'
  words: 1000
  points:
  - 'The ''Executive Summary'' (Резюме) strategy: Identifying why it must be written
    last but placed first to provide immediate clarity for decision-makers.'
  - 'Full structural breakdown of a professional report: From the Title Page (Титульна
    сторінка) to the critical Appendices (Додатки) containing raw data and charts.'
  - 'Introduction and Methodology: Defining research context, constraints (обмеження),
    and data collection methods according to academic and professional standards.'
  - 'Narrative arc: Following a junior analyst (молодший аналітик) preparing a first
    project progress report, balancing technical results with practical recommendations.'
- section: Аналіз та візуалізація даних (Analysis and Data Visualization)
  words: 1000
  points:
  - 'Logical organization: Ensuring a flow from general findings to specific conclusions
    using a clear hierarchy of headers and logical paragraphing (one thought per paragraph).'
  - 'Language of data: Describing trends (зростання, зниження, стабілізація) and correlations
    with neutral, objective terminology.'
  - 'Integrating visualizations: Guidelines for using tables for granular numbers
    and graphs for trends, including mandatory numbering and source citations.'
  - 'Register check: Maintaining ''neutrality'' by avoiding emotional evaluations
    and subjective judgments in the analytical body of the report.'
- section: 'Граматика: Безособовість та стиль (Grammar: Impersonality and Style)'
  words: 800
  points:
  - 'State Standard §4.2.6: The hallmark of official style — utilizing verbal nouns
    with suffixes -ння and -ення (виконання, забезпечення) to formalize actions into
    nouns.'
  - 'State Standard §4.3.3.1: Mastering impersonal constructions (виявлено, зазначено,
    встановлено) and ''було'' + past participle forms to emphasize results over actors.'
  - 'Passive voice for objectivity: Using passive participles (проаналізований, обстежений)
    to create formal distance and technical precision.'
  - 'Standard formulaic expressions for reporting: ''Згідно з даними'', ''Як показано
    на графіку'', ''З огляду на вищезазначене''.'
- section: Підсумок та усунення помилок (Summary and Error Correction)
  words: 600
  points:
  - 'Correcting common calques: Drill on ''брати участь'' (correct) vs. ''приймати
    участь'' (incorrect) and the essential ''підбивати підсумки'' vs. ''підводити
    підсумки''.'
  - 'Prepositional mastery: Enforcing the use of ''згідно з'' + Instrumental case
    (згідно з інструкцією) as a key marker of high-level professional literacy.'
  - 'Eliminating pleonasms: Identifying and removing redundant phrasing such as ''вільна
    вакансія'' or ''своя автобіографія'' to meet B2+ conciseness requirements.'
  - 'Synthesizing skills: Reviewing the balance between structure, visualization,
    and formal grammar in preparation for Advanced Reports (M88) and the Final Exam
    (M94).'
focus: skills
pedagogy: CBI
objectives:
- Learner can structure a basic professional report with clear sections
- Learner can write executive summaries and introductions
- Learner can present data and findings objectively
- Learner can use appropriate formal register for report writing
- Learner can organize information logically in report format
phase: B2.4 Communication Skills
vocabulary_hints:
  required:
  - звіт (report) — складати звіт, річний звіт, фінансовий звіт, звіт про виконану
    роботу; High frequency
  - висновок (conclusion) — дійти висновку, зробити висновки, попередні висновки;
    Essential for reporting
  - аналіз (analysis) — проводити аналіз, глибокий аналіз, порівняльний аналіз, на
    основі аналізу; High frequency
  - підсумок (summary/result) — підбивати підсумки (NOT підводити!), у підсумку, загальний
    підсумок
  - дослідження (research) — об'єкт дослідження, методи дослідження, результати дослідження;
    Formal academic/pro context
  - термін (term) — професійна термінологія, у визначений термін
  - поняття (concept) — ключове поняття, визначення поняття
  - процес (process) — процес виконання, оптимізація процесу
  - метод (method) — метод аналізу, інноваційні методи
  recommended:
  - синтез (synthesis) — синтез отриманих даних
  - згідно з (according to) — згідно з інструкцією, згідно з розпорядженням; Essential
    prepositional phrase (+ Instr)
  - брати участь (to take part) — брати участь у проекті; Correction for common calque
    'приймати'
  - виконання (execution/fulfillment) — забезпечення виконання, термін виконання;
    Verbal noun from §4.2.6
  - забезпечення (provision/ensuring) — програмне забезпечення, забезпечення якості;
    High-register verbal noun
