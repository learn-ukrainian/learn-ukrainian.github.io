module: b2-071
level: B2
sequence: 71
slug: professional-reports-basics
version: '1.0'
title: "Ділові звіти: Основи написання та структурування"
subtitle: "Professional Reports: Basics of Writing and Structuring"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Вивчити класифікацію та призначення різних видів ділових звітів (інформаційних, аналітичних, прогрес-звітів)."
  - "Опанувати логічну структуру звітного документа: вступ, основна частина, висновки, рекомендації."
  - "Навчитися дотримуватися об'єктивного та нейтрального стилю викладу інформації."
  - "Відпрацювати навички опису та коментування графічних даних (таблиць, діаграм) українською мовою."

reading_situations:
  - source_type: "річний звіт"
    topic: "Звіт про сталий розвиток української агропромислової компанії."
    key_elements: ["показники ефективності", "соціальна відповідальність", "аналіз ризиків", "прогнози"]
    motivation: "Ознайомлення зі структурою та лексикою великих корпоративних звітів."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Складіть короткий аналітичний звіт про результати роботи вашого відділу за останній квартал."
    motivation: "Застосування знань про структуру та стиль звітування у реалістичному професійному контексті."
    requirements: ["використання ділових кліше", "структурування за розділами", "короткий висновок та рекомендації"]
    model_answer: "Звіт має бути чітким, містити статистичні дані, аналіз причин успіху/невдач та конкретні пропозиції щодо покращення роботи."

content_outline:
  - section: "Класифікація та призначення ділових звітів"
    words: 1000
    subsections:
      - "Інформаційні звіти: констатація фактів та опис подій"
      - "Аналітичні звіти: оцінка ситуації та пошук причинно-наслідкових зв'язків"
      - "Звіти про прогрес (Progress reports) та звіти за результатами проектів"
    key_concepts:
      - "звітність"
      - "аналітика"
      - "фактологічність"
      - "верифікація"
  - section: "Структурування та дизайн звітного документа"
    words: 1000
    subsections:
      - "Титульний аркуш та зміст як навігаційні елементи"
      - "Executive Summary (Резюме для керівника): як стиснути 50 сторінок в одну"
      - "Додатки, глосарій та список джерел в офіційній документації"
    key_concepts:
      - "архітектоніка тексту"
      - "лаконічність"
      - "цілісність"
      - "навігація"
  - section: "Стиль та мова професійного звіту"
    words: 1000
    subsections:
      - "Безособовість та об'єктивність: використання конструкцій на -но, -то та пасивного стану"
      - "Логічні конектори для зв'язку між розділами та аргументами"
      - "Уникнення суб'єктивних оцінок та експресивної лексики"
    key_concepts:
      - "об'єктивність"
      - "безособовість"
      - "логічний зв'язок"
      - "нейтральність"
  - section: "Опис та інтерпретація графічних даних"
    words: 1000
    subsections:
      - "Лексика для опису трендів (зростання, спад, стабілізація)"
      - "Коментування таблиць та діаграм: на що звертати увагу читача"
      - "Формулювання висновків та рекомендацій на основі числових показників"
    key_concepts:
      - "візуалізація"
      - "динаміка"
      - "інтерпретація"
      - "статистика"

vocabulary:
  required:
    - звітність
    - показник
    - ефективність
    - рекомендація
    - динаміка
    - тенденція
    - обґрунтування
    - резюме
  recommended:
    - збалансований
    - перспективний
    - суттєвий
    - результативність
    - узагальнення

activities:
  types_required:
    - group-sort
    - fill-in
    - critical-analysis
    - essay-response
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "professional-email-advanced"
  next: null
