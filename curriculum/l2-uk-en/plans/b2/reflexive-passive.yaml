content_outline:
- section: 'Вступ: Поняття зворотності та пасиву (Introduction: Concept of Reflexivity and Passive)'
  words: 500
  points:
  - 'Аналіз §4.1.3.1 Державного стандарту: вживання зворотних дієслів недоконаного виду як морфологічної бази для пасивних
    конструкцій.'
  - Роль частки -ся як маркера пасивного стану, що вказує на об'єкт, який стає граматичним підметом.
  - 'Стилістичне обмеження: вивчення вживання конструкції виключно в науковому, офіційно-діловому та публіцистичному стилях.'
- section: Морфологія та правила утворення (Morphology and Formation Rules)
  words: 800
  points:
  - 'Чергування часток -ся та -сь: вживання -ся після приголосних та -сь після голосних у формах третьої особи («будується»,
    «досліджуються»).'
  - 'Видові пари в пасиві: акцент на недоконаному виді для позначення тривалої дії, що перебуває в процесі виконання.'
  - 'Трансформація активних речень у пасивні: перехід прямого додатка в позицію підмета («Науковці вивчають проблему» → «Проблема
    вивчається науковцями»).'
- section: Семантика процесу та роль Агента (Process Semantics and the Role of the Agent)
  words: 900
  points:
  - 'Відмінність між процесом (-ся) та результатом (-но/-то): опис дії, що триває в часі («Будинок будується вже рік»).'
  - 'Правила вираження агента в орудному відмінку без прийменників: мастеринг Instrumental Case для наукового контексту.'
  - 'Діагностика контексту: коли агент є обов''язковим для розуміння змісту, а коли його можна опустити в технічних інструкціях.'
- section: 'Культура: Українські винаходи крізь призму пасиву (Culture: Ukrainian Inventions through the Passive Lens)'
  words: 1000
  points:
  - 'Іван Пулюй та X-промені: опис наукового пріоритету через конструкцію «промені досліджуються Пулюєм».'
  - 'Катерина Ющенко та перша мова програмування: використання пасиву для опису технологічних досягнень («мова програмування
    створюється жінкою»).'
  - 'Ігор Сікорський та київська авіаконструкторська школа: опис розробки гелікоптера («гелікоптер розробляється винахідником»).'
  - 'Практичне застосування в технічній документації: «Програма встановлюється», «Технологія застосовується».'
- section: 'Синтез зворотних займенників: себе, один одного, сам/весь (Reflexive Pronoun Synthesis: себе, one another, сам/весь)'
  words: 400
  points:
  - 'Зворотний займенник себе за межами пасиву: рефлексивне вживання (бачити себе, довіряти собі) та ідіоматичні конструкції
    (почувати себе, поводити себе)'
  - 'Реципрокальний займенник один одного: взаємна дія (вони допомагають один одному, ми бачимо одне одного) та відмінювання
    за відмінками'
  - 'Означальні займенники сам/сама/саме та весь/вся/все: підсилення суб''єкта дії (він сам зробив) та відмінність від емфатичного
    «саме» (частка)'
  - 'Розмежування функцій: себе (рефлексив), один одного (реципрокал), -ся (пасив або медіум) — системна таблиця з прикладами'
- section: Стилістика та запобігання помилкам (Stylistics and Error Prevention)
  words: 800
  points:
  - 'Learner Error: використання прийменника «від» для позначення агента («Книга читається від студентів» → корекція на «Книга
    читається студентами»).'
  - 'Passive Overuse: запобігання вживанню пасиву в розмовній мові («Піца їсться мною»); заміна на активні конструкції («Я
    їм піцу»).'
  - 'Корекція змішування видів: чому конструкція «Будинок збудується» є граматично некоректною у порівнянні з «Будинок збудовано».'
  - 'Підсумковий огляд та підготовка до наступного етапу: перехід до пасиву третьої особи множини (модуль 05).'
vocabulary_hints:
  required:
  - 'проводиться (is being conducted) — High frequency in Academic/Official styles; collocations: експеримент проводиться,
    зустріч проводиться.'
  - 'вивчається (is being studied) — Academic register; collocations: проблема вивчається науковцями, мова вивчається.'
  - 'застосовується (is applied) — Tech/Legal register; collocations: закон застосовується, метод застосовується.'
  - 'будується (is being built) — General/News register; collocations: будинок будується, система будується.'
  - 'аналізується (is being analyzed) — Academic focus; collocations: ситуація аналізується, дані аналізуються.'
  - 'досліджується (is being researched) — Academic/Scientific register; collocations: явище досліджується, тема досліджується
    вченими.'
  - зворотний (reflexive) — grammatical term for -ся verbs.
  - розробляється (is being developed) — technical/inventive context; collocations: проєкт розробляється, гелікоптер розробляється.
  - науковець (scientist) — common agent in passive constructions.
  - експеримент (experiment) — frequent subject in scientific passive.
  recommended:
  - 'розробляється (is being developed) — technical/inventive context; collocations: проєкт розробляється, гелікоптер розробляється.'
  - 'створюється (is being created) — creative/scientific context; collocations: мова створюється, система створюється.'
  - 'встановлюється (is being installed/established) — tech/legal; collocations: програма встановлюється, зв''язок встановлюється.'
  - винахідник (inventor) — cultural context agent (Sikorsky, Puliui).
  - проміння (rays/radiation) — scientific vocabulary related to Puliui's research.
