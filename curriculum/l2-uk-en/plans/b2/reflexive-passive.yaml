module: reflexive-passive
level: B2
sequence: 4
slug: reflexive-passive
version: '1.3'
title: "Зворотні дієслова у пасивному значенні"
subtitle: "Reflexive Passive with -sia Verbs"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Розпізнавати пасивне значення зворотних дієслів на -ся у текстах різних стилів."
  - "Правильно вживати орудний відмінок для позначення діяча при зворотних дієсловах."
  - "Чітко розрізняти пасивні значення від власне-зворотних (митися) та взаємно-зворотних (вітатися)."
  - "Застосовувати пасив на -ся для опису тривалих або регулярних процесів у науковому стилі."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Технологія виготовлення органічних добрив"
    key_elements: ["сировина (f) готується", "додається", "перемішується", "процес (m) контролюється"]
    motivation: "Спостереження за використанням пасиву на -ся для опису технологічних циклів та регулярних дій."

listening_situations:
  - media_type: "лекція"
    setting: "Фрагмент університетської лекції про те, як формується державний бюджет."
    focus_points: ["Ким розробляється проект бюджету?", "Як обговорюються статті витрат?", "Зафіксувати дієслова: 'пропонується', 'ухвалюється', 'розподіляється'."]
    motivation: "Розвиток навичок розуміння академічного дискурсу."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Складіть інструкцію для нових співробітників щодо того, як у вашій компанії обробляються запити клієнтів."
    requirements:
      - "мінімум 170 слів"
      - "використати щонайменше 5 зворотних дієслів у пасивному значенні"
      - "зазначити діяча в орудному відмінку лише там, де це стилістично виправдано"
    motivation: "Практикування пасивних конструкцій в офіційно-діловому контексті процесуального характеру."
    model_answer: "Текст має бути структурованим. Зразок: 'Лист реєструється в базі даних. Після цього запит передається менеджеру. Відповідь готується профільним відділом...'. Модель акцентує на тому, що пасив на -ся підкреслює регулярність процедури."

discussion_topics:
  - context: "Глобалізація та збереження національної ідентичності."
    questions:
      - "Як сьогодні сприймається поняття 'патріотизм' молодим поколінням?"
      - "Які культурні цінності транслюються через медіа?"
    motivation: "Використання абстрактної лексики та пасивних форм у дискусії про суспільні явища."

content_outline:
  - section: "Морфологія пасиву на -ся та його семантичне коло"
    words: 1000
    subsections:
      - "Творення пасивних форм від перехідних дієслів недоконаного виду."
      - "Синтаксична перебудова: додаток стає підметом."
      - "Семантична відмінність від результативного пасиву на -но, -то."
  - section: "Суб'єкт дії в орудному відмінку та його обмеження"
    words: 1200
    subsections:
      - "Граматична норма: Книга читається (ким?) учнем."
      - "Стилістичне навантаження: коли орудний суб'єкта робить речення важким для сприйняття."
      - "Стратегії заміни: перехід до активних конструкцій (Учень читає книгу) для природності мовлення."
  - section: "Функціональні стилі та практичне застосування пасиву"
    words: 1000
    subsections:
      - "Науковий стиль: описи експериментів, законів природи, алгоритмів."
      - "Офіційно-діловий стиль: опис обов'язків, регламентів, процедур."
      - "Обмеження в розмовному стилі (уникнення штучності)."
  - section: "Культура мовлення та розрізнення значень зворотних дієслів"
    words: 800
    subsections:
      - "Пасивне значення (будинок будується) vs Власне-зворотне (дитина вмивається)."
      - "Взаємно-зворотне значення (друзі зустрічаються) vs Загально-зворотне (сонце сміється)."

vocabulary:
  required:
    - готується
    - розробляється
    - обробляється
    - надсилається
    - виконується
    - контролюється
    - обговорюється
  recommended:
    - процедура
    - регламент
    - сировина
    - бюджет

activities:
  types_required:
    - select
    - fill-in
    - group-sort
    - translate
  min_items_per_type: 6
  total_min_items: 25

connects_to:
  previous: "b2-impersonal-passive"
  next: "third-person-plural-passive"
prerequisites:
  - b2-impersonal-passive
grammar:
  - "Reflexive passive with -ся"
  - "Instrumental case for the agent (суб'єкт)"
  - "Semantic types of reflexive verbs"
  - "Style-based selection of passive types"
register: науковий, офіційно-діловий
