title: Зворотні дієслова у пасивному значенні
subtitle: Зворотно-пасивні конструкції на -ся
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Розпізнавати пасивне значення зворотних дієслів на -ся у текстах різних 
  стилів.
- Розпізнавати й виправляти ненормативні пасивні конструкції на -ся з
  персональним діячем в орудному відмінку.
- Чітко розрізняти пасивні значення від власне-зворотних (митися) та 
  взаємно-зворотних (вітатися).
- Доречно застосовувати дієслова на -ся для природних станів, автономних змін
  та узагальнених процесів без названого виконавця.
reading_situations:
- source_type: наукова стаття
  topic: Технологія виготовлення органічних добрив
  key_elements:
  - сировина (f) готується
  - додається
  - перемішується
  - процес (m) контролюється
  motivation: Спостереження за використанням пасиву на -ся для опису 
    технологічних циклів та регулярних дій.
listening_situations:
- media_type: лекція
  setting: Фрагмент університетської лекції про те, як формується державний 
    бюджет.
  focus_points:
  - Чи названо виконавця дії, чи фокус перенесено на процес?
  - Як обговорюються статті витрат?
  - Де активна конструкція звучала б природніше?
  - 'Зафіксувати дієслова: ''пропонується'', ''ухвалюється'', ''розподіляється''.'
  motivation: Розвиток навичок розуміння академічного дискурсу.
writing_tasks:
- task_type: офіційний лист
  prompt: Складіть інструкцію для нових співробітників щодо того, як у вашій 
    компанії обробляються запити клієнтів.
  requirements:
  - мінімум 170 слів
  - використати щонайменше 5 зворотних дієслів у пасивному значенні
  - не називати персонального діяча в орудному відмінку; за потреби
    перебудувати речення на активне
  motivation: Практикування пасивних конструкцій в офіційно-діловому контексті 
    процесуального характеру.
  model_answer: 'Текст має бути структурованим. Зразок: ''Лист реєструється в базі
    даних. Після цього запит передається менеджеру. Відповідь готується профільним
    відділом'' треба замінити на ''Профільний відділ готує відповідь'' або ''Відповідь
    готують після перевірки даних''. Модель акцентує на тому, що пасив на -ся підкреслює регулярність
    процедури.'
discussion_topics:
- context: Глобалізація та збереження національної ідентичності.
  questions:
  - Як сьогодні сприймається поняття 'патріотизм' молодим поколінням?
  - Які культурні цінності транслюються через медіа?
  motivation: Використання абстрактної лексики та пасивних форм у дискусії про 
    суспільні явища.
content_outline:
- section: Морфологія пасиву на -ся та його семантичне коло
  words: 1000
  subsections:
  - Творення пасивних форм від перехідних дієслів недоконаного виду.
  - 'Синтаксична перебудова: додаток стає підметом.'
  - Семантична відмінність від результативного пасиву на -но, -то.
- section: Заборона орудного діяча та активна перебудова
  words: 1200
  subsections:
  - 'Ненормативно: Книга читається учнем. Нормативно: Учень читає книгу.'
  - 'Правило: якщо діяч названий, він має стати підметом активного речення.'
  - 'Стратегії редагування: заміна орудного діяча на називний підмет або вилучення
    діяча, якщо важливий лише процес.'
- section: Функціональні стилі та практичне застосування пасиву
  words: 1000
  subsections:
  - 'Науковий стиль: описи експериментів, законів природи, алгоритмів.'
  - 'Офіційно-діловий стиль: опис обов''язків, регламентів, процедур.'
  - Обмеження в розмовному стилі (уникнення штучності).
- section: Культура мовлення та розрізнення значень зворотних дієслів
  words: 800
  subsections:
  - Пасивне значення (будинок будується) на відміну від власне-зворотного
    значення (дитина вмивається).
  - Взаємно-зворотне значення (друзі зустрічаються) на відміну від
    загально-зворотного значення (сонце сміється).
- section: Підсумок
  words: 300
  points:
  - Дієслова на -ся можуть передавати природний стан, автономну зміну або
    узагальнений процес, але не повинні називати персонального виконавця в
    орудному відмінку.
  - >-
    Перевірте себе: чим відрізняються пасивний відтінок (будинок будується),
    власне-зворотне значення (дитина вмивається) і взаємне значення (друзі
    зустрічаються)?
  - >-
    Перевірте себе: перебудуйте речення "Завдання виконується студентом" на
    активну конструкцію та поясніть, чому активний діяч звучить природніше.
vocabulary:
  required:
  - готується
  - розробляється
  - обробляється
  - надсилається
  - виконується
  - контролюється
  - обговорюється
  recommended:
  - процедура
  - регламент
  - сировина
  - бюджет
