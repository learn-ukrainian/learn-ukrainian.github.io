slug: register-technical-scientific
version: '2.0'
title: 'Регістр: науково-технічний стиль'
subtitle: Технічна документація та наукові тексти
content_outline:
- section: 'Вступ: Науково-технічний стиль та його історія (Introduction: Sci-Tech
    Style & History)'
  words: 600
  points:
  - 'Визначення науково-технічного стилю: головна мета — точність, однозначність та
    логічна послідовність у статтях, патентах та інструкціях.'
  - 'Культурний контекст: «Золоте десятиліття» української термінології (1921–1931)
    та роль Інституту української наукової мови у створенні фахових словників.'
  - 'Історична тяглість: внесок Наукового товариства ім. Шевченка (НТШ) у Львові у
    доведення придатності української мови для високої науки наприкінці XIX ст.'
- section: Лексика та термінологія (Vocabulary & Terminology)
  words: 1000
  points:
  - 'Термінологія як ядро стилю: принцип «один термін = одне поняття» для уникнення
    синонімії та багатозначності в технічній документації.'
  - 'Розрізнення назв процесів та результатів: використання віддієслівних іменників
    на позначення дії (вимірювання) та її наслідку (вимір).'
  - 'Вживання абревіатур та акронімів у науковому дискурсі: аналіз автентичних скорочень
    (НАН України, ВВП, ККД) та міжнародних запозичень (API, PDF).'
  - 'Запозичення з класичних мов: роль латинських та грецьких коренів у формуванні
    універсального наукового апарату (синтез, аналіз, параметр).'
- section: Граматика об'єктивності (Grammar of Objectivity)
  words: 1000
  points:
  - Безособові конструкції на -но/-то (досліджено, встановлено, зафіксовано) як засіб
    відстороненого опису фактів згідно з §4.3.3.1 Державного стандарту.
  - Пасивний стан та дієприкметники (§4.1.3.1 Стандарту) для акцентування на об'єкті
    дослідження, а не на суб'єкті дії («процес контролюється»).
  - 'Баланс між пасивом та активною агентністю: тенденція сучасної української науки
    до використання активного стану («дослідники виявили» замість «було виявлено»).'
  - 'Імперсонал у технічних інструкціях: вживання конструкцій «необхідно перевірити»,
    «слід підключити» для надання чітких вказівок.'
- section: Типологія та структура технічних текстів (Typology & Structure of Technical
    Texts)
  words: 800
  points:
  - 'Структура наукового звіту за міжнародною моделлю IMRD: Вступ (Introduction),
    Методи (Methods), Результати (Results) та Дискусія (Discussion).'
  - 'Особливості користувацьких інструкцій: логічна послідовність дій, нумеровані
    списки та лаконічність формулювань.'
  - 'Формальна структура патентної заявки: специфіка юридично-технічної мови та жорсткі
    вимоги до опису винаходу.'
  - 'Номіналізація: перетворення дієслів на іменники (аналізувати -> аналіз) для підвищення
    щільності інформації в тексті.'
- section: 'Практика: Трансформація та редагування (Practice: Transformation & Editing)'
  words: 600
  points:
  - 'Виправлення типових помилок (кальк): заміна суржикових висловів (брати участь
    замість приймати участь, є прикладом замість являється прикладом).'
  - 'Корекція прийменникових конструкцій у технічному контексті: вживання «за результатами»
    (не по результатам) та «за умови» (не при умові).'
  - 'Трансформація тексту: перетворення розмовного опису побутового процесу на формальний
    технічний опис з використанням вивченої граматики.'
focus: grammar
pedagogy: TTT
objectives:
- Learner can recognize and produce technical/scientific register
- Learner can read and understand technical documentation
- Learner can write step-by-step instructions
- Learner can transform casual descriptions into technical style
grammar:
- Passive constructions in technical texts
- Impersonal constructions (-но/-то)
- Numbered procedures and instructions
- Abbreviations and acronyms
phase: B2.1c [Register System & Domain Vocab]
vocabulary_hints:
  required:
  - термін (term) — технічний термін, визначення терміна; ключова одиниця наукового
    стилю
  - процес (process) — технологічний процес, автоматизація процесу; вживається для
    опису послідовних змін
  - аналіз (analysis) — детальний аналіз, аналіз даних; основа наукового методу дослідження
  - дослідження (research) — наукове дослідження, результати дослідження; вживається
    з дієсловом «проводити»
  - метод (method) — метод вимірювання, ефективний метод; потребує чіткого опису в
    розділі «Методи»
  recommended:
  - синтез (synthesis) — хімічний синтез, синтез мовлення; поєднання елементів у єдине
    ціле
  - поняття (concept) — ключове поняття, визначити поняття; важливо уникати «підміни
    понять»
  - об'єкт (object) — об'єкт дослідження; те, на що спрямована пізнавальна діяльність
  - зрештою (eventually/after all) — вставне слово для підбиття підсумків замість
    кальки «в кінці кінців»
  - брати участь (to participate) — правильна дієслівна сполука замість калькованого
    «приймати участь»
