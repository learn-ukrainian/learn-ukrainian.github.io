module: b2-49
level: B2
sequence: 49
slug: idioms-body-head-face
version: '2.0'
title: 'Соматичні фразеологізми: Голова та обличчя'
subtitle: Idioms about Head and Face
content_outline:
- section: 'Вступ: Голова як семантичний центр (Introduction: Head as a Semantic Center)'
  words: 600
  points:
  - 'Концепт голови в українській мові: поєднання інтелекту (світла голова), емоцій
    (гаряча голова) та лідерства (голова зборів)'
  - 'Вимоги Державного стандарту (§4.4.1.2): використання фразеологізмів як стилістичного
    засобу для збагачення мовлення рівня B2'
  - 'Персона Портретиста: сприйняття фразеологізмів як рис обличчя, що формують характер
    персонажа'
- section: Культурний код та етимологія (Cultural Code and Etymology)
  words: 850
  points:
  - 'Історія виразу «водити за ніс»: ярмаркові ведмеді та повний контроль через фізичний
    біль як метафора маніпуляції'
  - 'Сакральність покриття голови в традиції: від весільного «покривання» до фразеологізму
    «опростоволоситися» (зганьбитися)'
  - 'Сучасна інтеграція концепту «втратити обличчя»: перехід від східної філософії
    до українського офіційно-ділового та бюрократичного стилів'
- section: 'Майстерня фразеології: Голова та очі (Idiom Workshop: Head and Eyes)'
  words: 950
  points:
  - 'Аналіз ідіом про голову: «мати голову на плечах» (розум), «як сніг на голову»
    (раптовість), «вішати голову» (відчай)'
  - 'Помилка інтерференції: заміна російської кальки «кидатися в очі» на нормативний
    український варіант «впадати в око»'
  - 'Високочастотні колокації з «око»: «замилювати очі» (обманювати), «краєм ока»
    (неуважно), «хоч око виколи» (темрява)'
- section: 'Аналіз помилок: Носи, вуха та прийменники (Error Analysis: Noses, Ears
    and Prepositions)'
  words: 800
  points:
  - 'Диференціація схожих значень: «ламати голову» (думати) vs. «морочити голову»
    (набридати/обманювати) — вправа на розрізнення'
  - 'Соматизми «ніс» та «вухо»: «задирати носа» (пиха), «розвісити вуха» (довірливість),
    «пропустити повз вуха» (ігнорування)'
  - 'Граматична корекція: заміна калькованого «сміятися над кимось» на нормативне
    «сміятися з когось» у контексті іронічних ідіом'
- section: Практичний синтез та творча продукція (Practical Synthesis and Creative
    Production)
  words: 800
  points:
  - 'Створення лінгвістичного портрета: опис видатної особистості або знайомого, використовуючи
    мінімум 5 вивчених соматизмів'
  - 'Регістри вживання: поділ ідіом на книжні (втратити обличчя) та розмовні (водити
    за ніс, задирати носа)'
  - 'Підготовка до M50: порівняння функцій «голови» (мислення) та майбутніх тем «рук
    і ніг» (дія та рух) у фразеології'
focus: phraseology
pedagogy: CBI
objectives:
- Learner can recognize and interpret 8 core Ukrainian somatic idioms about head and
  face
- Learner can distinguish literal vs figurative meanings of body-related idioms
- Learner can use head/face idioms appropriately in context with correct register
grammar:
- Fixed expressions (фразеологічні одиниці)
- Idiom structure and variation
immersion: 100
register: varies
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - світла голова (bright mind) — про розумну, розсудливу людину; висока частотність
  - впадати в око (to catch the eye) — правильно вживати замість кальки 'кидатися
    в очі'
  - водити за ніс (to lead by the nose) — обманювати, давати пусті обіцянки; розмовний
    стиль
  - замилювати очі (to pull the wool over someone's eyes) — створювати хибне враження;
    часто у формальному контексті
  - втратити обличчя (to lose face) — втратити авторитет, репутацію; книжний/діловий
    стиль
  recommended:
  - опростоволоситися (to make a fool of oneself) — зробити грубу помилку, зганьбитися
    (культурний контекст)
  - нашорошити вуха (to prick up one's ears) — уважно прислухатися; метафора обережності
  - морочити голову (to mess with someone's head) — дурити або набридати; не плутати
    з 'ламати голову'
  - не в бров, а в око (hit the nail on the head) — сказати або зробити щось дуже
    влучно
  - сміятися з когось (to laugh at someone) — правильне прийменникове керування
