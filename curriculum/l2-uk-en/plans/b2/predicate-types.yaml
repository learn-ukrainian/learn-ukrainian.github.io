module: predicate-types
level: B2
sequence: 12
version: '1.3'
title: "Типи присудків"
subtitle: "Типи присудків: прості та складені конструкції"
focus: grammar
pedagogy: PPP
objectives:
  - "Глибоке розуміння структури та функцій простого дієслівного присудка."
  - "Засвоєння особливостей творення та вживання складеного дієслівного присудка (модальні
    дієслова + інфінітив)."
  - "Мастерне володіння структурою складеного іменного присудка (дієслово-зв'язка
    + іменна частина)."
  - "Розрізнення складних випадків узгодження присудка з підметом, вираженим словосполученням."
  - "Аналіз стилістичного потенціалу різних типів присудків у текстах різних жанрів."

reading_situations:
  - source_type: "філософський есе"
    topic: "Буття та становлення особистості в сучасному світі"
    key_elements: ["бути (to be) людиною", "прагнути (to strive) стати", "здаватися
          (to seem) іншим", "стати (to become) собою"]
    motivation: "Есеїстика багата на складені іменні та дієслівні присудки, що дозволяє
      студентам бачити їхню роль у вираженні станів та прагнень."
  - source_type: "інструкція з експлуатації"
    topic: "Правила безпеки при роботі з електроприладами"
    key_elements: ["необхідно (necessary) вимкнути", "забороняється (forbidden) торкатися",
      "слід (should) перевірити"]
    motivation: "Демонстрація функціонування складених дієслівних присудків в імперативному
      та регулятивному контексті."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Бесіда з успішним підприємцем про плани на майбутнє"
    focus_points: ["використання дієслів 'планувати', 'хотіти', 'мати намір'", "опис
          поточного стану через складні присудки"]
    motivation: "Сприйняття на слух природних розмовних конструкцій, що виражають
      модальність та стан."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть есе на тему 'Моя ідеальна кар'єра: ким я хочу бути і чого прагну
      досягти'. Використовуйте різноманітні типи присудків для опису своїх мрій, якостей
      та необхідних дій."
    requirements:
      - "мінімум 250 слів"
      - "використати щонайменше 3 складені дієслівні присудки"
      - "використати щонайменше 3 складені іменні присудки"
      - "продемонструвати правильне узгодження в складних випадках"
    motivation: "Синтез граматичних знань про типи присудків у контексті особистого
      планування та самовираження."
    model_answer: "Текст має містити структури типу: «Я хочу стати професіоналом...»,
      «Моя мета — бути корисною суспільству...», «Я маю намір постійно вчитися...».
      Оцінюється граматична правильність та багатство лексики."

discussion_topics:
  - context: "Мова як відображення дії та стану: що важливіше?"
    questions:
      - "Чому в англійській мові ми частіше використовуємо дієслово 'to be', а в українській
        часто опускаємо зв'язку в теперішньому часі?"
      - "Як змінюється зміст речення, якщо замінити простий присудок складеним ('пишу'
        -> 'починаю писати')?"
      - "Який тип присудка найчастіше зустрічається в новинах?"
    motivation: "Обговорення семантичних відтінків модальності, фазовості та стану."

content_outline:
  - section: "Простий дієслівний присудок: межі та можливості"
    words: 800
    subsections:
      - "Морфологічне вираження: дієслово в особовій формі"
      - "Випадки, коли простий присудок складається з кількох слів (майбутній час,
        фразеологізми)"
      - "Узгодження з підметом у роді та числі"
    key_concepts:
      - "особова форма"
      - "фразеологічний присудок"
      - "динаміка дії"
  - section: "Складений дієслівний присудок: модальність та фазовість"
    words: 800
    subsections:
      - "Структура: допоміжне дієслово + інфінітив"
      - "Значення фази (початок, продовження, кінець дії)"
      - "Значення модальності (можливість, бажання, необхідність)"
    key_concepts:
      - "допоміжне слово"
      - "інфінітив"
      - "фазовість"
  - section: "Складений іменний присудок: вираження якості та стану"
    words: 800
    subsections:
      - "Структура: дієслово-зв'язка + іменна частина (іменник, прикметник, числівник)"
      - "Типи зв'язок: бути, ставати, здаватися, вважатися"
      - "Нульова зв'язка в теперішньому часі та її особливості"
    key_concepts:
      - "дієслово-зв'язка"
      - "іменна частина"
      - "предикативність"
  - section: "Складні випадки узгодження присудка з підметом"
    words: 800
    subsections:
      - "Підмет виражений кількісно-іменним сполученням (багато людей, троє друзів)"
      - "Підмет виражений абревіатурою чи невідмінюваним словом"
      - "Узгодження при наявності прикладки (директор Іванова сказала vs директор
        Іванова сказав)"
    key_concepts:
      - "синтаксичне узгодження"
      - "кількісне сполучення"
      - "граматична норма"
  - section: "Стилістичний потенціал присудка в різних реєстрах"
    words: 800
    subsections:
      - "Номінативний стиль офіційних документів: переважання іменних присудків"
      - "Динамічний стиль художньої оповіді: сила простого дієслівного присудка"
      - "Аналіз тексту: трансформація типів присудків для зміни акцентів"
    key_concepts:
      - "номіналізація"
      - "стилістична трансформація"
      - "акцентування"

word_target: 4000

vocabulary:
  required:
    - простий присудок
    - складений дієслівний присудок
    - складений іменний присудок
    - дієслово-зв'язка
    - інфінітив
    - допоміжне дієслово
    - узгодження
    - модальність
  recommended:
    - фазовість
    - предикативність
    - прикладка
    - абревіатура
    - контекст

activities:
  types_required:
    - select
    - match-up
    - fill-in
    - error-correction
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: group-sort
    focus: "Розподілити присудки за типами: простий дієслівний / складений дієслівний
      / складений іменний"
  - type: fill-in
    focus: "Доповнити речення відповідним типом присудка (зв'язка + іменна частина
      або модальне + інфінітив)"
  - type: select
    focus: "Визначити тип присудка в наведених реченнях"
  - type: error-correction
    focus: "Виправити помилки в узгодженні присудка з підметом (кількісні сполучення,
      абревіатури)"

references:
  - source: "Заболотний, 9 клас (2017)"
    pages: "§4–6"
    topic: "Головні члени речення: підмет і присудок, типи присудків"
  - source: "Авраменко, 9 клас (2017)"
    pages: "§4–6"
    topic: "Простий та складений присудок"
  - source: "State Standard 2024"
    pages: "B2, SS 4.3"
    topic: "Syntax — sentence members"

connects_to:
  previous: "phrases-word-combinations"
  next: "secondary-sentence-members"

