module: b2-12
level: B2
sequence: 12
slug: predicate-types
version: '2.0'
title: Типи присудків
subtitle: 'Predicate Types: Simple, Compound Verbal, Compound Nominal'
content_outline:
- section: 'Вступ: Присудок як організаційний центр речення (Introduction: The Predicate
    as the Organizational Centre of the Sentence)'
  words: 500
  points:
  - 'Визначення присудка згідно з Держстандартом §4.3.2: головний член речення, що повідомляє
    про дію, стан або ознаку підмета'
  - 'Роль присудка у формуванні предикативності: зв''язок із категоріями часу, способу
    та особи'
  - 'Огляд трьох типів присудка: простий дієслівний, складений дієслівний, складений
    іменний — логіка класифікації'
- section: Простий дієслівний присудок (Simple Verbal Predicate)
  words: 800
  points:
  - 'Визначення та основні форми: один дієслівний компонент у будь-якій особовій формі,
    способі чи часі (напр., «Учні працюють», «Україна розвивається»)'
  - 'Ускладнені форми простого присудка: фразеологічні присудки (напр., «взяв та й пішов»,
    «знай собі працює») та їхня неподільна семантика'
  - 'Аналітичні форми: майбутній час недоконаного виду (напр., «буду читати») як простий
    присудок, а не складений — логіка граматичної неподільності'
  - 'Контрастивний аналіз: чому англійська аналітична форма «I will read» не є аналогом
    складеного присудка'
- section: Складений дієслівний присудок (Compound Verbal Predicate)
  words: 800
  points:
  - 'Структура: допоміжне дієслово (фазове або модальне) + інфінітив основного дієслова
    (напр., «почав читати», «може працювати», «хоче вчитися»)'
  - 'Фазові дієслова: початок, продовження, завершення дії (напр., «почав», «продовжував»,
    «закінчив», «перестав»)'
  - 'Модальні дієслова: можливість, бажання, намір (напр., «може», «хоче», «мусить»,
    «повинен», «здатний»)'
  - 'Типова помилка: помилкове виділення складеного присудка лише з допоміжним дієсловом
    без урахування інфінітива як невід''ємної частини'
- section: Складений іменний присудок (Compound Nominal Predicate)
  words: 900
  points:
  - 'Структура: дієслово-зв''язка + іменна частина (іменник, прикметник, числівник, займенник,
    дієприкметник, прислівник) (напр., «Небо було блакитним», «Він є студентом»)'
  - 'Нульова зв''язка у теперішньому часі: специфіка української мови (напр., «Книга
    — цікава» замість «Книга є цікава») та її стилістичне використання'
  - 'Напівзв''язки: дієслова «стати», «залишатися», «виявитися», «здаватися», «вважатися»
    як засоби вираження зміни чи оцінки стану (напр., «Він став лікарем»)'
  - 'Відмінність від простого присудка: критерій розчленованості — «Він працює лікарем»
    (простий, бо «лікарем» — обставина) vs «Він є лікар» (складений іменний)'
- section: Практика та розмежування типів (Practice and Disambiguation)
  words: 1000
  points:
  - 'Алгоритм визначення типу присудка: покрокова інструкція від ідентифікації предикативного
    центру до класифікації'
  - 'Трансформаційні вправи: перетворення одного типу присудка на інший для зміни стилістичного
    ефекту (напр., «Він розумний» → «Він виявився розумним» → «Він розуміє»)'
  - 'Аналіз автентичних текстів: визначення типів присудків у науковому та публіцистичному
    стилях із обґрунтуванням класифікації'
  - 'Типові помилки: змішування складеного дієслівного та складеного іменного присудків
    (напр., «Він став працювати» — складений дієслівний, не іменний)'
  - 'Підготовка до модуля b2-13: зв''язок типу присудка з визначенням другорядних членів
    речення'
focus: grammar
pedagogy: TTT
prerequisites:
- b2-11 (Phrases Word Combinations)
connects_to:
- b2-13 (Secondary Sentence Members)
objectives:
- Learner can identify and classify three types of predicates in Ukrainian sentences
- Learner can distinguish compound verbal from compound nominal predicates
- Learner can recognize null copula constructions specific to Ukrainian
- Learner can transform predicate types for stylistic variation
grammar:
- Простий дієслівний присудок
- Складений дієслівний присудок (модальні та фазові дієслова + інфінітив)
- Складений іменний присудок (зв'язка + іменна частина)
- Нульова зв'язка у теперішньому часі
register: науковий
phase: B2.2 [Syntax Mastery]
vocabulary_hints:
  required:
  - присудок (predicate) — головний член речення, що характеризує підмет за дією або
    ознакою
  - підмет (subject) — головний член речення, що називає діяча або носія ознаки
  - зв'язка (copula) — допоміжне дієслово у складеному іменному присудку (бути, стати)
  - інфінітив (infinitive) — неозначена форма дієслова як компонент складеного присудка
  - модальне дієслово (modal verb) — дієслово, що виражає можливість, бажання, необхідність
  - фазове дієслово (phasal verb) — дієслово на позначення початку, продовження, завершення
    дії
  - предикативність (predicativity) — граматичне значення, що формує речення
  - іменна частина (nominal part) — іменний компонент складеного іменного присудка
  recommended:
  - розчленованість (divisibility) — критерій відрізнення складеного від простого присудка
  - напівзв'язка (semi-copula) — дієслово зі зміненим значенням (стати, залишатися,
    здаватися)
  - предикативний центр (predicative centre) — граматична основа речення (підмет + присудок)
  - аналітична форма (analytical form) — складена граматична форма (буду читати)
  - нульова зв'язка (null copula) — пропуск дієслова-зв'язки у теперішньому часі
