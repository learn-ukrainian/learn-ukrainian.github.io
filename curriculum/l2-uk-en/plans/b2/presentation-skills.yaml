module: b2-085
level: B2
sequence: 85
slug: presentation-skills
version: '1.0'
title: "Мистецтво презентації: від структури до переконання"
subtitle: "Мистецтво презентації: від структури до переконання"
focus: professional
pedagogy: TTT
word_target: 4000
phase: "B2.8 [Communication Skills & Capstone]"
# MERGE of: presentation-skills-basics + presentation-skills-advanced
objectives:
  - "Навчитися планувати, структурувати та виголошувати публічний виступ українською."
  - "Опанувати техніки ефективного початку, завершення та переходів між слайдами."
  - "Розвинути навички переконання, сторітеллінгу та роботи з аудиторією."
  - "Вдосконалити навички відповідей на складні запитання (Q&A)."

reading_situations:
  - source_type: "стенограма виступу"
    topic: "Стенограма пітчингу українського стартапу перед інвесторами."
    key_elements: ["методи переконання", "сторітеллінг", "заклик до дії"]
    motivation: "Аналіз риторичних прийомів у реальному виступі."
  - source_type: "методичні рекомендації"
    topic: "Покроковий алгоритм підготовки ефективної презентації."
    key_elements: ["аналіз аудиторії", "фрази-переходи", "візуалізація"]
    motivation: "Ознайомлення з інструктивним текстом."

listening_situations:
  - media_type: "відео"
    setting: "Виступ на TEDxKyiv про інновації в освіті."
    focus_points: ["структура промови", "storytelling", "взаємодія з
          аудиторією", "впевненість доповідача"]
    motivation: "Аналіз успішних прикладів публічних виступів."

writing_tasks:
  - task_type: "сценарій промови"
    prompt: "Напишіть сценарій 5-хвилинної презентації: 1) захист екологічного
      проєкту перед міською радою або 2) пітч стартапу перед інвесторами."
    requirements:
      - "мінімум 300 слів"
      - "чітка структура: гачок, теза, аргументація, заклик до дії"
      - "фрази-переходи між блоками"
      - "емоційний приклад (story)"
    motivation: "Тренування переконливого ділового мовлення."
    model_answer: "Промова має бути динамічною: 'Уявіть: місто без смогу.
      Це не утопія — це реальний проєкт. По-перше, ми пропонуємо... Подумайте:
      хіба ми не заслуговуємо на чисте повітря?'"

discussion_topics:
  - context: "Публічний виступ: страх та натхнення."
    questions:
      - "Як подолати страх публічного виступу?"
      - "Яка різниця між маніпуляцією та переконанням?"
    motivation: "Обмін досвідом та стратегіями."

dialogue_situations:
  - setting: "Після презентації доповідач відповідає на запитання аудиторії."
    roles: ["доповідач", "слухач"]
    key_phrases: ["дякую за запитання", "дозвольте уточнити",
      "мені потрібно додатково перевірити ці дані"]
  - setting: "Колега репетирує презентацію, інший дає зворотний зв'язок."
    roles: ["доповідач", "слухач-критик"]
    key_phrases: ["вступ трохи затягнутий", "додай більше цифр",
      "сильний фінал, але середина провисає"]

content_outline:
  - section: "Планування та структура виступу"
    words: 1000
    subsections:
      - "Визначення мети: інформувати, переконати чи надихнути?"
      - "Аналіз аудиторії: як підлаштувати мову та зміст"
      - "Композиція: вступ, основна частина, кульмінація, висновки"
      - "Ефективний початок: типи гачків (hooks) та їхні функції"
    key_concepts:
      - "структурування"
      - "цільова аудиторія"
      - "таймінг"
  - section: "Мовні засоби та візуалізація"
    words: 1000
    subsections:
      - "Фрази-переходи: 'перейдемо до...', 'звертаю увагу на...'"
      - "Маркери акцентування: 'головне', 'підкреслюю', 'зверніть увагу'"
      - "Коментування графіків та таблиць у реальному часі"
      - "Правила оформлення слайдів: текст vs візуальні образи"
    key_concepts:
      - "конектори"
      - "візуалізація"
      - "лаконічність"
  - section: "Переконання та сторітеллінг"
    words: 1000
    subsections:
      - "Аристотелівська тріада: Етос, Патос, Логос"
      - "Сторітеллінг: структура 'Подорожі героя' у короткому виступі"
      - "Метафори та аналогії для пояснення складних концепцій"
      - "Сильний фінал: Call to Action та резюмування"
    key_concepts:
      - "аргументація"
      - "харизма"
      - "наратив"
  - section: "Робота з аудиторією та Q&A"
    words: 1000
    subsections:
      - "Класифікація запитань: уточнюючі, критичні, провокативні"
      - "Метод 'Мосту' (Bridging): повернення до своєї тези"
      - "Як визнати нестачу інформації, не втративши авторитет"
      - "Невербальна комунікація: жести, зоровий контакт, управління голосом"
    key_concepts:
      - "полеміка"
      - "компетентність"
      - "невербаліка"

vocabulary_hints:
  - word: "презентація"
    translation: "presentation"
    context: "Презентація проєкту перед інвесторами."
  - word: "аудиторія"
    translation: "audience"
    context: "Аналіз аудиторії — перший крок."
  - word: "аргумент"
    translation: "argument"
    context: "Підкріпіть аргумент фактами."
  - word: "переконання"
    translation: "persuasion"
    context: "Мистецтво переконання — основа риторики."
  - word: "доповідь"
    translation: "report, presentation"
    context: "Доповідь тривала двадцять хвилин."
  - word: "структура"
    translation: "structure"
    context: "Чітка структура — запорука успіху."
  - word: "сторітеллінг"
    translation: "storytelling"
    context: "Сторітеллінг робить презентацію живою."
  - word: "харизма"
    translation: "charisma"
    context: "Харизма доповідача захоплює увагу."
  - word: "риторика"
    translation: "rhetoric"
    context: "Риторика — давнє мистецтво переконання."
  - word: "заперечення"
    translation: "objection"
    context: "Як працювати із запереченнями аудиторії."
  - word: "компетенція"
    translation: "competence"
    context: "Демонструйте свою компетенцію через факти."
  - word: "імпровізація"
    translation: "improvisation"
    context: "Імпровізація потрібна для Q&A сесії."
  - word: "красномовство"
    translation: "eloquence"
    context: "Красномовство розвивається з практикою."
  - word: "лаконічний"
    translation: "concise, laconic"
    context: "Будьте лаконічними — час обмежений."
  - word: "переконливий"
    translation: "convincing"
    context: "Переконливий виступ підкріплений фактами."
  - word: "наочний"
    translation: "visual, illustrative"
    context: "Наочні матеріали підсилюють виступ."

activities:
  types_required:
    - unjumble
    - fill-in
    - essay-response
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте текст про планування та структура виступу і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про мовні засоби та візуалізація, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Планування та структура виступу». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему планування та структура виступу."

references:
  - source: "Авраменко, 11 клас (2019)"
