    topic: "Публічний виступ та ораторське мистецтво"
  - source: "Ворон, 11 клас (2019)"
    pages: "Академічне красномовство"
    topic: "Красномовство та риторика"
  - source: "Глазова, 11 клас (2019)"
    pages: "§1–10"
    topic: "Культура мовлення"
  - source: "Державний стандарт 2024"
