module: b2-084
level: B2
sequence: 84
slug: news-analysis
version: 1.0.1
title: 'Аналіз новин: від структури до критичного мислення'
subtitle: 'Аналіз новин: від структури до критичного мислення'
focus: professional
pedagogy: TTT
word_target: 4000
phase: B2.7 [Idioms, Neologisms & Professional Communication]
objectives:
- Вивчити структуру новинного повідомлення та основні інформаційні жанри.
- Опанувати лексику українського медіа-простору.
- Розвинути навички критичного оцінювання джерел та виявлення маніпуляцій.
- Навчитися порівняльного аналізу висвітлення подій різними виданнями.
reading_situations:
- source_type: стрічка новин
  topic: 'Добірка новин з українських ЗМІ: аналіз структури та мовних засобів.'
  key_elements:
  - перевернута піраміда
  - цитування джерел
  - диференціація фактів та суджень
  motivation: Розуміння інформаційного стилю.
- source_type: авторська колонка
  topic: 'Геополітична стаття: суб''єктивний погляд та засоби переконання.'
  key_elements:
  - аргументація
  - риторичні прийоми
  - фреймінг
  motivation: Аналіз суб'єктивності та засобів впливу.
listening_situations:
- media_type: відео
  setting: Випуск вечірніх новин та суспільно-політичний подкаст.
  focus_points:
  - інтонація ведучого
  - структура сюжету
  - абревіатури (ОДА, Кабмін, ВРУ)
  motivation: Тренування сприйняття медійного мовлення.
writing_tasks:
- task_type: аналітична записка
  prompt: Порівняйте висвітлення однієї події двома різними українськими медіа. Визначте маніпулятивні прийоми та упередженість
    кожного.
  requirements:
  - мінімум 300 слів
  - конкретні приклади з обох текстів
  - визначення фреймінгу та евфемізмів
  motivation: Перевірка навичок критичного аналізу медіа.
  model_answer: Записка має містити порівняльний аналіз із цитатами з обох джерел та висновком про об'єктивність кожного.
discussion_topics:
- context: Фейкові новини та відповідальність споживача контенту.
  questions:
  - Чому фейки поширюються швидше за правдиві новини?
  - Як перевірити інформацію за п'ять хвилин?
  motivation: Обговорення медіаграмотності.
dialogue_situations:
- setting: 'Журналіст бере інтерв''ю у експерта: офіційні та провокативні запитання.'
  roles:
  - журналіст
  - експерт
  key_phrases:
  - яка ваша оцінка ситуації?
  - чи можете ви підтвердити?
  - а як щодо альтернативної версії?
content_outline:
- section: Анатомія новини та інформаційні жанри
  words: 1000
  subsections:
  - 'Заголовок, лід, корпус тексту: правило перевернутої піраміди'
  - 'Інформаційні жанри: замітка, репортаж, інтерв''ю'
  - 'Мова українських медіа: абревіатури, кліше, дієслова активної дії'
  - Джерела та первинна верифікація фактів
  key_concepts:
  - інфопривід
  - лаконічність
  - верифікація
- section: Механізми медіа-впливу
  words: 1000
  subsections:
  - 'Фреймінг: мистецтво подачі інформації під кутом'
  - 'Евфемізми та дисфемізми: пом''якшення або загострення реальності'
  - 'Порядок денний (agenda-setting): як медіа вирішують, про що думати'
  - Оцінна лексика та мовні засоби переконання
  key_concepts:
  - фреймінг
  - наратив
  - оцінна лексика
- section: Анатомія пропаганди та фактчекінг
  words: 1000
  subsections:
  - 'Класичні прийоми: навішування ярликів, перенесення, свідчення'
  - 'Дезінформація vs місінформація: різниця та механізми'
  - 'Інструменти верифікації: пошук за зображенням, метадані, OSINT'
  - Мова ворожнечі та методи її нейтралізації
  key_concepts:
  - дезінформація
  - фактчекінг
  - критичний аналіз
- section: Етика журналістики та медіаграмотність
  words: 1000
  subsections:
  - Кодекс етики українського журналіста
  - Клікбейт, джинса та конфлікт інтересів
  - Відповідальність споживача за поширення неперевіреної інформації
  - 'Соціальні мережі як нове медіа: ехо-камери та інформаційні бульбашки'
  key_concepts:
  - журналістська етика
  - медіаграмотність
  - відповідальність
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary_hints:
- word: новина
  translation: news
  context: Головна новина дня.
- word: джерело
  translation: source
  context: Перевіряйте джерело інформації.
- word: репортаж
  translation: report, coverage
  context: Репортаж з місця подій.
- word: подія
  translation: event
  context: Подія привернула увагу ЗМІ.
- word: пропаганда
  translation: propaganda
  context: Розпізнавання пропаганди — важливий навик.
- word: маніпуляція
  translation: manipulation
  context: Маніпуляція через мовні засоби.
- word: упередженість
  translation: bias
  context: Упередженість автора видно в підборі фактів.
- word: фейк
  translation: fake (news)
  context: Фейк поширився соціальними мережами.
- word: верифікація
  translation: verification
  context: Верифікація фактів — обов'язок журналіста.
- word: наратив
  translation: narrative
  context: Наратив статті формує думку читача.
- word: спростування
  translation: refutation, debunking
  context: Офіційне спростування фейку.
- word: клікбейт
  translation: clickbait
  context: Клікбейт-заголовки маніпулюють увагою.
- word: висвітлювати
  translation: to cover (media)
  context: ЗМІ висвітлюють подію по-різному.
- word: оприлюднити
  translation: to make public
  context: Результати оприлюднили вчора.
- word: ангажований
  translation: biased, partial
  context: Ангажоване видання подає одну точку зору.
- word: резонансний
  translation: high-profile
  context: Резонансна справа привернула увагу.
activities:
  types_required:
  - critical-analysis
  - reading
  - fill-in
  - select
  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: reading
  focus: Прочитайте текст про анатомія новини та інформаційні жанри і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про механізми медіа-впливу, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Анатомія новини та інформаційні жанри». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему анатомія новини та інформаційні жанри.
references:
