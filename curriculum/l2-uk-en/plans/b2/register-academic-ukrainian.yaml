title: Науковий стиль української мови
content_outline:
- section: Вступ — Науковий стиль
  points:
  - 'Характерні риси наукового стилю — cultural hook: The ''Executed Renaissance''
    of Terminology (1920s-30s) created pure Ukrainian terms (e.g., тяжіння for gravity)
    before Soviet russification'
  - Підстилі (власне науковий, навчально-науковий, науково-популярний)
  - 'Де зустрічаємо науковий стиль — State Standard Reference §1.2.1.1: transitioning
    from general understanding to active analysis'
- section: Лексичні особливості
  points:
  - 'Загальнонаукова лексика — collocation: актуальність теми (relevance of the topic)
    as a key indicator'
  - 'Термінологія — cultural hook: Ivan Puliui as a creator of Ukrainian physical
    terminology (pre-dating Röntgen)'
  - Абстрактні іменники
  - 'Уникання емоційності — content note: Explicitly contrast a ''Kitchen Table Explanation''
    vs ''Academic Definition'' of the same concept (e.g., ''Water'')'
- section: Граматичні особливості
  points:
  - 'Безособові конструкції (досліджено, виявлено) — learner error: ''Passive'' Voice
    Abuse (e.g., ''Робота була зроблена'' instead of ''Роботу виконано'')'
  - 'Пасивні конструкції — learner error: Active Participle Calques from Russian (e.g.,
    ''домінуючий фактор'' instead of ''панівний фактор'')'
  - 'Складні речення — content note: Introduce the ''chain of genitives'' (ланцюжок
    родових відмінків) as a feature to be understood but controlled'
  - Дієприслівникові звороти
- section: Мовне хеджування
  points:
  - 'Вираження невпевненості (можливо, ймовірно) — content note: Emphasize that categorical
    statements look ''unscientific'' in Ukrainian'
  - Обережні твердження
  - 'Посилання на джерела — collocation: робити посилання (to make a reference)'
  - Уникання категоричності
- section: Цитування та посилання
  points:
  - Пряме цитування
  - Непряме цитування
  - 'Формули посилань — collocation: згідно з (according to)'
  - Бібліографічні записи
- section: Структура наукового тексту
  points:
  - Анотація
  - 'Вступ — collocation: обґрунтувати актуальність (substantiate relevance)'
  - 'Основна частина — collocation: об''єкт/предмет дослідження (object/subject of
    research)'
  - 'Висновки — collocation: дійти висновку (to come to a conclusion), робити висновки
    (to draw conclusions)'
- section: Практика і підсумок
  points:
  - Аналіз наукових текстів
  - 'Написання академічних текстів — learner error: Collocation errors like ''приймати
    участь'' instead of ''брати участь'''
  - Підготовка до модуля 19
vocabulary_hints:
  required:
  - науковий стиль (scientific style)
  - 'термін (term) — cultural hook: 1920s ''Executed Renaissance'' of pure Ukrainian
    terminology'
  - 'дослідження (research) — collocations: проводити ~, ґрунтовне ~, результати ~'
  - 'гіпотеза (hypothesis) — collocations: висувати ~у, підтвердити ~у, спростувати
    ~у'
  - 'висновок (conclusion) — collocations: дійти ~у, робити ~, на підставі ~ів'
  - 'аналіз (analysis) — collocations: здійснювати ~, глибокий ~, порівняльний ~'
  - 'методологія (methodology) — collocations: наукова ~, застосування ~ї, ~ дослідження'
  - цитування (citation)
  - 'посилання (reference) — collocations: робити ~, згідно з ~м, навести ~'
  - анотація (abstract)
  recommended:
  - 'хеджування (hedging) — key concept: avoiding categorical statements (можливо,
    ймовірно)'
  - об'єктивність (objectivity)
  - аргументація (argumentation)
  - інтерпретація (interpretation)
  - синтез (synthesis)
  - 'актуальність (relevance) — collocations: ~ теми, втрачати ~, обґрунтувати ~'
  - 'об''єкт (object) — collocations: ~ дослідження, визначити ~'
  - 'предмет (subject) — collocations: ~ дослідження'
