module: b2-021
level: B2
sequence: 21
slug: checkpoint-syntax-i
version: 1.0.2
title: 'Контрольний модуль: Синтаксис I (просте речення)'
subtitle: 'Підсумковий контроль: просте ускладнене речення'
focus: checkpoint
pedagogy: review
word_target: 4000
phase: B2.1 [Participles & Sentence Structure]
objectives:
- Систематизувати знання про словосполучення, присудок та другорядні члени 
  речення.
- Перевірити вміння вживати однорідні та відокремлені члени речення.
- Оцінити пунктуаційну грамотність у простому ускладненому реченні.
- Продемонструвати вміння аналізувати синтаксичну будову простого речення.
reading_situations:
- source_type: аналітичний текст
  topic: 'Аналітична стаття з великою кількістю ускладнених конструкцій: відокремлені
    означення, уточнення, вставні слова.'
  key_elements:
  - відокремлені члени
  - вставні конструкції
  - однорідні члени з узагальнювальними словами
  motivation: Перевірка розуміння складного тексту з ускладненим синтаксисом.
listening_situations:
- media_type: відео
  setting: Науково-популярна лекція з частим вживанням вставних слів та 
    відокремлених зворотів.
  focus_points:
  - розпізнавання інтонаційних пауз
  - ідентифікація вставних слів
  - однорідні ряди
  motivation: Оцінка навичок слухового сприйняття ускладнених конструкцій.
writing_tasks:
- task_type: есе
  prompt: Напишіть розгорнутий опис улюбленого міста з використанням однорідних 
    членів, відокремлених означень та вставних слів.
  requirements:
  - мінімум 300 слів
  - щонайменше 5 однорідних рядів
  - щонайменше 3 відокремлені конструкції
  - бездоганна пунктуація
  motivation: Перевірка продуктивних навичок ускладненого синтаксису.
  model_answer: Текст має демонструвати синтаксичне різноманіття та правильну 
    пунктуацію.
discussion_topics:
- context: 'Рефлексія: які синтаксичні конструкції простого речення найкорисніші?'
  questions:
  - Яка тема була найскладнішою?
  - Як відокремлення змінює сприйняття тексту?
  motivation: Самооцінка навчального прогресу.
content_outline:
- section: Словосполучення та типи присудка
  words: 1000
  subsections:
  - 'Типи словосполучень: узгодження, керування, прилягання'
  - 'Простий та складений присудок: іменний та дієслівний'
  - 'Синтаксична синоніміка: варіативність конструкцій'
  - 'Практикум: синтаксичний розбір простого речення'
  key_concepts:
  - словосполучення
  - присудок
  - синтаксичний зв'язок
- section: Другорядні члени та односкладні речення
  words: 1000
  subsections:
  - 'Означення, додаток, обставина: типи та особливості'
  - 'Односкладні речення: безособові, інфінітивні, називні'
  - 'Неповні речення: еліпсис та контекстуальність'
  - 'Пунктуація в простому реченні: основні правила'
  key_concepts:
  - другорядний член
  - односкладне речення
  - еліпсис
- section: Однорідні та відокремлені члени
  words: 1000
  subsections:
  - 'Однорідні члени: сполучники, узагальнювальні слова, пунктуація'
  - 'Відокремлені означення: дієприкметникові звороти'
  - 'Відокремлені обставини: дієприслівникові звороти'
  - Уточнюючі та пояснювальні члени речення
  key_concepts:
  - однорідність
  - відокремлення
  - уточнення
- section: Діагностика та редагування
  words: 1000
  subsections:
  - 'Типові помилки: невірне відокремлення, пропуск ком'
  - 'Вставні слова та речення: як не сплутати з членами речення'
  - Алгоритм синтаксичного розбору
  - 'Редагування тексту: від чернетки до ясності'
  key_concepts:
  - діагностика
  - редагування
  - пунктуаційна норма
- section: Підсумок — Summary
  words: 300
  points:
  - "Phrase connections fall into three types: узгодження, керування, and прилягання.
    Self-check: What is the difference between a простий (simple) and складений (compound)
    predicate? Identify the connection type in 'читати книгу' vs. 'швидко бігати'."
  - 'Simple sentences can be complicated by однорідні (homogeneous) or відокремлені
    (detached) members, requiring specific punctuation. Self-check: When must a дієприкметниковий
    зворот be separated by commas? Formulate a sentence with an introductory word
    (вставне слово) and explain its punctuation.'
  - "One-part sentences (односкладні речення) have only one main member, while incomplete
    sentences (неповні речення) omit words clear from context. Self-check: What is
    the difference between безособове (impersonal) and називне (nominative) sentences?
    Identify the omitted word in the sentence 'Я читаю книгу, а він — журнал'."
vocabulary_hints:
- word: синтаксис
  translation: syntax
  context: Синтаксис вивчає будову речення.
- word: пунктуація
  translation: punctuation
  context: Правильна пунктуація забезпечує ясність.
- word: конструкція
  translation: construction
  context: Синтаксична конструкція визначає зміст.
- word: присудок
  translation: predicate
  context: Присудок — головний член речення.
- word: означення
  translation: attribute (syntax)
  context: Відокремлене означення стоїть після іменника.
- word: обставина
  translation: adverbial modifier
  context: Обставина уточнює дію.
- word: однорідний
  translation: homogeneous
  context: Однорідні члени з'єднуються сполучниками.
- word: відокремлення
  translation: detachment, isolation
  context: Відокремлення виділяється комами.
- word: вставний
  translation: parenthetical
  context: Вставне слово виділяється з обох боків.
- word: уточнення
  translation: specification, clarification
  context: Уточнювальний член звужує значення.
- word: сполучник
  translation: conjunction
  context: Сполучник з'єднує однорідні члени.
- word: кома
  translation: comma
  context: Кома ставиться перед протиставним сполучником.
- word: норма
  translation: norm
  context: Синтаксична норма регулює порядок слів.
- word: редагування
  translation: editing
  context: Редагування тексту потребує уваги.
- word: цілісність
  translation: integrity, coherence
  context: Цілісність тексту забезпечується синтаксисом.
activities:
  types_required:
  - error-correction
  - fill-in
  - reading
  - select
  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: reading
  focus: Прочитайте текст про словосполучення та типи присудка і дайте відповіді
    на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про другорядні члени та 
    односкладні речення, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Словосполучення та
    типи присудка». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    словосполучення та типи присудка.
