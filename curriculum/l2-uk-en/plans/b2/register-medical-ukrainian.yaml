title: 'Медична українська: спілкування у сфері охорони здоров''я'
content_outline:
- section: 'Вступ: Медичний регістр та культура аптеки (Introduction: Medical Register
    and Pharmacy Culture)'
  words: 500
  points:
  - 'Особливості медичної комунікації: баланс між офіційно-діловим стилем (лікар,
    документи) та розмовно-емоційним (тривожність пацієнта).'
  - 'Культура аптеки в Україні: роль фармацевта як напівдіагностичного консультанта
    — аналіз типового запиту «Що у вас є від горла?» перед візитом до лікаря.'
  - Огляд системи Helsi.me як сучасного цифрового обличчя української медицини для
    запису на прийом та перегляду медкарти.
- section: Опис симптомів та відчуттів (Description of Symptoms and Sensations)
  words: 800
  points:
  - 'Граматичний фокус: категорія роду іменника «біль» (чоловічий рід) — протидія
    інтерференції (сильний біль, гострий біль, а не «сильна біль»).'
  - 'Розширена прикметникова синоніміка для опису болю: ниючий, ріжучий, тупий, гострий,
    пульсуючий, розпираючий.'
  - 'Колокації для опису скарг: «відчувати біль», «знімати біль», «скарги пацієнта»
    — відповідність вимогам Держстандарту §3.9.'
  - 'Аналіз інтенсивності та тривалості: лексика для визначення періодичності (нападами,
    постійно, епізодично).'
- section: 'Консультація: Діалог лікар-пацієнт (Consultation: Doctor-Patient Dialogue)'
  words: 900
  points:
  - 'Стандартні запитання лікаря за Держстандартом: «Що вас турбує?», «Як давно це
    почалося?», «Чи є алергія на ліки?».'
  - 'Граматичне розрізнення суб''єктів дії: «лікувати» (перехідне, дія лікаря) vs
    «лікуватися» (зворотне, стан пацієнта) — дриль на правильне вживання.'
  - 'Етапи встановлення діагнозу: колокації «поставити діагноз», «попередній діагноз»,
    «підтвердити діагноз».'
  - 'Моделювання ситуації візиту до сімейного лікаря (терапевта): етикетні формули
    та професійна лексика.'
- section: Медичні інструкції та філософія Амосова (Medical Instructions and Amosov's
    Philosophy)
  words: 700
  points:
  - 'Культурний контекст: постать Миколи Амосова — «система обмежень і навантажень»
    та комплекс «1000 рухів» як основа української превентивної медицини.'
  - 'Аналіз цитати Амосова: «Лікарі лікують хвороби, а здоров''я треба здобувати самому»
    — розвиток навичок аргументації.'
  - 'Лексика прийому ліків: колокації «приймати ліки», «виписати ліки», «рецептурні
    ліки», «режим харчування».'
  - Формулювання рекомендацій щодо фізичної активності та профілактики захворювань.
- section: Медична документація та цифровізація (Medical Documentation and Digitalization)
  words: 600
  points:
  - 'Робота з е-рецептами та електронними направленнями: лексика сучасного eHealth
    (електронне направлення на обстеження).'
  - 'Термінологічна точність: розрізнення «відділ» та «відділення» — використання
    «хірургічне відділення» для лікарняних структур.'
  - 'Види документів: лікарняний лист (довідка про непрацездатність), виписка, історія
    хвороби пацієнта.'
  - Практика заповнення коротких форм скарг або описів самопочуття для цифрових систем.
- section: Культура мовлення та корекція русизмів (Speech Culture and Correction of
    Russisms)
  words: 500
  points:
  - 'Виправлення калькованих висловів: перехід від «приймати участь у лікуванні» до
    правильного «брати участь у лікуванні».'
  - 'Усунення суржику в медичній термінології: «хірургічне відділення» (не відділ),
    «пройти обстеження» (не осмотр).'
  - 'Порівняння розмовних назв хвороб та офіційних термінів: дотримання регістру залежно
    від адресата.'
  - Підсумковий тест на знання медичних колокацій та правильного вживання роду іменників.
vocabulary_hints:
  required:
  - симптом (symptom) — опис симптомів, перший симптом; High frequency.
  - діагноз (diagnosis) — поставити діагноз, попередній діагноз, підтвердити діагноз;
    Medical register.
  - рецепт (prescription) — виписати рецепт, електронний рецепт (е-рецепт), рецептурні
    ліки.
  - ліки (medicine) — приймати ліки, виписати ліки, ліки від застуди; Always plural.
  - 'біль (pain) — гострий/тупий біль, відчувати біль, ниючий біль; High frequency,
    note: masculine gender (сильний біль).'
  - температура (temperature) — міряти температуру, висока температура.
  - тиск (pressure) — артеріальний тиск, міряти тиск, підвищений тиск.
  - огляд (examination) — огляд пацієнта, візуальний огляд.
  - аналіз (test/analysis) — здати аналізи, результати аналізів, загальний аналіз
    крові.
  - лікування (treatment) — курс лікування, призначити лікування, ефективне лікування.
  recommended:
  - скарга (complaint) — скарги пацієнта, основні скарги; Standard §3.9.
  - призначення (prescription/appointment) — рекомендації та призначення лікаря.
  - госпіталізація (hospitalization) — відділення (not відділ), госпіталізація пацієнта.
  - одужання (recovery) — швидке одужання, процес одужання.
  - профілактика (prevention) — профілактика захворювань, заходи профілактики.
  - лікар (doctor) — сімейний лікар, консультація лікаря, викликати лікаря.
  - пацієнт (patient) — права пацієнта, історія хвороби пацієнта; Formal register.
  - обстеження (examination) — медичне обстеження, пройти обстеження, результати обстеження.
  - 'відділення (department) — хірургічне відділення, стаціонарне відділення; Note:
    not ''відділ''.'
  - навантаження (load) — система обмежень і навантажень (Amosov context).
