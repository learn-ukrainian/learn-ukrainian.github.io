module: register-media-journalistic
level: B2
sequence: 34
version: '1.1'
title: "Публіцистичний (газетно-журнальний) стиль"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Зрозуміти мету публіцистичного стилю (інформування, вплив, формування суспільної думки)."
  - "Вивчити жанрову різноманітність публіцистики (стаття, нарис, інтерв'ю, репортаж, блог)."
  - "Опанувати засоби залучення уваги: заголовки, оцінна лексика, риторичні запитання."
  - "Розвинути критичне мислення для виявлення маніпуляцій, фейків та прихованої пропаганди."
  - "Навчитися писати інформаційні замітки та короткі аналітичні дописи для соціальних мереж."

reading_situations:
  - source_type: "онлайн-новина / аналітична стаття"
    topic: "Критичний аналіз резонансної публікації на провідних українських медіа-ресурсах ('Українська правда', 'НВ', 'Радіо Свобода')."
    key_elements: ["структура новини (перевернута піраміда)", "цитування джерел", "диференціація фактів та суджень", "засоби емоційного впливу"]
    motivation: "Розвиток здатності швидко орієнтуватися в інтенсивному інформаційному потоці та розпізнавати приховані інтенсії автора."

listening_situations:
  - media_type: "відео"
    setting: "Перегляд випуску актуальних телевізійних новин або прослуховування суспільно-політичного подкасту з обговоренням важливих реформ."
    focus_points: ["Виявлення авторської позиції та оцінності.", "Сприйняття емоційно-експресивної лексики в реальному часі.", "Розуміння абревіатур та професійного жаргону журналістів."]
    motivation: "Тренування сприйняття на слух динамічного, актуального та часто маніпулятивного медійного мовлення."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть короткий аналітичний репортаж про актуальну культурну або суспільну подію у вашому місті чи країні. Сформулюйте декілька варіантів влучних заголовків."
    requirements:
      - "мінімум 300 слів"
      - "використання формули 5W+H (хто, що, де, коли, чому, як)"
      - "наявність оцінної, але фактологічно обґрунтованої лексики"
      - "структурування тексту: лід, основна частина, бекграунд"
    motivation: "Відпрацювання навичок лаконічного, змістовного та переконливого інформування широкої аудиторії."
    model_answer: "Текст має бути динамічним та інформативним. Наприклад: 'Заголовок: Місто в обіймах джазу: як пройшов перший день фестивалю. У центрі міста вчора стартував щорічний музичний марафон. Понад десять тисяч глядачів зібралися, щоб почути світових зірок. Незважаючи на дощ, атмосфера залишалася піднесеною. Організатори зазначають, що цьогорічний захід став наймасштабнішим за всю історію.'"

discussion_topics:
  - context: "Дискусія про роль соціальних мереж та блогерів у формуванні сучасної медіа-реальності: чи замінять вони традиційну журналістику?"
    questions:
      - "У чому полягає небезпека 'ехо-камер' у соціальних мережах?"
      - "Як відрізнити професійного журналіста від маніпулятивного інфлюенсера за мовними ознаками?"
      - "Чи має журналіст бути повністю нейтральним у своїх матеріалах?"
    motivation: "Розвиток навичок медіаграмотності, критичного мислення та здатності вести аргументовану полеміку про медійні процеси."

content_outline:
  - section: "Функції та визначальні ознаки публіцистики"
    words: 1000
    subsections:
      - "Інформативна та волюнтативна (переконувальна) функції публіцистичного мовлення"
      - "Поєднання документальної точності з суб'єктивною авторською оцінкою"
      - "Відкрита оцінність та використання засобів емоційного впливу на аудиторію"
      - "Принцип мовної економії та лаконічність як запорука ефективності повідомлення"
    key_concepts:
      - "публіцистичність"
      - "переконливість"
      - "суспільна думка"
  - section: "Жанрова палітра сучасних медіа"
    words: 1100
    subsections:
      - "Інформаційні жанри: замітка, репортаж, інтерв'ю, звіт — фокус на фактах"
      - "Аналітичні жанри: стаття, коментар, огляд, рецензія — фокус на причинах та наслідках"
      - "Художньо-публіцистичні жанри: есе, нарис, памфлет, фельєтон — фокус на образі"
      - "Специфіка мережевої журналістики: пости, блоги, твіти та лонгріди в соціальних мережах"
    key_concepts:
      - "репортаж"
      - "інтерв'ювання"
      - "аналітика"
  - section: "Лексика та синтаксис інформаційного впливу"
    words: 1000
    subsections:
      - "Суспільно-політична лексика, термінологія та актуальна фразеологія"
      - "Специфіка публіцистичного синтаксису: риторичні запитання, звертання, вигуки, повтори"
      - "Засоби створення емоційного контакту: метафори, порівняння та іронія в медіа"
      - "Кліше та штампи: їх функціональна роль та небезпека надмірного використання"
    key_concepts:
      - "риторичне запитання"
      - "мовне кліше"
      - "оцінна лексика"
  - section: "Медіаграмотність та етичні стандарти журналістики"
    words: 900
    subsections:
      - "Виявлення прихованої реклами ('джинси') та маніпулятивних заголовків (клікбейту)"
      - "Технології перевірки фактів (fact-checking) та робота з першоджерелами інформації"
      - "Поняття мови ворожнечі (hate speech) та способи забезпечення толерантності в медіа"
      - "Етичний кодекс журналіста: баланс між свободою слова та відповідальністю"
    key_concepts:
      - "медіаграмотність"
      - "фактчекінг"
      - "клікбейт"

vocabulary:
  required:
    - джерело
    - подія
    - репортаж
    - інтерв'ю
    - точка зору
    - висвітлювати
    - актуальний
    - вплив
  recommended:
    - оприлюднити
    - громадськість
    - спростувати
    - резонанс
    - маніпуляція
    - фейк

activities:
  types_required:
    - reading
    - essay-response
    - select
    - fill-in
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "register-literary-ukrainian"
  next: "register-colloquial-style"
