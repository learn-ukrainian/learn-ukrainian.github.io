module: b2-050
level: B2
sequence: 50
slug: word-formation-abstract-nouns
version: '1.2'
title: "Словотвір: Абстрактні іменники"
subtitle: "Word Formation: Abstract Nouns"
focus: vocabulary
pedagogy: PPP
word_target: 4000
objectives:
  - "Засвоїти суфікс -ість як найпродуктивніший засіб творення назв якостей від прикметників."
  - "Вивчити суфікси -ств(о), -цтв(о), -зтв(о) для творення збірних та абстрактних понять."
  - "Розуміти відмінності між віддієслівними іменниками на -нн(я) та -тт(я)."
  - "Опанувати творення назв ідеологій та напрямів за допомогою суфікса -ізм/-изм."
  - "Навчитися використовувати абстрактну лексику в науковому та публіцистичному стилях."
  - "Опанувати безсуфіксний (нульовий) спосіб творення віддієслівних іменників (переїзд, розгляд, виклик, запис)."

reading_situations:
  - source_type: "філософське есе або культурологічна стаття"
    topic: "Аналіз тексту про людські цінності (свобода, відповідальність, мудрість), де абстрактні іменники є ключовими поняттями."
    key_elements: ["суфіксальні моделі", "семантика якості", "віддієслівні назви"]
    motivation: "Розвиток навичок декодування складних понять через їхній морфемний склад."

listening_situations:
  - media_type: "лекція"
    setting: "Виступ на науковій конференції, присвяченій соціальним змінам та реформам."
    focus_points: ["Виокремлення іменників на -ння.", "Розуміння різниці між 'будівництво' та 'будування'.", "Сприйняття термінології на -ізм."]
    motivation: "Тренування сприйняття абстрактної аргументації на слух."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть текст на тему: 'Мистецтво чи ремісництво: де проходить межа?' Використовуйте щонайменше 15 абстрактних іменників, утворених за допомогою різних суфіксів (-ість, -ство, -ння)."
    requirements:
      - "чітка логічна структура"
      - "використання термінології мистецтвознавства"
      - "правильне вживання закінчень у непрямих відмінках"
      - "мінімум 250 слів"
    motivation: "Практика оперування високою лексикою в інтелектуальній дискусії."
    model_answer: "Текст має бути аналітичним. Очікується вживання таких слів як: 'творчість', 'майстерність', 'досконалість', 'вдосконалення'. Автор повинен продемонструвати різницю між процесом та результатом. Модельний варіант фокусується на глибині розкриття понять."

discussion_topics:
  - context: "Які абстрактні поняття є найважливішими для сучасного суспільства?"
    questions:
      - "Що для вас означає 'справедливість' і як це слово утворене?"
      - "Чому в політиці так багато слів із суфіксом -ізм?"
      - "Чи можливо передати складні емоції, не використовуючи абстрактні іменники?"
    motivation: "Стимулювання використання нової лексики в усному мовленні."

content_outline:
  - section: "Суфікс -ість: Назви якостей"
    words: 1000
    subsections:
      - "Творення від прикметників: молодий -> молодість, щирий -> щирість"
      - "Семантичне поле: психологічні стани, риси характеру, властивості предметів"
      - "Особливості відмінювання іменників на -ість (ІІІ відміна)"
      - "Чергування голосних [о], [е] з [і] в основі"
    key_concepts:
      - "якість"
      - "характеристика"
      - "ІІІ відміна"
      - "морфонологія"
  - section: "Суфікси -ств(о), -цтв(о): Збірність та діяльність"
    words: 1000
    subsections:
      - "Творення назв галузей та видів діяльності (мистецтво, птахівництво)"
      - "Збірні поняття: товариство, козацтво, людство"
      - "Фонетичні зміни при творенні: козак -> козацтво, убогий -> убозтво"
      - "Стилістичне використання в офіційних назвах організацій"
    key_concepts:
      - "збірність"
      - "діяльність"
      - "чергування приголосних"
      - "інституціоналізація"
  - section: "Віддієслівні іменники на -ння, -ття"
    words: 1000
    subsections:
      - "Творення від основ дієслів: читати -> читання, жити -> життя"
      - "Розрізнення процесу (виконання) та результату (виконане завдання)"
      - "Правопис подовжених приголосних перед -я"
      - "Вживання в інструкціях та наукових описах процесів"
    key_concepts:
      - "ономіналізація"
      - "процесуальність"
      - "подовження"
      - "термінотворення"
  - section: "Суфікс -ізм/-изм та безсуфіксне творення"
    words: 1000
    subsections:
      - "Суфікс -ізм/-изм: гуманізм, реалізм, патріотизм. Правило 'дев'ятки'"
      - "Безсуфіксний (нульовий) спосіб творення віддієслівних іменників: переїзд, розгляд, виклик, запис, вхід, вихід, напад, опис, обмін"
      - "Семантика нульових девербативів: дія як результат (запис), місце (вхід), процес (розгляд)"
      - "Продуктивність нульового способу в офіційно-діловому та науковому стилях"
    key_concepts:
      - "безсуфіксне творення"
      - "девербатив"
      - "нульовий суфікс"
      - "правописна норма"

vocabulary:
  required:
    - абстрактний
    - якість
    - поняття
    - цінність
    - процес
    - свідомість
    - ідеологія
    - творчість
  recommended:
    - гідність
    - незалежність
    - суспільство
    - дослідження
    - прагнення
    - зобов'язання
    - визначення
    - вдосконалення

activities:
  types_required:
    - group-sort
    - fill-in
    - match-up
    - essay-response
  min_items_per_type: 10
  total_min_items: 40

activity_hints:
  - type: fill-in
    description: "Form abstract nouns from adjectives (e.g., сміливий→сміливість, мудрий→мудрість)"
  - type: match-up
    description: "Match adjective/verb to its abstract noun form"
  - type: group-sort
    description: "Sort abstract nouns by suffix type: -ість / -ство / -ння / -ізм"
  - type: error-correction
    description: "Fix wrong suffix choice in abstract noun formation (e.g., 'людяність' vs 'людськість')"

references:
  - "Караман, 10 клас (2018): §55-60 — Словотвір"
  - "Глазова, 11 клас (2019): §17-20 — Морфологічна стилістика"
  - "Авраменко, 11 клас (2019): §15-20 — Морфологічна норма"
  - "State Standard 2024: B2 SS 4.2 (word formation)"

connects_to:
  previous: "word-formation-person-suffixes"
  next: "word-formation-place-object-names"
