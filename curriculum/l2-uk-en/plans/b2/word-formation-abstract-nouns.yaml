module: b2-47
level: B2
sequence: 47
slug: word-formation-abstract-nouns
version: '2.0'
title: 'Словотворення: абстрактні іменники'
subtitle: Word Formation - Abstract Nouns
content_outline:
- section: 'Вступ: Світ абстракцій (Introduction: The World of Abstractions)'
  words: 600
  points:
  - Визначення абстрактних іменників як назв дій, якостей та станів; їхня роль у структуруванні
    складних думок та ідей.
  - 'Культурний гачок: Поняття «Свідомість» (Consciousness) — від філософського терміна
    до концепту національної самосвідомості як фундаменту ідентичності.'
  - 'Номіналізація як ключ до академічного письма: перетворення дієслівних конструкцій
    на іменникові для підвищення формальності тексту.'
- section: 'Дія та процес: Суфікс -ння (Action and Process: The -ння Suffix)'
  words: 1000
  points:
  - Системне утворення назв діяльності від дієслів НДВ (читати → читання, сполучати
    → сполучання) відповідно до §4.2.6 Стандарту B2.
  - 'Опрацювання частотної лексики: «значення», «досягнення», «сприйняття», «ставлення»;
    вживання у сталих колокаціях (мати значення, змінити ставлення).'
  - 'Подолання інтерференції (суржику): вживання «розуміння» замість «поніманіє» та
    «ставлення» замість «отношеніє» у діловому спілкуванні.'
  - 'Розрізнення категорій: тривалий процес (написання) проти завершеного результату
    (написане, твір).'
- section: 'Якість та властивість: Суфікс -ість (Quality and Property: The -ість Suffix)'
  words: 900
  points:
  - Творення абстрактних назв властивостей від прикметників та дієприкметників (можливий
    → можливість, освічений → освіченість) згідно з §4.2.7 Стандарту.
  - 'Культурний гачок: «Гідність» (Dignity) — етичне ядро українського суспільства,
    Революція Гідності як момент кристалізації громадянських цінностей.'
  - 'Аналіз продуктивності суфікса: «якість», «діяльність», «стійкість», «ефективність»
    — слова, що формують професійний лексикон.'
- section: 'Результат та сфера: Суфікси -ок, -ка, -ство (Result and Domain: Suffixes
    -ok, -ka, -ство)'
  words: 800
  points:
  - 'Суфікс -ок для позначення результату дії: «здобуток», «внесок» та їхня роль у
    дискурсі про розвиток та економіку.'
  - 'Конкретизація абстрактного через суфікс -ка: позначення дії та її наслідків (помилка,
    оцінка, знахідка).'
  - 'Суфікс -ство для визначення сфер діяльності та соціального статусу: «суспільство»,
    «громадянство», «керівництво».'
- section: 'Практикум: Культура вживання та запобігання помилкам (Workshop: Usage
    Culture and Error Prevention)'
  words: 700
  points:
  - 'Типова помилка: неправомірне вживання множини для абстрактних іменників (singularia
    tantum); корекція «багато щасть» на «багато щастя».'
  - 'Стилістичний аналіз «Nominalization Overload»: розмежування доречності абстрактних
    іменників у наукових текстах vs природність дієслів у розмові.'
  - 'Фінальна вправа на трансформацію: перетворення описових дієслівних речень на
    лаконічні наукові тези з використанням номіналізації.'
focus: grammar
pedagogy: TTT
objectives:
- Learner can form abstract nouns from verbs using -ння/-ення suffix
- Learner can form abstract nouns from adjectives using -ість suffix
- Learner can identify word formation patterns in authentic texts
- Learner can use abstract nouns appropriately in academic and formal registers
grammar:
- Суфікс -ння/-ення для позначення дії чи процесу
- Суфікс -ість для позначення властивості чи якості
- Суфікси -ок, -ка для позначення результату дії
register: науковий
phase: B2.5
vocabulary_hints:
  required:
  - термін (term) — наукова одиниця
  - поняття (concept) — абстрактна категорія
  - процес (process) — послідовність дій; суфікс -ння
  - метод (method) — спосіб дослідження
  - значення (meaning/importance) — мати велике значення, надати значення; надзвичайно
    висока частотність
  - досягнення (achievement) — вагомі досягнення, наукові досягнення; суфікс -ння
  - розвиток (development) — сталий розвиток, сприяти розвитку; суфікс -ок
  - можливість (opportunity) — надати можливість, рівні можливості; суфікс -ість
  recommended:
  - аналіз (analysis) — розклад на складники
  - синтез (synthesis) — поєднання частин у ціле
  - дослідження (research) — науковий пошук; суфікс -ння
  - якість (quality) — висока якість, контроль якості; суфікс -ість
  - діяльність (activity) — професійна діяльність, результати діяльності; суфікс -ість
  - сприйняття (perception) — зорове сприйняття, сприйняття інформації; суфікс -ння
  - ставлення (attitude) — позитивне ставлення до роботи; уникати суржикового «отношеніє»
  - гідність (dignity) — людська гідність, почуття гідності, Революція Гідності
  - свідомість (consciousness) — національна свідомість; стан усвідомлення
