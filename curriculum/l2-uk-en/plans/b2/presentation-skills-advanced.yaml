module: b2-079
level: B2
sequence: 79
slug: presentation-skills-advanced
version: '1.1'
title: "Презентаційні навички: Переконання та робота з аудиторією"
subtitle: "Навички презентації: переконання та взаємодія з аудиторією"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати передові техніки переконання та впливу під час публічного виступу."
  - "Навчитися професійно відповідати на складні та провокативні запитання (Q&A session)."
  - "Розвинути навички сторітеллінгу для емоційного залучення аудиторії."
  - "Вдосконалити паралінгвістичні засоби комунікації (жестикуляція, міміка, інтонація)
    в українському контексті."

reading_situations:
  - source_type: "стенограма виступу"
    topic: "Стенограма пітчингу українського стартапу перед інвесторами: аналіз риторичних
      прийомів та структури аргументації."
    key_elements: ["методи переконання", "сторітеллінг", "заклик до дії", "робота
          із запереченнями"]
    motivation: "Вивчення передових технік переконання через аналіз реального публічного
      виступу."

listening_situations:
  - media_type: "відео"
    setting: "Пітчинг українського технологічного стартапу перед міжнародними інвесторами
      (з перекладом або українською)."
    focus_points: ["аргументація цінності", "робота із запереченнями", "впевненість
          доповідача"]
    motivation: "Вивчення стратегій переконання у стресових умовах."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть сценарій 3-хвилинної промови (pitch) для захисту вашого екологічного
      проекту перед міською радою."
    requirements: ["використання методу 'проблема-рішення'", "наявність емоційного
          прикладу (story)", "чіткий заклик до дії"]
    motivation: "Тренування лаконічності та переконливості в письмовій підготовці
      до виступу."
    model_answer: "Текст має бути динамічним, містити переконливі цифри та апелювати
      до цінностей аудиторії."

content_outline:
  - section: "Психологія переконання та риторика"
    words: 1000
    subsections:
      - "Аристотелівська тріада: Етос, Патос та Логос у сучасній презентації"
      - "Використання метафор та аналогій для пояснення складних концепцій"
      - "Техніки маніпулювання увагою та їхня етична межа"
    key_concepts:
      - "аргументація"
      - "риторична фігура"
      - "харизма"
      - "переконливість"
  - section: "Сторітеллінг у бізнес-середовищі"
    words: 1000
    subsections:
      - "Структура 'Подорожі героя' в короткому виступі"
      - "Як перетворити сухі дані на цікаву історію"
      - "Роль особистого досвіду та вразливості у побудові довіри"
    key_concepts:
      - "сюжетна лінія"
      - "емпатія"
      - "наратив"
      - "метафора"
  - section: "Мистецтво відповідей на запитання"
    words: 1000
    subsections:
      - "Класифікація запитань: уточнюючі, критичні, провокативні"
      - "Метод 'Мосту' (Bridging) для повернення до своєї тези"
      - "Як визнати нестачу інформації, не втративши авторитет"
    key_concepts:
      - "полеміка"
      - "витримка"
      - "компетентність"
      - "конструктивність"
  - section: "Невербальна комунікація та робота з простором"
    words: 1000
    subsections:
      - "Мова тіла: відкриті пози, зоровий контакт, жести-ілюстратори"
      - "Управління голосом: темп, паузи, гучність як інструменти акцентування"
      - "Подолання сценічного хвилювання та робота з мікрофоном"
    key_concepts:
      - "невербаліка"
      - "дикція"
      - "інтонація"
      - "артистизм"

vocabulary:
  required:
    - переконання
    - сторітеллінг
    - заперечення
    - компетенція
    - маніпуляція
    - аргумент
    - харизма
    - риторика
  recommended:
    - провокативний
    - беззаперечний
    - красномовство
    - винахідливість
    - імпровізація

activities:
  types_required:
    - critical-analysis
    - essay-response
    - anagram
    - fill-in
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: error-correction
    focus: "Виправити мовленнєві помилки та невдалі формулювання у тексті презентації."
  - type: fill-in
    focus: "Вставити правильні риторичні засоби для посилення впливу (метафора, аналогія,
      риторичне запитання)."
  - type: essay-response
    focus: "Написати сценарій 3-хвилинної промови (pitch) із використанням методу
      'проблема — рішення'."
  - type: select
    focus: "Обрати найефективнішу техніку переконання для конкретної аудиторії та
      мети."

references:
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Публічний виступ, дискусія"
  - "Ворон А. А. Українська мова. 11 клас (2019) — Академічне красномовство"
  - "State Standard 2024: B2 SS 3 — Professional communication, persuasion"

connects_to:
  previous: "presentation-skills-basics"
  next: "discussion-debate"
phase: B2.4 [Communication Skills]
