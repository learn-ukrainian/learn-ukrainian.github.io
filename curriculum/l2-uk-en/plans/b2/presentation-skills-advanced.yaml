module: b2-74
level: B2
sequence: 74
slug: presentation-skills-advanced
version: '2.0'
title: 'Презентації: Поглиблено'
subtitle: Advanced Presentation Skills
content_outline:
- section: 'Вступ: Від базових навичок до майстерності (Introduction: From Basic to
    Advanced Skills)'
  words: 600
  points:
  - Перехід від базової структури модуля М91 до риторичної майстерності та розуміння
    презентації як інструменту впливу (інструмент впливу) на рішення.
  - 'Аналіз TEDxKyiv як еталону сучасного українського дискурсу: розбір виступу Я.
    Грицака та Є. Глібовицького «Про цінності українців» як прикладу гармонії етосу
    та логосу.'
  - 'Визначення цілей виступу (§1.1.2.1.3): завдання переконувати (переконувати) аудиторію
    та презентувати результати у професійному контексті конференцій та засідань.'
- section: Аналіз та адаптація до аудиторії (Audience Analysis and Adaptation)
  words: 800
  points:
  - 'Глибокий аналіз цільової аудиторії (цільова аудиторія): визначення потреб, рівня
    технічних знань та очікувань інвесторів чи колег.'
  - 'Стратегії дестиляції сенсу: як презентувати складні терміни (термін) та поняття
    (поняття) нетехнічній аудиторії без спрощення змісту.'
  - 'Культурний контекст українського ІТ-сектору (Grammarly, MacPaw): адаптація глобальних
    стандартів пітчингу до локальних особливостей — пріоритет технічної цінності над
    агресивним продажем.'
  - Читання невербальних реакцій під час виступу (виступ) та гнучка зміна темпу або
    глибини подачі матеріалу.
- section: Сторітелінг та риторика переконання (Storytelling and Persuasive Rhetoric)
  words: 1000
  points:
  - 'Майстерність сторітелінгу: впровадження структури SCP (Situation-Complication-Resolution)
    для уникнення слабких вступів на кшталт «Я хочу розповісти про...».'
  - 'Стилістичні засоби синтаксису (§4.4.1.3): практичне застосування анафори, антитези
    та риторичних питань для створення емоційного зв''язку.'
  - 'Боротьба за природність: виправлення типового зловживання пасивним станом («нами
    було проаналізовано») на користь активної суб''єктності («ми проаналізували»).'
  - 'Етос, пафос, логос: інтеграція трьох шляхів переконання у публіцистичному регістрі
    виступу засновника стартапу.'
- section: Мистецтво візуалізації та технічна досконалість (Art of Visualization and
    Technical Excellence)
  words: 600
  points:
  - 'Ефективна візуалізація (візуалізація) даних: перетворення статистики на вагомі
    аргументи (вагомий аргумент) та наочні образи, що підсилюють головну ідею.'
  - 'Лінгвістична гігієна слайдів: виправлення типових помилок та кальк — вживання
    фрази «наступний слайд» замість помилкової «слідуючий слайд».'
  - 'Особливості віртуальних та гібридних виступів: робота з камерою, освітленням
    та інструментами інтерактиву (опитування, чат) для утримання уваги.'
  - 'Термінологічний контроль: свідоме використання літературних відповідників замість
    професійного суржику та англіцизмів (наприклад, «запустити продукт» замість «залончити»).'
- section: 'Сесія питань та відповідей: Стратегії захисту (Q&A: Defense Strategies)'
  words: 700
  points:
  - 'Підготовка до каверзних питань (каверзні питання): використання техніки антиципації
    та розробка сценаріїв відповідей на складні зауваження.'
  - 'Мовні формули «бриджингу» (bridging): опанування сталих конструкцій — «Це чудове
    питання, яке підводить нас до ключового аспекту нашої стратегії...».'
  - 'Управління агресією та тиском: як зберігати професійний спокій, вигравати час
    для роздумів та гідно визнавати межі власної компетенції.'
  - 'Мистецтво контраргументації: як наводити аргументи, що нейтралізують критику,
    зберігаючи конструктивний тон дискусії.'
- section: Практикум та зворотний зв'язок (Practicum and Feedback)
  words: 300
  points:
  - Фінальна презентація (пітч) з обов'язковою сесією Q&A та відпрацюванням коректного
    вживання виразу «брати участь» (замість помилкового «приймати участь»).
  - 'Peer review за критеріями B2.4: оцінка риторичної вправності, логіки структурування
    та здатності «тримати» аудиторію.'
  - 'Підготовка до дебатів (модуль М93): трансформація навичок монологу у динамічну
    взаємодію під час дискусії.'
focus: skills
