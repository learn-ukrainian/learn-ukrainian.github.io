register: публіцистичний
phase: B2.7
vocabulary_hints:
  required:
  - презентувати (to present) — презентувати проєкт, ідею, результати, команду; High
    frequency in professional contexts.
  - переконувати (to persuade) — переконувати аудиторію, інвесторів, у доцільності
    рішення; ключова дія для B2.
  - впливати (to influence) — впливати на рішення, на думку, на емоції; презентація
    як інструмент впливу.
  - аудиторія (audience) — цільова аудиторія, залучення аудиторії, аналіз аудиторії,
    «тримати» аудиторію.
  - візуалізація (visualization) — якісна візуалізація, засоби візуалізації даних;
    ключовий аспект сучасних виступів.
  - аргумент (argument) — вагомий аргумент, наводити аргументи, контраргумент; основа
    логічного переконання.
  - виступ (speech/presentation) — публічний виступ, готувати виступ, блискучий виступ;
    термін за стандартом §1.1.2.1.3.
  - питання (question) — каверзні питання, сесія питань та відповідей, передбачати
    питання; фокус на Q&A стратегіях.
  recommended:
  - термін (term) — технічна та професійна термінологія виступу.
  - поняття (concept) — пояснення складних абстрактних понять аудиторії.
  - процес (process) — структурування презентації як логічного процесу.
  - метод (method) — методи переконання (етос, пафос, логос).
  - аналіз (analysis) — аналіз аудиторії та результатів діяльності.
  - синтез (synthesis) — синтез ідей та аргументів у фінальних висновках.
  - дослідження (research) — обґрунтування аргументів даними актуальних досліджень.
