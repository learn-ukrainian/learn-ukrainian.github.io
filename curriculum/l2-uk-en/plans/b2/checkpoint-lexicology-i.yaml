module: b2-073
level: B2
sequence: 73
slug: checkpoint-lexicology-i
version: '1.0'
title: "Контрольний модуль: Лексикологія I (синонімія та пареміологія)"
subtitle: "Підсумковий контроль: синонімія, прислів'я та сталі вирази"
focus: checkpoint
pedagogy: review
word_target: 4000
phase: "B2.6 [Connectors, Synonymy & Phraseology]"
# NEW checkpoint for synonymy + proverbs + set expressions block
objectives:
  - "Систематизувати знання про синонімічні ряди та типи синонімів."
  - "Перевірити навички точного добору синонімів у різних регістрах."
  - "Оцінити знання прислів'їв, приказок та сталих виразів."
  - "Продемонструвати вміння вживати фразеологізми в контексті."

reading_situations:
  - source_type: "публіцистичний текст"
    topic: "Стаття з багатою синоніміко-фразеологічною тканиною: аналіз добору
      слів та ідіом."
    key_elements: ["синонімічні ряди", "прислів'я в контексті",
      "стилістична доречність"]
    motivation: "Комплексна перевірка лексичного аналізу."

listening_situations:
  - media_type: "відео"
    setting: "Ток-шоу: учасники вживають прислів'я та сталі вирази в
      аргументації."
    focus_points: ["розпізнавання фразеологізмів на слух",
      "розуміння переносного значення", "контекстуальна доречність"]
    motivation: "Перевірка розуміння фразеології в живому мовленні."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть текст на тему 'Мудрість поколінь у прислів'ях'.
      Використайте щонайменше 5 прислів'їв та 5 точних синонімів."
    requirements:
      - "мінімум 300 слів"
      - "використання прислів'їв у контексті, а не списком"
      - "синонімічна різноманітність"
    motivation: "Демонстрація лексичного багатства."
    model_answer: "Текст має органічно вплітати прислів'я: 'Як кажуть, без труда
      нема плода. Ця народна мудрість нагадує, що наполеглива (= завзята,
      невтомна) праця...'"

discussion_topics:
  - context: "Чи актуальні народні прислів'я в XXI столітті?"
    questions:
      - "Які прислів'я ви вживаєте в повсякденній мові?"
      - "Чи існують 'шкідливі' прислів'я, що закріплюють стереотипи?"
    motivation: "Обговорення культурної ролі пареміології."

content_outline:
  - section: "Синонімія: типи та точність добору"
    words: 1000
    subsections:
      - "Типи синонімів: абсолютні, ідеографічні, стилістичні, контекстуальні"
      - "Синонімічні ряди: домінанта та периферія"
      - "Точність добору: як вибрати найвлучніший синонім"
      - "Синонімія в різних регістрах: науковий vs розмовний"
    key_concepts:
      - "синонімічний ряд"
      - "домінанта"
      - "стилістичний синонім"
  - section: "Прислів'я, приказки та їхня функція"
    words: 1000
    subsections:
      - "Тематичні групи: праця, мудрість, характер, природа, час"
      - "Прислів'я як засіб аргументації та культурної експресії"
      - "Порівняння українських та англійських прислів'їв"
      - "Трансформація прислів'їв у сучасному мовленні"
    key_concepts:
      - "пареміологія"
      - "народна мудрість"
      - "культурний код"
  - section: "Сталі вирази та фразеологізми"
    words: 1000
    subsections:
      - "Типи фразеологізмів: зрощення, єдності, сполучення"
      - "Тематичні групи: соматизми, зооморфізми, природничі"
      - "Функціональна стилістика фразеологізмів"
      - "Помилки: спотворення фразеологізмів, русизми-кальки"
    key_concepts:
      - "фразеологізм"
      - "ідіоматика"
      - "стилістична функція"
  - section: "Практикум: лексичний аналіз та редагування"
    words: 1000
    subsections:
      - "Методика підбору точного синоніма для контексту"
      - "Вживання прислів'їв та фразеологізмів у зв'язному тексті"
      - "Виявлення лексичних помилок: неточний синонім, спотворена ідіома"
      - "Комплексний лексичний розбір тексту"
    key_concepts:
      - "лексичний аналіз"
      - "редагування"
      - "точність"

vocabulary_hints:
  - word: "синонім"
    translation: "synonym"
    context: "Синоніми збагачують мовлення."
  - word: "пареміологія"
    translation: "paremiology (study of proverbs)"
    context: "Пареміологія вивчає прислів'я та приказки."
  - word: "фразеологізм"
    translation: "phraseological unit, idiom"
    context: "Фразеологізм має переносне значення."
  - word: "стилістика"
    translation: "stylistics"
    context: "Стилістика визначає доречність синоніма."
  - word: "контекст"
    translation: "context"
    context: "Значення слова залежить від контексту."
  - word: "доречність"
    translation: "appropriateness"
    context: "Доречність лексики — ознака грамотності."
  - word: "влучність"
    translation: "aptness, precision"
    context: "Влучність слова визначає силу тексту."
  - word: "переносний"
    translation: "figurative"
    context: "Переносне значення фразеологізму."
  - word: "ідіома"
    translation: "idiom"
    context: "Ідіома не перекладається дослівно."
  - word: "домінанта"
    translation: "dominant (of a synonymic row)"
    context: "Домінанта — стилістично нейтральне слово ряду."
  - word: "розмаїтість"
    translation: "diversity, variety"
    context: "Лексична розмаїтість збагачує текст."
  - word: "трансформація"
    translation: "transformation"
    context: "Трансформація прислів'я для гумористичного ефекту."
  - word: "сполучення"
    translation: "combination, collocation"
    context: "Лексична сполучуваність визначає правильність."
  - word: "калька"
    translation: "calque"
    context: "Калька — це буквальний переклад ідіоми."
  - word: "спотворення"
    translation: "distortion"
    context: "Спотворення фразеологізму — типова помилка."

activities:
  types_required:
    - quiz
    - error-correction
    - match-up
    - fill-in
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: comparative-study
    focus: "Зіставити прислів'я з ситуацією та синонім із контекстом"
  - type: error-correction
    focus: "Виправити спотворені фразеологізми та неточні синоніми"
  - type: essay-response
    focus: "Вставити доречний фразеологізм або точний синонім у текст"
  - type: critical-analysis
    focus: "Класифікувати: синонім / фразеологізм / прислів'я / калька"

