module: b2-32
level: B2
sequence: 32
slug: register-colloquial-style
version: '2.0'
title: Розмовний стиль
subtitle: Ну, типу, як говорити по-справжньому
content_outline:
- section: 'Розминка: Світ стендапу та живого спілкування (Warm-up: The World of Stand-up
    and Living Communication)'
  words: 700
  points:
  - 'Відкриття у стилі стендап-коміка (вплив «Підпільного стендапу» та Василя Байдака):
    питання «Ви помічали, як ми говоримо в чатах?» для створення інтимності та гумору.'
  - 'Принципова відмінність між «книжною» українською (SPO-структура) та живою мовою:
    пріоритет швидкості та емоційності над граматичною повнотою.'
  - Сленг як інструмент емоційного зв'язку та інклюзивності, а не просто «зіпсована
    мова».
- section: 'Лексика: Від скорочень до сленгу воєнного часу (Lexis: From Shortenings
    to War-time Slang)'
  words: 850
  points:
  - 'Стилістичні засоби лексики згідно зі Стандартом (§4.4.1.2): вибіркові скорочення
    (год, тел, універ), зменшувально-пестливі форми та звуконаслідування (шурх-шурх,
    гав).'
  - 'Сучасний молодіжний та інтернет-сленг: функціонування слів «крінж» (ловити крінж),
    «краш» та «жесть» у щоденному дискурсі.'
  - 'Воєнні неологізми як маркер розмовного стилю: використання іронічних термінів
    «бавовна» та «мопед» як копінг-механізм.'
- section: 'Граматика: Частки, наповнювачі та правописні пастки (Grammar: Particles,
    Fillers, and Orthographic Traps)'
  words: 850
  points:
  - 'Наповнювачі пауз (fillers): перехід від суржикових «тіпа», «короче», «да» до
    природних українських маркерів «типу», «коротше», «власне», «бачиш», «знаєш».'
  - 'Емфатичні частки (ж/же, бо, таки): функція підсилення емоцій у розмові («Скажи-но»,
    «Я таки зробив»).'
  - 'Ортографічний фокус: правопис часток з дефісом (частка «бо» після дієслів — «ідіть-бо»)
    проти роздільного написання «що ж», «як же».'
- section: 'Синтаксис: Еліпсис та структура живої мови (Syntax: Ellipsis and Spoken
    Structure)'
  words: 800
  points:
  - 'Стилістичний синтаксис (§4.4.1.3): еліпсис як засіб динаміки (пропуск підмета
    чи присудка — «Смачного!» замість «Я бажаю вам смачного»).'
  - 'Елементи структурування тексту: вставні слова «по-перше», «отже», «власне кажучи»
    для логічного зв''язку в усному мовленні.'
  - Інтонаційне виділення замість суворого порядку слів; самовиправлення та повтори
    для зміщення акцентів у реченні.
- section: 'Практикум: Від месенджера до мікрофона (Workshop: From Messenger to Microphone)'
  words: 800
  points:
  - 'Трансформаційна вправа: перетворення офіційного тексту на розмовний з використанням
    еліпсису та часток («Дякую тебе» — помилка, «Дякую тобі» — норма).'
  - 'Симуляція чату: написання діалогу в месенджері з використанням скорочень, вигуків
    (ого, отакої) та «розумних» наповнювачів.'
  - 'Корекція «страху тиші»: вправи на заміну звуків «е-е-е» змістовними паузами або
    короткими вставками («бачиш», «слухай»).'
focus: grammar
pedagogy: TTT
objectives:
- Учень може розпізнавати маркери розмовного стилю в українській мові
- Учень може трансформувати формальний текст у неформальний і навпаки
- Учень може правильно використовувати частки ж/же, бо, таки для емфази
- Учень може вживати скорочені форми слів та сленг доречно
grammar:
- 'Shortened word forms: тел, комп, інфа'
- 'Particles: ж/же, бо, таки'
- 'Наповнювачі: типу, ну, от, та'
- 'Informal interjections: ого, класно, жесть'
phase: B2.3
vocabulary_hints:
  required:
  - типу (like/sort of) — ну типу, це типу як; high frequency filler
  - коротше (long story short) — коротше кажучи; high frequency discourse marker
  - власне (actually/properly) — власне кажучи; educated register filler
  - жесть (tough/hardcore) — повна жесть, це просто жесть; slang for intense situations
  - крінж (cringe) — ловити крінж; youth slang for awkwardness
  - краш (crush) — мій краш, крашиха; youth slang for infatuation
  recommended:
  - бавовна (cotton/explosion) — irony-based war-time neologism
  - мопед (moped/drone) — informal term for Shahed drones
  - бачиш (see/you see) — filler used to check listener engagement
  - отакої (oh my/wow) — interjection of surprise
  - власне кажучи (strictly speaking) — collocation for structural emphasis
