module: b2-035
level: B2
sequence: 35
slug: register-colloquial-style
version: '1.2'
title: "Розмовний (побутовий) стиль"
subtitle: "Розмовний стиль"
focus: natural informal communication
pedagogy: PPP
phase: "B2.1b [Participles & Register Intro]"
word_target: 4000
objectives:
  - "Дослідити ключові риси розмовного стилю (невимушеність, спонтанність, використання
    невербальних засобів)."
  - "Вивчити розмовну лексику: просторіччя, сленг, емоційно-забарвлені слова (пестливі
    та лайливі)."
  - "Опанувати особливості розмовного синтаксису (неповні речення, еліпсис, вставні
    слова, вигуки)."
  - "Зрозуміти відмінність між нормою та її свідомим порушенням у розмовному контексті."
  - "Навчитися підтримувати розмову на побутові теми, використовуючи природні для
    української мови фрази та реакції."

reading_situations:
  - source_type: "фрагмент діалогу з сучасної літератури або сценарію"
    topic: "Аналіз невимушеної розмови друзів або членів сім'ї у творі Любка Дереша
      або Сергія Жадана."
    key_elements: ["вигуки", "неповні речення", "сленг", "діалектизми"]
    motivation: "Розуміння живої української мови, яка функціонує поза підручниками."

listening_situations:
  - media_type: "блог / вуличне опитування / розмовний подкаст"
    setting: "Прослуховування інтерв'ю з перехожими або перегляд влогу про повсякденне
      життя в Україні."
    focus_points: ["Виявлення розмовних скорочень та частих помилок.", "Сприйняття
          темпу та ритму спонтанного мовлення.", "Розуміння сарказму та іронії."]
    motivation: "Розвиток здатності розуміти реальне мовлення носіїв у різних ситуаціях."

writing_tasks:
  - task_type: "повідомлення в месенджері / неформальний пост"
    prompt: "Напишіть серію повідомлень другу, в яких ви домовляєтеся про зустріч
      та обговорюєте нещодавню подію. Використовуйте розмовні формули."
    requirements:
      - "використання емоційно-забарвленої лексики (смайлики текстом, вигуки)"
      - "доречне вживання сленгу або скорочень (як-от 'нзч', 'прив')"
      - "дотримання неформального етикету"
      - "мінімум 100 слів загалом"
    motivation: "Практика сучасного письмового розмовного мовлення (Digital Communication)."
    model_answer: "Повідомлення має містити неформальне привітання (Привіт! Ойой!
      Прив!), використання демінутивів (кавуся, хвилиночка), еліптичні конструкції
      (Я — в центр), сленгові вирази (крінж, рофл, зашквар) та вигуки (ого, тю, та
      ну). Текст повинен демонструвати спонтанність та емоційну близькість між співрозмовниками."

discussion_topics:
  - context: "Використання суржику та сленгу в публічному просторі: ознака живої мови
      чи її деградація?"
    questions:
      - "Чи варто боротися за чистоту мови в приватному спілкуванні?"
      - "У яких ситуаціях розмовний стиль є абсолютно недоречним?"
      - "Як соціальні мережі змінюють норми розмовного стилю?"
    motivation: "Розвиток навичок аргументації на лінгвокультурологічні теми."

content_outline:
  - section: "Природа розмовного стилю"
    words: 800
    subsections:
      - "Ситуативність та спонтанність як головні чинники формування"
      - "Роль інтонації, жестів та міміки в усному спілкуванні"
      - "Поєднання вербальних та невербальних засобів передачі інформації"
      - "Побутова сфера як основне середовище функціонування"
    key_concepts:
      - "невимушеність"
      - "спонтанність"
      - "паралінгвістика"
      - "контекстуальність"
  - section: "Лексичний склад розмовного мовлення"
    words: 1200
    subsections:
      - "Позалітературна лексика: діалектизми, жаргонізми, сленг"
      - "Специфіка українського сленгу: молодіжний, професійний, геймерський"
      - "Пестливі форми та демінутиви: особливість української ввічливості та емоційності"
      - "Фразеологія повсякденності та сталі вирази реакції"
      - "Просторіччя та суржик: межі літературної норми"
    key_concepts:
      - "сленг"
      - "демінутив"
      - "вульгаризм"
      - "експресема"
      - "фразеологізм"
  - section: "Синтаксис живої мови"
    words: 1000
    subsections:
      - "Неповні речення та еліпсис як засоби економії мовних зусиль"
      - "Інверсія та вільний порядок слів для логічного та емоційного наголосу"
      - "Частки та вигуки як маркери емоційного стану та відношення"
      - "Слова-паразити та дискурсивні маркери: їхня роль у підтримці контакту"
      - "Перерваність мовлення та самовиправлення"
    key_concepts:
      - "еліпсис"
      - "вигук"
      - "дискурсивні слова"
      - "парцеляція"
  - section: "Культура неформального спілкування"
    words: 1000
    subsections:
      - "Звертання: від офіційного до фамільярного та інтимного"
      - "Етикетні формули вітання, прощання, подяки та вибачення в розмовному стилі"
      - "Специфіка інтернет-спілкування (нетикет): меми як частина культурного коду"
      - "Табуйована лексика та межі прийнятного у розмові"
    key_concepts:
      - "фамільярність"
      - "нетикет"
      - "мовний код"
      - "мовна гра"

vocabulary:
  required:
    - класно
    - супер
    - привіт
    - бувай
    - дякую
    - звісно
    - точно
    - мабуть
  recommended:
    - прикольно
    - капець
    - реально
    - короче
    - типу
    - сорі
    - зашквар
    - крінж

activities:
  types_required:
    - fill-in
    - match-up
    - error-correction
    - select
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: group-sort
    focus: "Розподілити слова за стилістичним забарвленням: розмовне / нейтральне
      / книжне"
  - type: select
    focus: "Обрати доречний розмовний вираз для конкретної побутової ситуації"
  - type: error-correction
    focus: "Знайти зайвий канцелярит або надмірну офіційність у розмовному тексті
      та спростити"
  - type: fill-in
    focus: "Перетворити офіційне формулювання на природне розмовне висловлювання"

references:
  - source: "Глазова, 11 клас (2019)"
    pages: "§1–10"
    topic: "Розмовний стиль мовлення"
  - source: "Авраменко, 11 клас (2019)"
    pages: "Стилістика"
    topic: "Розмовний стиль, культура мовлення"
  - source: "Державний стандарт 2024"
    pages: "SS 4.4"
    topic: "Стилістика (B2)"

connects_to:
  previous: "register-media-journalistic"
  next: "register-religious-ukrainian"
