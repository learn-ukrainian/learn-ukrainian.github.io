title: Складна система займенників
subtitle: 'Складна система займенників: зворотні, взаємні, означальні'
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Правильно вживати зворотний займенник "себе" в непрямих відмінках і
  відрізняти його від дієслів із постфіксом -ся.
- Застосовувати взаємну конструкцію "один одного" для позначення взаємної дії.
- >-
  Розрізняти й уживати означальні займенники: сам, самий, весь, кожний,
  всякий, інший.
- Пояснювати смислові відтінки, які створює вибір займенника в складному тексті.
reading_situations:
- source_type: стаття з психології
  topic: Пізнання себе та взаємини з іншими
  key_elements:
  - взаємні дії
  - рефлексія
  - означальні займенники
  motivation: Текст про саморефлексію дає природні приклади вживання "себе" та
    "один одного".
writing_tasks:
- task_type: есе-рефлексія
  prompt: Напишіть коротке есе на тему 'Як важливо розуміти самого себе та
    підтримувати одне одного', використовуючи зворотні та взаємні займенники.
  requirements:
  - мінімум 200 слів
  - вживання 'себе' у різних відмінках
  - вживання 'сам/самий'
  model_answer: 'Есе має поєднувати особисту рефлексію з точним уживанням
    займенників. Очікується текст на зразок: ''Щоб краще розуміти самих
    себе, ми маємо чесно ставити собі запитання. Люди підтримують одне
    одного тоді, коли кожний бере на себе відповідальність за власні слова''.'
  motivation: Практика вживання складних займенників для абстрактних і
    рефлексивних висловлювань.
listening_situations:
- media_type: подкаст
  setting: Інтерв'ю з психологом про стосунки в колективі.
  focus_points:
  - ідентифікація займенників
  - розуміння контексту
  motivation: Розпізнавання смислових відтінків означальних займенників
    на прикладі пари "кожний" і "всякий".
discussion_topics:
- context: Обговорення лідерства та відповідальності.
  questions:
  - Чому кажуть, що лідер повинен починати з самого себе?
  - Як змінюється зміст, коли ми кажемо 'усі згодні' замість 'кожний згоден'?
  motivation: Розвиток комунікативної точності через свідомий вибір займенника.
content_outline:
- section: 'Зворотний займенник: ''себе'''
  words: 1000
  points:
  - Зворотний займенник "себе" не має називного відмінка, роду й числа.
  - 'Парадигма відмінювання: себе (родовий/знахідний), собі (давальний/місцевий),
    собою (орудний).'
  - 'Смислова різниця між займенником "себе" і дієсловом із -ся: "мити себе"
    і "вмиватися".'
  - 'Ідіоматичні вживання: "прийти до тями", "брати на себе".'
- section: 'Взаємний займенник: ''один одного'''
  words: 1000
  points:
  - >-
    Будова та відмінювання конструкції "один одного": змінюється лише друга
    частина.
  - 'Уживання з прийменниками: "один з одним", "один на одного".'
  - 'Родові й числові варіанти: "одна одну", "одні одних"; нейтральне "один
    одного" часто функціонує універсально.'
  - 'Порівняння з дієсловами взаємної дії: зустрічатися і бачити один одного.'
- section: 'Означальні займенники: сам, самий, весь, кожний'
  words: 1000
  points:
  - Відмінювання й семантика означальних займенників.
  - 'Сам і самий: "я сам це зробив" і "той самий".'
  - 'Весь, вся, все, всі: уживання та відмінювання.'
  - 'Кожний і всякий: індивідуалізація кожного елемента та узагальнення
    будь-якого різновиду.'
- section: Стилістичні особливості та практичне застосування
  words: 1000
  points:
  - Реєстрові відмінності у вживанні займенників.
  - 'Типові помилки: кальки з англійської ("мислити про себе" замість
    "розуміти себе").'
  - Використання займенників для когезії в складних реченнях.
  - Узагальнення й закріплення складних займенникових парадигм.
- section: Підсумок
  words: 300
  points:
  - Займенник "себе" не має називної форми й відрізняється від зворотних
    дієслів. Для взаємної дії використовуйте "один одного", де змінюється
    друга частина конструкції.
  - >-
    Перевірте себе: чим відрізняються "мити себе" і "вмиватися"? Як сказати
    "Ми дивимося один на одного" без калькування? Який відтінок розрізняє
    "кожний" і "всякий"?
