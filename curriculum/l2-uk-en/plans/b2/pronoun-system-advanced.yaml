module: b2-058
level: B2
sequence: 58
slug: pronoun-system-advanced
version: '1.0'
title: "Поглиблена система займенників: зворотний, взаємний, означальний"
subtitle: "Advanced Pronoun System: Reflexive, Reciprocal, and Definitive"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Опанувати повну парадигму зворотного займенника себе (без називного відмінка) та його функції в реченні."
  - "Розрізняти вживання присвійного свій та особових його/її/їх залежно від суб'єкта дії."
  - "Засвоїти різницю між означальними займенниками сам (самостійно) і самий (той самий), а також весь/увесь, кожний/кожен, інший."
  - "Навчитися вживати взаємний займенник один одного в різних відмінкових формах з дотриманням узгодження."
  - "Вільно використовувати зворотні, взаємні та означальні займенники в різних стилях мовлення: розмовному, публіцистичному та офіційно-діловому."

reading_situations:
  - source_type: "публіцистична стаття"
    topic: "Стаття про волонтерський рух в Україні, де учасники описують свій досвід, допомагають одне одному та діють самостійно."
    key_elements: ["зворотний займенник себе у фразеологізмах", "взаємність один одного", "означальний кожен у розподільному значенні"]
    motivation: "Аналіз реального тексту для виявлення функцій різних розрядів займенників у публіцистичному стилі."
  - source_type: "офіційний лист"
    topic: "Зразок офіційного листа-звернення, де автор представляє себе, посилається на своїх колег та описує взаємні зобов'язання сторін."
    key_elements: ["себе у формулі самопредставлення", "свій у значенні приналежності до суб'єкта", "кожна сторона у діловому контексті"]
    motivation: "Спостереження за вживанням займенників в офіційно-діловому стилі та засвоєння шаблонів ділового мовлення."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть есе (мінімум 200 слів) на тему «Людина, яка зробила себе сама», описуючи досягнення відомого українця/українки. Вживайте зворотний займенник себе, присвійний свій та означальний сам у різних контекстах."
    requirements: ["мінімум 200 слів", "різні відмінкові форми себе", "правильне розрізнення свій vs його/її", "вживання сам у значенні 'самостійно'"]
    motivation: "Перевірка здатності вживати зворотні та означальні займенники у зв'язному тексті з дотриманням стилістичної та граматичної норми."
    model_answer: "Есе має містити конструкції на зразок 'зробив себе сам', 'вірив у себе', 'пишався своїми здобутками' (не 'його здобутками'), 'узяв на себе відповідальність', 'сам досяг успіху'."
  - task_type: "редагування"
    prompt: "Відредагуйте текст із 10 речень, у яких навмисно допущено помилки у вживанні займенників: сплутано свій/його, сам/самий, невірна форма себе."
    requirements: ["виправити кожну помилку", "обґрунтувати виправлення граматичним правилом"]
    motivation: "Розвиток навички розпізнавання та виправлення типових помилок у вживанні займенників."
    model_answer: "Наприклад: 'Він подарував його книжку другові' → 'Він подарував свою книжку другові' (свій, бо суб'єкт = він); 'Це самий будинок' → 'Це той самий будинок' (самий потребує вказівного той)."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Уривок інтерв'ю з українським волонтером, який розповідає про свою роботу, взаємодопомогу в команді та самоорганізацію."
    focus_points: ["розпізнавання форм себе/собі в розмовному мовленні", "фіксація конструкцій один одного / одне одному", "розрізнення сам (самостійно) та самий (той самий) на слух"]
    motivation: "Розвиток навички розпізнавання зворотних, взаємних та означальних займенників у природному усному мовленні."

discussion_topics:
  - context: "Обговорення: 'Чому українською не можна сказати *я взяв мою книжку, коли йдеться про власну книжку?'"
    questions:
      - "Чому займенник свій потрібен, якщо є його, її, їх? Коли виникає двозначність без свій?"
      - "Порівняйте: 'Бабуся попросила онука купити собі молока' — для кого молоко? Як уникнути двозначності?"
      - "Чим відрізняється сам собі пан від самий головний? Чи можна сказати *він самий прийшов?"
    motivation: "Розвиток лінгвістичної рефлексії та здатності аналізувати двозначності, що виникають при невірному вживанні займенників."

content_outline:
  - section: "Зворотний займенник себе: парадигма і функції"
    words: 1100
    subsections:
      - "Відмінювання себе: відсутність називного відмінка та її причини (себе вказує на виконавця, а не на підмет)"
      - "Себе у різних синтаксичних ролях: додаток, означення, обставина (вірити в себе, бути собою, залишити при собі)"
      - "Фразеологізми та сталі вирази із себе/собі: прийти в себе, брати себе в руки, набивати собі ціну, сам собі пан"
      - "Зв'язок себе з дієслівним суфіксом -ся: історична еволюція (давнє ся = себе)"
    key_concepts:
      - "зворотний займенник"
      - "відсутність називного відмінка"
      - "фразеологізм"
      - "рефлексивність"
  - section: "Присвійний свій vs його/її/їх: правила вибору"
    words: 1000
    subsections:
      - "Головне правило: свій стосується підмета речення, його/її/їх — іншої особи"
      - "Типові двозначності: 'Він попросив друга принести його книжку' — чию? Розв'язання через свій"
      - "Присвійний свій у різних типах речень: простих, складних, з інфінітивними конструкціями"
      - "Стилістичний вибір: свій як маркер належності vs надмірне вживання свій (тавтологія)"
    key_concepts:
      - "присвійний займенник"
      - "антецедент"
      - "двозначність"
      - "кореференція"
  - section: "Означальні займенники: сам, самий, весь/увесь, кожний, інший"
    words: 1100
    subsections:
      - "Сам: підсилювальне значення (він сам зробив = самостійно) та відмінювання сам/сама/саме/самі"
      - "Самий: вживання лише з вказівним той (той самий, та сама, те саме) — значення тотожності"
      - "Весь/увесь: морфофонемічна варіація (увесь на початку речення / після голосного; весь після приголосного), відмінювання"
      - "Кожний/кожен та інший: стилістичні відтінки (кожний — книжний, кожен — нейтральний), жодний/жоден у заперечних конструкціях"
    key_concepts:
      - "означальний займенник"
      - "підсилювальне значення"
      - "тотожність"
      - "морфофонемічна варіація"
  - section: "Взаємний займенник один одного та синтез знань"
    words: 800
    subsections:
      - "Один одного: відмінювання другого компонента (один одного, одне одному, один для одного), рід та число"
      - "Відмінність взаємності від зворотності: вони поважають себе (кожен — себе) vs вони поважають одне одного (взаємно)"
      - "Порівняльна таблиця: зворотний, взаємний, означальний — контрастивний аналіз функцій"
      - "Практичний синтез: вживання всіх трьох розрядів у зв'язному тексті"
    key_concepts:
      - "взаємний займенник"
      - "узгодження"
      - "зворотність vs взаємність"
      - "контрастивний аналіз"

vocabulary:
  required:
    - займенник
    - зворотний
    - взаємний
    - означальний
    - присвійний
    - відмінювання
    - двозначність
    - антецедент
  recommended:
    - рефлексивний
    - тотожність
    - підсилювальний
    - кореференція
    - приналежність
    - морфофонемічний

activities:
  types_required:
    - fill-in
    - error-correction
    - select
    - match-up
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: fill-in
    focus: "Вставити правильну форму займенника себе/свій/сам/один одного у контексті речення (вибір відмінка та розряду)."
  - type: error-correction
    focus: "Виправити помилки у вживанні займенників: сплутано свій/його, сам/самий, неправильна відмінкова форма себе."
  - type: select
    focus: "Обрати правильний займенник із кількох варіантів залежно від контексту: себе, свій, його, сам, самий, один одного."
  - type: match-up
    focus: "З'єднати речення з правильним визначенням функції займенника: зворотна дія, взаємна дія, підсилення, тотожність, приналежність."
  - type: unjumble
    focus: "Відновити правильний порядок слів у реченнях із складними займенниковими конструкціями (один одному допомагали завжди ми)."

references:
  - "Караман С. О. Українська мова. 10 клас (2018), §64 — Займенник: розряди, відмінювання, стилістика"
  - "Заболотний О. В. Українська мова. 6 клас (2020), §59-62 — Особові, зворотний, присвійні, означальні займенники"
  - "Глазова О. П. Українська мова. 11 клас (2019), §24-25 — Синтаксична норма: зворотні конструкції та займенникова референція"
  - "State Standard 2024: SS 4.1.1.4 — Займенник: розряди за значенням, відмінювання, стилістичне вживання"

