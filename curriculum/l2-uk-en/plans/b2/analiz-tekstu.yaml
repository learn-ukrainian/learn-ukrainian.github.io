module: b2-80
level: B2
sequence: 80
slug: analiz-tekstu
version: '2.0'
title: Аналіз тексту
subtitle: Text Analysis
content_outline:
- section: Вступ та термінологічні засади (Introduction and Terminological Foundations)
  words: 600
  points:
  - Перехід від базового аналізу (М78) до комплексного філологічного підходу — текст
    як багатошарова система
  - 'Чітке розмежування ключових понять: «тема» (про що текст) vs «ідея» (головне
    повідомлення/меседж автора)'
  - 'Методологія глибокого читання: від аналізу форми до розуміння прихованих змістів
    та авторської мети'
- section: Стилістичні засоби та синтаксис (Stylistic Means and Syntax)
  words: 1000
  points:
  - 'Стилістичні засоби лексики згідно з Держстандартом (§4.4.1.2): роль епітетів,
    метафор та антонімів у тексті'
  - 'Стилістичні засоби синтаксису (§4.4.1.3): використання еліпсису, звертань та
    вставних слів для структурування'
  - 'Принцип актуального членування речення: виявлення «реми» (найважливішої інформації),
    що зазвичай стоїть у кінці'
  - 'Аналіз логічного наголосу: як порядок слів утворює змістові акценти та впливає
    на сприйняття аргументу'
- section: Авторська позиція та культурні архетипи (Authorial Position and Cultural
    Archetypes)
  words: 800
  points:
  - 'Явна vs прихована позиція автора: маркери ставлення та мовні засоби вираження
    суб''єктивності'
  - 'Культурний архетип: порівняння емоційно-пророчого стилю Т. Шевченка та аналітичного
    підходу І. Франка'
  - 'Феномен «Езопової мови»: історичний досвід розкодування підтексту в умовах цензури
    та колоніального тиску'
  - Виявлення іронії, сарказму та модальності як інструментів реконструкції авторського
    світогляду
- section: Контекстуальний аналіз та деколонізація (Contextual Analysis and Decolonization)
  words: 800
  points:
  - 'Історичний та соціальний контекст: аналіз того, для кого і з якою метою було
    створено конкретний текст'
  - 'Постколоніальна оптика: пошук маркерів національної ідентичності та спротив імперським
    наративам у підтексті'
  - 'Інтертекстуальність та алюзії: виявлення зв''язків з іншими текстами українського
    та світового канону'
  - 'Робота з культурним кодом: розшифрування символів, зрозумілих носіям мови, але
    прихованих для іноземця'
- section: Логіка аргументації та запобігання помилкам (Argumentation Logic and Error
    Prevention)
  words: 800
  points:
  - Структура аргументу (теза, докази, висновок) та оцінка переконливості за допомогою
    логічних зв'язків
  - 'Типова помилка: буквальний переклад ідіом (напр. «пекти раків»); стратегія ідентифікації
    сталих виразів'
  - 'Помилка регістру: аналіз лексичних маркерів (сленг vs термінологія) для визначення
    тону повідомлення'
  - Виявлення маніпулятивних прийомів, логічних помилок та хибних аргументів у сучасних
    медіа-текстах
focus: skills
pedagogy: CBI
objectives:
- Analyze texts for subtext and author intent
- Identify bias and manipulation in media
- Understand rhetorical structure of arguments
grammar:
- Rhetorical analysis methods
- Identifying bias and subtext
phase: B2.4 Skills & Capstone
vocabulary_hints:
  required:
  - термін (term) — науковий термін, вживати термін; висока частотність в академічному
    контексті
  - поняття (concept) — ключове поняття, підмінити поняття; вживається для філософських
    та абстрактних категорій
  - процес (process) — творчий процес, процес аналізу; загальновживаний термін з високою
    частотністю
  - метод (method) — науковий метод, метод дедукції; ключове слово для методологічного
    аналізу
  recommended:
  - аналіз (analysis) — глибокий аналіз, критичний аналіз; базове поняття для медіаграмотності
  - синтез (synthesis) — логічний синтез; антонім до аналізу, вживається в науковому
    стилі
  - дослідження (research) — об'єкт дослідження, проводити дослідження; маркер академічного
    регістра
