module: b2-079
level: B2
sequence: 79
slug: professional-email-basics
version: 1.1.2
title: 'Ділова переписка: Основи електронного листування'
subtitle: 'Професійний email: основи електронного листування'
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
- Опанувати стандартну структуру ділового електронного листа в українській мові.
- Вивчити етикетні формули звертання, привітання та завершення листа залежно від
  статусу адресата.
- Навчитися формулювати чіткі та лаконічні теми листів (Subject lines).
- Відпрацювати навички написання базових типів професійних імейлів (запит, 
  підтвердження, запрошення).
reading_situations:
- source_type: корпоративні стандарти
  topic: Кодекс електронної комунікації сучасної української компанії.
  key_elements:
  - тайм-менеджмент у відповідях
  - корпоративний підпис
  - використання копій (CC/BCC)
  - додатки
  motivation: Розуміння технічних та етичних аспектів сучасного ділового 
    листування.
writing_tasks:
- task_type: офіційний лист
  prompt: Напишіть імейл-запит до потенційного партнера з проханням надати 
    детальну інформацію про умови співпраці.
  motivation: Тренування навичок ввічливого запиту інформації в офіційному 
    контексті.
  requirements:
  - використання формул 'Шановний/-а...', 'З повагою...'
  - чітко сформульована мета запиту
  - логічний поділ на абзаци
  model_answer: 'Лист має містити: професійну тему, ввічливе звертання, стислу презентацію
    автора/компанії, конкретні запитання та вираз сподівання на подальшу співпрацю.'
listening_situations:
- media_type: подкаст
  setting: Обговорення типових помилок у діловому листуванні українською мовою.
  focus_points:
  - формули ввічливості у різних контекстах
  - різниця між офіційним та напівофіційним тоном
  motivation: Розвиток чуття мовленнєвого етикету через аналіз реальних 
    прикладів ділової комунікації.
content_outline:
- section: Анатомія ділового електронного листа
  words: 1000
  subsections:
  - 'Важливість теми листа (Subject line): інформативність та привернення уваги'
  - 'Логічна структура: звертання, вступ, основна частина, заклик до дії, підпис'
  - Оформлення додатків (Attachments) та гіперпосилань у тексті
  key_concepts:
  - структурування
  - адресат
  - інформативність
  - лаконічність
- section: Мовленнєвий етикет та формули ввічливості
  words: 1000
  subsections:
  - 'Диференціація звертань залежно від дистанції: офіційні, напівофіційні та внутрішні'
  - Стандартні кліше для початку та завершення листа ('Маю надію на...', 'Буду 
    вдячний за...')
  - 'Відмова та вибачення в електронному листі: як зберегти професійні стосунки'
  key_concepts:
  - мовленнєвий етикет
  - дистанція
  - кліше
  - коректність
- section: Стилістика офіційно-ділового мовлення в імейлах
  words: 1000
  subsections:
  - Запобігання двозначності та зайвій емоційності в діловій переписці
  - Використання пасивних конструкцій та дієслівних іменників для надання 
    офіційності
  - 'Боротьба з канцеляризмами та штампами: як писати ''живою'' діловою мовою'
  key_concepts:
  - офіційність
  - нейтральність
  - канцеляризм
  - однозначність
- section: Базові жанри професійних повідомлень
  words: 1000
  subsections:
  - 'Лист-запит та лист-відповідь на запит: структура та лексика'
  - Лист-запрошення на зустріч або захід
  - Лист-подяка та лист-підтвердження отримання інформації/документів
  key_concepts:
  - жанр
  - комунікативна мета
  - підтвердження
  - запит
- section: Підсумок — Summary
  words: 300
  points:
  - "Business email anatomy and etiquette rely on the distance between sender and
    addressee. Standard structures include clear subject lines, appropriate greetings,
    and polite sign-offs. Self-check: What is the difference between a formal and
    semi-official greeting in Ukrainian? Draft 3 standard phrases to start or end
    an email (e.g., 'Буду вдячний за...')."
  - 'Professional stylistics emphasize neutrality, using passive constructions and
    verbal nouns while avoiding heavy bureaucratic clichés (канцеляризми). Key genres
    include requests, invitations, and confirmations. Self-check: How do you gracefully
    refuse a request while maintaining a professional relationship? Write a short,
    formal email confirming the receipt of an attachment (додаток).'
vocabulary:
  required:
  - листування
  - адресат
  - вкладення
  - подяка
  - звертання
  - співпраця
  - запит
  - уточнення
  recommended:
  - лаконічність
  - змістовність
  - коректність
  - оперативність
  - взаємовигідний
activities:
  types_required:
  - fill-in
  - match-up
  - unjumble
  - select
  min_items_per_type: 5
  total_min_items: 20
activity_hints:
- type: reading
  focus: Прочитайте текст про анатомія ділового електронного листа і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про мовленнєвий етикет та 
    формули ввічливості, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Анатомія ділового 
    електронного листа». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    анатомія ділового електронного листа.
references:
- Глазова О. П. Українська мова. 11 клас (2019), §1-10 — Культура мовлення, 
  ділове листування
- Авраменко О. М. Українська мова. 11 клас (2019) — Офіційно-діловий стиль
- Заболотний О. В. Українська мова. 11 клас (2019) — Стилістика ділового 
  мовлення
- 'State Standard 2024: B2 SS 3 — Professional communication themes'
