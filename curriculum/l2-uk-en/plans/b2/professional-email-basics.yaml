module: b2-065
level: B2
sequence: 65
slug: professional-email-basics
version: '2.0'
title: 'Ділова пошта: Основи'
subtitle: Business Email Structure and Tone
focus: skills
pedagogy: CBI
phase: B2.7
word_target: 4000
objectives:
- Learner can write professional emails with appropriate structure and tone
- Learner can use formal register vocabulary in business correspondence
- Learner can recognize and apply email conventions (subject lines, greetings, closings)
- Learner can apply cultural norms in Ukrainian business communication
content_outline:
- section: 'Вступ: Етика та культура ділового листування (Introduction: Ethics and Culture of Business Correspondence)'
  words: 600
  points:
  - Роль електронної пошти як основного інструменту професійної комунікації в Україні та її відмінність від особистого спілкування
  - 'Культурний аспект: Високий рівень формальності та обов''язкове вживання займенника «Ви» з великої літери при зверненні
    до конкретної особи для вияву поваги'
  - 'Етикет вітання: Спростування популярного міфу про «Доброго дня!» (родовий відмінок побажання при прощанні) на користь
    нормативних «Добрий день!» або «Вітаю!»'
  - 'Різниця між «сухим/бюрократичним» та «професійним/ввічливим» тоном: як зберігати людяність та конструктивність у межах
    офіційно-ділового стилю'
- section: Структура та оформлення листа (Structure and Formatting of the Letter)
  words: 800
  points:
  - 'Золоте правило теми листа (Subject Line): Уникнення нечіткості (наприклад, «Питання», «Важливо») на користь конкретних
    підсумків (наприклад, «Запит щодо контракту №123»)'
  - 'Стандартна архітектура ділового листа: Тема -> Звертання -> Контекст -> Основна частина -> Заклик до дії (Call to Action)
    -> Завершення та підпис'
  - 'Варіанти офіційних звертань: Правила вживання кличного відмінка («Шановний пане Олександре!», «Вельмишановна пані Олено!»)'
  - 'Формули завершення та підпису: Вибір між «З повагою», «З найкращими побажаннями» та «Щиро Ваш/а» залежно від ступеня
    знайомства'
- section: Мовні особливості та професійна лексика (Linguistic Features and Professional Vocabulary)
  words: 1000
  points:
  - 'Офіційно-діловий регістр: Вживання термінів та понять (термін дії, ключове поняття, робочий процес, метод розрахунку)
    згідно з частотністю вживання'
  - 'Явище номіналізації: Трансформація дієслів у іменники для надання офіційності (наприклад, «ми вирішили» -> «прийняття
    рішення») згідно з §4.2.6 Державного стандарту'
  - 'Використання ввічливих конструкцій та модальності: «Будь ласка», «Чи не могли б Ви», «Просимо Вашого сприяння»'
  - 'Позитивне формулювання запитів: перетворення негативних або різких фраз (наприклад, «Ви не надіслали») на конструктивні
    («Чекаємо на Ваші матеріали для завершення аналізу»)'
- section: Робота над помилками та типові кальки (Error Correction and Common Calques)
  words: 800
  points:
  - 'Виправлення поширених помилок-кальок (суржик): «брати участь» замість «приймати участь», «протягом» замість «на протязі»'
  - 'Типові помилки керування в діловій мові: «вживати заходів» замість «приймати міри», «згідно з...» (вживання з орудним
    відмінком)'
  - 'Уникнення регістрової плутанини: Чому не варто використовувати напівформальні вітання («Привіт», «Доброго часу доби»)
    у першому діловому контакті'
  - 'Аналіз та редагування зразків листів: Трансформація неформального або помилкового повідомлення на грамотний професійний
    лист'
- section: Типологія та практичне застосування (Typology and Practical Application)
  words: 800
  points:
  - 'Реалізація вимог стандарту (§1.3.1.1): Практика написання листів-запитів (прохання про інформацію) та листів-подяк (висловлення
    вдячності)'
  - 'Лист-відповідь та лист-пояснення: Структура фрази «У відповідь на Ваш лист...» та надання обґрунтованого контексту'
  - 'Лист-нагадування: Як делікатно та професійно нагадати про терміни без зайвої категоричності'
  - 'Підсумкова практика: Створення повного тексту ділового листа за заданою ситуацією (наприклад, запит до компанії щодо
    надання послуг)'
vocabulary_hints:
  required:
  - брати участь (to participate) — виправлення кальки «приймати участь»
  - протягом (during) — виправлення кальки «на протязі» (протягом терміну дії)
  - вживати заходів (to take measures) — виправлення кальки «приймати міри»
  - синтез (synthesis) — логічне завершення аналізу
  - аналіз (analysis) — детальний аналіз, аналіз ринку, на основі аналізу; ключова компетенція рівня B2
  recommended:
  - брати участь (to participate) — виправлення кальки «приймати участь»
  - протягом (during) — виправлення кальки «на протязі» (протягом терміну дії)
  - вживати заходів (to take measures) — виправлення кальки «приймати міри»
  - синтез (synthesis) — логічне завершення аналізу
  - дослідження (research) — обґрунтування пропозиції у листі
