module: b2-069
level: B2
sequence: 69
slug: professional-email-basics
version: '1.0'
title: "Ділова переписка: Основи електронного листування"
subtitle: "Professional Email: Basics of Electronic Correspondence"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати стандартну структуру ділового електронного листа в українській мові."
  - "Вивчити етикетні формули звертання, привітання та завершення листа залежно від статусу адресата."
  - "Навчитися формулювати чіткі та лаконічні теми листів (Subject lines)."
  - "Відпрацювати навички написання базових типів професійних імейлів (запит, підтвердження, запрошення)."

reading_situations:
  - source_type: "корпоративні стандарти"
    topic: "Кодекс електронної комунікації сучасної української компанії."
    key_elements: ["тайм-менеджмент у відповідях", "корпоративний підпис", "використання копій (CC/BCC)", "додатки"]
    motivation: "Розуміння технічних та етичних аспектів сучасного ділового листування."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть імейл-запит до потенційного партнера з проханням надати детальну інформацію про умови співпраці."
    motivation: "Тренування навичок ввічливого запиту інформації в офіційному контексті."
    requirements: ["використання формул 'Шановний/-а...', 'З повагою...'", "чітко сформульована мета запиту", "логічний поділ на абзаци"]
    model_answer: "Лист має містити: професійну тему, ввічливе звертання, стислу презентацію автора/компанії, конкретні запитання та вираз сподівання на подальшу співпрацю."

content_outline:
  - section: "Анатомія ділового електронного листа"
    words: 1000
    subsections:
      - "Важливість теми листа (Subject line): інформативність та привернення уваги"
      - "Логічна структура: звертання, вступ, основна частина, заклик до дії, підпис"
      - "Оформлення додатків (Attachments) та гіперпосилань у тексті"
    key_concepts:
      - "структурування"
      - "адресат"
      - "інформативність"
      - "лаконічність"
  - section: "Мовленнєвий етикет та формули ввічливості"
    words: 1000
    subsections:
      - "Диференціація звертань залежно від дистанції: офіційні, напівофіційні та внутрішні"
      - "Стандартні кліше для початку та завершення листа ('Маю надію на...', 'Буду вдячний за...')"
      - "Відмова та вибачення в електронному листі: як зберегти професійні стосунки"
    key_concepts:
      - "мовленнєвий етикет"
      - "дистанція"
      - "кліше"
      - "коректність"
  - section: "Стилістика офіційно-ділового мовлення в імейлах"
    words: 1000
    subsections:
      - "Запобігання двозначності та зайвій емоційності в діловій переписці"
      - "Використання пасивних конструкцій та дієслівних іменників для надання офіційності"
      - "Боротьба з канцеляризмами та штампами: як писати 'живою' діловою мовою"
    key_concepts:
      - "офіційність"
      - "нейтральність"
      - "канцеляризм"
      - "однозначність"
  - section: "Базові жанри професійних повідомлень"
    words: 1000
    subsections:
      - "Лист-запит та лист-відповідь на запит: структура та лексика"
      - "Лист-запрошення на зустріч або захід"
      - "Лист-подяка та лист-підтвердження отримання інформації/документів"
    key_concepts:
      - "жанр"
      - "комунікативна мета"
      - "підтвердження"
      - "запит"

vocabulary:
  required:
    - листування
    - адресат
    - вкладення
    - подяка
    - звертання
    - співпраця
    - запит
    - уточнення
  recommended:
    - лаконічність
    - змістовність
    - коректність
    - оперативність
    - взаємовигідний

activities:
  types_required:
    - fill-in
    - match-up
    - unjumble
    - select
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "checkpoint-lexicology"
  next: "professional-email-advanced"
