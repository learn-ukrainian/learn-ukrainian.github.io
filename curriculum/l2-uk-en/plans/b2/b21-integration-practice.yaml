vocabulary_hints:
  required:
  - термін (term) — науковий термін, вживати термін, визначення терміна; High frequency
    Academic Core.
  - поняття (concept) — базове поняття, розширити поняття, підмінити поняття; High
    frequency Academic Core.
  - процес (process) — навчальний процес, процес розвитку, незворотний процес; High
    frequency General/Academic.
  - метод (method) — метод дослідження, ефективний метод, застосовувати метод; High
    frequency General/Academic.
  recommended:
  - аналіз (analysis) — глибокий аналіз, порівняльний аналіз, зробити аналіз; High
    frequency Academic Core.
  - синтез (synthesis) — хімічний синтез, синтез мистецтв, аналіз і синтез; Medium
    frequency Academic.
  - дослідження (research) — наукове дослідження, результати дослідження, проводити
    дослідження; High frequency Academic Core.
