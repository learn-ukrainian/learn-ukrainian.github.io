title: Інтеграційна практика B2.1
subtitle: B2.1 Integration Practice
content_outline:
- section: Огляд та стилістичний контекст (Overview and Stylistic Context)
  words: 600
  points:
  - 'Огляд ключових тем B2.1: чотири форми пасивного стану, активні та пасивні дієприкметники
    (§4.1.3.1) та розрізнення регістрів мовлення (§4.4.1).'
  - 'Культурний контекст: Інститут української наукової мови (1921-1930) та розробка
    словників на основі живої народної мови проти калькування.'
  - 'Лінгвоцид 1930-х: репресії проти мовознавців та штучне наближення термінології
    до російської (наприклад, заміна питомих слів ''тями'' на ''поняття'').'
  - 'Деколонізація мови: сучасне повернення до питомої наукової термінології як акт
    відновлення національної ідентичності в офіційному та науковому стилях.'
- section: Офіційний регістр та пасивні конструкції (Official Register and Passive
    Constructions)
  words: 900
  points:
  - 'Аналіз офіційного документа: розпізнавання канцеляризмів та стандартних мовних
    формул у постановах, статутах або ділових листах.'
  - 'Типова помилка: зловживання пасивними конструкціями на кшталт ''Книга була прочитана
    мною'' (калька з англійської) — заміна на природні безособові форми (''Книгу прочитано'').'
  - 'Проблема агенса в орудному відмінку: аналіз конструкцій типу ''Це зроблено студентом''
    та їхня трансформація в активний стан (''Це зробив студент'') для природності.'
  - 'Стилістичний практикум: трансформація офіційного повідомлення у розмовний стиль
    з використанням еліпсису, вставних слів та емоційної лексики (§4.4.1).'
- section: Публіцистичний стиль та новини (Publicistic Style and News)
  words: 800
  points:
  - 'Читання політичних та економічних новин: структура заголовка, роль дієприкметників
    та дієприкметникових зворотів у лаконічному викладі фактів.'
  - 'Граматичний фокус: усунення помилок на узгодження дієприкметників із іменниками
    в роді, числі та відмінку (наприклад, ''проблема вирішена'', а не ''вирішений'').'
  - 'Лексичний аналіз: доменна лексика (політика, право, економіка) та вживання синонімів
    для підвищення стилістичної якості публіцистичного тексту.'
  - 'Творче завдання: написання ''ліду'' (вступного абзацу) до новини з використанням
    активних дієприкметників та засобів логічного наголосу.'
- section: Науковий опис та термінологія (Scientific Description and Terminology)
  words: 900
  points:
  - 'Аналіз науково-популярного тексту: функціонування термінів та понять (термін,
    поняття, процес, метод) у контексті наукової точності та логічності.'
  - 'Граматика наукового стилю: номіналізація та використання безособових конструкцій
    як засобів досягнення об''єктивності викладу (§4.1.3.1).'
  - 'Регістрова гнучкість: порівняння наукового та офіційного стилів — спільні риси
    (стандартність) та суттєві відмінності в синтаксичній структурі.'
  - 'Спрощення (Demystification): техніка перекладу складного наукового визначення
    у зрозуміле пояснення для розмовного регістру без втрати змісту.'
- section: Інтеграційний практикум та самооцінка (Integration Practice and Self-Assessment)
  words: 800
  points:
  - 'Комплексна вправа ''Одна подія — три стилі'': опис економічного явища у форматі
    офіційного звіту, новини та приватного обговорення.'
  - 'Фінальна корекція: чек-лист на типові помилки (англомовні кальки пасиву, неправильний
    орудний агенса, незграбні дієприкметникові звороти).'
  - 'Перевірка компетенцій B2: самооцінка володіння стилістичними засобами фонетики,
    лексики та синтаксису згідно з Державним стандартом (§4.4.1).'
  - Рекомендації щодо заповнення лексичних прогалин та підготовка до фінальної контрольної
    точки курсу B2.1.
