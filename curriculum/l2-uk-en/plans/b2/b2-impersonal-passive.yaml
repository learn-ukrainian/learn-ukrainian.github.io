module: b2-003
level: B2
sequence: 3
slug: b2-impersonal-passive
version: 1.4.1
title: Безособові пасивні конструкції на -но, -то
subtitle: Безособові пасивні форми на -но, -то
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Усвідомлювати переваги безособових форм на -но, -то над дієприкметниковими для акцентування результату.
- Правильно утворювати безособові форми від дієслів доконаного виду.
- Суворо дотримуватися норми щодо невживання орудного відмінка діяча при цих формах.
- Використовувати конструкції на -но, -то в офіційно-діловому та публіцистичному стилях для надання об'єктивності.
reading_situations:
- source_type: новина
  topic: Успішне завершення будівництва найбільшого в Європі мосту
  key_elements:
  - збудовано
  - впроваджено
  - обладнано
  - підготовлено до експлуатації
  motivation: Аналіз безособових форм у повідомленні про досягнення та інфраструктурні результати.
listening_situations:
- media_type: інтерв'ю
  setting: Брифінг представника Міністерства внутрішніх справ про хід операції.
  focus_points:
  - Які конкретні заходи було вчинено?
  - Чи називає спікер виконавців?
  - Виокремити форми 'затримано', 'вилучено', 'попереджено'.
  motivation: Розпізнавання специфіки офіційно-ділового стилю в усному мовленні.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть звітний репортаж про проведення благодійного марафону у вашому місті.
  requirements:
  - мінімум 180 слів
  - використати конструкції на -но, -то для опису етапів події
  - уникати вживання діяча в орудному відмінку
  motivation: Практикування лаконічного та інформативного викладу подій.
  model_answer: 'Репортаж має фокусуватися на цифрах та фактах. Приклад: ''Марафон розпочато о 9:00. Зібрано понад мільйон
    гривень. Усі кошти передано фонду.'' Модель вказує на те, що додаток має бути у знахідному відмінку (зібрано кошти, а
    не коштами).'
discussion_topics:
- context: 'Правоохоронна система та прозорість: чи достатньо інформації ми отримуємо?'
  questions:
  - Чому в новинах часто вживаються форми 'затримано', 'відкрито провадження' без імен?
  - Чи сприяє такий стиль мовлення об'єктивності?
  motivation: Обговорення ролі граматики у формуванні суспільної думки.
content_outline:
- section: Безособовість як маркер результативності дії
  words: 1000
  subsections:
  - Відмінність між ознакою (книга прочитана) та дією-результатом (книгу прочитано).
  - 'Специфіка керування: Знахідний відмінок об''єкта (прочитано статтю).'
  - Творення форм від основи минулого часу дієслів.
- section: Граматичне табу та культура мовлення
  words: 1200
  subsections:
  - Чому не можна казати 'закон прийнято радою' (акцент на помилці-кальці).
  - 'Розмежування діяча (особи) та інструмента (неістоти): ''написано поетом'' (НІ) vs ''написано пером'' (ТАК).'
  - Трансформація помилкових конструкцій у правильні активні або пасивні.
- section: Стилістичний діапазон та функціональність форм
  words: 1000
  subsections:
  - 'Офіційні документи: акти, накази, протоколи.'
  - Ефект неминучості в поезії та народній творчості (На роду написано).
  - Вживання допоміжного дієслова 'було' для вираження часу (було зроблено).
- section: Практикум та синтетичний аналіз
  words: 800
  subsections:
  - Перетворення активного звіту на пасивний (офіційний).
  - Редагування тексту з нагромадженням канцеляризмів.
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
  - збудовано
  - продано
  - прийнято
  - вилучено
  - затримано
  - вчинено
  - оприлюднено
  recommended:
  - розглянуто
  - схвалено
  - попереджено
  - встановлено
activities:
  types_required:
  - error-correction
  - translate
  - fill-in
  - select
  min_items_per_type: 6
  total_min_items: 25
activity_hints:
- type: cloze
  focus: Доповнити речення безособовими формами на -но/-то від поданих дієслів
- type: error-correction
  focus: Вилучити неправильний орудний відмінок діяча з речень на -но/-то (закон прийнято радою→рада прийняла закон)
- type: select
  focus: Визначити, коли доречна форма на -но/-то, а коли активна конструкція
- type: fill-in
  focus: Трансформувати активне речення в безособове на -но/-то зі збереженням змісту
references:
- source: Караман, 10 клас (2018)
  pages: §77, с. 191–193
  topic: Безособові форми на -но, -то
- source: Глазова, 11 клас (2019)
  pages: §22, с. 97
  topic: Синтаксичні конструкції з дієслівними формами на -но, -то
- source: Авраменко, 11 клас (2019)
  pages: §25, с. 81–82
  topic: Безособові форми на -но/-то vs дієприкметники-присудки
connects_to:
  previous: past-passive-participles
  next: reflexive-passive
prerequisites:
- past-passive-participles
grammar:
- Impersonal forms on -но, -то
- Accusative case for the object (керування)
- Exclusion of the agent in Instrumental case
- Auxiliary verb 'було' for past tense
register: офіційно-діловий, публіцистичний
