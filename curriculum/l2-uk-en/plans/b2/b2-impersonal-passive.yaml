content_outline:
- section: 'Вступ: Поняття безособовості (Introduction: Concept of Impersonality)'
  words: 500
  points:
  - 'Концепція безособовості в українській мові: фокус на результаті дії, а не на її виконавцеві.'
  - 'Державний стандарт (§4.3.3.1): безособові речення як засіб об''єктивного опису дійсності.'
  - 'Культурний контекст: фаталізм у фразах «Так судилося» або «Так написано» (Шевченко, Франко) як контраст до офіційного
    стилю.'
- section: Творення та граматичні особливості (Formation and Grammatical Features)
  words: 800
  points:
  - 'Трансформація: від пасивного дієприкметника на -ний/-тий до незмінної форми на -но/-то (написаний → написано).'
  - Правило вибору суфікса -но/-то залежно від основи дієслова; наголошування та чергування.
  - 'Незмінність форми: чому конструкції на -но/-то завжди вживаються у формі середнього роду без узгодження з об''єктом.'
  - 'Відмінність між станом («Вікно розбите») та дією («Вікно розбито»): коли вживати кожну з форм.'
- section: Синтаксис та керування об'єктом (Syntax and Object Governance)
  words: 900
  points:
  - 'Головне правило: об''єкт у знахідному відмінку (Accusative), а не в називному (Книгу написано, а не Книга написано).'
  - 'Заборона на орудний відмінок діяча: чому не можна казати «Книгу написано мною» і як це замінити активним станом.'
  - 'Відсутність підмета як ключова ознака речення: синтаксичний розбір типових конструкцій.'
  - Порівняння з іншими типами безособових речень (на -ло, -ся) для чіткого розмежування функцій.
- section: Офіційно-діловий та юридичний стиль (Official and Legal Registers)
  words: 1000
  points:
  - 'Висока частотність у документах: накази, протоколи, постанови (Засідання оголошено закритим).'
  - 'Юридична мова: вживання «Рішення прийнято», «Закон затверджено» для надання тексту нейтральності.'
  - 'Адміністративний контекст: «Встановлено порушення», «Строк визначено» — розбір реальних прикладів.'
  - 'Специфіка вживання в медіа: «Новину підтверджено», «Оголошено повітряну тривогу» — аналіз актуальних контекстів.'
- section: Практика та запобігання помилкам (Practice and Error Prevention)
  words: 800
  points:
  - 'Типова помилка №1: Плутанина між суб''єктом і об''єктом (виправлення називного відмінка на знахідний).'
  - 'Типова помилка №2: Спроба додати виконавця в орудному відмінку (перефразування в активний стан).'
  - 'Стилістичні вправи: трансформація активних речень у пасивні безособові для офіційних звітів.'
  - 'Підсумок: роль конструкцій на -но/-то у формуванні професійної компетенції рівня B2 та підготовка до модуля 06.'
vocabulary_hints:
  required:
  - безособовий (impersonal) — безособова конструкція, безособове речення
  - оголошено (announced/declared) — оголошено перерву, оголошено набір, оголошено тривогу; дуже висока частотність у медіа
  - прийнято (accepted/adopted) — рішення прийнято, закон прийнято, постанову прийнято; стандарт юридичної мови
  - встановлено (established/set) — особу встановлено, факт встановлено, порушення встановлено; адмін/тех контекст
  - заборонено (prohibited) — вхід заборонено, суворо заборонено, рух заборонено; загальновживаний імператив
  - завершено (completed) — роботу завершено, будівництво завершено, засідання завершено
  - рішення (decision) — прийняти рішення, оскаржити рішення, остаточне рішення
  - засідання (meeting/session) — відкрити засідання, порядок денний засідання, протокол засідання
  recommended:
  - затверджено (approved) — статут затверджено, план затверджено; офіційний гриф
  - скасовано (cancelled/annulled) — наказ скасовано, рішення скасовано, рейс скасовано
  - підтверджено (confirmed) — інформацію підтверджено, особу підтверджено; медіа-контекст
  - виконано (executed/done) — план виконано, завдання виконано, доручення виконано
  - зроблено (done/made) — зроблено в Україні, висновки зроблено, усе зроблено
