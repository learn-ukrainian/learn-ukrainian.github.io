title: Регістр — Релігійна мова в Україні
subtitle: Мова духовності всіх конфесій (ПЦУ, УГКЦ, РКЦ, протестанти, юдаїзм, іслам)
focus: grammar
pedagogy: TTT
phase: B2.3 [Register System]
word_target: 4000
objectives:
- Учень може розпізнавати характерні ознаки релігійного стилю
- Учень може писати формальні та неформальні листи українською
- Учень може трансформувати текст між формальним та неформальним регістрами
content_outline:
- section: Вступ — Регістри високого стилю (Introduction — High Style Registers)
  words: 600
  points:
  - 'Визначення релігійного та епістолярного стилів відповідно до Державного стандарту (§4.4.1.1), акцент на спільній базі:
    високій культурі мовлення та повазі до адресата.'
  - 'Культурний контекст: Пересопницьке Євангеліє (1556–1561) як символ поєднання сакрального слова та народної мови, на якому
    присягають Президенти України.'
  - 'Розрізнення архаїчної церковної урочистості та сучасної ділової етики: пошук точок дотику у вишуканості висловлювань.'
- section: Релігійний стиль — Мова духовності (Religious Style — Language of Spirituality)
  words: 900
  points:
  - 'Лексичний пласт: літургійна та біблійна термінологія (Господь, благословіння, молитва, храм, парафія, священник) та піднесена
    лексика (воістину, всемогутній).'
  - 'Формульні вислови та сталі конструкції: ''Слава Богу!'', ''Христос воскрес! – Воістину воскрес!''; використання частотної
    лексики з релігійних джерел.'
  - 'Аналіз сакрального тексту: розпізнавання ознак стилю (метафоричність, символізм, урочиста інтонація).'
- section: Епістолярний стиль — Від класики до цифрової доби (Epistolary Style — From Classics to Digital Age)
  words: 900
  points:
  - 'Історія жанру: листування Лесі Українки та Ольги Кобилянської як взірець інтимно-епістолярного стилю з унікальними формами
    звертання (''Хтось'').'
  - Василь Стефаник про роль листування у літературному процесі; епістолярій як самостійний вид мистецтва.
  - 'Сучасна ділова переписка: цифрові формули (''У вкладенні надсилаю...'', ''Заздалегідь вдячний'') та етикетні кліше (''Шановний
    пане'', ''З повагою'', ''Щиро Ваш'').'
- section: Граматика — Мистецтво звертання (Grammar — The Art of Address)
  words: 800
  points:
  - 'Глибоке занурення у кличний відмінок (§4.1.2.7): суб’єкт дії та адресат ідентифікації. Аналіз типової помилки ''Привіт,
    Андрій!'' проти правильного ''Привіт, Андрію!''.'
  - 'Складні випадки кличного відмінка: іменники м’якої групи на -р (Ігорю, не Ігоре) та правила відмінювання прізвищ у конструкціях
    ''пан + прізвище'' (пан Коваль).'
  - Спростування кальки 'Доброго дня!' як вітання; розрізнення констатації факту ('Добрий день!') та побажання ('Доброго дня!'
    — у родовому відмінку).
- section: Практика та трансформація (Practice and Transformation)
  words: 800
  points:
  - Написання формального листа (скарга, запит) та неформального листа другові з дотриманням відповідного регістру та кличного
    відмінка.
  - 'Вправа на стилістичну трансформацію: переклад нейтрального повідомлення у релігійний/урочистий регістр та навпаки.'
  - Виправлення помилок у звертаннях та етикетних формулах на основі реальних кейсів (learner errors), задокументованих у
    дослідженні.
vocabulary_hints:
  required:
  - Господь (Lord) — Господь Бог, слава Господу, Господня воля; висока частотність у релігійному регістрі.
  - благословіння (blessing) — просити благословіння, Боже благословіння; вживається у релігійному та офіційно-урочистому
    контекстах.
  - воістину (truly/indeed) — 'Воістину воскрес!', 'воістину так'; маркер піднесеного, книжного стилю.
  - шановний (respected/dear) — 'Шановний пане', 'Шановна громадо'; ключове звертання в епістолярному стилі.
  - вкладення (attachment) — 'файл у вкладенні', 'у вкладенні надсилаю'; термін цифрової комунікації.
  - щиро (sincerely) — 'щиро Ваш', 'щиро вдячний'; стандартна формула завершення листа.
  - парафія (parish) — 'наша парафія', 'належати до парафії'; специфічна церковна лексика.
  - кличний відмінок (vocative case) — категорія адресата (§4.1.2.7); критично для правильного звертання.
  recommended:
  - Пересопницьке Євангеліє (Peresopnytske Gospel) — культурний символ; перший переклад староукраїнською літературною мовою.
  - епістолярний (epistolary) — 'епістолярна спадщина', 'епістолярний жанр'.
  - звертання (address) — 'форма звертання', 'ввічливе звертання'.
  - калькування (calquing) — 'уникати калькування з російської'; стосується помилки 'Доброго дня!'.
