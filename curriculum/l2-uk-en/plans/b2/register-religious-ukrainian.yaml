module: b2-036
level: B2
sequence: 36
slug: register-religious-ukrainian
version: '1.2'
title: "Конфесійний (релігійний) стиль"
subtitle: "Religious (Confessional) Style"
focus: religious texts and traditions
pedagogy: PPP
phase: "B2.2a [Stylistics & Register]"
word_target: 4000
objectives:
  - "Ознайомитися з особливостями конфесійного стилю (урочистість, піднесеність, традиційність)."
  - "Вивчити специфічну релігійну термінологію та церковнослов'янські запозичення в сучасній українській мові."
  - "Зрозуміти роль релігійного стилю у формуванні української національної ідентичності та культури."
  - "Навчитися аналізувати тексти молитов, проповідей та богослужбових книг."
  - "Опанувати етикетні норми спілкування в релігійному середовищі."

reading_situations:
  - source_type: "уривок із Біблії / проповідь / богослужбовий текст"
    topic: "Аналіз сучасного перекладу Псалмів або фрагмента проповіді відомого українського церковного діяча (наприклад, Любомира Гузара)."
    key_elements: ["старослов'янізми", "інверсія", "риторичні звертання", "символіка світла і темряви"]
    motivation: "Розуміння найдавнішого та найбільш сталого регістру української мови."

listening_situations:
  - media_type: "церковний спів / трансляція богослужіння / духовна бесіда"
    setting: "Прослуховування літургійного співу або виступу на релігійну тематику в медіа."
    focus_points: ["Виявлення архаїчних форм слів.", "Сприйняття особливої ритміки та мелодики мовлення.", "Розуміння ключових теологічних понять."]
    motivation: "Тренування сприйняття урочистого, повільного та змістовного мовлення."

writing_tasks:
  - task_type: "духовне есе / роздум"
    prompt: "Напишіть роздум на тему загальнолюдських цінностей (милосердя, прощення, любов), використовуючи лексичні засоби конфесійного стилю."
    requirements:
      - "використання щонайменше 5 релігійних термінів або епітетів"
      - "дотримання урочистого та піднесеного тону"
      - "мінімум 150 слів"
      - "наявність риторичних запитань або звертань"
    motivation: "Практика використання високого стилю для вираження абстрактних та духовних понять."
    model_answer: "Есе має бути витримане в урочистому тоні. Очікується вживання таких слів, як 'благодать', 'смирення', 'возлюбити', 'ближній'. Текст повинен містити інверсію (наприклад, 'серце чисте', 'шлях праведний') та риторичні фігури. Основний акцент має бути на морально-етичних аспектах, що виходять за межі суто релігійної догматики."

discussion_topics:
  - context: "Роль релігійної лексики в сучасній світській мові: фразеологізми біблійного походження."
    questions:
      - "Які біблійні вирази ми використовуємо щодня, не замислюючись про їхнє походження?"
      - "Як конфесійний стиль впливає на художню літературу?"
      - "Чи зберігає церква мовну традицію краще за інші інституції?"
    motivation: "Усвідомлення глибинного зв'язку між релігійним дискурсом та загальномовною культурою."

content_outline:
  - section: "Специфіка конфесійного дискурсу"
    words: 800
    subsections:
      - "Призначення стилю: сакральна комунікація та зв'язок з Богом"
      - "Урочистість та експресивність як визначальні домінанти"
      - "Консерватизм та тяглість традиції в церковній мові"
      - "Вплив конфесійного стилю на формування літературного стандарту"
    key_concepts:
      - "сакральність"
      - "урочистість"
      - "канонічність"
      - "догматизм"
  - section: "Мовні засоби сакрального"
    words: 1200
    subsections:
      - "Лексичний склад: теологічні терміни, назви обрядів та церковних чинів"
      - "Роль церковнослов'янізмів у сучасному контексті: архаїчність як ознака святості"
      - "Специфічна сполучуваність слів та сталі епітети (благий, пречистий)"
      - "Антропоніми та топоніми в релігійних текстах як символічні знаки"
      - "Символіка та метафоричність релігійного мовлення"
    key_concepts:
      - "архаїзм"
      - "теологема"
      - "старослов'янізм"
      - "метафора"
  - section: "Синтаксис та риторика проповіді"
    words: 1000
    subsections:
      - "Ритмічна організація тексту та синтаксичні паралелізми"
      - "Використання кличного відмінка та риторичних звертань"
      - "Інверсія як засіб надання мовленню піднесеності"
      - "Жанрові особливості: молитва, проповідь, псалом, послання"
      - "Перформативність релігійного мовлення: благословення та прокляття"
    key_concepts:
      - "паралелізм"
      - "кличний відмінок"
      - "інтонація"
      - "перформатив"
  - section: "Релігійна культура та етикет"
    words: 1000
    subsections:
      - "Норми звертання до духовенства та ієрархія титулів в Україні"
      - "Лексика релігійних свят: від Різдва до Великодня (традиції та привітання)"
      - "Етика поведінки в храмі та вербальні норми релігійної громади"
      - "Конфесійна толерантність та міжрелігійний діалог у мові"
    key_concepts:
      - "титулування"
      - "обрядовість"
      - "толерантність"
      - "етикет"

vocabulary:
  required:
    - віра
    - храм
    - молитва
    - проповідь
    - благословення
    - гріх
    - спасіння
    - милосердя
  recommended:
    - благочестя
    - смирення
    - сповідь
    - пастир
    - заповідь
    - вічність
    - причастя
    - благодать

activities:
  types_required:
    - quiz
    - match-up
    - fill-in
    - select
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: match-up
    focus: "Зіставити конфесійну лексику (благодать, сповідь, причастя) з тлумаченням"
  - type: select
    focus: "Визначити маркери конфесійного стилю у запропонованому тексті"
  - type: fill-in
    focus: "Доповнити церковну формулу або релігійне привітання правильним словом"
  - type: reading
    focus: "Проаналізувати текст проповіді або молитви: виявити архаїзми, інверсію, урочистий тон"

references:
  - source: "Караман, 10 клас (2018)"
    pages: "Стилістика"
    topic: "Конфесійний стиль мовлення"
  - source: "Ворон, 11 клас (2019)"
    pages: "Стилістика мовлення"
    topic: "Конфесійний стиль як окремий функціональний різновид"
  - source: "Державний стандарт 2024"
    pages: "SS 4.4"
    topic: "Стилістика (B2)"

