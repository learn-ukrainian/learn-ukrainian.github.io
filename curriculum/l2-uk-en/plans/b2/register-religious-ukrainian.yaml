vocabulary_hints:
  required:
  - Господь (Lord) — Господь Бог, слава Господу, Господня воля; висока частотність
    у релігійному регістрі.
  - благословіння (blessing) — просити благословіння, Боже благословіння; вживається
    у релігійному та офіційно-урочистому контекстах.
  - воістину (truly/indeed) — 'Воістину воскрес!', 'воістину так'; маркер піднесеного,
    книжного стилю.
  - шановний (respected/dear) — 'Шановний пане', 'Шановна громадо'; ключове звертання
    в епістолярному стилі.
  - вкладення (attachment) — 'файл у вкладенні', 'у вкладенні надсилаю'; термін цифрової
    комунікації.
  - щиро (sincerely) — 'щиро Ваш', 'щиро вдячний'; стандартна формула завершення листа.
  - парафія (parish) — 'наша парафія', 'належати до парафії'; специфічна церковна
    лексика.
  - кличний відмінок (vocative case) — категорія адресата (§4.1.2.7); критично для
    правильного звертання.
  recommended:
  - Пересопницьке Євангеліє (Peresopnytske Gospel) — культурний символ; перший переклад
    староукраїнською літературною мовою.
  - епістолярний (epistolary) — 'епістолярна спадщина', 'епістолярний жанр'.
  - звертання (address) — 'форма звертання', 'ввічливе звертання'.
  - калькування (calquing) — 'уникати калькування з російської'; стосується помилки
    'Доброго дня!'.
