title: Регістр — Релігійна мова в Україні
subtitle: Мова духовності всіх конфесій (ПЦУ, УГКЦ, РКЦ, протестанти, юдаїзм, іслам)
content_outline:
- section: Вступ — Регістри високого стилю (Introduction — High Style Registers)
  words: 600
  points:
  - 'Визначення релігійного та епістолярного стилів відповідно до Державного стандарту
    (§4.4.1.1), акцент на спільній базі: високій культурі мовлення та повазі до адресата.'
  - 'Культурний контекст: Пересопницьке Євангеліє (1556–1561) як символ поєднання
    сакрального слова та народної мови, на якому присягають Президенти України.'
  - 'Розрізнення архаїчної церковної урочистості та сучасної ділової етики: пошук
    точок дотику у вишуканості висловлювань.'
- section: Релігійний стиль — Мова духовності (Religious Style — Language of Spirituality)
  words: 900
  points:
  - 'Лексичний пласт: літургійна та біблійна термінологія (Господь, благословіння,
    молитва, храм, парафія, священник) та піднесена лексика (воістину, всемогутній).'
  - 'Формульні вислови та сталі конструкції: ''Слава Богу!'', ''Христос воскрес! –
    Воістину воскрес!''; використання частотної лексики з релігійних джерел.'
  - 'Аналіз сакрального тексту: розпізнавання ознак стилю (метафоричність, символізм,
    урочиста інтонація).'
- section: Епістолярний стиль — Від класики до цифрової доби (Epistolary Style — From
    Classics to Digital Age)
  words: 900
  points:
  - 'Історія жанру: листування Лесі Українки та Ольги Кобилянської як взірець інтимно-епістолярного
    стилю з унікальними формами звертання (''Хтось'').'
  - Василь Стефаник про роль листування у літературному процесі; епістолярій як самостійний
    вид мистецтва.
  - 'Сучасна ділова переписка: цифрові формули (''У вкладенні надсилаю...'', ''Заздалегідь
    вдячний'') та етикетні кліше (''Шановний пане'', ''З повагою'', ''Щиро Ваш'').'
- section: Граматика — Мистецтво звертання (Grammar — The Art of Address)
  words: 800
  points:
  - 'Глибоке занурення у кличний відмінок (§4.1.2.7): суб’єкт дії та адресат ідентифікації.
    Аналіз типової помилки ''Привіт, Андрій!'' проти правильного ''Привіт, Андрію!''.'
  - 'Складні випадки кличного відмінка: іменники м’якої групи на -р (Ігорю, не Ігоре)
    та правила відмінювання прізвищ у конструкціях ''пан + прізвище'' (пан Коваль).'
  - Спростування кальки 'Доброго дня!' як вітання; розрізнення констатації факту ('Добрий
    день!') та побажання ('Доброго дня!' — у родовому відмінку).
- section: Практика та трансформація (Practice and Transformation)
  words: 800
  points:
  - Написання формального листа (скарга, запит) та неформального листа другові з дотриманням
    відповідного регістру та кличного відмінка.
  - 'Вправа на стилістичну трансформацію: переклад нейтрального повідомлення у релігійний/урочистий
    регістр та навпаки.'
  - Виправлення помилок у звертаннях та етикетних формулах на основі реальних кейсів
    (learner errors), задокументованих у дослідженні.
