module: b2-041
level: B2
sequence: 41
slug: register-public-discourse
version: 1.0.2
title: 'Публічне мовлення: медійний та розмовний регістри'
subtitle: 'Публічне мовлення: медійний та розмовний регістри'
focus: grammar
pedagogy: TTT
word_target: 4000
phase: B2.3 [Stylistic Devices & Register]
objectives:
- Порівняти публіцистичний та розмовний стилі як два регістри публічного 
  мовлення.
- 'Опанувати засоби емоційного впливу в медіа: заголовки, оцінна лексика, риторичні
  запитання.'
- Вивчити розмовну лексику, синтаксис та невербальні засоби комунікації.
- Розвинути навички критичного аналізу медіатекстів та культуру неформального 
  спілкування.
reading_situations:
- source_type: онлайн-новина + коментарі
  topic: 'Аналітична стаття на ''Українській правді'' та коментарі читачів під нею:
    порівняння регістрів.'
  key_elements:
  - публіцистичні засоби (оцінна лексика, риторичні запитання)
  - розмовний стиль коментарів (сленг, еліпсис, вигуки)
  motivation: Порівняння двох регістрів публічного мовлення на одному матеріалі.
listening_situations:
- media_type: відео
  setting: Фрагмент випуску новин (офіційний тон) та фрагмент розмовного влогу 
    (невимушений тон) на одну тему.
  focus_points:
  - різниця в лексиці та інтонації
  - засоби емоційного впливу
  - сленг та вигуки
  motivation: Тренування розпізнавання регістру на слух.
writing_tasks:
- task_type: переписування
  prompt: 'Перепишіть одну новину у двох стилях: 1) як публіцистичну замітку; 2) як
    повідомлення другу в месенджері. Порівняйте мовні засоби.'
  requirements:
  - загалом мінімум 300 слів
  - 'публіцистичний: заголовок, лід, нейтральна оцінка'
  - 'розмовний: вигуки, скорочення, емоції'
  motivation: Практика свідомого перемикання між регістрами.
  model_answer: 'Публіцистичний: ''Міська рада ухвалила рішення про будівництво нового
    парку.'' Розмовний: ''Ти чув?? Нарешті парк будуватимуть! Капець як довго чекали!'''
discussion_topics:
- context: 'Соціальні мережі: нове медіа чи загибель журналістики?'
  questions:
  - Чи замінять блогери традиційну журналістику?
  - У чому небезпека 'ехо-камер' у соціальних мережах?
  motivation: Дискусія про медіаграмотність та роль стилю в медіа.
dialogue_situations:
- setting: 'Двоє друзів обговорюють прочитану статтю: один цитує медіа, інший реагує
    розмовно.'
  roles:
  - друг 1 (цитує)
  - друг 2 (реагує)
  key_phrases:
  - в статті написано, що...
  - та ну, це ж клікбейт!
  - ого, а я не знав
- setting: 'Журналіст та респондент: офіційне інтерв''ю переходить у неформальну розмову.'
  roles:
  - журналіст
  - респондент
  key_phrases:
  - яка ваша думка щодо...
  - а якщо не для протоколу?
  - короче, все складно
content_outline:
- section: 'Публіцистичний стиль: інформування та вплив'
  words: 1000
  subsections:
  - 'Інформаційні жанри: замітка, репортаж, інтерв''ю — фокус на фактах'
  - 'Аналітичні жанри: стаття, коментар, огляд — фокус на причинах'
  - 'Засоби емоційного впливу: риторичні запитання, метафори, іронія'
  - 'Медіаграмотність: фактчекінг, виявлення маніпуляцій, клікбейту'
  key_concepts:
  - публіцистичність
  - медіаграмотність
  - оцінна лексика
- section: 'Розмовний стиль: невимушеність та експресія'
  words: 1000
  subsections:
  - 'Лексика: сленг, демінутиви, вигуки, фразеологізми повсякденності'
  - 'Синтаксис: неповні речення, еліпсис, парцеляція, самовиправлення'
  - 'Дискурсивні маркери: ну, типу, короче, от — функції та межі'
  - 'Цифрове спілкування: меми, емодзі, скорочення'
  key_concepts:
  - невимушеність
  - еліпсис
  - дискурсивний маркер
- section: 'Перемикання регістрів: від медіа до побуту'
  words: 1000
  subsections:
  - 'Code-switching: коли та чому ми змінюємо регістр'
  - 'Стилістичний дисонанс: канцеляризми в розмові, сленг у новинах'
  - 'Етикет цифрового спілкування: нетикет та його порушення'
  - Мовна гра та інтертекстуальність у побутовому мовленні
  key_concepts:
  - code-switching
  - стилістичний дисонанс
  - нетикет
- section: Критичний аналіз публічного мовлення
  words: 1000
  subsections:
  - 'Фреймінг та порядок денний: як медіа формують думку'
  - Мова ворожнечі та маніпулятивна лексика
  - Суржик та мовна чистота в публічному дискурсі
  - 'Активне громадянство: як бути грамотним споживачем медіа'
  key_concepts:
  - фреймінг
  - маніпуляція
  - суржик
- section: Підсумок — Summary
  words: 300
  points:
  - 'Publicistic and conversational styles utilize distinct linguistic tools: Publicistic
    employs evaluative vocabulary (оцінна лексика), framing, and rhetorical questions
    for impact, while conversational speech relies on discourse markers (ну, типу),
    slang, and incomplete sentences (еліпсис).'
  - 'Self-check: What is the difference between code-switching and stylistic dissonance?
    Identify 3 discourse markers common in informal Ukrainian. How would you spot
    manipulative framing or clickbait in a news article?'
vocabulary_hints:
- word: джерело
  translation: source
  context: Перевіряйте джерело інформації.
- word: репортаж
  translation: report, coverage
  context: Репортаж з місця подій.
- word: висвітлювати
  translation: to cover (media)
  context: ЗМІ висвітлюють подію по-різному.
- word: вплив
  translation: influence
  context: Вплив медіа на суспільну думку.
- word: оприлюднити
  translation: to make public, publish
  context: Результати оприлюднили вчора.
- word: класно
  translation: cool, great (colloquial)
  context: Це було класно!
- word: привіт
  translation: hi
  context: Привіт! Як справи?
- word: прикольно
  translation: cool, funny (slang)
  context: Прикольно, що ми зустрілися.
- word: капець
  translation: wow, oh no (slang)
  context: Капець, скільки роботи!
- word: короче
  translation: in short, basically (filler)
  context: Короче, вирішили їхати разом.
- word: клікбейт
  translation: clickbait
  context: Цей заголовок — типовий клікбейт.
- word: фейк
  translation: fake (news)
  context: Не поширюйте фейки — перевіряйте.
- word: маніпуляція
  translation: manipulation
  context: Маніпуляція через емоційні заголовки.
- word: спростувати
  translation: to refute, debunk
  context: Журналіст спростував фейкову новину.
- word: громадськість
  translation: public, community
  context: Громадськість вимагає прозорості.
- word: демінутив
  translation: diminutive
  context: Кавуся — це демінутив від 'кава'.
- word: еліпсис
  translation: ellipsis
  context: Еліпсис — пропуск частини речення.
- word: суржик
  translation: surzhyk (mixed language)
  context: Суржик — це змішування української і російської.
