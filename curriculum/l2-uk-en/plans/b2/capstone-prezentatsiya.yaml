module: b2-087
level: B2
sequence: 87
slug: capstone-prezentatsiya
version: '1.0'
title: "Випускний проєкт: Презентація та захист"
subtitle: "Capstone Project: Presentation and Defense"
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
  - "Підготувати професійну візуальну презентацію та усну доповідь за результатами випускного проєкту."
  - "Відпрацювати навички публічного виступу українською мовою перед аудиторією."
  - "Навчитися аргументовано відповідати на запитання та вести конструктивну дискусію."
  - "Зрозуміти принципи ефективної візуалізації даних та структурування слайдів українською мовою."

listening_situations:
  - media_type: "відео"
    setting: "Перегляд зразкового виступу на TEDx-Україна: аналіз структури та риторичних прийомів."
    focus_points: ["гачок (hook) на початку", "зв'язки між слайдами", "мова тіла та інтонація"]
    motivation: "Вивчення кращих практик публічного виступу."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть короткі тези (scripts) до вашої презентації для кожного слайда (обсягом 250-300 слів)."
    requirements:
      - "Використати вступні фрази: 'перейдемо до наступного слайда', 'зверніть увагу на графік', 'підсумовуючи сказане'."
      - "Чітко виділити головну думку кожного розділу."
      - "Підготувати 3-5 потенційних запитань від аудиторії та відповіді на них."
    motivation: "Підготовка змістовної частини виступу."
    model_answer: "Тези мають бути логічно структуровані, містити ключові факти та перехідні фрази для плавності виступу."

discussion_topics:
  - context: "Мистецтво переконання: як зробити свій захист незабутнім."
    questions:
      - "Які елементи візуалізації є найбільш ефективними для сприйняття?"
      - "Як подолати хвилювання перед публічним виступом українською мовою?"
      - "Яка роль ілюстрацій та графіків у науковій презентації?"
    motivation: "Обмін досвідом та розвиток навичок самопрезентації."

content_outline:
  - section: "Логіка та сценарій презентації"
    words: 1000
    subsections:
      - "Визначення цільової аудиторії та ключового повідомлення (message)"
      - "Створення сценарію (storyboarding): від ідеї до слайдів"
      - "Тайм-менеджмент: як вкластися у регламент"
    key_concepts:
      - "сценарій"
      - "аудиторія"
      - "повідомлення"
      - "регламент"
  - section: "Візуалізація та мовне оформлення слайдів"
    words: 1000
    subsections:
      - "Правила дизайну: менше тексту, більше змісту"
      - "Вибір шрифтів, кольорів та зображень: українська специфіка"
      - "Оформлення заголовків, графіків та діаграм українською мовою"
    key_concepts:
      - "візуалізація"
      - "інфографіка"
      - "заголовок"
      - "діаграма"
  - section: "Риторика та техніка публічного виступу"
    words: 1000
    subsections:
      - "Мовна культура: чіткість вимови, наголоси та інтонація"
      - "Риторичні прийоми для утримання уваги аудиторії"
      - "Невербальна комунікація: погляд, жести, постава"
    key_concepts:
      - "риторика"
      - "інтонація"
      - "артикуляція"
      - "харизма"
  - section: "Дискусія та взаємодія з аудиторією (Q&A)"
    words: 1000
    subsections:
      - "Слухання запитань та техніка перефразування для уточнення"
      - "Мистецтво відповідати на складні або провокаційні запитання"
      - "Етикет наукової та професійної дискусії"
    key_concepts:
      - "дискусія"
      - "опонент"
      - "аргументація"
      - "етикет"

vocabulary:
  required:
    - презентація
    - виступ
    - слайд
    - аудиторія
    - запитання
    - доповідь
    - теза
    - графік
  recommended:
    - переконливий
    - візуальний
    - лаконічний
    - інтерактивний
    - аргументований

activities:
  types_required:
    - critical-analysis
    - fill-in
    - unjumble
    - match-up
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "capstone-research"
  next: "b2-pidsumkovyy-ohlyad"
