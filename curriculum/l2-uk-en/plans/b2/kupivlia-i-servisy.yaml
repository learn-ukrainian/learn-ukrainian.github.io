module: b2-028
level: B2
sequence: 28
slug: kupivlia-i-servisy
version: '1.0'
title: "Купівля і послуги"
subtitle: "Купівля і послуги"
focus: thematic
pedagogy: TTT
word_target: 4000
phase: "B2.2 [Advanced Syntax & Stylistics]"
objectives:
  - "Вести переговори про купівлю товарів, повернення та гарантійне обслуговування."
  - "Обговорювати якість послуг, писати відгуки та скарги."
  - "Порівнювати покупки онлайн та офлайн, розбиратися в правах споживача."
  - "Інтегрувати складні синтаксичні конструкції (еліпсис, парцеляція) в побутовому
    контексті."

reading_situations:
  - source_type: "відгук на маркетплейсі"
    topic: "Добірка відгуків про товари та послуги на Rozetka: позитивні, негативні
      та маніпулятивні."
    key_elements: ["оцінна лексика", "порівняльні конструкції", "скорочення"]
    motivation: "Аналіз мовних засобів оцінювання та маніпуляції у відгуках."

listening_situations:
  - media_type: "відео"
    setting: "Розмова покупця з консультантом у магазині електроніки: вибір
      смартфона, порівняння моделей."
    focus_points: ["лексика технічних характеристик", "порівняльний ступінь",
      "прохання та поради"]
    motivation: "Розуміння діалогу в торговельному контексті."

writing_tasks:
  - task_type: "скарга"
    prompt: "Напишіть офіційну скаргу до інтернет-магазину: товар не відповідає
      опису, ви хочете повернення коштів."
    requirements:
      - "мінімум 250 слів"
      - "офіційно-діловий стиль (згідно з, відповідно до)"
      - "опис проблеми з конкретними деталями"
    motivation: "Практика написання офіційної скарги."
    model_answer: "Текст має бути чітким: 'Звертаюся до вас із скаргою щодо
      замовлення №12345 від 15 березня. Отриманий товар не відповідає опису на сайті.
      Відповідно до Закону про захист прав споживачів, вимагаю повернення коштів...'"

discussion_topics:
  - context: "Культура споживання: як війна змінила купівельні звички українців."
    questions:
      - "Чи стали українці свідомішими покупцями після 2022 року?"
      - "Чому підтримка українських виробників стала важливою?"
    motivation: "Обговорення зміни споживчої поведінки."

dialogue_situations:
  - setting: "Покупець повертає бракований товар у магазин."
    roles: ["покупець", "продавець"]
    key_phrases: ["я хочу повернути цей товар", "у вас є чек?", "ми можемо
      обміняти або повернути кошти"]
  - setting: "Клієнт замовляє послугу ремонту телефону в сервісному центрі."
    roles: ["клієнт", "майстер"]
    key_phrases: ["скільки коштуватиме ремонт?", "це займе два дні",
      "гарантія на ремонт — місяць"]

content_outline:
  - section: "Покупки: від ринку до маркетплейсу"
    words: 1000
    subsections:
      - "Типи магазинів: базар, супермаркет, бутік, інтернет-магазин"
      - "Онлайн-покупки: кошик, оплата, доставка, відстеження"
      - "Торгування на ринку: мовні формули та етикет"
      - "Порівняння товарів: характеристики, ціна, відгуки"
    key_concepts:
      - "купівля"
      - "онлайн-торгівля"
      - "порівняння"
  - section: "Послуги: замовлення, якість, скарги"
    words: 1000
    subsections:
      - "Типи послуг: ремонт, прибирання, доставка, перукарня"
      - "Замовлення послуги: ціна, строки, умови"
      - "Оцінка якості: відгуки, рейтинги, рекомендації"
      - "Скарга та рекламація: як писати офіційно"
    key_concepts:
      - "послуга"
      - "якість"
      - "рекламація"
  - section: "Права споживача в Україні"
    words: 1000
    subsections:
      - "Закон про захист прав споживачів: основні положення"
      - "Повернення товару: строки, умови, процедура"
      - "Гарантійне обслуговування: що покриває гарантія"
      - "Лексика офіційних звернень: згідно з, відповідно до, на підставі"
    key_concepts:
      - "права споживача"
      - "гарантія"
      - "повернення"
  - section: "Свідоме споживання та тренди"
    words: 1000
    subsections:
      - "Купуй українське: підтримка вітчизняного виробника"
      - "Екологічне споживання: вторинна переробка, відмова від пластику"
      - "Секонд-хенд та економіка спільного споживання"
      - "Парцеляція та еліпсис у рекламних текстах та слоганах"
    key_concepts:
      - "свідоме споживання"
      - "вітчизняний виробник"
      - "екологічність"

vocabulary_hints:
  - word: "купівля"
    translation: "purchase"
    context: "Купівля квартири — це серйозне рішення."
  - word: "послуга"
    translation: "service"
    context: "Якість послуг у цьому ресторані чудова."
  - word: "знижка"
    translation: "discount"
    context: "На ці товари сьогодні знижка 30 відсотків."
  - word: "кошик"
    translation: "cart, basket"
    context: "Додайте товар у кошик та оформіть замовлення."
  - word: "гарантія"
    translation: "warranty, guarantee"
    context: "Гарантія на цей товар — два роки."
  - word: "повернення"
    translation: "return (of goods)"
    context: "Повернення товару можливе протягом 14 днів."
  - word: "споживач"
    translation: "consumer"
    context: "Права споживача захищені законом."
  - word: "відгук"
    translation: "review, feedback"
    context: "Перед покупкою я завжди читаю відгуки."
  - word: "замовлення"
    translation: "order"
    context: "Ваше замовлення буде доставлено завтра."
  - word: "доставка"
    translation: "delivery"
    context: "Безкоштовна доставка — від 500 гривень."
  - word: "рекламація"
    translation: "complaint, claim"
    context: "Подати рекламацію можна протягом гарантійного строку."
  - word: "чек"
    translation: "receipt"
    context: "Збережіть чек для повернення товару."
  - word: "бракований"
    translation: "defective"
    context: "Бракований товар підлягає обміну."
  - word: "оплата"
    translation: "payment"
    context: "Оплата можлива карткою або готівкою."
  - word: "вітчизняний"
    translation: "domestic (production)"
    context: "Вітчизняний виробник потребує підтримки."
  - word: "переробка"
    translation: "recycling"
    context: "Вторинна переробка пластику — крок до екології."
  - word: "обслуговування"
    translation: "service, maintenance"
    context: "Сервісне обслуговування включено в гарантію."
  - word: "характеристика"
    translation: "specification, feature"
    context: "Порівняйте технічні характеристики двох моделей."

activities:
  types_required:
    - fill-in
    - error-correction
    - select
    - reading
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: essay-response
    focus: "Доповнити офіційну скаргу юридичними формулами (згідно з, на підставі)"
  - type: error-correction
    focus: "Виправити русизми в торговельній лексиці (магазін→магазин,
      скідка→знижка)"
  - type: select
    focus: "Обрати доречну мовну формулу для ситуації (повернення, скарга, замовлення)"
  - type: comparative-study
    focus: "Зіставити тип послуги з відповідним фахівцем та лексикою"

references:
  - source: "Заболотний, 11 клас (2019)"
    pages: "§49–50"
    topic: "Офіційно-діловий стиль: документи споживача"
  - source: "Глазова, 11 клас (2019)"
    pages: "§1–10"
    topic: "Культура мовлення в діловому контексті"
  - source: "Державний стандарт 2024"
    pages: "SS 3 (B2 thematic areas: купівля, послуги)"
    topic: "Тематична сфера: купівля і послуги"

