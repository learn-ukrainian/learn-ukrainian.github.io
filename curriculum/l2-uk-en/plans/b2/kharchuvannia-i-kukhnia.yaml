module: b2-024
level: B2
sequence: 24
slug: kharchuvannia-i-kukhnia
version: '1.0'
title: "Харчування і кухня"
subtitle: "Харчування і кухня"
focus: thematic
pedagogy: TTT
word_target: 4000
phase: "B2.2 [Advanced Syntax & Stylistics]"
objectives:
  - "Описувати страви, рецепти та кулінарні процеси розгорнуто."
  - "Обговорювати культуру харчування, дієти та здорове харчування."
  - "Аналізувати українську кухню як частину національної ідентичності."
  - "Інтегрувати складнопідрядні речення та вставні конструкції в кулінарних описах."

reading_situations:
  - source_type: "кулінарний блог"
    topic: "Автентичний рецепт борщу з регіональними варіаціями: полтавський,
      львівський, одеський."
    key_elements: ["кулінарна термінологія", "дієслова процесу (нарізати, потушкувати)",
      "прислівники способу дії"]
    motivation: "Розуміння кулінарного тексту з деталізованими інструкціями."

listening_situations:
  - media_type: "відео"
    setting: "Кулінарне шоу: шеф-кухар готує традиційну українську страву та
      коментує кожний крок."
    focus_points: ["імперативні форми (додайте, перемішайте)", "кулінарні терміни",
      "опис смаків та текстур"]
    motivation: "Розвиток навичок розуміння кулінарних інструкцій."

writing_tasks:
  - task_type: "рецепт та відгук"
    prompt: "Напишіть рецепт вашої улюбленої страви та відгук від уявного гостя,
      який її спробував."
    requirements:
      - "мінімум 250 слів загалом"
      - "використання імперативних форм у рецепті"
      - "складнопідрядні речення у відгуку"
    motivation: "Практика двох різних стилів: інструктивного та описового."
    model_answer: "Рецепт: 'Щоб приготувати вареники з вишнею, спочатку замісіть
      тісто...' Відгук: 'Це була найсмачніша страва, яку я куштував за останній
      рік...'"

discussion_topics:
  - context: "Борщ як символ: UNESCO, культурна ідентичність та війна."
    questions:
      - "Чому визнання борщу українською нематеріальною спадщиною UNESCO таке
        важливе?"
      - "Як кухня формує національну ідентичність?"
    motivation: "Обговорення культурного значення їжі."

dialogue_situations:
  - setting: "Друзі вибирають ресторан та обговорюють меню."
    roles: ["друг 1", "друг 2"]
    key_phrases: ["що порадиш замовити?", "я не їм молочне", "тут чудові
      деруни"]
  - setting: "Покупець на ринку торгується та вибирає продукти."
    roles: ["покупець", "продавець"]
    key_phrases: ["скільки коштує кілограм?", "дайте, будь ласка, пів кіло",
      "вони свіжі?"]

content_outline:
  - section: "Продукти та інгредієнти"
    words: 1000
    subsections:
      - "Овочі, фрукти, м'ясо, молочні продукти: розширений словник"
      - "Спеції, приправи та соуси в українській кухні"
      - "Покупки на ринку та в супермаркеті: порівняння культур"
      - "Мірні одиниці: кілограм, літр, жменя, щіпка"
    key_concepts:
      - "інгредієнт"
      - "продукт"
      - "кількість"
  - section: "Кулінарні процеси та рецепти"
    words: 1000
    subsections:
      - "Дієслова приготування: варити, смажити, тушкувати, запікати, парити"
      - "Структура рецепту: інгредієнти, кроки, час, температура"
      - "Кулінарні прислівники: дрібно, крупно, повільно, на повільному вогні"
      - "Складнопідрядні речення часу (коли закипить, додайте...)"
    key_concepts:
      - "спосіб приготування"
      - "рецептура"
      - "послідовність"
  - section: "Українська кухня як культурний код"
    words: 1000
    subsections:
      - "Борщ, вареники, голубці, деруни: символи української кухні"
      - "Регіональні кулінарні традиції: Полтавщина, Галичина, Закарпаття"
      - "Святкові страви: кутя, пампушки, паска, узвар"
      - "Борщ і UNESCO: кухня як поле культурної боротьби"
    key_concepts:
      - "традиційна кухня"
      - "регіональна відмінність"
      - "культурна спадщина"
  - section: "Здорове харчування та сучасні тенденції"
    words: 1000
    subsections:
      - "Раціональне харчування: білки, жири, вуглеводи, калорії"
      - "Вегетаріанство, веганство та інші дієти в Україні"
      - "Ресторанна культура: від їдальні до фешенебельного ресторану"
      - "Локаворство та фермерські продукти"
    key_concepts:
      - "раціон"
      - "дієта"
      - "ресторанна культура"

vocabulary_hints:
  - word: "харчування"
    translation: "nutrition, eating"
    context: "Здорове харчування — це основа самопочуття."
  - word: "страва"
    translation: "dish (food)"
    context: "Борщ — це найвідоміша українська страва."
  - word: "інгредієнт"
    translation: "ingredient"
    context: "Для борщу потрібно багато інгредієнтів."
  - word: "кухня"
    translation: "cuisine, kitchen"
    context: "Українська кухня дуже різноманітна."
  - word: "рецептура"
    translation: "recipe (formal), formulation"
    context: "Рецептура цієї страви передається з покоління в покоління."
  - word: "смажити"
    translation: "to fry"
    context: "Смажте цибулю до золотистого кольору."
  - word: "тушкувати"
    translation: "to stew, braise"
    context: "Тушкуйте м'ясо на повільному вогні."
  - word: "запікати"
    translation: "to bake"
    context: "Запікайте в духовці при 180 градусах."
  - word: "приправа"
    translation: "seasoning, spice"
    context: "Додайте приправи за смаком."
  - word: "жменя"
    translation: "handful"
    context: "Додайте жменю зелені."
  - word: "щіпка"
    translation: "pinch"
    context: "Щіпка солі — і страва готова."
  - word: "деруни"
    translation: "potato pancakes"
    context: "Деруни подають зі сметаною."
  - word: "вареники"
    translation: "varenyky (dumplings)"
    context: "Вареники з вишнею — найулюбленіша страва мого дитинства."
  - word: "кутя"
    translation: "kutia (Christmas wheat dish)"
    context: "Кутю готують на Святвечір."
  - word: "узвар"
    translation: "uzvar (dried fruit compote)"
    context: "Узвар із сухофруктів — традиційний різдвяний напій."
  - word: "раціон"
    translation: "diet, daily food intake"
    context: "Збалансований раціон включає овочі, білки та злаки."
  - word: "калорія"
    translation: "calorie"
    context: "Борщ містить небагато калорій."
  - word: "їдальня"
    translation: "canteen, cafeteria"
    context: "У радянські часи їдальні були скрізь."

activities:
  types_required:
    - fill-in
    - error-correction
    - select
    - reading
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте текст про продукти та інгредієнти і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про кулінарні процеси та рецепти, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Продукти та інгредієнти». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему продукти та інгредієнти."

