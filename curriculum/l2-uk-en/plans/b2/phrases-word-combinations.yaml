      - "Додано activity_hints (4 підказки: match-up, fill-in, error-correction, select)."
      - "Додано references (Заболотний §1–3, Авраменко §1–3, State Standard 2024)."
  - version: '1.2'
    date: '2023-10-27'
    changes:
      - "Збільшено цільову кількість слів до 4000."
