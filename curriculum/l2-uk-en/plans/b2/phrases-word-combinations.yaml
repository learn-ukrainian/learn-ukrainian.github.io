module: phrases-word-combinations
level: B2
sequence: 11
version: '1.3'
title: "Словосполучення та зв'язок слів"
subtitle: "Phrases and Types of Word Combinations: Syntax and Usage"
focus: grammar
pedagogy: PPP
objectives:
  - "Поглиблене розуміння структури словосполучення: головне та залежне слово."
  - "Класифікація типів підрядного зв'язку: узгодження, керування, прилягання."
  - "Аналіз складних випадків керування в українській мові, що часто викликають труднощі."
  - "Розрізнення вільних словосполучень та фразеологізованих одиниць."
  - "Застосування знань про сполучуваність слів для підвищення точності та багатства мовлення."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Проблеми сучасної лінгвістики: семантика словосполучення"
    key_elements: ["граматичний зв'язок", "семантична цілісність", "синтаксична одиниця", "керування"]
    motivation: "Текст вводить академічну термінологію та пояснює логіку побудови словосполучень на високому рівні."
  - source_type: "публіцистичний нарис"
    topic: "Мовні портрети сучасних українців"
    key_elements: ["багате мовлення", "влучні вислови", "помилки в керуванні", "природні сполуки"]
    motivation: "Аналіз реального вживання словосполучень та впливу правильного керування на якість комунікації."

listening_situations:
  - media_type: "лекція"
    setting: "Вебінар для перекладачів: типові пастки українського керування"
    focus_points: ["прийменникове керування", "вплив іноземних мов", "нормативні словники"]
    motivation: "Розвиток професійної компетенції у виборі правильних граматичних форм у складних словосполученнях."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть розгорнутий відгук на прочитану книгу або переглянутий фільм, звертаючи особливу увагу на використання різноманітних типів словосполучень (узгодження для описів, керування для дій)."
    requirements:
      - "мінімум 250 слів"
      - "використати щонайменше 5 прикладів складного керування (наприклад, з дієсловами 'дякувати', 'опановувати', 'сподіватися')"
      - "проілюструвати використання прилягання з прислівниками"
    motivation: "Практичне застосування синтаксичних знань у творчому письмі."
    model_answer: "Відгук має містити правильні конструкції: 'дякувати (кому?) авторові', 'сподіватися (на що?) на успіх', 'читати (як?) захоплено'. Оцінюється багатство епітетів (узгодження) та точність дієслівних зв'язків."

discussion_topics:
  - context: "Мовна інтуїція vs правила: чому ми помиляємося в словосполученнях?"
    questions:
      - "Чому керування вважається одним із найважчих розділів синтаксису для іноземців?"
      - "Як впливає знання англійської чи російської мови на те, як ми будуємо українські словосполучення?"
      - "Чи може неправильне узгодження змінити зміст речення?"
    motivation: "Дискусія про інтерференцію та важливість синтаксичної точності."

content_outline:
  - section: "Анатомія словосполучення: головне та залежне слово"
    words: 800
    subsections:
      - "Визначення словосполучення як синтаксичної одиниці"
      - "Граматичні та семантичні ознаки зв'язку"
      - "Класифікація за частиномовною належністю головного слова (іменникові, дієслівні тощо)"
    key_concepts:
      - "синтаксичний центр"
      - "залежність"
      - "номінативна функція"
  - section: "Механізми зв'язку: Узгодження"
    words: 800
    subsections:
      - "Повне та неповне узгодження"
      - "Узгодження у роді, числі та відмінку"
      - "Типові помилки при узгодженні числівників з іменниками"
    key_concepts:
      - "морфологічне уподібнення"
      - "атрибутивний зв'язок"
      - "узгодження"
  - section: "Механізми зв'язку: Керування"
    words: 800
    subsections:
      - "Безприйменникове та прийменникове керування"
      - "Система відмінків та їхнє значення у керуванні"
      - "Складні випадки: дієслова, що вимагають специфічних відмінків в українській мові"
    key_concepts:
      - "об'єктний зв'язок"
      - "валентність дієслова"
      - "сильне керування"
  - section: "Механізми зв'язку: Прилягання"
    words: 800
    subsections:
      - "Сутність прилягання як зв'язку за змістом"
      - "Незмінні частини мови у ролі залежних слів (прислівники, інфінітиви, дієприслівники)"
      - "Розрізнення прилягання та керування у складних випадках"
    key_concepts:
      - "незмінність"
      - "семантичний зв'язок"
      - "обставинне значення"
  - section: "Синтаксична стилістика та культура сполучуваності"
    words: 800
    subsections:
      - "Лексична та граматична сполучуваність (колокації)"
      - "Боротьба з мовною надмірністю (плеоназми у словосполученнях)"
      - "Редагування текстів з помилками у синтаксичному зв'язку"
    key_concepts:
      - "колокація"
      - "плеоназм"
      - "мовна норма"

word_target: 4000

vocabulary:
  required:
    - узгодження
    - керування
    - прилягання
    - головне слово
    - залежне слово
    - підрядний зв'язок
    - сполучуваність
    - граматична форма
  recommended:
    - валентність
    - прийменник
    - відмінок
    - ідіома
    - конструкція

activities:
  types_required:
    - group-sort
    - fill-in
    - match-up
    - error-correction
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: match-up
    focus: "Зіставити словосполучення з типом зв'язку: узгодження, керування, прилягання"
  - type: fill-in
    focus: "Доповнити словосполучення правильною відмінковою формою залежного слова (керування)"
  - type: error-correction
    focus: "Виправити помилки в керуванні дієслів (дякувати кого→кому, вибачте мене→вибачте мені)"
  - type: select
    focus: "Визначити тип підрядного зв'язку в наведених словосполученнях"

references:
  - source: "Заболотний, 9 клас (2017)"
    pages: "§1–3"
    topic: "Словосполучення: будова, типи зв'язку (узгодження, керування, прилягання)"
  - source: "Авраменко, 9 клас (2017)"
    pages: "§1–3"
    topic: "Синтаксис: словосполучення"
  - source: "State Standard 2024"
    pages: "B2, SS 4.3"
    topic: "Syntax — phrase structure"

connects_to:
  previous: "checkpoint-passive-voice"
  next: "predicate-types"

