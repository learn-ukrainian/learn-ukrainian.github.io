title: 'Словосполучення: типи та зв''язки'
subtitle: 'Phrases: Types and Word Connections'
focus: grammar
pedagogy: TTT
phase: B2.2 [Syntax Mastery]
word_target: 4000
objectives:
- Learner can classify phrases by head word type (nominal, verbal, adverbial, adjectival)
- Learner can identify and distinguish three types of syntactic connection (agreement, government, adjunction)
- Learner can perform syntactic analysis of phrase structure
- Learner can correct common errors in government influenced by L1 interference
content_outline:
- section: 'Вступ: Словосполучення як одиниця синтаксису (Introduction: Phrases as Syntactic Units)'
  words: 500
  points:
  - 'Визначення словосполучення згідно з Держстандартом §4.3.1: сполука двох або більше повнозначних слів, пов''язаних граматично
    й за змістом'
  - 'Відмінність словосполучення від речення: відсутність предикативності та інтонаційної завершеності як ключова ознака'
  - 'Роль словосполучень у побудові речення: від номінації до предикації — словосполучення як будівельний матеріал синтаксису'
- section: Типи словосполучень за головним словом (Types of Phrases by Head Word)
  words: 900
  points:
  - 'Іменні словосполучення (nominal phrases): структури з іменником як головним словом (напр., «важлива подія», «друг дитинства»,
    «подорож до Львова»)'
  - 'Дієслівні словосполучення (verbal phrases): структури з дієсловом як головним словом (напр., «читати книгу», «мріяти
    про подорож», «навчатися наполегливо»)'
  - 'Прислівникові словосполучення (adverbial phrases): структури з прислівником як головним словом (напр., «дуже швидко»,
    «далеко від дому»)'
  - 'Прикметникові словосполучення (adjectival phrases): структури з прикметником як головним словом (напр., «сповнений надії»,
    «готовий до роботи»)'
- section: 'Типи зв''язку: узгодження, керування, прилягання (Agreement, Government, Adjunction)'
  words: 900
  points:
  - 'Узгодження (agreement): залежне слово набуває граматичних форм головного — рід, число, відмінок (напр., «нова книга»
    → «нової книги» → «новій книзі»)'
  - 'Керування (government): головне слово вимагає певної відмінкової форми залежного (напр., «читати книгу» — Зн.в., «захоплюватися
    мистецтвом» — Ор.в.)'
  - 'Прилягання (adjunction): зв''язок лише за змістом без зміни форми залежного слова (напр., «говорити тихо», «бажання вчитися»)'
  - 'Типова помилка: змішування керування та прилягання у конструкціях з інфінітивом (напр., «змусити працювати» — прилягання,
    а не керування)'
- section: Розбір словосполучень та аналіз структури (Phrase Analysis and Structure Parsing)
  words: 900
  points:
  - 'Методика синтаксичного розбору: визначення головного та залежного слова, типу зв''язку, засобу зв''язку (закінчення,
    прийменник, за змістом)'
  - 'Трансформаційні вправи: перетворення одного типу зв''язку на інший (напр., «шовкова сукня» (узгодження) → «сукня з шовку»
    (керування))'
  - 'Контрастивний аналіз: відмінності керування в українській та англійській мовах (напр., «дякувати кому» — Д.в. vs «thank
    someone» — direct object)'
  - 'Вільні та стійкі словосполучення: розрізнення синтаксично вільних (напр., «гарна погода») та фразеологічно зв''язаних
    (напр., «брати участь»)'
- section: Практика та виправлення помилок (Practice and Error Correction)
  words: 800
  points:
  - 'Типові помилки керування під впливом російської мови: «дякувати кого» → «дякувати кому», «вибачте мене» → «вибачте мені»'
  - 'Практикум зі стилістичного вибору: коли вживати узгодження, а коли керування для досягнення різного стилістичного ефекту'
  - 'Комплексний аналіз тексту: визначення всіх словосполучень у уривку наукового або публіцистичного стилю з класифікацією
    за типом'
  - 'Підготовка до модуля b2-12: зв''язок словосполучень із будовою присудка та його типами'
vocabulary_hints:
  required:
  - словосполучення (phrase/word combination) — синтаксична одиниця з двох або більше повнозначних слів
  - узгодження (agreement) — тип зв'язку, при якому залежне слово набуває форм головного
  - керування (government) — тип зв'язку, при якому головне слово вимагає певного відмінка
  - прилягання (adjunction) — тип зв'язку за змістом без зміни форми залежного слова
  - головне слово (head word) — слово, від якого ставиться питання до залежного
  - залежне слово (dependent word) — слово, яке граматично підпорядковується головному
  - відмінок (case) — граматична категорія, що виражає синтаксичні відношення іменника
  - предикативність (predicativity) — граматична основа речення, відсутня у словосполученні
  recommended:
  - номінація (nomination) — називання явищ за допомогою словосполучень
  - синтаксичний розбір (syntactic parsing) — процедура аналізу будови словосполучення
  - стійке словосполучення (fixed phrase) — фразеологічно зв'язана сполука слів
  - вільне словосполучення (free phrase) — синтаксично вільна сполука слів
  - прийменник (preposition) — засіб зв'язку при керуванні
  - закінчення (ending) — засіб зв'язку при узгодженні
