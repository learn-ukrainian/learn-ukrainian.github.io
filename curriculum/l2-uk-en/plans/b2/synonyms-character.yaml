module: b2-60
level: B2
sequence: 60
slug: synonyms-character
version: '2.0'
title: 'Синоніми: Характер та Особистість'
subtitle: Synonyms - Character and Personality
content_outline:
- section: 'Вступ: Психологія та мова (Introduction: Psychology and Language)'
  words: 600
  points:
  - 'Вдача та натура як ключові концепти українського світосприйняття: аналіз внутрішнього
    «Я»'
  - 'Культурний гачок: Розрізнення між «вдача» (disposition/character) та «удача»
    (luck) — чому це важливо для ідентичності'
  - 'Обговорення ролі синонімії у художньому стилі: як епітети створюють глибину персонажа
    (§4.4.1.2 Державного стандарту)'
- section: 'Інтелект: Від кмітливості до мудрості (Intelligence: From Quick-wittedness
    to Wisdom)'
  words: 1000
  points:
  - 'Диференціація інтелекту: розумний (загальний IQ) vs мудрий (життєвий досвід)
    vs кмітливий (практичність)'
  - 'Архетип кмітливості в українській культурі: чому козак або селянин у казках перемагає
    розумом, а не силою'
  - 'Розмовний регістр: використання слова «тямущий» для характеристики майстра або
    учня, що швидко вчиться'
  - 'Геніальний: межа між талантом та винятковим інтелектом у художньому описі'
- section: 'Доброта та емпатія: Відтінки серця (Kindness and Empathy: Shades of the
    Heart)'
  words: 1000
  points:
  - 'Спектр проявів доброти: добрий (загальна риса) vs щедрий (готовність ділитися
    матеріальним та духовним)'
  - 'Чуйність та лагідність: різниця між емпатією (чуйний до горя) та зовнішньою м''якістю
    (лагідний голос/погляд)'
  - 'Милосердя як високий етичний концепт: аналіз вжитку слова в контексті гуманізму
    та допомоги'
  - 'Колокації: «добра душа», «щедра на похвалу людина», «лагідна вдача» — вправи
    на сполучуваність'
- section: 'Лабораторія помилок: Чистота мовлення (Error Lab: Language Purity)'
  words: 700
  points:
  - 'Викорінення росіянізму: чому не можна казати «носити характер» (правильно — «мати
    характер» або «бути якимось»)'
  - 'Дриль на розрізнення «вдача» / «удача»: виправлення типових помилок у реченнях
    про успіх та характер'
  - 'Стилістична точність: аналіз помилки називання дитини «мудрою» замість «розумної»
    — нюанси віку та досвіду'
- section: 'Практикум: Психологічний портрет (Workshop: Psychological Portrait)'
  words: 700
  points:
  - 'Роль кастинг-директора: створення детальних характеристик персонажів для літературної
    екранізації'
  - 'Порівняльний аналіз регістрів: як описати одну людину в офіційному резюме (тямущий,
    кмітливий) та в особистому листі (чуйний, лагідний)'
  - 'Творче завдання: написання портрета літературного героя з використанням 10+ синонімів
    характеру та епітетів'
focus: phraseology
pedagogy: CBI
objectives:
- Учень може розрізняти відтінки значень між синонімами на позначення інтелекту та
  доброти
- Учень вміє створювати детальні психологічні портрети, використовуючи лексику рівня
  B2
- Учень розуміє концепцію 'вдачі' та 'натури' в українському культурному контексті
grammar:
- Adjectival nuances in personality
- Abstract nouns for traits
immersion: 100
register: художній
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - вдача (disposition/character) — мати лагідну вдачу; ключове слово для опису особистості
  - розумний (intelligent) — розумна людина, розумне рішення; висока частотність,
    загальний вжиток
  - мудрий (wise) — мудра порада, народна мудрість; передбачає досвід та виваженість
  - кмітливий (quick-witted) — кмітливий учень; практичний, винахідливий розум
  - добрий (kind) — добра душа, добре серце; базовий синонім для позитивної характеристики
  - чуйний (sensitive/responsive) — чуйний до чужого горя; акцент на емпатії
  recommended:
  - тямущий (clever/brainy) — тямущий хлопчина; розмовне, той, хто швидко вникає в
    суть
  - лагідний (gentle/mild) — лагідний голос, лагідні руки; м’якість у поведінці
  - щедрий (generous) — щедрий на похвалу, щедрий вечір; готовність давати більше
    за норму
  - милосердний (merciful) — вчинок милосердя; книжне слово, глибоке співчуття
  - удача (luck/success) — бажати удачі; часто плутають із «вдача»
