module: register-academic-technical
level: B2
sequence: 31
version: '1.2'
title: "Науково-технічний стиль"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Дослідити ключові особливості наукового стилю (об'єктивність, точність, логічність, доказовість)."
  - "Навчитися використовувати наукову термінологію та уникати емоційно забарвленої лексики в академічних текстах."
  - "Опанувати синтаксичні структури, притаманні науковому мовленню (складні речення, пасивні конструкції, безособові форми)."
  - "Вміти структурувати наукову роботу (анотація, вступ, основна частина, висновки, список літератури)."
  - "Вивчити засоби логічного зв'язку (конектори) для забезпечення когерентності тексту."

reading_situations:
  - source_type: "наукова стаття / анотація"
    topic: "Аналіз академічної анотації (abstract) до сучасного дослідження в галузі штучного інтелекту або екології."
    key_elements: ["структура IMRaD", "термінологічна насиченість", "лаконічність", "об'єктивність викладу"]
    motivation: "Розуміння стандартів міжнародної та української академічної комунікації та підготовка до роботи з науковою літературою."

listening_situations:
  - media_type: "лекція"
    setting: "Уривок з університетської лекції про методологію наукових досліджень та етику академічного письма."
    focus_points: ["Виявлення логічної послідовності викладу.", "Сприйняття мовних маркерів переходу між аргументами.", "Розуміння складних термінів у контексті усного наукового мовлення."]
    motivation: "Розвиток здатності сприймати на слух структуровану та термінологічно складну інформацію в академічному середовищі."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть наукове есе-обґрунтування актуальності дослідження на тему 'Вплив цифровізації на збереження мовної ідентичності'. Використовуйте формальний академічний стиль."
    requirements:
      - "чітка логічна структура: вступ, аргументація, попередні висновки"
      - "використання мінімум 7 специфічних термінів"
      - "мінімум 300 слів"
      - "використання різноманітних логічних конекторів (отже, по-перше, таким чином, зокрема, проте)"
    motivation: "Практика написання ключового елемента будь-якої наукової публікації та розвиток навичок академічної аргументації."
    model_answer: "Текст має бути об'єктивним та логічним. Наприклад: 'Актуальність даного дослідження зумовлена стрімким розвитком інформаційних технологій. У роботі проаналізовано динаміку змін мовного коду в цифровому просторі. Таким чином, встановлено кореляцію між доступністю контенту та рівнем мовної компетенції користувачів. Зокрема, особливу увагу приділено питанням мовної стійкості.'"

discussion_topics:
  - context: "Дискусія про етику використання штучного інтелекту в написанні наукових праць."
    questions:
      - "Де проходить межа між допомогою ШІ та плагіатом?"
      - "Як змінюється мова науки під впливом автоматизованого перекладу?"
      - "Чи може науковий текст бути емоційним у гуманітарних дисциплінах?"
    motivation: "Розвиток навичок наукової дискусії та критичного осмислення сучасних викликів в академічному середовищі."

content_outline:
  - section: "Специфіка та норми наукового викладу"
    words: 1000
    subsections:
      - "Об'єктивність та безособовість як фундамент наукового дискурсу"
      - "Терміносистема: принципи формування, точність визначень та однозначність термінів"
      - "Академічна доброчесність: уникнення плагіату та етика використання джерел"
      - "Диференціація наукового стилю: власне науковий, науково-навчальний, науково-популярний"
    key_concepts:
      - "об'єктивність"
      - "безособовість"
      - "терміносистема"
  - section: "Синтаксис та логічна зв'язність наукового тексту"
    words: 1000
    subsections:
      - "Складні синтаксичні конструкції (складнопідрядні речення) для вираження причинно-наслідкових зв'язків"
      - "Використання дієприкметникових та дієприслівникових зворотів для стислості та точності"
      - "Логічні конектори для структурування тексту: засоби переліку, підсумовування та протиставлення"
      - "Безособові дієслівні форми та пасивні конструкції як засоби об'єктивізації процесу дослідження"
    key_concepts:
      - "когерентність"
      - "конектори"
      - "логічна послідовність"
  - section: "Архітектоніка наукової роботи та етика цитування"
    words: 1000
    subsections:
      - "Стандарти побудови наукового тексту: анотація (abstract), вступ, методологія, результати, висновки"
      - "Написання та структурування анотації за міжнародними стандартами (IMRaD)"
      - "Методи цитування та оформлення бібліографічних посилань за сучасними українськими та міжнародними правилами"
      - "Аргументація та доказовість у науковій полеміці: мовні формули згоди та незгоди"
    key_concepts:
      - "анотація"
      - "цитування"
      - "архітектоніка тексту"
  - section: "Технічний опис та мова інструкцій"
    words: 1000
    subsections:
      - "Особливості технічної документації: специфікації, технічні умови та паспорти об'єктів"
      - "Мова інструкцій та настанов: використання імперативних форм та модальності необхідності"
      - "Опис процесів та алгоритмів: точність послідовності дій та лаконічність формулювань"
      - "Візуалізація даних у технічних текстах: коментування графіків, таблиць та діаграм"
    key_concepts:
      - "специфікація"
      - "алгоритм"
      - "лаконічність"

vocabulary:
  required:
    - дослідження
    - гіпотеза
    - методологія
    - результат
    - висновок
    - актуальність
    - об'єкт
    - предмет
  recommended:
    - анотація
    - узагальнення
    - систематизація
    - таким чином
    - отже
    - зокрема

activities:
  types_required:
    - reading
    - essay-response
    - select
    - fill-in
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: fill-in
    focus: "Доповнити науковий текст правильною термінологією та логічними конекторами"
  - type: error-correction
    focus: "Знайти ненаукову лексику (розмовні слова, емоційні епітети) в академічному тексті та замінити"
  - type: select
    focus: "Обрати науковий варіант висловлювання з-поміж стилістично різних формулювань"
  - type: cloze
    focus: "Заповнити пропуски в анотації (abstract) науковою лексикою та конекторами"

references:
  - source: "Глазова, 11 клас (2019)"
    pages: "§1–10"
    topic: "Науковий стиль мовлення"
  - source: "Заболотний, 11 клас (2019)"
    pages: "§47–48"
    topic: "Науковий стиль та його підстилі"
  - source: "Державний стандарт 2024"
    pages: "SS 4.4"
    topic: "Стилістика (B2)"

connects_to:
  previous: "register-business-ukrainian"
  next: "register-official-legal"
