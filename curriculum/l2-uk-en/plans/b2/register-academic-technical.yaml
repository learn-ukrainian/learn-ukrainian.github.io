module: b2-028
level: B2
sequence: 28
slug: register-academic-technical
version: '2.0'
title: Науковий та науково-технічний стилі
subtitle: Academic and Technical-Scientific Register
focus: style
pedagogy: TTT
phase: B2.3 [Register System]
word_target: 4000
objectives:
- Learner can identify lexical and grammatical features of the academic register
- Learner can use impersonal constructions and academic connectors in scientific writing
- Learner can compose compound technical terms and use abbreviations correctly
- Learner can write an abstract and a technical description following Ukrainian conventions
content_outline:
- section: Вступ — академічний та технічний підстилі (Introduction — Academic vs Technical Substyles)
  words: 500
  points:
  - 'Науковий стиль як функціональний різновид мови: основні ознаки (об''єктивність, логічність, точність, безособовість)
    згідно з Держстандартом §4.4.1.1.'
  - 'Два підстилі наукового стилю: власне науковий (академічний) та науково-технічний; їхня спільна база та специфічні відмінності.'
  - 'Культурний контекст: традиція українського академічного письма від Острозької академії до сучасних наукових журналів;
    значення наукового стилю для B2.'
- section: Академічна лексика та термінологія (Academic Lexicon and Terminology)
  words: 700
  points:
  - 'Загальнонаукова лексика: слова, спільні для всіх наук (дослідження, аналіз, гіпотеза, метод, результат, висновок); їхня
    частотність та сполучуваність.'
  - 'Вузькоспеціальна термінологія: терміни конкретних галузей (морфема — мовознавство, фотосинтез — біологія); вимоги до
    терміна (однозначність, системність).'
  - 'Абстрактна лексика: іменники на -ість, -ання, -ення, -ація (дослідження, забезпечення, інтеграція); їхня роль у створенні
    узагальнень.'
  - 'Типова помилка: підміна термінів загальновживаними синонімами в науковому тексті та навпаки (хвороба vs захворювання,
    причина vs детермінанта).'
- section: Технічна термінологія та складені терміни (Technical Terminology and Compound Terms)
  words: 700
  points:
  - 'Науково-технічний підстиль: специфіка мови інструкцій, патентів, технічної документації; максимальна точність та стандартизованість.'
  - 'Складені терміни: утворення багатокомпонентних термінів (електронно-обчислювальна машина, штучний інтелект, хмарні обчислення);
    правопис через дефіс та окремо.'
  - 'Термінологічні стандарти ДСТУ: роль стандартизації у технічній сфері; як перевірити правильність терміна (напр., «програмне
    забезпечення» vs «софт»).'
  - 'Скорочення та абревіатури: правила утворення (ЕОМ, ШІ, ПЗ, НАНУ) та їхнє відмінювання в тексті; помилки у вживанні абревіатур.'
- section: Граматика об''єктивності — безособові конструкції (Grammar of Objectivity — Impersonal Constructions)
  words: 700
  points:
  - 'Безособові та узагальнено-особові конструкції: «досліджено», «було встановлено», «вважається», «спостерігається»; їхня
    функція усунення суб''єктивності.'
  - 'Авторське «ми» vs «я»: конвенція вживання «ми» в наукових текстах (авторське «ми» — pluralis modestiae); коли допускається
    «я» (рецензії, відгуки).'
  - 'Дієприкметникові та дієприслівникові звороти: роль у стисненні інформації (отримані результати, аналізуючи дані); типові
    помилки у їхньому вживанні.'
  - 'Складнопідрядні речення: конструкції з «який», «що», «де», «оскільки» для вираження причинно-наслідкових та означальних
    зв''язків у науковому тексті.'
- section: Структура тексту — теза, звіт, технічний документ (Text Structure — Thesis, Report, Technical Document)
  words: 700
  points:
  - 'Структура наукової статті: вступ (постановка проблеми) → огляд літератури → методологія → результати → висновки; клішовані
    формулювання кожного розділу.'
  - 'Структура технічного документа: технічне завдання, інструкція, специфікація; вимоги до однозначності та відтворюваності.'
  - 'Цитування та посилання: правила оформлення цитат, парафразу, посилань у тексті; різниця між дослівним цитуванням та переказом.'
  - 'Зв''язність наукового тексту: засоби когезії (таким чином, отже, у зв''язку з цим, як зазначалося вище); логічні переходи
    між абзацами.'
- section: Практика — академічне та технічне текстотворення (Practice — Academic and Technical Text Production)
  words: 700
  points:
  - 'Написання анотації (abstract): стисле викладення змісту дослідження за структурою мета → метод → результат → висновок;
    обмеження обсягу.'
  - 'Написання технічного опису: опис продукту, процесу або алгоритму мовою технічної документації; вимоги до точності та
    однозначності.'
  - 'Редагування: виявлення та виправлення стилістичних помилок у наукових текстах (канцеляризми, розмовна лексика, відсутність
    термінів).'
  - 'Порівняльний аналіз: один і той самий зміст у академічному та технічному підстилях; обговорення відмінностей у лексиці,
    синтаксисі та структурі.'
vocabulary_hints:
  required:
  - дослідження (research) — наукове дослідження, проводити дослідження; базове слово академічного стилю
  - гіпотеза (hypothesis) — висунути гіпотезу, підтвердити гіпотезу; ключовий елемент наукового методу
  - висновок (conclusion) — зробити висновок, на підставі висновків; завершальний елемент наукового тексту
  - анотація (abstract) — написати анотацію, стисла анотація; короткий виклад змісту наукової роботи
  - когезія (cohesion) — текстова когезія, засоби когезії; зв'язність елементів тексту
  - специфікація (specification) — технічна специфікація; документ з точними вимогами до продукту
  - методологія (methodology) — обрати методологію, описати методологію; систематичний підхід до дослідження
  recommended:
  - когезія (cohesion) — текстова когезія, засоби когезії; зв'язність елементів тексту
  - парафраз (paraphrase) — парафраз джерела; переказ чужої думки своїми словами
  - абревіатура (abbreviation) — утворити абревіатуру, розшифрувати абревіатуру; скорочене позначення
  - детермінанта (determinant) — визначальний чинник; науковий синонім до «причина»
  - верифікація (verification) — верифікація результатів; перевірка достовірності даних
