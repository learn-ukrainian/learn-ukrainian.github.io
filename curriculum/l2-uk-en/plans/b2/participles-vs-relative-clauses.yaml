slug: participles-vs-relative-clauses
version: '2.0'
title: Дієприкметники проти підрядних речень
content_outline:
- section: 'Вступ: Два способи вираження ознаки за дією (Introduction: Two Ways of
    Expressing Attribute by Action)'
  words: 500
  points:
  - Пояснення концепції дієприкметника як компактної форми проти підрядного речення
    як розгорнутої форми згідно зі Стандартом §4.1.3.1 та §4.3.4.2
  - 'Огляд стилістичного вибору: чому жива мова уникає нагромадження дієприкметників,
    вважаючи це ознакою бюрократичного «канцеляриту»'
- section: Морфологічний та синтаксичний еквівалент (Morphological and Syntactic Equivalent)
  words: 800
  points:
  - 'Систематичне порівняння активних форм: чому «працюючий студент» є помилкою калькування,
    а «студент, який працює» — нормою'
  - 'Аналіз пасивних форм: «прочитана книга» (компактність) проти «книга, яку прочитали»
    (нейтральність)'
  - Використання сполучних слів «який», «що», «котрий» (висока частотність «який»
    та «що» згідно з даними дослідження)
- section: Стилістичний вибір та культура мовлення (Stylistic Choice and Speech Culture)
  words: 900
  points:
  - 'Культурний гук: Боротьба з канцеляритом за порадами Максима Рильського та Бориса
    Антоненка-Давидовича щодо «оживлення» мови через підрядні речення'
  - 'Пріоритет агентності (Agency): Чому український синтаксис тяжіє до активних конструкцій
    («Ми зробили») замість пасивних дієприкметників («Було зроблено»)'
  - 'Сфери вживання: Академічне письмо та фіксовані терміни («чинний закон», «діючий
    вулкан») проти розмовної природності'
- section: Аналіз та виправлення типових помилок (Analysis and Correction of Common
    Errors)
  words: 900
  points:
  - 'Критична помилка: виявлення та усунення калькування активних дієприкметників
    на -уч/-юч (*читаючий*, *пишучий*) як маркера суржику'
  - 'Пастка повторення «який»: стратегії уникнення монотонності через чергування зі
    сполучником «що» або доречним вживанням дієприкметникових зворотів'
  - 'Корекція неузгодження відмінків: відпрацювання правильних форм сполучних слів
    (наприклад, «дівчина, яку я люблю»)'
- section: Трансформаційна практика та редагування (Transformational Practice and
    Editing)
  words: 900
  points:
  - 'Практикум «Літературний редактор»: перетворення сухого академічного тексту на
    зрозумілу публіцистику через синтаксичну трансформацію'
  - Вправи на збереження значення та зміну стилістичного забарвлення при переході
    від дієприкметника до підрядного речення
  - 'Підсумковий чек-лист: критерії вибору форми залежно від жанру тексту та вимог
    до природності мовлення'
vocabulary_hints:
  required:
  - який / яка / яке (which/that) — сполучне слово; дуже висока частотність; вимагає
    узгодження у відмінку
  - що (that) — сполучний засіб для підрядних означальних речень; часто взаємозамінний
    з «який» у Н. та З. відмінках
  - котрий (which/who) — книжний варіант; середня частотність; використовується при
    виборі або в часових конструкціях («о котрій годині»)
  - чинний закон (effective law) — стійке словосполучення; протиставляється помилковому
    «діючий закон»
  - діючий вулкан (active volcano) — приклад прийнятної термінологічної форми активного
    дієприкметника
  - охочий (willing/eager) — частотний прикметниковий замінник дієприкметника («охочі
    вчитися»)
  recommended:
  - канцелярит (officialese/bureaucratese) — термін для опису «мертвої» бюрократичної
    мови, перенасиченої дієприкметниками
  - агентність (agency) — мовна категорія, що підкреслює суб'єктність дії в українському
    синтаксисі
  - природність (naturalness) — головний критерій вибору підрядного речення в розмовному
    стилі
  - стилістична норма (stylistic norm) — правила вибору синтаксичних конструкцій залежно
    від регістра
  - еквівалентний (equivalent) — такий, що має те саме значення при зміні форми
  - суржик (surzhyk) — змішана мова; калькування дієприкметників на -уч/-юч часто
    є його ознакою
