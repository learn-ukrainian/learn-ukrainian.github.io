module: b2-012
level: B2
sequence: 12
version: '1.3'
title: "Дієприкметники та підрядні означальні речення"
subtitle: "Дієприкметники проти підрядних означальних речень"
focus: grammar
pedagogy: PPP
objectives:
  - "Глибокий аналіз функціональної еквівалентності дієприкметникових зворотів та
    підрядних означальних речень."
  - "Уміння здійснювати взаємну трансформацію цих конструкцій без втрати семантичного
    забарвлення."
  - "Розвиток чуття стилю для вибору оптимальної конструкції залежно від типу тексту
    (художній, офіційний, науковий)."
  - "Уникнення перевантаження тексту складними реченнями шляхом доречного використання
    дієприкметникових зворотів."
  - "Ідентифікація випадків, коли трансформація неможлива або веде до стилістичного
    дисонансу."

reading_situations:
  - source_type: "літературна критика"
    topic: "Аналіз стилю письма сучасного українського прозаїка"
    key_elements: ["автор, який використовує...", "описані події", "герой, що прагне...",
      "вжиті засоби"]
    motivation: "Текст містить приклади майстерного чергування дієприкметникових зворотів
      та підрядних речень для створення ритму оповіді."
  - source_type: "юридичний документ"
    topic: "Умови договору про надання послуг"
    key_elements: ["сторона, що підписала", "послуги, які надаються", "зазначені терміни",
      "викладені обставини"]
    motivation: "Демонстрація того, як юридична мова надає перевагу дієприкметникам
      для лаконічності та однозначності."

listening_situations:
  - media_type: "лекція"
    setting: "Університетська лекція з синтаксису сучасної української мови"
    focus_points: ["інтонація при дієприкметниковому звороті", "паузи в складнопідрядних
          реченнях", "ритміка фрази"]
    motivation: "Сприйняття на слух структурних відмінностей між двома типами конструкцій
      та їхнього впливу на сприйняття інформації."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть роздум на тему 'Вплив технологій на мову', свідомо чергуючи
      дієприкметникові звороти та підрядні означальні речення. Проаналізуйте, як це
      впливає на темп вашого тексту."
    requirements:
      - "мінімум 250 слів"
      - "використати 3 дієприкметникові звороти"
      - "використати 3 підрядні означальні речення"
      - "пояснити свій вибір у короткому коментарі до тексту"
    motivation: "Розвиток метамовної компетенції: студент не просто використовує форми,
      а розуміє 'чому' він це робить."
    model_answer: "Текст має бути логічним, з чітким розрізненням: дієприкметники
      для стислості описів, підрядні речення — для розгортання думки. Наприклад: «Проблеми,
      породжені швидким прогресом...» vs «Проблеми, які породив швидкий прогрес...»."

discussion_topics:
  - context: "Економіка мовних засобів: чи завжди коротше означає краще?"
    questions:
      - "Чому перекладачі часто замінюють англійські Participle Phrases українськими
        підрядними реченнями?"
      - "У яких ситуаціях дієприкметниковий зворот робить речення занадто важким для
        сприйняття?"
      - "Як змінюється ставлення читача до тексту, де багато конструкцій з 'який'?"
    motivation: "Дискусія про когнітивне навантаження та естетику синтаксису на рівні
      B2."

content_outline:
  - section: "Синтаксична синоніміка: природа еквівалентності"
    words: 800
    subsections:
      - "Спільність семантики: вираження ознаки через дію"
      - "Відмінність у морфологічному вираженні (дієприкметник vs дієслово)"
      - "Роль сполучних слів 'який', 'що', 'чий' у підрядних реченнях"
    key_concepts:
      - "синтаксична синонімія"
      - "семантична еквівалентність"
      - "сполучне слово"
  - section: "Алгоритм трансформації: від звороту до речення і навпаки"
    words: 800
    subsections:
      - "Узгодження часів та видів при трансформації"
      - "Перетворення дієприкметника на особову форму дієслова"
      - "Пунктуаційні виклики: коми при відокремлених означеннях та в складних реченнях"
    key_concepts:
      - "трансформаційний аналіз"
      - "пунктуаційна норма"
      - "узгодження"
  - section: "Стилістичний вибір: де і чому?"
    words: 800
    subsections:
      - "Офіційно-діловий та науковий стилі: прагнення до стислості та номіналізації"
      - "Художній стиль: використання зворотів для створення пластичності описів"
      - "Публіцистика: динаміка підрядних речень у журналістському розслідуванні"
    key_concepts:
      - "номіналізація"
      - "ритміка тексту"
      - "функціональний стиль"
  - section: "Обмеження та виклики трансформації"
    words: 800
    subsections:
      - "Випадки, коли дієприкметниковий зворот неможливий (відсутність відповідних
        форм)"
      - "Проблема активних дієприкметників теперішнього часу (повернення до теми модулів
        7-8)"
      - "Втрата відтінків модальності при спрощенні речення"
    key_concepts:
      - "граматична неможливість"
      - "модальність"
      - "семантична втрата"
  - section: "Практикум з редагування складних синтаксичних структур"
    words: 800
    subsections:
      - "Усунення 'нанизування' підрядних речень з 'який'"
      - "Оптимізація тексту: заміна важких зворотів підрядними структурами для кращого
        розуміння"
      - "Колективне редагування академічного есе"
    key_concepts:
      - "оптимізація тексту"
      - "редакторська правка"
      - "логіка викладу"

word_target: 4000

vocabulary:
  required:
    - трансформація
    - еквівалентність
    - відокремлене означення
    - підрядний зв'язок
    - сполучне слово
    - стилістичне забарвлення
    - синтаксична конструкція
    - лаконічність
  recommended:
    - чергування
    - монотонність
    - ритмомелодика
    - когнітивний
    - сприйняття

activities:
  types_required:
    - translate
    - error-correction
    - select
    - comparative-study
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: select
    focus: "Обрати природнішу конструкцію: дієприкметниковий зворот чи підрядне означальне
      речення"
  - type: error-correction
    focus: "Виправити речення, де дієприкметник вжито неприродно, замінивши підрядною
      конструкцією"
  - type: fill-in
    focus: "Трансформувати підрядне речення у дієприкметниковий зворот і навпаки"
  - type: essay-response
    focus: "Переписати абзац, свідомо чергуючи дієприкметникові звороти та підрядні
      речення для кращого ритму тексту"

references:
  - source: "Караман, 10 клас (2018)"
    pages: "§76–77, с. 189–193"
    topic: "Дієприкметниковий зворот та його синтаксична синоніміка з підрядними реченнями"
  - source: "Авраменко, 11 клас (2019)"
    pages: "§25, с. 81–82"
    topic: "Вибір між дієприкметником та підрядним означальним реченням"
  - source: "Глазова, 11 клас (2019)"
    pages: "§21–22, с. 95–97"
    topic: "Стилістичні особливості синтаксичних конструкцій"

connects_to:
  previous: "active-participles-past"
  next: "checkpoint-passive-voice"

