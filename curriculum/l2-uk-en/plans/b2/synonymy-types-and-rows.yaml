module: b2-058
level: B2
sequence: 58
slug: synonymy-types-and-rows
version: '1.0'
title: "Типи синонімів та синонімічні ряди"
subtitle: "Synonymy: Types and Rows"
focus: vocabulary
pedagogy: PPP
word_target: 4000
objectives:
  - "Розрізняти типи синонімів: абсолютні, поняттєві, стилістичні та контекстуальні."
  - "Навчитися будувати та аналізувати розгалужені синонімічні ряди навколо домінанти."
  - "Дослідити відтінки значень синонімів для забезпечення точності та виразності мовлення."
  - "Опанувати використання словників синонімів для збагачення власного лексикону."

reading_situations:
  - source_type: "художній уривок"
    topic: "Аналіз пейзажного опису або психологічного портрета героя з використанням нанизування синонімів."
    key_elements: ["епітети-синоніми", "градація", "метафоричні замінники"]
    motivation: "Дослідження того, як синоніми допомагають автору створити об'ємний образ та передати найтонші відтінки емоційного стану."

discussion_topics:
  - context: "Обговорення феномену мовного багатства: 'Чи є велика кількість синонімів перевагою мови чи перешкодою для її вивчення?'"
    questions:
      - "Чому в українській мові існує понад 30 синонімів до слова 'іти' або 'говорити'?"
      - "Чи існують у мові справді 'зайві' слова, чи кожне має свій унікальний контекст?"
      - "Як змінюється сприйняття тексту, якщо замінити книжний синонім на розмовний?"
    motivation: "Стимулювання критичного мислення про функціональну роль синонімії в комунікації."

content_outline:
  - section: "Природа та структура синонімії"
    words: 1000
    subsections:
      - "Визначення синоніма: подібність значень та різниця форм"
      - "Синонімічний ряд: домінанта (стрижневе слово) та периферія"
      - "Критерії належності слів до одного синонімічного ряду"
    key_concepts:
      - "синоніміка"
      - "лексична парадигма"
      - "домінанта"
      - "семантична близькість"
  - section: "Класифікація синонімів: семантика та прагматика"
    words: 1000
    subsections:
      - "Поняттєві (ідеографічні) синоніми: відтінки інтенсивності, розміру, якості"
      - "Стилістичні синоніми: нейтральні, піднесені та знижені лексичні одиниці"
      - "Контекстуальні синоніми як інструмент авторської творчості"
    key_concepts:
      - "ідеографічні синоніми"
      - "стилістичне забарвлення"
      - "контекстуалізація"
      - "експресивність"
  - section: "Аналітичний розбір синонімічних рядів"
    words: 1000
    subsections:
      - "Диференціація синонімів у рядах дієслів мовлення та руху"
      - "Синонімія абстрактних іменників: пошук точного терміна"
      - "Аналіз 'хибних друзів' перекладача у контексті синонімії"
    key_concepts:
      - "диференціація"
      - "точність"
      - "семантичне нюансування"
      - "відтінок значення"
  - section: "Синонімія як засіб культури мовлення"
    words: 1000
    subsections:
      - "Боротьба з тавтологією та плеоназмами через синонімічну заміну"
      - "Перифраза та евфемізм: як сказати про складне м'яко чи поетично"
      - "Стилістичне редагування тексту: вибір оптимального слова для конкретного регістра"
    key_concepts:
      - "тавтологія"
      - "перифраза"
      - "евфемізм"
      - "редагування"

