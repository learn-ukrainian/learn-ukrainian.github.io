module: b2-067
level: B2
sequence: 67
slug: synonymy-types-and-rows
version: 1.1.2
title: Типи синонімів та синонімічні ряди
subtitle: 'Синонімія: типи та ряди'
focus: vocabulary
pedagogy: PPP
word_target: 4000
objectives:
- 'Розрізняти типи синонімів: абсолютні, поняттєві, стилістичні та контекстуальні.'
- Навчитися будувати та аналізувати розгалужені синонімічні ряди навколо 
  домінанти.
- Дослідити відтінки значень синонімів для забезпечення точності та виразності 
  мовлення.
- Опанувати використання словників синонімів для збагачення власного лексикону.
reading_situations:
- source_type: художній уривок
  topic: Аналіз пейзажного опису або психологічного портрета героя з 
    використанням нанизування синонімів.
  key_elements:
  - епітети-синоніми
  - градація
  - метафоричні замінники
  motivation: Дослідження того, як синоніми допомагають автору створити об'ємний
    образ та передати найтонші відтінки емоційного стану.
writing_tasks:
- task_type: есе
  prompt: Побудуйте розгорнутий синонімічний ряд до слова 'говорити' (мінімум 10
    синонімів), класифікуйте кожен за типом (поняттєвий, стилістичний, 
    контекстуальний) та напишіть по одному реченню з кожним.
  requirements:
  - мінімум 200 слів
  - правильна класифікація типів синонімів
  - приклади вживання в контексті
  motivation: Перевірка розуміння типів синонімів та здатності будувати 
    розгалужені синонімічні ряди.
  model_answer: 'Відповідь має містити домінанту ''говорити'' та синоніми різних типів:
    поняттєві (шепотіти, кричати — відтінок інтенсивності), стилістичні (мовити —
    книжне, базікати — знижене), контекстуальні (співати — у переносному значенні).'
discussion_topics:
- context: 'Обговорення феномену мовного багатства: ''Чи є велика кількість синонімів
    перевагою мови чи перешкодою для її вивчення?'''
  questions:
  - Чому в українській мові існує понад 30 синонімів до слова 'іти' або 
    'говорити'?
  - Чи існують у мові справді 'зайві' слова, чи кожне має свій унікальний 
    контекст?
  - Як змінюється сприйняття тексту, якщо замінити книжний синонім на розмовний?
  motivation: Стимулювання критичного мислення про функціональну роль синонімії 
    в комунікації.
content_outline:
- section: Природа та структура синонімії
  words: 1000
  subsections:
  - 'Визначення синоніма: подібність значень та різниця форм'
  - 'Синонімічний ряд: домінанта (стрижневе слово) та периферія'
  - Критерії належності слів до одного синонімічного ряду
  key_concepts:
  - синоніміка
  - лексична парадигма
  - домінанта
  - семантична близькість
- section: 'Класифікація синонімів: семантика та прагматика'
  words: 1000
  subsections:
  - 'Поняттєві (ідеографічні) синоніми: відтінки інтенсивності, розміру, якості'
  - 'Стилістичні синоніми: нейтральні, піднесені та знижені лексичні одиниці'
  - Контекстуальні синоніми як інструмент авторської творчості
  key_concepts:
  - ідеографічні синоніми
  - стилістичне забарвлення
  - контекстуалізація
  - експресивність
- section: Аналітичний розбір синонімічних рядів
  words: 1000
  subsections:
  - Диференціація синонімів у рядах дієслів мовлення та руху
  - 'Синонімія абстрактних іменників: пошук точного терміна'
  - Аналіз 'хибних друзів' перекладача у контексті синонімії
  key_concepts:
  - диференціація
  - точність
  - семантичне нюансування
  - відтінок значення
- section: Синонімія як засіб культури мовлення
  words: 1000
  subsections:
  - Боротьба з тавтологією та плеоназмами через синонімічну заміну
  - 'Перифраза та евфемізм: як сказати про складне м''яко чи поетично'
  - 'Стилістичне редагування тексту: вибір оптимального слова для конкретного регістра'
  key_concepts:
  - тавтологія
  - перифраза
  - евфемізм
  - редагування
- section: Підсумок — Summary
  words: 300
  points:
  - Synonym groups center around a neutral dominant word (домінанта) and are 
    classified into ideographic (поняттєві) for meaning nuances, stylistic 
    (стилістичні) for register, and contextual (контекстуальні). Using them 
    prevents tautology and enriches speech.
  - "Self-check: What is the difference between an ideographic and a stylistic synonym?
    Build a synonym row of at least 3 words for the dominant verb 'іти' (to go). How
    would you use a euphemism (евфемізм) to soften a harsh statement?"
vocabulary:
  required:
  - синонім
  - домінанта
  - синоніміка
  - поняттєвий
  - стилістичний
  - контекстуальний
  - тавтологія
  - евфемізм
  recommended:
  - багатий
  - різноманітний
  - відтінок
  - точність
  - виразність
  - доречність
activities:
  types_required:
  - match-up
  - fill-in
  - select
  - essay-response
  min_items_per_type: 5
  total_min_items: 20
activity_hints:
- type: reading
  focus: Прочитайте текст про природа та структура синонімії і дайте відповіді 
    на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про класифікація синонімів: семантика
    та прагматика, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Природа та 
    структура синонімії». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    природа та структура синонімії.
references:
- Караман С. О. Українська мова. 10 клас (2018), §35-40 — Синоніми, антоніми, 
