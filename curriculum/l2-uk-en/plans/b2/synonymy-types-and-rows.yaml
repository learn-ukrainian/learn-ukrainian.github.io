module: b2-54
level: B2
sequence: 54
slug: synonymy-types-and-rows
version: '2.0'
title: 'Синонімія: типи та синонімічні ряди'
subtitle: 'Synonymy: Types and Synonymic Rows'
content_outline:
- section: Вступ — що таке синонімія? (Introduction — What Is Synonymy?)
  words: 600
  points:
  - 'Визначення синонімії як лексичного явища: слова, близькі за значенням, але різні
    за формою; роль синонімії у збагаченні мовлення (Держстандарт §4.4.1.2).'
  - 'Синоніми vs пароніми vs антоніми: чітке розмежування суміжних понять; типова помилка
    учнів — змішування синонімів із паронімами (напр., адрес — адреса).'
  - 'Мотивація для B2: як точний вибір синоніма підвищує стилістичну якість письма
    та усного мовлення; підготовка до роботи з функціональними стилями.'
- section: Абсолютні та семантичні синоніми (Absolute and Semantic Synonyms)
  words: 800
  points:
  - 'Абсолютні (повні) синоніми: пари з повним збігом значення (мовознавство — лінгвістика,
    буряк — бурак); їхня рідкість та тенденція до розходження з часом.'
  - 'Семантичні (ідеографічні) синоніми: відмінності у відтінках значення; градація
    інтенсивності (сміливий — відважний — безстрашний — хоробрий).'
  - 'Аналіз семантичних компонентів: метод визначення спільного ядра значення та диференційних
    сем; практика на прикладах (іти — крокувати — чимчикувати — мчати).'
  - 'Типова помилка учнів: вживання абсолютних синонімів як взаємозамінних без урахування
    стилістичного контексту (напр., «лінгвістика» в розмовному стилі).'
- section: Контекстуальні синоніми (Contextual Synonyms)
  words: 800
  points:
  - 'Визначення контекстуальних синонімів: слова, що набувають синонімічності лише
    в конкретному контексті (напр., «золотий» та «чудовий» у «золотий характер»).'
  - 'Механізм утворення: метафоризація, метонімія та перенесення значення як джерела
    контекстуальної синонімії; приклади з художньої літератури.'
  - 'Авторські синоніми: індивідуальне слововживання письменників (Стефаник, Коцюбинський)
    як ілюстрація творчого потенціалу контекстуальної синонімії.'
  - 'Практичний аналіз: визначення контекстуальних синонімів у текстах різних жанрів;
    чому їх не можна знайти у словнику синонімів.'
- section: Стилістичні синоніми та регістр (Stylistic Synonyms and Register)
  words: 800
  points:
  - 'Стилістичні синоніми: слова з однаковим значенням, але різним стилістичним забарвленням
    (обличчя — лице — пика — лик — фізіономія).'
  - 'Нейтральні vs марковані синоніми: позначення стилістичного забарвлення (книжне,
    розмовне, просторічне, офіційне); роль словника у визначенні позначок.'
  - 'Емоційно-оцінні синоніми: пари з позитивною та негативною конотацією (економний
    — скупий; сміливий — зухвалий); вплив на сприйняття тексту.'
  - 'Зв''язок із функціональними стилями: як стилістичні синоніми обслуговують різні
    регістри; підготовка до наступного модуля (B2-55 Synonymy in Registers).'
- section: Синонімічні ряди та домінанта (Synonymic Rows and Dominant Word)
  words: 1000
  points:
  - 'Поняття синонімічного ряду: група синонімів, об''єднаних спільним ядерним значенням;
    структура ряду від домінанти до периферії.'
  - 'Домінанта синонімічного ряду: стилістично нейтральне, найуживаніше слово як вихідна
    точка (напр., «іти» — домінанта для крокувати, чимчикувати, шкутильгати).'
  - 'Побудова синонімічних рядів: практика складання рядів за семантичними групами (рух,
    мовлення, розумова діяльність); ранжування за інтенсивністю та стилем.'
  - 'Робота зі «Словником синонімів української мови»: навички пошуку, читання словникових
    статей, визначення домінанти та периферійних членів ряду.'
  - 'Інтеграційна вправа: аналіз та побудова синонімічних рядів у власних текстах для
    усунення повторів та підвищення стилістичної різноманітності.'
focus: vocabulary
pedagogy: TTT
prerequisites:
- b2-53 (Checkpoint Morphology)
connects_to:
- b2-55 (Synonymy in Registers)
objectives:
- Learner can classify synonyms by type (absolute, semantic, contextual, stylistic)
- Learner can identify the dominant word in a synonymic row
- Learner can build synonymic rows and rank members by intensity and register
- Learner can use a synonym dictionary to expand vocabulary systematically
grammar:
- Лексична синонімія та її типи
- Семантичні компоненти слова (семний аналіз)
- Стилістичне забарвлення лексичних одиниць
register: науковий
phase: B2.6 [Lexicology]
vocabulary_hints:
  required:
  - синонім (synonym) — абсолютний синонім, контекстуальний синонім; базовий термін
    лексикології
  - синонімічний ряд (synonymic row) — побудувати синонімічний ряд, члени ряду; група
    слів із близьким значенням
  - домінанта (dominant word) — домінанта синонімічного ряду; стилістично нейтральне
    ядро
  - відтінок значення (shade of meaning) — семантичний відтінок, тонкі відтінки; те,
    що відрізняє синоніми один від одного
  - стилістичне забарвлення (stylistic coloring) — нейтральне, книжне, розмовне; маркованість
    слова щодо стилю
  - контекст (context) — залежно від контексту, вирвати з контексту; визначає значення
    контекстуальних синонімів
  - лексикологія (lexicology) — розділ мовознавства; наука про словниковий склад мови
  recommended:
  - паронім (paronym) — слова, близькі за звучанням, але різні за значенням; не плутати
    з синонімами
  - конотація (connotation) — позитивна / негативна конотація; додаткове емоційно-оцінне
    значення
  - семантика (semantics) — семантичний аналіз, семантичне ядро; значення слова як
    об''єкт дослідження
  - метафоризація (metaphorization) — механізм утворення контекстуальних синонімів
