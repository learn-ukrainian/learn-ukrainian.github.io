title: 'Синоніми: Місце та Простір'
subtitle: Synonyms - Place and Space
content_outline:
- section: 'Вступ: Світ як простір (Introduction: World as Space)'
  words: 600
  points:
  - 'Вступне слово від імені урбаніста: як мова структурує міське середовище та межі
    громадського простору.'
  - Культурний концепт «тутешній» (local) як символ глибокої приналежності до спільноти
    та землі, на противагу терміну «приїжджій».
  - 'Відповідність Державному стандарту (§3.15): опис типів місцевості та розташування
    об’єктів за допомогою точних просторових прислівників.'
- section: Тут чи сюди? Статика та рух (Here or Hither? Statics and Movement)
  words: 900
  points:
  - Розмежування статичного положення (тут) та динамічного напрямку (сюди) — подолання
    типової помилки «Йди тут» замість правильного «Йди сюди».
  - Вживання прислівника «тут» у нейтральних контекстах та офіційних виразах урбаністики
    (наприклад, «розташований тут»).
  - 'Стійкі словосполучення для опису динаміки: «давай сюди», «переїхати сюди», «сюди-туди».'
- section: 'Тутечки та ось тут: Близькість і стиль (Tuitechky and Axis Tut: Proximity
    and Style)'
  words: 800
  points:
  - Стилістичний контраст між зменшувально-пестливим «тутечки» (розмовний стиль, затишок)
    та офіційним «на цьому місці» (публіцистичний/діловий стиль).
  - Використання емфатичного «ось тут» для точного візуального вказування (pointing)
    під час підписання документів або позначення локації на мапі.
  - 'Дослідження §4.4.1.2: роль зменшувальних форм у наданні мовленню емоційного забарвлення
    в описі рідних місць.'
- section: 'Там, туди, онде: Далечінь та орієнтири (There, Thither, Over There: Distance
    and Landmarks)'
  words: 900
  points:
  - 'Тріада далекого простору: нейтральне «там» (статичне), цілеспрямоване «туди»
    (динамічне) та вказівне «онде/он там» (для видимих об''єктів).'
  - 'Опис маршрутів та міської інфраструктури з використанням орієнтирів: «дивіться
    онде», «не йдіть туди», «він там живе».'
  - Відтінки значення «тамтечки» як розмовного варіанту для опису специфічного, але
    віддаленого місця.
- section: 'Поріг як межа: Від магії до урбаністики (Threshold as Boundary: From Magic
    to Urbanism)'
  words: 800
  points:
  - 'Культурна антропологія: «Магія порогу» як сакральної межі між безпечним «тут»
    (дім) та невідомим «там» (зовнішній світ).'
  - 'Заборона вітатися через поріг: зв''язок мовних табу з просторовим сприйняттям
    українців.'
  - 'Підсумок: синтез синонімів для професійного опису міських локацій, поєднання
    офіційної термінології урбаніста з культурним контекстом (Ref. M35).'
focus: phraseology
pedagogy: CBI
objectives:
- Учень може розрізняти відтінки значень синонімів на позначення місця (тут, тутечки,
  на цьому місці)
- Учень вміє використовувати лексику простору для опису географічних та міських локацій
- Учень розуміє різницю між статичним положенням та напрямком руху
grammar:
- Adverbs of place
- Locative prepositions and distance
immersion: 100
register: публіцистичний
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - тут (here) — neutral, static location; used for general spatial presence
  - сюди (here/hither) — dynamic direction; vital for verbs of movement (йди сюди)
  - там (there) — static location far from the speaker; neutral register
  - туди (there/thither) — movement away from the speaker; dynamic direction
  - тутешній (local) — implies a person is from 'here', deeply connected to the community
  recommended:
  - тутечки (here) — colloquial/diminutive; adds coziness or affection to a location
  - тамтечки (there) — colloquial; refers to a distant but specific and familiar place
  - ось тут (right here) — emphatic pointing; used for precise location identification
  - онде / он там (over there) — visual pointing at a distance; refers to visible
    objects
  - поріг (threshold) — cultural boundary between domestic and external space; sacred
    barrier
  - на цьому місці (at this place) — formal publicistic expression used in reports
    and official descriptions
