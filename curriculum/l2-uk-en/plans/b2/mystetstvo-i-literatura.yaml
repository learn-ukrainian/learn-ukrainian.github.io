activity_hints:
- type: reading
  focus: 'Прочитайте текст про літературний калейдоскоп: від класики до постмодерну і дайте відповіді на запитання щодо ключових
    понять.'
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про візуальне мистецтво та архітектура, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Літературний калейдоскоп: від класики до постмодерну». Обґрунтуйте
    свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему літературний калейдоскоп: від класики до постмодерну.'
references:
