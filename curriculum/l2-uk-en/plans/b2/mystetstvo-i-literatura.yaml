module: b2-090
level: B2
sequence: 90
slug: mystetstvo-i-literatura
version: 1.1.1
title: 'Мистецтво і література: Дзеркало душі'
subtitle: 'Мистецтво та література: дзеркало душі'
focus: literature
pedagogy: seminar
word_target: 4000
objectives:
- Ознайомитися з основними напрямами українського мистецтва та літератури XX-XXI століть.
- Навчитися аналізувати художні твори, використовуючи літературознавчу та мистецтвознавчу термінологію.
- Відпрацювати навички написання критичних відгуків та есе на культурну тематику.
- Обговорити роль мистецтва у формуванні національної ідентичності та під час війни.
reading_situations:
- source_type: художній уривок
  topic: Аналіз метафори та символізму в поезії 'Розстріляного відродження'.
  key_elements:
  - метафора
  - авангард
  - екзистенціалізм
  - трагедія
  motivation: Розуміння історичного контексту та художніх засобів українського модернізму.
writing_tasks:
- task_type: відгук
  prompt: Напишіть критичний відгук на сучасний український фільм або книгу (обсягом 250-300 слів).
  requirements:
  - Оцінити сюжет, гру акторів (або стиль автора) та основну ідею.
  - 'Використати оцінну лексику: ''вражаючий'', ''неоднозначний'', ''захопливий'', ''дискусійний''.'
  - Аргументувати свою позицію.
  motivation: Розвиток навичок критичного аналізу та висловлення власної думки.
  model_answer: Відгук має містити короткий опис твору, аналіз ключових аспектів та обґрунтований висновок про його культурну
    цінність.
discussion_topics:
- context: Місія митця в часи суспільних потрясінь та війн.
  questions:
  - Чи має мистецтво бути аполітичним, чи воно завжди є інструментом впливу?
  - Як війна змінює мову та теми сучасного українського мистецтва?
  - Чи може культура бути 'поза політикою', коли йдеться про агресію?
  motivation: Глибоке обговорення етичних та соціальних функцій мистецтва.
content_outline:
- section: 'Літературний калейдоскоп: від класики до постмодерну'
  words: 1000
  subsections:
  - 'Модернізм та ''Розстріляне відродження'': трагічна велич'
  - Шістдесятництво як рух опору та оновлення
  - 'Сучасна українська література: жанрове розмаїття та світове визнання'
  key_concepts:
  - сюжет
  - композиція
  - художній образ
  - інтертекстуальність
- section: Візуальне мистецтво та архітектура
  words: 1000
  subsections:
  - Український авангард та бойчукізм
  - Сучасний живопис, муралізм та вуличне мистецтво (street art)
  - Архітектурна спадщина та проблема збереження пам'яток під час війни
  key_concepts:
  - естетика
  - стиль
  - експозиція
  - реставрація
- section: 'Сцена, екран та звук: театр, кіно, музика'
  words: 1000
  subsections:
  - 'Театральні експерименти: від Леся Курбаса до сучасних незалежних театрів'
  - 'Нова хвиля українського кіно: документалістика та ігрове кіно'
  - 'Музична сцена: поєднання етно-мотивів з сучасними ритмами'
  key_concepts:
  - режисура
  - сценарій
  - аранжування
  - виконавська майстерність
- section: Культурна ідентичність та мистецтво спротиву
  words: 1000
  subsections:
  - Мистецтво як засіб збереження пам'яті та національної ідентичності
  - 'Культурна дипломатія: презентація України світові через мистецтво'
  - Дерусифікація та деколонізація культурного простору
  key_concepts:
  - ідентичність
  - спротив
  - деколонізація
  - артефакт
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
