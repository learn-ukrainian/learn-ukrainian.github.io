module: b2-049
level: B2
sequence: 49
slug: word-formation-person-suffixes
version: '1.1'
title: "Словотвір: Суфікси на позначення осіб"
subtitle: "Word Formation: Person Suffixes"
focus: vocabulary
pedagogy: PPP
word_target: 4000
objectives:
  - "Вивчити систему українських суфіксів для творення назв осіб за професією (-ар, -ист, -ант, -ер)."
  - "Розуміти значення суфіксів, що позначають діяча за дією (-ник, -тель, -ій, -ун)."
  - "Опанувати творення фемінітивів за допомогою суфіксів -к-, -иц-, -ин-, -ес-."
  - "Засвоїти суфікси на позначення мешканців міст та країн (-ець, -анин/-янин, -ич)."
  - "Аналізувати стилістичне забарвлення різних словотвірних моделей (книжне vs розмовне)."

reading_situations:
  - source_type: "науково-популярна стаття про ринок праці"
    topic: "Аналіз нових професій та їхніх назв в українській мові, порівняння запозичених та питомих суфіксів."
    key_elements: ["професіоналізми", "фемінітиви", "словотвірні ланцюжки"]
    motivation: "Розуміння продуктивності суфіксів у сучасній мові."

listening_situations:
  - media_type: "відео"
    setting: "Репортаж про жителів різних регіонів України, де звучать назви мешканців (полтавці, кияни, львів'яни)."
    focus_points: ["Виявлення суфіксів у назвах етнонімів.", "Сприйняття емоційного забарвлення суфіксів -ун, -ій.", "Розрізнення офіційних назв професій."]
    motivation: "Розвиток здатності ідентифікувати роль особи за морфемним складом слова."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть роздум про роль фемінітивів у сучасній українській мові. Чи є вони необхідними, чи це лише модна тенденція? Використовуйте принаймні 15 різних іменників на позначення осіб, утворених за допомогою різних суфіксів."
    requirements:
      - "використання різноманітних суфіксів (-к-, -иц-, -иня)"
      - "аргументація з використанням прикладів назв професій"
      - "дотримання норм правопису 2019 року"
      - "мінімум 250 слів"
    motivation: "Дискусія про актуальні мовні зміни через призму словотвору."
    model_answer: "Текст має демонструвати глибоке розуміння теми. Очікуються приклади типу: 'викладачка', 'директорка', 'майстриня'. Автор повинен проаналізувати традиційні моделі та нові запозичення. Модельний варіант фокусується на природності звучання новоутворень."

discussion_topics:
  - context: "Як назва професії впливає на сприйняття статусу людини?"
    questions:
      - "Чи звучить слово 'вчитель' поважніше за 'вчила'?"
      - "Які суфікси на позначення осіб у вашій мові мають зневажливе забарвлення?"
      - "Чому назви мешканців міст часто стають предметом суперечок (наприклад, 'одесити' чи 'одесці')?"
    motivation: "Обговорення соціального та психологічного аспекту словотвору."

content_outline:
  - section: "Суфікси професій та занять"
    words: 1000
    subsections:
      - "Продуктивні суфікси -ар/-яр (лікар, маляр, школяр)"
      - "Запозичені моделі: -ист/-іст (програміст, юрист) та -ер (менеджер)"
      - "Книжні суфікси діяча: -тель (вчитель, визволитель) та їхня історія"
      - "Суфікси -ант/-ент у назвах осіб інтелектуальної праці"
    key_concepts:
      - "агенс"
      - "продуктивність"
      - "запозичення"
      - "професійна лексика"
  - section: "Суфікси ознак та якостей особи"
    words: 1000
    subsections:
      - "Суфікс -ець у назвах осіб за характером або станом (мудрець, хоробрець)"
      - "Експресивні суфікси -ун (брехун, бігун) та -ій (водій, крутій)"
      - "Суфікс -ак/-як у розмовних назвах (співак, чужак)"
      - "Пеjorative (зневажливі) суфікси в народній мові"
    key_concepts:
      - "експресивність"
      - "характеристика"
      - "конотація"
      - "розмовний стиль"
  - section: "Творення фемінітивів: Моделі та правопис"
    words: 1000
    subsections:
      - "Універсальний суфікс -к- (лікарка, редакторка)"
      - "Суфікс -иц- у традиційних назвах (порадниця, майстриня)"
      - "Суфікс -иня для підкреслення високого статусу чи поваги"
      - "Спільнокореневі назви та проблема відсутності відповідників"
    key_concepts:
      - "фемінітив"
      - "гендерно-нейтральна мова"
      - "словотвірна норма"
      - "аналогія"
  - section: "Назви за походженням та місцем проживання"
    words: 1000
    subsections:
      - "Модель на -ець (українець, полтавець)"
      - "Модель на -анин/-янин (киянин, галичанин, городянин)"
      - "Рідкісні та архаїчні моделі (чернігівець, волиняк)"
      - "Узгодження назв мешканців у множині"
    key_concepts:
      - "етнонім"
      - "катойконім"
      - "місцевість"
      - "суфіксальна варіативність"

vocabulary:
  required:
    - суфікс
    - фемінітив
    - діяч
    - професія
    - мешканець
    - словотвір
    - дія
    - ознака
  recommended:
    - дослідник
    - фахівець
    - керівник
    - засновник
    - однодумець
    - перехожий
    - сучасник
    - діячка

activities:
  types_required:
    - highlight-morphemes
    - match-up
    - select
    - fill-in
  min_items_per_type: 10
  total_min_items: 40

activity_hints:
  - type: match-up
    description: "Match suffix to its meaning (e.g., -тель→agent of action, -ник→occupation/role, -ець→person with quality)"
  - type: fill-in
    description: "Form agent nouns from verbs using correct suffix (e.g., вчити→вчитель, водити→водій)"
  - type: group-sort
    description: "Sort suffixes by category: професія / характеристика / мешканець / фемінітив"
  - type: select
    description: "Choose the natural Ukrainian form vs calque (e.g., 'дослідник' vs 'ресерчер')"

references:
  - "Караман, 10 клас (2018): §55-60 — Словотвір"
  - "Глазова, 11 клас (2019): §17-20 — Морфологічна стилістика"
  - "Авраменко, 11 клас (2019): §15-20 — Морфологічна норма"
  - "State Standard 2024: B2 SS 4.2 (word formation)"

connects_to:
