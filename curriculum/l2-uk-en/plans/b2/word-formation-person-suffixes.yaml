module: b2-049
level: B2
sequence: 49
slug: word-formation-person-suffixes
version: '2.0'
title: 'Словотворення: суфікси на позначення осіб'
subtitle: Word Formation - Person Suffixes
focus: grammar
pedagogy: TTT
phase: B2.5
word_target: 4000
objectives:
- Learner can form person nouns from other words using -ар/-яр suffix
- Learner can form agent nouns from verbs using -ач suffix
- Learner can form person nouns using -ник suffix for roles and occupations
- Learner can identify word formation patterns for person nouns in authentic texts
content_outline:
- section: 'Вступ: Словотвір як інструмент концептуалізації (Introduction: Word Formation as a Tool for Conceptualization)'
  words: 600
  points:
  - 'Словотворення як ключ до розширення словникового запасу на рівні B2: перехід від зазубрювання до системного розуміння'
  - Огляд продуктивних суфіксів для назв осіб згідно з Державним стандартом §4.2.5 (діяч, виконавець, танцівник)
  - 'Культурний контекст: Поезія Івана Франка «Каменярі» як символ незламності та ілюстрація суфікса -яр'
- section: 'Суфікс -ар/-яр: Від професії до національного символу (Suffix -ар/-яр: From Profession to National Symbol)'
  words: 1000
  points:
  - 'Утворення назв від іменників та дієслів: бібліотека → бібліотекар, лікувати → лікар, вівця → вівчар'
  - 'Фонетичне правило: вживання -ар після твердих приголосних та -яр після м’яких (камінь → каменяр) — запобігання помилкам
    типу «каменар»'
  - 'Феномен Кобзарства: кобзар як духовний охоронець історії та символ національної пам’яті (Т. Шевченко)'
  - 'Попередження про інтерференцію: відсутність м''якого знака в назвах професій на -р (лікар, секретар, а не лікарь, секретарь)'
- section: 'Суфікс -ач: Виконавець дії та активний діяч (Suffix -ач: Performer of Action and Active Agent)'
  words: 800
  points:
  - Виведення іменників від дієслівних основ (викладати → викладач, читати → читач, слухати → слухач)
  - 'Семантична роль активного діяча: аналіз моделей викладач/викладачка та читач/читачка'
  - 'Робота над типовою помилкою: запобігання надмірному вживанню суфікса -ник (наприклад, викладач замість помилкового «викладник»)'
- section: 'Суфікс -ник: Рід занять, ролі та соціальні групи (Suffix -ник: Occupations, Roles, and Social Groups)'
  words: 800
  points:
  - 'Утворення від іменників та прикметників: робота → робітник, письмо → письменник, художній → художник'
  - 'Роль у групі та спільна діяльність: учасник, спільник, союзник; розгляд варіанта -івник (працівник)'
  - 'Прагматична диференціація: розрізнення понять «робітник» (кваліфікована фізична праця) та «працівник» (загальний термін
    для найманої праці)'
- section: 'Практика та синтез: Рекрутинг та аналіз текстів (Practice and Synthesis: Recruitment and Textual Analysis)'
  words: 800
  points:
  - 'Вправа на визначення словотвірних ланцюжків: від якого слова та за допомогою якого суфікса утворено назву особи'
  - 'Рольова гра «Рекрутер»: використання професійних назв у контексті найму та опису посадових обов''язків (Persona: Professional
    Language Coach)'
  - 'Аналіз автентичних текстів: пошук назв осіб та визначення їхнього стилістичного забарвлення (науковий vs розмовний)'
vocabulary_hints:
  required:
  - аналіз (analysis) — розчленування цілого на частини; провести аналіз
  - синтез (synthesis) — поєднання частин у ціле; метод синтезу
  - дослідження (research) — процес вивчення явища; наукове дослідження
  - робітник (worker) — blue-collar; кваліфікований робітник, найманий робітник
  - лікар (doctor) — High frequency; лікар-хірург, сімейний лікар; важливо: твердий 'р' в кінці
  - викладач (lecturer/teacher) — High frequency academic; викладач університету, старший викладач
  - письменник (writer) — відомий письменник, український письменник
  recommended:
  - аналіз (analysis) — розчленування цілого на частини; провести аналіз
  - синтез (synthesis) — поєднання частин у ціле; метод синтезу
  - дослідження (research) — процес вивчення явища; наукове дослідження
  - робітник (worker) — blue-collar; кваліфікований робітник, найманий робітник
  - працівник (employee) — generic term; державний працівник, сумлінний працівник
  - кобзар (kobzar) — Cultural symbol; мандрівний кобзар, голос кобзаря
  - каменяр (stonecutter) — Literary/Historical (Franko); дух каменярів, лупати скалу
  - школяр (schoolboy) — старанний школяр, молодший школяр
