module: b2-086
level: B2
sequence: 86
slug: capstone-research
version: '2.0'
title: 'Підсумковий проєкт: Дослідження'
subtitle: 'Capstone Project: Research'
focus: checkpoint
pedagogy: integration
phase: B2.9
word_target: 4000
objectives:
- Учень вміє обрати актуальну тему дослідження та обґрунтувати її вибір
- Учень може самостійно знайти та опрацювати українськомовні джерела
- Учень здатен скласти розгорнутий план-проспект майбутньої презентації
content_outline:
- section: 'Вступ: Огляд Capstone проєкту (Introduction: Capstone Project Overview)'
  words: 500
  points:
  - 'Мета Capstone проєкту: інтеграція всіх мовних навичок рівня B2 для реалізації вимог Державного стандарту щодо аргументації
    та використання складних синтаксичних форм.'
  - 'Культурний контекст: знайомство з Малою академією наук України (МАН) як унікальною інституцією, що залучає молодь до
    наукового пошуку.'
  - 'Формат роботи (дослідження + презентація) та критерії оцінювання: від логіки викладу до мовної грамотності.'
- section: Вибір теми та науковий підхід (Topic Selection and Scientific Approach)
  words: 700
  points:
  - 'Критерії вдалої теми: актуальність, практична цінність та наявність доступних україномовних джерел.'
  - 'Натхнення від Володимира Вернадського: системне мислення та організація знань як основа наукового методу.'
  - 'Формулювання дослідницького питання: перехід від широкої області до вузької, конкретної тези.'
  - 'Обґрунтування вибору: як довести важливість вашого дослідження академічною мовою.'
- section: Робота з джерелами та академічна доброчесність (Working with Sources and Academic Integrity)
  words: 900
  points:
  - 'Типологія джерел: розрізнення першоджерел, наукових публікацій та третинних ресурсів (довідників).'
  - 'Академічна доброчесність: чому важливо уникати плагіату та поважати інтелектуальну власність у сучасному українському
    контексті.'
  - 'Технічні нюанси цитування: правильне використання українських лапок «» замість англійських "" та оформлення покликань.'
  - 'Парафраз чи цитата: як передати чужу думку, зберігаючи автентичність джерела та власну аргументацію.'
- section: Планування та структура плану-проспекту (Planning and Structure of the Prospectus)
  words: 700
  points:
  - 'Архітектура наукового тексту: логічний зв''язок між вступом, основними аргументами та висновками.'
  - Використання безособових конструкцій (Вважається, Варто зазначити, Дослідження показують) для надання тексту об’єктивного
    наукового звучання.
  - Розподіл зібраного матеріалу за розділами плану та створення часового графіка роботи над чернеткою.
- section: Написання чернетки та подолання мовних помилок (Writing the Draft and Correcting Errors)
  words: 800
  points:
  - 'Уникнення кальок з англійської мови: заміна суб’єктивного ''Я вірю'' (I believe) на академічні форми ''На нашу думку''
    або ''Як свідчать факти''.'
  - 'Робота з хибними друзями перекладача: чітке розрізнення термінів «дослід» (experiment) та «дослідження» (study/research).'
  - 'Інтеграція граматики B2: активне використання пасивного стану, дієприкметників та складних підрядних речень для глибини
    аналізу.'
  - 'Редагування: баланс між власною оцінкою та цитованими даними.'
- section: Підсумок та підготовка до презентації (Summary and Preparation for Presentation)
  words: 400
  points:
  - 'Контрольний список (checklist) готовності: перевірка тези, джерел та мовного стилю.'
  - 'Завдання: подання фінального плану-проспекту для отримання зворотного зв''язку.'
  - 'Анонс модуля М82: поради щодо візуалізації результатів дослідження у презентації.'
vocabulary_hints:
  required:
  - 'дослідження (research) — High frequency; collocations: проводити дослідження, результати дослідження'
  - 'джерело (source) — High frequency; collocations: надійне джерело, покликання на джерело'
  - 'теза (thesis) — Mid frequency; collocations: висувати тезу, головна теза дослідження'
  - 'аргумент (argument) — High frequency; collocations: вагомий аргумент, наводити аргументи'
  - плагіат (plagiarism) — використання чужих думок без посилання; питання академічної доброчесності
  - висновок (conclusion) — High frequency; collocations: робити висновки, дійти висновку
  recommended:
  - плагіат (plagiarism) — використання чужих думок без посилання; питання академічної доброчесності
  - 'висновок (conclusion) — High frequency; collocations: робити висновки, дійти висновку'
  - аналіз (analysis) — метод розкладання цілого на частини
  - синтез (synthesis) — метод поєднання частин у ціле
  - покликання (citation/reference) — вказівка на джерело інформації
  - обґрунтування (justification) — доведення важливості обраної теми
