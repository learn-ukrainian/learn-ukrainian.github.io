module: b2-086
level: B2
sequence: 86
slug: capstone-research
version: '1.0'
title: "Випускний проєкт: Дослідження та підготовка"
subtitle: "Capstone Project: Research and Preparation"
focus: integration
pedagogy: workshop
word_target: 4000
objectives:
  - "Вибрати тему та розробити детальний план індивідуального дослідження на основі матеріалів рівня B2."
  - "Навчитися збирати, систематизувати та критично аналізувати інформацію з україномовних джерел."
  - "Опрацювати структуру наукової або аналітичної роботи та вимоги до академічного оформлення."
  - "Підготувати чорновий варіант письмової роботи (есе, реферат або аналітична записка)."

reading_situations:
  - source_type: "огляд літератури"
    topic: "Методи критичного аналізу джерел та перевірки фактів (fact-checking) в академічному середовищі."
    key_elements: ["першоджерела", "вторинні джерела", "цитування", "об'єктивність"]
    motivation: "Надання інструментів для самостійної дослідницької роботи."

writing_tasks:
  - task_type: "есе"
    prompt: "Складіть розгорнутий план-проспект вашого випускного проєкту (обсягом 300-400 слів)."
    requirements:
      - "Сформулювати назву, мету та завдання дослідження."
      - "Обґрунтувати актуальність вибраної теми."
      - "Навести список ключових слів та очікуваних результатів."
    motivation: "Формування структури майбутнього проєкту."
    model_answer: "План має включати чітке формулювання тези, опис методології та перелік основних розділів проєкту."

discussion_topics:
  - context: "Захист ідей та гіпотез: як презентувати своє дослідження колегам."
    questions:
      - "Які труднощі виникли під час пошуку інформації українською мовою?"
      - "Як перетворити загальну тему на вузьке, глибоке дослідження?"
      - "Чому важливо використовувати різні типи джерел?"
    motivation: "Колективний аналіз та вдосконалення дослідницьких стратегій."

content_outline:
  - section: "Вибір теми та методологічний апарат"
    words: 1000
    subsections:
      - "Формулювання проблеми та обґрунтування актуальності дослідження"
      - "Об'єкт, предмет, мета та завдання: відмінності та взаємозв'язок"
      - "Вибір методів дослідження: теоретичні та емпіричні підходи"
    key_concepts:
      - "актуальність"
      - "об'єкт"
      - "завдання"
      - "методологія"
  - section: "Інформаційний пошук та аналіз джерел"
    words: 1000
    subsections:
      - "Пошук україномовних джерел у цифрових бібліотеках та архівах"
      - "Критичний аналіз тексту: виділення головного та розпізнавання маніпуляцій"
      - "Складання бібліографії та робота з каталогами"
    key_concepts:
      - "архів"
      - "каталог"
      - "автентичність"
      - "систематизація"
  - section: "Структура та логіка викладу матеріалу"
    words: 1000
    subsections:
      - "Композиція роботи: вступ, основна частина, висновки"
      - "Логічні зв'язки між розділами та аргументація"
      - "Використання мовних засобів для зв'язності тексту (конектори)"
    key_concepts:
      - "композиція"
      - "теза"
      - "аргумент"
      - "послідовність"
  - section: "Академічна етика та оформлення роботи"
    words: 1000
    subsections:
      - "Правила цитування та запобігання плагіату: міжнародні стандарти"
      - "Графічне оформлення: таблиці, діаграми та ілюстрації українською мовою"
      - "Редагування та коректура власного тексту"
    key_concepts:
      - "доброчесність"
      - "парафраз"
      - "редагування"
      - "коректура"

vocabulary:
  required:
    - тема
    - джерело
    - план
    - аргумент
    - структура
    - висновок
    - актуальність
    - цитата
  recommended:
    - аналітичний
    - систематичний
    - критичний
    - логічний
    - достовірний

activities:
  types_required:
    - critical-analysis
    - essay-response
    - fill-in
    - matching-up
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "religion-in-ukraine"
  next: "capstone-prezentatsiya"
