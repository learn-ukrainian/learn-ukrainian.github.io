module: b2-12
level: B2
sequence: 12
slug: parenthetical-expressions
version: '2.0'
title: Вставні слова та вирази
content_outline:
- section: Вступ — Вставні слова та вирази
  points:
  - 'Що таке вставні конструкції — State Standard §4.3.2: «просте речення зі вставними
    словами»'
  - Їх роль у побудові тексту
  - 'Відмінність від членів речення — learner error: homonymy (e.g., «Він може це
    зробити» vs «Він, може, прийде»); use decision tree visual'
- section: Вставні слова для вираження впевненості та невпевненості
  points:
  - 'Впевненість (безумовно, безперечно, звісно, напевно) — звісно/звичайно: high
    frequency agreement markers'
  - 'Невпевненість (можливо, мабуть, здається, очевидно) — cultural hook: «Polite
    Uncertainty» (Ukrainians use «мабуть» to soften statements and avoid aggression)'
  - Градація ступеня впевненості
- section: Вставні слова для вираження ставлення
  points:
  - Позитивна оцінка (на щастя, на радість) — «на щастя» expresses relief/positive
    evaluation
  - 'Негативна оцінка (на жаль, на біду) — learner error: «на жаль» is always written
    separately (not «нажаль»)'
  - Нейтральне ставлення
- section: Вставні слова для позначення джерела інформації
  points:
  - За словами... (according to...)
  - На думку... (in the opinion of...)
  - Як відомо... (as is known...)
  - 'Кажуть... (they say...) — cultural hook: «Collective Wisdom» (implies shared
    knowledge/rumor, appealing to community authority)'
- section: Вставні слова для організації висловлювання
  points:
  - 'Послідовність (по-перше, по-друге, нарешті) — learner error: always hyphenated
    (not «по перше»)'
  - Узагальнення (загалом, взагалі, отже)
  - Уточнення (зокрема, наприклад, а саме) — «до речі» used for topic switching
  - Протиставлення (навпаки, з іншого боку)
- section: Пунктуація при вставних словах
  points:
  - Виділення комами
  - Позиція у реченні
  - 'Типові помилки — warning: «False Parentheticals» (навіть, майже, адже, принаймні)
    are NEVER separated by commas'
- section: Практика і підсумок
  points:
  - Інтеграція в мовлення
  - Стилістичні ефекти
  - Підготовка до модуля 13
vocabulary_hints:
  required:
  - вставне слово (parenthetical word)
  - модальність (modality)
  - впевненість (certainty)
  - невпевненість (uncertainty)
  - джерело інформації (source of information)
  - безумовно (undoubtedly)
  - можливо (possibly)
  - на жаль (unfortunately) — always written separately; emotional evaluation
  - на щастя (fortunately) — relief/positive evaluation
  - по-перше (firstly) — always hyphenated; formal/structured speech
  recommended:
  - градація (gradation)
  - оцінка (evaluation)
  - висловлювання (utterance)
  - уточнення (specification)
  - узагальнення (generalization)
  - мабуть (probably) — marks uncertainty/politeness; standard spelling with «т»
  - кажуть (they say) — colloquial source of info; implies collective wisdom
  - до речі (by the way) — topic switching; high frequency
  - звісно (of course) — agreement/certainty
activity_hints:
- type: quiz
  focus: Identify function of parenthetical expression
  items: 15+
- type: fill-in
  focus: Insert appropriate parenthetical expressions
  items: 15+
- type: group-sort
  focus: Sort by function (certainty, attitude, source, sequence)
  items: 20+
- type: fill-in
  focus: Add parenthetical expressions to neutral sentences
  items: 12+
- type: error-correction
  focus: Fix punctuation with parenthetical expressions
  items: 10+
- type: match-up
  focus: Parenthetical expression → function
  items: 16+
- type: essay-response
  focus: Write opinion text using varied parenthetical expressions
  output: Model answer provided
focus: grammar
