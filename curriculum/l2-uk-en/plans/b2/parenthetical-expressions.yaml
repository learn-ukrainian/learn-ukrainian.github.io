module: b2-016
level: B2
sequence: 16
slug: parenthetical-expressions
version: '1.2'
title: "Вставні слова та конструкції"
subtitle: "Вставні слова та конструкції"
focus: grammar
pedagogy: PPP
phase: "B2.1b [Participles & Register Intro]"
word_target: 4000
objectives:
  - "Визначати вставні слова, словосполучення та речення за їхнім значенням у складних
    текстах."
  - "Класифікувати вставні одиниці за семантичними групами (ступінь вірогідності,
    почуття, джерело інформації, порядок викладу, звернення до співрозмовника)."
  - "Досконало володіти пунктуацією при вставних конструкціях, включаючи використання
    тире та дужок для вставних речень."
  - "Диференціювати вставні слова від омонімічних повнозначних членів речення (наприклад,
    'правда', 'кажуть', 'видно')."
  - "Використовувати вставні одиниці для побудови переконливої аргументації та структурування
    аналітичних текстів."

reading_situations:
  - source_type: "аналітична стаття"
    topic: "Експертна оцінка майбутнього штучного інтелекту в українському контексті."
    key_elements:
      - "вставні слова для вираження впевненості (безумовно, безперечно, ясна річ)"
      - "джерело інформації (за словами експертів, як зазначають фахівці, на нашу
        думку)"
      - "послідовність аргументації (по-перше, з іншого боку, отже, таким чином)"
    motivation: "Аналіз того, як вставні конструкції формують авторську модальність
      та допомагають структурувати складні аналітичні міркування."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Публічна дискусія між літературним критиком та сучасним автором про
      роль слова в часи кризи."
    focus_points:
      - "Використання вставних слів для активізації уваги (уявіть собі, бачите, знаєте)."
      - "Емоційні вставки для передачі суб'єктивного ставлення (на щастя, на диво,
        як не дивно)."
      - "Інтонаційне виділення вставних конструкцій (паузація, зміна темпу мовлення)."
    motivation: "Розвиток навичок розпізнавання суб'єктивної модальності та емоційного
      забарвлення в реальному усному мовленні високого рівня."

writing_tasks:
  - task_type: "аргументований есе"
    prompt: "Напишіть есе на тему: «Чи може цифрова освіта повністю замінити традиційну
      школу?». Використовуйте вставні конструкції для вираження власної позиції та
      структурування аргументів."
    requirements:
      - "мінімум 250 слів"
      - "використати мінімум 6 різних за семантикою вставних одиниць"
      - "включити принаймні одне вставне речення, виділене тире або дужками"
      - "продемонструвати розрізнення вставного слова та аналогічного члена речення"
    motivation: "Практичне відпрацювання пунктуаційної грамотності та стилістичної
      вправності у використанні модальних засобів мови."
    model_answer: "Текст має починатися зі вставного слова (наприклад, 'Безперечно'),
      містити логічні переходи (по-перше, з одного боку), посилання на джерело (як
      кажуть дослідники) та завершуватися логічним висновком (отже, зрештою)."

discussion_topics:
  - context: "Суперечка щодо доцільності використання фемінітивів у науковому стилі."
    questions:
      - "Як ви гадаєте, чи є це природним процесом для української мови?"
      - "Які вставні конструкції допоможуть вам висловити сумнів або, навпаки, повну
        переконаність?"
      - "Чи доречно використовувати емоційні вставки (на жаль, на щастя) у такій дискусії?"
    motivation: "Стимулювання використання вставних одиниць для вираження різних ступенів
      впевненості та етичного ставлення до теми."

content_outline:
  - section: "Семантична класифікація вставних одиниць"
    words: 1000
    subsections:
      - "Вираження ступеня вірогідності: від абсолютної впевненості до припущення
        (без сумніву vs мабуть)"
      - "Емоційне ставлення до повідомлення: радість, жаль, здивування, занепокоєння"
      - "Вказівка на джерело інформації: власна думка, загальновідомі факти, чутки"
      - "Логічне структурування тексту: послідовність, протиставлення, підсумовування"
      - "Ввічливість та привернення уваги: роль вставних слів у мовленнєвому етикеті"
    key_concepts:
      - "модальність"
      - "суб'єктивне ставлення"
      - "перцептивні вставки"
  - section: "Пунктуаційна система відокремлення"
    words: 1000
    subsections:
      - "Кома як стандартний знак відокремлення вставних слів"
      - "Вживання тире для вставних конструкцій, що мають характер додаткового пояснення"
      - "Дужки як засіб виділення розлогих вставних речень та зауважень"
      - "Вставні конструкції на межі частин складного речення: особливості пунктуації"
    key_concepts:
      - "інтонаційне виділення"
      - "пунктуаційна норма"
      - "парантеза"
  - section: "Складні випадки розрізнення та омонімія"
    words: 1000
    subsections:
      - "Диференціація вставних слів та членів речення (здається, видно, кажуть, правда)"
      - "Слова, що завжди функціонують як вставні (мабуть, по-перше, отже)"
      - "Частки, які помилково приймають за вставні слова (нібито, майже, принаймні,
        навіть)"
      - "Контекстуальні умови, що змінюють синтаксичну роль слова"
    key_concepts:
      - "синтаксична омонімія"
      - "функціональна роль"
  - section: "Стилістичне використання в різних регістрах"
    words: 1000
    subsections:
      - "Науковий стиль: вставки для логізації та посилання на авторитети"
      - "Публіцистика: використання емоційних вставок для впливу на аудиторію"
      - "Офіційно-діловий стиль: обмеження та стандарти використання"
      - "Художня література: вставні речення як засіб психологізації та деталізації"

vocabulary:
  required:
    - вставне слово
    - вставна конструкція
    - впевненість
    - припущення
    - модальність
    - джерело інформації
    - послідовність
  recommended:
    - суб'єктивність
    - аргументація
    - пунктуаційна норма
    - парантеза
    - логічність викладу

activities:
  types_required:
    - select
    - error-correction
    - punctuation-fix
    - reading
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: mark-the-words
    focus: "Визначити вставні слова та конструкції в тексті, виділити їх"
  - type: group-sort
    focus: "Класифікувати вставні одиниці за семантикою: впевненість / невпевненість
      / джерело / порядок викладу"
  - type: error-correction
    focus: "Виправити пунктуацію при вставних словах (зайві або пропущені коми)"
  - type: select
    focus: "Розрізнити вставне слово та омонімічний член речення (правда, здається,
      видно, кажуть)"

references:
  - source: "Заболотний, 9 клас (2017)"
