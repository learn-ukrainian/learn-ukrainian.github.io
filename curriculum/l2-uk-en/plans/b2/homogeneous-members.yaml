module: b2-015
level: B2
sequence: 15
slug: homogeneous-members
version: '2.0'
title: Однорідні члени речення
subtitle: Homogeneous Members and Generalizing Words
focus: grammar
pedagogy: TTT
phase: B2.2 [Syntax Mastery]
word_target: 4000
objectives:
- Learner can identify homogeneous members in all syntactic positions
- Learner can distinguish homogeneous from non-homogeneous attributes
- Learner can correctly punctuate sentences with generalizing words
- Learner can apply punctuation rules for various conjunction types with homogeneous members
content_outline:
- section: 'Вступ: Однорідність як синтаксичне явище (Introduction: Homogeneity as a Syntactic Phenomenon)'
  words: 500
  points:
  - 'Визначення однорідних членів речення згідно з Держстандартом §4.3.2: члени речення, що відповідають на одне питання,
    залежать від одного слова та є рівноправними'
  - 'Ознаки однорідності: однакова синтаксична функція, зв''язок із одним і тим самим членом речення, інтонація перелічування'
  - 'Стилістична роль однорідних членів: створення ефекту деталізації, нагнітання, контрасту та ритмічності у тексті'
- section: Однорідні підмети та присудки (Homogeneous Subjects and Predicates)
  words: 800
  points:
  - 'Однорідні підмети: узгодження присудка з кількома підметами — множина чи найближчий? (напр., «Мати й батько прийшли»
    vs «Прийшла мати й батько»)'
  - 'Однорідні присудки: кілька присудків при одному підметі для передачі послідовності або одночасності дій (напр., «Він
    встав, одягнувся і вийшов»)'
  - 'Типова помилка: ототожнення складного речення з простим із однорідними присудками — критерій розмежування за наявністю
    одного підмета'
  - 'Сполучники при однорідних членах: єднальні (і, та, також), протиставні (а, але, проте, зате), розділові (або, чи, то...то,
    не то...не то)'
- section: Однорідні другорядні члени (Homogeneous Secondary Members)
  words: 800
  points:
  - 'Однорідні додатки: кілька додатків при одному присудку (напр., «Я купив хліб, молоко й масло»)'
  - 'Однорідні означення: узгоджені означення, що характеризують предмет з одного боку (напр., «червоні, жовті, сині квіти»)
    — відмінність від неоднорідних означень'
  - 'Неоднорідні означення: означення, що характеризують предмет з різних боків (напр., «великий дерев''яний стіл» — розмір
    + матеріал) — не розділяються комами'
  - 'Однорідні обставини: кілька обставин одного типу (напр., «Він працює швидко, акуратно й наполегливо»)'
- section: Узагальнюючі слова при однорідних членах (Generalizing Words with Homogeneous Members)
  words: 900
  points:
  - 'Узагальнюючі слова перед однорідними членами: двокрапка після узагальнюючого слова (напр., «Усе навколо зеленіло: дерева,
    кущі, трава»)'
  - 'Узагальнюючі слова після однорідних членів: тире перед узагальнюючим словом (напр., «Дерева, кущі, трава — усе навколо
    зеленіло»)'
  - 'Узагальнюючі слова та продовження речення: тире після однорідних членів перед продовженням (напр., «Усе: дерева, кущі,
    трава — зеленіло під сонцем»)'
  - 'Типові узагальнюючі слова: все, всюди, ніде, ніхто, скрізь, завжди — та їхній зв''язок з однорідними членами'
  - 'Стилістичний ефект: узагальнюючі слова як засіб підсилення враження цілісності або всеохопності'
- section: Пунктуація та практика (Punctuation and Practice)
  words: 1000
  points:
  - 'Кома між однорідними членами: правила вживання коми при сполучниках і без них (безсполучниковий зв''язок — кома; одиничний
    «і» — без коми; повторюваний «і...і» — кома)'
  - 'Крапка з комою між однорідними членами: вживання при поширених однорідних членах із внутрішніми комами'
  - 'Складні випадки пунктуації: парні сполучники «не тільки...а й», «як...так і», «не стільки...скільки» — кома перед другою
    частиною'
  - 'Комплексний практикум: розстановка розділових знаків у текстах із різними типами однорідних членів та узагальнюючими
    словами'
  - 'Підготовка до модуля b2-16: зв''язок однорідних членів із вставними словами та конструкціями'
vocabulary_hints:
  required:
  - однорідні члени (homogeneous members) — рівноправні члени речення, що залежать від одного слова
  - узагальнюючі слова (generalizing words) — слова, що узагальнюють значення однорідних членів
  - перелічування (enumeration) — інтонаційний та синтаксичний прийом послідовного називання
  - єднальний сполучник (copulative conjunction) — і, та, також; з'єднує рівноправні члени
  - протиставний сполучник (adversative conjunction) — а, але, проте, зате; виражає контраст
  - розділовий сполучник (disjunctive conjunction) — або, чи, то...то; виражає вибір або чергування
  - двокрапка (colon) — розділовий знак після узагальнюючого слова перед однорідними членами
  - неоднорідні означення (non-homogeneous attributes) — означення, що характеризують предмет з різних боків
  recommended:
  - парний сполучник (correlative conjunction) — не тільки...а й, як...так і
  - нагнітання (accumulation) — стилістичний ефект від послідовності однорідних членів
  - деталізація (detailing) — функція однорідних членів для уточнення
  - крапка з комою (semicolon) — розділовий знак між поширеними однорідними членами
  - безсполучниковий зв'язок (asyndetic connection) — зв'язок однорідних членів без сполучника
