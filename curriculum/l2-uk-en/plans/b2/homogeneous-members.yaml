module: homogeneous-members
level: B2
sequence: 15
version: '1.3'
title: "Однорідні члени речення"
subtitle: "Однорідні члени речення: структура, пунктуація та стиль"
focus: grammar
pedagogy: PPP
objectives:
  - "Глибоке розуміння сутності однорідності: однакова синтаксична роль та залежність
    від одного слова."
  - "Класифікація типів зв'язку між однорідними членами (сполучниковий, безсполучниковий,
    змішаний)."
  - "Майстерне володіння правилами пунктуації при однорідних членах, включаючи повторювані
    сполучники."
  - "Вивчення ролі узагальнюючих слів та відповідних розділових знаків (двокрапка,
    тире)."
  - "Аналіз стилістичних фігур, побудованих на однорідності (градація, антитеза),
    та їх вживання в текстах."

reading_situations:
  - source_type: "науковий опис"
    topic: "Класифікація природних ресурсів України"
    key_elements: ["корисні копалини", "водні ресурси", "лісові масиви", "земельний
          фонд"]
    motivation: "Наукові переліки з узагальнюючими словами є класичним прикладом використання
      однорідних членів для систематизації знань."
  - source_type: "художній твір"
    topic: "Емоційний стан героя під час подорожі"
    key_elements: ["тривога (f), надія (f) та цікавість (f)", "дивитися (v), слухати
          (v), відчувати (v)", "і день, і ніч"]
    motivation: "Вивчення експресивної функції однорідних членів у передачі багатогранності
      почуттів та дій."

listening_situations:
  - media_type: "відео"
    setting: "Презентація нового технологічного продукту: перелік переваг"
    focus_points: ["інтонація переліку", "логічні наголоси на однорідних членах",
      "використання узагальнюючих слів для підсумування"]
    motivation: "Сприйняття на слух структурованої інформації, поданої через ряди
      однорідних членів."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть репортаж про відвідування ярмарку або виставки, використовуючи
      розгорнуті ряди однорідних членів з узагальнюючими словами для детального опису
      асортименту та атмосфери."
    requirements:
      - "мінімум 250 слів"
      - "використати щонайменше 2 речення з узагальнюючими словами (одне з двокрапкою,
        одне з тире)"
      - "використати різні типи сполучникового зв'язку (і...і, не тільки...а й)"
    motivation: "Практичне відпрацювання складної пунктуації та вміння групувати об'єкти
      в тексті."
    model_answer: "Текст має бути багатим на деталі: «На ярмарку було все: і мед,
      і вишиванки, і кераміка. Овочі, фрукти, ягоди — вся продукція була свіжою».
      Оцінюється точність розділових знаків та логіка переліку."

discussion_topics:
  - context: "Магія переліку: коли забагато — це добре?"
    questions:
      - "Як ряди однорідних членів допомагають створити ефект достатку або хаосу в
        художньому тексті?"
      - "Чому в офіційних документах переліки часто оформлюють списком, а не в рядок?"
      - "Чи може один невдало підібраний однорідний член зіпсувати все речення?"
    motivation: "Дискусія про риторичні та стилістичні аспекти однорідності на рівні
      B2."

content_outline:
  - section: "Природа однорідності: логіка та синтаксис"
    words: 800
    subsections:
      - "Визначення однорідних членів речення та їхні ознаки"
      - "Морфологічна однорідність та неоднорідність (одна роль — різні частини мови)"
      - "Логічна сумісність понять у ряду однорідних членів"
    key_concepts:
      - "однорідний ряд"
      - "супідрядність"
      - "семантична однорідність"
  - section: "Зв'язок у рядах однорідних членів"
    words: 800
    subsections:
      - "Безсполучниковий зв'язок та інтонація переліку"
      - "Сполучниковий зв'язок: єднальні, протиставні та розділові сполучники"
      - "Парні та повторювані сполучники: нюанси вживання та пунктуації"
    key_concepts:
      - "сурядний сполучник"
      - "інтонаційна єдність"
      - "пунктуаційна норма"
  - section: "Узагальнюючі слова при однорідних членах"
    words: 800
    subsections:
      - "Місце узагальнюючого слова відносно однорідного ряду"
      - "Двокрапка та тире: правила вибору розділового знака"
      - "Складні випадки: узагальнююче слово + однорідний ряд + продовження речення"
    key_concepts:
      - "узагальнення"
      - "пунктограма"
      - "синтаксична позиція"
  - section: "Однорідні та неоднорідні означення"
    words: 800
    subsections:
      - "Критерії розрізнення: ознака з одного боку vs ознаки з різних боків"
      - "Роль коми між означеннями: коли вона потрібна, а коли ні"
      - "Контекстуальна однорідність означень у художньому мовленні"
    key_concepts:
      - "семантична диференціація"
      - "перелічувальна інтонація"
      - "атрибутивний ряд"
  - section: "Стилістичні можливості однорідності"
    words: 800
    subsections:
      - "Градація як засіб нагнітання емоцій або посилення думки"
      - "Антитеза: протиставлення через однорідні члени"
      - "Практикум: редагування текстів з помилками в однорідних рядах (логічні та
        граматичні)"
    key_concepts:
      - "градація"
      - "антитеза"
      - "риторична фігура"

word_target: 4000

vocabulary:
  required:
    - однорідні члени речення
    - узагальнююче слово
    - сполучниковий зв'язок
    - безсполучниковий зв'язок
    - перелічувальна інтонація
    - двокрапка
    - тире
    - градація
  recommended:
    - антитеза
    - систематизація
    - пунктограма
    - сурядність
    - контекст

activities:
  types_required:
    - select
    - fill-in
    - match-up
    - error-correction
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: error-correction
    focus: "Виправити пунктуацію при однорідних членах з узагальнювальним словом (двокрапка,
      тире)"
  - type: fill-in
    focus: "Вставити відповідний сполучник між однорідними членами (і...і, не тільки...а
      й, але)"
  - type: cloze
    focus: "Розставити розділові знаки в тексті з кількома рядами однорідних членів"
  - type: select
    focus: "Визначити правильний варіант пунктуації при повторюваних та парних сполучниках"

references:
  - source: "Заболотний, 9 клас (2017)"
    pages: "§18–19"
    topic: "Однорідні члени речення, узагальнювальне слово"
  - source: "Авраменко, 9 клас (2017)"
    pages: "§17–18"
    topic: "Однорідні члени речення та їх пунктуація"
  - source: "Глазова, 11 клас (2019)"
    pages: "§24, с. 103"
    topic: "Прості ускладнені речення"
  - source: "State Standard 2024"
    pages: "B2, SS 4.3"
    topic: "Syntax — homogeneous members"

connects_to:
  previous: "b2-one-member-sentences"
  next: "detached-members"

