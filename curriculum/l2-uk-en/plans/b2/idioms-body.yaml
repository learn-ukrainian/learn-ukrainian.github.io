title: 'Фразеологізми: Душа і Серце'
content_outline:
- section: 'Вступ: Кордоцентризм — українська філософія серця (Introduction: Cordocentrism
    — Ukrainian Philosophy of the Heart)'
  words: 650
  points:
  - Пояснити концепцію кордоцентризму (Г. Сковорода, П. Юркевич) як ключову рису української
    ментальності, де серце — це центр духовного життя та пізнання («голова всього
    в людині»).
  - Інтегрувати ідею Сковороди про «сродну працю» — роботу, що «лягає на серце», пов’язавши
    її з фразеологізмом «вкладати душу».
  - Описати роль метафори у фразеології згідно з вимогами стандарту §4.4.1.2, фокусуючись
    на описі внутрішнього світу людини (Каталог Б, §3.1).
- section: Фразеологізми з компонентом «душа» (Idioms with the 'Soul' Component)
  words: 950
  points:
  - 'Детальний аналіз виразів: «душа в п''яти» (сильний страх) та «душа болить» (співчуття),
    з акцентом на розмовному вжитку та типових колокаціях («від страху душа в п''яти
    пішла»).'
  - Опрацювання фразеологізму «камінь на душі» — емоційний стан важких переживань
    та варіанти «зняти камінь з душі», «носити камінь на душі».
  - Вживання евфемізму «віддати Богу душу» у відповідному контексті (урочистий, тихий
    тон щодо людей похилого віку) та розмежування з іншими синонімами смерті.
- section: Фразеологізми з компонентом «серце» (Idioms with the 'Heart' Component)
  words: 950
  points:
  - Вивчення виразу «серце кров'ю обливається» (глибокий жаль) та синоніма «серце
    крається» у контексті емоційної реакції на чужий біль.
  - 'Аналіз середньочастотного виразу «брати за серце» (зворушувати) та типових об''єктів
    дії: пісня, розповідь, щирість.'
  - Опис етичних категорій через вирази «від щирого серця» (без задньої думки), «мати
    серце» (милосердя) та «положити руку на серце» (чесність).
- section: Типові помилки та стилістичні нюанси (Common Errors and Stylistic Nuances)
  words: 750
  points:
  - 'Дриль для розрізнення: «брати за серце» (хвилювати, діяти на почуття) vs «брати
    до серця» (хворобливо реагувати, перейматися) — навести 3 контрастні пари контекстів.'
  - 'Стилістичне застереження: пояснити комічність вживання «віддати Богу душу» щодо
    техніки (телефон, комп''ютер), наголошуючи на анімованості концепту душі.'
  - 'Корекція калькування: порівняння англійського «have a heart» з українським «мати
    совість» або «змилосердитися», замість дослівного «мати серце» у значенні прохання
    про пощаду.'
- section: 'Практика: Емоційні стани та діалоги (Practice: Emotional States and Dialogues)'
  words: 700
  points:
  - Написання емоційного діалогу (100-150 слів) з використанням 4-5 нових виразів,
    дотримуючись ролі Поета (серце як «внутрішнє сонце»).
  - Порівняльний аналіз із виразами M49-50 (голова, руки, ноги), створюючи цілісну
    картину опису стану людини через соматичні фразеологізми.
  - 'Творче завдання на пошук відповідників: знайти англійські аналоги для «від щирого
    серця» (from the bottom of my heart) та «мати камінь на душі» (have a heavy heart),
    аналізуючи культурні відмінності.'
focus: phraseology
pedagogy: CBI
objectives:
- Вивчити 8 ключових фразеологізмів зі словами 'душа' і 'серце'
- Розрізняти емоційні відтінки фразеологізмів (страх, полегшення, жаль, щирість)
- Вживати нові вирази в контексті для збагачення мови
grammar:
- Fixed expressions
- Idiom structure and variation
register: varies
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - термін (term) — наукова назва поняття
  - поняття (concept) — абстрактна ідея або категорія
  - процес (process) — послідовна зміна станів або явищ
  - метод (method) — шлях дослідження або спосіб дії
  - 'душа в п''яти (one''s heart sinks into one''s boots) — колокації: від страху
    душа в п''яти пішла; вказує на сильний переляк'
  - 'вкладати душу (to put one''s soul into) — колокації: вкладати душу в роботу;
    високочастотний вираз для самовідданої праці'
  - кордоцентризм (cordocentrism) — термін на позначення філософії серця в українській
    культурі
  recommended:
  - аналіз (analysis) — розчленування цілого на частини
  - синтез (synthesis) — поєднання частин у ціле
  - дослідження (research) — наукове вивчення явища
  - 'камінь на душі (heavy heart) — колокації: зняти камінь з душі, носити камінь;
    описує емоційний тягар'
  - серце кров'ю обливається (one's heart bleeds) — вживається у контексті співчуття
    та глибокого жалю
  - 'брати за серце (to touch the heart) — колокації: пісня/розповідь бере за серце;
    вживається щодо джерела зворушення'
  - віддати Богу душу (to pass away) — евфемізм для смерті; вживається у поважному
    або літературному контексті
