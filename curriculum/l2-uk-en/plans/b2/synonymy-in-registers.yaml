module: b2-059
level: B2
sequence: 59
slug: synonymy-in-registers
version: '1.0'
title: "Синонімія у різних реєстрах"
subtitle: "Synonymy in Registers"
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити функціонування синонімів у різних функціональних стилях української мови."
  - "Навчитися підбирати синоніми відповідно до комунікативної ситуації, мети та адресата."
  - "Аналізувати стилістичне забарвлення лексичних одиниць (книжна vs розмовна лексика)."
  - "Опанувати навичку стилістичного перекодування текстів через синонімічну заміну."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Порівняльний аналіз двох фрагментів: виступ науковця на конференції та його ж пояснення тієї самої теми у неформальному подкасті."
    focus_points: ["зміна термінологічних синонімів на загальновживані", "використання розмовної синонімії", "емоційне забарвлення висловлювань"]
    motivation: "Розвиток здатності розпізнавати стилістичні маркери на слух та розуміти механізм адаптації інформації для різної аудиторії."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть два варіанти відгуку на переглянуту виставу: один для офіційного культурного порталу, інший — для особистого блогу чи месенджера."
    requirements:
      - "мінімум 150 слів для кожного варіанту"
      - "використання мінімум 5 пар стилістичних синонімів (напр. захоплюючий / драйвовий)"
      - "дотримання граматичних норм обраного регістра"
    motivation: "Відпрацювання практичної навички свідомого вибору лексики для створення певної тональності тексту."
    model_answer: "Офіційний текст повинен містити слова 'сценічне втілення', 'акторська майстерність', 'драматургія'. Розмовний варіант — 'гра акторів', 'крута постановка', 'чепляє за живе'. Модельна відповідь демонструє відсутність стилістичного дисонансу."

content_outline:
  - section: "Стилістична парадигма синонімії"
    words: 1000
    subsections:
      - "Нейтральна лексика як ядро синонімічного ряду та точка відліку"
      - "Книжна синонімія: високий стиль, поетизми та застарілі слова"
      - "Знижена синонімія: просторіччя, жаргонізми та вульгаризми в контексті B2"
    key_concepts:
      - "стилістичний регістр"
      - "експресивна синонімія"
      - "лексична доречність"
      - "соціолінгвістичний контекст"
  - section: "Синонімія в офіційно-діловому та науковому стилях"
    words: 1000
    subsections:
      - "Стандартизація вибору: відмова від емоційності на користь точності"
      - "Синонімія канцеляризмів та мовних штампів: де вони є доцільними"
      - "Термінологічна синонімія та проблема уніфікації понять"
    key_concepts:
      - "канцеляризм"
      - "мовне кліше"
      - "моносемія"
      - "професіоналізм"
  - section: "Медійна та художня синонімія: гра зі смислами"
    words: 1000
    subsections:
      - "Оцінна лексика в публіцистиці: створення позитивного та негативного образу"
      - "Використання синонімів для побудови метафор та алюзій"
      - "Стилістичний контраст як художній прийом у сучасному медіадискурсі"
    key_concepts:
      - "публіцистичний стиль"
      - "мовна гра"
      - "метафоризація"
      - "маніпулятивний потенціал"
  - section: "Практикум: Стилістична трансформація тексту"
    words: 1000
    subsections:
      - "Алгоритм заміни розмовних одиниць на нейтральні або офіційні аналоги"
      - "Аналіз та виправлення стилістичного дисонансу в текстах"
      - "Адаптація композиційної структури при зміні регістра"
    key_concepts:
      - "редагування"
      - "перекодування"
      - "стилістична правка"
      - "відповідність адресату"

vocabulary:
  required:
    - регістр
    - стиль
    - забарвлення
    - канцеляризм
    - офіційний
    - розмовний
    - нейтральний
    - доречність
  recommended:
    - контекст
    - адресат
    - ситуація
    - перефразування
    - еквівалент
    - термін

activities:
  types_required:
    - translate
    - error-correction
    - match-up
    - essay-response
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "synonymy-types-and-rows"
  next: "synonymy-practice-precision"
