module: b2-055
level: B2
sequence: 55
slug: synonymy-in-registers
version: '2.0'
title: Синонімія у функціональних стилях
subtitle: Synonymy Across Functional Styles
focus: vocabulary
pedagogy: TTT
phase: B2.6 [Lexicology]
word_target: 4000
objectives:
- Learner can select register-appropriate synonyms for each of the five Ukrainian functional styles
- Learner can transform a text from one register to another by substituting synonyms
- Learner can identify stylistic dissonance caused by inappropriate synonym choice
- Learner can analyze how synonym selection in media headlines shapes reader perception
content_outline:
- section: Вступ — регістр і вибір слова (Introduction — Register and Word Choice)
  words: 600
  points:
  - 'Зв''язок між синонімією та функціональними стилями: чому одне й те саме поняття вимагає різних слів у різних стилях (Держстандарт
    §4.4.1.1).'
  - 'П''ять функціональних стилів української мови: науковий, офіційно-діловий, публіцистичний, художній, розмовний — стисла
    характеристика кожного через призму лексичного вибору.'
  - 'Метафора «мовний гардероб»: як підбір синоніма — це підбір одягу для конкретної ситуації; мотивація для свідомого стилістичного
    вибору.'
- section: Синоніми наукового та офіційно-ділового стилів (Scientific and Official Style Synonyms)
  words: 800
  points:
  - 'Науковий стиль: термінологічна точність та однозначність; перевага термінів над загальновживаними синонімами (захворювання
    замість хвороба, гіпотеза замість припущення).'
  - 'Офіційно-діловий стиль: канцеляризми та кліше як стилістична норма; синонімічні заміни (мешканець — особа, що проживає;
    дім — житловий об''єкт).'
  - 'Типова помилка: вживання канцеляризмів у розмовному мовленні (напр., «здійснювати прогулянку» замість «гуляти»); вплив
    на природність тексту.'
  - 'Контрастивний аналіз: одне поняття у двох стилях — «працівник» (нейтральне) vs «співробітник» (офіційне) vs «робітник»
    (виробниче).'
- section: Синоніми публіцистичного та художнього стилів (Journalistic and Literary Synonyms)
  words: 800
  points:
  - 'Публіцистичний стиль: експресивна лексика, оцінні синоніми, метафоричні заміни (країна — держава — батьківщина — вітчизна);
    роль емоційного впливу.'
  - 'Художній стиль: індивідуально-авторські синоніми, тропи як засоби синонімії; стилістична свобода письменника (Стефаник:
    «земля» — «ґрунт» — «мати»).'
  - 'Порівняння: один і той самий факт у публіцистичному (переконування) та художньому (зображення) стилях — різний синонімічний
    вибір при описі однієї ситуації.'
  - 'Аналіз заголовків ЗМІ: як вибір синоніма у заголовку формує ставлення читача (конфлікт — сутичка — протистояння — війна).'
- section: Розмовні синоніми та експресивність (Colloquial Synonyms and Expressiveness)
  words: 800
  points:
  - 'Розмовний стиль: скорочення, жаргонізми, просторічні синоніми; градація від нейтрального до зниженого (їсти — жерти —
    хомʼячити).'
  - 'Стилістична помітка як орієнтир: позначки «розм.», «зниж.», «лайл.» у словниках; навички визначення доречності синоніма
    за контекстом.'
  - 'Емоційна функція розмовних синонімів: як зниження регістру створює гумор, іронію або інтимність; межа між експресивністю
    та вульгарністю.'
  - 'Зворотний напрямок: канцеляризми в розмовному стилі як джерело комічного ефекту та соціальної сатири (напр., «вищезгаданий
    громадянин» про сусіда).'
- section: Міжстильове порівняння та практика (Cross-Register Comparison and Practice)
  words: 1000
  points:
  - 'Трансформаційна вправа: переказ одного повідомлення у п''яти функціональних стилях із зміною синонімічного ряду (напр.,
    тема «дощ»: атмосферні опади → злива → дощик).'
  - 'Таблиця стилістичних відповідників: побудова зведеної таблиці синонімів для 5-6 ключових понять у кожному стилі; робота
    зі словником.'
  - 'Аналіз стилістичного дисонансу: виявлення «чужих» слів у текстах (наукового синоніма в розмовному стилі та навпаки);
    редагування для стильової однорідності.'
  - 'Творче завдання: написання двох версій тексту (офіційний лист vs дружній повідомлення) на одну тему з усвідомленим вибором
    синонімів.'
  - 'Підсумкова рефлексія: формування індивідуального «стилістичного компаса» для автоматичного вибору синоніма залежно від
    ситуації спілкування.'
vocabulary_hints:
  required:
  - функціональний стиль (functional style) — п'ять функціональних стилів української мови; система мовних засобів для конкретної
    сфери
  - регістр (register) — офіційний регістр, розмовний регістр; рівень формальності мовлення
  - канцеляризм (bureaucratese) — зловживання канцеляризмами, канцелярський штамп; офіційно-ділова лексика поза своїм стилем
  - експресивність (expressiveness) — експресивний синонім, засоби експресивності; емоційна виразність мовлення
  - стилістичний дисонанс (stylistic dissonance) — невідповідність слова стилю тексту; помилка у виборі синоніма
  - публіцистичний стиль (publicistic style) — стиль ЗМІ та публічних виступів; переконувальна функція
  recommended:
  - термін (term) — науковий термін, галузевий термін; однозначне слово наукового стилю
  - просторіччя (colloquialism) — знижена лексика розмовного стилю; протилежне книжному
  - троп (trope) — метафора, метонімія як засоби художнього стилю; джерело авторських синонімів
  - штамп (cliche) — газетний штамп, мовний штамп; зношена від частого вживання конструкція
  - конотація (connotation) — позитивна та негативна конотація; додаткове значення слова понад денотат
