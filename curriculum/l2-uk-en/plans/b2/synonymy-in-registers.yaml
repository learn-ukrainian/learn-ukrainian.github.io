module: b2-068
level: B2
sequence: 68
slug: synonymy-in-registers
version: '1.1'
title: "Синонімія у різних реєстрах"
subtitle: "Синонімія в регістрами"
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
  - "Дослідити функціонування синонімів у різних функціональних стилях української
    мови."
  - "Навчитися підбирати синоніми відповідно до комунікативної ситуації, мети та адресата."
  - "Аналізувати стилістичне забарвлення лексичних одиниць (книжна vs розмовна лексика)."
  - "Опанувати навичку стилістичного перекодування текстів через синонімічну заміну."

reading_situations:
  - source_type: "порівняльний аналіз"
    topic: "Два варіанти одного тексту: офіційний прес-реліз компанії та неформальний
      допис у блозі про ту саму подію."
    key_elements: ["стилістичні синоніми", "реєстрова варіативність", "канцеляризми
          vs розмовна лексика"]
    motivation: "Тренування здатності ідентифікувати стилістичне забарвлення лексичних
      одиниць у реальних текстах різних реєстрів."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Порівняльний аналіз двох фрагментів: виступ науковця на конференції
      та його ж пояснення тієї самої теми у неформальному подкасті."
    focus_points: ["зміна термінологічних синонімів на загальновживані", "використання
          розмовної синонімії", "емоційне забарвлення висловлювань"]
    motivation: "Розвиток здатності розпізнавати стилістичні маркери на слух та розуміти
      механізм адаптації інформації для різної аудиторії."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть два варіанти відгуку на переглянуту виставу: один для офіційного
      культурного порталу, інший — для особистого блогу чи месенджера."
    requirements:
      - "мінімум 150 слів для кожного варіанту"
      - "використання мінімум 5 пар стилістичних синонімів (напр. захоплюючий / драйвовий)"
      - "дотримання граматичних норм обраного регістра"
    motivation: "Відпрацювання практичної навички свідомого вибору лексики для створення
      певної тональності тексту."
    model_answer: "Офіційний текст повинен містити слова 'сценічне втілення', 'акторська
      майстерність', 'драматургія'. Розмовний варіант — 'гра акторів', 'крута постановка',
      'чепляє за живе'. Модельна відповідь демонструє відсутність стилістичного дисонансу."

content_outline:
  - section: "Стилістична парадигма синонімії"
    words: 1000
    subsections:
      - "Нейтральна лексика як ядро синонімічного ряду та точка відліку"
      - "Книжна синонімія: високий стиль, поетизми та застарілі слова"
      - "Знижена синонімія: просторіччя, жаргонізми та вульгаризми в контексті B2"
    key_concepts:
      - "стилістичний регістр"
      - "експресивна синонімія"
      - "лексична доречність"
      - "соціолінгвістичний контекст"
  - section: "Синонімія в офіційно-діловому та науковому стилях"
    words: 1000
    subsections:
      - "Стандартизація вибору: відмова від емоційності на користь точності"
      - "Синонімія канцеляризмів та мовних штампів: де вони є доцільними"
      - "Термінологічна синонімія та проблема уніфікації понять"
    key_concepts:
      - "канцеляризм"
      - "мовне кліше"
      - "моносемія"
      - "професіоналізм"
  - section: "Медійна та художня синонімія: гра зі смислами"
    words: 1000
    subsections:
      - "Оцінна лексика в публіцистиці: створення позитивного та негативного образу"
      - "Використання синонімів для побудови метафор та алюзій"
      - "Стилістичний контраст як художній прийом у сучасному медіадискурсі"
    key_concepts:
      - "публіцистичний стиль"
      - "мовна гра"
      - "метафоризація"
      - "маніпулятивний потенціал"
  - section: "Практикум: Стилістична трансформація тексту"
    words: 1000
    subsections:
      - "Алгоритм заміни розмовних одиниць на нейтральні або офіційні аналоги"
      - "Аналіз та виправлення стилістичного дисонансу в текстах"
      - "Адаптація композиційної структури при зміні регістра"
    key_concepts:
      - "редагування"
      - "перекодування"
      - "стилістична правка"
      - "відповідність адресату"

vocabulary:
  required:
    - регістр
    - стиль
    - забарвлення
    - канцеляризм
    - офіційний
    - розмовний
    - нейтральний
    - доречність
  recommended:
    - контекст
    - адресат
    - ситуація
    - перефразування
    - еквівалент
    - термін

activities:
  types_required:
    - translate
    - error-correction
    - match-up
    - essay-response
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: reading
    focus: "Прочитайте текст про стилістична парадигма синонімії і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про синонімія в офіційно-діловому та науковому стилях, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Стилістична парадигма синонімії». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему стилістична парадигма синонімії."

references:
  - "Караман С. О. Українська мова. 10 клас (2018), §38-42 — Стилістика лексичних
    засобів"
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Синоніми в різних стилях мовлення"
  - "Глазова О. П. Українська мова. 11 клас (2019), §14-15 — Лексична норма та стилістична
    доречність"
  - "State Standard 2024: B2 SS 4.4 — Lexicology, register awareness"

connects_to:
  previous: "synonymy-types-and-rows"
  next: "synonymy-practice-precision"
