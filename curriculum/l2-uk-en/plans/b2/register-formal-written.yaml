module: b2-038
level: B2
sequence: 38
slug: register-formal-written
version: 1.0.1
title: 'Офіційний писемний стиль: науковий та юридичний'
subtitle: 'Офіційний писемний стиль: науковий та юридичний'
focus: grammar
pedagogy: TTT
word_target: 4000
phase: B2.3 [Stylistic Devices & Register]
objectives:
- Порівняти науковий та офіційно-діловий стилі як два полюси формального писемного мовлення.
- 'Опанувати спільні риси: об''єктивність, безособовість, термінологічна точність, складний синтаксис.'
- 'Розрізняти специфіку кожного: науковий — доказовість та логіка; офіційний — стандартизація та однозначність.'
- Навчитися складати академічні анотації та офіційні документи (заяви, претензії).
reading_situations:
- source_type: наукова стаття / анотація
  topic: Аналіз академічної анотації до сучасного дослідження в галузі штучного інтелекту або екології.
  key_elements:
  - структура IMRaD
  - термінологічна насиченість
  - лаконічність
  - об'єктивність викладу
  motivation: Розуміння стандартів міжнародної та української академічної комунікації.
- source_type: законодавчий акт
  topic: Аналіз вибраних статей із Цивільного кодексу щодо прав та обов'язків сторін.
  key_elements:
  - безособові конструкції
  - складні переліки
  - термінологічна точність
  motivation: Розуміння юридичного мовлення та його мовних засобів.
listening_situations:
- media_type: лекція
  setting: Уривок із лекції про методологію наукових досліджень та етику академічного письма.
  focus_points:
  - логічна послідовність
  - мовні маркери переходів
  - термінологія
  motivation: Розвиток сприйняття складного наукового мовлення.
writing_tasks:
- task_type: анотація + заява
  prompt: 1) Напишіть анотацію (150 слів) до уявного дослідження. 2) Напишіть офіційну заяву до установи (150 слів). Порівняйте
    стилістичні засоби.
  requirements:
  - загалом мінімум 300 слів
  - 'в анотації: терміни, конектори, безособові форми'
  - 'у заяві: реквізити, юридичні кліше (згідно з, відповідно до)'
  motivation: Практика двох офіційних регістрів у порівнянні.
  model_answer: 'Анотація: ''У даному дослідженні проаналізовано вплив цифровізації на мовну ідентичність. Встановлено кореляцію...''
    Заява: ''Прошу надати інформацію згідно з пунктом 5.2 Закону...'''
discussion_topics:
- context: Чи може юридична мова бути зрозумілою звичайним людям?
  questions:
  - Чи має науковий текст бути емоційним у гуманітарних дисциплінах?
  - Де проходить межа між точністю терміна та зрозумілістю фрази?
  motivation: Обговорення соціальної ролі офіційного мовлення.
dialogue_situations:
- setting: Науковий керівник обговорює зі студентом структуру дипломної роботи.
  roles:
  - науковий керівник
  - студент
  key_phrases:
  - анотація має бути лаконічною
  - використайте конектори
  - уникайте суб'єктивних оцінок
- setting: Юрист пояснює клієнту, як скласти претензію.
  roles:
  - юрист
  - клієнт
  key_phrases:
  - згідно з договором
  - на підставі статті
  - відповідно до чинного законодавства
content_outline:
- section: Спільне ядро формального писемного мовлення
  words: 1000
  subsections:
  - 'Об''єктивність та безособовість: конструкції на -но/-то, пасив, модальність'
  - 'Термінологічна точність: однозначність та системність термінів'
  - 'Складний синтаксис: причинно-наслідкові, умовні, допустові зв''язки'
  - 'Логічні конектори: отже, таким чином, зокрема, проте, водночас'
  key_concepts:
  - об'єктивність
  - безособовість
  - термінологія
- section: 'Науковий стиль: від анотації до дисертації'
  words: 1000
  subsections:
  - 'Підстилі: власне науковий, науково-навчальний, науково-популярний'
  - 'Архітектоніка тексту: IMRaD, вступ-методи-результати-висновки'
  - 'Академічна доброчесність: цитування, парафраз, посилання'
  - 'Мовні формули наукової дискусії: згоди та незгоди'
  key_concepts:
  - анотація
  - цитування
  - доказовість
- section: 'Офіційно-діловий стиль: від заяви до кодексу'
  words: 1000
  subsections:
  - 'Підстилі: законодавчий, адміністративний, дипломатичний'
  - 'Юридична термінологія: чинний, повноваження, зобов''язання, позов'
  - 'Стійкі формули: згідно з, відповідно до, на підставі, у разі, внаслідок'
  - 'Система реквізитів: від заголовка до підпису'
  key_concepts:
  - стандартизація
  - юридична формула
  - реквізит
- section: Порівняльний аналіз та практика редагування
  words: 1000
  subsections:
  - 'Науковий vs офіційний: спільне та відмінне у таблиці'
  - 'Типові помилки: канцеляризми в науці, емоційність в юридиці'
  - Редагування текстів на стилістичну однорідність
  - Трансформація тексту між регістрами
  key_concepts:
  - стилістична однорідність
  - редагування
  - трансформація
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary_hints:
- word: дослідження
  translation: research
  context: У дослідженні проаналізовано динаміку змін.
- word: гіпотеза
  translation: hypothesis
  context: Гіпотезу підтверджено експериментально.
- word: методологія
  translation: methodology
  context: Методологія дослідження описана в другому розділі.
- word: законодавство
  translation: legislation
  context: Відповідно до чинного законодавства.
- word: повноваження
  translation: authority, mandate
  context: Суд має повноваження вирішувати цю справу.
- word: договір
  translation: contract, agreement
  context: Згідно з умовами договору.
- word: зобов'язання
  translation: obligation
  context: Сторони виконують свої зобов'язання.
- word: анотація
  translation: abstract, annotation
  context: Анотація стисло описує зміст дослідження.
- word: актуальність
  translation: relevance
  context: Актуальність теми зумовлена сучасними викликами.
- word: чинний
  translation: current, valid (legal)
  context: Чинне законодавство регулює ці відносини.
- word: постанова
  translation: resolution, decree
  context: Постановою суду позов задоволено.
- word: скарга
  translation: complaint (legal)
  context: Подати скаргу можна протягом 30 днів.
- word: доцільно
  translation: advisable, expedient
  context: Доцільно зазначити, що результати підтверджують...
- word: звітність
  translation: reporting
  context: Фінансова звітність подається щоквартально.
- word: підстава
  translation: basis, grounds
  context: На підставі отриманих даних зроблено висновки.
- word: висновок
  translation: conclusion
  context: Висновки дослідження мають практичне значення.
- word: реквізит
  translation: requisite (of a document)
  context: Офіційний документ має обов'язкові реквізити.
- word: позов
  translation: lawsuit, claim
  context: Позов подано до районного суду.
