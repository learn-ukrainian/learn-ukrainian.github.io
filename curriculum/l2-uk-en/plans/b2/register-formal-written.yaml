  focus: Доповнити науковий текст конекторами, юридичний — формулами (згідно з, на підставі)
- type: error-correction
  focus: 'Знайти стилістичний дисонанс: розмовну лексику в науковому або емоційність у юридичному тексті'
- type: select
  focus: 'Визначити стиль уривка: науковий чи офіційно-діловий'
- type: group-sort
  focus: 'Розподілити лексику за стилем: наукова / юридична / спільна офіційна'
