module: b2-71
level: B2
sequence: 71
slug: medytsyna-pohlybleno
version: '2.0'
title: Медицина (поглиблено)
subtitle: Medicine (Advanced)
content_outline:
- section: 'Вступ: Медична реформа та система eHealth (Introduction: Medical Reform
    and eHealth)'
  words: 500
  points:
  - 'Структура охорони здоров''я України: первинна, вториння та третинна ланки; роль
    НСЗУ (Національна служба здоров''я України)'
  - 'Медична реформа: принцип «гроші йдуть за пацієнтом», вільний вибір сімейного
    лікаря та використання системи eHealth (додаток Helsi)'
- section: 'Діагностика: Микола Амосов та культура здоров''я (Diagnostics: Mykola
    Amosov and Health Culture)'
  words: 700
  points:
  - 'Постать Миколи Амосова: світова слава кардіохірурга, кібернетика, «система обмежень
    та навантажень», концепція здоров''я як дисципліни'
  - 'Професійна діагностична лексика: направлення на УЗД, МРТ, аналіз крові; опис
    результатів обстеження в медичному реєстрі'
- section: Симптоматика та анамнез (Symptomatology and Anamnesis)
  words: 1000
  points:
  - 'Розширена лексика болю: дієслова (боліти, пекти, колоти, давити, ниіти) та специфічні
    прикметники (ріжучий, тупий, переміжний, пульсуючий)'
  - Локалізація та іррадіація болю (під лопаткою, у попереку, в ділянці серця); збір
    анамнезу — як пацієнт описує історію хвороби
  - 'Типова помилка: Рід іменника «біль» — вживання виключно в чоловічому роді (сильний
    біль, нестерпний біль) на відміну від інших мов'
- section: 'Діалог «лікар — пацієнт»: практичні навички (Doctor-Patient Dialogue:
    Practical Skills)'
  words: 800
  points:
  - Стандартні запитання лікаря (На що скаржитесь? Як давно?) та відповіді пацієнта
    з використанням дієслова «турбувати» (Мене турбує...)
  - Етикет та ввічливі форми в професійному контексті; оформлення електронного рецепта
    та направлення до вузького спеціаліста
  - 'Типова помилка: Диференціація дієслів «лікувати» (treat a patient) та «лічити»
    (count) — відпрацювання правильного вживання в контексті'
- section: Фармакологія та інновації (Pharmacology and Innovations)
  words: 600
  points:
  - 'Фармакологічна термінологія: типи ліків (мазь, сироп, таблетки), способи застосування
    (натще, перед сном), дозування та побічні ефекти'
  - 'Типова помилка: Вживання дієслова «приймати» — правильно для ліків (приймати
    ліки), але неправильно для участі (брати участь у консиліумі)'
  - 'Науковий контекст: Олександр Богомолець, розвиток геронтології в Україні та пошук
    «еліксиру молодості» (сироватка АЦС)'
- section: 'Підсумок: професійна етика та практика (Summary: Professional Ethics and
    Practice)'
  words: 400
  points:
  - 'Рольова гра — візит до Головного хірурга: аналіз складних клінічних випадків
    з дотриманням професійного тону та етики'
  - 'Телемедицина: письмовий опис симптомів для дистанційної консультації; аналіз
    автентичних інструкцій до медичних препаратів'
focus: domain
pedagogy: CBI
objectives:
- Використовувати медичну лексику для опису симптомів та діагнозів
- Розуміти та вести діалог лікар-пацієнт українською
- Орієнтуватися в українській системі охорони здоров'я
grammar:
- Medical register
- Professional terminology
phase: B2.4 Skills & Capstone
vocabulary_hints:
  required:
  - біль (pain) — гострий, тупий, пекучий, ниючий біль; вгамувати біль; (іменник чоловічого
    роду)
  - лікувати (to treat) — лікувати пацієнта, лікуючий лікар; не плутати з «лічити»
    (to count)
  - скаржитися (to complain) — скаржитися на біль, скаржитися на серце; основна скарга
    (chief complaint)
  - направлення (referral) — електронне направлення, направлення на аналізи, отримати
    направлення
  - рецепт (prescription) — електронний рецепт, виписати рецепт, ліки за рецептом
  - термін (term) — медичний термін; професійна термінологія
  - поняття (concept) — ключове поняття; поняття норми та патології
  - процес (process) — лікувальний процес; запальний процес
  - метод (method) — метод діагностики; метод лікування
  recommended:
  - приймати (to take) — приймати ліки, приймати таблетки; (уникати в значенні «брати
    участь»)
  - сімейний лікар (family doctor) — вибір лікаря; декларація з лікарем
  - знеболювальне (painkiller) — приймати знеболювальне; дієвий засіб
  - аналіз (analysis) — аналіз крові, результати аналізів
  - синтез (synthesis) — синтез білка; синтез інформації
  - дослідження (research) — клінічне дослідження; проводити дослідження
