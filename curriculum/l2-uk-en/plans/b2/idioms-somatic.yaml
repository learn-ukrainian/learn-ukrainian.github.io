module: b2-60
level: B2
sequence: 60
slug: idioms-somatic
version: '2.0'
title: 'Соматичні фразеологізми: Голова, обличчя, руки, ноги, тіло'
subtitle: All Somatic Idioms (head, face, hands, legs, body — merged)
content_outline:
- section: 'Вступ: Тіло як дзеркало мови (Introduction: The Body as a Mirror of Language)'
  words: 500
  points:
  - 'Соматична фразеологія як система: голова = інтелект, руки = дія, ноги = рух, серце
    = емоції, очі = сприйняття'
  - 'Вимоги Державного стандарту (§4.4.1.2): використання фразеологізмів як стилістичного
    засобу для збагачення мовлення рівня B2'
- section: 'Голова, обличчя, очі (Head, Face, Eyes)'
  words: 800
  points:
  - 'Ідіоми з «голова»: світла голова (розум), гаряча голова (імпульсивність), вішати
    голову (відчай), як сніг на голову (раптовість), морочити голову (набридати)'
  - 'Ідіоми з «око»/«обличчя»: впадати в око (не «кидатися в очі» — калька!), замилювати
    очі (обманювати), втратити обличчя (зганьбитися), краєм ока (неуважно)'
  - 'Етимологія: «опростоволоситися» — сакральність покриття голови; «водити за ніс»
    — ведмеді на ярмарку'
- section: 'Руки та плечі (Hands and Shoulders)'
  words: 800
  points:
  - 'Ідіоми з «рука»: мати золоті руки (вправність), руки не доходять (нестача часу),
    рука об руку (разом), махнути рукою (відмовитися), брати себе в руки (самоконтроль)'
  - 'Ідіоми з «плече»: плечем до плеча (солідарність), мати голову на плечах (розсудливість),
    з плечей упало (полегшення)'
  - 'Прийменникове керування: різниця між «взяти в руки» (Acc), «тримати в руках» (Loc),
    «з рук у руки» (Gen→Acc)'
- section: 'Ноги, серце, спина (Legs, Heart, Back)'
  words: 900
  points:
  - 'Ідіоми з «нога»: стати на ноги (досягти успіху), плутатися під ногами (заважати),
    ноги в руки (швидко), зі зв''язаними ногами (безпорадність)'
  - 'Ідіоми з «серце»: від щирого серця (щирість), брати до серця (хвилюватися),
    камінь на серці (тягар), легко на серці (полегшення)'
  - 'Ідіоми з «спина»/«шия»: сісти на шию (використовувати), за спиною (таємно),
    нести на своїх плечах (відповідальність)'
  - 'Граматична корекція: «сміятися з когось» (не «над кимось»)'
- section: 'Практичний синтез: весь корпус соматизмів (Practice: Full Body Idioms)'
  words: 1000
  points:
  - 'Класифікаційна вправа: розподіл 25+ ідіом за семантичними групами (інтелект, дія,
    рух, емоції, стосунки)'
  - 'Регістрова диференціація: книжні (втратити обличчя) vs розмовні (водити за ніс)
    vs нейтральні (мати золоті руки)'
  - 'Творче завдання: створення лінгвістичного портрета з використанням мінімум 8
    соматизмів із різних частин тіла'
focus: phraseology
pedagogy: CBI
objectives:
- Learner can recognize and interpret 25+ somatic idioms across head, hands, legs, heart,
  and body
- Learner can distinguish literal vs figurative meanings of body-related idioms
- Learner can classify somatic idioms by semantic group (intellect, action, movement,
  emotion)
- Learner can use somatic idioms appropriately across formal and informal registers
grammar:
- Fixed expressions (фразеологічні одиниці)
- Idiom structure and variation
immersion: 100
register: varies
phase: B2.6 [Lexicology]
prerequisites:
- b2-59 (Set Expressions Combined)
connects_to:
- b2-61 (Idioms Animals)
vocabulary_hints:
  required:
  - світла голова (bright mind) — про розумну, розсудливу людину; висока частотність
  - впадати в око (to catch the eye) — правильно вживати замість кальки 'кидатися
    в очі'
  - водити за ніс (to lead by the nose) — обманювати; розмовний стиль
  - мати золоті руки (to have golden hands) — бути вправним майстром; висока частотність
  - брати себе в руки (to pull oneself together) — самоконтроль; нейтральний стиль
  - стати на ноги (to get on one's feet) — досягти незалежності/успіху; нейтральний стиль
  - від щирого серця (from the bottom of one's heart) — щирість; висока частотність
  - втратити обличчя (to lose face) — втратити авторитет; книжний/діловий стиль
  recommended:
  - опростоволоситися (to make a fool of oneself) — зганьбитися (культурний контекст)
  - морочити голову (to mess with someone's head) — набридати; не плутати з 'ламати голову'
  - руки не доходять (can't get around to it) — нестача часу; розмовний стиль
  - плечем до плеча (shoulder to shoulder) — солідарність; публіцистичний стиль
  - камінь на серці (a weight on one's heart) — тягар; нейтральний стиль
  - сміятися з когось (to laugh at someone) — правильне прийменникове керування (не 'над')
