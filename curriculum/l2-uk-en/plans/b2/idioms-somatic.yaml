module: b2-064
level: B2
sequence: 64
slug: idioms-somatic
version: '1.0'
title: "Соматична фразеологія: Тіло та емоції"
subtitle: "Somatic Idioms: Body and Emotions"
focus: vocabulary
pedagogy: seminar
word_target: 4000
objectives:
  - "Вивчити ключові соматичні фразеологізми (пов'язані з частинами тіла) та їхні значення."
  - "Дослідити метафоричне переосмислення фізичних дій для опису емоцій та психічних станів."
  - "Проаналізувати роль соматизмів у створенні мовної картини світу українців."
  - "Відпрацювати доречне вживання соматичних ідіом у художньому та розмовному мовленні."

listening_situations:
  - media_type: "аудіо"
    setting: "Запис розмови двох друзів, які емоційно обговорюють складну життєву ситуацію."
    focus_points: ["ідентифікація соматичних ідіом", "визначення емоційного тону розмови", "аналіз контекстуальних значень"]
    motivation: "Розвиток здатності сприймати на слух та інтерпретувати експресивні фразеологізми у спонтанному мовленні."

discussion_topics:
  - context: "Обговорення універсальності соматизмів: 'Чому частини тіла є найпопулярнішим джерелом для ідіом у різних мовах?'"
    questions:
      - "Які українські соматизми здаються вам найбільш неочікуваними або дивними?"
      - "Як за допомогою ідіом про очі чи руки можна описати характер людини?"
      - "Чи існують гендерні відмінності у вживанні соматичної фразеології?"
    motivation: "Заохочення до міжкультурного порівняння та поглибленого розуміння антропоцентризму в мові."

content_outline:
  - section: "Голова, очі та вуха: центри інтелекту та сприйняття"
    words: 1000
    subsections:
      - "Ідіоми про голову як вмістилище розуму та волі ('мати голову на плечах', 'ламати голову')"
      - "Очі як дзеркало душі та інструмент соціального контролю ('не зводити очей', 'пустити туман в очі')"
      - "Слухове сприйняття та увага: ідіоми про вуха ('пропустити повз вуха', 'тримати вуха гостро')"
    key_concepts:
      - "інтелектуальна діяльність"
      - "візуальний контроль"
      - "перцепція"
      - "ментальні стани"
  - section: "Руки та ноги: фразеологія дії та активності"
    words: 1000
    subsections:
      - "Руки як символ праці, майстерності та влади ('золоті руки', 'умивати руки', 'руки опускаються')"
      - "Ноги у фразеологізмах руху, втоми та соціального статусу ('взяти ноги на плечі', 'на широку ногу')"
      - "Взаємодія рук і ніг у метафорах успіху та поразки"
    key_concepts:
      - "активність"
      - "прагматизм"
      - "соціальна позиція"
      - "рухова метафора"
  - section: "Внутрішні органи: серце, кров, дихання"
    words: 1000
    subsections:
      - "Серце як осередок почуттів та щирості ('від щирого серця', 'серце не на місці')"
      - "Кров у фразеології темпераменту та родинних зв'язків ('кров з молоком', 'псувати кров')"
      - "Дихання та груди як символи свободи, страху або надії"
    key_concepts:
      - "емоційна сфера"
      - "психосоматика"
      - "темперамент"
      - "екзистенційні стани"
  - section: "Стилістичний потенціал соматизмів"
    words: 1000
    subsections:
      - "Використання соматичної фразеології для створення іронії та сатири"
      - "Трансформація значень соматизмів у сучасному молодіжному сленгу"
      - "Етикетні формули, що базуються на соматичних жестах (поклін, рукостискання у мові)"
    key_concepts:
      - "іронія"
      - "мовна гра"
      - "неологізація"
      - "етикет"

vocabulary:
  required:
    - соматизм
    - метафоризація
    - сприйняття
    - темперамент
    - іронія
    - антропоцентризм
    - щирість
    - експресія
  recommended:
    - кмітливість
    - завзяття
    - збентеження
    - нехтувати
    - знесилення

activities:
  types_required:
    - match-up
    - select
    - unjumble
    - essay-response
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "set-expressions-combined"
  next: "idioms-animals"
