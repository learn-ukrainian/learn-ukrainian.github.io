activity_hints:
- type: fill-in
  description: 'Decline compound numerals in all cases (e.g., орудний: ''п''ятьмастами шістдесятьма сімома'')'
- type: error-correction
  description: Fix wrong case forms in compound numerals (e.g., 'п'ятидесятьох'→'п'ятдесятьох')
- type: select
  description: Choose the correct declined form of a compound numeral in context
- type: cloze
  description: Complete a statistical text with correctly declined compound numerals
