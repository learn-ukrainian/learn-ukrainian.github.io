module: b2-059
level: B2
sequence: 59
slug: numeral-declension-compound-numbers
version: 1.2.1
title: 'Відмінювання числівників: Складні, складені, збірні та дробові'
subtitle: 'Відмінювання числівників: складені, збірні та дробові'
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Досконало вивчити відмінювання складних числівників на позначення десятків (50-80) та сотень (200-900).
- Опанувати правила відмінювання кожного компонента у складених кількісних числівниках.
- Засвоїти особливості відмінювання слів 'тисяча', 'мільйон', 'мільярд' як іменників.
- Навчитися правильно узгоджувати числівники з іменниками у непрямих відмінках (особливо в орудному та місцевому).
- Використовувати великі числа в економічних, статистичних та фінансових контекстах.
- Засвоїти збірні числівники (двоє, троє, четверо, п'ятеро) та правила їхнього вживання з іменниками.
- Опанувати дробові числівники (одна друга, три четвертих, півтора/півтори) та їхнє узгодження з іменниками.
reading_situations:
- source_type: економічний огляд / аналітична стаття
  topic: Аналіз бюджетних показників або демографічної статистики, де великі числа вживаються у різних відмінках.
  key_elements:
  - складені числівники
  - відмінювання сотень
  - узгодження з грошовими одиницями
  motivation: Розуміння функціонування числівників у професійному дискурсі.
listening_situations:
- media_type: лекція
  setting: Презентація бізнес-плану або наукова доповідь про результати масштабного дослідження.
  focus_points:
  - Розрізнення на слух форм числівників на -десяти та -десятьох.
  - Сприйняття складних числових послідовностей.
  - Акцентуація при читанні великих чисел.
  motivation: Тренування слухової уваги до морфологічних деталей числівників.
writing_tasks:
- task_type: відгук
  prompt: 'Напишіть відгук на статтю про розвиток інфраструктури вашого міста. Прокоментуйте наведені цифри (кількість населення,
    вартість проектів, терміни). Використовуйте щонайменше 12 складених числівників у непрямих відмінках (наприклад: ''понад
    трьома тисячами п''ятсот шістдесятьма восьмими...'').'
  requirements:
  - відмінювання всіх складових частин кількісних числівників
  - правильне узгодження з іменниками (гривнями, кілометрами тощо)
  - використання прийменників, що вимагають певних відмінків (близько, понад, від)
  - мінімум 250 слів
  motivation: Практичне відпрацювання найбільш складної теми української морфології.
  model_answer: Текст має бути насичений точними числовими даними. Очікується правильне вживання орудного відмінка складних
    числівників (наприклад, 'вісьмомастами' замість ненормативного 'восьмистами'). Модельний варіант демонструє бездоганне
    володіння флексіями всіх частин складених числових назв.
discussion_topics:
- context: 'Магія чисел у маркетингу та політиці: чи схильні ми більше довіряти точним цифрам?'
  questions:
  - Чому людині важко сприймати великі числа (мільйони, мільярди) на слух?
  - Які помилки у відмінюванні числівників ви найчастіше чуєте від носіїв мови?
  - Чи варто спрощувати правила відмінювання числівників в українській мові?
  motivation: Аналіз ролі числівників у маніпуляції та переконанні.
content_outline:
- section: Відмінювання складних числівників (десятки та сотні)
  words: 1000
  subsections:
  - 'Група 50-80: відмінювання лише другої частини (-десяти, -десятьох...)'
  - 'Група 200-900: відмінювання обох частин (двохсот, двомастами...)'
  - Особливості числівників 'сорок', 'дев'яносто', 'сто' (лише дві форми)
  - Аналіз парадигм орудного відмінка як найскладнішого сегмента
  key_concepts:
  - складна назва
  - парадигма
  - флексія
  - мовна помилка
- section: Складені кількісні числівники
  words: 1000
  subsections:
  - Правило відмінювання кожного слова в складеному числівнику
  - Поєднання різних типів відмінювання в одному числі (наприклад, 854)
  - 'Узгодження з іменниками: називний vs родовий vs орудний відмінки'
  - Правопис складених числівників (роздільне написання)
  key_concepts:
  - складений числівник
  - компонент
  - узгодження
  - керування
- section: 'Числівники-іменники: тисяча, мільйон, мільярд'
  words: 1000
  subsections:
  - Морфологічні ознаки 'тисячі' (відмінювання як іменника І відміни)
  - Морфологічні ознаки 'мільйона', 'мільярда' (відмінювання як іменників ІІ відміни)
  - 'Синтаксичні особливості: керування родовим відмінком іменників'
  - Вживання у множині та сполучення з іншими числівниками
  key_concepts:
  - субстантивація
  - тип відмінювання
  - кількісно-іменне сполучення
  - нумератив
- section: Збірні та дробові числівники
  words: 1000
  subsections:
  - 'Збірні числівники двоє–десятеро: вживання з іменниками чоловічого роду та pluralia tantum (двоє хлопців, троє саней)'
  - 'Обмеження: збірні НЕ вживаються з іменниками жіночого роду (*двоє дівчат → дві дівчини)'
  - 'Дробові числівники: одна друга, три четвертих, два з половиною — узгодження з іменниками в родовому відмінку'
  - 'Особливості півтора/півтори: родова диференціація (півтора дня, але: півтори години)'
  key_concepts:
  - збірний числівник
  - дробовий числівник
  - обмеження вживання
  - родова диференціація
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
