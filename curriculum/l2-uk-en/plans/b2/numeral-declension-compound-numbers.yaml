module: b2-045
level: B2
sequence: 45
slug: numeral-declension-compound-numbers
version: '2.0'
title: 'Відмінювання числівників ІІ: Складені числівники'
subtitle: 'Numeral Declension II: Compound Numbers'
focus: grammar
pedagogy: TTT
phase: B2.5
word_target: 4000
objectives:
- Learner can decline compound ordinal numerals in all cases
- Learner can decline compound cardinal numerals in all cases
- Learner can use numerals correctly in statistical and price contexts
content_outline:
- section: Вступ та повторення складних числівників (Introduction and Review of Complex Numerals)
  words: 600
  points:
  - Повторення відмінювання складних числівників (50-80, 200-900) як фундаменту для складених форм.
  - 'Акцент на внутрішній флексії сотень: відмінювання обох частин (наприклад, п''ятисот, семисот) та аналіз помилки «двісот»
    замість «двохсот».'
  - 'Культурний контекст: Ан-225 «Мрія» — введення числівників через 462 авіаційні рекорди та 640 тонн максимальної маси.'
  - 'Розминка: виявлення типових помилок у відмінюванні складних числівників у коротких новинах.'
- section: Складені кількісні числівники — Правило повної зміни (Compound Cardinal Numerals — Full Declension Rule)
  words: 1000
  points:
  - 'Головне правило: у складених кількісних числівниках змінюється кожне слово (кожен компонент) у всіх відмінках.'
  - 'Аналіз помилки часткового відмінювання: порівняння правильного «на ста сорока п''яти» та помилкового «на сто сорок п''яти».'
  - 'Практика відмінювання великих сум: сотні, тисячі та мільйони у поєднанні з назвою валюти (гривня).'
  - 'Відповідність Державному стандарту (§4.1.1.3): вивчення варіантних форм орудного відмінка на кшталт «шістдесятьома /
    шістдесятьма».'
- section: Складені порядкові числівники та історичні дати (Compound Ordinal Numerals and Historical Dates)
  words: 900
  points:
  - Правило відмінювання тільки останнього компонента у складених порядкових числівниках (триста вісімдесят перший/першого).
  - 'Історичний контекст: Конституція Пилипа Орлика (1710 рік) — тренування відмінювання року в різних непрямих відмінках.'
  - 'Усунення помилки змішування кількісних та порядкових форм: чому «у тисячі дев''ятсот...» є помилкою для позначення року.'
  - 'Робота з великими проміжками часу: від «тисяча сімсот десятого року» до подій «двадцять першого століття».'
- section: Числівники в статистиці та географії (Numerals in Statistics and Geography)
  words: 900
  points:
  - 'Станція метро «Арсенальна»: робота з дробовими числівниками на прикладі глибини 105,5 (сто п''ять цілих і п''ять десятих)
    метра.'
  - 'Демографічні та економічні показники: опис кількості населення (близько 40 мільйонів) та обговорення бюджету проєкту.'
  - 'Використання обмежувачів у статистиці: близько, понад, майже, щонайменше у поєднанні з відповідними відмінками числівників.'
  - Вживання відсотків (відсоток) та одиниць виміру (кілометр) у науковому та офіційно-діловому стилях.
- section: Практикум та синтез (Workshop and Synthesis)
  words: 600
  points:
  - 'Диктант: запис статистичних даних словами для перевірки орфографії та морфології складених числівників.'
  - 'Рольова гра «Бухгалтер»: підготовка фінансового звіту, що включає відмінювання сум, відсотків та дат.'
  - 'Аналітична вправа: виправлення помилок у відмінюванні числівників у реальних заголовках новин та економічних статтях.'
  - 'Підсумковий тест: диференціація відмінювання кількісних (змінюються всі слова) та порядкових (змінюється лише останнє
    слово) форм.'
vocabulary_hints:
  required:
  - відсоток (percent) — п'ятдесят відсотків, сто відсотків; висока частотність у новинах та академічних текстах.
  - населення (population) — кількість населення, перепис населення; використовується в демографічних даних.
  - бюджет (budget) — державний бюджет, бюджет проєкту; ключове слово для економічного контексту.
  - гривня (hryvnia) — двісті гривень, п'ять тисяч гривень; щоденне фінансове використання.
  - кілометр (kilometer) — сто кілометрів, квадратний кілометр; географічний та подорожній контексти.
  - термін (term) — технічний термін, визначення терміна; для академічного дискурсу.
  - поняття (concept) — абстрактне поняття, базове поняття; для пояснення теорії.
  - процес (process) — виробничий процес, процес навчання; опис динамічних систем.
  - метод (method) — науковий метод, метод аналізу; опис підходів до роботи.
  recommended:
  - аналіз (analysis) — глибокий аналіз даних.
  - синтез (synthesis) — синтез отриманої інформації.
  - дослідження (research) — результати останніх досліджень.
  - кількість (quantity/amount) — значна кількість, кількість опадів.
  - показник (indicator/index) — економічний показник, високі показники.
