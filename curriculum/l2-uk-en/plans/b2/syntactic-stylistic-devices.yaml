module: syntactic-stylistic-devices
level: B2
sequence: 27
version: '1.1'
title: "Синтаксичні стилістичні засоби"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Вивчити систему синтаксичних фігур як інструментів посилення експресивності мовлення."
  - "Опанувати прийоми риторичних запитань, звертань та вигуків."
  - "Зрозуміти роль синтаксичного паралелізму та антитези в структурі тексту."
  - "Навчитися використовувати градацію для нарощення або послаблення емоційної напруги."
  - "Застосовувати інверсію та хіазм для акцентування ключових смислів у власних текстах."

reading_situations:
  - source_type: "політична промова / маніфест"
    topic: "Аналіз риторичних фігур у виступі державного лідера під час історичних подій."
    key_elements: ["анафора та епіфора (повтори на початку/в кінці фраз)", "риторичні питання для залучення аудиторії", "синтаксичний паралелізм"]
    motivation: "Розуміння механізмів переконування через структуру речень та ритміку тексту."

listening_situations:
  - media_type: "лекція"
    setting: "Уривок з курсу ораторського мистецтва, де лектор пояснює вплив синтаксичних конструкцій на увагу аудиторії."
    focus_points: ["Вплив інверсії (незвичного порядку слів) на сприйняття.", "Використання градації для створення кульмінації.", "Розпізнавання антитези (протиставлення) у живому мовленні."]
    motivation: "Вдосконалення навичок публічного виступу та аналізу стратегій впливу через звуковий канал."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть переконливе есе про майбутнє цифрової демократії, використовуючи широкий спектр синтаксичних фігур для посилення вашої аргументації."
    requirements:
      - "мінімум 300 слів"
      - "мінімум 2 приклади анафори (єдинопочатку)"
      - "використання градації (мінімум 3 компоненти)"
      - "мінімум 1 приклад антитези"
      - "використання інверсії для логічного наголошення"
    motivation: "Створення патетичного, переконливого та структурно довершеного тексту високого регістру."
    model_answer: "Есе має демонструвати володіння синтаксичними фігурами. Наприклад: 'Ми маємо діяти сьогодні, ми маємо діяти завтра, ми маємо діяти завжди (анафора). Наша мета — не просто технологія, а свобода; не просто швидкість, а справедливість (антитеза). Це шлях від ідеї до проекту, від проекту до реалізації, від реалізації до зміни світу (градація). Саме таку відповідальність покладає на нас історія (інверсія).'"

discussion_topics:
  - context: "Дискусія про те, як синтаксис впливає на емоційний стан слухача під час прослуховування аудіокниг або подкастів."
    questions:
      - "Чому довгі, складні речення часто асоціюються з офіційністю, а короткі — з динамізмом?"
      - "Яку роль відіграє пауза в синтаксичних фігурах типу асиндетону?"
      - "Чи може інверсія змінити зміст повідомлення на протилежний?"
    motivation: "Розвиток метамовної свідомості та здатності обговорювати технічні аспекти побудови тексту."

content_outline:
  - section: "Риторичні фігури та їх експресивна роль"
    words: 1000
    subsections:
      - "Риторичне запитання: ствердження через питання, що не потребує відповіді"
      - "Риторичне звертання та риторичний вигук: засоби встановлення контакту та вираження емоцій"
      - "Стилістична функція окличних та питальних речень у структурі повідомлення"
      - "Апосіопеза (умовчання) — фігура недоказаності та створення інтриги"
    key_concepts:
      - "риторичне запитання"
      - "експресія"
      - "адресат"
  - section: "Повтори та синтаксичний паралелізм"
    words: 1100
    subsections:
      - "Анафора та епіфора: магія повтору в поезії та прозі"
      - "Симплока як поєднання анафори та епіфори: кільцева композиція фрази"
      - "Синтаксичний паралелізм: однакова побудова сусідніх речень як засіб ритмізації"
      - "Тавтологія та плеоназм: коли повтор стає помилкою, а коли — свідомим художнім прийомом"
    key_concepts:
      - "анафора"
      - "епіфора"
      - "паралелізм"
  - section: "Фігури протиставлення та розташування"
    words: 1000
    subsections:
      - "Антитеза: різке протиставлення образів та понять для підсилення контрасту"
      - "Градація (висхідна та спадна): динаміка наростання або послаблення змісту"
      - "Інверсія: зміна прямого порядку слів як засіб акцентуації ключового поняття"
      - "Хіазм (перехресне розташування): дзеркальна структура членів речення"
    key_concepts:
      - "антитеза"
      - "градація"
      - "інверсія"
  - section: "Еліптичні та перервані конструкції"
    words: 900
    subsections:
      - "Асиндетон (безсполучниковість): надання тексту динамізму та лаконічності"
      - "Полісиндетон (багатосполучниковість): урочистість, уповільнення ритму та виокремлення деталей"
      - "Еліпсис: пропуск членів речення для імітації живого розмовного мовлення"
      - "Парцеляція: розчленування речення на окремі фрагменти для емоційного акценту"
    key_concepts:
      - "асиндетон"
      - "полісиндетон"
      - "еліпсис"

vocabulary:
  required:
    - риторична фігура
    - анафора
    - епіфора
    - градація
    - антитеза
    - інверсія
    - паралелізм
    - хіазм
  recommended:
    - асиндетон
    - полісиндетон
    - тавтологія
    - виразність
    - акцентуація
    - ораторський стиль

activities:
  types_required:
    - reading
    - essay-response
    - select
    - fill-in
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "lexical-stylistic-devices"
  next: "register-introduction"
