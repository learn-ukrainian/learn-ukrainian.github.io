module: b2-69
level: B2
sequence: 69
slug: integration-practice
version: '2.0'
title: Практика інтеграції B2.2
subtitle: B2.2 Integration Practice
content_outline:
- section: 'Вступ: Мова як цілісна система (Introduction: Language as a Holistic System)'
  words: 600
  points:
  - Роль Системного аналітика (Systems Analyst) у процесі інтеграції мовних компонентів
    B2.2
  - Аналіз культурного гасла «Слово до слова — зложиться мова» як методології накопичення
    знань
  - 'Огляд вивченого: зв''язок між прислів''ями (M45-46), ідіомами (M47-54) та синонімами
    (M55-66)'
  - 'Визначення цілей модуля: від ізольованих одиниць до синтезу складних повідомлень'
- section: Стилістичні засоби лексики за стандартом §4.4.1.2 (Stylistic Lexical Tools
    per Standard §4.4.1.2)
  words: 900
  points:
  - Практичне застосування синонімічних рядів, антонімів та епітетів у різних регістрах
  - 'Інтеграція ідіом у художній та публіцистичний тексти: аналіз впливу на експресивність'
  - Вживання прислів'їв як інструменту аргументації та підкріплення тези (Mastery
    §4.4.1.2)
  - 'Вправа на вибір оптимального синоніма: перетворення нейтрального повідомлення
    на професійне'
- section: Синтаксичний синтез та складні речення §4.3.4 (Syntactic Synthesis and
    Complex Sentences §4.3.4)
  words: 1000
  points:
  - Поєднання фразеології зі складними сполучниками (M67-68) у складнопідрядних реченнях
  - Побудова речень зі з’ясувальною та обставинною частинами (умови, допусту, причини)
    з ідіомами
  - 'Синтез §4.3.4 та §4.4.1.2: використання метафор у структурах зі складним підпорядкуванням'
  - 'Трансформація тексту: поєднання коротких речень у складні конструкції без втрати
    фразеологізмів'
- section: 'Лабораторія відлагодження: Типові помилки (Debugging Lab: Common Learner
    Errors)'
  points:
  - 'Відлагодження дієприслівникових зворотів: виправлення конструкцій типу «Читаючи
    книгу, мені стало цікаво»'
  - 'Ідентифікація та усунення російських кальок: «брати участь» замість «приймати
    участь» та «зрештою» замість «в кінці кінців»'
  - 'Оптимізація стилю: боротьба з плеоназмами та тавтологією (наприклад, «у квітні
    місяці», «головний пріоритет»)'
  - Алгоритм перевірки subject-verb agreement при використанні складних фразеологічних
    зворотів
  words: 800
- section: Комплексне застосування та підготовка до M70 (Complex Application and Prep
    for M70)
  words: 700
  points:
  - Створення фінального есе на професійну тематику з використанням 3+ прислів'їв
    та 5+ ідіом
  - 'Аналіз газетної статті: пошук засобів лексичної стилістики та пояснення їхньої
    функції'
  - Підсумок рівня B2.2 через призму приказки «Птицю пізнати по пір'ю, а людину по
    мові»
  - Самооцінка готовності до контрольної точки M70 та перехід до фази B2.3 (доменна
    лексика)
focus: integration
pedagogy: Practice
objectives:
- Учень може вільно інтеграції прислів'я та приказки у власну аргументацію
- Учень вміє створювати зв'язні тексти, використовуючи ідіоми та складні сполучники
- Учень демонструє майстерність у виборі синонімів залежно від контексту
grammar:
- Review of complex syntax
- Phraseological integration
immersion: 100
register: змішаний
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - термін (term) — термін дії (validity period), науковий термін; висока частотність
    у науковому стилі
  - поняття (concept) — основні поняття, підмінити поняття (substitute concepts);
    вживання в абстрактному контексті
  - процес (process) — творчий процес, у процесі обговорення; опис динамічних систем
  - метод (method) — метод спроб і помилок (trial and error), дедуктивний метод; науковий
    інструментарій
  recommended:
  - аналіз (analysis) — системний аналіз, порівняльний аналіз; ключовий термін для
    Системного аналітика
  - синтез (synthesis) — процес об'єднання частин у ціле; протилежність аналізу
  - дослідження (research) — ґрунтовне дослідження; академічний та професійний регістр
  - брати участь (to participate) — виправлення кальки «приймати участь»; важливий
    сталий вираз
