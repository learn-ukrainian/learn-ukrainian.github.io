module: b2-081
level: B2
sequence: 81
slug: professional-reports
version: '1.0'
title: "Професійні звіти: від основ до стратегії"
subtitle: "Професійні звіти: від основ до стратегії"
focus: professional
pedagogy: TTT
word_target: 4000
phase: "B2.7 [Idioms, Neologisms & Professional Communication]"
# MERGE of: professional-reports-basics + professional-reports-advanced
objectives:
  - "Вивчити класифікацію ділових звітів: інформаційний, аналітичний, стратегічний."
  - "Опанувати структуру звітного документа та правила оформлення."
  - "Навчитися описувати та інтерпретувати графічні дані (таблиці, діаграми)."
  - "Опанувати стратегічне моделювання (SWOT, PESTEL) та адаптацію звіту під аудиторію."

reading_situations:
  - source_type: "річний звіт"
    topic: "Звіт про сталий розвиток української агропромислової компанії."
    key_elements: ["показники ефективності", "аналіз ризиків", "прогнози"]
    motivation: "Ознайомлення зі структурою та лексикою корпоративних звітів."
  - source_type: "стратегічний план"
    topic: "Стратегія цифрової трансформації державного сектору до 2030 року."
    key_elements: ["візія", "стратегічні цілі", "індикатори виконання"]
    motivation: "Аналіз високорівневої стратегічної документації."

listening_situations:
  - media_type: "відео"
    setting: "Презентація стратегічного звіту перед радою директорів."
    focus_points: ["структура усної презентації звіту", "адаптація мови для
          керівної аудиторії", "ключова термінологія"]
    motivation: "Розвиток навичок сприйняття професійної презентації."

writing_tasks:
  - task_type: "аналітичний звіт"
    prompt: "Складіть аналітичний звіт: 1) опис поточної ситуації з числовими
      даними; 2) SWOT-аналіз; 3) рекомендації."
    requirements:
      - "мінімум 300 слів"
      - "структура: вступ, аналіз, висновки, рекомендації"
      - "стратегічна термінологія"
      - "безособові конструкції та пасив"
    motivation: "Практика комплексного звітування."
    model_answer: "Звіт має бути чітким: 'За результатами аналізу встановлено
      зростання на 15%. SWOT: сильні сторони — кваліфікований персонал;
      загрози — нестабільність ринку. Рекомендовано диверсифікувати...'"

discussion_topics:
  - context: "Культура звітності в українському бізнесі."
    questions:
      - "Чому звітність важлива для прозорості компанії?"
      - "Як адаптувати мову звіту для різних аудиторій?"
    motivation: "Обговорення професійної комунікації."

dialogue_situations:
  - setting: "Менеджер обговорює квартальний звіт із підлеглим."
    roles: ["менеджер", "підлеглий"]
    key_phrases: ["покажіть динаміку за квартал", "які причини спаду?",
      "рекомендую оптимізувати"]

content_outline:
  - section: "Класифікація та структура ділових звітів"
    words: 1000
    subsections:
      - "Інформаційні звіти: констатація фактів та опис подій"
      - "Аналітичні звіти: причинно-наслідкові зв'язки та оцінка"
      - "Структура: титульний аркуш, зміст, Executive Summary, основна частина"
      - "Стиль та мова: безособовість, об'єктивність, логічні конектори"
    key_concepts:
      - "звітність"
      - "архітектоніка тексту"
      - "лаконічність"
  - section: "Опис та інтерпретація графічних даних"
    words: 1000
    subsections:
      - "Лексика для опису трендів: зростання, спад, стабілізація"
      - "Коментування таблиць та діаграм: акценти для читача"
      - "Числові дані: відсотки, співвідношення, динаміка"
      - "Формулювання висновків на основі числових показників"
    key_concepts:
      - "візуалізація"
      - "динаміка"
      - "інтерпретація"
  - section: "Стратегічне моделювання"
    words: 1000
    subsections:
      - "SWOT-аналіз: сильні/слабкі сторони, можливості, загрози"
      - "PESTEL-аналіз: макросередовище"
      - "Матриця ризиків та стратегії реагування"
      - "Кризова звітність: оперативність, уроки засвоєні"
    key_concepts:
      - "стратегічне планування"
      - "конкурентна перевага"
      - "мінімізація ризиків"
  - section: "Адаптація звіту та аргументація"
    words: 1000
    subsections:
      - "Для ради директорів: лаконічність, фокус на стратегії"
      - "Для експертів: деталізація, методологія, точність"
      - "Для громадськості: зрозумілість, візуалізація"
      - "Побудова аргументації: теза — доказ — висновок"
    key_concepts:
      - "цільова аудиторія"
      - "переконливість"
      - "репутаційний менеджмент"

vocabulary_hints:
  - word: "звітність"
    translation: "reporting"
    context: "Фінансова звітність подається щоквартально."
  - word: "показник"
    translation: "indicator, metric"
    context: "Ключові показники ефективності зросли."
  - word: "ефективність"
    translation: "efficiency, effectiveness"
    context: "Ефективність виробництва підвищилася."
  - word: "рекомендація"
    translation: "recommendation"
    context: "На основі аналізу надано рекомендації."
  - word: "динаміка"
    translation: "dynamics, trend"
    context: "Динаміка продажів за квартал."
  - word: "тенденція"
    translation: "tendency, trend"
    context: "Тенденція до зростання зберігається."
  - word: "стратегія"
    translation: "strategy"
    context: "Стратегія розвитку на п'ять років."
  - word: "трансформація"
    translation: "transformation"
    context: "Цифрова трансформація бізнесу."
  - word: "моніторинг"
    translation: "monitoring"
    context: "Моніторинг ситуації здійснюється щоденно."
  - word: "рентабельність"
    translation: "profitability"
    context: "Рентабельність проєкту — 20 відсотків."
  - word: "конкурентоспроможність"
    translation: "competitiveness"
    context: "Конкурентоспроможність компанії зросла."
  - word: "диверсифікація"
    translation: "diversification"
    context: "Рекомендовано диверсифікацію продуктів."
  - word: "оптимізація"
    translation: "optimization"
    context: "Оптимізація витрат — головний пріоритет."
  - word: "аудит"
    translation: "audit"
    context: "Фінансовий аудит проведено успішно."
  - word: "обґрунтування"
    translation: "justification"
    context: "Обґрунтування рішення підкріплене даними."
  - word: "резюме"
    translation: "executive summary"
    context: "Резюме для керівника — не більше однієї сторінки."

activities:
  types_required:
    - fill-in
    - critical-analysis
    - essay-response
    - match-up
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: fill-in
    focus: "Доповнити звіт термінологією, конекторами та висновками"
  - type: error-correction
    focus: "Виправити двозначність та нечіткість у звітному документі"
  - type: unjumble
    focus: "Відновити правильний порядок розділів звіту"
  - type: essay-response
    focus: "Написати Executive Summary за наданим аналітичним звітом"

references:
  - source: "Глазова, 11 клас (2019)"
    pages: "§1–10, §21–25"
    topic: "Культура мовлення, синтаксична норма"
  - source: "Заболотний, 11 клас (2019)"
    pages: "Стилістика ділового мовлення"
    topic: "Офіційно-діловий стиль"
  - source: "Державний стандарт 2024"
    pages: "SS 3"
    topic: "Professional communication themes"

connects_to:
  previous: "professional-email-advanced"
  next: "academic-writing"
