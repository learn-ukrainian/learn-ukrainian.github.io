module: b2-057
level: B2
sequence: 57
slug: advanced-case-semantics
version: '1.0'
title: "Поглиблена семантика відмінків"
subtitle: "Advanced Case Semantics"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Дослідити абстрактні та переносні значення українських відмінків у різних контекстах."
  - "Опанувати використання відмінків у складних прийменниково-іменникових конструкціях."
  - "Зрозуміти роль відмінків у вираженні часових, просторових та причинових відношень на рівні B2."
  - "Навчитися розрізняти тонкі змістові відтінки при варіативності відмінкових форм (напр. у родовому відмінку)."

listening_situations:
  - media_type: "лекція"
    setting: "Уривок лекції з історії архітектури, де описуються складні конструкції та просторове розташування об'єктів."
    focus_points: ["виявлення просторових значень відмінків", "аналіз орудного відмінка у значенні способу дії", "фіксація специфічного прийменникового керування"]
    motivation: "Розвиток навички розпізнавання складних описів та технічних характеристик, що базуються на розгалужених відмінкових відношеннях."

discussion_topics:
  - context: "Обговорення мовної гнучкості: 'Як відмінкова система впливає на наше сприйняття світу та суб'єкта дії?'"
    questions:
      - "У чому різниця між конструкціями 'мені сумно' та 'я сумую' з погляду фокусу на суб'єкті?"
      - "Чому правильний вибір закінчення у Родовому відмінку (-а чи -у) є важливим для точності термінології?"
      - "Як орудний відмінок допомагає економити мовні засоби при описі процесів?"
    motivation: "Розвиток лінгвістичної рефлексії та здатності аргументовано пояснювати граматичний вибір."

content_outline:
  - section: "Абстрактні значення відмінків: від об'єкта до стану"
    words: 1000
    subsections:
      - "Родовий відмінок: партитивність, заперечення та кількісно-видільна функція"
      - "Давальний відмінок: суб'єкт стану та непрямий об'єкт у безсуб'єктних реченнях"
      - "Орудний відмінок: знаряддя, спосіб дії, порівняння та часова локалізація"
    key_concepts:
      - "партитивність"
      - "суб'єкт стану"
      - "інструментальність"
      - "семантичне поле"
  - section: "Відмінкові форми у просторі, часі та казуальності"
    words: 1000
    subsections:
      - "Динаміка та статика: вибір відмінка при описі руху та місцезнаходження"
      - "Часові параметри: тривалість та періодичність через відмінкові закінчення"
      - "Вираження причини та мети: прийменникові конструкції та їхні безприйменникові аналоги"
    key_concepts:
      - "просторова локалізація"
      - "часова дистрибуція"
      - "казуальність"
      - "детермінант"
  - section: "Варіативність та стилістика відмінкових закінчень"
    words: 1000
    subsections:
      - "Семантична диференціація закінчень -а/-я та -у/-ю у Родовому відмінку"
      - "Місцевий відмінок: паралельні форми та їхня експресивна роль"
      - "Кличний відмінок як засіб етикету та стилізації в офіційному листуванні"
    key_concepts:
      - "варіативність"
      - "семантичний диференціатор"
      - "клична форма"
      - "стилістична норма"
  - section: "Складні випадки керування та узгодження"
    words: 1000
    subsections:
      - "Дієслівне керування: розбіжності між українською та англійською мовами"
      - "Подвійне керування та синтаксична неоднозначність"
      - "Роль відмінків у забезпеченні когезії та логічної послідовності тексту"
    key_concepts:
      - "дієслівне керування"
      - "когезія"
      - "синтаксична позиція"
      - "мовна точність"

vocabulary:
  required:
    - семантика
    - відмінок
    - приналежність
    - партитивність
    - керування
    - обставина
    - варіативність
    - конструкція
  recommended:
    - притаманний
    - властивий
    - завдяки
    - внаслідок
    - опанувати
    - запобігати

activities:
  types_required:
    - fill-in
    - match-up
    - error-correction
    - select
  min_items_per_type: 5
  total_min_items: 20

