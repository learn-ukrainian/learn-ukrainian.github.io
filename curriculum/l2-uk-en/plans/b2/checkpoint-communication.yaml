module: b2-081
level: B2
sequence: 81
slug: checkpoint-communication
version: '1.1'
title: "Контрольна точка: Професійна та публічна комунікація"
subtitle: "Checkpoint: Professional and Public Communication"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Узагальнити та закріпити знання про структуру та стилістику професійних звітів та академічного письма."
  - "Продемонструвати навички критичного аналізу медіа-текстів та розпізнавання маніпуляцій."
  - "Перевірити вміння ефективно презентувати ідеї та вести дебати на складні теми."
  - "Провести комплексну самооцінку комунікативної компетентності на рівні B2."

reading_situations:
  - source_type: "змішаний пакет документів"
    topic: "Добірка текстів (звіт, новина, пост у соцмережі) про один і той самий інноваційний проект."
    key_elements: ["стилістичні розбіжності", "цільова аудиторія", "ключові повідомлення"]
    motivation: "Комплексний аналіз адаптації інформації під різні канали комунікації."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть підсумковий аналітичний звіт про розвиток ваших комунікативних навичок протягом курсу B2."
    requirements: ["використання професійної термінології", "SWOT-аналіз власного прогресу", "рекомендації для подальшого навчання"]
    motivation: "Рефлексія та застосування вивчених жанрів звітності."
    model_answer: "Звіт має бути структурованим, об'єктивним та містити конкретні приклади досягнень та зон для розвитку."

discussion_topics:
  - context: "Рефлексія комунікативного прогресу на рівні B2"
    questions:
      - "Який тип професійної комунікації (листування, звітність, виступ) виявився найскладнішим і чому?"
      - "Як змінилося ваше сприйняття українських медіа після вивчення медіаграмотності?"
    motivation: "Стимулювання самоаналізу та усвідомлення власного прогресу у професійній комунікації."

content_outline:
  - section: "Ревізія професійного письма"
    words: 1000
    subsections:
      - "Від електронного листа до стратегічного звіту: ключові відмінності"
      - "Академічна доброчесність та стандарти наукового тексту"
      - "Типові помилки у структуруванні офіційних документів та способи їх уникнення"
    key_concepts:
      - "професіоналізм"
      - "уніфікація"
      - "стандартизація"
      - "стилістична грамотність"
  - section: "Медіаграмотність: підсумковий огляд"
    words: 1000
    subsections:
      - "Алгоритм швидкої перевірки новини на достовірність"
      - "Словник маніпулятора: найпоширеніші евфемізми та ярлики в сучасних ЗМІ"
      - "Етика коментування та поширення інформації в цифрову епоху"
    key_concepts:
      - "критичність"
      - "декодування"
      - "медіа-гігієна"
      - "відповідальність"
  - section: "Публічний виступ та дебати: синтез навичок"
    words: 1000
    subsections:
      - "Психологічна стійкість під час дискусії та пітчингу"
      - "Ефективна робота з Q&A: як відповідати на те, чого не знаєш"
      - "Риторичні прийоми, що роблять промову незабутньою"
    key_concepts:
      - "самовпевненість"
      - "риторика"
      - "полемічна майстерність"
      - "гнучкість"
  - section: "Самооцінка та планування подальшого прогресу"
    words: 1000
    subsections:
      - "Аналіз власного мовленнєвого портфоліо за рівень B2"
      - "Визначення пріоритетних напрямків для переходу на рівень C1"
      - "Підготовка до фінального тестування модуля"
    key_concepts:
      - "саморефлексія"
      - "компетентність"
      - "стратегія розвитку"
      - "мовленнєвий ідеал"

vocabulary:
  required:
    - компетенція
    - синтез
    - рефлексія
    - аргументація
    - верифікація
    - адаптація
    - стратегія
    - підсумок
  recommended:
    - всебічний
    - досконалий
    - фундаментальний
    - ґрунтовний
    - результативний

activities:
  types_required:
    - critical-analysis
    - error-correction
    - essay-response
    - select
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: cloze
    focus: "Комплексний професійний текст із пропусками: ділова лексика, кліше, конектори."
  - type: essay-response
    focus: "Написати текст для заданої цільової аудиторії (звіт для керівництва, лист партнеру, новина)."
  - type: error-correction
    focus: "Знайти всі комунікативні помилки у змішаному тексті: стилістичні, етикетні, логічні."
  - type: group-sort
    focus: "Класифікувати комунікативні ситуації за типом: ділове листування, звітність, медіа, виступ."
  - type: critical-analysis
    focus: "Оцінити реальний професійний текст (лист, звіт, новину) за критеріями структури, стилю та ефективності."

references:
  - "Глазова О. П. Українська мова. 11 клас (2019), §1-25 — Комплексний огляд"
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Офіційно-діловий та публіцистичний стилі"
  - "Ворон А. А. Українська мова. 11 клас (2019) — Діловодство, красномовство"
  - "State Standard 2024: B2 SS 3 — Professional communication (comprehensive)"

connects_to:
  previous: "discussion-debate"
  next: "tekhnolohii-ta-shi"
