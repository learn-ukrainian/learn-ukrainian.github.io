title: 'Контрольна точка: комунікативні навички'
subtitle: 'Checkpoint: Communication Skills'
focus: checkpoint
pedagogy: assessment
phase: B2.7 [Communication Skills]
word_target: 4000
objectives:
- Learner can demonstrate professional writing skills across business and report formats
- Learner can critically analyze media texts identifying bias and rhetorical devices
- Learner can present arguments and participate in structured debate at B2 level
- Learner can self-assess communication competence and identify areas for improvement
content_outline:
- section: Огляд професійного письма (Professional Writing Review)
  words: 1000
  points:
  - 'Комплексна перевірка навичок ділового листування: написання офіційного листа-відповіді на складний запит із дотриманням
    усіх етикетних та структурних норм (модулі 69-70).'
  - 'Оцінка навичок звітування: складання стислого професійного звіту за наданими даними з використанням наукового стилю та
    безособових конструкцій (модулі 71-72).'
  - 'Редагування тексту: виявлення та виправлення стилістичних, лексичних та граматичних помилок у зразку професійного тексту;
    оцінка відповідності регістру.'
  - 'Самоаналіз: порівняння власних текстів із зразковими; визначення сильних сторін та зон для подальшого розвитку.'
- section: Завдання з аналізу медіатекстів (Media Analysis Tasks)
  words: 1000
  points:
  - 'Критичний аналіз новинного тексту: визначення авторської позиції, риторичних прийомів, маніпулятивних засобів та об''єктивності
    подачі інформації (модулі 73-74).'
  - 'Порівняльний аналіз: зіставлення двох публікацій на одну тему з різних джерел; виявлення відмінностей у лексичному виборі,
    тоні та аргументації.'
  - 'Написання аналітичної записки: стисле узагальнення результатів аналізу медіатексту з власними висновками та рекомендаціями.'
  - 'Оцінка медіаграмотності: здатність розрізняти факт і думку, виявляти упередженість та оцінювати достовірність джерел.'
- section: Оцінювання презентації та дебатів (Presentation and Debate Assessment)
  words: 1000
  points:
  - 'Структурований усний виступ: підготовка та виконання короткої презентації на задану тему з логічною структурою, аргументацією
    та висновком (модуль 75).'
  - 'Дебатне завдання: формулювання тези, побудова аргументації та контраргументації з використанням дискурсивних маркерів
    (по-перше, з іншого боку, отже).'
  - 'Етикет незгоди: перевірка навичок ввічливого заперечення та часткової згоди (дозвольте не погодитися, слушна думка, проте...).'
  - 'Оцінка прагматичної компетенції: доречність мовленнєвих актів (прохання, пропозиція, відмова, вибачення) у формальних
    та напівформальних ситуаціях.'
- section: Комплексне комунікативне портфоліо (Comprehensive Communication Portfolio)
  words: 1000
  points:
  - 'Інтеграційне завдання: виконання складного комунікативного сценарію, що поєднує письмове та усне спілкування (напр.,
    підготовка звіту → презентація → обговорення).'
  - 'Оцінка регістрової гнучкості: здатність перемикатися між регістрами (офіційний лист → розмова з колегою → публічний виступ)
    зі збереженням стилістичної доречності.'
  - 'Рефлексія та самооцінка: аналіз власного прогресу в комунікативних навичках від початку блоку (модулі 69-75); визначення
    пріоритетів для подальшого навчання.'
  - 'Підсумкова рекомендація: індивідуальний план роботи над комунікативними навичками на основі результатів контрольної точки;
    готовність до переходу до тематичних модулів.'
vocabulary_hints:
  required:
  - комунікативні навички (communication skills) — розвивати комунікативні навички; здатність ефективно спілкуватися
  - аргументація (argumentation) — побудова аргументації, переконлива аргументація; система доказів на підтримку тези
  - медіаграмотність (media literacy) — критична медіаграмотність; здатність аналізувати та оцінювати медіатексти
  - регістрова гнучкість (register flexibility) — здатність перемикатися між стилями відповідно до ситуації
  - портфоліо (portfolio) — комунікативне портфоліо; збірка текстів для демонстрації навичок
  - рефлексія (reflection) — самоаналіз та оцінка власного прогресу
  recommended:
  - маніпулятивний прийом (manipulative technique) — засіб впливу на аудиторію в медіатексті
  - упередженість (bias) — виявлення упередженості; необ'єктивне ставлення до теми
  - прагматична компетенція (pragmatic competence) — здатність обирати доречний мовленнєвий акт для ситуації
  - дискурсивний маркер (discourse marker) — по-перше, з іншого боку, отже; засіб організації тексту
  - самооцінка (self-assessment) — критична самооцінка; об'єктивний аналіз власних навичок
