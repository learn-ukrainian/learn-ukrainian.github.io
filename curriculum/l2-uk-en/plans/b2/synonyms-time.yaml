slug: synonyms-time
version: '2.0'
title: 'Синоніми: Час та Періоди'
subtitle: Synonyms - Time and Periods
content_outline:
- section: 'Вступ: Філософія та духовна цінність часу (Introduction: Philosophy and
    Spiritual Value of Time)'
  words: 600
  points:
  - 'Вступне слово про час як духовну категорію через максиму Г. Сковороди: «З усіх
    утрат утрата часу найтяжча».'
  - 'Уособлення та невтомність часу в українській світогляді на прикладі поезії Ліни
    Костенко: «Єдиний, хто не втомлюється, — час».'
  - 'Обговорення фольклорного принципу природного порядку та терпіння: «Всякому овочу
    свій час».'
- section: 'Мить чи епоха: Диференціація «зараз» та «тепер» (Moment or Epoch: Differentiating
    ''Zaraz'' and ''Teper'')'
  words: 900
  points:
  - 'Аналіз лексичної точності (§4.4.1.2): «зараз» для позначення поточної миті vs
    «тепер» для тривалого періоду чи епохи.'
  - 'Робота над типовою помилкою перенесення значення: чому вираз «зараз я живу в
    Києві» є некоректним порівняно з «тепер я живу в Києві».'
  - Практичні вправи на розрізнення відтінків значення у реченнях про професійну діяльність
    та особисті зміни.
- section: 'Офіційний та публіцистичний регістр: «наразі» та «нині» (Official and
    Publicistic Register: ''Narazi'' and ''Nyni'')'
  words: 900
  points:
  - Вживання слова «наразі» в офіційно-діловому контексті як ознаки тимчасовості («наразі
    триває», «наразі невідомо»).
  - Стилістичне забарвлення прислівника «нині» в публіцистиці та його порівняння з
    нейтральним «сьогодні».
  - 'Боротьба з мовними кальками: заміна незграбної конструкції «в даний момент» на
    природні українські синоніми залежно від контексту.'
- section: 'Погляд Археолога: Від «щойно» до «колись давно» (Archeologist''s View:
    From ''Just Now'' to ''Once Upon a Time'')'
  words: 800
  points:
  - Дослідження «глибокого часу» через наративні маркери «колись», «давно», «у давнину»
    та специфіку частки «колись-то».
  - Точність вживання слова «щойно» як маркера негайного минулого (immediate past)
    та його роль у новинному та розмовному стилях.
  - Використання археологічної метафори для опису часових шарів в історії України
    (від Київської Русі до сучасності).
- section: 'Синтез: Часові вирази в історичному та діловому контекстах (Synthesis:
    Time Expressions in Historical and Business Contexts)'
  words: 800
  points:
  - Створення історичного огляду з використанням градації часових прислівників від
    давнини до сьогоднішнього дня.
  - 'Трансформація тексту: переписування неформальної розповіді про події в офіційний
    звіт зі зміною часових маркерів (наразі, відтепер).'
  - Підсумкова дискусія про концепцію вічності та миті, спираючись на вивчені синонімічні
    ряди.
focus: phraseology
pedagogy: CBI
objectives:
- Учень може розрізняти відтінки значень синонімів на позначення поточного моменту
  (зараз, тепер, наразі)
- Учень вміє використовувати лексику часових періодів для опису історичних та особистих
  подій
- Учень розуміє концепцію вічності та миті в українській мові
grammar:
- Adverbs of time
- Temporal nouns and intensity
immersion: 100
register: публіцистичний
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - 'зараз (now) — колок.: зараз роблю, саме зараз; вживається для негайної дії в
    момент мовлення.'
  - 'тепер (now/currently) — колок.: тепер ми знаємо, відтепер; позначає теперішній
    період, етап життя чи епоху.'
  - 'нині (nowadays/today) — колок.: нині відомо, станом на нині; піднесений, публіцистичний
    стиль.'
  - 'наразі (at present/for now) — колок.: наразі невідомо, наразі триває; офіційно-діловий
    стиль, акцент на тимчасовості.'
  - 'колись (once/sometime) — колок.: колись давно, як колись; використання у розповідях
    про минуле без точної дати.'
  - 'щойно (just now) — колок.: щойно повернувся, щойно отримали; позначає дію, що
    відбулася мить тому.'
  recommended:
  - відтепер (from now on) — вказує на початок нового часового відрізку.
  - давнина (ancient times) — іменник для позначення дуже віддаленого минулого.
  - сьогодення (present days) — абстрактне поняття поточної реальності.
  - наступного разу (next time) — вираз для майбутньої перспективи.
