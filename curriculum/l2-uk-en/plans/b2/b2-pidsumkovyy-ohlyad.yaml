vocabulary_hints:
  required:
  - термін (term/deadline) — встановити термін (set a deadline), кінцевий термін (deadline),
    технічний термін; уникати плутанини між значеннями 'час' та 'слово'
  - поняття (concept) — ключове поняття, визначення поняття, підмінити поняття (substitute
    concepts), мати поняття (to have an idea)
  - процес (process) — навчальний процес, виробничий процес, незворотний процес (irreversible
    process), керувати процесом
  - метод (method) — науковий метод, метод дослідження, застосовувати метод, метод
    спроб і помилок (trial and error)
  recommended:
  - аналіз (analysis) — системний аналіз, проводити аналіз
  - синтез (synthesis) — творчий синтез, синтез знань
  - дослідження (research) — фундаментальне дослідження, об'єкт дослідження
  - реєстр (register) — офіційний реєстр, зміна регістра мовлення
