module: b2-089
level: B2
sequence: 89
slug: b2-pidsumkovyy-ohlyad
version: '1.1'
title: "B2: Підсумковий огляд та систематизація"
subtitle: "B2: Final Review and Systematization"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Систематизувати та узагальнити граматичні та лексичні знання, здобуті протягом курсу рівня B2."
  - "Виявити та усунути прогалини в опануванні складних синтаксичних конструкцій та стилістичних нюансів."
  - "Повторити ключові теми: від професійної та наукової комунікації до культурної ідентичності."
  - "Підготуватися до фінального іспиту через виконання комплексних тренувальних завдань."

reading_situations:
  - source_type: "публіцистична стаття"
    topic: "Аналіз ключових викликів та досягнень України в культурній та науковій сферах за останній рік."
    key_elements: ["складні речення", "відокремлені члени", "фразеологізми", "термінологія"]
    motivation: "Комплексна перевірка навичок читання та аналізу тексту високої складності."

listening_situations:
  - media_type: "аудіо"
    setting: "Добірка фрагментів новин, інтерв'ю та дискусій за основними темами рівня B2."
    focus_points: ["визначення основної думки", "виявлення позиції автора", "розуміння підтексту"]
    motivation: "Тренування сприйняття на слух різножанрового україномовного контенту."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть підсумковий текст-рефлексію на тему: 'Мій шлях від початку B2 до сьогодні: що я опанував та що потребує вдосконалення'. Використайте різноманітні граматичні конструкції рівня B2."
    requirements: ["мінімум 300 слів", "використання складних синтаксичних конструкцій", "фразеологізми та професійна лексика", "конкретні приклади прогресу"]
    motivation: "Комплексна перевірка письмових навичок рівня B2 та здатності до саморефлексії."
    model_answer: "Текст має демонструвати різноманітність граматичних конструкцій (складнопідрядні речення, відокремлені члени, пасивні конструкції), багатий словниковий запас та логічну структуру."

discussion_topics:
  - context: "Мій прогрес на рівні B2: рефлексія та плани на майбутнє."
    questions:
      - "Які теми були найскладнішими, а які — найцікавішими?"
      - "Як змінилося ваше володіння українською мовою у професійній сфері?"
      - "Які аспекти української культури ви відкрили для себе на цьому рівні?"
    motivation: "Самоаналіз навчальних досягнень та підготовка до усного компонента іспиту."

content_outline:
  - section: "Граматичний практикум: синтаксис складного речення"
    words: 1000
    subsections:
      - "Складносурядні та складнопідрядні речення: засоби зв'язку та пунктуація"
      - "Безсполучникові складні речення та речення з різними видами зв'язку"
      - "Стилістичні функції інверсії, еліпсису та парцеляції"
    key_concepts:
      - "синтаксис"
      - "пунктуація"
      - "трансформація"
      - "стилістика"
  - section: "Морфологічні нюанси та культура мовлення"
    words: 1000
    subsections:
      - "Вживання активних та пасивних дієприкметників: заміна конструкцій"
      - "Особливості відмінювання числівників, складних іменників та географічних назв"
      - "Уникнення лексичних помилок, кальок та паронімів"
    key_concepts:
      - "морфологія"
      - "дієприкметник"
      - "паронім"
      - "норми"
  - section: "Лексикологія та фразеологія: рівень B2"
    words: 1000
    subsections:
      - "Професійна, наукова та офіційно-ділова лексика в контексті"
      - "Сталі вислови, ідіоми та афоризми: використання в усному та писемному мовленні"
      - "Синонімічне багатство української мови та точність слововживання"
    key_concepts:
      - "фразеологія"
      - "синонімія"
      - "реєстр"
      - "коннотація"
  - section: "Стратегії успішного іспиту та підготовка до вищого рівня"
    words: 1000
    subsections:
      - "Аналіз типових форматів завдань: тест, аудіювання, письмо, говоріння"
      - "Тайм-менеджмент та стресостійкість під час іспиту"
      - "Поради щодо подальшого вдосконалення мови на рівні C1 (Advanced)"
    key_concepts:
      - "сертифікація"
      - "тестування"
      - "стратегія"
      - "прогрес"

