module: b2-066
level: B2
sequence: 66
slug: professional-email-advanced
version: '2.0'
title: 'Ділова пошта: Поглиблено'
subtitle: Complex correspondence and email threads
pedagogy: CBI
phase: B2.7
word_target: 4000
objectives:
- Learner can manage complex multi-party email threads effectively
- Learner can handle escalations and sensitive correspondence
- Learner understands CC/BCC etiquette and confidentiality protocols
- Learner can write follow-up messages and acknowledgments appropriately
- Learner can delegate tasks and coordinate complex projects via email
content_outline:
- section: Вступ (Introduction)
  words: 400
  points:
  - 'Контекст професійної кореспонденції вищого рівня: координація проєктів та багатостороннє листування відповідно до Державного
    стандарту §1.3.1 (скарги, претензії, пояснення)'
  - 'Виклики складного ділового спілкування в українських компаніях: перехід від базової структури листа (М85) до стратегічного
    управління конфліктними ситуаціями'
- section: Імерсивна розповідь (Immersive Narrative)
  words: 1200
  points:
  - 'Сценарій ескалації: Менеджер по роботі з клієнтами (persona) стикається з порушенням термінів (термін) та необхідністю
    висунути обґрунтовану претензію (претензія)'
  - 'Управління ланцюжками листування: етикет використання CC та BCC у багатосторонній комунікації для забезпечення прозорості
    та конфіденційності'
  - 'Застосування ''Методу сендвіча'' (Sandwich Method): інтеграція конструктивної критики між блоками позитивної інформації
    для збереження партнерських відносин'
  - 'Робота з нагадуваннями: написання листа-підтвердження отримання (лист-підтвердження) як обов''язкового елемента професійного
    етикету при затримці відповіді'
- section: Аналіз та культурний контекст (Analysis and Cultural Context)
  words: 800
  points:
  - 'Культурний нюанс: правила написання ''Ви'' з великої літери як маркер поваги до конкретної особи проти вживання ''ви''
    (множина) при зверненні до групи'
  - 'Етикет часу відповіді в Україні: правило 1-2 днів для повних листів та обов''язкове підтвердження отримання протягом
    3 днів для уникнення репутаційних ризиків'
  - 'Функціональність теми листа: вимога української бізнес-культури щодо чітких заголовків (наприклад, ''Щодо проєкту Х'')
    замість розмитих формулювань ''Hello'' або ''Питання'''
- section: Граматика та стилістика (Grammar and Stylistics)
  words: 1000
  points:
  - Використання дієприкметників та складнопідрядних речень для забезпечення офіційного регістру при наданні пояснень та обґрунтуванні
    претензій
  - 'Корекція типових помилок (pleonasm): виправлення надлишкових конструкцій ''спільне співробітництво'' (на ''співробітництво'')
    та ''вільна вакансія'' (на ''вакансія'')'
  - 'Усунення кальок з англійської та російської мов: заміна ''приймати участь'' на нормативне ''брати участь'' та ''вірна
    відповідь'' на ''правильна відповідь'''
  - 'Модальність у листах-ескалаціях: вживання конструкцій ''Будемо вдячні, якщо...'', ''Змушені повідомити...'' для поєднання
    ввічливості з твердістю позиції'
- section: Практика та підсумок (Practice and Summary)
  words: 600
  points:
  - 'Синтез навичок: оркестрація складної кореспонденції від встановлення поняття (поняття) до фінального узгодження деталей
    (узгодити деталі)'
  - Перевірка вкладень (вкладення) та фінальний аудит листа на відповідність культурним очікуванням українського бізнес-середовища
  - 'Підготовка до наступних етапів (М87-88): застосування навичок високорівневої письмової комунікації для підготовки звітів
    та пропозицій'
vocabulary_hints:
  required:
  - термін (term/deadline) — у визначений термін, порушити термін, подовжити термін; High frequency in legal/business contexts
  - поняття (concept) — ключове поняття, ввести поняття, підміна понять; Used for abstract coordination and definitions
  - скарга (complaint) — подати скаргу, розглянути скаргу, книга скарг; Essential for §1.3.1 compliance
  - претензія (claim/grievance) — висунути претензію, обґрунтована претензія, майнові претензії; Formal legal/admin register
  - подяка (gratitude) — висловити подяку, лист-подяка, з вдячністю; High frequency official marker
  recommended:
  - узгодити (to coordinate/agree) — узгодити деталі, узгодити зустріч, попередньо узгодити; Critical management verb
  - вкладення (attachment) — див. у вкладенні, надіслати вкладенням, перевірити вкладення; Specific email terminology
  - 'співробітництво (cooperation) — плідне співробітництво; note: avoid ''спільне співробітництво'''
  - 'брати участь (to participate) — брати участь у проєкті; note: avoid calque ''приймати участь'''
  - лист-підтвердження (acknowledgment letter) — надіслати лист-підтвердження; Cultural etiquette requirement
