sequence: 86
module: b2-86
level: B2
slug: professional-email-advanced
version: '2.0'
title: 'Ділова пошта: Поглиблено'
subtitle: Complex correspondence and email threads
content_outline:
- section: Вступ
  points:
  - 'Контекст професійної кореспонденції вищого рівня: координація проєктів, багатостороннє
    листування — content writing note: emphasize the ''Sandwich Method'' (Positive
    -> Negative -> Positive) for constructive complaints'
  - 'Виклики складного ділового спілкування електронною поштою в українських компаніях
    — learner error: tautologies like ''спільне співробітництво'' instead of ''співробітництво'''
  - 'Перехід від базових навичок (М85) до майстерності управління складними ситуаціями
    — state standard alignment: §1.3.1 (writing complaints, claims, explanations)'
- section: Імерсивна розповідь
  subsections:
  - name: Управління ланцюжками листування
  - name: Копія, прихована копія та етикет багатосторонньої кореспонденції
  - name: Ескалація та чутливі питання
  - name: Нагадування та подальші дії
  - name: Делегування завдань електронною поштою
  points: []
- section: Аналіз
  subsections:
  - name: Стратегії управління складною кореспонденцією
  - name: Лексика та фразеологія для координації
  - name: Контекст та цитування в ланцюжках
  - name: Культурні особливості української професійної комунікації
  points: []
- section: Граматика в контексті
  subsections:
  - name: Дієприкметники для професійної мови
  - name: Складнопідрядні речення в діловому стилі
  points: []
- section: Підсумок
  points:
  - 'Синтез навичок: від структури простого листа (М85) до оркестрації складної кореспонденції'
  - 'Ключові принципи: ясність, професіоналізм, культурна обізнаність'
  - 'Перехід до звітів (М87-88): застосування навичок письмової комунікації у нових
    форматах'
pedagogy: CBI
objectives:
- Learner can manage complex multi-party email threads effectively
- Learner can handle escalations and sensitive correspondence
- Learner understands CC/BCC etiquette and confidentiality protocols
- Learner can write follow-up messages and acknowledgments appropriately
- Learner can delegate tasks and coordinate complex projects via email
phase: B2.4 Communication Skills
vocabulary_hints:
  required:
  - термін (term/deadline) — у визначений термін, порушити термін, подовжити термін
  - поняття (concept) — ключове поняття, ввести поняття, підміна понять
  - скарга (complaint) — подати скаргу, розглянути скаргу, книга скарг
  - претензія (claim/grievance) — висунути претензію, обґрунтована претензія
  - подяка (gratitude) — висловити подяку, лист-подяка, з вдячністю
  recommended:
  - узгодити (to coordinate/agree) — узгодити деталі, узгодити зустріч
  - вкладення (attachment) — див. у вкладенні, надіслати вкладенням
  - процес (process)
  - метод (method)
  - аналіз (analysis)
  - синтез (synthesis)
  - дослідження (research)
activity_hints:
- type: reading
  focus: Аналіз тексту
  items: 4
- type: essay-response
  focus: Практичне застосування
- type: true-false
  focus: Перевірка розуміння
  items: 8
persona:
  voice: Professional Language Coach
  role: Key Account Manager (Менеджер по роботі з клієнтами)
word_target: 4000
