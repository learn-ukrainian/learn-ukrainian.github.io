module: b2-080
level: B2
sequence: 80
slug: professional-email-advanced
version: '1.1'
title: "Ділова переписка: Поглиблені аспекти та складні ситуації"
subtitle: "Професійний е-мейл: просунуті аспекти та складні ситуації"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати написання складних типів ділових листів (рекламації, претензії, супровідні
    листи)."
  - "Розвинути навички аргументації та переконання в офіційно-діловому дискурсі."
  - "Навчитися коректно висловлювати незгоду, критику та вести переговори через електронну
    пошту."
  - "Дослідити специфіку кризової комунікації та управління конфліктами в діловому
    листуванні."

reading_situations:
  - source_type: "зразки листів"
    topic: "Порівняльний аналіз трьох листів-претензій: зразковий, надто агресивний
      та надто м'який варіанти."
    key_elements: ["тон та регістр", "аргументація", "вимоги та дедлайни", "дипломатичність"]
    motivation: "Розвиток критичного аналізу ділового листування та розуміння балансу
      між жорсткістю та ввічливістю."

listening_situations:
  - media_type: "лекція"
    setting: "Вебінар фахівця з комунікацій про 'токсичність' та 'екологічність' у
      діловій переписці."
    focus_points: ["розпізнавання пасивної агресії", "стратегії деескалації конфліктів",
      "принципи асертивності в тексті"]
    motivation: "Розвиток емоційного інтелекту та психологічної грамотності у професійному
      спілкуванні."

discussion_topics:
  - context: "Обговорення етики переконання: 'Де проходить межа між аргументацією
      та маніпуляцією в діловому листі?'"
    questions:
      - "Як за допомогою мовних засобів підкреслити власну впевненість, не переходячи
        до тиску?"
      - "Чи варто використовувати емоційні заклики в офіційних претензіях?"
      - "Як змінилися стандарти ввічливості в українському бізнес-середовищі за останні
        10 років?"
    motivation: "Стимулювання критичного аналізу стратегій професійного впливу."

content_outline:
  - section: "Листи-рекламації та претензії: мова конфлікту та розв'язання"
    words: 1000
    subsections:
      - "Структура претензії: опис проблеми, докази, вимоги та терміни"
      - "Лексика для вираження невдоволення без образ: баланс між жорсткістю та ввічливістю"
      - "Мистецтво відповіді на скаргу: визнання провини, компенсація та відновлення
        довіри"
    key_concepts:
      - "рекламація"
      - "претензія"
      - "доказова база"
      - "дипломатичність"
  - section: "Аргументація та переконання: лінгвістичні інструменти"
    words: 1000
    subsections:
      - "Побудова аргументу за моделлю 'Теза — Доказ — Висновок' у діловому листі"
      - "Використання модальних дієслів та вставних конструкцій для пом'якшення або
        посилення позиції"
      - "Риторичні прийоми у комерційних пропозиціях: акцент на вигоді партнера"
    key_concepts:
      - "аргументація"
      - "модальність"
      - "переконливість"
      - "риторика"
  - section: "Супровідні та мотиваційні листи"
    words: 1000
    subsections:
      - "Специфіка супровідного листа до резюме: як виділитися серед кандидатів"
      - "Презентація власних досягнень через сильні дієслова дії"
      - "Адаптація стилю листа під корпоративну культуру роботодавця"
    key_concepts:
      - "самопрезентація"
      - "мотиваційний лист"
      - "компетенції"
      - "корпоративна культура"
  - section: "Кризова комунікація та етикет у складних випадках"
    words: 1000
    subsections:
      - "Повідомлення про затримки, відмови та кадрові зміни: як зберегти репутацію"
      - "Уникнення неоднозначностей у листуванні під час кризових ситуацій"
      - "Етикет нагадування (Follow-up) про протерміновані зобов'язання"
    key_concepts:
      - "кризова комунікація"
      - "репутація"
      - "прозорість"
      - "наполегливість"

vocabulary:
  required:
    - претензія
    - рекламація
    - переконання
    - аргументація
    - супровідний
    - резюме
    - деескалація
    - асертивність
  recommended:
    - компроміс
    - обґрунтований
    - непорозуміння
    - виважений
    - невідкладний

activities:
  types_required:
    - error-correction
    - critical-analysis
    - essay-response
    - translate
  min_items_per_type: 5
  total_min_items: 20

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть офіційний лист-претензію до постачальника послуг через систематичне
      порушення термінів виконання робіт."
    motivation: "Відпрацювання навичок написання складних документів зі збереженням
      професійного тону."
    requirements: ["мінімум 250 слів", "чітка хронологія подій", "вимога конкретних
          дій", "юридично коректна термінологія"]
    model_answer: "Лист має містити посилання на номер договору, перелік фактів порушень,
      чіткі вимоги щодо усунення проблем та можливі наслідки у разі ігнорування претензії."

activity_hints:
  - type: reading
    focus: "Прочитайте текст про листи-рекламації та претензії: мова конфлікту та розв'язання і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про аргументація та переконання: лінгвістичні інструменти, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Листи-рекламації та претензії: мова конфлікту та розв'язання». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему листи-рекламації та претензії: мова конфлікту та розв'язання."

references:
  - "Глазова О. П. Українська мова. 11 клас (2019), §21-25 — Синтаксична норма, ділове
    мовлення"
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Офіційно-діловий стиль"
  - "Ворон А. А. Українська мова. 11 клас (2019) — Діловодство"
  - "State Standard 2024: B2 SS 3 — Professional communication themes"

connects_to:
  previous: "professional-email-basics"
  next: "professional-reports-basics"
phase: B2.4 [Communication Skills]
