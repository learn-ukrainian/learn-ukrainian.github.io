title: 'Сталі вирази II: Предмети та абстракції'
subtitle: 'Set Expressions II: Objects & Abstract'
content_outline:
- section: 'Вступ: Предмети як символи та давній світогляд (Introduction: Objects
    as Symbols and Ancient Worldview)'
  words: 600
  points:
  - 'Роль побутових предметів у фразеології: хата, стіл, ложка як ''викопні рештки''
    давнього світосприйняття та соціальних норм.'
  - 'Культурний гачок: ''Виносити сміття з хати'' — зв''язок із давніми магічними
    віруваннями про спалювання сміття в печі для захисту сімейних таємниць від ''злих
    людей''.'
  - 'Метафора як когнітивний процес: аналіз механізму перенесення значення з конкретного
    фізичного предмета на абстрактну життєву ситуацію.'
- section: 'Магія побуту — сталі вирази з предметами (Domestic Magic: Set Expressions
    with Objects)'
  words: 1000
  points:
  - 'Етимологічний аналіз виразу ''Народитися в сорочці'': від рідкісного біологічного
    явища (навколоплідної оболонки) до символу особливого Божого захисту.'
  - 'Концепція соціальної єдності через вираз ''Розбити глечик'': глечик як символ
    достатку та цілісності стосунків; огляд синонімічного ряду (побити горшки).'
  - 'Комічні та кризові ситуації: ''Сісти в калошу'' (повний провал) та ''Каша в голові''
    (ментальна плутанина через надлишок інформації).'
  - 'Метафора болю: ''Дістати до живого'' — опис глибокої емоційної вразливості та
    зачіпання за найболючіше.'
- section: 'Від серця до неба — абстракції у фразеології (From Heart to Heaven: Abstractions
    in Phraseology)'
  words: 900
  points:
  - 'Соматична фразеологія та емоції: ''Душа в п''яти'' як опис інтенсивного страху
    та ''Камінь на серці'' як символ тяжкого психологічного тягаря.'
  - 'Радість та полегшення: ''На сьомому небі'' (акцент на правильному прийменнику
    ''на'' проти помилкового ''в'') та ''Як гора з плечей''.'
  - 'Стихії та здоров''я: ''Вітер у голові'' як маркер легковажності та народнопоетичний
    ідеал краси ''Кров з молоком''.'
- section: 'Робота над помилками — культура мовлення (Error Correction: Speech Culture)'
  words: 800
  points:
  - 'Подолання суржику та калькування: активний дрилінг заміни ''приймати міри'' на
    ''вживати заходів'' та ''по крайній мірі'' на ''принаймні/щонайменше''.'
  - 'Семантична диференціація: правильне вживання слова ''частка'' у виразі ''левова
    частка'' замість помилкового використання слова ''доля'' (fate).'
  - 'Усунення плеоназмів: корекція поширеної помилки ''бачити своїми очима'' на нормативне
    ''бачити на власні очі''.'
  - 'Граматичне узгодження: відпрацювання давального відмінка у виразі ''Дякую тобі''
    замість калькованого знахідного ''Дякую тебе''.'
- section: Практика та творче застосування (Practice and Creative Application)
  words: 700
  points:
  - 'Творча лабораторія (CBI): написання короткої історії або есе з обов''язковим
    використанням 5+ вивчених ідіом у відповідному контексті.'
  - 'Компаративістика: порівняння українських предметних метафор з англійськими аналогами
    для виявлення культурної специфіки (наприклад, ''каша в голові'' vs ''muddled
    head'').'
  - 'Відповідність Держстандарту (§4.4.1.2): вправи на ідентифікацію епітетів та метафор
    у автентичних текстах сучасних медіа.'
