vocabulary_hints:
  required:
  - виносити сміття з хати (to reveal family secrets) — не треба виносити...; культурний
    код приватності
  - народитися в сорочці (to be born lucky) — справжній щасливчик; символ захисту
    та долі
  - каша в голові (mental confusion) — повна плутанина; часто вживається щодо навчання
    або надлишку новин
  - душа в п'яти (to be terrified) — аж душа в п'яти втекла; раптовий сильний переляк
  - камінь на серці (heavy heart) — носити камінь на серці; відчуття провини або тривоги
  - на сьомому небі (extremely happy) — бути на сьомому небі від щастя; вимагає прийменника
    'на'
  - вживати заходів (to take measures) — офіційно-діловий стиль; правильна форма без
    калькування
  - бачити на власні очі (to see with one's own eyes) — ідіоматично правильний варіант
    без плеоназму
  recommended:
  - 'розбити глечик (to quarrel) — синонім: побити горшки; розрив дружніх стосунків'
  - сісти в калошу (to fail embarrassingly) — опинитися у незручному становищі через
    помилку
  - дістати до живого (to hurt deeply) — зачепити за живе; допекти до живого
  - левова частка (the lion's share) — більша або найкраща частина чогось; не плутати
    з 'долею'
  - принаймні (at least) — нормативний варіант замість суржикового 'по крайній мірі'
