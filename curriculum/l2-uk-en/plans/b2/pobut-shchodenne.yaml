module: b2-008
level: B2
sequence: 8
slug: pobut-shchodenne
version: 1.0.2
title: Побут і щоденне життя
subtitle: Побут і щоденне життя
focus: thematic
pedagogy: TTT
word_target: 4000
phase: B2.0 [Passive Voice System]
objectives:
- Описувати повсякденні справи, розпорядок дня та побутові обов'язки розгорнуто.
- Обговорювати розподіл домашніх обов'язків та ґендерні стереотипи у побуті.
- Вживати зворотні дієслова на -ся в контексті побутових дій (прибирається, 
  готується).
- Порівнювати побут в Україні та інших країнах із використанням відповідної 
  лексики.
reading_situations:
- source_type: блог-стаття
  topic: 'Один день з життя української сім''ї: від ранкової каші до вечірньої прогулянки.'
  key_elements:
  - побутова лексика
  - зворотні дієслова
  - часові маркери
  motivation: Занурення в автентичний опис українського побуту.
listening_situations:
- media_type: подкаст
  setting: 'Дискусія про те, як змінився побут українців під час війни: відключення
    електрики, генератори, запаси.'
  focus_points:
  - побутова лексика воєнного часу
  - опис рутини
  - емоційне забарвлення
  motivation: Розуміння реального побуту сучасної України.
writing_tasks:
- task_type: есе
  prompt: Опишіть свій ідеальний та свій реальний розпорядок дня. Порівняйте їх,
    використовуючи відповідні часові маркери та побутову лексику.
  requirements:
  - мінімум 250 слів
  - використання зворотних дієслів (прокидатися, збиратися, одягатися)
  - порівняльні конструкції
  motivation: Розвиток навичок розгорнутого опису повсякденності.
  model_answer: 'Есе має демонструвати багату побутову лексику. Модельний варіант
    містить: ''Зазвичай я прокидаюся о сьомій, але мрію вставати пізніше. Поки готується
    кава, я переглядаю новини...'''
discussion_topics:
- context: 'Розподіл домашніх обов''язків: хто в родині прибирає, готує, прасує?'
  questions:
  - Чи справедливо, коли один член родини виконує більшість побутових справ?
  - Як технології змінюють наш побут?
  motivation: Обговорення ґендерних ролей та побутових звичок.
dialogue_situations:
- setting: Подружжя планує генеральне прибирання на вихідних і розподіляє 
    обов'язки.
  roles:
  - чоловік
  - дружина
  key_phrases:
  - я візьму на себе кухню
  - треба попрасувати
  - пилосос зламався
- setting: Друзі обговорюють, як економити електроенергію під час відключень.
  roles:
  - друг 1
  - друг 2
  key_phrases:
  - у нас вже зарядили павербанк
  - готуємо на газовій плитці
  - графік відключень
content_outline:
- section: Розпорядок дня та рутинні дії
  words: 1000
  subsections:
  - 'Ранкові ритуали: від будильника до виходу з дому'
  - Робочий день та обідня перерва
  - Вечірній відпочинок та підготовка до сну
  - 'Часові маркери: щоранку, зазвичай, часом, зрідка'
  key_concepts:
  - розпорядок
  - рутина
  - часовий маркер
- section: Домашні обов'язки та ведення господарства
  words: 1000
  subsections:
  - 'Прибирання, прання, прасування, готування: дієслівна лексика'
  - Зворотні дієслова в побутовому контексті (миється, прибирається)
  - 'Побутова техніка: пральна машина, посудомийка, пилосос'
  - Розподіл обов'язків та переговори в родині
  key_concepts:
  - домогосподарство
  - обов'язок
  - побутова техніка
- section: Побут у сучасній Україні
  words: 1000
  subsections:
  - 'Міський та сільський побут: порівняння'
  - 'Побутові виклики воєнного часу: відключення, генератори, запаси'
  - Сусідська взаємодопомога та волонтерство
  - 'Цифровізація побуту: онлайн-оплата, доставка, розумний дім'
  key_concepts:
  - адаптація
  - стійкість
  - взаємодопомога
- section: 'Побутова культура: від етикету до звичок'
  words: 1000
  subsections:
  - 'Гостинність в Україні: традиції та сучасність'
  - 'Українська кухня в побуті: щоденне та святкове меню'
  - 'Ґендерні ролі в побуті: стереотипи та реальність'
  - Порівняння побутових звичок різних країн
  key_concepts:
  - гостинність
  - ґендерна роль
  - побутова культура
- section: Підсумок — Summary
  words: 300
  points:
  - 'Literary and art analysis relies on specific terminology: сюжет, композиція,
    художній образ, and естетика. Self-check: What is the difference between сюжет
    and композиція? Describe your favorite Ukrainian book or film using at least 3
    critical terms from this module.'
  - "Ukrainian culture has evolved through key historical movements, leading to today's
    art of resistance and cultural diplomacy. Self-check: Who were the 'Шістдесятники'
    and what was their role? Name 2 ways art acts as 'спротив' (resistance) during
    wartime."
vocabulary_hints:
- word: побут
  translation: daily life, household
  context: Побут українців змінився через війну.
- word: домогосподарство
  translation: household, domestic economy
  context: Ведення домогосподарства потребує часу.
- word: прасувати
  translation: to iron
  context: Треба прасувати сорочки на тиждень.
- word: пилосос
  translation: vacuum cleaner
  context: Пилосос зламався — треба купити новий.
- word: порядок
  translation: order, tidiness
  context: Вона любить, коли в домі порядок.
- word: прибирання
  translation: cleaning
  context: Генеральне прибирання робимо раз на місяць.
- word: розпорядок
  translation: daily routine, schedule
  context: Мій розпорядок дня починається о шостій.
- word: посудомийка
  translation: dishwasher
  context: Без посудомийки ми миємо посуд руками.
- word: відключення
  translation: power outage, cutoff
  context: Графік відключень електроенергії змінюється щодня.
- word: генератор
  translation: generator
  context: Сусіди купили генератор для всього під'їзду.
- word: павербанк
  translation: power bank
  context: Під час блекауту павербанк — найважливіша річ.
- word: доставка
  translation: delivery
  context: Замовляємо продукти з доставкою додому.
- word: гостинність
  translation: hospitality
  context: Українська гостинність відома у всьому світі.
- word: щоранку
  translation: every morning
  context: Щоранку я п'ю каву з молоком.
- word: зрідка
  translation: rarely, seldom
  context: Зрідка ми замовляємо їжу з ресторану.
- word: взаємодопомога
  translation: mutual aid
  context: Сусідська взаємодопомога стала нормою під час війни.
- word: звичка
  translation: habit
  context: Ранковий біг — це моя корисна звичка.
- word: прання
  translation: laundry, washing
  context: Прання — це нескінченний процес у великій родині.
activities:
  types_required:
  - fill-in
  - error-correction
  - select
  - reading
  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: reading
  focus: Прочитайте текст про розпорядок дня та рутинні дії і дайте відповіді на
    запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про домашні обов'язки та ведення
    господарства, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Розпорядок дня та 
    рутинні дії». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    розпорядок дня та рутинні дії.
