module: b2-053
level: B2
sequence: 53
slug: checkpoint-cases-morphology
version: 1.0.2
title: 'Контрольний модуль: Відмінки та морфологія'
subtitle: 'Підсумковий контроль: відмінки та морфологія'
focus: checkpoint
pedagogy: review
word_target: 4000
phase: B2.4 [Domain Vocabulary & Advanced Cases]
objectives:
- Систематизувати знання про семантичні функції родового, давального та орудного
  відмінків.
- Продемонструвати вміння вибирати правильний відмінок залежно від прийменника 
  та контексту.
- Перевірити навички розпізнавання та вживання деліберативних, риторичних та 
  вкладених запитань.
- 'Оцінити загальний рівень морфологічної грамотності: закінчення, чергування, варіантність.'
reading_situations:
- source_type: комбінований текст
  topic: 'Аналітична стаття з елементами риторики: ''Місце України в Європі — юридичні,
    економічні та культурні аспекти.'''
  key_elements:
  - родовий з прийменниками
  - давальний переживача
  - орудний у присудку
  - риторичні запитання
  motivation: Комплексна перевірка розуміння складного тексту з різними 
    відмінковими функціями.
listening_situations:
- media_type: аудіо
  setting: 'Дискусійна панель: учасники обговорюють зміни в освітній системі, використовуючи
    різні типи запитань.'
  focus_points:
  - розрізнення типів запитань на слух
  - відмінкові форми після прийменників
  - формули аргументації
  motivation: Перевірка навичок сприйняття складних граматичних конструкцій.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть аналітичне есе: ''Якою Україна буде через 10 років?'' Продемонструйте
    вживання всіх відмінкових функцій, вивчених у B2.4, та різних типів запитань.'
  requirements:
  - мінімум 350 слів
  - родовий, давальний та орудний у різних функціях
  - риторичні, деліберативні та вкладені запитання
  - логічні конектори
  motivation: Фінальна перевірка продуктивних навичок вживання відмінків та 
    запитань.
  model_answer: 'Есе має інтегрувати всі вивчені конструкції: ''Хіба хтось може заперечити...
    (риторичне). Завдяки стійкості народу... (давальний). Внаслідок реформ... (родовий).
    Україна стане сильною демократією (орудний у присудку). Залишається питання, чи
    вистачить ресурсів (вкладене)...'''
discussion_topics:
- context: 'Рефлексія над вивченим: які граматичні конструкції виявилися найскладнішими?'
  questions:
  - Який відмінок є найскладнішим для вас і чому?
  - Чи допомогло вивчення семантичних функцій зрозуміти логіку відмінкової 
    системи?
  motivation: Самооцінка та рефлексія над навчальним прогресом.
content_outline:
- section: Систематизація відмінкових функцій
  words: 1000
  subsections:
  - 'Родовий: частковий, суб''єктний, об''єктний — порівняльна таблиця'
  - 'Давальний: адресат, переживач, етичний — порівняльна таблиця'
  - 'Орудний: знаряддя, порівняння, присудок — порівняльна таблиця'
  - 'Перехресні випадки: коли різні відмінки можливі'
  key_concepts:
  - систематизація
  - семантична функція
  - порівняння
- section: 'Прийменникове керування: комплексна картина'
  words: 1000
  subsections:
  - 'Прийменники з родовим: 18+ (замість, крім, навколо, задля та ін.)'
  - 'Прийменники з давальним: завдяки, всупереч, наперекір, навстріч'
  - 'Прийменники з орудним: з, за, між, над, під, перед, поза'
  - 'Прийменники з кількома відмінками: між + орудний vs між + родовий'
  key_concepts:
  - керування
  - прийменник
  - синтаксичний зв'язок
- section: 'Питальні речення: комплексний огляд'
  words: 1000
  subsections:
  - 'Деліберативні: роздум, сумнів, зважування (а що, якщо...)'
  - 'Риторичні: підсилення, іронія, переконання (хіба не..., невже...)'
  - 'Вкладені: непрямі запитання в складнопідрядних реченнях'
  - Стратегічне вживання запитань у різних жанрах
  key_concepts:
  - типологія запитань
  - комунікативна мета
  - пунктуація
- section: Діагностика та практикум з помилок
  words: 1000
  subsections:
  - 'Типові помилки рівня B2: закінчення -а/-у, орудний діяча, змішування прийменників'
  - 'Вправи на трансформацію: зміна відмінка → зміна значення'
  - Редагування тексту з відмінковими та пунктуаційними помилками
  - 'Підготовка до наступного блоку: дієслівні та словотвірні теми'
  key_concepts:
  - діагностика
  - трансформація
  - редагування
- section: Підсумок — Summary
  words: 300
  points:
  - "Case functions and prepositional government dictate specific relationships: Genitive
    (замість, крім), Dative (завдяки, всупереч), Instrumental (перед, між). Self-check:
    What is the difference in meaning when using 'між' with the Genitive versus the
    Instrumental case? List 3 prepositions that strictly require the Dative case."
  - "Question typology serves various communicative goals: deliberative (weighing
    options, e.g., 'а що, якщо...'), rhetorical (persuasion/irony, e.g., 'хіба не...'),
    and embedded (indirect questions). Self-check: Transform the direct question 'Де
    вони живуть?' into an embedded question starting with 'Я хотів би знати...'. What
    distinguishes a deliberative question from a rhetorical one?"
  - "Morphological accuracy requires mastering noun endings and avoiding preposition
    mix-ups. Self-check: What is the common B2 error in the phrase 'завдяки лікаря',
    and how do you correct it? Explain the rules for choosing between -а and -у endings
    for masculine nouns in the Genitive case."
vocabulary_hints:
- word: відмінок
  translation: grammatical case
  context: В українській мові сім відмінків.
- word: систематизація
  translation: systematization
  context: Систематизація знань допомагає запам'ятати.
- word: керування
  translation: government (syntax)
  context: Прийменникове керування визначає відмінок.
- word: функція
  translation: function
  context: Кожний відмінок має кілька семантичних функцій.
- word: трансформація
  translation: transformation
  context: Трансформація речення змінює його значення.
- word: діагностика
  translation: diagnostics
  context: Діагностика помилок — перший крок до їх виправлення.
- word: морфологія
  translation: morphology
  context: Морфологія вивчає форми слів.
- word: закінчення
  translation: ending (grammatical)
  context: Правильне закінчення залежить від відмінка.
- word: чергування
  translation: alternation (phonological)
  context: 'Чергування приголосних: рука — руці.'
- word: варіантність
  translation: variability
  context: 'Варіантність закінчень: -а або -у в родовому.'
- word: прийменник
  translation: preposition
  context: Прийменник 'завдяки' вимагає давального.
- word: пунктуація
  translation: punctuation
  context: Пунктуація вкладених запитань відрізняється.
- word: семантика
  translation: semantics
  context: Семантика визначає вибір закінчення.
- word: аргументація
  translation: argumentation
  context: Риторичні запитання підсилюють аргументацію.
- word: редагування
  translation: editing
  context: Редагування тексту — важливий навик.
- word: стилістика
  translation: stylistics
  context: Стилістика вивчає засоби виразності.
activities:
  types_required:
  - quiz
  - error-correction
  - fill-in
  - select
  min_items_per_type: 10
  total_min_items: 40
activity_hints:
- type: reading
  focus: Прочитайте текст про систематизація відмінкових функцій і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про прийменникове керування: комплексна
    картина, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Систематизація 
    відмінкових функцій». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    систематизація відмінкових функцій.
