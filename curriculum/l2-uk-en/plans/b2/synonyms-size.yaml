vocabulary_hints:
  required:
  - великий (big) — великий успіх, велика помилка, велика родина; висока частотність
  - величезний (enormous) — величезний вплив, величезне значення, величезна сума;
    емфатичний варіант
  - велетенський (gigantic) — велетенські кроки, велетенська сила, велетенський розмір;
    асоціація з 'Мрією'
  - грандіозний (grand) — грандіозний план, грандіозний скандал, грандіозна подія;
    книжний стиль
  - малий (small) — малий бізнес, малий внесок; нейтральний
  - крихітний (tiny) — крихітна деталь, крихітна зарплата (іронічно); висока експресія
  - мізерний (minuscule/negligible) — мізерний шанс, мізерні кошти, мізерний результат;
    негативна конотація
  - здоровенний (huge/hulking) — здоровенний хлопець, здоровенна гора; розмовний,
    часто про масивність
  recommended:
  - мініатюрний (miniature) — мініатюрна копія, мініатюрна жінка; акцент на витонченості
  - масштаб (scale) — масштаб проблеми, у промислових масштабах
  - габарити (dimensions) — габарити вантажу, великогабаритний
  - розмах (wingspan/scope) — розмах крил, розмах діяльності; часто про амбіції
  - значний (significant) — значний прибуток, значний внесок; офіційно-діловий замінник
    'здоровенного'
  - величний (majestic) — величний монумент, велична постать; позитивна конотація
