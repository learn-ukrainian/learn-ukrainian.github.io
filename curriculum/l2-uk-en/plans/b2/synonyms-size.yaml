module: b2-56
level: B2
sequence: 56
slug: synonyms-size
version: '2.0'
title: 'Синоніми: Розмір і Масштаб'
subtitle: Synonyms - Size and Scale
content_outline:
- section: 'Вступ: Масштаб як категорія (Introduction: Scale as a Category)'
  words: 600
  points:
  - 'Огляд категорії розміру в українській мові відповідно до Держстандарту §4.4.1.2:
    синоніми та епітети як засіб виразності.'
  - 'Поняття градації (шкали інтенсивності): від нейтрального опису фізичних параметрів
    до експресивної гіперболи.'
  - Розрізнення фізичного розміру (об'єм, площа) та абстрактного масштабу (значущість,
    вплив, авторитет).
- section: 'Велич та гігантизм: Від «великого» до «грандіозного» (Grandeur and Gigantism:
    From ''Big'' to ''Grand'')'
  words: 1000
  points:
  - 'Синонімічний ряд для великого: великий (нейтрал) -> величезний (емфаза) -> велетенський
    (масштаб) -> грандіозний (книжний).'
  - 'Культурний контекст: Ан-225 «Мрія» як символ інженерного масштабу; вживання слів
    ''велетенський'', ''грандіозний'' та ''розмах крил''.'
  - 'Монументальність: Скульптура ''Батьківщина-Мати'' (102 м) як приклад для вживання
    прикметників ''величний'' та ''монументальний''.'
  - 'Розмовний регістр: Вживання слова ''здоровенний'' для опису чогось незграбного
    або вражаюче масивного (напр., здоровенна гора, здоровенний хлопець).'
- section: 'Світ малого: Мікросвіти та мізерія (The World of the Small: Micro-worlds
    and Negligibility)'
  words: 800
  points:
  - 'Градація малого: малий (нейтрал) -> маленький (пестливий) -> крихітний (дуже
    малий) -> мізерний (нікчемний).'
  - 'Стилістичні нюанси ''мініатюрного'': акцент на точності та майстерності виконання
    (мініатюрна копія, мініатюрна жінка).'
  - 'Негативна конотація слова ''мізерний'': використання для опису недостатності
    ресурсів або шансів (мізерний шанс, мізерні кошти, мізерний результат).'
  - Іронічне використання слова 'крихітний' у соціальному контексті (напр., 'крихітна
    зарплата').
- section: Типові помилки та стилістичні нюанси (Common Errors and Stylistic Nuances)
  words: 1000
  points:
  - 'Помилка змішування понять ''Great'' vs ''Big'': недоречність вживання ''великий''
    замість ''величний'' або ''значний'' (напр., ''великий авторитет'' краще замінити
    на ''величезний'' або ''значний'').'
  - 'Граматична заборона подвійного вищого ступеня: виправлення конструкції ''більш
    величезний'' на ''ще більший'' або ''набагато більший'' через абсолютне значення
    синоніма.'
  - 'Невідповідність регістру: виправлення вживання розмовного ''здоровенний'' у ділових
    звітах (напр., ''здоровенний прибуток'' -> ''величезний/значний прибуток'').'
  - 'Підсилювачі масштабу: доречність вживання прислівників ''неймовірно'', ''надзвичайно'',
    ''вражаюче'' з нейтральними та експресивними синонімами.'
- section: 'Практичне застосування: Українські рекорди (Practical Application: Ukrainian
    Records)'
  words: 600
  points:
  - 'Трансформаційна вправа: переписування тексту про українські досягнення з нейтрального
    стилю в публіцистичний (використання гіперболи).'
  - 'Аналіз контексту: вибір прикметника відповідно до типу об''єкта (фізичний габарит
    вантажу vs грандіозний план розвитку).'
  - 'Підготовка до рівня C1: використання лексики масштабу для створення художніх
    описів та емоційного впливу на читача.'
focus: phraseology
