module: b2-039
level: B2
sequence: 39
slug: tradytsii-i-zvychai
version: '1.0'
title: "Традиції і звичаї"
subtitle: "Традиції і звичаї"
focus: thematic
pedagogy: TTT
word_target: 4000
phase: "B2.3 [Stylistic Devices & Register]"
objectives:
  - "Описувати українські свята, обряди та народні звичаї розгорнуто."
  - "Порівнювати традиції різних регіонів України та інших країн."
  - "Обговорювати збереження традицій у сучасному суспільстві."
  - "Інтегрувати літературно-художній регістр для опису обрядів та свят."

reading_situations:
  - source_type: "етнографічний нарис"
    topic: "Святвечір в українській родині: традиції, заборони та символіка 12
      страв."
    key_elements: ["обрядова лексика", "символіка", "літературний стиль"]
    motivation: "Розуміння етнографічного тексту з культурним підтекстом."

listening_situations:
  - media_type: "подкаст"
    setting: "Етнограф розповідає про маловідомі українські обряди: Андріївські
      вечорниці, Зелені свята, обжинки."
    focus_points: ["обрядова лексика", "архаїзми", "регіональні відмінності"]
    motivation: "Розвиток навичок сприйняття етнографічного дискурсу."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть есе: 'Яку українську традицію ви б хотіли впровадити у своїй
      родині і чому?' або 'Як зберегти традиції в сучасному світі?'"
    requirements:
      - "мінімум 300 слів"
      - "опис конкретної традиції з деталями"
      - "літературно-художній регістр"
    motivation: "Практика есе з культурною рефлексією."
    model_answer: "Есе має поєднувати особисте ставлення з фактами: 'Серед
      численних українських традицій мене найбільше захоплює Масниця — тижневе
      свято прощання з зимою. На відміну від подібних свят в інших культурах...'"

discussion_topics:
  - context: "Чи потрібні традиції сучасній людині, чи це пережитки минулого?"
    questions:
      - "Які традиції зміцнюють суспільство, а які — обмежують?"
      - "Як війна вплинула на святкування в Україні?"
    motivation: "Дискусія про роль традицій у формуванні ідентичності."

dialogue_situations:
  - setting: "Іноземець запитує українського друга про те, як святкують Різдво
      в Україні."
    roles: ["іноземець", "українець"]
    key_phrases: ["коли ви святкуєте Різдво?", "що таке кутя?", "а як з
      ялинкою?"]
  - setting: "Родина обговорює підготовку до Великодня: паски, крашанки, кошик."
    roles: ["мати", "дочка"]
    key_phrases: ["треба спекти паску", "а хто фарбуватиме крашанки?",
      "не забудь покласти в кошик хрін"]

content_outline:
  - section: "Річний цикл українських свят"
    words: 1000
    subsections:
      - "Різдвяний цикл: Святвечір, Різдво, Маланка, Водохреще"
      - "Весняний цикл: Масляна, Великдень, Зелені свята"
      - "Літні та осінні свята: Купала, обжинки, Покрова"
      - "Нові свята: День Незалежності, День вишиванки, День Гідності"
    key_concepts:
      - "річний цикл"
      - "обрядовість"
      - "календарне свято"
  - section: "Обряди та їхня символіка"
    words: 1000
    subsections:
      - "Родинні обряди: хрестини, весілля, поминки"
      - "Символіка їжі: кутя, паска, крашанка, коровай"
      - "Народні прикмети та забобони: що можна і що не можна"
      - "Обрядова лексика: вінчання, сватання, колядування"
    key_concepts:
      - "обряд"
      - "символіка"
      - "ритуал"
  - section: "Регіональні відмінності та діалектні традиції"
    words: 1000
    subsections:
      - "Галичина: особливості святкування та діалектні назви"
      - "Полісся, Поділля, Слобожанщина: регіональні обряди"
      - "Закарпаття: угорський, румунський та словацький вплив"
      - "Порівняння українських та інших слов'янських традицій"
    key_concepts:
      - "регіональна специфіка"
      - "діалектна назва"
      - "культурний вплив"
  - section: "Традиції в сучасному суспільстві"
    words: 1000
    subsections:
      - "Ревіталізація традицій після 2014 року: вишиванка, колядки, козацтво"
      - "Святкування під час війни: адаптація та нові смисли"
      - "Традиції діаспори: як зберігають культуру за кордоном"
      - "Літературно-художній регістр для опису обрядів: образність, метафори"
    key_concepts:
      - "ревіталізація"
      - "ідентичність"
      - "культурна стійкість"

vocabulary_hints:
  - word: "традиція"
    translation: "tradition"
    context: "Українські традиції сягають тисячоліть."
  - word: "звичай"
    translation: "custom, habit"
    context: "За звичаєм, на Святвечір готують дванадцять страв."
  - word: "обряд"
    translation: "ritual, ceremony"
    context: "Весільний обряд включає сватання та вінчання."
  - word: "свято"
    translation: "holiday, celebration"
    context: "Великдень — одне з найважливіших свят."
  - word: "спадщина"
    translation: "heritage"
    context: "Нематеріальна культурна спадщина потребує захисту."
  - word: "вишиванка"
    translation: "embroidered shirt"
    context: "День вишиванки святкують у травні."
  - word: "колядка"
    translation: "Christmas carol"
    context: "Діти ходять від хати до хати і співають колядки."
  - word: "крашанка"
    translation: "Easter egg (dyed)"
    context: "На Великдень ми фарбуємо крашанки."
  - word: "паска"
    translation: "Easter bread"
    context: "Паска — обов'язковий елемент великоднього кошика."
  - word: "коровай"
    translation: "wedding bread"
    context: "Коровай символізує добробут і щастя."
  - word: "кутя"
    translation: "kutia (ritual wheat dish)"
    context: "Кутя — перша страва на Святвечір."
  - word: "сватання"
    translation: "matchmaking, engagement ceremony"
    context: "Сватання — давній український обряд."
  - word: "вінчання"
    translation: "church wedding"
    context: "Вінчання відбувається в церкві."
  - word: "колядування"
    translation: "caroling"
    context: "Колядування починається ввечері на Святвечір."
  - word: "забобон"
    translation: "superstition"
    context: "Не передавай речі через поріг — це забобон."
  - word: "обжинки"
    translation: "harvest festival"
    context: "Обжинки святкують після збору врожаю."
  - word: "Покрова"
    translation: "Feast of the Protection of the Theotokos"
    context: "На Покрову починається весільний сезон."
  - word: "ревіталізація"
    translation: "revitalization"
    context: "Ревіталізація традицій — частина національного відродження."

activities:
  types_required:
    - fill-in
    - error-correction
    - select
    - reading
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: reading
    focus: "Прочитайте текст про річний цикл українських свят і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про обряди та їхня символіка, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Річний цикл українських свят». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему річний цикл українських свят."

