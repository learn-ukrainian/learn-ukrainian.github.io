module: b2-044
level: B2
sequence: 44
slug: aspect-nuances-imperative-infinitive
version: '1.0'
title: "Нюанси виду: Наказовий спосіб та інфінітив"
subtitle: "Aspect Nuances: Imperative and Infinitive"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Розуміти семантичні відмінності між доконаним та недоконаним видом у наказовому способі."
  - "Засвоїти правила вибору виду при вираженні прохання, поради, вимоги або заборони."
  - "Вивчити специфіку використання виду в інфінітивних конструкціях після фазових та модальних дієслів."
  - "Навчитися передавати відтінки ввічливості або категоричності через вибір дієслівного виду."
  - "Застосовувати знання про вид інфінітива для вираження наміру, мети або неможливості дії."

reading_situations:
  - source_type: "офіційна інструкція та правила безпеки"
    topic: "Аналіз наказів та заборон у технічному регламенті, де вибір виду визначає критичність дії."
    key_elements: ["категоричний наказовий спосіб", "заперечні конструкції", "інфінітивні вимоги"]
    motivation: "Розуміння того, як вид дієслова впливає на прагматику тексту в офіційному контексті."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Діалог між менеджером та підлеглим під час планування проекту, де звучать поради та вказівки."
    focus_points: ["Відмінність між одиничним наказом та регулярною вимогою.", "Вживання інфінітива після дієслів 'радити', 'просити'.", "Інтонаційне забарвлення."]
    motivation: "Тренування розпізнавання відтінків ввічливості в розмовному мовленні."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть листа-інструкцію для нового співробітника вашої компанії. Опишіть його щоденні обов'язки та дайте кілька порад щодо адаптації. Використовуйте щонайменше 8 різних конструкцій із наказовим способом та інфінітивом у різних видах."
    requirements:
      - "чітке розрізнення між 'роби' (процес/звичка) та 'зроби' (результат)"
      - "правильне вживання виду після заперечення 'не'"
      - "використання модальних дієслів із відповідним видом інфінітива"
      - "мінімум 250 слів"
    motivation: "Практичне застосування аспектних нюансів у професійній комунікації."
    model_answer: "Лист має бути структурованим. Очікується використання недоконаного виду для повторюваних дій ('щоранку перевіряйте пошту') та доконаного для конкретних завдань ('підготуйте звіт до п'ятниці'). Особливу увагу слід приділити ввічливим формам з інфінітивом ('прошу Вас ознайомитися'). Модельний варіант демонструє доречність вибору виду залежно від мети повідомлення."

content_outline:
  - section: "Вид у наказовому способі: Прохання та Наказ"
    words: 1000
    subsections:
      - "Доконаний вид для конкретної, одноразової дії"
      - "Недоконаний вид для процесу, запрошення або звичної дії"
      - "Прагматика ввічливості: чому 'Сідайте' звучить ввічливіше за 'Сядьте'?"
      - "Експресивні відтінки спонукання в розмовному стилі"
    key_concepts:
      - "спонукальна модальність"
      - "одинична дія"
      - "запрошення до дії"
      - "мовленнєвий етикет"
  - section: "Заперечення в наказовому способі"
    words: 800
    subsections:
      - "Заборона (недоконаний вид): 'не роби цього'"
      - "Застереження (доконаний вид): 'не впади', 'не забудь'"
      - "Різниця між недоцільністю та неможливістю дії"
      - "Аналіз контекстів безпеки та побутових застережень"
    key_concepts:
      - "превентивна функція"
      - "заборона дії"
      - "застереження від небажаного результату"
      - "частка 'не'"
  - section: "Вид інфінітива після модальних та фазових дієслів"
    words: 1200
    subsections:
      - "Фазові дієслова (почати, стати, кінчати) та обов'язковість недоконаного виду"
      - "Модальні дієслова (могти, мусити, треба) у поєднанні з обома видами"
      - "Логіка вибору виду залежно від результативності чи тривалості наміру"
      - "Типові граматичні обмеження в інфінітивних конструкціях"
    key_concepts:
      - "фазовість"
      - "модальність"
      - "інфінітивна сполучуваність"
      - "аспектна парадигма"
  - section: "Інфінітивні конструкції в безособових реченнях"
    words: 1000
    subsections:
      - "Вираження неминучості або неможливості дії через інфінітив"
      - "Вид інфінітива в ролі головного члена речення"
      - "Стилістичне використання інфінітива в лозунгах та закликах"
      - "Порівняльний аналіз із наказовим способом"
    key_concepts:
      - "безособовість"
      - "логічна необхідність"
      - "риторичне запитання"
      - "пунктуація при інфінітиві"

