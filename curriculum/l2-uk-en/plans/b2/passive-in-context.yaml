title: Пасив у контексті — вибір за регістром
content_outline:
- section: Вступ — Регістр і пасив (Introduction — Register and Passive)
  words: 600
  points:
  - 'Дефініція регістру в межах соціолінгвістичної компетенції CEFR B2: офіційність,
    дистанція та соціальний контекст'
  - 'Культурний контекст: Пастка ''канцеляриту'' — радянська спадщина адміністративного
    стилю та боротьба за ''Agency Pass'' (активну суб''єктність)'
  - 'Принцип вибору: чому ''Ми вирішили'' краще за ''Було вирішено'' в сучасній комунікації
    — стратегія уникнення зайвої пасивності'
- section: Система форм за реєстрами (System of Forms by Registers)
  words: 800
  points:
  - 'Матриця відповідності: Юридичний (-но/-то), Науковий (-ся), Літературний (-ний/-тий),
    Розмовний (3-я особа множини)'
  - 'Унікальність форми на -но/-то: орієнтація суто на дію (Action Focus) без можливості
    вживання інструментального орудного відмінка дійової особи'
  - 'Дотримання Державного стандарту §4.3.3.1: вживання односкладних безособових речень
    для досягнення об''єктивності викладу'
- section: Офіційно-діловий та юридичний контексти (Official and Legal Contexts)
  words: 900
  points:
  - 'Специфіка наказів та постанов: чому форма на -но/-то є обов''язковою для юридичної
    сили документа'
  - 'Аналіз типової помилки ''The By-Agent Mistake'': розбір помилкової конструкції
    ''Закон прийнято парламентом'' (калька з англійської) та перехід до ''Парламент
    прийняв закон'''
  - 'Термінологічна база: юридична особа, юридична сила, офіційна заява — вживання
    в пасивних конструкціях'
- section: Науковий та академічний контексти (Scientific and Academic Contexts)
  words: 800
  points:
  - 'Опис методології та експериментів: переваги зворотно-пасивних форм на -ся згідно
    з Держстандартом §4.3.2'
  - 'Дієприкметникові звороти в науковому тексті: баланс між точністю опису об''єкта
    та лаконічністю викладу'
  - 'Практика: трансформація наукового звіту з використанням відповідних пасивних
    маркерів'
- section: Літературний, журналістичний та розмовний контексти (Literary, Journalistic,
    and Colloquial Contexts)
  words: 600
  points:
  - 'Типова помилка: надмірне вживання ''Бути + дієприкметник'' (калька ''was written'')
    — заміна на природні українські активні або безособові форми'
  - 'Розмовний стиль: перевага неозначено-особових речень (3-я особа множини) для
    уникнення сухої формальності'
  - 'Стилістичний нюанс: помилкове вживання ''Я вибачаюся'' як приклад неправильного
    розуміння стану та регістру — перехід до ''Вибачте'' або ''Перепрошую'''
- section: Підсумок та інтегрована практика (Summary and Integrated Practice)
  words: 300
  points:
  - 'Побудова ''Decision Tree Flowchart'': алгоритм вибору між активом та пасивом
    залежно від важливості дійової особи'
  - 'Критерій ''доречності'' (appropriateness): як зміна однієї форми пасиву змінює
    сприйняття тексту від дружньої розповіді до офіційного протоколу'
vocabulary_hints:
  required:
  - регістр (register) — офіційний/неофіційний регістр, зміна регістру, високий регістр;
    ключове поняття для B2
  - контекст (context) — широкий контекст, вирвати з контексту, соціальний контекст;
    частотний маркер ситуативного мовлення
  - доречний (appropriate) — доречне зауваження, цілком доречно, бути доречним; важливий
    для оцінки стилістики
  - офіційний (official) — офіційний стиль, офіційна особа, офіційний документ; маркер
    високого регістру
  - юридичний (legal) — юридична сила, юридична особа, юридичний термін; специфічний
    професійний контекст
  - недоречний (inappropriate) — недоречний жарт, недоречне використання; маркер помилки
    в регістрі
  recommended:
  - канцелярит (bureaucratese) — надмірне використання пасиву та складних конструкцій;
    стилістична помилка
  - стилістика (stylistics) — наука про вибір мовних засобів залежно від мети
  - прагматика (pragmatics) — вивчення мови в контексті її використання
  - мовленнєва компетенція (speech competence) — здатність адекватно використовувати
    мову в різних ситуаціях
  - перепрошую (I beg your pardon) — ввічлива форма замість помилкового 'вибачаюся'
