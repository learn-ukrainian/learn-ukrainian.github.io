module: passive-in-context
level: B2
sequence: 6
version: '1.2'
title: "Пасив у контексті"
subtitle: "Passive Constructions in Context"
focus: grammar
pedagogy: PPP
objectives:
  - "Глибоке розуміння вибору пасивної конструкції відповідно до функціонального стилю мовлення (науковий, офіційний, медійний)."
  - "Уміння синтезувати різні типи пасивних форм у межах одного складного тексту для досягнення стилістичної точності."
  - "Критичне розрізнення відтінків значень між формами на -но/-то, пасивом на -ся та неозначено-особовими конструкціями."
  - "Ефективне виявлення та виправлення граматичних кальок та стилістичних помилок у вживанні пасивного стану."
  - "Аналіз впливу пасивних конструкцій на сприйняття тексту (об'єктивність, дистанційованість, офіційність)."

reading_situations:
  - source_type: "офіційний звіт"
    topic: "Аналіз виконання державних програм розвитку інфраструктури"
    key_elements: ["бюджет (m) затверджено", "роботи (pl) проводяться", "плани (pl) скориговано", "звітність (f) подається"]
    motivation: "Цей текст дозволяє студентам побачити, як пасивні конструкції створюють враження офіційності та об'єктивності, де фокус зміщено з виконавця на сам процес та результат."
  - source_type: "наукова стаття"
    topic: "Дослідження впливу зміни клімату на екосистеми Карпат"
    key_elements: ["дані (pl) було зібрано", "гіпотезу (f) перевірено", "явище (n) спостерігається", "результати (pl) порівнюються"]
    motivation: "Вивчення наукового стилю, де пасив є незамінним інструментом для опису експериментів та природних явищ, незалежно від суб'єкта дії."

listening_situations:
  - media_type: "відео"
    setting: "Випуск новин про проведення міжнародного саміту в Києві"
    focus_points: ["використання форм на -но/-то в офіційних заявах", "неозначено-особові речення при описі заходів безпеки", "акцентування на результатах переговорів"]
    motivation: "Студенти мають навчитися сприймати на слух офіційну інформацію, де пасивні конструкції переважають для підкреслення статусу подій."

writing_tasks:
  - task_type: "пояснювальна записка"
    prompt: "Напишіть офіційну пояснювальну записку керівництву щодо затримки в реалізації проекту, використовуючи пасивні конструкції для коректного опису проблем без прямого звинувачення колег."
    requirements:
      - "мінімум 250 слів"
      - "використати щонайменше 3 форми на -но/-то"
      - "використати щонайменше 2 пасивні конструкції на -ся"
      - "використати щонайменше 2 неозначено-особові речення"
    motivation: "Цей вид завдання вчить студентів професійному етикету та вмінню використовувати граматичні засоби для вирішення складних комунікативних ситуацій."
    model_answer: "Текст повинен містити чіткий опис ситуації: «Проект було розпочато вчасно, проте терміни було змінено через логістичні труднощі. Заходи щодо усунення проблем наразі вживаються. Документацію погоджено з усіма відділами». Важливо продемонструвати баланс між об'єктивністю та відповідальністю."

discussion_topics:
  - context: "Етика використання пасиву в політичній комунікації та медіа"
    questions:
      - "Чи допомагає пасивний стан приховати відповідальність за негативні події («ціни було підвищено», «помилок було припущено»)?"
      - "Який стиль оголошень у публічному просторі здається вам більш дієвим: 'Двері зачиняються' чи 'Просимо зачиняти двері'?"
      - "Чому в сучасних медіа спостерігається тенденція до повернення до активного стану там, де раніше панував пасив?"
    motivation: "Розвиток критичного мислення та розуміння маніпулятивного потенціалу граматичних конструкцій."

content_outline:
  - section: "Пасивні конструкції в сучасному українському дискурсі"
    words: 800
    subsections:
      - "Система пасивних значень: від результативності до тривалості"
      - "Концепція 'прихованого суб'єкта' в різних типах дискурсу"
      - "Порівняльний аналіз: пасив в українській мові проти англійського Passive Voice"
    key_concepts:
      - "дискурс"
      - "результативність"
      - "суб'єктна перспектива"
  - section: "Стилістичні нюанси вживання форм на -но, -то"
    words: 800
    subsections:
      - "Історичний контекст та унікальність українських безособових форм на -но, -то"
      - "Функціонування в офіційно-діловому стилі: акцент на завершеності дії"
      - "Типові помилки: неправильне узгодження та вживання з логічним суб'єктом в орудному відмінку"
    key_concepts:
      - "безособовість"
      - "офіційний стиль"
      - "завершеність"
  - section: "Безособові конструкції та неозначено-особові речення"
    words: 800
    subsections:
      - "Роль 3-ї особи множини як функціонального замінника пасиву"
      - "Диференціація значень: коли ми не знаємо виконавця vs коли він неважливий"
      - "Природність неозначено-особових речень у розмовному та публіцистичному стилях"
    key_concepts:
      - "неозначено-особове речення"
      - "комунікативна стратегія"
  - section: "Пасив на -ся: межі використання та ризики штучності"
    words: 800
    subsections:
      - "Вживання дієслів на -ся для опису регулярних процесів"
      - "Проблема калькування: як розпізнати неприродний 'канцелярський' пасив"
      - "Заміна конструкцій на -ся активними зворотами для підвищення динамічності тексту"
    key_concepts:
      - "канцеляризм"
      - "процесуальність"
      - "динаміка тексту"
  - section: "Практикум: трансформація та редагування складних текстів"
    words: 800
    subsections:
      - "Алгоритм перетворення пасивних конструкцій на активні без втрати змісту"
      - "Аналіз тексту-зразка: комбінування різних форм пасиву для досягнення стилістичного ефекту"
      - "Кейс-стаді: редагування корпоративного звіту або наукової анотації"
    key_concepts:
      - "стилістичне редагування"
      - "трансформація"

word_target: 4000

vocabulary:
  required:
    - передбачається
    - здійснюється
    - погоджено
    - враховано
    - забезпечено
    - зафіксовано
    - опрацьовано
    - вжито заходів
  recommended:
    - регламентація
    - інцидент
    - відповідність
    - прозорість
    - підзвітність

activities:
  types_required:
    - error-correction
    - select
    - fill-in
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 25

connects_to:
  previous: "third-person-plural-passive"
  next: "active-participles-present"

