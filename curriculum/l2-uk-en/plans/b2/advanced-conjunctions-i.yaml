title: 'Складні Сполучники I: Причина та Допуск'
subtitle: Advanced Conjunctions I - Causal and Concessive
content_outline:
- section: Вступ та причинові зв'язки в мовленні (Introduction and Causal Connections
    in Speech)
  words: 600
  points:
  - 'Огляд причинових сполучників через призму юридичного аналітика: розмежування
    письмового звіту та усного виступу в суді'
  - Стилістичні відтінки 'бо' (розмовний/усний), 'тому що' (нейтральний) та 'оскільки'
    (офіційний/аналітичний)
  - 'Культурний контекст: як вибір сполучника змінює сприйняття аргументації в публіцистичному
    стилі'
- section: Поглиблений аналіз причинових сполучників (Deep Analysis of Causal Conjunctions)
  words: 950
  points:
  - 'Аналіз складних конструкцій: ''через те що'', ''у зв''язку з тим що'' — правила
    написання (завжди окремо, без російського впливу ''томущо'')'
  - 'Корекція типових помилок: заборона вживання ''дякуючи'' (thanks to) для негативних
    причин та заміна на ''через'''
  - 'Викорінення русизму ''із-за'': розрізнення просторового ''з-за'' та причинового
    ''через'' (Standard §4.3.4.4)'
  - 'Специфіка ''оскільки'': використання сполучника на початку речення для обґрунтування
    тези (Since X, then Y)'
- section: Допустові конструкції та культурний код (Concessive Constructions and Cultural
    Code)
  words: 950
  points:
  - 'Презентація сполучників допусту: ''хоча'', ''незважаючи на те що'', ''попри те
    що'', ''дарма що'' (Standard §4.3.4.6)'
  - 'Літературний якір: Аналіз поезії Івана Франка ''Каменярі'' (''Хоч не одного там
    калічили ті скали...'') як символу української витривалості'
  - 'Стилістична диференціація: сучасний енергійний ''попри'' vs класичний важкий
    ''незважаючи на'''
  - Нюанси вживання 'дарма що' в художньо-публіцистичних текстах для підсилення контрасту
- section: Юридична логіка та пунктуація (Legal Logic and Punctuation)
  words: 750
  points:
  - 'Пунктуаційна пастка: позиція коми в ''тому що'' (нейтральна ''..., тому що''
    vs смислове виділення причини ''..., тому, що'')'
  - 'Логічна побудова аргументу юридичного аналітика: поєднання допусту та причини
    в одному складному реченні'
  - 'Пунктуація при сполучнику ''попри'': випадки, коли кома не ставиться (прийменниковий
    вжиток)'
- section: Практикум та синтез (Practicum and Synthesis)
  words: 750
  points:
  - Написання аргументативного параграфа 'Незважаючи на труднощі...' з використанням
    вивчених сполучників та академічних понять
  - 'Вправа на редагування: заміна просторічних сполучників на офіційні аналогії в
    юридичному тексті'
  - Фінальна перевірка на типові помилки (правопис 'тому що', 'через те що' та вживання
    'через' замість 'із-за')
focus: grammar
pedagogy: Grammar
objectives:
- Учень може будувати складні причинно-наслідкові ланцюжки, використовуючи різноманітні
  сполучники
- Учень вміє висловлювати допуск та протиставлення в офіційному та публіцистичному
  стилях
- Учень розуміє стилістичні відтінки між бо, тому що та оскільки
grammar:
- Causal conjunctions (тому що vs оскільки)
- Concessive conjunctions (хоча vs незважаючи на)
immersion: 100
register: публіцистичний
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - 'тому що (because) — нейтральний; collocations: саме тому що, основна причина
    тому що; правопис: окремо'
  - 'оскільки (since) — офіційний/аналітичний; часто вживається на початку речення;
    collocations: оскільки закон вимагає'
  - бо (because) — розмовний; вживається в усному мовленні та діалогах
  - через (due to/because of) — нормативний замінник помилкових 'із-за' та 'дякуючи'
    (для негативних причин)
  - 'термін (term) — academic; collocations: юридичний термін, визначення терміна,
    термін дії'
  - 'поняття (concept) — academic; collocations: базове поняття, підміняти поняття,
    розширити поняття'
  recommended:
  - 'незважаючи на (despite) — класичний, офіційний регістр; collocations: незважаючи
    на обставини, незважаючи на закон'
  - 'попри (in spite of) — сучасний, енергійний; collocations: попри все, попри заборону,
    попри очікування'
  - 'дарма що (even though) — літературний відтінок; collocations: дарма що молодий,
    дарма що пізно'
  - 'аналіз (analysis) — collocations: детальний аналіз, проводити аналіз'
  - 'процес (process) — collocations: тривалий процес, законодавчий процес'
