module: b2-064
level: B2
sequence: 64
slug: advanced-conjunctions-i
version: 1.1.2
title: 'Поглиблене вивчення сполучників: Сурядність'
subtitle: 'Складні сполучники I: сурядність'
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Систематизувати знання про типи сурядних сполучників (єднальні, протиставні, 
  розділові).
- Дослідити семантичні та стилістичні нюанси використання парних та повторюваних
  сполучників.
- Опанувати складні випадки пунктуації у складносурядних реченнях та при 
  однорідних членах.
- Навчитися використовувати сполучники як засіб посилення експресивності та 
  логічності тексту.
reading_situations:
- source_type: аналітична стаття
  topic: Аналіз глобалізаційних процесів та їхнього впливу на національну 
    ідентичність.
  key_elements:
  - парні сполучники
  - градація
  - протиставлення
  motivation: Текст містить складні логічні ланцюжки, побудовані за допомогою 
    сполучників 'не тільки..., а й', 'не стільки..., скільки'.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть роздум на тему 'Чи може штучний інтелект замінити творчість 
    людини?'. Використовуйте сурядні сполучники для збалансованого представлення
    різних поглядів.
  requirements:
  - використати мінімум 5 різних типів сурядних сполучників
  - правильно розставити розділові знаки у реченнях із повторюваними 
    сполучниками
  - обсяг — від 250 слів
  motivation: Завдання спонукає до структурування аргументів через 
    протиставлення та поєднання фактів.
  model_answer: Текст має бути структурованим, з чіткими тезами. Очікується 
    використання конструкцій на зразок 'З одного боку, ШІ опрацьовує гігабайти 
    даних, проте, з іншого боку, йому бракує емоційної глибини'. Мають бути 
    присутні парні сполучники градації ('не лише..., а й') та розділові 
    сполучники для опису альтернатив ('або..., або').
listening_situations:
- media_type: лекція
  setting: Фрагмент лекції з логіки про побудову складних аргументів.
  focus_points:
  - розпізнавання сурядних сполучників у потоці мовлення
  - інтонаційне оформлення протиставлення та градації
  motivation: Тренування сприйняття логічних зв'язків у складному академічному 
    мовленні на слух.
content_outline:
- section: Функціональна класифікація сурядних сполучників
  words: 1000
  subsections:
  - 'Єднальні сполучники: семантичне розширення та засоби зв''язку'
  - 'Протиставні сполучники: відтінки контрасту та допустовості'
  - 'Розділові сполучники: вибір, чергування та непевність'
  key_concepts:
  - сурядність
  - єднальні відношення
  - семантика контрасту
  - альтернативність
- section: Специфіка парних та повторюваних сполучників
  words: 1000
  subsections:
  - Структурна симетрія у реченнях із парними сполучниками
  - Градаційні сполучники та їхня роль у створенні риторичного ефекту
  - Стилістичні помилки при використанні складених сполучників
  key_concepts:
  - парні сполучники
  - градація
  - симетрія
  - стилістична норма
- section: Пунктуаційна система сурядного зв'язку
  words: 1000
  subsections:
  - 'Кома в складносурядному реченні: коли вона не ставиться (спільний член речення)'
  - 'Розділові знаки при повторюваних сполучниках: логіка пауз та наголосів'
  - Вживання тире та крапки з комою для посилення змістових відношень
  key_concepts:
  - пунктограма
  - спільний другорядний член
  - інтонація переліку
  - семантична пауза
- section: Стилістика та прагматика сурядних засобів
  words: 1000
  subsections:
  - 'Полісиндетон та асиндетон: художня виразність vs динамізм'
  - Сполучники як маркери офіційного та наукового стилів
  - Трансформація речень із сурядними сполучниками для зміни акцентів
  key_concepts:
  - багатосполучниковість
  - безсполучниковість
  - прагматичний ефект
  - редагування
- section: Підсумок — Summary
  words: 300
  points:
  - "Coordinating conjunctions are classified into copulative (єднальні), adversative
    (протиставні), and disjunctive (розділові). Paired conjunctions like 'не тільки...
    а й' require structural symmetry. Self-check: What is the difference in nuance
    between 'але' and 'проте'? Describe two contrasting ideas using a paired conjunction."
  - "Punctuation in compound sentences generally requires a comma before 'і', unless
    the clauses share a common secondary member (спільний другорядний член). Self-check:
    Why is there no comma in 'Вранці світило сонце і співали пташки'? Transform a
    sentence using polysyndeton (багатосполучниковість) to see how it affects the
    rhetorical pacing."
