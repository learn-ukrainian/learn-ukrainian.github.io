  - діалог
  - трансформація
  - слова автора
  recommended:
  - реферування
  - перцепція
  - модальність
  - джерело
  - контекстуалізація
activities:
  types_required:
  - punctuation-fix
  - error-correction
  - reading
  - essay-response
  - translate
  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: fill-in
  focus: Перетворити пряму мову на непряму (замінити займенники, дієслівні форми, сполучники)
- type: error-correction
  focus: Виправити помилки при трансформації мови (неправильна заміна займенників, часових форм)
- type: cloze
  focus: Заповнити пропуски в тексті, де чергуються пряма та непряма мова
- type: select
  focus: Обрати правильний варіант трансформації прямої мови в непряму
