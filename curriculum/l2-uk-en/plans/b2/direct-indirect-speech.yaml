module: b2-030
level: B2
sequence: 30
slug: direct-indirect-speech
version: 1.2.1
title: 'Пряма та непряма мова: цитування та реферування'
subtitle: 'Пряма й непряма мова: цитування та передача мовлення'
focus: grammar
pedagogy: PPP
phase: B2.1b [Advanced Syntax]
word_target: 4000
objectives:
- Досконало володіти правилами оформлення прямої мови, включаючи різні позиції слів автора.
- Ефективно трансформувати пряму мову в непряму, враховуючи зміни займенників, дієслівних форм та модальності.
- Використовувати невласне пряму мову як стилістичний прийом у художніх та публіцистичних текстах.
- Розуміти принципи академічного цитування та реферування чужих думок без порушення норм плагіату.
- Правильно вживати розділові знаки при діалогах, цитатах та вставних словах, що вказують на джерело інформації.
reading_situations:
- source_type: інтерв'ю в журналі
  topic: Розмова з видатним архітектором про урбаністику майбутнього.
  key_elements:
  - пряма мова з розлогими авторськими коментарями
  - використання лапок та тире для оформлення реплік
  - непряма мова для підсумовування думок спікера
  motivation: Аналіз того, як журналісти поєднують різні способи передачі чужої мови для створення динамічного тексту.
listening_situations:
- media_type: аудіо
  setting: 'Радіорепортаж з місця події: свідчення очевидців.'
  focus_points:
  - Передача емоційного забарвлення при цитуванні в усному мовленні.
  - Використання вставних слів для посилання на джерело (за словами..., як зазначив...).
  - Трансформація вигуків та спонукань при переході від прямої до непрямої мови.
  motivation: Розвиток навичок точного відтворення чужих слів у власному переказі.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть статтю про вигадану конференцію, присвячену штучному інтелекту. Обов'язково включіть у текст пряму мову
    спікерів, діалог між учасниками та непряму мову для узагальнення результатів.
  requirements:
  - мінімум 300 слів
  - використати всі можливі позиції слів автора відносно прямої мови
  - продемонструвати трансформацію одного складного висловлювання з прямої мови в непряму
  - правильно оформити цитату з використанням трикрапки на місці пропуску
  motivation: Практичне відпрацювання синтаксису прямої та непрямої мови в професійному контексті.
  model_answer: Текст має бути структурованим, з чітким розрізненням авторського голосу та голосів запрошених експертів.
discussion_topics:
- context: 'Цитування в епоху соціальних мереж: чи обов''язково завжди бути точним?'
  questions:
  - Як змінюється зміст висловлювання при його переказі непрямою мовою?
  - Що таке 'цитата, вирвана з контексту' і як цьому запобігти?
  - Які дієслова, крім 'сказати', ви використовуєте для введення прямої мови (наприклад, зауважити, підкреслити, заперечити)?
  motivation: Обговорення етичних та лінгвістичних аспектів передачі інформації.
content_outline:
- section: 'Пряма мова: структура та пунктуація'
  words: 1000
  subsections:
  - Слова автора перед, всередині та після прямої мови
  - Пунктуація при розриві прямої мови словами автора (коми, тире, крапки)
  - 'Оформлення діалогу: тире та абзацний відступ'
  - Особливості вживання знаків оклику та питання у прямій мові
  key_concepts:
  - пряма мова
  - слова автора
  - діалог
- section: Трансформація у непряму мову
  words: 1000
  subsections:
  - Заміна особових та присвійних займенників
  - Узгодження часів та способу дієслів (наказовий спосіб -> підрядне речення з 'щоб')
  - Використання сполучників 'що', 'ніби', 'мов' для передачі чужої думки
  - Передача питань непрямою мовою (непряме питання)
  key_concepts:
  - непряма мова
  - трансформація
  - непряме питання
- section: Цитати та академічне реферування
  words: 1000
  subsections:
  - 'Способи введення цитат у текст: як частина речення або самостійна одиниця'
  - Використання трикрапки для позначення скорочень у цитатах
  - Посилання на джерела через вставні конструкції та дужки
  - Реферування як засіб узагальнення великих обсягів інформації
  key_concepts:
  - цитування
  - реферування
  - академічна доброчесність
- section: Невласне пряма мова та стилістичні нюанси
  words: 1000
  subsections:
  - Поняття про невласне пряму мову як злиття авторського та персонажного голосів
  - Стилістичні функції внутрішнього монологу
  - 'Дієслова мовлення та мислення: розширення словникового запасу'
  - 'Аналіз помилок: змішування прямої та непрямої мови в одному реченні'
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
