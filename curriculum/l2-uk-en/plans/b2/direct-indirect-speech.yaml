module: b2-23
level: B2
sequence: 23
slug: direct-indirect-speech
version: '2.0'
title: Пряма й непряма мова
subtitle: 'Direct and Indirect Speech, Quotation, Transformation'
content_outline:
- section: 'Вступ: Способи передачі чужого мовлення (Introduction: Ways of Conveying
    Reported Speech)'
  words: 500
  points:
  - 'Визначення прямої та непрямої мови згідно з Держстандартом §4.3.4: два основних
    способи передачі чужого висловлювання у тексті'
  - 'Третій спосіб — цитування: дослівне відтворення частини тексту з посиланням на автора
    як основа наукового та публіцистичного стилів'
  - 'Стилістична роль: вибір між прямою та непрямою мовою як інструмент створення ефекту
    живого діалогу або об''єктивного переказу'
- section: Пряма мова та діалог (Direct Speech and Dialogue)
  words: 800
  points:
  - 'Структура прямої мови: слова автора + пряма мова; чотири позиційні моделі (пряма
    мова перед словами автора, після них, розривається словами автора, слова автора всередині)'
  - 'Пунктуація прямої мови: лапки, тире, кома, крапка — залежно від позиції слів автора
    та прямої мови'
  - 'Оформлення діалогу: тире на початку кожної репліки; правила оформлення слів автора
    між репліками'
  - 'Типова помилка: змішування правил прямої мови та діалогу — лапки у діалозі не вживаються'
- section: 'Непряма мова: трансформація (Indirect Speech: Transformation)'
  words: 900
  points:
  - 'Механіка перетворення: заміна прямої мови підрядним реченням зі сполучниками «що»,
    «щоб», «чи», «наче», «ніби»'
  - 'Зміна займенників та дієслівних форм: перша особа → третя особа; зміна вказівних
    займенників (цей → той, тут → там)'
  - 'Збереження модальності: наказовий спосіб → «щоб» + минулий час (напр., «Іди!» →
    «Він сказав, щоб я йшов»); питальна інтонація → «чи» (напр., «Ти підеш?» → «Він
    запитав, чи я піду»)'
  - 'Проблема звертань та вигуків: їх втрата при переході до непрямої мови та компенсація
    описовими конструкціями (напр., «Друже!» → «Він звернувся до нього як до друга»)'
- section: Цитування та оформлення (Quotation and Formatting)
  words: 800
  points:
  - 'Повне цитування: дослівне відтворення тексту в лапках з посиланням на джерело (напр.,
    «Як зазначив Франко: "Кожний є сином свого народу"»)'
  - 'Часткове цитування: включення окремих слів або фраз автора в текст (напр., «Шевченко
    вважав це "святим обов''язком"»)'
  - 'Цитування у науковому стилі: правила оформлення посилань, виносок та епіграфів'
  - 'Типові помилки: неправильне використання лапок при переказі (лапки лише для дослівного
    відтворення), пропуск посилання на автора'
- section: Практика та виправлення помилок (Practice and Error Correction)
  words: 1000
  points:
  - 'Комплексний практикум трансформації: перетворення прямої мови на непряму та навпаки
    з урахуванням усіх граматичних змін'
  - 'Пунктуаційний практикум: розстановка розділових знаків у текстах із прямою мовою,
    діалогами та цитатами'
  - 'Стилістичний аналіз: порівняння ефекту прямої та непрямої мови у художніх та публіцистичних
    текстах'
  - 'Редагування тексту: виправлення помилок у оформленні прямої мови, діалогу та цитування
    в автентичних текстах'
  - 'Підготовка до модуля b2-24: узагальнення синтаксичних знань для контрольної точки'
focus: grammar
pedagogy: TTT
prerequisites:
- b2-22 (Complex Syntax Ellipsis Parcelling)
connects_to:
- b2-24 (Checkpoint Syntax)
objectives:
- Learner can correctly punctuate direct speech in all four positional models
- Learner can transform direct speech into indirect speech with all necessary grammatical
  changes
- Learner can format quotations according to Ukrainian academic standards
- Learner can distinguish and apply rules for dialogue, direct speech, and quotation
grammar:
- Пряма мова (чотири позиційні моделі)
- Непряма мова (трансформація зі сполучниками що, щоб, чи)
- Цитування (повне та часткове)
- Діалог (оформлення тире)
register: науковий
phase: B2.2 [Syntax Mastery]
vocabulary_hints:
  required:
  - пряма мова (direct speech) — дослівне відтворення чужого висловлювання зі збереженням
    форми
  - непряма мова (indirect speech) — переказ чужого висловлювання у формі підрядного
    речення
  - цитування (quotation) — дослівне відтворення частини тексту з посиланням на автора
  - слова автора (author's words) — частина конструкції, що вказує на мовця
  - діалог (dialogue) — форма мовлення, що складається з реплік співрозмовників
  - лапки (quotation marks) — розділовий знак для оформлення прямої мови та цитат
  - трансформація (transformation) — перетворення прямої мови на непряму та навпаки
  - підрядне з'ясувальне (object clause) — підрядне речення, що заміщує пряму мову в
    непрямій
  recommended:
  - репліка (line of dialogue) — окреме висловлювання учасника діалогу
  - посилання (reference) — вказівка на джерело цитати
  - модальність (modality) — вираження ставлення мовця до висловлюваного
  - переказ (retelling) — передача змісту чужого мовлення своїми словами
  - звертання (form of address) — слово або сполука, що називає адресата мовлення
