module: b2-004
level: B2
sequence: 4
slug: dim-zhytlo
version: '1.0'
title: "Дім і житло: оренда, ремонт, сусідство"
subtitle: "Дім і житло: оренда, ремонт, сусідство"
focus: thematic
pedagogy: TTT
word_target: 4000
phase: "B2.0 [Passive Voice System]"
objectives:
  - "Вести розгорнуту розмову про пошук, оренду та облаштування житла українською мовою."
  - "Описувати планування квартири, меблі, стан приміщення та комунальні питання."
  - "Складати оголошення про здавання/пошук житла та вести переговори з орендодавцем."
  - "Інтегрувати граматику пасивного стану (форми на -но, -то) для опису стану приміщення
    (ремонт зроблено, стіни пофарбовано)."

reading_situations:
  - source_type: "оголошення на сайті нерухомості"
    topic: "Добірка оголошень про оренду квартир у Києві та Львові з описом стану,
      меблів та умов."
    key_elements: ["термінологія нерухомості", "скорочення в оголошеннях", "цінова
          лексика"]
    motivation: "Практика розуміння реальних текстів ринку житла."

listening_situations:
  - media_type: "відео"
    setting: "Розмова між орендарем та власником квартири: обговорення умов проживання,
      стану ремонту та комунальних платежів."
    focus_points: ["побутова лексика", "формули ввічливого прохання", "опис проблем
          із житлом"]
    motivation: "Розвиток навичок розуміння побутового діалогу про житло."

writing_tasks:
  - task_type: "оголошення"
    prompt: "Напишіть оголошення про здавання квартири та лист-відповідь потенційного
      орендаря з уточнюючими запитаннями."
    requirements:
      - "опис квартири: площа, поверх, район, стан ремонту"
      - "використання пасивних форм (відремонтовано, вмебльовано)"
      - "мінімум 250 слів загалом"
    motivation: "Практика письмового ділового спілкування в побутовій сфері."
    model_answer: "Оголошення має містити конкретні деталі: 'Здається 2-кімнатна квартира
      на 5 поверсі, район Оболонь. Нещодавно зроблено ремонт, меблі включено. Комунальні
      послуги — окремо.' Лист-відповідь із запитаннями про тварин, інтернет, строк оренди."

discussion_topics:
  - context: "Проблема доступного житла в українських містах після 2022 року."
    questions:
      - "Чому ціни на оренду в Києві та Львові зросли після початку повномасштабного
        вторгнення?"
      - "Які переваги та недоліки оренди порівняно з купівлею житла?"
    motivation: "Обговорення актуальної соціальної теми з використанням тематичної лексики."

dialogue_situations:
  - setting: "Орендар телефонує власнику квартири, щоб повідомити про проблему з
      опаленням."
    roles: ["орендар", "власник"]
    key_phrases: ["у нас не працює опалення", "коли зможете прислати майстра?",
      "комунальні вже оплачено"]
  - setting: "Сусіди обговорюють ремонт у під'їзді та розподіл витрат."
    roles: ["мешканець 1", "мешканець 2"]
    key_phrases: ["треба скинутися на ремонт", "стіни вже пофарбовано", "хто
      відповідає за прибирання?"]

content_outline:
  - section: "Пошук і вибір житла"
    words: 1000
    subsections:
      - "Типи житла в Україні: квартира, будинок, гуртожиток, хостел"
      - "Оголошення на сайтах нерухомості: як читати та складати"
      - "Критерії вибору: район, транспортна розв'язка, інфраструктура"
      - "Словотвір: однокімнатна, двоповерховий, новобудова"
    key_concepts:
      - "нерухомість"
      - "оренда"
      - "інфраструктура"
  - section: "Облаштування та ремонт"
    words: 1000
    subsections:
      - "Кімнати, меблі та побутова техніка: розширений словник"
      - "Опис стану приміщення з пасивними формами (стіни пофарбовано, підлогу
        замінено)"
      - "Ремонт: матеріали, етапи, майстри"
      - "Стилі інтер'єру та смаки: обговорення вподобань"
    key_concepts:
      - "облаштування"
      - "ремонт"
      - "інтер'єр"
  - section: "Комунальні послуги та побутові проблеми"
    words: 1000
    subsections:
      - "Комунальні платежі: електрика, вода, газ, опалення, інтернет"
      - "Повідомлення про проблему: протікання, поломка, відключення"
      - "Виклик майстра та обговорення ремонтних робіт"
      - "Розподіл витрат між мешканцями багатоквартирного будинку"
    key_concepts:
      - "комунальні послуги"
      - "аварійна ситуація"
      - "обслуговування"
  - section: "Сусідство та спільне проживання"
    words: 1000
    subsections:
      - "Сусідські відносини: від привітання до конфлікту"
      - "Правила спільного проживання: шум, тварини, паркування"
      - "ОСББ та управління будинком: хто за що відповідає"
      - "Культура сусідства в Україні: порівняння міста та села"
    key_concepts:
      - "сусідство"
      - "ОСББ"
      - "спільне проживання"

vocabulary_hints:
  - word: "житло"
    translation: "housing, dwelling"
    context: "Пошук доступного житла — головна проблема молоді."
  - word: "оренда"
    translation: "rent, lease"
    context: "Оренда однокімнатної квартири в центрі коштує дорого."
  - word: "орендодавець"
    translation: "landlord"
    context: "Орендодавець має право перевіряти стан квартири."
  - word: "комунальний"
    translation: "communal, utility (adj)"
    context: "Комунальні платежі зростають щороку."
  - word: "ремонт"
    translation: "renovation, repair"
    context: "У квартирі нещодавно зроблено ремонт."
  - word: "меблі"
    translation: "furniture"
    context: "Квартира здається з меблями."
  - word: "сусід"
    translation: "neighbor"
    context: "Наші сусіди завжди допомагають."
  - word: "опалення"
    translation: "heating"
    context: "Центральне опалення вмикають у жовтні."
  - word: "новобудова"
    translation: "new building"
    context: "Вони купили квартиру в новобудові."
  - word: "гуртожиток"
    translation: "dormitory"
    context: "Студенти живуть у гуртожитку."
  - word: "під'їзд"
    translation: "stairwell, building entrance"
    context: "У нашому під'їзді чисто."
  - word: "поверх"
    translation: "floor, story"
    context: "Ми живемо на сьомому поверсі."
  - word: "площа"
    translation: "area (sq. meters)"
    context: "Площа квартири — шістдесят квадратних метрів."
  - word: "протікання"
    translation: "leak"
    context: "На кухні протікання — треба викликати сантехніка."
  - word: "забудовник"
    translation: "developer (construction)"
    context: "Забудовник обіцяє здати будинок до кінця року."
  - word: "інфраструктура"
    translation: "infrastructure"
    context: "У цьому районі розвинена інфраструктура."
  - word: "квитанція"
    translation: "receipt, utility bill"
    context: "Квитанції за комунальні послуги приходять щомісяця."
  - word: "облаштування"
    translation: "arrangement, furnishing"
    context: "Облаштування нової квартири забрало місяць."

activities:
  types_required:
    - fill-in
    - error-correction
    - select
    - reading
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: essay-response
    focus: "Вставити правильні пасивні форми для опису стану житла (пофарбовано,
      замінено, відремонтовано)"
  - type: error-correction
    focus: "Виправити помилки в оголошенні про оренду (русизми, неправильні відмінкові
      форми)"
  - type: select
    focus: "Обрати доречний варіант для побутової ситуації (скарга, прохання, опис)"
  - type: comparative-study
    focus: "Зіставити тип приміщення з його описом та характеристиками"

references:
  - source: "Заболотний, 9 клас (2017)"
    pages: "Лексика — побутова тематика"
    topic: "Побутова лексика, опис житла"
  - source: "Глазова, 11 клас (2019)"
    pages: "§21–25"
    topic: "Синтаксична норма в побутовому контексті"
  - source: "Державний стандарт 2024"
    pages: "SS 3 (B2 thematic areas: побут, житло)"
    topic: "Тематична сфера: побут і житло"

connects_to:
  previous: "b2-impersonal-passive"
  next: "reflexive-passive"
prerequisites:
