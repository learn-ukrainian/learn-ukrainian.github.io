module: b2-052
level: B2
sequence: 52
slug: word-formation-adjective-formation
version: '1.0'
title: "Словотвір: Творення прикметників"
subtitle: "Word Formation: Adjective Formation"
focus: vocabulary
pedagogy: PPP
word_target: 4000
objectives:
  - "Засвоїти найпродуктивніші суфікси для творення відіменникових прикметників (-н-, -ов-, -ев-, -ів-)."
  - "Опанувати творення прикметників від географічних назв за допомогою суфікса -ськ(ий) та пов'язані з цим фонетичні зміни."
  - "Вивчити суфікси, що надають прикметникам додаткових значень: -лив- (схильність), -ист- (насиченість), -ат- (зовнішня ознака)."
  - "Розуміти різницю між якісними та відносними прикметниками через їхній словотвірний потенціал."
  - "Дотримуватися правил правопису прикметникових суфіксів (м'який знак, апостроф, подвоєння)."

reading_situations:
  - source_type: "опис туристичного маршруту"
    topic: "Аналіз тексту, що описує природні ландшафти та історичні пам'ятки регіону, з великою кількістю прикметників (гірський, тернопільський, мальовничий, каменистий)."
    key_elements: ["відносні прикметники", "географічні назви", "описова лексика"]
    motivation: "Розуміння того, як прикметники створюють образність та точність опису."

listening_situations:
  - media_type: "подкаст"
    setting: "Розповідь про характер людини або опис культурних особливостей різних народів."
    focus_points: ["Виявлення прикметників на -лив- та -ист-.", "Сприйняття правильної вимови суфіксів -ськ-, -цьк-.", "Розуміння ступеня вираження ознаки."],
    motivation: "Тренування розпізнавання відтінків значень прикметників у розмовному потоці."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть відгук про відвідування нового ресторану або готелю. Опишіть інтер'єр, атмосферу та обслуговування. Використовуйте щонайменше 20 прикметників, утворених різними способами (включаючи прикметники від власних назв)."
    requirements:
      - "використання суфіксів -ов-, -ев-, -ськ-, -лив-"
      - "правильне чергування приголосних при творенні прикметників (Прага -> празький)"
      - "багата синоніміка"
      - "мінімум 250 слів"
    motivation: "Розвиток навичок деталізованого та емоційно забарвленого опису."
    model_answer: "Текст має бути переконливим та яскравим. Очікуються форми: 'затишний', 'французький', 'вишуканий', 'привітний'. Слід звернути увагу на правопис -ськ-, -цьк-. Модельний варіант демонструє влучне використання епітетів."

discussion_topics:
  - context: "Як прикметники впливають на наше сприйняття реальності?"
    questions:
      - "Чи змінюється ваше ставлення до предмета, якщо назвати його 'металевим' замість 'сталевим'?"
      - "Які прикметники найчастіше використовуються в рекламі для маніпуляції емоціями?"
      - "Чому творення прикметників від назв українських міст іноді викликає труднощі (наприклад, Кременчук -> кременчуцький)?"
    motivation: "Обговорення лінгвістичної точності та стилістики."

content_outline:
  - section: "Відіменникові прикметники: -н-, -ов-, -ев-"
    words: 1000
    subsections:
      - "Суфікс -н- як універсальний засіб: ліс -> лісовий, день -> денний (подвоєння)"
      - "Вибір між -ов- та -ев-/-єв- залежно від кінцевого приголосного основи"
      - "Творення прикметників від основ іменників з чергуванням [і] з [о], [е]"
      - "Прикметники на позначення матеріалу та належності"
    key_concepts:
      - "відіменниковий прикметник"
      - "основа"
      - "подвоєння"
      - "чергування"
  - section: "Суфікси -ськ(ий), -цьк(ий), -зьк(ий)"
    words: 1000
    subsections:
      - "Творення прикметників від географічних та власних назв"
      - "Фонетичні зміни: г, ж, з + ськ -> зьк; к, ч, ц + ськ -> цьк; х, ш, с + ськ -> ськ"
      - "Винятки та особливості правопису (баскський, казахський)"
      - "Вживання м'якого знака в суфіксах"
    key_concepts:
      - "прикметник від власної назви"
      - "фонетична трансформація"
      - "правописна норма"
      - "географічна назва"
  - section: "Суфікси ознак та властивостей: -лив-, -ист-, -ат-"
    words: 1000
    subsections:
      - "Суфікс -лив- для позначення схильності до дії (дбайливий, мінливий)"
      - "Суфікс -ист- для позначення зовнішньої подоби або насиченості (голосистий, барвистий)"
      - "Суфікс -ат- (-ят-) для опису фізичних особливостей (крилатий, вусатий)"
      - "Емоційно-експресивні суфікси -еньк-, -есеньк-, -ущ-"
    key_concepts:
      - "характеристика"
      - "семантичний відтінок"
      - "експресивність"
      - "ступінь ознаки"
  - section: "Якісні та відносні прикметники: Словотвірний аспект"
    words: 1000
    subsections:
      - "Здатність якісних прикметників утворювати ступені порівняння та прислівники"
      - "Творення абстрактних іменників від якісних прикметників"
      - "Перехід відносних прикметників у якісні (золоте серце, залізна воля)"
      - "Специфіка відмінювання прикметників різних груп"
    key_concepts:
      - "якісний прикметник"
      - "відносний прикметник"
      - "метафоризація"
      - "словотвірне гніздо"

vocabulary:
  required:
    - прикметник
    - відносний
    - якісний
    - суфікс
    - чергування
    - ознака
    - властивість
    - приналежність
  recommended:
    - мальовничий
    - вражаючий
    - вишуканий
    - сучасний
    - традиційний
    - дбайливий
    - майстерний
    - влучний

activities:
  types_required:
    - match-up
    - fill-in
    - highlight-morphemes
    - select
  min_items_per_type: 10
  total_min_items: 40

