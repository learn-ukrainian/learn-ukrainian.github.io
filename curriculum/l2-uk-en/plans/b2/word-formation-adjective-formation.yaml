module: b2-052
level: B2
sequence: 52
slug: word-formation-adjective-formation
version: '3.0'
title: 'Словотворення: прикметники'
subtitle: Творення прикметників від іменників та складні прикметники
focus: grammar
pedagogy: TTT
phase: B2.5
word_target: 4300
objectives:
- Learner can form adjectives from nouns using Ukrainian suffixes
- Learner can distinguish between -ський/-цький and -ний/-альний patterns
- Learner can form and use compound adjectives correctly
- Learner can recognize word formation patterns in authentic texts
content_outline:
- section: 'Вступ: Культурний код прикметника «київський» (Introduction: The Cultural Code of the ''Kyiv'' Adjective)'
  words: 700
  points:
  - 'Роль слова київський як маркера ідентичності: від історичного контексту (Київська Русь) до гастрономічних символів (Київський
    торт)'
  - 'Дизайнерський підхід до словотворення: як назви тканин та регіонів формують професійний словник (львівський льон, волинська
    вишивка)'
  - 'Обговорення ролі прикметників у створенні образів: використання епітетів для опису колекції одягу'
- section: 'Суфікси -ський та -цький: приналежність та походження (Suffixes -skyi and -tskyi: Belonging and Origin)'
  words: 900
  points:
  - 'Правила творення від географічних назв та іменників: Україна → український, місто → міський, село → сільський'
  - 'Фонетичні мутації: детальне пояснення переходу к → цьк на прикладі козак → козацький та студент → студентський'
  - 'Типова помилка: аналіз та виправлення вживання неправильних суфіксів (чому не можна казати «студентний» замість студентський)'
  - 'Стійкі колокації у повсякденному та офіційному вжитку: студентський квиток, батьківський комітет, міська рада'
- section: 'Суфікси -ний та -альний: якість та професійне відношення (Suffixes -nyi and -alnyi: Quality and Professional Relation)'
  words: 800
  points:
  - 'Творення прикметників від іменників якості згідно з Держстандартом (§4.2.9): осінь → осінній, нація → національний'
  - 'Семантична диференціація: розмежування значень музичний (інструмент) та музикальний (слух), професійний та фаховий'
  - 'Використання суфікса -альн- у термінології: центральний вхід, національний університет, персональний стиль'
  - 'Практика адаптації іншомовних основ: процес → процесуальний, структура → структурний'
- section: 'Складні прикметники: кольори, числівники та фольклор (Compound Adjectives: Colors, Numerals, and Folklore)'
  words: 1000
  points:
  - 'Орфографія кольорів та відтінків: правило дефіса для синьо-жовтий (прапор) як зв''язок граматики з національною символікою'
  - 'Розмежування складних слів: дефіс у відтінках кольорів проти разом написаних понять (жовто-блакитний vs. жовтогарячий)'
  - 'Морфологія фольклорних епітетів: відмінювання прикметників на -лиций (білолиций, круглолиций) та їх поетичне значення'
  - 'Кількісні компоненти у складних словах (§4.1.1.2): творення та вживання структур на кшталт двоярусний, трикутний, п''ятиповерховий'
- section: 'Нерегулярні форми ступенів порівняння (Irregular Comparison Forms)'
  words: 300
  points:
  - 'Суплетивні форми вищого та найвищого ступеня: гарний → кращий → найкращий, поганий → гірший → найгірший, великий → більший
    → найбільший, малий → менший → найменший'
  - 'Двоякі форми порівняння: давніший/старіший, красивіший/гарніший — стилістичні відмінності та регістрова маркованість'
  - 'Нестандартні прикметники без ступенів порівняння: мертвий, сліпий, порожній — семантичні обмеження'
  - 'Найтиповіші помилки: *більш кращий (подвійне порівняння), *самий великий (калька з російської замість найбільший)'
- section: 'Практикум: аналіз текстів та запобігання інтерференції (Workshop: Text Analysis and Interference Prevention)'
  words: 600
  points:
  - 'Аналіз англійської інтерференції (Noun-as-Adjective): чому «бізнес центр» є помилковим і як правильно вживати дефіс або
    прикметникову форму (бізнес-центр, діловий центр)'
  - 'Вправа на візуалізацію: побудова «дерева рішень» для вибору правопису складних прикметників (Колір? Підрядний зв''язок?)'
  - 'Творче завдання: опис модної колекції з використанням усіх вивчених типів прикметників (географічні, складні кольори,
    епітети)'
vocabulary_hints:
  required:
  - київський (Kyivan) — Київська Русь, Київський торт; символ столиці та ідентичності
  - студентський (student's) — студентський квиток, студентський гуртожиток; висока частотність
  - національний (national) — національний університет, національний одяг; офіційний регістр
  - синьо-жовтий (blue-yellow) — синьо-жовтий прапор; приклад написання кольорів через дефіс
  - білолиций (white-faced) — фольклорний епітет; особлива парадигма відмінювання
  - батьківський (parental/father's) — батьківський дім, батьківський комітет
  recommended:
  - батьківський (parental/father's) — батьківський дім, батьківський комітет
  - жовтогарячий (bright orange) — виняток; складне слово, що пишеться разом (суцільне поняття)
  - двоярусний (two-tiered) — складний прикметник з числівником
  - музичний (musical - related to music) — музичний інструмент, музична школа
  - музикальний (musical - talented/melodic) — музикальний слух, музикальна дитина
