module: b2-074
level: B2
sequence: 74
slug: academic-writing
version: '1.1'
title: "Академічне письмо та науковий стиль"
subtitle: "Academic Writing and Scientific Style"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Ознайомитися з основними ознаками та вимогами до академічного письма в Україні."
  - "Навчитися структурувати наукову статтю, тези доповіді або курсову роботу."
  - "Опанувати культуру цитування та оформлення посилань згідно з державними стандартами."
  - "Вивчити типові мовні кліше для формулювання мети, об'єкта, предмета та висновків дослідження."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Сучасні тенденції в українській лінгвістиці: від структурної до когнітивної парадигми."
    key_elements: ["анотація", "ключові слова", "методологічна база", "бібліографія"]
    motivation: "Аналіз структури наукового тексту та термінологічної насиченості."
  - source_type: "рецензія"
    topic: "Відгук на монографію з історії українського права."
    key_elements: ["актуальність теми", "наукова новизна", "критичні зауваження"]
    motivation: "Вивчення етикету наукової дискусії та критики."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть анотацію (150-200 слів) до власного дослідження (реального або вигаданого) українською мовою."
    requirements: ["визначення мети", "короткий опис методів", "основні результати", "науковий стиль"]
    motivation: "Відпрацювання навички лаконічного та точного викладу наукової думки."
    model_answer: "Анотація має містити чітке формулювання проблеми, опис проведеної роботи та головний висновок без зайвих епітетів."

discussion_topics:
  - context: "Академічна доброчесність та виклики цифрової ери"
    questions:
      - "Де проходить межа між парафразою та плагіатом у науковому тексті?"
      - "Чи має українська академічна традиція відрізнятися від англосаксонської моделі?"
    motivation: "Розвиток критичного мислення щодо етичних аспектів наукового письма та його культурної специфіки."

content_outline:
  - section: "Специфіка академічного дискурсу"
    words: 1000
    subsections:
      - "Функціональний науковий стиль: логічність, об'єктивність, точність"
      - "Жанри академічного письма: стаття, тези, реферат, дисертація"
      - "Мовна особистість науковця: етика та відповідальність за слово"
    key_concepts:
      - "науковість"
      - "доказовість"
      - "терміносистема"
      - "академічна доброчесність"
  - section: "Архітектоніка наукового тексту"
    words: 1000
    subsections:
      - "Формулювання теми, мети та завдань дослідження"
      - "Структура IMRAD (Introduction, Methods, Results, and Discussion) в українському контексті"
      - "Логічні переходи між розділами та зв'язність тексту"
    key_concepts:
      - "об'єкт дослідження"
      - "предмет дослідження"
      - "методологія"
      - "гіпотеза"
  - section: "Академічний етикет та цитування"
    words: 1000
    subsections:
      - "Правила оформлення прямих та непрямих цитат"
      - "Уникнення плагіату та важливість посилань на першоджерела"
      - "ДСТУ та APA: особливості оформлення списку літератури в Україні"
    key_concepts:
      - "першоджерело"
      - "парафраза"
      - "бібліографічний опис"
      - "плагіат"
  - section: "Лексико-граматичні особливості наукової мови"
    words: 1000
    subsections:
      - "Використання віддієслівних іменників та термінологічних сполук"
      - "Авторське 'ми' vs безособові конструкції (встановлено, доведено, досліджено)"
      - "Вставні слова для структурування аргументації (по-перше, отже, таким чином)"
    key_concepts:
      - "кліше"
      - "номіналізація"
      - "авторська модальність"
      - "узагальнення"

vocabulary:
  required:
    - дослідження
    - актуальність
    - методологія
    - анотація
    - джерело
    - гіпотеза
    - положення
    - парадигма
  recommended:
    - концептуальний
    - фундаментальний
    - емпіричний
    - систематизація
    - верифікація

activities:
  types_required:
    - error-correction
    - fill-in
    - match-up
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: fill-in
    focus: "Доповнити наукові кліше: 'Метою даного дослідження є...', 'У статті розглянуто...', 'Автор доводить...'."
  - type: error-correction
    focus: "Виправити неакадемічну лексику та стилістичний дисонанс у науковому тексті."
  - type: cloze
    focus: "Заповнити пропуски в академічній анотації (abstract) правильними кліше та термінами."
  - type: match-up
    focus: "Зіставити наукове кліше з його функцією (формулювання мети, опис методів, представлення результатів)."

references:
  - "Глазова О. П. Українська мова. 11 клас (2019), §21-25 — Синтаксична норма, науковий стиль"
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Науковий стиль мовлення"
  - "Ворон А. А. Українська мова. 11 клас (2019) — Академічне красномовство"
  - "State Standard 2024: B2 SS 3 — Professional communication themes"

connects_to:
  previous: "professional-reports-advanced"
  next: "text-analysis"
