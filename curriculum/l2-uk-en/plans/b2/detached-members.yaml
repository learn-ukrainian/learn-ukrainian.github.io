module: b2-017
level: B2
sequence: 17
slug: detached-members
version: '2.0'
title: Відокремлені члени речення
subtitle: 'Detached Members: Attributes, Appositions, Adverbials, Complements, Clarifying'
focus: grammar
pedagogy: TTT
phase: B2.2 [Syntax Mastery]
word_target: 4000
objectives:
- Learner can identify and correctly punctuate five subtypes of detached members
- Learner can distinguish obligatory from optional detachment contexts
- Learner can use detached adverbials (participial phrases) with correct punctuation
- Learner can apply clarifying constructions to add precision to sentences
content_outline:
- section: 'Вступ: Відокремлення як синтаксичне та інтонаційне явище (Introduction: Detachment as a Syntactic and Intonational
    Phenomenon)'
  words: 500
  points:
  - 'Визначення відокремлення згідно з Держстандартом §4.3.2: смислове та інтонаційне виділення другорядних членів речення
    для надання їм більшої самостійності'
  - 'Ознаки відокремлення: комами або тире; наявність інтонації відокремлення (пауза, підвищення тону); додаткове повідомлення'
  - 'Стилістична функція: відокремлення як засіб увиразнення мовлення, деталізації та створення додаткових смислових планів'
- section: Відокремлені означення (Detached Attributes)
  words: 800
  points:
  - 'Відокремлення узгоджених означень після означуваного слова: два або більше означень (напр., «Дерева, вкриті снігом, стояли
    тихо»)'
  - 'Дієприкметникові звороти як відокремлені означення: позиція після означуваного слова (напр., «Студент, який прочитав
    книгу, склав іспит»)'
  - 'Обов''язкове відокремлення при особовому займеннику: «Втомлений і голодний, він повернувся додому» — означення завжди
    відокремлюються'
  - 'Відокремлення означень із додатковим обставинним значенням: причина, допуст (напр., «Засмучена поразкою, вона замовкла»
    — причина засмучення)'
- section: Відокремлені прикладки та додатки (Detached Appositions and Complements)
  words: 800
  points:
  - 'Відокремлені прикладки зі сполучником «як»: «Шевченко, як великий поет, увійшов в історію»'
  - 'Поширені прикладки: відокремлення після означуваного слова (напр., «Київ, столиця України, стоїть на Дніпрі»)'
  - 'Прикладки при власних назвах та займенниках: «Він, студент третього курсу, вже працював» — обов''язкове відокремлення'
  - 'Відокремлені додатки з прийменниками «крім», «замість», «за винятком», «на відміну від»: правила пунктуації та стилістичні
    функції'
- section: Відокремлені обставини (Detached Adverbials)
  words: 800
  points:
  - 'Дієприслівникові звороти: завжди відокремлюються комами незалежно від позиції (напр., «Прочитавши книгу, він задумався»
    та «Він, прочитавши книгу, задумався»)'
  - 'Одиничні дієприслівники: відокремлюються, якщо зберігають значення додаткової дії (напр., «Усміхаючись, вона відповіла»);
    не відокремлюються, якщо набули значення обставини способу дії (напр., «Він працював стоячи»)'
  - 'Обставини з прийменниками «незважаючи на», «всупереч», «завдяки»: відокремлюються як конструкції з допустовим, причиновим
    значенням'
  - 'Типова помилка: невідокремлення дієприслівникового звороту — одна з найчастіших пунктуаційних помилок'
- section: Уточнюючі члени речення та практика (Clarifying Members and Practice)
  words: 1100
  points:
  - 'Уточнюючі обставини: звуження загального значення (напр., «Увечері, о шостій годині, ми зустрілися» — уточнення часу)'
  - 'Уточнюючі означення: конкретизація ознаки (напр., «На столі лежала книга, дуже стара й потріпана»)'
  - 'Пояснювальні конструкції зі словами «тобто», «а саме», «або» (у значенні «тобто»): правила пунктуації (напр., «Стилістика,
    тобто наука про стилі, вивчає...»)'
  - 'Комплексний практикум: розстановка розділових знаків у текстах із різними типами відокремлених членів'
  - 'Трансформаційні вправи: перетворення невідокремлених членів на відокремлені для зміни стилістичного ефекту та навпаки'
  - 'Підготовка до модуля b2-18: відокремлені конструкції у складних багатоскладних реченнях'
vocabulary_hints:
  required:
  - відокремлення (detachment) — смислове та інтонаційне виділення другорядних членів речення
  - дієприкметниковий зворот (participial phrase) — дієприкметник із залежними словами як відокремлене означення
  - дієприслівниковий зворот (adverbial participial phrase) — дієприслівник із залежними словами як відокремлена обставина
  - прикладка (apposition) — означення, виражене іменником, що дає іншу назву предмету
  - уточнення (clarification) — звуження загального значення обставини чи означення
  - пояснення (explanation) — конструкція зі словами «тобто», «а саме» для розкриття змісту
  - інтонація відокремлення (detachment intonation) — пауза та підвищення тону при відокремлених членах
  - допустове значення (concessive meaning) — додаткове значення допусту у відокремлених обставинах
  recommended:
  - обставинне значення (adverbial meaning) — додаткове значення причини чи допусту в означенні
  - поширений (extended) — означення або прикладка з залежними словами
  - непоширений (non-extended) — означення або прикладка без залежних слів
  - тире (dash) — альтернативний розділовий знак для виділення відокремлених членів
  - за винятком (with the exception of) — прийменник при відокремлених додатках
  - незважаючи на (despite) — прийменник при відокремлених обставинах допусту
