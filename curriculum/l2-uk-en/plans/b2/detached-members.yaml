module: b2-017
level: B2
sequence: 17
slug: detached-members
version: '1.2'
title: "Відокремлені члени речення"
subtitle: "Detached Sentence Members"
focus: grammar
pedagogy: PPP
phase: "B2.1b [Advanced Syntax]"
word_target: 4000
objectives:
  - "Розуміти природу відокремлення як способу смислового та логічного виділення другорядних членів речення."
  - "Досконало володіти правилами пунктуації при відокремлених означеннях, прикладках, обставинах та додатках."
  - "Ефективно використовувати дієприкметникові та дієприслівникові звороти для збагачення тексту та передачі супутніх дій."
  - "Розрізняти відокремлені та уточнювальні члени речення у складних синтаксичних конструкціях."
  - "Застосовувати відокремлення як стилістичний засіб для створення деталізованих описів та динамічних наративів."

reading_situations:
  - source_type: "художній репортаж"
    topic: "Опис подорожі через Карпатські гори з акцентом на деталях краєвиду та емоціях."
    key_elements:
      - "відокремлені означення (гори, оповиті туманом; сонце, золоте й ласкаве)"
      - "дієприслівникові звороти для передачі динаміки (долаючи перевали, милуючись краєвидами)"
      - "відокремлені прикладки (Черемош, швидкий і підступний)"
    motivation: "Демонстрація того, як відокремлені конструкції дозволяють створювати насичений образний текст без перевантаження його складними реченнями."

listening_situations:
  - media_type: "подкаст"
    setting: "Науково-популярна лекція про біорізноманіття українського степу."
    focus_points:
      - "Використання уточнювальних членів речення для локалізації фактів (там, у глибині заповідника; тоді, під час літньої спеки)."
      - "Відокремлені обставини допусту та причини (незважаючи на антропогенний вплив, завдяки зусиллям волонтерів)."
      - "Специфічна інтонація відокремлення: логічні наголоси та паузи."
    motivation: "Розвиток здатності сприймати на слух складні граматичні структури, що уточнюють та деталізують інформаційний потік."

writing_tasks:
  - task_type: "творчий опис"
    prompt: "Напишіть розгорнутий опис культурної події, яку ви нещодавно відвідали (концерт, виставка, фестиваль). Використовуйте широкий спектр відокремлених членів речення."
    requirements:
      - "мінімум 250 слів"
      - "використати принаймні 4 дієприкметникові звороти в різних позиціях"
      - "включити відокремлені додатки з прийменниками 'крім', 'зокрема', 'за винятком'"
      - "застосувати уточнювальні обставини для точного опису часу та місця"
    motivation: "Практичне засвоєння синтаксичного різноманіття та відпрацювання пунктуаційних навичок у творчому контексті."
    model_answer: "Опис має містити як препозитивні, так і постпозитивні означення, чітко відокремлені додатки та обставини, що створюють ефект присутності та деталізації."

discussion_topics:
  - context: "Обговорення ролі деталізації в сучасному швидкому світі: чи не заважає надлишок описів сприйняттю головного?"
    questions:
      - "Як відокремлені члени речення допомагають розставити акценти, не перетворюючи текст на 'сухий' перелік фактів?"
      - "Які конструкції (наприклад, уточнювальні) є найбільш корисними для швидкої передачі контексту?"
      - "Чи відчуваєте ви різницю в інтонації при використанні відокремлених обставин допусту (незважаючи на...)?"
    motivation: "Стимулювання усного використання складних синтаксичних структур для аргументації та опису нюансів."

content_outline:
  - section: "Відокремлені означення та прикладки"
    words: 1000
    subsections:
      - "Пунктуація дієприкметникових зворотів залежно від їхньої позиції"
      - "Відокремлення кількох одиничних прикметників після означуваного слова"
      - "Особливості відокремлення означень при особових займенниках"
      - "Прикладка як різновид означення: умови відокремлення та використання сполучника 'як'"
    key_concepts:
      - "атрибутивне відокремлення"
      - "дієприкметниковий зворот"
      - "прикладка"
  - section: "Відокремлені обставини та їхня динаміка"
    words: 1000
    subsections:
      - "Дієприслівниковий зворот: правила вживання та винятки (фразеологізми)"
      - "Відокремлення обставин, виражених іменниками з прийменниками (незважаючи на, згідно з, всупереч)"
      - "Смислові відтінки відокремлених обставин: причина, допуст, спосіб дії"
      - "Стилістичні обмеження вживання дієприслівникових зворотів"
    key_concepts:
      - "дієприслівниковий зворот"
      - "обставинне відокремлення"
      - "деєприслівник"
  - section: "Відокремлені додатки та уточнювальні члени"
    words: 1000
    subsections:
      - "Семантика відокремлених додатків: виключення, включення, заміщення"
      - "Уточнювальні члени речення: звуження поняття (місце, час, спосіб)"
      - "Приєднувальні конструкції зі словами 'навіть', 'особливо', 'зокрема'"
      - "Розрізнення уточнення та пояснення"
    key_concepts:
      - "уточнення"
      - "додаток"
      - "приєднання"
  - section: "Стилістична майстерність та інтонація"
    words: 1000
    subsections:
      - "Ритмічна організація тексту за допомогою відокремлених членів"
      - "Використання відокремлення в офіційно-діловому та науковому стилях: точність та логічність"
      - "Художня роль відокремлення: експресія та деталізація"
      - "Типові помилки у побудові речень з відокремленими членами та способи їх уникнення"

vocabulary:
  required:
    - відокремлений
    - дієприкметниковий зворот
    - дієприслівниковий зворот
    - прикладка
    - уточнювальний
    - обставина
    - додаток
  recommended:
    - деталізація
    - акцентування
    - синтаксична норма
    - інтонаційна пауза
    - уточнення

activities:
  types_required:
    - sentence-expansion
    - punctuation-fix
    - error-correction
    - reading
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: error-correction
    focus: "Виправити пунктуацію при відокремлених означеннях, прикладках та обставинах"
  - type: fill-in
    focus: "Доповнити речення відокремленим означенням або обставиною (дієприкметниковий/дієприслівниковий зворот)"
  - type: cloze
    focus: "Розставити розділові знаки в тексті з різними типами відокремлених членів"
  - type: select
    focus: "Визначити, що саме відокремлено (означення, обставина, додаток, уточнення)"

