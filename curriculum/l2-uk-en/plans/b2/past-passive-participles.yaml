module: b2-02
level: B2
sequence: 2
slug: past-passive-participles
version: '2.0'
title: Дієприкметники минулого часу на -ний/-тий
content_outline:
- section: 'Вступ: Світ реставрації та роль дієприкметника (Introduction: The World
    of Restoration and the Role of the Participle)'
  words: 500
  points:
  - Introduction to the participle as a verbal adjective that serves as the morphological
    base for the 'дієприкметниковий зворот' (participle phrase) mandated by State
    Standard §4.3.2.
  - 'Professional persona: The Museum Restorer''s focus on the ''state'' or ''result''
    of an object after an action, distinguishing between the process (verb) and the
    outcome (participle).'
  - Linking the module to the broader Passive Voice System (B2-01) and defining the
    participle's role as the core of passive-state descriptions (e.g., відкрите вікно).
- section: 'Морфологія: Творення дієприкметників на -ний (Morphology: Forming Participles
    with -ний)'
  words: 1000
  points:
  - 'Formation mechanics: Adding -ний to the infinitive stem, typically for vowel-ending
    stems or stems ending in certain consonants (e.g., писати → писаний).'
  - 'Critical consonant alternations: Mapping д → дж and т → ч to prevent common learner
    errors like *посадений* (correct: посаджений) or *плачений* (correct: оплачений
    from оплатити).'
  - 'Cultural hook: The Golden Pectoral (Золота пектораль), a Scythian masterpiece
    ''знайдена'' (found) by Borys Mozolevskyi in 1971 and ''зроблена'' (made) by ancient
    Greek masters.'
  - 'Drilling high-frequency participles in professional contexts: ''написаний'' (written),
    ''зроблений'' (made/done), and ''пофарбований'' (painted).'
- section: 'Специфіка: Односкладові основи та суфікс -тий (Specificity: Monosyllabic
    Stems and the -тий Suffix)'
  words: 800
  points:
  - 'The mnemonic rule for -тий: Identifying monosyllabic stems that prefer this suffix
    (e.g., мити → митий, бити → битий, закрити → закритий).'
  - 'Addressing ''Suffix Confusion'' learner errors: Systematic correction of forms
    like *миний* instead of ''митий'' or *забуний* instead of ''забутий''.'
  - 'Analysis of collocations for medium and high-frequency terms: ''забута історія''
    (forgotten history), ''закрита територія'' (closed territory), and ''відкрите
    питання'' (open question).'
  - 'The semantics of completion: How the -тий suffix emphasizes a final physical
    state in museum work (e.g., ''закритий фонд'', ''відкритий експонат'').'
- section: 'Синтаксис та узгодження: Правила «Класу 1» (Syntax and Agreement: Class
    1 Rules)'
  words: 800
  points:
  - 'Participles as adjectives: Following the declension paradigm of Adjective Class
    1 (hard group) for all genders, numbers, and cases.'
  - 'Addressing agreement errors: Systematic drills to fix gender and number mismatches
    (e.g., correcting *написаний книга* to ''написана книга'' or *відкрите двері*
    to ''відкриті двері'').'
  - 'Implementing State Standard §4.3.2: Constructing simple sentences with participle
    phrases (e.g., ''Експонат, відреставрований фахівцями, був готовий до виставки'').'
  - 'Full declension practice using professional museum terminology: ''відреставрованої
    пам''ятки'', ''збереженого експоната'', ''знайденого артефакту''.'
- section: Стилістика та «Правило Агентності» (Stylistics and the 'Agency Rule')
  words: 900
  points:
  - 'Mastering the ''Agency Rule'' for B2: Training learners to avoid ''Passive Abuse''
    (e.g., ''Книга була прочитана мною'') and prioritize natural active voice (''Я
    прочитав книгу'').'
  - 'Usage of ''бути'' + participle for temporal states: Expressing past, present,
    and future outcomes (e.g., ''Собор був збудований'', ''Пам''ятка буде збережена'').'
  - 'Cultural hook: Saint Sophia Cathedral (Софія Київська), which ''була перебудована''
    (was rebuilt) in the Ukrainian Baroque style during the era of Hetman Ivan Mazepa.'
  - 'Register and frequency analysis: Deep dive into academic and professional terms
    like ''збережений'' (preserved) and ''відреставрований'' (restored) versus common
    general usage.'
vocabulary_hints:
  required:
  - дієприкметник (participle) — core grammar term for B2; focus on result-oriented
    forms
  - утворення (formation) — the process of creating grammatical forms; morphological
    focus
  - чергування (alternation) — key phonetic shifts (д/дж, т/ч) required for correct
    formation
  - узгодження (agreement) — matching participle with noun in gender/number/case like
    an adjective
  - 'написаний (written) — high frequency; collocations: написаний власноруч, написаний
    зрозумілою мовою'
  - 'зроблений (done/made) — high frequency; collocations: зроблений з любов''ю, зроблений
    в Україні'
  - 'відкритий (open/opened) — high frequency; collocations: відкрите питання, відкритий
    простір'
  - 'закритий (closed) — high frequency; collocations: закритий клуб, закрита територія'
  recommended:
  - 'відреставрований (restored) — low frequency but essential for persona; collocations:
    відреставрований храм, відреставрована пам''ятка'
  - 'збережений (preserved) — medium frequency (academic); collocations: збережена
    спадщина, добре збережений екземпляр'
  - 'забутий (forgotten) — medium frequency (literary); collocations: забута історія,
    несправедливо забутий'
  - 'знайдений (found) — high frequency in history/archaeology; collocations: знайдений
    скарб, знайдений артефакт'
  - експонат (exhibit) — contextual vocabulary for the museum restorer persona
  - реставрація (restoration) — contextual vocabulary for the museum restorer persona
  - основа (stem) — linguistic term for identifying where to attach suffixes
  - суфікс (suffix) — linguistic term for the -ний/-тий classification
