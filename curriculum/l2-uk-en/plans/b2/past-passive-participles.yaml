module: b2-002
level: B2
sequence: 2
slug: past-passive-participles
version: 1.4.2
title: Пасивні дієприкметники минулого часу
subtitle: Пасивні дієприкметники минулого часу
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Утворювати пасивні дієприкметники минулого часу за допомогою суфіксів -н-, 
  -ен-, -т-.
- Узгоджувати дієприкметники з іменниками в роді, числі та відмінку.
- Застосовувати дієприкметники як означення та як частину присудка.
- Уникати помилкових форм на кшталт 'роблений' замість 'зроблений' (врахування 
  виду).
reading_situations:
- source_type: художній уривок
  topic: Опис занедбаної садиби з елементами містики
  key_elements:
  - забутий (m)
  - зачинений (m)
  - порослий (m)
  - розбитий (m)
  - написаний (m)
  motivation: Продемонструвати художній потенціал дієприкметників для створення 
    статичного, деталізованого опису.
listening_situations:
- media_type: подкаст
  setting: Інтерв'ю з архітектором про відновлення зруйнованих об'єктів 
    культурної спадщини.
  focus_points:
  - Які об'єкти вже відновлені?
  - Які методики були застосовані?
  - 'Почути фрази: ''план затверджений'', ''фундамент закладений''.'
  motivation: Розвиток сприйняття офіційної лексики в усному мовленні.
writing_tasks:
- task_type: відгук
  prompt: Напишіть критичний відгук на виставку сучасного мистецтва або нову 
    театральну виставу.
  requirements:
  - мінімум 160 слів
  - використати щонайменше 6 пасивних дієприкметників
  - дотриматися правильного узгодження в непрямих відмінках
  motivation: Використання дієприкметників для оцінки результатів творчої 
    діяльності.
  model_answer: 'Текст має містити аргументовану оцінку. Наприклад: ''Вражений глибиною
    розкритих тем, я рекомендую відвідати цей захід. Картини, виставлені в залі, передають
    особливу атмосферу...''. Модель акцентує на зв''язку дієприкметника з пояснюваним
    словом.'
discussion_topics:
- context: 'Цифровізація архівів: чи потрібні нам паперові оригінали?'
  questions:
  - Чи можуть бути втрачені дані, збережені лише в електронному вигляді?
  - Які переваги мають оцифровані (скановані) документи?
  motivation: Обговорення сучасних процесів з використанням дієприкметників 
    (збережений, оцифрований).
content_outline:
- section: 'Творення дієприкметників: морфологічний алгоритм'
  words: 1000
  subsections:
  - 'Вибір суфікса: коли -н-, а коли -ен- чи -т-.'
  - Чергування приголосних в основі (косити - кошений, пекти - печений).
  - Вплив виду дієслова на значення дієприкметника.
- section: Синтаксичні функції та узгодження в реченні
  words: 1200
  subsections:
  - 'Дієприкметниковий зворот: правила відокремлення комами.'
  - Дієприкметник у ролі іменної частини присудка.
  - Парадигма відмінювання за зразком прикметників твердої групи.
- section: Стилістичні особливості вживання дієприкметників
  words: 1000
  subsections:
  - Художнє означення (епітет) на основі дієприкметника.
  - Дієприкметник як інструмент лаконічності в офіційному тексті.
  - Уникання дієприкметників на -ши-, -вши- (як застарілих або ненормативних).
- section: Культура мовлення та типові труднощі
  words: 800
  subsections:
  - Розрізнення пасивних дієприкметників та віддієслівних прикметників (печений 
    vs запечений).
  - Правопис н та нн у дієприкметниках та прикметниках.
- section: Підсумок — Summary
  words: 300
  points:
  - "Active past participles are formed from the infinitive stem of intransitive verbs
    using the suffix -л- (змарніти → змарнілий). Forms ending in -вш- or -ш- are incorrect
    Russian calques (incorrect: посинівший). Self-check: How would you correct the
    ungrammatical form 'заснувший'?"
  - 'These forms describe a state resulting from a past action and often become permanent
    adjectives (стиглий, сталий). For transitive verbs, you must use relative clauses
    instead of participles. Self-check: What is the difference between a participle
    and a verbal adjective? Describe 3 things in nature using valid -л- participles
    (e.g., пожовкле листя).'
vocabulary:
  required:
  - вражений
  - захоплений
  - затверджений
  - виконаний
  - оцифрований
  - відновлений
  - занедбаний
  recommended:
  - обґрунтований
  - завершений
  - очікуваний
  - сканований
activities:
  types_required:
  - fill-in
  - match-up
  - select
  - highlight-morphemes
  min_items_per_type: 6
  total_min_items: 25
activity_hints:
- type: fill-in
  focus: Утворити пасивний дієприкметник від дієслова з правильним суфіксом 
    (-н-/-ен-/-т-)
- type: match-up
  focus: Зіставити дієслово з його пасивним дієприкметником (писати→написаний, 
    м'яти→зім'ятий)
- type: error-correction
  focus: Виправити помилковий суфікс дієприкметника (роблений→зроблений, 
    косений→кошений)
- type: select
  focus: 'Визначити синтаксичну роль дієприкметника: означення чи іменна частина присудка'
references:
- source: Караман, 10 клас (2018)
  pages: §76, с. 189
  topic: 'Дієприкметник: творення пасивних форм (-н-, -ен-/-єн-, -т-)'
- source: Караман, 10 клас (2018)
  pages: §77, с. 191–193
  topic: Дієприкметниковий зворот, відокремлення комами
- source: Авраменко, 11 клас (2019)
  pages: §25, с. 81–82
  topic: Пасивні дієприкметники в системі пасивного стану
connects_to:
  previous: passive-voice-system
  next: b2-impersonal-passive
prerequisites:
- passive-voice-system
grammar:
- Past passive participles formation (-н-, -ен-, -т-)
- Consonant alternations in participle stems
- Agreement with nouns
- Participle phrases (відокремлені означення)
register: художній, офіційно-діловий
phase: B2.1a [Passive Voice System]
