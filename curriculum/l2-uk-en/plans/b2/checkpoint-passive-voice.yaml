module: checkpoint-passive-voice
level: B2
sequence: 10
version: '1.3'
title: "Контрольна точка: Пасивний стан та дієприкметники"
subtitle: "Підсумковий контроль: пасивний стан і дієприкметники"
focus: checkpoint
pedagogy: review
objectives:
  - "Комплексна перевірка знань про всі типи пасивних конструкцій в українській мові
    (форми на -но/-то, на -ся, неозначено-особові речення)."
  - "Оцінка вміння правильно утворювати та вживати активні та пасивні дієприкметники."
  - "Діагностика навичок стилістичного редагування текстів з метою усунення неприродних
    пасивних зворотів та штучних дієприкметників."
  - "Систематизація знань про синтаксичну синоніміку (звороти vs підрядні речення)."
  - "Підготовка до використання складних граматичних структур у професійному та академічному
    контексті."

reading_situations:
  - source_type: "збірний текст"
    topic: "Ретроспектива мовних норм: від класики до сучасності"
    key_elements: ["цитати класиків", "сучасні медіа-тексти", "юридичні витяги", "наукові
          тези"]
    motivation: "Порівняльний аналіз вживання пасиву та дієприкметників у різних епохах
      та стилях для підсумкової перевірки розуміння норми."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Круглий стіл експертів з питань мовної політики"
    focus_points: ["аргументи за і проти певних конструкцій", "дискусія про термінологію",
      "мовні вподобання професійних спільнот"]
    motivation: "Перевірка здатності сприймати на слух складні аргументовані висловлювання
      з використанням вивченої граматики."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть підсумкове есе на тему 'Еволюція українського синтаксису: шлях
      до природності'. У тексті ви маєте свідомо використати всі вивчені типи пасивних
      конструкцій та дієприкметників, пояснюючи доречність кожного вибору."
    requirements:
      - "мінімум 400 слів"
      - "використати мінімум одну форму на -но/-то"
      - "використати мінімум одну конструкцію на -ся"
      - "використати один активний дієприкметник минулого часу"
      - "продемонструвати трансформацію підрядного речення у зворот"
    motivation: "Це комплексне завдання дозволяє оцінити як теоретичні знання, так
      і практичну майстерність студента на рівні B2."
    model_answer: "Есе має демонструвати глибоке розуміння теми. Студент повинен уникати
      кальок, правильно вживати відокремлені члени речення та виявляти стилістичну
      гнучкість. Оцінюється точність термінології та природність мовлення."

discussion_topics:
  - context: "Підсумкова дискусія: майбутнє пасиву в українській мові"
    questions:
      - "Яка конструкція, на вашу думку, є найбільш 'українською' за духом?"
      - "Чи варто повністю відмовлятися від пасиву на -ся в офіційному мовленні?"
      - "Як би ви пояснили різницю між 'зроблено' та 'зроблене' іноземцю, що вчить
        мову?"
    motivation: "Консолідація вивченого матеріалу через вільне обговорення та аргументацію."

content_outline:
  - section: "Ревізія пасивної системи: ієрархія конструкцій"
    words: 800
    subsections:
      - "Функціональне призначення форм на -но, -то vs дієслів на -ся"
      - "Синтаксичні умови вживання неозначено-особових речень"
      - "Аналіз типових зон ризику: де найчастіше виникають помилки"
    key_concepts:
      - "систематизація"
      - "граматична ієрархія"
      - "функціональний аналіз"
  - section: "Дієприкметник як об'єкт мовної критики та норми"
    words: 800
    subsections:
      - "Підсумок правил творення активних та пасивних форм"
      - "Статус активних дієприкметників теперішнього часу: фінальний вердикт"
      - "Лексикалізація як спосіб збереження дієприкметникових форм"
    key_concepts:
      - "нормативність"
      - "критичне мислення"
      - "морфологічний синтез"
  - section: "Трансформаційний марафон: від теорії до автоматизму"
    words: 800
    subsections:
      - "Вправи на швидкість: заміна підрядних речень зворотами"
      - "Зворотна трансформація: підвищення експресивності тексту"
      - "Пунктуаційний тренажер: складні випадки відокремлення"
    key_concepts:
      - "автоматизація навичок"
      - "синтаксична гнучкість"
      - "пунктуаційна пильність"
  - section: "Стилістичний аудит: робота над помилками"
    words: 800
    subsections:
      - "Аналіз 'забруднених' текстів: пошук кальок та канцеляризмів"
      - "Техніки полегшення стилю без втрати інформативності"
      - "Порівняння авторських редакцій одного тексту"
    key_concepts:
      - "стилістичний аудит"
      - "мовна екологія"
      - "редакторський аналіз"
  - section: "Підготовка до фінального тестування"
    words: 800
    subsections:
      - "Структура тесту: від тестів вибору до відкритого висловлення"
      - "Стратегії виконання завдань на редагування"
      - "Самооцінка: чек-лист компетенцій рівня B2 за даною темою"
    key_concepts:
      - "тестова стратегія"
      - "саморефлексія"
      - "критерії оцінювання"

word_target: 4000

vocabulary:
  required:
    - консолідація
    - ревізія
    - нормативність
    - стилістична гнучкість
    - канцеляризм
    - трансформація
    - пунктуаційна пильність
    - функціональність
  recommended:
    - аудит
    - рефлексія
    - ієрархія
    - автоматизм
    - експресивність

activities:
  types_required:
    - quiz
    - error-correction
    - translate
    - essay-response
  min_items_per_type: 5
  total_min_items: 30

activity_hints:
  - type: cloze
    focus: "Доповнити змішаний текст усіма типами пасивних конструкцій (-но/-то, -ся,
      неозначено-особові)"
  - type: error-correction
    focus: "Знайти та виправити всі пасивні помилки в абзаці (кальки, орудний діяча,
      штучні дієприкметники)"
  - type: group-sort
    focus: "Класифікувати всі пасивні конструкції в тексті за типом (безособова, зворотна,
      неозначено-особова, дієприкметникова)"
  - type: essay-response
    focus: "Написати офіційний лист з доречним використанням різних пасивних конструкцій"
  - type: critical-analysis
    focus: "Проаналізувати вживання пасиву в газетній статті: виявити функції, оцінити
      доречність, запропонувати покращення"

references:
  - source: "Караман, 10 клас (2018)"
    pages: "§75–77, с. 187–193"
    topic: "Стан дієслова, дієприкметник, безособові форми на -но, -то"
  - source: "Глазова, 11 клас (2019)"
    pages: "§21–22, с. 95–97"
    topic: "Пасивні конструкції з -ся та формами на -но, -то"
  - source: "Авраменко, 11 клас (2019)"
    pages: "§25, с. 81–82"
    topic: "Система пасивних конструкцій в українській мові"
  - source: "Державний стандарт 2024"
    pages: "SS 4.1.3.1, SS 4.2.3"
    topic: "Пасивний стан з дієприкметниками, видові пари в пасиві"

connects_to:
  previous: "participles-vs-relative-clauses"
  next: "phrases-word-combinations"

