slug: proverbs-nature-time-caution
version: '2.0'
title: 'Прислів''я II: Природа, час і обережність'
subtitle: 'Proverbs II: Nature, Time & Caution'
content_outline:
- section: 'Вступ: Природа як джерело мудрості (Introduction: Nature as a Source of
    Wisdom)'
  words: 600
  points:
  - 'Роль природи в українському світогляді: хліборобський досвід як основа народної
    філософії та реалізація стандарту B2 (§3.16)'
  - 'Культурний гачок: сакральний статус верби («Без верби і калини нема України»)
    та пояснення символіки у прислів''ї «Де вода, там і верба»'
  - 'Зв''язок аграрного календаря та народної мудрості: чому суворе дотримання природних
    циклів було життєво необхідним для виживання'
- section: Прислів'я про стихії та цикли природи (Proverbs about Nature's Elements
    and Cycles)
  words: 1000
  points:
  - 'Аналіз дуалізму природи: персоніфікація у вислові «Природа одному мати, другому
    — мачуха» (щедрість проти непередбачуваної небезпеки)'
  - 'Логіка алогізму: гумористичне вживання фрази «На городі бузина, а в Києві дядько»
    для позначення повної нісенітниці (non sequitur) у розмові'
  - 'Сезонні образи та варіативність: «Весна красна квітами, а осінь — плодами» та
    менш офіційний варіант «...а осінь пирогами»'
  - 'Побутові спостереження: пояснення метафори «Ліс рубають — тріски летять» як способу
    виправдання побічних збитків або неминучих наслідків'
- section: Час і планування в народній філософії (Time and Planning in Folk Philosophy)
  words: 800
  points:
  - 'Цінність моменту та рішучість: аналіз прислів''їв «Куй залізо, поки гаряче» та
    «Ранок вечора мудріший» як стратегій прийняття рішень'
  - 'Невідворотність втрати часу: заміна базових висловів на більш колоритний приклад
    «Згаяного часу і конем не доженеш»'
  - 'Довгострокове планування: «Готуй сани влітку, а воза — взимку» як приклад аграрної
    дисципліни, перенесеної на сучасний бізнес-контекст'
- section: Обережність та оцінка ризиків (Caution and Risk Assessment)
  words: 800
  points:
  - 'Застереження від необачності: «Не знаючи броду, не лізь у воду» — від фізичної
    небезпеки до метафоричного попередження про ризики'
  - 'Пріоритет надійного над можливим: порівняльний аналіз образів «синиця в руках»
    та «журавель у небі» в українському та англійському контекстах'
  - 'Мовна корекція: акцент на автентичному, ритмічному варіанті «Береженого Бог береже»
    замість калькованого «Обережного...»'
  - 'Економічна мудрість: «Скупий платить двічі» — обговорення наслідків надмірної
    економії на якості чи безпеці'
- section: 'Практика: Уникнення кальок та суржику (Practice: Avoiding Calques and
    Surzhyk)'
  words: 800
  points:
  - 'Помилка калькування: вправи на заміну дослівного перекладу «It''s raining cats
    and dogs» на питомий український відповідник «Ллє як з відра»'
  - 'Анти-суржик фільтр: розпізнавання та заміна російського «Тише едешь — дальше
    будешь» на українське «Хто тихо ходить, той густо місить»'
  - 'Запобігання контамінації: тренінг на розрізнення «Мати значення» (правильно)
    та помилкового «Відігравати значення» (результат змішування)'
  - 'Творче завдання (Production): написання аргументованого есе про ризик або планування
    з обов''язковим вживанням 3-4 вивчених ідіом'
focus: phraseology
pedagogy: CBI
objectives:
- Learner can recognize and interpret 16 core Ukrainian proverbs about nature, time,
  and caution
- Learner can use proverbs appropriately to give advice about planning, risk, and
  patience
- Learner understands the cultural values embedded in Ukrainian folk wisdom about
  natural cycles and prudence
grammar:
- Fixed expressions (фразеологічні одиниці)
- Proverb structure and variation
immersion: 100
register: varies
phase: B2.6
vocabulary_hints:
  required:
  - верба (willow) — сакральний символ; частотна у висловах про воду та Україну
  - брод (ford) — місце для переходу річки; ключовий образ у прислів'ях про ризик
  - згаяний (wasted/lost) — вживається переважно з часом («згаяний час»)
  - термін (term) — для обговорення лінгвістичних аспектів фразеології
  - поняття (concept) — абстрактна одиниця мудрості
  - процес (process) — розвиток подій у часі
  - метод (method) — спосіб досягнення результату через планування
  recommended:
  - бузина (elderberry) — назва рослини; символ алогізму у відомій ідіомі
  - калька (calque) — мовна помилка, спричинена дослівним перекладом
  - суржик (surzhyk) — змішане мовлення, якого слід уникати у фразеології
  - аналіз (analysis) — розгляд структури прислів'я
  - синтез (synthesis) — поєднання знань у власному висловлюванні
  - дослідження (research) — пошук етимології народних висловів
