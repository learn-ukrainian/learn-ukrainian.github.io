module: b2-57
level: B2
sequence: 57
slug: synonyms-movement
version: '2.0'
title: 'Синоніми: Рух і Пересування'
subtitle: Synonyms - Movement
content_outline:
- section: 'Вступ: Мистецтво синонімії в русі (Introduction: The Art of Synonymy in
    Motion)'
  words: 600
  points:
  - 'Вступ до стилістичної компетентності за стандартом §4.4.1.2: чому вибір дієслова
    руху визначає рівень володіння мовою (B2)'
  - 'Аналіз типової помилки: плутанина лінійного та звичного руху (йти vs ходити)
    — корекція конструкції ''Я щодня йду'' на ''Я щодня ходжу'' з поясненням Habitual
    vs Linear'
  - 'Огляд інтенсивності руху: від нейтрального ''бігти'' до експресивних ''мчати''
    та ''нестися'''
- section: 'Тонкощі ходи: від урочистості до втоми (Walk Nuances: From Ceremony to
    Exhaustion)'
  words: 1000
  points:
  - 'Крокувати (stride): розбір детермінованого руху, контексти бадьорості та військової
    ходи (''крокувати в ногу'')'
  - 'Брести (trudge) як відображення фізичного стану: зв''язок із літературним образом
    Кобзаря у Шевченка та опір середовищу (''брести по снігу'', ''брести навмання'')'
  - 'Тупати (stomp) та аудіальний аспект руху: використання в розмовному стилі для
    опису шуму (''гучно тупати'')'
  - 'Стилістичне уточнення ''чимчикувати'': спростування міфу про швидкий рух; пояснення
    іронічного або ритмічного повільного пересування (''чимчикувати пішки'')'
- section: 'Енергія швидкості: біг, мчання та нестримність (Energy of Speed: Running,
    Racing, and Dashing)'
  words: 1000
  points:
  - 'Порівняння ''бігти'' та ''бігати'': закріплення бази А2/B1 через призму стилістичного
    забарвлення B2'
  - 'Мчати (race): інтенсивність та висока швидкість, розбір сталих виразів ''мчати
    стрімголов'' та ''час мчить'''
  - 'Нестися (dash) як втрата контролю: порівняння з ''мчати'' (більше стихійності);
    конотація небезпеки або нестримності (''нестися як вітер'')'
  - 'Практика розрізнення: вибір дієслова для опису спортивного змагання vs аварійної
    ситуації'
- section: Культурний код та фразеологізми руху (Cultural Code and Motion Phraseology)
  words: 700
  points:
  - 'Аналіз прислів’я ''Багато ходити – довго жити'': концепт здоров''я в українській
    мовній картині світу'
  - 'Розбір фразеологізму ''На ходу підметки рве'': опис спритної та хитрої людини
    через метафору руху'
  - 'Літературна декомпозиція: як автори використовують дієслова ''брести'' та ''блукати''
    для створення атмосфери меланхолії (образ нещасної долі)'
- section: Практика та стилістичний синтез (Practice and Stylistic Synthesis)
  words: 700
  points:
  - 'Вправа на корекцію: заміна нейтральних дієслів на стилістично марковані для підвищення
    якості тексту (B1 -> B2)'
  - Створення динамічного опису сцени (вулиця, вокзал, ліс) з використанням мінімум
    5 різних синонімів руху за моделлю CBI
  - 'Підсумковий тест на розрізнення відтінків значень: інтенсивність, звук та емоційний
    стан'
focus: phraseology
pedagogy: CBI
objectives:
- Учень може розрізняти відтінки значень дієслів на позначення руху
- Учень вміє вживати лексику пересування для створення динамічних описів у художньому
  та публіцистичному стилях
grammar:
- Nuances in verbs of motion
- Manner of movement and adverbs
immersion: 100
register: художній
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - йти (go/walk) — йти пішки, дощ іде; висока частотність, лінійний рух
  - ходити (walk/go) — ходити в гості, ходити навшпиньки; регулярність, звичка
  - синонім (synonym) — лексичне багатство, відтінок значення
  - значення (meaning) — пряме значення, переносне значення
  - контекст (context) — стилістичний контекст, ситуативне вживання
  recommended:
  - крокувати (stride/march) — бадьоро крокувати; детермінована манера
  - брести (trudge) — брести навмання, ледве брести; фізичний опір, втома (художній
    стиль)
  - тупати (stomp/clatter) — гучно тупати ногами; акцент на звуці (розмовний)
  - мчати (race/speed) — мчати стрімголов, час мчить; висока інтенсивність
  - нестися (dash/bolt) — нестися як вітер, нестися назустріч; неконтрольованість
  - чимчикувати (shuffle/trudge) — іронічне або ритмічне пересування (розмовне)
  - на ходу підметки рве (cunning/quick-witted) — фразеологізм про спритну людину
