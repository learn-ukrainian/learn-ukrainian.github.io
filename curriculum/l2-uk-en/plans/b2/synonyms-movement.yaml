module: b2-57
level: B2
sequence: 57
slug: synonyms-movement
version: '2.0'
title: 'Синоніми: Рух і Пересування'
subtitle: Synonyms - Movement
content_outline:
- section: Розминка — Як ходити і бігати
  points:
  - 'Однонаправлений vs різнонаправлений рух (йти vs ходити) — learner error: confusion
    between actual (linear) and habitual (multi-directional) motion (e.g., ''Я щодня
    йду'' instead of ''Я щодня ходжу'')'
  - 'Манера руху (крокувати, брести, тупати) — context: ''тупати'' is often auditory
    (noise), ''брести'' is physical state (tiredness/resistance)'
  - 'Швидкість і контроль (мчати vs нестися) — stylistic focus: imply high intensity
    and lack of control, whereas ''бігти'' is neutral'
- section: Walk
  points:
  - 'йти (go - general, one direction) — collocations: йти додому, йти на роботу,
    йти пішки, дощ іде'
  - 'ходити (walk - repeated, habitual) — collocations: ходити в гості, ходити до
    школи, ходити навшпиньки'
  - 'крокувати (stride - deliberate steps) — collocations: крокувати вулицею, бадьоро
    крокувати, крокувати в ногу'
  - 'брести (trudge - tired walking) — literary image: associated with Shevchenko
    (''блукав я, брів...''); collocations: брести по снігу, брести навмання, ледве
    брести'
  - 'тупати (stomp - heavy steps) — collocations: тупати ногами, гучно тупати, тупати
    на місці'
- section: Run
  points:
  - бігти (run - one direction) — neutral verb for movement
  - бігати (run - repeated) — habitual or multi-directional movement
  - 'мчати (race - very fast) — collocations: мчати на повній швидкості, мчати стрімголов,
    час мчить'
  - 'нестися (dash - uncontrolled) — collocations: нестися як вітер, нестися назустріч;
    phraseology: «На ходу підметки рве» (proverb)'
  - 'чимчикувати (scurry - quick small steps) — correction: research suggests it is
    often ''to trudge, to walk slowly/rhythmically'' or ironic (''shuffle along'');
    collocations: чимчикувати додому, повільно чимчикувати'
- section: Практика — динамічний опис
  points:
  - 'Обрати дієслово руху відповідно до контексту (втома, поспіх, урочистість) — alignment:
    State Standard §4.4.1.2 (Stylistic competence)'
  - 'Описати сцену з різними видами руху персонажів — cultural hook: proverb «Багато
    ходити – довго жити»'
  - Порівняти український і англійський вибір дієслів руху
  - Написати динамічну сцену з 5+ різними дієсловами
focus: phraseology
