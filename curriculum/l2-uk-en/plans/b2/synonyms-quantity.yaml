module: b2-63
level: B2
sequence: 63
slug: synonyms-quantity
version: '2.0'
title: 'Синоніми: Кількість та Міра'
subtitle: Synonyms - Quantity and Measure
content_outline:
- section: Розминка та історичний контекст (Warm-up and Historical Context)
  words: 600
  points:
  - 'Обговорення сприйняття кількості: коли «багато» стає «чимало» — введення в градацію
    інтенсивності'
  - 'Історична довідка про давні міри: «Копа» (60 одиниць) та «Пуд» (16.38 кг) як
    джерела фразеології'
  - 'Аналіз ідіом: «Не твоя копа молотиться» (не твоя справа) та «Пуд солі з''їсти»
    (про глибоке знайомство з людиною)'
- section: Синоніми великої кількості та міри (Synonyms for Much/Many)
  words: 1000
  points:
  - 'Нейтральне «багато» vs експресивне «чимало»: стилістичні відтінки та вживання
    (§4.4.1.2 Державного стандарту)'
  - 'Емфатичне «безліч»: використання для підкреслення винятковості (безліч запитань,
    безліч вражень)'
  - 'Розмовні синоніми «купа» та «маса»: емоційне забарвлення (купа справ — часто
    негативне, маса задоволення — позитивне)'
  - 'Граматика ступенів порівняння: суплетивні форми багато — більше згідно з §4.2.2
    Стандарту'
- section: Синоніми малої кількості та обмеженості (Synonyms for Few/Little)
  words: 800
  points:
  - 'Опозиція «мало» vs «трохи»: негативна конотація нестачі проти позитивної конотації
    наявності хоча б невеликої частини'
  - 'Обчислюваність: «кілька» vs «декілька» — відмінності між нейтральним та офіційним
    стилями'
  - 'Типова помилка: калькування «пара хвилин» (a couple) замість літературного «кілька
    хвилин» — розрізнення пари як двох об''єктів'
- section: Стилістичні регістри та культура мовлення (Stylistic Registers and Speech
    Culture)
  words: 800
  points:
  - 'Корекція помилки «Багато vs Дуже»: розрізнення кількості та інтенсивності (багато
    читає vs дуже гарний)'
  - 'Узгодження іменників: відпрацювання родового відмінка множини (Genitive Plural)
    після слів кількості (багато людей, чимало грошей)'
  - 'Трансформація регістру: переклад з розмовного «маю купу проблем» в офіційний
    «маю значну кількість складних питань»'
- section: 'Практика: Статистика та опис масштабів (Practice: Statistics and Scale
    Description)'
  words: 800
  points:
  - Написання статистичного огляду для публіцистичного стилю, використовуючи «значна
    кількість», «обмаль», «переважна більшість»
  - 'Вправа на градацію: переписування тексту зі зміною сприйняття обсягів (від применшення
    до гіперболи)'
  - 'Зв''язок з числівниками (M32): поєднання неозначено-кількісних слів з точними
    цифрами у звітах'
focus: phraseology
pedagogy: CBI
objectives:
- Учень може розрізняти відтінки значень синонімів на позначення великої та малої
  кількості
- Учень вміє використовувати професійну лексику для опису обсягів та масштабів у звітах
  та статтях
- Учень розуміє стилістичну різницю між розмовними та офіційними словами на позначення
  міри
grammar:
- Adverbs of quantity
- Nouns for collective amounts
immersion: 100
register: публіцистичний
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - багато (much/many) — нейтральне; сполучається з родовим відмінком (багато часу)
  - чимало (quite a lot) — середня частота; виразна міра (чимало зусиль)
  - безліч (countless) — висока частота; емфатичне підкреслення (безліч варіантів)
  - мало (little/few) — нейтральне; значення недостатності (мало місця)
  - трохи (a little) — позитивна конотація; часто використовується для пом'якшення
    (трохи почекати)
  - кілька (several) — для злічуваних іменників; заміна помилковому вживанню слова
    «пара»
  recommended:
  - купа (pile) — розмовне; часто має відтінок хаотичності або надмірності (купа проблем)
  - маса (mass) — розмовне; інтенсивне задоволення або великий обсяг часу (маса задоволення)
  - копа (sixty units) — історія та етнографія; давня українська міра лічби
  - пуд (pood / 16.38 kg) — історична міра ваги; основа для фразеологізмів
  - обмаль (scarcity) — книжне/публіцистичне; критично мала кількість
