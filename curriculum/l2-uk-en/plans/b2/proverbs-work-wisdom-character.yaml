module: b2-061
level: B2
sequence: 61
slug: proverbs-work-wisdom-character
version: '1.0'
title: "Прислів'я та приказки: Праця, мудрість, характер"
subtitle: "Proverbs: Work, Wisdom, Character"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Дослідити культурний код та цінності українського народу через паремійний фонд (праця та мудрість)."
  - "Навчитися доречно вживати народні афоризми у різних комунікативних ситуаціях."
  - "Аналізувати специфічну граматичну структуру прислів'їв (узагальнено-особові речення)."
  - "Опанувати навичку підбору синонімічних паремій для точного вираження оцінки."

listening_situations:
  - media_type: "лекція"
    setting: "Уривок подкасту з етнопсихології про те, як мова формує національний характер."
    focus_points: ["історичне походження конкретних прислів'їв", "аналіз метафоричного значення народних висловів", "виявлення архаїчних лексем у пареміях"]
    motivation: "Розвиток здатності розуміти культурно-історичне підґрунтя мовних одиниць та їхній вплив на сучасну ментальність."

discussion_topics:
  - context: "Обговорення актуальності традиційних цінностей: 'Чи не суперечать прислів'я про працю сучасним концепціям балансу роботи та життя?'"
    questions:
      - "Яке українське прислів'я найкраще характеризує вашу особисту життєву філософію?"
      - "Чому деякі народні вислови здаються парадоксальними або суперечливими?"
      - "Як за допомогою прислів'я можна ввічливо критикувати або давати пораду?"
    motivation: "Стимулювання критичного осмислення фольклорної спадщини та її адаптації до вимог сьогодення."

content_outline:
  - section: "Праця як етична домінанта в українській пареміографії"
    words: 1000
    subsections:
      - "Культ працелюбності та засудження неробства: аналіз ключових висловів"
      - "Символіка знарядь праці та природних циклів у прислів'ях"
      - "Зв'язок між процесом, результатом та винагородою у народній свідомості"
    key_concepts:
      - "працелюбність"
      - "народна етика"
      - "афористичність"
      - "життєствердність"
  - section: "Концепт мудрості, знання та слова"
    words: 1000
    subsections:
      - "Пріоритет розуму та кмітливості: 'Мудрий не все каже, що знає, а дурень не все знає, що каже'"
      - "Сила слова та вага мовчання: етикетні та моральні аспекти"
      - "Навчання та досвід як джерела народної інтелектуальності"
    key_concepts:
      - "інтелект"
      - "мовленнєвий етикет"
      - "досвід"
      - "дидактизм"
  - section: "Характер та моральний ідеал людини"
    words: 1000
    subsections:
      - "Честь, гідність та правдивість: паремії про внутрішній стержень людини"
      - "Дружба, вірність та зрада у дзеркалі народної мудрості"
      - "Іронія та сатира як засоби виховання характеру"
    key_concepts:
      - "мораль"
      - "іронія"
      - "соціальна оцінка"
      - "ідентичність"
  - section: "Лінгвістичні та стилістичні особливості паремій"
    words: 1000
    subsections:
      - "Синтаксична лаконічність: використання неповних та еліптичних речень"
      - "Ритм та рима як чинники запам'ятовування прислів'їв"
      - "Трансформація паремій у сучасному дискурсі (медіа, реклама, антиприслів'я)"
    key_concepts:
      - "еліпсис"
      - "ритмізація"
      - "інтертекстуальність"
      - "антиприслів'я"

vocabulary:
  required:
    - прислів'я
    - приказка
    - паремія
    - афоризм
    - ментальність
    - фольклор
    - іронія
    - дидактизм
  recommended:
    - працьовитість
    - гідність
    - неробство
    - споконвічний
    - невичерпний
    - кмітливість

activities:
  types_required:
    - match-up
    - translate
    - critical-analysis
    - essay-response
  min_items_per_type: 5
  total_min_items: 20

connects_to:
