title: 'Прислів''я I: Праця, мудрість і характер'
subtitle: 'Proverbs I: Work, Wisdom & Character'
content_outline:
- section: 'Вступ: Народна мудрість як алгоритм успіху (Introduction: Folk Wisdom
    as an Algorithm for Success)'
  words: 600
  points:
  - Роль прислів'їв як «неписаних законів» та живих інструментів комунікації в сучасному
    українському дискурсі (згідно зі стандартом §3.19).
  - 'Представлення персонажа (Старійшина) та філософської рамки: прислів''я — це не
    архаїка, а перевірені часом алгоритми виживання та успіху.'
  - 'Концепція «Сродної праці» Григорія Сковороди як ідейний фундамент модуля: щастя
    через працю за покликанням.'
- section: Філософія праці та «Сродна праця» (Philosophy of Work and «Congenial Work»)
  words: 1000
  points:
  - 'Аналіз лексеми «праця» та її ключових сполук: «сродна праця», «плідна праця»,
    «наймана праця» (стандарт §4.4.1.2).'
  - 'Розбір базового корпусу: «Без труда нема плода» та «Хто рано встає, тому Бог
    дає» — етика зусиль.'
  - 'Метафоричне значення праці: «Де є бджола, там є мед» — аналіз плодів діяльності.'
  - 'Дискусія про «сродність»: як знайти своє місце в житті через призму народної
    мудрості.'
- section: 'Мудрість: Відміряй сім разів (Wisdom: Measure Seven Times)'
  words: 800
  points:
  - 'Стратегії прийняття рішень: «Сім разів відміряй, один раз відріж» та «Хто питає,
    той не блудить».'
  - 'Семантичні нюанси поняття «мудрість»: від «народної мудрості» до іронічного контексту
    «сивина в бороду — біс у ребро».'
  - «Вік живи — вік учись» як підготовка до академічного рівня C1 та концепція безперервної
    освіти.
  - 'Критичне мислення: «Не все те золото, що блищить» — аналіз зовнішнього та внутрішнього.'
- section: 'Характер та слово: Не горобець (Character and Word: Not a Sparrow)'
  words: 800
  points:
  - 'Прислів''я про ідентичність та спадковість: «Яке дерево, такий і клин; який батько,
    такий і син».'
  - 'Відповідальність за мовлення: «Слово — не горобець: вилетить — не впіймаєш» —
    розбір наслідків необережних висловів.'
  - 'Психологія характеру: розрізнення «мати характер» (сильна воля) та «важкий характер»
    (нестерпність).'
  - 'Дружба та щирість: «Не той друг, хто медом маже...» — цінність правди в міжособистісних
    стосунках.'
- section: Типові помилки та стилістичний регістр (Typical Errors and Stylistic Register)
  words: 800
  points:
  - 'Робота над помилками: подолання калькування англійських ідіом (напр. «Ллє як
    з відра» замість дослівного перекладу дощу з котами).'
  - 'Аналіз явища контамінації: виправлення помилкових сумішей на кшталт «Не все те
    золото, що не тоне» (відновлення оригінальних форм).'
  - 'Стилістичний дисонанс: коли доречно вживати народні прислів''я, а коли варто
    перейти на офіційний термін «ефективність праці».'
  - 'Практикум: підбір українських відповідників до англійських паремій за семантичною
    схожістю, а не лексичним складом.'
focus: phraseology
pedagogy: CBI
objectives:
- Learner can recognize and interpret 16 core Ukrainian proverbs about work, wisdom,
  and character
- Learner can use proverbs appropriately in context to express advice, commentary,
  or wisdom
- Learner understands the cultural values embedded in Ukrainian folk wisdom
grammar:
- Fixed expressions (фразеологічні одиниці)
- Proverb structure and variation
immersion: 100
register: varies
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - праця (work) — сродна праця, плідна праця, наймана праця; High frequency, core
    cultural concept.
  - мудрість (wisdom) — народна мудрість, житейська мудрість, перлина мудрості; Medium
    frequency.
  - характер (character) — загартовувати характер, мати характер (be strong-willed),
    риси характеру; High frequency.
  - плід (fruit/result) — пожинати плоди, плоди праці, заборонений плід; Medium frequency,
    often metaphorical.
  - поняття (concept) — ключове поняття фразеології; Standard academic usage.
  recommended:
  - дослідження (research) — ґрунтовне дослідження, об'єкт дослідження; High frequency
    in academic/publicistic styles.
  - аналіз (analysis) — проводити аналіз, системний аналіз; Essential for B2 critical
    tasks.
  - синтез (synthesis) — синтез знань; Used in summary sections.
  - процес (process) — робочий процес, творчий процес; High frequency.
