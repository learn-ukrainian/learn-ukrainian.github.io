  - type: comparative-study
    focus: "Зіставити прислів'я з його тлумаченням (значенням)."
  - type: essay-response
    focus: "Доповнити прислів'я пропущеним словом або другою частиною."
  - type: select
    focus: "Обрати доречне прислів'я для описаної комунікативної ситуації."
  - type: reading
    focus: "Вставити правильне прислів'я у контекст оповідного тексту."

references:
  - "Караман С. О. Українська мова. 10 клас (2018), §42-45 — Фразеологія"
