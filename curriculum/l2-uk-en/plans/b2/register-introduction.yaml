module: register-introduction
level: B2
sequence: 28
version: '1.1'
title: "Вступ до поняття стилю та регістру"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Зрозуміти поняття функціонального стилю та мовного регістру."
  - "Вивчити класифікацію основних стилів української мови (художній, офіційно-діловий, науковий, публіцистичний, розмовний)."
  - "Навчитися розрізняти нейтральну та стилістично забарвлену лексику."
  - "Усвідомити важливість доречності (appropriateness) мовлення в різних соціальних контекстах."
  - "Вміти визначати стиль тексту за його лексичними та синтаксичними ознаками."

reading_situations:
  - source_type: "фрагменти текстів різних стилів"
    topic: "Аналіз одного й того самого повідомлення (наприклад, про відкриття бібліотеки), поданого в різних стилях: від офіційного наказу до посту в соцмережах."
    key_elements: ["стильові маркери", "вибір слів", "структура речень", "ступінь офіційності"]
    motivation: "Розвиток чутливості до стилістичної диференціації мови та розуміння того, як форма впливає на зміст."

listening_situations:
  - media_type: "подкаст"
    setting: "Дискусія філологів про культуру мовлення та сучасні зміни в українських регістрах під впливом цифрових технологій."
    focus_points: ["Виявлення перемикання кодів (code-switching) між формальним та неформальним мовленням.", "Сприйняття етикетних формул.", "Розуміння ролі інтонації у визначенні регістру."]
    motivation: "Підготовка до реального спілкування, де межі стилів можуть розмиватися, та розвиток навичок критичного слухання."

writing_tasks:
  - task_type: "порівняльний аналіз"
    prompt: "Проаналізуйте два короткі тексти на тему захисту довкілля: один — науковий витяг, інший — емоційне звернення активіста. Виділіть ключові лексичні та граматичні відмінності."
    requirements:
      - "мінімум 300 слів"
      - "ідентифікація щонайменше 3 стильових маркерів для кожного тексту"
      - "пояснення впливу вибору стилю на цільову аудиторію"
    motivation: "Закріплення теоретичних знань про стилістичні особливості через практичний аналіз та порівняння."
    model_answer: "Аналіз має включати порівняння термінології та емоційно-експресивних засобів. Наприклад: 'У науковому тексті вживаються терміни «антропогенний вплив», «біоценоз», тоді як у зверненні активіста — метафори «наша спільна домівка», «крик землі». Науковий стиль використовує пасивні конструкції, публіцистичний — риторичні запитання.'"

discussion_topics:
  - context: "Дискусія про те, чи існують ситуації, коли використання 'неправильного' стилю є виправданим стратегічним кроком."
    questions:
      - "Чому політики іноді переходять на розмовний стиль під час офіційних виступів?"
      - "Як ви ставитеся до використання сленгу в науково-популярних статтях?"
      - "Чи може занадто офіційний стиль у дружньому спілкуванні сприйматися як іронія чи образа?"
    motivation: "Розвиток навичок аргументації та глибоке розуміння прагматики мовлення в соціолінгвістичному контексті."

content_outline:
  - section: "Основи стилістики та поняття регістру"
    words: 1000
    subsections:
      - "Стилістика як наука про вибір мовних засобів залежно від умов спілкування"
      - "Регістр як багатогранне поняття: поле (тема), спосіб (канал зв'язку), учасники (ролі)"
      - "Співвідношення мовної норми та стилістичної доречності в сучасній українській мові"
      - "Типологія стилістичних помилок: анахронізми, недоречна експресія, змішування стилів"
    key_concepts:
      - "функціональний стиль"
      - "мовний регістр"
      - "стилістична норма"
  - section: "Система функціональних стилів української мови"
    words: 1200
    subsections:
      - "Художній стиль: панування образу, естетична функція та поєднання всіх мовних ресурсів"
      - "Публіцистичний стиль: функція переконання, відкрита оцінність та соціальна актуальність"
      - "Науковий стиль: точність, логічність, використання термінології та об'єктивність викладу"
      - "Офіційно-діловий стиль: високий ступінь стандартизації, відсутність емоційності, юридична сила"
      - "Розмовний стиль: безпосередність, ситуативність, широке використання позамовних засобів"
    key_concepts:
      - "образність"
      - "стандартизація"
      - "еліптичність"
  - section: "Лексична та граматична диференціація"
    words: 1000
    subsections:
      - "Нейтральна лексика як стилістичне ядро мови: універсальність та частотність"
      - "Книжна лексика: абстрактні поняття, терміни, книжні сполучники та прийменники"
      - "Емоційно-експресивна лексика: слова з оцінним значенням, пестливі та зневажливі форми"
      - "Граматичні маркери стилів: іменний характер офіційного мовлення vs дієслівність розмовного"
    key_concepts:
      - "нейтральна лексика"
      - "стилістичне забарвлення"
  - section: "Прагматика стилю та комунікативна доречність"
    words: 800
    subsections:
      - "Чинники вибору стилю: соціальний статус співрозмовників, дистанція, мета висловлення"
      - "Мовний етикет як невід'ємна частина регістру: формули привітання, прощання та звертання"
      - "Психологічний аспект стилю: як вибір регістру впливає на довіру та авторитет мовця"
      - "Культура мовлення в епоху глобалізації: вплив англомовних моделей на українські регістри"
    key_concepts:
      - "адресат"
      - "комунікативна мета"
      - "доречність"

vocabulary:
  required:
    - функціональний стиль
    - регістр
    - забарвлення
    - доречність
    - контекст
    - норма
    - адресат
    - маркер
  recommended:
    - експресивність
    - лаконічність
    - книжна лексика
    - термінологія
    - кліше
    - етикет

activities:
  types_required:
    - reading
    - essay-response
    - select
    - fill-in
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "syntactic-stylistic-devices"
  next: "register-formal-informal"
