title: Функціональні стилі мови
content_outline:
- section: 'Вступ: Що таке функціональний стиль? (Introduction: What is Functional
    Style?)'
  words: 600
  points:
  - Визначення функціонального стилю як системи мовних засобів, що обслуговують певну
    сферу суспільного життя (відповідно до State Standard §4.4.1.1).
  - 'Порівняльна таблиця ''Одна думка у 5 стилях'': ілюстрація відмінностей на прикладі
    повідомлення про дощ (від розмовного «Ого, ллє як з відра!» до наукового «Спостерігаються
    інтенсивні опади»).'
  - Роль комунікативної мети та мовної ситуації у виборі відповідного регістру.
- section: Розмовний та художній стилі (Colloquial and Artistic Styles)
  words: 1000
  points:
  - 'Розмовний стиль: Невимушеність, емоційність та використання неповних речень у
    побутовому спілкуванні.'
  - 'Cultural hook: «Стиль-рятівник» — історична роль розмовної мови та фольклору
    у збереженні української ідентичності під час дії Валуєвського циркуляра та Емського
    указу.'
  - 'Learner error: Аналіз типової помилки «вибачаюсь» (reflexive) та відпрацювання
    нормативних форм «вибачте» або «перепрошую».'
  - 'Художній стиль: Образність, виразність та використання тропів (метафори, епітети,
    порівняння) на прикладах класичної літератури.'
- section: Науковий стиль (Scientific Style)
  words: 800
  points:
  - 'Характерні риси: Термінологічна точність, логічність та об''єктивність викладу.'
  - 'Learner error: Калькування англійських особових конструкцій (наприклад, «I found»)
    — перехід до типових для українського наукового стилю безособових форм («виявлено»,
    «встановлено», «досліджено»).'
  - 'Специфіка наукової аргументації: Використання тез та доказів.'
- section: Офіційно-діловий стиль (Official-Business Style)
  words: 800
  points:
  - Стандартизованість, чіткість та використання мовних кліше у документах (заяви,
    звіти, протоколи).
  - 'Cultural hook: Стигматизація «канцеляриту» у щоденному мовленні — порівняння
    неприродних конструкцій (наприклад, «здійснити покупку») із живим мовленням («купити»).'
  - 'Learner error: Змішування регістрів — ризики використання сленгу в офіційних
    контекстах (наприклад, неправильне вітання «Привіт» у зверненні до викладача чи
    керівника).'
- section: Публіцистичний стиль та порівняльний аналіз (Publicistic Style and Comparative
    Analysis)
  words: 800
  points:
  - 'Публіцистичний стиль: Актуальність, соціальна оцінність та поєднання елементів
    різних стилів у ЗМІ.'
  - 'Аналіз новин та репортажів: Як мова впливає на аудиторію та формує громадську
    думку.'
  - 'Практикум з розпізнавання стильових маркерів: Критерії визначення стилю у змішаних
    текстах та підсумкова перевірка засвоєння соціолінгвістичної компетенції.'
vocabulary_hints:
  required:
  - функціональний стиль (functional style) — індивідуальний стиль, система засобів;
    частотний термін для класифікації мовлення
  - розмовний стиль (colloquial style) — розмовна лексика, побут, невимушеність; домінуючий
    стиль у щоденному спілкуванні
  - художній стиль (artistic/literary style) — художній твір, образність, епітет,
    письменник; сфера літератури
  - науковий стиль (scientific style) — науковий термін, теза, аргумент, дослідження;
    точність та об'єктивність
  - офіційно-діловий стиль (official-business style) — ділова мова, заява, документ,
    стандарт; сувора регламентація
  - публіцистичний стиль (journalistic style) — актуальна тема, репортаж, вплив, ЗМІ;
    актуальність та оцінність
  - мовна ситуація (speech situation) — контекст спілкування, залежність від обставин
  - стильові маркери (style markers) — слова-маркери, специфічні ознаки стилю
  - регістр (register) — високий регістр, низький регістр; вибір мовних засобів
  - комунікативна мета (communicative purpose) — мета висловлювання, намір мовця
  recommended:
  - образність (imagery) — художня образність, мовні тропи
  - точність (precision) — термінологічна точність, логічна послідовність
  - стандартизованість (standardization) — мовний стандарт, кліше
  - актуальність (relevance/topicality) — актуальна тема, суспільне значення
  - емоційність (emotionality) — емоційне забарвлення, експресивність
