module: b2-70
level: B2
sequence: 70
slug: b2-checkpoint
version: '2.0'
title: Контрольна точка B2.2
subtitle: B2.2 Checkpoint
content_outline:
- section: Вступ та організація (Introduction and Organization)
  words: 400
  points:
  - 'Огляд мети контрольної точки: перевірка засвоєння тем M41-M69 (фразеологія, синоніміка,
    складний синтаксис) згідно з Держстандартом (§4.4.3, §4.3.4)'
  - 'Структура оцінювання: аналіз тексту, лексико-граматичні вправи та творче завдання;
    критерії оцінювання та прохідний бал'
- section: Лексична точність та стилістика (Lexical Precision and Stylistics)
  words: 900
  points:
  - 'Робота з синонімічним багатством та стилістично забарвленою лексикою: розрізнення
    нейтральних та експресивних засобів (§4.4.3)'
  - 'Виправлення типових помилок: калькування фразеологізмів (відігравати роль vs
    мати значення) та помилки з дієсловами (брати участь vs приймати участь, відчиняти
    двері)'
  - 'Тестування паронімів: розрізнення ''ефектний'' (вражаючий зовнішньо) vs ''ефективний''
    (дієвий) та ''громадський'' vs ''громадянський'' у професійному контексті'
- section: 'Наука та медицина: кейс Івана Пулюя (Science and Medicine: Ivan Puliui
    Case)'
  words: 1100
  points:
  - 'Аналіз тексту про Івана Пулюя: інтеграція наукової (гіпотеза, експеримент) та
    медичної (X-промені, діагноз, скелет) термінології'
  - 'Складний синтаксис у науковому мовленні: вживання сполучників з''ясувальних та
    обставинних відношень (завдяки тому, що; незважаючи на те, що)'
  - 'Іван Пулюй як постать деколонізаційного наративу: висвітлення його внеску в науку
    (лампи Пулюя) та культуру (переклад Біблії українською)'
- section: 'Суспільство та культура: Українська діаспора (Society and Culture: Ukrainian
    Diaspora)'
  words: 900
  points:
  - 'Тематичний блок про українську діаспору: аналіз лексики на позначення ідентичності,
    збереження традицій та громадської активності'
  - Перевірка вміння будувати складнопідрядні речення з різними типами підрядності
    для опису історичних та соціокультурних процесів
  - Вживання абстрактних понять та термінології гуманітарного спрямування (поняття,
    процес, метод) у контексті світового українства
- section: Підсумок та рефлексія (Summary and Reflection)
  words: 700
  points:
  - 'Самоаналіз результатів: виявлення сильних сторін та зон для розвитку (інтерпретація
    результатів тесту)'
  - Рекомендації для повторення матеріалу M41-M69 та підготовка до фази B2.3 (доменна
    лексика та академічне письмо)
  - 'Підсумковий огляд шляху B2.1 + B2.2: перехід до поглибленої комунікації та спеціалізованих
    професійних тем'
focus: checkpoint
pedagogy: Assessment
objectives:
- Учень успішно демонструє знання відмінювання складних числівників
- Учень вільно оперує системою синонімів на позначення дій, станів та абстрактних
  понять
- Учень правильно вживає ідіоми та прислів'я у відповідному контексті
- Учень будує складні синтаксичні конструкції з використанням вдосконалених сполучників
grammar:
- Review of M31-M69 grammar topics
immersion: 100
register: академічний
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - термін (term) — вживання у науковому та офіційному регістрах
  - поняття (concept) — ключова одиниця логічного мислення; розрізнення поняття та
    слова
  - процес (process) — опис стадій та перебігу подій
  - метод (method) — науковий інструментарій та способи аналізу
  - діагноз (diagnosis) — ставити/встановити діагноз; висока частотність у медицині
  - гіпотеза (hypothesis) — висунути/підтвердити/спростувати гіпотезу
  - експеримент (experiment) — проводити експеримент; чистота експерименту
  recommended:
  - аналіз (analysis) — розклад об'єкта на складові для вивчення
  - синтез (synthesis) — об'єднання частин у ціле
  - дослідження (research) — фундаментальна наукова діяльність
  - симптом (symptom) — виявляти симптоми; тривожний симптом
  - жанр (genre) — літературний або мистецький жанр (фентезі, кіно)
  - оскільки (since/as) — стилістично правильна заміна кальки 'так як'
  - 'ефектний (spectacular) — паронім: той, що справляє сильне зовнішнє враження'
  - 'ефективний (effective) — паронім: той, що приносить потрібний результат'
