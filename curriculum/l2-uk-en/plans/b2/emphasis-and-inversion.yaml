module: b2-020
level: B2
sequence: 20
slug: emphasis-and-inversion
version: '1.2'
title: "Логічне наголошування та інверсія"
subtitle: "Logical Emphasis and Inversion"
focus: grammar
pedagogy: PPP
phase: "B2.1b [Advanced Syntax]"
word_target: 4000
objectives:
  - "Розуміти принципи актуального членування речення: тема (дане) та рема (нове)."
  - "Ефективно використовувати інверсію (зміну прямого порядку слів) для виділення важливої інформації."
  - "Застосовувати лексичні засоби наголошування (частки 'навіть', 'тільки', 'ж', 'таки') у поєднанні з синтаксичними."
  - "Вміти трансформувати нейтральні речення в експресивні для різних комунікативних цілей."
  - "Аналізувати вплив інверсії на ритміку та емоційне забарвлення художнього та публіцистичного тексту."

reading_situations:
  - source_type: "художній твір"
    topic: "Драматична кульмінація в історичному романі."
    key_elements:
      - "інверсія підмета і присудка для створення напруги"
      - "винесення обставин на початок речення для акцентування обставин дії"
      - "використання емфатичних часток у діалогах"
    motivation: "Вивчення того, як зміна порядку слів змінює психологічне сприйняття тексту читачем."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Політичне ток-шоу: дебати щодо реформ."
    focus_points:
      - "Логічне наголошування за допомогою пауз та зміни висоти голосу."
      - "Використання емфатичних конструкцій для маніпуляції увагою аудиторії."
      - "Інверсія як засіб риторичного підсилення аргументів."
    motivation: "Розвиток навичок розпізнавання прихованих акцентів у дискурсі лідерів думок."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть репортаж з місця події (наприклад, спортивне змагання або концерт), де головним завданням є передача динаміки та емоцій за допомогою інверсії та емфатичних часток."
    requirements:
      - "мінімум 250 слів"
      - "використати мінімум 5 прикладів інверсії різних членів речення"
      - "застосувати частки 'ж', 'таки', 'навіть' для підсилення змісту"
      - "збалансувати нейтральний та інверсований порядок слів"
    motivation: "Практичне засвоєння інструментів експресивного синтаксису."
    model_answer: "Текст має бути енергійним, з чітко вираженими ремами, винесеними у сильні позиції (початок або кінець речення)."

discussion_topics:
  - context: "Чи є інверсія в українській мові ознакою поетичності чи це природний засіб щоденного спілкування?"
    questions:
      - "Як відрізняється порядок слів у розмовній мові від наукового стилю?"
      - "Чи може неправильна інверсія призвести до нерозуміння змісту речення?"
      - "Які члени речення найчастіше підлягають інверсії у ваших роздумах?"
    motivation: "Обговорення гнучкості українського синтаксису як ресурсу для вираження нюансів."

content_outline:
  - section: "Актуальне членування речення: Тема та Рема"
    words: 1000
    subsections:
      - "Поняття про комунікативну структуру речення"
      - "Прямий порядок слів в українській мові: нейтральна позиція компонентів"
      - "Роль кінцевої позиції для виділення нового (реми)"
      - "Взаємодія синтаксису та інтонації у визначенні смислового центру"
    key_concepts:
      - "актуальне членування"
      - "тема"
      - "рема"
  - section: "Механізми та види інверсії"
    words: 1000
    subsections:
      - "Інверсія підмета і присудка: від опису до дії"
      - "Винесення означення після означуваного слова (поетична та стилістична інверсія)"
      - "Переміщення обставин та додатків для логічного виділення"
      - "Дистантне розташування пов'язаних слів як засіб емфази"
    key_concepts:
      - "інверсія"
      - "емфаза"
      - "риторична фігура"
  - section: "Лексико-синтаксичні засоби наголошування"
    words: 1000
    subsections:
      - "Емфатичні частки: їхнє місце у реченні та вплив на значення"
      - "Використання видільних конструкцій (це..., що...)"
      - "Повтор слів як засіб підсилення логічного наголосу"
      - "Риторичні питання та вигуки у структурі наголошування"
    key_concepts:
      - "частка"
      - "підсилення"
      - "експресія"
  - section: "Стилістичні функції та обмеження"
    words: 1000
    subsections:
      - "Інверсія в поезії: ритм, рима та образність"
      - "Публіцистичний стиль: використання інверсії для маніпуляції та акцентування"
      - "Нормативність порядку слів у науковому та діловому стилях"
      - "Аналіз помилок: коли інверсія створює комічний або небажаний ефект"

vocabulary:
  required:
    - інверсія
    - логічний наголос
    - актуальне членування
    - тема
    - рема
    - емфаза
    - частка
  recommended:
    - експресивність
    - ритмомелодика
    - комунікативний центр
    - стилістична фігура
    - нейтральний порядок

activities:
  types_required:
    - sentence-expansion
    - error-correction
    - reading
    - essay-response
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: select
    focus: "Визначити речення з емфатичним порядком слів (інверсія) серед нейтральних"
  - type: fill-in
    focus: "Переставити слова в реченні для виділення реми (нової інформації)"
  - type: error-correction
    focus: "Виправити невдалу інверсію, що спричиняє двозначність або комічний ефект"
  - type: essay-response
    focus: "Переписати абзац із нейтральним порядком слів, використовуючи інверсію для іншого акценту"

references:
  - source: "Глазова, 11 клас (2019)"
    pages: "§23, с. 99–102"
