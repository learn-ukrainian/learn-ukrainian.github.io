module: lexical-stylistic-devices
level: B2
sequence: 26
version: '1.2'
title: "Лексичні стилістичні засоби"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Дослідити систему художніх тропів та їхню роль у створенні образу."
  - "Навчитися розрізняти епітети, метафори, порівняння та метонімії."
  - "Зрозуміти стилістичні функції гіперболи, літоти та іронії."
  - "Аналізувати використання багатозначних слів, омонімів та паронімів як засобів мовної гри."
  - "Вміти використовувати лексичні засоби виразності для створення переконливих та емоційних текстів."

reading_situations:
  - source_type: "художній текст / есеїстика"
    topic: "Аналіз метафоричного ландшафту в сучасному українському есеї (наприклад, О. Забужко)."
    key_elements: ["розгорнута метафора", "індивідуально-авторські епітети", "алюзії та ремінісценції"]
    motivation: "Розуміння того, як лексичні засоби формують інтелектуальну та емоційну глибину тексту."

listening_situations:
  - media_type: "лекція"
    setting: "Уривок з університетської лекції про український модернізм, де лектор використовує складні метафори та епітети для опису епохи."
    focus_points: ["Розпізнавання риторичних запитань та метафор у живому мовленні.", "Сприйняття іронії та сарказму як засобів впливу на аудиторію.", "Ідентифікація емоційно забарвленої лексики."]
    motivation: "Розвиток здатності вловлювати приховані сенси та емоційні відтінки усної промови."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть критичний відгук на сучасну книгу або фільм, використовуючи широкий спектр лексичних засобів виразності для передачі ваших вражень."
    requirements:
      - "мінімум 250 слів"
      - "мінімум 3 різні метафори"
      - "щонайменше один випадок гіперболи або літоти"
      - "використання іронії для підкреслення певних аспектів твору"
      - "мінімум 2 індивідуальні епітети"
    motivation: "Практика створення маніпулятивного та емоційно насиченого тексту для сучасної комунікації."
    model_answer: "Текст має містити розгорнутий аналіз із використанням художніх засобів. Наприклад: 'Автор малює полотно (метафора), де кожен персонаж — це крихітна піщинка (літота) у вирі історії. Його стиль — це гостра бритва (метафора), що розтинає нариви суспільних проблем. Чи не занадто солодкою (іронія) здається фінальна сцена на тлі загальної трагедії?'"

discussion_topics:
  - context: "Дискусія про роль іронії та сарказму в сучасному публічному просторі та політиці."
    questions:
      - "Чи допомагає іронія захиститися від пропаганди?"
      - "Де проходить межа між здоровим сарказмом та образою?"
      - "Які метафори найчастіше використовують сучасні політики?"
    motivation: "Розвиток навичок усного мовлення та критичного аналізу лексичних стратегій впливу."

content_outline:
  - section: "Тропи як основа образності"
    words: 1200
    subsections:
      - "Метафора: природа переносного значення та види (проста, розгорнута, стерта)"
      - "Метонімія та синекдоха: принципи заміщення за суміжністю та кількісним відношенням"
      - "Персоніфікація (уособлення) як засіб олюднення неживих предметів та абстракцій"
      - "Епітет: від постійних до індивідуально-авторських художніх означень"
    key_concepts:
      - "переносне значення"
      - "кореляція смислів"
      - "художній образ"
  - section: "Кількісні та якісні тропи"
    words: 1000
    subsections:
      - "Гіпербола та літота: стилістичне перебільшення та применшення для підсилення ефекту"
      - "Порівняння: логічна та граматична структура, стилістична функція зіставлення"
      - "Перифраз та евфемізм: описові назви та засоби мовного етикету для пом'якшення висловів"
      - "Алегорія: втілення абстрактних ідей у конкретних образах"
    key_concepts:
      - "інтенсифікація значення"
      - "експресивність"
      - "мовна етика"
  - section: "Комічні та сатиричні засоби"
    words: 900
    subsections:
      - "Іронія: прихована насмішка через невідповідність прямого та імпліцитного змісту"
      - "Сарказм та гротеск: межі гостроти та абсурду в мовленні"
      - "Оксюморон: поєднання контрастних понять для вираження складності буття"
      - "Гра слів та каламбур: стилістичне використання багатозначності"
    key_concepts:
      - "підтекст"
      - "контраст"
      - "стилістична фігура"
  - section: "Лексичні ігри та ресурси"
    words: 900
    subsections:
      - "Стилістичне використання синонімів, антонімів та паронімів"
      - "Архаїзми, історизми та неологізми: створення часового колориту та актуалізація мовлення"
      - "Діалектизми, професіоналізми та жаргонізми: соціальна характеристика мовця"
      - "Вульгаризми та просторіччя: стилістична виправданість використання"
    key_concepts:
      - "лексичний пласт"
      - "стилістичне забарвлення"
      - "соціолект"

vocabulary:
  required:
    - троп
    - метафора
    - епітет
    - гіпербола
    - іронія
    - метонімія
    - порівняння
    - контекст
  recommended:
    - переносне значення
    - конотація
    - алегорія
    - персоніфікація
    - літота
    - оксюморон

activities:
  types_required:
    - reading
    - essay-response
    - select
    - fill-in
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: match-up
    focus: "Зіставити троп (метафора / метонімія / синекдоха / епітет) з конкретним прикладом із тексту"
  - type: select
    focus: "Визначити тип тропу у запропонованому реченні"
  - type: error-correction
    focus: "Знайти змішану метафору або стилістично невдалий троп і виправити"
  - type: fill-in
    focus: "Доповнити речення доречним епітетом або метафоричним виразом"
  - type: group-sort
    focus: "Розподілити лексичні засоби за типами: тропи кількості (гіпербола, літота) / тропи якості (метафора, метонімія) / комічні (іронія, оксюморон)"

references:
  - source: "Караман, 10 клас (2018)"
    pages: "Стилістика — лексичні стилістичні засоби"
    topic: "Метафора, метонімія, синекдоха, епітет, гіпербола, літота"
  - source: "Глазова, 11 клас (2019)"
    pages: "§11–15"
    topic: "Лексична норма, стилістично забарвлена лексика"
  - source: "Державний стандарт 2024"
    pages: "SS 4.4"
    topic: "Стилістика (B2)"

connects_to:
  previous: "phonetic-stylistic-devices"
  next: "syntactic-stylistic-devices"
