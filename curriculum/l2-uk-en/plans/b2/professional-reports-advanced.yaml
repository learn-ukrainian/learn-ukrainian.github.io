module: b2-072
level: B2
sequence: 72
slug: professional-reports-advanced
version: '1.0'
title: "Аналітичні та стратегічні звіти: Поглиблений рівень"
subtitle: "Analytical and Strategic Reports: Advanced Level"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Опанувати написання складних аналітичних звітів з використанням стратегічних інструментів (SWOT, PESTEL) українською мовою."
  - "Навчитися адаптувати стиль та зміст звіту для різних цільових аудиторій (стейкхолдерів, технічних фахівців, ради директорів)."
  - "Розвинути навички аргументації та обґрунтування стратегічних рішень у письмовому вигляді."
  - "Вивчити специфіку написання звітів у кризових ситуаціях та підготовку пропозицій щодо мінімізації ризиків."

reading_situations:
  - source_type: "стратегічний план"
    topic: "Стратегія цифрової трансформації державного сектору України до 2030 року."
    key_elements: ["візія", "місія", "стратегічні цілі", "індикатори виконання"]
    motivation: "Аналіз високорівневої стратегічної документації та її мовних особливостей."
  - source_type: "аналітична записка"
    topic: "Аналіз впливу воєнних дій на екологічну ситуацію в басейні річки Дніпро."
    key_elements: ["експертна оцінка", "методологія дослідження", "довгострокові наслідки"]
    motivation: "Робота з науково-популярним та експертним стилем звітування."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Підготуйте SWOT-аналіз для виходу українського стартапу на європейський ринок. Оформіть це як частину інвестиційного звіту."
    requirements: ["використання термінології стратегічного менеджменту", "чітка структура", "обґрунтовані висновки"]
    motivation: "Тренування навичок стратегічного мислення та професійного письма."
    model_answer: "Звіт повинен містити детальний аналіз сильних та слабких сторін, можливостей та загроз, а також конкретну стратегічну рекомендацію."

content_outline:
  - section: "Стратегічне моделювання у звітності"
    words: 1000
    subsections:
      - "SWOT-аналіз: формулювання внутрішніх переваг та зовнішніх викликів"
      - "PESTEL-аналіз: оцінка макросередовища (політичні, економічні, соціальні фактори)"
      - "Матриця ризиків та стратегії реагування на них"
    key_concepts:
      - "стратегічне планування"
      - "конкурентна перевага"
      - "зовнішнє середовище"
      - "мінімізація ризиків"
  - section: "Адаптація звіту під аудиторію (Stakeholder Management)"
    words: 1000
    subsections:
      - "Звітування для ради директорів: лаконічність, фокус на прибутку та стратегії"
      - "Технічні звіти для експертів: деталізація, методологія, точність даних"
      - "Звіти для громадськості та ЗМІ: зрозумілість, візуалізація, соціальний аспект"
    key_concepts:
      - "стейкхолдери"
      - "цільова аудиторія"
      - "інформаційна прозорість"
      - "репутаційний менеджмент"
  - section: "Аргументація та переконання у професійних текстах"
    words: 1000
    subsections:
      - "Побудова логічного ланцюга: теза — доказ — висновок"
      - "Використання риторичних запитань та емоційного інтелекту в діловому письмі"
      - "Спростування контраргументів та робота із запереченнями у тексті звіту"
    key_concepts:
      - "переконливість"
      - "логічна послідовність"
      - "доказова база"
      - "критичне мислення"
  - section: "Кризова звітність та пост-кризовий аналіз"
    words: 1000
    subsections:
      - "Звітування про інциденти: оперативність, чесність, план дій"
      - "Аналіз помилок та 'уроки засвоєні' (Lessons Learned)"
      - "Формулювання пропозицій щодо запобігання рецидивам"
    key_concepts:
      - "антикризове управління"
      - "оперативне реагування"
      - "коригувальні заходи"
      - "відповідальність"

vocabulary:
  required:
    - стратегія
    - трансформація
    - потенціал
    - впровадження
    - моніторинг
    - аудит
    - рентабельність
    - конкурентоспроможність
  recommended:
    - диверсифікація
    - інноваційний
    - сталий розвиток
    - оптимізація
    - інтеграція

activities:
  types_required:
    - critical-analysis
    - essay-response
    - fill-in
    - match-up
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "professional-reports-basics"
  next: "academic-writing"
