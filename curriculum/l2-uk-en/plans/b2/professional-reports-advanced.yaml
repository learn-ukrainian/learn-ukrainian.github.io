module: b2-88
level: B2
sequence: 88
slug: professional-reports-advanced
version: '2.0'
title: 'Професійні звіти: Поглиблення'
subtitle: Advanced analytical reports and presentation
content_outline:
- section: Вступ
  points:
  - 'Перехід від базової звітності (М87) до аналітичної роботи — content writing note:
    будується на знаннях з М87'
  - 'Роль аналітичних звітів у стратегічному плануванні компанії — alignment: реалізація
    Держстандарту §1.3.2 (створення складних професійних текстів)'
  - 'Відмінність між описовим та аналітичним звітом — content writing note: чітко
    розмежувати «що сталося» (опис) та «чому це сталося» (аналіз)'
  - Критичне мислення в інтерпретації даних
  - Зв'язок звіту з презентацією результатів керівництву
- section: Імерсивна розповідь
  subsections:
  - name: Багатоджерельний аналіз
    points:
    - 'Інтеграція даних з різних джерел: фінансові, маркетингові, операційні'
    - Узгодження методологій при зведенні даних
    - Виявлення протиріч між джерелами та їх пояснення
    - 'Вагування надійності джерел: первинні vs вторинні'
    - Тріангуляція даних для підвищення об'єктивності
  - name: Складна візуалізація та інтерпретація
    points:
    - 'Поєднані графіки: dual-axis charts, комбіновані діаграми'
    - Теплові карти та scatter plots для багатовимірних даних
    - 'Dashboard-підхід: панель показників для керівників'
    - 'Інтерпретація кореляцій: коли зв''язок стає причинністю'
    - 'Візуалізація невизначеності: довірчі інтервали, похибки'
  - name: Хеджування та обережна мова
    points:
    - 'Модальність у висновках: може, ймовірно, можливо'
    - 'Обмежувальні конструкції: за наявних даних, за умови'
    - Уникання категоричних тверджень без повних доказів
    - Визнання альтернативних інтерпретацій
    - Професійна відповідальність за прогнози та рекомендації
  - name: Усна презентація звіту
    points:
    - 'Структура презентації: executive summary → ключові знахідки → Q&A'
    - Адаптація складності до аудиторії (технічна vs нетехнічна)
    - Підготовка до критичних запитань від керівництва
    - 'Візуальна підтримка: слайди як доповнення, не заміна мовлення'
    - 'Управління часом: 5-хв vs 30-хв презентація'
  points: []
- section: Аналіз
  subsections:
  - name: Критична оцінка звітів
    points:
    - Критерії якісного аналітичного звіту - чіткість, обґрунтованість, об'єктивність
    - Виявлення логічних помилок - хибна кореляція, вибіркове використання даних
    - Оцінка надійності методології - розмір вибірки, репрезентативність
    - Перевірка висновків на відповідність даним у тексті
    - Ідентифікація упереджень автора та конфліктів інтересів
  - name: Етика звітності
    points:
    - Чесність у презентації несприятливих даних
    - Уникання маніпуляцій візуалізацією (обрізання осей, селективні дані)
    - Прозорість щодо обмежень дослідження
    - Розкриття конфліктів інтересів та джерел фінансування
    - Відповідальність за соціальний вплив рекомендацій
  - name: Професійна термінологія високого рівня
    points:
    - 'Термінологія прогнозування: екстраполяція, сценарний аналіз, модельування'
    - 'Статистичні терміни: кореляція, регресія, статистична значущість'
    - 'Бізнес-аналітика: KPI, benchmark, SWOT, gap analysis'
    - 'Якісні методи: кейс-стаді, інтерв''ю, фокус-групи'
  points: []
- section: Граматика
  subsections:
  - name: Модальні конструкції для хеджування
    points:
    - 'Модальні дієслова: може свідчити, ймовірно вказує, здається'
    - 'Вставні слова: можливо, ймовірно, очевидно, на нашу думку'
    - 'Умовні конструкції: за умови X, якщо припустити Y'
    - 'Обмежувальні фрази: в межах даного дослідження, за наявних даних'
  - name: Складнопідрядні речення з модальністю
    points:
    - Складні речення з умовою та наслідком для прогнозів
    - Поєднання об'єктивних даних з обережними висновками
    - Використання підрядних речень причини для обґрунтувань
    - Контрастивні конструкції для альтернативних інтерпретацій
  points: []
- section: Підсумок
  points:
  - 'Синтез: від базової звітності (М87) до аналітичної майстерності (М88)'
  - 'Ключові навички: багатоджерельний аналіз, складна візуалізація, хеджування, презентація'
  - 'Підготовка до новинного аналізу (М89-90): застосування критичного мислення'
focus: skills
pedagogy: CBI
objectives:
- Learner can write complex analytical reports with multiple data sources
- Learner can create advanced data visualizations and interpret trends
- Learner can use hedging and tentative language appropriately
- Learner can present report findings to stakeholders orally
- Learner can critically evaluate existing reports for quality
phase: B2.4 Communication Skills
vocabulary_hints:
  required:
  - Звіт (report) — подати/скласти звіт, річний звіт, детальний звіт, звіт про виконання
  - Дані (data) — обробляти дані, збирати/аналізувати дані, візуалізація даних, достовірність
    даних
  - Аналіз (analysis) — глибокий аналіз, порівняльний аналіз, критичний аналіз, провести
    аналіз, результати аналізу
  - Висновки (conclusions) — робити висновки, попередні висновки, дійти висновку
  - Тенденція (trend) — позитивна/негативна тенденція, тенденція до зростання, виявити
    тенденцію
  recommended:
  - Термін (term) — професійний термін, визначення терміну
  - Поняття (concept) — ключове поняття, розширити поняття
  - Процес (process) — оптимізація процесу, безперервний процес
  - Метод (method) — ефективний метод, метод дослідження, застосувати метод
  - Дослідження (research) — польове дослідження, обмеження дослідження
