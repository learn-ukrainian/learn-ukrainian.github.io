module: b2-091
level: B2
sequence: 91
slug: modern-diaspora
version: '1.1'
title: "Сучасна діаспора: Україна поза межами"
subtitle: "Сучасна діаспора: Україна поза кордонами"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Зрозуміти структуру та роль української діаспори у світі, особливо після масштабного
    вторгнення 2022 року."
  - "Опанувати лексику, пов'язану з міграцією, інтеграцією та збереженням культурної
    спадщини."
  - "Навчитися обговорювати взаємовплив діаспори та материкової України."
  - "Розвинути навички проведення інтерв'ю та написання репортажів про життя українців
    за кордоном."

reading_situations:
  - source_type: "аналітична стаття"
    topic: "Нова хвиля міграції: як українці адаптуються та створюють громади в країнах
      ЄС."
    key_elements: ["асиміляція", "інтеграція", "волонтерський рух", "самоорганізація"]
    motivation: "Аналіз сучасних соціальних процесів у середовищі української діаспори."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з представником Світового Конґресу Українців про стратегічні
      цілі діаспори."
    focus_points: ["адвокація", "лобіювання інтересів", "культурні проєкти"]
    motivation: "Розуміння функцій міжнародних громадських організацій."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть есе-рефлексію на тему: 'Що означає бути частиною української
      діаспори у XXI столітті?' або 'Як діаспора допомагає Україні перемогти?'."
    requirements: ["мінімум 250 слів", "використання лексики модуля: діаспора, ідентичність,
          інтеграція, адвокація", "особисті приклади або факти"]
    motivation: "Перевірка здатності висловлюватися на тему національної ідентичності
      та міграції."
    model_answer: "Есе має поєднувати особисту рефлексію з фактичним аналізом ролі
      діаспори, використовуючи конкретні приклади (волонтерський рух, лобіювання,
      збереження мови)."

discussion_topics:
  - context: "Питання ідентичності та повернення: виклики для українців за кордоном."
    questions:
      - "Що допомагає зберігати мову та культуру в іншому середовищі?"
      - "Як змінилося поняття 'діаспора' після 2022 року?"
      - "Чи можливо ефективно допомагати Україні, живучи в іншій країні?"
    motivation: "Обговорення особистих та колективних аспектів національної приналежності."

content_outline:
  - section: "Хвилі міграції: від поселенців до біженців"
    words: 1000
    subsections:
      - "Історичні хвилі української еміграції: причини та напрямки"
      - "Новітня міграція (після 2014 та 2022 років): особливості та масштаби"
      - "Лексика на позначення міграційних статусів та процесів"
    key_concepts:
      - "еміграція"
      - "репатріація"
      - "міграційний статус"
      - "вимушені переселенці"
  - section: "Структура та інституції діаспори"
    words: 1000
    subsections:
      - "Світовий Конґрес Українців (СКУ) та інші координаційні центри"
      - "Українська церква та громадські організації за кордоном"
      - "Суботні та недільні школи як осередки збереження мови"
    key_concepts:
      - "громада"
      - "осередок"
      - "координація"
      - "статут"
  - section: "Культурна спадщина та мовна стійкість"
    words: 1000
    subsections:
      - "Збереження традицій: свята, ремесла та фольклор у діаспорі"
      - "Мовна ситуація: двомовність, діаспорні діалекти та вивчення української"
      - "Медіа-простір діаспори: газети, радіо, соціальні мережі"
    key_concepts:
      - "спадщина"
      - "асиміляція"
      - "мовне середовище"
      - "наступність"
  - section: "Діаспора як суб'єкт глобальної політики та економіки"
    words: 1000
    subsections:
      - "Лобіювання інтересів України на міжнародній арені (адвокація)"
      - "Інвестиційний та фінансовий внесок діаспори у розвиток України"
      - "Культурна дипломатія 'народного' рівня: як діаспора формує імідж України"
    key_concepts:
      - "адвокація"
      - "лобіювання"
      - "грошові перекази"
      - "імідж"

vocabulary:
  required:
    - діаспора
    - еміграція
    - громада
    - ідентичність
    - інтеграція
    - кордон
    - підтримка
    - спадщина
  recommended:
    - закордонний
    - національний
    - волонтерський
    - солідарність
    - громадський

activities:
  types_required:
    - fill-in
    - match-up
    - true-false
    - select
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: reading
    focus: "Прочитати текст про діаспору та визначити основні теми, ключові факти
      та авторську позицію."
  - type: essay-response
    focus: "Доповнити текст специфічною лексикою діаспори (еміграція, інтеграція,
      адвокація, громада)."
  - type: select
    focus: "Визначити характерні риси 'діаспорної' української мови у текстовому уривку."
  - type: essay-response
    focus: "Написати рефлексивний текст про значення діаспори для збереження ідентичності."

references:
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Тематичні тексти: суспільство,
    діаспора"
  - "Глазова О. П. Українська мова. 11 клас (2019) — Тематична лексика для ЗНО"
  - "State Standard 2024: B2 SS 3 — Thematic areas: суспільство, діаспора"

connects_to:
  previous: "mystetstvo-i-literatura"
  next: "religion-in-ukraine"
phase: B2.3 [Skills & Checkpoint]
