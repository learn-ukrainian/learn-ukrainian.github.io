module: b2-084
level: B2
sequence: 84
slug: modern-diaspora
version: '1.0'
title: "Сучасна діаспора: Україна поза межами"
subtitle: "Modern Diaspora: Ukraine Beyond Borders"
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
  - "Зрозуміти структуру та роль української діаспори у світі, особливо після масштабного вторгнення 2022 року."
  - "Опанувати лексику, пов'язану з міграцією, інтеграцією та збереженням культурної спадщини."
  - "Навчитися обговорювати взаємовплив діаспори та материкової України."
  - "Розвинути навички проведення інтерв'ю та написання репортажів про життя українців за кордоном."

reading_situations:
  - source_type: "аналітична стаття"
    topic: "Нова хвиля міграції: як українці адаптуються та створюють громади в країнах ЄС."
    key_elements: ["асиміляція", "інтеграція", "волонтерський рух", "самоорганізація"]
    motivation: "Аналіз сучасних соціальних процесів у середовищі української діаспори."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з представником Світового Конґресу Українців про стратегічні цілі діаспори."
    focus_points: ["адвокація", "лобіювання інтересів", "культурні проєкти"]
    motivation: "Розуміння функцій міжнародних громадських організацій."

discussion_topics:
  - context: "Питання ідентичності та повернення: виклики для українців за кордоном."
    questions:
      - "Що допомагає зберігати мову та культуру в іншому середовищі?"
      - "Як змінилося поняття 'діаспора' після 2022 року?"
      - "Чи можливо ефективно допомагати Україні, живучи в іншій країні?"
    motivation: "Обговорення особистих та колективних аспектів національної приналежності."

