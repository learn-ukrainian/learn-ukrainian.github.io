module: b2-58
level: B2
sequence: 58
slug: synonyms-quality
version: '2.0'
title: 'Синоніми: Якість та Оцінка'
subtitle: Synonyms - Quality and Evaluation
content_outline:
- section: Вступ та сфери оцінювання (Introduction and Evaluation Spheres)
  words: 600
  points:
  - 'QA-інженерний підхід до оцінки: чим відрізняється технічна якість продукту (хороший)
    від візуального інтерфейсу та дизайну (гарний)'
  - 'Розмежування тріади «добрий — хороший — гарний»: розгляд морального, функціонального
    та естетичного аспектів оцінки за контекстом'
  - 'Культурний гачок: обговорення прислів''я «Добре ім''я — найкраще багатство» як
    приклад високої репутаційної та моральної оцінки'
- section: 'Позитивна оцінка: Відтінки досконалості (Positive Evaluation: Nuances
    of Excellence)'
  words: 1000
  points:
  - Аналіз вживання «хороший» для характеристики фахівців (хороший фахівець) та результатів
    роботи (хороший результат) згідно з частотними даними
  - 'Семантична багатогранність «добрий»: від етичної характеристики (добра людина)
    до утилітарної користі (добрий урожай, добрий день)'
  - 'Естетична оцінка «гарний»: специфіка вживання для опису зовнішності (гарна дівчина),
    погоди та краєвидів'
  - 'Градація інтенсивності похвали: від стандартного «хороший» до емоційного «чудовий»
    (висока оцінка) та піднесеного «прекрасний»'
  - 'Народна мудрість про скромність якості: аналіз вислову «Добро не лихо, ходить
    тихо»'
- section: Негативна оцінка та стилістичне забарвлення (Negative Evaluation and Stylistic
    Coloring)
  words: 900
  points:
  - 'Універсальність слова «поганий» для загального негативного контексту: настрій,
    погода, звички та самопочуття'
  - 'Learner error: виправлення помилкового вживання «злий» для якості предметів (напр.
    «злий фільм») — розмежування з емоційною характеристикою (злий собака, злий жарт)'
  - 'Експресивна оцінка в розмовному регістрі: вживання слова «кепський» (кепські
    справи, мати кепський вигляд) як синоніма до «поганий»'
  - 'Інтенсифікація негативу: семантична різниця між «жахливий» (викликає страх/сильне
    розчарування) та «огидний» (викликає відразу)'
- section: Аналіз типових помилок та стилістика (Error Analysis and Stylistics)
  words: 800
  points:
  - 'Типова помилка B2: «Він гарний студент» (handsome) vs «Він хороший студент» (skilled/diligent)
    — дрилі на розрізнення якостей'
  - 'Нюанси персоніфікації: чому «добра книжка» сприймається як гуманістична, тоді
    як для оцінки якості тексту слід вживати «хороша книжка»'
  - 'Державний стандарт §4.4.1.2: синонімічний ряд на позначення часу та якості (старий,
    старовинний, давній, древній, архаїчний) — стилістичні відмінності'
  - 'Моральний кодекс у мові: обговорення принципу взаємності через народну мудрість
    «Хочеш собі добра — не роби нікому зла»'
- section: 'Практика: QA-рецензування та оцінка (Practice: QA Review and Evaluation)'
  words: 700
  points:
  - 'Рольова гра в стилі QA-інженера: написання технічного звіту про «кепську» роботу
    додатку та рецензії на «чудове» оновлення'
  - 'Трансформація тексту: переписування нейтрального опису продукту на емоційно забарвлену
    публіцистичну статтю з використанням 5+ оцінних синонімів'
  - 'Вправа на вибір синоніма відповідно до регістру: новина vs приватний лист vs
    офіційна рецензія'
focus: phraseology
pedagogy: CBI
objectives:
- Учень може розрізняти відтінки значень синонімів на позначення якості
- Учень вміє вживати оцінну лексику відповідно до контексту та регістру
grammar:
- Nuances in evaluative adjectives
- Register and subjective judgment
immersion: 100
register: публіцистичний
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - хороший (good) — хороший фахівець, хороший результат; вживається для загальної
    якості
  - добрий (kind/good) — добра людина, добрий урожай; моральна характеристика або
    корисність
  - гарний (nice/beautiful) — гарна дівчина, гарний краєвид; візуальна або естетична
    оцінка
  - поганий (bad) — поганий настрій, погана звичка; універсальна негативна оцінка
  - злий (evil/angry) — злий собака, злий жарт, злий як чорт; моральна або емоційна
    характеристика
  recommended:
  - кепський (lousy) — кепські справи, мати кепський вигляд; розмовне, емоційне
  - чудовий (wonderful) — чудовий день, чудова нагода; високий ступінь похвали
  - огидний (disgusting) — огидний вчинок, огидний запах; сильна негативна реакція
  - старовинний (ancient/antique) — старовинний замок; акцент на історичній цінності
  - архаїчний (archaic) — архаїчний вираз; акцент на застарілості
