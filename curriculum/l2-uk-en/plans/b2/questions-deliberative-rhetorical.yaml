module: b2-050
level: B2
sequence: 50
slug: questions-deliberative-rhetorical
version: 1.0.1
title: 'Питальні речення: делібератив, риторика, вкладені'
subtitle: 'Питальні речення: делібератив, риторика, вкладені'
focus: grammar
pedagogy: TTT
word_target: 4000
phase: B2.4 [Domain Vocabulary & Advanced Cases]
objectives:
- Розрізняти деліберативні (роздумові), риторичні та вкладені питальні речення.
- Вживати деліберативні запитання для вираження роздумів та сумнівів.
- Використовувати риторичні запитання як стилістичний засіб переконання.
- Будувати вкладені (непрямі) запитання у складнопідрядних реченнях.
reading_situations:
- source_type: публіцистична стаття
  topic: 'Авторська колонка про майбутнє освіти: автор використовує риторичні та деліберативні запитання для побудови аргументації.'
  key_elements:
  - риторичні запитання
  - деліберативні запитання
  - непрямі запитання в підрядних реченнях
  motivation: Аналіз функцій питальних речень у переконувальному тексті.
listening_situations:
- media_type: відео
  setting: 'Парламентські дебати: депутати використовують риторичні запитання для впливу на аудиторію.'
  focus_points:
  - інтонація риторичних запитань
  - деліберативні паузи
  - непрямі запитання в аргументації
  motivation: Розвиток навичок розпізнавання типів запитань на слух.
writing_tasks:
- task_type: есе
  prompt: Напишіть переконувальне есе на тему 'Чи варто вводити обов'язкову воєнну підготовку в школах?' Використайте всі
    три типи запитань.
  requirements:
  - мінімум 300 слів
  - щонайменше 3 риторичні запитання
  - щонайменше 2 деліберативні запитання
  - щонайменше 2 вкладені (непрямі) запитання
  motivation: Практика всіх типів питальних речень у публіцистичному стилі.
  model_answer: 'Текст має демонструвати стратегічне вживання: ''Чи має право держава вирішувати за дитину? (риторичне). Я
    замислююся: а що, якби кожний учень... (деліберативне). Залишається питання, чи готові школи до таких змін (вкладене)...'''
discussion_topics:
- context: 'Мовна політика в Україні: чи повинна держава регулювати мову?'
  questions:
  - Хто має право вирішувати, якою мовою говорити? (риторичне)
  - А якщо людина не знає української — чи це привід для покарання? (деліберативне)
  motivation: Дискусія з усвідомленим вживанням різних типів запитань.
dialogue_situations:
- setting: 'Колеги обговорюють новий проект: один роздумує вголос, інший ставить гострі запитання.'
  roles:
  - колега 1 (роздумує)
  - колега 2 (провокує)
  key_phrases:
  - а що, якщо це не спрацює?
  - хіба це не очевидно?
  - мене цікавить, чи врахували ви ризики
- setting: Журналіст бере інтерв'ю у політика, ставлячи непрямі та провокативні запитання.
  roles:
  - журналіст
  - політик
  key_phrases:
  - хотілося б дізнатися, чи плануєте ви...
  - невже ви вважаєте, що...
  - залишається питання, як саме...
content_outline:
- section: Деліберативні (роздумові) запитання
  words: 1000
  subsections:
  - 'Визначення: запитання, звернене до себе або аудиторії без очікування відповіді'
  - 'Формальні ознаки: інтонація роздуму, частки ''а що, якщо...'', ''може...'''
  - 'Функції: вираження сумніву, зважування варіантів, залучення аудиторії'
  - 'Пунктуація: знак питання чи крапка? (залежно від контексту)'
  key_concepts:
  - делібератив
  - роздум
  - сумнів
- section: Риторичні запитання як стилістичний засіб
  words: 1000
  subsections:
  - 'Визначення: запитання з очевидною для мовця відповіддю'
  - 'Функції: підсилення твердження, емоційний вплив, іронія'
  - 'Типові моделі: хіба не..., невже..., як можна...'
  - Риторичні запитання в публіцистиці, ораторстві та літературі
  key_concepts:
  - риторика
  - переконання
  - стилістичний засіб
- section: Вкладені (непрямі) запитання
  words: 1000
  subsections:
  - 'Структура: головне речення + підрядне з питальним словом (я не знаю, де він)'
  - 'Сполучники: чи, як, де, коли, скільки, який — у ролі підрядних засобів'
  - 'Пунктуація: крапка замість знака питання, коли запитання — частина розповідного речення'
  - 'Трансформація прямого запитання у непряме: зміна порядку слів та інтонації'
  key_concepts:
  - непряме запитання
  - складнопідрядне речення
  - підрядне з'ясувальне
- section: Запитання у різних стилях та жанрах
  words: 1000
  subsections:
  - 'Журналістське інтерв''ю: типи запитань та їхня стратегія'
  - 'Судові запитання: формулювання, що спрямовує свідка'
  - 'Академічна дискусія: запитання як інструмент пізнання'
  - 'Порівняння з англійською: embedded questions та їх відповідники'
  key_concepts:
  - стратегія запитування
  - комунікативна мета
  - жанрова специфіка
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary_hints:
- word: питальний
  translation: interrogative
  context: Питальне речення вимагає знака питання.
- word: риторичний
  translation: rhetorical
  context: Риторичне запитання не потребує відповіді.
- word: підрядний
  translation: subordinate
  context: Підрядне речення залежить від головного.
- word: сумнів
  translation: doubt
  context: Деліберативне запитання виражає сумнів.
- word: переконання
  translation: persuasion, conviction
  context: Риторичне запитання — засіб переконання.
- word: інтонація
  translation: intonation
  context: Інтонація розрізняє типи запитань.
- word: хіба
  translation: is it possible that (rhetorical particle)
  context: Хіба це не очевидно?
- word: невже
  translation: really? (incredulity particle)
  context: Невже ви цього не знали?
- word: трансформація
  translation: transformation
  context: Трансформація прямого запитання у непряме.
- word: формулювання
  translation: wording, formulation
  context: Точне формулювання запитання — мистецтво.
- word: аргументація
  translation: argumentation
  context: Риторичні запитання підсилюють аргументацію.
- word: ораторство
  translation: oratory
  context: Ораторське мистецтво використовує риторичні запитання.
- word: іронія
  translation: irony
  context: Риторичне запитання може виражати іронію.
- word: з'ясувальний
  translation: explanatory (subordinate clause type)
  context: Підрядне з'ясувальне відповідає на питання 'що?'
- word: стратегія
  translation: strategy
  context: Стратегія запитування залежить від мети розмови.
- word: провокативний
  translation: provocative
  context: Провокативне запитання змушує задуматися.
