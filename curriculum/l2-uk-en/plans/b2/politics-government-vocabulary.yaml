module: b2-044
level: B2
sequence: 44
slug: politics-government-vocabulary
version: '1.2'
title: "Політика та державне управління: Лексика"
subtitle: "Політика та влада: лексика"
focus: vocabulary
pedagogy: PPP
phase: "B2.1c [Register System & Domain Vocabulary]"
word_target: 4000
objectives:
  - "Засвоїти ключову термінологію, що стосується державного устрою, гілок влади та
    виборчого процесу."
  - "Навчитися обговорювати актуальні політичні події, використовуючи відповідні лексичні
    одиниці."
  - "Розуміти та аналізувати публіцистичні тексти на політичну тематику (новини, промови,
    аналітичні статті)."
  - "Вивчити специфічні абревіатури та назви державних інституцій України."
  - "Вміти висловлювати та аргументувати власну політичну позицію, дотримуючись етичних
    норм дискусії."

reading_situations:
  - source_type: "політична новина / аналітична стаття"
    topic: "Аналіз передвиборчої програми кандидата або звіту про діяльність уряду."
    key_elements: ["політичні гасла", "статистичні дані", "риторичні фігури"]
    motivation: "Розвиток навичок критичного читання та розуміння механізмів політичного
      впливу."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Інтерв'ю з політичним експертом про реформування системи державного
      управління в Україні."
    focus_points: ["Розпізнавання маніпулятивних технік.", "Сприйняття офіційної риторики.",
      "Розуміння ключових тез доповідача."]
    motivation: "Тренування сприйняття швидкого, термінологічно насиченого мовлення."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть короткий есе на тему: 'Роль громадянського суспільства у розвитку
      демократії в Україні'. Використовуйте щонайменше 10 нових термінів."
    requirements:
      - "чітка структура (вступ, аргументи, висновок)"
      - "використання засобів публіцистичного стилю"
      - "логічність та переконливість викладу"
      - "мінімум 200 слів"
    motivation: "Практичне застосування термінології для висловлення складних суспільних
      ідей."
    model_answer: "Есе має містити такі терміни, як 'демократичні цінності', 'підзвітність
      влади', 'громадський контроль', 'суверенітет', 'правова держава'. Автор повинен
      аргументувати, як активність громадян впливає на прозорість державних процесів
      та запобігання корупції. Очікується високий рівень зв'язності тексту та використання
      вставних слів для структурування аргументів."

discussion_topics:
  - context: "Електронне врядування (Digital Government): майбутнє демократії чи загроза
      приватності?"
    questions:
      - "Як цифровізація змінює взаємодію між громадянином та державою?"
      - "Чи можуть алгоритми замінити чиновників у прийнятті рішень?"
      - "Які ризики несе в собі перехід політичних дебатів у соціальні мережі?"
    motivation: "Розвиток навичок ведення дискусії на стику політики та технологій."

content_outline:
  - section: "Державний устрій та влада"
    words: 800
    subsections:
      - "Гілки влади: законодавча (Верховна Рада), виконавча (Кабінет Міністрів),
        судова"
      - "Форми державного правління: президентська, парламентська та змішана республіки"
      - "Адміністративно-територіальний поділ України та реформа децентралізації"
      - "Повноваження державних органів та система стримувань і противаг"
    key_concepts:
      - "суверенітет"
      - "конституція"
      - "повноваження"
      - "децентралізація"
  - section: "Виборчий процес та політичні партії"
    words: 1200
    subsections:
      - "Виборчі системи: мажоритарна, пропорційна, змішана"
      - "Етапи виборчої кампанії: реєстрація, агітація, день тиші, підрахунок голосів"
      - "Політичний ідеологічний спектр: ліві, праві, центристи, ліберали, консерватори"
      - "Роль політичних партій у представництві інтересів громадян"
      - "Електоральна поведінка та чинники впливу на вибір виборця"
    key_concepts:
      - "баллотування"
      - "коаліція"
      - "опозиція"
      - "електорат"
      - "маніпуляція"
  - section: "Міжнародна політика та дипломатія"
    words: 1000
    subsections:
      - "Дипломатичний протокол та етикет: посольства, консульства, місії"
      - "Україна на міжнародній арені: стратегічне партнерство та євроінтеграція"
      - "Міжнародні організації (ООН, НАТО, ЄС, РЄ) та їхній вплив на глобальну політику"
      - "Геополітика, санкційна політика та механізми мирного врегулювання конфліктів"
      - "Ратифікація міжнародних договорів та меморандумів"
    key_concepts:
      - "ратифікація"
      - "меморандум"
      - "саміт"
      - "інтеграція"
      - "дипломатія"
  - section: "Громадянське суспільство та політична комунікація"
    words: 1000
    subsections:
      - "Свобода слова, цензура та відповідальність медіа в політичному дискурсі"
      - "Громадські організації, волонтерський рух та політичний активізм"
      - "Пропаганда, дезінформація та фейки: як розпізнати політичні маніпуляції"
      - "Політичний піар та технології формування іміджу політика"
      - "Прозорість влади та відкриті дані як інструменти демократії"
    key_concepts:
      - "люстрація"
      - "популізм"
      - "прозорість"
      - "активізм"
      - "демократія"

vocabulary:
  required:
    - уряд
    - законопроєкт
    - вибори
    - демократія
    - корупція
    - реформа
    - повноваження
    - суверенітет
  recommended:
    - впровадження
    - взаємодія
    - підзвітність
    - верховенство права
    - геополітичний
    - стабільність
    - лобіювання
    - легітимність

activities:
  types_required:
    - quiz
    - fill-in
    - match-up
    - select
  min_items_per_type: 8
  total_min_items: 32

activity_hints:
  - type: match-up
    description: "Ukrainian political term matched to its definition (e.g., суверенітет↔повна
      незалежність держави)"
  - type: fill-in
    description: "Complete a political news text with correct terms (e.g., Верховна
      Рада ухвалила ___)"
  - type: group-sort
    description: "Sort vocabulary into суспільно-політична vs побутова лексика"
  - type: error-correction
    description: "Fix Russianisms in political language (e.g., 'вибори пройшли'→'вибори
      відбулися', 'рішаючий голос'→'вирішальний голос')"

references:
  - "Глазова, 11 клас (2019): §11-15 — Лексична норма, термінологія, професійна лексика"
  - "Заболотний, 11 клас (2019): Стилістичні норми — офіційно-діловий стиль, термінологія"
  - "Авраменко, 11 клас (2019): Лексикологія — терміни, професіоналізми, запозичення"
  - "State Standard 2024: B2 SS 3 (Thematic areas: суспільство, право, економіка)"

connects_to:
  previous: "checkpoint-register"
  next: "law-justice-vocabulary"
