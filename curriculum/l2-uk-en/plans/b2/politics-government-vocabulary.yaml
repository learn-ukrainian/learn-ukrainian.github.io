vocabulary_hints:
  required:
  - влада (power/authority) — законодавча, виконавча, судова; органи державної влади
  - закон (law) — ухвалити закон, порушити закон, згідно із законом, верховенство
    закону (high frequency)
  - громада (community/hromada) — територіальна громада, об’єднана територіальна громада
    (ОТГ); ключовий термін децентралізації
  - депутат (MP/deputy) — народний депутат, звернення депутата, депутатська недоторканність
  - громадянський (civil) — громадянські права, громадянське суспільство, громадянський
    обов’язок (contrast with громадський)
  - обирати (to elect) — обирати президента/депутата; термін для офіційного виборчого
    процесу
  recommended:
  - політика (politics/policy) — державна політика, проводити політику, внутрішня/зовнішня
    політика
  - громадський (public) — громадська думка, громадське місце, громадська організація
  - указ (decree) — президентський указ, видати указ
  - вето (veto) — накласти вето, право вето
  - коаліція (coalition) — правляча коаліція, утворити коаліцію
  - опозиція (opposition) — парламентська опозиція, перейти в опозицію
  - демократія (democracy) — крихка демократія, розбудова демократії
