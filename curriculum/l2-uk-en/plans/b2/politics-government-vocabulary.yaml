module: b2-36
level: B2
sequence: 36
slug: politics-government-vocabulary
version: '2.0'
title: Політика та державне управління
subtitle: Мова влади і громадянства
content_outline:
- section: 'Вступ: Політична система та історичне коріння (Introduction: Political
    System & Historical Roots)'
  words: 700
  points:
  - 'Україна як парламентсько-президентська республіка: розподіл влади на законодавчу,
    виконавчу та судову гілки (State Standard §3.7)'
  - 'Конституція Пилипа Орлика (1710) як історичний гачок: розгляд однієї з перших
    конституцій світу, що обмежила владу гетьмана та запровадила ''Генеральну Раду'''
  - 'Актуальність політичної грамотності: права та обов''язки громадянина в сучасній
    демократичній державі'
- section: Державні інституції та органи влади (State Institutions & Organs of Power)
  words: 900
  points:
  - 'Верховна Рада України: єдиний законодавчий орган, поняття депутатської недоторканності
    та архітектурний символ — амфітеатр сесійної зали як ознака підзвітності'
  - 'Кабінет Міністрів: структура уряду, повноваження прем''єр-міністра та функціонування
    міністерств у контексті державної політики'
  - 'Президент України: роль глави держави, право вето на закони та видання указів'
  - 'Місцеве самоврядування: реформа децентралізації, роль територіальних громад (ОТГ)
    та повноваження мера'
- section: Виборчий процес та демократичні механізми (Electoral Process & Democratic
    Mechanisms)
  words: 800
  points:
  - 'Типи виборів (президентські, парламентські, місцеві) та етапи виборчої кампанії:
    від реєстрації кандидата до підрахунку голосів'
  - 'Репрезентативна демократія: опозиція vs правляча коаліція, роль партійних фракцій
    та комітетів у парламенті'
  - 'Культурний контекст: референдум та плебісцит як інструменти прямої демократії
    в історії та сучасності України'
  - 'Нюанси лексики: відпрацювання розрізнення ''обирати'' (для виборів посадових
    осіб) та ''вибирати'' (загальний вибір)'
- section: Лексичні тонкощі та типові помилки (Lexical Nuances & Common Errors)
  words: 800
  points:
  - 'Корекція помилки: ''громадський'' (public/community) vs ''громадянський'' (civil/citizen-related).
    Приклади: громадський транспорт vs громадянське суспільство'
  - 'Поняття ''Політика'' (politics) vs ''Курс/Стратегія'' (policy): розрізнення загальної
    сфери боротьби за владу та конкретних планів дій уряду'
  - 'Термінологія демократії: введення словосполучень ''крихка демократія'', ''розбудова
    демократії'', ''верховенство закону'''
  - 'Законотворчий процес: шлях законопроекту від першого читання до ухвалення та
    підписання'
- section: 'Практика: Медіа та політичний дискурс (Practice: Media & Political Discourse)'
  words: 800
  points:
  - 'Аналіз політичних новин (State Standard §3.18): розрізнення нейтрального офіційно-ділового
    стилю та емоційного публіцистичного стилю'
  - 'Практичне завдання: написання коментаря або звернення до народного депутата/голови
    громади з використанням відповідного регістра'
  - 'Дискусія: обговорення суспільно-політичних подій, вираження власної позиції з
    використанням модальних конструкцій'
focus: grammar
pedagogy: CLIL
objectives:
- Учень може розуміти новини про політичні події в Україні
- Учень може обговорювати політичні теми з використанням відповідної термінології
- Учень може розрізняти офіційний та публіцистичний стилі в політичному дискурсі
grammar:
