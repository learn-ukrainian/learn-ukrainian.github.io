module: b2-05
level: B2
sequence: 5
slug: third-person-plural-passive
version: '2.0'
title: Пасив третьою особою множини
content_outline:
- section: Вступ (Introduction)
  words: 500
  points:
  - Введення в концепцію неозначено-особових речень (indefinite-personal sentences)
    згідно з Державним стандартом §4.3.3.1.
  - 'Рольова модель: Світський оглядач (Gossip Columnist) та використання анонімності
    як інструменту залучення аудиторії.'
  - 'Визначення імпліцитного агента: коли дії важливіші за виконавців (невизначені
    «вони»).'
- section: Граматична база та термінологія (Grammatical Base and Terminology)
  words: 700
  points:
  - 'Механізм утворення: дієслово у 3-й особі множини минулого або теперішнього часу
    без використання займенника «вони».'
  - 'Керування відмінками: Давальний відмінок для адресата (Мені сказали) проти Знахідного
    для об''єкта дії (Книгу взяли).'
  - 'Контраст з англійською мовою: обов''язковість відсутності підмета для досягнення
    справжнього пасивного ефекту.'
- section: Соціокультурний аспект пліток (Sociocultural Aspect of Gossip)
  words: 900
  points:
  - 'Культурний гачок: Плітки (gossip) як «соціальний клей» в українській громаді
    — від історичних сіл до сучасних медіа.'
  - 'Інтеграція народної мудрості: аналіз прислів''я «Чужий рот не хлів — не зачинити»
    у контексті неминучості чуток.'
  - 'Робота з лексикою: розрізнення понять «чутка пішла», «пустити чутку» та «за чутками»
    у повсякденному спілкуванні.'
- section: Порівняння регістрів та аналіз помилок (Register Comparison and Error Analysis)
  words: 1000
  points:
  - 'Типова помилка: Використання надмірного підмета (Вони кажуть) замість природного
    неозначеного «Кажуть».'
  - 'Стилістичний вибір: порівняння розмовного пасиву (Вкрали гаманець) з офіційним
    -но/-то (Гаманець було вкрадено).'
  - 'Помилка повторного введення підмета: чому не можна додавати «хто» у речення,
    де фокус має залишатися на самій дії.'
- section: Практичне застосування та підсумок (Practical Application and Summary)
  words: 900
  points:
  - 'Нарративна практика: переказ світських новин та чуток, використовуючи «Кажуть,
    що...» та «Нам повідомили...».'
  - 'Синтез системи пасиву: вибір між 3-ю особою множини, формами на -ся та -но/-то
    залежно від ситуативного контексту.'
  - 'Підбиття підсумків: як використання цього «найрозмовнішого пасиву» підвищує природність
    мовлення на рівні B2.'
vocabulary_hints:
  required:
  - казати (to say) — «кажуть, що...» (it is said that...), «мені казали» (I was told);
    Very High frequency
  - повідомити (to inform) — «повідомили про...» (it was reported about...), «нам
    повідомили» (we were informed); High frequency in Media/Formal contexts
  - чутка (rumor) — «чутка пішла/пройшла» (rumor spread), «пустити чутку» (start a
    rumor), «за чутками» (rumor has it); High frequency (Spoken)
  - плітка (gossip) — «розпускати плітки» (spread gossip), «плести плітки» (weave
    gossip); High frequency in informal social contexts
  - сказали (they said/was told) — «сказали, що...» (was told that...); High frequency
    marker of the structure
  - запитали (they asked/was asked) — ключовий дієслівний компонент для побутових
    ситуацій
  - пообіцяли (they promised/was promised) — часто вживається у неформальних оповідях
    про взаємодії
  recommended:
  - неозначено-особовий (indefinite-personal) — лінгвістичний термін для узгодження
    зі Стандартом §4.3.3.1
  - соціальний клей (social glue) — метафора для опису культурної ролі пліток у громаді
  - чужий рот не хлів (stranger's mouth is not a barn) — прислів'я про неможливість
    зупинити поширення новин
  - сорока на хвості принесла (magpie brought it on its tail) — ідіома для позначення
    джерела неофіційної інформації
  - побутовий (everyday/domestic) — контекстний маркер для вибору цього типу пасиву
