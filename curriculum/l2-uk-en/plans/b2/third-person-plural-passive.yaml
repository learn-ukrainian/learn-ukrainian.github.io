module: third-person-plural-passive
level: B2
sequence: 5
slug: third-person-plural-passive
version: '1.4'
title: "Неозначено-особові речення як заміна пасиву"
subtitle: "Неозначено-особові речення як пасивна стратегія"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Розуміти функцію 3-ї особи множини у неозначено-особових реченнях для усунення
    діяча."
  - "Використовувати неозначено-особові конструкції як живу та природну альтернативу
    книжному пасиву."
  - "Визначати контексти, де діяч є невідомим, неважливим або навмисно прихованим
    (чутки, новини)."
  - "Впевнено трансформувати штучні пасивні форми (-ся, -но/-то) у динамічні неозначено-особові
    структури."

reading_situations:
  - source_type: "новина"
    topic: "Громадське обговорення нового законопроекту"
    key_elements: ["пропонують", "вимагають", "критикують", "обіцяють врахувати"]
    motivation: "Медіа-тексти часто використовують 3-ю особу множини для створення
      ефекту 'голосу громади' або 'неофіційних джерел'."

listening_situations:
  - media_type: "подкаст"
    setting: "Обговорення міських легенд та чуток про історичні райони міста."
    focus_points: ["Чому спікери використовують 'кажуть', 'розповідають'?", "Чи відомо,
          хто саме є джерелом інформації?", "Зафіксувати вживання минулого часу: 'побудували',
          'називали'."]
    motivation: "Розвиток сприйняття розмовних та напівформальних неозначених структур."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть короткий репортаж про хід реконструкції центральної вулиці,
      фокусуючись на діях, а не на конкретних бригадах чи посадовцях."
    requirements:
      - "мінімум 160 слів"
      - "використати щонайменше 7 неозначено-особових речень"
      - "дотриматися динамічного стилю викладу"
    motivation: "Практика створення текстів з акцентом на процес без згадування суб'єктів."
    model_answer: "Репортаж має містити речення типу: 'Тут міняють асфальт. Вже встановили
      нові ліхтарі. Планують закінчити до свят.' Модель вказує на те, що дієслова
      у множині минулого часу (встановили) також мають неозначено-особове значення."

discussion_topics:
  - context: "Інформаційна гігієна: як ми реагуємо на новини без посилань на джерела?"
    questions:
      - "Чому фраза 'кажуть, що ціни зростуть' викликає таку реакцію?"
      - "В яких ситуаціях доречно приховувати суб'єкта дії?"
    motivation: "Обговорення маніпулятивних та стилістичних можливостей граматики."

content_outline:
  - section: "Синтаксична природа та семантика неозначеної особи"
    words: 1000
    subsections:
      - "Форми дієслова: 3-тя особа множини (теперішній/майбутній час) та множина
        минулого часу."
      - "Логічна відсутність підмета: дія поза конкретним виконавцем."
      - "Порівняння з означено-особовими реченнями (Ми будуємо vs Будують)."
  - section: "Стилістична синонімія та конкуренція з пасивом"
    words: 1200
    subsections:
      - "Переваги перед формами на -ся: уникнення штучності та канцеляризмів."
      - "Динаміка множини проти статики результату (-но, -то)."
      - "Контексти вживання: від базарних чуток до парламентських звітів."
  - section: "Культура мовлення та запобігання граматичним помилкам"
    words: 1000
    subsections:
      - "Заміна конструкцій 'я був запрошений' на 'мене запросили'."
      - "Вживання займенника 'вони' у таких реченнях — типова помилка (треба просто
        'Кажуть', а не 'Вони кажуть')."
      - "Ефект узагальнення та відстороненості."
  - section: "Синтетична практика та стилістична перебудова"
    words: 800
    subsections:
      - "Перетворення офіційного протоколу на розмовний звіт."
      - "Редагування газетного заголовка для надання йому більшої ваги."

vocabulary:
  required:
    - кажуть
    - вважають
    - повідомляють
    - пропонують
    - вимагають
    - сподіваються
    - планують
  recommended:
    - джерело
    - достовірно
    - очевидець
    - резонанс

activities:
  types_required:
    - fill-in
    - select
    - error-correction
    - translate
  min_items_per_type: 6
  total_min_items: 25

activity_hints:
  - type: fill-in
    focus: "Переписати пасивне речення як неозначено-особове з дієсловом у 3-й особі
      множини"
  - type: select
    focus: "Обрати найприродніше формулювання: пасив на -ся, -но/-то чи неозначено-особова
      конструкція"
  - type: error-correction
    focus: "Виправити стилістично незграбні пасивні конструкції, замінивши їх на неозначено-особові"
  - type: translate
    focus: "Перекласти англійські пасивні речення, обираючи між пасивом та неозначено-особовою
      конструкцією"

references:
  - source: "Авраменко, 11 клас (2019)"
    pages: "§25, с. 81–82"
    topic: "Неозначено-особові речення як альтернатива пасиву"
  - source: "Караман, 10 клас (2018)"
    pages: "§75, с. 187"
    topic: "Стан дієслова: активні конструкції замість пасивних"
  - source: "Глазова, 11 клас (2019)"
    pages: "§21, с. 95–96"
    topic: "Конкуренція пасивних та активних конструкцій"

connects_to:
  previous: "reflexive-passive"
  next: "passive-in-context"
prerequisites:
  - reflexive-passive
grammar:
  - "Indefinite-personal sentences (3rd person plural)"
  - "Syntactic synonymy with passive voice"
  - "Tense usage in indefinite constructions"
  - "Avoiding the pronoun 'вони' in these structures"
register: розмовний, публіцистичний
phase: B2.1a [Passive Voice System]
