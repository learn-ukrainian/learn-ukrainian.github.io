content_outline:
- section: 'Вступ: Природа пасивного стану (Introduction: The Nature of Passive Voice)'
  words: 500
  points:
  - 'Визначення пасивного стану та його роль у структуруванні інформації: зміщення акценту з виконавця на об''єкт чи результат
    дії.'
  - 'Культурний аспект суб''єктності: обговорення сучасної тенденції до активних конструкцій («Ми перемогли») замість пасивних
    («Ворога було переможено») для підкреслення агентності та відповідальності нації.'
  - Огляд чотирьох основних стратегій вираження пасивності в українській мові залежно від стилістичного регістру (наука, право,
    розмова).
- section: 'Форма 1: Пасивні дієприкметники на -ний/-тий (Form 1: Passive Participles in -nyi/-tyi)'
  words: 800
  points:
  - Механізм утворення від перехідних дієслів доконаного виду (написати → написаний) та правила узгодження в роді, числі та
    відмінку з іменником.
  - 'Пасив у науковому етикеті: використання дієприкметникових форм для створення дистанції та об''єктивності викладу (заміна
    «я вважаю» на «вважається», «досліджено», «встановлено»).'
  - 'Синтаксичні особливості: вживання з допоміжним дієсловом «бути» у минулому та майбутньому часі та роль дієприкметника
    як присудка.'
- section: 'Форма 2: Безособові конструкції на -но/-то (Form 2: Impersonal Constructions in -no/-to)'
  words: 1000
  points:
  - Утворення незмінних безособових форм від пасивних дієприкметників та їхнє домінування в офіційно-діловому та юридичному
    стилях.
  - 'Аналіз державних документів: використання форм на -но/-то в Конституції України та Акті проголошення незалежності («Закон
    прийнято», «Державу проголошено») для констатації завершених фактів.'
  - 'Критична заборона: неможливість вживання агента (виконавця) в орудному відмінку з формами на -но/-то (Learner error:
    виправлення конструкцій на кшталт «Закон прийнято депутатами»).'
  - 'Специфіка керування: об''єкт дії у знахідному відмінку (Книгу написано) як ознака чистого пасивного значення.'
- section: 'Форма 3: Зворотний пасив із суфіксом -ся (Form 3: Reflexive Passive with -sia)'
  words: 600
  points:
  - Вираження пасивності через зворотні дієслова недоконаного виду (будуватися, писатися) для опису тривалих процесів або
    регулярних дій.
  - 'Технічний та інструктивний регістр: опис процедур та інструкцій («Питання розглядається», «Посилка відправляється»).'
  - 'Стилістичне застереження щодо надмірного вживання -ся там, де активна конструкція звучить природніше (Learner error:
    уникання штучних речень типу «Цей будинок будується робітниками»).'
- section: 'Форма 4: Неозначено-особові речення (Form 4: Indefinite Personal Sentences)'
  words: 400
  points:
  - Використання третьої особи множини без підмета («Мені сказали», «Нас запросили») як функціонального замінника пасиву в
    розмовному стилі.
  - 'Імпліцитний агент: коли виконавець дії невідомий, неважливий або свідомо прихований мовцем.'
- section: Вибір форми та корекція типових помилок (Form Selection and Error Correction)
  words: 700
  points:
  - 'Подолання інтерференції: деконструкція англомовної кальки «було зроблено» (was done) — трансформація у природний актив
    або безособову форму («зроблено»).'
  - 'Матриця відповідності стилів: практичні сценарії вибору між -но/-то (бюрократія), -ся (процес) та неозначено-особовою
    формою (розмова).'
  - 'Agency Pass: лінгвістичний аналіз ситуацій, коли пасивний стан приховує відповідальність, і практика відновлення активної
    суб''єктності.'
vocabulary_hints:
  required:
  - пасивний стан (passive voice) — вживати пасивний стан, форми пасивного стану; граматичний термін
  - дієприкметник (participle) — пасивний дієприкметник, утворити дієприкметник; середня частотність
  - безособовий (impersonal) — безособове речення, безособова форма на -но/-то; ключова категорія
  - агент (agent) — виконавець дії, опущення агента; науковий термін, низька частотність
  - регістр (register) — офіційний регістр, науковий стиль; поняття функціональних стилів
  - офіційно-діловий (official/bureaucratic) — вживання у документах, правовий контекст
  - науковий (scientific) — науковий етикет, об'єктивність викладу
  - літературний (literary) — використання у художньому та публіцистичному стилях
  - розмовний (colloquial) — неформальне спілкування, вживання неозначено-особових форм
  - зворотний (reflexive) — зворотне дієслово, суфікс -ся
  - узгодження (agreement) — узгодження дієприкметника з іменником у роді, числі та відмінку
  - виконавець (performer/doer) — синонім до терміну 'агент'
  - суб'єктність (subjectivity/agency) — підкреслення ролі виконавця дії
  recommended:
  - вважається (it is considered) — кліше наукового етикету для об'єктивності
  - досліджено (it has been researched) — форма на -но для представлення результатів
  - встановлено (it has been established) — канцеляризм для констатації факту
  - концепція (concept) — об'єкт наукового пасиву
  - закон прийнято (the law is passed) — стала формула офіційного стилю
  - трансформація (transformation) — перехід з активу в пасив
  - калька (calque) — помилка через дослівний переклад з іншої мови
