activity_hints:
- type: error-correction
  focus: Виправити ненормативні пасивні конструкції (кальки з англійської та російської)
- type: select
  focus: 'Обрати доречну конструкцію: активний стан vs пасивний стан залежно від стилю'
- type: group-sort
  focus: 'Класифікувати речення за типом пасиву: -но/-то vs -ся vs неозначено-особове'
- type: fill-in
  focus: Вписати правильну форму орудного відмінка для знаряддя дії (не діяча)
- type: reading
  focus: Знайти та ідентифікувати всі пасивні конструкції в науковому тексті
