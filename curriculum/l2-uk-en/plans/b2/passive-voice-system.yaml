module: b2-001
level: B2
sequence: 1
slug: passive-voice-system
version: 1.4.1
title: Система пасивного стану в українській мові
subtitle: Система пасивного стану в українській мові
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Розуміти функціонування пасивних конструкцій у різних стилях мовлення (науковому, офіційному, публіцистичному).
- 'Розрізняти типи пасиву: безособові форми на -но, -то, конструкції з дієприкметниками та зворотні форми на -ся.'
- Уникати кальок та неприродних конструкцій при перекладі з англійської чи російської мов.
- Застосовувати орудний відмінок для позначення знаряддя дії, а не діяча в безособових реченнях.
reading_situations:
- source_type: наукова стаття
  topic: 'Екологічні виклики сучасної України: моніторинг стану водних ресурсів'
  key_elements:
  - здійснюватися
  - було встановлено
  - програма впроваджується
  - забруднення (n)
  motivation: Продемонструвати вживання пасивних конструкцій у контексті наукового звіту про стан довкілля.
listening_situations:
- media_type: відео
  setting: 'Випуск новин: звіт про результати міжнародного саміту в Києві.'
  focus_points:
  - Які рішення було прийнято?
  - Ким було підписано декларацію?
  - Виявити фрази на кшталт 'реформи впроваджуються'.
  motivation: Розвиток навичок аудіювання в офіційно-публіцистичному контексті з акцентом на пасив.
writing_tasks:
- task_type: офіційний лист
  prompt: Напишіть офіційне звернення до міської ради з проханням надати інформацію про стан виконання проекту з оновлення
    паркової зони.
  requirements:
  - мінімум 180 слів
  - 'використати форми на -но, -то (наприклад: ''проект було розпочато'')'
  - використати зворотні дієслова на -ся у значенні процесу
  motivation: Застосування пасивних конструкцій для надання тексту офіційного та об'єктивного тону.
  model_answer: 'Лист має містити чітке формулювання запиту. Зразок: ''Згідно з планом, реконструкцію парку було завершено
    минулого місяця. Проте, мешканцями було помічено певні недоліки...'' (тут вчитель має вказати на помилку ''мешканцями
    помічено'' і запропонувати ''мешканці помітили''). Модельний текст акцентує увагу на результатах: ''кошти виділено'',
    ''документацію підготовлено''.'
discussion_topics:
- context: 'Роль штучного інтелекту в сучасній освіті: прогрес чи загроза?'
  questions:
  - Як здійснюється контроль за використанням ШІ учнями?
  - Які нові методики розробляються українськими педагогами?
  motivation: Дискусія про абстрактні процеси з використанням відповідної граматики пасиву.
content_outline:
- section: 'Пасивна парадигма: три кити української граматики'
  words: 1000
  subsections:
  - 'Безособові форми на -но, -то: акцент на результаті дії (закон прийнято).'
  - 'Зворотні дієслова на -ся: акцент на процесі в офіційному стилі (роботи тривають, план розробляється).'
  - 'Пасивні дієприкметники: їхня роль у творенні складних конструкцій.'
- section: Стилістична доцільність та переваги активних конструкцій
  words: 1200
  subsections:
  - Офіційно-діловий та науковий стилі як основна сфера вживання пасиву.
  - 'Порівняння активних та пасивних структур: чому ''батько купив хату'' краще за ''хата була куплена батьком''.'
  - Уникнення нагромадження форм на -ся.
- section: 'Культура мовлення: типові помилки та анти-кальки'
  words: 1000
  subsections:
  - 'Заборона вживання орудного відмінка діяча при формах на -но, -то (не можна: ''закон прийнято радою'', треба: ''рада прийняла
    закон'').'
  - Розрізнення знаряддя дії та виконавця (міст збудовано технікою — ТАК, міст збудовано робітниками — НІ).
- section: 'Синтез: аналіз офіційної документації'
  words: 800
  subsections:
  - 'Аналіз тексту угоди: виявлення пасивних зобов''язань.'
  - Трансформація тексту з розмовного (активного) стилю в офіційний (пасивний).
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
