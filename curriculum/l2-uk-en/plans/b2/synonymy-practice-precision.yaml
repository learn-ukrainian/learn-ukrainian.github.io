module: b2-056
level: B2
sequence: 56
slug: synonymy-practice-precision
version: '2.0'
title: Точність слововживання
subtitle: Word Precision and Synonymic Choice
focus: vocabulary
pedagogy: TTT
phase: B2.6 [Lexicology]
word_target: 4000
objectives:
- Learner can identify and correct Russianisms resulting from synonym confusion
- Learner can detect and eliminate pleonasms and tautology in texts
- Learner can select the precise synonym based on intensity, connotation, and collocability
- Learner can edit texts systematically for lexical precision
content_outline:
- section: Вступ — чому точність має значення (Introduction — Why Precision Matters)
  words: 600
  points:
  - 'Точність як ознака мовної компетенції B2: перехід від «приблизного» до «точного» слововживання; роль синонімічного вибору
    в якості тексту.'
  - 'Наслідки неточності: як неправильний синонім змінює значення (напр., «економний» vs «скупий» — комплімент чи образа?);
    реальні комунікативні невдачі.'
  - 'Мета модуля: від теоретичних знань про синонімію (модулі 54-55) до практичного навику точного слововживання у власному
    мовленні.'
- section: Типові помилки синонімії та русизми (Common Synonym Errors and Russianisms)
  words: 800
  points:
  - 'Русизми через синонімічне змішування: «вірний» замість «правильний» (вірний друг vs правильна відповідь), «рахувати»
    замість «вважати» (я вважаю, що...), «любий» замість «будь-який».'
  - 'Кальки з російської: «приймати участь» замість «брати участь», «приймати міри» замість «вживати заходів»; системне виправлення
    через синонімічний аналіз.'
  - 'Хибні друзі серед синонімів: пари, де українське та російське слово виглядають однаково, але мають різні відтінки (напр.,
    «неділя» — «воскресенье» vs «тиждень»).'
  - 'Діагностична вправа: тест на виявлення русизмів у власному мовленні; складання особистого «чорного списку» помилок.'
- section: Плеоназм і тавтологія (Pleonasm and Tautology)
  words: 700
  points:
  - 'Визначення плеоназму: зайве слово в сполученні, що дублює значення іншого (вільна вакансія, власна автобіографія, передовий
    авангард); причини виникнення.'
  - 'Визначення тавтології: повторення однокореневих або близькозначних слів (масляне масло, працювати на роботі); відмінність
    від стилістичного повтору як фігури мови.'
  - 'Найчастіші плеоназми в українському мовленні: «спільна співпраця», «пам''ятний сувенір», «місцевий абориген», «моя особиста
    думка» — практика виявлення та усунення.'
  - 'Редагування: перетворення громіздких речень на точні та лаконічні через усунення плеоназмів та тавтології; правило «кожне
    слово має працювати».'
- section: Контекстний вибір синонімів — вправи (Context-Driven Synonym Selection Drills)
  words: 900
  points:
  - 'Вибір за інтенсивністю: ранжування синонімів у шкалі (тихий — спокійний — мовчазний — мовчкуватий — замкнутий) та вибір
    найточнішого для заданого контексту.'
  - 'Вибір за конотацією: нейтральне vs оцінне слово (розумний — кмітливий — хитрий — підступний); як конотація змінює ставлення
    до описуваного.'
  - 'Вибір за сполучуваністю: лексична сполучуваність як обмеження синонімічного вибору (карі очі, але не *карі стіни; русяве
    волосся, але не *русяві думки).'
  - 'Ситуативні міні-кейси: вибір синоніма для конкретної комунікативної ситуації (лист другу, доповідь на конференції, стаття
    в газеті, художній опис).'
  - 'Зворотний зв''язок: аналіз типових помилок учнів у виборі синонімів із поясненням причин та шляхів виправлення.'
- section: Редагування для точності — просунута практика (Advanced Practice — Editing for Precision)
  words: 1000
  points:
  - 'Редагування «сирого» тексту: виявлення та заміна неточних синонімів, плеоназмів, русизмів та стилістичних невідповідностей
    у зв''язному тексті.'
  - 'Самоперевірка власних текстів: алгоритм ревізії (1. Знайти повтори → 2. Перевірити конотацію → 3. Усунути плеоназми →
    4. Замінити русизми).'
  - 'Порівняння редакцій: аналіз двох версій одного тексту (до та після редагування); обговорення, які заміни покращили текст
    і чому.'
  - 'Творче письмо з обмеженнями: написання тексту без повторення жодного іменника або дієслова більше одного разу; використання
    синонімічних рядів з модуля 54.'
  - 'Побудова особистого «синонімічного словника»: систематизація вивчених синонімів за тематичними групами для подальшого
    використання.'
vocabulary_hints:
  required:
  - точність (precision) — точність слововживання, лексична точність; головна мета модуля
  - плеоназм (pleonasm) — зайве дублювання значення; стилістична помилка (вільна вакансія)
  - тавтологія (tautology) — повторення однокореневих слів; стилістична помилка (працювати на роботі)
  - русизм (Russianism) — лексична калька з російської мови; поширена помилка в українському мовленні
  - калька (calque) — дослівний переклад іншомовного виразу; «приймати участь» замість «брати участь»
  - сполучуваність (collocability) — лексична сполучуваність; здатність слова поєднуватися з іншими
  - конотація (connotation) — позитивна / негативна конотація; додаткове емоційне значення слова
  recommended:
  - лаконічність (conciseness) — стислість та точність висловлювання; протилежне до багатослів'я
  - редагування (editing) — процес виправлення та вдосконалення тексту
  - контамінація (contamination) — змішування двох сталих виразів; «грати значення» замість «відігравати роль» або «мати значення»
  - інтенсивність (intensity) — ступінь вираження ознаки чи дії в синонімічному ряді
  - хибні друзі (false friends) — слова, подібні за формою в різних мовах, але різні за значенням
