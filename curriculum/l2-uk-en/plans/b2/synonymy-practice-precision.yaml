module: b2-060
level: B2
sequence: 60
slug: synonymy-practice-precision
version: '1.0'
title: "Практикум із синонімії: Точність слововживання"
subtitle: "Synonymy Practice: Precision"
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
  - "Закріпити навички вибору найточнішого синоніма в умовах семантичної неоднозначності контексту."
  - "Навчитися розрізняти пароніми та синоніми, уникаючи помилок у їх вживанні."
  - "Опанувати методику усунення тавтології та плеоназмів через глибоке знання синоніміки."
  - "Розвинути чуття мови для розпізнавання тонких емоційних та оцінних конотацій слів."

reading_situations:
  - source_type: "науково-популярна стаття"
    topic: "Стаття про когнітивну лінгвістику та вплив мови на мислення людини."
    key_elements: ["прецизійна лексика", "семантична диференціація", "термінологічна точність"]
    motivation: "Тренування здатності сприймати тексти, де кожне слово має чітко визначене місце, а синонімічна заміна без урахування контексту може змінити зміст."

discussion_topics:
  - context: "Обговорення мовної екології: 'Чи є велика кількість синонімів ускладненням для комунікації у цифрову епоху?'"
    questions:
      - "Чи може штучний інтелект повністю замінити людину у виборі стилістично доречного синоніма?"
      - "Яка різниця між багатим мовленням та мовним захаращенням (плеоназмом)?"
      - "Як перевірити сполучуваність слова, якщо ви не впевнені у його синонімічному вживанні?"
    motivation: "Формування усвідомленого ставлення до вибору мовних засобів та відповідальності за точність висловлювання."

content_outline:
  - section: "Семантична точність та лексична сполучуваність"
    words: 1000
    subsections:
      - "Межі синонімічної заміни: чому 'гарний' не завжди можна замінити на 'красивий'"
      - "Аналіз лексичної сполучуваності (колокації) синонімів"
      - "Роль контексту у нейтралізації або посиленні різниці між синонімами"
    key_concepts:
      - "лексична сполучуваність"
      - "колокація"
      - "контекстуальна зумовленість"
      - "точність"
  - section: "Зони ризику: Пароніми та квазісиноніми"
    words: 1000
    subsections:
      - "Розрізнення слів, подібних за звучанням, але різних за значенням (паронімів)"
      - "Типові випадки змішування паронімів у публічному мовленні (абонент/абонемент, адрес/адреса)"
      - "Квазісиноніми (уявні синоніми) та небезпека їхнього неточного вживання"
    key_concepts:
      - "паронімія"
      - "квазісиноніми"
      - "мовна норма"
      - "диференційна ознака"
  - section: "Методика стилістичного редагування тексту"
    words: 1000
    subsections:
      - "Усунення тавтології (повторів) без втрати змістової насиченості"
      - "Виявлення та ліквідація плеоназмів (надмірності) через синонімічну компресію"
      - "Техніка 'лаконічного письма': як замінити описову конструкцію одним влучним словом"
    key_concepts:
      - "тавтологія"
      - "плеоназм"
      - "мовна компресія"
      - "лаконічність"
  - section: "Синонімічний практикум: Робота зі словниками та текстами"
    words: 1000
    subsections:
      - "Використання електронних корпусів та словників для перевірки вживання слова"
      - "Створення індивідуальних тематичних синонімічних карт"
      - "Аналіз авторських синонімів у сучасному українському медіатексті"
    key_concepts:
      - "лексикографія"
      - "корпусна лінгвістика"
      - "авторський стиль"
      - "мовна вправність"

vocabulary:
  required:
    - точність
    - сполучуваність
    - паронім
    - плеоназм
    - компресія
    - конотація
    - неоднозначність
    - колокація
  recommended:
    - влучний
    - доречний
    - лаконічний
    - виправлений
    - досконалий
    - оптимальний

activities:
  types_required:
    - select
    - error-correction
    - cloze
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 20

