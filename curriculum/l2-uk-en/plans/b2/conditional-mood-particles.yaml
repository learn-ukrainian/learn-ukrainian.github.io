slug: conditional-mood-particles
version: '2.0'
title: Умовний спосіб, частки та вигуки
subtitle: Conditional Mood, Particles, and Interjections
focus: grammar
pedagogy: TTT
phase: B2.5 [Advanced Morphology]
word_target: 4000
objectives:
- Learner can form and use the conditional mood with correct particle placement
- Learner can distinguish modal, negative, and emphatic particles by function
- Learner can use interjections appropriately in written and spoken Ukrainian
- Learner can analyze how particles shift meaning and emphasis in sentences
content_outline:
- section: Вступ — умовний спосіб у глибину (Introduction — Conditional Mood Deep Dive)
  words: 800
  points:
  - 'Утворення умовного способу: конструкція «якби / коли б + дієслово минулого часу» та її варіанти; розмежування реальної
    та ірреальної умови.'
  - 'Частка «би/б» після голосних та приголосних: фонетичні правила чергування та типові помилки (напр., «якби я знав» vs
    «як би я знав» — правопис разом і окремо).'
  - 'Синтаксичні моделі: умовні речення з «якби... то», «коли б... тоді» та безсполучникові конструкції; місце частки «б»
    у реченні.'
  - 'Контрастивний аналіз: порівняння українського умовного способу з англійськими Conditional II / III для подолання типових
    помилок перенесення.'
- section: Модальні частки (Modal Particles)
  words: 800
  points:
  - 'Питально-модальні частки: «хіба» (невже це правда?), «невже» (вираження подиву), «чи» (нейтральне питання) — відтінки
    значення та стилістичні контексти.'
  - 'Частки сумніву та ймовірності: «навряд чи» (малоймовірно), «мабуть» (припущення), «ледве чи» — градація впевненості мовця.'
  - 'Частки волевиявлення: «хай / нехай» (побажання або наказ), «бодай» (мінімальне бажання); їхня роль у формуванні наказового
    та бажального відтінків.'
  - 'Типові помилки: змішування «хіба» та «невже» учнями; розрізнення за емоційним забарвленням (скепсис vs здивування).'
- section: Заперечні та підсилювальні частки (Negative and Emphatic Particles)
  words: 800
  points:
  - 'Заперечні частки «не», «ні», «ані»: правила правопису (разом / окремо) та подвійне заперечення в українській мові як
    норма (нічого не знаю).'
  - 'Різниця між «не» та «ні»: «не знаю» (заперечення дії) vs «ні» (відповідь на питання, заперечення предмета); «ані» як
    підсилення в літературному стилі.'
  - 'Підсилювальні частки: «аж» (несподіваність, інтенсивність), «навіть» (включення крайнього випадку), «таки» (наполегливе
    підтвердження), «же / ж» (емфатичне підкреслення).'
  - 'Позиція часток у реченні: порядок слів та інтонаційні наслідки — «Він навіть не зателефонував» vs «Навіть він не зателефонував»
    (зміна акценту).'
- section: 'Вигуки: емоційні та спонукальні (Interjections: Emotional and Imperative)'
  words: 700
  points:
  - 'Класифікація вигуків: емоційні (ой, ах, ого, овва), спонукальні (гей, годі, цить), етикетні (добридень, будь ласка, пробачте).'
  - 'Правопис та пунктуація вигуків: вживання знака оклику, коми; окреме написання складних вигуків (ой леле, їй-богу).'
  - 'Звуконаслідувальні слова та їхнє місце в системі мови: розмежування вигуків (ай!) та звуконаслідувань (ку-ку, бам); стилістична
    маркованість.'
  - 'Вигуки в художньому та розмовному стилях: як вигуки створюють експресивність та передають авторську інтонацію в літературі
    (приклади з Котляревського, Франка).'
- section: Практика — спосіб, частки та стиль (Practice — Mood, Particles, and Style)
  words: 900
  points:
  - 'Комплексні трансформаційні вправи: перетворення дійсного способу в умовний із правильним розташуванням частки «б»; перетворення
    розповідних речень у питальні з модальними частками.'
  - 'Стилістичний аналіз: визначення типу частки та її функції в автентичних текстах (публіцистичний, науковий, художній стилі).'
  - 'Творче письмо: написання діалогу з використанням умовного способу, модальних часток та вигуків для створення живого,
    емоційно насиченого мовлення.'
  - 'Редагування тексту: виправлення помилок у вживанні часток (правопис, позиція, змішування «не» та «ні») та надмірне або
    недостатнє вживання вигуків.'
vocabulary_hints:
  required:
  - умовний спосіб (conditional mood) — основний граматичний термін модуля; утворення через частку «б/би» + минулий час
  - частка (particle) — модальна частка, заперечна частка, підсилювальна частка; службова частина мови
  - вигук (interjection) — емоційний вигук, спонукальний вигук; незмінне слово для вираження емоцій
  - хіба (really? / is it possible?) — питально-модальна частка; виражає сумнів або скепсис
  - невже (really?! / can it be?) — питально-модальна частка; виражає здивування або недовіру
  - навряд чи (hardly / unlikely) — модальна частка сумніву; вживається з дієсловом для вираження малоймовірності
  - аж (even / so much that) — підсилювальна частка; виражає несподіваність або інтенсивність
  - навіть (even) — підсилювальна частка; включає крайній або несподіваний випадок
  recommended:
  - таки (still / after all) — підсилювальна частка; наполегливе підтвердження, правопис через дефіс після дієслів
  - бодай (at least / if only) — частка волевиявлення; мінімальне бажання або побажання
  - ані (not even / neither) — підсилена заперечна частка; літературний стиль
  - якби (if / would that) — сполучник умовного способу; ключовий елемент ірреальної умови
  - годі (enough / stop) — спонукальний вигук; вживається як наказ припинити дію
