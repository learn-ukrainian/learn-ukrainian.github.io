  - select
  - error-correction
  - unjumble
  min_items_per_type: 10
  total_min_items: 40
activity_hints:
- type: fill-in
  description: Complete conditional sentences (e.g., 'Якби я ___, то ___ б ___')
- type: error-correction
  description: Fix particle placement and милозвучність errors in conditionals (би/б)
- type: select
  description: Identify real vs unreal conditional in context
- type: cloze
  description: Complete a dialogue with conditional mood forms (ввічливі прохання, поради)
