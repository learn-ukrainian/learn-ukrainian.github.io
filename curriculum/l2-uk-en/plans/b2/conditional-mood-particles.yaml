module: b2-057
level: B2
sequence: 57
slug: conditional-mood-particles
version: 1.1.1
title: 'Умовний спосіб: Частки та нюанси'
subtitle: 'Умовний спосіб: частки та нюанси'
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
- Досконало опанувати вживання часток 'би' та 'б' залежно від фонетичного контексту (милозвучність).
- Розуміти правила розміщення частки в реченні та випадки її відриву від дієслова.
- Навчитися будувати складні умовні речення з індикаторами 'якби', 'коли б', 'аби'.
- Розрізняти реальну, потенційну та нереальну умову в минулому та теперішньому часі.
- Використовувати умовний спосіб для вираження ввічливих прохань, порад та побажань.
reading_situations:
- source_type: публіцистична стаття
  topic: 'Аналіз футурологічного прогнозу: ''Що було б, якби Україна раніше інтегрувалася в ЄС?'''
  key_elements:
  - конструкції з 'якби'
  - модальність можливості
  - гіпотетичні наслідки
  motivation: Вивчення використання умовного способу для побудови складних логічних припущень.
listening_situations:
- media_type: подкаст
  setting: Дискусія експертів про альтернативну історію або альтернативні сценарії розвитку технологій.
  focus_points:
  - Розпізнавання часток 'би/б' у швидкому темпі мовлення.
  - Інтонація сумніву та припущення.
  - Використання часток для пом'якшення тверджень.
  motivation: Розвиток слухового сприйняття модальних нюансів.
writing_tasks:
- task_type: власне висловлення
  prompt: 'Напишіть роздум на тему: ''Якби я міг змінити одну подію у світовій історії, що б це було і якими були б наслідки?''
    Використовуйте щонайменше 10 речень в умовному способі.'
  requirements:
  - дотримання правил милозвучності (би/б)
  - різноманітність сполучників умови (якби, коли б)
  - 'логічна структура: умова -> наслідок'
  - мінімум 250 слів
  motivation: Практика побудови складних гіпотетичних конструкцій.
  model_answer: 'Текст повинен демонструвати впевнене володіння умовним способом. Наприклад: ''Якби не винайшли інтернет,
    світ був би зовсім іншим''. Слід звернути увагу на відсутність узгодження за часом (умовний спосіб має лише форму минулого
    часу, але може стосуватися майбутнього). Модельна відповідь фокусується на точності вживання часток та глибині аргументації.'
discussion_topics:
- context: 'Етика гіпотетичних рішень: ''Якби ви знайшли гаманець із великою сумою грошей, як би ви вчинили?'''
  questions:
  - Чи завжди легко дотримуватися своїх принципів у гіпотетичних ситуаціях?
  - Як вибір модальності (дійсний чи умовний спосіб) змінює сприйняття вашої відповіді співрозмовником?
  - Які фрази ввічливості в умовному способі ви вважаєте найбільш ефективними?
  motivation: Стимулювання спонтанного використання умовного способу в дебатах.
content_outline:
- section: Морфологія та фонетика умовного способу
  words: 800
  subsections:
  - 'Творення форми: минулий час + частка ''би/б'''
  - 'Закон милозвучності: коли вживати ''би'', а коли ''б''?'
  - 'Рухливість частки: розташування після дієслова, перед ним або після інших членів речення'
  - Типові помилки у вживанні часток у розмовному мовленні
  key_concepts:
  - частка
  - милозвучність
  - постпозиція
  - препозиція
- section: Синтаксис складного умовного речення
  words: 1000
  subsections:
  - 'Типи умовних сполучників: ''якби'', ''коли б'', ''аби'', ''бодай би'''
  - 'Структура ''якби... то/так'': правила побудови'
  - Розрізнення 'якби' (умова) та 'як би' (спосіб дії + частка)
  - Використання інфінітива в умовних конструкціях ('хотілося б знати')
  key_concepts:
  - підрядне речення умови
  - сполучник
  - наслідок
  - правопис часток
- section: Семантичні відтінки умовного способу
  words: 1200
  subsections:
  - 'Бажана дія: вираження мрій та прагнень (''я б полетів'')'
  - Можлива, але нереалізована дія в минулому
  - 'Ввічливість та пом''якшення: ''я хотів би просити'', ''ви не могли б'''
  - 'Порада та рекомендація: ''я б на вашому місці...'''
  key_concepts:
  - гіпотетичність
  - ірреальність
  - модальність ввічливості
  - оптативність
- section: Стилістичні особливості та сталі вирази
  words: 1000
  subsections:
  - Умовний спосіб у фразеологізмах ('хоч би що', 'якби ж то')
  - 'Риторичні фігури в художньому стилі: накопичення умовних конструкцій'
  - Використання умовного способу в наукових гіпотезах
  - Порівняння українського умовного способу з англійськими Conditionals
  key_concepts:
  - сталі сполучення
  - риторика
  - стилістична фігура
  - міжмовна інтерференція
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
