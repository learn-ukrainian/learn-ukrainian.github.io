module: b2-35
level: B2
sequence: 35
slug: checkpoint-register
version: '2.0'
title: 'Контрольна точка: регістри'
subtitle: Checkpoint — Register System
content_outline:
- section: Вступ та огляд (Introduction and Overview)
  words: 400
  points:
  - 'Мета модуля та відповідність Державному стандарту (§4.4.1.1): перевірка знань
    про сім основних стилів української мови з акцентом на офіційний, науковий та
    публіцистичний.'
  - 'Концепція ''стилістичного аудиту'': використання метафори ''відповідного костюма
    для події'' від імені Професійного мовного коуча.'
- section: 'Офіційно-діловий стиль: Від «Руської Правди» до сьогодні (Official Style:
    From Ruska Pravda to Today)'
  words: 800
  points:
  - 'Культурний гачок: «Руська Правда» (XI–XII ст.) як фундамент української юридичної
    термінології та доказ її тисячолітньої тяглості.'
  - 'Ключові кліше та синтаксис: ''чинне законодавство'', ''відповідно до'', ''доводити
    до відома''; аналіз типових формул звернення та прохання.'
  - 'Попередження помилок: виправлення суржикових кальок (напр., ''згідно з інструкцією''
    замість ''згідно інструкції'' та ''вживати заходів'' замість ''приймати міри'').'
- section: 'Публіцистичний стиль: Сила переконання (Publicistic Style: The Power of
    Persuasion)'
  words: 800
  points:
  - 'Культурний контекст: полемічна література (XVI–XVII ст.) та постать Івана Вишенського
    як предтечі сучасної публіцистики та інформаційної боротьби.'
  - 'Лексичні маркери медіатексту: вживання емоційної лексики (''рушійна сила'', ''консолідація'')
    та метафор (''легені планети'') для впливу на аудиторію.'
  - 'Аналіз сучасного політичного та суспільного дискурсу: розпізнавання риторичних
    питань та засобів залучення уваги.'
- section: 'Науковий стиль: Об''єктивність та аналіз (Scientific Style: Objectivity
    and Analysis)'
  words: 800
  points:
  - 'Характеристики академічного письма: об''єктивність, термінологічна точність та
    логічна послідовність викладу (''таким чином'', ''на підставі отриманих даних'').'
  - 'Синтаксичні особливості: використання безособових конструкцій та пасивного стану
    для підкреслення процесу, а не виконавця.'
  - 'Редагування наукових текстів: усунення стилістичного дисонансу та перевірка відсоткових
    співвідношень у даних.'
- section: 'Синтез та трансформація: Практичний аудит (Synthesis and Transformation:
    Practical Audit)'
  words: 800
  points:
  - 'Комплексна вправа ''Трансформація змісту'': порівняння одного повідомлення (напр.,
    про дощ) у трьох регістрах (офіційний: ''атмосферні опади''; публіцистичний: ''небесна
    канцелярія плаче''; науковий: ''конденсація водяної пари'').'
  - 'Робота над плеоназмами: виявлення та усунення надмірності (''вакансія'' замість
    ''вільна вакансія'', ''сувенір'' замість ''пам''ятний сувенір'').'
  - 'Вибір регістру залежно від ситуації: ситуативні завдання на перемикання кодів
    спілкування.'
- section: Підсумок та результати (Summary and Results)
  words: 400
  points:
  - 'Інтерпретація результатів перевірки: оцінка стилістичної чутливості та готовності
    до комунікаційного блоку (М85-93).'
  - 'Рекомендації щодо подальшої практики: ресурси для поглиблення знань (напр., litopys.org.ua)
    та поради щодо уникнення типових помилок B2.'
