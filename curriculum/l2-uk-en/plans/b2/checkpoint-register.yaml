    pages: "§1–15"
    topic: "Культура мовлення, стилістичні норми, лексична норма"
  - source: "Заболотний, 11 клас (2019)"
    pages: "§47–50"
    topic: "Стилістичні норми, функціональні стилі"
  - source: "Караман, 10 клас (2018)"
    pages: "Стилістика"
    topic: "Фонетичні, лексичні, синтаксичні стилістичні засоби"
  - source: "Авраменко, 11 клас (2019)"
    pages: "Стилістика"
    topic: "Функціональні стилі, культура мовлення"
  - source: "Ворон, 11 клас (2019)"
    pages: "Стилістика мовлення"
    topic: "Стилістика мовлення"
  - source: "Державний стандарт 2024"
