vocabulary_hints:
  required:
  - чинне законодавство (current legislation) — Official style; key collocation for
    legal documents.
  - 'згідно з (according to) — Official marker; requires Instrumental case (error-prone
    area: avoid ''згідно інструкції'').'
  - на підставі отриманих даних (based on the data obtained) — Scientific style; standard
    connector for concluding results.
  - консолідація суспільства (societal consolidation) — Publicistic style; high frequency
    in socio-political texts.
  - вживати заходів (to take measures) — Correct alternative to the common calque
    'приймати міри'.
  recommended:
  - прозорість влади (transparency of power) — Publicistic style marker.
  - безособова конструкція (impersonal construction) — Grammatical term required for
    scientific style analysis.
  - плеоназм (pleonasm) — Technical term for stylistic redundancy (e.g., 'вільна вакансія').
  - полеміка (polemics) — Historical and stylistic concept related to the XVII century
    cultural hook.
  - відповідно до (in accordance with) — Official style; requires Genitive case.
