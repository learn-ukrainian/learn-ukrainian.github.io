module: b2-038
level: B2
sequence: 38
slug: checkpoint-register
version: '1.2'
title: "Контрольний модуль: Стилістика та регістри"
subtitle: "Підсумковий контроль: стилістика та регістр"
focus: assessment
pedagogy: review
phase: "B2.2a [Stylistics & Register]"
word_target: 4000
objectives:
  - "Узагальнити знання про функціональні стилі української мови та їхні ключові ознаки."
  - "Оцінити вміння ідентифікувати стилістичні засоби (фонетичні, лексичні, синтаксичні)
    у текстах."
  - "Перевірити навичку вільного перемикання між офіційним, науковим, художнім та
    розмовним регістрами."
  - "Проконтролювати вміння редагувати тексти на предмет стилістичної однорідності
    та доречності."
  - "Продемонструвати високий рівень володіння специфічними кліше та термінологією
    різних сфер."

reading_situations:
  - source_type: "фрагменти текстів різних стилів"
    topic: "Визначення стилю уривка та обґрунтування вибору за допомогою мовних маркерів."
    key_elements: ["стилістичні маркери", "жанрова специфіка", "адресат мовлення"]
    motivation: "Перевірка аналітичних здібностей щодо розрізнення комунікативних
      намірів автора."

listening_situations:
  - media_type: "аудіо"
    setting: "Прослуховування коротких діалогів та монологів у різних ситуаціях (суд,
      ринок, лекція, кав'ярня)."
    focus_points: ["Розпізнавання емоційного забарвлення.", "Виявлення недоречного
          вживання лексем.", "Сприйняття специфічної термінології на слух."]
    motivation: "Оцінка здатності швидко орієнтуватися у звуковому мовному просторі."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть порівняльний аналіз двох текстів на одну тему (наприклад, 'Екологія'),
      написаних у науковому та публіцистичному стилях. Визначте основні відмінності
      у виборі лексики та побудові речень."
    requirements:
      - "використання термінів: конотація, термінологія, емоційне забарвлення"
      - "наведення конкретних прикладів з обох текстів"
      - "обґрунтованість висновків"
      - "мінімум 250 слів"
    motivation: "Оцінка аналітичних навичок та вміння оперувати стилістичними категоріями."
    model_answer: "Аналіз має чітко розмежовувати об'єктивність наукового стилю (терміни,
      складні речення, відсутність емоцій) та суб'єктивність публіцистики (риторичні
      запитання, метафори, заклики). У відповіді мають фігурувати приклади номіналізації
      ('здійснення аналізу') для науки та емоційних епітетів ('катастрофічні наслідки')
      для публіцистики. Оцінюється точність використання лінгвістичного апарату."

discussion_topics:
  - context: "Стилістична грамотність як ознака професіоналізму в сучасному світі."
    questions:
      - "Чи може успішна людина ігнорувати правила стилістики в цифрову епоху?"
      - "Який стиль, на вашу думку, є найскладнішим для опанування іноземцями?"
      - "Як мовна мода впливає на зміну стилістичних норм?"
    motivation: "Обговорення практичного значення стилістики для кар'єри та соціальної
      інтеграції."

content_outline:
  - section: "Функціональні стилі: Систематизація знань"
    words: 800
    subsections:
      - "Ключові параметри розрізнення стилів: сфера використання, мета, форма"
      - "Взаємодія стилів у сучасному медіапросторі: явища інтерстилістики"
      - "Поняття нейтральної лексики як базису для всіх регістрів"
      - "Ієрархія стилів та їхня соціальна значущість"
    key_concepts:
      - "стильова домінта"
      - "мовний етикет"
      - "комунікативна ситуація"
      - "стильова чиста"
  - section: "Стилістичні ресурси мови: Огляд рівнів"
    words: 1200
    subsections:
      - "Фонетика як інструмент виразності: алітерація та асонанс"
      - "Лексика: синонімічне багатство та експресивність"
      - "Синтаксис: стилістичні можливості різних типів речень"
      - "Тропи та фігури мовлення в художньому та публіцистичному контекстах"
      - "Специфіка термінологізації в науковому та офіційному регістрах"
    key_concepts:
      - "експресивність"
      - "стандартизація"
      - "образність"
      - "фігура мовлення"
  - section: "Практична стилістика та редагування тексту"
    words: 1000
    subsections:
      - "Типові стилістичні помилки: канцеляризми, плеоназми, тавтологія"
      - "Стилістичний дисонанс: причини виникнення та способи усунення"
      - "Культура мовлення: вибір доречної форми звертання та викладу"
      - "Методика редагування: від первинного аналізу до фінальної коректури"
    key_concepts:
      - "стилістична норма"
      - "мовне редагування"
      - "чистота мови"
      - "плеоназм"
  - section: "Регістр та контекст у цифрову епоху"
    words: 1000
    subsections:
      - "Соціальні та психологічні чинники вибору регістру спілкування"
      - "Цифровий етикет: стилістика повідомлень у месенджерах та соцмережах"
      - "Професійний жаргон: межі доречності та зрозумілості"
      - "Маніпулятивні можливості стилістики в рекламі та політиці"
    key_concepts:
      - "цифрова комунікація"
      - "соціолінгвістика"
      - "прагматика"
      - "мовна маніпуляція"

vocabulary:
  required:
    - функціональний стиль
    - стилістична фігура
    - термінологія
    - мовна норма
    - конотація
    - доречність
    - змішування стилів
    - редагування
  recommended:
    - досконалість
    - гнучкість
    - варіативність
    - милозвучність
    - переконливість
    - ідентифікація

activities:
  types_required:
    - quiz
    - error-correction
    - match-up
    - select
  min_items_per_type: 10
  total_min_items: 40

activity_hints:
  - type: cloze
    focus: "Заповнити пропуски в тексті, де змішано кілька регістрів, обираючи стилістично
      доречне слово"
  - type: group-sort
    focus: "Класифікувати 10 уривків текстів за функціональним стилем (художній /
      науковий / офіційно-діловий / публіцистичний / розмовний / конфесійний)"
  - type: error-correction
    focus: "Знайти всі стилістичні помилки (змішування регістрів) у тексті та виправити"
  - type: essay-response
    focus: "Написати одну новину в трьох стилях: науковому, публіцистичному та розмовному"
  - type: critical-analysis
    focus: "Проаналізувати реальну статтю: визначити основний регістр, знайти стилістичні
      відхилення, оцінити доречність"

references:
