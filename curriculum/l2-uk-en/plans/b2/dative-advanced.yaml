module: b2-048
level: B2
sequence: 48
slug: dative-advanced
version: 1.0.2
title: 'Давальний відмінок: поглиблений рівень'
subtitle: 'Давальний відмінок: поглиблений рівень'
focus: grammar
pedagogy: TTT
word_target: 4000
phase: B2.4 [Domain Vocabulary & Advanced Cases]
objectives:
- 'Опанувати складні семантичні функції давального відмінка: призначення, вигода/шкода,
  етичний давальний.'
- 'Засвоїти прийменники з давальним: завдяки, всупереч, наперекір, навстріч.'
- Розрізняти давальний адресата, давальний переживача та безособові конструкції 
  з давальним (мені холодно, йому потрібно).
- Вживати давальний у контексті порад, інструкцій та офіційних документів.
reading_situations:
- source_type: стаття-порада
  topic: 'Стаття психолога: як допомогти дитині адаптуватися до нової школи.'
  key_elements:
  - давальний адресата (дитині, батькам)
  - давальний переживача (їй тривожно)
  - поради з інфінітивом
  motivation: Аналіз давального відмінка в тексті порад та рекомендацій.
listening_situations:
- media_type: відео
  setting: 'Інструктаж для волонтерів: що робити, коли допомагаєш постраждалим.'
  focus_points:
  - давальний адресата (допомогти людям)
  - давальний призначення (для кого це?)
  - безособові конструкції
  motivation: Сприйняття інструктивного мовлення з давальним відмінком.
writing_tasks:
- task_type: лист-порада
  prompt: Напишіть лист другові, який переїхав до нового міста та скаржиться на 
    самотність. Дайте поради, використовуючи конструкції з давальним відмінком.
  requirements:
  - мінімум 250 слів
  - щонайменше 8 конструкцій із давальним відмінком
  - поєднання формального та неформального тону
  motivation: Практика давального відмінка в контексті порад та підтримки.
  model_answer: 'Лист із різноманітними конструкціями: ''Тобі буде легше, коли знайдеш
    друзів. Спробуй записатися на курси — новим учасникам завжди раді. Всупереч твоїм
    страхам, люди тут привітні...'''
discussion_topics:
- context: 'Волонтерство в Україні: кому допомагають та як це змінює суспільство.'
  questions:
  - Кому, на вашу думку, найбільше потрібна допомога зараз?
  - Чи кожній людині під силу бути волонтером?
  motivation: Обговорення з активним вживанням давального відмінка.
dialogue_situations:
- setting: Лікар дає рекомендації пацієнтові після огляду.
  roles:
  - лікар
  - пацієнт
  key_phrases:
  - вам потрібно більше відпочивати
  - дитині призначу вітаміни
  - завдяки вчасному лікуванню
- setting: Учитель пояснює учневі, чому йому варто більше читати українською.
  roles:
  - учитель
  - учень
  key_phrases:
  - тобі це допоможе
  - кожному учневі корисно
  - навстріч новим знанням
content_outline:
- section: Семантичні ролі давального відмінка
  words: 1000
  subsections:
  - 'Давальний адресата: кому адресовано дію (дати книжку другові)'
  - 'Давальний переживача: хто відчуває стан (мені сумно, йому зручно)'
  - 'Давальний вигоди/шкоди: на чию користь/шкоду (на радість батькам)'
  - 'Етичний давальний: емоційна причетність (а він мені й каже!)'
  key_concepts:
  - давальний адресата
  - давальний переживача
  - етичний давальний
- section: Давальний призначення та мети
  words: 1000
  subsections:
  - 'Конструкції з інфінітивом: мені треба/потрібно/варто/слід'
  - 'Давальний із дієсловами руху: іти назустріч, бігти навстріч'
  - Давальний у прислівникових конструкціях (по-моєму, по-вашому)
  - 'Давальний у конструкціях з ''для'': порівняння ''для мене'' та ''мені'''
  key_concepts:
  - модальність
  - інфінітивна конструкція
  - прислівникова форма
- section: Прийменники з давальним відмінком
  words: 1000
  subsections:
  - 'Завдяки + давальний: позитивна причина (завдяки підтримці)'
  - 'Всупереч + давальний: дія наперекір (всупереч прогнозам)'
  - 'Наперекір + давальний: рішуча протидія (наперекір долі)'
  - 'Навстріч + давальний: рух та абстрактне зближення'
  key_concepts:
  - прийменникове керування
  - причиновість
  - протидія
- section: Давальний у різних регістрах та стилях
  words: 1000
  subsections:
  - 'Офіційно-діловий: ''Пану директору...'', ''відповідно до наказу'''
  - 'Публіцистичний: ''Народу України...'', ''кожному громадянину'''
  - 'Розмовний: етичний давальний та емоційні конструкції'
  - 'Порівняння з англійською: де English використовує ''to/for'' або прийменникові
    фрази'
  key_concepts:
  - стилістична варіативність
  - формула звертання
  - офіційний адресат
- section: Підсумок — Summary
  words: 300
  points:
  - 'The Dative case extends beyond indirect objects to express the experiencer (мені
    холодно, йому потрібно), benefit/harm, and the conversational ethical dative.
    It also strictly governs prepositions of cause and opposition: завдяки, всупереч,
    наперекір, and навстріч.'
  - "Self-check: What is the difference between 'для мене' and the Dative 'мені'?
    Translate: 'Thanks to your advice (завдяки), I succeeded despite the forecast
    (всупереч).' Give an example of an official address (e.g., Пану директору) versus
    a conversational ethical dative."
vocabulary_hints:
- word: давальний
  translation: dative (case)
  context: Давальний відмінок відповідає на питання 'кому? чому?'
- word: призначення
  translation: purpose, designation
  context: 'Давальний призначення: подарунок дитині.'
- word: завдяки
  translation: thanks to
  context: Завдяки вашій допомозі ми впоралися.
- word: всупереч
  translation: despite, contrary to
  context: Всупереч очікуванням, команда перемогла.
- word: наперекір
  translation: in defiance of
  context: Наперекір усім труднощам він досяг мети.
- word: навстріч
  translation: towards, to meet
  context: Вона побігла навстріч друзям.
- word: адресат
  translation: addressee
  context: Адресат листа — директор школи.
- word: переживач
  translation: experiencer (linguistics)
  context: 'Давальний переживача: мені тривожно.'
- word: вигода
  translation: benefit
  context: Це рішення на вигоду всім.
- word: шкода
  translation: harm, pity
  context: На шкоду здоров'ю він працював без відпочинку.
- word: порада
  translation: advice
  context: Дайте мені пораду, будь ласка.
- word: рекомендація
  translation: recommendation
  context: Лікар дав рекомендації пацієнтові.
- word: допомога
  translation: help, aid
  context: Допомога постраждалим — наш обов'язок.
- word: волонтер
  translation: volunteer
  context: Волонтери допомагають мешканцям прифронтових міст.
- word: підтримка
  translation: support
  context: Завдяки підтримці друзів він не здався.
- word: модальність
  translation: modality
  context: 'Модальність необхідності: мені треба працювати.'
- word: звертання
  translation: address, form of address
  context: 'Звертання у листі: ''Шановному панові...'''
- word: громадянин
  translation: citizen
  context: Кожному громадянину гарантовано права.
activities:
  types_required:
