module: b2-045
level: B2
sequence: 45
slug: law-justice-vocabulary
version: 1.2.2
title: 'Право та правосуддя: Лексика'
subtitle: 'Право та юстиція: лексика'
focus: vocabulary
pedagogy: PPP
phase: B2.1c [Register System & Domain Vocabulary]
word_target: 4000
objectives:
- Поглибити знання юридичної термінології, що стосується судочинства, 
  кримінального та цивільного права.
- Розуміти структуру та функціонування правоохоронної системи України.
- Навчитися аналізувати повідомлення про резонансні судові справи та юридичні 
  новини.
- Опанувати лексику для опису прав людини, правопорушень та мір покарання.
- Розвинути вміння вести дискусію на правові теми, аргументуючи позицію з 
  посиланням на норми права.
reading_situations:
- source_type: фрагмент судового рішення / репортаж із зали суду
  topic: 'Опис резонансної справи: обставини, докази, вирок.'
  key_elements:
  - юридична аргументація
  - процесуальні терміни
  - права сторін
  motivation: Розуміння механізмів правосуддя та вміння виокремлювати головні 
    юридичні факти.
listening_situations:
- media_type: подкаст
  setting: Експерти обговорюють реформування судової системи в Україні та захист
    прав потерпілих.
  focus_points:
  - Сприйняття складної юридичної лексики на слух.
  - Відстеження логіки правничої дискусії.
  - Розуміння коментарів юристів щодо конкретних кейсів.
  motivation: Розвиток професійної слухової компетенції у сфері права.
writing_tasks:
- task_type: репортаж
  prompt: Напишіть короткий огляд (case summary) гіпотетичного правопорушення, 
    використовуючи терміни 'підозрюваний', 'обвинувачення', 'доказова база', 
    'презумпція невинуватості'.
  requirements:
  - об'єктивність та точність викладу
  - використання щонайменше 8 специфічних юридичних лексем
  - логічна послідовність (фабула, правова кваліфікація, висновок)
  - мінімум 200 слів
  motivation: Практичне застосування спеціалізованої лексики в контексті аналізу
    правових ситуацій.
  model_answer: 'Репортаж має містити чіткий опис події (фабулу справи), стадію процесу
    (наприклад, досудове розслідування), перелік інкримінованих статей та опис запобіжних
    заходів. У тексті обов''язково мають бути використані терміни: ''правопорушення'',
    ''затримання'', ''клопотання адвоката'', ''судовий вердикт''. Стиль має бути нейтральним
    та фактологічно точним.'
discussion_topics:
- context: 'Правосуддя та штучний інтелект: чи може машина виносити вироки?'
  questions:
  - Які переваги та ризики автоматизації юридичних рішень?
  - Чи може ШІ забезпечити більшу неупередженість, ніж людина-суддя?
  - Які сфери права повинні залишатися виключно під контролем людей?
  motivation: Стимулювання критичного мислення щодо майбутнього правової 
    системи.
content_outline:
- section: Правоохоронна система та судочинство
  words: 800
  subsections:
  - 'Органи правопорядку: Національна поліція, Служба безпеки України, Прокуратура'
  - 'Антикорупційна інфраструктура: НАБУ, САП, Вищий антикорупційний суд'
  - 'Судова влада: Конституційний Суд та суди загальної юрисдикції'
  - 'Учасники судового процесу: сторони захисту та обвинувачення, свідки, присяжні'
  key_concepts:
  - правосуддя
  - компетенція
  - незалежність суду
  - підслідність
- section: Кримінальне та процесуальне право
  words: 1200
  subsections:
  - 'Класифікація правопорушень: злочини та проступки'
  - 'Стадії кримінального провадження: від внесення в ЄРДР до вироку суду'
  - 'Процесуальні дії: обшук, допит, затримання, підозра'
  - 'Запобіжні заходи: тримання під вартою, домашній арешт, застава'
  - Види покарань та механізми реабілітації засуджених
  key_concepts:
  - кваліфікація злочину
  - докази
  - вирок
  - апеляція
  - касація
- section: Цивільне, трудове та господарське право
  words: 1000
  subsections:
  - Право власності, договірні зобов'язання та відшкодування шкоди
  - 'Трудові спори: звільнення, виплата компенсацій, охорона праці'
  - 'Сімейне право: шлюбні контракти, опіка та захист прав дитини'
  - Інтелектуальна власність та авторське право в цифрову епоху
  - Банкрутство та господарська відповідальність юридичних осіб
  key_concepts:
  - дієздатність
  - відшкодування
  - договір
  - правочин
  - позивач
- section: Права людини та міжнародне правосуддя
  words: 1000
  subsections:
  - Захист прав людини в Європейському суді з прав людини (ЄСПЛ)
  - 'Військові злочини та злочини проти людяності: міжнародні трибунали'
  - Міжнародне гуманітарне право та захист цивільного населення
  - Механізми екстрадиції та міжнародна правова допомога
  - Дискримінація та правові засоби боротьби з нею
  key_concepts:
  - ратифікація
  - конвенція
  - геноцид
  - екстрадиція
  - омбудсмен
- section: Підсумок — Summary
  words: 300
  points:
  - 'Legal terminology spans multiple branches of law: criminal proceedings (докази,
    вирок, апеляція), civil and labor law (договір, позивач, відшкодування), and international
    human rights (екстрадиція, конвенція).'
  - "Self-check: What is the difference between 'злочин' and 'проступок'? Name 3 law
    enforcement or anti-corruption agencies in Ukraine. How would you describe the
    role of a 'позивач' in a civil court case?"
vocabulary:
  required:
  - суддя
  - вирок
  - обвинувачення
  - підозрюваний
  - адвокат
  - правопорушення
  - докази
  - презумпція невинуватості
  recommended:
  - позовна заява
  - оскарження
  - недоторканність
  - відповідальність
  - вердикт
  - процесуальний
  - клопотання
  - санкція
activities:
  types_required:
  - quiz
  - fill-in
  - match-up
  - error-correction
  min_items_per_type: 8
  total_min_items: 32
activity_hints:
- type: reading
  focus: Прочитайте текст про правоохоронна система та судочинство і дайте 
    відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про кримінальне та процесуальне 
    право, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Правоохоронна 
    система та судочинство». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    правоохоронна система та судочинство.
references:
- 'Глазова, 11 клас (2019): §11-15 — Лексична норма, термінологія, професійна лексика'
- 'Заболотний, 11 клас (2019): Стилістичні норми — офіційно-діловий стиль, термінологія'
- 'Авраменко, 11 клас (2019): Лексикологія — терміни, професіоналізми, запозичення'
- 'State Standard 2024: B2 SS 3 (Thematic areas: суспільство, право, економіка)'
