vocabulary_hints:
  required:
  - суддя (judge) — слідчий суддя, голова суду; офіційне звертання «Ваша честь»
  - прокурор (prosecutor) — державний обвинувач, санкція прокурора; висока частотність
  - адвокат (defense attorney) — надати правову допомогу, адвокатський запит; не плутати
    з «юрист»
  - позов (lawsuit/claim) — подати позов, цивільний позов; задовольнити або відхилити
    позов
  - свідок (witness) — давати свідчення, викликати свідка; свідок захисту/обвинувачення
  - термін (term) — юридична точність та визначення понять
  - процес (process) — судовий розгляд справи у часі
  recommended:
  - вирок (verdict) — винести вирок, обвинувальний або виправдувальний вирок; оскаржити
    вирок
  - згідно із законом (according to the law) — офіційна норма; уникати розмовного
    «по закону»
  - віра (vira) — історичний термін (грошовий штраф) з «Руської Правди» Ярослава Мудрого
  - Магдебурзьке право (Magdeburg Law) — історичний символ європейського самоврядування
    та незалежного суду
  - докази (evidence) — речові докази, сукупність доказів, збирати докази
  - аналіз (analysis) — детальне дослідження обставин справи
