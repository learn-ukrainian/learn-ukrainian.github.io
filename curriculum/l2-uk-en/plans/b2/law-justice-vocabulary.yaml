module: b2-27
level: B2
sequence: 27
slug: law-justice-vocabulary
version: '2.0'
title: Право та юстиція
subtitle: Мова закону і справедливості
content_outline:
- section: 'Вступ: Історія права та Державні стандарти (Introduction: History of Law
    and State Standards)'
  words: 600
  points:
  - 'Впровадження теми згідно з Держстандартом (§3.7): обговорення прав, обов’язків
    та поняття справедливості в суспільстві.'
  - 'Культурний гачок: «Руська Правда» Ярослава Мудрого — аналіз переходу від кровної
    помсти до штрафів («віра») як крок до гуманізації.'
  - Етимологія слова «Правда» в історичному контексті як синоніму закону та вищої
    справедливості.
- section: Судова система та європейська традиція (Judiciary System and European Tradition)
  words: 800
  points:
  - 'Огляд структури судів України: місцеві, апеляційні та роль Верховного Суду як
    останньої інстанції.'
  - 'Конституційний Суд України: окрема роль у захисті Основного Закону та прав громадян.'
  - 'Культурний контекст: Магдебурзьке право в Києві (1494–1499) як символ приналежності
    до європейського правового поля та міського самоврядування.'
- section: Учасники процесу та мовленнєва культура (Trial Participants and Language
    Culture)
  words: 900
  points:
  - 'Ключові постаті: суддя (голова суду), прокурор (державний обвинувач) та адвокат
    (захисник).'
  - 'Типова помилка: розрізнення загального терміна «юрист» та спеціалізованого «адвокат»
    (право на захист у суді) — вправа на корекцію.'
  - Офіційне звертання «Ваша честь» та процедура допиту свідків (давати свідчення
    vs лжесвідчення).
  - 'Робота з прийменниками: заміна кальки «по закону» нормативними конструкціями
    «згідно із законом» або «за законом».'
- section: Класифікація справ та офіційний регістр (Case Classification and Official
    Register)
  words: 900
  points:
  - 'Порівняння правопорушень: кримінальний злочин vs адміністративне правопорушення
    (штрафи, санкції).'
  - 'Спеціалізація судів: цивільні спори, господарські справи (бізнес) та кримінальне
    судочинство.'
  - 'Граматика закону: використання пасивних конструкцій («вирок було винесено», «санкцію
    погоджено») для створення офіційного, об’єктивного тону.'
- section: 'Судочинство: від позову до вироку (Litigation: From Lawsuit to Verdict)'
  words: 800
  points:
  - 'Процесуальні документи: підготовка позову (подати позов), розгляд доказів (речові
    та документальні) та винесення вироку.'
  - 'Оскарження рішень: поняття апеляції та право на перегляд справи в судах вищої
    інстанції.'
  - 'Практика: аналіз витягу з реального судового рішення з фокусом на юридичну термінологію
    та сталі колокації («задовольнити позов», «відхилити скаргу»).'
focus: grammar
pedagogy: CLIL
objectives:
- Учень може розуміти юридичні тексти та новини про судові справи
- Учень може використовувати базову юридичну термінологію в обговореннях
- Учень може розрізняти типи судів та судових процесів в Україні
