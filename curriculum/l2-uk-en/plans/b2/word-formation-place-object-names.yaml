module: b2-048
level: B2
sequence: 48
slug: word-formation-place-object-names
version: '2.0'
title: 'Словотворення: назви місць та об''єктів'
subtitle: 'Word Formation: Place and Object Names'
focus: grammar
pedagogy: TTT
phase: B2.5
word_target: 4000
objectives:
- Learner can identify suffixes that form place and object names in Ukrainian
- Learner can derive place names from verbs and nouns using appropriate suffixes
- Learner can distinguish between -ня, -ище, and -арня formations
- Learner can use place vocabulary appropriately in context
content_outline:
- section: 'Вступ: Логіка назв місць в українській мові (Introduction: The Logic of Place Names in Ukrainian)'
  words: 500
  points:
  - 'Огляд антропоцентричного підходу до словотворення: як назва місця визначається людською діяльністю (їсти → їдальня, лікувати
    → лікарня)'
  - 'Зв''язок між назвами осіб (агентивами) та назвами установ: як суфікси взаємодіють із професійними назвами (пекар → пекарня)'
  - 'Відповідність Державному стандарту (§4.2.8): компетенції щодо дериваційної морфології іменників на позначення місць за
    виконуваною дією'
- section: 'Суфікс -ня: Від кімнати до хати-читальні (Suffix -ня: From a Room to a Reading House)'
  words: 950
  points:
  - 'Продуктивність суфікса -ня для внутрішніх приміщень: читальня, спальня, їдальня, вітальня, вбиральня'
  - 'Граматична пастка: розрізнення варіантів -льня та -альня залежно від дієслівної основи (чита-ти → читальня vs вбир-а-ти
    → вбиральня)'
  - 'Культурний контекст: рух «Просвіта» та мережа «хат-читалень» як осередків національного відродження та ліквідації неписьменності'
  - 'Аналіз семантики: чому -ня зазвичай позначає закрите приміщення або обмежений простір для конкретної активності'
- section: 'Суфікс -ище: Ландшафт, простір та питання роду (Suffix -ище: Landscape, Space, and the Gender Issue)'
  words: 850
  points:
  - 'Семантична специфіка -ище: позначення відкритих територій, природних об''єктів або великих площ (пасовище, кладовище,
    родовище, звалище)'
  - 'Критична помилка: розмежування середнього роду назв місць (сховище, горище) та граматичного роду аугментативів (вітрище
    — чол. р., бо вітер)'
  - 'Функціональне використання: архітектурні та технічні назви (житлище, сховище) у науковому та офіційно-діловому регістрах'
- section: 'Суфікс -арня: Майстерні та культура кавування (Suffix -арня: Workshops and Coffee Culture)'
  words: 900
  points:
  - 'Утворення назв закладів від назв професій: пекарня, перукарня, друкарня, лікарня як центри професійної діяльності'
  - 'Урбаністичний символ: історія слова «кав''ярня» як питомої назви львівського типу закладу (на противагу запозиченому
    «кафе»)'
  - 'Сучасні гібридні формати: книгарня-кав''ярня як поєднання інтелектуального дозвілля та традиції читальних залів'
- section: Практичний практикум та корекція (Practical Workshop and Correction)
  words: 800
  points:
  - 'Аналіз та запобігання гіпергенералізації: чому не кожне дієслово приймає суфікс -ня (корекція помилок на кшталт «робільня»
    замість «майстерня»)'
  - 'Творча вправа: дериваційний ланцюжок «дія → особа → місце» (лікувати → лікар → лікарня) для закріплення морфологічних
    зв''язків'
  - 'Стилістичний аналіз: доречність використання конкретних суфіксів у науковому описі інфраструктури та міського простору'
vocabulary_hints:
  required:
  - термін (term) — наукова назва поняття; часто вживається з дієсловом 'визначати'
  - поняття (concept) — абстрактна одиниця мислення; ключове для граматичного аналізу
  - процес (process) — перебіг подій або дій; наприклад, процес словотворення
  - метод (method) — спосіб досягнення мети; дериваційний метод
  - читальня (reading room) — приміщення для читання; історичне 'хата-читальня'
  - кав'ярня (coffee house) — питомо українська назва закладу; 'затишна кав'ярня'
  recommended:
  - аналіз (analysis) — розклад цілого на частини; морфемний аналіз слова
  - синтез (synthesis) — поєднання частин у ціле; словотвірний синтез
  - дослідження (research) — наукове вивчення явища; дослідження мовних одиниць
  - сховище (storage/shelter) — місце для зберігання; 'надійне сховище'
  - книгарня-кав'ярня (bookstore-cafe) — сучасний культурний формат; поєднання читання та кавування
  - кладовище (cemetery) — місце поховання; суфікс -ище позначає велику територію
