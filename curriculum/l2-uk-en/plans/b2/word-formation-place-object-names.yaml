module: b2-062
level: B2
sequence: 62
slug: word-formation-place-object-names
version: '1.1'
title: "Словотвір: Назви місць та предметів"
subtitle: "Словотвір: назви місць і предметів"
focus: vocabulary
pedagogy: PPP
word_target: 4000
objectives:
  - "Вивчити суфікси на позначення приміщень та установ (-ня, -арня, -льня)."
  - "Опанувати творення назв місць за їхнім призначенням за допомогою суфіксів -ищ(е),
    -иськ(о)."
  - "Розуміти принципи творення назв знарядь праці та пристроїв (-ач, -ник, -лк-)."
  - "Засвоїти суфікси на позначення місткостей та просторів (-ниця, -ик)."
  - "Аналізувати емоційно-експресивні відтінки суфіксів у побутовій лексиці."

reading_situations:
  - source_type: "архітектурний опис або путівник"
    topic: "Опис старовинної садиби або сучасного громадського простору, де використовуються
      назви різних локацій (пекарня, сховище, вогнище)."
    key_elements: ["локативні суфікси", "назви приміщень", "історичні назви"]
    motivation: "Розуміння того, як мова структурує фізичний простір."

listening_situations:
  - media_type: "аудіо"
    setting: "Інструкція з користування побутовою технікою або екскурсія на виробництво,
      де згадуються різні пристрої та цехи."
    focus_points: ["Розпізнавання назв інструментів на -ач.", "Виокремлення назв цехів
          на -арня.", "Зрозуміння функції предмета за його назвою."]
    motivation: "Розвиток здатності ідентифікувати об'єкти за їхніми морфологічними
      ознаками."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть репортаж про відвідування етнографічного музею просто неба або
      сучасного еко-поселення. Опишіть будівлі, знаряддя праці та предмети побуту.
      Використовуйте щонайменше 15 слів, утворених за допомогою суфіксів місця та
      предмета."
    requirements:
      - "використання різноманітних суфіксів (-ня, -ище, -ник, -ач)"
      - "опис функціонального призначення предметів"
      - "використання прикметників для деталізації простору"
      - "мінімум 250 слів"
    motivation: "Практичне застосування конкретної номінативної лексики."
    model_answer: "Текст має бути візуально насиченим. Очікуються слова: 'кузня',
      'виставка', 'сховище', 'вимикач', 'підставка'. Автор повинен правильно поєднати
      застарілі назви предметів із сучасними. Модельний варіант фокусується на точності
      описів."

discussion_topics:
  - context: "Як змінюються назви предметів із розвитком технологій?"
    questions:
      - "Чому деякі пристрої зберігають старі назви (наприклад, 'друкарня'), хоча
        процес змінився?"
      - "Чи допомагає назва інструмента (наприклад, 'обігрівач') зрозуміти, як ним
        користуватися?"
      - "Які назви місць у вашому місті здаються вам найбільш влучними з точки зори
        словотвору?"
    motivation: "Обговорення зв'язку між назвою та функцією предмета/місця."

content_outline:
  - section: "Назви приміщень та виробничих локацій"
    words: 1000
    subsections:
      - "Суфікс -ня та його варіанти (їдальня, читальня, пекарня)"
      - "Суфікс -арня для назв майстерень та підприємств (друкарня, гуральня, пивоварня)"
      - "Специфіка вживання суфікса -иця в архітектурних назвах (світлиця, каплиця)"
      - "Тренди у творенні назв сучасних закладів"
    key_concepts:
      - "локатив"
      - "установа"
      - "виробництво"
      - "семантична спеціалізація"
  - section: "Місця за ознакою чи дією: -ище та -исько"
    words: 1000
    subsections:
      - "Позначення великих просторів: болото -> болотище, поле -> побоїще"
      - "Місця, де щось було або знаходиться: згарище, вогнище, городище"
      - "Експресивне значення суфіксів (збільшуваність vs зневага)"
      - "Відмінності між літературною нормою та діалектними варіантами"
    key_concepts:
      - "аугментатив"
      - "простір"
      - "результат події"
      - "експресивний суфікс"
  - section: "Назви знарядь та технічних пристроїв"
    words: 1000
    subsections:
      - "Суфікс -ач у назвах активних пристроїв (вимикач, навантажувач, тягач)"
      - "Суфікс -ник для позначення предметів за їхньою функцією (чайник, лічильник,
        записник)"
      - "Творення жіночого роду на -лк(а) (сівалка, косарка, пралка)"
      - "Складені назви та абревіатури в технічній термінології"
    key_concepts:
      - "інструменталіс"
      - "технічний термін"
      - "словотвірний тип"
      - "функціональність"
  - section: "Назви місткостей та побутових предметів"
    words: 1000
    subsections:
      - "Суфікси -ниця та -ник у назвах посуду (цукорниця, соусник)"
      - "Суфікс -ик у назвах дрібних предметів (ключик, столик)"
      - "Специфічні суфікси для позначення частин цілого"
      - "Аналіз етимології поширених назв побутових речей"
    key_concepts:
      - "контейнер"
      - "побут"
      - "димінутив"
      - "номінація"

vocabulary:
  required:
    - приміщення
    - сховище
    - установа
    - знаряддя
    - пристрій
    - місткість
    - виробництво
    - майстерня
  recommended:
    - майданчик
    - копальня
    - орієнтир
    - показник
    - вказівник
    - засіб
    - споруда
    - обладнання

activities:
  types_required:
    - match-up
    - fill-in
    - select
    - unjumble
  min_items_per_type: 10
  total_min_items: 40

activity_hints:
  - type: reading
    focus: "Прочитайте текст про назви приміщень та виробничих локацій і дайте відповіді на запитання щодо ключових понять."
  - type: essay-response
    focus: "Напишіть короткий текст (100-150 слів) про місця за ознакою чи дією: -ище та -исько, використовуючи нову лексику модуля."
  - type: critical-analysis
    focus: "Проаналізуйте взаємозв'язок між поняттями у розділі «Назви приміщень та виробничих локацій». Обґрунтуйте свою позицію прикладами з тексту."
  - type: error-correction
    focus: "Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему назви приміщень та виробничих локацій."

references:
  - "Караман, 10 клас (2018): §55-60 — Словотвір"
  - "Глазова, 11 клас (2019): §17-20 — Морфологічна стилістика"
  - "Авраменко, 11 клас (2019): §15-20 — Морфологічна норма"
  - "State Standard 2024: B2 SS 4.2 (word formation)"

