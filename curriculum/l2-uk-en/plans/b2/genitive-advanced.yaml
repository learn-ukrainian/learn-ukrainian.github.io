module: b2-047
level: B2
sequence: 47
slug: genitive-advanced
version: 1.0.2
title: 'Родовий відмінок: поглиблений рівень'
subtitle: 'Родовий відмінок: поглиблений рівень'
focus: grammar
pedagogy: TTT
word_target: 4000
phase: B2.4 [Domain Vocabulary & Advanced Cases]
objectives:
- 'Опанувати складні семантичні функції родового відмінка: частковий, суб''єктний,
  об''єктний родовий.'
- Засвоїти керування 18+ прийменників з родовим відмінком (замість, крім, 
  навколо, попри, поза, задля та ін.).
- Розрізняти закінчення -а/-я та -у/-ю в родовому однини чоловічого роду за 
  семантичним принципом.
- Вживати родовий відмінок у заперечних конструкціях та конструкціях зі 
  значенням кількості.
reading_situations:
- source_type: юридичний документ
  topic: 'Витяг із Цивільного кодексу: статті про право власності та відшкодування
    збитків.'
  key_elements:
  - прийменники з родовим (внаслідок, на підставі, згідно з)
  - об'єктний родовий
  - іменна домінанта
  motivation: Аналіз вживання родового відмінка в юридичному стилі.
listening_situations:
- media_type: лекція
  setting: 'Уривок із лекції з мовознавства: семантичні ролі родового відмінка в українській
    мові.'
  focus_points:
  - лінгвістична термінологія
  - приклади різних типів родового
  - порівняння з іншими мовами
  motivation: Розвиток навичок сприйняття лінгвістичного метамовлення.
writing_tasks:
- task_type: аналітичний текст
  prompt: 'Напишіть аналітичний текст на тему: ''Вплив урбанізації на якість повітря
    в українських містах.'' Використайте якомога більше конструкцій з родовим відмінком.'
  requirements:
  - мінімум 300 слів
  - щонайменше 10 прийменників з родовим відмінком
  - частковий родовий (трохи повітря, багато проблем)
  motivation: Практика вживання родового відмінка в аналітичному стилі.
  model_answer: 'Текст має демонструвати різноманітність родового: ''Внаслідок стрімкої
    урбанізації якість повітря погіршилася. Замість зелених зон з''являються нові
    будівлі. Навколо великих міст рівень забруднення перевищує норму...'''
discussion_topics:
- context: Чи потрібно обмежувати кількість автомобілів у центрі міста?
  questions:
  - Які переваги та недоліки заборони руху автомобілів у центрі?
  - 'Що важливіше для якості життя: зручність чи чисте повітря?'
  motivation: Дискусія з активним використанням родового відмінка.
dialogue_situations:
- setting: Колеги обговорюють результати звіту про стан довкілля.
  roles:
  - аналітик 1
  - аналітик 2
  key_phrases:
  - згідно з даними звіту
  - внаслідок забруднення
  - замість рішучих дій
- setting: Студент запитує викладача про правила закінчень -а/-у в родовому.
  roles:
  - студент
  - викладач
  key_phrases:
  - чому 'університету', а не 'університета'?
  - це залежить від семантики
  - конкретний предмет — закінчення -а
content_outline:
- section: Семантичні типи родового відмінка
  words: 1000
  subsections:
  - 'Частковий (партитивний) родовий: кількість речовини (налити чаю, купити хліба)'
  - 'Суб''єктний родовий: дія від імені (приїзд президента, рішення суду)'
  - 'Об''єктний родовий: дія спрямована на (досягнення мети, захист прав)'
  - Родовий належності (будинок батька) та означальний (людина честі)
  key_concepts:
  - партитивний родовий
  - суб'єктний родовий
  - об'єктний родовий
- section: Прийменники з родовим відмінком (18+)
  words: 1000
  subsections:
  - 'Причинові: внаслідок, через, завдяки, з причини, задля'
  - 'Просторові: навколо, поблизу, попри, поза, уздовж, посеред'
  - 'Часові: під час, до, після, протягом, упродовж'
  - 'Інші: замість, крім, окрім, за винятком, на відміну від'
  key_concepts:
  - прийменникове керування
  - семантична група
  - синонімія прийменників
- section: Закінчення -а/-я vs -у/-ю в родовому однини
  words: 1000
  subsections:
  - 'Конкретні предмети та істоти: -а/-я (стола, вчителя, коня)'
  - 'Абстрактні поняття, речовини, збірні: -у/-ю (страху, цукру, народу)'
  - 'Топоніми та географічні назви: Києва, але Донбасу'
  - 'Складні випадки: подвійні форми та стилістичні варіанти'
  key_concepts:
  - морфологічна норма
  - семантичний принцип
  - варіантність
- section: Родовий у заперечних та кількісних конструкціях
  words: 1000
  subsections:
  - 'Заперечний родовий: не має часу, не бачив результату'
  - 'Кількісні слова + родовий: багато, мало, кілька, трохи, чимало'
  - Числівники та збірні іменники з родовим (п'ять книжок, десяток яєць)
  - 'Порівняння з англійською: де English не вимагає зміни форми'
  key_concepts:
  - заперечна конструкція
  - кількісний родовий
  - числівникова група
- section: Підсумок — Summary
  words: 300
  points:
  - 'The Genitive case extends beyond possession to complex semantic functions: partitive
    (налити чаю), subjective (приїзд президента), and objective (захист прав), and
    is required after 18+ prepositions, negative verbs (не має часу), and quantity
    words (багато).'
  - "Masculine singular noun endings follow a semantic principle: concrete objects
    take -а/-я (стола), while abstract concepts and substances take -у/-ю (цукру).
    Self-check: What is the semantic difference between the Genitive endings for 'Київ'
    and 'Донбас'? Describe the location of 3 objects around you using spatial prepositions
    (навколо, поблизу, посеред) with the Genitive case."
vocabulary_hints:
- word: родовий
  translation: genitive (case)
  context: Родовий відмінок має найбільше функцій.
- word: частковий
  translation: partitive
  context: Частковий родовий позначає частину цілого.
- word: прийменник
  translation: preposition
  context: Прийменник 'внаслідок' вимагає родового відмінка.
- word: замість
  translation: instead of
  context: Замість кави випий чаю.
- word: навколо
  translation: around
  context: Навколо будинку росли дерева.
- word: крім
  translation: except, besides
  context: Усі прийшли, крім Олени.
- word: попри
  translation: despite
  context: Попри дощу, ми пішли на прогулянку.
- word: задля
  translation: for the sake of
  context: Задля миру люди готові на компроміс.
- word: внаслідок
  translation: as a result of
  context: Внаслідок аварії рух було перекрито.
- word: протягом
  translation: during, throughout
  context: Протягом тижня погода не змінилася.
- word: уздовж
  translation: along
  context: Уздовж річки тягнеться стежка.
- word: посеред
  translation: in the middle of
  context: Посеред площі стоїть пам'ятник.
- word: поза
  translation: outside of, beyond
  context: Поза межами міста — тиша.
- word: окрім
  translation: apart from
  context: Окрім граматики, вивчаємо лексику.
- word: керування
  translation: government (syntax)
  context: Керування — це тип синтаксичного зв'язку.
- word: відмінок
  translation: grammatical case
  context: В українській мові сім відмінків.
- word: семантика
  translation: semantics
  context: Семантика слова залежить від контексту.
- word: належність
  translation: belonging, possession
  context: 'Родовий належності: книжка сестри.'
