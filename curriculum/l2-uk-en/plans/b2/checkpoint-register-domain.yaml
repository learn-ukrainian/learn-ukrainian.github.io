module: b2-042
level: B2
sequence: 42
slug: checkpoint-register-domain
version: '1.0'
title: "Контрольний модуль: Регістри та предметні сфери"
subtitle: "Підсумковий контроль: стилістика, регістри та галузева лексика"
focus: checkpoint
pedagogy: review
word_target: 4000
phase: "B2.3 [Stylistic Devices & Register]"
# MERGE of: checkpoint-register + checkpoint-domain
objectives:
  - "Узагальнити знання про функціональні стилі та їхні ключові ознаки."
  - "Перевірити вміння вільно перемикатися між офіційним, науковим, художнім та розмовним
    регістрами."
  - "Оцінити рівень володіння термінологією: політика, право, економіка."
  - "Продемонструвати навички редагування текстів на стилістичну однорідність та
    доречність."

reading_situations:
  - source_type: "фрагменти текстів різних стилів"
    topic: "Визначення стилю уривка та обґрунтування вибору за допомогою мовних
      маркерів."
    key_elements: ["стилістичні маркери", "жанрова специфіка",
      "адресат мовлення", "галузева термінологія"]
    motivation: "Комплексна перевірка аналітичних навичок."

listening_situations:
  - media_type: "аудіо"
    setting: "Добірка коротких діалогів та монологів із різних сфер: суд, ринок,
      лекція, кав'ярня, парламент."
    focus_points: ["розпізнавання регістру", "виявлення стилістичного дисонансу",
      "ідентифікація галузевої термінології"]
    motivation: "Оцінка здатності швидко орієнтуватися в мовному просторі."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть порівняльний аналіз двох текстів на одну тему, написаних у
      різних стилях. Визначте основні відмінності у виборі лексики та побудові
      речень."
    requirements:
      - "мінімум 300 слів"
      - "використання метамовних термінів: конотація, термінологія, емоційне
        забарвлення"
      - "конкретні приклади з обох текстів"
    motivation: "Оцінка аналітичних навичок та вміння оперувати стилістичними
      категоріями."
    model_answer: "Аналіз має чітко розмежовувати об'єктивність наукового стилю
      та суб'єктивність публіцистики з конкретними прикладами."

discussion_topics:
  - context: "Стилістична грамотність як ознака професіоналізму."
    questions:
      - "Який стиль є найскладнішим для опанування іноземцями?"
      - "Як юридична неграмотність може зашкодити бізнесу?"
    motivation: "Обговорення практичного значення стилістики та термінології."

content_outline:
  - section: "Функціональні стилі: систематизація"
    words: 1000
    subsections:
      - "Ключові параметри розрізнення стилів: сфера, мета, форма"
      - "Взаємодія стилів у сучасному медіапросторі"
      - "Нейтральна лексика як базис для всіх регістрів"
      - "Стилістичний дисонанс: типові помилки"
    key_concepts:
      - "стильова домінанта"
      - "інтерстилістика"
      - "стилістична норма"
  - section: "Стилістичні ресурси: фонетика, лексика, синтаксис"
    words: 1000
    subsections:
      - "Фонетичні засоби: алітерація, асонанс, евфонія"
      - "Лексичні засоби: синонімічне багатство, конотація, експресивність"
      - "Синтаксичні засоби: типи речень як стилістичний інструмент"
      - "Тропи та фігури мовлення у різних контекстах"
    key_concepts:
      - "експресивність"
      - "образність"
      - "тропи"
  - section: "Галузева лексика: політика, право, економіка"
    words: 1000
    subsections:
      - "Політичний лексикон: державні інституції, вибори, дипломатія"
      - "Юридичний лексикон: судочинство, права, відповідальність"
      - "Економічний лексикон: бізнес, фінанси, інвестиції"
      - "Термінологічна міграція між доменами"
    key_concepts:
      - "галузева лексика"
      - "термінологічна база"
      - "міждисциплінарність"
  - section: "Практична стилістика та редагування"
    words: 1000
    subsections:
      - "Типові помилки: канцеляризми, плеоназми, тавтологія"
      - "Методика редагування: від аналізу до коректури"
      - "Cross-register rewriting: перекладання тексту з одного стилю в інший"
      - "Фінальний практикум: комплексний аналіз тексту"
    key_concepts:
      - "редагування"
      - "плеоназм"
      - "трансформація"

vocabulary_hints:
  - word: "функціональний стиль"
    translation: "functional style"
    context: "В українській мові п'ять функціональних стилів."
  - word: "стилістична фігура"
    translation: "figure of speech"
    context: "Стилістична фігура підсилює виразність."
  - word: "конотація"
    translation: "connotation"
    context: "Конотація слова залежить від контексту."
  - word: "доречність"
    translation: "appropriateness"
    context: "Доречність лексики визначається ситуацією."
  - word: "законопроєкт"
    translation: "bill (draft law)"
    context: "Парламент розглянув законопроєкт."
  - word: "рентабельність"
    translation: "profitability"
    context: "Рентабельність проєкту — 15 відсотків."
  - word: "правосуддя"
    translation: "justice"
    context: "Незалежне правосуддя — основа демократії."
  - word: "інвестиції"
    translation: "investment"
    context: "Іноземні інвестиції зростають."
  - word: "демократія"
    translation: "democracy"
    context: "Демократія потребує активного громадянства."
  - word: "корупція"
    translation: "corruption"
    context: "Боротьба з корупцією — пріоритет реформ."
  - word: "редагування"
    translation: "editing"
    context: "Редагування тексту — необхідний етап."
  - word: "плеоназм"
    translation: "pleonasm"
    context: "Плеоназм — це надлишкове вживання слів."
  - word: "термінологія"
    translation: "terminology"
    context: "Юридична термінологія потребує точності."
  - word: "мовна норма"
    translation: "language norm"
    context: "Мовна норма регулює вживання слів."
  - word: "експресивність"
    translation: "expressiveness"
    context: "Експресивність мовлення залежить від регістру."

activities:
  types_required:
    - quiz
    - error-correction
    - match-up
    - select
  min_items_per_type: 10
  total_min_items: 40

activity_hints:
  - type: group-sort
    focus: "Класифікувати уривки за стилем та термінологію за доменом"
  - type: error-correction
    focus: "Знайти стилістичні помилки та змішування регістрів"
  - type: essay-response
    focus: "Написати одну новину в трьох стилях: науковому, публіцистичному та
      розмовному"
  - type: critical-analysis
    focus: "Проаналізувати реальну статтю: визначити регістр, стилістичні
      відхилення, доречність"

references:
