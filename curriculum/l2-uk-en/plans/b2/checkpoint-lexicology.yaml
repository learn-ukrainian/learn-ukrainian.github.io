module: b2-069
level: B2
sequence: 69
slug: checkpoint-lexicology
version: '1.1'
title: "Контрольна точка: Лексикологія та фразеологія"
subtitle: "Checkpoint: Lexicology and Phraseology"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Узагальнити та систематизувати знання з лексикології та фразеології рівня B2."
  - "Перевірити навички розпізнавання та правильного вживання ідіом, паремій та неологізмів."
  - "Здійснити комплексний лексичний та фразеологічний аналіз текстів різних функціональних стилів."
  - "Продемонструвати вміння підбирати синонімічні відповідники та стилістично доцільну лексику."

reading_situations:
  - source_type: "публіцистичний текст"
    topic: "Мовна колонка в українському ЗМІ: аналіз вживання фразеологізмів, неологізмів та синонімів у реальному журналістському тексті."
    key_elements: ["лексичне розмаїття", "стилістична доречність", "фразеологізми в контексті", "неологізми"]
    motivation: "Комплексна перевірка навичок розпізнавання та аналізу лексичних одиниць у живому тексті."

listening_situations:
  - media_type: "відео"
    setting: "Добірка уривків з сучасних українських ток-шоу, де гості використовують складну лексику та ідіоматику."
    focus_points: ["ідентифікація лексичних помилок", "аналіз доречності вживання фразеологізмів", "визначення семантичних відтінків неологізмів"]
    motivation: "Перевірка здатності критично сприймати та аналізувати лексичний склад живого мовлення."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть розгорнуту відповідь на запитання: 'Як сучасна лексика та фразеологія відображають трансформації в українському суспільстві?'"
    motivation: "Оцінка здатності синтезувати знання з різних тем модуля для створення цілісного тексту."
    requirements: ["мінімум 350 слів", "використання щонайменше 5 ідіом та 5 неологізмів", "дотримання академічного стилю"]
    model_answer: "Текст має логічно поєднувати аналіз нових запозичень (наприклад, у військовій та технологічній сферах) з аналізом стабільного фразеологічного фонду як культурного якоря."

content_outline:
  - section: "Узагальнюючий огляд лексичної системи"
    words: 1000
    subsections:
      - "Багатозначність слова та контекстуальна семантика: повторення складних випадків"
      - "Синонімічні ряди та антонімічні пари: точність слововживання"
      - "Паронімія та її роль у виникненні лексичних помилок"
    key_concepts:
      - "полісемія"
      - "синоніміка"
      - "паронімія"
      - "лексична сполучуваність"
  - section: "Фразеологічний арсенал: від паремій до ідіом"
    words: 1000
    subsections:
      - "Класифікація та стилістичні функції фразеологізмів: соматизми, зооморфізми, природничі ідіоми"
      - "Прислів'я та приказки як засіб культурної експресії"
      - "Трансформація фразеологізмів у сучасному медіа-дискурсі"
    key_concepts:
      - "фразеологічна одиниця"
      - "пареміологія"
      - "ідіоматика"
      - "етнокультурна специфіка"
  - section: "Динамічні процеси: неологізми, архаїзми, запозичення"
    words: 1000
    subsections:
      - "Аналіз активного та пасивного словникового складу"
      - "Адаптація іншомовних слів та дискусії навколо пуризму"
      - "Створення авторських неологізмів у сучасній поезії та прозі"
    key_concepts:
      - "активний словник"
      - "архаїзм"
      - "історизм"
      - "неологізм"
  - section: "Практичний практикум з лексичного аналізу"
    words: 1000
    subsections:
      - "Методика повного лексичного розбору слова"
      - "Виявлення та виправлення лексичних кальок та суржикових конструкцій"
      - "Стилістичне редагування текстів з акцентом на лексичну розмаїтість"
    key_concepts:
      - "лексичний аналіз"
      - "редагування"
      - "мовна норма"
      - "стилістична влучність"

vocabulary:
  required:
    - лексикологія
    - фразеологія
    - семантика
    - стилістика
    - контекст
    - узагальнення
    - трансформація
    - влучність
  recommended:
    - досконалість
    - розмаїтість
    - автентичність
    - змістовність
    - переосмислення

activities:
  types_required:
    - quiz
    - error-correction
    - critical-analysis
    - match-up
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: cloze
    focus: "Комплексний текст із пропусками, що потребують знань синонімії, фразеології та неологізмів."
  - type: match-up
    focus: "Зіставлення різних типів лексичних одиниць: синонім↔тип, ідіома↔значення, прислів'я↔ситуація."
  - type: error-correction
    focus: "Знайти та виправити всі лексичні помилки у тексті: неточний синонім, русизм-калька, спотворений фразеологізм."
  - type: essay-response
    focus: "Написати зв'язний текст із використанням заданих фразеологізмів, прислів'їв та неологізмів."
  - type: group-sort
    focus: "Класифікувати лексичні одиниці за типом: синонім, паронім, фразеологізм, неологізм, запозичення."

references:
  - "Караман С. О. Українська мова. 10 клас (2018), §35-45 — Лексикологія (повний розділ)"
  - "Глазова О. П. Українська мова. 11 клас (2019), §11-15 — Лексична норма"
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Лексикологія та фразеологія"
  - "State Standard 2024: B2 SS 4.4 — Lexicology, B2 vocabulary target: 5940 cumulative"

connects_to:
