objectives:
- Учень може будувати складні часові ланцюжки для опису послідовних та паралельних подій
- Учень вміє розрізняти реальні та гіпотетичні умови, використовуючи відповідні сполучники
- Учень розуміє використання сполучників щойно та відколи в історичних та особистих розповідях
content_outline:
- section: 'Вступ: Світ умов та часових ланцюжків (Introduction: The World of Conditions and Temporal Chains)'
  words: 500
  points:
  - Огляд складнопідрядних речень із часовими та умовними зв'язками згідно з ДСТУ §4.3.4.3 та §4.3.4.5.
  - Культурний вступ через приказку «Якби та аби, та виросли в роті гриби» — аналіз ролі сполучників у створенні гіпотетичних
    сценаріїв.
  - Розрізнення реальної умови (якщо) та ірреальної/бажаної умови (якби, коли б) як основа комунікативної компетенції рівня
    B2.
- section: 'Часові сполучники: Від одночасності до межі (Temporal Conjunctions: From Simultaneity to Limits)'
  words: 1000
  points:
  - 'Вираження одночасності та різночасності: нюанси вживання коли, щойно та тільки-но для швидкої зміни подій.'
  - 'Глибокий аналіз пари поки vs доки: поки як тривалість процесу та доки як досягнення часової межі.'
  - Вивчення межі через приказку «Доки сонце зійде – роса очі виїсть» — граматичний розбір конструкції «доки... доти».
  - Використання щойно та відколи в історичних та особистих розповідях для маркування точок відліку.
- section: 'Умовні сполучники: Реальність, гіпотеза та офіційність (Conditional Conjunctions: Reality, Hypothesis, and Formality)'
  words: 1000
  points:
  - Конструкції реальної умови з якщо та альтернативні варіанти коли (у значенні умови) у розмовному стилі.
  - 'Ірреальна умова через «соломку»: аналіз структури «Якби знав, де впаду, то й соломки б підстелив» (якби + минулий час,
    обов''язкова частка б/би в головній частині).'
  - 'Офіційно-діловий стиль: вживання за умови що та критичний аналіз канцелярського «у випадку якщо» на користь стилістично
    нейтрального «у разі, якщо».'
- section: Культура мовлення та запобігання типовим помилкам (Speech Culture and Error Prevention)
  words: 800
  points:
  - 'Типова помилка: заміна умовного якщо часовим коли (Wrong: «Коли буде дощ, я лишуся вдома» vs Correct: «Якщо буде дощ...»).'
  - 'Орфографічний практикум: розрізнення сполучника якби (разом) та займенника з часткою як би (окремо) — контекстуальні
    приклади.'
  - 'Очищення від русизмів: заміна конструкції «тільки що» на питомі щойно або тільки-но у різних регістрах мовлення.'
  - 'Синтаксична цілісність: відпрацювання вживання часток б/би у складних гіпотетичних реченнях.'
- section: 'Практика: Синтез і трансформація зв''язків (Practice: Synthesis and Transformation of Links)'
  words: 700
  points:
  - 'Трансформаційні вправи: перетворення реальних планів (якщо) на гіпотетичні жалкування (якби) на основі життєвих сценаріїв.'
  - 'Побудова логічних ланцюжків: написання інструкції або протоколу дій із використанням послідовності перш ніж, після того
    як, щойно.'
  - 'Синтез граматики: об''єднання часових та умовних підрядних частин в одному складному реченні (комплексний аналіз на базі
    M67).'
vocabulary_hints:
  required:
  - щойно (as soon as) — частотне; заміна русизму 'тільки що'; щойно прийшов, щойно закінчив
  - поки (while/until) — висока частотність; позначає тривалість або одночасність; поки що
  - доки (until) — позначає часову межу; доки не, доки... доти; акцент на завершенні
  - якби (if only/if) — маркер ірреальної умови; вимагає часток б/би; не плутати з 'як би'
  - якщо (if) — нейтральний маркер умови; не замінювати на 'коли' у чисто умовних контекстах
  recommended:
  - у разі, якщо (in case of) — стилістично краща альтернатива бюрократичному 'у випадку якщо'
  - тільки-но (just now/as soon as) — синонім до щойно; літературний та розмовний регістри
  - за умови що (on condition that) — офіційний/публіцистичний регістр; вираження конкретних параметрів
  - термін (term) — у контексті часових рамок або професійної лексики
  - поняття (concept) — для абстрактного аналізу граматичних категорій
