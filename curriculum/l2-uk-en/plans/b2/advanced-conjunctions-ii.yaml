module: b2-065
level: B2
sequence: 65
slug: advanced-conjunctions-ii
version: '1.1'
title: "Поглиблене вивчення сполучників: Підрядність"
subtitle: "Складні сполучники II: підрядність"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Систематизувати знання про семантичні групи підрядних сполучників та сполучних
    слів."
  - "Опанувати вживання складених підрядних сполучників (через те що, незважаючи на
    те що тощо)."
  - "Дослідити явища синтаксичної омонімії та синонімії підрядних засобів зв'язку."
  - "Навчитися правильно оформлювати пунктуацію у реченнях із кількома підрядними."

reading_situations:
  - source_type: "науково-популярна стаття"
    topic: "Аналіз причиново-наслідкових зв'язків у тексті про соціальні зміни в Україні."
    key_elements: ["складені сполучники", "підрядні речення причини та наслідку",
      "логічна аргументація"]
    motivation: "Розвиток навичок розпізнавання та аналізу складних підрядних конструкцій
      у науковому тексті."

listening_situations:
  - media_type: "лекція"
    setting: "Уривок університетської лекції з соціології, присвяченої динаміці розвитку
      сучасного міста."
    focus_points: ["виокремлення причиново-наслідкових сполучників", "аналіз логіки
          допустових конструкцій", "розпізнавання сполучних слів"]
    motivation: "Розвиток навички сприйняття на слух складної академічної аргументації
      з розгалуженою системою підпорядкування."

discussion_topics:
  - context: "Обговорення дилеми: 'Чи варто жертвувати стабільністю заради особистої
      свободи?'"
    questions:
      - "Які сполучники умови ви використаєте для побудови своїх аргументів?"
      - "Як зміниться тональність вашої тези, якщо змінити 'хоча' на 'дарма що'?"
      - "Чому складені сполучники вважаються ознакою книжного стилю?"
    motivation: "Стимулювання використання різноманітних підрядних конструкцій для
      вираження складних думок та припущень."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть аналітичний текст на тему 'Причини та наслідки урбанізації в
      Україні'. Використовуйте щонайменше 8 різних підрядних сполучників, включаючи
      складені."
    requirements:
      - "використання причинових, умовних, допустових та наслідкових сполучників"
      - "правильна пунктуація при складених сполучниках"
      - "логічна структура аргументації"
      - "мінімум 250 слів"
    motivation: "Практика побудови складних підрядних конструкцій у зв'язному тексті."
    model_answer: "Текст має демонструвати впевнене володіння підрядними засобами
      зв'язку. Очікується вживання конструкцій: 'через те що', 'незважаючи на те що',
      'для того щоб', 'у міру того як'. Модельний варіант фокусується на різноманітності
      підрядних конструкцій та логічній зв'язності аргументів."

content_outline:
  - section: "Типологія підрядних засобів зв'язку"
    words: 1000
    subsections:
      - "Функціональна різниця між сполучниками та сполучними словами"
      - "Семантична палітра: часові, причинові, умовні, допустові, наслідкові та мети"
      - "Ступені абстракції: від простих сполучників до аналітичних конструкцій"
    key_concepts:
      - "підрядність"
      - "сполучне слово"
      - "семантична група"
      - "відносна займенниковість"
  - section: "Аналітичні (складені) сполучники: функціонування та пунктуація"
    words: 1000
    subsections:
      - "Механізм розчленування складених сполучників: роль наголосу та контексту"
      - "Стилістичне навантаження сполучників 'внаслідок того що', 'завдяки тому що',
        'у міру того як'"
      - "Пунктуація при збігу двох сполучників (що коли, якби... то)"
    key_concepts:
      - "складений сполучник"
      - "розчленування"
      - "збіг сполучників"
      - "стилістична диференціація"
  - section: "Синтаксична омонімія та засоби її подолання"
    words: 1000
    subsections:
      - "Диференціація омонімічних пар: щоб/що б, якби/як би, проте/про те"
      - "Роль логічного наголосу у розрізненні частин мови та сполучників"
      - "Синонімія підрядних сполучників як інструмент точного слововживання"
    key_concepts:
      - "омонімія"
      - "синонімія"
      - "логічний наголос"
      - "контекстуальна заміна"
  - section: "Складнопідрядне речення з кількома підрядними"
    words: 1000
    subsections:
      - "Типи зв'язку: однорідна, послідовна та неоднорідна підпорядкованість"
      - "Складна синтаксична конструкція як засіб вираження наукової думки"
      - "Типові граматичні помилки при побудові довгих речень"
    key_concepts:
      - "багатопідрядність"
      - "ієрархія смислів"
      - "синтаксична помилка"
      - "когерентність"

vocabulary:
  required:
    - підрядність
    - умова
    - допуст
    - наслідок
    - мета
    - омонімія
    - розчленування
    - аргументація
  recommended:
    - незважаючи на те що
    - дарма що
    - через те що
    - аби
    - якби
    - оскільки

activities:
  types_required:
    - fill-in
    - error-correction
    - translate
    - essay-response
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: cloze
    description: "Complete complex sentences with correct subordinating conjunctions"
  - type: error-correction
    description: "Fix conjunction misuse and punctuation errors in subordinate clauses"
  - type: fill-in
    description: "Combine two simple sentences using a specified conjunction (e.g.,
      через те що, незважаючи на те що)"
  - type: select
    description: "Identify the clause relationship (причина/умова/допуст/наслідок/мета)"

references:
  - "Заболотний, 9 клас (2017): §25-40 — Сполучники у складних реченнях"
  - "Караман, 10 клас (2018): §71-74 — Дієслово: вид, час, спосіб"
  - "Глазова, 11 клас (2019): §1-10 — Морфологічна норма"
  - "State Standard 2024: B2 SS 4.1.3 (verb forms)"

