module: b2-44
level: B2
sequence: 44
slug: complex-syntax-ellipsis-parcelling
version: '2.0'
title: 'Складний синтаксис: еліпсис і парцеляція'
subtitle: Omitted words and stylistic fragmentation
content_outline:
- section: 'Вступ: Експресивний синтаксис (Introduction: Expressive Syntax)'
  words: 600
  points:
  - 'Вступ до стилістичних синтаксичних засобів згідно з Держстандартом (§4.4.1.3):
    роль еліпсису та парцеляції у створенні виразності'
  - Поняття номінативних речей (§4.3.3) як фундаменту для стилістичної економії (напр.
    'Вечір. Спокій.')
  - Відмінність між граматичною неповнотою в діалозі та свідомим художнім вибором
    автора для створення емоційного ефекту
- section: 'Еліпсис: Мистецтво пропуску (Ellipsis: The Art of Omission)'
  words: 900
  points:
  - 'Класифікація еліпсису: контекстуальний (зрозумілий із ситуації) та граматичний
    (структурно зумовлений пропуск присудка)'
  - 'Динаміка еліпсису в класичній літературі: аналіз творчості Тараса Шевченка («Аж
    небо блакитне широкими [крилами] б''є») — ефект польоту та швидкості'
  - 'Еліптичні конструкції у шістдесятників: Василь Симоненко та акцентування унікальності
    образу через пропуск зв''язки (''Усмішка твоя — єдина'')'
  - 'Функціонування еліпсису в медіа-дискурсі: лаконічність газетних заголовків та
    рекламних слоганів'
- section: 'Парцеляція: Ритм і фрагментація (Parcelling: Rhythm and Fragmentation)'
  words: 900
  points:
  - 'Механіка парцеляції: розрив речення крапкою для створення інтонаційних пауз та
    смислових акцентів'
  - 'Психологізм парцеляції у Григора Тютюнника: імітація живого, переривчастого мовлення
    («Бери. Підкріпись. Це твоя.») для передачі напруги'
  - 'Ефект нагнітання (градації) через відокремлення обставин чи додатків: створення
    відчуття тривалості або несподіванки'
  - 'Пунктуаційна суворість: чому парцеляція вимагає саме крапки (або знака оклику/питання),
    а не коми, для досягнення стилістичної мети'
- section: Корекція типових помилок та стилістика (Error Correction and Stylistics)
  words: 800
  points:
  - 'Розмежування термінів: виправлення помилкового ототожнення будь-якого неповного
    речення з еліпсисом (навмисність vs структурна необхідність)'
  - 'Пунктуаційна корекція: аналіз помилки вживання коми замість крапки при спробі
    парцеляції — втрата інтонаційного розриву'
  - 'Доречність у регістрах: аналіз стилістичної помилки використання парцеляції в
    офіційно-діловому стилі (порушення логічної цілісності документа)'
  - 'Практикум із трансформації: перетворення стандартних розлогих речень на емоційно
    забарвлені конструкції з еліпсисом або парцеляцією'
- section: Творчий синтез та підсумок (Creative Synthesis and Summary)
  words: 800
  points:
  - 'Аналіз взаємодії еліпсису та парцеляції в одному тексті: створення драматичного
    напруження та ефекту присутності'
  - 'Роль автора як ''креативного writer-а'': використання цих засобів як інструментів
    маніпуляції увагою читача'
  - 'Підсумкова вправа на відновлення пропущених елементів: розвиток лінгвістичної
    інтуїції та відчуття контексту'
  - 'Рефлексія: вибір власного стилю — між класичною повнотою та експресивною фрагментарністю'
focus: grammar
pedagogy: TTT
objectives:
- Learner can recognize elliptical constructions in authentic Ukrainian texts
- Learner can produce parcelled sentences for stylistic effect
- Learner can recover omitted elements in elliptical speech
- Learner can transform standard sentences using parcelling
grammar:
- Ellipsis (еліпсис/пропуск) - omission of understood words
- Parcelling (парцеляція) - stylistic fragmentation with periods
- Expressive syntax in literature and speech
register: художній
phase: B2.2 [Phraseology & Synonymy]
vocabulary_hints:
  required:
  - термін (term) — науковий термін, вживати термін; висока частотність у лінгвістичному
    аналізі
  - поняття (concept) — базове поняття, розширити поняття; вживається для теоретичних
    визначень
  - процес (process) — творчий процес, процес створення; описує динаміку формування
    речення
  - метод (method) — метод аналізу, ефективний метод; стосується способів роботи з
    текстом
  - еліпсис (ellipsis) — стилістичний еліпсис, ефект еліпсису; спеціалізований термін
    для пропуску
  - парцеляція (parcelling) — явище парцеляції, застосовувати парцеляцію; термін для
    стилістичного розриву речення
  recommended:
  - аналіз (analysis) — метод розчленування речення на фрагменти
  - синтез (synthesis) — процес відновлення цілісності еліптичного речення
  - нагнітання (buildup/climax) — стилістичний ефект посилення емоції
  - лаконічність (conciseness) — основна мета використання еліпсису
  - динаміка (dynamics) — ефект, що досягається швидкою зміною неповних конструкцій
