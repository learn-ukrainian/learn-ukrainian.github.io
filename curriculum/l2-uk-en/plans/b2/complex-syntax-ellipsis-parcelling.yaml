module: b2-022
level: B2
sequence: 22
slug: complex-syntax-ellipsis-parcelling
version: '1.2'
title: "Складний синтаксис: еліпсис та парцеляція"
subtitle: "Складний синтаксис: еліпсис і парцеляція"
focus: grammar
pedagogy: PPP
phase: "B2.2 [Phraseology & Synonymy]"
word_target: 4000
objectives:
  - "Розуміти механізми еліпсису (пропуску компонентів речення) та умови його доречності."
  - "Застосовувати парцеляцію як стилістичний прийом для розчленування думки та створення
    емоційного акценту."
  - "Відрізняти нормативний еліпсис у розмовному мовленні від стилістично маркованого
    у художніх текстах."
  - "Володіти пунктуацією при еліптичних конструкціях та парцелятах (вживання тире,
    крапки, трикрапки)."
  - "Аналізувати вплив синтаксичної компресії на динаміку та експресію сучасного українського
    медіатексту."

reading_situations:
  - source_type: "пост у соціальних мережах"
    topic: "Рефлексія лідера думок на актуальну суспільну подію."
    key_elements:
      - "парцеляція для створення ефекту 'потоку свідомості'"
      - "еліптичні конструкції, характерні для мережевої комунікації"
      - "використання трикрапки як знака незавершеності або емоційної паузи"
    motivation: "Вивчення того, як сучасний цифровий синтаксис використовує засоби
      компресії для швидкого емоційного впливу."

listening_situations:
  - media_type: "відео"
    setting: "Уривок з сучасної української театральної вистави."
    focus_points:
      - "Еліпсис у діалогах: розуміння змісту через контекст та ситуацію."
      - "Інтонація парцеляції: як актори виділяють відокремлені частини речення."
      - "Психологічна роль пауз у реченнях з пропущеними присудками."
    motivation: "Розвиток здатності сприймати на слух 'неповні' конструкції та відновлювати
      їхній смисл."

writing_tasks:
  - task_type: "творчий опис"
    prompt: "Напишіть внутрішній монолог персонажа, який перебуває в стані сильного
      емоційного збудження (радість, страх, здивування). Активно використовуйте парцеляцію
      та еліпсис."
    requirements:
      - "мінімум 200 слів"
      - "використати не менше 5 парцельованих конструкцій"
      - "застосувати еліпсис присудка у реченнях руху або стану"
      - "правильно оформити тире на місці пропущеного члена речення"
    motivation: "Практичне відпрацювання експресивних можливостей синтаксису для створення
      психологічного портрета."
    model_answer: "Текст має бути уривчастим, динамічним, де головна думка розбивається
      на окремі фрагменти для підсилення емоційної напруги."

discussion_topics:
  - context: "Чи не шкодить надмірне використання еліпсису та парцеляції чистоті та
      зрозумілості української мови?"
    questions:
      - "У яких стилях еліпсис є неприпустимим (наприклад, юридичний чи технічний)?"
      - "Як парцеляція впливає на темп читання тексту?"
      - "Чи відчуваєте ви різницю між 'помилкою' та 'стилістичним прийомом' у випадку
        неповних речень?"
    motivation: "Стимулювання критичного оцінювання синтаксичних новацій та їхньої
      доречності."

content_outline:
  - section: "Еліпсис як засіб синтаксичної компресії"
    words: 1000
    subsections:
      - "Поняття про еліптичні речення: структура та семантика"
      - "Еліпсис у розмовному стилі: економія мовних засобів"
      - "Контекстуально та ситуативно неповні речення"
      - "Пунктуація в еліптичних реченнях: вживання тире на місці пропущеного присудка"
    key_concepts:
      - "еліпсис"
      - "компресія"
      - "неповне речення"
  - section: "Парцеляція: структура та функції"
    words: 1000
    subsections:
      - "Визначення парцеляції як розчленування речення на кілька інтонаційно-смислових
        одиниць"
      - "Граматичні типи парцелятів: від відокремлених другорядних членів до підрядних
        частин"
      - "Функція уточнення, акцентування та створення ритму"
      - "Парцеляція у заголовках та рекламних текстах"
    key_concepts:
      - "парцеляція"
      - "парцелят"
      - "інтонаційне розчленування"
  - section: "Експресивний потенціал неповних конструкцій"
    words: 1000
    subsections:
      - "Художня роль еліпсису: лаконізм та динамізм дії"
      - "Використання парцеляції для передачі психологічного стану героя"
      - "Створення ефекту розмови 'на рівних' у публіцистиці через засоби компресії"
      - "Порівняльний аналіз повних та неповних синонімічних конструкцій"
    key_concepts:
      - "динамізм"
      - "експресія"
      - "лаконізм"
  - section: "Нормативність та стилістичні помилки"
    words: 1000
    subsections:
      - "Межа між стилістичним прийомом та граматичною неповнотою"
      - "Типові помилки при використанні парцеляції у шкільних та академічних есе"
      - "Редагування текстів з надмірною компресією: пошук балансу"
      - "Вплив англомовного синтаксису на поширення еліптичних форм в українському
        сегменті мережі"

vocabulary:
  required:
    - еліпсис
    - парцеляція
    - компресія
    - неповне речення
    - присудок
    - інтонація
    - контекст
  recommended:
    - експресивність
    - психологізм
    - темпоритм
    - розчленування
    - лаконічність

activities:
  types_required:
    - punctuation-fix
    - reading
    - essay-response
    - error-correction
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: select
    focus: "Визначити стилістичний прийом у тексті: еліпсис чи парцеляція"
  - type: fill-in
    focus: "Відновити пропущений член еліптичного речення, зберігаючи стиль"
  - type: error-correction
    focus: "Виправити невдалу парцеляцію (фрагменти, що не сприймаються як стилістичний
      прийом)"
  - type: reading
    focus: "Знайти приклади еліпсису та парцеляції в уривку з художнього тексту та
      пояснити їхню функцію"

references:
  - source: "Караман, 10 клас (2018)"
    pages: "§60–62"
    topic: "Неповні речення, еліпсис, стилістичні фігури синтаксису"
  - source: "Заболотний, 9 клас (2017)"
