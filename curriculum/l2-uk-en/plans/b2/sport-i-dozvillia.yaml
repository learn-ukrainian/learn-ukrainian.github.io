- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про спортивне життя україни, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Види спорту та фізична активність». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему види спорту та фізична активність.
