module: b2-017
level: B2
sequence: 17
slug: sport-i-dozvillia
version: 1.0.1
title: Спорт і дозвілля
subtitle: Спорт і дозвілля
focus: thematic
pedagogy: TTT
word_target: 4000
phase: B2.1 [Participles & Sentence Structure]
objectives:
- Описувати спортивні події, змагання та особисту фізичну активність.
- Обговорювати різні форми дозвілля та хобі з використанням розгорнутої лексики.
- Коментувати спортивні матчі та обговорювати досягнення українських спортсменів.
- Інтегрувати складні синтаксичні конструкції (однорідні члени, відокремлення) для створення динамічних описів.
reading_situations:
- source_type: спортивний репортаж
  topic: 'Репортаж про виступ збірної України на міжнародних змаганнях: емоції, результати, коментарі тренера.'
  key_elements:
  - спортивна термінологія
  - динамічні дієслова
  - емоційна лексика
  motivation: Розуміння стилістики спортивної журналістики.
listening_situations:
- media_type: відео
  setting: Спортивний коментар футбольного матчу збірної України.
  focus_points:
  - швидкий темп мовлення
  - спортивний жаргон
  - емоційні вигуки
  motivation: Розвиток навичок розуміння динамічного спортивного мовлення.
writing_tasks:
- task_type: есе
  prompt: Напишіть есе про роль спорту в житті сучасних українців. Наведіть приклади відомих спортсменів та обговоріть вплив
    війни на спортивне життя країни.
  requirements:
  - мінімум 300 слів
  - використання спортивної термінології
  - однорідні члени для перерахування видів спорту та досягнень
  motivation: Практика аргументованого есе на спортивну тему.
  model_answer: 'Есе має поєднувати факти та роздуми: ''Спорт для українців — це не лише фізична активність, а й національна
    гордість. Ольга Харлан, яка перемогла на Олімпійських іграх, стала символом незламності...'''
discussion_topics:
- context: 'Олімпійські ігри та політика: чи мають спортсмени з країни-агресора виступати під нейтральним прапором?'
  questions:
  - Чи можна відділити спорт від політики?
  - Які українські спортсмени надихають вас і чому?
  motivation: Дискусія на актуальну тему з використанням аргументації.
dialogue_situations:
- setting: 'Друзі обговорюють, як провести вихідні: спорт, кіно чи прогулянка.'
  roles:
  - друг 1
  - друг 2
  key_phrases:
  - може, підемо на басейн?
  - я б краще погуляв у парку
  - а що щодо кіно?
- setting: Тренер пояснює план тренування початківцю в спортзалі.
  roles:
  - тренер
  - початківець
  key_phrases:
  - починаємо з розминки
  - робимо три підходи
  - не забувайте про розтяжку
content_outline:
- section: Види спорту та фізична активність
  words: 1000
  subsections:
  - 'Командні види спорту: футбол, баскетбол, волейбол'
  - 'Індивідуальні: плавання, біг, фехтування, бокс'
  - 'Фітнес-культура: спортзал, йога, кросфіт'
  - Зимові та екстремальні види спорту в Україні
  key_concepts:
  - фізична активність
  - тренування
  - змагання
- section: Спортивне життя України
  words: 1000
  subsections:
  - 'Українські спортсмени на міжнародній арені: Усик, Харлан, Магучіх'
  - 'Футбол як національна пристрасть: Шахтар, Динамо, збірна'
  - 'Спорт і війна: виступи під бомбардуваннями, ветерани-паралімпійці'
  - Ігри Нескорених (Invictus Games) та реабілітація через спорт
  key_concepts:
  - досягнення
  - витривалість
  - реабілітація
- section: Дозвілля та хобі
  words: 1000
  subsections:
  - 'Активний відпочинок: походи, велосипед, каякінг'
  - 'Культурне дозвілля: театр, кіно, музеї, виставки'
  - 'Домашні хобі: читання, садівництво, кулінарія, рукоділля'
  - 'Цифрове дозвілля: ігри, стримінг, соціальні мережі'
  key_concepts:
  - дозвілля
  - хобі
  - відпочинок
- section: Обговорення планів та запрошення
  words: 1000
  subsections:
  - 'Запрошення на спортивну подію: формули та відповіді'
  - 'Планування вихідних: пропозиції, переговори, компроміс'
  - 'Опис минулого відпочинку: враження та рекомендації'
  - Однорідні члени та перерахування в описах спортивних подій
  key_concepts:
  - запрошення
  - планування
  - враження
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
