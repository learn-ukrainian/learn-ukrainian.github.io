content_outline:
- section: 'Вступ: Зв''язність та історичне коріння (Introduction: Cohesion & Historical Roots)'
  words: 500
  points:
  - Роль сполучників у забезпеченні зв'язності (cohesion) тексту на рівні B2 — вимоги CEFR та Стандарту §4.4.1.3 щодо стилістичного
    синтаксису
  - 'Історичний гачок: Сполучник «бо» як один із найдавніших елементів (давньоруська спадщина), що зберігся поруч із «і, та,
    а, чи», на відміну від застарілих «іже, понеже»'
  - 'Багатство синонімів в українській мові: чому наявність спектру сполучників (проте, однак, натомість) є інструментом уникнення
    тавтологій та досягнення точності'
- section: Сполучники протиставлення та компенсації (Contrast & Compensation Connectors)
  words: 1000
  points:
  - 'Нюанси протиставлення: чітке розмежування «проте/однак» (нейтрально-книжні) та «зате» (розмовний з відтінком компенсації
    — ''but on the bright side'')'
  - 'Смислова точність «натомість»: вживання для позначення заміщення дії або різкого контрасту замість використання як простого
    синоніма до «але»'
  - 'Стилістичні відтінки «втім»: вживання для вираження сумніву або додаткових зауважень у розмовному та нейтральному мовленні'
  - 'Практичне застосування: побудова речень, де «зате» компенсує негативні фактори («Робота важка, зате цікава»)'
- section: Приєднання та наслідок у різних реєстрах (Addition & Consequence in Different Registers)
  words: 900
  points:
  - 'Додавання деталей через «причому»: правила написання разом та роль у введенні важливих уточнень (''швидко, причому без
    помилок'')'
  - 'Логіка наслідку: розмежування універсального «тому/тож» та офіційно-наукового «відтак» (наслідок у часі або логіці)'
  - 'Запобігання стилістичному дисонансу: чому офіційні сполучники «відтак» або «внаслідок чого» звучать штучно в побутовій
    розмові'
  - 'Спектр приєднання: використання «до того ж», «крім того» та «тим більше» для підсилення аргументації'
- section: Допустові відношення та пунктуаційні пастки (Concession & Punctuation Traps)
  words: 800
  points:
  - 'Стандарт §4.3.4: складнопідрядні речення з допустовими відношеннями («хоча», «незважаючи на те що», «попри те що»)'
  - 'Регістри допусту: від офіційного «попри те що» до розмовного «дарма що»'
  - 'Пунктуаційні правила: обов''язкова кома перед сполучниками та випадки, коли «проте/однак» функціонують як вставні слова,
    що виділяються з обох боків'
  - 'Динаміка речення: зміна акцентів при зміні місця допустового підрядного речення'
- section: Типові помилки та стилістична елегантність (Common Errors & Stylistic Elegance)
  words: 800
  points:
  - 'Орфографічний контроль: розрізнення сполучника «проте» (=але) та сполуки займенника з прийменником «про те» (про що?)'
  - 'Agency Pass: використання складних сполучників для пояснення мотивації суб''єкта в активному стані («Ми вирішили діяти,
    проте...» замість «Було вирішено...»)'
  - 'Тренування регістрової відповідності: заміна простих сполучників сурядності на складні стилістичні варіанти відповідно
    до контексту (офіційний vs неформальний)'
  - 'Підсумок: сполучники як засіб демонстрації інтелектуальної зрілості та логічної чіткості висловлювання на рівні B2'
vocabulary_hints:
  required:
  - сполучник (connector/conjunction) — граматичний термін; ключовий елемент зв'язності тексту згідно зі Стандартом §4.3.4
  - проте (however) — пишеться разом; книжний/нейтральний синонім «але»; не плутати з «про те»
  - зате (but on the other hand) — розмовний; виражає компенсацію («compensation nuance»), аналог 'but on the bright side'
  - натомість (instead) — книжний/публіцистичний; вказує на заміщення однієї дії іншою або сильний контраст
  - відтак (consequently) — офіційний/науковий стиль; позначає наслідок у часі або логічний результат
  - втім (nevertheless/however) — розмовний/нейтральний; виражає сумнів або додаткове зауваження
  - причому (moreover/and) — пишеться разом; вводить уточнювальну деталь до попередньої частини
  - отже (thus/so) — вживається для підбиття підсумків або логічного висновку
  - незважаючи на (despite) — потребує прийменника «на» та додатка у знахідному відмінку
  recommended:
  - зв'язність (cohesion) — характеристика тексту, що забезпечується логічними конекторами
  - тавтологія (tautology) — помилка, якої допомагає уникнути багатство синонімічних сполучників
  - стилістичний дисонанс (stylistic dissonance) — виникає при вживанні книжних сполучників («відтак») у побуті
  - дарма що (even though) — розмовний варіант допустового сполучника
  - попри те що (despite the fact that) — офіційний варіант для вираження допусту
  - внаслідок чого (as a result of which) — офіційно-діловий стиль; вказує на причину
  - тим більше (all the more) — підсилювальне приєднання
