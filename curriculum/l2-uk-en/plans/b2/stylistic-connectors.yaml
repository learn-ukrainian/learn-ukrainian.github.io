module: b2-027
level: B2
sequence: 27
slug: stylistic-connectors
version: '1.2'
title: "Стилістичні засоби зв'язку в тексті"
subtitle: "Стилістичні конектори та зв'язність тексту"
focus: grammar
pedagogy: PPP
phase: "B2.1b [Participles & Register Intro]"
word_target: 4000
objectives:
  - "Розуміти роль конекторів (сполучних засобів) у забезпеченні логічної зв'язності
    та цілісності тексту."
  - "Класифікувати конектори за стилістичним забарвленням (книжне, розмовне, нейтральне)."
  - "Ефективно використовувати засоби анафори та катафори для уникнення тавтології
    та посилення когезії."
  - "Застосовувати специфічні конектори для різних типів тексту: від офіційних листів
    до художньої прози."
  - "Аналізувати структурну роль сполучних слів та часток у побудові складного аргументу."

reading_situations:
  - source_type: "наукова стаття"
    topic: "Аналіз сучасних мовних процесів у глобалізованому світі."
    key_elements:
      - "книжні конектори (зокрема, ба більше, відповідно до, внаслідок цього)"
      - "засоби логічної послідовності (по-перше, з іншого боку, як було зазначено
        вище)"
      - "конектори висновку (отже, таким чином, підсумовуючи)"
    motivation: "Вивчення того, як спеціалізовані сполучні засоби формують архітектуру
      академічного тексту."

listening_situations:
  - media_type: "подкаст"
    setting: "Дискусія про культурні тренди між двома інтелектуалами."
    focus_points:
      - "Використання розмовних та напівформальних конекторів (так от, власне, до
        речі, між іншим)."
      - "Роль пауз та інтонації у функціонуванні конекторів."
      - "Сприйняття логічних переходів у спонтанному мовленні."
    motivation: "Розвиток здатності відстежувати хід думок співрозмовника через маркери
      зв'язності."

writing_tasks:
  - task_type: "власне висловлення"
    prompt: "Напишіть критичний відгук на статтю про екологію. Обов'язково використайте
      щонайменше 8 різних стилістичних конекторів для зв'язку абзаців та аргументів
      усередині них."
    requirements:
      - "мінімум 250 слів"
      - "використати конектори протиставлення (проте, водночас, навпаки)"
      - "застосувати засоби підсилення (ба більше, понад те, не лише... а й)"
      - "продемонструвати перехід від аналізу до висновків за допомогою відповідних
        маркерів"
    motivation: "Практичне вдосконалення навичок текстотворення з високим рівнем зв'язності."
    model_answer: "Текст має бути монолітним, де кожен наступний аргумент логічно
      випливає з попереднього завдяки точно підібраним конекторам."

discussion_topics:
  - context: "Яку роль відіграють конектори у сприйнятті тексту читачем: чи не роблять
      вони мову надто штучною?"
    questions:
      - "Чи можна написати якісний текст без використання вставних слів та конекторів?"
      - "Які конектори ви вважаєте найбільш природними для вашого стилю мовлення?"
      - "Як відрізняються засоби зв'язку в українській та вашій рідній мові?"
    motivation: "Обговорення естетики та функціональності текстових зв'язків."

content_outline:
  - section: "Когезія та когерентність: теоретичне підґрунтя"
    words: 1000
    subsections:
      - "Поняття про внутрішню та зовнішню зв'язність тексту"
      - "Граматичні та лексичні засоби когезії"
      - "Анафора та катафора як інструменти текстотворення"
      - "Роль конекторів у формуванні логічної структури повідомлення"
    key_concepts:
      - "когезія"
      - "когерентність"
      - "анафора"
      - "катафора"
  - section: "Стилістична диференціація сполучних засобів"
    words: 1000
    subsections:
      - "Нейтральні конектори для повсякденного та професійного спілкування"
      - "Офіційно-ділові та наукові маркери зв'язку (враховуючи вищевикладене, зважаючи
        на)"
      - "Публіцистичні засоби підсилення та емоційного забарвлення"
      - "Розмовні вставки та їхня роль у діалогічному мовленні"
    key_concepts:
      - "регістр мовлення"
      - "стилістична норма"
      - "маркери зв'язку"
  - section: "Семантичні групи конекторів"
    words: 1000
    subsections:
      - "Часові та просторові зв'язки у наративі"
      - "Причинно-наслідкові конектори та логічне обґрунтування"
      - "Протиставлення, допуск та альтернатива"
      - "Додавання інформації та градація важливості"
    key_concepts:
      - "логічний перехід"
      - "аргументація"
      - "градація"
  - section: "Практика редагування та текстовий аналіз"
    words: 1000
    subsections:
      - "Усунення тавтології через використання синонімічних конекторів"
      - "Виправлення помилок у логіці викладу через неправильний вибір сполучного
        засобу"
      - "Аналіз тексту-зразка: як майстри слова будують зв'язки"
      - "Вплив конекторів на темпоритм та сприйняття тексту"

vocabulary:
  required:
    - конектор
    - зв'язність
    - когезія
    - анафора
    - катафора
    - перехід
    - логічна послідовність
  recommended:
    - текстотворення
    - монолітність
    - синоніміка
    - референція
    - стилістична маркованість

activities:
  types_required:
    - gap-fill
    - matching
    - reading
    - essay-response
    - select
  min_items_per_type: 5
  total_min_items: 25

activity_hints:
  - type: fill-in
    focus: "Вставити правильний конектор у текст: однак / проте / натомість / тим
      не менш / ба більше"
  - type: group-sort
    focus: "Класифікувати конектори за функцією: додавання / протиставлення / причина
      / наслідок / висновок"
  - type: match-up
    focus: "Зіставити конектори-синоніми (отже = таким чином, проте = однак, зокрема
      = у тому числі)"
  - type: cloze
    focus: "Заповнити пропуски конекторами в аналітичному тексті для забезпечення
      логічної зв'язності"

references:
  - source: "Заболотний, 9 клас (2017)"
    pages: "§25–40"
    topic: "Сполучники та сполучні засоби у складних реченнях"
  - source: "Авраменко, 9 клас (2017)"
    pages: "§25–32"
    topic: "Засоби зв'язку у складних реченнях"
  - source: "State Standard 2024"
    pages: "B2, SS 4.3"
    topic: "Syntax — text cohesion and connectors"

connects_to:
  previous: "emphasis-and-inversion"
  next: "complex-syntax-ellipsis-parcelling"
