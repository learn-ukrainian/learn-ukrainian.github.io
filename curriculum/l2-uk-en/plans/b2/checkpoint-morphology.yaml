slug: checkpoint-morphology
version: '2.0'
title: 'Контрольна точка: морфологія'
subtitle: Checkpoint — Advanced Morphology
focus: checkpoint
pedagogy: TTT
phase: B2.5 [Advanced Morphology]
word_target: 4000
objectives:
- Learner can demonstrate mastery of numeral declension for time and dates
- Learner can form nouns using person, abstract, and place suffixes
- Learner can identify and use one-member sentences for stylistic effect
- Learner can recognize and produce texts in religious and epistolary registers
- Learner can self-assess readiness for B2.2 (Phraseology)
content_outline:
- section: 'Вступ та огляд: Контрольна точка B2.1c (Introduction & Overview: B2.1c Checkpoint)'
  words: 400
  points:
  - 'Мета та структура фінального тестування за модулями M31-M39: числівники, словотвір та синтаксис.'
  - Тематичний центр модуля — постать Михайла Кравчука, видатного математика та розробника української термінології.
- section: Числівники та математична спадщина (Numerals & Mathematical Legacy)
  words: 1000
  points:
  - Відмінювання кількісних числівників 5-20, 30, 40, 50-80, 90, 100 на прикладах кількісних показників наукової діяльності.
  - 'Корекція помилки у відмінюванні десятків (50-80): акцент на відмінюванні лише другої частини (п''ятдесяти, а не п''ятидесяти).'
  - Використання порядкових числівників для позначення дат та хронології життя Кравчука (1892–1942), видання тритомного словника.
  - 'Позначення часу в офіційно-діловому та науковому стилях: о сьомій годині, за десять восьма (десята до восьмої).'
- section: Словотвір та наукова термінологія (Word Formation & Scientific Terminology)
  words: 900
  points:
  - Творення іменників — назв діяльності із суфіксами -нн-, -енн-, -інн- (обчислення, формування, доведення).
  - Утворення прикметників від іменників для формування термінологічних сполук (матричний, поліноміальний, термінологічний).
  - Практика вживання видових пар дієслів та префіксальних дієслів руху в контексті життєпису та подорожей вченого.
- section: Синтаксис односкладних речень (Syntax of One-Member Sentences)
  words: 900
  points:
  - 'Аналіз односкладних речень у наукових текстах: означено-особові (інструкції) та неозначено-особові (наукові факти).'
  - Безособові речення для опису станів та історичних подій (Кравчука було заарештовано, словник було видано).
  - Номінативні речення у заголовках наукових праць та при описах математичних понять.
- section: 'Практикум: Аналіз помилок та регістрів (Workshop: Error Analysis & Registers)'
  words: 800
  points:
  - 'Узгодження числівників з іменниками: контроль правила ''2, 3, 4'' (Н.в. множини) проти ''5+'' (Р.в. множини).'
  - 'Трансформація тексту: перехід від наукового стилю (словник) до епістолярного (листування Кравчука з колегами).'
  - Підсумок результатів, аналіз слабких місць та перехід до вивчення фразеології у фазі B2.2.
