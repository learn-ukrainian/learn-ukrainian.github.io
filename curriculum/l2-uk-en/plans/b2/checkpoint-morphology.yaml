module: b2-066
level: B2
sequence: 66
slug: checkpoint-morphology
version: '1.1'
title: "Контрольна точка: Морфологія"
subtitle: "Підсумковий контроль: морфологія"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Узагальнити та систематизувати знання про всі частини мови української мови на
    рівні B2."
  - "Перевірити вміння правильно відмінювати іменні частини мови у складних та виняткових
    випадках."
  - "Проконтролювати навички вживання дієслівних форм, зокрема дієприкметників та
    дієприслівників."
  - "Оцінити здатність до стилістично доречного вибору морфологічних засобів у різних
    реєстрах."

reading_situations:
  - source_type: "офіційний документ"
    topic: "Аналіз Статуту громадської організації або юридичного договору."
    key_elements: ["складні іменники", "безособові дієслівні форми", "специфічні прийменникові
          конструкції"]
    motivation: "Перевірка здатності розпізнавати та правильно інтерпретувати морфологічні
      особливості офіційно-ділового стилю, де норма є найсуворішою."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть аналітичне есе на тему 'Мовна норма: застигле правило чи живий
      процес?'. Продемонструйте вміння використовувати складні морфологічні конструкції."
    requirements:
      - "мінімум 300 слів"
      - "використання принаймні 3 складених числівників у непрямих відмінках"
      - "коректне вживання пасивних дієприкметників та дієприслівникових зворотів"
      - "відсутність активних дієприкметників на -уч-, -юч-"
    motivation: "Комплексна перевірка морфологічної вправності студента та його здатності
      до аргументації на метамовному рівні."
    model_answer: "Текст має бути структурованим та логічним. Очікується правильне
      відмінювання слів на зразок 'міста', 'статті', 'грошей'. Числівники мають бути
      узгоджені (наприклад, 'семисот п'ятдесяти шести учасників'). Замість активних
      дієприкметників очікуються конструкції 'ті, що працюють' або прикметники."

discussion_topics:
  - context: "Морфологічна норма: між правилом і живим мовленням"
    questions:
      - "Які морфологічні помилки ви найчастіше помічаєте у власному мовленні?"
      - "Чому числівники та дієприкметники є найскладнішими для вивчення частинами
        мови?"
    motivation: "Усвідомлення типових морфологічних труднощів та розробка індивідуальної
      стратегії їх подолання."

content_outline:
  - section: "Іменні частини мови: Систематизація винятків"
    words: 1000
    subsections:
      - "Іменник: парадигми відмінювання складних слів та власних назв"
      - "Прикметник та займенник: нюанси узгодження у складнопідрядних конструкціях"
      - "Числівник: математична точність відмінювання складених та дробових форм"
    key_concepts:
      - "морфологічна норма"
      - "варіантність"
      - "парадигма"
      - "узгодження"
  - section: "Дієслівна система: Від аспекта до способу"
    words: 1000
    subsections:
      - "Дієслівні категорії: вираження часу та способу в академічному дискурсі"
      - "Дієприкметник та дієприслівник: синтаксична роль та стилістичні обмеження"
      - "Безособові форми на -но, -то як альтернатива пасиву"
    key_concepts:
      - "дієслівне керування"
      - "аспект"
      - "безособовість"
      - "дієприслівниковий зворот"
  - section: "Службові слова: Функціональна роль у зв'язності тексту"
    words: 1000
    subsections:
      - "Прийменник: вибір правильного відмінка та уникнення кальок"
      - "Сполучник: сурядність та підрядність як інструменти логічного зв'язку"
      - "Частка: відтінки модальності та емоційного забарвлення"
    key_concepts:
      - "прийменниково-іменникова конструкція"
      - "логічна когезія"
      - "модальність"
      - "експресивність"
  - section: "Морфологічний аудит та редагування"
    words: 1000
    subsections:
      - "Аналіз типових морфологічних помилок у мовленні B2+"
      - "Методика саморедагування: перевірка закінчень та узгоджень"
      - "Трансформація тексту: перехід від розмовних форм до офіційних"
    key_concepts:
      - "саморедагування"
      - "нормативність"
      - "коректура"
      - "мовна вправність"

vocabulary:
  required:
    - морфологія
    - норма
    - варіантність
    - виняток
    - парадигма
    - узгодження
    - керування
    - частина мови
  recommended:
    - систематизація
    - закономірність
    - трансформація
    - редагування
    - коректність
    - відповідність

activities:
  types_required:
    - quiz
    - error-correction
    - highlight-morphemes
    - translate
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: cloze
    description: "Complete a mixed morphology text testing aspect, conditionals, numerals,
      and word formation"
  - type: group-sort
    description: "Classify word forms by morphological category (вид дієслова / відмінок
      числівника / спосіб словотвору)"
  - type: error-correction
    description: "Find and fix all morphological errors in a paragraph (aspect, case,
      suffix, particle placement)"
  - type: essay-response
    description: "Write a text using specified morphological forms (давноминулий час,
      умовний спосіб, складені числівники)"
  - type: fill-in
    description: "Comprehensive morphology exercise covering all topics from M43-M55"

references:
  - "Караман, 10 клас (2018): §55-60 (словотвір), §68-70 (числівник), §71-74 (дієслово)"
  - "Глазова, 11 клас (2019): §1-10 (морфологічна норма), §17-20 (морфологічна стилістика)"
  - "Авраменко, 11 клас (2019): §15-20 — Морфологічна норма"
  - "Заболотний, 9 клас (2017): §25-40 — Сполучники у складних реченнях"
  - "State Standard 2024: B2 SS 4.1.3 (verb forms), SS 4.2 (word formation)"

