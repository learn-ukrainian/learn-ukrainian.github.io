module: b2-063
level: B2
sequence: 63
slug: word-formation-adjective-adverbs
version: 1.0.2
title: 'Словотвір: прикметники та прислівники'
subtitle: 'Словотвір: прикметники та прислівники'
focus: vocabulary
pedagogy: TTT
word_target: 4000
phase: B2.5 [Verb Nuances & Word Formation]
objectives:
- Засвоїти продуктивні суфікси для творення прикметників (-н-, -ов-, -ев-, 
  -ськ-, -лив-, -ист-, -ат-).
- Опанувати фонетичні зміни при творенні прикметників від географічних назв 
  (-ськ-/-цьк-/-зьк-).
- 'Вивчити способи творення прислівників: суфіксальний (-о, -е), префіксально-суфіксальний
  (по-..-ому), адвербіалізація.'
- 'Засвоїти правопис прислівників: разом, через дефіс, окремо.'
reading_situations:
- source_type: опис туристичного маршруту
  topic: 'Опис ландшафтів та пам''яток: велика кількість прикметників від географічних
    назв та прислівників способу дії.'
  key_elements:
  - прикметники від топонімів
  - описові прислівники
  - стилістичні епітети
  motivation: Розуміння словотвірного багатства описового тексту.
- source_type: художній опис
  topic: Уривок із сучасної прози з динамічними прислівниками (тихо-тихо, 
    навпомацки, зненацька).
  key_elements:
  - прислівники способу дії
  - повтори
  - дефісне написання
  motivation: Стилістична роль прислівників у літературі.
listening_situations:
- media_type: подкаст
  setting: Розповідь про характер людини та культурні особливості регіонів.
  focus_points:
  - прикметники на -лив- та -ист-
  - правильна вимова -ськ-/-цьк-
  - прислівники по-..-ому
  motivation: Розпізнавання словотвірних моделей в усному мовленні.
writing_tasks:
- task_type: відгук + інструкція
  prompt: 1) Напишіть відгук про подорож з 15+ прикметниками. 2) Напишіть 
    інструкцію-пораду з 15+ прислівниками.
  requirements:
  - загалом мінімум 300 слів
  - суфікси -ов-, -ев-, -ськ-, -лив- у прикметниках
  - прислівники по-перше, щоденно, вчасно, по-новому
  motivation: Практика словотворення в двох різних жанрах.
  model_answer: 'Відгук: ''Мальовничий карпатський ландшафт, привітні закарпатські
    хазяї, затишний дерев''яний будиночок...'' Інструкція: ''По-перше, прокидайтеся
    щоранку о сьомій. Заздалегідь плануйте...'''
discussion_topics:
- context: Як прикметники та прислівники впливають на наше сприйняття?
  questions:
  - Чому правопис прислівників — одна з найскладніших тем?
  - Які прислівники звучать найбільш 'по-українськи' (залюбки, манівцями)?
  motivation: Обговорення лінгвістичної точності та стилістики.
dialogue_situations:
- setting: Студенти обговорюють домашнє завдання зі словотвору.
  roles:
  - студент 1
  - студент 2
  key_phrases:
  - чому 'козацький', а не 'козаський'?
  - це через чергування
  - а 'по-братерськи' пишеться через дефіс?
content_outline:
- section: 'Творення прикметників: суфікси та моделі'
  words: 1000
  subsections:
  - 'Суфікс -н- як універсальний: ліс→лісний, день→денний (подвоєння)'
  - Вибір -ов-/-ев-/-єв- залежно від основи
  - 'Суфікси ознак: -лив- (дбайливий), -ист- (барвистий), -ат- (вусатий)'
  - 'Емоційно-експресивні суфікси: -еньк-, -есеньк-, -ущ-'
  key_concepts:
  - відіменниковий прикметник
  - подвоєння
  - семантичний відтінок
- section: 'Прикметники від географічних назв: -ськ-/-цьк-/-зьк-'
  words: 1000
  subsections:
  - 'Фонетичні зміни: г,ж,з+ськ→зьк; к,ч,ц+ськ→цьк; х,ш,с+ськ→ськ'
  - 'Приклади: Прага→празький, козак→козацький, Кременчук→кременчуцький'
  - 'Винятки: баскський, казахський'
  - 'Якісні vs відносні прикметники: метафоризація (золоте серце)'
  key_concepts:
  - фонетична трансформація
  - правописна норма
  - метафоризація
- section: 'Творення прислівників: способи та типи'
  words: 1000
  subsections:
  - 'Суфіксальний: від прикметників (швидко, добре, гаряче)'
  - 'Префіксально-суфіксальний: по-..-ому, по-..-и (по-зимовому, по-братерськи)'
  - 'Адвербіалізація: від іменників (додому, влітку) та числівників (вдвічі)'
  - 'Розряди за значенням: способу дії, часу, місця, міри та ступеня'
  key_concepts:
  - адвербіалізація
  - морфемний шов
  - семантичний розряд
- section: Правопис прислівників та стилістика
  words: 1000
  subsections:
  - 'Дефіс: повторення (тихо-тихо), по-..ому, частки -будь/-небудь'
  - 'Разом: префікс+основа (напам''ять, вгору, назустріч)'
  - 'Складні випадки: назустріч vs на зустріч, вгору vs у гору'
  - Прислівники як засоби когезії та стилістичної виразності
  key_concepts:
  - дефіс
  - омонімія
  - когезія
- section: Підсумок — Summary
  words: 300
  points:
  - 'Adjective formation uses suffixes like -н- (денний), -ов-/-ев-, and -лив- (дбайливий),
    while geographical names trigger phonetic changes: г,ж,з + ськ = зьк (Прага →
    празький); к,ч,ц + ськ = цьк (козак → козацький). Self-check: How do you form
    an adjective from Кременчук? (кременчуцький) Describe a friend using 3 adjectives
    with suffixes like -лив-, -ист-, or -ат-.'
  - "Adverbs are formed via suffixes (швидко), prefixes/suffixes (по-зимовому), or
    adverbialization (додому). Spelling rules dictate writing together (напам'ять)
    or with a hyphen (тихо-тихо, по-братерськи). Self-check: What is the difference
    between the adverb 'назустріч' and the phrase 'на зустріч'? How do you say 'in
    a brotherly way' in Ukrainian? (по-братерськи)"
vocabulary_hints:
- word: прикметник
  translation: adjective
  context: Прикметники збагачують опис.
- word: прислівник
  translation: adverb
  context: Прислівник уточнює спосіб дії.
- word: суфікс
  translation: suffix
  context: Суфікс -ськ- утворює прикметники від назв.
- word: чергування
  translation: alternation
  context: 'Чергування: козак → козацький.'
- word: правопис
  translation: spelling, orthography
  context: Правопис прислівників — складна тема.
- word: дефіс
  translation: hyphen
  context: По-перше пишеться через дефіс.
- word: мальовничий
  translation: picturesque
  context: Мальовничий краєвид Карпат.
- word: дбайливий
  translation: caring, attentive
  context: Дбайлива матір завжди турбується.
- word: заздалегідь
  translation: in advance
  context: Плануйте заздалегідь.
- word: навмисно
  translation: deliberately
  context: Він зробив це навмисно.
- word: щоденно
  translation: daily
  context: Вправляйтеся щоденно.
- word: по-особливому
  translation: in a special way
  context: Вона усміхнулася по-особливому.
- word: вишуканий
  translation: refined, exquisite
  context: Вишуканий стиль одягу.
- word: барвистий
  translation: colorful
  context: Барвистий осінній ліс.
- word: вусатий
  translation: mustachioed
  context: Вусатий козак.
- word: впевнено
  translation: confidently
  context: Він говорив впевнено.
- word: обставина
  translation: adverbial (syntax)
  context: Прислівник у реченні — це обставина.
- word: когезія
  translation: cohesion
  context: Прислівники забезпечують когезію тексту.
