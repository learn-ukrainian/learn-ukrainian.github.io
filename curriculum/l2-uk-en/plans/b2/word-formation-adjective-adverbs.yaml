- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про прикметники від географічних
    назв: -ськ-/-цьк-/-зьк-, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Творення прикметників:
    суфікси та моделі». Обґрунтуйте свою позицію прикладами з тексту.'
