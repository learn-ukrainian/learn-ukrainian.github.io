module: register-official-legal
level: B2
sequence: 32
version: '1.2'
title: "Офіційно-діловий (юридичний) стиль"
focus: grammar
pedagogy: PPP
word_target: 4000
objectives:
  - "Зрозуміти специфіку офіційно-ділового стилю як найбільш стандартизованого регістру
    української мови."
  - "Вивчити особливості юридичної підмови (правових актів, законів, кодексів)."
  - "Навчитися використовувати та тлумачити юридичну термінологію та специфічні кліше."
  - "Опанувати правила складання офіційних заяв, актів, наказів та договорів."
  - "Зрозуміти важливість однозначності, точності та відсутності емоційності в юридичних
    текстах."

reading_situations:
  - source_type: "законодавчий акт / кодекс"
    topic: "Аналіз вибраних статей із Цивільного або Трудового кодексу України щодо
      прав та обов'язків сторін."
    key_elements: ["безособові конструкції", "складні переліки", "термінологічна точність",
      "відсутність синонімії"]
    motivation: "Розуміння структури правового поля та способів формулювання юридичних
      норм через мовні засоби."

listening_situations:
  - media_type: "відео"
    setting: "Запис відкритого судового засідання або юридичної консультації адвоката
      щодо умов укладення трудового договору."
    focus_points: ["Виявлення специфічних правових формулювань.", "Сприйняття логічної
          структури аргументації.", "Розуміння посилань на конкретні статті законодавства."]
    motivation: "Розвиток здатності орієнтуватися в правовому дискурсі на слух та
      захищати свої законні інтереси."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Напишіть офіційну претензію (claim) до компанії-забудовника або надавача
      комунальних послуг щодо порушення умов договору. Використовуйте стандартні юридичні
      формулювання та посилайтеся на гіпотетичні пункти угоди."
    requirements:
      - "суворе дотримання реквізитів документа (адресат, заявник, назва документа)"
      - "використання щонайменше 7 юридичних кліше (згідно з, відповідно до, керуючись,
        на підставі)"
      - "об'єктивний виклад фактів без емоційного забарвлення"
      - "мінімум 300 слів"
    motivation: "Набуття практичних навичок взаємодії з офіційними інстанціями та
      вміння юридично грамотно викладати вимоги."
    model_answer: "Текст має бути суворо офіційним. Наприклад: 'Шановний пане Директоре!
      Звертаюся до Вас із претензією щодо невиконання зобов'язань за договором №123
      від 01.01.2023. Відповідно до пункту 5.2 вказаного договору, Ваша компанія зобов'язана
      усунути недоліки протягом десяти робочих днів. Керуючись чинним законодавством
      України, вимагаю негайного вжиття відповідних заходів.'"

discussion_topics:
  - context: "Дискусія про необхідність спрощення юридичної мови (plain language movement)
      для звичайних громадян."
    questions:
      - "Чи може занадто складна мова законів бути перешкодою для правосуддя?"
      - "Де проходить межа між точністю терміна та зрозумілістю фрази?"
      - "Чи варто дозволяти використання більш емоційної лексики в судових дебатах?"
    motivation: "Розвиток навичок критичного аналізу соціальної ролі мови права та
      вміння вести дискусію на складні теми."

content_outline:
  - section: "Характеристика та підстилі офіційно-ділового мовлення"
    words: 1000
    subsections:
      - "Стандартизація та уніфікація як визначальні риси офіційно-ділового стилю"
      - "Законодавчий підстиль: мова конституції, законів, кодексів та міжнародних
        угод"
      - "Адміністративно-канцелярський підстиль: накази, розпорядження, заяви, звіти"
      - "Дипломатичний підстиль: мова нот, меморандумів, комюніке та конвенцій"
    key_concepts:
      - "стандартизація"
      - "підстиль"
      - "однозначність"
  - section: "Юридична термінологія та правова фразеологія"
    words: 1000
    subsections:
      - "Класифікація юридичних термінів за сферами використання (цивільне, кримінальне,
        трудове право)"
      - "Специфічні стійкі словосполучення (юридичні кліше) та їх роль у забезпеченні
        точності"
      - "Використання запозичень (латинізмів) та архаїзмів у сучасному правовому контексті"
      - "Проблема багатозначності та синонімії в юридичних текстах: шляхи її усунення"
    key_concepts:
      - "юридична термінологія"
      - "модельне кліше"
      - "суб'єкт права"
  - section: "Морфологія та синтаксис юридичного дискурсу"
    words: 1000
    subsections:
      - "Іменний характер стилю: домінування віддієслівних іменників та абстрактної
        лексики"
      - "Специфіка вживання прийменників та сполучників: згідно з, відповідно до,
        у разі, внаслідок"
      - "Складні синтаксичні конструкції з великою кількістю відокремлених та уточнюючих
        членів"
      - "Модальність обов'язку та правомочності: вживання дієслів 'повинен', 'зобов'язаний',
        'має право'"
    key_concepts:
      - "іменна домінанта"
      - "модальність"
      - "синтаксична складність"
  - section: "Документознавство та культура оформлення реквізитів"
    words: 1000
    subsections:
      - "Система реквізитів офіційного документа: від заголовка до відмітки про виконання"
      - "Вимоги до оформлення тексту: рубрикація, нумерація, абзацне членування"
      - "Типові мовні помилки в офіційній документації: тавтологія, канцеляризми,
        порушення логіки"
      - "Цифровий документообіг: мовні особливості та стандарти електронних документів"
    key_concepts:
      - "реквізит"
      - "формуляр"
      - "канцеляризм"

vocabulary:
  required:
    - законодавство
    - повноваження
    - договір
    - зобов'язання
    - майно
    - згідно з
    - відповідальність
    - постанова
  recommended:
    - чинний
    - підстава
    - скарга
    - позов
    - правомочний
    - кодекс

activities:
  types_required:
    - reading
    - essay-response
    - select
    - fill-in
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: cloze
    focus: "Заповнити пропуски в шаблоні юридичного документа (заява, претензія, договір)
      правильними формулами"
  - type: error-correction
    focus: "Знайти розмовну лексику або емоційне забарвлення в юридичному тексті та
      замінити на офіційні відповідники"
  - type: fill-in
    focus: "Вписати правильну юридичну формулу (згідно з, відповідно до, на підставі,
      у разі)"
  - type: match-up
    focus: "Зіставити юридичний термін із його тлумаченням"

references:
  - source: "Заболотний, 11 клас (2019)"
    pages: "§49–50"
    topic: "Офіційно-діловий стиль: юридичний підстиль"
  - source: "Глазова, 11 клас (2019)"
    pages: "§1–10"
    topic: "Офіційно-діловий стиль мовлення"
  - source: "Державний стандарт 2024"
    pages: "SS 4.4"
    topic: "Стилістика (B2)"

connects_to:
  previous: "register-academic-technical"
  next: "register-literary-ukrainian"
phase: B2.1b [Participles & Register Intro]
