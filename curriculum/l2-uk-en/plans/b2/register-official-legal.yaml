module: b2-19
level: B2
sequence: 19
slug: register-official-legal
version: '2.0'
title: 'Офіційно-діловий стиль: документи, закони, заяви'
content_outline:
- section: 'Вступ: Офіційно-діловий стиль (Introduction: Official-Business Style)'
  words: 500
  points:
  - Визначення та сфера застосування — focus on the functional domain of official
    documentation; maintain strict neutrality and objective tone per State Standard
    §4.4.1.1
  - Підстилі офіційного мовлення — distinguishing between legislative (laws), administrative
    (internal docs), and diplomatic (treaties) sub-styles
  - Основні ознаки стилю — emphasis on precision, lack of emotional coloring, and
    standardized terminology
- section: Граматичні та лексичні засоби стилю (Grammatical and Lexical Means of Style)
  words: 800
  points:
  - Номіналізація та віддієслівні іменники — operationalizing State Standard §4.2.6
    (читання, навантаження, додаток) for creating complex nominal groups
  - Безособові конструкції на -но/-то — building on State Standard §4.3.3.1 (One-Member
    Sentences) to ensure impersonal distance ('Там усе правильно записано')
  - Стандартизовані звороти та прийменникове керування — drill the distinction between
    'згідно з' (+ Instrumental) and 'відповідно до' (+ Genitive) as found in §4.1.2.2
  - Канцеляризми та кліше — using 'Bad vs Good' comparison tables to replace informal
    speech with professional equivalents
- section: Типи та структура документів (Types and Structure of Documents)
  words: 900
  points:
  - 'Заява (Application) — focus on visual layout: header right-aligned, title centered;
    learner error fix: use Genitive only (''Заява Петренка'') instead of incorrect
    ''Заява від Петренка'''
  - 'Наказ (Order) — essential collocations: ''видати наказ'', ''наказ набирає чинності'',
    ''скасувати наказ'''
  - 'Протокол (Minutes/Protocol) — mastering the narrative structure: ''порядок денний'',
    ''слухали/виступили/ухвалили''; understanding ''витяг з протоколу'''
  - Акт та Розпорядження — vocabulary for documenting facts and issuing administrative
    directives
- section: Історичний контекст та мова законів (Historical Context and Language of
    Laws)
  words: 800
  points:
  - 'Козацька канцелярія та Універсали — cultural hook: the General Military Chancellery
    (Генеральна військова канцелярія) and its baroque legal acts'
  - 'Українська як мова судочинства — historical context: Ruthenian as the protected
    legal language in 16th-17th c. courts (Volyn, Kyiv, Bratslav)'
  - Мова сучасних законодавчих текстів — analyzing the structure of articles, references,
    and legislative terminology
  - Юридична сила та чинність — understanding phrases like 'набрати чинності' and
    'чинне законодавство'
- section: Культура ділового мовлення та помилки (Business Speech Culture and Typical
    Errors)
  words: 600
  points:
  - 'Усунення русизмів та калькованих кліше — learner error fix: replace ''приймати
    міри/участь'' with correct ''вживати заходів / брати участь'''
  - 'Часові вирази в документах — learner error fix: ''на протязі'' (draft) vs ''протягом/упродовж''
    (duration) for accurate timelines'
  - Редагування офіційних текстів — identifying and removing excessive bureaucracy
    while maintaining professional standards
- section: Практика та підсумок модуля (Practice and Module Summary)
  words: 400
  points:
  - Написання та оформлення заяви — applying structural rules (Genitive header, formal
    body)
  - Аналіз автентичних документів — evaluating official texts for stylistic consistency
  - Підготовка до наступного модуля — overview of Professional Communication and Medical
    registers
vocabulary_hints:
  required:
  - офіційно-діловий стиль (official-business style) — strict neutrality, absence
    of emotion
  - 'заява (application/statement) — collocations: написати/подати заяву, заява про
    звільнення, додаток до заяви (Genitive only in header)'
  - 'наказ (order/decree) — collocations: видати наказ, наказ набирає чинності, згідно
    з наказом (Instrumental)'
  - 'протокол (minutes/protocol) — collocations: вести протокол, порядок денний, витяг
    з протоколу, слухали/виступили/ухвалили'
  - 'згідно з (according to) — requires Instrumental case; learner error: CONFUSE
    with Dative'
  - відповідно до (in accordance with) — requires Genitive case; common in legal references
  - брати участь (to participate) — High frequency; MUST avoid 'приймати участь'
  - вживати заходів (to take measures) — High frequency; MUST avoid 'приймати міри'
  - протягом (during/throughout) — used for duration; MUST avoid 'на протязі' in temporal
    sense
  - чинний (valid/effective) — чинне законодавство, набрати чинності (to enter into
    force)
  recommended:
  - універсал (universal) — historical legal act of the Hetmanate era
  - канцеляризм (bureaucratese) — terminology specific to official style
  - реквізит (requisite/detail) — mandatory part of a document (date, signature, etc.)
  - постанова (resolution) — official decision by a committee or government
  - віддієслівний іменник (verbal noun) — e.g., читання, навантаження; essential for
    nominalization
