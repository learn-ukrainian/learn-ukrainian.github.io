module: b2-067
level: B2
sequence: 67
slug: idioms-nature
version: '1.1'
title: "Природничі ідіоми: Стихії та ландшафти"
subtitle: "Nature Idioms: Elements and Landscapes"
focus: vocabulary
pedagogy: seminar
word_target: 4000
objectives:
  - "Систематизувати знання про природничі фразеологізми, що описують стихії та погодні явища."
  - "Дослідити метафоричне використання ландшафтних термінів для вираження абстрактних понять."
  - "Проаналізувати роль флоронімів (назв рослин) у формуванні української фразеології."
  - "Навчитися доречно вживати природничі ідіоми в описах характерів та життєвих ситуацій."

reading_situations:
  - source_type: "літературний нарис"
    topic: "Степ як метафора волі та долі в українській поезії та прозі: аналіз природничих образів."
    key_elements: ["ландшафтна метафора", "флороніми", "стихійні образи", "символіка дерев"]
    motivation: "Вивчення того, як природничі ідіоми функціонують у художньому тексті та формують національну образність."
  - source_type: "публіцистична стаття"
    topic: "Екологічні метафори в сучасних українських ЗМІ: від 'вітру змін' до 'бурі емоцій'."
    key_elements: ["метеорологічні метафори", "журналістські кліше", "актуалізація фразеологізмів"]
    motivation: "Аналіз вживання природничих ідіом у сучасному медіа-дискурсі."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть есе-роздум на тему: 'Яка природна стихія найкраще описує характер українського народу?', використовуючи щонайменше 6 природничих фразеологізмів."
    requirements: ["мінімум 250 слів", "використання ідіом із різних стихій (вода, вогонь, земля, вітер)", "аргументований висновок"]
    motivation: "Розвиток навичок інтеграції фразеологізмів у аргументований текст."
    model_answer: "Есе має органічно поєднувати ідіоми ('грати з вогнем', 'шукати вітру в полі', 'крізь вогонь і воду') з аналізом національного характеру та культурних цінностей."

listening_situations:
  - media_type: "подкаст"
    setting: "Культурологічний подкаст про те, як український ландшафт (степ, ліс, ріки) вплинув на мовну образність."
    focus_points: ["визначення ключових природничих метафор", "розуміння зв'язку між географією та мовою", "виявлення архаїчних значень слів"]
    motivation: "Розвиток критичного слухання та здатності до міждисциплінарного синтезу знань."

discussion_topics:
  - context: "Обговорення кліматичних метафор: 'Чому ми використовуємо погоду (буря, штиль, мороз) для опису людських емоцій?'"
    questions:
      - "Яка природна стихія найкраще описує ваш темперамент?"
      - "Як зміни клімату можуть вплинути на актуальність певних природничих ідіом у майбутньому?"
      - "Чи існують в українській мові ідіоми про гори, які відрізняються від ідіом про степ?"
    motivation: "Стимулювання асоціативного мислення та обговорення динаміки мовного фонду."

content_outline:
  - section: "Стихії води та вогню: непередбачуваність та пристрасть"
    words: 1000
    subsections:
      - "Вода як символ життя, плинності та очищення ('як у воду опущений', 'вийти сухим із води')"
      - "Вогняна метафора: пристрасть, гнів та очищення ('грати з вогнем', 'як у вогонь і в воду')"
      - "Конфлікт та єдність стихій у фразеологічному вираженні"
    key_concepts:
      - "акватична метафора"
      - "піроніми"
      - "динамізм"
      - "семантична опозиція"
  - section: "Земля, камінь та вітер: стабільність проти хаосу"
    words: 1000
    subsections:
      - "Земля як опора та джерело буття ('земля під ногами горить', 'як крізь землю провалитися')"
      - "Камінь у метафорах твердості, байдужості та перешкод ('тримати камінь за пазухою', 'камінь спотикання')"
      - "Вітер як символ мінливості, легкодумства та свободи ('шукати вітру в полі', 'кидати слова на вітер')"
    key_concepts:
      - "ландшафтна фразеологія"
      - "статика і динаміка"
      - "матеріальність"
      - "невагомість"
  - section: "Небесні світила та погодні явища"
    words: 1000
    subsections:
      - "Сонце, місяць та зірки: орієнтири та ідеали ('хапати зірки з неба', 'як сонце в небі')"
      - "Атмосферні явища (грім, блискавка, туман, дощ) як знаки долі"
      - "Сезонні метафори: весна надії та зима відчаю у фразеології"
    key_concepts:
      - "космоніми"
      - "метеорологічна метафора"
      - "доленосність"
      - "циклічність"
  - section: "Рослинна символіка (флороніми) у фразеології"
    words: 1000
    subsections:
      - "Дерева-символи: дуб, калина, верба та їхні конотації в ідіомах"
      - "Плоди та коріння: метафори результату та походження ('яблуко від яблуні', 'пустити коріння')"
      - "Трава та квіти: символіка молодості, скороминущості та краси"
    key_concepts:
      - "флоронім"
      - "фітоморфізм"
      - "генетична метафора"
      - "естетична оцінка"

vocabulary:
  required:
    - флоронім
    - космонім
    - стихійність
    - ландшафт
    - орієнтир
    - мінливість
    - очищення
    - скороминущість
  recommended:
    - розбурханий
    - непохитний
    - безкраїй
    - осяйний
    - буремний

activities:
  types_required:
    - match-up
    - fill-in
    - anagram
    - critical-analysis
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: match-up
    focus: "Зіставити природничий фразеологізм із його значенням."
  - type: fill-in
    focus: "Доповнити ідіому пропущеним природничим елементом (вода, вогонь, вітер, земля)."
  - type: select
    focus: "Обрати правильну природничу ідіому для опису емоційного стану або ситуації."
  - type: error-correction
    focus: "Виправити русизми-кальки у природничих ідіомах (замінити на автентичні українські варіанти)."

references:
  - "Караман С. О. Українська мова. 10 клас (2018), §42-45 — Фразеологія"
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Фразеологізми"
  - "Глазова О. П. Українська мова. 11 клас (2019), §14 — Фразеологічна норма"
  - "State Standard 2024: B2 SS 4.4 — Lexicology, phraseology"

connects_to:
  previous: "idioms-animals"
  next: "neologisms-borrowings"
