module: b2-38
level: B2
sequence: 38
slug: economics-business-vocabulary
version: '2.0'
title: 'Економічна лексика: говоримо про бізнес'
subtitle: Economics & Business Vocabulary
content_outline:
- section: 'Вступ: Економічний ландшафт України (Introduction: Ukraine''s Economic
    Landscape)'
  words: 600
  points:
  - 'Аналіз сучасного стану економіки: IT-сектор як ''цифрова фортеця'' та його зростання
    під час війни'
  - 'Аграрна галузь: Україна як світовий лідер експорту зернових та особливості ''Зернового
    коридору'''
  - Основні галузі економіки (АПК, промисловість) та роль міжнародної допомоги й волонтерства
    у змінах
- section: Макроекономічні показники та державна політика (Macroeconomic Indicators
    and State Policy)
  words: 800
  points:
  - 'ВВП (валовий внутрішній продукт), інфляція та курс валют: динаміка та вплив на
    життя громадян'
  - Державний бюджет та борг; поняття споживчого кошика та сімейного бюджету (згідно
    зі стандартом §3.8)
  - Проблеми бідності, малозабезпечені групи населення та виклики безробіття в умовах
    воєнного стану
- section: Бізнес-структури та цифровізація (Business Structures and Digitalization)
  words: 900
  points:
  - 'Типи підприємств: різниця між ФОП (Sole Proprietor) та ТОВ (LLC); статус ''акули
    бізнесу'''
  - 'Цифрова трансформація: сервіс ''Дія.Бізнес'' як інструмент для швидкої реєстрації
    та ведення справ'
  - 'Фінансовий результат: дохід, витрати, чистий та валовий прибуток; отримання та
    розподіл прибутку'
- section: Фінансові операції та податкова система (Financial Operations and Tax System)
  words: 900
  points:
  - 'Банківська справа: відкриття поточних та депозитних рахунків; дії з рахунком
    (поповнити, заблокувати)'
  - 'Податки в Україні: ПДВ, податок на прибуток, ЄСВ; податкове навантаження на малий
    та середній бізнес'
  - Страхування, кредитні лінії, процентні ставки та розвиток фінтеху й криптовалют
    в українському контексті
- section: Ділова комунікація та корекція помилок (Business Communication and Error
    Correction)
  words: 800
  points:
  - 'Норми ділового мовлення: виправлення кальки ''згідно із законом'' (не ''по закону'')
    та ''брати участь'' (не ''приймати'')'
  - 'Укладання угод: вживання ''укласти контракт'' або ''підписати угоду'' замість
    ненормативного ''заключити'''
  - 'Практичне застосування: аналіз економічних новин, читання фінансових графіків
    та побудова прогнозів'
focus: grammar
pedagogy: CLIL
objectives:
- Учень може читати та розуміти економічні новини українською мовою
- Учень може аналізувати економічні показники та їх значення
- Учень може обговорювати економічну ситуацію в Україні, використовуючи спеціалізовану
  лексику
grammar:
- Economic terminology and register
- Business communication conventions
- Financial news reading strategies
register: науковий
phase: B2.4
vocabulary_hints:
  required:
  - прибуток (profit) — чистий ~, валовий ~, податок на ~; висока частотність у бізнес-реєстрі
  - угода (agreement/deal) — укладати угоду (не 'заключити'), підписувати ~, вигідна
    ~; юридична сила
  - рахунок (account) — відкрити ~, поточний ~, депозитний ~, поповнити ~; банківська
    термінологія
  - економіка (economy) — ринкова ~, цифрова ~, національна ~; зростає або падає
  - бізнес (business) — малий та середній ~, вести ~, ~-план; загальновживаний термін
  - термін (term) — вживати ~, науковий ~, економічний ~; точність визначень
  - поняття (concept) — ключове ~, абстрактне ~, сутність поняття
  - процес (process) — виробничий ~, процес реформування, динамічний ~
  - метод (method) — аналітичний ~, застосовувати ~, інноваційний ~
  recommended:
  - Дія.Бізнес (Diia.Business) — унікальний державний цифровий сервіс для підприємців
  - споживчий кошик (consumer basket) — набір товарів для оцінки рівня життя; стандарт
    §3.8
  - брати участь (take part) — єдина нормативна форма для ділового спілкування
  - згідно із законом (according to the law) — правильна конструкція; уникати 'по
    закону'
  - аналіз (analysis) — здійснювати ~, системний ~, фінансовий ~
  - синтез (synthesis) — метод синтезу, теоретичний ~
  - дослідження (research) — ринкове ~, проводити ~, результати ~
