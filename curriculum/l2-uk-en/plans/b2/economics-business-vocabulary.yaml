module: b2-046
level: B2
sequence: 46
slug: economics-business-vocabulary
version: '1.2'
title: "Економіка та бізнес: Лексика"
subtitle: "Економіка та бізнес: лексика"
focus: vocabulary
pedagogy: PPP
phase: "B2.1c [Register System & Domain Vocabulary]"
word_target: 4000
objectives:
  - "Засвоїти ключову термінологію, пов'язану з макро- та мікроекономікою, фінансами
    та підприємництвом."
  - "Навчитися аналізувати економічні новини, звіти про стан ринку та ділову пресу."
  - "Розвинути навички ведення ділової бесіди, обговорення контрактів, інвестицій
    та стратегій розвитку."
  - "Розуміти специфіку економічної системи України, включаючи податкову та банківську
    сфери."
  - "Вміти презентувати бізнес-ідею або проект, використовуючи професійну економічну
    лексику."

reading_situations:
  - source_type: "економічний огляд / річний звіт компанії"
    topic: "Аналіз динаміки ВВП, інфляції або фінансових показників підприємства."
    key_elements: ["графіки та діаграми", "фінансова термінологія", "прогнози експертів"]
    motivation: "Набуття навичок роботи з професійною інформацією та розуміння глобальних
      економічних трендів."

listening_situations:
  - media_type: "лекція"
    setting: "Презентація стартапу перед інвесторами: обговорення окупності та ризиків
      проекту."
    focus_points: ["Сприйняття числових даних на слух.", "Розуміння банківської та
          інвестиційної термінології.", "Виявлення ключових бізнес-аргументів."]
    motivation: "Тренування слухової компетенції в умовах професійного ділового спілкування."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Складіть короткий аналіз ринку для нового продукту, використовуючи терміни
      'конкурентоспроможність', 'попит', 'пропозиція', 'рентабельність'."
    requirements:
      - "лаконічність та аргументованість"
      - "використання щонайменше 10 економічних термінів"
      - "чітка структура (опис ситуації, аналіз, рекомендації)"
      - "мінімум 200 слів"
    motivation: "Практичне застосування лексики для розв'язання конкретних бізнес-завдань."
    model_answer: "Аналіз ринку має містити опис цільової аудиторії, аналіз основних
      конкурентів та прогноз обсягів продажу. Очікується вживання термінів: 'ціноутворення',
      'маркетингова стратегія', 'частка ринку', 'інвестиційна привабливість'. Текст
      повинен бути структурованим, з логічними переходами між розділами та чіткими
      висновками."

discussion_topics:
  - context: "Глобалізація економіки: переваги та загрози для національного виробника."
    questions:
      - "Чи може Україна стати 'європейським тигром' завдяки ІТ-сектору?"
      - "Як зміна клімату впливає на світові фінансові ринки?"
      - "Криптовалюти: майбутнє грошей чи фінансова піраміда?"
    motivation: "Розвиток навичок ведення професійної дискусії на актуальні економічні
      теми."

content_outline:
  - section: "Макроекономіка та державні фінанси"
    words: 800
    subsections:
      - "Показники економічного розвитку: ВВП, ВНП, рівень інфляції"
      - "Державний бюджет: джерела доходів та статті видатків"
      - "Фіскальна політика та податкова система України"
      - "Монетарна політика Національного банку та валютне регулювання"
    key_concepts:
      - "інфляція"
      - "дефіцит бюджету"
      - "облікова ставка"
      - "субсидія"
  - section: "Банківська справа та фінансові ринки"
    words: 1200
    subsections:
      - "Структура банківської системи: комерційні банки та інвестиційні фонди"
      - "Кредитування бізнесу та фізичних осіб: відсоткові ставки та застава"
      - "Фондовий ринок: акції, облігації, деривативи та механізми торгівлі"
      - "Страхування ризиків та управління активами"
      - "Цифрові фінанси: фінтех, онлайн-банкінг та блокчейн-технології"
    key_concepts:
      - "ліквідність"
      - "активи"
      - "депозит"
      - "дивіденди"
      - "портфель"
  - section: "Підприємництво, менеджмент та маркетинг"
    words: 1000
    subsections:
      - "Організаційно-правові форми бізнесу: ТОВ, АТ, ФОП"
      - "Стратегічне планування та бізнес-моделювання (Canvas, SWOT)"
      - "Менеджмент персоналу: мотивація, корпоративна культура, лідерство"
      - "Маркетингові комунікації: брендинг, реклама та аналіз споживача"
      - "Інноваційне підприємництво: стартап-екосистема та венчурний капітал"
    key_concepts:
      - "рентабельність"
      - "конкуренція"
      - "менеджмент"
      - "маркетинг"
      - "брендинг"
  - section: "Ринок праці та трудова економіка"
    words: 1000
    subsections:
      - "Попит та пропозиція на ринку праці: структура безробіття"
      - "Системи оплати праці: бонуси, опціони, соціальні пакети"
      - "Професійна орієнтація та навчання протягом життя (Lifelong Learning)"
      - "Трудове законодавство: захист прав працівників та роботодавців"
      - "Фріланс та віддалена робота як нові моделі зайнятості"
    key_concepts:
      - "кваліфікація"
      - "зайнятість"
      - "аутсорсинг"
      - "компетенція"
      - "рекрутинг"

vocabulary:
  required:
    - прибуток
    - збитки
    - податки
    - інвестиції
    - ринок
    - дохід
    - бюджет
    - підприємець
  recommended:
    - рентабельність
    - акції
    - попит
    - пропозиція
    - конкурентоспроможність
    - інфляція
    - капіталізація
    - аудит

activities:
  types_required:
    - quiz
    - fill-in
    - match-up
    - select
  min_items_per_type: 8
  total_min_items: 32

activity_hints:
  - type: fill-in
    description: "Complete an economic report with correct terms (e.g., 'ВВП зріс
      на ___%, інфляція становить ___')"
  - type: match-up
    description: "Match economic term to its explanation (e.g., рентабельність↔відношення
      прибутку до витрат)"
  - type: group-sort
    description: "Sort terms into мікроекономіка vs макроекономіка categories"
  - type: select
    description: "Choose the correct business term in context (e.g., 'капіталовкладення'
      vs 'інвестиції' vs 'вклади')"

references:
  - "Глазова, 11 клас (2019): §11-15 — Лексична норма, термінологія, професійна лексика"
  - "Заболотний, 11 клас (2019): Стилістичні норми — офіційно-діловий стиль, термінологія"
  - "Авраменко, 11 клас (2019): Лексикологія — терміни, професіоналізми, запозичення"
  - "State Standard 2024: B2 SS 3 (Thematic areas: суспільство, право, економіка)"

connects_to:
  previous: "law-justice-vocabulary"
  next: "checkpoint-domain"
