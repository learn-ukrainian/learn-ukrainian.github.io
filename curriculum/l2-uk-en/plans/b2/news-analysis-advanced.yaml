module: b2-077
level: B2
sequence: 77
slug: news-analysis-advanced
version: '1.1'
title: "Аналіз новин: Пропаганда, маніпуляції та критичне мислення"
subtitle: "Аналіз новин: пропаганда, маніпуляції та критичне мислення"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Навчитися розпізнавати складні методи маніпуляції в медіа-текстах."
  - "Дослідити інструменти та прийоми сучасної пропаганди та контрпропаганди."
  - "Розвинути навички глибокого деконструювання аналітичних статей та есеїв."
  - "Опанувати методику порівняльного аналізу висвітлення однієї події різними виданнями."

reading_situations:
  - source_type: "аналітична стаття"
    topic: "Порівняння висвітлення земельної реформи в Україні опозиційними та проурядовими
      медіа."
    key_elements: ["емоційне забарвлення", "вибірковість фактів", "експертні коментарі"]
    motivation: "Виявлення прихованої упередженості та редакційної політики."
  - source_type: "авторська колонка (Op-ed)"
    topic: "Геополітичні виклики для України: суб'єктивний погляд відомого публіциста."
    key_elements: ["аргументація", "риторичні прийоми", "маніпуляція логікою"]
    motivation: "Аналіз суб'єктивності та засобів переконання."

writing_tasks:
  - task_type: "аналітична записка"
    prompt: "Порівняйте висвітлення однієї події двома різними українськими медіа.
      Напишіть аналітичну записку, визначивши маніпулятивні прийоми, упередженість
      та редакційну політику кожного."
    requirements: ["мінімум 300 слів", "конкретні приклади з обох текстів", "визначення
          фреймінгу та евфемізмів", "збалансований висновок"]
    motivation: "Перевірка навичок критичного аналізу медіа та здатності розпізнавати
      маніпуляції."
    model_answer: "Записка має містити порівняльну таблицю або структурований аналіз
      із конкретними цитатами з обох джерел та висновком про об'єктивність кожного."

discussion_topics:
  - context: "Соціальні мережі як джерело новин: швидкість vs достовірність."
    questions:
      - "Чому фейкові новини поширюються швидше за правдиві?"
      - "Яка роль алгоритмів у створенні 'інформаційних бульбашок'?"
      - "Як звичайний користувач може перевірити інформацію за 5 хвилин?"
    motivation: "Обговорення сучасних викликів медіаграмотності."

content_outline:
  - section: "Механізми медіа-впливу"
    words: 1000
    subsections:
      - "Порядок денний (Agenda-setting): як медіа вирішують, про що нам думати"
      - "Фреймінг (Framing): мистецтво подачі інформації під певним кутом"
      - "Евфемізми та дисфемізми як засоби пом'якшення або загострення реальності"
    key_concepts:
      - "інформаційна політика"
      - "фреймінг"
      - "наратив"
      - "громадська думка"
  - section: "Анатомія пропаганди"
    words: 1000
    subsections:
      - "Класичні прийоми пропаганди: 'навішування ярликів', 'перенесення', 'свідчення'"
      - "Дезінформація vs місінформація: у чому різниця та як вони працюють"
      - "Використання мови ворожнечі (Hate speech) та методи її нейтралізації"
    key_concepts:
      - "дезінформація"
      - "мова ворожнечі"
      - "стереотипізація"
      - "психологічний вплив"
  - section: "Глибокий фактчекінг та верифікація"
    words: 1000
    subsections:
      - "Інструменти для перевірки візуального контенту (пошук за зображенням, метадані)"
      - "Робота з першоджерелами: реєстри, офіційні звіти, статистичні дані"
      - "Розпізнавання ботів та координованих інформаційних кампаній"
    key_concepts:
      - "верифікація"
      - "OSINT-інструменти"
      - "критичний аналіз"
      - "достовірність"
  - section: "Етичні стандарти журналістики"
    words: 1000
    subsections:
      - "Кодекс етики українського журналіста: основні принципи"
      - "Конфлікт інтересів та джинса (прихована реклама) в медіа"
      - "Відповідальність споживача контенту за поширення неперевіреної інформації"
    key_concepts:
      - "журналістська етика"
      - "стандарти BBC"
      - "редакційна незалежність"
      - "джинса"

vocabulary:
  required:
    - пропаганда
    - маніпуляція
    - упередженість
    - фейк
    - верифікація
    - наратив
    - контекст
    - спростування
  recommended:
    - деструктивний
    - ангажований
    - клікбейт
    - резонанс
    - маніпулятивний

activities:
  types_required:
    - critical-analysis
    - reading
    - essay-response
    - true-false
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: critical-analysis
    focus: "Ідентифікувати маніпулятивні техніки (фреймінг, навішування ярликів, апеляція
      до емоцій) у реальному медіа-тексті."
  - type: error-correction
    focus: "Виявити та замінити пропагандистські кліше на нейтральні формулювання."
  - type: reading
    focus: "Порівняти висвітлення однієї події двома джерелами: знайти розбіжності
      та визначити причини."
  - type: essay-response
    focus: "Написати збалансовану новину на контроверсійну тему, уникаючи маніпулятивних
      прийомів."

references:
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Публіцистичний стиль, публічний
    виступ"
  - "Глазова О. П. Українська мова. 11 клас (2019), §1-5 — Культура мовлення"
  - "State Standard 2024: B2 SS 3 — Professional communication, critical media analysis"

connects_to:
