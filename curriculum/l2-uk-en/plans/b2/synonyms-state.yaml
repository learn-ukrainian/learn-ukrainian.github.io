vocabulary_hints:
  required:
  - бути (be) — High frequency; universal usage, often requires Instrumental (бути
    лікарем).
  - існувати (exist) — Medium frequency; abstract/philosophical contexts (існує проблема,
    існують ризики).
  - перебувати (be located/situated) — Formal/State; markers of condition (перебувати
    в стані спокою, перебувати під контролем).
  - становити (constitute/amount to) — Formal register; crucial for definitions (становити
    загрозу, становити більшість).
  - 'знаходитися (be found) — High frequency; note: often misused as a calque, replace
    with розташовуватися or міститися for precision.'
  - 'здаватися (seem) — Subjective perception; fixed phrase: здавалося б (it would
    seem).'
  - виглядати (look/appear) — Visual appearance only (виглядати чудово); do not confuse
    with 'дивитися'.
  - виявлятися (turn out to be) — Resultative/Discovery (виявлятися правдою, як виявилося).
  recommended:
  - синонім (synonym) — linguistic term for mapping nuances.
  - вираз (expression) — context-specific phraseology.
  - значення (meaning) — semantic depth.
  - контекст (context) — deciding factor for register choice.
  - переносне значення (figurative meaning) — applied in Skovoroda's metaphors.
  - стилістичне забарвлення (stylistic coloring) — formal vs neutral markers.
