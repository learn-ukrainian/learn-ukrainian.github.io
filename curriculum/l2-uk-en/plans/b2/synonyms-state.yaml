slug: synonyms-state
version: '2.0'
title: 'Синоніми: Стан та Буття'
subtitle: Synonyms - State and Existence
content_outline:
- section: 'Вступ: Філософія буття та стану (Introduction: Philosophy of Being and
    State)'
  words: 600
  points:
  - 'Вступ до вимог рівня B2: перехід від загального «бути» до точних синонімів для
    професійних визначень та описів станів.'
  - 'Культурний контекст: концепція «двох натур» Григорія Сковороди (видима та невидима)
    як ілюстрація різниці між перебуванням (знаходитися) та справжнім буттям (існувати).'
  - 'Український кордоцентризм (філософія серця): як емоційне наповнення стану серця
    відрізняється від простого опису фізичного перебування в просторі.'
- section: Бути чи існувати? Тонкощі синонімії (To Be or To Exist? Nuances of Synonymy)
  words: 900
  points:
  - Функціональна різниця між загальновживаним «бути» та абстрактним «існувати» (наприклад,
    «проблема існує», «існують ризики»).
  - Опис станів та умов через дієслово «перебувати» — маркери формального та професійного
    мовлення (наприклад, «перебувати під контролем», «перебувати в стані шоку»).
  - 'Вживання дієслова «становити» для ідентифікації та визначень у професійній сфері:
    «становити загрозу», «становити більшість», «становити проблему».'
- section: Сприйняття проти реальності (Perception vs. Reality)
  words: 900
  points:
  - Суб'єктивне сприйняття через «здаватися» (здаватися дивним) та використання усталеного
    виразу «здавалося б» для вираження сумніву.
  - 'Візуальна характеристика: «виглядати» (виглядати чудово, виглядати втомленим)
    на противагу результативному «виявлятися» (виявлятися правдою).'
  - Стилістичні відтінки дієслів «видаватися» (враження) та «справляти враження» в
    контексті соціальної та професійної взаємодії.
- section: 'Рятувальна операція: виправлення кальок (Rescue Operation: Correcting
    Calques)'
  words: 1000
  points:
  - 'Робота з типовою помилкою — калькою «знаходитися»: заміна на «перебувати» (про
    людей), «розташовуватися» (географія), «міститися» (всередині чогось) або «лежати»
    (предмети).'
  - 'Усунення помилкового вживання «являтися» у визначеннях (рос. являться): перехід
    до конструкції «бути» + орудний відмінок або використання «становити».'
  - Диференціація дієслів «виглядати» (мати вигляд) та «дивитися» (спрямовувати погляд)
    для уникнення типової лексичної плутанини.
- section: Практичне застосування та підсумок (Practical Application and Summary)
  words: 600
  points:
  - 'Вправа на вибір дієслова буття залежно від регістра: філософський есей, офіційне
    повідомлення чи новина.'
  - Опис внутрішнього та зовнішнього стану справ (зв'язок з M55) з використанням точних
    синонімів стану (виглядати/здаватися/виявлятися).
  - Підсумковий аналіз стилістичного забарвлення вивчених дієслів та їх роль у формуванні
    української мовної картини світу.
focus: phraseology
