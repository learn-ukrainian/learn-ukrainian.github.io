module: b2-086
level: B2
sequence: 86
slug: discussion-debate
version: '1.1'
title: "Дискусія та дебати: Культура полеміки"
subtitle: "Дискусія та дебати: культура полеміки"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Вивчити правила та структуру формальних дебатів (Карла Поппера, парламентських
    тощо)."
  - "Навчитися формулювати сильні аргументи та ефективно спростовувати тези опонента."
  - "Опанувати мовні засоби для вираження незгоди, сумніву та підтримки в офіційній
    дискусії."
  - "Розвинути навички розпізнавання логічних помилок у мовленні співрозмовника."

reading_situations:
  - source_type: "стенограма"
    topic: "Парламентські дебати щодо законопроекту про медичний канабіс в Україні."
    key_elements: ["парламентські процедури", "риторичні прийоми", "апеляція до закону"]
    motivation: "Аналіз високорівневої політичної дискусії."

writing_tasks:
  - task_type: "аргументативне есе"
    prompt: "Напишіть аргументативний текст на одну зі сторін дебатів: 'Чи повинна
      держава обмежувати контент у соціальних мережах?'. Сформулюйте тезу, наведіть
      три аргументи та спростуйте один контраргумент."
    requirements: ["мінімум 250 слів", "чітка теза", "три аргументи з доказами", "спростування
          одного контраргументу"]
    motivation: "Відпрацювання навичок письмової аргументації та логічної побудови
      тексту."
    model_answer: "Есе має демонструвати структуру 'теза → аргумент + доказ (х3) →
      контраргумент + спростування → висновок' із використанням логічних конекторів."

discussion_topics:
  - context: "Чи повинна держава регулювати контент у соціальних мережах?"
    questions:
      - "Де проходить межа між свободою слова та національною безпекою?"
      - "Чи здатні алгоритми замінити людську модерацію?"
      - "Які ризики несе цензура для демократичного суспільства?"
    motivation: "Відпрацювання навичок аргументації на складну соціально-політичну
      тему."

content_outline:
  - section: "Основи теорії аргументації"
    words: 1000
    subsections:
      - "Структура аргументу: Теза — Обґрунтування — Доказ — Висновок"
      - "Види доказів: факти, статистика, експертна думка, прецеденти"
      - "Різниця між аргументом 'до суті' (ad rem) та 'до людини' (ad hominem)"
    key_concepts:
      - "аргументація"
      - "доказова база"
      - "теза"
      - "обґрунтованість"
  - section: "Техніки спростування та контраргументації"
    words: 1000
    subsections:
      - "Метод 'нападу' на докази опонента"
      - "Виявлення логічних суперечностей у позиції іншої сторони"
      - "Використання іронії та гумору як засобів зниження ваги аргументів опонента"
    key_concepts:
      - "спростування"
      - "контраргумент"
      - "опонування"
      - "критичний розбір"
  - section: "Етикет та мова офіційної дискусії"
    words: 1000
    subsections:
      - "Фрази для ввічливої незгоди та уточнення позиції"
      - "Мистецтво активного слухання та перефразування думок опонента"
      - "Уникнення конфліктогенів та переходу на особистості"
    key_concepts:
      - "дискурс"
      - "толерантність"
      - "етикет"
      - "компроміс"
  - section: "Логічні помилки та маніпуляції"
    words: 1000
    subsections:
      - "Класичні логічні помилки: 'хибна дилема', 'після того — отже внаслідок того'
        тощо"
      - "Розпізнавання риторичних пасток та демагогії"
      - "Як залишатися в межах раціонального обговорення під час емоційного напруження"
    key_concepts:
      - "софізм"
      - "парадокс"
      - "демагогія"
      - "раціональність"

vocabulary:
  required:
    - дискусія
    - опонент
    - теза
    - спростування
    - переконливість
    - компроміс
    - аргументація
    - регламент
  recommended:
    - безапеляційний
    - суперечливий
    - конструктивний
    - неупереджений
    - полеміка

activities:
  types_required:
    - critical-analysis
    - essay-response
    - match-up
    - error-correction
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: match-up
    focus: "Зіставити тип аргументу з прикладом: логічний (факти/статистика), емоційний
      (апеляція до почуттів), авторитетний (посилання на експерта)."
  - type: fill-in
    focus: "Сформулювати контраргумент до наданої тези."
  - type: select
    focus: "Ідентифікувати логічну помилку (хибна дилема, ad hominem, post hoc) у
      наданому аргументі."
  - type: error-correction
    focus: "Виправити помилки аргументації: відсутність доказів, логічні суперечності,
      перехід на особистості."

references:
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Дискусія, публічний виступ"
  - "Глазова О. П. Українська мова. 11 клас (2019), §21-25 — Синтаксична норма"
  - "Ворон А. А. Українська мова. 11 клас (2019) — Академічне красномовство"
  - "State Standard 2024: B2 SS 3 — Professional communication, debate skills"

connects_to:
  previous: "presentation-skills-advanced"
  next: "checkpoint-communication"
phase: B2.4 [Communication Skills]
