module: b2-96
level: B2
sequence: 96
slug: b2-final-exam
version: '2.0'
title: B2 Підсумковий іспит
subtitle: B2 Final Exam
content_outline:
- section: Огляд — Фінальний іспит B2
  points:
  - 'Мета іспиту — підтвердити рівень B2 за CEFR — State Standard: засвідчує повне
    ознайомлення зі структурою української мови та готовність до професійного спілкування'
  - Структура іспиту (читання, письмо, слухання, говоріння)
  - Критерії оцінювання та прохідний бал — emphasize lexical richness (synonyms) and
    grammatical accuracy
  - 'Cultural context: balancing ''melodic precision'' (euphony) with exact terminology'
- section: 'Частина 1: Читання'
  points:
  - Текст 1 — публіцистичний (аналіз головної думки, деталей) — focus on media style
    nuances
  - 'Текст 2 — науково-популярний (розуміння термінології) — cultural hook: The ''G''
    Factor (ґрунт, ґудзик) as a marker of academic identity'
  - Текст 3 — діловий лист або звіт
  - Питання різних типів (multiple choice, matching, short answer)
- section: 'Частина 2: Письмо'
  points:
  - 'Завдання 1 — діловий лист або email (150-180 слів) — learner error: register
    mixing (привіт vs вітаю)'
  - 'Завдання 2 — есе з аргументацією (250-300 слів) — learner error: calques (приймати
    участь instead of брати участь)'
  - Критерії — зміст, структура, мова, регістр
- section: 'Частина 3: Слухання'
  points:
  - Запис 1 — новинний сюжет (головна думка, деталі)
  - 'Запис 2 — інтерв''ю або діалог (думки та ставлення) — learner error: confusing
    active participles with adjectives (слідуюча vs наступна)'
  - Запис 3 — презентація або лекція (ключові пункти)
  - Типи завдань — multiple choice, gap-fill, matching
- section: 'Частина 4: Говоріння'
  points:
  - Завдання 1 — інтерв'ю (особисті питання, досвід)
  - Завдання 2 — монолог (2-3 хв на задану тему) — demonstrate lexical precision (e.g.,
    specific synonyms for general terms like 'horizon')
  - Завдання 3 — дискусія з екзаменатором
  - Критерії — зміст, граматика, лексика, вимова, взаємодія
- section: Підсумок та результати
  points:
  - Інтерпретація результатів
  - Сертифікація рівня B2
  - Рекомендації для переходу на C1 — prep for academic/professional track nuances
  - Вітання з завершенням рівня B2!
