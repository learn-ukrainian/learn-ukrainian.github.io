module: b2-093
level: B2
sequence: 93
slug: b2-final-exam
version: 1.1.3
title: 'B2: Фінальний іспит'
subtitle: 'B2: Фінальний іспит'
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
- Продемонструвати рівень володіння українською мовою B2 (Vantage/Upper
  Intermediate) через комплексне оцінювання.
- Перевірити навички читання, аудіювання, письма та говоріння в академічному,
  професійному та культурному контекстах.
- Оцінити здатність аргументовано висловлюватися на складні абстрактні та
  конкретні теми.
- Підтвердити готовність до переходу на рівень C1 (Advanced).
reading_situations:
- source_type: екзаменаційний текст
  topic: Комплексний аналіз науково-популярного або офіційно-ділового тексту
    (обсягом 600-800 слів).
  key_elements:
  - структура
  - термінологія
  - логічні зв'язки
  - позиція автора
  motivation: Оцінювання навичок глибокого розуміння письмового тексту.
listening_situations:
- media_type: аудіо
  setting: Прослуховування розгорнутого інтерв'ю або лекції на актуальну
    суспільно-політичну тему.
  focus_points:
  - фактична інформація
  - деталі
  - ставлення мовця до проблеми
  motivation: Перевірка здатності сприймати складний аудіоконтент з одного
    прослуховування.
writing_tasks:
- task_type: есе
  prompt: Напишіть власне висловлення на дискусійну тему (наприклад, 'Вплив
    глобалізації на національні мови') обсягом 300-350 слів.
  requirements:
  - Чітко сформулювати тезу та навести принаймні два аргументи.
  - Використати приклади з власного досвіду, літератури або історії.
  - Дотримуватися відповідного стилю та логічної послідовності.
  - Зробити узагальнюючий висновок.
  motivation: Оцінювання навичок письмової аргументації та володіння
    лексико-граматичним апаратом рівня B2.
  model_answer: Есе має бути структурованим, містити вступ, основну частину з
    аргументами та висновок, демонструючи багатий словниковий запас та
    відсутність грубих помилок.
discussion_topics:
- context: 'Усний іспит: презентація та вільна дискусія.'
  questions:
  - Презентуйте основні результати вашого випускного проєкту.
  - Обговоріть актуальну проблему, пов'язану з вашою професійною сферою.
  - Висловіть свою думку щодо ролі України в сучасному глобальному світі.
  motivation: Комплексна перевірка навичок говоріння, спонтанної реакції та
    ведення діалогу.
content_outline:
- section: 'Компонент 1: Читання та розуміння текстів'
  words: 1000
  subsections:
  - 'Робота з текстами різних жанрів: науковий, офіційний, публіцистичний'
  - Визначення основної ідеї, деталей та імпліцитного змісту
  - 'Логіко-структурний аналіз тексту: відновлення цілісності'
  key_concepts:
  - інтерпретація
  - контекст
  - дедукція
  - синтез
- section: 'Компонент 2: Аудіювання та сприйняття мовлення'
  words: 1000
  subsections:
  - Розуміння детальної інформації в монологах та діалогах
  - Ідентифікація тону, намірів та емоційного стану мовця
  - Виділення ключових аргументів у дискусіях високої складності
  key_concepts:
  - сприйняття
  - нюанс
  - експліцитний
  - імпліцитний
- section: 'Компонент 3: Письмова продукція та аргументація'
  words: 1000
  subsections:
  - Написання формального есе або аналітичного звіту
  - Використання складних синтаксичних структур та конекторів
  - Стилістична відповідність та лексична варіативність
  key_concepts:
  - когерентність
  - аргументація
  - когезія
  - реєстр
- section: 'Компонент 4: Говоріння та інтеракція'
  words: 1000
  subsections:
  - 'Монологічне мовлення: розгорнута доповідь на задану тему'
  - 'Діалогічне мовлення: ведення дебатів та обмін думками'
  - Стратегії компенсації та перефразування в усному спілкуванні
  key_concepts:
  - флюентність
  - інтеракція
  - дискурс
  - реакція
- section: Підсумок — Summary
  words: 300
  points:
  - 'B2 proficiency requires synthesizing complex information: applying deduction
    (дедукція) in reading, grasping implicit nuances in listening, and using proper
    register (реєстр) and cohesion (когезія) in writing.'
  - 'Self-check: Can you summarize a formal article and debate its main points fluently?
    Describe 3 compensation strategies (стратегії компенсації) you use when speaking.
    What is the difference between explicit (експліцитний) and implicit (імпліцитний)
    meaning?'
vocabulary:
  required:
  - іспит
  - тест
  - оцінка
  - результат
  - завдання
  - сертифікат
  - володіння
  - критерій
  recommended:
  - підсумковий
  - комплексний
  - кваліфікаційний
  - об'єктивний
  - успішний
activities:
  types_required:
  - select
  - fill-in
  - essay-response
  - reading
  min_items_per_type: 5
  total_min_items: 20
activity_hints:
- type: reading
  focus: 'Прочитайте текст про компонент 1: читання та розуміння текстів і дайте відповіді
    на запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про компонент 2: аудіювання та сприйняття
    мовлення, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Компонент 1: Читання
    та розуміння текстів». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему компонент
    1: читання та розуміння текстів.'
