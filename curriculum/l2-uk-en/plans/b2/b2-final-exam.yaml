module: b2-093
level: B2
sequence: 93
slug: b2-final-exam
version: '1.1'
title: "B2: Фінальний іспит"
subtitle: "B2: Фінальний іспит"
focus: checkpoint
pedagogy: review
word_target: 4000
objectives:
  - "Продемонструвати рівень володіння українською мовою B2 (Vantage/Upper Intermediate)
    через комплексне оцінювання."
  - "Перевірити навички читання, аудіювання, письма та говоріння в академічному, професійному
    та культурному контекстах."
  - "Оцінити здатність аргументовано висловлюватися на складні абстрактні та конкретні
    теми."
  - "Підтвердити готовність до переходу на рівень C1 (Advanced)."

reading_situations:
  - source_type: "екзаменаційний текст"
    topic: "Комплексний аналіз науково-популярного або офіційно-ділового тексту (обсягом
      600-800 слів)."
    key_elements: ["структура", "термінологія", "логічні зв'язки", "позиція автора"]
    motivation: "Оцінювання навичок глибокого розуміння письмового тексту."

listening_situations:
  - media_type: "аудіо"
    setting: "Прослуховування розгорнутого інтерв'ю або лекції на актуальну суспільно-політичну
      тему."
    focus_points: ["фактична інформація", "деталі", "ставлення мовця до проблеми"]
    motivation: "Перевірка здатності сприймати складний аудіоконтент з одного прослуховування."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть власне висловлення на дискусійну тему (наприклад, 'Вплив глобалізації
      на національні мови') обсягом 300-350 слів."
    requirements:
      - "Чітко сформулювати тезу та навести принаймні два аргументи."
      - "Використати приклади з власного досвіду, літератури або історії."
      - "Дотримуватися відповідного стилю та логічної послідовності."
      - "Зробити узагальнюючий висновок."
    motivation: "Оцінювання навичок письмової аргументації та володіння лексико-граматичним
      апаратом рівня B2."
    model_answer: "Есе має бути структурованим, містити вступ, основну частину з аргументами
      та висновок, демонструючи багатий словниковий запас та відсутність грубих помилок."

discussion_topics:
  - context: "Усний іспит: презентація та вільна дискусія."
    questions:
      - "Презентуйте основні результати вашого випускного проєкту."
      - "Обговоріть актуальну проблему, пов'язану з вашою професійною сферою."
      - "Висловіть свою думку щодо ролі України в сучасному глобальному світі."
    motivation: "Комплексна перевірка навичок говоріння, спонтанної реакції та ведення
      діалогу."

content_outline:
  - section: "Компонент 1: Читання та розуміння текстів"
    words: 1000
    subsections:
      - "Робота з текстами різних жанрів: науковий, офіційний, публіцистичний"
      - "Визначення основної ідеї, деталей та імпліцитного змісту"
      - "Логіко-структурний аналіз тексту: відновлення цілісності"
    key_concepts:
      - "інтерпретація"
      - "контекст"
      - "дедукція"
      - "синтез"
  - section: "Компонент 2: Аудіювання та сприйняття мовлення"
    words: 1000
    subsections:
      - "Розуміння детальної інформації в монологах та діалогах"
      - "Ідентифікація тону, намірів та емоційного стану мовця"
      - "Виділення ключових аргументів у дискусіях високої складності"
    key_concepts:
      - "сприйняття"
      - "нюанс"
      - "експліцитний"
      - "імпліцитний"
  - section: "Компонент 3: Письмова продукція та аргументація"
    words: 1000
    subsections:
      - "Написання формального есе або аналітичного звіту"
      - "Використання складних синтаксичних структур та конекторів"
      - "Стилістична відповідність та лексична варіативність"
    key_concepts:
      - "когерентність"
      - "аргументація"
      - "когезія"
      - "реєстр"
  - section: "Компонент 4: Говоріння та інтеракція"
    words: 1000
    subsections:
      - "Монологічне мовлення: розгорнута доповідь на задану тему"
      - "Діалогічне мовлення: ведення дебатів та обмін думками"
      - "Стратегії компенсації та перефразування в усному спілкуванні"
    key_concepts:
      - "флюентність"
      - "інтеракція"
      - "дискурс"
      - "реакція"

vocabulary:
  required:
    - іспит
    - тест
    - оцінка
    - результат
    - завдання
    - сертифікат
    - володіння
    - критерій
  recommended:
    - підсумковий
    - комплексний
    - кваліфікаційний
    - об'єктивний
    - успішний

activities:
  types_required:
    - select
    - fill-in
    - essay-response
    - reading
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: reading
    focus: "Екзаменаційний комплексний текст із пропусками: граматика, лексика, фразеологія."
  - type: error-correction
    focus: "Фінальний пошук помилок: всі типи (граматичні, лексичні, стилістичні,
      пунктуаційні)."
  - type: essay-response
    focus: "Написати аргументативне есе рівня B2 на дискусійну тему."
  - type: reading
    focus: "Прочитати та проаналізувати складний текст рівня B2 із визначенням основної
      ідеї та підтексту."
  - type: select
    focus: "Обрати правильну граматичну форму або лексичну одиницю в екзаменаційному
      контексті."

references:
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Комплексний огляд, підготовка
    до ЗНО"
  - "Глазова О. П. Українська мова. 11 клас (2019) — Тематична лексика для ЗНО"
  - "State Standard 2024: B2 — Full level assessment criteria"

