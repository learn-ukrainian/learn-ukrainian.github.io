vocabulary_hints:
  required:
  - термін (term) — науковий термін, вживати термін, визначення терміна; висока частотність
    в академічному стилі
  - поняття (concept) — базове поняття, розширити поняття, підмінити поняття; ключове
    слово для наукових та загальних дискусій
  - процес (process) — навчальний процес, процес розвитку, керувати процесом; вживається
    у всіх стилях мовлення
  - метод (method) — ефективний метод, метод дослідження, застосувати метод; важливо
    для наукового та професійного середовища
  recommended:
  - аналіз (analysis) — глибокий аналіз, критичний аналіз, зробити аналіз; часто вживається
    в медіа та науці
  - синтез (synthesis) — синтез мистецтв, хімічний синтез, аналіз і синтез; спеціалізована
    наукова лексика
  - дослідження (research) — наукове дослідження, результати дослідження, проводити
    дослідження; базове слово для академічної готовності
