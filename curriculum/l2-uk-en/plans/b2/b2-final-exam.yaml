content_outline:
- section: Огляд — Фінальний іспит B2 (Overview — B2 Final Exam)
  words: 600
  points:
  - 'Огляд державної сертифікації рівня B2 відповідно до Державного стандарту України (2024): засвідчення докладного розуміння
    системних зв’язків мови та готовності до професійного спілкування.'
  - 'Критерії оцінювання: акцент на лексичному багатстві (вживання синонімів) та граматичній точності як ключових показниках
    готовності до рівня C1.'
  - 'Культурний контекст: баланс між «милозвучністю» (правила евфонії) та суворою термінологічною точністю в офіційних ситуаціях.'
- section: 'Частина 1: Читання та академічна ідентичність (Part 1: Reading and Academic Identity)'
  words: 1000
  points:
  - 'Текст 1 (Публіцистичний стиль): аналіз медійних нюансів, розпізнавання прихованої думки автора та ставлення до подій.'
  - 'Культурний маркер: «Фактор Ґ» — вивчення історії літери «ґ» (репресована за радянських часів, відновлена в 1991 р.) та
    її правильне вживання (ґрунт, ґанок, ґудзик) як ознака української академічної ідентичності.'
  - 'Текст 2 (Науково-популярний стиль): робота з термінологією, розуміння системних зв''язків у наукових поясненнях.'
  - 'Текст 3 (Діловий стиль): аналіз звітів та офіційних листів, пошук ключової інформації для прийняття рішень.'
- section: 'Частина 2: Письмо та стилістична вправність (Part 2: Writing and Stylistic Proficiency)'
  words: 800
  points:
  - 'Завдання 1 — Діловий лист/Email: дотримання офіційного регістру. Типова помилка: змішування регістрів (використання неформального
    «привіт» замість професійного «вітаю»).'
  - 'Завдання 2 — Аргументативне есе: структура та логіка викладу. Типова помилка (калька): вживання «приймати участь» замість
    нормативного «брати участь» (to take part).'
  - 'Аналіз критеріїв письма: зміст, організація тексту, багатство словникового запасу та граматична коректність.'
- section: 'Частина 3: Слухання та лексична точність (Part 3: Listening and Lexical Precision)'
  words: 800
  points:
  - 'Запис 1 — Новинний сюжет: виокремлення головної тези та критичний аналіз деталей у швидкому темпі мовлення.'
  - 'Запис 2 — Інтерв''ю/Діалог: розрізнення думок та емоційного забарвлення. Типова помилка: плутанина активних дієприкметників
    із прикметниками (вживання «слідуюча» замість правильного «наступна»).'
  - 'Запис 3 — Лекція/Презентація: конспектування ключових пунктів та розуміння академічного контексту.'
- section: 'Частина 4: Говоріння та підсумок рівня (Part 4: Speaking and Level Summary)'
  words: 800
  points:
  - 'Завдання 1 — Професійне інтерв''ю: демонстрація впевненого володіння мовою в офіційних ситуаціях (використання «ви»-регістру).'
  - 'Завдання 2 — Монолог на задану тему: виявлення лексичної точності. Приклад: використання специфічних синонімів для поняття
    «horizon» (обрій, небокрай, видноколо) замість загальних слів.'
  - 'Завдання 3 — Дискусія з екзаменатором: аргументація власної позиції, використання модальних маркерів та стратегій ведення
    переговорів.'
  - 'Підсумок рівня: інтерпретація результатів, рекомендації для переходу до академічного/професійного треку рівня C1.'
