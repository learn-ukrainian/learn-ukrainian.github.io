vocabulary_hints:
  required:
  - термін (term) — науковий термін, вживати термін, визначення терміна
  - поняття (concept) — базове поняття, розширити поняття, підмінити поняття
  - процес (process) — навчальний процес, процес розвитку, керувати процесом
  - метод (method) — ефективний метод, метод дослідження, застосувати метод
  recommended:
  - аналіз (analysis) — глибокий аналіз, критичний аналіз, зробити аналіз
  - синтез (synthesis) — синтез мистецтв, хімічний синтез, аналіз і синтез
  - дослідження (research) — наукове дослідження, результати дослідження, проводити
    дослідження
