module: b2-72
level: B2
sequence: 72
slug: tekhnolohii-ta-shi
version: '2.0'
title: Технології та ШІ
subtitle: Technology & AI
content_outline:
- section: Розминка — IT-індустрія та історичний контекст (Warm-up — IT Industry &
    Historical Context)
  words: 600
  points:
  - 'Україна як глобальний IT-хаб: шлях від аутсорсингу до створення продуктів-єдинорогів,
    таких як Grammarly та Ajax Systems.'
  - 'Історична довідка про Віктора Глушкова: піонер кібернетики та розробник проєкту
    ЗДАС (ОГАС) — прообразу інтернету для управління економікою у 1960-х роках.'
  - 'Роль технологій у сучасних умовах: Starlink, дрони та цифрова стійкість як елементи
    національної безпеки.'
- section: Базова термінологія та культура мовлення (Basic Terminology & Language
    Culture)
  words: 800
  points:
  - 'Апаратне та програмне забезпечення: хмарні технології (cloud), сервер, процесор
    та оперативна пам''ять.'
  - 'Критична лексична помилка: розрізнення понять «застосунок» (mobile/software app)
    та «додаток» (attachment to email or appendix) з практичними вправами на вживання.'
  - 'Боротьба з кальками: перехід від розмовного «скачати» до нормативного «завантажити»
    (download); вживання терміна «IT-фахівець» замість жаргонізму «IT-шник» у професійному
    середовищі.'
- section: 'Штучний інтелект: від теорії до практики (Artificial Intelligence: From
    Theory to Practice)'
  words: 900
  points:
  - 'Ключові поняття ШІ: нейронна мережа, алгоритм, датасет; обробка природної мови
    (NLP) як приклад успішної реалізації в українських стартапах.'
  - 'Етичні виклики ШІ: питання приватності даних, алгоритмічна упередженість та вплив
    автоматизації на ринок праці.'
  - 'Український внесок у розвиток ШІ: огляд технологій Grammarly для перевірки текстів
    та їхнього глобального впливу.'
- section: Кібербезпека та цифрова гігієна (Cybersecurity & Digital Hygiene)
  words: 800
  points:
  - 'Класифікація кіберзагроз: комп''ютерний вірус, фішинг, DDoS-атака та програми-вимагачі
    (ransomware).'
  - 'Методи захисту інформації: двофакторна автентифікація (2FA), брандмауер, шифрування
    даних та хмарне сховище.'
  - 'Кібервійна: як інформаційна безпека стала частиною оборонної стратегії держави.'
- section: 'Електронне врядування: феномен «Дії» (E-governance: The «Diia» Phenomenon)'
  words: 900
  points:
  - 'Концепція «держави у смартфоні»: як Україна першою у світі прирівняла цифрові
    паспорти до паперових у застосунку «Дія».'
  - 'Цифрова трансформація послуг: реєстрація бізнесу, отримання довідок та юридична
    сила електронного підпису.'
  - 'Експорт українських технологій: приклад успішного впровадження архітектури «Дії»
    в інших країнах (наприклад, Естонія).'
focus: domain
pedagogy: CBI
objectives:
- Використовувати IT-термінологію українською мовою
- Обговорювати штучний інтелект та кіберзахист
- Орієнтуватися в українській IT-галузі
grammar:
- Technical register
- Professional terminology
phase: B2.4 Skills & Capstone
vocabulary_hints:
  required:
  - застосунок (app) — мобільний застосунок, встановити застосунок; основний нормативний
    термін для ПЗ
  - штучний інтелект (AI) — на базі штучного інтелекту, розвиток ШІ; висока частотність
    у медіа
  - кібербезпека (cybersecurity) — фахівець з кібербезпеки, правила кібербезпеки;
    пріоритет національної безпеки
  - завантажувати (download) — завантажити файл, швидкість завантаження; рекомендовано
    замість розмовного «скачати»
  - хмарний (cloud - adj) — хмарні технології, хмарне сховище, хмарний сервіс; ключовий
    термін для архітектури даних
  recommended:
  - додаток (attachment/appendix) — файл, прикріплений до листа; часто плутають із
    «застосунком»
  - термін (term) — технічний термін, визначення терміна; для обговорення глосарія
  - поняття (concept) — базове поняття, розкрити поняття; для теоретичного аналізу
  - IT-фахівець (IT professional) — фахівець з розробки; офіційний реєстр замість
    «IT-шник»
  - двофакторна автентифікація (2FA) — налаштувати автентифікацію; критичний термін
    для кібергігієни
