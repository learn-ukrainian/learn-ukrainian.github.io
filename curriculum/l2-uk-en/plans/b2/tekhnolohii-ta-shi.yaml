module: b2-088
level: B2
sequence: 88
slug: tekhnolohii-ta-shi
version: '1.1'
title: "Технології та штучний інтелект: Майбутнє вже тут"
subtitle: "Технології та штучний інтелект: майбутнє вже тут"
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
  - "Опанувати сучасну українську термінологію у сфері високих технологій та штучного
    інтелекту."
  - "Навчитися обговорювати етичні, соціальні та економічні аспекти впровадження ШІ."
  - "Розвинути навички читання та розуміння технічних оглядів та прогнозів розвитку
    IT-сектору."
  - "Відпрацювати вміння формулювати запити (prompts) та критично оцінювати результати
    роботи ШІ-інструментів українською мовою."

reading_situations:
  - source_type: "технічний огляд"
    topic: "Розвиток великих мовних моделей (LLM) для підтримки української мови."
    key_elements: ["машинне навчання", "нейронні мережі", "корпус даних", "токенізація"]
    motivation: "Вивчення спеціалізованої IT-лексики."
  - source_type: "аналітичний звіт"
    topic: "Вплив автоматизації на ринок праці в Україні: галузі під загрозою та нові
      можливості."
    key_elements: ["автоматизація", "перекваліфікація", "цифрові навички"]
    motivation: "Обговорення соціально-економічних наслідків технологічного прогресу."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть есе-роздум на тему: 'Штучний інтелект та українська мова: загроза
      чи можливість?'. Обговоріть перспективи розвитку мовних технологій для української."
    requirements: ["мінімум 250 слів", "використання технічної термінології українською",
      "аргументи 'за' та 'проти'"]
    motivation: "Перевірка здатності обговорювати складні технологічні питання українською
      мовою."
    model_answer: "Есе має містити аналіз поточного стану (NLP для української), переваги
      (доступність, автоматизація) та ризики (якість перекладу, витіснення мови) із
      конкретними прикладами."

discussion_topics:
  - context: "Використання штучного інтелекту в освіті та мистецтві."
    questions:
      - "Чи може ШІ замінити вчителя або художника?"
      - "Хто володіє авторським правом на твір, створений нейромережею?"
      - "Як запобігти академічній недоброчесності при використанні ChatGPT?"
    motivation: "Дискусія про етичні межі використання сучасних технологій."

content_outline:
  - section: "Словник цифрової епохи"
    words: 1000
    subsections:
      - "Базова термінологія: алгоритми, дані, хмарні обчислення, кібербезпека"
      - "Штучний інтелект: від вузького (Narrow AI) до загального (AGI)"
      - "Англіцизми в українському IT-дискурсі: запозичення vs автентичні відповідники"
    key_concepts:
      - "інновації"
      - "цифровізація"
      - "екосистема"
      - "інтерфейс"
  - section: "Штучний інтелект: можливості та виклики"
    words: 1000
    subsections:
      - "Принципи роботи нейромереж: простими словами про складне"
      - "ШІ в медицині, управлінні та обороні України"
      - "Проблема упередженості алгоритмів та прозорості прийняття рішень"
    key_concepts:
      - "нейромережа"
      - "алгоритм"
      - "прогнозування"
      - "автономність"
  - section: "Етика та безпека в цифровому світі"
    words: 1000
    subsections:
      - "Приватність даних та право на забуття"
      - "Загрози діпфейків (deepfakes) для демократії та особистої безпеки"
      - "Правове регулювання штучного інтелекту в ЄС та Україні"
    key_concepts:
      - "конфіденційність"
      - "діпфейк"
      - "кіберзагроза"
      - "етичний кодекс"
  - section: "Людина та машина: співпраця майбутнього"
    words: 1000
    subsections:
      - "Навички майбутнього: креативність, критичне мислення, емпатія"
      - "Промпт-інжиніринг як нова форма комунікації"
      - "Майбутнє української мови в епоху глобальної цифровізації"
    key_concepts:
      - "синергія"
      - "адаптивність"
      - "промпт"
      - "технооптимізм"

vocabulary:
  required:
    - алгоритм
    - дані
    - мережа
    - безпека
    - інтелект
    - розробка
    - впровадження
    - автоматизація
  recommended:
    - високотехнологічний
    - інноваційний
    - віртуальний
    - масштабований
    - інтегрований

activities:
  types_required:
    - matching-up
    - critical-analysis
    - fill-in
    - anagram
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: essay-response
    focus: "Доповнити речення правильним українським технічним терміном (замість англіцизму
      або кальки)."
  - type: comparative-study
    focus: "Зіставити українській технічний термін із його англійським еквівалентом."
  - type: select
    focus: "Обрати правильний українській відповідник замість англіцизму-кальки у
      технічному тексті."
  - type: error-correction
    focus: "Виправити англіцизми та кальки в українському технічному тексті, замінивши
      на коректні форми."

references:
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Тематичні тексти: наука, технології"
  - "Глазова О. П. Українська мова. 11 клас (2019) — Тематична лексика"
  - "State Standard 2024: B2 SS 3 — Thematic areas: наука, технології"

