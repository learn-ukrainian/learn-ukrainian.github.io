module: b2-078
level: B2
sequence: 78
slug: checkpoint-lexicology-ii
version: 1.0.1
title: 'Контрольний модуль: Лексикологія II (ідіоми, неологізми та динаміка)'
subtitle: 'Підсумковий контроль: ідіоми, неологізми та лексична динаміка'
focus: checkpoint
pedagogy: review
word_target: 4000
phase: B2.7 [Idioms, Neologisms & Professional Communication]
objectives:
- Систематизувати знання про соматичні, зооморфні та природничі ідіоми.
- Перевірити навички розпізнавання та вживання ідіом у контексті.
- 'Оцінити розуміння процесів оновлення лексики: неологізми та запозичення.'
- Продемонструвати комплексні навички лексичного аналізу.
reading_situations:
- source_type: публіцистичний текст
  topic: 'Мовна колонка в українському ЗМІ: аналіз вживання ідіом та неологізмів у журналістському тексті.'
  key_elements:
  - ідіоми в контексті
  - неологізми
  - лексичне розмаїття
  motivation: Комплексна перевірка лексичного аналізу.
listening_situations:
- media_type: відео
  setting: 'Добірка уривків з ток-шоу: гості використовують ідіоми та сучасну лексику.'
  focus_points:
  - ідентифікація ідіом на слух
  - розуміння неологізмів
  - семантичні відтінки
  motivation: Перевірка сприйняття складної лексики.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть розгорнуту відповідь: ''Як сучасна лексика відображає трансформації в українському суспільстві?'''
  requirements:
  - мінімум 350 слів
  - щонайменше 5 ідіом та 5 неологізмів
  - академічний стиль
  motivation: Синтез знань з різних тем лексикології.
  model_answer: Текст має поєднувати аналіз нових запозичень (у військовій та технологічній сферах) з аналізом стабільного
    фразеологічного фонду як культурного якоря.
discussion_topics:
- context: Чи загрожують англіцизми українській мові?
  questions:
  - Де межа між корисним запозиченням та мовною засміченістю?
  - Чи потрібен мовний пуризм?
  motivation: Обговорення динаміки лексичного складу.
content_outline:
- section: 'Ідіоми: систематизація та вживання'
  words: 1000
  subsections:
  - 'Соматизми: руки, голова, серце, очі в ідіомах'
  - 'Зооморфізми: тварини в ідіомах та їхня символіка'
  - 'Природничі ідіоми: вода, вогонь, земля, повітря'
  - 'Стилістичні функції ідіом: експресія, іронія, оцінка'
  key_concepts:
  - соматизм
  - зооморфізм
  - ідіоматика
- section: 'Динамічні процеси: неологізми та запозичення'
  words: 1000
  subsections:
  - 'Типи неологізмів: лексичні, семантичні, авторські'
  - 'Запозичення: адаптація іншомовних слів (англіцизми, латинізми)'
  - 'Активний та пасивний словниковий склад: архаїзми, історизми'
  - 'Дискусія про пуризм: де межа?'
  key_concepts:
  - неологізм
  - запозичення
  - пуризм
- section: 'Лексична система: полісемія, паронімія, антонімія'
  words: 1000
  subsections:
  - Багатозначність слова та контекстуальна семантика
  - Паронімія як джерело лексичних помилок
  - 'Антонімічні пари: точність протиставлення'
  - 'Лексична сполучуваність: що з чим поєднується'
  key_concepts:
  - полісемія
  - паронімія
  - лексична сполучуваність
- section: Комплексний лексичний практикум
  words: 1000
  subsections:
  - Методика повного лексичного розбору слова
  - Виявлення та виправлення лексичних кальок та русизмів
  - 'Стилістичне редагування: лексична розмаїтість'
  - 'Підготовка до професійного блоку: ділова лексика'
  key_concepts:
  - лексичний аналіз
  - редагування
  - мовна норма
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary_hints:
- word: лексикологія
  translation: lexicology
  context: Лексикологія вивчає словниковий склад мови.
- word: фразеологія
  translation: phraseology
  context: Фразеологія — скарбниця народної мудрості.
- word: семантика
  translation: semantics
  context: Семантика слова — це його значення.
- word: контекст
  translation: context
  context: Значення ідіоми розкривається в контексті.
- word: узагальнення
  translation: generalization
  context: Узагальнення лексичних знань.
- word: трансформація
  translation: transformation
  context: Трансформація лексики відображає суспільні зміни.
- word: влучність
  translation: aptness, precision
  context: Влучність вживання ідіоми.
- word: розмаїтість
  translation: diversity
  context: Лексична розмаїтість збагачує мовлення.
- word: автентичність
  translation: authenticity
  context: Автентичність мовлення визначається вживанням ідіом.
- word: переосмислення
  translation: reinterpretation
  context: Переосмислення слова дає нове значення.
- word: полісемія
  translation: polysemy
  context: Полісемія — це багатозначність слова.
- word: паронім
  translation: paronym
  context: Пароніми — слова, схожі за звучанням.
- word: запозичення
  translation: loanword, borrowing
  context: Запозичення з англійської зростають.
- word: архаїзм
  translation: archaism
  context: Архаїзм — слово, що вийшло з ужитку.
- word: історизм
  translation: historicism (obsolete word for past concept)
  context: Історизм позначає предмет, що зник.
activities:
  types_required:
  - quiz
  - error-correction
  - critical-analysis
  - match-up
  min_items_per_type: 5
  total_min_items: 25
activity_hints:
- type: reading
  focus: 'Прочитайте текст про ідіоми: систематизація та вживання і дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про динамічні процеси: неологізми та запозичення, використовуючи нову лексику
    модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Ідіоми: систематизація та вживання». Обґрунтуйте свою позицію
    прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему ідіоми: систематизація та вживання.'
