vocabulary_hints:
  required:
  - дослідження (research) — проводити ґрунтовне дослідження, результати дослідження,
    об'єкт дослідження; high frequency academic term
  - термін (term) — науковий термін, тлумачення терміна; defines the building blocks
    of academic register
  - поняття (concept) — ключове поняття, вводити поняття; used for theoretical frameworks
  - метод (method) — метод аналізу, експериментальний метод; essential for describing
    research design
  - процес (process) — процес дослідження, складний процес; describes ongoing scientific
    or technical activities
  - гіпотеза (hypothesis) — висунути гіпотезу, підтвердити/спростувати гіпотезу; core
    component of the scientific method
  recommended:
  - аналіз (analysis) — глибокий аналіз, піддавати аналізу, на основі аналізу; high
    frequency in data description
  - синтез (synthesis) — синтез результатів, теоретичний синтез; often contrasted
    with analysis in research methodology
  - висновок (conclusion) — дійти висновку, зробити висновки, попередні висновки;
    crucial for summary sections
  - експеримент (experiment) — ставити експеримент, у ході експерименту; used in empirical
    and natural sciences
  - рецензування (peer review) — процес рецензування, сліпе рецензування; specific
    to academic publishing and quality control
  - науковець (scientist/researcher) — молодий науковець, відомий науковець; modern
    preferred term over 'вчений'
