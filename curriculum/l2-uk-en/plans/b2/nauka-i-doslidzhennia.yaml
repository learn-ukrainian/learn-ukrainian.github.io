  types_required:
  - matching-up
  - critical-analysis
  - fill-in
  - error-correction
  min_items_per_type: 5
  total_min_items: 20
activity_hints:
- type: reading
  focus: Прочитайте текст про світ науки та академічне середовище і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про методологія та процес дослідження, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Світ науки та академічне середовище». Обґрунтуйте свою позицію
    прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему світ науки та академічне середовище.
references:
