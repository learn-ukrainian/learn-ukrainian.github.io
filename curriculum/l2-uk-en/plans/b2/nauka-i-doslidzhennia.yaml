module: b2-089
level: B2
sequence: 89
slug: nauka-i-doslidzhennia
version: 1.1.1
title: 'Наука і дослідження: Шлях до знань'
subtitle: 'Наука та дослідження: шлях до знань'
focus: professional
pedagogy: seminar
word_target: 4000
objectives:
- Опанувати лексику, пов'язану з науковими дослідженнями, академічним письмом та публікаціями.
- Навчитися аналізувати наукові тексти та анотації українською мовою.
- Відпрацювати навички презентації результатів досліджень та ведення наукової дискусії.
- Зрозуміти структуру наукової грантової заявки та етичні стандарти в науці.
reading_situations:
- source_type: наукова стаття
  topic: 'Перспективи розвитку відновлюваної енергетики в Україні: аналіз потенціалу.'
  key_elements:
  - методологія
  - емпіричні дані
  - гіпотеза
  - висновки
  motivation: Ознайомлення зі структурою та стилістикою наукової публікації.
listening_situations:
- media_type: подкаст
  setting: Інтерв'ю з українським науковцем про міжнародну співпрацю в межах програми Horizon Europe.
  focus_points:
  - пріоритети досліджень
  - партнерство
  - виклики фінансування
  motivation: Розвиток розуміння професійного дискурсу в науковому середовищі.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть анотацію (abstract) до власного або уявного наукового дослідження обсягом 200-250 слів.
  requirements:
  - Чітко сформулювати об'єкт та предмет дослідження.
  - 'Використати кліше: ''у статті розглянуто'', ''автор доводить'', ''перспективним є''.'
  - Дотримуватися наукового стилю.
  motivation: Практика академічного письма.
  model_answer: Анотація має включати актуальність, мету, методи та основні результати дослідження з використанням термінології
    відповідної галузі.
discussion_topics:
- context: Роль штучного інтелекту в сучасних наукових дослідженнях та академічна доброчесність.
  questions:
  - Чи може ШІ бути співавтором наукової статті?
  - Як зміниться процес збору та аналізу даних завдяки автоматизації?
  - Де проходить межа між допомогою ШІ та плагіатом?
  motivation: Дискусія про актуальні етичні виклики в науці.
content_outline:
- section: Світ науки та академічне середовище
  words: 1000
  subsections:
  - Класифікація наук та наукові ступені в Україні
  - Структура вищої освіти та наукових установ (НАН України)
  - 'Наукова термінологія: запозичення та українські еквіваленти'
  key_concepts:
  - дослідник
  - дисертація
  - фундаментальні дослідження
  - апробація
- section: Методологія та процес дослідження
  words: 1000
  subsections:
  - Формулювання гіпотези та визначення об'єкта дослідження
  - 'Методи збору даних: експеримент, спостереження, опитування'
  - 'Аналіз та інтерпретація результатів: від даних до висновків'
  key_concepts:
  - валідність
  - релевантність
  - кореляція
  - верифікація
- section: Академічне письмо та комунікація
  words: 1000
  subsections:
  - 'Жанри наукового тексту: стаття, тези, монографія, звіт'
  - 'Оформлення посилань та бібліографії: національні та міжнародні стандарти'
  - Презентація наукових результатів на конференціях та ведення дискусії
  key_concepts:
  - цитування
  - рецензування
  - бібліографія
  - регламент
- section: Етика, гранти та майбутнє науки
  words: 1000
  subsections:
  - Академічна доброчесність та боротьба з плагіатом
  - 'Пошук фінансування: грантові заявки та наукові фонди'
  - Наукова дипломатія та міжнародна наукова співпраця
  key_concepts:
  - доброчесність
  - фінансування
  - грант
  - коллаборація
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
