module: active-participles-present
level: B2
sequence: 7
version: '1.2'
title: "Активні дієприкметники теперішнього часу"
subtitle: "Present Active Participles: Recognition and Natural Alternatives"
focus: grammar
pedagogy: PPP
objectives:
  - "Ідентифікація активних дієприкметників теперішнього часу за суфіксами -учий (-ючий), -ачий (-ячий) та розуміння їхньої семантики."
  - "Глибоке усвідомлення обмеженості вживання цих форм у сучасній українській літературній мові та причин їхньої небажаності."
  - "Майстерне володіння стратегіями заміни штучних активних дієприкметників природними українськими конструкціями (підрядні речення, прикметники, іменники)."
  - "Розрізнення сталих термінологічних одиниць та лексикалізованих форм, що стали прикметниками, від випадкових граматичних утворень."
  - "Розвиток навичок критичного редагування текстів, перевантажених дієприкметниковими зворотами."

reading_situations:
  - source_type: "науково-технічна стаття"
    topic: "Розвиток енергозберігаючих технологій у сучасному будівництві"
    key_elements: ["енергозберігаючий (energy-saving) компонент", "діюча (active) речовина", "результуючий (resulting) показник", "блукаючі (wandering) струми"]
    motivation: "Аналіз текстів, де активні дієприкметники виступають як усталені терміни. Студенти вчаться бачити межу між нормою та калькою."
  - source_type: "художній опис"
    topic: "Пейзажна замальовка вечірнього лісу"
    key_elements: ["співучий (singing) струмок", "лежачий (lying) камінь", "невмираючий (ever-living) дух"]
    motivation: "Приклади лексикалізованих дієприкметників, які перейшли в розряд прикметників і втратили ознаку часу, ставши художніми означеннями."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з мовознавцем про культуру мовлення та боротьбу з русизмами в ефірі"
    focus_points: ["приклади помилкового вживання активних дієприкметників", "пояснення 'штучності' таких форм", "рекомендації щодо використання конструкції 'той, що...'"]
    motivation: "Формування мовної свідомості через експертну думку та аудіальне сприйняття правильних мовних зразків."

writing_tasks:
  - task_type: "редагування тексту"
    prompt: "Ви отримали чернетку рекламного буклета для фітнес-центру, яка рясніє конструкціями на -ючий. Перепишіть текст, зробивши його стилістично бездоганним та природним для українського вуха."
    requirements:
      - "мінімум 200 слів"
      - "замінити щонайменше 5 різних активних дієприкметників (наприклад: бажаючий, оточуючий, практикуючий, відпочиваючий, хвилюючий)"
      - "використати синонімічні іменники та прикметники"
    motivation: "Перетворення теоретичних знань про заміну дієприкметників на практичну навичку копірайтингу та редагування."
    model_answer: "У модельному тексті замість 'бажаючі' вжито 'охочі', замість 'оточуюче середовище' — 'довкілля' або 'навколишній простір'. Студент має продемонструвати гнучкість у виборі синонімів та вміння будувати складні підрядні речення там, де це доречно."

discussion_topics:
  - context: "Мовна стійкість та екологія мови: чому ми уникаємо певних форм?"
    questions:
      - "Чому форми на -учий/-ючий часто називають 'мовними мутантами' в українському контексті?"
      - "Чи відчуваєте ви різницю між 'співуча людина' (яка має талант) та 'співаюча людина' (яка співає зараз)?"
      - "Яка ваша думка щодо термінологічних винятків: чи варто їх замінювати новими словами, чи залишити як є?"
    motivation: "Обговорення мовної політики та особистого ставлення до чистоти мови на рівні B2."

content_outline:
  - section: "Морфологічна природа та творення активних дієприкметників"
    words: 800
    subsections:
      - "Суфікси -учий (-ючий), -ачий (-ячий): правила та обмеження"
      - "Співвідношення з дієслівними основами теперішнього часу"
      - "Граматичне значення: активна дія, що триває в момент мовлення"
    key_concepts:
      - "суфіксальна деривація"
      - "теперішній час"
      - "активність дії"
  - section: "Стилістична драма активного дієприкметника в українській мові"
    words: 800
    subsections:
      - "Історичний огляд: від природності в давнину до витіснення в сучасній літературній мові"
      - "Вплив міжмовної інтерференції (калькування з російської мови)"
      - "Чому дієприкметник часто програє підрядному реченню у виразності"
    key_concepts:
      - "мовна норма"
      - "інтерференція"
      - "стилістична перевага"
  - section: "Класифікація винятків: коли форма на -учий є легітимною"
    words: 800
    subsections:
      - "Лексикалізація: перехід у прикметники (родючий, цілющий, блискучий)"
      - "Термінологія: усталені сполуки в науці та техніці"
      - "Відмінність між граматичною формою та сталою назвою ознаки"
    key_concepts:
      - "лексикалізація"
      - "термінологічна усталеність"
      - "постійна ознака"
  - section: "Мистецтво заміни: арсенал засобів для природного мовлення"
    words: 800
    subsections:
      - "Конструкція 'той, хто / той, що': правила побудови та нюанси вживання"
      - "Добір синонімічних прикметників: як передати зміст одним словом"
      - "Використання іменників (агентивів) як альтернативи дієприкметникам"
    key_concepts:
      - "трансформація"
      - "синоніміка"
      - "агентив"
  - section: "Аналітичний практикум: від кальки до живої мови"
    words: 800
    subsections:
      - "Деконструкція помилкових речень у ЗМІ та рекламі"
      - "Кейс-стаді: переписування уривка офіційного закону або інструкції"
      - "Створення власного тексту з фокусом на уникнення активних дієприкметників"
    key_concepts:
      - "критичний аналіз"
      - "редагування"
      - "мовна чистота"

word_target: 4000

vocabulary:
  required:
    - охочі
    - довкілля
    - прилеглий
    - зворушливий
    - панівний
    - чинний
    - навколишній
    - наступний
  recommended:
    - мовна стійкість
    - калькування
    - відповідник
    - інтерференція
    - доречність

activities:
  types_required:
    - error-correction
    - match-up
    - select
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

connects_to:
  previous: "passive-in-context"
  next: "active-participles-past"

