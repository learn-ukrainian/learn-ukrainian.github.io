module: b2-07
level: B2
sequence: 7
slug: active-participles-present
version: '2.0'
title: Активні дієприкметники теперішнього часу (-учий/-ючий)
content_outline:
- section: 'Вступ: Спадщина та статус «зомбі» (Introduction: Heritage and «Zombie»
    Status)'
  words: 600
  points:
  - Поняття активного дієприкметника теперішнього часу як граматичної форми, що існує
    в системі, але суттєво обмежена у вжитку сучасним живим мовленням.
  - 'Культурний контекст: Метафора професора Олександра Пономаріва про «зомбі-дієприкметники»
    — пояснення того, як кальковані форми (-учий/-ючий) позбавляють українську мову
    її природної дієслівности.'
  - 'Обґрунтування стратегії вивчення B2: фокус на пасивному розпізнаванні цих форм
    у класичній літературі та офіційних документах при одночасному уникненні їх у
    власному продуктивному мовленні.'
- section: Морфологічне творення та розпізнавання (Morphological Formation and Recognition)
  words: 800
  points:
  - 'Алгоритм деривації: основа 3-ї особи множини теперішнього часу (вони читають,
    пишуть) + суфікс -уч- (-юч-) / -ач- (-яч-) + прикметникове закінчення.'
  - 'Аналіз морфологічних моделей на конкретних прикладах: працюють → працюючий, говорять
    → говорячий, мислять → мислячий, квітнуть → квітнучий.'
  - Фонетичні обмеження та традиційні чергування голосних у суфіксах дієприкметників,
    що допомагають ідентифікувати книжний стиль.
- section: 'Сила дієслова: Трансформація в підрядні речення (The Power of the Verb:
    Transformation into Relative Clauses)'
  words: 900
  points:
  - 'Головний принцип ідіоматичности: заміна штучного дієприкметника активною конструкцією
    «який + дієслово» для надання мовленню природної динаміки.'
  - 'Стилістичний контраст: аналіз пар «сплячий кіт» (штучно) vs «кіт, який спить»
    (природно) та «працююча людина» vs «людина, яка працює» — чому українська мова
    віддає перевагу енергії дії.'
  - 'Функціонування дієприкметникових зворотів у літературному стилі XIX-XX століть:
    аналіз прикладів зі стандартів (напр. «Озеро, оточене...») та випадків, де ці
    форми створюють урочистий ефект.'
- section: 'Лакмусовий папірець грамотности: чинний vs діючий (The Literacy Litmus
    Test: valid vs acting)'
  words: 800
  points:
  - 'Суворе розмежування значень: «чинний» як характеристика юридичної сили (закони,
    угоди) vs «діючий» як активне функціонування або роль (вулкани, армія, персонажі).'
  - 'Робота над помилкою «діючий закон»: як використання цього суржикового калькування
    з російської мови («действующий») сигналізує про недостатній рівень професійної
    грамотности.'
  - 'Випадки легітимного вживання «діючий»: «діюча особа» (театр/література), «діюча
    речовина» (фармакологія), «діючий вулкан» — drill на розрізнення контекстів.'
- section: Лексикалізовані форми та подолання кальок (Lexicalized Forms and Overcoming
    Calques)
  words: 900
  points:
  - 'Вивчення списку дозволених лексикалізованих слів, що стали прикметниками чи іменниками:
    завідуючий (титул), керуючий (посада), цілющий (властивість), родючий (якість).'
  - 'Стратегії заміни кальки «існуючий»: використання контекстуальних відповідників
    — «наявний» (про ресурси/проблеми), «теперішній» (про стан), «даний» (про факт).'
  - 'Деколонізація мовлення: викорінення конструкцій «оточуюче середовище» (→ довкілля
    / навколишнє середовище) та «слідуюча зупинка» (→ наступна зупинка) як маркерів
    імперського впливу.'
vocabulary_hints:
  required:
  - активний (active) — граматична категорія форми дієприкметника
  - дієприкметник (participle) — термін для позначення дієслівної форми з ознаками
    прикметника
  - теперішній час (present tense) — час, у якому творяться форми на -учий/-ючий
  - чинний (valid/in force) — чинне законодавство, чинний закон; ключовий маркер професійної
    мови
  - діючий (acting/functioning) — діючий вулкан, діюча армія; часто помилково вживається
    як калька «valid»
  - завідуючий (head/manager) — завідуючий кафедрою, завідуючий відділом; лексикалізований
    іменник (посада)
  - керуючий (manager/governor) — керуючий справами, керуючий банківською установою;
    офіційне звання
  - наступний (next) — наступна зупинка; обов'язкова ідіоматична заміна помилкової
    кальки «слідуючий»
  - наявний (available/existing) — наявні ресурси, наявні проблеми; природна заміна
    канцеляризму «існуючий»
  - довкілля (environment) — природна заміна штучного терміну «оточуюче середовище»
  - підрядне речення (subordinate clause) — конструкція «який + дієслово», що є стандартом
    для заміни дієприкметника
  recommended:
  - книжний (bookish/literary) — характеристика високого стилю, де ці форми зустрічаються
    найчастіше
  - архаїчний (archaic) — відчуття продуктивних активних дієприкметників у сучасному
    розмовному мовленні
  - лексикалізований (lexicalized) — форма, що втратила значення дії і стала іменником
    або прикметником
  - діюча особа (acting person) — театральний або літературний персонаж
  - цілющий (healing/medicinal) — цілюща вода, цілющі трави; прикметник, що описує
    постійну якість
  - родючий (fertile) — родюча земля, родючий ґрунт; прикметник, що став окремим словом
  - канцеляризм (bureaucratese) — термін для опису надмірного вживання штучних дієприкметників
