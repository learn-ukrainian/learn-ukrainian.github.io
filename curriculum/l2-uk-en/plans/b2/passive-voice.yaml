module: b2-001
level: B2
sequence: 1
slug: passive-voice
version: '1.0'
title: "Пасивні конструкції"
subtitle: "Passive voice in formal and academic contexts"
focus: grammar
pedagogy: PPP
phase: "B2.1a [Passive Voice System]"
word_target: 2000
objectives:
- "Learner can distinguish between passive and active voice in Ukrainian"
- "Learner can form passive constructions using reflexive verbs (-ся) and passive participles (-ний, -тий)"
- "Learner can express the agent of an action using the instrumental case"
- "Learner can identify passive voice usage in formal and scientific registers"

reading_situations:
  - source_type: "наукова стаття"
    topic: "Екологічний стан річки Дніпро"
    key_elements: ["моніторинг (m)", "дослідження (n)", "забруднення (n)", "здійснюватися", "було виявлено"]
    motivation: "Demonstrate reflexive passive verbs (здійснюється) and passive participles (виявлено) in a formal scientific report."

listening_situations:
  - media_type: "відео"
    setting: "A news report about a new government reform being implemented."
    focus_points: ["Who implemented the reform?", "What changes were made?", "Identify passive phrases like 'реформу було прийнято'."]
    motivation: "Listen for passive voice in publicistic/media register."

writing_tasks:
  - task_type: "офіційний лист"
    prompt: "Write a formal letter to a city council regarding a project that was recently completed in your neighborhood."
    requirements: ["мінімум 150 слів", "використати 3 різні пасивні конструкції", "інструментальний відмінок для суб'єкта дії"]
    motivation: "Practice using passive voice in official-business style."

discussion_topics:
  - context: "The pros and cons of digitalization in public services."
    questions:
      - "Як здійснюється захист персональних даних?"
      - "Ким розробляються нові закони про цифровізацію?"
    motivation: "Using passive voice to discuss abstract institutional processes."

content_outline:
  - section: "Актив vs Пасив (Active vs Passive)"
    words: 400
    points:
      - "Review of active voice: Студенти читають книгу."
      - "Introduction to passive voice: Книга читається студентами."
      - "The instrumental case for the agent (студентами)."
  - section: "Пасивні форми на -ся (Reflexive Passive)"
    words: 600
    points:
      - "Formation: transitive verb + -ся."
      - "Usage: continuous or habitual actions in formal/scientific styles (Будинок будується робітниками)."
      - "Comparison with active forms."
  - section: "Пасивні дієприкметники та безособові форми (Passive Participles)"
    words: 600
    points:
      - "Forms like -ний, -тий (написаний, взятий)."
      - "The 'було + participle' construction (Закон було прийнято)."
      - "Stylistic preference for '-но, -то' forms in modern Ukrainian to avoid overusing -ся."
  - section: "Підсумок та практика (Summary)"
    words: 400
    points:
      - "When to use passive voice (formal, objective, institutional)."
      - "Common pitfalls: avoiding clumsy Russified passive constructions."

vocabulary_hints:
  required:
    - здійснюватися (to be carried out)
    - розроблятися (to be developed)
    - прийматися (to be accepted/adopted)
    - виявляти (to detect/reveal)
    - моніторинг (monitoring)
  recommended:
    - дослідження (research)
    - впровадження (implementation)
    - реформа (reform)

activity_hints:
  - type: select
    focus: "Identify active vs passive sentences"
    items: 10
  - type: fill-in
    focus: "Transform active sentences into passive"
    items: 8
  - type: error-correction
    focus: "Fix unnatural passive constructions (calques)"
    items: 6
  - type: reading
    focus: "Read an article excerpt and list all passive constructions used"
    items: 1

connects_to:
  - "b2-002 (Passive Voice: Special Cases)"
prerequisites:
  - B1 completion
grammar:
  - "Passive voice with -ся"
  - "Passive participles (-ний, -тий)"
  - "Impersonal forms (-но, -то)"
  - "Instrumental case for agent"
register: офіційно-діловий, науковий
