module: b2-076
level: B2
sequence: 76
slug: news-analysis-basics
version: '1.1'
title: "Аналіз новин: Структура, жанри та перше наближення"
subtitle: "Аналіз новин: структура, жанри та перший погляд"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Вивчити структуру типового новинного повідомлення (заголовок, лід, корпус тексту)."
  - "Навчитися розрізняти основні інформаційні жанри: замітка, репортаж, інтерв'ю."
  - "Опанувати лексику, характерну для українського медіа-простору."
  - "Почати розвивати навички критичного оцінювання джерел інформації."

reading_situations:
  - source_type: "стрічка новин"
    topic: "Добірка новин про економічні реформи в Україні за останню добу."
    key_elements: ["клікбейт", "фактаж", "цитування офіційних осіб"]
    motivation: "Аналіз оперативності та стислості інформаційних повідомлень."
  - source_type: "репортаж"
    topic: "Відкриття нового культурного центру у Львові: погляд очевидця."
    key_elements: ["ефект присутності", "деталізація", "емоційний фон"]
    motivation: "Вивчення особливостей репортажного стилю."

listening_situations:
  - media_type: "відео"
    setting: "Випуск вечірніх новин на одному з українських телеканалів."
    focus_points: ["інтонація ведучого", "структура сюжету", "використання титрів"]
    motivation: "Розвиток навичок сприйняття телевізійних новин на слух."

writing_tasks:
  - task_type: "репортаж"
    prompt: "Напишіть інформаційну замітку про подію з вашого міста, дотримуючись
      правила 'перевернутої піраміди'."
    requirements: ["мінімум 200 слів", "інформативний заголовок", "лід із відповідями
          на питання хто/що/де/коли", "нейтральний стиль без оцінок"]
    motivation: "Практичне відпрацювання навичок новинного письма в українському медіа-стилі."
    model_answer: "Замітка має починатися з найважливішої інформації, поступово переходячи
      до деталей та контексту, без суб'єктивних оцінок автора."

content_outline:
  - section: "Анатомія новини"
    words: 1000
    subsections:
      - "Заголовок як гачок: функції та типи (інформативні vs інтригуючі)"
      - "Правило 'перевернутої піраміди': від найважливішого до деталей"
      - "Лід (Lead): як зацікавити читача першим абзацом"
    key_concepts:
      - "інфопривід"
      - "актуальність"
      - "лаконічність"
      - "структурування"
  - section: "Інформаційні жанри в сучасних медіа"
    words: 1000
    subsections:
      - "Інформаційна замітка: сухі факти без оцінок"
      - "Розширений репортаж: опис події через призму сприйняття автора"
      - "Бліц-інтерв'ю: оперативне отримання коментарів"
    key_concepts:
      - "об'єктивність"
      - "оперативність"
      - "достовірність"
      - "першоджерело"
  - section: "Мова українських медіа"
    words: 1000
    subsections:
      - "Специфічна лексика та абревіатури (ОДА, Кабмін, ВРУ тощо)"
      - "Дієслова активної дії для створення динаміки в новинах"
      - "Використання непрямої мови для цитування джерел"
    key_concepts:
      - "медіаграмотність"
      - "мовний штамп"
      - "кліше"
      - "стилістична нейтральність"
  - section: "Джерела та верифікація фактів"
    words: 1000
    subsections:
      - "Офіційні повідомлення vs чутки у соціальних мережах"
      - "Хто такий 'анонімне джерело' і чи можна йому вірити"
      - "Первинна верифікація інформації: правило двох джерел"
    key_concepts:
      - "верифікація"
      - "маніпуляція"
      - "фейк"
      - "баланс думок"

vocabulary:
  required:
    - новина
    - джерело
    - репортаж
    - заголовок
    - подія
    - коментар
    - факти
    - медіа
  recommended:
    - резонансний
    - перевірений
    - оприлюднити
    - спростування
    - підтвердження

activities:
  types_required:
    - true-false
    - match-up
    - fill-in
    - select
  min_items_per_type: 5
  total_min_items: 20

activity_hints:
  - type: select
    focus: "Визначити, чи є твердження фактом чи думкою (оцінним судженням)."
  - type: error-correction
    focus: "Виявити та виправити маркери упередженості в новинному тексті."
  - type: fill-in
    focus: "Написати інформативний лід (перший абзац новини) за схемою хто/що/де/коли/чому."
  - type: group-sort
    focus: "Класифікувати елементи новини за категоріями: хто, що, де, коли, чому,
      як."

references:
  - "Авраменко О. М. Українська мова. 11 клас (2019) — Публіцистичний стиль"
  - "Глазова О. П. Українська мова. 11 клас (2019), §1-5 — Культура мовлення, медіа"
  - "State Standard 2024: B2 SS 3 — Professional communication, media literacy"

connects_to:
  previous: "text-analysis"
  next: "news-analysis-advanced"
phase: B2.4 [Communication Skills]
