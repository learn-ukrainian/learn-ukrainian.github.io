module: b2-075
level: B2
sequence: 75
slug: news-analysis-basics
version: '1.0'
title: "Аналіз новин: Структура, жанри та перше наближення"
subtitle: "News Analysis: Structure, Genres, and First Look"
focus: professional
pedagogy: workshop
word_target: 4000
objectives:
  - "Вивчити структуру типового новинного повідомлення (заголовок, лід, корпус тексту)."
  - "Навчитися розрізняти основні інформаційні жанри: замітка, репортаж, інтерв'ю."
  - "Опанувати лексику, характерну для українського медіа-простору."
  - "Почати розвивати навички критичного оцінювання джерел інформації."

reading_situations:
  - source_type: "стрічка новин"
    topic: "Добірка новин про економічні реформи в Україні за останню добу."
    key_elements: ["клікбейт", "фактаж", "цитування офіційних осіб"]
    motivation: "Аналіз оперативності та стислості інформаційних повідомлень."
  - source_type: "репортаж"
    topic: "Відкриття нового культурного центру у Львові: погляд очевидця."
    key_elements: ["ефект присутності", "деталізація", "емоційний фон"]
    motivation: "Вивчення особливостей репортажного стилю."

listening_situations:
  - media_type: "відео"
    setting: "Випуск вечірніх новин на одному з українських телеканалів."
    focus_points: ["інтонація ведучого", "структура сюжету", "використання титрів"]
    motivation: "Розвиток навичок сприйняття телевізійних новин на слух."

content_outline:
  - section: "Анатомія новини"
    words: 1000
    subsections:
      - "Заголовок як гачок: функції та типи (інформативні vs інтригуючі)"
      - "Правило 'перевернутої піраміди': від найважливішого до деталей"
      - "Лід (Lead): як зацікавити читача першим абзацом"
    key_concepts:
      - "інфопривід"
      - "актуальність"
      - "лаконічність"
      - "структурування"
  - section: "Інформаційні жанри в сучасних медіа"
    words: 1000
    subsections:
      - "Інформаційна замітка: сухі факти без оцінок"
      - "Розширений репортаж: опис події через призму сприйняття автора"
      - "Бліц-інтерв'ю: оперативне отримання коментарів"
    key_concepts:
      - "об'єктивність"
      - "оперативність"
      - "достовірність"
      - "першоджерело"
  - section: "Мова українських медіа"
    words: 1000
    subsections:
      - "Специфічна лексика та абревіатури (ОДА, Кабмін, ВРУ тощо)"
      - "Дієслова активної дії для створення динаміки в новинах"
      - "Використання непрямої мови для цитування джерел"
    key_concepts:
      - "медіаграмотність"
      - "мовний штамп"
      - "кліше"
      - "стилістична нейтральність"
  - section: "Джерела та перевірка фактів (Fact-checking)"
    words: 1000
    subsections:
      - "Офіційні повідомлення vs чутки у соціальних мережах"
      - "Хто такий 'анонімне джерело' і чи можна йому вірити"
      - "Первинна верифікація інформації: правило двох джерел"
    key_concepts:
      - "верифікація"
      - "маніпуляція"
      - "фейк"
      - "баланс думок"

vocabulary:
  required:
    - новина
    - джерело
    - репортаж
    - заголовок
    - подія
    - коментар
    - факти
    - медіа
  recommended:
    - резонансний
    - перевірений
    - оприлюднити
    - спростування
    - підтвердження

activities:
  types_required:
    - true-false
    - match-up
    - fill-in
    - select
  min_items_per_type: 5
  total_min_items: 20

connects_to:
  previous: "text-analysis"
  next: "news-analysis-advanced"
