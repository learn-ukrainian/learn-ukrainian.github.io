- type: reading
  focus: 'Прочитайте текст про християнські традиції: православ''я та католицизм і
    дайте відповіді на запитання щодо ключових понять.'
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про релігійна мозаїка: протестантизм,
    іслам та юдаїзм, використовуючи нову лексику модуля.'
- type: critical-analysis
  focus: 'Проаналізуйте взаємозв''язок між поняттями у розділі «Християнські традиції:
    Православ''я та Католицизм». Обґрунтуйте свою позицію прикладами з тексту.'
- type: error-correction
  focus: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему християнські
    традиції: православ''я та католицизм.'
