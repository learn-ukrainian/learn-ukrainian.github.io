module: b2-092
level: B2
sequence: 92
slug: religion-in-ukraine
version: 1.1.2
title: 'Релігійне життя в Україні: Духовність та традиції'
subtitle: 'Релігійне життя в Україні: духовність і традиції'
focus: cultural
pedagogy: seminar
word_target: 4000
objectives:
- Ознайомитися з релігійним розмаїттям України та історією основних конфесій.
- Опанувати лексику, пов'язану з релігійними обрядами, святами та церковною 
  ієрархією.
- Обговорити роль релігії у формуванні національної ідентичності та в сучасному 
  суспільстві.
- Зрозуміти правові та соціальні аспекти свободи совісті в Україні.
reading_situations:
- source_type: історичний нарис
  topic: Хрещення Русі та його вплив на розвиток української культури та 
    державності.
  key_elements:
  - язичництво
  - конфесія
  - спадкоємність
  - духовна незалежність
  motivation: Розуміння історичних витоків релігійної ідентичності.
listening_situations:
- media_type: відео
  setting: Репортаж про міжконфесійний діалог під час святкування Різдва у 
    Львові.
  focus_points:
  - екуменізм
  - традиції святкування
  - спільні молитви
  motivation: Розвиток сприйняття на слух розповідного тексту про культурні 
    традиції.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть есе на тему: ''Роль релігії у формуванні української національної
    ідентичності: від Хрещення до Томосу''.'
  requirements:
  - мінімум 250 слів
  - використання релігійної лексики модуля
  - історичні приклади
  - збалансована позиція
  motivation: Перевірка здатності обговорювати складні релігійні та суспільні 
    теми з повагою та аргументацією.
  model_answer: Есе має охоплювати ключові історичні моменти (Хрещення Русі, 
    УГКЦ під забороною, отримання Томосу), аналізувати вплив церкви на 
    збереження ідентичності та висловити зважену позицію.
discussion_topics:
- context: 'Роль релігії та церкви під час війни: капеланство та гуманітарна допомога.'
  questions:
  - Як змінилося ставлення українців до релігії після 2022 року?
  - Хто такі військові капелани та в чому полягає їхня місія?
  - Чи може релігія бути об'єднавчим фактором для нації?
  motivation: Обговорення соціальної та моральної ролі релігійних інституцій.
content_outline:
- section: 'Християнські традиції: Православ''я та Католицизм'
  words: 1000
  subsections:
  - Історія становлення Православної Церкви України (ПЦУ)
  - 'Українська Греко-Католицька Церква: міст між Сходом та Заходом'
  - 'Римо-Католицька громада: історична спадщина та сучасність'
  key_concepts:
  - єпархія
  - томос
  - патріархат
  - літургія
- section: 'Релігійна мозаїка: Протестантизм, Іслам та Юдаїзм'
  words: 1000
  subsections:
  - 'Розвиток протестантських громад: від реформації до сьогодні'
  - 'Іслам в Україні: кримські татари та духовна спадщина Криму'
  - 'Юдейська громада: історія, трагедії та відродження'
  key_concepts:
  - громада
  - мечеть
  - синагога
  - конфесія
- section: Обрядовість, символіка та свята
  words: 1000
  subsections:
  - 'Календарний цикл свят: Великдень, Різдво, Трійця'
  - Символіка храмової архітектури та іконопису
  - 'Таїнства та обряди в житті українця: хрещення, вінчання'
  key_concepts:
  - обряд
  - ікона
  - символіка
  - паломництво
- section: Держава, суспільство та релігійна свобода
  words: 1000
  subsections:
  - Конституційні права громадян на свободу совісті та віросповідання
  - 'Міжконфесійна рада Церков: співпраця та мирне співіснування'
  - Секуляризм та місце духовності в житті сучасної молоді
  key_concepts:
  - свобода совісті
  - секуляризм
  - толерантність
  - капелан
- section: Підсумок — Summary
  words: 300
  points:
  - 'Review vocabulary for religious institutions and rites: ПЦУ, УГКЦ, мечеть, синагога,
    хрещення, літургія. Self-check: What is the difference between єпархія and патріархат?'
  - 'Discussing religion in society requires terms like свобода совісті, секуляризм,
    and толерантність. Self-check: Explain the historical significance of a томос.
    Describe the role of a капелан using at least 3 new vocabulary words.'
