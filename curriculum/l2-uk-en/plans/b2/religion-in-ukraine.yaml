module: b2-081
level: B2
sequence: 81
slug: religion-in-ukraine
version: '2.0'
title: Релігія в Україні
subtitle: Religion in Ukraine
focus: culture
pedagogy: CBI
phase: B2.8
word_target: 4000
objectives:
- Учень розуміє релігійне різноманіття сучасної України та концепцію «Київ — Другий Єрусалим»
- Учень може обговорити значення основних релігійних свят та традицій
- Учень ознайомлений з роллю Ради церков у забезпеченні міжконфесійного миру
content_outline:
- section: 'Розминка: Релігійний ландшафт України (Warm-up: Religious Landscape of Ukraine)'
  words: 500
  points:
  - 'Огляд конфесійного різноманіття: православ''я, греко-католицизм, протестантизм, іслам та юдаїзм як складники ідентичності'
  - 'Культурний гачок: Концепція «Київ — Другий Єрусалим» часів Петра Могили та Мазепи; топографічна імітація (Золоті ворота,
    Софія як храм Соломона)'
  - 'Аналіз релігійної щільності: пояснення унікально високої концентрації релігійних організацій (~34,600) порівняно з сусідами'
- section: Православ'я та Церква в історичному контексті (Orthodoxy and the Church in Historical Context)
  words: 800
  points:
  - Статус ПЦУ та отримання Томосу 2019 року; розрізнення між ПЦУ та УПЦ у сучасному правовому та соціальному полі
  - 'Роль церкви під час війни: молитви за воїнів, волонтерство та інститут капеланства як відповідь на виклики часу'
  - 'Граматичний фокус (Standard §4.3.4): використання складнопідрядних речень зі з’ясувальною частиною для опису церковних
    догматів та історичних рішень'
- section: Релігійні свята, традиції та мовна норма (Religious Holidays, Traditions, and Language Norms)
  words: 900
  points:
  - 'Великі свята: Різдво (дискурс 25 грудня vs 7 січня), Великдень (традиції паски та писанки), прощі до святих місць'
  - 'Запобігання помилкам: Розрізнення понять «Свято» (іменник) та «Святий» (прикметник/іменник); приклад: «Сьогодні свято»
    vs «Святий вечір»'
  - 'Культура вітання: викорінення кальки «З наступаючим святом!» та впровадження нормативного «З прийдешнім святом!» або
    «Зі святом!»'
- section: Міжконфесійний діалог та толерантність (Interfaith Dialogue and Tolerance)
  words: 800
  points:
  - Всеукраїнська рада церков і релігійних організацій як модель мирного співіснування різних деномінацій (конфесій)
  - Поняття екуменізму та релігійна толерантність як базова цінність українського громадянського суспільства
  - 'Синтаксична практика: побудова складнопідрядних речень з означальною частиною (сполучні слова ''який'', ''котрий'', ''що'')
    для характеристики релігійних громад'
- section: Підсумок та лексична практика (Summary and Lexical Practice)
  words: 1000
  points:
  - 'Лексична диференціація: ''вірити в'' + Зн.в. (віра в Бога/ідею) vs ''вірити'' + Дав.в. (довіра особі); приклад: «Я вірю
    в перемогу» vs «Я вірю капеланові»'
  - 'Робота з термінологією: розрізнення понять ''конфесія'' (denomination) та ''релігія'' (religion) у науковому та публіцистичному
    стилях'
  - 'Дискусія за принципом CBI: аналіз статті про вплив релігії на національну ідентичність та обговорення результатів дослідження'
vocabulary_hints:
  required:
  - віра (faith) — віра в Бога, символ віри, прийняти на віру; надзвичайно висока частотність
  - релігія (religion) — традиційна релігія, релігійне життя, релігійна громада, свобода релігії
  - церква (church) — помісна церква, глава церкви, церковне свято; акцент на ПЦУ та УПЦ
  - свято (holiday) — велике свято, з нагоди свята, відзначати свято; розрізняти з прикметником 'святий'
  - конфесія (denomination) — міжконфесійний діалог, приналежність до конфесії; термін академічного стилю
  recommended:
  - святий (saint/holy) — Святе Письмо, свята вода, святий вечір, зарахувати до лику святих
  - прийдешній (upcoming) — вживати у конструкції 'З прийдешнім святом!' замість кальки 'з наступаючим'
  - томос (tomos) — у контексті автокефалії української церкви
  - капелан (chaplain) — військовий капелан; актуальна лексика воєнного часу
  - проща (pilgrimage) — іти на прощу, релігійна проща; синонім до 'паломництво'
