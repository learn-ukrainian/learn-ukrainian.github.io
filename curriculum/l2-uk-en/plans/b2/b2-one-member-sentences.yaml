module: b2-one-member-sentences
level: B2
sequence: 14
version: '1.2'
title: "Односкладні речення"
subtitle: "One-Member Sentences: Types and Stylistic Functions"
focus: grammar
pedagogy: PPP
objectives:
  - "Глибоке розрізнення типів односкладних речень: означено-особові, неозначено-особові, узагальнено-особові, безособові та називні."
  - "Аналіз морфологічного вираження головного члена в різних типах односкладних речень."
  - "Розуміння стилістичних можливостей односкладних речень у художньому, публіцистичному та розмовному стилях."
  - "Майстерне використання безособових речень для опису станів природи та людини."
  - "Застосування узагальнено-особових речень у контексті прислів'їв, приказок та сталих виразів."

reading_situations:
  - source_type: "збірка прислів'їв та приказок"
    topic: "Народна мудрість про працю та навчання"
    key_elements: ["вік живи — вік учись", "працюй (v) до поту", "готуй (v) сани влітку"]
    motivation: "Ідеальний матеріал для вивчення узагальнено-особових речень та їхньої дидактичної функції."
  - source_type: "поетичний текст"
    topic: "Нічні роздуми та пейзажна лірика"
    key_elements: ["ніч (n)", "тиша (n)", "спиться (v) легко", "хочеться (v) мріяти"]
    motivation: "Аналіз називних речень для створення фону та безособових речень для передачі внутрішнього стану."

listening_situations:
  - media_type: "лекція"
    setting: "Мистецтво короткої фрази: використання односкладних речень у рекламі та заголовках"
    focus_points: ["динаміка означено-особових речень", "інтрига називних речень", "лаконічність"]
    motivation: "Розуміння того, як структура речення впливає на увагу аудиторії в сучасному медіа-просторі."

writing_tasks:
  - task_type: "відгук"
    prompt: "Напишіть відгук про свій ранок або вечір, використовуючи виключно односкладні речення (називні для предметів, безособові для відчуттів, означено-особові для дій)."
    requirements:
      - "мінімум 200 слів"
      - "використати щонайменше по 2 речення кожного типу (називне, безособове, означено-особове)"
      - "досягти цілісності тексту без використання підметів"
    motivation: "Виклик для студента: побудувати логічний та емоційний текст, обмежуючи себе певними синтаксичними структурами."
    model_answer: "Текст має бути атмосферним: «Ранок. Прохолода. Відчиняю вікно. Дихається вільно. П'ю каву...». Оцінюється творчий підхід та граматична точність."

discussion_topics:
  - context: "Суб'єктність у мові: чому ми іноді 'ховаємо' виконавця дії?"
    questions:
      - "Яка різниця в сприйнятті між 'Я вирішив' та 'Мені вирішилося'?"
      - "Чому в інструкціях часто використовують неозначено-особові речення ('Натисніть кнопку')?"
      - "Чи можна вважати називні речення найбільш лаконічним засобом опису?"
    motivation: "Дискусія про психологічні та стилістичні аспекти відсутності підмета в реченні."

content_outline:
  - section: "Світ без підмета: концепція односкладності"
    words: 800
    subsections:
      - "Головний член речення у формі присудка або підмета"
      - "Смислова повнота односкладних речень"
      - "Класифікація: дієслівні та іменні односкладні речення"
    key_concepts:
      - "односкладність"
      - "головний член"
      - "синтаксична незалежність"
  - section: "Означено-особові та неозначено-особові речення"
    words: 800
    subsections:
      - "Означено-особові: вираження особи через закінчення дієслова (1, 2 особа)"
      - "Неозначено-особові: акцент на самій дії, виконавець неважливий (3 особа множини)"
      - "Сфери вживання: заклики, інструкції, репортажі"
    key_concepts:
      - "особове закінчення"
      - "акцент на дії"
      - "адресат"
  - section: "Безособові речення: стани, стихії та неминучість"
    words: 800
    subsections:
      - "Способи вираження головного члена (безособові дієслова, форми на -но, -то, категорія стану)"
      - "Опис природи та фізичного/психічного стану людини"
      - "Безособовість як засіб відсторонення суб'єкта від відповідальності"
    key_concepts:
      - "безособове дієслово"
      - "категорія стану"
      - "стихійність"
  - section: "Узагальнено-особові та називні речення"
    words: 800
    subsections:
      - "Узагальнено-особові: дія як загальне правило або істина"
      - "Називні: ствердження існування предмета чи явища"
      - "Функція називних речень у зав'язці тексту та створенні настрою"
    key_concepts:
      - "афористичність"
      - "екзистенційність"
      - "експозиція"
  - section: "Синтаксична трансформація та стилістичний вибір"
    words: 800
    subsections:
      - "Перетворення двоскладних речень на односкладні для підвищення експресії"
      - "Роль односкладних речень у поезії та прозі"
      - "Практикум: аналіз авторського стилю через призму односкладності"
    key_concepts:
      - "експресивність"
      - "економія мовних засобів"
      - "авторський стиль"

word_target: 4000

vocabulary:
  required:
    - односкладне речення
    - означено-особове
    - неозначено-особове
    - узагальнено-особове
    - безособове
    - називне
    - головний член
    - категорія стану
  recommended:
    - лаконічність
    - динамізм
    - афористичність
    - суб'єктність
    - пейзаж

activities:
  types_required:
    - match-up
    - select
    - error-correction
    - essay-response
  min_items_per_type: 5
  total_min_items: 25

connects_to:
  previous: "secondary-sentence-members"
  next: "homogeneous-members"

