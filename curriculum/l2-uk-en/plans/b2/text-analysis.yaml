module: b2-78
level: B2
sequence: 78
slug: text-analysis
version: '2.0'
title: Аналіз тексту
subtitle: Text Analysis
content_outline:
- section: 'Вступ: Навіщо аналізувати тексти (Introduction: Why Analyze Texts)'
  words: 500
  points:
  - Поняття «інформаційної гігієни» та медіаграмотності в сучасному українському дискурсі;
    роль проєктів «StopFake» та «Детектор медіа» як культурних орієнтирів.
  - Критичне мислення як інструмент захисту від інформаційного шуму та розуміння прихованого
    змісту, іронії й натяків (§1.2.1.1 Стандарту).
- section: Факт проти думки (Fact vs Opinion)
  words: 700
  points:
  - Ознаки фактичних тверджень (перевіряльність, джерела) vs оціночні судження (суб'єктивність,
    емоційність); маркери об'єктивного викладу («відбулося», «за даними»).
  - 'Learner Error: калькування «опінія» (неправильно) — заміна на питомі «на мою
    думку» або «на мій погляд» (правильно); практика розрізнення в медіа-текстах.'
  - 'Аналіз причинно-наслідкових зв''язків: чому речення зі сполучником «тому що»
    часто є авторською інтерпретацією (судженням), а не голим фактом.'
- section: Виявлення упередженості та маніпуляцій (Detecting Bias and Manipulation)
  words: 800
  points:
  - 'Типи упередженості (політична, комерційна) та мовні маркери: забарвлена лексика,
    гіперболи та емоційні епітети (§4.4.1.2 Стандарту).'
  - 'Маніпулятивні техніки в медіа: перекручування фактів, вибіркове використання
    даних та прийом «вирвати з контексту» для зміни змісту.'
  - 'Аналіз джерела інформації: оцінка авторитетності автора, виявлення прихованих
    інтересів та перевірка репутації медіа-майданчика.'
- section: Риторичні прийоми та стилістичні засоби (Rhetorical Devices and Stylistic
    Tools)
  words: 800
  points:
  - Етос, пафос, логос як види переконання; розрізнення терміна «пафос» як урочистої
    піднесеності від хибного друга перекладача «pathetic» (жалюгідний — неправильно).
  - 'Стилістичні засоби синтаксису (§4.4.1.3): риторичні запитання, звертання, повтори
    (анафора) та порівняння для посилення емоційного впливу.'
  - 'Культурний гачок: аналіз риторики воєнного часу на прикладі сучасних лідерів
    (зокрема В. Зеленського) — використання анафори та антитези («Ми тут. Ми захищаємо»).'
- section: Структура та логіка аргументації (Text Structure and Argumentation Logic)
  words: 700
  points:
  - Виділення головної думки та підтримуючих деталей; вживання терміна «аргумент»
    як доказу (правильно), а не суперечки «dispute» (неправильно).
  - Логічна послідовність тверджень та використання евфемізмів або уточнень для маскування
    чи акцентування авторської позиції.
  - Методи синтезу інформації та виявлення прихованих висновків автора через контекстуальні
    підказки та «читання між рядків».
- section: 'Підсумок: Практика критичного аналізу (Summary: Practice of Critical Analysis)'
  words: 500
  points:
  - 'Комплексний аналіз публіцистичного тексту: від фактчекінгу до деконструкції риторичних
    фігур та виявлення прихованої маніпуляції.'
  - Написання критичного відгуку з дотриманням об'єктивного тону (використання Passive
    Voice — зв'язок з M01-10) та академічної етики.
  - 'Зв''язок з майбутніми модулями: підготовка до фінального іспиту (M94) та поглибленого
    вивчення стилістики й медіа-дискурсу на рівні C1.'
focus: skills
pedagogy: TTT
objectives:
- Учень вміє розрізняти факти та судження у тексті
- Учень може виявити маніпулятивні прийоми та прихований підтекст
- Учень володіє інструментами аналізу риторичних пристроїв у промовах
grammar:
- Аналіз підтексту та авторської позиції
- Риторичні фігури та засоби виразності
phase: B2.4 Skills & Capstone
vocabulary_hints:
  required:
  - аналіз (analysis) — глибокий аналіз, провести аналіз; висока частотність в академічному
    реєстрі
  - факт (fact) — історичний факт, незаперечний факт, перекручування фактів; базовий
    термін медіаграмотності
  - судження (judgment) — оціночне судження, висловити судження; ключове поняття для
    розрізнення думок від фактів
  - упередженість (bias) — політична упередженість, явна упередженість, позбутися
    упередженості; середня частотність
  - маніпуляція (manipulation) — маніпуляція свідомістю, прихована маніпуляція, піддаватися
    маніпуляції; висока частотність у ЗМІ
  recommended:
  - контекст (context) — вирвати з контексту, історичний контекст, культурний контекст;
    критично для розуміння підтексту
  - риторичне запитання (rhetorical question) — стилістичний засіб синтаксису згідно
    з §4.4.1.3 Стандарту
  - медіаграмотність (media literacy) — ключова навичка сучасної «інформаційної гігієни»
    в Україні
  - інфопростір (information space) — актуальний термін для опису середовища поширення
    інформації
  - епітет (epithet) — художнє означення, стилістичний засіб лексики (§4.4.1.2) для
    вираження авторської оцінки
