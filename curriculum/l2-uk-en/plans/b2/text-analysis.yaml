module: b2-083
level: B2
sequence: 83
slug: text-analysis
version: 1.1.2
title: 'Аналіз тексту: Підтекст, стиль та цільова аудиторія'
subtitle: 'Аналіз тексту: підтекст, стиль та цільова аудиторія'
focus: integration
pedagogy: seminar
word_target: 4000
objectives:
- Розвинути навички глибокого аналізу текстів різних функціональних стилів.
- Навчитися ідентифікувати прихований підтекст, авторську позицію та іронію.
- Дослідити взаємозв'язок між вибором мовних засобів та цільовою аудиторією 
  тексту.
- Відпрацювати методики деконструкції складних речень для повного розуміння 
  змісту.
reading_situations:
- source_type: художній нарис
  topic: Роздуми сучасного українського письменника про зміну міського 
    ландшафту.
  key_elements:
  - метафоричність
  - асоціативні ряди
  - авторська рефлексія
  motivation: Аналіз суб'єктивного сприйняття та художніх засобів виразності.
- source_type: публіцистична колонка
  topic: Еволюція мовної ідентичності в українському суспільстві після 2022 
    року.
  key_elements:
  - аргументація
  - риторичні фігури
  - заклик до дії
  motivation: Робота з переконливим стилем та актуальною соціальною тематикою.
writing_tasks:
- task_type: аналітична записка
  prompt: 'Проаналізуйте наданий публіцистичний текст (300-400 слів): визначте стиль,
    цільову аудиторію, авторську позицію та основні мовні засоби впливу.'
  requirements:
  - мінімум 250 слів
  - визначення функціонального стилю
  - приклади конкретних мовних засобів із тексту
  - висновок про авторську інтенцію
  motivation: Перевірка навичок глибокого аналізу тексту та вміння формулювати 
    аргументовані висновки.
  model_answer: Аналіз має містити визначення стилю, ідентифікацію риторичних 
    прийомів (метафори, риторичні запитання), оцінку підтексту та висновок про 
    комунікативну мету автора.
discussion_topics:
- context: Текст офіційної промови посадовця vs пост у соціальній мережі на ту 
    саму тему.
  questions:
  - Як змінюється лексичний склад залежно від каналу комунікації?
  - Чи впливає стиль викладу на рівень довіри аудиторії?
  - Які граматичні конструкції роблять офіційний текст 'важким' для сприйняття?
  motivation: Порівняльний аналіз регістрів та їхнього впливу на реципієнта.
content_outline:
- section: Рівні аналізу тексту
  words: 1000
  subsections:
  - 'Фактологічний рівень: хто, де, коли та що саме стверджує'
  - 'Концептуальний рівень: ідеї, цінності та ключові повідомлення'
  - 'Підтекстовий рівень: те, що написано ''між рядками'''
  key_concepts:
  - декодування
  - інтерпретація
  - контекстуалізація
  - цілісність тексту
- section: Стилістичне забарвлення та вибір лексики
  words: 1000
  subsections:
  - Синонімічне багатство як інструмент маніпуляції та підкреслення сенсів
  - 'Термінологія vs жаргонізми: як мова визначає межі спільноти'
  - 'Емоційно-експресивна лексика в аналітичних текстах: доречність та ефект'
  key_concepts:
  - конотація
  - денотація
  - лексичний пласт
  - експресивність
- section: Синтаксична складність та ритміка тексту
  words: 1000
  subsections:
  - Вплив довжини речення на динаміку сприйняття інформації
  - Інверсія та парцеляція як засоби акцентування уваги читача
  - Використання вставних конструкцій для вираження авторського ставлення
  key_concepts:
  - синтаксичний паралелізм
  - логічний наголос
  - ритмізація
  - перцепція
- section: Прагматика тексту та цільова аудиторія
  words: 1000
  subsections:
  - Визначення портрета читача за мовними маркерами
  - Адаптація складних смислів для широкого загалу (популяризація)
  - 'Маніпулятивні стратегії в текстах: як їх розпізнати та нейтралізувати'
  key_concepts:
  - комунікативна інтенція
  - мовна маніпуляція
  - адресат
  - прагматичний ефект
- section: Підсумок — Summary
  words: 300
  points:
  - "Deep text analysis operates on three levels: factual, conceptual, and subtextual.
    An author's stylistic choices rely on understanding denotation versus connotation,
    emotional-expressive vocabulary, and syntactic tools like inversion (інверсія)
    or parceling (парцеляція) to control text rhythm."
  - "Self-check: What is the difference between denotation (денотація) and connotation
    (конотація)? Identify the target audience and communicative intention (комунікативна
    інтенція) of a short opinion piece. How does sentence length impact the reader's
    perception?"
vocabulary:
  required:
  - підтекст
  - інтерпретація
  - конотація
  - сприйняття
  - акцентувати
  - деконструкція
  - адресат
  - цілісність
  recommended:
  - багатогранний
  - завуальований
  - промовистий
  - переконливість
  - дискурс
activities:
  types_required:
  - reading
  - critical-analysis
  - select
  - unjumble
  min_items_per_type: 5
  total_min_items: 20
activity_hints:
- type: reading
  focus: Прочитайте текст про рівні аналізу тексту і дайте відповіді на 
    запитання щодо ключових понять.
- type: essay-response
  focus: Напишіть короткий текст (100-150 слів) про стилістичне забарвлення та 
    вибір лексики, використовуючи нову лексику модуля.
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Рівні аналізу 
    тексту». Обґрунтуйте свою позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему 
    рівні аналізу тексту.
references:
- Глазова О. П. Українська мова. 11 клас (2019), §1-10 — Культура мовлення
- Авраменко О. М. Українська мова. 11 клас (2019) — Стилістичний аналіз тексту
- 'State Standard 2024: B2 SS 3 — Professional communication, text analysis'
