module: b2-067
level: B2
sequence: 67
slug: neologisms-borrowings
version: '2.0'
title: Неологізми та запозичення
subtitle: Neologisms, Borrowings, and Calques in Modern Ukrainian
focus: vocabulary
pedagogy: TTT
phase: B2.6 [Lexicology]
word_target: 4000
objectives:
- Learner can classify neologisms by type (general, authorial, potential, semantic)
- Learner can explain how borrowings are phonetically and morphologically adapted to Ukrainian
- Learner can distinguish calques from direct borrowings and evaluate their appropriateness
- Learner can use productive word-formation models to create and evaluate new Ukrainian words
content_outline:
- section: Вступ — еволюція мови (Introduction — Language Evolution)
  words: 600
  points:
  - 'Мова як живий організм: чому словниковий склад мови постійно змінюється; поняття активного та пасивного словника (Держстандарт
    §4.4.1.2).'
  - 'Хронологія мовних змін: хвилі запозичень в історії української мови (тюркські, польські, латинські, сучасні англійські);
    кожна епоха залишає лексичний слід.'
  - 'Актуальність теми: вибух неологізмів у 2014-2026 роках через технологізацію, війну та суспільні зміни; мовна свідомість
    та дерусифікація як чинники оновлення лексики.'
- section: Типи неологізмів (Types of Neologisms)
  words: 800
  points:
  - 'Загальномовні неологізми: нові слова, що входять до активного словника всіх мовців (смартфон, ґуґлити, блогер, ґендер);
    критерії визнання слова загальномовним.'
  - 'Авторські (оказіональні) неологізми: індивідуальні словотвори, обмежені контекстом одного автора; приклади з літератури
    (Тичина: «кларнетизм», Жадан: сучасні оказіоналізми).'
  - 'Потенційні слова: утворення за продуктивними моделями, яких ще немає в словниках, але які зрозумілі (загуглити, заінстаграмити);
    межа між потенційним словом та оказіоналізмом.'
  - 'Семантичні неологізми: нові значення вже наявних слів (хмара — cloud computing, мишка — комп''ютерна мишка); процес семантичного
    розширення.'
- section: Запозичення — адаптація та вимова (Borrowings — Adaptation and Pronunciation)
  words: 800
  points:
  - 'Джерела запозичень: англійські (менеджмент, маркетинг, дедлайн), німецькі (штрейкбрехер, бутерброд), французькі (кур''єр,
    бюро); ідентифікація походження за фонетичними ознаками.'
  - 'Фонетична адаптація: як запозичення змінюють звучання відповідно до українських фонетичних норм (manager → менеджер,
    YouTube → Ютуб); проблеми наголосу.'
  - 'Морфологічна адаптація: як запозичені слова отримують українські відмінкові закінчення та словотвірні афікси (блогер
    → блогерка, менеджер → менеджерити).'
  - 'Правопис запозичень: подвоєння приголосних, написання «і/и» після приголосних, апостроф у запозичених словах (інтерв''ю,
    комп''ютер); найчастіші помилки.'
- section: Калькування та перекладні позичення (Calques and Translation Loans)
  words: 800
  points:
  - 'Визначення калькування: дослівний переклад іншомовного слова або виразу рідними морфемами (sky-scraper → хмарочос, half-time
    → півчас).'
  - 'Структурні кальки: переклад словотвірної моделі (world-view → світогляд, self-criticism → самокритика); продуктивність
    цього способу в українській мові.'
  - 'Семантичні кальки: перенесення нового значення іноземного слова на українське (мишка, вірус, хмара); відмінність від
    прямого запозичення.'
  - 'Калька vs запозичення: коли доречніше створити кальку, а коли — прийняти запозичення; мовна політика та пуризм vs прагматизм
    (файл vs — немає кальки).'
- section: Сучасне українське словотворення та практика (Modern Ukrainian Word Creation and Practice)
  words: 1000
  points:
  - 'Продуктивні словотвірні моделі: як українська мова створює нові слова на власній основі (знеструмити, розмінувати, дерусифікація);
    суфікси та префікси-неологізми.'
  - 'Мовна дерусифікація: заміна русизмів українськими відповідниками (тєлефон → телефон; воєнний → військовий у певних контекстах);
    роль свідомого вибору.'
  - 'Словники нової лексики: онлайн-ресурси для відстеження неологізмів (Словотвір, «Мислово», рішення Мовної комісії НАН);
    навички роботи з ними.'
  - 'Практика словотворення: створення неологізмів за продуктивними моделями для нових понять; критична оцінка — чи «приживеться»
    слово?'
  - 'Підсумковий аналіз: написання тексту про сучасні технологічні зміни з використанням щонайменше 10 неологізмів та запозичень
    із поясненням вибору.'
vocabulary_hints:
  required:
  - неологізм (neologism) — загальномовний неологізм, авторський неологізм; нове слово або нове значення наявного слова
  - запозичення (borrowing) — лексичне запозичення, адаптоване запозичення; слово, прийняте з іншої мови
  - калька (calque) — структурна калька, семантична калька; дослівний переклад іншомовного слова
  - оказіоналізм (occasionalism) — авторський оказіоналізм; індивідуальне слово, обмежене одним контекстом
  - словотворення (word formation) — продуктивне словотворення, модель словотворення; процес утворення нових слів
  - адаптація (adaptation) — фонетична адаптація, морфологічна адаптація; пристосування запозичення до мови-реципієнта
  - дерусифікація (de-Russification) — мовна дерусифікація; свідома заміна русизмів українськими відповідниками
  recommended:
  - пуризм (purism) — мовний пуризм; прагнення очистити мову від іншомовних елементів
  - семантичне розширення (semantic expansion) — набуття словом нового значення (хмара → cloud)
  - інтернаціоналізм (internationalism) — слово, спільне для багатьох мов (демократія, телефон)
  - продуктивна модель (productive pattern) — словотвірна модель, що активно використовується для створення нових слів
