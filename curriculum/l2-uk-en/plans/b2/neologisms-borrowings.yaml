module: b2-077
level: B2
sequence: 77
slug: neologisms-borrowings
version: 1.1.1
title: 'Неологізми та запозичення: Динаміка мовного оновлення'
subtitle: 'Неологізми та запозичення: динаміка оновлення мови'
focus: vocabulary
pedagogy: workshop
word_target: 4000
objectives:
- Дослідити джерела та способи утворення неологізмів у сучасній українській мові.
- Проаналізувати процес адаптації запозичень (переважно англіцизмів) на різних рівнях мовної системи.
- Сформувати критичне ставлення до надмірного вживання іншомовних слів та розвинути навички добору українських відповідників.
- Опанувати термінологію, пов'язану з лінгвістичною політикою та мовним пуризмом.
reading_situations:
- source_type: публіцистична стаття
  topic: 'Експансія англіцизмів у сфері IT та маркетингу: порятунок чи загроза для мови?'
  key_elements:
  - інтерференція
  - транслітерація
  - мовна екологія
  - автентичність
  motivation: Розвиток здатності аналізувати дискусійні питання мовного розвитку.
writing_tasks:
- task_type: есе
  prompt: 'Напишіть есе-роздум на тему: ''Чи потрібен українській мові радикальний пуризм у ХХІ столітті?'', аргументуючи
    свою позицію прикладами вдалих та невдалих запозичень.'
  motivation: Перевірка вміння формулювати власну позицію щодо складних лінгвосоціальних процесів.
  requirements:
  - мінімум 300 слів
  - 'використання термінів: пуризм, адаптація, калька, власнемовний відповідник'
  model_answer: Есе має демонструвати збалансований підхід, розрізняючи виправдані запозичення (терміни, що не мають аналогів)
    та невиправдане заміщення питомих слів ('дедлайн' vs 'реченець').
discussion_topics:
- context: 'Мовний пуризм проти глобалізації: куди рухається українська?'
  questions:
  - Чи є спроби замінити всі запозичення питомими словами реалістичними та бажаними?
  - Як відрізнити виправдане запозичення від зайвого англіцизму?
  motivation: Формування свідомого ставлення до мовних змін та розвиток власної позиції щодо мовної політики.
content_outline:
- section: Джерела та типи неологізмів у сучасній мові
  words: 1000
  subsections:
  - Авторські неологізми (оказіоналізми) у художньому тексті
  - Соціально-політичні та технологічні неологізми останнього десятиліття
  - Процес лексикалізації та входження неологізмів до активного словника
  key_concepts:
  - оказіоналізм
  - авторське слово
  - лексикалізація
  - інновація
- section: 'Запозичення: механізми адаптації та типи впливу'
  words: 1000
  subsections:
  - Фонетична та морфологічна адаптація іншомовних слів
  - 'Прямі запозичення проти калькування: аналіз переваг та недоліків'
  - 'Тематичні групи запозичень: бізнес, мода, технології, медіа'
  key_concepts:
  - адаптація
  - транслітерація
  - калька
  - інтерференція
- section: 'Дискусії про ''чистоту'' мови: пуризм та лібералізм'
  words: 1000
  subsections:
  - 'Історія українського мовного пуризму: від ''Словаря'' Б. Грінченка до сьогодення'
  - Стратегії заміщення запозичень питомими відповідниками (проєкт 'Словотвір' тощо)
  - Мовна стійкість та екологія мови в умовах глобалізації
  key_concepts:
  - пуризм
  - мовна стійкість
  - мовна екологія
  - автентичність
- section: Мовна варіативність у цифровому середовищі
  words: 1000
  subsections:
  - 'Сленг та арго в інтернеті: запозичення чи нова креативність?'
  - Вплив суржику на сучасну розмовну мову та літературну норму
  - Естетика та прагматика використання ненормативних елементів у сучасній літературі
  key_concepts:
  - суржик
  - мережевий сленг
  - диглосія
  - мовна норма
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
vocabulary:
  required:
  - неологізм
  - запозичення
  - пуризм
  - адаптація
  - відповідник
  - автентичність
  - глобалізація
  - стійкість
  recommended:
  - оновлення
  - експансія
  - калькування
  - питомий
  - недоречний
activities:
  types_required:
  - match-up
  - fill-in
  - select
  - error-correction
  min_items_per_type: 5
  total_min_items: 20
activity_hints:
- type: reading
  focus: Прочитайте текст про джерела та типи неологізмів у сучасній мові і дайте відповіді на запитання щодо ключових понять.
- type: essay-response
  focus: 'Напишіть короткий текст (100-150 слів) про запозичення: механізми адаптації та типи впливу, використовуючи нову
    лексику модуля.'
- type: critical-analysis
  focus: Проаналізуйте взаємозв'язок між поняттями у розділі «Джерела та типи неологізмів у сучасній мові». Обґрунтуйте свою
    позицію прикладами з тексту.
- type: error-correction
  focus: Знайдіть і виправте граматичні та лексичні помилки в реченнях на тему джерела та типи неологізмів у сучасній мові.
references:
