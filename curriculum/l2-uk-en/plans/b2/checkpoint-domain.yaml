    - законопроєкт
    - рентабельність
    - правосуддя
    - корупція
    - інвестиції
    - демократія
    - докази
    - повноваження
  recommended:
    - взаємодія
    - стратегія
    - реалізація
    - відповідальність
    - впровадження
    - конкуренція
    - ефективність
    - стійкість

activities:
  types_required:
    - quiz
    - fill-in
    - match-up
    - select
  min_items_per_type: 10
  total_min_items: 40

activity_hints:
  - type: cloze
    description: "Complete a mixed-domain text drawing on politics, law, and economics vocabulary"
  - type: group-sort
    description: "Classify terms by domain: політика / право / економіка (e.g., суверенітет→політика, вирок→право, рентабельність→економіка)"
  - type: error-correction
    description: "Find and fix domain-specific errors in a paragraph mixing all three fields"
  - type: essay-response
    description: "Write a formal text integrating vocabulary from all three domains (e.g., economic consequences of legal reform)"

references:
