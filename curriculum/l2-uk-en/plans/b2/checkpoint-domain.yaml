module: b2-042
level: B2
sequence: 42
slug: checkpoint-domain
version: '1.2'
title: "Контрольний модуль: Предметні сфери"
subtitle: "Checkpoint: Domain Vocabulary"
focus: assessment
pedagogy: review
phase: "B2.2b [Domain Vocabulary]"
word_target: 4000
objectives:
  - "Узагальнити та систематизувати лексику за темами: політика, право, економіка."
  - "Оцінити рівень володіння специфічною термінологією та кліше у кожній із предметних сфер."
  - "Перевірити вміння правильно використовувати терміни у відповідному контексті (речення, тексти)."
  - "Проконтролювати навички аналізу та синтезу інформації зі спеціалізованих джерел (новини, звіти, закони)."
  - "Продемонструвати здатність вести професійну комунікацію на середньо-високому рівні складності."

reading_situations:
  - source_type: "фрагменти текстів"
    topic: "Аналіз та порівняння текстів із різних предметних сфер: політична промова, юридична скарга, економічний прогноз."
    key_elements: ["ключова термінологія", "мовні маркери сфери", "логічні зв'язки"]
    motivation: "Оцінка здатності швидко розпізнавати та оперувати лексикою різних доменів."

listening_situations:
  - media_type: "аудіо"
    setting: "Прослуховування коротких уривків (мікс новин та інтерв'ю) з метою ідентифікації теми та виокремлення ключових термінів."
    focus_points: ["Розпізнавання специфічної термінології на слух.", "Визначення контексту та ролі спікера.", "Сприйняття числових даних та фактів."]
    motivation: "Перевірка гнучкості слухового сприйняття в межах вивчених доменів."

writing_tasks:
  - task_type: "есе"
    prompt: "Оберіть одну з тем: 1) Економічні наслідки політичних реформ; 2) Правове регулювання бізнес-середовища. Напишіть розгорнутий коментар, інтегруючи термінологію з відповідних сфер."
    requirements:
      - "використання щонайменше 15 термінів із модулів 39-41"
      - "аргументованість та логічна структура"
      - "дотримання відповідного стилю (публіцистичного або офіційного)"
      - "мінімум 300 слів"
    motivation: "Демонстрація здатності до інтеграції знань та використання лексики у складних контекстах."
    model_answer: "Текст повинен демонструвати глибоке розуміння взаємозв'язку між різними сферами (наприклад, як політична стабільність впливає на інвестиційний клімат). Обов'язкове вживання термінів: 'законодавча ініціатива', 'рентабельність', 'правове поле', 'бюджетні асигнування'. Оцінюється точність вживання термінів та складність синтаксичних конструкцій."

discussion_topics:
  - context: "Міждисциплінарність у професійній діяльності: чому сучасний фахівець повинен розумітися на політиці, праві та економіці?"
    questions:
      - "Як юридична неграмотність може зашкодити успішному бізнесу?"
      - "Чи може політик бути ефективним без розуміння економічних процесів?"
      - "Яка зі сфер (політика, право, економіка) є найбільш динамічною в сучасній Україні?"
    motivation: "Обговорення важливості комплексного підходу до професійних знань."

content_outline:
  - section: "Політичний лексикон: Систематизація та поглиблення"
    words: 800
    subsections:
      - "Державні інституції: структура та взаємодія гілок влади"
      - "Політична активність: вибори, партії та громадянське суспільство"
      - "Міжнародна дипломатія: Україна в глобальному політичному контексті"
      - "Політичний аналіз: термінологія для опису політичних процесів"
    key_concepts:
      - "демократичні цінності"
      - "виборче право"
      - "суверенітет"
      - "легітимність"
  - section: "Юридичний лексикон: Правова база та судочинство"
    words: 1200
    subsections:
      - "Система права: кримінальне, цивільне, адміністративне та господарське"
      - "Судовий процес: від позову до виконання судового рішення"
      - "Права та обов'язки сторін: юридична відповідальність та захист"
      - "Міжнародне правосуддя та європейські стандарти захисту прав людини"
      - "Спеціалізована юридична термінологія в діловому спілкуванні"
    key_concepts:
      - "законність"
      - "правопорядок"
      - "адвокація"
      - "процесуальна норма"
      - "вердикт"
  - section: "Економічний лексикон: Бізнес та фінанси"
    words: 1000
    subsections:
      - "Макроекономіка: державне регулювання та фінансова стабільність"
      - "Бізнес-процеси: управління, маркетинг та конкурентна стратегія"
      - "Ринок праці та людський капітал: сучасні виклики та тренди"
      - "Інвестиційна діяльність та інноваційний розвиток економіки"
      - "Фінансова грамотність: банківські продукти та фондовий ринок"
    key_concepts:
      - "економічна стабільність"
      - "інвестиційний портфель"
      - "підприємницький дух"
      - "капіталізація"
      - "ліквідність"
  - section: "Міжпредметні зв'язки та професійна аналітика"
    words: 1000
    subsections:
      - "Взаємовплив політики на економічний розвиток країни"
      - "Правові засади функціонування держави та регулювання бізнесу"
      - "Стилістичні особливості професійного мовлення в різних предметних сферах"
      - "Термінологічна інтерференція: як терміни мігрують між доменами"
      - "Етика професійної комунікації в мультидисциплінарному середовищі"
    key_concepts:
      - "комплексний аналіз"
      - "термінологічна база"
      - "професійна етика"
      - "інтеграція"

