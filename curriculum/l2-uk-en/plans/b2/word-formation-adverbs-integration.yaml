module: b2-053
level: B2
sequence: 53
slug: word-formation-adverbs-integration
version: '2.0'
title: 'Словотворення: прислівники та інтеграція'
subtitle: Творення прислівників від прикметників і повторення словотвірних моделей
focus: grammar
pedagogy: TTT
phase: B2.5
word_target: 4000
objectives:
- Learner can form adverbs from adjectives using Ukrainian patterns
- Learner can distinguish between adverb formation patterns (-о, -е, по-...-ськи)
- Learner can recognize and use diminutives and augmentatives
- Learner can integrate word formation knowledge across noun, adjective, and adverb categories
content_outline:
- section: 'Вступ: Світ українського словотворення (Introduction: The World of Word Formation)'
  words: 500
  points:
  - 'Огляд інтеграції словотвірних моделей: як іменник, прикметник і прислівник утворюють єдину лексичну систему (зв''язок
    з M36)'
  - 'Культурний контекст: емоційна палітра української мови через зменшувально-пестливі форми — від «вороженьки» в гімні до
    дієслівних форм («спатоньки»)'
  - 'Мнемоніка для прислівників: аналіз приказки «Зробиш спішно — вийде смішно» як вступ до вивчення суфікса -о'
- section: 'Від прикметника до прислівника: моделі та акцентологія (From Adjective to Adverb: Patterns and Accentology)'
  words: 1000
  points:
  - 'Три моделі утворення за Державним стандартом (§4.2.10): суфіксальні (-о, -е) та префіксально-суфіксальна (по-...-ськи
    / по-...-ому)'
  - 'Критична увага до зміни наголосу: перехід наголосу з флексії прикметника на корінь прислівника (швидки́й → шви́дко, весе́лий
    → ве́село, холо́дний → хо́лодно)'
  - 'Граматична закономірність: вибір суфікса -е після шиплячих основ (ж, ч, ш, щ) на прикладах «гаряче», «вороже», «терпляче»'
- section: 'Пестливість та звеличення: прагматика суфіксів (Diminutives and Augmentatives: Suffix Pragmatics)'
  words: 900
  points:
  - Функціонування зменшувально-пестливих суфіксів (-ик, -ечк) для вираження емоційної близькості, іронії чи специфічного
    ставлення до об'єкта
  - 'Експресивні можливості збільшувальних суфіксів (-ище): творення форм «вітрище» чи «величезний» для підсилення художнього
    образу'
  - 'Прагматика використання: чітке розрізнення контекстів — від інтимного спілкування до неприпустимості демінутивів у науковому
    стилі'
- section: Словотворення в академічному та науковому контексті (Word Formation in Academic and Scientific Context)
  words: 800
  points:
  - 'Інтеграція термінології (аналіз, синтез, метод) у структуру наукового тексту: взаємодія абстрактних понять зі словотвірними
    парадигмами'
  - 'Стилістичне використання прислівників у науковому регістрі: перехід від описових конструкцій до лаконічних термінологічних
    прислівників'
  - 'Лексична сполучуваність: робота з колокаціями («глибокий аналіз», «базове поняття») та ідіоматикою («мати зелене поняття»)'
- section: Практикум та корекція помилок (Workshop and Error Correction)
  words: 800
  points:
  - 'Корекція типової помилки англомовних учнів: розрізнення прикметника та прислівника в безособових конструкціях («Це важливо»
    vs «Це є важливий»)'
  - 'Словотворчий аналіз тексту: практичні вправи на виокремлення твірного слова та суфікса у похідних формах (синтез знань
    M33-M37)'
  - 'Продуктивне завдання: написання короткого есе у науковому регістрі з використанням засвоєних моделей словотвору'
vocabulary_hints:
