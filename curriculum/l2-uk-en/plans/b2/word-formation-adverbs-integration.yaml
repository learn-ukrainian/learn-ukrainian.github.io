module: b2-053
level: B2
sequence: 53
slug: word-formation-adverbs-integration
version: '1.1'
title: "Словотвір: Прислівники та їхня інтеграція"
subtitle: "Словотвір: прислівники та інтеграція"
focus: vocabulary
pedagogy: PPP
word_target: 4000
objectives:
  - "Опанувати творення прислівників від прикметників за допомогою суфіксів -о, -е."
  - "Вивчити префіксально-суфіксальні моделі творення прислівників (по-нашому, по-людськи,
    втретє)."
  - "Засвоїти правила правопису прислівників: разом, через дефіс та окремо (прислівникові
    сполучення)."
  - "Навчитися інтегрувати прислівники в структуру складного речення для уточнення
    способу, часу та місця дії."
  - "Розрізняти прислівники та однозвучні з ними поєднання прийменників з іменниками."

reading_situations:
  - source_type: "художній опис (пейзаж або портрет)"
    topic: "Аналіз тексту, де прислівники створюють динаміку та емоційну глибину (тихо-тихо,
      навпомацки, зненацька)."
    key_elements: ["прислівники способу дії", "повтори", "правопис дефіса"]
    motivation: "Розуміння стилістичної ролі прислівників у літературі."

listening_situations:
  - media_type: "інтерв'ю"
    setting: "Розмова з експертом про розвиток міської інфраструктури, де вживаються
      прислівники часу та міри."
    focus_points: ["Виявлення прислівників на по-..-ому.", "Розрізнення 'вдень' (прислівник)
          та 'в день' (іменник).", "Сприйняття логічних наголосів."]
    motivation: "Розвиток здатності сприймати точні часові та якісні характеристики
      на слух."

writing_tasks:
  - task_type: "есе"
    prompt: "Напишіть інструкцію-пораду на тему: 'Як ефективно організувати свій робочий
      день?' Використовуйте щонайменше 15 прислівників, утворених різними способами
      (включаючи складні прислівники, що пишуться через дефіс)."
    requirements:
      - "використання моделей по-перше, по-друге"
      - "правильне вживання прислівників часу (щоранку, заздалегідь)"
      - "аргументація з використанням прислівників міри та ступеня (надзвичайно, вкрай)"
      - "мінімум 250 слів"
    motivation: "Практика логічної побудови тексту за допомогою прислівникових маркерів."
    model_answer: "Текст має бути структурованим та порадницьким. Очікуються форми:
      'по-перше', 'щоденно', 'вчасно', 'по-новому'. Автор повинен продемонструвати
      знання правопису складних прислівників. Модельний варіант фокусується на практичності
      порад."

discussion_topics:
  - context: "Світ без прислівників: чи можливо описати дію, не вказуючи, як саме
      вона відбувається?"
    questions:
      - "Які прислівники ви вважаєте найбільш 'українськими' за звучанням (наприклад,
        'залюбки', 'манівцями')?"
      - "Чому правопис прислівників вважається однією з найскладніших тем української
        мови?"
      - "Як часто ви використовуєте прислівники 'по-моєму' або 'по-вашому' в дискусіях?"
    motivation: "Обговорення експресивності та точності мовлення."

content_outline:
  - section: "Морфологічні типи творення прислівників"
    words: 1000
    subsections:
      - "Суфіксальний спосіб: від прикметників (швидко, добре, гаряче)"
      - "Префіксально-суфіксальний спосіб: по-..-ому, по-..-и (по-зимовому, по-братерськи)"
      - "Творення від числівників: вдвічі, втретє, по-перше"
      - "Адвербіалізація іменників та інших частин мови (додому, влітку, мимохіть)"
    key_concepts:
      - "адвербіалізація"
      - "спосіб творення"
      - "морфемний шов"
      - "незмінність"
  - section: "Правопис прислівників: Дефіс та разом"
    words: 1000
    subsections:
      - "Вживання дефіса: повторення слів, моделі з 'по-', частки -будь, -небудь"
      - "Написання разом: поєднання префіксів з різними частинами мови (напам'ять,
        вгору)"
      - "Складні випадки: розрізнення прислівників та прийменниково-іменникових сполучень
        (назустріч vs на зустріч)"
      - "Правопис прислівників з частками 'не' та 'ні'"
    key_concepts:
      - "дефіс"
      - "разом"
      - "омонімія"
      - "орфографічна норма"
  - section: "Розряди прислівників за значенням"
    words: 1000
    subsections:
      - "Прислівники способу дії (як?): старанно, навмисно"
      - "Прислівники часу (коли? відколи?): донині, ввечері, зранку"
      - "Прислівники місця (де? куди?): праворуч, звідусіль, вглиб"
      - "Прислівники міри та ступеня (наскільки?): занадто, трохи, втричі"
    key_concepts:
      - "семантичний розряд"
      - "обставина"
      - "інтенсифікація"
      - "просторові відношення"
  - section: "Синтаксична роль та стилістика прислівників"
    words: 1000
    subsections:
      - "Прислівник як другорядний член речення (обставина)"
      - "Функція вставних слів та сполучних елементів (напевно, отже, втім)"
      - "Використання прислівників для створення текстуальної когезії (зв'язності)"
      - "Порівняння українських прислівників з англійськими -ly adverbs та сталими
        виразами"
    key_concepts:
      - "синтаксичний зв'язок"
      - "когезія"
      - "стилістична фігура"
      - "контекстуальне значення"

vocabulary:
  required:
    - прислівник
    - правопис
    - дефіс
    - обставина
    - ступінь
    - префіксація
    - суфіксація
    - незмінність
  recommended:
    - заздалегідь
    - надзвичайно
    - щоденно
    - навмисно
    - по-особливому
    - всупереч
    - впевнено
    - вкотре

activities:
  types_required:
    - fill-in
    - match-up
    - error-correction
    - select
  min_items_per_type: 10
  total_min_items: 40

activity_hints:
  - type: fill-in
    description: "Form adverbs from adjectives (e.g., тихий→тихо, гарячий→гаряче)"
  - type: select
    description: "Choose the correct adverb form (правильна форма прислівника)"
  - type: error-correction
    description: "Fix adverb formation and spelling errors (разом/окремо/через дефіс)"
  - type: group-sort
    description: "Sort adverbs by formation type: суфіксальний / префіксально-суфіксальний
      / адвербіалізація"

references:
  - "Караман, 10 клас (2018): §55-60 — Словотвір"
  - "Глазова, 11 клас (2019): §17-20 — Морфологічна стилістика"
  - "Авраменко, 11 клас (2019): §15-20 — Морфологічна норма"
  - "State Standard 2024: B2 SS 4.2 (word formation)"

connects_to:
  previous: "word-formation-adjective-formation"
  next: "checkpoint-word-formation"
