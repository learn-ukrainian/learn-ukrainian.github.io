  - синтез (synthesis) — хімічний синтез, синтез мистецтв, аналіз і синтез; логічна опозиція до терміна 'аналіз'
  - дослідження (research) — проводити дослідження (conduct research), наукове дослідження, польове дослідження (field research), об'єкт дослідження
  recommended:
