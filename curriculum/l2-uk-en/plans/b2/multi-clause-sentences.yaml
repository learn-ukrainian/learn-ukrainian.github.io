module: b2-11
level: B2
sequence: 11
slug: multi-clause-sentences
version: '2.0'
title: Багатоскладні речення
content_outline:
- section: Вступ — Багатоскладні речення
  points:
  - Різниця між простими та складними реченнями
  - 'Типи зв''язку в складних реченнях — cultural hook: punctuation as «intonation
    on paper» (e.g., «Стратити не можна помилувати»)'
  - Чому це важливо для вираження складних думок
- section: Складносурядні речення
  points:
  - 'Сполучники і, та, а, але, або, чи — usage note: «та» implies closer connection
    or «and also»'
  - 'Протиставні відношення (а, але, проте) — usage note: «проте» is for formal/literary
    contrast'
  - Розділові відношення (або, чи)
  - Приєднувальні відношення (і, та)
- section: Складнопідрядні речення з одним підрядним
  points:
  - 'Типи підрядних речень (означальні, з''ясувальні, обставинні) — covers State Standard
    types: explanatory, attributive, temporal, causal, conditional, concessive'
  - 'Сполучники та сполучні слова — focus: що/щоб/як vs який/котрий; learner error:
    using «що» instead of «який» in attributive clauses (The «Which» Trap)'
  - Позиція підрядного речення
- section: Складнопідрядні речення з кількома підрядними
  points:
  - 'Послідовне підпорядкування — cultural hook: Mykhailo Stelmakh''s «multi-storey»
    sentences (flow/plinnist)'
  - 'Однорідне підпорядкування — rule: no comma if «і» connects two homogeneous subordinate
    clauses'
  - Неоднорідне підпорядкування
  - Комбіновані типи
- section: Вкладені підрядні речення
  points:
  - Структура вкладених речень
  - 'Обмеження глибини вкладення — warning: avoid overloading with too many «який»
    clauses (train sentences)'
  - 'Стилістичні міркування — cultural hook: Lesya Ukrainka''s dramatic syntax for
    emotional intensity'
- section: Пунктуація у багатоскладних реченнях
  points:
  - Кома між частинами складносурядного речення
  - Кома перед підрядними сполучниками
  - Виділення вставлених підрядних речень
  - 'Типові помилки — learner error: calques like «так як» (use «оскільки») or «дивлячись
    на» (use «залежно від»)'
- section: Практика і підсумок
  points:
  - Побудова складних речень
  - Аналіз структури речень
  - Підготовка до модуля 12
vocabulary_hints:
  required:
  - складносурядне речення (compound sentence)
  - складнопідрядне речення (complex sentence)
  - підрядне речення (subordinate clause)
  - головне речення (main clause)
  - сполучник (conjunction)
  - сполучне слово (relative word)
  - послідовне підпорядкування (sequential subordination)
  - 'однорідне підпорядкування (homogeneous subordination) — rule: comma drop before
    «і»'
  - 'пунктуація (punctuation) — cultural hook: intonation on paper'
  - кома (comma)
  recommended:
  - вкладене речення (embedded clause)
  - синтаксис (syntax)
  - зв'язок (connection)
  - структура (structure)
  - ясність (clarity)
  - проте (however) — formal/literary contrast
  - оскільки (since/as) — formal/causal alternative to «тому що»
  - дарма що (albeit/even though) — expressive/literary concessive
  - який (which) — dominant for attributive clauses
  - котрий (which/who) — used for selection or time
activity_hints:
- type: quiz
  focus: Identify sentence type (compound vs complex)
  items: 15+
- type: fill-in
  focus: Combine simple sentences into complex structures
  items: 12+
- type: fill-in
  focus: Insert appropriate conjunctions
  items: 15+
- type: match-up
  focus: Clause type → example sentence
  items: 12+
- type: error-correction
  focus: Fix punctuation in complex sentences
  items: 12+
- type: essay-response
  focus: Write paragraph using all sentence types
  output: Model answer with structure analysis
focus: grammar
