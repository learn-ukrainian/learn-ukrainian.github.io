module: b2-023
level: B2
sequence: 23
slug: multi-clause-sentences
version: 1.2.1
title: Складні речення з різними видами зв'язку
subtitle: Багатокомпонентні речення з різними видами зв'язку
focus: grammar
pedagogy: PPP
phase: B2.1b [Participles & Register Intro]
word_target: 4000
objectives:
- Розуміти структуру та принципи побудови складних синтаксичних конструкцій з поєднанням сурядності, підрядності та безсполучникового
  зв'язку.
- Досконало володіти пунктуаційними нормами у багатокомпонентних реченнях, включаючи складні випадки на межі сполучників.
- Аналізувати логіко-смислові зв'язки між частинами складних конструкцій у наукових та публіцистичних текстах.
- Будувати розлогі, але синтаксично правильні речення для вираження комплексних думок та аргументів.
- Трансформувати складні конструкції у простіші без втрати змісту для адаптації тексту під різні аудиторії.
reading_situations:
- source_type: філософський есе
  topic: Роздуми про взаємозв'язок свободи та відповідальності в сучасному цифровому світі.
  key_elements:
  - поєднання безсполучникового зв'язку з підрядністю
  - речення з кількома підрядними частинами різних типів (ступенева підпорядкованість)
  - використання тире та крапки з комою для розділення великих смислових блоків
  motivation: Вивчення того, як складна синтаксична ієрархія відображає глибину та багатогранність філософської думки.
listening_situations:
- media_type: лекція
  setting: Університетська лекція з історії українського державотворення.
  focus_points:
  - Сприйняття на слух довгих речень з багатьма компонентами.
  - Визначення головної думки в реченні, що містить кілька вставних конструкцій та підрядних частин.
  - Роль інтонації у розрізненні сурядних та підрядних блоків у спонтанному академічному мовленні.
  motivation: Тренування аналітичного слуху для ефективного конспектування та розуміння комплексних інформаційних повідомлень.
writing_tasks:
- task_type: власне висловлення
  prompt: Напишіть розгорнутий аналіз впливу глобалізації на національну ідентичність. Ваше есе повинно містити щонайменше
    5 речень з різними видами зв'язку (мінімум 4 частини у кожному).
  requirements:
  - мінімум 300 слів
  - 'використати схеми поєднання: [сурядність + підрядність] та [безсполучниковий зв''язок + підрядність]'
  - правильно оформити розділові знаки при збігу сполучників (наприклад, 'що коли', 'і якщо')
  - забезпечити логічну єдність та цілісність тексту
  motivation: Розвиток навичок побудови високорівневих академічних текстів з використанням складного синтаксису.
  model_answer: Текст має демонструвати вміння будувати багатоярусні синтаксичні конструкції, де чітко простежуються причинно-наслідкові
    та логічні зв'язки між усіма компонентами.
discussion_topics:
- context: Чи є складний синтаксис ознакою інтелектуальності автора, чи це лише засіб ускладнення тексту?
  questions:
  - Коли використання багатокомпонентних речень є виправданим, а коли краще розбити їх на прості?
  - Як ви ставитеся до 'стилю Пруста' в українській літературі (наприклад, у творах Оксани Забужко)?
  - Які труднощі виникають у вас при перекладі довгих конструкцій з англійської на українську?
  motivation: Стимулювання критичного мислення щодо доречності використання складних форм у різних комунікативних ситуаціях.
content_outline:
- section: Структурна типологія багатокомпонентних речень
  words: 1000
  subsections:
  - 'Складні речення із сурядним та підрядним зв''язком: комбінації та ієрархія'
  - Поєднання безсполучникового зв'язку з іншими видами (мішаний тип)
  - Логічні блоки у складному реченні та їхні межі
  - Аналіз структурних схем складних синтаксичних цілих
  key_concepts:
  - багатокомпонентне речення
  - мішаний зв'язок
  - синтаксичний блок
- section: Пунктуаційна складність та збіг сполучників
  words: 1000
  subsections:
  - Правило коми при збігу двох сполучників (що коли, і якщо, бо хоч)
  - Вживання крапки з комою у великих складних реченнях для структурування
  - Тире як засіб вираження різкого протиставлення або наслідку у змішаних конструкціях
  - Уникнення пунктуаційних пасток при багатоступеневому підпорядкуванні
  key_concepts:
  - збіг сполучників
  - пунктуаційна норма
  - структурування
- section: Семантико-синтаксичний аналіз
  words: 1000
  subsections:
  - Причинно-наслідкові ланцюжки у складних конструкціях
  - Часові та умовні відношення між різнотипними частинами
  - Вираження допусту та протиставлення в рамках одного складного речення
  - Роль сполучних слів у забезпеченні когезії (зв'язності) тексту
  key_concepts:
  - когезія
  - семантичний зв'язок
  - логічна послідовність
- section: Стилістика та редагування складного синтаксису
  words: 1000
  subsections:
  - Трансформація складних речень у прості (парцеляція та спрощення)
  - 'Ризики двозначності та громіздкості: як зберегти ясність думки'
  - Використання складного синтаксису в офіційному листуванні та юридичних текстах
  - Ритмомелодика довгого речення в ораторському мистецтві
- section: Підсумок — Summary
  words: 300
  points:
  - Review key concepts from this module
  - Self-check questions for the learner
