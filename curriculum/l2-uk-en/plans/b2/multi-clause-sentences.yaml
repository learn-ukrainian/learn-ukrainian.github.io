content_outline:
- section: 'Вступ: Багатоскладні речення (Introduction: Multi-clause Sentences)'
  words: 500
  points:
  - Різниця між простими та складними реченнями; роль багатоскладних структур у вираженні складних думок згідно з вимогами
    Держстандарту §4.3.4 щодо майстерності синтаксису.
  - 'Культурний гачок: Пунктуація як «інтонація на папері»; аналіз класичного прикладу «Стратити не можна помилувати» для
    демонстрації семантичної сили коми.'
  - Огляд типів зв'язку (сурядний та підрядний) як фундаменту для академічного та художнього стилів на рівні B2.
- section: Складносурядні речення та їхні нюанси (Compound Sentences and Their Nuances)
  words: 700
  points:
  - Вживання сполучників і, та, а, але, проте, або, чи; стилістична різниця між нейтральним «і» та сполучником «та», що вказує
    на тісніший зв’язок або додавання.
  - 'Протиставні відношення: використання «проте» для формального/літературного контрасту на противагу нейтральному «але».'
  - 'Правила пунктуації: кома перед сполучниками та виняток для речень зі спільним другорядним членом (shared element rule),
    де кома перед «і» не ставиться.'
- section: Складнопідрядні речення та 'пастка який' (Complex Sentences and the Which Trap)
  words: 800
  points:
  - 'Типи підрядних речень: означальні, з’ясувальні, обставинні (часу, причини, умови, допусту) відповідно до класифікації
    Держстандарту.'
  - Сполучники та сполучні слова (що, щоб, як, який, котрий); аналіз функціональної різниці між «що» та «щоб» (мета/бажання).
  - 'Подолання «The Which Trap»: вживання сполучного слова «який» замість розмовного «що» в означальних підрядних реченнях
    (напр., «Книга, яку я купив»).'
  - 'Регістрова заміна: використання формального «оскільки» замість нейтрального «тому що» та літературного «дарма що» замість
    «хоча».'
- section: Багатоскладні речення з кількома підрядними (Sentences with Multiple Subordinate Clauses)
  words: 800
  points:
  - Послідовне, однорідне та неоднорідне підпорядкування; логіка побудови складних ієрархічних структур.
  - 'Культурний гачок: «Багатоповерхові» речення Михайла Стельмаха (роман «Кров людська — не водиця») як приклад плинності
    (flow) оповіді в українській прозі.'
  - 'Критичне правило пунктуації: відсутність коми перед «і», якщо сполучник з''єднує дві однорідні підрядні частини, що відносяться
    до одного головного речення.'
- section: Вкладені конструкції та стилістична майстерність (Embedded Structures and Stylistic Mastery)
  words: 700
  points:
  - Структура вкладених речень та обмеження глибини вкладення для збереження ясності; техніка уникнення «речень-потягів» (train
    sentences).
  - 'Стилістичний аналіз: драматичний синтаксис Лесі Українки («У пущі») як інструмент передачі емоційної напруги та інтелектуальної
    дискусії.'
  - 'Трансформація: заміна підрядних частин дієприкметниковими або дієприслівниковими зворотами (референс до b2-01) для спрощення
    перевантажених структур.'
- section: Пунктуація, типові помилки та підсумок (Punctuation, Common Errors, and Summary)
  words: 500
  points:
  - 'Виправлення типових кальок: заміна русизму «так як» на нормативне «оскільки» та кальки з англійської «дивлячись на» на
    «залежно від».'
  - 'Комплексний пунктуаційний практикум: коми при вставлених підрядних частинах та на межі різних типів зв’язку.'
  - Підготовка до вивчення вставних слів та речень (b2-12) як засобів модальності у складних синтаксичних конструкціях.
vocabulary_hints:
  required:
  - складносурядне речення (compound sentence) — сполучниковий зв'язок між рівноправними частинами
  - складнопідрядне речення (complex sentence) — ієрархічний зв'язок (головне та підрядне)
  - підрядне речення (subordinate clause) — залежна частина складнопідрядного речення
  - головне речення (main clause) — частина, від якої ставиться питання до підрядної
  - сполучник (conjunction) — і, та (близький зв'язок), а, але, проте (формальний контраст)
  - сполучне слово (relative word) — що, щоб (мета), як, який (означальне), котрий (вибір/час)
  - послідовне підпорядкування (sequential subordination) — ланцюжкова залежність частин
  - однорідне підпорядкування (homogeneous subordination) — декілька підрядних одного типу до одного слова
  - пунктуація (punctuation) — система розділових знаків; 'інтонація на папері'
  - кома (comma) — основний розділовий знак у багатоскладних реченнях
  recommended:
  - вкладене речення (embedded clause) — підрядне речення всередині іншої підрядної частини
  - синтаксис (syntax) — розділ мовознавства, що вивчає структуру речень
  - проте (however) — сполучник для вираження формального або літературного контрасту
  - оскільки (since/as) — високий реєстр; нормативна альтернатива калькованому «так як»
  - дарма що (albeit/even though) — експресивний сполучник допусту для художнього стилю
  - який (which) — домінантне сполучне слово для означальних підрядних частин
  - котрий (which/who) — використовується для вибору з-поміж об'єктів або в часових конструкціях
  - залежно від (depending on) — правильна конструкція замість кальки «дивлячись на»
  - плинність (flow) — стилістична якість мовлення, характерна для прози М. Стельмаха
  - сполучний зв'язок (conjunctive connection) — зв'язок частин за допомогою сполучників
