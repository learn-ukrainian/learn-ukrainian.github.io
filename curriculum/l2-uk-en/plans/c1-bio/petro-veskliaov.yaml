  - дідусь (grandpa)
  - колискова (lullaby)
  - актор (actor)
  - цензура (censorship)
  - малята (little ones/kids)
  recommended:
  - байка (fable)
  - імпровізація (improvisation)
  - екран (screen)
  - покоління (generation)
  - затишок (coziness/comfort)
