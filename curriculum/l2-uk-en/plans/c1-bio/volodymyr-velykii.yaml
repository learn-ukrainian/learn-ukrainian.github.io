module: c1-bio-3
level: C1-BIO
sequence: 3
slug: volodymyr-velykii
version: '2.0'
title: 'Володимир Великий: Хреститель Русі'
content_outline:
- section: 'Вступ: Архітектор цивілізаційного коду'
  points:
  - Трансформація Володимира як ключова точка розлому історії
  - Місце в українському державотворенні та європейському контексті
  - Проблема джерел та 'легендарний' фільтр
- section: 'Походження: Від ''робичича'' до великого стратега'
  points:
  - Статус 'робичича' (сина ключниці Малуші) як виклик і стимул
  - Виховання під наглядом воєводи Добрині
  - 'Новгородський період: перша школа управління'
- section: 'Боротьба за престол: Кривава усобиця Рюриковичів'
  points:
  - Загибель Святослава та початок війни між братами
  - Втеча до Скандинавії та збір варязького війська
  - Захоплення Полоцька (трагедія Рогнеди) та штурм Києва
- section: 'Язичницька реформа: Спроба створення державної віри'
  points:
  - 'Київський пантеон 980 року: політичний підтекст ієрархії богів'
  - Перун як патрон княжої влади
  - Криза ідеології та провал людських жертвоприношень
- section: 'Геополітичний вибір: Тендер світових релігій'
  points:
  - 'Легенда про випробування вір: аналіз прагматичних факторів'
  - Чому було відкинуто іслам, юдаїзм та західне християнство
  - 'Візантійський вектор: естетика, право та імперський статус'
- section: 'Корсунь та Хрещення: Дипломатія примусу до рівності'
  points:
  - Облога Корсуня (Херсонеса) як інструмент тиску на Візантію
  - 'Шлюб з Анною Порфірородною: вхід до світової еліти'
  - 'Події 988 року: повалення ідолів та хрещення киян'
- section: 'Державне будівництво: Змієві вали та власний карб'
  points:
  - 'Змієві Вали: стратегічне значення та технологія будівництва'
  - 'Карбування златників і срібників: акт фінансового суверенітету'
  - 'Тризуб Володимира: народження державного символу'
- section: 'Культурна революція: Десятинна церква та освіта еліт'
  points:
  - 'Будівництво Десятинної церкви: архітектурний та фінансовий центр'
  - 'Заснування шкіл: ''навчання книжне'' як деколонізація неписьменності'
  - Початок літописання та візантійський культурний трансфер
- section: 'Трансформація особистості: Від деспота до милосердного батька'
  points:
  - 'Зміна стилю правління: соціальна опіка та милосердя'
  - Образ 'Красного Сонечка' у народній пам'яті
  - Спроба скасування смертної кари
- section: 'Спадщина: Деколонізація образу та тяглість Тризуба'
  points:
  - Спростування імперських міфів про спадковість Москви
  - Володимир як символ європейського вибору України
  - Канонізація та тяглість ідеї української державності
- section: 'Підсумок: Візіонер руської ойкумени'
  points:
  - Квінтесенція правління Володимира Великого
  - Урок політичного візіонерства для сучасності
vocabulary_hints:
  required:
  - хрещення (baptism/Christianization)
  - язичництво (paganism)
  - хреститель (baptizer)
  - рівноапостольний (equal-to-the-apostles)
  - пантеон (pantheon)
  - ідол (idol)
  - десятина (tithe)
  - усобиця (internecine war)
  - порфірородна (born in the purple)
  - Корсунь (Chersonesus)
  recommended:
  - клятва (oath)
  - святиня (shrine)
  - монастир (monastery)
  - єпископ (bishop)
  - грамота (charter/literacy)
