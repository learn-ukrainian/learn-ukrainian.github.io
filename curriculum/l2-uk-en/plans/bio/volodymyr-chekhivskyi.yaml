content_outline:
- points:
  - 'Провокація: як за неповні сім тижнів на чолі уряду можна ухвалити закон про автокефалію церкви, вести закордонну політику й водночас потрапити в спіраль, що завершилася розстрілом у Сандармосі 1937 року? Як тримати разом державотворення, церкву й терор в одній біографії?'
  - '[!biography] Знайомство з постаттю вчителя, організатора, прем''єра, міністра закордонних справ і церковного інтелектуала, страченого в добу Великого терору.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (державно-церковний профіль): Чехівський — голова Ради народних міністрів УНР за Директорії, міністр закордонних справ і один із ключових мирян-ідеологів української автокефалії, а не примітка до Винниченка чи Петлюри.'
  - 'Позиція 2 (жертва сфабрикованого терору): за УІНП і ЕІУ справа СВУ («Спілка визволення України») — вигадана конструкція ГПУ для показового процесу проти української інтелігенції; звинувачення НІКОЛИ не переказуємо як факт.'
  - '[!decolonization] Ліві погляди Чехівського (аж до готовності до порозуміння з більшовицькою Росією) відрізняємо від прийняття радянського імперського контролю — це українська ліва автономія, а не лояльність Москві.'
  - '[!epistemic-humility] Джерела різняться: кінець урядування — 11 лютого (ЕІУ/IEU) чи зречення 13 лютого 1919 (УІНП); місце смерті — Сандармох (ЕСУ/ЕІУ/УІНП/RFE-RL) проти старішого «Соловків» у IEU. Подаємо з позначками.'
  section: 'Конфліктна карта: Державник, церковник — і жертва терору?'
  words: 900
- points:
  - 'Походження й освіта: 19 липня 1876 року, Горохуватка (нині Київщина), у священничій родині; випускник Київської духовної академії (кандидат богослов''я).'
  - 'Українська соціалістична формація: соціал-демократичні гуртки з 1897 року, РУП (1902–1904), потім УСДРП; політична генерація, що поєднувала національні права, соціальну справедливість і освіту.'
  - 'Імперське поліціювання: обрання до Першої Державної думи 1906 року, річне заслання у Вологду після її розпуску, згодом одеська педагогічна й громадська («Просвіта», громада) праця під поліційним наглядом.'
  section: 'Формування: Учитель, соціаліст і церковний інтелектуал'
  words: 1000
- points:
  - 'Одеса й Центральна Рада 1917 року: редактор «Українського слова», гласний міської думи, голова одеського комітету УСДРП, член Української Центральної Ради — чорноморський, а не лише київський вимір революції.'
  - 'Грудень 1918 року: серед провідників антигетьманського повстання, потім голова Ради народних міністрів і міністр закордонних справ УНР (26 грудня 1918 — 11 лютого 1919 року).'
  - 'Закон 1 січня 1919 року: за ЕІУ, Чехівський — ініціатор закону про автокефалію Української православної церкви; це найсильніший вузол — мова, церква й державне право в межах одного місяця урядування.'
  - 'Політичний кластер січня 1919 року (Злука, українська мова, церковна автокефалія, земельний закон) подаємо як колективні урядові дії Директорії, а не як одноосібне авторство; згодом — праця в УАПЦ разом із митрополитом Василем Липківським.'
  section: 'Діяльність: Уряд Директорії, автокефалія і закордонна політика'
  words: 1300
- points:
  - '[!anti-hagiography] Чехівський — жертва сфабрикованого радянського терору, але його політичні вибори до репресій лишаються дискусійними: він схилявся до порозуміння з більшовицькою Росією й був проти орієнтації на Антанту; це контроверсійна воєнна стратегія, а не моральний ярлик.'
  - 'Рішення залишитися в Радянській Україні після 1920 року не зробило його безпечним: за ЕСУ, він перебував під наглядом ОГПУ через релігійні переконання й діяльність в УАПЦ.'
  - '[!myth-buster] Формулювання про СВУ: безпечна мова — «арештований / підсудний у сфабрикованій справі СВУ», а не «член СВУ»; вигадане обвинувачення не є фактом.'
  - 'Правовий шлях терору (з джерельними позначками): арешт 29 липня 1929 року, вирок Верховного суду УСРР 19 квітня 1930 року — смертна кара, замінена 10 роками; Соловки; рішення особливої трійки НКВС 9 жовтня 1937 року; розстріл 3 листопада 1937 року в Сандармосі.'
  section: 'Тінь: Контроверсійні вибори й радянський терор'
  words: 900
- points:
  - 'Повернення до розминки: чому антиагіографія тут означає тримати разом дві істини — жертву фальсифікованого терору й діяча, чиї передрепресійні політичні вибори можна обговорювати?'
  - 'Сандармох як частина Великого терору проти української еліти: Чехівського вчимо поряд з іншими страченими культурними, церковними й державними діячами, зберігаючи його специфічний державно-церковний профіль.'
  - '[!epistemic-humility] Реабілітація 1989 року виправила правовий статус, але не скасувала розстрілу, знищення архівів і радянського стирання; це не «закриття справи».'
  - 'Пам''ять і джерела: двогривнева монета НБУ 2006 року з портретом Чехівського — це пам''яттєвий артефакт, а не історичне джерело; його пастирсько-політичну працю («За Церкву, Христову громаду, проти царства тьми», 1922) читаємо як свідчення з контекстом.'
  section: 'Дискусія та підсумок: Держава, церква й пам''ять про терор'
  words: 700
focus: Volodymyr Chekhivskyi (1876-1937) as head of the Council of People's Ministers and foreign minister of the UNR Directory, a lay ideologue of Ukrainian church autocephaly, and a victim of the fabricated SVU show trial executed at Sandarmokh, taught so that state-building, church, and Soviet terror are held together; the SVU accusation is never repeated as fact, the death place (corrected Sandarmokh vs older Solovets) and office end-date drift are source-labeled, his contested pro-Bolshevik-negotiation and anti-Entente choices stay debatable rather than flattened into martyr-only memory, and the 1989 rehabilitation is framed as legal correction, not closure.
