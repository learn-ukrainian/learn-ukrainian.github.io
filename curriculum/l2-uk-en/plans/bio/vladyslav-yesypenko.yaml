content_outline:
- points:
  - >-
    [!biography] Владислав Єсипенко — український журналіст, фрілансер проєкту "Крим.Реалії"
    (Радіо Свобода), який документував життя в окупованому Криму.
  - >-
    Його робота вимагала присутності на півострові: записувати інтерв'ю, знімати реалії,
    показувати те, що приховує окупаційна пропаганда.
  section: Розминка
  words: 400
- points:
  - >-
    Діяльність до 2021 року: співпраця з незалежними медіа. Важливість локального
    репортажу для протидії російській дезінформації в Криму.
  - >-
    Ризики професії: журналіст як мішень для ФСБ, оскільки незалежне спостереження
    на окупованій території саме по собі є караним.
  - >-
    [!decolonization] Окупований Крим не є закритою "російською" територією: робота
    Єсипенка доводила наявність українського контексту та спротиву.
  section: 'Діяльність: Журналістика в окупованому Криму'
  words: 1000
- points:
  - >-
    [!anti-hagiography] Арешт 10 березня 2021 року: ФСБ затримує Єсипенка, звинувачуючи
    його у "шпигунстві" та зберіганні вибухівки (гранати).
  - >-
    Механізм репресій: застосування тортур електричним струмом для вибивання фальшивого
    зізнання ("хлопці, зупиніться, і я підпишу все").
  - >-
    Сфабрикований суд: ігнорування судом відсутності відбитків пальців на вибухівці.
    Вирок — ув'язнення у колонії як покарання за журналістику.
  section: 'Тінь: Арешт, тортури та окупаційний суд'
  words: 1600
- points:
  - >-
    Боротьба за звільнення: адвокація родини (дружина Катерина), PEN-клуб, "Радіо Свобода"
    та правозахисні організації. Листи з-за ґрат.
  - >-
    Міжнародне визнання: нагородження премією PEN/Barbey Freedom to Write Award у 2022 році
    за мужність у журналістиці.
  - >-
    [!myth-buster] Звільнення: понад чотири роки полону завершуються 20 червня 2025 року.
    Цей факт розвінчує міф про "законність" вироку та підкреслює статус політв'язня.
  section: 'Голос з-за ґрат та звільнення'
  words: 1200
- points:
  - >-
    Після звільнення: свідчення Єсипенка про тортури та умови утримання політв'язнів
    в російських колоніях.
  - >-
    Значення його справи: нагадування про ціну свободи слова та необхідність постійної
    підтримки тих, хто залишається в полоні.
  - >-
    Підсумок: Владислав Єсипенко як символ незламної кримської журналістики та свідок
    злочинів окупаційної судової системи.
  section: 'Підсумок: Свідок окупаційного правосуддя'
  words: 1000
