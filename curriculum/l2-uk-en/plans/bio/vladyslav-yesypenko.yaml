content_outline:
- points:
  - >-
    [!biography] Знайомство з Владиславом Єсипенком: український журналіст, фрилансер
    проєкту Крим.Реалії (Радіо Свобода), який працював у надзвичайно складних умовах.
  - >-
    Провокаційне питання: чому звичайна журналістська робота в окупованому Криму
    прирівнюється до злочину?
  section: Розминка
  words: 400
- points:
  - >-
    Робота на Крим.Реалії: репортажі та відеоматеріали з окупованого півострова до 2021 року.
  - >-
    [!decolonization] Руйнування російського наративу про "мирний Крим": важливість
    місцевих журналістів для фіксації реального життя та репресій проти населення.
  - >-
    Затримання 10 березня 2021 року ФСБ під час робочої поїздки: як спостереження
    стало приводом для арешту.
  section: 'Журналістика як мішень: Робота в окупації'
  words: 1000
- points:
  - >-
    Механізм окупаційного правосуддя: звинувачення у зборі розвідувальної інформації
    та зберіганні вибухівки. Відсутність відбитків пальців на підкинутій гранаті.
  - >-
    [!anti-hagiography] Свідчення про тортури: використання електричного струму та
    побиття для отримання примусового "зізнання".
  - >-
    Судовий процес: мужня відмова Єсипенка від вибитих свідчень у суді та розповідь
    про методи ФСБ. Вирок: шість років колонії (згодом зменшено до п'яти).
  section: 'Арешт та фабрикація: Механізм репресій'
  words: 1200
- points:
  - >-
    Тюремні роки: листи з-за ґрат, адвокація родини (зокрема дружини Катерини) та
    міжнародної спільноти (PEN, RSF).
  - >-
    Звільнення 20 червня 2025 року: повернення з російського ув'язнення після понад
    чотирьох років за сфабрикованою справою.
  - >-
    Після звільнення: інтерв'ю та свідчення Єсипенка як доказова база проти російських
    методів тортур та придушення свободи преси.
  section: 'Спротив та воля: Свідчення після звільнення'
  words: 1600
- points:
  - >-
    Сучасне значення: справа Єсипенка як приклад цілеспрямованого знищення незалежної
    журналістики в окупованому Криму.
  - >-
    Вплив на міжнародну спільноту: фіксація воєнних злочинів та значення підтримки
    політичних в'язнів.
  section: 'Підсумок: Ціна правди про Крим'
  words: 1000
focus: >-
