content_outline:
- points:
  - >-
    [!biography] Знайомство з Владиславом Єсипенком: український журналіст,
    фрілансер проєкту "Крим.Реалії" (Радіо Свобода), колишній політичний в'язень.
  - >-
    Провокаційне питання: чому незалежний репортер стає головною мішенню
    для репресивної машини в окупованому Криму?
  section: Розминка
  words: 400
- points:
  - >-
    Робота в Криму: документування життя на півострові після окупації 2014 року.
    Збір відеоматеріалів та інтерв'ю з місцевими мешканцями.
  - >-
    [!decolonization] Протидія пропаганді: важливість журналістики "на місці"
    для збереження зв'язку між окупованими територіями та материковою Україною.
  - >-
    Ризики професії: відстеження та переслідування незалежних голосів
    російськими спецслужбами.
  section: 'Діяльність: Журналістика в окупованому Криму'
  words: 1000
- points:
  - >-
    Затримання: арешт співробітниками ФСБ 10 березня 2021 року.
    Абсурдні звинувачення у збиранні розвідувальної інформації та зберіганні вибухівки.
  - >-
    Механізм фабрикації: застосування тортур електричним струмом для отримання
    фальшивих зізнань. Відсутність відбитків пальців на "доказах".
  - >-
    [!anti-hagiography] Заява в суді: відмова Єсипенка від вибитих свідчень.
    Публічне розкриття методів ФСБ та демонстрація сили духу перед окупаційним судом.
  section: 'Полон: Сфабрикована справа та суд'
  words: 1600
- points:
  - >-
    Боротьба за свободу: адвокаційна кампанія родини (дружина Катерина Єсипенко),
    Радіо Свобода та міжнародних правозахисних організацій.
  - >-
    Листи з-за ґрат: тюремні тексти як форма збереження професійної ідентичності
    та зв'язку з вільним світом.
  - >-
    [!epistemic-humility] Звільнення: обмін у червні 2025 року. Значення підтримки
    для політичних в'язнів та важливість фіксації свідчень після звільнення.
  section: 'Свідчення: Листи з колонії та адвокація'
  words: 1200
- points:
  - >-
    Сучасне значення: Владислав Єсипенко як символ незламності української
    журналістики та ціни свободи слова.
  - >-
    Підсумок: уроки кримського спротиву та необхідність міжнародного тиску
    для звільнення бранців Кремля.
  section: 'Сучасний етап: Ціна вільного слова'
  words: 1000
