content_outline:
- points:
  - >-
    [!biography] Володимир Рутківський: поет, журналіст, прозаїк і автор
    підліткової історичної пригоди, через якого «Джури», «Сторожова застава»,
    «Сині води» і «Потерчата» стали важливими для читання після незалежності.
  - >-
    Провокаційне питання: чому письменник, відомий козацькою пригодою, потребує
    початку не з героїки, а з воєнного дитячого страху?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 18 квітня 1937 року в Хрестителевому на Черкащині. Раннє дитинство
    припало на війну, голод, смерть, страх і безпорадність, які згодом увійшли
    до автобіографічної прози «Потерчата».
  - >-
    Освіта в Одеському політехнічному інституті, робота на суперфосфатному
    заводі, в обласному радіо і телебаченні, на Одеській кіностудії, у пресі та
    письменницьких організаціях. Його шлях до дитячої прози проходив через
    технічну освіту, журналістику, кіно і поезію.
  - >-
    [!epistemic-humility] «Потерчата» треба читати як автобіографічне свідчення
    дитини війни, а не як прикрасу до майбутніх героїчних сюжетів. Саме там
    видно етичний нерв: вижити і не втратити людяність.
  section: 'Формування: Воєнне дитинство, Одеса і шлях до письма'
  words: 1000
- points:
  - >-
    Ранні поетичні збірки і дитячі тексти поступово вивели Рутківського до
    пригодницької, історико-фантастичної та підліткової прози.
  - >-
    «Сторожова застава»: історія, що від журнальної появи 1991 року й книжкового
    видання 2001 року дійшла до широкої видимості через екранізацію 2017 року.
    Сучасний школяр у Київській Русі змінює спосіб читати княжу добу.
  - >-
    «Сині води» розширюють історичну уяву за межі козацького сюжету: чотирнадцяте
    століття, прикордоння і пам'ять про державність стають матеріалом для
    підліткового й дорослого читання.
  - >-
    «Джури» — «Джури козака Швайки», «Джури-характерники», «Джури і підводний
    човен» — дали читачам козацьку пригоду з дитячим поглядом, страхом, гумором,
    побратимством і відповідальністю.
  section: 'Діяльність: Джури, Київська Русь і історія як підліткова пригода'
  words: 1300
- points:
  - >-
    [!anti-hagiography] Рутківський не був підпільним дисидентом і не має
    джерельно засвідченого арешту, табору чи названої справи КДБ. Його біографія
    — це публікаційний тиск і запізніле визнання.
  - >-
    Дитячі джерела фіксують, що в радянський час його не раз звинувачували в
    українському націоналізмі, а українськомовні публікації відхиляли, тоді як
    російські переклади могли виходити в Москві.
  - >-
    Інституційна неоднозначність важлива: він працював у радянських установах,
    навчався на Вищих літературних курсах у Москві, друкувався, але українська
    історична уява не знаходила для себе простого місця в українському друці.
  - >-
    [!myth-buster] «Джури» не можна викладати як чисту козацьку героїзацію.
    Потрібно питати, що пригодницька форма спрощує: насильство, образ татар і
    степу, гендерні ролі, соціальну складність і межу між історією та легендою.
  section: 'Тінь: Українська публікація, звинувачення в націоналізмі і пізнє визнання'
  words: 1500
- points:
  - >-
    Після незалежності Рутківський отримав головне визнання: «Сині води», «Джури»,
    Шевченківська премія 2012 року і місце в сучасній дитячій книжковій культурі.
  - >-
    Він використав відсотки з грошової частини Шевченківської премії для заснування
    приватної дитячої літературної відзнаки «Джури». Це перетворює премію з
    особистої нагороди на інфраструктуру для інших авторів.
  - >-
    [!decolonization] Рутківський важливий не як плакат героїзму, а як автор,
    який довірив підліткам складні історичні світи: небезпеку, страх, жарт,
    лояльність, вибір і право бачити українське минуле як власну пригоду.
  section: 'Підсумок: Пізній канон і дитяча історична пам''ять'
  words: 1000
focus: >-
  Володимир Рутківський як автор дитячої та підліткової історичної прози, що
  поєднав воєнну пам'ять «Потерчат», козацьку пригоду «Джур», Київську Русь
  «Сторожової застави» і постнезалежне відновлення українського книжкового
  простору. Семінар тримає разом публікаційний тиск, пізнє визнання і
  антиагіографічне читання історичної пригоди.
