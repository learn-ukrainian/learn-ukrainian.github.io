objectives:
- >-
  Аналізувати «Потерчат» як ключ до людського виміру Рутківського перед
  козацькими й княжими пригодницькими сюжетами.
- >-
  Пояснювати, як «Джури», «Сторожова застава» і «Сині води» працюють із
  історичною пам'яттю для підліткового читача.
- >-
  Розрізняти публікаційний тиск, звинувачення в українському націоналізмі і
  неприпустиму вигадку про арешт чи табірну біографію.
- >-
  Критично оцінювати козацьку героїзацію, образ степу, історичну фантастику і
  постнезалежне визнання дитячої літератури.
