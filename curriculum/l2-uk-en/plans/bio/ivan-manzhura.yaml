content_outline:
- points:
  - >-
    [!biography] Знайомство з Іваном Манжурою (псевдонім Іван Калічка): поет,
    збирач фольклору, етнограф, журналіст, лексикограф, перекладач і автор
    степової лірики.
  - >-
    Провокаційне питання: чому постать, що зберегла південно-східну говірку в
    ліриці, часто зводиться лише до «регіонального збирача»?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 1 листопада 1851 року (20 жовтня за старим стилем) в Харкові;
    смерть 15 травня 1893 року (3 травня за старим стилем) в Катеринославі
    (тепер Дніпро).
  - >-
    Раннє сирітство; виховання в родині тітки, одруженої з Олександром Потебнею;
    навчання в харківській гімназії за казенний кошт.
  - >-
    Виключення з шостого класу гімназії за непокірність; після вступу 1870 року
    до Харківського ветеринарного інституту — виключення як «неблагонадійного».
  section: 'Формування: Сирітство, Потебня, виключення'
  words: 1000
- points:
  - >-
    Збірка *Степові думи та співи* (1889) — центральна поетична книга; у
    довідниках трапляються варіанти порядку слів у назві та складнощі
    посмертних видань.
  - >-
    Лірика збірки: «Дума», «На пасіці», «Розкіш-доля», «На добрій ниві»,
    «Бурлака», «Босяцька пісня»; назви й склад звіряти за бібліотечним змістом.
  - >-
    Наративні та фольклорні тексти: «Нечесна», «Бурлакова могила», «Бурлака»,
    *Тремсин-богатир* (назва в ЕІУ) та *Іван Голик*.
  - >-
    Стилістика: звертання, зменшувальні форми, ритм народної пісні; лексика
    `дума`, `муза`, `недоля`, `бурлака`, `пасіка`, `степ`, `говірка`.
  - >-
    [!decolonization] Південно-східні говіркові риси — свідчення української
    мови, а не «дефект» для вправ; позначати їх як регіональний регістр.
  section: 'Діяльність: Степові думи та співи'
  words: 1200
- points:
  - >-
    [!anti-hagiography] У досьє немає номера поліцейської чи цензурної справи —
    тиск проявлявся через виключення з навчальних закладів і обмежені умови
    публікації, а не через задокументоване ув'язнення.
  - >-
    Механізм: адміністрації харківської гімназії та Харківського ветеринарного
    інституту під Російською імперією; мітка «неблагонадійний» як форма
    політичного маркування.
  - >-
    Ширший контекст імперської цензури україномовних видань — без приписування
    Манжурі конкретного наказу, якого джерела не містять.
  - >-
    Життя після виключень: матеріальна нестабільність, збирання фольклору,
    обмежені друкарські можливості.
  - >-
    [!epistemic-humility] Точні дати наказів про виключення в досьє не знайдені;
    не доповнювати прогалини вигаданими архівними номерами.
  section: 'Тінь: Виключення й «неблагонадійність»'
  words: 1600
- points:
  - >-
    Що збереглося: вірші, оповідання, етнографічні записи в опублікованих і
    посмертних формах; що не знайдено — документи про виключення та цензурні
    справи.
  - >-
    Сучасна актуальність: Манжура як автор, який легітимізував степову говірку
    в українській поезії XIX століття.
  - >-
    Кінцеве питання: як читати його лірику сьогодні — як «регіональний додаток»
    чи як повноцінний голос української літератури?
  section: 'Підсумок: Голос степової лірики'
  words: 1000
focus: >-
  Іван Манжура як поет, етнограф і збирач фольклору південно-східного регістру:
  освітні виключення, цензурована прижиттєва збірка й межі джерел без вигаданого
  арешту або поліцейської справи.
level: BIO
module: bio-219
objectives:
- >-
  Аналізувати збірку *Степові думи та співи* (1889) та роль південно-східної
  говірки в українській ліриці.
- >-
  Пояснювати механізм непрямого інституційного тиску через виключення з
  гімназії та ветеринарного інституту.
- >-
  Відмовлятися від вигаданих поліцейських або цензурних номерів справ там, де
  досьє їх не містить.
- >-
  Оцінювати багатогранний профіль Манжури — поета, етнографа, журналіста,
  лексикографа — поза спрощеним образом «регіонального збирача».
