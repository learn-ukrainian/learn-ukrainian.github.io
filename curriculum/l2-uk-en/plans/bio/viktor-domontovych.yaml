objectives:
- Описувати життєвий шлях Віктора Петрова від ВУАН і неокласичного оточення до мюнхенської еміграції та київського археолога.
- Аналізувати прозу Домонтовича через іронію, ненадійного оповідача та образ «нової жінки».
- Відокремлювати документовані факти (НКВС 1938, повернення, орден 1965) від припущень щодо розвідки.
- Дискутувати, як читати спадщину постаті з відкритим досьє, не зводячи її до «зрадника» чи «мученика».
