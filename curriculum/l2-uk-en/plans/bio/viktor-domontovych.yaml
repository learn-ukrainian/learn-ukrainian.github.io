content_outline:
- points:
  - >-
    [!biography] Знайомство з Віктором Платоновичем Петровим (**В. Домонтович**): засновник
    українського інтелектуального роману, романізованої біографії, археолог і постать із
    **відкритим** історіографічним питанням — зникнення в Мюнхені (1949) і повернення в СРСР.
  - >-
    Провокаційне питання: як автор *Дівчини з ведмедиком* і *Без ґрунту* міг бути водночас
    співзасновником МУР і фігурою, щодо якої діаспора «мусила визнати шпигунство»?
  section: Розминка
  words: 400
- points:
  - >-
    Походження: **22 жовтня 1894** (у джерелах також 10 жовтня — календарна розбіжність, не
    згладжуємо), Катеринослав (тепер Дніпро); син священика Платона Петрова; освіта в Одесі,
    Холмі; **1918** — срібний медальний диплом Київського університету (тема — Язиков).
  - >-
    ВУАН з **1920**: співредактор *Етнографічного вісника*; проза 1928–1930 — *Дівчина з ведмедиком*,
    *Аліна й Костомаров*, *Романи Куліша*.
  - >-
    **8–21 червня 1938** — арешт НКВС і звільнення на тлі терору, що вже знищив Зерова (1937)
    і Драй-Хмару (1939).
  - >-
    Відхід на захід (**1944** за ЕІУ; архів деталізує евакуацію через Уфу, Харків 1942, Мюнхен):
    Український науковий інститут у Берліні, Вільний університет у Мюнхені, **МУР** (вересень 1945).
  section: 'Формування: Від ВУАН до Мюнхена'
  words: 1000
- points:
  - >-
    Проза Домонтовича: іронія, ненадійний оповідач (хімік Іполіт Варецький), «нова жінка» Зіна
    Тихменьова; емігрантські видання *Доктор Серафікус* (Мюнхен, 1947), *Без ґрунту* (Регенсбург, 1948).
  - >-
    Наука (В. Петров / В. Бер): робота з рукописом Коменського в Галле; *Підсічне землеробство*,
    *Скіфи. Мова і етнос* (1968), посмертно *Етногенез слов'ян* (1972).
  - >-
    **1957** — шлюб із Софією Зеровою, вдовою страченого неокласика Миколи Зерова — місток між
    знищеним «ґроном» і пізнім радянським життям.
  - >-
    [!decolonization] Українська мова й інтелектуальна проза — те, що радянська культурна політика
    не могла прийняти; емігрантський друк — єдиний шлях для головних романів.
  section: 'Діяльність: «Дівчина з ведмедиком» і романізована біографія'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Не «просто мученик діаспори»: **18 квітня 1949** — зникнення з мюнхенської
    квартири; з **1950** (жовтень) — робота в Москві, з **1956** — Інститут археології в Києві;
    **8 червня 1969** — смерть у Києві під радянським правлінням.
  - >-
    Документоване (архів Інституту археології НАНУ; ЕІУ): після війни Петров **не приховував**
    участі в радянській розвідці; **1965** — орден Вітчизняної війни I ступеня «за діяльність
    під час Другої світової війни».
  - >-
    [!epistemic-humility] Припущене / суперечливе: чи вербували під час **тринадцятиденного** арешту
    1938 — «деякі дослідники вважають» (архів); кличка «Іванов», мюнхенські донесення — **T5,
    файл закритий**; оцінка Шевелова: до Москви про їхнє коло «не передав», але діаспора «мусила
    визнати шпигунство».
  - >-
    Чесна позиція модуля: не виправдовувати, не засуджувати як вирок — відокремлювати **документ**
    від **гіпотези**; не стирати літературний внесок і не романтизувати повернення.
  section: 'Тінь: Зникнення в Мюнхені та спірне повернення'
  words: 1600
- points:
  - >-
    Спадщина: цифровий архів Петрова–Домонтовича (колекція № 16, передано вдовою); повернення
    прози в незалежній Україні; літературні модулі про інтелектуалів і *Доктора Серафікуса*.
  - >-
    Зв'язок із Зеровим і Драй-Хмарою — покоління, знищене терором; Петров — виняток із іншою
    траєкторією, не з іншої планети.
  - >-
    Кінцеве питання: як інтегрувати складну постать у національний пантеон без радянського
    прального циклу й без діаспорного «суду без архіву»?
  section: 'Підсумок: Інтелектуальний роман і відкрите досьє'
  words: 1000
