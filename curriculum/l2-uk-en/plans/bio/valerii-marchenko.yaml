objectives:
- Прослідкувати біографію Марченка — філолог, перекладач, правозахисник — без прийняття радянських ярликів.
- Розуміти механізми репресій: ст. 62, повторний вирок, відмова у медичному звільненні.
- Аналізувати первинні формулювання — «найсвіжіший Валуєвський указ», «Царина Духа...» — у контексті мовної політики.
- Оцінити епістемічну невизначеність дати смерті та збереження самвидавної спадщини.
