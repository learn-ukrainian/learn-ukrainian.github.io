content_outline:
- points:
  - >-
    [!biography] Знайомство з Валерієм Веніаміновичем Марченком: філолог, перекладач,
    журналіст, правозахисник; син Ніни Марченко й онук Михайла Марченка.
  - >-
    Провокаційне питання: чому людину з тяжкою нирковою хворобою знову засудили до табору
    особливого режиму?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 16 вересня 1947 року в Києві; закінчення філологічного факультету Київського
    державного університету; стажування в Азербайджанському університеті в Баку;
    переклади з азербайджанської та польської.
  - >-
    Самвидавні есеї *Київський діалог*, *За параваном ідейності*, *Страшний якийсь тягар*;
    розповсюдження й читання І. Дзюби *Інтернаціоналізм чи русифікація?*
  - >-
    [!decolonization] Радянські ярлики «антирадянський» і «націоналістичний» — механізм
    криміналізації, а не надійний опис мотивів автора.
  section: 'Формування: Філолог, перекладач і самвидав'
  words: 1000
- points:
  - >-
    Після першого ув'язнення — повернення до Києва, нариси про Миколу Гулака та
    Києво-Печерську лавру, інтерв'ю з Борисом Антоненком-Давидовичем і Надією Суровцовою.
  - >-
    Критика наказу 1983 року про посилення російської мови в українських школах;
    ЕСУ наводить власну фразу Марченка «Надсилаю свіженький валуєвський указ...».
    Її подають лише як атрибутоване формулювання Марченка у вторинному джерелі.
    Канонічна назва розпорядження 1863 року — Валуєвський циркуляр; його не змішують
    з Емським указом 1876 року.
  - >-
    Переклади та літературознавча робота — не зводити біографію лише до одного арешту.
  section: 'Діяльність: Есеї, переклади та мовна політика'
  words: 1200
- points:
  - >-
    Перший арешт 25 червня 1973 року; вирок 29 грудня 1973 року за ст. 62 ч. 1 — 6 років
    таборів суворого режиму і 2 роки заслання.
  - >-
    Другий арешт 21 жовтня 1983 року; саме тоді, за ЕСУ, Марченко став членом УГГ;
    суд 13 березня 1984 року — 10 років табору особливого режиму і 5 років заслання
    як особливо небезпечного рецидивіста.
  - >-
    [!anti-hagiography] Тяжка ниркова хвороба; медичні органи визнали хворобу невиліковною
    і рекомендували звільнення — КДБ не дозволив; смерть у ленінградській тюремній лікарні
    на початку жовтня 1984 року.
  - >-
    [!epistemic-humility] ЕСУ подає дату смерті 7 жовтня 1984 року; КХПГ позначає
    цю дату як приблизну. Точний лікарняний документ у відкритому пакеті відсутній,
    тому невизначеність музейного свідчення не замовчують.
  section: 'Тінь: Другий арешт, відмова у звільненні та смерть у неволі'
  words: 1600
- points:
  - >-
    ЕСУ перелічує посмертне видання *Вірити і тільки* (2005); без тексту видання
    його зміст і жанровий склад не характеризують.
  - >-
    Збереження самвидавних текстів через родину й мережі дисидентів; багато шляхів рукописів
    потребують подальшого джерелознавства.
  - >-
    [!myth-buster] Смерть у таборі не повинна затуляти перекладацьку й літературознавчу
    ідентичність Марченка.
  section: 'Підсумок: Мова, совість і медичний примус системи'
  words: 1000
focus: >-
  Валерій Марченко — філолог, перекладач і правозахисник, чиє друге ув'язнення завершилося
  смертю в радянській тюремній лікарні після відмови у рекомендованому медиками звільненні.
  Аналіз самвидавних есеїв, мовної політики, пізнього вступу до УГГ та механізму
  медичного примусу.
