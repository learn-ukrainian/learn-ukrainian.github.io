content_outline:
- points:
  - >-
    [!biography] Знайомство з Валерієм Веніаміновичем Марченком: філолог, перекладач,
    журналіст, правозахисник; онук історика Михайла Марченка; син української мовознавиці
    Ніни Марченко.
  - >-
    Провокаційне питання: чому людину з тяжкою нирковою хворобою знову засудили до табору
    особливого режиму?
  section: Розминка
  words: 400
- points:
  - >-
    Народження 16 вересня 1947 року в Києві; закінчення філологічного факультету Київського
    державного університету; зовнішнє навчання тюркських мов у Бакинському університеті;
    переклади з азербайджанської та польської.
  - >-
    Самвидавні есеї *Київський діалог*, *За параваном ідейності*, *Страшний якийсь тягар*;
    розповсюдження й читання І. Дзюби *Інтернаціоналізм чи русифікація?*
  - >-
    [!decolonization] Радянські ярлики «антирадянський» і «націоналістичний» — механізм
    криміналізації, а не надійний опис мотивів автора.
  section: 'Формування: Філолог, перекладач і самвидав'
  words: 1000
- points:
  - >-
    Співскладення московського звіту Гельсінської групи «On the position of prisoners
    in the labour camps of the USSR», Document No. 87 (1979).
  - >-
    Критика російськомовної шкільної політики 1983 року — образ «найсвіжішого Валуєвського
    указу» (за Вікіпедією).
  - >-
    Переклади та літературознавча робота — не зводити біографію лише до одного арешту.
  section: 'Діяльність: Есеї, переклади та гельсінський моніторинг'
  words: 1200
- points:
  - >-
    Перший арешт 25 червня 1973 року; вирок 29 грудня 1973 року за ст. 62 ч. 1 — 6 років
    таборів суворого режиму і 2 роки заслання.
  - >-
    Другий арешт 21 жовтня 1983 року; суд 13–14 березня 1984 року — 10 років табору
    особливого режиму і 5 років заслання як особливо небезпечного рецидивіста.
  - >-
    [!anti-hagiography] Тяжка ниркова хвороба; медичні органи визнали хворобу невиліковною
    і рекомендували звільнення — КДБ не дозволив; смерть у ленінградській тюремній лікарні
    на початку жовтня 1984 року.
  - >-
    [!epistemic-humility] Розбіжність дат смерті: KHPG і лід Вікіпедії — 7 жовтня 1984;
    тіло статті Вікіпедії згадує також 5 жовтня; точний лікарняний документ у джерелах
    не знайдено.
  section: 'Тінь: Другий арешт, відмова у звільненні та смерть у неволі'
  words: 1600
- points:
  - >-
    Посмертна збірка *Вірити і тільки* (2005) — духовно-християнські есеї (KHPG про
    Ніну Марченко).
  - >-
    Збереження самвидавних текстів через родину й мережі дисидентів; багато шляхів рукописів
    потребують подальшого джерелознавства.
  - >-
    [!myth-buster] Смерть у таборі не повинна затуляти перекладацьку й літературознавчу
    ідентичність Марченка.
  section: 'Підсумок: Мова, совість і медичний примус системи'
  words: 1000
focus: >-
  Валерій Марченко — філолог, перекладач і правозахисник, чиє друге ув'язнення завершилося
  смертю від невиліковної хвороби в радянській тюремній лікарні після відмови у звільненні.
  Аналіз самвидавних есеїв, гельсінського моніторингу та механізму медичного примусу.
