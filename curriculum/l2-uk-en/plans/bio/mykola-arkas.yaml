content_outline:
- points:
  - 'Провокація: як людина з високої імперської військово-морської родини Миколаєва стала автором української опери, популярної історії та організатором міської «Просвіти» — і чому саме цензура, а не слава, супроводжувала цю працю?'
  - '[!biography] Знайомство з постаттю композитора-аматора, популярного історика й мецената: автор опери «Катерина», книжки «Історія України-Русі» й голова миколаївської «Просвіти» (1907-1909).'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (публічна вага): «Історія України-Русі» — перший багато ілюстрований історичний нарис українською мовою, що довго був «загальнонародним підручником» і зробив історію читабельною.'
  - 'Позиція 2 (джерельна тверезість): ЕСУ й IEU прямо називають Аркаса істориком-аматором; вага книжки — у доступності й пробудженні, а не в перевазі над професійним синтезом Грушевського.'
  - '[!decolonization] Механізм тиску — імперське обмеження української публічної культури: цензура опери, закриття школи, нагляд і межі «Просвіти», а не кримінальна справа.'
  - '[!epistemic-humility] Дати «Катерини» тримаємо окремо: написання й лібрето, перший клавір (Миколаїв, 1897), сценічна прем''єра (Москва, 1899) — це різні події, а не одна.'
  section: 'Конфліктна карта: Аматор чи будівничий культури?'
  words: 900
- points:
  - 'Походження й освіта: 26 грудня 1852 / 7 січня 1853 року, Миколаїв; батько — головний командир Чорноморського флоту адмірал Микола Аркас; випускник природничого відділу фізико-математичного факультету Новоросійського університету в Одесі (1875).'
  - 'Музична формація: за ЕСУ, професійної музичної освіти не мав; наставником був Петро Ніщинський — тож формула «композитор-аматор / фольклорист / діяч національного театру», а не консерваторський професіонал.'
  - '[!decolonization] Збирання й обробки українських народних пісень (близько 80 записів) читаємо як національну культурну працю, а не як «малоросійську» етнографію; частину архіву згодом утрачено.'
  section: 'Формування: Миколаївська родина, музика й історія'
  words: 1000
- points:
  - Опера «Катерина» (1891) з лібрето самого Аркаса за поемою Шевченка; клавір уперше надруковано власним коштом у Миколаєві 1897 року, сценічна прем'єра — 1899 року в Москві трупою Марка Кропивницького.
  - '«Історія України-Русі» (Санкт-Петербург, 1908): багато ілюстрований популярний нарис українською мовою; посмертне друге видання — Краків, 1912, коштом Ольги Аркасової, за редакційної праці Василя Доманицького й Богдана Лепкого.'
  - 'Миколаївська «Просвіта» (1907-1909): за архівними матеріалами й звітами товариства — секції літератури, музики й мистецтва, бібліотека-книгарня та економічна секція, лекції, літературно-музичні вечори, шевченківські вшанування.'
  - '[!decolonization] «Просвіту», українську школу й видання читаємо як інфраструктуру нації під цензурою, а не як приватне хобі заможної людини; праця постійно натрапляла на межі політичних умов доби.'
  - '[!anti-hagiography] Друк книжки, утримання української школи й підтримка «Просвіти» вичерпували ресурси Аркаса — це осторога про громадянське меценатство, а не сюжет «держава його вбила».'
  section: 'Діяльність: «Катерина», «Історія України-Русі» й «Просвіта»'
  words: 1300
- points:
  - '[!anti-hagiography] ЕСУ фіксує негативну оцінку Михайла Грушевського й ширшу дискусію за участю Липинського, Грінченка, Чикаленка, Лотоцького, Хоткевича — це вбудований клас-дебати, а не привід відкинути чи канонізувати книжку.'
  - '[!epistemic-humility] «Вступ» книжки містить періодні етноніми й полемічні ярлики для росіян, євреїв, поляків; подаємо їх як мову джерела початку XX століття з поясненням шкоди, а не як сучасну лексику.'
  - 'Причина смерті: Аркас раптово помер у Миколаєві 1909 року; джерела згадують серцевий напад і матеріальну напругу — не пишемо, що «імперія його вбила».'
  - '[!decolonization] Перевидання 1990-х років показують вагу пам''яті, а не автоматичний науковий авторитет; старий наратив обрамлюємо сучасною історіографією.'
  section: 'Тінь: Аматорство, критика Грушевського й межі памʼяті'
  words: 900
- points:
  - 'Повернення до розминки: чому «аматорство» тут — джерельна характеристика, а не зневага, і чому популярність не дорівнює професійному синтезу?'
  - 'Три сфери разом: опера, популярна історія й «Просвіта» показують, як Аркас перетворював культуру на публічну інституцію під імперським обмеженням.'
  - '[!anti-hagiography] Аркас важливий, але не самотній: поряд — Кропивницький і «Катерина» на сцені, Лисенко й національна музична школа, Грушевський і професійна історіографія.'
  - 'Пам''ять і джерела: транскрипція з «Вікіджерел» 1912 року — шлюз до факсиміле; класні цитати варто звіряти з виданням і сторінкою перед публікацією.'
  section: 'Дискусія та підсумок: Культура як інституція'
  words: 700
focus: 'Mykola Arkas (1853-1909) as a southern-Ukrainian imperial-service elite who turned family resources, amateur music, popular history, schools and the Mykolaiv Prosvita into wider Ukrainian-language public culture under Russian-imperial constraint: the opera ''Kateryna'' after Shevchenko held apart in composition, score and premiere dates, the hugely popular ''Istoriia Ukrainy-Rusi'' taught as public pedagogy with the amateur-historian caveat and Hrushevsky''s criticism visible, the pressure mechanism kept specific (censorship, school closure, Prosvita limits) rather than ''the empire killed him'', and the imperial naval-family context included without turning it into cultural allegiance.'
level: BIO
module: bio-352
objectives:
- 'Пояснювати Аркаса як організатора української публічної культури: опера, популярна історія, школи, меценатство й миколаївська «Просвіта», а не лише «композитор «Катерини»».'
- 'Розділяти дати «Катерини»: написання (лібрето самого Аркаса за Шевченком), перший клавір (Миколаїв, 1897) і сценічну прем''єру (Москва, 1899) — не стискати в одну фразу.'
- Тримати «Історію України-Русі» як публічну педагогіку й національне пробудження з відкритим застереженням про історика-аматора й критику Грушевського.
- 'Називати механізм тиску конкретно: цензура опери, закриття української школи, обмеження «Просвіти» й вартість української культурної праці — а не «імперія його вбила».'
- Показувати імперський військово-морський родинний контекст як соціальну формацію, а не як доказ політики за походженням.
