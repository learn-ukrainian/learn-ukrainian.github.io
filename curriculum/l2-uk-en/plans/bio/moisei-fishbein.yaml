content_outline:
- points:
  - 'Провокація: Єврейський інтелектуал із Чернівців, який міг писати німецькою чи російською, стає пророком української мови.
    Як цей особистий вибір однієї людини став потужною зброєю в інформаційній війні проти імперських міфів?'
  - '[!biography] Мойсей Фішбейн — постать, що руйнує стереотипи про українсько-єврейські відносини та саму суть ідентичності.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Вибір мови як розрив чи синтез? Для українських патріотів Фішбейн — символ єдності. Для частини єврейської спільноти
    — асимілятор, що зрадив мову предків. Як сам поет відповідав на ці закиди?'
  - 'Дебат 2: Привласнення спадщини. Сучасна Україна бачить у ньому ікону decolonization. Російська пропаганда або замовчує
    його, або називає «винятком, що підтверджує правило» про український антисемітизм. Де правда?'
  - '[!epistemic-humility] Оцінки його постаті залежать від оптики: національної, релігійної, політичної. Не існує єдиної
    "правильної" інтерпретації.'
  - '[!decolonization] Факт існування Фішбейна — живе спростування ключового наративу Москви про "нацистську" та "антисемітську"
    Україну.'
  section: 'Конфліктна карта: Українець за вибором чи "зрадник" єврейства?'
  words: 900
- points:
  - 'Чернівці як "плавильний котел" культур: німецька мова Пауля Целана, їдиш Рози Ауслендер, румунська та українська мови
    навколо. Чому з цього різноманіття він обрав саме українську?'
  - Київський педінститут та знайомство з українською класикою. Роль Миколи Бажана та Леоніда Первомайського як провідників
    у світ справжньої, нерадянської української поезії.
  - Робота в редакції Української Радянської Енциклопедії — занурення в мовну стихію.
  - 'Поворотний момент: відмова від співпраці з КДБ (1979) як остаточний вибір на користь інтелектуальної свободи, що коштував
    йому батьківщини.'
  section: 'Формування: Від Чернівців до Києва (1946-1979)'
  words: 1000
- points:
  - 'Еміграція як випробування та розширення горизонтів: Ізраїль, потім 13 років у Мюнхені на радіо «Свобода».'
  - 'Поетична творчість: "Ямбове коло", "Апокриф", "Пророк". Аналіз ключових мотивів — мова як дім, пророцтво, діалог культур.'
  - 'Перекладацький подвиг: Фішбейн будує мости, перекладаючи українською з десяти мов — Рільке, Целан, Бодлер, Га-Леві, Бялик.
    Він доводить, що українська мова є самодостатнім інструментом для світової літератури.'
  - 'Публіцистика як боротьба: статті, що викривали "єврейську карту" в російських спецопераціях проти України.'
  section: 'Діяльність: Еміграція, переклад і поезія як місія (1979-2003)'
  words: 1300
- points:
  - '[!anti-hagiography] Вибір Фішбейна не був тріумфальним маршем. Це був шлях, позначений втратами: розрив із частиною єврейського
    середовища, вимушена еміграція, туга за домом.'
  - Чи не було в його позиції елементу максималізму? Його безкомпромісна проукраїнська позиція іноді викликала нерозуміння
    навіть у діаспорних колах, які звикли до більш обережного політичного курсу.
  - '[!myth-buster] Міф про "легке повернення". Повернення в Україну 2003 року не було безхмарним. Фішбейн зіткнувся з новою
    реальністю, бюрократією та не завжди адекватною оцінкою його внеску.'
  - 'Ціна служіння мові: чи не затьмарила його титанічна перекладацька праця та публіцистика власну оригінальну поезію в очах
    широкого загалу?'
  section: 'Тінь: Ціна вибору та біль розриву'
  words: 900
- points:
  - 'Повернення до розминки: студент, маючи повну картину, може пояснити, чому вибір Фішбейна був не просто естетичним, а
    глибоко політичним та світоглядним актом.'
  - 'Символічний капітал: премія імені Стуса, орден Ярослава Мудрого, поховання на Байковому кладовищі. Як держава та суспільство
    визнали його спадщину.'
  - '[!decolonization] Фішбейн — "ідеальний приклад" для української культурної дипломатії. Його життя та творчість є найпереконливішою
    відповіддю на російські звинувачення в антисемітизмі.'
  - 'Заповіт: Фішбейн залишив не лише поезію, а й модель для українсько-єврейського порозуміння, засновану на взаємній повазі
    та спільному протистоянні імперському гніту.'
  section: 'Дискусія та підсумок: Спадщина — міст між культурами'
  words: 700
focus: Biography of Moisei Fishbein, a Jewish poet who wrote in Ukrainian. Examines his conscious language choice as a political
  act, his role in the Ukrainian-Jewish dialogue, and his legacy as a symbol of decolonization, challenging Russian imperial
  myths about Ukrainian antisemitism.
