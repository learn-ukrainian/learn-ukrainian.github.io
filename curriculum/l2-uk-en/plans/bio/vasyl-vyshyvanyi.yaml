content_outline:
- points:
  - 'Парадокс: Як нащадок однієї з наймогутніших європейських династій, що століттями володіла Україною, став її палким патріотом
    і полковником її армії?'
  - '[!biography] Провокаційне питання: чи можна «обрати» націю, чи це питання крові та походження? Доля Василя Вишиваного
    — це ідеальний кейс для цієї дискусії.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Мотиви Вишиваного. Чи був він щирим українським ідеалістом, що закохався в культуру, чи прагматичним політиком,
    що бачив в Україні шанс на власний трон?'
  - 'Дебат 2: Сприйняття його фігури. Українські монархісти бачили в ньому «свого» короля. Республіканці (Петлюра) — небезпечного
    конкурента. Радянська пропаганда — «австрійського шпигуна».'
  - '[!epistemic-humility] Оцінка його політичних дій — від союзу з УСС до таємних переговорів у повоєнній Європі — залишається
    неоднозначною.'
  - '[!decolonization] Вишиваний — символ краху імперій та народження націй. Його історія руйнує російський наратив про «штучність»
    українського проєкту.'
  section: 'Конфліктна карта: Князь чи патріот?'
  words: 900
- points:
  - 'Імперське дитинство: виховання в аристократичній родині Габсбургів-Лотарингенів, де переплітались польські, італійські
    та німецькі впливи.'
  - 'Поворотний момент: служба в Галичині та перші контакти з українськими солдатами — враження від їхньої культури, мови
    та національної свідомості.'
  - 'Формативний досвід: читання української літератури (Франко, Шевченко), вивчення мови, спілкування з січовими стрільцями.'
  - 'Не просто захоплення, а глибока ідентифікація: що змусило його побачити в українцях не «підданих», а націю з майбутнім?'
  section: 'Формування: Від ерцгерцога до симпатика'
  words: 1000
- points:
  - Прийняття імені «Василь Вишиваний» та носіння вишиванки як політичний маніфест і символ розриву з імперським минулим.
  - 'Командир «Групи ерцгерцога Вільгельма» у складі УСС: бойовий шлях, авторитет серед солдатів, звільнення південної України.'
  - 'Політичні амбіції: спроби здобути український трон («Проєкт Габсбург-Гетьман»), конфлікт із німецькою окупаційною владою
    та Директорією УНР.'
  - 'Його військові та політичні дії в 1917-1920 рр.: що він зробив правильно, а де припустився фатальних помилок?'
  section: 'Діяльність: Полковник Василь Вишиваний'
  words: 1300
- points:
  - '[!anti-hagiography] Життя в еміграції: фінансова скрута, політичні інтриги, зв''язки з різними спецслужбами (французькою,
    британською, німецькою) у спробі знайти союзників для української справи.'
  - Фатальна наївність чи зрада? Його контакти з радянськими представниками та віра в можливість домовитися з Москвою.
  - '[!myth-buster] Міф про «короля України». Вишиваний ніколи не був коронований, його монархічний проєкт провалився, але
    сам образ «князя-патріота» став потужним символом.'
  - Арешт радянськими спецслужбами у Відні (1947), ув'язнення в Лук'янівській тюрмі в Києві та смерть від туберкульозу (1948).
    Ціна за вибір України виявилася смертельною.
  section: 'Тінь: Небезпечні ігри та трагічний фінал'
  words: 900
- points:
  - 'Повернення до розминки: чи можна «обрати» націю? Студент формулює відповідь, спираючись на трагічну долю Вишиваного.'
  - '[!decolonization] Спадщина Вишиваного — це не трон, а ідея: Україна як частина європейської цивілізації, варта того,
    щоб за неї боровся і загинув нащадок імператорів.'
  - 'Символ для сучасності: його постать реабілітована в незалежній Україні. Що вона говорить нам сьогодні про національну
    ідентичність, європейський вибір та ціну свободи?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Wilhelm von Habsburg (Vasyl Vyshyvanyi), his choice of Ukrainian identity, command of the Sich Riflemen,
  political ambitions, and tragic end.
level: BIO
module: bio-106
objectives:
- Аналізувати складний життєвий шлях Василя Вишиваного як приклад конфлікту між імперським походженням та свідомим національним
  вибором
- Критично оцінювати його політичні амбіції та військову діяльність у контексті українських визвольних змагань
- Розрізняти історичні факти, пропагандистські наративи та романтизовані міфи у біографії Вишиваного
- Формулювати власну аргументовану позицію щодо ролі особистості та вибору в формуванні національної ідентичності
