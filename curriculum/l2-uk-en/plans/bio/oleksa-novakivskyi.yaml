content_outline:
- points:
  - >-
    [!biography] Олекса Новаківський: подільський за походженням живописець,
    вихованець Одеси й Кракова, львівський майстер, педагог і творець
    мистецької школи в студії біля собору святого Юра.
  - >-
    Провокаційне питання: що важить більше для культурної пам’яті — завершене
    полотно, учні в тісній майстерні чи музейна кімната, де пізніші покоління
    відновлюють утрачений контекст?
  section: Розминка
  words: 400
- points:
  - >-
    Слобода-Ободівка, Одещина, краківська академічна школа і могилянський
    пейзажний період: шлях Новаківського не вкладається в просту схему
    "схід-захід".
  - >-
    Учителі в Кракові, природне світло, пейзаж і рання імпресіоністична
    манера; учні називають колір, мазок, полотно, натюрморт і пейзаж як
    мову професійного опису.
  - >-
    [!decolonization] Краківська й одеська освіта не робить митця "чужим":
    його зріла праця у Львові показує трансрегіональний український модернізм,
    а не культурну власність імперського чи польського центру.
  section: 'Формування: Поділля, Одеса, Краків і дорога до Львова'
  words: 1000
- points:
  - >-
    Запрошення митрополита Андрея Шептицького 1913 року: львівський переїзд як
    взаємна культурна праця мецената і художника, а не пасивне "порятування"
    митця.
  - >-
    Студія на Листопадового Чину і школа 1923 року: перша українська мистецька
    школа західноукраїнського типу в культурній пам’яті, але без стабільної
    дипломної структури.
  - >-
    Воєнний перелом у живописі: `Воєнна мадонна`, `Собор святого Юра`,
    `Ангел смерті`, `Молох війни` як матеріал для розмови про алегорію,
    експресіонізм і колективну травму.
  - >-
    Портрети Шептицького, Олександра Барвінського, Довбуша і родинні образи:
    приватна модель, історична постать і національна пам’ять з’являються в
    одному візуальному полі.
  section: 'Діяльність: Студія, школа і експресивний Львів'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Шептицький патронат був вирішальним, але він не
    скасовує бідності, залежності від підтримки і напруження між особистою
    свободою художника та інституційними очікуваннями.
  - >-
    Школа швидко зросла, але не мала повноцінної навчальної програми й дипломів;
    після конфліктів довкола навчання 1929 року вона втратила частину підтримки
    і занепала приблизно до 1932 року.
  - >-
    [!myth-buster] Не вигадуємо НКВД, МГБ чи КГБ-справу: досьє дає іншу вісь
    тиску — несталу українську інституцію, фінансову крихкість і посмертну
    радянську втрату музейних об’єктів.
  - >-
    У 1940 році частину творів зі львівських збірок відправили на московську
    виставку і не повернули; це історія переміщених картин, а не особистого
    арешту Новаківського.
  section: 'Тінь: Крихка інституція і втрачені музейні об’єкти'
  words: 1600
- points:
  - >-
    Учні повертаються до майстерні як місця пам’яті: хто входив у школу, як
    працювала кімната, що видно в музейному просторі і чого вже неможливо
    побачити через втрату творів.
  - >-
    Новаківський поєднує Поділля, Одесу, Краків, Могилу, Бойківщину і Львів:
    біографія вчить описувати український модернізм як мережу доріг, а не як
    провінційну гілку чужого мистецтва.
  - >-
    Сучасне значення: меморіальний музей і школа учнів повертають Новаківського
    як творця львівської модерної візуальної мови, а не лише як автора окремих
    ефектних полотен.
  section: 'Підсумок: Майстерня, що стала пам’яттю'
  words: 1000
focus: >-
