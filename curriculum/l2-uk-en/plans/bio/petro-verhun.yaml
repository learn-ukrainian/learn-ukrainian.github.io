content_outline:
- points:
  - >-
    [!biography] Знайомство з Петром Вергуном: священник, доктор філософії,
    Апостольський візитатор для українців-католиків у Німеччині.
  - >-
    Проблемне питання: що саме атрибутовані джерела фіксують про арешт
    Вергуна в Берліні 1945 року, вивезення, вирок і заслання — і чого вони
    НЕ називають (мотиву арешту чи вивезення джерела не подають).
  section: Розминка
  words: 400
- points:
  - >-
    Військовий досвід: доброволець австрійської армії (1909); за [S1],
    у 1919–20 роках — в УГА.

  - >-
    Освіта та формування: докторат з філософії (1925); окремо — навчання у
    Львівському університеті й завершення студій в Українському вільному
    університеті в Празі (1926).
  - >-
    Духовний шлях: свячення з рук митрополита Андрея Шептицького (1927) та
    початок душпастирської праці в Берліні.
  section: 'Формування: Від УГА до Берліна'
  words: 1000
- points:
  - >-
    Берлінські титули й діяльність за [S1] [S3] [S4]: від 1929 — пастир
    українських католиків у Берліні [S1]; від 1940 — священик для
    українців-католиків у Берліні [S1]; згодом Апостольський візитатор у
    Німеччині [S3]; Ватикан — Pastor / Apostolic Visitor [S4];
    прелат від 1937 [S1].
  - >-
    Атрибутовані публічні й письмові праці [S1]: лекції про православне та
    греко-католицьке віровизнання; релігійні брошури та інформаційний
    бюлетень; «Послання Апостольського Візитатора до українців-католиків
    візантійсько-слов'янського обряду у Великонімеччині»; історичні
    розвідки про церковні питання Сходу Європи (текст Послання не
    отримано — лише назва й існування).
  - >-
    [!decolonization] Атрибутоване [S3]: «не переніс осідок до Мюнхена,
    хоча мав таку можливість»; переказана [S3] репліка: «Поки хоча б один
    українець в Берліні, я залишуся тут». [S3] не подає походження репліки
    (лист / протокол / свідок) і не називає мотиву — план їх не домислює.
  section: 'Діяльність: Апостольський візитатор у Німеччині'
  words: 1200
- points:
  - >-
    Арешт радянськими спецслужбами в Берліні (червень 1945) і вивезення до
    СРСР за [S2] [S3]; мотив не приписується.
  - >-
    Засудження: за [S3] — 1946 року в Києві засуджений до 8 років; за [S2] —
    військовий трибунал у складі трьох суддів і двох секретарів (спільний
    вирок зі Сліпим, Будкою і Чарнецьким; конфіскація майна). Текст самого
    вироку не отримано.
  - >-
    Етап та заслання: звільнення з каторжних робіт (за [S2] [S3] — 1952) і
    подальше заслання (за [S2] [S3] — Ангарське Красноярського краю, від
    1953); [S1] подає «увʼязнений до 1955» — ряди не зводяться.
  - >-
    [!epistemic-humility] Географічні розбіжності: [S1] подає Краснодарський
    край, [S2] і [S3] — Красноярський; поховання біля Ангари [S3] не
    вирішує, яка версія краю правильна. Смерть на засланні (1957) —
    зв'язок заслання зі смертю подають [S2] [S3]; [S1] дату смерті
    підтверджує, але формулювання «на засланні» з [S1] не виводиться.
  section: 'Тінь: Арешт, табори та заслання'
  words: 1600
- points:
  - >-
    Повернення пам'яті: беатифікація як мученика (2001). Церковний акт Папи Івана Павла II.
  - >-
    Перенесення мощей: повернення останків в Україну до собору у Стрию (2004).
  - >-
    Спадщина: атрибутовані титули пастиря / Апостольського візитатора
    [S1] [S3] [S4] і атрибутовані факти арешту, вироку, таборів і заслання
    — без висновку про системний «задум» знищення діаспорної еліти.
  section: 'Підсумок: Від заслання до беатифікації'
  words: 1000
