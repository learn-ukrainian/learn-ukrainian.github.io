content_outline:
- points:
  - >-
    [!biography] Знайомство з Петром Вергуном: священник, доктор філософії,
    Апостольський візитатор для українців-католиків у Німеччині.
  - >-
    Проблемне питання: чому радянські органи держбезпеки викрали з Берліна
    українського священника та відправили його в сибірські табори?
  section: Розминка
  words: 400
- points:
  - >-
    Військовий досвід: доброволець австрійської армії (1909), згодом служба
    в Українській Галицькій Армії (УГА).
  - >-
    Освіта та формування: здобуття ступеня доктора філософії в Українському вільному
    університеті в Празі (1926).
  - >-
    Духовний шлях: свячення з рук митрополита Андрея Шептицького (1927) та
    початок душпастирської праці в Берліні.
  section: 'Формування: Від УГА до Берліна'
  words: 1000
- points:
  - >-
    Місія в еміграції: організація українського релігійного та культурного
    життя в Німеччині. Призначення Апостольським візитатором.
  - >-
    Наукова діяльність: праці з історії церкви, зокрема "Geschichte der Union im Ostslawischen Raum"
    та "Die Orientalischen Riten und Kirchlichen Gemeinschaften".
  - >-
    [!decolonization] Вірність обов'язку: принципова відмова евакуюватися з
    Берліна: "Поки хоча б один українець в Берліні, я залишуся тут."
  section: 'Діяльність: Апостольський візитатор у Німеччині'
  words: 1200
- points:
  - >-
    Механізм репресій: арешт радянськими спецслужбами в Берліні (червень 1945),
    депортація до СРСР.
  - >-
    Засудження: вирок радянського суду в Києві (1946) до 8 років таборів ГУЛАГу
    за сфабрикованими звинуваченнями.
  - >-
    Етап та заслання: відбуття покарання, важка праця, подальше заслання
    у Красноярський край (1953).
  - >-
    [!epistemic-humility] Географічні розбіжності: зафіксована плутанина між
    Краснодарським (за ЕСУ) та Красноярським краєм, проте поховання біля річки Ангари
    підтверджує сибірський контекст. Смерть на засланні (1957).
  section: 'Тінь: Арешт, табори та заслання'
  words: 1600
- points:
  - >-
    Повернення пам'яті: беатифікація як мученика (2001). Церковний акт Папи Івана Павла II.
  - >-
    Перенесення мощей: повернення останків в Україну до собору у Стрию (2004).
  - >-
    Спадщина: Петро Вергун як приклад транснаціональної церковної інфраструктури,
    знищеної радянським тоталітаризмом.
  section: 'Підсумок: Від заслання до беатифікації'
  words: 1000
