content_outline:
- points:
  - 'Парадокс: Лев Данилович — князь, чиє ім''я носить Львів, однак у самому місті немає жодного його пам''ятника. Чому фігура
    засновника виявилася настільки суперечливою для нащадків?'
  - '[!biography] Вступ до постаті Лева як сина короля Данила, що успадкував державу в найскладніший період — одразу після
    монгольської навали.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Ставлення до Орди. Чи був Лев прагматичним васалом, що зберіг державу ціною принизливих союзів, чи колаборантом,
    що воював разом з монголами проти Литви та Польщі?'
  - 'Дебат 2: Внутрішня політика. Він був далекоглядним урбаністом, що залучав іноземних колоністів і дав Львову поштовх до
    розвитку, чи жорстоким правителем, що конфліктував із боярською опозицією?'
  - '[!epistemic-humility] Літописи дають суперечливі оцінки: від "мудрого і хороброго" до "лютого й безжального". Як відрізнити
    факт від оціночного судження хроніста?'
  - '[!decolonization] Радянська історіографія ігнорувала європейський вектор політики Лева (союзи з Тевтонським орденом,
    Угорщиною), зосереджуючись виключно на його "дружбі" з Ордою як доказі "спільної історичної долі".'
  section: 'Конфліктна карта: Прагматик чи зрадник?'
  words: 900
- points:
  - Народження в тіні великого батька, Данила Галицького. Як досвід боротьби Данила з монголами вплинув на світогляд Лева?
  - 'Князювання в Белзі та Перемишлі: перші кроки як самостійного правителя.'
  - Успадкування Галича після смерті батька (1264) та боротьба за владу з братами і дядьком Васильком Романовичем.
  - 'Соціальний та історичний контекст: світ після Батиєвого погрому, де старі правила вже не діяли, а нові ще не були написані.'
  section: 'Формування: У тіні батька-короля'
  words: 1000
- points:
  - 'Перенесення столиці з Галича до Львова (1272): стратегічне, економічне та символічне значення цього рішення.'
  - 'Львів як "княжий город": розбудова Високого Замку, залучення німецьких, вірменських та єврейських громад, надання початкових
    привілеїв.'
  - 'Територіальна експансія: приєднання Люблінської землі (1292) та частини Закарпаття (бл. 1280) — пік могутності Галицько-Волинської
    держави.'
  - 'Дипломатичні маневри: союзи з Угорщиною, Чехією та Тевтонським орденом як спроба створити антимонгольську коаліцію.'
  section: 'Діяльність: Розбудова Львова та експансія'
  words: 1300
- points:
  - '[!anti-hagiography] Обов''язок васала: участь у військових походах монголів на Литву (1275) та Польщу (1280), що супроводжувалися
    грабунком і руйнуваннями християнських земель.'
  - 'Жорстокість у боротьбі за владу: можлива причетність до вбивства литовського князя Войшелка задля повернення земель.'
  - '[!myth-buster] Міф про "незалежного короля Лева". Попри титул "Rex Russiae", він залишався данником хана і був змушений
    діяти в межах, дозволених Ордою.'
  - 'Критика сучасників: літописці засуджували його запальний характер та жорстокі розправи з непокірними боярами.'
  section: 'Тінь: Ціна виживання'
  words: 900
- points:
  - 'Повернення до розминки: чому Львів, вдячний Леву за своє заснування, так і не увічнив його в монументі? Студент формулює
    відповідь, спираючись на знання про "тіньовий" бік князя.'
  - 'Львів як головна спадщина: місто, що пережило свого засновника і стало "українським П''ємонтом", багато в чому завдяки
    закладеному Левом фундаменту мультикультурності та відкритості до Європи.'
  - '[!decolonization] Переоцінка постаті Лева в сучасній Україні: від радянського образу "друга татар" до образу складного,
    трагічного правителя, що намагався зберегти державність у неможливих умовах.'
  - 'Сучасна релевантність: чи можна порівнювати дипломатичні компроміси Лева з сучасними політичними дилемами України?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Аналіз спадщини Лева Даниловича як засновника Львова та прагматичного правителя в епоху монгольської зверхності, з
  акцентом на конфлікті між містобудівною діяльністю та моральними компромісами.
