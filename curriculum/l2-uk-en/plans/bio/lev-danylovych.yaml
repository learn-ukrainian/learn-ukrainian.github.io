objectives:
- Аналізувати роль Лева Даниловича у перетворенні Львова на велике європейське місто
- Оцінювати стратегії виживання Галицько-Волинської держави під монгольською зверхністю
- Критично аналізувати суперечливі аспекти правління Лева, зокрема його компроміси з Ордою
- Засвоїти лексику, пов’язану з містобудуванням, державотворенням та дипломатією XIII століття
