content_outline:
  - points:
      - >-
          Провокація: як викладач креслення і гірничий інженер зі Сталіна,
          теперішнього Донецька, став тенором світових сцен і голосом
          української оперної пам'яті?
      - >-
          [!biography] Анатолій Борисович Солов'яненко (1932-1999) —
          український тенор, соліст Київської / Національної опери,
          виконавець українських і світових ролей, записаний голос пісні,
          романсу та опери.
      - >-
          Навчальне запитання: чому важливо говорити про Донбас як частину
          української культурної географії, а не як периферію чужої оптики?
    section: Розминка
    words: 400
  - points:
      - >-
          Дебати 1: "український соловей" як шаноблива метафора чи
          спрощення? Модуль розглядає тембр і славу, але не замінює ними
          працю, техніку, репертуар і інституційні рішення.
      - >-
          Дебати 2: світова опера чи українська сцена? Метрополітен-опера,
          Ла Скала і міжнародний репертуар важливі, але українські ролі в
          Лисенка й Гулака-Артемовського є рівноцінним центром біографії.
      - >-
          [!decolonization] Солов'яненко не має подаватися як безликий
          "радянський тенор". Його донбаське походження, київська сцена,
          українські пісні і пострадянська національна пам'ять є ключовими.
      - >-
          [!epistemic-humility] Джерела не підтверджують персональної
          репресивної справи. Інституційні суперечки, зокрема звільнення
          1996 року, треба називати лише в межах обережних формулювань
          джерел.
    section: 'Конфліктна карта: Світова сцена і українська географія'
    words: 900
  - points:
      - >-
          Народження 25 вересня 1932 року в Сталіне, теперішньому Донецьку,
          в родині шахтаря. Історичну назву міста треба пояснювати без
          нормалізації імперського або російського привласнення простору.
      - >-
          Технічна освіта: Донецький індустріальний / політехнічний інститут,
          гірнича і механічна підготовка, викладання нарисної геометрії та
          графіки як дисципліна форми, не "помилка" перед мистецтвом.
      - >-
          Приватні вокальні студії з Олександром Коробейченком і пізніше
          навчання в класі Єлизавети Чавдар у Київській консерваторії
          показують довгий шлях техніки, а не миттєвий міф таланту.
      - >-
          Запрошення до Київської опери на початку 1960-х і розбіжності в
          джерелах щодо статусу соліста: модуль навчає бачити різницю між
          запрошенням, стажуванням і штатною позицією.
    section: 'Формування: Донбас, технічна школа і приватний голос'
    words: 1000
  - points:
      - >-
          Українські ролі: Андрій у "Запорожці за Дунаєм", Петро в
          "Наталці Полтавці", Кобзар у "Тарасі Бульбі" — основа для розмови
          про українську оперу як живий репертуар.
      - >-
          Світовий репертуар: Верді, Пуччіні, Бізе, Гуно, Римський-Корсаков
          та інші ролі дають порівняльний матеріал, але не витісняють
          українську сценічну ідентичність.
      - >-
          Записи і медіа: платівки, фільм-опера, романси та архівні записи
          роблять голос Солов'яненка доступним як матеріал слухання, дикції
          і сценічної інтерпретації.
      - >-
          Пам'ять після смерті: Шевченківська премія 1997 року, посмертне
          звання Героя України 2008 року, "Національна легенда України" 2022
          року і пам'ятна монета як приклади державної та публічної рецепції.
    section: 'Діяльність: Тенор, опера і записаний репертуар'
    words: 1300
  - points:
      - >-
          [!anti-hagiography] Не перетворювати кар'єру на безхмарний шлях
          генія: радянські інституції, офіційні титули, гастролі і
          пострадянські конфлікти є частиною біографії.
      - >-
          [!myth-buster] Образ "солов'я" не пояснює професійного голосу.
          Потрібні слова про техніку, репертуар, педагогів, записи,
          інституції і конкретні українські ролі.
      - >-
          Донбас не має ставати екзотичним додатком до Києва. Модуль
          показує українську культурну географію як багаторегіональну,
          включно з індустріальними містами.
      - >-
          Розбіжності джерел щодо дат Ла Скала і старту в Київській опері
          залишаються видимими; студент бачить, як працює джерельна
          обережність.
    section: 'Тінь: Слава, інституції і пастка красивої метафори'
    words: 900
  - points:
      - >-
          Повернення до розминки: студент пояснює, як інженерна дисципліна,
          приватна вокальна школа і київська сцена формують не легенду, а
          професійну біографію.
      - >-
          Порівняння з Гнатюком: різні голоси і ролі показують, що українська
          опера — це система виконавців, педагогів, театрів, записів і
          репертуарних виборів.
      - >-
          Деколонізаційний висновок: Солов'яненко повертає Донбас у карту
          української культури без спрощень і без підпорядкування російським
          географічним наративам.
    section: 'Дискусія та підсумок: Донбас у голосі української опери'
    words: 700
