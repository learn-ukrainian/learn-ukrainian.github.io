objectives:
  - >-
      Аналізувати Анатолія Солов'яненка як українського оперного виконавця,
      чия біографія поєднує Донбас, Київ і світові сцени
  - >-
      Пояснювати роль українських оперних партій, записів і концертного
      репертуару в його культурній спадщині
  - >-
      Критично розрізняти офіційну славу, професійну працю, інституційні
      суперечки і недоведені репресивні сюжети
  - >-
      Формулювати деколонізаційне прочитання Донбасу як частини української
      культурної географії
