content_outline:
- points:
  - 'Парадокс: «Батько незалежності», що закінчив життя самогубством у радянському Києві. Чому перший ідеолог української
    державності помер у самотності та політичному забутті?'
  - '[!biography] Представлення постаті через його найрадикальнішу тезу — «самостійна, суверенна Україна, соборна, ціла і
    нероздільна» — як виклик своїй епосі.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Свій серед чужих, чужий серед своїх». Конфлікт Міхновського з поміркованим українством (федералісти, автономісти
    на чолі з Драгомановим та Грушевським). Чи був його радикалізм єдиним шляхом, чи передчасною провокацією?'
  - 'Дебат 2: Радянська анафема vs націоналістична ікона. Як і чому образ Міхновського був спочатку повністю стертий, а потім
    перетворений на бездоганний монумент?'
  - '[!epistemic-humility] Визнання того, що критика Міхновського з боку соціалістів була частково обґрунтованою з огляду
    на політичні реалії початку XX століття.'
  - '[!decolonization] Розвінчання російсько-імперського та радянського наративу про український націоналізм як «сепаратизм»,
    інспірований ззовні.'
  section: 'Конфліктна карта: Радикал-одинак чи пророк?'
  words: 900
- points:
  - 'Полтавське коріння: народження в родині священника, що не зреклася української мови.'
  - 'Київський університет: середовище, де формувалися національні переконання, і розчарування в українофільському культурництві.'
  - 'Братство тарасівців (1891): перший крок від культурництва до політики. Присяга на могилі Шевченка як символ розриву з
    минулим.'
  - 'Формування ідеології: вплив європейського націоналізму, соціального дарвінізму та власне прочитання історії України.'
  section: 'Формування: Від Тарасівців до самостійництва'
  words: 1000
- points:
  - 'Брошура «Самостійна Україна» (1900): вибух у середовищі, де панували ідеї автономії. Аналіз ключових тез.'
  - 'Гасло «Україна для українців»: розбір його первинного значення (деокупація, право на власну державу) та подальших суперечливих
    інтерпретацій.'
  - 'Заснування Української народної партії (УНП): спроба створити першу дієву політичну силу, що стояла на позиціях незалежності.'
  - 'Юридична практика як форма боротьби: захист українських селян та політичних активістів у судах Російської імперії.'
  section: 'Діяльність: «Самостійна Україна» як політична програма'
  words: 1300
- points:
  - '[!anti-hagiography] Політична поразка Міхновського: його ідеї не здобули широкої підтримки за життя. Чому він програв
    Грушевському та соціалістам?'
  - 'Спроба військового перевороту (1917): відчайдушна спроба захопити владу, що завершилась провалом і остаточною маргіналізацією.
    Авантюра чи необхідний крок?'
  - 'Неприйняття компромісів: безкомпромісність, що межувала з сектантством, і нездатність до політичних союзів.'
  - '[!myth-buster] Міф про «фашизм» Міхновського. Аналіз його поглядів у контексті епохи, а не через призму пізніших ідеологій.
    Він був націоналістом, не фашистом.'
  section: 'Тінь: Радикалізм, що випередив час'
  words: 900
- points:
  - 'Повернення до розминки: чому «батько незалежності» помер у самотності? Студент формулює відповідь, спираючись на знання
    про його характер, ідеї та історичний контекст.'
  - 'Загадка смерті: офіційна версія (самогубство) vs конспірологічні теорії. Що кажуть джерела?'
  - '[!decolonization] Посмертне визнання: як і чому ідеї Міхновського, відкинуті сучасниками, стали основою для наступних
    поколінь борців за незалежність у XX столітті.'
  - 'Актуальність сьогодні: чи є актуальними ідеї Міхновського в Україні XXI століття, що воює за свою незалежність?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: 'Микола Міхновський: перший ідеолог повної державної незалежності України, автор брошури «Самостійна Україна», творець
  гасла «Україна для українців», та його трагічна доля як пророка, не визнаного у свій час.'
