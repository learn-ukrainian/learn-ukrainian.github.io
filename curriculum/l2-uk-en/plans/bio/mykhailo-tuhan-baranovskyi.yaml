content_outline:
- points:
  - 'Провокація: чому генеральний секретар фінансів із дуже короткою каденцією важливий для державотворення? Тому що фінансова лексика — це лексика суверенітету.'
  - '[!biography] Знайомство з економістом світового рівня, теоретиком криз, грошей і кооперації, який намагався перетворити фахову експертизу на українські інституції.'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (будівничий спроможності): Туган-Барановський — генеральний секретар фінансів УНР, засновник Української академії наук і теоретик кооперації, а не лише петербурзький професор.'
  - 'Позиція 2 (деколонізаційна): рамка — українська політична економія, державотворення Центральної Ради, кооперативна самоорганізація та розбудова академії, а не загальна «російська економічна думка».'
  - '[!decolonization] Багато праць вийшли російською чи німецькою, бо такими були доступні академічні й видавничі ринки, а не тому, що українська економічна термінологія була непотрібна; кооперація означає членську самоорганізацію, не радянську колективізацію.'
  - '[!epistemic-humility] Дрейф місця народження (Соляниківка / Солоне / Солонім / Старовірівка — нині неіснуюче поселення) і дат (8(20) січня 1865; 21/22 січня 1919) подаємо з позначкою джерела; татарсько-мурзинське та полтавське походження не розмиває його української громадської ідентифікації.'
  section: 'Конфліктна карта: «Російський економіст» чи будівничий української спроможності?'
  words: 900
- points:
  - 'Освіта: гімназія в Харкові, фізико-математичні студії Харківського університету (1888) і правничі студії (1890).'
  - 'Наукова слава: магістерська праця про промислові кризи в сучасній Англії (1894) зробила його теорію економічних циклів міжнародно помітною; докторська «Русская фабрика» (1898) — джерело з історії індустріалізації.'
  - 'Імперське поліціювання: звільнення з Петербурзького університету близько 1899 року за політичну неблагонадійність і полтавський період 1901-1905 років — місток від імперської кар''єри до української громадської й кооперативної праці.'
  - '[!epistemic-humility] Він пройшов через легальний марксизм, а потім критикував марксистську теорію криз і класової боротьби; це інтелектуальна траєкторія, а не сталий партійний ярлик.'
  section: 'Формування: Криза, катедра й розрив із марксизмом'
  words: 1000
- points:
  - 'Теорія: «Соціальні основи кооперації» (1916) і монетарна праця «Паперові гроші й метал» (1917) з''єднують економіку, громадянське суспільство й національну організацію.'
  - '1917 рік: генеральний секретар фінансів у Генеральному секретаріаті Центральної Ради — бюджет, гроші, податок і банківництво стали негайними проблемами автономії (точні місяці каденції подаємо з позначкою джерела).'
  - '1918 рік: один з ініціаторів Української академії наук, дійсний академік, голова соціально-економічного відділу, організатор Інституту економічної кон''юнктури, демографічного та кооперативного інститутів і Українського товариства економістів.'
  - 'Українська економічна школа: у 1919 році — праці українською мовою, зокрема «Кооперація, її природа та мета» й популярний курс політичної економії; це розбудова українського академічного реєстру, а не косметика.'
  section: 'Діяльність: Кооперація, фінанси й Академія'
  words: 1300
- points:
  - '[!anti-hagiography] Каденція на посаді фінансів була короткою; він не створив одноосібно ні українських фінансів, ні академії, ні кооперативної практики — це спільна інституційна праця.'
  - '[!myth-buster] Він був важливим теоретиком циклів, грошей і кооперації, але його не можна подавати як одноосібного винахідника кейнсіанства чи української фінансової системи.'
  - 'Каталогізаційна деколонізація: Commons і бібліотечні записи можуть називати його «російським економістом» — це імперська каталожна метадана, яку позначаємо як джерело, а не переказуємо як факт.'
  - 'Межі впливу: програма розбудови діяла в умовах війни й крихкості держави, тож здійснилася лише частково — тримаємо разом задум та обмеження.'
  section: 'Тінь: Коротка каденція й межі впливу'
  words: 900
- points:
  - 'Повернення до розминки: чому економіста варто вчити як державотворця, а не як «кабінетного» теоретика?'
  - 'Кооперація поза «бізнесом»: спілка, пай, кредит, ощадність, статут і ревізія пов''язують економіку, громадянське суспільство й національну організацію.'
  - '[!decolonization] Остання місія: радник української дипломатичної місії до Франції; смерть у дорозі до Паризької мирної конференції в січні 1919 року, поховання в Одесі — економічна експертиза на службі дипломатії УНР.'
  - 'Порівняння: з Борисом Мартосом — щодо кооперації й фінансів; з Олександром Лотоцьким — щодо державної адміністрації; з Агатангелом Кримським і Володимиром Вернадським — щодо розбудови академії.'
  section: 'Дискусія та підсумок: Експертиза, гроші й дипломатія'
  words: 700
focus: Mykhailo Tuhan-Baranovskyi (1865-1919) taught as an internationally known economist, cooperative theorist, General Secretary of Finance in the Central Rada, and founder of the Ukrainian Academy of Sciences, so that fiscal vocabulary reads as sovereignty vocabulary and a short finance tenure still matters; his Russian- and German-language titles are read as an imperial academic marketplace rather than a Russian identity, member-owned cooperation is kept distinct from later Soviet collectivization, and 'father of' overclaims are held back as anti-hagiography in favour of shared institution-building.
