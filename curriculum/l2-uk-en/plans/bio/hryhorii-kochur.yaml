objectives:
- Пояснювати Кочура як українського перекладача, редактора, теоретика й наставника, а не лише як «колишнього в'язня» чи символ.
- Читати його метод як дисципліновану еквівалентність і осторогу проти надмірного одомашнення, а не як гасло «переклад-зброя».
- Тримати радянські звинувачення («членство в ОУН», «буржуазний націоналізм») як звинувачення режиму, які він заперечував, а не як факти.
- 'Утримувати видимими розбіжності хронології: арешт 5 чи 8 жовтня 1943 року, реабілітація 1957 чи 1962 року, місце смерті Київ чи Ірпінь.'
- Пояснювати ірпінський дім і відновлення Зерова як культурну інфраструктуру тяглості, а не лише як особисту витривалість.
