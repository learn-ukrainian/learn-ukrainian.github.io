content_outline:
- points:
  - 'Провокація: чому і «колишній в''язень», і «символ опору» однаково сплощують Кочура, ховаючи перекладача, редактора, теоретика й наставника?'
  - '[!biography] Знайомство з постаттю перекладача й теоретика: автор українського «Гамлета», відновлювач творів Миколи Зерова, теоретик перекладу й наставник, чий ірпінський дім став неформальним культурним осередком; лауреат Шевченківської премії 1995 року (посмертно).'
  section: Розминка
  words: 400
- points:
  - 'Позиція 1 (переклад як опір): у добу цензури переклад і редакторська праця Кочура підтримували українську літературну тяглість, коли офіційні канали її стискали.'
  - 'Позиція 2 (переклад як точність): за ЕСУ Кочур застерігав проти надмірного одомашнення й тримався суворого, порівняльного, антиспрощувального методу — його не варто зводити до гасла «переклад-зброя».'
  - '[!decolonization] Деколонізаційна теза реальна, але Кочура не редукуємо до перекладача-мученика чи політичної емблеми: його метод був насамперед дисциплінованим пошуком еквівалента.'
  - '[!epistemic-humility] Розбіжності хронології тримаємо видимими: арешт 5 чи 8 жовтня 1943 року, реабілітація 1957 чи 1962 року, місце смерті Київ чи Ірпінь — до звірення з архівним джерелом.'
  section: 'Конфліктна карта: Переклад як зброя чи як точність?'
  words: 900
- points:
  - 'Походження й освіта: народився 4 (17) листопада 1908 року в селі Феськівка на Чернігівщині в селянській родині; закінчив Київський інститут народної освіти 1932 року.'
  - 'Філологічне коло: його вчителі й середовище — Микола Зеров, Михайло Калинович, Олександр Білецький, Борис Якубський, Сергій Маслов — висока філологічна культура, на яку радянська політика невдовзі повела наступ.'
  - 'Родина й фах: одружився з Іриною Воронович, яку заарештували й засудили разом із ним; після навчання викладав у Балті й Тирасполі, а від 1936 до 1941 року очолював катедру літератури Вінницького педагогічного інституту.'
  - '[!biography] Уже в цей період окреслюється Кочур-філолог, для якого переклад невіддільний від наукового вивчення першоджерела й авторського стилю.'
  section: 'Формування: Феськівка, Зеров і філологічна культура'
  words: 1000
- points:
  - '«Гамлет» Шекспіра: український переклад 1964 року з перевиданнями 1969, 1991 і 2003 років; за Палгрейвською енциклопедією глобального Шекспіра Кочурів «Гамлет» особливо вплинув на українську шекспірівську традицію.'
  - 'Відновлення Зерова: «Вибране» Миколи Зерова (1966, спільно з В. Петровим) і двотомні «Твори» (1990, з Дмитром Павличком) — вагомий акт повернення знищеної неокласичної перекладацько-філологічної лінії.'
  - '«Відлуння» й теорія: збірки перекладів «Відлуння» (1969), «Друге відлуння» (1991) і «Третє відлуння» (2000, 2008), камерні вірші «Інтинський зошит» (1989, написані в таборі 1945-1953 років) та посмертна праця «Література та переклад» (2008) з дослідженнями, рецензіями й портретами.'
  - '[!anti-hagiography] Бібліографію не подаємо як рівний кар''єрний злет: за «Відлунням» 1969 року прийшло виключення 1973 року й блокада друку, а повніше повернення настало лише в 1988-1991 роках і посмертно; [!decolonization] за ЕСУ Кочур застерігав проти надмірного одомашнення — вчимо точність, а не гасло культурної зброї.'
  section: 'Діяльність: Гамлет, «Відлуння» й відновлення Зерова'
  words: 1300
- points:
  - 'Механізм тиску: 1943 року радянські органи безпеки заарештували Кочура з дружиною в прифронтовій Полтаві, звинуватили в членстві в ОУН і «українському буржуазному націоналізмі» й засудили до табірного терміну; [!decolonization] зв''язок з ОУН фіксуємо як радянське звинувачення, а не як доведений факт — за ХПГ Кочур провини не визнав.'
  - 'Вирок і Інта: за ХПГ вирок від 11 березня 1944 року — десять років позбавлення волі й п''ять років поразки в правах; Кочур відбував у системі таборів Інти в Комі, де попри табірні умови писав вірші, перекладав і вивчав мови з іншими в''язнями; [!epistemic-humility] твердження про знищені чи відтворені з пам''яті табірні переклади не подаємо як готові до класу без джерела на рівні сторінки.'
  - 'Ірпінь як осередок: після звільнення 8 січня 1953 року родина оселилася в Ірпені, почасти тому, що колишнім в''язням обмежували проживання в Києві; його дім став неформальним місцем зустрічей перекладачів, письменників і опозиційно налаштованих культурних діячів.'
  - '[!anti-hagiography] 1960-1970-ті: Кочур підписував протестні листи на захист заарештованих; 1973 року його виключили зі Спілки письменників після відмови дати бажані КГБ свідчення проти Євгена Сверстюка, що майже позбавило його змоги друкуватися; поновлення — 1988 року. Помер 15 грудня 1994 року (Київ чи Ірпінь — не з''ясовано), похований в Ірпені.'
  section: 'Тінь: Інта, Ірпінь і відмова свідчити'
  words: 900
- points:
  - 'Повернення до розминки: ключова історія виживання — це культурна інфраструктура (перекладацька школа, приватне наставництво, редакторська пам''ять), а не лише особиста витривалість.'
  - '[!decolonization] Радянські ярлики «буржуазний націоналізм» і «антирадянський» уживаємо тільки як звинувачення режиму, а не як нейтральні описи.'
  - 'Метод проти бінарності: Кочур долає хибну дихотомію «буквальна вірність проти націоналістичного одомашнення», показуючи дисципліновану еквівалентність і повагу до авторського стилю.'
  - '[!epistemic-humility] Відкриті питання лишаємо відкритими: дати арешту й реабілітації та місце смерті потребують архівного чи критично-біографічного звірення перед публікацією хронології в класі.'
  section: 'Дискусія та підсумок: Ірпінь як осередок тяглості'
  words: 700
focus: 'Hryhorii Kochur (1908-1994) as a Ukrainian translator, editor, translation theorist and mentor whose Irpin home and disciplined equivalence-seeking kept Ukrainian literary continuity alive under censorship: his influential Hamlet and his restoration of the murdered Mykola Zerov''s work read as cultural infrastructure rather than personal endurance alone, the Inta camp imprisonment (arrest 1943, sentence 1944, release 1953) and the 1973 Writers'' Union expulsion for refusing KGB-desired testimony against Yevhen Sverstiuk named specifically, Soviet charges like OUN membership and ''bourgeois nationalism'' quoted only as charges he denied, chronology discrepancies (arrest 5 vs 8 October 1943, rehabilitation 1957 vs 1962, death place Kyiv vs Irpin) kept visible, his anti-excessive-domestication method taught as precision rather than sloganized cultural weaponry, and claims about destroyed camp translations held back until page-level sources are checked.'
