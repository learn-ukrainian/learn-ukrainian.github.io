content_outline:
- points:
  - >-
    [!biography] Знайомство з Василем Сліпаком: соліст Паризької національної опери,
    який після 2014 року став волонтером, а згодом — бійцем-добровольцем.
  - >-
    Провокаційне питання: що змушує митця на піку міжнародної кар'єри покинути сцену
    заради окопів Донбасу?
  section: Розминка
  words: 400
- points:
  - >-
    Освіта та формування: спів у Львівській хоровій капелі "Дударик", навчання у
    консерваторії та формування унікального голосу (контртенор / баритон).
  - >-
    Міжнародний успіх: переїзд до Франції (1996), робота в Паризькій опері, визнання
    на європейських сценах (зокрема, партія Мефістофеля).
  - >-
    Зв'язок з Україною: підтримка Помаранчевої революції (2004) та організація
    української громади у Франції.
  section: 'Формування: Голос та європейська сцена'
  words: 1000
- points:
  - >-
    Громадська активність: початок російської агресії у 2014 році. Організація
    волонтерських концертів, акцій протесту та збору допомоги у Франції.
  - >-
    Перехід до прямої дії: повернення в Україну та регулярні бойові ротації
    як боєць Добровольчого українського корпусу.
  - >-
    Вибір позивного "Міф" (від Мефістофеля) та поєднання в одній особі європейського
    митця і українського піхотинця.
  section: 'Діяльність: Від паризької сцени до українського фронту'
  words: 1200
- points:
  - >-
    Механізм втрати: загибель Василя Сліпака 29 червня 2016 року від кулі снайпера
    біля селища Луганське під час захисту територіальної цілісності України.
  - >-
    [!epistemic-humility] Точність фактів: уникання узагальнення "під Дебальцевим",
    використання задокументованих даних про місце загибелі у Бахмутському секторі.
  - >-
    Втрата для культури: фізичне знищення митця російською війною, перервана
    міжнародна кар'єра.
  section: 'Тінь: Загибель добровольця'
  words: 1600
- points:
  - >-
    Державне визнання: посмертне присвоєння звання Героя України (2017) за мужність
    у захисті суверенітету.
  - >-
    [!anti-hagiography] Уникнення романтизації війни: Сліпак як приклад свідомого
    громадянського обов'язку, а не сліпого пориву.
  - >-
    Спадщина пам'яті: документальний фільм "Міф" (2018), музичні конкурси та значення
    голосу, який продовжує звучати.
  section: 'Підсумок: Пам''ять про Міфа'
  words: 1000
