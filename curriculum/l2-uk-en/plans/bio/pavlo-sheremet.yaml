content_outline:
- points:
  - 'Джерельне питання: як професійна траєкторія Павла Шеремета в Білорусі, Росії та Україні змінює спосіб читання його біографії?'
  - 'Чому датований звіт про розслідування не можна перетворювати на остаточний висновок про замовника, виконавців або мотив убивства?'
  - '[!biography] Відокремлення підтвердженої кар''єрної хронології від меморіальної оцінки.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: як описати роботу журналіста в трьох державах, не привласнюючи його одній національній історії й не стираючи білоруське походження?'
  - 'Дебат 2: чим відрізняються слідча версія, обвинувачення, журналістська знахідка, судове рішення та доведений факт?'
  - '[!epistemic-humility] Кожна версія має дату, автора, доказову основу й межі; відсутність відповіді не дозволяє заповнювати прогалину припущенням.'
  - '[!decolonization] Не використовувати імперську формулу «пострадянський журналіст» як заміну конкретним білоруському, російському й українському контекстам.'
  section: 'Конфліктна карта: Журналіст чи активіст?'
  words: 900
- points:
  - Початок телевізійної роботи в Білорусі, припинення програми й ув'язнення 1997 року за даними CPJ.
  - Робота в російських медіа як окремий етап, який потребує аналізу конкретних посад і редакційних умов.
  - Перехід до роботи в Україні без психологічних пояснень, яких джерела не дають.
  - Міжнародна премія свободи преси CPJ 1998 року як інституційно підтверджена відзнака.
  section: 'Формування: Білоруський етап кар''єри'
  words: 1000
- points:
  - Робота для «Української правди» й ранкова програма на радіо «Вісті» за профілем CPJ.
  - Теми колонок останніх тижнів, перелічені CPJ, як карта професійного інтересу, а не доказ мотиву вбивства.
  - Датований матеріал «Української правди» 2022 року як редакційна ретроспектива добірки текстів.
  - 'Метод читання авторської колонки: дата, теза, фактична основа, прогноз і пізніший редакційний контекст.'
  section: 'Діяльність: Український період'
  words: 1300
- points:
  - Редакційна належність сама по собі не доводить поглядів, мотивів або контролю журналіста над власністю медіа.
  - Етичні питання формулювати навколо конкретного матеріалу й редакційного рішення, а не навколо неперевірених ярликів.
  - '[!anti-hagiography] Премія та меморіальна оцінка не роблять кожну професійну дію безпомилковою.'
  - '[!myth-buster] Відхилити ярлики «агент» та «ідеальний журналіст», якщо немає визначення, доказу й атрибутованого джерела.'
  section: 'Межі джерел: Версії, докази й оцінки'
  words: 900
- points:
  - Повернення до розминки з таблицею «твердження — тип джерела — дата — правовий статус — межа висновку».
  - Звіт CPJ 2017 року як критика стану розслідування на конкретну дату, а не опис усіх подальших подій.
  - Журналістське розслідування як суспільно важлива перевірка, що не підмінює суд і не встановлює автоматично винуватість.
  - '[!decolonization] Білоруську суб''єктність Шеремета й український період його роботи розглядати без російського центру оповіді.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: Джерельно дисциплінований аналіз кар'єри Павла Шеремета в Білорусі, Росії та Україні й відмінностей між фактом, слідчою версією, журналістським розслідуванням та судовим висновком.
level: BIO
module: bio-185
objectives:
- Побудувати джерельно атрибутовану хронологію кар'єри Павла Шеремета в Білорусі, Росії та Україні.
- Розрізняти біографічний факт, слідчу версію, обвинувачення, журналістську знахідку та судовий висновок.
- Порівняти межі профілю CPJ, датованого звіту про розслідування та редакційної ретроспективи «Української правди».
- Формулювати висновки про професійні й етичні питання без припущень про мотив убивства, замовника або виконавців.
pedagogy: CBI
