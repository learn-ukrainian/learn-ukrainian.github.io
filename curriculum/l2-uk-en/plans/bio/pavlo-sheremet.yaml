content_outline:
- points:
  - 'Парадокс: Павло Шеремет — один з найвідоміших журналістів пострадянського простору, шанований у Білорусі, Росії та Україні,
    але вбитий саме в тій країні, яку обрав як простір свободи.'
  - 'Замість стандартної біографії — питання: чому журналіст, який пережив переслідування в диктаторській Білорусі та цензуру
    в авторитарній Росії, знайшов свою смерть у демократичній Україні?'
  - '[!biography]'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Журналіст трьох націй чи вічний емігрант? Оцінки Шеремета в Білорусі (опозиціонер), Росії (засновник незалежного
    ТБ), Україні (обличчя «УП»).'
  - 'Дебат 2: Хто вбив Павла? Конфлікт версій: офіційне слідство (звинувачення ветеранів та волонтерів) vs журналістське розслідування
    OCCRP/Slidstvo.Info (підозра на спецслужби).'
  - '[!epistemic-humility] Розгляд обох версій вбивства, їхні сильні та слабкі сторони, без передчасних висновків.'
  - '[!decolonization] Аналіз, як російська пропаганда використовувала вбивство Шеремета для дискредитації України як «failed
    state».'
  section: 'Конфліктна карта: Журналіст чи активіст?'
  words: 900
- points:
  - 'Початок кар''єри на білоруському ТБ: від ведучого до ворога режиму Лукашенка. Арешт 1997 року як поворотний момент.'
  - 'Вимушена еміграція до Росії: заснування та робота на ОРТ. Спроба створити острівець незалежної журналістики.'
  - 'Зростання цензури в путінській Росії: розчарування та усвідомлення неможливості продовжувати роботу.'
  - Переїзд до України після Революції Гідності — пошук нового дому для вільної журналістики.
  section: 'Формування: Білоруський гарт'
  words: 1000
- points:
  - 'Робота в «Українській правді»: відродження жанру авторської колонки, прямі ефіри, гострі інтерв''ю.'
  - 'Створення та ведення блогів і радіопрограм: радіо «Вєсті», заснування «Школи журналістики».'
  - 'Менторство та підтримка молодих журналістів: Шеремет як медіа-менеджер та наставник.'
  - 'Його власні слова: аналіз ключових статей та виступів українського періоду про корупцію, війну та реформи.'
  section: 'Діяльність: Український період'
  words: 1300
- points:
  - 'Робота на російському «Первом канале» (ОРТ): чи можна було боротися з системою, будучи її частиною? Критика з боку колег.'
  - 'Співпраця з радіо «Вєсті» в Україні: робота на медіа з непрозорою власністю та зв''язками з проросійськими політиками.
    Етична дилема та публічна критика.'
  - '[!anti-hagiography] Аналіз його власної рефлексії щодо цих компромісів. Шеремет не був святим, а людиною, що робила складні
    вибори в складних обставинах.'
  - '[!myth-buster] Розвінчання міфу про «російського агента» (поширюваного деякими українськими націоналістами) та міфу про
    «ідеального журналіста» (поширюваного його прихильниками).'
  section: 'Тінь: Компроміси та сліпі плями'
  words: 900
- points:
  - 'Повернення до парадокса: чому вільна Україна виявилася для Шеремета смертельно небезпечною? Студент формулює відповідь,
    враховуючи всі аспекти: від зовнішньої агресії до внутрішніх конфліктів.'
  - «Справа Шеремета» як індикатор здоров'я українського правосуддя та суспільства.
  - 'Спадщина: премії та стипендії його імені, фільм-розслідування «Вбивство Павла» як продовження його справи.'
  - '[!decolonization] Значення постаті Шеремета для спільної боротьби демократичних рухів України та Білорусі проти російського
    імперіалізму.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The life of Pavlo Sheremet as a lens on the challenges of journalism in post-Soviet states (Belarus, Russia, Ukraine).
  Explores the conflict between official and journalistic investigations into his murder, and the ethical compromises faced
  by reporters in authoritarian and hybrid warfare contexts.
