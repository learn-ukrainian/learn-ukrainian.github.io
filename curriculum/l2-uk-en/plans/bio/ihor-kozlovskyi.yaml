content_outline:
- points:
  - >-
    [!biography] Знайомство з Ігорем Козловським: український релігієзнавець, кандидат
    історичних наук, письменник та в'язень сумління, захоплений російською окупаційною
    владою у Донецьку.
  - >-
    Вступне питання: чому тоталітарні режими та окупаційні адміністрації вбачають
    найбільшу загрозу не лише у зброї, а й в інтелектуальному авторитеті?
  section: Розминка
  words: 400
- points:
  - >-
    Науковий шлях: викладання у вишах Донеччини (2001-2015), робота в інституціях
    у справах релігій (1980-2001).
  - >-
    Академічний внесок: автор понад пів сотні книг та двох сотень статей про релігійне
    різноманіття, містицизм та нові релігійні рухи.
  - >-
    [!decolonization] Інтелектуальний ландшафт: Козловський як ключова фігура
    громадянського суспільства Донецька, учасник Ініціативної групи "Першого грудня"
    та розбудовник міжрелігійного діалогу.
  section: 'Формування: Наука та громадянське суспільство'
  words: 1000
- points:
  - >-
    Початок окупації (2014): рішення залишитися в Донецьку через родинні обставини
    (догляд за сином з інвалідністю).
  - >-
    Загроза вільному слову: як російський окупаційний апарат переслідував проукраїнську
    інтелігенцію та релігійне інакомислення.
  - >-
    [!myth-buster] Козловський не був військовим, але окупаційний режим криміналізував
    його громадянську позицію та інтелектуальний вплив, використавши абсурдні приводи.
  section: 'Діяльність: Інтелектуальний авторитет Донеччини'
  words: 1000
- points:
  - >-
    Механізм репресій: викрадення (27 січня 2016 року), незаконне ув'язнення, перебування
    у підвалах та системі катівень окупаційної влади.
  - >-
    Стратегія виживання: психологічний опір та збереження ідентичності. Аналіз слів
    "Я читав лекції щурам, щоб чути голос" як акту збереження особистості.
  - >-
    Поняття внутрішньої свободи та гідності в нелюдських умовах ізоляції.
  - >-
    Звільнення: обмін полоненими 27 грудня 2017 року після майже двох років ув'язнення.
    Слова після повернення: "Україна — і ти нарешті можеш дихати вільним повітрям!".
  section: 'Тінь: Полон в ізоляції російської окупації'
  words: 1600
- points:
  - >-
    Життя після полону (2018-2023): публічні лекції, робота в ПЕН-клубі, свідчення
    про злочини окупантів та рефлексії про травму.
  - >-
    [!epistemic-humility] Раптова смерть у Києві (6 вересня 2023 року). Трансформація
    пережитого досвіду у концептуальну філософську спадщину.
  - >-
    Посмертна книга-діалог "Вільний у полоні" (2025), укладена з його інтерв'ю,
    лекцій і публічних виступів (не завершена ним особисто): систематизація
    етичного словника та свідчення про збереження свободи всупереч фізичним ґратам.
  section: 'Підсумок: Вільний повітрям і духом'
  words: 1200
focus: >-
  Ігор Козловський як публічний інтелектуал, релігієзнавець та свідок російського
  окупаційного терору в Донецьку, який концептуалізував досвід полону через категорії
  свободи та гідності.
