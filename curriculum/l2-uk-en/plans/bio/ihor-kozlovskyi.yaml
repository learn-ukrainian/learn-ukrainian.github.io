- Проаналізувати методи російського окупаційного апарату щодо придушення інтелігенції та вільного слова.
- Дослідити філософські та психологічні механізми виживання в умовах ув'язнення та катувань.
- Оцінити етичний словник (гідність, свобода, діалог), запропонований ученим після звільнення з полону.
