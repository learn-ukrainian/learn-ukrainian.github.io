objectives:
- Критично аналізувати зв'язок між творчістю Олександра Довженка та політичним контекстом радянської епохи
- Розрізняти риси українського поетичного кіно на прикладі фільмів «Земля» та «Арсенал»
- Інтерпретувати «Щоденник» Довженка як історичне свідчення та людську трагедію
- Формулювати аргументовану позицію щодо проблеми «митець і влада» на основі біографії Довженка
