content_outline:
- points:
  - 'Парадокс: Як один із найвизначніших режисерів світового кіно, автор «Землі», міг померти у творчому вигнанні, створюючи
    пропагандистські фільми на замовлення того, хто засудив його головний твір про Україну?'
  - '[!biography] Олександр Довженко — геній, що намагався говорити про Україну зі світом мовою кіно, але був змушений говорити
    з владою мовою компромісу.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: «Пролетарський митець» vs «буржуазний націоналіст». Як офіційна критика 1930-х пройшла шлях від захвату «Арсеналом»
    до розгрому «Землі» та звинувачень в «кулацькому ухилі»?'
  - 'Дебат 2: «Співець радянської епохи» vs «Символ колоніального пригнічення». Як СРСР намагався привласнити Довженка (Сталінські
    премії, фільм «Мічурін»), тоді як його «Щоденник» та заборонена «Україна в огні» свідчать про глибоку трагедію колонізованого
    митця.'
  - '[!epistemic-humility] Чи був Довженко конформістом, що намагався вижити, чи прихованим дисидентом, що залишав зашифровані
    послання у своїх фільмах? Аналіз різних інтерпретацій його поведінки.'
  - '[!decolonization] Розвінчання радянського міфу про «єдиний радянський кінематограф» через аналіз унікальності поетичного
    кіно Довженка як виразно українського явища.'
  section: 'Конфліктна карта: Геній та влада'
  words: 900
- points:
  - 'Світ дитинства на Чернігівщині: «Зачарована Десна» як ключ до розуміння міфопоетичного світогляду Довженка.'
  - 'Революційний вир: участь в армії УНР, дипломатична служба у Варшаві та Берліні — досвід, що сформував його бачення української
    державності.'
  - 'Шлях до мистецтва: від художника-карикатуриста в Харкові до режисера-дебютанта на Одеській кінофабриці. Пошук власної
    мови.'
  section: 'Формування: Від Сосниці до кінематографу'
  words: 1000
- points:
  - 'Українська трилогія: «Звенигора» (1928), «Арсенал» (1929), «Земля» (1930) — створення нового кінематографічного жанру.'
  - '«Земля» як шедевр світового кіно: аналіз візуальної мови, революційного монтажу та пантеїстичної філософії. Чому цей
    фільм став вічною класикою?'
  - 'Поетичне кіно як метод: відмова від традиційного сюжету, метафоричність, укрупнений план, ритм як основа структури. Як
    Довженко «малював» фільми.'
  section: 'Діяльність: Народження українського поетичного кіно'
  words: 1300
- points:
  - '[!anti-hagiography] Творчість після розгрому: «Іван» (1932) — спроба «виправитися» і створити ідеологічно правильний
    фільм про радянську індустріалізацію.'
  - 'Сталінські замовлення: «Аероград», «Щорс», «Мічурін» — вимушені компроміси та робота в жанрі соцреалізму. Як геній виконував
    замовлення влади.'
  - '[!myth-buster] Довженко не був «зламаний» одразу. «Україна в огні» (1943) — сценарій, написаний «в стіл», був актом відчайдушної
    сміливості, за який він заплатив до кінця життя.'
  - '«Щоденник» як головний доказ трагедії: записи про особисту розмову зі Сталіним, творчу кризу, тугу за Україною та відчуття
    внутрішнього вигнання.'
  section: 'Тінь: Ціна компромісу'
  words: 900
- points:
  - 'Повернення до парадоксу: що перемогло в долі Довженка — геній чи система? Студент формулює відповідь, спираючись на матеріали
    модуля.'
  - 'Вплив на світове кіно: від Фелліні та Параджанова до сучасних українських режисерів. Як «довженківська» естетика живе
    сьогодні.'
  - '[!decolonization] Переосмислення спадщини: Довженко в незалежній Україні — не просто «радянський класик», а символ величі
    та трагедії української культури XX століття.'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
focus: The biography of Oleksandr Dovzhenko, exploring his status as a world cinema icon, the creator of Ukrainian poetic
  cinema ("Earth", "Zvenyhora", "Arsenal"), and his tragic, complex relationship with Soviet power, which celebrated and then
  creatively crushed him. The module focuses on the anti-hagiographic reading of his life, contrasting his global achievements
  with the personal anguish and political compromises documented in his diaries, particularly around the banning of "Ukraine
  in Flames".
