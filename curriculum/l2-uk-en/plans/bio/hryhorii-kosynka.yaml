content_outline:
- points:
  - >-
    [!biography] Знайомство з Григорієм Косинкою (справжнє прізвище — Стрілець):
    майстер психологічної новели про українське село у вирі революції, один із
    фундаторів сучасної української новелістики, жертва Розстріляного відродження.
  - >-
    Провокаційне питання: чому радянська влада вбачала смертельну загрозу в стислих
    новелах про селянина — і за коротку прозу розстріляла письменника в 35 років?
  section: Розминка
  words: 400
- points:
  - >-
    Селянське коріння: син бідняка з Щербанівки на Київщині, що змалечку наймитував.
    Народну говірку й селянський світогляд, які стали матеріалом його прози, Косинка
    знав не з книжок, а з власного досвіду.
  - >-
    Самоосвіта і Київ: земська школа в Красному Куті, переїзд до міста на заробітки,
    навчання на історико-філологічному факультеті Київського інституту народної
    освіти (1919–1922), яке урвала матеріальна скрута й смерть батька.
  - >-
    Доба визвольної боротьби та дебют: перші публікації в газеті «Боротьба», поява
    1919 року новели «На буряки»; походження літературного псевдоніма «Косинка» від
    назви скромної польової квітки.
  - >-
    [!epistemic-humility] Про участь Косинки в повстанському русі отамана Зеленого
    документальних даних майже немає — відокремлюємо засвідчений факт від пізнішої
    мемуарної традиції про «письменника-повстанця».
  section: 'Формування: Від щербанівських ланів до київської літератури'
  words: 1000
- points:
  - >-
    Київська літературна сцена: група «Гроно» (1920), об'єднання АСПИС, згодом
    «Ланка» (з 1926 року — «Майстерня революційного слова», МАРС). Квартира Косинок
    стала місцем зустрічей Підмогильного, Плужника, Осьмачки, Антоненка-Давидовича.
  - >-
    Новелістика: збірки «На золотих богів» (1922), «В житах» (1926), «Політика»
    (1927). Перехід від ранньої імпресіоністичної фрагментарності до конкретно-
    аналітичного психологічного стилю зображення дійсності.
  - >-
    Поетика опору: розмитість хронотопу, кінематографічність оповіді, обірвана
    асоціативна фраза й мінімум авторського тексту — інструмент якнайправдивішої
    передачі болю українського села, а водночас спосіб обійти пильність цензури.
  - >-
    [!decolonization] Косинка продовжує самобутню лінію української психологічної
    новели (Стефаник, Коцюбинський, Васильченко), а не «провінційну гілку» чужої
    літератури; Василь Стефаник називав його «своїм сином з Дівич-Гори».
  section: 'Діяльність: Новеліст українського села у вирі революції'
  words: 1200
- points:
  - >-
    [!anti-hagiography] Косинка не був послідовним антирадянським дисидентом: 1919
    року він друкував соціалістичну публіцистику в боротьбистській «Боротьбі».
    Система знищила навіть митця, що спершу поділяв ліві симпатії, — бо він
    відмовився підкорити мистецтво партійній лінії.
  - >-
    Цькування: восени 1929 року Станіслав Косіор прилюдно затаврував Косинку
    «буржуазним націоналістом»; критика інкримінувала «куркульську ідеологію».
    Цензура заборонила збірку «Серце» (1933), раніше — «Новели дезертира» (1924);
    після ліквідації літорганізацій 1932 року письменник став позагруповим.
  - >-
    Виклик системі: на конференції письменників у Харкові (червень 1934) Косинка
    кинув у відповідь на сталінську формулу: «Ми стаємо не інженерами, а
    міліціонерами людських душ».
  - >-
    Механізм терору: арешт органами НКВС 4 листопада 1934 року; після вбивства
    Кірова постанова ЦВК СРСР від 1 грудня 1934 року запровадила позасудовий порядок
    «терористичних» справ — без захисту й оскарження. Виїзна сесія Військової колегії
    Верховного Суду СРСР засудила Косинку до розстрілу.
  - >-
    [!myth-buster] [!epistemic-humility] Розстріляний 15 грудня 1934 року в Києві
    разом із Влизьком, Буревієм, Фальківським, Крушельницьким — це був груповий
    процес масового терору, а не «індивідуальна» розправа; розбіжність джерел щодо
    дати страти (15 чи 17 грудня) проговорюємо відкрито.
  section: 'Тінь: Військова колегія та куля 1934 року'
  words: 1600
- points:
  - >-
    Повернення до питання розминки: чому стисла новела про село стала смертельно
    небезпечною для імперії — бо повертала українському селянинові суб'єктність,
    голос і людську гідність.
  - >-
    Доля архіву й родини: остання новела «Перевесло» втрачена назавжди; переклад
    «Мертвих душ» М. Гоголя вийшов 1934 року без імені перекладача; пам'ять і архів
    письменника зберегла його дружина Тамара Мороз-Стрілець.
  - >-
    Посмертна реабілітація (19 жовтня 1957 року) та поетапне, неповне повернення
    спадщини у виданнях 1960-х–1980-х років.
  - >-
    [!decolonization] Косинка як аргумент проти імперського наративу: знищення цілого
    покоління новелістів було культурним геноцидом, а не «відхиленням від лінії
    партії»; його повернене слово — акт відновлення тяглості української культури.
  section: 'Підсумок: Повернення розстріляного слова'
  words: 1000
focus: >-
  Григорій Косинка як майстер української психологічної новели про село у вирі
  революції та жертва Розстріляного відродження. Аналіз його імпресіоністично-
  експресіоністичної поетики, конфлікту з догматичною радянською критикою та
  механізму «кіровського» терору, що завершився розстрілом 1934 року.
level: BIO
module: bio-134
objectives:
- >-
  Аналізувати новелістику Григорія Косинки як самобутній синтез імпресіонізму,
  експресіонізму та психологічної прози про українське село.
- >-
  Пояснювати механізм радянського «кіровського» терору грудня 1934 року на прикладі
  сфабрикованого процесу й розстрілу Косинки.
- >-
  Критично розрізняти засвідчені факти біографії та легенду про «письменника-
  повстанця», застосовуючи епістемічну обережність до прогалин у джерелах.
- >-
  Оцінювати втрату покоління новелістів Розстріляного відродження як культурний
  геноцид і значення посмертного повернення спадщини Косинки.
