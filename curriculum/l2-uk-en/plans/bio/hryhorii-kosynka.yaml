content_outline:
- points:
  - 'Парадокс Миколи Куліша: як син херсонського селянина, що в юності ледве говорив українською, написав найвидатнішу п''єсу
    про мовну шизофренію радянської України?'
  - '[!biography] Куліш — центральна фігура українського модерного театру, чия доля стала символом цілого покоління.'
  section: Розминка
  words: 400
- points:
  - 'Дебат 1: Чи був Куліш щирим націонал-комуністом, що вірив в українізацію, чи «попутником», що використовував систему
    для дослідження національної ідентичності?'
  - 'Дебат 2: Радянська цензура — як його спочатку викреслили, а потім намагалися зобразити «радянським драматургом», ігноруючи
    анти-асиміляторське ядро його творчості.'
  - '[!epistemic-humility] Позиції сучасників варіювалися від звинувачень у «націоналістичному ухилі» до критики за «ідеологічні
    компроміси».'
  - '[!decolonization] Відновлення повноцінної постаті Куліша — це деконструкція радянського міфу про «єдиний радянський народ»
    та його культуру.'
  section: 'Конфліктна карта: Націонал-комуніст чи аполітичний модерніст?'
  words: 900
- points:
  - 'Соціальне походження: син наймита з-під Херсона — як це визначило його світогляд.'
  - 'Освіта: шлях від церковно-парафіяльної школи до самоосвіти та Одеського університету.'
  - 'Перша світова війна та революція: досвід, що зруйнував старий світ і дав матеріал для майбутніх п''єс.'
  - 'Переїзд до Харкова: входження в епіцентр українського культурного ренесансу 20-х років.'
  section: 'Формування: Від херсонських степів до харківського авангарду'
  words: 1000
- points:
  - Співпраця з Лесем Курбасом та театром «Березіль» — один із найплідніших творчих союзів в історії української культури.
  - 'Аналіз п''єси «Мина Мазайло»: сатира на мовний комплекс меншовартості, філологічний водевіль, що став політичним маніфестом.'
  - 'Інші ключові твори: «Народний Малахій» (критика утопічної свідомості), «Патетична соната» (спроба осмислити революційний
    хаос).'
  - 'Первинні джерела: уривки з п''єс, щоденників, листів, що розкривають його творчий метод.'
  section: 'Діяльність: Тандем із Курбасом і народження «Мини Мазайла»'
  words: 1300
- points:
  - '[!anti-hagiography] Куліш не був бездоганним дисидентом. Він був членом партії, намагався вписати свою творчість у рамки
    нової ідеології.'
  - 'Аналіз п''єси «Комуна в степах»: спроба написати «правильну» радянську п''єсу, яка, однак, зазнала критики за «нерозуміння
    лінії партії».'
  - 'Критика з боку сучасників: звинувачення в «буржуазному націоналізмі» та «формалізмі» як частина політичного цькування.'
  - '[!myth-buster] Міф про «чистого митця» vs реальність: Куліш як людина, що змушена була лавірувати між власними переконаннями
    та тиском тоталітарної держави.'
  section: 'Тінь: Ідеологічні компроміси та ціна виживання'
  words: 900
- points:
  - 'Повернення до розминки: чому саме Куліш став літописцем української мовної трагедії?'
  - 'Трагічний фінал: арешт у 1934, Соловки, розстріл в урочищі Сандармох 3 листопада 1937 року разом із Курбасом та сотнями
    інших представників української інтелігенції.'
  - '[!decolonization] Спадщина Куліша як аргумент проти імперських наративів: його творчість доводить глибину та самобутність
    української культури, яку намагалися знищити.'
  - 'Сучасне значення: чому п''єса «Мина Мазайло» знову стала надзвичайно актуальною після 2014 року?'
  section: 'Дискусія та підсумок: Спадщина'
  words: 700
