objectives:
- Аналізувати еволюцію ідеології Дмитра Донцова від раннього соціалізму до інтегрального націоналізму
- Критично оцінювати ключові положення його «вольового націоналізму» (аморалізм, фанатизм, елітизм)
- Порівнювати доктрину Донцова з тогочасними європейськими ідеологіями, зокрема фашизмом
- Формулювати власну аргументовану позицію щодо суперечливої спадщини Донцова в контексті сучасної України
